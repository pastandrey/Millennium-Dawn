name: Tools Validation

on:
  pull_request:
    paths:
      - 'tools/**'
      - '.github/workflows/tools-validation.yml'

jobs:
  validate-tools:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tools/requirements.txt
      - name: Run tools validation
        run: |
          python tools/validate_tools.py --output tools_validation_report.json
      - name: Upload validation report
        uses: actions/upload-artifact@v7.0.0
        if: always()
        with:
          name: tools-validation-report
          path: tools_validation_report.json
      - name: Check validation results
        run: |
          python - << 'EOF'
          import json
          with open('tools_validation_report.json') as f:
              data = json.load(f)
          errors = data['summary']['errors']
          if errors > 0:
              print('Validation failed with ' + str(errors) + ' errors')
              exit(1)
          print('Tools validation passed')
          EOF
