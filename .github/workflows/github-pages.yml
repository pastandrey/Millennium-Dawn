name: GitHub Pages Deployment (Astro)

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - ".github/workflows/github-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependency for OG generation
        run: python3 -m pip install --upgrade pillow

      - name: Install docs dependencies
        working-directory: ./docs
        run: bun install

      - name: Generate OG images
        run: python3 docs/scripts/generate_og_images.py --repo-root . --docs-dir docs

      - name: Build with Astro
        working-directory: ./docs
        run: bun run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./docs/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
