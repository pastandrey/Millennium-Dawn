name: Code Standards & Validation

on:
  pull_request:
    branches: [ main, master ]
    paths:
    - '**/*.txt'
    - '**/*.yml'
    - '**/*.gfx'
    - '**/*.gui'
    - '!tutorial/**'
    - '!Changelog.txt'
  push:
    tags: [ 'v*' ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  INPUT_RULES: 'https://github.com/Kaiserreich/cwtools-hoi4-config.git'
  INPUT_RULESREF: 'master'
  INPUT_SUPPRESSEDOFFENCECATEGORIES: '{"failure":["CW226"], "warning":["CW251"], "notice":[]}'
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  checks: write
  contents: read
  pull-requests: write
  issues: write

jobs:
  coding-standards:
    name: Coding Standards
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run coding standards check
      run: python tools/coding_standards.py ${{ secrets.BOT_TOKEN }}

  styling-check:
    name: Style Check
    runs-on: ubuntu-latest
    needs: [coding-standards]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run style check
      run: |
        python tools/check_basic_style.py --mode diff ${{ secrets.BOT_TOKEN }}
        python tools/check_basic_style_2.py --mode diff ${{ secrets.BOT_TOKEN }}

  validate-variables:
    name: Validate Flags and Event Targets
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Run variable validation
      run: |
        python3 tools/validation/validate_variables.py --strict --no-color --workers 4 --output validation-variables.log

    - name: Upload validation results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: validation-variables-results
        path: validation-variables.log
        retention-days: 7

  validate-scripted-localisation:
    name: Validate Scripted Localisation
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Run scripted localisation validation
      run: |
        python3 tools/validation/validate_scripted_localisation.py --strict --no-color --workers 4 --output validation-scripted-localisation.log

    - name: Upload validation results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: validation-scripted-localisation-results
        path: validation-scripted-localisation.log
        retention-days: 7

  validate-cosmetic-tags:
    name: Validate Cosmetic Tags
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Run cosmetic tag validation
      run: |
        python3 tools/validation/validate_cosmetic_tags.py --strict --no-color --workers 4 --output validation-cosmetic-tags.log

    - name: Upload validation results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: validation-cosmetic-tags-results
        path: validation-cosmetic-tags.log
        retention-days: 7

  validate-decisions:
    name: Validate Decisions
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Run decision validation
      run: |
        python3 tools/validation/validate_decisions.py --strict --no-color --workers 4 --output validation-decisions.log

    - name: Upload validation results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: validation-decisions-results
        path: validation-decisions.log
        retention-days: 7

  validate-localisation:
    name: Validate Localisation
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Run localisation validation
      run: |
        python3 tools/validation/validate_localisation.py --strict --no-color --workers 4 --output validation-localisation.log

    - name: Upload validation results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: validation-localisation-results
        path: validation-localisation.log
        retention-days: 7

  validate-events:
    name: Validate Events
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Run event validation
      run: |
        python3 tools/validation/validate_events.py --strict --no-color --workers 4 --output validation-events.log

    - name: Upload validation results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: validation-events-results
        path: validation-events.log
        retention-days: 7

  validation-report:
    name: Generate Validation Report
    runs-on: ubuntu-latest
    needs: [validate-variables, validate-scripted-localisation, validate-cosmetic-tags, validate-decisions, validate-localisation, validate-events]
    if: always() && github.event_name == 'pull_request'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Download all validation results
      uses: actions/download-artifact@v4
      with:
        path: validation-results

    - name: Generate and post validation report
      run: |
        python3 tools/generate_validation_report.py \
          --results-dir validation-results \
          --output report.md \
          --pr-number "${{ github.event.pull_request.number }}" \
          --commit-sha "${{ github.sha }}" \
          --github-token "${{ secrets.GITHUB_TOKEN }}" \
          --github-repository "${{ github.repository }}" \
          --post-comment \
          --print

    - name: Upload combined report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: validation-report
        path: report.md
        retention-days: 30

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Create Release
      uses: actions/create-release@v1
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false
