 IRQ_labour_unions: "FĂŠdĂŠration gĂŠnĂŠrale des syndicats"
 reduce_taxes_farmer_mission_tt: "Notre Â§YTaux d'impĂ´t sur les sociĂŠtĂŠsÂ§! est infĂŠrieur Ă  [?reduction_target_farmers_tax_rate|Y0]% ďźActuel:[?corporate_tax_rate|0Y]%ďź\n"
 reduce_taxes_farmer_mission: "Les agriculteurs ont exigĂŠ des rĂŠductions d'impĂ´ts"
 reduce_taxes_farmer_mission_desc: "Les agriculteurs ont besoin d'argent supplĂŠmentaire en raison des rĂŠcentes mauvaises ventes et de l'inflation croissante au sein de l'ĂŠconomie. Ils nous ont demandĂŠ de diminuer votre Â§YTaux d'impĂ´t sur les sociĂŠtĂŠsÂ§! par Â§G5%Â§! pour aider Ă  cette campagne."
 agricultural_district_tax_credits_decision: "Â§YDistricts agricoles commercialisĂŠsÂ§! Les crĂŠdits d'impĂ´t"
 agricultural_district_tax_credits_decision_desc: "Nous pouvons accorder une sĂŠrie de petits crĂŠdits d'impĂ´t pour aider Ă  apaiser les problĂ¨mes ĂŠconomiques des agriculteurs, mais au prix d'une rĂŠduction des revenus pour les prochains mois. Comment devrions-nous procĂŠder?"
 the_military_minus_5_tt: "Â§YLes militairesÂ§! Avis Â§R-5Â§!\n"
 allow_foreign_nationals_military_decision: "Autoriser les ressortissants ĂŠtrangers dans l'armĂŠe"
 allow_foreign_nationals_military_decision_desc: "Notre armĂŠe est dans une position prĂŠcaire et nous devons recruter davantage de conscrits en leur garantissant la citoyennetĂŠ."
 repeal_foreign_nationals_military_decision: "Abroger les ressortissants ĂŠtrangers dans l'armĂŠe"
 repeal_foreign_nationals_military_decision_desc: "Nous avons rĂŠcemment autorisĂŠ les ressortissants ĂŠtrangers Ă  rejoindre l'armĂŠe. La dĂŠcision a suscitĂŠ des problĂ¨mes au sein de lâarmĂŠe et il pourrait ĂŞtre utile de lâabroger."
 internal_faction_labour_dispute_companies_favoured: "Conflit de travail - Entreprises favorisĂŠes"
 internal_faction_labour_dispute_companies_favoured_desc: "Dans un rĂŠcent conflit de travail, le gouvernement a favorisĂŠ les avantages des entreprises au dĂŠtriment des syndicats."
 internal_faction_labour_dispute_union_favoured: "Conflit de travail - Syndicats favorisĂŠs"
 internal_faction_labour_dispute_union_favoured_desc: "Dans un rĂŠcent conflit de travail, le gouvernement a favorisĂŠ les avantages des syndicats au dĂŠtriment des entreprises."
 internal_faction_economic_boom: "Boom ĂŠconomique"
 internal_faction_economic_boom_desc: "Nos factions nous aident Ă  rĂŠaliser un boom ĂŠconomique !"
 internal_faction_military_industry_thriving: "L'industrie militaire en plein essor"
 internal_faction_military_industry_thriving_desc: "Les travaux rĂŠcents menĂŠs dans notre complexe militaro-industriel ont permis de produire un nombre record de ressources militaires. Lâindustrie est absolument florissanteÂ !"
 internal_faction_subsidize_convoy_production: "Financement de la production de convois"
 internal_faction_subsidize_convoy_production_desc: "Nous avons subventionnĂŠ la production de cargos en convoi Ă  la demande des cales sĂ¨ches qui avaient besoin de liquiditĂŠs supplĂŠmentaires."
 internal_faction_decreased_investments: "Diminution des investissements"
 internal_faction_decreased_investments_desc: "En raison de nos dĂŠcisions ĂŠconomiques, les investissements rĂŠalisĂŠs par les entreprises ralentissent."
 internal_factions_allowed_foreign_nationals_military: "Le service garantit la citoyennetĂŠ"
 internal_factions_allowed_foreign_nationals_military_desc: "RĂŠcemment, nous avons adoptĂŠ des lois et des lois permettant aux ressortissants ĂŠtrangers de rejoindre l'armĂŠe sans exiger la citoyennetĂŠ. C'est devenu une mĂŠthode utilisĂŠe par l'armĂŠe pour recruter de nouveaux soldats, mais cela a provoquĂŠ une certaine instabilitĂŠ au sein des rangs."
 internal_factions_temporarily_reduce_migrations: "Objectifs de migration temporairement rĂŠduits"
 internal_factions_temporarily_reduce_migrations_desc: "En raison de la pression exercĂŠe par certains groupes d'intĂŠrĂŞt ĂŠtrangers prĂŠsents dans le pays, nous avons rĂŠduit nos objectifs en matiĂ¨re de migration."
 internal_factions_events.0.t: "Demande d'un propriĂŠtaire d'entreprise pour une rĂŠduction d'impĂ´t"
 internal_factions_events.0.d: "Un reprĂŠsentant des propriĂŠtaires de petites et moyennes entreprises s'est adressĂŠ Ă  notre gouvernement. Ils affirment qu'en raison de la situation ĂŠconomique du pays, les petites entreprises souffrent. Ils aimeraient bĂŠnĂŠficier de rĂŠductions d'impĂ´ts temporaires pour aider leurs entreprises Ă  rĂŠussir."
 internal_factions_events.0.o1: "Accepter de rĂŠduire les impĂ´ts."
 internal_factions_events.0.o2: "Le budget ne peut pas le supporter !"
 internal_factions_events.0.o3: "Augmentons plutĂ´t les taxes sur les entreprises !"
 internal_factions_events.0.o4: "Travailler avec les syndicats pour rĂŠsoudre le problĂ¨me."
 internal_factions_events.1.t: "Une start-up en passe d'ĂŞtre rachetĂŠe"
 internal_factions_events.1.d: "Une start-up prospĂ¨re a rĂŠcemment ĂŠtĂŠ mise en vente. Il suscite actuellement un grand intĂŠrĂŞt de la part dâune grande entreprise ĂŠtrangĂ¨re cherchant Ă  ĂŠtendre ses opĂŠrations dans [ROOT.GetNameDef]. Certains estiment que cette expansion devrait ĂŞtre stoppĂŠe, mĂŞme si empĂŞcher lâacquisition irait Ă  lâencontre des principes du libre marchĂŠ."
 internal_factions_events.1.o1: "Laisser l'acquisition se faire."
 internal_factions_events.1.o2: "Il faut empĂŞcher cela."
 internal_factions_events.1.o3: "L'Ătat l'achĂ¨tera en premier."
 internal_factions_events.1.o4: "Forcer une fusion avec une entreprise nationale Ă  la place"
 internal_factions_events.2.t: "La bureaucratie fait ĂŠchouer des start-ups"
 internal_factions_events.2.d: "De nombreux propriĂŠtaires de petites entreprises critiquent le niveau de la bureaucratie dans le pays. Ils disent que le fait de remplir de nombreux formulaires, de demander des permis et de courir d'un bureau Ă  l'autre dĂŠcourage les gens de crĂŠer de nouvelles entreprises. Ils souhaitent que nous rĂŠduisions certaines des restrictions imposĂŠes aux petites entreprises."
 internal_factions_events.2.o1: "RĂŠduire la bureaucratie."
 internal_factions_events.2.o2: "Ces bureaucrates sont nĂŠcessaires."
 internal_factions_events.2.o3: "Peut-ĂŞtre pouvons-nous faciliter la tĂ˘che Ă  certains individus..."
 internal_factions_events.3.t: "Demande de fonds supplĂŠmentaires pour les start-ups"
 internal_factions_events.3.d: "Un groupe d'hommes d'affaires nous a approchĂŠs, nous demandant d'allouer davantage de fonds pour les start-ups afin de soutenir les nouvelles entreprises. La crĂŠation d'une entreprise est une opĂŠration coĂťteuse, et l'Ătat devrait soutenir les propriĂŠtaires de petites entreprises."
 internal_factions_events.3.o1: "Naturellement, nous devons aider davantage les entrepreneurs."
 internal_factions_events.3.o2: "Nous ne devrions pas injecter des fonds publics dans des entreprises privĂŠes."
 internal_factions_events.3.o3: "Obtenir un financement auprĂ¨s des banques."
 internal_factions_events.4.t: "Aucun prĂŞt pour les petites entreprises"
 internal_factions_events.4.d: "Une problĂŠmatique nous a ĂŠtĂŠ soulevĂŠe. De nombreux PDG de petites entreprises affirment que les banques sont de plus en plus rĂŠticentes Ă  leur prĂŞter de lâargent. Un reprĂŠsentant des banquiers a cependant dĂŠclarĂŠ qu'il ĂŠtait tout Ă  fait normal que les banques ne prĂŞtent pas d'argent Ă  chaque machine Ă  jus ÂŤ rĂŠvolutionnaire Âť qu'on invente."
 internal_factions_events.4.o1: "Obliger les banques Ă  mieux partager leur argent."
 internal_factions_events.4.o2: "Les banques sont libres de choisir Ă  qui elles prĂŞtent de l'argent."
 internal_factions_events.4.o3: "Offrir aux petites entreprises des prĂŞts garantis par lâĂtat"
 internal_factions_events.5.t: "Lutte pour une ĂŠnergie propre"
 internal_factions_events.5.d: "Une petite entreprise proposant des solutions dâĂŠnergie propre a poursuivi en justice une grande sociĂŠtĂŠ de combustibles fossiles. La grande entreprise est accusĂŠe de mener intentionnellement des campagnes de marketing nĂŠgatives contre la plus petite entreprise, ainsi que d'espionnage industriel et de sabotage. Cette affaire judiciaire fait la une des journaux dans tout le pays et est considĂŠrĂŠe comme un combat entre les ĂŠnergies renouvelables et les ĂŠnergies fossiles."
 internal_factions_events.5.o1: "Veiller Ă  ce que l'ĂŠnergie verte prĂŠvale."
 internal_factions_events.5.o2: "Faire en sorte que les combustibles fossiles l'emportent."
 internal_factions_events.5.o3: "Nous ne devrions pas nous impliquer."
 internal_factions_events.6.t: "Un petit poisson dans un grand ĂŠtang"
 internal_factions_events.6.d: "Nous recevons des plaintes selon lesquelles de nombreuses grandes entreprises achĂ¨tent intentionnellement leurs petits concurrents, dans le seul but de les fermer et d'empĂŞcher la concurrence. Beaucoup craignent que les grandes entreprises travaillent Ă  l'unisson pour former un cartel et contrĂ´ler les marchĂŠs."
 internal_factions_events.6.o1: "C'est Ă§a le business, petit."
 internal_factions_events.6.o2: "Condamnons ce genre de comportement !"
 internal_factions_events.6.o3: "Des cartels, vous dites ? Peut-ĂŞtre que nous pouvons arriver Ă  une comprĂŠhension mutuelle."
 internal_factions_events.7.t: "Litige relatif au contrat de travail"
 internal_factions_events.7.d: "Les chefs d'entreprise demandent que les contrats de travail nationaux puissent ĂŞtre assouplis par des contrats locaux entre l'employĂŠ et l'employeur. En permettant moins de restrictions sur les personnes pouvant ĂŞtre licenciĂŠes et plus de libertĂŠs dans les heures de travail allouĂŠes, il serait plus facile pour les petites entreprises d'embaucher du personnel. La plupart des syndicats ont dĂŠjĂ  protestĂŠ contre cette suggestion, affirmant qu'il est hors de question que les droits des travailleurs soient rĂŠduits. En fait, ils suggĂ¨rent davantage de restrictions dans les contrats de travail afin d'ĂŠliminer des choses comme les stages rĂŠmunĂŠrĂŠs."
 internal_factions_events.7.o1: "Les contrats de travail locaux sont privilĂŠgiĂŠs."
 internal_factions_events.7.o2: "Les travailleurs passent en premier !"
 internal_factions_events.7.o3: "Peut-ĂŞtre que nous pouvons arriver Ă  un accord ?"
 internal_factions_events.8.t: "Magasins ouverts un jour saint"
 internal_factions_events.8.d: "Un scandale a rĂŠcemment ĂŠclatĂŠ lorsqu'un commerĂ§ant de l'une de nos grandes villes a ouvert son magasin le jour d'une fĂŞte religieuse nationale. Les autoritĂŠs religieuses ont dĂŠclarĂŠ que cela allait Ă  l'encontre des traditions de la nation et que les jours fĂŠriĂŠs ĂŠtaient destinĂŠs au culte et Ă  la priĂ¨re."
 internal_factions_events.8.o1: "Nous sommes un pays (insĂŠrer une croyance arbitraire ici), et les traditions doivent ĂŞtre respectĂŠes !"
 internal_factions_events.8.o2: "Qui se soucie de la religion de toute faĂ§on ?"
 internal_factions_events.9.t: "Une entreprise s'inscrit en bourse"
 internal_factions_events.9.d: "Une jeune entreprise populaire et prospĂ¨re a dĂŠcidĂŠ de s'introduire sur le marchĂŠ boursier national. Cela nous donne une opportunitĂŠ d'investissement pour acheter certaines des actions de cette sociĂŠtĂŠ."
 internal_factions_events.9.o1: "Acheter des actions."
 internal_factions_events.9.o2: "Nous ne pouvons pas nous le permettre."
 internal_factions_events.10.t: "L'essor des start-ups"
 internal_factions_events.10.d: "A record-breaking number of new companies have been recently founded in the country. This has created many jobs and is positively affecting our economy. The economy is booming and we are thriving under the the record number of startups!"
 internal_factions_events.10.o1: "Super"
 internal_factions_events.11.t: "Campagne de dons Ă  un rival politique"
 internal_factions_events.11.d: "Un de nos rivaux politiques a reĂ§u une donation commune d'un groupe de petites entreprises. Il semble que les PDG des petites entreprises ne soient pas satisfaits de notre politique."
 internal_factions_events.11.o1: "Mince"
 internal_factions_events.12.t: ""
 internal_factions_events.12.d: ""
 internal_factions_events.12.o1: "Mince"
 internal_factions_events.13.t: "Une grande entreprise en faillite !"
 internal_factions_events.13.d: "L'une des plus grandes entreprises de notre pays a dĂŠclarĂŠ faillite aujourd'hui. C'est un jour vraiment triste pour notre ĂŠconomie."
 internal_factions_events.13.a: "triste"
 internal_factions_events.13.b: "Subventionner l'entreprise."
 internal_factions_events.14.t: "$labour_unions$ exige des augmentations de salaire"
 internal_factions_events.14.d: "$labour_unions$ exigent dĂŠsormais que les entreprises et les conglomĂŠrats industriels de notre pays soient obligĂŠs dâaugmenter les salaires des travailleurs."
 internal_factions_events.14.a: "Soutenir les entreprises."
 internal_factions_events.14.b: "Soutenir les syndicats."
 internal_factions_events.14.c: "Ni l'un ni l'autre."
 internal_factions_events.15.t: "$labour_unions$ exige de meilleurs soins de santĂŠ"
 internal_factions_events.15.d: "$labour_unions$ exige que nous augmentions notre budget de santĂŠ. Comment devrions-nous procĂŠder?"
 internal_factions_events.15.a: "Accepter les exigences"
 internal_factions_events.15.b: "Refuser les exigences"
 internal_factions_events.16.t: "$labour_unions$ exige une augmentation des dĂŠpenses de protection sociale"
 internal_factions_events.16.d: "Les syndicats du pays exigent que nous augmentions notre budget de dĂŠpenses sociales pour mieux soutenir les travailleurs et ceux qui sont incapables de travailler. Comment devrions-nous procĂŠder?"
 internal_factions_events.16.a: "Accepter les exigences"
 internal_factions_events.16.b: "Refuser les exigences"
 internal_factions_events.17.t: "Les agriculteurs rĂŠsistent Ă  la rĂŠforme agraire"
 internal_factions_events.17.d: "Small-scale subsistence farmers have revolted and demand that a multitude of factors should be incorporated into rural development. Citing that the Neoclassical theory of on farm production has only brought hardships for those dependent on farm inputs that are subject to market imperatives.\n\nState actors argue that transforming subsistence farmers into export-oriented producers would allow for the rural countryside to develop through marketization."
 internal_factions_events.17.a: "Appliquer des pratiques de dĂŠveloppement ascendantes."
 internal_factions_events.17.b: "PrivilĂŠgier la croissance favorable aux pauvres."
 internal_factions_events.17.c: "Maintenir le statu quo."
 internal_factions_events.17.dd: "Poursuite du dĂŠveloppement nĂŠoclassique."
 internal_factions_events.18.t: "Les agriculteurs demandent une aide financiĂ¨re"
 internal_factions_events.18.d: "Les agriculteurs sont actuellement confrontĂŠs Ă  des difficultĂŠs financiĂ¨res. Ils ont prĂŠsentĂŠ une pĂŠtition pour discuter d'une ĂŠventuelle subvention."
 internal_factions_events.18.a: "Subventionner les agriculteurs."
