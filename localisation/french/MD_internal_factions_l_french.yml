 internal_factions_events.44.t: "Un oulĂŠma demande un financement pour un projet de mosquĂŠe"
 internal_factions_events.44.d: "Les oulĂŠmas ont demandĂŠ au gouvernement de contribuer Ă  un projet national de rĂŠnovation et d'amĂŠlioration des mosquĂŠes. L'objectif est d'amĂŠliorer et de moderniser les mosquĂŠes existantes, ce qui nĂŠcessite la confiscation de certaines parcelles de terrain afin de les agrandir. Les oulĂŠmas affirment qu'un tel projet renforcera la piĂŠtĂŠ de la nation et placera le gouvernement dans une position moralement favorable."
