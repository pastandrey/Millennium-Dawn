 chaebols: "Chaebols"
 chaebols_desc: "Un Chaebol est une forme sud-corĂŠenne de conglomĂŠrat commercial. Ce sont des sociĂŠtĂŠs multinationales mondiales qui possĂ¨dent de nombreuses entreprises internationales. Hyundai, Samsung, LG et le groupe SK sont les plus grands. Les Chaebols sud-corĂŠens sont les plus grandes entreprises du monde par rapport Ă  la taille de l'ĂŠconomie du pays d'origine et ont jouĂŠ un rĂ´le indispensable dans le dĂŠveloppement national de la CorĂŠe du Sud."
