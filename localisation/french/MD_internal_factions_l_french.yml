 decision_category_internal_factions: "Interaction des factions internes"
 decision_category_internal_factions_desc: "\nÂŁMAIN_desctext_internal_factions \n\n\n\n[ROOT.GetName] compte quelques factions dans le pays. Ce sont des factions puissantes qui peuvent incroyablement taxer notre pays. Cependant, il est ĂŠgalement possible que plus nous nous embĂŞtons avec ces groupes, cela puisse nous causer des problĂ¨mes Ă  long terme."
 tax_labour_unions_decision: "Syndicats fiscaux"
 tax_labour_unions_decision_desc: "Les syndicats sâen sortent trop bien depuis trop longtemps. Nous devrions commencer Ă  augmenter les impĂ´ts des syndicats dans le pays"
 raise_wages_labour_unions_decision: "Augmenter les salaires"
