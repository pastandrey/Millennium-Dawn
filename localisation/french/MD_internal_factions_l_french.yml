 internal_factions_events.45.t: "Collaboration accrue entre clercs rĂŠgionaux et nationaux"
 internal_factions_events.45.d: "RĂŠcemment, le clergĂŠ de notre nation a collaborĂŠ ĂŠtroitement avec des clercs rĂŠgionaux. Cette collaboration inquiĂ¨te certains membres de notre cabinet, qui craignent que l'influence ĂŠtrangĂ¨re ne s'infiltre dans [ROOT.GetName] et ne nuise Ă  la crĂŠdibilitĂŠ du gouvernement."
 internal_factions_events.45.a: "Ils ne reprĂŠsentent aucune menace"
 internal_factions_events.45.b: "Intervenir contre eux"
 internal_factions_events.46.t: "Protestations publiques contre un ĂŠdit religieux"
 internal_factions_events.46.d: "RĂŠcemment, un clerc a annoncĂŠ son intention de demander au gouvernement d'appliquer un ĂŠdit qu'il a proclamĂŠ Ă  l'ĂŠchelle nationale. La rĂŠaction du public Ă  cette annonce est mitigĂŠe, avec plus d'opinions nĂŠgatives que positives, car l'ĂŠdit pourrait restreindre les libertĂŠs personnelles. Cependant, cet ĂŠdit pourrait ĂŞtre bĂŠnĂŠfique pour notre gouvernement et nos objectifs, car il nous permettrait d'accroĂŽtre notre pouvoir."
 internal_factions_events.46.a: "Appliquer l'ĂŠdit Ă  l'ĂŠchelle nationale"
 internal_factions_events.46.b: "DĂŠnoncer publiquement l'ĂŠdit lors d'une confĂŠrence de presse"
 internal_factions_events.47.t: "Les clercs wahhabites appellent Ă  une rĂŠpression des pratiques chiites et soufies"
 internal_factions_events.47.d: "Ă la suite d'un rĂŠcent sermon d'un clerc wahhabite ĂŠminent, beaucoup appellent Ă  une rĂŠpression des chiites et des soufis, accusĂŠs de pratiques 'kafir'. Le gouvernement est dans une position dĂŠlicate, car attaquer ces communautĂŠs pourrait nuire Ă  notre rĂŠputation auprĂ¨s des minoritĂŠs."
 internal_factions_events.47.a: "Le clergĂŠ a raison"
 internal_factions_events.47.b: "Les ignorer"
 internal_factions_events.48.t: "Les wahhabites condamnent les femmes sur le lieu de travail"
 internal_factions_events.48.d: "Aujourd'hui, Ă  la tĂŠlĂŠvision nationale, des clercs wahhabites ont dĂŠnoncĂŠ les femmes travaillant sur leur lieu de travail et ont lancĂŠ une campagne visant Ă  rĂŠduire le nombre de femmes activement employĂŠes et participant au marchĂŠ du travail."
 internal_factions_events.48.a: "Licencier quelques personnes pour les apaiser"
 internal_factions_events.48.b: "Les ignorer"
 internal_factions_events.49.t: "Les wahhabites appellent Ă  des patrouilles de moralitĂŠ"
 internal_factions_events.49.d: "Les wahhabites appellent Ă  des patrouilles de moralitĂŠ visant Ă  repĂŠrer dans les rues ceux qui enfreignent la tradition et la loi islamiques. Ces patrouilles ont commencĂŠ sans l'accord du gouvernement, et des volontaires civils agissent en ignorant les forces de l'ordre."
 internal_factions_events.49.a: "Soutenir leurs patrouilles"
 internal_factions_events.49.b: "Y mettre fin"
 internal_factions_events.50.t: "Un prince demande des fonds pour une compagnie aĂŠrienne"
 internal_factions_events.50.d: "Un prince royal a sollicitĂŠ le gouvernement pour obtenir des fonds afin de crĂŠer une nouvelle compagnie aĂŠrienne. Sa dĂŠtermination Ă  acquĂŠrir ces avions est telle que ses dĂŠmarches ont attirĂŠ l'attention et sont devenues virales."
 internal_factions_events.50.a: "D'accord, financer le projet"
 internal_factions_events.50.b: "Nous le financerons, mais ce sera une propriĂŠtĂŠ gouvernementale"
 internal_factions_events.51.t: "Un drame familial devient viral"
 internal_factions_events.51.d: "RĂŠcemment, une dispute entre deux princes royaux est devenue virale sur Internet. Ce dĂŠbat acharnĂŠ, qualifiĂŠ d''embarrassant', a placĂŠ notre maison sous le feu des projecteurs des mĂŠdias internationaux."
 internal_factions_events.51.a: "Publier une dĂŠclaration soutenant les princes"
 internal_factions_events.51.b: "Condamner les princes"
 internal_factions_events.52.t: "Un prince royal fait dĂŠfection et dĂŠnonce le gouvernement depuis l'ĂŠtranger"
 internal_factions_events.52.d: "Plus tĂ´t cette semaine, un prince royal a quittĂŠ le pays pour l'ĂŠtranger. On pensait qu'il partait en vacances, mais il a rapidement commencĂŠ Ă  apparaĂŽtre Ă  la tĂŠlĂŠvision ĂŠtrangĂ¨re pour dĂŠnoncer le gouvernement. Ses dĂŠclarations ont mis le gouvernement sous les projecteurs et menacent la rĂŠputation de la famille royale."
 internal_factions_events.52.a: "Tenter de dissimuler les dĂŠgĂ˘ts"
 internal_factions_events.52.b: "DĂŠnoncer publiquement et condamner les vacances de la famille royale"
