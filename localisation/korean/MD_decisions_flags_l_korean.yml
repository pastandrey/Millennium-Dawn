l_korean:
 different_country_flags_category: "국기 변경"
 different_country_flags_category_desc: "우리는 현 집권당을 더 잘 나타낼 수 있도록 국기를 바꿀 수 있습니다. 현 집권당은 [Root.GetRulingParty]입니다. 필수 사항은 아니지만, 그런 것을 좋아하시는 분들을 위해 추가해 두면 좋습니다."
 Reset_flag: "국기 리셋"
 Reset_flag_desc: "이 결정을 통해 우리는 국기를 원래의 국기로 되돌릴 수 있습니다. 과거 국기 변경을 원했던 집권당은 더 이상 집권당에 없습니다."
 Autocracy_flag: "독재 정권의 깃발로 깃발을 변경하세요"
 Autocracy_flag_desc: "이번 결정으로 우리는 국기를 독재 정권의 국기로 바꿀 수 있습니다. 이는 현재 집권당의 국기가 될 것입니다."
 Special_flag: "깃발을 특수 깃발로 변경"
 Special_flag_desc: "이번 결정으로 우리는 국기를 특별한 국기로 바꿀 수 있습니다. 이 국기는 현재 집권당의 국기가 될 것입니다."
 More_Special_flag: "더욱 특별한 깃발로 변경하기"
 More_Special_flag_desc: "이번 결정을 통해 우리는 더욱 특별한 국기로 국기를 바꿀 수 있습니다. 이 국기는 현재 집권당의 국기가 될 것입니다."
 add_dynamic_flag: "당신은 이를 볼 수 없어야 합니다. [?original_tag.GetTag] 추가"
 add_dynamic_flag_desc: "국가 좀 그만 바꿔 이 사기꾼아"
 Rebel_flag: "깃발을 반란군 깃발로 변경하세요"
 Rebel_flag_desc: "이번 결정으로 우리는 반군 깃발로 국기를 바꿀 수 있습니다. 이 깃발은 현재 집권당의 깃발이 될 것입니다."
 Special_Rebel_flag: "Change Flag to a Special Rebel Flag"
 Special_Rebel_flag_desc: "We can choose to change our flag to a special rebel flag with this decision. This will be the flag of the ruling party that is currently in power."
 SER_flag_change: "세르비아로 국명 변경하기"
 SER_flag_change_desc: "몬테네그로를 잃음으로써 우리는 국가의 이름을 세르비아로 변경해야 합니다."
 USA_Reset_flag: "국기 변경"
 USA_Reset_flag_desc: "우린 국기를 변경할 수 있습니다."
 MAU_NEW_flag: "Change the Mauritanian Flag"
 MAU_NEW_flag_desc: "모두 똑같으나 다만 빨간 줄이 들어갑니다."
 IRQ_NEW_flag: "Change the Iraqi Flag"
 IRQ_NEW_flag_desc: "우린 바트주의 사상과 거리를 두기 위해 국기를 새로 만들어야 합니다."
 DRC_NEW_flag: "Change the Congolese Flag"
 DRC_NEW_flag_desc: "하늘색이 더 어울릴 것 같다."
 RWA_NEW_flag: "Change the Rwandan Flag"
 RWA_NEW_flag_desc: "우리 국기는 1994년 대량학살의 잔인함과 연관돼 왔습니다. 국기를 변경하는 것이 가장 좋을 것입니다."
 coalition_party_negotiations: "연립을 위해 정당과 협상 중"
 dynamic_flag: "[ROOT.GetNameWithFlag] Can Change Flag Dynamically"
 GER_monarchist_flag: "국기 변경"
 GER_monarchist_flag_desc: "우리는 황제의 업적을 기리고 제국의 깃발을 높이 들어 올려야 합니다!"