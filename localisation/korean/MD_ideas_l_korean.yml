 CIS_member_state_idea: "CIS Member"
 CIS_member_state_idea_desc: "The Commonwealth of Independent States (CIS) is a regional intergovernmental organization in Eurasia. It was formed following the dissolution of the Soviet Union in 1991, and is its legal successor. It covers an area of 20,368,759 km2 and has an estimated population of 246,200,194. The CIS encourages cooperation in economic, political, and military affairs and has certain powers relating to the coordination of trade, finance, lawmaking, and security, including cross-border crime prevention."
