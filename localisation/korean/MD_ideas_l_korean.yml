 critical_level_of_aids_desc: "20%에서 25% 가량의 국민들이 에이즈와 접촉하였습니다. 치명적인 질병으로써, 이를 겪는 이들에게는 삶에 심각한 악영향을 줄 수 있으며, 결과적으로 평소와 같은 생활을 하기 매우 어려워질 것입니다. 에이즈에 대응하는 것은 매우 더딘 과정이며, 유일한 해결 방법은 지속적으로 높은 수준의 의료 복지를 제공하며 투병 환자들을 줄이고 질병에 대해 교육함으로써 에이즈로 인한 진통을 줄여나가는 방법 밖에 없습니다.\n\n[HIV_healthcare_tooltip]"
 critical_level_of_aids_tt: "의료 비용: §R+25%§!"
