 MNC_city_of_casino: "The Casino City for the Rich"
 MNC_city_of_casino_desc: "Monaco is lovingly known in Europe as the \"Casino City\" due to the numerous casinos. In particular, the casinos in Monaco cater to the rich in tandem with the city being a playground for billionaires and the rich."
 naval_power_of_the_continent: "Naval Power of the Continent"
 naval_power_of_the_continent_desc: "We possess the largest naval power of our continent and we currently represent the largest naval power on our continent. Someone can overtake us assuming their §YDeployed Naval Manpower§! is larger than ours."
 international_sanctions_tt: "§RCan't access §YWeapon Market§!§!"
 OAU_member: "Organization of African Unity Member"
 OAU_member_desc: "The Organization of African Unity (OAU) was founded in 1963 by then independent African nations. The goal of the organization was to encourage political and economic integration of Africa, and to fight against colonialism and neo-colonialism. However, the organization has mainly stayed as a 'talking shop' as no common military, judicial or political departments have been established between the states. In 1999, under the lead of Libyan leader Muammar Gaddafi, the OAU members signed the Sirte declaration, with the intention of replacing the OAU with the African Union latest by 2002 to finally create an organization that is capable of uniting the African continet."
 SHA_libyan_education: "Libyan Education"
 SHA_libyan_education_desc: "Libya has been an ardent supporter of Sahrawi independence since the 1980s. One of the key ways Libya supports the POLISARIO Front is by providing education to many young Sahrawis. This allows our people access to education the Moroccans deny of us."
 idea_overlord_subsidies: "Overlord Subsidies"
 idea_overlord_subsidies_desc: "The subsidies our overlord are providing us for our economic benefit are causing us to slowly lose our autonomy as we become slowly more reliant on them for our economy."
 SUD_humiliated_army: "Humiliated Army"
 SUD_humiliated_army_desc: "다르푸르 반란군의 최근 알파시르 습격은 수단 군대에게 군사적으로나 심리적으로 큰 타격을 입혔습니다. 비교적 작은 규모의 반란군이 여러 대의 항공기를 파괴하고, 다수의 군인을 살해했으며, 공군 기지의 지휘관이었던 대장을 포로로 잡았습니다. 군대가 이로부터 회복하려면 시간이 걸릴 것입니다."
