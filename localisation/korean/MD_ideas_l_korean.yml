l_korean:
 international_sanctions: "국제 제제"
 international_sanctions_desc: "우리는 국제 사회의 경제적 제제 대상이 되었습니다."
 p5_member: "유엔 안전 보장 이사회 상임이사국"
 p5_member_desc: "퍼머넌트 파이브, 빅 파이브, P5로도 알려진 유엔 안전 보장 이사회 상임 이사국은 다음의 다섯 국가를 뜻합니다: 중국 프랑스, 러시아, 영국, 미국. 이 국가들은 제2차 세계대전의 승전국으로 알려진 5개국입니다. 각 상임 이사국은 거부권을 행사할 수 있으며, 이는 이 다섯 국가들이 국제 사회의 지지와는 상관 없이 \"실질적으로\" 유엔 결의안 채택을 막을 수 있게 합니다."
 g7_member: "G7의 일원"
 g7_member_desc: "G7은 캐나다, 프랑스, 독일, 이탈리아, 일본, 영국, 미국이 포함된 그룹입니다. 이 국가들은 전세계 부의 많은 비율을 차지하고 있으며, 매우 높은 인간 개발 지수를 가지고 있습니다."
 idea_GUAM_member_state: "GUAM 회원국"
 idea_GUAM_member_state_desc: "'괌' 또는 '괌 민주주의 경제 개발 기구'는 조지아(G), 우크라이나(U), 아제르바이잔(A), 몰도바(M)의 앞글자를 따 1997년 설립된 기구입니다. 2001년 제정된 이 기구의 헌장은 민주주의 가치 증진, 안정적인 개발, 국내외 안보 강화, 유럽 통합 추진을 목표로 협력을 증진한다합니다. 이 헌장은 러시아의 영향력에 저항하려는 것 아니냐는 의문이 있었지만, GUAM의 지도자들은 이를 부인했습니다."
 idea_GUAM_member_state_2: "GUAM 회원국"
 idea_GUAM_member_state_2_desc: "'괌' 또는 '괌 민주주의 경제 개발 기구'는 조지아(G), 우크라이나(U), 아제르바이잔(A), 몰도바(M)의 앞글자를 따 1997년 설립된 기구입니다. 2001년 제정된 이 기구의 헌장은 민주주의 가치 증진, 안정적인 개발, 국내외 안보 강화, 유럽 통합 추진을 목표로 협력을 증진한다합니다. 이 헌장은 러시아의 영향력에 저항하려는 것 아니냐는 의문이 있었지만, GUAM의 지도자들은 이를 부인했습니다."
 ecowas_member_state: "서아프리카 국가 경제 공동체 (ECOWAS)"
 ecowas_member_state_desc: "서아프리카 국가 경제 공동체(ECOWAS)는 서아프리카에 위치한 15개국의 정치적, 경제적 연합입니다. 1975년 5월, 경제 무역 연합으로 결성되었으며, 서아프리카 무역권을 형성함으로 '집단적 자급자족'을 이룩하겠다는 목적으로 설립되었습니다. 또한, ECOWAS는 지역 평화 유지와 회원국의 정치적 불안정에 연합군을 결성하여 파견하기도 합니다."
 reform_international_institutions_idea: "국제기구 재편 지원"
 reform_international_institutions_idea_desc: "이 나라는 세계가 변했기 때문에, 유엔 안전 보장 이사회를 비롯한 국제 기구들도 변해야 한다고 생각합니다."
 putin_diplomacy: "현실정치"
 putin_diplomacy_desc: "현실정치학은 정치나 외교가 명백한 이념적 관념, 도덕, 윤리적 전제보다는 주어진 상황과 요소의 고려를 우선하여야 한다는 것입니다. 이 관점은 현실주의, 실용주의와 철학적인 접근법에 공통점이 있습니다. 간혹 이는 정치적 실용주의로 간단히 설명되기도 합니다. 현실정치학이라는 단어는 때때로 고압적이고 비도덕적이고 마키아밸리적인 정치를 경멸적으로 표현할 때 쓰이기도 합니다."
 combined_arms_idea: "제병협동"
 combined_arms_idea_desc: "제병협동의 개념은 궁극적인 군사적 목적을 달성하기 위해 다른 군 사이의 무기를 통합하여 운영하는 것입니다."
 eco_factories_projects_idea: "친환경 공장"
 eco_factories_projects_idea_desc: "우리 나라를 더욱 푸르게 하기위한 노력의 일환으로 친환경 공장의 개념을 도입하기 시작했습니다. 친환경 산업을 구축하여 환경을 개선시키는 것 외에도 좋은 방법은 무엇이 있을까요?"
 sunni: "수니파"
 sunni_desc: "수니파 이슬람은 이슬람의 가장 큰 교파입니다. 이 이름은 수나라는 단어에서 따왔으며, 수나는 이슬람 선지자 무함마드의 종교 도덕적 일화와 관련있습니다. 수니파와 시아파 무슬림의 다른점은 무함마드 후계자의 선택에서의 의견 차이로부터 시작 되었으며, 이후 정치적, 이론적, 사법적 영역으로 확대되었습니다."
 sufi_islam: "수피파"
 sufi_islam_desc: "수피파 이슬람은 종종 \"이슬람 신비주의\"로 정의됩니다. 이는 이슬람 극초기, 이슬람의 정치화 과정에서 형성되었습니다. 그들은 쿠란을 반복적으로 암송하며 노래하고 명상함으로써 수행자와 무함마드 사이가 연결 된다고 믿습니다 - 이를 엑스터시라 부릅니다. 무함마드를 통해 수피파 무슬림들은 알라와 연결되고 경험하고 이해하기를 목표합니다. 역사적으로 수피 이슬람 선교사들은 아프리카와 인도 아대륙에 이슬람을 전파하는데 주된 역할을 하였습니다."
 ibadi: "이바디파"
 ibadi_desc: "이바디파는 선지자 무함마드의 죽음 20년 후 이슬람에서 갈라져 나왔으며, 따라서 수니파와 시아파보다 먼저 창시되었습니다. 이 종교 운동은 시핀 전투에서 무함마드의 후계자 알리가 협상이 아닌 전장에서의 알라의 선택으로 정통성 있는 칼리프를 선출하기로 받아드려 그를 지도자로써 부적합하게 만들었다고 믿는 하와리지 분리파와 함께 발생하였습니다. 그러나 이 분파는 극단적인 하와지리파보다 훨씬 관용적으로 알려져 있으며 이바디즘은 수니파와 시아파 모두와 독특한 사상을 공유하고 있습니다."
 shia: "시아파"
 shia_desc: "시아파 (알리 신봉자) 는 이슬람 선지자 무함마드가 알리 이빈 아디 탈랍을 그의 후계자로 지명한 것을 믿는 교파입니다. 시아파 이슬람과 대표적으로 상반되는 교파인 수니파 이슬람은, 무함마드가 후계자를 지명하지 않았으며 아부 바카르(슈라를 통해 칼리프로 임명됨)가 정통성 있는 칼리프라 믿습니다."
 judaism: "유대교"
 judaism_desc: "§Y주의 사항:§! §W이슬람주의 중도파 정당을 금지할 수 있음.§!\n\n유대교는 고대의 아브라함계열 유일신 종교로써 구약 성서인 토라를 기반으로 하고있습니다. 이는 유대인의 종교, 철학, 문화를 총망라하고 있습니다. 유대주의는 종교적인 유대인들이 신이 이스라엘 자손들과 함께 국교화 되었음을 명시한 신앙 선서상 표현에 기반합니다."
 cheondo: "천도교"
 cheondo_desc: "§Y주의 사항:§! §W이슬람주의 중도파 정당을 금지할 수 있음.§!\n\n천국으로 가는 길이라는 천도교는 19세기 최재우와 교리를 집대성한 손병희의 동학 운동에 기반한 20세기 한국의 종교 운동입니다. 천도교는 1812년 조선 왕조 시기에 발생한 농민 운동에 기반하고 있습니다."
 shinto: "신토"
 shinto_desc: "§Y주의 사항:§! §W이슬람주의 중도파 정당을 금지할 수 있음.§!\n\n신토는 오늘날의 일본과 고대 일본을 연결하기위해 성실한 영적 수행에 초점을 맞춘 일본의 민족 종교입니다."
 buddism: "불교"
 buddism_desc: "§Y주의 사항:§! §W이슬람주의 중도파 정당을 금지할 수 있음.§!\n\n불교는 부처의 가르침에 기반한 믿음과 영적 수행을 포함하는 종교이자 계율입니다. 불교는 기원전 6세기에서 4세기경 고대 인도에서 발생하여, 아시아 대부분으로 전파되었고, 인도에서는 중세시대에 쇠퇴하였습니다."
 hindu: "힌두교"
 hindu_desc: "§Y주의 사항:§! §W이슬람주의 중도파 정당을 금지할 수 있음.§!\n\n힌두교는 인도 아대륙에서 흔한 종교 혹은 삶의 방식입니다. 힌두교는 세계에서 가장 오래된 종교로 불리우며, 몇몇 수행자들과 학자들은 \"영원한 전통\" 혹은 \"영생의 길\" 을 뜻하는 사나타나 다르마라고 부릅합니다."
 christian: "서방 기독교"
 christian_desc: "§YSpecial Rule:§! §WCan ban moderate islamist parties.§!\n\nWestern Christianity is an Abrahamic monotheistic religion based on the life and teachings of Jesus Christ, who serves as the focal point of the Western Christian faiths. It encompasses many sects of Christianity such as Protestantism, Catholicism, and Lutheranism which in total have over 2.4 billion followers, or 33% of the global population."
 orthodox_christian: "정교회"
 orthodox_christian_desc: "§Y주의 사항:§! §W이슬람주의 중도파 정당을 금지할 수 있음.§!\n\n동방 정교회, 공식적으론 정통 가톨릭 교회로도 알려진 정교회는 세계에서 두번째로 큰 기독교 교파이며 세계에서 가장 오래된 현존하는 종교단체 중 하나입니다. 동방 정교회는 예수 그리스도와 그 열두 제자가 세운 유일하고, 신성한, 가톨릭계의 사도 전승 교리를 가르칩니다. 진정한 기독교 신념을 가지기 위해 이해하여야 하는 것과 열두 제자로부터 전승되는 신성한 전통을 유지하기 위해 수행합니다."
 pluralist: "다원주의"
 pluralist_desc: "이름에서 알 수 있듯, 한 종교의 종교관이 유일하고 배타적인 진리가 아니며, 또한 다른 종교에서도 일부 진리와 진정한 가치가 존재한다는 것을 인정하는 세계관입니다."
 EU_member: "EU 회원국"
 EU_member_desc: "유럽 연합(EU)는 유럽 대륙에 위치한 국가들의 정치, 경제적 공동체입니다. 유럽 연합은 모든 회원국에게 적용되는 규격화된 법률 구조를 통해 단일 시장을 개발하였습니다. 유럽연합의 정책 목표는 내수시장에서 인적, 물적, 서비스 그리고 자본이 자유롭게 이동하며, 내부 문제에 공정하게 법안을 제정하고, 무역, 농업, 어업 그리고 지역 개발에 공통된 정책을 유지하는 것 입니다."
 sco_observer: "상하이 협력 기구 협력국"
 sco_observer_desc: "상하이 협력 기구(SCO)는 중국을 대표로 하여 중국, 카자흐스탄, 키르기스탄, 러시아, 타지기스탄, 우즈베키스탄의 대표자들이 2001년 6월 15일 중국 상하이에서 출범시킨 유라시아 정치, 경제, 안보 조직입니다. 협력국은 정 회원국 이전의 중간적 위치에 있는 단계입니다."
 neutral_outlook: "중립주의"
 neutral_outlook_desc: ""
 fifty_fifty_divide: "50 대 50"
 fifty_fifty_divide_desc: "이 나라는 종교적으로 50 대 50으로 분열되어 있습니다."
 ENG_idea_expanded_nhs: "국민 보건 서비스 확장"
 ENG_idea_expanded_nhs_desc: ""
 ENG_idea_privatized_nhs: "국민 보건 서비스 민영화"
 ENG_idea_privatized_nhs_desc: ""
 al_qaeda_network: "알-카에다 네트워크"
 al_qaeda_network_desc: "알-카에다 국제 네트워크의 일환으로, 우리의 우방을 돕기 위해 전사들을 보내기 더욱 쉽습니다."
 great_power: "초강대국"
 great_power_desc: "We are a Great Power in the world, with a globally recognized ability to exert our influence on a global scale, being only superseded in this regard by the Superpowers.\n\nPower status is determined by how much GDP we contribute to the world total, modified by our §YIndependence from Foreign Influence§!. Our current contribution is §Y[?ROOT.percentage_of_global_factories|%1]§!.\n\nThe required contributions for the different levels are:\nMore than §Y15%§! for §Y$super_power$§!\nMore than §Y6.5%§! for §Y$great_power$§!\nMore than §Y2.5%§! for §Y$large_power$§!\nMore than §Y0.2%§! for §Y$minor_power$§!\nLess than §Y0.2%§! for §Y$non_power$§!\n\nIn every geographic region, a certain number of the strongest §Y$minor_power$s§! will be classified as §Y$regional_power$s§! if there aren't enough §Y$super_power$s§!, §Y$great_power$s§! and §Y$large_power$s§! in the region. The regions and numbers of countries above §Y$minor_power$§! are:\nEurope (7)\nMiddle East and North Africa (3)\nSub-Saharan Africa (3)\nAsia (7)\nAmericas (4)\n\nPower Ranking is updated bi-annually (May & November)."
 large_power: "강대국"
 large_power_desc: "As a Major Power, we are not quite at the status of Great Powers or a Superpower, but we still wield a outsized influence on global and regional affairs, and can with ease protect our sovereignty and vital interests from larger powers.\n\nPower status is determined by how much GDP we contribute to the world total, modified by our §YIndependence from Foreign Influence§!. Our current contribution is §Y[?ROOT.percentage_of_global_factories|%1]§!.\n\nThe required contributions for the different levels are:\nMore than §Y15%§! for §Y$super_power$§!\nMore than §Y6.5%§! for §Y$great_power$§!\nMore than §Y2.5%§! for §Y$large_power$§!\nMore than §Y0.2%§! for §Y$minor_power$§!\nLess than §Y0.2%§! for §Y$non_power$§!\n\nIn every geographic region, a certain number of the strongest §Y$minor_power$s§! will be classified as §Y$regional_power$s§! if there aren't enough §Y$super_power$s§!, §Y$great_power$s§! and §Y$large_power$s§! in the region. The regions and numbers of countries above §Y$minor_power$§! are:\nEurope (7)\nMiddle East and North Africa (3)\nSub-Saharan Africa (3)\nAsia (7)\nAmericas (4).\n\nPower Ranking is updated bi-annually (May & November)."
 regional_power: "지역 강국"
 regional_power_desc: "As a Regional Power, we wield a outsized influence on regional affairs, and maintain the ability to protect our sovereignty and vital interests at home against the interference from larger powers.\n\nPower status is determined by how much GDP we contribute to the world total, modified by our §YIndependence from Foreign Influence§!. Our current contribution is §Y[?ROOT.percentage_of_global_factories|%1]§!.\n\nThe required contributions for the different levels are:\nMore than §Y15%§! for §Y$super_power$§!\nMore than §Y6.5%§! for §Y$great_power$§!\nMore than §Y2.5%§! for §Y$large_power$§!\nMore than §Y0.2%§! for §Y$minor_power$§!\nLess than §Y0.2%§! for §Y$non_power$§!\n\nIn every geographic region, a certain number of the strongest §Y$minor_power$s§! will be classified as §Y$regional_power$s§! if there aren't enough §Y$super_power$s§!, §Y$great_power$s§! and §Y$large_power$s§! in the region. The regions and numbers of countries above §Y$minor_power$§! are:\nEurope (7)\nMiddle East and North Africa (3)\nSub-Saharan Africa (3)\nAsia (7)\nAmericas (4).\n\nPower Ranking is updated bi-annually (May & November)."
 minor_power: "약소국"
 minor_power_desc: "As a Minor Power, we are neither here nor there in international diplomacy. We have a limited ability to withstand foreign pressure and influence if we make it a top priority, but suffer from very limited abilities to project influence abroad.\n\nPower status is determined by how much GDP we contribute to the world total, modified by our §YIndependence from Foreign Influence§!. Our current contribution is §Y[?ROOT.percentage_of_global_factories|%1]§!.\n\nThe required contributions for the different levels are:\nMore than §Y15%§! for §Y$super_power$§!\nMore than §Y6.5%§! for §Y$great_power$§!\nMore than §Y2.5%§! for §Y$large_power$§!\nMore than §Y0.2%§! for §Y$minor_power$§!\nLess than §Y0.2%§! for §Y$non_power$§!\n\nIn every geographic region, a certain number of the strongest §Y$minor_power$s§! will be classified as §Y$regional_power$s§! if there aren't enough §Y$super_power$s§!, §Y$great_power$s§! and §Y$large_power$s§! in the region. The regions and numbers of countries above §Y$minor_power$§! are:\nEurope (7)\nMiddle East and North Africa (3)\nSub-Saharan Africa (3)\nAsia (7)\nAmericas (4).\n\nPower Ranking is updated bi-annually (May & November)."
 non_power: "무권력국"
 non_power_desc: "As a Non-Power, we are essentially a non-factor in international diplomacy, with few, if any, caring about our position on anything. We are tools to more dominant and influential sovereign nations, whom with ease can influence our politics and society.\n\nPower status is determined by how much GDP we contribute to the world total, modified by our §YIndependence from Foreign Influence§!. Our current contribution is §Y[?ROOT.percentage_of_global_factories|%1]§!.\n\nThe required contributions for the different levels are:\nMore than §Y15%§! for §Y$super_power$§!\nMore than §Y6.5%§! for §Y$great_power$§!\nMore than §Y2.5%§! for §Y$large_power$§!\nMore than §Y0.2%§! for §Y$minor_power$§!\nLess than §Y0.2%§! for §Y$non_power$§!\n\nIn every geographic region, a certain number of the strongest §Y$minor_power$s§! will be classified as §Y$regional_power$s§! if there aren't enough §Y$super_power$s§!, §Y$great_power$s§! and §Y$large_power$s§! in the region. The regions and numbers of countries above §Y$minor_power$§! are:\nEurope (7)\nMiddle East and North Africa (3)\nSub-Saharan Africa (3)\nAsia (7)\nAmericas (4).\n\nPower Ranking is updated bi-annually (May & November)."
 nf_mosque_funding: "모스크 재정지원"
 nf_mosque_funding_desc: "외국의 모스크에 재정을 지원함으로써 우리는 우리가 해석한 이슬람이 다른 나라로 확산될 것을 확신합니다."
 nf_islamist_media: "이슬람주의 미디어"
 nf_islamist_media_desc: "국영 이슬람계 미디어는 우리 국민이 무엇을 믿어야 하는지 어떻게 가짜 뉴스를 피해야 하는지 알려줍니다."
 nf_salafist_funding: "살라피스트 자금 지원"
 nf_salafist_funding_desc: "우리는 전세계의 다양한 지하드(성전) 조직들을 지원하여 우리의 교리를 전파하는 정책을 취하고 있습니다."
 child_soldiers: "소년병"
 child_soldiers_desc: "소년병들이 군대에 징집되었습니다. 많은 비대칭 분쟁에서 강제로 반군 조직에 징집되었고 폭력에 둔감하게 되었습니다. 이 아동들은 트라우마로 가득차고, 더욱 맹렬한 폭력, 술 그리고 마약을 쫓는 우울한 운명이 기다리고 있습니다.\n\n아이들을 강제 징집하는 것은 우리 군대를 강화할 것이나 때때로 어린 소년들은 고기방패보다 못할수도 있습니다."
 mischevous_failure: "위법과 직권남용"
 mischevous_failure_desc: "우리가 위법과 직권 남용을 저지름으로써 우리가 현재 불안정하고 부패한 만큼 국가는 큰 위기에 빠져있습니다."
 operatives1: "정보원 1 추가"
 operatives5: "정보원 5 추가"
 operatives10: "정보원 10 추가"
 al_jazeera: "알-자지라 본사"
 al_jazeera_desc: "아랍 세계에서 가장 크고 가장 영향력있는 뉴스 네트워크인 알 자지라는 전 세계에 펼쳐진 카타르계 소프트파워의 정수입니다. 카타르가 1995년 하마드 빈 칼리파 알 타니 집권 이후 추진해 온 자주적 대외정책과 동의어이기도 합니다."
 al_jazeera_allowed: "알-자지라"
 al_jazeera_allowed_desc: "아랍 세계에서 가장 크고 가장 영향력있는 뉴스 네트워크인 알 자지라는 전 세계에 펼쳐진 카타르계 소프트파워의 정수입니다."
 al_jazeera_banned: "알-자지라 금지"
 al_jazeera_banned_desc: "인기있는 뉴스 채널인 알 자지라는 위험한 사상과 무슬림 형제단을 광고하여 불법화 되었습니다. 하지만 위성 방송을 이용하여 사람들이 시청하는 것을 막는것은 불가능합니다."
 muslim_brotherhood_crackdown: "무슬림 형제단 단속"
 muslim_brotherhood_crackdown_desc: "무슬림 형제단은 불법이며 기회가 있을 때마다 단속을 시행합니다."
 muslim_brotherhood_home: "무슬림 형제단의 고향"
 muslim_brotherhood_home_desc: "이집트는 무슬림 형제단이라 불리는 매우 인기있고 정치적으로 영향력 있는 수니파 운동의 본고장입니다."
 rentier_state: "불로소득 국가"
 rentier_state_desc: "이 나라는 천연 자원이 풍부하여 국민에게 세금을 부과할 필요가 거의 없거나 전혀 없습니다. 시민들은 세금을 내지 않고 혜택을 받으며, 좋은 정부 운영이나 정치적 권리를 요구할 유인이 적습니다. 그 결과, 권위주의적이고 부패한 정부와 자원 기반의 부패적 자본주의가 형성되며, 비자원 분야의 기업 환경은 좋지 않습니다.\n\n§R이 아이디어는 §Y자원 추출§!이 총 GDP의 20% 미만을 차지하고, §Y자원 수출§! 수입이 인구와 기업 세금을 합친 것의 30% 미만이며, 전쟁 중이지 않으면 제거됩니다.§!"
 youth_radicalization: "청소년 급진화"
 youth_radicalization_desc: "많은 청소년들이 이슬람 급진주의에 휘둘려왔으며 국가는 알-카에다와 같은 조직의 훌륭한 인력 모집원입니다."
 saudi_aid: "모스크와 마드라사를 위한 사우디의 지원"
 saudi_aid_desc: "사우디 아라비아는 은혜롭게도 우리를 재정적으로 도와주며, 특히 우리의 모스크와 종교 교육 기관인 마드라사를 후원합니다. 여기서 이슬람 원리주의인 살라피즘이 가르쳐지고 전파됩니다."
 cybercaliphate: "사이버 칼리프"
 cybercaliphate_desc: "친 이슬람국가 해커와 디지털 선동가들이 그들의 사상을 온라인에 전파시키고 주요 웹사이트를 향한 디도스 공격과 같은 사이버전을 수행합니다."
 katib_hezbollah: "카타이브 헤즈볼라"
 katib_hezbollah_desc: "이란의 도움으로 레바논의 일개 민병대에서 벗어난 헤즈볼라는 중동 전역으로 확장하였으며 이란을 대신해 싸우고 있습니다. 카타이프 헤즈볼라는 매우 크고 잘 훈련된 이라크의 시아파 민병대입니다."
 syrian_hezbollah: "시리아계 헤즈볼라"
 syrian_hezbollah_desc: "시리아계 헤즈볼라는 이란계 벨라얏-파디크 노선을 추종하는 몇몇의 시리아계 시아파 민병대로 구성되어 있습니다. 이란에서 자금 지원을 받으며 레바논계 헤즈볼라로부터 훈련을 받습니다."
 qatar_expat: "카타르의 인구통계"
 qatar_expat_desc: "카타르 인구의 12%만이 카타르 시민이며 나머지는 외국인 노동자로 구성되어 있습니다. 외국인들은 이 나라의 거의 모든 일을 처리하고 있으며 거의 대부분의 카타르 시민들은 정부에서 일합니다. 이러한 외국인 노동자들의 삶의 질은 착취적이고 학대적이어서 우리의 그들에 대한 처우는 최근 매우 거세게 비판 받고 있습니다."
 saudi_expat: "사우디의 인구통계"
 saudi_expat_desc: "사우디 인구의 70%만이 사우디 시민이며 나머지는 외국인 노동자로 구성되어 있습니다. 대부분의 성인 사우디 국민은 정부에서 일하며 거의 모든 산업, 서비스 직종은 외국인들이 담당하고 있습니다. 이러한 외국인 노동자들의 삶의 질은 착취적이고 학대적이어서 우리의 그들에 대한 처우는 최근 매우 거세게 비판 받고 있습니다."
 omani_expat: "오만의 인구통계"
 omani_expat_desc: "오만 인구의 64%만이 오만 시민이며 나머지는 외국인 노동자로 구성되어 있습니다. 대부분의 성인 오만 국민은 정부에서 일하며 거의 모든 산업, 서비스 직종은 외국인들이 담당하고 있습니다. 이러한 외국인 노동자들의 삶의 질은 착취적이고 학대적이어서 우리의 그들에 대한 처우는 최근 매우 거세게 비판 받고 있습니다."
 uae_expat: "아랍 에미레이트의 인구통계"
 uae_expat_desc: "아랍 에미레이트 연방 인구의 11%만이 아랍 에미레이트 시민이며 나머지는 외국인 노동자로 구성되어 있습니다. 대부분의 성인 아랍 에미레이트 국민은 정부에서 일하며 거의 모든 산업, 서비스 직종은 외국인들이 담당하고 있습니다. 이러한 외국인 노동자들의 삶의 질은 착취적이고 학대적이어서 우리의 그들에 대한 처우는 최근 매우 거세게 비판 받고 있습니다."
 kuwait_expat: "쿠웨이트의 인구통계"
 kuwait_expat_desc: "쿠웨이트 인구의 29%만이 쿠웨이트 시민이며 나머지는 외국인 노동자로 구성되어 있습니다. 대부분의 성인 쿠웨이트 국민은 정부에서 일하며 거의 모든 산업, 서비스 직종은 외국인들이 담당하고 있습니다. 이러한 외국인 노동자들의 삶의 질은 착취적이고 학대적이어서 우리의 그들에 대한 처우는 최근 매우 거세게 비판 받고 있습니다."
 bahraini_expat: "바레인의 인구통계"
 bahraini_expat_desc: "바레인 인구의 절반만이 바레인 시민이며 나머지는 외국인 노동자로 구성되어 있습니다. 대부분의 성인 바레인 국민은 정부에서 일하며 거의 모든 산업, 서비스 직종은 외국인들이 담당하고 있습니다. 이러한 외국인 노동자들의 삶의 질은 착취적이고 학대적이어서 우리의 그들에 대한 처우는 최근 매우 거세게 비판 받고 있습니다."
 iranian_aid: "이란의 원조"
 iranian_aid_desc: "이란이 군사적, 경제적 지원을 제공합니다. 이는 우리가 정부와 군대를 운용하는 비용을 낮춰주지만, 이란 또한 우리 정치에 영향력을 행사하기 위해 이 지원을 이용합니다.\n\n§R이 국민정신은 1인당 국민총생산이 $17k 보다 높을 경우 제거될 것입니다§!"
 LoAS_member: "아랍 연맹 회원국"
 LoAS_member_desc: "아랍 연맹(공식적으로는 아랍 국가 연맹)은 아랍 국가들의 지역 협의회입니다. 조직의 목적은 회원국 간의 관계를 더욱 긴밀하게 하고 이들 간의 협력을 조정하는 것입니다."
 restoring_hope: "희망 회복 작전"
 restoring_hope_desc: "희망 회복 작전은 사우디 아라비아가 주도하여 예멘군을 지원함과 동시에 정치적 해법을 제시해 예멘에 평화를 정착 시키는 작전입니다."
 idea_focus_industrial_development_program: "산업 증진 프로그램"
 idea_focus_industrial_development_program_desc: ""
 multi_ethnic_state_idea: "다민족 국가"
 multi_ethnic_state_idea_desc: "\"다양성 속의 결속\"이라는 말이 있습니다 - 하지만 소수 민족은 더 많은 자치권이나 독립을 요구하고자 하는 경향성을 보여줍니다."
 one_child_policy: "한 자녀 정책"
 one_child_policy_desc: "중국의 인구 증가를 억제하기 위한 방안으로 고안된 한 자녀 정책은 중국 정부가 인구 규모를 통제하기 위해 추진한 논란의 여지가 많고 야심찬 정책입니다. 이 정책이 인구 증가를 얼마나 억제했는지에 대해서는 정확한 수치가 논란의 여지가 있지만, 중국 사회에 미친 상당한 영향은 부인할 수 없습니다."
 factional_politics_balanced: "균형적인 파벌 정치"
 factional_politics_balanced_desc: "중국의 농촌 지역 출신 포퓰리스트와 도시화된 개발 지역 출신 엘리트 간의 권력 투쟁은 사그라들었고, 양측 모두 타협이 중국의 미래를 확보하는 최선의 길이라는 데 동의하고 있다."
 factional_politics_populist: "신흥 세력의 지배적 파벌"
 factional_politics_populist_desc: "공산주의 청년 연맹과 같은 포퓰리즘 정책 지지자들은 현재 중국의 국가정책을 좌우합니다. 기득권에 대한 이들의 도전은 농촌의 빈곤층에게 이익을 가져다 주었지만, 경제 성장에는 도움이 되지않습니다."
 factional_politics_elitist: "상하이파의 지배적 파벌"
 factional_politics_elitist_desc: "친 기업, 친 개발 주의자들의 파벌이 중국 정치에서 권력을 잡고 있습니다. 이는 성장과 발전에 도움이 되지만, 농촌의 가난한 자들과 부패와의 싸움에서는 좋지않을 것입니다."
 three_represents: "삼개대표사상"
 three_represents_desc: "장쩌민이 제시한 '삼대칭론'은 공산당이 대표해야 할 대상에 대한 이론입니다. 이 이론은 공산당이 선진 사회 생산력, 선진 문화, 그리고 다수의 이익을 대표해야 한다고 주장합니다. 이 이론의 함의는 중국 공산당이 성장하는 재벌 계층을 더욱 수용하게 만들었고, 이로 인해 마르크스주의와 마오쩌둥 사상에서 벗어났다는 비판을 받기도 했습니다."
 scientific_outlook_on_development: "개발에 대한 과학적 전망"
 scientific_outlook_on_development_desc: "여러 면에서 후진타오는 장쩌민의 '세 가지 대표'가 지향하는 성장 중심적 관점에 반발하여 '과학적 발전관'을 내세웠으며, 이는 환경 오염과 사회경제적 불평등을 최소화하는 지속 가능한 성장에 초점을 맞춘 후진타오 정부의 이론적 기반이다."
 zeng_qinghong_thought: "쩡칭훙 사상"
 zeng_qinghong_thought_desc: "장쩌민의 '삼대칭'을 기반으로 쩡칭훙은 중국 공산당의 새로운 이념적 토대를 구축했는데, 이는 당이 중국 인민 대다수를 대표해야 할 의무를 강조하는 것이다. 쩡칭훙의 사상은 인민에게 더욱 대표성과 정당성을 갖춘 당으로 인식될 수 있도록 책임감 있고 투명한 당을 요구한다. 이 이론의 핵심은 '인민의 눈'이라는 개념으로, 당 간부들은 인민의 눈 아래에서만 국가의 이익을 극대화할 수 있다는 것이다."
 xi_jinping_thought: "시진핑 사상"
 xi_jinping_thought_desc: "시진핑은 중국 공산당과 중국이 나아가야할 방향성과 수많은 목표를 수립하여 공산당 이념의 발전에 공헌 했습니다. 이 이론이 다른 이론들과 다르게 특별취급을 받는 것은 이데올로기에 대한 신념과 충성심이 강한 관계성을 갖고 있다고 하기 때문이다. 당에 대한 충성심, 국가에 대한 충성심, 떠힌 시진핑 본인에 대한 충성심 역시.."
 chongqing_model: "충칭 모델"
 chongqing_model_desc: "보시라이는 충칭 모델로 공산당 이념의 발전에 기여했습니다. 이 모델은 '암흑가 공격'과 '공산당 노래' 등과 같은 범죄 조직 소탕과 공산주의 찬양을 포함한 광범위한 사회, 경제적 정책입니다. 이 모델은 공평한 분배와 국영기업을 강조하는 중국의 시장자유화 정책에서 약간 벗어나 있습니다."
 nanjie_model: "난지 모델"
 nanjie_model_desc: "난지 모델은 여러면에서 보시라이의 원 이론을 닮았지만, 집산주의 체제를 고수하는 마오주의 거점인 난지 마을의 사례를 모델화 한 것입니다. 보시라이의 난지 모델은 중국이 난지 모델을 본받으며, 자본주의와 자유시장을 등지고 진정한 사회주의를 실현할 것을 주장하고 있습니다."
 open_nation: "정부 개혁"
 censored_nation: "억압적인 정부"
 closed_nation: "전체주의 정부"
 closed_nation_desc: "국가의 안정과 국가의 주권을 유지하기 위해 우리는 인터넷에 대한 접근을 완전히 제한하고 모든 형태의 미디어에 대한 직접적인 통제권을 행사하고 있습니다. 우리에 대한 반대는 용납할 수 없습니다."
 legacy_of_1949: "1949년의 유산"
 legacy_of_1949_desc: "1949년 중국의 국공내전이 끝나자 민족주의 정당인 국민당(GMD)과 그 지지자들은 타이완 섬으로 도망쳤습니다. 이 사건은 대만 이민자 배척운동과 지역주의가 결합되어 대다수의 대만 시민들이 본토와의 통일을 강력하게 거부하게 되는 계기가 되었습니다."
 legacy_of_1949_1: "1949년의 유산"
 legacy_of_1949_1_desc: "1949년 중국의 국공내전이 끝나자 민족주의 정당인 국민당(GMD)과 그 지지자들은 타이완 섬으로 도망쳤습니다. 이 사건은 대만 이민자 배척운동과 지역주의가 결합되어 대다수의 대만 시민들이 본토와의 통일을 강력하게 거부하게 되는 계기가 되었습니다."
 Lacks_International_Recognition_Taiwan: "국제 승인 부족"
 Lacks_International_Recognition_Taiwan_desc: "중국 인민의 합법적인 정부에 대부분의 국가가 중화인민공화국의 정통성만을 인정하기 때문에 주권 경쟁국인 대만의 대외정책 수행능력은 국제적인 지지의 부족으로 심각하게 제한되고 있습니다. 대만은 자국의 정통성을 인정하는 국가들을 유지하고자 노력하지만 이는 점점 약화되고 있습니다. 대만은 '국가가 아닌 국가'로써 두 가지 선택지가 그들 앞에 놓여있습니다. 중국 본토에 흡수 통합되거나, 중국에 정통성을 가진 '중화민국'이 아닌 '대만 공화국'으로써 인정받는 것입니다."
 china_travel_ban: "중국의 관광 제한"
 china_travel_ban_desc: "중국은 대만과의 외교적 분쟁의 일환으로 대만의 경제에 타격을 주기 위해 대만 여행을 제한하고 있습니다."
 legislative_yuan_occupied: "입법원 점거"
 legislative_yuan_occupied_desc: "'해바라기 학생 운동'의 회원들은 중국 본토와의 양안서비스부역협정(CSSTA)을 통과시키려는 시도에 항의한데 이어 대만 입법원을 점거하는 시위를 했습니다. 이 시위 운동은 협정의 내용뿐만 아니라 협정 자체를 정부가 너무 서두르고 있으며, 협상 간 투명성이 결여되어있는 것에 대해 우려를 제기하고 있습니다."
 joint_control_zones: "타이완 해협 공동 통제구역"
 joint_control_zones_desc: "공동 통제구역을 설정하는 것은 중국과 대만 양국이 타이완 해협을 보다 효과적으로 순찰하고 군사력을 효율적으로 이용할 수 있게 합니다."
 our_national_enemy: "우리의 역사적 적"
 our_national_enemy_desc: "일본으로부터 받은 상처는 아직도 치유되지 않았습니다. 중일전쟁 당시 중국 인민에게 가해진 범죄행위에 대해 완전히 인정하고 사과하지 않는한 앞으로도 중국 내의 공산주의자와 민족주의자의 적일 것입니다."
 island_blockade: "섬 봉쇄"
 CHI_war_preparations: "전쟁 준비"
 taiwanese_coup: "쿠데타 진행 중"
 taiwanese_coup_desc: "대만 정부와 군 내의 친 중국 인사들은 현재 정부를 장악하려고 시도 중 입니다."
 recently_acceded_to_wto: "최근 세계무역기구(WTO)에 가입함"
 recently_acceded_to_wto_desc: "WTO 회원국은 무역관련 다양한 혜택을 받고 있으며, 국가 경제에 상당한 활력을 불어넣습니다."
 CHI_foreign_investment: "해외 투자 장려"
 Socialist_Market_Economy: "사회주의 시장경제"
 Free_Market_Economy: "자유주의 시장경제"
 Planned_Economy: "계획 경제"
 factory_of_the_world: "세계의 공장"
 a_new_leap_forward: "새로운 '대약진'"
 water_shortages: "물 부족"
 CHI_solar_power: "태양광 발전 시장 주도"
 CHI_coal: "화석연료 발전 시장 주도"
 CHI_megacity_development: "대도시 개발"
 CHI_western_development: "서부 개발"
 CHI_mass_production: "차량 대량 생산"
 CHI_Hyundai_Partnership: "현대와 협력"
 CHI_Volkswagen_Partnership: "폭스바겐과 협력"
 CHI_Toyota_Partnership: "도요타와 협력"
 CHI_GM_Partnership: "제너럴 모터스와 협력"
 Public_Sector_Space_Program: "공공 주도 우주 계획"
 Private_Sector_Space_Program: "민간 주도 우주 계획"
 South_China_Sea_Dispute: "남중국해 분쟁"
 South_China_Sea_Dispute_desc: "남중국해에서 중국의 주장은 많은 동남아시아 국가들과 겹칩니다. 이는 중국과 베트남, 필리핀 그리고 말레이시아와 같은 국가 간의 마찰로 이어졌습니다. 난사군도와 파라셀 섬과 같은 섬의 전략적 위치와 이 지역의 석유의 존재로 인해 분쟁의 수위가 높습니다. 남중국해 문제는 중국과 주변 국가 간의 관계 개선을 크게 저해하고 있습니다."
 Sino_Indian_Tensions: "중국-인도 분쟁"
 Sino_Indian_Tensions_desc: "아시아에서 가장 떠오르는 경제 및 군사 강국인 인도와 중국은 자연스럽게 라이벌이 되었습니다. 국경 긴장의 역사와 중국의 파키스탄 지원은 두 국가 간에 더 큰 긴장감을 불러올 여지가 있습니다."
 Workers_Rights: "노동자의 권리"
 TV_Internet_Access: "TV 및 인터넷 접속"
 America_in_Decline: "쇠퇴하는 미국"
 America_in_Decline_desc: "한때 명실상부한 세계의 패권국이었던 미국은 새로운 초강대국인 중국에 비해 한물간듯 합니다. 미국은 이 변화한 세계질서를 수용하고 뒤로 물러나거나, 중국의 패권에 도전하여 미국 중심의 세계 질서를 다시 세워야 합니다. 후자는 좀 덜 수정주의자인 정치인을 지원하거나 무력으로 가능할 것입니다."
 Russia_on_the_Wane: "러시아의 쇄락"
 Russia_on_the_Wane_desc: "러시아는 초강대국의 지위를 잃는다는 것이 무엇을 의미하는지 잘 알고 있습니다. 냉전의 종식 후 몇 년 동안 새로운 러시아 연방은 이전의 영광을 되찾기 위해 노력해왔습니다. 최근까지 러시아는 이를 위해 중국의 지원을 받았으며, 양국의 전략적 동반자 관계는 미국의 패권을 약화시키는데 도움이 되었습니다. 그러나 중국의 패권을 위한 자금력 앞에서 러시아라는 슬라브 거인은 중앙아시아에서의 영향력이 약해지고 있습니다. 러시아는 이제 이류가 되었다는 것을 받아들이거나 중국의 비약적인 부흥을 막기위해 좀 덜 수정주의자인 정치인을 지원해야 할 것입니다."
 CHI_Peacekeepers: "평화유지 임무"
 CHI_Peacekeepers_desc: "우리 병력들은 아프리카 대륙의 유엔 평화유지 임무를 지원하기 위해 해외에 파병되었으며, 우리 군에 필요한 경험을 얻고 있으며 국제사회에서 신뢰할 수 있는 일원으로 인정받는데 기여하고 있습니다."
 SCO_development_assistance: "SCO의 개발 지원"
 SCO_development_assistance_desc: "우리는 상하이 협력 기구의 후원으로 많은 개발 지원을 받았습니다."
 SCO_development_assistance_2: "[CHI.GetAdjective]  개발 지원"
 SCO_development_assistance_2_desc: "우리는 상하이 협력기구의 후원 하에 중국으로부터 개발에 필요한 많은 지원을 받았습니다."
 SCO_joint_drill: "상하이 협력 기구 (SCO) 합동 훈련"
 One_Country_Two_Systems: "일국양제"
 One_Country_Two_Systems_desc: "홍콩과 마카오은 50년간 중국의 통치로부터 자치권을 인정받았습니다. 일국양제 모델은 언론의 자유와 집회의 자유와 같은 홍콩과 마카오의 소중한 정치적 자유를 보호해왔고 성장시킬 수 있는 방법이었습니다. 본토에 없는 이러한 권리는 홍콩 정치에서 '범 민주주의' 진영을 지지하는 중요한 원동력이며, 홍콩인들이 중국 본토와의 더 많은 통합에 많은 우려와 경계를 표하고 있습니다."
 Triads: "삼합회"
 Triads_desc: "공산주의자들이 중국의 권력을 장악했을 때, 수많은 삼합회 조직원들이 안전을 위해 영국에 조차되었던 홍콩으로 도망쳤습니다. 이후 수십 년간 '화승화(워씽우)', '신의안(선예온)', '14K' 등의 강력한 삼합회 조직으로 성장했으며 보호세 징수, 도박장 등의 불법활동들을 자행해왔습니다. 반 공산주의적 기조를 가졌음에도 삼합회는 본토와의 사업적 연계 때문에 중국의 이익을 지원하고 있습니다."
 Localist_Movement: "지역주의 운동"
 Localist_Movement_desc: "1997년 반환 이후 중국 본토인과 홍콩인들 간의 긴장은 일부 지역의 홍콩인들 사이에서 '선 홍콩'이라는 정서로 이어졌습니다. 이런 정서는 공산주의 중국의 정치체제를 불신하고, 홍콩 주민들이 본토의 중국 인민들과 문화적으로 구별되고 우수하다고 주장합니다. 2014년 우산운동 이후 '선 홍콩' 정서의 확산은 홍콩의 정치적 분열을 가속화하고 감정적이며 급진적으로 변화시켰습니다."
 Lacks_Universal_Suffrage: "보편적 참정권 결여"
 Lacks_Universal_Suffrage_desc: "기본법에서 홍콩의 최고 행정부와 입법 위원회가 보편적 참정권에 의해 선출되야함이 명기되어있으나, 홍콩에서 지지율이 높은 '범 민주당'이 정부를 홍콩 행정부를 장악할 경우 발생할 일에 대한 중국 정부의 우려로 인해 실시되고 있지 못합니다."
 Limited_Universal_Suffrage: "제한된 보편적 참정권"
 Limited_Universal_Suffrage_desc: "중국은 후보들이 사전조사를 받는 조건 하에, 홍콩의 최고 행정부를 보통 선거를 통해 선출될 수 있도록 허용하기로 했습니다. 이는 범민주당이나 지역주의 후보가 최고 행정부에 당선될 가능성을 줄이려는 시도로 보입니다."
 Universal_Suffrage: "보통 선거"
 Universal_Suffrage_desc: "마침내 중국은 홍콩이 중국 당국의 간섭없이 보통 선거를 통해 최고 행정부를 선출하는 것을 허용하기로 했습니다."
 Hong_Kong_Protests: "홍콩 시위"
 CHI_string_of_pearls: "'진주 목걸이' 전략"
 CHI_string_of_pearls_desc: "'진주 목걸이' 전략은 인도를 둘러싸는 해군 기지 네트워크로 이는 인도와의 무력 충돌에서 우리에게 상당한 이점을 줄 것입니다."
 KOR_joint_us_exercises: "독수리 훈련"
 KOR_joint_us_exercises_desc: "'독수리 훈련'은 대한민국과 미국의 군대가 매년 실시하는 연례 훈련입니다. 이 훈련은 북한의 침공에 대비하는 방어적 성격의 훈련이지만, 북한은 이를 한미의 공격의 연습으로 보고 있습니다."
 NKO_nuclear_tests: "핵실험"
 NKO_nuclear_tests_desc: "북한은 몇 년마다 핵무기 실험을 하고 있습니다. 이 실험은 북한과 밀접한 관계를 맺고 있는 중국 등의 국가들에게도 비난을 받고 있습니다. 북한은 핵무기 개발이 자국 방어를 위한 것이라고 주장하지만, 많은 전문가들은 북한의 지도자 [NKO.GetLeader]이(가) 미국이나 미국의 동맹국에 사용할 가능성에 우려를 표하고 있습니다."
 Non_State_Actor: "비정부 활동가"
 Non_State_Actor_desc: "반군단체에서 NGO에 이르기까지 많은 비정부 활동가들은 국제사회에서 중요한 역할을 하고있지만, 국가적인 활동이 아니기에 몇 몇 불이익을 받고 있습니다. 일부 비국가 활동가들은 '부당한 정부'를 전복시켜 기존 국가를 장악하거나, 새로운 정부를 만들어 국경선을 다시 그리길 열망하고 있습니다. 또다른 몇 몇은 국가 수립에는 야망이 없지만, 중앙정부의 권한이 미치지않는 곳에서 권력과 부를 축적하고 있습니다."
 Lacks_International_Recognition: "국가로의 열망"
 Lacks_International_Recognition_desc: "일부 주는 정상적인 국가라 불릴 요소들(관료제도, 군사력, 국기 등)을 모두 갖고 있습니다. 그러나, 그들은 국제적인 정통성이라는 인정없이는 결코 완전한 국가라 볼 수 없습니다. 이들은 국제사회에서 정통 국가로 인정받기 위해 주요국들과 대중의 지지를 얻는 것을 목표로 해외에서 많은 활동들을 벌이고 있습니다."
 ASEAN_Member: "ASEAN 회원국"
 ASEAN_Member_desc: "ASEAN(동남아시아 국가 연합)은 1967년 자카르타에 본부를 두고 설립된 경제협력기구 입니다. 설립 후, 냉전으로 인해 가입이 배제되었던 국가들이 가입하여 확대되었고, 중국의 영향력 증가와 서방으로부터 독립을 유지하기위해 노력해왔습니다. ASEAN은 다자주의, 국제법 준수, 평화적 분쟁해결, 비간섭, 자결주의라는 원칙에 전념하고 있습니다."
 finnish_neutrality: "핀란드 중립성"
 finnish_neutrality_desc: "핀란드는 서구 민주주의 국가들에 의해 어느 정도 보호를 받고 있지만 주로 러시아를 모욕하지 않기 위해 신중하게 중립을 유지해 왔습니다."
 Strategic_city_captured1: "전략 도시 점령"
 Strategic_city_captured1_desc: "우리는 전략적으로 매우 중요한 도시를 점령하였고 우리 군의 사기를 증폭시켰습니다!"
 western_country: "제 1 세계의 일부"
 medium_far_right_movement: "소규모의 극우 운동"
 large_far_right_movement: "큰 규모의 극우 운동"
 small_libertarian_movement: "소규모의 자유주의 운동"
 large_libertarian_movement: "큰 규모의 자유주의 운동"
 large_green_movement: "대규모 녹색 운동"
 ruling_party_western: "현재 집권당: 서방 관점"
 ruling_party_nationalist: "현재 집권당: 국가주의 관점"
 ruling_party_emerging: "현재 집권당: 신흥국 관점"
 ruling_party_non_alligned: "현재 집권당: 비동맹 관점"
 ruling_party_salafist: "현재 집권당: 살라피스트 관점"
 major_ruling_party_western: "현재 집권당: 서방 관점"
 major_ruling_party_nationalist: "현재 집권당: 국가주의 관점"
 major_ruling_party_emerging: "현재 집권당: 신흥국 관점"
