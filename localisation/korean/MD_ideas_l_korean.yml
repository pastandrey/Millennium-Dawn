 un_aid_cdf_member: "§BUN§! Capital Development Fund Member"
 un_aid_cdf_member_desc: ""
 unsc_arms_embargo: "UNSC Arms Embargo"
 unsc_arms_embargo_decs: "The §BUN§! §YSecurity Council§! has passed a resolution restricting the sale of arms and ammunition to this nation. They will be prohibited from using the international market until they end all of their offensive conflicts."
 un_vote_sway_assistance: "Development Assistance Agreement"
 un_vote_sway_assistance_desc: "Following an agreement that traded a vote in either the §BUN§! §YSecurity Council§! or §YGeneral Assembly§!, our nation is receiving development assistance from the nation that gave us the deal."
 un_vote_sway_cost: "Providing Development Assistance"
 un_vote_sway_cost_desc: "Following through on our end of an agreement struck as part of a vote on either the §BUN§! §YSecurity Council§! or §YGeneral Assembly§!, we are providing deveopment assistance to the nation that agreed to our terms."
 unga_resolution_poverty_reduction: "Resolution: Poverty Reduction"
 unga_resolution_poverty_reduction_desc: "The §BUN§! §YGeneral Assembly§! has passed a non-binding resolution committing member states to expanding social safety nets and reducing extreme poverty. Compliance requires increased consumer goods spending to fund welfare programs."
 unga_resolution_food_security: "Resolution: Food Security"
 unga_resolution_food_security_desc: "The §BUN§! §YGeneral Assembly§! has passed a non-binding resolution calling for investment in agricultural productivity and food distribution networks. Resources are being diverted from industrial output to support farming initiatives."
 unga_resolution_global_health: "Resolution: Global Health"
 unga_resolution_global_health_desc: "The §BUN§! §YGeneral Assembly§! has passed a non-binding resolution to expand healthcare access and pandemic preparedness. While improving public health stabilizes society, the medical supply demands increase consumer goods spending."
 unga_resolution_education_initiative: "Resolution: Education Initiative"
 unga_resolution_education_initiative_desc: "The §BUN§! §YGeneral Assembly§! has passed a non-binding resolution to invest in education systems, literacy, and scientific research. Workers are being redirected to education programs, slowing construction but accelerating research output."
 unga_resolution_clean_energy: "Resolution: Clean Energy Transition"
 unga_resolution_clean_energy_desc: "The §BUN§! §YGeneral Assembly§! has passed a non-binding resolution promoting the transition to renewable energy. Renewable infrastructure is incentivized while fossil fuel plant construction is penalized, reducing overall industrial capacity during the transition."
 unga_resolution_economic_growth: "Resolution: Economic Growth"
 unga_resolution_economic_growth_desc: "The §BUN§! §YGeneral Assembly§! has passed a non-binding resolution promoting sustainable economic growth and productive employment. Productivity and factory output increase, but labor protections raise consumer goods demand and regulatory overhead drains political power."
 unga_resolution_infrastructure: "Resolution: Infrastructure Development"
 unga_resolution_infrastructure_desc: "The §BUN§! §YGeneral Assembly§! has passed a non-binding resolution calling for investment in resilient civilian infrastructure. Civilian construction accelerates, but military factory construction slows as resources are redirected."
 unga_resolution_reduced_inequality: "Resolution: Reduced Inequality"
 unga_resolution_reduced_inequality_desc: "The §BUN§! §YGeneral Assembly§! has passed a non-binding resolution to reduce inequality within and among nations. Wealth redistribution programs stabilize society but require significant consumer goods spending and political capital to implement."
 unga_resolution_climate_action: "Resolution: Climate Action"
 unga_resolution_climate_action_desc: "The §BUN§! §YGeneral Assembly§! has passed a non-binding resolution on urgent action to combat climate change. Aggressive emissions targets severely penalize fossil fuel infrastructure and reduce factory output, though public goodwill provides modest stability gains."
 unga_resolution_peace_institutions: "Resolution: Peace & Strong Institutions"
 unga_resolution_peace_institutions_desc: "The §BUN§! §YGeneral Assembly§! has passed a non-binding resolution to strengthen rule of law, reduce corruption, and build accountable institutions. Governance improves and foreign interference is resisted, but peace commitments slow military production."
 unga_resolution_trade_partnerships: "Resolution: Trade Partnerships"
 unga_resolution_trade_partnerships_desc: "The §BUN§! §YGeneral Assembly§! has passed a non-binding resolution to strengthen global partnerships through trade cooperation and technology transfer. Trade terms improve, but compliance with international standards drains political power."
 unga_resolution_digital_development: "Resolution: Digital Development"
 unga_resolution_digital_development_desc: "The §BUN§! §YGeneral Assembly§! has passed a non-binding resolution to bridge the digital divide through internet infrastructure and technology investment. Digital and tech construction accelerates, but resources are diverted from physical infrastructure."
 non_power_namer: "non_power"
 regional_power_namer: "regional_power"
 minor_power_namer: "minor_power"
 large_power_namer: "large_power"
 great_power_namer: "great_power"
 super_power: "초강대국"
 super_power_desc: "We are a Superpower, with a extremely dominant position in the world - characterized by our ability to exert influence and project power on a global scale. Superpowers have the ability to plausibly attain the global hegemony, and compete for power with anyone, dwarfing traditional Great Powers.\n\nPower status is determined by how much GDP we contribute to the world total, modified by our §YIndependence from Foreign Influence§!. Our current contribution is §Y[?ROOT.percentage_of_global_factories|%1]§!.\n\nThe required contributions for the different levels are:\nMore than §Y15%§! for §Y$super_power$§!\nMore than §Y6.5%§! for §Y$great_power$§!\nMore than §Y2.5%§! for §Y$large_power$§!\nMore than §Y0.2%§! for §Y$minor_power$§!\nLess than §Y0.2%§! for §Y$non_power$§!\n\nIn every geographic region, a certain number of the strongest §Y$minor_power$s§! will be classified as §Y$regional_power$s§! if there aren't enough §Y$super_power$s§!, §Y$great_power$s§! and §Y$large_power$s§! in the region. The regions and numbers of countries above §Y$minor_power$§! are:\nEurope (7)\nMiddle East and North Africa (3)\nSub-Saharan Africa (3)\nAsia (7)\nAmericas (4)\n\nPower Ranking is updated bi-annually (May & November)."
 super_power_tt: "£economy_laws_cost_texticon 법안 비용: §R+80%§!\n£economy_laws_cost_texticon §Y국내 투자§! 슬롯: §G+4§!"
 super_power_namer: "super_power"
 idea_focus_generic_counter_terrorism: "Counter-Terrorism Operations"
 idea_focus_generic_counter_terrorism_desc: "Dedicated counter-terrorism units are embedded within intelligence and security services, improving resistance suppression and defensive intelligence gathering."
 idea_focus_generic_cyber_warfare: "Cyber Warfare Initiatives"
 idea_focus_generic_cyber_warfare_desc: "Investment in offensive and defensive cyber capabilities has strengthened encrypted communications and national intelligence networks."
 healthcare_privatization: "Healthcare System"
 healthcare_privatization_desc: "Determines the degree to which medical services are provided by the state versus private enterprise. Fully public systems guarantee universal coverage but impose a fiscal burden, while fully private systems reduce state expenditure at the cost of access for lower-income populations."
 fully_privatized_healthcare: "Fully Privatized Healthcare"
 fully_privatized_healthcare_desc: "All medical services are delivered by private providers operating in a market environment. The state bears no direct healthcare expenditure, but access is determined by ability to pay, and social inequality in health outcomes is typically high."
 partially_privatized_healthcare: "Partially Privatized Healthcare"
 partially_privatized_healthcare_desc: "Private providers supply the majority of healthcare services, with the state funding only a limited safety net. Costs are kept relatively low for the government, though gaps in coverage remain for those who cannot afford private insurance."
 partially_nationalized_healthcare: "Partially Nationalized Healthcare"
 partially_nationalized_healthcare_desc: "A mixed system in which public hospitals and insurance schemes operate alongside private providers. The state guarantees a baseline level of care for all citizens while allowing private provision to supplement it."
 fully_nationalized_healthcare: "Fully Nationalized Healthcare"
 fully_nationalized_healthcare_desc: "Healthcare is treated as a universal public service, financed and administered entirely by the state. All citizens receive coverage regardless of income, though the government bears the full cost and the system demands significant ongoing investment."
 mining_policies: "Mining Regulations"
 mining_policies_desc: "Governs the environmental and operational standards applied to the extraction of natural resources. Stricter regulations protect the environment and communities but reduce output; looser standards maximise resource yields at the cost of ecological damage."
 full_environmental_protections: "Full Environmental Protections"
 full_environmental_protections_desc: "Comprehensive legislation mandates the strictest environmental standards across all extraction operations. Industrial output is constrained, but the long-term health of ecosystems and local communities is preserved."
 partial_environmental_protections: "Partial Environmental Protections"
 partial_environmental_protections_desc: "Environmental standards apply to the most sensitive areas and most damaging practices, while routine extraction proceeds with limited oversight. A compromise that moderates ecological harm without significantly hampering production."
 balanced_protections: "Balanced Mining Regulations"
 balanced_protections_desc: "Regulations are calibrated to permit efficient resource extraction while imposing minimum environmental safeguards. Neither environmental groups nor industry lobbies are fully satisfied, but output and sustainability are both maintained at a workable level."
 economic_motivated_mining: "Economy-First Mining"
 economic_motivated_mining_desc: "Environmental regulations are kept to the minimum required by international norms. Extraction rates are maximised to serve national economic goals, with ecological concerns addressed only when they threaten productivity directly."
 strip_mining: "Strip Mining"
 strip_mining_desc: "All environmental constraints are removed in pursuit of maximum resource extraction. Landscapes are rapidly depleted and communities bear the environmental costs, but short-term yields are substantially increased."
 critical_infrastructure: "Infrastructure Maintenance"
 critical_infrastructure_desc: "Sets the standard of upkeep applied to national infrastructure — roads, power grids, communications networks, and water systems. Higher maintenance spending preserves productive capacity and public welfare; underinvestment allows gradual degradation."
 minimal_maintenance: "Minimal Maintenance"
 minimal_maintenance_desc: "Infrastructure is kept functional only where failure would cause immediate crisis. Routine upkeep is deferred, costs are reduced in the short term, and the condition of the national network slowly deteriorates."
 standard_maintenance: "Standard Maintenance"
 standard_maintenance_desc: "Infrastructure is maintained at the level required to preserve its current condition and service quality. Spending is predictable and moderate, preventing deterioration without pursuing expansion or improvement."
 extensive_maintenance: "Extensive Maintenance"
 extensive_maintenance_desc: "The government invests heavily in upkeep, modernisation, and resilience across all critical networks. Infrastructure performance is maximised and long-term replacement costs are reduced, but the programme requires sustained budgetary commitment."
 employment_pressure: "Labor Regulations"
 employment_pressure_desc: "Laws governing labor standards, worker rights, and the size of the workforce required to operate buildings."
 comprehensive_regulations: "Comprehensive Labor Code"
 comprehensive_regulations_desc: "Extensive worker protections and mandatory staffing levels increase workforce requirements across all sectors. Workers expect secure employment, making unemployment politically difficult to tolerate."
 strong_regulations: "Strong Labor Protections"
 strong_regulations_desc: "Strong worker rights and safety standards require more employees per building. The expectation of stable employment reduces the government's tolerance for unemployment."
 standard_regulations: "Standard Labor Framework"
 standard_regulations_desc: "A balanced approach to labor law providing standard workforce requirements and unemployment tolerance."
 light_regulations: "Light Labor Oversight"
 light_regulations_desc: "Reduced regulatory burden allows businesses to operate with fewer workers. The population is more accustomed to employment insecurity, raising the tolerated unemployment threshold."
 minimal_regulations: "Minimal Labor Standards"
 minimal_regulations_desc: "Near-absent worker protections enable lean staffing across all buildings. The economy is built to run with a significant surplus labor pool, greatly increasing tolerance for high unemployment."