 SWE_lucrative_dlc_policy: "인기 게임의 DLC 선전 정책"
 SWE_lucrative_dlc_policy_desc: "스웨덴 정부는 국가 선전용 비디오 게임에 자금을 지원하여 막대한 수익을 올리고 있으며, 이러한 게임들은 핵심적인 게임 플레이 기능을 유료화하는 것을 주요 관행으로 삼고 있습니다. 이를 통해 게이머들로부터 엄청난 자금을 모아 스웨덴의 전쟁 자금을 조달하고 있습니다."
 generic_bureaucratic_drain_idea: "관료제 유출"
 generic_bureaucratic_drain_idea_desc: "최근의 조치들로 인해 우리 관료주의 체계에 부담이 가중되었고, 이제는 심각한 재정난으로 이어지고 있습니다. 이러한 현상은 대개 일시적이지만, 장기적으로는 더 큰 문제를 야기할 수 있습니다."
 USA_homeland_security: "조국 수호"
 USA_homeland_security_desc: "국토안보부는 미국 국가 안보를 총괄하는 포괄적인 용어로, 재편된 여러 미국 민간 기관들을 아우릅니다. 국토안보부의 주된 목적은 다른 여러 나라들이 가진 내무부와 유사한 역할을 수행하는 것입니다."
 USA_guantanamo_bay: "관타나모만"
 USA_guantanamo_bay_desc: "관타나모 수용소는 쿠바 관타나모 만 해안에 위치한 관타나모 해군 기지(관타나모, G-베이, GTMO, 깃모 등으로도 불림) 내에 있는 미군 교도소입니다. 수감자들은 재판 없이 무기한 구금되며, 여러 수감자들이 고문을 당했다는 보고가 있어, 국제앰네스티는 이 수용소의 운영이 인권 침해이자 미국 헌법 수정 제14조의 적법절차 원칙을 심각하게 위반하는 행위라고 간주하고 있습니다."
 land_of_the_free: "자유의 땅"
 land_of_the_free_desc: "미합중국은 전 세계의 자유와 민주주의의 횃불입니다."
 USA_usaid: "USAID (미국 국제개발처)"
 USA_usaid_desc: "The United States Agency for International Development (USAID) is an independent agency of the United States federal government that is primarily responsible for administering civilian foreign aid and development assistance. With a budget of over $$27 billion, USAID is one of the largest official aid agencies in the world and accounts for more than half of all U.S. foreign assistance (which in absolute dollar terms is the highest in the world).\n\n§RThis idea will cancel in the following conditions.§!\nWe are at war with the §Y[USA.GetNameWithFlag]§! or any §Y[USA.GetFlag] [USA.GetAdjective] ally§!, our §YGDP/c§! is over §Y25k§!, or if we have generated more than 10% World Tension."
 worker_strikes_1: "노동자 파업"
 worker_strikes_1_desc: "이 나라 노동자들 사이에서 약간의 불안이 있습니다."
 worker_strikes_2: "상당한 노동자 파업"
 worker_strikes_2_desc: "이 나라에서는 버스, 기차, 비행기, 택시 운행이 거의 중단되었습니다. 공장들도 일부만 가동되고 있습니다. 노동자들은 불만을 품고 있습니다."
 worker_strikes_3: "심각한 노동자 파업"
 worker_strikes_3_desc: "사람들이 정치적인 주장을 펼치기 위해 일하고 싶어하지 않는 상황들이 있습니다. 하지만 이 나라에서는 매우 중요한 정치적 메시지가 전달되고 있습니다."
 worker_strikes_4: "끔찍한 노동자 파업"
 worker_strikes_4_desc: "국가 경제가 붕괴 직전에 놓여 있다. 정부는 국민들을 일하게 만들 능력이 없는 것 같다."
 full_control_of_suez: "수에즈 운하 당국"
 full_control_of_suez_desc: "수에즈 운하는 수에즈 운하 관리청이 관리 및 운영합니다. 관리청은 통행료 수입만으로 연간 50억 달러를 벌어들입니다. 국제 조약에 따라 수에즈 운하는 민간 선박과 군함 모두에게 개방되어 있지만, 아시아와 유럽 간 해상 운송을 통제하는 데 쉽게 이용될 수 있습니다."
 partial_control_of_suez: "수에즈 운하 당국 - 공동 소유"
 partial_control_of_suez_desc: "수에즈 운하는 수에즈 운하 관리청이 관리 및 운영합니다. 관리청은 통행료 수입만으로 연간 50억 달러를 벌어들입니다. 국제 조약에 따라 수에즈 운하는 민간 선박과 군함 모두에게 개방되어 있지만, 아시아와 유럽 간 해상 운송을 통제하는 데 쉽게 이용될 수 있습니다. 현재 수에즈 운하는 두 국가가 공동으로 관리하고 있습니다."
