 USA_usaid_idea_tt: "기타 수입: 인구 10M 당$ $§G0.004§!"
 tribal_guerrillas: "부족 게릴라"
 tribal_guerrillas_desc: "소련의 침공으로 단련된 게릴라들은 아프가니스탄의 경사지와 언덕에서 싸우는 데 도가 텄습니다. 광활하고 복잡한 동굴 시스템을 활용함으로써 적군은 모든 전투원을 소탕하기가 더욱 어려워졌습니다."
 full_control_of_suez_idea_TT: "기타 수입: $§G0.100§!"
 partial_control_of_suez_idea_TT: "기타 수입: $§G0.050§!"
 entry_to_china: "중국으로의 관문"
 entry_to_china_desc: "홍콩은 중국 본토와 서방 사이에서 독특한 관계를 맺고 있습니다. 영국으로부터 중국으로 반환되면서 서구의 관습과 사업 관행이 유입되었습니다. 덩샤오핑의 개혁 이전에는 홍콩이 중국에서 외국 투자가 들어올 수 있는 유일한 곳이었습니다.\n\n현재 변화가 일어나고 있으며 홍콩은 한때 누렸던 독보적인 지위를 잃을 위기에 처해 있습니다. 그럼에도 불구하고 홍콩 증시는 여전히 다른 많은 아시아 증시들의 부러움을 사고 있습니다."
 full_control_of_panama: "파나마 운하 당국"
 full_control_of_panama_desc: "파나마 운하청(PCA, Autoridad del Canal de Panamá)은 파나마 정부 산하 기관으로 파나마 운하의 운영 및 관리를 담당합니다. 운하 이용료 및 기타 운영을 통해 국가는 안정적인 수입을 얻고 있으며, 운하의 전략적 중요성 또한 간과할 수 없습니다."
 full_control_of_panama_tt: "기타 수입: $§G0.050§!"
 asian_tigers_legacy: "아시아의 네 마리 호랑이의 유산"
 asian_tigers_legacy_desc: "한국, 대만, 싱가포르, 홍콩의 네 경제는 지난 세기 후반에 전례 없는 성장을 경험했습니다. 이들 국가의 기업들은 시장과 국가 개입의 결합을 통해 급속도로 발전하는 경제를 만들어냈습니다.\n\n그들의 전성기는 1997년 아시아 금융 위기 이후 갑자기 막을 내렸습니다. 하지만 위기를 겪은 다른 국가들과 달리, 그들의 경제는 여전히 비교적 생산적입니다."
 asian_crisis: "1997 아시아 금융 위기"
 asian_crisis_desc: "경제 위기는 급속도로 발전하는 동아시아 및 동남아시아 국가들을 수 십년 전의 상황으로 후퇴하게 만들었습니다. 국가 통화의 잃어버린 신뢰는 오늘 날까지 중앙 은행을 물들이고 있습니다. 공공 및 민간 부채도 급등하였습니다.\n\n뼈아픈 교훈을 얻음과 동시에, 의도치 않았던 과거의 경제 개혁은 아직까지도 한창 진행 중입니다. 국가들은 각기 다른 문제에 직면하였으며, 그들 각자만의 해결 방법을 모색하고 있습니다.\n\n경제 위기에 영향을 받은 국가들의 투자 유입은 한때 전 세계의 절반 가량을 차지 했었지만, 현재 이들은 모두 [CHI.GetFlag] 중국과 다른 국가로 흘러들어가게 되었습니다."
 int_investment_china: "몰리는 국제 투자"
 int_investment_china_desc: "After the Asian economic crisis, investors chose to divert their investments to other markets and chiefly to ours.\n§W--------------§!\nThis national idea will be §RRemoved§! if we are at §HWar§!."
 low_level_of_aids: "낮은 에이즈 유병률"
 low_level_of_aids_desc: "5%에서 10% 가량의 국민들이 에이즈와 접촉하였습니다. 치명적인 질병으로써, 이를 겪는 이들에게는 삶에 심각한 악영향을 줄 수 있으며, 결과적으로 평소와 같은 생활을 하기 매우 어려워질 것입니다. 에이즈에 대응하는 것은 매우 더딘 과정이며, 유일한 해결 방법은 지속적으로 높은 수준의 의료 복지를 제공하며 투병 환자들을 줄이고 질병에 대해 교육함으로써 에이즈로 인한 진통을 줄여나가는 방법 밖에 없습니다.\n\n[HIV_healthcare_tooltip]"
 low_level_of_aids_tt: "의료 비용: §R+5%§!"
 rising_level_of_aids: "증가하는 에이즈 유병률"
 rising_level_of_aids_desc: "10%에서 15% 가량의 국민들이 HIV와 접촉하였습니다. 치명적인 질병으로써, 이를 겪는 이들에게는 삶에 심각한 악영향을 줄 수 있으며, 결과적으로 평소와 같은 생활을 하기 매우 어려워질 것입니다. HIV에 대응하는 것은 매우 더딘 과정이며, 유일한 해결 방법은 지속적으로 높은 수준의 의료 복지를 제공하며 투병 환자들을 줄이고 질병에 대해 교육함으로써 HIV로 인한 진통을 줄여나가는 방법 밖에 없습니다.\n\n[HIV_healthcare_tooltip]"
 rising_level_of_aids_tt: "의료 비용: §R+10%§!"
 high_level_of_aids: "높은 에이즈 유병률"
 high_level_of_aids_desc: "15%에서 20% 가량의 국민들이 에이즈와 접촉하였습니다. 치명적인 질병으로써, 이를 겪는 이들에게는 삶에 심각한 악영향을 줄 수 있으며, 결과적으로 평소와 같은 생활을 하기 매우 어려워질 것입니다. 에이즈에 대응하는 것은 매우 더딘 과정이며, 유일한 해결 방법은 지속적으로 높은 수준의 의료 복지를 제공하며 투병 환자들을 줄이고 질병에 대해 교육함으로써 에이즈로 인한 진통을 줄여나가는 방법 밖에 없습니다.\n\n[HIV_healthcare_tooltip]"
