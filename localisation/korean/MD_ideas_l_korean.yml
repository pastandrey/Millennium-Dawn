 socialist_vietnam: "Socialist Republic of Vietnam"
 socialist_vietnam_desc: "The Socialist Republic of Vietnam implements one-party dictatorship and adheres to the leadership of the Communist Party of Vietnam."
 lao_vietnan_treaty: "Lao-Vietnamese Treaty of Friendship and Cooperation"
 lao_vietnan_treaty_desc: "The treaty signed by the Communist Party of Laos and the Communist Party of Vietnam in Vientiane on July 18, 1977, was an important layout for Vietnam to conceive the establishment of the \"Indochina Federation\" at that time."
 VIE_VPA_Business_Ventures: "VPA Business Ventures"
 VIE_VPA_Business_Ventures_desc: "In the 1960s and 1970s, the Vietnamese military had business activities, mainly importing from China and the Soviet Union. After the Battle of Two Mountains in 1990, China and Vietnam completely stopped the border war, so Vietnam cut military spending and minimized expenses. In the 1990s, Vietnam's military expenditure fell sharply, and Vietnam imitated China's military business, allowing the military to engage in business activities and use the money earned to repay debts and improve military equipment and welfare."
 dominance_of_the_cpp: "Dominance of the CPP"
 dominance_of_the_cpp_desc: "The Cambodian People's Party has dominated the Cambodian political scene since the reformation of the Cambodian constitution.\n"
 full_control_of_hormuz_idea_TT: "Additional Income: $§G0.800§!"
 generic_increased_military_support: "Increased Military Support"
 idea_generic_reaching_to_the_global_market: "Reaching to the Global Market"
 idea_generic_reaching_to_the_global_market_desc: "Reaching towards the global market and making our investments more cost-effective, and time-effective will only bring more profit to our nation."
 idea_generic_the_manpower_solution: "인력 해결책"
 idea_generic_the_manpower_solution_desc: "We can encourage more people into our workforce we can have all of the country's economic sectors improved."
 idea_generic_worker_productivity: "Improved Per Capita Productivity"
