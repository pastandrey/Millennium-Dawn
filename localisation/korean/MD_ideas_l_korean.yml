 major_ruling_party_salafist: "현재 집권당: 살라피스트 관점"
 indonesia_divided: "인도네시아 분리주의"
 Inherent_Resolve: "내재된 결단 작전"
 Inherent_Resolve_desc: "내재된 작전 결단 (OIR)은 이라크와 시리아에서의 이슬람 국가(ISIS)와의 군사 개입을 위한 미국 군의 작전 명칭으로, 이라크와 시리아에서 진행된 캠페인을 모두 포함합니다."
 Opium_Economy: "아편 경제"
 Opium_Economy_desc: "아편은 아프간에서 수 세기 동안 주요 환금작물이었습니다. 하지만, 지난 수십 년간의 혼란과 세계 마약 거래의 등장으로 아프가니스탄의 아편 재배가 크게 확대 되며, 대부분의 농촌 경제가 상당 부분 양귀비에 의존하고 있습니다. 그러나, 아편은 대부분이 불법적인 약물 제조에 사용되기 때문에 우리 정부가 아편의 재배를 통한 이익을 얻기는 어렵습니다."
 Major_Non_NATO_Ally: "주요 비 NATO 동맹국"
 Major_Non_NATO_Ally_desc: "주요 비NATO 동맹국 (MNNA)은 북대서양조약기구 (NATO)의 회원국은 아니지만 미군과 전략적으로 긴밀하게 협조하는 미국 정부가 지정한 동맹국을 뜻합니다. 비록 MNNA 지위는 미국과 자동적으로 상호 방위 조약을 맺게 되는것을 뜻하지는 않으나, 비-NATO 국가들이 받을 수 없는 다양한 군사적, 재정적 이점을 누릴 수 있습니다."
 ISI_jihadist_islamic_state: "지하디스트의 이슬람 국가 (IS)"
 ISI_jihadist_islamic_state_desc: "[ISI.GetNamewithFlag]가 동원되어 칼리페이트는 강력합니다. 이제는 이교도들에게 성전을 선포하고 그들의 존재를 끝내는 시간입니다!"
 isis_sleeper_cell_idea: "ISIS 잠복 조직"
 isis_sleeper_cell_idea_desc: "망할 테러리스트들이 우리나라에 침입해 문제를 일으키고 있습니다. 테러리스트들이 더 많은 피와 눈물, 고통을 초래하기 전에 그들을 끝장내야 합니다."
 israel_new_intifada: "신 인티파다 (Intifada)"
 hutu_tutsi_tensions: "르완다 (Hutu-Tutsi) 내부 긴장"
 hutu_tutsi_tensions_desc: "후투와 투치는 주로 콩고민주공화국과 탄자니아의 국경 지역, 특히 부룬디와 르완다 두 작은 나라에서 살고 있는 두 개의 별개의 민족 그룹입니다. 부룬디는 투치가 지배하고 있으며, 1972년에 후투에 대한 집단학살을 저질렀습니다. 반면 르완다는 후투가 지배하고 있으며, 1994년에는 후투 민병대에 의해 수천 명의 투치가 학살당했습니다.\n\n이 두 민족은 서로 잘 어울리지 않는 것처럼 보이지만, 유럽이 만든 식민지 국경에 의해 같은 나라에 강제로 합쳐지게 되었습니다."
 the_euro: "유로화"
 the_euro_desc: "이 국가는 유로화를 통화로 사용하고 있습니다. 그러므로 국립 은행은 국내 통화에 간섭할 수 없으며, 무역 비용이 줄어듬으로 인해 경제 소득은 더욱 극대화되고 시장과 더욱 자유롭게 거래가 가능합니다. 다만 한가지 단점은 국가의 부정적인 경기 순환에 대처하기 더욱 어려워진다는 것입니다."
 generic_nationalist_boost_idea: "국가주의의 대두"
 generic_western_boost_idea: "친서방 이념에 대한 충성"
 generic_emerging_boost_idea: "동양의 대두"
 generic_salafist_boost_idea: "살라피즘의 대두"
 partially_recognized_state: "인정받지 못한 국가"
 partially_recognized_state_desc: "이 국가는 국제 사회로 부터 인정받지 못하고 있는 국가이기에, 실효성있는 국제적인 입장을 취하기 어렵습니다."
 three_months_of_war: "3개월 간 전쟁 없음"
 additional_recruits: "추가 모집"
 agricultural_investments: "농업 투자"
 aircraft_investments: "항공기 투자"
 amphibious_expertise: "상륙전 전문가"
 arms_exports: "무기 수출"
 army_morale_bonus: "육군 사기 보너스"
 army_organization_bonus: "육군 조직력 보너스"
 artillery_production_bonus: "포병 생산 보너스"
 bomber_production_bonus: "폭격기 생산 보너스"
 british_special_treatment: "영국 특별 조치"
 british_special_treatment_desc: "유럽을 대표하는 이 국가의 수장은 정치인들로부터 온갖 수모를 겪고 있습니다. 이는 국가의 성장을 방해합니다."
 civilian_industry_project: "민간산업 계획"
 commander_skill_bonus: "지휘관 능력 혜택"
 AU_member: "아프리카 연합 회원국"
 AU_member_desc: "아프리카 연합은 아프리카 단결 기구 회원국들로 구성돼 있습니다. 이전 조직과 달리, 아프리카 연합은 아프리카 대륙의  군사, 경제, 사법, 금융 통합을 위한 지침과 정치적 제도를 확립했습니다."
 communist_militias: "공산주의 민병대"
 decryption_bonus: "복호화 보너스"
 defensive_constructions: "방어 시설 구축"
 defensive_military_strategy: "군사 방어 전략"
 defensive_military_strategy_desc: "이 나라는 현재의 분쟁에서 고도로 방어적인 작전 절차를 확립했습니다. 이는 군대의 공격 능력을 약화시키지만 국가군이 더 오래 버틸 수 있도록 해줄 것입니다. 특히 군인들이 정당한 국가 영토로 간주하는 영토에서는 더욱 그렇습니다."
 defensive_preparations: "방어 준비"
 encryption_bonus: "암호화 혜택"
 fighter_production_bonus: "전투기 생산 보너스"
 FIN_king_donatus: "핀란드의 도나투스 왕"
 FIN_king_donatus_desc: "핀란드 정부가 독일 태생의 핀란드 왕조를 복원했을 때, 도나투스는 핀란드 국민의 입헌군주로 선출되었습니다. 처음에는 인기가 없었지만, 현재 헬싱키에 거주하는 도나투스는 핀란드어를 배우기 위해 열심히 노력하고 있으며, 경제학자로서의 직업을 통해 여전히 생계를 유지하고 있습니다. 그는 스스로를 진정한 국민의 군주로 여기고 있으며, 그의 헌신과 진정한 행복은 서서히 핀란드 국민의 마음을 사로잡고 있습니다."
 FIN_conscription: "핀란드인 징병"
 FIN_conscription_desc: "핀란드의 징병제는 1950년대부터 실시됐습니다. 많은 이들이 징병제를 구시대적이고, 쓸모 없다고 여깁니다. 하지만, 핀란드가 국내외 어떤 세력으로부터든 위협을 받는 상황에선 징병제가 필요합니다. 우린 훈련된 군인들이나 최소한의 훈련을 받은 민간인들로 구성된 대규모 국민들을 활용할 수 있습니다."
 FIN_conscription1: "핀란드인 징병"
 FIN_conscription1_desc: "정부는 더 많은 인력을 확보하기 위해 징병제를 강화했다."
 generic_air_force_safety_reforms: "공군 안전 개혁"
 generic_mass_mobilization: "대규모 동원"
 idea_focus_equal_workforce: "평등한 노동"
 idea_focus_equal_workforce_desc: "이 국가는 여성 인구의 국가 노동력과 모든 종류의 고용 형태에 참여 시키기 위해 상당한 노력을 기울였습니다. 이는 기본적으로 가용 인력, 즉 여성 인력을 두 배로 늘리는 것으로 국가 경제에 막대한 이익이 됩니다."
 idea_focus_male_workforce: "남성 노동자"
 idea_focus_male_workforce_desc: "이 나라는 여성 인구의 노동 시장 참여를 차단하기 위한 노력을 기울여 왔습니다. 이는 특히 반대 조치를 취한 경쟁국들과 비교했을 때 경제에 큰 타격을 줄 것이지만, 인구 증가에는 도움이 될 것입니다."
 idea_focus_redistribution_of_wealth: "부의 재분배"
 idea_focus_redistribution_of_wealth_desc: ""
 idea_focus_infantry_production: "보병 생산"
 idea_focus_infantry_production_desc: ""
 idea_focus_environmental_policy: "환경 정책"
 idea_focus_environmental_policy_desc: ""
 idea_focus_strong_unions: "강력한 연방"
 idea_focus_strong_unions_desc: ""
 idea_focus_personal_freedoms: "개인의 자유"
 idea_focus_personal_freedoms_desc: ""
 idea_focus_economic_freedoms: "경제적 자유"
 idea_focus_economic_freedoms_desc: ""
 idea_focus_family_values: "가족의 가치"
 idea_focus_family_values_desc: ""
 idea_focus_national_security: "국가 안보"
 idea_focus_national_security_desc: ""
 idea_focus_new_recruitment_strategies: "신규 징병 전략"
 idea_focus_new_recruitment_strategies_desc: ""
 idea_focus_army_officer_school: "육군사관학교"
 idea_focus_army_officer_school_desc: ""
 idea_focus_air_force_military_school: "공군 군사학교"
 idea_focus_air_force_military_school_desc: ""
 idea_focus_expanded_secret_services: "첩보 기관 확장"
 idea_focus_expanded_secret_services_desc: ""
 idea_focus_destroyed_foreign_influence: "소멸된 해외 영향력"
 idea_focus_destroyed_foreign_influence_desc: ""
 idea_focus_volunteer_corps: "의용대"
 idea_focus_volunteer_corps_desc: ""
 idea_focus_generic_motorized_focus: "차량화 생산 집중"
 idea_focus_generic_motorized_focus_desc: "이 국가는 여러 기업과 정부 개혁을 통해 민간 차량의 생산량을 최대화할 수 있었습니다."
 idea_focus_generic_education_reform: "교육 개혁"
 idea_focus_generic_education_reform_desc: "교육 개혁을 통해 이 나라는 과학자와 학자를 더 많은 수와 더 능숙하게 양성할 수 있었습니다. 그들의 국가 및 민간 연구 프로젝트는 이제 성공할 가능성이 훨씬 더 높습니다."
 idea_focus_generic_census_reform: "인구 조사 개혁"
 idea_focus_generic_census_reform_desc: "국가 인구 조사 시스템을 혁신함으로써 이 나라는 전투 작전 및 군대 배치를 위한 유효한 후보자를 선택하는 데 있어 모집 스테이션을 더 잘 만들었습니다. 새로운 지침이 적용된다면, 이는 이 나라 군대의 인력 기반을 늘릴 수 있습니다."
 idea_focus_generic_public_service_investment: "공공 서비스 투자"
 idea_focus_generic_public_service_investment_desc: "이 국가는 공공 행정과 서비스 부문에서 크게 개선하는 동시에 소비재 생산의 효율성을 높였습니다. 이는 더 많은 산업 역량을 정부가 원하는 방향으로 이끌어 낼 수 있습니다."
 idea_focus_generic_encouraged_private_research: "사립 연구 지원"
 idea_focus_generic_encouraged_private_research_desc: "연구문헌과 실험연구실에 대한 규제를 완화함으로써, 이 국가는 민간 사업체의 엄청난 양의 과학적 관심을 끌어낼 수 있었습니다. 이러한 규제 완화는 순수하게 민간용으로 사용되던 정부 자원을 군과 국가 산업 위원회의 계획을 지원하는 데 사용할 수 있게 됐습니다."
 idea_focus_generic_individual_freedom: "개인의 자유"
 idea_focus_generic_individual_freedom_desc: "This country has shown determination to improve the situation of the individual against the government, to assure basic civil and economic rights. This will likely improve the position of democratic parties."
 idea_focus_generic_national_strength: "국가의 권력"
 idea_focus_generic_national_strength_desc: "This country is determined to stomp thoughts and ideals of personal freedom and small government. The administration has shown no remorse when it comes to oppression and silencing of opposition forces. Democracy is unlikely to flourish."
 idea_focus_generic_path_of_order: "체계와 질서로 향하는 길"
 idea_focus_generic_path_of_order_desc: "This country has determined that its path should be the path of order. Freedom and Equality are overrated. Those who lack freedom get prosperity from above, and those who lack equality are protected from harm. States of order value military presence, strong state parties and pay little attention to good treatment of their opposition."
 idea_focus_generic_path_of_equality: "평등을 향한 길"
 idea_focus_generic_path_of_equality_desc: "This country has determined that its path should be the path of equality. Freedom of the individual is exchanged for the progress of the collective. Militarism and Nationalism and the Order that is supposed to come with it are denounced, but seen as necessary evils for the world to achieve equality."
 idea_focus_generic_path_of_liberty: "자유로 향하는 길"
 idea_focus_generic_path_of_liberty_desc: "This country has determined that its path should be the path of liberty. Equality of a collective means hindering the individual in their potential and order means stealing from the population just to limit it further. Nations of Freedom are even ready to shrink their governments in size to assure that individualism is protected."
