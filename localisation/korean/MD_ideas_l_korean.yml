 TAI_flight_crew_strike: "Taoyuan Flight Attendants Union strike"
 idea_generic_temporary_debt_refactoring: "Temporary Debt Refactoring"
 idea_generic_temporary_debt_refactoring_desc: "Our government's current debt situation is quite unsustainable. If we do some slight adjustments to our current government debt we can lower our overall paid debt."
 fighter_production_bonus_desc: "A few careful allocations of resources and funds we can improve our production speed on our fighters."
 august_1st: "The Order of August 1st"
 august_1st_desc: "The Order of August 1st is the highest military award given to military personnel and civilians of the People's Liberation Army, People's Armed Police and personnel of Ministry of Public Security."
 CHI_bilibili_idea: "Bilibili"
 CHI_bilibili_idea_desc: "네 삼촌, 나 정말 화났어."
 USA_usaid_idea_2_tt: "When influenced by §Y[USA.GetNameWithFlag]§!, §Y[THIS.GetFlag] [THIS.GetAdjective]§! $foreign_influence_defense_modifier$ is §Rdecreased§! by §R5%§!\n"
 cfa_franc: "CFA Franc"
 cfa_franc_desc: "The CFA Franc was created following the Second World War to help protect the colonies from the strong devaluation. It was originally pitched to be a generosity from the French government, but eyes fell on the CFA Franc as another tool of post-decolonization subjugation. The economic benefits and the stability of the currency may not always outweigh the influence that France retains on us and the control they have over our monetary policy."
 china_reunification: "중국 통일"
 china_reunification_desc: "After countless arduous battles, China finally achieved reunification. China has taken another step towards becoming a world power."
 two_child_policy: "Two-Child Policy"
 two_child_policy_desc: "After nearly thirty decades of the one-child policy, China is experiencing a decline in birth rates. To swiftly address this trend and return birth rates to normal levels, the Chinese government intends to loosen the birth restrictions policy a bit."
 fate_of_mongolian_area: "Ominous Premonition From North"
 fate_of_mongolian_area_desc: "Mongolian Area, is the official administrative division name of Outer Mongolia region during the mainland period of the Republic of China. When we lost mainland China, Mongolian Area was also lost. Now the mainland government suddenly has an interest in Outer Mongolia, which does not seem to be a good thing for us. "
 fate_of_mongolian_area_1: "The fate of Mongolian Area"
 fate_of_mongolian_area_1_desc: " Unexpected, the Mongolian area that we lost were taken back by the Chinese mainland government, so the next goal is self-evident."
 chinese_khalkha: "Shield Of China"
 chinese_khalkha_desc: "The word Khalkha means shield in the Mongolian language, and we have taken back the strong shield of our north."
 mongolia_khan_heir: "Heir of Genghis Khan"
 mongolia_khan_heir_desc: "Mongolians are the descendants of Genghis Khan, and the glory of our ancestors will always shine for us."
 CHI_electric_car_project_idea_1: "Chinese Electric Car Project with Xiaomi assist"
