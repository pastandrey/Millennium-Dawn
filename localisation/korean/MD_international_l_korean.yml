 IS_un_humaid_button_text_tt: "Opens the §YUN Aid§! screen. Here we can fund programs such as UNDP, UNIDO, and UNCDF, to help developing nations grow."
 IS_gen_assembly_button_text: "§YGeneral Assembly§!"
 IS_gen_assembly_button_text_tt: "Opens the §YGeneral Assembly§! screen. This allows world affairs to be managed by the entire assembly of §BUN§! Nations."
 IS_sec_con_button_text: "§YSecurity Council§!"
 IS_sec_con_button_text_tt: "Opens the §YSecurity Council§! screen. Here, the §BUnited Nations§! can §Rimpose sanctions§!, §Rauthorize military force§!, and §Gattempt conflict resolution§!"
