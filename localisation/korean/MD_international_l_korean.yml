 un_sc_volunteers: "Regulate Volunteers"
 un_sc_volunteers_tt: "Nations who are at war may be receiving volunteer forces from other nations. The §YSecurity Council§! can restrict the sending of further volunteer forces, establishing §RSanctions§! on nations who send volunteers to the restricted nation after the resolution has passed."
