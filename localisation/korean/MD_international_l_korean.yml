 un_sc_sanctions_tt: "Nations who currently have generated §RWorld Tension§! are eligible to be §RSanctioned§! by the §BUnited Nations§! §YSecurity Council§!. If a Sanction vote is passed, the §RSanctions§! will remain in place until the §YSecurity Council§! votes to remove the sanctions, or the nation no longer has generated any §RWorld Tension§!"
