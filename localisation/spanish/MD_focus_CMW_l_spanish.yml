l_spanish:
 CMW_focus: "Árbol de Enfoque de la Mancomunidad"
 Commonwealth_member_modifier: "Miembro del Mancomunidad"
 CMW_Aso_Rock_Declaration: "Declaración de Aso Rock"
 CMW_Aso_Rock_Declaration_desc: "La Declaración de Aso Rock de la Mancomunidad fue una declaración clave emitida durante la Reunión de Jefes de Gobierno de la Mancomunidad celebrada en Abuja (Nigeria) en 2003. Esta declaración reafirmó el compromiso de la Mancomunidad con la promoción de la democracia, la buena gobernanza, los derechos humanos y el desarrollo económico sostenible. Enfatizó la importancia del respeto mutuo, la inclusión y la cooperación entre los Estados miembros para abordar eficazmente los desafíos globales."
 CMW_of_Learning: "Mancomunidad de Aprendizaje"
 CMW_of_Learning_desc: "Mancomunidad de Aprendizaje, una organización intergubernamental de la Mancomunidad , con sede en Metro Vancouver, Canadá, colabora con varios socios de la Mancomunidad y agencias de desarrollo internacionales para promover el aprendizaje abierto y la educación a distancia."
 CMW_New_Petroleum_Group: "Grupo de Discusión de Productores de Petróleo"
 CMW_New_Petroleum_Group_desc: "El Grupo de Discusión de Nuevos Productores de Petróleo es una plataforma colaborativa para que las naciones productoras de petróleo emergentes compartan conocimientos y estrategias para el desarrollo de la industria petrolera."
 CMW_Hub_And_Spokes_Program: "Programa de Comercio de Centros y Radios"
 CMW_Hub_And_Spokes_Program_desc: "El Programa de Comercio de Centros y Radios es una iniciativa que fomenta las asociaciones comerciales entre múltiples países, centrándose especialmente en la creación de capacidades y los esfuerzos de desarrollo relacionados con el comercio."
 CMW_Leaving_The_Organisation: "Dejando la Mancomunidad"
 CMW_Leaving_The_Organisation_desc: "La decisión de abandonar la Mancomunidad marca un cambio significativo en las relaciones internacionales. Esta decisión refleja un reajuste estratégico de la política exterior, priorizando la soberanía e independencia nacionales sobre las alianzas tradicionales. Al abandonar la Mancomunidad, [ROOT.GetNamewithFlag] busca forjar nuevas alianzas y seguir una trayectoria más autónoma en los asuntos globales."
 CMW_Leaving_The_Organisation_tt: "[ROOT.GetNamewithFlag] elimina §HMiembro de la Mancomunidad§!"
 CMW_Charter: "Carta de la Mancomunidad"
 CMW_Charter_desc: "La Carta de la Mancomunidad es un documento que describe los valores y principios compartidos de la Mancomunidad de Naciones, un grupo de 54 estados miembros comprometidos con los derechos humanos, el desarrollo sostenible y el estado de derecho."
 CMW_Ministerial_Action_Group: "Grupo de Acción Ministerial"
 CMW_Ministerial_Action_Group_desc: "El Grupo de Acción Ministerial de la Mancomunidad es un organismo integrado por los ministros de los países miembros de la Mancomunidad y es responsable de abordar y tomar medidas sobre cuestiones relacionadas con la gobernanza y los acontecimientos políticos en los estados miembros para defender los valores de la Mancomunidad."
 CMW_Kampala_Review: "Revisión de Kampala"
 CMW_Kampala_Review_desc: "La Revisión de Kampala, celebrada durante la Reunión de Jefes de Gobierno de la Mancomunidad en 2007, tuvo como objetivo evaluar y mejorar la eficacia de la Mancomunidad en la promoción de la democracia, el desarrollo y la buena gobernanza. Esta revisión se centró en fortalecer la capacidad de la organización para abordar los desafíos globales contemporáneos, garantizando que sus valores y objetivos sigan siendo pertinentes y tengan un impacto positivo para todos los Estados miembros."
 CMW_Anti_Corruption_Centre: "Centro Anticorrupción de la Mancomunidad de África"
 CMW_Anti_Corruption_Centre_desc: "El Centro Anticorrupción de la Mancomunidad de África es una institución creada dentro de la Mancomunidad para abordar y combatir la corrupción en los países miembros africanos, promoviendo la transparencia y la buena gobernanza."
 CMW_Association_Legislative_Council: "Consejo Legislativo de la Asociación"
 CMW_Association_Legislative_Council_desc: "La Asociación de Asesores Legislativos de la Mancomunidad es una organización que reúne a profesionales del derecho que brindan asesoramiento y apoyo a las legislaturas y parlamentos de los estados miembros de la Mancomunidad. Fomenta la colaboración y el intercambio de conocimientos entre los asesores legislativos."
 CMW_Connectivity_Agenda: "Agenda de Conectividad de la Mancomunidad"
 CMW_Connectivity_Agenda_desc: "La Agenda de Conectividad de la Mancomunidad es una plataforma para que los países intercambien mejores prácticas y experiencias en materia de comercio e inversión y emprendan reformas internas."
 CMW_Parliament: "Parlamento de la Mancomunidad"
 CMW_Parliament_Desc: "La creación del Parlamento de la Mancomunidad de Naciones representa un paso significativo hacia una mayor integración política y cooperación entre los Estados miembros. Este órgano legislativo tiene como objetivo facilitar el diálogo, promover los valores democráticos y supervisar la implementación de las políticas de la Mancomunidad. Sirve de plataforma para que los representantes de todos los países miembros debatan y aborden los desafíos comunes, fomentando la unidad y la acción colectiva."
 CMW_Parliament_tt: "Todos los estados miembros de la §HMancomunidad  de Naciones§! permiten la celebración de elecciones en sus países"
 CMW_Legal_Education_Association: "Asociación de Educación Jurídica de la Mancomunidad"
 CMW_Legal_Education_Association_desc: "La Asociación de Educación Jurídica de la Mancomunidad es una organización que promueve la educación jurídica y la colaboración entre los países miembros de la Mancomunidad."
 CMW_Fintech_Toolkit: "Kit de Herramientas Fintech de la Mancomunidad"
 CMW_Fintech_Toolkit_desc: "El Kit de Herramientas Fintech de la Mancomunidad es un recurso diseñado para apoyar el desarrollo y la innovación en tecnología financiera dentro de los países miembros de la Mancomunidad."
 CMW_CFTC: "Fondo de la Mancomunidad para la Cooperación Técnica"
 CMW_CFTC_desc: "El Fondo de la Mancomunidad para la Cooperación Técnica (CFTC) es un mecanismo financiero que ayuda a los países miembros de la Mancomunidad a implementar proyectos e iniciativas de cooperación técnica para el desarrollo."
 CMW_School_Leaders: "Normas Profesionales de la Secretaría"
 CMW_School_Leaders_desc: "El Marco de Estándares Profesionales para Docentes y Líderes Escolares de la Secretaría es un conjunto de pautas y puntos de referencia diseñados para mejorar el desarrollo profesional y el desempeño de los educadores y líderes escolares dentro de la jurisdicción de la Secretaría."
 CMW_Trade_Association: "Asociación de Comercio de la Mancomunidad"
 CMW_Trade_Association_desc: "La Asociación de Comercio de la Mancomunidad (ACM) busca fortalecer la cooperación económica y las relaciones comerciales entre los Estados miembros. Al promover un entorno comercial más integrado y colaborativo, la ACM busca reducir aranceles, agilizar los trámites aduaneros y promover el crecimiento económico sostenible."
 CMW_Joint_Research_Initiative: "Iniciativa de Investigación Conjunta de la Mancomunidad"
 CMW_Joint_Research_Initiative_desc: "La Iniciativa Conjunta de Investigación de la Mancomunidad es un esfuerzo colaborativo para impulsar la innovación científica y tecnológica entre los estados miembros. Esta iniciativa fomenta el intercambio de conocimientos, recursos y experiencia para abordar desafíos comunes como el cambio climático, la atención médica y el desarrollo sostenible. Mediante el fomento de una red de instituciones de investigación y expertos, la Mancomunidad busca impulsar el progreso y la innovación en beneficio colectivo de todos los países miembros."
 CMW_Valuta: "Introducción del Commo"
 CMW_Valuta_desc: "La introducción del Commo marca un paso histórico hacia la integración económica dentro de la Mancomunidad de Naciones. Esta moneda común está diseñada para facilitar el comercio, mejorar la estabilidad financiera y promover la cooperación económica entre los Estados miembros. Con la adopción del Commo, la Mancomunidad busca reducir las barreras cambiarias, estabilizar las economías regionales y fomentar una comunidad económica más unificada."
 CMW_Promoting_Democracy: "Promover la Ideología"
 CMW_Promoting_Democracy_desc: "Alinearemos la Mancomunidad con Gran Bretaña para aumentar nuestro poder diplomático en el mundo."
 CMW_Counter_Insurgency_Training: "Día de la Contrainsurgencia de la Mancomunidad"
 CMW_Counter_Insurgency_Training_desc: "El Entrenamiento de Contrainsurgencia de la Mancomunidad es una iniciativa destinada a fortalecer la capacidad de los países miembros de la Mancomunidad para abordar y mitigar eficazmente las amenazas insurgentes. Proporciona capacitación especializada, recursos y experiencia para ayudar a las naciones a gestionar y responder a los desafíos de seguridad interna, promoviendo así la estabilidad y la paz."
 CMW_Cyber_Declaration: "Programa de Declaración Cibernética de la Mancomunidad"
 CMW_Cyber_Declaration_desc: "El Programa de Declaración Cibernética de la Mancomunidad es una iniciativa centrada en abordar cuestiones de ciberseguridad y promover la cooperación en los países miembros de la Mancomunidad para mejorar la seguridad digital y protegerse contra las amenazas cibernéticas."
 CMW_Intelligence_Network: "Red de Inteligencia de la Mancomunidad"
 CMW_Intelligence_Network_desc: "La creación de la Red de Inteligencia de la Mancomunidad (CIN), liderada por la recién creada Agencia de Inteligencia de la Mancomunidad (CIA), busca fortalecer la seguridad y el intercambio de inteligencia entre los Estados miembros. Esta red facilita el intercambio de información crítica, las operaciones colaborativas de contrainteligencia y las respuestas unificadas a las amenazas globales. Al fortalecer la cooperación en materia de inteligencia, la Mancomunidad busca proteger a sus Estados miembros del espionaje, el terrorismo y las ciberamenazas."
 CMW_Patrol_Boat_Program: "Programa de Patrullas Marítimas de la Mancomunidad"
 CMW_Patrol_Boat_Program_desc: "El Programa de Patrullas Marítimas de la Mancomunidad es una iniciativa estratégica que implica el desarrollo y despliegue conjunto de patrulleras marítimas por parte de los países miembros de la Mancomunidad. Estas embarcaciones están diseñadas para mejorar la seguridad marítima, proteger las aguas territoriales y apoyar diversas misiones navales, contribuyendo así a la seguridad y estabilidad de las regiones de la Mancomunidad."
 CMW_Chief_Of_Staff: "Jefe de Estado Mayor de la Mancomunidad"
 CMW_Chief_Of_Staff_desc: "El Jefe de Estado Mayor de la Mancomunidad es un cargo de alto rango responsable de supervisar y coordinar las operaciones y estrategias militares en los países miembros de la Mancomunidad. Esta función desempeña un papel crucial para garantizar la seguridad y la defensa de la Mancomunidad, así como para fomentar la cooperación y la preparación entre las fuerzas militares para mantener la paz y la estabilidad."
 CMW_Secretariat_CVE: "Secretaría de la Unidad de Lucha contra el Extremismo Violento"
 CMW_Secretariat_CVE_desc: "La Secretaría de la Mancomunidad de Lucha contra el Extremismo Violento (CVE) de la Secretaría de la Mancomunidad es una sección especializada dentro de la Secretaría de la Mancomunidad responsable de abordar y contrarrestar el extremismo violento en los países miembros de la Mancomunidad, con el foco puesto en la prevención de la radicalización y la promoción de la paz y la estabilidad."
 CMW_Offices_For_Peace: "Oficinas para la Paz de la Mancomunidad"
 CMW_Offices_For_Peace_desc: "El establecimiento de las Oficinas para la Paz de la Mancomunidad (COP) subraya el compromiso de la Mancomunidad con la paz global y la resolución de conflictos. Estas oficinas, ubicadas en regiones clave de los Estados miembros, trabajan para mediar en conflictos, promover la diplomacia y apoyar iniciativas de consolidación de la paz."
 CMW_Academy: "Academia Militar de la Mancomunidad"
 CMW_Academy_desc: "La Academia Militar de la Mancomunidad (CMA) se creó para brindar entrenamiento y educación militar avanzada al personal de todos los estados miembros. Esta institución busca fortalecer las habilidades profesionales, el conocimiento estratégico y la capacidad de liderazgo de los oficiales militares. Al promover estándares de entrenamiento compartidos y fomentar un espíritu de cooperación, la CMA fortalece las capacidades de defensa colectiva de la Mancomunidad."
 CMW_Training_Day: "Entrenamiento Territorial Mundial"
 CMW_Training_Day_desc: "El Entrenamiento Territorial Mundial es un programa global diseñado para mejorar la preparación y las capacidades de las naciones para gestionar asuntos territoriales y fronterizos. Esta iniciativa ofrece capacitación y recursos para mejorar la comprensión y la gestión de las fronteras geográficas, ayudando a los países a resolver disputas fronterizas, promover la coexistencia pacífica y fomentar la estabilidad territorial a nivel mundial."
 CMW_Defense_Treaty: "Tratado de Defensa de la Mancomunidad"
 CMW_Defense_Treaty_desc: "El Tratado de Defensa de la Mancomunidad es un importante acuerdo internacional entre los países miembros de la Mancomunidad que establece compromisos y obligaciones mutuas en materia de defensa. Este tratado sirve como marco de seguridad colectiva, donde los países miembros se comprometen a apoyarse mutuamente en caso de amenazas o agresiones externas, reforzando así el compromiso de salvaguardar la seguridad y la soberanía de todos los estados signatarios de la Mancomunidad."
 CMW_New_CMW: "Nueva Mancomunidad de Naciones"
 CMW_New_CMW_desc: "Tras una serie de reformas integrales, la Mancomunidad de Naciones se encuentra revitalizada y preparada para afrontar los nuevos desafíos globales. Estas reformas han modernizado las estructuras de gobernanza, agilizado los procesos de toma de decisiones y reforzado el compromiso con valores fundamentales como la democracia, el desarrollo y los derechos humanos. La Nueva Mancomunidad está ahora preparada para liderar a sus Estados miembros hacia una nueva era de cooperación, inclusión y resiliencia, lista para afrontar las complejidades del siglo XXI."
 CMW_Education_Framework: "Marco Educativo de la Mancomunidad"
 CMW_Education_Framework_desc: "El Marco Educativo de la Mancomunidad es un sistema integral para orientar las políticas y prácticas educativas en los estados miembros de la Mancomunidad."
 CMW_Debt_Swaps: "Canjes de Deuda de la Mancomunidad"
 CMW_Debt_Swaps_desc: "Los Canjes de Deuda de la Mancomunidad se refieren a acuerdos o iniciativas financieras dentro de la Mancomunidad que implican el intercambio o la reestructuración de deuda como un medio para abordar los desafíos económicos y financieros en los países miembros."
 CMW_Climate_Hub: "Centro de Acceso a Financiamiento Climático de la Mancomunidad"
 CMW_Climate_Hub_desc: "El Centro de Acceso a Financiamiento Climático de la Mancomunidad es una plataforma establecida dentro de la Mancomunidad para facilitar el acceso al financiamiento climático y el apoyo a los países miembros para abordar iniciativas relacionadas con el cambio climático y la sostenibilidad."
 CMW_Blue_Charter: "Carta Azul de la Mancomunidad"
 CMW_Blue_Charter_desc: "La Carta Azul de la Mancomunidad es un compromiso de los países miembros de la Mancomunidad para colaborar en el abordaje y la protección de la salud y la sostenibilidad de los océanos y los entornos marinos del mundo."
 CMW_Living_Lands: "Carta de Tierras Vivas"
 CMW_Living_Lands_desc: "La Carta de Tierras Vivas es una iniciativa ambiental pionera adoptada por la Mancomunidad de Naciones. Esta carta compromete a los Estados miembros a adoptar prácticas sostenibles de gestión del territorio, conservar la biodiversidad y combatir el cambio climático. Al promover la reforestación, la restauración del suelo y la protección de los hábitats naturales, la Mancomunidad busca garantizar que las generaciones futuras hereden un medio ambiente sano y resiliente."
 CMW_Health_Section: "Sección de Salud de la Secretaría"
 CMW_Health_Section_desc: "La Sección de Salud de la Secretaría de la Mancomunidad es una división de la misma, responsable de brindar apoyo y orientación a los países miembros de la Mancomunidad en materia de atención médica, salud pública y desarrollo de políticas y programas de salud dentro de la Mancomunidad . Desempeña un papel fundamental en la facilitación de la cooperación y el intercambio de buenas prácticas en materia de salud entre los Estados miembros."
 CMW_Body_And_Sports: "El Órgano Asesor de la Mancomunidad sobre Deportes"
 CMW_Body_And_Sports_desc: "El Órgano Asesor de la Mancomunidad sobre Deportes es un comité que asesora y orienta a los países miembros de la Mancomunidad sobre políticas y programas relacionados con el deporte, con el objetivo de promover el desarrollo social, la salud y el bienestar a través del deporte."
 CMW_Youth_Networks: "Redes de Jóvenes de la Mancomunidad"
 CMW_Youth_Networks_desc: "Las Redes de Jóvenes de la Mancomunidad son grupos u organizaciones juveniles dentro de la Mancomunidad que facilitan la colaboración, el intercambio de información y la acción colectiva entre jóvenes de los países miembros. Estas redes suelen abordar temas relevantes para la juventud, como la educación, el empleo y el desarrollo social."
 CMW_Defense_Association: "Asociación Defensiva de la Mancomunidad"
 CMW_Defense_Association_desc: "La Asociación Defensiva de la Mancomunidad es un consorcio colaborativo de países miembros de la Mancomunidad centrado en fortalecer sus capacidades de defensa y seguridad colectivas. Esta alianza sirve como plataforma para el apoyo mutuo, la coordinación estratégica y la búsqueda conjunta de la paz y la estabilidad dentro de la comunidad de la Mancomunidad."
 CMW_Leaving.1.t: "[THIS.GetName] ha abandonado la Mancomunidad de Naciones"
 CMW_Leaving.1.d: "[THIS.GetName] ha anunciado oficialmente su salida de la Mancomunidad de Naciones. Esta decisión marca un cambio significativo en su política exterior, reflejando su deseo de mayor autonomía y nuevas alianzas internacionales. La salida podría afectar las relaciones diplomáticas y económicas dentro de la Mancomunidad, presentando nuevos desafíos y oportunidades tanto para la nación saliente como para los restantes Estados miembros."
 CMW_Leaving.1.a: "Buena Suerte"
 Commonwealth_allies_tech_share_name: "Marco Educativo de la Mancomunidad"
 Commonwealth_allies_tech_share_desc: "El Marco Educativo de la Mancomunidad establece un enfoque unificado para los estándares y prácticas educativas en todos los estados miembros."
 CMW_Patrol_Boat_Program_Member: "Programa de Patrullas Marítimas de la Mancomunidad"
 CMW_Patrol_Boat_Program_Leader: "Iniciador del Programa de Patrullas de la Mancomunidad"
 Commonwealth_member_modifier_desc: "Como miembro de la Mancomunidad de Naciones, nuestro país se beneficia de fuertes lazos diplomáticos y cooperación económica con otros Estados miembros. Esta asociación histórica nos proporciona una red de apoyo mutuo y valores compartidos, lo que fortalece nuestra posición internacional y nuestras oportunidades comerciales. Sin embargo, equilibrar nuestra soberanía con los intereses colectivos de la Mancomunidad puede a veces generar desafíos diplomáticos y políticos."