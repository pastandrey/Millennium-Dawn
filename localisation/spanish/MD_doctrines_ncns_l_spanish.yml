 SUBDOCTRINE_DESIGN_DRONE_DESC: "Esta doctrina prioriza el desarrollo de diseños de aeronaves no tripuladas basados ​​en la operación remota y sistemas de apoyo autónomos. Los diseños de drones priorizan la integración modular y la configuración flexible de la misión para ampliar las opciones de potencia aérea según los requisitos operativos."
