 GRAND_DOCTRINE_LOCAL_AIRSPACE_DEFENCE_DESC: "Esta gran doctrina estructura las fuerzas aéreas en torno a la protección y el control del espacio aéreo nacional y regional. Los conceptos de defensa del espacio aéreo local enfatizan la vigilancia y la respuesta coordinadas dentro de dominios aéreos definidos."
 GRAND_DOCTRINE_STRATEGIC_DESTRUCTION_DESC: "Esta gran doctrina organiza el poder aéreo para llevar a cabo operaciones sostenidas destinadas a degradar la capacidad estratégica del adversario. Los conceptos de destrucción estratégica enfatizan el uso coordinado de los recursos aéreos en una amplia profundidad operativa."
 GRAND_DOCTRINE_AIR_BATTLEFIELD_SUPPORT_DESC: "Esta gran doctrina estructura las operaciones aéreas para apoyar directamente a las fuerzas terrestres y navales en zonas de combate activas. Los conceptos de apoyo en el campo de batalla enfatizan la integración del poder aéreo en la planificación operativa conjunta."
 GRAND_DOCTRINE_AIR_SUPREMACY_DESC: "Esta gran doctrina organiza las fuerzas aéreas para establecer y mantener el control del dominio aéreo. Los conceptos de supremacía aérea enfatizan las operaciones aéreas coordinadas para garantizar la libertad de acción en todas las áreas operativas."
 GRAND_DOCTRINE_MIXED_ROLE_DESC: "Esta gran doctrina estructura las fuerzas aéreas para equilibrar múltiples roles operativos dentro de un marco unificado. Los conceptos de roles mixtos enfatizan la flexibilidad en el empleo del poder aéreo en diversas misiones."
 GRAND_DOCTRINE_BATTLEFIELD_SUPPORT_DESC: "Esta gran doctrina organiza las fuerzas terrestres para integrar capacidades de apoyo en las operaciones de primera línea. Los conceptos de apoyo en el campo de batalla enfatizan la coordinación de fuegos, el sostenimiento y los elementos facilitadores dentro de la planificación del combate terrestre."
 GRAND_DOCTRINE_EQUIPMENT_LIGHT_DESC: "Esta gran doctrina organiza las fuerzas en torno a conjuntos de equipos ligeros y simplificados. Los conceptos de equipo ligero enfatizan la facilidad de despliegue y la adaptabilidad a diversos entornos operativos."
 GRAND_DOCTRINE_EQUIPMENT_HEAVY_DESC: "Esta gran doctrina estructura las fuerzas en torno a sistemas de equipo altamente protegidos y de alta capacidad. Los conceptos de equipo pesado enfatizan la presencia sostenida y una robusta capacidad de combate dentro de las formaciones de fuerza."
 GRAND_DOCTRINE_EQUIPMENT_MOBILE_DESC: "Esta gran doctrina organiza el equipo de la fuerza para apoyar la alta movilidad operativa y la maniobra rápida. Los conceptos de equipo móvil enfatizan el movimiento, el reposicionamiento y el alcance operativo."
 GRAND_DOCTRINE_EQUIPMENT_FIRES_DESC: "Esta gran doctrina estructura el desarrollo de equipo en torno a sistemas dedicados a lanzar fuegos indirectos y de apoyo. Los conceptos de equipo de apoyo de fuego enfatizan la aplicación coordinada de la potencia de combate en todo el espacio de batalla."
 GRAND_DOCTRINE_EQUIPMENT_FULL_DESC: "Esta gran doctrina organiza las fuerzas en torno a un aprovisionamiento integral de equipo. Los conceptos de equipo completo enfatizan el equipamiento estandarizado para apoyar operaciones sostenidas y de amplio alcance."
 GRAND_DOCTRINE_BLUE_WATER_DESC: "Esta gran doctrina estructura las fuerzas navales para operaciones sostenidas en océanos abiertos y teatros de operaciones marítimos distantes. Los conceptos de la marina de alta mar enfatizan el alcance global, la proyección de poder y la presencia continua de la flota."
 GRAND_DOCTRINE_GREEN_WATER_DESC: "Esta gran doctrina organiza las fuerzas navales en torno a operaciones en entornos marítimos litorales y regionales. Los conceptos de la marina de aguas verdes enfatizan la influencia costera y el control del mar regional."
 GRAND_DOCTRINE_JEUNE_ECOLE_DESC: "Esta gran doctrina estructura la estrategia naval en torno a buques más pequeños y especializados, y operaciones marítimas distribuidas. Los conceptos de la Jeune École enfatizan la asimetría y la aplicación selectiva de la fuerza en la guerra naval."
 GRAND_DOCTRINE_GUERRE_DE_COURSE_DESC: "Esta gran doctrina organiza las operaciones navales en torno a la interrupción de la actividad marítima mediante una guerra comercial. Los conceptos de guerra de curso enfatizan las acciones navales dirigidas a través de las líneas de comunicación marítimas."
