 GEO_defense_of_georgia: "Defensa de Georgia"
 shervad_win_lol_TT: "§YShevardnadze se convertirá en el nuevo líder sin importar la popularidad!§!"
 georg_revol.1.t: "¡Revolución de la Rosa en Georgia!"
 georg_revol.1.d: "En Georgia, la era del zorro gris ha terminado. La pacífica Revolución de las Rosas destituyó a Eduard Shevardnadze, pero su legendaria astucia y su arte de la intriga lo traicionaron. Shevardnadze podría haber salvado a su país del shock y a sí mismo de la humillación si se hubiera retirado hace tiempo. Georgia sólo se beneficiaría de ello. En los últimos años, el presidente de 75 años no ha resuelto los problemas del país, sino que los ha dejado en un segundo plano. Los recursos de Georgia se han gastado únicamente en mantener el poder de Shevardnadze. Shevardnadze engañó a su pueblo. Permitió e incluso organizó el fraude electoral. Fue esta mentira la que llevó a su dimisión. Salvó al país del derramamiento de sangre, y ese es su mérito. Sin embargo, la autoridad del poder estatal en Georgia aún no ha sido socavada. Además, no hay respuesta a la pregunta principal: ¿cuál será el futuro del país después de Shevardnadze?"
 georg_revol.1.a: "No tenemos más opción que aceptar"
 georg_revol.2.t: "Protestas en Georgia"
 georg_revol.2.d: "Se llevó a cabo una concentración con protestas contra la falsificación en Tbilisi. Las autoridades se sintieron alarmadas y, por si acaso, corrigieron ligeramente el resultado para que los Burdzhanadze-Demócratas obtuvieran su 7 por ciento necesario. Todos estos disturbios podrían haber sido ignorados cuidadosamente, pero había un matiz sutil: un nuevo parlamento podría no reunirse en medio del caos. Claramente no había quórum, ya que la mitad de los diputados no reconocían los resultados electorales. Shevardnadze tuvo que hacer algo para poner en marcha el parlamento, pero no podía hacer nada. El zorro gris decidió ganar tiempo y llevar a cabo interminables negociaciones hasta que los manifestantes se aburrieran. Tenía un poderoso aliado a su favor: las lluvias de noviembre en Tbilisi."
 georg_revol.2.a: "Esperemos que las protestas se calmen por sí solas..."
 georg_revol.3.t: "Época de Saakashvili"
 georg_revol.3.d: "La era de Saakashvili ha comenzado en Georgia. La renuncia tardía de Eduard Shevardnadze pudo haber evitado una guerra civil sangrienta. Pero las perspectivas siguen siendo extremadamente peligrosas. Georgia solo tendrá una oportunidad para un futuro mejor si logra unir a las fuerzas políticas moderadas de la oposición y aislar a los radicales. La Revolución de la Rosa causará cierta ansiedad entre los presidentes postsoviéticos. Ocurrirán disturbios similares en Ucrania, Kirguistán y Uzbekistán. Mucho cambiará en Rusia misma: las autoridades comprenderán que son vulnerables. El Ministerio de Asuntos Exteriores no está satisfecho con el hecho de que las repúblicas postsoviéticas también requieran atención, y que también sea necesario trabajar con ellas y proteger sus intereses allí."
 georg_revol.3.a: "¡Georgia ha elegido su camino!"
 GEO_adjara_unstable: "Inestabilidad en Adjara"
 GEO_kviciani_shit: "La rebelión de Kviciani"
 GEO_kviciani_medium_close: "Reprimir a Kviciani"
 GEO_kviciani_medium_agree: "Negociar con Kviciani"
 GEO_kviciani_in_gov: "Emzar Kviciani"
 georg_revol.4.t: "¡Rebelión de Kviciani!"
 georg_revol.4.d: "Kvitsiani declaró que ya no estaba subordinado al gobierno central de Georgia. El motivo de esta declaración fueron las actividades de los miembros del gobierno georgiano: los jefes del Ministerio del Interior y del Ministerio de Defensa, Vano Merabishvili y Okruashvili. Según Kvitsiani, por orden de ellos, las autoridades persiguieron a los habitantes de Kodori. En este sentido, Kvitsiani exigió la dimisión de los jefes de los organismos encargados de hacer cumplir la ley de Georgia y amenazó con sacar a la gente a las calles de Tbilisi y organizar la resistencia armada contra el ejército georgiano directamente en Kodor."
 georg_revol.4.a: "Veamos qué podemos hacer."
 georg_revol.5.t: "¡Crisis en Adjara!"
 georg_revol.5.d: "Abashidze, quien se opuso a nuestro gobierno actual, comenzó a llevar a cabo actividades anti-georgianas en Adjara. Durante estos discursos, Abashidze apoyó al presidente del país, Eduard Shevardnadze, y, hablando en la televisión adjara, calificó a los líderes de la oposición Movimiento Nacional Unido, Mikheil Saakashvili y David Berdzenishvili, de fascistas, y calificó a su movimiento como fascista. El 23 de noviembre, después de que la oposición tomara el edificio del parlamento, el gobierno de Adjara declaró el estado de emergencia."
 georg_revol.5.a: "Lidiemos con este idiota."
 saakash_ep_TT: "¡La llegada de Saakashvili a la presidencia puede traer consecuencias imprevistas!"
 GEO_adjara_unstable_2: "Inestabilidad de Adzharia - parcialmente gestionada"
 GEO_adjara_unstable_3: "Inestabilidad en Adjara - Proceso de integración"
 kviciani_ef_TT: "¡Intentaremos contactar a Monadire para llegar a un acuerdo!"
 georg_revol.6.t: "Crisis en Kodori"
 georg_revol.6.d: "Emzar Kvitsiani anunció la creación del destacamento Monadire y se declaró en contra del gobierno de Georgia, exigiendo la dimisión de los jefes del Ministerio del Interior y del Ministerio de Defensa, Vano Merabishvili y Okruashvili, quienes, según Kvitsiani, cometieron actos arbitrarios contra los svans y prepararon su exterminio. Al mismo tiempo, Kvitsiani amenazó con acciones de desobediencia civil y, en casos extremos, con la resistencia armada."
 georg_revol.6.a: "Quizás podamos llegar a un acuerdo."
 georg_revol.6.b: "¡Los traidores deben ser castigados!"
 GEO_kvic_acc: "¡Hemos llegado a un acuerdo con Kviciani!"
 GEO_kvic_den: "¡Hemos decidido purgar Monadire!"
 GEO_Zhvania: "Zurab Zhvania"
 georg_revol.7.t: "¡Asesinato de Zhvania!"
 georg_revol.7.d: "El cuerpo del primer ministro fue encontrado en el apartamento de su amigo. Además, su amigo también fue encontrado muerto. Según el ministro, anoche Z. Zhvania fue a visitar a su amigo, el vicegobernador de una de las regiones de Georgia. Después de un rato, la seguridad del primer ministro se preocupó porque no devolvió las llamadas. A las 4:30 hora local, los guardias rompieron la ventana y encontraron los cuerpos de Z. Zhvania y su amigo. Según la versión preliminar expresada por V. Merabishvili, se trató de un accidente: la muerte fue resultado de envenenamiento por gas. Sin embargo, David Morchiladze, director general de la empresa de distribución de gas de Tbilisi JSC Tbilgaz, dijo al canal de televisión Rustavi 2 después de inspeccionar el apartamento que no había ninguna fuga de gas natural. Según él, en el apartamento había instalado un calentador de gas. Y, con toda probabilidad, durante algún tiempo se acumuló en el apartamento el producto de la combustión incompleta del gas, lo que podría causar envenenamiento. Además, según informa Eco de Moscú, ahora todos los accesos a la casa donde murió Zhvania están acordonados por la policía. Los periodistas tampoco pueden entrar en el hospital republicano al que fue trasladado su cuerpo. Según informó el médico del hospital a los representantes de los medios, no hablarán con la prensa hasta que finalice el examen. \"Nos informaron de que el presidente ordenó no comunicarse con los periodistas\", dijo. En Tbilisi ya se celebró una reunión de emergencia del gobierno, convocada con motivo de la muerte de Zhvania. El presidente de Georgia, Mijail Saakashvili, intervino en la reunión. Según él, Georgia ha perdido a un gran patriota, al propio Saakashvili, su amigo más cercano, su consejero más fiable y su compañero de armas. El presidente llamó al gobierno a ser firme, resistente y unido. Además, Saakashvili expresó sus condolencias a las familias de Zhvania y Raúl Yusupov, que murieron con él. Los participantes del encuentro honraron la memoria de los fallecidos con un minuto de silencio."
 georg_revol.7.a: "Bien"
