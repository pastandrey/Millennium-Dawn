 GEO_soviet_legacy_honor: "Honrar el legado soviético"
 GEO_soviet_legacy_honor_desc: "Honrar el legado soviético es nuestra forma normal y natural de pensar políticamente."
 GEO_multivector_kek: "Política de múltiples vectores"
 GEO_multivector_kek_desc: "¡La política de múltiples vectores es el camino a seguir! ¿Por qué deberíamos abandonar acuerdos y tratados por algún tipo de esclavitud geopolítica?"
 GEO_t72_TT: "Compraremos 10 tanques T-72 ucranianos"
 GEO_hmvv_TT: "Compraremos 100 Humvees de EE. UU."
 georg.1000.t: "Época de Shevardnadze"
 georg.1000.d: "Eduard Amvrosievich Shevardnadze vivió tres vidas: como funcionario del partido soviético, creador de la perestroika y del nuevo pensamiento, y líder de la Georgia independiente. Nadie podría haber previsto estos giros, y menos él mismo. Al igual que su patrón Mijail Gorbachov, Shevardnadze es más respetado y apreciado en el mundo que en su país. Algunos sostienen que fracasó una y otra vez en todo lo que emprendió, otros están convencidos de que la humanidad no olvidará sus méritos históricos. Sin embargo, cuando en marzo de 1992 los políticos georgianos que acababan de derrocar a Zviad Gamsakhurdia le propusieron dirigir el país, él aceptó. Es difícil decir qué había más aquí: el deseo de ayudar a la patria en tiempos difíciles o el anhelo de poder y trabajo activo. \"Sabía que si no hubiera regresado a Georgia, ella habría muerto\", dijo Shevardnadze. Había algo de verdad en sus palabras, pero, a diferencia de Heydar Aliyev, que se encontró en una situación similar, no logró consolidar la sociedad. Probablemente, Shevardnadze esperaba encontrarse en un pequeño país que se convertiría en una \"ballena en un acuario\", ante cuya autoridad mundial todos se inclinarían al unísono. En cambio, se encontró en una sociedad en ebullición y rodeada de barones armados decididos a no obedecer a nadie. La crisis en las relaciones con Abjasia y Osetia del Sur fue creada por su predecesor Gamsakhurdia. Shevardnadze aceptó una expedición militar a Abjasia en agosto de 1992 bajo la presión de la opinión pública y de los influyentes líderes militares Tengiz Kitovani y Jaba Ioseliani. Después del derrocamiento de Gamasakhurdia, el prorruso Shevardnadze, que está construyendo relativamente relaciones con Occidente y Oriente y se muestra inseguro de su antigua autoridad, debe elaborar un plan para el desarrollo futuro de Georgia."
 georg.1000.a: "La mano derecha de Gorbachev."
 georg_chech.1.t: "Boeviks de Gelayev en los desfiladeros"
 georg_chech.1.d: "Hace varios días se difundió información sobre el plan de unos 700 boeviks chechenos armados de entrar en Abjasia. La minoría parlamentaria (bloque político Renacimiento, liderado por Aslan Abashidze, líder de la República Autónoma de Adjara) acusó a las autoridades georgianas de aventurerismo militar y político. El líder de la minoría, Jemal Gogitidze, está convencido de que los boeviks chechenos reunidos en el desfiladero de Kodori, cerca de la frontera con Abjasia, planean entrar en la República Autónoma de Adjara a través de la costa del Mar Negro. Giorgi Targamadze, líder de la facción opositora Georgia Unida, apoya la idea y afirma que la intriga militar y política es una invención de las autoridades para desviar la atención de la sociedad del conflicto entre Shevardnadze y Zhvania (presidente del parlamento) y favorecer los intereses de Rusia en Georgia, afirma Resonance. Por otro lado, Unión de Ciudadanos, el partido gobernante, considera que el gobierno de Adjara apoya los intereses de Rusia. El desplazamiento ilegal de fuerzas militares rusas en el barrio de Cholokhi (Adjara) se analizó ayer en la sesión del Comité de Defensa y Seguridad. Se debe hacer todo lo posible para que las bases militares rusas abandonen el territorio georgiano, ya que obstaculizan la seguridad del país, anunció el presidente del Comité, Gia Baramidze. Tanto los partidos gobernantes como los de la oposición intentan rentabilizar las próximas elecciones, mientras la situación interna en el país es muy tensa. \"Activar el tema de Abjasia y hablar de posibles enemigos forma parte de la campaña electoral\", así evaluó el periódico los comentarios de los representantes del gobierno. Cabe señalar también que Rusia envió un destacamento a la base militar de Gudauta, en Abjasia, para localizar y capturar a 13 boeviks chechenos que se cree se encuentran allí (la Resonancia). Según Khizri Aldamov, representante no oficial de Chechenia en Georgia, ninguno de estos 13 boeviks es de nacionalidad chechena; son ciudadanos de la Federación Rusa. Cabe considerar que fingen ser chechenos. Ya se han dado hechos similares con anterioridad. Rusia los envió a Georgia deliberadamente para involucrar a Georgia en una provocación, declaró Aldamov."
 georg_chech.1.a: "Necesitamos estabilizar la situación."
 georg_chech.2.t: "Reunión de funcionarios georgianos y rusos."
 georg_chech.2.d: "Recientemente, en el marco de la solución de la cuestión de la presencia de combatientes chechenos en las gargantas fronterizas entre Georgia y la Federación Rusa, se celebró una reunión de políticos georgianos y rusos. Georgia pidió ayuda para resolver el problema, a pesar de los conflictos anteriores. Georgia pide la presencia de fuerzas de paz rusas, así como asistencia en materia de apoyo diplomático a Georgia."
 georg_chech.2.a: "Esperemos que nos ayuden."
 georg_chech.2.b: "Por supuesto, los terroristas deben ser capturados."
 georg_chech.2.c: "Tendrán que depender de sí mismos."
 georg_chech.3.t: "Rusia envía ayuda"
 georg_chech.3.d: "Rusia accedió a enviarnos ayuda para capturarlos y enviarlos de vuelta a Rusia."
 georg_chech.3.a: "Decidamos qué hacer a continuación..."
 GEO_chech_future_help_TT: "¡Los chechenos podrían ayudarnos en el futuro a cambio de ayuda!"
 GEO_chech_will_not_future_help_TT: "¡Los boeviks chechenos serán hostiles hacia nosotros por no rescatarlos!"
 georg_chech.4.t: "Georgia no entrega a los boeviks chechenos a Rusia."
 georg_chech.4.d: "Para sorpresa de las autoridades rusas, Georgia ha declarado que no puede entregar a todos los combatientes chechenos a Rusia por diversas razones. Algunos afirman que han decidido deportarlos a terceros países o juzgarlos en el propio país. Georgia ha entregado sólo a unos pocos combatientes menores, pero sus líderes siguen en las cárceles georgianas."
 georg_chech.4.a: "Serán útiles en el futuro..."
 georg_chech.4.b: "Estás jugando con fuego, Eduard."
 georg_chech.4.c: "Lo más importante es que las fronteras ahora están seguras."
 georg_chech.5.t: "Georgia entrega a los boeviks chechenos a Rusia."
 georg_chech.5.d: "Georgia afirma haber entregado a todos los combatientes chechenos a Rusia por razones mutuamente beneficiosas de seguridad y estabilidad en la región. Inicialmente, Georgia solo entregó algunos combatientes menores, pero ahora los líderes ya han sido enviados a juicio en Rusia."
 georg_chech.5.a: "Esperemos que les guste nuestro esfuerzo."
 georg_chech.5.b: "Las relaciones georgiano-rusas deberían fortalecerse."
 georg_chech.5.c: "¿Eh? ¿Qué...? No nos importa."
 GEO_chechsns_pankis_idea: "Boeviks chechenos en los desfiladeros fronterizos"
 georg_chech.6.t: "Georgia inicia una misión diplomática."
 georg_chech.6.d: "Casi al mismo tiempo que comenzaba la operación militar de los EE.UU. y Gran Bretaña en Afganistán (el comienzo de la guerra contra el terrorismo), en la zona de enfrentamiento entre Abjasia y Georgia estalló un conflicto armado. Desde el desfiladero de Kodori, que pertenece a Abjasia pero está controlado por Georgia, destacamentos combinados de partisanos georgianos y militantes del Cáucaso Norte descendieron al territorio controlado por Sujumi. Las tropas se están acercando a las fronteras entre Abjasia y Georgia. El parlamento georgiano exigió la retirada de las fuerzas de paz rusas de la zona de conflicto, mientras que Abjasia, a su vez, anunció que solicitaría su incorporación a Rusia: la fase armada. Intentaremos discutir este tema con el representante de Abjasia en Moscú, Igor Akhba, el parlamentario georgiano Hamlet Chipashvili y el corresponsal en Tbilisi, Yuri Vachnadze. Así pues, en el desfiladero de Kodori se están librando verdaderas batallas y surgen varias preguntas a la vez. El desfiladero de Kodori pertenece geográficamente a Abjasia, pero hasta hace poco estaba controlado por Georgia. Habla el representante de Abjasia en Moscú, Igor Akhba."
 georg_chech.6.a: "Kviciani y Gelaev, por supuesto..."
 georg_chech.6.b: "Preparémonos un acuerdo mutuo."
 georg_chech.6.c: "En realidad no nos importa mucho."
 GEO_geopolice: "Policía de Georgia"
 GEO_geopolice_desc: "El Gobierno de Georgia aumentará rápidamente el presupuesto de la policía en un intento por restablecer el orden."
 GEO_bring_back_order: "Restablecer el orden"
 GEO_bring_back_order_desc: "El aumento de la financiación de la policía ha solucionado la situación interna de delincuencia y terrorismo. Los empresarios de todo el país están muy agradecidos de que se haya resuelto la situación. Se ha restablecido el orden en las calles de Georgia."
 GEO_internal_affairs: "Asuntos internos"
 GEO_internal_affairs_desc: "Has abordado con éxito toda la corrupción policial dentro del país. Cientos de agentes de policía han tenido que ser reemplazados, lo que ha supuesto una pérdida de personal para tu país."
 GEO_recruit_more_men: "Contratar más hombres"
 GEO_recruit_more_men_desc: "Has reclutado con éxito a más hombres para unirse a la fuerza policial, reduciendo el nivel promedio de corrupción y aumentando la estabilidad."
 GEO_vozmest_nedobor: "Reforma de la policía en las regiones"
 GEO_vozmest_nedobor_desc: "Has organizado con éxito varios eventos de reclutamiento en las principales ciudades de Georgia, y has recibido una afluencia de solicitudes. El estado ahora se considera en su mayor parte seguro, pero esto te costará y aumentará tu estabilidad general."
 GEO_geopolice_game: "Juego de Geopolice"
 GEO_geopolice_game_desc: "La nueva y mejorada fuerza policial de Georgia ha logrado combatir la delincuencia, las estadísticas ahora muestran que los georgianos tienen más probabilidades de cumplir la ley, respetar a los demás y mantener la paz. Somos el Sueño Georgiano."
 GEO_Military_desc: "Comienza la reforma masiva del Ejército de Georgia."
 GEO_Geo_air_mil_desc: "Comienza la reforma de la Fuerza Aérea de Georgia."
 GEO_Geo_navy_mil_desc: "Comienza la reforma de la Marina de Georgia."
 georg_military.1.t: "Reforma del Ejército de Georgia"
 georg_military.1.d: "Georgia ha llevado a cabo con éxito la reforma de su Ejército; ha habido una afluencia de reclutas que se han alistado para defender el glorioso país."
 georg_military.1.a: "Estás satisfecho con el resultado."
 georg.1243.t: "Georgia exige la retirada de las fuerzas rusas"
 georg.1243.d: "A la luz de los acontecimientos recientes, el gobierno de Georgia ha enviado un aviso a nuestro gobierno exigiendo una retirada formal de todo nuestro personal militar del país. Las demandas también incluyen el desmantelamiento de todas las bases militares que pertenecen y son operadas por nuestro ejército, las Fuerzas Armadas Rusas. Nuestras fuerzas han sido trasladadas de sus puestos y están siendo enviadas de regreso a través de nuestra frontera con Georgia."
 georg.1243.a: "Una circunstancia desafortunada"
 georg.1244.t: "Confiscar las antiguas bases aéreas soviéticas y sus activos en nuestro territorio."
 georg.1244.d: "Hoy, las Fuerzas Armadas de Georgia atacaron y recuperaron antiguas bases aéreas soviéticas, tomando todos los activos que quedaban."
 georg.1244.a: "¡Las tomaremos!"
