 GEO_ally_with_mafia: "Herencia Nacional"
 GEO_ally_with_mafia_desc: "¡La Herencia Nacional debe ser recordada por nuestra gran nación! Una vez fuimos grandes, ¡así que seremos nuevamente!"
 GEO_military_junta: "Integrar la Policía en el Ejército"
 GEO_military_junta_desc: "En nuestra sociedad militarista no necesitamos ninguna fuerza policial independiente. Nuestra política interna debe basarse en un control y orden unificados."
 GEO_georgian_spirit: "Espíritu Georgiano"
 GEO_georgian_spirit_desc: "El Espíritu Georgiano será conocido en todo el mundo cuando recuperemos lo que se perdió, ¡ja!"
 GEO_local_geopolitics: "Geopolítica Local"
 GEO_local_geopolitics_desc: "Necesitamos ser más independientes que nunca, ¡huaahaha!"
 GEO_empower_church: "Fortalecer la Iglesia"
 GEO_empower_church_desc: "Fortalecer la Iglesia es muy bueno para nuestro gobierno y nuestra sociedad para que sean saludables."
 GEO_ss_mhedrioni: "Kartvel Tskhenosanta Legioni"
 GEO_ss_mhedrioni_desc: "Necesitamos crear una legión compuesta por falangistas internacionales y fanáticos nacionalistas georgianos domésticos."
 GEO_ordnungstaat: "Estado de Orden"
 GEO_ordnungstaat_desc: "Georgia es, de hecho, un estado de orden y obediencia absoluta y nuestro pueblo nos apoya."
 GEO_monarchist_council: "Consejo Monárquico"
 GEO_monarchist_council_desc: "El Consejo Monárquico debería decidir quién será el líder de Georgia..."
 georg.24.t: "Gran Debate"
 georg.24.d: "¿Quién liderará a Georgia en el futuro? Esta pregunta ha surgido recientemente. Hablando de herencia nacional, ¿no sería genial traer a los Bagrationis para gobernar Georgia de nuevo?"
 georg.24.a: "¡Viva el rey!"
 georg.24.b: "Yoseliani debería ser el Gobernante Supremo y el Rey de toda Georgia."
 GEO_stance_on_abkaz_osset: "Preparémonos"
 GEO_stance_on_abkaz_osset_desc: "Piensa..."
 georg.25.t: "¡Georgia nos invita a una alianza!"
 georg.25.d: "¡Georgia nos invita a su alianza para luchar contra nuestros enemigos mutuos!"
 georg.25.a: "¡Claro!"
 georg.25.b: "No, gracias."
 GEO_yos_warl_abk_oss: "Aplastar las Pseudorrepúblicas"
 GEO_yos_warl_abk_oss_desc: "Las llamadas repúblicas de Abjasia y Osetia del Sur no son más que marionetas rusas que ocupan territorio georgiano. Mediante la fuerza militar, restauraremos nuestra integridad territorial y devolveremos estas regiones separatistas al control de Tiflis."
 GEO_yos_federal_abk_oss: "Federalizar Georgia"
 GEO_yos_federal_abk_oss_desc: "En lugar de aplastar los movimientos separatistas por medios militares, podemos ofrecer a Abjasia y Osetia del Sur una auténtica autonomía dentro de un estado georgiano federalizado. Esta vía puede preservar la unidad, respetando al mismo tiempo las identidades regionales."
 GEO_befriend_nat_nobody: "Por nuestra cuenta"
 GEO_befriend_nat_nobody_desc: "Georgia ha estado atrapada entre grandes potencias durante siglos. Quizás sea hora de que tracemos nuestro propio rumbo, sin depender ni de Oriente ni de Occidente, sino de nuestra propia fuerza e independencia."
 GEO_befriend_nat_azeris: "Acercarse a Azerbaiyán"
 GEO_befriend_nat_azeris_desc: "Azerbaiyán y Georgia comparten profundos vínculos históricos e intereses comunes en la región del Cáucaso. Al fortalecer nuestra relación con Bakú, podemos crear una poderosa alianza para contrarrestar las amenazas regionales."
 GEO_befriend_nat_armenia: "Hacer amistad con Armenia"
 GEO_befriend_nat_armenia_desc: "A pesar de las tensiones históricas, Armenia y Georgia enfrentan desafíos similares por parte de vecinos más grandes. Una alianza con Ereván podría brindar seguridad mutua y beneficios económicos para ambas naciones."
 GEO_support_armenian_monarchists: "Apoyar a los Monárquicos Armenios"
 GEO_support_armenian_monarchists_desc: "Al apoyar la restauración de la monarquía armenia, podemos forjar una poderosa alianza dinástica entre nuestros dos antiguos reinos cristianos del Cáucaso."
 GEO_befriend_nat_russia: "Hacer amistad con Rusia"
 GEO_befriend_nat_russia_desc: "Rusia ha sido vecina y soberana de Georgia durante siglos. En lugar de resistirse a la influencia de Moscú, quizás la conciliación y la amistad con la Federación Rusa sean el camino hacia la estabilidad y la prosperidad."
 GEO_alliance_armeniA_NAT: "Aliarse con Armenia"
 GEO_befriend_nat_west: "Hacer amistad con Estados Unidos"
 GEO_befriend_nat_west_desc: "Estados Unidos representa el orden democrático liberal al que Georgia aspira a unirse. Al alinearnos con Washington y buscar la integración occidental, aseguramos nuestro futuro en la OTAN y la comunidad europea."
 GEO_alliance_azeri: "Aliarse con Azerbaiyán"
 GEO_alliance_azeri_desc: "Una alianza militar formal con Azerbaiyán consolidará nuestra asociación estratégica y creará un bloque poderoso en el Cáucaso capaz de resistir la presión rusa e iraní."
 GEO_crush_both: "Aplastarlos a ambos"
 GEO_crush_nat_armeni: "Comerse a Somekhia"
 GEO_crush_nat_azeri: "Tragar a Arran"
 GEO_integrat_armen: "Alimentarlos con Khinkali"
 GEO_integrat_meskheti: "Alimentarlos con Khachapuri"
 GEO_crush_northcauc: "Tomar el Cáucaso Norte"
 GEO_crush_northcauc_desc: "Los pueblos del Cáucaso Norte han estado oprimidos bajo el dominio ruso durante demasiado tiempo. Como líder natural de la región del Cáucaso, Georgia debe liberar a nuestros hermanos de las montañas y unir al Cáucaso bajo una sola bandera."
 GEO_crush_turk: "Aplastar a Turquía"
 GEO_crush_turk_desc: "Durante siglos, el Imperio Otomano oprimió a Georgia y a nuestros hermanos cristianos. Ahora, debilitada, Turquía es vulnerable. Recuperaremos nuestros territorios históricos y vengaremos las injusticias del pasado."
