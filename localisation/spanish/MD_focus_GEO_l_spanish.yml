 GEO_flag_chose_peace: "Elegimos dar un paso atrás"
 georg_war2008.3.t: "Voluntarios ucranianos en Georgia"
 georg_war2008.3.d: "Muchos voluntarios ucranianos del ejército y veteranos militares de la organización UNA-UNSO decidieron responder al llamado de ayuda de Georgia y se unieron a las Fuerzas Armadas georgianas, creando batallones de voluntarios."
 georg_war2008.3.a: "Interesante"
 georg_war2008.3.b: "¡Maravilloso!"
 georg_war2008.4.t: "Voluntarios chechenos en Georgia."
 georg_war2008.4.d: "Muchos combatientes chechenos de la libre Ichkeria decidieron unirse al lado de Georgia y crear batallones en el ejército georgiano."
 georg_war2008.4.a: "Ugh, traidores."
 georg_war2008.4.b: "¡Maravilloso!"
 georg_war2008.5.t: "Georgia propone un acuerdo."
 georg_war2008.5.d: "Georgia quiere ofrecernos un acuerdo completo sobre Abjasia y Osetia del Sur, en virtud del cual renunciará a sus reivindicaciones y reconocerá a las repúblicas no reconocidas. Esto es bueno, por supuesto, pero no debemos permitir que Georgia ingrese a la OTAN después de eso..."
 georg_war2008.5.a: "Estamos de acuerdo, pero necesitamos concesiones."
 georg_war2008.6.t: "Georgia nos advierte sobre una operación especial."
 georg_war2008.6.d: "Georgia nos advierte de que ha decidido llevar a cabo una operación militar en el territorio de Osetia del Sur. Prometen no atacar a nuestras fuerzas de paz a cambio de nuestra no intervención. Sin embargo, sin ningún motivo aparente, ya han comenzado a bombardear un campamento militar cerca de Tsjinvali. Nuestro país garantiza la seguridad de Osetia del Sur; tal vez deberíamos intervenir y dar una lección a los georgianos."
 georg_war2008.6.a: "¡Acaben con los sobrevivientes!"
 georg_war2008.6.b: "Dejemos Osetia..."
 georg_war2008.7.t: "¡Exitosa Operación Tigre!"
 georg_war2008.7.d: "Georgia anexa Osetia."
 georg_war2008.7.a: "Ja-ja."
 georg_war2008.8.t: "Paz forzada..."
 georg_war2008.8.d: "Nada cambia"
 georg_war2008.8.a: "Ah."
