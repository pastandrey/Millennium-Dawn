 GEO_belluh: "Bell-uh"
 GEO_belluh_desc: "Has adquirido con éxito 25 helicópteros de transporte Bell-uh estadounidenses de 1965."
 GEO_dolphin_desc: "Has adquirido con éxito 15 cazas de ataque Dolphin checos."
 GEO_albatros_desc: "Has adquirido con éxito 15 cazas de ataque Albatros checos."
 GEO_yak52_desc: "Has adquirido con éxito 15 aviones de ataque Striker rusos Yak-52."
 GEO_air_reforms_desc: "Has llevado a cabo con éxito la reforma de la Fuerza Aérea de Georgia y has aumentado la estabilidad dentro del país."
 GEO_west_avia_inst_desc: "Tú y Occidente participan en ejercicios conjuntos de combate aéreo, aumentando tu experiencia y durabilidad en el aire."
 GEO_restructure_vvs_desc: "El Ministerio de Defensa comienza a reformar el presupuesto de gasto de la Fuerza Aérea de Georgia."
 GEO_new_methods_desc: "La Fuerza Aérea de Georgia comienza ejercicios de entrenamiento masivo en un intento de fortalecer sus habilidades."
 georg.234.t: "Juego de Geopolice"
 georg.234.d: "El juego es GRATUITO y en georgiano, pero es bastante intuitivo de jugar. Hay 3 niveles: 1 investigación, 1 rompecabezas, 1 shooter en primera persona, 1 nivel de huevo de Pascua. Los niveles se pueden jugar en cualquier orden, con múltiples opciones y formas de resolver los acertijos. Los enlaces de descarga del juego se presentan a continuación. ISO del juego: Stormbringerstudios.com Parche: Stormbringerstudios.com"
 georg.234.a: "¡Disfruta del juego!"
 GEO_comcivilwar_TT: "¡Los comunistas comenzarán una guerra civil en Georgia!"
 stalin_legacy_TT: "§YGeorgia reconstruirá el legado de Stalin§!"
 GEO_polt_crisis_aknowl: "polt_crisis_aknowl"
 GEO_polt_crisis_aknowl_desc: "oh, priznal"
 georgian_perseverance: "Espíritu de Mkhedruli"
 georgian_perseverance_desc: "Los georgianos han existido en el Cáucaso durante siglos y pudieron seguir su propio camino. Algunos vecinos se van, otros van al lado de nosotros. Pero los georgianos siguen donde están."
 GEO_russian_spies_idea: "Miedo a los espías rusos"
 GEO_police_chaos_idea: "Caos policial"
 GEO_police_chaos_idea_desc: "Georgia tiene una fuerza policial muy desenfrenada. De hecho, está presente de forma muy formal. El bandidaje florece. Es hora de cambiar eso."
 GEO_political_opposition: "Fuerte oposición política"
 GEO_political_opposition_weak: "Oposición política débil"
 GEO_gaz_problems: "Falta de gas natural"
 GEO_gaz_problems_desc: "La falta de gas natural, procedente de nuestras propias reservas nacionales o de importaciones, está provocando actualmente problemas generalizados en el país."
 GEO_energy_problems: "Problemas de electricidad"
 GEO_energy_problems_desc: "La falta de gas está provocando importantes problemas en el bienestar de nuestros ciudadanos."
 geo_non_demo_path_TT: "§Y¡Georgia tomará un camino no democrático!§!"
 geo_demo_path_TT: "§Y¡Georgia tomará un camino democrático!§!"
 GEO_raskol_soyuz_gruz: "División del partido de Shevardnadze"
 GEO_raskol_soyuz_gruz_desc: "La división en el partido de Shevardnadze parecía inevitable... A partir de ahora, el apoyo significativo a Shevardnadze ha disminuido. Sin embargo, los partidos pro-occidentales están creciendo."
 geo_demo_path_2_TT: "§G¡Georgia seguirá su camino democrático!§!"
 geo_no_revol_dem_TT: "§G¡Intentaremos detener la guerra civil!§!"
 GEO_revive_mhedrioni: "§O¡Revive a Mhedrioni!§!"
 GEO_revive_mhedrioni_desc: "Mkhedrioni era un grupo paramilitar en la República de Georgia, conocido por su participación destacada en la Guerra Civil de Georgia y la Guerra en Abjasia. Fue ilegalizado desde 1995, pero posteriormente se reconstituyó como el partido político de la Unión de Patriotas. Sin embargo, al no lograr el registro, pronto cayó en el olvido. Ahora debemos traerlos de vuelta para asegurar el gobierno militar."
 GEO_revive_high_council: "Restaurar el Consejo Supremo de Georgia"
 GEO_revive_high_council_desc: "¿Por qué necesitamos un parlamento y fragmentación interna, si podemos convocar a un consejo supremo que administre los asuntos internos del estado de la manera que necesitamos?"
 GEO_puppet_shervad: "Marioneta Shevardnadze"
 GEO_puppet_shervad_desc: "Hubo una vez en la que, frente a la estabilización del gobierno, apoyamos y pusimos a Eduard para gobernar el país. Ahora el país está en caos nuevamente. El consejo debería convertir a Shervad en una marioneta, mientras se mantiene el verdadero poder..."
 GEO_iron_hand_georgia: "Mano de Hierro de Georgia"
 GEO_iron_hand_georgia_desc: "Todos los problemas en Georgia provienen de la falta de una mano de hierro en este país, que unirá al pueblo y traerá orden a nuestra sociedad."
 GEO_diplomatic_president: "Eduard Shevardnadze"
 georg_militar.1.t: "¡Golpe militar en Georgia!"
 georg_militar.1.d: "Recientemente, se produjo un golpe militar en Georgia. El mando supremo del ejército se hizo cargo del gobierno de Georgia. Veamos a dónde nos lleva esto."
 georg_militar.1.a: "¡Adelante!"
 georg_militar.2.t: "Djaba Yoseliani tiene poder en Georgia"
 georg_militar.2.d: "Djaba Yoseliani tiene poder en Georgia. Él y su consejo mafioso/militar residen ahora en el presidium gubernamental de Georgia. ¿Qué hará a continuación?"
 georg_militar.2.a: "Sainteresoa."
 GEO_empower_yoseliani: "Empoderar a Yoseliani"
 GEO_empower_yoseliani_desc: "Solo Yoseliani puede tomar el control de este país e identificar las prioridades necesarias en el país debido a su autoridad y sus habilidades. Es hora de llevarlo al poder."
 geo_oppos_soft_TT: "§Y¡Seremos más suaves con la oposición!§!"
 geo_oppos_harsh_TT: "§Y¡Seremos más duros con la oposición!§!"
 GEO_question_of_abkhazosset: "Cuestión de Osetia y Abjasia"
 GEO_question_of_abkhazosset_desc: "La cuestión de Osetia y Abjasia debe discutirse finalmente. Debemos decidir qué hacer."
 GEO_militarism_TT: "§Y¡El culto al militarismo surgirá en Georgia!§!"
 GEO_seek_for_greater_georgia: "Buscar una Gran Georgia"
 GEO_seek_for_greater_georgia_desc: "Debemos construir una nueva idea en torno al deseo de construir una Gran Georgia. Esto debería convertirse en una nueva agenda, una nueva rutina. ¡La Gran Georgia es inevitable!"
 GEO_diplomatic_approach: "Enfoque diplomático eficiente"
 GEO_diplomatic_approach_desc: "Un enfoque diplomático eficiente es más preferible para nuestro nuevo gobierno. Debemos evitar que la burocracia impida que nuestros planes se hagan realidad."
 GEO_reketir_opposition: "Extorsionar a la oposición"
 GEO_reketir_opposition_desc: "¿Por qué involucrarse en conversaciones constantes con la oposición, si nuestros movimientos callejeros y nuestras pandillas pueden extorsionarlos y obligarlos a someterse?"
 georg.3.t: "Georgia solicita acuerdo de cooperación."
 georg.3.d: "Georgia nos pide que no planteemos la cuestión de Javakhk, a cambio de una cooperación mutua en diversos campos y un tratado integral de amistad. ¿Cómo les responderemos?"
 georg.3.a: "Por supuesto"
 georg.3.b: "Lo siento, no"
