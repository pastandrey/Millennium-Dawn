 GEO_kick_russian_troops_desc: "Nuestras fuerzas armadas necesitan urgentemente una reforma tras las lecciones aprendidas en los conflictos contra Osetia del Sur y Abjasia. Proporcionar financiación adicional y contactar con apoyo extranjero, aliados o socios económicos son muchas maneras de reformar nuestras grandes fuerzas armadas y optimizarlas para el futuro."
 GEO_us_helis_desc: "Has ordenado con éxito 20 helicópteros de ataque estadounidenses."
