 GEO_hydroelectric_plant_decision_category: "[GEO.GetFlag] [GEO.GetAdjective] Proyectos Hidroeléctricos"
 GEO_hydroelectric_plant_decision_category_desc: "Nuestro hermoso país es rico en recursos naturales, y los ríos que fluyen desde las montañas no son la excepción. Esto nos brinda una oportunidad única para construir presas y centrales hidroeléctricas adicionales para complementar nuestra anticuada infraestructura energética."
 GEO_expand_the_khudoni_hydro_power_plant: "Amplíen la §YCentral Hidroeléctrica de Khudoni§!"
 GEO_expand_the_khudoni_hydro_power_plant_desc: "La ampliación de la central hidroeléctrica de Khudoni en el río Enguri proporcionará una importante capacidad de generación de electricidad y fortalecerá la infraestructura energética de Georgia en el montañoso noroeste."
 GEO_zhoneti_hydro_power_plant: "Construyamos la §YCentral Hidroeléctrica de Zhoneti§!"
 GEO_zhoneti_hydro_power_plant_desc: "El proyecto hidroeléctrico en cascada de Zhoneti aprovechará el potencial energético de los ríos de montaña del este de Georgia, proporcionando electricidad limpia y renovable y apoyando la independencia energética regional."
 GEO_vardnili_hydro_power_plant: "Construyamos la §YCentral Hidroeléctrica de Vardnili§!"
 GEO_vardnili_hydro_power_plant_desc: "Ubicado en la cuenca del río Alazani, el proyecto hidroeléctrico Vardnili contribuirá a la cartera de energía renovable de Georgia y reducirá la dependencia de la electricidad importada durante los períodos de máxima demanda."
 GEO_tvishi_hydro_power_plant: "Construyamos la §YCentral Hidroeléctrica Tvishi§!"
 GEO_tvishi_hydro_power_plant_desc: "La central hidroeléctrica de Tvishi, en el río Tskhenistskali, representa una importante inversión en la infraestructura energética de Georgia, aprovechando la pendiente natural de los ríos de montaña del oeste de Georgia."
 GEO_shuakhevi_hydro_power_plant: "Construyamos la §YCentral Hidroeléctrica de Shuakhevi§!"
 GEO_shuakhevi_hydro_power_plant_desc: "El proyecto en cascada Shuakhevi en la región de Adjara utilizará el terreno montañoso escarpado para generar energía renovable, apoyando tanto la seguridad energética nacional como el desarrollo económico regional."
 GEO_samtskhe_javakheti_hydro_power_plant: "Construyamos la §YCentral Hidroeléctrica de Samtskhe-Javakheti§!"
 GEO_samtskhe_javakheti_hydro_power_plant_desc: "El desarrollo de la capacidad hidroeléctrica en la región de Samtskhe-Javakheti traerá infraestructura moderna a esta zona históricamente subdesarrollada y aprovechará al mismo tiempo los abundantes recursos hídricos de la región."
 GEO_nenskra_hydro_power_plant: "Construyamos la §YCentral Hidroeléctrica de Nenskra§!"
 GEO_nenskra_hydro_power_plant_desc: "El proyecto hidroeléctrico Nenskra en Svaneti es uno de los mayores proyectos energéticos planificados de Georgia y promete una importante generación de electricidad para satisfacer la creciente demanda interna y el potencial de exportación."
 GEO_namakhvani_hydro_power_plant: "Construyamos la §YCentral Hidroeléctrica de Namakhvani§!"
 GEO_namakhvani_hydro_power_plant_desc: "La cascada Namakhvani en el río Rioni aprovechará una de las principales vías fluviales del oeste de Georgia y proporcionará una importante capacidad hidroeléctrica para reducir la dependencia de la generación de energía térmica."
 GEO_dariali_hydropower_plant: "Construyamos la §YCentral Hidroeléctrica de Dariali§!"
 GEO_dariali_hydropower_plant_desc: "Ubicada cerca de la carretera militar georgiana en la región de Kazbegi, la central hidroeléctrica de Dariali aprovechará la pronunciada pendiente del río Tergi para generar energía limpia para las regiones del norte de Georgia."
 GEO_tiblisis_gambit_decision_category: "La Jugada de Tiflis"
 GEO_tiblisis_gambit_decision_category_desc: "Georgia ha tomado la decisión de intentar recuperar su tierra."
 geo_misc.100.t: "Incidente Radiológico de Lia"
 geo_misc.100.d: "A principios de esta semana se informó que a tres hombres de la localidad de Lia se les había diagnosticado el Síndrome de Radiación Aguda (SRA). Estaban recogiendo leña en un bosque con vistas al embalse de la presa de Enguri cuando se toparon con un generador termoeléctrico de radioisótopos abandonado desde la caída de la Unión Soviética. Intentaron recuperarlo ellos mismos, pero sufrieron intoxicación por altas dosis de radiación, lo que provocó la muerte de uno de ellos y enfermedades graves en los otros dos."
 geo_misc.100.a: "Respetos a las familias."
 GEO_nationalized_gold_reserves_idea_tt: "Ingreso Adicional: $$§G0.175§!"
 GEO_nationalized_gold_reserves_idea: "Reservas de Oro Nacionalizadas"
 GEO_nationalized_gold_reserves_idea_desc: "Para mantener nuestra soberanía nacional, debemos nacionalizar las reservas de oro que otras naciones poseen en nuestro país. Sin embargo, si alguna vez nos subyugan, podríamos perder el control de nuestras preciadas reservas..."