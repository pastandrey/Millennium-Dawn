 GEO_radical_antirussian_rhetoric: "Retórica antirrusa radical"
 GEO_radical_antirussian_rhetoric_desc: "Rusia siempre ha querido esclavizar nuestro país, ¡debemos resistir eso y difundir la palabra!"
 GEO_legacy_of_rose_revol: "Legado de la Revolución de las Rosas"
 GEO_legacy_of_rose_revol_desc: "Debemos abrazar el legado de la Revolución de las Rosas y tomarlo como un ejemplo de cómo se debe hacer la política real."
 GEO_reformation_of_armedforces_nat: "Reforma de las Fuerzas Armadas"
 GEO_reformation_of_armedforces_nat_desc: "Nuestras Fuerzas Armadas necesitan un cambio significativo. El estado actual de nuestro ejército no cumple con nuestra visión."
 GEO_moderate_right_wing: "Preservar el conservadurismo social"
 GEO_moderate_right_wing_desc: "Nuestras tradiciones sociales y nuestra forma de vida en general deben ser preservadas para las futuras generaciones. Es lo que nos hace ser nosotros mismos."
 GEO_mistakes_of_prevgov: "Errores del gobierno anterior"
 GEO_mistakes_of_prevgov_desc: "Los errores del gobierno anterior deben tenerse en cuenta para asegurar la prosperidad de Georgia en el futuro."
 GEO_allance_geo_patrio: "Alianza de Patriotas Georgianos"
 GEO_allance_geo_patrio_desc: "La Alianza de Patriotas Georgianos representa una facción nacionalista prorrusa que busca reorientar a Georgia lejos de la integración occidental y hacia una cooperación más estrecha con la Comunidad de Estados Independientes."
 GEO_proeastern_nationalist: "Giro de 360 grados de Kvitsiani"
 GEO_proeastern_nationalist_desc: "Kvitsiani tiene su propia idea de cómo debería ser Georgia. Tal vez tenga razón..."
 GEO_prorussian_country: "Postura pro-rusa"
 GEO_prorussian_country_desc: "Rusia es realmente nuestro amigo y hermano mayor. Siempre deberíamos estar de su lado."
 GEO_social_conservatism: "Conservadurismo social"
 GEO_social_conservatism_desc: "Nuestras tradiciones sociales y nuestra forma de vida en general deben ser preservadas para las futuras generaciones. Es lo que nos hace ser nosotros mismos."
 GEO_dem_dvizh_edgruz: "Movimiento Democrático - Georgia Unida"
 GEO_proeastern_reactionary: "Nino Burjanadze"
 GEO_proeastern_reactionary_desc: "Nino Burjanadze tiene un plan para una Georgia nueva y orientada de manera pragmática."
 GEO_deepen_rus_coop: "Profundizar la cooperación con Rusia"
