 geo_misc.8.b: "¡Vete al diablo!"
 GEO_armenian_proposal_com: "Propuesta para Armenia"
 GEO_money_from_outside_desc: "Las recientes negociaciones comerciales han dado sus frutos, ya que Georgia ha finalizado su adhesión a la Organización Mundial del Comercio. La plena adhesión a la OMC facilitará el desarrollo económico y brindará acceso a acuerdos comerciales favorables que beneficiarán a nuestro país."
 GEO_transit_tax_desc: "¿Qué sucederá si obtenemos dinero de los inmigrantes?"
 GEO_tax_reforms_desc: "Podemos hacer buenas reformas fiscales y obtener dinero para hacer crecer nuestro país."
 GEO_tax_amnisty_2004_desc: "Tenemos muchos evasores fiscales en nuestro país, como resultado, no obtenemos suficiente dinero para financiar nuestro país. Deberíamos retirar los cargos en su contra para que se sientan seguros al pagar impuestos nuevamente y así poder obtener mucho más dinero."
 GEO_ask_west_for_help_desc: "Si nos ponemos en contacto con la Unión Europea y con nuestros amigos de la Unión Europea, podríamos intentar convencerlos para que nos apoyen."
 GEO_kulev_terminal_desc: "Invertiremos dinero en construir una terminal de petróleo y obtendremos más dinero a cambio."
 GEO_polminmeet_desc: "Trabajar con Polonia nos permitirá profundizar nuestras relaciones diplomáticas en Europa y ampliar nuestra creciente lista de amigos en países extranjeros."
 geo_misc.9.t: "Propuesta de compromiso de Djavakhq"
 geo_misc.9.d: "[FROM.GetName] ha propuesto una propuesta de paz sobre la cuestión de Djavakhq. La solución propuesta es permitir a los armenios cierto grado de autonomía. Teorizan que evitará que los armenios se sientan no representados en el gobierno y permitirá al gobierno georgiano la capacidad de retener el control sobre sus territorios. ¿Cómo respondemos? ¿Estamos dispuestos a sentarnos a la mesa de negociaciones?"
 geo_misc.9.a: "La autonomía resolvería el problema."
 geo_misc.9.b: "¿Estás bromeando? ¡Djavakhq debería ser libre!"
 geo_misc.9.c: "Estamos listos para comenzar las conversaciones sobre el aumento de la autonomía..."
 geo_misc.9.d1: "¡Samtskhe-Djavakheti nos pertenece legítimamente!"
 geo_misc.10.t: "Aumento de la autonomía en Djavakheti."
 geo_misc.10.d: "Ahora ha llegado el momento de firmar finalmente la resolución. Djavakheti obtendrá un estatus de autonomía religiosa, cultural y lingüística. ¿Vamos a dar el siguiente paso?"
 geo_misc.10.a: "Estamos de acuerdo con estos términos."
 geo_misc.10.b: "Estamos dispuestos a otorgar un estatus especial."
 geo_misc.11.t: "Propuesta de la RSS de Georgia"
 geo_misc.11.d: "Los socialistas georgianos proponen un acuerdo para la unificación de nuestros países. ¿Qué debemos hacer?"
 geo_misc.11.a: "¡Los capitalistas enmascarados de rojo no nos esclavizarán!"
 geo_misc.11.b: "Tal vez por el bien del octubre rojo..."
 GEO_no_towest_infl_desc: "Al rechazar los modelos económicos occidentales, Georgia se centrará en la expansión industrial controlada por el Estado y en la movilización de recursos para construir una economía autosuficiente libre de la influencia capitalista."
 GEO_friendship_with_russia_desc: "El fortalecimiento de los lazos diplomáticos y económicos con Rusia representa un enfoque pragmático para la estabilidad regional, abriendo canales para la cooperación a pesar de los conflictos pasados."
 GEO_osetabkh_com_desc: "Bajo la influencia soviética, Georgia reintegrará a Osetia del Sur y Abjasia como repúblicas títeres autónomas, resolviendo las disputas territoriales mediante el control político respaldado por Rusia en lugar de la fuerza militar."
 GEO_porvat_connections_desc: "Nuestro nuevo gobierno comunista debe establecer un fuerte aparato de seguridad interna y consolidar el control sobre las instituciones estatales para garantizar el éxito de la transformación revolucionaria."
 GEO_government_reform_com_desc: "La movilización económica bajo los principios comunistas requiere planificación centralizada, control estatal de la producción y la eliminación de las estructuras económicas burguesas que han frenado el desarrollo georgiano."
 GEO_intervene_in_azerbaijan_desc: "La revolución comunista debe extenderse más allá de las fronteras de Georgia: apoyando a las fuerzas revolucionarias en Azerbaiyán, podemos establecer una nueva federación transcaucásica bajo principios socialistas."
 GEO_ally_tocomarmenia_desc: "La Armenia comunista comparte nuestra visión ideológica para la región del Cáucaso, y el fortalecimiento de los lazos diplomáticos creará un frente socialista unido contra las fuerzas reaccionarias."
 GEO_rel_question_com_desc: "La Iglesia Ortodoxa Georgiana tiene profundas raíces históricas en nuestra sociedad, y debemos abordar con cuidado la relación entre la ideología comunista y las instituciones religiosas tradicionales."
 GEO_suppress_oppos_com: "Suprimir la oposición"
 GEO_suppress_oppos_com_desc: "Los movimientos de oposición democráticos y burgueses amenazan la transformación revolucionaria de Georgia y deben ser reprimidos para garantizar el control total del Partido Comunista sobre la vida política."
 GEO_allow_religion_geo_desc: "En lugar de imponer un ateísmo estricto, podemos adoptar un enfoque pluralista que tolere la práctica religiosa mientras mantiene la supremacía del Partido Comunista, reduce las tensiones sociales y gana cierto apoyo popular."
 GEO_no_opium_for_people_desc: "La religión es el opio del pueblo: imponer el ateísmo estatal y eliminar la influencia del clero liberará las mentes georgianas de la superstición y acelerará la conciencia socialista."
 GEO_exapnd_com_party_desc: "La ampliación del número de miembros del Partido Comunista y la aplicación de un código ideológico integral garantizarán que los principios revolucionarios permeen todos los niveles de la sociedad y el gobierno georgianos."
 GEO_clearup_local_gov_desc: "Purgar a los gobiernos locales de oportunistas y reaccionarios fortalecerá el sistema comunista, mientras que la introducción de mecanismos de mercado limitados puede mejorar la eficiencia económica sin abandonar los principios socialistas."
 GEO_rodina_zakav_com_desc: "La Quinta Internacional representa el compromiso de Georgia con la solidaridad comunista global, apoyando a los movimientos revolucionarios y a los gobiernos socialistas en todo el Cáucaso y más allá."
 GEO_new_nep_desc: "Siguiendo el ejemplo de Lenin, una Nueva Política Económica introducirá una empresa privada limitada y mecanismos de mercado para revitalizar la agricultura y la producción en pequeña escala, manteniendo al mismo tiempo el control estatal de la industria pesada."
 GEO_help_othercommies_desc: "Georgia debe apoyar a los movimientos comunistas en todo el mundo brindándoles asistencia material e ideológica y difundiendo la conciencia revolucionaria a través de las fronteras internacionales."
 GEO_humvee_desc: "Estados Unidos nos vende vehículos utilitarios"
 GEO_the_conflict: "El conflicto"
 GEO_the_conflict_desc: "Este conflicto decidirá el futuro de Georgia. ¿Se reunirán o se fragmentarán aún más?"
 GEO_the_castle_doctrine_idea: "La Doctrina del Castillo"
 GEO_the_castle_doctrine_idea_desc: "Proteger el hogar nunca debería resultar en un castigo por parte de la ley. La doctrina del castillo es tan importante como el principio de preservación de la vida."
 GEO_askchina_desc: "China es actualmente el país socialista más grande del mundo y esperamos recibir ayuda de ellos."
 GEO_arm_help_com_desc: "Armenia es un vecino importante para nosotros y esperamos recibir ayuda de ellos."
 GEO_peaceful_revol_desc: "Todavía esperamos alcanzar nuestros objetivos pacíficamente."
 GEO_violentcom_revol_desc: "Cuando las palabras pierden su poder, la revolución violenta se convierte en la única opción."
 GEO_com_win_yes_desc: "Que los comunistas tomen el poder."
 GEO_leader_of_rev_desc: "¿Estamos preparados para una revolución radical?"
 GEO_our_path_desc: "Hemos elegido nuestro camino y el futuro está ante nosotros."
 GEO_accept_zsfsr_desc: "La ZSFSR es nuestro primer paso para restaurar la Unión Soviética"
 GEO_geo_railway_desc: "Reparar la deteriorada infraestructura ferroviaria de Georgia es esencial para el desarrollo económico y mejorará la conectividad en toda la región del Cáucaso."
 GEO_privatization_geo_desc: "La privatización de empresas estatales orientada al mercado atraerá inversión extranjera y mejorará la eficiencia económica, aunque requiere una gestión cuidadosa para prevenir la corrupción y el control oligárquico."
 GEO_give_to_our_guys_desc: "En lugar de una competencia en el mercado abierto, la privatización debería priorizar a las empresas georgianos leales y a los aliados políticos, consolidando el poder económico entre círculos de confianza."
 GEO_aboba_desc: "La reactivación de la infraestructura industrial de la era soviética de Georgia —incluidas las plantas metalúrgicas y las instalaciones manufactureras— generará empleo y crecimiento económico, aunque puede aumentar la corrupción a medida que se distribuyen los activos."
 GEO_rustavi_metal_desc: "La planta metalúrgica de Rustavi fue en su día una piedra angular de la industria soviética en Georgia, y la modernización de estas instalaciones permitirá recuperar la capacidad de fabricación pesada."
 GEO_chiaturmarganets_desc: "Las minas de manganeso de Chiatura contienen algunos de los depósitos más ricos del mundo, y la revitalización de esta industria generará ingresos por exportación y desarrollo industrial."
 GEO_enlarge_metal_extr_desc: "La ampliación de las capacidades de extracción y procesamiento de metales aumentará la producción de aluminio para la exportación a los mercados europeos, aunque requiere una inversión significativa."
 GEO_british_invest_desc: "La inversión británica en la industria georgiana, especialmente en los sectores metalúrgicos, aportará capital, experiencia y vínculos más fuertes al Reino Unido, a la vez que aumentará la influencia británica."
 GEO_parkfield_investment_desc: "Permitir que Parkfield y otros inversores privados controlen sectores económicos clave acelerará el desarrollo mediante regulaciones de mercado laxas y capital extranjero."
 GEO_leave_in_hands_of_gov_desc: "Mantener un control gubernamental estricto sobre sectores económicos clave preservará la autoridad estatal y evitará la explotación extranjera, incluso si eso desacelera el crecimiento del sector privado."
 GEO_unesco_bablo_desc: "La financiación de la UNESCO y la asistencia internacional para la preservación del patrimonio cultural proporcionarán recursos para el desarrollo tecnológico y al mismo tiempo impulsarán la reputación democrática de Georgia."
 GEO_foreign_planning_desc: "Los consultores internacionales y los expertos extranjeros en planificación pueden ayudar a Georgia a diseñar estrategias de desarrollo económico y reformas institucionales más eficaces."
 GEO_start_repair_work_desc: "El inicio de reparaciones integrales de infraestructura en todo Georgia mejorará la conectividad comercial y sentará las bases para un crecimiento económico sostenido."
 GEO_ties_with_scr_desc: "El fortalecimiento de los vínculos de transporte e infraestructura con la red ferroviaria del Cáucaso Sur beneficiará a Georgia, Armenia, Azerbaiyán y Rusia a través de una mejor conectividad regional."
 GEO_baku_supsa_desc: "El oleoducto Bakú-Supsa transporta crudo azerbaiyano a la costa georgiana del Mar Negro, generando ingresos por tránsito y fortaleciendo los lazos económicos con Azerbaiyán."
 GEO_vladikavkaz_kazbegi_desc: "El proyecto del oleoducto Vladikavkaz-Kazbegi conectará la infraestructura petrolera rusa y georgiana, aumentando la influencia rusa y generando ingresos por tránsito para ambas naciones."
 GEO_baku_erzurum_desc: "El gasoducto natural Bakú-Tiflis-Erzurum conecta los yacimientos de gas de Azerbaiyán con Turquía a través de Georgia, convirtiendo al país en un corredor energético crucial entre las regiones del Caspio y el Mediterráneo."
 GEO_partial_restoration: "Restauración parcial de iglesias"
 GEO_partial_restoration_desc: "La restauración parcial de las iglesias y monasterios históricos de Georgia fortalecerá la posición de las autoridades religiosas, mejorará la estabilidad y preservará el patrimonio cultural nacional."
 GEO_prepare_for_crisis2008_desc: "La implementación de reformas fiscales y la creación de reservas financieras ayudarán a Georgia a capear la inminente crisis financiera mundial de 2008 con una perturbación económica mínima."
 GEO_batumi_aero_desc: "La construcción de una base aérea moderna en Batumi mejorará las capacidades militares a lo largo de la costa del Mar Negro y fortalecerá la postura defensiva de Georgia."
 GEO_telavi_aero_desc: "La ampliación de la base aérea de Telavi en el este de Georgia mejorará las operaciones de la fuerza aérea y proporcionará profundidad estratégica contra posibles amenazas del norte."
 GEO_kutaisi_aero_desc: "El desarrollo de la base aérea de Kutaisi en la región capitalina de Georgia centralizará el mando de la fuerza aérea y proporcionará capacidades defensivas cruciales para el corazón del país."
 GEO_chechsns_pankis_idea_desc: "Militantes chechenos han establecido una presencia en el desfiladero de Pankisi, creando preocupaciones de seguridad a lo largo de la frontera norte de Georgia con Rusia."
 GEO_dop_programms_idea_desc: "Se están implementando programas adicionales para fortalecer la capacidad institucional y las estructuras de gobernanza de Georgia."
 GEO_pmc_help_idea: "Ayuda de PMC"
 GEO_pmc_help_idea_desc: "Los contratistas militares privados están brindando capacitación y experiencia a las fuerzas armadas georgianas, mejorando la preparación para el combate y las capacidades tácticas."
 GEO_russian_spies_idea_desc: "Las operaciones de inteligencia rusas en Georgia plantean una amenaza importante a la seguridad nacional y deben contrarrestarse mediante medidas de contrainteligencia reforzadas."
 GEO_adjara_unstable_desc: "La crisis de Adjaria ha creado inestabilidad política, ya que el gobierno autónomo de Aslan Abashidze se niega a reconocer la autoridad central de Tbilisi."
 GEO_adjara_unstable_2_desc: "El continuo desafío por parte de los dirigentes adjarianos amenaza la integridad territorial de Georgia y requiere una acción decisiva para resolverlo."
 GEO_adjara_unstable_3_desc: "El enfrentamiento con Adjara sigue sin resolverse, lo que genera una inestabilidad política y económica persistente en la región sudoeste de Georgia."
 GEO_expand_cis_influence_desc: "El fortalecimiento de los vínculos con la Comunidad de Estados Independientes aumentará la influencia rusa sobre la política georgiana y reducirá las perspectivas de integración occidental."
 GEO_expand_eu_influence_desc: "La integración a la Unión Europea alineará a Georgia con las instituciones occidentales, abriendo caminos para la cooperación económica y una eventual membresía."
 GEO_HES_of_geo_desc: "Invertir en centrales hidroeléctricas reducirá la dependencia de Georgia de los combustibles fósiles y proporcionará energía limpia y renovable, aunque puede perturbar la industria energética tradicional."
 GEO_ITERA_desc: "ITERA representa una alternativa alineada con Occidente al monopolio del gas ruso Gazprom, ofreciendo a Georgia una mayor independencia energética a costa de capital político y de una mayor influencia estadounidense."
 GEO_accept_russian_influence_desc: "La aceptación de la influencia económica rusa tras el acuerdo con Gazprom profundizará los lazos energéticos con Moscú y ampliará la capacidad industrial de Georgia a través de la inversión rusa."
 GEO_agree_with_armenia_on_rail_desc: "La cooperación ferroviaria con Armenia fortalecerá la conectividad de la infraestructura transcaucásica, mejorará las rutas comerciales y mejorará las relaciones diplomáticas con nuestro vecino del sur."
 GEO_agreement_with_turkey_desc: "Los acuerdos diplomáticos con Turquía abren vías para la cooperación regional y el acceso a los recursos energéticos de Azerbaiyán, posicionando a Georgia como un estado de tránsito clave."
 GEO_agriculture_reform_desc: "La modernización de la agricultura georgiana mejorará la productividad y beneficiará el desarrollo industrial, aunque los agricultores tradicionales pueden resistirse a cambiar las prácticas establecidas."
 GEO_agriculture_subsidize_desc: "Los subsidios agrícolas apoyarán a los agricultores y trabajadores tras las recientes reformas, aunque los grandes terratenientes pueden considerar esto como una intervención estatal no deseada."
 GEO_alliance_armeniA_NAT_desc: "Bajo un liderazgo nacionalista, Georgia puede forjar una alianza estratégica con Armenia para contrarrestar la influencia azerbaiyana en la región del Cáucaso."
 GEO_armenian_proposal_com_desc: "La Georgia comunista debe tender una mano a Armenia después de nuestra intervención en Azerbaiyán, buscando la solidaridad ideológica en la región Transcaucásica."
 GEO_ask_for_international_help_desc: "Solicitar asistencia internacional para programas sociales proporcionará financiación crucial para la expansión de la atención sanitaria, aunque aumenta la dependencia de Georgia de la ayuda extranjera."
 GEO_azeri_oil_desc: "El acceso a los yacimientos petrolíferos de Azerbaiyán a través de la mediación turca fortalecerá el corredor energético Bakú-Tiflis y mejorará la posición de Georgia como estado de tránsito."
 GEO_azot_combinat_desc: "La planta química Rustavi Azot representa una capacidad industrial de la era soviética que puede revitalizarse mediante inversiones y modernización orientadas a la UE."
 GEO_beria_doctrine_desc: "Esta doctrina, que lleva el nombre de Lavrentiy Beria, el notorio jefe de la policía secreta de Stalin, establece un aparato de seguridad estatal integral para proteger a la Georgia comunista de amenazas internas y externas."
 GEO_bezviz_rus_desc: "La implementación de viajes sin visa con Rusia aumentará dramáticamente la integración económica con la Comunidad de Estados Independientes y consolidará la orientación prorrusa de Georgia."
 GEO_budget_deficit_desc: "La gestión de los déficits presupuestarios mediante la financiación occidental y la integración comercial de la UE proporcionará estabilidad, aunque profundizará la dependencia económica de Georgia de sus socios europeos."
 GEO_build_hospitals_desc: "La construcción de hospitales modernos con apoyo internacional y asistencia de la Cruz Roja mejorará drásticamente la infraestructura de atención médica de Georgia y los resultados de salud pública."
 GEO_build_materials_desc: "El desarrollo de la industria de materiales de construcción apoyará al sector de la construcción de Georgia y beneficiará los intereses comerciales en múltiples sectores económicos."
 GEO_communist_iron_hand_desc: "La consolidación del gobierno comunista de partido único eliminará la oposición política y establecerá un control absoluto sobre la sociedad y las instituciones gubernamentales georgianas."
 GEO_contract_vmf_desc: "La contratación de la Armada rusa (Военно-морской флот) para formación y asesoramiento acelerará el desarrollo naval de Georgia mediante la cooperación con una potencia marítima experimentada."
 GEO_crush_both_desc: "Rechazar alianzas con Armenia y Azerbaiyán representa una postura nacionalista agresiva que prepara a Georgia para un posible conflicto en múltiples frentes."
 GEO_crush_nat_armeni_desc: "El camino nacionalista exige una expansión territorial hacia Armenia para asegurar el dominio georgiano en el Cáucaso, ya sea con el apoyo de Azerbaiyán o mediante acciones unilaterales."
 GEO_crush_nat_azeri_desc: "Las ambiciones nacionalistas exigen enfrentarse a Azerbaiyán para establecer la hegemonía georgiana en la región, ya sea aliándose con Armenia o buscando una conquista independiente."
 GEO_deal_with_india_desc: "El establecimiento de relaciones comerciales y diplomáticas con la India diversificará las asociaciones económicas de Georgia más allá de la región inmediata del Cáucaso."
 GEO_decrease_import_desc: "Las políticas de sustitución de importaciones reducirán la dependencia comercial de Georgia y fortalecerán las industrias nacionales, aunque la eficiencia económica puede verse afectada."
 GEO_defense_of_georgia_desc: "La adopción de una doctrina militar defensiva centra las fuerzas armadas de la Georgia comunista en la protección de la patria en lugar de en la expansión revolucionaria ofensiva."
 GEO_dem_dvizh_edgruz_desc: "El Movimiento Democrático para una Georgia Unida representa una oposición democrática prorrusa que podría desviar la política georgiana hacia la integración occidental si gana las elecciones de 2013."
 GEO_dilos_desc: "La cooperación con Grecia en materia de tecnología naval y buques destructores modernizará la flota georgiana del Mar Negro a través de la asociación con una potencia naval mediterránea con experiencia."
 GEO_electro_problems_desc: "Una inversión masiva en infraestructura eléctrica resolverá finalmente la escasez crónica de energía que ha afectado al país desde el colapso de la Unión Soviética."
 GEO_enlarge_debt_timeout_desc: "La reestructuración y ampliación de las obligaciones de deuda tras el acuerdo de gas ITERA reducirá la presión financiera inmediata y profundizará los lazos con los acreedores occidentales."
 GEO_exchange_energy_rus_desc: "Al establecer acuerdos energéticos con Rusia comerciando en su moneda y con acuerdos preferenciales podemos establecer acuerdos energéticos más estables en nuestra nación."
 GEO_fertilizer_import_desc: "La importación de fertilizantes a través de las conexiones ferroviarias armenias recientemente establecidas impulsará la productividad agrícola y mejorará el rendimiento de los cultivos en todo Georgia."
 GEO_fiftintern_desc: "Los preparativos para la Quinta Internacional fortalecen el aparato del partido comunista y consolidan el control estatal sobre los medios de producción."
 GEO_fight_with_plague_desc: "El lanzamiento de una campaña integral de salud pública para eliminar los brotes de enfermedades protegerá a la población y demostrará el compromiso del gobierno con el bienestar público."
 GEO_food_industry_desc: "El desarrollo de tecnología agrícola y de procesamiento de alimentos moderna fortalecerá el sector agrícola de Georgia y mejorará la posición económica de las comunidades rurales."
 GEO_gas_postavka_desc: "Abordar los problemas de suministro de gas natural de Georgia es esencial para la seguridad energética, pero obtener suministros confiables de gas requiere tomar decisiones diplomáticas difíciles."
 GEO_gazprom_rus_desc: "La asociación con el monopolio estatal de gas ruso Gazprom garantizará un suministro confiable de energía pero aumentará significativamente la influencia política de Moscú sobre la política georgiana."
 GEO_geopromining_desc: "El desarrollo de la empresa GeoProMining ampliará las industrias extractivas de Georgia y mejorará la capacidad industrial civil."
 GEO_georgian_airlines_desc: "El establecimiento de Georgian Airlines como aerolínea nacional proporcionará al país una aerolínea de bandera para conectar a Tbilisi con destinos internacionales."
 GEO_georgian_airways_desc: "La creación de Georgian Airways como compañía de aviación nacional ofrece una visión alternativa para desarrollar la infraestructura de transporte aéreo de Georgia."
 GEO_georgian_oil_desc: "El desarrollo de la capacidad nacional de refinación de petróleo reducirá la dependencia de Georgia de los productos petrolíferos importados y fortalecerá su independencia energética."
 GEO_german_archeologists_desc: "Invitar a arqueólogos alemanes para ayudar en la restauración de sitios históricos preservará el antiguo patrimonio cultural de Georgia a través de la cooperación académica internacional."
 GEO_german_specialists_desc: "Los especialistas médicos alemanes aportan conocimientos sanitarios avanzados que modernizarán los hospitales y los programas de formación médica de Georgia."
 GEO_gold_extract_desc: "La expansión de las operaciones de extracción de oro con inversión británica generará ingresos por exportación, aunque aumentará el control extranjero sobre los recursos naturales de Georgia."
 GEO_gold_privat_desc: "La privatización de la industria minera de oro atraerá inversión extranjera y generará ingresos para el tesoro, lo que representa un compromiso con una reforma económica orientada al mercado."
 GEO_gov_plans_desc: "La modernización de la policía secreta NKVD mejorará las capacidades de vigilancia y seguridad interna del gobierno comunista."
 GEO_gov_prop_desc: "La implementación de programas de educación militarista adoctrinará a la juventud georgiana en la ideología comunista y preparará a la población para un posible conflicto."
 GEO_grapeyards_desc_desc: "La revitalización de los viñedos históricos de Georgia restaurará la industria vitivinícola que ha sido central para la cultura y la economía georgianas durante milenios."
 GEO_greece_repair_desc: "La creación de instalaciones de reparación naval en cooperación con Grecia proporcionará a Georgia capacidades de astilleros cruciales para el mantenimiento y la modernización de la flota del Mar Negro."
 GEO_guam_meeting_desc: "La organización GUAM (Georgia, Ucrania, Azerbaiyán, Moldavia) representa una alianza regional de estados que buscan equilibrar la influencia rusa mediante la cooperación mutua."
 GEO_healthcare_geo_desc: "La reforma y financiación del sistema nacional de salud mejorará los resultados de salud pública y demostrará el compromiso del gobierno con el bienestar social."
 GEO_healthcare_reformation_desc: "La revisión integral del sistema de salud tras la asistencia de especialistas alemanes transformará fundamentalmente la prestación de atención médica en todo Georgia."
 GEO_help_from_azer_desc: "La asistencia al desarrollo de Azerbaiyán mejorará la infraestructura de Georgia y fortalecerá los lazos bilaterales entre las dos naciones del Cáucaso."
 GEO_integrat_armen_desc: "La asimilación cultural de los territorios armenios conquistados a través de la cocina y las tradiciones georgianas consolidará el control nacionalista sobre las tierras recién adquiridas."
 GEO_integrat_meskheti_desc: "La integración de los territorios turcos meskheti y azerbaiyano a través del dominio cultural georgiano consolidará las ganancias territoriales nacionalistas."
 GEO_inter_rao_tpp_desc: "El gigante energético ruso Inter RAO construirá plantas de energía térmica en Georgia, ampliando la capacidad industrial y aumentando la influencia económica rusa y promoviendo el euroescepticismo."
 GEO_light_industry_desc: "Atraer paquetes de inversión para el desarrollo de la industria ligera modernizará el sector manufacturero de Georgia y beneficiará los intereses comerciales industriales."
 GEO_mahindra_desc: "La asociación con el gigante industrial indio Mahindra establecerá capacidad de fabricación de armas en Georgia a través de la transferencia de tecnología extranjera."
 GEO_marneuli_plant_desc: "La construcción de la planta industrial de Marneuli a través de la cooperación indo-georgiana ampliará la capacidad de fabricación y fortalecerá los lazos económicos con la India."
 GEO_marxism_geo_win_desc: "El triunfo del marxismo en Georgia consolida el control comunista sobre todos los aspectos de la sociedad y expande dramáticamente la capacidad industrial bajo dirección estatal."
 GEO_migrant_programs_desc: "Los programas de migración y reubicación gestionarán los movimientos de población y la distribución de la fuerza laboral después de los proyectos de desarrollo industrial."
 GEO_mil_reforms_desc: "Las reformas militares comunistas integrales modernizarán todas las ramas de las fuerzas armadas de Georgia mediante mejoras organizativas al estilo soviético."
 GEO_military_communism_desc: "La adopción del comunismo militar moviliza toda la economía de Georgia para la guerra y la expansión revolucionaria, priorizando la fuerza militar sobre el bienestar civil."
 GEO_mineral_waters_desc: "El desarrollo de la industria de agua mineral de Nabeghlavi aprovecha los recursos de manantiales naturales de Georgia, que son famosos en toda la región del Cáucaso."
 GEO_money_navyusa_desc: "La asistencia financiera de Estados Unidos al desarrollo naval proporcionará financiación crucial para modernizar las capacidades marítimas de Georgia en el Mar Negro."
 GEO_mvd_min_oboron_desc: "La fusión del Ministerio del Interior con el Ministerio de Defensa creará una estructura de mando unificada para las fuerzas de seguridad de Georgia."
 GEO_national_airlines_desc: "La consolidación de las compañías de aviación en una única aerolínea nacional creará una aerolínea de bandera eficiente para representar a Georgia en el transporte aéreo internacional."
 GEO_nationalize_gold_desc: "La nacionalización estatal de la minería de oro afirmará el control interno sobre los recursos naturales, aunque corre el riesgo de desestabilizar la confianza de los inversores extranjeros."
 GEO_negotiate_red_cross_desc: "Las negociaciones con la Cruz Roja Internacional proporcionarán asistencia humanitaria y experiencia médica para los programas de control de enfermedades."
 GEO_oil_extr_experts_desc: "La contratación de expertos petroleros extranjeros transferirá conocimientos técnicos cruciales necesarios para desarrollar las capacidades de extracción de petróleo de Georgia."
 GEO_oil_pipelines_desc: "La construcción de infraestructura de oleoductos posicionará a Georgia como un corredor crucial de tránsito de energía entre las regiones del Mar Caspio y el Mar Negro."
 GEO_patrol_cather_desc: "La adquisición de buques de patrulla proporcionará a Georgia capacidades de guardacostas para proteger sus aguas territoriales y sus intereses económicos marítimos."
 GEO_political_reformation_desc: "La reestructuración política bajo el comunismo redistribuirá el poder económico de los oligarcas y los banqueros a las pequeñas empresas y los sindicatos."
 GEO_pontic_sea_port_desc: "El desarrollo de las instalaciones portuarias del Mar Negro ampliará la capacidad de comercio marítimo de Georgia y fortalecerá la posición del país como centro de transporte marítimo regional."
 GEO_private_miners_desc: "La privatización de las operaciones mineras con inversión británica modernizará las industrias extractivas mediante capital y experiencia extranjeros."
 GEO_radioloc_usa_desc: "La tecnología de radar y electrónica estadounidense mejorará significativamente las capacidades de detección y selección de objetivos de los buques de guerra georgianos."
 GEO_rebrand_borjomi_desc: "El cambio de marca del agua mineral Borjomi posicionará este histórico producto georgiano para los mercados de exportación internacionales y a precios premium."
 GEO_superpuma_desc: "La adquisición de helicópteros Super Puma de fabricación francesa proporcionará a Georgia modernas capacidades de movilidad aérea y de búsqueda y rescate."
 GEO_tbilisi_aero_desc: "La ampliación del Aeropuerto Internacional de Tbilisi mejorará la conectividad de Georgia con Europa y posicionará a la capital como un centro de aviación regional."
 GEO_tbilisi_ceyhan_desc: "El oleoducto Bakú-Tiflis-Ceyhan representa la importancia estratégica de Georgia como corredor energético, conectando los recursos del Caspio con los mercados del Mediterráneo."
 GEO_telecommunications_desc: "La modernización de la infraestructura de telecomunicaciones mejorará la conectividad y creará la base digital para el desarrollo económico de Georgia."
 GEO_training_drills_com_desc: "Los ejercicios de entrenamiento militar comunista agudizarán la preparación de las fuerzas armadas para defender la revolución y expandir la influencia socialista."
 GEO_transit_deal_eu_desc: "El establecimiento de Georgia como corredor de tránsito para el comercio entre la UE y Asia integrará al país a las redes económicas europeas y reducirá el sentimiento euroescéptico."
 GEO_txtrveli_line_desc: "La línea defensiva de Tskhrveli fortificará las vulnerables fronteras de Georgia con complejos de búnkeres fuertemente protegidos contra una posible invasión."
 GEO_udeshevlenie_desc: "Aceptar importaciones rusas más baratas a través de términos comerciales preferenciales reducirá los costos pero aumentará la dependencia económica de Moscú."
 GEO_ukraine_verf_desc: "La cooperación entre los astilleros ucranianos proporcionará acceso a la experiencia y las instalaciones de construcción naval de la era soviética para construir la flota marítima de Georgia."
 GEO_wine_desc: "El desarrollo de la antigua industria vitivinícola de Georgia con modernas instalaciones de producción creará un producto de exportación de primera calidad que muestre milenios de tradición vitivinícola."
 GEO_zestaponi: "Fábrica de Zestaponi"
 GEO_zestaponi_desc: "La planta de ferroaleaciones de Zestaponi producía materiales cruciales para la industria soviética, y la restauración de esta instalación apoyará la reactivación industrial de Georgia."
 GEO_telavi_plant: "Planta de Telavi"
 GEO_telavi_plant_desc: "La reapertura de la planta industrial de Telavi ampliará la capacidad de fabricación de Georgia y proporcionará empleo en las regiones."
 GEO_mtkvari_tpp2: "TPP2"
 GEO_mtkvari_tpp: "Estación de Mtkvari"
 GEO_mtkvari_tpp1: "TPP1"
 GEO_mtkvari_tpp_desc: "El Proyecto de la Central Térmica de Mtkvari ampliará drásticamente la capacidad de generación de electricidad de Georgia mediante la construcción de centrales eléctricas modernas."
 GEO_mtkvari_tpp1_desc: "La primera fase de expansión del complejo energético de Mtkvari aumentará la producción y reducirá la dependencia de los combustibles fósiles mediante una mayor eficiencia."
 GEO_mtkvari_tpp2_desc: "La ampliación final de la central eléctrica de Mtkvari completa la transición de Georgia hacia una infraestructura energética sostenible."
 GEO_orthodox_church_influence: "Influencia de la Iglesia Ortodoxa"
 GEO_orthodox_church_influence_desc: "La Iglesia Ortodoxa Georgiana ejerce una influencia considerable sobre nuestra sociedad, proporcionándonos orientación espiritual y reforzando nuestra identidad nacional y nuestros valores tradicionales."
 GEO_restructure_debt: "Reestructuración de la Deuda"
 GEO_restructure_debt_desc: "La reestructuración de la deuda nacional mediante recortes del gasto militar reducirá las obligaciones fiscales, aunque debilitará las capacidades de defensa."
