 GEO_plague_problem_idea: "Peste Negra en Pueblos"
 GEO_plague_problem_idea_desc: "Se han reportado casos de peste negra y otras enfermedades como la malaria en varias aldeas de las montañas y pueblos alejados de las grandes ciudades. Debemos investigar y buscar soluciones a la falta de atención médica adecuada."
