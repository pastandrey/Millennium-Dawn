 Anti_Armenian_Coalition_desc: "Azerbaiyán y Georgia han creado esta alianza militar para estar preparados para repeler la agresión de Armenia, que según ellos ha comenzado a seguir una política exterior agresiva."
 SOV_Global.24.t: "Resistencia georgiana"
 SOV_Global.24.d: "Nuestros servicios especiales han informado sobre la actividad de los grupos armados georgianos que han comenzado a sabotear todas las actividades en la región capitalina de la antigua Georgia, parece que alguien está tratando de socavar la situación desde dentro."
 SOV_Global.24.a: "Necesitamos Detener Esto"
 SOV_Global.25.t: "Resistencia azerbaiyana"
 SOV_Global.25.d: "Nuestros servicios especiales han informado sobre la actividad de los grupos armados azerbaiyanos que han comenzado a sabotear todas las actividades en la región capitalina del antiguo Azerbaiyán, parece que alguien está tratando de socavar la situación desde dentro."
 SOV_Global.25.a: "Necesitamos Detener Esto"
 SOV_Global.26.t: "Levantamiento en Azerbaiyán"
 SOV_Global.26.d: "Inesperadamente para nosotros, grupos armados tomaron las principales instituciones de la región capitalina de Azerbaiyán por la mañana y anunciaron un enfrentamiento armado por la independencia de su país. Nuestros servicios especiales descubrieron que se trata de una actividad de los servicios especiales rusos; parece que Rusia pretende destruirnos desde dentro."
 SOV_Global.26.a: "Moscú Pagará por Esto"
