 SOV_Global.1.t: "PMCs Wagner fortalece su influencia"
 SOV_Global.1.d: "Las PMC de Wagner comenzaron su expansión en el continente africano. Literalmente derrocaron al gobierno del país al que fueron enviadas por el gobierno ruso. ¿Quizás deberíamos usar la fuerza para reprimirlas?"
 SOV_Global.1.a: "Los atacaremos."
 SOV_Global.1.b: "No merece nuestra atención."
 SOV_Global.2.t: "Rusia ha iniciado una guerra con Azerbaiyán"
 SOV_Global.2.d: "El gobierno ruso ha anunciado el inicio de una operación militar en Azerbaiyán para eliminar al régimen hostil allí, ¿quizás deberíamos intervenir también en esta guerra?"
 SOV_Global.2.a: "¡Deshagámonos de la amenaza azerbaiyana!"
 SOV_Global.2.b: "No deberíamos interferir."
 SOV_Global.3.t: "Rusia ha iniciado una guerra con Azerbaiyán"
 SOV_Global.3.d: "El gobierno ruso ha anunciado el inicio de una operación militar en Azerbaiyán para eliminarlos, ¿quizás deberíamos intervenir también en esta guerra?"
 SOV_Global.3.a: "¡Declararemos la guerra a Rusia y salvaremos a Azerbaiyán!"
 SOV_Global.3.b: "Declararemos la guerra a Armenia."
 SOV_Global.3.c: "Les enviaremos asesores militares..."
 SOV_Global.3.f: "No deberíamos interferir."
