 SOV_Global.10.t: "Rusia ha iniciado una guerra con Lituania"
 SOV_Global.10.d: "Rusia ha lanzado una operación militar en el territorio de Lituania, tal vez esta sea una oportunidad para que capturemos al menos algunos de los territorios que consideramos nuestros históricos ancestrales, ¿vale la pena intervenir en esta guerra?"
 SOV_Global.10.a: "Intervendremos en esta guerra."
 SOV_Global.10.b: "No deberíamos interferir."
