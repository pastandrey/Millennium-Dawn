 SOV_Global.29.t: "Levantamiento en Adjara"
 SOV_Global.29.d: "Inesperadamente para nosotros, grupos armados tomaron las principales instituciones de la región capitalina de Adjara por la mañana y anunciaron un enfrentamiento armado por la independencia de su país. Nuestros servicios especiales descubrieron que se trata de una actividad de los servicios especiales rusos; parece que Rusia pretende destruirnos desde dentro."
 SOV_Global.29.a: "Turquía Pagará por Esto"
 SOV_Global.30.t: "Instructores de Turco"
 SOV_Global.30.d: "El gobierno turco está dispuesto a proporcionarnos sus instructores militares para apoyar a nuestros soldados y entrenarlos en tácticas de guerra modernas."
 SOV_Global.30.a: "Estamos de acuerdo"
 SOV_Global.30.b: "No"
 SOV_Global.31.t: "Instructores en [ADJ.GetName]"
 SOV_Global.31.d: "Aceptaron aceptar a nuestros instructores para apoyar a sus fuerzas armadas."
 SOV_Global.31.a: "Bien"
 SOV_Global.32.t: "Instructores en [ADJ.GetName]"
 SOV_Global.32.d: "Se negaron a aceptar a nuestros instructores para apoyar a sus fuerzas armadas."
 SOV_Global.32.a: "Bien"
 SOV_Global.33.t: "Revolución Prorrusa en Armenia"
 SOV_Global.33.d: "Parece que el régimen moscovita no puede aceptar que seamos una potencia independiente de Moscú. ¡Rusia dio el paso definitivo y presionó a las últimas fuerzas leales en Armenia para que iniciaran una revolución contra nuestro gobierno legítimo!"
 SOV_Global.33.a: "Moscú Pagará por Esto"
 SOV_Global.34.t: "Armenia Exige Nakhichevan de Nosotros"
 SOV_Global.34.d: "El gobierno armenio ha exigido audaz e impertinentemente que transfiramos inmediatamente la región de Najicheván a su control, amenazándonos con graves consecuencias si no aceptamos sus demandas de ultimátum."
 SOV_Global.34.a: "Cederemos a Sus Demandas."
 SOV_Global.34.b: "Nunca"
 SOV_Global.35.t: "Conflicto de Najicheván"
 SOV_Global.35.d: "El gobierno azerbaiyano se dio cuenta de su impotencia ante nosotros y nos cedió Najicheván."
 SOV_Global.35.a: "Bien"
 SOV_Global.36.t: "Conflicto de Najicheván"
 SOV_Global.36.d: "El gobierno azerbaiyano se dio cuenta de su impotencia ante nosotros y nos cedió Najicheván."
 SOV_Global.36.a: "Ellos No Se Quedarán Mucho Tiempo"
 SOV_Global.37.t: "Conflicto de Najicheván"
 SOV_Global.37.d: "El gobierno turco, viendo la debilidad del gobierno azerbaiyano, decidió enviar tropas a Najicheván y anexarlo a su estado para limitar la influencia de Armenia en esta región, esto no puede quedar sin respuesta."
 SOV_Global.37.a: "No Hay Nada Que Podamos Hacer"
 SOV_Global.37.b: "No Hay Nada Que Podamos Hacer"
 SOV_Global.37.c: "¡Esto es la Guerra!"
