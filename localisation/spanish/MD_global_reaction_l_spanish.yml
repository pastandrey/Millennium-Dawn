 SOV_Global.5.t: "Rusia ha iniciado una guerra con Bielorrusia"
 SOV_Global.5.d: "El gobierno ruso ha anunciado el inicio de una operación militar en Bielorrusia para eliminarlos, tenemos miedo de convertirnos en las próximas víctimas de la agresión rusa, ¿debemos comenzar a prepararnos para su invasión?"
 SOV_Global.5.a: "Anuncia una doctrina defensiva contra Rusia"
 SOV_Global.5.b: "¿La invasión de Rusia? ¡Tonterías!"
 SOV_Global.6.t: "[FROM.GetName] Ha anunciado una doctrina defensiva"
 SOV_Global.6.d: "[FROM.GetName] Estaban asustados por la reciente operación militar que llevamos a cabo y anunciaron una doctrina defensiva contra nosotros. El gobierno ha anunciado la construcción de fortificaciones adicionales en nuestra frontera con ellos."
 SOV_Global.6.a: "Buena suerte para ellos"
