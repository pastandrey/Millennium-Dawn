 SOV_Global.14.t: "Rusia Muestra Agresividad hacia los Países Bálticos"
 SOV_Global.14.d: "Rusia declara abiertamente su intención de devolver las tierras bálticas a su composición, esto es una amenaza directa a nuestra independencia, debemos tomar las medidas necesarias."
 SOV_Global.14.a: "Anuncia una doctrina defensiva contra Rusia"
 SOV_Global.14.b: "¿La invasión de Rusia? ¡Tonterías!"
 SOV_Global.15.t: "Rusia ha iniciado una guerra con Ucrania"
 SOV_Global.15.d: "Rusia declara abiertamente su intención de devolver las tierras ucranianas a su composición, esto es una amenaza directa a nuestra independencia, debemos tomar las medidas necesarias."
 SOV_Global.15.a: "Anuncia una doctrina defensiva contra Rusia"
 SOV_Global.15.b: "¿La invasión de Rusia? ¡Tonterías!"
 SOV_Global.16.t: "[FROM.GetName] Ha anunciado una doctrina defensiva"
 SOV_Global.16.d: "[FROM.GetName] se sintió atemorizado por la reciente operación militar que llevamos a cabo y anunció una doctrina defensiva contra nosotros. El gobierno ha anunciado la construcción de fortificaciones adicionales en nuestra frontera con ellos."
 SOV_Global.16.a: "Buena suerte para ellos"
 SOV_Global.19.t: "La Guerra de Ucrania"
 SOV_Global.19.d: "Ucrania está perdiendo claramente la guerra con Rusia, ¿quizás deberíamos intervenir para que Rusia no se quede con todo completamente para sí?"
 SOV_Global.19.a: "Vamos a arriesgarnos"
 SOV_Global.19.b: "Nosotros no deberíamos hacer eso .."
 SOV_Global.18.t: "Levantamiento en Georgia"
 SOV_Global.18.d: "Inesperadamente para nosotros, grupos armados tomaron las principales instituciones de la región capitalina de Georgia por la mañana y anunciaron un enfrentamiento armado por la independencia de su país. Nuestros servicios especiales descubrieron que se trata de una actividad de los servicios especiales rusos; parece que Rusia pretende destruirnos desde dentro."
 SOV_Global.18.a: "Moscú Pagará por Esto"
 SOV_Global.20.t: "La coalición Antiarmenia"
 SOV_Global.20.d: "El gobierno de Azerbaiyán está sumamente preocupado por la expansión de Armenia en el Cáucaso y sugiere que creemos una alianza militar contra la agresiva política exterior de Armenia para defendernos conjuntamente del ataque del agresor."
 SOV_Global.20.a: "¡Gran idea!"
 SOV_Global.20.b: "No"
 SOV_Global.21.t: "La coalición Antiarmenia"
 SOV_Global.21.d: "Georgia ha aceptado nuestra idea de crear una alianza militar contra la política agresiva de Armenia."
 SOV_Global.21.a: "Bien"
 SOV_Global.22.t: "La coalición Antiarmenia"
 SOV_Global.22.d: "Georgia se negó a apoyar nuestra idea de una alianza militar contra la agresiva política exterior armenia; parece que ya han decidido que perderán su independencia."
 SOV_Global.22.a: "Triste"
 SOV_Global.23.t: "La coalición Antiarmenia"
 SOV_Global.23.d: "Georgia y Azerbaiyán han anunciado la creación de una alianza militar contra nosotros. Parece que temen de verdad que los ataquemos."
 SOV_Global.23.a: "Déjalos Tener Miedo"
