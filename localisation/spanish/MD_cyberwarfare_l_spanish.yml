 cyber_network_hardening_active: "Networks Hardened"
 cyber_network_hardening_active_desc: "Our cybersecurity teams have reinforced authentication systems, patched known vulnerabilities, and isolated critical access channels. Foreign intrusion attempts are significantly less likely to succeed while these defenses remain in place."
 cyber_counter_intrusion_active: "Counter-Intrusion Sweep"
 cyber_counter_intrusion_active_desc: "Analysts are actively hunting for foreign presence in our networks — combing logs, isolating anomalous processes, and removing persistent implants. Operational security awareness is heightened across all government systems."
 cyber_attribution_hunt_active: "Attribution Hunt Ongoing"
 cyber_attribution_hunt_active_desc: "Digital forensics teams are reconstructing attack pathways and cataloguing the signatures of the responsible actor. The intelligence gathered will sharpen our defenses and inform a proportional response."
 MD_cyber.201.t: "Infiltration Purged"
 MD_cyber.201.d: "Our counter-intrusion teams have completed their sweep. Foreign access tools, surveillance implants, and persistent back doors have been identified and removed. Our networks are clean."
 MD_cyber.201.a: "Good work. Stay vigilant."
 MD_cyber.202.t: "Sweep Complete — Networks Clear"
 MD_cyber.202.d: "Our counter-intrusion teams have finished their sweep of all critical systems. No foreign access tools or surveillance implants were detected. Our networks appear secure."
 MD_cyber.202.a: "Maintain the watch."
 MD_cyber.1.t: "Operation Successful"
 MD_cyber.1.d: "Our cyber teams successfully executed the operation. No trace was left behind — the target has no indication of our involvement."
 MD_cyber.1.a: "Excellent work."
 MD_cyber.2.t: "Foreign Intrusion Detected"
 MD_cyber.2.d: "Our security teams have identified signs of an external cyber intrusion. The attackers masked their origin effectively — we cannot determine who is responsible."
 MD_cyber.2.a: "Harden our defenses."
 MD_cyber.3.t: "Cyber Attack by [?disp_name_agressor.GetNameWithFlag] Identified"
 MD_cyber.3.d: "Our intelligence services have traced a recent cyber intrusion by [?disp_name_agressor.GetNameWithFlag]. The attack was deliberate and targeted. We have lodged a formal diplomatic protest."
 MD_cyber.3.a: "Condemn the aggressor."
 MD_cyber.4.t: "Operation Aborted"
 MD_cyber.4.d: "Our cyber teams were unable to establish a reliable foothold in the target's systems. The operation was aborted before any action could be taken. Additional preparation is needed."
 MD_cyber.4.a: "Regroup and assess."
 MD_cyber.11.t: "GPS Signal Disruption"
 MD_cyber.11.d: "Military units are reporting widespread failures in satellite navigation systems. Commanders in the field are struggling to coordinate effectively. An external signal disruption attack is suspected."
 MD_cyber.11.a: "Switch to backup navigation."
 MD_cyber.12.t: "Financial Networks Compromised"
 MD_cyber.12.d: "Banks, exchanges, and payment processors are reporting cascading system failures. The disruption is not accidental — our analysts believe foreign operatives have targeted our financial infrastructure."
 MD_cyber.12.a: "Isolate and contain the damage."
 MD_cyber.13.t: "Information Space Infiltrated"
 MD_cyber.13.d: "Social media platforms and news networks are being flooded with coordinated disinformation. Public confidence in the government is eroding. Our analysts believe this is a foreign influence operation."
 MD_cyber.13.a: "Begin a counter-narrative campaign."
 MD_cyber.14.t: "Critical Infrastructure Under Attack"
 MD_cyber.14.d: "Power stations, transportation hubs, and communications nodes have suffered simultaneous failures. Engineers report signs of deliberate sabotage through our control systems. This is a significant escalation."
 MD_cyber.14.a: "Declare a national emergency."
 MD_cyber.15.t: "Catastrophic Cyber Strike"
 MD_cyber.15.d: "Every critical system in the country has been hit simultaneously — financial networks, power grids, military communications, and supply chains. The scale and precision of the attack is unprecedented. The nation is crippled."
 MD_cyber.15.a: "Mobilize everything we have."
 MD_cyber.16.t: "Communications Compromised"
 MD_cyber.16.d: "Foreign operatives have penetrated our encrypted communications channels. Sensitive transmissions are likely being monitored by a hostile state actor."
 MD_cyber.16.a: "Initiate a communications lockdown."
 MD_cyber.17.t: "Radar Networks Disrupted"
 MD_cyber.17.d: "Our air defense radar networks are returning false readings. Ghost contacts are overwhelming operators — enemy aircraft may be exploiting the confusion."
 MD_cyber.17.a: "Switch to backup detection protocols."
 MD_cyber.18.t: "Foreign Influence Operation Detected"
 MD_cyber.18.d: "Evidence has emerged of a coordinated foreign influence campaign targeting our domestic political landscape. Disinformation is spreading through social media networks and deepening public divisions."
 MD_cyber.18.a: "Denounce foreign interference."
 MD_cyber.19.t: "Research Networks Breached"
 MD_cyber.19.d: "Classified research data and industrial designs have been stolen from our national laboratories and defense contractors. The full extent of the theft is still being assessed."
 MD_cyber.19.a: "Audit all classified systems."
 MD_cyber.110.t: "Command Networks Infiltrated"
 MD_cyber.110.d: "Our military and diplomatic communications channels have been penetrated. Enemy operatives are intercepting orders and sensitive correspondence in real time."
 MD_cyber.110.a: "Purge all compromised channels."
 MD_cyber.111.t: "Central Bank Systems Under Attack"
 MD_cyber.111.d: "Our central bank and primary financial clearing infrastructure have come under sustained cyber assault. Transaction processing has halted and currency markets are destabilizing rapidly."
 MD_cyber.111.a: "Declare a financial emergency."
 MD_cyber.112.t: "Military Supply Chain Disrupted"
 MD_cyber.112.d: "Command-and-control software managing our forward logistics has crashed across multiple sectors. Units at the front are reporting supply shortages as the disruption cascades through the system."
 MD_cyber.112.a: "Fall back on manual supply procedures."
 MD_cyber.113.t: "Persistent Intrusion Detected"
 MD_cyber.113.d: "Our security services have discovered dormant access points embedded deep within critical network infrastructure. The implants are sophisticated and have likely been active for some time."
 MD_cyber.113.a: "Begin a full network audit."
 MD_cyber.114.t: "Command Intelligence Compromised"
 MD_cyber.114.d: "Our intelligence services have identified a systematic campaign of fabricated signals traffic and false communications. Our military commanders may have been acting on deliberately poisoned information."
 MD_cyber.114.a: "Establish a signals verification task force."
 MD_cyber.115.t: "Zero-Day Strike"
 MD_cyber.115.d: "A devastating precision cyber strike has simultaneously hit our most critical systems using previously unknown exploits. Industrial control systems, power infrastructure, and defense networks have all been affected."
 MD_cyber.115.a: "Activate national cyber emergency protocols."
 cyber_propaganda_ops_malus: "Information Space Infiltrated"
 cyber_propaganda_ops_malus_desc: "A coordinated foreign disinformation campaign is actively degrading public confidence in our government and institutions, suppressing political output and undermining national cohesion."
 cyber_gps_jamming_malus: "GPS Systems Disrupted"
 cyber_gps_jamming_malus_desc: "Foreign cyber operatives have compromised our military satellite navigation infrastructure, severely degrading troop coordination and battlefield awareness."
 cyber_economic_disruption_malus: "Financial Networks Compromised"
 cyber_economic_disruption_malus_desc: "A sustained foreign cyber campaign is degrading our banking systems, payment networks, and industrial output. Economic recovery will take time."
 cyber_infrastructure_damage_malus: "Infrastructure Damage"
 cyber_infrastructure_damage_malus_desc: "Foreign cyber attackers have caused significant damage to our critical infrastructure, hampering logistics, construction, and supply distribution."
 cyber_critical_strike_malus: "Catastrophic Cyber Strike"
 cyber_critical_strike_malus_desc: "A devastating full-spectrum cyber assault has crippled our industrial base, communications, and supply chain simultaneously. Recovery will be long and painful."
 cyber_sigint_surveillance_malus: "Communications Under Surveillance"
 cyber_sigint_surveillance_malus_desc: "Foreign operatives have penetrated our encrypted communications infrastructure. Sensitive transmissions are likely being monitored, hampering coordinated political action."
 cyber_radar_spoofing_malus: "Radar Network Compromised"
 cyber_radar_spoofing_malus_desc: "Foreign cyber operatives are feeding false returns into our air defense radar networks, degrading detection and interception capabilities."
 cyber_election_interference_malus: "Foreign Influence Campaign Active"
 cyber_election_interference_malus_desc: "A coordinated foreign disinformation campaign is eroding public confidence and deepening domestic political divisions."
 cyber_industrial_espionage_malus: "Research Networks Breached"
 cyber_industrial_espionage_malus_desc: "Classified research data and industrial designs have been stolen from our national laboratories and defense contractors, setting back our development programs."
 cyber_comms_intercept_malus: "Command Networks Compromised"
 cyber_comms_intercept_malus_desc: "Our military and diplomatic communications have been penetrated. Operational security is degraded and coordination is suffering."
 cyber_financial_system_attack_malus: "Financial Infrastructure Under Attack"
 cyber_financial_system_attack_malus_desc: "A sustained assault on our central banking and payment infrastructure has caused cascading failures across the economy."
 cyber_logistics_disruption_malus: "Military Supply Chain Disrupted"
 cyber_logistics_disruption_malus_desc: "Command-and-control software managing our forward logistics has been compromised. Units at the front are experiencing supply shortages."
 cyber_sleeper_network_malus: "Persistent Network Intrusion"
 cyber_sleeper_network_malus_desc: "Foreign operatives have embedded dormant access points deep within our critical networks, maintaining persistent low-level access to sensitive systems."
 cyber_deception_campaign_malus: "Command Intelligence Poisoned"
 cyber_deception_campaign_malus_desc: "Our commanders have been acting on fabricated signals traffic and false communications. Military coordination and situational awareness are severely degraded."
 cyber_zero_day_strike_malus: "Zero-Day Strike"
 cyber_zero_day_strike_malus_desc: "A devastating precision strike using classified zero-day exploits has simultaneously hit our most critical industrial and infrastructure systems."
 upgrade_establish_cyber_operations_division: "Cyber Operations Division"
 upgrade_establish_cyber_operations_division_desc: "Establish a dedicated cyber operations division within the agency, providing the foundational capability for basic digital warfare. This division will unlock the capability for us to conduct §YCyber Warfare§! operations."
 upgrade_offensive_cyber_operations: "Offensive Cyber Warfare"
 upgrade_offensive_cyber_operations_desc: "Expand the division with advanced persistent threat toolkits and zero-day exploit research, enabling more sophisticated operations."
 upgrade_cyber_warfare_operational_planning: "Full-Spectrum Cyber Command"
 upgrade_cyber_warfare_operational_planning_desc: "Evolve the division into a fully integrated cyber command capable of coordinating complex multi-vector operations against hardened targets."
 upgrade_defensive_cyber_operations: "Defensive Cyber Operations"
 upgrade_defensive_cyber_operations_desc: "Build out a dedicated defensive team specializing in hardening our own networks, detecting intrusions, and obscuring our digital footprint."
 upgrade_cyber_elite: "Zero-Day Arsenal"
 upgrade_cyber_elite_desc: "Develop and stockpile a classified arsenal of elite zero-day exploits capable of penetrating even the most hardened systems in the world."
 cyber_offense_power_modifier: "Offensive Cyberwarfare"
 cyber_offense_power_modifier_desc: "The value that determines how strong our offensive cyberwarfare operations are."
 cyber_defense_rating_modifier: "Defensive Cyberwarfare"
 cyber_capability_modifier: "Cyberwarfare Capability"
 cyber_attribution_bonus_modifier: "Cyber Attribution Bonus"
