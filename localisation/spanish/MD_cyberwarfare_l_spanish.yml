 CYBER_GPS_BTN_TT_DELAYED: "Specialized malware infiltrates the target's satellite reception infrastructure, flooding military navigation systems with spoofed signals. In the field, commanders struggle to coordinate as familiar landmarks vanish from their digital maps. Even routine maneuvers become hazardous when precision navigation fails."
 CYBER_SIGINT_BTN_TT_DELAYED: "A persistent implant burrows silently into the target's telecommunications backbone, copying traffic across government, military, and diplomatic channels. Week by week, the intercepted stream builds a detailed portrait of the target's intentions, vulnerabilities, and internal disputes — intelligence that no conventional spy could gather."
 CYBER_RADAR_BTN_TT_DELAYED: "Phantom contacts bloom across the target's air defense radar screens. Operators scramble to track aircraft that do not exist, burning through alert cycles chasing ghosts. Real flights slip through the gaps undetected. The window is brief, but thirty days of degraded air detection can be decisive in an active campaign."
 CYBER_ECON_BTN_TT_DELAYED: "Payment processors begin throwing errors. Trading algorithms choke on corrupted data feeds. Factory floor controllers receive malformed update packages. The attack is designed to be deniable — a cascade of seemingly unrelated technical failures that quietly drains the target's economic output for months."
 CYBER_PROP_BTN_TT_DELAYED: "Thousands of coordinated accounts flood the target's media environment with contradictory narratives. Fabricated government documents circulate on social networks. The goal is not to deceive but to exhaust — a population that can no longer distinguish fact from fiction loses confidence in all institutions, including its own government."
 CYBER_ELECT_BTN_TT_DELAYED: "Voter registration systems are subtly corrupted. Deepfake footage of opposition leaders circulates in the final days before polling. Social media algorithms are gamed to amplify existing divisions. The target's democratic institutions are not destroyed — they are quietly made untrustworthy, their results contested before a single ballot is counted."
 CYBER_ESPION_BTN_TT_DELAYED: "A spear-phishing campaign plants custom implants deep inside the target's most sensitive research networks. The malware moves laterally for months, harvesting blueprints, test data, and proprietary formulae. By the time the breach is discovered, our researchers are already building on what they stole."
 CYBER_COMMS_BTN_TT_DELAYED: "A silent man-in-the-middle positions itself across the target's most sensitive communications nodes. Generals' orders, ambassadors' cables, and cabinet deliberations pass through the same compromised relay — copied, catalogued, and delivered to our analysts in real time. The target continues to make decisions, unaware that we read every one."
 CYBER_INFRA_BTN_TT_DELAYED: "Industrial control systems managing power distribution, water treatment, and logistics nodes receive silent, malicious firmware updates. When the payload triggers, cascading failures overwhelm repair teams across multiple sectors simultaneously. The damage is real, physical, and slow to reverse."
 CYBER_FIN_BTN_TT_DELAYED: "The central bank's settlement systems go dark. ATM networks fail nationwide. Currency trading algorithms receive poisoned inputs that trigger a flash crash. The disruption reaches far beyond what conventional sanctions could achieve — and unlike sanctions, it carries no attribution."
 CYBER_LOG_BTN_TT_DELAYED: "Supply chain management software crashes across every forward operating base simultaneously. Ammunition requests vanish in corrupted queues. Fuel allocation algorithms route convoys to non-existent depots. The enemy's military machine does not break in battle — it starves in place."
 CYBER_SLEEP_BTN_TT_DELAYED: "Patient, methodical, invisible. Our operatives are not here to attack — they are here to stay. Dormant access points are embedded across the target's critical network fabric, positioned for activation on command. For the next year, their most sensitive systems may have no secrets at all."
 CYBER_CRIT_BTN_TT_DELAYED: "The full weight of our cyber arsenal descends at once. Power grids fail. Military communications collapse. Industrial output stops. Financial systems freeze. The operation is the digital equivalent of a strategic bombing campaign — leaving the target functionally crippled across every domain of national power simultaneously."
 CYBER_DECEPT_BTN_TT_DELAYED: "We do not attack the target's systems. We corrupt its mind. Fabricated intelligence assessments, spoofed orders bearing senior commanders' authentication signatures, manipulated imagery presented to decision-makers at the highest levels — every choice the target makes becomes potentially built on a reality we manufactured."
 CYBER_ZERO_BTN_TT_DELAYED: "A classified arsenal of previously unknown exploits, accumulated over years and reserved for precisely this moment, is deployed simultaneously against the target's most critical systems. By the time their analysts understand what happened, the vulnerabilities are burned and the damage is irreversible."
 CYBER_HARDEN_BTN_TT_DELAYED: "Our security teams audit every exposed interface, patch every known vulnerability, and harden the protocols that foreign intelligence agencies most frequently probe. The work is unglamorous, but every door we close is one fewer vector for an adversary to exploit. The best cyber operation is the one that never lands."
 CYBER_CNTRINT_BTN_TT_DELAYED: "Analysts comb through network logs and system telemetry searching for subtle indicators of foreign presence — anomalous access patterns, unexpected outbound connections, dormant processes with no legitimate purpose. Cleaning an infected network is slow, careful work. An undetected implant is far more dangerous than a known one."
 CYBER_ATTRIB_BTN_TT_DELAYED: "Our digital forensics teams reconstruct the attack pathway — tracing malware signatures, mapping command-and-control infrastructure, and cataloguing the operational security patterns that identify the responsible actor. Naming the state behind the intrusion is the first step toward a proportional response."
