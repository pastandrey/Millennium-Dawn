 german_legacy: "Legado Alemán"
 german_legacy_desc: "§YReglas Especiales:§!\n---\n§RNo podemos tener§! §6Doctrina Nuclear§! §Rni desarrollar§! §6armas nucleares§!\n---\n§RNo podemos aumentar manualmente nuestro gasto militar§!\n---\n§REl Ejército está limitado a 370.000 efectivos activos (240.000 en el ejército)§!\n---\n§RNo podemos aumentar manualmente nuestra administración§!\n---\n§YCDU/CSU y SPD§! siempre pueden formar coalición.\n---\n§YPuedes§! §Rprohibir§! §Ypartidos extremistas§!\n---\nCon el peso de los crímenes de guerra nazis sobre sus hombros, y como instigadora de la Primera y Segunda Guerra Mundial, Alemania ha trabajado duro para deshacerse de su mala imagen, evitando incluso insinuar un enfoque nacionalista o militarista. En términos legales, Alemania está sujeta al Tratado de 1990 sobre el \"Acuerdo Final con Respecto a Alemania\", firmado entre Alemania y las potencias aliadas (Rusia, Estados Unidos, Reino Unido y Francia), así como a un tratado fronterizo separado con Polonia.\nEste tratado prohíbe que Alemania:\nRealice reclamaciones territoriales.\nPosea armas nucleares.\nMantenga fuerzas armadas superiores a 370.000 efectivos (220.000 en el juego).\n§W--------------§!\nEsta idea nacional §Rpuede eliminarse§! si completamos el §HFoco \"Nuestro Nuevo Legado\"§!."
 GER_idea_german_education_reforms: "Reformas Educativas Alemanas"
 GER_idea_scientific_exchange: "Intercambios Científicos Alemanes"
 GER_idea_expanding_digital_infrastructure: "Expandiendo Nuestra Infraestructura Digital"
