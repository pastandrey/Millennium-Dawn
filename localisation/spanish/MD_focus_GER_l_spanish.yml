 GER_MD_OS_TT_desc: "MD OS versión 1.9.0, es un sistema operativo revolucionario que ayuda a rastrear extremistas de todo tipo! Aquí en MD OS, puede ajustar su gasto departamental y gestionar las cosas a nivel departamental."
 GER_spending_on_islamists: "Bienvenido, Señor\n\nPor favor, tómese un breve momento para revisar el presupuesto actual sobre la lucha\ncontra el extremismo islámico. Ajuste según nuestro presupuesto y asegúrese de mantener un ojo\nfuera por actividad sospechosa. Si este departamento no recibe financiamiento adecuado,\nthen it may be subject to a shut-down. Our computers are a little old, so it may take a\nday before spending is updated."
 GER_combatting_islamist_popup_TT: "Combat_extremists.exe"
 GER_combatting_islamist_popup_desc_TT: "Aquí podemos ajustar las leyes de gasto para combatir a los extremistas y tomar alguna acción adicional si es necesario. Si un Departamento se vuelve demasiado inestable y colapsa, nuestra nación puede dirigirse hacia una guerra civil. Según el resultado de la guerra civil, los partidos y grupos radicales pueden tomar el control de Alemania."
