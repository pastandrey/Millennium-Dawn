 GER_idea_DASA: "DASA"
 GER_idea_NL_Cooperation: "Cooperación Militar Germano-Neerlandesa"
 GER_idea_NL_Cooperation_desc: "La cooperación militar entre Alemania y los Países Bajos es una de las alianzas de defensa más sólidas de Europa, arraigada en las necesidades de la Guerra Fría. Desde entonces, ambas naciones han armonizado sus doctrinas y equipamientos militares, mejorando su capacidad para operar conjuntamente sin contratiempos. La creación del Cuerpo Alemán-Neerlandés en 1995 consolidó esta relación, creando una fuerza conjunta que ha participado con éxito en diversas misiones de la OTAN. A principios de la década de 2000, los esfuerzos para sincronizar el entrenamiento, estandarizar el equipamiento e integrar funciones militares como la defensa aérea profundizaron aún más esta colaboración. Esta alianza sigue siendo un modelo para la defensa europea, garantizando que ambas naciones sigan siendo actores clave en los esfuerzos de seguridad colectiva de la OTAN."
 GER_neuer_markt_idea: "Neuer Markt"
 GER_neuer_markt_idea_desc: "El Neuer Markt, fundado en 1997, fue el intento de Alemania de crear un segmento bursátil para empresas jóvenes e innovadoras, especialmente en los sectores de tecnología y biotecnología. Siguiendo el modelo del NASDAQ estadounidense, el Neuer Markt buscaba proporcionar una plataforma para que empresas de alto crecimiento y con visión de futuro accedieran a capital mediante ofertas públicas iniciales (OPI). Se consideró un paso importante en la modernización del mercado financiero alemán, el fomento del espíritu emprendedor y la innovación en Europa. Con requisitos de cotización más flexibles en comparación con las bolsas tradicionales, el Neuer Markt atrajo a numerosas startups, ofreciendo a los inversores la oportunidad de participar en las florecientes industrias de internet y tecnología. Rápidamente se convirtió en un símbolo de la nueva economía, donde se esperaba que el progreso tecnológico revolucionara los modelos de negocio tradicionales."
 GER_neuer_markt_colapse: "El Colapso del Neuer Markt"
 GER_neuer_markt_colapse_desc: "Sin embargo, el optimismo en torno al Neuer Markt duró poco. A principios de la década de 2000, estalló la burbuja puntocom y muchas empresas que cotizaban en bolsa no cumplieron sus promesas. La sobrevaloración de las acciones, la mala gobernanza corporativa y la falta de modelos de negocio sostenibles provocaron un desplome de la confianza de los inversores. El otrora prometedor Neuer Markt se convirtió en sinónimo de especulación, volatilidad e inestabilidad financiera. Desde su máximo en el año 2000, el mercado perdió más del 90% de su valor, ya que las empresas quebraron o dejaron de cotizar. En 2003, el Neuer Markt cerró por completo, víctima de su propia exuberancia desenfrenada y del colapso general del sector puntocom. Este colapso sirvió como advertencia sobre los peligros de las burbujas especulativas y la necesidad de una supervisión rigurosa en los mercados emergentes."
 GER_neuer_markt_colapse_I: "Intervención Gubernamental para Mitigar el Colapso del Mercado"
 GER_neuer_markt_colapse_I_desc: "En respuesta al devastador colapso del *Neuer Markt*, el gobierno ha decidido intervenir y brindar ayuda financiera para amortiguar el golpe. Mediante la inyección de capital en industrias clave y el apoyo a las empresas en dificultades, el objetivo es estabilizar la economía y prevenir un mayor pánico financiero. Si bien esta intervención podría limitar los daños a corto plazo, conlleva un aumento del gasto público y una creciente deuda nacional."
 GER_neuer_markt_colapse_II: "Dejar que el Mercado Se Autorregule"
 GER_neuer_markt_colapse_II_desc: "Creyendo en los principios del libre mercado, el gobierno ha optado por dejar que la economía se recupere por sí sola tras el colapso del *Neuer Markt*. Esta estrategia de no intervención presupone que el mercado se corregirá por sí solo mediante ciclos naturales de auge y caída. Si bien esto puede restablecer el equilibrio a largo plazo, las consecuencias inmediatas serán duras, con la quiebra de empresas y el aumento del desempleo a medida que el sector financiero se reestructura lentamente."
 GER_idea_Agriculture_I: "Subvenciones Agrícolas"
 GER_idea_Agriculture_II: "Subvenciones Agrícolas"
 GER_idea_Agriculture_III: "Subvenciones Agrícolas"
 GER_subventions_mining: "Subvenciones a la Minería"
 GER_subventions_agrar: "Subvenciones Agrícolas"
 GER_idea_swine_flu: "Pandemia de Gripe Porcina"
 GER_idea_swine_flu_desc: "La pandemia de gripe porcina (H1N1) está causando graves problemas de salud pública y perturbaciones económicas. La rápida propagación de la enfermedad ha desbordado los sistemas de salud, mientras que el temor de los consumidores afecta a las industrias agrícolas que dependen de la producción porcina. Abordar la crisis es crucial para estabilizar el país."
 GER_idea_chicken_flu: "Brote de Gripe Aviar"
 GER_idea_chicken_flu_desc: "Un brote de gripe aviar, comúnmente conocida como gripe aviar, amenaza la industria avícola. La alta transmisibilidad de la enfermedad y el temor público por la seguridad alimentaria han provocado pérdidas económicas y tensiones en las zonas rurales. Se necesitan medidas eficaces de contención y apoyo para prevenir daños mayores."
 GER_BSE_Crisis_I: "Crisis de la Encefalopatía Espongiforme Bovina (EEB)"
 GER_BSE_Crisis_I_desc: "La encefalopatía espongiforme bovina (EEB), comúnmente conocida como «enfermedad de las vacas locas», es una enfermedad neurodegenerativa mortal que afecta al ganado. Está causada por priones, proteínas anormales que inducen cambios estructurales en las proteínas normales del cerebro, lo que provoca daño cerebral y síntomas característicos.\n\nSí, realizamos pruebas a los Greens y, sorprendentemente, el 87 % dio negativo."
 GER_BSE_Crisis_II: "Crisis de la Encefalopatía Espongiforme Bovina (EEB)"
 GER_BSE_Crisis_II_desc: "La encefalopatía espongiforme bovina (EEB), comúnmente conocida como «enfermedad de las vacas locas», es una enfermedad neurodegenerativa mortal que afecta al ganado. Está causada por priones, proteínas anormales que inducen cambios estructurales en las proteínas normales del cerebro, lo que provoca daño cerebral y síntomas característicos.\n\nSí, realizamos pruebas a los Greens y, sorprendentemente, el 87 % dio negativo."
 GER_idea_Q_fever: "Brote de Fiebre Q"
 GER_idea_Q_fever_desc: "Un brote de fiebre Q (abreviatura de \"fiebre de consulta\") está afectando al ganado en todo el país. Esta enfermedad zoonótica, causada por la bacteria *Coxiella burnetii*, se propaga a través de productos animales infectados, polvo y aerosoles. La fiebre Q no solo reduce la producción agrícola, sino que también representa un grave riesgo para la salud humana, causando síntomas similares a los de la gripe y, en casos graves, complicaciones a largo plazo. El gobierno debe actuar con rapidez para contener la enfermedad y mitigar su impacto tanto en la salud pública como en la economía."
 GER_idea_banned_pesticid_used: "Uso Prohibido de Pesticidas"
 GER_idea_banned_pesticid_used_desc: "Se ha prohibido el uso de varios plaguicidas clave debido a la creciente evidencia de riesgos para el medio ambiente y la salud pública. Si bien esta decisión busca preservar la biodiversidad y proteger los ecosistemas, ha causado importantes perturbaciones en la producción agrícola. Los agricultores deben ahora adaptarse a métodos alternativos de control de plagas, que podrían resultar costosos y menos eficaces a corto plazo."
 GER_idea_H5N8: "Brote de Influenza Aviar H5N8"
 GER_idea_H5N8_desc: "Una cepa altamente patógena de influenza aviar, H5N8, se está propagando rápidamente entre las poblaciones de aves domésticas y silvestres. Si bien el virus representa un riesgo mínimo para los humanos, su impacto en la industria avícola es devastador, provocando el sacrificio masivo de aves y pérdidas económicas significativas. Se necesitan medidas urgentes de contención para detener su propagación y proteger la seguridad alimentaria."
 GER_idea_Foot_and_moooouuuhhh: "Brote de Fiebre Aftosa"
 GER_idea_Foot_and_moooouuuhhh_desc: "Se ha detectado un brote de fiebre aftosa en el ganado, caracterizado por fiebre y ampollas en animales de pezuña hendida, como bovinos, cerdos y ovejas. Esta enfermedad altamente contagiosa amenaza al sector agrícola, lo que conlleva severas restricciones comerciales y el sacrificio de los rebaños afectados. Es necesaria una intervención inmediata para evitar mayores consecuencias económicas."
