 GER_blame_for_BSE: "Culpados por la Encefalopatía Espongiforme Bovina (EEB)"
 GER_invite_to_garisson: "Invitado a una demostración de fuerzas"
 GER_Ideas_Polish_labour.t: "Mano de Obra Polaca en la Economía Alemana"
 GER_Ideas_Polish_labour.d: "Los trabajadores polacos se han convertido en una parte indispensable de la economía alemana, desempeñando funciones vitales como ayudantes de cosecha, artesanos cualificados y cuidadores. Atraídos por la oportunidad de ganar mucho más que en Polonia, estos trabajadores no solo impulsan el mercado laboral alemán, sino que también aportan una valiosa experiencia y dedicación. Sus contribuciones ponen de relieve la interconexión de los mercados laborales europeos y subrayan la importancia del trato justo y de los esfuerzos de integración de los trabajadores extranjeros para sostener el crecimiento económico."
