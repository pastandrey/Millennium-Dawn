 GER_BMW_Focus_tt: "§YBMW intentará desarrollar un vehículo Utilitario§!"
 GER_GNY: "Astilleros Navales Alemanes Reestructurados"
 GER_GNY_desc: "En una medida decisiva para recuperar el control soberano sobre capacidades navales clave, el gobierno alemán ha apoyado la separación formal de los Astilleros Navales Alemanes del conglomerado HDW, con sede en Kiel. La reestructuración restablece a GNY como una entidad independiente, centrándose en la construcción de buques de superficie, la modernización y el apoyo a la flota de la Bundeswehr y sus socios europeos. La escisión se considera un paso estratégico para reducir la dependencia exterior, mejorar la resiliencia industrial y prepararse para futuras iniciativas de defensa marítima, incluyendo fragatas y buques de apoyo de nueva generación."
 germany.66.t: "El Nuevo Jeep Militar de BMW Fracasa"
 germany.66.d: "BMW proporcionó gratuitamente su primer vehículo militar al Ejército Alemán para realizar pruebas exhaustivas, con la esperanza de entrar en el mercado de vehículos utilitarios militares. En teoría, impresionaba, con líneas limpias, robustos pasos de rueda y una elegante capota de lona. En la práctica, resultó ser una gran decepción, ya que su consumo de aceite era exorbitante y, tras pocos kilómetros, el motor se agarrotaba. Durante un ejercicio de campo reciente, el vehículo se averió por completo, obligando a los soldados a recorrer a pie veinte kilómetros de vuelta a la base."
 germany.66.a: "Nos importan las miradas, no nuestros soldados."
 germany.66.b: "Nos preocupamos por la calidad, no por la apariencia."
 germany.67.t: "Se Funda Helsing SE"
 germany.67.d: "Helsing SE, una nueva empresa de tecnología de defensa con sede en Múnich, se ha creado para desarrollar drones de ataque con IA y sistemas autónomos exclusivamente para gobiernos democráticos. El Gobierno Federal acoge con satisfacción este impulso a nuestra vanguardista industria militar."
 germany.67.a: "Excelente, un refuerzo para nuestras defensas."
 GER_winds.7.t: "Se Purga el Extremismo de la Bundeswehr"
 GER_winds.7.d: "En una medida considerada un punto de inflexión para la resiliencia democrática, el gobierno alemán ha anunciado la conclusión de una amplia campaña interna para erradicar el extremismo de extrema derecha dentro de la Bundeswehr. Tras una serie de escándalos e informes de inteligencia en años anteriores, las fuerzas armadas se enfrentaron a un intenso escrutinio por infiltración ideológica, revisionismo histórico y tolerancia a redes extremistas.\n\nMediante una combinación de reformas estructurales, coordinación de inteligencia y formación de oficiales basada en valores, el Ministerio de Defensa afirma haber restaurado la integridad de sus filas.\n\n«Queremos ciudadanos uniformados, no el regreso de las SS», declaró un portavoz del gobierno. La confianza pública se mantiene cautelosa, pero el mensaje es claro: la Bundeswehr está destinada a defender la democracia, no a socavarla."
 GER_winds.7.a: "Un paso necesario para un ejército moderno"
