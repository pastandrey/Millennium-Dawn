 GER_fracking_projects: "Proyectos de Fracking"
 GER_upgraded_mining_equipment: "Equipo de Minería Actualizado"
 GER_generic_spending_laws: "Presupuesto Público del Gobierno"
 GER_generic_spending_laws_desc: "El presupuesto público del gobierno es el fondo de impuestos públicos que proporciona financiamiento a nuestro sector de servicios públicos que incluye; §Yatención médica§!, §Yeducación§! y §Yseguridad interna§!."
 GER_Bundeswehr_modifier: "Heer"
 GER_Bundeswehr_modifier_desc: "El Heer alemán se encuentra en una encrucijada en el año 2000. Aunque fue diseñado y estructurado principalmente como un ejército de la Guerra Fría, su principal objetivo era defenderse de un posible conflicto a gran escala con el Pacto de Varsovia en Europa central. Sin embargo, con el fin de la Guerra Fría y la reunificación de Alemania, el Heer se enfrenta al desafío de transformarse para cumplir con los nuevos y diversos requisitos de misión en un entorno de seguridad global que cambia rápidamente."
