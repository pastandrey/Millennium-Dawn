 GER_citizen_in_uniform: "Ciudadano en Uniforme"
 GER_citizen_in_uniform_desc: "El principio del \"Ciudadano Uniformado\" es una piedra angular de la Bundeswehr, que enfatiza que los soldados no son solo personal militar, sino también miembros responsables de una sociedad democrática. Basada en el concepto de Innere Führung, esta doctrina garantiza que todos los militares, hombres y mujeres, defiendan los valores constitucionales, respeten los derechos humanos y rindan cuentas ante el gobierno civil. Al fomentar el pensamiento crítico, la responsabilidad ética y la lealtad democrática, mantenemos una fuerza militar que sirve al pueblo en lugar de gobernarlo."
 GER_cnc_check_tt: "Es necesario hacerlo"
 GER_Eurofighter.1.t: "Entrega Ceremonial del Eurofighter Typhoon"
 GER_Eurofighter.1.d: "Se ha alcanzado un hito en la aviación alemana. Hoy, la Luftwaffe recibe oficialmente su primer Eurofighter Typhoon Tranche 1. Desarrollado en colaboración con socios europeos, el Eurofighter representa un gran avance en las capacidades de combate aéreo, sustituyendo a los antiguos cazas con tecnología de vanguardia. La ceremonia de entrega, a la que asistieron altos funcionarios, simboliza el compromiso de Alemania con una fuerza aérea moderna y capaz. Con su aviónica avanzada, maniobrabilidad superior y funcionalidad multifunción, el Eurofighter Typhoon protegerá el espacio aéreo alemán durante décadas."
 GER_Eurofighter.1.a: "¡Comienza una nueva era para la Luftwaffe!"
 GER_Support_heimatverein: "Apoya a la asociación Heimatverein"
 GER_Support_heimatverein_desc: "Las asociaciones culturales locales (heimatverein) desempeñan un papel importante en la preservación de las tradiciones regionales y el fomento del espíritu comunitario. Al apoyar a estas organizaciones, el gobierno alemán busca mantener la diversidad cultural dentro de una identidad nacional unida. «Nuestra fuerza reside en nuestra diversidad regional», afirmó el excanciller Helmut Kohl. Estas asociaciones contribuyen al tejido social de Alemania preservando las costumbres y el patrimonio local."
 GER_Day_of_open_garrison: "Día de Cuartel Abierto"
 Germany_Mech.9.t: "El Ejército Británico Abandona Alemania"
 Germany_Mech.9.d: "Durante décadas, las fuerzas británicas han estado estacionadas en Alemania, moldeando la cooperación militar y la seguridad europea. Ahora, sus bases están vacías, sus viviendas abandonadas. Algunos ven esto como el fin de una era de amistad y alianza, mientras que otros lo ven como los últimos vestigios de una ocupación pasada que finalmente se desvanece."
 Germany_Mech.9.a: "Un sincero adiós a nuestros aliados."
 Germany_Mech.9.b: "Por fin, los ocupantes se han ido."
 Germany_Mech.10.t: "Las Tropas Estadounidenses Se Retiran de Territorio Alemán"
 Germany_Mech.10.d: "Las últimas tropas estadounidenses han abandonado sus bases en Alemania, cerrando así el capítulo de una presencia militar que perduró durante generaciones. Antaño piedra angular de la defensa europea de la OTAN, estas guarniciones ahora están vacías. Para algunos, es una despedida agridulce de socios de confianza. Para otros, supone una retirada largamente esperada de la influencia extranjera."
 Germany_Mech.10.a: "Adiós, viejos amigos."
 Germany_Mech.10.b: "¡Los ocupantes ya no son bienvenidos!"
 GER_Cold_War.10.t: "Futuro de los Antiguos Cuarteles de la Bundeswehr"
 GER_Cold_War.10.d: "Con la reestructuración y reducción de la Bundeswehr, muchas antiguas guarniciones ya no son necesarias. Algunas se encuentran en ubicaciones estratégicamente irrelevantes, mientras que otras podrían cumplir nuevos propósitos. La pregunta sigue siendo: ¿qué debemos hacer con estos emplazamientos?"
 GER_Cold_War.10.a: "Convertirlos en infraestructura civil."
 GER_Cold_War.10.b: "Preservárlos para un posible uso militar futuro."
 GER_Cold_War.10.c: "Venderlos a inversores privados."
 GER_Cold_War.11.t: "El Destino de los Antiguos Cuarteles Británicos"
 GER_Cold_War.11.d: "Con la retirada gradual del Ejército británico de Alemania, varias de sus antiguas guarniciones permanecen vacías. Estos emplazamientos militares albergaron en su día a miles de soldados y sus familias, pero ahora son reliquias vacías de la Guerra Fría. ¿Deberíamos reutilizarlos o dejar que la historia decida su destino?"
 GER_Cold_War.11.a: "Transformarlos en zonas habitacionales y comerciales."
 GER_Cold_War.11.b: "Mantenerlos como campos de entrenamiento militar."
 GER_Cold_War.11.c: "Preservarlos como sitios históricos de la era de la Guerra Fría."
 GER_news.03.t: "Accidente del Vuelo 4590 de Air France, 109 Muertos"
 GER_news.03.d: "El vuelo 4590 de Air France, un avión de pasajeros Concorde que realizaba un vuelo chárter internacional de París a Nueva York, se estrelló poco después del despegue. El avión se estrelló contra un hotel en la cercana Gonesse dos minutos después del despegue. Los nueve tripulantes y los cien pasajeros (96 de ellos alemanes) a bordo fallecieron, junto con cuatro personas que se encontraban en el hotel. Otras seis personas resultaron gravemente heridas.\n\nLa investigación oficial estuvo a cargo de la Oficina de Investigación y Análisis para la Seguridad de la Aviación Civil (BEA), la oficina francesa de investigación de accidentes. La investigación posterior al accidente reveló que la aeronave superaba el peso máximo de despegue para la temperatura ambiente y otras condiciones, y 810 kg (1790 lb) por encima del peso estructural máximo, con una carga que impedía que el centro de gravedad se encontrara por detrás del límite de despegue."
 GER_news.03.a: "Un golpe trágico para la aviación europea"
 GER_news.04.t: "Los Talibán Destruyen los Antiguos Budas de Bamiyán"
 GER_news.04.d: "El 12 de marzo de 2001, el régimen talibán en Afganistán destruyó los antiguos Budas de Bamiyán, dos estatuas monumentales talladas en los acantilados del valle de Bamiyán. Estas reliquias de gran importancia cultural e histórica permanecieron en pie durante más de 1500 años, representando el rico patrimonio budista de la región. La comunidad internacional ha condenado el acto como una grave pérdida para el patrimonio mundial."
 GER_news.04.a: "Un golpe trágico para la historia de la humanidad."
 GER_news.05.t: "'¡Adiós, Lenin!' se estrena en la Berlinale de 2002"
 GER_news.05.d: "En el Festival de Cine de la Berlinale de 2002, la película alemana '¡Adiós, Lenin!' se estrenó con gran éxito de crítica. Esta tragicomedia, ambientada tras la reunificación alemana, retrata la historia de un joven que oculta la caída del Muro de Berlín a su frágil madre. La película ofrece una reflexión humorística y conmovedora sobre la identidad de Alemania tras la reunificación y el choque entre Oriente y Occidente."
 GER_news.05.a: "Una película que captura el espíritu de una nación."
 GER_news.06.t: "Impacto PISA: Alemania Obtiene Puntuaciones por Debajo del Promedio"
 GER_news.06.d: "Los resultados del estudio PISA de 2002 conmocionaron a Alemania. La evaluación internacional de estudiantes de 15 años reveló que el rendimiento de los alumnos alemanes estaba por debajo del promedio de la OCDE en lectura, matemáticas y ciencias. Los hallazgos desencadenaron un debate nacional sobre el estado del sistema educativo alemán, lo que motivó la demanda de reformas importantes."
 GER_news.06.a: "Una llamada de atención para la educación alemana."
 GER_news.07.t: "Love Parade 2000: Una Celebración de Música y Libertad"
 GER_news.07.d: "La Love Parade 2000 en Berlín atrajo a más de un millón de visitantes, celebrando la música electrónica, la libertad y la unidad. Este evento anual, fundado originalmente como una pequeña manifestación por la paz y la música, se ha convertido en un símbolo de la cultura juvenil alemana moderna, atrayendo a ravers de todo el mundo a bailar en el corazón de la capital."
 GER_news.07.a: "Berlín, la capital mundial del techno."
 GER_news.08.t: "La Cúpula de Cristal del Reichstag Se Abre al Público"
 GER_news.08.d: "En 2001, la recién terminada cúpula de cristal del Reichstag se abrió al público, ofreciendo a los visitantes vistas panorámicas de Berlín. Diseñada por el arquitecto Sir Norman Foster, la cúpula transparente simboliza la apertura y la transparencia del gobierno, convirtiéndose en un referente de la democracia alemana moderna."
 GER_news.08.a: "Una visión clara del corazón de la democracia."
 GER_news.09.t: "El Colapso del Imperio Mediático Kirch"
 GER_news.09.d: "En 2002, el Grupo Kirch, uno de los mayores conglomerados mediáticos de Alemania, se declaró en concurso de acreedores. El colapso marcó uno de los mayores fracasos corporativos en la Alemania de la posguerra, conmocionando al panorama mediático alemán. Con el aumento de las deudas y el fracaso de las inversiones, la caída de Kirch expuso las debilidades estructurales de la industria mediática alemana."
 GER_news.09.a: "Cae un gigante de los medios."
 GER_news.10.t: "Desastre en la Pista de Pruebas del Transrapid"
 GER_news.10.d: "El 22 de septiembre de 2006, el vanguardista tren de levitación magnética Transrapid de Alemania sufrió un trágico accidente en su pista de pruebas en Emsland. Un vehículo de mantenimiento quedó abandonado por error en la vía, lo que provocó una colisión catastrófica que se cobró 23 vidas. El incidente eclipsó las ambiciones de Alemania de ser pionera en la tecnología de levitación magnética."
 GER_news.10.a: "Una tragedia para la innovación alemana."
 GER_news.11.t: "El Derrumbe del Archivo Histórico de Colonia Conmociona a Alemania"
 GER_news.11.d: "El 3 de marzo de 2009, el edificio del Archivo Municipal de Colonia se derrumbó inesperadamente en un foso de construcción adyacente, lo que provocó la pérdida de innumerables documentos históricos de siglos atrás. El derrumbe, atribuido a unas obras subterráneas defectuosas, ha sido descrito como uno de los mayores desastres culturales de la Alemania de posguerra."
 GER_news.11.a: "Una pérdida inestimable para la historia."
 GER_news.12.t: "Estalla el Escándalo en el Consejo de Supervisión de Volkswagen"
 GER_news.12.d: "En 2009, Volkswagen, el gigante automovilístico alemán, se vio envuelto en un escándalo que involucró a altos cargos de su consejo de supervisión. Las acusaciones de uso indebido de fondos de la empresa, viajes de lujo y favores personales pusieron de manifiesto problemas de gobernanza en la cúpula de una de las empresas más emblemáticas de Alemania. El asunto manchó la reputación de VW y desencadenó demandas de una supervisión más estricta."
 GER_news.12.a: "La corrupción mancha al gigante automovilístico."
