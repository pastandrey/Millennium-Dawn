 GER_end_mechanic_TT: "§OExtremismo de la Bundeswehr§! será §GContenido§!"
 GER_end_V_Fall: "Fin del Estado de Defensa"
 GER_end_V_Fall_desc: "Es hora de declarar formalmente el fin del estatus de defensa y reanudar las operaciones normales. Al hacerlo, restablecemos la gobernanza regular, la supervisión civil y reanudamos el funcionamiento normal de todas las instituciones, garantizando la estabilidad y la reanudación de la vida cotidiana."
 GER_winds.1.t: "Propaganda Extremista Encontrada en el Cuartel"
 GER_winds.1.d: "Un soldado de una de nuestras guarniciones fue arrestado tras distribuir propaganda extremista entre sus compañeros. Este incidente ha suscitado serias preocupaciones sobre la presencia de tales ideologías en nuestras fuerzas armadas y exige una respuesta rápida para evitar una mayor escalada."
 GER_winds.1.a: "Iniciar una investigación a gran escala y una ofensiva pública."
 GER_winds.1.b: "Restarle importancia al incidente como una mala conducta aislada"
 GER_winds.2.t: "Lenguaje Extremista Detectado en las Tropas"
 GER_winds.2.d: "Han surgido informes sobre la difusión de lenguaje extremista entre las tropas, junto con un escándalo relacionado con incidentes similares durante el entrenamiento básico. Esta situación podría empañar la reputación de la Bundeswehr y socavar la confianza pública en nuestro compromiso con los valores democráticos."
 GER_winds.2.a: "Implementar una política de tolerancia cero y una reforma sistémica"
 GER_winds.2.b: "Ignore las conversaciones internas, la moral es lo primero"
 GER_winds.3.t: "Descubrimiento de un Almacén de Armas Oculto"
 GER_winds.3.d: "Se ha descubierto un alijo de armas con material de la Bundeswehr, tanto moderno como antiguo, relacionado con un presunto grupo extremista. Este descubrimiento pone de manifiesto una posible brecha en la seguridad de nuestra cadena de suministro y exige medidas inmediatas para proteger y rastrear los activos militares."
 GER_winds.3.a: "Apoderarse de activos y procesar a todos los involucrados"
 GER_winds.3.b: "Dejemos que la inteligencia militar se encargue de ello en silencio."
 GER_winds.4.t: "Los Medios Revelan un Blog Extremista Administrado por Soldados"
 GER_winds.4.d: "Los medios de comunicación han descubierto un blog extremista dirigido por un grupo de soldados, que difunde retórica antidemocrática. Esta revelación amenaza la confianza pública en la Bundeswehr y plantea serias dudas sobre la selección de personal."
 GER_winds.4.a: "Condenar públicamente la plataforma y revisar el sistema de selección"
 GER_winds.4.b: "Silenciar a los medios y cerrar el caso internamente"
 GER_winds.5.t: "Radicalización de Veteranos Tras el Servicio"
 GER_winds.5.d: "Algunos exsoldados han mostrado signos de radicalización tras sus misiones, luchando por reintegrarse a la vida civil. Los informes indican que estas personas están siendo atraídas hacia círculos extremistas, lo que representa una amenaza creciente para la estabilidad social."
 GER_winds.5.a: "Lanzar un programa nacional de supervisión y apoyo a los veteranos"
 GER_winds.5.b: "Descartar la tendencia como aislada y exagerada"
 GER_winds.6.t: "Golpe de Estado"
 GER_winds.6.d: "Las crecientes tensiones entre la cúpula militar y el gobierno civil han alcanzado un punto crítico. Tras puertas cerradas, oficiales de alto rango y funcionarios de seguridad expresan una creciente frustración por la parálisis política, la percepción de extremismo ideológico y lo que denominan una \"crisis de rumbo nacional\".\n\nEl gobierno civil, mientras tanto, advierte sobre comportamientos inconstitucionales y redes secretas que socavan las instituciones democráticas.\n\nEl país contiene la respiración, pues las lealtades se pondrán a prueba, y las fuerzas armadas deben ahora decidir: ¿mantener la cadena de mando o actuar en nombre de la salvación nacional?"
 GER_winds.6.a: "Dejemos que el equilibrio cambie en silencio o con fuerza."
