 GER_panavia.1.t: "¿Reactivar la Producción del Tornado?"
 GER_panavia.1.d: "Aunque la línea de producción original del Tornado se cerró en 1998, el cambiante panorama estratégico ha reavivado el interés en la aeronave. Ante la evolución de los perfiles de misión, el aumento de las demandas operativas y las crecientes dudas sobre los plazos de las nuevas plataformas, se ha propuesto reiniciar la producción del Tornado.\n\nLos partidarios argumentan que una línea reactivada podría modernizar el diseño con nueva aviónica y armamento, ofreciendo una solución provisional de reconocida fiabilidad. Los críticos advierten que revivir un fuselaje con décadas de antigüedad podría agotar recursos de sistemas más preparados para el futuro."
 GER_panavia.1.a: "Reiniciar la Producción del Tornado con Mejoras"
 GER_panavia.1.b: "Dejar que el Tornado permanezca retirado"
 GER_panavia.2.t: "¿Una Iniciativa Europea de Sigilo?"
 GER_panavia.2.d: "Con la transición global hacia aeronaves de quinta generación y doctrinas furtivas, el sector de defensa aboga por una respuesta europea unificada. En lugar de depender de plataformas extranjeras, podríamos aprovechar la red Panavia y nuestra base industrial actual para iniciar un proyecto de desarrollo centrado en el sigilo.\n\nUn programa de este tipo fortalecería la soberanía de defensa europea, mantendría la competitividad aeroespacial y ofrecería una alternativa a largo plazo a los diseños estadounidenses o asiáticos. Sin embargo, exigiría una gran inversión, coordinación transfronteriza y un compromiso a largo plazo sin garantías de éxito."
 GER_panavia.2.a: "Lanzar el Proyecto Europeo de Sigilo"
 GER_panavia.2.b: "Sigilo es demasiado caro, concéntrese en otras cosas"
 GER_panavia.3.t: "¿Un Cazador Europeo Más Barato y Ágil?"
 GER_panavia.3.d: "Ante las limitaciones presupuestarias y los requisitos de flexibilidad operativa, expertos en defensa han propuesto el desarrollo de un nuevo avión de combate europeo más ligero. Este avión priorizaría la agilidad, la versatilidad y la asequibilidad, destinado a funciones de policía aérea, interceptación y ataque táctico.\n\nLos defensores argumentan que dicha plataforma complementaría sistemas más pesados ​​como el Eurofighter y reduciría la dependencia de cazas ligeros extranjeros. Los críticos advierten que podría drenar la financiación de proyectos furtivos de nueva generación o provocar la fragmentación de la industria de defensa europea."
 GER_panavia.3.a: "Sí, desarrollar un caza multifunción europeo ligero y ágil."
 GER_panavia.3.b: "No, concéntrese en las plataformas existentes"
