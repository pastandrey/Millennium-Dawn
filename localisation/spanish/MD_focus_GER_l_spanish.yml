 GER_idea_reform_international_institutions: "Reforma de las Instituciones Internacionales"
 GER_idea_reform_international_institutions_desc: "Alemania busca liderar los esfuerzos para reformar las instituciones internacionales, garantizando que reflejen mejor las realidades del siglo XXI. Al promover una mayor representación de las potencias emergentes y mejorar la transparencia y la rendición de cuentas, Alemania busca modernizar estas organizaciones para abordar eficazmente los desafíos globales y promover la cooperación internacional."
 GER_Ideas_Reformed_German_International_Institutes_desc: "Alemania ha modernizado sus instituciones internacionales para aumentar su eficacia y adaptarse a los cambiantes desafíos globales. Estas reformas priorizan la innovación, la cooperación y la garantía de que las instituciones alemanas se mantengan a la vanguardia de la diplomacia y la interacción multilateral."
 GER_idea_V_Fall: "El Estado de Defensa"
 GER_idea_V_Fall_desc: "Alemania implementa el Verteidigungs-Fall (Caso de Defensa), una estrategia de contingencia diseñada para la rápida movilización y coordinación de las medidas de defensa nacional. Este plan garantiza que la Bundeswehr y las infraestructuras críticas estén plenamente preparadas para afrontar amenazas inminentes a la seguridad y la soberanía de Alemania."
 GER_KfW_IPEX_Bank: "Banco KfW IPEX"
 GER_KfW_IPEX_Bank_desc: "El KfW IPEX-Bank es una institución vital para la financiación de las exportaciones y la inversión en Alemania. Centrado en el apoyo a los intereses económicos nacionales, el banco contribuye a promover el desarrollo de infraestructuras, la creación de empleo nacional y el fomento de la innovación tecnológica. Sus operaciones abarcan sectores como la energía, el transporte y la manufactura, garantizando la competitividad de las empresas alemanas a nivel mundial. Además de contribuir significativamente a la estabilidad económica, el banco también participa en el fomento de prácticas sostenibles y proyectos de energía renovable, en consonancia con el compromiso de Alemania con la responsabilidad ambiental."
 GER_Goethe_intitut: "Instituto Goethe"
 GER_Goethe_Intitut_desc: "El Goethe-Institut, con sede en Múnich, es la principal institución alemana dedicada a la promoción de la cultura y la lengua alemanas en todo el mundo. Como embajador cultural, fomenta la cooperación internacional, organiza eventos culturales e imparte cursos de idiomas a millones de personas en todo el mundo. Su sede en Múnich simboliza la dedicación del instituto a mantener fuertes lazos culturales y a la vez preservar el rico patrimonio alemán. Con una red que abarca más de 90 países, el Goethe-Institut garantiza que las contribuciones artísticas, literarias y lingüísticas de Alemania tengan repercusión internacional, fortaleciendo así su influencia cultural y su poder blando."
 Humbold_foundation_sharing_group_name: "Grupo de Colaboración de la Fundación Humboldt"
 Humbold_foundation_sharing_group_desc: "El Grupo de Intercambio de la Fundación Humboldt es una iniciativa diseñada para fomentar la colaboración académica internacional a largo plazo. Conecta a exalumnos de los programas de la Fundación Alexander von Humboldt con académicos en Alemania, promoviendo proyectos de investigación conjuntos e intercambios académicos recíprocos."
 GER_Ideas_IT_Workers: "Aprovechar el Talento en TI de India"
 GER_Ideas_IT_Workers_desc: "Alemania busca aprovechar la mano de obra cualificada en TI de la India. Esta iniciativa promueve la contratación de profesionales de TI indios para mejorar las capacidades tecnológicas y abordar la escasez de personal cualificado en el sector alemán de TI."
 GER_Ideas_Chinese_Partners: "Fomentar Alianzas con China"
 GER_Ideas_Chinese_Partners_desc: "Alemania se centra en fortalecer las alianzas económicas y tecnológicas con China. Esta iniciativa busca impulsar el comercio, la investigación colaborativa y la innovación mediante la cooperación mutua y el intercambio de conocimientos."
 GER_ideas_Israel_partner: "Colaborar con Innovadores Israelíes"
 GER_ideas_Israel_partner_desc: "Alemania busca colaborar con Israel en los ámbitos de la tecnología y la innovación. Esta iniciativa prioriza las empresas conjuntas, las colaboraciones de investigación y el intercambio de conocimientos para impulsar los avances tecnológicos y el crecimiento económico."
 GER_wandel_durch_handel: "Cambio a Través del Comercio"
 GER_wandel_durch_handel_desc: "Alemania busca impulsar el progreso social y económico fomentando las relaciones comerciales. Esta estrategia enfatiza el papel del comercio internacional en la promoción de la paz, la innovación y el desarrollo sostenible."
 GER_Ideas_International_education_I: "Educación para la Estabilidad"
 GER_Ideas_International_education_I_desc: "Reconociendo la educación como un pilar de la estabilidad global, Alemania invierte en alianzas académicas con países en desarrollo. Mediante el apoyo a becas, formación profesional y programas de intercambio de docentes, esta iniciativa busca impulsar el crecimiento social y económico a largo plazo, a la vez que fortalece las relaciones diplomáticas."
 GER_Ideas_International_education_II: "Programa Educativo Internacional"
 GER_Ideas_International_education_II_desc: "Alemania amplía sus iniciativas educativas internacionales mediante acuerdos bilaterales con universidades e instituciones de investigación de todo el mundo. Este programa fomenta la movilidad estudiantil, facilita colaboraciones en investigación de vanguardia y promueve la innovación académica transfronteriza."
 GER_Ideas_International_education_III: "Promover el Idioma Alemán en la Educación"
 GER_Ideas_International_education_III_desc: "Alemania intensifica sus esfuerzos para integrar el idioma alemán en los sistemas educativos globales. A través de los programas del Goethe-Institut, becas de idiomas e iniciativas de intercambio cultural, esta política busca fortalecer la influencia cultural alemana y fomentar una mayor cooperación internacional."
 GER_Ideas_International_education_IV: "Fomentar Alianzas Educativas Globales"
 GER_Ideas_International_education_IV_desc: "Alemania se centra en establecer sólidas alianzas educativas con países de todo el mundo. Esta iniciativa busca potenciar los programas de intercambio académico, los proyectos de investigación conjuntos y las oportunidades de aprendizaje colaborativo."
 GER_Luftwaffe_modifier: "Luftwaffe"
 GER_Luftwaffe_modifier_desc: "La Luftwaffe, la fuerza aérea de la Bundeswehr. Originalmente diseñada como una fuerza de la Guerra Fría, su misión principal era defender el espacio aéreo de Alemania Occidental contra una posible agresión soviética. Sin embargo, con el fin de la Guerra Fría, la reunificación de Alemania y la evolución de las amenazas globales, la Luftwaffe se enfrenta al reto de transformarse para cumplir con los nuevos requisitos de su misión."
 GER_Deutsche_Marine_modifier: "Armada Alemana"
 GER_Deutsche_Marine_modifier_desc: "Durante la Guerra Fría, la misión de la Armada Alemana era proteger las costas de Alemania Occidental, asegurar el control de rutas marítimas vitales y contrarrestar el poder naval soviético en el Mar Báltico. La reunificación de Alemania en 1990 supuso la integración de la Armada de Alemania Oriental (Volksmarine) en la Marina Alemana (Deutsche Marine), fusionando diferentes doctrinas, equipos y personal en una única fuerza cohesionada."
