 GER_Eurofighter.2.t: "Variante del Eurofighter Ofrecida para Pruebas"
 GER_Eurofighter.2.d: "A medida que el panorama de seguridad global continúa evolucionando hacia zonas marítimas en disputa y la proyección de fuerzas de largo alcance, el Consorcio Eurofighter nos ha presentado dos vías de actualización especializadas para la estructura del Typhoon. Estas variantes buscan ampliar el rol operativo del avión de combate más allá de sus actuales parámetros multifuncionales.\n\nLa primera propuesta se centra en una variante de patrulla naval de largo alcance, optimizada para vigilancia costera, operaciones antibuque y ataques marítimos. Con una mejor integración de radar, mayor capacidad de combustible y mayor autonomía de misión, esta variante cubriría las deficiencias actuales en el reconocimiento aéreo marítimo.\n\nLa segunda opción contempla un Eurofighter con capacidad de portaaviones, adaptado para el lanzamiento y la recuperación desde portaaviones. Este concepto requeriría refuerzos estructurales, integración de ganchos de detención y compatibilidad con STOBAR, lo que potencialmente posicionaría a Alemania a la vanguardia de la futura aviación naval en Europa.\n\nCada propuesta ofrece diferentes ventajas estratégicas. Sin embargo, ambas requieren una financiación significativa, cambios de doctrina y, posiblemente, inversiones a largo plazo en infraestructura de apoyo. Nuestro Ministerio de Defensa debe ahora evaluar si adopta una de estas variantes prospectivas o redirige el presupuesto asignado a esfuerzos de modernización alternativos."
 GER_Eurofighter.2.a: "Adoptar la Variante de Patrulla Naval"
 GER_Eurofighter.2.a_desc: "La variante de patrulla cuenta con un alcance extendido, integración de radar marítimo y modificaciones reforzadas en la estructura para una vigilancia marítima de larga duración. Sería ideal para proteger rutas marítimas y consolidar la presencia en zonas marítimas en disputa."
 GER_Eurofighter.2.b: "Adoptar la Variante Capaz de Portaaviones"
 GER_Eurofighter.2.b_desc: "El Eurofighter, con capacidad para portaaviones, incluye tren de aterrizaje reforzado, sistema de gancho de cola y modificaciones estructurales para compatibilidad con STOBAR. Si bien técnicamente es ambiciosa, esta variante representaría un salto en la proyección de poder aéreo respecto a las plataformas navales."
 GER_Eurofighter.2.c: "Reubicar los Fondos"
 GER_Eurofighter.2.c_desc: "Si bien las variantes propuestas ofrecen capacidades únicas, actualmente carecemos de la infraestructura o la necesidad estratégica para respaldar su implementación. En su lugar, los recursos se reasignarán a programas de adquisiciones o I+D más inmediatos."
 GER_Eurofighter.3.t: "Líneas de Ensamblaje Final Conjuntas Propuestas"
 GER_Eurofighter.3.d: "Como parte de la coordinación continua del Consorcio Eurofighter, se ha propuesto optimizar y formalizar la estructura de las plantas de ensamblaje final. La idea es asignar a cada país participante un centro de ensamblaje especializado, manteniendo estándares y plazos unificados. Este enfoque fortalecería la colaboración industrial, pero podría limitar el control independiente sobre el ritmo de producción y la personalización nacional."
 GER_Eurofighter.3.a: "Aceptar la coordinación de ensamblaje conjunto"
 GER_Eurofighter.3.b: "Mantengamos nuestra asamblea final nacional independiente"
 GER_Eurofighter.4.t: "Programas Compartidos de Investigación y Desarrollo"
 GER_Eurofighter.4.d: "El Consorcio Eurofighter ha abierto la siguiente fase de cooperación multilateral: un marco unificado de investigación y desarrollo. Al aunar recursos de ingeniería, datos de vuelo y planificación de actualizaciones, todos los socios se beneficiarían de un progreso sincronizado y una reducción de costes. Sin embargo, la participación podría reducir el control nacional sobre las prioridades tecnológicas y la autonomía de exportación."
 GER_Eurofighter.4.a: "Participar en I+D compartida"
 GER_Eurofighter.4.b: "Rechazar y mantener la investigación independiente"
 GER_Eurofighter.5.t: "[ROOT.GetNameWithFlag] Toma el Control del Ensamblaje del Ala"
 GER_Eurofighter.5.d: "[ROOT.GetNameWithFlag] ha asumido oficialmente la responsabilidad de la producción de los componentes del ala del Eurofighter. Esto incluye el control del diseño aerodinámico, la integración de los puntos de anclaje y los sistemas internos de combustible. Su sector industrial desempeña ahora un papel crucial en las características de vuelo y la eficiencia estructural del caza."
 GER_Eurofighter.5.a: "Interesante"
 GER_Eurofighter.6.t: "[ROOT.GetNameWithFlag] Hace Cargo de la Producción de Fuselajes"
 GER_Eurofighter.6.d: "[ROOT.GetNameWithFlag] se ha hecho cargo del fuselaje central y del fuselaje del conjunto del Eurofighter. Esta responsabilidad incluye el núcleo estructural del avión y sus sistemas de carga, una función clave para determinar la adaptabilidad y resiliencia del caza."
 GER_Eurofighter.6.a: "Interesante"
 GER_Eurofighter.7.t: "[ROOT.GetNameWithFlag] Hace Cargo de la Cabina y la Aviónica"
 GER_Eurofighter.7.d: "[ROOT.GetNameWithFlag] ha asumido la dirección de producción de la sección frontal, la cabina y el sistema de aviónica del Eurofighter. Este segmento determina la ubicación de los sensores, el diseño de la interfaz y las capacidades del radar, lo que otorga control estratégico sobre la percepción del campo de batalla y el potencial de combate del avión."
 GER_Eurofighter.7.a: "Interesante"
