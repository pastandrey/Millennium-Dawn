 GER_status_report_desc: "El informe de situación nos permitirá controlar a todos los elementos radicales de nuestra nación. Principalmente, a los extremistas islamistas, de izquierda y de derecha. Si el extremismo es alto, significa que el departamento responsable de controlarlos no está logrando mantener el ritmo, y sus actividades podrían pronto perturbar la estabilidad nacional. Si el extremismo es medio, significa que el departamento está realizando una labor deficiente en la contención de los grupos, y puede que haya algunos problemas, pero nada a nivel nacional. Un extremismo bajo significa que el departamento está conteniendo al grupo y que no representará ninguna amenaza para nuestra democracia."
 GER_status_on_right_wing: "Departamento 2: Extremismo de Derecha"
 GER_status_on_right_wing_desc: "El Departamento 2 mantiene un registro de cada grupo y organización de derecha importante."
 GER_status_on_left_wing: "Departamento 5: Extremismo de Izquierda"
 GER_status_on_left_wing_desc: "El Departamento 5 mantiene un registro de cada grupo y organización de izquierda importante."
 GER_status_on_sand_people: "Departamento 6: Extremismo Islámico"
 GER_status_on_sand_people_desc: "El Departamento 6 mantiene un registro de cada grupo y organización islamista importante. El Departamento 6 también mantiene un ojo vigilante sobre los islamistas fuera de la nación también."
