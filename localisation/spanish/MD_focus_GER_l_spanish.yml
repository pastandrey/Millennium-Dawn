 GER_HANS_PETER_KIRCHBACH: "Hans Peter Kirchbach"
 GER_International_schools: "Escuelas Internacionales"
 GER_International_schools_desc: "La financiación de la Escuela Internacional nos permitirá ofrecer una formación de primera calidad a expatriados e inmigrantes legales de todo el mundo y, al mismo tiempo, nos dará la posibilidad de integrarlos aún más en la cultura y sociedad alemanas, permitiéndoles conservar parte de sus propias características personales."
 GER_Investments_stuggart: "Inversión Estadounidense en Stuttgart"
 GER_Investments_stuggart_desc: "Los inversores de Estados Unidos parecen especialmente interesados ​​en Stuttgart y la región circundante de Baden-Württemberg, viéndola como una caja abierta de oportunidades listas para explotar."
 GER_Investments_cologne: "Inversión Rusa en Colonia"
 GER_Investments_cologne_desc: "Por otro lado, los empresarios rusos ven más bien el potencial en la costosa ciudad de Colonia, y citan su popularidad, alta calidad de vida y atractivo turístico como razones para promover nuevas empresas en ella."
 GER_rheinmetall_focus: "Rheinmetall"
 GER_rheinmetall_focus_desc: "Llegaremos a acuerdos con Rheinmetall y aumentaremos su producción de vehículos de grado militar."
 GER_KMW_focus: "KMW"
 GER_KMW_focus_desc: "Se contactará a KMW y se le pedirá que firme acuerdos con nuestro gobierno para nuevos vehículos de grado militar."
 GER_long_range: "Capacidades de Largo Alcance"
 GER_long_range_desc: "Necesitamos poder lanzar ataques a larga distancia, ya que, de no ser así, un enemigo superior podría aniquilar la nación sin que podamos contraatacar. La construcción de silos para misiles balísticos de largo alcance garantizará que podamos almacenar y desplegar estas armas."
 GER_Italian_invasion: "Atacar Italia"
 GER_Italian_invasion_desc: "Italia ha demostrado que su ejército está plagado de incompetencia y desorden. Por ello, podemos estar seguros de que cualquier resistencia del ejército italiano será rápidamente aplastada."
 GER_Decision_Bundeswehr_anger: "La Bundeswehr"
 GER_Decision_Bundeswehr_anger_desc: "§HLa Bundeswehr§! está experimentando una transformación esencial para abordar amenazas modernas como el terrorismo, las misiones de estabilización y las dinámicas geopolíticas cambiantes. Estos cambios exigen ajustes que preserven la eficacia operativa, a la vez que defienden los principios democráticos. En el centro de esta transformación se encuentra el §YConcepto del Führung Interior§!, que integra el papel de los soldados como defensores de la nación con su responsabilidad como ciudadanos éticos y democráticos.\n\nGarantizar el acceso a §Hequipamiento moderno§!, §Hcondiciones políticas estables§!,\n§HApoyo público y gubernamental§!, §Hliderazgo competente§!, §Hfinanciación suficiente§! \ny §Huna proporción adecuada entre soldados y generales§! son indispensables para garantizar la eficiencia operativa y afrontar los cambiantes desafíos de la defensa.\n\n[GER.GetFlag]§YIra de los Oficiales§!: [?ROOT.GER_Officer_anger]%\n[GER.GetFlag]§YIra de las Tropas§!: [?ROOT.GER_Troop_anger]%\n\nAl abordar estos elementos, §Hla Bundeswehr§! puede adaptarse a las demandas contemporáneas y, al mismo tiempo, seguir siendo una fuerza respetada y alineada con los valores democráticos."
 GER_mid_range_desc: "En Alemania, una sociedad equilibrada busca armonizar diversos elementos sociales, económicos y culturales. Esto implica garantizar el acceso equitativo a recursos, oportunidades y servicios para todos los ciudadanos, fomentando la cohesión y la estabilidad social."
 GER_1_left_side_range_desc: "Alemania ha sido desde hace mucho tiempo un centro de intercambio intercultural, donde se comparten y celebran diversas ideas y prácticas culturales. Este intercambio enriquece el tejido cultural de la nación, promoviendo el entendimiento y el respeto mutuos entre diferentes grupos culturales."
 GER_left_side_range_desc: "Una sociedad inclusiva en Alemania se esfuerza por brindar igualdad de oportunidades a todas las personas, independientemente de su origen. Esto incluye esfuerzos para combatir la discriminación y promover la integración social, garantizando que todos se sientan valorados y aceptados."
 GER_middle_left_side_range_desc: "Alemania ha implementado diversas políticas y programas para facilitar la integración de los inmigrantes en su vida social, económica y cultural. Este proceso incluye cursos de idiomas, apoyo laboral e iniciativas de participación comunitaria para ayudar a los inmigrantes a convertirse en miembros activos y contribuyentes de la sociedad."
 GER_far_left_side_range_desc: "Alemania es conocida por su innovación cultural, donde nuevas ideas, prácticas y productos surgen continuamente y moldean el panorama cultural. Esta innovación se ve impulsada por una dinámica combinación de tradición y modernidad, que fomenta la creatividad y el progreso."
 GER_Militarism_desc: "El pluralismo cultural en Alemania refleja la coexistencia de múltiples grupos culturales distintos, cada uno conservando su identidad única y contribuyendo a la sociedad en su conjunto. Este pluralismo se considera una fortaleza que enriquece la diversidad y la riqueza cultural de la nación."
 GER_1_right_side_range_desc: "El concepto de Volksgemeinschaft, o \"comunidad popular\", enfatiza una identidad nacional unificada. En la Alemania contemporánea, esta idea suele asociarse con el fomento del sentido de pertenencia y solidaridad entre los ciudadanos, sin perder de vista sus connotaciones históricas."
 GER_right_side_range_desc: "El concepto de pureza cultural implica preservar las tradiciones y prácticas culturales en su forma original. En Alemania, esto se refleja en los esfuerzos por mantener las costumbres, los dialectos y el patrimonio regionales, a la vez que se equilibran las influencias de la globalización."
 GER_middle_right_side_range_desc: "El patrimonio nacional de Alemania abarca su rica historia, tradiciones, monumentos y artefactos culturales. Preservar y promover este patrimonio es crucial para fomentar un sentido de identidad y orgullo nacional entre los ciudadanos."
 GER_far_right_side_range_desc: "La unidad étnica en Alemania se centra en fomentar la solidaridad y la cohesión entre los diversos grupos étnicos. Esto implica promover el entendimiento y la cooperación, a la vez que se abordan los desafíos relacionados con la diversidad étnica y la integración."
 GER_Anti_Militarism_desc: "En Alemania, la conformidad cultural se refiere a la práctica de alinear el comportamiento y las creencias individuales con las normas culturales dominantes. Esto se refleja en las expectativas y valores sociales que configuran la vida cotidiana, a la vez que permiten la expresión individual y la diversidad."
 GER_multicultural_curriculum_campain_in_schools: "Campaña de Currículo Multicultural en las Escuelas"
 GER_multicultural_curriculum_campain_in_schools_desc: "A medida que Alemania continúa evolucionando hacia una sociedad más multicultural, la necesidad de un currículo inclusivo en las escuelas se ha vuelto primordial. Siguiendo la influencia de las políticas educativas progresistas de la década de 1990, esta campaña busca garantizar que los estudiantes aprendan sobre los diversos orígenes culturales que contribuyen a la estructura de la Alemania moderna. El canciller Gerhard Schröder comentó: «Nuestro futuro depende de la convivencia, del respeto y la comprensión de las culturas de los demás». Esta iniciativa es clave para fomentar la cohesión social en una nación en transformación."
 GER_Promote_Cultural_exchange_Programs: "Promover Programas de Intercambio Cultural"
 GER_Promote_Cultural_exchange_Programs_desc: "En un esfuerzo por promover el entendimiento mutuo y la cooperación global, Alemania ha ampliado sus programas de intercambio cultural. Estas iniciativas, que se remontan a la posguerra, buscan crear alianzas duraderas con países de todo el mundo. Líderes prominentes como Willy Brandt enfatizaron que «la paz no lo es todo, pero sin paz, todo es nada». El intercambio cultural se considera una herramienta de poder blando para fortalecer la diplomacia, fomentar la amistad y el intercambio de conocimientos a través de las fronteras."
 GER_provide_federal_foundings_for_migration_cultural_centers: "Otorgar Financiamiento Federal a Centros Culturales de Migración"
 GER_provide_federal_foundings_for_migration_cultural_centers_desc: "Reconociendo la importancia de integrar a los migrantes en la sociedad alemana, se destinan fondos federales a centros culturales que atienden a las comunidades inmigrantes. Estos centros ofrecen clases de idiomas, servicios sociales y actividades culturales destinadas a promover la integración. En un discurso, el expresidente Johannes Rau declaró: «No debemos ver la migración como una amenaza, sino como una oportunidad». Estos centros desempeñan un papel crucial para ayudar a los migrantes y refugiados a arraigarse en Alemania, preservando al mismo tiempo su identidad cultural."
 GER_Support_Multicultural_Art_and_literature_initiative: "Apoyar la Iniciativa de Arte y Literatura Multicultural"
 GER_Support_Multicultural_Art_and_literature_initiative_desc: "El gobierno alemán reconoce desde hace tiempo el papel del arte y la literatura como reflejo de la identidad nacional en constante evolución. Apoyar iniciativas artísticas multiculturales no solo fomenta la creatividad, sino que también resalta las contribuciones de las comunidades inmigrantes a la cultura alemana. «El arte y la cultura son el alma de nuestra sociedad», afirmó Angela Merkel. Esta iniciativa garantiza que se escuchen voces diversas en el panorama literario y artístico alemán."
 GER_launch_multicultural_media_campain: "Lanzar Campaña Multicultural en Medios"
 GER_launch_multicultural_media_campain_desc: "Esta campaña mediática, dirigida a promover los valores de la diversidad y la inclusión, busca desafiar los estereotipos y destacar los beneficios de una sociedad multicultural. En consonancia con los esfuerzos de Alemania por combatir la xenofobia y fomentar la armonía social, esta campaña presenta a figuras destacadas de diversos orígenes culturales. El excanciller Helmut Schmidt afirmó: «La tolerancia es un aspecto importante de la democracia». La campaña refuerza el compromiso de Alemania con una sociedad más inclusiva."
 GER_Wehrmachtsausstellung: "Exposición \"Wehrmachtsausstellung\""
 GER_Wehrmachtsausstellung_desc: "La Wehrmachtsausstellung, una exposición que destaca el papel de la Wehrmacht en la Segunda Guerra Mundial, desató el debate nacional desde su presentación en la década de 1990. La exposición desafía el mito de la «Wehrmacht limpia» y arroja luz sobre la complicidad del ejército alemán en los crímenes de guerra nazis. Como afirmó el presidente federal Richard von Weizsäcker: «Reconciliarse con el pasado es la clave de nuestro futuro». La exposición sigue siendo una parte importante de la Erinnerungskultur (cultura del recuerdo) alemana."
 GER_Launch_Erinnerungskultur_campain: "Lanzar la Campaña de Cultura del Recuerdo"
 GER_Launch_Erinnerungskultur_campain_desc: "La campaña Erinnerungskultur refleja el compromiso constante de Alemania con la memoria de su pasado y con garantizar que los horrores de la era nazi no se repitan. Mediante programas educativos, monumentos públicos y días nacionales de conmemoración, esta campaña busca inculcar un sentido de responsabilidad en las generaciones futuras. El excanciller Helmut Kohl comentó: «Solo quienes conocen el pasado pueden comprender el presente y forjar el futuro»."
 GER_Revitalize_german_historical_Narratives_in_school: "Revitalizar las Narrativas Históricas Alemanas en las Escuelas"
 GER_Revitalize_german_historical_Narratives_in_school_desc: "En respuesta a la demanda de un enfoque más equilibrado de la historia alemana, esta iniciativa revitaliza la enseñanza de narrativas históricas en las escuelas. Enfatiza no solo los capítulos más oscuros del pasado alemán, sino también sus logros en democracia, derechos humanos y consolidación de la paz. Como afirmó el expresidente Joachim Gauck: «La historia de Alemania es a la vez una advertencia y una inspiración para las generaciones futuras». Este programa busca garantizar una comprensión matizada de la historia entre los estudiantes."
 GER_Promote_Traditional_german_values_in_media: "Promover los Valores Tradicionales Alemanes en los Medios"
 GER_Promote_Traditional_german_values_in_media_desc: "Esta campaña busca promover valores tradicionales alemanes como la democracia, la tolerancia y el respeto al Estado de derecho a través de plataformas mediáticas. En consonancia con los valores constitucionales alemanes de posguerra, la iniciativa busca reforzar estos principios en el discurso público. Como dijo el excanciller Konrad Adenauer: «La unidad del pueblo es la base de la fuerza del Estado». La campaña enfatiza la unidad a través de valores compartidos."
 GER_Strengthen_language_purity_campain: "Fortalece la Campaña de Pureza del Idioma"
 GER_Strengthen_language_purity_campain_desc: "En respuesta a la creciente influencia de las lenguas extranjeras y el argot en la comunicación cotidiana, esta campaña busca preservar la pureza del alemán. Refleja la preocupación por la identidad cultural y el patrimonio lingüístico. Thomas Mann, reconocido escritor alemán, afirmó: «Una nación que olvida su lengua se olvida a sí misma». Esta iniciativa fomenta el uso adecuado del alemán, especialmente en la educación y los medios de comunicación."
 GER_Launch_national_identity_courses_for_migrants: "Lanzar Cursos de Identidad Nacional para Migrantes"
 GER_Launch_national_identity_courses_for_migrants_desc: "Con el objetivo de fomentar la integración y enseñar los valores de la sociedad alemana, estos cursos ayudan a los migrantes a comprender los derechos y responsabilidades de vivir en Alemania. Abordan temas como la democracia, el Estado de derecho y la historia alemana. Como afirmó el presidente Frank-Walter Steinmeier: «Nuestra identidad se define por cómo acogemos a los demás». Estos cursos ayudan a los recién llegados a comprender y aceptar su nuevo hogar."
 GER_Launch_made_in_germany_campain: "Lanzar la Campaña \"Hecho en Alemania\""
 GER_Launch_made_in_germany_campain_desc: "La campaña «Hecho en Alemania» destaca la calidad, la innovación y la fiabilidad de los productos alemanes. Conocida mundialmente como una marca de excelencia, la frase «Hecho en Alemania» se ha convertido en sinónimo de ingeniería y artesanía. El excanciller Ludwig Erhard, artífice del «Wirtschaftswunder» (milagro económico), creía que «el éxito económico de Alemania reside en su dedicación a la calidad». Esta campaña promueve el legado industrial alemán y su competitividad global."
 GER_Fund_national_Culture_festivals: "Financiar Festivales de Cultura Nacional"
 GER_Fund_national_Culture_festivals_desc: "Los festivales culturales de Alemania, que celebran el diverso patrimonio artístico y musical del país, reciben apoyo a través de esta iniciativa. Los festivales destacan tanto la cultura tradicional como la contemporánea, ofreciendo una plataforma para que los artistas muestren su trabajo. Como dijo Goethe: «La cultura de una nación reside en el corazón y el alma de su gente». Estos festivales son un testimonio de la vitalidad y la creatividad de la escena cultural alemana."
 Naval_bonus: "Bonificación Naval"
 GER_harsh_breach_final_settlement_threat: "Duro incumplimiento del acuerdo final"
 GER_breach_final_settlement_threat: "Acuerdo final por incumplimiento"
 GER_Contract_I_TT: "Se lanza el dado, esperemos y veamos cómo reaccionan tus vecinos."
 GER_Neighbor_Opinion_tt: "Decidirán cómo continuarán su relación con nuestra nación."
 GER_SAPOS_decision: "El Sistema SAPOS"
 GER_SAPOS_decision_desc: "\n£GER_desctext_sapos_network\n\n\n\nEl sistema SAPOS, o Satellitenpositionierungsdienst der deutschen Landesvermessung (Servicio de Posicionamiento por Satélite del Servicio Nacional de Topografía Alemana), es una red sofisticada diseñada para proporcionar servicios de posicionamiento de alta precisión en toda Alemania. Aprovecha una combinación de sistemas globales de navegación por satélite (GNSS), como GPS y GLONASS, y estaciones de referencia terrestres para proporcionar datos de posicionamiento en tiempo real y posprocesados ​​con precisión centimétrica."
 GER_lease_acces_china: "Arrendamiento de acceso al sistema Beidou"
 GER_lease_acces_RUS: "Arrendamiento de acceso al sistema GLONASS"
 GER_lease_acces_USA: "Arrendamiento de acceso al sistema GPS"
