 GER_idea_bfv_leftwing_low: "Bundesamt Für Verfassungsschutz"
 GER_Armored_Rec_TT: "En lugar de depender únicamente de vehículos ligeros de reconocimiento, se podría introducir una plataforma más blindada para permitir un reconocimiento con capacidad de combate. Este enfoque garantiza una mayor capacidad de supervivencia y potencia de fuego, permitiendo a la unidad enfrentarse a las fuerzas enemigas cuando sea necesario, sin dejar de cumplir su función de exploración."
 GER_Medium_Reduce_TT: "En lugar de una reducción drástica, la Bundeswehr se someterá a una reducción controlada, priorizando la eficiencia sin comprometer las capacidades operativas clave. Se racionalizarán ciertas formaciones pesadas, mientras que se continuará invirtiendo en fuerzas de despliegue rápido, logística y modernización. Este enfoque reduce costos y preserva la capacidad de Alemania para responder a las crisis."
 GER_Cold_War.21.c: "Puede que sea caro, pero mantendremos el tamaño actual."
 GER_idea_Mining_I: "Subvenciones a la Minería"
 GER_idea_Mining_II: "Subvenciones a la Minería"
 GER_idea_Sickman: "El \"Hombre Enfermo de Europa\""
 GER_idea_BND: "Servicio Federal de Noticias"
 GER_idea_German_politics: "Sociedad Alemana"
 GER_Idea_Innere_fuhrung_II: "Concepto de Innere Führung en la Bundeswehr Alemana"
 GER_Cold_War.26.t: "Reorganización de las Fuerzas Territoriales"
 GER_Cold_War.26.d: "Con el establecimiento de la Streitkräftebasis, la continuidad del Territorialheer se ha puesto en duda. Mantener cadenas de mando separadas y estructuras de apoyo redundantes ya no se ajusta a la doctrina militar moderna. Ahora debemos decidir qué hacer con estas unidades, una decisión que definirá nuestra organización militar interna en los próximos años."
 GER_Cold_War.26.a: "Disolver las unidades y retirar la estructura"
 GER_Cold_War.26.b: "Reducir la fuerza, pero conservar cierta capacidad"
 GER_Cold_War.26.c: "Integrarlos completamente en el Streitkräftebasis"
 post_balkan_war_categories: "Consecuencias de la Guerra de Yugoslavia"
 post_balkan_war_categories_desc: "\n\n£GER_desctext_KFOR_test\n\n\n\n\nLas secuelas de las guerras de los Balcanes sumieron a la región en la agitación, lo que requirió la presencia militar internacional para mantener la estabilidad. Uno de los incidentes más infames ocurrió en el aeropuerto de Pristina en junio de 1999, donde el general británico Sir Mike Jackson rechazó la orden del Comandante Supremo de la OTAN, Wesley Clark, de retirar por la fuerza a las tropas rusas que se habían apoderado primero del aeropuerto, afirmando: «No voy a iniciar la Tercera Guerra Mundial por ustedes». Este tenso enfrentamiento puso de manifiesto la fragilidad de las operaciones de posguerra. Mientras tanto, el general alemán Helmut Harff se enfrentó a un oficial fronterizo serbio que exigió la retirada de las tropas alemanas. Harff, manteniendo la calma, le dio al oficial 30 minutos para cumplir. Cuando el oficial protestó, se produjo una discusión; Harff simplemente respondió: «Ahora son 28». Estos momentos pusieron de relieve la alta tensión en la región y el delicado equilibrio que la OTAN debía mantener para evitar nuevos conflictos.\n\nEstado actual §Y[SER.Balkan_status]§!\n"
