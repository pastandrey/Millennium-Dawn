 Balkan.1.t: "¡Serbia Lanza un Ataque contra Kosovo!"
 Balkan.1.d: "Las tensiones en los Balcanes han vuelto a estallar en un conflicto abierto tras el lanzamiento de una ofensiva militar por parte de las fuerzas serbias contra Kosovo. Ante una presión abrumadora, el gobierno kosovar ha solicitado ayuda internacional. Como aliados suyos, debemos decidir cómo responder: ¿Debemos comprometer nuestras fuerzas en su defensa, brindarles ayuda militar o evitar la intervención directa para proteger a nuestros propios soldados?"
 Balkan.1.a: "¡Nos uniremos a la lucha!"
 Balkan.1.b: "Enviar equipo y suministros."
 Balkan.1.c: "No vale la pena arriesgar la vida de nuestros soldados."
 Balkan.101.t: "¡Apoyo Aliado para Kosovo!"
 Balkan.101.d: "Nuestros aliados han atendido nuestro llamado y han comprometido sus fuerzas en la defensa de Kosovo. Con su ayuda, ahora tenemos mayores posibilidades de repeler la agresión serbia y garantizar la soberanía de Kosovo."
 Balkan.101.a: "¡Juntos, prevaleceremos!"
 Balkan.102.t: "Llega Ayuda Militar a Kosovo"
 Balkan.102.d: "Aunque nuestros aliados han optado por no intervenir directamente, han enviado armas y suministros muy necesarios. Si bien esto refuerza nuestras defensas, la ausencia de sus tropas nos deja solos ante el embate del asalto serbio."
 Balkan.102.a: "Al menos no estamos completamente abandonados."
 Balkan.103.t: "Kosovo Queda Solo"
 Balkan.103.d: "A pesar de nuestras desesperadas súplicas de ayuda, nuestros supuestos aliados se han negado a enviar tropas ni suministros. Kosovo ahora debe enfrentarse al poderío militar de Serbia con sus propios recursos limitados. La traición no será olvidada."
 Balkan.103.a: "Lo recordaremos."
 Balkan.2.t: "¡Bosnia Pide Ayuda!"
 Balkan.2.d: "Las fuerzas serbias han lanzado una agresiva campaña contra Bosnia, amenazando con desestabilizar toda la región. El gobierno bosnio nos ha solicitado ayuda. ¿Les apoyaremos enviando tropas, proporcionando suministros militares o nos mantendremos al margen del conflicto para evitar poner en peligro a nuestras propias fuerzas?"
 Balkan.2.a: "¡Nos uniremos a la lucha!"
 Balkan.2.b: "Enviar armas y suministros"
 Balkan.2.c: "Esta no es nuestra guerra."
 Balkan.201.t: "Fuerzas Aliadas Llegan a Bosnia"
 Balkan.201.d: "Nuestros aliados han respondido a la petición de ayuda de Bosnia y han comprometido sus fuerzas para repeler la ofensiva serbia. Su apoyo fortalece nuestra posición y garantiza un esfuerzo coordinado contra la agresión serbia."
 Balkan.201.a: "¡Unidos, ganaremos!"
 Balkan.202.t: "Armas para Bosnia"
 Balkan.202.d: "Si bien nuestros aliados se han negado a enviar tropas, han suministrado a Bosnia armas y recursos muy necesarios. Esto ayudará a las fuerzas bosnias a defender su territorio, pero sin apoyo militar externo, la lucha sigue siendo incierta."
 Balkan.202.a: "Al menos tenemos algún respaldo."
 Balkan.203.t: "Bosnia Queda Sola para Luchar"
 Balkan.203.d: "A pesar de las reiteradas solicitudes de ayuda, nuestros supuestos aliados le han dado la espalda a Bosnia. Sin apoyo externo, el gobierno bosnio ahora debe depender completamente de sus propias fuerzas para resistir la agresión serbia."
 Balkan.203.a: "No olvidaremos esta traición."
 Balkan.3.t: "Croacia Busca Restaurar Su Antiguo Esplendor"
 Balkan.3.d: "El gobierno croata ha declarado abiertamente su ambición de recuperar su antigua posición e influencia en los Balcanes. Este nuevo nacionalismo preocupa a sus vecinos y a la comunidad internacional. ¿Hasta dónde llegará Croacia en su búsqueda de la grandeza?"
 Balkan.3.a: "Una decisión audaz para la región."
 Balkan.301.t: "Croacia Se Repliega hacia Adentro"
 Balkan.301.d: "Con el fervor nacionalista extendiéndose por el país, Croacia ha revocado el permiso para que todas las fuerzas occidentales operen dentro de sus fronteras. A medida que aumentan las tensiones, la incertidumbre se cierne sobre la región: ¿quién sabe qué pasará después?"
 Balkan.301.a: "Esto podría tener consecuencias."
 Balkan.302.t: "Croacia Apela a Rusia en Busca de Apoyo"
 Balkan.302.d: "Croacia nos ha tendido la mano, a la gloriosa Rusia, protectora indiscutible de las naciones eslavas, en busca de ayuda. Si bien el apoyo directo corre el riesgo de provocar a la OTAN, existen maneras de ayudarlos discretamente sin provocar un conflicto abierto."
 Balkan.302.a: "Envía equipo y algunos soldados. Ehm, quiero decir ... voluntarios."
 Balkan.302.b: "Algunos voluntarios no levantarán sospechas."
 Balkan.302.c: "Demasiado arriesgado para una guerra sin sentido."
 Balkan.303.t: "El Apoyo Ruso Fortalece a Croacia"
 Balkan.303.d: "El equipo y el personal proporcionados por Rusia han reforzado significativamente la capacidad militar de Croacia. Con su apoyo, Croacia se encuentra ahora en una posición más sólida para impulsar su agenda nacionalista."
 Balkan.303.a: "¡Agradecemos a Rusia por su constante apoyo!"
 Balkan.304.t: "La \"Solución de Voluntarios\""
 Balkan.304.d: "Voluntarios rusos se han unido discretamente a las fuerzas croatas, aportando experiencia y reforzando sus filas. Aunque el mundo pueda sospechar de la participación rusa, la negación plausible sigue intacta, por ahora."
 Balkan.304.a: "Los “amables voluntarios” de Rusia siempre son bienvenidos."
 Balkan.305.t: "Rusia Rechaza el Llamado de Croacia"
 Balkan.305.d: "A pesar de su petición, el Kremlin ha decidido no involucrarse en las aspiraciones nacionalistas de Croacia. Abandonada a su suerte, Croacia debe ahora buscar otra vía para lograr sus ambiciones."
 Balkan.305.a: "¡Suka, blyad!"
 Balkan.4.t: "Albania Busca Restaurar Su Antiguo Esplendor"
 Balkan.4.d: "Los líderes de Albania han comenzado a abogar por el retorno a su antigua prominencia, avivando el sentimiento nacionalista y generando preocupación en la región. ¿Hasta dónde los llevarán sus ambiciones?"
 Balkan.4.a: "Una decisión audaz para la región."
 Balkan.401.t: "Albania Expulsa a las Fuerzas Occidentales"
 Balkan.401.d: "Impulsada por ideales nacionalistas, Albania ha revocado todos los permisos para que las fuerzas occidentales operen dentro de sus fronteras. Sin supervisión extranjera, sus próximos pasos siguen siendo impredecibles."
 Balkan.401.a: "Esto podría provocar inestabilidad."
 Balkan.402.t: "Albania Busca Ayuda Rusa"
 Balkan.402.d: "En una acción sorprendente, Albania ha recurrido a nosotros, la poderosa Rusia, para apoyar sus ambiciones. Una intervención directa podría provocar a la OTAN, pero existen maneras de apoyarla discretamente sin desencadenar un conflicto abierto."
 Balkan.402.a: "Envía equipo y algunos soldados. Ehm, quiero decir ... voluntarios."
 Balkan.402.b: "Algunos voluntarios no levantarán sospechas."
 Balkan.402.c: "Demasiado arriesgado para una guerra sin sentido."
 Balkan.403.t: "El Apoyo Ruso Fortalece a Albania"
 Balkan.403.d: "Gracias a la ayuda rusa, Albania ahora cuenta con equipo modernizado y experiencia táctica. Su movimiento nacionalista ha cobrado un impulso significativo, lo que prepara el terreno para posibles conflictos futuros."
 Balkan.403.a: "¡Agradecemos a Rusia por su increíble apoyo!"
 Balkan.404.t: "La \"Solución de Voluntarios\""
 Balkan.404.d: "Voluntarios rusos se han unido discretamente a las fuerzas albanesas, reforzando sus capacidades y reforzando su confianza. A pesar de las sospechas de la OTAN, no hay pruebas directas que vinculen a Rusia con la operación."
 Balkan.404.a: "¡Gracias a Rusia por sus \"amables voluntarios\"!"
 Balkan.405.t: "Rusia Rechaza la Solicitud de Albania"
 Balkan.405.d: "A pesar del atractivo de Albania, Moscú ha optado por mantenerse al margen. Sin apoyo externo, Albania tendrá que perseguir sus ambiciones nacionalistas por sí sola."
 Balkan.405.a: "¡Suka, blyad!"
 Balkan.5.t: "La Inteligencia Británica Informa sobre la Participación Rusa"
 Balkan.5.d: "La agencia de inteligencia británica MI6 ha presentado pruebas que sugieren que Rusia está armando y apoyando secretamente a movimientos nacionalistas en los Balcanes. De ser cierto, esto podría desestabilizar la región y socavar los esfuerzos internacionales por mantener la paz. ¿Cómo debemos responder a estos alarmantes hallazgos?"
 Balkan.5.a: "Envíe una nota de protesta a Moscú."
 Balkan.5.b: "Nosotros no debemos reaccionar exageradamente."
 Gruner_news.1.t: "Stern Investiga el Asesinato de Sus Periodistas"
 Gruner_news.1.d: "El 13 de junio de 1999, los periodistas de Stern, Gabriel Grüner y Volker Krämer, junto con su intérprete Senol Alit, fueron asesinados en Kosovo. Inicialmente, los rumores apuntaban a que habían caído en una trampa mientras buscaban fosas comunes, pero Stern inició su propia investigación. Los periodistas regresaban de Prizren cuando tomaron el paso de Dulje, que se creía seguro. En un puesto de control del ejército yugoslavo, el combatiente ruso Alexander T., que huía de las fuerzas de la KFOR, estrelló su coche y, desesperado, disparó contra el vehículo de Stern, matando a Krämer y Alit en el acto. Grüner murió posteriormente a causa de las heridas. Alexander T. robó entonces el coche y escapó. Ahora, un tribunal de Hamburgo decidirá si emite una orden de arresto internacional contra él, ya que, según se informa, reside en Moscú."
 Gruner_news.1.a: "curioso"
 Gruner.1.t: "Tribunal de Hamburgo Considera Orden de Arresto Internacional para un Ciudadano Ruso"
 Gruner.1.d: "En junio de 1999, los periodistas de Stern, Gabriel Grüner y Volker Krämer, junto con su intérprete Senol Alit, fueron trágicamente asesinados en Kosovo. Investigaciones posteriores de Stern identificaron al mercenario ruso Alexander Tchernomachentsev como el presunto autor. Según informes, Tchernomachentsev se unió al ejército yugoslavo como voluntario en 1998 y fue visto en su ciudad natal serbia poco después del incidente. Para 2001, se creía que residía en Moscú y trabajaba como guardia de seguridad. El tribunal de Hamburgo está evaluando actualmente si las pruebas reunidas son suficientes para emitir una orden de arresto internacional contra Tchernomachentsev. Esta decisión tiene importantes implicaciones diplomáticas, ya que la Constitución rusa prohíbe la extradición de sus ciudadanos, lo que podría complicar las relaciones internacionales. Las familias de las víctimas y la comunidad periodística siguen exigiendo justicia, destacando la importancia de la cooperación internacional para abordar los crímenes contra periodistas."
 Gruner.1.a: "La evidencia es a prueba de balas."
 Gruner.1.b: "Deberíamos evitar complicaciones internacionales."
 Gruner_news.2.t: "Se Emite Orden de Arresto Internacional por los Asesinatos de Periodistas"
 Gruner_news.2.d: "Tras la trágica muerte de los periodistas de Stern, Gabriel Grüner y Volker Krämer, junto con su intérprete Senol Alit, en Kosovo el 13 de junio de 1999, las autoridades alemanas emitieron una orden de arresto internacional contra el presunto autor, el mercenario ruso Alexander Tchernomachentsev. Las investigaciones revelaron que Tchernomachentsev, huyendo de Kosovo, presuntamente abrió fuego contra los periodistas para apoderarse de su vehículo para escapar. Stern.de. A pesar de la orden, la extradición sigue siendo improbable. Se cree que Tchernomachentsev, quien según se informa reside en Moscú y trabaja como guardia de seguridad, tiene conexiones con los servicios de inteligencia rusos. La constitución rusa prohíbe la extradición de sus ciudadanos, lo que complica los esfuerzos para llevarlo a juicio en Alemania. Este impasse puede tensar las relaciones diplomáticas entre Alemania y Rusia, lo que pone de relieve los desafíos de la justicia internacional cuando las leyes nacionales y los intereses geopolíticos se cruzan. Las familias de las víctimas y la comunidad periodística siguen pidiendo justicia por los asesinatos y destacan la necesidad de cooperación para abordar los crímenes contra periodistas en todo el mundo."
 Gruner_news.2.a: "Si pudiéramos conseguirlo"
 GER_news.13.t: "Turistas Alemanes Secuestrados en el Sahara"
 GER_news.13.d: "Lo que se planeó como un simple paquete vacacional con un poco de aventura, un breve viaje al Sahara, se ha convertido en una pesadilla. 32 turistas, entre ellos 22 ciudadanos alemanes, han sido secuestrados. Crecen los rumores de que grupos armados, posiblemente vinculados a organizaciones militantes islamistas, están detrás del secuestro.\n\nEl gobierno alemán se enfrenta ahora a una difícil decisión: cómo responder a esta peligrosa crisis que se desarrolla lejos de casa."
 GER_news.13.a: "Formar un Equipo de Respuesta a la Crisis"
 GER_news.14.t: "Primera Reunión de Crisis: Opciones de Respuesta"
 GER_news.14.d: "Nuestro equipo de respuesta a la crisis ha evaluado la situación. Las autoridades argelinas ofrecen asistencia, pero parecen reacias a tomar la iniciativa. Debemos decidir si confiamos plenamente en ellas, si nos coordinamos estrechamente, pero lideramos nosotros mismos, o si nos preparamos para actuar de forma independiente para rescatar a nuestros ciudadanos."
 GER_news.14.a: "Dejemos que Argelia tome la iniciativa y esperemos los resultados."
 GER_news.14.b: "Argelia conoce el territorio, pero tenemos la tecnología. Coordinarse, pero mantener el control."
 GER_news.14.c: "Fuerzas especiales, aviones, inteligencia, lo que sea necesario para traerlos a casa."
 GER_news.15.t: "Despliegue de Recursos Alemanes en el Sahara"
 GER_news.15.d: "Tras la decisión del gobierno, las fuerzas especiales y los aviones de reconocimiento alemanes se han puesto en alerta máxima. Se están desplegando drones de vigilancia y agentes de inteligencia para rastrear los movimientos de los rehenes en el vasto desierto.\n\nNuestras fuerzas deben prepararse ahora para dos estrategias paralelas: negociar con los secuestradores o ejecutar una operación de precisión si las negociaciones fracasan."
 GER_news.15.a: "Manténgase flexible. Hay vidas que dependen de ello."
 GER_news.16.t: "Se Establece Contacto con los Secuestradores"
 GER_news.16.d: "Tras intensos esfuerzos a través de intermediarios y canales locales, nuestro equipo de crisis ha establecido contacto indirecto con los secuestradores. Se han presentado demandas, algunas políticas, otras económicas. Las negociaciones serán difíciles, pero la puerta a una resolución pacífica sigue abierta."
 GER_news.16.a: "Comience las negociaciones de inmediato. Cada hora cuenta."
 GER_news.16.b: "¡No les des tiempo para prepararse, Ausrücken en 30 minutos!"
 GER_news.17.t: "Las Negociaciones Tienen Éxito: Los Rehenes Serán Liberados"
 GER_news.17.d: "Tras tensos días de comunicación fluida y una cuidadosa diplomacia, se ha llegado a un acuerdo. Los rehenes serán liberados sanos y salvos mediante una entrega coordinada. El equipo de respuesta a crisis está preparado para garantizar su regreso sano y salvo."
 GER_news.17.a: "Prepárese para la extracción y los controles médicos."
 GER_news.18.t: "Las Negociaciones Fracasan"
 GER_news.18.d: "Las conversaciones con los secuestradores han fracasado. O bien sus demandas se volvieron inaceptables, o bien las divisiones internas entre los militantes sabotearon cualquier posible acuerdo. Los servicios de inteligencia advierten que los rehenes están siendo trasladados a zonas más adentradas en el desierto. El tiempo de las soluciones diplomáticas podría haber terminado."
 GER_news.18.a: "Preparar el grupo de trabajo para un asalto."
 GER_news.19.t: "Operación de Asalto: Fracaso Catastrófico"
 GER_news.19.d: "Nuestras fuerzas especiales lanzaron el asalto al campamento de los secuestradores en el desierto en condiciones extremas, pero a pesar de su valentía, la misión se sumió en el caos. Los rehenes fueron trasladados momentos antes del ataque, y los militantes lucharon con más ahínco de lo previsto.\n\nMúltiples rehenes y soldados murieron en el intento. El desierto se tragó nuestras esperanzas en arena y sangre. Ahora, comienza un ajuste de cuentas nacional."
 GER_news.19.a: "Un día oscuro para Alemania."
 GER_news.20.t: "Misión de Rescate: Éxito Parcial"
 GER_news.20.d: "El asalto al campamento de los secuestradores logró liberar a la mayoría de los rehenes. Sin embargo, no todos sobrevivieron al caótico tiroteo. Algunas familias recibirán a sus seres queridos en casa; otras lamentarán pérdidas irreversibles.\n\nLa nación se debate entre el orgullo y el dolor, celebrando a los salvados, pero lamentando a quienes no pudimos traer de vuelta."
 GER_news.20.a: "Honrar a los vivos y a los caídos."
 GER_news.21.t: "Operación de Asalto: Éxito Total"
 GER_news.21.d: "La operación de rescate superó incluso las expectativas más optimistas. Todos los rehenes fueron puestos a salvo y los secuestradores fueron neutralizados sin pérdidas de vidas alemanas. Las fuerzas especiales ejecutaron la misión con precisión, rapidez y una superioridad abrumadora.\n\nEn toda Alemania, los medios de comunicación elogian la operación como un ejemplo clásico de la respuesta moderna a las crisis. La confianza en el gobierno y el ejército ha aumentado a medida que el país celebra el regreso de sus ciudadanos."
 GER_news.21.a: "Una victoria impecable para Alemania."
 GER_news.22.t: "Los Rehenes Regresan a Alemania"
 GER_news.22.d: "Hoy, un avión fletado aterrizó en el Aeropuerto de Berlín-Tegel con los rehenes alemanes rescatados de regreso a casa. Familiares, funcionarios gubernamentales y personal militar se reunieron para darles la bienvenida. Los miembros del grupo de trabajo especial fueron homenajeados por su valentía y dedicación bajo extrema presión."
 GER_news.22.a: "Un momento de orgullo para nuestra nación."
 GER_news.23.t: "Luto Nacional Tras el Rescate Fallido"
 GER_news.23.d: "Los cuerpos de los caídos han regresado a Alemania bajo una fuerte escolta. Se han planeado solemnes ceremonias en todo el país para honrar a las víctimas. Se ha ordenado una investigación exhaustiva para examinar cada decisión y error cometidos durante la crisis. El recuerdo de Múnich 72 se cierne sobre esta tragedia, un doloroso recordatorio del costo del fracaso a nivel mundial."
 GER_news.23.a: "Un día oscuro para Alemania."
 GER_news.24.t: "Éxito Parcial: Algunos Rehenes Regresan, Pero No Todos"
 GER_news.24.d: "Hoy, aviones de transporte militar aterrizaron en suelo alemán, llevando a los rehenes rescatados a casa. Para la mayoría de las familias, es un momento de inmenso alivio y gratitud.\n\nSin embargo, este alivio se ve eclipsado por el profundo dolor de aquellas familias que nunca volverán a escuchar las historias de las aventuras de sus seres queridos. Algunos padres, hijos, hermanos y amigos solo quedan con dolor. La nación debe ahora honrar tanto a los vivos como a los muertos y aprender las duras lecciones de esta crisis."
 GER_news.24.a: "Un regreso a casa agridulce."
