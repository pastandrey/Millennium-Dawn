 ARM_economy_shoghakn: "Shoghakn"
 ARM_economy_shoghakn_desc: "La planta de Shoghakn (anteriormente la planta Kristall) es la mayor empresa de procesamiento de diamantes de Armenia. El primer lote de diamantes procesados ​​en Armenia se produjo en marzo de 1971 en la fábrica Kristall Nor Achna. Años después, Kristall pasó a llamarse Stankostroitelny y, posteriormente, Shoghakn en 1992. Por primera vez en Armenia, se procesaron diamantes con formas «Marqués», «Oval», «Pera», «Esmeralda», «Baguette» y varios triángulos."
