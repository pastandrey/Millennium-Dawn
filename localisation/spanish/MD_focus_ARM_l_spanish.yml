l_spanish:
 armenia_focus: "Árbol de enfoque armenio"
 ARM_Kocharjan: "§Y La era de Kocharyan §!"
 ARM_Kocharjan_desc: "Después de que su predecesor Levon Ter-Petrosyan fue destituido como presidente, Kocharyan fue elegido segundo presidente de Armenia el 30 de marzo de 1998, derrotando a su principal rival, Karen Demirchyan (quien fue líder anterior de la Armenia soviética), en unas elecciones presidenciales anticipadas empañadas por irregularidades y violaciones por ambas partes, según informaron los observadores electorales internacionales."
 ARM_manifestation_power: "Manifestación de poder político"
 ARM_manifestation_power_desc: "Para estar convencidos de que nuestro papel en la administración estatal del país no se verá afectado, necesitamos mostrar nuestra voluntad y poner en su lugar el aparato estatal."
 ARM_place_agreement: "Acuerdos de lugar"
 ARM_place_agreement_desc: "Para fortalecer el poder de Kocharyan en el país, necesitamos negociar pacíficamente con políticos regionales, funcionarios e incluso algunos diputados."
 ARM_confrontation_mafia: "Confrontación con la mafia"
 ARM_confrontation_mafia_desc: "La mafia armenia, que tiene numerosas conexiones con criminales rusos, tiene demasiada influencia en lo que sucede en Armenia. Necesitamos cambiar esto."
 ARM_liquidation_bosses: "Eliminación de jefes"
 ARM_liquidation_bosses_desc: "La mafia está debilitada. Ha llegado el momento de decapitar al dragón con un golpe decisivo de justicia."
 ARM_installing_loyal: "Instala a tus propios"
 ARM_installing_loyal_desc: "Aunque esto parezca desventajoso a corto plazo, para fortalecer el poder de Kocharyan, necesitamos limpiar el aparato estatal de disidentes y opositores. No tenemos nada que negociar con ellos."
 ARM_suppress_opposition: "Suprimir a la oposición"
 ARM_suppress_opposition_desc: "La oposición está demasiado activa debido a la influencia externa en Armenia. Es hora de presionar a la oposición con medidas duras y realizar un par de arrestos para calmar su ardor."
 ARM_deals_with_bandits: "Tratos con la Mafia"
 ARM_deals_with_bandits_desc: "Los círculos criminales de Armenia, aunque tienden a desatar la violencia y violar sistemáticamente la ley, tienen una gran influencia en lo que sucede en Armenia. Tal vez no deberíamos luchar contra ellos, sino vasallizar la delincuencia y hacerla rentable para nosotros."
 ARM_domination_over_bandits: "Dominar a los bandidos"
 ARM_domination_over_bandits_desc: "Aunque decidimos negociar con los bandidos, no debemos darles demasiado poder. Kocharyan debe establecer su control sobre ellos."
 ARM_autocrats_power: "Poder autocrático"
 ARM_autocrats_power_desc: "Finalmente, Kocharyan no tiene obstáculos en su campo político.\n"
 ARM_Zhirayr_Sefilyan: "¡§YPolo Nacional Democrático§!"
 ARM_Zhirayr_Sefilyan_desc: "Jirair Sefilian es un comandante militar y activista político armenio. Durante la Primera Guerra de Nagorno-Karabaj, comandó el batallón militar especial Shushi. Ha hecho campaña durante mucho tiempo contra cualquier concesión territorial a Azerbaiyán en Nagorno-Karabaj y contra la influencia rusa en Armenia. Sefilian es una de las figuras clave del Partido Pan-Armenio Sasna Tsrer."
 ARM_protectorate: "Baluarte caucásico"
 ARM_protectorate_desc: "La OTAN está ansiosa por acercarse aún más a Rusia, y aunque ya tienen a Turquía, podemos acercarlos aún más. Por supuesto, nuestras condiciones serán que los miembros de la OTAN garanticen nuestra independencia nacional."
 ARM_mobilization_of_economy: "Movilización de la economía"
 ARM_mobilization_of_economy_desc: "Para reconstruir el país de nuevo, es necesario movilizar la economía y utilizar todos nuestros pequeños recursos para triplicar los indicadores económicos."
 ARM_army: "El ejército en una nueva era"
 ARM_army_desc: "Tras el fin de la Guerra de Artsaj, el ejército armenio, que ya se había mostrado, experimentó un declive significativo, que comenzó incluso después del colapso de la Unión Soviética. Gracias al legado soviético, así como a una milicia a gran escala, los armenios lograron derrotar a Azerbaiyán y establecer un precario equilibrio en la región. Las viejas doctrinas, el armamento obsoleto, los generales anquilosados ​​y los problemas económicos frenaron el desarrollo de las fuerzas armadas. La principal vía para su desarrollo es la continuación de la cooperación con Rusia, así como con otros vecinos y socios de la OTSC. Sin embargo, algunos expertos militares insisten en una revisión completa de la doctrina militar y la estructura del ejército siguiendo los lineamientos occidentales. Armenia, al encontrarse en una posición diplomática ventajosa, puede intentar aprovechar lo mejor de cada bando o adoptar un rumbo claro de cooperación con ciertas fuerzas. Incluso sin recursos significativos, Armenia tiene un gran potencial si logra distribuir correctamente sus prioridades."
 ARM_dashnak: "Dashnaktsutyun"
 ARM_dashnak_desc: "La única fuerza política con derecho a gobernar Armenia es, sin duda, el Dashnaktsutyun, el partido más antiguo de Armenia, que lideró la Primera República de Armenia desde sus inicios. Solo su agenda nacionalista de izquierda puede llevar a Armenia a la grandeza."
 ARM_monarch: "§YRestauración de la Monarquía§!"
 ARM_monarch_desc: "Ninguna figura militar, partidista u otra tiene el derecho de gobernar el país. El gobernante más legítimo solo puede ser un monarca cuyo enfoque paternalista puede llevar a Armenia a la grandeza."
 ARM_Tsarukyan: "§GTsarukyan§!"
 ARM_Tsarukyan_desc: "Gagik Tsarukyan es un empresario, político y ex deportista armenio. Tsarukyan es el fundador y líder del partido político Armenia Próspera. También es propietario de varias empresas a gran escala y se cree que es uno de los hombres más ricos de Armenia."
 ARM_patriotism: "Patriotismo"
 ARM_patriotism_desc: "El patriotismo armenio es abstracto. Muchos buscan su patria en las nubes, en la neblina mística, pero está tan cerca de nosotros y necesita nuestra atención, devoción y admiración. Para muchos, Armenia es solo una idea, una amnesia, una Sion, un altar. Armenia necesita un patriotismo concreto y vivo. La patria es para el hombre, no el hombre para la patria."
 ARM_berkut: "¿Dónde está nuestro Berkut?"
 ARM_berkut_desc: "La empresa de seguridad privada armenia Berkut, sorprendentemente, siempre ha sido una unidad fuertemente equipada compuesta por antiguos delincuentes y exmilitares. Tal vez valga la pena llevarla al nivel estatal."
 ARM_remove_competitors: "Eliminando a los competidores"
 ARM_remove_competitors_desc: "Solo Tsarukyan puede hacer negocios en Armenia. Es su reino y los demás oligarcas deben obedecer, o de lo contrario..."
 ARM_hard_way: "El camino difícil"
 ARM_hard_way_desc: "Si alguien no quiere obedecer al nuevo gobierno, lo obligaremos. Hay que tomar el duro camino de robarle el negocio a los disidentes rebeldes."
 ARM_Group: "Gobierno de Multi"
 ARM_Group_desc: "El grupo Multi Group se fundó en 1998 por iniciativa de Gagik Tsarukyan. El proceso de desarrollo y la actividad intensiva del grupo comenzaron en 2001, cuando se creó el grupo y se involucraron muchas grandes empresas. El grupo se ubica regularmente entre los diez primeros en la lista de los mayores contribuyentes de Armenia."
 ARM_buy_small_business: "Comprándolos"
 ARM_buy_small_business_desc: "Necesitamos comprar todos los pequeños negocios en manos de especuladores de clase media. Debemos tomar este paso para lograr la corporatocracia."
 ARM_sports_promotion: "Desarrollando los deportes"
 ARM_sports_promotion_desc: "¡Debemos desarrollar nuestro deporte y promoverlo en todas partes donde podamos!"
 ARM_pooling_capital: "Puesta en común del capital"
 ARM_pooling_capital_desc: "Es hora de combinar todo el capital y obtener un buen beneficio de esto."
 ARM_savoya: "Casa de Saboya"
 ARM_savoya_desc: "La última familia real de Armenia fue la familia Lusignan. Cuando en 1375 el Reino de Cilicia fue destruido, el último rey Levon VI (Leo VI) pasó el título de Rey de Armenia a James I (Hakob I), Rey de Chipre, que pertenecía a la misma familia Lusignan. En 1489, la Reina Charlotta pasó el título a su primo Charles the Warrior, Duque de Saboya (en Italia)."
 ARM_monopoly: "Corporatocracia plena"
 ARM_monopoly_desc: "Ahora, Multi Group debe controlar todas las estructuras gubernamentales. ¡Qué gran idea!"
 ARM_bagratuni: "¿Pretendiente Bagratuni?"
 ARM_bagratuni_desc: "La dinastía Bagratuni o Bagratid fue una dinastía real armenia que gobernó el Reino medieval de Armenia. Originarios de vasallos del Reino de Armenia de la antigüedad, se convirtieron en la familia noble armenia más prominente durante el período de dominio árabe en Armenia, estableciendo finalmente su propio reino independiente. También son los progenitores de la dinastía real georgiana Bagrationi. Sin embargo, Roland von Bagratuni no demostró plenamente su descendencia de la dinastía Bagratuni, lo que generó gran preocupación entre los miembros de la Unión Meliq."
 ARM_triump_revolution_barhat: "§4Triunfo de la Revolución de Terciopelo§!"
 ARM_triump_revolution_barhat_desc: "¡Sin miedo!  Pashinyan ha tomado el poder en Armenia."
 arme.51.d: "[GEO.GetNameWithFlag] aceptó nuestra propuesta diplomática para firmar un acuerdo de amistad y comercio."
 arme.51.t: "[GEO.GetNameWithFlag] ¡Acepta!"
 arme.51.a: "Maravilloso!"
 arme.52.t: "[GEO.GetNameWithFlag] ¡Rechazados!"
 arme.52.d: "[GEO.GetNameWithFlag] rechazó nuestra propuesta de amistad e intercambio."
 arme.52.a: "Debemos abandonar nuestros intentos de hacernos amigos de Georgia."
 arme.53.t: "[ARM.GetNameWithFlag] ¡Pide acceso al Mar Negro!"
 arme.53.d: "Recientemente, el gobierno armenio mostró su disposición a pagarnos por el acceso al mar Negro. ¿Deberíamos aceptar su oferta?"
 arme.53.a: "¡Sí, claro!"
 arme.53.b: "No, vete."
 arme.2.t: "Atentado contra la vida del presidente de Nagorno-Karabakh"
 arme.2.d: "El intento de asesinato de Arkady Ghukasyan mostró que no todos aceptan su política. Aproximadamente a la una de la mañana, el automóvil del presidente fue atacado desde una emboscada, que fue preparada a solo 200 metros de la residencia. Los terroristas abrieron fuego cruzado desde ambos lados simultáneamente. Ghukasyan resultó herido en las piernas y dos de sus guardias resultaron gravemente heridos."
 arme.2.a: "¡Terrible!"
 arme.2.b: "Enfrentamiento caucásico."
 arme.2.c: "Necesitamos acabar con el bandidaje."
 arme.2.o1: "¡Es una lástima que no lo hayan matado!"
 arme.3.t: "Los comunistas del Transcaucaso se han unido en el 'Puente Rojo'"
 arme.3.d: "El sábado, los comunistas de Azerbaiyán, Armenia y Georgia volvieron a unirse. Durante la reunión de la dirección superior de los partidos comunistas de Transcaucasia, que tuvo lugar en el Puente Rojo (el lugar donde se cruzan las fronteras de las tres repúblicas), se firmó un protocolo sobre la creación de la organización comunista pública armenio-azerbaiyana-georgiana \"Puente Rojo - Hermandad y Amistad\". \"En estos países no hay contradicciones y, por lo tanto, los comunistas son la única fuerza capaz de resolver todos los conflictos en la región\", dijo el camarada Georgadze."
 arme.3.a: "Los comunistas están tramando algo."
 arme.3.b: "Inercia del siglo pasado."
 arme.3.c: "Ellos están perdiendo su tiempo."
 arme.3.o1: "¿En qué están esperanzados...?"
 arme.5.t: "Resultados de la investigación"
 arme.5.d: "Los investigadores no pueden encontrar al verdadero autor del ataque, y todas las pruebas, de una forma u otra, nos llevan a nosotros o a los exmiembros del partido Dashnaktsutyun. En cualquier caso, debemos cerrar este caso revelador antes de que llegue demasiado lejos. Pero ¿qué diremos en el informe?"
 arme.5.a: "Simplemente cierra el caso."
 arme.5.b: "Uh, culpa a los Dashnaks!"
 arme.9.t: "Proyecto Avenida Norte"
 arme.9.d: "La Avenida Norte es un proyecto de avenida peatonal que necesitamos construir para atraer inversiones y posiblemente generar grandes ingresos. Sin embargo, la pregunta es: ¿qué debemos hacer con los edificios antiguos y sus residentes?"
 arme.9.a: "Compensar parcialmente las pérdidas"
 arme.9.b: "Compensar completamente las pérdidas"
 arme.50.t: "[ARM.GetNameWithFlag] ¡Propone un acuerdo comercial!"
 arme.50.d: "[ARM.GetNameWithFlag] propuso recientemente un acuerdo de amistad y comercio entre nuestros países. ¿Deberíamos aceptar su propuesta?"
 arme.10.t: "Acuerdo de propiedad por deuda"
 arme.10.d: "Armenia aceptó proporcionar propiedades a cambio de la condonación de sus deudas estatales. Armenia fue el único país cuyas deudas estatales no condonamos debido a presiones futuras, y esto influyó."
 arme.10.a: "Maravilloso!"
 arme.101.t: "[PER.GetNameWithFlag] ¡Está de acuerdo!"
 arme.101.d: "Se firmó un acuerdo de defensa encubierta."
 arme.101.a: "¡Genial!"
 arme.102.t: "¡[PER.GetNameWithFlag] Niega!"
 arme.102.d: "No se firmó el acuerdo de defensa encubierta."
 arme.102.a: "Eh..."
 arme.103.t: "Rebelión en el Kurdistán"
 arme.103.d: "Los kurdos se rebelaron en las zonas donde residen, ubicadas en nuestro país, contando claramente con la ayuda de alguien del extranjero. Según nuestros servicios de inteligencia, esto fue obra de los servicios especiales armenios."
 arme.103.a: "Armenia pagará por esto"
 arme.12.t: "Contactando a los oligarcas"
 arme.12.d: "Durante el próximo congreso, donde se celebrarán las discusiones entre el gobierno y los oligarcas, Gagik Tsarukyan se ofreció a ayudarnos a establecer el control sobre la oposición creando una coalición informal entre los partidos."
 arme.12.a: "¡Claro!"
 arme.13.t: "¡Oposición debilitada!"
 arme.13.d: "Las organizaciones opositoras y los burócratas desleales son eliminados de nuestro país y la oposición se ve gravemente debilitada, lo cual resulta muy útil en nuestra situación. El reinado de Kocharyan se prolonga... por ahora."
 arme.13.a: "Muy bueno"
 arme.131.t: "[USA.GetNamewithFlag] ¡Está de acuerdo!"
 arme.131.d: "Pudimos obtener los pagos porque el gobierno de [USA.GetNamewithFlag] confía en que estamos completamente preparados para ello."
 arme.131.a: "Bueno"
 arme.132.t: "[USA.GetNamewithFlag] Rechazó nuestra propuesta"
 arme.132.d: "Nuestro gobierno no ha realizado todas las reformas necesarias para lograr que [USA.GetNamewithFlag] esté de acuerdo"
 arme.132.a: "Meh"
 arme.14.t: "[ARM.GetNamewithFlag] ¡Se une al §GEstado de la Unión!§!"
 arme.14.d: "¡Recientemente, el presidente armenio, Robert Kocharyan, decidió sumarse al proyecto del Estado de la Unión y unirse con nosotros y otros estados miembros!"
 arme.14.a: "Maravilloso!"
 arme.4.t: "Investigación del ataque de 1999"
 arme.4.a: "Sí, claro"
 ARM_develop_infrusture: "Construcción de carreteras de impacto"
 ARM_build_house: "Construcción de impacto de nuevos edificios"
 ARM_build_factory: "Impacto en la industria de la construcción"
 AZE_karabakh_defeat: "Derrota en la guerra de Karabaj"
 AZE_karabakh_defeat_desc: "La derrota en la guerra de los años 90 fue una herida dolorosa para nuestra nación. Los azerbaiyanos anhelan venganza para recuperar sus tierras históricas y permitir el regreso de miles de refugiados a sus hogares."
 AZE_karabakh_revanchism: "Revanchismo de Karabaj"
 AZE_karabakh_revanchism_desc: "El pueblo azerbaiyano, que perdió la guerra de Artsakh con un gran apoyo internacional, quedó humillado en el ámbito internacional. La gente, cegada por el fracaso, cada vez se inclina más hacia el nacionalismo y unirse a las fuerzas armadas."
 ARM_high_emigration_5: "Enorme nivel de emigración"
 ARM_high_emigration_5_desc: "Con el colapso de la URSS y la situación económica deteriorada, muchos países de la CEI se convirtieron en víctimas de una mayor migración externa. En la realidad actual, Armenia se enfrenta a la amenaza de la extinción, lo cual no puede decirse de su vecino oriental y principal enemigo político. La solución del problema demográfico debe convertirse en la principal agenda de la política armenia.\n§W------------------§!\n¡Esta idea nacional será §GReducido§! si nuestro §HPIB§! supera los  §H$20B§! y tenemos al menos §H15% de estabilidad§!.\n§W------------------§!"
 ARM_high_emigration_4: "Nivel sustancial de emigración"
 ARM_high_emigration_4_desc: "Con el colapso de la URSS y la situación económica deteriorada, muchos países de la CEI se convirtieron en víctimas de una mayor migración externa. En la realidad actual, Armenia se enfrenta a la amenaza de la extinción, lo cual no puede decirse de su vecino oriental y principal enemigo político. La solución del problema demográfico debe convertirse en la principal agenda de la política armenia.\n§W------------------§!\n¡Esta idea nacional será §GReducido§! si nuestro §HPIB§! supera los  §H$30B§! y tenemos al menos §H24% de estabilidad§!.\n§W------------------§!"
 ARM_high_emigration_3: "Alto Nivel de Emigración"
 ARM_high_emigration_3_desc: "Con el colapso de la URSS y la situación económica deteriorada, muchos países de la CEI se convirtieron en víctimas de una mayor migración externa. En la realidad actual, Armenia se enfrenta a la amenaza de la extinción, lo cual no puede decirse de su vecino oriental y principal enemigo político. La solución del problema demográfico debe convertirse en la principal agenda de la política armenia.\n§W------------------§!\n¡Esta idea nacional será §GReducido§! si nuestro §HPIB§! supera los §H$40B§! y tenemos al menos §H24% de estabilidad§!.\n§W------------------§!"
 ARM_high_emigration_2: "Bajo nivel de emigración"
 ARM_high_emigration_2_desc: "Con el colapso de la URSS y la situación económica deteriorada, muchos países de la CEI se convirtieron en víctimas de una mayor migración externa. En la realidad actual, Armenia se enfrenta a la amenaza de la extinción, lo cual no puede decirse de su vecino oriental y principal enemigo político. La solución del problema demográfico debe convertirse en la principal agenda de la política armenia.\n§W------------------§!\n¡Esta idea nacional será §GReducido§! si nuestro §HPIB§! supera los s §H$20B§! y tenemos al menos §H34% de estabilidad§!.\n§W------------------§!"
 ARM_high_emigration_1: "Pequeña emigración"
 ARM_high_emigration_1_desc: "Con el colapso de la URSS y la situación económica deteriorada, muchos países de la CEI se convirtieron en víctimas de una mayor migración externa. En la realidad actual, Armenia se enfrenta a la amenaza de la extinción, lo cual no puede decirse de su vecino oriental y principal enemigo político. La solución del problema demográfico debe convertirse en la principal agenda de la política armenia.\n§W------------------§!\n¡Esta idea nacional será §GReducido§! si nuestro §HPIB§! supera los §H$60B§! y tenemos al menos §H44% de estabilidad§!.\n§W------------------§!"
 ARM_immigration: "Inmigración positiva"
 ARM_victory_karabakh: "Victoria en la guerra de Karabaj"
 ARM_victory_karabakh_desc: "La victoria en la guerra de Karabaj despertó los sentimientos nacionales de los armenios y permitió que muchas personas de Artsakh ocuparan altos cargos en el gobierno armenio. Al mismo tiempo, eliminó la motivación para un mayor desarrollo militar y político."
 ARM_armenian_mafia_6: "Mafia armenia"
 ARM_armenian_mafia_5: "Mafia fuerte"
 ARM_armenian_mafia_4: "La mafia ha sufrido pérdidas"
 ARM_armenian_mafia_3: "Acuerdos con la mafia"
 ARM_armenian_mafia_2: "Dominación sobre la mafia"
 ARM_armenian_mafia_1: "Mafia menor"
 ARM_mafia_strikes_back: "La mafia contraataca"
 ARM_mafia_strikes_back_TT: "Continuaremos luchando contra la mafia para erradicarla, sin embargo, esto traerá problemas temporales."
 ARM_loyal_in_power: "\"Nuestro\" Gente en lugares"
 ARM_loyal_in_power_desc: "Actualmente, las autoridades regionales están bajo el control de Kocharian. Sin embargo, por el bien del poder político, la lucha contra la corrupción se vuelve cada vez más imposible."
 ARM_deals_with_bandits_3: "Tratos con bandidos"
 ARM_deals_with_bandits_3_desc: "En lugar de luchar contra la mafia, estableceremos relaciones, reduciremos la presión sobre las pequeñas empresas y comenzaremos a controlar los grandes flujos de efectivo."
 ARM_deals_with_bandits_2: "Dominación sobre los bandidos"
 ARM_deals_with_bandits_2_desc: "Ahora la mafia no podrá ir en contra de nosotros. Controlamos la circulación de dinero en el país, lo que nos da la oportunidad de utilizar todas las palancas de influencia sobre la oligarquía."
 ARM_deals_with_bandits_1: "Separación de esferas de influencia"
 ARM_deals_with_bandits_1_desc: "Hemos compartido las esferas de influencia con las autoridades de la mafia armenia. Dejamos que los bandidos sigan existiendo, pero nos hemos deshecho del enemigo interno."
 ARM_scince_poten_idea: "Potencial científico"
 ARM_gaz_energy_problems: "Problemas de suministro de gas y electricidad"
 ARM_unistrim_idea_debuf: "Falta de un sistema de transacciones"
 ARM_unistrim_idea_debuf_desc: "Después del colapso de la URSS y sus vínculos económicos y de transporte en la era del desarrollo digital, Armenia sigue estando en la periferia del comercio mundial, sin sistemas de transferencia de dinero sin efectivo."
 eastern_church_arm: "Iglesia Apostólica Armenia"
 eastern_church_arm_desc: "La Iglesia Apostólica Armenia (IAA) es una de las iglesias cristianas más antiguas del mundo. Según la leyenda, la Iglesia Armenia se llama 'Apostólica' porque sus fundadores fueron los apóstoles Tadeo y Bartolomé, quienes fueron los primeros en predicar el cristianismo en Armenia. Históricamente, la IAA se formó en el año 301 mediante el trabajo de San Gregorio el Iluminador y la adopción del cristianismo por parte del rey Trdat III como religión estatal."
 eastern_church_eth: "Iglesia Ortodoxa Etíope"
 eastern_church_eth_desc: "La Iglesia Ortodoxa Etíope es una de las iglesias orientales antiguas (precalcedonianas). Hasta 1959, fue una iglesia autónoma, en dependencia canónica de la Iglesia Copta, después de lo cual recibió la autocefalia. Al igual que otras iglesias orientales antiguas, reconoce tres Concilios Ecuménicos y profesa la cristología miafisita. Tiene su propio rito etíope, así como una estructura jerárquica especial del clero que no tiene análogos en otras tradiciones eclesiásticas."
 arme.4.d: "Nuestro gobierno ha iniciado una investigación oficial sobre el atentado terrorista al parlamento de 1999. Para evitar demasiada agitación, el caso está a cargo de investigadores semiindependientes. Veamos qué descubren."
