 ARM_political_assassinations_desc: "Continuamos liquidando a nuestros oponentes si es necesario para nuestro gobierno político..."
 ARM_political_assassinations_category: "Asesinatos Políticos"
 ARM_political_assassinations_category_desc: "Tras el golpe de Estado de 1999, el poder del partido conservador £ARM_Conservative §YKocharyan§! se encuentra en una situación precaria. La §YOposición§! se preparará para derrocar al presidente en repetidas ocasiones. Es necesario despejar el terreno político para asegurar la preservación del poder. Es necesario erradicar a los enemigos dentro del entorno político y a la oposición externa."
