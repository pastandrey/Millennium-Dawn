 ARM_expand_cis_cooperations: "Ampliación de la Cooperación en Seguridad de la CEI"
 ARM_expand_cis_cooperations_desc: "Ampliación de la Cooperación en Seguridad de la CEI"
 arme.16.t: "Reunión de Seguridad de la CEI en Ereván, Armenia"
 arme.16.d: "El líder armenio [ARM.GetLeader] recibió a los jefes de las delegaciones que llegaron a Ereván para participar en la reunión del Consejo de Jefes de Seguridad y Servicios Especiales de la CEI.\n\nSegún informó el servicio de prensa del jefe de Estado armenio, [ARM.GetLeader] destacó la importancia de la labor del Consejo, especialmente considerando la prioridad de garantizar la seguridad tanto a nivel nacional como regional e internacional. El presidente enfatizó la necesidad de profundizar la cooperación dentro de la CEI.\n\n[ARM.GetLeader] señaló que, en todo momento, la lucha contra las amenazas a la seguridad ha sido el centro de atención de los Estados. Según él, la cooperación en esta y otras áreas permite fortalecer aún más los lazos interestatales y la amistad entre los pueblos.\n\nA petición de [ARM.GetLeader], los invitados presentaron los temas tratados en la reunión celebrada en Tsaghkadzor y las decisiones tomadas."
 arme.16.a: "Interesante."
 armcis_infl: "§Y[ROOT.GetNameWithFlag]§! Obtendrá Un §Y2% de Influencia§! En Todos los §3Miembros de CEI§!"
 ARM_russian_culture_promotion: "Promoción de la Cultura Rusa"
 ARM_russian_culture_promotion_desc: "Rusia siempre está dispuesta a promover su cultura en nuestro país. Sea cual sea su motivación, el conocimiento de un idioma extranjero y la cooperación educativa siempre benefician a nuestra población."
 ARM_russian_fsb_borderguards: "Guardias Fronterizos del FSB Ruso"
 ARM_russian_fsb_borderguards_desc: "Debemos invitar a las tropas fronterizas rusas del FSB para aumentar nuestra seguridad."
 arme.17.t: "[ARM.GetNameWithFlag] Invita a las Tropas Fronterizas del FSB"
 arme.17.d: "Recientemente, el gobierno armenio propuso que nuestras tropas fronterizas del FSB protejan y vigilen la frontera entre Armenia y Turquía y entre Armenia y Azerbaiyán.\n\nEsto aumentará nuestra influencia e inteligencia en la región, si aceptamos esta propuesta."
 arme.17.a: "¡Por supuesto!"
 arme.17.b: "Lo siento, no"
 ARM_fsb_borderguards: "Guardias Fronterizos del FSB"
 arme.18.t: "¡[SOV.GetNameWithFlag] Está de acuerdo!"
 arme.18.d: "Se enviarán tropas fronterizas del FSB ruso a todas nuestras regiones."
 arme.18.a: "Genial."
 arme.19.t: "¡[SOV.GetNameWithFlag] Niega!"
 arme.19.d: "Rusia rechazó nuestra oferta de estacionar tropas del FSB ruso en nuestras fronteras."
 arme.19.a: "Bruh."
 ARM_expand_russian_base_time: "Ejercicios con el Ejército Ruso"
 ARM_expand_russian_base_time_desc: "Dado que la base militar rusa está ubicada en nuestro país, podemos realizar ejercicios militares conjuntos."
 ARM_remove_fsb_borderguards: "Eliminar los Guardias Fronterizos del FSB de [SOV.GetNameWithFlag]"
 fsb_deployed: "FSB se implementó en [ARM.GetNameWithFlag]"
 arme.20.t: "¡[ARM.GetNameWithFlag] Propone Promover la Cultura Rusa!"
 arme.20.d: "Desde la época de la antigua Rusia, los intercambios culturales armenio-rusos han contribuido enormemente a ambas culturas. A pesar de compartir una historia a través del Imperio Ruso y la Unión Soviética, Armenia nos propuso un acuerdo. Permitirían que nuestros centros culturales se ubicaran en Armenia para promover nuestra cultura allí. Supuestamente, el gobierno armenio quiere promover nuestra cultura para contrarrestar la influencia de la cultura occidental en su sociedad. A cambio, quieren que paguemos parte del dinero para establecer estos centros en Armenia."
 arme.20.a: "¡Day'om Dobro!"
 arme.20.b: "No vemos ninguna utilidad en la promoción cultural."
 arme.21.t: "¡[SOV.GetNameWithFlag] Está de acuerdo!"
 arme.21.d: "Rusia acordó financiar los centros culturales rusos en Armenia."
 arme.21.a: "¡Maravilloso!"
 arme.22.t: "¡[SOV.GetNameWithFlag] Niega!"
 arme.22.d: "Rusia rechazó nuestra propuesta de abrir centros culturales rusos en Armenia. Dicen que no ven ninguna utilidad en tales esfuerzos."
 arme.22.a: "Qué gente tan rara. Quizá no necesitábamos sus centros culturales después de todo."
 ARM_educational_cooperation: "Cooperación Educativa con Rusia"
 ARM_educational_cooperation_desc: "Podemos intentar convencer a Rusia para que inicie un programa de intercambio de estudiantes con nosotros."
 ARM_rusarm_educ_coop: "Acuerdo Educativo Armenio-Ruso"
 arme.23.t: "¡[ARM.GetNameWithFlag] Propone un Acuerdo Educativo!"
 arme.23.d: "Armenia nos propuso recientemente un acuerdo de cooperación educativa, mediante el cual estudiantes de ambos países podrán intercambiarse entre universidades. Dado que las universidades armenias tienen muchos vínculos con la educación occidental, nuestros estudiantes pueden beneficiarse enormemente de ello."
 arme.23.a: "¡Claro!"
 arme.23.b: "¡Esto es algún tipo de complot armenio!"
 arme.24.t: "¡[SOV.GetNameWithFlag] Está de acuerdo!"
 arme.24.d: "Rusia aceptó nuestra propuesta de intercambio de estudiantes y firmaremos los documentos en breve."
 arme.24.a: "¡Maravilloso!"
 arme.25.t: "¡[SOV.GetNameWithFlag] Niega!"
 arme.25.d: "Rusia rechazó nuestra propuesta, considerándola un método traicionero para pervertir a la juventud rusa con influencia occidental."
 arme.25.a: "¿Q-qué?"
 mgu_unlock: "¡§YCooperación con la Universidad Estatal de Moscú§! estará disponible para su uso!"
 ARM_russian_tv_channels: "Canales de TV rusos"
 ARM_russian_tv_channels_desc: "Podemos permitir el acceso de canales de televisión rusos al mercado armenio. Sí, esto aumentará la influencia rusa sobre nosotros, pero los beneficios podrían ser mucho mayores."
 ARM_rus_diaspora_strength: "Conexiones con la Diáspora"
 ARM_rus_diaspora_strength_desc: "Podemos intentar conectarnos con la diáspora armenia y aceptar donaciones de ellos."
 ARM_ratify_iran_pipeline: "Ratificación del Gasoducto de Syunik"
 ARM_ratify_iran_pipeline_desc: "Quizás deberíamos ofrecerle a Irán un acuerdo para un gasoducto a través de nuestra frontera sur. Intercambiaremos energía por gas."
 arme.26.t: "¡[ARM.GetNameWithFlag] Propone un Acuerdo sobre el Gas!"
 arme.26.d: "Armenia nos ofrece un acuerdo para construir un gasoducto de Irán a Armenia. El gas que Irán suministrará a Armenia se intercambiará por electricidad, de la que tanto carecemos en las regiones del norte.\n\nEl costo del gasoducto se dividirá entre nosotros y Armenia. El acuerdo es muy bueno, ¿estamos de acuerdo?"
 arme.26.a: "¡Estamos de acuerdo!"
 arme.26.b: "Lo siento, no"
 arme.27.t: "¡[PER.GetNameWithFlag] Niega!"
 arme.27.d: "Irán rechazó nuestra oferta. Consideran nuestra propuesta una especie de complot sionista que socava su soberanía."
 arme.27.a: "¿Están locos?"
 arme.28.t: "¡[PER.GetNameWithFlag] Está de acuerdo!"
 arme.28.d: "Irán aceptó nuestra propuesta y está listo para construir el gasoducto. Ahora, debemos cubrir nuestra parte del costo y comenzar a coordinar las obras."
 arme.28.a: "¡Genial!"
 ARM_syunik_pipeline: "Gasoducto Irán-Armenia"
 ARM_syunik_pipeline_two: "Gasoducto Irán-Armenia"
 gas_two_tt: "Nos concede §G2 Combustibles Fósiles§! en §YSyunik§!"
 gas_two_per_tt: "Le da §G2 Combustibles Fósiles§! a §YArmenia§!"
 gas_four_tt: "Nos concede §G4 Combustibles Fósiles§! en §YSyunik§!"
 gas_four_per_tt: "Le da §G4 Combustibles Fósiles§! a §YArmenia§!"
 ARM_arm_electr_deal: "Suministro Eléctrico Armenio"
 ARM_arm_electr_deal_two: "Suministro Eléctrico Armenio"
 arme.29.t: "[PER.GetNameWithFlag]-[ARM.GetNameWithFlag] ¡Oferta de Gasolina!"
 arme.29.d: "Recientemente, los líderes de Armenia e Irán se reunieron en la provincia de Syunik, Armenia, y celebraron la gran inauguración de un nuevo oleoducto."
 arme.29.a: "¡Maravilloso!"
 per_gas_accepted: "[PER.GetNameWithFlag] Ka Aceptado el Acuerdo del Oleoducto"
 ARM_expand_pipeline: "Expandir el pipeline con [PER.GetNameWithFlag]"
 ARM_cancel_pipeline: "§RCancelación§! Tubería con [PER.GetNameWithFlag]"
 arme.30.t: "[ARM.GetNameWithFlag] ¡Amplía el Acuerdo de Gas!"
 arme.30.d: "Armenia decidió aumentar el trueque y darnos más electricidad a cambio de más gas."
 arme.30.a: "¡Genial!"
 ARM_eaeu_integrat: "Integración en la UEAE"
 ARM_eaeu_integrat_desc: "La presión económica rusa sobre nosotros es demasiado alta como para descuidarla. Podemos convertirla en algo muy beneficioso si firmamos los acuerdos adecuados..."
 ARM_undermine_russian_influence: "Socavar la Influencia Rusa"
 ARM_undermine_russian_influence_desc: "Los rusos han ejercido una gran influencia sobre nuestro país durante demasiado tiempo. Debemos eliminar su influencia."
 arme.31.t: "[PER.GetNameWithFlag]-[ARM.GetNameWithFlag] ¡Oferta de Gasolina está Cancelada!"
 arme.31.d: "El acuerdo de gas entre Armenia e Irán está cancelado y el gasoducto está cerrado."
 arme.31.a: "Vale."
 arme.32.t: "¡[ARM.GetNameWithFlag] Socava la Influencia de [SOV.GetNameWithFlag]!"
 arme.32.d: "Recientemente, Armenia comenzó a cerrar varios centros culturales rusos influyentes y prohibió los medios de comunicación estatales rusos en su país."
 arme.32.a: "¡Bastardos!"
 ARM_support_russian_opposition: "Apoyo a la Oposición Rusa"
 ARM_support_russian_opposition_desc: "Debemos socavar a Rusia y apoyar a los líderes de la oposición rusa financiándolos desde Armenia."
 arme.33.t: "[ARM.GetNameWithFlag] ¡Apoya a nuestra oposición!"
 arme.33.d: "Recientemente, el gobierno armenio anunció su apoyo a la oposición rusa e invita a todos aquellos que puedan ser reprimidos a venir a Armenia. Se desconoce el motivo de esta postura, pero es evidente que se vio influenciado por el reciente enfriamiento de las relaciones entre Ereván y Moscú."
 arme.33.a: "¿Cómo se atreven ellos?"
 arme.34.t: "Cuestión de la Base Militar Rusa"
 arme.34.d: "Ahora, tras el deterioro de nuestras relaciones con Rusia, se plantea la cuestión de retirar las tropas rusas de nuestro país. Por un lado, podemos simplemente expulsarlas, y por otro, intentar influir en Rusia a través de esta base militar. ¿Cómo deberíamos proceder?"
 arme.34.a: "¡Tienen que irse lo más rápido posible!"
 arme.34.b: "Ellos pueden ser útiles ... por ahora."
 ARM_question_military_base: "Cuestionar la Base Militar Rusa"
 ARM_question_military_base_desc: "Ahora debemos pensar qué debemos hacer con la base militar rusa en Armenia."
 ARM_freeze_csto_membership: "Congelar la Membresía en la OTSC"
 ARM_freeze_csto_membership_desc: "La OTSC no nos necesita, ya que no quiere ayudarnos contra Azerbaiyán. Debemos decidir qué hacer con esta organización."
 ARM_investigate_prorus_offic: "Investigar a Funcionarios Prorrusos"
 ARM_investigate_prorus_offic_desc: "Hay muchos políticos y funcionarios que están muy interesados ​​en apoyar las políticas rusas. Debemos investigarlos..."
 ARM_polish_cherries: "Militar \"Polish Cherry\""
 ARM_polish_cherries_desc: "Polonia es famosa por sus productos agrícolas, ¿por qué no iniciamos una relación comercial con ella comprando una cantidad tan pequeña?"
 ARM_polish_mil_coop: "Cooperación Militar con Polonia"
 ARM_polish_mil_coop_desc: "Polonia puede convertirse en un buen suministrador de armas para nosotros y tenemos la intención de intentar concluir un contrato de suministro de armas con él."
 ARM_arm_pol_friend: "Asociación con Polonia"
 ARM_arm_pol_friend_desc: "Queremos llevar nuestras relaciones de colaboración con nuestros colegas polacos a un nuevo nivel."
 ARM_polish_fleet_help: "Pedir a Polonia Ayuda con la Flota"
 ARM_polish_fleet_help_desc: "Tenemos la intención de atraer a especialistas polacos para el desarrollo de nuestra flota, recordando los primeros tratados de Polonia con la Primera República Armenia."
 ARM_our_common_heritage: "Nuestra Herencia Común"
 ARM_our_common_heritage_desc: "La batalla de Grunwald, cuando la Orden Teutónica fue derrotada por el ejército polaco, no tuvo lugar sin la participación de los armenios. Nosotros ayudamos a Polonia entonces, ¿podemos entonces invitarles a recordar el glorioso legado de aquellos años?"
 ARM_military_coop_greece: "Cooperación Militar con Grecia"
 ARM_military_coop_greece_desc: "Tenemos la intención de proponer a Grecia ampliar nuestra cooperación militar y también realizar una serie de ejercicios conjuntos."
 arme.38.t: "Resultados de la investigación"
 arme.38.d: "Nuestro Servicio de Seguridad Nacional investigó a todos los políticos prorrusos y encontró sus vínculos con el gobierno ruso. Sin embargo, no se encontraron tramas de corrupción."
 arme.38.a: "Interesante."
 arme.39.t: "Resultados de la investigación"
 arme.39.d: "Nuestro Servicio de Seguridad Nacional investigó a todos los políticos prorrusos y descubrió sus vínculos con el gobierno ruso. También se desclasificaron las tramas de corrupción y se detuvieron sus actividades."
 arme.39.a: "¡Genial!"
 ARM_sign_rome_statute: "Firma del Estatuto de Roma"
 ARM_sign_rome_statute_desc: "La firma del Estatuto de Roma podría darnos más herramientas para contrarrestar la agresión rusa en nuestra región y más allá."
 ARM_cleanse_russian_agents: "Arrestar a Agentes Rusos"
 ARM_cleanse_russian_agents_desc: "¡Debemos arrestar y prohibir a todos los políticos que trabajan abiertamente para los intereses rusos y promueven una agenda de servilismo!"
 ARM_demand_contr_reassur: "Exigir el Cumplimiento de Contratos"
 ARM_demand_contr_reassur_desc: "A medida que nuestra influencia sobre Rusia se expande, debemos exigir que se cumplan nuestros contratos de armas."
 arme.40.t: "[ARM.GetNameWithFlag] Exige el Cumplimiento del Contrato"
 arme.40.d: "El gobierno armenio, tras haber expandido su influencia sobre nuestro país, exige que cumplamos algunos contratos de armas que dejamos de cumplir tras el deterioro de sus relaciones con nosotros. Sin embargo, si cumplimos el contrato, su influencia sobre nosotros disminuirá considerablemente."
 arme.40.a: "¡Ahogarse en él!"
 ARM_northern_neighbor: "Vecino del Norte"
 ARM_northern_neighbor_desc: "Debemos negociar con nuestro vecino del norte menos antagónico. Ya sea diplomáticamente o de otra manera."
 ARM_open_up_djavakhq_quest: "Abrir la Cuestión de Djavakhq"
 ARM_open_up_djavakhq_quest_desc: "Nuestro pueblo en Georgia está oprimido por nuestros socios del norte. ¡Ha llegado la hora de liberarlos de Georgia!"
 ARM_support_separatism: "Apoyar el Separatismo"
 ARM_support_separatism_desc: "¡Debemos apoyar el separatismo en Georgia y promover la libertad de Djavakhk por medios militares!"
 ARM_protect_minority_rights: "Proteger los Derechos de las Minorías"
 ARM_protect_minority_rights_desc: "Nuestros amigos georgianos son demasiado duros con la población armenia de su país. No debemos provocar conflictos, sino influir en Georgia mediante la diplomacia."
 ARM_friendship_and_trade_agreement: "Acuerdo de Amistad y Comercio"
 ARM_friendship_and_trade_agreement_desc: "Aunque existen algunos problemas con Georgia y nuestra población armenia en Djavakhq, podemos negociarlos pacíficamente y hacer que ambos países prosperen."
 ARM_demand_representation: "Exigir Representación"
 ARM_demand_representation_desc: "Respetamos la integridad territorial de Georgia, sin embargo, no podemos quedarnos de brazos cruzados y observar cuán antidemocrático es el sistema en Georgia y cómo excluye a la comunidad armenia de su sistema político."
 ARM_black_sea_agreements: "Acuerdos del Mar Negro"
 ARM_black_sea_agreements_desc: "El comercio a través del Mar Negro es enorme y podría ser beneficioso para ambos establecer acuerdos de comercio bilateral y acceso marítimo."
 ARM_electro_exporting: "Exportación de Electricidad"
 ARM_electro_exporting_desc: "Nuestra capacidad de exportación de electricidad es suficiente para ampliar nuestras exportaciones. Podemos llegar a un acuerdo con Georgia que podría ser beneficioso."
 ARM_javakhq_must_be_free: "Operación §9 \"Cruz Caída\"§!"
 ARM_javakhq_must_be_free_desc: "¡Los georgianos imperialistas explotaron nuestra tierra y nuestro pueblo durante demasiado tiempo! ¡Ahora debemos llevar a cabo una operación militar y liberar a nuestro pueblo!"
 ARM_support_geo_peace: "Apoyo a la Paz en Georgia"
 ARM_support_geo_peace_desc: "Para fomentar la confianza entre nuestros países, podemos intentar lograr un acuerdo entre las repúblicas separatistas y Georgia, poniendo fin a este conflicto sin sentido."
 ARM_friendship_syria: "Amistad con Siria"
 ARM_friendship_syria_desc: "A pesar de nuestras posibles diferencias políticas con Siria, la comunidad alauita siempre ha apoyado a los armenios en la región y debemos fomentar la profundización de nuestras relaciones."
 ARM_alaw_assyr_armen: "Conexiones Alauitas-Armenias-Asirias"
 ARM_alaw_assyr_armen_desc: "El trío de alauitas, armenios y asirios son minorías no musulmanas en Siria. Para que nuestras comunidades sobrevivan, debemos cooperar y apoyarnos mutuamente."
 ARM_rescuing_diasp: "Rescate de la Diáspora"
 ARM_rescuing_diasp_desc: "La situación en Siria es bastante inestable y debemos ayudar a nuestra comunidad a repatriarse a Armenia e integrarse a nuestra sociedad."
 ARM_human_aid_syr: "Ayuda Humanitaria a Siria"
 ARM_human_aid_syr_desc: "La población siria necesita ayuda urgentemente; debemos proporcionar ayuda humanitaria a Siria y ampliar nuestra influencia sobre ellos."
 ARM_intervene_in_syria: "Intervenir en Siria"
 ARM_intervene_in_syria_desc: "¡Debemos enviar nuestras fuerzas para ayudar a Siria en su guerra!"
 arme.41.t: "¡Los Armenios de Djavakheti Exigen Representación!"
 arme.41.d: "La población armenia de Samtskhe-Djavakheti exige representación en nuestro parlamento y desea una mayor autonomía dentro de Georgia. Afirman específicamente que sus protestas no están relacionadas con Osetia del Sur y Abjasia y que no desean un conflicto armado dentro de su patria.\n\nEl propio gobierno armenio apoyó su demanda, exigió la estabilización de la situación y llamó a los armenios a no iniciar un levantamiento armado.\n\nEl gobierno armenio también declaró que si federalizamos nuestro país, nos ayudarán a integrar Osetia del Sur y Abjasia a través de sus vínculos con la diáspora, eludiendo la influencia rusa."
 arme.41.a: "¡Petición Justa!"
 arme.41.b: "¡No podemos permitírnoslo!"
 arme.42.t: "¡Federalización!"
 arme.42.d: "¿Por qué estás leyendo esto, pequeño tramposo?"
 arme.42.a: "¿Zaebumba?"
 djavakhq_pizdec: "[GEO.GetNameWithFlag] Rechazó la Resolución Pacífica"
 arme.43.t: "¡Federalización de [GEO.GetNameWithFlag]!"
 arme.43.d: "Georgia aceptó la propuesta de los armenios de Djavakhq y federalizó su país."
 arme.43.a: "¡Maravilloso!"
 arme.44.t: "[GEO.GetNameWithFlag] ¡Se Negó a Federalizar!"
 arme.44.d: "Georgia se negó a federalizarse y no concederá autonomía a Djavakhk."
 arme.44.a: "¡Qué vergüenza!"
 geofed_arm_tt: "¡[GEO.GetNameWithFlag] podría federalizar y dar autonomía a [ARM.GetFlag]§9Djavakhk§!"
 ARM_djavakhq: "Autonomía de Djavakheti"
 arme.45.t: "[ARM.GetNameWithFlag] ¡Propone Resolución de Conflictos!"
 arme.45.d: "Recientemente, el gobierno armenio decidió mediar en nuestro conflicto con Georgia. Los armenios proponen una solución mediante la cual [ROOT.GetNameWithFlag] obtendremos autonomía completa con posibilidad de secesión si así lo deseamos. Nos referimos a la reciente situación en la región autónoma de Djavakhk y la eficacia con la que se resolvió. Armenia también garantizará que Georgia no nos arrebate la autonomía. ¿Deberíamos estar de acuerdo?"
 arme.45.a: "¡Claro!"
 arme.45.b: "¡No entregaremos nuestra soberanía!"
 sooabk_peac_tt: "¡[SOO.GetNameWithFlag] y [ABK.GetNameWithFlag] se unirán a [GEO.GetNameWithFlag] como §Yregiones autónomas§! y tendremos influencia en [GEO.GetNameWithFlag]!"
 arme.46.t: "[FROM.GetNameWithFlag] ¡Acepta la Federalización!"
 arme.46.d: "[FROM.GetNameWithFlag] aceptó la solución armenia para la federalización con Georgia y ahora es parte del estado georgiano."
 arme.46.a: "¡Maravilloso!"
 arme.46.b: "¡Genial!"
 arme.47.t: "[FROM.GetNameWithFlag] ¡Rechaza la Federalización!"
 arme.47.d: "[FROM.GetNameWithFlag] rechazó nuestra propuesta de resolución."
 arme.47.a: "Muy Desafortunado."
 arme.48.t: "[ARM.GetNameWithFlag] ¡Reclama Samtskhe-Djavakheti!"
 arme.48.d: "Recientemente, el gobierno de [ARM.GetNameWithFlag] declaró que la opresión de los armenios en Georgia debe detenerse de inmediato.\n\nNuestros funcionarios y algunas figuras pro-georgianas armenias locales niegan cualquier acusación de opresión, sin embargo, Armenia ya comenzó a reunir tropas en la frontera entre Georgia y Armenia."
 arme.48.a: "¡Bastardos!"
 arme.49.t: "¡Guerra de [ARM.GetNameWithFlag] - [GEO.GetNameWithFlag]!"
 arme.49.d: "Armenia declaró recientemente la guerra a Georgia. ¡Esta podría ser nuestra oportunidad histórica de derrotar por completo al gigante georgiano!"
 arme.49.a: "¡Nos unimos!"
 arme.49.b: "Esto es demasiado arriesgado..."
 ARM_amenia_georgia_trade: "[ARM.GetNameWithFlag] - [GEO.GetNameWithFlag] Acuerdo Comercial"
 arme.50.a: "¡Claro!"
 arme.50.b: "Nosotros no estamos interesados"
 arme.52.b: "Continuemos con nuestra misión diplomática."
 arme.54.t: "[GEO.GetNameWithFlag] ¡Acepta!"
 arme.54.d: "[GEO.GetNameWithFlag] aceptó nuestra propuesta diplomática para darnos acceso a los puertos del Mar Negro."
 arme.54.a: "¡Maravilloso!"
 arme.55.t: "[GEO.GetNameWithFlag] ¡Rechazados!"
 arme.55.d: "[GEO.GetNameWithFlag] rechazó nuestra propuesta de amistad e intercambio."
 arme.55.a: "Bruh"
 arme.55.b: "¡Debemos continuar con los esfuerzos diplomáticos!"
 arme.56.t: "[ARM.GetNameWithFlag] ¡Ofrece Acuerdo de Exportación de Electricidad!"
 arme.56.d: "Recientemente, Armenia nos propuso un acuerdo de exportación de electricidad, mediante el cual nos proporcionarán electricidad durante varios años a un precio asequible. ¿Deberíamos aceptar?"
 arme.56.a: "¡Claro!"
 arme.56.b: "Lo siento, no"
 arme.57.t: "[ARM.GetNameWithFlag] Quiere Comprar Nuestras Armas"
 arme.57.d: "[ARM.GetName] ha expresado su deseo de adquirir algunas de nuestras armas como parte del fortalecimiento de la cooperación militar con nosotros, así como del fortalecimiento de sus fuerzas armadas. ¿Deberíamos estar de acuerdo?"
 arme.57.a: "¡Claro!"
 arme.57.b: "Lo siento, no"
 arme.58.t: "Contrato Militar Con [POL.GetNameWithFlag]"
 arme.58.d: "Han acordado vendernos sus armas como parte de la cooperación militar entre ambos países, lo cual es muy alentador, porque podremos fortalecer enormemente nuestras fuerzas armadas."
 arme.58.a: "Bueno"
 arme.59.t: "Contrato Militar Con [POL.GetNameWithFlag]"
 arme.59.d: "Se negaron a firmar un contrato para el suministro de armas. ¿Aparentemente creen que sus armas en nuestras manos alterarán el equilibrio de poder? ¡Qué estupidez!"
 arme.59.a: "Triste"
 arme.60.t: "[ARM.GetNameWithFlag] Se Esfuerza por Mejorar las Relaciones con Nosotros"
 arme.60.d: "El gobierno armenio está claramente decidido a mejorar más seriamente las relaciones diplomáticas entre nuestros países y tiene la intención de invitarnos a firmar un acuerdo de amistad y cooperación. ¿Deberíamos aceptar?"
 arme.60.a: "¡Claro!"
 arme.60.b: "Lo siento, no"
 arme.61.t: "Asociación con [POL.GetNameWithFlag]"
 arme.61.d: "El Gobierno polaco ha aprobado un acuerdo de colaboración y amistad entre nuestros países, lo cual es sin duda alentador, ya que cada vez hay más países que se convierten en nuestros socios."
 arme.61.a: "Bien"
 arme.62.t: "Asociación con [POL.GetNameWithFlag]"
 arme.62.d: "El gobierno polaco nos ha negado un tratado de amistad y cooperación, lo cual es triste, por supuesto, porque siempre nos centramos en la cooperación entre nuestros países."
 arme.62.a: "Triste"
 arme.63.t: "[ARM.GetNameWithFlag] Pide Ayuda Para el Desarrollo de la Flota"
 arme.63.d: "El Gobierno de Armenia, en referencia al acuerdo firmado durante la existencia de la Primera República de Armenia, solicita a nuestro gobierno asistencia para el desarrollo de la flota, ya que Armenia ahora tiene acceso al mar de nuevo. ¿Deberíamos aceptar?"
 arme.63.a: "¡Claro!"
 arme.63.b: "Lo siento, no"
 arme.64.t: "[POL.GetFlag]Asistencia Polaca Para el Desarrollo de la Flota"
 arme.64.d: "El gobierno polaco ha aceptado ayudarnos a desarrollar nuestra flota y ahora reforzaremos nuestras fuerzas navales."
 arme.64.a: "¡Bien!"
 arme.65.t: "[POL.GetFlag]Asistencia Polaca Para el Desarrollo de la Flota"
 arme.65.d: "El Gobierno polaco se ha negado a ayudarnos a desarrollar nuestras fuerzas navales, alegando la imposibilidad financiera de hacerlo."
 arme.65.a: "Triste"
 arme.66.t: "[ARM.GetNameWithFlag] Nos Invita a Recordar a Grunwald"
 arme.66.d: "La Batalla de Grunwald es un acontecimiento histórico en la historia de Polonia, en el que la Orden Teutónica y sus aliados fueron derrotados por completo por el ejército polaco. Los historiadores también confirman la participación de armenios en este evento, del lado del ejército polaco. Esto enfureció enormemente al bando alemán. ¿Deberíamos estar de acuerdo?"
 arme.66.a: "Es Motivo de Orgullo"
 arme.66.b: "Lo siento, no"
 arme.67.t: "El Legado Polaco-Armenio de la Batalla de Grunwald"
 arme.67.d: "El Gobierno polaco ha apoyado nuestro deseo de preservar este acontecimiento histórico en la memoria de nuestros pueblos como motivo de orgullo."
 arme.67.a: "Bueno"
 arme.68.t: "El Legado Polaco-Armenio de la Batalla de Grunwald"
 arme.68.d: "El gobierno polaco no apoyó nuestro deseo de recuperar la historia de los acontecimientos de aquellos años, ¡al parecer tienen miedo de la bota alemana!."
 arme.68.a: "Triste"
 arme.69.t: "Cereza Polaca"
 arme.69.d: "Cualquier relación entre países comienza siendo pequeña, por lo que nuestra relación con Polonia tiene sus raíces en la compra de bayas polacas para nuestro mercado; tal vez podamos ampliar nuestra asociación con ellos.."
 arme.69.a: "Esperamos Que Sí"
 arme.70.t: "[ARM.GetNameWithFlag] Propone Ejercicios Conjuntos"
 arme.70.d: "Armenia tiene la intención de ampliar la cooperación técnico-militar con nosotros y ofrece realizar ejercicios conjuntos de nuestras fuerzas de operaciones especiales para compartir experiencias."
 arme.70.a: "Estamos de Acuerdo"
 arme.70.b: "No"
 arme.71.t: "Ejercicios Conjuntos con Grecia"
 arme.71.d: "El gobierno griego aceptó nuestra oferta y realizamos ejercicios conjuntos de nuestras fuerzas de operaciones especiales."
 arme.71.a: "Somos Más Fuertes Juntos"
 arme.72.t: "Ejercicios Conjuntos con Grecia"
 arme.72.d: "El gobierno griego se ha negado a realizar ejercicios conjuntos con nuestras fuerzas de operaciones especiales."
 arme.72.a: "Debe Haber Razones"
 ARM_legacy_of_grunwald_idea: "Legado de la Batalla de Grunwald"
 ARM_anti_turkish_idea: "Diplomacia Anti-Turca"
 ARM_amenia_georgia_electro: "Importación de Electricidad de [ARM.GetNameWithFlag]"
 ARM_amenia_georgia_electro_agre: "Exportación de Electricidad a [GEO.GetNameWithFlag]"
 arme.74.t: "[GEO.GetNameWithFlag] ¡Está de acuerdo!"
 arme.74.d: "Georgia aceptó nuestra oferta de exportación de electricidad y ahora estamos estableciendo toda la infraestructura necesaria para el transporte de electricidad."
 arme.74.a: "¡Genial!"
 arme.75.t: "¡[GEO.GetNameWithFlag] Niega!"
 arme.75.d: "Georgia considera que nuestra oferta de exportación de electricidad es perjudicial para su propia industria eléctrica. Por lo tanto, no quiere nuestra electricidad en su país."
 arme.75.a: "Locura"
 ARM_bilat_trade_agreement: "Acuerdo Comercial Bilateral"
 ARM_bilat_trade_agreement_desc: "El comercio entre Armenia e Irán tiene un gran potencial. Debemos crear condiciones que garanticen la libre circulación de nuestros países."
 ARM_memorandum_of_understanding: "Memorando de Entendimiento"
 ARM_memorandum_of_understanding_desc: "Los medios de comunicación estatales de Irán y Armenia deben firmar un memorando de entendimiento y coordinación en términos de combatir la desinformación sobre ambos países por parte de sus enemigos comunes."
 ARM_amenia_iran_memo: "[ARM.GetNameWithFlag] - [PER.GetNameWithFlag] Memorando de Entendimiento"
 arme.76.t: "¡Memorando de entendimiento de [ARM.GetNameWithFlag] y [PER.GetNameWithFlag]iano!"
 arme.76.d: "Recientemente, los medios de comunicación del gobierno armenio nos contactaron para proponernos un acuerdo mutuamente beneficioso. Proponen firmar un memorando mediante el cual tanto los medios iraníes como los armenios combatirán la desinformación sobre ambos países, difundida por nuestros enemigos mutuos. ¿Deberíamos aceptar esta propuesta?"
 arme.76.a: "¡Claro!"
 arme.76.b: "Nosotros no estamos interesados"
 arme.77.t: "[PER.GetNameWithFlag] ¡Está de acuerdo!"
 arme.77.d: "Irán aceptó nuestra propuesta de un memorándum, mediante el cual los medios de comunicación iraníes y armenios combatirán la desinformación sobre ambos países difundida por nuestros enemigos mutuos."
 arme.77.a: "¡Genial!"
 arme.78.t: "¡[PER.GetNameWithFlag] Niega!"
 arme.78.d: "Irán no vio ninguna utilidad en firmar el memorando que le propusimos."
 arme.78.a: "Extraño"
 arme.80.t: "Cooperación Política con [ARM.GetNameWithFlag]"
 arme.80.d: "Armenia es nuestro socio y una de las naciones más cercanas en espíritu, tenemos una herencia común y debemos permanecer unidos, por lo que no es sorprendente que Armenia haya expresado su deseo de ampliar nuestra cooperación.."
 arme.80.a: "¡Somos Amigos!"
 arme.80.b: "No Estamos Interesados"
 arme.81.t: "Cooperación Política con [GRE.GetNameWithFlag]"
 arme.81.d: "Grecia ha expresado su voluntad de cooperar con nosotros en la esfera política, ¡y juntos nuestros estados pueden lograr mucho!"
 arme.81.a: "Bien"
 arme.82.t: "Cooperación Política con [GRE.GetNameWithFlag]"
 arme.82.d: "Grecia no está dispuesta a ampliar la cooperación política con nosotros, no ven el sentido de esto."
 arme.82.a: "Triste"
 arme.83.t: "Política Conjunta Anti-Turca"
 arme.83.d: "Turquía representa una amenaza igual para Armenia y para nosotros. Armenia propone implementar una política antiturca conjunta para mostrarle al gobierno turco su lugar."
 arme.83.a: "Turquía Debe Temernos"
 arme.83.b: "No Estamos Interesados"
 arme.84.t: "Política Conjunta Anti-Turca"
 arme.84.d: "El gobierno griego ha apoyado nuestra iniciativa política antiturca y tenemos la intención de luchar contra la influencia de Turquía sobre nosotros."
 arme.84.a: "Bien"
 arme.85.t: "Política Conjunta Anti-Turca"
 arme.85.d: "El gobierno griego decidió no apoyar nuestra iniciativa antiturca, lo que nos causó decepción."
 arme.85.a: "Triste"
 arme.86.t: "Asociación con [ARM.GetNameWithFlag]"
 arme.86.d: "Armenia pretende ampliar su asociación con nosotros en el marco de la cooperación con la Unión Europea, ven en nosotros a quienes les brindaremos la posibilidad de interactuar con toda la UE."
 arme.86.a: "¡Somos Amigos!"
 arme.86.b: "No Estamos Interesados"
 arme.87.t: "Cooperación Política con [GRE.GetNameWithFlag]"
 arme.87.d: "Grecia está dispuesta a ampliar nuestra cooperación política y también a ayudar a establecer contactos con la Unión Europea."
 arme.87.a: "Bien"
 arme.88.t: "Ayuda en la Lucha por Chipre"
 arme.88.d: "El gobierno armenio apoya nuestros esfuerzos para proteger nuestros intereses en Chipre y está dispuesto a brindarnos el máximo apoyo en esta lucha. ¿Estamos dispuestos a intensificar la intervención e involucrar a Armenia en esto?"
 arme.88.a: "Sí"
 arme.88.b: "No Estamos Interesados"
 arme.89.t: "Ayuda en la Lucha por Chipre"
 arme.89.d: "El Gobierno griego expresó gran alegría por nuestra oferta de ayuda para resolver el problema de Chipre, y dio a entender claramente que podríamos ayudarlos por todos los medios necesarios.."
 arme.89.a: "Bien"
 arme.90.t: "Ayuda en la Lucha por Chipre"
 arme.90.d: "El gobierno griego nos rechazó y nos advirtió sobre participar en el asunto de Chipre; parece que tienen miedo de socavar la situación.."
 arme.90.a: "Triste"
 arme.91.t: "Armenia Nos Apoya en Chipre"
 arme.91.d: "Los servicios especiales armenios nos están ayudando activamente a resolver nuestro problema en Chipre y nos ayudan a aumentar nuestra influencia en la isla."
 arme.91.a: "Bien"
 ARM_mithridates_legacy: "Legado de Mitrídates"
 ARM_mithridates_legacy_desc: "Desde la antigüedad, armenios y griegos siempre han compartido valores comunes, una hermandad de sangre y enemigos comunes. Siguiendo la tradición del legado de Mitrídates del Ponto, debemos mantener la amistad entre nuestros pueblos hermanos."
 ARM_reassuring_comp_agre: "Acuerdo Integral"
 ARM_reassuring_comp_agre_desc: "Debemos firmar un acuerdo de amistad integral con Grecia para finalmente oficializar nuestras relaciones a nivel gubernamental."
 ARM_anti_turk_diplo: "Diplomacia Anti-Turca"
 ARM_anti_turk_diplo_desc: "Debemos coordinar nuestros esfuerzos diplomáticos con Grecia para contrarrestar las ambiciones turcas sobre nosotros."
 ARM_our_friend_in_eu: "Nuestra Amiga en la UE"
 ARM_our_friend_in_eu_desc: "Grecia es nuestro aliado más cercano dentro de la Unión Europea. Debemos aprovecharlo."
 ARM_support_cyprus: "Apoyar a Chipre"
 ARM_support_cyprus_desc: "Al igual que Artsaj, Grecia tiene a Chipre. Allí también están presentes las decisiones tiránicas turcas. Debemos apoyar la causa griega en Chipre."
 arme.79.t: "[ARM.GetNameWithFlag] ¡Propone Proyecto de Presa!"
 arme.79.d: "Recientemente, el gobierno armenio propuso un proyecto conjunto de presa hidroeléctrica en el río Araks, que fluye entre nuestras fronteras. ¿Deberíamos aceptar su propuesta?"
 arme.79.a: "¡Claro, estamos de acuerdo!"
 arme.79.b: "No, no estamos interesados."
 arme.92.t: "[PER.GetNameWithFlag] ¡Está de acuerdo!"
 arme.92.d: "Irán acordó la construcción conjunta de una presa hidroeléctrica en la región de Syunik. Ya abonó su parte del precio."
 arme.92.a: "¡Genial!"
 ARM_amenia_iran_dam_share: "Participación en la Hidroeléctrica de Syunik"
 idea_willcanc_if_rel_tt: "§YEsta idea se eliminará si nuestras relaciones con [ARM.GetNameWithFlag] se deterioran§!"
 arme.93.t: "¡[PER.GetNameWithFlag] Niega!"
 arme.93.d: "Irán no está interesado en construir una central hidroeléctrica en la región de Syunik."
 arme.93.a: "Muy Desafortunado."
 ARM_arax_hydro_power: "Energía Hidroeléctrica del Araks"
 ARM_arax_hydro_power_desc: "Podemos proponer un acuerdo a Irán para construir una central hidroeléctrica en la región de Syunik, en el río Araks."
 ARM_export_weapons_iran: "Exportar Armas a Irán"
 ARM_export_weapons_iran_desc: "Debido a la presión extranjera sobre Irán, podrían estar interesados ​​en comprar nuestras armas a un precio razonable..."
 arme.94.t: "[ARM.GetNameWithFlag] ¡Ofrece una Oferta de Armas!"
 arme.94.d: "Recientemente, el gobierno armenio nos propuso un envío de armas de infantería de uso militar. Nos ofrecen un precio razonable, considerando la situación actual."
 arme.94.a: "¡Claro, estamos de acuerdo!"
 arme.94.b: "No estamos interesados"
 arme.95.t: "[PER.GetNameWithFlag] ¡Está de acuerdo!"
 arme.95.d: "Irán aceptó comprar nuestras armas y el envío se completará pronto."
 arme.95.a: "¡Genial!"
 arme.96.t: "¡[PER.GetNameWithFlag] Niega!"
 arme.96.d: "Irán no aceptó comprar nuestras armas por alguna razón."
 arme.96.a: "Muy Desafortunado."
 ARM_free_trade_zone: "Zona de Libre Comercio de Meghri"
 ARM_third_power_transmission: "Zona Económica Libre de Meghri"
 ARM_third_power_transmission_desc: "Para aumentar nuestro comercio con Irán deberíamos establecer una zona de libre comercio en Meghri."
 ARM_iranian_drone_deal: "Compra de Drones Iraníes"
 ARM_iranian_drone_deal_desc: "Los drones iraníes han demostrado ser muy eficaces en el combate moderno. Podemos encontrarles un uso..."
 arme.97.t: "[ARM.GetNameWithFlag] ¡Quiere Comprar Nuestros Drones!"
 arme.97.d: "Recientemente, Armenia mostró interés en comprar nuestros drones. ¿Deberíamos aceptar su oferta y proporcionarles los drones por la suma justa?"
 arme.97.a: "¡Claro!"
 arme.97.b: "Lo siento, no"
 arme.98.t: "[PER.GetNameWithFlag] ¡Está de acuerdo!"
 arme.98.d: "Irán acordó vendernos algunos de sus drones. Serán entregados en breve."
 arme.98.a: "¡Genial!"
 arme.99.t: "¡[PER.GetNameWithFlag] Niega!"
 arme.99.d: "Irán no aceptó nuestro acuerdo de compra de drones."
 arme.99.a: "Uh."
 ARM_covert_defense_agreement: "Acuerdo de Defensa Encubierto"
 ARM_covert_defense_agreement_desc: "Debemos aliarnos con Irán en un nivel secreto y más profundo para garantizar la seguridad de ambos estados."
 arme.100.t: "[ARM.GetNameWithFlag] ¡Ofrece un Acuerdo de Defensa Encubierta!"
 arme.100.d: "Armenia propuso recientemente un acuerdo de defensa encubierta entre nuestros dos países. Quieren que garanticemos su independencia y garantizarán la nuestra. ¿Deberíamos aceptarlo?"
 arme.100.a: "¡Claro!"
 arme.100.b: "No, no podemos arriesgarnos."
 arme.104.t: "Batallones Rebeldes"
 arme.104.d: "Nuestro levantamiento está cobrando impulso, ya se han formado batallones enteros que están listos para defender nuestra libertad contra la ocupación iraní."
 arme.104.a: "Por la Libertad del Kurdistán"
 arme.105.t: "Acuerdo Comercial con Armenia"
 arme.105.d: "El gobierno armenio desea concluir un acuerdo comercial con nosotros, eludiendo las estructuras de la Unión Europea. Creen que esta será una mejor manera de cooperación económica que esperar años a que la burocracia europea haga su trabajo.."
 arme.105.a: "Estamos de Acuerdo"
 arme.105.b: "No Estamos de Acuerdo"
 arme.106.t: "Acuerdo de Cooperación Económica y Comercial con Armenia"
 arme.106.d: "El gobierno armenio pretende ampliar los lazos culturales y económicos con nuestro país. Armenia propone firmar una serie de tratados y acuerdos de cooperación en estas áreas entre nuestros países."
 arme.106.a: "Estamos de Acuerdo"
 arme.106.b: "No Estamos de Acuerdo"
 arme.107.t: "Acuerdo Comercial con Francia"
 arme.107.d: "El gobierno francés ha acordado concluir una serie de acuerdos de cooperación económica y cultural con nosotros."
 arme.107.a: "Bien"
 arme.108.t: "Acuerdo Comercial con Francia"
 arme.108.d: "El gobierno francés se ha negado a ampliar la cooperación con nosotros en los ámbitos cultural y económico, aparentemente no nos considera posibles socios."
 arme.108.a: "Triste"
 arme.109.t: "Acuerdo de Cooperación en Educación con Armenia"
 arme.109.d: "El gobierno armenio ha expresado su interés en cooperar con nuestras instituciones educativas y desearía que nuestras mejores universidades tuvieran oficinas de representación en su país. Esta es una gran oportunidad para influir en la mentalidad de la juventud armenia."
 arme.109.a: "Estamos de Acuerdo"
 arme.109.b: "No Estamos de Acuerdo"
 arme.110.t: "Acuerdo de Cooperación en Educación con Francia"
 arme.110.d: "El gobierno francés ha expresado su voluntad y deseo de cooperar activamente con nosotros en el ámbito educativo y también está dispuesto a abrir oficinas de representación de sus instituciones de educación superior en nuestro país."
 arme.110.a: "Bien"
 arme.111.t: "Acuerdo de Cooperación en Educación con Francia"
 arme.111.d: "El gobierno francés rechazó nuestra oferta de cooperación en el campo de la educación entre nuestros países; parece que no están dispuestos a dialogar con nosotros en este ámbito."
 arme.111.a: "Triste"
 arme.112.t: "Cooperación Militar con Armenia"
 arme.112.d: "El gobierno armenio tiene la intención de ofrecernos cooperación militar entre nuestros países, Armenia está muy interesada en la experiencia de nuestras misiones internacionales, así como en la experiencia de la Legión Extranjera."
 arme.112.a: "Estamos de Acuerdo"
 arme.112.b: "No Estamos de Acuerdo"
 arme.113.t: "Cooperación Militar con Francia"
 arme.113.d: "El Gobierno francés ha aceptado cooperar entre nuestras fuerzas armadas, en particular para adquirir experiencia en la conducción de misiones internacionales, así como la experiencia de algunas operaciones de la legión extranjera."
 arme.113.a: "Bien"
 arme.114.t: "Cooperación Militar con Francia"
 arme.114.d: "El gobierno francés se ha negado a cooperar con nosotros militarmente; aparentemente no cree que nuestro ejército esté en condiciones de aprender de la experiencia extranjera."
 arme.114.a: "Triste"
 arme.115.t: "Armenia en la Francofonía"
 arme.115.d: "El gobierno armenio lleva mucho tiempo esforzándose por convertirse en parte de la Francofonía, tal vez esto sea algo más para ellos, porque también podremos incluirlos plenamente en la francófona con el tiempo. ¿Vale la pena apoyar el deseo armenio de convertirse en parte de la Francofonía?"
 arme.115.a: "Sí"
 arme.115.b: "No"
 arme.116.t: "Armenia en la Francofonía"
 arme.116.d: "Francia reaccionó positivamente a nuestra voluntad de formar parte de la Francofonía y ahora que estamos en la esfera de influencia francesa, podemos contar con su patrocinio."
 arme.116.a: "Bien"
 arme.117.t: "Armenia en la Francofonía"
 arme.117.d: "Francia ha decidido negarnos nuestro deseo de formar parte de la Francofonía y, en el futuro, de toda la esfera francófona."
 arme.117.a: "Triste"
 arme.118.t: "Armenia Quiere Unirse a Nuestro Programa Militar Europeo"
 arme.118.d: "El Programa de Asociación Estatal del Mando Europeo de Estados Unidos (EUCOM SPP), según su propia misión, es un Programa de Asociación Estatal de la Guardia Nacional que vincula a los estados estadounidenses con países socios designados para apoyar los objetivos de cooperación en seguridad del mando. Actualmente, existen 22 asociaciones con países de la antigua Unión Soviética, Yugoslavia y el Pacto de Varsovia en el Área de Responsabilidad del EUCOM. Tras obtener su independencia tras la disolución de la Unión Soviética el 26 de diciembre de 1991, estos países solicitaron poco después el asesoramiento y la asistencia de Estados Unidos para la creación de nuevas fuerzas de autodefensa."
 arme.118.a: "Claro, Necesitamos Entrenar a Nuestros Aliados"
 arme.118.b: "Lo siento, No"
 arme.119.t: "[USA.GetNamewithFlag] ¡Acepta!"
 arme.119.d: "[FROM.GetNameWithFlag] ha aceptado nuestra iniciativa y ahora nuestras tropas se unirán a ejercicios conjuntos con nuestros aliados europeos."
 arme.119.a: "Perfecto"
 arme.120.t: "[USA.GetNamewithFlag] Nos Rechazó"
 arme.120.d: "Nuestra política exterior puede haber influido en esto, pero no se nos permitió participar en ejercicios conjuntos de países europeos."
 arme.120.a: "Mal"
 arme.121.t: "Ejercicio Conjunto con el Estado de Kansas"
 arme.121.d: "Armenia desea organizar un ejercicio conjunto con nuestro Ejército del Estado de Kansas"
 arme.121.a: "Claro"
 arme.121.b: "Nunca"
 arme.122.t: "[USA.GetNamewithFlag] ¡Acepta!"
 arme.122.d: "[FROM.GetNameWithFlag] acuerda ejercicios conjuntos entre nuestro ejército y la guardia nacional de Kansas."
 arme.122.a: "Perfecto"
 arme.123.t: "[USA.GetNamewithFlag] Rechazó Nuestra Propuesta"
 arme.123.d: "Lamentablemente, no podremos mejorar la preparación de nuestras fuerzas armadas en ejercicios conjuntos con el estado de Kansas."
 arme.123.a: "Mal"
 arme.124.t: "Armenia Desea Obtener el Estatus de Aliado Principal No OTAN"
 arme.124.d: "Consideramos a Armenia como un país clave en la región del Cáucaso, y su membresía en el programa de asociación no perteneciente a la OTAN es una buena perspectiva para expandir nuestra influencia allí."
 arme.124.a: "Sí, estamos de acuerdo."
 arme.124.b: "No, Armenia Es Débil"
 arme.125.t: "[USA.GetNamewithFlag] ¡Acepta!"
 arme.125.d: "[USA.GetNamewithFlag] ratificó nuestra solicitud y ahora tenemos una oportunidad única de cooperación militar con la OTAN."
 arme.125.a: "Bueno"
 arme.126.t: "[USA.GetNamewithFlag] Rechazó Nuestra Solicitud"
 arme.126.d: "[USA.GetNamewithFlag] ha decidido rechazar nuestra solicitud porque no cumplimos con sus estándares."
 arme.126.a: "Meh"
 arme.127.t: "¿Inversiones Adicionales en [ARM.GetNamewithFlag]?"
 arme.127.d: "Es necesario desarrollar los vínculos económicos entre nuestros países a través de diversos programas conjuntos"
 arme.127.a: "Sí, Claro"
 arme.127.b: "Nunca"
 arme.128.t: "[USA.GetNamewithFlag] ¡Acepta!"
 arme.128.d: "Afortunadamente pudimos convencer a [USA.GetNamewithFlag] sobre programas de financiación adicionales en nuestro país."
 arme.128.a: "Bueno"
 arme.129.t: "[USA.GetNamewithFlag] Rechazó Nuestra Propuesta"
 arme.129.d: "Lamentablemente, [USA.GetNamewithFlag] no está interesado en esto."
 arme.129.a: "Mal"
 arme.130.t: "[ARM.GetNamewithFlag] Solicita Pagos en el Marco del Pacto del Desafío del Milenio"
 arme.130.d: "Armenia cree que su Estado ha superado todas las etapas de mejora de la gobernanza y está listo para recibir los desembolsos en el marco del programa Pacto del Milenio."
 arme.130.a: "Claro que están listos"
 arme.130.b: "No, arregla tu país"
 arme.133.t: "Cabildeo de la ANCA"
 arme.133.d: "El Comité Nacional Armenio de América (ANCA) es una organización de base armenio-estadounidense. Su sede se encuentra en Washington, D.C., y cuenta con oficinas regionales en Glendale, California, y Watertown, Massachusetts."
 arme.133.a: "Bueno"
 arme.134.t: "[ARM.GetNamewithFlag] Pide Reconocimiento del Genocidio Armenio"
 arme.134.d: "Armenia está presionando con mucha fuerza para que se reconozca el genocidio armenio. Si aceptamos esto, nuestra influencia en Armenia se verá enormemente fortalecida, pero deteriorará nuestras relaciones con Turquía."
 arme.134.a: "Turquía debería ser castigada por esto."
 arme.134.b: "¿Armenio qué?"
 arme.135.t: "[USA.GetNamewithFlag] ¡Genocidio Reconocido!"
 arme.135.d: "Este día será verdaderamente uno de los días más importantes en la historia de Armenia, ya que logramos convencer a [USA.GetNamewithFlag] de reconocer el genocidio cometido por Turquía."
 arme.135.a: "¡Hurra!"
 arme.136.t: "[USA.GetNamewithFlag] Fingen que No Saben de Qué Estamos Hablando"
 arme.136.d: "Lamentablemente, Estados Unidos prefiere ser más amigo de [TUR.GetNamewithFlag] que de nosotros."
 arme.136.a: "Mal"
 arme.137.t: "[ARM.GetNamewithFlag] se retira de los acuerdos militares con [USA.GetNamewithFlag]"
 arme.137.d: "¿Pertenecemos a la categoría de países débiles que no pueden valerse por sí mismos? Estos países dependen en gran medida de la opinión de [USA.GetNamewithFlag], porque dependen únicamente de la producción y el suministro de armas de [USA.GetNamewithFlag], y esto perjudica su propia seguridad al hacerlos dependientes de Washington. Ya no nos interesa."
 arme.137.a: "¡Fuera la OTAN!"
 arme.144.t: "Congelación de Activos de [USA.GetNamewithFlag]"
 arme.144.d: "El dinero que Estados Unidos inyectó a nuestro país tenía como objetivo derrocar a nuestro gobierno. Como compensación, estamos nacionalizando este capital."
 arme.144.a: "Nos Pertenece"
 arme.145.t: "Retirada de Organizaciones No Gubernamentales"
 arme.145.d: "[USA.GetNamewithFlag] financia organizaciones que amenazan nuestra seguridad. Ya no nos interesa participar en ellas."
 arme.145.a: "Es mejor así"
 arme.149.t: "[ARM.GetNamewithFlag] Quiere Ampliar los Lazos Culturales"
 arme.149.d: "Nuestros pueblos están unidos por siglos de historia, y debemos mantener este vínculo en el futuro. Además, nuestros países se benefician mutuamente de dicha cooperación en el ámbito político y económico."
 arme.149.a: "Claro"
 arme.149.b: "No"
 arme.150.t: "[SYR.GetNamewithFlag] ¡Acepta!"
 arme.150.d: "El gobierno sirio está totalmente de acuerdo con nosotros y está dispuesto a seguir mejorando la interacción cultural."
 arme.150.a: "Bueno"
 arme.151.t: "[SYR.GetNamewithFlag] Rechaza la Cooperación Cultural"
 arme.151.d: "No les interesa y han rechazado nuestra oferta."
 arme.151.a: "Mal"
 arme.152.t: "[ARM.GetNamewithFlag] Evacua la Diáspora de Regreso a [ARM.GetNamewithFlag]"
 arme.152.d: "Debido a la guerra en la que está involucrado nuestro país, el gobierno armenio ha decidido evacuar a su población a [ARM.GetNamewithFlag]."
 arme.152.a: "¡Que tengas un buen viaje!"
 arme.153.t: "Armenios Llegados de [SYR.GetNamewithFlag]"
 arme.153.d: "Pudimos evacuar a nuestra gente de Siria, que está pasando por momentos difíciles en este momento."
 arme.153.a: "Bueno"
 arme.154.t: "Ayuda Humanitaria a [SYR.GetNamewithFlag]"
 arme.154.d: "Nuestros amigos sirios están en una situación difícil, por eso les brindaremos ayuda humanitaria."
 arme.154.a: "¡Nuestros hermanos deben ser salvados!"
 arme.155.t: "[ARM.GetNamewithFlag] Proporciona Ayuda Humanitaria"
 arme.155.d: "Nuestros amigos de [ARM.GetNamewithFlag] nos enviaron ayuda humanitaria. Nuestro pueblo agradece de corazón al pueblo armenio por no olvidarnos."
 arme.155.a: "¡Que Dios Proteja a Armenia!"
 arme.156.t: "[ARM.GetNamewithFlag] Nos Envía Ayuda Militar"
 arme.156.d: "[ARM.GetNamewithFlag] está dispuesto a brindarnos asistencia que debería mejorar nuestra situación en la primera línea."
 arme.156.a: "Gracias"
 arme.156.b: "No Lo Necesitamos"
 arme.157.t: "[SYR.GetNamewithFlag] Acepta Nuestra Ayuda"
 arme.157.d: "Su liderazgo militar nos agradece la ayuda que les hemos brindado."
 arme.157.a: "Bueno"
 arme.158.t: "[SYR.GetNamewithFlag] Rechaza la Ayuda"
 arme.158.d: "Al parecer no necesitan realmente nuestra ayuda."
 arme.158.a: "Vale"
 arme.163.t: "[ARM.GetNamewithFlag] Desea Unirse a la OTAN"
 arme.163.d: "Aseguran que trabajarán por una causa común y se convertirán en un socio clave de la alianza en su región."
 arme.163.a: "Claro"
 arme.163.b: "No"
 arme.164.t: "[USA.GetNamewithFlag] Nos Acepta en la Alianza"
 arme.164.d: "Hemos logrado asegurar la protección de una de las alianzas más fuertes del mundo."
 arme.164.a: "Perfecto"
 arme.165.t: "[USA.GetNamewithFlag] Rechaza Nuestra Solicitud"
 arme.165.d: "No les interesa que nos unamos a la OTAN."
 arme.165.a: "Meh"
 ARM_relations_with_america: "Relaciones con EE.UU."
 ARM_relations_with_america_desc: "Estados Unidos cuenta con una gran diáspora armenia, así como con muy buenas relaciones históricas con nosotros. Desde la presidencia de Wilson, muchos armenios vieron a Estados Unidos como un socio confiable."
 ARM_join_us_eur_partn_prog: "Programa de Asociación Estatal del Mando Europeo"
 ARM_join_us_eur_partn_prog_desc: "Estados Unidos está ofreciendo un programa de asociación militar con sus reservas del ejército, que tiene como objetivo desarrollar nuestras nuevas estructuras militares."
 ARM_expand_us_embassy: "Expansión de la Embajada de EE.UU."
 ARM_expand_us_embassy_desc: "Estados Unidos ya tiene una gran extensión de tierra bajo el control de su embajada. Sin embargo, si desean más terreno para su embajada, podemos proporcionárselo."
 ARM_additional_programs_for_armenia: "Programas Adicionales para Armenia"
 ARM_additional_programs_for_armenia_desc: "Estados Unidos puede proporcionarnos programas de desarrollo adicionales que estarían dirigidos exclusivamente a Armenia."
 ARM_millennium_challenge_compact: "Compacto del Reto del Milenio"
 ARM_millennium_challenge_compact_desc: "desafío del Milenio es un acuerdo de cinco años del gobierno de Estados Unidos entre MCC y un país elegible para financiar programas específicos destinados a reducir la pobreza y estimular el crecimiento económico."
 ARM_anca_lobbying: "Cabildeo de la ANCA"
 ARM_anca_lobbying_desc: "El Comité Nacional Armenio de América es una organización de base armenio-estadounidense. Su sede se encuentra en Washington, D.C., y cuenta con oficinas regionales en Glendale, California, y Watertown, Massachusetts."
 ARM_us_recog_arm_gen: "Reconocimiento del Genocidio Armenio por Parte de EE.UU."
 ARM_us_recog_arm_gen_desc: "Debemos pedir a Estados Unidos que finalmente presione a Turquía y reconozca las atrocidades turcas durante la Primera Guerra Mundial como genocidio."
 ARM_kansas_armenia_partnership: "Asociación entre Kansas y Armenia"
 ARM_kansas_armenia_partnership_desc: "El ejército armenio se ha asociado con la Guardia Nacional de Kansas a través del programa CSPP de EE. UU. Debemos realizar entrenamientos conjuntos."
 ARM_req_mnna_status: "Solicitud del Estatus de Aliado Principal No OTAN"
 ARM_req_mnna_status_desc: "Ahora que hemos demostrado verdadera lealtad a la causa occidental, tal vez deberíamos solicitarle a Estados Unidos el estatus de aliado importante no perteneciente a la OTAN."
 ARM_stopping_usaid: "Detener la USAID"
 ARM_stopping_usaid_desc: "USAID es una organización que solo promueve los intereses estadounidenses. ¡Hay que detenerla!"
 ARM_close_us_embassy: "Cierre de la Embajada"
 ARM_close_us_embassy_desc: "Estados Unidos lleva demasiado tiempo conspirando contra nosotros a través de su embajada. Hay que detener esto."
 ARM_seizing_us_investments: "Confiscación de Inversiones Estadounidenses"
 ARM_seizing_us_investments_desc: "Las inversiones estadounidenses no buscan la prosperidad del país anfitrión, sino el ingreso capitalista de las élites estadounidenses. ¡Debemos aprovecharlas!"
 ARM_stop_military_coop: "Fin de la Cooperación Militar"
 ARM_stop_military_coop_desc: "No nos sirve de nada cooperar militarmente con estadounidenses débiles."
 ARM_no_more_relations_with_us: "No Más Relaciones con EE.UU."
 ARM_no_more_relations_with_us_desc: "No podemos permitirnos tener NINGUNA relación con el país terrorista de EE.UU."
 ARM_no_more_ngo_funds: "No más fondos para ONG"
 ARM_no_more_ngo_funds_desc: "Las ONG son organizaciones de espionaje social que promueven valores que no coinciden con nuestra agenda. Hay que detener esto."
 ARM_anti_nato_propaganda: "Propaganda Contra la OTAN"
 ARM_anti_nato_propaganda_desc: "¡La OTAN es una organización imperialista de hegemonía occidental! ¿Cómo podemos no decirle al mundo la verdad sobre ellos?"
 ARM_combat_us_influence: "Combatir la Influencia de EE.UU."
 ARM_combat_us_influence_desc: "Debemos combatir la influencia estadounidense en todos los ámbitos. Desde la cultura hasta la economía, la presencia estadounidense debe ser frenada."
 ARM_relations_with_iran: "Relaciones con Irán"
 ARM_relations_with_iran_desc: "Irán es uno de nuestros vecinos más antiguos. Ha llegado el momento de decidir cómo serán nuestras relaciones en el siglo XXI."
 ARM_close_border_with_iran: "Cierre de la Frontera con Irán"
 ARM_close_border_with_iran_desc: "Debemos cerrar nuestra frontera con Irán para no permitir más ningún comercio con ellos."
 ARM_rip_the_trade_agreements: "No Más Comercio"
 ARM_rip_the_trade_agreements_desc: "Debemos prohibir los productos iraníes y cortar cualquier conexión comercial entre Irán y Armenia."
 ARM_closing_blue_mosque: "Cierre de la Mezquita Azul"
 ARM_closing_blue_mosque_desc: "Irán ha estado utilizando la Mezquita Azul como su centro de influencia en Armenia. Debemos poner fin a esto."
 ARM_amenia_iran_agen_capt: "Vigilancia Contra Irán"
 ARM_capture_iranian_agents: "Vigilancia Contra Irán"
 ARM_capture_iranian_agents_desc: "Irán podría intentar conspirar contra nosotros. Debemos estar preparados para tal situación."
 ARM_hez_are_terrorists: "¡Hezbolá Son Terroristas!"
 ARM_hez_are_terrorists_desc: "Hezbolá son agentes terroristas iraníes. ¡Debemos condenar su organización política y su agenda!"
 ARM_support_pjaks: "Apoyo al Partido por una Vida Libre en el Kurdistán"
 ARM_support_pjaks_desc: "Para frenar las ambiciones iraníes, debemos apoyar a las organizaciones separatistas kurdas, como el Partido de la Vida Libre del Kurdistán."
 ARM_post_ussr_partnersh: "Asociaciones Post-URSS"
 ARM_post_ussr_partnersh_desc: "Muchos países con los que mantuvimos relaciones económicas y políticas durante la era soviética ahora se encuentran bastante distanciados de nosotros. Podemos intentar fortalecer nuestras relaciones de nuevo."
 ARM_trade_partnership_blr: "Asociación con Bielorrusia"
 ARM_trade_partnership_blr_desc: "El mercado de Bielorrusia puede ser muy interesante para nuestras empresas, así como nuestro mercado para ellas."
 ARM_trade_partnership_kaz: "Asociación con Kazajistán"
 ARM_trade_partnership_kaz_desc: "Puede que nuestras relaciones con Kazajstán no sean las más brillantes, pero nuestros intereses comerciales comunes y nuestra profunda integración con Rusia pueden favorecernos a ambos."
 ARM_trade_partnership_ukr: "Asociación con Ucrania"
 ARM_trade_partnership_ukr_desc: "Establecer buenas relaciones comerciales con Ucrania podría ser muy beneficioso para nosotros, ya que nuestro mercado puede ser muy adecuado para sus productos."
 arme.138.t: "[ARM.GetNameWithFlag] ¡Quiere Firmar un Acuerdo de Cooperación con la UE!"
 arme.138.d: "Recientemente, Armenia decidió firmar un acuerdo de cooperación con la Unión Europea. ¿Deberíamos aceptar su propuesta?"
 arme.138.a: "¡Claro!"
 arme.138.b: "¿No estamos de acuerdo?"
 arme.139.t: "[FROM.GetNameWithFlag] ¡Acepta!"
 arme.139.d: "[FROM.GetNameWithFlag] aceptó nuestra propuesta y el acuerdo se firmará en breve."
 arme.139.a: "¡Genial!"
 arme.140.t: "[FROM.GetNameWithFlag] ¡Rechazados!"
 arme.140.d: "[FROM.GetNameWithFlag] rechazó nuestra propuesta de firmar un acuerdo de cooperación."
 arme.140.a: "Muy Desafortunado."
 arme.141.t: "[ARM.GetNameWithFlag] ¡Quiere Unirse al Plan de Acción Abierto!"
 arme.141.d: "Recientemente, Armenia ha mostrado interés en unirse al Plan de Acción Abierto. Los planes de acción buscan mejorar la agenda de reformas asumida por el gobierno, haciéndolas más transparentes, responsables, participativas e innovadoras. ¿Deberíamos permitirles unirse?"
 arme.141.a: "¡Claro!"
 arme.141.b: "Lo siento, no"
 arme.142.t: "[FROM.GetNameWithFlag] ¡Acepta!"
 arme.142.d: "Aceptaron nuestra solicitud de abrir un plan de acción a la JPI, que tiene como objetivo mejorar la agenda de reformas asumidas por el gobierno, haciéndolas más transparentes, responsables, participativas e innovadoras."
 arme.142.a: "¡Genial!"
 arme.143.t: "[FROM.GetNameWithFlag] ¡Rechazados!"
 arme.143.d: "[FROM.GetNameWithFlag] rechazó nuestra propuesta de unirse al plan de acción abierto."
 arme.143.a: "Muy Desafortunado."
 arme.146.t: "Casa de Comercio en [ARM.GetNameWithFlag]"
 arme.146.d: "El gobierno armenio sugiere que ampliemos nuestras relaciones comerciales a un nuevo nivel. El gobierno armenio, con la ayuda de la empresa Multigroup, está dispuesto a facilitar el espacio para la creación de una plataforma comercial donde nuestros productos se presentarán para su venta a compradores armenios. ¿Deberíamos llegar a un acuerdo de este tipo?"
 arme.146.a: "Sí"
 arme.146.b: "No"
 arme.147.t: "Casa Comercial de Bielorrusia en Armenia"
 arme.147.d: "El gobierno bielorruso acordó abrir una casa comercial para productos bielorrusos en nuestro país."
 arme.147.a: "Bien"
 arme.148.t: "Casa Comercial de Bielorrusia en Armenia"
 arme.148.d: "El gobierno bielorruso se negó a abrir una casa comercial para productos bielorrusos en nuestro país."
 arme.148.a: "Triste"
 arme.159.t: "Discusiones sobre el Convenio de Estambul"
 arme.159.d: "Nos enfrentamos a la cuestión de aceptar o rechazar la firma de los acuerdos de Estambul sobre derechos humanos. Este acuerdo nos acercará a la adhesión a la Unión Europea, pero podría generar descontento entre la población."
 arme.159.a: "¡Vamos a firmarlos!"
 arme.159.b: "Nosotros no podemos arriesgarlo."
 arme.160.t: "Ejercicios Militares Conjuntos con Armenia"
 arme.160.d: "El gobierno de Armenia propone que nuestras fuerzas armadas realicen ejercicios militares conjuntos para compartir su experiencia y habilidades, mejorar la coordinación de nuestras fuerzas armadas y fortalecer las relaciones amistosas entre los dos países."
 arme.160.a: "Estamos de Acuerdo"
 arme.160.b: "No"
 arme.161.t: "Ejercicios Militares Conjuntos con [FROM.GetName]"
 arme.161.d: "Su gobierno ha acordado realizar ejercicios conjuntos con nuestras fuerzas armadas."
 arme.161.a: "Bien"
 arme.162.t: "Ejercicios Militares Conjuntos con [FROM.GetName]"
 arme.162.d: "Su gobierno se negó a realizar ejercicios conjuntos con nuestras fuerzas armadas."
 arme.162.a: "Triste"
 arme.166.t: "[ARM.GetNameWithFlag] ¡Propone un Tratado Científico!"
 arme.166.d: "Recientemente, el gobierno armenio nos ofreció un tratado de intercambio científico mutuo, que podría ser beneficioso para ambas partes. ¿Deberíamos aceptar su propuesta?"
 arme.166.a: "¡Claro!"
 arme.166.b: "Lo siento, no"
 arme.167.t: "[KAZ.GetNameWithFlag] ¡Está de acuerdo!"
 arme.167.d: "Kazajstán aceptó nuestro tratado científico y ahora ambas partes comenzarán a beneficiarse de él."
 arme.167.a: "¡Genial!"
 arme.168.t: "[KAZ.GetNameWithFlag] ¡Rechazados!"
 arme.168.d: "Kazajstán rechazó nuestra propuesta de tratado, considerándola una especie de truco que los colocaría en una posición peor."
 arme.168.a: "¿Q-qué?"
 arme.169.t: "[ARM.GetNameWithFlag] ¡Propone Cooperación Empresarial!"
 arme.169.d: "Recientemente, el gobierno armenio, a través de sus conexiones con la diáspora en Ucrania, se puso en contacto con nosotros para proponernos un acuerdo comercial mutuamente beneficioso. ¿Deberíamos aceptarlo?"
 arme.169.a: "¡Claro!"
 arme.169.b: "No."
 arme.170.t: "[UKR.GetNameWithFlag] ¡Está de acuerdo!"
 arme.170.d: "Ucrania aceptó nuestro tratado comercial y ahora ambas partes comenzarán a beneficiarse de él."
 arme.170.a: "¡Genial!"
 arme.171.t: "[UKR.GetNameWithFlag] ¡Rechazados!"
 arme.171.d: "Ucrania rechazó nuestra propuesta comercial, considerándola una especie de truco que los pondría en una situación peor."
 arme.171.a: "¿Q-qué?"
 arme.172.t: "Brigada de Voluntarios Armenios"
 arme.172.d: "Recientemente, con el apoyo de la diáspora armenia y el gobierno armenio, los armenios locales de Rojava se unieron a nuestra lucha contra la opresión turca e islamista. Ahora forman parte del Ejército de Liberación de los Obreros y Campesinos de Turquía (TIKKO) y de las Fuerzas Democráticas Sirias. La brigada declaró que su objetivo es defender a los armenios de Siria, su lengua y cultura, y a todos los pueblos de la Administración Autónoma del Norte y Este de Siria del Estado Islámico de Irak y el Levante (EIIL) y del Estado turco, a los que describió como los actuales representantes del fascista Comité de Unión y Progreso."
 arme.172.a: "¡Genial!"
 arme.173.t: "Estados Unidos de Armenia"
 arme.173.d: "¡Nuestro país ha entrado en una nueva etapa de su desarrollo histórico! ¡Ahora estamos listos para anunciar la creación de los Estados Unidos de Armenia! Nuestro estado se ha expandido hasta alcanzar fronteras dignas de tal nombre. Nos convertiremos en guardianes de la paz y la democracia en todo el Cáucaso... Quizás más."
 arme.173.a: "¡Genial!"
 ARM_kaz_scienc_part: "Asociación Científica con Kazajistán"
 ARM_kaz_scienc_part_desc: "Podemos ofrecer a Kazajstán un tratado científico mutuamente beneficioso."
 ARM_diasp_ukr: "Conexiones en Ucrania"
 ARM_diasp_ukr_desc: "La diáspora armenia en Ucrania es bastante grande. Quizás podamos aprovechar nuestras conexiones para llegar a un acuerdo mutuamente beneficioso."
 ARM_ukraine_cooperation_idea: "Comercial [ARM.GetNameWithFlag] - [UKR.GetNameWithFlag]"
 ARM_reach_out_baltics: "Alcanzar a los Países Bálticos"
 ARM_reach_out_baltics_desc: "Debemos acercarnos a los países bálticos y normalizar nuestras relaciones con ellos, teniendo en cuenta nuestros vínculos históricos."
 ARM_gods_land: "Tierra de Dios"
 ARM_gods_land_desc: "Tierra Santa tiene hoy en día un significado muy grande, no sólo por su importancia religiosa, sino también por la rivalidad geopolítica que allí se da."
 ARM_arm_quart_partnership: "Asociación con el Barrio Armenio"
 ARM_arm_quart_partnership_desc: "La Iglesia Apostólica Armenia es famosa por controlar casi por completo el lugar sagrado de la tumba de Jesús. Además, el barrio armenio de Jerusalén tiene una gran influencia en la ciudad. Deberíamos aprovechar estos factores."
 ARM_recog_palest: "Reconocimiento de Palestina"
 ARM_recog_palest_desc: "Israel ha mostrado tanta animosidad hacia nosotros que ahora comprendemos la lucha por la causa palestina. Debemos reconocer a Palestina para mostrar nuestra postura."
 ARM_support_israel: "Apoyo a Israel"
 ARM_support_israel_desc: "Israel ha mostrado buena voluntad al cooperar con nosotros. Debemos responderle con amabilidad."
 ARM_cont_pal_christians: "Apoyo a los Cristianos Palestinos"
 ARM_cont_pal_christians_desc: "Debemos apoyar a los cristianos palestinos enviándoles ayuda humanitaria y aumentando los vínculos con la Iglesia armenia."
 ARM_relat_in_kurdistan: "Acercamiento al Kurdistán"
 ARM_relat_in_kurdistan_desc: "Puede que nuestras relaciones con los kurdos no hayan estado totalmente exentas de problemas, pero ambos somos víctimas de la opresión turca y, por tanto, debemos unirnos."
 ARM_yazidi_repatriation: "Repatriación de Yazidíes"
 ARM_yazidi_repatriation2: "Repatriación de Yazidíes"
 ARM_accept_yazidis: "Aceptación de Yazidíes"
 ARM_accept_yazidis_desc: "Los yazidíes son una minoría religiosa en Oriente Medio que históricamente mantuvo muy buenas relaciones con los armenios y nunca nos traicionó. Debemos aceptar sus organizaciones en Armenia y fomentar su renacimiento cultural."
 ARM_our_land_their_freedom: "Nuestra Tierra, Su Libertad"
 ARM_our_land_their_freedom_desc: "Debemos aprobar una ley que acepte a los yazidíes como minoría oficial en Armenia y les permita repatriarse plenamente a Armenia, además de darles escaños en el parlamento."
 ARM_yazidis_are_kurds: "Los Yazidíes Son Kurdos"
 ARM_yazidis_are_kurds_desc: "No debemos apoyar a las organizaciones yazidíes, sino más bien invitar a las kurdas a apoyar la identidad kurda entre los yazidíes."
 ARM_support_barzani_ambitions: "Apoyo a las Ambiciones Kurdas"
 ARM_support_barzani_ambitions_desc: "A pesar de que los kurdos pueblan antiguos territorios armenios, debemos apoyarlos contra Turquía."
 ARM_support_nubar_ozanian: "Apoyo a los Armenios en Rojava"
 ARM_support_nubar_ozanian_desc: "Recientemente, los kurdos de Rojava comenzaron su lucha contra los islamistas y los invasores turcos. Debemos apoyar su causa."
 ARM_ministry_of_external_category: "Gobierno de Armenia"
 ARM_ministry_of_external_category_desc: "El £text_icon_armgovern §Ygobierno Armenio§! deberá llevar a cabo diversas §Yacciones de política nacional e internacional§! para sobrevivir, prosperar y expandir su influencia.\n\nLa mecánica de la §Gintegración de nuevos territorios§! requiere que su §Yrégimen político§! tenga §Oreivindicaciones sobre ciertos territorios§!. No todos los territorios están disponibles para la integración de todos los partidos políticos.\n\nLas decisiones relacionadas con la §YDiáspora Armenia§! están disponibles siempre que se tenga la §Yidea nacional§! correspondiente."
 ARM_integration_new_lands: "§YIntegración§! De Nuevos Territorios"
 ARM_new_crusade_israel: "Comienza la §YCruzada§! por el §Y[ISR.GetFlag]Reino de Jerusalén§!"
 ARM_new_crusade_hazbik: "Comienza la §YCruzada§! por el §Y[LEB.GetFlag]Ducado de Antioquía§!"
 ARM_new_crusade_palestine: "Comienza la §YCruzada§! por el §Y[PAL.GetNameWithFlag]§!"
 ARM_italy_reclamation: "Inicie la §GUnificación§! con §Y[ITA.GetNameWithFlag]§!"
 ARM_new_decision_govern_unlock_tt: "£text_icon_armgovern §YGobierno de Armenia§!: §YDesbloqueos§! Nuevas Decisiones"
 integr_stuff_tt: "Esta §YDecisión§! Nos Permitirá §GIntegrar§! Varios §GTerritorios§! si Nuestro £text_icon_armgovern §YRégimen Político§! Nos Lo Permite!\nVigile de cerca el nivel de cumplimiento, ya que algunas regiones podrían rebelarse contra su ocupación."
 ARM_United_States: "Estados Unidos de Armenia"
 ARM_veter_must_rule: "Democracia de la Nación"
 ARM_veter_must_rule_desc: "Los valores occidentales y el enfoque democrático carecen de sentido si ignoramos quiénes son los armenios y cuáles son nuestros intereses nacionales. Los veteranos deben liderar nuestras naciones, incluso si deseamos una verdadera democracia."
 ARM_request_support_us: "Legión Armenia de América"
 ARM_request_support_us_desc: "La Legión Armenia de América es una organización que incluye a armenios que sirvieron en el ejército estadounidense. La Legión busca luchar contra los enemigos del pueblo armenio. También cuenta con pequeños equipos especiales de cinco personas que reciben entrenamiento secreto bajo la dirección de exoficiales de la Infantería de Marina del Ejército estadounidense. Ya hay más de mil combatientes en la Legión Armenia: jóvenes de origen armenio. Debemos apoyar su causa e incluirlos como una rama militar."
 ARM_staunch_western_position: "Espina en el Costado"
 ARM_staunch_western_position_desc: "Para que Armenia sea verdaderamente fuerte e independiente, debemos olvidarnos de la estrecha cooperación con Rusia y centrarnos exclusivamente en los socios occidentales."
 ARM_against_euroscepticism: "En Contra del Euroescepticismo"
 ARM_against_euroscepticism_desc: "Rusia es una amenaza. Esa es la opinión unánime del gobierno residente. Es hora de tomar medidas concretas e involucrarse con la OTAN. Como beneficio adicional, dificultará enormemente los esfuerzos de Turquía por debilitarnos."
 ARM_nato_weapon: "Apoyo Militar de la OTAN"
 ARM_nato_weapon_desc: "Necesitamos urgentemente rearmar nuestro ejército y ahora, como miembros de la OTAN, estamos dispuestos a recurrir a otros miembros de la organización en busca de ayuda para resolver este problema."
 ARM_plant_radicalism: "Occidentalismo Radical"
 ARM_plant_radicalism_desc: "Armenia debería aspirar a la cultura europea y al modelo económico occidental. Este es el ideal que, lamentablemente, se ha alejado de nuestra última frontera de civilización europea."
 ARM_first_war_glorify: "Glorificación de la Primera Guerra de Artsaj"
 ARM_first_war_glorify_desc: "¡Debemos glorificar la guerra en Artsaj para fortalecer nuestros sentimientos nacionales y patrióticos!"
 ARM_fight_for_freedom: "Lucha por la Libertad"
 ARM_fight_for_freedom_desc: "Nuestra lucha no es solo nacionalista en esencia. ¡Luchamos también por los derechos, la libertad y la dignidad!"
 ARM_ecommerce_init: "Iniciativas de Comercio Electrónico"
 ARM_ecommerce_init_desc: "Debemos apoyar el comercio electrónico y la digitalización de las estructuras gubernamentales."
 ARM_fourth_rev_stnd: "Estándares de la 4ª Revolución"
 ARM_fourth_rev_stnd_desc: "Nuestro movimiento es una nueva revolución, una evolución de los valores nacionales y democráticos, que debe establecer nuevos estándares para todos los armenios."
 ARM_new_nuclear_plants: "Nuevas Plantas Nucleares"
 ARM_new_nuclear_plants_desc: "Debemos confiar en la energía nuclear, ya que es la única forma en que nuestro país puede producir más y tener la capacidad de competir en el mercado global."
 ARM_no_more_kgb: "¡Nada de Influencia del KGB!"
 ARM_no_more_kgb_desc: "Los agentes de la KGB llevan demasiado tiempo conspirando contra nuestro país, personificándose en diversas figuras influyentes y activistas políticos. ¡Incluso están en nuestro parlamento! Debemos acabar con esto."
 ARM_ally_ukr_blr: "Alianza con Movimientos Amigos"
 ARM_ally_ukr_blr_desc: "Muchos movimientos en Ucrania y Bielorrusia comparten nuestras ideas. Debemos apoyarlos en nuestra resistencia colectiva contra Rusia."
 ARM_no_more_colony: "¡Nada de Dominio Colonial!"
 ARM_no_more_colony_desc: "¡Rusia nos ha controlado durante demasiado tiempo! ¡Debemos acabar con esta explotación colonialista!"
 ARM_new_sparapet_pavel: "Nuevo Sparapet"
 ARM_new_sparapet_pavel_desc: "¡Pavel Manukyan ha demostrado su valor para ser el Sparapet de nuestro nuevo y poderoso país!"
 ARM_like_sassoun_daredevils: "Como los Audaces de Sasún"
 ARM_like_sassoun_daredevils_desc: "¡Debemos tomar ejemplo de nuestra gloriosa epopeya y unirnos como nación en nuestro espíritu popular!"
 ARM_investig_milit: "Investigar al Ejército"
 ARM_investig_milit_desc: "Hay que investigar a los militares para acabar con toda corrupción."
 ARM_heroes_need_heroes: "Los Héroes Necesitan Héroes"
 ARM_heroes_need_heroes_desc: "¡Los héroes necesitan héroes! Toda nuestra nación, hombres y mujeres, jóvenes y mayores, deben estar listos para luchar por nuestra causa."
 ARM_armenia_zhirayr_idea: "Armenia Proroccidental Radical"
 ARM_zhirayr_veterans_idea: "Veteranos en el Poder"
 ARM_zhirayr_pro_western_position_idea: "Posición Radicalmente Proroccidental"
 ARM_zhirayr_no_russian_idea: "Política Anti-Rusa"
 ARM_zhirayr_in_blr_ukr_idea: "Influencia Armenia"
 ARM_zhirayr_radicalism_idea: "Radicalismo Político"
 ARM_zhirayr_first_armenia_war_idea: "La Gloria de la Primera Guerra"
 ARM_zhirayr_fight_freedom_idea: "La Lucha por la Libertad"
 ARM_zhirayr_heroes_idea: "Los Héroes Necesitan Héroes"
 ARM_zhirayr_e_commerce_idea: "TI Radical"
 ARM_zhirayr_4th_idea: "La Cuarta Revolución"
 ARM_zhirayr_sassoun_idea: "Guerreros de Sasún"
 ARM_armenia_zhirayr_idea_tt: "[ARM_Zhirayr_Sassoun_loc][ARM_Zhirayr_ECommerce_loc][ARM_Zhirayr_Heroes_loc][ARM_Zhirayr_Freedom_loc][ARM_Zhirayr_FirstWar_loc][ARM_Zhirayr_radicalism_loc][ARM_Zhirayr_norussian_loc][ARM_Zhirayr_western_loc][ARM_Zhirayr_veterans_loc]"
