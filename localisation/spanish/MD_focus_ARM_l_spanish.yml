 ARM_Raffi: "§GTriunfo del Patrimonio§!"
 ARM_Raffi_desc: "Patrimonio es un partido político liberal nacional armenio. Fue fundado por Raffi Hovhannisyan, el primer ministro de Asuntos Exteriores de la Armenia independiente."
 ARM_national_liberal_agenda: "Agenda Nacional-Liberal"
 ARM_national_liberal_agenda_desc: "La agenda de nuestro partido debe ser la economía liberal y la preservación del patrimonio nacional. ¡Estos son nuestros pilares para alcanzar la grandeza!"
 ARM_freemrk_freppl: "Más Libre el Mercado - Más Libre la Gente"
 ARM_freemrk_freppl_desc: "Es obvio que debemos dejar de intentar controlar el mercado más allá de lo necesario."
 ARM_armenian_traders_spir: "Espíritu de los Comerciantes Armenios"
 ARM_armenian_traders_spir_desc: "Nuestros pueblos han sido comerciantes exitosos a lo largo de la historia, debemos apoyar esta tradición."
 ARM_protect_armenian_heritage: "Proteger el Patrimonio Armenio"
 ARM_protect_armenian_heritage_desc: "Debemos proteger nuestro patrimonio, nuestra cultura que nos hace quienes y lo que somos."
 ARM_diaspora_connect: "Enlaces de la Diáspora"
 ARM_diaspora_connect_desc: "Debemos utilizar nuestros vínculos con la diáspora para nuestro beneficio gubernamental."
 ARM_part_of_western_civ: "Parte de la Civilización Occidental"
 ARM_part_of_western_civ_desc: "Armenia no es solo un país de Oriente Medio o Europa del Este. Somos parte de la civilización cristiana occidental, que debemos adoptar y emular."
 ARM_befr_church: "Hazte Amigo de la Iglesia Armenia"
 ARM_befr_church_desc: "Debemos apoyar a la Iglesia armenia ya que es uno de los aspectos fundamentales de nuestra cohesión social."
 ARM_liberty_soil_blood: "¡Libertad, Tierra y Sangre!"
 ARM_liberty_soil_blood_desc: "Debemos amar nuestra tierra por la libertad que nos da y respetar toda la sangre que se derramó por la libertad de nuestro pueblo."
 ARM_new_leader_image: "La Nueva Imagen del Líder"
 ARM_new_leader_image_desc: "¡Raffi debe ser el nuevo ícono de un líder honesto, verdadero y popular para Armenia!"
 ARM_anti_corrupt_mass: "Campañas Masivas Contra la Corrupción"
 ARM_anti_corrupt_mass_desc: "Hay que erradicar la corrupción de nuestro país y crear una nueva policía anticorrupción."
 ARM_foster_econ_growth: "Crecimiento Económico Más Rápido"
 ARM_foster_econ_growth_desc: "Debemos ayudar al crecimiento de nuestra economía a toda costa, ya que es la clave para la prosperidad de Armenia."
 ARM_free_full_healthcare: "Atención Médica Completa y Gratuita"
 ARM_free_full_healthcare_desc: "Debemos brindarles a nuestros ciudadanos la mejor atención médica completa y gratuita para cuidar de ellos."
 ARM_anti_braindead: "Esfuerzo Contra la Fuga de Cerebros"
 ARM_anti_braindead_desc: "Debemos luchar contra la fuga de cerebros que está ocurriendo en Armenia tras la caída de la Unión Soviética."
 ARM_us_example: "Ejemplo Americano"
 ARM_us_example_desc: "Estados Unidos es un gran ejemplo de país democrático y capitalista, cuya prosperidad brilla hasta el día de hoy. ¡Debemos construir nuestro país según estos ideales!"
 ARM_elect_reform: "Reforma Electoral"
 ARM_elect_reform_desc: "Debemos hacer que nuestro sistema electoral sea más democrático y garantizar la plena participación."
 ARM_united_states_armenia: "Estados Unidos de Armenia"
 ARM_united_states_armenia_desc: "¡Nuestra inspiración por el sistema estadounidense alcanzará su máximo esplendor! ¡Estamos listos para anunciar la creación de los Estados Unidos de Armenia!"
 ARM_true_air_force: "Fuerza Aérea Real de Armenia"
 ARM_true_air_force_desc: "Tenemos la intención de construir la estructura de nuestra Fuerza Aérea similar a la Fuerza Aérea de Estados Unidos e invertir un presupuesto significativo de nuestro país en su desarrollo."
 ARM_true_national_guard: "Guardia Nacional Real"
 ARM_true_national_guard_desc: "Pretendemos adaptar plenamente la experiencia de la Guardia Nacional de EE. UU. a las realidades del Ejército armenio. Al igual que el prototipo estadounidense, la Guardia Nacional podrá participar en operaciones en otros países, y también se creará la Guardia Nacional de la Fuerza Aérea, lo que permitirá a nuestros pilotos participar también en operaciones en el extranjero."
