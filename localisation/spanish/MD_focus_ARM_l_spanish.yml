 later_good_thing_tt: "Cuando la §YIdea§! de los §RProblemas de Infraestructura en Ereván§! sea §Geliminada§!, ¡Obtendremos §Gmejoras!§!"
 ARM_infr_problems_yerevan: "Problemas de Infraestructura en Ereván"
 ARM_infr_problems_yerevan_desc: "Debido a la reconstrucción del centro de Ereván, surgieron problemas temporales que causaron atascos de tráfico.\n§W------------------§!\nCuando la §YIdea§! sea §Geliminada§!, obtendremos el modificador de estado §Gmejoras§! en Ereván."
 ARM_nor_aven_sec: "Viejo Ereván"
 norav_tt: "Tendremos §YVarias Opciones§! sobre qué hacer con el §YProyecto de la Avenida Norte§!"
 olig_fortyfive_opinion_tt: "¡Opinión de los §YOligarcas§! Debe ser al menos §Y45!§!"
