 POL_AUTH_S_nationalist: "Reino de Polonia"
 ARM_AUTH_STWO_nationalist: "Santo Reino de Armenia"
 ARM_italy_armenian_union: "Propondremos que Italia §Rse Someta a nuestra Voluntad§!"
 ARM_shiza_kavkaz_tt: "§RSeparatismo§! en las Repúblicas: §Y[SOO.GetNameWithFlag]§!, §Y[ADY.GetNameWithFlag]§!, §Y[CHE.GetNameWithFlag]§! §Y[KBK.GetNameWithFlag]§! y §Y[DAG.GetNameWithFlag]§! será §Gaumentado§!"
 ARM_Petrosyan: "§4Rey de la Colina§!"
 ARM_Petrosyan_desc: "Levon Hakobi Ter-Petrosyan, también conocido por sus iniciales LTP, es un político armenio que fue el primer presidente de Armenia. Lideró el movimiento karabajista para la unificación de Nagorno-Karabaj, de población armenia, con Armenia en 1988. Lideró al país durante la Primera Guerra de Nagorno-Karabaj con su vecino Azerbaiyán."
 ARM_deideologization_of_democracy: "Desideologización de la Democracia"
 ARM_deideologization_of_democracy_desc: "Armenia es uno de los pocos países postsoviéticos donde la libertad de expresión, el libre mercado y los derechos humanos se valoran verdaderamente. Nuestro pequeño país montañoso debería convertirse en un bastión de la democracia en la región."
 ARM_crossroad_diplomacy: "Diplomacia Encrucijada"
 ARM_crossroad_diplomacy_desc: "Necesitamos utilizar todas nuestras capacidades diplomáticas regionales para ampliar nuestra esfera de influencia y establecer relaciones normales con todos los países de la región."
 ARM_wipe_out_koch: "Deteniendo a Kocharyan"
 ARM_wipe_out_koch_desc: "Los funcionarios corruptos de Kocharyan deben ser eliminados de las estructuras gubernamentales."
 ARM_desovietize_armenia: "Des-Sovietización de Armenia"
 ARM_desovietize_armenia_desc: "Necesitamos deshacernos del legado soviético en Armenia. El régimen comunista solo le ha dado a Armenia lágrimas, miedo, muerte, dolor y la pérdida de sus territorios nacionales. Es hora de hacerlo."
 ARM_learn_from_cilicia: "Aprenda del Ejemplo de Cilicia"
 ARM_learn_from_cilicia_desc: "Debemos aprender de nuestra historia, especialmente de Cilicia, que fue saqueada debido a las aspiraciones irracionales de un cambio radical de rumbo en la política exterior. No debemos repetir los mismos errores."
 ARM_privatize_land: "Privatizar la Tierra"
 ARM_privatize_land_desc: "Debemos comenzar nuestras reformas económicas tomando las tierras confiscadas ilegalmente a la mafia, a los oligarcas y a los oportunistas y privatizándolas adecuadamente."
 ARM_press_oligs: "Presionando a los Oligarcas"
 ARM_press_oligs_desc: "Debemos garantizar que los oligarcas no tengan más influencia, al menos a nivel municipal, de nuestro gobierno."
 ARM_crush_mafia: "Aplastando a la Mafia"
 ARM_crush_mafia_desc: "Debemos aplastar cualquier forma de actividad criminal en Armenia y castigar a todos los criminales."
 ARM_utilize_wifes_connections: "Utilizando Conexiones"
 ARM_utilize_wifes_connections_desc: "Debemos utilizar las conexiones familiares para intentar normalizar las relaciones con Israel."
 ARM_liberalize_economy: "Liberalizar la Economía"
 ARM_liberalize_economy_desc: "Debemos liberalizar la economía para fomentar un crecimiento económico rápido."
 ARM_socdem_principles: "Principios Sociales"
 ARM_syria_israel_mediation: "Mediación entre Siria e Israel"
 ARM_syria_israel_mediation_desc: "Podemos intentar establecer un proceso de paz entre Israel y Siria para aumentar nuestra esfera de influencia."
 ARM_it_sector: "Desarrollo del Sector de TI"
 ARM_it_sector_desc: "Debemos desarrollar el sector de TI, ya que es la industria de mayor crecimiento en nuestro país."
 ARM_levon_build_roads: "Construyendo las Carreteras"
 ARM_levon_build_roads_desc: "La infraestructura en Armenia está en pésimas condiciones, debemos reparar las carreteras viejas y construir otras nuevas para mejorar la situación."
 ARM_future_looking_strategy: "Estrategia de Futuro"
 ARM_future_looking_strategy_desc: "Debemos seguir una estrategia de política exterior que apunte a la estabilidad a largo plazo en la región."
 ARM_defence_levon_invest: "Inversiones en Defensa"
 ARM_defence_levon_invest_desc: "Debemos invertir en defensa, a pesar de nuestra estrategia de política exterior de buscar la paz en la región."
 arm_levon.1.t: "Armenia Ifrece un Acuerdo"
 arm_levon.1.d: "Si aceptamos el nuevo estatus neutral de Armenia, podremos beneficiarnos de él en cierta medida consiguiendo un centro directo en el Cáucaso y algunos beneficios financieros."
 arm_levon.1.a: "Claro."
 arm_levon.1.b: "No, no nos gusta Armenia."
 arm_levon.2.t: "[FROM.GetNamewithFlag] Aceptado"
 arm_levon.2.d: "[FROM.GetNamewithFlag] acepta reconocer nuestro nuevo estatus neutral."
 arm_levon.2.a: "¡Bueno!"
 arm_levon.3.t: "[FROM.GetNamewithFlag] Aceptado"
 arm_levon.3.d: "[FROM.GetNamewithFlag] acepta reconocer nuestro nuevo estatus neutral."
 arm_levon.3.a: "¡Bueno!"
 arm_levon.4.t: "[FROM.GetNamewithFlag] Aceptado"
 arm_levon.4.d: "[FROM.GetNamewithFlag] acepta reconocer nuestro nuevo estatus neutral."
 arm_levon.4.a: "¡Bueno!"
 arm_levon.5.t: "[FROM.GetNamewithFlag] Aceptado"
 arm_levon.5.d: "[FROM.GetNamewithFlag] acepta reconocer nuestro nuevo estatus neutral."
 arm_levon.5.a: "¡Bueno!"
 arm_levon.6.t: "[FROM.GetNamewithFlag] Aceptado"
 arm_levon.6.d: "[FROM.GetNamewithFlag] acepta reconocer nuestro nuevo estatus neutral."
 arm_levon.6.a: "¡Bueno!"
 arm_levon.7.t: "[FROM.GetNamewithFlag] Aceptado"
 arm_levon.7.d: "[FROM.GetNamewithFlag] acepta reconocer nuestro nuevo estatus neutral."
 arm_levon.7.a: "¡Bueno!"
 arm_levon.8.t: "Misión Fallida."
 arm_levon.8.d: "Desafortunadamente [FROM.GetNamewithFlag] se negó a reconocer nuestro estatus neutral."
 arm_levon.8.a: "Meh."
 arm_levon.9.t: "Armenia Ofrece Cooperación"
 arm_levon.9.d: "Armenia afirma que la cooperación con este país será más favorable que con Azerbaiyán."
 arm_levon.9.a: "Siempre quise probar kebabs armenios."
 arm_levon.9.b: "No."
 arm_levon.10.t: "Israel Cambia su Estrategia en el Cáucaso"
 arm_levon.10.d: "Conseguimos persuadir a Israel para que empezara a cooperar con nosotros."
 arm_levon.10.a: "¡Bueno!"
 arm_levon.11.t: "Israel Ignora Nuestra Oferta"
 arm_levon.11.d: "Desafortunadamente, el aceite de Bakú huele mejor que el pan pita armenio."
 arm_levon.11.a: "Meh."
 arm_levon.12.t: "[FROM.GetNamewithFlag] Propone una Solución Pacífica de las Relaciones"
 arm_levon.12.d: "[FROM.GetNamewithFlag] propone la creación de una red de seguridad unificada entre nuestros países para prevenir futuros conflictos."
 arm_levon.12.a: "Estamos de Acuerdo."
 arm_levon.12.b: "No."
 arm_levon.13.t: "Negociaciones Exitosas"
 arm_levon.13.d: "En la reciente reunión pudimos llegar a una decisión común: se creará un nuevo cinturón de seguridad."
 arm_levon.13.a: "¡Bueno!"
 arm_levon.14.t: "Negociaciones Exitosas"
 arm_levon.14.d: "En la reciente reunión pudimos llegar a una decisión común: se creará un nuevo cinturón de seguridad."
 arm_levon.14.a: "¡Bueno!"
 arm_levon.15.t: "Negociaciones Exitosas"
 arm_levon.15.d: "En la reciente reunión pudimos llegar a una decisión común: se creará un nuevo cinturón de seguridad."
 arm_levon.15.a: "¡Bueno!"
 arm_levon.16.t: "Negociaciones Fracasaron"
 arm_levon.16.d: "Lamentablemente, no hemos podido convencer a Israel y Siria de establecer una red de seguridad común, por lo que sólo podemos esperar que la próxima guerra entre ellos no llegue muy pronto."
 arm_levon.16.a: "¡Mal!"
