 ARM_armenian_mafia_6_desc: "Después del colapso de la Unión Soviética, debido a la incapacidad del Estado para hacer frente a los problemas internos, surgió en Armenia el problema del crimen organizado, que, cooperando con los oligarcas y a menudo siendo parte de la oligarquía, afectó negativamente la situación socioeconómica armenia."
 ARM_armenian_mafia_5_desc: "Después del colapso de la Unión Soviética, debido a la incapacidad del Estado para hacer frente a los problemas internos, surgió en Armenia el problema del crimen organizado, que, cooperando con los oligarcas y a menudo siendo parte de la oligarquía, afectó negativamente la situación socioeconómica armenia."
 ARM_armenian_mafia_4_desc: "Después del colapso de la Unión Soviética, debido a la incapacidad del Estado para hacer frente a los problemas internos, surgió en Armenia el problema del crimen organizado, que, cooperando con los oligarcas y a menudo siendo parte de la oligarquía, afectó negativamente la situación socioeconómica armenia."
