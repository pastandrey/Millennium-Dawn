 ARM_armenian_mafia_2_desc: "Después del colapso de la Unión Soviética, debido a la incapacidad del Estado para hacer frente a los problemas internos, surgió en Armenia el problema del crimen organizado, que, cooperando con los oligarcas y a menudo siendo parte de la oligarquía, afectó negativamente la situación socioeconómica armenia."
 armenian_perseverance: "Perseverancia armenia"
 armenian_perseverance_desc: "Muchas civilizaciones han surgido y desaparecido en los últimos tres milenios. A diferencia de sus antiguos aliados y enemigos, los armenios aún perduran. Aunque la Armenia histórica quizá nunca regrese, la voluntad de prosperar y mantenerse firme es más fuerte que nunca."
 NKR_marz_arm: "De-Facto Marz de [ARM.GetNamewithFlag]"
 NKR_marz_tt: "\n§Y Gasto adicional: $$§R0.350§!§! para Impuestos [ARM.GetFlag]§YArmenios§!\n"
 ARM_echoes_1999: "Ecos de 1999 - §9Oposición Unificada§!"
 ARM_echoes_1999_desc: "Las secuelas del tiroteo parlamentario de 1999 todavía conmueven a la población y obligan a las facciones de la oposición a protestar contra Kocharyan."
 ARM_echoes_1999_pac: "Ecos de 1999 - §YNacionalistas Purgados de la Coalición§!"
 ARM_echoes_1999_pac_desc: "Las secuelas del tiroteo parlamentario de 1999 todavía conmueven a la población y obligan a las facciones de la oposición a protestar contra Kocharyan."
 ARM_changes_in_militar: "Cambios en el ejército"
 ARM_broken_economy: "Eco económico de los años 90"
 ARM_broken_economy_desc: "La Economía Armenia está en profundo declive y debemos tomar medidas para intentar mejorarla, a pesar de tener un fuerte oligarcado a cargo.\n\n§GEsta idea§! será §Geliminada§! si aumentamos nuestro §YPIB/c§! en §Y20k§!"
 ARM_diaspora_links: "Enlaces de la diáspora"
 ARM_diaspora_links_desc: "La Diáspora Armenia en todo el mundo tiene conexiones importantes y puede ayudarnos a construir relaciones o influir en otros países.\n\nEsta §Yidea§! nos da acceso a un panel de §Gdecisiones relacionadas con la diáspora§!."
 ARM_rural_water_issues: "Problema del abastecimiento de agua rural"
 ARM_rural_water_issues_desc: "Tras el colapso de la URSS, Armenia comenzó a tener problemas con la infraestructura de riego para los cultivos agrícolas. A pesar de que la agricultura representa una parte importante de la economía armenia, estos problemas aún no se han resuelto."
 ARM_102st_base: "[SOV.GetNamewithFlag] 102.ª Base Militar"
 ARM_102st_base_desc: "La 102.ª Base Militar Rusa es una base militar rusa en Gyumri, Armenia, bajo el mando del Distrito Militar Sur de las Fuerzas Armadas Rusas.\n\n§YEsta idea será eliminada si [SOV.GetNamewithFlag] ya no tiene acceso militar a nuestra tierra.§!"
 ARM_echoes_of_1999: "Ecos de 1999"
 ARM_echoes_of_1999_desc: "Armenia se encuentra en una encrucijada política y está cosechando los frutos del ataque terrorista de 1999. ¿Qué significa el ascenso de Robert Kocharyan para Armenia?"
 ARM_agree_on_places: "Acuerdos sobre lugares"
 ARM_high_emigration_0: "Emigración muy pequeña"
 ARM_high_emigration_0_desc: "Con el colapso de la URSS y el deterioro de la situación económica, muchos países de la CEI se vieron afectados por una creciente migración externa. En la realidad actual, Armenia está en peligro de extinción, algo que no puede decirse de su vecino oriental y principal enemigo político. La solución del problema demográfico debería convertirse en la agenda principal de la política armenia.\n§W------------------§!\nEsta idea nacional se §GReducido§! si nuestro §HPIB§! supera los §H$100 mil millones§! y logramos al menos un §H64% de estabilidad§!\n§W------------------§!"
 ARM_immigration_desc: "Los armenios de todo el mundo están regresando sistemáticamente a su patria histórica y son repatriados en masa como ciudadanos de pleno derecho."
 ARM_russia_debt_wait: "[SOV.GetNamewithFlag] Acuerdo de §WAplazamiento§! de Deuda"
 ARM_russia_debt_wait_desc: "[ARM.GetNamewithFlag] es el único país cuya deuda no fue asumida ni condonada por [SOV.GetNamewithFlag]. Independientemente de si se trató de una decisión política o pragmática, nos dieron un plazo para cerrar el asunto."
 ARM_official_investigation: "Iniciar una investigación oficial"
 ARM_official_investigation_desc: "Para calmar a la oposición y a la comunidad internacional, debemos iniciar una investigación oficial del ataque terrorista de 1999."
 ARM_pacify_yerkrapah: "Pacificando Yerkrapah"
 ARM_pacify_yerkrapah_desc: "La organización militar Yerkrapah tiene demasiada influencia en Armenia para nuestro gobierno... Está compuesta principalmente por partidarios nacionalistas de Vazgen Sargsyan. Debemos expulsarlos del mando militar."
 ARM_meet_putin: "Reunión con Putin"
 ARM_meet_putin_desc: "Tal vez podamos convencer a Rusia de invertir en nuestra economía y crear un espíritu de confianza para el futuro acuerdo sobre la deuda."
 ARM_northern_avenue_project: "Proyecto Avenida Norte"
 ARM_northern_avenue_project_desc: "Avenida del Norte es un proyecto propuesto para el centro de Ereván en el que se reconstruirán las calles eliminando viejos edificios históricos y construyendo otros nuevos y modernos."
 ARM_property_for_debt: "Acuerdo de propiedad por deuda"
 ARM_property_for_debt_desc: "Armenia es el único país cuya deuda no fue condonada por Rusia tras la caída de la URSS. Sin embargo, quizá podamos llegar a un acuerdo entregando propiedades en lugar de dinero."
 ARM_person_business: "Empresas comerciales personales"
 ARM_person_business_desc: "Aunque podría dañar nuestro ciclo económico, podemos obtener algunos beneficios de los negocios personales de Kocharyan."
 ARM_caucasian_tiger: "Tigre caucásico"
 ARM_caucasian_tiger_desc: "Debido al desmesurado sector de la construcción, Armenia ahora tiene el mayor crecimiento del PIB de la región. Debemos afrontar esta situación."
 ARM_silence_hun: "Silenciar Hunanyan"
 ARM_silence_hun_desc: "Hunanyan podría aportar algo de luz a la oposición. No debemos permitirlo."
 ARM_constitutional_changes: "Cambios constitucionales"
 ARM_constitutional_changes_desc: "Para acabar con cualquier esperanza de que la oposición detenga nuestro gobierno, debemos hacer cambios a la constitución y aplastar las protestas."
 ARM_hi_rob: "¡Hola, Rob!"
 ARM_hi_rob_desc: "Poghos Poghosyan, del partido Dashnakcutyun, ha sido un problema desde hace tiempo para Kocharyan. Era un viejo amigo suyo, y los viejos vínculos ahora son demasiado arriesgados para nosotros."
 ARM_union_state_proposal: "Propuesta del Estado de la Unión"
 ARM_union_state_proposal_desc: "Finalmente, podemos intentar unirnos al proyecto de estado de unión para nuestra prosperidad futura."
 ARM_suppressed_oppos: "Oposición reprimida"
 ARM_cauc_tigr: "Tigre caucásico"
 ARM_autocratic_grip: "Poder autocrático"
 ARM_armenia_kocharyan_idea: "La Armenia de Kocharyan"
 arm_opposition_backlash_ticker_mission: "Reacción de la oposición"
 arm_opposition_backlash_ticker_mission_desc: "La [ARM.GetFlag] §YApoposición Armenia§! se preparará para realizar manifestaciones y obligar al gobierno £ARM_Conservative §YKocharyan§! a ceder y celebrar elecciones justas. Necesitamos retrasar este momento y, preferiblemente, evitar las manifestaciones por completo, o estar seguros de que la oposición perderá."
 ARM_first_wave_of_assasinat: "Comienza la §YPrimera Ola§! de §YAsesinatos Políticos§!"
 ARM_second_wave_of_assasinat: "Comienza la §9Segunda ola§! de §YAsesinatos Políticos§!"
 first_assasinat_done: "§YPrimera ola de asesinatos completada§!"
 second_assasinat_done: "§YSegunda ola de asesinatos completada§!"
 ARM_armenia_kocharyan_idea_tt: "[ARM_Kocharyan_People_loc][ARM_Kocharyan_Tiger_loc][ARM_Kocharyan_Autocratic_loc][ARM_Kocharyan_Opposition_loc]"
 ARM_Kocharyan_People_loc1: "\n§gNUESTRA GENTE EN LUGARES§!:\n£corruption_cost_factor_texticon Poder Político Costo para cambiar la corrupción: §R+30.00%§!\n£political_power_texticon Ganancia de Poder Político: §G+30.00%§!\n"
 ARM_Kocharyan_Tiger_loc1: "\n§gTIGRE CAUCÁSICO§!:\n£econ_cycle_upg_cost_multiplier_modifier_texticon §YCosto de Tesorería de Mejora del Ciclo Económico§! Multiplicador: §G-10.00%§!\n£construction_speed_texticon Velocidad de Construcción Local: §G+10.00%§!\n"
 ARM_Kocharyan_Autocratic_loc1: "\n§gPODER AUTOCRÁTICO§!:\n£construction_speed_texticon Velocidad de Construcción Local: §G+10.00%§!\n£political_power_texticon Ganancia de Poder Político: §G+5.00%§!\n£interest_rate_multiplier_modifier_texticon §YTasa de interés§!: §G-2§!\n£emerging_outlook_campaign_cost_modifier_texticon Soporte emergente diario: §G+0.06§!"
 ARM_Sargsyan: "§YSerzh Sargsyan§!"
 ARM_Sargsyan_desc: "Desde 1988, Serzh Sargsyan ha sido uno de los líderes del \"Movimiento Karabaj\", cuyo objetivo era la defensa de Nagorno-Karabaj por parte de Armenia. Gracias a sus sólidas conexiones en el ámbito militar y político armenio, se convirtió en el candidato ideal para la presidencia después de Kocharyan."
 ARM_appoint_tigran: "Nombrar a Tigran"
 ARM_appoint_tigran_desc: "Deberíamos nombrar a Tigran Sargsyan como jefe del banco central de Armenia para posibles reformas futuras."
 ARM_clear_out_nats: "Limpiar a los partidarios de Andranik Margaryan"
 ARM_clear_out_nats_desc: "Hay que reprimir a Andranik Margaryan y a su ala nacionalista del partido, son demasiado desleales y peligrosos para tolerarlos en nuestro partido."
 ARM_spheres_of_influence_sep: "Esferas de influencia separadas"
 ARM_spheres_of_influence_sep_desc: "El gobierno anterior nos dio luz verde para gobernar este país, por lo tanto debemos respetar sus negocios."
 ARM_befriend_oligs: "Haciendo amistad con los oligarcas"
 ARM_befriend_oligs_desc: "Tal vez deberíamos establecer conexiones con los oligarcas y escuchar los tratos que podrían ofrecernos..."
 ARM_patriotic_educ: "Educación Juvenil Patriótica"
 ARM_patriotic_educ_desc: "Debemos educar a nuestra juventud en el espíritu patriota. Nuestro partido, incluso antes de asumir el liderazgo, tuvo mucho éxito en esto y, por lo tanto, debemos continuar esta tradición."
 ARM_ensure_milit: "Garantizar el apoyo militar"
 ARM_ensure_milit_desc: "Debemos garantizar que los militares ocupen uno de los puestos más importantes en nuestro gobierno y sociedad."
 ARM_priorit_loy_gener: "Priorizar a los generales leales"
 ARM_priorit_loy_gener_desc: "Debemos priorizar a los generales que nos son leales y establecen conexiones políticas."
 ARM_new_gov_builds: "Nuevos edificios gubernamentales"
 ARM_new_gov_builds_desc: "Debido a nuestras buenas conexiones con la oligarquía, tal vez podamos llegar a un buen acuerdo con ellos para construir nuevas instalaciones para nuestro gobierno."
 ARM_navasard_legacy_sup: "El legado de Navasardyan"
 ARM_navasard_legacy_sup_desc: "Aunque hemos suprimido a la vieja guardia del partido republicano, utilizar sus métodos y su legado podría ser muy útil para el futuro de nuestro país."
 ARM_cronies_elevated: "Elevando a los compinches"
 ARM_cronies_elevated_desc: "Debemos cambiar nuestras prioridades en la educación, manteniendo las ideas centrales."
 ARM_support_monopolies: "Monopolios apoyados"
 ARM_support_monopolies_desc: "Debemos mantener nuestro sistema de monopolio para mantener nuestra influencia en el estado."
 ARM_hovik_guidelines: "Directrices de Hovik"
 ARM_hovik_guidelines_desc: "El primer ministro Hovik Abrahamyan instruyó al Ministerio de Economía para que desarrollara directrices para la importación de diez productos esenciales al mercado en el plazo de un mes. Estos incluían azúcar, harina, trigo, aceite, arroz, trigo sarraceno, mantequilla, margarina, plátanos, naranjas, alimentos infantiles, aves de corral, medicamentos, diésel y gasolina. Señaló que, si bien estos mercados no están formalmente monopolizados, la población los percibe como tales."
 ARM_mandatory_pension_system: "Sistema Obligatorio de Pensiones Acumulativas"
 ARM_mandatory_pension_system_desc: "Es necesario llevar a cabo una reforma previsional que mejore la vida de nuestros pensionistas"
 ARM_patronize_nats: "Nacionalistas condescendientes"
 ARM_patronize_nats_desc: "El Partido Republicano apoya los movimientos nacionalistas del país de múltiples maneras."
 ARM_footbal_diplo: "Diplomacia del fútbol"
 ARM_footbal_diplo_desc: "“Diplomacia del fútbol” en las relaciones entre Armenia y Turquía comenzó el 6 de septiembre de 2008, cuando el presidente turco Abdullah Gul llegó a Ereván por invitación del presidente armenio Serge Sarkisian para presenciar conjuntamente un partido de fútbol entre las selecciones nacionales de ambos países, correspondiente a la fase clasificatoria para el Mundial de 2010. Tras el partido, el líder turco invitó a su homólogo armenio a asistir al partido de vuelta en Turquía el 14 de octubre de 2009. El 10 de octubre de 2009, se firmaron protocolos bilaterales en Zúrich con el apoyo de políticos de alto rango y líderes mundiales. Cuatro días después, en Bursa, los presidentes de Turquía y Armenia asistieron al partido de la selección nacional. Sin embargo, el 22 de abril de 2010, Sarkisian suspendió la ratificación de los documentos firmados en Zúrich mediante decreto, alegando que Turquía no estaba preparada para continuar el proceso iniciado."
 ARM_visit_to_russia: "Visita de Estado a Rusia"
 ARM_visit_to_russia_desc: "Serzh Sargsyan viajará a Rusia para negociar el acercamiento de Armenia a la UE"
 ARM_approach_eu_serzh: "Enfoque Unión Europea"
 ARM_approach_eu_serzh_desc: "El Día Europeo es un evento emblemático en nuestro país, gracias al cual tenemos más oportunidades de acercarnos a la UE."
 ARM_serzh_free_speech: "Libertad de expresión para el apoyo de la UE"
 ARM_serzh_free_speech_desc: "Si bien no queremos ampliar la oposición, necesitamos dar algunos derechos a la población para ampliar las oportunidades económicas."
 ARM_ss_army: "Ejército de las S.S."
 ARM_ss_army_desc: "¡Somos el ejército de Serge Sargsyan, lo seguiremos hasta los confines de la tierra!"
 arm_sargsyan.1.t: "¡Encuentro en Armenia Después de un partido de Fútbol!"
 arm_sargsyan.1.d: "Tras ver el partido de fútbol entre Armenia y Turquía, los líderes de ambos países discuten diversos asuntos. Armenia propone firmar un acuerdo bilateral de cooperación para el desarrollo mutuamente beneficioso de nuestras economías y la normalización de las relaciones."
 arm_sargsyan.1.a: "Si"
 arm_sargsyan.1.b: "No"
 arm_sargsyan.2.t: "Se firmó un acuerdo de Cooperación entre Armenia y Turquía"
 arm_sargsyan.2.d: "Turquía acordó firmar un acuerdo de cooperación bilateral"
 arm_sargsyan.2.a: "Bueno"
 arm_sargsyan.3.t: "Turquía se negó"
 arm_sargsyan.3.d: "Nuestros esfuerzos por mejorar las relaciones no han tenido eco en la otra parte."
 arm_sargsyan.3.a: "Vale"
 arm_sargsyan.4.t: "Sargsyan visita Moscú"
 arm_sargsyan.4.d: "Sargsyan nos pide que permitamos que Armenia se acerque a los países de la UE. Argumenta que esto no supondrá una ruptura de relaciones con nosotros."
 arm_sargsyan.4.a: "Estamos de acuerdo"
 arm_sargsyan.4.b: "Armenia No Puede Abandonarnos Por la UE"
 arm_sargsyan.4.c: "Podemos Ofrecerles Una Asociación Económica Más Estrecha"
 arm_sargsyan.5.t: "Rusia Exige Que Abandonemos Nuestros Objetivos De Acercamiento a la UE"
 arm_sargsyan.5.d: "Rusia se opone categóricamente a cualquier acercamiento entre nosotros y la UE, y por eso nos amenaza con sanciones económicas si intentamos acercarnos."
 arm_sargsyan.5.a: "Mantendremos nuestras opiniones"
 arm_sargsyan.5.b: "Aceptamos las demandas"
 arm_sargsyan.6.t: "Armenia No Teme a Nuestras Amenazas"
 arm_sargsyan.6.d: "Nuestras amenazas no han asustado a los dirigentes armenios, ¿deberíamos imponer las sanciones prometidas?"
 arm_sargsyan.6.a: "Ya Los Advertimos"
 arm_sargsyan.6.b: "Quizás La Próxima Vez Podamos Llegar a Un Acuerdo"
 arm_sargsyan.7.t: "Rusia Ofrece Un Trato"
 arm_sargsyan.7.d: "Si renunciamos a nuestros planes de acercamiento a la UE, recibiremos ayuda económica a cambio. Pero si incumplimos la oferta, habrá consecuencias."
 arm_sargsyan.7.a: "Trato"
 arm_sargsyan.7.b: "Rechazamos Esta Oferta"
 arm_sargsyan.8.t: "Rusia Acepta"
 arm_sargsyan.8.d: "Rusia acepta nuestro acercamiento a la Unión Europea"
 arm_sargsyan.8.a: "Perfecto"
 arm_sargsyan.9.t: "Armenia Retrocede"
 arm_sargsyan.9.d: "Armenia decide no contradecirnos y acepta nuestras demandas"
 arm_sargsyan.9.a: "Bueno"
 arm_sargsyan.10.t: "Rusia Retrocede"
 arm_sargsyan.10.d: "Rusia ha decidido dar marcha atrás con sus amenazas y permitirnos, silenciosamente, poner en práctica nuestros objetivos."
 arm_sargsyan.10.a: "Perfecto"
 arm_sargsyan.11.t: "Armenia Rechaza El Trato"
 arm_sargsyan.11.d: "A pesar de nuestros intentos de ofrecerles una propuesta económica favorable, ésta fue rechazada."
 arm_sargsyan.11.a: "Mal"
 arm_sargsyan.12.t: "Día Europeo En Armenia"
 arm_sargsyan.12.d: "La Delegación de la UE en Armenia celebrará actos festivos en Ereván y en diferentes regiones del país, así como reuniones informativas, exposiciones y conciertos dedicados a las actividades de la UE en Armenia."
 arm_sargsyan.12.a: "Es Una Buena Idea"
 arm_sargsyan.12.b: "No"
 arm_sargsyan.13.t: "La UE Nos Apoyó"
 arm_sargsyan.13.d: "Los principales países de la UE han acordado apoyar nuestra iniciativa europea"
 arm_sargsyan.13.a: "Hacia El Futuro Con Europa"
 arm_sargsyan.14.t: "La UE Se Negó a Apoyarnos"
 arm_sargsyan.14.d: "Los países de la UE ignoraron nuestro evento y no nos apoyaron"
 arm_sargsyan.14.a: "Vale"
 arme.12.b: "Lo siento, no"
