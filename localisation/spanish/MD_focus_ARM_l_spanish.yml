 ARM_vazgen_academy: "Universidad Militar Vazgen Sargsyan"
 ARM_vazgen_academy_desc: "La Universidad Militar Vazgen Sargsyan es una institución de educación superior que opera en el sistema del Ministerio de Defensa de Armenia. Su misión es preparar y entrenar oficiales capaces de implementar tareas de defensa en tiempos de paz y de guerra."
 ARM_inner_troops: "Tropas Internas"
 ARM_inner_troops_desc: "Además de las tropas principales y los guardias fronterizos, debemos crear tropas internas del país para crear un orden completo en su interior y mantener reservas."
 ARM_institute_mo_ra: "Universidad de Aviación Militar"
 ARM_institute_mo_ra_desc: "La Universidad de Aviación Militar Armenak Khanperyants es una institución de educación superior de la Fuerza Aérea de Armenia que funciona bajo el Ministerio de Defensa de Armenia."
 ARM_pvo_troops: "Fuerza de Defensa Aérea"
 ARM_pvo_troops_desc: "Debemos tomar en consideración la creación de fuerzas de defensa aérea para garantizar la seguridad de nuestros cielos."
 ARM_intern_cooperat: "Cooperación Internacional"
 ARM_intern_cooperat_desc: "Para desarrollar nuestras fuerzas armadas y mejorar la profesionalidad de nuestros oficiales, necesitamos interactuar con países amigos alrededor del mundo."
 ARM_peace_brigade: "Brigada de Mantenimiento de la Paz"
 ARM_peace_brigade_desc: "Para obtener y adoptar la experiencia extranjera en la conducción de la guerra, necesitamos desarrollar nuestras tropas de paz para enviarlas en misiones militares y humanitarias."
 ARM_air_fedence_force: "Entrenamientos Aéreos Sistematizados"
 ARM_air_fedence_force_desc: "Nuestra aviación no cuenta con un programa sistemático de formación de pilotos, y los manuales no se han actualizado desde la época soviética. Deberíamos unificar las academias de aviación e implementar un programa de formación sistemático."
 ARM_davisur_arm: "Davisur"
 ARM_davisur_arm_desc: "Una de las fábricas de costura de Ereván se puede transformar en una empresa de pleno derecho que producirá uniformes estandarizados con un nuevo camuflaje pixelado, que podemos copiar de Canadá o Estados Unidos."
 ARM_aspar_arms_desc: "Aspar Arms es una empresa dedicada a la exportación e importación de armas a la República de Armenia. Recientemente, han comenzado a desarrollar prototipos prometedores de sus propios modelos de armas pequeñas. Deberíamos otorgarles una licencia de fabricación y apoyar su fábrica."
 ARM_k3_prototype: "Prototipos de Fusiles K-3"
 ARM_k3_prototype_desc: "La empresa armenia Garni-Ler fabrica armas artesanales en Armenia desde los años 90. Deberíamos modernizar sus viejos prototipos y subvencionar su empresa."
 ARM_uav_krunk: "Krunk UAV"
 ARM_uav_krunk_desc: "Krunk es un vehículo aéreo no tripulado armenio en servicio en las Fuerzas Armadas de Armenia. Está diseñado para reconocimiento cercano, transmitiendo datos de video en tiempo real (visuales o infrarrojos) o tomando imágenes fijas de alta resolución."
 ARM_sso: "Fuerzas de Operaciones Especiales"
 ARM_sso_desc: "Es hora de modernizar nuestras fuerzas de operaciones especiales basándonos en nuestros desarrollos y experiencia militar."
 ARM_new_army: "El Nuevo Ejército Armenio"
 ARM_new_army_desc: "¡El ejército armenio está entrando en una nueva era de modernización y evolución, dejando sus problemas en el pasado!"
 ARM_militia: "Crear una Milicia Popular"
 ARM_militia_desc: "Armenia cuenta con una ley desde la década de 1990 que legaliza la creación de milicias paramilitares civiles no estatales y su integración en las fuerzas armadas en caso de conflicto. Es hora de que esta ley entre en vigor."
 ARM_national_guard: "Crear una Guardia Nacional"
 ARM_national_guard_desc: "Tal vez deberíamos considerar la opción de crear una guardia nacional de Armenia, que sería directamente responsable de mantener el orden en Armenia y estaría estrechamente vinculada al Ministerio del Interior."
 ARM_vdv: "Crear Fuerza Aerotransportada"
 ARM_vdv_desc: "La doctrina militar soviética preveía una importante diversidad de ramas de las fuerzas armadas. Deberíamos adoptar una estrategia similar mediante la creación de unidades aerotransportadas plenamente desarrolladas."
 ARM_morpehi: "Crear el Cuerpo de Marines"
 ARM_morpehi_desc: "Además del acceso al mar, también deberíamos tener en cuenta la experiencia de otros países y crear unidades marinas."
 ARM_fleet: "Crear la Armada"
 ARM_fleet_desc: "¡Un mar de victorias ha envuelto nuestra tierra! Desde los tiempos de la Armenia de Cilicia, por fin tenemos acceso al mar. Vale la pena empezar a crear nuestra nueva flota."
 ARM_N2_arms: ""
 ARM_n2: "N-2"
 ARM_n2_desc: "El N-2 es un proyecto armenio de lanzacohetes múltiple de la Asociación de Producción Científica Garni-Ler. Podemos aprobar su proyecto para iniciar la fabricación de dicho lanzacohetes."
 ARM_Lusan_arms: "Lusan"
 ARM_lusan: "Lusan"
 ARM_lusan_desc: "La fábrica de máquinas herramienta de Charentsavan busca financiación para iniciar la producción a gran escala de los vehículos militares LUSAN. Quizás deberíamos considerar invertir en ella."
 ARM_mortars_prod: "Producción de Morteros"
 ARM_mortars_prod_desc: "Los morteros son bastante fáciles de producir y no requieren mucho equipo técnico. Deberíamos investigarlo."
 ARM_hayk_car: "Prototipo de Coche Hayk"
 ARM_hayk_car_desc: "El vehículo de combate Hayk es un prototipo creado bajo la supervisión de la diseñadora Karen Gevorkyan. Si bien no es el tipo de transporte militar más eficaz, es nuestro desarrollo innovador y fiable, que merece nuestro apoyo."
 ARM_rockets_modern: "Modernización de Cohetes"
 ARM_rockets_modern_desc: "Considerando nuestras capacidades técnicas, podemos intentar modernizar los viejos cohetes soviéticos y rusos."
 ARM_mlrs_proto: "Prototipos MLRS"
 ARM_mlrs_proto_desc: "Garni-Ler ha propuesto la creación de prototipos de MLR. Debemos apoyar sus esfuerzos en ese sentido."
 ARM_our_own_armor: "Producción de Armaduras Cerámicas"
 ARM_our_own_armor_desc: "Además de las placas de acero fabricadas por Davisur, podemos iniciar la producción de placas de blindaje de cerámica copiando los diseños comerciales disponibles."
 ARM_radars_arm: "Radares Armenios"
 ARM_radars_arm_desc: "Para garantizar nuestra confianza en la capacidad de detectar con precisión aviones enemigos sobre nuestro suelo, debemos invertir en la construcción de radares militares."
 ARM_night_vis_arm: "Implementación de la Visión Nocturna"
 ARM_night_vis_arm_desc: "Si nuestra situación económica nos lo permite, podemos empezar a implementar miras y gafas de visión nocturna en nuestras fuerzas armadas."
 ARM_new_unif_proj: "Proyecto Nuevo Uniforme"
 ARM_new_unif_proj_desac: "Teniendo en cuenta la experiencia extranjera, debemos comenzar a desarrollar un nuevo uniforme de camuflaje."
 ARM_voma_center: "Centro VOMA"
 ARM_voma_center_desc: "VOMA (literalmente, Arte de Supervivencia) es una organización no gubernamental armenia, creada por un grupo de militares profesionales y veteranos que anunciaron su propósito de desarrollar una sociedad capaz de defenderse en una guerra."
 ARM_warfare_analysis_center: "Centro de Análisis de Guerra"
 ARM_warfare_analysis_center_desc: "Coordinación de nuestras fuerzas armadas, reevaluación de la experiencia de combate, análisis de las operaciones de combate modernas. Todo esto debe unificarse en un solo cuerpo de las fuerzas armadas, que será este centro."
 ARM_reform_army: "Ejército Reformado"
 ARM_reform_army_desc: "Nuestro ejército necesita una reforma para estar preparado para repeler los ataques enemigos a nuestro país. La estrategia defensiva es la base de nuestra política militar."
 ARM_swiss_model_desc: "Comenzaremos a reformar nuestro ejército según el modelo suizo, con el fin de optimizar nuestras fuerzas armadas según sea necesario."
 ARM_fortress: "Defensa de la Montaña"
 ARM_fortress_desc: "Convertiremos nuestro país en una verdadera fortaleza, la táctica defensiva de Suiza será nuestra base."
 ARM_territorial_defence: "Defensa Territorial"
 ARM_territorial_defence_desc: "Pretendemos crear una defensa territorial para protección adicional de nuestro estado."
 ARM_soviet_army: "Ejército Soviético"
 ARM_soviet_army_desc: "En nuestra opinión, el ejército soviético era el estandarte de las fuerzas armadas. Pretendemos crear nuevas ramas de las fuerzas armadas que satisfagan nuestras necesidades logísticas."
 ARM_engineer_troops: "Tropas de Ingeniería"
 ARM_engineer_troops_desc: "Fuerzas especiales de las Fuerzas Armadas destinadas al apoyo de ingeniería: equipamiento del territorio de operaciones militares (de combate), reconocimiento de ingeniería y escolta de tropas (fuerzas) en la ofensiva, etc."
 ARM_radio_troops: "Tropas de Radio"
 ARM_radio_troops_desc: "Fuerzas Especiales destinadas al despliegue y operación de sistemas de comunicación con el fin de asegurar el control de las tropas y fuerzas subordinadas al Ministerio de Defensa en todas sus actividades."
 ARM_railway_troops: "Tropas Ferroviarias"
 ARM_railway_troops_desc: "Los ferrocarriles estaban destinados al apoyo ferroviario de las Fuerzas Armadas. Las tropas ferroviarias incluían órganos de gestión, formaciones, unidades, instituciones y empresas."
 ARM_border_troops_desc: "Tropas destinadas a proteger y defender la frontera estatal, prevenir y reprimir las invasiones a la soberanía y la integridad territorial."
 ARM_nationalist_army: "Ejército Nacional"
 ARM_nationalist_army_desc: "¡Nuestro país necesita un ejército nacional fuerte! Que se creará con base en una doctrina militar única."
 ARM_nationalists_in_army: "Reclutamiento de Radicales en el Ejército"
 ARM_nationalists_in_army_desc: "Tenemos la intención de contar con la ayuda de elementos nacionalistas radicales, a pesar del desorden que puedan causar, ellos elevarán moral e ideológicamente"
 ARM_univeristy_army: "Nuevas Universidades Militares"
 ARM_univeristy_army_desc: "Tenemos la intención de construir nuevas universidades militares para mejorar la calidad de la educación militar en el país."
 ARM_polk_dziavory: "Dzhiavory"
 ARM_polk_dziavory_desc: "Los Dzhiavors (Caballería Armenia), caballeros de Cilicia o Caballeros Armenios, son caballeros cruzados de la Armenia de Cilicia. Tenemos la intención de reorganizar la Compañía de la Guardia de Honor como una unidad de combate de nuestro ejército."
 ARM_102: "Unidad 102"
 ARM_102_desc: "La Unidad 102 es una unidad especial del ejército armenio, entrenada y reunida a partir de varios grupos armenios de todo el mundo para cometer diversos actos de acción contra países enemigos."
 ARM_ar15_west_contr: "Contrato para la Oroducción de Patrones de RA"
 ARM_ar15_west_contr_desc: "Los rifles estadounidenses más nuevos son la mejor opción para nuestra futura producción. Podremos producirlos tal como están, pero también aplicarles ingeniería inversa para nuestro propio beneficio."
 ARM_ak12_rus_contr: "Licencia de Producción de Rifles Modelo AK"
 ARM_ak12_rus_contr_desc: "Los rifles rusos más nuevos son la mejor opción para nuestra futura producción. Podremos producirlos tal cual, pero también aplicarles ingeniería inversa para nuestro propio beneficio."
 ARM_orsis_dilemma: "Dilema de Orsis"
 ARM_orsis_dilemma_desc: "Orsis ha mostrado interés en invertir en nuestro complejo militar-industrial. Sin embargo, nuestros generales militares tienen otra propuesta."
 ARM_start_foreign_legion: "Creación de la Legión Extranjera"
 ARM_start_foreign_legion_desc: "La Legión Extranjera, como concepto de parte de las fuerzas armadas, nos ha atraído desde hace mucho tiempo, y ahora estamos listos para implementar esta idea, con la ayuda de algunos estados."
 ARM_foreign_legion_france: "Armas y Especialistas Franceses"
 ARM_foreign_legion_france_desc: "Tenemos la intención de adquirir equipos franceses y especialistas dispuestos a prestarles servicio para nuestra legión extranjera."
 ARM_foreign_legion_india: "Armas y Especialistas Indios"
 ARM_foreign_legion_india_desc: "Tenemos la intención de comprar equipos indios y especialistas que estén dispuestos a prestarles servicio para nuestra legión extranjera."
 ARM_foreign_legion_create: "Armenian Foreign Legion"
 ARM_foreign_legion_create_desc: "¡Estamos orgullosos de anunciar la creación de la Legión Extranjera Armenia, donde estaremos esperando a ciudadanos de cualquier país!"
 ARM_armenian_army_idea: "Ejército Armenio"
 ARM_armenian_army_idea_desc: "Aunque las Fuerzas Armadas de Armenia fueron creadas hace relativamente poco tiempo, pasaron por la guerra de independencia, pero ya tienen muchos problemas que necesitan ser resueltos."
