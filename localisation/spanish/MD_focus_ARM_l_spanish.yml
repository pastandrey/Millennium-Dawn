 ARM_foreseeing_the_prophecy: "Presagiando la Profecía"
 ARM_foreseeing_the_prophecy_desc: "La leyenda sobre los orígenes del pueblo armenio cuenta que los armenios ganaron su derecho a la existencia al enfrentarse a las tribus semíticas del sur bajo la unificación de Hayk el Progenitor. Los nuevos tiempos cargan con el legado del pasado y las leyendas dicen que la salvación de los armenios, como la de Hayk el Progenitor, debe llegar en el nuevo milenio..."
 arm_expansion.15.t: "El Levantamiento en Armenia Occidental"
 arm_expansion.15.d: "Tenemos la oportunidad de iniciar un levantamiento armado en Armenia Occidental, que actualmente está bajo control turco, pero debemos entender que nos involucrará en una guerra con Turquía y no habrá vuelta atrás."
 arm_expansion.15.a: "¡Libertad para Armenia Occidental!"
 arm_expansion.15.b: "No correremos ningún riesgo"
 arm_expansion.16.t: "El Levantamiento en Armenia Occidental"
 arm_expansion.16.d: "Inesperadamente para nosotros, en la llamada Armenia Occidental, ¡se produjo un levantamiento contra nuestro gobierno! Las autoridades armenias han declarado directamente la organización de esta rebelión, y ya ha surgido información sobre la aparición de sus militantes en la misma disputa con los rebeldes. ¡Es indignante!"
 arm_expansion.16.a: "Pagarán por ello."
 arm_expansion.17.t: "El Levantamiento en Armenia Occidental"
 arm_expansion.17.d: "Ha llegado el momento de la última guerra por la liberación de las tierras ancestrales armenias, ahora o nunca, ¡gloria a Armenia!"
 arm_expansion.17.a: "¡Gloria a Armenia!"
 ARM_west_armenia: "República de Armenia Occidental"
 ARM_socdem_principles_desc: "Debemos adherirnos a los principios sociales de apoyo social para hacer que nuestra sociedad sea más igualitaria."
 ARM_raising_taxes_idea: "Aumento de Impuestos"
 ARM_utilize_military_knowledge: "Utilización del Conocimiento Militar"
 ARM_utilize_military_knowledge_desc: "La experiencia militar de Serge Sargsyan debe utilizarse en beneficio de nuestras fuerzas armadas, él sabe qué hacer."