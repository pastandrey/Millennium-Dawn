 arm_expansion.1.t: "[ARM.GetNamewithFlag] Nos Invita a una Alianza"
 arm_expansion.1.d: "[ARM.GetNamewithFlag] nos ofrece una alianza para que juntos podamos contener el expansionismo de [TUR.GetNamewithFlag]"
 arm_expansion.1.a: "[TUR.GetNamewithFlag] no resistirá nuestro poder"
 arm_expansion.1.b: "Lo sentimos, pero nos encantan los kebabs."
 arm_expansion.2.t: "[ARM.GetNamewithFlag] Nos Invita a una Alianza"
 arm_expansion.2.d: "[ARM.GetNamewithFlag] nos ofrece una alianza para que juntos podamos contener el expansionismo de [TUR.GetNamewithFlag]"
 arm_expansion.2.a: "[TUR.GetNamewithFlag] no resistirá nuestro poder"
 arm_expansion.2.b: "Lo sentimos, pero nos encantan los kebabs."
 arm_expansion.3.t: "[ARM.GetNamewithFlag] Nos Invita a una Alianza"
 arm_expansion.3.d: "[ARM.GetNamewithFlag] nos ofrece una alianza para que juntos podamos contener el expansionismo de [TUR.GetNamewithFlag]"
 arm_expansion.3.a: "[TUR.GetNamewithFlag] no resistirá nuestro poder"
 arm_expansion.3.b: "Lo sentimos, pero nos encantan los kebabs."
 arm_expansion.4.t: "[ARM.GetNamewithFlag] Exige Justicia Histórica"
 arm_expansion.4.d: "Si no hay una respuesta positiva de nuestra parte, lanzarán la Operación \"Media Luna Rota\"."
 arm_expansion.4.a: "Nosotros no tenemos otra opción ..."
 arm_expansion.4.b: "¡Esta es nuestra oportunidad de restaurar la grandeza del Imperio Otomano!"
 arm_expansion.5.t: "Armenia Renuncia a Artsaj"
 arm_expansion.5.d: "Reconocemos oficialmente la renuncia completa a nuestras reivindicaciones sobre Nagorno-Karabaj."
 arm_expansion.5.a: "Todo por el bien de nuestros socios extranjeros"
 arm_expansion.6.t: "[ARM.GetNamewithFlag] Quiere Establecer Lazos Amistosos con Nosotros"
 arm_expansion.6.d: "Creen que es hora de olvidar viejos rencores y conflictos y comenzar a avanzar juntos hacia un futuro más brillante."
 arm_expansion.6.a: "Todos hemos cometido errores"
 arm_expansion.6.b: "Olvídate de ser amigos con nosotros"
 arm_expansion.7.t: "[ARM.GetNamewithFlag] nos Pide Inversiones"
 arm_expansion.7.d: "[ARM.GetNamewithFlag] nos pide que invirtamos en su infraestructura y a cambio se convierten en nuestro centro comercial."
 arm_expansion.7.a: "Siempre estaremos encantados de ayudar."
 arm_expansion.7.b: "Ya no son capaces de sernos de ninguna utilidad."
 arm_expansion.8.t: "[FROM.GetNameWithFlag] Acuerda Invertir en Nuestro País"
 arm_expansion.8.d: "Afortunadamente pudimos convencer a [FROM.GetNameWithFlag] para que invirtiera en nosotros."
 arm_expansion.8.a: "Bueno"
 arm_expansion.9.t: "[FROM.GetNameWithFlag] Se Negó a Invertir en Nuestro País"
 arm_expansion.9.d: "Parece que [FROM.GetNameWithFlag] ya no está interesado en cooperar con nosotros."
 arm_expansion.9.a: "Mal"
 arm_expansion.10.t: "[ARM.GetNamewithFlag] Nos Ofrece un Corredor Zangezur hacia Nakhichevan"
 arm_expansion.10.d: "Como parte de los nuevos acuerdos, [ARM.GetNamewithFlag] nos ofrece un corredor hacia Najicheván. Esto debería evitar nuevos conflictos entre nuestros países."
 arm_expansion.10.a: "¡Nuestro Sueño Prevaleció!"
 arm_expansion.10.b: "No, amamos a Armenia"
 arm_expansion.11.t: "[AZE.GetNamewithFlag] Acuerda Desmilitarizar Syunik"
 arm_expansion.11.d: "Ahora, cuando hayamos desmilitarizado Syunik y entregado el control del corredor de Nakhichevan a [AZE.GetNamewithFlag], la guerra nunca volverá a llegar a nuestro país."
 arm_expansion.11.a: "¡Todo por la amistad con nuestros socios!"
 arm_expansion.12.t: "[AZE.GetNamewithFlag] Rechaza Nuestra Propuesta"
 arm_expansion.12.d: "Inmediatamente después de que [AZE.GetNamewithFlag] rechazara nuestra oferta, se produjeron una serie de grandes protestas en Bakú."
 arm_expansion.12.a: "Quizás sea lo mejor"
 arm_expansion.13.t: "[TUR.GetNamewithFlag] ¡Está de acuerdo!"
 arm_expansion.13.d: "[FROM.GetNameWithFlag] acepta renovar las relaciones diplomáticas con nosotros."
 arm_expansion.13.a: "Juntos somos fuerza"
 arm_expansion.14.t: "[TUR.GetNamewithFlag] Se Niega a Reanudar los Lazos Diplomáticos con Nosotros"
 arm_expansion.14.d: "[TUR.GetNamewithFlag] ha aceptado nuestro rechazo a las demandas de reconocer los crímenes de guerra de [TUR.GetNamewithFlag] en la Primera Guerra Mundial, pero no reanudará las relaciones diplomáticas con nosotros."
 arm_expansion.14.a: "Meh"
 ARM_turkey_compliance_idea: "Gobierno de Armenia Occidental"
 ARM_shadow_of_sevres: "Sombra del Tratado de Sèvres"
 ARM_shadow_of_sevres_desc: "El Tratado de Sèvres es uno de los tratados del sistema de Versalles-Washington, cuya creación marcó el fin de la Primera Guerra Mundial. Fue firmado el 10 de agosto de 1920 en Sèvres (Francia) por los países de la Entente y los estados que se adhirieron a ellos, por un lado, y el gobierno del Imperio Otomano, por otro. El tratado no entró en vigor porque la Gran Asamblea Nacional Turca se negó a ratificarlo. Fue reemplazado tres años después por el Tratado de Lausana, que fijó las fronteras de Turquía en su forma actual."
 ARM_active_diplomacy: "Diplomacia Activa"
 ARM_active_diplomacy_desc: "Debemos desempeñar un papel de liderazgo en la política regional, y nuestra tarea fundamental para lograr este objetivo será derrotar al principal mal del Cáucaso: Turquía."
 ARM_west_arm_gov: "Contactar al Gobierno de Armenia Occidental"
 ARM_west_arm_gov_desc: "La República de Armenia Occidental, también conocida como el Estado de Armenia, es un gobierno en el exilio que reclama la soberanía sobre partes de las tierras altas de Armenia, incluyendo secciones de Armenia Occidental, así como Najicheván y, en ocasiones, también Nagorno-Karabaj. El país autoproclamado afirma tener su propia presidencia, gobierno, parlamento, constitución, himno nacional y escudo de armas."
 ARM_agree_with_greece: "Restaurar la Gran Idea"
 ARM_agree_with_greece_desc: "Actualmente, [TUR.GetNamewithFlag] posee vastos territorios que legítimamente pertenecen a [GRE.GetNamewithFlag]. Invitaremos a Grecia a unirse a nuestra coalición para recuperar lo perdido."
 ARM_negotiate_syria: "Negociaciones con [SYR.GetNamewithFlag]"
 ARM_negotiate_syria_desc: "Algunas de las tierras ancestrales de [SYR.GetNamewithFlag] también están bajo control turco. Sin embargo, [SYR.GetNamewithFlag] se encuentra en una posición estratégica vulnerable ante una posible invasión desde el norte."
 ARM_negotiate_kurds: "Negociaciones con [KUR.GetNamewithFlag]"
 ARM_negotiate_kurds_desc: "Durante décadas, los kurdos han intentado establecer su propio estado independiente que unifique a todo el pueblo kurdo. Así que ayudémoslos en esta tarea."
 ARM_return_to_western_armenia: "Regreso a Armenia Occidental"
 ARM_return_to_western_armenia_desc: "Es hora de recuperar lo perdido y liberar el Cáucaso y Asia Menor del colonialismo turco."
 ARM_land_of_peace: "Tierra de Paz"
 ARM_land_of_peace_desc: "La experiencia pasada ha demostrado que somos incapaces de recuperar nuestros territorios. Ahora vale la pena replantear nuestra política exterior e intentar establecer relaciones con nuestros vecinos islámicos."
 ARM_ussr_success_const: "Legado de la RSS de Armenia"
 ARM_ussr_success_const_desc: "Con el fin de establecer lazos amistosos con nuestros vecinos, nos reconocemos como sucesores de la RSS de Armenia, confirmando así la integridad territorial de todas las demás RSS, incluida [AZE.GetNamewithFlag]."
 ARM_normalize_relations_with_turkey: "Normalizar Relaciones con Turquía"
 ARM_normalize_relations_with_turkey_desc: "La principal causa del prolongado conflicto entre Turquía y Armenia fueron los crímenes de guerra cometidos por Turquía en Armenia Occidental. Sin embargo, esto ya no nos interesa, dado que ha transcurrido más de medio siglo desde entonces."
 ARM_crossroad_of_peace: "Cruce de Caminos de la Paz"
 ARM_crossroad_of_peace_desc: "Como país neutral que mantiene buenas relaciones con nuestros vecinos, les ofreceremos inversiones en nuestra economía."
 ARM_zang_corr_question: "Cuestión del Corredor de Zangezur"
 ARM_zang_corr_question_desc: "De acuerdo con nuestra nueva política de paz, ya no nos interesa un mayor desarrollo militar de Syunik. Y aunque es una arteria clave que bloquea el acceso de Azerbaiyán a su enclave de Najicheván, además de proporcionarnos una ruta terrestre para los suministros militares iraníes, ya no tenemos intención de utilizar esta región para presionar a Azerbaiyán."
 ARM_anatolian_heritage: "Herencia Anatolica"
 ARM_anatolian_heritage_desc: "Es necesario iniciar el intercambio cultural, económico, político y científico entre nuestros países, para estabilizar aún más nuestras relaciones."
 ARM_kazah_cooperation_idea: "Cooperación entre [KAZ.GetNamewithFlag] y [ARM.GetNamewithFlag]"
 ARM_shirvan_deal: "Oferta [PER.GetNamewithFlag] Intercambio Territorial"
 arme.174.t: "[ARM.GetNamewithFlag] Ofrece Intercambio Territorial"
 arme.174.d: "Recientemente, Armenia nos propuso intercambiar territorios y nuestra provincia de Khoy, donde viven predominantemente kurdos iraníes, por el territorio habitado por personas de habla persa: la provincia de Shirvan. ¿Deberíamos aceptar?"
 arme.174.a: "¡Claro, por qué no!"
 arme.174.b: "¿Es esto algún tipo de complot?"
 arme.175.t: "[PER.GetNamewithFlag] ¡Niega el Intercambio Territorial!"
 arme.175.d: "Irán no quiere transferirnos a Khoy a cambio de Shirvan."
 arme.175.a: "Pagarán por ello."
 ARM_turkey_negotiations: "Negociaciones con [TUR.GetNamewithFlag]"
 ARM_turkey_negotiations_desc: "Desde nuestra independencia, Turquía ha sido un gran obstáculo para el comercio con Europa. Quizás podamos normalizar nuestras relaciones con ellos y abrir las fronteras."
 arme.176.t: "Nuestra Postura sobre las Negociaciones con [TUR.GetNamewithFlag]"
 arme.176.d: "Es hora de definir nuestra postura sobre las negociaciones con Turquía. ¿Deberíamos empezar a intentar normalizar las relaciones y abrir las fronteras o deberíamos olvidarnos de esta idea?"
 arme.176.a: "Notificar a Turquía que estamos listos para hablar."
 arme.176.b: "Abandone esta estúpida idea."
 arme.177.t: "[ARM.GetNamewithFlag] ¡Quiere Normalizar las Relaciones!"
 arme.177.d: "Recientemente, Armenia nos envió una propuesta diplomática para normalizar y regularizar las relaciones. A largo plazo, la colaboración mutua y la apertura de fronteras pueden beneficiar a ambas partes. Sin embargo, Armenia exige que reconozcamos el Genocidio del Imperio Otomano. Muchos activistas nacionalistas creen que dicho reconocimiento puede dar lugar a reivindicaciones territoriales o reparaciones económicas. Sin embargo, Armenia niega tales acusaciones."
 arme.177.a: "Estamos listos para normalizar, sin embargo debemos discutir algunos puntos."
 arme.177.b: "Ellos necesitarán resolver el conflicto de Nagorno-Karabaj primero."
 arme.177.c: "¡Cómo se atreven incluso a pensar en hablar con nosotros!"
 arme.178.t: "[TUR.GetNamewithFlag] ¡Nos Pide que Retiremos las Acusaciones de Genocidio!"
 arme.178.d: "Turquía ha recibido nuestra propuesta, pero quiere que retiremos las acusaciones de genocidio y el reconocimiento. ¿Qué deberíamos decirles?"
 arme.178.a: "La demanda de justicia no es igual a reparaciones y reivindicaciones territoriales."
 arme.178.b: "Podemos abandonar nuestras aspiraciones, seguro."
 arme.179.t: "[ARM.GetNamewithFlag] ¡Está de acuerdo!"
 arme.179.d: "Armenia aceptó abandonar sus acusaciones de genocidio y ahora está totalmente lista para normalizar las relaciones y abrir las fronteras al comercio."
 arme.179.a: "¡Maravilloso!"
 turkish_relat_negotated: "Relaciones Armenio-Turcas Normalizadas"
 arme.180.t: "[ARM.GetNamewithFlag] ¡Insiste!"
 arme.180.d: "Armenia declara una vez más que no tiene intención de reclamar territorio alguno de Turquía. Al contrario, se podrían construir museos de paz e historia para condenar la sangrienta historia y redimir al Estado turco del pasado otomano. Armenia insiste en que busca fomentar las relaciones comerciales y políticas, no una agenda irredentista."
 arme.180.a: "Reconozcamos las atrocidades del pasado y construyamos un nuevo futuro."
 arme.180.b: "Quieren humillarnos. Esto es inaceptable."
 arme.181.t: "[TUR.GetNamewithFlag] ¡Reconoce el Genocidio Armenio!"
 arme.181.d: "Turquía aceptó recientemente reconocer el genocidio de 1915 en el Imperio Otomano y normalizó sus relaciones con nosotros."
 arme.181.a: "¡Que Dios Nos Bendiga!"
 arme.182.t: "[TUR.GetNamewithFlag] ¡Se Niega a Normalizar las Relaciones!"
 arme.182.d: "Turquía abandonó recientemente todos los esfuerzos diplomáticos para normalizar las relaciones con nosotros. Ya no se está estableciendo ninguna conexión."
 arme.182.a: "Ellos nunca cambian."
 arme.183.t: "Oposición al Viejo Gobierno"
 arme.183.d: "El cambio radical de poder en nuestro país no ha pasado desapercibido. Los partidarios del gobierno anterior organizaron una poderosa campaña política de oposición contra nosotros, y así es como ponen a prueba la fuerza y ​​la estabilidad de nuestro gobierno."
 arme.183.a: "Su tiempo se acabó."
 arme.184.t: "Oposición al Viejo Gobierno"
 arme.184.d: "El cambio radical de poder en nuestro país no ha pasado desapercibido. Los partidarios del gobierno anterior organizaron una poderosa campaña política de oposición contra nosotros, y así es como ponen a prueba la fuerza y ​​la estabilidad de nuestro gobierno."
 arme.184.a: "Su tiempo se acabó."
 arme.185.t: "Oposición al Viejo Gobierno"
 arme.185.d: "El cambio radical de poder en nuestro país no ha pasado desapercibido. Los partidarios del gobierno anterior organizaron una poderosa campaña política de oposición contra nosotros, y así es como ponen a prueba la fuerza y ​​la estabilidad de nuestro gobierno."
 arme.185.a: "Su tiempo se acabó."
 arme.186.t: "Oposición al Viejo Gobierno"
 arme.186.d: "El cambio radical de poder en nuestro país no ha pasado desapercibido. Los partidarios del gobierno anterior organizaron una poderosa campaña política de oposición contra nosotros, y así es como ponen a prueba la fuerza y ​​la estabilidad de nuestro gobierno."
 arme.186.a: "Su tiempo se acabó."
 arme.187.t: "Protestas en las Regiones"
 arme.187.d: "La inestabilidad política también ha sacudido a nuestros títeres. Los estados bajo nuestro control se ven sacudidos por las protestas antiarmenias; debemos abordar esto con urgencia."
 arme.187.a: "Maldita sea"
 arme.188.t: "Armenia Pide Armas"
 arme.188.d: "Armenia, como miembro de pleno derecho de la OTAN, ha lanzado un programa de rearme y ahora nos pide que le proporcionemos determinadas armas para su ejército reformado."
 arme.188.a: "Les Daremos Armas"
 arme.188.b: "No"
 arme.189.t: "Armas de la OTAN"
 arme.189.d: "[FROM.GetNamewithFlag] ha acordado proporcionarnos armas para rearmar nuestro ejército."
 arme.189.a: "Bien"
 arme.190.t: "Armas de la OTAN"
 arme.190.d: "[FROM.GetNamewithFlag] se negó a proporcionarnos armas para rearmar nuestro ejército."
 arme.190.a: "Triste"
 arme.223.t: "La Rebelión en Azerbaiyán"
 arme.223.d: "Los separatistas azerbaiyanos se aprovecharon de nuestros servicios especiales no preparados, así como de un pequeño ejército, y lanzaron un levantamiento armado en un intento de liberar a su país de nuestro dominio."
 arme.223.a: "Oh, no"
 arme.224.t: "La Rebelión en el Kubán"
 arme.224.d: "Nuestras acciones en Kuban no estuvieron exentas de consecuencias, el pueblo de Kuban se levantó contra nosotros, anunció la creación de la República de Kuban y comenzó a crear grupos armados para luchar contra nosotros."
 arme.224.a: "Oh, no"
 arme.225.t: "La Rebelión en Daguestán"
 arme.225.d: "Nuestras acciones en Daguestán no estuvieron exentas de consecuencias, el pueblo de Daguestán se levantó contra nosotros, anunció la creación de la República de Daguestán y comenzó a crear grupos armados para luchar contra nosotros."
 arme.225.a: "Oh, no"
 arme.226.t: "La Rebelión en Georgia"
 arme.226.d: "Nuestras acciones en Georgia no estuvieron exentas de consecuencias. El pueblo georgiano se ha rebelado contra nosotros y quiere liberarse de nuestra ocupación, ahora tenemos que enfrentarnos a una rebelión georgiana organizada."
 arme.226.a: "Oh, no"
 arme.227.t: "La Rebelión en Abjasia"
 arme.227.d: "Nuestras acciones en Abjasia no estuvieron exentas de consecuencias. El pueblo abjasio se ha rebelado contra nosotros y quiere liberarse de nuestra ocupación; ahora tenemos que enfrentarnos a una rebelión organizada de Abjasia."
 arme.227.a: "Oh, no"
 arme.228.t: "La Rebelión en el Kurdistán"
 arme.228.d: "Nuestras acciones en Kurdistán no estuvieron exentas de consecuencias. El pueblo del Kurdistán se ha rebelado contra nosotros y quiere liberarse de nuestra ocupación, ahora tenemos que enfrentarnos a una rebelión organizada del Kurdistán."
 arme.228.a: "Oh, no"
 arme.229.t: "La Rebelión en Djavakheti"
 arme.229.d: "Los habitantes de Djavakheti quedaron profundamente conmocionados por nuestra política hacia Artsaj y nuestro abandono de estas tierras. Ante este panorama, un grupo de militares radicales incluso logró organizar una rebelión, declarando a nuestro gobierno ilegal y antiarmenio."
 arme.229.a: "Oh, no"
 arme.230.t: "Autonomía de Talishistán"
 arme.230.d: "El gobierno de Talyshstan ha lanzado un ultimátum a nuestro gobierno, expresando una feroz desobediencia a nuestras ambiciones políticas de subyugar completamente estas tierras a la nación armenia, exigen nuestra autonomía como parte de nuestro estado, o pretenden defender su independencia con un arma en sus manos."
 arme.230.a: "No a la Autonomía"
 arme.230.b: "Démosles Autonomía"
 arme.231.t: "Protestas Contra un Ejército Débil"
 arme.231.d: "El levantamiento armado que ha comenzado contra nosotros ha provocado una ola de protestas en todo el país, la gente está descontenta con la debilidad de nuestras fuerzas armadas, exigen más financiación para nuestro ejército."
 arme.231.a: "¿Y Qué Comerán?"
 ARM_repatriate_armenians: "§GRepatriados§! §YArmenios§! volver a [ARM.GetNamewithFlag]"
