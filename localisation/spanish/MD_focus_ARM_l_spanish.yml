 ARM_defence: "En Guardia en Armenia"
 ARM_defence_desc: "Nuestro país necesita una mejor protección, y sólo los mejores servicios especiales, que financiaremos generosamente, pueden proporcionársela."
 ARM_police: "Policía de Armenia"
 ARM_police_desc: "La Policía de la República de Armenia es la policía nacional de Armenia. Ahora estamos listos para implementar reformas globales en esta estructura: contrataremos nuevo personal, eliminaremos a los funcionarios corruptos y aumentaremos la financiación policial."
 ARM_police_troops: "Tropas de Policía"
 ARM_police_troops_desc: "Las Tropas de Policía de Armenia, que han participado activamente en todas las operaciones de combate llevadas a cabo por las antiguas Tropas Internas de Armenia y las Tropas Internas Soviéticas. Las unidades militares de las Tropas Internas del Ministerio del Interior de Armenia tenían una amplia gama de actividades: incluida la protección de instalaciones especiales, el mantenimiento del orden público, el servicio de seguridad pública, el entrenamiento preliminar de reclutas y el entrenamiento de suboficiales."
 ARM_national_central_bureua: "Oficina Central Nacional"
 ARM_national_central_bureua_desc: "El departamento de policía está dividido en tres divisiones, cada una de las cuales tiene un rango diferente de responsabilidades, desde criminología hasta apoyo técnico policial. Todos estos tres departamentos deben realizar sus tareas al 100 por ciento, y aumentaremos su financiación y realizaremos reformas de personal para que puedan completar esta tarea con seguridad."
 ARM_special_oper_forces: "Fuerzas de Operaciones Especiales"
 ARM_special_oper_forces_desc: "Fuerzas especiales de élite de la policía armenia para contrarrestar a la multitud de oponentes del estado. Por el momento, esta estructura no cumple con los estándares modernos de las fuerzas especiales de la policía, y tenemos la intención de cambiar esto actualizando completamente su composición y equipamiento."
 ARM_black_panters: "Panteras Negras"
 ARM_black_panters_desc: "Ex militares que se integraron a las fuerzas especiales como parte de la policía. Su experiencia y métodos de enfrentamiento a potenciales adversarios serán muy valiosos y útiles para las estructuras policiales de nuestro estado."
 ARM_nss: "Servicio de Seguridad Nacional"
 ARM_nss_desc: "El Servicio de Seguridad Nacional es el servicio de seguridad saliente de Armenia, responsable de la seguridad nacional y de asuntos de inteligencia. Desafortunadamente, esta estructura todavía es relativamente joven y no hay suficiente personal experimentado en ella, lo cual cambiaremos llevando a cabo las reformas necesarias y aumentando la financiación de este servicio especial."
 ARM_take_border_troops: "Guardia Fronteriza"
 ARM_take_border_troops_desc: "La Guardia Fronteriza de Armenia es la rama del Servicio de Seguridad Nacional de Armenia responsable de vigilar y proteger las fronteras de Armenia con sus vecinos Turquía, Azerbaiyán, Irán y Georgia. Lamentablemente, este servicio se financia con una cantidad muy pequeña del presupuesto, por lo que solo puede realizar la mitad de las funciones previstas. Lo solucionaremos."
 ARM_economic_corruption_security: "Seguridad Económica y Lucha Contra la Corrupción"
 ARM_economic_corruption_security_desc: "La unidad es responsable de combatir la corrupción y de la seguridad económica, protegiendo así la economía armenia de influencias negativas internas. Las prioridades de la economía y la seguridad son más importantes para nosotros que nunca, por lo tanto, al asignar fondos para esta unidad, no estamos siendo codiciosos."
 ARM_constitutional_teerorism: "Seguridad y la Constitución"
 ARM_constitutional_teerorism_desc: "La seguridad y la constitución son las prioridades de este departamento, y para garantizar que estas prioridades se cumplan aún mejor, asignaremos fondos adicionales para el desarrollo de este departamento."
 ARM_alpha: "Fuerzas Especiales Alfa"
 ARM_alpha_desc: "Las fuerzas especiales de élite de los servicios especiales armenios, cuyas direcciones difieren en una amplia gama de tareas, desde la lucha contra bandidos hasta terroristas. La renovación del personal y el aumento de la financiación deberían tener un impacto positivo en el desarrollo de esta estructura."
 ARM_fis_desc: "El Servicio de Inteligencia Exterior es la principal agencia de inteligencia externa de Armenia. Nuestro propio servicio de inteligencia estatal, que será responsable de todas nuestras acciones de política exterior no oficiales."
 ARM_special_services_category: "Servicios Especiales de Armenia"
 ARM_special_services_category_desc: "[ARM.GetFlag]§YArmenia§! está protegida no solo por un valiente ejército que ha superado el [NKR.GetFlag]§RKarabaj§! con §Gvictoria§!, sino también por valientes £text_icon_armnss §2fuerzas del orden y servicios especiales§!, en los que el estado no debería escatimar, porque esta es la clave para la §Yseguridad £text_icon_armnss interna§! del país.\n\n§GCompletando§! se centra en la£text_icon_armnss §Yrama de servicios especiales§!, §Gdescubrir§! más y más de §Yideas nacionales§!, que se mostrarán a continuación."
