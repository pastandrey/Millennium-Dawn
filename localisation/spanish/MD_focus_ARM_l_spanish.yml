 ARM_olympic_comitee: "Comité Olímpico"
 ARM_olympic_comitee_desc: "Necesitamos fortalecer y apoyar al Comité Olímpico por todos los medios posibles. Gagik Tsarukyan es un atleta y no puede quedarse al margen."
 ARM_tsaruk_trde: "Comercio de Tsarukyan"
 ARM_tsaruk_trde_desc: "Tsarukyan es un comerciante con mucha experiencia. ¿Quizás deberíamos gubernamentalizar esta empresa?"
 ARM_utilize_assets: "Utilizando Nuestros Activos"
 ARM_utilize_assets_desc: "Debemos utilizar todo lo que hay en nuestro país para aumentar nuestros ingresos, incluso si eso significa poner más esfuerzo en todas las esferas de la economía."
 ARM_statue_of_christ: "La Nueva Estatua de Cristo"
 ARM_statue_of_christ_desc: "Tsarukyan es un cristiano muy devoto. Quiere construir una nueva estatua de Jesucristo. ¡Qué idea tan maravillosa!"
 ARM_sport_youth: "Juventud Deportista"
 ARM_sport_youth_desc: "¡Todos los jóvenes de Armenia deben ser deportistas, fuertes y saludables! Este es nuestro objetivo principal."
 ARM_bet_culture: "Adopte la Cultura de las Apuestas"
 ARM_bet_culture_desc: "A muchos armenios les gusta beber cerveza y apostar en deportes. ¡Debemos apoyar esta cultura! ¿Qué hay de malo en eso?"
 ARM_support_peasants: "Apoyo a la Población Rural"
 ARM_support_peasants_desc: "Hay que apoyar a toda la población rural. El propio Tsarukyan proviene de un entorno campesino y conoce las luchas de la gente común."
 ARM_befr_mafia: "Hazte Amigo de la Mafia"
 ARM_befr_mafia_desc: "Quizás... ¡Quizás! Quizás deberíamos hacernos amigos de la mafia para perseguir nuestros objetivos políticos a largo plazo."
 ARM_freedom_for_pes: "Libertad para los Campesinos"
 ARM_freedom_for_pes_desc: "Debemos abstenernos de interferir con las pequeñas empresas de producción agrícola. Debemos darles cierta libertad."
 ARM_hire_pmc_wagner: "Contratar a PMC de Wagner"
 ARM_hire_pmc_wagner_desc: "La guerra avanza por nuestras tierras y no escatimaremos ningún gasto para defender nuestra patria, recurriremos a la ayuda de Rusia y de sus famosas PMC para repeler el ataque del enemigo."
 ARM_create_pmc: "Guerreros del León Dorado PMC"
 ARM_create_pmc_desc: "También necesitamos crear nuestra propia empresa militar privada que proteja los intereses de nuestro país a cambio de una buena remuneración, que sin duda les proporcionaremos."
 ARM_sport_development: "Sporting Nation"
 ARM_berkut_troops: "Berkut"
 ARM_farmercracy: "Agrarismo"
 ARM_corporatocracy: "Corporatocracia"
 ARM_unstable_government_idea: "Gobierno Inestable"
 arme.73.t: "Estatua de Cristo en Armenia"
 arme.73.d: "Nuestro grandioso proyecto religioso, la estatua de Jesucristo, se ha completado. Ahora Armenia tiene su propio rostro de Cristo en su territorio, y cristianos de todo el mundo nos admiran."
 arme.73.a: "Con la Ayuda de Dios"
 ARM_Demirchyan: "§YPartido Popular de Armenia§!"
 ARM_Demirchyan_desc: "El Partido Popular de Armenia (en armenio: Hayastani Zhoghovrdakan Kusaktsutyun) es un partido político socialista de Armenia. Fue fundado por el estadista y miembro del partido soviético y armenio Karen Demirchyan, quien fue Primer Secretario del Partido Comunista de Armenia de 1974 a 1988. Actualmente, su hijo Stepan Demirchyan está al frente del partido."
 ARM_strat_technocrats: "Promover Tecnócratas"
 ARM_strat_technocrats_desc: "Para que Armenia sea como queremos que sea, necesitamos llevar a cabo una reforma a gran escala del gobierno y del gabinete de ministros, eliminando a los viejos aduladores del gobierno anterior y trayendo a nuevos profesionales jóvenes."
 ARM_reindustr_country: "Inverso \"Reconstruir\""
 ARM_reindustr_country_desc: "Corrupto Gorbachov, quien inició su perestroika, arruinó nuestro país, deshonrándolo y dejándolo en ruinas. Es hora de reconstruir el sistema socialista y olvidar por mucho tiempo estos terribles últimos días de la URSS."
 ARM_demirch_gamble: "La Apuesta de Stepan"
 ARM_demirch_gamble_desc: "A pesar de las opiniones socialistas de Stepan, sería políticamente beneficioso unificarse con alguno de los otros partidos que tienen la misma agenda de política exterior que nosotros."
 ARM_legacy_of_father: "Legado del Padre"
 ARM_legacy_of_father_desc: "Tenemos un solo lema: todo trabajador tiene derecho a disfrutar de los beneficios de la vida. Los parásitos, parásitos que chupan la sangre de los trabajadores, deben ser privados de estos beneficios. Y proclamamos: ¡Todos a los trabajadores, todos a los trabajadores!"
 ARM_iron_fisting_oligs: "Aplastando a la Oligarquía"
 ARM_iron_fisting_oligs_desc: "¡Debemos asegurarnos de que los bandidos de los años 90 no gobiernen más este país y esta economía!"
 ARM_socialism_with_human_face: "Socialismo Con Rostro humano"
 ARM_socialism_with_human_face_desc: "La religión y el socialismo no son antagónicos en absoluto. Incluso el gobierno soviético permitió la existencia de la Iglesia Armenia durante su mandato. No debemos luchar contra la Iglesia, sino unirnos a ella."
 ARM_coalition_with_vazgen_supporters: "Coalición Con los Partidarios de Vazgen"
 ARM_coalition_with_vazgen_supporters_desc: "El ataque al parlamento de 1999 tenía como objetivo específico permitir que Yerkrapah y el Partido Popular de Armenia llegaran al poder. Vazgen Sargsyan y Karen Demirchyan fueron asesinados durante ese ataque. ¡Debemos unirnos de nuevo por la prosperidad de nuestra nación!"
 ARM_remember_shaumian: "Estrategia de Shaumian"
 ARM_remember_shaumian_desc: "Shaumian fue un ejemplo perfecto de la unión del nacionalismo armenio y el bolchevismo en beneficio del bienestar de los trabajadores armenios y la unificación general del pueblo. Debemos apoyar su legado."
 ARM_euro_dilemma: "Dilema Europeo"
 ARM_euro_dilemma_desc: "Debemos finalmente decidir nuestra postura sobre la Unión Europea. Si bien simpatizamos bastante con ella, nuestra situación geopolítica podría obligarnos a adoptar una postura diferente."
 ARM_rebuilding_initiative: "Iniciativa de Reconstrucción"
 ARM_rebuilding_initiative_desc: "Lenin comprendió que el resurgimiento del capitalismo no era seguro para la RSFSR, pero lo consideró aceptable, pues la cuestión era la medida. Y esta medida fue establecida por los propios sóviets. Esto permitió regular el crecimiento del sector capitalista de la economía: «Para mantener el camino hacia el socialismo, hacemos a los campesinos una serie de concesiones, dentro de cuyos límites juzgaremos nosotros mismos»."
 ARM_sov_legacy_cond_dec: "Condenando las Decisiones Soviéticas"
 ARM_sov_legacy_cond_dec_desc: "Ha transcurrido un siglo desde la formación de la República Transcaucásica. Desgarrada por el nacionalismo, se dividió en tres estados. ¡Debemos olvidarnos de las diferencias nacionales e históricas y ayudar a nuestros vecinos a derrocar el poder burgués e instaurar la dictadura del proletariado!"
 ARM_invite_asala: "Expansión Roja"
 ARM_invite_asala_desc: "El Ejército Secreto Armenio para la Liberación de Armenia (ASALA) fue una organización militante marxista-leninista activa entre 1975 y la década de 1990, cuyo objetivo declarado era obligar al gobierno turco a reconocer públicamente su responsabilidad en el genocidio armenio de 1915, pagar reparaciones y ceder territorio para una patria armenia. El propio ASALA y otras fuentes lo describieron como una organización guerrillera y armada. Deberíamos seguir sus pasos."
 ARM_workers_soldiers: "Trabajadores y Soldados"
 ARM_workers_soldiers_desc: "No podemos separar nuestra identidad, nuestra aspiración a la justicia nacional, de nuestra política económica. ¡Somos un país de armenios, un país de trabajadores y soldados!"
 ARM_support_patriotic_movement: "Apoyando el Movimiento Patriótico"
 ARM_support_patriotic_movement_desc: "Debemos apoyar todos los movimientos patrióticos que no tengan como objetivo restaurar el capitalismo desenfrenado en nuestro país."
 ARM_legacy_of_father_idea: "Legado del Padre"
 ARM_legacy_of_father_two_idea: "Legado del Padre"
 ARM_legacy_of_father_three_idea: "Legado del Padre"
 ARM_legacy_of_father_four_idea: "Legado del Padre"
 ARM_christian_humanism_idea: "Humanismo Cristiano"
 ARM_shaumians_thought_idea: "Pensamiento Shaumyan"
 ARM_armenia_demirchyan_idea: "La Armenia de Demirchan"
 ARM_asala_bases_idea: "Bases de Asala"
 arm_demirchyan.1.t: "Limpieza del Ejército"
 arm_demirchyan.1.d: "Todavía hay elementos peligrosos en el ejército, representados por los partidarios de Kocharian. Necesitamos depurarlos."
 arm_demirchyan.1.a: "Bueno."
 arm_demirchyan.2.t: "Nuestros Asesores"
 arm_demirchyan.2.d: "Quizás para una mejor gobernanza, debamos seguir el consejo de otros partidos. Solo queda elegir cuáles."
 arm_demirchyan.2.a: "La paz y la democracia deben guiar a nuestros pueblos."
 arm_demirchyan.2.b: "Estamos a favor del socialismo adecuado."
 arm_demirchyan.3.t: "§Y[ARM.GetNameWithFlag]§! Ofrece alojamiento en bases de ASALA"
 arm_demirchyan.3.d: "§Y[ARM.GetNameWithFlag]§! nos ofrece bases para proteger nuestra soberanía de Turquía. A cambio, nos piden permiso para incluir la región de Van en su zona de interés."
 arm_demirchyan.3.a: "¡Siempre estamos del lado de nuestros hermanos de armas!"
 arm_demirchyan.3.b: "Lo siento, no"
 arm_demirchyan.4.t: "§Y[KUR.GetNameWithFlag]§! Rechazó Nuestra Oferta"
 arm_demirchyan.4.d: "Dijeron que no necesitaban nuestra ayuda."
 arm_demirchyan.4.a: "Meh."
 arm_demirchyan.5.t: "Renacimiento de Asala"
 arm_demirchyan.5.d: "Recientemente se supo que el grupo ASALA, conocido por sus políticas militarizadas hacia Azerbaiyán y Turquía, ahora se encuentra oficialmente montando guardia sobre §Y[ARM.GetNameWithFlag]§! la seguridad."
 arm_demirchyan.5.a: "Oh mier..."
 arm_demirchyan.5.b: "Es sólo una maniobra política."
 arm_demirchyan.6.t: "ASALA está del Lado de Nuestro Gobierno"
 arm_demirchyan.6.d: "Nadie es olvidado y nada es olvidado: ¡junto con nuestros aliados de ASALA podemos conducir a §Y[ARM.GetNameWithFlag]§! hacia un gran futuro!"
 arm_demirchyan.6.a: "¡Bueno!"
 arm_demirchyan_news.1.t: "[ARM.GetLeader] Critica a los Regímenes Comunistas"
 arm_demirchyan_news.1.d: "El líder armenio [ARM.GetLeader] criticó públicamente a todos los regímenes comunistas del mundo. Afirmó que utilizaban ineficientemente los recursos de su país y destruían su economía y cultura."
 arm_demirchyan_news.1.a: "Un golpe al sistema socialista."
 ARM_forced_industrialisation_unlock_tt: "§YSe abrirán decisiones sobre la industrialización forzada en §Y[ARM.GetNameWithFlag]§!§!"
 arm_demirchyan.8.t: "Nuestra Postura sobre la UE"
 arm_demirchyan.8.d: "Hay que decidir si continuaremos cooperando con la UE o si la abandonaremos. Sin embargo, si decidimos seguir cooperando con la UE, podríamos obtener algún beneficio de ello."
 arm_demirchyan.8.a: "Enviar una delegación a la UE."
 arm_demirchyan.8.b: "Tenemos otros planes."
 arm_demirchyan.9.t: "§Y[ARM.GetNameWithFlag]§! La delegación llega a la capital"
 arm_demirchyan.9.d: "§Y[ARM.GetNameWithFlag]§! quiere seguir cooperando con nosotros a pesar de su ideología. ¿Aceptaremos su oferta?"
 arm_demirchyan.9.a: "Si, ¿por qué no?"
 arm_demirchyan.9.b: "Los comunistas no merecen nuestra atención."
 arm_demirchyan.10.t: "¡[FROM.GetNamewithFlag] Acepta!"
 arm_demirchyan.10.d: "Logramos convencerlos para que sigan cooperando con nosotros."
 arm_demirchyan.10.a: "¡Bueno!"
 arm_demirchyan.11.t: "Ellos se Negaron a Cooperar con Nosotros."
 arm_demirchyan.11.d: "Desafortunadamente nuestro trato no resonó con ellos."
 arm_demirchyan.11.a: "Meh."
 arm_demirchyan.12.t: "Futuro de la Tierra"
 arm_demirchyan.12.d: "Es hora de decidir el futuro de nuestra tierra. Tanto las ideas nacional-bolcheviques como las democráticas son populares en nuestro país, pero el resultado final dependerá de nosotros."
 arm_demirchyan.12.a: "La democracia es lo mejor para nosotros."
 arm_demirchyan.12.b: "Un camino más radical haría a nuestro país aún más fuerte."
