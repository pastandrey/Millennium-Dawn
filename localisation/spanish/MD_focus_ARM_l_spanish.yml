 ARM_mister_p: "[ARM_Pashik_misters_loc]"
 ARM_mister_p_desc: "Necesitamos reunirnos con el presidente ruso para fortalecer nuestras relaciones y convencerle de que no estamos en contra de él."
 ARM_crackdown_on_corruption: "Medidas Enérgicas Contra la Corrupción"
 ARM_crackdown_on_corruption_desc: "\"¡No más sobornos, no más monopolios, los derechos humanos serán protegidos, prevalecerá el estado de derecho!\", dijo el manifestante Nikol Pashinyan, en su discurso antes de que el parlamento de Armenia lo votara como nuevo primer ministro del país."
 ARM_exit_problems: "La Salida de Los Problemas"
 ARM_exit_problems_desc: "Nuestra nueva agenda es la SALIDA de todos los problemas. ¡Somos el partido del cambio!"
 ARM_educ_curicullum: "El Nuevo Currículo Educativo"
 ARM_educ_curicullum_desc: "La educación debe transformarse en nuestra nueva era. Debemos lograr que toda la educación se ajuste a nuestras nuevas preferencias ideológicas."
 ARM_renew_view_hist: "Renovar la Visión de la Historia Armenia"
 ARM_renew_view_hist_desc: "La visión de la historia armenia debe redefinirse según las ideas de nuestro líder. El mundo se compone de perspectivas, y es nuestro deber cambiarlas."
 ARM_irrecons_contr: "Abordar las Contradicciones Irreconciliables"
 ARM_irrecons_contr_desc: "Existen muchas contradicciones entre el liberalismo y el nacionalismo en nuestra Constitución. Debemos abordarlas y reformarla."
 ARM_gather_loyalists: "Reunir a los Leales"
 ARM_gather_loyalists_desc: "Debemos reunir a todos los leales de nuestro partido para colocarlos en sus respectivos puestos ministeriales. Los malditos tecnócratas son tan políticamente infieles que podrían convertirse en un problema en nuestro aparato administrativo."
 ARM_investig_clique: "Investigar la Camarilla"
 ARM_investig_clique_desc: "Hay que investigar la camarilla de SerzhoRob para limpiar definitivamente nuestro país de la sangre de la represión y la corrupción."
 ARM_change_gov_structure: "Cambiando la Estructura Gubernamental"
 ARM_change_gov_structure_desc: "Nuestra estructura gubernamental ya no se corresponde con la eficiencia con la que se hacen las cosas. Debemos cambiar eso."
 ARM_social_media_prop: "Propaganda en las Redes Sociales"
 ARM_social_media_prop_desc: "Para convencer a la población de que tenemos razón, nuestro líder debe estar constantemente en la esfera informativa de nuestros ciudadanos, cada armenio leerá y verá a nuestro gran líder nacional, cercano al pueblo."
 ARM_hijack_nat_voters: "Secuestro de Votantes Nacionalistas"
 ARM_hijack_nat_voters_desc: "Para aumentar el apoyo a nuestro Primer Ministro, necesitamos apelar a las masas, incluida la derecha radical."
 ARM_era_of_peace: "Agenda de la Era de la Paz"
 ARM_era_of_peace_desc: "¡Nuestra nueva doctrina es la paz, no la guerra! Debemos olvidar lo que ocurrió en 1915 y en los años 90. Ahora somos un nuevo país."
 ARM_police_guard: "Guardia de Policía"
 ARM_police_guard_desc: "Pretendemos crear una unidad separada de las fuerzas policiales. La Guardia de Policía desempeñará sus funciones únicamente en el marco de las funciones policiales y no tendrá que participar en hostilidades.."
 ARM_csto_dilemm: "¿Postura sobre la OTSC?"
 ARM_csto_dilemm_desc: "Debemos decidir cuál es nuestra postura sobre la OTSC. ¿Deberíamos abandonarla o reforzar nuestros vínculos?"
 ARM_anti_belarus_rhetoric: "Retórica Antibielorrusa"
 ARM_anti_belarus_rhetoric_desc: "Bielorrusia lleva mucho tiempo apoyando las atrocidades azerbaiyanas. ¡Debemos abordar esto!"
 ARM_NGO_friend: "Hacerse Amigo de las ONG"
 ARM_NGO_friend_desc: "Nuestra nueva y joven democracia necesita aliados. ¡Las ONG cumplen perfectamente este papel!"
 ARM_you_are_that_one_man: "'Y Tú Eres ese Hombre'"
 ARM_you_are_that_one_man_desc: "Nikol Pashinyan es un hombre de pueblo. Sabe lo que necesita la gente del pueblo y, a su vez, es responsable de cada elección. ¡Tú eres el hombre que decide el destino de Armenia!"
 ARM_i_am_that_one_man: "'Y Yo Soy ese Hombre'"
 ARM_i_am_that_one_man_desc: "¡Nikol Pashinyan es el elegido! No solo por las elecciones, sino también por Dios. La elección del pueblo refleja, en última instancia, la disposición cósmica de poderes que llevó a Nikol, nuestro líder, al poder."
 ARM_armenia_pashik_idea: "La Armenia de Pashinyan"
 ARM_loyalists_in_government: "Leales en el Gobierno"
 ARM_armenian_soc_media_prop_idea: "Propaganda en las Redes Sociales"
 ARM_pashinyan_anti_corrupt_idea: "Política Anticorrupción"
 ARM_education_reforms: "Reformas Educativas"
 ARM_true_pashik_democracy: "Bastión Caucásico de la Democracia"
 ARM_controlled_democracy: "Democracia Controlada"
 ARM_new_era_of_peace_idea: "Era de Paz"
 ARM_support_of_ngo_idea: "Apoyo a las ONG"
 arm_pashinyan.1.t: "[ARM_Pashik_misters_loc]"
 arm_pashinyan.1.d: "El gobierno de [ARM.GetNamewithFlag] afirma que su gobierno liberal no representa una amenaza para nosotros y acepta una mayor cooperación."
 arm_pashinyan.1.a: "Está bien, Estamos de Acuerdo"
 arm_pashinyan.1.b: "No"
 arm_pashinyan.2.t: "[SOV.GetNamewithFlag] Confió en nosotros"
 arm_pashinyan.2.d: "[FROM.GetNameWithFlag] aceptó nuestra posición y también nos confirmó que no nos veían como su enemigo."
 arm_pashinyan.2.a: "Bueno"
 arm_pashinyan.3.t: "[SOV.GetNamewithFlag] No confía en nosotros"
 arm_pashinyan.3.d: "[FROM.GetNameWithFlag] dijo que nuestra política exterior es una amenaza para ellos y que nuestro intento de hacerles cambiar de opinión es solo una tapadera para nuestra cooperación con los enemigos de [SOV.GetNamewithFlag]."
 arm_pashinyan.3.a: "Mal"
 arm_pashinyan.5.t: "Gente Nos Apoya"
 arm_pashinyan.5.d: "Hace dos años nos comprometimos a mejorar la vida de nuestros ciudadanos y la hemos cumplido con éxito. Ahora la gente nos apoya plenamente."
 arm_pashinyan.5.a: "Bueno"
 arm_pashinyan.6.t: "¿Recuerdan Nuestras Promesas?"
 arm_pashinyan.6.d: "Inesperadamente, la gente recordó nuestras palabras de que mejoraríamos su calidad de vida. Ahora solo nos queda justificar este fracaso con otras razones."
 arm_pashinyan.6.a: "Creímos que podríamos prescindir de gastar demasiado dinero..."
 arm_pashinyan.7.t: "Controversias en la Constitución"
 arm_pashinyan.7.d: "Hay varios artículos contradictorios en nuestra Constitución que nos impiden establecer relaciones diplomáticas normales con nuestros vecinos."
 arm_pashinyan.7.a: "Vale"
 arm_pashinyan.8.t: "Rivales en el Poder"
 arm_pashinyan.8.d: "Serzh Sargsyan y Robert Kocharyan amenazan nuestro poder porque podrían volver al poder. Necesitamos socavar su autoridad."
 arm_pashinyan.8.a: "Realizar una investigación completa"
 arm_pashinyan.8.b: "Bastará una simple calumnia política."
 arm_pashinyan.9.t: "Cuestión del Sistema Político"
 arm_pashinyan.9.d: "Ahora que nuestro programa político ha alcanzado la mayoría de sus objetivos, debemos decidir cómo avanzaremos hacia el futuro. Podemos seguir adhiriéndonos a los principios democráticos o podemos limitar un poco las libertades políticas."
 arm_pashinyan.9.a: "No debemos perder el control"
 arm_pashinyan.9.b: "Prometimos al pueblo democracia y la cumpliremos."
 arm_pashinyan.10.t: "Discurso Antibielorruso en el Parlamento"
 arm_pashinyan.10.d: "\"Declaro que, de ahora en adelante, no volveré a Bielorrusia mientras el presidente Alexander Lukashenko esté en Bielorrusia. Y, en general, declaro que, de ahora en adelante, ningún representante oficial de Armenia irá a Bielorrusia. En absoluto.\""
 arm_pashinyan.10.a: "Odio la patata"
 arme.35.t: "Dilema de la OTSC"
 arme.35.d: "La OTSC ha demostrado ser ineficaz para nuestro país, ya que nuestros aliados nominales se niegan a ayudarnos contra los azerbaiyanos, quienes violan constantemente nuestra integridad territorial. Debemos decidir qué hacer con nuestro estatus en la OTSC."
 arme.35.a: "¡Rasga los papeles y di adiós!"
 arme.35.b: "Quizás deberíamos congelar la membresía."
 arme.36.t: "¡[ARM.GetNameWithFlag] Abandona OTSC!"
 arme.36.d: "Recientemente, la parte armenia anunció su intención de abandonar la OTSC y está tramitando la documentación para una salida completa de la organización. Esto afectará considerablemente nuestra influencia en la región."
 arme.36.a: "¡Rueda como una salchicha!"
 arme.37.t: "¡[ARM.GetNameWithFlag] congela la membresía de OTSC!"
 arme.37.d: "Recientemente, Armenia anunció su intención de suspender su membresía en la OTSC, pero no ha tramitado la salida completa de la organización. Quizás se trate de una decisión política que afecta a la política interna de su país."
 arme.37.a: "¿Eh?"
