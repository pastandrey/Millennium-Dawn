 ARM_army_category: "[ARM.GetFlag]Ejército Armenio"
 ARM_army_category_desc: "£text_icon_armarmy El Ejército de la [ARM.GetFlag]§YRepública de Armenia§! ha existido durante aproximadamente 10 años, y durante ese tiempo pudo pasar por toda la §Rguerra por la independencia§! de §Y[NKR.GetFlag]Artsaj§! en la lucha contra §Y[AZE.GetFlag]Azerbaiyán§!.\n\nPero debemos recordar que [ARM.GetFlag]§Ynuestro estado§! inevitablemente se enfrenta al problema de una repetición de estos eventos, y debemos estar §Gpreparados§!, al igual que £text_icon_armarmy nuestro ejército.\n\n§GCompletando§! se centra en la £text_icon_armarmy §Yrama militar§!, §Gunlock§! más y más de §Yideas nacionales§!, que se mostrarán a continuación."
