 arm_milit.1.t: "¡Armenia Pide Licencia Para Rifles!"
 arm_milit.1.d: "Recientemente, el gobierno armenio nos contactó para solicitarnos una licencia de producción para nuestros fusiles de asalto en su país. ¿Deberíamos aceptar esta oferta?"
 arm_milit.1.a: "¿Dónde firmamos?"
 arm_milit.1.b: "No, por supuesto."
 arm_milit.2.t: "¡[FROM.GetNamewithFlag] Acepta Nuestra Oferta!"
 arm_milit.2.d: "[FROM.GetNamewithFlag] aceptó nuestra oferta y nos proporcionará todos los documentos para la producción del rifle."
 arm_milit.2.a: "Maravilloso."
 arm_milit.3.t: "¡[FROM.GetNamewithFlag] Rechazó Nuestra Oferta!"
 arm_milit.3.d: "Rechazaron nuestra oferta y no nos proporcionarán ningún documento ni licencia para la producción de sus rifles."
 arm_milit.3.a: "Bruh."
 arm_milit.4.t: "Oferta de Orsis"
 arm_milit.4.d: "Recientemente, la empresa militar Orsis nos ha presentado una oferta para invertir en nuestro complejo militar-industrial. Podemos aceptar su oferta o perseguir objetivos políticos..."
 arm_milit.4.a: "¡Seguramente estamos de acuerdo!"
 arm_milit.4.b: "¡Tus cosas son para cazar, no para uso militar!"
 arm_milit.5.t: "Ejército de Artsaj se Está Integrando al Nuestro"
 arm_milit.5.d: "Las Fuerzas Armadas de la República de Artsaj están tomando medidas para integrarse en nuestro ejército, para una mejor interacción y cooperación de nuestras fuerzas armadas."
 arm_milit.5.a: "¡Genial!"
 arme.6.t: "¡[ARM.GetNamewithFlag]] pide Inversiones!"
 arme.6.d: "Nuestro viejo socio político y amigo, Robert Kocharyan, nos pide invertir en la economía armenia mediante un acuerdo mutuamente beneficioso. ¿Deberíamos aceptarlo?"
 arme.6.a: "¡Claro!"
 arme.6.b: "Lo siento, esta vez no."
 arme.7.t: "¡[SOV.GetNamewithFlag] Está de acuerdo!"
 arme.7.d: "Gracias a nuestras buenas relaciones con los dirigentes políticos rusos, ellos aceptaron invertir en nuestra economía y construir una fábrica civil en nuestro país."
 arme.7.a: "¡Maravilloso!"
 arme.8.t: "¡[SOV.GetNamewithFlag] Rechaza!"
 arme.8.d: "Lamentablemente, Rusia no se convenció de invertir en nuestra economía y firmar el acuerdo."
 arme.8.a: "Ugh."
 arme.9.c: "Renovar los Antiguos Edificios Históricos"
 arme.11.t: "¡Asesinato de Poghos Poghosyan!"
 arme.11.d: "Tras la reciente reunión entre Robert Kocharyan y Poghos Poghosyan, Poghos Poghosyan fue liquidado. Lo más probable es que el partido Dashnaktsutyun se enfurezca. Tenemos que decidir qué hacer con ellos..."
 arme.11.a: "Acerquemos a los leales ..."
 arme.11.b: "Ellos no sirven de nada."
 koch_union_stat_tt: "¡[ARM.GetNamewithFlag] se unirá al §GEstado de la Unión!§!"
 arme.15.t: "¡Oposición Gana Apoyo!"
 arme.15.d: "Debido a la falta de acción del gobierno de Kocharyan, la oposición ha aumentado su apoyo entre la población y se ha consolidado."
 arme.15.a: "¡Maldita sea!"
