 arm_foreign_legion.1.t: "Legión Extranjera Armenia"
 arm_foreign_legion.1.d: "Nos inspiramos en el ejemplo de la Legión Extranjera Francesa y decidimos crear una unidad similar en nuestro Ejército. Ahora que se trata del equipamiento técnico de la legión, pretendemos involucrar a especialistas franceses e indios para que nos ayuden en este asunto."
 arm_foreign_legion.1.a: "Genial"
 arm_foreign_legion.2.t: "Legión Extranjera Armenia"
 arm_foreign_legion.2.d: "Finalmente, se creó nuestra nueva unidad, la Legión Extranjera. Ahora, ciudadanos de otros países, entre otros, tienen la oportunidad de obtener nuestra ciudadanía sirviendo en la legión durante varios años y derramando su sangre por Armenia.."
 arm_foreign_legion.2.a: "Genial"
 arm_foreign_legion.3.t: "Legión Extranjera Armenia"
 arm_foreign_legion.3.d: "El gobierno armenio ofrece enviarnos su propia unidad, la Legión Extranjera. Afirman que son combatientes experimentados, con buen equipo técnico y entrenamiento de combate, y que sin duda serán útiles en la situación actual.."
 arm_foreign_legion.3.a: "Los Dejaremos Entrar."
 arm_foreign_legion.3.b: "No es Interesante"
 arm_foreign_legion.4.t: "Nuestra Legión Extranjera"
 arm_foreign_legion.4.d: "[From.GetName] ha aceptado acoger a nuestra legión extranjera en su territorio para estabilizar la situación actual en el país, y estamos muy satisfechos con nuestra cooperación.."
 arm_foreign_legion.4.a: "Bien"
 arm_foreign_legion.5.t: "Nuestra Legión Extranjera"
 arm_foreign_legion.5.d: "[From.GetName] se negó a aceptar nuestra legión extranjera en su territorio, considerando su presencia innecesaria."
 arm_foreign_legion.5.a: "Triste"
 arm_foreign_legion.6.t: "Nuestra Legión Extranjera"
 arm_foreign_legion.6.d: "Los soldados de nuestra legión extranjera han cumplido su tarea y regresan a su patria.."
 arm_foreign_legion.6.a: "Bienvenido a Casa"
