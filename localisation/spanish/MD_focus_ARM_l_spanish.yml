 arm_economic.2.t: "Destino del Banco HSBC"
 arm_economic.2.d: "El banco HSBC opera en nuestro territorio desde los años 90, ahora que nuestra economía se está recuperando, es hora de decidir qué hacer con este banco, porque ahora estamos listos para prescindir de tantas empresas extranjeras como antes."
 arm_economic.2.a: "Ardshinbank comprará sucursales bancarias."
 arm_economic.2.b: "Déjenlos quedarse en Armenia."
 arm_economic.3.t: "Destino de YCRDI"
 arm_economic.3.d: "El Instituto de Investigación Científica de Máquinas Matemáticas de Ereván, un famoso instituto fundado durante la era soviética, se encuentra actualmente en decadencia y es importante que decidamos su futuro. Rusia ofrece adquirir su propiedad, o invertiremos en la reorganización de la Universidad con nuestros propios recursos."
 arm_economic.3.a: "Aceptaremos la oferta de Moscú."
 arm_economic.3.b: "Nosotros salvaremos el Instituto."
 arm_economic.4.t: "Destino de VEON"
 arm_economic.4.d: "VEON está lista para entrar de lleno en el mercado de telecomunicaciones de nuestro país, pero tenemos la opción de adquirirla y transferirla a nuestro operador nacional. ¿Cuál es nuestra prioridad: la inversión extranjera o el apoyo a las empresas nacionales?"
 arm_economic.4.a: "No los toquemos."
 arm_economic.4.b: "Compraremos sus activos."
 arm_economic.5.t: "Central Térmica de Hrazdan"
 arm_economic.5.d: "La central térmica de Hrazdan es la mayor de nuestro país; lamentablemente, ha llegado el momento de decidir su destino. O la ponemos completamente bajo el control de la empresa rusa Gazprom, o invertimos nuestros propios recursos en su mantenimiento."
 arm_economic.5.a: "Dejemos que Gazprom se encargue."
 arm_economic.5.b: "Seguiremos invirtiendo."
 arm_economic.6.t: "Destino de Shoghakn"
 arm_economic.6.d: "La planta de Shoghakn se estableció en 1971, y ahora está en manos de una empresa israelí creada por nuestro compatriota. Debemos decidir si invertiremos en la planta o se la cederemos a un propietario privado."
 arm_economic.6.a: "Que se lo lleven."
 arm_economic.6.b: "Seguiremos Invirtiendo."
 arm_economic.7.t: "Planta de Energía Nuclear"
 arm_economic.7.d: "Nuestro país se enfrenta a la disyuntiva de a quién confiar la construcción de una nueva central nuclear. ¿Rusia, Estados Unidos o quizás nosotros mismos nos arriesgaremos a invertir dinero en un proyecto tan complejo?"
 arm_economic.7.a: "Estados Unidos puede manejarlo."
 arm_economic.7.b: "Rusia es experta en Esto."
 arm_economic.7.c: "Los armenios son verdaderos científicos nucleares."
 arm_economic.8.t: "Quiebra de la Planta de Shoghakn"
 arm_economic.8.d: "El propietario de la planta de Shoghakn ha anunciado oficialmente que la planta cerrará debido a la quiebra.."
 arm_economic.8.a: "¿Cómo permitimos que esto sucediera?"
 arm_economic.9.t: "Combinación de Cobre y Molibdeno de Zangezur"
 arm_economic.9.d: "Ahora debemos decidir su futuro, pues necesita ser reconstruido por completo. Rusia ofrece hacerlo a sus expensas y obtener el control, o lo reconstruiremos nosotros mismos."
 arm_economic.9.a: "Lo podemos manejar."
 arm_economic.9.b: "Démosle esto a Rusia."
 arm_economic.10.t: "ErAZ"
 arm_economic.10.d: "Era un fabricante de automóviles armenio en Ereván, Armenia, conocido principalmente por producir la furgoneta RAF-977K de 1966 a 1996. Los planes para establecer la fábrica ErAZ surgieron el 31 de diciembre de 1964, por el Consejo de Ministros de la República Socialista Soviética de Armenia. El destino de la planta está en juego, o la privatizamos para un inversor ruso, o la reconstruimos por nuestra cuenta."
 arm_economic.10.a: "Lo podemos manejar."
 arm_economic.10.b: "Démosle esto a Rusia."
 arm_economic.11.t: "Cervecería Kotayk"
 arm_economic.11.d: "Cervecería Kotayk fue fundada en 1974 como empresa estatal por el gobierno de la República Socialista Soviética de Armenia, con una escala de producción limitada. Tras completar la instalación completa, la fábrica inició la producción a gran escala en 1978. Tras la disolución de la Unión Soviética, Gagik Tsarukyan se hizo cargo de la cervecería en 1995 y comenzó a producir cerveza bajo las marcas Kotayk y Artsakh. En 1997, el Grupo Castel se convirtió en el accionista mayoritario de la cervecería con una inversión de 17 millones de dólares estadounidenses, siendo uno de los primeros inversores extranjeros en Armenia. Ahora debemos decidir si privatizar la planta o subordinarla al Estado."
 arm_economic.11.a: "Lo podemos manejar."
 arm_economic.11.b: "Lo renunciaremos a la privatización."
 arm_economic.12.t: "Fábrica de Brandy Ararat de Ereván"
 arm_economic.12.d: "Fábrica de Brandy Ararat de Ereván, oficialmente conocida como la fábrica de brandy, vino y vodka Ararat de Ereván, comúnmente conocida por su famosa marca Noy, es una empresa líder en producción de brandy armenio en Ereván, Armenia. La fábrica se encuentra en un estado lamentable y un inversor privado quiere restaurarla privatizándola por completo, o el estado se hará cargo de la famosa fábrica."
 arm_economic.12.a: "Lo podemos manejar."
 arm_economic.12.b: "Lo renunciaremos a la privatización."
 arm_economic.13.t: "Compañía de Brandy de Ereván"
 arm_economic.13.d: "Compañía de Brandy de Ereván, conocida por su famosa marca \"ArArAt\", es la empresa líder en Armenia en la producción de coñac. Fue fundada en 1887, durante el Imperio Ruso. Tras la sovietización de Armenia, la fábrica se convirtió en una empresa estatal. En 1999, el gobierno de la Armenia independiente vendió la fábrica a la empresa francesa Pernod Ricard de bebidas destiladas. La variedad de coñacs de la compañía se etiqueta y publicita como ArArAt. Quizás cambiemos de decisión y tomemos el control de esta planta, o finalmente decidamos dejarla en manos de un inversor francés."
 arm_economic.13.a: "Nos haremos cargo de la fábrica."
 arm_economic.13.b: "Que se queden con los franceses."
 arm_economic.14.t: "ErAZ"
 arm_economic.14.d: "Lamentablemente, la planta de ErAZ no pudo competir en el mercado global y tuvo que declararse en quiebra. ¿Deberíamos considerar nuestro propio intento de reactivarla?"
 arm_economic.14.a: "No."
 arm_economic.14.b: "Lo podemos manejar."
 arm_economic.15.t: "Nuevos Actores en el sector de TI Doméstico"
 arm_economic.15.d: "Nuestra industria de TI se ha renovado con nuevas empresas que darán crecimiento a nuestro sector de TI."
 arm_economic.15.a: "Sí."
 arm_economic.16.t: "Nuevos Actores en el sector de TI Doméstico"
 arm_economic.16.d: "Nuestra industria de TI se ha renovado con nuevas empresas que darán crecimiento a nuestro sector de TI."
 arm_economic.16.a: "Sí."
 arm_economic.17.t: "Sucursal de la UEM en Armenia"
 arm_economic.17.d: "La Universidad Estatal de Moscú ha acordado con el Ministerio de Educación de Armenia abrir su sucursal en este país, ahora los ciudadanos armenios podrán tener amplio acceso a los programas de esta universidad rusa."
 arm_economic.17.a: "¡Genial!"
 arm_economic.17.b: "Está bien."
 arm_economic.18.t: "Apertura de TUMO"
 arm_economic.18.d: "Tumo se concibió originalmente como un centro de educación postsecundaria para adolescentes. Sam Simonyan, empresario estadounidense de origen armenio, y Silva Simonyan fueron los fundadores del centro. Ahora, nuestro sistema educativo se ha ampliado con otra magnífica institución. La gran inauguración del Centro Tumo tuvo lugar y estuvo acompañada de un concierto de los músicos de rock Serge Tankian y Dorians."
 arm_economic.18.a: "Genial."
 arm_economic.19.t: "Universidad Americana de Armenia"
 arm_economic.19.d: "La Universidad Americana de Armenia se fundó en la década de 1990, pero con la finalización del Edificio Paramaz Avedisyan, ahora es una estructura completamente terminada. Los ciudadanos armenios tienen acceso a la interacción con los estándares estadounidenses del sistema educativo y podrán recibir una educación estadounidense completa.."
 arm_economic.19.a: "Genial"
 arm_economic.19.b: "Está bien."
 arm_economic.20.t: "ERASMUS+ en Armenia"
 arm_economic.20.d: "Armenia se ha unido al programa ERASMUS+ y ha iniciado un intercambio completo de estudiantes con instituciones educativas europeas, especialmente con las francesas y alemanas, líderes en el programa de intercambio."
 arm_economic.20.a: "¡Genial!"
 arm_economic.20.b: "Está bien."
 arm_economic.21.t: "Escuela Ayb"
 arm_economic.21.d: "Desde su creación, la Fundación Educativa Ayb ha implementado cursos de materias avanzadas para estudiantes de secundaria, ha establecido laboratorios educativos modernos en escuelas de diferentes regiones de Armenia, ha organizado competiciones internacionales de escuelas favoritas en Armenia y Artsaj, ha realizado capacitaciones para docentes, ha desarrollado una metodología de enseñanza, ha traducido algunos de los mejores libros de texto del mundo al armenio, ha desarrollado y probado sistemas de uniformidad de educación y gestión de la estructura educativa, etc. Con base en los cinco años de experiencia de todos estos programas e iniciativas educativas, se decidió establecer una nueva escuela armenia que cumpla con todos los requisitos educativos modernos y se base en los mejores logros de la escritura armenia."
 arm_economic.21.a: "¡Genial!"
 arm_economic.22.t: "Cambridge en Armenia"
 arm_economic.22.d: "Armenia ha iniciado una cooperación con la Universidad de Cambridge para permitir que los ciudadanos armenios reciban educación británica y la disfruten en igualdad de condiciones que otros estudiantes británicos."
 arm_economic.22.a: "¡Genial!"
 arm_economic.22.b: "Está bien."
 arm_economic.23.t: "AmeriaBank"
 arm_economic.23.d: "AmeriaBank es el banco más antiguo de Armenia. Gracias al desarrollo del sistema bancario, podrá tener un impacto más positivo en el desarrollo de nuestra economía."
 arm_economic.23.a: "¡Genial!"
 arm_economic.1.t: "La Cuestión del Tabaco"
 arm_economic.1.d: "Las empresas tabacaleras ocupan un gran nicho en la economía de nuestro estado, lamentablemente se sienten demasiado bien, además, algunos países extranjeros pueden influir en nuestro país a través de ellas, tal vez sea hora de resolver el problema con ellas."
 arm_economic.1.a: "Los volveremos a comprar."
 arm_economic.1.b: "Utilizaremos a la Policía para Capturar."
 arm_economic.1.c: "Estamos utilizando fuerzas especiales del ejército para capturar."
 arm_economic.1.f: "Acepte su soborno."
 NKR_economy_start: "Economía En El Nuevo Milenio"
 NKR_economy_start_desc: "Nuestra hermosa región está entrando en un nuevo milenio, recientemente obtuvimos la independencia y todavía estamos lidiando con el posconflicto y la guerra por nuestra independencia."
 NKR_economy_police: "Reorganización Policial"
 NKR_economy_police_desc: "Tenemos la intención de llevar a cabo una reforma importante de la policía, expulsar de allí a todos los que aceptan sobornos y también actualizar completamente el personal."
 NKR_economy_corruption: "Expulsar a los Funcionarios Corruptos"
 NKR_economy_corruption_desc: "A todos los que aceptan sobornos se les dará un ultimátum, nadie escapará de la justicia, tenemos la intención de purgar completamente las agencias gubernamentales de los que aceptan sobornos.."
 NKR_economy_nalog: "Reforma Fiscal"
 NKR_economy_nalog_desc: "Reduciremos la cantidad de impuestos que pagan nuestros ciudadanos, aliviando la carga de la deuda sobre nuestra economía.."
 NKR_economy_construction: "Facilitar la Emisión de Licencias de Construcción"
 NKR_economy_construction_desc: "Queremos facilitar el trámite de licencias de construcción. ¡Dejen de saturar a los ciudadanos con burocracia! Si pueden, ¡que construyan!"
 NKR_economy_land: "Distribución de Tierras Sin Propietario"
 NKR_economy_land_desc: "Estamos dispuestos a distribuir literalmente tierras a nuestros ciudadanos para que puedan crear en ellas cualquier cosa, incluido su propio negocio."
 NKR_economy_selhoz: "Apoyo a los Productores Agrícolas"
 NKR_economy_selhoz_desc: "El sector agrícola siempre será una de nuestras industrias más grandes y tenemos la intención de apoyarlo financieramente siempre."
 NKR_economy_antimonopol: "Disolver las Autoridades Antimonopolio"
 NKR_economy_antimonopol_desc: "Disolveremos la autoridad antimonopolio, no hay necesidad de regular la competencia en nuestro pequeño estado."
 NKR_economy_gas: "Llevar a Cabo la Gasificación"
 NKR_economy_gas_desc: "Realizaremos un programa de gasificación a gran escala en toda la república para que los ciudadanos siempre tengan acceso al gas!"
 NKR_economy_fermers: "Reducir Impuestos Para Los Agricultores"
 NKR_economy_fermers_desc: "Queremos estimular aún más la industria agrícola y por eso pretendemos reducir los impuestos para todos aquellos involucrados en actividades agrícolas."
 NKR_economy_copper_gold: "Inversiones En Cobre Y Oro"
 NKR_economy_copper_gold_desc: "Puede que no haya muchos recursos en nuestra república, pero tenemos la intención de utilizar incluso los que tenemos en beneficio de la economía."
 NKR_economy_gornaya: "Industria Minera"
 NKR_economy_gornaya_desc: "Tenemos la intención de invertir en la industria minera, porque incluso en nuestra posición, podemos desarrollar fácilmente recursos en el territorio de nuestra república."
 NKR_economy_support_local: "Apoyo A Los Productores Locales"
 NKR_economy_support_local_desc: "El apoyo a nuestro fabricante es la principal prioridad de nuestro programa económico, no podemos depender de productos importados en grandes cantidades."
 NKR_economy_invest_climate: "Fomento Del Clima De Inversión"
 NKR_economy_invest_climate_desc: "Aunque somos escépticos respecto de los productos fabricados en el extranjero, seguiremos intentando crear un clima de inversión, y las inversiones no serán superfluas."
 NKR_economy_forest: "Industria Forestal"
 NKR_economy_forest_desc: "Necesitamos fuentes adicionales de combustible y energía. La industria forestal, como complemento a todas las demás, puede ser muy eficaz."
 NKR_economy_boring_10: "Crecimiento Del 10%"
 NKR_economy_boring_10_desc: "Nuestra economía está creciendo a un ritmo de aproximadamente el 10% anual, no el mayor crecimiento que nos gustaría, pero nuestros ciudadanos valoran esta estabilidad más que las promesas desmesuradas."
 NKR_safe_start: "En Defensa De Artsaj"
 NKR_safe_start_desc: "Nuestra patria está en constante peligro y debemos pensar en cómo proteger nuestras fronteras de los agresores, sin olvidar que no sólo nos protege una economía fuerte, sino también a nuestros valientes policías y soldados.."
 NKR_safe_army: "Ejército De Defensa De Artsaj"
 NKR_safe_army_desc: "El Ejército de Defensa de Artsaj fue la fuerza de defensa de la República separatista de Artsaj. Fundado en 1992, unió unidades de defensa previamente desorganizadas, formadas a principios de la década de 1990."
 NKR_planes: "Nuestros Aviones"
 NKR_planes_desc: "Nuestro ejército tiene una gran necesidad de aviones; debemos solicitarlos a Armenia."
 NKR_safe_special_forces: "Fuerzas Especiales De Artsaj"
 NKR_safe_special_forces_desc: "Además de los soldados comunes, como en cualquier ejército moderno, debemos tener fuerzas especiales en nuestras filas para llevar a cabo las tareas más peligrosas."
 NKR_safe_univer: "Colegio Militar Kristapor Ivanyan"
 NKR_safe_univer_desc: "Colegio Militar Kristapor Ivanyan era una institución educativa militar y universitaria con sede en Stepanakert y operada por el Ejército de Defensa de Artsaj."
 NKR_safe_anti_air: "Fuerza De Defensa Aérea"
 NKR_safe_anti_air_desc: "Por analogía con las Fuerzas Armadas de Armenia, también crearemos nuestras propias fuerzas de defensa aérea."
 NKR_safe_mo_ra: "Universidad De Aviación Militar Armenak Khanperyants"
 NKR_safe_mo_ra_desc: "Tenemos la intención de enviar a nuestros cadetes a estudiar en esta universidad armenia, porque la clave de un ejército fuerte es personal militar entrenado."
 NKR_safe_vazgen: "Universidad Militar Vazgen Sargsyan"
 NKR_safe_vazgen_desc: "Tenemos la intención de enviar a nuestros cadetes a estudiar en esta universidad armenia, porque la clave de un ejército fuerte es personal militar entrenado."
 NKR_safe_aspar: "Aspar Arms"
 NKR_safe_aspar_desc: "Tenemos la intención de comprar los productos de esta empresa armenia para las necesidades de nuestras fuerzas armadas."
 NKR_safe_davisur: "Davisur"
 NKR_safe_davisur_desc: "Tenemos la intención de comprar los productos de esta empresa armenia para las necesidades de nuestras fuerzas armadas."
 NKR_safe_full_integrate_army: "Integración Total Con Las Fuerzas Armadas Armenias"
 NKR_safe_full_integrate_army_desc: "Tenemos la intención de fortalecer al máximo nuestra integración con las Fuerzas Armadas de Armenia, sólo allí nuestras fuerzas combinadas podrán repeler el ataque de cualquier enemigo."
 NKR_safe_mvd: "Ministerio Del Interior"
 NKR_safe_mvd_desc: "Además de las fuerzas armadas, nuestra seguridad también está protegida por la policía y los servicios de seguridad, no debemos olvidarnos de esto."
 NKR_safe_border_troops: "Tropas De Frontera"
 NKR_safe_border_troops_desc: "Necesitamos tropas fronterizas como el aire, nuestro enemigo no está dormido y nuestra frontera debe estar vigilada constantemente."
 NKR_safe_police_troops: "Tropas Policiales"
 NKR_safe_police_troops_desc: "Por analogía con los organismos encargados de hacer cumplir la ley en Armenia, también tenemos nuestras propias fuerzas policiales para proteger el orden interno en caso de emergencia."
 NKR_safe_nss: "Consejo De Seguridad Nacional De Artsaj"
 NKR_safe_nss_desc: "No es sólo la policía la que debe proteger al país, sino también los servicios especiales, y el servicio de seguridad nacional se encarga de ello con éxito."
 NKR_we_are_at_war: "¡Estamos En Guerra!"
 NKR_we_are_at_war_desc: "Azerbaiyán nos atacó, ¡ahora debemos luchar!"
 NKR_scorched_earth: "Tierra Quemada"
 NKR_scorched_earth_desc: "Debemos prepararnos para destruir parte de nuestra industria para que Azerbaiyán no pueda utilizarla."
 NKR_plant_minefields: "Sembrar Campos Minados"
 NKR_plant_minefields_desc: "Incluso si nos retiramos de algún territorio, debemos colocar minas por todas partes, para que no puedan atravesarlo fácilmente."
 NKR_final_defense: "Defensa Final"
 NKR_final_defense_desc: "Ha llegado la hora de la defensa final. Es mejor morir de pie que vivir de rodillas."
 ARM_landmines: "Minas Terrestres De Artsaj"
 mines_lostprov_tt: "¡Se colocarán minas terrestres en territorios perdidos!"
 NKR_last_defense: "Última Defensa"
 arm_dashnak.1.t: "Nuestra Alianza Con Kocharyan"
 arm_dashnak.1.d: "Kocharyan, incluso después de dejar la jefatura de Estado, ejerce una gran influencia en las élites y la sociedad armenias. Podríamos negociar con él y convencerlo, o podríamos llegar a un acuerdo definitivo."
 arm_dashnak.1.a: "¡Tenemos un nuevo amigo!"
 arm_dashnak.1.b: "Ni una oportunidad"
 arm_dashnak.2.t: "Armenia Desea Expandir La Cooperación Militar"
 arm_dashnak.2.d: "La delegación armenia nos ha informado oficialmente de su deseo de ampliar la cooperación militar entre nuestros países. En su opinión, esta medida es beneficiosa para ambas partes. ¿Deberíamos estar de acuerdo?"
 arm_dashnak.2.a: "¡Por supuesto!"
 arm_dashnak.2.b: "No nos interesa eso."
 arm_dashnak.3.t: "Rusia Ha Aceptado"
 arm_dashnak.3.d: "Las delegaciones rusa y armenia firmaron acuerdos para ampliar la cooperación militar, que incluirá ejercicios militares conjuntos próximamente. Este es un nuevo paso en las relaciones entre ambos países."
 arm_dashnak.3.a: "¡Impresionante!"
 arm_dashnak.4.t: "Rusia Se Ha Negado"
 arm_dashnak.4.d: "Rusia nos ha notificado su negativa. Según ellos, no están interesados ​​en desarrollar la cooperación militar con nosotros."
 arm_dashnak.4.a: "¡Encontraremos otro aliado!"
 ARM_in_between_empires: "Entre El Águila Y El León"
 ARM_in_between_empires_desc: "A lo largo de la historia, Armenia ha sido desgarrada por imperios que han intentado dominar su territorio. Los antiguos imperios han recibido nuevos nombres y apariencias, pero la esencia sigue siendo la misma. Tendremos que encontrar un lenguaje común con ellos para sobrevivir."
 ARM_relations_with_europe: "Relaciones Con Europa"
 ARM_relations_with_europe_desc: "Debemos centrarnos en las relaciones con Europa y determinar nuestras relaciones actuales y futuras con ella."
 ARM_relations_with_russia: "Relaciones Con Rusia"
 ARM_relations_with_russia_desc: "Mucha gente en Armenia tiene una opinión muy diversa sobre Rusia. Independientemente de la opinión pública, debemos construir nuestras relaciones con Rusia basándonos en nuestros intereses."
 ARM_partn_coop_agrem: "Asociación Y Cooperación"
 ARM_partn_coop_agrem_desc: "Estamos iniciando nuestro largo viaje de cooperación con la Unión Europea, y este acuerdo iniciará nuestro progreso para convertirnos en parte de una gran familia europea."
 ARM_open_action_plan: "Plan De Acción De Apertura"
 ARM_open_action_plan_desc: "Estamos más cerca que nunca en términos diplomáticos en la cooperación con la Unión Europea."
 ARM_arm_eu_compr_agre: "Acuerdo De Asociación Mejorada"
 ARM_arm_eu_compr_agre_desc: "Nuestra asociación con la Unión Europea está alcanzando niveles sin precedentes; quizá ya estemos a un paso de unirnos a una familia europea amistosa."
 ARM_join_council_of_europe: "Ingreso Al Consejo De Europa"
 ARM_join_council_of_europe_desc: "Tenemos la intención de cooperar con el Consejo de Europa, como uno de los organismos políticos europeos que reconocemos como importante, también para nosotros mismos."
 ARM_standing_comitee_eu_integr: "Comité Permanente De Integración Europea"
 ARM_standing_comitee_eu_integr_desc: "La integración en la Comunidad Europea es nuestro camino y tenemos la intención de ampliar nuestra participación en organizaciones, documentos y otros vínculos entre nosotros y la UE."
 ARM_open_up_for_ngos: "Apertura De Puertas Para ONGs"
 ARM_open_up_for_ngos_desc: "Tenemos la intención de permitir que las ONG europeas entren en nuestro país para mejorar el desarrollo de nuestra sociedad civil y democrática."
 ARM_instanbul_conventions_discuss: "Discusiones Sobre El Convenio De Estambul"
 ARM_instanbul_conventions_discuss_desc: "Es hora de decidir finalmente el destino de los ciudadanos LGBT en nuestro país."
 ARM_prep_article_fortynine: "Preparar A Armenia Para El Artículo 49"
 ARM_prep_article_fortynine_desc: "Por fin nos acercamos a la etapa hacia la que venimos avanzando desde hace mucho tiempo: quizá este año pasemos a formar parte de la Unión Europea."
 ARM_prop_against_west_values: "Propaganda Contra Los \"Valores Europeos\""
 ARM_prop_against_west_values_desc: "Los valores europeos del siglo XXI nos son ajenos y arrastrarán a nuestra sociedad del desarrollo a la degradación."
 ARM_closing_ngos: "Cierre De ONGs"
 ARM_closing_ngos_desc: "Las ONG europeas no tienen cabida en nuestro hermoso país, su influencia es demasiado dañina para nuestros ciudadanos."
 ARM_seizing_eu_funds: "Confiscación De Fondos De La UE"
 ARM_seizing_eu_funds_desc: "Las inversiones occidentales nos serán útiles, es hora de aprovecharlas."
 ARM_diplomatic_distance_eu: "Distanciamiento Diplomático De La UE"
 ARM_diplomatic_distance_eu_desc: "Pretendemos distanciarnos de la Unión Europea y dejar de tener relaciones muy amistosas con ellos."
 ARM_slander_pro_europ_parties: "Difamación De Partidos Proeuropeos"
 ARM_slander_pro_europ_parties_desc: "Todos los partidos proeuropeos deberían ser controlados y limitados en sus capacidades, y no se debería permitir que los propagandistas prooccidentales actúen con violencia en Armenia."
 ARM_close_integr_orgs: "Cierre De Todas Las Organizaciones De Integración"
 ARM_close_integr_orgs_desc: "Estamos poniendo fin a la cooperación con todas las organizaciones de integración europea, estamos hartos del estilo de vida europeo."
 ARM_negot_individ_trade_agreements: "Negociar Acuerdos Comerciales Individuales"
 ARM_negot_individ_trade_agreements_desc: "Tenemos la intención de llevar a cabo una interacción individual con los países de la UE, no reconocemos a la UE como representante de estos países en la política internacional."
 ARM_support_euroscept: "Apoyo Al Euroescepticismo"
 ARM_support_euroscept_desc: "El euroescepticismo es uno de los fundamentos de nuestra relación con Europa y seguirá siéndolo."
 ARM_levons_legacy: "El Legado del Rey Levon"
 ARM_levons_legacy_desc: "Los lazos fraternales entre Francia y Armenia han perdurado y continuarán a través de los años y cualquier problema"
 ARM_cultural_econ_fra: "Relaciones Culturales y Económicas"
 ARM_cultural_econ_fra_desc: "Francia y yo estamos unidos por muchos aspectos culturales e históricos y tenemos la intención de ampliar la cooperación con ellos en beneficio de ambos pueblos."
 ARM_french_educ_arm: "Educación Francesa en Armenia"
 ARM_french_educ_arm_desc: "La educación francesa está considerada como una de las mejores del mundo y tenemos la intención de abrir sedes de universidades francesas en nuestro país."
 ARM_military_coop_fra: "Cooperación Militar con Francia"
 ARM_military_coop_fra_desc: "Tenemos la intención de ampliar la cooperación entre las fuerzas armadas de Armenia y Francia a un nivel sin precedentes."
 ARM_francophonie_membership: "Membresía en la Francofonía"
 ARM_francophonie_membership_desc: "Tenemos la intención de formar parte de la Francofonía, lo que fortalecerá significativamente nuestros vínculos con Francia."
 ARM_armenia_eu_idea: "Armenia y la Unión Europea"
 ARM_eu_coop_agreement: "Acuerdo de Asociación y Cooperación"
 ARM_eu_council: "Consejo de Europa"
 ARM_eu_commitie: "Comité Permanente de Integración Europea"
 ARM_eu_ngos: "ONGs"
 ARM_eu_lgbt: "Postura Sobre la Comunidad LGBTQIA"
 ARM_eu_article_49: "Preparación para el Artículo 49"
 ARM_usa_ngo_leave_idea: "Salida de ONGs Americanas"
 ARM_usa_noembaracy_idea: "Cierre de la Embajada Americana"
 ARM_usa_embaracy_idea: "Expansión de la Embajada Americana"
 ARM_help_siryan_idea: "Ayuda del Ejército Armenio"
