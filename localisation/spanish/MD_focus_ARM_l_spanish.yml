 ARM_corrupt_military: "Militares Corruptos"
 ARM_corrupt_military_desc: "La corrupción en el ejército armenio es generalizada y asfixiante. Muchos generales participan en actividades externas para enriquecerse, vendiendo equipo militar y robando almacenes.\n\nEsta §Ridea§! será §Geliminada§! si nuestra §Rcorrupción§! está por debajo de $medium_corruption$."
