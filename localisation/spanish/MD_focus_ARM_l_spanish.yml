 ARM_assemble_meliq_union: "Formación De La Unión Meliq"
 ARM_assemble_meliq_union_desc: "La Unión Meliq es una organización aristocrática tradicionalista de Armenia. Debemos reunir a todos los miembros de esta organización para elegir un nuevo Tagavor."
 ARM_armeno_ari_union: "Unión Armeno-Aria"
 ARM_armeno_ari_union_desc: "La Unión Armeno-Aria es un partido político en Armenia que aboga por el retorno a las antiguas tradiciones paganas armenias y la restauración del Reino de Armenia tal como era durante la antigüedad."
 ARM_going_to_roots: "Volver A Nuestras Raíces"
 ARM_going_to_roots_desc: "Armenia es uno de los países más antiguos que han sobrevivido hasta nuestros días. No todos los pueblos lograron sobrevivir, pero fue nuestra nación la que recorrió un camino espinoso, que muchos no habrían superado. La fe de nuestros antepasados, sus gloriosas hazañas y tradiciones nos ayudaron a sobrevivir y a seguir luchando."
 ARM_glory_of_tigr: "Gloria De Tigranes El Grande"
 ARM_glory_of_tigr_desc: "¡Es hora de que Armenia se ponga de pie nuevamente y se una en torno a su nuevo y renacido reino, que debe alcanzar las alturas que alcanzó Tigranes el Grande e incluso superarlas!"
 ARM_state_christianity: "Cristianismo De Estado"
 ARM_state_christianity_desc: "La constitución de nuestro estado ya describe la importancia de la Iglesia Armenia en la vida de nuestro pueblo. Sin embargo, ha llegado el momento de integrarla en todos los aspectos de la vida."
 ARM_restoring_aspets: "Restauración De Los Aspets"
 ARM_restoring_aspets_desc: "Los Aspet Dziavors o Ayrudzis eran caballeros armenios que servían como guerreros leales a los tagavors o familias nobles armenias. Debemos restaurar este título en nuestro ejército, combinando las antiguas tradiciones con la guerra moderna."
 ARM_support_pan_iranists: "Ira Parta"
 ARM_support_pan_iranists_desc: "Nosotros, los armenios, somos lo único que queda del Imperio Arsácida, que en una desafortunada secuencia de acontecimientos fue destruido por los sasánidas. Ahora debemos decidir: ¿debemos aliarnos y unirnos con los persas o restaurar nuestra dinastía en Irán?"
 ARM_give_money_to_kob: "Apoyo Al KOB"
 ARM_give_money_to_kob_desc: "El partido conceptual KOB comparte valores muy similares a los nuestros. Debemos apoyar a nuestros hermanos de Rusia para crear un eje cohesionado de nuestros aliados en la región."
 ARM_supporting_chechens: "Apoyo A Ichkeria"
 ARM_supporting_chechens_desc: "Durante la primera guerra de Chechenia, Roland von Bagratuni mantuvo una conversación por correo con Dzhohar Dudaev, en la que ambos hablaron de la resistencia a Rusia y de las ambiciones pancaucásicas."
 ARM_crusader_legacy: "Legado Cruzado"
 ARM_crusader_legacy_desc: "Entre las buenas obras que el pueblo armenio ha realizado hacia la Iglesia y el mundo cristiano, cabe destacar especialmente que, cuando los príncipes y guerreros cristianos partieron para recuperar Tierra Santa, ningún pueblo ni nación acudió en su ayuda con el mismo entusiasmo, alegría y fe que los armenios, quienes proporcionaron a los cruzados caballos, provisiones y guía. Los armenios apoyaron a estos guerreros con su total valentía y lealtad durante las Guerras Santas. - Papa Gregorio XIII"
 ARM_our_old_realm: "Deuda De Edward"
 ARM_our_old_realm_desc: "El último rey de la Cilicia armenia, en su afán por convocar una nueva cruzada para la liberación de Armenia, visitó al rey de Inglaterra Eduardo III. Con la esperanza de restaurar el Reino de Cilicia, Levon puso el tesoro estatal bajo custodia, confiándolo al rey inglés. Las partes firmaron un acuerdo según el cual el tesoro se mantendría en Inglaterra hasta la liberación y restauración del Reino de Armenia. Es hora de exigir la devolución de nuestro dinero."
 ARM_renewed_nobility: "Nobleza Renovada"
 ARM_renewed_nobility_desc: "No sólo debemos integrar a la antigua nobleza, que podría dudar en cooperar con nosotros, sino también debemos crear una nueva casta de aristocracia a partir de nuestros comandantes militares."
 ARM_polish_hung_dilem: "Dilema Polaco"
 ARM_polish_hung_dilem_desc: "Roland von Bagratuni llegó a Armenia desde Polonia y está dispuesto a apoyar el movimiento monárquico en su primera patria."
 ARM_fate_of_italy: "Destino De Italia"
 ARM_fate_of_italy_desc: "La Casa de Saboya ostenta legítimamente el título de reyes de Italia. Debemos empezar a pensar en cómo unirnos con nuestra segunda corona."
 ARM_true_tseghakronism: "Verdadero Tseghakronismo"
 ARM_true_tseghakronism_desc: "Como monarquía recién establecida, debemos apoyar las ideas tseghakronistas ya que se alinean plenamente con nuestra dirección tradicionalista."
 ARM_new_religious_thought: "Nuevo Pensamiento Religioso"
 ARM_new_religious_thought_desc: "Los líderes de nuestro consejo consideran que está en el espíritu de nuestros ideales revivir la antigua fe nativa armenia e integrarla en nuestra sociedad."
 ARM_support_ossetia: "Apoyo A Osetia"
 ARM_support_ossetia_desc: "Osetia es uno de los pocos países del Cáucaso que no solo comparte nuestra sangre, sino que también los mismos ideales. Debemos apoyar su causa."
 ARM_pan_caucasianism: "Pan-Caucasismo"
 ARM_pan_caucasianism_desc: "La unificación de todo el Cáucaso bajo nuestra bandera es el objetivo de nuestro rey y su voluntad debe cumplirse."
 ARM_liberating_levant: "Liberación Del Levante"
 ARM_liberating_levant_desc: "Tal como lo hicieron nuestros antepasados ​​occidentales y armenios, debemos iniciar una nueva cruzada para liberar el Levante y restablecer los antiguos estados cruzados."
 ARM_true_urheimat: "Verdadera Urheimat"
 ARM_true_urheimat_desc: "Armenia es la verdadera patria de todos los indoeuropeos. Tal como lo declaró originalmente nuestro partido:\n\n Tierras Altas de Armenia,\n la Patria de los Armenios,\n Cuna de la Civilización Aria.\n Arios de todo el mundo,\n libérenla,\n libérense."
 arm_empire.2.t: "Unificación Con Nuestros Hermanos Armenios"
 arm_empire.2.d: "Es hora de unirnos y apoyar a nuestros hermanos armenios. Juntos construiremos un gran futuro, castigando a nuestros enemigos comunes y guiando a nuestros pueblos hacia la prosperidad."
 arm_empire.2.a: "Unámonos"
 arm_empire.2.b: "Así que crucemos los brazos."
 arm_empire.2.c: "Nosotros estamos en diferentes caminos"
 arm_empire.3.t: "Aceptaron Unificarse"
 arm_empire.3.d: "Nuestro sueño se ha hecho realidad y ahora los pueblos armenio y persa están unidos nuevamente."
 arm_empire.3.a: "Bueno"
 arm_empire.4.t: "Rechazaron Nuestra Oferta"
 arm_empire.4.d: "No pudimos convencerlos de unirse a nosotros."
 arm_empire.4.a: "Vale"
 arm_empire.5.t: "Elijeron Una Alianza Con Nosotros"
 arm_empire.5.d: "Decidieron que la mejor opción era convertirse en nuestro aliado de la alianza."
 arm_empire.5.a: "Bueno"
 arm_empire.6.t: "Armenia Ofrece Comprar [SOO.GetName]"
 arm_empire.6.d: "El gobierno armenio nos ha presentado hoy una propuesta inusual. Pretenden comprarnos el territorio de [SOO.GetName] por una suma considerable. Nos sorprende esta oferta; además, los diplomáticos armenios insinuaron claramente que su negativa traería consecuencias negativas."
 arm_empire.6.a: "¡Es absurdo!"
 arm_empire.6.b: "Estamos de Acuerdo"
 arm_empire.7.t: "Armenia Ofrece Comprar [SOO.GetName]"
 arm_empire.7.d: "El gobierno armenio nos ha presentado hoy una propuesta inusual. Pretenden comprarnos el territorio de [SOO.GetName] por una suma considerable. Nos sorprende esta oferta; además, los diplomáticos armenios insinuaron claramente que su negativa traería consecuencias negativas."
 arm_empire.7.a: "¡Es absurdo!"
 arm_empire.7.b: "Estamos de Acuerdo"
 arm_empire.8.t: "Armenia Ofrece Comprar"
 arm_empire.8.d: "El gobierno armenio ha establecido contacto diplomático con nosotros hoy con una propuesta muy inusual. Su intención es literalmente comprar nuestro país bajo su control por una suma muy elevada. La cantidad, por supuesto, se presentará de forma más diplomática en los medios oficiales, pero la cantidad que ofrecen es considerable, además de su patrocinio, a diferencia de Rusia, que lleva muchos años sin aceptarnos como parte de su país."
 arm_empire.8.a: "¡Delirio!"
 arm_empire.8.b: "Estamos de Acuerdo"
 arm_empire.9.t: "[SOO.GetName] Rechazó La Oferta"
 arm_empire.9.d: "Su gobierno rechazó nuestra generosa oferta. Bueno, parece que tendremos que buscar otras maneras de interactuar con ellos."
 arm_empire.9.a: "Triste"
 arm_empire.10.t: "Armenia Exige La Devolución Del Dinero"
 arm_empire.10.d: "Ahora que el Reino de Armenia ha sido restaurado, es hora de que cumplamos con los términos del antiguo tratado, según el cual el tesoro armenio almacenado en Gran Bretaña fue transferido allí mediante tratado en 1378. En caso de que Armenia obtenga la condición de Estado, el tesoro debe ser devuelto."
 arm_empire.10.a: "Cumplimos nuestras promesas"
 arm_empire.10.b: "Ésta no es la Armenia con la que se hizo el tratado."
 arm_empire.11.t: "Reino Unido Se Niega a Devolver El Dinero"
 arm_empire.11.d: "No es de extrañar que no se pueda confiar nada a los británicos, ni siquiera a nuestro dinero."
 arm_empire.11.a: "Haremos que nos devuelvan el dinero, pero no ahora."
 arm_empire.12.t: "Reino Unido Cumple Los Términos Del Tratado"
 arm_empire.12.d: "El gobierno británico ha acordado devolvernos nuestro dinero."
 arm_empire.12.a: "Quizás realmente podamos confiar en los británicos en tiempos de necesidad."
 arm_empire.13.t: "Armenia Cuestiona Nuestra Soberanía Sobre Los Territorios"
 arm_empire.13.d: "Era solo cuestión de tiempo para que una Armenia recién fortalecida decidiera recuperar el control de todos sus territorios. Solo podemos esperar que nuestro ejército pueda repeler la amenaza externa."
 arm_empire.13.a: "Una Nueva Cruzada Ha Comenzado"
 arm_empire.14.t: "Unificación Bajo Una Corona"
 arm_empire.14.d: "Ahora, después de que la Casa de Saboya llegó al poder en Armenia, tenemos la oportunidad de reunirnos bajo una sola corona."
 arm_empire.14.a: "Acordamos unirnos con Armenia"
 arm_empire.14.b: "Hablemos de integración"
 arm_empire.14.c: "No"
 arm_empire.15.t: "Italia Acepta Convertirse En Nuestro Territorio"
 arm_empire.15.d: "La corona italiana ha aceptado unirse a nosotros bajo la supremacía de nuestra Casa."
 arm_empire.15.a: "Perfecto"
 arm_empire.16.t: "Italia Rechazó Nuestra Oferta"
 arm_empire.16.d: "Italia rechazó nuestra oferta, mostrando así un grado extremo de falta de respeto hacia nosotros."
 arm_empire.16.a: "Sus problemas"
 arm_empire.17.t: "Italia Ofrece Unirse Bajo Su Bandera"
 arm_empire.17.d: "Italia nos ofrece formar parte de ella, lo que nos beneficiará enormemente económica y políticamente. Además, podremos preservar nuestra soberanía."
 arm_empire.17.a: "¿Quizas tu?"
 arm_empire.17.b: "Estamos de Acuerdo"
 arm_empire.18.t: "Armenia Rechaza Nuestra Propuesta Y Nos Ofrece Formar Parte De Ella"
 arm_empire.18.d: "Armenia nos invita a formar parte de ella. Podremos conservar parte de nuestra soberanía."
 arm_empire.18.a: "No"
 arm_empire.18.b: "Unámonos"
 arm_empire.19.t: "El Levantamiento En Chechenia"
 arm_empire.19.d: "La guerra ha resurgido en Chechenia. Según nuestra inteligencia, los rebeldes chechenos fueron patrocinados por los servicios especiales armenios para provocar un levantamiento. Parece que al gobierno armenio le interesa la inestabilidad en nuestro país."
 arm_empire.19.a: "La Tercera Guerra Chechena Ha Comenzado"
 arm_empire.20.t: "El Levantamiento En Chechenia"
 arm_empire.20.d: "La guerra ha resurgido en Chechenia. Según nuestra inteligencia, los rebeldes chechenos fueron patrocinados por los servicios especiales armenios para provocar un levantamiento. Parece que al gobierno armenio le interesa la inestabilidad en nuestro país."
 arm_empire.20.a: "La Tercera Guerra Chechena Ha Comenzado"
 arm_empire.21.t: "Unificación Bajo Una Sola Bandera"
 arm_empire.21.d: "Ahora, después de que la Casa de Saboya llegó al poder en Armenia, tenemos la oportunidad de reunirnos bajo una sola bandera."
 arm_empire.21.a: "Acordamos unirnos con Armenia"
 arm_empire.21.b: "Hablemos de integración"
 arm_empire.21.c: "No"
 arm_empire.22.t: "Chechenia Acepta Convertirse En Nuestro Territorio"
 arm_empire.22.d: "El gobierno checheno ha aceptado unirse con nosotros bajo nuestra bandera."
 arm_empire.22.a: "Perfecto"
 arm_empire.23.t: "Chechenia Rechazó Nuestra Oferta"
 arm_empire.23.d: "Chechenia rechazó nuestra oferta, mostrando así un grado extremo de falta de respeto hacia nosotros."
 arm_empire.23.a: "Sus problemas"
 arm_empire.24.t: "Chechenia Ofrece Unirse Bajo Su Bandera"
 arm_empire.24.d: "Chechenia nos ofrece formar parte de ella, lo que nos beneficiará enormemente económica y políticamente. Además, podremos preservar nuestra soberanía."
 arm_empire.24.a: "¿Quizas tu?"
 arm_empire.24.b: "Estamos de Acuerdo"
 arm_empire.25.t: "Armenia Rechaza Nuestra Propuesta Y Nos Ofrece Formar Parte De Ella"
 arm_empire.25.d: "Armenia nos invita a formar parte de ella. Podremos conservar parte de nuestra soberanía."
 arm_empire.25.a: "No"
 arm_empire.25.b: "Unámonos"
 arm_empire.26.t: "La Guerra Civil Polaca"
 arm_empire.26.d: "Debido a los recientes acontecimientos y, de hecho, a la transferencia de poder a un gobierno títere proarmenio, no todas las fuerzas políticas coincidieron con esta postura de Polonia. ¡Muchos generales del ejército polaco, con el apoyo de partidos políticos occidentales, organizaron una rebelión contra nosotros!"
 arm_empire.26.a: "Dios Nos Salve"
 arm_empire.26.b: "De Repente"
 arm_empire.27.t: "La Guerra Civil Italiana"
 arm_empire.27.d: "En Italia, tras los acontecimientos, se desató inmediatamente una crisis política. Muchos en el país estaban descontentos con el régimen abiertamente títere que tomó el control del país. Como resultado, todo desembocó en un levantamiento armado liderado por fuerzas políticas prooccidentales."
 arm_empire.27.a: "Dios Nos Salve"
 arm_empire.27.b: "De Repente"
 arm_empire.28.t: "Apoyo Al Partido Conceptual 'Unidad'"
 arm_empire.28.d: "El sistema político ruso no nos deja muchas opciones en cuanto a qué favorito promover nuestros intereses políticos. Consideramos al gobierno actual como totalmente hostil a nuestro país, por lo que pretendemos promover nuestros intereses en Rusia a través de nuestro protegido."
 arm_empire.28.a: "¡Vamos!"
 arm_empire.29.t: "Financiamiento Continuo Al Partido Conceptual 'Unidad'"
 arm_empire.29.d: "Seguiremos apoyando económicamente a este partido, con la esperanza de que nuestras finanzas se amorticen en el futuro."
 arm_empire.29.a: "Está bien"
 arm_empire.30.t: "Destino Del Partido Conceptual 'Unidad'"
 arm_empire.30.d: "Es hora de decidir si vamos a avanzar hacia la final de nuestro gran plan para un cambio de poder en Rusia, o si vamos a continuar fortaleciendo nuestra influencia."
 arm_empire.30.a: "Todavía es temprano"
 arm_empire.30.b: "Ha llegado el momento"
 arm_empire.31.t: "Rebelión Del Partido Conceptual 'Unidad'"
 arm_empire.31.d: "Se han completado todos los preparativos y ahora sólo podemos esperar que nuestras finanzas se hayan gastado bien."
 arm_empire.31.a: "Ha llegado el momento"
 arm_empire.32.t: "El Partido Conceptual 'Unidad' Ha Tomado El Poder En Rusia"
 arm_empire.32.d: "El partido conceptual “Unidad”, liderado por Konstantin Petrov, tomó el poder en Rusia sin mucha resistencia, y la desunión política parece haber debilitado las defensas internas del país."
 arm_empire.32.a: "Nosotros estamos perdiendo el país."
 arm_empire.32.b: "¡Victoria!"
 arm_empire.33.t: "Rebelión Del Partido Conceptual 'Unidad'"
 arm_empire.33.d: "El Partido Conceptual \"Unidad\", liderado por Konstantin Petrov, intentó tomar el poder en Moscú mediante un golpe de Estado, pero los servicios especiales lograron impedirlo. Desafortunadamente, el partido contaba con muchos partidarios en las regiones, lo que provocó levantamientos en todo el país."
 arm_empire.33.a: "Nosotros estamos perdiendo el país."
 arm_empire.33.b: "Victoria Parcial"
 arm_empire.34.t: "La Rebelión Del Partido Conceptual 'Unidad' Ha Fracasado"
 arm_empire.34.d: "El Partido Conceptual \"Unidad\", liderado por Konstantin Petrov, intentó tomar el poder en Moscú mediante un golpe de Estado, pero los servicios especiales lograron impedirlo. Además, todos los simpatizantes de su partido en las regiones fueron arrestados, y todo transcurrió pacíficamente."
 arm_empire.34.a: "Rusia Está A Salvo Otra Vez"
 arm_empire.34.b: "Hemos Perdido"
 arm_empire_news.1.t: "La Guerra Civil Polaca"
 arm_empire_news.1.d: "Un gobierno proarmenio llegó al poder en Polonia, al que Armenia ha apoyado diligentemente durante muchos años. Sin embargo, no todas las fuerzas políticas del país estaban satisfechas con esta situación. Muchos generales, así como partidos políticos prooccidentales, organizaron una rebelión para derrocar al gobierno títere."
 arm_empire_news.1.a: "Pobre Polonia"
 arm_empire_news.2.t: "La Guerra Civil Italiana"
 arm_empire_news.2.d: "Hay una crisis en Italia. El gobierno proarmenio tomó el control del país y, como resultado, algunas fuerzas políticas entraron en un conflicto armado abierto con la autoridad política central del país."
 arm_empire_news.2.a: "Pobre Italia"
 arm_empire_news.3.t: "Disturbios En Las Regiones Rusas"
 arm_empire_news.3.d: "El partido conceptual \"Unidad\", dirigido por Konstantin Petrov, al no lograr tomar el poder en el Kremlin, aprovechándose de la debilidad de los servicios especiales regionales, organizó disturbios en algunas regiones de Rusia donde el partido tenía un alto apoyo."
 arm_empire_news.3.a: "Locura"
 arm_empire_news.4.t: "Estados Unidos De Armenia"
 arm_empire_news.4.d: "Hoy tuvo lugar un acontecimiento histórico en Armenia. El gobierno armenio anunció la creación de un estado completamente nuevo basado en principios y leyes radicalmente diferentes a los de su predecesor, los Estados Unidos de Armenia. Ahora Armenia es como Estados Unidos, pero ya en el Cáucaso: un acontecimiento verdaderamente asombroso."
 arm_empire_news.4.a: "OK... okay?"
 ARM_new_nobility_idea: "Nueva Nobleza"
 ARM_new_nobility_idea_desc: "La nueva aristocracia de nuestro Estado no son sólo las viejas casas restauradas a sus títulos, sino también una nueva y joven aristocracia militar."
 ARM_armenian_paganism_idea: "Hetanismo"
 ARM_armenian_paganism_idea_desc: "La Fe Nativa Armenia, también denominada Hetanismo, es un nuevo movimiento religioso Pagano moderno que se remonta a los sistemas de creencias históricos Precristianos y a las religiones étnicas de los Armenios."
 ARM_glory_of_tigran_idea: "Gloria de Tigran"
 ARM_crusade_legacy_idea: "Espíritu Cruzado"
 ARM_urheimat_restored_idea: "Restaurar la Urheimat"
 ARM_tseghakronism_one_idea: "Tseghakronismo"
 ARM_renewed_knighthood_idea: "Caballería Renacida"
 ARM_tseghakronism_two_idea: "Tseghakronismo"
 ARM_state_christianity_idea: "Todo Ciudadano es Cristiano"
 ARM_restore_armenian_empire_tt: "Ahora podremos §GIntegrar los Antiguos Territorios Armenios§!"
 ARM_house_elections_warning_tt: "§RDebemos tener Cuidado al Elegir al Jefe de la Casa§!"
 ARM_bagratuni_house_chosen_tt: "La §RCasa de Bagratuni§! se convertirá en la casa gobernante en el estado"
 ARM_savoya_house_chosen_tt: "¡La §YCasa de Saboya§! se Convertirá en la Casa Gobernante de Armenia!"
 ARM_liberating_levant_tt: "Podremos §RDespetar Sumisión§! de los §YPaíses de la Tierra Santa§!. §RTambién recibiremos Reclamaciones§! en su Territorio"
 ARM_kob_wait_tt: "Seguiremos §Raumentando§! la popularidad de los partidarios del Partido Conceptual \"Unidad\" en Rusia hasta que consideremos necesario iniciar una §Rrevolución§!"
 ARM_kob_go_tt: "El partido conceptual Unidad §Ylanzará§! un §Rintento de golpe de Estado§! en Rusia"
 ARM_legacy_of_fedayi: "Legado de los Fedayí"
 ARM_legacy_of_fedayi_desc: "Debemos venerar a los fedayís armenios que lucharon contra la tiranía turca en el siglo pasado. ¡Debemos prepararnos para la guerra, de lo contrario los turcos nos atacarán y nos masacrarán de nuevo!"
 ARM_end_to_democr: "Fin de la Democracia"
 ARM_end_to_democr_desc: "Es hora de dejar de crear ilusiones y destruir cualquier bastión de falsa democracia establecido en Armenia."
 ARM_bring_sefily: "Traer de Vuelta a Sefilyan"
 ARM_bring_sefily_desc: "Sefilyan era un devoto dashnak hasta que el ala emergente de nuestro partido empezó a apaciguar demasiado a Rusia. ¡Debemos unirnos de nuevo con el NDP!"
 ARM_venerate_nemesis: "Venerar la Operación Némesis"
 ARM_venerate_nemesis_desc: "La Operación Némesis fue un programa de la Federación Revolucionaria Armenia para asesinar tanto a los perpetradores otomanos del genocidio armenio como a los funcionarios de la República Democrática de Azerbaiyán más responsables de la masacre de armenios durante los Días de Septiembre de 1918 en Bakú."
 ARM_nzhdehs_thought: "Integrar el Pensamiento de Nzhdeh"
 ARM_nzhdehs_thought_desc: "Garegin Nzhdeh se separó de Dashnaks en algún momento, alejándose de nuestra agenda socialnacionalista. Sin embargo, debemos intentar integrar su pensamiento en nuestra filosofía y utilizar su imagen para la promoción del partido."
 ARM_soc_nationalism: "Social-Nacionalismo"
 ARM_soc_nationalism_desc: "En esencia, Dashnaktsutyun es un partido socialista y nacionalista armenio. Pase lo que pase en el siglo XX, debemos reforzar nuestra ideología y construir una nueva Armenia."
 ARM_just_like_eagle: "Como el Águila de Taron"
 ARM_just_like_eagle_desc: "Si seguimos utilizando la retórica nzhdeísta, podremos atraer a más nacionalistas armenios a nuestras filas y construir una sociedad verdaderamente nacional."
 ARM_harmonize_economy: "Armonizar la Economía"
 ARM_harmonize_economy_desc: "Debemos utilizar los sindicatos y la nacionalización de la industria para armonizar la economía quitando el capital de las manos de los capitalistas."
 ARM_scout_movem_ref: "Reformar el Movimiento Scout"
 ARM_scout_movem_ref_desc: "El movimiento scout armenio cuenta con el patrocinio y apoyo de los dashnaks desde hace mucho tiempo. Ahora debemos militarizarlos y entrenar a los jóvenes futuros combatientes."
 ARM_militarized_society: "Sociedad Militarizada"
 ARM_militarized_society_desc: "Nuestra sociedad debe ser un gran ejército, un ejército de gente con espíritu dedicado a aplastar a nuestros enemigos."
 ARM_incr_contr_diaspora: "Aumentar el Control en la Diáspora"
 ARM_incr_contr_diaspora_desc: "A lo largo de su historia de confrontación con Turquía y en la cuestión de la supervivencia del pueblo, los armenios han dependido de la cooperación conjunta entre comunidades grandes y pequeñas. Los grupos guerrilleros voluntarios, así como la influencia de la diáspora centrada en la presión política, son la clave de la prosperidad de Armenia."
 ARM_first_republic_decl: "Heredero de la Primera República"
 ARM_first_republic_decl_desc: "¡Somos los legítimos herederos de la República de Armenia y es nuestro deber sagrado devolver todas las tierras de nuestro país!"
 ARM_lebanon_coup: "Apoyo a los Dashnaks Libaneses"
 ARM_lebanon_coup_desc: "La comunidad armenia es bastante activa políticamente en el Líbano. Podemos apoyar a la rama de nuestro partido en el Líbano para que dé un golpe de Estado."
 ARM_prevail_of_east_looking_ideas: "Prevalencia de las Ideas Orientales"
 ARM_prevail_of_east_looking_ideas_desc: "No debemos buscar solo nuestra agenda política. ¡Debemos cooperar con todos para combatir la influencia occidental!"
 ARM_review_all_with_koch: "Renovar nuestra Alianza con Kocharyan"
 ARM_review_all_with_koch_desc: "Kocharyan ha mantenido a nuestro partido bajo el control de sus ambiciones políticas durante mucho tiempo. Ahora, en el poder, podemos decidir qué utilidad tiene para nosotros. Kocharyan tiene una gran influencia en la política armenia. Podemos utilizarlo como una herramienta para ganar influencia en Armenia."
 ARM_ishkhan_saghat: "Postura de Ishkan Saghatelyan"
 ARM_ishkhan_saghat_desc: "Ishkhan Saghatelyan Assistance es mucho más moderado en cuanto a las políticas socialistas, aunque es muy famoso por sus declaraciones prorrusas."
 ARM_leftwing_origins: "Abrazar los Orígenes de Izquierda"
 ARM_leftwing_origins_desc: "Debemos recordar las raíces de nuestro partido y volver a las ideas del Marxismo con características Armenias."
 ARM_marxist_thought_integr: "Integrar el Pensamiento Marxista"
 ARM_marxist_thought_integr_desc: "¡Debemos integrar nuevamente el pensamiento marxista en nuestra agenda socialnacionalista y construir un Estado verdaderamente revolucionario!"
 ARM_spirit_of_revol: "Espíritu de Revolución"
 ARM_spirit_of_revol_desc: "Debemos convertir a nuestro país en la vanguardia de la revolución. ¡Revolución contra el imperialismo turco!"
 ARM_revol_selhoz: "Revolución Agrícola"
 ARM_revol_selhoz_desc: "Nuestro país necesita poder alimentarse, todavía hay muchas tierras sin utilizar para las necesidades agrícolas, ¡es hora de arreglarlo!"
 ARM_seize_oligs_stuff: "Confiscar los Bienes de los Oligarcas"
 ARM_seize_oligs_stuff_desc: "¡Los oligarcas deben ser subyugados por nuestro estado y sus bienes deben ser nacionalizados!"
 ARM_letter_to_russia: "Carta a Rusia"
 ARM_letter_to_russia_desc: "¡Debemos mostrarle a Rusia que ahora no está sola en su resistencia al Occidente liberal!"
 ARM_soc_welfare: "Estado de Bienestar Social"
 ARM_soc_welfare_desc: "La nueva agenda política armenia debe ser un estado de bienestar social pleno, donde todos los ciudadanos reciban apoyo."
 ARM_hold_oligs_gunpoint: "Mantener a los Oligarcas bajo Amenaza"
 ARM_hold_oligs_gunpoint_desc: "Tal vez no deberíamos ser tan radicales con los oligarcas y nacionalizar todos sus activos, pero debemos asegurarnos de que sus impuestos sean altos y que rindan suficientes cuentas."
 ARM_pkk_negotiat: "Ayudar al PKK"
 ARM_pkk_negotiat_desc: "¡La lucha de nuestros hermanos kurdos debe ser apoyada y venerada! Debemos poner todo nuestro esfuerzo en apoyar su causa."
 ARM_union_states: "Propuesta del Estado de la Unión"
 ARM_union_states_desc: "Finalmente, podemos intentar unirnos al proyecto de estado de unión para nuestra prosperidad futura."
 ARM_armenia_dashnak_idea: "Armenia Dashnak"
 ARM_dashnak_mitia_idea: "Nuevas Milicias Dashnaks"
 ARM_legacy_of_nzhden: "Legado de Nzhdeh"
 ARM_anti_imperialism: "Antiimperialismo"
 ARM_dashnak_militarism: "Militarismo Dashnak"
 ARM_dashnak_increase_economic_growth_tt: "§YSu crecimiento económico aumentará§!"
 ARM_great_trial_radi: "Prepararse para el Gran Juicio"
 ARM_class_strugle: "Lucha de Clases Armenia"
 ARM_arm_revolt_dashnak: "Revolución Armenia"
 ARM_arm_revolt_selhoz: "Revolución Agrícola"
