 karabakh.1.t: "[ARM.GetNamewithFlag] ¡Atacó Nuestras Posiciones!"
 karabakh.1.d: "Las tropas de Nagorno-Karabaj y Armenia comenzaron a bombardear nuestras posiciones frente a la frontera con la República de Nagorno-Karabaj, aún no reconocida. Nuestras tropas intentan repeler el ataque enemigo."
 karabakh.1.a: "¡Maldita sea!"
 karabakh.2.t: "[ARM.GetNamewithFlag] ¡Gana el Enfrentamiento!"
 karabakh.2.d: "En un reciente tiroteo entre unidades armenias y azerbaiyanas, los armenios salieron victoriosos, infligiendo grandes pérdidas al lado azerbaiyano."
 karabakh.2.a: "El conflicto persiste"
 karabakh.3.t: "[ARM.GetNamewithFlag] ¡Pierde el Enfrentamiento!"
 karabakh.3.d: "En un reciente tiroteo entre unidades armenias y azerbaiyanas, los azerbaiyanos salieron victoriosos, infligiendo grandes pérdidas al lado armenio."
 karabakh.3.a: "El conflicto persiste"
 karabakh.4.t: "¡El Enfrentamiento Termina en Empate!"
 karabakh.4.d: "Tras el reciente ataque de las fuerzas armenias a posiciones azerbaiyanas, el tiroteo terminó en empate y no hubo cambios en las posiciones."
 karabakh.4.a: "El conflicto persiste"
 karabakh.5.t: "[AZE.GetNamewithFlag] ¡Atacó Nuestras Posiciones!"
 karabakh.5.d: "Las tropas azerbaiyanas comenzaron a bombardear nuestras posiciones frente a la frontera con Azerbaiyán. Nuestras tropas intentan repeler el ataque enemigo."
 karabakh.5.a: "¡Maldita sea!"
 karabakh.6.t: "[AZE.GetNamewithFlag] ¡Gana el Enfrentamiento!"
 karabakh.6.d: "En un reciente tiroteo entre unidades armenias y azerbaiyanas, los azerbaiyanos salieron victoriosos, infligiendo grandes pérdidas al lado armenio."
 karabakh.6.a: "El conflicto persiste"
 karabakh.7.t: "[AZE.GetNamewithFlag] ¡Pierde el Enfrentamiento!"
 karabakh.7.d: "En un reciente tiroteo entre unidades armenias y azerbaiyanas, los armenios salieron victoriosos, infligiendo grandes pérdidas al lado azerbaiyano."
 karabakh.7.a: "El conflicto persiste"
 karabakh.8.t: "¡Operación de Reconocimiento con Drones Exitosa!"
 karabakh.8.d: "Recientemente, nuestros drones de reconocimiento han llevado a cabo una operación exitosa y han reunido una cantidad significativa de información sobre el enemigo."
 karabakh.8.a: "¡Genial!"
 karabakh.9.t: "Dron Derribado"
 karabakh.9.d: "Nuestros esfuerzos de reconocimiento aéreo fueron detectados por el enemigo, nuestro dron fue derribado por un afortunado disparo de MANPAD y ahora se perdió una valiosa pieza de equipo."
 karabakh.9.a: "¡**** ellos!"
 karabakh.101.t: "Dron Enemigo Derribado"
 karabakh.101.d: "Recientemente, un dron de reconocimiento UAV enemigo fue derribado por un disparo fortuito de un MANPAD. La misión de reconocimiento de nuestros enemigos fracasó y perdieron un valioso equipo."
 karabakh.101.a: "¡Genial!"
 karabakh.10.t: "Nuestra Postura Final sobre las Negociaciones de los 90"
 karabakh.10.d: "En la década de los noventa, Azerbaiyán, reconociendo nuestra victoria, accedió a reconocer Artsaj si a cambio le cedíamos la región de Hadrut. Ceder territorios a cambio del reconocimiento puede ser un buen acuerdo, pero nuestras fuerzas internas podrían estar muy descontentas con él. Este acuerdo también podría destruir nuestra capacidad de albergar ambiciones políticas..."
 karabakh.10.a: "Debemos estar de acuerdo. Es una solución más orientada al futuro."
 karabakh.10.b: "No podemos permitir la entrega de territorios."
 karabakh.11.t: "[ARM.GetNamewithFlag] ¡Acepta Nuestras Condiciones de los 90!"
 karabakh.11.d: "En su reciente declaración, la parte armenia aceptó nuestras antiguas condiciones, según las cuales la región de Hadrut nos es transferida a cambio de nuestro reconocimiento de la República de Nagorno-Karabaj. El conflicto se resolverá por completo y firmaremos un pacto de no agresión con Armenia. Cabe considerar que, actualmente, Armenia nos supera considerablemente en poder militar."
 karabakh.11.a: "Maravilloso, estamos de acuerdo con estos términos!"
 karabakh.11.b: "También necesitamos un corredor a través de Meghri..."
 karabakh_news.2.t: "¡Resolución del Conflicto de Nagorno-Karabaj!"
 karabakh_news.2.d: "Tras muchos años de disputa sin resolver, Armenia y Azerbaiyán lograron llegar a un acuerdo independiente sobre el conflicto de Nagorno-Karabaj y firmar la resolución correspondiente, que garantiza a ambas partes sus intereses. A qué conducirá este cambio en el Cáucaso Sur sigue siendo un misterio."
 karabakh_news.2.o1: "¿Paz en el Cáucaso?"
 karabakh.12.t: "[ARM.GetNamewithFlag] ¡Exige el Reconocimiento Total de Nagorno-Karabaj!"
 karabakh.12.d: "En su reciente declaración, la parte armenia negó nuestras antiguas condiciones, según las cuales la región de Hadrut nos es transferida a cambio de nuestro reconocimiento de la República de Nagorno-Karabaj. Exigen el pleno reconocimiento de la República de Nagorno-Karabaj sin cambios territoriales. Cabe considerar que, actualmente, Armenia nos supera considerablemente en poder militar. Por ahora."
 karabakh.12.a: "Ganaremos a largo plazo. Subamos la apuesta en las próximas negociaciones."
 karabakh.12.b: "¿Tal vez...aceptar su propuesta?"
 karabakh.13.t: "[AZE.GetNamewithFlag] ¡Rechaza Nuestra Oferta!"
 karabakh.13.d: "Azerbaiyán rechazó nuestras condiciones de negociación y pospuso la discusión sobre las nuevas condiciones hasta la próxima reunión."
 karabakh.13.a: "Preparémonos entonces."
 karabakh.14.t: "Nuestra Nueva Postura"
 karabakh.14.d: "Tras la primera ronda de negociaciones infructuosas, finalmente estamos listos para reconsiderar nuestra postura sobre el proceso de negociación. ¿Deberíamos exigir el paso por Zangezur o deberíamos ceder en nuestra posición negociadora?"
 karabakh.14.a: "Presentarles nuestras nuevas exigencias."
 karabakh.14.b: "Reconozcamos Nagorno-Karabaj."
 karabakh.15.t: "[AZE.GetNamewithFlag] ¡Presenta Nuevas Exigencias!"
 karabakh.15.d: "Recientemente, el gobierno de Azerbaiyán nos presentó un nuevo conjunto de exigencias para el reconocimiento de Artsaj. Siguen queriendo que entreguemos Hadrut, pero ahora quieren un corredor a través de Syunik para conectarla con Nakhijevan. ¿Deberíamos aceptar estas nuevas condiciones?"
 karabakh.15.a: "¡Estos términos son inaceptables!"
 karabakh.15.b: "Suena bastante razonable."
 karabakh.16.t: "[ARM.GetNamewithFlag] ¡Rechaza Nuestra Oferta!"
 karabakh.16.d: "Armenia rechazó nuestros términos de negociación y pospuso la discusión sobre nuevos términos hasta la próxima reunión."
 karabakh.16.a: "Preparémonos entonces."
 karabakh.17.t: "Nueva Postura de Negociación"
 karabakh.17.d: "Tras la anterior ronda de negociaciones, que concluyó sin éxito, deberíamos reconsiderar nuestras exigencias a Armenia. Considerando nuestro fortalecimiento a nivel mundial, también deberíamos exigir la región de Karvachar a cambio del reconocimiento de Nagorno-Karabaj como parte de Armenia. Esta nos parece la postura más ventajosa."
 karabakh.17.a: "Presentar los nuevos términos a Armenia."
 karabakh.17.b: "Abandonemos Karabaj por completo..."
 karabakh.18.t: "¡Nuevos Términos de [AZE.GetNamewithFlag]!"
 karabakh.18.d: "Recientemente, Azerbaiyán nos presentó nuevas exigencias para el reconocimiento de Artsaj como nuestro territorio. Ahora, exigen Karvachar y Hadrut a cambio de reconocer Stepanakert como territorio de Armenia. Considerando el fortalecimiento de Azerbaiyán, esto puede representar un gran problema para nosotros."
 karabakh.18.a: "¡Estos términos son inaceptables!"
 karabakh.18.b: "Nosotros debemos rendirnos ..."
 karabakh.19.t: "[ARM.GetNamewithFlag] ¡Rechaza Nuestra Oferta!"
 karabakh.19.d: "Armenia rechazó nuestros términos de negociación y pospuso la discusión sobre nuevos términos hasta la próxima reunión."
 karabakh.19.a: "Preparémonos entonces."
 karabakh.20.t: "Intento de Comprar Tierras de Nagorno-Karabaj Con Dinero"
 karabakh.20.d: "Tras negociaciones infructuosas, quizás deberíamos ofrecerles dinero para comprarles estas tierras. Sería una decisión acertada si aceptaran. ¿Deberíamos intentarlo? Esta es la última oportunidad para un acuerdo pacífico."
 karabakh.20.a: "Presentar los nuevos términos a Armenia."
 karabakh.20.b: "Abandonemos Karabaj por completo..."
 karabakh.21.t: "¡Nueva Oferta de [AZE.GetNamewithFlag]!"
 karabakh.21.d: "Azerbaiyán nos ofreció recientemente dinero (15.000 millones de dólares) a cambio de Karvachar y Hadrut. ¿Deberíamos aceptar estas nuevas condiciones?"
 karabakh.21.a: "¡Por supuesto!"
 karabakh.21.b: "Estamos dispuestos a pagarles la misma suma si reconocen a Artsaj."
 karabakh.22.t: "¡Contraoferta de [ARM.GetNamewithFlag]!"
 karabakh.22.d: "Están dispuestos a darnos 15 mil millones de dólares si abandonamos Nagorno-Karabaj por completo. ¿Deberíamos aceptar?"
 karabakh.22.a: "Mmm, ¿por qué no?"
 karabakh.22.b: "Nos veremos en el campo de batalla."
 karabakh.23.t: "[AZE.GetNamewithFlag] ¡Rechaza Nuestra Oferta!"
 karabakh.23.d: "Azerbaiyán ha rechazado nuestra propuesta. A pesar de las promesas de continuar las negociaciones, existen motivos fundados para creer que no habrá más negociaciones."
 karabakh.23.a: "Es su problema, no el nuestro."
 karabakh.24.t: "[ARM.GetNamewithFlag] ¡Ha Reconocido y Anexionado Nagorno-Karabaj!"
 karabakh.24.d: "Armenia, en un acto de agresión inesperado, declaró la anexión completa de Nagorno-Karabaj y su reconocimiento. ¡Consideramos esto un acto de agresión total e incondicional!"
 karabakh.24.a: "¡Adelante, al Ataque!"
 karabakh_news.3.t: "Segunda Guerra de Nagorno-Karabaj"
 karabakh_news.3.d: "Debido a los recientes acontecimientos, Azerbaiyán lanzó una ofensiva a gran escala contra el territorio de la República de Nagorno-Karabaj, aún no reconocida. A pesar de la invasión directa de Azerbaiyán, el territorio de Nagorno-Karabaj fue ocupado por fuerzas armenias, lo que da a Azerbaiyán la impresión de que la agresión proviene del lado armenio."
 karabakh_news.3.o1: "Son tiempos oscuros."
 karabakh.25.t: "¡Oportunidad en Nagorno-Karabaj!"
 karabakh.25.d: "La guerra en Nagorno-Karabaj lleva tanto tiempo que ha alterado el equilibrio de poder en la región. Quizás deberíamos aprovechar esto y desplegar nuestras fuerzas de paz en Artsaj, obligando a Armenia a ceder territorio. Esto aumentará nuestra influencia sobre Armenia y Azerbaiyán. ¿Deberíamos hacerlo?"
 karabakh.25.a: "¡Por supuesto!"
 karabakh.25.b: "Esto no es asunto nuestro."
 karabakh.26.t: "[SOV.GetNamewithFlag] ¡Exige una Resolución para Karabaj!"
 karabakh.26.d: "Rusia considera que la guerra ha ido demasiado lejos y que debemos negociar un alto el fuego entre ambas partes. ¿Deberíamos estar de acuerdo?"
 karabakh.26.a: "Claro..."
 karabakh.26.b: "¡No!"
 karabakh.27.t: "[FROM.GetNamewithFlag] ¡Rechaza la Propuesta de Alto el Fuego!"
 karabakh.27.d: "[FROM.GetNamewithFlag] rechaza nuestra propuesta de alto el fuego. Les hemos impuesto sanciones, pero nuestra influencia sobre ellos ha disminuido."
 karabakh.27.a: "¡Bastardos!"
 karabakh.28.t: "[SOV.GetNamewithFlag] ¡Exige una Resolución para Karabaj!"
 karabakh.28.d: "Rusia considera que la guerra ha ido demasiado lejos y debemos negociar un alto el fuego entre ambas partes. Azerbaiyán ya lo aceptó. ¿Deberíamos aceptarlo?"
 karabakh.28.a: "Claro..."
 karabakh.28.b: "¡Lucharemos hasta el final!"
 karabakh_news.4.t: "¡Alto el Fuego en Nagorno-Karabaj!"
 karabakh_news.4.d: "Gracias a los esfuerzos diplomáticos de Rusia, el reciente conflicto en Nagorno-Karabaj se detuvo con la firma de un alto el fuego entre Armenia y Azerbaiyán. ¿Se mantendrá la paz en el Cáucaso Sur o estos cambios serán efímeros?"
 karabakh_news.4.o1: "Paz al fin."
 karabakh.29.t: "¡Segunda Ofensiva en Nagorno-Karabaj!"
 karabakh.29.d: "Ha llegado el momento de atacar de nuevo Nagorno-Karabaj y tomar todo lo que queda."
 karabakh.29.a: "¡Adelante!"
 arm_reaction.1.t: "Georgia Ha Anexionado Abjasia"
 arm_reaction.1.d: "El gobierno georgiano, sin hacernos caso, logró subyugar a Abjasia y anunciar el inicio de su integración a su estado. Nos indigna profundamente que simplemente nos ignoraran y nos confrontaran con este hecho. Es hora de decidir cómo responderemos a este acto que viola nuestros intereses geopolíticos."
 arm_reaction.1.a: "Crearemos una Distracción."
 arm_reaction.1.b: "Provocaremos un Levantamiento en Abjasia."
 arm_reaction.1.c: "Expresemos Nuestra Indignación."
 arm_reaction.1.f: "Declarar la Guerra a Georgia."
 arm_reaction.2.t: "¡Rusia Ha Orquestado un Sabotaje!"
 arm_reaction.2.d: "En respuesta a la anexión de Abjasia a nuestro estado, Rusia decidió llevar a cabo una acción de represalia, saboteando nuestra estructura política y tratando de sacudir al público sobre varios temas dolorosos."
 arm_reaction.2.a: "¡Qué Patético!"
 arm_reaction.3.t: "El Motín en Abjasia"
 arm_reaction.3.d: "Rusia no pudo aceptar nuestra reunificación con Abjasia y logró reunir fuerzas leales a su ejército y dar un golpe de Estado. Entre otras cosas, Rusia anuncia el inicio de una guerra contra nosotros; parece que pretenden destruirnos por nuestro deseo de ver a Georgia unida."
 arm_reaction.3.a: "¡Maníacos!"
 arm_reaction.4.t: "El Golpe Prorruso"
 arm_reaction.4.d: "Los servicios especiales rusos lograron dar un golpe de Estado en nuestra república y tomar el poder. Ahora no solo estamos bajo control ruso, sino que también estamos involucrados en una guerra con Georgia, a la que Rusia le ha declarado la guerra."
 arm_reaction.4.a: "Entre Dos Fuegos"
 arm_reaction.5.t: "Rusia Expresa su Descontento"
 arm_reaction.5.d: "Rusia expresa su profundo descontento por la resolución del problema abjasio sin su participación. Puede que nuestras relaciones con Rusia se hayan deteriorado para siempre, pero ahora tenemos a Abjasia, y esto es mucho más importante para nosotros."
 arm_reaction.5.a: "¡Que Lloren!"
 arm_reaction.6.t: "Armenia Anuncia el Fin de la Ocupación Rusa"
 arm_reaction.6.d: "El gobierno armenio anunció hoy que, al no estar ya bajo nuestra ocupación, nuestras empresas y nuestras tropas deben abandonar Armenia inmediatamente o serán expulsados ​​por la fuerza. Este acto de agresión por su parte no debe pasar desapercibido para nosotros."
 arm_reaction.6.a: "Crearemos una Distracción."
 arm_reaction.6.b: "Organizaremos un Motín."
 arm_reaction.6.c: "Expresemos Nuestra Indignación."
 arm_reaction.6.f: "Declarar la Guerra a Armenia."
 arm_reaction.7.t: "¡Rusia Ha Orquestado un Sabotaje!"
 arm_reaction.7.d: "¡Rusia no puede aceptar que hayamos dejado de ser una marioneta y que las fuerzas del FSB hayan organizado un sabotaje político para intentar cambiar la situación, pero de todos modos nos mantendremos firmes!"
 arm_reaction.7.a: "¡Qué Patético!"
 arm_reaction.8.t: "Motín Prorruso"
 arm_reaction.8.d: "Nuestra retirada de la esfera de influencia rusa ofendió profundamente a su gobierno, pero subestimamos el alcance de su influencia en nuestro país. Fueron capaces de organizar un motín de fuerzas leales a ellos dirigido contra nosotros."
 arm_reaction.8.a: "¡Qué Patético!"
 arm_reaction.9.t: "Rusia Expresa su Descontento"
 arm_reaction.9.d: "Rusia expresó su grave indignación y descontento por el hecho de que derrocáramos tan fácil y rápidamente a su gobierno títere."
 arm_reaction.9.a: "¡Que Lloren!"
 arm_reaction.10.t: "¡Guerra con Rusia!"
 arm_reaction.10.d: "Supusimos que Rusia no aceptaría perder el control sobre nosotros, pero están dispuestos a organizar un baño de sangre, ¡con tal de no dejarnos ir!."
 arm_reaction.10.a: "¡Maníacos!"
 arm_reaction.11.t: "Enviar al Grupo Wagner a Azerbaiyán"
 arm_reaction.11.d: "La represión en Armenia continúa y estamos listos para ampliar la zona de combate. El PMC Wagner está listo para ir a Azerbaiyán y comenzar una rebelión contra el gobierno armenio."
 arm_reaction.11.a: "¡Vamos!"
 arm_reaction.11.b: "No"
 arm_reaction.12.t: "Motín del Grupo Wagner en Azerbaiyán"
 arm_reaction.12.d: "Rusia sigue socavando la unidad de nuestro estado. Las PMC de Wagner fueron enviadas a Azerbaiyán para iniciar un levantamiento contra nosotros. Los rebeldes son pocos, pero los batallones de las PMC son perfectamente capaces de contraatacarnos."
 arm_reaction.12.a: "La Situación Empeora"
 arm_reaction.13.t: "Azerbaiyán Pide Reconocimiento"
 arm_reaction.13.d: "La rebelión en Azerbaiyán tuvo éxito, pero ahora su gobierno pide nuestro reconocimiento oficial, así como el establecimiento de nuestro protectorado, tal vez quieran protegerse de una posible derrota en la guerra con Armenia, pero entonces tendremos que involucrarnos en esta guerra."
 arm_reaction.13.a: "¡A la Guerra!"
 arm_reaction.13.b: "Nuestra Ayuda es Suficiente para Ellos."
 arm_reaction.14.t: "Armenia Apoya a Separatistas en el Cáucaso"
 arm_reaction.14.d: "Nuestros servicios especiales han establecido el hecho de que los servicios especiales armenios apoyan a los grupos separatistas en el Cáucaso, apoyando así plenamente la desestabilización de la situación en esta región con la ayuda de los servicios especiales armenios, es hora de responderles."
 arm_reaction.14.a: "Crearemos una Distracción."
 arm_reaction.14.b: "Apoyaremos el Separatismo en Sus Regiones."
 arm_reaction.14.c: "Expresemos Nuestra Indignación."
 arm_reaction.14.f: "Declarar la Guerra a Armenia."
 arm_reaction.15.t: "¡Rusia Ha Orquestado un Sabotaje!"
 arm_reaction.15.d: "Los servicios especiales rusos aparentemente lograron establecer el hecho de nuestra participación en el apoyo a los separatistas en el Cáucaso y decidieron responder inmediatamente saboteando nuestro sistema político."
 arm_reaction.15.a: "¡Qué Patético!"
 arm_reaction.16.t: "Rusia Apoya a los Separatistas"
 arm_reaction.16.d: "Los servicios especiales rusos apoyan activamente a elementos separatistas entre nuestros estados títeres, debilitando así nuestra influencia en la región."
 arm_reaction.16.a: "¡Qué Patético!"
 arm_reaction.17.t: "Rusia Expresa su Descontento"
 arm_reaction.17.d: "Rusia expresa su activa insatisfacción con nuestro apoyo al separatismo en su territorio."
 arm_reaction.17.a: "Que Lloren"
 arm_reaction.18.t: "¡Guerra con Rusia!"
 arm_reaction.18.d: "Rusia decidió responder radicalmente a nuestro apoyo a los separatistas en su región y nos declaró la guerra, inesperadamente."
 arm_reaction.18.a: "¡Maníacos!"
