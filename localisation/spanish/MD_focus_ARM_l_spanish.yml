 artsakh_focus: "Árbol de Enfoque de Artsaj"
 NKR_govern_category: "Sistema Estatal de Artsaj"
 NKR_govern_category_desc: "La República de Nagorno-Karabaj obtuvo su independencia en los años 90 como resultado de la guerra con Azerbaiyán, ahora nuestro pequeño estado debe avanzar por el camino del desarrollo de la prosperidad económica, o fortalecer las fuerzas armadas para repeler una invasión enemiga, que inevitablemente ocurrirá algún día."
