 effect_app_if_migr_lev_tt: "§YEfecto de Esta Decisión se Verá Cuando se Alcance al Menos un Nivel Bajo de Emigración§!"
 ARM_ask_diaspora_invest: "Pídele a §YDiaspora§! que §GInvierta§! en [ARM.GetNamewithFlag]"
 ARM_fix_water_yerevan: "Reparen las Tuberías de Agua en §YEreván§!"
 ARM_fix_water_gegharkunik: "Reparen las Tuberías de Agua en §YGegharkunik-Tavush§!"
 ARM_fix_water_syunik: "Reparen las Tuberías de Agua en §YSyunik§!"
 arme.191.t: "¡La Oposición Intenta Destituir a Kocharián!"
 arme.191.d: "Los líderes de la oposición han formado una coalición y ahora, además de protestar, intentan destituir a Kocharyan de su cargo presidencial. Ahora, todo depende de la lealtad de las élites gubernamentales a Kocharyan."
 arme.191.a: "¡Maldita sea!"
 arme.191.b: "Ellos no tuvieron oportunidad."
 oppos_killed: "Oposición Asesinada"
 oppos_lived: "La Oposición Vive"
 arme.192.t: "¡Raffi Hovhannisyan Crea el Partido Herencia!"
 arme.192.d: "Recientemente, se creó en Armenia el partido nacional-liberal Patrimonio. Fue fundado por el primer ministro de Asuntos Exteriores de Armenia, Raffi Hovhannisyan, quien ocupó este cargo durante el gobierno de Levon Ter-Petrosyan en la década de 1990. El partido considera que su principal objetivo es la formación de un Estado democrático legal y desarrollado que construya su política interior y exterior sobre la base de su interés nacional soberano."
 arme.192.a: "¿Un nuevo jugador?"
 ARM_protests: "Protestas de la Oposición"
 arme.193.t: "¡Protestas de la Oposición!"
 arme.193.d: "Demirchyan inició una protesta exigiendo el retiro de la autoridad en la Plaza de la Libertad, luego inició una manifestación hacia el Palacio Presidencial, pero la policía bloqueó el camino frente a la Asamblea Nacional."
 arme.193.a: "Suprimirlos por la fuerza."
 arme.194.t: "¡Soldado Armenio Asesinado en Hungría!"
 arme.194.d: "En Hungría, durante un ejercicio conjunto de países socios de la OTAN, en el que participaron soldados armenios y azerbaiyanos, el militar armenio Gurgen Margaryan fue asesinado. Desde el 11 de enero de 2004, Margaryan participaba en un curso de inglés de tres meses del programa de la Asociación para la Paz de la OTAN en Budapest. En la madrugada del 19 de febrero, fue asesinado. El asesino, el oficial azerbaiyano Ramil Safarov, golpeó al oficial armenio dormido en la cara 16 veces con un hacha, casi separándole la cabeza del cuerpo. Safarov fue detenido, pero su futuro aún es incierto. Se desconoce si será deportado a Azerbaiyán."
 arme.194.a: "¡Qué acto tan bárbaro!"
 arme.194.b: "¡Buen trabajo! ¡Debemos darle el título de héroe!"
 arme.195.t: "[AZE.GetNamewithFlag] ¡Nos Paga por Liberar a Safarov!"
 arme.195.d: "En Hungría, durante un ejercicio conjunto de países socios de la OTAN, en el que participaron soldados armenios y azerbaiyanos, el militar armenio Gurgen Margaryan fue asesinado. Desde el 11 de enero de 2004, Margaryan participaba en un curso de inglés de tres meses del programa de la Asociación para la Paz de la OTAN en Budapest. En la madrugada del 19 de febrero, fue asesinado. El asesino, el oficial azerbaiyano Ramil Safarov, golpeó al oficial armenio dormido en la cara 16 veces con un hacha, casi separándole la cabeza del cuerpo. Safarov fue detenido, pero su futuro aún es incierto. Se desconoce si será deportado a Azerbaiyán."
 arme.195.a: "¡El dinero siempre es bueno!"
 arme.196.t: "90 Años Desde el Genocidio Armenio"
 arme.196.d: "Hoy, el país está de luto por el 90.º aniversario del genocidio de armenios, griegos y asirios en la Turquía otomana. Millones de armenios en todo el mundo expresan su solidaridad con nosotros, al igual que los líderes de muchos países que han reconocido los crímenes de lesa humanidad cometidos por los otomanos."
 arme.196.a: "Que las víctimas descansen en paz."
 arme.197.t: "Creación del Comité de Investigación del Genocidio"
 arme.197.d: "Hoy, funcionarios del gobierno, representantes del Museo del Genocidio y representantes de la diáspora armenia y del clero se reunieron en Ereván para discutir la creación de un comité para estudiar el Genocidio Armenio."
 arme.197.a: "¡Buena Iniciativa!"
 arme.198.t: "¡Protestas Masivas en Ereván!"
 arme.198.d: "Una serie de disturbios antigubernamentales tuvieron lugar en Armenia. Las protestas estallaron en la capital armenia, Ereván, organizadas por partidarios del candidato presidencial y expresidente Levon Ter-Petrosyan y otros líderes de la oposición. Decenas de miles de manifestantes se manifestaron durante el día y cientos acamparon durante la noche."
 arme.198.a: "¡Suprimirlos!"
 arme.199.t: "¡La Protesta Alcanza Su Punto Máximo!"
 arme.199.d: "Las protestas han alcanzado tal nivel que la policía ya no puede resistir a la multitud con métodos pacíficos. El ejército está en alerta, la policía y los soldados listos para abrir fuego. Todos esperan la orden."
 arme.199.a: "¡Aplastémoslos con nuestro ejército!"
 arme.199.b: "No, los militares ya no son leales... ¡Debemos dimitir!"
 arme.200.t: "Transición de Poder a Serzh Sargsyan"
 arme.200.d: "Tras la represión de las manifestaciones y los acuerdos internos, Kocharyan está dispuesto a entregar el puesto de presidente a su sucesor elegido, Serzh Sargsyan."
 arme.200.a: "Genial"
 arme.200.b: "¡Esto no sucederá!"
 arme.201.t: "¡Protestas del Dashnaktsutyun!"
 arme.201.d: "En el contexto del inicio de las negociaciones entre Turquía y Armenia, el partido Dashnaktsutyun inició el proceso de salida de la coalición y protestó contra la decisión diplomática de Serzh Sargsyan."
 arme.201.a: "Malditos idiotas"
 arme.202.t: "¡La Oposición Exige la Liberación de los Presos!"
 arme.202.d: "Han comenzado las protestas en Ereván exigiendo la libertad de los activistas detenidos durante las manifestaciones. Las protestas no exigen ninguna reivindicación política. Sin embargo, es posible que la liberación de presos sea beneficiosa..."
 arme.202.a: "¡Vamos a liberarlos!"
 arme.202.b: "Mantenlos cerrados"
 arme.203.t: "Movimiento del Parque Mashtots"
 arme.203.d: "Debido a las decisiones del alcalde de Ereván, leal a nosotros, de demoler quioscos y zonas verdes en el parque Mashtots, se ha desatado un movimiento de protesta pacífica en Ereván. Exigen la preservación del estado actual del espacio público de la ciudad."
 arme.203.a: "Sus exigencias son razonables."
 arme.203.b: "¡Liberales idiotas!"
 arme.204.t: "¡Raffi Hovhannisyan Declara una Revolución!"
 arme.204.d: "Diversos grupos políticos y civiles están organizando protestas antigubernamentales en Armenia. Sin embargo, el líder del movimiento de protesta es claramente Raffi Hovhannisyan. Una multitud de sus partidarios se congregó en la Plaza de la Libertad de Ereván, donde Hovhannisyan instó al presidente Sargsyan a aceptar la victoria popular y reconocer su derrota. Tanto partidos prooccidentales como nacionalistas, como Dashnaks, se unen a la protesta."
 arme.204.a: "¡Suprimir las protestas!"
 arme.204.b: "Dales lo que quieren"
 arme.205.t: "¡Raffi Hovhannisyan Inicia una Huelga de Hambre!"
 arme.205.d: "Raffi, tras dirigirse a sus partidarios en la Plaza de la Libertad, Hovhannisyan anunció su decisión de iniciar una huelga de hambre. Instó al presidente electo Serzh Sargsyan a dimitir. Según Hovhannisyan, esto no es solo una huelga de hambre, sino un boicot contra las mentiras y el fraude."
 arme.205.a: "Al menos las protestas están disminuyendo."
 arme.206.t: "Partido Contrato Civil"
 arme.206.d: "Recientemente, un grupo de diversas figuras de la oposición anunció la creación de un nuevo partido integrado por exmiembros del Congreso Nacional Africano (CNA). El líder de este nuevo partido es Nikol Pashinyan, quien recientemente fue liberado de prisión tras ser detenido durante las protestas."
 arme.206.a: "¿Otro grupo?"
 arme.207.t: "Protestas de \"Ereván Eléctrica\""
 arme.207.d: "Ante el reciente intento del parlamento de aumentar las tarifas eléctricas, han comenzado protestas masivas en Ereván. La policía intenta dispersar a los manifestantes utilizando fuerza no letal y cañones de agua. ¿Deberíamos reconsiderar nuestra postura sobre las tarifas o dejar las cosas como están?"
 arme.207.a: "Abandonamos nuestro plan"
 arme.207.b: "¡Impulsa el cambio de tarifa!"
 arme.208.t: "¡Masacre de Gyumri!"
 arme.208.d: "Valery Permyakov, militar de la 102.ª base militar rusa ubicada en Gyumri, estaba de guardia nocturna. Alrededor de las 4 de la madrugada del 12 de enero, Permyakov, portando un fusil de asalto AK-74 y dos cargadores, abandonó sin permiso la ubicación de la unidad, o más precisamente, el puesto de guardia de los almacenes del RAV. El desertor se dirigió a la frontera entre Armenia y Turquía con la intención de cruzarla y desaparecer en Turquía. Poco después de su fuga, Permyakov decidió entrar en una de las casas ubicadas en la calle Myasnikyan, a unos 30 minutos a pie de la unidad militar rusa. Al entrar en el patio común por una puerta cerrada solo simbólicamente, Permyakov descubrió varias casas unifamiliares de una sola planta. El soldado, tras romper el marco de cristal de la puerta principal, entró en el edificio.\n\nPermyakov mató a todos los miembros de la familia Avetisyan que vivían en esta casa, incluidos los niños. Tras la masacre que cometió, Valery Permyakov, vestido con la ropa de los muertos y abandonando su ametralladora, abandonó la escena del crimen. A las 12:30 p. m., los vecinos encontraron los cuerpos de la familia Avetisyan.\n\nNos enfrentamos a un dilema: ¿deberíamos encargarnos de él nosotros mismos o entregar a esta escoria a Rusia?"
 arme.208.a: "¡Rusia le enseñará a este bastardo de Siberia cómo comportarse!"
 arme.208.b: "¡Ejecutar al Bastardo!"
 arme.209.t: "¡Masacre de Gyumri!"
 arme.209.d: "Valery Permyakov, militar de la 102.ª base militar rusa ubicada en Gyumri, estaba de guardia nocturna. Alrededor de las 4 de la madrugada del 12 de enero, Permyakov, portando un fusil de asalto AK-74 y dos cargadores, abandonó sin permiso la ubicación de la unidad, o más precisamente, el puesto de guardia de los almacenes del RAV. El desertor se dirigió a la frontera entre Armenia y Turquía con la intención de cruzarla y desaparecer en Turquía. Poco después de su fuga, Permyakov decidió entrar en una de las casas ubicadas en la calle Myasnikyan, a unos 30 minutos a pie de la unidad militar rusa. Al entrar en el patio común por una puerta cerrada solo simbólicamente, Permyakov descubrió varias casas unifamiliares de una sola planta. El soldado, tras romper el marco de cristal de la puerta principal, entró en el edificio.\n\nPermyakov mató a todos los miembros de la familia Avetisyan que vivían en esta casa, incluidos los niños. Tras la masacre que cometió, Valery Permyakov, vestido con la ropa de los muertos y abandonando su ametralladora, abandonó la escena del crimen. A las 12:30 p. m., los vecinos encontraron los cuerpos de la familia Avetisyan.\n\nArmenia ha sido muy generosa al no ejecutar a este monstruo. Parmyakov ahora deberá enfrentar un juicio y ser enviado a una prisión de máxima seguridad."
 arme.209.a: "Este bastardo se pudrirá en el infierno."
 arme.210.t: "¡Masacre de Gyumri!"
 arme.210.d: "Valery Permyakov, militar de la 102.ª base militar rusa ubicada en Gyumri, estaba de guardia nocturna. Alrededor de las 4 de la madrugada del 12 de enero, Permyakov, portando un fusil de asalto AK-74 y dos cargadores, abandonó sin permiso la ubicación de la unidad, o más precisamente, el puesto de guardia de los almacenes del RAV. El desertor se dirigió a la frontera entre Armenia y Turquía con la intención de cruzarla y desaparecer en Turquía. Poco después de su fuga, Permyakov decidió entrar en una de las casas ubicadas en la calle Myasnikyan, a unos 30 minutos a pie de la unidad militar rusa. Al entrar en el patio común por una puerta cerrada solo simbólicamente, Permyakov descubrió varias casas unifamiliares de una sola planta. El soldado, tras romper el marco de cristal de la puerta principal, entró en el edificio.\n\nPermyakov mató a todos los miembros de la familia Avetisyan que vivían en esta casa, incluidos los niños. Tras la masacre que cometió, Valery Permyakov, vestido con la ropa de los muertos y abandonando su ametralladora, abandonó la escena del crimen. A las 12:30 p. m., los vecinos encontraron los cuerpos de la familia Avetisyan.\n\nArmenia ha decidido ejecutar a Permyakov y no condenarlo a cadena perpetua en Rusia."
 arme.210.a: "Lo que hicieron es justo, pero va en contra de nuestros acuerdos legales. Esperemos que podamos superar esto..."
 arme.211.t: "Crisis de Rehenes en Ereván"
 arme.211.d: "Un grupo de hombres armados, autodenominados los Temerarios de Sasun, irrumpió en una comisaría de policía en Ereván, Armenia, y tomó nueve rehenes. Exigieron la liberación del líder opositor Jirair Sefilian y la dimisión del presidente. El grupo inició un enfrentamiento con las fuerzas gubernamentales, con una creciente multitud de manifestantes que se unieron a las exigencias de la dimisión del presidente. Dos policías murieron durante el enfrentamiento y decenas resultaron heridos; un policía falleció a causa de sus heridas tras el fin de la crisis. Varios de los atacantes también resultaron heridos. ¿Qué debemos hacer?"
 arme.211.a: "Negociar con ellos"
 arme.211.b: "¡Envíen al Servicio de Seguridad Nacional a asaltar el lugar!"
 arme.212.t: "¡Sasna Tsrer Se Rinde!"
 arme.212.d: "El grupo Sasna Tsrer decidió rendirse para evitar más derramamiento de sangre. A pesar de todos nuestros esfuerzos, la situación se resolvió de forma bastante pacífica."
 arme.212.a: "¡Gracias a Dios..."
 arme.213.t: "¡Asalto Exitoso de las Fuerzas Especiales!"
 arme.213.d: "Las fuerzas especiales irrumpieron con éxito en la comisaría, despejando la zona del terrorista político Sasna Tsrer. Todos los atacantes murieron. Ninguno de los rehenes resultó herido."
 arme.213.a: "¡Operación Maravillosa!"
 pavlik_dies: "Pavlik Manukyan Murió"
 arme.214.t: "¡Armen Sarkisián Se Convierte en Presidente!"
 arme.214.d: "Como parte de la reforma autocrática para fortalecer el gobierno de facto de Serge Sarkisian y establecer una república parlamentaria, Armen Sarkisian fue elegido presidente de Armenia. Sin vínculos claros con la antigua camarilla, puede contribuir enormemente a nuestra nueva imagen."
 arme.214.a: "Buen movimiento"
 arme.215.t: "Marcha de Protesta en Gyumri"
 arme.215.d: "El 31 de marzo, Nikol Pashinyan comenzó su caminata de protesta Im Qayl (mi paso), comenzando en la ciudad de Gyumri, planeando caminar por ciudades y pueblos como Vanadzor, Dilijan, Hrazdan y Abovyan, antes de llegar finalmente a Ereván."
 arme.215.a: "¿Otra protesta sin sentido?"
 arme.216.t: "Protestas Presidenciales Armenias"
 arme.216.d: "Encabezadas por Nikol Pashinyan, las protestas en Ereván han crecido a trescientos mil personas con actos de desobediencia civil como bloqueos de carreteras y bocinazos. La gente está demostrando que se ha cansado de la corrupción desenfrenada y exige una democracia real. Si el Partido Republicano de Serzh Sargsyan no dimite, será derrocado por la fuerza en una revuelta."
 arme.216.a: "Claro, claro..."
 arme.216.b: "¡Erradicar la protesta!"
 arme.217.t: "Revolución de Terciopelo"
 arme.217.d: "A raíz de una serie de protestas políticas en Armenia, el llamado partido reaccionario \"conservador\" de Armenia, liderado por Serzh Sargsyan, ha dimitido y ha dejado que el pueblo elija a Nikol Pashinyan para el cargo, quien se ha comprometido a destruir la corrupción desenfrenada que afecta a Armenia, mejorar su situación económica y detener la emigración masiva."
 arme.217.a: "¡Dukhov!"
 arme.218.t: "Nikol Pashinián Nombra al Próximo Ministro de Defensa"
 arme.218.d: "El primer ministro de Armenia, Nikol Pashinyan, anunció que nombrará a Davit Tonoyan, ministro interino de Situaciones de Emergencia, como ministro de Defensa. A pesar de su dudosa reputación y sus posibles vínculos corruptos, David Tonoyan se distingue por su retórica nacionalista y expansionista, que podría apaciguar a los nacionalistas del país."
 arme.218.a: "Interesante"
 arme.219.t: "Partido del Acuerdo Nacional Pan-Armenio"
 arme.219.d: "Recientemente se formó un nuevo partido en Armenia. La alianza aboga por la democracia directa, la abolición de la Presidencia, el fortalecimiento de la soberanía de Armenia, la continuación del desarrollo económico del país, el establecimiento de medios de comunicación independientes, la gratuidad de la educación universitaria, el fomento de la repatriación de la diáspora armenia, la protección de los derechos de las minorías étnicas y apoya el concepto de la Armenia wilsoniana y la unificación de Artsaj con Armenia."
 arme.219.a: "Interesante."
 arme.220.t: "El Partido del Movimiento Conservador Nacional 5165"
 arme.220.d: "El Partido del Movimiento Conservador Nacional 5165 se fundó recientemente y Karin Tonoyan fue elegida presidenta. El número en el nombre del partido representa la altura del monte Ararat. En esencia, este partido está formado por exmilitares, familiares de militares y personas que apoyan el régimen militar en Armenia."
 arme.220.a: "Interesante."
 arme.221.t: "Elegir al Verdadero Bagratuni"
 arme.221.d: "La Unión Meliq se ha reunido para elegir al nuevo monarca: ¿quién será?"
 arme.221.a: "Roland von Bagratuni"
 arme.221.b: "Ter Ashot Bagratuni"
 arme.222.t: "[ARM.GetNamewithFlag] ¡Se une al §GEstado de la Unión!§!"
 arme.222.d: "¡Recientemente, el Presidente de Armenia decidió sumarse al proyecto del Estado de la Unión y unirse con nosotros y otros estados miembros!"
 arme.222.a: "¡Maravilloso!"
 karabakh_decisions_category: "Conflicto de Nagorno-Karabaj"
 NKR_artsakh_desc_loc: "[select_thingie_artsakh]\n\n[discussion_phase_arts]\n\n[artsakh_strong_or_weak]\n\nTras la victoria de §YArmenia§! en la §YPrimera Guerra de Artsaj§!, los conflictos fronterizos continúan hasta el día de hoy. La guerra fue vista con imparcialidad por ambos bandos y los combates finalmente hicieron que tanto §YArmenia§! como §YAzerbaiyán§! fueran inestables. En el nuevo milenio, podemos intentar intensificar o desescalar el conflicto y favorecerlo.\n\nLa §Yfase de discusión§! diplomática representa la §Gdisposición§! de §Yambas partes§! para encontrar una §Csolución pacífica§!"
