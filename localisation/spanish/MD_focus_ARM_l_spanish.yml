 ARM_economy_lavash: "Economía Armenia"
 ARM_economy_lavash_desc: "Nuestra economía se encuentra en un estado deplorable tras el colapso de la URSS, y también sufrimos una severa ola de privatizaciones para salvar nuestro presupuesto de la ruina total. Quizás en el nuevo milenio recuperemos todo lo que nos arrebataron."
 ARM_economy_tourism: "Desarrollo del Turismo"
 ARM_economy_tourism_desc: "Turismo en Armenia constituye una gran parte del presupuesto del país y tenemos la intención de desarrollar e invertir en esta industria."
 ARM_economy_historic: "Reconstrucción de Objetos Históricos"
 ARM_economy_historic_desc: "Turistas se sienten fácilmente atraídos por los sitios antiguos, por eso los restauraremos."
 ARM_economy_longest: "Elevador Aéreo Más Largo"
 ARM_economy_longest_desc: "¿A quién no le gusta admirar hermosas vistas? A los turistas les encantará."
 ARM_economy_sewani: "Sevani Khorowats"
 ARM_economy_sewani_desc: "Nos proponemos desarrollar seriamente el ámbito gastronómico en torno a los lugares turísticos."
 ARM_economy_hotels: "La Cuestión del Hoteles"
 ARM_economy_hotels_desc: "Los hoteles deben cumplir con los estándares internacionales, de lo contrario el flujo de abogados disminuirá muy rápidamente."
 ARM_economy_tobacco: "Problema del Tabaco Armenio"
 ARM_economy_tobacco_desc: "El negocio del tabaco en Armenia ocupa un nicho enorme, aportando impuestos a nuestro tesoro, pero en cantidades insuficientes, además, a través de esta empresa, algunos países extranjeros pueden influirnos económicamente."
 ARM_economy_shady: "Cuestionando Negocios Turbios"
 ARM_economy_shady_desc: "La economía sumergida tiene un impacto negativo en la recaudación de impuestos en todo el país. Es hora de que solucionemos este grave problema."
 ARM_economy_casino: "Destino del Casino Online"
 ARM_economy_casino_desc: "El último bastión de la economía sumergida, los casinos en línea, finalmente se cerrará y nos liberaremos de la influencia dañina de los negocios en la sombra."
 ARM_economy_armenian_card: "Tarjeta Armenia"
 ARM_economy_armenian_card_desc: "Tarjeta Armenia es un procesador de pagos y emisor de tarjetas armenio. 'Armenian Card' CJSC fue fundada en 2000 por el Banco Central de Armenia y diez bancos comerciales, con el apoyo de USAID, con el fin de introducir y desarrollar un nuevo sistema de contabilidad de pagos en el sector bancario de Armenia."
 ARM_economy_evocabank: "Evocabank"
 ARM_economy_evocabank_desc: "Evocabank es un banco comercial armenio con sede en Ereván. Ahora que la digitalización ha alcanzado una gran escala, el banco está listo para convertirse en uno de los bancos más avanzados y tecnológicamente avanzados de Armenia."
 ARM_economy_artsakhbank: "Artsakhbank"
 ARM_economy_artsakhbank_desc: "El banco está ubicado en Artsaj y es una especie de instrumento de influencia económica en Artsaj."
 ARM_economy_ardshinbank: "Ardshinbank"
 ARM_economy_ardshinbank_desc: "Ardshinbank es una institución financiera y crediticia universal que ofrece una gama completa de servicios bancarios. Sus áreas prioritarias incluyen la financiación de proyectos para grandes empresas, principalmente en las industrias estratégicas y el sector energético de Armenia, así como préstamos a pequeñas y medianas empresas, emisión y gestión de tarjetas de crédito, banca electrónica, transferencias internacionales de dinero, préstamos hipotecarios a diferentes grupos de población y proyectos de nómina."
 ARM_economy_inecobank: "Inecobank"
 ARM_economy_inecobank_desc: "INECOBANK es uno de los principales bancos del Cáucaso Sur, con sede en Ereván, Armenia. Ofrece una gama completa de servicios bancarios, incluyendo banca digital a particulares, pymes y empresas."
 ARM_economy_vtb: "Dejen Entrar a la VTB Rusa"
 ARM_economy_vtb_desc: "Banco Ruso VTB está intentando abrir sucursales en nuestro país, y el capital ruso será muy útil para nuestra economía."
 ARM_economy_hsbc: "Problema Con HSBC"
 ARM_economy_hsbc_desc: "Banco HSBC está presente en nuestro país desde los años 90. Ahora que el sector bancario ha comenzado su crecimiento, es hora de que decidamos qué hacer con él."
 ARM_economy_ycrdi: "YCRDI"
 ARM_economy_ycrdi_desc: "El Instituto de Investigación y Desarrollo Informático de Ereván es un instituto de investigación científica pionero en la industria de las tecnologías de la información y el software en Armenia. Fue fundado por el gobierno de la URSS en 1956 en Ereván para el desarrollo de equipos informáticos. Actualmente, la institución se dedica al desarrollo de computadoras y sistemas de control automático para fines civiles y de defensa. Actualmente, este instituto se encuentra en una situación financiera precaria, y nos enfrentamos a la disyuntiva de venderlo a Rusia para que el Ministerio de Educación ruso lo apoye, o invertir en nuestra propia institución."
 ARM_economy_orange: "UCOM"
 ARM_economy_orange_desc: "Por último, tendremos nuestro propio operador de telecomunicaciones nacional, que no pertenece a ningún inversor extranjero."
 ARM_economy_veon: "VEON"
 ARM_economy_veon_desc: "VEON Ltd., también conocida como Grupo VEON, es una empresa multinacional de telecomunicaciones y servicios digitales. Con sede en los Países Bajos, la empresa cotiza en la bolsa estadounidense NASDAQ. Nuestra intención es permitir la entrada de este operador en nuestro país para desarrollar redes de comunicación y, así, mejorar la vida de nuestros ciudadanos."
 ARM_economy_electric_networks: "CJSC “Redes Eléctricas de Armenia”"
 ARM_economy_electric_networks_desc: "CJSC “Redes Eléctricas de Armenia” se fundó tras la fusión de cuatro empresas estatales regionales de distribución y venta de energía eléctrica. La empresa se dedica principalmente a la distribución y venta regulada de energía eléctrica. Su red eléctrica tiene una extensión total de 36 000 km. La distribución de energía se realiza con tarifas confirmadas por la Comisión Reguladora de Servicios Públicos de la República de Armenia. La empresa presta servicio a más de un millón de clientes."
 ARM_economy_hrazdan_thermal: "Central Térmica de Hrazdan"
 ARM_economy_hrazdan_thermal_desc: "Central Térmica de Hrazdan es una central eléctrica de gas natural ubicada en el noroeste de la ciudad de Hrazdan, que genera electricidad en Armenia. Es una de las centrales eléctricas más grandes de Armenia. Esta central se construyó entre 1963 y 1974, y su primera unidad entró en funcionamiento en 1966. En su estado actual, necesita una renovación completa y financiación completa, por lo que surge de nuevo la pregunta: ¿transferirla al control de Rusia o apoyarla con cargo a su presupuesto?"
 ARM_economy_rosneft: "Rosneft-Armenia"
 ARM_economy_rosneft_desc: "Tenemos la intención de concluir un acuerdo sobre la construcción de instalaciones petrolíferas con la compañía rusa Rosneft. Nuestra industria petrolera tiene un desarrollo absolutamente nulo, por lo que una vez más nos vemos obligados a depender de nuestros colegas rusos."
 ARM_economy_techout_mining: "Minería de Teghout"
 ARM_economy_techout_mining_desc: "Minería de Teghout se estableció para desarrollar el depósito Tehut en la región de Lori, el segundo depósito de cobre y molibdeno más grande de la República de Armenia."
 ARM_economy_ml_mining: "Minería ML"
 ARM_economy_ml_mining_desc: "Se creará otra empresa minera, lo que ayudará a ampliar el conjunto de recursos que podemos extraer en nuestro país."
 ARM_economy_elnor: "Elnor"
 ARM_economy_elnor_desc: "Elnor es otra empresa productora de productos agroindustriales que están empezando a aparecer activamente en el mercado."
 ARM_economy_techout_more: "Expansión de Actividades"
 ARM_economy_techout_more_desc: "Las actividades de Teghout se ampliarán, lo que es un claro indicador de que la producción está en un buen nivel."
 ARM_economy_grand_candy: "Gran Caramelo"
 ARM_economy_grand_candy_desc: "Gran Caramelo es una de las empresas más grandes de la industria alimentaria. Sus productos siempre reciben críticas positivas de los clientes."
 ARM_economy_agro_support: "Spaika"
 ARM_economy_agro_support_desc: "La empresa ocupa una posición líder en el campo del transporte internacional de mercancías y también es el mayor productor y exportador de productos de frutas y verduras a los países de la CEI, Europa y el Golfo Pérsico."
 ARM_economy_daily_products: "Marianna"
 ARM_economy_daily_products_desc: "Desde sus inicios, el trabajo de Marianna se ha basado en el principio de mantener productos de alta calidad, y la constancia y la dedicación se han convertido en la clave para la expansión y el desarrollo de la empresa. Ofrecemos los mejores productos a los mejores consumidores."
 ARM_economy_free_energy: "Energía Verde"
 ARM_economy_free_energy_desc: "Energía Verde siempre será una de las prioridades de la economía armenia, porque el siglo XXI es el siglo de la energía verde, ¿verdad?"
 ARM_economy_green_armenia: "Programa Armenia Verde"
 ARM_economy_green_armenia_desc: "Nuestro programa ambiental se ampliará y nuestro país debe convertirse en un modelo de éxito de los programas ambientales."
 ARM_economy_nuclear: "Energía Nuclear"
 ARM_economy_nuclear_desc: "Es hora de emprender el desarrollo de la energía nuclear, sólo podemos confiar en nosotros mismos."
 ARM_economy_nuclear_expand: "Expansión de la Energía Nuclear"
 ARM_economy_nuclear_expand_desc: "Una central nuclear siempre es un tema importante, es hora de decidir qué hacer con ella."
 ARM_economy_zangezur_copper: "Combinación de Cobre y Molibdeno de Zangezur"
 ARM_economy_zangezur_copper_desc: "El Combinado de Cobre y Molibdeno Zangezur es la mayor empresa minera de Armenia y uno de los 10 principales productores de molibdeno del mundo. La historia de ZCMC se remonta a la era soviética. En la primavera de 1952, el combinado lanzó su primer producto en serie. Inicialmente, la mina operaba combinando minería subterránea y a cielo abierto. Entre 1957 y 1959, la operación se limitó a la minería a cielo abierto. El Combinado de Cobre y Molibdeno Zangezur se encuentra en el suroeste de Armenia, en la ciudad de Kajaran, región de Syunik, a 30 km al oeste del centro regional de Kapan y a unos 350 km de la capital, Ereván."
 ARM_economy_yerevan_factori_restore: "Fábrica de Confitería y Macarrones de Ereván"
 ARM_economy_yerevan_factori_restore_desc: "Fábrica de Confitería y Macarrones de Ereván era una empresa industrial con sede en Armenia. Fue construida en 1933. Los departamentos de confitería y macarrones se fusionaron en 1951. En 1977, la fábrica se convirtió en la primera productora de chicles de la Unión Soviética, aunque no contenían chicle. La fábrica prácticamente cesó su producción durante el colapso de la Unión Soviética en la década de 1990 y posteriormente fue privatizada y restaurada por la empresa Grand Candy."
 ARM_economy_yerevan_ararat_factory: "Fábrica de Brandy Ararat de Ereván"
 ARM_economy_yerevan_ararat_factory_desc: "Fábrica de Brandy Ararat de Ereván, oficialmente conocida como fábrica de brandy, vino y vodka Ararat de Ereván, comúnmente conocida por su famosa marca Noy, es una empresa líder en producción de brandy armenio en Ereván, Armenia."
 ARM_economy_yerevan_destiny_brandy: "Compañía de Brandy de Ereván"
 ARM_economy_yerevan_destiny_brandy_desc: "Compañía de Brandy de Ereván, conocida por su famosa marca «ArArAt», es la empresa líder en Armenia en la producción de coñac. Fue fundada en 1887, durante el Imperio Ruso. Tras la sovietización de Armenia, la fábrica se convirtió en una empresa estatal. En 1999, el gobierno de la Armenia independiente vendió la fábrica a la empresa francesa Pernod Ricard, dedicada a la elaboración de bebidas destiladas. La variedad de coñacs de la compañía se etiqueta y publicita como ArArAt."
 ARM_economy_eraz: "ErAZ"
 ARM_economy_eraz_desc: "ErAZ, o Yerevanskiy Avtomobilny Zavod, fue un fabricante armenio de automóviles con sede en Ereván, Armenia, conocido principalmente por la producción de la furgoneta RAF-977K entre 1966 y 1996. El Consejo de Ministros de la República Socialista Soviética de Armenia (RSSR) propuso el establecimiento de la fábrica ErAZ el 31 de diciembre de 1964. El personal inicial se formó en la Fábrica de Autobuses de Riga (Letonia) y en UAZ (Rusia). ErAZ se privatizó en 1995."
 ARM_economy_kotayk: "Cervecería Kotayk"
 ARM_economy_kotayk_desc: "Cervecería Kotayk, es una empresa cervecera fundada en 1974 en Abovyan, provincia de Kotayk, Armenia."
 ARM_economy_ashvar: "Fábrica de Vino Avshar"
 ARM_economy_ashvar_desc: "Fábrica de Vino Avshar es uno de los principales productores de bebidas alcohólicas de Armenia, ubicada en la aldea de Avshar, provincia de Ararat. Fue fundada en 1968 para procesar las uvas de las fértiles aldeas de la llanura de Ararat, una de las principales zonas agrícolas de Armenia. Las tradiciones y el folclore armenios sugieren que la producción de vino en la región se remonta a la época en que Noé plantó uvas al descender del monte Ararat, según el libro del Génesis."
 ARM_economy_hrazdan_cement: "Cemento Hrazdan"
 ARM_economy_hrazdan_cement_desc: "Cemento Hrazdan CJSC es una sociedad anónima cerrada ubicada en la ciudad de Hrazdan, capital de la provincia de Kotayk, Armenia. Fundada en 1970 como «Fábrica de Cementos Hrazdan» por el gobierno soviético."
 ARM_economy_multi_group: "Multi Group Stone"
 ARM_economy_multi_group_desc: "Multi Group Stone CJSC fue fundada por Multi Group Concern en la ciudad de Abovyan, Armenia. La empresa se dedica a la extracción y procesamiento de minerales, es decir, a la extracción de bloques de piedra natural y travertino en su propia cantera, así como a la fabricación y el procesamiento final de baldosas en su propia fábrica."
 ARM_economy_alrosa: "Cooperación Con Alrosa"
 ARM_economy_alrosa_desc: "Tenemos la intención de introducir esta empresa rusa en nuestro mercado para mejorar la situación financiera y de recursos de nuestra república."
 ARM_economy_gazprom: "Cooperación Con Gazprom"
 ARM_economy_gazprom_desc: "Tenemos la intención de introducir esta empresa rusa en nuestro mercado para mejorar la situación financiera y de recursos de nuestra república."
 ARM_economy_armenal: "Rusal-Armenal"
 ARM_economy_armenal_desc: "Tenemos la intención de introducir esta empresa rusa en nuestro mercado para mejorar la situación financiera y de recursos de nuestra república."
 ARM_economy_mts: "Cooperación Con MTS"
 ARM_economy_mts_desc: "Tenemos la intención de lanzar esta empresa rusa al mercado de las telecomunicaciones, porque ha demostrado su valía positiva en el mercado ruso."
 ARM_government_subsid_it_sphere: "Subvenciones Gubernamentales a la TI"
 ARM_government_subsid_it_sphere_desc: "Es hora de desarrollar nuestro sector de TI doméstico, el país necesita tecnologías modernas y especialistas modernos en TI."
 ARM_invite_microsoft: "Invitar a Microsoft"
 ARM_invite_microsoft_desc: "Tenemos la intención de invitar a otra gran corporación extranjera de TI para que apoye el desarrollo de nuestro sector de TI."
 ARM_invite_oracle: "Invitar a Oracle"
 ARM_invite_oracle_desc: "Tenemos la intención de invitar a otra gran corporación extranjera de TI para que apoye el desarrollo de nuestro sector de TI."
 ARM_nvidia_invite: "Invitar a NVIDIA"
 ARM_nvidia_invite_desc: "Tenemos la intención de invitar a otra gran corporación extranjera de TI para que apoye el desarrollo de nuestro sector de TI."
 ARM_adobe_invite: "Invitar a Adobe"
 ARM_adobe_invite_desc: "Tenemos la intención de invitar a otra gran corporación extranjera de TI para que apoye el desarrollo de nuestro sector de TI."
 ARM_invite_amd: "Invitar a AMD"
 ARM_invite_amd_desc: "Tenemos la intención de invitar a otra gran corporación extranjera de TI para que apoye el desarrollo de nuestro sector de TI."
 ARM_economy_deep: "Excavando Recursos Profundos"
 ARM_economy_deep_desc: "Las entrañas de Armenia contienen muchos recursos que antes eran inaccesibles debido a tecnologías débiles, pero ahora tenemos la oportunidad de liberar todo el potencial de recursos de nuestro país."
 ARM_economy_heavy: "Industrias Pesadas Armenias"
 ARM_economy_heavy_desc: "Los nuevos recursos han dado un impulso al desarrollo de nuestra industria, ahora la industria pesada en Armenia no es un cuento de hadas, es una realidad."
 ARM_economy_new_uranium: "Nuevos Métodos Para la Excavación de Uranio"
 ARM_economy_new_uranium_desc: "Nuestros industriales han descubierto nuevas formas de extraer uranio y estamos dispuestos a seguir desarrollando esta industria."
 ARM_economy_steel: "Fábricas de Acero"
 ARM_economy_steel_desc: "Las enormes reservas que hemos descubierto requieren nuevas fábricas para su desarrollo, tanto por parte de la industria civil como de la militar."
 ARM_economy_chemical: "Fábricas de Productos Químicos Pesados"
 ARM_economy_chemical_desc: "Nuevas industrias están surgiendo como hongos después de la lluvia, y la industria química pesada ya está surgiendo en Armenia."
 ARM_economy_metal: "Aleaciones Metálicas"
 ARM_economy_metal_desc: "Ampliaremos nuestro enfoque en la producción de aleaciones metálicas, lo que dará un impulso necesario a nuestra industria pesada."
 ARM_economy_heavy_ebat: "Cooperativa de Industrias Pesadas de Armenia"
 ARM_economy_heavy_ebat_desc: "Estamos dispuestos a combinar todos los logros de nuestra industria pesada en una sola cooperativa."
 ARM_economy_wto: "Adherirse a la OMC"
 ARM_economy_wto_desc: "Unirse a la Organización Mundial del Comercio nos ayudará a integrarnos y expandirnos aún más en la economía mundial y traerá prosperidad a nuestra nación y a nuestro pueblo."
 ARM_higher_educ_sph_development: "Desarrollo de la Educación Superior"
 ARM_higher_educ_sph_development_desc: "La educación superior en nuestro país está en un estado terrible, pero pretendemos cambiar esto atrayendo a las mejores instituciones educativas del mundo y centros de acceso versátil a diversas universidades del mundo."
 ARM_tumo_project: "Centro Tumo de Tecnologías Creativas"
 ARM_tumo_project_desc: "El Centro TUMO para Tecnologías Creativas es un programa educativo gratuito para adolescentes de 12 a 18 años especializado en tecnología y diseño, y la educación se brinda en varios centros y centros TUMO."
 ARM_support_aua: "Universidad Americana de Armenia"
 ARM_support_aua_desc: "Consideramos que la educación estadounidense es una de las mejores del mundo y queremos que nuestros ciudadanos tengan acceso a ella."
 ARM_erasmus_coop: "Erasmus+ Armenia"
 ARM_erasmus_coop_desc: "Los estándares educativos europeos son siempre relevantes y una prioridad para nosotros, por lo que estamos dispuestos a colaborar con las principales universidades de la UE."
 ARM_ayb_school: "Escuela Ayb"
 ARM_ayb_school_desc: "Escuela Ayb es un complejo educativo privado en Ereván, Armenia, inaugurado por la Fundación Educativa Ayb. Su nombre proviene de la primera letra del alfabeto armenio, Ayb. Es una organización sin fines de lucro y funciona como una fundación, legalmente registrada como Fundación Centro de Aprendizaje Ayb. Su lema es \"Conocer y Crear\". La escuela está dirigida por un consejo directivo, encabezado por Rubén Arutynyan. El director es David Sahakyan."
 ARM_educ_coop_brit: "Colaboración con Cambridge"
 ARM_educ_coop_brit_desc: "La educación de Cambridge es muy valorada en el mundo y pretendemos crear acceso a ella en nuestro país."
 ARM_armenia_mgu: "Cooperación con la UEM"
