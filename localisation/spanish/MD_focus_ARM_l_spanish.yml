 ARM_economy_category_desc: "Durante la §RSoviética§!, la £text_icon_armdram §YAgnomía§! estaba orientada a la industria. El §RColapso de la URSS§! cambió radicalmente esta situación. [ARM.GetFlag]§YArmenia§! ha pasado de un gran sector industrial a una agricultura a pequeña escala. La situación política y económica del país en 1990 lo obligó a solicitar préstamos para que la £text_icon_armdram §Yeconomía§! no se estancara o, incluso §Rpeor§!, no comenzara su §Rdeclive§!"
