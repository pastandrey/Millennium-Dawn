 ENG_Heavy_Anti_tank_1: "FV102 Striker"
 ENG_Heavy_Anti_tank_2: "Land Rover Javelin"
 ENG_Heavy_Anti_tank_3: "Boxer Brimstone"
 ENG_Heavy_Anti_tank_4: "Stormer II"
 ENG_IFV_1: "M113 IFV"
 ENG_IFV_2: "Alvis Stormer"
 ENG_IFV_2_short: "Stormer"
 ENG_IFV_2_desc: "Desarrollado a partir de la serie CVR(T), el Stormer es una variante modernizada que se puede configurar en varios roles en el campo de batalla. Las variantes más comunes del Stormer sirven como plataforma SHORAD y vehículo de apoyo de infantería. La variante IFV monta un cañón de 30 mm y tiene lanzadores de ATGM (misiles antitanque guiados) en los costados."
 ENG_IFV_3: "Guerrero FV510"
 ENG_IFV_3_short: "Guerrero"
 ENG_IFV_3_desc: "El primer verdadero IFV diseñado y construido por los británicos, el Warrior IFV fue diseñado inicialmente para reemplazar la flota envejecida de los FV430 en el Ejército Británico después de darse cuenta de la necesidad de aumentar la protección y el poder de fuego para el arsenal actual de vehículos de combate. Adequadamente armado con un cañón de 30 mm y un lanzador de ATGM, el Warrior IFV estaba destinado a convertirse en el rival de la venerada serie BMP del Ejército Soviético. El Warrior demostró ser digno de batalla en el conflicto de Bosnia en la década de 1990."
 ENG_IFV_4: "Jabalina Guerrera FV510"
 ENG_IFV_4_short: "Jabalina Guerrera"
 ENG_IFV_4_desc: "El Warrior IFV fue sometido a algunas modificaciones cuando los famosos ATGM Javelin se introdujeron por primera vez en servicio en la década de 1990. El Ejército Británico adquirió rápidamente estos ATGM y decidió reemplazar el MILAN, lo que llevó a una modificación de los Warriors para equiparlos con misiles Javelin."
 ENG_IFV_5: "Guerrero FV510 WCSP"
 ENG_IFV_5_short: "Warrior WCSP"
 ENG_IFV_5_desc: "A medida que la guerra moderna se vuelve cada vez más compleja y dinámica, aumenta la necesidad de actualizar la flota de Warriors envejecidos. Por lo tanto, el Ejército Británico lanzó un programa para mantener y mejorar los Warriors para cumplir con los estándares contemporáneos. El Warrior WCSP está completamente equipado con un nuevo conjunto de ópticas nocturnas y térmicas, sistemas de control de fuego, electrónica, paquete de blindaje modular y un nuevo conjunto de torretas y cañones de 40 mm."
 ENG_IFV_6: "General Dynamics Ajax"
 ENG_IFV_6_short: "Ajax"
 ENG_IFV_6_desc: "Aunque las plataformas CVR(T) eran muy versátiles y confiables para los británicos, estaban quedando obsoletas en el siglo XXI. Basado en el vehículo de combate ASCOD, el nuevo Vehículo Especialista Scout estaba destinado a desempeñar el papel de un vehículo de reconocimiento moderno y dedicado para el Ejército Británico, pero pronto se convirtió en la plataforma ideal para construir una nueva flota de Vehículos de Combate de Infantería modernos. El Ajax es la variante IFV de la plataforma destinada al reconocimiento, apoyo a la infantería y misiones de control de fuego conjunto, adecuadamente equipado con un nuevo cañón de 40 mm, un sistema de armas remoto y el lanzador de ATGM Javelin."
 ENG_IFV_7: "FV904"
 ENG_IFV_7_short: "FV904"
 ENG_Anti_tank_0: "LAW80"
 ENG_Anti_tank_1: "Milan"
 ENG_Anti_tank_2: "NLAW"
 ENG_Anti_tank_3: "NLAW Gen2"
 ENG_Anti_tank_4: "NLAW Gen3"
 ENG_MBT_1: "Centurion"
 ENG_MBT_1_short: "Centurion"
 ENG_MBT_1_desc: "Cuando salió por primera vez, el diseño del Centurion fue revolucionario en la creación del modelo de los primeros tanques de batalla principales. Diseñado y producido en las etapas finales de la Segunda Guerra Mundial, el Centurion solo vio servicio en los períodos de posguerra, pero rápidamente se convirtió en la respuesta de Occidente a los tanques T-54 soviéticos. Confiable, efectivo y probado en batalla en todo tipo de conflictos durante la Guerra Fría, el Centurion aún es utilizado hoy por muchas naciones de todo el mundo."
 ENG_MBT_2: "FV4201 Chieftain"
 ENG_MBT_2_short: "Chieftain"
 ENG_MBT_2_desc: "El Chieftain, basado en el exitoso modelo del tanque Centurion, estaba destinado a ser el principal tanque de batalla británico a finales de los años 60. Su blindaje, su óptica y su potencia de fuego han mejorado enormemente, lo que lo convierte en una de las mejores opciones contra los adversarios soviéticos. Sin embargo, el único defecto que frenó al Chieftain fue su terrible motor: nació con la noble idea de alimentar el tanque con cualquier tipo de aceite en caso de guerra, pero el motor resultó ser extremadamente poco fiable y lento."
 ENG_MBT_3: "FV4030/4 Challenger I"
 ENG_MBT_3_short: "Challenger I"
 ENG_MBT_3_desc: "Originalmente un proyecto MBT-80, el tanque fue diseñado basándose en el tanque Chieftain para satisfacer las necesidades iraníes, pero con la Revolución Islámica en Irán, el proyecto fue cancelado. El Ejército Británico se convirtió en el cliente y el tanque fue modificado para adaptarse a las necesidades británicas. El Challenger I se convirtió en el primer tanque en utilizar la revolucionaria armadura Chobham, que proporcionaba una protección superior a cualquier acero blindado occidental de la época. Se convirtió en uno de los tanques preeminentes a finales del siglo XX."
 ENG_MBT_4: "FV4034 Challenger II"
 ENG_MBT_4_short: "Challenger II"
 ENG_MBT_4_desc: "El Challenger II es una reconfiguración extensa del Challenger I, mejorado con una armadura Chobham mejorada, una nueva torreta y un nuevo cañón de 120 mm. Se convierte en el símbolo del Cuerpo Real de Blindaje Británico y se ha demostrado que es un adversario fuerte en batalla durante la Guerra de Iraq."
 ENG_MBT_5: "Challenger II Black Knight"
 ENG_MBT_5_short: "Challenger II BK"
 ENG_MBT_5_desc: "El paquete Challenger II Black Knight se reveló por primera vez en 2018 como parte del programa LEP (Life Extension Programme) de los MBT. Con capacidades extensas de combate nocturno, ópticas térmicas y un sistema de protección activa, el Challenger II se ha actualizado para enfrentar los desafíos complejos de la guerra moderna actual."
