 VEN_infantry_weapons_6_desc: "El AK-12 es un nuevo fusil de asalto ruso. Se desarrolló en el marco del programa Ratnik para futuros soldados de infantería. Diseñado para fuerzas especializadas, reemplazará la producción del AK-103. El AK-12 ha mejorado su equilibrio y ergonomía, lo que lo convierte en el fusil de asalto ruso de élite hasta la fecha."
 OMA_infantry_weapons_2_desc: "La G3A3 es la versión más conocida de la G3. Está diseñada con nuevas miras traseras de tambor mejoradas, un punto de mira mejorado, un supresor de fogonazo/freno de boca, una culata fija de plástico sólido y un guardamanos de plástico que no entra en contacto con el cañón flotante. El guardamanos está disponible en una versión delgada y ventilada y otra ancha. Esta última permite la instalación de un bípode para una mayor estabilidad."
 OMA_infantry_weapons_3_desc: "El desarrollo del fusil M16A2 fue solicitado inicialmente por el Cuerpo de Marines de los Estados Unidos a raíz de su experiencia en combate en Vietnam con el XM16E1 y el M16A1. El Departamento de Defensa lo adoptó oficialmente como \"Fusil estadounidense, 5,56 mm, M16A2\" en 1982. Los Marines fueron la primera rama de las Fuerzas Armadas de Estados Unidos en adoptarlo, a principios y mediados de la década de 1980, y el Ejército de los Estados Unidos siguió su ejemplo a finales de esa misma década."
 OMA_infantry_weapons_4_desc: "El Heckler & Koch G36 (Gewehr 36) es un fusil de asalto de 5,56 x 45 mm diseñado a principios de la década de 1990 por el fabricante de armas alemán Heckler & Koch como sustituto de los modelos G3, más pesados, de 7,62 x 51 mm. Fue aceptado en servicio en la Bundeswehr a mediados de la década de 1990, sustituyendo al G3. Desde entonces, también ha sido un producto de exportación popular, y el G36 ha prestado servicio activo en unidades militares y policiales de varios países, como Alemania, España y el Reino Unido."
 OMA_infantry_weapons_5_desc: "La carabina M4 es una variante más corta y ligera del fusil de asalto M16. Es una carabina calibre 5,56 x 45 mm OTAN, refrigerada por aire, accionada por gas de impacto directo y alimentada por cargador. Tiene un cañón de 370 mm (14,5 pulgadas) y culata telescópica."
