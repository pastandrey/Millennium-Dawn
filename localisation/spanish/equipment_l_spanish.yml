 CHI_Anti_tank_0: "HJ-73"
 CHI_Anti_tank_0_desc: "El HJ-73 es una variante china del misil antitanque ruso 9M14 Malyutka."
 CHI_Anti_tank_0_short: "HJ-73"
 CHI_Anti_tank_1: "HJ-8"
 CHI_Anti_tank_1_desc: "El HJ-8 o Hongjian-8 ('Red Arrow-8') es un sistema de misiles antitanque de segunda generación lanzado desde tubo, rastreado ópticamente y guiado por cable."
 CHI_Anti_tank_2: "HJ-12"
 CHI_Anti_tank_2_desc: "El Hongjian-12 ('Red Arrow-12') es un misil antitanque de tercera generación, portátil y de guía infrarroja de lanzar y olvidar de China."
 CHI_Anti_tank_3: "HJ-19"
 CHI_Anti_tank_4: "HJ-35"
 CHI_MBT_1: "Type-59"
 CHI_MBT_1_desc: "El tanque de batalla principal Type 59 (WZ-120) es una versión producida en China del tanque soviético T-54A. Cuenta con un cañón rayado de 100 mm y 203 mm de blindaje."
 CHI_MBT_1_short: "Type-59"
 CHI_MBT_2: "Type-80"
 CHI_MBT_2_desc: "El Type 80, también conocido como ZTZ80, es una familia de tanques de batalla principales (MBTs) de segunda generación chinos. Cuenta con un cañón de 105 mm."
 CHI_MBT_2_short: "Type-80"
 CHI_MBT_3: "Type-96"
 CHI_MBT_3_desc: "El Type 96 o ZTZ96 es un tanque de batalla principal chino de segunda generación y la evolución final del diseño Type 88. Cuenta con un blindaje compuesto, un cañón liso de 125 mm y 2 ametralladoras."
 CHI_MBT_3_short: "Type-96"
 CHI_MBT_4: "Type-99"
 CHI_MBT_4_short: "Type-99"
 CHI_MBT_4_desc: "El tanque de batalla principal Type 99 o ZTZ-99 es un tanque chino de tercera generación que cuenta con blindaje reactivo y compuesto modular, un cañón liso ZPT-98 de 125 mm y 2 ametralladoras."
 CHI_MBT_5: "Type-99A2"
 CHI_MBT_5_short: "Type-99A2"
 CHI_MBT_5_desc: "El tanque de batalla principal Type 99 o ZTZ-99 es un tanque chino de tercera generación que cuenta con blindaje reactivo y compuesto modular, un cañón liso ZPT-98 de 125 mm y 2 ametralladoras."
