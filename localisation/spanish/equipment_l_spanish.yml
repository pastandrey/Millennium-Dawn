 CUB_infantry_weapons_1_desc: "El AKM, desarrollado en 1959, es la variante modernizada más común del rifle AK-47, desarrollado por Mijaíl Kaláshnikov. Es mucho más ligero y preciso en disparo automático que su predecesor."
 CUB_infantry_weapons_2_desc: "El AK-74 se desarrolló a partir del AKM e incorpora mejoras significativas respecto a su predecesor. Cabe destacar que utiliza cartuchos de 5,45 mm en lugar del calibre Warzaw Pact de 7,62 mm, el estándar de la época."
 CUB_infantry_weapons_3_desc: "Si bien el AK-74N es internamente similar al AK-74, está equipado con una montura de cola de milano para la óptica."
 CUB_infantry_weapons_4_desc: "En 1991, la fábrica Izhmash de Izhevsk inició la producción a gran escala de una versión modernizada del AK-74: el AK-74M. Equipado con un cerrojo y un transportador aligerados, así como con una culata de poliamida reforzada con fibra de vidrio."
 CUB_infantry_weapons_5_desc: "El fusil de asalto AK-103 es un derivado del AK-74M, recámara para el cartucho M43 de 7,62 x 39 mm. Al igual que el antiguo AKM, el 103 puede usar diversas miras, incluyendo visión nocturna y telescópica. Además, puede equipar una bayoneta o un lanzagranadas. La diferencia con la mayoría de los AK reside en el plástico y los materiales más económicos del 103."
 CUB_infantry_weapons_6_desc: "El AK-12 es un nuevo fusil de asalto ruso. Se desarrolló en el marco del programa Ratnik para futuros soldados de infantería. Diseñado para fuerzas especializadas, reemplazará la producción del AK-103. El AK-12 ha mejorado su equilibrio y ergonomía, lo que lo convierte en el fusil de asalto ruso de élite hasta la fecha."
 VEN_infantry_weapons_1_desc: "El AKM, desarrollado en 1959, es la variante modernizada más común del rifle AK-47, desarrollado por Mijaíl Kaláshnikov. Es mucho más ligero y preciso en disparo automático que su predecesor."
 VEN_infantry_weapons_2_desc: "El AK-74 se desarrolló a partir del AKM e incorpora mejoras significativas respecto a su predecesor. Cabe destacar que utiliza cartuchos de 5,45 mm en lugar del calibre Warzaw Pact de 7,62 mm, el estándar de la época."
