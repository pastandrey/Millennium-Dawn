 LHA: "Asalto de Helicóptero de Desembarco"
 LHA_desc: "Asalto de Helicóptero de Desembarco (LHA) es el símbolo de clasificación de casco para los buques de asalto anfibio de propósito general que transportan helicópteros."
 LHA_0: "LHA 1975"
 LHA_0_desc: "Los buques de asalto de helicóptero de desembarco (LHA) son LHD más grandes que rivalizan o incluso superan el tamaño de los portaaviones convencionales. La diferencia entre los LHD y los LHA en el juego es que los LHA son capaces de transportar aviones de ala fija y proporcionar un bono de bombardeo de costa."
 LHA_1: "LHA 1985"
