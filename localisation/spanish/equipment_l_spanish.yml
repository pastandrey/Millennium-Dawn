 land_drone_equipment_type: "Drone 1985"
 land_drone_equipment_type_desc: "Los drones de reconocimiento de corto alcance (UAV) proporcionan una valiosa vigilancia en tiempo real y conciencia situacional del campo de batalla. Son ligeros y relativamente fáciles de transportar."
