 LAT_infantry_weapons_4_desc: "El Heckler & Koch G36 (Gewehr 36) es un fusil de asalto de 5,56 x 45 mm diseñado a principios de la década de 1990 por el fabricante de armas alemán Heckler & Koch como sustituto de los modelos G3, más pesados, de 7,62 x 51 mm. Fue aceptado en servicio en la Bundeswehr a mediados de la década de 1990, sustituyendo al G3. Desde entonces, también ha sido un producto de exportación popular, y el G36 ha prestado servicio activo en unidades militares y policiales de varios países, como Alemania, España y el Reino Unido."
 LAT_infantry_weapons_5_desc: "El modelo G36A2 es una versión actualizada del modelo G36. Está equipado con una mira réflex de punto rojo Zeiss RSA de desmontaje rápido, montada sobre un riel Picatinny, que sustituye a la mira de punto rojo original del sistema de puntería de combate dual. El kit de actualización del G36A2 también incluye la culata G36C más corta, un nuevo guardamanos de aluminio con cuatro rieles Picatinny opcionales y una empuñadura delantera vertical con interruptor integrado para accionar un módulo de luz láser Oerlikon Contraves LLM01."
 LAT_infantry_weapons_6_desc: "El Heckler & Koch HK416 es un fusil de asalto de gas, recamarado para el cartucho 5,56 x 45 mm OTAN. Está diseñado y fabricado por la empresa alemana Heckler & Koch. Aunque su diseño se basa en el arma de fuego AR-15, utiliza un sistema patentado de pistón de gas de recorrido corto, propio de la anterior familia de fusiles G36 de Heckler & Koch. El HK416 también está equipado con un guardamanos patentado con rieles en los cuatro lados para alojar múltiples accesorios."
