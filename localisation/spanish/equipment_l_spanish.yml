 ITA_infantry_weapons_1: "BM59"
 ITA_infantry_weapons_1_desc: "El BM 59 es un fusil de combate automático desarrollado en Italia en 1959. Está basado en el fusil M1 Garand, calibrado para 7,62 x 51 mm OTAN, modificado para usar un cargador extraíble y con capacidad de fuego selectivo. Revisiones posteriores incorporaron características comunes a fusiles más modernos."
