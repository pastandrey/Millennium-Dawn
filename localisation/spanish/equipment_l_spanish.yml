 MR_Fighter1: "3ra Generación de cazas polivalentes"
 MR_Fighter1_desc: "Los cazas polivalentes son el caballo de batalla de cualquier fuerza aérea. Pueden cubrir cualquier rol o misión, pero como tal, su diseño es el resultado de una serie de compromisos que los hacen menos eficientes en cada uno de estos roles que un caza especializado."
