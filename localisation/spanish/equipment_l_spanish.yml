 L_Strike_fighter1: "Jet Ligero 1975"
 L_Strike_fighter_desc: "Los cazas ligeros son aeronaves de combate que se encuentran en el extremo inferior del rango práctico de peso, costo y complejidad en el que se despliegan los cazas."
 L_Strike_fighter1_desc: "Los bombarderos a reacción ligeros están diseñados principalmente como entrenadores. Sin embargo, al convertirse para transportar una carga ofensiva, son utilizables para el apoyo aéreo cercano, especialmente contra un oponente que no posee una fuerza aérea propia, como insurgentes."
