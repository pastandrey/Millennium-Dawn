 GER_transport_helicopter_2_desc: "El CH-53G es un helicóptero de transporte pesado estadounidense, diseñado originalmente por Sikorsky Aircraft y construido bajo licencia por VFW-Fokker. El CH-53G lleva una tripulación de cuatro personas: piloto, copiloto, jefe de tripulación y observador aéreo. Puede transportar diversas cargas útiles, incluyendo hasta 38 tropas completamente equipadas, una carga interna de 8000 libras (3600 kg) o una carga externa de 13 000 libras (5900 kg) en el gancho de eslinga de un solo punto."
