 EGY_infantry_weapons_3_desc: "Si bien el AK-74N es internamente similar al AK-74, está equipado con una montura de cola de milano para la óptica."
 EGY_infantry_weapons_4_desc: "En 1991, la fábrica Izhmash de Izhevsk inició la producción a gran escala de una versión modernizada del AK-74: el AK-74M. Equipado con un cerrojo y un transportador aligerados, así como con una culata de poliamida reforzada con fibra de vidrio."
 EGY_infantry_weapons_5_desc: "El fusil de asalto AK-103 es un derivado del AK-74M, recámara para el cartucho M43 de 7,62 x 39 mm. Al igual que el antiguo AKM, el 103 puede usar diversas miras, incluyendo visión nocturna y telescópica. Además, puede equipar una bayoneta o un lanzagranadas. La diferencia con la mayoría de los AK reside en el plástico y los materiales más económicos del 103."
