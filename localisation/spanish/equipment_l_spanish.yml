 GER_transport_helicopter_1: "UH-1D"
 GER_transport_helicopter_1_desc: "El UH-1D es un helicóptero UH-1 Iroquois/Huey estadounidense, construido bajo licencia en la entonces Alemania Occidental por Dornier Flugzeugwerke. El UH-1D es un helicóptero de transporte utilitario utilizado para diversas misiones, desde el transporte de tropas hasta el transporte de carga pesada. El UH-1D fue la columna vertebral de las Fuerzas Armadas de Alemania Occidental durante la Guerra Fría y continuó en servicio incluso después de la reunificación."
