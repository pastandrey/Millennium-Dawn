 GAM_infantry_weapons_1_desc: "El AKM, desarrollado en 1959, es la variante modernizada más común del rifle AK-47, desarrollado por Mijaíl Kaláshnikov. Es mucho más ligero y preciso en disparo automático que su predecesor."
 GAM_infantry_weapons_2_desc: "El Heckler & Koch G3 (Gewehr 3) es un fusil de combate de fuego selectivo, calibre 7,62 x 51 mm, de la OTAN, desarrollado en Alemania Occidental en la década de 1950 por el fabricante de armamento alemán Heckler & Koch (H&K) en colaboración con la agencia estatal española de diseño y desarrollo CETME. El G3 sustituyó al FN FAL/G1 como fusil estándar desde 1959 y estuvo en servicio hasta su actualización al modelo mejorado G3A1 en 1963."
 GAM_infantry_weapons_3_desc: "El desarrollo del fusil M16A2 fue solicitado inicialmente por el Cuerpo de Marines de los Estados Unidos a raíz de su experiencia en combate en Vietnam con el XM16E1 y el M16A1. El Departamento de Defensa lo adoptó oficialmente como \"Fusil estadounidense, 5,56 mm, M16A2\" en 1982. Los Marines fueron la primera rama de las Fuerzas Armadas de Estados Unidos en adoptarlo, a principios y mediados de la década de 1980, y el Ejército de los Estados Unidos siguió su ejemplo a finales de esa misma década."
 GAM_infantry_weapons_4_desc: "El M16A4 es la cuarta generación de la serie M16. Está equipado con un asa de transporte extraíble y un riel Picatinny cuádruple de longitud completa para el montaje de ópticas y otros dispositivos auxiliares. El FN M16A4, con fuego selectivo seguro, semiautomático y de ráfaga, se convirtió en el arma estándar del Cuerpo de Marines de los EE. UU. Los fusiles militares también están equipados con un guardamanos M5 RAS de Knight's Armament Company, que permite acoplar empuñaduras verticales, láseres, linternas tácticas y otros accesorios, lo que dio origen a la designación M16A4 MWS (o Sistema de Armas Modular) en los manuales de campaña del Ejército de los EE. UU."
 GAM_infantry_weapons_5_desc: "La carabina M4 es una variante más corta y ligera del fusil de asalto M16. Es una carabina calibre 5,56 x 45 mm OTAN, refrigerada por aire, accionada por gas de impacto directo y alimentada por cargador. Tiene un cañón de 370 mm (14,5 pulgadas) y culata telescópica."
