 cnc_equipment_type: "C&C Equipment"
 cnc_equipment_type_desc: "Command and Control Equipment is the system empowering leadership to exercise authority and direction over assigned forces for the accomplishment of missions and tasks."
 cnc_equipment_1: "C2 Equipment"
 cnc_equipment_1_desc: "Command and Control Equipment is the system empowering leadership to exercise authority and direction over assigned forces for the accomplishment of missions and tasks. Efficient Command and Control leads to greater organization and morale. C2 (Command and Control) is the first generation of C2 equipment."
