 CAN_IFV_3_desc: "El LAV III es la tercera generación de la familia de vehículos blindados de transporte de personal ligeros (LAV), construidos por General Dynamics Land Systems - Canadá (GDLS-C), filial de General Dynamics con sede en London, Ontario. Entró en servicio en 1999 y es el principal vehículo de infantería mecanizada tanto del Ejército Canadiense como del Ejército Neozelandés."
