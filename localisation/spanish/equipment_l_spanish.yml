 PMR_Anti_Air_0: "9K32 Strela-2"
 PMR_Anti_Air_0_desc: "Diseñado al comienzo de la guerra fría utilizando la lógica de navegación proporcional, para fijar y destruir bombarderos nucleares estadounidenses. Una de las formas más básicas de AA que puede alcanzar objetivos a 3700-4200 m."
 PMR_Anti_Air_1: "9K38 Igla"
 PMR_Anti_Air_1_desc: "El Igla es una versión más moderna del Strela, presentado en 2004 por Rusia. Utiliza sistemas de guía de infrarrojos de doble banda de ondas (versión S) mucho mejores que el Strela."
 PMR_Anti_Air_2: "9K38 Igla-S"
 PMR_Anti_Air_2_desc: "La variante más reciente, que es una variante sustancialmente mejorada con mayor alcance, buscador más sensible, mayor resistencia a las últimas contramedidas y una ojiva más pesada. Según el fabricante, la probabilidad de impacto es de 0,8-0,9."
 PMR_APC_1: "BTR-60"
 PMR_APC_1_desc: "Uno de los vehículos más antiguos que aún está en servicio, el BTR-60, tiene una ametralladora pesada KPVT de 14,5 mm con 500 balas. El arma secundaria es una ametralladora coaxial de 7,62 mm con 3,00 balas. Ideal para movimientos de infantería ligera y QRF."
 PMR_APC_1_short: "BTR-60"
 PMR_APC_2: "MT-LB"
 PMR_APC_2_desc: "El MT-LB fue fabricado en la década de 1970. Fabricado de manera económica y rápida, los soviéticos los utilizaron para la defensa antiaérea ligera y el combate de infantería."
 PMR_APC_2_short: "MT-LB"
 PMR_APC_3: "BTR-70"
 PMR_APC_3_desc: "El BTR-70 ha estado en uso desde 1972. Durante la guerra soviético-afgana, se utilizaron para el transporte de tropas y proporcionar apoyo de fuego. La única diferencia con el BTR-60 es una armadura más pesada."
 PMR_APC_3_short: "BTR-70"
 PMR_APC_4: "BTR-80"
 PMR_APC_4_desc: "El BTR-80 es un APC anfibio de ruedas 8x8 diseñado en la URSS. Fue adoptado en 1986 y reemplazó a los vehículos anteriores, el BTR-60 y el BTR-70, en el ejército soviético. Fue desplegado por primera vez durante la guerra soviética en Afganistán."
 PMR_APC_4_short: "BTR-80"
 PMR_APC_5: "BTR-90"
 PMR_APC_5_desc: "Fabricado en 1994, para combatir a los cazas terroristas. Tiene un potente cañón Shipunov 2A42 de 30 mm y 500 cartuchos."
 PMR_APC_5_short: "BTR-90"
