 UNI_infantry_weapons_4_desc: "El M16A4 es la cuarta generación de la serie M16. Está equipado con un asa de transporte extraíble y un riel Picatinny cuádruple de longitud completa para el montaje de ópticas y otros dispositivos auxiliares. El FN M16A4, con fuego selectivo seguro, semiautomático y de ráfaga, se convirtió en el arma estándar del Cuerpo de Marines de los EE. UU. Los fusiles militares también están equipados con un guardamanos M5 RAS de Knight's Armament Company, que permite acoplar empuñaduras verticales, láseres, linternas tácticas y otros accesorios, lo que dio origen a la designación M16A4 MWS (o Sistema de Armas Modular) en los manuales de campaña del Ejército de los EE. UU."
 UNI_infantry_weapons_5_desc: "La carabina M4 es una variante más corta y ligera del fusil de asalto M16. Es una carabina calibre 5,56 x 45 mm OTAN, refrigerada por aire, accionada por gas de impacto directo y alimentada por cargador. Tiene un cañón de 370 mm (14,5 pulgadas) y culata telescópica."
