 L_AT_Equipment: "ATGM"
 L_AT_Equipment_desc: "Un misil antitanque (ATM), misil guiado antitanque (ATGM) o arma guiada antitanque, es un misil guiado diseñado principalmente para golpear y destruir vehículos militares pesadamente blindados."
 Anti_tank_desc: "Un misil antitanque (ATM), misil guiado antitanque (ATGM) o arma guiada antitanque, es un misil guiado diseñado principalmente para golpear y destruir vehículos militares pesadamente blindados."
 Anti_tank_0: "ATGM 1965"
 Anti_tank_0_desc: "Los misiles antitanque guiados son sistemas de misiles portátiles que utilizan cabezas explosivas de alto poder diseñadas específicamente para atacar vehículos pesadamente blindados. Esta generación de ATGM se opera mediante un joystick y, por lo tanto, requiere línea de visión y un operador altamente capacitado."
 H_AT_Equipment: "ATGM Montado"
 H_AT_Equipment_desc: "Un destructor de tanques o cazatanques es un tipo de vehículo de combate blindado, armado con un cañón de artillería de disparo directo o un lanzamisiles, con capacidades operativas limitadas y diseñado específicamente para enfrentarse a tanques enemigos."
 Heavy_Anti_tank_desc: "Un destructor de tanques o cazatanques es un tipo de vehículo de combate blindado, armado con un cañón de artillería de disparo directo o un lanzamisiles, con capacidades operativas limitadas y diseñado específicamente para enfrentarse a tanques enemigos."
 Heavy_Anti_tank_0: "ATGM Montado 1965"
 Heavy_Anti_tank_0_desc: "Los sistemas de misiles antitanque más pesados tienen un alcance y una capacidad de carga de misiles más grandes. Debido a su mayor peso, no son adecuados para ser transportados a pie. Por lo tanto, se montan en vehículos. Utilizan cabezas explosivas de alto poder diseñadas específicamente para atacar vehículos pesadamente blindados. Esta generación de ATGM se opera mediante un joystick y, por lo tanto, requiere línea de visión y un operador altamente capacitado."
 Anti_tank_1: "ATGM 1985"
 Anti_tank_1_desc: "Los misiles antitanque guiados son sistemas de misiles portátiles que utilizan cabezas explosivas de alto poder diseñadas específicamente para atacar vehículos pesadamente blindados. Esta generación de ATGM utiliza una guía semiautomática por cableado o láser."
 Heavy_Anti_tank_1: "ATGM Montado 1985"
 Heavy_Anti_tank_1_desc: "Los sistemas de misiles guiados antitanque más pesados ​​tienen mayores alcances y cargas útiles de misiles más grandes. Como tal, el aumento de peso los hace inadecuados para transportarlos. Por tanto, se montan en vehículos. Utilizan ojivas de alto explosivo diseñadas específicamente para atacar vehículos fuertemente blindados. Esta generación de ATGM utiliza guía semiautomática por cable o láser."
 Anti_tank_2: "ATGM 2005"
 Anti_tank_2_desc: "Los misiles antitanque guiados son sistemas de misiles portátiles que utilizan cabezas explosivas de alto poder diseñadas específicamente para atacar vehículos pesadamente blindados. Esta generación de ATGM utiliza guía por infrarrojos o guía láser semiautomática."
 Heavy_Anti_tank_2: "ATGM Montado 2005"
 Heavy_Anti_tank_2_desc: "Los sistemas de misiles antitanque más pesados tienen un alcance y una capacidad de carga de misiles más grandes. Debido a su mayor peso, no son adecuados para ser transportados a pie. Por lo tanto, se montan en vehículos. Utilizan cabezas explosivas de alto poder diseñadas específicamente para atacar vehículos pesadamente blindados. Esta generación de ATGM utiliza guía por infrarrojos o guía láser semiautomática."
 Anti_tank_3: "ATGM 2025"
 Anti_tank_3_desc: "Los misiles antitanque guiados son sistemas de misiles portátiles que utilizan cabezas explosivas de alto poder diseñadas específicamente para atacar vehículos pesadamente blindados. Esta generación de ATGM utiliza guía por infrarrojos o guía láser semiautomática, y puede contar con capacidades mejoradas de evasión de contramedidas y penetración de blindaje."
 Heavy_Anti_tank_3: "ATGM Montado 2025"
 Heavy_Anti_tank_3_desc: "Los sistemas de misiles antitanque más pesados tienen un alcance y una capacidad de carga de misiles más grandes. Debido a su mayor peso, no son adecuados para ser transportados a pie. Por lo tanto, se montan en vehículos. Utilizan cabezas explosivas de alto poder diseñadas específicamente para atacar vehículos pesadamente blindados. Esta generación de ATGM utiliza guía por infrarrojos o guía láser semiautomática, y puede contar con capacidades mejoradas de evasión de contramedidas y penetración de blindaje."
 Anti_tank_4: "ATGM 2035"
 Anti_tank_4_desc: "Los misiles antitanque guiados son sistemas de misiles portátiles que utilizan cabezas explosivas de alto poder diseñadas específicamente para atacar vehículos pesadamente blindados. Esta generación de ATGM utiliza guía por infrarrojos o guía láser semiautomática, y puede contar con capacidades mejoradas de evasión de contramedidas y penetración de blindaje. Además, se espera que tenga mayor precisión y capacidad de adaptación a objetivos cambiantes en el campo de batalla."
 Heavy_Anti_tank_4: "ATGM Montado 2035"
 Heavy_Anti_tank_4_desc: "Los sistemas de misiles guiados antitanque más pesados ​​tienen mayores alcances y cargas útiles de misiles más grandes. Como tal, el aumento de peso los hace inadecuados para transportarlos. Por tanto, se montan en vehículos. Utilizan ojivas de alto explosivo diseñadas específicamente para atacar vehículos fuertemente blindados."
 AA_Equipment: "MANPADS"
 AA_Equipment_desc: "Un misil superficie-aire (SAM), o misil tierra-aire (GTAM), es un misil diseñado para ser lanzado desde tierra para destruir aviones u otros misiles."
 Anti_Air_desc: "Un misil superficie-aire (SAM), o misil tierra-aire (GTAM), es un misil diseñado para ser lanzado desde tierra para destruir aviones u otros misiles."
 Anti_Air_0: "MANPADS 1965"
 Anti_Air_0_desc: "Los sistemas de defensa aérea portátiles son lanzadores de misiles superficie-aire lanzados desde el hombro. Debido a que las necesidades de peso portátil imponen límites estrictos en los tamaños de misiles, son sistemas de corto alcance. Por lo tanto, representan una amenaza para las aeronaves que vuelan bajo y son letales para los helicópteros."
 SP_Anti_Air_0: "SP AA 1965"
 SP_Anti_Air_0_desc: "Los sistemas de defensa aérea montados en vehículos de corto a medio alcance pueden emplear misiles de mayor tamaño y, por lo tanto, de mayor alcance que los sistemas MANPADS, representando una amenaza para todas las aeronaves. También pueden llevar más misiles. Dichos sistemas antiaéreos se organizan en baterías y batallones dedicados de defensa aérea."
 SP_Anti_Air_desc: "Un vehículo antiaéreo es un vehículo móvil con una capacidad antiaérea dedicada. Los cañones antiaéreos suelen estar montados en una torreta de rápido desplazamiento con una elevada tasa de elevación, para seguir aeronaves en movimiento rápido."
