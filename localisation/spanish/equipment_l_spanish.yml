 FRA_infantry_weapons_2_desc: "The Fusil d'Assault de la Manufacture d'Arme de Saint-étienne is a French bullpup automatic rifle built in the 70s for the French Army."
 FRA_infantry_weapons_3: "FAMAS G1"
 FRA_infantry_weapons_3_desc: "The FAMAS G1 is a variant of the FAMAS built by GIAT Industries with a new handguard for gloves in arctic warfare."
