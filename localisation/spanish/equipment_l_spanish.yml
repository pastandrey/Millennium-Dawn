 SIN_infantry_weapons_1: "M16S1"
 SIN_infantry_weapons_1_desc: "El M16S1 es una variante de exportación del fusil estadounidense M16A1, cuya licencia se otorgó a ST Kinetics para su producción local. En los inicios de las Fuerzas Armadas de Singapur (SAF), el M16S1 era el arma estándar de todos los soldados. A pesar de algunas modificaciones realizadas al M16A1 para uso local, el M16S1 aún presentaba algunas de sus deficiencias iniciales, lo que impulsó a la industria de defensa de Singapur a buscar mejores diseños. El M16S1 aún se almacena y se utiliza como arma de reserva a día de hoy."
