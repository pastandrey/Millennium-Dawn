 SP_arty_equipment: "Artillería Autopropulsada"
 SP_arty_equipment_desc: "La artillería autopropulsada es artillería equipada con su propio sistema de propulsión para moverse hacia su objetivo. Son vehículos de alta movilidad, generalmente basados en orugas, que llevan un obús grande, un cañón de campaña, un mortero o algún tipo de lanzacohetes o lanzamisiles."
 SP_arty_0: "SP ART 1965"
 SP_arty_0_desc: "Con sus poderosas capacidades de fuego indirecto, la Artillería Autopropulsada proporciona ataques de precisión sostenidos donde se necesitan en el campo de batalla, y a distancias mucho más allá de las alcanzadas por las armas pequeñas de infantería. Puede ser recargada directamente por su tripulación, y su autopropulsión la hace móvil para poder moverse y evitar contraataques de artillería enemiga."
 SP_arty_desc: "La artillería autopropulsada es artillería equipada con su propio sistema de propulsión para moverse hacia su objetivo. Son vehículos de alta movilidad, generalmente basados en orugas, que llevan un obús grande, un cañón de campaña, un mortero o algún tipo de lanzacohetes o lanzamisiles."
 SP_R_arty_equipment: "Lanzacohetes Múltiples Autopropulsados"
 SP_R_arty_0: "MLRS 1965"
 SP_R_arty_0_desc: "Los lanzacohetes múltiples autopropulsados pueden disparar rápidas salvas de cohetes que cubren un área grande por completo. A menudo se emplean contra áreas de concentración enemigas. Debido a la gran devastación que causan, tienen un rango mínimo de combate más largo que la artillería regular. También tienen una precisión menor y, por lo tanto, no son adecuados para ataques de precisión. Requieren vehículos de apoyo dedicados para recargar."
