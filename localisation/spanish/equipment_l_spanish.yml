 ISR_infantry_weapons_3_desc: "El desarrollo del fusil M16A2 fue solicitado inicialmente por el Cuerpo de Marines de los Estados Unidos a raíz de su experiencia en combate en Vietnam con el XM16E1 y el M16A1. El Departamento de Defensa lo adoptó oficialmente como \"Fusil estadounidense, 5,56 mm, M16A2\" en 1982. Los Marines fueron la primera rama de las Fuerzas Armadas de Estados Unidos en adoptarlo, a principios y mediados de la década de 1980, y el Ejército de los Estados Unidos siguió su ejemplo a finales de esa misma década."
 KOR_infantry_weapons_1_desc: "El fusil M14, oficialmente Fusil de los Estados Unidos, Calibre 7,62 mm, M14, es un fusil estadounidense de fuego selectivo que dispara munición del calibre 7,62 x 51 mm OTAN (0,308 pulgadas). Se convirtió en el fusil estándar del ejército estadounidense en 1959, reemplazando al fusil M1 Garand en el Ejército estadounidense en 1961."
 KOR_infantry_weapons_2_desc: "El fusil M16, oficialmente denominado Fusil Calibre 5,56 mm, M16, es una familia de fusiles militares adaptados del fusil ArmaLite AR-15 para el ejército estadounidense. El fusil M16 original era un fusil automático de 5,56 mm con un cargador de 20 cartuchos."
 NKO_infantry_weapons_6_desc: "El AK-12 es un nuevo fusil de asalto ruso. Se desarrolló en el marco del programa Ratnik para futuros soldados de infantería. Diseñado para fuerzas especializadas, reemplazará la producción del AK-103. El AK-12 ha mejorado su equilibrio y ergonomía, lo que lo convierte en el fusil de asalto ruso de élite hasta la fecha."
