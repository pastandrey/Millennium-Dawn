 WAG_Rec_tank_0: "PT-76"
 WAG_Rec_tank_0_desc: "Este tanque ligero anfibio superrápido puede acercarse sigilosamente a las posiciones enemigas desde el otro lado del río y descargar un infierno. Con su cañón fusil D-56T de 76,2 mm."
 WAG_Rec_tank_0_short: "PT-76"
 WAG_Rec_tank_1: "2S25 Sprut-SD"
 WAG_Rec_tank_1_desc: "Un cazacarros anfibio autopropulsado, este vehículo puede acercarse sigilosamente a los tanques enemigos y disparar su cañón de 125 mm que llevan los T-72-80."
 WAG_Rec_tank_1_short: "2S25 Sprut-SD"
 WAG_Rec_tank_2: "BMPT Terminator"
 WAG_Rec_tank_2_desc: "Probablemente uno de los cañones de cristal más mortíferos jamás creados. No puede defenderse de un tanque, pero puede destruir una columna entera. Tiene lanzadores 4x 130 mm y 2 cañones automáticos 30 mm."
 WAG_Rec_tank_2_short: "BMPT Terminator"
 WAG_Rec_tank_3: "K-18 Bumerang"
 WAG_Rec_tank_3_desc: "El Bumerang se presentó inicialmente como un vehículo blindado de transporte de personal (APC) y un vehículo de combate de infantería (IFV) rentable para el Ejército ruso moderno. Sin embargo, también se utilizará como plataforma antitanque especializada para la detección de un cañón de 125 mm, cuyos detalles se revelaron en 2018. Al igual que el Stryker MGS estadounidense, el Bumerang servirá como vehículo de apoyo de fuego, similar al BMPT."
 WAG_Rec_tank_4: "Tanque ligero 2025"
 WAG_Rec_tank_4_short: "Tanque ligero 2025"
 WAG_Rec_tank_5: "Tanque ligero 2035"
 WAG_Rec_tank_5_short: "Tanque ligero 2035"
 WAG_SP_Anti_Air_0: "ZSU-23-4 Shilka"
 WAG_SP_Anti_Air_1: "9K35 Strela-10"
 WAG_SP_Anti_Air_2: "2K22 Tunguska"
 WAG_SP_Anti_Air_2_desc: "Disparando hasta 8 misiles, esta máquina puede matar a cualquier avión que se cruce en su camino. Además, puede destruir aviones de transporte con sus cañones automáticos."
 WAG_SP_Anti_Air_3: "Pantsir-S1M"
 WAG_SP_Anti_Air_4: "Pantsir-S4L"
 WAG_SP_R_arty_0: "BM-21 Grad"
 WAG_SP_R_arty_0_desc: "Poco utilizado en las operaciones modernas, el abuelo de los SAMS y MLRS se utilizó sobre todo en la Segunda Guerra Mundial y en Afganistán. Siendo efectivo a 20km."
 WAG_SP_R_arty_1: "BM-30 Smerch"
 WAG_SP_R_arty_1_desc: "Este vehículo es una versión más moderna del Grad. Uno que puede ir a cualquier parte del mundo nieve, hielo o desierto. su alcance efectivo de disparo es de 35 km."
 WAG_SP_R_arty_2: "9A52-4 Tornado"
 WAG_SP_R_arty_2_desc: "Una batería de artillería extremadamente pesada que, si no se controla, puede destruir ciudades enteras. Con un alcance máximo de 90 km."
 WAG_SP_arty_0: "2S1 Gvozdika"
 WAG_SP_arty_0_desc: "El 2S1 Gvozdika es un obús autopropulsado soviético basado en el chasis polivalente MT-LBu, que monta un obús 2A18 de 122 mm. \"2S1\" es su designación GRAU. Una designación rusa alternativa es SAU-122, pero en el ejército ruso se le conoce comúnmente como Gvozdika."
 WAG_SP_arty_1: "2S3 Akatsiya"
 WAG_SP_arty_1_desc: "Armada con un cañón D-22 de 152,4 mm que podría disparar al sol desde el cielo si fuera necesario. Se trata de una extraordinaria batería de artillería con un alcance de 50 km."
 WAG_SP_arty_2: "2S19M2 Msta-S"
 WAG_SP_arty_2_desc: "El 2S19 Msta-S fue desarrollado hacia el final de la Guerra Fría, incorporando nuevas tecnologías y aumentando un mayor alcance en comparación con su predecesor."
 WAG_SP_arty_3: "2S35 Koalitsiya-SV"
 WAG_SP_arty_3_desc: "El 2S35 es una auténtica plataforma de artillería del siglo XXI con automatización generalizada, selección automática del tipo de proyectil y sistemas de mando y control unificados."
 WAG_SP_arty_4: "2S38 Koalitsiya-M"
 WAG_artillery_0: "D-30"
 WAG_artillery_0_desc: "Batería de artillería remolcada de 122 m utilizada en muchas guerras por los soviéticos. Con un alcance de entre 15 y 25 km."
 WAG_artillery_1: "2A65 Msta-B"
 WAG_artillery_1_desc: "Esta bestia de cañón dispara una bala de obús de 152 mm a 28,9 km, lo que le permite eliminar un pelotón de infantería entero o una columna de vehículos."
 WAG_artillery_2: "D-40"
 WAG_artillery_3: "D-50"
 WAG_artillery_4: "D-60"
