 SPR_infantry_weapons_5_desc: "El modelo G36A2 es una versión actualizada del modelo G36. Está equipado con una mira réflex de punto rojo Zeiss RSA de desmontaje rápido, montada sobre un riel Picatinny, que sustituye a la mira de punto rojo original del sistema de puntería de combate dual. El kit de actualización del G36A2 también incluye la culata G36C más corta, un nuevo guardamanos de aluminio con cuatro rieles Picatinny opcionales y una empuñadura delantera vertical con interruptor integrado para accionar un módulo de luz láser Oerlikon Contraves LLM01."
 SPR_infantry_weapons_6_desc: "El rifle G36A3 es una modernización adicional de la plataforma G36; con un riel picatinny más grande, una culata de bloqueo retráctil de 4 posiciones y una mira óptica de punto rojo réflex Zeiss RSA integrada/asa de transporte que se reemplaza por una unidad óptica Hensoldt."
 SPR_infantry_weapons_8_desc: "El Heckler & Koch 433 (HK433) es un fusil de asalto moderno, modular y compacto, con recámara para 5,56 mm x 45, que combina las ventajas y características excepcionales de los fusiles de servicio G36 y HK416. El HK 433 incluye una nueva culata plegable y retráctil con carrillera ajustable en altura para mayor precisión. El arma también puede utilizarse con la culata plegada para combate cuerpo a cuerpo."
 TAI_infantry_weapons_2_desc: "El fusil M16, oficialmente denominado Fusil Calibre 5,56 mm, M16, es una familia de fusiles militares adaptados del fusil ArmaLite AR-15 para el ejército estadounidense. El fusil M16 original era un fusil automático de 5,56 mm con un cargador de 20 cartuchos."
