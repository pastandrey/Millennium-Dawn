 SOV_Anti_Air_0: "9K32 Strela-2"
 SOV_Anti_Air_0_desc: "Diseñado al comienzo de la Guerra Fría utilizando la lógica de navegación proporcional para bloquear y destruir bombarderos nucleares estadounidenses. Es una de las formas más básicas de defensa antiaérea capaz de alcanzar blancos a una distancia de 3700-4200 metros."
 SOV_Anti_Air_1: "9K38 Igla"
 SOV_Anti_Air_1_desc: "El Igla es una versión más moderna del Strela, adoptada por Rusia en 2004. Utiliza sistemas de guía de infrarrojos de doble banda (versión S) mucho más avanzados que el Strela."
 SOV_Anti_Air_2: "9K333 Verba"
 SOV_Anti_Air_3: "9K335 Verba-S"
 SOV_Anti_Air_4: "9K48"
 SOV_APC_1: "BTR-60"
 SOV_APC_1_desc: "Uno de los vehículos más antiguos que aún está en servicio, el BTR-60, tiene una ametralladora pesada KPVT de 14,5 mm con 500 balas. El arma secundaria es una ametralladora coaxial de 7,62 mm con 3,00 balas. Ideal para movimientos de infantería ligera y QRF."
 SOV_APC_1_short: "BTR-60"
 SOV_APC_2: "MT-LB"
 SOV_APC_2_desc: "El MT-LB fue fabricado en la década de 1970. Fabricado de manera económica y rápida, los soviéticos los utilizaron para la defensa antiaérea ligera y el combate de infantería."
 SOV_APC_2_short: "MT-LB"
 SOV_APC_3: "BTR-70"
 SOV_APC_3_desc: "El BTR-70 ha estado en uso desde 1972. Durante la guerra soviético-afgana, se utilizaron para el transporte de tropas y proporcionar apoyo de fuego. La única diferencia con el BTR-60 es una armadura más pesada."
 SOV_APC_3_short: "BTR-70"
 SOV_APC_4: "BTR-80"
 SOV_APC_4_desc: "El BTR-80 es un APC anfibio de ruedas 8x8 diseñado en la URSS. Fue adoptado en 1986 y reemplazó a los vehículos anteriores, el BTR-60 y el BTR-70, en el ejército soviético. Fue desplegado por primera vez durante la guerra soviética en Afganistán."
 SOV_APC_4_short: "BTR-80"
 SOV_APC_5: "BTR-90"
 SOV_APC_5_desc: "Fabricado en 1994 para combatir a combatientes terroristas. Cuenta con un potente cañón Shipunov 2A42 de 30 mm con 500 proyectiles."
 SOV_APC_5_short: "BTR-90"
 SOV_APC_6: "Kurganets-25"
 SOV_APC_6_desc: "Uno de los vehículos rusos más modernos, el Kurganets-25, fue fabricado en 2015. Diseñado como un IFV, está equipado con un cañón ligero Bumerang-BM y una ametralladora Kord de 12,7 mm. Está modelado de cerca del IFV estadounidense Bradley."
 SOV_APC_6_short: "Kurganets-25"
 SOV_APC_7: "Kurganets-35"
 SOV_APC_7_desc: "Al igual que el Kurganets-25, que es principalmente un IFV, el Kurganets-35 es un APC que puede transportar a 12 hombres y realizar operaciones similares al Kurganets-25 en tareas de IFV."
 SOV_APC_7_short: "Kurganets-35"
 SOV_APC_8: "Kurganets-45"
 SOV_APC_8_desc: "No se sabe mucho sobre este super APC, pero cuenta con un cañón de 40 mm y puede transportar a 12 hombres."
 SOV_APC_8_short: "Kurganets-45"
 SOV_Heavy_Anti_tank_0: "9P133 Malyutka"
 SOV_Heavy_Anti_tank_0_desc: "Utilizado en muchas guerras y en muchos vehículos. El alcance efectivo es de 500 a 3000 m."
 SOV_Heavy_Anti_tank_1: "9P148 Konkurs"
 SOV_Heavy_Anti_tank_1_desc: "Un sistema de misiles más pesado que dispara más de uno. Los Konkurs pueden alcanzar objetivos a 4 km y devastar a los tanques más grandes del enemigo."
 SOV_Heavy_Anti_tank_2: "9M123 Khrizantema"
 SOV_Heavy_Anti_tank_3: "Kornet-DM"
 SOV_Heavy_Anti_tank_4: "9M178 Volk"
 SOV_IFV_1: "BMP-1"
 SOV_IFV_1_desc: "El BMP-1 es un vehículo de combate de infantería anfibio de orugas soviético. Utilizado en la guerra afgana-soviética para transportar tropas y luchar contra los yihadistas. Usando un 2A28 de 73 mm y un lanzador ATGM."
 SOV_IFV_1_short: "BMP-1"
 SOV_IFV_2: "BMP-2"
 SOV_IFV_2_desc: "El mayor temor de los yihadistas es el BMP-2, extremadamente rápido y eficiente con su cañón de 30 mm y sus cadenas de orugas."
 SOV_IFV_2_short: "BMP-2"
 SOV_IFV_3: "BMP-2M"
 SOV_IFV_3_short: "BMP-2M"
 SOV_IFV_4: "BMP-3"
 SOV_IFV_4_desc: "El BMP-3 es un vehículo de combate de infantería soviético, sucesor del BMP-1 y BMP-2. Disparar un cañón de 100 mm con rondas HE pesadas."
 SOV_IFV_4_short: "BMP-3"
 SOV_IFV_5: "BMP-3M"
 SOV_IFV_5_desc: "El BMP-3M es un vehículo de combate de infantería soviético, sucesor del BMP-1 y BMP-2 y variante del 3. Utiliza un cañón y un motor mejorados."
 SOV_IFV_5_short: "BMP-3M"
 SOV_IFV_6: "T-15 Armata"
 SOV_IFV_6_desc: ""
 SOV_IFV_6_short: "T-15"
 SOV_IFV_7: "T-15M"
 SOV_IFV_7_short: "T-15M"
 SOV_IFV_8: "T-16"
 SOV_IFV_8_short: "T-16"
 SOV_Anti_tank_0: "RPG-7"
 SOV_Anti_tank_0_desc: "Utilizado en muchas guerras y en muchos vehículos."
 SOV_Anti_tank_1: "9K111 Fagot"
 SOV_Anti_tank_1_desc: "Mucho más ligero que otros sistemas ATGM y más antiguo. Este ATGM solo puede alcanzar entre 70 y 2500 m, lo que, en comparación con otros, tiene un alcance mucho menor pero también más barato."
 SOV_Anti_tank_2: "9M133M Kornet-M"
 SOV_Anti_tank_2_desc: "9M133M Kornet-M"
 SOV_Anti_tank_3: "9M134M Bulat-M"
 SOV_Anti_tank_4: "9M142 Shchuka"
 SOV_MBT_1: "T-55"
 SOV_MBT_1_desc: "El T-54/55 es quizás el tanque más producido en el mundo. Diseñado y fabricado en los primeros años de la Guerra Fría, fue la fuerza y el pilar del Ejército Rojo. Una vez temido como símbolo del poderío ruso, se ha convertido en la representación icónica de las fuerzas blindadas de Oriente Medio siendo destruidas tras un ataque aéreo estadounidense."
 SOV_MBT_1_short: "T-55"
 SOV_MBT_2: "T-72"
 SOV_MBT_2_desc: "El T-72 es quizás el diseño más exitoso producido por Rusia. Fue la cumbre del poderío militar soviético en la etapa final de la Guerra Fría, se produjeron miles de unidades y sirvió como columna vertebral del Ejército ruso hasta hoy. Aunque se ha vuelto tristemente célebre por sus catastróficos fracasos en los conflictos de Oriente Medio, el T-72 todavía se utiliza como plataforma de desarrollo para futuros diseños de tanques rusos y ha recibido constantes modificaciones y actualizaciones para cumplir con los estándares de la guerra moderna actual. No subestimes al tanque que una vez fue la punta de lanza de las fuerzas soviéticas."
 SOV_MBT_2_short: "T-72"
 SOV_MBT_3: "T-80"
 SOV_MBT_3_desc: "Este tanque de 2 millones de dólares y bestia del campo de batalla utiliza el mismo cañón que el T-72, pero con armadura adicional y un misil antitanque Kobra."
 SOV_MBT_3_short: "T-80"
 SOV_MBT_4: "T-90"
 SOV_MBT_4_desc: "Armado con un sistema de tres cañones para maximizar la capacidad de fuego y eficiencia, con tres lanzadores de cañones de 125 mm."
 SOV_MBT_4_short: "T-90"
 SOV_MBT_5: "T-14 Armata"
 SOV_MBT_5_desc: "El tanque de batalla más avanzado del ejército ruso, con líneas elegantes y un potente cañón de 152 mm."
 SOV_MBT_5_short: "T-14"
 SOV_MBT_7: "T-14M"
 SOV_MBT_7_short: "T-14M"
 SOV_MBT_8: "T-99 Black Eagle"
 SOV_MBT_8_short: "T-99"
 SOV_mbt_equipment_0: "T-62"
 SOV_mbt_equipment_1: "T-72"
 SOV_mbt_equipment_2: "T-90M"
 SOV_mbt_equipment_3: "T-14"
 SOV_mbt_equipment_4: "T-24"
 SOV_Rec_tank_0: "PT-76"
 SOV_Rec_tank_0_desc: "Este tanque ligero anfibio súper rápido puede acercarse sigilosamente a posiciones enemigas desde el otro lado del río y descargar el infierno con su cañón de tanque estriado D-56T de 76,2 mm."
 SOV_Rec_tank_0_short: "PT-76"
 SOV_Rec_tank_1: "2S25 Sprut-SD"
 SOV_Rec_tank_1_desc: "Un destructor de tanques autopropulsado anfibio, este vehículo puede acercarse sigilosamente a los tanques enemigos y disparar su cañón de 125 mm que también llevan los tanques t-72-80."
 SOV_Rec_tank_1_short: "2S25 Sprut-SD"
 SOV_Rec_tank_2: "BMPT Terminator"
 SOV_Rec_tank_2_desc: "Probablemente uno de los cañones de vidrio más mortíferos jamás creados. No puede defenderse contra un tanque, pero puede destruir toda una columna. Tiene 4 lanzadores de 130 mm y 2 autocañones de 30 mm."
 SOV_Rec_tank_2_short: "BMPT Terminator"
 SOV_Rec_tank_3: "K-18 Bumerang"
 SOV_Rec_tank_3_desc: "El Bumerang fue presentado por primera vez como un vehículo de transporte blindado y vehículo de combate de infantería económico para el moderno Ejército Ruso. Sin embargo, el Bumerang también se utilizará como una plataforma antitanque dedicada que lleva un cañón de 125 mm, cuyos detalles fueron revelados en 2018. Al igual que el Stryker MGS estadounidense, el Bumerang servirá como un vehículo de apoyo de fuego, al igual que el BMPT."
 SOV_Rec_tank_4: "Tanque Ligero 2025"
 SOV_Rec_tank_4_short: "Tanque Ligero 2025"
 SOV_Rec_tank_5: "Tanque ligero 2035"
 SOV_Rec_tank_5_short: "Tanque ligero 2035"
 SOV_SP_Anti_Air_0: "ZSU-23-4 Shilka"
 SOV_SP_Anti_Air_1: "9K35 Strela-10"
 SOV_SP_Anti_Air_2: "2K22 Tunguska"
 SOV_SP_Anti_Air_2_desc: "Disparando hasta 8 misiles, esta máquina puede derribar cualquier avión que se le acerque. Además, también puede destrozar aviones de transporte con sus autocañones."
 SOV_SP_Anti_Air_3: "Pantsir-S1M"
 SOV_SP_Anti_Air_4: "Pantsir-S4L"
 SOV_SP_R_arty_0: "BM-21 Grad"
 SOV_SP_R_arty_0_desc: "No se utiliza mucho en operaciones modernas, el abuelo de los SAMS y MLRS se utilizó principalmente en la Segunda Guerra Mundial y Afganistán. Es efectivo a 20 km."
 SOV_SP_R_arty_1: "BM-30 Smerch"
 SOV_SP_R_arty_1_desc: "Este vehículo es una versión más moderna del Grad. Uno que puede ir a cualquier parte del mundo, ya sea nieve, hielo o desierto. Su alcance de disparo efectivo es de 35 km."
 SOV_SP_R_arty_2: "9A52-4 Tornado\n"
 SOV_SP_R_arty_2_desc: "Una batería de artillería extremadamente pesada que, si no se controla, puede destruir ciudades enteras. Con un alcance máximo de 90 km."
 SOV_SP_arty_0: "2S1 Gvozdika"
 SOV_SP_arty_0_desc: "El 2S1 Gvozdika es un obús autopropulsado soviético basado en el chasis polivalente MT-LBu, que monta un obús 2A18 de 122 mm. \"2S1\" es su designación GRAU. Una designación rusa alternativa es SAU-122, pero en el ejército ruso se le conoce comúnmente como Gvozdika."
 SOV_SP_arty_1: "2S3 Akatsiya"
 SOV_SP_arty_1_desc: "Armado con un cañón D-22 de 152,4 mm que podría disparar al sol desde los cielos si fuera necesario. Esta es una batería de artillería notable con un alcance de 50 km."
 SOV_SP_arty_2: "2S19M2 Msta-S"
 SOV_SP_arty_2_desc: "El 2S19 Msta-S fue desarrollado hacia el final de la Guerra Fría, incorporando nuevas tecnologías y aumentando el alcance en comparación con su predecesor."
 SOV_SP_arty_3: "2S35 Koalitsiya-SV"
 SOV_SP_arty_3_desc: "El 2S35 es una plataforma de artillería verdaderamente del siglo XXI con automatización generalizada, selección automática de tipo de proyectil y sistemas de mando y control unificados."
 SOV_SP_arty_4: "2S38 Koalitsiya-M"
 SOV_artillery_0: "D-30"
 SOV_artillery_0_desc: "Este cañón de remolque de artillería de 122 mm ha sido utilizado en muchas guerras por los soviéticos. Tiene un alcance de 15-25 km."
 SOV_artillery_1: "2A65 Msta-B"
 SOV_artillery_1_desc: "Esta bestia de cañón dispara un proyectil de obús de 152 mm a 28,9 km, pudiendo eliminar a una escuadra de infantería completa o una columna de vehículos."
 SOV_artillery_2: "D-40"
 SOV_artillery_3: "D-50"
 SOV_artillery_4: "D-60"
 SOV_util_vehicle_1: "ZIL-131"
 SOV_util_vehicle_1_desc: "Un camión logístico y de transporte de tropas utilizado por muchos ejércitos de todo el mundo."
 SOV_util_vehicle_2: "Ural-4320"
 SOV_util_vehicle_2_desc: "Un camión logístico y de transporte de tropas utilizado por muchos ejércitos de todo el mundo."
 SOV_util_vehicle_3: "KamAZ-4310"
 SOV_util_vehicle_3_desc: "Un camión logístico y de transporte de tropas utilizado por muchos ejércitos de todo el mundo."
 SOV_util_vehicle_4: "KamAZ-4350"
 SOV_util_vehicle_4_desc: "Un camión logístico y de transporte de tropas utilizado por muchos ejércitos de todo el mundo."
 SOV_util_vehicle_5: "GAZ Tigr"
 SOV_util_vehicle_6: "K-63968 Typhoon-K"
 SOV_util_vehicle_7: "K-4386 Typhoon-M"
 SYR_MBT_1: "T-55"
 SYR_MBT_1_desc: "El T-54/55 es quizás el tanque más producido en el mundo. Diseñado y producido en los primeros años de la Guerra Fría, fue el poder y la columna vertebral del Ejército Rojo. Una vez temido como símbolo del poder ruso, se ha convertido en la representación icónica de las fuerzas acorazadas de Oriente Medio siendo destruidas en el contexto de un ataque aéreo estadounidense."
 SYR_MBT_1_short: "T-55"
 SYR_MBT_2: "T-72"
 SYR_MBT_2_desc: "El T-72 es quizás el diseño más exitoso producido por Rusia. Fue la cumbre del poderío militar soviético en la etapa final de la Guerra Fría, se produjeron miles de unidades y sirvió como columna vertebral del Ejército ruso hasta hoy. Aunque se ha vuelto tristemente célebre por sus catastróficos fracasos en los conflictos de Oriente Medio, el T-72 todavía se utiliza como plataforma de desarrollo para futuros diseños de tanques rusos y ha recibido constantes modificaciones y actualizaciones para cumplir con los estándares de la guerra moderna actual. No subestimes al tanque que una vez fue la punta de lanza de las fuerzas soviéticas."
 SYR_MBT_2_short: "T-72"
 SYR_MBT_3: "T-72AV"
 SYR_MBT_3_desc: "Modelo con blindaje reactivo explosivo Kontakt-1 instalado en la parte frontal del casco y la torreta."
 SYR_MBT_3_short: "T-72AV"
 SYR_MBT_4: "T-90"
 SYR_MBT_4_desc: "Armado con un sistema de cañones triples para una máxima capacidad y eficiencia de fuego. Con 3 lanzadores de cañones de 125 mm."
 SYR_MBT_4_short: "T-90"
 SYR_MBT_5: "T-14 Armata"
 SYR_MBT_5_desc: "El tanque de batalla más avanzado del ejército ruso, con líneas aerodinámicas y un poderoso cañón de 152 mm."
 SYR_MBT_5_short: "T-14"
 SYR_MBT_7: "T-99 Black Eagle"
 SYR_MBT_7_short: "T-99 Black Eagle"
 SYR_MBT_8: "T-35"
 SYR_MBT_8_short: "T-35"
