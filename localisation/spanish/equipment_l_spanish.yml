 GER_infantry_weapons_2: "Heckler & Koch G3A3"
 GER_infantry_weapons_2_short: "G3A3"
 GER_infantry_weapons_2_desc: "La G3A3 es la versión más conocida de la G3. Está diseñada con nuevas miras traseras de tambor mejoradas, un punto de mira mejorado, un supresor de fogonazo/freno de boca, una culata fija de plástico sólido y un guardamanos de plástico que no entra en contacto con el cañón flotante. El guardamanos está disponible en una versión delgada y ventilada y otra ancha. Esta última permite la instalación de un bípode para una mayor estabilidad."
 GER_infantry_weapons_3: "Heckler & Koch G3A4"
 GER_infantry_weapons_3_short: "G3A4"
 GER_infantry_weapons_3_desc: "El G3A4 es una versión mejorada del modelo G3A3 anterior, que incorpora miras de tambor y una posición única de nuevo diseño. Algunos modelos incluyen un nuevo grupo de disparo ambidiestro y un deflector de latón para tiradores zurdos. El G3A4 entró en servicio en 1974 para unidades de infantería de primera línea y estuvo en servicio hasta finales de la década de 1990, antes de ser descontinuado y reemplazado."
 GER_infantry_weapons_4: "Heckler & Koch G36"
 GER_infantry_weapons_4_short: "G36"
 GER_infantry_weapons_4_desc: "El Heckler & Koch G36 (Gewehr 36) es un fusil de asalto de 5,56 x 45 mm diseñado a principios de la década de 1990 por el fabricante de armas alemán Heckler & Koch como sustituto de los modelos G3, más pesados, de 7,62 x 51 mm. Fue aceptado en servicio en la Bundeswehr a mediados de la década de 1990, sustituyendo al G3. Desde entonces, también ha sido un producto de exportación popular, y el G36 ha prestado servicio activo en unidades militares y policiales de varios países, como Alemania, España y el Reino Unido."
 GER_infantry_weapons_5: "Heckler & Koch G36A2"
 GER_infantry_weapons_5_short: "G36A2"
 GER_infantry_weapons_5_desc: "El modelo G36A2 es una versión actualizada del modelo G36. Está equipado con una mira réflex de punto rojo Zeiss RSA de desmontaje rápido, montada sobre un riel Picatinny, que sustituye a la mira de punto rojo original del sistema de puntería de combate dual. El kit de actualización del G36A2 también incluye la culata G36C más corta, un nuevo guardamanos de aluminio con cuatro rieles Picatinny opcionales y una empuñadura delantera vertical con interruptor integrado para accionar un módulo de luz láser Oerlikon Contraves LLM01."
 GER_infantry_weapons_6: "Heckler & Koch G36A3"
 GER_infantry_weapons_6_short: "G36A3"
 GER_infantry_weapons_6_desc: "El rifle G36A3 es una modernización adicional de la plataforma G36; con un riel picatinny más grande, una culata de bloqueo retráctil de 4 posiciones y una mira óptica de punto rojo réflex Zeiss RSA integrada/asa de transporte que se reemplaza por una unidad óptica Hensoldt."
 GER_infantry_weapons_7: "Heckler & Koch G95K"
 GER_infantry_weapons_7_short: "G95K"
 GER_infantry_weapons_7_desc: "El Heckler & Koch HK416 es un fusil de asalto de gas, recamarado para el cartucho 5,56 x 45 mm OTAN. Está diseñado y fabricado por la empresa alemana Heckler & Koch. Aunque su diseño se basa en el arma de fuego AR-15, utiliza un sistema patentado de pistón de gas de recorrido corto, propio de la anterior familia de fusiles G36 de Heckler & Koch. El HK416 también está equipado con un guardamanos patentado con rieles en los cuatro lados para alojar múltiples accesorios."
 GER_infantry_weapons_8: "Heckler & Koch 433"
 GER_infantry_weapons_8_short: "HK 433"
 GER_infantry_weapons_8_desc: "El Heckler & Koch 433 (HK433) es un fusil de asalto moderno, modular y compacto, con recámara para 5,56 mm x 45, que combina las ventajas y características excepcionales de los fusiles de servicio G36 y HK416. El HK 433 incluye una nueva culata plegable y retráctil con carrillera ajustable en altura para mayor precisión. El arma también puede utilizarse con la culata plegada para combate cuerpo a cuerpo."
