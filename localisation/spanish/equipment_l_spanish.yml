 CZE_Air_UAV1: "CANTAS A"
 CZE_Air_UAV1_desc: "Pequeño dron de vigilancia VTOL."
 CZE_Air_UAV2: "CANTAS II"
 CZE_Air_UAV2_desc: "Proyecto de dron VTOL de tamaño mediano con capacidades básicas de ataque."
 CZE_Air_UAV3: "BL-1 Bouře"
 CZE_Air_UAV3_desc: "Proyecto de dron avanzado de largo alcance con municiones de precisión y capacidad básica aire-aire."
 CZE_Air_UAV4: "BL-4 Blesk"
 CZE_Air_UAV4_desc: "Dron furtivo de desarrollo nacional con capacidades de ataque de precisión y una resistencia muy larga, con la capacidad de mantenerse a una altitud de 30 km durante 250 horas debido a una menor resistencia al aire y presión específica."
 CZE_early_helicopter: "HC-102"
 CZE_early_helicopter_desc: "Helicóptero de reconocimiento de dos plazas desarrollado en los años 60."
 CZE_MR_Fighter1: "Su-22M4"
 CZE_MR_Fighter1_desc: "Versión de modernización 4 del Su-22 producida internamente, con aviónica mejorada y software que permite el uso de los últimos misiles AGM."
 CZE_MR_Fighter2: "Let-25K"
 CZE_MR_Fighter2_desc: "Caza multiusos checo diseñado con capacidades de ataque terrestre en mente, dejando el combate aéreo como objetivo secundario."
 CZE_MR_Fighter3: "Aero L-21 Sova"
 CZE_MR_Fighter3_desc: "Caza con nuevos motores con postcombustión capaces de alcanzar velocidades de hasta 3000 km/h a una altitud de 20 km. Puede llevar muchas variantes de armas en sus pilones, incluyendo municiones de precisión y bombas JDAM. En pruebas, una bomba lanzada desde esa velocidad y altitud alcanzó un objetivo en movimiento a 57 km del avión."
 CZE_MR_Fighter4: "Let-35 Skřivan"
 CZE_MR_Fighter4_desc: "Caza multifunción maniobrable con buena retención de energía. Se centra principalmente en el combate aéreo."
 CZE_MR_Fighter5: "Let-55 Straka"
 CZE_MR_Fighter5_desc: "Caza supermanejable de dos motores con vectorización de empuje. Equipa la mayoría de las municiones modernas debido a su software especialmente diseñado compuesto por un código central combinado con partes modulares de código de varios fabricantes de armas, lo que permite que cada pieza del sistema de armas sea codificada específicamente para su único propósito. Esto también facilita las actualizaciones del software y prácticamente no hay incompatibilidades."
 CZE_MR_Fighter6: "Aero L-73 Špaček"
 CZE_MR_Fighter6_desc: "Caza multifunción furtivo capaz de supercrucero, con almacenamiento interno de 8 pilones diseñados para la función SEAD."
 CZE_MR_Fighter7: "Let-81 Sup"
 CZE_MR_Fighter7_desc: "Interceptor hipersónico con armas de energía dirigida tanto en propósitos ofensivos como defensivos, y misiles hipersónicos."
 CZE_MR_Fighter8: "Let-83 Slavík"
 CZE_MR_Fighter8_desc: "Avión multifunción hipersónico con capacidad de transformación de forma y cambio de forma, con armamento antisatélite y motor de forma variable capaz de vuelo suborbital durante largos períodos de tiempo, también funciona como un avión espía capaz de derribar a cualquier oponente que intente alcanzarlo al mismo tiempo."
 CZE_CV_MR_Fighter1: "Yak-38"
 CZE_CV_MR_Fighter1_desc: "Yak-38 producido internamente de la Unión Soviética."
 CZE_CV_MR_Fighter2: "Su-30MK2"
 CZE_CV_MR_Fighter2_desc: "Su-30MK2 producido internamente de la Unión Soviética."
 CZE_CV_MR_Fighter3: "Su-33"
 CZE_CV_MR_Fighter3_desc: "Su-33 producido internamente de la Unión Soviética."
 CZE_CV_MR_Fighter4: "Let-35N Rehek"
 CZE_CV_MR_Fighter4_desc: "Versión naval del Let-35 Skřivan."
 CZE_CV_MR_Fighter5: "Let-55N Rybák"
 CZE_CV_MR_Fighter5_desc: "Versión naval del Let-55 Straka."
 CZE_CV_MR_Fighter6: "Aero L-73N Potápka"
 CZE_CV_MR_Fighter6_desc: "Versión naval del Aero L-73 Špaček."
 CZE_CV_MR_Fighter7: "Let-81N Norník"
 CZE_CV_MR_Fighter7_desc: "Versión naval del Let-81 Sup."
 CZE_CV_MR_Fighter8: "Let-83N Luňák"
 CZE_CV_MR_Fighter8_desc: "Versión naval del Let-83 Slavík."
 CZE_AS_Fighter1: "MiG-21F-13"
 CZE_AS_Fighter1_desc: "Versión checa del MiG-21 producido en Aero con mejoras en armamento y aviónica."
 CZE_AS_Fighter2: "Aero L-23ML"
 CZE_AS_Fighter2_desc: "Proyecto conjunto entre empresas aeroespaciales checas que resultó en este nuevo avión de combate."
 CZE_AS_Fighter3: "Aero L-39J G/C"
 CZE_AS_Fighter4: "Aero L-41 Volavka"
 CZE_AS_Fighter4_desc: "Volavka es un caza de superioridad aérea Mach 2.5+ con armamento más allá del alcance visual."
 CZE_AS_Fighter5: "Let-47 Ořešník"
 CZE_AS_Fighter5_desc: "Let-47 es un avión supermanejable con vectorización de empuje y fusión de sensores diseñado para conocer a los enemigos antes de que conozcan al avión."
 CZE_AS_Fighter6: "Aero L-72 Vlaštovka"
 CZE_AS_Fighter6_desc: "Vlaštovka es un caza furtivo de supercrucero con diseño de software modular compuesto por un código central combinado con partes modulares de código de varios fabricantes de armas, lo que permite que cada pieza del sistema de armas sea codificada específicamente para su único propósito. Esto también facilita las actualizaciones del software y prácticamente no hay incompatibilidades."
 CZE_AS_Fighter7: "Let-80 Orel"
 CZE_AS_Fighter7_desc: "Orel es un caza de superioridad aérea con armas de energía dirigida, capacidad de morfología y cambio de forma, y piloto de inteligencia artificial opcional."
 CZE_AS_Fighter8: "Let-82 Ostříž"
 CZE_AS_Fighter8_desc: ""
 CZE_Strike_fighter1: "Aero L-29R Delfín"
 CZE_L_Strike_fighter1: "Aero L-29 Delfín"
 CZE_CV_L_Strike_fighter1: "Aero L-299 Delfín"
 CZE_L_Strike_fighter1_desc: "En respuesta a la considerable demanda de un entrenador a reacción común que se adoptara en las diversas naciones del Bloque del Este, Aero decidió emprender su propio proyecto de diseño para satisfacer adecuadamente esta demanda. El 5 de abril de 1959, un prototipo inicial, designado como XL-29, realizó su vuelo inaugural. El L-29 fue seleccionado como el entrenador estándar para las fuerzas aéreas de las naciones del Pacto de Varsovia, para las cuales se entregó a partir de la década de 1960."
 CZE_CV_L_Strike_fighter1_desc: "Versión naval del L-29."
 CZE_Strike_fighter2: "Aero L-39C Albatros"
 CZE_cas1: "Aero L-39ZA Albatros"
 CZE_Strike_fighter2_desc: "Desarrollado a partir del L-39 Alca, este avión recibió un nuevo y más potente motor y una estructura reforzada que le permite despegar y aterrizar prácticamente en cualquier lugar gracias a su capacidad STOL."
 CZE_cas1_desc: "Avión de apoyo cercano (CAS) ligero y maniobrable desarrollado a partir de su versión básica de ataque ligero."
 CZE_Strike_fighter3: "Aero L-159A Alca"
 CZE_L_Strike_fighter2: "Aero L-39C Albatros"
 CZE_CV_L_Strike_fighter2: "Aero L-159E Alca"
 CZE_Strike_fighter3_desc: "Desarrollo nuevo a partir del L-39 y L-59 que resultó en este avión con nuevos motores, fuselaje revisado y cabina modernizada, lo que dejó al avión prácticamente irreconocible en comparación con sus predecesores."
