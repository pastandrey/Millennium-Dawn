 util_vehicle_type: "Utility Vehicle"
 util_vehicle_type_desc: "Un vehículo utilitario, generalmente motorizado, que está diseñado para realizar una tarea específica con más eficacia que un vehículo de uso general."
 util_vehicle_8: "Utility Vehicle 2035"
 util_vehicle_8_desc: "Los vehículos utilitarios son los que emplean las Fuerzas de Infantería Motorizada como transporte al campo de batalla. Los modelos de generaciones anteriores, jeeps y camiones, prácticamente no tienen blindaje y se diferencian principalmente de sus homólogos civiles por ser más robustos y tener mayor movilidad en terrenos difíciles. Los modelos de generaciones posteriores incluyen vehículos similares a los Humvees con mejor blindaje y vehículos resistentes a minas con mejoras adicionales en la protección de la tripulación. Si los vehículos están armados, suelen ser armas más ligeras, como ametralladoras."
 attack_helicopter_1: "Attack Helicopter 1965"
 attack_helicopter_1_desc: "Un helicóptero de ataque es un helicóptero militar equipado con armas ofensivas. Sus principales armas son armas automáticas de fuego rápido (cañones y ametralladoras), lanzacohetes y armas guiadas de precisión (misiles). Muchos helicópteros de ataque también pueden equiparse con misiles antiaéreos, pero estos se utilizan principalmente para defensa propia. Los helicópteros de ataque actuales tienen funciones similares a las de los aviones de ataque de ala fija y están diseñados específicamente para atacar objetivos terrestres como infantería, vehículos blindados y edificios."
 attack_helicopter_2: "Attack Helicopter 1985"
