 TNZ_infantry_weapons_5_desc: "La carabina M4 es una variante más corta y ligera del fusil de asalto M16. Es una carabina calibre 5,56 x 45 mm OTAN, refrigerada por aire, accionada por gas de impacto directo y alimentada por cargador. Tiene un cañón de 370 mm (14,5 pulgadas) y culata telescópica."
 KEN_infantry_weapons_1_desc: "El AKM, desarrollado en 1959, es la variante modernizada más común del rifle AK-47, desarrollado por Mijaíl Kaláshnikov. Es mucho más ligero y preciso en disparo automático que su predecesor."
 KEN_infantry_weapons_2_desc: "El Heckler & Koch G3 (Gewehr 3) es un fusil de combate de fuego selectivo, calibre 7,62 x 51 mm, de la OTAN, desarrollado en Alemania Occidental en la década de 1950 por el fabricante de armamento alemán Heckler & Koch (H&K) en colaboración con la agencia estatal española de diseño y desarrollo CETME. El G3 sustituyó al FN FAL/G1 como fusil estándar desde 1959 y estuvo en servicio hasta su actualización al modelo mejorado G3A1 en 1963."
