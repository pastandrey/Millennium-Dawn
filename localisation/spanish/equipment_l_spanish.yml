 USA_infantry_weapons_2: "M16A1"
 USA_infantry_weapons_2_desc: "El fusil M16, oficialmente denominado Fusil Calibre 5,56 mm, M16, es una familia de fusiles militares adaptados del fusil ArmaLite AR-15 para el ejército estadounidense. El fusil M16 original era un fusil automático de 5,56 mm con un cargador de 20 cartuchos."
 USA_infantry_weapons_3: "M16A2"
 USA_infantry_weapons_3_desc: "El desarrollo del fusil M16A2 fue solicitado inicialmente por el Cuerpo de Marines de los Estados Unidos a raíz de su experiencia en combate en Vietnam con el XM16E1 y el M16A1. El Departamento de Defensa lo adoptó oficialmente como \"Fusil estadounidense, 5,56 mm, M16A2\" en 1982. Los Marines fueron la primera rama de las Fuerzas Armadas de Estados Unidos en adoptarlo, a principios y mediados de la década de 1980, y el Ejército de los Estados Unidos siguió su ejemplo a finales de esa misma década."
 USA_infantry_weapons_4: "M16A4"
 USA_infantry_weapons_4_desc: "El M16A4 es la cuarta generación de la serie M16. Está equipado con un asa de transporte extraíble y un riel Picatinny cuádruple de longitud completa para el montaje de ópticas y otros dispositivos auxiliares. El FN M16A4, con fuego selectivo seguro, semiautomático y de ráfaga, se convirtió en el arma estándar del Cuerpo de Marines de los EE. UU. Los fusiles militares también están equipados con un guardamanos M5 RAS de Knight's Armament Company, que permite acoplar empuñaduras verticales, láseres, linternas tácticas y otros accesorios, lo que dio origen a la designación M16A4 MWS (o Sistema de Armas Modular) en los manuales de campaña del Ejército de los EE. UU."
 USA_infantry_weapons_5: "M4A1"
 USA_infantry_weapons_5_desc: "La carabina M4 es una variante más corta y ligera del fusil de asalto M16. Es una carabina calibre 5,56 x 45 mm OTAN, refrigerada por aire, accionada por gas de impacto directo y alimentada por cargador. Tiene un cañón de 370 mm (14,5 pulgadas) y culata telescópica."
 USA_infantry_weapons_7: "M7 Spear"
 USA_infantry_weapons_7_desc: "Un nuevo diseño revolucionario que incorpora materiales de última generación y una computadora balística avanzada."
 USA_infantry_weapons_6: "M27 IAR"
 USA_infantry_weapons_6_desc: ""
 USA_infantry_weapons_8: "Titan APPL"
 USA_infantry_weapons_8_desc: "Esta plataforma de armas incorpora la misma fiabilidad estadounidense del sistema M4, pero aplica tecnología totalmente exclusiva del siglo XXI. Este sistema no solo es ligero gracias al uso de munición sin vaina, sino que también utiliza una variante de aceleración magnética miniaturizada, lo que la convierte en un cañón de riel híbrido portátil de los primeros tiempos."
