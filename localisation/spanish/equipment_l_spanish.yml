 BSH_Anti_Air_0: "9K32 Strela-2"
 BSH_Anti_Air_0_desc: "Diseñado al comienzo de la guerra fría utilizando la lógica de navegación proporcional, para fijar y destruir bombarderos nucleares estadounidenses. Una de las formas más básicas de AA que puede alcanzar objetivos a 3700-4200 m."
 BSH_Anti_Air_1: "9K38 Igla"
 BSH_Anti_Air_1_desc: "El Igla es una versión más moderna del Strela, presentado en 2004 por Rusia. Utiliza sistemas de guía de infrarrojos de doble banda de ondas (versión S) mucho mejores que el Strela."
 BSH_Anti_Air_2: "9K38 Igla-S"
 BSH_Anti_Air_2_desc: "La variante más reciente, que es una variante sustancialmente mejorada con mayor alcance, buscador más sensible, mayor resistencia a las últimas contramedidas y una ojiva más pesada. Según el fabricante, la probabilidad de impacto es de 0,8-0,9."
 BSH_Anti_Air_3: "9K42"
 BSH_Anti_Air_4: "9K48"
 BSH_APC_1: "BTR-60"
 BSH_APC_1_desc: "Uno de los vehículos más antiguos que aún está en servicio, el BTR-60, tiene una ametralladora pesada KPVT de 14,5 mm con 500 balas. El arma secundaria es una ametralladora coaxial de 7,62 mm con 3,00 balas. Ideal para movimientos de infantería ligera y QRF."
 BSH_APC_1_short: "BTR-60"
 BSH_APC_2: "MT-LB"
 BSH_APC_2_desc: "El MT-LB fue fabricado en la década de 1970. Fabricado de manera económica y rápida, los soviéticos los utilizaron para la defensa antiaérea ligera y el combate de infantería."
 BSH_APC_2_short: "MT-LB"
 BSH_APC_3: "BTR-70"
 BSH_APC_3_desc: "El BTR-70 ha estado en uso desde 1972. Durante la guerra soviético-afgana, se utilizaron para el transporte de tropas y proporcionar apoyo de fuego. La única diferencia con el BTR-60 es una armadura más pesada."
 BSH_APC_3_short: "BTR-70"
 BSH_APC_4: "BTR-80"
 BSH_APC_4_desc: "El BTR-80 es un APC anfibio de ruedas 8x8 diseñado en la URSS. Fue adoptado en 1986 y reemplazó a los vehículos anteriores, el BTR-60 y el BTR-70, en el ejército soviético. Fue desplegado por primera vez durante la guerra soviética en Afganistán."
 BSH_APC_4_short: "BTR-80"
 BSH_APC_5: "BTR-90"
 BSH_APC_5_desc: "Fabricado en 1994, para combatir a los cazas terroristas. Tiene un potente cañón Shipunov 2A42 de 30 mm y 500 cartuchos."
 BSH_APC_5_short: "BTR-90"
 BSH_APC_6: "Kurganets-25"
 BSH_APC_6_desc: "El Kurganers-25, uno de los vehículos rusos más modernos, se fabricó en 2015. Está fabricado como vehículo de combate de infantería y tiene un cañón ligero Bumerang-BM y una ametralladora Kord de 12,7 mm. Está basado en el vehículo de combate de infantería Bradley estadounidense."
 BSH_APC_6_short: "Kurganets-25"
 BSH_APC_7: "Kurganets-35"
 BSH_APC_7_desc: "Al igual que el 25, que es principalmente un IFV, el 35 es un APC, puede transportar 12 hombres y hacer más o menos lo mismo que el 25 en operaciones de IFV."
 BSH_APC_7_short: "Kurganets-35"
 BSH_APC_8: "Kurganets-45"
 BSH_APC_8_desc: "No se sabe mucho sobre este super APC, pero lleva un cañón de 40 mm y puede transportar a 12 hombres."
 BSH_APC_8_short: "Kurganets-45"
 BSH_Heavy_Anti_tank_0: "BRDM-2 9P148 Konkurs"
 BSH_Heavy_Anti_tank_0_desc: "Utilizado en muchas guerras y en muchos vehículos. El alcance efectivo es de 500 a 3000 m."
 BSH_Heavy_Anti_tank_1: "MTLB Konkurs"
 BSH_Heavy_Anti_tank_1_desc: "Un sistema de misiles más pesado que dispara más de uno. Los Konkurs pueden alcanzar objetivos a 4 km y devastar a los tanques más grandes del enemigo."
 BSH_Heavy_Anti_tank_2: "Kornet-E"
 BSH_Heavy_Anti_tank_3: "Kornet-DM"
 BSH_Heavy_Anti_tank_4: "9M178 Volk"
 BSH_IFV_1: "BMP-1"
 BSH_IFV_1_desc: "El BMP-1 es un vehículo de combate de infantería anfibio de orugas soviético. Utilizado en la guerra afgana-soviética para transportar tropas y luchar contra los yihadistas. Usando un 2A28 de 73 mm y un lanzador ATGM."
 BSH_IFV_1_short: "BMP-1"
 BSH_IFV_2: "BMP-2"
 BSH_IFV_2_desc: "El mayor temor de los yihadistas es el BMP-2, extremadamente rápido y eficiente con su cañón de 30 mm y sus cadenas de orugas."
 BSH_IFV_2_short: "BMP-2"
 BSH_IFV_3: "BMP-2M"
 BSH_IFV_3_short: "BMP-2M"
 BSH_IFV_4: "BMP-3"
 BSH_IFV_4_desc: "El BMP-3 es un vehículo de combate de infantería soviético, sucesor del BMP-1 y BMP-2. Disparar un cañón de 100 mm con rondas HE pesadas."
 BSH_IFV_4_short: "BMP-3"
 BSH_IFV_5: "BMP-3M"
 BSH_IFV_5_desc: "El BMP-3M es un vehículo de combate de infantería soviético, sucesor del BMP-1 y BMP-2 y variante del 3. Utiliza un cañón y un motor mejorados."
 BSH_IFV_5_short: "BMP-3M"
 BSH_IFV_6: "T-15 Armata"
 BSH_IFV_6_desc: ""
 BSH_IFV_6_short: "T-15"
 BSH_IFV_7: "T-15M"
 BSH_IFV_7_short: "T-15M"
 BSH_IFV_8: "T-16"
 BSH_IFV_8_short: "T-16"
 BSH_Anti_tank_0: "RPG-7"
 BSH_Anti_tank_0_desc: "Utilizado en muchas guerras y en muchos vehículos."
 BSH_Anti_tank_1: "AT-4 Fagot"
 BSH_Anti_tank_1_desc: "Mucho más ligero que otros sistemas ATGM y más antiguo. Este ATGM solo puede alcanzar entre 70 y 2500 m, lo que, en comparación con otros, tiene un alcance mucho menor pero también más barato."
 BSH_Anti_tank_2: "9M133M Kornet-M"
 BSH_Anti_tank_2_desc: "9M133M Kornet-M"
 BSH_Anti_tank_3: "9M134M Bulat-M"
 BSH_Anti_tank_4: "9M142 Shchuka"
 BSH_MBT_1: "T-55"
 BSH_MBT_1_desc: "El T-54/55 es quizás el tanque más producido del mundo. Diseñado y producido en los primeros años de la Guerra Fría, fue el poder y la columna vertebral del Ejército Rojo. Alguna vez temido como símbolo del poderío ruso, se ha convertido en la representación icónica de las fuerzas blindadas de Medio Oriente destruidas tras un ataque aéreo estadounidense."
 BSH_MBT_1_short: "T-55"
 BSH_MBT_2: "T-72"
 BSH_MBT_2_desc: "El T-72 es quizás el diseño más exitoso producido por Rusia. Fue la cumbre del poderío militar soviético en la etapa final de la Guerra Fría, se produjeron miles de unidades y sirvió como columna vertebral del Ejército ruso hasta hoy. Aunque se ha vuelto tristemente célebre por sus catastróficos fracasos en los conflictos de Oriente Medio, el T-72 todavía se utiliza como plataforma de desarrollo para futuros diseños de tanques rusos y ha recibido constantes modificaciones y actualizaciones para cumplir con los estándares de la guerra moderna actual. No subestimes al tanque que una vez fue la punta de lanza de las fuerzas soviéticas."
 BSH_MBT_2_short: "T-72"
 BSH_MBT_3: "T-80"
 BSH_MBT_3_desc: "Este tanque de 2 millones de dólares y bestia del campo de batalla usaba el mismo cañón que el T-72 con armadura adicional y un ATGM Kobra."
 BSH_MBT_3_short: "T-80"
 BSH_MBT_4: "T-90"
 BSH_MBT_4_desc: "Armado con un sistema de 3 cañones para una máxima capacidad de fuego y eficacia. Con 3 lanzadores de cañones de 125 mm."
 BSH_MBT_4_short: "T-90"
 BSH_MBT_5: "T-14 Armata"
 BSH_MBT_5_desc: "El carro de combate más avanzado del ejército ruso, con elegantes líneas y un potente cañón de 152 mm."
 BSH_MBT_5_short: "T-14"
 BSH_MBT_7: "T-14M"
 BSH_MBT_7_short: "T-14M"
 BSH_MBT_8: "T-99 Black Eagle"
 BSH_MBT_8_short: "T-99"
 CRM_Anti_Air_0: "9K32 Strela-2"
 CRM_Anti_Air_0_desc: "Diseñado al comienzo de la guerra fría utilizando la lógica de navegación proporcional, para fijar y destruir bombarderos nucleares estadounidenses. Una de las formas más básicas de AA que puede alcanzar objetivos a 3700-4200 m."
 CRM_Anti_Air_1: "9K38 Igla"
 CRM_Anti_Air_1_desc: "El Igla es una versión más moderna del Strela, presentado en 2004 por Rusia. Utiliza sistemas de guía de infrarrojos de doble banda de ondas (versión S) mucho mejores que el Strela."
 CRM_Anti_Air_2: "9K38 Igla-S"
 CRM_Anti_Air_2_desc: "La variante más reciente, que es una variante sustancialmente mejorada con mayor alcance, buscador más sensible, mayor resistencia a las últimas contramedidas y una ojiva más pesada. Según el fabricante, la probabilidad de impacto es de 0,8-0,9."
 CRM_Anti_Air_3: "9K42"
 CRM_Anti_Air_4: "9K48"
