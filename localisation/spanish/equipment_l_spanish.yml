 BSH_util_vehicle_7: "Z-STS Akhmat"
 BSH_util_vehicle_7_desc: "El Z-STS Akhmat está construido sobre el chasis de tracción integral Trehosnaya KAMAZ-5350. Posee una gran movilidad y capacidad de maniobra, y además, su operación es sencilla. Resulta curioso que, a diferencia de un camión convencional, este vehículo blindado esté construido con un capó abatible. Esto permitió reubicar los puestos de la tripulación y aumentar su seguridad."
 WAG_Anti_Air_0: "9K32 Strela-2"
 WAG_Anti_Air_0_desc: "Diseñado al comienzo de la guerra fría utilizando la lógica de navegación proporcional, para fijar y destruir bombarderos nucleares estadounidenses. Una de las formas más básicas de AA que puede alcanzar objetivos a 3700-4200 m."
 WAG_Anti_Air_1: "9K38 Igla"
 WAG_Anti_Air_1_desc: "El Igla es una versión más moderna del Strela, presentado en 2004 por Rusia. Utiliza sistemas de guía de infrarrojos de doble banda de ondas (versión S) mucho mejores que el Strela."
 WAG_Anti_Air_2: "9K38 Igla-S"
 WAG_Anti_Air_2_desc: "La variante más reciente, que es una variante sustancialmente mejorada con mayor alcance, buscador más sensible, mayor resistencia a las últimas contramedidas y una ojiva más pesada. Según el fabricante, la probabilidad de impacto es de 0,8-0,9."
 WAG_Anti_Air_3: "9K42"
 WAG_Anti_Air_4: "9K48"
 WAG_APC_1: "BTR-60"
 WAG_APC_1_desc: "Uno de los vehículos más antiguos que aún está en servicio, el BTR-60, tiene una ametralladora pesada KPVT de 14,5 mm con 500 balas. El arma secundaria es una ametralladora coaxial de 7,62 mm con 3,00 balas. Ideal para movimientos de infantería ligera y QRF."
 WAG_APC_1_short: "BTR-60"
 WAG_APC_2: "MT-LB"
 WAG_APC_2_desc: "El MT-LB fue fabricado en la década de 1970. Fabricado de manera económica y rápida, los soviéticos los utilizaron para la defensa antiaérea ligera y el combate de infantería."
 WAG_APC_2_short: "MT-LB"
 WAG_APC_3: "BTR-70"
 WAG_APC_3_desc: "El BTR-70 ha estado en uso desde 1972. Durante la guerra soviético-afgana, se utilizaron para el transporte de tropas y proporcionar apoyo de fuego. La única diferencia con el BTR-60 es una armadura más pesada."
 WAG_APC_3_short: "BTR-70"
 WAG_APC_4: "BTR-80"
 WAG_APC_4_desc: "El BTR-80 es un APC anfibio de ruedas 8x8 diseñado en la URSS. Fue adoptado en 1986 y reemplazó a los vehículos anteriores, el BTR-60 y el BTR-70, en el ejército soviético. Fue desplegado por primera vez durante la guerra soviética en Afganistán."
 WAG_APC_4_short: "BTR-80"
 WAG_APC_5: "BTR-90"
 WAG_APC_5_desc: "Fabricado en 1994, para combatir a los cazas terroristas. Tiene un potente cañón Shipunov 2A42 de 30 mm y 500 cartuchos."
 WAG_APC_5_short: "BTR-90"
 WAG_APC_6: "Kurganets-25"
 WAG_APC_6_desc: "El Kurganers-25, uno de los vehículos rusos más modernos, se fabricó en 2015. Está fabricado como vehículo de combate de infantería y tiene un cañón ligero Bumerang-BM y una ametralladora Kord de 12,7 mm. Está basado en el vehículo de combate de infantería Bradley estadounidense."
 WAG_APC_6_short: "Kurganets-25"
 WAG_APC_7: "Kurganets-35"
 WAG_APC_7_desc: "Al igual que el 25, que es principalmente un IFV, el 35 es un APC, puede transportar 12 hombres y hacer más o menos lo mismo que el 25 en operaciones de IFV."
 WAG_APC_7_short: "Kurganets-35"
 WAG_APC_8: "Kurganets-45"
 WAG_APC_8_desc: "No se sabe mucho sobre este super APC, pero lleva un cañón de 40 mm y puede transportar a 12 hombres."
 WAG_APC_8_short: "Kurganets-45"
 WAG_Heavy_Anti_tank_0: "BRDM-2 9P148 Konkurs"
 WAG_Heavy_Anti_tank_0_desc: "Utilizado en muchas guerras y en muchos vehículos. El alcance efectivo es de 500 a 3000 m."
 WAG_Heavy_Anti_tank_1: "MTLB Konkurs"
 WAG_Heavy_Anti_tank_1_desc: "Un sistema de misiles más pesado que dispara más de uno. Los Konkurs pueden alcanzar objetivos a 4 km y devastar a los tanques más grandes del enemigo."
