 CRM_util_vehicle_8: "VMCTS Drozd-B"
 CRM_util_vehicle_8_desc: "After a successful presenCRMion at the Army Army-2020 amfibis-car Drozd, a prototype set off for testing that indicated the small protection of this machine. As a result, the Drozd-B modification appeared. The latest armored car is able to overcome river obstacles, off-road, and also has low thermal imagability. The rational V-shaped shape of the lower part of the bottom, made of composite armor, provides enhanced anti-drug protection."
