 GER_awacs_equipment_1_desc: "El Boeing E-3A Sentry es un avión de control y alerta temprana aerotransportado (AEW&C) desarrollado por Boeing. Los E-3 se conocen comúnmente como AWACS (Sistema de control y alerta aerotransportado). Derivado del avión de pasajeros Boeing 707, proporciona vigilancia, comando, control y comunicaciones de largo alcance en todo clima."
