 USA_MBT_3: "M1A1 Abrams"
 USA_MBT_3_short: "M1A1"
 USA_MBT_4: "M1A2 Abrams"
 USA_MBT_4_desc: "La producción comenzó en 1986 y entró en servicio en 1992 (77 construidos para Estados Unidos y más de 600 M1 actualizados a M1A2, 315 para Arabia Saudita, 218 para Kuwait). El M1A2 ofrece al comandante del tanque una mira térmica independiente y la capacidad de disparar a dos objetivos en rápida sucesión sin tener que adquirir cada uno secuencialmente, además de componentes de blindaje de uranio empobrecido de segunda generación."
 USA_MBT_4_short: "M1A2"
 USA_MBT_5: "M1A2 SEPv3 Abrams"
 USA_MBT_5_desc: "Incluye el Common Remotely Operated Weapon Station (Estación de Armas Controlada de Forma Remota) como estándar, pantallas en color, interfaces mejoradas, un nuevo sistema operativo, blindaje frontal y lateral mejorado con ERA (kit TUSK), teléfono tanque-infantería como estándar y una transmisión actualizada para una mayor durabilidad."
