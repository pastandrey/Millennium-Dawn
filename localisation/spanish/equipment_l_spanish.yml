 CAN_infantry_weapons_1: "C1A2"
 CAN_infantry_weapons_1_desc: "The C1A2 was a major modification by Canadian Arsenals Limited to the C1A1. It involved several items with the purpose of increasing the reliability and field repairability of the rifles."
 CAN_infantry_weapons_2: "C7"
 CAN_infantry_weapons_2_desc: "Una versión con licencia de la plataforma Colt M16 con varias características solicitadas en Canadá que dieron como resultado un rifle similar a un M16A2 pero con miras traseras M16A1 y la capacidad de fuego completamente automático."
 CAN_infantry_weapons_3: "C7A1"
 CAN_infantry_weapons_3_desc: "The C7A1 replaces the iron sight/carrying handle assembly used on the C7 with a modified Weaver rail for mounting optics. The mount can use traditional iron sights or the ELCAN C79 Optical Sight 3.4x28 optical sight."
 CAN_infantry_weapons_4: "C7A2"
 CAN_infantry_weapons_4_desc: "With Canadian involvement in Afghanistan, Diemaco and the Canadian Forces developed improvements to the C7A1 to better suit the operational situations at hand. The result, the C7A2, has a four-point telescoping stock unit and a three-rail TRIAD that is clamped on the front sight base to allow accessories to be attached. The selector lever, magazine release, and charging handle latch became ambidextrous."
 CAN_infantry_weapons_5: "C8A3"
 CAN_infantry_weapons_5_desc: "The C8A3 is an upgraded version of the C8 carbine, which features a cold-hammer forged barrel and flat-top upper receiver as well as all the mid-life upgrades that appeared on the C7A2 such as the green furniture, ambidextrous charging-handle latch, magazine release and selector lever. It also includes the TRIAD I rail."
 CAN_infantry_weapons_6: "C8A4"
 CAN_infantry_weapons_6_desc: "The C8A4 is based on the Colt MRR, including a suppressor, integrated top rail, newer optics, new trigger system, and several other improvements found on the previous C7 and C8 rifles."
 CAN_infantry_weapons_7: "CMAR"
 CAN_infantry_weapons_7_desc: "The Canadian Modular Assault Rifle is a further set of upgrades to the C8A4, focusing on variable optics, better ergonomics, and an improved ability to tailor the weapon to the operator."
 CAN_util_vehicle_8: "AOPIMU"
 CAN_transport_helicopter_1: "Bell CH-135 Twin Huey"
 CAN_transport_helicopter_1_desc: "The Bell CH-135 Iroquois (nicknamed \"Twin Huey\") is a utility military helicopter powered by two turboshaft engines, with two-blade main and tail rotors. The upgraded member of the prolific Huey family, it was developed by Bell Helicopter to meet a Canadian Force's 1968 requirement for a utility helicopter."
