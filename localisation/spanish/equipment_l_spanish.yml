 SYR_IFV_1: "BMP-1"
 SYR_IFV_1_desc: "El BMP-1 es un vehículo de combate de infantería anfibio de orugas soviético. Utilizado en la guerra afgana-soviética para transportar tropas y luchar contra los yihadistas. Usando un 2A28 de 73 mm y un lanzador ATGM."
 SYR_IFV_1_short: "BMP-1"
 SYR_IFV_2: "BMP-2"
 SYR_IFV_2_desc: "El mayor temor de los yihadistas es el BMP-2, extremadamente rápido y eficiente con su cañón de 30 mm y sus cadenas de orugas."
 SYR_IFV_2_short: "BMP-2"
 SYR_IFV_3: "BMP-2M"
 SYR_IFV_3_short: "BMP-2M"
 SYR_IFV_4: "BMP-3"
 SYR_IFV_4_desc: "El BMP-3 es un vehículo de combate de infantería soviético, sucesor del BMP-1 y BMP-2. Disparar un cañón de 100 mm con rondas HE pesadas."
 SYR_IFV_4_short: "BMP-3"
 SYR_IFV_5: "BMP-3M"
 SYR_IFV_5_desc: "El BMP-3M es un vehículo de combate de infantería soviético, sucesor del BMP-1 y BMP-2 y variante del 3. Utiliza un cañón y un motor mejorados."
 SYR_IFV_5_short: "BMP-3M"
 SYR_IFV_6: "T-15 Armata"
 SYR_IFV_6_desc: ""
 SYR_IFV_6_short: "T-15"
 SYR_IFV_7: "T-15M"
 SYR_IFV_7_short: "T-15M"
