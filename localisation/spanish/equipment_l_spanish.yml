 ALB_infantry_weapons_2: "ASh-82"
 ARM_infantry_weapons_2: "AK-74"
 ARM_infantry_weapons_2_desc: "El AK-74 se desarrolló a partir del AKM e incorpora mejoras significativas respecto a su predecesor. Cabe destacar que utiliza cartuchos de 5,45 mm en lugar del calibre Warzaw Pact de 7,62 mm, el estándar de la época."
 ARM_infantry_weapons_3: "K6-92 BORZ"
 ARM_infantry_weapons_3_desc: "La ametralladora K6-92 fue desarrollada en Armenia, país que, tras obtener su independencia en 1991, se encontraba en conflicto armado con Azerbaiyán por Nagorno-Karabaj. Las fuerzas armadas armenias sufrían gravemente la escasez de armas ligeras, lo que impulsó a ingenieros armenios, entre 1991 y 1992, a crear la ametralladora K6-92, relativamente sencilla."
 ARM_infantry_weapons_4: "VAHAN"
 ARM_infantry_weapons_4_desc: "El Vahan se desarrolló a partir de un fusil de asalto experimental de 7,62 x 39 mm (a veces llamado MBK-2), diseñado por Manasyan durante su servicio en el ejército soviético. El arma automática funciona según el principio de un obturador semilibre, lo que permite simplificar el diseño para una producción semiartesanal."
 ARM_infantry_weapons_5: "K-3"
 ARM_infantry_weapons_5_desc: "El K-3 es un fusil de asalto armenio bullpup, desarrollado a mediados de la década de 1990 a partir del fusil de asalto soviético AK-74, con posibilidad de disparo automático y semiautomático, así como de lanzagranadas bajo el cañón. Desarrollado por el departamento de industria militar del Ministerio de Defensa de Armenia. Producido en series cortas."
 ARM_infantry_weapons_6: "AS-300"
 ARM_infantry_weapons_6_desc: "Presentado en Armenia durante los ejercicios militares de mando y estado mayor Ardzagank 2013 en octubre de 2013, el fusil de asalto AS-300 está diseñado para usar cartuchos de 7,62 x 35 mm y cuenta con un silenciador similar. El fusil de asalto cuenta con un cargador de 30 cartuchos, un diseño de culata diferente y una empuñadura frontal vertical. Su sistema automático de gas proporciona una cadencia de fuego de hasta 500 disparos por minuto. El mecanismo de disparo es del mismo tipo y los modos de disparo son: simple y automático. El AS-300 se fabrica con el mismo mecanismo de cerrojo que un fusil de asalto Kalashnikov, aunque incorpora un cañón, una culata y otras piezas nuevas."
 ARM_infantry_weapons_7: "ASR-545"
 ARM_infantry_weapons_7_desc: "Presentado en Armenia durante los ejercicios militares de mando y estado mayor Ardzagank 2013 en octubre de 2013, el fusil ASR-545 cuenta con un sistema automático de funcionamiento por gas. Está diseñado para realizar fuego silencioso y preciso desde posiciones ocultas con el fin de destruir personal enemigo y vehículos ligeramente blindados (para estos últimos se utilizan cartuchos perforantes de fabricación propia). Los fusiles están equipados con rieles Picatinny para miras ópticas y de colimación, así como otros dispositivos. Utiliza un cartucho de 5,45 x 39 mm con proyectil subsónico."
 ARM_infantry_weapons_8: "RDL-34"
 ARM_infantry_weapons_8_desc: "El último desarrollo de ASPAR Arms, creado sobre la base del AR-15, utiliza cargadores y cartuchos del calibre de un rifle de asalto Kalashnikov, a la vez que tiene un diseño bastante confiable que no es inferior a sus homólogos."
