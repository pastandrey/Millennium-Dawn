 TAT_util_vehicle_8: "VMCTS Drozd-B"
 TAT_util_vehicle_8_desc: "Tras una exitosa presentación en el Ejército de EE. UU. en 2020, se envió un prototipo para pruebas que evidenciaron la escasa protección de este vehículo. Como resultado, surgió la modificación Drozd-B. Este nuevo vehículo blindado es capaz de superar obstáculos fluviales y todoterreno, y además presenta baja reflectividad térmica. La forma racional en V de la parte inferior, fabricada con blindaje compuesto, proporciona una mayor protección antidrogas."
 BSH_util_vehicle_8: "VMCTS Drozd-B"
 BSH_util_vehicle_8_desc: "Tras una exitosa presentación en el Ejército de EE. UU. en 2020, se envió un prototipo para pruebas que evidenciaron la escasa protección de este vehículo. Como resultado, surgió la modificación Drozd-B. Este nuevo vehículo blindado es capaz de superar obstáculos fluviales y todoterreno, y además presenta baja reflectividad térmica. La forma racional en V de la parte inferior, fabricada con blindaje compuesto, proporciona una mayor protección antidrogas."
 PMR_util_vehicle_4_desc: "Al igual que el Volk, este vehículo puede transportar 8 hombres, pero también puede llevar ametralladoras pesadas en la parte superior. Se utilizaba para liderar convoyes."
 C01_util_vehicle_9: "AMZ Żubr"
