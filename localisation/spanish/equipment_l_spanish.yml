 LPD: "Buque de Transporte Anfibio"
 LPD_desc: "Un buque de transporte anfibio, también llamado plataforma/dique de desembarco (LPD), es un buque de guerra anfibio que embarca, transporta y desembarca elementos de una fuerza de desembarco para misiones de guerra expedicionaria."
 LPD_0: "LPD 1975"
 LPD_0_desc: "Los buques de desembarco de helicópteros (LHD) son buques de asalto anfibio multipropósito que son capaces de operar helicópteros y tienen una cubierta bien. Estas embarcaciones están equipadas con una cubierta de vuelo completa similar a la de un portaaviones para operar helicópteros utilitarios y de ataque. En el juego, proporcionan un gran bono de bombardeo de costa y se recomienda su uso en asaltos anfibios."
 LPD_1: "LPD 1985"
 LPD_1_desc: "Los buques de desembarco de helicópteros (LHD) son buques de asalto anfibio multipropósito que son capaces de operar helicópteros y tienen una cubierta bien. Estas embarcaciones están equipadas con una cubierta de vuelo completa similar a la de un portaaviones para operar helicópteros utilitarios y de ataque. En el juego, proporcionan un gran bono de bombardeo de costa y se recomienda su uso en asaltos anfibios."
