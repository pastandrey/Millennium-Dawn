 MEX_infantry_weapons_1_desc: "El Heckler & Koch G3 (Gewehr 3) es un fusil de combate de fuego selectivo, calibre 7,62 x 51 mm, de la OTAN, desarrollado en Alemania Occidental en la década de 1950 por el fabricante de armamento alemán Heckler & Koch (H&K) en colaboración con la agencia estatal española de diseño y desarrollo CETME. El G3 sustituyó al FN FAL/G1 como fusil estándar desde 1959 y estuvo en servicio hasta su actualización al modelo mejorado G3A1 en 1963."
 MEX_infantry_weapons_2_desc: "La G3A3 es la versión más conocida de la G3. Está diseñada con nuevas miras traseras de tambor mejoradas, un punto de mira mejorado, un supresor de fogonazo/freno de boca, una culata fija de plástico sólido y un guardamanos de plástico que no entra en contacto con el cañón flotante. El guardamanos está disponible en una versión delgada y ventilada y otra ancha. Esta última permite la instalación de un bípode para una mayor estabilidad."
 MEX_infantry_weapons_3_desc: "El G3A4 es una versión mejorada del modelo G3A3 anterior, que incorpora miras de tambor y una posición única de nuevo diseño. Algunos modelos incluyen un nuevo grupo de disparo ambidiestro y un deflector de latón para tiradores zurdos. El G3A4 entró en servicio en 1974 para unidades de infantería de primera línea y estuvo en servicio hasta finales de la década de 1990, antes de ser descontinuado y reemplazado."
 JAM_infantry_weapons_3_desc: "El desarrollo del fusil M16A2 fue solicitado inicialmente por el Cuerpo de Marines de los Estados Unidos a raíz de su experiencia en combate en Vietnam con el XM16E1 y el M16A1. El Departamento de Defensa lo adoptó oficialmente como \"Fusil estadounidense, 5,56 mm, M16A2\" en 1982. Los Marines fueron la primera rama de las Fuerzas Armadas de Estados Unidos en adoptarlo, a principios y mediados de la década de 1980, y el Ejército de los Estados Unidos siguió su ejemplo a finales de esa misma década."
