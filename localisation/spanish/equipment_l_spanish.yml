 CV_MR_Fighter1: "3ra Generación de cazas polivalentes para portaaviones"
 CV_MR_Fighter1_desc: "Los cazas para portaaviones suelen ser variantes de los cazas polivalentes debido a la gran variedad de misiones que deben realizar. Las limitaciones en el tamaño de la cubierta del portaaviones y el espacio en el hangar imponen restricciones estrictas en la carga útil que pueden transportar."
