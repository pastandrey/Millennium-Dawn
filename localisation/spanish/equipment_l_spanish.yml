 PMR_MBT_2: "T-72"
 PMR_MBT_2_desc: "El T-72 es quizás el diseño de mayor éxito producido por Rusia. Fue el pináculo del poderío militar soviético en la etapa final de la Guerra Fría, producido en miles de unidades, que sirve como columna vertebral del ejército ruso incluso hasta el día de hoy. Aunque se ha vuelto famoso por sus catastróficos fracasos en los conflictos de Medio Oriente, el T-72 todavía se utiliza como plataforma de desarrollo para futuros diseños de tanques rusos y se le han realizado constantes modificaciones y mejoras para cumplir con los estándares de la guerra moderna actual. No subestimes el tanque que alguna vez fue la lanza de las fuerzas soviéticas."
