 IFV_Equipment: "Vehículos de Combate de Infantería"
 IFV_Equipment_desc: "Los Vehículos de Combate de Infantería son vehículos altamente blindados que transportan a un escuadrón de soldados al campo de batalla. La infantería integrada puede combatir desde el vehículo mismo en mayor medida que desde los APC. Los IFV están armados con una ametralladora pesada y un cañón automático, o tienen misiles antitanque montados. A la infantería transportada por los IFV se le llama Infantería Blindada o Infantería Mecanizada Pesada."
 IFV_1: "IFV 1965"
 IFV_1_desc: "Los Vehículos de Combate de Infantería son vehículos altamente blindados que transportan a un escuadrón de soldados al campo de batalla. La infantería integrada puede combatir desde el vehículo mismo en mayor medida que desde los APC. Los IFV están armados con una ametralladora pesada y un cañón automático, o tienen misiles antitanque montados. A la infantería transportada por los IFV se le llama Infantería Blindada o Infantería Mecanizada Pesada."
 IFV_desc: "Un vehículo de combate de infantería (IFV), o vehículo de combate de infantería (ICV), es un tipo de vehículo de combate blindado utilizado para transportar infantería al campo de batalla y brindar apoyo de fuego directo."
