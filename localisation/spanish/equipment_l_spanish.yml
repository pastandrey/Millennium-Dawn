 Strike_fighter1: "STK de 3ra Generación"
 Strike_fighter1_desc: "Los cazas de ataque dedicados están construidos para el papel de ataque terrestre, destacando tanto en la interdicción aérea como en el apoyo aéreo cercano, al tiempo que mantienen capacidades decentes aire-aire, principalmente con fines defensivos."
