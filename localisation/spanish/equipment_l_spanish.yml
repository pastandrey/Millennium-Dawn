 USA_infantry_weapons_1: "M14"
 USA_infantry_weapons_1_desc: "El fusil M14, oficialmente Fusil de los Estados Unidos, Calibre 7,62 mm, M14, es un fusil estadounidense de fuego selectivo que dispara munición del calibre 7,62 x 51 mm OTAN (0,308 pulgadas). Se convirtió en el fusil estándar del ejército estadounidense en 1959, reemplazando al fusil M1 Garand en el Ejército estadounidense en 1961."
