 artillery_1_desc: "Con sus poderosas capacidades de fuego indirecto, la Artillería proporciona ataques de precisión sostenidos donde se necesitan en el campo de batalla, y a distancias mucho más allá de las alcanzadas por las armas pequeñas de infantería. Puede ser recargada directamente por su tripulación. Dado que requiere vehículos externos para su movimiento, puede ser difícil moverla entre los ataques, lo que la hace vulnerable a contraataques de artillería enemiga. Los sistemas de calibre más ligero pueden ser arrastrados manualmente y son adecuados para operaciones aerotransportadas, ya que pueden caber dentro de aviones de transporte."
