 GER_infantry_weapons_1_desc: "El Heckler & Koch G3 (Gewehr 3) es un fusil de combate de fuego selectivo, calibre 7,62 x 51 mm, de la OTAN, desarrollado en Alemania Occidental en la década de 1950 por el fabricante de armamento alemán Heckler & Koch (H&K) en colaboración con la agencia estatal española de diseño y desarrollo CETME. El G3 sustituyó al FN FAL/G1 como fusil estándar desde 1959 y estuvo en servicio hasta su actualización al modelo mejorado G3A1 en 1963."
