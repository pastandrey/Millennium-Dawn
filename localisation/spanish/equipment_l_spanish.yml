 SPR_mbt_equipment_1: "Leopard 2A4"
 SPR_MBT_1: "M60A3TTS"
 SPR_MBT_1_short: "M60A3TTS"
 SPR_MBT_2: "AMX-30E"
 SPR_MBT_2_short: "AMX-30E"
 SPR_MBT_3: "Leopard 2A4S"
 SPR_MBT_3_short: "Leopard 2A4S"
 SPR_MBT_4: "Leopard 2A6E"
 SPR_MBT_4_short: "Leopard 2A6E"
 SPR_MBT_5: "Leopard 2A7+"
 SPR_MBT_5_desc: "El Leopard 2A7+ está diseñado para operar tanto en conflictos de baja intensidad como de alta intensidad. La protección del tanque se ha incrementado mediante un blindaje modular; la protección frontal se ha mejorado con un sistema de blindaje dual en la torreta y en la parte delantera del casco, mientras que la protección de 360° contra RPG y la protección contra minas aumentan la supervivencia del tanque en operaciones urbanas. Los componentes del sistema de blindaje modular fueron utilizados por primera vez por Canadá en Afganistán. Puede disparar municiones HE programables y la ametralladora montada en la torreta MG3 ha sido reemplazada por una estación de armas controlada de forma remota FLW 200 estabilizada. También se ha mejorado la movilidad, la sostenibilidad y la conciencia situacional."
