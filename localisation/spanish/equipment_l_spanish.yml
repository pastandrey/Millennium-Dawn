 BSH_infantry_weapons_1_desc: "El AKM, desarrollado en 1959, es la variante modernizada más común del rifle AK-47, desarrollado por Mijaíl Kaláshnikov. Es mucho más ligero y preciso en disparo automático que su predecesor."
 CRM_infantry_weapons_1: "AKM"
 CRM_infantry_weapons_1_desc: "El AKM, desarrollado en 1959, es la variante modernizada más común del rifle AK-47, desarrollado por Mijaíl Kaláshnikov. Es mucho más ligero y preciso en disparo automático que su predecesor."
 TAT_infantry_weapons_1: "AKM"
 TAT_infantry_weapons_1_desc: "El AKM, desarrollado en 1959, es la variante modernizada más común del rifle AK-47, desarrollado por Mijaíl Kaláshnikov. Es mucho más ligero y preciso en disparo automático que su predecesor."
 AZE_infantry_weapons_2_desc: "El AK-74 se desarrolló a partir del AKM e incorpora mejoras significativas respecto a su predecesor. Cabe destacar que utiliza cartuchos de 5,45 mm en lugar del calibre Warzaw Pact de 7,62 mm, el estándar de la época."
 POR_infantry_weapons_2_desc: "El Heckler & Koch G3 (Gewehr 3) es un fusil de combate de fuego selectivo, calibre 7,62 x 51 mm, de la OTAN, desarrollado en Alemania Occidental en la década de 1950 por el fabricante de armamento alemán Heckler & Koch (H&K) en colaboración con la agencia estatal española de diseño y desarrollo CETME. El G3 sustituyó al FN FAL/G1 como fusil estándar desde 1959 y estuvo en servicio hasta su actualización al modelo mejorado G3A1 en 1963."
 POR_infantry_weapons_3_desc: "El desarrollo del fusil M16A2 fue solicitado inicialmente por el Cuerpo de Marines de los Estados Unidos a raíz de su experiencia en combate en Vietnam con el XM16E1 y el M16A1. El Departamento de Defensa lo adoptó oficialmente como \"Fusil estadounidense, 5,56 mm, M16A2\" en 1982. Los Marines fueron la primera rama de las Fuerzas Armadas de Estados Unidos en adoptarlo, a principios y mediados de la década de 1980, y el Ejército de los Estados Unidos siguió su ejemplo a finales de esa misma década."
 POR_infantry_weapons_4_desc: "El Heckler & Koch G36 (Gewehr 36) es un fusil de asalto de 5,56 x 45 mm diseñado a principios de la década de 1990 por el fabricante de armas alemán Heckler & Koch como sustituto de los modelos G3, más pesados, de 7,62 x 51 mm. Fue aceptado en servicio en la Bundeswehr a mediados de la década de 1990, sustituyendo al G3. Desde entonces, también ha sido un producto de exportación popular, y el G36 ha prestado servicio activo en unidades militares y policiales de varios países, como Alemania, España y el Reino Unido."
 POR_infantry_weapons_5_desc: "El modelo G36A2 es una versión actualizada del modelo G36. Está equipado con una mira réflex de punto rojo Zeiss RSA de desmontaje rápido, montada sobre un riel Picatinny, que sustituye a la mira de punto rojo original del sistema de puntería de combate dual. El kit de actualización del G36A2 también incluye la culata G36C más corta, un nuevo guardamanos de aluminio con cuatro rieles Picatinny opcionales y una empuñadura delantera vertical con interruptor integrado para accionar un módulo de luz láser Oerlikon Contraves LLM01."
 POR_infantry_weapons_6_desc: "El Heckler & Koch HK416 es un fusil de asalto de gas, recamarado para el cartucho 5,56 x 45 mm OTAN. Está diseñado y fabricado por la empresa alemana Heckler & Koch. Aunque su diseño se basa en el arma de fuego AR-15, utiliza un sistema patentado de pistón de gas de recorrido corto, propio de la anterior familia de fusiles G36 de Heckler & Koch. El HK416 también está equipado con un guardamanos patentado con rieles en los cuatro lados para alojar múltiples accesorios."
 LUX_infantry_weapons_2_desc: "El Heckler & Koch G3 (Gewehr 3) es un fusil de combate de fuego selectivo, calibre 7,62 x 51 mm, de la OTAN, desarrollado en Alemania Occidental en la década de 1950 por el fabricante de armamento alemán Heckler & Koch (H&K) en colaboración con la agencia estatal española de diseño y desarrollo CETME. El G3 sustituyó al FN FAL/G1 como fusil estándar desde 1959 y estuvo en servicio hasta su actualización al modelo mejorado G3A1 en 1963."
