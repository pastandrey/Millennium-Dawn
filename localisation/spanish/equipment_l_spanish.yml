 SPR_transport_helicopter_1: "Bell UH-1H Huey"
 SPR_transport_helicopter_1_short: "UH-1H Huey"
 SPR_transport_helicopter_1_desc: "Utility military helicopter powered by a single turboshaft engine, with two-blade main and tail rotors. The first member of the prolific Huey family, it was developed by Bell Helicopter to meet a United States Army's 1952 requirement for a medical evacuation and utility helicopter, and first flew in 1956. The UH-1 was the first turbine-powered helicopter produced for the United States military, and more than 16,000 have been built since 1960."
 SPR_transport_helicopter_2: "Airbus Helicopters AS 332 Super Puma"
 SPR_transport_helicopter_2_short: "As332 SuperPuma"
 SPR_transport_helicopter_2_desc: "A four-bladed, twin-engine, medium-size utility helicopter developed and marketed by Airbus Helicopters. It is a re-engined and more voluminous version of the original Aérospatiale SA 330 Puma."
 SPR_transport_helicopter_3: "Boeing CH-47 Chinook"
 SPR_transport_helicopter_3_short: "CH-47 Chinook"
 SPR_transport_helicopter_3_desc: "Twin-engined, tandem rotor, heavy-lift helicopter developed by American rotorcraft company Vertol and manufactured by Boeing Rotorcraft Systems. The CH-47 is among the heaviest lifting Western helicopters. The Chinook possesses several means of loading various cargoes, including multiple doors across the fuselage, a wide loading ramp located at the rear of the fuselage, and a total of three external ventral cargo hooks to carry underslung loads, as well."
 SPR_transport_helicopter_4: "NHIndustries NH-90"
 SPR_transport_helicopter_4_short: "NH-90"
 SPR_transport_helicopter_4_desc: "A medium-sized, twin-engine, multi-role military helicopter. It was developed in response to NATO requirements for a battlefield helicopter which would also be capable of being operated in naval environments. The Spanish NH90 variant features domestically assembled General Electric CT7 8F5 engines, customised communications suite, and Indra-developed electronic warning systems."
 SPR_transport_helicopter_5: "Sikorsky UH-60 Stealth Hawk"
 SPR_transport_helicopter_5_short: "Sikorsky UH-60S Stealth Hawk"
 SPR_attack_helicopter_1: "Bell Helicopter Textron AH-1 Cobra"
 SPR_attack_helicopter_1_short: "AH-1 Cobra"
 SPR_attack_helicopter_1_desc: "Helicóptero de ataque monomotor bipala fabricado por Bell Helicopter. Se desarrolló utilizando el sistema de motor, transmisión y rotor del Bell UH-1 Iroquois. Miembro de la prolífica familia Huey, el AH-1 también se conoce como HueyCobra o Snake. La Armada Española lo denominó \"Z-14\". Estaban equipados con el sistema de cañón M35 de 20 mm y se utilizaban para apoyar a las lanchas patrulleras costeras."
 SPR_attack_helicopter_2: "Bell Helicopter OH-58A Kiowa"
 SPR_attack_helicopter_2_short: "OH-58A Kiowa"
 SPR_attack_helicopter_2_desc: "El OH-58A Kiowa es un helicóptero de observación de cuatro plazas. El Kiowa tiene dos asientos para el piloto, aunque los controles del asiento izquierdo están diseñados para poder transportar a un pasajero en la parte delantera. Durante su desarrollo en Vietnam, se equipó con la ametralladora eléctrica M134 Minigun de 7,62 mm."
 SPR_attack_helicopter_3: "Eurocopter Tigre"
 SPR_attack_helicopter_3_short: "Tigre"
 SPR_attack_helicopter_4: "Eurocopter Tigre E Mk2"
 SPR_attack_helicopter_4_short: "Tigre E Mk2"
 SPR_attack_helicopter_4_desc: "A four-bladed, twin-engined attack helicopter. It is manufactured by Airbus Helicopters, wich designate it as the EC665. In Spain it is called the Tigre. The Tigre has the distinction of being the first all-composite helicopter developed in Europe; incorporates advanced features such as a glass cockpit, stealth technology, and high agility to increase its survivability."
 SPR_attack_helicopter_5: "Airbus Helicopters EC665 Tigre Mark3"
 SPR_attack_helicopter_5_short: "Tigre MK3"
 SPR_attack_helicopter_5_desc: "España colaboró ​​con Francia, Alemania y Australia en la modernización del Tiger HAD, conocido como Tiger Mk3. Un aspecto clave de esta modernización ha sido la adopción de un misil antitanque común, así como otras mejoras en áreas como el sistema de comunicaciones."
