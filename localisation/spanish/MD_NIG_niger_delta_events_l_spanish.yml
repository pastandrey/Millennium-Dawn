 nigeria_delta.1.t: "El Auge de MEND"
 nigeria_delta.1.d: "En los arroyos y pantanos del delta del Níger, ha surgido una nueva amenaza para la industria petrolera nigeriana. El Movimiento para la Emancipación del Delta del Níger, conocido como MEND, se ha formado a partir de una coalición de grupos militantes, entre ellos el NDPVF y varias milicias étnicas. Liderado por una figura sombría conocida simplemente como \"Jomo Gbomo\", el MEND ha declarado la guerra a las compañías petroleras extranjeras y al gobierno nigeriano, exigiendo un mayor control de los ingresos petroleros para las comunidades locales y el fin de la devastación ambiental causada por décadas de extracción.\n\n Su primera acción importante - el secuestro de cuatro trabajadores petroleros extranjeros— ha conmocionado al sector energético internacional. La posición de Nigeria como el mayor productor de petróleo de África se encuentra ahora bajo amenaza directa. ¿Cómo debemos responder a esta creciente insurgencia?"
 nigeria_delta.1.a: "Desplegar el ejército para aplastar a los militantes."
 nigeria_delta.1.b: "Negociaciones abiertas con líderes militantes."
 nigeria_delta.1.c: "Monitorear la situación por ahora."
 nigeria_delta.2.t: "Plataforma Petrolera Bajo Ataque"
 nigeria_delta.2.d: "Militantes del MEND lanzaron un ataque devastador contra una importante plataforma petrolera operada por Shell en el delta del Níger. Lanchas rápidas armadas invadieron las instalaciones al amanecer, abrumando a las fuerzas de seguridad y obligando a la evacuación de trabajadores extranjeros. Los daños a la infraestructura crítica afectarán significativamente la producción petrolera de la región.\n\n Las compañías petroleras internacionales amenazan con retirar sus operaciones por completo si no se puede garantizar la seguridad. Debemos decidir cómo responder a esta crisis en escalada."
 nigeria_delta.2.a: "Aumentar la seguridad en todas las instalaciones petroleras."
 nigeria_delta.2.b: "Dejemos que las compañías petroleras se encarguen de su propia seguridad."
 nigeria_delta.3.t: "Trabajadores Extranjeros Secuestrados"
 nigeria_delta.3.d: "MEND ha secuestrado a varios trabajadores petroleros extranjeros de una planta de Chevron en el delta del Níger. El grupo militante exige la liberación de sus miembros encarcelados y el pago de un cuantioso rescate. La presión internacional aumenta para el regreso sano y salvo de los rehenes.\n\n Las familias de los trabajadores secuestrados imploran por su liberación. El mundo entero está atento a nosotros: nuestra gestión de esta situación definirá la reputación de Nigeria a nivel internacional."
 nigeria_delta.3.a: "Pagar el rescate para asegurar su liberación."
 nigeria_delta.3.b: "Lanzar una operación de rescate militar."
 nigeria_delta.3.c: "Intentar negociar su liberación."
 nigeria_delta.4.t: "Gran Oleoducto Saboteado"
 nigeria_delta.4.d: "Militantes detonaron explosivos a lo largo de un importante oleoducto en el delta del Níger, provocando un incendio masivo y daños ambientales significativos. El oleoducto Transnigeriano, que transporta crudo desde el delta hasta las terminales de exportación, sufrió graves daños.\n\n La producción de petróleo se detuvo en la zona afectada y las operaciones de limpieza tardarán meses. El impacto ambiental en las comunidades pesqueras locales ha sido catastrófico, lo que podría impulsar a más reclutas a unirse a los militantes."
 nigeria_delta.4.a: "Desplegar fuerzas militares para proteger los oleoductos restantes."
 nigeria_delta.4.b: "Centrarse en las reparaciones y aplazar la acción militar."
 nigeria_delta.5.t: "Presión Internacional Aumenta"
 nigeria_delta.5.d: "Estados Unidos y el Reino Unido han expresado su profunda preocupación por el deterioro de la seguridad en el delta del Níger. Ambas naciones tienen importantes inversiones en petróleo nigeriano y amenazan con consecuencias diplomáticas si no se resuelve la crisis.\n\n Han ofrecido asistencia financiera y técnica para combatir la insurgencia, pero aceptarla significaría permitir una mayor influencia extranjera en nuestros asuntos internos. Por otro lado, actuar en solitario podría resultar costoso e ineficaz."
 nigeria_delta.5.a: "Aceptar ayuda internacional"
 nigeria_delta.5.b: "Manejar esta crisis nosotros mismos."
 nigeria_delta.10.t: "La Propuesta de Amnistía"
 nigeria_delta.10.d: "Tras años de conflicto que han reducido la producción petrolera de Nigeria en un tercio, el gobierno está considerando un enfoque innovador y audaz: ofrecer una amnistía general a los militantes del Delta del Níger a cambio de su desarme. La propuesta, respaldada por el presidente Yar'Adua, proporcionaría rehabilitación, entrenamiento y estipendios mensuales a los excombatientes.\n\n Los críticos argumentan que recompensar la insurrección armada sienta un precedente peligroso, mientras que los partidarios sostienen que el enfoque militar ha fracasado y que el diálogo es la única vía para una paz duradera. Se estima que 26.000 militantes podrían verse afectados por esta decisión."
 nigeria_delta.10.a: "Ofrecer amnistía general a todos los militantes."
 nigeria_delta.10.b: "Ofrecer amnistía condicional con términos estrictos."
 nigeria_delta.10.c: "Continúen las operaciones militares."
 nigeria_delta.11.t: "El Programa de Amnistía: Resultados"
 nigeria_delta.11.d: "El Programa de Amnistía Presidencial ha llegado a su fin. Miles de exmilitantes han entregado sus armas y se han incorporado al programa de rehabilitación. Los arroyos del delta del Níger están más tranquilos ahora que en años.\n\n El éxito de este programa se juzgará no solo por la cantidad de armas recolectadas, sino por si se puede mantener una paz duradera en la región. Los agravios subyacentes —la devastación ambiental, la pobreza y la falta de desarrollo— siguen en gran medida sin abordarse."
 nigeria_delta.11.a: "La amnistía ha tenido éxito: la paz vuelve al Delta."
 nigeria_delta.11.b: "Éxito parcial, pero aún quedan desafíos."
 nigeria_delta.11.c: "La amnistía ha fracasado: la violencia volverá."
 nigeria_delta.12.t: "Programa de Amnistía Colapsa"
 nigeria_delta.12.d: "El Programa de Amnistía Presidencial ha colapsado. Exmilitantes se quejan de que los pagos prometidos no se han materializado, los programas de entrenamiento son inadecuados y la corrupción ha desviado los fondos destinados a la rehabilitación. Muchos han regresado a sus antiguas costumbres, y una nueva generación de combatientes está emergiendo en los arroyos.\n\n La frágil paz lograda mediante la negociación se ha hecho añicos. Debemos prepararnos para la reanudación del conflicto en el delta del Níger."
 nigeria_delta.12.a: "Prepárese para lo peor."
 nigeria_delta.20.t: "Los Vengadores del Delta del Níger"
 nigeria_delta.20.d: "Un nuevo grupo militante ha surgido en el Delta del Níger. Autodenominados los \"Vengadores del Delta del Níger\", han iniciado una campaña sistemática de sabotaje contra la infraestructura petrolera que supera incluso los ataques anteriores del MEND. Sus sofisticadas operaciones sugieren vínculos con antiguos comandantes del MEND.\n\n Los Vengadores afirman que el gobierno ha incumplido sus promesas a la población del Delta del Níger y que solo la fuerza puede forzar el cambio. La producción petrolera de Nigeria se ve nuevamente amenazada por esta nueva insurgencia."
 nigeria_delta.20.a: "Desplegar la Fuerza de Tarea Conjunta inmediatamente."
 nigeria_delta.20.b: "Intenta abrir el diálogo con los Vengadores."
 nigeria_delta.21.t: "Estado de Emergencia en el Delta del Níger"
 nigeria_delta.21.d: "La situación de seguridad en el delta del Níger se ha deteriorado hasta el punto de imposibilitar la gobernanza normal. Los militantes controlan amplias zonas de la región, la producción petrolera se ha desplomado y la violencia se está extendiendo.\n\n El ejército solicita poderes de emergencia para afrontar la crisis. Un estado de emergencia permitiría toques de queda, arrestos masivos y operaciones militares sin supervisión civil. Esta podría ser la única manera de restablecer el orden, o podría hundir aún más la región en el caos."
 nigeria_delta.21.a: "Declarar el estado de emergencia"
 nigeria_delta.21.b: "Mantener las operaciones normales."
 nigeria_delta.30.t: "Paz en el Delta del Níger"
 nigeria_delta.30.d: "Tras años de conflicto, negociación y reformas meticulosas, la crisis del Delta del Níger finalmente se ha resuelto. La producción petrolera ha recuperado su capacidad máxima y la región experimenta un desarrollo sin precedentes. Exmilitantes se han reintegrado con éxito a la sociedad y las comunidades locales finalmente están viendo los beneficios de la riqueza petrolera de Nigeria.\n\n Las cicatrices del conflicto persisten, pero el futuro se ve más prometedor que en décadas. El Delta del Níger es un ejemplo de lo que se puede lograr cuando se abordan las quejas y todas las partes interesadas trabajan juntas por la paz."
 nigeria_delta.30.a: "Comienza un nuevo capítulo para el Delta del Níger."
 nigeria_delta.100.t: "MEND Surge en Nigeria"
 nigeria_delta.100.d: "Un nuevo grupo militante, el Movimiento para la Emancipación del Delta del Níger, ha surgido en Nigeria, amenazando la posición del país como el mayor productor de petróleo de África. Las compañías petroleras internacionales están en alerta máxima."
 nigeria_delta.100.a: "Desarrollos preocupantes, sin duda."
 nigeria_delta.101.t: "Anuncia un Programa de Amnistía en Nigeria"
 nigeria_delta.101.d: "El gobierno nigeriano ha anunciado un Programa de Amnistía Presidencial que ofrece una amnistía general a los militantes del Delta del Níger a cambio del desarme. Los observadores observan atentamente si esta audaz apuesta traerá paz a la convulsa región."
 nigeria_delta.101.a: "Esperamos tener éxito."
 nigeria_delta.102.t: "Ataque de los Vengadores en el Delta del Níger"
 nigeria_delta.102.d: "Un nuevo grupo militante, autodenominado \"Vengadores del Delta del Níger\", ha lanzado ataques contra la infraestructura petrolera nigeriana. La producción se ha visto gravemente afectada mientras el gobierno se esfuerza por responder a esta nueva amenaza."
 nigeria_delta.102.a: "El ciclo de violencia continúa."
 NIG_amnesty_success_tt: "El programa de amnistía ha tenido éxito. Más de 26.000 militantes han entregado las armas y han iniciado un programa de rehabilitación."
 NIG_niger_delta_crisis_1: "Disturbios Militantes en el Delta del Níger"
 NIG_niger_delta_crisis_1_desc: "Grupos militantes en el Delta del Níger están interrumpiendo la producción petrolera y amenazando a los trabajadores extranjeros. Si bien la situación aún se encuentra en un nivel controlable, requiere atención para evitar una escalada."
 NIG_niger_delta_crisis_2: "Insurgencia MEND"
 NIG_niger_delta_crisis_2_desc: "El Movimiento para la Emancipación del Delta del Níger ha lanzado una insurgencia a gran escala contra las compañías petroleras y las fuerzas gubernamentales. La producción petrolera ha disminuido significativamente a medida que se intensifican los ataques a la infraestructura."
 NIG_niger_delta_crisis_3: "El Delta del Níger en Plena Revuelta"
 NIG_niger_delta_crisis_3_desc: "El Delta del Níger se encuentra en plena revuelta. Los militantes controlan amplias zonas de la región, la producción petrolera se ha desplomado en un tercio y las empresas extranjeras están evacuando a su personal. Esto representa una amenaza existencial para la economía de Nigeria."
 NIG_amnesty_program_idea: "Programa de Amnistía Presidencial"
 NIG_amnesty_program_idea_desc: "El gobierno ha lanzado un ambicioso programa de amnistía que ofrece rehabilitación, capacitación y estipendios a los exmilitantes que entreguen las armas. El programa requiere importantes recursos, pero ofrece esperanzas de una paz duradera."
 NIG_failed_amnesty_idea: "Programa de Amnistía Fallido"
 NIG_failed_amnesty_idea_desc: "El Programa de Amnistía Presidencial ha fracasado. Exmilitantes se quejan de promesas incumplidas y muchos han recaído en la violencia. Una nueva generación de combatientes está emergiendo en los arroyos del delta del Níger."
 NIG_niger_delta_avengers_idea: "Vengadores del Delta del Níger"
 NIG_niger_delta_avengers_idea_desc: "Los Vengadores del Delta del Níger, un nuevo grupo militante, han lanzado sofisticados ataques contra la infraestructura petrolera. Sus operaciones sugieren vínculos con antiguos comandantes del MEND y han afectado gravemente la producción petrolera."
 NIG_nddc_reformed_idea: "NDDC reformado"
 NIG_nddc_reformed_idea_desc: "La Comisión de Desarrollo del Delta del Níger se ha reformado para atender mejor las necesidades de las comunidades locales. Se ha reducido la corrupción y los proyectos de desarrollo están llegando a las personas a las que estaban destinados."
 NIG_oil_revenue_sharing_idea: "Acuerdo de Reparto de Ingresos Petroleros"
 NIG_oil_revenue_sharing_idea_desc: "Un nuevo acuerdo garantiza que una mayor proporción de los ingresos petroleros se destine a las comunidades del Delta del Níger. Esto ha reducido significativamente las quejas y mejorado las relaciones entre el gobierno y la población local."
 NIG_joint_task_force_idea: "Fuerza de Tarea Conjunta Activa"
 NIG_joint_task_force_idea_desc: "Se ha desplegado una fuerza de tarea militar conjunta en el Delta del Níger para llevar a cabo operaciones contra militantes. Si bien la presencia militar es eficaz para reducir los ataques, también genera fricción con las comunidades locales."
 NIG_niger_delta_resolved_idea: "Paz en el Delta del Níger"
 NIG_niger_delta_resolved_idea_desc: "La crisis del Delta del Níger se ha resuelto mediante una combinación de medidas de negociación, desarrollo y seguridad. La región disfruta de una paz y una prosperidad sin precedentes, y la producción de petróleo ha alcanzado niveles récord."
 NIG_niger_delta_decisions_category: "Crisis del Delta del Níger"
 NIG_niger_delta_decisions_category_desc: "Decisiones relacionadas con la gestión de la insurgencia en el Delta del Níger y la implementación de soluciones a la crisis."
 NIG_joint_task_force_operation: "Operación de la Fuerza de Tarea Conjunta"
 NIG_joint_task_force_operation_desc: "Lanzar una operación militar en el delta del Níger para combatir a los militantes y proteger la infraestructura petrolera."
 NIG_naval_patrol_gulf_of_guinea: "Patrulla Naval - Golfo de Guinea"
 NIG_naval_patrol_gulf_of_guinea_desc: "Desplegar patrullas navales en el Golfo de Guinea para combatir la piratería y proteger las plataformas petrolíferas marinas."
 NIG_protect_oil_infrastructure: "Proteger la Infraestructura Petrolera"
 NIG_protect_oil_infrastructure_desc: "Desplegar fuerzas de seguridad para proteger la infraestructura petrolera crítica en el delta del Níger de ataques militantes."
 NIG_negotiate_with_militant_leaders: "Negociar con Líderes Militantes"
 NIG_negotiate_with_militant_leaders_desc: "Abrir negociaciones secretas con los líderes militantes del Delta del Níger para explorar posibilidades de paz."
 NIG_implement_amnesty_program: "Implementar el Programa de Amnistía"
 NIG_implement_amnesty_program_desc: "Lanzar el Programa de Amnistía Presidencial, ofreciendo rehabilitación y estipendios a los militantes que entreguen sus armas."
 NIG_reintegration_training: "Entrenamiento de Reintegración"
 NIG_reintegration_training_desc: "Financiar programas adicionales de capacitación y rehabilitación para ex militantes a fin de mejorar sus posibilidades de reintegración exitosa."
 NIG_oil_revenue_sharing_agreement: "Acuerdo de Reparto de Ingresos Petroleros"
 NIG_oil_revenue_sharing_agreement_desc: "Negociar un acuerdo con las compañías petroleras y las comunidades locales para garantizar una distribución más justa de los ingresos petroleros."
 NIG_environmental_cleanup_program: "Programa de Limpieza Ambiental"
 NIG_environmental_cleanup_program_desc: "Poner en marcha un importante programa de limpieza para abordar décadas de daño ambiental causado por la extracción de petróleo en el Delta del Níger."
 NIG_request_international_mediation: "Solicitar Mediación Internacional"
 NIG_request_international_mediation_desc: "Solicitar asistencia a la comunidad internacional para ayudar a mediar en la crisis del Delta del Níger."
 NIG_reform_nddc: "Reformar el NDDC"
 NIG_reform_nddc_desc: "Reformar la Comisión de Desarrollo del Delta del Níger para reducir la corrupción y mejorar la ejecución de proyectos de desarrollo en las comunidades locales."