 SOO_help_ossetia_SOV: "Inversiones en §Y[SOO.GetNameWithFlag]§!"
 SOO_help_ossetia_SOV_desc: "Apoyaremos financieramente el Presupuesto de Osetia del Sur, ya que este estado no puede hacerlo por sí solo. Ingresos Adicionales: $§R-0.120§!"
 SOO_help_ossetia: "Inversiones del §Y[SOV.GetNameWithFlag]§!"
 SOO_help_ossetia_desc: "Rusia nos proporciona financiación y esto permite que nuestra economía se mantenga a flote. Ingresos adicionales: $$§G0.120§!"
 SOO_develop_turism: "Desarrollo de Turismo"
 SOO_develop_turism_desc: "Desarrollaremos el turismo interno, lo que debería aportar ingresos adicionales a nuestras arcas. Ingresos adicionales:  $§G0.100§!"
 SOO_Mamison_path: "Paso Mamison"
 SOO_Mamison_path_desc: ""
 SOO_hydroelectric_dams: "Sistemas de microcentrales hidroeléctricas"
 SOO_Tskhinvali_district: "Distrito de Tskhinvali"
 SOO_GAS_Electrical_lines: "Líneas de gas y electricidad"
 SOO_Java_townlet: "Pueblo Java"
 SOO_reinforced_roads: "Carreteras reforzadas"
 SOO_subsidise_the_Farmers: "Subvenciones para los agricultores"
 SOO_subsidise_the_Farmers_desc: "Nuestro país es muy pobre, necesitamos aprovechar todas las oportunidades para obtener ingresos para el presupuesto. Intentaremos estimular a nuestros agricultores."
 SOO_Roki_Tunnel_tollage: "Reparar el túnel de Roki"
 SOO_Roki_Tunnel_tollage_desc: "Necesitamos reparar este túnel, porque sólo gracias a él tenemos conexión con Rusia."
 SOO_Tskhinvali_gas_and_electricity_network: "Abastecimiento de energía de Tskhinvali"
 SOO_Tskhinvali_gas_and_electricity_network_desc: "Proporcionaremos a Tskhinvali todo lo necesario en materia de energía."
 SOO_Move_towards_cash_crop_growth: "Aumentar el volumen de comercio con Rusia"
 SOO_Move_towards_cash_crop_growth_desc: "Estamos dispuestos a aumentar el suministro de nuestros productos agrícolas a Rusia"
 SOO_Rural_Revitalization: "Invertir en la restauración de infraestructuras"
 SOO_Rural_Revitalization_desc: "Necesitamos restaurar nuestras carreteras, que han estado dañadas durante muchos años."
 SOO_konserv_zavod: "Abrir una fábrica de conservas"
 SOO_konserv_zavod_desc: "Abriremos una fábrica de conservas en nuestro país, daremos trabajo a la gente y obtendremos buenos beneficios de ello."
 SOO_Redevelop_the_Mamison_Pass: "Reurbanización del paso Mamison"
 SOO_Redevelop_the_Mamison_Pass_desc: "El paso de Mamison es un paso accidentado y montañoso en la frontera entre Osetia y Rusia. Por él pasa la carretera militar de Osetia, construida entre 1854 y 1889 por el Imperio ruso. Hoy en día, la carretera está muy eclipsada por la carretera transcaucásica."
 SOO_The_Ergneti_market: "Mercado de Ergneti"
 SOO_The_Ergneti_market_desc: "Ergneti es un pueblo en las afueras de Tskhinvali, en el lado georgiano de la frontera. El mercado, al que acuden la mayoría de los habitantes georgianos locales para comprar un paquete de cigarrillos rusos baratos y doce botellas de alcohol, se ha convertido en un mercado negro que abarca todo tipo de productos, desde productos agrícolas hasta bienes industriales. El mercado sirvió como mecanismo de fijación de precios para toda la región, creando una dinámica social. El mercado de Ergneti se ha convertido en la fuente de ingresos más fiable y sostenible para miles de osetios y georgianos por igual."
 SOO_Sponsor_the_Georgian_grey_market: "Patrocinador del mercado gris de Georgia"
 SOO_Sponsor_the_Georgian_grey_market_desc: "El mercado gris georgiano surgió a partir de la avalancha de productos rusos que llegaban a la región, la mayor parte de los cuales cruzaban la frontera con Osetia por la carretera transcaucásica. El patrocinio del mercado gris ha permitido que se convirtiera en una fuente de ingresos sin explotar para un estado necesitado como el nuestro."
 SOO_fostering_economic_ties: "Fomentando los lazos económicos"
 SOO_fostering_economic_ties_desc: "Ergneti ha servido como un elemento fundamental para la paz entre Osetia del Sur y Georgia; para mantener el camino del crecimiento estable, debemos aprovechar la oportunidad para forjar vínculos más estrechos con el Estado georgiano."
 SOO_tourism: "Turismo en Osetia del Sur"
 SOO_tourism_desc: "Nuestro país tiene hermosos paisajes y vistas, es hora de desarrollar infraestructura para que los turistas puedan acceder a esta belleza."
 SOO_A_Shifting_market: "Mercado cambiante"
 SOO_A_Shifting_market_desc: "El gobierno georgiano ha cerrado el mercado; debemos planificar un futuro en nombre de la nación sobre cómo abordar este problema; con muchos perdiendo sus empleos, nos vemos obligados a adaptarnos alineándonos con una mayor ayuda rusa y un enfoque más amplio en el contrabando y otras fuentes ilegales de comercio."
 SOO_Host_transit_tax: "Impuesto de tránsito del anfitrión"
 SOO_Host_transit_tax_desc: "El mercado de Ergneti todavía se proclama un mercado negro. Para aprovechar nuestros ingresos no explotados podemos establecer un impuesto de tránsito en el lado osetio de la frontera. Esto puede dar a muchos una opción desagradable, pero el dinero sólo se junta dentro de su propio estado y no dentro del vecino del otro lado de la frontera."
 SOO_Promote_contraband: "Promover el contrabando"
 SOO_Promote_contraband_desc: "Con el reciente cierre del mercado por parte del gobierno georgiano, nos vemos obligados a buscar ingresos por otros medios. Grandes sectores de la población de ambos lados de la frontera están molestos con el reciente cierre del mercado por parte de Georgia. Ahora nos vemos obligados a comerciar con productos de contrabando."
 SOO_regulate_the_market: "Regulaciones del mercado"
 SOO_regulate_the_market_desc: "Se necesitan regulaciones del mercado para erradicar cualquier comportamiento ilegal. Esto resultará más atractivo para la parte georgiana, ya que es más probable que mantenga abierto el mercado incluso en tiempos de cambio o de crecientes tensiones."
 SOO_Districted_Oversight: "Supervisión del distrito"
 SOO_Districted_Oversight_desc: "Con esta nueva administración, el órgano de gobierno de los territorios georgianos debe comenzar el proceso de integración de la contaminación en las costumbres del Estado osetio y en sus ideas."
 SOO_Resilient_Commerce: "Comercio resiliente"
 SOO_Resilient_Commerce_desc: "Intentaremos comerciar de forma más activa que antes para ampliar nuestro potencial técnico."
 SOO_Raise_Import_Tariffs: "Aumentar los aranceles de importación"
 SOO_Raise_Import_Tariffs_desc: "Aumentaremos los aranceles de importación para mejorar los ingresos de nuestro fisco"
 SOO_the_Russian_bankroll: "Dejen entrar a los bancos rusos"
 SOO_the_Russian_bankroll_desc: "Tendremos que dejar entrar a los bancos rusos para apoyar nuestra economía"
 SOO_new_developments_in_Kvaisa: "Energía de Osetia"
 SOO_new_developments_in_Kvaisa_desc: "Iniciaremos la construcción de una central eléctrica para garantizar la seguridad energética"
 SOO_Boost_the_local_flour_production: "Inversiones en producción de harina"
 SOO_Boost_the_local_flour_production_desc: "Cualquier producto agrícola debe ser invertido por nuestro estado."
 SOO_Tractor_Imports: "Importación de Tractores"
 SOO_Tractor_Imports_desc: "Importamos tractores para las necesidades de nuestra agricultura."
 SOO_Forestry_Development: "Industria forestal"
 SOO_Forestry_Development_desc: "Intentaremos desarrollar nuevamente nuestra industria forestal"
 SOO_increase_tolls_on_Roki_Tunnel: "Aumentan los peajes del túnel Roki"
 SOO_increase_tolls_on_Roki_Tunnel_desc: "Aumentaremos los peajes en el túnel de Roki"
 SOO_South_Ossetian_State_University: "Universidad Estatal de Osetia del Sur"
 SOO_South_Ossetian_State_University_desc: "Nuestra república necesita las mejores mentes"
 SOO_Dzuarikau_Tskhinvali_pipeline: "Oleoducto reparado"
 SOO_Dzuarikau_Tskhinvali_pipeline_desc: "Este oleoducto es vital para nosotros."
 SOO_Develop_Tskhinvali: "Infraestructura de Tskhinvali"
 SOO_Develop_Tskhinvali_desc: "Las carreteras locales claramente necesitan reparación."
 SOO_Develop_Java: "Restauración de Java"
 SOO_Develop_Java_desc: "Este acuerdo también necesita inyecciones financieras."
 SOO_Revive_soviet_era_works: "Revivir el legado soviético"
 SOO_Revive_soviet_era_works_desc: "Es hora de recuperar lo que se perdió y se destruyó a lo largo de los años: el legado de la URSS."
 SOO_Develop_Gori: "Desarrollo de Gori"
 SOO_Develop_Gori_desc: "También es necesario construir nuevos territorios de nuestra república."
 SOO_private_sector: "Sector privado"
 SOO_private_sector_desc: "Promovemos el desarrollo del sector privado en el territorio de nuestra república."
 SOO_Geared_for_hardship: "Dificultades de desarrollo"
 SOO_Geared_for_hardship_desc: "Tenemos un largo camino por recorrer en el desarrollo y la reactivación de nuestra economía, específicamente la agricultura."
 SOO_Gori_Tskhinvali_rail_link: "Ruta de transporte Gori - Tskhinvali"
 SOO_Gori_Tskhinvali_rail_link_desc: "Conectaremos nuestro nuevo territorio con el resto de la república."
 SOO_Ministry_of_internal_affairs: "Ministerio del Interior"
 SOO_Ministry_of_internal_affairs_desc: "Nuestra república debería dormir tranquila"
 SOO_Reinforce_Parliamentary_administration: "Cambiar la dirección del Parlamento"
 SOO_Reinforce_Parliamentary_administration_desc: "Es hora de que haya gente nueva en la política."
 SOO_Dismantle_Parliamentary_Dominance: "La abolición del dominio del Parlamento"
 SOO_Dismantle_Parliamentary_Dominance_desc: "El Parlamento no debería gobernar el país solo"
 SOO_Downplay_opposition_forces: "Suprimir la oposición"
 SOO_Downplay_opposition_forces_desc: "La oposición en la forma que existe ahora amenaza nuestra república y su estabilidad."
 SOO_banner_of_the_people: "Bandera del Pueblo"
 SOO_banner_of_the_people_desc: "Los verdaderos hijos de Osetia están dispuestos a defender nuestro país."
 SOO_Political_independent: "Independencia política"
 SOO_Political_independent_desc: "Nuestra política estará menos sujeta a una o un grupo de personas."
 SOO_Defenders_of_the_Fatherland: "Defensores de la patria"
 SOO_Defenders_of_the_Fatherland_desc: "Nuestros combatientes lucharán hasta el final por nuestra patria."
 SOO_Evaluate_the_existing_constitution: "Evaluar la Constitución actual"
 SOO_Evaluate_the_existing_constitution_desc: "¿Tal vez sea hora de cambiar la constitución actual?"
 SOO_Allow_presidential_constitution_changes: "Enmienda constitucional presidencial"
 SOO_Allow_presidential_constitution_changes_desc: "Nuestro presidente tiene su propia visión sobre la constitución."
 SOO_The_Regal_Relinquishment: "Nueva vida política"
 SOO_The_Regal_Relinquishment_desc: "Es hora de que nuestra república dé vida a nuestra vida política."
 SOO_Reform_the_distribution_of_farmland: "Reforma Agrícola"
 SOO_Reform_the_distribution_of_farmland_desc: "La principal fuente de nuestros ingresos son los productos agrícolas. Debemos reformar este sector de manera competente."
 SOO_The_Kremlin_state: "Estado pro-Kremlin"
 SOO_The_Kremlin_state_desc: "No tenemos más aliados que Rusia."
 SOO_Ossetian_Patriotism_Reforms: "Patriotismo Oseta"
 SOO_Ossetian_Patriotism_Reforms_desc: "Todos debemos ser conscientes y estar preparados para luchar por nuestra patria."
 SOO_adopted_a_new_constitution: "Nueva Constitución"
 SOO_adopted_a_new_constitution_desc: "Es hora de adoptar una nueva Constitución"
 SOO_Enduring_the_Sovereignty_Fight: "Continuar la lucha por la independencia"
 SOO_Enduring_the_Sovereignty_Fight_desc: "Mientras no seamos parte de Rusia, tendremos que luchar por nuestra independencia."
 SOO_pro_russian: "Curso prorruso"
 SOO_pro_russian_desc: "Nuestro objetivo final al final es la reunificación con nuestros hermanos Osetia del Norte y Rusia."
 SOO_integrate_to_russian_army: "Integración en el ejército ruso"
 SOO_integrate_to_russian_army_desc: "Estamos listos para integrarnos plenamente en el ejército ruso."
 SOO_referendum: "Referéndum sobre la adhesión a Rusia"
 SOO_referendum_desc: "Hemos estado pensando en esto durante mucho tiempo, es hora de celebrar este referéndum."
 SOO_invest: "Inversiones en nuestra economía"
 SOO_invest_desc: "Rusia está dispuesto a invertir en nuestra economía."
 SOO_rosbanks: "Bancos rusos"
 SOO_rosbanks_desc: "Los bancos rusos están dispuestos a entrar en nuestro territorio, esto fortalecerá nuestra economía"
 SOO_inverv_warfrare: "La doctrina rusa de la intervención militar"
 SOO_inverv_warfrare_desc: "Seguiremos la doctrina militar de nuestro país y participaremos activamente en los conflictos mundiales."
 SOO_fight_start: "Comienza la lucha por la libertad de Osetia"
 SOO_fight_start_desc: "El clan Tadeev ha aterrorizado a nuestro país durante demasiado tiempo, es hora de lidiar con ellos."
 SOO_fight_narcota: "Detener la distribución de drogas"
 SOO_fight_narcota_desc: "Eliminaremos a todas las personas asociadas con los Tedeev que estén involucradas en el tráfico de drogas."
 SOO_fight_contrabanda: "Cómo acabar con el contrabando ilegal"
 SOO_fight_contrabanda_desc: "El contrabando de Tadeevskaya será destruido para siempre"
 SOO_fight_alchohol: "Encubrir el alcohol ilegal"
 SOO_fight_alchohol_desc: "El alcohol ilegal ya no aparecerá en nuestro país"
 SOO_fight_reket: "Superar el racket"
 SOO_fight_reket_desc: "Nos ocuparemos de sus patéticos intentos de extorsionar a los empresarios de nuestro país."
 SOO_fight_orujie: "Destruir los canales de contrabando de armas"
 SOO_fight_orujie_desc: "Las armas ya no pasarán ilegalmente por nuestro país"
 SOO_fight_tamojnia: "Eliminar a los funcionarios de aduanas corruptos"
 SOO_fight_tamojnia_desc: "Limpiaremos a todos los empleados desleales de nuestras aduanas."
 SOO_fight_kgb: "Cómo hacer frente a la corrupción en el KGB"
 SOO_fight_kgb_desc: "Incluso en el KGB, los Tadeev fueron capaces de encontrar gente a la que se podía sobornar: es hora de acabar con esto."
 SOO_fight_minor: "Sacar a los funcionarios corruptos del Ministerio de Educación"
 SOO_fight_minor_desc: "La última persona que ocupa el cargo en el Ministerio de Educación, que otorga a la familia Tadeev el poder sobre el país, es hora de ocuparse de ella."
 SOO_end_fight: "Liberar el país"
 SOO_end_fight_desc: "Por fin nuestro país respirará en paz"
 SOO_prepare_for_war: "Preparándose para la guerra"
 SOO_prepare_for_war_desc: "La guerra es inevitable, debemos estar preparados para ella."
 SOO_call_abkhazia: "Llamamiento a Abjasia"
 SOO_call_abkhazia_desc: "Nosotros y los abjasios debemos estar juntos para contrarrestar la amenaza de Georgia."
 SOO_establish_connection_with_kavkaz: "Unión con Chechenia"
 SOO_establish_connection_with_kavkaz_desc: "Quizás los chechenos nos ayuden de nuevo como en los años 90."
 SOO_ossetia_at_war: "Experiencia en el campo de batalla"
 SOO_ossetia_at_war_desc: "En este momento, en el campo de batalla, nos estamos volviendo más fuertes y más experimentados."
 SOO_lessons_from_war: "Lecciones de guerra"
 SOO_lessons_from_war_desc: "La experiencia de esta guerra nos ha dado mucho"
 SOO_new_defences: "Nuevas inversiones militares"
 SOO_new_defences_desc: "Fortaleceremos nuestras inversiones en el ámbito militar"
 SOO_doctrine_update: "Doctrina Militar Actualizada"
 SOO_doctrine_update_desc: "Nuestra doctrina militar necesita un pequeño cambio"
 SOO_north_ossetia_ratnik: "Equipar completamente al ejército con un 'Ratnik'"
 SOO_north_ossetia_ratnik_desc: "El equipamiento militar ruso será la mejor opción para nuestro ejército"
 SOO_submission_to_the_russian_doctrine: "Sumisión a la doctrina rusa"
 SOO_submission_to_the_russian_doctrine_desc: "Pasaremos completamente a la Doctrina Rusa."
 SOO_Gori_pereseleniye: "Asentamiento de Gori"
 SOO_Gori_pereseleniye_desc: "Permitiremos a nuestros ciudadanos poblar este territorio."
 SOO_foreign_relations: "Diplomacia internacional"
 SOO_foreign_relations_desc: "Necesitamos establecer relaciones internacionales"
 SOO_reinforce_sng2: "Socios del CEI-2"
 SOO_reinforce_sng2_desc: "Nuestros socios más cercanos son miembros del CEI-2"
 SOO_russian_ms: "Cooperación con la industria militar rusa"
 SOO_russian_ms_desc: "El equipo militar ruso es la mejor opción para comprar...y la única"
 SOO_russian_arms: "Comprar tanques rusos"
 SOO_russian_arms_desc: "Podemos llegar a cualquier parte con los tanques rusos."
 SOO_transnistria_accept: "Contrabando desde Transnistria"
 SOO_transnistria_accept_desc: "Los depósitos de armas de Pridnestrovia serán interesantes para nuestro país"
 SOO_abkahz_relations: "Mejorar las relaciones con los abjasios"
 SOO_abkahz_relations_desc: "Los abjasios y los osetios son hermanos para siempre"
 SOO_abkahz_def_pact: "Pacto defensivo con Abjasia"
 SOO_abkahz_def_pact_desc: "Debemos estar preparados para defendernos junto con los abjasios."
 SOO_trade_abk_def: "Comercio con Abjasia"
 SOO_trade_abk_def_desc: "Es necesario establecer relaciones comerciales con Abjasia"
 SOO_syria_relations: "Pueblo fraterno sirio"
 SOO_syria_relations_desc: "Siria resultó ser un socio inesperado para nuestro país, con el que vale la pena establecer relaciones."
 SOO_venez_relations: "Interacción con Venezuela"
 SOO_venez_relations_desc: "Incluso a pesar de la gran distancia, estamos dispuestos a establecer cooperación con Venezuela"
 SOO_shara_relat: "Interacción con el Sahara Meridional"
 SOO_shara_relat_desc: "Incluso a pesar de una distancia tan grande, estamos dispuestos a establecer una cooperación con el Sáhara Meridional."
 SOO_nikar_relations: "Interacción con Nicaragua"
 SOO_nikar_relations_desc: "A pesar de la gran distancia, estamos dispuestos a establecer una cooperación con Nicaragua."
 SOO_artsakh_relations: "Interacción con Artsaj"
 SOO_artsakh_relations_desc: "Nuestros socios, los hermanos de Artsaj serán excelentes aliados."
 SOO_artsakh_volunteers: "Voluntarios de Artsakh"
 SOO_artsakh_volunteers_desc: "Voluntarios de Artsakh vinieron a ayudar a nuestro país."
 SOO_approach_armenia: "Apoya a Armenia"
 SOO_approach_armenia_desc: "Los armenios y yo somos pueblos hermanos y nos ayudaremos mutuamente en todo."
 SOO_economic_pizda: "Inversiones rusas"
 SOO_economic_pizda_desc: "Rusia está dispuesta a invertir en nuestro país"
 SOO_nykhaz_russian_partnership: "Desarrollo de la asociación con Rusia"
 SOO_nykhaz_russian_partnership_desc: "Ampliaremos nuestra asociación con Rusia"
 SOO_further_integr_osset: "Integración con Osetia del Norte"
 SOO_further_integr_osset_desc: "Estamos listos para la integración con Osetia del Norte"
 SOO_podchistit_polit_pole: "Limpiar el campo político"
