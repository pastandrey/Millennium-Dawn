 un_ga_manipulate_vote_tt: "Al invertir poder e influencia política, podemos mover una resolución al principio de la lista, lo que facilita que la medida que queremos se apruebe más rápidamente. Asimismo, podemos invertir nuestra influencia para mover resoluciones al final de la lista.\n\n§YHaz Clic Izquierdo§!\nMueve la resolución al principio de la cola.\n\n§YHaz Clic Derecho§!\nMueve la resolución al final de la cola.\n\n§RADVERTENCIA§! Al mover votos al principio de la lista, no se omitirán los votos de confirmación de escaño del §YConsejo de Seguridad§! de  §BONU§!, ni los de §RSanción de Carretera§!."
