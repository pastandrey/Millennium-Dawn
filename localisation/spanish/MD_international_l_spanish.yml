 un_ascent_effect_tt: "Presenta una solicitud de §BONU§! §YAscenso§!, comenzando con una votación del §YConsejo de Seguridad§! y luego procediendo a una votación de la §YAsamblea General§! si la votación del §YConsejo de Seguridad§! es aprobada.\n\nPara lograr el §YReconocimiento Internacional§! y ser aceptado como un estado de las §BNaciones Unidas§!, debemos lograr lo siguiente:\n\n§GAprobar§! una votación de recomendación en el §YConsejo de Seguridad§!, requiriendo §Y9§! §GSi§! votos en total y §Y0§! §RNo§! votos de un §YMiembro de Seguridad Permanente§!\n\n§GAprobar§! una votación mayoritaria de §Y2/3§! en las §BNaciones Unidas§! §YAsamblea General§!, después de §GAprobar§! el §YConsejo de Seguridad§! votación."
