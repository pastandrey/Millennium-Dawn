 recog_cat_nation_guide_tt: "Como nación no reconocida, debemos esforzarnos por lograr que las §CNaciones Unidas§! nos reconozcan como estado independiente. Mediante la colaboración con aliados, peticiones a la §CONU§! y otras maniobras políticas, eventualmente podremos obtener el apoyo necesario para §YAscender§!"
