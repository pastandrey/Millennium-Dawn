 CT_internat_monitoring_desc: "Nuestros ciudadanos han comenzado a protestar contra nuestros esfuerzos por protegerlos mediante la recopilación masiva de datos. Debemos sobrellevar su indignación..."
 CT_protesting_arrests: "Protestas por arrestos antiterroristas"
 CT_protesting_arrests_desc: "Nuestros ciudadanos han comenzado a protestar por el uso de arrestos masivos para hacer frente a las amenazas terroristas. Debemos mejorar la calidad de nuestra inteligencia para prevenir protestas como estas en el futuro."
 CT_struck_by_terror_attack: "Struck by Terror Attack"
 CT_struck_by_terror_attack_desc: "Our nation has be struck by a terror attack from an international terror organization. It will take us time to recover from this brutal attack, both from a military and economic standpoint."
 CT_terror_attack_happened: "Global Terror Attack Occured"
 CT_terror_attack_happened_desc: "Our citizens are afraid that they may be next, if the terror attacks around the world keep occurring. We must do something to ensure their security."
 CT_terror_attack_prevented: "Terror Attack Prevented"
 CT_terror_attack_prevented_desc: "¡Nuestras fuerzas de inteligencia y antiterrorismo han detenido recientemente un ataque terrorista contra nuestra nación, consolidando la fe de la gente en nuestra capacidad para protegerlos!"
 MD_terror.1.t: "[org_doing_attack] Conducts Terror Attack!"
 MD_terror.1.d: "[org_doing_attack] conducted a terror attack against us today, an attack our intelligence and counter-terrorism agencies were unable to prevent. Reports about the damage and casulties are still coming in, but they are estimated to both be significant. We must now make a decision about our next move, in order to provide safety, security, and support to our citizens in this time of crisis."
 MD_terror.1.a: "We need to let local responses ocurr."
 MD_terror.1.b: "Send as much aid as we can!"
 MD_terror.2.t: "[org_doing_attack] Terror Attack Prevented!"
 MD_terror.2.d: "[org_doing_attack] attempted to conduct a terrorist attack today, but it was prevented thanks to the effective intelligence gathering of our agencies, and the brave action of our counter-terrorism teams. All of the involved terrorists have been either killed or captured, and their safehouses are currently being investigated for any further intelligence we can gain. Today is a great success for our Counter-Terror Forces!"
 MD_terror.2.a: "A Great Victory for [THIS.GetNameDef]!"
 MD_terror.3.t: "[FROM.GetName] Struck by Terror Attack!"
 MD_terror.3.d: "[FROM.GetName] was struck today by an attack from [org_doing_attack_int], who have managed to inflict significant damage and casulties on the the nation. As [FROM.GetName] reels from the attack, our own citizens are beginning to grow concerned about the possability of attacks on our own soil. We must make choices on if we shall send support to [FROM.GetName], and must decide what we shall do to provide comfort to our own citizens."
 MD_terror.3.a: "What a tragedy."
 MD_terror.3.b: "We must tighten our own security!"
 MD_terror.4.t: "[FROM.GetName] Prevented Terror Attack!"
 MD_terror.4.d: "The government of [FROM.GetName] annouced today that they had successfully prevented a terror attack by [org_doing_attack_int] inside their nation, using effective intelligence, police, and military operations to disrupt the terror cell prior to their attack. This success today is a great acheivement for the Global War on Terror!"
 MD_terror.4.a: "[FROM.GetNameDef] clearly was prepared."
 MD_terror.5.t: "Protests over Mass Data Collection"
 MD_terror.5.d: "Due to leaks in our intelligence community, the public has become aware of our mass data collection, in our efforts to prevent terrorism. The people, however, have seen this as a massive invasion of privacy, and have begun to criticize and protests against what they see as government overreach."
 MD_terror.5.a: "¡Es por su propio bien!"
 MD_terror.6.t: "Protestas por Arrestos Masivos"
 MD_terror.6.d: "Si bien nuestros arrestos masivos de simpatizantes de [name_of_org_disp] han sido eficaces para desbaratar sus operaciones, también hemos arrestado accidentalmente a un gran número de civiles inocentes y transeúntes, simplemente debido a información errónea. Como resultado, la opinión pública está indignada con nuestras operaciones antiterroristas y comienza a protestar por el uso de arrestos masivos y otras técnicas cruciales que debemos emplear para mantener la seguridad de nuestra nación."
 MD_terror.6.a: "¿No es suficiente decir lo siento?"
 MD_terror.7.t: "¡Infiltración Exitosa!"
 MD_terror.7.d: "Nuestro agente finalmente ha informado: se encuentra en su puesto y ya está dentro de la organización. Puede que tarde un poco, pero a medida que avancemos en nuestras operaciones, la información que nos transmitan será de gran utilidad para nuestra nación."
 MD_terror.7.a: "¡Su información será de gran valor!"
 MD_terror.8.t: "Agente Asesinado"
 MD_terror.8.d: "Lamentablemente, tras un tiempo sin noticias de nuestro agente, finalmente sabemos por qué. [name_of_org_disp] publicó hoy un video que muestra la ejecución de nuestro agente, entre otros. Claramente, fue descubierto o capturado, por lo que cualquier información que tuviéramos de él antes, o que estemos recopilando actualmente, tiene menos valor, ya que saben que lo estamos investigando."
 MD_terror.8.a: "Qué pérdida"
 MD_terror.9.t: "Indignación por el Aumento de las Medidas de Seguridad"
 MD_terror.9.d: "La ciudadanía está indignada por el aumento de las medidas de seguridad implementadas, que han complicado los viajes en transporte público por aire, mar y tierra. También está indignada por el aumento de la seguridad en los eventos gubernamentales, lo cual está generando tensiones en nuestras relaciones con la ciudadanía."
 MD_terror.9.a: "¡Las Medidas Deben Mantenerse!"
 MD_terror.9.b: "Quizás podamos reducir un poco su impacto..."
 MD_terror.11.t: "[FROM.GetName] Propone Ejercicios Antiterroristas Conjuntos"
 MD_terror.11.d: "[FROM.GetName] ha propuesto que realicemos ejercicios antiterroristas conjuntos para ampliar las capacidades de nuestras fuerzas militares y antiterroristas. Si aceptamos, tendremos que invertir fondos para que los ejercicios se realicen, pero ellos también tendrán que invertir dinero. Si nos negamos, probablemente los disgustaremos, pero lo superarán."
 MD_terror.11.a: "¡Realiza los Ejercicios!"
 MD_terror.11.b: "Esto es una pérdida de tiempo."
 MD_terror.13.t: "[FROM.GetName] ofrece Asesores"
 MD_terror.13.d: "[FROM.GetName] ha propuesto enviarnos asistencia, en forma de asesores extranjeros. Si bien esto aumentaría nuestra capacidad antiterrorista, también debemos asumir que dichos asesores informarán sobre nuestras actividades y capacidades, lo que podría provocar filtraciones de inteligencia."
 MD_terror.13.a: "¡Acepta la Oferta!"
 MD_terror.13.b: "¡[THIS.GetName] no necesita ayuda!"
 MD_terror.14.t: "[FROM.GetName] elimina Asesores"
 MD_terror.14.d: "[FROM.GetName] ha retirado sus operaciones antiterroristas de nuestro país, lo que ha disminuido nuestra capacidad para llevar a cabo operaciones antiterroristas."
 MD_terror.14.a: "¡Cómo se atreven ellos a hacer esto!"
 MD_terror.15.t: "¡[FROM.GetName] acepta Asesores!"
 MD_terror.15.d: "[FROM.GetName] ha aceptado nuestra oferta de asesores antiterroristas de nuestras agencias de inteligencia. Esto no solo nos ayudará a mejorar sus operaciones antiterroristas, sino que también nos permitirá conocer de cerca sus operaciones de recopilación y procesamiento de inteligencia."
 MD_terror.15.a: "Ellos hicieron la elección inteligente!"
 MD_terror.16.t: "¡[FROM.GetName] rechaza Asesores!"
 MD_terror.16.d: "[FROM.GetName] se ha negado a permitir que nuestros asesores antiterroristas ingresen a su país."
 MD_terror.16.a: "Bueno, es su pérdida."
