 unga_resolution_pass_effect_tt: "Si se aprueba esta resolución, todos los §BNaciones Unidas§! §YMiembros§! que votaron §GSí§! o que acepten la resolución una vez concluida la votación obtendrán lo siguiente:"
 unga_resolution_accept_later_tt: "Las naciones que inicialmente no votaron a favor aún pueden optar por aceptar la resolución después de que se apruebe, y también recibirán la idea."
