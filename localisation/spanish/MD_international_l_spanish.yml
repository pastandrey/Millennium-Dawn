 propose_ga_resolution_tt_delayed: "Abre el panel de propuestas de resolución de la §YAsamblea General§!. Puedes proponer resoluciones no vinculantes para que la §YAsamblea General§! las vote. Cada propuesta cuesta §Y200§! de poder político."
