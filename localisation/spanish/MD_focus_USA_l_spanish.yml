 USA_dynamic_modifier_us_army_tooltip: "Modifica §Y$USA_dynamic_modifier_us_army$§!:"
 USA_dynamic_modifier_us_navy_tooltip: "Modifica §Y$USA_dynamic_modifier_us_navy$§!:"
