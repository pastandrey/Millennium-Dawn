 USA_focus_the_pentagon_wars: "Las guerras del Pentágono"
 USA_focus_the_pentagon_wars_desc: "Hacia el final de la Guerra Fría y a principios del nuevo milenio, comenzó una creciente lucha interna en las altas esferas del Pentágono y en todo el aparato militar estadounidense. Los veteranos creían que el costo de las nuevas máquinas y armas de guerra sería una simple novedad que el enemigo podría usar para arruinarnos. Por otro lado, estaban los jóvenes innovadores, que creían que el radar moderno y otras innovaciones en armas militares definirían y moldearían el campo de batalla moderno. Esta lucha interna ha sido sensacionalizada por los medios de comunicación y Hollywood, pero solo quienes tienen la autoridad para ello conocen el verdadero desenlace."
 USA_focus_united_states_army: "Ejército de los Estados Unidos"
 USA_focus_united_states_army_desc: "Fundado como el Ejército Continental durante la Guerra de Independencia de los Estados Unidos, el Ejército de los Estados Unidos es uno de los tres pilares principales de las fuerzas armadas de este país. A lo largo de su historia, el ejército ha presenciado innumerables innovaciones, así como una buena dosis de corrupción. Pero en la era moderna, la rama se enfrenta a un nuevo desafío. Con el auge de las innovaciones tecnológicas, la brecha entre tecnología y tacto se está convirtiendo en un arma destructiva. Las pérdidas económicas, los proyectos de I+D que superan el presupuesto en cifras nunca vistas en décadas, y el simple sabotaje interno de oficiales y generales, significan que hay mucho por hacer. La pregunta es: ¿por dónde empezar?"
 USA_focus_five_star_folly: "La locura de las cinco estrellas"
 USA_focus_five_star_folly_desc: "El campo de batalla moderno se basa en la voluntad y la determinación, no en artilugios y dispositivos. Por lo tanto, debemos perfeccionar y reequipar nuestros esfuerzos de entrenamiento, nuestra estructura y la adaptabilidad de nuestras fuerzas con el equipo que ya tenemos. La I+D se reducirá y se limitará a mejoras en la calidad de vida, mejoras en las armas pequeñas y la destreza logística."
 USA_focus_infantry_doctrine_debate: "Debate sobre la doctrina de infantería"
 USA_focus_infantry_doctrine_debate_desc: "Para ser eficientes y reducir costos, debemos analizar la esencia del funcionamiento de nuestro ejército. Este pilar fundamental es el del soldado raso, la infantería. Actualmente, existen tres doctrinas principales que se mantuvieron vigentes durante y después de la Guerra Fría: la Doctrina de Infantería Ligera, la Doctrina de Infantería Móvil y la Doctrina de Infantería Blindada. Estas tres tienen sus pros y sus contras, pero la pregunta es cuál se adapta mejor a nuestra nación en términos de economía y flexibilidad."
 USA_focus_light_infantry_dominance: "Dominio de la infantería ligera"
 USA_focus_light_infantry_dominance_desc: "El soldado de a pie es el más fácil de moldear y adaptar a cualquier situación. Con esta llave, abriremos la puerta a la eficiencia, permitiendo que nuestros soldados puedan afrontar amenazas, tanto en tierra como en el aire."
 USA_focus_mobile_infantry_machine: "Máquina de infantería móvil"
 USA_focus_mobile_infantry_machine_desc: "Mediante la flexibilidad del soldado de infantería, combinada con la movilidad de los transportes motorizados y los vehículos de reconocimiento, nos esforzamos por crear la fuerza de ataque definitiva que constituye el núcleo de nuestro ejército."
 USA_focus_armored_infantry_ascendance: "Ascenso de la Infantería Blindada"
 USA_focus_armored_infantry_ascendance_desc: "Los tanques modernos son caros y muy costosos considerando la posible \"recompensa\" que ofrecen. Por lo tanto, debemos adaptar nuestra infantería para reemplazar y compensar estos derroches de dinero y crear un nuevo camino a seguir. La doctrina de infantería blindada garantizará la versatilidad del combate blindado, con un despliegue más eficiente y flexible de soldados de infantería para desviar la atención y confundir tanto a los elementos blindados como a las fuerzas ligeras del enemigo."
 USA_focus_tank_force_dilemma: "Dilema de la fuerza de tanques"
 USA_focus_tank_force_dilemma_desc: "El campo de batalla moderno ha vuelto casi obsoleto el uso original del tanque. Debemos considerar seriamente qué uso le daremos a estas enormes máquinas de metal si realmente queremos tener un ejército completo."
 USA_focus_repurposing_armored_programs: "Reorientación de programas blindados"
 USA_focus_repurposing_armored_programs_desc: "La directiva RAP supone una reorganización inmediata del ejército. Las fuerzas blindadas se reducirán casi por completo y se reservarán para tareas muy específicas si fuera necesario; sin embargo, la directiva principal será redirigir la investigación y los materiales hacia los vehículos de combate de infantería (VCI), los vehículos blindados de transporte de personal (VBP) y otros programas para reforzar y mejorar todos los demás aspectos del combate."
 USA_focus_modern_tanks_modern_solutions: "Tanques modernos, soluciones modernas"
 USA_focus_modern_tanks_modern_solutions_desc: "El tanque es una maravilla moderna y no debe descartarse como un simple artilugio de una época pasada. Al perfeccionar los métodos de producción y reorganizar las unidades, podemos convertir nuestra fuerza blindada en la fuerza principal de apoyo y compañera de nuestra infantería."
 USA_focus_logistical_dominance: "Dominio logístico"
 USA_focus_logistical_dominance_desc: "El ejército solo funciona cuando dispone del equipo esencial para mantener una fuerza de combate efectiva. Por lo tanto, debemos dar ejemplo fomentando y ampliando el aparato logístico para garantizar el funcionamiento oportuno y eficiente de nuestra red de abastecimiento y logística."
 USA_focus_fire_support_supremacy: "Supremacía de apoyo de fuego"
 USA_focus_fire_support_supremacy_desc: "La artillería, la reina del campo de batalla. Su movilidad se adapta a las necesidades de diseño, su capacidad para despejar áreas es efectiva de múltiples maneras y, además, puede resultar relativamente más económica que solicitar un avión. Por ello, invertiremos en nuestra artillería para garantizar que se convierta en el pilar fundamental de la guerra en la nueva era, tal como lo fue décadas e incluso siglos atrás."
 USA_focus_gold_star_program: "Programa Estrella Dorada"
 USA_focus_gold_star_program_desc: "El campo de batalla moderno se define por la ventaja tecnológica de nuestros enemigos. Si bien la carrera armamentista de la Guerra Fría ha terminado, nuestros enemigos siguen creciendo día a día, mientras la \"Era de Paz\" continúa gestándose y convirtiéndose en un hervidero de descontento, revoluciones y agitación social. Debemos invertir fuertemente en programas de I+D, perfeccionar nuestras integraciones tecnológicas y asegurarnos de ser no solo un ejército poderoso, sino un ejército de una sola persona."
 USA_focus_armored_combat_debate: "Debate sobre el combate blindado"
 USA_focus_armored_combat_debate_desc: "La reina indiscutible del campo de batalla moderno es el vehículo blindado de combate. Ya sean tanques, vehículos de combate de infantería o vehículos blindados de transporte de personal, estas máquinas de guerra pueden decidir una sola batalla e incluso una campaña entera. Sin embargo, a medida que se producen innovaciones en el combate blindado, nos encontramos ante una disyuntiva: ¿debemos centrarnos más en el desarrollo de tanques o reservar más recursos para los vehículos ligeros de apoyo a la infantería, como los vehículos de combate de infantería y los vehículos blindados de transporte de personal?"
 USA_focus_light_vehicle_innovations: "Innovaciones en Vehículos Ligeros"
 USA_focus_light_vehicle_innovations_desc: "Si bien los tanques son excelentes como búnkeres móviles, las inversiones e innovaciones en capacidades antitanque modernas hacen que el combate directo con tanques sea una inversión más arriesgada, tanto en material como en personal. Por lo tanto, podemos redirigir más fondos hacia vehículos blindados de transporte de personal (APC) y vehículos de combate de infantería (IFV) para garantizar un enfoque flexible de infantería y blindados. Además, los APC y los IFV son mucho más fáciles de modularizar que los tanques."
 USA_focus_modern_battle_tank_innovations: "Innovaciones modernas en tanques de batalla"
 USA_focus_modern_battle_tank_innovations_desc: "El MBT o Tanque de Batalla Moderno es una innovación de la Guerra Fría que ha establecido el estándar moderno de la doctrina de tanques. Debemos aprovecharlo y asegurar la creación de una poderosa fuerza blindada para resistir y protegernos de cualquier ataque enemigo. Como consecuencia de estas innovaciones, es probable que unidades como los antiaéreos autopropulsados ​​(SPA) y los cañones autopropulsados ​​(SPG) experimenten mejoras indirectas a medida que reorganizamos nuestras estructuras para integrar subunidades con mayor igualdad de condiciones."
 USA_focus_mass_motorization_efforts: "Esfuerzos de motorización masiva"
 USA_focus_mass_motorization_efforts_desc: "Para garantizar nuestra movilidad según cualquier indicador que hayamos elegido, debemos obligar a nuestros socios fabricantes a estandarizar y aumentar la producción de vehículos motorizados para que nuestra infantería pueda mantener el ritmo de nuestros elementos mecanizados y blindados."
 USA_focus_the_artillery_conundrum: "El enigma de la artillería"
 USA_focus_the_artillery_conundrum_desc: "En la era moderna de los drones, las aeronaves furtivas y el creciente uso de equipos de ataque a distancia, es una cuestión de principios qué papel debemos desempeñar con una de las unidades de campo más vulnerables del ejército: la artillería y sus dotaciones. Necesitamos definir la estrategia a seguir y si debemos priorizar la defensa o el ataque para evitar que el enemigo ataque con facilidad estos objetivos tan vulnerables."
 USA_focus_defensive_artillery_program: "Programa de Artillería Defensiva"
 USA_focus_defensive_artillery_program_desc: "La iniciativa DAP es un programa diseñado para investigar e innovar en la mejora de las medidas defensivas, tanto en el diseño del equipo como en su capacidad para defenderse en el terreno. La maniobrabilidad localizada y la capacidad de alcanzar el frente desde mayores distancias garantizarán la supervivencia general de nuestro equipo y nuestras tripulaciones."
 USA_focus_offensive_artillery_program: "Programa de Artillería Ofensiva"
 USA_focus_offensive_artillery_program_desc: "El OAP establecerá un nuevo estándar de guerra de maniobras para toda la fuerza. Mediante innovaciones e investigación en blindaje y sistemas de artillería autopropulsada, marcamos el ritmo de todo nuestro ejército, ya que la artillería se considera la unidad más lenta de la rama."
 USA_focus_supplies_supples_supplies: "Suministros, suministros, suministros"
 USA_focus_supplies_supples_supplies_desc: "El cuerpo de intendencia se está preparando para ser la columna vertebral de la funcionalidad del ejército. Mayores avances y sistemas de armas complejos implican más cosas que transportar y preocuparse por reemplazar en el campo de batalla. Por lo tanto, debemos establecer una red de suministro fluida y maniobrable para garantizar la limitación de la destrucción enemiga de centros de suministro \"críticos\"."
 USA_focus_army_special_forces_question: "Pregunta de las Fuerzas Especiales del Ejército"
 USA_focus_army_special_forces_question_desc: "Las Fuerzas Especiales del ejército son cada vez más numerosas, tanto en denominaciones como en capacidades superpuestas. Necesitamos considerar seriamente el papel que queremos que desempeñen las fuerzas especiales de nuestro ejército: no solo debemos diferenciarnos más de otras ramas, sino también lo suficiente dentro de nuestra propia rama de servicio."
 USA_focus_specialized_frontline_defense_support: "Apoyo especializado de defensa de primera línea"
 USA_focus_specialized_frontline_defense_support_desc: "El SFDP es una nueva reorganización de las unidades de fuerzas especiales del ejército en una fuerza general o subdivisión del ejército para apoyar y asistir en las posiciones defensivas de todas las maneras posibles. Los posibles cercos implican que el SFDP transportaría suministros limitados para ayudar a las tropas varadas, realizar contraataques y maniobrar ante ataques enemigos a posiciones o unidades de reconocimiento enemigas, entre otras medidas. Con esto, el ejército podrá unificarse como un baluarte contra los enemigos de la libertad y la democracia."
 USA_focus_the_dagger_within_the_cloak: "La daga dentro de la capa"
 USA_focus_the_dagger_within_the_cloak_desc: "Nuestros Grupos de Fuerzas Especiales (GFE) deben ser los mejores entre los mejores. Por lo tanto, para alcanzar este ambicioso objetivo, necesitaremos inversiones sustanciales en dinero y equipo para entrenar, perfeccionar y convertir esta fuerza en una fuerza de ataque de la máxima eficacia."
 USA_focus_the_information_game: "El juego de la información"
 USA_focus_the_information_game_desc: "Saber qué hace uno mismo y qué hace el enemigo es clave para crear la musa de la victoria. Debemos invertir en mejores métodos de reconocimiento y adquisición de información de las fuerzas enemigas si queremos evitar pérdidas innecesarias."
 USA_focus_this_is_the_army_mr_jones: "Este es el ejército, señor Jones"
 USA_focus_this_is_the_army_mr_jones_desc: "Somos un ejército nuevo, con un nuevo espíritu, nuevos soldados y un nuevo comienzo para defender lo que es justo. Por la libertad y la búsqueda de la felicidad para todos."
 USA_focus_united_states_navy: "Armada De Los Estados Unidos"
 USA_focus_united_states_navy_desc: "Fundada en 1776, disuelta tras la revolución y refundada como respuesta de emergencia a los piratas berberiscos del siglo XIX, la Armada de los Estados Unidos ha tenido una historia estoica y en constante evolución. A la vanguardia de las innovaciones navales desde que se apoderó del Imperio Británico en la época de las dos guerras mundiales, la Armada estadounidense busca determinar qué necesita en el nuevo milenio. Dado que la mayor parte del combate se centra en tierra o aire, muchos en la opinión pública se preguntan cuánto dinero necesita la Armada. Por ello, el liderazgo naval necesita reorientar su pensamiento y sus equipos de relaciones públicas para justificar cualquier nueva decisión, ya que si la Armada pretende ser más que una simple flota mercante de defensa, debe encontrar su nueva voz en esta nueva era."
 USA_focus_project_steel_waves: "Proyecto Olas de Acero"
 USA_focus_project_steel_waves_desc: "Somos la superpotencia mundial, no una insignia de honor ni un demérito vergonzoso, simplemente un estatus de orden y posición. Para ello, debemos adaptar nuestro alcance naval a este estatus. La mayoría de las potencias mundiales juntas no pueden competir plenamente con nuestra tecnología de hace más de 40 años, por lo que mantendremos la I+D centrada en optimizar la producción, las reparaciones y las modificaciones de los buques existentes. Una flota modular y adaptable de muchos, en lugar de una flota de tecnología y potencia brutas en lenta disminución."
 USA_focus_naval_group_flexibility_program: "Programa de Flexibilidad del Grupo Naval"
 USA_focus_naval_group_flexibility_program_desc: "El NGFP es un programa de producción designado que nos permitirá agilizar y adaptar mejor nuestros esfuerzos de producción y reparación naval para lograr la máxima eficacia."
 USA_focus_small_ship_debate: "Debate sobre barcos pequeños"
 USA_focus_small_ship_debate_desc: "La era moderna ha recreado la dinámica de los buques pequeños, como las fragatas y corbetas, como la flor y nata de la élite. Si queremos crear una fuerza aerodinámica de primer nivel, debemos determinar cuál de estas dos será el núcleo que sustente nuestros submarinos y destructores."
 USA_focus_frigate_fighters: "Cazas para Fragatas"
 USA_focus_frigate_fighters_desc: "Fragatas, la clase de buque más versátil y en constante evolución a lo largo de la historia naval. Este buque, aunque más pequeño que un destructor, puede tener la potencia de fuego de un crucero si se modifica correctamente. Por ello, convertiremos nuestras fragatas en auténticos cazas y en la columna vertebral de nuestra armada."
 USA_focus_corvette_combat_flexibility: "Flexibilidad de Combate de Corbetas"
 USA_focus_corvette_combat_flexibility_desc: "La corbeta es el buque más pequeño y razonablemente eficaz en combate de una flota moderna. Por ello, invertiremos, adaptaremos, mejoraremos y crearemos una flota de corbetas capaz de abrumar y destruir a los enemigos de la libertad y de navegar libremente por los mares."
 USA_focus_naval_maneuver_warfare: "Guerra de Maniobras Navales"
 USA_focus_naval_maneuver_warfare_desc: "Las inversiones en I+D en propulsión permitirán que nuestras pequeñas embarcaciones sean cada vez más ágiles en alta mar. Esta creciente maniobrabilidad es algo para lo que la mayoría de los capitanes navales no están equipados ni entrenados, por lo que necesitarán entrenamiento y tiempo para acostumbrarse a estas nuevas formas de combate."
 USA_focus_increasing_contractor_incentives: "Incremento de Incentivos para Contratistas"
 USA_focus_increasing_contractor_incentives_desc: "Al crear mejores directrices, paquetes de incentivos y financiación, nuestros contratistas navales civiles y militares estarán mejor motivados para ofrecer mejores resultados en general que los obtenidos anteriormente."
 USA_focus_project_new_waves: "Proyecto Nuevas Olas"
 USA_focus_project_new_waves_desc: "El Proyecto Nuevas Olas es una iniciativa de I+D dedicada a renovar, fortalecer, modernizar e incluso prepararnos para el futuro siempre que sea posible. Nuestra Armada es la más grande del mundo en tonelaje, así que aprovechemos cada tonelada."
 USA_focus_the_submarine_debate: "El Debate sobre los Submarinos"
 USA_focus_the_submarine_debate_desc: "Los submarinos son el futuro del sigilo naval y las medidas defensivas. Sin embargo, debemos considerar seriamente si invertiremos en variantes de ataque o de misiles de nuestra flota submarina."
 USA_focus_the_attack_fleet: "La Flota de Ataque"
 USA_focus_the_attack_fleet_desc: "Gracias a las inversiones en nuestros submarinos de ataque, tanto los preexistentes como los de desarrollo futuro, podemos garantizar que nuestra destreza naval sea la más eficaz para apuntar y destruir rápidamente buques enemigos."
 USA_focus_the_missile_fleet: "La Flota de Misiles"
 USA_focus_the_missile_fleet_desc: "Gracias a una gran inversión en misiles modulares para nuestros submarinos, podremos atacar y destruir cualquier obstáculo en el mar, ya sea artificial o natural, si es necesario."
 USA_focus_mobile_airports_program: "Programa de Aeropuertos Móviles"
 USA_focus_mobile_airports_program_desc: "Mediante la I+D para desarrollar aeronaves más ágiles, así como sistemas de asistencia al despegue y al aterrizaje, podemos convertir nuestros portaaviones en aeropuertos móviles. Esto, a su vez, aportará la mayor potencia de fuego posible a una zona de combate naval sin necesidad de grandes inversiones en buques esenciales como destructores, cruceros, etc."
 USA_focus_project_gunships: "Proyecto Helicóptero de Ataque"
 USA_focus_project_gunships_desc: "Las importantes inversiones e investigaciones para desarrollar mejores helicópteros les permitirán convertirse en la nueva máquina de combate universal. Si bien mejorar los helicópteros facilita el combate terrestre, su objetivo principal es utilizarlos como aviones de ataque ágiles y rápidos en nuestras flotas de portaaviones. La fuerza de ataque naval moderna ya está aquí y estamos aquí para hacerla realidad."
 USA_focus_strengthing_naval_training_efforts: "Fortalecimiento de los Esfuerzos de Entrenamiento Naval"
 USA_focus_strengthing_naval_training_efforts_des: "Mediante estándares y requisitos más estrictos, así como mejoras generales en la forma y el contenido de nuestro entrenamiento para el personal naval, sentaremos un nuevo precedente sobre cómo el marinero promedio responde a las condiciones del campo de batalla y a las situaciones de gestión de crisis para crear una fuerza más fuerte y con mayor conocimiento."
 USA_focus_role_of_the_usmc: "El Rol del Cuerpo de Marines de los EE.UU."
 USA_focus_role_of_the_usmc_desc: "El Cuerpo de Marines de los Estados Unidos ha tenido una historia turbulenta. Sin embargo, su papel se ve cuestionado una vez más. En la era moderna, con campañas aisladas y sin una \"gran guerra\" contra un enemigo fácilmente identificable, la identidad del marine moderno es un poco diferente. Necesitamos determinar si debemos seguir contando con un Cuerpo de Marines especializado o instituir un mayor apoyo o una generalización de la rama y trasladarla al ejército, en lugar de convertirla en un subdepartamento estrictamente dependiente de la marina."
 USA_focus_marines_are_as_marines_were: "Los Marines Son Como Siempre Fueron"
 USA_focus_marines_are_as_marines_were_desc: "Lanzar invasiones navales y la lanza para perforar la defensa costera enemiga. Eso es el Cuerpo de Marines y eso es lo que será. ¡Los Marines lideran el camino!"
 USA_focus_marine_lessons_in_army_clothes: "Lecciones de los Marines en Ropa de Ejército"
 USA_focus_marine_lessons_in_army_clothes_desc: "El campo de batalla moderno requiere cada vez menos una fuerza de invasión naval fuerte y dedicada. Por ello, podemos trabajar para integrar y mejorar nuestras fuerzas terrestres para que se adapten mejor a las características del terreno, ya sea acuático o no."
 USA_focus_repair_teams: "Equipos de Reparación"
 USA_focus_repair_teams_desc: "Equipar equipos especializados de marines para ayudar en las reparaciones y el control de daños significa que nuestros barcos pueden volver al agua más rápido que nunca. Dejando solo los problemas graves para el dique seco cuando sea necesario."
 USA_focus_a_modern_navy: "Una Armada Moderna"
 USA_focus_a_modern_navy_desc: "Contra viento y marea lo hemos logrado, hemos creado una armada que rivaliza incluso con nuestros enemigos más fuertes. Ahora podremos defendernos a nosotros mismos y a nuestros aliados sin fallar."
 USA_focus_united_states_air_force: "Fuerza Aérea de los Estados Unidos"
 USA_focus_united_states_air_force_desc: "A pesar de ser una de las ramas más jóvenes de las fuerzas armadas, la USAF tiene una historia interesante. Originalmente un departamento del ejército bajo el nombre de USAAF o Fuerza Aérea del Ejército de los Estados Unidos, las exigencias de la Segunda Guerra Mundial obligaron a la fuerza aérea a convertirse en una rama independiente. Desde entonces, la fuerza aérea se ha convertido en el ejemplo de la era moderna en la supremacía en el campo de batalla. Pero a medida que la guerra cambia, también lo hacen las necesidades de la fuerza aérea. Ahora, con el advenimiento de una nueva era, el liderazgo de la rama necesita descubrir cómo adaptarse a la situación en constante cambio de lo que es el \"campo de batalla moderno\"."
 USA_focus_economy_class_warfare: "Guerra de Clase Económica"
 USA_focus_economy_class_warfare_desc: "No se puede librar una guerra con el estómago vacío, y desde luego no se puede librar sin una economía que funcione. Por lo tanto, debemos encontrar maneras de reestructurar el presupuesto de nuestra fuerza aérea para que sea eficiente en métodos y modelos de producción que, a su vez, podamos reinvertir en la propia economía."
 USA_focus_the_modular_design_program: "Programa de Diseño Modular"
 USA_focus_the_modular_design_program_desc: "El MDP supone una racionalización de toda la producción aeronáutica. En lugar de crear múltiples líneas de producción hiperespecíficas, podemos garantizar la máxima eficiencia de producción mediante la creación de un modelo de avión estándar real, adaptable modularmente a las necesidades del país."
 USA_focus_production_development_investments: "Inversiones en Desarrollo de Producción"
 USA_focus_production_development_investments_desc: "Mediante iniciativas de I+D e inversiones generales en fabricación, podemos aumentar nuestra capacidad de producción y también generar algunos resultados civiles. Esto sin duda contribuirá a la creación de empleo y a la optimización de las capacidades de nuestras aeronaves."
 USA_focus_fighter_focused_budgeting: "Presupuesto Centrado en Cazas"
 USA_focus_fighter_focused_budgeting_desc: "Materiales más ligeros, mejoras en el entrenamiento de agilidad y mejores sistemas de armas. Estas son solo algunas de las inversiones que planeamos hacer para que nuestra fuerza aérea sea, sin duda, una fuerza a tener en cuenta."
 USA_focus_bomber_focused_budgeting: "Presupuesto Centrado en Bombardeos"
 USA_focus_bomber_focused_budgeting_desc: "Mayor capacidad de daño de carga útil, mejoras en el diseño de los sistemas de aeronaves, etc. Se invertirá en estas y otras inversiones para garantizar que nuestra fuerza aérea supere cualquier obstáculo que encuentren nuestras fuerzas terrestres."
 USA_focus_civil_military_innovations_program: "Programa de Innovaciones Civiles y Militares"
 USA_focus_civil_military_innovations_program_desc: "El C&MIP, un centro conjunto de desarrollo e investigación, está diseñado para combinar innovaciones militares y civiles y comprender cómo una puede inspirar a la otra y viceversa. Con esto, nuestra economía se construirá para la gente, así como para su defensa."
 USA_focus_a_limitless_sky: "Un Cielo Sin Límites"
 USA_focus_a_limitless_sky_desc: "Dicen que el cielo es el límite, bien, la Fuerza Aérea de los Estados Unidos tendrá como objetivo de la rama superarlo y demostrar que no existe tal límite."
 USA_focus_perpetual_air_dominance: "Dominio Aéreo Perpetuo"
 USA_focus_perpetual_air_dominance_desc: "A través de inversiones casi constantes en sistemas de armas y regímenes de entrenamiento de tripulaciones, podemos crear un estado de dominio perceptivo a través de la agresión pura y dura."
 USA_focus_american_institute_for_avionics: "Instituto Estadounidense de Aviónica"
 USA_focus_american_institute_for_avionics_desc: "El AIA es un centro de investigación centrado en el desarrollo y la mejora de las capacidades de nuestra Fuerza Aérea. Esperamos crear grandes logros en el futuro."
 USA_focus_phase_one_innovations: "Innovaciones de la Fase Uno"
 USA_focus_phase_one_innovations_desc: "Las innovaciones de la Fase 1 se refieren a avances generales en el entrenamiento de la tripulación, así como a formas más eficientes de manejar y/o fabricar aeronaves."
 USA_focus_phase_two_innovations: "Innovaciones de la Fase Dos"
 USA_focus_phase_two_innovations_desc: "Las inversiones continuas y las iniciativas de investigación han comenzado a dar resultados en el apoyo terrestre y el apoyo directo al campo de batalla. Esperamos que estas innovaciones mejoren nuestros ataques combinados contra posiciones enemigas."
 USA_focus_phase_three_innovations: "Innovaciones de la Fase Tres"
 USA_focus_phase_three_innovations_desc: "Las inversiones agresivas continúan impulsando nuestras innovaciones a medida que logramos avances en grandes aviones bombarderos y en poder destructivo de su carga útil."
 USA_focus_paratrooper_corps: "El Cuerpo de Paracaidistas"
 USA_focus_paratrooper_corps_desc: "Los paracaidistas han sido una rama única del ejército y la fuerza aérea. Surgidos de la necesidad experimental derivada de las exigencias de la Segunda Guerra Mundial, se consideran una parte clave del entrenamiento moderno. Desde los saltos tradicionales desde C-130 hasta el rapel desde helicópteros de ataque, el espíritu paracaidista sigue vigente en el campo de batalla actual. Ahora debemos determinar las necesidades reales de nuestras fuerzas militares para garantizar la máxima cohesión y eficacia."
 USA_focus_jump_wings_forever: "Alas de Salto para Siempre"
 USA_focus_jump_wings_forever_desc: "Nuestros paracaidistas son los mejores de los mejores, mejoraremos y cuidaremos esta fuerza para garantizar que sigan siendo así en el futuro previsible."
 USA_focus_every_soldier_a_trooper: "Cada Soldado, un Tropero"
 USA_focus_every_soldier_a_trooper_desc: "La movilidad de los helicópteros, así como el ritmo siempre cambiante de los campos de batalla, implican que el papel del paracaidista debe ampliarse y no limitarse a un rol reservado. Por ello, haremos todo lo posible para perfeccionar y mejorar nuestro ejército aprovechando las lecciones aprendidas por los paracaidistas a lo largo de los años."
 USA_focus_joint_branch_coordination_training: "Entrenamiento de Coordinación entre Ramas"
 USA_focus_joint_branch_coordination_training_desc: "El programa JBCT es un programa de entrenamiento de cohesión y coordinación que busca intensificar los esfuerzos de capacitación y cooperación entre las ramas de servicio de la Fuerza Aérea y el Ejército, dada la naturaleza intrínseca del campo de batalla moderno. Esto también contribuirá a reducir los incidentes entre las ramas en la medida de lo posible."
 USA_focus_to_infinite_and_beyond: "¡Hacia el Infinito y Más Allá!"
 USA_focus_to_infinite_and_beyond_desc: "Nuestras innovaciones y dedicación para garantizar que nuestra fuerza aérea sea inigualable han sido excepcionales. Podemos afirmar sin lugar a dudas que nuestros esfuerzos por mejorar nuestra fuerza aérea serán tema de conversación mundial durante años."
 USA_focus_united_states_general_staff: "Estado Mayor Conjunto de los Estados Unidos"
 USA_focus_united_states_general_staff_desc: "El Cuerpo de Oficiales Generales (JCS), así como el Cuerpo de Oficiales Generales de los Estados Unidos, es, en el mejor de los casos, temperamental y, en el peor, una lucha de poder blando, según la época. Sin embargo, en los últimos años, el GOC ha enfrentado algunos problemas interesantes. Luchas internas por la corrupción y el gasto excesivo a pesar del fin de la Guerra Fría, así como la eterna cuestión de \"innovadores contra la vieja guardia\". En el nuevo milenio, sin embargo, la cuestión del reentrenamiento y el perfeccionamiento del cuerpo de oficiales en su conjunto es objeto de debate, y por ello, se barajan ideas. Por lo tanto, debemos determinar cuáles serán nuestras necesidades."
 USA_focus_army_centric_training: "Entrenamiento Centrado en el Ejército"
 USA_focus_army_centric_training_desc: "Al promover programas de reentrenamiento y avance en todo el ejército, nuestra prioridad en los desarrollos de comando y control hará que nuestras fuerzas terrestres se destaquen en los tiempos venideros."
 USA_focus_army_knowledge_priority: "Prioridad de Conocimiento del Ejército"
 USA_focus_army_knowledge_priority_desc: "El ascenso dentro del cuerpo de oficiales ahora requerirá más conocimientos y necesidades del ejército que de la fuerza aérea o la marina. Esto garantizará que más elementos de C&C se destinen a mejorar nuestras fuerzas terrestres, donde se desarrolla la mayor parte de los combates."
 USA_focus_naval_centric_training: "Entrenamiento Centrado en la Armada"
 USA_focus_naval_centric_training_desc: "Al impulsar los programas de reentrenamiento y desarrollo profesional en toda la Armada, nuestra prioridad en el mando y control se centrará en mejorar la maniobrabilidad y la supervivencia naval. Esto significa que más buques contarán con comandantes flexibles y adaptables."
 USA_focus_naval_knowledge_priority: "Prioridad de Conocimiento Naval"
 USA_focus_naval_knowledge_priority_desc: "Los avances dentro del cuerpo de oficiales requerirán ahora más conocimiento naval para desarrollar y mejorar los elementos de C&C dentro de nuestra rama naval. La mayor parte de nuestra lucha estratégica involucra a la armada de una forma u otra; por lo tanto, para asegurar que esta columna vertebral sea fuerte y duradera, sus líderes deben ser de una estirpe similar."
 USA_focus_air_force_centric_training: "Entrenamiento Centrado en la Fuerza Aérea"
 USA_focus_air_force_centric_training_desc: "Al promover programas de reentrenamiento y avance en toda la fuerza aérea, nuestra prioridad en los desarrollos de comando y control hará que nuestras fuerzas aéreas se destaquen en los tiempos venideros."
 USA_focus_air_force_priority_knowledge: "Prioridad de Conocimiento de la Fuerza Aérea"
 USA_focus_air_force_priority_knowledge_desc: "Los avances dentro del cuerpo de oficiales requerirán ahora más conocimientos aéreos y/o aeronáuticos para desarrollar y mejorar los elementos de C&C dentro de nuestra fuerza aérea. El campo de batalla moderno está prácticamente definido por la guerra aérea, por lo que debemos asegurarnos de que nuestra fuerza aérea sea indiscutible ante cualquier enemigo conocido."
 USA_focus_a_true_pax_americana: "Una Verdadera Pax Americana"
 USA_focus_a_true_pax_americana_desc: "Reformas, cambios, atención a las necesidades de cada rama del servicio bajo nuestra autoridad. Nuestra nación estará segura y el mundo sabrá lo que es una verdadera paz estadounidense. Ad pacem et felicitatem. \"Por la paz y la prosperidad\"."
 USA_focus_reintroducing_mandatory_service: "Reintroducción del Servicio Militar Obligatorio"
 USA_focus_reintroducing_mandatory_service_desc: "Mediante la presión en el Congreso, esperamos poder impulsar la reintroducción de un período de servicio obligatorio. Esto permitirá mantener el número de efectivos y reducir la presión sobre la fuerza puramente voluntaria que tenemos. Dado que la reacción política será considerable, el período recomendado a los legisladores es de solo seis meses."
 USA_focus_expanding_mandatory_service: "Expansión del Servicio Militar Obligatorio"
 USA_focus_expanding_mandatory_service_desc: "Las necesidades de las fuerzas armadas y la defensa nacional han alcanzado un punto de preocupación. Si queremos mantenernos al día, debemos, y quiero decir, debemos presionar al Congreso para que apruebe esta medida. La reacción pública será considerable, pero al final, nuestra defensa nacional en estos tiempos de incertidumbre tan difíciles es una justificación."
 USA_focus_concerning_developments: "Desarrollo Preocupante"
 USA_focus_concerning_developments_desc: "Las cosas no van bien y están llegando a un punto que parece irreversible. Por lo tanto, debemos aumentar los requisitos de reclutamiento para forzar la cantidad necesaria. Dolerá, pero no podemos arriesgarnos a ningún debate."
 USA_focus_desperate_measures: "Medidas Desesperadas"
 USA_focus_desperate_measures_desc: "La situación sigue empeorando; se necesitan medidas drásticas si queremos avanzar. El equipo no sirve de nada si no contamos con los hombres y mujeres necesarios para usarlo."
 USA_focus_congressional_chaos: "Caos en el Congreso"
 USA_focus_congressional_chaos_desc: "Por primera vez en nuestra historia, hemos llegado a un punto muerto en el colegio electoral. Han comenzado pequeños disturbios en todo el país a medida que crece la animosidad sobre quién ganó las elecciones. Por ello, el Congreso se esfuerza por encontrar la manera de resolver este problema."
 USA_focus_secretary_to_president: "De Secretario a Presidente"
 USA_focus_secretary_to_president_desc: "Nada como un mal espectáculo en general. Con opciones tan complejas, dada la redacción de la constitución, en un escenario catastrófico como este. En ambos bandos, tenemos una pesadilla de relaciones públicas y la creciente probabilidad de un mayor deterioro del orden social y la confianza en nuestro sistema. Por lo tanto, debemos invocar la Ley de Sucesión Presidencial y hacer algo completamente sin precedentes. Saltar la Cámara de Representantes y el Senado e inaugurar al actual Secretario de Estado. Una opción segura para nosotros y una primicia nacional, ya que en la historia de esta nación nunca hemos experimentado algo tan profundo que traspase el corazón y los cimientos de nuestra nación... Que Dios nos ayude a todos a que esto no vuelva a suceder."
 USA_focus_reassuring_wall_street: "Tranquilizar a Wall Street"
 USA_focus_reassuring_wall_street_desc: "Tras la crisis, lo primero es colaborar con Wall Street y los especuladores para evitar que sumerjan el mercado bursátil en una nueva depresión. Reuniones específicas y programas de ayuda selectiva, tanto para Wall Street como para el público general, deberían tranquilizar a todos."
 USA_focus_restarting_aid_programs: "Reinicio de Programas de Ayuda"
 USA_focus_restarting_aid_programs_desc: "Hace mucho tiempo, el gobierno federal intentó salvar a los productores de la industria láctea subvencionando y comprando leche. Sin embargo, estos se dieron cuenta de lo que esto significaba y terminaron expandiendo su capacidad de producción. Finalmente, el gobierno lo resolvió y, en gran medida, lo solucionó, implementando iniciativas ocultas para que el país consumiera más productos lácteos. Sin embargo, el excedente era tan grande que se lanzó otra iniciativa conocida como \"Queso del Gobierno\". Este sencillo programa ha dejado huella en las generaciones anteriores, y la mayoría de las nuevas generaciones nunca conocerán aquella época en que se podía conseguir queso barato y gratuito. Pero ya no. Almacenar estas reservas cuesta mucho más que devolverlas, y por eso el programa se está reiniciando. Más alimentos en la mesa de la gente significa menos preocupaciones por problemas de salud en ciertas zonas, así como la necesidad de ciertos programas de bienestar social. Además, reducimos las reservas y, por lo tanto, reducimos el costo del almacenamiento para el gobierno. Todos ganan."
 USA_focus_specification_act: "Ley de Especificaciones"
 USA_focus_specification_act_desc: "La situación en el Congreso se está estancando cada vez más, hasta el punto de que esta reciente crisis ha sacudido profundamente a la nación. Por ello, el anuncio de la Ley de Especificación, una legislación que exige que los proyectos de ley del Congreso se ajusten a un solo tema o asunto para evitar constantes interrupciones del orden legislativo, probablemente conducirá a una reducción significativa de la burocracia nacional en prácticamente todo, ya que el formato de un solo tema evitará que las tácticas de ojo por ojo inflen las leyes. Además, la desregulación fomentada por este formato puede beneficiar a la economía al abrir más proyectos del sector privado sin tantos gastos generales de los que preocuparse."
 USA_focus_national_armed_services_audit: "Auditoría de los Servicios Armados Nacionales"
 USA_focus_national_armed_services_audit_desc: "La controversia sobre el monto del gasto militar y sus resultados reales ha provocado una disminución en el reclutamiento, así como una tendencia negativa en la percepción pública del ejército en general. Por ello, se realizará una auditoría nacional de las fuerzas armadas que, con suerte, revolucionará la situación y reducirá la necesidad general de gasto militar. Es probable que la tendencia al aumento del gasto no desaparezca, pero si logramos sacar más provecho de lo que ya tenemos, al menos podremos frenar su ritmo exponencial."
 USA_focus_reduce_and_expand_act: "Ley de Reducción y Expansión"
 USA_focus_reduce_and_expand_act_desc: "La Ley de Investigación y Educación (R&E) es una legislación que evalúa y reduce los requisitos federales del SAT y otros exámenes, y fomenta la financiación para escuelas y distritos que incorporen clases ampliadas. Cursos como economía doméstica y finanzas contribuirán enormemente a la estabilidad de las futuras generaciones, a medida que aprenden a administrar el dinero y a cuidar de sus hijos, además de a cocinar."
 USA_focus_domestic_over_foreign: "Política Doméstica sobre Extranjera"
 USA_focus_domestic_over_foreign_desc: "En esta nueva era de paz, debemos centrarnos más en nosotros mismos si queremos seguir pensando en cuidar de los demás. Por ello, reestructuraremos nuestro presupuesto centrado en la política exterior y lo reorientaremos hacia algunas iniciativas nacionales."
 USA_militarist_economic_militarism: "Militarismo Económico"
 USA_militarist_economic_militarism_desc: "Nuestra nación es fuerte y cuenta con la capacidad, tanto en materias primas como en recursos humanos, para garantizar la paz y la estabilidad mundiales. Sin embargo, durante demasiado tiempo los políticos han malgastado y desperdiciado valiosos recursos en todos los ámbitos. Por ello, comenzaremos a reestructurar nuestra economía para estar preparados ante cualquier conflicto militar que los enemigos de nuestra república deseen desencadenar."
 USA_militarist_economic_r_and_d: "Investigación y Desarrollo Económico"
 USA_militarist_economic_r_and_d_desc: "Para continuar optimizando nuestra economía, necesitamos establecer un programa de I+D+i. Por ello, lo haremos para garantizar la seguridad económica de nuestra nación."
 USA_militarist_national_wellness_programs: "Programas Nacionales de Bienestar"
 USA_militarist_national_wellness_programs_desc: "Los NWP son una serie de maneras de retribuir a quienes dan por la nación. Si los ciudadanos cuidan del estado, este hará lo mismo. Dado que podríamos estar ante una guerra, este sentimiento pesa mucho en todos."
 USA_militarist_strategic_quotas: "Cuotas Estratégicas"
 USA_militarist_strategic_quotas_desc: "Nuestra capacidad económica no tendrá límites. Sin embargo, en tiempos de crisis y guerra, se esperan sacrificios, por lo que emitiremos un programa rotatorio de cuotas estratégicas para que la población comprenda lo que podría necesitarse en el futuro."
 USA_militarist_integrated_corps_of_engineers: "Cuerpo de Ingenieros Integrado"
 USA_militarist_integrated_corps_of_engineers_desc: "Al utilizar el Cuerpo de Ingenieros y otros aspectos de las fuerzas armadas en proyectos de obras públicas y similares, podemos crear un nuevo estándar de desarrollo que nuestros ciudadanos aún no han experimentado. Además, ¿quién no querría unirse al ejército sabiendo que no tiene que morir en tierras lejanas? Eso sí que es relaciones públicas gratuitas."
 USA_militarist_investing_in_naval_companies: "Inversión en Empresas Navales"
 USA_militarist_investing_in_naval_companies_desc: "Financiar iniciativas de investigación en varias compañías navales permitirá a nuestra industria, tanto civil como militar, crear nuevos buques y encontrar maneras de agilizar las reparaciones. Recuerden que las innovaciones militares generan nuevas innovaciones civiles, y lo mismo ocurre a la inversa."
 USA_militarist_automations_act: "Ley de Automatización"
 USA_militarist_automations_act_desc: "Para mejorar nuestro potencial económico y aumentar nuestra base de reclutamiento, debemos invertir en automatización siempre que sea posible. No será del agrado de la gente, pero es un mal necesario para nuestra supervivencia."
 USA_militarist_mea: "Administración de Empleo Obligatorio"
 USA_militarist_mea_desc: "El MEA es un organismo administrativo gubernamental que ayuda a quienes no tienen empleo a encontrar trabajo. Inspirado en algunas agencias de tres letras de la época del New Deal, el MEA está aquí para ayudar a quienes necesitan un empleo."
 USA_militarist_fwip: "Programa de Innovaciones para la Guerra Futura"
 USA_militarist_fwip_desc: "El FWIP es un complejo de I+D dedicado a la innovación para crear las fuerzas de combate del futuro. Mediante un esfuerzo incansable, garantizaremos que nuestras fuerzas armadas sean inigualables en todo el mundo."
 USA_militarist_army_armaments_improvements: "Mejoras en Armamento del Ejército"
 USA_militarist_army_armaments_improvements_desc: "Mediante contratos de desarrollo, podemos mejorar el armamento de nuestros soldados. Con esto, esperamos mejorar la capacidad general de nuestro ejército para defender y tomar el campo de batalla."
 USA_militarist_mobile_observation_force: "Fuerza de Observación Móvil"
 USA_militarist_mobile_observation_force_desc: "El MOF es una fuerza especializada relacionada con iniciativas de reconocimiento. Esta nueva fuerza será una unidad altamente móvil, encargada de monitorear los movimientos del enemigo y garantizar que nuestras tropas reciban la mayor alerta posible sobre ataques y movimientos generales, siempre que sea posible."
 USA_militarist_localized_logistics: "Logística Localizada"
 USA_militarist_localized_logistics_desc: "Se espera que una logística mejorada en términos de unidades más pequeñas y métricas de flexibilidad permitan que nuestro ejército esté más coordinado y más preparado para lo que el enemigo pueda lanzarnos."
 USA_militarist_naval_gunnery_advancements: "Avances en Artillería Naval"
 USA_militarist_naval_gunnery_advancements_desc: "La investigación de nuevos regimientos de entrenamiento de artillería, así como la mejora de las municiones y los sistemas de armas permanentes de nuestra flota, es de suma importancia para defender nuestras aguas costeras y llevar la lucha al enemigo cuando sea necesario."
 USA_militarist_propulsion_advancements: "Avances en Propulsión"
 USA_militarist_propulsion_advancements_desc: "Mejorar los motores y sistemas de propulsión de nuestros buques de guerra permitirá que nuestros barcos se comuniquen entre sí más rápido que nunca. Sin mencionar la iniciativa en el campo de batalla que esto traerá en las próximas guerras."
 USA_militarist_increased_pay_incentives: "Incentivos de Pago Aumentado"
 USA_militarist_increased_pay_incentives_desc: "Nuestro personal naval es, en su mayoría, blanco fácil con pocas posibilidades de escapar adecuadamente de una fuerza enemiga. Estas duras medidas implican que debemos compensarlos adecuadamente. Con esta compensación, también incrementaremos los ejercicios navales en combate y la retirada de las fuerzas enemigas para garantizar la supervivencia y la eficacia de todos los buques y su personal."
 USA_militarist_aircraft_improvements: "Mejoras en Aeronaves"
 USA_militarist_aircraft_improvements_desc: "Invertir en la fabricación de aeronaves más ágiles y eficientes implica también invertir en nuestro personal para que pueda manejar adecuadamente estas máquinas de guerra. Por ello, haremos precisamente eso para garantizar un cielo despejado para nuestros ciudadanos."
 USA_militarist_increasing_drill_intensity: "Incremento en la Intensidad de los Ejercicios"
 USA_militarist_increasing_drill_intensity_desc: "El perfeccionamiento, la intensificación y la mejora de nuestros ejercicios aéreos para mejorar la eficacia general darán resultados en la eficacia de la misión, así como en las capacidades de combate."
 USA_militarist_weapon_system_innovations: "Innovaciones en Sistemas de Armas"
 USA_militarist_weapon_system_innovations_desc: "Las inversiones en I+D para mejorar los sistemas de armas de nuestras aeronaves conducirán a escenarios de combate más efectivos que, esperamos, se traducirán en una ganancia neta positiva en futuros conflictos cuando sea posible."
 USA_militarist_pre_emptive_mobilization: "Movilización Preventiva"
 USA_militarist_pre_emptive_mobilization_desc: "Ha llegado el momento, debemos empezar a movilizar a la nación para garantizar que nuestro futuro sea una certeza segura."
 USA_militarist_securing_southern_interests: "Asegurar los Intereses del Sur"
 USA_militarist_securing_southern_interests_desc: "La violencia desenfrenada de las pandillas y un gobierno federal algo ineficaz para la era moderna hacen de México la clave para asegurar el dominio continental y la seguridad del hemisferio."
 USA_militarist_operation_clean_streets: "Operación Calles Limpias"
 USA_militarist_operation_clean_streets_desc: "Ahora que hemos asegurado nuestros territorios del sur, debemos embarcarnos en una estricta operación de limpieza para librar el área de camarillas de pandillas masivas, así como comenzar a integrar los territorios."
 USA_militarist_securing_atlantic_interests: "Asegurar los Intereses del Atlántico"
 USA_militarist_securing_atlantic_interests_desc: "Al proteger las principales naciones insulares de Cuba, Jamaica y La Española, sentamos un precedente de seguridad hemisférica como ningún otro."
 USA_militarist_operation_paradise: "Operación Paraíso"
 USA_militarist_operation_paradise_desc: "La Operación Paraíso consiste en conectar nuevos territorios para facilitar la integración y la utilización inmediata de la infraestructura militar."
 USA_militarist_policing_and_cultural_programs: "Programas de Policía y Cultura"
 USA_militarist_policing_and_cultural_programs_desc: "Nuestros nuevos logros siempre se verán frustrados por quienes desean socavar nuestra nación y a sus ciudadanos. Por ello, necesitamos instituir programas culturales que promuevan la unidad y la uniformidad, pues somos ante todo humanos y no simplemente estadounidenses, cubanos, etc. Cabe mencionar que aumentar e integrar las fuerzas policiales y militares también puede ayudar a sofocar la agitación excesiva."
 USA_militarist_a_true_leader_of_the_western_world: "Un Verdadero Líder del Mundo Occidental"
 USA_militarist_a_true_leader_of_the_western_world_desc: "Para proteger nuestro hemisferio, también necesitamos asegurar el verdadero liderazgo del mundo occidental. Recuerden que cualquier ataque contra un miembro de la OTAN será una declaración contra toda la alianza. Por lo tanto, este ataque determinará nuestro futuro. Que Dios nos ayude a todos."
 USA_militarist_operation_great_north: "Operación Gran Norte"
 USA_militarist_operation_great_north_desc: "Con el polvo asentado y nuestra victoria asegurada, ahora podemos comenzar a integrar y asegurar nuestro dominio continental, así como nuestra hegemonía hemisférica."
 USA_militarist_operation_atlantic_viking: "Operación Vikingo del Atlántico"
 USA_militarist_operation_atlantic_viking_desc: "Asegurar las tierras árticas cercanas de Groenlandia e Islandia, así como la isla barrera atlántica de las Islas Feroe, asegurará nuestras conexiones atlánticas y nos permitirá tener una red logística más directa entre el nuevo y el viejo mundo."
 USA_militarist_operation_atlantic_wall: "Operación Muro del Atlántico"
 USA_militarist_operation_atlantic_wall_desc: "Con nuestra posición como líderes del mundo occidental asegurada, también debemos asegurarnos de que dicha posición sea estable y sostenible. Por ello, adquiriremos todos los territorios atlánticos y los utilizaremos para controlar la logística, los mercados y las regiones más alejadas del continente. El futuro es ahora y es prometedor."
 USA_militarist_humanity_marches_onwards: "La Humanidad Avanzando"
 USA_militarist_humanity_marches_onwards_desc: "Nuestra huella en el mundo está asegurada; al menos, nuestras poblaciones están satisfechas. Si bien el camino no ha terminado, nos encontramos en un punto clave para comenzar a reducir la hipermilitarización y a impulsar una fase de mayor desarrollo económico. Este es el camino, y es por este camino que alcanzaremos las estrellas en un futuro próximo. Unidos nos mantenemos, divididos todos caímos."
 USA_fascist_closed_border: "Frontera Cerrada"
 USA_fascist_closed_border_desc: "Para proteger nuestra nación y su riqueza cultural, debemos cerrar la frontera. A partir de ahí, podremos decidir cómo reformar la política migratoria para que podamos empezar a aceptar a las personas adecuadas que puedan contribuir a nuestra sociedad."
 USA_fascist_family_planning_incentives: "Incentivos para la Planificación Familiar"
 USA_fascist_family_planning_incentives_desc: "Si realmente queremos sanar nuestra nación y presentar un camino nuevo y puro hacia adelante, debemos cuidar de nosotros mismos, ante todo. La disminución de la natalidad es un problema global que se produce a medida que una nación se desarrolla. Sin embargo, en lugar de simplemente \"volver a la normalidad\", como algunos parecen creer que debemos hacer, creamos programas para ayudar y asistir a las familias y a los futuros padres. Esto limita la carga de las nuevas familias y asegura el futuro de las nuevas generaciones, evitando que tengan que atravesar dificultades económicas."
 USA_fascist_encouraging_productivity_quotas: "Fomento de Cuotas de Productividad"
 USA_fascist_encouraging_productivity_quotas_desc: "Nuestros ciudadanos merecen los mejores productos y es esto lo que les brindaremos. Un análisis preciso del consumo estadístico de bienes y servicios conocidos nos permitirá establecer cuotas en las que estos lujos o artículos cotidianos bajen de precio. Esto mejorará la calidad de vida de todos los ciudadanos."
 USA_fascist_federal_sponsored_emmigration_programs: "Programas Federales de Emigración Patrocinada"
 USA_fascist_federal_sponsored_emmigration_programs_desc: "Nuestra nación tiene sanguijuelas y parásitos que se aprovechan de la generosa ayuda de nuestros contribuyentes y de los generosos programas federales que cuidan a los miembros activos de nuestra sociedad. Por lo tanto, debemos ofrecerles una oferta irresistible. Al centrarnos en una combinación de países con una calidad de vida similar, así como con buenos tipos de cambio donde el dólar estadounidense se valora más que el país al que se mudarán, establecemos la capacidad de liberar pacíficamente a nuestra nación del continuo drenaje de nuestros recursos en el que se han convertido algunas de estas personas."
 USA_fascist_strategic_automation_programs: "Programas Estratégicos de Automatización"
 USA_fascist_strategic_automation_programs_desc: "La Ley SAP es una iniciativa de automatización dirigida a aumentar la producción de los bienes necesarios para permitir una mejor tendencia hacia el desarrollo de nuestra nación y la calidad de vida de nuestros ciudadanos."
 USA_fascist_forging_new_innovations: "Forjando Nuevas Innovaciones"
 USA_fascist_forging_new_innovations_desc: "El Instituto de Innovaciones es el complejo de I+D del futuro. Establece un nuevo estándar de investigación que nos permitirá mantenernos a la vanguardia de la competencia."
 USA_fascist_the_development_corps: "Cuerpo de Desarrollo"
 USA_fascist_the_development_corps_desc: "La creación del Cuerpo de Desarrollo es una iniciativa federal para reclutar a convictos, voluntarios y desempleados para que contribuyan a mejorar nuestra sociedad. Los convictos pueden intentar cumplir paulatinamente su condena mediante buena conducta durante su servicio en el Cuerpo, y tanto los voluntarios como los desempleados pueden buscar obtener ingresos adicionales o iniciales en momentos de necesidad."
 USA_fascist_developing_prison_workforces: "Desarrollo de la Fuerza Laboral Carcelaria"
 USA_fascist_developing_prison_workforces_desc: "El Departamento de Trabajo buscará crear la Administración de Trabajo Penitenciario (APL). La APL se encargará de crear programas de rehabilitación a través de centros de trabajo especializados. Sectores como la industria primaria y algunas industrias secundarias podrían experimentar sustituciones de personal, lo que beneficiará a la sociedad en general."
 USA_fascist_gearing_the_nation_for_survival: "Preparando a la Nación para la Supervivencia"
 USA_fascist_gearing_the_nation_for_survival_desc: "Nuestra nación es pura, nuestros ciudadanos tienen una voluntad y una mente firmes; debemos mostrarles a nuestros enemigos e informarles de la supervivencia que enfrentamos para preservar nuestra forma de vida. El llamado \"mundo occidental\" solo busca limitar nuestra nación y el lugar que merecíamos haber tenido hace siglos. Un nuevo destino se manifestará y nadie nos detendrá."
 USA_fascist_retooling_officer_corps_requirements: "Reajuste de Requisitos para el Cuerpo de Oficiales"
 USA_fascist_retooling_officer_corps_requirements_desc: "Al modificar los requisitos de alistamiento y las oportunidades de ascenso para que se influyan más en las motivaciones ideológicas, establecemos un estándar de uniformidad y unidad en la estructura de mando. Esperamos que esto, tanto en el campo como en el cuartel general, permita un mayor vigor para el logro de los objetivos."
 USA_fascist_ideological_motivation_drills: "Ejercicios de Motivación Ideológica"
 USA_fascist_ideological_motivation_drills_desc: "Al inculcar valores como la lucha de cada soldado y quiénes son los enemigos, podemos crear en nuestros soldados una fuerza de voluntad que la mayoría de los demás países simplemente no pueden recrear. Somos más fuertes porque elegimos serlo. La unión hace la fuerza."
 USA_fascist_improved_logistical_organizations: "Organizaciones Logísticas Mejoradas"
 USA_fascist_improved_logistical_organizations_desc: "Nuestro país es enorme y, independientemente de si nos dirigimos al norte o al sur, los territorios son vastos e inapropiados para el transporte masivo. Por lo tanto, debemos reorganizar y mejorar nuestra logística para garantizar que nuestros soldados reciban todos los materiales necesarios para librar la guerra en cualquier lugar y en cualquier momento."
 USA_fascist_general_weapons_testing_complex: "Complejo General de Pruebas de Armas"
 USA_fascist_general_weapons_testing_complex_desc: "El GWTC es una instalación de pruebas dedicada a mejorar los sistemas de armas militares en general... eso es todo, nada más."
 USA_fascist_phase_two_weapons_testing: "Fase Dos de Pruebas de Armas"
 USA_fascist_phase_two_weapons_testing_desc: "Esto es lo que se llama sacar más provecho a su dinero."
 USA_fascist_engineering_better_engines: "Ingeniería de Mejores Motores"
 USA_fascist_engineering_better_engines_desc: "Mejorar los motores de todos los tamaños nos permite mayor movilidad para aprovechar las brechas en la línea enemiga. Podemos fabricar aeronaves más ágiles y capaces para patrullar y proteger nuestros cielos. Además, podemos mejorar la maniobrabilidad de las naves y la cadencia de patrullaje para asegurarnos de que el enemigo esté siempre alerta."
 USA_fascist_paying_the_dues_our_soldiers_deserve: "Pagando lo que Nuestros Soldados Merecen"
 USA_fascist_paying_the_dues_our_soldiers_deserve_desc: "Nuestros soldados, tanto voluntarios como reclutas, dan su vida por esta nación y, como tales, deben ser tratados como héroes. Su salario debe reflejar el trabajo que realizan para dar la impresión de que su labor es verdaderamente reconocida."
 USA_fascist_militarized_economy: "Economía Militarizada"
 USA_fascist_militarized_economy_desc: "La población está lista y estamos preparando los últimos preparativos. Pronto llegará una nueva era y nuestra seguridad global para el hemisferio occidental estará garantizada."
 USA_fascist_operation_pig_bay_two: "Operación Bahía de los Cerdos Dos"
 USA_fascist_operation_pig_bay_two_desc: "Cuba nos ha eludido desde la fallida operación de la CIA conocida como Bahía de Cochinos. Bueno, ya no, oficialmente mandamos, así que estamos listos para la segunda ronda. Esta vez saldremos victoriosos."
 USA_fascist_operation_hispaniola: "Operación La Española"
 USA_fascist_operation_hispaniola_desc: "Para asegurar nuestra presencia en el Golfo, así como en las naciones circundantes, debemos conquistar la siguiente isla más grande, La Española. Esta contiene las naciones estables e inestables de República Dominicana y Haití. Deberíamos terminar para la hora del almuerzo."
 USA_fascist_operation_makin_me_happy: "Operación Makin Me Happy"
 USA_fascist_operation_makin_me_happy_desc: "Para ampliar nuestro alcance, debemos asegurar el archipiélago de las Bahamas, así como la nación insular de Jamaica. Esto nos proporciona una barrera para nuestras conquistas iniciales y prepara el terreno para futuras incursiones."
 USA_fascist_operation_clean_sweep: "Operación Barrido Limpio"
 USA_fascist_operation_clean_sweep_desc: "Como una cadena de dominós haremos caer a cada una de estas naciones insulares."
 USA_fascist_extra_territorial_corps: "Cuerpo Extraterritorial"
 USA_fascist_extra_territorial_corps_desc: "La creación del ETC tiene como objetivo crear una fuerza de reserva dedicada a permitir una gestión clara y completa de nuestros nuevos territorios."
 USA_fascist_operation_cartel: "Operación Cártel"
 USA_fascist_operation_cartel_desc: "Ahora que hemos asegurado la región del Golfo y el Caribe, podemos concentrarnos plenamente en nuestro avance hemisférico. Desde la frontera, atacaremos al frágil estado mexicano y lo convertiremos en un territorio de ley y orden una vez más."
 USA_fascist_operation_fruit_master: "Operación Maestro de Frutas"
 USA_fascist_operation_fruit_master_desc: "Los intereses estadounidenses nunca han abandonado a las naciones centroamericanas. Por razones corporativas o nacionales, Estados Unidos siempre se ha entrometido en los asuntos de estas naciones. Ahora llega la hora del gobierno y el control directos, ya que estas naciones en crisis parecen no tener ningún valor real."
 USA_fascist_operation_amazon: "Operación Amazonas"
 USA_fascist_operation_amazon_desc: "Brasil, el \"jefe final\" del continente sudamericano, será nuestro mayor desafío, ya que la logística de atravesar un territorio tan hostil sin duda tendrá un impacto inmediato en la calidad de las tropas y las necesidades logísticas. Sin embargo, seguiremos adelante y uniremos el hemisferio."
 USA_fascist_operation_la_plata: "Operación La Plata"
 USA_fascist_operation_la_plata_desc: "El penúltimo paso. La región de La Plata y sus alrededores pronto estarán bajo el control."
 USA_fascist_proclaiming_the_union: "Proclamación de la Unión"
 USA_fascist_proclaiming_the_union_desc: "Casi todo el territorio de las Américas es ahora nuestro. La unidad finalmente ha llegado, pero la tarea no ha terminado. Debemos reorganizarnos y fortalecernos internamente y prepararnos para el acto final: la Gran Expedición al Norte."
 USA_fascist_the_final_chapter: "El Capítulo Final"
 USA_fascist_the_final_chapter_desc: "La Unión está declarada, nuestros enemigos en nuestro lado del mundo son pocos. Ahora debemos terminar la tarea y llevar la lucha al viejo mundo si es necesario."
 USA_monarchist_nobility_act: "Ley de la Nobleza"
 USA_monarchist_nobility_act_desc: "La creación de una nobleza moderna requiere una reflexión cuidadosa. Por lo tanto, un noble moderno puede provenir de cualquier sector de la sociedad. Sin embargo, cada sector tendrá sus propios requisitos para ser justo con cada estrato. Por ejemplo, los magnates empresariales deben demostrar una inversión de una cantidad específica, a determinar, en el crecimiento de la economía nacional. También deben donar una cantidad específica a organizaciones benéficas reconocidas, como la Cruz Roja, por ejemplo. Esto es solo un ejemplo de la nueva ley de nobleza y las puertas que abrirá para el progreso social, así como para las metas personales que les ayuden en la vida."
 USA_monarchist_tied_to_office_act: "Ley de Vinculación al Cargo"
 USA_monarchist_tied_to_office_act_desc: "La \"Ley de Vinculación al Cargo\" formaliza la secuencia numérica de los títulos. En lugar de la absurda métrica de vincular el título a la sangre, este se vinculará al cargo respectivo o, en el caso de la ley de nobleza, a los requisitos para obtener una licencia de título nobiliario."
 USA_monarchist_workforce_welfare_act: "Ley de Bienestar Laboral"
 USA_monarchist_workforce_welfare_act_desc: "La WWA es una legislación utilizada para reformar y refinar la parte del estado de bienestar en torno a la compensación de la fuerza laboral en relación con la discapacidad y el tiempo libre por maternidad y otras enfermedades incapacitantes relacionadas."
 USA_monarchist_education_investments_act: "Ley de Inversiones en Educación"
 USA_monarchist_education_investments_act_desc: "Las inversiones integrales en nuestro sistema educativo permitirán mejoras a nivel nacional en nuestra economía y en los empleos en los que nuestros ciudadanos pueden participar y también crear ellos mismos."
 USA_monarchist_declaring_the_empire: "Declaración del Imperio"
 USA_monarchist_declaring_the_empire_desc: "Es en este día que realizamos la reforma definitiva. De una República Constitucional a una República Constitucional con una Monarquía Electiva. A partir de este día se nos conoce como \"El Sacro Imperio Americano\"."
 USA_monarchist_readjusting_foreign_trade_policies: "Reajuste de Políticas de Comercio Exterior"
 USA_monarchist_readjusting_foreign_trade_policies_desc: "Al aprovechar nuestra abundancia natural, podemos renegociar los planes comerciales entre naciones que buscan obligarnos a utilizar nuestras propias reservas. Si logramos conservar estas reservas durante el mayor tiempo posible, esto nos brinda una inversión a largo plazo en futuros acuerdos comerciales e influencia económica global."
 USA_monarchist_penal_labour_corps: "Creación del Cuerpo de Trabajo Penal"
 USA_monarchist_penal_labour_corps_desc: "Al crear programas de rehabilitación en torno a proyectos laborales, podemos mejorar la infraestructura pública o impulsar la productividad de las industrias primarias. Por lo tanto, podemos mejorar la calidad de vida general de nuestros ciudadanos al traer más productos más económicos a un mayor número de hogares."
 USA_monarchist_creating_more_domestic_supply_chains: "Creación de Más Cadenas de Suministro Domésticas"
 USA_monarchist_creating_more_domestic_supply_chains_desc: "Al centrarnos en la diversificación de la estructura económica local mediante la creación de nuevas cadenas de suministro nacionales, nuestra nación puede ser más autosuficiente y entrar en mercados que antes creíamos dominados sólo por un grupo selecto de naciones."
 USA_monarchist_expanding_military_education_programs: "Expansión de Programas de Educación Militar"
 USA_monarchist_expanding_military_education_programs_desc: "Al ampliar y posiblemente hacer obligatorios los programas de liderazgo conocidos como Cuerpo de Entrenamiento de Oficiales de Reserva Juvenil (JROTC), facilitamos la expansión del voluntariado mediante la experiencia pasiva en el ejército. Además, podemos enseñar a las futuras generaciones habilidades de liderazgo que son tan viables en la fuerza laboral civil como lo serían en el ejército."
 USA_monarchist_army_investments: "Inversiones en el Ejército"
 USA_monarchist_army_investments_desc: "Al aumentar la financiación y dirigirla hacia mejoras relacionadas con el soldado promedio de infantería, podemos empezar a mejorar las capacidades de combate de las que cada soldado será, efectivamente, capaz."
 USA_monarchist_baby_stepping_mandatory_service: "Servicio Obligatorio por Pasos"
 USA_monarchist_baby_stepping_mandatory_service_desc: "El país ha contado con una fuerza de voluntarios completa durante casi toda su existencia. Sin embargo, dada la complejidad y el desconocimiento de las guerras modernas y de los enemigos, es mejor ser proactivo en lugar de reactivo. Por lo tanto, se promulgará una ley para instituir un servicio militar obligatorio de cuatro meses para que la población se familiarice, al menos, con los principios básicos del servicio militar."
 USA_monarchist_naval_investments: "Inversiones Navales"
 USA_monarchist_naval_investments_desc: "Mejorar nuestra destreza y habilidades navales nos permitirá atacar preventivamente cualquier fuerza de invasión enemiga, esté o no de este lado del mundo."
 USA_monarchist_improving_shipping_industries: "Mejora de las Industrias Navieras"
 USA_monarchist_improving_shipping_industries_desc: "Al invertir y establecer mejores contratos, esperamos mejorar la industria naviera y naval de nuestro país. Esto nos ayudará tanto en el ámbito civil como en el militar a medida que nos esforzamos por navegar la era moderna de enredos geopolíticos."
 USA_monarchist_hemispheric_influence: "Influencia Hemisférica"
 USA_monarchist_hemispheric_influence_desc: "A través del poder blando y de influencias sutiles, podemos intentar controlar el hemisferio en el que ya tenemos una influencia mayoritaria, de una manera más directa."
 USA_monarchist_the_northern_kingdom_agreement: "Acuerdo del Reino del Norte"
 USA_monarchist_the_northern_kingdom_agreement_desc: "El \"imperio del norte\", también conocido como las vastas tierras de Canadá, debería estar más en consonancia con las necesidades del hemisferio occidental. Por ello, debemos presionarlos y ayudarlos a comprender que los británicos/ingleses han dejado de tener la presencia significativa que antaño tuvieron. Sin embargo, podemos permitirles formar parte de una nueva era de unidad, comercio e innovación. Debemos convencerlos, tenemos que convencerlos."
 USA_monarchist_the_southern_kingdom_agreement: "Acuerdo del Reino del Sur"
 USA_monarchist_the_southern_kingdom_agreement_desc: "La disposición de México nunca ha sido realmente positiva. Podemos usar esto para garantizar el orden público y la estabilidad de su nación, así como para impulsar iniciativas comerciales que demuestren nuestra seriedad en ayudarlos para el bien común. Esperemos que lo entiendan, eso es todo."
 USA_monarchist_the_federation_proposal: "Propuesta de la Federación"
 USA_monarchist_the_federation_proposal_desc: "A pesar de la animosidad histórica, podemos hacer todo lo posible para convencer a Cuba de que tenemos buenas intenciones y queremos una agenda más prooccidental. Lo que los beneficie beneficiará al hemisferio en su conjunto. También podemos endulzar el trato dándoles luz verde para consolidar el Caribe. Esperemos que les parezca lo suficientemente atractivo."
 USA_monarchist_the_united_principalities_offer: "Oferta de los Principados Unidos"
 USA_monarchist_the_united_principalities_offer_desc: "Al liderar las conversaciones con Panamá, un país con el que hemos tenido una historia relativamente positiva en términos generales, podemos crear una federación o unión de estados en Centroamérica, liderada por ellos y con la ayuda de nosotros para mantener el orden."
 USA_monarchist_brazi_comes_to_you: "Brasil Viene a Ti"
 USA_monarchist_brazi_comes_to_you_desc: "Todos dicen que Brasil es un mal lugar, e incluso hay un chiste que dice \"vas a Brasil\". Pues bien, queremos que Brasil se acerque a ellos. Le ofreceremos la posibilidad de consolidar la mitad sur del continente, protegeremos sus intereses y lideraremos una unión hemisférica común."
 USA_monarchist_operation_screaming_eagle: "Operación Águila Rugiente"
 USA_monarchist_operation_screaming_eagle_desc: "Durante demasiado tiempo, el mundo ha estado alterándose en nuestro hemisferio, agitando y diluyendo nuestros esfuerzos por crear un estado de cosas más pacífico. Claro que hemos cometido errores en el pasado, pero ya no. Tomaremos medidas más drásticas y directas para asegurar el camino y el destino que crearemos. El nuevo mundo se renovará una vez más."
 USA_monarchist_operation_initial_gains: "Operación Ganancias Iniciales"
 USA_monarchist_operation_initial_gains_desc: "Hemos tenido tiempo de construir nuestras fuerzas y preparar a nuestros aliados, ahora es el momento de extender nuestras alas y consolidar los continentes."
 USA_monarchist_economic_investments: "Inversiones Económicas"
 USA_monarchist_economic_investments_desc: "Hoy lideraremos el nuevo Programa Económico del Hemisferio Occidental. Facilitaremos y fomentaremos el desarrollo de nuestros nuevos y más cercanos aliados y súbditos, para que todos podamos prosperar juntos."
 USA_monarchist_public_unity_programs: "Programas de Unidad Pública"
 USA_monarchist_public_unity_programs_desc: "El PUP es un programa de ayuda mutua dedicado a fomentar la unidad pública dentro de las nuevas naciones, así como a promover la nueva identidad hemisférica del \"Nuevo Mundo\". Este valor compartido de formar parte de la nueva unión impulsará nuestro desarrollo y comprensión mutua, además de marcar el inicio de una nueva era que trasciende el planeta. Porque si todos trabajamos juntos, ¿en qué podemos centrarnos realmente sino en el más allá?"
 USA_monarchist_operation_midtown_madness: "Operación Locura en el Centro"
 USA_monarchist_operation_midtown_madness_desc: "La siguiente fase de consolidación ya está aquí. Mientras Cuba y Panamá tienen múltiples naciones con las que guerrear, el terreno es mucho más difícil para Colombia y Brasil. Por lo tanto, limitaremos sus bajas atacando a sus enemigos."
 USA_monarchist_operation_new_world: "Operación Nuevo Mundo"
 USA_monarchist_operation_new_world_desc: "La fase final de consolidación ha llegado. Ahora es el momento de que nuestros aliados y súbditos de confianza consoliden el resto del nuevo mundo para que podamos allanar el camino hacia un futuro nuevo y unido."
 USA_monarchist_continued_economic_ties: "Lazos Económicos Continuos"
 USA_monarchist_continued_economic_ties_desc: "Para fortalecer nuestra cooperación y vínculos económicos, iniciaremos el Nuevo Intercambio Económico Mundial (NWEE). Este programa optimizará los esfuerzos de desarrollo y seguirá trabajando en la creación de la base fundamental de la identidad del Nuevo Mundo."
 USA_monarchist_a_new_world_mineral_order: "Un Nuevo Orden Mineral Mundial"
 USA_monarchist_a_new_world_mineral_order_desc: "Para demostrar nuestro compromiso con nuestros aliados y súbditos, realizaremos una inversión minera masiva en todo el hemisferio. Será bastante costosa, pero sin duda vale la pena."
 USA_red_junta_the_commissariat_declaration: "Declaración del Comisariado"
 USA_red_junta_the_commissariat_declaration_desc: "Nosotros, las fuerzas armadas populares, hemos tomado el control y deseamos mejorar y asegurar la vida de los trabajadores. Por lo tanto, para comprender plenamente este compromiso, nos convertiremos en los Comisariados Unidos de América. Una fuerza militar popular unida que vela por el bienestar y la seguridad de sus ciudadanos."
 USA_red_junta_service_welfare_programs: "Programas de Bienestar del Servicio"
 USA_red_junta_service_welfare_programs_desc: "Para garantizar que el número de personal se mantenga dentro de niveles razonables, comenzaremos a ampliar ciertos incentivos que ofrece el ejército. En general, no esperamos un cambio significativo, pero en general debería incentivar el reclutamiento y, al mismo tiempo, retribuir mejor a quienes se reincorporan a la fuerza laboral civil."
 USA_red_junta_public_service_corps: "Cuerpo de Servicio Público"
 USA_red_junta_public_service_corps_desc: "El PSC es una especie de cuerpo de trabajo o cuerpo conjunto de ingenieros civiles y militares. Su objetivo es contribuir a proyectos de desarrollo o al mantenimiento de infraestructuras."
 USA_red_junta_improved_service_health_programs: "Programas Mejorados de Salud del Servicio"
 USA_red_junta_improved_service_health_programs_desc: "Se espera que invertir en nuestros programas de atención médica para miembros y ex miembros del servicio militar aumente las cifras de reclutamiento al incentivar la atención tanto dentro como fuera del servicio militar."
 USA_red_junta_industrious_innovators_act: "Ley de Innovadores Industriosos"
 USA_red_junta_industrious_innovators_act_desc: "El IIA es un proyecto de ley de legislación y financiación para promover innovaciones económicas y formas de mejorar nuestra producción económica."
 USA_red_junta_industrial_expansion_fund: "Fondo de Expansión Industrial"
 USA_red_junta_industrial_expansion_fund_desc: "El IEF es un fondo dedicado a crear nuevos proyectos de desarrollo económico y mejorar no sólo los empleos disponibles, sino también mejorar nuestra composición económica."
 USA_red_junta_infrastructure_improvement_fund: "Fondo de Mejora de Infraestructura"
 USA_red_junta_infrastructure_improvement_fund_desc: "Al dedicar mejor los fondos al desarrollo de infraestructura, podremos mejorar en general nuestra producción económica general ya que las cadenas de suministro tendrán formas mejores y más fluidas de interconectarse entre sí."
 USA_red_junta_strategic_resource_development_act: "Ley de Desarrollo de Recursos Estratégicos"
 USA_red_junta_strategic_resource_development_act_desc: "La SRDA es una iniciativa de financiación y desregulación dedicada a fomentar y prácticamente imponer la mejora de la extracción de minerales en la mitad oriental de EE. UU., concretamente en los estados intermedios entre los considerados \"norte\" y \"sur\"."
 USA_red_junta_strategic_resource_western_development_act: "Ley de Desarrollo del Oeste"
 USA_red_junta_strategic_resource_western_development_act_desc: "La WDA es una continuación de la SRDA en el sentido de que continúa la tendencia occidental de desarrollo estratégico a lo largo de estados medianos como Colorado, Utah, etc."
 USA_red_junta_rotating_training_programs: "Programas de Entrenamiento Rotativo"
 USA_red_junta_rotating_training_programs_desc: "Al establecer un sistema de entrenamiento rotativo, podemos mejorar la efectividad general de nuestras tropas. El RTP se centra en diversificar los entrenamientos sobre el terreno a los que estarán expuestos nuestros pilotos. En resumen, un día o varios podrían entrenar en una zona pantanosa y al siguiente en un desierto."
 USA_red_junta_officer_refinement_program: "Programa de Refinamiento de Oficiales"
 USA_red_junta_officer_refinement_program_desc: "Al trabajar incansablemente para perfeccionar y mejorar nuestro liderazgo, podemos garantizar que el mando y control de nuestras fuerzas armadas sea lo más eficiente posible. Esto debería beneficiar a todas las ramas, siempre que sea posible, en la toma de decisiones instantáneas, así como en la evaluación y gestión de riesgos en el campo de batalla."
 USA_red_junta_army_advancements_program: "Programa de Avance del Ejército"
 USA_red_junta_army_advancements_program_desc: "El AAP es una inversión integral en la mejora general de nuestra rama militar. Los sistemas de armas, el equipo y los soldados son apenas piezas del rompecabezas que deseamos completar."
 USA_red_junta_increased_training_programs: "Programas de Entrenamiento Aumentados"
 USA_red_junta_increased_training_programs_desc: "Aumentar y mantener al día nuestros programas de entrenamiento naval, tanto en escenarios de combate como fuera de él, permite a los soldados familiarizarse mejor con los buques a los que están asignados. Por consiguiente, la atención y la evaluación en combate de la tripulación de cada buque permiten a nuestro personal naval mejorar al máximo sus capacidades y brindarles las herramientas necesarias para ello."
 USA_red_junta_naval_propulsion_program: "Programa de Propulsión Naval"
 USA_red_junta_naval_propulsion_program_desc: "El NPP es un programa de investigación dedicado a mejorar los motores y sistemas de propulsión de nuestros buques de guerra para darles una ventaja de combate en maniobrabilidad."
 USA_red_junta_naval_gun_research_initiative: "Iniciativa de Investigación en Artillería Naval"
 USA_red_junta_naval_gun_research_initiative_desc: "Nuestro personal naval es solo una pieza del rompecabezas del poder. Debemos mejorar nuestros sistemas de armas navales si queremos defendernos realmente, y mucho menos derrotar a una fuerza enemiga."
 USA_red_junta_improved_armaments: "Armamentos Mejorados"
 USA_red_junta_improved_armaments_desc: "Al actualizar y mejorar nuestros sistemas de armas de aeronaves podemos mejorar nuestra eficacia general en escenarios de combate."
 USA_red_junta_bettering_aircraft_models: "Mejora de Modelos de Aeronaves"
 USA_red_junta_bettering_aircraft_models_desc: "La modernización de nuestros modelos de aeronaves existentes nos permite garantizar maniobras aéreas más ágiles para proteger eficazmente una zona aérea de la fuerza enemiga."
 USA_red_junta_further_airforce_investments: "Más Inversiones en la Fuerza Aérea"
 USA_red_junta_further_airforce_investments_desc: "Al aumentar nuestras inversiones generales hacia nuestra rama de servicio de la fuerza aérea, establecemos un nuevo estándar de mejora y avance que la fuerza puede alcanzar potencialmente a medida que pasa el tiempo y la inversión continúa."
 USA_red_junta_establishing_the_warplanning_department: "Departamento de Planificación de Guerra"
 USA_red_junta_establishing_the_warplanning_department_desc: "Ahora que hemos ampliado suficientemente nuestro poder económico y militar, podemos ocuparnos de la idea de extender la revolución a los más necesitados."
 USA_red_junta_war_plan_maple_leaf: "Plan de Guerra Hoja de Arce"
 USA_red_junta_war_plan_maple_leaf_desc: "Como parte del Departamento del Nuevo Mundo, dependiente del Departamento de Planificación de Guerra, el objetivo inicial es asegurar el extremo norte, garantizando al máximo nuestra situación estratégica."
 USA_red_junta_war_plan_cartel_cleanup: "Plan de Guerra Limpieza del Cártel"
 USA_red_junta_war_plan_cartel_cleanup_desc: "Para continuar asegurando nuestra posición estratégica, la posición abiertamente desestabilizada de nuestro vecino del sur es una gran preocupación para nuestra seguridad nacional. Sin importar las implicaciones de que un enemigo extranjero utilice a México como trampolín, los cárteles y la naturaleza casi tribal de una gran franja de territorio mexicano son motivo suficiente para resolver las cosas de una vez por todas."
 USA_red_junta_war_plan_havana: "Plan de Guerra La Habana"
 USA_red_junta_war_plan_havana_desc: "La isla cubana es la más grande del Caribe y ocupa una posición estratégica. No solo es la puerta de entrada al Golfo de México, sino también una barrera para el océano Atlántico. Por ello, debemos asegurarla para la red portuaria y naval definitiva, que asegurará el comercio y la paz en el hemisferio occidental tal como la conocemos."
 USA_red_junta_war_plan_homeward_bound: "Plan de Guerra Regreso a Casa"
 USA_red_junta_war_plan_homeward_bound_desc: "Comenzamos el siguiente capítulo de nuestro gran avance. Regresando al viejo mundo y completando la labor que nuestros predecesores no pudieron realizar, difundiendo los valores del socialismo económico a las masas europeas."
 USA_red_junta_war_plan_round_three: "Plan de Guerra Tercera Ronda"
 USA_red_junta_war_plan_round_three_desc: "Dos guerras mundiales y aún no han aprendido la lección. Bueno, lo bueno es que esta vez no fue su culpa, simplemente fue un buen negocio, nada más."
 USA_red_junta_war_plan_black_back_hand: "Plan de Guerra Mano Negra"
 USA_red_junta_war_plan_black_back_hand_desc: "La Mano Negra era una sociedad secreta fundada en el nacionalismo serbio y el fervor antiaustrohúngaro. Si bien ellos iniciaron una guerra mundial, nosotros culminaremos la paz en los Balcanes asentando al miembro más agresivo. Después de todo, \"donde hay un serbio, hay Serbia\" no parece más que imperialismo."
 USA_red_junta_war_plan_outback: "Plan de Guerra Outback"
 USA_red_junta_war_plan_outback_desc: "El \"continente\" australiano es solo un paso hacia la estabilidad en el Pacífico y el Lejano Oriente. Por lo tanto, debemos dar el primer paso ahora, no más tarde."
 USA_red_junta_war_plan_java: "Plan de Guerra Java"
 USA_red_junta_war_plan_java_desc: "Indonesia es la nación más grande del archipiélago, lo que prácticamente crea un camino despejado desde Australia hacia China. Debemos asegurar esta nación si queremos tener un punto de partida adecuado para la batalla final."
 USA_red_junta_war_plan_great_leap_forward: "Plan de Guerra Gran Salto Adelante"
 USA_red_junta_war_plan_great_leap_forward_desc: "El jefe final, la \"Gran China\". Bueno, ya no será grande cuando propaguemos el verdadero socialismo económico y no este totalitarismo pseudocultista con características chinas. Mao dio un gran paso adelante para impulsar la nación china; ahora es el momento de dar nuestro gran paso adelante para asegurar la paz mundial y el verdadero futuro de los valores socialistas."
 USA_red_junta_war_peace_in_our_time: "Paz en Nuestro Tiempo"
 USA_red_junta_war_peace_in_our_time_desc: "Con el Nuevo Mundo, el Viejo Mundo y el Lejano Oriente ahora asegurados, con áreas estratégicas y amenazas importantes contenidas, podemos establecer el cuerpo de comisariado global para devolver estas tierras a lugares de vida más pacíficos y reservados. Consolidaremos los acuerdos de paz global y estableceremos un nuevo camino para nuestra especie."
 USA_american_trotskist_reindustrialization_priority: "Prioridad de Reindustrialización"
 USA_american_trotskist_reindustrialization_priority_desc: "La nación ha perdido su poderío industrial; debemos y vamos a solucionar esto para lograr nuestros objetivos."
 USA_american_trotskist_national_economic_revival_act: "Ley de Revitalización Económica Nacional"
 USA_american_trotskist_national_economic_revival_act_desc: "La NERA es una legislación para un paquete de gasto agresivo para promover la industrialización en todo el país."
 USA_american_trotskist_securing_our_resources: "Asegurar Nuestros Recursos"
 USA_american_trotskist_securing_our_resources_desc: "Al limitar el comercio al mínimo indispensable, podemos empezar a crear cadenas de suministro nacionales más desarrolladas. En consecuencia, esto también nos permite invertir mejor en las operaciones mineras para aumentar la producción general."
 USA_american_trotskist_national_armaments_expansion_act: "Ley de Expansión de Armamentos Nacional"
 USA_american_trotskist_national_armaments_expansion_act_desc: "La NAEA es un proyecto de ley de financiación para expandir nuestra base industrial militar. Este factor clave de nuestro poder económico asegurará el futuro que nos espera."
 USA_american_trotskist_national_naval_industrialization_act: "Ley de Industrialización Naval Nacional"
 USA_american_trotskist_national_naval_industrialization_act_desc: "La NNIA es un proyecto de ley de financiación específica para ampliar y mejorar nuestra base industrial naval y naviera. Debemos proteger el comercio y las aguas que nos rodean."
 USA_american_trotskist_the_red_army: "El Ejército Escarlata"
 USA_american_trotskist_the_red_army_desc: "Nuestras banderas escarlatas ondearán en alto mientras nuestras tropas son entrenadas y ejercitadas para ser las más agresivas en maniobras tácticas donde y cuando sea posible."
 USA_american_trotskist_the_red_navy: "La Armada Escarlata"
 USA_american_trotskist_the_red_navy_desc: "Al mejorar los medios de entrenamiento y adaptar a los soldados para que comprendan la esencia de la causa por la que luchan, inculcaremos el sentido del deber y el fervor para luchar donde la mayoría de las naciones fracasan. En consecuencia, reorientar parte del presupuesto naval hacia una métrica más centrada en I+D nos permite mejorar los sistemas de armas de nuestros buques."
 USA_american_trotskist_the_red_airforce: "La Fuerza Aérea Escarlata"
 USA_american_trotskist_the_red_airforce_desc: "Al invertir en I+D relacionado con nuestras aeronaves y sus sistemas de armas, podemos mejorar las capacidades de combate de nuestra fuerza aérea centrándonos en ventajas tácticas agresivas."
 USA_american_trotskist_national_mobilization: "Movilización Nacional"
 USA_american_trotskist_national_mobilization_desc: "La nación ha sido refinada, ahora debemos prepararla para la Gran Lucha."
 USA_american_trotskist_the_commissar_corps: "Cuerpo de Comisarios"
 USA_american_trotskist_the_commissar_corps_desc: "La creación del CAC o Cuerpo de Comisarios del Ejército es una excelente manera de motivar a los líderes y soldados a defender aquello que sus vidas están destinadas a proteger: sus familias, hogares y valores, que nos esforzamos por mantener en el corazón de todos."
 USA_american_trotskist_the_permanent_revolution: "La Revolución Permanente"
 USA_american_trotskist_the_permanent_revolution_desc: "La suerte está echada y ahora debemos marcar el comienzo de una nueva era de paz; a través de la revolución aseguraremos la posición global del Estado socialista y sus pueblos."
 USA_american_trotskist_marching_south: "Marchando hacia el Sur"
 USA_american_trotskist_marching_south_desc: "Así, las fichas de dominó caerán a medida que empecemos a liberar al Nuevo Mundo y sus desesperados intentos de \"socialismo\", sus autócratas imperialistas y sus mestizos occidentales como gobiernos. Avanzaremos rápidamente hacia el Canal de Panamá y estaremos a las puertas del continente sudamericano."
 USA_american_trotskist_workers_paradise: "Paraíso de los Trabajadores"
 USA_american_trotskist_workers_paradise_desc: "El fallido Estado Socialista de Cuba es una mancha en el socialismo. El resto son una mezcla de perros falderos británicos y franceses, y meros explotadores. Los usaremos para abrirnos paso a saltos y rodear lentamente el continente sur por tierra y mar."
 USA_american_trotskist_new_world_order: "Nuevo Orden Mundial"
 USA_american_trotskist_new_world_order_desc: "Al situarnos a las puertas de Sudamérica, irrumpiremos en estas puertas que hemos creado y nos propusimos crear un nuevo orden en el nuevo mundo. ¡Viva la Revolución!"
 USA_american_trotskist_the_eagle_descends_onto_the_continent: "El Águila Desciende sobre el Continente"
 USA_american_trotskist_the_eagle_descends_onto_the_continent_desc: "El eslabón más débil, pero a la vez más valioso, para asegurar la revolución permanente. África es un territorio vasto y diverso, y como tal, debemos establecer un buen sector de control si queremos continuar y asegurar la Revolución Socialista Mundial."
 USA_american_trotskist_the_northern_cleanup: "Limpieza del Norte"
 USA_american_trotskist_the_northern_cleanup_desc: "Asegurar la parte norte del continente nos da acceso a Oriente Medio y al Mediterráneo para el eventual regreso al Viejo Mundo."
 USA_american_trotskist_operation_congo_cabal: "Operación Cábala del Congo"
 USA_american_trotskist_operation_congo_cabal_desc: "La Operación Cabal del Congo es la liberación de la región de África Central del control gubernamental imperialista, capitalista y acérrimo antiobrero."
 USA_american_trotskist_operation_geographic_horn: "Operación Cuerno Geográfico"
 USA_american_trotskist_operation_geographic_horn_desc: "El Cuerno de África, o simplemente África Oriental, abrirá nuestras influencias hacia Asia y el Pacífico desde ahora ambos lados del globo."
 USA_american_trotskist_operation_capetown: "Operación Ciudad del Cabo"
 USA_american_trotskist_operation_capetown_desc: "Con el Nuevo Mundo asegurado, ahora tenemos la oportunidad de asegurar dos tercios del acceso al polo sur. Esta seguridad nos permitirá prevenir misiones extranjeras y nos dará mayor alcance para llevar a cabo nuestras propias misiones y, probablemente, explorar recursos naturales."
 USA_american_trotskist_operation_old_world: "Operación Viejo Mundo"
 USA_american_trotskist_operation_old_world_desc: "Al asegurar los últimos fragmentos del Nuevo Mundo, potencialmente también incorporamos el Viejo Mundo, por lo tanto debemos ser proactivos y establecer una base de la cual surgió la anglósfera de nuestra herencia."
 USA_american_trotskist_operation_norse: "Operación Nórdica"
 USA_american_trotskist_operation_norse_desc: "Desde nuestro punto de apoyo en las islas celtas, podemos continuar nuestra gran expedición al norte y liberar a las naciones escandinavas."
 USA_american_trotskist_operation_west_has_fallen: "Operación El Oeste Ha Caído"
 USA_american_trotskist_operation_west_has_fallen_desc: "Desde nuestra posición en las islas, ahora podemos establecer una clara posición en el continente con las naciones más occidentales. La liberación del viejo mundo será rápida y justa."
 USA_american_trotskist_operation_black_sea: "Operación Mar Negro"
 USA_american_trotskist_operation_black_sea_desc: "Desde el extremo norte descenderemos y crearemos un muro de liberación que divida la autocracia perpetua del Estado ruso y el resto de Europa que liberaremos."
 USA_american_trotskist_operation_vistula: "Operación Vístula"
 USA_american_trotskist_operation_vistula_desc: "Hoy comienza nuestra marcha hacia el este, comenzando a liberar el corazón del Viejo Mundo. Desde las \"democracias\" oligárquicas hasta los explotadores capitalistas, liberaremos a los pueblos del viejo mundo uno por uno."
 USA_american_trotskist_operation_cradle: "Operación Cuna"
 USA_american_trotskist_operation_cradle_desc: "La cuna de la civilización, y sin embargo, está llena de algunos de los pueblos y gobiernos más destructivos. Pues basta, liberaremos y traeremos la verdadera civilización a los trabajadores de estas tierras y crearemos un nuevo futuro. Un futuro brillante y escarlata para todos."
 USA_american_trotskist_operation_sarajevo: "Operación Sarajevo"
 USA_american_trotskist_operation_sarajevo_desc: "Se inició una guerra mundial en los Balcanes, ahora pretendemos liberarlos y evitar más muertes y destrucción innecesaria."
 USA_american_trotskist_operation_caging_the_bear: "Operación Enjaular al Oso"
 USA_american_trotskist_operation_caging_the_bear_desc: "El Estado ruso, otrora la Unión de Repúblicas Socialistas Soviéticas, es un fracaso y una mancha en el nombre socialista. Liberaremos a sus pueblos, enjaularemos a los autócratas y explotadores capitalistas y borraremos la mancha de la faz del planeta."
 USA_american_trotskist_operation_himalayas: "Operación Himalayas"
 USA_american_trotskist_operation_himalayas_desc: "Con la puerta norte asegurada, podemos crear la puerta sur. Desde aquí nos prepararemos para el último obstáculo que impide la liberación global."
 USA_american_trotskist_operation_great_leap_forward: "Operación Gran Salto Adelante"
 USA_american_trotskist_operation_great_leap_forward_desc: "El jefe final y sus subordinados o misiones secundarias. La República Popular China es la mayor mancha que ha caído sobre el mundo del socialismo tras el fracaso de la Unión Soviética. Liberaremos sus tierras y su gente si queremos culminar cualquier revolución global. Después de este \"jefe final\", nada nos impedirá alcanzar el verdadero comunismo, la paz y la prosperidad mundiales. A partir de aquí, solo las estrellas son el límite."
 USA_us_economic_policies_tooltip: "Modifica §Y$us_economic_policies$§!:"
