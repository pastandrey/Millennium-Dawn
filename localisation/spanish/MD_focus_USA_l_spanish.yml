 USA_american_tax_code_tooltip: "Modifica §Y$USA_american_tax_code$§!:"
 USA_fascist_closing_borders_desc: "§YEstados Unidos§! cerrará su frontera en el futuro previsible."
 USA_cosmetic_tag_military_junta_completed_desc: "§YEstados Unidos de América§! cambia su nombre a §YMilitares Unidos de la Tierra§!"
 USA_cosmetic_tag_fascist_completed_desc: "§YEstados Unidos de América§! cambia su nombre a §YUnión Nacional de Estados Americanos§!"
 USA_cosmetic_tag_monarchist_desc: "§YEstados Unidos de América§! cambia su nombre a §YEl Sacro Imperio Americano§!"
 USA_cosmetic_tag_red_junta_desc: "§YEstados Unidos de América§! cambia su nombre a §YLos Comisariados Unidos de América§!"
 USA_free_american_territories_desc: "§YEstados Unidos de América§! cambia su nombre a §YLos Territorios Libres de América§!"
 USA_not_have_republicans_in_charge_TT: "§Y[conservatism_L]§! no es el partido gobernante"
 USA_not_have_democrats_in_charge_TT: "§Y[liberalism_L]§! no es el partido gobernante"
 USA_idea_light_infantry_dominance: "Dominio de la infantería ligera"
 USA_idea_light_infantry_dominance_desc: "De bajo costo de mantenimiento y equipamiento, con flexibilidad en su capacidad de entrenamiento y armamento, la Infantería Ligera es la piedra angular de la guerra moderna, que parece ser la más débil. La convertiremos en tal, donde la más débil ahora es la líder de la manada, con innovaciones en la organización de unidades, logística y nuevas armas para cualquier situación necesaria. Saldremos victoriosos en estos aspectos."
 USA_idea_mobile_infantry_doctrine: "Doctrina de Infantería Móvil"
 USA_idea_mobile_infantry_doctrine_desc: "El uso de la movilidad de los vehículos utilitarios y de los vehículos de transporte ligeros, así como la versatilidad de armar al soldado raso común con las necesidades del campo de batalla moderno, garantiza un ejército integral y flexible para el futuro."
 USA_idea_armored_infantry_supremacy: "Supremacía de Infantería Blindada"
 USA_idea_armored_infantry_supremacy_desc: "Los tanques son costosos, tanto de desarrollar como de desplegar, y corren el riesgo de perder en el campo de batalla. Pero ¿qué pasaría si el soldado de infantería promedio fuera un tanque, o al menos la escuadra de infantería promedio fuera una especie de \"tanque\"?"
 USA_idea_repurposing_armored_programs: "Directiva de Reutilización de Programas Blindados"
 USA_idea_repurposing_armored_programs_desc: "La directiva RAP es detener toda la producción de tanques para comenzar la reestructuración de la fabricación y la organización militar en torno a vehículos blindados más ligeros y la unidad de infantería estándar."
 USA_idea_tank_rehabilitation_programs: "Programas de Rehabilitación de Tanques"
 USA_idea_tank_rehabilitation_programs_desc: "Los TRP están diseñados para refinar y hacer más eficiente la producción y el uso de la fuerza de tanques y/o unidades fuertemente blindadas en su conjunto. A costa de reducir la cantidad de vehículos ligeros, nuestra fuerza de tanques será la fiel compañera de nuestra infantería."
 USA_idea_revitalized_artillery_innovations: "Innovaciones Revitalizadas en Artillería"
 USA_idea_revitalized_artillery_innovations_desc: "A través de inversiones y programas dedicados de investigación y desarrollo, nuestra artillería se convertirá en la antigua versión renovada y dominará el campo de batalla moderno."
 USA_idea_light_vehicle_innovations: "Innovaciones en Vehículos Ligeros"
 USA_idea_light_vehicle_innovations_desc: "La iniciativa LVI se propone centrar más la I+D en el desarrollo y la adaptación de vehículos blindados más ligeros, como los IFV y los APC, para que sean más flexibles y adaptables. Esto implica convertir nuestra fuerza de tanques en una fuerza especial, en lugar de una subdivisión importante del ejército."
 USA_idea_tank_innovations: "Innovaciones en Tanques"
 USA_idea_tank_innovations_desc: "Al centrar la financiación en tanques y equivalentes de tanques, podemos crear una fuerza versátil, potente y contundente."
 USA_idea_mass_motorization_efforts: "Esfuerzos de motorización masiva"
 USA_idea_mass_motorization_efforts_desc: "Mediante la estandarización y un mayor esfuerzo de concentración, ahora podemos convertir nuestro ejército en una fuerza verdaderamente móvil."
 USA_idea_defensive_artillery_program: "Programa de Artillería Defensiva"
 USA_idea_defensive_artillery_program_desc: "Un programa de I+D diseñado para la supervivencia de las piezas de artillería y, en particular, de sus tripulaciones, con miras a su influencia y eficacia en el campo de batalla. Esto incluye aspectos como la fabricación de equipos, el alcance efectivo en primera línea y la facilidad de maniobra."
 USA_idea_offensive_artillery_program: "Programa de Artillería Ofensiva"
 USA_idea_offensive_artillery_program_desc: "El OAP es un programa de I+D diseñado para mejorar la supervivencia mediante medios ofensivos. La guerra moderna está en constante movimiento y, por lo tanto, también debería estarlo la propia artillería. Las unidades de artillería autopropulsada modernas serán la columna vertebral de la maniobrabilidad y la supervivencia mediante la investigación de nuevas innovaciones en blindaje y motores, no solo para apoyar al \"cañón de cristal\" de nuestro ejército, sino también al resto de nuestras fuerzas motorizadas."
 USA_idea_maneuver_logistics: "Logística de Maniobra"
 USA_idea_maneuver_logistics_desc: "Al crear redes de suministro y logística más maniobrables, podemos descentralizar mejor y atender las necesidades de nuestro ejército en un campo de batalla que cambia rápidamente."
 USA_idea_defense_support_force: "Apoyo especializado de defensa de primera línea"
 USA_idea_defense_support_force_desc: "SFDP, la nueva designación de la subdivisión de las Fuerzas Especiales y su función de combate dentro de la rama de servicio del Ejército de los EE. UU. Diseñada para apoyar posiciones defensivas y posibles cercos de fuerzas aliadas siempre que sea posible, por cualquier medio disponible."
 USA_idea_precision_strike_force: "Fuerza de Ataque de Precisión"
 USA_idea_precision_strike_force_desc: "Al equipar nuestras unidades SFG con material de primera línea y brindarles el régimen de entrenamiento definitivo, establecemos un estándar de ataque y ejecución de fuerza."
 USA_idea_steamlining_naval_production: "Optimización de la Producción Naval"
 USA_idea_steamlining_naval_production_desc: "A través de la reestructuración y la dedicación podemos adaptar y agilizar mejor la producción, el reacondicionamiento y la reparación de nuestros buques y llevarlos a donde deben estar."
 USA_idea_frigate_fighter_groups: "Grupos de Combate de Fragatas"
 USA_idea_frigate_fighter_groups_desc: "La fragata va a ser nuestra columna vertebral, por lo tanto debemos apoyar nuestra columna vertebral con el cuidado adecuado y los recursos necesarios para hacerla lo más fuerte posible."
 USA_idea_corvette_combat_prowess: "Prowesa de Combate de Corbetas"
 USA_idea_corvette_combat_prowess_desc: "Corbetas ágiles, rápidas y modulares. Estos son los atributos que hacen que el acero de un océano tenga la capacidad de combate de un portaaviones moderno. Por ello, adaptaremos, invertiremos y expandiremos el uso de nuestras corbetas, tanto presentes como futuras, para crear la mejor armada del mundo, una vez más."
 USA_idea_attack_fleet_investments: "Inversiones en Flotas de Ataque"
 USA_idea_attack_fleet_investments_desc: "¡Los volaremos del agua antes de que sepan qué los golpeó!"
 USA_idea_missile_fleet_investments: "Inversiones en Flotas de Misiles"
 USA_idea_missile_fleet_investments_desc: "¡Iceberg en el horizonte, Capitán! \"Pues bien, vuélalo\"."
 USA_idea_mobile_airports_program: "Programa de Aeropuertos Móviles"
 USA_idea_mobile_airports_program_desc: "El MAP es un programa de I+D dedicado a hacer que nuestros portaaviones sean básicamente como un coche de payaso: cuanto más podamos montar, más daño podremos causar."
 USA_idea_project_gunship: "Proyecto Helicóptero de Ataque"
 USA_idea_project_gunship_desc: "Ágil y mortal, así es como me gusta."
 USA_idea_modern_marine_corps: "Cuerpo de Marines Moderno"
 USA_idea_modern_marine_corps_desc: "Lo mismo, un día diferente, juguetes nuevos y elegantes para romper el espíritu de los enemigos... y sus caras también."
 USA_idea_brothers_in_arms: "Hermanos de Armas"
 USA_idea_brothers_in_arms_desc: "Marines o Ejército, todos siguen siendo soldados del Tío Sam. Sin embargo, el Cuerpo de Marines podría ayudar a entrenar y mejorar el ejército, creando así una fuerza unificada y combinada para sacudir cualquier campo de batalla al que se presenten."
 USA_idea_project_modular: "Proyecto Modular"
 USA_idea_project_modular_desc: "Welcome to Build A Craft, where you can custom design your aircraft to your hearts content."
 USA_idea_aia_phase_one: "Fase Uno de la AIA"
 USA_idea_aia_phase_one_desc: "Los avances del Instituto Americano de Aviónica han comenzado a dar resultados, y aunque este tipo de I+D es costoso, sin duda ha demostrado dar resultados."
 USA_idea_aia_phase_two: "Fase Dos de la AIA"
 USA_idea_aia_phase_two_desc: "Los esfuerzos aumentan a medida que los nuevos avances del Instituto Americano de Aviónica se han expandido a esfuerzos de apoyo terrestre."
 USA_idea_aia_phase_three: "Fase Tres de la AIA \"Albatros\""
 USA_idea_aia_phase_three_desc: "Investigaciones y estudios exhaustivos sobre las tolerancias de las tripulaciones y los equipos, así como la mejora de las aeronaves de gran tamaño, nos han proporcionado resultados inimaginables. Ahora nuestra fuerza aérea vuela como ninguna otra."
 USA_idea_paratrooper_corps: "Cuerpo de Paracaidistas"
 USA_idea_paratrooper_corps_desc: "Las mejoras en el entrenamiento y una mayor especialización en el ejército refinarán, definirán y aumentarán las capacidades de nuestros paracaidistas."
 USA_idea_army_air_enhancements: "Mejoras para el Ejército y la Fuerza Aérea"
 USA_idea_army_air_enhancements_desc: "Utilizando equipos e integraciones de entrenamiento, podemos mejorar las capacidades de nuestro ejército y tener una mejora general para mantener a nuestros soldados inigualables."
 USA_idea_army_centric_officer_corps_training: "Entrenamiento del Cuerpo de Oficiales con Enfoque en el Ejército"
 USA_idea_army_centric_officer_corps_training_desc: "Dedicar programas de entrenamiento y requisitos de avance para estar en sintonía con las necesidades y el conocimiento del ejército significa que nuestras habilidades de C&C influirán en gran medida en las habilidades de nuestras fuerzas terrestres en el futuro."
 USA_idea_navy_centric_officer_corps_training: "Cuerpo de Oficiales con Enfoque en la Armada"
 USA_idea_navy_centric_officer_corps_training_desc: "Dedicar programas de entrenamiento y requisitos de ascenso a las necesidades y conocimientos de la Armada. Esto significa que nuestras habilidades de C&C influirán significativamente en las capacidades de nuestras fuerzas navales en el futuro."
 USA_idea_air_centric_officer_corps_training: "Entrenamiento del Cuerpo de Oficiales con Enfoque en la Fuerza Aérea"
 USA_idea_air_centric_officer_corps_training_desc: "Dedicar programas de entrenamiento y requisitos de ascenso a las necesidades y conocimientos de la Fuerza Aérea. Esto significa que nuestras habilidades de C&C influirán significativamente en las capacidades de nuestra Fuerza Aérea en el futuro."
 american_militarism_reformed: "Militarismo Estadounidense Reformado"
 american_militarism_reformed_desc: "Gracias a nuestros incansables esfuerzos, hemos reformado, mejorado y atendido las necesidades de todas nuestras fuerzas armadas. Preparando el escenario para el nuevo milenio, ahora podemos contemplar los mares azules y brillantes y los cielos soleados y decir sin lugar a dudas: Haec pax Americana"
 USA_idea_military_junta_cultural_programs: "Programas Culturales"
 USA_idea_military_junta_cultural_programs_desc: "Al promover la unidad y la uniformidad en torno a las especies, establecemos un nuevo precedente de lo que significa estar unido."
 USA_idea_fascist_extra_territorial_corps: "Cuerpo Extraterritorial"
 USA_idea_fascist_extra_territorial_corps_desc: "Las fuerzas de reserva del Estado americano que nos permiten atender minuciosamente nuestros nuevos territorios en busca de actores antiestatales y otros disidentes."
 USA_idea_fascist_hemispheric_garrison_command: "Mando de Guarnición Hemisférica"
 USA_idea_fascist_hemispheric_garrison_command_desc: "El HGC es la rama de reserva de mando y control de la guarnición, así como las funciones de orden público en el hemisferio occidental. Se considera una subdivisión del ejército; sin embargo, debido a su escala, se reconoce oficialmente como una rama independiente de las fuerzas armadas."
 USA_idea_hemispheric_economic_program: "Programa Económico Hemisférico"
 USA_idea_hemispheric_economic_program_desc: "El HEP es un programa de ayuda mutua económica de alcance hemisférico diseñado para ayudar a desarrollar la infraestructura y la conectividad con las nuevas naciones del hemisferio occidental."
 USA_idea_public_unity_programs: "Programas de Unidad Pública"
 USA_idea_public_unity_programs_desc: "Los programas de asistencia mutua y unidad diseñados para forjar la cooperación pública, así como para abrir el camino hacia una nueva Identidad Mundial."
 USA_idea_the_new_world_economic_exchange: "Intercambio Económico del Nuevo Mundo"
 USA_idea_the_new_world_economic_exchange_desc: "El NWEE es un programa de cooperación continuo y mejorado, diseñado para ayudar a los esfuerzos de desarrollo y solidificar las bases para la Identidad del Nuevo Mundo."
 USA_idea_monarchist_puppet_partner: "Socio Títere"
 USA_idea_monarchist_puppet_partner_desc: "Hemos aceptado los términos estadounidenses, por lo que se nos conceden algunas libertades."
 USA_idea_red_junta_global_commissariat_corps: "Cuerpo del Comisariado Global"
 USA_idea_red_junta_global_commissariat_corps_desc: "La estabilidad y la paz futuras están en sus manos, camaradas. Deben defender y preservar la vida pacífica y amable que antaño vivieron estos pueblos. Muéstrenles que el futuro es brillante y ayuden a restablecer la ley y el orden en estas tierras."
 USA_idea_trotskyist_permanent_revolution: "Revolución Permanente"
 USA_idea_trotskyist_permanent_revolution_desc: "Los enemigos de nuestra sociedad, de nuestro estilo de vida, de nuestra propia alma, nos rodean. Camaradas, debemos unirnos y defender lo que apreciamos: la familia, la patria, el hogar. ¡¡¡Por la Revolución!!!"
 USA_crisis_event.8.t: "¿Quieren Implosionar?"
 USA_crisis_event.8.d: "La opción de colapso \"forzado\" de 2067 fue una predicción semiseria que hice con un grupo de amigos en diciembre de 2017, en el punto álgido de la época en que todos los que hablaban a gritos sembraban el miedo sobre una \"Segunda Guerra Civil Estadounidense\". Por ello, hice una predicción semiseria con esta cita: \"Si continuamos con la tendencia autodestructiva de pelearnos por todo aquello por lo que creemos que deberíamos pelearnos, en lugar de por aquello de lo que realmente deberíamos hablar, entonces me temo sinceramente que en los próximos 50 años no veremos unos Estados Unidos\". Dado que casi nadie había jugado hasta entonces, la opción de 2067 se añadió originalmente como un adelanto de huevo de Pascua, pero ahora que el público general se acerca al año del juego, debe ser una opción. Así que elige tu destino."
 USA_crisis_event.8.o1: "No Es Nuestro Momento"
 USA_crisis_event.8.o2: "Quememos Esto y Empecemos de Cero"
 USA_collapse_event.3000.t: "¿Estados Unidos No Tan Unidos?"
 USA_collapse_event.3000.d: "Con la primera huelga nacional ferroviaria de la era moderna, que el gobierno federal no pudo controlar, las autoridades estadounidenses se esfuerzan por alcanzar un acuerdo pacífico entre las seis principales empresas ferroviarias y los principales sindicatos. Muchos en Estados Unidos esperan que la situación vuelva a la normalidad, ya que la escasez de suministro y el aumento de precios ya han comenzado a afectar a casi todos los aspectos de la economía estadounidense."
 USA_collapse_event.3000.o1: "Calmémonos Todos, ¿Vale? Por Favor"
 USA_collapse_event.3000.o2: "Dios mío, ¿Qué Está Pasando?"
 USA_collapse_event.3001.t: "El Águila Cae"
 USA_collapse_event.3001.d: "En un impactante giro de los acontecimientos, las fuentes son escasas, pero parece que el orden público se ha roto en Estados Unidos. La prolongada huelga nacional de ferrocarriles provocó aumentos masivos de precios y escasez de suministros, lo que provocó disturbios en todo el país. Los funcionarios del gobierno local hicieron todo lo posible para coordinar a la policía y la guardia nacional para garantizar el orden público. Sin embargo, a medida que los estados más poblados comenzaron a requerir más recursos para gestionar la situación, cada vez más personal de emergencia se vio desbordado por el creciente caos. Es un día sombrío, ya que el Águila cae desde el punto más alto que casi cualquier nación haya visto. El equilibrio de poder en el mundo cambiará para siempre a medida que se crea un inmenso vacío de poder como consecuencia de lo sucedido."
 USA_collapse_event.3001.o1: "¡Dios Mío!, ¿En Qué Nos Equivocamos?"
 USA_collapse_event.3001.o2: "¡Santa mierda...! ¿Qué hacemos ahora?"
 USA_collapse_event.3001.o3: "Maldita Sea, ¿y Ahora Qué?"
 USA_foreign_event.13.o2: "Ahora No"
 USA_monarchist_event.1.t: "La Unión del Norte"
 USA_monarchist_event.1.d: "Ofreceremos a Canadá nuestra protección directa y nuestra independencia continua en términos económicos y de asuntos internos. Sin embargo, la condición es que se conviertan en un dominio nuestro y pidan renunciar a la autoridad inglesa por una combinación de autoridad estadounidense y canadiense. Canadá se convertirá en el Reino de Canadá."
 USA_monarchist_event.1.o1: "Tienen Que Aceptar"
 USA_monarchist_event.2.t: "La \"Exigencia\" Estadounidense"
 USA_monarchist_event.2.d: "Los estadounidenses nos han presentado una oferta interesante. Podemos unirnos a ellos como súbditos y convertirnos en nuestro propio reino, en una situación similar a la que tuvimos como dominio británico. Sin embargo, parece que el argumento principal es que seremos un estado prácticamente independiente, aunque estaremos más alineados con los intereses del hemisferio occidental que con los intereses puramente canadienses."
 USA_monarchist_event.2.o1: "Prácticamente Ya Lo Hacemos Hasta Cierto Punto"
 USA_monarchist_event.2.o2: "Lo Hicimos Una Vez, Nunca Más"
 USA_monarchist_event.2000.t: "Canadá Acepta"
 USA_monarchist_event.2000.d: "Hemos hecho un buen trabajo y por eso los Canadienses han decidido unirse a nosotros en nuestro camino hacia la unidad hemisférica."
 USA_monarchist_event.2000.o1: "¡Dios Salve al Nuevo Mundo!"
 USA_monarchist_event.20000.t: "El Reino"
 USA_monarchist_event.20000.d: "Nos han dado luz verde para el cambio de nombre nacional."
 USA_monarchist_event.20000.o1: "Dios Bendiga a Canadá"
 USA_monarchist_event.2001.t: "Canadá Rechaza"
 USA_monarchist_event.2001.d: "Lamentablemente, no fuimos lo suficientemente rápidos para convencerlos de nuestras verdaderas intenciones. Considerando nuestros principios, no podemos imponernos en este caso. Tendremos que intentar algo diferente."
 USA_monarchist_event.2001.o1: "Pero Pensaba Que Éramos Hermanos..."
 USA_monarchist_event.3.t: "La Unión del Sur"
 USA_monarchist_event.3.d: "Ofreceremos a México nuestra protección directa y la continuidad de nuestra independencia económica y política. Sin embargo, la condición es que se conviertan en un dominio nuestro y se les permita cambiar el nombre de su nación a Reino de México."
 USA_monarchist_event.3.o1: "Esperemos Que Entren en Razón"
 USA_monarchist_event.4.t: "La Oferta Estadounidense"
 USA_monarchist_event.4.d: "Los estadounidenses nos han enviado una oferta. Al convertirnos en un súbdito prácticamente independiente, buscarán ayudar y estabilizar el campo y colaborar con las fuerzas locales. En consecuencia, se nos dará luz verde para llamarnos el Reino de México, y podremos centrarnos más en nuestro país y en el hemisferio occidental que en los mercados globales. Podría ser beneficioso, pero ¿es esto realmente lo que queremos?"
 USA_monarchist_event.4.o1: "Bueno, Ya No Tenemos Que Preocuparnos Por la Frontera"
 USA_monarchist_event.4.o2: "Nos Han Dado Suficientes Problemas. ¡De Ninguna Manera!"
 USA_monarchist_event.4000.t: "México Acepta"
 USA_monarchist_event.4000.d: "Se ha concluido otra negociación exitosa y ahora iniciaremos la logística para iniciar esta gran unión de los pueblos."
 USA_monarchist_event.4000.o1: "Unidos Permanecemos"
 USA_monarchist_event.40000.t: "El Reino"
 USA_monarchist_event.40000.d: "Se nos ha dado el visto bueno, ahora volvemos a las viejas glorias y establecemos un nuevo rumbo uniendo el hemisferio."
 USA_monarchist_event.40000.o1: "¡Dios Bendiga al Nuevo Mundo!"
 USA_monarchist_event.4001.t: "México Rechaza"
 USA_monarchist_event.4001.d: "Las negociaciones se estancaron y fracasaron; tendremos que volver a abordar la situación si queremos hacer algo significativo en el futuro cercano."
 USA_monarchist_event.4001.o1: "¿En Qué Nos Equivocamos?"
 USA_monarchist_event.5.t: "El Acuerdo de la Federación"
 USA_monarchist_event.5.d: "Esperamos cambiar el destino de la nación insular de Cuba. Podemos ofrecerles protección y, además, darles luz verde para la consolidación de la región caribeña en lo que se llamará los \"Ducados Federados de las Indias Occidentales\". O simplemente el Ducado de las Indias Occidentales. Nuestra historia es larga e interesante, como mínimo, pero creo que podemos hacer algo para ayudarlos."
 USA_monarchist_event.5.o1: "El Pasado Quedó Atrás, Ahora Construyamos El Futuro"
 USA_monarchist_event.6.t: "El Acuerdo Estadounidense"
 USA_monarchist_event.6.d: "Los estadounidenses nos han ofrecido un trato. A cambio de ser sus súbditos, tendremos un estatus de autonomía prácticamente similar, pero el comercio se centrará en beneficiar a las naciones del hemisferio occidental por encima de las del mundo, por así decirlo. Como ventaja adicional, nos darán luz verde para consolidar el Caribe."
 USA_monarchist_event.6.o1: "No Podemos Conseguir Algo Mejor Por Nuestra Cuenta"
 USA_monarchist_event.6.o2: "Nos Han Traicionado Antes, ¡Ni Hablar!"
 USA_monarchist_event.6000.t: "Cuba Acepta"
 USA_monarchist_event.6000.d: "Otro paso hacia la unidad hemisférica."
 USA_monarchist_event.6000.o1: "¡Dios Bendiga al Nuevo Mundo!"
 USA_monarchist_event.60000.t: "La Federación"
 USA_monarchist_event.60000.d: "Se nos ha dado el visto bueno para el nombre nacional, pronto nuestro nombre será conocido a medida que creamos nuestro nuevo futuro unido con nuestros hermanos y hermanas del hemisferio occidental."
 USA_monarchist_event.60000.o1: "¡Dios Bendiga a la Federación Ducal Independiente!"
 USA_monarchist_event.6001.t: "Cuba Rechaza"
 USA_monarchist_event.6001.d: "Realmente necesitamos averiguar qué salió mal... aunque la animosidad histórica ha causado que sucedieran cosas peores, así que deberíamos comenzar con eso."
 USA_monarchist_event.6001.o1: "Volvamos A La Mesa de Dibujo"
 USA_monarchist_event.7.t: "La Oferta Centroamericana"
 USA_monarchist_event.7.d: "Al liderar con Panamá, esperamos crear una nueva unión de naciones y revitalizar la antigua entidad política centroamericana. Será difícil, pero si lideramos con Panamá y simplemente los apoyamos en proyectos de infraestructura y desarrollo sostenible, podríamos consolidar otra pieza de nuestra unidad hemisférica."
 USA_monarchist_event.7.o1: "Brindemos Por Un Mañana Esperanzador"
 USA_monarchist_event.8.t: "La Propuesta Estadounidense"
 USA_monarchist_event.8.d: "A cambio de convertirnos en sus súbditos, nos aseguramos la consolidación de los estados centroamericanos en un futuro próximo. Como beneficio adicional, Estados Unidos está dispuesto a ayudar con el desarrollo y a preservar la nueva unión, siempre y cuando nos centremos más en ayudar al hemisferio occidental que en otras opciones."
 USA_monarchist_event.8.o1: "No Está Mal, Estoy dentro"
 USA_monarchist_event.8.o2: "Disfrutamos de Nuestro Canal Sin Molestias, Gracias, Pero No"
 USA_monarchist_event.8000.t: "Panamá Acepta"
 USA_monarchist_event.8000.d: "Otro paso en la dirección unida, ahora podemos iniciar los preparativos para permitir que Panamá una la región centroamericana."
 USA_monarchist_event.8000.o1: "¡Dios Bendiga al Nuevo Mundo!"
 USA_monarchist_event.80000.t: "Principados Unidos"
 USA_monarchist_event.80000.d: "Nos dieron luz verde y formalizamos los antecedentes necesarios. Ahora podemos cambiar el nombre de la nación y comenzar el verdadero trabajo."
 USA_monarchist_event.80000.o1: "¡Por una Centroamérica Unida!"
 USA_monarchist_event.8001.t: "Panamá Rechaza"
 USA_monarchist_event.8001.d: "Bueno, eso dolió un poco, pero no hay nada que podamos hacer ahora. Tendremos que volver a intentarlo con otra cosa."
 USA_monarchist_event.8001.o1: "Algún Día los Convenceremos."
 USA_monarchist_event.9.t: "El Continente del Sur Unido"
 USA_monarchist_event.9.d: "Iniciaremos negociaciones con Colombia y revitalizaremos el antiguo Reino Grancolombiano. Este resurgimiento de una antigua entidad política abarcará aproximadamente la mitad superior del continente sudamericano y, con suerte, será un acuerdo lo suficientemente favorable como para comenzar a trabajar con nosotros."
 USA_monarchist_event.9.o1: "Aquí Va Nada"
 USA_monarchist_event.10.t: "La Propuesta Estadounidense"
 USA_monarchist_event.10.d: "Al convertirnos en súbditos estadounidenses, tendremos luz verde para consolidar la parte norte del continente. También nos han dicho que ayudarán a consolidar el Reino Grancolombiano, lo cual también representa un buen impulso. La pregunta es: ¿realmente confiamos en los estadounidenses?"
 USA_monarchist_event.10.o1: "Hacia Antiguas Glorias"
 USA_monarchist_event.10.o2: "No Lo Creo"
 USA_monarchist_event.10000.t: "Colombia Acepta"
 USA_monarchist_event.10000.d: "Las negociaciones fueron un éxito y ahora comenzamos a avanzar con otro paso más hacia la unidad hemisférica."
 USA_monarchist_event.10000.o1: "Dios Bendiga al Nuevo Mundo"
 USA_monarchist_event.100000.t: "El Reino"
 USA_monarchist_event.100000.d: "Se nos ha dado el visto bueno para cambiar nuestro nombre y ahora comenzaremos a tomar medidas y a prepararnos para nuestro futuro, un futuro que pronto será unido para el hemisferio occidental."
 USA_monarchist_event.100000.o1: "Adelante Hacia la Victoria"
 USA_monarchist_event.10001.t: "Colombia Rechaza"
 USA_monarchist_event.10001.d: "Este es otro obstáculo para un futuro verdadero y mejor. Tendremos que resolverlo y probar algo diferente en el futuro."
 USA_monarchist_event.10001.o1: "¿Por qué No Pueden Entender?"
 USA_monarchist_event.11.t: "El Acuerdo Amazónico"
 USA_monarchist_event.11.d: "Para ayudar a promover y finalizar nuestra iniciativa de unidad hemisférica, invitaremos a Brasil a unirse a nosotros y a cambio podrán consolidar su posición en la mitad sur del continente."
 USA_monarchist_event.11.o1: "Serán Grandes, Pero Al Menos No Hay Nada Allí"
 USA_monarchist_event.12.t: "El Acuerdo Estadounidense"
 USA_monarchist_event.12.d: "A cambio de ser sus súbditos y alinear las políticas comerciales para que sean mutuamente beneficiosas para la nación del hemisferio occidental, podemos consolidar y expandir nuestra nación adquiriendo la mitad sur del continente. No es un mal negocio, pero nos pone bajo el yugo estadounidense."
 USA_monarchist_event.12.o1: "Que Ganemos Ahora Nos Ayudará Después"
 USA_monarchist_event.12.o2: "No Vale el Riesgo"
 USA_monarchist_event.12000.t: "Brasil Acepta"
 USA_monarchist_event.12000.d: "El Gran Reino del Sur ha aceptado y, como tal, se ha completado uno de los pasos más importantes hacia nuestro futuro común. Avancémonos y construyamos un nuevo futuro, un futuro mejor. Un futuro unido."
 USA_monarchist_event.12000.o1: "¡Gloria al Nuevo Mundo!"
 USA_monarchist_event.120000.t: "El Nuevo Reino"
 USA_monarchist_event.120000.d: "Hemos despejado todos los mecanismos de fondo y ahora somos un gran reino una vez más. Trabajemos con nuestros nuevos aliados para consolidar y crear un hemisferio nuevo y unido. Comienza la era de la unidad."
 USA_monarchist_event.120000.o1: "¡Juntos por la Victoria, ¡Avanzamos!"
 USA_monarchist_event.12001.t: "Brasil Rechaza"
 USA_monarchist_event.12001.d: "Este ha sido un revés importante; tomará mucho tiempo si queremos intentar acercarnos a Brasil y lograr su inclusión."
 USA_monarchist_event.12001.o1: "Juro que Nadie Escucha"
 USA_monarchist_event.13.t: "Operación Ganancias Iniciales"
 USA_monarchist_event.13.d: "El futuro es ahora y hemos recibido luz verde para iniciar nuestros esfuerzos de consolidación. Los avances iniciales se centrarán en las islas vecinas de Bahamas y Jamaica."
 USA_monarchist_event.13.o1: "¡Avanzamos!"
 USA_monarchist_event.14.t: "Operación Ganancias Iniciales"
 USA_monarchist_event.14.d: "El futuro es ahora y hemos recibido luz verde para iniciar nuestros esfuerzos de consolidación. Los logros iniciales se centrarán en las naciones vecinas de Costa Rica y Nicaragua."
 USA_monarchist_event.14.o1: "¡Avanzamos!"
 USA_monarchist_event.15.t: "Operación Ganancias Iniciales"
 USA_monarchist_event.15.d: "El futuro es ahora y hemos recibido luz verde para iniciar nuestros esfuerzos de consolidación. Los avances iniciales se centrarán en las naciones orientales de Venezuela, Guyana y Surinam."
 USA_monarchist_event.15.o1: "¡Avanzamos!"
 USA_monarchist_event.16.t: "Operación Ganancias Iniciales"
 USA_monarchist_event.16.d: "El futuro es ahora y hemos recibido luz verde para iniciar nuestros esfuerzos de consolidación. Los logros iniciales se centrarán en las naciones del sur: Uruguay, Paraguay y Bolivia."
 USA_monarchist_event.16.o1: "¡Avanzamos!"
 USA_monarchist_event.17.t: "Programa de Economía Mutua"
 USA_monarchist_event.17.d: "Hoy comienza un nuevo camino a seguir, a medida que comenzamos a desarrollarnos nosotros mismos y unos a otros, construiremos juntos un futuro más brillante y mejor."
 USA_monarchist_event.17.o1: "¡A Progresar!"
 USA_monarchist_event.18.t: "Programa de Economía Mutua"
 USA_monarchist_event.18.d: "Hoy comienza un nuevo camino a seguir, a medida que comenzamos a desarrollarnos nosotros mismos y unos a otros, construiremos juntos un futuro más brillante y mejor."
 USA_monarchist_event.18.o1: "¡A Progresar!"
 USA_monarchist_event.19.t: "Programa de Economía Mutua"
 USA_monarchist_event.19.d: "Hoy comienza un nuevo camino a seguir, a medida que comenzamos a desarrollarnos nosotros mismos y unos a otros, construiremos juntos un futuro más brillante y mejor."
 USA_monarchist_event.19.o1: "¡A Progresar!"
 USA_monarchist_event.20.t: "Programa de Economía Mutua"
 USA_monarchist_event.20.d: "Hoy comienza un nuevo camino a seguir, a medida que comenzamos a desarrollarnos nosotros mismos y unos a otros, construiremos juntos un futuro más brillante y mejor."
 USA_monarchist_event.20.o1: "¡A Progresar!"
 USA_monarchist_event.21.t: "Programas de Unidad Pública"
 USA_monarchist_event.21.d: "Hoy comenzamos a implementar nuevos programas de unidad pública, diseñados para fomentar una nueva identidad mundial. Desde allí, nos lanzaremos hacia las estrellas con nuestros esfuerzos unidos. Unidos nos mantendremos, divididos habríamos caído."
 USA_monarchist_event.21.o1: "¡Somos los Nuevomundistas!"
 USA_monarchist_event.22.t: "Programas de Unidad Pública"
 USA_monarchist_event.22.d: "Hoy comenzamos a implementar nuevos programas de unidad pública, diseñados para fomentar una nueva identidad mundial. Desde allí, nos lanzaremos hacia las estrellas con nuestros esfuerzos unidos. Unidos nos mantendremos, divididos habríamos caído."
 USA_monarchist_event.22.o1: "¡Somos los Nuevomundistas!"
 USA_monarchist_event.23.t: "Programas de Unidad Pública"
 USA_monarchist_event.23.d: "Hoy comenzamos a implementar nuevos programas de unidad pública, diseñados para fomentar una nueva identidad mundial. Desde allí, nos lanzaremos hacia las estrellas con nuestros esfuerzos unidos. Unidos nos mantendremos, divididos habríamos caído."
 USA_monarchist_event.23.o1: "¡Somos los Nuevomundistas!"
 USA_monarchist_event.24.t: "Programas de Unidad Pública"
 USA_monarchist_event.24.d: "Hoy comenzamos a implementar nuevos programas de unidad pública, diseñados para fomentar una nueva identidad mundial. Desde allí, nos lanzaremos hacia las estrellas con nuestros esfuerzos unidos. Unidos nos mantendremos, divididos habríamos caído."
 USA_monarchist_event.24.o1: "¡Somos los Nuevomundistas!"
 USA_monarchist_event.25.t: "Operación Locura en el Centro"
 USA_monarchist_event.25.d: "Ahora que hemos reorganizado nuestras ganancias iniciales, se nos ha dado el visto bueno para invadir la isla de La Española y flanquear a las pequeñas naciones de la cadena de islas invadiendo Trinidad y Tobago."
 USA_monarchist_event.25.o1: "Avanzamos Hacia Adelante"
 USA_monarchist_event.26.t: "Operación Locura en el Centro"
 USA_monarchist_event.26.d: "Ahora que hemos reorganizado nuestras ganancias iniciales, se nos ha dado el visto bueno para invadir las próximas naciones limítrofes de Honduras y El Salvador."
 USA_monarchist_event.26.o1: "Avanzamos Hacia Adelante"
 USA_monarchist_event.27.t: "Operación Locura en el Centro"
 USA_monarchist_event.27.d: "Ahora que hemos reorganizado nuestras ganancias iniciales, hemos recibido luz verde para invadir la siguiente nación fronteriza con Ecuador. Si bien solo nos enfrentamos a una nación, el terreno está empeorando, por lo que nuestro plan de invasión también coincide con el de Brasil."
 USA_monarchist_event.27.o1: "Avanzamos Hacia Adelante"
 USA_monarchist_event.28.t: "Operación Locura en el Centro"
 USA_monarchist_event.28.d: "Ahora que hemos reorganizado nuestras ganancias iniciales, hemos recibido luz verde para invadir la siguiente nación fronteriza con Argentina. Si bien solo nos enfrentamos a una nación, el terreno está empeorando, por lo que nuestro plan de invasión también coincide con el de Colombia."
 USA_monarchist_event.28.o1: "Avanzamos Hacia Adelante"
 USA_monarchist_event.29.t: "Operación Nuevo Mundo"
 USA_monarchist_event.29.d: "Las últimas piezas del rompecabezas empezarán a encajar a medida que nos disponemos a crear un nuevo futuro unido. Las naciones de la cadena insular son los únicos obstáculos que quedan."
 USA_monarchist_event.29.o1: "¡Hacia la Victoria!"
 USA_monarchist_event.30.t: "Operación Nuevo Mundo"
 USA_monarchist_event.30.d: "Las últimas piezas del rompecabezas comenzarán a encajar a medida que nos disponemos a crear un nuevo futuro unido. Las naciones de Belice y Guatemala son los únicos obstáculos que se interponen en el camino."
 USA_monarchist_event.30.o1: "¡Hacia la Victoria!"
 USA_monarchist_event.31.t: "Operación Nuevo Mundo"
 USA_monarchist_event.31.d: "Las últimas piezas del rompecabezas empezarán a encajar mientras nos disponemos a crear un nuevo futuro unido. La nación peruana es el último bastión contra nosotros y nuestros aliados."
 USA_monarchist_event.31.o1: "¡Hacia la Victoria!"
 USA_monarchist_event.32.t: "Operación Nuevo Mundo"
 USA_monarchist_event.32.d: "Las últimas piezas del rompecabezas empezarán a encajar mientras nos disponemos a crear un nuevo futuro unido. La nación de Chile es el último bastión contra nosotros y nuestros aliados."
 USA_monarchist_event.32.o1: "¡Hacia la Victoria!"
 USA_monarchist_event.33.t: "Intercambio Económico del Nuevo Mundo"
 USA_monarchist_event.33.d: "La creación de la NWEE consolidará nuestra prosperidad económica y unidad mutua para luchar por un futuro mejor. Avancemos juntos como un solo pueblo."
