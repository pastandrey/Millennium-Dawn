 USA_foreign_event.13.t: "Primacía Del Ejército Sirio Libre"
 USA_foreign_event.13.d: "Oriente Medio no es una gran preocupación ya que nuestro suministro nacional e inversión en otras áreas nos complementa, sin embargo, eso no significa que debamos quedarnos de brazos cruzados. Demos a nuestros contratistas de defensa algo que hacer, ¿de acuerdo?"
 USA_foreign_event.13.o1: "Sí"
 USA_foreign_event.14.t: "Vendiendo Armas A Los Sirios"
 USA_foreign_event.14.d: "La guerra civil siria significa mucho para los creyentes anti-terror y nuestros intereses estratégicos. Sin embargo, como no hay un ganador claro, podemos optar por vender armas a una nación específica o a todas las naciones."
 USA_foreign_event.14.o1: "Dejemos Fluir El Dinero"
 USA_foreign_event.14.o2: "El FSA Es El Camino"
 USA_foreign_event.14.o3: "Rojava El Dinero"
 USA_foreign_event.14.o4: "ISIS Congelará A Todos"
 USA_foreign_event.14.o5: "Al-Nusra, Más Bien Te Pagaré"
 USA_foreign_event.14.o6: "Me Quedé Sin Chistes Además Todos Están Peleando Contigo, Solo Compra"
 USA_foreign_event.15.t: "Apoyando A Los Combatientes De Siria"
 USA_foreign_event.15.d: "La comunidad internacional está cansada de nuestro silencio más o menos franco hacia la crisis de Oriente Medio. Intentemos calmar esta visión dando algo de \"ayuda exterior\" a aquellos que luchan por la \"causa correcta\"."
 USA_foreign_event.15.o1: "Nada Como Un Truco De RP"
 USA_foreign_event.16.t: "Asesores Militares Para El Ejército Sirio Libre"
 USA_foreign_event.16.d: "La comunidad internacional no sabrá nada si enviamos asesores, pero estos asesores necesitan equipo para entrenar, así que démosles algo."
 USA_foreign_event.16.o1: "Sí"
 USA_foreign_event.17.t: "Apoyo De Canales De Retroalimentación"
 USA_foreign_event.17.d: "El entrenamiento es lento y las pérdidas de equipos están aumentando, organicemos un trato fuera del ojo público para asegurar la idea de preservación de equipos en las fuerzas sirias."
 USA_foreign_event.17.o1: "Necesitamos Esto"
 USA_foreign_event.17.o2: "Podemos Hacer Frente A Los Nuestros"
 USA_foreign_event.18.t: "América Hace Un Gesto Fuerte"
 USA_foreign_event.18.d: "La guerra continúa, parece que hay poco progreso en términos de una victoria. Estados Unidos ha venido a nosotros con una oferta fuerte, esto es esencialmente una brigada. El problema es que quieren una gran cantidad de dinero por ello. Si no estamos en una buena posición fiscal, entonces este trato podría romper nuestras posibilidades de una victoria... Pero si podemos lograrlo, entonces esto aumenta nuestras posibilidades de asegurar la nación para nuestra causa con lo que se conocería como la Brigada Bomba."
 USA_foreign_event.18.o1: "Adelante Hacia La Victoria!!!"
 USA_foreign_event.18.o2: "Ojalá Pudiéramos"
 USA_foreign_event.19.t: "Formación De La Legión De Damasco"
 USA_foreign_event.19.d: "Los voluntarios han acudido a nuestro Ejército Libre como una forma de prometer sus servicios para ayudar a convertir a Siria en una nación libre, mientras que algunos son escépticos, otros creen que este es el impulso que necesitamos para ganar la guerra."
 USA_foreign_event.19.o1: "Hacer Siria Libre"
