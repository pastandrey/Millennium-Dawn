 militarism_grows_flag: "Reclamaremos §YNuestro Lugar§! En Esta Tierra"
 Oligarchs_prevail: "La Asociación Empresarial Gana La Lucha Por El Poder"
 Technocracy_victory: "El Comité STEM Gana La Lucha Por El Poder"
 Keystone_Pipeline_Finished: "Ha Terminado Los Oleoductos Keystone"
 afep: "Ha Hecho La Política Energética De Estados Unidos Primero"
 USA_collapse_description: "Todas Las Tierras No Estadounidenses Se Liberan"
 USA_militarist_lead_coalition: "El Pentágono Gana"
 USA_fascist_lead_coalition: "El Naturalista Ganó Las Mentes"
 USA_modern_monarchist_lead_coalition: "El Movimiento Monárquico Moderno Reclama El Liderazgo Carismáticamente"
 USA_red_junta_commissariat_coup: "El Cuerpo De Comisarios Se Apodera Del Control"
 USA_the_socialist_workers_party_seize_power: "El SWP Trotskista Ha Tomado El Poder"
 USA_the_anarchist_society_collectivizes_victory: "¿La Sociedad Anarquista Asegura Una Mayoría???"
 focus_arming_our_horse_tooltip: "Buscaremos negociar y maniobrar a través de conflictos extranjeros, no solo para obtener los mejores resultados para la nación en conflicto, sino también para nosotros a largo plazo. Los derechos sobre recursos, la posible influencia y más esperamos que estén a nuestro alcance si podemos contar una buena historia en la mesa de negociaciones."
 USA_focus_growing_plutocratic_influences: "Influencias Plutocráticas Crecientes"
 USA_focus_growing_plutocratic_influences_desc: "A medida que el tiempo avanza y el liderazgo político, los magnates empresariales y los cabilderos desenfrenados trabajan en coaliciones laxas para beneficiarse unos a otros a expensas de muchos, dichos muchos también se vuelven más radicales y desconfiados. La desconfianza ha llevado a un estado faccional cada vez mayor dentro del supuesto sistema bipartidista, que ha comenzado a llevar a algunos a puntos de vista cada vez más extremos a expensas de la racionalidad y el pragmatismo hacia los problemas reales. Muchos están comenzando a llamar a esto la Segunda Edad Dorada de Estados Unidos."
 wall_street_force_dynamic_modifier: "Fuerzas Económicas De Wall Street"
 us_economic_policies: "Políticas Económicas Estadounidenses"
 us_economic_policies_desc: "Desde el nacimiento de la nación y la creación de sus cuerpos congresuales, siempre ha habido un efecto de las leyes y legislaciones de estas instituciones en la nación en su conjunto. Mientras algunos dicen que sus puntos de vista son correctos y otros argumentan en contra diciendo que no, que son sus puntos de vista los correctos. La realidad es que no hay una respuesta real o sinceramente clara. Las complejidades de una nación tan geográfica y demográficamente diversa siempre crearán desafíos y horizontes para muchos. Lo mejor que se puede esperar es que las \"soluciones\" basadas en un estricto \"a mi manera\" terminen ayudando más de lo que dañan. A pesar del superávit presupuestario de la última administración, muchos aún ven las tasas de gasto crecientes en atención médica, el aumento del gasto en bienestar y más como una preocupación creciente junto con la volatilidad económica que crea incertidumbre en el valor mismo del dólar. Si el Congreso no puede controlar el gasto deficitario, es posible que haya tiempos turbulentos por delante. Ay, solo el tiempo y el Congreso podrán decir eso."
 USA_dynamic_modifier_department_of_the_interior: "Departamento De Interior De EE. UU."
 USA_dynamic_modifier_department_of_the_interior_desc: "El DotI de EE. UU. es responsable de la preservación de tierras y la gestión de recursos, así como de un pequeño grupo de otras cosas. Sin embargo, es el subdepartamento del DotI conocido como el Departamento de Recursos Naturales el que tiende a estar en la lista de mierda de mucha gente, por decir lo menos. Sin embargo, el Departamento del Interior tiene un trabajo que hacer y, en su mayor parte, realmente lo hace, para disgusto de muchos. Ahora que un nuevo milenio está sobre nosotros, el departamento debe encontrar nuevas formas de equilibrar el desarrollo social y la preservación de tierras en este mundo en constante cambio."
 USA_dynamic_modifier_department_of_energy: "Departamento De Energía De EE. UU."
 USA_dynamic_modifier_department_of_energy_desc: "El DoE o Departamento de Energía es un departamento muy complicado. Responsable de mantener y adaptarse a las necesidades energéticas de la nación, el Departamento de Energía sufre mucha burocracia de ida y vuelta mientras los proyectos en los que desea invertir se le dicen que no son útiles para el medio ambiente o necesitan ser cambiados o actualizados. Sin embargo, con la tecnología moderna y una nueva ola verde de capacidades de producción de energía, el departamento puede encontrar una manera de mantener las cosas a flote en el futuro previsible."
 USA_domestic_policies: "Políticas Internas De EE. UU."
 USA_domestic_policies_desc: "Las decisiones tomadas a lo largo de las décadas por el Congreso han moldeado y deformado la cultura y el aparato social de los Estados Unidos. Dependiendo de a quién le preguntes, algunos dicen que vamos hacia atrás, otros hacia adelante y otros hacia ninguna parte. Con esto en mente, el Congreso de hoy tendrá más y más problemas a medida que se desarrollen los eventos y surjan nuevos problemas."
 USA_dynamic_modifier_us_general_staff: "Estado Mayor General De EE. UU."
 USA_dynamic_modifier_us_general_staff_desc: "Desde que terminó la Guerra Fría, el aparato del estado mayor general estadounidense ha tenido que adaptarse a un entorno más orientado a la paz. Como resultado, cada vez más medidas burocráticas y engorrosas han comenzado a apoderarse de aspectos de los sectores de adquisición y R&D. Como resultado y la continua paz, un problema lento pero creciente de reclutamiento y cohesión logística al llevar a cabo algo tan simple como mantener barracones y otras estructuras de vivienda para las tropas ha comenzado a apoderarse. Sin embargo, el estado mayor de EE. UU. es uno de los más competentes en su campo y ese campo es la guerra misma, por lo que, a pesar de sus deficiencias, todavía tiene algo de poder."
 USA_dynamic_modifier_us_army: "Ejército De Los Estados Unidos"
 USA_dynamic_modifier_us_army_desc: "El Ejército de los Estados Unidos es la rama de servicio principal que constituye las fuerzas terrestres generales. Siendo una de las ramas más desarrolladas, el ejército ocupa aproximadamente el tercer lugar en términos de presupuesto, ya que la prioridad se ha desplazado más hacia la armada y la fuerza aérea, respectivamente. Sin embargo, a pesar de esto, el ejército de EE. UU. es una fuerza dura y bien equipada para manejar casi cualquier cosa que pueda enfrentar."
 USA_dynamic_modifier_us_navy: "Armada De Los Estados Unidos"
 USA_dynamic_modifier_us_navy_desc: "La Armada de EE. UU., el niño mimado que compite con la fuerza aérea por la mayor parte del presupuesto de defensa. Si bien la Armada de EE. UU. es la armada más grande del mundo en términos de tonelaje, la armada también es la mayor ventaja que tiene EE. UU. en términos de ejercer su poder blando en todo el mundo. Por lo tanto, mientras la fuerza aérea y el ejército pelean por las cantidades presupuestarias cada período fiscal, muchos no pueden argumentar en contra de la importancia que tiene la Armada de EE. UU. para asegurar la posición actual que tienen los Estados Unidos en el globo."
 USA_dynamic_modifier_us_airforce: "Fuerza Aérea De Los Estados Unidos"
 USA_dynamic_modifier_us_airforce_desc: "La fuerza aérea de EE. UU. es el niño especial de R&D. Siendo tan avanzado en algunos puntos que R&D ahora se ve más como un pasatiempo en algunos momentos en lugar de una verdadera necesidad para la defensa, sin embargo, con la mayor parte del mundo todavía luchando contra aeronaves desarrolladas hace 40, casi 50+ años, no es de extrañar que la fuerza aérea de EE. UU. sea una de las entidades más temidas. No importa amigo o enemigo... te estoy mirando a ti, A-10."
 USA_federal_budgets: "Presupuestos Federales De Los Estados Unidos"
 USA_federal_budgets_desc: "El presupuesto federal y la asignación general del dinero de los contribuyentes es un tema delicado que prácticamente ha moldeado tanto las políticas exteriores como internas de Estados Unidos. Sin embargo, depende de las administraciones demostrar que el gobierno federal no solo está \"desperdiciando tu dinero\", sino que busca reinvertir en la economía y en los ciudadanos de estos Estados Unidos."
 USA_american_tax_code: "Código Tributario Estadounidense"
 USA_american_tax_code_desc: "El código tributario de los Estados Unidos es uno que es odiado y detestado por muchos. Con la misma energía en la misma oración, los políticos han traído y eliminado cambios que han afectado a millones de estadounidenses, así como a unos pocos estadounidenses. El descontento moderno con el Servicio de Impuestos Internos y la composición general del código tributario en sí ha sido un tema muy sensible para el estadounidense promedio. Pero con el nuevo milenio llegan nuevas leyes y nuevas leyes significan nuevos cambios... la única esperanza es que esos cambios sean para mejor, en lugar de para peor."
 USA_f35_supply_chain: "Cadena De Suministro Del F-35"
 USA_f35_supply_chain_desc: "Cuantos más F-35 decidamos vender, más se tensará nuestra cadena de suministro. Tendremos que moderar cuántos de estos aviones vendemos, de lo contrario, nuestro sector industrial militar se ralentizará considerablemente. Sin embargo, a medida que se completen más pedidos, tendremos más capacidad disponible."
 USA_f35_program: "Programa Nacional Del F-35"
 USA_f35_program_desc: "Hemos comenzado a financiar el programa F-35 con el objetivo de convertirlo en nuestro caza polivalente principal en el futuro previsible."
 USA_iraq_war_cost: "La Guerra De Irak"
 USA_iraq_war_cost_desc: "La Guerra de Irak ha sido un fracaso relativo. Nuestros esfuerzos por continuar la guerra ahora nos costarán una considerable cantidad de dinero durante algún tiempo, ya que debemos reunir dinero para el equipo y la mano de obra requeridos."
 petro_dollar: "El Petrodólar"
 petro_dollar_desc: "Un Petrodólar es un dólar estadounidense que se ha utilizado para comprar petróleo crudo. El dólar estadounidense (USD) ha sido el petrodólar del mundo desde mediados de la década de 1970, cuando los precios del petróleo generaron grandes superávits comerciales y de cuenta corriente. La posición ha solidificado el dominio del dólar estadounidense en el escenario mundial y facilita las transacciones."
 USA_the_internet_recession: "La Recesión De 2001"
 USA_the_internet_recession_desc: "Cuando estalló la burbuja puntocom, la economía se desaceleró hasta casi detenerse en algunos aspectos; este desastre económico ha sido llamado la \"Recesión del 01\" debido a su momento."
 USA_idea_a_cold_war_gone_hot: "Una Guerra Fría Que Se Calienta"
 USA_idea_a_cold_war_gone_hot_desc: "Lo mismo de siempre, pero un día diferente, derrotamos a los comunistas de línea dura de la Unión Soviética, pero sabíamos que tarde o temprano esta Guerra Fría prolongada eventualmente se calentaría. Ahora el enemigo finalmente decidió parpadear y ahora tenemos la justificación completa para orientar nuestra economía y nación hacia el esfuerzo bélico."
 USA_anti_big_business_movement: "Movimiento Anti Grandes Empresas"
 USA_anti_big_business_movement_desc: "Con el auge de las grandes empresas que se vuelven más notorias para el público en general, algunos están comenzando a sentirse descontentos y difundir la palabra de \"gran industria\", un juego sobre la creciente monopolización de la economía."
 USA_anti_big_business_movement_two: "La Segunda Ola De Protestas Antimonopolio"
 USA_anti_big_business_movement_two_desc: "Muchos estadounidenses continúan volviéndose más polarizados y hostiles hacia las corporaciones y empresas que, según creen, han monopolizado la riqueza de la nación. Esto probablemente terminará como la primera ola de protestas antibusiness, pero sigue siendo una causa leve de preocupación a medida que nos acercamos a nuevas elecciones."
 USA_the_global_financial_crisis: "La Crisis Financiera Global"
 USA_the_global_financial_crisis_desc: "Los efectos de la burbuja puntocom y la recesión persistente resultaron en una fuerte desaceleración de la economía estadounidense, lo que culminó en lo que se conoce como el \"crack financiero del 08\"."
 USA_subprime_mortgage_crisis: "Crisis De Las Hipotecas Subprime"
 USA_subprime_mortgage_crisis_desc: "Un efecto dominó de la Crisis Financiera Global llevó a una crisis poco conocida y limitada en el sector financiero a través de las hipotecas subprime, lo que provocó una mayor desestabilización de los mercados y la confianza en las instituciones económicas."
 USA_2008_housing_crash: "Crisis Inmobiliaria De 2008"
 USA_2008_housing_crash_desc: "El \"crack financiero o inmobiliario del 08\", como se le ha llegado a conocer, fue una culminación de muchos factores, aunque estos han sido muy disputados hasta el día de hoy, muchos pueden estar de acuerdo en que la mala legislación, las leyes de zonificación y el volteo de casas sin control han sido factores sustanciales para el \"problema\" en general."
 USA_focus_the_long_recession: "La Larga Recesión"
 USA_focus_the_long_recession_desc: "Con el pico de la Gran Recesión ya pasado, los efectos están lejos de desaparecer. La toma de decisiones contradictoria entre los dos partidos ha sofocado y estancado los esfuerzos de recuperación, lo que lleva a lo que algunos llaman \"La Larga Recesión\"."
 USA_focus_growing_politicalization: "Creciente Politización"
 USA_focus_growing_politicalization_desc: "A medida que aumentan el espectáculo político y la influencia de los cabilderos, estas influencias han comenzado a descomponer conversaciones aparentemente normales y/o promedio en nada más que trivialidades y argumentos altamente opinativos. Estas crecientes descomposiciones han causado un aumento en la apatía y polarización política sobre temas que antes estaban unificados."
 USA_focus_growing_political_radicalization: "Creciente Radicalización Política"
 USA_focus_growing_political_radicalization_desc: "A medida que aumenta el espectáculo político y las personas de los Estados Unidos se vuelven más desconfiadas, el aumento de la radicalización de las creencias se vuelve inevitable. ¿El establecimiento se mantendrá o sucumbirá a sus propias creaciones?"
 us_military_advisors_to_sierra_leone: "Asesores Militares De EE. UU."
 us_military_advisors_to_sierra_leone_desc: "Estados Unidos ha enviado algunos asesores para ayudar a entrenar a nuestros soldados en tácticas modernas."
 red_white_blue_helmets: "Cascos Rojos, Blancos Y Azules"
 red_white_blue_helmets_desc: "La legión estadounidense con su sabiduría del orgullo estadounidense ha decidido hacer que sus cascos sean de color codificado pero no, lo que lleva a muchos a llamarlos los Cascos Rojos, Blancos y Azules en lugar de los azules pálidos de la ONU."
 joint_police_action: "Política De Acción Policial Conjunta"
 joint_police_action_desc: "Aprendiendo de lo que fallamos en Vietnam y Corea, podemos aplicar a posibles conflictos futuros para mantenernos mejor."
 muslim_legion: "La Legión Musulmana"
 muslim_legion_desc: "Hermanos musulmanes viajan desde el mundo libre para ayudar a liberar nuestra nación, puede que no sea mucho, pero es mejor que nada."
 passive_aggressive_policy: "Una Política Pasivo-Agresiva"
 passive_aggressive_policy_desc: "Al suministrar nuestro lado y obtener dinero de ello, buscamos disuadir a otros de pensar que estamos completamente comprometidos con un lado específico en un conflicto."
 us_military_advisors_to_afghanistan: "Asesores Militares De EE. UU."
 us_military_advisors_to_afghanistan_desc: "Estados Unidos ha enviado algunos asesores para ayudar a entrenar a nuestros soldados moldeándolos para la guerra irregular."
 USA_idea_aas_food_for_all_policy: "Política De Alimentos Para Todos"
 USA_idea_aas_food_for_all_policy_desc: "Los lujos modernos en términos de avances agrícolas están muy poco utilizados. Convertiremos a nuestra nación en una nación sin hambre. Nos aseguraremos verdaderamente de que haya comida para todos."
 USA_idea_aas_existence_is_pain: "La Existencia Es Dolor"
 USA_idea_aas_existence_is_pain_desc: "Nuestra propia existencia está avivando temores en el supuesto \"Orden Social\" de las sociedades en general. En lugar de vernos como más aislacionistas, nos ven como una amenaza para sus propias normas y estabilidad. Como tal, aunque haremos todo lo posible para evitar cualquier y todos los conflictos, los tambores de guerra están sonando y parece que la supervivencia es verdaderamente el próximo objetivo principal."
 us_mass_media_problems: "Problemas De Los Medios De Comunicación Masivos"
 us_mass_media_problems_desc: "Desde la década de 1970, el canal de noticias estadounidense ha alterado lo que significa ser dicho canal. A medida que crecía el sentimiento antibélico y las revoluciones culturales y sociales de la época se volvían más prominentes, muchos recurrieron a la televisión y, más específicamente, a las noticias para obtener su información. Con esto llegaron dos campos de pensamiento eventuales. El pensamiento tradicionalista donde las noticias se suponía que debían ser estrictamente no orientadas políticamente al abordar los temas del día, y luego estaba el campo activista. El pensamiento moderno donde las noticias a través de piezas de opinión podrían usarse para difundir la palabra sobre temas que importaban, para crear conciencia y así sucesivamente. Si bien el campo activista parece haber ganado a largo plazo, los temores de los tradicionalistas han comenzado a hacerse realidad a medida que comienzan a aparecer signos de entrenchamiento político."
 us_mass_media_problems_two_a: "Problemas De Los Medios De Comunicación Masivos"
 us_mass_media_problems_two_a_desc: "El establecimiento está buscando a los ciudadanos, buscaremos mejorar sus vidas informándoles de nuestra benevolencia."
 us_mass_media_problems_three_a: "Medios De Comunicación Masivos"
 us_mass_media_problems_three_a_desc: "Debemos alentar al público en general a comprender que el verdadero cambio solo puede ocurrir a través de partidos reales."
 us_mass_media_problems_four_a: "Ayudantes De Los Medios"
 us_mass_media_problems_four_a_desc: "Las noticias del pueblo son las únicas noticias para los estadounidenses buenos, honestos y trabajadores."
 us_mass_media_problems_five_a: "Amigos De Los Medios"
 us_mass_media_problems_five_a_desc: "Solo para aquellos en Rojo, Blanco o Azul."
 us_mass_media_problems_two_b: "Confusión De Los Medios"
 us_mass_media_problems_two_b_desc: "La gente necesita entender que el Rojo y el Azul no son los únicos colores de elección en esta nación."
 us_mass_media_problems_three_b: "Colapso De Los Medios"
 us_mass_media_problems_three_b_desc: "Informar noticias reales en lugar de opiniones falsas guiará a los ciudadanos hacia nuevas luces."
 us_mass_media_problems_four_b: "Colocación De La Fundación De Los Medios"
 us_mass_media_problems_four_b_desc: "Ciudadanos de la nación, miren más allá de sus pantallas. Comprendan que debemos construir lo nuevo a partir de las cenizas de lo antiguo."
 us_mass_media_problems_five_b: "Reconstrucción De Los Medios"
 us_mass_media_problems_five_b_desc: "Establecer un verdadero estándar moderno para los comportamientos sociales y políticos que guían nuestra nación."
 us_war_on_drugs: "Cicatrices De La Guerra Contra Las Drogas"
 us_war_on_drugs_desc: "La Guerra contra las Drogas, que ha estado ocurriendo casi desde tiempo inmemorial, se popularizó en la década de 1970 con la administración Nixon. Aunque los esfuerzos murieron, la campaña WoD fue revivida bajo la administración Reagan, que adoptó una postura muy dura contra el crimen. Sin embargo, en años recientes, cada vez más personas han visto que la Guerra finalmente se perdió cuando los cárteles inundan opio y, con eso y la mezcla de dependencia de medicamentos de venta libre, ha causado una crisis de adicción. Ahora, entrando en el siglo XXI, los miembros del Congreso y el presidente deben intentar resolver esta cicatriz en crecimiento que ahora se está extendiendo por Estados Unidos."
 us_war_on_drugs_two: "Cicatrices De La Guerra Contra Las Drogas"
 us_war_on_drugs_three_a: "Cicatrices De La Guerra Contra Las Drogas"
