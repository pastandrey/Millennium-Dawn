 tilfah_TT: "§HRey de Corazones§!\nHani Abd al-Latif Tilfah\nDirector de la Organización de Seguridad Especial"
 salih_TT: "§HRey de Diamantes§!\nAziz Saleh Al-Numan\nPresidente del Comando de la Sección del Partido Baaz"
 IRQ_kill_3_baathists_TT: "Al menos cuatro líderes baazistas fueron capturados y ejecutados"
 raid_type_raid_baath: "Búsqueda de Objetivos Ba'ath"
 USA_foreign_policy: "Departamento de Estado"
 USA_foreign_policy_desc: "El [USA.GetFlag] Departamento de Estado de los Estados Unidos se fundó en 1789 como un brazo administrativo del Poder Ejecutivo. Considerado una de las agencias gubernamentales más importantes, el Departamento de Estado está dirigido por el Secretario de Estado. Reportando directamente al Presidente de los [USA.GetFlag]Estados Unidos, el Departamento de Estado está a cargo de los asuntos exteriores.\n\nCon cada elección, se desbloquearán nuevas decisiones para ese candidato. Las decisiones anteriores desaparecerán con las nuevas elecciones, y ciertos cambios en el mundo podrían provocar la aparición de nuevas decisiones."
 USA_doing_decision: "¿Está tomando otra decisión?"
 USA_KUW_baathists: "Búsqueda de baazistas iraquíes en Kuwait [KUW.GetFlag]"
 department_of_state.94.t: "Los talibanes Renuevan la Ofensiva"
 department_of_state.94.d: "Los talibanes anunciaron hoy que renovarán su ofensiva contra el gobierno [AFG.GetLeader]. Esta decisión no sorprende tras la precipitada retirada estadounidense debido a la creciente presión interna sobre la administración actual. Lo que queda es un Afganistán fracturado, maltrecho y debilitado, solo para defenderse de un enemigo mucho más feroz. Varios estados se han comprometido a ayudar a defender Afganistán una vez más si es necesario, pero su palabra es tan válida como su voluntad de cumplir dicha promesa. Aún está por verse si el Estado afgano podrá contener a los talibanes por sí solo, pero es probable que el ejército no pueda oponer mucha resistencia."
 department_of_state.94.a: "¿Se derrumbará una vez más el Estado afgano?"
 department_of_state.200.t: "Informe de Bajas desde Afganistán"
 department_of_state.200.d: "Hemos perdido hombres y mujeres valientes en los combates en Afganistán, y sus ataúdes están regresando a Estados Unidos para un entierro apropiado."
 department_of_state.200.a: "Semper Fi"
 department_of_state.31.c: "¿Qué sentido tiene hacer algo de todos modos?"
 department_of_state.95.t: "Venta de los Destructores Clase Kidd"
 department_of_state.95.d: "Recientemente, [USA.GetName] nos ha ofrecido vender los destructores clase Kidd, desactivados hace algunos años. Se trata de una serie de potentes destructores de misiles guiados, originalmente encargados por la Armada Imperial Iraní, pero cancelados debido a la Revolución Iraní de 1979. Desde entonces, se han modernizado y reactivado a partir de las reservas desactivadas de la Armada de los Estados Unidos con el fin de venderlos. ¿Compramos los barcos para fortalecer nuestra posición en caso de que China continental invada nuestra nación?"
 department_of_state.95.a: "Firma el Cheque"
 department_of_state.95.b: "Nosotros pasaremos"
 USA_sale_of_the_kidd_destroyer: "[TAI.GetFlag] Venta del Destructor clase Kidd a [TAI.GetName]"
 USA_sale_of_the_kidd_destroyer_desc: "Hemos estado luchando para vender los Destructores clase Kidd, pero [TAI.GetNameWithFlag] ha mostrado interés en comprar las naves para ayudar en sus estrategias defensivas contra [CHI.GetNameWithFlag]."
 department_of_state.96.t: "Operación Resolución Absoluta: Exitosa"
 department_of_state.96.d: "Mientras el presidente observaba desde la sala de crisis, unidades de las fuerzas especiales irrumpieron en el complejo del dictador venezolano, Nicolás Maduro. Tras detenerlo rápidamente mientras intentaba escapar a una habitación segura, tropas estadounidenses lo transportaron a bordo de un avión y lo enviaron a territorio estadounidense. Se espera que sea juzgado en tribunales estadounidenses y condenado por cargos de drogas. Se dice que la redada duró apenas unas horas."
 department_of_state.96.a: "Así es como se hace una operación de 3 horas."
 department_of_state.97.t: "Estados Unidos Lanza una Redada"
 department_of_state.97.d: "Estados Unidos ha cometido un flagrante acto de guerra; ha sometido a nuestra nación a una campaña de bombardeos y ha secuestrado a nuestro presidente. Tal acción no debe quedar impune, y nuestras fuerzas armadas están cada vez más preparadas para resistir cualquier intento de ocupación. Sin embargo, Estados Unidos ha ofrecido no tomar ninguna medida si cooperamos, pero si lo hacemos, significaría permitirles controlar temporalmente la nación."
 department_of_state.97.a: "¡No nos quedaremos de brazos cruzados!"
 department_of_state.97.b: "No tenemos elección, nuestras manos están obligadas."
 department_of_state.98.t: "Estados Unidos Captura al Líder Venezolano"
 department_of_state.98.d: "Estados Unidos llevó a cabo una redada nocturna en Venezuela, un país sudamericano rico en petróleo. Esta medida se produce tras semanas de acusaciones del presidente estadounidense, quien afirma que el líder venezolano ha sido un factor desestabilizador en la región al facilitar la proliferación de narcóticos. La redada, denominada \"Operación Resolución Absoluta\", tuvo éxito y resultó en la captura de Nicolás Maduro, el dictador de larga data de Venezuela. Si bien Estados Unidos no ha explicado cómo planea facilitar la transición de poder, ha dejado muy claro que ahora está al mando y pide a lo que resta del gobierno venezolano que colabore hasta que se encuentre un reemplazo."
 department_of_state.98.a: "Un desarrollo preocupante"
 raid_type_USA_raid_venezuela: "Operación Resolución Absoluta"
 raid_type_USA_raid_venezuela_desc: "El objetivo de esta operación es capturar al líder venezolano y traerlo sano y salvo a Estados Unidos para su juicio. La comunidad de inteligencia ha advertido que, si la situación se complica, podría surgir una insurgencia como resultado de un vacío de poder."
 USA_invasion_in_iraq_mission: "Invasión de Irak"
 USA_invasion_in_iraq_mission_desc: "Cuanto más esperemos, menos justificado estará invadir Irak. Si queremos llevar a cabo la invasión, tendremos que hacerlo dentro del próximo año; de lo contrario, nuestra justificación para la guerra ya no será válida."
 USA_failed_to_invade_iraq: "Fracaso en la Invasión de Irak"
 USA_failed_to_invade_iraq_idea: "La Humillación Nacional"
 USA_failed_to_invade_iraq_idea_desc: "Nuestra incapacidad para lanzar operaciones militares contra Irak, independientemente de las razones subyacentes, deja los ataques terroristas sin respuesta. Esta inacción dañará gravemente nuestra credibilidad y envalentonará a nuestros adversarios durante años."
 USA_early_2000s_energy_crisis: "La Crisis Energética"
 USA_early_2000s_energy_crisis_desc: "Las perturbaciones en el mercado petrolero mundial y la inestabilidad en Oriente Medio han provocado un aumento del consumo, ya que la gente busca el mejor precio posible y el gas, lo que inversamente ha llevado a un aumento del consumo de petróleo y productos derivados del petróleo, causando escasez y problemas adicionales."
 usa_economic_events.36.t: "Las Repercusiones de la Gran Recesión"
 usa_economic_events.36.d: "Los medios de comunicación y la economía estadounidenses reportan cifras cada vez más alarmantes. El colapso continúa sacudiendo los cimientos de la economía mundial, causando un efecto dominó en todas partes, desde Argentina hasta Grecia y Nueva Zelanda. Nadie en el mundo ha escapado a esta Depresión Menor. El tiempo dirá realmente cuánto daño causará..."
 usa_economic_events.36.a: "¡Inyectar liquidez!"
 usa_economic_events.36.b: "El Mercado Libre Siendo Libre..."
 usa_economic_events.37.t: "Crisis de la Industria Automotriz Estadounidense"
 usa_economic_events.37.d: "La industria automotriz, que ya lidia con la caída de las ventas y el aumento de las deudas, se enfrenta ahora a un colapso catastrófico a medida que se agrava la crisis crediticia. Los tres grandes fabricantes de automóviles —General Motors, Ford y Chrysler— están perdiendo miles de millones de dólares y advierten que, sin una intervención gubernamental inmediata, podrían verse obligados a declararse en quiebra en cuestión de meses. Miles de empleos penden de un hilo, no solo en Detroit, sino en toda la cadena de suministro que abarca todo el país. La pregunta ahora es si Washington rescatará a una industria que muchos consideran un símbolo de la destreza manufacturera estadounidense o si dejará que las fuerzas del mercado determinen su destino..."
 usa_economic_events.37.a: "¿Puede esto empeorar?"
 usa_economic_events.38.t: "La Crisis Energética de los 2000"
 usa_economic_events.38.d: "Los precios del petróleo se han disparado a niveles sin precedentes, impulsados ​​por la creciente demanda mundial, la inestabilidad geopolítica en Oriente Medio y la especulación en los mercados de materias primas. Los consumidores estadounidenses están sufriendo las consecuencias en las gasolineras a medida que los precios de la gasolina suben sin parar, poniendo a prueba los presupuestos familiares, ya de por sí afectados por la recesión. La crisis energética repercute en toda la economía: los costes del transporte se disparan, las aerolíneas atraviesan dificultades y las empresas que dependen del combustible ven cómo se evaporan sus márgenes de beneficio. Mientras tanto, los reclamos por la independencia energética y las fuentes de combustible alternativas se hacen más fuertes a medida que los estadounidenses se dan cuenta de su vulnerabilidad a la volatilidad de los mercados petroleros. La pregunta es si se trata de un repunte temporal o del comienzo de una nueva era de energía cara..."
 usa_economic_events.38.a: "Bueno, ¡el precio de la gasolina seguramente superará los 2 dólares!"
 usa_economic_events_news.7.t: "La Crisis Energética de los 2000"
 usa_economic_events_news.7.d: "Los precios del petróleo han alcanzado máximos históricos en los mercados globales. Los analistas energéticos predicen que los costos del combustible se mantendrán elevados en el futuro previsible, ya que la demanda sigue superando la oferta. Será realmente interesante ver si el mundo simplemente tendrá que pagar más por estos altos precios del petróleo o si buscará alternativas en este mundo en constante cambio."
 usa_economic_events_news.7.a: "Otro día...Otra crisis económica..."
 usa_economic_events.37.b: "A ver si podemos tirar dinero al problema..."
