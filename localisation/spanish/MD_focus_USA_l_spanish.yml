 SOV_nuke_europe_desc: ""
 USA_withdraw_from_afghanistan: "[AFG.GetFlag] [TAL.GetFlag] Retirada de Afganistán"
 USA_withdraw_from_afghanistan_desc: "Ha llegado el momento de empacar nuestras cosas y salir de [AFG.GetFlag] Afganistán. Hemos mantenido un ejército fuerte, funcional y capaz durante nuestro mandato. Si los afganos [AFG.GetFlag] no pueden mantener la paz y la estabilidad en su país, no podemos hacer nada más."
 USA_chinese_environmentalist_cooperation: "[CHI.GetFlag] [USA.GetFlag] Proyecto de Ley Verde Chino-Estadounidense"
 USA_chinese_environmentalist_cooperation_desc: "Al lograr que China se interese en diversificar sus fuentes de energía para que dependa más de fuentes verdes, podríamos reducir considerablemente las emisiones de gases de efecto invernadero. Además de los beneficios, aunque no tan importantes, para la salud y el planeta, podríamos reducir los activos estratégicos que China tendría a su disposición en tiempos de conflicto."
 USA_the_russian_transition: "[SOV.GetFlag] Iniciativa de Transición Rusa"
 USA_the_russian_transition_desc: "Tras el colapso de la Unión Soviética y la indiscutible victoria estadounidense en la Guerra Fría, es necesario recordar a la Federación Rusa que su gente importa más que sus Klashnikovs. Instar a los líderes rusos a convertir algunas de sus antiguas industrias militares en civiles sería un gran paso adelante para aliviar las tensiones en la región y sentar las bases para una mayor colaboración en el futuro."
 USA_authorize_intervention_in_somalia: "[SOM.GetFlag] [JUB.GetFlag] [SWS.GetFlag] Autorizar la Intervención Militar en Somalia"
 USA_authorize_intervention_in_somalia_desc: "El conflicto somalí ha puesto en peligro nuestros contenedores de transporte marítimo, y nuestro comercio disminuye constantemente debido a los incesantes ataques a nuestras rutas marítimas. Con una intervención adecuada, podremos poner fin a esto rápidamente y devolver la estabilidad a una región del mundo bastante convulsa."
 USA_airstrikes_against_sudan: "[SUD.GetFlag] [SSU.GetFlag] Autorizar Ataques Aéreos Contra Sudán"
 USA_airstrikes_against_sudan_desc: "La guerra civil sudanesa [SUD.GetFlag] se ha prolongado durante algún tiempo, y si no se hace nada al respecto, podríamos presenciar una guerra prolongada que solo seguirá devastando la región. Debemos apoyar militarmente a [SSU.GetFlag] Sudán del Sur para presionar al gobierno sudanés [SUD.GetFlag] a que ceda o busque una solución diplomática."
 USA_call_on_tanzania_and_kenya: "[KEN.GetFlag] [TNZ.GetFlag] Llamado al Apoyo de Kenia y Tanzania"
 USA_call_on_tanzania_and_kenya_desc: "Necesitamos pedir a nuestros aliados en África que apoyen a [SSU.GetFlag] Sudán del Sur durante estos tiempos difíciles, y debemos hacerlo rápidamente."
 USA_our_backyard: "[BRA.GetFlag] [COL.GetFlag] [CHL.GetFlag] Inversiones en Nuestro Patio Trasero"
 USA_our_backyard_desc: "Nuestros vecinos del sur tienen un potencial infinito para superarse. Con las inversiones estadounidenses, podremos liberar todo su potencial e impulsarlos hacia la modernidad. Por supuesto, también nos beneficiaremos de esto; nada es gratis."
 USA_uniting_georgia: "[GEO.GetFlag] [SOO.GetFlag] [ABK.GetFlag] Uniendo a Georgia"
 USA_uniting_georgia_desc: "La nación de Georgia está siendo explotada, manipulada y arruinada por el oso ruso. Ya es hora de asegurarles a los georgianos que estamos ahí para ellos y dispuestos a proteger su soberanía frente a la agresión. También debemos demostrar a Rusia que no pueden simplemente hacer lo que quieran en la región. Esto solo se puede lograr presionando a Georgia para que recupere Abjasia y Osetia del Sur, y demostrando a los rusos que su supuesto \"ejército formidable\" puede hacer mucho."
 USA_natos_man: "[USA.GetFlag] [ENG.GetFlag] [GER.GetFlag] Hombre de la OTAN"
 USA_natos_man_desc: "Necesitamos asegurarnos de que nuestros aliados de la OTAN estén preparados y equipados con bases SHORAD en caso de un ataque aéreo importante. Sin defensas adecuadas, nuestros frentes podrían ser vulnerables a bombardeos y devastación."
 USA_belarus_reauthorization_act: "[BLR.GetFlag] [USA.GetFlag] Ley de Reautorización de la Democracia en Bielorrusia"
 USA_belarus_reauthorization_act_desc: "Nuestro apoyo a la democracia y los derechos humanos en Bielorrusia no debe flaquear. Debemos reafirmar nuestro apoyo a los movimientos por la libertad dentro de Bielorrusia y derrocar la brutal dictadura de Lukashenko."
 USA_setting_the_pacific_groundwork: "[JAP.GetFlag] [TAI.GetFlag] [KOR.GetFlag] Construyendo el Escudo del Pacífico"
 USA_setting_the_pacific_groundwork_desc: "Nuestros aliados en Asia Oriental tarde o temprano tendrán que enfrentarse a una China envalentonada, furiosa y despiadada. Nos conviene presionar al gobierno japonés para que cree un pacto regional que contrarreste esta amenaza."
 USA_a_strong_east: "[ISR.GetFlag] [SAU.GetFlag] Un Oriente Medio Protegido"
 USA_a_strong_east_desc: "Nuestros dos aliados más cercanos en Oriente Medio, Arabia Saudita e Israel, se encuentran bajo la amenaza constante de las fuerzas iraníes. Nos conviene actuar para armar y fortalecer a nuestros aliados en la región."
 USA_fighting_little_green_men: "[UKR.GetFlag] [MLV.GetFlag] [PMR.GetFlag] [SOV.GetFlag] Luchando contra los Hombrecitos Verdes"
 USA_fighting_little_green_men_desc: "Las fuerzas rusas se han adentrado demasiado en Europa del Este a través de estados satélite como Transnistria. Es hora de que les hagamos saber a los moldavos que son ellos quienes gobiernan su territorio, no los rusos."
 USA_push_iran: "[PER.GetFlag] Advertir a Teherán"
 USA_push_iran_desc: "Los iraníes llevan buscando una bomba nuclear desde tiempos inmemoriales. Se rumorea que están a solo unos meses de adquirir un arma si no intervenimos. Presionándolos y advirtiéndoles con antelación, podríamos justificar una futura intervención si no optan por la vía diplomática y la negociación."
 USA_two_percent: "[USA.GetFlag] [GER.GetFlag] [ENG.GetFlag] [POL.GetFlag] ¡Ese 2% Importa!"
 USA_two_percent_desc: "Nuestros aliados de la OTAN se han negado repetidamente a cumplir con los niveles de gasto más básicos establecidos por los estándares de la alianza. Es hora de que empecemos a presionarlos para que aumenten su gasto, o se arriesgarán a cosechar los frutos que sembraron."
 USA_tehrans_ultimatum: "Ultimátum de [PER.GetFlag] [USA.GetFlag] [PER.capital.GetCapitalVictoryPointName]"
 USA_tehrans_ultimatum_desc: "A los iraníes se les ha advertido una y otra vez que si se lanzan a por un arma nuclear, serán castigados con la espada. Parece que Irán aún no ha aprendido la lección y debe ser sometido."
 USA_economic_destruction_of_beijing: "[CHI.GetFlag] Destrucción Económica de [CHI.capital.GetCapitalVictoryPointName]"
 USA_economic_destruction_of_beijing_desc: "Los chinos han avanzado demasiado y demasiado rápido. Debemos actuar con rapidez para frenar este crecimiento de inmediato; de lo contrario, podría ser demasiado tarde. Intentaremos que todos los estados alineados con Occidente participen en un boicot económico a China para que su neoimperialismo económico llegue pronto a su fin."
 USA_freedom_in_venezuela: "[VEN.GetFlag] [USA.GetFlag] Libertad a Través de la Sangre"
 USA_freedom_in_venezuela_desc: "Por mucho que lo hayamos intentado, esa cucaracha [VEN.GetLeader] ha escapado a nuestra mira una y otra vez. Es hora de que acabemos con su régimen de una vez por todas."
 USA_russian_reset: "[USA.GetFlag] [SOV.GetFlag] El Reinicio Rusia"
 USA_russian_reset_desc: "Ya es hora de reconciliarnos con nuestros amigos rusos y poner fin a nuestro interminable conflicto. Al impulsar un \"reinicio\" de las relaciones, demostraremos a Rusia que no tenemos malas intenciones y que estamos abiertos al diálogo y la negociación."
 USA_intervention_in_libya: "[LBA.GetFlag] Intervención en Libia"
 USA_intervention_in_libya_desc: "El Estado libio se encuentra al borde del colapso, con escasa o nula infraestructura y cinturón de seguridad para proteger a la población civil. Debemos asumir la responsabilidad de intervenir y ayudar a restablecer el orden en la región."
 USA_moving_in_on_africa: "[DRC.GetFlag] [SAF.GetFlag] [NIG.GetFlag] Avanzando hacia África"
 USA_moving_in_on_africa_desc: "El Estado chino ha tenido acceso prácticamente sin restricciones a los mercados y asuntos internos africanos durante muchos años, y finalmente está empezando a alcanzarnos. Debemos actuar para combatir la influencia china y ejercer la nuestra si queremos seguir siendo la fuerza global dominante en el mundo."
 USA_another_10_trillion_to_israel: "[ISR.GetFlag] [USA.GetFLag] Un Israel Fuerte, Unos Estados Unidos Fuertes"
 USA_another_10_trillion_to_israel_desc: "Israel es nuestro aliado más cercano y posiblemente el único en Oriente Medio, lo que lo convierte en blanco de nuestros enemigos. Debemos hacer todo lo posible para armar y proteger a Israel y así no perder ni un pilar de nuestra influencia en el mundo."
 USA_backing_ukraine: "[UKR.GetFlag] [USA.GetFlag] Apoyando a Ucrania"
 USA_backing_ukraine_desc: "La injusta, ilegal y provocadora invasión rusa de Ucrania ha generado debate entre nuestros políticos. Estén o no a favor del aislacionismo, si nos quedamos de brazos cruzados viendo cómo Ucrania es absorbida, es posible que muy pronto veamos a los rusos en Washington.."
 USA_iraq_most_wanted: "Más Buscados de Irak"
 USA_iraq_most_wanted_desc: "Los £IRQ_Nat_Autocracy_small jefes de estado del Baaz han desplegado sus fuerzas por todo Oriente Medio. Cuatro fugitivos se esconden actualmente en [IRQ.GetFlag] Irak, incluyendo a Saddam Hussein y sus hijos, mientras que otros cuatro han huido a países vecinos. [IRQ_dlc_check] Debemos llevar a cabo las §HIncursiones de Caza Baazistas§! en [IRQ.GetFlag] Irak para encontrar los escondites de los cuatro Ases. Pueden estar en cualquier estado, por lo que la búsqueda debe ser exhaustiva. Si no se eliminan al menos a cuatro fugitivos en cinco años, se desencadenará un importante contraataque del Baaz.\n"
 IRQ_la_res: "Necesitamos al menos un §H85% de Fuerza de Red§! en cualquier país vecino a [IRQ.GetFlag] Irak para verificar si [IRQ.GetFlag] baazistas iraquíes han huido allí sin el permiso de la nación objetivo. Una vez verificado, podemos intervenir para arrestarlos."
 IRQ_influence: "Necesitamos al menos un §H20% de influencia§! en cualquier país vecino a [IRQ.GetFlag] Irak para verificar si [IRQ.GetFlag] baazistas iraquíes han huido allí sin el permiso de las naciones objetivo. Una vez verificado, podemos intervenir para arrestarlos."
 USA_execute_saddam: "Ejecutar a Saddam Hussein"
 USA_execute_saddam_desc: "Es hora de que este criminal se enfrente a la justicia. Justicia que privó a su propio pueblo."
 USA_execute_qusay: "Ejecutar a Qusay Hussein"
 USA_execute_qusay_desc: "Aunque no es tan maníaco como su hermano, Qusay sigue siendo un criminal peligroso que no debe salir libre."
 USA_execute_uday: "Ejecutar a Uday Hussein"
 USA_execute_uday_desc: "Uday es un auténtico monstruo, como lo demuestra su infame historial. No hay dinero que pueda reparar los crímenes que ha cometido."
 USA_execute_abid: "Ejecutar a Abid Hamid Mahmud"
 USA_execute_abid_desc: "Siendo el centro del partido Ba'ath, Abid Hamid Mahmud tiene sus manos manchadas de rojo con la sangre de los presos políticos reprimidos."
 USA_execute_majid: "Ejecutar a Ali Hassan al-Majid"
 USA_execute_majid_desc: "Ali el Químico ha redoblado su apuesta por el genocidio del pueblo kurdo, afirmando una y otra vez que no ha cometido ningún error."
 USA_execute_walter: "Ejecutar a Izzat Ibrahim al-Douri"
 USA_execute_walter_desc: "Ibrahim al-Douri, mano derecha de Saddam, ha cometido innumerables crímenes contra la humanidad. Ha sido cómplice indirecto del asesinato de miles, si no millones."
 USA_execute_tilfah: "Ejecutar a Hani Abd al-Latif Tilfah"
 USA_execute_tilfah_desc: "Supuestamente Tilfah ha sido cómplice del asesinato de muchos iraquíes durante el levantamiento de 1991, aunque hasta ahora las pruebas han sido insuficientes."
 USA_execute_salih: "Ejecutar a Aziz Saleh Al-Numan"
 USA_execute_salih_desc: "Como miembro de la “Docena Sucia”, Aziz Saleh es responsable de la tortura y asesinato de innumerables iraquíes."
 USA_SYR_baathists: "Búsqueda de baazistas iraquíes en [SYR.GetFlag] Siria"
 USA_SAU_baathists: "Búsqueda de baazistas iraquíes en [SAU.GetFlag] Arabia Saudita"
 USA_JOR_baathists: "Búsqueda de baazistas iraquíes en [JOR.GetFlag] Jordán"
 USA_KUR_baathists: "Búsqueda de baazistas iraquíes en [KUR.GetFlag] KDP Kurdistán"
 USA_PUK_baathists: "Búsqueda de baazistas iraquíes en [PUK.GetFlag] PUK Kurdistán"
 USA_PER_baathists: "Búsqueda de baazistas iraquíes en [PER.GetFlag] Irán"
 USA_fugitive_countdown: "Contraataque Baazista"
 USA_fugitive_countdown_desc: "Si no ejecutamos al menos a cuatro figuras destacadas del Partido Baazista antes de que finalice esta cuenta regresiva, la comunidad de inteligencia está advirtiendo que podría ocurrir un importante contraataque Baazista.."
 USA_close_this_menu: "Fin de las Operaciones Baazistas"
 USA_close_this_menu_desc: "Es hora de que concluyamos nuestra búsqueda de objetivos baazistas, hemos logrado lo que necesitábamos."
 USA_SI_green_china_TT: "Es §Hmás probable§! que acepten si tenemos relaciones superiores a §H0§!\n\nImportancia estratégica de esta acción:\n- Al conseguir que [CHI.GetFlag] §HChina§! a §Habandon§! múltiples £oil_texticon §HOcampos petrolíferos§! a favor de la energía verde, podremos obstaculizar su futura capacidad de abastecer eficientemente a sus ejércitos.\n- Sin embargo, tendremos que asumir la totalidad del costo de este proyecto, que ascenderá a unos §R$480 mil millones§!"
 USA_RU_transition_TT: "Es §Hmás probable§! que acepten si tenemos relaciones superiores a §H0§!\n\nImportancia estratégica de esta acción:\n- Al convencer a [SOV.GetFlag] §HRusia§! de que se beneficiarán de industrias §Gmilitares§! menores y §Hciviles§! mayores, podemos debilitar su §Gcomplejo militar§!, reduciendo su capacidad de producir armas rápidamente en caso de conflicto. §Hperderán 8 fábricas de armas y ganarán 16 a cambio§!.\n- Sin embargo, tendremos que asumir la totalidad del costo de este proyecto, que ascenderá a unos §R$120 mil millones§!"
 USA_somalia_intervention_TT: "Podremos enviar §Hfuerzas voluntarias§! a [SOM.GetFlag] §HSomalia§! independientemente de la tensión mundial.\n\nImportancia estratégica de esta acción:\n- Al poner fin rápidamente al conflicto [SOM.GetFlag] §HSomalia§!, podremos poner fin a los ataques a nuestros §Hbuques de carga§! y al comercio que circula por la región.\n- Aunque podemos esperar a que el conflicto termine, no estamos seguros de cuándo terminará. Mientras el conflicto continúe, habrá §Hataques continuos a nuestro cargamento§!"
 USA_sudan_intervention_TT: "Otorgaremos a [SSU.GetFlag] §HSouth Sudan§! un modificador defensivo contra [SUD.GetFlag] §HSudan§!\n- Podemos presionar a [KEN.GetFlag] §HKenya§! y [TNZ.GetFlag] §HTanzania§! para que apoyen a [SSU.GetFlag] §HSouth Sudan§! mediante voluntarios.\n- Podemos apoyar a [SSU.GetFlag] §HSouth Sudan§! atacando el \nterritorio de [SUD.GetFlag] §HSudanese§!\n\nImportancia estratégica de esta acción:\n- Al obligar a [SUD.GetFlag] §HSudan§! a un alto el fuego, debilitaremos la fuerza del Este global en África y los estados vecinos."
 USA_sudan_intervention2_TT: "Pediremos a [KEN.GetFlag] §HKenya§! y [TNZ.GetFlag] §HTanzania§! que apoyen a [SSU.GetFlag] §HSouth Sudan§! con tropas voluntarias para presionar a\n[SUD.GetFlag] §HSudan§! a un acuerdo de paz. Pagaremos a todas las partes involucradas §R$19.00§! de nuestro tesoro como compensación por sus pérdidas."
 USA_south_america_investments_TT: "Tienen §Hmás probabilidades§! de aceptar si nuestras relaciones están por encima de §H20§!.\nExcavaremos §HMetales Preciosos§! en [BRA.GetFlag] §HBrasil§!, [COL.GetFlag] §HColombia§! y [CHL.GetFlag] §HChile§!. Invertiremos un total de §G$50 mil millones§! en cada país y extraeremos aproximadamente §H20§! unidades de §HMetales Preciosos§! en cada uno.\n\nControlaremos estos metales durante un período de 10 años, después del cual nuestro contrato expirará.\nUna vez que el contrato expire, los metales quedarán bajo el control de cada nación respectiva.\nImportancia estratégica de esta acción:\n\nAl invertir en estos estados, podremos §Hmás que duplicar§! nuestras reservas existentes de §HMetales Preciosos§! durante un tiempo."
 USA_georgian_peer_pressure_TT: "Tienen §Hmás probabilidades§! de aceptar si nuestras relaciones están por encima de §H20§! y no son un estado títere de [SOV.GetFlag] §HRusia§!.\nImportancia estratégica de esta acción:\n\n[GEO.GetFlag] §HGeorgia§! ha estado dividida y afectada por el separatismo durante algún tiempo. Esto es un efecto directo del impulso neoinperialista del Kremlin para actuar como dios en los antiguos estados soviéticos.\nArmaremos a [GEO.GetFlag] §HGeorgia§! con armas para recuperar [SOO.GetFlag] §HOsetia del Sur§! y [ABK.GetFlag] §HAbjasia§!.\nAdemás de proporcionar a [GEO.GetFlag] §HGeorgia§! nuestras herramientas más recientes para traer libertad, les daremos una garantía de que intervendremos en su nombre si el Kremlin da un paso en falso.\nSi el Kremlin decide provocarnos, convocaremos una intervención de la OTAN en [GEO.GetFlag] §HGeorgia§!, con el objetivo final de liberar los estados en el Cáucaso bajo control [SOV.GetFlag] §Hruso§!.\n"
 USA_russian_defeat_TT: "Si se cumplen todos los objetivos de la operación, los siguientes estados se independizarán:\n- [DAG.GetFlag] Daguestán\n- [CHE.GetFlag] Chechenia\n- [ING.GetFlag] Ingusetia\n- [KBK.GetFlag] Kabardino-Balkaria\n- [KCC.GetFlag] Karacháyevo-Cherkesia"
 USA_stalemate_TT: "Posibles resultados:\n- Si [GEO.GetFlag] Georgia controla [ABK.GetFlag] Abjasia u [SOO.GetFlag] Osetia del Sur, sus territorios estarán bajo control georgiano.\n- Si [GEO.GetFlag] Georgia no logra controlar ningún territorio, se restablecerán las fronteras previas al conflicto y el Kremlin ampliará su influencia."
 USA_bolstering_nato_TT: "Construiremos un sitio §H1 SHORAD§! en cada estado de cada aliado de la §COTAN§!\n\nImportancia estratégica de esta acción:\n- Al equipar a nuestros aliados de la §COTAN§! con sitios SHORAD avanzados, estarán mejor preparados en caso de un ataque aéreo importante por parte de una potencia extranjera.\n- Nuestra influencia en cada estado de la §COTAN§! aumentará significativamente, evitando que las potencias extranjeras creen fracturas dentro de nuestra alianza."
 USA_belarus_decision_TT: "Trabajaremos para derrocar al gobierno [BLR.GetFlag] §HBelaruso§!\n\nImportancia estratégica de esta acción:\n- Al derrocar al §H[BLR.GetLeader]§!, dañaremos gravemente la influencia [SOV.GetFlag] §HRuso§! en Europa del Este y derrocaremos a uno de sus aliados más cercanos.\n- Al tener un [BLR.GetFlag] §HBelaruso§! amigo a las puertas del Kremlin, podríamos proyectar la influencia de la §COTAN§! en toda la región."
 USA_blr_coup_TT: "derrocando [BLR.GetFlag] [BLR.GetLeader]"
 USA_blr_civilwar_TT: "Una guerra civil se está desatando en [BLR.GetFlag] Bielorrusia"
 USA_ven_coup_TT: "derrocando [VEN.GetFlag][VEN.GetLeader]"
 USA_ven_civilwar_TT: "Desbloqueará un nuevo §Rraid§! para capturar a §H[VEN.GetLeader]§!"
 USA_creates_new_russia_TT: "Nos movilizaremos para formar un nuevo [RUS.GetFlag] Estado ruso.\n- Podríamos perder cualquier territorio que hayamos ocupado en [RUS.GetFlag] Rusia.\n- Esta nueva [RUS.GetFlag] Rusia formará parte de la OTAN.\n- No elegir esta opción podría tener consecuencias imprevistas."
 USA_pacific_alliance_TT: "Es §Hmás probable§! que acepten si tenemos relaciones superiores a §H20§! y son §Bdemocráticas§!\n\nImportancia estratégica de esta acción:\n- La región del Pacífico está cayendo rápidamente bajo la influencia de un §H[CHI.GetFlag] [CHI.GetName]§! cada vez más dominante, y esto empieza a preocupar a nuestra comunidad de inteligencia.\n- Al lograr que §H[JAP.GetFlag] Japón§! y otros actores regionales como §H[KOR.GetFlag] Corea§! formen una facción contra esta creciente amenaza, podríamos debilitar significativamente la influencia de §H[CHI.GetFlag] China§! en la región y crear un pacto defensivo que garantizaría la seguridad de cada nación."
 USA_arming_saud_TT: "Importancia estratégica de esta acción:\n- En la actualidad, Oriente Medio se ha convertido en una región conflictiva y devastada por la guerra, con pocos actores regionales estables, con la excepción de [ISR.GetFlag] §HIsrael§! y países del Golfo como [SAU.GetFlag] §HArabia Saudita§!. Es imperativo que nos movilicemos para armar a estos pocos estados para que estén preparados si una fuerza desestabilizadora decide embarcarse en una agresiva campaña de destrucción."
 USA_backing_moldova_TT: "Importancia estratégica de esta acción:\n§H[MLV.GetFLag] Moldavia§! y §H[UKR.GetFlag] Ucrania§! son víctimas del enfoque irredentista de Moscú hacia Europa del Este, y más específicamente, hacia los estados postsoviéticos. Apoyaremos la soberanía de estas naciones y les garantizaremos que están al mando de sus propias tierras.\nDebilitaremos significativamente la influencia y el control §H[SOV.GetFlag] ruso§! en la región, especialmente si se cumplen todos nuestros objetivos."
 USA_pressuring_iran_TT: "Importancia estratégica de esta acción:\n- §H[PER.GetFLag] Irán§! se esfuerza por conseguir una bomba nuclear, y de eso no hay duda. Debemos hacer todo lo posible para evitar que §H[PER.GetFLag] Irán§! obtenga una bomba nuclear, lo que incluye sanciones que desplomen su economía.\n- Si emitimos una advertencia ahora, podríamos justificar un ataque futuro en suelo §H[PER.GetFLag] Iraní§! si deciden ignorar la diplomacia y persistir en sus sádicas ambiciones."
 USA_2_percent_TT: "Importancia estratégica de esta acción:\n- Los estados de la §COTAN§! han estado aprovechándose de la ayuda estadounidense durante demasiado tiempo, y ya es hora de que exijamos que aumenten su gasto o se arriesguen a las consecuencias políticas que se avecinan.\n- Al presionar a nuestros aliados de la §COTAN§! para que aumenten el gasto, mantendremos a la mayor parte de Europa preparada para cualquier posible invasión de potencias extranjeras."
 USA_if_iran_loses_TT: "Si [PER.GetFlag] Irán pierde:\n- [USA.GetFlag] Estados Unidos controlará todos los principales yacimientos petrolíferos iraníes.\n- [USA.GetFlag] Estados Unidos se apoderará de las islas Abu Musa.\n- [PER.GetFlag] El gobierno iraní quedará bajo el control de la ONU."
 USA_if_iran_wins_TT: "Si [PER.GetFlag] Irán se mantiene:\n- [PER.GetFlag] gobierno iraní ganará popularidad.\n- [USA.GetFlag] Estados Unidos perderá mucha influencia en Oriente Medio.\n- [PER.GetFlag] Irán podrá expandir su programa nuclear."
 USA_PER_war_TT: "Importancia estratégica de esta acción:\n- §H[PER.GetFLag] Irán§! ha demorado demasiado las negociaciones sobre su programa nuclear. Es hora de que tomemos cartas en el asunto.\n- Si logramos derrocar a §H[PER.GetFLag] Irán§! u obligarlo a hacer una concesión, ya no podrá adquirir una bomba nuclear.\n- Si tenemos que emprender acciones militares contra §H[PER.GetFLag] Irán§!, lo más probable es que volvamos a tener un §H[PER.GetFLag] Irán§! amigo en la región."
 USA_CHI_trade_war_TT: "Es §Hmás probable§! que los países acepten si tenemos relaciones superiores a §H20§!\n\nImportancia estratégica de esta acción:\n- §H[CHI.GetFlag] China§! ha ido aumentando lentamente su control económico sobre el mundo, lo que incluye la expansión de su comercio con nuestros aliados hasta el punto de que sus exportaciones superan las nuestras. Es hora de cambiar esto y restablecer la hegemonía económica §H[USA.GetFlag] estadounidense§!.\n- Trabajaremos para imponer una guerra comercial contra §H[CHI.GetFlag] China§! y para que los estados §Calineados con Occidente§! interrumpan el comercio con el gobierno §H[CHI.GetFlag] chino§!.\n- Esto dañará gravemente la economía de §H[CHI.GetFlag] China§! y fortalecerá la nuestra."
 USA_beating_gaddafi_TT: "Importancia estratégica de esta acción:\n- Una §H[LBA.GetFlag] Libia§! hostil es un norte de África hostil. Sin algún tipo de control sobre la región, nos expondríamos a perder una importante posición en el mundo.\n- Al derrocar al gobierno §H[LBA.GetFlag] Libio§!, esperamos conseguir un aliado o aliados fiables, dignos de confianza y estables, dependiendo de la gravedad del conflicto §H[LBA.GetFlag] Libio§!."
 USA_kicking_china_out_TT: "Importancia estratégica de esta acción:\n- Los §H[CHI.GetFlag] chinos§! han expandido rápidamente su influencia sobre gran parte de África. Esto amenaza nuestra hegemonía económica en la región y gran parte del mundo, lo que significa que, si no actuamos ahora, los §H[CHI.GetFlag] chinos§! podrían superarnos como superpotencia mundial.\n- Al atacar la influencia de los §H[CHI.GetFlag] chinos§! en toda África, podríamos salvar la región de una posible adquisición hostil. Además, tenemos la ventaja de que nuestra influencia reemplaza a la de los §H[CHI.GetFlag] chinos§!, pero no es por eso que lo hacemos, ¿verdad?"
 USA_russian_reset_TT: "Es §Hmás probable§! que acepten si nuestras relaciones son superiores a §H0§!\n\nImportancia estratégica de esta acción:\n- Hemos sido rivales de §H[SOV.GetFlag] Rusia§! desde tiempos inmemoriales, sin apenas esfuerzos por establecer un tratado oficial entre nuestras naciones.\n- Al \"reiniciar\" las relaciones, podríamos aliviar la tensión mundial con la esperanza de un futuro mejor.\n- Como parte del tratado, exigiremos el desarme de las armas nucleares y sus transportadores, lo que reducirá significativamente la cantidad de armas nucleares en el mundo."
 USA_support_ISR_TT: "Importancia estratégica de esta acción:\n- [ISR.GetFlag] §HIsrael§! es vulnerable a los ataques de estados extranjeros, en particular los de Oriente Medio y el norte de África. Si optamos por ignorar su situación, podrían ser víctimas de sus ataques.\n- Si apoyamos militarmente a [ISR.GetFlag] §HIsrael§!, no solo contaríamos con un aliado fuerte, sino que también obtendríamos una importante ventaja sobre ellos, lo que facilitaría considerablemente su expansión."
 department_of_state.60.t: "Estados Unidos Exige un Aumento en el Gasto Militar"
 department_of_state.60.d: "El presidente de Estados Unidos, [USA.GetLeader], ha exigido que aumentemos el gasto militar para cumplir con el mínimo del 2% establecido por los estándares de la alianza. Estados Unidos amenaza con represalias económicas si decidimos no aumentar el gasto."
 department_of_state.60.a: "Nosotros no tenemos elección"
 department_of_state.60.b: "Nunca"
 department_of_state.61.t: "[FROM.GetName] se Niega a Cumplir el Umbral"
 department_of_state.61.d: "[FROM.GetName] no ha cumplido con nuestras exigencias de aumento del gasto militar, lo que ha provocado indignación en la Casa Blanca. Estamos considerando algún tipo de consecuencia a cambio, pero aún no se ha decidido."
 department_of_state.61.a: "¡Tarifa de ellos!"
 department_of_state.61.b: "De todos modos estábamos fanfarroneando"
 department_of_state.62.t: "Washington Emite un Ultimátum"
 department_of_state.62.d: "Estados Unidos nos ha dado una opción: o permitimos que las fuerzas estadounidenses entren en Irán y desmantelen y observen nuestra tecnología nuclear, o las enfrentamos en el campo de batalla. Este es otro síntoma de la agresión y el imperialismo estadounidenses, que demuestra que, por mucho que intentemos negociar, seguirán haciendo lo que quieran."
 department_of_state.62.a: "Está bien, déjalos entrar."
 department_of_state.62.b: "Ordenar a las fuerzas armadas que estén preparadas"
 department_of_state.63.t: "Irán Rechaza Nuestros Términos"
 department_of_state.63.d: "En una acción casi suicida, el gobierno iraní decidió romper el ultimátum oficial emitido a principios de esta semana. Esto significa casi con certeza que desean continuar con su programa nuclear, y no nos queda otra opción que tomar cartas en el asunto."
 department_of_state.63.a: "Irán, has cometido un gran error."
 department_of_state.63.b: "Nosotros estábamos faroleando"
 department_of_state.64.t: "Irán Cede"
 department_of_state.64.d: "En una decisión nada sorprendente, el gobierno iraní anunció hoy que cederá ante las demandas estadounidenses y permitirá que expertos estadounidenses desmantelen su programa nuclear."
 department_of_state.64.a: "Buen comentario, Irán"
 department_of_state.65.t: "Fuerzas Armadas Iraníes se Movilizan"
 department_of_state.65.d: "El ejército iraní declaró hoy la movilización general de todas sus unidades en todo el país para hacer frente a cualquier agresión estadounidense en su territorio. Esta medida se produce tras las exigencias estadounidenses de que Irán les permita enviar a sus observadores y expertos para desmantelar la tecnología nuclear iraní. Esta exigencia fue, por supuesto, rechazada, lo que provocó una respuesta inmediata del gobierno estadounidense. El Congreso de Estados Unidos aprobó hoy los ataques en territorio iraní, una medida que conmocionó a toda la nación, ya que el sentimiento antibélico ha sido intenso en la sociedad estadounidense durante décadas."
 department_of_state.65.a: "¿Una invasión a Irán? ¡Qué locura!"
 department_of_state.65.b: "El águila del imperialismo ataca a sus víctimas una vez más"
 department_of_state.66.t: "Fuerzas Estadounidenses se Retiran de Irán"
 department_of_state.66.d: "En una vergonzosa conferencia de prensa hoy, [USA.GetLeader] anunció la retirada total de Irán y un llamado inmediato a un alto el fuego entre ambas naciones. Esto ocurre después de que las fuerzas estadounidenses incumplieran repetidamente sus objetivos operativos, lo que resultó en un estancamiento en las regiones rocosas de Irán. El elevado número de bajas y los costos exorbitantes también contribuyeron a esta decisión, ya que la presión pública frenó el apoyo continuo al conflicto. Los medios de comunicación y la televisión estatales iraníes ya han comenzado a celebrar la victoria y a disfrutar de una renovada popularidad y apoyo. También se informa que Irán mantendrá su postura anterior a la guerra respecto a sus ambiciones nucleares, lo que significa que el conflicto logró poco más que un derramamiento de sangre innecesario."
 department_of_state.66.a: "¿Quién lo hubiera adivinado?"
 department_of_state.67.t: "Fuerzas Iraníes Colapsan Bajo la Presión de EE.UU."
 department_of_state.67.d: "Hoy temprano, un portavoz oficial de las Fuerzas Armadas iraníes anunció las condiciones oficiales de rendición del conflicto y acordó ordenar el cese inmediato de las operaciones. Este anuncio provocó el colapso del gobierno iraní, con la huida de varios altos funcionarios a otras partes del mundo. Si bien las Fuerzas Armadas iraníes no se disolverán como resultado de las condiciones de rendición, quedarán bajo la supervisión de la ONU junto con otros recursos gubernamentales iraníes hasta que se encuentre un reemplazo adecuado."
 department_of_state.67.a: "¿Se fracturará Irán?"
 department_of_state.68.t: "Victoria Sobre Irán"
 department_of_state.68.d: "Nuestra victoria en Irán significaría que no nos iremos a casa con las manos vacías. Hemos establecido zonas de seguridad alrededor de los yacimientos petrolíferos iraníes y hemos contratado a varias grandes empresas para que inicien operaciones a finales de este año. También nos hemos apoderado de las estratégicamente importantes islas Abu Musa en el estrecho de Ormuz para proyectar mayor poder naval."
 department_of_state.68.a: "Las armas nucleares no importan tanto como el oro negro"
 department_of_state.69.t: "Triunfo Sobre el Invasor"
 department_of_state.69.d: "Hemos superado lo imposible y derrotado al ejército invasor estadounidense. Hoy se celebrará la victoria durante siglos."
 department_of_state.69.a: "¡Sea pish!"
 department_of_state.70.t: "Reza Pahlavi Asciende al Poder"
 department_of_state.70.d: "La misión de la ONU en Irán ha decidido otorgarle a Reza Pahlavi el control del país. Esta decisión cuenta con amplio apoyo en todo nuestro gobierno y en varios estados aliados."
 department_of_state.70.a: "De acuerdo"
 department_of_state.71.t: "Rebeldía en Jorasán"
 department_of_state.71.d: "Parece que la fallida invasión estadounidense ha provocado un levantamiento en Khorasan, arriesgando el colapso de todo el estado y colocando a Irán bajo un régimen chiíta radical una vez más."
 department_of_state.71.a: "Mierda"
 department_of_state.71.b: "Bueno.. (jugar como)"
 department_of_state.72.t: "Insurgencia en el Este de Irán"
 department_of_state.72.d: "Hoy temprano se escucharon disparos en Mashhad y otras ciudades de la región iraní de Jorasán, lo que alarmó a los residentes y a las fuerzas de paz. Los rumores de una insurgencia se extendían desde la invasión estadounidense, con exoficiales y unidades del CGRI uniéndose bajo una confederación informal de clérigos que se refugiaban en el campo. Parece que se han unido formalmente bajo el ayatolá radical Mohammad-Taqi Mesbah-Yazdi, quien ha jurado enviar a sus hombres a Teherán para finales de mes. Se señala a todos, pero la principal culpa recae sobre Estados Unidos, acusado de instaurar un proceso de paz fallido y de no implementar las medidas de seguridad necesarias para prevenir una insurgencia como la que estamos presenciando."
 department_of_state.72.a: "Oh, mierda"
 department_of_state.73.t: "Estados Unidos Nos Pide que Reduzcamos Negocios con China"
 department_of_state.73.d: "El gobierno de Estados Unidos ha enviado una solicitud formal a decenas de naciones solicitando el cese inmediato de toda cooperación comercial y económica con China. Estados Unidos exige que, durante un breve periodo, participemos en una protesta global contra el neoimperialismo chino y sus prácticas turbias, que implican, entre otras cosas, endeudar a naciones pequeñas."
 department_of_state.73.a: "China debe aprender que sus acciones tienen consecuencias"
 department_of_state.73.b: "No enojaremos a nuestros amigos chinos"
 department_of_state.74.t: "Estados Unidos Inicia una Peligrosa Guerra Comercial"
 department_of_state.74.d: "Estados Unidos envió hoy cartas y solicitudes a docenas de países solicitando el cese inmediato de toda actividad económica con nuestra nación. Esta medida es un indicio de la naturaleza malvada, celosa y ávida de poder de los estadounidenses. Tomaremos nota de quién nos traiciona y traiciona nuestra confianza, y no olvidaremos la humillación que Estados Unidos ha intentado infligirnos."
 department_of_state.74.a: "¿Qué carajo América?"
 department_of_state.75.t: "Venezuela Estalla en Guerra Civil"
 department_of_state.75.d: "Tras una extensa evaluación de inteligencia, Estados Unidos predijo que los rebeldes demócratas venezolanos pronto se rebelarían contra el régimen de [VEN.GetLeader]. Como era de esperar, sus predicciones se cumplieron y coincidieron casi a la perfección con el resultado que habían pronosticado los estadounidenses. Esta aterradora precisión ha llevado a algunos a creer que Estados Unidos está detrás del caos que ahora envuelve a Venezuela. Las fuerzas de la oposición, unidas tras Leopoldo López, están librando un conflicto abierto contra el orden gobernante venezolano. Estados Unidos ha prometido apoyar a las fuerzas rebeldes, afirmando que el derrocamiento del régimen venezolano es un objetivo inquebrantable."
 department_of_state.75.a: "Otra nación se convierte en un mero campo de batalla"
 department_of_state.75.b: "La codicia occidental no tiene límites"
 department_of_state.76.t: "Estalla una Guerra Comercial Entre Estados Unidos y China"
 department_of_state.76.d: "A principios de esta semana, [USA.GetLeader] autorizó la publicación de varios documentos que enumeraban las quejas de Estados Unidos contra el Estado chino. El punto más destacado de estos documentos era la preocupación estadounidense por el \"imperialismo económico\" chino. Tras la publicación de estos documentos, Estados Unidos emitió varias solicitudes a decenas de países de todo el mundo solicitando formalmente que redujeran su cooperación económica con China y, en su lugar, se orientaran hacia países con un historial más sólido. [CHI.GetLeader] emitió un comunicado condenando la medida, calificándola de infantil."
 department_of_state.76.a: "Al menos mis cuentas offshore siguen seguras"
 department_of_state.76.b: "Esos molestos Estadounidenses"
 department_of_state.77.t: "Estados Unidos Desea \"Reiniciar\" las Relaciones"
 department_of_state.77.d: "El gobierno de Estados Unidos nos ha solicitado que nos sumemos a su programa de \"reinicio\". Esta decisión no surgió de la nada; ha sido discutida y debatida por políticos estadounidenses durante meses. Ahora, sin embargo, parece que finalmente han tomado una decisión, más dispuestos que nunca a que firmemos su tratado. Un pilar clave del programa de \"reinicio\" es el desarme de armas y transportes nucleares, algo que a muchos en nuestro estado les incomoda. Sin embargo, los estadounidenses han prometido seguir el ejemplo y también desarmar parte de su arsenal si decidimos firmar su tratado y posar para los medios."
 department_of_state.77.a: "Bien lo firmaremos"
 department_of_state.77.b: "Ya hemos superado eso, Estados Unidos."
 department_of_state.78.t: "Estados Unidos Interviene en Libia"
 department_of_state.78.d: "El gobierno estadounidense ha decidido que le conviene iniciar una intervención en Libia para derrocar a su gobernante, [LBA.GetLeader]. Estados Unidos está desembarcando tropas en el terreno, aunque no muchas. Las fuerzas estarán allí principalmente para ayudar a mantener la paz y luchar contra las fuerzas de [LBA.GetLeader]. En el país, la medida está siendo duramente criticada por manifestantes pacifistas y aislacionistas, quienes creen que Estados Unidos no debería involucrarse en los conflictos de otras naciones en aras de la estabilidad. Aun así, el presidente estadounidense [USA.GetLeader] insiste en que la medida es necesaria para garantizar que no se produzcan más derramamientos de sangre."
 department_of_state.78.a: "Está bien, si insistes"
 department_of_state.79.t: "Estados Unidos Daña Gravementen Nuestra Influencia en África"
 department_of_state.79.d: "Estados Unidos ha lanzado una extensa campaña para liberar a África de toda nuestra influencia. Han llevado a cabo importantes operaciones para lograrlo, y todas las naciones donde teníamos influencia se han visto afectadas."
 department_of_state.79.a: "Esos bastardos"
 department_of_state.80.t: "¡Rusia Acepta \"Reiniciar\" las Relaciones!"
 department_of_state.80.d: "El gobierno ruso ha acordado restablecer las relaciones diplomáticas y desarmar parte de sus arsenales nucleares. Como prometimos, también se espera que desarmemos parte de nuestros propios arsenales. Nos reuniremos con los líderes rusos a finales de esta semana para anunciar públicamente la medida."
 department_of_state.80.a: "¡Bien!"
 department_of_state.81.t: "¡Rusia se Niega a \"Reiniciar\" las Relaciones!"
 department_of_state.81.d: "El gobierno ruso se mostró desinteresado en restablecer las relaciones, afirmando que se encuentran actualmente en un punto insalvable. También afirmaron que no se podía confiar en nuestro gobierno debido a los constantes cambios de liderazgo."
 department_of_state.81.a: "Ellos deben estar haciendo nada bueno.."
 department_of_state.82.t: "Estados Unidos y Rusia \"Reinician\" las Relaciones"
 department_of_state.82.d: "En una conferencia de prensa ofrecida hoy por los ministros de Asuntos Exteriores de Rusia y Estados Unidos, se anunció que Estados Unidos y Rusia \"reiniciarán\" formalmente sus relaciones. Ambas partes sostuvieron y presionaron simultáneamente un botón con la palabra \"reinicio\" para simbolizar el restablecimiento oficial de las relaciones entre las dos potencias rivales. Durante décadas, Estados Unidos y Rusia se han enfrentado en una interminable partida de ajedrez, utilizando el mundo como tablero y a cada nación como pieza. Hoy parece haber esperanza: esperanza de un futuro mejor, esperanza de una solución pacífica al problema nuclear y esperanza de cooperación entre las potencias globales. Cabe señalar que la iniciativa podría fracasar y el mundo podría volver a la etapa de hostilidades previa al \"reinicio\" de las relaciones."
 department_of_state.82.a: "¡Un tremendo paso adelante para la humanidad!"
 department_of_state.83.t: "Estados Unidos Brinda Apoyo Militar"
 department_of_state.83.d: "Estados Unidos se ha ofrecido, en esencia, a entrenar a nuestras unidades, insistiendo en que sólo la experiencia estadounidense podría salvar a Israel de convertirse en víctima de estados enemigos."
 department_of_state.83.a: "De acuerdo"
 department_of_state.83.b: "No"
 department_of_state.84.t: "OTAN Comienza a Armar y Respalda a Ucrania"
 department_of_state.84.d: "Varios países de la OTAN, incluido Estados Unidos, han declarado su apoyo total e incondicional a Ucrania. Afirman que, debido a la agresión rusa, no les queda otra opción que enviar armas de inmediato a Ucrania para demostrar a Moscú que la comunidad internacional tiene ley y orden. El gobierno ruso ha declarado que la medida es una provocación y podría desembocar en una guerra, pero los líderes occidentales desmienten a [SOV.GetLeader] al respecto. El líder ucraniano [UKR.GetLeader] ha apoyado la medida, afirmando que «es justo» apoyar la independencia de Ucrania ante la agresión rusa."
 department_of_state.84.a: "¡Ucrania tiene derecho a defenderse!"
 department_of_state.84.b: "Ucrania no es más que un simple peón en una partida de ajedrez."
 department_of_state.85.t: "Estados Unidos Solicita Apoyo Unilateral para Ucrania"
 department_of_state.85.d: "El Estado ucraniano está bajo ataque ruso, y Estados Unidos afirma que solo la OTAN como alianza podría ayudar a detener la maquinaria bélica rusa. También se nos pide que enviemos voluntarios extranjeros como parte de la legión extranjera ucraniana para apoyar militarmente al ejército ucraniano."
 department_of_state.85.a: "¡De inmediato!"
 department_of_state.85.b: "No"
 department_of_state.86.t: "Bombardeo Atómico de Rusia"
 department_of_state.86.d: "Lo indescriptible ha sucedido. Hoy temprano, varios misiles nucleares estadounidenses fueron lanzados desde silos hacia importantes ciudades rusas no ocupadas por fuerzas aliadas, diezmándolas. Aunque no se ha calculado oficialmente el número de muertos, se dice que las ciudades afectadas están contaminadas con radiación, lo que las hace prácticamente inhabitables. Décadas de diplomacia de la Guerra Fría fueron en vano, ya que muchas ciudades quedaron en ruinas. Se espera una respuesta del Kremlin."
 department_of_state.86.a: "\"La Cuarta Guerra Mundial se librará con palos y piedras\""
 department_of_state.87.t: "Bombardeo Atómico de Estados Unidos"
 department_of_state.87.d: "Ha ocurrido lo indescriptible. Hoy temprano, varios misiles nucleares rusos fueron lanzados desde silos hacia importantes ciudades estadounidenses no ocupadas por sus fuerzas, diezmándolas. Aunque no se ha calculado oficialmente el número de muertos, se dice que las ciudades afectadas están contaminadas con radiación, lo que las hace prácticamente inhabitables. Décadas de diplomacia de la Guerra Fría fueron en vano, ya que muchas ciudades quedaron en ruinas. Se espera una respuesta de Washington."
 department_of_state.87.a: "\"La Cuarta Guerra Mundial se librará con palos y piedras\""
 department_of_state.88.t: "Bombardeos Atómicos de Europa"
 department_of_state.88.d: "Lo indescriptible ha sucedido. Hoy temprano, varios misiles nucleares rusos fueron lanzados desde silos hacia importantes capitales europeas no ocupadas por sus fuerzas, diezmándolas. Aunque no se ha calculado oficialmente el número de muertos, se dice que las ciudades afectadas están contaminadas con radiación, lo que las hace prácticamente inhabitables. Décadas de diplomacia de la Guerra Fría fueron en vano, ya que muchas ciudades quedaron en ruinas. Se espera una respuesta de estos estados. Se dice que solo los estados involucrados en el conflicto contra Rusia han sido alcanzados."
 department_of_state.88.a: "\"La Cuarta Guerra Mundial se librará con palos y piedras\""
 department_of_state.89.t: "¡Nuestra capital ha sido atacada con armas nucleares!"
 department_of_state.89.d: "Un misil balístico intercontinental ruso impactó hoy nuestra capital, causando una destrucción inimaginable en la ciudad. La zona se contaminó con radiación y, como resultado, muchas personas han muerto. Se desconoce el número total de muertos hasta el momento."
 department_of_state.89.a: "¡Esos malditos rusos!"
 department_of_state.90.t: "¡Estambul ha sido atacada con armas nucleares!"
 department_of_state.90.d: "Un misil balístico intercontinental ruso impactó hoy en Estambul, provocando una destrucción inimaginable en la ciudad. La zona se contaminó con radiación y, como resultado, muchas personas murieron. Se desconoce el número total de muertos por el momento."
 department_of_state.90.a: "¡Esos malditos rusos!"
 department_of_state.91.t: "Varias ciudades impactadas por misiles balísticos intercontinentales rusos"
 department_of_state.91.d: "Varias de nuestras principales ciudades han sido alcanzadas por misiles balísticos intercontinentales rusos. Las ciudades mencionadas son Washington D.C., Los Ángeles, Nueva York, Miami y Austin. Estas ciudades han sido contaminadas con radiación y, hasta el momento, se desconoce la magnitud de los daños."
 department_of_state.91.a: "Esos malditos rusos"
 department_of_state.92.t: "Varias ciudades impactadas por misiles balísticos intercontinentales estadounidenses"
 department_of_state.92.d: "Varias de nuestras principales ciudades han sido alcanzadas por misiles balísticos intercontinentales estadounidenses. Las ciudades mencionadas son Moscú, San Petersburgo, Volgogrado, Ekaterimburgo y Kémerovo. Estas ciudades han sido contaminadas con radiación y, hasta el momento, se desconoce la magnitud de los daños."
 department_of_state.92.a: "Esos malditos estadounidenses"
 saddam_TT: "§HAs De Picas§!\nSaddam Hussein Al-Tikriti\nPresidente\n\n§gSaddam reubicará su escondite cada dos meses§!"
 qusay_TT: "§HAs De Tréboles§!\nQusay Saddam Hussein\nHijo de Saddam Hussein"
 uday_TT: "§HAs De Corazones§!\nUday Saddam Hussein\nHijo de Saddam Hussein"
