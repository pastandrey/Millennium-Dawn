 USA_crisis_event.1125.t: "Los Sindicatos Mineros se Movilizan"
 USA_crisis_event.1125.d: "A medida que la situación se deteriora más allá de lo comprensible, los trabajadores mineros sindicalizados han comenzado a movilizarse en torno al estado de Virginia Occidental. Considerando el estado como una posición defensiva clave, la mayoría de estos trabajadores esperan aumentar la presión y, o bien forzar la adopción de una agenda favorable a los sindicatos, o bien asegurar la independencia del otrora conocido como el Estado de la Perla Negra."
 USA_crisis_event.1125.o1: "¡Dios Mío, ¿Por Qué Ahora?!"
 USA_crisis_event.1126.t: "Movilicen las Defensas"
 USA_crisis_event.1126.d: "El gobierno federal busca reprimir y oprimir a quienes lo ven como una broma. Nos mantendremos firmes contra la tiranía y por los trabajadores."
 USA_crisis_event.1126.o1: "¡Convoquen a los Trabajadores!"
 USA_crisis_event.1127.t: "El Tercer Susto Rojo"
 USA_crisis_event.1127.d: "Ha llegado el momento: debemos aplastar a esta chusma comunista si queremos asegurar un futuro democrático para nuestra nación en estos tiempos difíciles."
 USA_crisis_event.1127.o1: "Mejor Muerto que Rojo"
 USA_crisis_event.1128.t: "El Sol Brilla Demasiado"
 USA_crisis_event.1128.d: "En un inquietante cambio en la unidad regional, el estado de Florida ha declarado su independencia. Si bien nos entristece profundamente este giro de los acontecimientos, el objetivo común de destruir el gobierno federal es lo que importa y, por lo tanto, es por lo que nos uniremos por ahora."
 USA_crisis_event.1128.o1: "Poco Queda de la Familia del Sur"
 USA_crisis_event.1129.t: "Creación de la Guardia Estatal"
 USA_crisis_event.1129.d: "La reciente agitación nacional nos ha obligado a recrear la guardia estatal y a usarla como fuerza de autodefensa. Esperamos asegurar nuestra independencia de la opresión federal y deseamos que Dios nos bendiga a todos los que comparten nuestra causa."
 USA_crisis_event.1129.o1: "¡A las Armas!"
 USA_crisis_event.1130.t: "La Gran Rebelión"
 USA_crisis_event.1130.d: "Ahora tenemos una rebelión dentro de una rebelión. ¿Terminará alguna vez este caos?"
 USA_crisis_event.1130.o1: "¡Marchamos hacia Miami!"
 USA_crisis_event.1131.t: "El Loco de la Montaña"
 USA_crisis_event.1131.d: "Mientras la situación se descontrola, el estado de Idaho, considerando al estado tapón lakota como una forma de asegurar su aislamiento, ha declarado su independencia. Con la declaración del líder rebelde, que dice: \"Nuestro estado es como el de las Montañas Rocosas; no necesitamos ciudades sofisticadas ni ideologías divisivas\". Las autoridades federales buscan responder lo antes posible a otro desafío a su autoridad en la crisis actual."
 USA_crisis_event.1131.o1: "¿Cuántos Más Hay?"
 USA_crisis_event.1132.t: "Montañas con Hombres"
 USA_crisis_event.1132.d: "Mientras el gobierno federal busca extender su control tóxico sobre todos los que se resisten a sus trampas oligárquicas, debemos buscar defendernos a nosotros mismos y a nuestros hermanos y hermanas en armas que también desean que los dejen en paz."
 USA_crisis_event.1132.o1: "Resistid Firmes y Fuertes"
 USA_crisis_event.1133.t: "Otro Problema de Montañas"
 USA_crisis_event.1133.d: "Llegaremos a ellos eventualmente, pero aún debemos declarar nuestras intenciones obvias."
 USA_crisis_event.1133.o1: "Dios, por favor… ¡Nada más montañas!"
 USA_crisis_event.1134.t: "Soñando con California"
 USA_crisis_event.1134.d: "Parece que toda la nación sueña mientras nosotros vivimos una pesadilla. El gobernador de California ha declarado formalmente un estado de sucesión hasta que se llegue a un acuerdo con el gobierno federal de los llamados \"Estados Unidos\" o se alcance un alto el fuego. En ese caso, California negociará para considerar la reintegración o la independencia total."
 USA_crisis_event.1134.o1: "Oh, Qué Benevolentes Son…"
 USA_crisis_event.1135.t: "Llamad a la Guardia"
 USA_crisis_event.1135.d: "Esperamos, como quienes nos precedieron, ser rápida e injustamente acorralados. Con este claro y violento resultado asegurado, debemos movilizar las defensas y garantizar la seguridad de nuestro pueblo frente a la tiranía del este."
 USA_crisis_event.1135.o1: "Dios Bendiga a la República del Oso"
 USA_crisis_event.1136.t: "El Avance Occidental"
 USA_crisis_event.1136.d: "De mar a mar resplandeciente volveremos a ser una sola nación."
 USA_crisis_event.1136.o1: "¡Adelante!"
 USA_crisis_event.1137.t: "Grandes Lagos, Grandes Problemas"
 USA_crisis_event.1137.d: "Como si no fuera suficiente tener 19 estados ya confirmados en rebelión activa, parece que casi la mitad del país, si no ya, está indignada por el reciente desastre del gobierno federal. Debemos asegurarnos de que esto no vaya más lejos."
 USA_crisis_event.1137.o1: "La Pena de Muerte… ¿Quizás la Necesitamos?"
 USA_crisis_event.1138.t: "La Puerta del Norte"
 USA_crisis_event.1138.d: "La nación está en ruinas; solo podemos hacer lo que cualquier estado respetable debe hacer: proteger a su gente. Movilicemos a las masas y nos mantengamos firmes junto a nuestros estados hermanos."
 USA_crisis_event.1138.o1: "¡Defended la Democracia Misma!"
 USA_crisis_event.1139.t: "Nuestro Propio Sendero de Lágrimas"
 USA_crisis_event.1139.d: "Si queremos proteger a toda la nación, debemos atender a todos los estados problemáticos con el mismo tratamiento que a los orígenes de esta catástrofe."
 USA_crisis_event.1139.o1: "Dios, Por Favor, Que Esto Termine Ya…"
 USA_crisis_event.1140.t: "Ley de Conscripción de Emergencia"
 USA_crisis_event.1140.d: "Con el estado actual de las cosas, se ha implementado un servicio militar obligatorio en masa, similar al reclutamiento obligatorio. Elementos leales de la Guardia Nacional, así como el movimiento civil y los voluntarios, se han transformado en nuevos Regimientos de la Guardia Nacional."
 USA_crisis_event.1140.o1: "Dios nos Salve a Todos"