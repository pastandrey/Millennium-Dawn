 USA_removed_from_F35_TT: "§RSeremos eliminados del Programa F-35, y todos los pedidos serán cancelados§!\n\nPodríamos haber sido eliminados por una o más de las siguientes razones:\n- Un estado extranjero hostil a los Estados Unidos tiene el 20% o más de influencia sobre nosotros\n- Ya no somos un Aliado No OTAN importante, o parte de la OTAN (si anteriormente parte de la OTAN)\n- Somos objeto de una nación hostil a los Estados Unidos\n§CSi resolvemos estos problemas, podemos volver a solicitar y posiblemente ser aceptados§!"
