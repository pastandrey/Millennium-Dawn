 asteroid_mining_spotted_tt: "Con un asteroide detectado, tomará una pequeña cantidad de tiempo llevarlo a órbita, de 50 a 100 días.\n"
 asteroid_mining_orbit_tt: "Ahora que el asteroide está en órbita, las empresas enviarán drones mineros para extraer sus minerales.\n"
