 USA_focus_carrier_direction_dilemma: "Dilema sobre la Dirección de los Portaaviones"
 USA_focus_carrier_direction_dilemma_desc: "El papel del portaaviones moderno está divergiendo. Por un lado, está el método tradicional de \"aeropuerto móvil\". Por otro, está la idea de una plataforma móvil de cañones y/o misiles que también se apoya en los helicópteros sobre aeronaves de ala fija. Sea cual sea, debemos definirlo y empezar a trabajar en ello como si fuera ayer."
 USA_focus_aeronautical_development_board: "Junta de Desarrollo Aeronáutico"
 USA_focus_aeronautical_development_board_desc: "El BAD es un instituto dedicado al desarrollo de avances en aviación, ya sea en seguridad, sistemas de armas o cualquier otro ámbito. Sin embargo, para no agotar nuestros fondos ni sobrecargar a la población, debemos decidir en qué dirección se orientarán estos avances. Podemos centrarnos en asegurar la supremacía aérea o en un mayor apoyo terrestre o capacidades de bombardeo en general. Cualquiera de las dos opciones determinará nuestras preocupaciones futuras en caso de guerra."
 USA_fascist_operation_gran_colombia: "Operación Gran Colombia"
 USA_fascist_operation_gran_colombia_desc: "Los pasos finales están a la vuelta de la esquina, ahora que llevamos la lucha a la mitad sur de nuestro hemisferio. Usando Trinidad y Tobago como trampolín, podremos entonces invadir las naciones más pequeñas de Guyana y Surinam. Este trampolín nos permitirá avanzar hacia el oeste y conquistar la mitad superior de Sudamérica."
 USA_monarchist_dedicated_aeronautical_research_institute: "Instituto de Investigación Aeronáutica Dedicado"
 USA_monarchist_dedicated_aeronautical_research_institute_desc: "El ARI es un complejo de I+D dedicado a mejorar y desarrollar nuestra fuerza aérea para que sea más efectiva que nunca."
 USA_monarchist_gran_colombian_kingdom: "Reino de la Gran Colombia"
 USA_monarchist_gran_colombian_kingdom_desc: "Para iniciar el esfuerzo de unidad continental del Sur, nos acercaremos a Colombia y trabajaremos con ellos para restablecer el Reino de la Gran Colombia. Las viejas glorias siempre son una buena oferta para beneficio mutuo."
 USA_idea_aeronautical_development_board_fighter: "Junta de Desarrollo Aeronáutico - \"Enfoque en Cazas\""
 USA_idea_aeronautical_development_board_fighter_desc: "El presupuesto del ADB se ha priorizado hacia cualquier innovación que se pueda realizar en materia de cazas y/o superioridad aérea."
 USA_idea_aeronautical_development_board_bomber: "Junta de Desarrollo Aeronáutico - \"Enfoque en Bombardeos\""
 USA_idea_aeronautical_development_board_bomber_desc: "El presupuesto del ADB se ha priorizado hacia cualquier innovación que se pueda realizar en materia de bombarderos y/o apoyo terrestre."
 usa.94.t: ""
 usa.94.d: ""
 usa.94.a: ""
 USA_iranian_sanctions: "Sanciones a Irán"
 USA_iranian_sanctions_desc: "La [PER.GetFlag] Crisis de los Rehenes en Irán de 1979 provocó que la administración Carter implementara una serie de sanciones contra el gobierno iraní [PER.GetFlag] para castigarlo por sus acciones. Desde entonces, las administraciones presidenciales han mantenido posturas divergentes sobre la severidad de las [USA.GetFlag] sanciones estadounidenses contra los [PER.GetFlag] iraníes.\n\nSeveridad de las sanciones: [?USA_iran_sanction_level]/5"
 USA_increase_sanctions_on_iran: "Aumentar Sanciones a Irán"
 USA_increase_sanctions_on_iran_desc: "Nuestra administración ve la necesidad de castigar a Irán por sus acciones recientes."
 USA_decrease_sanctions_on_iran: "Reducir Sanciones a Irán"
 USA_decrease_sanctions_on_iran_desc: "El gobierno iraní se ha comportado bien últimamente, tal vez podamos aliviar las sanciones contra él por ahora."
 USA_lift_sanctions_on_iran: "Levantar Sanciones a Irán"
 USA_lift_sanctions_on_iran_desc: "Las sanciones no son más que una herramienta para perjudicar al pueblo iraní. Además, no tenemos ningún fundamento político para continuar con las sanciones contra los iraníes."
 USA_sanctioned_PER_recently: "Ha modificado las sanciones recientemente"
 USA_FOCUS.3.e: "Interesante."
 usa.89.o3: "¡No, y no vuelvas a preguntar!"
 usa.95.t: "Solicitud del Programa F-35 Denegada y en Lista Negra"
 usa.95.d: "Estados Unidos no estuvo dispuesto a permitirnos unirnos al programa F-35, alegando que aún no se puede confiar en que poseamos dicha tecnología. También nos han dicho que nos han prohibido volver a participar en el programa."
 usa.95.o1: "Bien"
 USA_disable_casualty_report: "Desactivar Informe Mensual de Bajas en Afganistán"
 USA_disable_casualty_report_desc: "Dejaremos de recibir información mensual sobre las bajas en Afganistán. En su lugar, los efectos se aplicarán sin previo aviso."
 USA_enable_casualty_report: "Reactivar Informe Mensual de Bajas en Afganistán"
 USA_enable_casualty_report_desc: "Comenzaremos a recibir eventos mensuales sobre las víctimas en Afganistán."
 USA_UKR_aid: "Ayuda Estadounidense-Ucraniana"
 USA_ISR_military_cooperation: "Cooperación Militar Estadounidense-Israelí"
 USA_CHI_trade_war: "Distanciamiento de la Cooperación Económica con China"
 USA_SAU_aid: "Compartir Inteligencia Militar Estadounidense"
 USA_tariff: "Aranceles Comerciales Estadounidenses"
 USA_SSU_aid: "Apoyo Militar Estadounidense"
 USA_afghan_mission_cost: "Misión O.E.F. – Afganistán"
 USA_afghan_mission_cost_desc: "Nuestro compromiso con la Operación Libertad Duradera y nuestra misión en Afganistán nos ha puesto en una situación única. Nuestra economía, gobierno y ejército absorberán gran parte del costo que implica mantener el control y la estabilidad en Afganistán.\n§W--------------§!\n¡Esta idea nacional será §Reliminada§! si retiramos nuestras fuerzas de Afganistán!"
 USA_afghan_mission_TT: "Desplegaremos [USA.GetFlag] tropas estadounidenses en [AFG.GetFlag] Afganistán.\n\nAl establecer nuestra presencia en [AFG.GetFlag] §HAfganistán§!:\n- Seremos responsables de la construcción nacional mediante inversiones económicas. Si no se logra una construcción nacional adecuada, [AFG.GetFlag] §HAfganistán§! podría resurgir como amenaza.\n- Si [AFG.GetFlag] §HAfganistán§! se encuentra inestable o no está preparado para cuando nos retiremos, es posible que se produzca un resurgimiento de grupos hostiles.\n- Nuestra misión en [AFG.GetFlag] §HAfganistán§! conllevará riesgos de ataques contra las [USA.GetFlag] tropas §HEstadounidenses§! desplegadas en la nación."
 USA_attack_tal_strength_TT: "£AFG_salafist_jihadism §HFuerza Mensual de los Talibanes en Afganistán§!: §G-2,00%§!"
 USA_disable_report_TT: "Podemos desactivar el informe mensual de siniestros en el menú de decisiones §HPolíticas Internas§!"
 usa.100.t: "Operación Libertad Duradera – Afganistán"
 usa.100.d: "El presidente [USA.GetLeader] anunció hoy desde la Casa Blanca el inicio de la Operación Libertad Duradera (OEF). Declaró que el objetivo de la misión es erradicar los remanentes talibanes y de Al-Qaeda del territorio afgano y restablecer la paz y la estabilidad en esta nación convulsa. Este compromiso con Afganistán marca un cambio importante en la política exterior estadounidense, ya que ahora Estados Unidos deberá adoptar una postura más activa en los asuntos internos de otros países para garantizar el cumplimiento de los objetivos de sus operaciones. Un gran despliegue en Afganistán también implicaría poner en riesgo a las tropas estadounidenses, lo que podría perjudicar gravemente la credibilidad del establishment estadounidense en el frente interno. Los resultados de la Operación Libertad Duradera en Afganistán están por verse, pero por ahora, las fuerzas estadounidenses se muestran optimistas respecto al cumplimiento de los objetivos de su misión."
 usa.100.a: "Interesante"
 usa.100.b: "El imperio Americano se expande"
 usa.101.t: "Militares se Enfrentan a Insurgentes Talibanes"
 usa.101.d: "Tras una patrulla de rutina, nuestras fuerzas fueron emboscadas por varios insurgentes talibanes ocultos en las montañas. Tras un breve enfrentamiento, varios militares resultaron heridos y, lamentablemente, algunos perdieron la vida. Sin embargo, las fuerzas talibanes sufrieron un duro revés en su último intento de frustrar nuestras acciones. Esta victoria por sí sola no basta para distraer a los medios de comunicación locales de las pérdidas sufridas."
 usa.101.a: "En Dios confiamos"
 department_of_state.123.t: "Estados Unidos Lanza Esfuerzos de Cooperación Verde"
 department_of_state.123.d: "Estados Unidos insta a su gobierno a avanzar con un acuerdo de energía verde impulsado por la anterior administración Clinton. El acuerdo nos exigiría abandonar las operaciones de perforación en varios yacimientos petrolíferos a cambio de parques solares financiados por Estados Unidos. El presidente de Estados Unidos, [USA.GetLeader], afirma que esta medida nos beneficiaría, ya que «reduciría considerablemente la contaminación en las grandes ciudades». Si bien algunos se muestran escépticos sobre por qué Estados Unidos no abandona varias operaciones mineras dentro de sus fronteras, esta es una oportunidad que solo se presenta una vez en la vida."
 department_of_state.123.a: "¿Dónde firmamos?"
 department_of_state.123.b: "Absolutamente no"
 department_of_state.2.t: "China Firma el Proyecto de Ley Verde"
 department_of_state.2.d: "El gobierno chino ha decidido firmar la Ley Verde que propusimos. Esto ha sorprendido a algunos miembros de nuestro gabinete, ya que las expectativas de un acuerdo con China eran bajas. Sin embargo, con la aprobación de esta ley, las inversiones estadounidenses fluirán a China y el potencial auge del sector verde estadounidense podría estar a la vuelta de la esquina."
 department_of_state.2.a: "¡Genial!"
 department_of_state.3.t: "China Ignora Nuestra Ley"
 department_of_state.3.d: "El gobierno chino simplemente ha ignorado por completo nuestra propuesta de Ley Verde. Esta ley habría impulsado al sector energético chino hacia una dirección más ecológica, pero parece que las nubes de Pekín aún no son lo suficientemente oscuras."
 department_of_state.3.a: "Su pérdida"
 department_of_state.4.t: "El Gran Boom de la Energía Verde"
 department_of_state.4.d: "Tras la importante inversión en contratistas de energía verde, las operaciones se han extendido desde China a partes de Estados Unidos. Esto se debe a que las empresas de energía verde pudieron crecer gracias a la inversión en el mercado, y ahora las vemos continuar con sus proyectos en otras partes del mundo y en Estados Unidos."
 department_of_state.4.a: "Los frutos de nuestra formulación de políticas"
 department_of_state.5.t: "Estados Unidos Propone la Iniciativa de Transición Civil"
 department_of_state.5.d: "El gobierno de Estados Unidos ha presentado una nueva propuesta. Sugiere que firmemos su acuerdo, que exigirá el desarme de ocho fábricas militares y, a cambio, Estados Unidos construirá 16 nuevas industrias civiles para reemplazarlas. Si bien la propuesta parece bastante atractiva, existe la preocupación de que forme parte de un plan estadounidense más amplio para debilitar paulatinamente las industrias militares rusas. Con esto en mente, nos beneficiará más aceptar su iniciativa, ya que nada impide que reconstruyamos estas industrias."
 department_of_state.5.a: "Adelante, fírmalo."
 department_of_state.5.b: "¿Nos consideran tontos?"
 department_of_state.6.t: "Rusia Acepta Firmar Nuestra Iniciativa"
 department_of_state.6.d: "El gobierno ruso ha anunciado que firmará la reciente iniciativa que presentamos. Aunque inesperado, estamos dispuestos a financiar este programa y a verlo completado. Ya han autorizado la entrada de contratistas estadounidenses y la supervisión para garantizar que las fábricas se transformen adecuadamente."
 department_of_state.6.a: "Bueno"
 department_of_state.7.t: "Rusia Rechaza Nuestra Propuesta"
 department_of_state.7.d: "El gobierno ruso ha decidido rechazar nuestras propuestas para una Iniciativa de Transición Rusa. Esta iniciativa habría supuesto el desmantelamiento de varias fábricas de armas por parte del gobierno ruso para que las industrias estadounidenses ocuparan su lugar."
 department_of_state.7.a: "Su pérdida"
 department_of_state.8.t: "[USA.GetLeader] Autoriza la Intervención Estadounidense en Somalia"
 department_of_state.8.d: "[USA.GetLeader] anunció hoy que las fuerzas armadas intervendrán para ayudar a restablecer la paz y la estabilidad en la región somalí. Esta medida probablemente se haya visto influenciada por el aumento de ataques piratas somalíes a buques estadounidenses. La medida ha generado reacciones encontradas, tanto dentro como fuera de Estados Unidos. Si el ejército estadounidense será capaz de restablecer la paz en la región es aún un tema de debate. Solo el tiempo dirá qué sucederá a continuación."
 department_of_state.8.a: "Interesante"
 department_of_state.8.b: "El imperialismo no tiene límites"
 department_of_state.900.t: "¡Estados Unidos Apoya a Sudán del Sur!"
 department_of_state.900.d: "Estados Unidos ha decidido involucrarse en nuestro conflicto, algo que no le corresponde. Enviarán apoyo a Sudán del Sur y planean atacar a nuestra nación."
 department_of_state.900.a: "Mierda"
 department_of_state.10.t: "Apoyo a Sudán del Sur"
 department_of_state.10.d: "El régimen criminal de Sudán ha decidido prolongar su guerra civil. Una guerra civil sin fundamento y plagada de crímenes de lesa humanidad. Sudán del Sur necesita nuestro apoyo para alcanzar su objetivo final: la liberación."
 department_of_state.10.a: "Autorizar el soporte completo"
 department_of_state.01.t: "Piratas Somalíes Atacan Nuestros Buques de Carga"
 department_of_state.01.d: "Piratas somalíes han asediado brutalmente varios cargueros que transportaban mercancías. Actualmente no tenemos contacto con la tripulación y desconocemos qué ocurrirá con el cargamento."
 department_of_state.01.a: "Maldita sea"
 department_of_state.9.t: "Estados Unidos Autoriza Ataques Aéreos contra Sudán"
 department_of_state.9.d: "Estados Unidos se movilizará para atacar objetivos en Sudán y así debilitar su capacidad de combatir al Ejército de Liberación del Pueblo Sudanés. [USA.GetLeader] también ha declarado que esta acción busca presionar al gobierno sudanés para que avance hacia un acuerdo de paz con los rebeldes del sur. Sudán lleva décadas sumido en una guerra civil, y la inestabilidad del país se intensifica cada día. Es cuestionable si las bombas estadounidenses lograrán la paz, pero es una acción que el gobierno estadounidense ha considerado necesaria."
 department_of_state.11.t: "Estados Unidos Solicita Nuestro Apoyo"
 department_of_state.11.d: "El gobierno de Washington nos ha pedido que apoyemos a Sudán del Sur mediante voluntarios y la exportación de armas. Sugieren que, si aceptamos, recibiremos una suma considerable por nuestra ayuda."
 department_of_state.11.a: "Bueno, veremos qué podemos hacer"
 department_of_state.11.b: "No"
 department_of_state.12.t: "[FROM.GetName] Comienza A Movilizar Tropas"
 department_of_state.12.d: "[FROM.GetName] ha comenzado a movilizar unidades para apoyar nuestro llamado a la acción tras nuestras solicitudes. Su ayuda no será olvidada y recibirán lo prometido."
 department_of_state.12.a: "Bueno"
 department_of_state.13.t: "[FROM.GetName] Rechazan Nuestra Solicitud"
 department_of_state.13.d: "[FROM.GetName] ha decidido que no quiere participar en ayudar a nuestra causa en Sudán y en su lugar ha optado por quedarse en casa."
 department_of_state.13.a: "De acuerdo"
 department_of_state.14.t: "Estados Unidos Propone una Iniciativa Minera"
 department_of_state.14.d: "Estados Unidos ofrece excavar en busca de recursos en una región relativamente pobre en recursos de nuestro país. Afirman que cubrirán la totalidad del costo de las operaciones y que lo que quede después de 10 años será nuestro."
 department_of_state.14.a: "Adelante"
 department_of_state.14.b: "No"
 department_of_state.15.t: "[FROM.GetName] Acepta Un Acuerdo de Minería"
 department_of_state.15.d: "[FROM.GetName] ha accedido a permitir que compañías mineras estadounidenses inviertan en regiones degradadas de su país para extraer metales preciosos. Han aceptado nuestros términos, que estipulan que conservaremos todo lo que encontremos durante 10 años, tras los cuales los derechos sobre los recursos se transferirán a sus líderes."
 department_of_state.15.a: "Bueno"
 department_of_state.16.t: "[FROM.GetName] Rechaza Acuerdo Minero"
 department_of_state.16.d: "[FROM.GetName] se ha negado a firmar contratos con compañías mineras estadounidenses, lo que perjudica nuestra capacidad de iniciar cualquier operación minera significativa en su país."
 department_of_state.16.a: "Desafortunado"
 department_of_state.17.t: "Fin del Contrato"
 department_of_state.17.d: "Nuestro contrato con los Estados Unidos expira hoy a medianoche, y el control de todos los recursos extraídos por los Estados Unidos será transferido a nuestro gobierno."
 department_of_state.17.a: "De acuerdo"
 department_of_state.18.t: "Fin del Contrato"
 department_of_state.18.d: "Nuestro contrato con [FROM.GetName] finaliza a medianoche, lo que nos obliga a transferir todos los derechos de recursos a [FROM.GetName] en las regiones donde hemos tenido operaciones mineras."
 department_of_state.18.a: "De acuerdo"
 department_of_state.19.t: "Estados Unidos Ofrece Apoyo a Nuestro País para la Recuperación de Territorios Perdidos"
 department_of_state.19.d: "Estados Unidos ha respaldado nuestras reivindicaciones sobre Abjasia y Osetia del Sur, instándonos a \"tomar medidas decisivas contra quienes han perjudicado al Estado georgiano\". Estados Unidos declaró estar dispuesto a respaldar a nuestras fuerzas armadas e incluso a solicitar la intervención de la OTAN si Rusia tomara represalias militares contra nosotros. Nos ofrecen grandes cantidades de armas y municiones para alcanzar nuestros objetivos."
 department_of_state.19.a: "América, lo has vuelto a hacer, hagámoslo."
 department_of_state.19.b: "No, los estadounidenses no son confiables"
 department_of_state.20.t: "Comienzo de las Operaciones"
 department_of_state.20.d: "Ha llegado el momento de ejecutar nuestros planes contra las regiones separatistas y recuperar lo que por derecho nos pertenece."
 department_of_state.20.a: "Adelante"
 department_of_state.21.t: "Georgia Ataca hacia el Norte"
 department_of_state.21.d: "Los georgianos han iniciado una serie de ataques contra territorios que consideran \"separatistas\" y han comenzado a instar a su ejército a iniciar una movilización masiva. Estos ataques representan una amenaza directa a nuestra influencia en el Cáucaso, ya que abren la puerta a una mayor explotación occidental. Si no hacemos nada, corremos el riesgo de parecer débiles. Si intervenimos, podríamos entrar en conflicto con el resto de Occidente."
 department_of_state.21.a: "Al infierno con los georgianos!"
 department_of_state.21.b: "No es nuestro problema"
 department_of_state.22.t: "Rusia Responde a los Ataques Georgianos"
 department_of_state.22.d: "Los rusos han decidido responder a la nueva serie de ataques georgianos contra el territorio del norte. Han declarado que el Estado georgiano se ha pasado de la raya y que esta acción constituye, de alguna manera, una amenaza directa a la existencia del Estado ruso. Prometimos a nuestros aliados georgianos ayuda si Rusia respondía, y ahora es el momento."
 department_of_state.22.a: "Llamamiento a celebrar una cumbre de la OTAN"
 department_of_state.22.b: "Nosotros hemos tenido un cambio de corazon"
 department_of_state.23.t: "Estados Unidos Solicita Nuestro Apoyo"
 department_of_state.23.d: "Georgia ha entrado en conflicto con Rusia, y parece que poco podría lograr sin ayuda extranjera. Estados Unidos pide a la OTAN que envíe voluntarios y armas a Georgia para ayudarles a alcanzar sus objetivos operativos."
 department_of_state.23.a: "Nosotros estamos en camino"
 department_of_state.23.b: "Este no es nuestro conflicto"
 department_of_state.24.t: "Conferencia de la OTAN sobre Georgia"
 department_of_state.24.d: "En respuesta a la entrada de Georgia en un conflicto a gran escala con Rusia, la OTAN ha convocado una conferencia de emergencia para evaluar la situación y coordinar una respuesta. Ante las dificultades para mantener el territorio de las fuerzas georgianas, Estados Unidos ha instado a los Estados miembros a apoyar a Georgia con ayuda militar, voluntarios y envíos de armas. Las críticas de los políticos rusos son avalanchas, ya que consideran la medida una amenaza directa a su existencia. La región sigue en vilo a medida que se desata la situación, y, en la situación actual, nadie sabe cómo terminará."
 department_of_state.24.a: "¡Georgia tiene derecho a defender sus intereses!"
 department_of_state.24.b: "Otra víctima del imperialismo Occidental"
 department_of_state.25.t: "¡Estados Unidos Nos Abandona!"
 department_of_state.25.d: "En una acción repentina e inesperada, Estados Unidos nos ha traicionado y ha incumplido su promesa. Afirman que, debido a las objeciones del Congreso, no pueden enviarnos adecuadamente el apoyo necesario para ganar el conflicto."
 department_of_state.25.a: "Esos bastardos"
 department_of_state.26.t: "Georgia Se Prepara para Iniciar Operaciones"
 department_of_state.26.d: "Ha llegado el momento de conceder a Georgia lo que le habíamos prometido y enviarle el apoyo armado necesario para hacer frente a la amenaza actual."
 department_of_state.26.a: "De acuerdo"
 department_of_state.27.t: "Georgia Rechaza Nuestra Solicitud"
 department_of_state.27.d: "El gobierno georgiano parece desinteresado en iniciar un conflicto con sus vecinos, ni siquiera para reunificar su patria. Por ahora, parece que prefiere estrechar lazos con Rusia en lugar de con Occidente."
 department_of_state.27.a: "De acuerdo"
 department_of_state.28.t: "Estados Unidos Ofrece el Proyecto SHORAD"
 department_of_state.28.d: "El gobierno de Estados Unidos ha ofrecido cubrir el costo de un proyecto SHORAD a nivel nacional para todos los miembros de la OTAN. Si bien el contrato incluye ciertas condiciones, como que los sitios SHORAD sean operados por personal estadounidense, estos ofrecerán un nivel de protección inigualable en comparación con otras defensas antiaéreas del mundo."
 department_of_state.28.a: "¿Donde firmamos?"
 department_of_state.28.b: "¡No, rechazamos esta amenaza a nuestra independencia!"
 department_of_state.29.t: "Disidentes Bielorrusos Ocupan Edificios Gubernamentales"
 department_of_state.29.d: "Hoy, aproximadamente a las 9:34 a. m., decenas de disidentes bielorrusos, armados únicamente con armas pequeñas, irrumpieron en varios edificios gubernamentales y los ocuparon. Las fuerzas militares y policiales bielorrusas hicieron poco por detener a estos rebeldes armados. Poco después, los disidentes transmitieron un anuncio de la cadena de televisión estatal declarando la caída del \"gobierno de los corruptos\". El gobierno ruso no se ha pronunciado oficialmente sobre la situación, pero, tal como está la situación, parece que este repentino acontecimiento ha tomado por sorpresa al mundo entero. Hay quienes acusan al gobierno de Estados Unidos de conspirar contra el gobierno bielorruso, pero Washington no ha hecho comentarios."
 department_of_state.29.a: "Los vientos del cambio soplan una vez más"
 department_of_state.30.t: "Se Escuchan Disparos en Toda Bielorrusia"
 department_of_state.30.d: "Residentes de Minsk y otras ciudades de Bielorrusia han reportado tiroteos, presuntamente entre rebeldes bielorrusos y fuerzas gubernamentales. Esto ocurre mientras rebeldes bielorrusos organizados comienzan a ocupar varios puestos gubernamentales en ciudades occidentales del país, declarando estas regiones como \"zonas libres de Bielorrusia\". Los rebeldes afirman que su único objetivo es derrocar el régimen de [BLR.GetLeader]. Se sospecha que los rebeldes fueron armados, financiados y entrenados por Estados Unidos. El Kremlin ha declarado que colaborará con el gobierno bielorruso para detener la invasión de territorio soberano de Bielorrusia y Rusia. Tras los comentarios rusos, [USA.GetLeader] ha prometido su apoyo a los rebeldes bielorrusos y ha pedido a varios estados miembros de la OTAN que colaboren en su apoyo."
 department_of_state.30.a: "Otro estado se derrumba"
 department_of_state.31.t: "Bielorrusia Cae Ante las Fuerzas Occidentales"
 department_of_state.31.d: "Parece que las fuerzas estadounidenses responsables de orquestar el caos en Bielorrusia han tenido éxito y ahora se encuentran en nuestra frontera. Este cambio de liderazgo ha preocupado a varios grupos y camarillas dentro de nuestro propio estado, temerosos de que los estadounidenses utilicen Bielorrusia como plataforma para nuevas agresiones contra nuestra soberanía. Debemos demostrar a Occidente que no les tememos y debemos actuar con rapidez y decisión. Pero la disuasión dependerá en gran medida de nuestras acciones futuras.."
 department_of_state.31.a: "¡Debemos ampliar nuestra propia alianza!"
 department_of_state.31.b: "¡Debemos tomar represalias en igualdad de condiciones!"
 department_of_state.32.t: "Rusia Nos Invita a Su Alianza"
 department_of_state.32.d: "El gobierno ruso nos ha invitado a su alianza, alegando que la reciente agresión de Occidente podría poner en peligro nuestro Estado."
 department_of_state.32.a: "¿Donde firmamos?"
 department_of_state.32.b: "¡Somos tu amigo Rusia, pero no somos tontos!"
 department_of_state.33.t: "Serbia Rechaza la Invitación"
 department_of_state.33.d: "El gobierno serbio ha rechazado nuestra invitación a nuestra alianza, afirmando que hacerlo sólo aumentaría aún más la tensión en el mundo."
 department_of_state.33.a: "Está bien"
 department_of_state.34.t: "Rusia Lanza un Ataque Total Contra los Países Bálticos"
 department_of_state.34.d: "El gobierno ruso ha lanzado un ataque total contra los estados bálticos, considerándose esta medida como una represalia a los recientes acontecimientos en Bielorrusia. Aún se desconoce si la OTAN responderá con una respuesta total a este último acontecimiento, pero varios miembros de la OTAN han declarado estar dispuestos a armar a los países bálticos para ayudar en la lucha contra Rusia. [SOV.GetLeader] ha declarado en un discurso televisado que esta medida tiene como objetivo \"preservar la soberanía nacional rusa\" y \"combatir el imperialismo occidental\" en la región del Báltico. La invasión está generando rápidamente condenas en todo el mundo y está incitando el temor de una guerra mundial inminente."
 department_of_state.34.a: "El mundo está al borde del abismo una vez más"
 department_of_state.35.t: "Colapso de la Autoridad Estatal en Siberia"
 department_of_state.35.d: "Siberia Oriental, una región antaño ferozmente custodiada por el Estado ruso, ahora es vulnerable a la explotación extranjera a niveles sin precedentes. Varios estados occidentales han iniciado el proceso de reconocimiento de esta naciente \"nación\" y piden a otras naciones independientes que sigan su ejemplo. En aras de la seguridad nacional y la protección de nuestras gloriosas fronteras, debemos tomar medidas preventivas para evitar la intrusión occidental en ellas."
 department_of_state.35.a: "Avanzar hacia Siberia y Establecer el Orden"
 department_of_state.35.b: "Es mejor que nos lo guardemos para nosotros mismos."
 department_of_state.36.t: "China Avanza para Ocupar el Este de Siberia"
 department_of_state.36.d: "El gobierno chino ha declarado oficialmente que Siberia Oriental es de interés fundamental para China y su pueblo. [CHI.GetLeader] ha manifestado su intención de desplegar tropas en la región para garantizar la paz y la estabilidad en la antigua región rusa. Si bien a primera vista el gobierno chino parece actuar por precaución, los expertos la consideran un intento de expandir la influencia económica global de China. Siberia es una región rica en petróleo y recursos naturales, lo que la convierte en un terreno privilegiado para las empresas e inversores chinos. Esta medida está generando rápidamente la condena de los países occidentales, y se espera que pronto se celebre una conferencia al respecto."
 department_of_state.36.a: "China recoge el botín de la guerra"
 department_of_state.37.t: "La Seguridad Nacional en Peligro Tras los Ataques Chinos"
 department_of_state.37.d: "Tras la toma china de lo que antes era la Siberia rusa, la geopolítica de la región ha cambiado drásticamente. Tras cosechar los frutos de la victoria, nuestros aliados de la OTAN ahora están en pánico ante la posibilidad de que China expanda su influencia más al oeste. Se reclama una solución permanente a este creciente problema.."
 department_of_state.37.a: "Convocar una cumbre de emergencia"
 department_of_state.37.b: "No es necesario, los Chinos no quieren hacer daño."
 department_of_state.38.t: ""
 department_of_state.38.d: ""
 department_of_state.38.a: ""
 department_of_state.3800.t: ""
 department_of_state.3800.d: ""
 department_of_state.3800.a: ""
 department_of_state.3801.t: ""
 department_of_state.3801.d: ""
 department_of_state.3801.a: ""
 department_of_state.39.t: "RUSFOR"
 department_of_state.39.d: "Nuestros socios de la OTAN nos instan a abandonar nuestras reivindicaciones sobre cualquier antiguo territorio ruso con la esperanza de crear una Rusia nueva, reunificada y pro-OTAN. A largo plazo, nos resultaría más beneficioso seguir el camino de la cooperación."
 department_of_state.39.a: "Dejemos que RUSFOR tome el control"
 department_of_state.39.b: "No"
 department_of_state.40.t: "La OTAN Convoca una Cumbre de Emergencia"
 department_of_state.40.d: "Los líderes de la OTAN se reunieron hoy en una cumbre de emergencia, cuyo principal tema de debate fue el futuro de la nación rusa. Tras una brutal derrota a manos de los países de la OTAN, la autoridad central rusa se derrumbó y muchas antiguas provincias se convirtieron en estados independientes. Sin dudarlo, el gobierno chino optó por explotar el vacío de poder dejado por Rusia y ocupó partes de Siberia Oriental, declarando una Región Administrativa Especial (RAE) de Siberia Oriental. Varios líderes de la OTAN, incluido el secretario general, afirman ahora que se establecerá una Fuerza Rusa de la OTAN (RUSFOR), con un mando central unificado ubicado en San Petersburgo."
 department_of_state.40.a: "¿Se convertirá Rusia en un estado fallido?"
 department_of_state.41.t: "Las Fuerzas de la OTAN Establecen RUSFOR"
 department_of_state.41.d: "Tras una cumbre de emergencia celebrada por la OTAN a principios de la semana pasada, se encargó a un comité sentar las bases para un gobierno ruso de transición. Como resultado, se estableció la misión RUSFOR y se estableció una zona de restauración de la OTAN en partes de lo que antiguamente era Rusia Occidental. Aunque la intención inicial era mantener un remanente de Rusia fracturado y desunido para evitar un efecto latigazo, la agresión china ha obligado a los líderes de la OTAN a reevaluar su postura. Varios estados están cediendo sus zonas de ocupación a favor de una zona de restauración de la OTAN, y se están elaborando planes para integrar a Rusia en la alianza y establecer un liderazgo civil en el país."
 department_of_state.41.a: "Ya había oído esta historia antes..."
 department_of_state.45.t: "Aumenta la Presión Internacional"
 department_of_state.45.d: "La presión internacional contra nosotros aumenta debido a nuestro control sobre el territorio ruso. Si nos negamos a renunciar a nuestras reivindicaciones, podríamos ser sancionados, y si cooperamos, podríamos obtener a cambio algo mejor que algunas tierras en conflicto."
 department_of_state.45.a: "Abandonamos nuestras reivindicaciones"
 department_of_state.45.b: "¡Nunca!"
 department_of_state.47.t: "La OTAN Celebra la 'Conferencia de Kaliningrado'"
 department_of_state.47.d: "Tras la derrota de las fuerzas rusas a manos de los ejércitos de la OTAN, la conferencia de Kaliningrado, organizada por los vencedores de lo que algunos han empezado a denominar la «Tercera Guerra Mundial», decide el destino de una nueva Rusia. Asisten varios jefes de estado, incluidos países no pertenecientes a la OTAN, para decidir la mejor estrategia de cara al futuro. El plan actual consiste en crear un gobierno de transición en el corazón de Rusia Occidental, y conceder la independencia a varios estados del Este y del Sur de Rusia."
 department_of_state.47.a: "Rusia está sobre la mesa, no como nación, sino como premio."
 department_of_state.48.t: "Una Nueva Era del Liderazgo Ruso"
 department_of_state.48.d: "Ha llegado el momento de que inauguremos al líder ruso, Alexéi Navalny. Como nuestra única y mejor opción, Navalny ha prometido liderar a Rusia hacia un estado más brillante, democrático e inclusivo."
 department_of_state.48.a: "Bienvenido, Navalny"
 department_of_state.49.t: "Estados Unidos se Acerca con una Solicitud"
 department_of_state.49.d: "Estados Unidos nos ha presentado una solicitud muy interesante. Nos sugiere establecer una alianza formal en el Pacífico, similar a la OTAN. Nos han contactado como posible líder de esta facción y nos piden que preparemos los documentos y las bases necesarios para una alianza que contrarreste la creciente influencia china en la región. También nos han solicitado que invitemos a Taiwán y Corea del Sur como los primeros miembros de esta facción."
 department_of_state.49.a: "Nosotros aceptaremos"
 department_of_state.49.b: "No, no podemos enfrentarnos a China"
 department_of_state.50.t: "Japón se Acerca a Nosotros con una Oferta"
 department_of_state.50.d: "El gobierno japonés nos ha ofrecido nuestra propia posición y seguridad en la recién formada alianza EAST. Afirman que la alianza ayudará a fortalecer la seguridad en Asia Oriental y a contener la expansión china. Unirnos a la facción podría darnos una ventaja sobre nuestros rivales, pero también podría ponernos directamente en su punto de mira."
 department_of_state.50.a: "Nosotros nos uniremos"
 department_of_state.50.b: "Esto suena demasiado arriesgado."
 department_of_state.51.t: "Japón Anuncia la Formación de EAST"
 department_of_state.51.d: "Tras una intensa campaña de presión por parte de políticos estadounidenses, el gobierno japonés cedió a las exigencias estadounidenses a principios de esta semana y anunció la formación de una facción similar a la OTAN. La alianza se denomina «EAST», siglas del «Tratado de Seguridad de Asia Oriental», y ya se la conoce como la OTAN de Asia. Esta facción trabajará para crear un cinturón de seguridad alrededor de China y frenar su creciente influencia. Si bien Japón y Estados Unidos han negado la evidente amenaza que esta facción pueda representar para China, se ha informado de que funcionarios chinos ya están preparando una respuesta a la medida."
 department_of_state.51.a: "Surge un nuevo bloque"
 department_of_state.51.b: "La decadencia occidental consume otro rincón del planeta.."
 department_of_state.52.t: "Estados Unidos Proporciona Inteligencia y Ayuda contra Irán"
 department_of_state.52.d: "Estados Unidos nos ha ofrecido acceso a información de inteligencia que podría ayudarnos a contrarrestar la creciente amenaza iraní. Si aceptamos, obtendremos una ventaja sobre los iraníes y, a cambio, Estados Unidos ganaría influencia sobre nuestra nación."
 department_of_state.52.a: "De acuerdo"
 department_of_state.52.b: "No"
 department_of_state.53.t: "[FROM.GetName] Acepta Nuestra Oferta"
 department_of_state.53.d: "[FROM.GetName] ha decidido aceptar nuestra oferta y ya ha comenzado a utilizar los recursos que le hemos ofrecido."
 department_of_state.53.a: "Vale la pena ser amigo de America"
 department_of_state.54.t: "[FROM.GetName] Rechaza Nuestra Oferta"
 department_of_state.54.d: "[FROM.GetName] ha decidido que le conviene dejar pasar los recursos que estábamos dispuestos a proporcionarle."
 department_of_state.54.a: "Su pérdida"
 department_of_state.55.t: "Estados Unidos Nos Insta a Tomar Medidas contra Transnistria"
 department_of_state.55.d: "Estados Unidos nos ha instado a tomar medidas inmediatas para desmantelar cualquier idea de un Estado transnistrio y a lanzar un ataque frontal contra las posiciones defensivas de Transnistria de inmediato. Afirman que si demoramos esta acción, podría ser demasiado tarde para hacer algo en el futuro. También afirman que proporcionarían apoyo material y personal si fuera necesario."
 department_of_state.55.a: "Preparar las fuerzas armadas"
 department_of_state.55.b: "Este es un movimiento demasiado arriesgado."
 department_of_state.56.t: "Moldavia Avanza sobre Transnistria"
 department_of_state.56.d: "El gobierno moldavo ha tomado la sabia decisión de seguir nuestro consejo y lanzar un ataque frontal contra los separatistas de Transnistria. Esta medida puede enfadar a Moscú, pero también los debilitará significativamente."
 department_of_state.56.a: "Bueno"
 department_of_state.57.t: "Moldavia Decide Ir en Contra de Nuestro Consejo"
 department_of_state.57.d: "El gobierno moldavo ha decidido que, debido a las circunstancias actuales, no podrá lanzar un ataque contra Transnistria. Afirma que la medida es demasiado arriesgada y no es una prioridad para el gobierno."
 department_of_state.57.a: "De acuerdo"
 department_of_state.58.t: "Moldavia se Prepara para Eliminar a los Separatistas de Transnistria"
 department_of_state.58.d: "Las fuerzas armadas moldavas anunciaron hoy el inicio de operaciones contra los separatistas de Transnistria en el este. Esta decisión es sorprendente, ya que Transnistria es un estado satélite de Moscú. El Kremlin aún no se ha pronunciado sobre los ataques, pero se espera que las fuerzas rusas apoyen a las fuerzas de Transnistria. Se especula ampliamente sobre la posible influencia de Estados Unidos en estos ataques, ya que varias fuentes dentro de Moldavia han declarado no haber sido informadas de la decisión."
 department_of_state.58.a: "¿Moldova volverá a reunificarse?"
 department_of_state.58.b: "Occidente continúa su expansión"
 department_of_state.59.t: "Estados Unidos Emite una Advertencia"
 department_of_state.59.d: "Estados Unidos ha emitido una advertencia sobre nuestro programa nuclear. Ha declarado que si en los próximos años no tomamos medidas para desmantelarlo, no tendrán más remedio que actuar. Si bien es difícil predecir si los estadounidenses realmente actuarán, una cosa es segura: harán todo lo posible para obstaculizar nuestro progreso."
 department_of_state.59.a: "Bueno, eso ya lo veremos."
 SOV_USA_nuke_ai: "¡DISENADO SÓLO PARA IA!"
