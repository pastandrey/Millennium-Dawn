 USR_Union_state_category: "Estado de la Unión"
 USR_Union_state_category_desc: "§YEl Estado de la Unión§! es un proyecto supranacional de [SOV.GetFlag]§YRusia§! y [BLR.GetFlag]§YBielorrusia§!, creado en la década de 1990 del siglo XX e iniciado en el año 2000. Una entidad supranacional única presupone la unión de dos estados y la integración en diversas áreas, como la militar, la económica y la política, sin perder la independencia.\nSerbia quiso en un principio formar parte de este proyecto, pero fue rechazada. Quizás ahora el Estado de la Unión pueda aceptar a más países."
