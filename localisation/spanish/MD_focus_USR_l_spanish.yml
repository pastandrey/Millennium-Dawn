 union_state.1.t: "Han acordado crear un Estado de unión con nosotros"
 union_state.1.d: "Finalmente, el Estado de la Unión no solo existirá en el papel, sino en la realidad. Tenemos un futuro brillante por delante."
 union_state.1.a: "¡Finalmente!"
 union_state.2.t: "Se niegan a crear un Estado de unión con nosotros"
 union_state.2.d: "Quizás hemos elegido el camino equivocado y Rusia no necesita la hermandad de nuestros pueblos."
 union_state.2.a: "Es triste"
 union_state.3.t: "Rusia Lanza Un Ultimátum Sobre La Cuestión del Estado de la Unión"
 union_state.3.d: "El gobierno ruso nos está dando un duro ultimátum sobre la cuestión del Estado de la Unión. O lo firmamos, o habrá consecuencias negativas. ¿Deberíamos sucumbir a tales provocaciones?"
 union_state.3.a: "Firmaremos La Integración En El Estado De La Unión"
 union_state.3.b: "No"
 union_state.4.t: "El Estado de la Unión"
 union_state.4.d: "El gobierno bielorruso acordó firmar de inmediato el tratado sobre la creación del Estado de la Unión en su totalidad."
 union_state.4.a: "Bueno"
 union_state.5.t: "El Estado de la Unión"
 union_state.5.d: "El gobierno bielorruso se negó a firmar de inmediato el tratado sobre la creación del Estado de la Unión en su totalidad."
 union_state.5.a: "Triste"
 union_state.6.t: "Rusia Lanza Un Ultimátum Sobre La Cuestión del Estado de la Unión"
 union_state.6.d: "El gobierno ruso nos está dando un duro ultimátum sobre la cuestión del Estado de la Unión. O lo firmamos, o habrá consecuencias negativas. ¿Deberíamos sucumbir a tales provocaciones?"
 union_state.6.a: "Firmaremos La Integración En El Estado De La Unión"
 union_state.6.b: "No"
 union_state.7.t: "El Estado de la Unión"
 union_state.7.d: "El Estado de la Unión regresa a ustedes y está dispuesto a firmar con nosotros la ratificación del acuerdo sobre su creación. Solo nos queda decidir si estamos preparados para una medida política tan arriesgada."
 union_state.7.a: "Sí, creamos un estado de unión"
 union_state.7.b: "No"
 union_state.8.t: "[FROM.GetNameWithFlag] Se ha Negado a Crear un Estado de la Unión"
 union_state.8.d: "Nos han rechazado otra vez, quizás su gobierno aún no ha madurado, pero lo volveremos a intentar."
 union_state.8.a: "Triste"
 union_state.9.t: "El Estado de la Unión con [FROM.GetNameWithFlag]"
 union_state.9.d: "[FROM.GetNameWithFlag] ha comenzado los preparativos para unirse al Estado de la Unión. Esta es una noticia inesperada para nosotros, ya que ya habían solicitado su ingreso una vez, pero lo hicieron durante eventos trágicos para ellos y una situación terrible para nosotros. Quizás las cosas sean diferentes ahora."
 union_state.9.a: "Bueno"
 union_state.10.t: "El Estado de la Unión"
 union_state.10.d: "El Estado de la Unión regresa a ustedes y está dispuesto a firmar con nosotros la ratificación del acuerdo sobre su creación. Solo nos queda decidir si estamos preparados para una medida política tan arriesgada."
 union_state.10.a: "Sí, creamos un estado de unión"
 union_state.10.b: "No"
 union_state.11.t: "[UKR.GetNameWithFlag] Quiere la Integración en el Estado de la Unión"
 union_state.11.d: "[UKR.GetNameWithFlag] ha declarado que ha completado todos los procesos para la integración en el estado de la unión y ahora decidiremos si estamos listos para crear este estado con ellos."
 union_state.11.a: "Sí"
 union_state.11.b: "No"
 union_state.12.t: "El Estado de la Unión"
 union_state.12.d: "Rusia se negó a crear un Estado de la Unión con nosotros, fue algo inesperado para nosotros."
 union_state.12.a: "Triste"
 union_state_news.1.t: "Rusia y Bielorrusia han Creado un Estado de la Unión"
 union_state_news.1.d: "El proyecto del Estado de la Unión, vigente desde finales de los años 90, implica la creación de una entidad supranacional entre Rusia y Bielorrusia. Durante todos estos años, ambos países han avanzado a ritmos diferentes hacia la creación de esta asociación y finalmente están listos para anunciar la creación de un nuevo sujeto de relaciones internacionales: el Estado de la Unión de Rusia y Bielorrusia."
 union_state_news.1.a: "Interesante."
 union_state_news.2.t: "Rusia y Serbia han Creado un Estado de la Unión"
 union_state_news.2.d: "El proyecto del Estado de la Unión, vigente desde finales de los años 90, implica la creación de una entidad supranacional entre Rusia y Bielorrusia. En esa misma década, Serbia solicitó su adhesión al Estado de la Unión, pero la Duma Estatal rusa rechazó la propuesta. Ahora, el gobierno serbio ha logrado implementar este proyecto y crear un Estado de la Unión de Rusia y Serbia."
 union_state_news.2.a: "Interesante."
 union_state_news.3.t: "Rusia y Ucrania han Creado un Estado de la Unión"
 union_state_news.3.d: "El proyecto del Estado de la Unión, vigente desde finales de los años 90, implica la creación de una entidad supranacional entre Rusia y Bielorrusia. Ucrania nunca aspiró inicialmente a formar parte de esta entidad, pero muchos predijeron su pertenencia al Estado de la Unión, y quizás no en vano. Ahora existe un Estado de la Unión de Rusia y Ucrania en el mapa político mundial."
 union_state_news.3.a: "Interesante."
 union_state.13.t: "El Estado de la Unión"
 union_state.13.d: "El Estado de la Unión regresa a ustedes y está dispuesto a firmar con nosotros la ratificación del acuerdo sobre su creación. Solo nos queda decidir si estamos preparados para una medida política tan arriesgada."
 union_state.13.a: "Sí, creamos un estado de unión"
 union_state.13.b: "No"
 union_state.14.t: "[ARM.GetNameWithFlag] Quiere la Integración en el Estado de la Unión"
 union_state.14.d: "[ARM.GetNameWithFlag] ha declarado que ha completado todos los procesos para la integración en el estado de la unión y ahora decidiremos si estamos listos para crear este estado con ellos."
 union_state.14.a: "Sí"
 union_state.14.b: "No"
 union_state.15.t: "El Estado de la Unión"
 union_state.15.d: "Rusia se negó a crear un Estado de la Unión con nosotros, fue algo inesperado para nosotros."
 union_state.15.a: "Triste"
 union_state_news.4.t: "Rusia y Armenia han Creado un Estado de la Unión"
 union_state_news.4.d: "El proyecto del Estado de la Unión, vigente desde finales de los años 90, implica la creación de una entidad supranacional entre Rusia y Bielorrusia. Armenia nunca aspiró inicialmente a formar parte de esta entidad, pero muchos predijeron su pertenencia al Estado de la Unión, y quizás no en vano. Ahora existe un Estado de la Unión de Rusia y Armenia en el mapa político mundial."
 union_state_news.4.a: "Interesante."
