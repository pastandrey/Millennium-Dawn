 union_state.16.t: "Agrupación Regional de Tropas en [ARM.GetName]"
 union_state.16.d: "Los gobiernos de Armenia y Rusia han decidido ampliar el grupo conjunto de fuerzas del Estado de la Unión, y la integración de las fuerzas armadas de los dos estados se ha vuelto aún más fuerte."
 union_state.16.a: "Bueno"
 union_state.17.t: "Armas Nucleares en [ARM.GetName]"
 union_state.17.d: "El gobierno de Armenia, en el marco del Estado de la Unión, ha solicitado que desplieguemos armas nucleares en su territorio para proteger su integridad territorial en caso de un ataque de países hostiles, lo que claramente será percibido por sus vecinos como un acto de agresión."
 union_state.17.a: "Las Armas Nucleares Llegan a Ereván"
 union_state.17.b: "No"
 union_state.18.t: "Armas Nucleares en [ARM.GetName]"
 union_state.18.d: "El gobierno ruso ha acordado desplegar armas nucleares en nuestro territorio para protegernos de posibles agresores. ¡Nos alegra que comprendan nuestro valor!"
 union_state.18.a: "Bien"
 union_state.19.t: "Armas Nucleares en [ARM.GetName]"
 union_state.19.d: "El gobierno ruso se ha negado a desplegar armas nucleares en nuestro territorio para protegerse de posibles agresores. Esto nos entristece; al parecer, nos consideran una línea de defensa y nada más."
 union_state.19.a: "Triste"
 union_state.20.t: "Expansión de la Integración Económica"
 union_state.20.d: "[FROM.GetName] ha ampliado su integración económica en el Estado de la Unión, y ahora nuestras economías están aún más cerca que antes."
 union_state.20.a: "Bueno"
 union_state.21.t: "El Estado de la Unión se ha Vuelto Más Pequeño"
 union_state.21.d: "[FROM.GetName] anunció su retirada del Estado de la Unión, debido a la inconsistencia de estar en él con sus intereses políticos."
 union_state.21.a: "Triste"
 union_state.22.t: "La Cruzada del Estado de la Unión"
 union_state.22.d: "La Cruzada declarada por Rusia también se inscribe en la doctrina de política exterior del Estado de la Unión. ¡Juntos avanzaremos hacia nuestro objetivo común!"
 union_state.22.a: "¡Hurra!"
 union_state.23.t: "La Cruzada del Estado de la Unión"
 union_state.23.d: "La Cruzada declarada por Rusia también se inscribe en la doctrina de política exterior del Estado de la Unión. ¡Juntos avanzaremos hacia nuestro objetivo común!"
 union_state.23.a: "¡Hurra!"
 union_state.24.t: "La Doctrina Antioccidental del Estado de la Unión"
 union_state.24.d: "La Doctrina Antioccidental de Rusia también encaja en la doctrina de política exterior del Estado de la Unión. ¡Juntos avanzaremos hacia nuestro objetivo común!"
 union_state.24.a: "¡Hurra!"
 union_state.25.t: "Inversiones del Presupuesto del Estado de la Unión"
 union_state.25.d: "[FROM.GetName] solicita inversiones del presupuesto del Estado de la Unión (es decir, del nuestro). Deben solicitarlo dada la precaria situación económica. Según sus declaraciones, ¿les ayudaremos?"
 union_state.25.a: "Vamos a Ayudarlos"
 union_state.25.b: "El Presupuesto No es Infinito"
 union_state.26.t: "Inversiones del Presupuesto del Estado de la Unión"
 union_state.26.d: "¡Nuestra solicitud fue atendida y recibimos las inversiones necesarias del presupuesto del Estado de la Unión!."
 union_state.26.a: "Bien"
 union_state.27.t: "Inversiones del Presupuesto del Estado de la Unión"
 union_state.27.d: "Nuestra solicitud de inversión fue rechazada, parece que no podemos confiar en las finanzas del estado de la Unión."
 union_state.27.a: "Triste"
 union_state_belarus.1.t: "Golpe de Estado pro-Unión"
 union_state_belarus.1.d: "Intentamos dar un golpe de poder en Bielorrusia utilizando todos nuestros recursos administrativos y policiales, así como nuestras conexiones."
 union_state_belarus.1.a: "Veamos el Resultado"
 union_state_armenia.1.t: "Operación Militar en Azerbaiyán"
 union_state_armenia.1.d: "Armenia, o mejor dicho, sus representantes en el Estado de la Unión, lanzaron hoy una retórica agresiva exigiendo un ataque inmediato contra Azerbaiyán y el fin de la amenaza al Estado de la Unión en el Cáucaso. Naturalmente, más tarde, los líderes armenios nos pidieron personalmente que iniciáramos una guerra."
 union_state_armenia.1.a: "Es Hora de Acabar con Azerbaiyán"
 union_state_armenia.1.b: "Es una locura"
 union_state_armenia.2.t: "Operación Militar en Azerbaiyán"
 union_state_armenia.2.d: "Rusia aceptó nuestra oferta y anunció el inicio inmediato de una operación militar en Azerbaiyán. ¡Por fin terminarán!"
 union_state_armenia.2.a: "Es Hora de Acabar con Azerbaiyán"
 union_state_armenia.3.t: "Operación Militar en Azerbaiyán"
 union_state_armenia.3.d: "Rusia rechazó nuestra propuesta de invadir Azerbaiyán, considerando nuestra idea una manifestación loca de agresión que no corresponde a la ideología del Estado de la Unión."
 union_state_armenia.3.a: "Triste"
 union_state_armenia.4.t: "Armenia Pide Ayuda a Polonia"
 union_state_armenia.4.d: "El gobierno armenio tomó recientemente el control del gobierno en Polonia, lo que provocó una guerra civil allí. Ahora Armenia nos pide ayuda para defender su independencia."
 union_state_armenia.4.a: "Enviar GRU"
 union_state_armenia.4.b: "Enviar PMC de Wagner"
 union_state_armenia.4.c: "Enviar GRU y PMC de Wagner"
 union_state_armenia.4.f: "No Enviaremos a Nadie."
 union_state_armenia.5.t: "Rusia Envía Ayuda a Nuestro Títere"
 union_state_armenia.5.d: "Rusia ha aceptado ayudar a Nuestro Títere y le envía apoyo adicional en forma de varios batallones de servicios especiales."
 union_state_armenia.5.a: "Bien"
 union_state_armenia.6.t: "Rusia se Negó a Ayudar a Nuestro Títere"
 union_state_armenia.6.d: "Rusia rechazó nuestra petición de ayuda en Nuestro Títere, considerando que ese era sólo nuestro problema, porque fuimos nosotros quienes organizamos este golpe."
 union_state_armenia.6.a: "Triste"
 union_state_armenia.7.t: "Armenia Pide Ayuda a Italia"
 union_state_armenia.7.d: "El gobierno armenio tomó recientemente el control del gobierno en Italia, lo que provocó una guerra civil allí. Ahora Armenia nos pide ayuda para defender la independencia de Italia."
 union_state_armenia.7.a: "Enviar GRU"
 union_state_armenia.7.b: "Enviar PMC de Wagner"
 union_state_armenia.7.c: "Enviar GRU y PMC de Wagner"
 union_state_armenia.7.f: "No Enviaremos a Nadie."
 union_state_armenia.8.t: "Operación Antiseparatista Conjunta en El Cáucaso"
 union_state_armenia.8.d: "El gobierno ruso sugiere que llevemos a cabo una incursión antiseparatista conjunta en el Cáucaso ruso contra los radicales separatistas de estas repúblicas. Brindaremos asistencia a Rusia y aumentaremos nuestro peso político en el Estado de la Unión."
 union_state_armenia.8.a: "Estamos de Acuerdo"
 union_state_armenia.8.b: "No Estamos de Acuerdo"
 union_state_armenia.9.t: "Operación Antiseparatista Conjunta en El Cáucaso"
 union_state_armenia.9.d: "El gobierno armenio ha acordado llevar a cabo una operación antiseparatista conjunta en el Cáucaso con nuestros servicios especiales."
 union_state_armenia.9.a: "Bien"
 union_state_armenia.10.t: "Operación Antiseparatista Conjunta en El Cáucaso"
 union_state_armenia.10.d: "El gobierno armenio se negó a realizar una operación antiseparatista conjunta en el Cáucaso con nuestros servicios especiales."
 union_state_armenia.10.a: "Triste"
 union_state_armenia.11.t: "Golpe de Estado pro-Unión"
 union_state_armenia.11.d: "Intentamos llevar a cabo un golpe de poder en Armenia utilizando todos nuestros recursos administrativos y policiales, así como nuestras conexiones."
 union_state_armenia.11.a: "Veamos el Resultado"
 union_state_armenia.12.t: "Servicios de Inteligencia de la Unión de Armenia y Rusia"
 union_state_armenia.12.d: "La cooperación entre Armenia y Rusia dentro del Estado de la Unión continúa expandiéndose. Se firmó un acuerdo para la creación de una agencia de coordinación única entre nuestros servicios especiales para una mejor cooperación en actividades internas y externas."
 union_state_armenia.12.a: "Bien"
 union_state_news.5.t: "Operación militar \"Oil Ridge\""
 union_state_news.5.d: "Rusia y Armenia, en el marco del Estado de la Unión, anunciaron el inicio de una operación militar en el territorio de Azerbaiyán para eliminar la amenaza al Estado de la Unión y reducir potencialmente la influencia de las fuerzas políticas enemigas en el Cáucaso."
 union_state_news.5.a: "Interesante."