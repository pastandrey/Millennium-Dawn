 STEEL_STORAGE_TOTAL_DELAYED_TT: "El primer número en blanco representa la cantidad de recurso almacenado. El segundo número representa la cantidad de recurso que se almacena cada día o la cantidad que se extrae del almacenamiento cada día. Si el número es verde, el recurso se está añadiendo. Si es rojo, el recurso se está retirando."
