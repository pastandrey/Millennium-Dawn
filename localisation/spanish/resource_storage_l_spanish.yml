l_spanish:
 RESOURCE_STORAGE_HEADER: "§YALMACENAMIENTO§!"
 OPEN_STORAGE_BUTTON: "Abre la interfaz d §YAlmacenamiento de Recursos§!"
 OPEN_STORAGE_BUTTON_TT: "Abre el menú §YAlmacenamiento de Recursos§!, donde puedes ver cuántos recursos tienes actualmente en tus §YReservas Estratégicas de Recursos§!.\n\nNOTA: El §YAlmacenamiento de Recursos§! tiene una limitación del motor, por lo que si estás en §YEconomía de Exportación§! o §YEconomía de Comercio Globalizada§!, podrías terminar enviando más recursos para exportar que a las líneas de producción que necesitas. Si necesitas empezar a retirar recursos del almacenamiento, se recomienda cambiar a §YEconomía Mixta§! o inferior.\n"
