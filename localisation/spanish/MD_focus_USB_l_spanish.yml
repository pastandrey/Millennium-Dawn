l_spanish:
 free_states_of_america_focus: "Árbol De Enfoque De Los Estados Libres De América"
 free_america_focus_establishing_a_govt: "Estableciendo Un Gobierno"
 free_america_focus_establishing_a_govt_desc: "El caos consume las calles, debemos asegurar un mando central de gobierno civil si es que vamos a pensar en hacer algo."
 free_america_focus_creating_a_police_force: "Creando Una Fuerza Policial"
 free_america_focus_creating_a_police_force_desc: "Con un gobierno civil en su lugar, tenemos que reestablecer un departamento de orden civil. Se establecerá el Departamento de Asuntos Civiles y planificará, así como establecerá estaciones de policía estratégicas para ayudar a configurar rápidamente una fuerza policial provisional para reprimir el desorden general."
 free_america_focus_organizing_the_militias: "Organizando Las Milicias"
 free_america_focus_organizing_the_militias_desc: "Las pandillas errantes aún causan cantidades masivas de daño continuo. ¿Cómo vamos a crear algún sentido de una nueva sociedad si ni siquiera podemos cesar la naturaleza destructiva de estos anarquistas? Tenemos guardias estatales, guardias nacionales y algunos restos del ejército, así que intentemos armar este rompecabezas y veamos qué tipo de imagen haremos con él, si es que hacemos alguna."
 free_america_focus_rebuilding_the_economy: "Reconstruyendo La Economía"
 free_america_focus_rebuilding_the_economy_desc: "No es mucho, pero es un trabajo honesto... y francamente cualquier trabajo es mejor que ningún trabajo."
 free_america_focus_backyard_battleground: "Campo De Batalla Trasero"
 free_america_focus_backyard_battleground_desc: "Con el caos mayormente terminado y la región de la capital directa siendo tan estable como sea posible, debemos buscar controlar el estado de Maryland si es que vamos a llegar a alguna parte en cualquier momento pronto. Las inversiones en mano de obra, seguridad y economía se realizarán al por mayor para asegurar el control y la estabilidad del estado."
 free_america_focus_from_backyard_to_frontyard: "De Patio Trasero A Patio Delantero"
 free_america_focus_from_backyard_to_frontyard_desc: "Con las inversiones económicas y civiles viene ahora la naturalización de la ley y el orden. Establecer servicios civiles y leyes podrá solidificar nuestro control del patio trasero que es el estado de Maryland. Así que lo convertiremos en el ejemplo del patio delantero bajo el cual unir a nuestra nación bajo la nueva bandera de los Estados Libres de América."
 free_america_focus_the_old_dominion_state: "El Estado De La Vieja Dominación"
 free_america_focus_the_old_dominion_state_desc: "De alguna manera hemos podido mantener en nuestras manos el viejo estado de Dominación que es Virginia. Aunque muchos pensaron que se habrían ido con los del sur, debemos haber hecho algo lo suficientemente bueno como para que se consideren parte de nosotros. Sin embargo, su estado es arcaico y desordenado como el resto de nuestra \"nación\". Así que debemos invertir y reconstruirlo si planeamos traer de vuelta al redil algo de sentido de una nación."
 free_america_focus_norfolk_novelty: "Novedad De Norfolk"
 free_america_focus_norfolk_novelty_desc: "Con el orden civil y la estabilidad económica asegurados, podemos llevar a la vieja dominación a una nueva luz. Por el futuro nos unimos, por el futuro defendemos nuestros derechos. Por los Estados Libres."
 free_america_focus_black_pearl_state: "El Estado De La Perla Negra"
 free_america_focus_black_pearl_state_desc: "De las cenizas del país del carbón llega Virginia Occidental. Conocida por ser casi un estado fantasma desde su fracaso en diversificarse y modernizarse por completo. Su caída de la gracia debido a que el carbón más sulfúrico del estado se volvió inutilizable en la era moderna. Necesitamos mostrar más amor al estado, darle vida para que pueda vivir dentro de nuestra unión. Quién sabe, tal vez algún día la gente llame a Virginia Occidental una nueva Mountain Momma."
 free_america_focus_parkersburg_perfection: "Perfección De Parkersburg"
 free_america_focus_parkersburg_perfection_desc: "El carbón se mina una vez más, la economía es estable una vez más. El estado de Virginia Occidental está mirando hacia el cielo para nuevas aspiraciones y ahora debemos guiarlos y ayudarlos limpiando las calles y restaurando los servicios civiles. Las Blue Ridges brillarán una vez más."
 free_america_focus_the_commonwealth_state: "El Estado De La Mancomunidad"
 free_america_focus_the_commonwealth_state_desc: "Pensilvania, un estado de diversidad en tierras y pueblos. Con una rica historia en la industria, el ferrocarril y la historia estadounidense misma, debemos buscar asegurar la estabilidad y el futuro económico del Estado de la Mancomunidad si es que vamos a asegurarnos de que nuestra unión esté completa."
 free_america_focus_from_rust_to_shine: "Del Óxido Al Brillo"
 free_america_focus_from_rust_to_shine_desc: "De la decadencia oxidada de una sociedad postindustrial, al faro brillante de un dinámico digital diversificado, el estado de la mancomunidad será una pieza dentro del rompecabezas de nuestra nueva gran nación."
 free_america_focus_delaware_dilemma: "Dilema De Delaware"
 free_america_focus_delaware_dilemma_desc: "Al igual que en la guerra revolucionaria, debemos cruzar el río Delaware, solo que no para destruir a un enemigo, sino para reconstruir y traer a un amigo."
 free_america_focus_delaware_delight: "Deleite De Delaware"
 free_america_focus_delaware_delight_desc: "De las ruinas económicas al frente orgulloso de la revitalización, abrazamos otro estado querido de regreso a nuestros amorosos brazos. Adelante nos movemos hacia un futuro más brillante, para deleitarnos en la compañía que ahora compartimos."
 free_america_focus_the_jersey_jumpstart: "El Salto De Jersey"
 free_america_focus_the_jersey_jumpstart_desc: "Uno de los estados más lejanos dentro de nuestro reino, sin embargo, también la otra mitad de nuestra porción del cinturón de óxido. Debemos revivir el estado y darle un impulso si es que vamos a establecer el curso adecuado y tener una nación completa una vez más."
 free_america_focus_the_trenton_turnaround: "El Giro De Trenton"
 free_america_focus_the_trenton_turnaround_desc: "En las calles aclaman, porque el triunfo de Trenton ha llegado aquí. La gente de Nueva Jersey disfrutará de paz y nueva prosperidad no solo de nuestra inversión económica, sino del cuidado y el orden civil que crearemos al reintroducir servicios civiles."
 free_america_focus_the_great_reclamation: "La Gran Reclamación"
 free_america_focus_the_great_reclamation_desc: "A través de innumerables inversiones, planificación cuidadosa y una verdadera muestra de determinación nacional. Ahora realmente podemos quitarnos las cadenas del viejo mundo, viejos ideales y mirar hacia un futuro, un futuro de libertad. Ahora realmente podemos decir con orgullo que somos, los Estados Libres."
 free_america_focus_the_elections_question: "La Pregunta De Las Elecciones"
 free_america_focus_the_elections_question_desc: "Ahora que la nación finalmente se ha reorganizado lo suficiente como para crear una discusión política real, nos enfrentamos a la realidad de qué queremos en estos primeros días de nuestra nueva nación. Algunos quieren elecciones y otros solo quieren estabilidad; al final, solo el tiempo dirá dónde radican las ambiciones de la nación."
 free_america_focus_ban_elections: "Prohibir las Elecciones por Ahora"
 free_america_focus_ban_elections_desc: "Necesitamos enfocarnos en el presente, dejar de deleitarnos con el pasado y dejar de soñar con el supuesto futuro que necesitamos. Lo que necesitamos es estabilidad y acción para dirigir la nación ahora, para poder preocuparnos por nuestro futuro más adelante."
 free_america_focus_establish_elections: "Establecimiento de Elecciones"
 free_america_focus_establish_elections_desc: "Debemos llegar a un acuerdo como nación sobre la dirección que queremos tomar; por lo tanto, se celebrarán nuevas elecciones y el pueblo elegirá el futuro."
 free_america_focus_federalist_rightist: "Victoria de la Derecha Federalista"
 free_america_focus_federalist_rightist_desc: "Con el debate electoral resuelto, el referéndum nacional ha visto al Partido Federalista ganar y ser el gobierno en funciones en el futuro previsible. Pero con esto también llega la realidad de que la facción derechista anti-elección ha asegurado la dominancia. Veremos qué decisiones toman para liderar este nuevo faro de esperanza."
 free_america_focus_federal_taxes_when_needed_not_wanted: "Ley Christan Sandsworth"
 free_america_focus_federal_taxes_when_needed_not_wanted_desc: "La Ley Christan Sandsworth es una nueva forma de ver cómo crear y reformar un código tributario para una sociedad. Sesiones especiales para cambiar o reformar partes del código tributario pueden ser convocadas tanto por el presidente como por el líder principal de las dos cámaras del congreso. Esta sesión se centrará en un tema central dentro del código tributario y votará para cambiarlo y/o reformarlo o votará para desestimar la medida. El principio principal ahora es que los legisladores y las personas buscan crear un código tributario basado en la necesidad más que en el deseo. ¿Qué necesita la nación y nuestra sociedad ahora, en lugar de lo que desean en cualquier momento."
 free_america_focus_federal_many_hands_act: "Ley de Trabajadores Duros"
 free_america_focus_federal_many_hands_act_desc: "La LHT es una serie de reformas para ayudar a impulsar el crecimiento económico y el empleo. Aunque todavía estamos en la edad de piedra, podemos, sin embargo, trabajar en impulsar el camino hacia el refinamiento. Nuestras ineficiencias serán igualadas por nuestros trabajadores probados y confiables. Entendiendo la necesidad de hacer lo nuevo de lo viejo, nuestras reformas legislativas buscan instilar una nueva forma de patriotismo a través del lugar de trabajo. Trabaja duro ahora para que podamos jugar aún más duro después."
 free_america_focus_federal_societal_progress_act: "Ley de Progreso Social"
 free_america_focus_federal_societal_progress_act_desc: "La LPS buscará hacer que los cambios en la sociedad se conviertan más en un problema de las personas que en un problema político. Los estados y localidades pueden aprobar, reformar y crear sus leyes que puedan hacer cumplir la continuidad del orden civil y la conducta legal. Sin embargo, las leyes que puedan considerarse discriminatorias o parciales hacia un grupo u otro pueden ser apeladas a su estado y, si es necesario, a los tribunales federales. Los casos judiciales serán documentados extensamente para permitir la conciencia pública y obtener la mayor información posible sobre el tema distante para poder tener no solo un fallo judicial favorable si es necesario, sino para que los ciudadanos en las localidades o estados entiendan mejor el problema y procedan de una manera que sea mejor para tantos como sea posible."
 free_america_focus_federal_liberty_businesses_act: "Ley de Negocios de Libertad"
 free_america_focus_federal_liberty_businesses_act_desc: "El antiguo orden era completamente estricto en sus reglas comerciales. Si vamos a reconstruir a un ritmo notable, debemos permitir que aquellos que quieran liderar tengan las herramientas y la capacidad de hacerlo. Por lo tanto, esta ley permitirá un programa de asistencia gubernamental, así como restringir las regulaciones solo a lo básico del cuidado humano y las expectativas de una sociedad moderna."
 free_america_focus_federal_clear_minds_act: "Ley de Mentes Claras"
 free_america_focus_federal_clear_minds_act_desc: "La LMC será una comisión independiente para asuntos anticorrupción para asegurar que el gobierno funcione de la manera más fluida posible. Muchos ven esto como una forma de abordar los temores de que el nuevo gobierno sea igual que el antiguo; sin embargo, una nueva era está aquí y comencemos fuerte, ¿de acuerdo?"
 free_america_focus_federal_the_liming_act: "Ley de Liming"
 free_america_focus_federal_the_liming_act_desc: "El Acta de Liming es una especie de variante de las legislaciones de bloqueo de deuda del gobierno alemán sobre cómo elaboran presupuestos. Solo que nosotros vamos un paso más allá. Las políticas de Flexibilización Cuantitativa solo estarán dentro de un umbral del 5% de las cifras actuales del PIB para ese trimestre fiscal. Cualquier programa de QE creado debe estar dirigido a un proyecto de ley o legislación que no cubra más de cinco cosas distintivas. Es decir, no puedes tener un proyecto de ley que supuestamente tenga cien cosas diferentes para asignar, pero solo tener, digamos, $50 para asignar realmente."
 free_america_focus_federal_industrial_standards_act: "Ley de Normas Industriales"
 free_america_focus_federal_industrial_standards_act_desc: "La LNI buscará crear un nuevo y moderno estándar para el cual debemos comenzar cuando se trata de desarrollo económico y las empresas e industrias que intentamos crear. Es una cosa competir con el mundo; es otra realmente cuidar y competir con uno mismo."
 free_america_focus_federal_remechanization_act: "Ley de Re-Mecanización"
 free_america_focus_federal_remechanization_act_desc: "Nuestra población, a pesar del estado en que se encuentra, sigue siendo vasta. Podemos hacer mucho más para ayudar a nuestra población volviendo a las formas modernas de mecanización y automatización. El futuro realmente es ahora y debemos aprovechar este futuro no solo para nosotros sino para las personas que servimos."
 free_america_focus_federal_scraping_up_defense_industries: "Reconstrucción de Industrias de Defensa"
 free_america_focus_federal_scraping_up_defense_industries_desc: "Aunque no somos tan fuertes como antes, tenemos que empezar por algún lado. Reunir cualquier resto de nuestra industria de defensa nos permitirá al menos abastecer de alguna manera al ejército que nos queda."
 free_america_focus_federal_reset_act: "Ley de Reinicio"
 free_america_focus_federal_reset_act_desc: "Con la nación habiendo cerrado y reiniciado a un estado prácticamente infantil, debemos buscar un nuevo comienzo para nuestra red eléctrica. El antiguo sistema era engorroso, dolorosamente obsoleto y no mencionar dolorosamente abierto a ataques. La Ley de Reinicio creará una nueva base para planificar, construir y asegurar nuestra nueva red eléctrica, así como asegurar la capacidad de expandirla cuando surjan las necesidades de la nación."
 free_america_focus_federal_appalachian_act: "Ley de los Apalaches"
 free_america_focus_federal_appalachian_act_desc: "La Ley de los Apalaches es una iniciativa de inversión gubernamental para revitalizar y volver a encaminar con los recursos de la tierra que afortunadamente aún tenemos. Con esto en mente, tenemos una parte significativa de las cordilleras de los Apalaches y, como tal, debemos entender, estudiar y traer los minerales y menas para que nuestra nación pueda prosperar y esforzarse por mejorar nuevamente lo que alguna vez se perdió."
 free_america_focus_military_distinctions_act: "Ley de Distinciones Militares"
 free_america_focus_military_distinctions_act_desc: "La LDM es un proyecto de ley de inversión inicial para financiar, estandarizar y hacer distintivo el ejército de los Estados Libres. Estos nuevos estándares en entrenamiento, planificación y organización, así como más o menos comenzar a estandarizar nuestro poder industrial militar, permitirán al menos defendernos si fuéramos invadidos en el futuro cercano."
 free_america_focus_naval_distinctions_act: "Ley de Distinciones Navales"
 free_america_focus_naval_distinctions_act_desc: "Siguiendo los pasos de la LDM, la LDN busca revitalizar cualquier barco, miembro del servicio y las instalaciones que nos quedan de los días pre-divididos. No es mucho en términos de un comienzo, pero con nuestra creciente industria y nuestra nación volviendo a medios estables, seguramente llegaremos allí."
 free_america_focus_national_pride_initiative: "Día de los Estados Libres"
 free_america_focus_national_pride_initiative_desc: "La Iniciativa de Orgullo Nacional es un día festivo nacional conocido como el Día de los Estados Libres; este día es tanto un día festivo bancario como un día festivo nacional general en el que todos tendrán el día libre excepto los servicios vitales que solo podrán trabajar en turnos de cuatro horas en este día específico . El objetivo es celebrar el progreso que hemos hecho como nación y devolver a nuestra gente. El mandato es esencialmente dar a tantas personas en la nación como sea posible un día dedicado libre de todos los posibles y plausibles."
 free_socialist_statist_victory: "La Facción Estatista del Partido Socialista Libre Gana"
 free_socialist_statist_victory_desc: "La conclusión de la encuesta nacional es una victoria para el Partido Socialista Libre; no solo eso, sino que su facción orientada al estatismo. Esta facción se centra en una autoridad más central y la unidad nacional en comparación con sus contrapartes \"Anarquistas\". Sin embargo, veremos qué puede proporcionar este supuesto Amanecer Rojo y esperemos que un futuro más brillante esté reservado para los ciudadanos de esta nueva gran nación."
 free_socialist_statist_socialized_industry: "Industria Socializada"
 free_socialist_statist_socialized_industry_desc: "El público ha perdido su camino y por lo tanto debemos patrocinar y asegurar el empleo y el crecimiento industrial. De esta manera no solo entendemos más directamente la condición económica sino los efectos que nuestros programas tienen en las personas para que podamos ajustar para ayudarlas mejor."
 free_socialist_statist_reformed_welfare_state: "Estado de Bienestar Reformado"
 free_socialist_statist_reformed_welfare_state_desc: "Un estado de bienestar es como un padre. Ahí para ayudarte cuando estás deprimido y guiarte para mejorarte a ti mismo. Los antiguos estados de bienestar se centran más solo en atrapar a las personas; donde nuestro bienestar reformado no solo atrapará sino que también los pondrá de pie y los pondrá de vuelta en el viaje de la vida. Al adaptar la financiación así como la priorización de programas para la reintegración nos aseguraremos de que nuestros programas se paguen solos."
 free_socialist_statist_socialized_education: "Educación Socializada"
 free_socialist_statist_socialized_education_desc: "Educación pública uniformada. Este es el estándar y la base que crearemos para elevar a nuestra gente, así como demostrar que podemos no solo crear los estándares, sino romperlos y elevarlos."
 free_socialist_statist_the_peoples_army: "El Ejército del Pueblo"
 free_socialist_statist_the_peoples_army_desc: "Estamos rodeados de naciones que temen nuestras ideas y nuestros ideales. Atormentados por el espectro del Socialismo Autoritario que ha plagado la historia y ha dado al modelo económico su estigma, debemos buscar defender a nuestra gente, nuestros hogares y nuestros propios ideales que nos hacen una nación orgullosa y fuerte."
 free_socialist_statist_tax_brackets_act: "Ley de Tramos Impositivos"
 free_socialist_statist_tax_brackets_act_desc: "La LTI es una legislación integral para reformar y establecer el estándar moderno de lo que significa tener un código tributario progresivo. Lo básico de los tramos impositivos es que ahora hay 16 tramos impositivos con diferencias monetarias uniformadas, así como aumentos porcentuales más suaves y literalmente progresivos. El tramo final y, por supuesto, el más alto es cualquier cosa por encima de $250,015 gravada al 40%. Aunque esto suena elevado, debemos considerar la diferencia real en el valor proporcional de los ingresos promedio de una persona tomados a través de impuestos. Por lo tanto, necesitamos un código tributario tan suave para asegurar esta verdadera forma de igualdad y contribución societal compartida hacia el desarrollo de nuestra economía y garantizar que las escuelas, servicios de emergencia y demás sean atendidos y financiados adecuadamente."
 free_socialist_statist_millennium_labor_reforms_act: "Ley de Reformas Laborales del Milenio"
 free_socialist_statist_millennium_labor_reforms_act_desc: "La LRLM cambiará fundamentalmente cómo se gestionan las relaciones laborales y las leyes. Aunque los legisladores oficialmente aprobarán y firmarán las leyes, se establecerá un comité conjunto de sindicatos y relaciones empresariales con representación igualitaria entre sindicatos e industriales correspondientes a los sindicatos establecidos. Este comité trabajará junto para centralizar quejas e ideas para mejorar no solo la vida de los trabajadores, sino también equilibrar las necesidades de los trabajadores con el respaldo económico adecuado. Después de todo, comprometerse a medias no es un verdadero compromiso."
 free_socialist_statist_modern_geology_act: "Ley de Geología Moderna"
 free_socialist_statist_modern_geology_act_desc: "La Ley de Geología Moderna es una iniciativa de inversión gubernamental para fortalecer las industrias de materias primas y potenciar la base de nuestra economía. A través de investigaciones geológicas dirigidas y estudios geológicos, estableceremos nuevas minas e industrias forestales controladas para permitir un excedente de materias primas donde podamos crear una economía moderna."
 free_socialist_statist_modern_marxism: "Marxismo Moderno"
 free_socialist_statist_modern_marxism_desc: "En el nuevo milenio, la tecnología es el lujo principal para civiles, militares y todos los sectores económicos. Por lo tanto, debemos asegurarnos de que una parte dedicada de nuestra economía esté orientada al sector tecnológico e innovaciones."
 free_socialist_statist_national_security_act: "Ley de Seguridad Nacional"
 free_socialist_statist_national_security_act_desc: "La Ley de Seguridad Nacional es una legislación dedicada a garantizar la seguridad y protección de nuestra nación y sus ciudadanos. Una agencia federal conocida como la División de Seguridad Interna coordinará y ayudará con la capacitación, regulación y distribución de fondos federales para agencias locales de aplicación de la ley. La uniformidad y los estándares son necesarios para garantizar la integridad y seguridad de nuestra nación y sus ideales."
 free_socialist_statist_manufacturing_investments: "Inversiones en Manufactura"
 free_socialist_statist_manufacturing_investments_desc: "Con poca o ninguna manufactura doméstica, debemos invertir en desarrollar este sector crítico de nuestra economía si alguna vez queremos crecer y alcanzar nuestros objetivos."
 free_socialist_statist_department_of_anticorruption_affairs: "Departamento de Asuntos Anticorrupción"
 free_socialist_statist_department_of_anticorruption_affairs_desc: "El DACA es una institución creada de manera independiente y sancionada federalmente donde se pueden llevar a cabo investigaciones anticorrupción y auditorías generales del gobierno. Aunque el departamento está sancionado federalmente por ley, no forma parte del gobierno federal y no tiene control real sobre él. Esta desconexión permitirá maximizar la eficacia en la realización de auditorías gubernamentales y garantizar la mejor forma de transparencia para nuestros ciudadanos y futuras administraciones. Intentemos no repetir nuestro pasado, ¿de acuerdo?"
 free_socialist_statist_modern_agrarian_reforms: "Reformas Agrarias Modernas"
 free_socialist_statist_modern_agrarian_reforms_desc: "El mundo necesita alimentos, ya sea para nuestra propia gente o para aquellos en áreas y naciones menos afortunadas del mundo. Por lo tanto, debemos afinar y revolucionar nuestra industria agrícola para satisfacer mejor nuestras necesidades domésticas e incluso ayudar a aquellos en el mundo. Este crecimiento y dependencia también nos permitirá experimentar e incrementar la diversificación de combustibles a través de programas de biocombustibles. El etanol siempre ha sido un poco el patito feo en el mundo de los combustibles, así que ¿por qué no darle el cuidado y el amor que necesita para convertirlo en una mejor versión de sí mismo."
 free_socialist_statist_coastal_security_act: "Ley de Seguridad Costera"
 free_socialist_statist_coastal_security_act_desc: "La Ley CS son inversiones limitadas para reconstruir o al menos volver a poner en línea cualquier personal naval y embarcaciones navales que aún tengamos bajo nuestro control. Aunque no es una cantidad grandiosa, es suficiente para comenzar considerando que ya no tenemos un continente entero de costa que proteger."
 free_socialist_statist_energy_conservations_act: "Ley de Conservación de Energía"
 free_socialist_statist_energy_conservations_act_desc: "La legislatura ha propuesto recientemente un proyecto de ley para invertir en proyectos dedicados de I+D energética, así como para optimizar y expandir nuestra red eléctrica. Esperamos que al final no solo podamos producir más energía para las necesidades de nuestra nación, sino también utilizar esta creciente demanda de manera eficiente. En otras palabras, reducir nuestra demanda mientras crece, una especie de equilibrio, por así decirlo."
 free_mid_atlantic_isolationist_victory: "Victoria de la Facción Aislacionista del Medio Atlántico"
 free_mid_atlantic_isolationist_victory_desc: "El MAP o Partido del Medio Atlántico ha obtenido la victoria en la encuesta nacional. Sin embargo, esta facción es una fuerte facción aislacionista donde la idea de expansión se ve como un desperdicio inútil de recursos humanos y naturales. Mientras muchos se preguntan si les importa que la antigua república haya caído, más están simplemente cansados de la lucha y vuelven a sus vidas diarias. Así que por ahora se entiende la paz y la prosperidad es el objetivo. Gloria a los Estados del Medio Atlántico de América."
 free_mid_atlantic_self_determination_act: "Ley de Autodeterminación"
 free_mid_atlantic_self_determination_act_desc: "La SDA es un proyecto de ley que ayudará a solidificar nuestro ethos nacional. Deseamos vivir, prosperar y cooperar con aquellos en el mundo. Aunque extrañamos los viejos tiempos, debemos mirar hacia nuevos amaneceres y perspectivas si realmente queremos avanzar en el gran juego de la vida."
 free_mid_atlantic_raw_materials_act: "Ley de Materias Primas"
 free_mid_atlantic_raw_materials_act_desc: "El gobierno ha aprobado recientemente un esquema de inversión para hacer crecer y respaldar nuestras industrias de materias primas y recursos primarios. Para construirnos, debemos tener una base sobre la cual construir; esta base estará marcada por nuestros sectores de recursos primarios y la capacidad de tener los materiales necesarios para aumentar nuestras capacidades manufactureras."
 free_mid_atlantic_dedicated_automation_investments: "Inversiones Dedicadas en Automatización"
 free_mid_atlantic_dedicated_automation_investments_desc: "Para reactivar nuestra economía en la era moderna, debemos buscar inversiones dedicadas en términos de automatización para permitir que nuestra manufactura sea competitiva con las potencias regionales."
 free_mid_atlantic_atlantic_education_initiative: "Iniciativa Educativa del Atlántico"
 free_mid_atlantic_atlantic_education_initiative_desc: "La AEI es un proyecto de ley de financiamiento educativo para hacer crecer la capacidad del sistema educativo para enseñar y elevar los estándares de conocimiento con los que estarán equipados nuestros ciudadanos en la vida."
 free_mid_atlantic_atlantic_care_act: "Ley de Cuidado del Atlántico"
 free_mid_atlantic_atlantic_care_act_desc: "La Ley de Cuidado del Atlántico es un presupuesto para mejorar la atención médica con el fin de estandarizar e incrementar tanto la capacidad como los estándares con los que se administra la atención médica a nuestra población general. Tanto opciones públicas como privadas estarán disponibles con la regulación común para abordar problemas administrativos excesivos. Ahora las personas pueden saber que su dinero va a su cuidado en lugar de solo administradores y burócratas."
 free_mid_atlantic_department_for_transparency: "Departamento de Asuntos Transparentes"
 free_mid_atlantic_department_for_transparency_desc: "El DoTA será una agencia gubernamental independiente que podrá investigar al gobierno por corrupción y mala conducta general en términos de llevar a cabo sus funciones y responsabilidades como líderes gubernamentales."
 free_mid_atlantic_tech_development_grants: "Subvenciones para el Desarrollo Tecnológico"
 free_mid_atlantic_tech_development_grants_desc: "El nuevo milenio trae nuevas industrias, y una estrella en ascenso es el sector tecnológico. El sector tecnológico es un punto de crecimiento vital para cualquier economía moderna y debemos asegurarnos de tener el nuestro. Por lo tanto, se entregarán subvenciones de desarrollo a las empresas que busquen crear nuevas empresas del sector tecnológico, no solo para impulsar nuestra economía, sino también nuestra integración social con estas innovaciones cada vez mayores en bienes y servicios."
 free_mid_atlantic_blue_ridge_act: "Ley de Blue Ridge"
 free_mid_atlantic_blue_ridge_act_desc: "Recursos, simplemente, debemos asegurar más suministros nacionales si queremos ser un verdadero nuevo pilar en este hemisferio."
 free_mid_atlantic_naval_securities_act: "Ley de Seguridad Naval"
 free_mid_atlantic_naval_securities_act_desc: "Somos una nación pequeña ahora y, como tal, debemos asegurar la defensa de nuestras aguas costeras para garantizar la seguridad de nuestra soberanía nacional."
 free_mid_atlantic_guardian_angels_act: "La Ley de los Ángeles Guardianes"
 free_mid_atlantic_guardian_angels_act_desc: "La reina moderna del campo de batalla es la fuerza aérea. Esta comprensión clave debe invertirse en ella si queremos asegurar nuestra capacidad de ser una nación libre e independiente en esta nueva era."
 free_mid_atlantic_prospectors_initiative: "Iniciativa de Prospectores"
 free_mid_atlantic_prospectors_initiative_desc: "Autarquía... la autarquía es la palabra que la era moderna evita y regaña como atrasada. Aunque su principio central de aislamiento lo es, la realidad es que una nación sana es aquella que puede ser autosuficiente. Por lo tanto, estamos creando una nueva Ley de Homestead conocida como la Iniciativa de Prospectores. A través de regulaciones relacionadas con la extracción de recursos, las familias o individuos que estén dispuestos a establecerse en tierras de hasta cinco acres podrán ser dueños de esa tierra a cambio de una contribución en los recursos naturales que puedan ocuparla a la economía nacional."
 free_mid_atlantic_planned_policing_program: "Programa de Vigilancia Planificada"
 free_mid_atlantic_planned_policing_program_desc: "El PPP es una iniciativa conjunta federal y local para galvanizar la comprensión y los valores públicos de las fuerzas policiales de la nación. Se organizarán y planificarán programas de alcance comunitario, así como convenciones, etc., para permitir que el público y la policía se comprendan mejor y se aprecien genuinamente. En resumen, esta naturaleza a veces gravemente incomprendida de lo que significa no solo hacer cumplir la ley, sino lo que significa ser un ciudadano respetuoso de la ley. Unidad, no división."
 free_mid_atlantic_energy_advancements_act: "Ley de Avance Energético"
 free_mid_atlantic_energy_advancements_act_desc: "La Ley de Avances Energéticos es un paquete de gastos complejo. Subvenciones de investigación para la producción y el consumo de energía, inversiones en la modernización de la red, así como regulaciones para establecer nuevos estándares en cómo avanzamos para hacer frente a las futuras demandas de energía."
 free_mid_atlantic_the_true_green_way: "El Verdadero Camino Verde"
 free_mid_atlantic_the_true_green_way_desc: "Energía nuclear, el futuro de la producción en masa de energía en sí, junto con, por supuesto, el aprovechamiento del sol mismo. Pero la energía nuclear siempre es algo tan endeble en el mundo político. Los alarmistas se aferran a los errores del pasado, restando cualquier tipo de matiz. Los halcones nucleares enseñaron sus beneficios energéticos, pero olvidan los matices en cosas como la planificación y los posibles efectos secundarios de la militarización. Sin embargo, avanzamos haciendo inversiones clave en la producción de energía nuclear. Debemos mostrar al mundo que la mejor manera de avanzar no es quedarse atascado en el pasado, ni detenerse en el presente."
 free_nsp_militarist_faction_victory: "El Partido del Servicio Nacional Militariza la Victoria"
 free_nsp_militarist_faction_victory_desc: "La encuesta ha regresado y el NSP o Partido del Servicio Nacional ha salido victorioso. Sin embargo, muchos no están contentos con tal acuerdo y, por lo tanto, la facción militarista del NSP ha utilizado esto como una forma de ganar la lucha del partido. Ahora, los principales miembros del NSP están, en otras palabras, \"Militarizando la Victoria\", donde el ejército, las personas que sirven y solo la idea de seguridad en sí misma es la victoria por la que la gente ha votado. Si bien algunos temen que el mensaje pueda verse como alarmista, otros solo están buscando seguir adelante y reconstruir lo que una vez se perdió. \"Veamos qué pueden hacer\" se ha convertido en el dicho silencioso."
 free_nsp_meritocracy_act: "La Ley de la Meritocracia"
 free_nsp_meritocracy_act_desc: "La Ley de Meritocracia o como algunos también la llaman la Ley del Mérito, es una legislación integral que reforma y reestructura el proceso de nombramiento y evaluación de individuos que buscan ocupar puestos de liderazgo en el gobierno, ya sea federal, estatal o local. El proceso se centra en extensas verificaciones de antecedentes en aspectos como la creencia personal, la experiencia y los logros y acciones comprobados dentro de sus campos laborales, lo que nos permitirá allanar el camino para un enfoque verdaderamente tecnocrático del gobierno y la administración. Los departamentos de revisión serán comisiones independientes con personas sin afiliación directa o indirecta con los individuos revisados para mantener la transparencia y la justicia de la revisión en los más altos estándares posibles."
 free_nsp_industrial_investments: "Inversiones Industriales"
 free_nsp_industrial_investments_desc: "Para asegurar la seguridad nacional, una economía civil fuerte es tan buena como una economía militar fuerte."
 free_nsp_military_investments: "Inversiones Militares"
 free_nsp_military_investments_desc: "Debemos estar preparados para que cualquiera de nuestros vecinos tenga una idea graciosa e intente someternos. Por lo tanto, una serie de inversiones limitadas para impulsar la economía militar y la preparación de las fuerzas armadas son más que necesarias."
 free_nsp_maritime_investments: "Inversiones Marítimas"
 free_nsp_maritime_investments_desc: "Nuestra costa es vasta y debe ser defendida; por otro lado, estas inversiones iniciales impulsarán la economía civil en términos de comercio y concienciación sobre nuestra causa."
 free_nsp_the_national_arteries_act: "La Ley de Arterias Nacionales"
 free_nsp_the_national_arteries_act_desc: "La LAN es un plan masivo de inversión en infraestructura para revitalizar y actualizar el estado prácticamente ruinoso de nuestra infraestructura nacional. Debemos establecer un estándar de rendimiento si queremos conectar a las personas y la economía de nuestra nación, así como su preparación militar, al frente de los estándares de gestión de crisis para los cuales estableceremos nuevos récords."
 free_nsp_department_of_internal_investigation: "Departamento De Investigación Interna"
 free_nsp_department_of_internal_investigation_desc: "El DII es una agencia enfocada en asuntos anticorrupción para asegurar la estabilidad y fortaleza de nuestra meritocracia. Debemos crear la ética del servicio desinteresado tanto en trabajos militares como civiles si queremos asegurar la longevidad y estabilidad de nuestra nación."
 free_nsp_national_high_command: "Alto Mando Nacional"
 free_nsp_national_high_command_desc: "Con las partes civil y militar de nuestra sociedad siendo tan diferentes, debemos aprender a integrarlas mejor y unificarlas. Por lo tanto, además de las inversiones en la seguridad nacional de la región capital de nuestra nación, se implementará una nueva reorganización de la estructura de liderazgo del país. Nuestro Comandante en Jefe tendrá ahora el título combinado de Mariscal de la Sociedad; este título, abreviado simplemente como Mariscal, unificará la comprensión de que los asuntos civiles y militares son solo una matriz unificadora para la cohesión y supervivencia de nuestra justa y pequeña nación."
 free_nsp_mini_steel_belt: "Cinturón Mini Steel"
 free_nsp_mini_steel_belt_desc: "Con la prioridad nacional como nuestra principal prioridad, debemos asegurar el pilar fundamental del soporte moderno de construcción y manufactura. El programa de inversión del Cinturón Mini Steel verá amplias inversiones en Virginia Occidental y Pensilvania para pulir y renovar lo poco que queda del \"Cinturón Oxidado\"."
 free_nsp_militarizing_society: "Militarización De La Sociedad"
 free_nsp_militarizing_society_desc: "Voltaire dijo una vez que la nación de Prusia no era un estado con un ejército, sino más bien un ejército con un estado. A esto decimos que esta declaración es una realidad misma. Ninguna sociedad necesita un ejército y sin embargo un ejército no necesita sinceramente a la sociedad. Con esto en mente, debemos unir en plena cohesión al ejército y a la sociedad misma. La ética laboral, la educación y el desarrollo adicional de tecnología así como el gobierno pueden y serán organizados como si fuera el propio ejército. Fomentando los verdaderos méritos de una meritocracia, el esfuerzo por mejorarse a sí mismo así como al cuerpo social en general."
 free_nsp_energy_investments: "Inversiones Energéticas"
 free_nsp_energy_investments_desc: "Con nuestra movilización económica así como con la reconstrucción militar, está en nuestro mejor interés asegurarnos que las necesidades energéticas no solo sean cubiertas para nuestra gente sino también para nuestro ejército. Aunque estas necesidades no se resolverán inmediatamente, esta inversión y las subvenciones para investigación permitirán un mejor desarrollo de nuevos métodos eficientes no solo para producción energética sino también para consumo energético."
 free_nsp_top_priority_budgeting: "Presupuesto Prioritario"
 free_nsp_top_priority_budgeting_desc: "Controlamos varios puertos e importantes astilleros navales lo que lleva a una dirección influenciada por lo naval. Por lo tanto, con el tamaño de nuestra costa, nuestro creciente comercio y la posible intrusión adversaria extranjera, debemos establecer un sistema prioritario en nuestro presupuesto para asegurar la defensa de nuestra nación y su gente."
 free_nsp_expanding_jersey_foundries: "Expansión De Las Fundiciones De Jersey"
 free_nsp_expanding_jersey_foundries_desc: "Las fundiciones y molinos metalúrgicos de Nueva Jersey producen un conjunto diverso de metales ligeros. Estos metales ligeros son cruciales tanto para expansión civil como militar; por lo tanto, invertiremos en Nueva Jersey para ponerla al mismo nivel que nuestras crecientes demandas como nación."
 free_nsp_defensive_expenditure_warfare: "Gasto Defensivo En Guerra"
 free_nsp_defensive_expenditure_warfare_desc: "Con nuestras espaldas al mar y dada nuestra ubicación geográfica, debemos asegurar la supervivencia de nuestra nación. Con esto en mente, la I+D, así como el presupuesto para el ejército, se han establecido con una mentalidad defensiva estricta. Entendiendo que nuestros adversarios son muchos, debemos ser vigilantes al mantener la línea mientras también podamos mantener los medios de producción bélica. Por lo tanto, el desarrollo de una nueva doctrina de guerra es nuestra máxima prioridad; a partir de ahora desarrollaremos lo que se conoce como Guerra de Gastos Defensivos."
 free_nsp_the_new_identity: "La Nueva Nación"
 free_nsp_the_new_identity_desc: "Con la consolidación de nuestra nación, su gente, ejército y ética. Debemos idear un nuevo nombre para asegurar esta nueva identidad encontrada. Porque ya no somos simplemente los Estados Libres de América, somos la Unión del Atlántico Medio."
 free_america_focus_federalist_liberals_win_election: "Los Liberales Federalistas Ganan las Elecciones"
 free_america_focus_federalist_liberals_win_election_desc: "Los resultados electorales están listos y parece que el Partido Federalista ha asegurado una victoria. Esta victoria también parece haber cambiado el equilibrio del partido hacia un aparato más liberal, ya que los principales miembros conservadores supuestamente eran anti-elecciones. Uno de los miembros anteriores declaró \"Las elecciones son una distracción para la supervivencia nacional\", sin embargo, la gente espera cualquier cambio, especialmente un retorno a una normalidad esperanzadora."
 free_states_focus_fed_left_national_works_administration: "Administración Nacional de Obras"
 free_states_focus_fed_left_national_works_administration_desc: "La AON es una nueva administración gubernamental dedicada para ayudar a la construcción económica. A través de la planificación de infraestructuras y aventuras económicas basadas en el gobierno, esto debería reducir el desempleo y ser un ligero estimulante para la economía incluso en tiempos difíciles."
 free_states_focus_fed_left_industrial_development_committee: "Comité de Desarrollo Industrial"
 free_states_focus_fed_left_industrial_development_committee_desc: "Con el establecimiento del CDI, el desarrollo industrial de la nación podrá tener un formato puramente del sector privado con la ayuda adicional de programas gubernamentales para permitir la diversidad no solo de las industrias presentes sino también de dónde se establecerán, como una manera de asegurar un modo equilibrado para no dejar atrás a una comunidad, condado o incluso a un estado entero en comparación con sus contemporáneos."
 free_states_focus_fed_left_department_of_innovation: "Departamento De Innovación"
 free_states_focus_fed_left_department_of_innovation_desc: "El DoI o Departamento de Innovación es una institución de investigación y desarrollo patrocinada federalmente para financiar y trabajar con firmas de investigación privadas en innovación y avances científicos generales en campos críticos para elevar el estándar nacional de vida. Por lo tanto, con una financiación sustancial, compensaremos este revés nacional y estableceremos el camino hacia el futuro."
 free_states_focus_fed_left_education_standards_act: "Ley De Estándares Educativos"
 free_states_focus_fed_left_education_standards_act_desc: "La LEE es un proyecto de ley que establecerá la expectativa básica dentro del sistema educativo nacional. Nada más del antiguo sistema donde casi cada condado tenía su propia variación sobre cómo se enseñaban las cosas para lograr los supuestos mismos resultados finales. A partir de ahora, el currículo será estandarizado y se espera que se mantenga en cada nivel educativo respectivo, independientemente de dónde se encuentre la institución dentro de la nación."
 free_states_focus_fed_left_automation_advancements_act: "Ley De Avances En Automatización"
 free_states_focus_fed_left_automation_advancements_act_desc: "La LAA verá financiación directa en la expansión y estandarización de prácticas industriales en términos de adquirir e implementar diferentes tecnologías que automatizan el proceso de producción. En resumen, más inversiones para hacer más con menos para que podamos tener más para hacer más."
 free_states_focus_fed_left_the_true_deal: "El Verdadero Trato"
 free_states_focus_fed_left_the_true_deal_desc: "El Verdadero Trato es un paquete económico masivo que busca invertir, diversificar a través de recursos naturales disponibles y encontrados, así como crear una red central de infraestructura en la parte mayormente central de la nación. La industria, infraestructura y nuevas iniciativas mineras allanarán el camino hacia el futuro que deseamos tener para nuestra gente. Esto realmente es un Verdadero Trato para los ciudadanos."
 free_states_focus_fed_left_department_of_internal_investigation: "Departamento De Investigación Interna"
 free_states_focus_fed_left_department_of_internal_investigation_desc: "El DoII o más comúnmente conocido como la Oficina De Obliteración De Oligarcas, es una agencia anti-corrupción independiente encargada de investigar regularmente y mantener bajo control a aquellos que forman parte del gobierno federal. El cuerpo independiente está compuesto por individuos elegidos basados en tres criterios principales: 1. Tener algún tipo de antecedentes administrativos e/o investigativos; 2. Ser políticamente apáticos o tener antecedentes no votantes para asegurar la integridad de la institución; 3. Los representantes deben estar equilibrados dentro todas las clases sociales principales desde cada estado respectivo para asegurar diversidad en perspectiva para entender las maneras más simples y al mismo tiempo más complejas en que uno puede causar corrupción. Esta institución será una piedra angular en asegurar lo Libre en los Estados Libres De América."
 free_states_focus_fed_left_old_power_is_still_power: "El Viejo Poder Sigue Siendo Poder"
 free_states_focus_fed_left_old_power_is_still_power_desc: "Con nuestra economía volviendo a estar en línea y nuestra demanda superando nuestra producción debemos buscar maneras baratas para producir energía si queremos mantenernos por delante del crecimiento."
 free_states_focus_fed_left_new_power_is_balanced_power: "El Nuevo Poder Es Poder Equilibrado"
 free_states_focus_fed_left_new_power_is_balanced_power_desc: "Con el cambio del milenio, las inversiones y desarrollo en tecnologías generadoras renovables han sido asombrosas. Debemos diversificar nuestra generación y usar estas renovables para instilar el poder que demandamos, lo que necesitaremos en el futuro y si las cosas van lo suficientemente bien... Quizás podamos usar este exceso energético a nuestro favor."
 free_states_focus_fed_left_future_power_is_future_proofing: "El Poder Futuro Es Proteger El Futuro"
 free_states_focus_fed_left_future_power_is_future_proofing_desc: "El futuro es tanto ahora como más allá, si queremos innovar, debemos buscar al menos exponer y comprender los medios de producción de energía asociados con ello. La fisión nuclear encajará en nuestros medios bien redondeados de producción de energía y será un gran impulso para nuestra economía en general. No solo eso, sino que con las inversiones adecuadas en I+D, quién sabe, tal vez la Fisión se vaya y la Fusión sea el nuevo futuro. Solo el tiempo responderá a esa pregunta."
 free_states_focus_fed_left_the_substations_act: "La Ley de la Subestación"
 free_states_focus_fed_left_the_substations_act_desc: "Este proyecto de ley es un esquema integral de investigación e inversión en infraestructura para garantizar la eficiencia, así como las protecciones necesarias con un crecimiento y expansión tan rápidos de nuestra red eléctrica. En general, no solo debemos aumentar nuestras necesidades de generación de energía, sino que debemos ser más eficientes en cómo consumimos dicha energía."
 free_states_focus_fed_left_the_self_defense_act: "La Ley de Autodefensa"
 free_states_focus_fed_left_the_self_defense_act_desc: "A pesar de su nombre, la SDA no es un cambio en la ley civil, sino más bien un fondo de inversión y desarrollo militar, más específicamente del ejército. Nuestra situación actual se vuelve más difícil con cada día que pasa. Las potencias extranjeras desean buscar y tomar lo que hemos creado legítimamente, bueno, nos aseguraremos de que eso no suceda."
 free_states_focus_fed_left_freecare_program: "El Programa Freecare"
 free_states_focus_fed_left_freecare_program_desc: "Freecare es nuestra forma de implementar una forma de sistema de bienestar universal. Al delinear las necesidades de nuestra gente, invertiremos tanto en profesionales médicos nacionales como en la adquisición de profesionales médicos extranjeros y permitiremos un sistema de cuatro niveles de niveles de atención necesarios para los ciudadanos. Estos niveles de atención permitirán que el lado de la administración de las cosas organice con qué rapidez y eficiencia se puede distribuir la atención a una población en crecimiento al comprender la gravedad de las enfermedades y lesiones junto con aquellos profesionales en el terreno pueden aprobar un aumento potencial en el nivel en el momento actual si la condición de un paciente cambia repentinamente. Después de todo, nada es seguro en la vida, excepto la muerte misma."
 free_states_focus_fed_left_mid_atlantic_fleet: "Flota del Atlántico Medio"
 free_states_focus_fed_left_mid_atlantic_fleet_desc: "A pesar de que poseemos una cantidad significativa de antiguos buques del antiguo régimen, nuestra posición es, en el mejor de los casos, precaria. La mayoría de los astilleros e instalaciones navales están deteriorados y necesitan reparaciones y renovaciones para volver a estar a la altura incluso de naciones como, por ejemplo, Australia o Portugal. Por lo tanto, se destinará un importante fondo naval a esta renovación y permitir la desinversión de nuestra actual flota."
 free_america_focus_anarchists_fsp_anarchist_victory: "El FSP \"Anarquistas\" Colectivizan la Victoria"
 free_america_focus_anarchists_fsp_anarchist_victory_desc: "En un sorprendente giro de los acontecimientos, el Partido Socialista Libre ha salido victorioso, compuesto por varios sabores de rojo, el reciente cambio en las elecciones ha visto al partido pasar de un socialismo marxista/autoritario de línea dura, a un equilibrio ahora más equilibrado, aunque confuso, pero un equilibrio de socialdemócratas de estilo europeo y lo que algunos bromean como \"Pseudoanarquistas\", por su capacidad de ser más cooperativos en un sistema que involucra un estado. Sin embargo, las elecciones fueron ganadas por el FSP y ahora solo el futuro y el liderazgo del partido determinarán el futuro de nuestra nación."
 free_america_focus_anarchists_communalcare_program: "Programa CommunalCare"
 free_america_focus_anarchists_communalcare_program_desc: "El CCP, irónico, ¿eh?, es un sistema de programa de bienestar dedicado que se basa en la financiación subsidiada de instalaciones de atención creadas localmente donde los locales de esa ciudad o municipio reciben atención de personas dentro de ese municipio. Por supuesto, siempre habrá una necesidad de que las personas ayuden a los necesitados, pero la esencia de la instalación es que fue fundada por locales para cuidar a los locales. Piensen en el cuidado de ancianos y el cuidado de niños, después de todo, ¿no dijo Jesús Ama a tu Prójimo?"
 free_america_focus_anarchists_red_rose_health: "Salud Rosa Roja"
 free_america_focus_anarchists_red_rose_health_desc: "El programa RRH es un programa de atención médica dedicado a crear los pasos hacia un sistema de atención médica universal. Al evaluar lo que necesita cada estado, estas sucursales estado por estado pueden dividir su control en subconjuntos regionales y permitir que los condados brinden la retroalimentación adecuada. A su vez, esperamos establecer una estructura de mando adecuada para permitir la menor cantidad de papeleo y la facilidad de control. Ya que los fracasos de la mayoría de los programas de tipo UH van desde más administradores que personal de atención médica."
 free_america_focus_anarchists_syndicate_industries: "Industrias Sindicales"
 free_america_focus_anarchists_syndicate_industries_desc: "Los sindicatos son una parte importante de nuestra base de votantes y una gran influencia en los antiguos estados del cinturón de óxido. Como tales, debemos desarrollar y asegurar a los sindicatos con trabajos reales y desarrollo futuro si queremos mantener nuestra posición."
 free_america_focus_anarchists_social_tech_incorporated: "Tecnología Social Incorporada"
 free_america_focus_anarchists_social_tech_incorporated_desc: "La era moderna requiere industrias modernas, las industrias de tecnología y servicios son el futuro. Como tales, invertiremos y diversificaremos nuestra economía para aumentar nuestras capacidades no solo para aumentar la calidad de vida de nuestros ciudadanos, sino también para exportar estas cosas y ganar atención e inversión extranjeras."
 free_america_focus_anarchists_community_defense_act: "La Ley de Defensa Comunitaria"
 free_america_focus_anarchists_community_defense_act_desc: "Dado que el mundo es un lugar peligroso y las potencias extranjeras buscan explotar nuestra posición muy tímida. Debemos buscar una manera de defendernos y, por lo tanto, debemos mirar no solo al ejército, sino también a las comunidades de nuestra nación para que quieran defender sus hogares y familias."
 free_america_focus_anarchists_civil_affairs_administration: "Administración de Asuntos Civiles"
 free_america_focus_anarchists_civil_affairs_administration_desc: "La CAA es un organismo dedicado a tratar asuntos de auditoría y anticorrupción. Debemos inculcar el más alto estándar de ética para asegurar que tanto el pueblo como el mundo reconozcan que somos un gobierno real, una nación real y una sociedad genuina para ser respetada y ayudada."
 free_america_focus_anarchists_red_ducation_act: "Ley de Re-educación"
 free_america_focus_anarchists_red_ducation_act_desc: "La Ley de Re-educación es una gran inversión en educación para estandarizar y mejorar lo que enseñamos, por qué enseñamos y el objetivo general de lo que es nuestro sistema educativo en términos de la mejora de nuestra sociedad."
 free_america_focus_anarchists_foreign_relations_act: "Ley de Relaciones Exteriores"
 free_america_focus_anarchists_foreign_relations_act_desc: "Dado que nuestro gobierno está alineado con muchas de esas naciones al otro lado del charco, por así decirlo. Podemos priorizar la vigilancia y el presupuesto del gobierno para asegurar que los acuerdos comerciales y los programas de intercambio de trabajadores sean seguros y beneficiosos para ambas partes."
 free_america_focus_anarchists_mineral_expansion_act: "Ley de Expansión Mineral"
 free_america_focus_anarchists_mineral_expansion_act_desc: "La MEA verá mejor a nuestras industrias de extracción de minerales y recursos. A través de la introducción de nueva tecnología y regulaciones, así como subvenciones gubernamentales dedicadas para expandir o iniciar nuevas operaciones minerales, aseguraremos nuestro éxito nacional de la mejor manera posible para satisfacer nuestras necesidades internas."
 free_america_focus_anarchists_the_interstate_renewal_act: "La Ley de Renovación Interestatal"
 free_america_focus_anarchists_the_interstate_renewal_act_desc: "El sistema interestatal son las venas de la economía y la cohesión social de nuestra nación. Debemos limpiar, despejar y construir venas más fuertes y confiables si queremos tener una nación fuerte y saludable."
 free_america_focus_anarchists_consumer_industry_advancements: "Avances en la Industria del Consumidor"
 free_america_focus_anarchists_consumer_industry_advancements_desc: "Para asegurar la mejora de nuestra calidad interna además de nuestra competitividad económica, debemos invertir y asegurar la implementación de nuevos avances en automatización. Además de eso, debemos encontrar nuevas tecnologías para incluir en nuestras industrias para aumentar no solo la cantidad, sino también mantener la calidad del producto."
 free_america_focus_anarchists_parker_harrison_act: "Ley Parker-Harrison"
 free_america_focus_anarchists_parker_harrison_act_desc: "La Ley Parker-Harrison es una inversión nacional en nuestras necesidades energéticas. Inversiones en nuevas plantas de energía, tecnologías, así como regulaciones e innovaciones en eficiencias relacionadas con el consumo de dicha energía. Aseguraremos las necesidades energéticas de nuestros ciudadanos y elevaremos los estándares de lo que debería tener una nación moderna."
 free_america_focus_anarchists_family_unity_program: "Programa de Unidad Familiar"
 free_america_focus_anarchists_family_unity_program_desc: "El FUP es un programa y alivio de impuestos para familias de un tamaño dedicado de tres hijos o más. Esto asegura que la unidad familiar doméstica sea fuerte mientras les da los recursos para mantener esa unidad para que nuestro capital humano sea para el mejoramiento de nuestra nación. Porque a medida que nuestra economía crece, nuestra gente debe poder crecer y vivir las vidas que quieren vivir."
 free_america_focus_anarchists_army_readiness_act: "Ley de Preparación del Ejército"
 free_america_focus_anarchists_army_readiness_act_desc: "La preservación nacional es una de nuestras principales prioridades para mantener y conservar lo que es querido para nuestra forma de vida. Como tal, invertir en nuestro ejército y específicamente en nuestro ejército para reforzar la defensa de nuestra nación y su pueblo de enemigos extranjeros."
 free_mid_atlantic_identitarian_victory: "Victoria Electoral de la Identidad del Atlántico Medio"
 free_mid_atlantic_identitarian_victory_desc: "El MAP o Partido del Atlántico Medio ha ganado las elecciones para la sorpresa irónicamente de mucha gente. Lo que sorprende es que el partido se ha desplazado más hacia un partido identitario con el objetivo número uno de crear una identidad de los Estados Atlánticos. Pero por ahora están contentos con la identidad del Atlántico Medio y con mantener y asegurar el frente interno ante todo."
 free_mid_atlantic_identitarian_rust_to_riches: "Del Óxido a la Riqueza"
 free_mid_atlantic_identitarian_rust_to_riches_desc: "Un tercio de nuestra nación forma parte del antiguo cinturón de óxido... estos estados solían ser la destreza definitoria del industrialismo del siglo XX. Ahora yacen allí, muertos, decayendo y sufriendo. Pues no más, reconstruiremos, repararemos, puliremos y convertiremos estos estados oxidados en faros brillantes de nuestra nación."
 free_mid_atlantic_identitarian_the_old_black_gold: "El Viejo Oro Negro"
 free_mid_atlantic_identitarian_the_old_black_gold_desc: "El estado de Virginia Occidental es un estado que sufre por el paso del tiempo mismo. Con la situación tal como está, debemos desarrollar y asegurar que este \"viejo oro\" se utilice en la nueva era. La investigación e inversión en un desarrollo integral del estado permitirán que florezca y prospere una vez más."
 free_mid_atlantic_identitarian_naval_novelty: "Novedad Naval"
 free_mid_atlantic_identitarian_naval_novelty_desc: "La decadencia de nuestra preparación naval es algo que abre literalmente los mares para que nos ataquen. Reforzaremos y desarrollaremos nuestra marina e industrias navales si queremos asegurar nuestra costa."
 free_mid_atlantic_identitarian_national_defense_act: "Ley de Defensa Nacional"
 free_mid_atlantic_identitarian_national_defense_act_desc: "La Ley de Defensa Nacional es una financiación para el desarrollo y la preparación del ejército, así como legislación para mejorar nuestras capacidades para defender nuestra nación en tierra. Cosas como la guardia nacional, así como la idea de un período de servicio obligatorio también se han propuesto, pero no se sabe si debemos llegar tan lejos tan rápido."
 free_mid_atlantic_identitarian_aviation_development_fund: "Fondo de Desarrollo de la Aviación"
 free_mid_atlantic_identitarian_aviation_development_fund_desc: "El ADF es una legislación que dedica el gasto en defensa al desarrollo y la modernización de nuestra fuerza aérea... Algo que ha caído en lo peor en términos de casi desorganización y falta de conocimiento para incluso continuar el servicio. Todo el mundo sabe cómo jugar a soldado y marinero, pero volar un avión de cualquier tipo requiere un estándar físico adecuado y la capacidad de aprender y comprender el equipo."
 free_mid_atlantic_identitarian_military_influenced_education: "Educación Influenciada por los Militares"
 free_mid_atlantic_identitarian_military_influenced_education_desc: "El sistema educativo es un sistema para enseñar y preparar a los jóvenes y las futuras generaciones para el supuesto \"Mundo Adulto\". Como tal, nuestro mundo no es tan brillante y debemos tener una influencia y exposición pequeña pero altamente dedicada del ejército y la vida militar a través de programas o clases como el JROTC o Cuerpo de Entrenamiento de Oficiales de la Reserva Junior, así como clases especializadas de educación física. De esta manera, impulsará pasivamente el reclutamiento militar y el deber hacia la nación, independientemente de si deciden unirse o no. El programa JROTC no solo se puede utilizar para preparar a potenciales soldados, sino también para enseñar a los niños cosas como hablar en público, cualidades de liderazgo y trabajo en grupo, lo que funciona igual de bien en el ejército que en el mundo civil."
 free_mid_atlantic_identitarian_service_member_tax_breaks: "Desgravaciones Fiscales para Miembros del Servicio"
 free_mid_atlantic_identitarian_service_member_tax_breaks_desc: "Nuestra defensa nacional y la preservación de nuestra nueva identidad son lo que más apreciamos. Por lo tanto, nuestros ciudadanos que eligen defenderlos deben ser atendidos a través de desgravaciones fiscales y ciertos suplementos basados en estipendios para las familias de los miembros del servicio."
 free_mid_atlantic_identitarian_pseudo_mobilized_economy: "El Modelo Económico \"Movilizado\""
 free_mid_atlantic_identitarian_pseudo_mobilized_economy_desc: "La Economía Pseudo Movilizada es un modelo económico que hibrida las industrias manufactureras para llevar a cabo los métodos de producción normales, etc. La desviación es que un pequeño segmento dedicado de cada industria tendrá aproximadamente del cinco al diez por ciento de dicha industria dedicada a algún tipo de producción militar. Con cada negocio principal dedicado a un equipo específico y/o clase de equipo para producir, el desglose real entre las fábricas de cada negocio depende del liderazgo empresarial siempre y cuando cumplan o se acerquen a las cuotas esperadas y también aseguren la calidad del equipo producido."
 free_mid_atlantic_identitarian_the_new_nation: "La Nueva Nación"
 free_mid_atlantic_identitarian_the_new_nation_desc: "De ahora en adelante, ya no seremos solo los \"remanentes federales de una era pasada\". Ahora seremos conocidos como la Unión Federal del Atlántico Medio. Una unión más pura basada en la nueva identidad y cultura que hemos gastado para crecer y llamar nuestra. Por supuesto, respetamos el pasado, de ahí la Unión Federal, pero sin embargo, este es un nuevo paso adelante y solo puede ser hacia arriba desde aquí."
 free_mid_atlantic_identitarian_developing_the_arms_industry: "Desarrollando la Industria de Armas"
 free_mid_atlantic_identitarian_developing_the_arms_industry_desc: "Para solidificar nuestra capacidad de defendernos, debemos asegurar que el lado logístico de tal empresa se mantenga. Para esto, debemos desarrollar nuestra capacidad industrial militar para satisfacer las demandas y las amenazas potenciales que puedan sobrevenirnos."
 free_mid_atlantic_identitarian_further_shipping_industrial_developments: "Promoviendo el Desarrollo Industrial Naviero"
 free_mid_atlantic_identitarian_further_shipping_industrial_developments_desc: "Para aumentar nuestro reconocimiento internacional, buscamos el continuo desarrollo de nuestras industrias naval y naviera. Si bien esto puede tener aplicaciones militares, la necesidad principal es, por supuesto, el comercio, la pesca, etc."
 free_mid_atlantic_identitarian_advanced_industries_act: "Ley de Industrias Avanzadas"
 free_mid_atlantic_identitarian_advanced_industries_act_desc: "La AIA es un paquete de financiación gubernamental para desarrollar y hacer crecer nuestras industrias tecnológicas y de servicios. Debemos innovar y aumentar nuestra competitividad en el escenario mundial si queremos destacar entre la multitud del resto del continente en el que estamos."
 free_mid_atlantic_identitarian_the_primary_industries_act: "La Ley de Industrias Primarias"
 free_mid_atlantic_identitarian_the_primary_industries_act_desc: "Si queremos hacernos un nombre, debemos actuar como líderes y pioneros dentro de una especialidad. El continente tiene recursos y el mundo necesita dichos recursos. Por lo tanto, un extenso paquete de financiación e inversión en el desarrollo de industrias primarias e investigación de nuevas formas de obtener más de menos es la apuesta futura que debemos reclamar."
 free_mid_atlantic_identitarian_the_labor_restructuring_act: "La Ley de Reestructuración Laboral"
 free_mid_atlantic_identitarian_the_labor_restructuring_act_desc: "La Ley de Reestructuración Laboral es una reforma legislativa integral de las leyes laborales y la capacidad general para asignar eficientemente las fuerzas de trabajo que tenemos disponibles, así como preparar para el futuro la capacidad de obtener más capacidades productivas con menos personas. Por supuesto, necesitaremos aumentar nuestro bienestar y otros aparatos presupuestarios, pero es una verdadera inversión para un mejor nivel de vida para todos nuestros pueblos."
 free_nsp_monarchist_victory: "¿Victoria \"Monárquica\" del NSP?"
 free_nsp_monarchist_victory_desc: "En un sorprendente giro de los acontecimientos, el NSP o Partido del Servicio Nacional ha ganado las elecciones. La sorpresa viene con el hecho de que de todas las ideologías conocidas, el ala pro-elección del partido son lo que ellos mismos llaman \"Monárquicos Modernos\". Su principal objetivo, al parecer, es mantener el sistema democrático, pero darle un cambio estético en el que los títulos estén vinculados a los cargos electos. Este tipo de monarquía electa o como algunos absolutistas desprecian como \"pseudo monarquismo\" es un poco extraño para mucha gente. Pero el ejército está contento entendiendo las influencias históricas que las monarquías daban un gran valor a sus ejércitos. Los conservadores están contentos, ya que este sería casi el último movimiento conservador, así como los liberales están más o menos contentos debido al mantenimiento y la liberalización de la representación democrática que vendrá de él. Después de todo, ¿qué hay realmente en un nombre?"
 free_nsp_monarchist_the_great_debate: "El Gran Debate"
 free_nsp_monarchist_the_great_debate_desc: "Tras nuestra victoria en las elecciones, muchos realmente se preguntan cuál es el punto de cambiar cosméticamente los títulos de los cargos, o cuántos debemos cambiar, etc., etc. Por lo tanto, los mejores debatientes y las mentes más tranquilas del partido deben reunirse en este tipo de \"Gran Debate\" para asegurar al público y a los escépticos por igual cuánto cambiará honestamente en el gran esquema de las cosas."
 free_nsp_monarchist_the_upper_echelon_act: "La Ley del Escalón Superior"
 free_nsp_monarchist_the_upper_echelon_act_desc: "Después de una larga serie de debates, hemos solidificado los nuevos cambios cosméticos. La elección de renombrar a la nación los Reinos Unidos de Arcadia UKA es un símbolo de una nueva identidad, así como un símbolo para aquellos que una vez dieron a nuestros antiguos yoes la independencia. La región colonial francesa de Arcadia es conocida por las provincias canadienses de Nuevo Brunswick, Nueva Escocia y la Isla del Príncipe Eduardo. Ahora ella vivirá de nombre con nosotros como la UKA. Esta nueva identidad nos permite asegurar cambios de título para los cargos, cosas como Emperador para el Presidente, Príncipes para el senado, señores o barones para la cámara, Reyes y Reinas para los gobernadores del Estado. Este supuesto escalón superior del liderazgo de la nación en su conjunto ahora encarnará el espíritu de una nueva nación, un nuevo pueblo y un nuevo camino a seguir."
 free_nsp_monarchist_the_true_progressives: "Los Verdaderos Progresistas"
 free_nsp_monarchist_the_true_progressives_desc: "Con una inclinación progresiva hacia una verdadera reforma fiscal, debemos asegurar la equidad en dicho código tributario. Por lo tanto, los tramos impositivos conducirán hasta $250,000 en términos de cuál será la tasa impositiva máxima del tramo. La progresividad de esto es una cantidad variable probada de tramos divididos uniformemente en términos de brechas entre ellos para permitir la forma más progresiva de impuestos. En lugar de castigar a aquellos que van más alto en ingresos, la escala se basa en las ganancias de ingresos proporcionales. De esta manera, no hay una verdadera disputa de él dijo, ella dijo sobre \"pagar tu parte justa\", cuando dicha parte justa se basa en la proporción de tus ingresos y no solo porque pagaste más por el hecho de que ganas más que alguien."
 free_nsp_monarchist_the_royal_families_act: "La Ley de las Familias Reales"
 free_nsp_monarchist_the_royal_families_act_desc: "La RFA es una reforma de bienestar y un proyecto de ley de presupuesto para apoyar a las familias de la nación y asegurarse de que no solo se cuide a nuestros ciudadanos, sino que también se cuide el futuro de nuestra nación. Todo el mundo sabe que la principal causa de divorcio se debe a la inestabilidad financiera debido al acto de tener hijos. Por lo tanto, si queremos aumentar la felicidad de nuestros ciudadanos, aumentar la línea de base de desarrollo de hogares estables y asegurar el futuro de nuestros futuros ciudadanos y líderes potenciales, entonces debemos pensar literalmente en los niños."
 free_nsp_monarchist_the_modern_merchants_act: "La Ley de los Comerciantes Modernos"
 free_nsp_monarchist_the_modern_merchants_act_desc: "En los viejos tiempos de la \"Era Tradicional\" del monarquismo, el comerciante era la columna vertebral para asegurar las influencias expandidas y la riqueza de la monarquía y su nación. En la era moderna, estos ahora \"Comerciantes Modernos\" son los del propietario de una pequeña empresa. La columna vertebral de la economía y el vapor que impulsa el motor de la economía de una nación. Como tales, debemos financiar, construir y respaldar a las pequeñas empresas para asegurar su capacidad de crear, ahorrar esa limitación a las entidades corporativas que desean mirar fuera de nuestra nación para asegurar su propia riqueza en lugar de la riqueza no solo de la nación, sino también de sus pueblos."
 free_nsp_monarchist_the_great_connections_act: "La Ley de la Gran Conexión"
 free_nsp_monarchist_the_great_connections_act_desc: "La era moderna ha hecho algo que incluso algo que fue hace 40 años ni siquiera se pensó. Eso es hacer del mundo un lugar más pequeño y, sin embargo, hoy muchos ven Internet y el servicio celular como un supuesto derecho a tener. Bueno, si bien las cosas materiales nunca son un derecho fuera de las necesarias para sobrevivir, sí creemos que estos servicios son el futuro y qué mejor manera de hacer crecer una nación, su gente y su identidad que acercar a todos. Asegurando la unidad a través de lo que se llama la Ley de la Gran Conexión, un gran paquete de financiación para asegurar que la infraestructura, tanto vial como basada en Internet/teléfono, se expanda, modernice y mantenga de la mejor manera posible que nuestros ciudadanos puedan proporcionar."
 free_nsp_monarchist_domestic_first_policy: "La Política de Primero lo Doméstico"
 free_nsp_monarchist_domestic_first_policy_desc: "La Política de Primero lo Doméstico o también conocida como la Política de Prioridad Doméstica es un conjunto de legislaciones y reformas que imponen que el principal deber del gobierno es actuar en la seguridad y el bienestar asegurado del frente doméstico. Esto significa que cosas como el comercio, etc., deben hacerse con el fin de asegurar el mejoramiento o simplemente asegurar la seguridad de nuestra situación interna de entidades extranjeras. Este tipo de política pseudo autárquica y nacionalista probablemente disgustará a una buena cantidad de otras naciones, pero nuestros ciudadanos deben ser lo primero o cuál es la política del gobierno de una nación."
 free_nsp_monarchist_the_grand_tour: "El Gran Tour"
 free_nsp_monarchist_the_grand_tour_desc: "Los escépticos son una forma de vida, mientras alguien no esté de acuerdo, habrá personas escépticas sobre si alguien está realmente \"bien o mal\" acerca de algo. Por lo tanto, para reforzar nuestra imagen internacional, debemos expandir nuestro cuerpo diplomático y asegurarnos de reducir la posibilidad de enemigos para nuestra propia existencia."
 free_nsp_monarchist_la_grand_army: "Nuestro Gran Ejército"
 free_nsp_monarchist_la_grand_army_desc: "Si alguna vez hubo un ejército para respetar, por qué estaríamos aquí todo el día porque el principio de cualquiera dispuesto a dar su propia vida por lo que cree es el máximo sacrificio que alguien puede hacer. Sin embargo, la innovación de Napoleón tiene un lugar especial en los corazones y las mentes de cualquier oficial que sea progresista o esté preparando el futuro. Aunque estoy seguro al pensar que a cualquiera con un ego también le encantaría ser Napoleón. De todos modos, debemos tratar a nuestro ejército con el máximo respeto y diligencia si queremos pensar en sobrevivir a una guerra, especialmente una guerra con nuestros nuevos vecinos."
 free_nsp_monarchist_our_great_navy: "Nuestra Gran Marina"
 free_nsp_monarchist_our_great_navy_desc: "Desde la defensa en tierra hasta la defensa en el mar, el gran almirantazgo es lo que procurará la seguridad de nuestras comunidades comerciales y costeras de los peligros más allá. Con el mismo vigor inversor, daremos un vuelco a nuestros servicios armados."
 free_nsp_monarchist_our_defiant_air_force: "Nuestra Desafiante Fuerza Aérea"
 free_nsp_monarchist_our_defiant_air_force_desc: "Los cielos sobre nuestra nación son sagrados, este escudo debe ser reforzado a través de una fuerza aérea fuerte y desafiante. Debemos tener la capacidad de defender nuestros cielos de los agresores extranjeros, porque pueden ser muchos y algunos pueden incluso ser nuestros vecinos."
 free_nsp_monarchist_our_vast_resources: "Nuestros Vasto Recursos"
 free_nsp_monarchist_our_vast_resources_desc: "Debemos asegurar nuestra producción y fabricación nacional. Para hacer esto, debemos invertir, crecer y subsidiar las industrias de extracción de recursos. Estas industrias primarias son la sangre que circula por la totalidad de cualquier economía y ciertamente nos aseguraremos de que dicha sangre fluya."
 free_nsp_monarchist_our_strategic_resources: "Nuestros Recursos Estratégicos"
 free_nsp_monarchist_our_strategic_resources_desc: "Si bien la autarquía no es la mejor estrategia considerando nuestra posición en el territorio, al menos podemos maximizar nuestra situación interna para ser más estratégicos en el escenario mundial. Por lo tanto, invertiremos grandes sumas en la creación de reservas estratégicas y flujos de recursos en términos de operaciones mineras."
 free_nsp_monarchist_the_great_power_plant: "La Gran Planta de Energía"
 free_nsp_monarchist_the_great_power_plant_desc: "Con toda esta gran y rápida expansión, también debemos asegurarnos de que tales demandas se cumplan, con esto en mente, debemos invertir en complejos masivos de plantas de energía para asegurar que la producción de energía, así como su utilización, se mejoren enormemente."
 the_dust_settles: "El polvo se ha asentado... ¿Qué hacemos ahora?"
 FS_established_elections: "Se han reestablecido las elecciones"
 FS_continued_election_ban: "Las elecciones han sido detenidas"
 USB_UFSR_desc: "[USB.GetFlag]§YEstados Libres de América§! cambia su nombre a §YUnión de Repúblicas Socialistas Libres§!"
 USB_MidAtlantic_Union_desc: "[USB.GetFlag]§YEstados Libres de América§! cambia su nombre a §YUnión Militar del Atlántico Medio§!"
 USB_MidAtlantic_States_desc: "[USB.GetFlag]§YEstados Libres de América§! cambia su nombre a §YUnión Federal del Atlántico Medio§!"
 USB_second_american_republic_desc: "[USB.GetFlag]§YEstados Libres de América§! cambia su nombre a §YSegunda República Americana§!"
 free_states_idea_isolationist_focused_foreign_office: "Oficina de Asuntos Exteriores Aislacionista"
 free_states_idea_isolationist_focused_foreign_office_desc: "Con el estado absoluto de nuestra nación, la mayoría de los nombramientos para la oficina de asuntos exteriores se ven como dinero fácil. Esto se debe a la pesada apatía que proviene del hecho de que estamos reconstruyendo la sociedad misma. No obstante, a medida que nos desarrollamos y comencemos a prosperar, podemos mirar hacia horizontes más brillantes en el futuro."
 free_states_idea_neighborhood_foreign_policy: "Política Exterior de Vecindad"
 free_states_idea_neighborhood_foreign_policy_desc: "Con la nación en un punto álgido en términos de economía, así como desarrollos militares y políticos, hemos tenido recientemente un aumento en el interés extranjero. Por lo tanto, dado que aún necesitamos averiguar qué queremos hacer realmente, nos prepararemos para lidiar con el vecindario como mejor nos parezca. Este paso es solo un hecho simple de que pronto alcanzaremos la grandeza y volveremos a formar parte del escenario global."
 free_states_idea_naval_budget_priorities: "Prioridad del Presupuesto Naval"
 free_states_idea_naval_budget_priorities_desc: "Con la mayor parte del ejército restante del antiguo orden involucrado de una u otra manera con la marina, nuestras prioridades presupuestarias han comenzado a reflejar tales influencias. Pero ¿qué tan buena es tal influencia cuando nuestras espaldas están hacia el continente y no necesariamente hacia el mar?"
 free_states_idea_army_defensive_budgeting: "Presupuesto Defensivo del Ejército"
 free_states_idea_army_defensive_budgeting_desc: "Las guerras modernas pueden ganarse muy rápidamente o muy lentamente. El civil moderno tiene más poder a su disposición del que muchos parecen darse cuenta, y sin embargo, nosotros sí nos damos cuenta de esto. Nuestra doctrina moderna combinará aspectos de la guerra de cuarta generación con la doctrina de desgaste estándar. Asegurando que podamos tener una defensa móvil con el menor gasto posible tanto en material como en personal. Esta nueva doctrina se llama DEW o Guerra de Gastos Defensivos."
 free_states_idea_naval_renovations_budget: "Presupuesto de Renovaciones Navales"
 free_states_idea_naval_renovations_budget_desc: "Con el estado de nuestra situación y nuestra costa siendo considerable en el mejor de los casos y monstruosa en el peor, debemos invertir en renovar y remodelar toda nuestra marina si queremos siquiera pensar en defendernos de los vastos océanos y aquellos que buscan desembarcar en nuestras costas."
 free_states_idea_foreign_relations_act: "Ley de Relaciones Exteriores"
 free_states_idea_foreign_relations_act_desc: "La Ley de Relaciones Exteriores es una inversión diplomática para apelar a las potencias extranjeras y obtener mejores acuerdos comerciales y programas de intercambio de trabajadores. En general, nuestra economía crecerá, pero nuestras capacidades políticas estarán tensas debido a mantenernos al tanto de tales obligaciones."
 free_states_idea_domestic_priority_policy: "Política de Prioridad Nacional"
 free_states_idea_domestic_priority_policy_desc: "La PPN es el ideal de la aplicación de una política nacional y el bienestar de la nación y sus ciudadanos es la principal prioridad. Debemos asegurarnos de que nuestra defensa nacional esté asegurada, tomando este enfoque más interno significa que la política exterior debe priorizar la seguridad de nuestra nación. Por lo tanto, cosas como el comercio y la defensa nacional son la idea en este plan."
 free_states_idea_diplomatic_corps: "Cuerpo Diplomático"
 free_states_idea_diplomatic_corps_desc: "Los enemigos, así como los amigos, vienen en todas las formas y tamaños, por lo que para asegurarnos y entender quién es quién, debemos tener un cuerpo diplomático de primera categoría para que la información sobre las relaciones sea la más rápida posible cuando ocurran cambios drásticos."
 free_states_idea_national_labor_corps: "Cuerpo Nacional de Trabajo"
 free_states_idea_national_labor_corps_desc: "La combinación de un cuerpo de trabajo penal y civil dedicado para ayudar a aquellos que necesitan un trabajo o ingresos y la capacidad de usar a aquellos que han intentado quitarle a la sociedad para devolver más. En resumen, el CNT se utilizará para hacer crecer y mantener el aparato en constante expansión de nuestra nación."
 FSA_america_military_surplus_jobs: "Trabajos de Excedentes Militares"
 FSA_america_military_surplus_jobs_desc: "Producir equipos para el ejército, ya sea armas o algo tan simple como las cantimploras de las que bebe la infantería, todo es importante a su manera. Por lo tanto, ¿qué mejor manera de manejar el problema del desempleo como una solución temporal que utilizando pasivamente las industrias militares como una forma no solo de obtener más equipos y suministros para nuestros defensores nacionales, sino también de generar ingresos para aquellos que aún buscan un trabajo civil adecuado?"
 free_states_idea_extreme_mining_projects: "Proyectos Mineros Extremos"
 free_states_idea_extreme_mining_projects_desc: "Aunque algunos pueden llamarlo minería imprudente, nos hemos catapultado a un reconocimiento internacional cercano a través de operaciones mineras extensas y a menudo extremas. Aunque una buena cantidad de personas no les gusta este tipo de \"minería despiadada\", no podemos ignorar el posible apalancamiento que podemos tener sobre otras naciones en términos de acuerdos comerciales y beneficiar a nuestros ciudadanos con bienes comerciales."
 free_states_idea_strategic_autarky: "Autarquía Estratégica"
 free_states_idea_strategic_autarky_desc: "El PAE o Programa de Autarquía Estratégica es una iniciativa estratégica nacional para asegurar que nuestros acuerdos comerciales sean limitados y que los acuerdos que hagamos sean seguros para el beneficio de nuestros ciudadanos. Puede que no sea la estrategia más aceptable en términos de asuntos internacionales, pero debemos preservarnos."
 free_states_idea_consumer_complex_initiative: "Iniciativa del Complejo del Consumidor"
 free_states_idea_consumer_complex_initiative_desc: "La ICC es un modelo económico que pone a las industrias basadas en el consumidor como la base principal y la organización de la economía. Con esto en mente, las industrias de defensa o industrias especializadas en lo que se ve como el sector \"Oficial\" de la economía se consideran secundarias y son partes más complementarias del Complejo del Consumidor basado en las necesidades nacionales. Esto significa, sin embargo, que construir tales cosas sufre, pero con nuestra gente bien cuidada, ¿a quién le importa?"
 free_states_idea_economic_efficiency_model: "Modelo de Eficiencia Económica"
 free_states_idea_economic_efficiency_model_desc: "Cuando dijeron construir alto, la mayoría solo asumió edificios en general para tener más personas en un área. Sin embargo, con nuestro nuevo plan económico MEE, podemos asegurarnos de que construir alto también pueda ser un modelo económico. Al enfocarnos en las industrias de manera de obtener más producción de medios más pequeños, podemos asegurar el gasto limitado de recursos mientras mantenemos un crecimiento equilibrado y eficiente."
 free_states_idea_military_readiness_model: "Modelo de Preparación Militar"
 free_states_idea_military_readiness_model_desc: "El MPM es un modelo económico que se centra en la militarización preventiva de la economía. Esto significa que las fábricas y las industrias se construyen con la preconcepción de que podrían convertirse en una instalación de fabricación en tiempos de guerra. Esto permite que nuestra economía funcione de manera sostenible, pero puede ser altamente adaptable si alguna vez surgiera la necesidad."
 free_states_idea_department_for_synthetic_development: "Departamento para el Desarrollo Sintético"
 free_states_idea_department_for_synthetic_development_desc: "Todos saben que los combustibles fósiles son limitados, pero ¿qué pasa si pudiéramos estirar ese límite lo más científicamente posible? Aquí es donde entra el DDS, un departamento de I+D dedicado a averiguar exactamente dónde está ese límite y qué sintéticos del futuro podemos hacer, ya sean plásticos, nailon o ciertos productos químicos o lubricantes del sector petroquímico. Usamos el pasado para crear un futuro."
 free_states_idea_department_for_energy_innovation: "Departamento para Innovaciones Energéticas"
 free_states_idea_department_for_energy_innovation_desc: "Para afirmar que usamos el futuro, debemos asegurarnos de que científicamente sea realmente el futuro. Por lo tanto, el DEI está dedicado a la tarea de descubrir y descubrir innovaciones en la producción de energía, así como formas más eficientes de consumir energía sin desperdicio donde sea posible."
 free_states_idea_infrastructure_readiness_act: "Ley de Preparación de Infraestructuras"
 free_states_idea_infrastructure_readiness_act_desc: "La Ley de Preparación de Infraestructuras es una declaración de guerra en sí misma contra el descontento y la pereza cuando se trata de la preservación de la infraestructura de nuestra nación. Establecer intervalos de inspección y preplanificar fechas de construcción, así como adquisiciones de materiales, permitirá la rápida reparación y mantenimiento de nuestra infraestructura mientras se limita el efecto general que puede tener en la vida diaria de la población local."
 free_states_idea_military_high_command: "Mando Militar Unificado"
 free_states_idea_military_high_command_desc: "Con este ahora liderazgo centralizado \"de alto nivel\", podemos expandir, entrenar, desarrollar y mejorar aún más nuestras fuerzas militares y sus capacidades."
 free_states_idea_defensive_officers_school: "Escuela de Oficiales Defensivos"
 free_states_idea_defensive_officers_school_desc: "Debemos entender cómo mantenernos firmes, entrenamiento especializado en obtener más de menos y ser capaces de manejar realmente nuestras propias iniciativas de defensa contra un enemigo imprudente."
 free_states_idea_the_bulwark_doctrine: "La Doctrina del Baluarte"
 free_states_idea_the_bulwark_doctrine_desc: "La Doctrina del Baluarte es nuestro cambio fundamental en la preservación de la defensa y el espíritu de nuestra nación. Entender cómo utilizar el terreno, la logística y la capacidad de defender hasta la muerte sin que todos mueran. Esta colección es lo que determinará si sobrevivimos o nos perdemos en las pruebas del tiempo mismo."
 free_states_idea_the_fighter_defense_doctrine: "La Doctrina de Defensa de Cazas"
 free_states_idea_the_fighter_defense_doctrine_desc: "Defender nuestros cielos nos permite asegurar nuestras fuerzas terrestres. Por lo tanto, debemos especializar nuestro entrenamiento aéreo y producción para asegurar la supremacía de nuestras capacidades aéreas."
 free_states_idea_the_increasing_defensive_capabilites: "Aumento de las Capacidades Defensivas"
 free_states_idea_the_increasing_defensive_capabilites_desc: "El programa IDC es la utilización de nuestros métodos de producción de aeronaves para beneficiar y ayudar a nuestros pilotos humanos a hacer cosas en el aire que los pilotos normales no podrían hacer. Innovaciones en radar, avances en empuje y control de vuelo, y así sucesivamente. Seremos los defensores de las vías aéreas de nuestra nación y será un día claro todos los días."
 free_states_idea_naval_mining_warfare_refinement_program: "Programa de Refinamiento de Guerra de Minas Navales"
 free_states_idea_naval_mining_warfare_refinement_program_desc: "El Programa de Refinamiento de Guerra de Minas Navales es una institución dedicada al entrenamiento y mejora para entrenar y refinar nuestra marina en torno a la destreza de las minas marinas y la guerra de minas."
 free_states_idea_armored_assault_assist_groups: "Grupos de Asistencia de Asalto Blindado"
 free_states_idea_armored_assault_assist_groups_desc: "El GAAA o Triple AG es una doctrina de batalla para localizar y especializar elementos blindados para asistir a nuestro ejército principal en la perforación y división de las fuerzas enemigas."
 free_states_idea_aggressive_officer_corps: "Cuerpo de Oficiales Agresivos"
 free_states_idea_aggressive_officer_corps_desc: "La reestructuración de nuestros programas de entrenamiento de oficiales y academias militares permitirá que nuestro liderazgo sea agresivo de maneras que no habíamos visto antes. Esto obviamente tendrá un costo, pero no obstante aseguraremos que si somos atacados, el enemigo lamentará haber tomado tal decisión."
 free_states_idea_material_not_human_loss: "Pérdida de Material, No de Humanos"
 free_states_idea_material_not_human_loss_desc: "El equipo puede ser reemplazado, pero los soldados experimentados y entrenados no pueden, aseguraremos los estilos de entrenamiento que alienten que la posible pérdida de equipo sea una certeza, pero la pérdida de compañeros soldados sea irreemplazable."
 free_states_idea_survivability_program: "Programa de Supervivencia"
 free_states_idea_survivability_program_desc: "Debemos asegurar las innovaciones en supervivencia, en este sentido, buscaremos refinar y desarrollar tales formas de maximizar no solo la supervivencia del personal, sino también, si es posible, la supervivencia del equipo."
 free_states_idea_admirable_admiralty: "El Almirantazgo Admirable"
 free_states_idea_admirable_admiralty_desc: "La destreza y los talentos naturales de nuestros líderes navales son la cúspide de cómo aseguramos nuestra supremacía naval."
 FSA_america_hit_and_hit_again: "Golpéalos y Luego Golpéalos de Nuevo"
 FSA_america_hit_and_hit_again_desc: "¿Alguna vez has intentado jugar a la guerra psicológica con barcos? Bueno, ahora podemos. Especializándonos y entendiendo las debilidades de nuestra propia especie, podemos dirigir nuestras jugadas de batalla para asestar golpes críticos después de la desorientación de las tripulaciones enemigas. Es una jugada arriesgada, pero si tiene éxito, resultaría en golpes críticos contra las capacidades de la flota enemiga."
 free_states_idea_the_assimilation_program: "El Programa de Asimilación"
 free_states_idea_the_assimilation_program_desc: "Crear una nueva identidad a partir de ideas antiguas tiende a no ser popular entre individuos e idealistas. Por lo tanto, debemos cambiar estas preconcepciones y trabajar para sofocar el progreso de tales tendencias distractivas."
 free_states_idea_the_second_american_republic: "La Segunda República Americana"
 free_states_idea_the_second_american_republic_desc: "A través de sangre, sudor, lágrimas y muchas otras pruebas, hemos buscado el manto y asegurado nuestro destino. Renovando el Sueño Americano y creando la Segunda República Americana, finalmente se ha dado vuelta a un capítulo en este libro de libertad que los fundadores escribieron por primera vez en 1776. Hacia una nueva era, una nueva luz y un nuevo futuro para nuestra nueva república."
 free_states_idea_the_self_made_embargo: "El Embargo Autoimpuesto"
 free_states_idea_the_self_made_embargo_desc: "La tecnología moderna que tenemos y los métodos de sintéticos permiten que las creencias autárquicas y aislacionistas se realicen mejor que nunca. Con esto, estableceremos un precedente moderno no visto desde los días del Shogunato de Japón."
 free_states_idea_ground_to_air_dominance: "Dominio Tierra-Aire"
 free_states_idea_ground_to_air_dominance_desc: "No tenemos a dónde correr, así que deja de correr y comienza a luchar. Inversiones significativas en capacidades prácticas de combate tierra-aire permitirán que mantengamos nuestro territorio en cualquier guerra aérea moderna sobre nuestras tierras legítimas. Además, el equipo adicional también puede ayudar con cualquier guerra subterránea si partes de nuestro territorio son sitiadas."
 free_states_idea_graveyard_warfare_doctrine: "Doctrina de Guerra de Cementerio"
 free_states_idea_graveyard_warfare_doctrine_desc: "La GWD o Doctrina de Guerra de Cementerio es una doctrina integral relacionada con la guerra asimétrica o de cuarta generación. Esta doctrina de guerra ciudadana hará que sea un infierno para cualquier potencia extranjera que desee subyugarnos a nosotros y a nuestra gente a un infierno de su propia creación."
 free_states_divided_we_fell: "Divididos Caímos"
 free_states_divided_we_fell_desc: "La república ya no existe, ahora somos una sombra de lo que alguna vez fuimos. Las tierras están en llamas, la gente muriendo, huyendo o sobreviviendo de cualquier manera posible. Sin embargo, esto significa que, aunque esencialmente estamos solos, nuestros vecinos del norte y del sur están recibiendo algo de ayuda con respecto a la mayor crisis humanitaria que ha golpeado a los continentes del Nuevo Mundo. El camino está roto, lleno de muchos obstáculos, pero debemos seguir adelante y, con suerte, buscar algún tipo de horizonte."
 free_states_federal_budgets: "Políticas Presupuestarias Federales"
 free_states_federal_budgets_desc: "Para asegurar la prosperidad, debemos equilibrar los libros. Debemos aprender del mundo que nos rodea y entender que la deuda es un número que debemos entender y no ignorar."
 free_states_domestic_policies: "Políticas Nacionales"
 free_states_domestic_policies_desc: "Debemos esforzarnos por mejorar a nuestra gente, por construir no solo nuestra nación, sino también a los ciudadanos y la cultura que conforman lo que llamamos hogar."
 free_states_industrial_policies: "Departamento de Asuntos Industriales"
 free_states_industrial_policies_desc: "El DoIA, o a veces conocido como la IAA, Administración de Asuntos Industriales, es una rama del gobierno encargada de ayudar a regular, optimizar y moldear nuestra economía. Trabaja mano a mano con el DoM en la creación de regulaciones equilibradas y planes para hacer crecer, diversificar y mantener bajo control la economía de nuestra nación. Pero mientras que el DoM maneja estrictamente la asignación de recursos y la organización de dichos recursos, la IAA maneja la planificación y la innovación dentro de las empresas que utilizan estos recursos."
 free_states_resource_management_policies: "Departamento de Gestión de Recursos"
 free_states_resource_management_policies_desc: "El Departamento de Gestión de Recursos, o simplemente conocido como el Departamento de Gestión, DoM, es una agencia gubernamental encargada de reconstruir y reestructurar la sociedad misma. Al tener el departamento completamente enfocado en los recursos disponibles para nosotros, o en este caso, lo que no está disponible para nosotros, permite establecer prioridades y encontrar formas de crear mucho más con mucho menos. Este departamento será clave para establecer el curso de nuestro desarrollo y la marca que dejaremos en la historia."
 free_states_tax_policies: "Políticas Fiscales"
 free_states_tax_policies_desc: "Para medir nuestro progreso, debemos tener un código fiscal estable y adaptable. Este código debe adaptarse a las necesidades de nuestra gente y al interés nacional que asegurará nuestro futuro y el camino que pavimentaremos para lograrlo."
 free_states_army_service_branch: "Rama del Servicio del Ejército"
 free_states_army_service_branch_desc: "La columna vertebral de la defensa nacional y el núcleo de nuestro ejército. Para preservar nuestra nación y su gente, debemos reformar y establecer una fuerza de combate que no solo pueda mantener nuestra patria, sino también lidiar con los enemigos que amenazan nuestra forma de vida."
 free_states_air_force_service_branch: "Rama del Servicio de la Fuerza Aérea"
 free_states_air_force_service_branch_desc: "Aunque la columna vertebral es el ejército, la reina del campo de batalla no está en tierra, sino en el aire con la fuerza aérea. Debemos mantener el ritmo de nuestros enemigos si queremos proteger realmente nuestra tierra. Porque lo que no pueden asaltar en tierra, pueden bombardear y ametrallar desde el aire."
 free_states_navy_service_branch: "Rama del Servicio Naval"
 free_states_navy_service_branch_desc: "La marina es la pantalla que retrasa y nos advierte de las intenciones del enemigo. Debemos tener una marina fuerte para crear un elemento disuasorio y poder proteger nuestra patria de las amenazas más allá de las tierras que compartimos."
 free_states_idea_hit_them_again_doctrine: "Doctrina Golpéalos de Nuevo"
 free_states_idea_hit_them_again_doctrine_desc: "Cuando lanzas todo a alguien, o entran en pánico, retroceden o pierden cohesión. Por lo tanto, explotemos esta idea instituyendo un nuevo tipo de juego de batalla contra el enemigo. Al preparar la flota o el buque naval para lanzar literalmente todo lo posible hacia el enemigo, esta desorientación permitirá un rápido rearme de un ataque de precisión para asestar golpes críticos y posiblemente derribar los buques enemigos."
 USA_colorado_capital: "Monte Columbia"
 USA_kansas_capital: "Nuevo Arlington"
 USA_missouri_capital: "Winfield"
 USB_decisions_war_time_mobilization_category: "Movilización en Tiempo de Guerra"
 USB_decisions_war_time_mobilization_category_desc: "Llegará el momento de defender nuestras tierras y crear nuestro destino. Tomemos las armas y defendamos nuestras tierras y los monumentos que resistirán la prueba del tiempo."
 USB_war_time_mobilization: "Primera Ola de Movilización"
 USB_war_time_mobilization_desc: "El momento ha llegado, defendamos Washington y nuestras libertades federales que consideramos verdaderas. Defenderemos!"
 USB_war_second_wave_defenders: "Defensores de la Segunda Ola"
 USB_war_second_wave_defenders_desc: "El enemigo avanza, por lo tanto, debemos reclutar otra ola de defensores. La moral de la nación sufrirá, pero necesitamos las tropas."
 USB_war_desperate_defenders: "Defensores Desesperados"
 USB_war_desperate_defenders_desc: "Las cosas se están poniendo sombrías, necesitamos todos los cuerpos disponibles, capaces o no, para mantener la línea. Tal vez, solo tal vez, aún podamos ganar esto."
 post_united_event.1.t: "El Facionalismo Fractura los Estados Libres"
 post_united_event.1.d: "En el apresurado despertar de la apariencia de sociedad conocida como los Estados Libres de América, el gobierno federal presidencial de esta nación residual ha desarrollado una serie de faccionalismos fuertes. Este faccionalismo se divide en lo que muchos ven como cuatro grupos. Estos grupos consisten en los socialistas en el norte, los militaristas en el este, los monárquicos en el sur y los federalistas en el centro/oeste. Estas facciones se han consolidado en dos facciones principales, más por venir a medida que encontremos nuevos detalles."
 post_united_event.1.o1: "¿No Nos Dividimos Lo Suficiente?"
 post_united_event.2.t: "El Grupo Pro Elecciones"
 post_united_event.2.d: "En el reciente aumento del faccionalismo político, hemos visto el surgimiento de grupos pro elecciones como el Partido Federalista, el Partido Socialista Libre y el Partido Monarquismo Moderno. Estos partidos, aunque diferentes en sus objetivos finales y esencialmente en cualquier cosa cohesiva, han coincidido de alguna manera en el principio de las elecciones. Entendiendo que el sistema de votación sea lo más representativo posible dadas las circunstancias actuales. Muchos aún se aferran a la esperanza de que votar por el futuro nos unirá más a largo plazo que dividirnos, pero solo el tiempo lo dirá."
 post_united_event.2.o1: "Votemos por el Futuro que Queremos"
 post_united_event.3.t: "El Grupo Anti Elecciones"
 post_united_event.3.d: "Por otro lado, tenemos los partidos anti elecciones, que consisten en el Partido Federalista, el Partido Socialista Libre y el Partido de Servicios Unidos. Como se puede ver, el faccionalismo que divide a los dos partidos principales, el Federalista y el Socialista Libre, parecen dividir fundamentalmente los posibles boletos futuros si se celebraran elecciones. Aunque sabemos poco sobre el estado de estas divisiones, veremos qué puede surgir en los próximos días a medida que continúe el debate."
 post_united_event.3.o1: "Necesitamos Enfocarnos, No Debatir."
 post_united_event.4.t: "La Encuesta Divisiva"
 post_united_event.4.d: "En las últimas semanas, encuestadores y periodistas han estado recorriendo la nación en una especie de esquema de votación pseudo llamado \"Encuesta Nacional\", que ha dejado a muchos divididos sobre qué dirección deberíamos tomar realmente. Al final, muchos coincidieron en que las elecciones en este momento solo servirían como una distracción en el estado debilitado y paralizado en el que nos encontramos. Ahora depende de los cuatro partidos principales inclinar la opinión pública a su favor. El Partido Federalista y su facción más conservadora, la facción estatista del Partido Socialista Libre, la facción aislacionista del Partido del Atlántico Medio o la facción militarista del Partido de Servicio Nacional. Todos quieren cosas diferentes, pero todos quieren lo mismo. No hay elecciones y una identidad más autosuficiente para el futuro previsible."
 post_united_event.4.o1: "Los Federalistas Emergen Victoriosos"
 post_united_event.4.o2: "La FSP Comunaliza la Victoria"
 post_united_event.4.o3: "El \"MAP\" Aislacionista Asegura el Poder"
 post_united_event.4.o4: "El NSP Gana Otra Batalla"
 post_united_event.5.t: "Las Primeras Elecciones"
 post_united_event.5.d: "Con las elecciones restablecidas, ahora es el momento de que se emitan los votos y el pueblo elija la dirección que desea tomar. Por lo tanto, los partidos Federalista, Socialista Libre, del Atlántico Medio y de Servicio Nacional buscan el apoyo público para asegurar una mayoría en las elecciones. Pero a medida que pasa el tiempo y se cuentan los votos, el ganador de las primeras elecciones oficiales es..."
 post_united_event.5.o1: "Los Federalistas Han Ganado"
 post_united_event.5.o2: "La Victoria Socialista Libre"
 post_united_event.5.o3: "El Partido del Atlántico Medio Obviamente Ganó"
 post_united_event.5.o4: "El Partido de Servicio Nacional Trae la Victoria"
 post_united_event.1000.t: "La Gran Pregunta"
 post_united_event.1000.d: "Con los vientos cambiando a nuestro favor esperanzador, tomamos una postura nacional y proclamamos un posible cambio de nombre para la nación. Por lo tanto, se organizó una votación nacional y pronto se contarán los resultados. La gran apuesta está en marcha y veremos lo que la gente realmente quiere... solo esperemos que seamos nosotros a quienes quieren."
 post_united_event.1000.o1: "Somos Arcadia!!!"
 post_united_event.1000.o2: "Al Menos Estamos Unidos... ¿Verdad?"
 post_united_event.2000.t: "La Crisis de la Capital"
 post_united_event.2000.d: "Tras el Segundo Destino Manifiesto, los ojos y oídos del pueblo de la nación se vuelven hacia la capital, que aún está en la antigua choza de la costa este. Muchos creen que la capital no debería cambiar debido a su simbolismo, mientras que muchos más creen que debería cambiar para simbolizar el cambio de la nación en su conjunto. Una nueva capital permitiría una mejor planificación previa en términos de ampliar la Cámara de Representantes, algo que muchos consideran uno de los principales fallos del pantano político del antiguo orden. Además, una nueva capital probablemente estaría más centrada, dando luz, atención y exposición a personas que nunca habrían soñado con considerar lo que hace el gobierno federal. Sin embargo, varios candidatos están a la vista y depende del pueblo y sus líderes tomar la decisión."
 post_united_event.2000.o1: "¿Por Qué Cambiar, las Cosas Están Bien?"
 post_united_event.2001.t: "Las Montañas Rocosas"
 post_united_event.2001.d: "Muchos argumentan la creación de una región capital cerca o prácticamente en las Montañas Rocosas. Esto crearía una especie de aparato fortificado natural si alguna vez nuestra nación fuera atacada. Otros argumentan que podría verse como un poco más aislante de lo que se pretendía. Sin embargo, los planificadores ya han comenzado a sentar las bases para algún tipo de asentamiento en el norte de Colorado."
 post_united_event.2001.o1: "¿Obtenemos Helado Rocky Road a Buen Precio?"
 post_united_event.2002.t: "El Gobierno \"Central\""
 post_united_event.2002.d: "Los planificadores de Kansas argumentan que donde proponen una nueva ubicación para la capital es una de las sugerencias más centrales. Esto se vería como justo y no favorecería una mentalidad pro costa este versus costa oeste. Sin embargo, tendremos que evaluar el resto de nuestras opciones para asegurar la validez de nuestra elección."
 post_united_event.2002.o1: "Tienen un Punto, Sin Embargo."
 post_united_event.2003.t: "La Opción de la Barrera del Río"
 post_united_event.2003.d: "Muchos en los últimos días han visto más factible tener la capital cerca del río Mississippi, una gran y dedicada barrera contra los asaltos terrestres enemigos. Un símbolo de la supuesta división continental de nuestra nación y una posición más segura cuando se considera el río algo vertical que cubriría su flanco sur mientras que su este y casi norte también estarían cubiertos. La opción es más oriental que las otras dos opciones, pero está situada en el lado oeste del Mississippi. Sin embargo, aún queda la planificación de cómo se verá el nuevo edificio, así como qué planeamos hacer con la Cámara de Representantes."
 post_united_event.2003.o1: "Suficiente Agua Al Menos."
 post_united_event.2004.t: "La Decisión Final"
 post_united_event.2004.d: "Después de semanas de deliberación y planificación, las encuestas del público y muchos otros aspectos de la situación. Finalmente es el momento de decidir dónde estará la nueva capital y su nombre. En Colorado está la propuesta de Monte Columbia, en Missouri tenemos el pueblo de Winfield siendo utilizado como base con sus alrededores de los ríos Missouri y Mississippi como fronteras naturales. Finalmente, tenemos la propuesta de New Arlington en el norte de Kansas, espaciosa, abierta y más o menos vacía, sería un lienzo en blanco probable para desarrollar."
 post_united_event.2004.o1: "La Vieja Capital Está Bien."
 post_united_event.2004.o2: "Las Montañas Rocosas Defenderán la Libertad."
 post_united_event.2004.o3: "Obviamente, una Ubicación de Gobierno Central."
 post_united_event.2004.o4: "El Mississippi Defenderá la Libertad."
 post_united_event.2005.t: "La Nueva América"
 post_united_event.2005.d: "Con la proclamación de la Segunda República Americana, ahora buscamos reformar y adaptar nuestra administración a la escala a la que hemos crecido. Obviamente habrá ineficiencias porque hay mucho que controlar, sin embargo, prevaleceremos. El águila cayó, pero se elevó una vez más para volar aún más alto."
 post_united_event.2005.o1: "Novus Americanus, La Nueva Era Americana"
 USB_america_economy_what_economy: "Economía...¿Qué economía?"
 USB_america_economy_what_economy_desc: "Con la situación actual, debemos establecer un marco de referencia. Este marco consiste en establecer reformas legislativas en materia de regulación económica, así como aumentos presupuestarios entre programas de atención, programas de asistencia a la educación y la formación, y programas administrativos en materia de subvenciones para la inversión. En definitiva, estableceremos un estándar administrativo y presupuestario para asegurar que podamos abordar nuestro crecimiento económico de la mejor manera posible."
 USB_america_department_of_labor_affairs: "Departamento de Asuntos Laborales"
 USB_america_department_of_labor_affairs_desc: "El Departamento de Asuntos Laborales se dedica a analizar y mejorar las leyes y regulaciones laborales para lograr una mayor eficiencia con menos personas. Además, el Departamento de Trabajo controla los programas de asistencia por desempleo, por lo que su financiación se divide en dos partes principales: los programas de asistencia por desempleo y los programas de reintegración, que permiten a las personas desempleadas participar en ferias de empleo organizadas y otros programas para obtener ingresos fijos hasta que encuentren un nuevo empleo estable."
 USB_america_ensuring_the_modern_four_day_week: "La semana moderna de cuatro días"
 USB_america_ensuring_the_modern_four_day_week_desc: "En la era moderna, vemos que la automatización y la tecnología permiten que nuestra fuerza laboral sea más eficiente que hace diez o veinte años. Por ello, la semana laboral moderna de cuatro días es el estándar de oro para garantizar un verdadero equilibrio entre el trabajo y la vida social. Comprender esta métrica nos permite obtener aún más valor de la producción y el empleo de la fuerza laboral actual."
 USB_america_ensuring_enforced_job_fairs: "Garantizar el cumplimiento de las ferias de empleo"
 USB_america_ensuring_enforced_job_fairs_desc: "Impulsar la creación y continuidad de ferias de empleo es esencial para que los empleadores sepan qué tipo de fuerza laboral hay en su zona, además de exponerlos a empleos que quizá ni siquiera sabían que existían. Esto nos costará un poco, pero para garantizar la fluidez de la búsqueda de empleo, vale la pena."
 USB_america_automation_and_advancements_act: "Ley de Automatización y Avances"
 USB_america_automation_and_advancements_act_desc: "La Ley Triple A, o como se la conoce, la Ley de Automatización y Avances, es un paquete presupuestario para educación e I+D que busca que las industrias cumplan con los estándares en las prácticas más comunes, como la robótica, la automatización y los programas basados ​​en IA, que contribuyen a aumentar la producción y la eficiencia en industrias de todo el mundo. Si bien esto afectará a los supersticiosos, ya que podría provocar la pérdida temporal de sus empleos, podemos mitigar la magnitud del problema invirtiendo en la modernización de nuestro sistema educativo para que las personas sean más conscientes de estos empleos a una edad más temprana."
 USB_america_national_labour_corps: "Cuerpo Nacional del Trabajo"
 USB_america_national_labour_corps_desc: "El Cuerpo Nacional de Trabajo es un cuerpo de trabajo civil financiado por el gobierno federal, en el que tanto los desempleados como, por supuesto, el cuerpo de trabajo penal, trabajarán en proyectos de infraestructura y desarrollo. Esto también nos brindará amplias oportunidades para realizar tareas de mantenimiento en áreas como la infraestructura."
 USB_america_military_surplus_jobs: "Empleos excedentes militares"
 USB_america_military_surplus_jobs_desc: "Trabajar en conjunto con los sectores militar y civil garantizará que los problemas de empleo que sufre nuestra nueva nación se resuelvan mejor y de manera oportuna."
 USB_america_slashing_regulations_for_new_regulations: "Reducción drástica de las regulaciones para nuevas regulaciones"
 USB_america_slashing_regulations_for_new_regulations_desc: "Si queremos siquiera pensar en el crecimiento de nuestra economía, debemos comprender las regulaciones que necesitamos y las que no. Ser favorable a las empresas es una cosa, pero ser pasivo ante la codicia personal de los oportunistas e individualistas que buscan el poder es otra muy distinta. Por lo tanto, debemos reducir drásticamente las regulaciones actuales y, a su vez, reemplazarlas por otras mejores, más claras y flexibles si queremos fomentar el crecimiento sin comprometer su potencial."
 USB_america_department_for_strategic_resource_collection: "Departamento de Recolección de Recursos"
 USB_america_department_for_strategic_resource_collection_desc: "El Departamento de Recolección de Recursos Estratégicos, o simplemente DoRC, es el departamento administrativo del DoRM encargado de la recolección de una reserva estratégica y el suministro de recursos cruciales para preservar nuestra cohesión nacional. Recursos como acero para la construcción, combustibles fósiles para la energía, etc. Con este departamento, aseguraremos el futuro."
 USB_america_aggressive_extraction_methods: "Métodos Agresivos de Extracción"
 USB_america_aggressive_extraction_methods_desc: "El asunto de AEM en el departamento ha provocado una importante reacción política, pero el auge económico que se derivará de ello dará lugar a una recuperación mucho mayor si jugamos bien nuestras cartas."
 USB_america_targeted_resource_extraction: "Extracción Selectiva de Recursos"
 USB_america_targeted_resource_extraction_desc: "Contrariamente al enfoque de AEM, el departamento se centrará en los recursos estratégicos más importantes para el funcionamiento de nuestra economía. Esta focalización trabajará en conjunto con el Departamento de Energía para garantizar la coherencia en la forma en que abordamos los proyectos de expansión económica y de recursos."
 USB_america_rusting_sheets_to_polished_metals: "De Chatarra a Metales Pulidos"
 USB_america_rusting_sheets_to_polished_metals_desc: "Ya es hora de transformar la región del \"Cinturón Óxido\" de nuestro país en una nueva y brillante capa de manufactura metalúrgica. Desde las plantas de aluminio de las costas de Jersey hasta las fundiciones de acero del Complejo Erie de Pensilvania, renovaremos lo que una vez estuvo abandonado."
 USB_america_strategic_metallurgic_expansions: "Expansiones Metalúrgicas Estratégicas"
 USB_america_strategic_metallurgic_expansions_desc: "Los programas para PYMES en los antiguos estados del \"Cinturón Industrial\" son una buena iniciativa inicial para aumentar la importancia estratégica y los mercados laborales en estos bastiones manufactureros otrora olvidados."
 USB_america_the_capital_gemstones: "Ley de Piedras Preciosas Capitales"
 USB_america_the_capital_gemstones_desc: "Los estados de Maryland y Delaware no son conocidos por nada más que arcilla, arena y piedra para materiales de construcción. Sin embargo, la minería de carbón de Maryland y Delaware Petrochemicals pueden trabajar en conjunto, además de hacer todo lo posible para impulsar un crecimiento real en las limitadas operaciones mineras de piedras preciosas en ambos estados. Quién diría que el estado más pequeño, así como nuestra capital, estarían... infravalorados, por falta de mejores palabras, jeje."
 USB_america_from_coal_to_petrochemicals: "Del Carbón a los Petroquímicos"
 USB_america_from_coal_to_petrochemicals_desc: "En cuanto a recursos, los estados de Maryland y Delaware presentan una escasez considerable o, en el mejor de los casos, una escasez de recursos. Por lo tanto, para aprovechar esta escasez, expandiremos la industria del carbón en Maryland para impulsar la ciencia como base petroquímica industrial en Delaware. Esto beneficia a ambos estados y nos da más motivos para invertir en I+D."
 USB_america_the_dynamic_ming_duo: "Dúo Dinámico Minero"
 USB_america_the_dynamic_ming_duo_desc: "Virginia, que antes era un estado único, ahora es dos partes de nuestra nación. Dada la limitada diversidad de recursos de Virginia, debemos expandir cada uno y destacar el acero, el cobre y otros minerales esenciales. Sin embargo, con Virginia Occidental la situación es mucho más diferente: el estado solo cuenta con carbón. De ahí que se le conozca como el Estado de la Perla Negra. Así que, a extraer perlas, ¿sabías que también extraen piedras preciosas? Un pequeño y atractivo trabajo extra en nuestros proyectos a gran escala."
 USB_america_black_pearls_fuel_valley_industries: "Perlas Negras que Impulsan las Industrias del Valle"
 USB_america_black_pearls_fuel_valley_industries_desc: "A través del crecimiento directo de las operaciones de extracción de carbón y combustibles fósiles de Virginia Occidental, podemos alimentar y satisfacer las necesidades energéticas de las industrias y plantas metalúrgicas de Virginia, como las plantas de acero y titanio, especialmente considerando que el gobierno ha considerado ciertos minerales extraídos en Virginia como \"recursos esenciales\", por lo que debemos mantener el suministro de lo esencial en todo momento."
 USB_america_the_trade_guru: "El Gurú del Comercio"
 USB_america_the_trade_guru_desc: "El auge de nuestros proyectos de desarrollo y expansión de recursos ha culminado no solo en una perspectiva de desarrollo económico que nos permite apreciar el panorama nacional. Sino que también debemos mirar más allá de nuestras fronteras, pues existen muchas naciones que podrían interesarnos en nuestros recursos y, por lo tanto, debemos buscar a estos socios potenciales para asegurar un futuro lucrativo."
 USB_america_strategic_autarky_program: "Programa de Autarquía Estratégica"
 USB_america_strategic_autarky_program_desc: "Para garantizar la máxima seguridad nacional, debemos ser proactivos en la seguridad de nuestros recursos y en el comercio que realizamos con naciones de todo el mundo. Por ello, instituiremos el SAP (Programa de Autarquía Estratégica), que orientará nuestra política comercial en función de la seguridad de los recursos de nuestra nación. Muchos probablemente se mostrarán indiferentes o decepcionados con nuestras acciones, pero es un pequeño precio a pagar para garantizar el bienestar nacional."
 USB_america_industrial_development_planning_board: "Establecer la IDPB"
 USB_america_industrial_development_planning_board_desc: "La Junta de Planificación del Desarrollo Industrial, un organismo especializado dentro del Departamento de Asuntos Industriales que gestiona la planificación y el desarrollo de la economía, al margen de las actividades del sector privado. Su función principal es encontrar un equilibrio basado en las necesidades nacionales, como la necesidad de reducir el desempleo, y qué se necesita para lograrlo, evitando así la creación de empresas fantasma que no contribuyen a las necesidades de la población."
 USB_america_civilian_development_administration: "Administración para el Desarrollo Civil"
 USB_america_civilian_development_administration_desc: "El CDA del IDPB tiene la tarea de desarrollar las iniciativas económicas civiles que el IDPB ha establecido para el crecimiento estable y continuo de la nación, complementando el crecimiento del sector privado."
 USB_america_erie_hudson_initiative: "Iniciativa Erie-Hudson"
 USB_america_erie_hudson_initiative_desc: "El IDPB ha dado luz verde a la Iniciativa Erie-Hudson, un plan de revitalización para devolverle protagonismo a nuestra sección de los antiguos estados del Cinturón Industrial. No es gran cosa, pero es un trabajo honesto."
 USB_america_cumberland_wilmington_initiative: "Iniciativa Cumberland y Wilmington"
 USB_america_cumberland_wilmington_initiative_desc: "La Junta Directiva nos ha dado luz verde para desarrollar los estados de Maryland y Delaware. Por lo tanto, comenzaremos las obras y tendremos todo listo lo antes posible y según lo permita la seguridad."
 USB_america_the_sisters_initiative: "Iniciativa de las Hermanas"
 USB_america_the_sisters_initiative_desc: "La Junta acaba de finalizar los planes para el desarrollo de Virginia. Con esto, traeremos industrialización y empleos a la región de los Apalaches y a otras zonas."
 USB_america_rustic_services_plan: "Plan de Servicios Rústicos"
 USB_america_rustic_services_plan_desc: "Los planes del IDPB para mejorar y ampliar los servicios y la red de oficinas en los estados de Pensilvania y Nueva Jersey han recibido luz verde. Comenzaremos las obras de inmediato y diversificaremos las economías locales en estos estados."
 USB_america_mid_atlantic_tech_plan: "Plan Tecnológico del Atlántico Medio"
 USB_america_mid_atlantic_tech_plan_desc: "Mediante diseños y nuevas versiones, la Junta aprobó el Plan MAT. Este es un esquema de desarrollo para que los estados de Maryland y Delaware atraigan empleos en tecnología y redes de oficinas a la región. Se espera que esto impulse nuestras capacidades de I+D."
 USB_america_virginia_tech_expansions: "Expansiones Tecnológicas de Virginia"
 USB_america_virginia_tech_expansions_desc: "En colaboración con Virginia Tech, la Junta desea establecer planes de desarrollo y expansión para impulsar el sector tecnológico y de servicios de los estados hermanos de Virginia. Esperamos que esto genere nuevas innovaciones y numerosos empleos para los residentes locales."
 USB_america_military_development_administration: "Administración para el Desarrollo Militar"
 USB_america_military_development_administration_desc: "La MDA es la contraparte militar de la CDA. Este departamento es responsable de implementar cualquier plan militar-industrial aprobado por la IDPB para desarrollar y mantener la capacidad defensiva de nuestra nación contra incursiones extranjeras o invasiones directas."
 USB_america_altoona_tanks_and_jersey_jumpers: "Tanques de Altoona y Paracaidistas de Jersey"
 USB_america_altoona_tanks_and_jersey_jumpers_desc: "Se ampliará la capacidad de producción de armas y equipo de apoyo local, como uniformes, etc. Las plantas principales se han designado en Altoona, Pensilvania, y Newark, Nueva Jersey. La Junta espera que estas plantas generen empleos, salarios y un aumento en la capacidad de seguridad local en caso de un ataque de una nación extranjera."
 USB_america_maryland_munitions: "Municiones de Maryland"
 USB_america_maryland_munitions_desc: "El estado de Maryland, así como Delaware, será un excelente lugar para desarrollar equipo de apoyo militar, especialmente por su proximidad a la capital. Por ello, la Junta ha impulsado el Plan de Municiones de Maryland para desarrollar las cadenas de suministro locales en asuntos militares."
 USB_america_appalachian_arms: "Armas de los Apalaches"
 USB_america_appalachian_arms_desc: "El IDPB ha aprobado los planes para algunas instalaciones de armamento en la región de los Apalaches de Virginia Occidental y Virginia. Se espera que estas montañas naturales también puedan utilizarse para almacenar arsenales, así como para ocultar o proteger parcialmente las fábricas de la zona."
 USB_america_philly_shipyards: "Astilleros de Filadelfia"
 USB_america_philly_shipyards_desc: "La zona de la bahía al sur de Filadelfia es un lugar ideal para construir un complejo de astilleros. La Junta ha aprobado la construcción de estos \"Astilleros del Gran Filadelfia\" al sur de Filadelfia y a lo largo de la costa oeste de Nueva Jersey."
 USB_america_delaware_destroyers: "Destructor de Delaware"
 USB_america_delaware_destroyers_desc: "A pesar del nombre, el supuesto plan de desarrollo centrado en Delaware es en realidad un programa naval más amplio para la península. Se construirán astilleros a lo largo de la península, que tanto Maryland como Delaware ocupan, para aprovechar mejor esta extensa costa y mejorar las defensas costeras."
 USB_america_norfolk_navies: "Armadas de Norfolk"
 USB_america_norfolk_navies_desc: "El puerto de Norfolk, Virginia, tiene una larga trayectoria en la creación de armadas de antaño. Por ello, la Junta ha procedido a expandirse y construir astilleros de apoyo relativamente cerca del complejo de Norfolk. Esperan que el complejo naval en su conjunto pueda contribuir a la defensa de nuestras aguas costeras como lo ha hecho durante siglos."
 USB_america_idpb_economic_direction_sub_committee: "Subcomité de Dirección Económica"
 USB_america_idpb_economic_direction_sub_committee_desc: "Dado que la función principal del IDPB es la economía en sí, se ha establecido un subcomité para debatir e informar sobre la mejor decisión posible sobre la dirección económica que debe tomar nuestra nación. Algunos abogan por una economía más manufacturera, otros por una economía más orientada a la tecnología y los servicios de oficina. Aunque hay quienes incluso optan por una organización económica más militar, utilizando las armas como palanca para atraer inversiones extranjeras mediante su venta. No obstante, corresponde a este subcomité decidir cuál es la mejor opción."
 USB_america_the_mom_and_pop_plan: "Plan de Pequeños Negocios"
 USB_america_the_mom_and_pop_plan_desc: "La columna vertebral de la economía son, obviamente, las pequeñas empresas que conforman nuestra gran nación. Por lo tanto, continuaremos el desarrollo económico siguiendo pautas que garanticen su preponderancia y, posiblemente, construyan una economía mejor que la mayoría."
 USB_america_pittswark_development_scheme: "Plan de Desarrollo de Pittswark"
 USB_america_pittswark_development_scheme_desc: "El PDS es una iniciativa de desarrollo económico planificado en los estados de Nueva Jersey y Pensilvania. Su objetivo es establecer más pequeñas empresas y desarrollar más industrias orientadas al consumo para mejorar la calidad de vida de los ciudadanos de estos estados."
 USB_america_huntingmond_development_scheme: "Plan de Desarrollo de Huntingmond"
 USB_america_huntingmond_development_scheme_desc: "El HDS es una iniciativa de desarrollo económico planificado en los estados de Virginia Occidental y Virginia. Su objetivo es establecer más pequeñas empresas y crear más industrias de consumo para mejorar la calidad de vida de los ciudadanos de estos estados."
 USB_america_wilmingland_development_scheme: "Plan de Desarrollo de Wilmingland"
 USB_america_wilmingland_development_scheme_desc: "El WDS es la iniciativa de desarrollo económico para los estados de Delaware y Maryland. Su objetivo es la creación de más pequeñas empresas y el establecimiento de más industrias de consumo para mejorar la calidad de vida de los ciudadanos de estos estados."
 USB_america_norfolk_naval_contract: "Contrato Naval de Norfolk"
 USB_america_norfolk_naval_contract_desc: "A pesar de nuestras intenciones puramente nacionales, debemos establecer algún tipo de industria de defensa si queremos preservar nuestro estilo de vida e identidad nacional. Por lo tanto, se ampliará el Astillero Naval de Norfolk y se le otorgará un contrato limitado según las necesidades de nuestra defensa."
 USB_america_altoona_automatics_contract: "Contrato del Ejército con Automáticos de Altoona"
 USB_america_altoona_automatics_contract_desc: "El contrato de armamento militar se limita únicamente a la capacidad defensiva necesaria para mantenernos a flote. Por lo tanto, el establecimiento de una fábrica de armas en Altoona, junto con una industria más orientada al consumo, debería calmar cualquier inquietud sobre una militarización injusta."
 USB_america_the_consumer_complex_initiative: "Modelo de Complejo Consumidor"
 USB_america_the_consumer_complex_initiative_desc: "Con la consolidación de nuestra planificación económica, hemos comprendido que la confianza del consumidor y la preservación de las necesidades económicas de nuestros ciudadanos son la verdadera prioridad. Por ello, hemos desarrollado un nuevo modelo económico para garantizar la plena cohesión de dicha priorización de las necesidades de nuestra nación y su gente."
 USB_america_mixed_measures_plan: "Plan de Medidas Mixtas"
 USB_america_mixed_measures_plan_desc: "La planificación económica es un arte en sí misma, y ​​algunos incluso la consideran una ciencia. Sea cual sea su perspectiva, para nosotros es una serie de equilibrios. Una nación o sociedad, de cualquier tamaño, debe satisfacer las necesidades de muchos, y aunque no siempre acertemos, sin duda podemos hacer todo lo posible para no equivocarnos tanto como en el pasado. Por lo tanto, instituiremos el Plan de Medidas Mixtas (PMM), un plan general de desarrollo económico para garantizar el equilibrio y la equidad ante las complejas necesidades de nuestra nación en su conjunto."
 USB_america_rust_belt_renewal_initiative: "Iniciativa de Renacimiento del Cinturón del Óxido"
 USB_america_rust_belt_renewal_initiative_desc: "El RBRI es un programa de diversificación para revitalizar y, por supuesto, diversificar las economías de los antiguos estados del Cinturón Industrial de Jersey y Pensilvania. La idea es que la diversificación revitalice lo que, técnicamente, era un negocio de un solo uso."
 USB_america_twin_sisters_initiative: "Iniciativa de las Hermanas Gemelas"
 USB_america_twin_sisters_initiative_desc: "Las Virginias gemelas necesitan diversificar su economía, y Virginia Occidental más, pero me estoy desviando del tema. Por lo tanto, con esta nueva iniciativa de desarrollo económico, lograremos precisamente eso."
 USB_america_the_baltimore_blossom: "Floración de Baltimore"
 USB_america_the_baltimore_blossom_desc: "Aplicando el mismo estilo de planificación a nuestros últimos estados no diversificados, Maryland y Delaware, podemos entonces centrarnos en las necesidades gubernamentales de defensa nacional. No es la mayor prioridad, pero es algo necesario para garantizar nuestro bienestar."
 USB_america_the_office_initiative: "Iniciativa de Oficinas"
 USB_america_the_office_initiative_desc: "Los sectores de servicios y oficinas son las necesidades directas del consumidor moderno. Desde servicios como internet, televisión por cable, etc., buscamos desarrollar nuestro sector de oficinas y sus derivados, que se beneficiarán del crecimiento de nuestras inversiones."
 USB_america_defense_industry_needs: "Necesidades de la Industria de Defensa"
 USB_america_defense_industry_needs_desc: "Las necesidades de nuestra defensa nacional no son muchas, pero debemos pensar con un enfoque equilibrado. Quizás nunca sepamos si seremos atacados por un enemigo extranjero o incluso por uno de nuestros vecinos. No solo eso, nuestra posición también nos permite pensar de forma innovadora y consolidar una nueva identidad. Por ahora, una militarización limitada bajo el pretexto de la autodefensa es todo lo que necesitamos en este momento."
 USB_america_a_true_balance: "Un Verdadero Equilibrio"
 USB_america_a_true_balance_desc: "Nuestra economía está en auge, es diversa y se están satisfaciendo las necesidades de la gente y del gobierno. Ahora nos centraremos en perfeccionar este modelo, entendiendo cómo desarrollarlo y hacerlo más eficiente en el uso de materiales, recursos humanos y naturales. Sobre todo, implementaremos nuestro nuevo plan EEM, un nuevo modelo económico llamado Modelo de Eficiencia Económica para orientar nuestra economía hacia una planificación de \"construcción en altura\"."
 USB_america_militarized_economy_plan: "Plan de Economía Militarizada"
 USB_america_militarized_economy_plan_desc: "Nuestra situación es precaria en el mejor de los casos y fugaz en el peor. Debemos hibridar la economía y garantizar nuestra defensa nacional, además de cubrir las necesidades básicas de vida de nuestra población."
 USB_america_rustic_arms_act: "Ley de Armas Rústicas"
 USB_america_rustic_arms_act_desc: "El RAA es un paquete de gastos para desarrollar y asegurar la base de las industrias de defensa en los estados del cinturón industrial."
 USB_america_dover_dockyards: "Astilleros de Dover"
 USB_america_dover_dockyards_desc: "Las industrias navales, tanto para fines nacionales como militares, son esenciales si queremos asegurar nuestro comercio en el escenario mundial. Puede que no tengamos la gloria de 350 barcos, pero contar con suficientes para proteger y defender es lo único que importa por ahora."
 USB_america_sister_armaments: "Armamentos Hermanos"
 USB_america_sister_armaments_desc: "A pesar del nombre tímido, no, el convento local no está creando una milicia... por muy divertido que pueda parecer. Se trata de una inversión conjunta en la empresa de fabricación de armas conocida como Sister's Armaments Company. Fundada por dos hermanas y con operaciones reales únicamente en los estados hermanos de Virginia, podemos confiar en esta unidad familiar para producir productos de calidad que defenderán a dichas familias del estado y de la nación en general."
 USB_america_federal_firearms: "Armas de Fuego Federales"
 USB_america_federal_firearms_desc: "El \"Distrito Federal\", es decir, los estados que disputan el área de la capital, necesita armas y equipo de origen local y lo más cercano posible para garantizar el suministro de las fuerzas de defensa en caso de desastre. Por lo tanto, el desarrollo de las industrias de defensa de Virginia y Maryland es fundamental para garantizar la seguridad de la capital de nuestra nación."
 USB_america_complacency_act: "Ley de la Complacencia"
 USB_america_complacency_act_desc: "A pesar de su nombre eufemístico, la Ley de Complacencia es en realidad un paquete masivo dedicado al desarrollo y expansión de industrias civiles y similares para garantizar la satisfacción de las necesidades esenciales de nuestra población. Por lo tanto, si estallara una guerra, tendrían la capacidad de autoabastecerse en cierta medida para evitar la rápida implementación del racionamiento y medidas similares."
 USB_america_military_ready_economy: "Economía Lista para lo Militar"
 USB_america_military_ready_economy_desc: "Con la serie de planes de desarrollo en marcha y una situación más estable en materia civil y militar, ahora podemos centrarnos en nuestra adaptabilidad. Ajustar nuestro desarrollo económico actual para estar preparados y preparados si un enemigo siquiera considera declararnos la guerra. Esto será algo impopular entre la población civil, pero es un sacrificio que estamos dispuestos a hacer."
 USB_america_establishing_the_department_of_energy: "Departamento de Energía"
 USB_america_establishing_the_department_of_energy_desc: "El Departamento de Energía (DoE) es una rama del Departamento de Energía (DoIA) que se centra en las necesidades energéticas del país: cómo producir, dónde construir nuevas instalaciones, el mantenimiento de la infraestructura, etc."
 USB_america_tried_and_tested_development: "Desarrollo Probado y Comprobado"
 USB_america_tried_and_tested_development_desc: "Las viejas y confiables industrias de combustibles fósiles siguen vigentes. A pesar de la oposición que puedan tener los ecologistas, aún podemos satisfacer a la mayoría con energía barata y eficiente. Incluso podríamos añadirle energías renovables si la agitación se vuelve demasiado molesta."
 USB_america_innovation_station_plan: "Plan Estación de Innovación"
 USB_america_innovation_station_plan_desc: "La diversidad de nuestro consumo energético, así como de nuestros métodos de producción, es la mejor manera de protegernos de la intromisión extranjera. Por lo tanto, con el tiempo se implementarán importantes inversiones en I+D y una plataforma diversificada de medios de producción de energía."
 USB_america_west_virginian_revival: "El Renacimiento de Virginia Occidental"
 USB_america_west_virginian_revival_desc: "Con nuestro plan de desarrollar una mayor generación de energía basada en combustibles fósiles, hemos revitalizado indirectamente algunos sectores de la industria minera de Virginia Occidental y el corazón de la economía de dicho estado. Si bien fue un acto involuntario, representa un auge que no solo beneficiará a Virginia Occidental, sino a toda la nación."
 USB_america_the_solar_harness: "Aprovechamiento Solar"
 USB_america_the_solar_harness_desc: "El uso del sol para generar energía puede ser tan variable como, por ejemplo, el viento. Sin embargo, si podemos ubicar estratégicamente paneles y campos solares en zonas con mayor exposición solar, el beneficio a largo plazo será mayor. Por lo tanto, podemos implementar exenciones fiscales y programas para que la gente genere energía para sus hogares y, probablemente, para la red eléctrica en general."
 USB_america_oil_and_gas_power: "Energía de Petróleo y Gas"
 USB_america_oil_and_gas_power_desc: "El carbón tiene sus límites, por lo que para lograr el triple beneficio debemos desarrollar nuestras instalaciones de petróleo y gas natural para garantizar una metodología de producción de energía integral."
 USB_america_the_winds_of_change: "Los Vientos del Cambio"
 USB_america_the_winds_of_change_desc: "Tratar la energía eólica como la solar y comprender sus desventajas nos permitirá ubicar estratégicamente los aerogeneradores en zonas donde los vientos sean lo más constantes posible. Además, se crearán aerogeneradores oceánicos que aprovechen no solo el viento, sino también las corrientes de marea para generar energía. No es lo más atractivo para los bañistas, pero son sacrificios que debemos hacer si queremos ser autosuficientes energéticamente."
 USB_america_power_hubs: "Centros de Energía"
 USB_america_power_hubs_desc: "Se establecerán \"centros de energía\" ricos en recursos o estratégicamente ubicados para crear complejos de generación de energía más centralizados y eficientes. Virginia Occidental y Maryland se ajustan a cualquiera de estas dos descripciones sin afectar el desarrollo de otras industrias que podrían requerirse en las mismas tierras."
 USB_america_green_coal_act: "Ley del Carbón Verde"
 USB_america_green_coal_act_desc: "El GCA es un nombre eufemístico para definir lo que algunos consideran el \"Carbón de la Nueva Era\". Se trata, por supuesto, del uranio y la energía nuclear en general. Debemos invertir y desarrollar adecuadamente esta tecnología, ya que representa, en gran medida, el futuro de la producción energética abundante. Al fin y al cabo, ¿por qué, si no, la mayoría de los medios de ciencia ficción utilizan la energía nuclear o un material inventado como la supuesta \"Fuente de Energía Universal\"? El potencial existe y aún no hemos encontrado nada mejor que la energía nuclear."
 USB_america_department_for_synthetic_development: "Departamento de Desarrollo Sintético"
 USB_america_department_for_synthetic_development_desc: "El DSD es un departamento de I+D del Departamento de Energía dedicado a garantizar la innovación y el desarrollo de materiales sintéticos. Estos pueden ser carbón, petróleo, gas o productos petroquímicos como plásticos o nailon, por nombrar solo algunos."
 USB_america_department_for_energy_innovations: "Departamento de Innovaciones Energéticas"
 USB_america_department_for_energy_innovations_desc: "El DEI es el departamento de I+D del Departamento de Energía (DoE) dedicado a gestionar las innovaciones en materia de producción y uso de energía. Debemos mirar hacia el futuro si queremos aprovechar lo que decimos que es futuro."
 USB_america_department_of_logistical_affairs: "Departamento de Asuntos Logísticos"
 USB_america_department_of_logistical_affairs_desc: "Similar a un Departamento de Transporte, la principal funcionalidad del DoLA es garantizar el mantenimiento, así como la flexibilidad y/o adaptabilidad de nuestra infraestructura y dónde expandirnos y/o desarrollarnos según las necesidades de la nación."
 USB_america_northern_highways_act: "Ley de Carreteras del Norte"
 USB_america_northern_highways_act_desc: "La NHA es un paquete de gastos para desarrollar y ampliar o mantener las principales carreteras existentes relacionadas con el sistema interestatal."
 USB_america_re_establishing_the_pennsy: "Reestablecimiento del Ferrocarril de Pensilvania"
 USB_america_re_establishing_the_pennsy_desc: "El PRR, o Pennsy, como recuerdan quienes recuerdan el antiguo ferrocarril de la bandera caída, fue un ferrocarril en su apogeo que abarcaba territorio hasta Misuri. Lamentablemente, con la fusión forzada con el New York Central y otros ferrocarriles en crisis, que se convirtieron en el desastre que fue el Penn Central, la quiebra posterior fue inevitable. Ahora, con un nuevo comienzo y una nueva oportunidad, restableceremos el Ferrocarril de Pensilvania y promoveremos una regulación flexible para evitar las superfusiones o las quiebras forzadas que precedieron al cambio de siglo."
 USB_america_southern_highways_act: "Ley de Carreteras del Sur"
 USB_america_southern_highways_act_desc: "Al igual que antes, niños y niñas, sólo que esta vez estamos dando amor a la mitad inferior de la infraestructura de la nación."
 USB_america_re_establishing_the_norfolk_and_western: "Reestablecimiento del Ferrocarril Norfolk y Western"
 USB_america_re_establishing_the_norfolk_and_western_desc: "El N&W era un lucrativo ferrocarril carbonero que gestionaba las Virginias y un poco más en términos de territorio controlado. A pesar de los cambios, el ferrocarril resistía la prueba del tiempo. Sin embargo, en respuesta a las Superfusiones de la segunda mitad del siglo XX, así como a la creciente competencia de las carreteras, el aire, etc., el N&W se vio prácticamente obligado a buscar un socio para la fusión. Encontraron uno en el Ferrocarril del Sur, conocido como el Ferrocarril del Sur. Poco después, ambas banderas anteriores abandonarían sus respectivos territorios y adoptarían una nueva compartida bajo el nombre de Norfolk Southern. Ahora que las banderas de clase están prácticamente destruidas, es hora de recuperar la verdadera historia estadounidense y izar algunas banderas caídas."
 USB_america_the_infrastructure_readiness_act: "Ley de Preparación de Infraestructura"
 USB_america_the_infrastructure_readiness_act_desc: "La IRA no es una ley de inmigración irlandesa, sino una regulación y un mandato gubernamental que establece que el mantenimiento de la infraestructura es parte de la seguridad nacional. Por lo tanto, una de las principales prioridades, además de la defensa nacional, es mantener nuestra infraestructura en las mejores condiciones posibles sin causar dificultades constantes e indebidas a las poblaciones locales donde se realizan dichas obras."
 USB_america_military_debate: "El Gran Debate Militar"
 USB_america_military_debate_desc: "Tener un ejército está bien, pero es mejor saber qué vas a hacer con él."
 USB_america_the_bulwark_doctrine: "Doctrina del Bastián"
 USB_america_the_bulwark_doctrine_desc: "Nuestros enemigos esperan que seamos agresivos e imprudentes, pero no cederemos a tales tentaciones. Debemos construir y utilizar nuestras fuerzas armadas de forma defensiva, entendiendo que no existe una guerra verdaderamente rápida. Con este conocimiento, podemos crear un bastión militar y permitir que el enemigo malgaste recursos mientras ganamos la guerra de desgaste mediante una cuidadosa integración civil y militar para la defensa nacional."
 USB_america_infantry_supremacy_guide: "Guía de Supremacía de Infantería"
 USB_america_infantry_supremacy_guide_desc: "Cada hombre, un fusil; cada mujer, una escopeta. Esta es la declaración de nuestra Guía de Supremacía de Infantería o esquema de entrenamiento militar ISG para el ejército. Por supuesto, invertiremos en vehículos blindados, etc., sin duda considerando el sistema de guerra moderno. Pero para contar con dicho equipo, debemos entrenar a cada soldado como si siempre se hubiera esperado que fueran soldados de infantería."
 USB_america_refining_ocs_institutions: "Refinamiento de las Instituciones OCS"
 USB_america_refining_ocs_institutions_desc: "El liderazgo es la base del funcionamiento de un ejército. Es un hecho conocido que revisaremos los Estudios del Cuerpo de Oficiales en nuestras academias militares para reflejar y adaptarnos a la nueva dirección de nuestras fuerzas armadas. Doctrina defensiva e iniciativa en cuanto a la preservación de la fuerza bajo su mando. Juntos resistiremos, el liderazgo defenderá, al igual que las tropas que comandan."
 USB_america_streamlining_logistics: "Optimización de la Logística"
 USB_america_streamlining_logistics_desc: "Para poder resistir, debemos mantener el suministro de nuestros soldados. Por lo tanto, debemos optimizar la priorización logística para garantizar el suministro de nuestras tropas y mantener su moral."
 USB_america_establishing_the_doctrine: "Establecimiento de la Doctrina"
 USB_america_establishing_the_doctrine_desc: "La cumbre de nuestro plan de desarrollo militar es establecer la doctrina oficial de nuestras fuerzas armadas, la Doctrina Baluarte. Garantizaremos la defensa de nuestra nación y su pueblo."
 USB_america_sky_defenders_program: "Programa de Defensores del Cielo"
 USB_america_sky_defenders_program_desc: "La reina moderna del campo de batalla es la fuerza aérea. Ya sean cazas, bombarderos o aviones multifunción, el principio es que si se quiere ganar la guerra, hay que ganarla en el aire. Como ushc, nos desarrollaremos y nos orientaremos para perfeccionar la capacidad de defender y proteger nuestro espacio aéreo de los bombarderos enemigos y otros aparatos que destruyan nuestras capacidades defensivas."
 USB_america_fighter_defense_doctrine: "Doctrina de Defensa de Cazas"
 USB_america_fighter_defense_doctrine_desc: "La FDD es la organización de nuestra fuerza aérea dedicada al principio de seguridad localizada. Defendemos nuestra patria, por lo que tanto nuestras aeronaves como nuestro entrenamiento deben ajustarse a estas distinciones."
 USB_america_agility_training_measures: "Medidas de Entrenamiento en Agilidad"
 USB_america_agility_training_measures_desc: "Nuestro entrenamiento es un estándar establecido que refleja las expectativas de lo que significa unirse a nuestra fuerza aérea. Esto significa que debemos perfeccionar nuestros métodos de entrenamiento para asegurar que nuestros pilotos desarrollen una tolerancia a fuerzas G superiores a las normales y así aumentar sus capacidades como pilotos de SIAD. No solo la agilidad de nuestras aeronaves supera la capacidad de nuestros pilotos, sino que nuestra mayor limitación es el propio personal. Por lo tanto, trabajaremos para mejorar esto; debemos hacerlo."
 USB_america_aircraft_refinement_programs: "Programas de Refinamiento de Aeronaves"
 USB_america_aircraft_refinement_programs_desc: "El ARP es un programa de utilización de producción dedicado, creado para innovar y desarrollar nuestras aeronaves de manera eficiente para el rol que nos propusimos cumplir."
 USB_america_naval_repair_schools: "Escuelas de Reparación Naval"
 USB_america_naval_repair_schools_desc: "La incorporación de personal de reparación naval y de contratistas civiles de soldadura facilitará considerablemente el proceso de reparación y reacondicionamiento. Esto, a su vez, nos permitirá producir, indirectamente, mejores equipos, ya que la integración de estos nuevos NRS facilitará la reparación incluso de los buques más complejos."
 USB_america_naval_alloy_innovations: "Innovaciones en Aleaciones Navales"
 USB_america_naval_alloy_innovations_desc: "El NAI es un departamento de I+D dedicado a los avances en la creación de buques navales. Aspectos como el desplazamiento y el refinamiento de aleaciones permiten crear buques mejores, más suaves y duraderos, capaces de navegar en condiciones marítimas variables."
 USB_america_mining_warfare_refinements: "Refinamientos en Guerra de Minas"
 USB_america_mining_warfare_refinements_desc: "El programa MWR está especializando nuestra destreza naval para adaptar y refinar las capacidades de las operaciones de minería marina y guerra antiminas."
 USB_america_navy_readiness_training: "Entrenamiento de Preparación Naval"
 USB_america_navy_readiness_training_desc: "Mejorar los programas y regimientos de entrenamiento de nuestro personal naval para suavizar y aumentar la capacidad de respuesta ante amenazas, así como posibles falsas alarmas, ya que incluso una falsa alarma es una amenaza potencial."
 USB_america_the_spearhead_doctrine: "Doctrina de Punta de Lanzamiento"
 USB_america_the_spearhead_doctrine_desc: "Nuestro ejército debe ser como la punta de una lanza, con la capacidad de apuñalar, cortar y derribar al enemigo donde sea posible antes de que pueda organizar una defensa efectiva."
 USB_america_perpetual_assault_training: "Entrenamiento de Asalto Perpetuo"
 USB_america_perpetual_assault_training_desc: "El PAT es un programa de entrenamiento dedicado a comprender y desarrollar la resistencia de los soldados para lo que llamamos \"Asalto Perpetuo\". Considérelo una versión refinada de la doctrina de Asalto Masivo de antaño, pero perfeccionada según el principio de ataques concentrados para asegurar ataques rápidos y posibles cercos. Casi como una combinación de Asalto Masivo y Derrota por Detalle."
 USB_america_armored_assault_assist: "Grupo de Asistencia para Asalto Blindado"
 USB_america_armored_assault_assist_desc: "La triple A militar, este refinamiento de nuestra ala blindada del ejército nos permitirá golpear y derrotar a pequeños grupos de fuerzas enemigas sin demasiado riesgo para contrarrestar cercos."
 USB_america_officer_corp_aggression_training: "Entrenamiento en Agresividad del Cuerpo de Oficiales"
 USB_america_officer_corp_aggression_training_desc: "Nuestra capacidad para avanzar depende exclusivamente de los oficiales a cargo. Inculcar vigor y determinación en las tropas, comprender la planificación y las tácticas necesarias para avanzar y comprender la doctrina que hemos establecido para nuestras fuerzas armadas y el ejército en general."
 USB_america_material_not_human_loss: "Pérdida de Material, No de Vidas Humanas"
 USB_america_material_not_human_loss_desc: "No podemos permitirnos la pérdida de nuestro personal; a pesar de la metodología de nuestra doctrina, seguimos creyendo que nuestros soldados son nuestro mejor activo. Por lo tanto, debemos reestructurar nuestra logística para compensar las pérdidas de equipo comparables a lo que intentaremos ahorrar en personal."
 USB_america_proactive_air_assaults: "Asaltos Aéreos Proactivos"
 USB_america_proactive_air_assaults_desc: "La agresividad de nuestra fuerza aérea nos permitirá derribar aeronaves enemigas antes de que se den cuenta. Mediante un entrenamiento proactivo que simule la capacidad de respuesta y adaptabilidad de nuestras tripulaciones y pilotos, deberían ser capaces de gestionar situaciones y falsas alarmas con la mayor rapidez y flexibilidad posibles, basándose en un pensamiento rápido y crítico sobre la situación y la información disponible."
 USB_america_modern_maneuverability_courses: "Cursos de Maniobrabilidad Moderna"
 USB_america_modern_maneuverability_courses_desc: "Con el auge de la tecnología furtiva y las crecientes exigencias a los pilotos, debemos entrenarlos y adaptarlos preventivamente para que puedan afrontar escenarios de hipermaniobrabilidad que ejercerían una cantidad peligrosa de fuerzas G en su contra. Esto nos costará, pero vale la pena por las posibilidades a largo plazo que esto podría generar con nuestro uso."
 USB_america_redesigns_and_field_testing: "Rediseño y Pruebas de Campo"
 USB_america_redesigns_and_field_testing_desc: "Comprender cualquier tipo de datos que podamos obtener sobre nuestras aeronaves actuales nos permitirá desarrollar mejores diseños y perfeccionar nuestros programas de entrenamiento. Esto, a su vez, debería mejorar las capacidades de nuestra fuerza aérea tanto en operaciones defensivas como ofensivas."
 USB_america_air_corps_survivability_program: "Programa de Supervivencia del Cuerpo Aéreo"
 USB_america_air_corps_survivability_program_desc: "El SP es un programa que busca innovar en formas de garantizar la supervivencia tanto del piloto como del equipo siempre que sea posible. Por supuesto, la prioridad siempre es el piloto, ya que entrenar a un individuo para soportar tales condiciones extremas lleva mucho más tiempo que construir un trozo de metal y cables."
 USB_america_rapid_response_protocols: "Protocolos de Respuesta Rápida"
 USB_america_rapid_response_protocols_desc: "El RRP consiste en la capacitación y la revisión del equipo estándar para garantizar la capacidad de realizar reparaciones de campo en alta mar. Si bien la confirmación del regreso a puerto sigue siendo necesaria, la realidad es que una reparación es una reparación siempre que se realice correctamente."
 USB_america_streamlining_port_facilities: "Optimización de Instalaciones Portuarias"
 USB_america_streamlining_port_facilities_desc: "Para garantizar la preparación de nuestras fuerzas navales necesitamos racionalizar, actualizar y preparar las instalaciones para recibir barcos y construir otros nuevos."
 USB_america_the_new_admiralty: "El Nuevo Almirantazgo"
 USB_america_the_new_admiralty_desc: "Nuestros barcos no significan nada si quienes los comandan no saben nada. Por ello, una revisión exhaustiva del entrenamiento y la formación de los futuros comandantes navales es nuestra máxima prioridad."
 USB_america_hit_and_hit_again: "Golpea y Vuelve a Golpear"
 USB_america_hit_and_hit_again_desc: "Mediante maniobras estratégicas, podemos intentar disparar grandes cantidades de proyectiles al enemigo para intentar desorganizarlo. Si logramos agotar mentalmente a nuestros enemigos, podemos asegurar la victoria de varias maneras."
 USB_america_foreign_policy_debate: "La Gran Dirección Nacional"
 USB_america_foreign_policy_debate_desc: "Con nuestra nación estable, nuestras cabezas despejadas y tanto nuestra economía como nuestras necesidades civiles satisfechas, debatiremos sobre la próxima gran dirección que queremos que tome nuestra nación."
 USB_america_reclaim_the_mantle_of_destiny: "Recuperando el Manto del Destino"
 USB_america_reclaim_the_mantle_of_destiny_desc: "El vacío de poder es enorme y, por lo tanto, solo nosotros somos aptos para llenarlo. Controlamos la antigua capital, así como el núcleo de nuestro territorio, los elementos federalistas de la antigua república. Con coraje, determinación y habilidad, nos aseguraremos de manifestar nuestro verdadero destino y reclamar las tierras de antaño por el oro de proclamar la Segunda República Americana."
 USB_america_war_plan_arcadia: "Plan de Guerra Arcadia"
 USB_america_war_plan_arcadia_desc: "El frente más corto y, en nuestra opinión, el más débil es el del noreste. Con esto en mente, debemos prepararnos, planificar y estar listos para la próxima incursión hacia el norte."
 USB_america_battle_plan_albany: "Plan de Batalla Albany"
 USB_america_battle_plan_albany_desc: "Nueva York, la tierra de la libertad para quienes emigraron del viejo mundo. Ahora que es el adversario al que debemos enfrentarnos para asegurar nuestro manto. Desde la bahía de Hudson hasta la frontera canadiense, ¡aseguraremos el símbolo de la libertad, hacia la victoria!"
 USB_america_battle_plan_providence: "Plan de Batalla Providence"
 USB_america_battle_plan_providence_desc: "El gran norte que es Nueva Inglaterra, sus bosques, es nuestro mayor problema al considerar cualquier plan. Sin embargo, tomaremos la región más desarrollada de Nueva Inglaterra y, sin duda, su moral se derrumbará y conseguiremos otra victoria."
 USB_america_war_plan_mississippi: "Plan de Guerra Mississippi"
 USB_america_war_plan_mississippi_desc: "Ni siquiera contamos con la mitad de nuestro barco, por lo que nuestro principal objetivo es asegurar todo al este del río Misisipi. La mejor frontera natural: esto también consolidará nuestro estatus emergente en el continente."
 USB_america_battle_plan_gary: "Plan de Batalla Gary"
 USB_america_battle_plan_gary_desc: "Los Grandes Lagos serán aún más grandes cuando reintegremos estos antiguos territorios nuestros. Lo positivo es que podemos confundir al enemigo sobre si nuestro objetivo principal es capturar Gary, Indiana, o si Gary creó el plan."
 USB_america_battle_plan_dixie: "Plan de Batalla Dixie"
 USB_america_battle_plan_dixie_desc: "A Dixieland viajamos, chicos y chicas. Nos aseguraremos de que cada niño Dixie entienda que siempre vivirá con el Tío Sam."
 USB_america_securing_the_new_frontiers: "Asegurando las Nuevas Fronteras"
 USB_america_securing_the_new_frontiers_desc: "Antes de continuar nuestra marcha hacia el Pacífico, debemos asegurar y controlar el dominio que adquirimos. La unidad antes de la expansión fue la causa del pasado; ahora construiremos un futuro mejor."
 USB_america_the_borderlands: "Las Tierras Fronterizas"
 USB_america_the_borderlands_desc: "El progreso de nuestra asimilación debe ser coordinado y por eso las zonas fronterizas iniciales deben ser nuestra principal preocupación en primer lugar."
 USB_america_uniting_the_arcadians: "Uniendo a los Arcadios"
 USB_america_uniting_the_arcadians_desc: "El noreste, o en algún momento hace siglos, era conocido como parte de la región colonial de la Arcadia francesa. Estos pueblos tienen una cultura muy distintiva con fuertes influencias británicas y sutiles influencias francesas. Por ello, trabajaremos para erradicarla y traer unidad a estas tierras."
 USB_america_southern_culture_is_american: "La Cultura del Sur es Americana"
 USB_america_southern_culture_is_american_desc: "Aunque no fue mediante una rebelión sangrienta, buscamos recuperar el sur bajo nuestro control. En lugar de las políticas fallidas de ida y vuelta de dos administraciones diferentes, instituiremos una política de integración uniforme y legal. El Sur y la cultura sureña son cultura estadounidense y serán tratados como tal. Porque el Sur nos trae cosas como la comida reconfortante y el fanatismo deportivo. Estas cosas son estadounidenses y serán vistas y respetadas como tales."
 USB_america_midwestern_unity: "Unidad del Medio Oeste"
 USB_america_midwestern_unity_desc: "Al igual que el Sur, el Medio Oeste es conocido por sus temporadas de caza, pero también le da un toque diferente a la comida casera, y quién podría olvidar las rivalidades deportivas. Por lo tanto, el Medio Oeste es solo una pieza más del rompecabezas estadounidense y debe quedar claro que, si bien es cierto que son un subtipo cultural, al fin y al cabo son simplemente los buenos y viejos estadounidenses de sangre roja, blanca y azul."
 USB_america_cajun_dixie_and_us: "Cajún, Dixie y Nosotros"
 USB_america_cajun_dixie_and_us_desc: "La mitad occidental de la antigua República del Sur, así como sus antepasados ​​confederados, tienen una firme voluntad de independencia. Las diferencias culturales en sus influencias, así como las zonas más aisladas que se encuentran a orillas del río Misisipi o al este, les otorgan mayor libertad para actuar a su antojo. Sin embargo, debemos trabajar para asimilar estas culturas y recordarles las similitudes y los valores compartidos de sus hermanos del Sur y del Medio Oeste."
 USB_america_war_plan_pacific: "Plan de Guerra del Pacífico"
 USB_america_war_plan_pacific_desc: "Este es el comienzo y también la preparación para el final. El segundo Destino Manifiesto, o como algunos lo han empezado a llamar, \"La Cruzada Americana\". Al final, lo único que importa es la Unidad, el Deber y la Identidad Americana se consolida una vez más."
 USB_america_battle_plan_alamo: "Plan de Batalla del Álamo"
 USB_america_battle_plan_alamo_desc: "Sam Houston, en su época, quiso fundar una nación que los colonos de la región pudieran considerar su hogar. Lucharon con uñas y dientes contra el \"Napoleón del Oeste\", Santa Anna. Luego, con su victoria, presentaron una petición y llamaron a Estados Unidos también su nuevo hogar. Recuperemos a los estadounidenses que la mayor parte del mundo creía que éramos."
 USB_america_battle_plan_woundedknee: "Plan de Batalla de Rodilla Herida"
 USB_america_battle_plan_woundedknee_desc: "Custer tuvo su infame última resistencia en la masacre de Wounded Knee. Ahora no seremos tan imprudentes como Custer, pero aseguraremos el granero de la república y recordaremos al pueblo que, viejos o nuevos, todos somos estadounidenses."
 USB_america_the_second_utah_war: "La Segunda Guerra de Utah"
 USB_america_the_second_utah_war_desc: "Casi hemos llegado al océano Pacífico, ahora las Montañas Rocosas y los mormones se interponen en nuestro camino. Los venceremos como lo hicimos en la década de 1850, pues estaremos unidos de costa a costa."
 USB_america_battle_plan_cascadia: "Plan de Batalla de Cascadia"
 USB_america_battle_plan_cascadia_desc: "El movimiento Cascadian es muy novedoso y original, si los eliminamos rápidamente y nos preparamos para el combate de forma preventiva para no quedar atrapados en las montañas. Es una garantía de certeza que podemos darles a estos \"encendedores de cal\" un recordatorio y una reflexión sobre la realidad de que solo son estadounidenses de la costa del Pacífico."
 USB_america_battle_plan_angels: "Plan de Batalla de los Ángeles"
 USB_america_battle_plan_angels_desc: "California, cuna del sueño americano y de hitos tan importantes en la historia estadounidense como la Fiebre del Oro. La ciudad de los ángeles y las costas sureñas, más pobladas, serán nuestro principal objetivo y probablemente el camino más fácil. Avanzando, recuperemos los confines del sueño americano."
 USB_america_west_of_the_mississippi: "Al Oeste del Misisipi"
 USB_america_west_of_the_mississippi_desc: "La Gran Cruzada, los meses y años de planificación, lucha, etc., finalmente han terminado. Ahora buscamos instalar, educar y recordar a los pueblos de estas tierras al oeste del río Misisipi que son y siempre han sido estadounidenses."
 USB_america_from_plains_to_rockies: "De las Llanuras a las Montañas Rocosas"
 USB_america_from_plains_to_rockies_desc: "Cuanto más al oeste nos dirigimos, más lejos se siente la gente del gobierno. Recordémosles sus orígenes, historia y comprensión de las similitudes para que podamos reintegrar pacíficamente estas tierras pioneras que nos precedieron. Consideremos también la idea de reubicar la capital, considerando que este mismo tema fue en su día el lema de muchos movimientos secesionistas."
 USB_america_from_sea_to_shining_sea: "De Mar a Mar Brillante"
 USB_america_from_sea_to_shining_sea_desc: "El Segundo Gran Destino Manifiesto se ha cumplido y, tras grandes dificultades, tribulaciones y esfuerzo, hemos llegado a las costas del Pacífico. Ahora el Sueño Americano puede volver a realizarse y brillar ante quienes conforman nuestro futuro."
 USB_america_the_great_administration: "La Gran Administración"
 USB_america_the_great_administration_desc: "Con la unidad en todo el país, ahora podemos comenzar la revisión del servicio civil y de la administración que se necesita desesperadamente para una tierra tan vasta y geográficamente diversa."
 USB_america_capital_crisis: "La Crisis de la Capital"
 USB_america_capital_crisis_desc: "Con la unidad de la nación consolidada, debemos abordar el mayor problema: la ubicación de la capital federal y el posterior gobierno federal. Debemos analizar nuestras opciones y comprender si podríamos ubicar nuestra nueva capital y dónde, si queremos avanzar con éxito."
 USB_america_the_proclamation: "La Gran Proclamación"
 USB_america_the_proclamation_desc: "Ha llegado el día de cerrar este capítulo de la historia estadounidense. La primera república duró casi 300 años, sobreviviendo prácticamente a todas las repúblicas anteriores, ya que el principal rasgo distintivo de una nueva república es la reescritura de su documento fundacional. Por eso Francia va por su séptimo año y los griegos quién sabe cuál. Sin embargo, con esta nueva república, iniciaremos una nueva era y buscaremos el futuro que deseamos."
 USB_america_the_great_shutdown: "El Gran Cierre"
 USB_america_the_great_shutdown_desc: "Las perspectivas y los sueños de antaño se acabaron; el mundo nos ha fallado y nosotros le hemos fallado. Centrémonos en nuestro interior y convirtámonos en el hueso más duro de roer. Porque si no tenemos nada con qué distraernos, ¿realmente necesitamos expandirnos hacia el exterior?"
 USB_america_self_embargo: "El Embargo Definitivo"
 USB_america_self_embargo_desc: "El PE, o como algunos lo llaman en broma el Plan de Embargo Definitivo, supone el cierre del comercio con el mundo exterior. Sentamos un precedente sin precedentes en siglos y planeamos mantenernos firmes y mejorar la vida de nuestros ciudadanos de la forma más imparcial posible. Esto perjudicará gravemente nuestra capacidad económica, pero con gran enfoque y determinación podemos lograr un nuevo camino. Nuestro camino."
 USB_america_every_citizen_a_job: "Un Trabajo para Cada Ciudadano"
 USB_america_every_citizen_a_job_desc: "Con nuestro autoembargo, necesitaremos asegurar nuestra estabilidad económica. Con esto en mente, nuestra educación y servicios públicos deben adaptarse a estos nuevos desafíos, así como al hecho de que ahora todo ciudadano que pueda tener un empleo debe y tendrá uno. Este cambio fundamental en la economía es revolucionario y, en el mejor de los casos, probablemente inestable. Pero si nos preparamos, nos concentramos y nos coordinamos adecuadamente, podemos garantizar que se satisfagan las necesidades básicas de supervivencia y que se puedan disfrutar de los lujos de esas otras naciones si se desean."
 USB_america_mandatory_service_period: "Período de Servicio Obligatorio"
 USB_america_mandatory_service_period_desc: "Para garantizar la máxima preparación de nuestra nación, debemos comenzar a instituir un período de servicio obligatorio para nuestros ciudadanos. Además, debemos fomentar programas como el JROTC en la educación y adaptar mejor nuestra sociedad para que esté más alineada con las fuerzas armadas."
 USB_america_ground_defense_is_air_defense: "La Defensa Terrestre es Defensa Aérea"
 USB_america_ground_defense_is_air_defense_desc: "El programa GDAD consiste en una serie de inversiones en investigación y entrenamiento militar para equipar y preparar a nuestras fuerzas terrestres con la capacidad de defenderse y resistir adecuadamente a unidades de combate aéreo enemigas prolongadas. La guerra moderna se define por la reina del campo de batalla, esa reina es la fuerza aérea, y dado que nuestra nación no es tan comunicativa con el mundo exterior, debemos buscar la manera de remediar esta situación con un rey adecuado."
 USB_america_warfare_beyond_the_grave: "Guerra Más Allá de la Tumba"
 USB_america_warfare_beyond_the_grave_desc: "Guerra de Cementerio, esta nueva doctrina basada en la 4.ª Generación nos permitirá hacer que películas como Amanecer Rojo parezcan un juego de niños. Su resistencia es eterna, porque nuestra nación es eterna."
 USB_america_the_new_identity_plan: "El Nuevo Camino a Seguir"
 USB_america_the_new_identity_plan_desc: "No podemos fingir que si recuperamos las antiguas tierras estaremos bien con ellas. Pero tampoco podemos simplemente instaurar un shogunato japonés y aislar a la nación, así que debemos forjar un nuevo camino. Nuestro objetivo será un nuevo camino hacia adelante, una nueva identidad de la que nuestro pueblo pueda enorgullecerse."
 USB_america_war_plan_gray_coat: "Plan de Guerra de los Abrigos Grises"
 USB_america_war_plan_gray_coat_desc: "Desde el Atlántico hasta el Misisipi, nuestro destino está marcado. Nuestro primer plan directo para alcanzar nuestras metas es el de la antigua Confederación. Pues esta tiene la conexión más continua y nos permitirá asegurar nuestra gran consolidación."
 USB_america_the_southeast: "El Sureste"
 USB_america_the_southeast_desc: "La proximidad, así como el constante desarrollo a lo largo de la costa, permitirán inversiones específicas y esfuerzos de integración que se lleven a cabo con mayor fluidez que en los estados menos desarrollados. Un paso hacia el futuro, eso es todo."
 USB_america_the_gulf_states: "Los Estados del Golfo"
 USB_america_the_gulf_states_desc: "La costa del Golfo y los estados del interior que la rodean presentan una combinación de desarrollo y abandono. Nos aseguraremos de que estos estados no se sientan excluidos y buscaremos invertir en infraestructura y en maneras de integrarlos mejor en nuestro nuevo camino a seguir."
 USB_america_war_plan_superior: "Plan de Guerra Superior"
 USB_america_war_plan_superior_desc: "Los Grandes Lagos y los antiguos estados del Cinturón Industrial son el corazón industrial de la antigua nación, así como nuestro nuevo camino a seguir. Garantizaremos que el poder industrial forme parte de nuestra identidad, tal como hemos consolidado el poder agrícola del sur como nuestra identidad."
 USB_america_the_automotive_states_and_some: "Los Estados Automovilísticos y Algunos Más"
 USB_america_the_automotive_states_and_some_desc: "El núcleo de lo que una vez fue la industria automotriz estadounidense reside en Michigan, Ohio e Indiana, con Illinois también participando. Sin embargo, como queremos mantener una integración integral y metódica, nos quedamos con estos tres estados y el estado fronterizo de Kentucky. Estos estados tienen diversos problemas y, por lo tanto, haremos todo lo posible para aumentar el empleo y solucionar los problemas actuales para que se adapten mejor a su nuevo hogar en nuestra gran nación."
 USB_america_the_northwest_region: "La Región Noroeste"
 USB_america_the_northwest_region_desc: "La camarilla de estados que ahora establecerá nuestra frontera directa con Canadá y cualquier desarrollo más allá del río Misisipi es una excelente manera de demostrar deportividad y unidad a través de actividades como la caza y el deporte. Usaremos estas tradiciones ancestrales para animar a los pueblos de estos estados a aceptar la nueva realidad y a comprender que no todo es siempre malo."
 USB_america_war_plan_north_atlantic: "Plan de Guerra del Atlántico Norte"
 USB_america_war_plan_north_atlantic_desc: "La última frontera de nuestra nueva identidad, la región de la Gran Nueva Inglaterra. Tendremos que prepararnos para situaciones como combates urbanos, montañosos y selváticos si queremos combatir eficazmente y recuperar estos estados."
 USB_america_liberty_prime: "Libertad Suprema"
 USB_america_liberty_prime_desc: "El bastión y símbolo de la libertad, la Estatua de la Libertad, es un estado único y difícil de superar. Siendo un estado de guetos y multiculturalismo, debemos aprender, estudiar y comprender no solo la cultura neoyorquina, sino también cómo podemos hacerles ver que no representan una diferencia real entre ellos y nosotros en términos de un objetivo y futuro común. Debemos apelar a su singularidad y, probablemente, otorgarles concesiones en términos de autonomía para garantizar la cohesión y la cooperación."
 USB_america_new_england_old_habits: "Nueva Inglaterra, Viejos Hábitos"
 USB_america_new_england_old_habits_desc: "A pesar de la importancia cultural de los estados de Nueva Inglaterra, esta gente no se diferencia en nada del resto de la nación. Ciertos hábitos y puntos en común del pasado nacional dejan claro que, aunque seamos diferentes, tenemos mucho en común. Así que es hora de recordarles que todos somos camaradas, familia, y que podemos comprender los errores del pasado para construir un futuro mejor."
 USB_america_the_arcadian_identity: "El Destino Arcadio"
 USB_america_the_arcadian_identity_desc: "Por fin ha llegado el momento de cerrar este capítulo, así como esta gran página de la historia. Tomando las ideas e ideales de antaño, las lecciones del pasado, e incluso de la semana pasada, y partiendo hacia un nuevo comienzo. Somos una mariposa brillante lista para desplegar sus alas y volar hacia el más allá de nuestros sueños. Somos Arcadia."
 USB_arcadia_path_desc: "[USB.GetFlag]§YEstados Libres de América§! cambia su nombre a §YArcadia§!"
 USB_formalizing_the_fighting_brigades: "Formalizando las Brigadas de Combate"
 USB_formalizing_the_fighting_brigades_desc: "Mientras seguimos intentando recuperarnos, nunca sabemos qué puede hacer el enemigo. Por eso, crearemos los Combatientes Federales como una unidad de acción rápida, similar a la de la Guardia Nacional. Al fin y al cabo, algo es mejor que nada."
 USB_creating_infantry_reserves: "Creando las Reservas de Infantería"
 USB_creating_infantry_reserves_desc: "Nuestra nación aún se está reconstruyendo, y aunque tengamos un pie fuera, es igualmente probable que tropiecemos al mover el otro. Por lo tanto, debemos crear una fuerza de reserva lista para prepararnos para el futuro, sea lo que sea que nos traiga."
 USB_mobilizing_the_reserves: "Movilizando las Reservas"
 USB_mobilizing_the_reserves_desc: "Ha llegado el momento de comenzar la defensa activa de nuestra nación. Iniciemos la movilización para estar preparados para las batallas venideras."
 USB_coal_wars_two_event.1.t: "Los Mineros Unidos Migraron"
 USB_coal_wars_two_event.1.d: "Mientras luchamos por conectar al país, muchos mineros, tanto actuales como antiguos, están emigrando, por alguna razón, al estado de Virginia Occidental. La Asociación de Mineros Unidos, una nueva marca de la antigua UMWA, ha comenzado a organizarse y a reunirse en mítines sindicales. El actual presidente, Cecil Roberts, aún no se ha comunicado con nosotros, pero dada la situación, pronto tendremos noticias."
 USB_coal_wars_two_event.1.o1: "¿Qué Son, Aves Migratorias?"
 USB_coal_wars_two_event.2.t: "La Propuesta de la Perla Negra"
 USB_coal_wars_two_event.2.d: "Hoy temprano finalmente recibimos noticias del nuevo UMWA. El presidente ha solicitado y reunido una importante base de peticiones para permitir la reapertura de varias minas en Virginia Occidental. Se estima que el estado cuenta con más de 20 mil millones de toneladas de reservas de carbón, lo que sin duda sería un beneficio útil para suministrar energía barata y fácil a los hogares y negocios que apenas intentan sobrevivir. Sin embargo, las minas se cerraron debido a preocupaciones ambientales, ya que muchos de los depósitos de la costa este que ocupamos tienen un mayor contenido de azufre. Por lo tanto, la pregunta es si queremos mantener un estándar moderno o reducirlo para una recuperación más rápida."
 USB_coal_wars_two_event.2.o1: "La Perla Negra Brilla Una Vez Más"
 USB_coal_wars_two_event.2.o2: "Tenemos Estándares por una Razón"
 USB_coal_wars_two_event.3.t: "Los Fondos Fluyen"
 USB_coal_wars_two_event.3.d: "Con las negociaciones avanzando a buen ritmo y la financiación finalmente llegando a Virginia Occidental, los mineros que han emigrado ya han comenzado a reabrir minas antiguas. Esta es una nueva era para el estado y será un gran activo de cara al futuro, mientras intentamos estabilizar la economía del país."
 USB_coal_wars_two_event.3.o1: "No Es Mucho, Pero Es Trabajo Honesto"
 USB_coal_wars_two_event.300.t: "Los Mineros Protestan la Decisión"
 USB_coal_wars_two_event.300.d: "Tras el reciente veredicto que anuló la Propuesta Perla Negra, muchos mineros que abandonaron sus hogares y emigraron a lo que creían una forma estable de trabajo y estabilidad futura han comenzado a organizar protestas. Las fuerzas del orden locales también han observado un aumento en los robos de armas de fuego, así como en pequeños disturbios. Tendremos que prepararnos para gestionar esta emergencia, ya que, dada la creciente desestabilización del estado, no estamos en condiciones reales de intervenir directamente."
 USB_coal_wars_two_event.300.o1: "¿Qué Esperaban?"
 USB_coal_wars_two_event.301.t: "¿Un Estado Libre?"
 USB_coal_wars_two_event.301.d: "Sin pensar siquiera en las consecuencias, lo han hecho. Los disturbios locales se centraron en las pocas armas y municiones que quedaban en el estado de Virginia Occidental y, en un acto rápido de lo que algunos han llamado \"gobierno de la turba\", el UMWA tomó el control y declaró la independencia de Virginia Occidental. Necesitamos unir las pocas fuerzas que tenemos y empezar a reclamar lo que nos pertenece por derecho. Lo último que necesitamos es que alguien más en el continente socave nuestra independencia."
 USB_coal_wars_two_event.301.o1: "¿Dónde He Visto Esto Antes?"
 USB_coal_wars_two_event.302.t: "Las Segundas Guerras del Carbón"
 USB_coal_wars_two_event.302.d: "¡A las armas, hermanos y hermanas de la tierra, a las armas digo! Porque es en este día que los bandidos cegados de Washington ya no determinarán nuestro destino. Nos mantendremos firmes y lucharemos para defender nuestro derecho a extraer y utilizar los recursos que nuestra querida madre tierra nos brinda. Unámonos y defendamos estas tierras para que podamos hacer brillar esta perla negra una vez más."
 USB_coal_wars_two_event.302.o1: "¡A las Armas!"
 USB_coal_wars_two_event.303.t: "¡Marchamos!"
 USB_coal_wars_two_event.303.d: "Ha llegado el momento y estamos más preparados que nunca. Marcharemos sobre Parkersburg y aseguraremos el estado de Virginia Occidental una vez más."
 USB_coal_wars_two_event.303.o1: "¡Adelante Hombres!"