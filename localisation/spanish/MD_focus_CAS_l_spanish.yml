 CAS_creating_the_mountain_marauders: "Creación de los Merodeadores de la Montaña"
 CAS_creating_the_mountain_marauders_desc: "Necesitaremos algún tipo de fuerza lista para movilizarnos si queremos combatir cualquier posible situación que se nos presente."
 CAS_creating_infantry_reserves: "Creación de Reservas de Infantería"
 CAS_creating_infantry_reserves_desc: "El futuro es incierto. No importa si seremos nosotros o alguna fuerza extranjera quienes lleguemos más allá del horizonte. Por lo tanto, debemos establecer reservas listas para asegurarnos de que, cuando llegue el momento, estemos listos para ellos."
 CAS_mobilizing_the_reserves: "Movilización de las Reservas"
 CAS_mobilizing_the_reserves_desc: "Ha llegado el momento de dar un paso adelante hacia el futuro que anhelamos. ¡Movilicen las reservas, vamos a la guerra!"
 cascadian_politics_event.1.t: "Demasiadas Opciones"
 cascadian_politics_event.1.d: "Mientras el país se prepara para sus primeras elecciones nacionales, muchos se proponen crear sus propios partidos políticos, etc. La verdadera pregunta es: ¿qué rumbo quiere realmente tomar la gente? Es difícil decirlo en estas primeras etapas, pero hasta ahora, elementos de partidos como las Fuerzas Armadas, el Partido Empresarial de Boise y el Partido de la Montaña Roja parecen estar ganando terreno, aunque parecen estar haciendo más por repartirse el pastel político entre la población votante que, presumiblemente, por consolidar la fuerza de sus propios partidos. Pero quién sabe, dicen que al que madruga, Dios le ayuda, así que quién sabe."
 cascadian_politics_event.1.o1: "Dios, ¿A Quién Elijo?"
 cascadian_politics_event.2.t: "Repartiendo el Pastel"
 cascadian_politics_event.2.d: "A medida que se crean las cabinas de votación y las zonas designadas para votar, así como en general, se organiza el proceso electoral, la población del país ha comenzado a consolidarse en partidos políticos y diferentes perspectivas sobre cómo avanzar con nuestra nación. Algunos buscan mantener los verdaderos principios democráticos occidentales, otros se inclinan más hacia la autocracia o el socialismo y las influencias generales de Oriente; otros simplemente buscan una autocrítica y no se basan en otras naciones, sino que aplican los principios de su ideología para nuestra nación. Una perspectiva cascadiana, por así decirlo. Finalmente, hay quienes también buscan ser más firmes y autoritarios, adoptando la idea cascadiana y siendo más nacionalistas. Sea como sea, aún falta tiempo para las elecciones."
 cascadian_politics_event.2.o1: "Los Principios Occidentales Nos Guiarán hacia la Prosperidad"
 cascadian_politics_event.2.o2: "Los Desafortunados del Este Nos Guiarán hacia la Solidaridad"
 cascadian_politics_event.2.o3: "Nuestra Nación es Nuestra para Guiar y Crecer"
 cascadian_politics_event.2.o4: "¡Nuestra Nación es Nuestra para Afirmar y Expandir!"
 cascadian_politics_event.100.t: "Crecen las Influencias Occidentales"
 cascadian_politics_event.100.d: "En las últimas semanas, parece que los principios y prácticas occidentales han conquistado a un número cada vez mayor de votantes. A medida que nos acercamos a la fase final, ahora les toca a los principales partidos surgidos de este movimiento intentar tomar la iniciativa. El Partido de los Consumidores de Cascadia, el Partido de los Nuevos Conservadores, el Partido Liberal de Cascadia y el Partido del Progreso Social ciertamente tienen mucho trabajo por delante."
 cascadian_politics_event.100.o1: "Únete Hoy, ¡No Esperes Más!"
 cascadian_politics_event.101.t: "Los Cuatro Finalistas"
 cascadian_politics_event.101.d: "A medida que se empiezan a emitir y contabilizar los votos, ahora queda un finalista de cuatro. La reñida contienda se reduce a: el partido proempresarial conocido como el Partido del Consumidor de Cascadia, el Partido de los Nuevos Conservadores de centroderecha, el Partido Liberal de Cascadia de centroizquierda y, finalmente, el movimiento progresista del Partido del Progreso Social. Estos cuatro pronto se reducirán a un ganador o a una coalición general si la situación no se aclara lo suficiente."
 cascadian_politics_event.101.o1: "¡Vota con Más que tu Dinero, Vota al Partido del Consumidor Cascadiano!"
 cascadian_politics_event.101.o2: "Manos Firmes Hacen Votos Firmes, ¡Vota por los Nuevos Conservadores!"
 cascadian_politics_event.101.o3: "¡Vota por el Cambio, Vota al Partido Liberal de Cascadia!"
 cascadian_politics_event.101.o4: "¡Vota por el Progreso, Vota al Partido del Progreso Social!"
 cascadian_politics_event.200.t: "Crecen los Valores Orientales"
 cascadian_politics_event.200.d: "Los valores autocráticos y socialistas de quienes viven en el este y el lejano oriente, como Rusia, China y Asia Central, por nombrar algunos, están ganando popularidad. La interesante dinámica general parece ser un crecimiento colectivo, pero también una creciente división entre socialistas y autócratas. Esta dinámica probablemente dividirá el voto, pero al final, el rumbo de la nación parece requerir un enfoque más igualitario o más férreo de cara al futuro. Solo espero que haya sido la mejor decisión que pudimos haber tomado."
 cascadian_politics_event.200.o1: "Uh... ¿Estamos Seguros de Esto?"
 cascadian_politics_event.201.t: "Autocracia vs. Comunismo"
 cascadian_politics_event.201.d: "A medida que se empiezan a contabilizar los votos, la creciente brecha entre estos últimos partidos se hace cada vez más profunda. Pronto sabremos qué rumbo tomará nuestra nación. La división actual se da entre los partidos de primacía autocrática, que incluyen el Partido por la Gran Cascadia y los Conservadores por Cascadia. Por otro lado, en el bando comunista, se encuentran el Partido de la Montaña Roja y el Partido Popular de Cascadia. A partir de esto, sentaremos las bases para un futuro que se afiance y siente un precedente para los años venideros."
 cascadian_politics_event.201.o1: "Un Voto al Partido Montaña Roja es un Voto por la Fuerza en la Igualdad"
 cascadian_politics_event.201.o2: "Un Voto al Partido Popular de Cascadia es un Voto por la Unidad"
 cascadian_politics_event.201.o3: "Un Voto por la Derecha es un Voto por los Conservadores de Cascadia"
 cascadian_politics_event.201.o4: "Un Voto por el Poder es un Voto por una Cascadia Más Grande"
 cascadian_politics_event.300.t: "¡Más Opciones, Señor!"
 cascadian_politics_event.300.d: "La situación continúa a medida que se empiezan a emitir votos y más votantes se consolidan en torno a un conjunto de partidos con un enfoque más nacional. Sin influencias externas o extranjeras innatas ejercidas sobre nuestra joven nación, parece que la gente se ha inclinado por una interesante mezcla de partidos políticos de izquierda y derecha. Pero aún es demasiado pronto para empezar a identificar un ganador o \"ganadores\"."
 cascadian_politics_event.300.o1: "Izquierda o Derecha, Arriba o Abajo, Gira esa Ruleta sin Parar"
 cascadian_politics_event.301.t: "Come tu Pastel y Ténlo También"
 cascadian_politics_event.301.d: "La situación se acerca a su fin y, por lo tanto, depende de la propia gente determinar el rumbo que tomará nuestra joven nación. De ser así, el Partido de la Gran Cascadia, el Partido Empresarial de Boise, el Partido de la Libertad de Cascadia o el Partido Robin de Cascadia obtendrán la victoria absoluta, o si nadie logra asegurar la mayoría, deberán trabajar juntos en coalición y sentar un precedente de cohesión y acción política para años, e incluso décadas, venideros."
 cascadian_politics_event.301.o1: "Un Voto por la Grandeza es un Voto por Cascadia Misma"
 cascadian_politics_event.301.o2: "Vota por los Negocios para Votar Económicamente, ¡Vota al Partido Empresarial de Boise Hoy!"
 cascadian_politics_event.301.o3: "Un Voto por la Libertad es un Voto por Ti"
 cascadian_politics_event.301.o4: "Bienestar Social y Equidad Económica, ¡Vota al Robin Hoy!"
 cascadian_politics_event.400.t: "El Fervor Nacionalista Domina a la Nación"
 cascadian_politics_event.400.d: "A medida que la situación continúa, cada vez más votantes se inclinan por partidos con un enfoque más nacionalista. Estos partidos son de derecha, y algunos resultan un poco más desagradables para el votante más moderado. Sin embargo, tomará tiempo determinar qué se materializará a partir de este auge del nacionalismo."
 cascadian_politics_event.400.o1: "Cascadia para los Cascadianos"
 cascadian_politics_event.401.t: "¿Qué Tan Amargados Estamos?"
 cascadian_politics_event.401.d: "La situación se intensifica a medida que se libra una batalla por el primer puesto entre una variedad de partidos interesantes y diferentes. Irónicamente, entre los cuatro más moderados, como los nihilistas han comenzado a anunciar las principales opciones, tenemos a la Casa de Olimpia, un partido monárquico perteneciente al Movimiento Nueva Ola. Este partido busca instaurar una monarquía electiva con una constitución como autoridad legal vinculante. Si bien muchos se muestran escépticos ante esta plataforma de \"cuento de hadas\", otros parecen estar más interesados ​​en la reinvención de viejas ideas con nuevos ideales. A continuación, tenemos al Partido Fuerza y ​​Unidad, un partido típicamente populista de derechas, al que algunos llaman en broma el Partido Cascadia Primero, dadas sus plataformas flexibles, pero con opciones generalmente pro-Cascadia. A continuación, tenemos el ala política de lo que parece ser el Ejército Cascadiano. Este partido parece ser más flexible económicamente, pero más conservador socialmente, con una naturaleza militarizada. Aunque a algunos no les convence el período de servicio obligatorio propuesto, los programas cohesivos para estar \"listos para cualquier cosa\" también son muy atractivos. Finalmente, tenemos a la Brigada Escarlata, un movimiento o partido político bastante mal visto, orientado a la métrica de... tomemos lo que está haciendo el Partido Fuerza y ​​Unidad y elevémoslo a un 10 y algo más, ya que son bastante débiles en los problemas \"reales\". En cualquier caso, tendremos que esperar a que se cuenten los votos para estar seguros de quién saldrá victorioso."
 cascadian_politics_event.401.o1: "Fuerza y Unidad Juntos"
 cascadian_politics_event.401.o2: "La Brigada Escarlata Marcha hacia la Victoria"
 cascadian_politics_event.401.o3: "La Primera de Muchas Victorias Militares por Venir"
 cascadian_politics_event.401.o4: "Olympia Asciende a las Estrellas y Así lo Hará su Pueblo"
 cascadian_foreign_policy_event.1.t: "Los Genios Calientes Causan Bajas"
 cascadian_foreign_policy_event.1.d: "Ese mismo día, se detectaron varios grupos antagonizando a los guardias fronterizos. El gobierno de Cascadia niega su responsabilidad y ha ofrecido castigar severamente la negligencia criminal de sus ciudadanos. Sin embargo, nos cuesta creer que una nación que ya ha maniobrado tanto por todo el continente sea simplemente \"inocente\". Por lo tanto, tenemos una verdadera decisión que tomar. Podemos intensificar la lucha y enfrentarlos, o podemos supuestamente aceptar sus términos y averiguar qué planean a continuación. Nuestra posición geopolítica significa que tenemos el control y Cascadia parece querer recuperarlo o destruirlo."
 cascadian_foreign_policy_event.1.o1: "Nos Encargaremos de Ellos Personalmente"
 cascadian_foreign_policy_event.1.o2: "Enviar Nuestras Más Sentidas Disculpas"
 cascadian_foreign_policy_event.2.t: "Canadá se Disculpa"
 cascadian_foreign_policy_event.2.d: "A pesar de nuestros mejores esfuerzos para incitar al gobierno canadiense a actuar, hemos fracasado. Ahora nos enfrentamos a una difícil decisión: dar marcha atrás y conformarnos con lo que tenemos, o reunir a las tropas y prepararnos para la guerra en nuestros términos."
 cascadian_foreign_policy_event.2.o1: "No Podemos Permitirnos Tal Escalada"
 cascadian_foreign_policy_event.2.o2: "¡Al Diablo, ¡Movilicemos a las Tropas!"
 CAS_revanchist_event.1.t: "Un Dilema Capital"
 CAS_revanchist_event.1.d: "El continente es nuestro, pero la situación sigue siendo un caos y surge una nueva pregunta: ¿Dónde ubicaremos al nuevo gobierno nacional? Muchos dirán, por supuesto, que simplemente lo devolvamos a Washington D. C. Sin embargo, muchos otros creen que, debido a la ubicación de la antigua capital, se creó una barrera natural contra el gobierno y su gente. Por ello, hemos enviado a algunos topógrafos a Utah, Kansas y Kentucky para ver si podemos encontrar una zona adecuada y más centralizada, o al menos más abierta, para que la gente pueda ver y hacer oír su voz. Claro que también podemos considerar la renovación de la antigua capital; al menos no estaría de más."
 CAS_revanchist_event.1.o1: "¿Realmente Necesitamos Tanto Alboroto?"
 CAS_revanchist_event.2.t: "La Decisión"
 CAS_revanchist_event.2.d: "Con los preparativos resueltos y las opciones definidas, ahora debemos decidir dónde se ubicará la futura capital federal de nuestra segunda república. ¿Debería ser centro-occidental, centro-continental, centro-oriental o devuelta al Distrito de Columbia?"
 CAS_revanchist_event.2.o1: "Centralmente Occidental"
 CAS_revanchist_event.2.o2: "Continentalmente Central"
 CAS_revanchist_event.2.o3: "Centralmente Oriental"
 CAS_revanchist_event.2.o4: "Usemos Simplemente lo que Tenemos"
 CAS_focus_military_automation_investments: "Inversiones en Automatización Militar"
 CAS_focus_military_automation_investments_desc: "Cuanto más expandamos nuestra capacidad industrial militar, más personal se necesitará en el ámbito económico. Por lo tanto, debemos realizar inversiones estratégicas y específicas en automatización para garantizar que nuestra industria militar no suponga una carga mayor para nuestra economía y la población de lo que tradicionalmente sería."