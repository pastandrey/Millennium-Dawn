l_spanish:
 Cascadia_focus: "Árbol de enfoque de Cascadia"
 CAS_focus_olympia_rises: "Olimpia se levanta"
 CAS_focus_olympia_rises_desc: "Con Seattle sobredesarrollada, la capital del estado de Washington se convertirá en la nueva capital nacional. Olimpia suena bien de todos modos."
 CAS_focus_stabilization_of_washington: "Estabilización de Washington"
 CAS_focus_stabilization_of_washington_desc: "Desde el establecimiento de la capital federal de nuestra nación y desde esto ahora podemos comenzar a estabilizar el estado en el que ahora reside nuestra capital. La organización de la infraestructura y la actividad económica básica devolverá una forma de cohesión social que nos permitirá invertir y avanzar hacia mejores esfuerzos de integración poco después."
 CAS_focus_the_new_home: "El nuevo hogar"
 CAS_focus_the_new_home_desc: "Con la estabilidad económica... al menos por lo que vale, así como los esfuerzos cohesivos de nuestro pueblo para formar una apariencia de estructura social. Ahora podemos comenzar el proceso de desplegar servicios civiles y de emergencia en todo el estado de Washington y comenzar a llamar a este rincón del continente nuestro nuevo hogar."
 CAS_focus_our_oregon_trail: "Nuestro sendero de Oregón"
 CAS_focus_our_oregon_trail_desc: "Aunque los nativos y los colonos tuvieron que viajar hasta la mitad del continente, ahora debemos viajar hacia el sur para comenzar la reconstrucción de nuestro territorio vecino que es el estado de Oregón. Con una base establecida aquí en Washington deberíamos poder ponerlos en línea en relativamente poco tiempo."
 CAS_focus_another_pacific_gem: "Otra joya del Pacífico"
 CAS_focus_another_pacific_gem_desc: "Una vez restaurada la funcionalidad económica y social, podemos comenzar a conectarnos y crear servicios civiles y de emergencia para unir al estado de Oregon con nuestro punto de partida. El futuro se vuelve cada vez más brillante, aunque sea un poquito."
 CAS_focus_i_dont_know: "¿No sé?"
 CAS_focus_i_dont_know_desc: "No, dije Idaho, por supuesto que no conocíamos la condición del estado. Toda una maldita cadena montañosa abarca la mayor parte del estado. De todos modos, podemos comenzar a reactivar cosas como la industria minera y otras actividades económicas para darles esperanza a estas personas nuevamente."
 CAS_focus_mountain_marvel: "Maravilla de la montaña"
 CAS_focus_mountain_marvel_desc: "Economía, buena, gente, feliz, situación, bastante buena. Excelente. Ahora es el momento de vincular el estado con el resto de la nación, desde aquí podemos comenzar a calcular exactamente lo que haremos en nuestro nuevo lugar en el mundo."
 CAS_focus_a_new_beginning: "Un nuevo comienzo"
 CAS_focus_a_new_beginning_desc: "Con la nación estabilizada, ahora debemos mirar hacia exactamente lo que queremos hacer. Nuestra posición significa que en realidad no estamos ni en ventaja ni en desventaja, pero tendremos que actuar ahora para que las cosas en el continente no empiecen a calentarse de nuevo."
 CAS_ideas_domestic_centric_policy: "Política centrada en el país"
 CAS_ideas_domestic_centric_policy_desc: "Nuestra nación es joven, débil y muy impresionable. En lugar de ser un punto pasajero en la historia, debemos centrarnos verdaderamente en nosotros mismos para garantizar nuestra estabilidad, crecimiento y la capacidad de conseguir el futuro que queremos en la vida."
 CAS_ideas_rocky_mountain_resistance: "Resistencia de las Montañas Rocosas"
 CAS_ideas_rocky_mountain_resistance_desc: "A pesar de la unidad que hemos podido crear, la gran división que es la Cordillera Rocosa ha envalentonado a quienes creen que están tan lejos a pesar de estar tan cerca. Como tal, la unión con Idaho es, en el mejor de los casos, frágil. Necesitamos manejar esto antes de que comience a desbordarse y causar más problemas de los que podemos manejar."
 CAS_ideas_rocky_mountain_crackdowns: "Medidas enérgicas en las Montañas Rocosas"
 CAS_ideas_rocky_mountain_crackdowns_desc: "Las investigaciones iniciales han ido bien, la delincuencia está disminuyendo y la membresía del grupo RMR está disminuyendo lentamente."
 CAS_ideas_rocky_mountain_rescue: "Rescate de las Montañas Rocosas"
 CAS_ideas_rocky_mountain_rescue_desc: "La membresía de RMR ha disminuido, el crimen está en su nivel más bajo. Situación estable y cada día más esperanzador. Las fuerzas del orden locales están asumiendo poco a poco más y más operaciones y control sobre todo."
 CAS_ideas_cascadian_union: "Unión Cascadiana"
 CAS_ideas_cascadian_union_desc: "Se restablece la paz en Idaho, nuestra pequeña unión de estados es más fuerte que nunca. Ahora, con las tácticas y los miembros del RMR completamente resueltos y disueltos, podemos aprender, mejorar y mejorar a nuestros pueblos y nuestra nación a partir de estos primeros dolores de crecimiento que sufrimos."
 CAS_decisions_war_time_mobilization_category: "Movilización en tiempos de guerra"
 CAS_decisions_war_time_mobilization_category_desc: "Cuando surge la necesidad, podemos recurrir a una legión de voluntarios para al menos llenar los vacíos en las filas. Porque no sabemos cuándo vendrá la guerra, pero sí sabemos que estará sobre nosotros."
 CAS_war_time_mobilization: "Movilización de la primera ola"
 CAS_war_time_mobilization_desc: "El llamado a las armas está sobre nosotros y debemos unirnos para garantizar la defensa de nuestros hogares. ¡A las armas por los chicos Dixie!"
 CAS_war_second_wave_defenders: "Defensores de la segunda ola"
 CAS_war_second_wave_defenders_desc: "El enemigo avanza, por lo que debemos reclutar otra oleada de defensores. La moral de la nación se verá afectada, pero necesitamos tropas."
 CAS_war_desperate_defenders: "Defensores desesperados"
 CAS_war_desperate_defenders_desc: "Las cosas se están poniendo sombrías, necesitamos todos los organismos disponibles que puedan o no mantener la línea. Tal vez, sólo tal vez, todavía podamos ganar esto."
 cascadia_event.1.t: "La resistencia aumenta"
 cascadia_event.1.d: "Desde los primeros días de nuestra formación, el estado de Idaho nos ha estado dando... problemas por decir lo menos. Al ser el más aislado de los tres estados, muchos dentro de Idaho creen que sería más seguro y más fácil ser su propia entidad. No creemos que vaya a ninguna parte, pero con la continua agitación muchos temen un poco un conflicto potencial tan pronto después del caos y la anarquía que vinieron antes."
 cascadia_event.1.o1: "No puedo tomar un descanso"
 cascadia_event.2.t: "Ola de crimen"
 cascadia_event.2.d: "Ha habido una creciente ola de criminalidad que azota el estado de Idaho, mientras que esto podría ser sólo un contratiempo para restablecer la ley y el orden. Sólo hay algunas personas que están preocupadas por las implicaciones que esto podría significar. Si bien no hay pruebas claras, algunos ciudadanos e incluso ministros están presionando al gobierno para que envíe un equipo de investigación especial para asegurar la situación."
 cascadia_event.2.o1: "La policía local puede encargarse de esto"
 cascadia_event.2.o2: "Alguien me consigue los números de membresía de RMR"
 cascadia_event.3.t: "Marchas de las Montañas Rocosas"
 cascadia_event.3.d: "El grupo conocido como Resistencia de las Montañas Rocosas ha comenzado a organizar marchas. Si bien no hay nada ilegal en ello, el aumento de miembros del grupo está causando preocupación en toda Olimpia. Como tal, el gobierno nacional ha emitido una orden para comenzar una movilización sutil a medida que continúan aumentando los temores sobre la situación de Idaho."
 cascadia_event.3.o1: "Nunca termina"
 cascadia_event.4.t: "El ascenso del hombre de montaña"
 cascadia_event.4.d: "La Resistencia de las Montañas Rocosas ha tomado el estado de Idaho y, con él, ha surgido su líder: Robert \"El Hombre de la Montaña\" Johnson, un hombre que ha sufrido mucho. Aunque su apariencia no sea impresionante, él y su grupo han hecho lo que muchos esperaban evitar en estos jóvenes días de nuestra nación. Por ello, debemos movilizar a la nación para asegurarnos de que esto se resuelva antes de que el mundo entero decida interferir aún más, más allá de lo que probablemente ya lo ha intentado."
 cascadia_event.4.o1: "Dios nos ayude"
 cascadia_event.5.t: "Marchamos"
 cascadia_event.5.d: "Ha llegado el momento de zanjar esto, marchamos por las montañas y asumimos la paz que tanto hemos anhelado."
 cascadia_event.5.o1: "Nosotros vamos a la guerra"
 cascadia_event.300.t: "Llega la Unidad Especial de Investigación"
 cascadia_event.300.d: "Hace un tiempo, después de mucho suplicar al gobierno en Olympia, el gobierno envió una SIU al estado de Idaho. Las primeras investigaciones sólo arrojaron migajas. Sin embargo, a medida que avanzaba el tiempo, se fueron descubriendo oleadas de crímenes cooptados y pronto los miembros del RMR fueron detenidos y afortunadamente arrestados por cometer dichos crímenes."
 cascadia_event.300.o1: "Bueno, eso es algo al menos."
 cascadia_event.301.t: "La criminalidad disminuye"
 cascadia_event.301.d: "A medida que la SIU y las autoridades locales continúan manejando la ola de crímenes, cada vez más miembros del RMR son arrestados por robo de armas y una gran cantidad de otros delitos. El número de miembros está comenzando a disminuir a medida que las cosas comienzan a mejorar para la estabilidad del estado de Idaho, muchos se preguntan cuándo todo llegará a un final pacífico."
 cascadia_event.301.o1: "Ojalá más pronto que tarde"
 cascadia_event.302.t: "Esfuerzos continuos"
 cascadia_event.302.d: "A medida que pasa el tiempo, la SIU ha asumido un papel más de asesor y asistencia, ya que a las fuerzas del orden locales se les ha otorgado cada vez más control operativo sobre la situación. El crimen continúa disminuyendo y las membresías de RMR han alcanzado su punto más bajo histórico. Se rumorea que su líder, conocido simplemente como \"Hombre de la Montaña\", dará un discurso en los próximos días. Esto se produce mientras los líderes del SIU están debatiendo si finalmente es hora de abandonar el estado, ya que la ley y el orden parecen haberse restablecido en su mayor parte."
 cascadia_event.302.o1: "Ha tomado algo de tiempo pero valió la pena"
 cascadia_event.303.t: "Paz restaurada"
 cascadia_event.303.d: "Hoy temprano, el líder del RMR anunció la disolución oficial del grupo. Muchos miembros estaban indignados pero tan desanimados que simplemente se retiraron a sus hogares. Las autoridades locales afirman que la delincuencia está en su punto más bajo y la estabilidad se ha restablecido una vez más en el estado de Idaho. Ahora podemos empezar a avanzar juntos como una sola nación."
 cascadia_event.303.o1: "Finalmente podemos respirar de nuevo"
 CAS_focus_preparing_for_elections: "Preparándose para las elecciones"
 CAS_focus_preparing_for_elections_desc: "Con la nación en un estado lo suficientemente bueno como para organizar partidos políticos y zonas de votación, y habiendo tratado con la RMR en Idaho, ahora estamos listos para preparar nuestras primeras elecciones nacionales oficiales. El mayor problema es que, por ahora, parece que tenemos demasiadas opciones. Pero podría ser peor."
 CAS_focus_setting_the_stage: "Preparando el escenario"
 CAS_focus_setting_the_stage_desc: "Mientras el pueblo de nuestra nación encuentra su voz entre los partidos políticos emergentes, debemos preparar y establecer la infraestructura y las capacidades necesarias para que el país pueda llevar a cabo las elecciones para las que todos se están preparando."
 CAS_focus_western_politics: "Partidos políticos occidentales"
 CAS_focus_western_politics_desc: "Durante la preparación y conclusión de nuestras primeras elecciones nacionales, parece que la población votante se ha sentido cada vez más atraída por partidos y movimientos políticos orientados hacia ideas, ideales y principios de los partidos occidentales. Esto prepara el escenario no solo para que el partido ganador celebre su victoria, sino también para que nuevos partidos se hagan presentes e intenten obtener su parte del poder político, por decirlo así."
 CAS_focus_consumers_party_victory: "Victoria del Partido del Consumidor"
 CAS_focus_consumers_party_victory_desc: "Los votos han sido contados y el Partido de los Consumidores de Cascadia ha salido victorioso, ahora con la mirada puesta tanto en las necesidades del consumidor como en las de los negocios. Es casi seguro que nuestra nación podrá arrancar con el pie derecho en lo económico antes que cualquiera de nuestros vecinos en el continente."
 CAS_focus_tax_business_act: "Ley de Impuestos Empresariales"
 CAS_focus_tax_business_act_desc: "La Ley LIN o Ley de Impuestos a Negocios, No a Consumidores, como algunos la llaman, es una reforma fiscal que pone más impuestos a las empresas y a quienes generan riqueza, en vez de a los consumidores. La idea es que aunque montar un negocio será más difícil, con más dinero disponible, los consumidores podrán gastar más y ahorrar para eventualmente empezar sus propios negocios. Es un sacrificio a corto plazo para ganar a largo plazo y fomentar futuras inversiones."
 CAS_focus_economic_education_act: "Ley de Educación Económica"
 CAS_focus_economic_education_act_desc: "La LEE es una ley de inversión y reforma educativa para que los jóvenes aprendan y entiendan mejor la economía y conceptos básicos económicos aplicados a su vida diaria. La idea es que aprendan a manejar su dinero, a balancear un presupuesto y otras habilidades que les ayudarán en el futuro."
 CAS_focus_young_founders_program: "El Programa de Jóvenes Fundadores"
 CAS_focus_young_founders_program_desc: "El PJF es un programa dedicado a ayudar a jóvenes y futuros líderes empresariales a tener el capital para crear y empezar su propio negocio. Deben presentar documentos y explicar qué tipo de negocio quieren, dónde lo quieren poner y la competencia que esperan enfrentar. En resumen, es para impulsar y crear una base sólida para las pequeñas y medianas empresas, dándoles tiempo y suerte para crecer o mantenerse firmes."
 CAS_focus_general_economics_plan: "Plan General de Economía"
 CAS_focus_general_economics_plan_desc: "Para conectar al país de forma estable y equilibrada, necesitamos invertir en cada estado según sus necesidades generales y entender sus especialidades. Por eso, invertiremos en al menos un sector económico dedicado en cada estado."
 CAS_focus_retooling_regulations: "Reglamento de Reestructuración"
 CAS_focus_retooling_regulations_desc: "Hay que cambiar las reglas sobre cómo expandir y asignar zonas para nuevas áreas industriales y comerciales, además de entender mejor las normas para construir estos edificios. Muchas reglas viejas son complicadas y no ayudan ni perjudican, solo hacen que todo vaya más lento. Tenemos que arreglar esto rápido si queremos avanzar."
 CAS_focus_national_defense_act: "Ley de Defensa Nacional"
 CAS_focus_national_defense_act_desc: "La Ley de Defensa Nacional es una militarización preventiva de nuestra industria para asegurar, como mínimo, la independencia de nuestra nación en general."
 CAS_focus_energy_security_act: "Ley de Seguridad Energética"
 CAS_focus_energy_security_act_desc: "La LSE es una ley para invertir mejor en educación, investigación y desarrollo, además de mejorar la seguridad energética. Esto nos dará más independencia económica de otros países y nos dará un poco más de poder en futuras negociaciones."
 CAS_focus_cascade_care_program: "Programa de atención de Cascadia"
 CAS_focus_cascade_care_program_desc: "La atención a Cascadia es un plan federal opcional al que todos los ciudadanos aportarán como un inicio suave hacia un sistema de salud más universal. Esto dará la opción de usarlo cuando sea necesario, pero con la contribución de todos, los fondos generados irán a crear y mantener centros de salud públicos y personal, cuidando a la gente sin importar su elección."
 CAS_focus_cascadian_securities: "Programa de valores de Cascadia"
 CAS_focus_cascadian_securities_desc: "El PVC es básicamente el programa nacional de seguridad social, pero con una diferencia en su enfoque comparado con otros países. El PVC tiene una especie de sistema bancario para juntar y guardar los ahorros de cada contribuyente. Esto funciona como una versión federal del programa 401k, pero sin depender de una empresa o negocio específico. Ya hay leyes para proteger el uso de estos fondos por parte del gobierno, que solo podrán usarse con el consentimiento firmado de los contribuyentes afectados."
 CAS_focus_new_conservative_victory: "Nueva Victoria Conservadora"
 CAS_focus_new_conservative_victory_desc: "Con las elecciones terminadas y la victoria del NCP, ahora les toca a los conservadores de la nación mantenerse firmes y trazar un rumbo hacia la mejora y la cohesión social."
 CAS_focus_traditional_taxations: "Impuestos tradicionales"
 CAS_focus_traditional_taxations_desc: "El NCP desea \"desmasificar\" el código tributario racionalizando los códigos en general mediante la reducción de los medios de los diferentes métodos de tributación y volviendo a métodos y medios más tradicionales de adquirir ingresos de la nación y sus componentes."
 CAS_focus_manufacturing_investments: "Inversiones en manufactura"
 CAS_focus_manufacturing_investments_desc: "Debemos tratar de aumentar nuestra capacidad de fabricación si no sólo queremos satisfacer las necesidades internas, sino también entrar en mercados extranjeros y cerrar acuerdos comerciales."
 CAS_focus_tech_investments: "Inversiones Tecnológicas"
 CAS_focus_tech_investments_desc: "Si bien la función principal es aumentar nuestro sector tecnológico, en general este plan de inversión pretende aumentar nuestros servicios y las capacidades generales del sector de \"oficina\" para ayudar a diversificar aún más nuestra composición económica."
 CAS_focus_food_securities_act: "Ley de Seguridad Alimentaria"
 CAS_focus_food_securities_act_desc: "La Ley de Seguridad Alimentaria es un plan de investigación e inversión dedicado a mejorar nuestra seguridad alimentaria interna. La idea es apoyar más las necesidades del país y explorar métodos nuevos como la agricultura vertical."
 CAS_focus_automaton_research_budget: "Presupuesto de investigación de autómatas"
 CAS_focus_automaton_research_budget_desc: "Invertir en investigación y presupuesto para avanzar en automatización, IA y tipos básicos de robots nos permitirá producir más en menos tiempo y con menos espacio, aumentando la eficiencia y el número de trabajadores disponibles para tareas repetitivas que a muchos no les interesan."
 CAS_focus_increasing_social_funding: "Aumento de la financiación social"
 CAS_focus_increasing_social_funding_desc: "Lo básico del bienestar social viene de los primeros estados de bienestar del Imperio Alemán y otros países que lo popularizaron en el siglo XIX para frenar agitación socialista. Pero como nación, debemos cuidar a nuestra gente cuando las cosas no van bien. Todos tenemos un mal día, y por eso debemos asegurarnos de que un mal día no sea el primer día de alguien como criminal."
 CAS_focus_infrastructure_projects: "Proyectos de infraestructura"
 CAS_focus_infrastructure_projects_desc: "El aumento general de nuestra capacidad de construcción permitirá un mayor desarrollo en el futuro. Considerando que no disponemos de mucho terreno, necesitamos comprender y enfocarnos en cómo aprovechar al máximo el potencial con menos."
 CAS_focus_better_healthcare_options: "Mejores opciones de atención médica"
 CAS_focus_better_healthcare_options_desc: "Ajustar las reglas e invertir mejor en la infraestructura de salud permite que la gente tenga más opciones para recibir el mejor cuidado posible. Así, aunque haya una opción del gobierno, también debemos preparar el camino para que existan opciones privadas."
 CAS_focus_seeking_trade_initiatives: "Buscando iniciativas comerciales"
 CAS_focus_seeking_trade_initiatives_desc: "Necesitamos mirar más allá de nuestro propio territorio si realmente queremos llegar a algún lugar en el mundo. Si nuestras opciones son limitadas, podemos empezar con pequeñas negociaciones comerciales para afirmar nuestro lugar, por pequeño que sea, en este mundo."
 CAS_focus_liberal_victory: "Una victoria liberal"
 CAS_focus_liberal_victory_desc: "Se emitieron los votos y el Partido Liberal de Cascadia ganó las elecciones. Es esta idea la que nos permite avanzar hacia un nuevo camino libre, igualitario y auténtico de movimiento social y prosperidad económica."
 CAS_focus_reformed_regulations: "Regulaciones reformadas"
 CAS_focus_reformed_regulations_desc: "Nuestra capacidad de desarrollo depende completamente de nuestra capacidad para regular y comprender los procesos que nos permiten desarrollarnos en primer lugar. Por lo tanto, debemos reformarlos para que sean más eficientes y se ajusten a los estándares y expectativas modernos."
 CAS_focus_education_standards_act: "Ley de Normas Educativas"
 CAS_focus_education_standards_act_desc: "La LNE o Ley de Normas Educativas es una propuesta presupuestaria para invertir mejor y elevar los estándares de calidad y las habilidades que nuestros estudiantes y educadores pueden tener al pasar y ser parte del sistema educativo en su conjunto."
 CAS_focus_job_fair_programs: "Programas de Seguridad Laboral"
 CAS_focus_job_fair_programs_desc: "La seguridad laboral siempre es la principal prioridad para quien tiene responsabilidades fiscales. Con esta convicción, organizamos ferias de empleo e iniciativas para garantizar el empleo de nuestros ciudadanos y el desarrollo continuo de nuestra economía."
 CAS_focus_office_sector_development: "Desarrollo del sector de oficinas"
 CAS_focus_office_sector_development_desc: "Nuestra nación es pequeña, creo que todos podemos estar de acuerdo en eso. Por lo tanto, debemos enfocarnos en negocios que generen más riqueza, como los servicios, la industria tecnológica o el sector de oficinas en general. Si logramos sacar todo el potencial económico de estos sectores, podremos brindar a nuestra gente lo que necesita y, además, posiblemente financiar nuestra red de defensa ante posibles amenazas. Me cuesta creer que este continente se mantenga en calma para siempre."
 CAS_focus_food_supplies_act: "Ley de Suministros de Alimentos"
 CAS_focus_food_supplies_act_desc: "La mecanización de nuestro aparato alimentario y la protección de las cadenas de suministro de nuestras necesidades alimentarias internas permitirán el desarrollo de una sociedad más estable y cohesionada mientras miramos hacia el futuro que esperamos que esté más allá de nuestras fronteras, si es posible."
 CAS_focus_basics_in_defense: "Conceptos básicos de defensa"
 CAS_focus_basics_in_defense_desc: "Para asegurar la seguridad de nuestra nación, debemos tener algún tipo de industria de defensa. La Resistencia de las Montañas Rocosas ya fue una amenaza suficiente, pero si California o los supuestos federalistas llegan al oeste, quién sabe lo que podría pasarnos. Por eso, necesitamos una industria militar que empiece a acumular armas y municiones para cualquier escenario posible."
 CAS_focus_community_outreach_programs: "Programas de extensión comunitaria"
 CAS_focus_community_outreach_programs_desc: "Desarrollar PEC eficientes y funcionales nos permite asegurar una estabilidad social que muchos desean. La policía tiene una enorme responsabilidad, y por eso no solo deben ser respetados, también deben ser cuidados por las personas a las que sirven, y viceversa. Las comunidades y ciudadanos que protegen deben tener el mismo respeto y visión, así habrá un beneficio mutuo y un entendimiento claro de por qué cada parte es esencial para mantener la cohesión y la capacidad de hacer cumplir la ley y el orden en nuestra nación."
 CAS_focus_bettercare_act: "Ley de Mejor Atención Médica"
 CAS_focus_bettercare_act_desc: "El BCA es un paquete de financiación para mejorar la calidad de la atención médica que nuestros ciudadanos pueden recibir en las instituciones de atención médica pública aumentando los salarios de enfermeras, médicos y personal de tierra, así como la adquisición de equipos y recursos necesarios para estas instituciones."
 CAS_focus_mutual_trade_initiatives: "Iniciativas de comercio mutuo"
 CAS_focus_mutual_trade_initiatives_desc: "La capacidad de proveer a nuestra nación aquello que no podemos producir por nosotros mismos implica mirar al extranjero. Por eso, debemos establecer que las negociaciones comerciales sean lo más mutuas posible, para asegurar nuestra independencia interna y mantener el equilibrio entre la dependencia extranjera y la seguridad nacional."
 CAS_focus_victory_for_progress: "Una victoria para el progreso"
 CAS_focus_victory_for_progress_desc: "Con las elecciones ganadas en nombre de nuestros partidos, ahora tenemos los medios para avanzar. Para crear un camino de movilidad social y económica e igualdad de oportunidades."
 CAS_focus_common_sense_labor_reforms: "Reformas laborales de sentido común"
 CAS_focus_common_sense_labor_reforms_desc: "A través de mejores métodos de negociación colectiva regulada entre sindicatos y empleadores, podemos establecer un estándar de diálogo y expectativas para que nuestros trabajadores estén realmente protegidos. Por ello, podemos otorgar pequeños subsidios a las empresas que empleen mayoritariamente fuerza laboral sindicalizada, asegurando así un equilibrio y una mayor apertura hacia la aceptación de los sindicatos en general."
 CAS_focus_a_more_progressive_tax_code: "Un código tributario más progresivo"
 CAS_focus_a_more_progressive_tax_code_desc: "Para garantizar que nuestros ciudadanos tengan los medios para mantenerse a sí mismos y a sus familias, debemos ajustar las tasas impositivas, los tipos de impuestos y los programas de asistencia que ayudan a crear el piso sobre el cual la gente puede subsistir."
 CAS_focus_budgeting_for_innovation: "Presupuesto para la innovación"
 CAS_focus_budgeting_for_innovation_desc: "Para mantenernos a la vanguardia, debemos aprovechar nuestras capacidades científicas y, por lo tanto, invertir en el futuro. Por el bien de nuestra nación, su gente y el poco terreno que tenemos para utilizar."
 CAS_focus_selective_mechanization: "Mecanización selectiva"
 CAS_focus_selective_mechanization_desc: "Modernizar no significa hacer todo de golpe. Con esta idea, podemos elegir industrias y sectores clave para modernizar y mecanizar, logrando hacer más con menos. Así, más trabajadores podrán pasar a sectores industriales, de oficina u otros, mientras fortalecemos el apoyo y los sistemas para que nuestra gente se mueva libre y fácilmente en este mundo económico que cambia todo el tiempo."
 CAS_focus_investing_in_the_future: "Invertir en el futuro"
 CAS_focus_investing_in_the_future_desc: "Nuestra infraestructura es la base para que podamos funcionar, tanto en lo económico como en lo social. Por eso, invirtamos y preparemos el presente y el futuro del desarrollo de nuestra nación, para que dejemos un estándar de ingenio para las generaciones que vienen."
 CAS_focus_farming_investments: "Inversiones agrícolas"
 CAS_focus_farming_investments_desc: "La capacidad de alimentar a nuestra población y asegurar la red de suministro de alimentos para nuestros trabajadores es fundamental para una verdadera cohesión social. Cuando esta necesidad básica se ve afectada, comienzan los verdaderos problemas, y eso es justamente lo que queremos evitar. Al establecer plantas de envasado y procesamiento de alimentos, además de invertir en métodos experimentales como la agricultura vertical, podemos aumentar el cultivo usando menos tierra en general."
 CAS_focus_rocky_mountain_mining: "Minería en las Montañas Rocosas"
 CAS_focus_rocky_mountain_mining_desc: "La compañía MMR fue apoyada por muchos del antiguo grupo de la Resistencia de las Montañas Rocosas en los primeros días de nuestra estabilización. Sin embargo, parece que esta empresa ha cambiado, ya que ha estado pidiendo al gobierno concesiones de tierras y fondos para expandirse. Nos alegra invertir en esta iniciativa, porque la expansión nacional de nuestros recursos nos dará ventaja en la seguridad interna y en las negociaciones comerciales con otros países."
 CAS_focus_industrial_expansion: "Expansiones industriales"
 CAS_focus_industrial_expansion_desc: "Para ayudar a nuestros ciudadanos a encontrar empleo, primero debemos crear esos empleos. Por eso invertiremos en trabajos del sector industrial y comercial para asegurar un mercado básico y universal donde la gente pueda conseguir trabajo lo antes posible. Estos empleos serán peldaños para nuestros programas previos, fomentando el crecimiento futuro y la diversidad económica en general."
 CAS_focus_energy_demands_act: "Ley de Demanda de Energía"
 CAS_focus_energy_demands_act_desc: "Nuestras necesidades energéticas deben ser una de nuestras prioridades principales, y por eso esta ley impulsará la educación, infraestructura e inversión en instalaciones para aumentar nuestra capacidad de producción nacional. Además, las inversiones en educación e investigación se usarán para reducir la pérdida de energía durante el transporte y almacenamiento, lo que debería bajar el consumo total."
 CAS_focus_eastern_politics: "Partidos políticos del Este"
 CAS_focus_eastern_politics_desc: "En el período previo y el final de las elecciones, los valores, ideas y principios del este y del lejano oriente han cautivado a la población votante. Ante esto, tomamos un respiro y aguantamos mientras esperamos ver qué sucederá exactamente a su debido tiempo."
 CAS_focus_red_mountain_victory: "Victoria de la Montaña Roja"
 CAS_focus_red_mountain_victory_desc: "La victoria es nuestra y para el pueblo de nuestra nación abrimos un nuevo capítulo. Ya no nos ilusionaremos con las falsas promesas de riqueza infinita que ofrece el capitalismo. Ahora construiremos un sistema para todos, basado en las necesidades de cada quien y no solo en sus deseos."
 CAS_focus_wealth_tax_act: "Ley del Impuesto sobre el Patrimonio"
 CAS_focus_wealth_tax_act_desc: "Con las reformas fiscales, planeamos enfocar el sistema en gravar la riqueza en sí, no solo a las personas. Claro, los individuos pueden obtener riqueza de varias formas, pero los negocios y la creación principal de riqueza están separados de los salarios individuales. Así, podemos mantener los impuestos bajos para las personas y, quizá en el futuro, ni siquiera necesitemos un impuesto sobre la renta real."
 CAS_focus_cooperative_ownership_act: "Ley de Propiedad Cooperativa"
 CAS_focus_cooperative_ownership_act_desc: "La propiedad cooperativa es cuando todos los que forman parte de un negocio tienen una participación o “acción” en él. Así, las decisiones las toman representantes tanto de la administración como de los trabajadores, asegurando unión y acción conjunta para el crecimiento y operaciones que afectan a todos. Haremos que todos los negocios nuevos deban organizarse así, y los que ya existen tendrán cinco años para hacer la transición o correrán el riesgo de ser forzados o comprados por el gobierno mediante un acuerdo forzado pero acordado."
 CAS_focus_industrial_efficiency_act: "Ley de Eficiencia Industrial"
 CAS_focus_industrial_efficiency_act_desc: "Los que se quejan dirán que no tenemos tanta tierra, que debemos mantener un balance entre la naturaleza y la civilización. Pero esas personas no entienden la voluntad y determinación humana. Invertiremos e investigaremos nuevas formas de mejorar nuestra industria: nuevas máquinas, nuevos métodos de producción, todo lo que sea posible. Por el bien de nuestra gente y el futuro que merecen, triunfaremos, sin importar a los pesimistas y agoreros que haya por ahí."
 CAS_focus_industrial_revolutionary_program: "Programa Revolucionario Industrial"
 CAS_focus_industrial_revolutionary_program_desc: "Nuestra nación se ha preparado y trabajado para alcanzar un nuevo nivel y estándar de industrialización. Ahora contamos con los medios para invertir a nivel nacional bajo el IRP y establecer nuevas metas para nuestro poder económico. Tarde o temprano crearemos un futuro para nuestra gente y seremos reconocidos mundialmente, aunque sea en una pequeña parte, sigue siendo un papel que jugamos."
 CAS_focus_northwestern_mining_incorporated: "Minería del Noroeste"
 CAS_focus_northwestern_mining_incorporated_desc: "MNE o Minería del Noroeste es una empresa minera creada por el estado que se encarga de operaciones mineras estratégicas para los mercados nacionales. Mientras las empresas mineras normales se especializan en lo suyo, NWM se enfocará en adquirir y crear zonas mineras estratégicas para expandir nuestra capacidad de extracción de recursos conforme crece la demanda interna con el tiempo."
 CAS_focus_cascadian_research_institute: "Instituto de Investigación de Cascadia"
 CAS_focus_cascadian_research_institute_desc: "El CRI es un centro de investigación y desarrollo dedicado a ayudar a innovar en cuestiones como el consumo de energía y los métodos de producción, así como en campos generales que pueden mejorar el crecimiento y hacer más eficiente nuestra nación en general, su gente y la economía para la cual la hemos creado."
 CAS_focus_red_mountaineers_budget: "Presupuesto de los Red Mountaineers"
 CAS_focus_red_mountaineers_budget_desc: "La defensa militar de nuestra nación es de suma importancia, y por ello debemos centrarnos en nuestra fortaleza nacional: las montañas. Asignaremos un presupuesto específico a los Red Mountaineers, una unidad especializada que contribuirá a la creación de un nuevo cuerpo de entrenamiento para que nuestro ejército, con el tiempo, avance y aprenda nuevas formas de aprovechar el terreno en esta era moderna de guerra, donde los hombres pueden morir a decenas de kilómetros del frente."
 CAS_focus_better_social_budgeting: "Mejor Presupuesto Social"
 CAS_focus_better_social_budgeting_desc: "Necesitamos garantizar la atención de nuestra gente y, por lo tanto, aumentar el presupuesto asignado a nuestros programas sociales. Si bien esto nos perjudicará a corto plazo, esta autoinversión nos permitirá mejorar la calidad de vida de nuestros ciudadanos y, así, establecer un nuevo estándar y preparar programas futuros para reintegrarlos a la fuerza laboral lo antes posible."
 CAS_focus_energy_diversity_act: "Ley de Diversidad Energética"
 CAS_focus_energy_diversity_act_desc: "Para garantizar que se satisfagan nuestras necesidades energéticas, debemos asegurar la diversidad de nuestros métodos de producción de energía. En general, esto nos permitirá seguir invirtiendo no solo en diferentes métodos de producción de energía, sino también en investigación sobre formas más eficientes de obtener más energía a partir de equipos e infraestructuras más pequeños o del mismo tamaño."
 CAS_focus_the_peoples_victory: "La victoria del pueblo"
 CAS_focus_the_peoples_victory_desc: "Los resultados están ahí, el pueblo ha hablado y se ha alzado con la victoria. Con esto podemos empezar a construir una sociedad más armoniosa, igualitaria y libre, en la que el pueblo tenga el control y no solo la autoridad central y su gobierno violento."
 CAS_focus_community_kitchens: "Cocinas comunitarias"
 CAS_focus_community_kitchens_desc: "Nuestro objetivo principal es lograr un «estado» prácticamente inexistente. Por lo tanto, debemos otorgar más poder al pueblo a través de programas e iniciativas que garanticen que el origen del dinero permanezca donde debe estar desde el principio: en el pueblo."
 CAS_focus_modern_homestead_act: "Ley de la Granja Moderna"
 CAS_focus_modern_homestead_act_desc: "Romper las barreras de la zonificación significa que la gente puede decidir dónde y qué quiere. Lo único es que hay un límite máximo en cuanto al tamaño de la tierra, para que todos puedan tener una parte de lo que nuestra gran nación tiene para ofrecer."
 CAS_focus_tradesmen_society_act: "Ley de la Sociedad de Comerciantes"
 CAS_focus_tradesmen_society_act_desc: "Para empoderar al individuo, debemos proporcionarle las herramientas y los medios necesarios para que pueda defenderse, encontrar y crear por sí mismo. Por lo tanto, tendrá acceso a tantos conocimientos y personas capaces con estos conocimientos como sea posible. La carpintería, la herrería, la soldadura, cualquier tipo de oficio que ayude al hogar es uno que ayuda a uno mismo."
 CAS_focus_the_peoples_mountain_state: "El estado montañoso del pueblo"
 CAS_focus_the_peoples_mountain_state_desc: "El estado de Idaho debe volver a manos del pueblo, les daremos los medios para que construyan el suyo propio, para que puedan crear una vida nueva y mejor para todos."
 CAS_focus_the_peoples_pacific_gem_state: "El estado del Pacífico, joya del pueblo"
 CAS_focus_the_peoples_pacific_gem_state_desc: "El estado de Washington dispondrá ahora de los medios necesarios para que sus ciudadanos prosperen, vivan y alcancen la vida que desean."
 CAS_focus_the_peoples_state_of_trails: "El estado popular de los senderos"
 CAS_focus_the_peoples_state_of_trails_desc: "La Ruta de Oregón fue una ruta de desesperación, esperanza y horror. Sin embargo, ahora podemos convertir este destino final de un estado en un nuevo sueño, un nuevo mañana y, sobre todo, un nuevo y mejor futuro para su gente."
 CAS_focus_educations_medicine_act: "Ley de Medicina Educativa"
 CAS_focus_educations_medicine_act_desc: "Hay dos cosas importantes para crecer, no solo personalmente, sino también en relación con los que nos rodean: el conocimiento y la buena salud. Con esto, pretendemos ofrecer más acceso y capacidades para que las personas puedan cuidar de sí mismas y de sus amigos, vecinos y familiares. Lo haremos aumentando los recursos disponibles en materia médica, de producción y de métodos de uso general en lo que respecta a las prácticas estándar de todo ello. Las innovaciones y necesidades creadas por uno mismo se satisfarán y aumentarán en función de lo que las personas necesiten o deseen en la vida."
 CAS_focus_healthy_people_act: "Ley de Personas Saludables"
 CAS_focus_healthy_people_act_desc: "El cuidado y el bienestar de las personas es de suma importancia, ya que las personas sanas viven vidas largas. Estas vidas pueden utilizarse para hacer cualquier cosa que se propongan, y debemos asegurarnos de que tengan los medios y la capacidad para hacerlo."
 CAS_focus_unity_act: "La Ley de Unidad"
 CAS_focus_unity_act_desc: "Derribamos las barreras que rodean la forma de construir negocios y hogares, derribamos las barreras que rodean la forma de utilizar la propia tierra. Derribamos las barreras del propio Estado y declaramos un camino unido hacia el futuro. Como pueblos de estas tierras, ellos serán los verdaderos decisores de cuál será su futuro."
 CAS_focus_victory_for_tradition: "Victoria para la tradición"
 CAS_focus_victory_for_tradition_desc: "Con los votos emitidos y contados, la nación se ha pronunciado y ha demostrado que cree en la tradición. Aunque nuestra nación es joven, esto es aún mejor para consolidar lo que nuestras tradiciones pueden ser y serán, para establecer un patrón de cohesión social y nacional y de orgullo que se transmitirá a las generaciones venideras."
 CAS_focus_establishing_national_social_traditions: "Establecimiento de tradiciones sociales nacionales"
 CAS_focus_establishing_national_social_traditions_desc: "La creación de nuestras tradiciones sociales nacionales establecerá la norma y el precedente de cómo funciona nuestra sociedad y avanza con el paso del tiempo. Nuestra prioridad es la familia, sin embargo, la flexibilidad de la familia es de suma importancia como hogar estable, independientemente de su funcionamiento, ya que sigue siendo una vida estable y mejor para los hijos de estas familias. Por ello, se codificará la igualdad de oportunidades de las mujeres en el lugar de trabajo y el contenido del carácter, en lugar de los prejuicios y las suposiciones del pasado, para evitar decisiones injustas y precipitadas en nombre de aquellas personas que solo quieren buscar una carrera y trazar su propio camino en la vida, pero que se verían frenadas por esas influencias negativas si se las dejara a su suerte."
 CAS_focus_creating_economic_innovations: "Crear innovaciones económicas"
 CAS_focus_creating_economic_innovations_desc: "Crear el espacio y el entorno en el que todos nuestros ciudadanos puedan convertirse en futuros empresarios y empresarias nos permite relajarnos más, ya que las personas tienen más movilidad y flexibilidad en la vida. Este nuevo entorno permitirá realizar innovaciones personales en aras de la creatividad en sí misma, desafiando tanto el statu quo de los mercados como creando nuevos futuros para todos aquellos que quieran participar, ya sean inversores, trabajadores o consumidores."
 CAS_focus_creating_educational_excellence: "Creando excelencia educativa"
 CAS_focus_creating_educational_excellence_desc: "Para que nuestra gente sea creativa, innovadora y trabajadora, debemos ser capaces de enseñarles y abrirles los ojos al mundo del conocimiento y la información que existe en el mundo. Porque sin comprensión y conocimiento no hay sentido del progreso, y sin sentido del progreso, ¿realmente se llega a alguna parte en la vida, o simplemente se está conforme con lo que se tiene?"
 CAS_focus_growth_initiative_phase_one: "Iniciativa de crecimiento, fase uno"
 CAS_focus_growth_initiative_phase_one_desc: "El GIP o Plan de Iniciativa de Crecimiento es un plan general de desarrollo económico destinado a garantizar que la economía de nuestro país esté a la altura de las demandas de nuestra población. Esta fase inicial comenzará con algunos desarrollos agrícolas organizados e inversiones limitadas en el sector manufacturero."
 CAS_focus_growth_initiative_phase_two: "Fase dos de la iniciativa de crecimiento"
 CAS_focus_growth_initiative_phase_two_desc: "La segunda fase del GIP se centra en ampliar el acceso a los recursos minerales del estado de Idaho y utilizarlos para potenciar el sector de oficinas de Oregón. Damos un nuevo paso adelante hacia el crecimiento económico, la unidad y el progreso en su conjunto."
 CAS_focus_growth_initiative_phase_three: "Fase tres de la iniciativa de crecimiento"
 CAS_focus_growth_initiative_phase_three_desc: "Los planes definitivos relacionados con el GIP se centran en completar el paquete económico total, que incluye las industrias navales y la fabricación nacional de armas. Estos avances contribuirán a impulsar un mayor crecimiento económico, además de las limitadas posibilidades que tenemos para iniciar el desarrollo de la defensa nacional."
 CAS_focus_subtle_militarization: "Militarización sutil"
 CAS_focus_subtle_militarization_desc: "Si queremos defender nuestra nación próspera y en constante crecimiento, lo que incluye a la propia ciudadanía, debemos invertir en una industria armamentística nacional que permita abastecer a nuestras fuerzas militares permanentes. Puede que no sea mucho, pero es suficiente para poner las cosas en marcha."
 CAS_focus_naval_yards: "Inversiones en astilleros navales"
 CAS_focus_naval_yards_desc: "Nuestra fuerza naval es bastante grande, ya que es un legado de la época de la república. Sin embargo, tener esos barcos no sirve de nada si no podemos repararlos y mantenerlos cuando sea necesario. Por eso, nos aseguraremos de tener al menos algo que nos ayude con el mantenimiento de nuestras fuerzas navales en general."
 CAS_focus_family_tax_breaks: "Desgravaciones fiscales por familia"
 CAS_focus_family_tax_breaks_desc: "Para garantizar el desarrollo pacífico de las familias en todo nuestro país, debemos incentivar no solo la idea de cuidar a un niño, sino también tranquilizar a los nuevos padres que puedan estar preocupados por las cargas económicas y los problemas que esto les pueda acarrear. Esta carga significa que serían menos propensos a tener hijos, ya que no querrían criarlos en un entorno así, lo que podría tener una serie de influencias negativas o incluso llevarles a tomar «malas decisiones». Por ello, se crearán desgravaciones fiscales específicas para ayudar y orientar a los padres a lo largo de la vida de sus hijos y de su crianza."
 CAS_focus_greater_cascadian_victory: "Gran victoria de Cascadia"
 CAS_focus_greater_cascadian_victory_desc: "Los verdaderos patriotas de Cascadia acudieron a las urnas y hicieron oír su voz. Con esta victoria, sentamos las bases para garantizar un futuro mejor para nuestra joven nación y sus amables pueblos. ¡Por Cascadia!"
 CAS_focus_militaristic_primacy: "Primacía militarista"
 CAS_focus_militaristic_primacy_desc: "Para asegurar nuestros objetivos como nación, debemos trazar un camino que genere la certeza que nos permitirá alcanzarlos. La priorización militar será la clave que abra las puertas a una nueva y Gran Cascadia."
 CAS_focus_economic_militarism: "Militarismo económico"
 CAS_focus_economic_militarism_desc: "Nuestra nación debe prepararse para las futuras conquistas que nos esperan. Para eso, ajustaremos la economía para enfocarla en la producción militar. Rondas limitadas de racionamiento y otras medidas ayudarán a que la población entienda los posibles sacrificios y dificultades necesarios para cumplir nuestras ambiciones nacionales."
 CAS_focus_creating_our_own_complex: "Creando nuestro propio complejo"
 CAS_focus_creating_our_own_complex_desc: "El ejército necesita armas y equipo, y se los proporcionaremos mediante la creación de nuestro propio complejo militar-industrial. Prepararemos el terreno para satisfacer las necesidades de nuestras fuerzas armadas y trazaremos el camino hacia la victoria."
 CAS_focus_manufacturing_navies: "Armadas manufactureras"
 CAS_focus_manufacturing_navies_desc: "Con el desarrollo limitado de nuestra economía civil, esto es un apoyo para asegurar nuestra potencia industrial naval. Nuestros barcos, sean de comercio o de guerra, navegarán por los siete mares y protegerán nuestra independencia nacional de los extranjeros y lobos con piel de oveja."
 CAS_focus_improving_national_logistics: "Mejorando la logística nacional"
 CAS_focus_improving_national_logistics_desc: "Nuestra nación es muy difícil de atravesar, lo que nos ayuda y también puede atrapar al enemigo en el campo de batalla. Mejorar y agilizar nuestra red logística es fundamental para nuestras capacidades ofensivas y defensivas. Con estas mejoras, podemos hacer que el enemigo se vea obligado a tomar caminos específicos y predecibles. Claro, siempre debemos esperar lo inesperado, pero si podemos hacer que lo inesperado sea más previsible, ¿por qué no?"
 CAS_focus_olympia_soars: "Olympia se eleva"
 CAS_focus_olympia_soars_desc: "El centro y núcleo de nuestra nación es el estado de Washington. Debemos fortalecerlo expandiendo nuestros recursos y llevándolos al área de la capital. Así, por efecto dominó, desarrollamos la economía de todo el país y, como doctrina principal, consolidamos la fortaleza de Olympia que crearemos para asegurar la soberanía de nuestra nación."
 CAS_focus_fortress_cascadia: "Fortaleza Cascadia"
 CAS_focus_fortress_cascadia_desc: "La defensa nacional es nuestra prioridad número uno. Con esto, garantizaremos que el proyecto Fortaleza Cascadia sea un éxito y se desarrolle al máximo para asegurar nuestra supervivencia, incluso si nos vemos obligados a retroceder hasta las costas de nuestras tierras."
 CAS_focus_coastal_command_project: "Proyecto de Comando Costero"
 CAS_focus_coastal_command_project_desc: "Ya que aseguramos la tierra, ahora debemos asegurar los mares. Con esa idea, creamos el Grupo de Mando Costero (GMC), que se encargará de garantizar la seguridad y defensa costera para evitar desembarcos sorpresa si alguien intenta evadir nuestras redes de defensa impenetrables."
 CAS_focus_solidifying_the_network_into_society: "Consolidando la red en la sociedad"
 CAS_focus_solidifying_the_network_into_society_desc: "Tener redes defensivas masivas y en capas es una gran muestra de nuestra determinación nacional... pero la realidad es que estas pueden desgastar pasivamente la voluntad y la fortaleza mental de la gente con el tiempo. Por eso, vamos a diseñar esa red defensiva para que sea una pieza más que ayude a que la maquinaria de nuestra sociedad funcione en conjunto."
 CAS_focus_home_grown_politics: "Política local"
 CAS_focus_home_grown_politics_desc: "A medida que se acercan las elecciones y los votantes se agrupan en partidos y movimientos políticos, ha surgido una iniciativa local desde la base que se enfoca en los problemas de Cascadia y en lo que significa tener ideas e ideales cascadianos. Esta serie de movimientos sin influencia externa ya ha calado fuerte mientras avanzamos hacia la conclusión electoral."
 CAS_focus_victory_for_a_greater_cascadia: "Victoria para una Gran Cascadia"
 CAS_focus_victory_for_a_greater_cascadia_desc: "Los Patriotas por Cascadia se hicieron oír al asegurar la victoria de nuestra grande y noble nación. Ahora tenemos los medios para forjar un camino de grandeza para nuestro pueblo, nuestros ideales y nuestra propia identidad nacional."
 CAS_focus_national_security_act: "Ley de Seguridad Nacional"
 CAS_focus_national_security_act_desc: "Nuestra seguridad nacional es el vehículo principal para la protección de nuestros ciudadanos, ya sea el ejército o la policía, garantizaremos la seguridad de nuestros ciudadanos a toda costa."
 CAS_focus_innovation_station_act: "Ley de la Estación de Innovación"
 CAS_focus_innovation_station_act_desc: "La Estación de Innovación es un complejo de investigación dedicado a un montón de proyectos de I+D. Van desde defensa hasta métodos de producción de energía y uso y extracción de recursos. Al final, este complejo aumentará nuestra capacidad para defender la nación y alcanzar las glorias que buscamos."
 CAS_focus_all_roads_lead_to_olympia: "Todos los caminos conducen a Olimpia"
 CAS_focus_all_roads_lead_to_olympia_desc: "Así como en Europa todos los caminos llevan a Roma, nosotros haremos que todos los caminos en el Nuevo Mundo lleven a Olympia. Porque será Olympia la luz central que encienda la libertad y la pasión que nuestra gente anhela. Ahí se crearán empleos, comida, hogares y vidas, y garantizaremos que esto sea una realidad para que todos lo vean."
 CAS_focus_interstate_revitalization_act: "Ley de Revitalización Interestatal"
 CAS_focus_interstate_revitalization_act_desc: "La ley de revitalización hará que nuestra nación esté más conectada y que las cadenas de suministro sean más eficientes. Esto es gracias a que transportar bienes, materiales y personas será más efectivo, lo que dará un impulso general a la producción."
 CAS_focus_domestic_armaments_industry: "Industria armamentística nacional"
 CAS_focus_domestic_armaments_industry_desc: "Para defender a nuestra nación, necesitamos abastecer a nuestras fuerzas armadas. Por lo tanto, el establecimiento de una industria armamentística nacional es fundamental para lograr este objetivo."
 CAS_focus_domestic_naval_yards: "Astillero naval nacional"
 CAS_focus_domestic_naval_yards_desc: "Defenderemos nuestras aguas, contamos con el poder naval para hacerlo, pero mantener esa fuerza requiere hombres, materiales e instalaciones. Por lo tanto, garantizaremos la creación y asignación de dichos recursos para asegurar la defensa de nuestras aguas y costas."
 CAS_focus_army_expansion_act: "Ley de Expansión del Ejército"
 CAS_focus_army_expansion_act_desc: "Nuestro ejército es la principal defensa terrestre con la que contamos para garantizar la defensa de nuestra nación y el logro de nuestros objetivos. Debemos centrarnos en ampliarlo si queremos considerar seriamente objetivos más allá de nuestras fronteras en el futuro."
 CAS_focus_naval_expansion_act: "Ley de Expansión Naval"
 CAS_focus_naval_expansion_act_desc: "La NEA es una ampliación presupuestaria específica destinada a ampliar las capacidades y los recursos dedicados a nuestras fuerzas navales. Las inversiones se utilizarán para desarrollar y perfeccionar las capacidades existentes, así como para mejorar la formación y las instalaciones con el fin de mejorar la calidad general de nuestra armada permanente."
 CAS_focus_militarization_of_the_budget: "Militarización del presupuesto"
 CAS_focus_militarization_of_the_budget_desc: "Mediante el ajuste del presupuesto y los métodos de recaudación de impuestos, podemos establecer un superávit presupuestario dedicado al ejército para asignarlo a las fuerzas armadas. Este presupuesto se utiliza para aumentar el personal permanente en todas las ramas, así como para trabajar en mejoras generales para cada rama del servicio."
 CAS_focus_in_the_business_of_victory: "En el negocio de la victoria"
 CAS_focus_in_the_business_of_victory_desc: "Los votantes han hablado y las empresas han ganado las elecciones. Y, tal y como reza nuestro eslogan, «Boise Business is Your Business» (Los negocios de Boise son tus negocios). Este eslogan cobrará sentido a medida que nos centremos en la economía y nos aseguremos de que nuestra nación y su gente reciban un buen servicio. No se trata de revitalizar el antiguo sueño americano, sino la «claridad en cascada», que es el derecho de los habitantes de Cascadia a disfrutar de la vida en sí, tanto en lo grande como en lo pequeño."
 CAS_focus_reforming_tax_breaks: "Reforma de las exenciones fiscales"
 CAS_focus_reforming_tax_breaks_desc: "Reformar las exenciones fiscales para que incentiven más la inversión propia y el crecimiento de las empresas, en lugar de limitarse a embolsarse las ganancias de capital excedentes, nos permitirá crear un entorno empresarial fluido y competitivo que fomente las inversiones locales y, con suerte, las extranjeras en el futuro."
 CAS_focus_refining_regulatory_blocks: "Refinamiento de los bloques normativos"
 CAS_focus_refining_regulatory_blocks_desc: "Cambiar y adaptar los obstáculos normativos para suavizar los baches y los golpes laterales, con el fin de crear un entorno más cohesionado y propicio para la iniciativa, que permita generar nuevos desarrollos y demás. Con esto en mente, podremos obtener más beneficios y lo único en lo que tendríamos que invertir seriamente sería en la seguridad de los emplazamientos y demás, a través de las fuerzas del orden locales y demás."
 CAS_focus_oregon_petrochemicals: "Petroquímicos de Oregón"
 CAS_focus_oregon_petrochemicals_desc: "Las inversiones en la expansión y mejora de la industria petroquímica de Oregón nos permitirán garantizar una amplia gama de necesidades energéticas y domésticas en términos de plásticos y los productos que este sector económico puede proporcionar."
 CAS_focus_aspen_construction_contracting: "Contratación de obras en Aspen"
 CAS_focus_aspen_construction_contracting_desc: "Aspen Construction es una importante empresa constructora del estado de Idaho. Debemos ganarnos su favor y utilizarlo para contratarles para construir nuevas promociones y, a cambio, podemos darles acceso a terrenos para la extracción de minerales y relajar algunas normativas para que todo este proceso sea más sencillo."
 CAS_focus_capital_computing_corporation: "Capital Computing Corporation"
 CAS_focus_capital_computing_corporation_desc: "La CCC es una empresa emergente dedicada a la informática y la tecnología que recientemente ha destacado por crear diversos puestos de trabajo y aportar conocimientos técnicos a estos campos, tanto en el ámbito económico como en el académico. Debemos invertir en su expansión y ayudar apoyando a las plantas metalúrgicas locales para que los materiales de construcción de los rascacielos sean más baratos y las necesidades de desarrollo futuro sean más sostenibles a largo plazo."
 CAS_focus_communicate_cascadia: "Comunicar Cascadia LLC"
 CAS_focus_communicate_cascadia_desc: "Communicate Cascadia era una empresa de telemarketing e Internet que comenzó su andadura en la zona del estado de Washington. Con el paso del tiempo y el aumento de la demanda local de servicios de Internet, telefonía móvil y fija, la empresa ha crecido hasta alcanzar una dimensión nacional que ha beneficiado a todo nuestro país. Ayudarles a expandirse y ofrecer una mayor cobertura y más servicios a nuestra población mejorará aún más la vida cotidiana de los ciudadanos."
 CAS_focus_policing_expansions_act: "Ley de Expansión Policial"
 CAS_focus_policing_expansions_act_desc: "La Ley de Ampliación de la Policía, o Ley Police Plus, como algunos la han denominado, es un proyecto de ley presupuestario y de reforma que aumenta tanto los organismos policiales estatales como locales, además de otorgar algunas competencias muy limitadas a los organismos de seguridad. Esto, sumado a un paquete de gastos para iniciativas de I+D, nos permitirá poner a prueba estas nuevas iniciativas policiales y su eficacia si también creamos zonas objetivo de alto valor para atraer a los explotadores nacionales y extranjeros y que actúen contra ellas."
 CAS_focus_rocky_mountain_flatlands_act: "Ley de las Llanuras de las Montañas Rocosas"
 CAS_focus_rocky_mountain_flatlands_act_desc: "Las necesidades nacionales de nuevos recursos son de vital importancia para la seguridad nacional. Para evitar nuestra futura dependencia de fuentes extranjeras como principal proveedor de estos recursos, permitiremos más expansiones mineras específicas, incluso en torno a las propias Montañas Rocosas. Si bien es cierto que las Montañas Rocosas son un hito distintivo de la naturaleza, nuestras necesidades nacionales superan el grito pseudomoralista de la \"verdadera preservación\" de estas cosas que ocupan hectáreas y hectáreas de tierra."
 CAS_focus_future_investments_act: "Ley de Inversiones Futuras"
 CAS_focus_future_investments_act_desc: "Un negocio feliz es un negocio rentable, y unos trabajadores felices hacen que un negocio sea feliz y genere buenos beneficios. Debemos invertir en el bienestar y la atención médica de nuestros trabajadores, tanto actuales como futuros, si queremos garantizar una base económica sólida y en crecimiento para nuestra nación."
 CAS_focus_liberty_victorious: "Libertad victoriosa"
 CAS_focus_liberty_victorious_desc: "El pueblo ha ejercido su derecho al voto, y la libertad y la autosuficiencia han triunfado. Ahora moldearemos el gobierno nacional como una figura paternal, que guíe y ayude cuando sea necesario, pero que permita a sus hijos, es decir, a los ciudadanos de nuestra nación, atender sus propias necesidades, pues saben lo que necesitan."
 CAS_focus_yellow_ribbon_care: "Cuidado de la cinta amarilla"
 CAS_focus_yellow_ribbon_care_desc: "Garantizar el bienestar de nuestros ciudadanos es importante, y para ello debemos fomentar la innovación médica y el deseo de cuidarse mutuamente. Sutiles recortes fiscales y una mayor inversión personal en instalaciones médicas e investigación permitirán que las generaciones futuras puedan realmente cuidarse mutuamente."
 CAS_focus_self_sustainment_act: "La Ley de Autosuficiencia"
 CAS_focus_self_sustainment_act_desc: "Las personas necesitan aprender no solo a cuidar de los demás, sino también a cuidarse a sí mismas. Para ello, debemos fomentar cualquier medio que permita a alguien ganarse la vida de forma legal y sostenible. Por ello, la inversión en educación para brindar más conocimiento y exposición a las generaciones actuales y futuras será fundamental."
 CAS_focus_retirement_earnings_act: "Ley de Ingresos por Jubilación"
 CAS_focus_retirement_earnings_act_desc: "Cuando trabajas toda tu vida, tienes derecho a un descanso en tus últimos años. Por ello, las reformas al sistema de la Seguridad Social lo tratarán como un plan 401k a nivel nacional. Claro que puedes tener tu plan 401k relacionado con el empleo; sin embargo, tus impuestos de la Seguridad Social ahora se depositarán en una especie de cuenta bancaria separada a través de la red tributaria asociada con tus declaraciones y presentaciones. Así, cada año que presentes tu declaración, podrás ver lo que has aportado y la cantidad que has acumulado a lo largo de los años."
 CAS_focus_reindustrialization_act: "Ley de Reindustrialización"
 CAS_focus_reindustrialization_act_desc: "Las industrias pesadas y ligeras han abandonado nuestra zona del continente, y la mayor parte se ha trasladado a otras partes o al extranjero. Sin embargo, ahora tenemos la capacidad de recuperar y consolidar una noción de industrialización en nuestra justa nación. Las inversiones nacionales, mediante ferias de empleo y proyectos públicos y privados, nos permitirán a nosotros y a nuestra nación retomar el trabajo."
 CAS_focus_securing_tomorrows_meal: "Garantizar la Comida del Mañana"
 CAS_focus_securing_tomorrows_meal_desc: "El mañana nunca está realmente prometido, y con ello al menos cumpliremos una promesa: la próxima comida. La seguridad alimentaria nacional es una métrica novedosa pero importante para una sociedad estable, y por ello invertiremos en proyectos agrícolas y en más maneras de crear un excedente alimentario sustancial."
 CAS_focus_limiting_central_banking_authority: "Limitación de la Autoridad Bancaria Central"
 CAS_focus_limiting_central_banking_authority_desc: "La banca central, si bien no es intrínsecamente mala, puede ser susceptible a una de las formas más sutiles de abuso: el control de las tasas de interés relacionadas con funciones nacionales como préstamos, hipotecas, etc. Retiraremos su autoridad directa sobre este tema y volveremos a regular el proceso para delegarlo a más sucursales e instituciones locales, con estipulaciones sobre un límite de garantía y condiciones de cambio dentro de un contrato que se pueda tener con dichas instituciones."
 CAS_focus_reducing_tax_burdens: "Reducción de la Carga Fiscal"
 CAS_focus_reducing_tax_burdens_desc: "Reducir las prácticas más meticulosas del código tributario permite a las personas ahorrar mejor y disponer de más recursos propios para hacer lo que quieran. Esta seguridad fiscal permitirá a quienes tengan los medios ahorrar e invertirlos de una forma u otra. El objetivo general es estimular el gasto y la inversión internos para, en esencia, recuperar lo recortado. Aunque quizás no sea mucho, será más que suficiente para asegurar la confianza pública en nuestras capacidades."
 CAS_focus_energy_highways: "Autopistas Energéticas"
 CAS_focus_energy_highways_desc: "El terreno de nuestro país es uno de los más difíciles de desarrollar, con todas las cordilleras y demás que lo atraviesan. Por lo tanto, debemos crear autopistas energéticas para que la seguridad energética y la conectividad nacional en general sean más eficientes y, en principio, más seguras. Estas, obviamente, se convertirían en objetivos enemigos, pero con esa expectativa en mente, podemos usarlas como cebo principal si llega el momento decisivo."
 CAS_focus_expanded_r_and_d_investments: "Inversiones Ampliadas en I+D"
 CAS_focus_expanded_r_and_d_investments_desc: "La innovación y la investigación son la clave para mantenernos a la vanguardia y resolver problemas reales de forma significativa. Invertiremos más en iniciativas públicas y privadas para ampliar nuestra capacidad general de investigación y desarrollo, con la esperanza de generar un impacto positivo neto a largo plazo en múltiples aspectos de nuestra nación y la sociedad en su conjunto."
 CAS_focus_the_robin_flies_to_victory: "El Robin Vuela hacia la Victoria"
 CAS_focus_the_robin_flies_to_victory_desc: "Justicia, igualdad y equidad. Estos son los tres pilares sobre los que se asienta nuestra economía, por los cuales nos esforzaremos en ayudar a todos. Porque esta es una nación para todos, no para uno solo."
 CAS_focus_pro_labor_regulations: "Regulaciones Pro-Trabajadores"
 CAS_focus_pro_labor_regulations_desc: "El trabajador manual y las ramas modernas de la economía laboral son la columna vertebral de nuestra funcionalidad económica. Debemos apoyarlos y asegurarnos de que reciban la atención adecuada y efectiva. Al fin y al cabo, los trabajadores felices son más productivos y eficaces."
 CAS_focus_agrarian_influences: "Influencias Agrarias"
 CAS_focus_agrarian_influences_desc: "Un suministro estable de alimentos es fundamental para garantizar la estabilidad social y la cohesión entre trabajadores y empleadores. Implementaremos inversiones proagrícolas limitadas para mantener este equilibrio y, si es posible, quizá utilicemos parte del excedente para invertir en biocombustibles. No es mucho, pero dicen que es un trabajo honesto."
 CAS_focus_olympian_technical_institute: "Instituto Técnico Olímpico"
 CAS_focus_olympian_technical_institute_desc: "La OTI es una instalación de educación e investigación y desarrollo patrocinada por el gobierno federal para ayudar al interés nacional en términos de innovación y fomentar más oportunidades de educación para las generaciones futuras."
 CAS_focus_soldiering_workers_act: "Ley de Trabajadores Militarizados"
 CAS_focus_soldiering_workers_act_desc: "Cada trabajador, un soldado. Estas palabras representan la encarnación de que quienes luchan pueden trabajar y quienes trabajan pueden luchar. La intercambiabilidad de estas vidas se basa en el principio de que ambos defienden la estabilidad de la sociedad, tanto militar como económicamente. Instituiremos un programa de voluntariado de un año de servicio para que los trabajadores de nuestra nación se capaciten en el manejo y operación de armas de fuego, lo que les permitirá defender a sus familias, sus hogares y nuestra forma de vida."
 CAS_focus_streamlining_tax_codes_and_enforcement: "Simplificación de Códigos Tributarios y Fiscalización"
 CAS_focus_streamlining_tax_codes_and_enforcement_desc: "La estandarización de los códigos tributarios y su aplicación permitirá a ciudadanos y empresas comprender, adaptar y aumentar mejor su patrimonio personal o empresarial, así como su valor total. Se espera que la facilidad de comprensión y recaudación genere mayores ingresos con el tiempo y nos permita utilizarlos para invertir más en nuestros ciudadanos y nuestra economía."
 CAS_focus_mineral_rights_expansion: "Expansión de Derechos Mineros"
 CAS_focus_mineral_rights_expansion_desc: "La idea de los derechos mineros y la capacidad de reclamar tierras para la extracción de recursos naturales es una práctica bastante común. Debemos ampliar estos derechos para alentar a los ciudadanos locales a crear nuevas empresas y patrocinarlas para expandir la riqueza mineral de nuestra nación. Podemos usar esto para fortalecer nuestra independencia económica a medida que continuamos expandiendo el comercio más allá de nuestras fronteras."
 CAS_focus_national_labor_corps: "Cuerpo Nacional de Trabajo"
 CAS_focus_national_labor_corps_desc: "El NLC es una iniciativa gubernamental para garantizar que quienes buscan o necesitan empleo puedan conseguirlo. Utilizando un modelo similar al de las agencias laborales del New Deal, planeamos que quienes lo necesiten contribuyan a mantener y construir infraestructura y desarrollo económico que garanticen la estabilidad de nuestra economía en su conjunto. Recuerden: trabajar sin divertirse puede convertir a Johnny en un niño aburrido, pero jugar sin trabajar lo dejará en la miseria."
 CAS_focus_expanding_energy_production_capabilities: "Expansión de Capacidades de Producción Energética"
 CAS_focus_expanding_energy_production_capabilities_desc: "La Ley EEPC destina fondos a la creación de nuevas instalaciones para generar energía y aumentar la potencia de la red eléctrica nacional, así como nuestras crecientes necesidades como sociedad. Si bien es una solución a corto plazo, deberíamos considerar aprovechar al máximo lo que ya hemos construido debido a la escasez de terrenos."
 CAS_focus_cascadian_family_program: "Programa Familiar Cascadiano"
 CAS_focus_cascadian_family_program_desc: "El CFP se dedica a ayudar a las familias, tanto embarazadas como ya embarazadas, en todo el país para garantizar que los primeros años y el desarrollo de los jóvenes no se vean afectados por las dificultades económicas y de otro tipo que conlleva la vida. El CFP se esfuerza por hacer que estos años sean un poco más fáciles para toda la familia, proporcionando información útil y suministros limitados, o ayuda económica cuando se necesite y se solicite. No siempre se trata solo de los niños; a veces, los padres necesitan tanta atención o incluso más que los hijos que traen al mundo."
 CAS_focus_nationalist_fever_rises: "Aumento del Nacionalismo"
 CAS_focus_nationalist_fever_rises_desc: "A medida que avanzan las elecciones y la gente empieza a expresar sus verdaderas necesidades y deseos, observamos una tendencia hacia puntos de vista y valores más nacionalistas. Si bien algunos moderados y personas indecisas están preocupados, entendemos que el mundo es difícil y que tal vez haya algo de cierto en todo este calvario."
 CAS_focus_victory_for_strength: "Victoria por la Fuerza"
 CAS_focus_victory_for_strength_desc: "El pueblo habla y grita pidiendo fuerza, anhela unidad y como tal hemos tomado las riendas de la victoria y le daremos al pueblo exactamente lo que quiere."
 CAS_focus_family_promotion_programs: "Programas de Promoción Familiar"
 CAS_focus_family_promotion_programs_desc: "El fracaso de la antigua república radica en que dependía de la inmigración para el crecimiento demográfico y, por ende, de la economía. No repetiremos este error. Mediante la creación de programas de asistencia familiar, podemos ayudar a las nuevas familias a disfrutar de la vida sin las cargas de las dificultades económicas ni el estrés."
 CAS_focus_automation_developments_act: "Ley de Desarrollo de Automatización"
 CAS_focus_automation_developments_act_desc: "La ADA es un paquete de financiación y presupuesto para desarrollar e impulsar las iniciativas de automatización de nuestro país. Junto con los nuevos FPP, necesitamos mejorar nuestra educación y la productividad general para compensar la posible disminución de nuestra fuerza laboral, a la vez que buscamos un posible aumento de la fuerza laboral futura."
 CAS_focus_national_diversity_act: "Ley de Diversidad Nacional"
 CAS_focus_national_diversity_act_desc: "La Ley de Diversidad Nacional es un paquete de desarrollo económico que se utilizará para hacer crecer la base económica de nuestra nación, así como para diversificar lo que realmente compone dicha base."
 CAS_focus_energy_investments: "Inversiones Energéticas"
 CAS_focus_energy_investments_desc: "Las inversiones nacionales en el aumento de nuestra capacidad de producción de energía nos permiten expandir tanto nuestra población como nuestra economía en general."
 CAS_focus_mining_expansion_act: "Ley de Expansión Minera"
 CAS_focus_mining_expansion_act_desc: "Esta legislación se utilizará para financiar nuevas técnicas de extracción y purificación con el fin de ayudar a ampliar los rendimientos de los sitios mineros seleccionados."
 CAS_focus_military_industrial_investments: "Inversiones en la Industria Militar"
 CAS_focus_military_industrial_investments_desc: "Al ampliar nuestra base industrial militar, podemos asegurar la independencia de nuestra nación de los enemigos extranjeros que desean hacerle daño a nuestros pueblos."
 CAS_focus_future_leaders_program: "Programa de Líderes del Futuro"
 CAS_focus_future_leaders_program_desc: "Al invertir en programas similares a los del JROTC, podemos brindar a las futuras generaciones una experiencia militar, estructura y respeto por sus propias acciones. Si bien podemos usar el programa para ampliar el potencial de preparar a las futuras generaciones para puestos de liderazgo en la fuerza laboral civil, esto también nos beneficia militarmente si surge la necesidad."
 CAS_focus_young_sailors_program: "Programa de Jóvenes Marineros"
 CAS_focus_young_sailors_program_desc: "El Programa de Jóvenes Marineros es similar al FLP, pero se centra en la marina y, en general, en el sector naval y naviero. Esperamos transmitir a las futuras generaciones ese espíritu naval singular pero fuerte. Comprender el origen del transporte marítimo y por qué, incluso hoy en día, es uno de los pilares clave no solo para la seguridad nacional, sino también para el funcionamiento económico de nuestra nación."
 CAS_focus_expanding_military_civilian_joint_programs: "Expansión de Programas Militares y Civiles Conjuntos"
 CAS_focus_expanding_military_civilian_joint_programs_desc: "Al ampliar los programas de empresas conjuntas, podemos beneficiar y seguir transportando a nuestro personal militar en autobús y, al mismo tiempo, mejorar ciertos aspectos de nuestra economía en tiempos de paz."
 CAS_focus_the_scarlet_brigade_marches_to_victory: "La Brigada Escarlata Marcha hacia la Victoria"
 CAS_focus_the_scarlet_brigade_marches_to_victory_desc: "El orgullo nacional, la autodeterminación y el respeto propio frente a la intromisión extranjera son los reclamos que el pueblo ha reclamado. Con esto, avanzamos hacia la victoria y aseguraremos la autosuficiencia nacional para satisfacer nuestras propias necesidades, las de nuestro pueblo y la protección contra la ira y las influencias extranjeras."
 CAS_focus_penal_labor_corps: "Cuerpo de Trabajo Penal"
 CAS_focus_penal_labor_corps_desc: "Hay que aprovechar las aguas residuales de la sociedad o tendremos que encontrar la manera de destaparlas. Por ello, estableceremos un nuevo Cuerpo de Trabajo Penal para ayudar a redimir a quienes quisieron dañar la sociedad. Ahora podrán reparar y mejorar lo que intentaron destruir y corromper."
 CAS_focus_young_cascadians_association: "Asociación de Jóvenes Cascadianos"
 CAS_focus_young_cascadians_association_desc: "La YCA es una liga juvenil que busca inculcar el orgullo y el deber nacional en las futuras generaciones de Cascadia. Esta liga ayudará a impartir lecciones de disciplina, liderazgo y autoestima, tanto a militares como a civiles, independientemente de sus decisiones."
 CAS_focus_cascadian_defense_phase_one: "Fase Uno de Defensa Cascadiana"
 CAS_focus_cascadian_defense_phase_one_desc: "El CDP, o Plan de Defensa Cascadiano, consiste en la militarización de la nación para prepararse preventivamente ante cualquier amenaza externa que pueda azotar nuestra pequeña porción de paraíso. La primera fase consiste en un esfuerzo inicial de industrialización militar para intentar aumentar la producción y así poder mantener la línea si es necesario."
 CAS_focus_homefront_is_still_a_front: "La Retaguardia Sigue Siendo un Frente"
 CAS_focus_homefront_is_still_a_front_desc: "Para poder luchar en primera línea, primero hay que comprender lo que significa luchar en el frente interno. Por ello, aumentaremos las necesidades industriales nacionales e invertiremos en iniciativas de investigación para equipar mejor a nuestra población civil en caso de una guerra que se considere demasiado larga."
 CAS_focus_cascadian_defense_phase_two: "Fase Dos de Defensa Cascadiana"
 CAS_focus_cascadian_defense_phase_two_desc: "La segunda fase del CDP se centrará en la autarquía estratégica. Debemos asegurar ciertos recursos clave que poseemos, y que antes no teníamos, y asegurar que nuestra nación pueda sostenerse en caso de bloqueo."
 CAS_focus_cascadian_defense_phase_three: "Fase Tres de Defensa Cascadiana"
 CAS_focus_cascadian_defense_phase_three_desc: "La tercera fase del CDP consiste en establecer un sólido suministro nacional de alimentos. Ampliaremos nuestro sector agrícola organizado y destinaremos más fondos a la investigación para mejorar la calidad y la cantidad de alimentos producidos en granjas más pequeñas. Al menos, si nos vemos envueltos en un posible bloqueo, sobreviviremos un poco más gracias a nuestra visión de futuro."
 CAS_focus_peace_time_lottery_conscription: "Conscripción por Sorteo en Tiempo de Paz"
 CAS_focus_peace_time_lottery_conscription_desc: "El PTL es un programa nacional de reclutamiento obligatorio que rota aleatoriamente un grupo de edad determinado y parte del año de cumpleaños para asegurar que nuestra población se acostumbre al posible servicio militar. Este período dura solo de 4 a 6 meses y no se limita estrictamente a las enseñanzas de combate de infantería."
 CAS_focus_improving_military_logistical_needs: "Mejora de Necesidades Logísticas Militares"
 CAS_focus_improving_military_logistical_needs_desc: "Al invertir en infraestructura logística y en cadenas de suministro, podemos mejorar la capacidad de supervivencia y la calidad general de nuestras fuerzas militares."
 CAS_focus_the_first_of_many_victories: "La Primera de Muchas Victorias"
 CAS_focus_the_first_of_many_victories_desc: "El pueblo desea defender y proteger a sus amigos, familias y sus propios medios de vida. Por ello, parece que la subfacción política del ejército ha asegurado la victoria del gobierno nacional. Con esta seguridad, ahora podemos orientar nuestra sociedad y economía al servicio no solo de nuestro pueblo, sino también de nuestras fuerzas militares para garantizar la máxima defensa nacional."
 CAS_focus_promoting_strategic_mining: "Promoción de la Minería Estratégica"
 CAS_focus_promoting_strategic_mining_desc: "Mediante inversiones específicas, podemos expandir y mejorar la extracción de materias primas estratégicamente importantes. Nuestro objetivo de mejorar nuestra posición global sin depender excesivamente de recursos extranjeros se hará realidad."
 CAS_focus_national_economics: "Economía Nacional"
 CAS_focus_national_economics_desc: "Mediante amplias inversiones en nuevos desarrollos económicos, podemos impulsar nuestra economía nacional y lograr que la gente trabaje para mantenerse. Esto contribuirá a impulsar el desarrollo general. Por otro lado, esperamos capitalizar esto y contar con una base económica lo suficientemente sólida como para retribuir a quienes contribuyen con la misma contribución."
 CAS_focus_establishing_defense_industry: "Establecimiento de Nuestra Industria de Defensa"
 CAS_focus_establishing_defense_industry_desc: "Para asegurar la independencia de nuestra nación de la intromisión extranjera, debemos asegurar un complejo militar-industrial de algún tipo. Por ello, iniciaremos una inversión nacional para crearlo."
 CAS_focus_setting_up_mandatory_conscription: "Establecimiento del Servicio Militar Obligatorio"
 CAS_focus_setting_up_mandatory_conscription_desc: "Para preparar a nuestra nación de forma preventiva ante cualquier agresión, ya sea nuestra o del enemigo, necesitamos asegurarnos de que nuestra fuerza de trabajo sea estable y mayor de lo previsto. Por ello, un período de reclutamiento obligatorio de seis meses nos permitirá proteger nuestros intereses nacionales en cualquier circunstancia."
 CAS_focus_automation_conscription_act: "Ley de Conscripción de Automatización"
 CAS_focus_automation_conscription_act_desc: "La ley ACA es un paquete de gastos destinado a automatizar al máximo ciertas industrias. A cambio, la fuerza laboral despedida sería reclutada. Sin embargo, los nuevos soldados \"reclutados forzosamente\" podrían buscar más puestos de reserva, como puestos de suministro, comunicaciones o administración, si así lo desearan."
 CAS_focus_general_military_investments: "Inversiones Militares Generales"
 CAS_focus_general_military_investments_desc: "El GMI es un paquete de gastos dedicado a mejorar, en general, las capacidades de nuestras fuerzas armadas. Por lo tanto, la financiación se destinará adicionalmente a mejorar el entrenamiento del Estado Mayor y el cuerpo de oficiales. Esto permitirá a nuestra nación innovar y mejorar sus fuerzas a largo plazo, así como las ganancias iniciales de estas inversiones a corto plazo."
 CAS_focus_army_funding_improvements: "Mejora de Financiamiento del Ejército"
 CAS_focus_army_funding_improvements_desc: "Al aumentar nuestra financiación al ejército, podemos mejorar los cursos de formación que ayudarán a mejorar las capacidades de combate de nuestro personal de servicio militar."
 CAS_focus_naval_funding: "Financiamiento Naval"
 CAS_focus_naval_funding_desc: "Aumentar nuestra financiación naval dedicada nos permite mejorar los sistemas de armas y los cursos de entrenamiento para que nuestros buques de guerra puedan mejorar su capacidad de supervivencia y su destreza en combate."
 CAS_focus_air_force_investments: "Inversiones en la Fuerza Aérea"
 CAS_focus_air_force_investments_desc: "La financiación general de la Fuerza Aérea nos permite mejorar las aeronaves existentes, así como optimizar el entrenamiento de nuevos pilotos. En consecuencia, podemos invertir en iniciativas limitadas de I+D para mejorar la capacidad de supervivencia, tanto ofensiva como defensiva, y así reforzar el poder de combate de nuestra Fuerza Aérea."
 CAS_focus_modern_victory_for_old_ideas: "Victoria Moderna para Ideas Antiguas"
 CAS_focus_modern_victory_for_old_ideas_desc: "La casa siempre gana, y en este caso es cierto. El movimiento monárquico moderno, conocido como la Casa de Olimpia, ha conseguido la victoria en las elecciones. Preparando el terreno para la creación de una monarquía electiva moderna, donde la organización gubernamental democrática se mantiene igual, pero simplemente se cambian los nombres de los cargos superficialmente para que coincidan con los antiguos títulos feudales. Ahora mamá y papá no te mentirán sobre convertirse en príncipe o princesa."
 CAS_focus_modernizing_nobility_act: "Ley de Modernización de la Nobleza"
 CAS_focus_modernizing_nobility_act_desc: "Para establecer una monarquía moderna, primero debemos redefinir qué es la nobleza, ya que el sentido tradicional de la institución es, en el mejor de los casos, bastante complejo. Por ello, la nobleza cascádica será un sistema escalonado de títulos obtenibles. Los títulos principales estarán asociados a los respectivos cargos electivos. Sin embargo, cada estrato social también tendrá un esquema de cómo obtener su propio título nobiliario."
 CAS_focus_reorganizing_traditional_military_ranks: "Reorganización de Rangos Militares Tradicionales"
 CAS_focus_reorganizing_traditional_military_ranks_desc: "Los ejércitos modernos son una mezcla de organizaciones centradas en unidades grandes y pequeñas. Sin embargo, ¿qué pasaría si ampliáramos y reorganizáramos la estructura de rangos para lograr un aumento general en los tipos de unidades y la escala de tamaño? Esto probablemente requerirá un aumento en el número de suboficiales, así como en el de oficiales regulares, lo que fomentará un reclutamiento más dinámico para los diferentes niveles de liderazgo."
 CAS_focus_the_new_nation: "La Nueva Nación"
 CAS_focus_the_new_nation_desc: "Una nueva nación y su gente surgirán de las profundidades de las cenizas de antaño. Ahora somos los Ducados Unificados de Cascadia, somos el pueblo de Cascadia y definiremos nuestros hogares, nuestras familias y nuestro estilo de vida."
 CAS_focus_developing_new_settlements: "Desarrollo de Nuevos Asentamientos"
 CAS_focus_developing_new_settlements_desc: "Al crear nuevos asentamientos y economías locales, podemos distribuir mejor nuestra población, lo que nos permitirá estar más descentralizados como nación si el enemigo llega a nuestras costas y suelo."
 CAS_focus_defense_towns: "Ciudades de Defensa"
 CAS_focus_defense_towns_desc: "Apuntar a asentamientos dispersos o insignificantes y alentar a los contratistas de defensa a construir instalaciones, así como a los residentes locales o incluso a otros de la zona a crear nuevos pueblos y posibles ciudades, nos permitirá una logística más dinámica. Estas zonas no tienen un desarrollo real, por lo que las impulsaremos. En otras palabras, construiremos y ellos vendrán."
 CAS_focus_cascade_redoubts: "Reductos de las Cascadas"
 CAS_focus_cascade_redoubts_desc: "La creación de reductos estratégicos en las montañas nos permitirá crear posibles líneas de repliegue, así como incentivar el desarrollo económico y de infraestructura para ayudar a liderar estas nuevas áreas de construcción militar."
 CAS_focus_green_mountain_guards: "Guardias de la Montaña Verde"
 CAS_focus_green_mountain_guards_desc: "Una versión similar al sistema de la Guardia Nacional, pero estos efectivos a tiempo parcial están dirigidos a quienes se retiran del servicio activo y desean seguir siendo miembros activos del servicio. Por lo tanto, la rama de servicio de la Guardia Nacional General (GMG) es una subrama del Estado Mayor General y puede estar compuesta por unidades de las tres ramas principales del servicio, siempre que sea posible."
 CAS_focus_expanding_military_industries: "Expansión de Industrias Militares"
 CAS_focus_expanding_military_industries_desc: "Al ampliar nuestra base industrial militar, podemos aumentar nuestras capacidades defensivas y, si es necesario, ofensivas como nación."
 CAS_focus_cascadian_power: "Poder Cascadiano"
 CAS_focus_cascadian_power_desc: "Mediante inversiones estratégicas en nuevas instalaciones, así como en la logística y los medios para obtener, generar y utilizar nuestra energía, podemos expandir nuestra red energética para contribuir a una mejora general tanto de la economía como de la calidad de vida de los ciudadanos."
 CAS_focus_cascadian_economy: "La Economía Cascadiana"
 CAS_focus_cascadian_economy_desc: "Ahora que más o menos tenemos la cabeza sobre nuestros hombros, podemos empezar a reconstruir nuestra economía nacional y solucionar los principales problemas que afectan a nuestra sociedad."
 CAS_focus_strategic_autarky_economy: "Plan de Economía de Autarquía Estratégica"
 CAS_focus_strategic_autarky_economy_desc: "El SAEP será una revitalización integral de nuestra economía y su funcionamiento, financiada a nivel nacional. Si bien aún faltan algunos detalles, en resumen, queremos confiar más en nosotros mismos en general, en lugar de renovar nuestro compromiso con la economía global integrada."
 CAS_focus_creating_a_real_agricultural_sector: "Creación de un Sector Agrícola Real"
 CAS_focus_creating_a_real_agricultural_sector_desc: "Las onduladas colinas y cordilleras implican que no disponemos de mucha tierra directamente cultivable para desarrollar. Tendremos que considerar seriamente cómo desarrollamos nuestra agricultura si realmente queremos intentar sostener un crecimiento poblacional significativo."
 CAS_focus_experimental_idaho_farms: "Granjas Experimentales de Idaho"
 CAS_focus_experimental_idaho_farms_desc: "Las tierras del estado de Idaho son más aptas para la minería y otros desarrollos. Por lo tanto, las tierras agrícolas existentes en el estado deben orientarse hacia la innovación y la eficiencia siempre que sea posible. Así, la agricultura de Idaho será la rama experimental de la agricultura de nuestro país. Claro que seguirá produciendo lo que pueda y donde pueda, pero si queremos alcanzar algún tipo de autosuficiencia, necesitamos una importante inversión en I+D para fortalecer lo que ya tenemos."
 CAS_focus_washington_pasture_products_and_more: "Productos de Pastoreo de Washington y Más"
 CAS_focus_washington_pasture_products_and_more_desc: "El desarrollo de productos de pastoreo general también nos permite experimentar con combustibles alternativos. El etanol es una fuente bastante común para limitar el uso directo de gasolina. Sin embargo, si logramos expandir su uso para que sea más predominante sin ser tan dañino para los componentes del motor, podremos ampliar aún más nuestro impacto agrícola y científico en la autosuficiencia."
 CAS_focus_oregon_vertical_farming_techniques: "Técnicas de Agricultura Vertical de Oregón"
 CAS_focus_oregon_vertical_farming_techniques_desc: "Impulsando los avances en la agricultura vertical, podemos diversificar y expandir los alimentos que se cultivan en estas instalaciones. Además, estas granjas contribuirán a mejorar los servicios médicos y los programas de bienestar social, proporcionando una nutrición adecuada y abundante a quienes la necesitan."
 CAS_focus_mountain_agriculture_planning: "Planificación Agrícola de Montaña"
 CAS_focus_mountain_agriculture_planning_desc: "El MAP es la culminación de nuestro arduo trabajo. Gracias a un gran esfuerzo, tanto fiscal como de investigación, ahora podemos crear un sector agrícola que no dependa exclusivamente de un terreno específico. Claro que no es perfecto, pero es suficiente para sustentar adecuadamente a nuestra creciente población."
 CAS_focus_civilian_centric_economics: "Economía Centrada en Civiles"
 CAS_focus_civilian_centric_economics_desc: "El CCE es una dirección nacional dedicada al desarrollo económico del país. En resumen, el objetivo es centrarse en empleos centrados en la vida civil, en lugar de empleos militares. En otras palabras, una economía más tradicional y diversificada, en lugar de una que se espera de una posible conquista de los territorios vecinos."
 CAS_focus_home_grown_tech: "Tecnología de Cultivo Local"
 CAS_focus_home_grown_tech_desc: "Al establecer las bases para un sector tecnológico, podemos ampliar nuestras capacidades de I+D y, al mismo tiempo, beneficiar a toda la economía a través de sus innovaciones."
 CAS_focus_societal_workforce_program: "Programa de Fuerza Laboral Social"
 CAS_focus_societal_workforce_program_desc: "El SWP es un programa nacional de empleo y creación de empleo. Este amplio programa utilizará iniciativas de financiación colectiva con asistencia social, atención médica y financiación gubernamental directa para crear empleo y emplear a todas las personas posibles. Su principal objetivo es lograr estabilidad, a la vez que se analizan los impactos a largo plazo en el equilibrio económico nacional."
 CAS_focus_how_high_can_our_sky_rise: "¿Qué Tan Alto Puede Llegar Nuestro Cielo?"
 CAS_focus_how_high_can_our_sky_rise_desc: "El desarrollo general de los sectores de oficinas y corporativos permitirá a nuestros empleados acceder a una amplia gama de empleos tecnológicos y administrativos. Se espera que esto impulse iniciativas de formación continua para toda la población, además de impulsar significativamente nuestro PIB y nuestra riqueza, y compensar los costos de todos estos desarrollos."
 CAS_focus_greater_olympian_development_scheme: "Plan de Desarrollo del Gran Olimpiano"
 CAS_focus_greater_olympian_development_scheme_desc: "GODS es una expansión económica general del área metropolitana de la capital. Esperamos que este centro de poder económico genere un efecto dominó a medida que su influencia se expanda a las ciudades y pueblos circundantes, e incluso a los territorios vecinos que controlamos."
 CAS_focus_industrialize_cascadia: "Industrializar Cascadia"
 CAS_focus_industrialize_cascadia_desc: "Mediante planes generales de desarrollo, podemos impulsar el mercado laboral y la diversidad industrial. Emplear ciudadanos será más fácil que nunca y sentaremos las bases para un crecimiento fluido y beneficioso de nuestra economía nacional."
 CAS_focus_improving_naval_and_shipping_industries: "Mejora de Industrias Navales y de Transporte Marítimo"
 CAS_focus_improving_naval_and_shipping_industries_desc: "Los avances generales en nuestras industrias de carenado marítimo tendrán efectos mayormente beneficiosos a nivel nacional. En primer lugar, impulsamos el crecimiento de nuestra economía en general y la diversificación continua de dicha economía. En segundo lugar, también contribuimos a satisfacer las posibles necesidades militares cuando surjan. Finalmente, si bien el principal problema sería la creación y cobertura de puestos de trabajo en la industria militar, las repercusiones de los nuevos empleos corporativos, civiles o de \"cuello azul\" nos permiten impulsar el crecimiento de todos desde la base."
 CAS_focus_developing_a_domestic_arms_industry: "Desarrollo de una Industria de Armas Doméstica"
 CAS_focus_developing_a_domestic_arms_industry_desc: "Aunque la idea central de una industria armamentística es equipar a una fuerza militar, también existe un buen mercado civil. Los cazadores, las fuerzas del orden y las agencias federales con experiencia en seguridad también necesitan armas para su trabajo. No olvidemos también los medios de defensa personal y del hogar. Esto debería tener beneficios generales, ya que abre más oportunidades de empleo para nuestros ciudadanos."
 CAS_focus_continued_diversification_efforts: "Esfuerzos Continuos de Diversificación"
 CAS_focus_continued_diversification_efforts_desc: "A medida que comenzamos a llegar a la recta final de nuestro programa CCE, debemos priorizar la diversificación económica para que podamos aumentar las oportunidades de empleo para nuestros ciudadanos."
 CAS_focus_a_true_economy: "Una Economía Verdadera"
 CAS_focus_a_true_economy_desc: "Para mantener esta magnífica economía, debemos invertir en su futuro. Ese futuro reside en las personas que consideran Cascadia su hogar, y es en estas mismas personas en quienes invertiremos para que también puedan disfrutar de lo que todos hemos creado."
 CAS_focus_militarized_economy_plan: "Plan de Economía Militarizada"
 CAS_focus_militarized_economy_plan_desc: "Nuestra nación es pequeña y el continente, así como el mundo en general, se ha vuelto un lugar más inestable. Por lo tanto, debemos buscar una solución rápida para resolver el problema económico. La vía más rápida es crear una economía militarizada donde los empleos se centren en la expansión y el crecimiento de las fuerzas armadas. Si bien no es del todo sostenible, ayudaría a impulsar planes de expansión limitados que luego podrían utilizarse para reorganizar genuinamente nuestra economía."
 CAS_focus_cascadian_corps_of_engineers_program: "Programa del Cuerpo de Ingenieros de Cascadia"
 CAS_focus_cascadian_corps_of_engineers_program_desc: "El CCoE es una iniciativa conjunta militar y civil que permite aunar esfuerzos para reconstruir la nación y acelerar el desarrollo. También brinda a los civiles la oportunidad de unirse al ejército sin la preocupación inherente de la muerte."
 CAS_focus_idaho_innovations: "Innovaciones de Idaho"
 CAS_focus_idaho_innovations_desc: "El sector de Idaho incluirá elementos de I+D, así como la producción general de armamento. Esperamos impulsar la demanda local de armas de fuego y dar impulso a la solución del problema del empleo."
 CAS_focus_oregon_armaments: "Armamentos de Oregón"
 CAS_focus_oregon_armaments_desc: "La junta de OA garantizará empleo para el estado de Oregón y ayudará a coordinar el desarrollo local. No será mucho en estas primeras etapas, pero es mejor que nada."
 CAS_focus_washington_war_machines: "Máquinas de Guerra de Washington"
 CAS_focus_washington_war_machines_desc: "Washington, la región capitalina, será responsable de construir nuestras máquinas de guerra más costosas. La esperanza es compensar el empleo e impulsar un mayor desarrollo local a medida que los ciudadanos adquieran salarios, etc."
 CAS_focus_oregon_shipping: "Transporte Marítimo de Oregón"
 CAS_focus_oregon_shipping_desc: "Oregon Shipping Inc. es una empresa multipropósito que satisface las necesidades navales del país, además de impulsar el transporte marítimo comercial y otras industrias relacionadas con el transporte marítimo. La ventaja de los desarrollos navales es que todos pueden obtener una distribución más equitativa de los recursos."
 CAS_focus_washington_naval_industries: "Industrias Navales de Washington"
 CAS_focus_washington_naval_industries_desc: "El desarrollo continuo de Washington nos permite continuar con el crecimiento económico. Lo bueno es que las industrias navales son mucho más universales que las industrias militares estrictamente terrestres."
 CAS_focus_establishing_basic_industries: "Establecimiento de Industrias Básicas"
 CAS_focus_establishing_basic_industries_desc: "A pesar de nuestra apuesta arriesgada, ninguna apuesta está completa sin un plan B. Por lo tanto, realizaremos desarrollos civiles limitados para garantizar que se cumplan los requisitos básicos."
 CAS_focus_establishing_basic_tech_industries: "Establecimiento de Industrias Tecnológicas Básicas"
 CAS_focus_establishing_basic_tech_industries_desc: "Si queremos aprovechar al máximo nuestra economía, debemos invertir en un sector privado que impulse la innovación. El sector tecnológico de cualquier economía suele ser la pequeña proeza de las innovaciones económicas y tecnológicas, así como los avances. Una economía totalmente militarizada no podría generar innovaciones a gran escala, pero si limitamos una pequeña parte, podemos asegurarnos de obtener el paquete completo."
 CAS_focus_an_economy_with_a_state: "Una Economía con un Estado"
 CAS_focus_an_economy_with_a_state_desc: "Ahora que la economía de nuestra nación está prácticamente encaminada, podemos empezar a mirar más allá de nuestro horizonte para asegurar y equilibrar nuestras necesidades y recursos. Hacia un futuro más brillante para todos y hacia un futuro más unido."
 CAS_focus_powering_the_nation: "Energizando a la Nación"
 CAS_focus_powering_the_nation_desc: "Establecer una economía y lograr que la gente vuelva a trabajar está muy bien, pero podemos hacer cualquier cosa si no hay energía para hacer que las cosas funcionen... Bueno, a menos que volvamos a la era del vapor, pero me estoy desviando del tema."
 CAS_focus_bringing_washington_online: "Conectando Washington"
 CAS_focus_bringing_washington_online_desc: "Las inversiones iniciales en infraestructura, así como en nuevas plantas de generación de energía, nos permiten brindar una red eléctrica más equilibrada a la capital, Washington. No es mucho, pero ayudará a reactivar muchos otros servicios públicos, así como la propia economía."
 CAS_focus_bringing_idaho_online: "Conectando Idaho"
 CAS_focus_bringing_idaho_online_desc: "Nuestros continuos esfuerzos por establecer una red eléctrica nacional nos llevan al estado de Idaho. El mayor obstáculo es el paso de las cadenas de las Cascadas y las Montañas Rocosas. Pero al final lograremos estabilizar y fortalecer la infraestructura, lo que ayudará a que todo funcione correctamente."
 CAS_focus_bringing_oregon_online: "Conectando Oregón"
 CAS_focus_bringing_oregon_online_desc: "Continuando con la formalización de la red eléctrica nacional, nos trasladamos al estado de Oregón. La conexión del estado nos permitirá conectarnos con la región capitalina y contribuirá a impulsar todas las actividades nacionales, tanto económicas como de servicios públicos."
 CAS_focus_stabilizing_the_national_grid: "Estabilizando la Red Nacional"
 CAS_focus_stabilizing_the_national_grid_desc: "Gracias a nuestros esfuerzos concentrados, hemos logrado poner en funcionamiento una red nacional conectada a prácticamente todo lo que la necesita. Claro que no es perfecta y no estamos seguros de las necesidades futuras. Sin embargo, tenemos la base para impulsar nuestra economía, cuidar de nuestros ciudadanos y funcionar como una sociedad moderna."
 CAS_focus_raising_the_northern_pacific_flag: "Izando la Bandera del Pacífico Norte"
 CAS_focus_raising_the_northern_pacific_flag_desc: "Al restablecer el Ferrocarril del Pacífico Norte, podemos asegurar el futuro de la red ferroviaria de nuestra nación."
 CAS_focus_northern_pacific_southern_route: "Ruta Sur del Pacífico Norte"
 CAS_focus_northern_pacific_southern_route_desc: "Al crear una ruta sureña exclusiva desde Salem y Eugene, Oregón, hasta Boise, Idaho, podemos consolidar una nueva forma de conectar mejor a nuestra nación y sus ciudadanos."
 CAS_focus_northern_pacific_rocky_mountain_route: "Ruta de las Montañas Rocosas del Pacífico Norte"
 CAS_focus_northern_pacific_rocky_mountain_route_desc: "Al conectar Boise, la capital del estado de Idaho, con Spokane, Washington, ahora podemos crear una importante red de suministro y logística para poner en funcionamiento nuestra economía nacional."
 CAS_focus_northern_pacific_beyond_boise_route: "Ruta Más Allá de Boise del Pacífico Norte"
 CAS_focus_northern_pacific_beyond_boise_route_desc: "Al establecer conexiones ferroviarias con los asentamientos más alejados de nuestra nación, también podemos atacar preventivamente o preparar a nuestra nación para ideas más allá de nuestras fronteras."
 CAS_focus_excavating_the_nation: "Excavando la Nación"
 CAS_focus_excavating_the_nation_desc: "Nuestra nación, aunque pequeña, cuenta con escasos recursos naturales que podemos aprovechar. Necesitamos realizar inversiones sólidas y generales si queremos tener alguna posibilidad de construir una economía verdaderamente funcional."
 CAS_focus_wenatchee_iron_works_complex: "Complejo Siderúrgico de Wenatchee"
 CAS_focus_wenatchee_iron_works_complex_desc: "La creación de un complejo minero central en torno al mineral de hierro que posee nuestro país nos permite fabricar una gran variedad de productos. Sin mencionar el acero, un producto que utiliza hierro, es uno de los de mayor consumo, después del propio hormigón."
 CAS_focus_yakima_bauxite_mills: "Molinos de Bauxita de Yakima"
 CAS_focus_yakima_bauxite_mills_desc: "La bauxita es el principal mineral que se convierte en aluminio, o como lo llamaban los antiguos estadounidenses, aluminio. Hay que admirar el siglo XIX y la ausencia de corrección ortográfica antes de imprimir un periódico. De todas formas, la bauxita y otros minerales ligeros pronto serán extraídos, procesados ​​y utilizados para el crecimiento y la diversificación de nuestra economía a niveles nunca antes vistos."
 CAS_focus_making_a_valley_out_of_a_mountain: "Convertir un Valle en una Montaña"
 CAS_focus_making_a_valley_out_of_a_mountain_desc: "La creación de la RMMC (Compañía Minera de las Montañas Rocosas) es fundamental para la búsqueda y expansión de nuestros metales de base tecnológica. La fabricación de microchips, etc., nos permitirá aumentar nuestra eficiencia y el sector doméstico en su conjunto."
 CAS_focus_growing_the_precious_metals_sector: "Crecimiento del Sector de Metales Preciosos"
 CAS_focus_growing_the_precious_metals_sector_desc: "El oro, las gemas y otros minerales exóticos son una excelente manera de obtener un buen apalancamiento económico. Por lo tanto, también sería fantástico intentar descubrir minerales de tierras raras como el osmio. Hablaremos de los más difíciles de conseguir más adelante; ahora mismo, nuestras demandas internas deberían estar cubiertas y contamos con las tierras necesarias."
 CAS_focus_investing_in_fossil_fuel_developments: "Inversión en el Desarrollo de Combustibles Fósiles"
 CAS_focus_investing_in_fossil_fuel_developments_desc: "Washington tiene carbón, Oregón tiene carbón e Idaho tiene carbón y petróleo. Hasta que encontremos la manera de producir sintéticos adecuados y duraderos para las respectivas industrias petroquímicas, nos vemos obligados a expandirnos e invertir en estos recursos potencialmente limitados. Sin embargo, por el momento, estamos sentando las bases para generar un auge temporal hasta que podamos reorganizar y equilibrar nuestras necesidades internas."
 CAS_focus_strategic_rubber_production_facilities: "Instalaciones Estratégicas de Producción de Caucho"
 CAS_focus_strategic_rubber_production_facilities_desc: "Ya sea con árboles de caucho en una instalación climática especializada o con métodos sintéticos superficiales, necesitamos caucho y productos a base de caucho. Las necesidades de la población, así como las posibles necesidades militares, superan los costos si consideramos seriamente la independencia de nuestra nación en su conjunto."
 CAS_focus_natural_resource_institute_of_cascadia: "Instituto de Recursos Naturales de Cascadia"
 CAS_focus_natural_resource_institute_of_cascadia_desc: "El NRIC es un centro científico dedicado a la promoción y expansión de nuestros recursos naturales. No somos una nación grande, pero si logramos innovar y expandir lo que ya tenemos, ya sea mediante prácticas de producción o minería más eficientes. Por no hablar del mundo de los sintéticos, podríamos convertirnos en la primera nación genuinamente autárquica del mundo. Claro que estos son sueños ambiciosos y utópicos, pero los sueños nunca son malos; solo son una motivación para el futuro."
 CAS_focus_cascadian_military: "Militar de Cascadia"
 CAS_focus_cascadian_military_desc: "El territorio que ocupamos puede ser tanto una salvación como un detrimento para nuestra propia existencia. Por lo tanto, la formalización de las Fuerzas Armadas de Cascadia nos permitirá moldear y crear una fuerza militar que, como mínimo, pueda defender estas mismas tierras que controlamos."
 CAS_focus_mountaineering_army: "Ejército de Montaña"
 CAS_focus_mountaineering_army_desc: "El CA o Ejército Cascadiano es una rama militar que surgió de las cordilleras que dominan nuestro territorio. Por ello, debemos asegurar una racionalización general de nuestros entrenamientos para asegurar que estos conocimientos tácticos no se desperdicien en caso de que una fuerza enemiga nos ataque."
 CAS_focus_filling_in_logistical_holes: "Cubriendo Vacíos Logísticos"
 CAS_focus_filling_in_logistical_holes_desc: "Si queremos tener un servicio armado funcional, y mucho menos un ejército en sí, primero debemos tratar de resolver los problemas de suministro y de requisición que hacen que las cosas sean tan ineficaces en el momento actual."
 CAS_focus_streamlining_personnel_placement: "Optimización de Ubicación de Personal"
 CAS_focus_streamlining_personnel_placement_desc: "Con los esfuerzos combinados de la junta de personal y el cuerpo de logística, ahora podemos unificar nuestros esfuerzos y esperar un proceso más fluido y eficiente para llevar a los soldados lo que necesitan y ubicarlos donde se los necesita."
 CAS_focus_expanding_training_camps: "Expansión de Campos de Entrenamiento"
 CAS_focus_expanding_training_camps_desc: "Para garantizar que podamos obtener los números necesarios para defender adecuadamente a nuestra nación, debemos ampliar y mejorar nuestras instalaciones de entrenamiento en su conjunto."
 CAS_focus_codifying_equipment_standardizations: "Codificación de Estándares de Equipamiento"
 CAS_focus_codifying_equipment_standardizations_desc: "Llevar los nuevos equipos a las tropas siempre es una prioridad; sin embargo, también es responsabilidad del mando asegurar que la cohesión y la experiencia de la unidad sean iguales hasta que se llegue al campo de batalla. Por lo tanto, la estandarización de los equipos y armamentos de campaña nos permitirá entrenar con mayor eficiencia y reducir el uso excesivo de la red logística."
 CAS_focus_targeted_motorization_efforts: "Esfuerzos de Motorización Selectiva"
 CAS_focus_targeted_motorization_efforts_desc: "El TME es una lista prioritaria de dónde se asignarán nuestros vehículos motorizados iniciales. Aspectos como la logística y el transporte masivo de tropas nos permitirán continuar nuestros esfuerzos para desplegar suficientes hombres en el campo y mantener nuestras fronteras."
 CAS_focus_general_refinement_programs: "Programas Generales de Refinamiento"
 CAS_focus_general_refinement_programs_desc: "Garantizar los estándares de entrenamiento, así como el mantenimiento de las habilidades aprendidas, es una excelente manera de conservar y crear una nueva base de excelencia en el combate."
 CAS_focus_army_defensive_strategy: "Estrategia Defensiva del Ejército"
 CAS_focus_army_defensive_strategy_desc: "Debido a nuestra posición mayoritariamente aislada, tenemos que crear un espíritu más defensivo si queremos sobrevivir a cualquier incursión desde el continente."
 CAS_focus_strengthening_defensive_counter_measures: "Fortalecimiento de Contramedidas Defensivas"
 CAS_focus_strengthening_defensive_counter_measures_desc: "Los ejércitos modernos disponen de una gran cantidad de herramientas, y es precisamente este conocimiento lo que nos obliga a invertir más en contramedidas para dichas herramientas. Ningún humano débil puede destruir un tanque con facilidad, así que démosles los medios de destrucción, ¿de acuerdo?"
 CAS_focus_anti_air_developments: "Desarrollos Antiaéreos"
 CAS_focus_anti_air_developments_desc: "Al invertir en sistemas AA preventivos, podemos aumentar la capacidad de supervivencia, así como las experiencias de combate de nuestros soldados a través de dicha capacidad de supervivencia."
 CAS_focus_defense_social_benefit_contracts: "Contratos de Beneficios Sociales para la Defensa"
 CAS_focus_defense_social_benefit_contracts_desc: "La creación del departamento DSBC dentro del ejército nos permite incentivar el alistamiento para algo más que la simple defensa de la nación. Esta estrategia preventiva contra la incertidumbre significa que, si alguien se alista en el ejército, puede firmar un contrato legalmente vinculante que establece un estándar de beneficios monetarios, de bienestar social y de atención médica para el soldado y sus familiares directos. En caso de guerra, estos beneficios se transferirían inmediatamente al cónyuge o al pariente más cercano, según la situación."
 CAS_focus_aggression_strategy: "Estrategia de Agresión"
 CAS_focus_aggression_strategy_desc: "Nuestra posición no es más que una bomba de tiempo; debemos pasar a la ofensiva si realmente queremos llegar a alguna parte en estos tiempos difíciles."
 CAS_focus_emphasis_on_mobility: "Énfasis en la Movilidad"
 CAS_focus_emphasis_on_mobility_desc: "Al promover más elementos móviles de nuestro ejército, la maniobrabilidad y las capacidades ofensivas aumentarán en gran medida las posibilidades de abrumar la capacidad de toma de decisiones del enemigo."
 CAS_focus_rearming_soldiers: "Rearmamento de Soldados"
 CAS_focus_rearming_soldiers_desc: "Cambiar el equipamiento estándar de nuestros soldados para que esté más orientado a la ofensiva nos permitirá garantizar que nuestros soldados estén más preparados para atacar que para quedarse sentados y aguantar."
 CAS_focus_securing_dedicated_conscription: "Asegurar Conscripción Dedicada"
 CAS_focus_securing_dedicated_conscription_desc: "Mejorar los esfuerzos de reclutamiento y refinar los requisitos para el mismo nos permitirá mantener los números necesarios, especialmente si y cuando las líneas del frente se expandan más allá de las expectativas conocidas."
 CAS_focus_all_terrain_combat_training: "Entrenamiento de Combate en Todo Terreno"
 CAS_focus_all_terrain_combat_training_desc: "Al establecer nuevas instalaciones de entrenamiento de combate para exponer a nuestras tropas a tantos tipos de terreno como sea posible, establecemos un nuevo estándar de entrenamiento y adaptabilidad en lo que respecta a las capacidades generales de combate."
 CAS_focus_cascadian_navy: "Armada de Cascadia"
 CAS_focus_cascadian_navy_desc: "La rama militar de la CN es la piedra angular de la defensa costera. Con los buques disponibles, debemos reorganizar y reparar estos buques y sus tripulaciones, y crear una nueva dinámica de poder. La perla del Pacífico brillará con fuerza."
 CAS_focus_updating_fleet_logistics: "Actualización de Logística de la Flota"
 CAS_focus_updating_fleet_logistics_desc: "Las reparaciones y el mantenimiento requieren materiales, recursos humanos y materias primas. Necesitamos reparar este importante engranaje de nuestra poderosa maquinaria naval si queremos contar con una fuerza naval realmente operativa."
 CAS_focus_remodeling_training_facilities: "Remodelación de Instalaciones de Entrenamiento"
 CAS_focus_remodeling_training_facilities_desc: "Al actualizar y modernizar las instalaciones deterioradas, podemos mejorar la calidad de nuestro personal y su manejo, así como su familiaridad con el buque naval estacionado."
 CAS_focus_navy_personnel_advancements_training: "Capacitación Avanzada de Personal Naval"
 CAS_focus_navy_personnel_advancements_training_desc: "Aumentar los programas de entrenamiento para preparar al personal naval para posibles avances en rango y responsabilidad permitirá un manejo y coordinación más eficiente de los sistemas de armas dentro de flotas más pequeñas."
 CAS_focus_fixing_outdated_propulsion_systems: "Reparación de Sistemas de Propulsión Obsoletos"
 CAS_focus_fixing_outdated_propulsion_systems_desc: "El mantenimiento de los sistemas de propulsión ha sido prácticamente inexistente, lo cual es inaceptable. Debemos reparar estos componentes principales y dar a nuestras fuerzas navales una oportunidad de luchar."
 CAS_focus_standardizing_repair_facilities: "Estandarización de Instalaciones de Reparación"
 CAS_focus_standardizing_repair_facilities_desc: "Al estandarizar las instalaciones de dique seco, podemos mejorar nuestra capacidad para reparar buques dañados o averiados. Esto se traduce en menos tiempo fuera de servicio y respuestas más rápidas ante la presencia enemiga en nuestras aguas."
 CAS_focus_weapons_system_task_force: "Fuerza de Tarea de Sistemas de Armas"
 CAS_focus_weapons_system_task_force_desc: "Al crear equipos especializados de reparación y reemplazo podemos garantizar que nuestros buques tengan los sistemas de armas más funcionales y actualizados."
 CAS_focus_naval_firepower_strategy: "Estrategia de Potencia de Fuego Naval"
 CAS_focus_naval_firepower_strategy_desc: "Al centrar la financiación en los sistemas de armas para nuestros buques de guerra, podemos garantizar la supervivencia de cada uno de ellos, ya que cada uno de ellos puede ser muy potente."
 CAS_focus_future_navies_program: "Programa de Armadas Futuras"
 CAS_focus_future_navies_program_desc: "Destinar fondos a I+D para nuevas armas para nuestras flotas, así como a medidas defensivas, aumentará el impacto en el combate y la capacidad de supervivencia general."
 CAS_focus_strategic_shipbuilding: "Construcción Estratégica de Buques"
 CAS_focus_strategic_shipbuilding_desc: "El programa SSB está dedicado a preparar y racionalizar la composición de la flota naval para el futuro, así como la potencia de fuego que se espera que tengan estos buques."
 CAS_focus_naval_replacement_strategy: "Estrategia de Reemplazo Naval"
 CAS_focus_naval_replacement_strategy_desc: "Se pierden buques, esto es un hecho. Sin embargo, si no queremos perder nuestra economía en el proceso, entonces debemos garantizar que la reparación y el reacondicionamiento, así como la capacidad de supervivencia del personal naval, sean una máxima prioridad."
 CAS_focus_ship_design_standards_commission: "Comisión de Estándares de Diseño de Buques"
 CAS_focus_ship_design_standards_commission_desc: "La comisión SDS es una iniciativa de financiación para buscar maneras de reducir costes y la producción, lo que nos permitirá fabricar más barcos con menos recursos. Las desventajas, por supuesto, serán algo obvias, pero la supervivencia es la máxima prioridad."
 CAS_focus_survivability_designing_priority: "Prioridad en el Diseño de Supervivencia"
 CAS_focus_survivability_designing_priority_desc: "Al diseñar preventivamente nuevos buques de guerra con medidas de supervivencia, podemos recuperar más mano de obra de buques potencialmente dañados o destruidos."
 CAS_focus_coastal_primary_training: "Entrenamiento Primario Costero"
 CAS_focus_coastal_primary_training_desc: "Garantizar nuestra defensa nacional es el objetivo principal y, como tal, el entrenamiento reflejará eso."
 CAS_focus_air_force_of_cascadia: "Fuerza Aérea de Cascadia"
 CAS_focus_air_force_of_cascadia_desc: "La creación y formalización de la Fuerza Aérea Cascadiana (CAF) es un verdadero paso hacia la independencia de nuestra nación. Las potencias extranjeras de todos los tamaños buscan una fuerza aérea capaz de defender los cielos de su nación, y por ello, haremos precisamente eso."
 CAS_focus_fighter_priority_strategy: "Estrategia de Prioridad en Cazas"
 CAS_focus_fighter_priority_strategy_desc: "Defender nuestro espacio aéreo es el objetivo primordial de la supervivencia a largo plazo. Si permitimos que la fuerza aérea enemiga se descontrole, mejor que nos retiremos antes de empezar."
 CAS_focus_improved_weapons_testing: "Pruebas de Armas Mejoradas"
 CAS_focus_improved_weapons_testing_desc: "El centro de pruebas de armas es una excelente manera de mejorar nuestras capacidades ofensivas aéreas. Sin embargo, gracias a un diseño inteligente, también podemos realizar pruebas de contramedidas y tecnología de mejora general."
 CAS_focus_retooling_aircraft_production: "Reequipamiento de la Producción de Aeronaves"
 CAS_focus_retooling_aircraft_production_desc: "Al priorizar los modelos de producción de aviones de combate, podemos asegurar a los pueblos de nuestra nación, así como a nuestros enemigos, que nuestros cielos sólo contendrán nuestros aviones."
 CAS_focus_bomber_priority_strategy: "Estrategia de Prioridad en Bombardeo"
 CAS_focus_bomber_priority_strategy_desc: "Confiamos en la capacidad de nuestra fuerza aérea, pero también en la voluntad de nuestros enemigos de continuar la lucha. Por ello, debemos priorizar los bombarderos y derrotar al enemigo tanto en el frente como en el propio."
 CAS_focus_payload_developments: "Desarrollos de Carga Útil"
 CAS_focus_payload_developments_desc: "Para asegurar la derrota de nuestros enemigos, debemos mejorar nuestras cargas de bombardeo y la forma en que alcanzan sus objetivos."
 CAS_focus_retooling_aircraft_production_two: "Reequipamiento de la Producción de Aeronaves"
 CAS_focus_retooling_aircraft_production_two_desc: "Al destinar recursos de producción a más modelos de bombarderos, podemos mantener la presión sobre el enemigo al máximo. De una forma u otra, forzaremos su rendición."
 CAS_focus_simulator_investments: "Inversiones en Simuladores"
 CAS_focus_simulator_investments_desc: "Para demostrar que nuestros pilotos son los mejores, debemos someterlos a una simulación lo más realista posible. El entrenamiento será duro y probablemente abrumador para algunos, pero al final crearemos un nuevo estándar para los pilotos que el mundo jamás conocerá."
 CAS_focus_general_infrastructure_investments: "Inversiones Generales en Infraestructura"
 CAS_focus_general_infrastructure_investments_desc: "A través de inversiones para mejorar la infraestructura de nuestra fuerza aérea, así como la logística para llevar los aviones a los campos de despegue y demás, mejoraremos en gran medida la preparación para el combate de nuestra rama de servicio aéreo."
 CAS_focus_air_force_assistance_department: "Departamento de Asistencia de la Fuerza Aérea"
 CAS_focus_air_force_assistance_department_desc: "El Departamento de Asistencia, o como algunos lo llaman, el Departamento de Preparación Conjunta, es una sección de coordinación de la Fuerza Aérea que trabaja en conjunto con el Ejército y otras fuerzas terrestres durante las operaciones de combate. Esto tiene como objetivo limitar los incidentes de fuego amigo y garantizar la claridad en el campo de batalla."
 CAS_focus_clear_skies_ahead: "Cielos Despejados por Delante"
 CAS_focus_clear_skies_ahead_desc: "Gracias a un esfuerzo incansable, creo que es reconfortante decir que podemos disfrutar de los cielos. Porque los defenderemos de cualquier fuerza enemiga que intente oscurecerlos."
 CAS_focus_a_refined_fighting_force: "Una Fuerza de Combate Refinada"
 CAS_focus_a_refined_fighting_force_desc: "Nuestras fuerzas armadas han avanzado mucho, pero ahora podemos decir que nuestras fronteras estarán defendidas y nuestros enemigos ya no podrán simplemente \"pasarnos por encima\"."
 CAS_focus_beyond_the_mountain_home: "Más Allá del Hogar en la Montaña"
 CAS_focus_beyond_the_mountain_home_desc: "Al contemplar nuestra gran nación, vemos una tierra y un pueblo con gran potencial. Vemos más allá de las grandes cordilleras de estas hermosas tierras y observamos con horror cómo salvajes, explotadores y toda clase de vagabundos pueblan el continente. Si realmente queremos dejar nuestra huella en esta era moderna, debemos ser audaces. Sea cual sea nuestra decisión, debemos mantenernos firmes, orgullosos y unidos contra quienes desean perpetuar la decadencia que nos rodea."
 CAS_focus_pan_pacific_plan: "El Plan Pan-Pacífico"
 CAS_focus_pan_pacific_plan_desc: "Cascadia es una nación orientada al Pacífico; debemos asegurarnos de que sea LA nación del Pacífico. Por ello, comenzaremos a impulsar el proceso para convertirnos en una nación más grande que se extienda a lo largo de la costa del Pacífico."
 CAS_focus_preparing_for_the_hunt: "Preparándose para la Cacería"
 CAS_focus_preparing_for_the_hunt_desc: "La parte más fácil de este gran plan nuestro será desmantelar la retrógrada y egocéntrica República de California. Una especie de oso, si estuviéramos en un circo... pero no lo estamos. Por lo tanto, comenzaremos los preparativos para adquirir las tierras de California y poner fin a esta farsa."
 CAS_focus_strike_down_the_bear: "Derribar al Oso"
 CAS_focus_strike_down_the_bear_desc: "¡El momento es ahora y como tal, atacaremos al oso, seremos victoriosos y comenzaremos una nueva era para Cascadia!"
 CAS_focus_the_great_southern_expedition: "La Gran Expedición del Sur"
 CAS_focus_the_great_southern_expedition_desc: "México es una nación fuerte, pero también confusa y ligeramente decepcionante. Este será nuestro mayor desafío hasta ahora y, por lo tanto, debemos prepararnos para esta gran batalla."
 CAS_focus_operation_yucatan: "Operación Yucatán"
 CAS_focus_operation_yucatan_desc: "La Operación Yucatán es la invasión planificada de México. Atacaremos con fuerza y ​​rapidez para arrasar la península de Baja California y luego iniciaremos un avance general hacia el sur hasta acabar con los últimos remanentes de resistencia en Yucatán."
 CAS_focus_rio_grande_republic: "República del Río Grande"
 CAS_focus_rio_grande_republic_desc: "Controlar vastas extensiones de territorio es una tarea ardua y agota los escasos recursos humanos con los que contamos. Por ello, necesitamos establecer un títere estratégico que sea un socio igualitario junto con los remanentes mexicanos."
 CAS_focus_yucatan_power_bloc: "Bloque de Poder de Yucatán"
 CAS_focus_yucatan_power_bloc_desc: "Para consolidar nuestros territorios del Pacífico, debemos desmantelar la idea de un pueblo mexicano unificado. Por lo tanto, revivir la nación y la cultura yucatecas nos permitirá forjar otra parte del México más amplio y contribuir a una mejor administración en el sur."
 CAS_focus_our_pacific_territories: "Nuestros Territorios del Pacífico"
 CAS_focus_our_pacific_territories_desc: "Para asegurar que nuestra presencia naval en el Pacífico sea cada vez menos vulnerable, debemos asegurar e integrar territorios clave de la costa del Pacífico. Esto también contribuirá a la creación de un Pacto de Poder Panpacífico (PPPP) unificado. Podemos buscar una mejor división de México en regiones que no sean lo suficientemente poderosas como para desafiarnos, pero sí lo suficientemente poderosas como para ayudarnos y beneficiarnos mutuamente, así como a otros estados miembros constituidos."
 CAS_focus_central_mexico_administration: "Administración del Centro de México"
 CAS_focus_central_mexico_administration_desc: "El antiguo gobierno de México puede permanecer en el poder y administrar la región central del antiguo Estado Mexicano. La condición principal es que el nuevo estado y la nueva administración se alineen con Cascadia y sus objetivos de política exterior. Los asuntos internos pueden continuar bajo la nueva administración sin la intervención de Cascadia."
 CAS_focus_ensuring_public_stability: "Garantizar la Estabilidad Pública"
 CAS_focus_ensuring_public_stability_desc: "Con la expedición al sur completada, ahora podemos comenzar a reunir al público en general y crear un nuevo camino a seguir. Unidos como un solo pueblo, podemos prosperar como nunca antes."
 CAS_focus_eastern_bulwark: "Bastián Oriental"
 CAS_focus_eastern_bulwark_desc: "Nuestro objetivo final es reclamar los territorios costeros del Pacífico. Desde Alaska hasta Baja California, crearemos una gran armada para asegurar la paz y la estabilidad en el Pacífico. Sin embargo, primero necesitamos establecer una base. Los rumores al este del Misisipi han preocupado a algunos por la creciente contrapotencia; por consiguiente, la posición geopolítica de Canadá también dificulta una simple invasión. Por lo tanto, debemos contener a la Unión de Deseret como baluarte contra el este, además de contribuir a fortalecer nuestra base de poder."
 CAS_focus_operation_morman: "Operación Mormón"
 CAS_focus_operation_morman_desc: "La Unión de Deseret luchó una vez contra el antiguo gobierno federal de Estados Unidos en el siglo XIX. Ahora les toca enfrentarse de nuevo a nosotros. ¡Marchamos hacia el oeste!"
 CAS_focus_securing_eastern_holdings: "Asegurar las Poseciones Orientales"
 CAS_focus_securing_eastern_holdings_desc: "Hemos asegurado el baluarte, ahora debemos estabilizar la situación y restablecer el orden público."
 CAS_focus_pushing_buttons_testing_waters: "Presionar Botones y Probar Aguas"
 CAS_focus_pushing_buttons_testing_waters_desc: "El mayor desafío está por delante. Necesitamos hacer todo lo posible para convencer a los canadienses de que nos ataquen, en lugar de simplemente declararles abiertamente su oposición. Claro que aún podemos hacerlo, pero considerando lo obvio, no es la mejor idea."
 CAS_focus_border_escalation: "Escalada Fronteriza"
 CAS_focus_border_escalation_desc: "Debemos hacer todo lo posible para incitar al gobierno canadiense a impulsar una guerra en sus términos. Por lo tanto, incluso si somos un poco imprudentes, debemos hacer lo necesario si no queremos que este conflicto regional se convierta en algo más grave."
 CAS_focus_operation_great_north: "Operación Gran Norte"
 CAS_focus_operation_great_north_desc: "Cuando todo lo demás falla, sigue adelante y hazlo tú mismo."
 CAS_focus_stabilizing_the_great_north: "Estabilizando el Gran Norte"
 CAS_focus_stabilizing_the_great_north_desc: "Ahora que efectivamente hemos terminado las cosas en nuestros términos, podemos comenzar a restablecer la paz y el orden en estas tierras."
 CAS_focus_operation_big_dipper: "Operación Osa Mayor"
 CAS_focus_operation_big_dipper_desc: "La última frontera. Alaska, el estado rico en petróleo, será una gran adición a nuestra Unión Panpacífica y un importante territorio estratégico para continuar nuestra proeza naval."
 CAS_focus_connecting_the_frigid_north: "Conectando el Norte Gélido"
 CAS_focus_connecting_the_frigid_north_desc: "Ahora que el conflicto ha cesado, podemos empezar a conectar y estabilizar el territorio de Alaska."
 CAS_focus_pan_pacific_proclamation: "Proclamación Pan-Pacífica"
 CAS_focus_pan_pacific_proclamation_desc: "Nuestro trabajo no ha terminado, pero lo más difícil ya pasó. Podemos asegurar a los pueblos de nuestra gloriosa nación que somos uno solo. Los habitantes de la costa del Pacífico están ahora unidos y, como tal, proclamaremos esta unidad al mundo entero."
 CAS_focus_cambrian_unity_plan: "Plan de Unidad Cámbrica"
 CAS_focus_cambrian_unity_plan_desc: "La república ha desaparecido, la idea de \"Estados Unidos\" murió con su implosión. Por ello, debemos crear un nuevo camino y buscar una nueva identidad que nos una. Algunas de las grandes cordilleras datan del Cámbrico, así que qué mejor manera de crear una nueva unión que honrar el legado de estas tierras. Cambria, nuestro hogar."
 CAS_focus_coastal_claims: "Reclamos Costeros"
 CAS_focus_coastal_claims_desc: "Para crear nuestra nueva unión, primero debemos trazar un camino hacia la unidad de la costa del Pacífico. Por ello, comenzaremos a maniobrar y consolidar nuestras legítimas reivindicaciones contra el deficiente gobierno californiano."
 CAS_focus_southwestern_securities: "Valores del Suroeste"
 CAS_focus_southwestern_securities_desc: "El suroeste es rico en combustibles fósiles y recursos minerales clave. Si queremos cuidar adecuadamente esta nueva gran nación, debemos empezar a consolidar nuestro derecho a adquirir estas tierras."
 CAS_focus_securing_a_stable_food_supply: "Asegurar un Suministro Alimentario Estable"
 CAS_focus_securing_a_stable_food_supply_desc: "Los estados de las Grandes Llanuras se consideran el granero del nuevo mundo. Es este granero el que alimentaremos a nuestra gente y fomentaremos la unidad y la prosperidad en el futuro."
 CAS_focus_operation_angel_city: "Operación Ciudad Ángel"
 CAS_focus_operation_angel_city_desc: "Para crear un frente verdaderamente unido, primero debemos unir la costa oeste. Atacaremos hacia el sur y celebraremos nuestra victoria en la ciudad de los ángeles."
 CAS_focus_operation_bread_bowl: "Operación Cuenco de Pan"
 CAS_focus_operation_bread_bowl_desc: "La región de las Grandes Llanuras será la mejor para combatir primero. Tras arrasar, podremos dirigirnos al sur y consolidar nuestra unión."
 CAS_focus_operation_just_deserts: "Operación Solo Postres"
 CAS_focus_operation_just_deserts_desc: "La última pieza clave de nuestro gran rompecabezas está justo delante de nosotros. Muchos se preguntarán: ¿por qué no unir el continente? La cuestión es que algún día lo haremos. Pero por ahora debemos unirnos y consolidar nuestros logros, fomentar un sentido de unidad y crear un nuevo camino para el futuro que deseamos."
 CAS_focus_beginning_a_new_chapter: "Comenzando un Nuevo Capítulo"
 CAS_focus_beginning_a_new_chapter_desc: "Comenzamos por estabilizar la región costera, ya que es la más cercana a nosotros, para comenzar a integrar los servicios civiles."
 CAS_focus_restoring_southern_order: "Restaurando el Orden del Sur"
 CAS_focus_restoring_southern_order_desc: "Al integrar los servicios civiles podemos empezar a restablecer la ley y el orden en nuestras nuevas regiones del sur, donde podrán comenzar los inicios de la unidad nacional."
 CAS_focus_sowing_new_fields_of_unity: "Sembrando Nuevos Campos de Unidad"
 CAS_focus_sowing_new_fields_of_unity_desc: "Al restablecer el orden y la paz en estas tierras fértiles, podemos restablecer la legalidad pública garantizando un suministro de alimentos estable y diverso."
 CAS_focus_the_new_republic: "La Nueva República"
 CAS_focus_the_new_republic_desc: "Ha tardado mucho, pero es hora de pasar la última página de este libro para que podamos escribir uno nuevo. La historia de Cambria comienza hoy."
 CAS_focus_old_republic_plan: "Plan de la Vieja República"
 CAS_focus_old_republic_plan_desc: "Nuestras tierras están en orden y, por lo tanto, repararemos lo que tantos han agraviado. Marchamos hacia el este y juntos uniremos el continente una vez más."
 CAS_focus_coastline_clearance: "Despeje de la Costa"
 CAS_focus_coastline_clearance_desc: "El camino que nos espera es largo y difícil. Si no tenemos cuidado, algún maniático de la costa este podría tener una idea similar a la nuestra. Por lo tanto, podemos empezar por unir a los estados costeros del Pacífico bajo una sola bandera y preparar nuestras fuerzas para las campañas venideras."
 CAS_focus_taking_the_gamble: "Tomando el Riesgo"
 CAS_focus_taking_the_gamble_desc: "La mitad sur de este lado del continente está cubierta de desiertos. Este terreno accidentado nos obliga a ser cautelosos con los suministros y a asegurarnos de no sufrir más por el calor y las enfermedades que por el propio combate."
 CAS_focus_working_for_our_meal: "Trabajando por Nuestra Comida"
 CAS_focus_working_for_our_meal_desc: "Aunque la mitad norte de este lado del continente es mayormente llanura, las Montañas Rocosas, así como las ondulantes colinas y valles, harán el viaje largo y tedioso. Esperemos que, después de nuestro duro trabajo, podamos disfrutar de una buena comida."
 CAS_focus_a_lone_star_no_more: "Una Estrella Solitaria Nunca Más"
 CAS_focus_a_lone_star_no_more_desc: "El punto medio y el comienzo de la siguiente página en nuestro glorioso libro revanchista. Texas será una gran parada para recomponernos, reorganizar nuestros logros actuales y prepararnos para la siguiente lucha y concluir la tarea pendiente."
 CAS_focus_war_plan_movie_star: "Plan de Guerra Estrella de Cine"
 CAS_focus_war_plan_movie_star_desc: "Atacamos al oso hacia el sur. Esos liberales y su alta sociedad nunca tendrán ninguna oportunidad."
 CAS_focus_war_plan_farmville: "Plan de Guerra Granja Villa"
 CAS_focus_war_plan_farmville_desc: "Puede que el granjero John tenga una escopeta de confianza, pero nosotros tenemos tanques y aviones. Esta banda desaliñada no nos estorbará."
 CAS_focus_war_plan_skorpion: "Plan de Guerra Escorpión"
 CAS_focus_war_plan_skorpion_desc: "Mormones... ¡¿en serio?! Esta gente es un chiste. Supongo que perderemos más por las enfermedades y el clima que por su supuesto ejército."
 CAS_focus_war_plan_alamo: "Plan de Guerra Álamo"
 CAS_focus_war_plan_alamo_desc: "Recordemos el Álamo, porque éste será el punto medio para devolver la gloria y el honor de un continente unido."
 CAS_focus_beginning_clean_up_operations: "Comenzando Operaciones de Limpieza"
 CAS_focus_beginning_clean_up_operations_desc: "A medida que se asienta el polvo en nuestra primera mitad de este \"gran juego\", debemos comenzar a recomponernos y organizar el frente interno que hemos creado."
 CAS_focus_peace_land_and_bread: "Paz, Tierra y Pan"
 CAS_focus_peace_land_and_bread_desc: "Aseguraremos la paz y restableceremos el orden público utilizando las nuevas tierras y asegurándonos de que los pueblos tengan suficiente pan para llenar sus estómagos."
 CAS_focus_bread_and_circuses: "Pan y Circo"
 CAS_focus_bread_and_circuses_desc: "Para garantizar el orden público en el suroeste, debemos entretener a la gente y alimentarla. Por lo tanto, podemos considerar expandir la influencia de Las Vegas y procurar proporcionar alimentos baratos a esta región asolada por el desierto."
 CAS_focus_a_wild_west_no_more: "Un Lejano Oeste Nunca Más"
 CAS_focus_a_wild_west_no_more_desc: "Con la mitad occidental del continente ahora reorganizada y estable por el momento, podemos empezar a preparar las cosas para la marcha a través del Mississippi."
 CAS_focus_southern_bell_tolls: "Tañe una Campana del Sur"
 CAS_focus_southern_bell_tolls_desc: "La marcha hacia el este continúa y qué mejor manera de cruzar el Mississippi que a través del estado homónimo."
 CAS_focus_rusting_chance_to_make_new: "Oxido y Oportunidad para Crear lo Nuevo"
 CAS_focus_rusting_chance_to_make_new_desc: "La región de los Grandes Lagos es una de las zonas más industrializadas de la antigua república. Lamentablemente, estos Grandes Lagos han erosionado los estados que los bordean y están cerca. Por eso, marcharemos hacia el este y continuaremos la lucha."
 CAS_focus_capitalizing_the_capital: "Capitalizando la Capital"
 CAS_focus_capitalizing_the_capital_desc: "La región federal de la antigua república sufrió mucho por las influencias tóxicas del Distrito. Ahora trabajaremos para remediarlo."
 CAS_focus_northeastern_nitwits: "Tontos del Noreste"
 CAS_focus_northeastern_nitwits_desc: "La gente egocéntrica y de alta sociedad que generalmente conforma la región noreste será pan comido. Sin embargo, no debemos subestimar los terrenos que controlan, pues incluso una banda de vándalos puede causar estragos si se encuentra en la zona adecuada."
 CAS_focus_war_plan_dixie: "Plan de Guerra Dixie"
 CAS_focus_war_plan_dixie_desc: "Marchamos hacia Dixie, marchamos hacia el este para terminar el trabajo que hemos creado para nosotros mismos."
 CAS_focus_war_plan_industrial_revolution: "Plan de Guerra Revolución Industrial"
 CAS_focus_war_plan_industrial_revolution_desc: "Marcharemos hacia el este y convertiremos estas reliquias oxidadas en refinados podios de prosperidad."
 CAS_focus_war_plan_washington: "Plan de Guerra Washington"
 CAS_focus_war_plan_washington_desc: "El distrito capitalino, aunque no es la meta, es el último gran paso para consolidar nuestro nuevo mandato de destino para el continente. Porque conquistaremos la capital, crearemos la antigua república y la renovaremos."
 CAS_focus_war_plan_marathon: "Plan de Guerra Maratón"
 CAS_focus_war_plan_marathon_desc: "Estamos en la recta final, amigos. Ahora solo nos queda terminar nuestra maratón y contemplar el océano abierto. Desde Maine, deberíamos poder ver a lo lejos la pacífica provincia canadiense de Nueva Escocia. Desde allí, el derramamiento de sangre habrá terminado y la reconstrucción podrá comenzar."
 CAS_focus_southern_sweethearts: "Corazones Dulces del Sur"
 CAS_focus_southern_sweethearts_desc: "La hospitalidad sureña es una novedad única. Si realmente queremos restablecer la ley y el orden, y ni hablar de pensar en volver a ser una unión de estados, debemos mostrarles la misma cortesía que ellos nos muestran. La guerra es la guerra, pero mantener la paz es mucho más difícil de lo que se cree."
 CAS_focus_midwestern_goodbye: "Un Adiós del Medio Oeste"
 CAS_focus_midwestern_goodbye_desc: "Ope, lo siento, amigo, no te vi. Mira, lo he pasado genial, pero tengo cosas que hacer y ponerme al día antes de que mi esposa se enrede con los problemas de forma extravagante. Pero bueno, podemos repetir esto en otro momento. Yo pongo la cerveza y tú trae unos buenos perros para el juego."
 CAS_focus_capital_clean_up: "Limpieza de la Capital"
 CAS_focus_capital_clean_up_desc: "Es hora de limpiar esta reliquia del pasado. Quizás algún día restablezcamos aquí la sede del gobierno nacional, o simplemente la devolvamos a cada estado y la usemos como lección para las generaciones futuras."
 CAS_focus_liberty_shines_once_more: "La Libertad Brilla Una Vez Más"
 CAS_focus_liberty_shines_once_more_desc: "Hoy limpiamos las calles y limpiamos a la Dama Libertad, porque debemos celebrar la culminación de nuestro gran Segundo Destino Manifiesto."
 CAS_focus_second_republic: "La Segunda República"
 CAS_focus_second_republic_desc: "Las tierras están en orden, el pueblo está unido y el mundo sabrá ahora que la Segunda República Americana vuelve a ser protagonista en el escenario global. Porque unidos nos mantenemos, como divididos caímos una vez."
 CAS_flag_western_outlook: "Los Ideales Occidentales Toman Fuerza"
 CAS_flag_emerging_outlook: "Los Ideales Orientales Toman Fuerza"
 CAS_flag_non_aligned_outlook: "Los Ideales Locales Toman Fuerza"
 CAS_flag_nationalist_outlook: "Los Valores Nacionalistas Dominan a la Nación"
 CAS_flag_mount_fort_baker: "Fuerte Monte Baker"
 CAS_flag_fort_ruby_mountain: "Fuerte Ruby Mountain"
 CAS_flag_fort_yakama: "Fuerte Yakama"
 CAS_flag_fort_saint_helens: "Fuerte Saint Helens"
 CAS_flag_sprague: "Sprague"
 CAS_flag_umatilla: "Umatilla"
 CAS_flag_arock: "Arock"
 CAS_flag_grimes_pass: "Paso Grimes"
 CAS_ideas_developing_foreign_policy: "Desarrollo de Política Exterior"
 CAS_ideas_developing_foreign_policy_desc: "Ahora que nos hemos recompuesto, podemos empezar a mirar más allá de nuestras fronteras para asegurar nuestro lugar en este mundo."
 CAS_ideas_officer_training_funding: "Financiamiento para la Capacitación de Oficiales"
 CAS_ideas_officer_training_funding_desc: "La mejora en la financiación nos ha permitido ampliar la formación que nuestros oficiales y generales adquieren durante sus años de servicio. Esto nos permite, con el tiempo, mejorar los elementos de Mando y Control de nuestras fuerzas armadas, así como las doctrinas que podemos utilizar para perfeccionar nuestras fuerzas militares."
 CAS_ideas_the_wegonian_rank_structure: "Estructura de Rangos Wegoniana"
 CAS_ideas_the_wegonian_rank_structure_desc: "Inspirada en métodos de C&C más especializados, la estructura de rangos wegoniana es una forma más amplia de rangos militares para cada rama militar, lo que permite unidades militares más pequeñas y escalables. La principal desventaja es que la expansión de estos rangos y la jerarquía de unidades implican la necesidad de más puestos de liderazgo en todos los niveles. Sin embargo, la posible ventaja reside en la coordinación entre unidades y la capacidad de aumentar su flexibilidad a pesar del escalón superior que se utilice."
 CAS_ideas_mountain_agriculture: "Agricultura de Montaña"
 CAS_ideas_mountain_agriculture_desc: "Gracias a una planificación tediosa y a importantes inversiones en I+D, ahora podemos contar con un sector agrícola significativo que, al menos, nos permita considerar una verdadera autosuficiencia si alguna vez nos vemos acosados ​​por potencias extranjeras que deseen perjudicarnos."
 CAS_ideas_cascadian_armed_services_infancy: "Servicios Armados de Cascadia (\"Infancia\")"
 CAS_ideas_cascadian_armed_services_infancy_desc: "Los primeros días del establecimiento de una fuerza militar siempre estarán llenos de saqueadores entusiastas y holgazanes que buscan refugio. Aunque no es mucho, el CAS hará todo lo posible para defender el hogar y la familia donde y cuando sea necesario."
 CAS_ideas_army_anti_air_defenses: "Defensas Antiaéreas del Ejército"
 CAS_ideas_army_anti_air_defenses_desc: "Al priorizar el desarrollo de sistemas AA, podemos prolongar la vida del soldado promedio, lo que a su vez también mejora las experiencias compartidas generales que tienen los soldados en el ejército."
 CAS_ideas_cascading_offensives: "Ofensivas en Cascada"
 CAS_ideas_cascading_offensives_desc: "Al reentrenar tropas y oficiales para que sean más agresivos y equipar a nuestras tropas con elementos más móviles, podemos garantizar una especie de \"ofensiva perpetua\" si surge la oportunidad."
 CAS_ideas_all_terrain_combat_training: "Entrenamiento de Combate en Todo Terreno"
 CAS_ideas_all_terrain_combat_training_desc: "Los programas de entrenamiento ATC son campamentos de entrenamiento diseñados especialmente para rotar y exponer a los soldados a todo tipo de combate, siempre que sea posible. Esto aumentará la competencia de nuestros soldados y su capacidad para mantener el combate en diferentes entornos."
 CAS_ideas_future_navies_program: "Programa de Armadas Futuras"
 CAS_ideas_future_navies_program_desc: "Al centrar nuestra financiación en sistemas de armas y ampliar preventivamente la potencia de fuego de diferentes buques, podemos mejorar nuestra capacidad de combate general."
 CAS_ideas_tomorrows_navy: "La Armada del Mañana"
 CAS_ideas_tomorrows_navy_desc: "Al preparar la construcción de barcos y la composición de las flotas para el futuro, podemos aumentar en gran medida la potencia de fuego y la flexibilidad de nuestra armada."
 CAS_ideas_design_standards: "Estándares de Diseño"
 CAS_ideas_design_standards_desc: "Al estandarizar los diseños de los buques de guerra, podemos reducir los excesos en el uso de recursos."
 CAS_ideas_survivability_designs: "Diseños de Supervivencia"
 CAS_ideas_survivability_designs_desc: "Al centrarnos en las tasas de supervivencia del personal naval, podemos garantizar que la pérdida de experiencia y de recursos humanos en una guerra prolongada se minimice en la mayor medida posible."
 CAS_ideas_weapons_testing_facilities: "Instalaciones de Pruebas de Armas"
 CAS_ideas_weapons_testing_facilities_desc: "Al crear una instalación genérica de pruebas de armas, no solo podemos mantener el nombre, sino que también podemos ocultar otros avances en contramedidas entre todas las armas. En general, nuestra capacidad para controlar nuestros cielos debería ser prácticamente nula."
 CAS_ideas_fighter_centric_production: "Producción Centrada en Cazas"
 CAS_ideas_fighter_centric_production_desc: "Al reasignar recursos de producción a modelos orientados a los cazas, podemos seguir estando a la vanguardia en un juego de números potenciales."
 CAS_ideas_improved_payload_methods: "Métodos Mejorados de Carga Útil"
 CAS_ideas_improved_payload_methods_desc: "Lo que necesitamos para garantizar que la voluntad de nuestros enemigos sea aplastada son inversiones generales para mejorar la entrega de carga útil, así como la capacidad de la aeronave para alcanzar el objetivo."
 CAS_ideas_bomber_centric_production: "Producción Centrada en Bombardeos"
 CAS_ideas_bomber_centric_production_desc: "Al centrar nuestros esfuerzos de producción en bombarderos y tipos de aviones similares, podemos aplastar el espíritu de nuestros enemigos bombardeándolos hasta someterlos."
 CAS_ideas_assistance_department: "Departamento de Asistencia de Campo del Ejército"
 CAS_ideas_assistance_department_desc: "La AFAD es el departamento de preparación de rama conjunta que ayuda a coordinar las operaciones de combate del ejército."
 CAS_ideas_cascadian_armed_services_refined: "Servicios Armados de Cascadia (\"Refinados\")"
 CAS_ideas_cascadian_armed_services_refined_desc: "Gracias a la inversión continua de tiempo, energía y recursos, tanto humanos como materiales, finalmente hemos creado una fuerza militar operativa. Con esto, ahora podemos invertir más en el entrenamiento y la mejora del liderazgo de esta nueva fuerza de combate para que no se deteriore ni se desvanezca."
 CAS_ideas_domestic_stability_programs: "Programas de Estabilidad Doméstica"
 CAS_ideas_domestic_stability_programs_desc: "Los programas comunitarios, las reformas policiales y las maneras de conectar mejor con la ciudadanía son el objetivo principal de los DSP. Esperamos fomentar un sentido de unidad en lugar de una división perpetua."
 CAS_ideas_cambrian_unity_initiatives: "Iniciativas de Unidad Cámbrica"
 CAS_ideas_cambrian_unity_initiatives_desc: "Si queremos consolidar nuestras tierras y unir a la gente, entonces debemos crear programas que permitan a nuestra gente sentirse unida."
 CAS_ideas_civil_service_integration_programs: "Programas de Integración del Servicio Civil"
 CAS_ideas_civil_service_integration_programs_desc: "Para garantizar la cohesión social y fomentar la unidad nacional, primero debemos empezar a integrar y estandarizar los servicios civiles. De esta manera, podremos ser más proactivos en la difusión comunitaria y en las interacciones sociales con el público en general."
 cascadia_divided_we_fell: "Divididos Caímos"
 cascadia_divided_we_fell_desc: "La república ha desaparecido y, de entre las sombras, emergimos en nuestro pequeño rincón del continente. Lidiamos con la inestabilidad interna y una sociedad disfuncional en general, sin mencionar las tensiones con un grupo llamado la Resistencia de las Montañas Rocosas, que crecen cada día. Debemos asegurar nuestros recursos básicos antes de poder empezar a pensar en seguir adelante."
 cascadia_domestic_policies: "Departamento de Asuntos Domésticos"
 cascadia_domestic_policies_desc: "El Departamento de Defensa de EE. UU. (DoDA) es un departamento de políticas nacionales generales que busca mejorar la actitud del público hacia el exterior, así como ampliar el acceso a pilares nacionales clave como la investigación, la comunidad y algunos programas sociales. En resumen, el departamento garantiza el bienestar general de nuestra ciudadanía, en colaboración con otros departamentos y sus funciones más específicas, que pueden afectar las capacidades del DoDA."
 cascadia_federal_budgets: "Departamento de Presupuesto"
 cascadia_federal_budgets_desc: "El Departamento de Hacienda se encarga de regular los excedentes y, en general, los gastos del gobierno federal y sus diversos programas. Trabaja principalmente en conjunto con el Departamento del Tesoro."
 cascadia_tax_policies: "Departamento del Tesoro"
 cascadia_tax_policies_desc: "El Tesoro es responsable de la aplicación y la contabilidad de los ingresos generados por nuestra nación y su gente. El Departamento del Tesoro gestiona todos los ingresos generados y trabaja en conjunto con el Departamento de Presupuesto para crear un programa presupuestario y un código tributario equilibrados y relativamente justos para el funcionamiento general del país."
 cascadia_industrial_policies: "Departamento de Desarrollo Industrial"
 cascadia_industrial_policies_desc: "El Departamento de Desarrollo del Interior (DoID) es responsable de la regulación y el desarrollo nacional general de sus capacidades manufactureras e industriales. El departamento ayuda a optimizar el escaso terreno disponible para el desarrollo, ya que la agricultura, la vivienda y la urbanización limitan la capacidad general de nuestra nación para crecer, tanto en términos de población como económicos."
 cascadia_resource_management_policies: "Departamento de Trabajo"
 cascadia_resource_management_policies_desc: "El Departamento de Trabajo es responsable del empleo y la estructura de la fuerza laboral de nuestro país. Colabora con el Departamento de Defensa (DoDA) y el Departamento de Desarrollo del Interior (DoID) para garantizar una fuerza laboral flexible y funcional, capaz de adaptarse e integrarse en la economía en su conjunto."
 cascadia_army_service_branch: "Ejército de Montaña de Cascadia"
 cascadia_army_service_branch_desc: "La CMA es la rama militar de las Fuerzas Militares de Cascadia. Esta rama es el elemento terrestre, especializado en la guerra de montaña y de tipo montañoso, debido a las diversas cordilleras que conforman el territorio de Cascadia."
 cascadia_air_force_service_branch: "Fuerza Aérea de Cascadia"
 cascadia_air_force_service_branch_desc: "Las Fuerzas Armadas de la Costa Atlántica (CAF) son la rama de aviación de las Fuerzas Militares de la Cascada. Esta rama es el elemento aéreo que tiende a especializarse en entrenamiento de agilidad debido al terreno accidentado e irregular que debe sortear al intentar cualquier ataque terrestre."
 cascadia_navy_service_branch: "Armada de Cascadia"
 cascadia_navy_service_branch_desc: "La Armada de Cascadia (CN) es la rama naval de las Fuerzas Militares de Cascadia. Esta rama es el componente marítimo que defiende las aguas costeras y los pueblos y ciudades dispersos a lo largo del litoral del país. Si bien no es una característica única, la Armada de Cascadia cuenta con una mayor ventaja defensiva debido a la composición y el campo de entrenamiento de las aguas costeras del estado de Washington."
