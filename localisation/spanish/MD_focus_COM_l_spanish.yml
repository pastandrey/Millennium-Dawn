 COM_pro_federalist: "Resultados del Referéndum: Profederalista"
 COM_anti_federalist: "Resultados del Referéndum: Gobierno Centralista"
 COM_successful_operation: "La Operación fue Exitosa"
 COM_robert_denard_seized_power: "§YRobert Dennard§! Tomó el poder"
 COM_expanded_private_military_operations: "Operaciones Militares Privadas Ampliadas"
 COM_disbanded_presidential_guard: "Disuelta la §YGuardia Presidencial§!"
 COM_island_warlord: "Señor de la guerra de la Isla"
 COM_our_own_path: "Nuestro Propio Camino"
 COM_our_own_path_desc: "Es hora de que Comoras trace su propio rumbo. Al adaptar nuestras fuerzas armadas a las necesidades y desafíos únicos de nuestra nación, podemos construir una fuerza enfocada y adaptable. Desarrollar nuestra propia doctrina nos garantizará estar preparados para cualquier conflicto que pueda surgir, en lugar de depender de modelos extranjeros que no se adaptan a nuestras circunstancias."
 COM_spread_the_disarmament_education: "Difundir la Educación para el Desarme"
 COM_spread_the_disarmament_education_desc: "La difusión de la educación para el desarme desde el UNREC nos ayudará a desarmar a nuestras fuerzas armadas y alentará a nuestros hermanos y hermanas africanos a hacer lo mismo."
 COM_denounce_nuclear_weapons: "Denunciar las Armas Nucleares"
 COM_denounce_nuclear_weapons_desc: "Es hora de que lideremos el camino en África y denunciemos las armas nucleares del mundo y sigamos garantizando que África siga comprometida con la no proliferación nuclear."
 COM_east_african_disarmament: "Desarme de África Oriental"
 COM_east_african_disarmament_desc: "La región de África Oriental es escenario de numerosos conflictos, y el desarme de estas naciones es crucial para mantener la paz y la estabilidad en la región. Al cooperar con la Iniciativa de Desarme de África Oriental, podemos avanzar hacia el desarme de nuestras fuerzas armadas y demostrar nuestro compromiso con un futuro pacífico y seguro para la región."
 COM_peaceful_disarmament: "Desarme Pacífico"
 COM_peaceful_disarmament_desc: "Debemos liderar el camino en África y desarmar a nuestras fuerzas armadas y demostrar nuestro compromiso con un futuro pacífico y seguro para el continente africano desarmando a nuestra nación."
 COM_total_ban_on_personal_weapons: "Prohibición Total de Armas Personales"
 COM_total_ban_on_personal_weapons_desc: "Es hora de prohibir todas las armas personales en nuestra nación y realizar una campaña específica para recomprar todas las armas a nuestros ciudadanos."
 COM_new_african_pacifism: "Nuevo Pacifismo Africano"
 COM_new_african_pacifism_desc: "Alentar a todas las naciones africanas a abordar una nueva era de paz y pacifismo armado sólo nos permitirá tener un futuro fuerte, estable y próspero."
 COM_a_shining_example_of_peace: "Un Ejemplo Brillante de Paz"
 COM_a_shining_example_of_peace_desc: "Debemos ser un ejemplo brillante de paz y desarme para el resto de África. Al desarmar a nuestras fuerzas armadas y demostrar nuestro compromiso con un futuro pacífico y seguro para el continente africano, podemos inspirar a otras naciones a hacer lo mismo."
 COM_expanded_military_industries: "Industrias Militares Ampliadas"
 COM_expanded_military_industries_desc: "Las industrias militares de [COM.GetName] necesitan desesperadamente una revitalización después de que el país continúa subcontratando la producción de armas militares de nuestra nación."
 COM_invite_the_pmcs: "Invitar a los PMC"
 COM_invite_the_pmcs_desc: "Diversas empresas militares privadas en África y el mundo serían excelentes opciones para complementar nuestras fuerzas de seguridad y defensa. Deberíamos contactarlas e invitarlas a ampliar nuestra capacidad de combate si alguna vez se nos pide que tomemos las armas."
 COM_expand_the_presidential_guard: "Ampliar la Guardia Presidencial"
 COM_expand_the_presidential_guard_desc: "La Guardia Presidencial es una de las piedras angulares de nuestra gran nación y una fuerza de combate de élite en África Oriental. Deberíamos considerar el despliegue de otro regimiento de estos combatientes para apoyar nuestras ambiciones en la costa de África Oriental."
 COM_reform_defunct_pmc_units: "Reforma de las Unidades PMC Extintas"
 COM_reform_defunct_pmc_units_desc: "Se pueden rastrear múltiples compañías militares privadas extintas hasta los diversos conflictos en África o en las Comoras, y ahora es el momento de acercarse y reformar estas unidades con las Comoras como su base de operaciones."
 COM_expand_the_defense_force: "Reorganizar la Fuerza de Defensa"
 COM_expand_the_defense_force_desc: "La Fuerza de Defensa de las Comoras constituye el último tercio de nuestras unidades armadas: deberíamos reorganizarlas para que trabajen en armonía con las propias Fuerzas de Defensa de las Comoras."
 COM_homegrown_military_manufacturing: "Fabricación Militar Local"
 COM_homegrown_military_manufacturing_desc: "[COM.GetName] no es conocido por su fabricación militar, pero si continuamos apoyando a las empresas locales y fomentamos nuevas organizaciones industriales militares dentro de nuestra nación."
 COM_the_eastern_african_entrepot: "El Entrepot de África Oriental"
 COM_the_eastern_african_entrepot_desc: "Comoras se encuentra en una posición sumamente ventajosa para convertirse en el centro económico de la costa oriental africana. Deberíamos expandir nuestros puertos y buscar desarrollar y formalizar alianzas económicas mucho más integrales con otras naciones."
 COM_expand_the_prince_said_irabhim_airport: "Ampliar el Aeropuerto Príncipe Said Irabhim"
 COM_expand_the_prince_said_irabhim_airport_desc: "El aeropuerto fue inaugurado en 1975 y es el único aeropuerto internacional de las Comoras y el centro de la aerolínea nacional, Comoros Aviation."
 COM_expand_available_helicopters: "Ampliar Helicópteros Disponibles"
 COM_expand_available_helicopters_desc: "Nuestra flota actual de helicópteros está obsoleta y debe ser reemplazada. Al adquirir nuevos helicópteros, podemos mejorar nuestras capacidades y asegurarnos de estar preparados para proteger eficazmente la nación y responder a cualquier amenaza a nuestra soberanía."
 COM_comorian_politics: "Política Comorana"
 COM_comorian_politics_desc: "El poderío militar es sólo la mitad de la ecuación de la política internacional: también deberíamos educar a nuestros diplomáticos para que podamos ampliar nuestro alcance más allá de nuestras propias costas."
 COM_social_democracy_in_africa: "Diamante Socialdemócrata de África"
 COM_social_democracy_in_africa_desc: "La Socialdemocracia ofrece un enfoque equilibrado de gobernanza, combinando economías de mercado con políticas sociales destinadas a reducir la desigualdad, mejorar el acceso a la educación y la atención médica, y promover el desarrollo sostenible. Al adoptar los principios socialdemócratas, las Comoras pueden allanar el camino hacia un crecimiento inclusivo y un futuro más prometedor para sus ciudadanos."
 COM_a_true_democracy: "La Verdadera Democracia"
 COM_a_true_democracy_desc: "Al mantenerse firme en su compromiso con los ideales democráticos, las Comoras pueden fomentar la estabilidad, promover el crecimiento económico, salvaguardar los derechos humanos y empoderar a sus ciudadanos, todos ellos elementos cruciales para lograr una prosperidad duradera."
 COM_our_partnership: "Asociación con EE.UU."
 COM_our_partnership_desc: "Una alianza estratégica con Estados Unidos puede resultar decisiva. Este artículo pretende destacar las razones de peso por las que las Comoras deberían fomentar la cooperación con Estados Unidos, ya que esta puede generar oportunidades, mejorar la estabilidad económica, promover avances tecnológicos y fomentar el progreso social."
 COM_anti_nato_ally: "PMC Wagner en Comoras"
 COM_anti_nato_ally_desc: "Necesitamos que el gobierno contrate a la PMC Wagner en nuestro país. Puede que Francia quiera protegernos, pero tener nuestra propia fuerza siempre es mejor."
 COM_clearing_the_nomenclature: "Aclarando la Nomenclatura"
 COM_clearing_the_nomenclature_desc: "¡Aclarar la nomenclatura debería ser nuestra máxima prioridad para nuestra nueva agenda! ¿Por qué esos molestos apaciguadores occidentales siquiera abren la boca para generar ruido en torno a nuestro nuevo y sagrado gobierno?"
 COM_pan_arabism: "Panislamismo"
 COM_pan_arabism_desc: "Aunque seamos un caso aparte en términos geográficos, al centrarnos en lo que nos une al resto del mundo árabe podemos generar un sentimiento de hermandad que seguramente durará eternamente."
 COM_the_warrior_king: "El Rey Guerrero"
 COM_the_warrior_king_desc: "Denard ha tomado el poder en [COM.GetName]. Un hombre del pueblo, un hombre del ejército y un hombre de las empresas militares privadas, ahora ostenta el título de \"El Rey Guerrero\". Podemos prepararnos para apoyar a diversos gobiernos en los diversos conflictos del mundo para generar ingresos y establecer [COM.GetName] como la sede principal de todas las empresas militares privadas del mundo."
 COM_the_consolidation_of_power: "La Consolidación del Poder"
 COM_the_consolidation_of_power_desc: "Aunque gobernemos con la espada, aún debemos consolidar nuestro poder en el archipiélago; de lo contrario, corremos el riesgo de perder todo lo que hemos ganado. Es hora de consolidar nuestro poder."
 COM_legitimize_our_rule: "Legitimar Nuestro Gobierno"
 COM_legitimize_our_rule_desc: "Nuestro enfoque ahora debería ser legitimar nuestro gobierno, ya sea mediante nuestra propia autoadministración o solicitando el reconocimiento de las grandes potencias de la región."
 COM_declare_the_state_of_pmcs: "Declarar el Estado de las PMC"
 COM_declare_the_state_of_pmcs_desc: "Ahora que nuestro país se ha establecido y nuestro gobierno se ha legitimado y consolidado, podemos consagrar y proteger oficialmente el estado de las empresas militares privadas. Establecer el estado de las empresas militares privadas generará un gran crecimiento económico y aumentará nuestra influencia en el extranjero... o eso esperamos."
 COM_a_rifle_for_hire: "Un Rifle de Alquiler"
 COM_a_rifle_for_hire_desc: "Al nacionalizar algunas de las empresas militares privadas y alquilar a nuestros militares de manera similar a los mercenarios, podemos esperar seguir aumentando nuestra participación y división de las ganancias."
 COM_expanded_regional_operations: "Operaciones Regionales Ampliadas"
 COM_expanded_regional_operations_desc: "Establecer nuestras operaciones militares y ampliar sus capacidades nos permitirá enviar nuestras fuerzas armadas a varias partes de la región."
 COM_expanded_global_operations: "Operaciones Globales Ampliadas"
 COM_expanded_global_operations_desc: "Ahora que nuestra empresa militar privada ha recibido financiación y apoyo, podemos enviar nuestras fuerzas a diversos conflictos globales, en lugar de sólo a los conflictos africanos."
 COM_the_zanzibar_agreement: "El Acuerdo de Zanzíbar"
 COM_the_zanzibar_agreement_desc: "Nos hemos puesto en contacto con [253.OWNER.GetName] para negociar la venta de [253.GetName] y ampliar el territorio disponible en el país. Hemos presentado un acuerdo de transferencia del estado y una propuesta."
 COM_anti_colonialist_propaganda: "Propaganda Anticolonialista"
 COM_anti_colonialist_propaganda_desc: "Muchos países africanos quedaron rezagados cuando Francia se retiró de África. Con el enfoque adecuado, podemos volver locos a muchos rápidamente."
 COM_the_constitutional_referendum: "El Referéndum de la Federación"
 COM_the_constitutional_referendum_desc: "La situación jurídica de cada una de las islas de las Comoras ha sido incierta durante algún tiempo, por lo que se ha convocado un referéndum para aprobar o rechazar las enmiendas a la Constitución que permitan a las Comoras formar una Federación."
 COM_greater_inter_island_cooperation: "Mayor cooperación interinsular"
 COM_greater_inter_island_cooperation_desc: "La situación de Bacar nos ha demostrado que la autonomía puede salirse de control: debemos prestar atención y fomentar una mayor cooperación entre las islas."
 COM_the_tourism_industry: "La Industria del Turismo"
 COM_the_tourism_industry_desc: "Como nación insular, el turismo es un importante factor clave en la economía del país. Visitantes de todo el mundo pueden optar por recorrer el volcán Karthala, el Parque Marino de Mohéli y las diversas playas y selvas que cubren las diversas islas del archipiélago. La mayor parte del turismo se centra en Anjouan y Gran Comora, así como en la singular fusión de culturas árabe, africana y francesa en maravillosa armonía."
 COM_agricultural_developments: "Desarrollos agrícolas"
 COM_agricultural_developments_desc: "La agricultura constituye la columna vertebral de nuestra economía, emplea a la mayoría de nuestra población y produce nuestras exportaciones más valiosas. Al invertir en técnicas agrícolas modernas, infraestructura de riego y educación agrícola, podemos impulsar la productividad y garantizar la seguridad alimentaria de nuestra población."
 COM_fishery_industry_investment: "Inversiones en la industria pesquera"
 COM_fishery_industry_investment_desc: "Como nación insular, las aguas que rodean las Comoras son ricas en vida marina. Invertir en nuestra industria pesquera no solo generará empleo para las comunidades costeras, sino que también creará una industria exportadora sostenible que pueda competir en los mercados internacionales."
 COM_comorian_forestry: "Silvicultura comorense"
 COM_comorian_forestry_desc: "Nuestras islas están cubiertas de exuberantes bosques tropicales que ofrecen valiosos recursos madereros. Mediante la implementación de prácticas forestales sostenibles y una gestión adecuada, podemos desarrollar este sector y, al mismo tiempo, preservar nuestro entorno natural para las generaciones futuras."
 COM_join_the_world_trade_organization: "Únase a la Organización Mundial del Comercio"
 COM_join_the_world_trade_organization_desc: "La pertenencia a la Organización Mundial del Comercio abrirá nuevos mercados para nuestras exportaciones, nos dará voz en las negociaciones comerciales internacionales y nos ayudará a integrarnos más plenamente en la economía global. Los mecanismos de resolución de disputas de la OMC también protegerán nuestros intereses económicos en el extranjero."
 COM_trade_deals_with_madagascar: "Acuerdos Comerciales con Madagascar"
 COM_trade_deals_with_madagascar_desc: "Madagascar es nuestro vecino más cercano y un socio comercial natural. Fortalecer los lazos económicos con él reducirá los costos de envío, aumentará el volumen comercial y fomentará la cooperación regional que beneficia a ambas naciones."
 COM_trade_deals_with_tanzania: "Acuerdos Comerciales con Tanzania"
 COM_trade_deals_with_tanzania_desc: "Tanzania es un importante centro económico en África Oriental con fuertes conexiones con la región. Establecer acuerdos comerciales integrales con este país nos brindará un mejor acceso al mercado de África Oriental y fortalecerá nuestra posición en las redes comerciales regionales."
 COM_cooperation_with_east_africa: "Cooperación con la EAU"
 COM_cooperation_with_east_africa_desc: "El concepto de la Unión de África Oriental (UAE) contempla una iniciativa de integración regional que reúne a los países de África Oriental en una entidad económica, política y social unificada. Si bien actualmente no existe una Unión de África Oriental formal, se han realizado esfuerzos continuos para promover la cooperación y la integración regional entre las naciones de África Oriental."
 COM_trading_with_east_africa: "Inversiones en África Oriental"
 COM_trading_with_east_africa_desc: "Invertir mutuamente en el marco de la Unión de África Oriental (UAE) ofrece un gran potencial para el desarrollo económico y la prosperidad de la región. Al promover las inversiones intrarregionales, las naciones de África Oriental pueden aprovechar sus recursos, experiencia y mercados colectivos para impulsar el crecimiento, crear oportunidades de empleo y reducir la dependencia de actores externos. Estas inversiones pueden adoptar diversas formas y contribuir a múltiples sectores, como infraestructura, agricultura, manufactura, servicios y tecnología."
 COM_state_of_the_pmcs_idea: "Estado de los PMC"
 COM_state_of_the_pmcs_idea_desc: "Al reconocer y apoyar oficialmente a las empresas militares privadas como instituciones legítimas dentro de nuestra nación, hemos creado un modelo económico único donde las empresas militares privadas contribuyen significativamente a nuestro PIB y a nuestras capacidades militares. El Estado facilita activamente sus operaciones a cambio de garantías de seguridad y beneficios económicos."
 COM_expanded_regional_operations_idea: "Operaciones Regionales Ampliadas"
 COM_expanded_regional_operations_idea_desc: "Nuestras fuerzas militares y de las PMC ahora pueden desplegarse en toda la región de África Oriental. Este alcance operativo ampliado nos permite participar en contratos de seguridad, misiones de mantenimiento de la paz y operaciones de apoyo militar en los estados vecinos."
 COM_expanded_global_operations_idea: "Operaciones Globales Ampliadas"
 COM_expanded_global_operations_idea_desc: "Con financiación y apoyo suficientes, nuestras fuerzas militares privadas ahora pueden aceptar contratos en todo el mundo, en lugar de limitar sus operaciones a África. Este alcance global aumenta significativamente el potencial de ingresos y consolida a las Comoras como un actor clave en la industria de la seguridad internacional."
 COM_comorian_political_decisions: "[COM.GetAdjective] Decisiones Políticas"
 COM_comorian_political_decisions_desc: "Decisiones políticas clave relativas al aparato de seguridad y las políticas mercenarias de las Comoras."
 COM_disband_the_presidential_guard_decision: "Disolver la Guardia Presidencial"
 COM_disband_the_presidential_guard_decision_desc: "La Guardia Presidencial se ha convertido en un símbolo del autoritarismo y la influencia mercenaria en las Comoras. La disolución de esta fuerza marcará el inicio de una nueva era de gobernanza democrática, aunque podría dejarnos vulnerables a futuras amenazas a la seguridad."
 COM_hire_control_risks_decision: "Formar el Ala Paramilitar del Grupo de Control de Riesgos"
 COM_hire_control_risks_decision_desc: "Control Risks Group es una consultora de riesgos británica que ofrece servicios profesionales de seguridad. Si bien son más costosos que otras opciones, su reputación de discreción y profesionalismo los convierte en la opción ideal para mantener la estabilidad en nuestra frágil nación."
 COM_hire_executive_outcomes_decision: "Resultados de la Reforma Ejecutiva"
 COM_hire_executive_outcomes_decision_desc: "Executive Outcomes es una empresa militar privada Sudafricana con una reputación controvertida. Su experiencia en zonas de conflicto africanas podría proporcionarnos una importante experiencia militar, aunque su presencia podría generar inquietud internacional y desestabilizar a nuestro gobierno."
 COM_hire_defense_systems_decision: "Reforma de los Sistemas de Defensa"
 COM_hire_defense_systems_decision_desc: "Defense Systems Limited es una empresa militar privada Británica que operó durante la Guerra Fría. Reformar esta organización podría proporcionarnos contratistas de seguridad experimentados que comprendan las complejidades de la defensa de las pequeñas naciones insulares."
 COM_hire_watchguard_decision: "Reforma Watchguard"
 COM_hire_watchguard_decision_desc: "WatchGuard International era una empresa militar privada Británica que cesó sus operaciones en 1972. Revivir esta organización nos daría acceso a mercenarios con un historial probado, aunque sus tácticas agresivas podrían dañar nuestra reputación internacional."
 COM_reform_7_independent_company_decision: "Reforma de la 7ª Compañía Independiente"
 COM_reform_7_independent_company_decision_desc: "La 7.ª Compañía Independiente era la compañía de Robert Denard en Rodesia. Reformar esta unidad permitirá una unidad específicamente leal a nuestro rey guerrero, pero leal a Denard."
