l_spanish:
 comoros_focus: "Árbol de Enfoque de Comoras"
 COM_non_nato_ally: "Más cerca de la OTAN"
 COM_non_nato_ally_desc: "Deberíamos esforzarnos por cooperar y, tal vez en el futuro, integrarnos en la OTAN. Francia es nuestro aliado más cercano de allí y no debemos olvidarlo."
 COM_got_support: "Se brinda apoyo"
 COM_buy_missile_defences: "Adquisición de Defensa Aérea Francesa"
 COM_buy_missile_defences_desc: "La adquisición de los sistemas de defensa aérea franceses refleja las sólidas relaciones bilaterales entre Comoras y Francia. Demuestra el compromiso de Francia de apoyar las necesidades de defensa de Comoras y refuerza los vínculos entre las dos naciones. Los sistemas de defensa aérea franceses son reconocidos por su fiabilidad, eficacia y tecnología avanzada, lo que los convierte en una opción ideal para que Comoras fortalezca sus capacidades de defensa."
 COM_buy_missile_defences_rus: "Adquisición de Defensa Aérea Rusa"
 COM_buy_missile_defences_rus_desc: "Al asociarse con Rusia, Comoras pretende beneficiarse de la experiencia y los conocimientos de una industria de defensa de renombre. Rusia tiene una larga reputación en el desarrollo de sistemas de defensa aérea robustos y los ha desplegado con éxito en varias regiones del mundo. Esta colaboración no solo proporcionará a Comoras tecnología de vanguardia, sino que también facilitará la transferencia de conocimientos y las oportunidades de capacitación para garantizar la utilización eficaz de los sistemas adquiridos."
 COM_tighter_chi_cooperation: "Cooperación más estrecha con China"
 COM_tighter_chi_cooperation_desc: "Profundizar la cooperación con China es crucial para Comoras. La asociación económica y política con el dragón del este seguramente evitará que la influencia occidental interfiera en nuestra política."
 COM_befriend_the_east: "Hacer amistad con Oriente"
 COM_befriend_the_east_desc: "Comoras debería poner toda su fuerza política en mejorar las relaciones con China, Rusia y otros países del este."
 anjouan_rebellion: "¡Rebelión de Anjouan!"
 COM_trade_deals_with_india: "Acuerdos comerciales con India"
 COM_trade_deals_with_india_desc: "India es uno de los mayores socios económicos e importadores de nuestros productos. Necesitamos fortalecer la cooperación mutua para garantizar la prosperidad económica."
 COM_trade_deals_with_singapore: "Comercio con Singapur"
 COM_trade_deals_with_singapore_desc: "Singapur es uno de los mayores socios económicos e importadores de nuestros productos.  Necesitamos fortalecer la cooperación mutua para garantizar la prosperidad económica."
 COM_ministry_of_economy: "Ministerio de Economía"
 COM_ministry_of_economy_desc: "El Ministerio de Economía debe revitalizar nuestra base tecnológica e introducir nuevos métodos de producción para que Comoras pueda aumentar su progreso industrial."
 COM_trading_with_west: "Cooperación con Francia"
 COM_trading_with_west_desc: "Incrementar la cooperación con Francia es importante para la economía de Comoras, ya que los inversores franceses están casi listos para comenzar a invertir en nosotros..."
 COM_french_investments: "Inversiones francesas"
 COM_french_investments_desc: "Ahora, después de incrementar las relaciones con los franceses, ha llegado el momento de pedir inversiones."
 COM_russian_investments: "Inversiones rusas"
 COM_russian_investments_desc: "Ahora, después de incrementar las relaciones con los rusos, ha llegado el momento de pedir inversiones."
 COM_trading_with_east: "Buscar dinero ruso"
 COM_trading_with_east_desc: "Incrementar la cooperación con Rusia es importante para la economía de Comoras, ya que los inversores franceses están casi listos para comenzar a invertir en nosotros..."
 COM_military_coop_easaf: "Cooperación militar de la Unión Africana del Este (EAU)"
 COM_military_coop_easaf_desc: "La realización de ejercicios militares por parte de la Unión de África Oriental (UAE) puede ser un elemento crucial para fortalecer la seguridad regional, fomentar la cooperación entre los Estados miembros y mejorar las capacidades de defensa colectiva de la región de África Oriental. Estos ejercicios brindan la oportunidad de realizar entrenamiento conjunto, compartir información y coordinar fuerzas militares, lo que en última instancia contribuye a la estabilidad regional y a los esfuerzos de mantenimiento de la paz."
 COM_army: "Ejército de Desarrollo Nacional"
 COM_army_desc: "El ejército comorense, oficialmente conocido como Ejército de Desarrollo Nacional, es una fuerza pequeña pero profesional. Además del ejército, cuenta con una fuerza policial de 500 miembros y una fuerza de defensa de 500 miembros, ambas responsables de salvaguardar las fronteras del país y mantener la integridad territorial del archipiélago."
 COM_mission_from_unrec: "La Misión de UNREC"
 COM_mission_from_unrec_desc: "El Centro Regional de las Naciones Unidas para la Paz y el Desarme (UNREC) se dedica a prevenir la proliferación de armas nucleares y promover el desarme entre las naciones involucradas en conflictos africanos. Al cooperar con el UNREC, podemos avanzar hacia el desarme de nuestras fuerzas armadas y demostrar nuestro compromiso con un futuro pacífico y seguro para el continente africano."
 COM_african_mercenaries: "Mercenarios africanos"
 COM_african_mercenaries_desc: "El continente africano alberga innumerables combatientes experimentados, muchos de los cuales han adquirido una valiosa experiencia en los numerosos conflictos de la región. Al reclutar a estos hábiles mercenarios, podemos mejorar la organización y la eficacia de nuestras fuerzas armadas, asegurándonos de que estén mejor preparadas para los desafíos de la guerra moderna."
 COM_modernize_the_army: "Modernizar las Fuerzas de Seguridad de Comoras"
 COM_modernize_the_army_desc: "Las Fuerzas de Seguridad Comoranas (FSC) necesitan urgentemente una modernización si queremos ser consideradas una nación que exige respeto."
 COM_expand_the_police_force: "Militarizar la Fuerza Policial"
 COM_expand_the_police_force_desc: "Nuestra fuerza policial tiene aproximadamente el mismo tamaño que el ejército, y dado la inestabilidad de nuestro pasado reciente, a veces puede ser difícil distinguir la diferencia. Podríamos permitirles desempeñar adecuadamente roles duales."
 COM_naval_treaty_with_france: "Tratado de Defensa Franco-Comoriano"
 COM_naval_treaty_with_france_desc: "Dada nuestra historia compartida, la interferencia francesa en los asuntos de Comoras es algo común. El tratado de defensa naval permite que Francia tenga acceso militar a nuestras aguas, pero puede ser nuestra única opción si queremos convertirnos en una verdadera potencia naval nosotros mismos."
 COM_naval_treaty_with_china: "Tratado de Defensa Chino-Comoriano"
 COM_naval_treaty_with_china_desc: "Dada nuestra historia compartida, la interferencia francesa en los asuntos de Comoras es algo común. Debemos luchar contra su influencia invitando a otras potencias extranjeras a participar en nuestros asuntos locales."
 COM_modernize_the_patrol_boats: "Modernizar los Barcos Patrulla"
 COM_modernize_the_patrol_boats_desc: "Nuestra actual 'Armada de Comoras' consta de ¡solo 2 barcos patrulla japoneses... comisionados en 1981! No hace falta decir que necesitan una actualización urgente."
 COM_buy_patrol_boats: "Cantidad sobre Calidad"
 COM_buy_patrol_boats_desc: "Nuestra 'Armada' no puede alejarse de nuestras costas más que unos pocos kilómetros. Si queremos proyectar poder en el extranjero, deberíamos tener algunas corbetas en nuestra flota."
 COM_expand_the_dockyards: "Expandir los Astilleros"
 COM_expand_the_dockyards_desc: "Más astilleros significan más barcos, y nuestra armada necesita desesperadamente más barcos."
 COM_fortress_comoros: "Fortaleza Comoras"
 COM_fortress_comoros_desc: "Nuestras fuerzas armadas, limitadas y de pequeña escala, no pueden garantizar nuestra seguridad de forma permanente. Deberíamos construir una serie de fortificaciones estratégicas a lo largo de nuestras costas y laderas frente al mar para disuadir las invasiones navales enemigas."
 COM_air_force: "Establecer una Fuerza Aérea de Comoras"
 COM_air_force_desc: "¡Solo hay unos pocos comorenses con habilidades suficientes para pilotar una aeronave, y mucho menos un avión de combate! Aun así, si queremos conquistar los cielos, necesitaremos una Fuerza Aérea."
 COM_new_aircraft_purchases: "Nuevas Compras de Aeronaves"
 COM_new_aircraft_purchases_desc: "Nuestros aviones actuales están horriblemente obsoletos. Compremos los planos de modelos que sean relevantes en el nuevo milenio.\n\nAhora corren rumores de que los suecos están sobornando a países para que compren sus JAS Gripen. Deberíamos conseguir algunos de esos."
 COM_introduce_democracy: "Introducir la Democracia"
 COM_introduce_democracy_desc: "La multitud de golpes de Estado en las últimas décadas nos ha enseñado que las dictaduras no son muy estables. Introduzcamos una verdadera democracia y dejemos que el pueblo acceda al poder."
 COM_befriend_the_west: "Hacer Amigos en Occidente"
 COM_befriend_the_west_desc: "Las Potencias Occidentales siempre están en busca de historias de transiciones exitosas hacia la democracia en África. Sin duda nos respaldarán con todo lo que necesitemos."
 COM_tighter_edf_cooperation: "Cooperación Más Estrecha con el FED"
 COM_tighter_edf_cooperation_desc: "Como miembro del Fondo Europeo de Desarrollo (FED), tenemos derecho a recibir ayuda de la Unión Europea para el desarrollo de nuestro país. No desaprovecharemos tal oportunidad. ¡Abrámonos a una cooperación mucho más estrecha!"
 COM_maintain_dictatorship: "Mantener una Dictadura Militar"
 COM_maintain_dictatorship_desc: "Muchos años de inestabilidad nos han enseñado que Comoras necesita a un líder fuerte en el poder, guiando al país con mano firme pero suave."
 COM_draw_closer_to_the_au: "Acercarse a África"
 COM_draw_closer_to_the_au_desc: "Las dictaduras militares son algo común en África, y la Unión Africana puede que no nos vea como monstruos por rechazar las tendencias democráticas. Es hora de descubrir quiénes son nuestros amigos."
 COM_ohada: "OHADA"
 COM_ohada_desc: "La Organización para la Armonización del Derecho Mercantil en África (OHADA) se fundó en Mauricio en 1993 con el objetivo de permitir más oportunidades de inversión empresarial en África. Como único miembro del este de África, tenemos una posición única y mucho que ganar."
 COM_form_tanzancom: "Formar TanZanCom"
 COM_form_tanzancom_desc: "La unión política entre Tanganica y Zanzíbar no ha sido perfecta. ¡Pero los sueños de Nyerere siguen más vivos que nunca! Debemos buscar unirnos a la unión. Por el bien de hacer el nombre más fácil, Tanzania quiere conservar su nombre tal como está."
 COM_influence_of_islam: "La Influencia del Islam"
 COM_influence_of_islam_desc: "Comoras es una nación profundamente islámica, incluso representada en nuestra bandera. Cualquiera que sea Comoras, siempre será primero y ante todo islámica."
 COM_closer_ties_with_arab_league: "Estrechar Lazos con la Liga Árabe"
 COM_closer_ties_with_arab_league_desc: "Somos parte de la Liga Árabe, pero somos, con mucho, el miembro más austral de la organización y estamos geográficamente aislados. Deberíamos tomar medidas para acortar la distancia diplomática que no podemos acortar geográficamente."
 COM_seek_help_from_the_saudis: "Buscar Ayuda de los Sauditas"
 COM_seek_help_from_the_saudis_desc: "Saudi Arabia is the oldest and largest player in the Islamic world and are sure to help their Sunni brothers of the Comoros if asked."
 COM_befriend_baath: "Acercarse al baazismo"
 COM_befriend_baath_desc: "Un enfoque panárabe más laico es más adecuado para las Comoras. Necesitamos estrechar lazos con Siria e Irak para promover el Baazismo en nuestro país."
 COM_ayatollah_sambi: "Las ambiciones del ayatolá Sambi"
 COM_ayatollah_sambi_desc: "Ahmed Abdallah Mohamed Sambi, popularly known as 'Ayatollah', is a prominent Islamic leader in the Comoros. He is very popular and even a contender for political power in the country. His knowledge in the principles of Islam can prove invaluable."
 COM_declare_islamic_republic: "Declarar una República Árabe"
 COM_declare_islamic_republic_desc: "El ayatolá Sambi está ahora en condiciones de pedir el establecimiento de una verdadera República Árabe de las Comoras. ¡Convirtamos esta antigua colonia en una joya del mundo islámico!"
 COM_ghost_of_colonialism: "El fantasma del colonialismo"
 COM_ghost_of_colonialism_desc: "Aunque somos independientes, el fantasma de los colonialistas franceses se cierne sobre nuestra pequeña nación insular y, con la continua ocupación francesa de Mayotte, es poco probable que desaparezca en el corto plazo. ¿Cómo debemos tratar con nuestra otrora señor supremo Francia?"
 COM_embrace_francafrique: "Abrazar Francia"
 COM_embrace_francafrique_desc: "'Françafrique' is a term used for the influence of France over its former colonial possessions in Africa. We don't find it pejorative - in fact we welcome and embrace it. France contributed massively to our development and we are thankful for that contribution."
 COM_intensify_coi_engagement: "Intensificar la participación en la COI"
 COM_intensify_coi_engagement_desc: "La Comisión del Océano Índico (COI) está formada por cinco naciones africanas del Océano Índico: Comoras, Madagascar, Mauricio, Reunión (una región de ultramar de Francia) y Seychelles. Trabajar con la COI es nuestra mejor manera de demostrar que somos un activo valioso para los franceses."
 COM_rejoin_france: "Un departamento de ultramar de Francia"
 COM_rejoin_france_desc: "Hemos recibido noticias de que los franceses están considerando activamente permitirnos reunirnos con ellos como territorio de ultramar. Las Comoras han visto más inestabilidad de la que les correspondía desde su independencia y la población ahora anhela los años estables del señorío francés."
 COM_antagonize_france: "Distancia desde Francia"
 COM_antagonize_france_desc: "Deberíamos intentar distanciarnos de nuestros antiguos señores coloniales y comenzar a adoptar una política exterior más independiente y buscar la posibilidad de reunificar nuestro archipiélago."
 COM_demand_mayotte: "Demanda Mayotte a Francia"
 COM_demand_mayotte_desc: "Nuestro odio hacia los tiranos franceses ha llegado a un punto en el que hay llamados activos a la guerra entre nuestra población. Aunque nos superen en número, nuestra determinación es firme y la justicia está de nuestro lado. ¡Si Dios quiere, prevaleceremos!"
 COM_expand_moroni: "Expandir Moroni"
 COM_expand_moroni_desc: "Moroni es nuestra capital en la isla Grande Comoro. Es una primera opción obvia para cualquier expansión industrial."
 COM_kickstart_economy: "Impulsar la economía"
 COM_kickstart_economy_desc: "La economía de las Comoras se encuentra entre las peores del mundo y nuestro pueblo está desesperado por mejorar. No podemos quedarnos sentados esperando a que lleguen los inversores extranjeros o la ayuda exterior: es hora de ocuparnos directamente de la economía."
 COM_vanilla_exports: "Exportaciones de vainilla"
 COM_vanilla_exports_desc: "Vanilla is one of our main exports, and a product that is used almost universally. Let's crank up the production and reap the benefits."
 COM_ylang_ylang: "Ylang-ylang"
 COM_ylang_ylang_desc: "El árbol tropical cananga odorata tiene flores de las que se puede extraer un aceite esencial llamado ylang-ylang. Este aceite tiene numerosos beneficios declarados y parece estar de moda en Occidente y Oriente. Aún mejor, sólo crece en muy pocos lugares de la Tierra, incluidas las Comoras."
 COM_expand_on_anjouan: "Ampliar Anjouan"
 COM_expand_on_anjouan_desc: "Es importante difundir las expansiones industriales en las islas y, dado que Anjouan es la segunda isla más grande de las Comoras, deberíamos centrarnos en ellas a continuación."
 COM_expand_on_moheli: "Ampliar Moheli"
 COM_expand_on_moheli_desc: "Moheli es la más pequeña de las Islas Comoras, pero aún así es lo suficientemente grande como para que tenga sentido cultivar un sector industrial en la isla."
 COM_a_federal_union: "Una unión federal"
 COM_a_federal_union_desc: "El referéndum fue un éxito y ahora somos la Unión de las Comoras, una federación de islas que tienen cada una un alto grado de autonomía."
 COM_Loi_des_competences: "Ley de Habilidades"
 COM_Loi_des_competences_desc: "Se elaborará una Ley de Competencias (Loi des Compétences) para describir claramente qué partes de la gobernabilidad serán responsabilidad del gobierno federal y qué partes quedarán a cargo del gobierno autónomo en las islas."
 COM_operation_democracy_in_comoros: "Operación Democracia en Comoras"
 COM_operation_democracy_in_comoros_desc: "La 'Operación Democracia en Comoras', nombre no muy sutil, fue una invasión en 2008 a la isla de Anjouan con el objetivo de derrocar al señor de la guerra local, el Coronel Mohamed Bacar, y reemplazar su gobierno rebelde. Contamos con el respaldo de la Unión Africana y nuestro mandato es claro: Bacar debe irse y su gobierno insurrecto debe ser reemplazado."
 COM_centralize_power: "Centralizar el Poder"
 COM_centralize_power_desc: "Con las recientes inestabilidades en mente, hemos decidido ignorar por completo el referéndum. Las constantes luchas internas en las islas solo cesarán cuando todos se sometan a un poder central."
 COM_claim_banc_du_geyser: "Reclamar el Banc du Geyser"
 COM_claim_banc_du_geyser_desc: "El Banc du Geyser es un arrecife sumergido al oeste de las Comoras. Tanto Francia como Madagascar lo han reclamado como su zona económica exclusiva debido a los posibles depósitos de petróleo, ¡y nosotros haremos lo mismo!"
 COM_claim_the_glorioso_islands: "Reclamar las Islas Gloriosas"
 COM_claim_the_glorioso_islands_desc: "Las Islas Gloriosas son un grupo de pequeñas islas cercanas al Banc du Geyser. Aunque legalmente son francesas, las reclamaremos como comorianas, al menos para ganar apoyo entre la población."
 COM_no_more_coups: "¡No más Golpes de Estado!"
 COM_no_more_coups_desc: "Hemos consolidado nuestro poder lo suficiente como para tener planes de contingencia en caso de futuros intentos de golpes de Estado."
 COM_a_common_destiny: "Un Destino Común"
 COM_a_common_destiny_desc: "Hemos llegado al final de un arduo camino y finalmente hemos logrado cierta estabilidad en las Comoras. Aún no sabemos qué depara el futuro, pero lucharemos por la Constitución y por la búsqueda de un destino común para los comorenses."
 COM_unrec_TT: "Invitaremos a tropas de la ONU para fortalecer nuestro ejército."
 COM_old_corvettes_tt: "Despliega 2 corbetas de la Guerra Fría [CHI.GetFlag]§Hchinas§!."
 COM_convention_renewal_party: "Convención para la Renovación de las Comoras"
 COM_convention_renewal_party_desc: "La Convención para la Renovación de las Comoras (CRC) es un partido político en las Islas Comoras. Fundado en 1996 por un grupo de políticos e intelectuales, el CRC tiene como objetivo brindar esperanza y estabilidad renovadas a la escena política del país. La plataforma del partido se centra en promover el crecimiento económico, reducir la pobreza y mejorar la atención médica y la educación."
 COM_subsidies_for_education: "Subsidios para la Educación"
 COM_subsidies_for_education_desc: "¡Necesitamos subsidiar la educación, ya que una población educada y saludable es la base de una sociedad próspera!"
 COM_stabilizing_society: "Estabilizar la Sociedad"
 COM_stabilizing_society_desc: "Estabilizar la sociedad en las Comoras requiere un compromiso a largo plazo de todas las partes interesadas, con un enfoque en abordar las causas fundamentales de la inestabilidad y fomentar un desarrollo inclusivo."
 COM_assembly_of_union: "Asamblea de la Unión"
 COM_assembly_of_union_desc: "Necesitamos reunir a la unión para priorizar nuestros objetivos y reformar nuestro plan de desarrollo."
 COM_purging_dissidents: "Aniquilar los Sueños de la Oposición"
 COM_purging_dissidents_desc: "Necesitamos iniciar una contracampaña contra los impostores que quieren cambiar nuestras decisiones en materia de política exterior. ¡Nuestro camino no debe tambalearse!"
 COM_social_agenda: "Agenda Social"
 COM_social_agenda_desc: "Dar prioridad a la agenda social contribuye a mejorar el desarrollo humano en el país. Al centrarse en cuestiones sociales como la educación, la atención sanitaria y la reducción de la pobreza, las Comoras pueden garantizar que sus ciudadanos tengan acceso a los recursos y las oportunidades necesarios para llevar una vida plena. Esto, a su vez, puede contribuir al bienestar general y a la calidad de vida de la población."
 COM_foreign_jihadists: "Yihadistas Extranjeros"
 COM_foreign_jihadists_desc: "¡Cuando declaramos el Gazavat, los muyahidines de todo el mundo vendrán a nuestro país para luchar por la causa justa!"
 COM_dd_TT: "§Y¡Podemos obtener asistencia militar y política de nuestros socios baathistas del mundo árabe!§!"
 COM_led_new_TT: "§Y¡Ayatolá Sambi se convertirá en el próximo líder de las Comoras para garantizar una mayor cooperación entre islas!§!"
 COM_militarism_baath: "Militarismo de la PMC Baath"
 COM_militarism_baath_desc: "Convertiremos las Comoras en un nuevo país. Ahora estará controlado aún más por nuestro ejército y nuestro país establecerá su propia PMC."
 COM_nationalization_of_capital: "Nacionalización del capital"
 COM_nationalization_of_capital_desc: "¡Esas inversiones generan ingresos para los opresores occidentales mientras nuestra gente ni siquiera puede tener un centavo! Expulsemos a esos intrusos de nuestra tierra y hagámosla nuestra."
 COM_our_will_to_expand: "Nuestra Voluntad de Expandirnos"
 COM_our_will_to_expand_desc: "Nuestra nueva base ideológica de la sociedad es una clara manifestación de nuestra voluntad de expandir nuestro país. Nada debe interponerse en nuestro camino y debemos asegurarnos de ello."
 COM_orange_party: "Partido Naranja"
 COM_orange_party_desc: "El partido político Naranja es un actor importante en el panorama político de las Comoras. Ganó popularidad rápidamente entre los jóvenes y la población urbana debido a sus valores progresistas y liberales. La declaración de principios y valores del partido hace hincapié en los ideales democráticos, la promoción de los derechos humanos y el desarrollo económico. El partido ha presentado candidatos para las elecciones presidenciales y parlamentarias."
 COM_radical_stance_on_trafficking: "Postura Radical sobre el Tráfico"
 COM_radical_stance_on_trafficking_desc: "Mohamed Daoudou afirmó que el Gobierno de las Comoras intensificará las acciones destinadas a prevenir, reprimir y castigar la trata de personas. Esto incluirá la reactivación del Groupe de Travail, una unidad que fue establecida por el Gobierno para combatir la trata de personas, así como generar conciencia sobre la trata de personas entre los socios clave y revitalizar la cooperación con la UNODC."
 COM_efficient_governmental_apparatus: "Aparato Gubernamental Eficiente"
 COM_efficient_governmental_apparatus_desc: "Uno de los principales enfoques de la agenda de reforma del presidente Daoudou es mejorar la transparencia y la rendición de cuentas dentro del gobierno. Se han implementado medidas para fortalecer los mecanismos de supervisión financiera, combatir la corrupción y promover una conducta ética entre los funcionarios públicos. Estas iniciativas buscan fomentar una cultura de integridad y garantizar que los recursos públicos se utilicen de manera efectiva en beneficio de todos los ciudadanos."
 COM_meritocracy: "Meritocracia de Daoudou"
 COM_meritocracy_desc: "En el gobierno de las Comoras sólo deberían estar los mejores entre los mejores, digan lo que digan los ciudadanos. Nuestra prioridad es la eficiencia, no el apaciguamiento."
 COM_push_it_to_the_limit: "Llevarlo al Límite"
 COM_push_it_to_the_limit_desc: "Reconociendo la necesidad de diversificación, la agenda de reforma del presidente Daoudou enfatiza en gran medida la expansión de la base económica del país. Las Comoras tradicionalmente han dependido de sectores como la agricultura y la pesca, pero el presidente está promoviendo activamente sectores como el turismo, la energía renovable y la tecnología de la información. Estos esfuerzos tienen como objetivo aprovechar la belleza natural única y el patrimonio cultural del país, así como aprovechar su potencial no explotado en industrias emergentes."
 COM_balancing: "Orgullo Konej"
 COM_balancing_desc: "Mohamed Daoudou debería implementar reformas que prioricen un crecimiento económico sostenible sobre los auge empresariales a corto plazo. Al adoptar un enfoque prudente hacia la diversificación, el desarrollo de infraestructuras, la inversión en capital humano y las alianzas internacionales, el presidente Daoudou debe aspirar a construir una economía resiliente que evite los riesgos de una burbuja económica y asegure la prosperidad a largo plazo para el pueblo de las Comoras."
 COM_daudouism: "Daudoísmo"
 COM_daudouism_desc: "En última instancia, el éxito de la ideología del presidente Daoudou dependerá de la capacidad de conciliar la meritocracia y el crecimiento económico con los principios de la democracia y las libertades individuales. Al abrazar un enfoque integral que considere las dimensiones económicas, sociales y políticas de la gobernanza, las Comoras pueden luchar por la prosperidad y el progreso democrático."
 COM_state_run_capitalism: "Capitalismo Estatal"
 COM_state_run_capitalism_desc: "La visión del presidente Daoudou de una economía capitalista dirigida por el Estado tiene como objetivo encontrar un equilibrio entre la empresa privada y la intervención gubernamental. La participación activa del gobierno en la economía tiene como objetivo promover sectores estratégicos, dirigir inversiones y garantizar una distribución equitativa de recursos y oportunidades. Este enfoque tiene como objetivo fomentar un entorno económico justo e inclusivo que beneficie a todos los ciudadanos comorianos."
 COM_absolute_employment: "Empleo Absoluto"
 COM_absolute_employment_desc: "Reconociendo que el desempleo plantea desafíos significativos para las personas y el bienestar general de la sociedad, la visión del presidente Daoudou se centra en implementar políticas y estrategias para garantizar que toda persona que busque empleo tenga acceso a un trabajo adecuado y digno. Este enfoque tiene como objetivo liberar el potencial de la fuerza laboral, contribuir a la reducción de la pobreza y mejorar el desarrollo socioeconómico general de las Comoras."
 COM_inclusive_government: "Inclusión de Minorías"
 COM_inclusive_government_desc: "La administración del presidente Daoudou ha tomado medidas concretas para abordar las desigualdades históricas y promover la inclusión de las minorías en la economía. Se han realizado esfuerzos para brindar apoyo y recursos específicos a las empresas y emprendedores pertenecientes a minorías, facilitando su acceso a financiamiento, capacitación y oportunidades de mercado. Al fomentar el espíritu empresarial dentro de las comunidades minoritarias, el gobierno busca crear un paisaje económico más inclusivo y diverso que beneficie a todos los ciudadanos."
 COM_minority_inclusive_idea: "Inclusión de Minorías"
 COM_eau_military_coop_idea: "Cooperación Militar con la EAU"
 COM_anjouan_idea: "Rebelión de Anjouan"
 COM_anjouan_idea_desc: "La isla de Anjouan se ha rebelado abiertamente contra el gobierno de [COM.GetAdjective]. Anjouan es la segunda isla más grande de [COM.GetName] y constituye una gran parte del país. Han alegado abiertamente factores como la falta de representación adecuada, elecciones justas y libres, y autonomía para la isla como razones de su resistencia. Si no actuamos con rapidez, es posible que se independicen completamente del país."
 COM_poor_military_idea: "Militares Corruptos"
 COM_poor_military_idea_desc: "Las fuerzas armadas operan más como un grupo de poderosos interesados ​​que como un ejército profesional. Su lealtad está ligada a los pagos gubernamentales y al mantenimiento del orden, pero este apoyo siempre es condicional. Con el tiempo, cualquier administración corre el riesgo de perder su favor, amenazando la estabilidad del país."
 COM_big_problems_idea: "Gobierno ineficiente"
 COM_big_problems_idea_desc: "Nuestro gobierno está plagado de departamentos y agencias draconianas, disfuncionales o completamente ineficaces. Centrarnos en eliminar y corregir las deficiencias del gobierno debería ser una de nuestras principales prioridades de aquí en adelante."
 COM_minority_inclusive_idea_desc: "A pesar de ser una nación pequeña, [COM.GetName] dista mucho de ser homogénea y está compuesta por una gran diversidad de grupos étnicos y personas de todos los ámbitos. Es importante que las minorías participen en el gobierno de nuestra nación; de lo contrario, la nación sufrirá."
 COM_eau_military_coop_idea_desc: ""
 COM_dictators_idea: "Pequeños Dictadores"
 COM_dictators_idea_desc: "Comoras ha experimentado numerosos golpes de Estado, tanto exitosos como fallidos, en las últimas décadas. Los gobernadores intentan usurpar el poder a expensas del gobierno central."
 COM_pro_farmers_idea: "Pro-agricultores"
 COM_pro_farmers_idea_desc: "Aunque las Comoras son un país pequeño, con tierras limitadas y una agricultura extensiva, debemos priorizar a los agricultores, pescadores y demás trabajadores agrícolas por igual."
 COM_agricultural_developments_idea: "Desarrollo Agrícola"
 COM_agricultural_developments_idea_desc: "Centrarnos en el desarrollo de nuestras industrias agrícolas nos ayudará a recuperarnos económicamente de la inestabilidad desde nuestra independencia y nos permitirá crecer utilizando nuestros mayores recursos naturales."
 COM_small_ship_project: "Proyecto de Barco Pequeño"
 COM_small_ship_project_desc: "Durante demasiado tiempo, nuestra presencia naval ha sido insuficiente. Trabajando en estrecha colaboración con los astilleros y constructores navales locales, podemos contar con una modesta flota de buques para fortalecer nuestra defensa costera y afirmar nuestra influencia en las aguas cercanas."
 COM_volcano_idea: "Pérdidas Agrícolas por Cenizas Volcánicas"
 COM_volcano_idea_desc: "La erupción del Monte Karthala ha cubierto vastas áreas con ceniza volcánica, causando graves daños a los cultivos. La recuperación de las tierras de cultivo llevará tiempo, y la productividad agrícola seguirá reducida en el futuro previsible."
 COM_typhoon_idea: "Recuperación de los Daños Causados ​​por Ciclon"
 COM_typhoon_idea_desc: "La recuperación del impacto devastador del Ciclón Kenneth está en curso, y la agricultura y la infraestructura necesitan tiempo para recuperarse."
 COM_total_ban_on_personal_weapons_idea: "Prohibición Total de Armas Personales"
 COM_total_ban_on_personal_weapons_idea_desc: "Las armas de defensa personal han sido comunes en las Comoras durante las últimas dos décadas, pero ya no las necesitamos. Deberíamos desarmar a nuestros ciudadanos y prohibir totalmente las armas personales. Esto nos ayudará a estabilizar nuestra sociedad y a reducir el riesgo de violencia ahora y en el futuro."
 COM_naval_treaty_with_france_idea: "Tratado de Defensa Naval Franco-Comorano"
 COM_naval_treaty_with_france_idea_desc: "Las negociaciones con Francia han sido fructíferas. Hemos firmado un tratado de defensa naval con [FRA.GetName]. A costa de parte de nuestro desarrollo local de buques de guerra, a cambio de un amplio acuerdo de defensa y un paquete de estímulo económico."
 COM_naval_treaty_with_china_idea: "Tratado de Defensa Naval Chino-Comorano"
 COM_naval_treaty_with_china_idea_desc: "Las negociaciones con China han sido fructíferas. Hemos firmado un tratado de defensa naval con [CHI.GetName]. A costa de parte de nuestro desarrollo local de buques de guerra, a cambio de un amplio acuerdo de defensa y un paquete de estímulo económico."
 COM_the_comoros_tourism_industry: "La Industria del Turismo"
 COM_the_comoros_tourism_industry_desc: "La [COM.GetAdjective] industria del turismo en las Comoras es una parte importante, pero fundamental, del país, ya que proporciona crecimiento económico y dinero a las empresas locales en las numerosas islas del archipiélago."
 COM_small_ship_project_idea: "[COM.GetAdjective] Proyectos de Barcos Pequeños"
 COM_small_ship_project_idea_desc: "Gracias a la colaboración con astilleros locales y socios internacionales, hemos lanzado con éxito un programa para construir modestos buques de guerra. Estos buques refuerzan nuestra capacidad de defensa costera y refuerzan nuestra presencia marítima en la región."
 COM_the_east_africa_entrepot_idea: "El centro de distribución de África Oriental"
 COM_the_east_africa_entrepot_idea_desc: "Gracias al desarrollo portuario estratégico y a alianzas económicas integrales, las Comoras se han consolidado como un importante centro comercial a lo largo de la costa oriental africana. Nuestra ubicación estratégica facilita el comercio entre África, Oriente Medio y Asia, aportando prosperidad a nuestras islas."
 COM_militarized_police_force_idea: "Fuerza Policial Militarizada"
 COM_militarized_police_force_idea_desc: "Dada la reciente historia de inestabilidad y golpes de Estado, nuestra fuerza policial se ha reorganizado y equipado para gestionar tanto disturbios civiles como amenazas militares. Si bien la línea entre policía y ejército se ha difuminado, esta capacidad de doble función garantiza que podamos mantener el orden independientemente de los desafíos que enfrentemos."
 COM_comorosian_private_military_companies: "[COM.GetAdjective] Empresas Militares Privadas"
 COM_comorosian_private_military_companies_desc: "Las Comoras se han convertido en la sede de varias empresas militares privadas que operan tanto a nivel nacional como internacional. Estas empresas ofrecen servicios de seguridad, entrenamiento militar y operaciones de apoyo en toda la región, generando ingresos y consolidando a nuestra nación como un centro de experiencia militar privada."
 COM_unstable_government_idea: "Gobierno Inestable"
 COM_unstable_government_idea_desc: "Los recientes acontecimientos y la inestabilidad en el gobierno han provocado una inestabilidad extremadamente alta, lo que impide unas Comoras estables y con visión de futuro. Es importante que empecemos a estabilizar el gobierno; de lo contrario, seguirá en un estado de inestabilidad."
 COM_mayotte_referendum_decisions: "El Referéndum de Mayotte"
 COM_mayotte_referendum_decisions_desc: "La isla de Mayotte es una de las muchas islas del archipiélago de las Comoras. Los mayottenos están decidiendo si desean seguir formando parte de la República Francesa, unirse a las Comoras o independizarse. Podemos apoyar el movimiento francés para que Mayotte siga siendo parte de Francia, el movimiento comorense o el movimiento independentista.\n\nEl porcentaje de votos esperado es el siguiente:\n\n- Francia: [?COM.mayotte_referendum_france|Y]% de los votos\n- Comoras: [?COM.mayotte_referendum_comoros|Y]% de los votos\n- Independencia: [?COM.mayotte_referendum_independence|Y]% de los votos"
 COM_mayotte_referendum_mission: "El Referéndum sobre el Estatus de Mahoran"
 COM_mayotte_referendum_mission_desc: "El referéndum está a punto de celebrarse. Tenemos poco tiempo para prepararnos antes de que sea demasiado tarde."
 COM_mayotte_french_support_campaign_decision: "[FRA.GetFlag] [FRA.GetAdjective] Campaña de apoyo"
 COM_mayotte_french_support_campaign_decision_desc: "Mayotte ha sido una parte fundamental de nuestros [FRA.GetAdjective] Territorios del Océano Índico. Debemos apoyar a los partidarios franceses en la región para asegurar que su partido gane el referéndum."
 COM_mayotte_independence_support_campaign_decision: "[MTE.GetFlag] [MTE.GetAdjective] Campaña de apoyo a la independencia"
 COM_mayotte_independence_support_campaign_decision_desc: "El pueblo de Mayotte lleva mucho tiempo anhelando la independencia. Deberíamos contactar a los líderes del movimiento independentista y considerar la posibilidad de ampliar los derechos del pueblo de Mayotte."
 COM_mayotte_comorian_support_campaign_decision: "[COM.GetFlag] [COM.GetAdjective] Campaña de apoyo"
 COM_mayotte_comorian_support_campaign_decision_desc: "Mayotte forma parte del archipiélago de las Comoras y, como tal, debe ser parte de nuestra gran federación. Es imperativo que sigamos apoyando a nuestros hermanos y hermanas de la región y aseguremos que su postura sea escuchada."
 COM_the_constitutional_referendum_decisions: "El Referéndum Constitucional"
 COM_the_constitutional_referendum_decisions_desc: "En los últimos años, las Comoras han experimentado diversos episodios de inestabilidad política y golpes de Estado. La Constitución de las Comoras necesita una revisión para garantizar la estabilidad del país. Podemos optar por apoyar tanto al movimiento federalista como al centralista, pero en cualquier caso debemos tomar partido en el próximo referéndum.\n\nApoyo federalista: [?COM_federalist_constitutional_support|Y%0]\nApoyo centralista: [?COM_anti_federalist_constitutional_support|Y%0]"
 COM_the_constitutional_referendum_mission: "El Referéndum"
 COM_the_constitutional_referendum_mission_desc: "El referéndum se vislumbra en el horizonte y debemos tomar partido en él. Solo el tiempo dirá cuál será el resultado para el futuro de las Comoras."
 comoros.1.t: "Pregunta de Lealtad"
 comoros.1.d: "Aunque Siria e Irak se declaran los representantes ideales de la ideología Baaz, no suelen coincidir. Exigen nuestra lealtad. ¿De qué lado estamos?"
 comoros.1.a: "¡Hafez es el más sabio!"
 comoros.1.b: "¡Saddam conoce el camino!"
 comoros.1.c: "¿Tal vez deberíamos tratar de reconciliarlos?"
 comoros.4.t: "El Referéndum Constitucional"
 comoros.4.d: "Tras el reciente golpe de Estado que derrocó a Tadjidine Ben Said Massounde, nuestra estructura de gobierno sigue sin definirse. El presidente Azali Assoumani ha dedicado el último año a estabilizar el país, y ahora ha llegado el momento de celebrar un referéndum constitucional. El pueblo decidirá qué forma de gobierno deben adoptar las Comoras, aunque sin duda podemos influir en la opinión pública. ¿Qué camino debemos impulsar?"
 comoros.4.a: "Un Estado Federal es lo correcto."
 comoros.4.b: "Un Estado Centralista es correcto."
 comoros.5.t: "¡Comoras reclaman el Banco del Géiser!"
 comoros.5.d: "Recientemente, el gobierno de Comoras ha reclamado el Banc du Geyser y controla los yacimientos petrolíferos que se encuentran en esa región."
 comoros.5.a: "¡Francia les hará arrepentirse de su decisión!"
 comoros.5.b: "¡Cómo se atreven a reclamar las aguas de Madagascar!"
 comoros.6.t: "Comoras reclaman las Islas Glorioso"
 comoros.6.d: "Las Comoras declararon recientemente que ahora consideran las islas Glorioso como parte de su territorio."
 comoros.6.a: "Sus pequeños divagaciones no nos molestan."
 comoros.7.t: "Base naval en Comoras"
 comoros.7.d: "El [COM.GetAdjective] nos ha ofrecido establecer una base naval formal en Gran Comora. Establecer bases navales adicionales en la región nos permitirá ampliar nuestra influencia y proteger nuestros intereses estratégicos en África Oriental. ¿Aceptamos los términos del [COM.GetAdjective]?"
 comoros.7.a: "¡Excelente!"
 comoros.7.b: "De hecho..."
 comoros.8.t: "Operación Democracia en las Comoras"
 comoros.8.d: "Estamos listos para llevar a cabo nuestra operación militar e invadir la isla que está controlada por un señor de la guerra rebelde."
 comoros.8.a: "¡Llamemos a nuestros justos aliados!"
 comoros.9.t: "[COM.GetName] Solicita Asistencia"
 comoros.9.d: "¡Las Comoras nos piden ayuda en su esfuerzo por llevar a cabo una operación especial contra un señor de la guerra rebelde en una de sus islas!"
 comoros.9.a: "Por supuesto"
 comoros.9.b: "A nosotros realmente no nos importa."
 comoros.10.t: "¡Operación exitosa!"
 comoros.10.d: "Hemos llevado a cabo la operación con éxito. ¡El gobierno de los caudillos ha sido derrocado!"
 comoros.10.a: "Excelente"
 comoros.11.t: "Manifestaciones Anticolonialistas en Mayotte"
 comoros.11.d: "Han estallado protestas masivas en Comoras denunciando el control francés de Mayotte. El sentimiento Anticolonialista se intensifica en todo el archipiélago. Esperemos que los mayottenos no se inspiren en esta desenfrenada manifestación de agitación."
 comoros.11.a: "Interesante..."
 comoros.12.t: "¡Comoras exige Mayotte!"
 comoros.12.d: "El pueblo de Mayotte tiene derecho a ser libre y su pequeño imperio colonialista no debería hacerlos sufrir en nombre de la explotación. ¡Libérenlos o la guerra!"
 comoros.12.a: "Garantizar la estabilidad es nuestra máxima prioridad."
 comoros.12.b: "Pónganos a prueba, cabrones."
 comoros.13.t: "El Territorio de Ultramar de las Comoras"
 comoros.13.d: "El gobierno de las Comoras se ha puesto en contacto con nosotros para plantear la posibilidad de regresar a Francia como departamento de ultramar para garantizar la estabilidad económica y financiera y la promesa de protección militar de sus vecinos en caso de que algo ocurra."
 comoros.13.a: "Aprobar la adhesión"
 comoros.13.b: "Rechazar la solicitud"
 comoros.14.t: "Francia acepta el acuerdo"
 comoros.14.d: "Francia ha decidido permitirnos convertirnos en un Territorio de Ultramar y ahora obtendremos apoyo financiero y protección militar mientras permanecemos nominalmente independientes con autogobierno local."
 comoros.14.a: "¡yupi!"
 comoros.15.t: "Política en las Comoras"
 comoros.15.d: "El año 2000 fue una época convulsa para las Comoras, una pequeña nación situada frente a la costa africana. El país estaba gobernado por un gobierno de coalición, compuesto por representantes de las tres islas principales: Gran Comora, Anjouan y Mohéli. Sin embargo, la tensión entre las islas era alta, ya que cada una competía por más poder y recursos. Esto provocó frecuentes inestabilidad política y golpes de Estado, mientras los políticos intentaban tomar el control del gobierno. En enero de 2000, un golpe militar liderado por el coronel Azali Assoumani derrocó al presidente Tadjidine Ben Said Massounde. Assoumani prometió restaurar la estabilidad en el país y celebrar elecciones libres y justas. Solo el tiempo dirá cuál será el futuro de las Comoras."
 comoros.15.a: "Interesante"
 comoros.16.t: "Comoras busca inversiones"
 comoros.16.d: "[COM.GetAdjective] Los embajadores nos han presentado una serie de propuestas para posibles inversiones en las naciones insulares. Si bien no son un socio comercial importante ni una economía masiva, podemos realizar inversiones específicas en el país que, con suerte, deberían generar una rentabilidad bastante alta. Las dos propuestas principales que han despertado nuestro interés son las de subvenciones industriales y refactorización de la deuda. ¿Cuál deberíamos elegir? Bueno, también podríamos simplemente ignorar su petición."
 comoros.16.a: "¡Invirtamos en su industria!"
 comoros.16.b: "Ayudémoslos con su deuda."
 comoros.16.c: "¿Comoras? Adiós."
 comoros.17.t: "[FROM.GetName] Acordó el Plan Industrial"
 comoros.17.d: "Nuestros embajadores regresan con buenas noticias. [FROM.GetName] acordó trabajar en infraestructura industrial y fabril adicional dentro del país."
 comoros.17.a: "¡Impresionante!"
 comoros.18.t: "[FROM.GetName] Aceptó la Refactorización de la Deuda"
 comoros.18.d: "[FROM.GetName] ha decidido reestructurar parte de nuestra deuda mediante la compra y condonación de parte de ella. Esto nos libera fondos adicionales y nos da la posibilidad de invertir más en otras cuestiones importantes para el país."
 comoros.18.a: "Bueno"
 comoros.19.t: "[FROM.GetName]"
 comoros.19.d: "Los embajadores que enviamos a [FROM.GetName] nos han traído malas noticias. No están interesados ​​en colaborar con nosotros en la refactorización de nuestra deuda ni en la expansión industrial."
 comoros.19.a: "Bruh."
 comoros.20.t: "Conspiración Golpista Frustrada"
 comoros.20.d: "Febrero de 2003. Las fuerzas de seguridad anunciaron haber frustrado con éxito un intento de golpe de Estado contra el presidente Azali Assoumani. Varios soldados y ministros locales fueron arrestados bajo sospecha de planear un derrocamiento del gobierno. Si bien la amenaza inmediata ha sido contenida, el incidente pone de relieve la persistente inestabilidad en nuestra joven Unión."
 comoros.20.a: "Eso estuvo cerca."
 comoros.21.t: "Erupción del Monte Karthala"
 comoros.21.d: "El Monte Karthala, al sur de Gran Comora, ha entrado en erupción, cubriendo con ceniza volcánica una amplia zona, incluida la capital, Moroni. La ceniza ha contaminado el agua potable, dañado gravemente los cultivos y obligado a miles de personas a evacuar. El gobierno debe actuar con rapidez para ayudar a las zonas afectadas."
 comoros.21.a: "Lanzar Respuesta de Emergencia."
 comoros.22.t: "El Monte Karthala entra en Erupción de Nuevo"
 comoros.22.d: "El Monte Karthala ha entrado en erupción por segunda vez este año. La ceniza ha cubierto pueblos del sur y contaminado fuentes de agua, agravando el ya escaso suministro de agua potable. Este segundo desastre durante las labores de recuperación está poniendo a prueba la capacidad de respuesta del gobierno."
 comoros.22.a: "No otra vez..."
 comoros.23.t: "Accidente de Yemenia Airways"
 comoros.23.d: "Durante la aproximación final al Aeropuerto Internacional de Moroni, el vuelo 626 de Yemenia Airways (Airbus A310) se estrelló en el mar frente a las costas de Comoras. De los 153 pasajeros y tripulantes, solo uno sobrevivió. Muchas de las víctimas eran miembros de la diáspora comorense residentes en Francia. Las críticas sobre las aeronaves y las prácticas de mantenimiento de Yemenia Airways han aumentado, lo que ha provocado grandes protestas en Francia. Si bien las protestas se dirigen contra la aerolínea y las autoridades francesas, el gobierno comorense ahora tiene la responsabilidad de apoyar a las familias de las víctimas y participar en las conversaciones internacionales."
 comoros.23.a: "Llorar a las víctimas."
 comoros.24.t: "El Ciclón Kenneth Azota"
 comoros.24.d: "El potente ciclón tropical \"Kenneth\" ha azotado las Comoras, causando daños devastadores. Al menos siete personas han muerto, más de 200 han resultado heridas y entre el 60 % y el 80 % de los cultivos básicos han sido destruidos. Decenas de miles de personas han sido desplazadas, mientras que la infraestructura y el suministro de agua potable han sufrido graves daños. La recuperación requerirá una cantidad considerable de fondos y tiempo."
 comoros.24.a: "Lanzamiento de Ayuda de Emergencia"
 comoros.25.t: "Fuga Masiva de la Prisión de Moroni"
 comoros.25.d: "Treinta y ocho reclusos se han fugado de la prisión más grande de Moroni. Según informes, simplemente salieron por la puerta principal, mal vigilada, y las autoridades alegan negligencia de los guardias y posible premeditación. El gobierno debe decidir si aumenta el gasto en seguridad para reforzar la protección o si mantiene los niveles actuales mientras continúa la búsqueda."
 comoros.25.a: "Aumentar el gasto en seguridad"
 comoros.25.b: "Continuar la búsqueda dentro del presupuesto actual"
 comoros.26.t: "El presidente Assoumani apuñaló"
 comoros.26.d: "Durante el funeral de un líder religioso en Salimani, el presidente Azali Assoumani fue atacado con un cuchillo por un soldado de 24 años, quien sufrió heridas leves. El sospechoso fue arrestado en el acto, pero fue encontrado muerto bajo custodia al día siguiente. El incidente ha aumentado la preocupación pública sobre las fuerzas de seguridad y la estabilidad política."
 comoros.26.a: "Fortalecer las medidas de seguridad"
 comoros.26.b: "Respuesta mínima al incidente"
 comoros.27.t: "Robert Denard liberado"
 comoros.27.d: "Robert Denard, otrora famoso mercenario en África, ha sido liberado a pesar de sus presuntos crímenes. Es un milagro que esto haya sucedido, pero, a pesar de todo, ha sucedido. Muchos creen que podría conseguir hombres y material para otra incursión en nuestro país."
 comoros.27.a: "Preocupante..."
 comoros.28.t: "Robert Denard da un Golpe de Estado al gobierno"
 comoros.28.d: "El mercenario ha regresado con cientos de tropas y ha derrocado con éxito al gobierno, estableciendo en su lugar un régimen títere dirigido por un hombre conocido simplemente como \"El Rey Guerrero de África\"."
 comoros.28.a: "¡Un Rey Guerrero!"
 comoros.29.t: "Robert Denard es capturado por los franceses"
 comoros.29.d: "El ejército francés capturó a Denard cuando se disponía a dar un golpe de Estado en nuestra nación con unos cien o doscientos hombres. La mayoría de sus fuerzas fueron liberadas, pero el propio Denard fue arrestado y llevado de vuelta a Francia para ser juzgado."
 comoros.29.a: "¡Buena suerte!"
 comoros.30.t: "Robert Denard no logra derrocar al gobierno"
 comoros.30.d: "A pesar de contar con un destacamento considerable, Denard ha sido derrotado en su intento de derrocar al gobierno. Tras su derrota, fue arrestado y ahora se le dejará pudrir en una prisión de Gran Comora."
 comoros.30.a: "Damas y caballeros, lo tenemos."
 comoros.31.t: "Los Resultados del Referéndum Constitucional"
 comoros.31.d: "Tras meses de campaña en las islas, el referéndum constitucional ha concluido y se han contabilizado los votos. La ciudadanía ha respondido a la pregunta de si adoptar una estructura federal que otorgue autonomía a cada isla o si buscar un gobierno centralizado. Los resultados definirán la distribución del poder en nuestra nación en los próximos años."
 comoros.31.a: "El Pueblo Ha Hablado."
 comoros.32.t: "Muerte del Ex Presidente Massounde"
 comoros.32.d: "Hemos recibido noticias sombrías de París. El expresidente Tadjidine Ben Said Massounde falleció anoche en un hospital parisino a los 76 años, debido a complicaciones derivadas de una larga enfermedad. A pesar de las controvertidas circunstancias que rodearon su derrocamiento durante el golpe de Estado de 1999 liderado por el coronel Azali Assoumani, Massounde siguió siendo una figura significativa en la historia política de [COM.GetAdjective]. La noticia de su fallecimiento ha resonado profundamente en todo el archipiélago, y ciudadanos de las tres islas se han reunido en mezquitas y plazas públicas para ofrecer oraciones y homenajes. Las fuerzas armadas de [COM.GetAdjective] han anunciado que rendirán honores militares en reconocimiento a su servicio a la nación durante su presidencia. Su familia, tanto la residente en París como la de las Comoras, ha expresado su profunda gratitud por las muestras de condolencias y respeto mostradas por los ciudadanos de [COM.GetAdjective], la comunidad de la diáspora en Francia y los observadores internacionales. Las banderas de todo el país ondearán a media asta durante tres días de luto oficial."
 comoros.32.a: "X para Presentar Respetos."
 comoros.33.t: "El Acuerdo de Zanzíbar"
 comoros.33.d: "Diplomáticos de [COM.GetAdjective] nos han presentado una propuesta inusual pero intrigante: desean negociar la compra de [253.GetName] a nuestro gobierno. La delegación de [COM.GetAdjective] ha llegado preparada con proyecciones económicas detalladas, propuestas de calendario de pagos y garantías sobre los derechos y el bienestar de los residentes actuales. Argumentan que la proximidad geográfica y los lazos culturales hacen que este acuerdo sea beneficioso para ambas partes y han enfatizado su compromiso con el mantenimiento de la estabilidad y la prosperidad de la región. La propuesta incluye disposiciones para un período de transición, la protección de los acuerdos existentes y una compensación financiera sustancial que podría reforzar significativamente nuestro tesoro nacional. Nuestro gabinete está dividido al respecto: algunos lo ven como una oportunidad pragmática para consolidar nuestras posesiones territoriales y obtener recursos económicos, mientras que otros consideran la venta de territorio soberano como un precedente impensable que podría dar lugar a nuevas propuestas similares en el futuro. La decisión ahora recae en nuestro gobierno."
