 JAP_reformed_economic_ministry_desc: "El gobierno [JAP.GetAdjective] ha reformado el Ministerio de Defensa [JAP.GetAdjective] en un esfuerzo por mejorar el crecimiento económico."
 JAP_officer_schools: "Escuelas de Oficiales"
 JAP_officer_schools_desc: "El [Nat_Autocracy_L] ha invertido y construido muchas nuevas Escuelas de Oficiales en todo Japón."
