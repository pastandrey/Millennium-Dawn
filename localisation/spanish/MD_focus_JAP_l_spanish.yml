 idea_JAP_emperor_naruhito: "Emperador Naruhito"
 idea_JAP_emperor_naruhito_desc: "Naruhito nació el 23 de febrero de 1960, hijo de Akihito y Michiko Shōda. Estudió en varias escuelas prestigiosas en todo Japón y se dice que tuvo una infancia alegre, también estudiando en la Universidad de Oxford."
