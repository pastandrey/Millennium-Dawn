l_spanish:
 preah_vihear_decisions_category: "Disputa Fronteriza de Preah Vihear"
 preah_vihear_dispute: "Disputa por el Templo de Preah Vihear"
 SIA_escalate_preah_vihear_tensions: "Aumentar las Tensiones Fronterizas"
 SIA_escalate_preah_vihear_tensions_desc: "Las protestas nacionalistas contra las reivindicaciones camboyanas sobre el Templo de Preah Vihear siguen en aumento. Podemos aprovechar este impulso para aumentar la presión sobre Camboya en la disputada región fronteriza."
 SIA_attack_preah_vihear: "Lanzamiento de incursión fronteriza"
 SIA_attack_preah_vihear_desc: "Enviar tropas para asegurar la zona en disputa alrededor del Templo de Preah Vihear. Esto provocará una respuesta armada, pero podría consolidar nuestra presencia en la región."
 SIA_request_asean_mediation: "Solicitar la Mediación de la ASEAN"
 SIA_request_asean_mediation_desc: "Solicitar a la ASEAN que medie en la disputa fronteriza con Camboya. Este enfoque diplomático podría ayudar a reducir las tensiones y encontrar una solución pacífica."
 SIA_accept_icj_ruling: "Aceptar la Decisión de la CIJ"
 SIA_accept_icj_ruling_desc: "Aceptar el fallo de la Corte Internacional de Justicia sobre la disputa del Templo de Preah Vihear. Esto pondrá fin al conflicto, pero podría considerarse una derrota diplomática."
 SIA_reject_icj_ruling: "Rechazar la Decisión de la CIJ"
 SIA_reject_icj_ruling_desc: "Rechazar el fallo de la CIJ y seguir afirmando nuestras reclamaciones sobre el territorio en disputa. Esto escalará las tensiones internacionales, pero demostrará nuestra determinación."
 CBD_protest_thai_actions: "Protesta Diplomática"
 CBD_protest_thai_actions_desc: "Presentar protestas formales contra las provocaciones tailandesas en la región fronteriza. Esto podría ayudar a reducir las tensiones internacionales y generar simpatía hacia nuestra postura."
 CBD_attack_border_region: "Región Fronteriza de Contraataque"
 CBD_attack_border_region_desc: "Lanzar un ataque de represalia contra las fuerzas tailandesas en la zona fronteriza en disputa. Debemos defender nuestra soberanía y el complejo del templo."
 CBD_request_asean_mediation: "Solicitar la Mediación de la ASEAN"
 CBD_request_asean_mediation_desc: "Solicite a la ASEAN que medie en la disputa fronteriza con Tailandia. Una solución diplomática regional podría ayudar a proteger nuestras reivindicaciones."
 CBD_appeal_to_icj: "Recurso ante la CIJ"
 CBD_appeal_to_icj_desc: "Presentar una demanda ante la Corte Internacional de Justicia para reafirmar la soberanía de Camboya sobre el Templo Preah Vihear y el territorio circundante."
 preah_vihear.100.t: "La UNESCO designa a Preah Vihear como Patrimonio de la Humanidad"
 preah_vihear.100.d: "La Organización de las Naciones Unidas para la Educación, la Ciencia y la Cultura ha declarado oficialmente el Templo de Preah Vihear como Patrimonio de la Humanidad, atribuyéndolo a Camboya. Han estallado protestas nacionalistas en toda Tailandia, donde los manifestantes exigen acciones militares para proteger lo que consideran territorio tailandés. La situación en la frontera se deteriora rápidamente."
 preah_vihear.100.a: "¡Esto es un escándalo! ¡Movilicemos nuestras fuerzas!"
 preah_vihear.100.b: "Debemos respetar la decisión internacional"
 preah_vihear.101.t: "La UNESCO reconoce a Preah Vihear"
 preah_vihear.101.d: "La UNESCO ha declarado oficialmente el antiguo Templo de Preah Vihear como Patrimonio de la Humanidad bajo soberanía camboyana. Esta es una importante victoria diplomática, que reafirma el fallo de la CIJ de 1962. Sin embargo, las protestas nacionalistas en Tailandia podrían provocar un aumento de la tensión en nuestra frontera."
 preah_vihear.101.a: "¡Un gran día para Camboya!"
 preah_vihear.1.t: "Provocaciones tailandesas en la Frontera"
 preah_vihear.1.d: "Tailandia ha intensificado la tensión en nuestra frontera cerca del Templo Preah Vihear. Manifestantes nacionalistas en Bangkok exigen acción militar, y las tropas tailandesas se han reubicado más cerca de la zona en disputa."
 preah_vihear.1.a: "Nosotros debemos permanecer vigilantes"
 preah_vihear.5.t: "¡Las Fuerzas tailandesas Atacan!"
 preah_vihear.5.d: "Las fuerzas militares tailandesas han lanzado una incursión en la disputada región fronteriza cerca del templo de Preah Vihear. Nuestras tropas están combatiendo a los atacantes. La comunidad internacional observa atentamente cómo la situación amenaza con escalar y convertirse en un conflicto a gran escala."
 preah_vihear.5.a: "¡Defendamos nuestro territorio!"
 preah_vihear.6.t: "Contraataque camboyano"
 preah_vihear.6.d: "Las fuerzas camboyanas han lanzado un contraataque contra nuestras posiciones cerca del templo de Preah Vihear. Se oyen disparos de artillería y armas pequeñas a lo largo de la frontera."
 preah_vihear.6.a: "Debemos mantener nuestras posiciones"
 preah_vihear.10.t: "Victoria en el Choque Fronterizo"
 preah_vihear.10.d: "Nuestras fuerzas han asegurado sus objetivos en el enfrentamiento fronterizo cerca de Preah Vihear. El enemigo ha sido repelido y hemos demostrado nuestra capacidad militar en la región."
 preah_vihear.10.a: "Excelentes noticias"
 preah_vihear.11.t: "Derrota en el Choque Fronterizo"
 preah_vihear.11.d: "Nuestras fuerzas fueron repelidas en el enfrentamiento fronterizo cerca de Preah Vihear. El enfrentamiento fracasó y nuestras tropas se retiraron a sus posiciones previas con bajas."
 preah_vihear.11.a: "Un amargo revés"
 preah_vihear.12.t: "El Choque Fronterizo no es concluyente"
 preah_vihear.12.d: "El enfrentamiento fronterizo cerca de Preah Vihear ha terminado en un punto muerto. Ambos bandos se han retirado sin lograr sus objetivos, aunque han adquirido una valiosa experiencia de combate."
 preah_vihear.12.a: "Reagruparse y reevaluar"
 preah_vihear.13.t: "Victoria en el Contraataque"
 preah_vihear.13.d: "Nuestro contraataque ha logrado repeler a las fuerzas enemigas. Hemos demostrado que la agresión contra nuestro territorio se enfrentará con una resistencia decidida."
 preah_vihear.13.a: "Nuestra soberanía está defendida"
 preah_vihear.14.t: "Contraataque Repelido"
 preah_vihear.14.d: "Nuestro contraataque fue repelido por las fuerzas enemigas. A pesar de nuestros mejores esfuerzos, no pudimos desalojarlos de sus posiciones en la zona en disputa."
 preah_vihear.14.a: "Nos recuperaremos"
 preah_vihear.20.t: "Propuesta de Mediación de la ASEAN"
 preah_vihear.20.d: "Tailandia ha solicitado la mediación de la ASEAN en la disputa fronteriza de Preah Vihear. Indonesia, como presidente de la ASEAN, propone enviar observadores a la región fronteriza y facilitar las negociaciones entre ambas partes."
 preah_vihear.20.a: "Aceptar la mediación"
 preah_vihear.20.b: "Rechazar la mediación"
 preah_vihear.21.t: "Propuesta de Mediación de la ASEAN"
 preah_vihear.21.d: "Camboya ha solicitado la mediación de la ASEAN en la disputa fronteriza de Preah Vihear. Indonesia, como país que preside la ASEAN, propone enviar observadores a la región fronteriza y facilitar las negociaciones entre ambas partes."
 preah_vihear.21.a: "Aceptar la mediación"
 preah_vihear.21.b: "Rechazar la mediación"
 preah_vihear.22.t: "Se acepta la Mediación de la ASEAN"
 preah_vihear.22.d: "Tanto Tailandia como Camboya han aceptado la mediación de la ASEAN. Se desplegarán observadores indonesios en la región fronteriza y se iniciarán negociaciones diplomáticas para encontrar una solución pacífica a la disputa."
 preah_vihear.22.a: "Un camino hacia la paz"
 preah_vihear.23.t: "Rechazada la Mediación de la ASEAN"
 preah_vihear.23.d: "La otra parte ha rechazado la mediación de la ASEAN en la disputa de Preah Vihear. Los esfuerzos diplomáticos han fracasado y la tensión en la frontera sigue siendo alta."
 preah_vihear.23.a: "Debemos prepararnos para una confrontación continua"
 preah_vihear.30.t: "Camboya apela ante la CIJ"
 preah_vihear.30.d: "Camboya ha presentado una demanda ante la Corte Internacional de Justicia en relación con la disputa del Templo de Preah Vihear. El tribunal considerará la solicitud de Camboya de medidas provisionales y finalmente se pronunciará sobre la cuestión de soberanía."
 preah_vihear.30.a: "Esperamos la decisión del tribunal."
 preah_vihear.31.t: "La CIJ falla a nuestro favor"
 preah_vihear.31.d: "La Corte Internacional de Justicia reafirmó la soberanía de Camboya sobre el Templo Preah Vihear y ordenó a ambas partes retirar al personal militar de una zona desmilitarizada provisional alrededor del templo."
 preah_vihear.31.a: "derecho internacional está de nuestro lado"
 preah_vihear.32.t: "La CIJ Gobierna Contra Nosotros"
 preah_vihear.32.d: "La Corte Internacional de Justicia ha fallado a favor de las reivindicaciones de soberanía de Camboya sobre el Templo de Preah Vihear. El tribunal ha ordenado el establecimiento de una zona desmilitarizada alrededor de la zona en disputa."
 preah_vihear.32.a: "Esta es una sentencia injusta"
 preah_vihear.35.t: "Tailandia Acepta el Fallo de la CIJ"
 preah_vihear.35.d: "Tailandia ha aceptado el fallo de la CIJ sobre la disputa del Templo de Preah Vihear. Las fuerzas tailandesas se retirarán de la zona desmilitarizada, poniendo fin a la crisis fronteriza."
 preah_vihear.35.a: "Paz al fin"
 preah_vihear.36.t: "Tailandia Rechaza el Fallo de la CIJ"
 preah_vihear.36.d: "Tailandia ha rechazado el fallo de la CIJ sobre la disputa del Templo de Preah Vihear, calificándolo de injusto y negándose a reconocer la jurisdicción del tribunal. Se prevé que aumenten las tensiones en la frontera."
 preah_vihear.36.a: "Debemos prepararnos para un conflicto continuo"
 preah_vihear_news.1.t: "Disputa de Preah Vihear Resuelta"
 preah_vihear_news.1.d: "La prolongada disputa fronteriza entre Tailandia y Camboya por el Templo de Preah Vihear se ha resuelto. Tailandia ha aceptado el fallo de la Corte Internacional de Justicia que confirma la soberanía de Camboya sobre el complejo del templo. Ambas naciones han acordado retirar sus fuerzas militares de la zona y normalizar sus relaciones diplomáticas."
 preah_vihear_news.1.o1: "Se restableció la estabilidad regional"
 preah_vihear_news.2.t: "La ASEAN Media en la Disputa Fronteriza"
 preah_vihear_news.2.d: "Gracias a la mediación de la ASEAN, Tailandia y Camboya acordaron reducir la tensión en la disputa fronteriza sobre el Templo de Preah Vihear. Observadores indonesios supervisarán el alto el fuego mientras ambas naciones buscan una solución diplomática."
 preah_vihear_news.2.o1: "Diplomacia prevalece"
 preah_vihear_news.3.t: "Estallan Enfrentamientos Fronterizos entre Tailandia y Camboya"
 preah_vihear_news.3.d: "Han estallado enfrentamientos armados a lo largo de la frontera entre Tailandia y Camboya, cerca del disputado Templo de Preah Vihear. Las fuerzas tailandesas han lanzado operaciones militares en la zona, y las tropas camboyanas están respondiendo. Se han reportado disparos de artillería e intercambios de armas pequeñas. El antiguo complejo de templos, declarado Patrimonio de la Humanidad por la UNESCO, se encuentra en medio del fuego cruzado mientras ambas naciones intensifican su disputa territorial."
 preah_vihear_news.3.o1: "Una escalada peligrosa"