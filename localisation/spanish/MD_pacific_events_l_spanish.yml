 Solomon_Islands.1.t: "El Acuerdo de Munda"
 Solomon_Islands.1.d: "Tras la intensa mediación del Enviado Especial de la Commonwealth, Sitiveni Rabuka, el gobierno provincial y los líderes de la oposición firmaron el Acuerdo Munda. Este acuerdo describe un Plan de Nueve Puntos destinado a reducir la violencia étnica y establecer una hoja de ruta para la reforma constitucional."
 Solomon_Islands.1.a: "Una paz frágil es mejor que ninguna"
 Solomon_Islands.1.b: "Hundir los Acuerdos"
 Solomon_Islands.2.t: "El Golpe de Estado de la Fuerza del Águila de Malaita"
 Solomon_Islands.2.d: "La situación política ha llegado a su punto álgido. Esta madrugada, miembros de la Fuerza Águila de Malaita, presuntamente con la ayuda de elementos de la policía paramilitar, tomaron el control de puntos estratégicos clave en Honiara. El primer ministro [SOL.GetLeader] ha sido puesto bajo arresto domiciliario a punta de pistola. La cúpula de la Fuerza Águila de Malaita afirma que el gobierno no protegió los intereses malaitanos y exige una transición inmediata del poder. El proceso democrático ha sido prácticamente suspendido."
 Solomon_Islands.2.a: "Manasseh Sogavare"
 Solomon_Islands.2.b: "Jimmy 'Rasta' Lusibaea"
 Solomon_Islands.3.t: "Asalto del Movimiento por la Libertad de Isatabu a Honiara"
 Solomon_Islands.3.d: "El Movimiento por la Libertad de Isatabu ha lanzado una contraofensiva masiva para expulsar la influencia malaita de la isla. Guerrilleros han surgido de la selva para sitiar la capital, Honiara. Con la policía oficial dividida por etnias, el país se ha sumido en una guerra civil a gran escala. El Movimiento por la Libertad de Isatabu exige la expulsión total de los colonos malaitanos, mientras que el gobierno, controlado por el gobierno, se prepara para una sangrienta defensa del centro urbano."
 Solomon_Islands.3.a: "Guerra en el Pacífico"
 Solomon_Islands.4.t: "Crisis en las Islas Salomón"
 Solomon_Islands.4.d: "El [SOL.GetNameWithFlag] ha caído en un estado de colapso civil. La administración del Primer Ministro [SOL.GetLeader] está paralizada por la creciente tensión entre el Movimiento por la Libertad de Isatabu y la Fuerza Águila de Malaita. El conflicto tiene sus raíces en disputas sobre la migración interna a Guadalcanal y los derechos territoriales indígenas. Es crucial que la mina Gold Ridge y otras industrias vitales hayan cesado sus operaciones, lo que amenaza nuestros intereses económicos en el Pacífico Sur."
 Solomon_Islands.4.a: "No podemos ignorar esta inestabilidad."
 Solomon_Islands.4.b: "¿A quién le importa? Soy [ROOT.GetLeader]"
 Solomon_Islands.5.t: "Solicitud de Mediación"
 Solomon_Islands.5.d: "En un intento desesperado por evitar una catástrofe humanitaria total, [FROM.GetNameWithFlag] ha solicitado formalmente que organicemos una cumbre de paz. Su propuesta sugiere un marco para la reconciliación mediante la descentralización y reformas en materia de autonomía para apaciguar a las facciones étnicas. Además, han solicitado un contingente de asesores administrativos y militares para garantizar que el proceso de reforma no se vea interrumpido por la interferencia de militantes."
 Solomon_Islands.5.a: "Aceptar el proceso de paz"
 Solomon_Islands.5.b: "Es nuestra lucha interna, otros se bajan."
 Solomon_Islands.6.t: "Rechazo de la Mediación"
 Solomon_Islands.6.d: "[SOL.GetNameWithFlag] ha rechazado rotundamente nuestra oferta de mediar en la crisis actual. En un firme comunicado, los líderes declararon que no tolerarán la intromisión neocolonial en sus asuntos internos. Han dejado claro que no son bienvenidos los asesores extranjeros ni la interferencia diplomática, insistiendo en que las Islas Salomón resolverán sus propias disputas sin supervisión externa."
 Solomon_Islands.6.a: "Entonces ellos enfrentarán las consecuencias solas."
 Solomon_IslandsNews.1000.t: "Alto el Fuego en las Islas Salomón Mediado por Australia"
 Solomon_IslandsNews.1000.d: "Tras días de negociaciones en la base de la RAAF en Townsville, Queensland, se ha llegado a un acuerdo. El Gobierno de [SOL.GetNameWithFlag] ha firmado un tratado de paz integral. [AST.GetNameWithFlag] se ha comprometido a liderar el Equipo Internacional de Monitoreo de la Paz para supervisar una amnistía de armas de 30 días y la destrucción de las armas entregadas. Si bien [AST.capital.GetName] se muestra cauteloso ante la expansión de la misión."
 Solomon_IslandsNews.1000.a: "Regresa la Estabilidad a las Islas Salomón"
 Solomon_IslandsNews.1001.t: "Alto el Fuego en las Islas Salomón"
 Solomon_IslandsNews.1001.d: "[FROM.GetNameWithFlag] ha logrado negociar un alto el fuego entre las facciones beligerantes del [SOL.GetNameWithFlag]. El acuerdo describe una hoja de ruta para el desarme y la reforma constitucional. Todas las partes han acordado el cese inmediato de las hostilidades y el establecimiento de una fuerza de vigilancia neutral."
 Solomon_IslandsNews.1001.a: "Regresa la Estabilidad a las Islas Salomón"
 Solomon_IslandsNews.1002.t: "Golpe de Estado en las Islas Salomón"
 Solomon_IslandsNews.1002.d: "La Fuerza Águila de Malaita, una organización militante malaita, ha tomado la capital. Utilizando armamento policial robado y con el apoyo de elementos rebeldes de la Fuerza de Campo de la Policía, la Fuerza Águila de Malaita rodeó la residencia del primer ministro Bartholomew Ulufa'alu esta madrugada. Bajo una fuerte vigilancia y con el arsenal de la ciudad en manos de los rebeldes, Ulufa'alu se vio obligado a presentar su dimisión. El gobierno, respaldado por la Fuerza Águila de Malaita, ahora afirma ser la única autoridad en Honiara."
 Solomon_IslandsNews.1002.a: "Una Tormenta Inminente"
 Solomon_IslandsNews.1003.t: "Las Islas Salomón Caen en Rebeldía"
 Solomon_IslandsNews.1003.d: "La guerra civil ha finalizado con una victoria total del Movimiento por la Libertad de Isatabu. Tras una prolongada campaña de guerrilla, el Movimiento por la Libertad de Isatabu ha logrado forzar el colapso del gobierno de Honiara, alineado con la Fuerza Águila de Malaita."
 Solomon_IslandsNews.1003.a: "La Democracia Cae en Honiara"
 Solomon_IslandsNews.1004.t: "Fin del Conflicto Civil en las Islas Salomón"
 Solomon_IslandsNews.1004.d: "La guerra civil ha finalizado con una victoria total del Movimiento por la Libertad de Isatabu. Tras una prolongada campaña de guerrilla, el Movimiento por la Libertad de Isatabu ha logrado forzar el colapso del gobierno de Honiara, alineado con la Fuerza Águila de Malaita."
 Solomon_IslandsNews.1004.a: "¿Cuál es el Próximo Capítulo?"
 Solomon_IslandsNews.1005.t: "Fin del Conflicto Civil en las Islas Salomón"
 Solomon_IslandsNews.1005.d: "Las operaciones conjuntas de la Fuerza Águila de Malaita y los remanentes de la policía nacional finalmente han aplastado la insurgencia del Movimiento por la Libertad de Isatabu, tras una brutal ofensiva en el interior de Guadalcanal."
 Solomon_IslandsNews.1005.a: "¿Cuál es el Próximo Capítulo?"
