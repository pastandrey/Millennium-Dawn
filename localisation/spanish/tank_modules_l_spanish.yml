 tank_stealth_armor_camelon: "Blindaje Camaleón"
 tank_stealth_armor_camelon_desc: "Armadura que puede adaptarse a la coloración y simular la textura del entorno circundante, lo que permite que la armadura adapte el camuflaje del vehículo a cualquier entorno."
 tank_stealth_armor_gen1: "Armadura Sigilosa"
 tank_stealth_armor_gen1_desc: "Armaduras furtivas avanzadas que ocultan y disimulan mejor los vehículos de la observación enemiga."
 tank_stealth_armor_thermal: "Blindaje Térmico"
 tank_stealth_armor_thermal_desc: "Sistemas de blindaje que permiten a un tanque ocultar o ajustar su firma térmica, ocultando el vehículo de la óptica térmica."
 defensive_jammers: "Bloqueadores Defensivos"
 defensive_jammers_desc: "Sistemas de interferencia que protegen a un vehículo blindado de amenazas entrantes y le permiten al vehículo enfrentarse a amenazas aéreas bloqueando los sistemas de las aeronaves entrantes."
 two_missile_pack: "Paquete de 2 Misiles"
 two_missile_pack_desc: "Sistema de lanzamiento de misiles modular, donde los misiles se fijan a los vehículos en diferentes cantidades de paquetes, lo que permite transportar más o menos munición."
 four_missile_pack: "Paquete de 4 Misiles"
 four_missile_pack_desc: "Sistema de lanzamiento de misiles modular, donde los misiles se fijan a los vehículos en diferentes cantidades de paquetes, lo que permite transportar más o menos munición."
 eight_missile_pack: "Paquete de 8 Misiles"
 eight_missile_pack_desc: "Sistema de lanzamiento de misiles modular, donde los misiles se fijan a los vehículos en diferentes cantidades de paquetes, lo que permite transportar más o menos munición."
 sixteen_missile_pack: "Paquete de 16 Misiles"
 sixteen_missile_pack_desc: "Sistema de lanzamiento de misiles modular, donde los misiles se fijan a los vehículos en diferentes cantidades de paquetes, lo que permite transportar más o menos munición."
 thirty_two_missile_pack: "Paquete de 32 Misiles"
 thirty_two_missile_pack_desc: "Sistema de lanzamiento de misiles modular, donde los misiles se fijan a los vehículos en diferentes cantidades de paquetes, lo que permite transportar más o menos munición."
 EQ_MOD_CAT_tank_reload_external_module_TITLE: "¡§RMLRS/SPAA§!\nPaquetes de Misiles"
 external_launcher: "Lanzador de Armas Externo"
 external_launcher_desc: "Un sistema montado externamente que permite montar armas en el vehículo, sin necesidad de suministros de munición internos."
 missile_launcher_system: "Lanzador de Misiles SAM"
 missile_launcher_system_desc: "Un sistema de montaje diseñado para permitir que un vehículo esté equipado con misiles tierra-aire."
 tank_pneumatic_suspension_light: "Suspensión Neumática Ligera"
 tank_pneumatic_suspension_light_desc: "En una suspensión hidroneumática, se utiliza una combinación de fluido hidráulico y gas nitrógeno como elementos amortiguadores. Con esta suspensión, el tanque se desplaza con mucha más suavidad. La altura de la transmisión se puede ajustar sobre la marcha y el tanque se autonivela. Esto permite un movimiento más suave y una orientación más estable. Sin embargo, como sistema de suspensión, es más difícil de fabricar y mantener que un sistema clásico de barra de torsión.\n\n§GConsejo del diseñador: Equipar su tanque con una suspensión hidroneumática lo mejora en general, a costa de la fiabilidad y el coste de producción§!"
 tank_torsion_bar_suspension_light: "Suspensión de Barra de Torsión Ligera"
 tank_torsion_bar_suspension_light_desc: "Un sistema de suspensión estándar para tanques. Las varillas conectadas a las ruedas se conectan a una barra horizontal. A medida que las ruedas suben y bajan, la barra gira, actuando como un resorte de suspensión.\n\n§GConsejo del diseñador: ¡Esta es una opción estándar, segura y de bajo riesgo§!"
 tank_wheeled_suspension_light: "Suspensión con Ruedas Ligera"
 tank_wheeled_suspension_light_desc: "La suspensión con ruedas, con sus 4x4/6x6/8x8, proporciona mayor velocidad, pero es más vulnerable a la metralla y al fuego de armas pequeñas.\n\n§GConsejo del diseñador: Equipar tu tanque con una suspensión con ruedas hará que tu vehículo sea más rápido y ligero, pero menos blindado y menos duradero.§!"
 tank_pneumatic_suspension_medium: "Suspensión Neumática Media"
 tank_pneumatic_suspension_medium_desc: "En una suspensión hidroneumática, se utiliza una combinación de fluido hidráulico y gas nitrógeno como elementos amortiguadores. Con esta suspensión, el tanque se desplaza con mucha más suavidad. La altura de la transmisión se puede ajustar sobre la marcha y el tanque se autonivela. Esto permite un movimiento más suave y una orientación más estable. Sin embargo, como sistema de suspensión, es más difícil de fabricar y mantener que un sistema clásico de barra de torsión.\n\n§GConsejo del diseñador: Equipar su tanque con una suspensión hidroneumática lo mejora en general, a costa de la fiabilidad y el coste de producción§!"
 tank_torsion_bar_suspension_medium: "Suspensión de Barra de Torsión Media"
 tank_torsion_bar_suspension_medium_desc: "Un sistema de suspensión estándar para tanques. Las varillas conectadas a las ruedas se conectan a una barra horizontal. A medida que las ruedas suben y bajan, la barra gira, actuando como un resorte de suspensión.\n\n§GConsejo del diseñador: ¡Esta es una opción estándar, segura y de bajo riesgo§!"
 tank_wheeled_suspension_medium: "Suspensión con Ruedas Media"
 tank_wheeled_suspension_medium_desc: "La suspensión con ruedas, con sus 4x4/6x6/8x8, proporciona mayor velocidad, pero es más vulnerable a la metralla y al fuego de armas pequeñas.\n\n§GConsejo del diseñador: Equipar tu tanque con una suspensión con ruedas hará que tu vehículo sea más rápido y ligero, pero menos blindado y menos duradero.§!"
 tank_pneumatic_suspension_heavy: "Suspensión Neumática Pesada"
 tank_pneumatic_suspension_heavy_desc: "En una suspensión hidroneumática, se utiliza una combinación de fluido hidráulico y gas nitrógeno como elementos amortiguadores. Con esta suspensión, el tanque se desplaza con mucha más suavidad. La altura de la transmisión se puede ajustar sobre la marcha y el tanque se autonivela. Esto permite un movimiento más suave y una orientación más estable. Sin embargo, como sistema de suspensión, es más difícil de fabricar y mantener que un sistema clásico de barra de torsión.\n\n§GConsejo del diseñador: Equipar su tanque con una suspensión hidroneumática lo mejora en general, a costa de la fiabilidad y el coste de producción§!"
 tank_torsion_bar_suspension_heavy: "Suspensión de Barra de Torsión Pesada"
 tank_torsion_bar_suspension_heavy_desc: "Un sistema de suspensión estándar para tanques. Las varillas conectadas a las ruedas se conectan a una barra horizontal. A medida que las ruedas suben y bajan, la barra gira, actuando como un resorte de suspensión.\n\n§GConsejo del diseñador: ¡Esta es una opción estándar, segura y de bajo riesgo§!"
 crows_mg: "Estación de Armas Remota"
 crows_mg_desc: "Un sistema de armas operado a distancia, capaz de proteger a los ocupantes permitiéndoles operar un arma sin tener que exponerse."
 afv_troop_capacity: "§RAPC/Módulo IFV§!\nEspacio de transporte de tropas"
 afv_troop_capacity_desc: "Retirar municiones y capacidades de combate para permitir el transporte de tropas desmontadas para realizar operaciones de combate adicionales."
 bush_tank_mg: "Ametralladora de Tanque"
 bush_tank_mg_desc: "¡Para todas tus necesidades de \"Soldé esto en la parte superior de mi Toyota y ahora es un tanque!\""
 fire_ammo_1: "Munición de Napalm Temprana"
 fire_ammo_1_desc: "Al cambiar la carga útil de nuestros cohetes a napalm, podemos aumentar la efectividad contra objetivos vulnerables. Sin embargo, esto reducirá considerablemente nuestra capacidad para combatir vehículos blindados enemigos."
 fire_ammo_2: "Munición de Napalm Mejorada"
 fire_ammo_2_desc: "Al cambiar la carga útil de nuestros cohetes a napalm, podemos aumentar la efectividad contra objetivos vulnerables. Sin embargo, esto reducirá considerablemente nuestra capacidad para combatir vehículos blindados enemigos."
 fire_ammo_3: "Munición de Napalm Avanzada"
 fire_ammo_3_desc: "Al cambiar la carga útil de nuestros cohetes a napalm, podemos aumentar la efectividad contra objetivos vulnerables. Sin embargo, esto reducirá considerablemente nuestra capacidad para combatir vehículos blindados enemigos."
 mine_ammo_1: "Cohete Minero Temprano"
 mine_ammo_1_desc: "Similar a un cohete de racimo, un cohete minero se romperá en pedazos más pequeños y llenará el área objetivo con minas anti-infantería o antivehículos"
 mine_ammo_2: "Cohete Minero Mejorado"
 mine_ammo_2_desc: "Similar a un cohete de racimo, un cohete minero se romperá en pedazos más pequeños y llenará el área objetivo con minas anti-infantería o antivehículos"
 mine_ammo_3: "Cohete Minero Avanzado"
 mine_ammo_3_desc: "Similar a un cohete de racimo, un cohete minero se romperá en pedazos más pequeños y llenará el área objetivo con minas anti-infantería o antivehículos"
 heat_ammo_1: "Munición HEAT Temprana"
 heat_ammo_1_desc: "Los proyectiles HEAT (Antitanque de Alto Explosivo) son un tipo de munición especializada diseñada para destruir el blindaje enemigo. Al impactar en el objetivo, una explosión lanza un chorro de metal que penetra el blindaje enemigo. Esto, por supuesto, implica muy poca efectividad contra la infantería, a menos que sea un impacto directo."
 heat_ammo_2: "Munición HEAT Mejorada"
 heat_ammo_2_desc: "Los proyectiles HEAT (Antitanque de Alto Explosivo) son un tipo de munición especializada diseñada para destruir el blindaje enemigo. Al impactar en el objetivo, una explosión lanza un chorro de metal que penetra el blindaje enemigo. Esto, por supuesto, implica muy poca efectividad contra la infantería, a menos que sea un impacto directo."
 heat_ammo_3: "Munición HEAT Avanzada"
 heat_ammo_3_desc: "Los proyectiles HEAT (Antitanque de Alto Explosivo) son un tipo de munición especializada diseñada para destruir el blindaje enemigo. Al impactar en el objetivo, una explosión lanza un chorro de metal que penetra el blindaje enemigo. Esto, por supuesto, implica muy poca efectividad contra la infantería, a menos que sea un impacto directo."
 cluster_ammo_1: "Munición de Racimo Temprana"
 cluster_ammo_1_desc: "En lugar de una gran carga, los proyectiles de racimo llevan varias bombas más pequeñas. A medida que se acercan a su objetivo, se liberan las bombas más pequeñas. Esto acribillará la zona con un conjunto de explosiones más pequeñas en lugar de una sola de gran tamaño."
 cluster_ammo_2: "Munición de Racimo Mejorada"
 cluster_ammo_2_desc: "En lugar de una gran carga, los proyectiles de racimo llevan varias bombas más pequeñas. A medida que se acercan a su objetivo, se liberan las bombas más pequeñas. Esto acribillará la zona con un conjunto de explosiones más pequeñas en lugar de una sola de gran tamaño."
 cluster_ammo_3: "Munición de Racimo Avanzada"
 cluster_ammo_3_desc: "En lugar de una gran carga, los proyectiles de racimo llevan varias bombas más pequeñas. A medida que se acercan a su objetivo, se liberan las bombas más pequeñas. Esto acribillará la zona con un conjunto de explosiones más pequeñas en lugar de una sola de gran tamaño."
 laser_guided_ammo_1: "Munición Guiada por Láser Temprana"
 laser_guided_ammo_1_desc: "Un proyectil guiado por láser podrá cambiar su trayectoria en pleno vuelo mediante pequeños propulsores de control. Esto le permite impactar su objetivo con mayor precisión."
 laser_guided_ammo_2: "Munición Guiada por Láser Mejorada"
 laser_guided_ammo_2_desc: "Un proyectil guiado por láser podrá cambiar su trayectoria en pleno vuelo mediante pequeños propulsores de control. Esto le permite impactar su objetivo con mayor precisión."
 laser_guided_ammo_3: "Munición Guiada por Láser Avanzada"
 laser_guided_ammo_3_desc: "Un proyectil guiado por láser podrá cambiar su trayectoria en pleno vuelo mediante pequeños propulsores de control. Esto le permite impactar su objetivo con mayor precisión."
 nera_armor_gen1: "NERA Pesado Temprano"
 nera_armor_gen1_desc: "Con placas adicionales de titanio o uranio empobrecido y formas específicas, podemos mejorar la protección general del blindaje de nuestros vehículos.\n\n§GConsejo del diseñador: El NERA pesado es más resistente, pero también más caro que un compuesto más simple§!"
 nera_armor_gen2: "NERA Pesado Moderno"
 nera_armor_gen2_desc: "Con placas adicionales de titanio o uranio empobrecido y formas específicas, podemos mejorar la protección general del blindaje de nuestros vehículos.\n\n§GConsejo del diseñador: El NERA pesado es más resistente, pero también más caro que un compuesto más simple§!"
 nera_armor_gen3: "NERA Pesado Futurista"
 nera_armor_gen3_desc: "Con placas adicionales de titanio o uranio empobrecido y formas específicas, podemos mejorar la protección general del blindaje de nuestros vehículos.\n\n§GConsejo del diseñador: El NERA pesado es más resistente, pero también más caro que un compuesto más simple§!"
 front_mounted_engine: "Motor Montado en la Parte Frontal"
 front_mounted_engine_desc: "Los motores frontales son un principio de diseño que utiliza el motor como parte de la protección de la tripulación, permitiendo que los proyectiles penetrantes impacten en el motor en lugar de entrar en el compartimento de la tripulación.\n\n§GConsejo del diseñador: Usa este módulo para aumentar el blindaje, la defensa y la penetración, a costa de una considerable pérdida de fiabilidad.§!"
 tank_dozer_blades: "Hoja Topadora para Tanques"
 tank_dozer_blades_desc: "Hojas topadoras montadas en la parte delantera de los tanques, lo que les permite ayudar a cavar trincheras y otras estructuras defensivas.\n\n§GConsejo del diseñador: Equipa este módulo si quieres aumentar la defensa y el blindaje de tu tanque, a costa de romper el avance.§!"
 medium_tank_chassis_0: "Casco de Tanque de 1ª Generación"
 medium_tank_chassis_0_desc: "Un casco de tanque de principios de la Guerra Fría. Desarrollado apresuradamente para un posible nuevo conflicto entre Oriente y Occidente, era muy similar a los tanques de finales de la Segunda Guerra Mundial."
 medium_tank_chassis_1: "Casco de Tanque de 2ª/3ª Generación"
 medium_tank_chassis_1_desc: "Un casco de la época de la Guerra Fría. En esa época, la electrónica se integraba más estrechamente en los tanques, el blindaje se cambió de acero simple a uno compuesto y se aumentó el calibre del cañón. Muchos de estos tanques siguen en uso en el siglo XXI, aunque con numerosos paquetes de mejoras."
 medium_tank_chassis_2: "Casco de Tanque de 3ª+ Generación"
 medium_tank_chassis_2_desc: "Un casco de tanque moderno. El desarrollo de tanques se ralentizó considerablemente hacia el final de la Guerra Fría, y muchos países optaron por modernizar diseños antiguos en lugar de crear nuevos. No fue hasta el desarrollo de armas antitanque más peligrosas que surgió la necesidad de nuevos diseños."
 medium_tank_chassis_3: "Casco de Tanque de 4ª Generación"
 medium_tank_chassis_3_desc: "Otro casco de tanque de la era moderna, desarrollado principalmente por nuevas potencias en ascenso con la necesidad de crear un diseño de tanque casi completamente desde cero."
 medium_tank_chassis_4: "Casco de Tanque de 5ª Generación"
 medium_tank_chassis_4_desc: "Un tanque de la era del futuro. Los tanques de batalla principales se han convertido en oponentes cada vez menos formidables a medida que el armamento antitanque se desarrolla rápidamente y el peso en el combate se traslada al poder aéreo. Para que los tanques sobrevivan como opciones válidas en guerras futuras, necesitarán una reconsideración completa de su diseño y función."
 medium_tank_amphibious_chassis_0: "Casco de Transporte Blindado de Personal (APC) de 1ª Generación"
 medium_tank_amphibious_chassis_0_desc: "Primeros diseños, que aparecieron a principios de la Guerra Fría."
 medium_tank_amphibious_chassis_1: "Casco de Transporte Blindado de Personal (APC) de 2ª/3ª Generación"
 medium_tank_amphibious_chassis_1_desc: "Mejorados respecto a sus predecesores, estos APC son mucho más adecuados para la función prevista."
 medium_tank_amphibious_chassis_2: "Casco de Transporte Blindado de Personal (APC) de 3ª+ Generación"
 medium_tank_amphibious_chassis_2_desc: "Por lo general, con una buena ergonomía y una protección adecuada, estos vehículos blindados hacen bien su trabajo."
 medium_tank_amphibious_chassis_3: "Casco de Transporte Blindado de Personal (APC) de 4ª Generación"
 medium_tank_amphibious_chassis_3_desc: "Si bien el concepto de APC parece un poco obsoleto, el pequeño tamaño de la tripulación de la infantería blindada no es una ventaja en absoluto, y los APC pueden permitir una alternativa adecuada."
 medium_tank_amphibious_chassis_4: "Casco de Transporte Blindado de Personal (APC) de 5ª Generación"
 medium_tank_amphibious_chassis_4_desc: "Una versión más barata del IFV, todavía puede ser útil cuando nada más que un humano puede sobrevivir."
 medium_tank_flame_chassis_0: "Casco de Vehículo de Infantería de 1ª Generación"
 medium_tank_flame_chassis_0_desc: "Los primeros diseños de vehículos blindados de combate (AFV) estaban destinados a apoyar a la infantería en el campo de batalla. Los soviéticos fueron los primeros en emplearlos en la práctica con su BMP-1, pero Estados Unidos y sus aliados los siguieron mucho antes de lo previsto."
 medium_tank_flame_chassis_1: "Casco de Vehículo de Infantería de 2ª/3ª Generación"
 medium_tank_flame_chassis_1_desc: "El diseño mejorado del IFV permite utilizarlo de forma más eficiente en la batalla."
 medium_tank_flame_chassis_2: "Casco de Vehículo de Infantería de +3ª Generación"
 medium_tank_flame_chassis_2_desc: "Moderno y peligroso, este es el 'Multiplicador de fuerza' que convierte a la infantería en la reina de la batalla."
 medium_tank_flame_chassis_3: "Casco de Vehículo de Infantería de 4ª Generación"
 medium_tank_flame_chassis_3_desc: "Una plataforma similar a un tanque diseñada para transportar infantería y apoyarla durante el tiempo que fuera necesario."
 medium_tank_flame_chassis_4: "Casco de Vehículo de Infantería de 5ª Generación"
 medium_tank_flame_chassis_4_desc: "Diseño avanzado y complejo de vehículo de combate de infantería. Una auténtica bestia de guerra."
 medium_tank_artillery_chassis_0: "Casco de Artillería Autopropulsada de 1ª Generación"
 medium_tank_artillery_chassis_0_desc: "La artillería autopropulsada se refiere a la artillería instalada en un vehículo, que utiliza el chasis del mismo para generar su propia energía y no requiere ser remolcada por otros vehículos. La mayoría de estas piezas están protegidas por blindaje ligero. La artillería generalmente consiste en obuses, morteros, cañones, cañones antitanque, lanzacohetes o cañones antiaéreos."
 medium_tank_artillery_chassis_1: "Casco de Artillería Autopropulsada de 2ª/3ª Generación"
 medium_tank_artillery_chassis_1_desc: "La artillería autopropulsada se refiere a la artillería instalada en un vehículo, que utiliza el chasis del mismo para generar su propia energía y no requiere ser remolcada por otros vehículos. La mayoría de estas piezas están protegidas por blindaje ligero. La artillería generalmente consiste en obuses, morteros, cañones, cañones antitanque, lanzacohetes o cañones antiaéreos."
