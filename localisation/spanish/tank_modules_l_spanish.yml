 mast_mounted_camera: "Cámara Montada en Mástil"
 mast_mounted_camera_desc: "Sistema de designación por cámara y láser para helicópteros, montado en la parte superior del conjunto del rotor."
 mast_mounted_radar: "Radar Montado en Mástil"
 mast_mounted_radar_desc: "Un radar compacto de control de tiro, montado sobre el cubo del rotor, permite la detección y el ataque de objetivos sin necesidad de cobertura. Capaz de rastrear múltiples objetivos simultáneamente y guiar municiones guiadas por radar. Mejora el conocimiento de la situación y la capacidad de supervivencia en terrenos complejos."
 light_helicopter_armor_gen1: "Blindaje para Helicóptero Ligero de 1ª Generación"
 light_helicopter_armor_gen1_desc: "Los primeros diseños de blindaje de helicópteros de ataque incluían blindaje alrededor de la cabina, componentes críticos y sistemas vitales para brindar protección contra el fuego de armas pequeñas y metralla."
 light_helicopter_armor_gen2: "Blindaje para Helicóptero Ligero de 2ª Generación"
 light_helicopter_armor_gen2_desc: "Con la invención e integración del blindaje compuesto, los esquemas de blindaje para helicópteros de ataque ahora ofrecen protección adicional. También se han empezado a utilizar esquemas de blindaje reactivo, que ofrecen una protección aún mayor."
 light_helicopter_armor_gen3: "Blindaje para Helicóptero Ligero de 3ª Generación"
 light_helicopter_armor_gen3_desc: "Los avances en la tecnología y la doctrina de blindaje han dado lugar a esquemas de blindaje modular adaptados a conjuntos de misiones específicas."
