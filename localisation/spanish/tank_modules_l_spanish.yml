 FRA_afv_coax_machine_gun: "7,62mm AA-52"
 FRA_afv_coax_machine_gun_desc: "El AA-52 (nombre completo en francés: Arme Automatique Transformable Modèle 1952) es uno de los primeros cañones de producción francesa de la posguerra. Fue fabricado por la empresa estatal francesa Manufacture d'armes de Saint-Étienne (MAS)."
 FRA_afv_machine_gun: "7,62mm AA-52"
 FRA_afv_machine_gun_desc: "El AA-52 (nombre completo en francés: Arme Automatique Transformable Modèle 1952) es uno de los primeros cañones de producción francesa de la posguerra. Fue fabricado por la empresa estatal francesa Manufacture d'armes de Saint-Étienne (MAS)."
 FRA_afv_machine_gun_2: "12,7mm M2 Browning"
 FRA_small_autocannon_2: "20 mm modèle F2 gun"
 FRA_big_autocannon_3: "40mm 40 CTC"
 FRA_tank_very_large_cannon: "140mm ASCALON "
 FRA_tank_very_large_cannon_desc: "El cañón autocargable y escalable de alto rendimiento o ASCALON es un cañón de tanque francés de ánima lisa de 140 mm y calibre 50 diseñado por Nexter"
 FRA_tank_small_medium_cannon: "105mm CN-105-57"
 FRA_tank_small_medium_cannon_desc: "El CN-105-57, también conocido como CN 105/57 o D1504, es un cañón de tanque ligero francés de 105 mm y utilizado por muchos tanques ligeros."
 FRA_tank_small_medium_cannon_2: "105mm CN-105 F1"
 FRA_tank_small_medium_cannon_2_desc: "El Canon de 105 mm modèle F1 (o CN-105-F1) es un cañón de tanque francés de 105 mm utilizado con el AMX-30."
 FRA_tank_medium_cannon: "120mm CN120-25"
 FRA_tank_medium_cannon_desc: "El CN120-25, también conocido simplemente como Modèle G1 (modelo G1), es un cañón de tanque francés de ánima lisa de 120 mm y 52 calibres diseñado por la EFAB de Bourges para el mercado de exportación."
 FRA_tank_medium_cannon_2: "120mm CN120-26"
 FRA_tank_medium_cannon_2_desc: "El CN120-26, también conocido simplemente como Modèle F1 (modelo F1), es un cañón de tanque francés de ánima lisa de 120 mm y 52 calibres diseñado por la EFAB de Bourges y producido por Giat Industries."
 FRA_tank_small_cannon: "75mm SA 50"
 FRA_tank_small_cannon_desc: "El 75 SA 50 (en francés: 75 mm Semi-Automatique Modèle 1950; en inglés: 75 mm Semi-Automatic 1950 Model), también llamado 75 Mle 50 o CN 75-50, es un cañón estriado francés de 75 mm de alta velocidad."
 FRA_tank_small_cannon_2: "90mm CN90 F4 Super 90"
 FRA_tank_small_cannon_desc_2: "Es una evolución del cañón de 90 mm del AMX-13/90, dispara la misma munición pero es más precisa."
 FRA_afv_assault_gun: "60mm Brandt Mle CM60A1"
 FRA_afv_assault_gun_desc: "El Brandt Mle CM60A1, también conocido como Brandt HB 60LP, MCB-60 HB o simplemente como mortero-cañón Brandt 60 mm LP, es un mortero-cañón de 60 mm (2,36 pulgadas)."
 FRA_medium_tank_artillery_chassis_0: "105mm Obusier de 105 modèle 1950"
 FRA_medium_tank_artillery_chassis_1: "155mm Canon GCT de 155 mm/L39"
 FRA_medium_tank_artillery_chassis_2: "155 mm Canon Caesar 155mm/L52"
 FRA_reactive_armor_gen1: "BRENUS"
 ISR_tank_medium_cannon_2: "120mm MG251"
 ISR_tank_medium_cannon_2_desc: "El cañón IMI de 120 mm es un cañón de tanque de ánima lisa L44 diseñado y producido por Industrias Militares Israelíes (IMI). A menudo se confunde con una producción bajo licencia del cañón de tanque Rheinmetall L44; sin embargo, fue desarrollado por IMI entre 1983 y 1988 para cumplir con los requisitos del tanque de batalla principal Merkava Mark III de las Fuerzas de Defensa de Israel (FDI), es decir, un montaje más estrecho como el del M60. Ambos tanques estaban diseñados con un cañón de 105 mm."
 ISR_tank_medium_cannon_3: "120mm MG251-LR"
 ISR_tank_medium_cannon_3_desc: "Versión mejorada de la MG251 con una funda térmica desarrollada por VIDCO Industries y un nuevo sistema de retroceso de gas comprimido"
 SOV_tank_small_cannon: "76,2mm D-56T"
 SOV_afv_machine_gun: "7,62mm SGMT"
 SOV_afv_machine_gun_desc: "La SG-43/SGMT Goryunov fue una ametralladora mediana soviética introducida durante la Segunda Guerra Mundial. Estaba calibrada para el cartucho 7,62 x 54 mm R y se introdujo en 1943 como reemplazo de las antiguas ametralladoras Maxim M1910."
 SOV_afv_machine_gun_2: "14,5mm KPVT"
 SOV_afv_machine_gun_2_desc: "La ametralladora pesada KPVT es una ametralladora pesada de diseño soviético de calibre 14,5 x 114 mm, que entró en servicio como arma de infantería (denominada PKP) en 1949. En la década de 1960, la versión de infantería se retiró de la producción por su tamaño y peso excesivos. Posteriormente, se utilizó en la serie BTR."
 SOV_afv_coax_machine_gun: "7,62mm PKT"
 SOV_afv_coax_machine_gun_desc: "La PKT  es una ametralladora de uso general alimentada por correa, con recámara para el cartucho con borde de 7,62 x 54 mm R derivado de la ametralladora PK/PKM."
 SOV_afv_atgm_gen1: "9M14 Malyutka"
 SOV_afv_atgm_gen1_desc: "(Nombre OTAN AT-3 Sanger) Fue el primer misil guiado antitanque portátil de la Unión Soviética y es probablemente el ATGM más producido de todos los tiempos."
 SOV_afv_assault_gun: "73mm 2A28 Grom"
 SOV_afv_assault_gun_desc: "El 2A28 Grom, también conocido como KBP 2A28 Grom, es un cañón semiautomático de ánima lisa de baja presión de 73 mm con un bloque de cierre en cuña. Su desarrollo estuvo directamente relacionado con el del cañón sin retroceso SPG-9; ambos disparaban proyectiles similares a granadas propulsadas por cohetes."
 SOV_afv_assault_gun_2: "100mm 2A70"
 SOV_afv_assault_gun_2_desc: "El lanzador de cañones de 100 mm 2A70 (designación GRAU: 2А70) es un modelo de cañones estriados de baja presión diseñados en la Unión Soviética por la Oficina de Diseño de Instrumentos KBP."
 SOV_small_autocannon: "30mm 2A42"
 SOV_small_autocannon_desc: "El Shipunov 2A42 es un cañón automático soviético-ruso de 30 mm. Lo fabrica la Compañía Anónima Tulamashzavod y lleva el nombre de A. G. Shipunov."
 SOV_small_autocannon_2: "30mm 2A72"
 SOV_small_autocannon_2_desc: "Una variante más ligera y simplificada del 2A42, con menos piezas, un cañón más largo y mayor velocidad inicial, pero también una cadencia de tiro menor. Se acciona por retroceso largo, no por gas."
