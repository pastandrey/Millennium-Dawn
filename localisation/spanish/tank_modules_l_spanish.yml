 medium_tank_aa_chassis_0: "Casco de Antiaéreo Autopropulsado de 1ª Generación"
 medium_tank_aa_chassis_0_desc: "Las armas antiaéreas autopropulsadas, también conocidas como armas móviles de defensa aérea, se refieren a armas móviles de defensa aérea que instalan ametralladoras antiaéreas, cañones antiaéreos o misiles tierra-aire en vehículos militares. Se dividen en cañones antiaéreos autopropulsados ​​(cañones antiaéreos autopropulsados), lanzamisiles antiaéreos autopropulsados ​​y sistemas de defensa aérea combinados de misiles y artillería autopropulsados."
 medium_tank_aa_chassis_1: "Casco de Antiaéreo Autopropulsado de 2ª/3ª Generación"
 medium_tank_aa_chassis_1_desc: "Las armas antiaéreas autopropulsadas, también conocidas como armas móviles de defensa aérea, se refieren a armas móviles de defensa aérea que instalan ametralladoras antiaéreas, cañones antiaéreos o misiles tierra-aire en vehículos militares. Se dividen en cañones antiaéreos autopropulsados ​​(cañones antiaéreos autopropulsados), lanzamisiles antiaéreos autopropulsados ​​y sistemas de defensa aérea combinados de misiles y artillería autopropulsados."
 medium_tank_aa_chassis_2: "Casco de Antiaéreo Autopropulsado de 3ª+ Generación"
