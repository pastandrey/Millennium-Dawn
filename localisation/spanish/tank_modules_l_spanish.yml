 medium_tank_rocket_chassis_0: "Casco de Lanzacohetes Múltiple de 1ª Generación"
 medium_tank_rocket_chassis_0_desc: "Los sistemas MLRS, compuestos por paquetes de múltiples cohetes, están diseñados para saturar un área con bombardeo de artillería de cohetes."
 medium_tank_rocket_chassis_1: "Casco de Lanzacohetes Múltiple de 2ª/3ª Generación"
 medium_tank_rocket_chassis_1_desc: "Los sistemas MLRS, compuestos por paquetes de múltiples cohetes, están diseñados para saturar un área con bombardeo de artillería de cohetes."
 medium_tank_rocket_chassis_2: "Casco de Lanzacohetes Múltiple de 3ª+ Generación"
