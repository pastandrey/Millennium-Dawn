 light_tank_afv_automatic_loading: "Sistema de recarga AFV"
 light_tank_afv_automatic_loading_desc: "El sistema de carga automática puede mejorar eficazmente la eficiencia de combate del vehículo en tiempos de guerra."
 afv_gasoline_engine_gen1: "Motor de Gasolina de Posguerra"
 afv_gasoline_engine_gen1_desc: "Motor de gasolina mediano o conjunto de varios motores más pequeños con suficiente potencia para mover vehículos ligeros."
 afv_gasoline_engine_gen2: "Motor de Gasolina de Principios de la Guerra Fría"
 afv_gasoline_engine_gen2_desc: "Versión mejorada y más potente del motor de gasolina para vehículos ligeros."
 afv_gasoline_engine_gen3: "Motor de Gasolina de Finales de la Guerra Fría"
 afv_gasoline_engine_gen3_desc: "Una decisión poco común en los tiempos modernos: estos motores altamente efectivos ayudan a los vehículos livianos a moverse a una velocidad decente."
 tank_diesel_engine_gen1: "V12 Aspiración Natural"
 tank_diesel_engine_gen1_desc: "Motor diésel V12 de aspiración natural originario de la Segunda Guerra Mundial. Comúnmente utilizado para tanques a principios de la Guerra Fría, capaz de producir aproximadamente entre 500 y 600 hp.\n\n§GConsejo del diseñador: Los motores diésel multicombustible son el motor estándar utilizado en los tanques.§!"
 tank_diesel_engine_gen2: "V12 Turbocargado"
 tank_diesel_engine_gen2_desc: "Al añadir un turbocompresor al motor diésel V12, podemos introducir más aire en el motor y generar más potencia. Se utilizaba habitualmente en los tanques de mediados de la Guerra Fría. Generaba unos 800 CV.\n\n§GConsejo del diseñador: Los motores diésel multicombustible son el motor estándar utilizado en los tanques.§!"
 tank_diesel_engine_gen3: "V12 de Doble Turbocargador"
 tank_diesel_engine_gen3_desc: "Si añadimos un segundo turbocompresor podemos conseguir incluso más potencia. La tecnología para ello empezó a aparecer a finales de los años 80. El motor puede producir casi hasta 1000 CV.\n\n§GConsejo del diseñador: Los motores diésel multicombustible son el motor estándar utilizado en los tanques.§!"
 tank_diesel_engine_gen4: "V12 Sobrealimentado"
 tank_diesel_engine_gen4_desc: "El cambio de los turbocompresores por un compresor aumentará aún más la potencia del motor. Era algo habitual en los tanques de principios de la década de 2000, capaces de desarrollar una potencia de 1100 CV.\n\n§GConsejo del diseñador: Los motores diésel multicombustible son el motor estándar utilizado en los tanques.§!"
 tank_diesel_engine_gen5: "V12 Sobrealimentado con Inyección Directa"
 tank_diesel_engine_gen5_desc: "Al adoptar tecnologías de fabricación de automóviles, podemos tener motores controlados de manera más eficiente. Con estos motores controlados electrónicamente, un tanque podrá impulsar hasta 1200 hp.\n\n§GConsejo del diseñador: Los motores diésel multicombustible son el motor estándar utilizado en los tanques.§!"
 tank_diesel_engine_gen6: "X12 Turbocargado"
 tank_diesel_engine_gen6_desc: "En un motor X12, los pistones están dispuestos en filas de tres en forma de X. La última innovación en tecnología de motores de tanque, capaz de producir 1500 hp.\n\n§GConsejo del diseñador: Los motores diésel multicombustible son el motor estándar utilizado en los tanques.§!"
 tank_diesel_engine_gen7: "X12 Sobrealimentado"
 tank_diesel_engine_gen7_desc: "La sobrealimentación de los motores de los tanques X12 puede llevar las capacidades de los motores más allá de lo que podemos imaginar. ¡Velocidad y potencia!\n\n§GConsejo del diseñador: Los motores diésel multicombustible son el motor estándar utilizado en los tanques.§!"
 tank_gas_turbine_engine_gen1: "Turbina de Gas de la Guerra Fría"
 tank_gas_turbine_engine_gen1_desc: "Motor de turbina de gas temprano, poco fiable y voluminoso, adaptado de la industria aeronáutica.\n\n§GConsejo del diseñador: Las turbinas de gas tienen una mejor aceleración que los motores diésel, lo que mejora la maniobrabilidad del vehículo. Sin embargo, son caras de construir y consumen mucho combustible. Utilice turbinas de gas si desea tanques rápidos y puede proporcionarles el combustible.§!"
 tank_gas_turbine_engine_gen2: "Turbina de Gas de Finales de la Guerra Fría"
 tank_gas_turbine_engine_gen2_desc: "Diseño mejorado que corrige la mayoría de los defectos de diseño de la turbina y la hace más utilizable en el campo.\n\n§GConsejo del diseñador: Las turbinas de gas tienen una mejor aceleración que los motores diésel, lo que mejora la maniobrabilidad del vehículo. Sin embargo, son caras de construir y consumen mucho combustible. Utilice turbinas de gas si desea tanques rápidos y puede proporcionarles el combustible.§!"
 tank_gas_turbine_engine_gen3: "Turbina de Gas de la Post Guerra Fría"
 tank_gas_turbine_engine_gen3_desc: "Diseño de turbinas de finales de la Guerra Fría centrado en mejorar la potencia de salida y la eficiencia del combustible.\n\n§GConsejo del diseñador: Las turbinas de gas tienen una mejor aceleración que los motores diésel, lo que mejora la maniobrabilidad del vehículo. Sin embargo, son caras de construir y consumen mucho combustible. Utilice turbinas de gas si desea tanques rápidos y puede proporcionarles el combustible.§!"
 tank_gas_turbine_engine_gen4: "Turbina de Gas Semi-Moderna"
 tank_gas_turbine_engine_gen4_desc: "Turbina de gas con buena confiabilidad y excelente potencia de salida.\n\n§GConsejo del diseñador: Las turbinas de gas tienen una mejor aceleración que los motores diésel, lo que mejora la maniobrabilidad del vehículo. Sin embargo, son caras de construir y consumen mucho combustible. Utilice turbinas de gas si desea tanques rápidos y puede proporcionarles el combustible.§!"
 tank_gas_turbine_engine_gen5: "Turbina de Gas Moderna"
 tank_gas_turbine_engine_gen5_desc: "Un punto culminante de la tecnología moderna en lo que se refiere a turbinas de gas.\n\n§GConsejo del diseñador: Las turbinas de gas tienen una mejor aceleración que los motores diésel, lo que mejora la maniobrabilidad del vehículo. Sin embargo, son caras de construir y consumen mucho combustible. Utilice turbinas de gas si desea tanques rápidos y puede proporcionarles el combustible.§!"
 tank_gas_turbine_engine_gen6: "Turbina de Gas de Baja Fricción"
 tank_gas_turbine_engine_gen6_desc: "Con materiales avanzados, se puede reducir la fricción en la turbina de gas, lo que permite una mejor potencia de salida y eficiencia de combustible.\n\n§GConsejo del diseñador: Las turbinas de gas tienen una mejor aceleración que los motores diésel, lo que mejora la maniobrabilidad del vehículo. Sin embargo, son caras de construir y consumen mucho combustible. Utilice turbinas de gas si desea tanques rápidos y puede proporcionarles el combustible.§!"
 tank_electric_engine_gen1: "Motor Eléctrico Temprano"
 tank_electric_engine_gen1_desc: "Un sistema de propulsión eléctrico temprano. Aunque hasta ahora solo se usaba en posiciones auxiliares, ahora tenemos la tecnología para alimentar todo el tanque con él.\n\n§GLos motores eléctricos son una opción futurista para alimentar tus tanques. Aunque son costosos de usar, requieren poco o ningún combustible. Equipa tus tanques con motores eléctricos si deseas ahorrar combustible§!"
 tank_electric_engine_gen2: "Motor Eléctrico Mejorado"
 tank_electric_engine_gen2_desc: "Versión mejorada del motor eléctrico con mayor confiabilidad.\n\n§GLos motores eléctricos son una opción futurista para alimentar tus tanques. Aunque son costosos de usar, requieren poco o ningún combustible. Equipa tus tanques con motores eléctricos si deseas ahorrar combustible§!"
 tank_small_medium_cannon: "Cañón de tanque ligero de principios de la Guerra Fría"
 tank_small_medium_cannon_desc: "Un cañón ligero de tanque era común en los tanques de la Guerra Fría temprana. Los estándares eran de 100 mm para la Unión Soviética y 105 mm para los países occidentales. Ambos tenían suficiente potencia de fuego para enfrentar tanto vehículos como infantería de la época.\n\n§Consejo del diseñador: Los cañones de bajo calibre son adecuados para proyectiles de alto explosivo (HE) debido a su menor velocidad inicial. Úsalos si quieres priorizar el ataque a blancos blandos sobre el ataque a blancos duros§!"
 tank_small_medium_cannon_2: "Cañón de tanque ligero de finales de la Guerra Fría"
 tank_small_medium_cannon_2_desc: "Con una fundición mejorada y manguitos térmicos, hacia el final de la Guerra Fría, los cañones de los tanques podían mantener una mayor cadencia de fuego antes de fallar.\n\n§GConsejo del diseñador: Las armas de bajo calibre son adecuadas para munición HE debido a su menor velocidad inicial. Úsalos si quieres priorizar el ataque suave sobre el ataque duro.§!"
 tank_small_medium_cannon_3: "Cañón de tanque ligero moderno"
 tank_small_medium_cannon_3_desc: "Equipado con un mecanismo de baja fuerza de retroceso de carrera larga y una recámara mejorada, un cañón de tanque ligero moderno es mortal incluso contra vehículos más pesados, especialmente con munición mejorada.\n\n§Consejo del diseñador: Los cañones de bajo calibre son adecuados para proyectiles de alto explosivo (HE) debido a su menor velocidad inicial. Úsalos si quieres priorizar el ataque a blancos blandos sobre el ataque a blancos duros§!"
 tank_small_medium_cannon_4: "Cañón de tanque ligero del futuro"
 tank_small_medium_cannon_4_desc: "Con mayor velocidad inicial y elementos tomados de los cañones principales de los tanques, un cañón de tanque ligero del futuro podrá hacer frente a casi cualquier amenaza en el campo de batalla.\n\n§Consejo del diseñador: Los cañones de bajo calibre son adecuados para proyectiles de alto explosivo (HE) debido a su menor velocidad inicial. Úsalos si quieres priorizar el ataque a blancos blandos sobre el ataque a blancos duros§!"
 tank_small_cannon: "Cañón de tanque ligero de principios de la Guerra Fría"
 tank_small_cannon_desc: "Los cañones principales de los primeros tanques ligeros a menudo se modificaban a partir de otra artillería remolcada."
 tank_small_cannon_2: "Cañón de tanque ligero de finales de la Guerra Fría"
 tank_small_cannon_2_desc: "El cañón principal de un tanque ligero suele ser un cañón de baja presión, que consigue un peso total menor con un retroceso menor."
 tank_small_cannon_3: "Cañón de tanque ligero moderno"
 tank_small_cannon_3_desc: "Los cañones principales de los tanques ligeros modernos utilizan materiales y diseños avanzados, que pueden mejorar enormemente la potencia de fuego y el alcance."
 tank_small_cannon_4: "Cañón de tanque ligero del futuro"
 tank_small_cannon_4_desc: "La introducción de la nanotecnología y el diseño asistido por ordenador ha permitido un progreso sin precedentes en los cañones principales de los futuros tanques ligeros, mejorando aún más la capacidad de supervivencia y de rendimiento de los tanques ligeros."
 tank_medium_cannon: "Cañón de Tanque Medio de la Guerra Fría Temprana"
 tank_medium_cannon_desc: "Con el desarrollo del blindaje compuesto, se necesitaba un cañón más grande para perforar más blindaje que el cañón de un tanque ligero. Si bien la Unión Soviética comenzó con un cañón de 115 mm en el T-62, rápidamente lo actualizó a un cañón principal de 125 mm. Los países occidentales siguieron rápidamente su ejemplo con su cañón de 120 mm. El cañón de tanque medio ha sido la opción más común para el armamento de tanques desde entonces.\n\n§GConsejo del diseñador:  Los cañones de calibre medio son un arma de tanque equilibrada. Úsalos si no quieres favorecer ni los ataques suaves ni los duros.§!"
 tank_medium_cannon_2: "Cañón de Tanque Medio de la Guerra Fría Tardía"
 tank_medium_cannon_2_desc: "Con un cañón cromado y una longitud mayor, esta pistola es capaz de soportar una mayor presión en la recámara. Con esta mayor presión y las últimas balas sabot de carburo de tungsteno, la pistola puede perforar más de 10 pulgadas de acero blindado.\n\n§GConsejo del diseñador: Los cañones de calibre medio son un arma de tanque equilibrada. Úsalos si no quieres favorecer ni los ataques suaves ni los duros.§!"
 tank_medium_cannon_3: "Cañón de Tanque Medio Moderno"
 tank_medium_cannon_3_desc: "Con munición inteligente moderna y materiales mejorados, un cañón de tanque mediano moderno puede perforar casi 40 pulgadas de acero de blindaje a distancias más cortas y puede disparar una variedad de proyectiles antitanque y antiinfantería.\n\n§GConsejo del diseñador: Los cañones de calibre medio son un arma de tanque equilibrada. Úsalos si no quieres favorecer ni los ataques suaves ni los duros.§!"
 tank_medium_cannon_4: "Cañón de Tanque Medio del Futuro"
 tank_medium_cannon_4_desc: "Con la adición de propulsión química electrotérmica, un cañón de tanque del futuro podrá tener una velocidad inicial increíblemente alta, ya que el proyectil se acelerará a lo largo de todo el cañón.\n\n§GConsejo del diseñador: Los cañones de calibre medio son un arma de tanque equilibrada. Úsalos si no quieres favorecer ni los ataques suaves ni los duros.§!"
 tank_large_cannon: "Cañón pesado de tanque temprano"
 tank_large_cannon_desc: "A medida que aumentó la necesidad de aumentar las capacidades de penetración en los años 90, se imaginó un cañón de tanque pesado, con un diámetro de entre 130 y 135 mm.\n\n§GConsejo del diseñador: Los cañones pesados ​​están pensados ​​para usarse principalmente en tareas antiblindaje. Úsalos si quieres favorecer el ataque duro y al mismo tiempo conservar algo de ataque suave.§!"
 tank_large_cannon_2: "Cañón pesado de tanque mejorado"
 tank_large_cannon_2_desc: "Las últimas aleaciones y municiones programadas permiten que los cañones de este tanque pesado de segunda generación hagan llover el infierno sobre los enemigos.\n\n§GConsejo del diseñador: Los cañones pesados ​​están pensados ​​para usarse principalmente en tareas antiblindaje. Úsalos si quieres favorecer el ataque duro y al mismo tiempo conservar algo de ataque suave.§!"
 tank_large_cannon_3: "Cañón avanzado de tanque pesado"
 tank_large_cannon_3_desc: "Con un diseño mejorado, los proyectiles disparados desde un cañón de tanque pesado avanzado serán efectivos tanto contra vehículos como contra infantería.\n\n§GConsejo del diseñador: Los cañones pesados ​​están pensados ​​para usarse principalmente en tareas antiblindaje. Úsalos si quieres favorecer el ataque duro y al mismo tiempo conservar algo de ataque suave.§!"
 tank_very_large_cannon: "Cañón súper pesado de tanque temprano"
 tank_very_large_cannon_desc: "Este cañón de alto calibre puede destruir prácticamente todo. Con un calibre de 152 mm, aunque no perfora el blindaje, disloca torretas y resquebraja blindajes a gran distancia.\n\n§GConsejo del diseñador: Los cañones superpesados ​​están pensados ​​para su uso en misiones antiblindaje. Utilízalos si quieres favorecer en gran medida el ataque duro frente al ataque suave.§!"
 tank_very_large_cannon_2: "Cañón súper pesado de tanque mejorado"
 tank_very_large_cannon_2_desc: "Con los últimos avances en munición y computación aplicados a los cañones de alto calibre existentes, este cañón es lo mejor que el ejército puede ofrecer en términos de blindaje de combate.\n\n§GConsejo del diseñador: Los cañones superpesados ​​están pensados ​​para su uso en misiones antiblindaje. Utilízalos si quieres favorecer en gran medida el ataque duro frente al ataque suave.§!"
 tank_very_large_cannon_3: "Cañón súper pesado de tanque avanzado"
 tank_very_large_cannon_3_desc: "Gracias a una aceleración electromagnética adicional del proyectil, un cañón de tanque superpesado podrá perforar blindajes, edificios e incluso búnkeres con sus proyectiles.\n\n§GConsejo del diseñador: Los cañones superpesados ​​están pensados ​​para su uso en misiones antiblindaje. Utilízalos si quieres favorecer en gran medida el ataque duro frente al ataque suave.§!"
 art_small_gun_gen3: "Obús ligero moderno"
 art_small_gun_gen3_desc: "Un cañón fabricado para ser disparado desde un vehículo más ligero, preparado para disparar rápidamente múltiples proyectiles con un tiempo de inactividad mínimo y un sistema efectivo de amortiguación del retroceso."
 art_small_gun_gen4: "Obús ligero avanzado"
 art_small_gun_gen4_desc: "La modernización del concepto de artillería ligera dio lugar a este cañón de artillería, preparado para disparar rápidamente y ser lo suficientemente ligero como para no ralentizar la plataforma al reubicarse."
 art_small_gun_gen5: "Obús ligero del futuro"
 art_small_gun_gen5_desc: "Lo mejor que nuestro complejo de fabricación puede producir, estos cañones de artillería móvil estarán lanzando proyectiles en cualquier área objetivo."
 art_med_gun_gen1: "Obús de Principios de la Guerra Fría"
 art_med_gun_gen1_desc: "La artillería más pesada de la Segunda Guerra Mundial, apenas adaptada para disparar desde una plataforma sobre orugas. No se recomienda permanecer cerca del vehículo mientras dispara."
 art_med_gun_gen2: "Obús de la Guerra Fría"
 art_med_gun_gen2_desc: "Obuses pesados ​​de la Segunda Guerra Mundial adaptados para su uso desde vehículos con orugas como cañones de artillería, preparados para disparar con mucha más seguridad. Por fin puedes estar cerca. El paquete incluye un arado trasero."
 art_med_gun_gen3: "Obús Moderno"
 art_med_gun_gen3_desc: "Un cañón de artillería de tamaño mediano adecuado fabricado específicamente para las necesidades de un ejército moderno. Movilidad y confiabilidad combinadas con potencia de fuego, la combinación perfecta."
 art_med_gun_gen4: "Obús Avanzado"
 art_med_gun_gen4_desc: "Cañón de artillería de tamaño mediano para el ejército moderno, los mecanismos del cañón se han mejorado para que pueda disparar proyectiles mejorados con un mejor efecto en el objetivo."
 art_med_gun_gen5: "Obús Futuro"
 art_med_gun_gen5_desc: "La cúspide de los cañones de artillería de tamaño mediano, este cañón se asegurará de que el área sobre la cual se dispara se reduzca a nada más que polvo y tierra."
 art_big_gun_gen3: "Obús Moderno"
 art_big_gun_gen3_desc: "Cañón de artillería de largo alcance preparado para disparar los obuses más pesados en posiciones enemigas. Se ha mejorado la amortiguación del retroceso, sin embargo, debido al gran calibre, estos cañones siguen siendo relativamente lentos en disparar."
 art_big_gun_gen4: "Obús Avanzado"
 art_big_gun_gen4_desc: "Las mejoras en los mecanismos de disparo de los obuses pesados han dado lugar a sistemas de artillería pesada capaces de disparar a una velocidad aceptable mientras mantienen sus obuses pesados destinados a golpear los objetivos más pesados."
 art_big_gun_gen5: "Obús Futuro"
 art_big_gun_gen5_desc: "Cañones de artillería de largo alcance perfeccionados en cuanto a sus cañones y mecanismos de disparo, lo que los convierte en artillería pesada extremadamente efectiva cuando necesitas realmente destruir un objetivo."
 art_med_rocket_gen1: "MLRS de Principios de la Guerra Fría"
 art_med_rocket_gen1_desc: "Cohetes de 200-300 mm lanzados generalmente desde plataformas modificadas de 100-200 mm, con menos tubos pero en general más potencia de explosión y fragmentación."
 art_med_rocket_gen2: "MLRS de la Guerra Fría"
 art_med_rocket_gen2_desc: "El desarrollo de sistemas de lanzadores para cohetes de tamaño mediano mejora la eficiencia general de estas plataformas junto con su costo. Con un rango mejorado y compatibilidad con una variedad más amplia de ojivas y cohetes, son perfectos para una amplia variedad de misiones de fuego. Utilizados para atacar objetivos en un área amplia."
 art_med_rocket_gen3: "MLRS Modernos"
 art_med_rocket_gen3_desc: "La modernización de los lanzadores y sus sistemas ha dado lugar a MLRS de tamaño mediano que pueden utilizarse en un alcance mucho mayor y con mayor precisión gracias a mejores cohetes y ojivas preparadas para atacar objetivos a distancias medias y largas."
 art_med_rocket_gen4: "MLRS Avanzados"
 art_med_rocket_gen4_desc: "Sistemas MLRS de tamaño medio más grandes que aumentan la cantidad de tubos, junto con ojivas más grandes para infligir el mayor daño posible manteniendo la eficiencia."
 art_med_rocket_gen5: "MLRS Futuro"
 art_med_rocket_gen5_desc: "MLRS de tamaño mediano preparados para lanzar múltiples cohetes diferentes al mismo tiempo. Estos lanzadores están preparados para recargarse mucho más rápido de lo habitual, por lo que pueden mantener un fuego sostenido sin necesidad de desplegar múltiples plataformas juntas."
 art_battlestation_gen1: "Sistemas de Control de Fuego de Artillería Tempranos"
 art_battlestation_gen1_desc: "Radio y computadora balística básica."
 art_battlestation_gen2: "Sistemas de Control de Fuego de Artillería de la Guerra Fría"
 art_battlestation_gen2_desc: "Equipamiento de radio duplicado y computadora balística semidigital."
 art_battlestation_gen3: "Sistemas de Control de Fuego de Artillería Modernos"
 art_battlestation_gen3_desc: "Sistema de navegación, cámaras y una computadora balística completamente digital."
 art_battlestation_gen4: "Sistemas de Control de Fuego Avanzados"
 art_battlestation_gen4_desc: "Conjunto de cámaras y sistemas avanzados de observación de batalla."
 direct_fire_conversion: "Módulo de Disparo Directo"
 direct_fire_conversion_desc: "Al permitir que el cañón tenga una mayor depresión, la pieza de artillería se puede utilizar en modo de fuego directo en caso de emergencia. Esto permitirá atacar con mayor facilidad a objetivos difíciles, pero permitir más opciones de fuego directo comprometerá algunas de las capacidades de fuego indirecto de la artillería."
 direct_fire_conversion_medium: "Módulo de Disparo Directo"
 direct_fire_conversion_medium_desc: "Al permitir que el cañón tenga una mayor depresión, la pieza de artillería se puede utilizar en modo de fuego directo en caso de emergencia. Esto permitirá atacar con mayor facilidad a objetivos difíciles, pero permitir más opciones de fuego directo comprometerá algunas de las capacidades de fuego indirecto de la artillería."
 mortar_barrel_conversion_small: "Cañón de Mortero Ligero"
 mortar_barrel_conversion_small_desc: "Al sustituir el obús por un mortero de tamaño similar, podemos mejorar la cadencia de fuego y el arco de tiro de la artillería. Sin embargo, es más difícil soportar ataques a larga distancia."
 mortar_barrel_conversion: "Cañón de Mortero Pesado"
 mortar_barrel_conversion_desc: "Al sustituir el obús por un mortero de tamaño similar, podemos mejorar la cadencia de fuego y el arco de tiro de la artillería. Sin embargo, es más difícil soportar ataques a larga distancia."
 gun_barrel_conversion: "Cañón de Artillería"
 gun_barrel_conversion_desc: "El cañón del arma es más largo en comparación con un obús estándar, tiene un ángulo de elevación más bajo que le permite ser un poco más preciso a costa de limitaciones operativas y es bueno para enfrentamientos de alcance medio."
 thermobaric_ammo_conversion: "Munición Termobárica"
 thermobaric_ammo_conversion_desc: "Los cohetes termobáricos son armas antiinfantería devastadoras. Cuando el cohete alcanza su objetivo, una pequeña explosión primaria crea una nube de combustible vaporizado. Una explosión secundaria enciende el combustible y crea una bola de fuego. El fuego agota todo el oxígeno que lo rodea y es lo suficientemente caliente como para vaporizar cuerpos humanos."
 thermobaric_ammo_conversion_small: "Munición Termobárica"
 thermobaric_ammo_conversion_small_desc: "Los cohetes termobáricos son armas antiinfantería devastadoras. Cuando el cohete alcanza su objetivo, una pequeña explosión primaria crea una nube de combustible vaporizado. Una explosión secundaria enciende el combustible y crea una bola de fuego. El fuego agota todo el oxígeno que lo rodea y es lo suficientemente caliente como para vaporizar cuerpos humanos."
 double_caliber_ammo_conversion: "Cohetes Multicalibre"
 double_caliber_ammo_conversion_desc: "Adaptar el lanzacohetes para que pueda disparar varios calibres de munición desde el mismo lanzador nos dará más flexibilidad en el campo de batalla. Sin embargo, esto ralentizará nuestro avance, ya que necesitaremos llevar el doble de munición."
 cluster_ammo_rocket_small_gen3: "Cohete de Racimo Avanzado"
 cluster_ammo_rocket_small_gen3_desc: "En lugar de una gran carga, los cohetes de racimo llevan varias bombas más pequeñas. A medida que el cohete se acerca a su objetivo, se liberan las bombas más pequeñas. Esto salpicará la zona con un racimo de explosiones más pequeñas en lugar de una sola gran explosión."
 cluster_ammo_rocket_medium_gen3: "Cohete de Racimo Avanzado"
 cluster_ammo_rocket_medium_gen3_desc: "En lugar de una gran carga, los cohetes de racimo llevan varias bombas más pequeñas. A medida que el cohete se acerca a su objetivo, se liberan las bombas más pequeñas. Esto salpicará la zona con un racimo de explosiones más pequeñas en lugar de una sola gran explosión."
 laser_ammo_rocket_medium_gen3: "Cohete Guiado por Láser Avanzado"
 laser_ammo_rocket_medium_gen3_desc: "Un cohete guiado por láser podrá cambiar su trayectoria en pleno vuelo mediante pequeños propulsores de control, lo que le permitirá alcanzar su objetivo con mayor precisión."
 cluster_ammo_rocket_big_gen3: "Cohete de Racimo Avanzado"
 cluster_ammo_rocket_big_gen3_desc: "En lugar de una gran carga, los cohetes de racimo llevan varias bombas más pequeñas. A medida que el cohete se acerca a su objetivo, se liberan las bombas más pequeñas. Esto salpicará la zona con un racimo de explosiones más pequeñas en lugar de una sola gran explosión."
 support_ammo_small_gen2: "Munición de Apoyo Mejorada"
 support_ammo_small_gen2_desc: "Diversos tipos de munición de apoyo (como bengalas y humo) ayudarán a nuestras tropas tanto en operaciones defensivas como ofensivas."
 support_ammo_small_gen3: "Munición de Apoyo Avanzada"
 support_ammo_small_gen3_desc: "Diversos tipos de munición de apoyo (como bengalas y humo) ayudarán a nuestras tropas tanto en operaciones defensivas como ofensivas."
 heat_ammo_gun_small_gen1: "Munición HEAT Temprana"
 heat_ammo_gun_small_gen1_desc: "Los proyectiles HEAT (High Explosive Anti-Tank) son un tipo especializado de munición diseñado para eliminar blindajes enemigos. Al impactar en su objetivo, la explosión genera un chorro de metal que penetra el blindaje enemigo. Esto significa que tiene poco efecto contra la infantería a menos que haya un impacto directo."
 heat_ammo_gun_small_gen2: "Munición HEAT Mejorada"
 heat_ammo_gun_small_gen2_desc: "Los proyectiles HEAT (High Explosive Anti-Tank) son un tipo especializado de munición diseñado para eliminar blindajes enemigos. Al impactar en su objetivo, la explosión genera un chorro de metal que penetra el blindaje enemigo. Esto significa que tiene poco efecto contra la infantería a menos que haya un impacto directo."
 heat_ammo_gun_small_gen3: "Munición HEAT Avanzada"
 heat_ammo_gun_small_gen3_desc: "Los proyectiles HEAT (High Explosive Anti-Tank) son un tipo especializado de munición diseñado para eliminar blindajes enemigos. Al impactar en su objetivo, la explosión genera un chorro de metal que penetra el blindaje enemigo. Esto significa que tiene poco efecto contra la infantería a menos que haya un impacto directo."
 rocket_assisted_ammo_gun_medium_gen3: "Munición con Cohetes Asistidos Avanzada"
 rocket_assisted_ammo_gun_medium_gen3_desc: "Al colocar pequeños propulsores en los proyectiles que dispara la artillería, podemos aumentar su alcance."
 rocket_assisted_ammo_gun_big_gen2: "Munición con Cohetes Asistidos Mejorada"
 rocket_assisted_ammo_gun_big_gen2_desc: "Al colocar pequeños propulsores en los proyectiles que dispara la artillería, podemos aumentar su alcance."
 rocket_assisted_ammo_gun_big_gen3: "Munición con Cohetes Asistidos Avanzada"
 rocket_assisted_ammo_gun_big_gen3_desc: "Al colocar pequeños propulsores en los proyectiles que dispara la artillería, podemos aumentar su alcance."
 burst_fire_gun_medium_gen1: "Modo de Fuego Rápido Temprano"
 burst_fire_gun_medium_gen1_desc: "Con una computadora de orientación avanzada y un cargador automático, la artillería puede disparar múltiples rondas en rápida sucesión al mismo objetivo, maximizando la supresión."
 burst_fire_gun_medium_gen2: "Modo de Fuego Rápido Mejorado"
 burst_fire_gun_medium_gen2_desc: "Con una computadora de orientación avanzada y un cargador automático, la artillería puede disparar múltiples rondas en rápida sucesión al mismo objetivo, maximizando la supresión."
 burst_fire_gun_medium_gen3: "Modo de Fuego Rápido Avanzado"
 burst_fire_gun_medium_gen3_desc: "Con una computadora de orientación avanzada y un cargador automático, la artillería puede disparar múltiples rondas en rápida sucesión al mismo objetivo, maximizando la supresión."
 multiple_rounds_medium_gen1: "Modo de Impacto Múltiple Temprano"
 multiple_rounds_medium_gen1_desc: "Al disparar varios proyectiles en sucesión con distintas cargas propulsoras y distintos arcos de disparo, es posible hacer que todos los proyectiles impacten en el objetivo al mismo tiempo. Esto requiere una tripulación altamente capacitada y una computadora de puntería avanzada."
 multiple_rounds_medium_gen2: "Modo de Impacto Múltiple Mejorado"
 multiple_rounds_medium_gen2_desc: "Al disparar varios proyectiles en sucesión con distintas cargas propulsoras y distintos arcos de disparo, es posible hacer que todos los proyectiles impacten en el objetivo al mismo tiempo. Esto requiere una tripulación altamente capacitada y una computadora de puntería avanzada."
 multiple_rounds_medium_gen3: "Modo de Impacto Múltiple Avanzado"
 multiple_rounds_medium_gen3_desc: "Al disparar varios proyectiles en sucesión con distintas cargas propulsoras y distintos arcos de disparo, es posible hacer que todos los proyectiles impacten en el objetivo al mismo tiempo. Esto requiere una tripulación altamente capacitada y una computadora de puntería avanzada."
 tank_base_tank_turret: "Torreta Soldada"
 tank_base_tank_turret_desc: "Una torreta construida con placas de blindaje planas soldadas en ángulo para maximizar el espacio interno y la eficiencia del blindaje. Las torretas soldadas permiten configuraciones de protección personalizadas, una integración más sencilla de mejoras y una mejor ergonomía para la tripulación. Aunque su producción requiere más mano de obra, este método proporciona una protección y modularidad superiores a las de los diseños de fundición.\n\n§GConsejo del diseñador: Esta es una torreta de tanque equilibrada tanto para ataque como para defensa. ¡Úsala si priorizas la alta capacidad de supervivencia y la calidad sobre la cantidad de tus tanques§!"
 tank_soviet_turret: "Torreta Fundida"
 tank_soviet_turret_desc: "Una torreta de una sola pieza formada por el vertido de metal fundido en un molde, creando una estructura redondeada con un blindaje de espesor uniforme. Si bien son más fáciles de producir en masa, las torretas de fundición suelen tener un espacio interno limitado y una optimización de blindaje reducida en comparación con diseños posteriores.\n\n§GConsejo del diseñador: Esta es una torreta de tanque equilibrada tanto para ataque como para defensa. Úsala si necesitas una gran cantidad de tanques y priorizas la cantidad sobre la calidad§!"
 tank_no_turret: "Sin Torreta"
 tank_no_turret_desc: "Una plataforma de armas fijas donde el armamento principal se monta directamente en el casco sin torreta giratoria. Este diseño reduce el peso y la complejidad mecánica, lo que permite siluetas más bajas, mayor fiabilidad y una producción más sencilla. Si bien ofrece un mantenimiento más sencillo, limita los arcos de disparo y requiere el reposicionamiento del vehículo para atacar nuevos objetivos.\n\n§GConsejo del diseñador: Un módulo que se encuentra comúnmente en los vehículos blindados de transporte de personal (APC) con ametralladora o en los AAP sin torreta.§!"
 tank_oscillating_turret: "Torreta Oscilante"
 tank_oscillating_turret_desc: "Un diseño inusual en el que el cañón está fijado a la torreta y, para apuntar, toda la torreta gira sobre un muñón. Esto le da al cañón una gran estabilidad y permite apuntar de forma rápida y flexible. Debido a su diseño, el sistema de muñón deja el anillo de la torreta expuesto y con un blindaje débil.\n\n§GConsejo del diseñador: Usa esto si quieres maximizar el daño que produce tu tanque y usarlo exclusivamente en la ofensiva.§!"
 tank_unmanned_turret: "Torreta No Tripulada"
 tank_unmanned_turret_desc: "Una torreta no tripulada se opera remotamente desde el interior del casco del tanque, lo que brinda mayor protección a la tripulación. Al no necesitar espacio para la tripulación, la torreta puede reducirse y blindarse más. Sin embargo, la visibilidad se reduce, ya que la torreta debe operarse con base en señales de video externas.\n\n§GConsejo del diseñador: Las torretas no tripuladas son la opción predilecta para las naciones ricas. Úsalas si quieres maximizar el blindaje de tu tanque, a mayor escala§!"
 tank_steel_armor_gen1: "Blindaje de Acero Temprano"
 tank_steel_armor_gen1_desc: "Blindaje homogéneo laminado temprano (RHA) utilizado en los tanques de batalla principales de primera generación.\n\n§GConsejo del diseñador: El blindaje de acero es una opción de blindaje de bajo presupuesto para tanques. No es comparable con el blindaje compuesto moderno.§!"
 tank_steel_armor_gen2: "Blindaje de Acero Mejorado"
 tank_steel_armor_gen2_desc: "Las aleaciones de acero mejoradas y las técnicas de fundición proporcionan una mejor resistencia para el mismo volumen y masa.\n\n§GConsejo del diseñador: El blindaje de acero es una opción de blindaje de bajo presupuesto para tanques. No es comparable con el blindaje compuesto moderno.§!"
 tank_steel_armor_gen3: "Blindaje de Acero Avanzado"
 tank_steel_armor_gen3_desc: "Con la inclusión de elementos adicionales en las aleaciones de acero, podemos aumentar su resistencia a la fractura y la fatiga.\n\n§GConsejo del diseñador: El blindaje de acero es una opción de blindaje de bajo presupuesto para tanques. No es comparable con el blindaje compuesto moderno.§!"
 tank_composite_armor_gen1: "Blindaje Compuesta de Principios de la Guerra Fría"
 tank_composite_armor_gen1_desc: "Los primeros blindajes compuestos se probaron en el tanque pesado estadounidense T95. Se instalaron placas de vidrio de sílice fundido (vidrio de cuarzo) entre placas de acero, lo que proporcionó una mayor protección contra la penetración. Aunque nunca se utilizó en la producción, sirvió como inspiración para desarrollos posteriores.\n\n§GConsejo del diseñador: El blindaje compuesto es la opción estándar para los tanques de batalla principales modernos.§!"
 tank_composite_armor_gen2: "Blindaje Compuesta de la Guerra Fría"
 tank_composite_armor_gen2_desc: "Al sustituir el vidrio de sílice por vidrio reforzado con plástico (fibra de vidrio) y añadir placas de corindón cerámico, la resistencia de la armadura aumenta enormemente.\n\n§GConsejo del diseñador: El blindaje compuesto es la opción estándar para los tanques de batalla principales modernos.§!"
 tank_composite_armor_gen3: "Armadura compuesta moderna"
 tank_composite_armor_gen3_desc: "El blindaje compuesto moderno consta de placas de cerámica dentro de un patrón de panal de abeja de metal con placas elásticas instaladas en ambos lados y recubiertas con una placa de blindaje. El blindaje moderno ofrece una gran protección contra los penetradores cinéticos tradicionales, así como contra las cargas huecas.\n\n§GConsejo del diseñador: El blindaje compuesto es la opción estándar para los tanques de batalla principales modernos.§!"
 tank_composite_armor_gen4: "Blindaje Compuesto Avanzado"
 tank_composite_armor_gen4_desc: "La impresión 3D, la sinterización láser y el polvo de alúmina a nanoescala con nanotubos de carbono proporcionan una protección de blindaje de última generación para nuestros tanques.\n\n§GConsejo del diseñador: El blindaje compuesto es la opción estándar para los tanques de batalla principales modernos.§!"
 tank_battlestation_1: "Estación de Batalla de la Guerra Fría Temprana"
 tank_battlestation_1_desc: "Radio y computadora balística básica.\n\n§GConsejo del diseñador: La estación de batalla representa los sistemas de artillería, control de fuego, óptica y otros equipos auxiliares necesarios para las operaciones con tanques. Una mejor estación de batalla mejorará la calidad general de tu tanque.§!"
 tank_battlestation_2: "Estación de Batalla de la Guerra Fría"
 tank_battlestation_2_desc: "Equipo de radio duplicado y computadora balística semidigital.\n\n§GConsejo del diseñador: La estación de batalla representa los sistemas de artillería, control de fuego, óptica y otros equipos auxiliares necesarios para las operaciones con tanques. Una mejor estación de batalla mejorará la calidad general de tu tanque.§!"
 tank_battlestation_3: "Estación de Batalla Moderna"
 tank_battlestation_3_desc: "Sistema de navegación, cámaras y un ordenador balístico totalmente digital.\n\n§GConsejo del diseñador: La estación de batalla representa los sistemas de artillería, control de fuego, óptica y otros equipos auxiliares necesarios para las operaciones con tanques. Una mejor estación de batalla mejorará la calidad general de tu tanque.§!"
 tank_battlestation_4: "Estación de Batalla Avanzada"
 tank_battlestation_4_desc: "Conjunto de cámaras y sistemas avanzados de observación de batalla.\n\n§GConsejo del diseñador: La estación de batalla representa los sistemas de artillería, control de fuego, óptica y otros equipos auxiliares necesarios para las operaciones con tanques. Una mejor estación de batalla mejorará la calidad general de tu tanque.§!"
 smoke_launchers: "Lanzadores de Humo Tempranos"
 smoke_launchers_desc: "Conjunto de lanzadores de humo destinados a cubrir el vehículo del fuego enemigo directo.\n\n§GConsejo del diseñador: Agregar lanzadores de humo reduce la visibilidad de nuestro tanque, lo que lo hace mejor tanto en defensa como en ataque.§!"
 smoke_launchers_2: "Lanzadores de Humo Mejorados"
 smoke_launchers_2_desc: "La fórmula química mejorada también protege al vehículo de las miradas infrarrojas.\n\n§GConsejo del diseñador: Agregar lanzadores de humo reduce la visibilidad de nuestro tanque, lo que lo hace mejor tanto en defensa como en ataque.§!"
 reactive_armor_gen1: "ERA de 1st Generación"
 reactive_armor_gen1_desc: "El blindaje reactivo explosivo (ERA) está compuesto por bloques de explosivos colocados sobre un armazón metálico instalado en el tanque. Cuando un penetrador cinético o una carga hueca impactan sobre el bloque, explota y contrarresta el proyectil que se aproxima. Los primeros experimentos se realizaron en los años 60 para contrarrestar las primeras cargas huecas, pero ninguno llegó a producirse.\n\n§GConsejo del diseñador: La armadura reactiva explosiva (ERA) es una forma sencilla de mejorar la armadura de tu tanque.§!"
 reactive_armor_gen2: "ERA de 2da Generación"
 reactive_armor_gen2_desc: "Al aumentar el tamaño de los ladrillos ERA y agregar más explosivos y un marco más grueso, se puede aumentar la fuerza explosiva para contrarrestar incluso los penetradores cinéticos.\n\n§GConsejo del diseñador: La armadura reactiva explosiva (ERA) es una forma sencilla de mejorar la armadura de tu tanque.§!"
 reactive_armor_gen3: "ERA de 3ra Generación"
 reactive_armor_gen3_desc: "Con una nueva estructura, el ERA puede mejorarse para resistir mejor tanto a los penetradores cinéticos como a las cargas huecas. Incluso puede ofrecer protección contra las cargas huecas en tándem que están diseñadas específicamente para contrarrestar el ERA.\n\n§GConsejo del diseñador: La armadura reactiva explosiva (ERA) es una forma sencilla de mejorar la armadura de tu tanque.§!"
 reactive_armor_gen4: "ERA de 4ta Generación"
 reactive_armor_gen4_desc: "La forma más avanzada de ERA, capaz de operar en diversas condiciones ambientales y de reducir la eficiencia de la mayoría de los incendios entrantes.\n\n§GConsejo del diseñador: La armadura reactiva explosiva (ERA) es una forma sencilla de mejorar la armadura de tu tanque.§!"
 spaced_armor_gen1: "Blindaje Espaciado Temprano"
 spaced_armor_gen1_desc: "El blindaje espaciado es un sistema de blindaje en el que hay una placa de blindaje adicional sobre la armadura principal con un espacio entre ellas. La placa exterior hará que una carga hueca detone antes, lo que reducirá su profundidad de penetración. El blindaje espaciado inicial consiste simplemente en placas de blindaje delgadas.\n\n§GConsejo del diseñador: La armadura espaciada es una versión económica de la armadura reactiva explosiva para darle a tu tanque más protección.§!"
 spaced_armor_gen2: "Blindaje Espaciado Mejorado"
 spaced_armor_gen2_desc: "Al cambiar las placas de acero sólido por una malla o una estructura similar a una jaula, aún podemos proteger nuestros tanques de las ojivas entrantes con menos peso.\n\n§GConsejo del diseñador: La armadura espaciada es una versión económica de la armadura reactiva explosiva para darle a tu tanque más protección.§!"
 spaced_armor_gen3: "Blindaje Espaciado Moderno"
 spaced_armor_gen3_desc: "Con placas de cerámica adicionales y formas distintas, podemos mejorar la protección general del blindaje de nuestros vehículos.\n\n§GConsejo del diseñador: La armadura espaciada es una versión económica de la armadura reactiva explosiva para darle a tu tanque más protección.§!"
 wet_ammo_storage: "Paneles de Expulsión"
 wet_ammo_storage_desc: "En caso de una explosión catastrófica de munición, es bueno diseñar el tanque teniendo en cuenta puntos débiles predeterminados. De esta manera, la explosión se dirigirá hacia el exterior del tanque en lugar de hacia el compartimiento de la tripulación.\n\n§GConsejo del diseñador:  Los reventones son una buena manera de mejorar la capacidad de supervivencia de su tanque.§!"
 automatic_loading: "Sistema de Carga Automática"
 automatic_loading_desc: "En un sistema de carga automática, común en los tanques soviéticos y rusos, un elevador mecánico introduce automáticamente un nuevo proyectil en el cañón. Por ello, los proyectiles suelen almacenarse en un carrusel debajo o cerca del cañón. En un tanque con cargador automático, la tripulación debe compartir el compartimento con munición real. Si bien un cargador automático ofrece una cadencia de fuego mucho mayor que la carga manual, un impacto penetrante a menudo quema la munición y reduce a cenizas el tanque y a su tripulación.\n\n§GConsejo del diseñador: Un cargador automático ofrece una potencia de fuego más sostenida contra los objetivos, pero aumenta la probabilidad de pérdida catastrófica del vehículo si sufre daños.§!"
 manual_loading: "Carga Manual"
 manual_loading_desc: "Un cargador humano. Un buen cargador incluso puede superar la velocidad del habitual cargador automático de carrusel, dependiendo de las condiciones. El concepto del cuarto miembro de la tripulación se ha mantenido a lo largo del tiempo gracias al par de manos extra que proporciona el cargador para el mantenimiento en campo.\n\n§GConsejo del diseñador: Este es el sistema de carga estándar para cualquier tanque. Una opción económica y de bajo riesgo.§!"
 revolver_magazine: "Cargador automático de revólver"
 revolver_magazine_desc: "Un autocargador de torreta. Más rápido y seguro que un autocargador de carrusel. La principal desventaja del sistema es su elevado precio.\n\n§GConsejo de GDesigner: Un autocargador de revólver es la mejor opción para tu tanque si estás dispuesto a pagar el precio adicional.§!"
 hardkill_system_gen1: "Sistema de Defensa Activa Temprano"
 hardkill_system_gen1_desc: "El sistema de destrucción masiva es una medida defensiva activa montada en un tanque. El sistema detecta los proyectiles entrantes y los contrarresta con los suyos propios. El contraproyectil puede ser un cohete, un misil o un proyectil cinético. Los primeros sistemas de destrucción masiva protegían principalmente al tanque de las cargas huecas.\n\n§GConsejo del diseñador: Un sistema de destrucción masiva es una buena manera de reforzar las capacidades defensivas de nuestros tanques contra misiles hostiles. También permitirá que nuestro blindaje sea más eficaz a la hora de atravesar líneas hostiles.§!"
 hardkill_system_gen2: "Sistema de Defensa Activa Mejorado"
 hardkill_system_gen2_desc: "Un sistema de destrucción de proyectiles mejorado podrá detener incluso los penetradores cinéticos de rápido movimiento y las cargas en tándem. El sistema mejorado también cubre el tanque desde todas las direcciones.\n\n§GConsejo del diseñador: Un sistema de destrucción masiva es una buena manera de reforzar las capacidades defensivas de nuestros tanques contra misiles hostiles. También permitirá que nuestro blindaje sea más eficaz a la hora de atravesar líneas hostiles.§!"
 smoothbore_atgm_gen1: "Misil Antitanque de Ánima Lisa de la Guerra Fría Temprana"
 smoothbore_atgm_gen1_desc: "Con pequeños cambios podemos adaptar el cañón del tanque para disparar misiles guiados antitanque. Los primeros misiles guiados antitanque de ánima lisa se guiaban mediante un buscador infrarrojo alineado con la mira del cañón o el telescopio de observación.\n\n§GConsejo del diseñador: Al equipar nuestros tanques con la capacidad de lanzar ATGM desde su cañón principal además de los penetradores cinéticos tradicionales, podemos aumentar su capacidad para atacar vehículos blindados enemigos.§!"
 smoothbore_atgm_gen2: "Misil Antitanque de Ánima Lisa de la Guerra Fría Tardía"
 smoothbore_atgm_gen2_desc: "Con la puntería láser hay menos distorsión y el ATGM vuela con mayor precisión hacia el objetivo.\n\n§GConsejo del diseñador: Al equipar nuestros tanques con la capacidad de lanzar ATGM desde su cañón principal además de los penetradores cinéticos tradicionales, podemos aumentar su capacidad para atacar vehículos blindados enemigos.§!"
 smoothbore_atgm_gen3: "Misil Antitanque de Ánima Lisa Moderno"
 smoothbore_atgm_gen3_desc: "Con un ATGM lanzado con un cañón de tanque que dispara y olvida, podemos atacar un objetivo con el misil y cambiar rápidamente el fuego a otro.\n\n§GConsejo del diseñador: Al equipar nuestros tanques con la capacidad de lanzar ATGM desde su cañón principal además de los penetradores cinéticos tradicionales, podemos aumentar su capacidad para atacar vehículos blindados enemigos.§!"
 smoothbore_atgm_gen4: "Misil Antitanque de Ánima Lisa Avanzado"
 smoothbore_atgm_gen4_desc: "Al mejorar la carga en tándem de la ojiva ATGM, podremos penetrar blindajes enemigos más resistentes.\n\n§GConsejo del diseñador: Al equipar nuestros tanques con la capacidad de lanzar ATGM desde su cañón principal además de los penetradores cinéticos tradicionales, podemos aumentar su capacidad para atacar vehículos blindados enemigos.§!"
 smoothbore_atgm_gen5: "Misil Antitanque de Ánima Lisa del Futuro"
 smoothbore_atgm_gen5_desc: "Con inteligencia artificial y algoritmos avanzados, el ATGM puede tener una trayectoria de vuelo compleja para evitar obstáculos y obtener el mejor ángulo de aproximación, e incluso cambiar objetivos en pleno vuelo si es necesario.\n\n§GConsejo del diseñador: Al equipar nuestros tanques con la capacidad de lanzar ATGM desde su cañón principal además de los penetradores cinéticos tradicionales, podemos aumentar su capacidad para atacar vehículos blindados enemigos.§!"
 tank_longer_gun: "Extensión del Cañón"
 tank_longer_gun_desc: "Al alargar el cañón respecto de su diseño original, podemos aumentar la velocidad inicial de los proyectiles disparados.\n\n§GConsejo del diseñador: Agregar soporte para un cañón más largo es una forma sencilla de aumentar la preparación de tu tanque contra blindajes hostiles sin tener que mejorar todo el cañón.§!"
 tank_aux_engine: "Motor Eléctrico Auxiliar"
 tank_aux_engine_desc: "Con un motor eléctrico auxiliar (o una unidad de potencia auxiliar) podemos hacer funcionar algunas partes del tanque, como la torreta, sin tener que encender los motores principales. De esta manera podemos hacer funcionar parcialmente nuestro tanque cuando está parado y ahorrar combustible.\n\n§GConsejo del diseñador: Agregar un motor eléctrico auxiliar funcionará mejor en motores que consumen combustible, como los motores de turbina de gas.§!"
 tank_aux_engine_2: "Motor Eléctrico Auxiliar Mejorado"
 tank_aux_engine_2_desc: "Las mejoras en el motor eléctrico auxiliar han permitido obtener más beneficios respecto a su predecesor y son mucho más eficientes.\n\n§GConsejo del diseñador: Agregar un motor eléctrico auxiliar funcionará mejor en motores que consumen combustible, como los motores de turbina de gas.§!"
 tank_drones: "Dron de Apoyo"
 tank_drones_desc: "La torreta del tanque puede equiparse con una estación de control de drones. El dron puede utilizarse para inspeccionar el campo de batalla circundante, adquirir objetivos y observar la efectividad del fuego.\n\n§GConsejo del diseñador: Equipar nuestros tanques con drones mejorará su capacidad para destruir enemigos.§!"
 tank_drones_2: "Dron de Apoyo Mejorado"
 tank_drones_2_desc: "Un dron de apoyo mejorado no solo podrá inspeccionar el campo de batalla, sino también dirigir el fuego, fijar objetivos para buscar proyectiles e incluso defenderse de los proyectiles entrantes.\n\n§GConsejo del diseñador: Equipar nuestros tanques con drones mejorará su capacidad para destruir enemigos.§!"
 afv_base_turret: "Torreta Básica de VCI"
 afv_base_turret_desc: "Torreta básica, generalmente destinada a 1-2 personas."
 afv_unmanned_turret: "Torreta de VCI No Tripulada"
 afv_unmanned_turret_desc: "Torreta no tripulada, con sistema de armas operado de forma remota, permite asignar más recursos a la protección del casco."
 afv_no_turret: "Sin Torreta de VCI"
 afv_no_turret_desc: "¿Quién necesita una torreta cuando puedes simplemente hacer una escotilla y esperar lo mejor?"
 afv_tracked_suspension: "Suspensión con Ruedas"
 afv_tracked_suspension_desc: "Suspensión basada en ruedas, ya sea 4x4/6x6/8x8, proporciona una mayor velocidad, pero es más vulnerable a la metralla y al fuego de armas pequeñas."
 afv_torsion_bar_suspension: "Suspensión de Barra de Torsión"
 afv_torsion_bar_suspension_desc: "Suspensión clásica 'tipo tanque'"
 afv_machine_gun: "Ametralladora Pesada de la Posguerra"
 afv_machine_gun_desc: "Versión ligeramente modificada de un confiable arma de la Segunda Guerra Mundial. Ahora sirve como arma de apoyo en un taxi blindado."
 afv_machine_gun_2: "Ametralladora Pesada de la Guerra Fría"
 afv_machine_gun_2_desc: "Después de la Segunda Guerra Mundial, se realizaron ciertos cambios de diseño en las ametralladoras pesadas de los principales países: mejor manejo, precisión, etc."
 afv_machine_gun_3: "Ametralladora Pesada Moderna"
 afv_machine_gun_3_desc: "La disolución de la Unión Soviética permitió a algunos países relajarse y centrarse en la calidad, no en la cantidad: esto es lo que representa esta nueva generación."
 afv_machine_gun_4: "Ametralladora Pesada del Futuro"
 afv_machine_gun_4_desc: "Carcasa de plástico, tecnología de seguimiento. Las ametralladoras pesadas son ahora más letales que nunca."
 afv_assault_gun: "Cañón de Asalto de Principios de la Guerra Fría"
 afv_assault_gun_desc: "La artillería equipada en los tanques ligeros es generalmente un cañón de baja velocidad, que logra una potencia de fuego de gran calibre a expensas de un bajo retroceso."
 afv_assault_gun_2: "Cañón de Asalto de la Guerra Fría Tardía"
 afv_assault_gun_2_desc: "Balística mejorada, mejores proyectiles explosivos en comparación con los diseños de posguerra."
 afv_assault_gun_3: "Cañón de Asalto Moderno"
 afv_assault_gun_3_desc: "Lo mejor que el ejército moderno tiene para ofrecer: proyectiles inteligentes, explosión aérea."
 afv_assault_gun_4: "Cañón de Asalto del Futuro"
 afv_assault_gun_4_desc: "Ataques en racimo, perforación avanzada de búnkeres, hay poco que este cañón no pueda hacer, tal vez solo los tanques están a salvo."
 small_autocannon: "Autocañón de la Guerra Fría Temprana"
 small_autocannon_desc: "Con un calibre de 20-30 mm, generalmente solo una antigua y confiable arma antiaérea de la Segunda Guerra Mundial con algunas modificaciones. Cumple su función correctamente."
 small_autocannon_2: "Autocañón de la Guerra Fría Tardía"
 small_autocannon_2_desc: "Autocañón dedicado destinado a derrotar tanto a la infantería como al metal."
 small_autocannon_3: "Autocañón Moderno"
 small_autocannon_3_desc: "Los últimos avances, munición explosiva aérea, proyectiles programables."
 small_autocannon_4: "Autocañón del Futuro"
 small_autocannon_4_desc: "Autocañón de nivel de última generación, no deja nada atrás."
 apc_small_autocannon: "Autocañón de la Guerra Fría Temprana"
 apc_small_autocannon_desc: "Con un calibre de 20-30 mm, generalmente solo una antigua y confiable arma antiaérea de la Segunda Guerra Mundial con algunas modificaciones. Cumple su función correctamente."
 apc_small_autocannon_2: "Autocañón de la Guerra Fría Tardía"
 apc_small_autocannon_2_desc: "Autocañón dedicado destinado a derrotar tanto a la infantería como al metal."
 apc_small_autocannon_3: "Autocañón Moderno"
 apc_small_autocannon_3_desc: "Los últimos avances, munición explosiva aérea, proyectiles programables."
 apc_small_autocannon_4: "Autocañón del Futuro"
 apc_small_autocannon_4_desc: "Autocañón de nivel de última generación, no deja nada atrás."
 big_autocannon: "Autocañón Pesado de la Guerra Fría Temprana"
 big_autocannon_desc: "Autocañón de alto calibre de 35 a 60 mm destinado a destruir cualquier armadura ligera a la vista."
 big_autocannon_2: "Autocañón Pesado de la Guerra Fría Tardía"
 big_autocannon_2_desc: "Con nuevos proyectiles APFSDS, este cañón no es una broma."
 big_autocannon_3: "Autocañón Pesado Moderno"
 big_autocannon_3_desc: "Diseñado para ser una amenaza para cualquier armadura en el campo."
 big_autocannon_4: "Autocañón Pesado del Futuro"
 big_autocannon_4_desc: "Autocañón de alto calibre avanzado diseñado para destruir cualquier armadura."
 afv_small_medium_cannon: "Cañón Antitanque de la Guerra Fría Temprana"
 afv_small_medium_cannon_desc: "Por lo general, un cañón obsoleto de tanque, con un calibre de 90-105 mm, que 'debería' penetrar en los tanques enemigos. En condiciones favorables."
 afv_small_medium_cannon_2: "Cañón Antitanque de la Guerra Fría Tardía"
 afv_small_medium_cannon_2_desc: "Cañón antitanque dedicado, bueno para enfrentarse a la armadura."
 afv_small_medium_cannon_3: "Cañón Antitanque Moderno"
 afv_small_medium_cannon_3_desc: "Por lo general, un cañón de ánima rayada, preciso y bastante letal."
 afv_small_medium_cannon_4: "Cañón Antitanque del Futuro"
 afv_small_medium_cannon_4_desc: "Precisión, daño: esto describe mejor esta arma."
 afv_steel_armor_gen1: "Armadura de acero"
 afv_steel_armor_gen1_desc: "Tu acero de calidad militar favorito."
 afv_steel_armor_gen2: "Blindaje de Acero Mejorado"
 afv_steel_armor_gen2_desc: "Más resistente que el simple acero, el RHA (acero de alta resistencia)."
 afv_steel_armor_gen3: "Blindaje de Acero Avanzado"
 afv_steel_armor_gen3_desc: "Nanorecubrimiento y aleaciones modernas. Ya ni siquiera es 'acero'."
 afv_alum_armor_gen1: "Armadura de aluminio"
 afv_alum_armor_gen1_desc: "Liviano y bastante duradero."
 afv_alum_armor_gen2: "Blindaje de Aluminio Mejorado"
 afv_alum_armor_gen2_desc: "Aleación mejorada, mejor resistencia al impacto y a la perforación."
 afv_alum_armor_gen3: "Blindaje de Aluminio Avanzado"
 afv_alum_armor_gen3_desc: "Nanorecubrimiento y aleaciones modernas. 'Aluminio' sería un término demasiado limitado."
 afv_composite_armor_gen1: "Blindaje Ligera Compuesta de Principios de la Guerra Fría"
 afv_composite_armor_gen1_desc: "Imitación de un antiguo blindaje compuesto para tanques."
 afv_composite_armor_gen2: "Blindaje Ligera Compuesto de la Guerra Fría"
 afv_composite_armor_gen2_desc: "Versión mejorada del blindaje compuesto adaptado de los tanques."
 afv_composite_armor_gen3: "Blindaje Ligera Compuesto Moderno"
 afv_composite_armor_gen3_desc: "Solución moderna y avanzada para vehículos blindados duraderos."
 afv_composite_armor_gen4: "Blindaje Ligera Compuesto Avanzado"
 afv_composite_armor_gen4_desc: "Con un RHA equivalente medido en metros, es el blindaje más efectivo."
 afv_battlestation_1: "Estación de Batalla de Principios de la Guerra Fría AFV"
 afv_battlestation_1_desc: "Conjunto de radios para mantener contacto con el pelotón y otros vehículos."
 afv_battlestation_2: "Estación de Batalla de la Guerra Fría AFV"
 afv_battlestation_2_desc: "Mejores sistemas de comunicación, telémetro láser."
 afv_battlestation_3: "Estación de Batalla Moderna AFV"
 afv_battlestation_3_desc: "Cámaras de 360 grados, sistemas de comunicación internos más modernos."
 afv_battlestation_4: "Estación de Batalla Avanzada AFV"
 afv_battlestation_4_desc: "Integración en el 'campo de batalla', componentes avanzados para compartir información."
 afv_atgm_gen1: "ATGM de la Guerra Fría Temprana"
 afv_atgm_gen1_desc: "Lanzador externo temprano de ATGM."
 afv_atgm_gen2: "ATGM de la Guerra Fría Tardía"
 afv_atgm_gen2_desc: "Versión mejorada de un lanzador, ahora realmente un ATGM."
 afv_atgm_gen3: "ATGM Moderno"
 afv_atgm_gen3_desc: "Misil moderno guiado por láser con un buen sistema de control."
 afv_atgm_gen4: "ATGM Avanzado"
 afv_atgm_gen4_desc: "Óptica avanzada y un misil complejo hacen de este lanzador un cazatanques."
 afv_atgm_gen5: "ATGM del Futuro"
 afv_atgm_gen5_desc: "Las tecnologías y las innovaciones más avanzadas en el campo antitanque."
 afv_gun_ports: "Puertos de Armas"
 afv_gun_ports_desc: "Puertos de armas para que la tripulación dispare desde el interior del vehículo."
 afv_mine_protection: "Protección contra Minas"
 afv_mine_protection_desc: "Parte inferior del casco protegida contra minas para la seguridad de la tripulación."
 afv_reverse_doors: "Puertas de Tropas Ergonómicas"
 afv_reverse_doors_desc: "Puertas grandes y bien ubicadas para que la tripulación desembarque de manera segura."
 afv_coax_machine_gun: "Ametralladora Coaxial de la Guerra Fría Temprana"
 afv_coax_machine_gun_desc: "Ametralladora de la Segunda Guerra Mundial montada como una ametralladora coaxial."
 afv_coax_machine_gun_2: "Ametralladora Coaxial de la Guerra Fría Tardía"
 afv_coax_machine_gun_2_desc: "Versión mejorada de las armas de la Segunda Guerra Mundial como una ametralladora coaxial."
 afv_coax_machine_gun_3: "Ametralladora Coaxial Moderna"
 afv_coax_machine_gun_3_desc: "Ametralladora moderna montada como ametralladora coaxial."
 afv_coax_machine_gun_4: "Ametralladora Coaxial del Futuro"
 afv_coax_machine_gun_4_desc: "Diseño avanzado, montada como ametralladora coaxial."
 afv_coax_autocannon: "Autocañón Coaxial de la Guerra Fría Temprana"
 afv_coax_autocannon_desc: "Autocañón montado como ametralladora coaxial."
 afv_coax_autocannon_2: "Autocañón Coaxial de la Guerra Fría Tardía"
 afv_coax_autocannon_2_desc: "Autocañón mejorado montado como ametralladora coaxial."
 afv_coax_autocannon_3: "Autocañón Coaxial Moderno"
 afv_coax_autocannon_3_desc: "Autocañón moderno montado como ametralladora coaxial."
 afv_coax_autocannon_4: "Autocañón Coaxial del Futuro"
 afv_coax_autocannon_4_desc: "Autocañón del futuro utilizado en versión coaxial."
 double_feed_system: "Sistema de Alimentación de Doble Calibre"
 double_feed_system_desc: "Este sistema permite que los cañones de alto calibre disparen proyectiles de calibre más pequeño."
 double_cannons: "Cañones Dobles"
 double_cannons_desc: "Sistema para montar dos cañones en lugar de uno, con sus propias complicaciones."
 tank_nsb_armor_upgrade: "Blindaje"
 EQ_MOD_CAT_spaa_naval_cannon_systems_TITLE: "Cañón naval"
 spaa_naval_cannon_1: "Cañón naval posterior a la Segunda Guerra Mundial"
 spaa_naval_cannon_1_desc: "Con un calibre inmenso para su época, este cañón naval ofrece una devastación sin igual para objetivos blandos. Su pura potencia lo convierte en un componente formidable, aunque la movilidad y la eficiencia son un bien escaso."
 spaa_naval_cannon_2: "Cañón naval de la Guerra Fría"
 spaa_naval_cannon_2_desc: "Los diseños de proyectiles y los mecanismos de propulsión mejorados mejoran la potencia de fuego del cañón. Si bien conserva su importante potencial de amenaza aérea, sigue siendo una opción sólida en términos de potencia bruta."
 spaa_naval_cannon_3: "Cañón naval moderno"
 spaa_naval_cannon_3_desc: "Al incorporar carga semiautomática y tipos de municiones avanzadas, esta generación mejora la velocidad de disparo, consolidando aún más su dominio en los enfrentamientos contra objetivos blandos."
 spaa_naval_cannon_4: "Cañón naval avanzado"
 spaa_naval_cannon_4_desc: "Aprovechando rondas de munición guiadas, este cañón ofrece una precisión sin precedentes, consolidando su estatus como potencia en defensa aérea."
 spaa_naval_cannon_5: "Cañón naval futurista"
 spaa_naval_cannon_5_desc: "Utilizando materiales de última generación y diseños de munición optimizados, este cañón garantiza una destrucción aún mayor de objetivos blandos con una eficiencia mejorada."
 EQ_MOD_CAT_spaa_light_autocannon_systems_TITLE: "§RSPAA§!\nCañón Automático Ligero"
 spaa_light_autocannon1: "Cañón automático ligero posterior a la Segunda Guerra Mundial"
 spaa_light_autocannon1_desc: "Aerodinámico y liviano, este cañón automático enfatiza la respuesta rápida y la movilidad, brindando cobertura aérea esencial en situaciones de combate fluidas."
 spaa_light_autocannon2: "Cañón automático ligero de la Guerra Fría"
 spaa_light_autocannon2_desc: "Los materiales evolucionados y los mecanismos de disparo optimizados mejoran la eficiencia del cañón, fortaleciendo su condición de defensor ágil en campos de batalla dinámicos."
 spaa_light_autocannon3: "Cañón automático ligero moderno"
 spaa_light_autocannon3_desc: "Con rondas de alta velocidad, esta versión garantiza enfrentamientos rápidos, lo que la convierte en una excelente opción para una rápida neutralización de amenazas aéreas."
 spaa_light_autocannon4: "Cañón automático ligero avanzado"
 spaa_light_autocannon4_desc: "Las aleaciones avanzadas y una tasa cíclica más alta solidifican su posición como líder en enfrentamientos aéreos rápidos y eficientes."
 spaa_light_autocannon5: "Cañón automático de luz futurista"
 spaa_light_autocannon5_desc: "Aprovechando técnicas de fabricación de última generación, este cañón ofrece la cima de la velocidad y la eficiencia, estableciendo el punto de referencia en sistemas de respuesta rápida."
 EQ_MOD_CAT_spaa_autocannon_systems_TITLE: "§RSPAA§!\nCañón Automático"
 spaa_autocannon_1: "Cañón automático posterior a la Segunda Guerra Mundial"
 spaa_autocannon_1_desc: "Ofreciendo una combinación armoniosa de potencia y velocidad, este cañón versátil es un todoterreno, adecuado para una amplia gama de situaciones de combate."
 spaa_autocannon_2: "Cañón automático de la Guerra Fría"
 spaa_autocannon_2_desc: "Las mejoras en el diseño de la carcasa y la construcción de materiales mejoran su eficacia general, fortaleciendo su posición como una opción confiable para combates variados."
 spaa_autocannon_3: "Autocañón Moderno"
 spaa_autocannon_3_desc: "Los mecanismos de disparo mejorados y los tipos de munición optimizados llevan a esta generación a nuevas alturas, garantizando un rendimiento confiable contra amenazas aéreas y terrestres."
 spaa_autocannon_4: "Cañón automático avanzado"
 spaa_autocannon_4_desc: "Con diseños de cañón reforzado y municiones superiores, esta versión ofrece aún más consistencia en diversos escenarios de combate."
 spaa_autocannon_5: "Cañón automático futurista"
 spaa_autocannon_5_desc: "Esta iteración, que representa el cenit del diseño de cañones automáticos, garantiza un rendimiento óptimo y aprovecha lo último en ciencia de materiales y tecnología de municiones."
 EQ_MOD_CAT_spaa_missile_systems_TITLE: "Misiles de Doble Propósito"
 spaa_missiles_1: "Misiles de Doble Propósito Posteriores a la Segunda Guerra Mundial"
 spaa_missiles_1_desc: "Estos proyectiles guiados, que adoptan los albores de la tecnología de misiles, garantizan enfrentamientos precisos, especialmente potentes contra adversarios aéreos blindados, pero también capaces de atacar objetivos de superficie."
 spaa_missiles_2: "Misiles de Doble Propósito de la Guerra Fría"
 spaa_missiles_2_desc: "La propulsión y la aerodinámica mejoradas dan a estos misiles un impulso, asegurando un impacto más significativo contra objetivos duros y evasivos."
 spaa_missiles_3: "Misiles Modernos de Doble Propósito"
 spaa_missiles_3_desc: "Con sistemas de guía mejorados y ojivas optimizadas, esta generación garantiza enfrentamientos más efectivos y solidifica su autoridad en los cielos."
 spaa_missiles_4: "Misiles Avanzados de Doble Propósito"
 spaa_missiles_4_desc: "Los materiales y sistemas de propulsión avanzados garantizan que estos misiles tengan un mayor alcance e impacto, manteniendo el dominio en la guerra aérea."
 spaa_missiles_5: "Misiles Futuristas de Doble Propósito"
 spaa_missiles_5_desc: "Superando los límites de la tecnología de misiles, esta generación ofrece un alcance, velocidad e impacto incomparables, lo que garantiza que ninguna amenaza aérea quede sin control."
 EQ_MOD_CAT_spaa_short_range_missile_systems_TITLE: "§RSPAA§!\nMisiles de Corto Alcance"
 spaa_short_range_missiles_1: "Misiles de Corto Alcance Posteriores a la Segunda Guerra Mundial"
 spaa_short_range_missiles_1_desc: "Estos proyectiles guiados, que adoptan los albores de la tecnología de misiles, garantizan enfrentamientos precisos, especialmente potentes contra adversarios aéreos blindados."
 spaa_short_range_missiles_2: "Misiles de corto alcance de la Guerra Fría"
 spaa_short_range_missiles_2_desc: "La propulsión y la aerodinámica mejoradas dan a estos misiles un impulso, asegurando un impacto más significativo contra objetivos duros y evasivos."
 spaa_short_range_missiles_3: "Misiles Modernos de Corto Alcance"
 spaa_short_range_missiles_3_desc: "Con sistemas de guía mejorados y ojivas optimizadas, esta generación garantiza enfrentamientos más efectivos y solidifica su autoridad en los cielos."
 spaa_short_range_missiles_4: "Misiles Avanzados de Corto Alcance"
 spaa_short_range_missiles_4_desc: "Los materiales y sistemas de propulsión avanzados garantizan que estos misiles tengan un mayor alcance e impacto, manteniendo el dominio en la guerra aérea."
 spaa_short_range_missiles_5: "Misiles Futuristas de Corto Alcance"
 spaa_short_range_missiles_5_desc: "Superando los límites de la tecnología de misiles, esta generación ofrece un alcance, velocidad e impacto incomparables, lo que garantiza que ninguna amenaza aérea quede sin control."
 EQ_MOD_CAT_spaa_long_range_missile_systems_TITLE: "§RSPAA§!\nMisiles de Largo Alcance"
 spaa_long_range_missiles_1: "Misiles de Largo Alcance Posteriores a la Segunda Guerra Mundial"
 spaa_long_range_missiles_1_desc: "Estos proyectiles guiados, que adoptan los albores de la tecnología de misiles, garantizan enfrentamientos precisos, especialmente potentes contra adversarios aéreos blindados, pero también capaces de atacar objetivos de superficie."
 spaa_long_range_missiles_2: "Misiles de largo alcance de la Guerra Fría"
 spaa_long_range_missiles_2_desc: "La propulsión y la aerodinámica mejoradas dan a estos misiles un impulso, asegurando un impacto más significativo contra objetivos duros y evasivos."
 spaa_long_range_missiles_3: "Misiles Modernos de Largo Alcance"
 spaa_long_range_missiles_3_desc: "Con sistemas de guía mejorados y ojivas optimizadas, esta generación garantiza enfrentamientos más efectivos y solidifica su autoridad en los cielos."
 spaa_long_range_missiles_4: "Misiles Avanzados de Largo Alcance"
 spaa_long_range_missiles_4_desc: "Los materiales y sistemas de propulsión avanzados garantizan que estos misiles tengan un mayor alcance e impacto, manteniendo el dominio en la guerra aérea."
 spaa_long_range_missiles_5: "Misiles Futuristas de Largo Alcance"
 spaa_long_range_missiles_5_desc: "Superando los límites de la tecnología de misiles, esta generación ofrece un alcance, velocidad e impacto incomparables, lo que garantiza que ninguna amenaza aérea quede sin control."
 spaa_battlestation_gen1: "Sistemas de Control de Fuego de la SPAA Posteriores a la Segunda Guerra Mundial"
 spaa_battlestation_gen1_desc: "Este módulo utiliza sistemas rudimentarios y técnicas de coordinación, ofreciendo un enfoque fundamental para identificar y dañar amenazas aéreas."
 spaa_battlestation_gen2: "Sistemas de Control de Fuego Antiaéreo de la Guerra Fría"
 spaa_battlestation_gen2_desc: "Este sistema incorpora métodos de seguimiento avanzados y componentes electrónicos superiores, optimizando la precisión del objetivo y mejorando las capacidades generales de defensa contra amenazas de rápido movimiento."
 spaa_battlestation_gen3: "Sistemas Modernos de Control de Fuego SPAA"
 spaa_battlestation_gen3_desc: "Al integrar sofisticadas tecnologías de guerra digital, este módulo ofrece algoritmos de orientación precisos e interfaces digitales, maximizando el potencial para neutralizar adversarios aéreos."
 spaa_battlestation_gen4: "Sistemas Avanzados de Control de Fuego SPAA"
 spaa_battlestation_gen4_desc: "Diseñado con funciones semiautomatizadas, este sistema emplea protocolos y sensores impulsados ​​por IA, lo que garantiza reacciones rápidas y una protección constante contra una variedad de amenazas aéreas."
 spaa_battlestation_gen5: "Sistemas Futuristas de Control de Fuego SPAA"
 spaa_battlestation_gen5_desc: "Aprovechando las capacidades de la computación cuántica, este módulo ofrece una velocidad de procesamiento y una precisión de orientación incomparables, estableciendo un nuevo punto de referencia en la guerra antiaérea."
 spaa_radar_gen1: "Sistemas de Radar Posteriores a la Segunda Guerra Mundial"
 spaa_radar_gen1_desc: "Un sistema de radar básico diseñado específicamente para plataformas antiaéreas especiales, que ofrece una combinación equilibrada de alcance y precisión para detectar amenazas aéreas. Su coste es indicativo de su naturaleza especializada."
 spaa_radar_gen2: "Sistemas de Radar de la Guerra Fría"
 spaa_radar_gen2_desc: "Mejorado con algoritmos de detección más avanzados, este sistema de radar se destaca en entornos aéreos concurridos, garantizando un seguimiento constante del objetivo en medio de interferencias."
 spaa_radar_gen3: "Sistemas de Radar Modernos"
 spaa_radar_gen3_desc: "Al implementar materiales de alta tecnología y procesamiento digital, garantiza un seguimiento óptimo en tiempo real y la transmisión de información, ofreciendo una ventaja en enfrentamientos aéreos de ritmo rápido."
 spaa_radar_gen4: "Sistemas de Radar Avanzados"
 spaa_radar_gen4_desc: "Un sistema de última generación que aprovecha tecnología innovadora y ofrece precisión y diferenciación de objetivos incomparables en diversos teatros de operaciones."
 spaa_radar_gen5: "Sistemas de radar asistidos por cuántica"
 spaa_radar_gen5_desc: "El pináculo del diseño de radar, que ofrece capacidades adaptativas que gestionan sin problemas múltiples amenazas, consolidando su reputación como una herramienta de detección de primer nivel, incluso si tiene un costo superior."
 spaa_off_vehicle_radar_gen1: "Vehículo de Apoyo de Radar Posterior a la Segunda Guerra Mundial"
 spaa_off_vehicle_radar_gen1_desc: "Si bien ofrece capacidades de detección ampliadas, la función principal de este vehículo de apoyo es ayudar a los SPAA con mejores datos de orientación. Su diseño inicial presenta desafíos en escenarios de avance en primera línea."
 spaa_off_vehicle_radar_gen2: "Vehículo de Apoyo de Radar de la Guerra Fría"
 spaa_off_vehicle_radar_gen2_desc: "Complementado con un procesamiento de señales mejorado, mejora el tiempo de respuesta general del ecosistema de defensa aérea, aunque a expensas de la resiliencia del enfrentamiento directo."
 spaa_off_vehicle_radar_gen3: "Vehículo Moderno de Apoyo de Radar"
 spaa_off_vehicle_radar_gen3_desc: "Este vehículo cuenta con sistemas de radar refinados que prometen una clasificación y retransmisión de amenazas más rápida, incluso si prefiere operar desde una distancia segura."
 spaa_off_vehicle_radar_gen4: "Vehículo de Apoyo de Radar Avanzado"
 spaa_off_vehicle_radar_gen4_desc: "Incorporando tecnología de radar de última generación, actúa como los \"ojos\" de la red de defensa aérea, asegurando que las amenazas sean identificadas y abordadas, aunque es mejor mantenerlo protegido de confrontaciones directas."
 spaa_off_vehicle_radar_gen5: "Vehículo de apoyo de radar asistido por cuántica"
 spaa_off_vehicle_radar_gen5_desc: "Representando un punto culminante en la evolución del radar de apoyo, sus rangos de detección incomparables y su rápida difusión de información lo hacen invaluable, pero sus vulnerabilidades de primera línea persisten."
 spaa_optical_guidance_gen1: "Orientación óptica posterior a la Segunda Guerra Mundial"
 spaa_optical_guidance_gen1_desc: "Aprovechando ayudas visuales básicas y sensores tempranos, este sistema de guía proporciona un medio rentable para rastrear y atacar objetivos aéreos en condiciones favorables."
 spaa_optical_guidance_gen2: "Guía óptica de la Guerra Fría"
 spaa_optical_guidance_gen2_desc: "Al integrar lentes mejoradas y seguimiento electrónico temprano, ofrece una adquisición de objetivos más consistente, especialmente durante operaciones diurnas."
 spaa_optical_guidance_gen3: "Guía óptica moderna"
 spaa_optical_guidance_gen3_desc: "Con los avances en la tecnología de sensores, este sistema ofrece una mejor diferenciación de objetivos y estimación de alcance, lo que lo convierte en una opción confiable y económica."
 spaa_optical_guidance_gen4: "Guía óptica avanzada"
 spaa_optical_guidance_gen4_desc: "Al combinar sensores visuales de última generación con ayudas de software, promete un seguimiento de objetivos más efectivo, manteniéndose a la par de sus homólogos de radar más costosos."
 spaa_optical_guidance_gen5: "Guía óptica futurista"
 spaa_optical_guidance_gen5_desc: "Una maravilla de la tecnología óptica, que ofrece seguimiento visual adaptativo y priorización inteligente de amenazas, consolidando su posición como una alternativa económica pero eficiente."
 EQ_MOD_CAT_spaa_coax_machinegun_category_title: "Ametralladora coaxial"
 spaa_coax_machinegun_1: "MG adicional"
 spaa_coax_machinegun_1_desc: "Una ametralladora complementaria diseñada para combates a corta distancia. Ligera y económica, ofrece una defensa básica contra objetivos aéreos más blandos."
 EQ_MOD_CAT_spaa_auxiliary_autocannon_category_title: "Cañón automático auxiliar"
 spaa_auxiliary_autocannon_1: "Cañón automático auxiliar posterior a la Segunda Guerra Mundial"
 spaa_auxiliary_autocannon_1_desc: "Un cañón automático adicional que aporta más potencia de fuego. Si bien no es tan dominante como los cañones principales, su considerable potencia ayuda a repeler amenazas aéreas y terrestres."
 spaa_auxiliary_autocannon_2: "Cañón automático auxiliar de la Guerra Fría"
 spaa_auxiliary_autocannon_2_desc: "Una versión mejorada con mejores mecanismos de disparo, lo que garantiza un daño más consistente a los objetivos blandos, particularmente contra adversarios aéreos que se mueven rápidamente."
 spaa_auxiliary_autocannon_3: "Cañón automático auxiliar moderno"
 spaa_auxiliary_autocannon_3_desc: "Combinando materiales de alta tecnología con ingeniería refinada, este cañón automático sirve como un respaldo robusto y causa daños sustanciales cuando es necesario."
 spaa_auxiliary_autocannon_4: "Cañón automático auxiliar avanzado"
 spaa_auxiliary_autocannon_4_desc: "Aprovechando tecnología de última generación para mejorar la orientación y la eficiencia de la munición, este modelo consolida su papel como un multiplicador de fuerza secundaria confiable."
 spaa_auxiliary_autocannon_5: "Cañón automático auxiliar futurista"
 spaa_auxiliary_autocannon_5_desc: "Este diseño, que personifica los avances de los cañones automáticos, optimiza la potencia de fuego y la precisión, y se erige como una fuerza a tener en cuenta en operaciones en tándem."
 spaa_auxiliary_heavy_autocannon_1: "Cañón automático pesado auxiliar posterior a la Segunda Guerra Mundial"
 spaa_auxiliary_heavy_autocannon_1_desc: "Un cañón automático adicional que aporta más potencia de fuego. Si bien no es tan dominante como los cañones principales, su considerable potencia ayuda a repeler amenazas aéreas y terrestres."
 spaa_auxiliary_heavy_autocannon_2: "Cañón automático pesado auxiliar de la Guerra Fría"
 spaa_auxiliary_heavy_autocannon_2_desc: "Una versión mejorada con mejores mecanismos de disparo, lo que garantiza un daño más consistente a los objetivos blandos, particularmente contra adversarios aéreos que se mueven rápidamente."
 spaa_auxiliary_heavy_autocannon_3: "Cañón automático auxiliar pesado moderno"
 spaa_auxiliary_heavy_autocannon_3_desc: "Combinando materiales de alta tecnología con ingeniería refinada, este cañón automático sirve como un respaldo robusto y causa daños sustanciales cuando es necesario."
 spaa_auxiliary_heavy_autocannon_4: "Cañón automático auxiliar pesado avanzado"
 spaa_auxiliary_heavy_autocannon_4_desc: "Aprovechando tecnología de última generación para mejorar la orientación y la eficiencia de la munición, este modelo consolida su papel como un multiplicador de fuerza secundaria confiable."
 spaa_auxiliary_heavy_autocannon_5: "Cañón automático auxiliar pesado futurista"
 spaa_auxiliary_heavy_autocannon_5_desc: "Este diseño, que personifica los avances de los cañones automáticos, optimiza la potencia de fuego y la precisión, y se erige como una fuerza a tener en cuenta en operaciones en tándem."
 EQ_MOD_CAT_spaa_support_missile_system_category_title: "Misiles de Apoyo"
 spaa_support_missile_system_1: "Misiles de Apoyo Posteriores a la Segunda Guerra Mundial"
 spaa_support_missile_system_1_desc: "Los primeros misiles guiados fueron diseñados para complementar las armas principales. Si bien su alcance y potencia son limitados, son especialmente útiles contra objetivos blindados."
 spaa_support_missile_system_2: "Misiles de apoyo de la Guerra Fría"
 spaa_support_missile_system_2_desc: "Los sistemas de guía y propulsión mejorados otorgan a estos misiles una mayor precisión, lo que garantiza enfrentamientos más efectivos con adversarios resistentes."
 spaa_support_missile_system_3: "Misiles de Apoyo Modernos"
 spaa_support_missile_system_3_desc: "La aerodinámica avanzada y la optimización de la ojiva mejoran la capacidad de ataque de este misil, consolidando su papel en la derrota de enemigos más duros."
 spaa_support_missile_system_4: "Misiles de Apoyo Avanzados"
 spaa_support_missile_system_4_desc: "Estos misiles, dotados de tecnología de guía de última generación, garantizan ataques precisos, lo que los convierte en activos invaluables contra amenazas aéreas de élite."
 spaa_support_missile_system_5: "Misiles de Apoyo Futuristas"
 spaa_support_missile_system_5_desc: "Ampliando los límites de la tecnología de misiles, esta iteración promete velocidad, impacto y confiabilidad inigualables, sin dejar espacio para que los adversarios respiren."
 ARG_tank_small_medium_cannon_2: "105 mm FM K.4 Modelo 1L"
 ARG_tank_small_medium_cannon_2_desc: "Una versión producida bajo licencia argentina del cañón de tanque británico L7 fabricado por Fabricaciones Militares.\n\n§GConsejo del diseñador: Las armas de bajo calibre son adecuadas para munición HE debido a su menor velocidad inicial. Úsalos si quieres priorizar el ataque suave sobre el ataque duro.§!"
 ARG_tank_diesel_engine_gen2: "MB 833 Ka-500, 720 hp"
 ARG_tank_diesel_engine_gen2_desc: "El MB 833 Ka-500 es un motor diésel de fabricación alemana fabricado por MTU. El motor fue adaptado por Argentina para ser utilizado en el tanque TAM.\n\n§GConsejo del diseñador: Los motores diésel multicombustible son el motor estándar utilizado en los tanques.§!"
 ARG_additional_machine_guns: "7.62 mm FN MAG 60-40"
 ARG_additional_machine_guns_desc: "La FN MAG es una ametralladora belga de uso general. La versión 60-40 está diseñada específicamente para ser montada en vehículos.\n\n§GConsejo del diseñador: Añadir una ametralladora pesada es una forma barata de aumentar ligeramente las capacidades de los tanques contra aviones hostiles y objetivos blandos.§!"
 BRA_tank_small_medium_cannon: "105 mm L7A3"
 BRA_tank_small_medium_cannon_desc: "Versión brasileña producida bajo licencia del L7A3 alemán de 105 mm. Esta arma de la época de la Guerra Fría fue la principal opción de armamento para el tanque Leopard I.\n\n§GConsejo del diseñador: Las armas de bajo calibre son adecuadas para munición HE debido a su menor velocidad inicial. Úsalos si quieres priorizar el ataque suave sobre el ataque duro.§!"
 BRA_tank_medium_cannon: "120 mm GIAT G1"
 BRA_tank_medium_cannon_desc: "El GIAT G1 ​​de 120 mm es una versión brasileña producida bajo licencia del cañón francés CN120-25 fabricado por el Établissement d'Études et de Fabrication d'Armements de Bourges. Este cañón de la época de la Guerra Fría fue la opción principal de armamento para los AMX-32 y AMX-40 de Giat Industries.\n\n§GConsejo del diseñador: Las armas de bajo calibre son adecuadas para munición HE debido a su menor velocidad inicial. Úsalos si quieres priorizar el ataque suave sobre el ataque duro.§!"
 BRA_additional_machine_guns: ".50 Cal M2HB"
 BRA_additional_machine_guns_desc: "La M2HB calibre .50 es una versión brasileña de la ametralladora estadounidense M2 Browning, producida con licencia. La M2HB calibre .50 es una de las ametralladoras más utilizadas, confiables y apreciadas.\n\n§GConsejo del diseñador: Las armas de bajo calibre son adecuadas para munición HE debido a su menor velocidad inicial. Úsalos si quieres priorizar el ataque suave sobre el ataque duro.§!"
 BRA_tank_diesel_engine_gen2: "MWM TBD 234, 1000 hp"
 BRA_tank_diesel_engine_gen2_desc: "El MWM TBH 234 es una versión producida bajo licencia brasileña del MWM TBD 234 alemán, este motor de la era de la Guerra Fría es un motor compacto y de alto rendimiento diseñado durante la Guerra Fría.\n\n§GConsejo del diseñador: Los motores diésel multicombustible son el motor estándar utilizado en los tanques.§!"
 CHI_tank_small_medium_cannon: "100 mm Tipo 59"
 CHI_tank_small_medium_cannon_desc: "El Tipo 59 es una copia china del cañón de tanque D-10T utilizado en la serie T-55.\n\n§GConsejo del diseñador: Las armas de bajo calibre son adecuadas para munición HE debido a su menor velocidad inicial. Úsalos si quieres priorizar el ataque suave sobre el ataque duro.§!"
 CHI_tank_small_medium_cannon_2: "105 mm ZPL-81A"
 CHI_tank_small_medium_cannon_2_desc: "El ZPL-81A es una versión fabricada bajo licencia china del cañón británico L7A3. La versión china tiene una funda térmica mejorada de fabricación nacional.\n\n§GConsejo del diseñador: Las armas de bajo calibre son adecuadas para munición HE debido a su menor velocidad inicial. Úsalos si quieres priorizar el ataque suave sobre el ataque duro.§!"
 CHI_tank_small_medium_cannon_3: "105 mm ZPL-98A"
 CHI_tank_small_medium_cannon_3_desc: "El ZPL-98A es una versión fabricada bajo licencia china del cañón británico L7A3. Esta versión mejorada tiene un freno de boca de bajo retroceso y es más ligera.\n\n§GConsejo del diseñador: Las armas de bajo calibre son adecuadas para munición HE debido a su menor velocidad inicial. Úsalos si quieres priorizar el ataque suave sobre el ataque duro.§!"
 CHI_tank_medium_cannon: "125 mm Tipo 88C"
 CHI_tank_medium_cannon_desc: "El Tipo 88C es uno de los primeros cañones de tanque principal chino basados ​​en el cañón soviético 2A46M.\n\n§GConsejo del diseñador: Las armas de bajo calibre son adecuadas para munición HE debido a su menor velocidad inicial. Úsalos si quieres priorizar el ataque suave sobre el ataque duro.§!"
 CHI_tank_medium_cannon_2: "125 mm ZPT-98"
 CHI_tank_medium_cannon_2_desc: "El ZPT-98 es un cañón de tanque principal de 125 mm construido en China, con un extractor de humos fácilmente distinguible en el punto medio del cañón.\n\n§GConsejo del diseñador: Las armas de bajo calibre son adecuadas para munición HE debido a su menor velocidad inicial. Úsalos si quieres priorizar el ataque suave sobre el ataque duro.§!"
 CHI_additional_machine_guns: "12,7 mm Tipo 54"
 CHI_additional_machine_guns_desc: "La ametralladora Tipo 54 es una copia china de la ametralladora soviética DShK de 12,7 mm que se utiliza comúnmente en los tanques soviéticos y rusos como arma antiaérea adicional.\n\n§GConsejo del diseñador: Añadir una ametralladora pesada es una forma barata de aumentar ligeramente las capacidades de los tanques contra aviones hostiles y objetivos blandos.§!"
 CHI_tank_diesel_engine_gen1: "Modelo 12150L V-12, 520 hp"
 CHI_tank_diesel_engine_gen1_desc: "El modelo 12150L es un motor chino V-12 de principios de la Guerra Fría. Cuando se monta en un tanque, se combina con una caja de cambios manual de cinco velocidades.\n\n§GConsejo del diseñador: Los motores diésel multicombustible son el motor estándar utilizado en los tanques.§!"
 CHI_tank_diesel_engine_gen2: "Modelo 12150L-7BW V-12, 580 hp"
 CHI_tank_diesel_engine_gen2_desc: "El modelo 12150L-7BW es una versión mejorada del modelo 12150L anterior.\n\n§GConsejo del diseñador: Los motores diésel multicombustible son el motor estándar utilizado en los tanques.§!"
 CHI_tank_diesel_engine_gen3: "Modelo 12150ZL V-12, 730 hp"
 CHI_tank_diesel_engine_gen3_desc: "El modelo 12150ZL es una versión mejorada del modelo anterior 12150L-7BW.\n\n§GConsejo del diseñador: Los motores diésel multicombustible son el motor estándar utilizado en los tanques.§!"
 CHI_tank_diesel_engine_gen4: "KMDB 6TD-2, 1200 hp"
 CHI_tank_diesel_engine_gen4_desc: "El KMDB 6TD-2 es un motor de tanque de fabricación rusa que inicialmente se planeó para el prototipo Tipo 90-II. El tanque nunca fue aceptado en servicio en China, pero continuó su vida como tanque Al-Khalid en servicio en Pakistán.\n\n§GConsejo del diseñador: Los motores diésel multicombustible son el motor estándar utilizado en los tanques.§!"
 CHI_tank_diesel_engine_gen5: "150HB, 1500 hp"
 CHI_tank_diesel_engine_gen5_desc: "El 150HB es un motor diésel fabricado por Norinco basado en el MB 873 Ka-501 alemán utilizado en el Leopard 2.\n\n§GConsejo del diseñador: Los motores diésel multicombustible son el motor estándar utilizado en los tanques.§!"
 CHI_reactive_armor_gen1: "FY-I"
 CHI_reactive_armor_gen1_desc: "FY-I es un ERA chino de primera generación diseñado para combatir proyectiles HEAT.\n\n§GConsejo del diseñador: La armadura reactiva explosiva (ERA) es una forma sencilla de mejorar la armadura de tu tanque.§!"
 CHI_reactive_armor_gen2: "FY-II"
 CHI_reactive_armor_gen2_desc: "FY-II es un ERA chino de segunda generación que protege a los tanques contra proyectiles HEAT y APFSDS.\n\n§GConsejo del diseñador: La armadura reactiva explosiva (ERA) es una forma sencilla de mejorar la armadura de tu tanque.§!"
 CHI_reactive_armor_gen3: "FY-IV"
 CHI_reactive_armor_gen3_desc: "FY-IV es un ERA chino de tercera generación que funciona contra proyectiles HEAT y ojivas tándem.\n\n§GConsejo del diseñador: La armadura reactiva explosiva (ERA) es una forma sencilla de mejorar la armadura de tu tanque.§!"
 CHI_reactive_armor_gen4: "FY-V"
 CHI_reactive_armor_gen4_desc: "FY-V es un ERA chino de cuarta generación destinado a proteger el tanque contra todos los proyectiles posibles.\n\n§GConsejo del diseñador: La armadura reactiva explosiva (ERA) es una forma sencilla de mejorar la armadura de tu tanque.§!"
 CHI_hardkill_system_gen1: "GL5"
 ENG_tank_small_medium_cannon: "105 mm L7A1"
 ENG_tank_small_medium_cannon_desc: "El cañón para tanques Royal Ordnance L7 es probablemente uno de los cañones para tanques más famosos. Este cañón y sus diferentes versiones, que fueron copiados y autorizados por muchos países, se utilizaron ampliamente durante el comienzo de la Guerra Fría.\n\n§GConsejo del diseñador: Las armas de bajo calibre son adecuadas para munición HE debido a su menor velocidad inicial. Úsalos si quieres priorizar el ataque suave sobre el ataque duro.§!"
 ENG_tank_small_medium_cannon_2: "105 mm L7A2"
 ENG_tank_small_medium_cannon_2_desc: "El L7A2 es una mejora respecto del antiguo modelo L7 con una funda térmica añadida.\n\n§GConsejo del diseñador: Las armas de bajo calibre son adecuadas para munición HE debido a su menor velocidad inicial. Úsalos si quieres priorizar el ataque suave sobre el ataque duro.§!"
 ENG_tank_small_medium_cannon_3: "105 mm Royal Ordnance IWS"
 ENG_tank_small_medium_cannon_3_desc: "El Royal Ordnance IWS (Improved Weapon System) es un desarrollo posterior del cañón L7 con una mayor carga de presión y un cañón más largo.\n\n§GConsejo del diseñador: Las armas de bajo calibre son adecuadas para munición HE debido a su menor velocidad inicial. Úsalos si quieres priorizar el ataque suave sobre el ataque duro.§!"
 ENG_tank_medium_cannon: "120 mm L11A5"
 ENG_tank_medium_cannon_desc: "El L11A5 es un cañón para tanques británico diseñado como sucesor del cañón L7, de menor tamaño. El cañón L11A5 posee actualmente el mayor alcance de destrucción de tanques, cuando un tanque Challenger británico destruyó un T-55 iraquí a una distancia de 4,7 km durante la Guerra del Golfo.\n\n§GConsejo del diseñador: Los cañones de calibre medio son un arma de tanque equilibrada. Úsalos si no quieres favorecer ni los ataques suaves ni los duros.§!"
 ENG_tank_medium_cannon_2: "120 mm L30A1"
 ENG_tank_medium_cannon_2_desc: "El cañón L30 es una mejora respecto del antiguo L11. Está fabricado con acero de fundición electrolítica con revestimiento de aleación de cromo. Algo poco habitual en un armamento de tanque de la OTAN es que, al igual que su predecesor, el cañón está estriado. Esto se debe al uso intensivo de proyectiles HESH (de cabeza aplastada de alto poder explosivo) por parte del Ejército Real Británico.\n\n§GConsejo del diseñador: Los cañones de calibre medio son un arma de tanque equilibrada. Úsalos si no quieres favorecer ni los ataques suaves ni los duros.§!"
 ENG_tank_diesel_engine_gen1: "Rolls-Royce Meteor, 650 hp"
 ENG_tank_diesel_engine_gen1_desc: "El motor Rolls-Royce Meteor es un motor de tanque versátil de la Segunda Guerra Mundial. Procedente de los aviones, se utilizó en los tanques Cromwell, Comet y Centurion.\n\n§GConsejo del diseñador: Los motores diésel multicombustible son el motor estándar utilizado en los tanques.§!"
 ENG_tank_diesel_engine_gen2: "Perkins CV12-1200TCA, 1200 hp"
 ENG_tank_diesel_engine_gen2_desc: "El motor Perkins CV12 es un motor diésel muy potente desarrollado para los tanques Challenger 1 y Challenger 2.\n\n§GConsejo del diseñador: Los motores diésel multicombustible son el motor estándar utilizado en los tanques.§!"
 ENG_additional_machine_guns: "7.62 mm L37A2"
 ENG_additional_machine_guns_desc: "La L37 es una variante de la ametralladora L7 que se monta en un vehículo. La L7 es una versión fabricada bajo licencia británica de la ametralladora belga FN MAG.\n\n§GConsejo del diseñador: Añadir una ametralladora pesada es una forma barata de aumentar ligeramente las capacidades de los tanques contra aviones hostiles y objetivos blandos.§!"
 ENG_tank_composite_armor_gen1: "Chobham"
 ENG_tank_composite_armor_gen1_desc: "El blindaje Chobham es un blindaje compuesto diseñado por los británicos y desarrollado para el tanque Challenger. Está compuesto por placas de cerámica unidas con acero y reforzadas con placas elásticas. El término \"Chobham\" se ha convertido en sinónimo de blindaje compuesto, independientemente del tanque o del fabricante.\n\n§GConsejo del diseñador: El blindaje compuesto es la opción estándar para los tanques de batalla principales modernos.§!"
 ENG_tank_composite_armor_gen2: "Dorchester"
 ENG_tank_composite_armor_gen2_desc: "El blindaje Dorchester es la última variante del blindaje Chobham original y actualmente se utiliza en los tanques Abrams y Challenger 2. La versión mejorada ofrece una mejor protección contra el fuego enemigo.\n\n§GConsejo del diseñador: El blindaje compuesto es la opción estándar para los tanques de batalla principales modernos.§!"
 SOV_tank_small_medium_cannon: "100 mm D-10T2S"
 SOV_tank_small_medium_cannon_desc: "El D-10 es un cañón de tanque soviético desarrollado a finales de la Segunda Guerra Mundial, que se montó por primera vez en el cazacarros SU-100. Al comienzo de la Guerra Fría, el arma se convirtió en el armamento elegido para los tanques de las series T-54 y T-55.\n\n§GConsejo del diseñador: Las armas de bajo calibre son adecuadas para munición HE debido a su menor velocidad inicial. Úsalos si quieres priorizar el ataque suave sobre el ataque duro.§!"
 SOV_tank_small_medium_cannon_2: "115 mm U-5TS"
 SOV_tank_small_medium_cannon_2_desc: "El U-5TS es el primer cañón de ánima lisa desarrollado para su uso en tanques. El cañón de 100 mm existente en el T-55 era demasiado débil para enfrentarse a los nuevos tanques Centurion y M48 Patton de Occidente. En respuesta a estos tanques, los soviéticos desarrollaron el cañón de 115 mm. El cañón solo se ha utilizado en el T-62. Se ha demostrado que es eficaz incluso contra tanques más modernos, como se demostró en la guerra entre Irán e Irak, donde el T-62 fue capaz de derribar a los Chieftains y M60 mucho más nuevos.\n\n§GConsejo del diseñador: Las armas de bajo calibre son adecuadas para munición HE debido a su menor velocidad inicial. Úsalos si quieres priorizar el ataque suave sobre el ataque duro.§!"
 SOV_tank_small_medium_cannon_3: "100 mm 2A70"
 SOV_tank_small_medium_cannon_3_desc: "El 2A70 es un cañón estriado de tiro rápido diseñado para vehículos blindados ligeros. El cañón está destinado principalmente a ser utilizado con munición HE. El 2A70 es el arma principal de la serie BMP-3.\n\n§GConsejo del diseñador: Las armas de bajo calibre son adecuadas para munición HE debido a su menor velocidad inicial. Úsalos si quieres priorizar el ataque suave sobre el ataque duro.§!"
 SOV_tank_medium_cannon: "125 mm 2A46"
 SOV_tank_medium_cannon_desc: "El 2A46 es el cañón de tanque soviético más común. Desarrollado originalmente para el T-64, el cañón se ha utilizado en todos los tanques soviéticos y rusos desde entonces, además de en varios tanques extranjeros.\n\n§GConsejo del diseñador: Los cañones de calibre medio son un arma de tanque equilibrada. Úsalos si no quieres favorecer ni los ataques suaves ni los duros.§!"
 SOV_tank_medium_cannon_2: "125 mm 2A46M"
 SOV_tank_medium_cannon_2_desc: "El 2A46M es una familia de desarrollos del cañón 2A46 original, con una mayor variedad de munición y mejoras generales.\n\n§GConsejo del diseñador: Los cañones de calibre medio son un arma de tanque equilibrada. Úsalos si no quieres favorecer ni los ataques suaves ni los duros.§!"
 SOV_tank_medium_cannon_3: "125 mm 2A82-1M"
 SOV_tank_medium_cannon_3_desc: "El cañón 2A82-1M, el último desarrollo de la tecnología rusa para tanques, está destinado a ser utilizado en los nuevos tanques T-14 Armata. Según se informa, este cañón tiene entre un 15% y un 20% más de precisión que el antiguo 2A46M y una velocidad inicial mayor que la del cañón Leopard 2.\n\n§GConsejo del diseñador: Los cañones de calibre medio son un arma de tanque equilibrada. Úsalos si no quieres favorecer ni los ataques suaves ni los duros.§!"
 SOV_tank_large_cannon: "130 mm M-65 L/60"
 SOV_tank_large_cannon_desc: "Un cañón experimental para tanque pesado que se pretendía utilizar con el tanque de asalto pesado Kotin Object 279, resistente a explosiones nucleares. Cuando se acabó la necesidad de tanques pesados, el proyecto se canceló y, con él, el cañón.\n\n§GConsejo del diseñador: Los cañones pesados ​​están pensados ​​para usarse principalmente en tareas antiblindaje. Úsalos si quieres favorecer el ataque duro y al mismo tiempo conservar algo de ataque suave.§!"
 SOV_tank_large_cannon_2: "130 mm M-65 L/70"
 SOV_tank_large_cannon_2_desc: "Una versión mejorada del cañón para tanque Object 279. Este cañón para tanque pesado estriado estaba destinado al Object 785, una mejora prevista para el tanque T-80. El proyecto nunca se terminó.\n\n§GConsejo del diseñador: Los cañones pesados ​​están pensados ​​para usarse principalmente en tareas antiblindaje. Úsalos si quieres favorecer el ataque duro y al mismo tiempo conservar algo de ataque suave.§!"
 SOV_tank_very_large_cannon: "152 mm LP-83"
 SOV_tank_very_large_cannon_desc: "El LP-83 era un cañón superpesado experimental que se probó en el Object 292, el tanque que debía reemplazar al T-80BV. En 1990 se fabricó un prototipo del tanque y del cañón, pero debido a la falta de financiación e interés, el proyecto se canceló.\n\n§GConsejo del diseñador: Los cañones superpesados ​​están pensados ​​para su uso en misiones antiblindaje. Utilízalos si quieres favorecer en gran medida el ataque duro frente al ataque suave.§!"
 SOV_tank_very_large_cannon_2: "152 mm 2A83"
 SOV_tank_very_large_cannon_2_desc: "El 2A83 es ​​una continuación de los cañones superpesados ​​de los tanques soviéticos. El cañón está pensado como una posible mejora para el T-14 Armata, para que supere en potencia a cualquier tanque occidental.\n\n§GConsejo del diseñador: Los cañones superpesados ​​están pensados ​​para su uso en misiones antiblindaje. Utilízalos si quieres favorecer en gran medida el ataque duro frente al ataque suave.§!"
 SOV_tank_diesel_engine_gen1: "V-55, 581 hp"
 SOV_tank_diesel_engine_gen1_desc: "El V-55 es un motor V12 de aspiración natural que se utilizó en el tanque T-55.\n\n§GConsejo del diseñador: Los motores diésel multicombustible son el motor estándar utilizado en los tanques.§!"
 SOV_tank_diesel_engine_gen2: "5TDF, 700 hp"
 SOV_tank_diesel_engine_gen2_desc: "El 5TDF es un motor diésel de dos tiempos, multicombustible, con sobrealimentador de alta cilindrada, refrigeración líquida, inyección directa, pistones opuestos y cilindros horizontales. Originalmente diseñado para el T-64, también se utilizó en las primeras versiones del T-72.\n\n§GConsejo del diseñador: Los motores diésel multicombustible son el motor estándar utilizado en los tanques.§!"
 SOV_tank_diesel_engine_gen3: "V-84, 840 hp"
 SOV_tank_diesel_engine_gen3_desc: "Los motores diésel multicombustible son el motor estándar utilizado en los tanques.\n\n§GConsejo del diseñador: Los motores diésel multicombustible son el motor estándar utilizado en los tanques.§!"
 SOV_tank_diesel_engine_gen4: "V-92S2, 1000 hp"
 SOV_tank_diesel_engine_gen4_desc: "El motor diésel turbocargado V-92S2 fue diseñado para los tanques de la serie T-72B3 y T-90.\n\n§GCosejo del diseñador: Los motores diésel multifunción son el estándar utilizado en los tanques§!"
 SOV_tank_diesel_engine_gen5: "V-92S2F, 1130 hp"
 SOV_tank_diesel_engine_gen5_desc: "El V-92S2F es una versión mejorada del modelo anterior V-92S2. Está diseñado como una actualización directa para el modelo anterior.\n\n§GCosejo del diseñador: Los motores diésel multifunción son el estándar utilizado en los tanques§!"
 SOV_tank_diesel_engine_gen6: "2V-12-3A, 1500 hp"
 SOV_tank_diesel_engine_gen6_desc: "El 2V-12-3A es un motor tipo X12 que fue diseñado para el T-14 Armata.\n\n§GCosejo del diseñador: Los motores diésel multifunción son el estándar utilizado en los tanques§!"
 SOV_tank_diesel_engine_gen7: "A-85-3A, 1500 hp"
 SOV_tank_diesel_engine_gen7_desc: "El A-85-3A es un motor tipo X12 que reemplazó al modelo anterior 2V-12-3A en el Armata debido a problemas de confiabilidad del modelo anterior.\n\n§GCosejo del diseñador: Los motores diésel multifunción son el estándar utilizado en los tanques§!"
 SOV_tank_gas_turbine_engine_gen1: "GTD-3TL"
 SOV_tank_gas_turbine_engine_gen1_desc: "El GTD-3TL fue un motor de turbina de gas experimental que se pensaba utilizar como la opción principal para el tanque T-64. Sin embargo, la idea fue posteriormente abandonada en favor de un motor diésel.\n\n§GCosejo del diseñador: Las turbinas de gas tienen una mejor aceleración que los motores diésel, lo que mejora la maniobrabilidad del vehículo. Sin embargo, son costosas de construir y consumen mucha energía. Utiliza turbinas de gas si deseas tanques rápidos y puedes proporcionarles suficiente combustible§!"
 SOV_tank_gas_turbine_engine_gen2: "SG-1000"
 SOV_tank_gas_turbine_engine_gen2_desc: "El SG-1000 fue el motor de turbina de gas original del T-80. Fue rápidamente reemplazado por un modelo mejorado.\n\n§GConsejo del diseñador: Las turbinas de gas ofrecen mayor aceleración que los motores diésel, lo que mejora la maniobrabilidad del vehículo. Sin embargo, son caras de construir y consumen mucho combustible. ¡Usa turbinas de gas si quieres tanques rápidos y puedes suministrarles el combustible§!"
 SOV_tank_gas_turbine_engine_gen3: "GTD-1000T"
 SOV_tank_gas_turbine_engine_gen3_desc: "La GTD-1000T es una turbina de gas diseñada para los tanques T-80A y T-80B. Es más fiable y produce algo más de potencia que la antigua SG-1000.\n\n§GConsejo del diseñador: Las turbinas de gas ofrecen mayor aceleración que los motores diésel, lo que mejora la maniobrabilidad del vehículo. Sin embargo, son caras de construir y consumen mucho combustible. ¡Usa turbinas de gas si quieres tanques rápidos y puedes suministrarles el combustible§!"
 SOV_tank_gas_turbine_engine_gen4: "GTD-1250"
 SOV_tank_gas_turbine_engine_gen4_desc: "El GTD-1250 es un motor de turbina de gas utilizado en el tanque T-80 de segunda generación, el T-80U. La turbina de gas se combina con una turbina de gas más pequeña que actúa como unidad de potencia auxiliar.\n\n§GConsejo del diseñador: Las turbinas de gas ofrecen mayor aceleración que los motores diésel, lo que mejora la maniobrabilidad del vehículo. Sin embargo, son caras de construir y consumen mucho combustible. ¡Usa turbinas de gas si quieres tanques rápidos y puedes suministrarles el combustible§!"
 SOV_tank_gas_turbine_engine_gen5: "GTD-1250T"
 SOV_tank_gas_turbine_engine_gen6: "GTD-1500"
 SOV_tank_electric_engine_gen1: "VK-1200V"
 SOV_tank_electric_engine_gen2: "VK-1700V"
 SOV_reactive_armor_gen1: "Kontakt-1"
 SOV_reactive_armor_gen1_desc: "El Kontakt-1 es el blindaje reactivo explosivo (ERA) de primera generación desarrollado en la Unión Soviética. Consta de dos elementos explosivos 4S20 entre dos placas de acero. El Kontakt-1 es muy insensible y solo puede ser detonado por una carga hueca.\n\n§GConsejo del diseñador:La armadura reactiva explosiva (ERA) es una forma sencilla de mejorar la armadura de tu tanque.§!"
 SOV_reactive_armor_gen2: "Kontakt-5"
 SOV_reactive_armor_gen2_desc: "Kontakt-5 es el blindaje reactivo explosivo (ERA) de segunda generación desarrollado en la Unión Soviética. Al detonar, las placas de acero de los ladrillos se mueven lateralmente, creando un camino de penetración más largo para los proyectiles entrantes. Este método de defensa también es eficaz contra los penetradores cinéticos.\n\n§GConsejo del diseñador:La armadura reactiva explosiva (ERA) es una forma sencilla de mejorar la armadura de tu tanque.§!"
 SOV_reactive_armor_gen3: "Relikt"
 SOV_reactive_armor_gen3_desc: "Relikt es la armadura reactiva explosiva (ERA) de tercera generación desarrollada en la Unión Soviética. Es capaz de defenderse contra penetradores de movimiento rápido y lento, e incluso puede proteger contra cargas en forma de tándem.\n\n§GConsejo del diseñador: la armadura reactiva explosiva (ERA) es una manera fácil de mejorar la armadura de su tanque§!"
 SOV_reactive_armor_gen4: "Malachit"
 SOV_reactive_armor_gen4_desc: "Malachit es el blindaje reactivo explosivo (ERA) de cuarta generación montado en el T-14 Armata.\n\n§GConsejo del diseñador: La armadura reactiva explosiva (ERA) es una forma sencilla de mejorar la armadura de tu tanque.§!"
 SOV_smoothbore_atgm_gen1: "9K112 Kobra"
 SOV_smoothbore_atgm_gen2: "9M119 Svir"
 SOV_smoothbore_atgm_gen3: "9M133 Kornet"
 SOV_smoothbore_atgm_gen4: "9M140 Udar"
 SOV_smoothbore_atgm_gen5: "9M143 Sila"
 SOV_additional_machine_guns: "12.7 mm DShK 1938/46"
 SOV_additional_machine_guns_desc: "The DShK is a heavy machine gun developed by the Soviet Union during World War 2. Despite its age, it is still widely used for anti-air and fire support duties on not just Russian vehicles, but in many other countries as well.\n\n§GDesigner Hint: Adding a heavy machine gun is a cheap way of slightly increasing the tanks capacities against hostile aircraft and soft targets§!"
 SOV_smoke_launchers: "3D6"
 SOV_smoke_launchers_desc: "Tucha is an 81 mm vehicle mounted grenade launcher developed in the Soviet Union. It is mainly used to fire the 3D6 and 3D6M type smoke grenades.\n\n§GDesigner Hint: Adding smoke launchers reduces the visibility of our tank, making it better in both defence and offence§!"
 SOV_smoke_launchers_2: "3D6M"
 SOV_smoke_launchers_2_desc: "El Tucha es un lanzagranadas de 81 mm para vehículos desarrollado en la Unión Soviética. Se utiliza principalmente para disparar granadas de humo de tipo 3D6 y 3D6M.\n\n§GConsejo del diseñador: Agregar lanzadores de humo reduce la visibilidad de nuestro tanque, lo que lo hace mejor tanto en defensa como en ataque.§!"
 SOV_hardkill_system_gen1: "Arena"
 SOV_hardkill_system_gen1_desc: "El sistema de protección activa Arena utiliza un radar Doppler para detectar misiles entrantes. Una vez que se detecta un misil, el sistema dispara un cohete para contrarrestarlo.\n\n§GConsejo del diseñador: Un sistema de destrucción masiva es una buena manera de reforzar las capacidades defensivas de nuestros tanques contra misiles hostiles. También permitirá que nuestro blindaje sea más eficaz a la hora de atravesar líneas hostiles.§!"
 SOV_hardkill_system_gen2: "Afganistán"
 SOV_hardkill_system_gen2_desc: "Afganit es un sistema avanzado de protección activa desarrollado en Rusia. Está destinado a ser utilizado en el tanque T-14 Armata. El sistema puede contrarrestar tanto misiles como penetradores cinéticos, y puede detener cualquier proyectil que vuele a menos de 1.700 m/s.\n\n§GConsejo del diseñador: Un sistema de destrucción masiva es una buena manera de reforzar las capacidades defensivas de nuestros tanques contra misiles hostiles. También permitirá que nuestro blindaje sea más eficaz a la hora de atravesar líneas hostiles.§!"
 GER_tank_small_medium_cannon: "105 mm L7A3"
 GER_tank_medium_cannon_2: "120 mm RH-120 L/44"
 GER_tank_diesel_engine_gen1: "MB 837 A, 630 hp"
 GER_tank_diesel_engine_gen2: "MB 838 CaM 500, 819 hp"
 GER_tank_diesel_engine_gen4: "MTU MB 873 Ka-501, 1500 hp"
 GER_tank_diesel_engine_gen5: "EuroPowerPack, 1650 hp"
 GER_spaced_armor_gen1: "Blohm & Voss Rüstung"
 GER_spaced_armor_gen2: "Lexan Rüstung"
 GER_smoke_launchers: "4xWegman 76 mm"
