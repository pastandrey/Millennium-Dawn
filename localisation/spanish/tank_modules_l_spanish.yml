 medium_tank_destroyer_chassis_0: "Casco de Tanque Ligero de 1ª Generación"
 medium_tank_destroyer_chassis_0_desc: "El papel de los tanques ligeros es el reconocimiento y las operaciones aerotransportadas, pero presentan la desventaja de un blindaje débil y una baja capacidad de supervivencia ante diversas armas antitanque actuales. Junto con la aparición de los tanques de infantería, el desarrollo de los tanques ligeros ha decaído."
