l_english:
 #Events
 Solomon_Islands.1.t: "The Munda Accord"
 Solomon_Islands.1.d: "Following intensive mediation by Commonwealth Special Envoy Sitiveni Rabuka, the provincial government and opposition leaders have signed the Munda Accord. The agreement outlines a Nine-Point Plan intended to de-escalate ethnic violence and establish a roadmap for constitutional reform."
 Solomon_Islands.1.a: "A fragile peace is better than none"
 Solomon_Islands.1.b: "Sink the Accords"
 
 Solomon_Islands.2.t: "The Malaita Eagle Force Coup"
 Solomon_Islands.2.d: "The political situation has reached its breaking point. Early this morning, members of the Malaita Eagle Force, reportedly aided by elements of the paramilitary police force, seized control of key strategic points in Honiara. Prime Minister [SOL.GetLeader] has been placed under house arrest at gunpoint. The  Malaita Eagle Force leadership claims the government failed to protect Malaitan interests and is demanding an immediate transition of power. The democratic process has been effectively suspended. "
 Solomon_Islands.2.a: "Manasseh Sogavare"
 Solomon_Islands.2.b: "Jimmy 'Rasta' Lusibaea"

 Solomon_Islands.3.t: "Isatabu Freedom Movement Assault on Honiara"
 Solomon_Islands.3.d: "The Isatabu Freedom Movement has launched a massive counter-offensive to drive Malaitan influence off the island. Guerrilla fighters have emerged from the jungle to lay siege to the capital, Honiara. With the official police force fractured along ethnic lines, the country has split into a full-scale civil war. The Isatabu Freedom Movement demands the total expulsion of Malaitan settlers, while the goverment controlled government prepares for a bloody defence of the urban centre. "
 Solomon_Islands.3.a: "War in the Pacific."

 Solomon_Islands.4.t: "Crisis in the Solomon Islands"
 Solomon_Islands.4.d: "The [SOL.GetNameWithFlag] has descended into a state of civil collapse. Prime Minister [SOL.GetLeader]  administration is paralysed by the escalating Tensions between the Isatabu Freedom Movement and the Malaita Eagle Force. The conflict is rooted in disputes over internal migration to Guadalcanal and indigenous land rights. Critically, the Gold Ridge mine and other vital industries have ceased operations, threatening our economic interests in the South Pacifi."
 Solomon_Islands.4.a: "We cannot ignore this instability."
 Solomon_Islands.4.b: "Who cares? I'm [ROOT.GetLeader]"

 Solomon_Islands.5.t: "Request for Mediation"
 Solomon_Islands.5.d: "In a desperate bid to prevent a total humanitarian catastrophe,  [FROM.GetNameWithFlag] has formally requested that we host a peace summit. Their proposal suggests a framework for reconciliation through decentralisation and autonomy reforms to appease ethnic factions. Furthermore, they have requested a contingent of administrative and military advisors to ensure the reform process remains uninterrupted by militant interference."
 Solomon_Islands.5.a: "Accept the  peace process"
 Solomon_Islands.5.b: "It is our internal struggle back off"

 Solomon_Islands.6.t: "Rejection of Mediation"
 Solomon_Islands.6.d: "[SOL.GetNameWithFlag] has bluntly rejected our offer to mediate the ongoing crisis. In a stern communiqué, the leadership stated they will not tolerate neo-colonial meddling in their domestic affairs. They have made it clear that foreign advisors and diplomatic interference are not welcome, insisting that the Solomon Islands will resolve its own disputes without external oversight. "
 Solomon_Islands.6.a: "Then they shall face the consequences alone."

 Solomon_IslandsNews.1000.t: "Australia Brokered Ceasefire in the Solomon Islands"
 Solomon_IslandsNews.1000.d: "After days of negotiations at the RAAF Base Townsville, Queensland, a compromise has been reached. The [SOL.GetNameWithFlag]  Government have signed a comprehensive peace treaty. [AST.GetNameWithFlag] has committed to leading the International Peace Monitoring Team to oversee a 30-day gun amnesty and the destruction of surrendered weapons. While [AST.capital.GetName] remains wary of mission creep."
 Solomon_IslandsNews.1000.a: "Stability returns to the Solomon Islands"

 Solomon_IslandsNews.1001.t: "Solomon Islands Ceasefire"
 Solomon_IslandsNews.1001.d: "[FROM.GetNameWithFlag] has successfully brokered a ceasefire between the warring factions of the [SOL.GetNameWithFlag]. The agreement outlines a roadmap for disarmament and constitutional reform. All parties have agreed to an immediate cessation of hostilities and the establishment of a neutral monitoring force. "
 Solomon_IslandsNews.1001.a: "Stability returns to the Solomon Islands"

 Solomon_IslandsNews.1002.t: "Coup d'état in the Solomon Islands"
 Solomon_IslandsNews.1002.d: "The Malaita Eagle Force, a Malaitan militant organisation, has seized the capital. Using stolen police weaponry and supported by rogue elements of the Police Field Force, the Malaita Eagle Force surrounded the residence of Prime Minister Bartholomew Ulufa'alu early this morning. Under heavy guard and with the city's armoury in rebel hands, Ulufa'alu was forced to tender his resignation. The Malaita Eagle Force-backed government now claims to be the sole authority in Honiara."
 Solomon_IslandsNews.1002.a: "A Looming Storm"

 Solomon_IslandsNews.1003.t: "The Solomon Islands Falls into Revolt"
 Solomon_IslandsNews.1003.d: "The civil war has ended with a total victory for the Isatabu Freedom Movement. After a prolonged campaign of guerrilla warfare. The Isatabu Freedom Movement has successfully forced the collapse of the Malaita Eagle Force-aligned administration in Honiara."
 Solomon_IslandsNews.1003.a: "Democracy falls in Honiara."

 Solomon_IslandsNews.1004.t: "Ends of the Solomon Islands Civil Conflict"
 Solomon_IslandsNews.1004.d: "The civil war has ended with a total victory for the Isatabu Freedom Movement. After a prolonged campaign of guerrilla warfare. The Isatabu Freedom Movement has successfully forced the collapse of the Malaita Eagle Force-aligned administration in Honiara."
 Solomon_IslandsNews.1004.a: "Whats the next Chapter"

 Solomon_IslandsNews.1005.t: "Ends of the Solomon Islands Civil Conflict"
 Solomon_IslandsNews.1005.d: "The joint operations of the Malaita Eagle Force and the remnants of the national police have finally crushed the IFM insurgency. Following a brutal offensive into the Guadalcanal interior. "
 Solomon_IslandsNews.1005.a: "Whats the next Chapter"

