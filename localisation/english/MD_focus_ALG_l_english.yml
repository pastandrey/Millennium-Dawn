 #intro
 algeria_intro.1.t: "The People's Democratic Republic of Algeria"
 algeria_intro.1.d: "Algeria enters the 21st century scarred by the bloody Black Decade, yet still standing. The state has survived the Islamist insurgency, but the wounds of civil war remain deep. President Abdelaziz Bouteflika promises reconciliation and reconstruction, but the challenges ahead are daunting: reviving the economy, reforming the military, rebuilding trust between the people and the state, and navigating between powerful foreign partners. Will Algeria consolidate stability and rise as a regional power, or fall once more into internal strife?"
 algeria_intro.1.a: "A nation scarred, but unbroken."

 #Hirak
 ALG_resistance_window_title: "Algerian Resistance Movement"
 ALG_resistance_window_desc: "The nation is rocked by widespread protests, unrest, and resistance. Le Pouvoir seeks to suppress dissent, but the more pressure applied, the stronger resistance becomes."
 ALG_resistance_power_balance_tt: "§YBalance of Power§! between §OProtesters§! and §RLe Pouvoir§!"

 ALG_protester_exhaustion_TT: "§YThe protesters§! have grown exhausted from government counter-measures."
 ALG_deploys_security_TT: "§YThe state deploys heavy security forces to suppress unrest.§!"
 ALG_presidential_decisions_only_one_is_available_TT: "Only one suppression measure can be active at a time."

 ALG_resistance_movement: "Hirak Movement"
 ALG_resistance_movement_desc: "Nationwide grassroots protests known as the Hirak continue to demand political reform, transparency, and social justice across Algeria."

 ALG_throttle_internet_speeds: "Ordonnance n°24-17 — Régulation des Télécommunications"
 ALG_throttle_internet_speeds_desc: "Under Ordinance 24-17, authorities restrict access to online platforms and social media to disrupt Hirak organisers. This limits protest coordination but frustrates citizens and slows economic activity."

 ALG_nationwide_security_presence: "Opération Saqr al-Jazaïr — Présence Sécuritaire Nationale"
 ALG_nationwide_security_presence_desc: "Security forces are mobilized nationwide under Operation Desert Hawk to discourage Hirak demonstrations. While effective at deterring protests, this measure increases costs and undermines public trust.

 ALG_fund_pro_government_protests: "Programme de Solidarité Nationale — Dispositif 'Baraka'"
 ALG_fund_pro_government_protests_desc: "The government funds and organises pro-regime demonstrations under Project Baraka to counter the Hirak movement. This can dampen opposition momentum but is costly and risks inflaming public resentment."

 ALG_deploy_security_kabylia_1: "Deploy Security to Kabylia"
 ALG_deploy_security_kabylia_1_desc: "Kabylia has become a hotbed of unrest. Deploying security forces may pacify the region, but it risks further inflaming local resentment."
 ALG_deploy_security_mzab_1: "Deploy Security to M'zab Valley"
 ALG_deploy_security_mzab_1_desc: "Tensions in the M'zab Valley have escalated. Sending security detachments may curb unrest locally, but heavy-handed operations risk alienating communities and undermining long-term trust."

 ALG_deploy_security_aures_1: "Deploy Security to the Aurès Highlands"
 ALG_deploy_security_aures_1_desc: "The Aurès highlands have become a focal point for demonstrations. A security deployment can break up large gatherings, yet it will strain logistics in rugged terrain and could inflame regional grievances."

 ALG_deploy_security_tamanrasset_1: "Deploy Security to Tamanrasset Province"
 ALG_deploy_security_tamanrasset_1_desc: "Tamanrasset's southern provinces are seeing increased unrest. Deploying forces may stabilise transport routes and key installations, but risks damaging relations with local communities and disrupting cross-Saharan trade."

 ALG_deploy_security_granderg_1: "Deploy Security to the Grand Erg Region"
 ALG_deploy_security_granderg_1_desc: "Unrest around the Grand Erg has threatened remote settlements and critical infrastructure. Security patrols can bring short-term order, though the harsh environment makes sustained operations costly and politically sensitive."

 ALG_deploy_security_atlas_1: "Deploy Security to the Atlas Foothills"
 ALG_deploy_security_atlas_1_desc: "The Atlas foothills have hosted recurring protests and labour actions. A targeted deployment can prevent mass mobilisations along transport corridors but may fuel resentment among rural populations."

 ALG_deploy_security_constantinois_1: "Deploy Security to the Constantinois Region"
 ALG_deploy_security_constantinois_1_desc: "Constantine and its surroundings are experiencing frequent demonstrations. Concentrating security assets here can protect government facilities and ports, but it raises the likelihood of clashes in dense urban districts."

 ALG_deploy_security_algerois_1: "Deploy Security to the Algiers Metropolitan Area"
 ALG_deploy_security_algerois_1_desc: "Algiers remains the centre of Hirak activity. A major security presence can deter street mobilisations and secure institutions, yet it risks visible repression in the capital and significant political fallout."

 ALG_deploy_security_oranais_1: "Deploy Security to the Oran and Western Coast"
 ALG_deploy_security_oranais_1_desc: "The Oran region has seen growing demonstrations linked to labour and youth networks. Deploying forces can protect ports and economic hubs, but may disrupt commerce and escalate tensions with local leaders."

