 ALG_reconciliation_momentum_ended_tt: "Reconciliation momentum has faded."
 ALG_by_the_people_for_the_people: "By The People, For The People"
 ALG_by_the_people_for_the_people_desc: "The Hirak movement has shaken Algeria to its core. The people demand a complete transformation of the political system — not merely a change of faces, but a fundamental restructuring of power. The old guard will not go quietly."
 ALG_by_the_people_for_the_people_tt: "The §YHirak movement§! must have sufficient momentum (power balance above §G70%§!)."
 ALG_break_the_oligarchs: "Break The Oligarchs"
 ALG_break_the_oligarchs_desc: "The network of businessmen who profited from their proximity to the regime must be dismantled. Their assets will be seized, their contracts reviewed, and their influence over the state ended forever."
 ALG_dismantle_le_pouvoir: "Dismantle Le Pouvoir"
 ALG_dismantle_le_pouvoir_desc: "The shadow state — the generals, the intelligence services, the invisible hand that has guided Algeria since independence — must be brought into the light and stripped of its authority."
 ALG_new_economic_model: "A New Economic Model"
 ALG_new_economic_model_desc: "With the oligarchs removed, Algeria needs a new economic vision. The rentier state model is dead. In its place, a diversified economy built on industry, technology, and human capital."
 ALG_unleash_civil_society: "Unleash Civil Society"
 ALG_unleash_civil_society_desc: "A free press, independent unions, and political parties that represent real constituencies — these are the foundations upon which democracy is built."
 ALG_constitutional_convention: "Constitutional Convention"
 ALG_constitutional_convention_desc: "Representatives from across Algeria gather to draft a new constitution. For the first time, the document will be written by the people, not imposed by the powerful."
 ALG_presidential_republic: "Presidential Republic"
 ALG_presidential_republic_desc: "Algeria will adopt a presidential system with a strong executive, clear authority, and democratic accountability. The president governs decisively while constitutional safeguards prevent abuse of power."
 ALG_parliamentary_republic: "Parliamentary Republic"
 ALG_parliamentary_republic_desc: "Algeria will adopt a parliamentary system where power is shared among elected representatives. Coalition-building and consensus ensure no single individual can dominate the state again."
 ALG_civilian_military_control: "Civilian Military Control"
 ALG_civilian_military_control_desc: "The military must serve the state, not rule it. Professional officers replace political generals. The army is modernized, depoliticized, and placed firmly under civilian authority."
 ALG_democratic_dividend: "The Democratic Dividend"
 ALG_democratic_dividend_desc: "A transparent, democratic Algeria attracts foreign investment, international partnerships, and the return of the diaspora. The economy diversifies beyond hydrocarbons as the world takes notice."
 ALG_a_new_algeria: "A New Algeria"
 ALG_a_new_algeria_desc: "From the ashes of the old regime, a new nation emerges. The corruption networks are dismantled. The brain drain reverses. Algeria stands as proof that genuine democracy can be built through the will of its own people."
 ALG_transitional_instability: "Transitional Instability"
 ALG_transitional_instability_desc: "The collapse of the old order has left a power vacuum. Institutions are weak, the economy is disrupted, and political forces compete to shape the future."
 ALG_economic_disruption: "Economic Disruption"
 ALG_economic_disruption_desc: "The seizure of oligarch assets and restructuring of corrupt contracts has temporarily disrupted economic activity."
 ALG_free_press_and_assembly: "Free Press & Assembly"
 ALG_free_press_and_assembly_desc: "Independent newspapers publish without fear. Citizens organize freely. The public square belongs to the people."
 ALG_diversified_economy: "Diversified Economy"
 ALG_diversified_economy_desc: "Algeria's economy moves beyond oil dependency toward industry, technology, and sustainable development."
 ALG_new_constitution_permanent: "The People's Constitution"
 ALG_new_constitution_permanent_desc: "Written by elected delegates and ratified by popular referendum, Algeria's new constitution enshrines democratic rights, separation of powers, and the rule of law."
 ALG_presidential_system: "Presidential System"
 ALG_presidential_system_desc: "A strong executive with clear authority and democratic accountability governs Algeria decisively."
 ALG_parliamentary_system: "Parliamentary System"
 ALG_parliamentary_system_desc: "A deliberative system where elected representatives debate, negotiate, and build consensus. Power is shared across parties and coalitions."
 ALG_professional_military: "Professional Armed Forces"
 ALG_professional_military_desc: "Depoliticized, modernized, and under civilian command. The Algerian military serves the nation rather than controlling it."
 ALG_foreign_investment_boom: "Foreign Investment Boom"
 ALG_foreign_investment_boom_desc: "International capital flows into democratic Algeria. Transparent governance and rule of law make the country an attractive destination for investment."
 ALG_beacon_of_democracy: "Beacon of Democracy"
 ALG_beacon_of_democracy_desc: "Algeria stands as living proof that genuine democratic transformation is possible. The nation inspires movements across the region and attracts global admiration."