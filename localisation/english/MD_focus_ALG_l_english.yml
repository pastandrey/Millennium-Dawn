 ### IDEA DESCRIPTIONS ###
 ALG_deep_state_oversight_desc: "The military establishment maintains significant oversight over government decisions. Generals must approve major policy initiatives before implementation.\n\n§YDeep State Stage 3 Active§!"
 ALG_deep_state_control_desc: "Le Pouvoir - the deep state - effectively controls the Algerian government from the shadows. Civilian politicians are mere figureheads.\n\n§RDeep State Stage 4 Active - CRITICAL!§!\n§YCoup risk increases significantly!§!"
 ALG_surveillance_state_1_desc: "Intelligence services monitor civilian activities with minimal oversight. Privacy is a luxury few can afford.\n\n§RThis significantly contributes to Deep State power.§!"
 ALG_military_junta_1_desc: "The military has seized direct control of the Algerian state. A council of generals now rules the nation.\n\n§RMILITARY COUP HAS OCCURRED!§!\n\nDemocratic governance has ended. The deep state rules openly."
 ALG_state_of_emergency_desc: "Emergency powers have been invoked to combat the growing influence of the deep state. Civil liberties are temporarily suspended.\n\n§GDeep State growth is FROZEN while this is active.§!\n§RThis cannot be maintained indefinitely.§!"
 ALG_post_coup_recovery_desc: "Algeria is recovering from a failed military coup. Institutions are damaged and trust in government is low.\n\n§YThe nation must rebuild.§!"
 ALG_promised_elections_desc: "The military government has promised to hold elections and restore civilian rule. The international community is watching.\n\n§YElections must be held before this expires.§!"
 ALG_hybrid_military_governance_desc: "Algeria operates under a hybrid system where the military maintains significant political influence while civilian structures remain in place."
 ALG_civil_war_brewing_desc: "Failed resistance to the military coup has created deep divisions within Algerian society. Civil war may be imminent.\n\n§RSituation is critical!§!"

