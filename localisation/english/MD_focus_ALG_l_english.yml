 ALG_path_crackdown_momentum: "Crackdown Momentum"
 ALG_path_reconciliation_momentum: "Reconciliation Momentum"
 ALG_oil_patronage: "Oil Patronage"
 ALG_economic_reforms: "Economic Reforms"
 ALG_ter_oboronaup_start: "Territorial Defense"
 ALG_internalup_start: "Internal Troops"
 ALG_MAJLIS_WATANI_SHAABI_DESC: "The People's National Assembly is the lower house of the Algerian Parliament. Under this system, executive power is vested in the Assembly rather than a single president, establishing a true parliamentary republic where elected representatives collectively govern the nation."
 ALG_a_new_algeria_tt: "Bouteflika's corruption network is dismantled. Their stolen wealth is seized, their property is sold, and the recovered funds are returned to the national treasury."
 FIS_faction_middle_east_available_tt: "At least one Middle Eastern Sunni nation must have an opinion of us above 70 and pursue an interventionist foreign policy"
 FIS_faction_asia_available_tt: "At least one Asian Sunni nation must have an opinion of us above 70 and pursue an interventionist foreign policy"
 ALG_4g_upgrade_decisions_tt: "Unlocks decisions to upgrade the national 4G network infrastructure."
 ALG_environmental_campaign_no_space_tt: "No available building slots found. Instead, domestic influence has been increased through the environmental media campaign."
 ALG_grand_mufti_rule_djaballah_tt: "Abdallah Djaballah will be appointed as the new head of state, bringing a conservative Islamist direction to Algeria's governance."
 ALG_grand_mufti_rule_ulema_tt: "The Council of Ulema will be consulted to determine Algeria's religious leadership, triggering a choice between rival clerical factions."
 ALG_revivify_non_aligned_movement_t: "Algeria will work to revitalize the Non-Aligned Movement, positioning itself as a leading voice for nations outside the great power blocs."
 TT_ALG_REDUCE_TAXES_5: "Population tax rate will be reduced by 5, easing the burden on the lower classes and building support among the peasantry."
 ALG_east_west_highway: "East-West Highway"
 ALG_east_west_highway_desc: "The East-West Highway will serve as Algeria's economic backbone, connecting the major population centres from Annaba to Tlemcen and dramatically improving internal trade and mobility."
 ALG_future_national_policy1: "A Nation at a Crossroads"
 ALG_future_national_policy1_desc: "Algeria's future remains unwritten. The decisions made in the coming years will define the character of the state — its values, its allies, and its place in the world."
 FIS_el_karaouin_uni: "The Al-Qarawiyyin University"
 FIS_el_karaouin_uni_desc: "By establishing ties with one of the oldest Islamic universities in the world, the FIS will cultivate a generation of scholars loyal to the new order, distancing the military from religious authority."
 FIS_father_of_the_ummah: "Father of the Ummah"
 FIS_father_of_the_ummah_desc: "The leader of the Islamic Salvation Front will position himself as the spiritual father of the entire Muslim community, cultivating a personality cult rooted in piety and divine mandate."
 FIS_followers_of_the_prophet: "Followers of the Prophet"
 FIS_followers_of_the_prophet_desc: "The state will be reshaped around strict adherence to the Sunnah. Citizens are expected to live as the Prophet did, and government institutions will be restructured to reflect this vision."
 FIS_governmental_cleansing: "Governmental Cleansing"
 FIS_governmental_cleansing_desc: "Those within the state apparatus who are deemed insufficiently devout or ideologically impure will be systematically removed and replaced with loyal adherents of the movement."
 FIS_make_our_nation_pure: "Make Our Nation Pure"
 FIS_make_our_nation_pure_desc: "The FIS will launch a sweeping social campaign to purge Western influence from Algerian society, enforcing Islamic values in education, dress, and public behaviour."
 FIS_new_patriotism: "A New Patriotism"
 FIS_new_patriotism_desc: "Love of Algeria and love of Islam are one and the same. The FIS will forge a new national identity where faith is the foundation of civic pride and collective purpose."
 FIS_restore_the_soul_of_the_ummah: "Restore the Soul of the Ummah"
 FIS_restore_the_soul_of_the_ummah_desc: "Algeria will take upon itself the sacred duty of rekindling the spiritual flame of the Muslim world, positioning the state as the moral compass for all Islamic nations."
 FIS_sharia_through_discipline: "Sharia Through Discipline"
 FIS_sharia_through_discipline_desc: "Sharia law will be enforced not through persuasion but through firm discipline. The state will expand its powers of policing and punishment to ensure full compliance with Islamic law."
 FIS_strength_and_virtue: "Strength and Virtue"
 FIS_strength_and_virtue_desc: "A strong state and a virtuous people are inseparable. The FIS will invest in both moral education and institutional discipline to build a society that is righteous in character and firm in resolve."
 FIS_strict_authority: "Strict Authority"
 FIS_strict_authority_desc: "The new Algeria requires a firm hand. The FIS will centralise power and increase the policing budget, ensuring that the population adheres to the movement's standards of conduct."
 FIS_the_people_are_not_to_be_trusted: "The People Are Not to Be Trusted"
 FIS_the_people_are_not_to_be_trusted_desc: "Democracy has proven to be a gateway for corruption and godlessness. The FIS will dismantle the democratic process and place governance firmly in the hands of those who know what Allah demands."
 FIS_urban_preachers: "Urban Preachers"
 FIS_urban_preachers_desc: "The FIS will dispatch a network of preachers into Algeria's cities, spreading the movement's ideology and cementing state Islam as the dominant force in public life."
 ALG_hassi_massoud_exploitation_desc: "The Hassi Messaoud oil field is one of the largest in Africa. By investing in its full exploitation, Algeria can dramatically increase its petroleum output and secure long-term energy revenues."
 ALG_north_south_highway_desc: "A trans-Saharan highway connecting the northern coast to the deep south will open up Algeria's vast interior, enabling resource extraction and reducing regional inequality."
 ALG_black_decade_lesson2_idea: "Lessons of the Dark Decade II"
 ALG_black_decade_lesson2_idea_desc: "The reforms to the armed forces have built on the painful lessons of the civil war. Algeria's military is better prepared to handle internal threats without resorting to indiscriminate violence."
 ALG_black_decade_lesson3_idea: "Lessons of the Dark Decade III"
 ALG_black_decade_lesson3_idea_desc: "A decade of reform has transformed Algeria's security doctrine. Counter-extremism is now embedded in military culture, with specialised units and intelligence networks specifically designed to prevent future insurgencies."
 ALG_decline_of_tourism1: "Recovering Tourism Sector"
 ALG_decline_of_tourism1_desc: "The worst of the decline has passed. Targeted investment and improved security conditions are beginning to draw visitors back to Algeria's historic sites and Mediterranean coastline."
 ALG_destroyed_agriculture_two: "Damaged Agricultural Sector"
 ALG_destroyed_agriculture_two_desc: "Ongoing instability continues to hamper agricultural recovery. Fields remain unproductive and rural communities struggle to return to normal farming activities."
 ALG_destroyed_agriculture_three: "Agricultural Reconstruction"
 ALG_destroyed_agriculture_three_desc: "Reconstruction efforts are underway in the agricultural sector. New districts are being cultivated and infrastructure is slowly being rebuilt to restore food production capacity."
 ALG_family_centric_2: "The Family at the Heart of Society II"
 ALG_family_centric_2_desc: "The emphasis on traditional family structures has deepened, shaping social policy around a conservative vision of the household as the foundation of Algerian society."
 ALG_hydroelectric_power_plants_upgraded2_idea: "Advanced Hydroelectric Network"
 ALG_hydroelectric_power_plants_upgraded2_idea_desc: "A second wave of upgrades to Algeria's hydroelectric infrastructure has significantly expanded energy storage capacity and grid reliability across the country."
 ALG_mastering_atom_2: "Mastering the Atom II"
 ALG_mastering_atom_2_desc: "Algeria's nuclear programme has advanced to the enrichment stage, raising international concern. The country is now capable of producing weapons-grade material, though the final step has not yet been taken."
 ALG_mastering_atom_3: "Mastering the Atom III"
 ALG_mastering_atom_3_desc: "Algeria has successfully developed a nuclear weapons capability. The nation now stands among the world's nuclear powers, dramatically altering the regional balance of power."
 ALG_riot_police_1: "Al-Saiqa Rapid Response Unit"
 ALG_riot_police_1_desc: "A dedicated riot police unit has been formed, trained specifically to disperse protests and maintain order in urban centres. Their presence is a deterrent to civil unrest."
 ALG_riot_police_2: "Al-Saiqa Expanded Deployment"
 ALG_riot_police_2_desc: "The riot police unit has been scaled back and reformed following public criticism of excessive force. Their mandate has been narrowed and oversight increased."
 ALG_riot_police_3: "Al-Saiqa Elite Force"
 ALG_riot_police_3_desc: "The Al-Saiqa unit has been expanded and professionalised into an elite internal security force, capable of rapid deployment anywhere in the country."
 ALG_science_idea_two: "Algerian Scientific Renaissance II"
 ALG_science_idea_two_desc: "Building on the first wave of scientific investment, Algeria has established a network of research institutions and international partnerships that are accelerating technological development."
 ALG_air_reform_desc: "A first round of reforms to the Algerian Air Force has begun modernising its command structure and upgrading its fleet of aging aircraft."
 ALG_air_reform2_desc: "The second phase of air force reform has introduced advanced training programmes and improved maintenance procedures, increasing operational readiness."
 ALG_air_reform3_desc: "Algeria's air force has been substantially overhauled. New squadrons equipped with modern aircraft have been commissioned, significantly improving air defence and power projection."
 ALG_air_reform4_desc: "The air force reform programme is complete. Algeria now fields one of the most capable air forces on the African continent."
 ALG_algerian_tourism_desc: "Algeria's tourism sector is being actively promoted, with investment in hospitality infrastructure and international marketing campaigns drawing visitors to the country's rich cultural and natural heritage."
 ALG_army_reform_desc: "A comprehensive reform programme has been launched to modernise the Algerian Army, improving training standards, logistics, and command structures."
 ALG_army_reform_mass_army_desc: "Algeria is building a large conventional army capable of sustained operations, prioritising manpower and mechanised infantry over specialised forces."
 ALG_army_reform_mass_army2_desc: "The mass army reform has entered its second phase, with improved logistics and armoured support increasing the conventional fighting power of Algerian ground forces."
 ALG_army_reform_mass_army3_desc: "Algeria's mass army doctrine is fully established. Large combined-arms formations are now the backbone of the nation's ground defence strategy."
 ALG_army_reform_mass_army4_desc: "The mass army programme is complete. Algeria can field numerically superior ground forces backed by robust logistical infrastructure."
 ALG_army_reform_specops_desc: "Algeria is investing in special operations forces, creating elite units trained for counter-terrorism, rapid response, and unconventional warfare."
 ALG_army_reform_specops2_desc: "The special forces programme has expanded, with new units trained in hostage rescue, deep infiltration, and direct action operations."
 ALG_army_reform_specops3_desc: "Algeria's special forces have reached a high level of capability, drawing on lessons from decades of counter-insurgency experience in the Sahel and at home."
 ALG_army_reform_specops4_desc: "The special forces reform programme is complete. Algeria's elite units are among the most capable in Africa, respected for their experience and operational sophistication."
 ALG_basic_income_support_desc: "A basic income support programme provides a financial safety net for Algeria's poorest citizens, reducing poverty and cushioning the effects of economic volatility."
 ALG_black_decade_methods_desc: "The security forces continue to rely on the brutal methods developed during the civil war. While effective in the short term, this approach fuels resentment and risks reigniting the very extremism it aims to suppress."
 ALG_black_market_desc: "A thriving black market has developed in the shadow of the state, undermining official trade statistics, depriving the government of tax revenue, and fuelling organised crime networks."
 ALG_border_security_idea_desc: "Reinforced border checkpoints and expanded patrol routes have improved Algeria's ability to intercept smugglers, arms traffickers, and extremist infiltrators crossing its vast desert frontiers."
 ALG_childcare_reform_desc: "New childcare facilities and subsidised nursery programmes are being rolled out, making it easier for families to balance work and child-rearing."
 ALG_closed_moroccan_border_desc: "The border with Morocco remains firmly closed. While this limits cross-border smuggling, it also stifles legitimate trade and deepens the diplomatic freeze between the two nations."
 ALG_confidence_measures_idea_desc: "A package of confidence-building measures between Algeria and its neighbours is helping to reduce tensions and open channels for diplomatic dialogue."
 ALG_counter_morocco_idea_desc: "Algeria is actively countering Moroccan influence in the region through diplomatic pressure, support for the Polisario Front, and strategic competition for African allies."
 ALG_dialogue_with_morocco_desc: "A cautious dialogue has been opened with Morocco, exploring the possibility of normalising relations and reopening the border after years of hostility."
 ALG_education_arabization_desc: "The Arabisation of the education system has been deepened, replacing French-language instruction with Arabic at all levels and embedding Islamic values in the national curriculum."
 ALG_food_subsidy_idea_desc: "Government subsidies keep staple food prices low, ensuring that even the poorest Algerians can afford basic nutrition. However, this places a significant burden on the national budget."
 ALG_foreign_arms_companies_desc: "Algeria has opened its procurement process to foreign arms manufacturers, gaining access to a wider range of military equipment but increasing dependence on external suppliers."
 ALG_free_press_desc: "An independent press is emerging in Algeria, holding officials accountable and providing citizens with access to a plurality of views — though this also creates new political pressures for the government."
 ALG_fuel_subsidy_idea_desc: "Subsidised fuel prices keep transport and energy costs low for Algerian households and businesses, but represent a major fiscal liability that limits the government's budgetary flexibility."
 ALG_future_army_desc: "Algeria is investing in next-generation military technology and doctrine, positioning its armed forces at the cutting edge of modern warfare capability."
 ALG_global_power_desc: "Algeria has established itself as a genuine global power, with a seat at the international table and the economic and military weight to back it up."
 ALG_health_insurance_system_desc: "A national health insurance system is being established, providing Algerians with access to medical care regardless of their income level."
 ALG_housing_support_idea_desc: "Government housing support programmes are helping low-income families access affordable accommodation, reducing the pressure of Algeria's urban housing shortage."
 ALG_hydroelectric_power_plants_upgraded_idea_desc: "Algeria's hydroelectric infrastructure has been upgraded, increasing the capacity and reliability of water-powered electricity generation and reducing dependence on fossil fuels."
 ALG_idea_arab_diplomacy_desc: "Algeria is pursuing an active Arab diplomatic agenda, positioning itself as a key mediator and voice within the Arab League and broader Arab world."
 ALG_idea_parliamentary_republic_desc: "Algeria has adopted a parliamentary republic system, shifting executive power toward the legislature and establishing a more accountable form of government."
 ALG_idea_presidential_republic_desc: "Algeria operates as a presidential republic, with executive authority concentrated in the office of the president who is directly elected by the people."
 ALG_idea_refoming_education_desc: "A first round of education reforms has begun improving curriculum standards, teacher training, and access to schooling across the country."
 ALG_idea_refoming_education1_desc: "The second phase of education reform has expanded secondary schooling, improved vocational training, and introduced updated teaching methodologies across Algeria's schools."
 ALG_idea_semi_presidential_republic_desc: "Algeria's semi-presidential system balances power between a directly elected president and a prime minister accountable to parliament."
 ALG_maghreb_cooperation_idea_desc: "Algeria is working to deepen economic and political cooperation with its Maghreb neighbours, laying the groundwork for a more integrated North African regional bloc."
 ALG_maghreb_security_idea_desc: "A shared security framework with Maghreb partners is enabling coordinated responses to terrorism, smuggling, and cross-border instability in the Sahel."
 ALG_maghreb_trade_idea_desc: "Preferential trade agreements with Maghreb nations are boosting intra-regional commerce, reducing Algeria's dependence on European markets."
 ALG_mastering_atom_desc: "Algeria has initiated a clandestine nuclear programme, establishing the research infrastructure needed to eventually develop weapons-grade material."
 ALG_military_expansion_desc: "Algeria is expanding the size of its armed forces, investing in new equipment and recruiting additional personnel to project greater military power."
 ALG_military_expansion2_desc: "The military expansion programme has entered its second phase, with new armoured units, artillery brigades, and air defence systems being commissioned."
 ALG_military_junta_desc: "The military has taken direct control of the state. Algeria is governed by a junta of generals whose legitimacy rests on force rather than popular mandate."
 ALG_military_quality_initiative_desc: "A quality-over-quantity approach to military reform is improving the professionalism, training standards, and equipment of Algeria's armed forces."
 ALG_military_quality_initiative2_desc: "The second phase of the military quality initiative has introduced advanced simulation training, improved officer education, and expanded joint-service exercises."
 ALG_modern_hospitals_desc: "Algeria is building a network of modern hospitals equipped with contemporary medical technology, significantly improving healthcare outcomes for the population."
 ALG_natural_products_idea_desc: "Algeria is promoting its natural products — including dates, olive oil, and artisanal goods — on international markets, diversifying export income and supporting rural communities."
 ALG_naval_reform_desc: "Algeria's navy is undergoing its first major reform in decades, improving maintenance, training, and the capability of its surface fleet."
 ALG_naval_reform2_desc: "New frigates and patrol vessels have been commissioned as part of the second phase of naval reform, extending Algeria's reach in the western Mediterranean."
 ALG_naval_reform3_desc: "Algeria's naval capability has been substantially upgraded with improved anti-submarine warfare and coastal defence capacities."
 ALG_naval_reform4_desc: "The naval reform programme is complete. Algeria now fields a modern, balanced naval force capable of projecting power across the Mediterranean and into the Atlantic."
 ALG_open_border_coop_desc: "Algeria has opened its borders to greater cross-border cooperation with its neighbours, facilitating trade, people movement, and joint infrastructure projects."
 ALG_pna_expansion_desc: "The National People's Army has expanded its logistics and administrative capacity, improving its ability to sustain large-scale operations across Algeria's vast territory."
 ALG_polisario_support_idea_desc: "Algeria continues to provide political, logistical, and material support to the Polisario Front, maintaining pressure on Morocco in the Western Sahara dispute."
 ALG_private_clinics_expansion_desc: "The private healthcare sector is being allowed to expand, offering higher quality care for those who can afford it while easing pressure on the public health system."
 ALG_private_healthcare_idea_desc: "Algeria is encouraging private investment in healthcare, creating a parallel private sector that offers premium services alongside the public system."
 ALG_reactioners_desc: "Conservative elements within the state bureaucracy and military resist meaningful reform, protecting the interests of the established order at the expense of modernisation."
 ALG_reactioners1_desc: "Reactionary forces have been somewhat weakened, though they retain significant influence within key institutions and continue to slow the pace of change."
 ALG_reactioners2_desc: "The grip of the old guard is loosening. Reform efforts have gained enough momentum to push past many of the institutional obstacles that previously blocked progress."
 ALG_reactioners3_desc: "The reactionary faction has been substantially marginalised. The new political settlement has removed many of their allies from positions of power."
 ALG_reactioners4_desc: "Systemic reform has broken the back of the reactionary bloc. Algeria's institutions are increasingly responsive to popular demand rather than entrenched elite interests."
 ALG_reactioners5_desc: "Only isolated pockets of resistance remain among the old guard. The transformation of Algeria's political culture is nearing completion."
 ALG_reactioners6_desc: "The last vestiges of the reactionary system have been swept aside. Algeria has entered a new era defined by accountability and genuine political competition."
 ALG_reactioners7_desc: "Algeria has fully broken with its authoritarian past. The state is now structured around democratic norms and the rule of law, with the old patronage networks dissolved."
 ALG_sand_war_memory_idea_desc: "The memory of the 1963 Sand War with Morocco still shapes Algerian military planning and foreign policy, fostering a deep institutional suspicion of Moroccan intentions."
 ALG_science_idea_desc: "Algeria is investing in scientific research and development, establishing new laboratories and funding university research programmes to build a domestic knowledge economy."
 ALG_shipbuilding_desc: "Algeria is developing a domestic shipbuilding industry, constructing facilities capable of producing naval and commercial vessels and reducing dependence on foreign suppliers."
 ALG_shipbuilding2_desc: "The shipbuilding industry has matured, with larger and more complex vessels now being produced domestically. Algeria is becoming a credible maritime manufacturing nation."
 ALG_social_contract_idea_desc: "The government has renewed its social contract with the population, trading political acquiescence for guaranteed subsidies, public employment, and social services."
 ALG_sonatrach_desc: "Sonatrach, Algeria's national oil and gas company, remains the backbone of the national economy, generating the vast majority of the state's export revenues."
 ALG_state_hospitals_idea_desc: "A network of state-run hospitals provides basic healthcare access to all Algerians, though chronic underfunding means quality varies significantly between regions."
 ALG_suppressed_opposition_desc: "Political opposition has been silenced through a combination of legal restrictions, media control, and direct intimidation. Dissent is pushed underground rather than eliminated."
 ALG_technological_ties_desc: "Algeria has established technology transfer agreements with foreign partners, gaining access to advanced systems and expertise in exchange for economic and diplomatic concessions."
 ALG_tikjda_resort_desc: "The Tikjda mountain resort in the Kabylie region is being developed as a flagship tourism destination, promoting eco-tourism and attracting visitors to Algeria's Atlas Mountains."
 ALG_universal_healthcare_idea_desc: "Algeria has established a universal healthcare system providing free or heavily subsidised medical care to all citizens, funded through general taxation and hydrocarbon revenues."
 ALG_university_expansion_desc: "New university campuses are being established across Algeria, expanding access to higher education and producing graduates equipped for the demands of the modern economy."
 ALG_welfare_state_idea_desc: "Algeria has built a comprehensive welfare state providing housing support, healthcare, education, and income assistance, funded largely by oil and gas revenues."
 FIS_jamiat_al_karaouin_desc: "Ties with the ancient Al-Qarawiyyin institution have produced a new class of Islamic scholars loyal to the FIS state and hostile to military interference in religious affairs."
 FIS_al_aqsa_faction: "The Al-Aqsa Coalition"
 mto_alliance: "Mediterranean Treaty Organisation"
 Algeria_desc: "Algeria"
 AlgeriaFocusEvents_desc: "Focus-triggered events for Algeria."
 algeria_focus_desc: "Algeria's national focus tree covering political, economic, military, and foreign policy paths."
 algerian_focus_desc: "Algeria's national focus tree covering political, economic, military, and foreign policy paths."
 algeria_power_balance_desc: "The balance of power between the civilian government and the military establishment, which has long operated as a state within a state in Algeria."
 nuclear_algeria_desc: "Algeria has crossed the nuclear threshold, possessing operational nuclear weapons that fundamentally alter its strategic posture in North Africa and the wider Mediterranean."
 ALG_african_union_member1: "African Union Observer"
 ALG_african_union_member1_desc: "Algeria has deepened its engagement with the African Union, moving beyond standard membership to take a more active role in continental diplomacy and peacekeeping initiatives."
 ALG_arab_league_member: "Arab League Member"
 ALG_arab_league_member_desc: "Algeria maintains its seat at the Arab League, participating in collective Arab diplomatic positions and benefiting from regional economic cooperation frameworks."
 ALG_bouteflika_legacy: "The Bouteflika Legacy"
 ALG_bouteflika_legacy_desc: "The long shadow of the Bouteflika era still falls over Algerian politics. The entrenched patronage networks and culture of impunity he cultivated continue to obstruct meaningful reform."
 ALG_civilian_government: "Civilian Government"
 ALG_civilian_government_desc: "For the first time in decades, Algeria is governed by a genuinely civilian administration. The military has stepped back from direct political intervention, allowing elected officials to lead."
 ALG_corrupt_generals: "Corrupt Generals"
 ALG_corrupt_generals_desc: "The senior military leadership is riddled with corruption. Generals who have grown wealthy through decades of patronage resist any reform that threatens their economic interests."
 ALG_currency_reform_idea: "Currency Reform"
 ALG_currency_reform_idea_desc: "Algeria has undertaken a reform of its currency management, stabilising the dinar and reducing the gap between the official and black market exchange rates."
 ALG_economic_recovery_boost: "Economic Recovery Momentum"
 ALG_economic_recovery_boost_desc: "A sustained period of targeted investment and policy reform has generated genuine economic momentum, improving production efficiency and cautiously reducing the cost of goods."
 ALG_ethnic_unrest: "Ethnic Unrest"
 ALG_ethnic_unrest_desc: "Simmering ethnic tensions are erupting into open unrest across parts of the country. Marginalised communities are pushing back against perceived discrimination and state neglect."
 ALG_government_led_disaster: "Government Disaster Response"
 ALG_government_led_disaster_desc: "The state has taken direct control of disaster response, deploying public resources at scale. While costly and bureaucratic, the intervention is producing real results on the ground."
 ALG_hospital_modernization: "Hospital Modernisation Programme"
 ALG_hospital_modernization_desc: "A nationwide programme to modernise hospital infrastructure is upgrading facilities, replacing outdated equipment, and improving the capacity to treat the population."
 ALG_hybrid_military_governance: "Hybrid Military Governance"
 ALG_hybrid_military_governance_desc: "Algeria is governed through an informal arrangement where the civilian government holds formal authority but the military retains decisive influence over key policy areas and appointments."
 ALG_idea_korea_resplendent: "Korean Strategic Partnership"
 ALG_idea_korea_resplendent_desc: "A comprehensive strategic partnership with Korea has brought advanced technology transfers, joint defence projects, and economic investment that are accelerating Algeria's modernisation drive."
 ALG_imf_program_modifier: "IMF Adjustment Programme"
 ALG_imf_program_modifier_desc: "Algeria is implementing an IMF-backed structural adjustment programme. The accompanying fiscal discipline and subsidy reductions are politically painful but are beginning to stabilise the economy."
 ALG_internal_troops_idea: "Internal Security Deployment"
 ALG_internal_troops_idea_desc: "Military and paramilitary units have been deployed in internal security roles, reinforcing police capacity and suppressing resistance in restive regions."
 ALG_msp_presidency: "MSP Presidency"
 ALG_msp_presidency_desc: "The Movement of Society for Peace has assumed the presidency, bringing an Islamist democratic party to power for the first time and shifting Algeria's political centre of gravity."
 ALG_no_disasters_plan: "No Disaster Contingency Plan"
 ALG_no_disasters_plan_desc: "Algeria currently has no dedicated disaster response framework. When crises strike, the absence of coordinated planning leads to delayed and ineffective state responses that worsen outcomes."
 ALG_olympic_preparation: "Olympic Preparation Programme"
 ALG_olympic_preparation_desc: "Algeria is investing heavily in preparation for hosting the Olympic Games, building world-class sports infrastructure and launching national athletic development programmes."
 ALG_random_bad: "Unexpected Setback"
 ALG_random_bad_desc: "An unexpected economic or political setback has shaken public confidence and disrupted the government's reform agenda."
 ALG_random_good: "Unexpected Windfall"
 ALG_random_good_desc: "An unexpected development — a diplomatic breakthrough, a commodity price surge, or a policy success — has given Algeria's government a rare boost in confidence and resources."
 ALG_secondary_education_reform: "Secondary Education Reform"
 ALG_secondary_education_reform_desc: "A reform of Algeria's secondary education system is improving curriculum standards, increasing the proportion of students completing their baccalaureate, and better preparing graduates for higher education."
 ALG_social_welfare_modifier: "Social Welfare Expansion"
 ALG_social_welfare_modifier_desc: "The government has expanded its social welfare programmes, providing increased support to vulnerable citizens and strengthening the social safety net."
 ALG_tebboune_moderate: "Tebboune Moderate Line"
 ALG_tebboune_moderate_desc: "President Tebboune has steered a moderate political course, balancing cautious reform gestures toward civil society with firm maintenance of the established order."
 ALG_tourism: "Tourism Development Initiative"
 ALG_tourism_desc: "Algeria is investing in the development of its tourism sector, building new infrastructure and promoting the country's rich heritage to attract international visitors."
 algerian_empowered_sharia_courts: "Empowered Sharia Courts"
 algerian_empowered_sharia_courts_desc: "The jurisdiction of Islamic courts has been extended, giving religious authorities greater influence over civil and family matters and shifting Algeria's legal framework toward sharia."
 algerian_gulen_movement: "Gulen-Inspired Movement"
 algerian_gulen_movement_desc: "A network inspired by the Gulen movement has embedded itself in Algerian education and civil society, promoting a modernist Islamic approach and building significant influence in state institutions."
 algerian_scientific_ventures: "Algerian Scientific Ventures"
 algerian_scientific_ventures_desc: "A wave of joint scientific ventures with foreign partners is driving a renaissance in Algerian research, with new projects in renewable energy, computing, and materials science gaining international recognition."
 hoggar_nuclear_facility_idea: "Hoggar Nuclear Facility"
 hoggar_nuclear_facility_idea_desc: "Deep in the Ahaggar Mountains, a nuclear research facility has been established at a remote site with historical significance to Algeria's atomic programme. Its existence deters adventurism."
 hoggar_nuclear_facility_idea_2: "Hoggar Nuclear Facility — Advanced"
 hoggar_nuclear_facility_idea_2_desc: "The Hoggar facility has been substantially expanded and upgraded. Algeria now possesses a full-cycle nuclear research capability, with advanced enrichment and processing infrastructure in place."
 ALG_2014_oil_crash_idea_desc: "The 2014 oil price crash devastated Algeria's hydrocarbon revenues, exposing the fragility of its resource-dependent economic model and forcing painful cuts to public spending."
 ALG_AU_pressure_idea_desc: "The African Union is applying diplomatic pressure on Algeria over a regional issue, constraining its foreign policy options and complicating its relationships with neighbouring states."
 ALG_balanced_foreign_policy_desc: "Algeria is maintaining a carefully balanced foreign policy, refusing to align exclusively with any bloc and leveraging its strategic importance to extract benefits from multiple partners."
 ALG_black_market_desc: "A thriving black market has developed in the shadow of the state, undermining official trade statistics, depriving the government of tax revenue, and fuelling organised crime networks."
 ALG_chinese_investments_desc: "Chinese capital is flowing into Algeria's infrastructure and energy sectors, providing much-needed investment but also raising concerns about debt dependency and foreign economic influence."
 ALG_clean_government_desc: "A new generation of technocratic officials has brought greater transparency and accountability to government. Corruption is declining and public trust in state institutions is slowly recovering."
 ALG_decline_of_tourism_desc: "Algeria's tourism sector is in serious decline. Security concerns, poor infrastructure, and a difficult visa regime have made the country unattractive to foreign visitors, costing the economy badly."
 ALG_destroyed_agriculture_desc: "Algeria's agricultural sector has been devastated by conflict and neglect. Farmland lies fallow, rural communities have been displaced, and food import dependency has risen sharply."
 ALG_diversification_desc: "Algeria is actively diversifying its economy away from hydrocarbon dependence, investing in manufacturing, agriculture, and services to build a more resilient economic base."
 ALG_election_time_idea_desc: "An election campaign is underway, dominating the political agenda and creating both opportunities and instability as competing factions mobilise their bases."
 ALG_emergency_budget_desc: "The government has activated emergency budget provisions, cutting non-essential spending and redirecting resources to address an acute economic or security crisis."
 ALG_health_insurance_idea_desc: "A basic national health insurance framework is being piloted, pooling contributions to fund access to essential medical services for enrolled citizens."
 ALG_health_insurance_idea1_desc: "The national health insurance system has been expanded and consolidated, providing substantially improved medical coverage to a larger proportion of the population."
 ALG_human_rights_first_desc: "Algeria has adopted a human rights-first approach to governance, embedding international human rights standards into domestic law and placing rights protections at the centre of state policy."
 ALG_idea_joint_military_arab_desc: "Algeria has entered a joint military framework with Arab partners, enabling coordinated defence planning, shared intelligence, and combined training exercises across the region."
 ALG_idea_russian_military_presence_desc: "A Russian military presence in Algeria — through advisors, joint exercises, and basing arrangements — is enhancing Algerian military capability while deepening dependence on Moscow."
 ALG_independent_judiciary_desc: "Algeria's judiciary has been granted genuine independence from the executive. Courts can now hold officials accountable and citizens have a meaningful avenue of legal redress."
 ALG_insurgency_unleashed_desc: "Algeria has deliberately cultivated insurgent networks in a neighbouring state, using irregular proxies to project power and destabilise rivals without direct military commitment."
 ALG_investor_confidence_desc: "Investor confidence in Algeria is rising. Improved governance, stable macroeconomic conditions, and reform signals from the government are attracting foreign capital back into the economy."
 ALG_jcpoa_idea_desc: "Algeria has entered a civil nuclear agreement modelled on the JCPOA framework, exchanging restraint on its weapons programme for the lifting of sanctions and access to international markets."
 ALG_joint_scientific_collaboration_idea_desc: "Algeria and a partner nation have established a joint scientific collaboration framework, pooling research capacity and sharing technology to accelerate development across multiple fields."
 ALG_joint_scientific_collaboration_idea_2_desc: "The scientific collaboration has deepened into a comprehensive research partnership, with shared laboratories, joint publications, and coordinated technology transfer programmes underway."
 ALG_joint_scientific_collaboration_idea_3_desc: "The collaboration has matured into a full strategic science partnership, encompassing nuclear research, satellite technology, and advanced materials with substantial mutual investment."
 ALG_national_dialogue_modifier_desc: "A national dialogue process has brought together government and opposition, creating a rare space for political negotiation and reducing the immediate risk of confrontation."
 ALG_neo_colonialism_desc: "Algeria is exploiting resource extraction agreements with weaker neighbours on terms that strongly favour Algerian interests, extracting value from the region without building genuine partnerships."
 ALG_nspa_idea_desc: "The National Space and Aeronautics Programme has been established, consolidating Algeria's satellite and aerospace ambitions into a single strategic framework backed by state investment."
 ALG_political_repression_desc: "The state is engaging in systematic political repression — arresting activists, censoring media, and using security services to silence dissent and maintain control."
 ALG_primary_education_reform_desc: "A reform of Algeria's primary education system has updated the national curriculum, improved teacher salaries, and expanded access to schooling in rural and underserved areas."
 ALG_relying_on_our_own_strength_spirit_2_desc: "Algeria's self-reliance doctrine has been extended to cover the construction sector, with domestic industrial capacity increasingly capable of meeting the nation's infrastructure needs."
 ALG_relying_on_our_own_strength_spirit_3_desc: "The self-reliance programme has reached maturity. Algeria's industrial base is now substantially autonomous, producing the essentials of modern statehood without dependence on foreign suppliers."
 ALG_repression_modifier_desc: "A wave of repression has swept through Algeria's political sphere. Opposition figures are being detained, media is being silenced, and public demonstrations are being forcibly dispersed."
 ALG_russia_cooperation_desc: "Algeria and Russia have deepened their strategic cooperation, cementing a relationship built on arms purchases, energy investment, and shared resistance to Western political pressure."
 ALG_sahara_expansion_1_desc: "Desertification is advancing into Algeria's southern agricultural zones. The first signs of Saharan expansion are appearing, threatening farming communities and reducing cultivable land."
 ALG_sahara_expansion_2_desc: "Saharan desertification has intensified, reducing agricultural output and displacing rural communities in the affected southern provinces."
 ALG_sahara_expansion_3_desc: "Desertification continues to advance unchecked. A significant portion of previously productive farmland has been lost to encroaching desert conditions."
 ALG_sahara_expansion_4_desc: "The Sahara's expansion is becoming a national crisis. Agricultural losses are mounting and internal migration from the south is placing pressure on northern cities."
 ALG_sahara_expansion_5_desc: "Half of Algeria's southern agricultural land is now threatened. The desertification crisis is demanding emergency government intervention and international environmental assistance."
 ALG_sahara_expansion_6_desc: "Desertification has reached a critical threshold. Entire farming districts have been abandoned and the economic costs of the crisis are severely straining the national budget."
 ALG_sahara_expansion_7_desc: "The desertification emergency is reshaping Algeria's geography. Massive dune migration is encroaching on infrastructure and the loss of farmland is accelerating food insecurity."
 ALG_sahara_expansion_8_desc: "Saharan expansion has devastated Algeria's southern agricultural sector. The scale of land loss is triggering a humanitarian crisis among displaced farming communities."
 ALG_sahara_expansion_9_desc: "Desertification has consumed the majority of Algeria's southern farmland. Remediation efforts are struggling against the scale of the ecological collapse."
 ALG_sahara_expansion_10_desc: "Algeria's agricultural south has been almost entirely swallowed by the Sahara. The environmental catastrophe is irreversible at the current scale without massive reforestation and water management interventions."
 ALG_social_welfare_modifier_desc: "The government has expanded its social welfare programmes, providing increased support to vulnerable citizens and strengthening the social safety net."
 ALG_sovereignty_first_desc: "Algeria's foreign and domestic policy is anchored by an absolute commitment to sovereignty. The state will accept no external interference in its affairs and prioritises national self-determination above all else."
 ALG_subsidies_desc: "The government maintains a broad subsidy regime covering fuel, food, and utilities. While popular, this system is fiscally unsustainable and distorts market signals across the economy."
 ALG_surveillance_state_modifier_desc: "Algeria has built a sophisticated domestic surveillance infrastructure, monitoring communications and tracking the activities of political opponents and civil society actors."
 ALG_the_lion_roars_idea_desc: "Algeria's military has demonstrated its combat capability in a high-stakes engagement, earning a reputation for toughness and effectiveness that deters potential adversaries."
 ALG_transparent_budget_desc: "Algeria has introduced transparent budget reporting, publishing detailed breakdowns of public spending and making government accounts accessible to independent scrutiny for the first time."
 algeria_cultural_rebirth_desc: "A powerful wave of nationalist cultural revival is sweeping Algeria, elevating indigenous heritage and history while marginalising foreign cultural influences."
 algeria_emerging_youth_desc: "A generation of politically engaged young Algerians is emerging, pushing for democratic reform and economic opportunity with growing assertiveness."
 algeria_nationalist_youth_desc: "Algeria's youth movement has taken a sharply nationalist turn, demanding a more assertive foreign policy and an end to what they see as the old guard's compromise with foreign interests."
 algerian_empowered_sharia_courts_desc: "The jurisdiction of Islamic courts has been extended, giving religious authorities greater influence over civil and family matters and shifting Algeria's legal framework toward sharia."
 algerian_gulen_movement_desc: "A network inspired by the Gulen movement has embedded itself in Algerian education and civil society, promoting a modernist Islamic approach and building significant influence in state institutions."
 algerian_scientific_ventures_desc: "A wave of joint scientific ventures with foreign partners is driving a renaissance in Algerian research, with new projects in renewable energy, computing, and materials science."
 hoggar_nuclear_facility_idea_desc: "Deep in the Ahaggar Mountains, a nuclear research facility has been established at a remote site. Its existence serves as a powerful deterrent to foreign adventurism."
 hoggar_nuclear_facility_idea_2_desc: "The Hoggar facility has been substantially expanded. Algeria now possesses a full-cycle nuclear research capability with advanced enrichment and processing infrastructure."
 idea_alg_empowered_parliament_desc: "Algeria's parliament has been granted genuine legislative authority. The chamber now holds real power over the budget, legislation, and ministerial accountability."
 idea_algerian_oligarchy_arrests_desc: "The arrest of key oligarchs has shaken Algeria's business elite. While popular with the public, the crackdown has created uncertainty that is freezing private investment."
 ALG_flavor_event.6.t: "Refugee Crisis"
 ALG_flavor_event.6.d: "Waves of refugees are flooding across our borders, fleeing conflict and instability in neighbouring countries. Our infrastructure is strained and our people are divided on how to respond."
 ALG_flavor_event.6.a: "We must absorb them."
 ALG_flavor_event.7.t: "Drug Trafficking Crisis"
 ALG_flavor_event.7.d: "Organised criminal networks have turned Algeria into a major transit corridor for narcotics. The drug trade is corrupting local institutions and fuelling violence in border regions."
 ALG_flavor_event.7.a: "Crack down on the traffickers."
 algeria.41.t: "Algeria Proposes an Alliance"
 algeria.41.d: "The Algerian government has formally requested that we join their faction. Accepting would bind us to their strategic objectives, while refusing risks souring relations with Algiers."
 algeria.41.a: "We accept the offer."
 algeria.41.b: "We must decline."
 fra_colonial.1.t: "The Shadow of the Past"
 fra_colonial.1.d: "Algiers has formally denounced France's colonial legacy in Algeria, reigniting old wounds and inflaming public opinion on both sides of the Mediterranean. Our parliament is divided — some demand we stand firm on our historical record, while others see an opportunity for reconciliation."
 fra_colonial.1.a: "Defend our historical record."
 fra_colonial.1.b: "Offer a gesture of reconciliation."
 AlgeriaFocus.910.t: "The Casablanca Accords"
 algerian_event.51.d: "Against all odds, Algeria's space programme has achieved the extraordinary — our spacecraft has successfully landed on the Moon. This triumph of engineering and national will has electrified the Algerian people and placed our flag among the stars."
 ALG_aouchiche_desc: "Youcef Aouchiche is a liberal reformist and leader of the Front des Forces Socialistes. A vocal critic of the ruling establishment, he campaigned on democratic reform, civil liberties, and economic modernisation."
 ALG_hassani_desc: "Abdelali Hassani Cherif is the leader of the Movement of Society for Peace, Algeria's main Islamist party. He advocates for a moderate political Islam aligned with democratic norms and national reconciliation."
 algeria_elections.a: "So it is decided."
 alg_military_rule_option: "Support the military's decision."
 AlgeriaPoliticalEvents.1.t: "Algeria's Political Realignment"
 AlgeriaPoliticalEvents.1.d: "With the Black Decade drawing to a close, Algeria faces a pivotal choice about its future political orientation. Western partnership, non-alignment, or closer ties with the East — each path carries profound consequences for the country's identity and stability."
 AlgeriaPoliticalEvents.1.a: "Open the national debate."
 AlgeriaPoliticalEvents.20.t: "Ideological Rift in Government"
 AlgeriaPoliticalEvents.20.d: "With the conflict winding down, pressure mounts within the government to define Algeria's future political system. Hardliners demand military dominance, moderates push for reconciliation and reform, while Islamist factions call for free elections."
 AlgeriaPoliticalEvents.20.a: "Empower the military."
 AlgeriaPoliticalEvents.20.b: "Push for reform and reconciliation."
 AlgeriaPoliticalEvents.20.c: "Negotiate with the Islamists."
 Algeria.8.t: "Algeria Requests Protection"
 Algeria.8.d: "The Algerian government has formally requested American protection or security guarantees, citing growing regional instability. Washington must now decide whether to extend its strategic umbrella."
 Algeria.8.a: "We accept the request."
 Algeria.8.b: "We cannot commit to this."
 Algeria.16.t: "Algeria Seeks International Guarantees"
 Algeria.16.d: "Facing rising external threats, Algiers has appealed to major powers for formal security guarantees. Our response will shape our relationship with the region for years to come."
 Algeria.16.a: "We support Algeria diplomatically."
 Algeria.16.b: "We stay out of this."
 algeria_sahar.4.t: "The War Has Been Won"
 algeria_sahar.4.d: "Our forces have prevailed. The Western Sahara conflict is over and we are free to reshape the political order of the region as we see fit."
 algeria_sahar.4.a: "Establish the Saharan Federation."
 algeria_sahar.6.a: "Acknowledged."
 ALG_alignments: "Foreign Policy Alignment"
 ALG_casablanca_accords: "The Casablanca Process"
 KBY_alg_modifier: "Kabyle State Modifiers"
 ALG_algiers_metro: "Algiers Metro Corridor"
 cheap_loans_from_imf_tt: "Algeria receives an IMF concessional loan, funding infrastructure development."
 ALG_diplomatic_outreach_west: "Diplomatic Outreach to the West"
 ALG_diplomatic_outreach_west_desc: "Algeria's relationship with Washington and its European allies has been defined by mutual suspicion. A sustained diplomatic initiative could lay the groundwork for closer economic and security ties with the Western world."
 ALG_diplomatic_outreach_china: "Diplomatic Outreach to China"
 ALG_diplomatic_outreach_china_desc: "Beijing has been steadily expanding its presence across the African continent. Deepening ties with China could unlock significant infrastructure investment and open new markets, though it may complicate relations with Western partners."
 algeria_casablanca_accords_draft_solution_desc: "Before negotiations can proceed in earnest, Algeria must put a concrete peace framework on the table. Our proposal will shape the entire direction of the summit."
 algeria_casablanca_accords_hold_negotiations_desc: "With a peace framework in hand, Algerian diplomats must now sit across the table from each party and work through the details. Every session brings compromise closer, but also carries the risk of collapse."
 monitor_kabyle_unrest_desc: "The mountains of Kabylie have been a persistent flashpoint. Security services must maintain close surveillance of resistance activity in the region to pre-empt escalation."
 kabyle_resistance_tooltip: "Resistance activity in Kabylie remains elevated."
 ALG_boost_reformists_desc: "Within Algeria's opaque political structure, a faction of technocrats and modernisers has been pushing for genuine reform. Providing them with political cover and resources could shift the internal balance of power toward opening."
 ALG_boost_old_guard_desc: "The established network of military officers and FLN veterans who built the post-independence state are growing anxious about the pace of change. Reaffirming their position and prerogatives will shore up stability but entrench the status quo."
 ALG_rally_students_desc: "University campuses have historically been the engine of Algerian political change. Organising student associations behind the reformist agenda can generate pressure from below and shift public discourse."
 ALG_mobilize_veterans_desc: "The veterans of the independence war and the Black Decade carry enormous moral authority in Algerian society. Rallying them behind the existing order lends legitimacy to the state's position in the current political contest."
 ALG_bribe_elites_desc: "Much of Algeria's power structure operates on informal networks of patronage and favour. Distributing contracts, appointments, and financial benefits to key figures can consolidate loyalty, though it deepens the corruption that already corrodes the state."
 ALG_seek_compromise_desc: "With both sides of the internal debate entrenched, a neutral mediation effort may be the only way to prevent a deadlock from tipping into open confrontation. A compromise will satisfy no one fully, but may avert the worst."
 ALG_media_campaign_reform_desc: "State-controlled and sympathetic private media can be directed to build a narrative around the need for political renewal. Shaping public opinion in favour of reform shifts the ground beneath the old guard."
 ALG_security_crackdown_desc: "The security apparatus can be directed to clamp down on protests, independent media, and civil society groups that are fuelling the reform movement. This will buy time, but it stores up larger problems for later."
 ALG_world_tension_security_desc: "Rising instability across the region is providing the military establishment with new arguments for keeping politics firmly under their control. Capitalising on this climate can consolidate the old guard's position."
 ALG_world_tension_high_security_desc: "With regional conflicts spilling toward Algeria's borders, the military is pushing for emergency powers that would effectively sideline civilian reform advocates. The crisis provides cover, but suspending political competition carries long-term risks."
 ALG_path_crackdown_momentum_desc: "The crackdown is showing results. Maintaining momentum through additional security operations and political pressure will deepen the old guard's hold on the state, but each step makes reversal more difficult."
 ALG_path_reconciliation_momentum_desc: "The reform process is gaining traction. Pressing forward with additional confidence-building measures and political openings can carry the reconciliation agenda past the point of no return."
 ALG_oil_patronage_desc: "Algeria's hydrocarbon windfall has long been used to buy social peace. Redirecting a portion of oil revenues toward targeted patronage can secure the loyalty of key constituencies in the current political contest."
 ALG_economic_reforms_desc: "Algeria's state-dominated economy is deeply inefficient. A credible package of economic reforms, opening space for private enterprise and reducing bureaucratic obstacles, could shift popular sentiment toward the reformist camp."
 ALG_ter_oboronaup_start_desc: "With the country at war, the National Guard is calling for the formation of locally-recruited territorial defence units to hold rear areas and free regular army formations for front-line operations."
 ALG_internalup_start_desc: "The situation requires the deployment of dedicated internal security troops to maintain order behind the front lines, protect critical infrastructure, and prevent the enemy from exploiting instability in the rear."
 ALG_casablanca_mission: "Pursue the Casablanca Settlement"
 ALG_army_influence_minus_4_tt: "People's Grievance: §G+4§!"
 ALG_army_influence_plus_4_tt: "Army Influence: §G+4§!"
 ALG_people_grievance_minus_4_tt: "People's Grievance: §R-4§!"
 ALG_people_grievance_plus_4_tt: "People's Grievance: §G+4§!"
 ALG_seek_sc_seat_tt: "A vote will be held in the United Nations General Assembly to confirm Algeria's seat on the Security Council."
 ALG_eliminate_GIA: "Eliminate the GIA"
 ALG_eliminate_GIA_desc: "The Armed Islamic Group once represented the most brutal face of the insurgency. With their networks fractured and public support collapsing, the state now moves to dismantle the final remnants of the organization and restore order across the country."
 ALG_reintegration_programs: "Reintegration Programs"
 ALG_reintegration_programs_desc: "Years of violence have left thousands of former fighters and sympathizers scattered across Algerian society. Through carefully monitored reintegration programs, the government will offer a path back into civilian life for those willing to abandon the insurgency."
 ALG_strengthen_DRS: "Strengthen the DRS"
 ALG_strengthen_DRS_desc: "The Département du Renseignement et de la Sécurité has played a decisive role in combating extremist networks during the Black Decade. Strengthening the capabilities of our intelligence services will ensure that Algeria never again descends into such chaos."
 FLN_coalition_economic_program: "Coalition Economic Program"
 FLN_coalition_economic_program_desc: "The presidential coalition must present a united economic vision. By coordinating the economic policies of our coalition partners, we can attract investment, support small businesses, and lay the groundwork for sustainable growth. A strong economy will legitimize the coalition and silence our critics."
 FLN_governmental_transparency: "Governmental Transparency"
 FLN_governmental_transparency_desc: "If our democratic path is to mean anything, we must hold ourselves to a higher standard than those who came before us. By implementing transparency measures and opening government records to public scrutiny, we can root out corruption and restore the people's faith in their institutions — even if it means making enemies among the old guard."
 ALG_coalition_economic_program_tt: "The presidential coalition launches a coordinated economic development program."
 ALG_governmental_transparency_tt: "The government commits to transparency reforms, weakening entrenched corruption but angering military interests."
 ALG_ethnic_satisfaction_critical: "§ROpen Hostility§!"
 ALG_ethnic_satisfaction_low: "§YDeep Resentment§!"
 ALG_ethnic_satisfaction_moderate: "§YSimmering Tensions§!"
 ALG_ethnic_satisfaction_high: "§GRelatively Content§!"
 ALG_ethnic_relations_desc: "Algeria is a mosaic of peoples whose loyalty to the state varies greatly.\n\n§YArab population:§! [ALG_arab_satisfaction_text]\n§YKabyle population:§! [ALG_kabyle_satisfaction_text]\n§YChaoui population:§! [ALG_chaoui_satisfaction_text]\n§YTuareg population:§! [ALG_tuareg_satisfaction_text]\n§YMozabite population:§! [ALG_mozabite_satisfaction_text]"
 ALG_black_spring_event_desc: "Protests have erupted across Kabylia. The population's mood: [ALG_kabyle_satisfaction_text]. The regime must decide how to respond."
