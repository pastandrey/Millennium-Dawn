 ALG_migration_choice_tt: "§YChoice:§!\n- §GOpen Door Policy§! - Welcome migrants\n- §RClosed Borders§! - Secure the border"
 ALG_open_door_tt: "§GOpen Door Policy:§!\n\n- Welcome migrants and refugees\n- Manpower gains\n- Some stability loss\n- Humanitarian reputation"
 ALG_closed_borders_tt: "§RClosed Borders:§!\n\n- Secure the border\n- Stability gains\n- Reduced foreign influence\n- Population growth slows"
 ALG_expand_berber_rights_tt: "§GExpand Berber Rights:§!\n\n- Amazigh culture celebrated\n- Kabyle satisfaction improved\n- Research benefits from diversity"
 ALG_drug_problem_tt: "§YDrug Crisis:§!\n\nDrug trafficking from Morocco and the Sahel has created addiction problems. You must choose how to respond."
 ALG_drug_choice_tt: "§YChoice:§!\n- §GDecriminalize§! - Health-based approach\n- §RTighten Punishments§! - Law enforcement approach"
 ALG_relax_restrictions_tt: "§GDecriminalize Drugs:§!\n\n- Treat addiction as health issue\n- Reduce prison population\n- Some mafia influence remains\n- International criticism reduced"
 ALG_tighten_punishments_tt: "§RCrackdown on Drugs:§!\n\n- Harsh penalties for dealers\n- Mafia influence reduced\n- War support increased\n- Some stability loss"
