 algerian_events.209.a: "The west is lost"
 algerian_events.201.d: "The people of the Mzab region have defied government control and seized the streets.\nMozabite mood: [ALG_mozabite_satisfaction_text]\nProtest spread: [ALG_hirak_spread_text]"
 algerian_events.202.d: "In the Aurès mountains, unrest has boiled over into open defiance.\nChaoui mood: [ALG_chaoui_satisfaction_text]\nProtest spread: [ALG_hirak_spread_text]"
 algerian_events.203.d: "Despite isolation, Tamanrasset has erupted, the government losing control of the area.\nTuareg mood: [ALG_tuareg_satisfaction_text]\nProtest spread: [ALG_hirak_spread_text]"
 algerian_events.204.d: "The desert communities of the Grand Erg Occidental have joined the protest wave.\nPublic grievance: [ALG_grievance_text]\nProtest spread: [ALG_hirak_spread_text]"
