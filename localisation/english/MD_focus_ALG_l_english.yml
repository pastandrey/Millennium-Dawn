 #Algeria Resist Le Pouvoir System

 # Category
 ALG_resistance_power_struggle: "The Power Struggle"
 ALG_resistance_power_struggle_desc: "A silent war is raging between the Algerian people and *Le Pouvoir*. Both sides seek to consolidate support until the inevitable clash decides Algeria's future."

 # Decisions
 Resistance_support: "Support the Resistance"
 Resistance_support_desc: "Channel resources to grassroots movements, protests, and underground networks, strengthening the people's defiance of the ruling elite."
 ALG_increase_resistance_tt: "§YThe people grow stronger while the army's influence diminishes.§!"

 Le_Pouvoir_support: "Support *Le Pouvoir*"
 Le_Pouvoir_support_desc: "Direct support to the entrenched elite, bolstering their control of the army and weakening the people's grievances."
 ALG_increase_pouvoir_tt: "§YThe army consolidates control while the people lose momentum.§!"

 Resistance_Final_Clash: "The Final Clash"
 Resistance_Final_Clash_desc: "The conflict between the Resistance and *Le Pouvoir* has reached its peak. The coming months will determine who truly rules Algeria."

 # Outcomes (Events)
 alg_resistance.1.t: "The People Triumph!"
 alg_resistance.1.d: "The Voices of the people have risen against the ruling elites. Massive demonstrations and grassroots organization forced the government to give in. Algeria enters a new era of democratic governance."
 alg_resistance.1.a: "The people have Spoken."

 alg_resistance.2.t: "Le Pouvoir Crushes the Resistance"
 alg_resistance.2.d: "The Entrenched elite, backed by the army, successfully suppressed the resistance. The status quo remains, but simmering discontent threatens future unrest."
 alg_resistance.2.a: "Order has been Restored."

 alg_resistance.3.t: "A Nation in Chaos"
 alg_resistance.3.d: "Neither the Resistance nor Le Pouvoir managed to assert dominance. The power vacuum has plunged Algeria into chaos, with military strongmen and factions competing for control."
 alg_resistance.3.a: "The Country Teeters on the Edge of Collapse."

 alg_resistance.4.t: "The Algerian Crisis Escalates"
 alg_resistance.4.d: "The Fragile Junta cannot hold the state together. Algeria descends deeper into turmoil. Either armed groups ignite a new civil war, or foreign powers move in to restore order by force."
 alg_resistance.4.a: "The Crisis Deepens."


 MSP_deepen_african_union: "Deepen African Union Cooperation"
 MSP_deepen_african_union_desc: "Algeria has long been one of the pillars of African diplomacy. By actively strengthening our role within the African Union, we can improve our influence on the continent, foster solidarity, and push forward initiatives for peace and economic integration. Though this will cost us financially, it will bolster our legitimacy in Africa."
 ALG_african_union_tt: "Algeria strengthens its ties within the §YAfrican Union§!, improving relations with African member states."

 MSP_strengthen_maghreb_union: "Strengthen the Maghreb Union"
 MSP_strengthen_maghreb_union_desc: "The dream of regional integration in North Africa has remained elusive, but Algeria has the potential to revive it. By fostering cooperation with our Maghreb neighbors, we can reduce barriers to trade, improve diplomatic trust, and reinforce our shared cultural and historical bonds."
