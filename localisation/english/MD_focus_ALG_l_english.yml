 ALG_finalize_recovery_phase_desc: "With stability restored, we can reduce foreign oversight and reclaim economic autonomy."

 ALG_change_the_economy: "Change the Economic Model"
 ALG_change_the_economy_desc: "It's time to choose: should we preserve state control or liberalize?"

 ALG_preserve_state_controlled_oil: "Preserve State Control over Oil"
 ALG_preserve_state_controlled_oil_desc: "Sonatrach must remain the backbone of our sovereignty and economy."

 ALG_industrial_expansion_plan: "Industrial Expansion Plan"
 ALG_industrial_expansion_plan_desc: "We will increase domestic production through infrastructure and factories."

 ALG_open_market_reforms: "Open Market Reforms"
 ALG_open_market_reforms_desc: "Algeria can attract investment and boost growth by deregulating key sectors."

 ALG_oil_licensing_program: "Launch Oil Licensing Program"
 ALG_oil_licensing_program_desc: "Foreign companies may apply to exploit oil fields under licensing contracts."

 ALG_urban_or_rural_development: "Tribes or Cities?"
 ALG_urban_or_rural_development_desc: "Should our postwar focus be tribal regions or major cities?"

 ALG_empower_rural_provinces: "Empower Rural Provinces"
 ALG_empower_rural_provinces_desc: "Our rural south and Kabyle heartlands will receive direct investment."

 ALG_tribal_consultative_council: "Form Tribal Consultative Council"
 ALG_tribal_consultative_council_desc: "Local elders and regional leaders will help govern development priorities."

 ALG_urbanization_initiative: "Launch Urbanization Initiative"
 ALG_urbanization_initiative_desc: "Urban centers like Algiers and Oran are keys to our modernization."

 ALG_expand_the_capital: "Expand the Capital"
 ALG_expand_the_capital_desc: "We will expand infrastructure and offices in Algiers to make it a true modern hub."
 ALG_foreign_policy_review: "Review Foreign Policy Doctrine"
 ALG_foreign_policy_review_desc: "With internal stability returning, Algeria must redefine its role on the global stage."
 MSP_foreign_policy_review: "Review Foreign Policy Doctrine"
