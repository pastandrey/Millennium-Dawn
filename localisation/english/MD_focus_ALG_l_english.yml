 ALG_postwar_recovery_program_desc: "The war is over. Now, we begin rebuilding the state, economy, and society."

 ALG_un_aid_mission: "UN Aid Mission"
 ALG_un_aid_mission_desc: "United Nations aid and NGOs will assist our basic public services."

 ALG_social_healing_programs: "Social Healing Programs"
 ALG_social_healing_programs_desc: "Postwar trauma and distrust must be addressed with social programs and reconciliation."

 ALG_public_services_funding: "Public Services Funding"
 ALG_public_services_funding_desc: "We'll restore access to healthcare, housing, and employment programs."

