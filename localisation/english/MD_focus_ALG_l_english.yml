 ### Appointment Decisions
 ALG_appoint_sellal: "Appoint Abdelmalek Sellal"
 ALG_appoint_sellal_desc: "A technocrat and loyalist of Bouteflika, Sellal represents continuity and pragmatic governance, with a focus on stability and managing state institutions."
 ALG_sellal_gets_appointed: "Abdelmalek Sellal has been appointed as Prime Minister."
 ALG_sellal_modifiers: "§YEffects of Sellal's Appointment:§!\nDemocratic Drift: §G+0.10§!\nBureaucracy Costs: §G-10%§!\nTax Income: §G+3%§!\nExpected Police Spending: §R-1§!\nExpected Healthcare Spending: §R-1§!"

 ALG_appoint_ouyahia: "Appoint Ahmed Ouyahia"
 ALG_appoint_ouyahia_desc: "Ouyahia is a veteran politician with a reputation for harsh austerity and loyalty to the ruling establishment. His leadership style favors centralized control and financial discipline."
 ALG_ouyahia_gets_appointed: "Ahmed Ouyahia has been appointed as Prime Minister."
 ALG_ouyahia_modifiers: "§YEffects of Ouyahia's Appointment:§!\nDemocratic Drift: §G+0.10§!\nBureaucracy Costs: §G-10%§!\nTax Income: §G+3%§!\nExpected Police Spending: §R-1§!\nExpected Healthcare Spending: §R-1§!"

 ALG_appoint_bedoui: "Appoint Noureddine Bedoui"
 ALG_appoint_bedoui_desc: "Bedoui, a career bureaucrat and minister, embodies technocratic loyalty to the presidency. His governance style emphasizes administrative efficiency and limited reforms."
 ALG_bedoui_gets_appointed: "Noureddine Bedoui has been appointed as Prime Minister."
 ALG_bedoui_modifiers: "§YEffects of Bedoui's Appointment:§!\nDemocratic Drift: §G+0.10§!\nBureaucracy Costs: §G-10%§!\nTax Income: §G+3%§!\nExpected Police Spending: §R-1§!\nExpected Healthcare Spending: §R-1§!"

 ### No PM Placeholder
 ALG_no_pm_set: "§RNo Prime Minister Appointed§!"

 ALG_sellal_idea: "Prime Minister Abdelmalek Sellal"
 ALG_sellal_idea_desc: "Sellal is a pragmatic technocrat and loyal aide to the presidency. His tenure prioritizes administrative stability and institutional loyalty over bold reforms."

 ALG_ouyahia_idea: "Prime Minister Ahmed Ouyahia"
 ALG_ouyahia_idea_desc: "Known for his austerity measures and strong ties to the establishment, Ouyahia's leadership reflects continuity of state authority with a focus on fiscal control."

 ALG_bedoui_idea: "Prime Minister Noureddine Bedoui"
 ALG_bedoui_idea_desc: "A bureaucrat turned politician, Bedoui's appointment emphasizes administrative loyalty and cautious reforms under the watchful eye of the presidency."
 ### Event ###
 ALG_pm.1.t: "Government Reshuffle"
 ALG_pm.1.d: "The Presidency has announced a reshuffle of the government. The position of Prime Minister is once again open, and the President must decide who will serve as head of government."
 ALG_pm.1.a: "Begin the process of appointing a new Prime Minister."



 #Characters
 ALG_ahmed_gaid_salah_desc: "Chief of Staff of the People's National Army, Ahmed Gaïd Salah was a career officer who rose through the ranks during the War of Independence and later became one of the most influential figures in Algeria's military and political affairs."

 ALG_smain_lamari_desc: "Head of Algeria's intelligence and counter-espionage services, Smain Lamari played a central role in the ‘Dirty War' against Islamist insurgents during the Black Decade."

 ALG_kaidi_mohamed_desc: "A respected officer with experience in mechanized formations, Kaidi Mohamed specialized in armored warfare and the modernization of Algeria's land forces."

 ALG_ahcene_tafer_desc: "Ahcène Tafer was known for his leadership in Algeria's mechanized units and his role in army restructuring during the post–civil war years."

 ALG_mohammed_larbi_haouli_desc: "Mohammed Larbi Haouli commanded the Algerian Navy during a period of modernization, balancing coastal defense with regional cooperation."

 ALG_ammar_atamnia_desc: "A senior officer who served as a strategist in Algeria's land forces, Ammar Atamnia was known for his emphasis on defensive warfare and military training."

 ALG_mohammed_al_arabi_hawalli_desc: "Mohammed Al-Arabi Hawalli held naval command positions and contributed to reforming Algeria's maritime forces."

 ALG_mahmoud_laraba_desc: "An air force commander, Mahmoud Laraba was involved in pilot training and the reorganization of Algeria's aerial defense network."

 ALG_mohamed_lamari_desc: "As Chief of Staff during the Black Decade, Mohamed Lamari was one of the key figures directing Algeria's counterinsurgency operations."

 ALG_said_chengriha_desc: "Said Chengriha specialized in armored warfare and logistics, later rising to command Algeria's land forces and eventually serving as Chief of Staff."

 ALG_ben_ali_ben_ali_desc: "Commander of Algeria's elite units, Ben Ali Ben Ali built a reputation for professionalism and discipline within the infantry."

 ALG_fatima_zohra_ardjoune_desc: "One of the first women in Algeria to achieve the rank of General, Fatima Zohra Ardjoune was a military doctor and symbol of modernization in the armed forces."

 ALG_mohamed_mediene_desc: "Known as ‘Toufik', Mohamed Mediène was head of Algeria's powerful intelligence service (DRS) from 1990 until 2015, making him one of the most influential figures in modern Algerian history."

 ALG_abdelmalek_guenaizia_desc: "Abdelmalek Guenaizia served as Deputy Minister of Defense and later as Chief of Staff, playing a key role in modernizing the Algerian military."

 ALG_ahmed_bousteila_desc: "Commander of the Algerian Gendarmerie, Ahmed Bousteila oversaw the security of Algeria's rural areas and the fight against smuggling and terrorism."

 ALG_fatima_boudouani_desc: "The first woman promoted to General in the Algerian Army (2009), Fatima Boudouani represented a breakthrough in gender integration within the armed forces."


 #Medals
 alg_medal_1: "Order of November 1st"
 alg_medal_1_desc: "Awarded for exceptional bravery in the defense of the nation."

 alg_medal_2: "National Liberation Medal"
 alg_medal_2_desc: "Commemorates outstanding contributions to Algeria's independence struggle."

 alg_medal_3: "Medal of Military Merit"
 alg_medal_3_desc: "Granted for excellence in command and service."

 alg_medal_4: "Valor Medal"
 alg_medal_4_desc: "Recognizes acts of courage on the battlefield."

 alg_medal_5: "People's Service Medal"
 alg_medal_5_desc: "Awarded for selfless service in protecting civilians."

 alg_medal_6: "Martyr's Legacy Medal"
 alg_medal_6_desc: "Symbol of ultimate sacrifice for the nation."


