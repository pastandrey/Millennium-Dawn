 ALG_nahda_path: "Chose the Nahda path"
 ALG_ulema_path: "Chose the Ulema path"
 ALG_belhadj_leader: "Ali Belhadj is the leader"
 ALG_bouamrane_leader: "Cheikh Bouamrane is the leader"

