 algerian_events.206.d: "Protests in the east overwhelm the local security forces, and Constantinois has fallen.\nArab mood: [ALG_arab_satisfaction_text]\nProtest spread: [ALG_hirak_spread_text]"
 algerian_events.207.d: "Kabylia, with its long tradition of dissent, is once again in open defiance of the state.\nKabyle mood: [ALG_kabyle_satisfaction_text]\nProtest spread: [ALG_hirak_spread_text]"
 algerian_events.208.d: "Even the capital region has been rocked by uncontrollable protests.\nMilitary grip: [ALG_army_grip_text]\nProtest spread: [ALG_hirak_spread_text]"
 algerian_events.209.d: "In the west, Oranais joins the wave of unrest sweeping across Algeria.\nArab mood: [ALG_arab_satisfaction_text]\nProtest spread: [ALG_hirak_spread_text]"
 #protest
 algerian_events.200.t: "Protests Suppressed"
 algerian_events.200.d: "Security forces have managed to suppress the latest wave of demonstrations, though public anger simmers beneath the surface."
 algerian_events.200.a: "Order is restored, for now."

 algerian_events.2015.t: "Suppression Backfires"
 algerian_events.2015.d: "Attempts to crack down on the protests have only fueled more anger, emboldening the demonstrators and weakening government authority."
 algerian_events.2015.a: "The situation worsens."

 algerian_events.2025.t: "End of Protests"
 algerian_events.2025.d: "After months of struggle, the latest wave of protests has burned out. Tensions remain, but for now, the streets are quiet again."
 algerian_events.2025.a: "Finally, calm returns."
 algerian_events.301.t: "Nationwide Protests Erupt!"
 algerian_events.301.d: "It appears that our recent actions were not taken lightly by the people, and nationwide protests have erupted. Slowly but surely, it appears that more and more people are demanding the resignation of the government, though we are not going to go anywhere."
 algerian_events.301.a: "We Should See this Coming!"

 ### MIO Names ###
 ALG_khenchela_arms_manufacturer: "Khenchela Arms Manufacturing Complex"
 ALG_khenchela_arms_manufacturer_desc: "A state-owned facility in Khenchela Province producing infantry weapons and equipment for the Algerian National People's Army. Established to reduce dependence on foreign arms imports and ensure self-sufficiency in small arms production."

 ALG_seriana_small_arms: "Seriana Small Arms Factory"
 ALG_seriana_small_arms_desc: "Located in eastern Algeria, the Seriana facility produces rifles, pistols, and ammunition for Algerian security forces. The factory operates under the supervision of the Ministry of National Defense."

 ALG_dgi_missile_systems: "DGI - Direction Générale de l'Industrie Militaire"
 ALG_dgi_missile_systems_desc: "The General Directorate of Military Industry oversees Algeria's defense manufacturing sectors, including guided weapons, anti-tank/anti-aircraft systems, and artillery development. Subordinate to the Ministry of National Defense, the DGI coordinates state enterprises and military-technical partnerships to ensure strategic autonomy."

 ALG_bcl_armored_development: "BCL - Brigade des Constructions Logistiques"
 ALG_bcl_armored_development_desc: "The Military Logistics Construction Brigade handles armored vehicle maintenance, upgrades, and limited domestic production. BCL specializes in refurbishing Soviet-era equipment and adapting vehicles to Saharan operational conditions."

 ALG_snvi_vehicle_manufacturer: "SNVI - Société Nationale des Véhicules Industriels"
 ALG_snvi_vehicle_manufacturer_desc: "Algeria's national vehicle manufacturer, established in 1967. SNVI produces military trucks, utility vehicles, and light armored vehicles through partnerships with Mercedes-Benz and other manufacturers, with all designs adapted to North African terrain and climate."

 ALG_enmib_helicopter_unit: "ENMIB - Entreprise Nationale des Matériels et Infrastructures de Base"
 ALG_enmib_helicopter_unit_desc: "Algeria's helicopter maintenance and assembly facility, providing overhaul services and limited production for the Algerian Air Force. ENMIB handles licensed assembly of foreign helicopter designs."

 ALG_mers_el_kebir_shipyards: "Mers El-Kébir Naval Shipyard"
 ALG_mers_el_kebir_shipyards_desc: "Located at the strategic port of Mers El-Kébir near Oran, this historic naval facility handles construction and maintenance of patrol vessels and light naval craft for the Algerian Navy."

 ALG_el_djazair_naval_industry: "CNAN - Compagnie Nationale Algérienne de Navigation"
 ALG_el_djazair_naval_industry_desc: "Algeria's national maritime company, CNAN operates shipyards in Algiers capable of building corvettes, frigates, and submarines with foreign technical assistance. The company also handles commercial shipping and naval logistics."

 ALG_ersa_aircraft_manufacturer: "ERSA - Entreprise de Réparation et de Service Aéronautique"
 ALG_ersa_aircraft_manufacturer_desc: "Algeria's primary aircraft maintenance, repair, and overhaul facility. ERSA handles limited assembly of licensed aircraft for the Algerian Air Force and provides comprehensive aviation technical services."

