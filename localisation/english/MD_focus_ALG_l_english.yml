 algeria_casablanca_accords_desc: "We are in the process of negotiating a lasting peace in Western Sahara. We need to convince all the partaking countries that our solution will work. Even if we fail to convince all countries, the majority of countries can try to enforce the solution to the opposing side. This however, can lead to an escalation of the conflict."
