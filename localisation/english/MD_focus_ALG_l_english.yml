 ### EVENT DESCRIPTIONS ###
 alg_deep_state.1.d: "Behind closed doors, the military and intelligence services continue to extend their influence into civilian affairs."
 alg_deep_state.5.d: "Reports indicate that retired generals and intelligence officers are increasingly visible in political and economic circles. Their influence extends well beyond their official roles.\n\n§YThe deep state is establishing its networks.§!"
 alg_deep_state.10.d: "Elements within the DRS and other intelligence services have begun directly influencing state policy. Key decisions are being made without proper civilian oversight.\n\n§RThis requires a response.§!"
 alg_deep_state.15.d: "The military establishment now operates as a shadow government. Ministers increasingly must seek approval from senior generals before implementing major policies.\n\n§RLe pouvoir grows stronger.§!"
 alg_deep_state.20.d: "The security apparatus now wields enormous influence over the Algerian state. The deep state - 'le pouvoir' - has become the true power behind the throne. Civilian politicians are mere figureheads.\n\n§RCRITICAL: The deep state controls Algeria!§!"
 alg_deep_state.101.d: "A massive defense contract worth billions has been awarded under suspicious circumstances. Evidence suggests that senior military officials received significant kickbacks.\n\n§YHow do we respond?§!"
 alg_deep_state.102.d: "The intelligence services have formally requested expanded surveillance powers, citing security concerns and the need to combat terrorism and foreign interference.\n\n§YThis would significantly increase their influence.§!"
 alg_deep_state.103.d: "A prominent and influential general has publicly criticized government policy, calling for 'responsible leadership' and 'national security priorities.' This is a thinly veiled threat to civilian authority.\n\n§RThis is a direct challenge!§!"
 alg_deep_state.104.d: "Senior military figures are seeking to expand their business interests into key economic sectors. They argue this will benefit national security and development."
 alg_deep_state.105.d: "The military establishment is pressuring major media outlets to adopt a more favorable editorial line regarding defense and security issues."
 alg_deep_state.106.d: "Several retired high-ranking generals are expressing interest in entering politics. They claim to offer experience and stability."
 alg_deep_state.107.d: "Provincial military commanders hold significant local influence. The question is whether they remain loyal to civilian government or to the deep state networks."
 alg_deep_state.108.d: "Foreign diplomats have quietly offered assistance in managing the growing influence of the deep state. This would come with political costs and obligations."
 alg_deep_state.200.d: "Tanks have surrounded government buildings in Algiers. The military has announced it is taking 'temporary' control to 'restore order, stability, and proper governance.'\n\n§RTHE MILITARY HAS SEIZED POWER!§!\n\nThe deep state has transformed into open military rule."
 alg_deep_state.201.d: "The military has seized power, but there may still be a chance to resist. Loyal forces could attempt to restore civilian government - but this is extremely risky."
 alg_deep_state.210.d: "The military government has moved quickly to consolidate its control. Key institutions are now firmly under military command."
 alg_deep_state.211.d: "The international community has reacted to the military takeover. Several nations have condemned the coup and called for a return to civilian government."
 alg_deep_state.220.d: "The time has come. When the military seized power, they promised to hold elections and restore civilian rule within two years.\n\nThat deadline has arrived. The world is watching.\n\n§YWill the generals keep their promise?§!"

