 algeria_power_balance: "Algerian Political Struggle"
 algeria_old_guard: "Le Pouvoir (Old Guard)"
 algeria_reformists: "Hirak Movement (Reformists)"
 algeria_compromise_range: "Fragile Compromise"
 algeria_compromise_range_desc: "Neither side dominates. An uneasy stalemate persists as both factions maneuver for advantage."
 old_guard_leaning: "Old Guard Influence"
 old_guard_leaning_desc: "The military establishment begins to reassert its traditional dominance."
 old_guard_partial_control: "Old Guard Consolidation"
 old_guard_partial_control_desc: "Le Pouvoir tightens its grip. Reformist voices are marginalized."
 old_guard_strong_control: "Authoritarian Drift"
 old_guard_strong_control_desc: "The security apparatus dominates political life. Democratic institutions erode."
 old_guard_full_control: "Military Dominance"
 old_guard_full_control_desc: "Le Pouvoir controls Algeria with an iron fist. Civil liberties are severely restricted."
 reformists_leaning: "Reformist Stirrings"
 reformists_leaning_desc: "Civil society grows bolder. The Hirak spirit revives."
 reformists_gaining_ground: "Reform Momentum"
 reformists_gaining_ground_desc: "The reform movement gains strength. The old guard struggles to maintain control."
 reformists_strong_momentum: "Democratic Surge"
 reformists_strong_momentum_desc: "Reformists dominate public discourse. Real change seems possible."
 reformists_victory: "Democratic Transition"
 reformists_victory_desc: "Algeria embraces civilian rule and pluralism. Le Pouvoir's grip is broken."
 ALG_political_struggle: "Algerian Political Struggle"
 ALG_political_struggle_desc: "The battle between the old guard and reformists will shape Algeria's future.\nCurrent balance: [ALG_power_struggle_state]\nMilitary grip: [ALG_army_grip_text]\nPublic grievance: [ALG_grievance_text]"
 ALG_power_struggle_state: "Political Situation"
 ALG_boost_reformists_tt: "Channel resources to reformist politicians and civil society groups.\n§YShifts balance toward reformists by §G+0.15§Y.§!"
 ALG_boost_old_guard_tt: "Shore up support among military veterans and the security establishment.\n§YShifts balance toward old guard by §R-0.15§Y.§!"
 ALG_rally_students_tt: "Mobilize student movements and youth activists in favor of reform.\n§YShifts balance toward reformists by §G+0.08§Y.§!"
 ALG_mobilize_veterans_tt: "Rally independence war veterans and retired officers.\n§YShifts balance toward old guard by §R-0.08§Y.§!"
 ALG_bribe_elites_tt: "Use patronage to secure elite loyalty.\n§YShifts balance toward old guard by §R-0.05§Y.\nCosts §R30§Y from treasury. Risks fueling corruption.§!"
 ALG_compromise_tt: "Broker a power-sharing deal between reformists and the old guard.\n§YMoves balance toward center by §W±0.08§Y.§!"
 ALG_media_campaign_reform_tt: "Launch a media campaign promoting democratic values.\n§YShifts balance toward reformists by §G+0.05§Y.§!"
 ALG_security_crackdown_tt: "Authorize security forces to crack down on dissent.\n§YShifts balance toward old guard by §R-0.05§Y.§!"
 ALG_world_tension_security_tt: "Global instability justifies a stronger security apparatus.\n§YShifts balance toward old guard by §R-0.08§Y.§!"
 ALG_world_tension_high_security_tt: "Severe global tensions demand extraordinary security measures.\n§YShifts balance toward old guard by §R-0.12§Y.§!"
 ALG_crackdown_momentum_tt: "Our crackdown policy strengthens the old guard's position.\n§YShifts balance toward old guard by §R-0.10§Y.§!"
 ALG_reconciliation_momentum_tt: "Our reconciliation approach empowers reformist voices.\n§YShifts balance toward reformists by §G+0.10§Y.§!"
 ALG_oil_patronage_tt: "Use oil revenues to fund patronage networks.\n§YShifts balance toward old guard by §R-0.06§Y.\nCosts §R25§Y from treasury but increases stability.§!"
 ALG_economic_reforms_tt: "Implement economic liberalization and transparency measures.\n§YShifts balance toward reformists by §G+0.08§Y.§!"
 ALG_elite_patronage: "Elite Patronage Networks"
 ALG_elite_patronage_desc: "We are buying stability through patronage, but this deepens corruption and drains resources."
 alg_politics.10.t: "The Compromise Talks"
 alg_politics.10.d: "Representatives of both factions have met in secret. A compromise has been reached - but will both sides honor it?"
 alg_politics.10.a: "Accept the agreement"
 alg_politics.10.b: "Reject and continue the struggle"
 alg_politics.20.t: "Reformists Seize Power"
 alg_politics.20.d: "The reformist movement has reached critical mass. The old guard faces a choice: step aside or fight."
 alg_politics.20.a: "Accept democratic transition"
 alg_politics.20.b: "The military will not surrender"
 alg_politics.21.t: "Military Coup Imminent"
 alg_politics.21.d: "The generals have consolidated power and are moving to sideline civilian reformists."
 alg_politics.21.a: "Accept military authority"
 alg_politics.21.b: "Defend the reform movement"
 alg_politics.22.t: "Shadows Over Algiers"
 alg_politics.22.d: "The security establishment grows bolder. Algeria is drifting toward authoritarianism. How do we respond?"
 alg_politics.22.a: "Security must come first"
 alg_politics.22.b: "Ease tensions before it's too late"
 alg_politics.23.t: "Winds of Change"
 alg_politics.23.d: "The reform movement grows stronger. But Le Pouvoir still commands the security forces. How do we proceed?"
 alg_politics.23.a: "Push forward with reforms"
 alg_politics.23.b: "Slow down to avoid backlash"
 ALG_political_truce: "Political Truce"
 ALG_political_truce_desc: "A fragile compromise holds between reformists and the old guard."
 ALG_arabization_hardline: "Hardline Arabization Policy"
 ALG_arabization_pushed_once: "Initial Arabization Push"
 ALG_arabization_recent: "Recent Arabization Efforts"
 ALG_kabyle_appeased_recently: "Appeased Kabyle Sentiments"
 ALG_tamazight_integration_process: "Tamazight Integration Process"
 ALG_tamazight_integration_process_desc: "The official recognition of the Tamazight language is being implemented across state institutions. While this has largely pacified the regions, the bureaucratic shift and the adjustment of national identity cause a temporary period of friction as we move toward full social cohesion."
 # Event 1 - Scandal Breaks
 ALG_auto.1.t: "Auto Industry Scandal"
 ALG_auto.1.desc: "Revelations have emerged about widespread corruption in Algeria's automobile industry. Multiple foreign partnerships including Renault, BMW, and Mercedes have been implicated in bribery schemes and fraudulent import practices. The public is outraged and demands action."
 ALG_auto.1.a: "Launch a full investigation"
 ALG_auto.1.b: "Suppress the story"
 # Event 2 - Import Ban Decision
 ALG_auto.2.t: "Response to Auto Scandal"
 ALG_auto.2.desc: "Following the scandal investigation, we must decide how to handle automotive imports going forward. A complete ban would send a strong message but damage our economy. Partial restrictions offer a middle ground."
 ALG_auto.2.a: "Enact a complete import ban"
 ALG_auto.2.b: "Implement partial restrictions"
 ALG_auto.2.c: "Take no action on imports"
 # Event 3 - Fiat Approaches
 ALG_auto.3.t: "Fiat Proposes Partnership"
 ALG_auto.3.desc: "Italian automaker Fiat has approached us with a proposal to establish manufacturing facilities in Algeria. They see opportunity in our market following the import restrictions. This could revitalize our auto sector."
 ALG_auto.3.a: "Accept Fiat's proposal"
 ALG_auto.3.b: "Negotiate for better terms"
 ALG_auto.3.c: "Reject the proposal"
 # Event 4 - Alternative Path
 ALG_auto.4.t: "Auto Sector Recovery"
 ALG_auto.4.desc: "Following our measured response to the scandal, the auto sector is beginning to stabilize. Domestic manufacturers are showing interest in expansion, while foreign companies continue to approach us."
 ALG_auto.4.a: "Support domestic manufacturers"
 ALG_auto.4.b: "Entertain foreign offers"
 # Event 5 - Better Terms
 ALG_auto.5.t: "Fiat Accepts Our Terms"
 ALG_auto.5.desc: "Our negotiators have succeeded. Fiat has agreed to more favorable terms including additional investment and technology transfer. This is a significant win for Algerian industry."
 ALG_auto.5.a: "Excellent news!"
 # Event 6 - Negotiations Failed
 ALG_auto.6.t: "Fiat Rejects Renegotiation"
 ALG_auto.6.desc: "Fiat has rejected our demands for better terms. They insist their original offer is more than fair. We must decide whether to accept their terms or walk away entirely."
 ALG_auto.6.a: "Accept the original terms"
 ALG_auto.6.b: "Walk away from the deal"
 ALG_corruption_auto_scandal: "Auto Industry Corruption Scandal"
 ALG_corruption_auto_scandal_desc: "The exposure of widespread corruption in our automobile industry has shaken public confidence. Foreign partners are distancing themselves while investigations continue. Our industrial output and political capital have taken a significant hit."
 ALG_corruption_auto_scandal_coverup: "Suppressed Auto Scandal"
 ALG_corruption_auto_scandal_coverup_desc: "We have attempted to suppress news of the auto industry scandal. While the immediate damage is contained, foreign intelligence agencies are aware of our deception and domestic opposition groups have ammunition against us. The truth may yet come out."
 ALG_import_ban_penalty: "Automobile Import Ban"
 ALG_import_ban_penalty_desc: "A complete ban on automobile imports has been enacted following the corruption scandal. While this sends a strong message against foreign exploitation, it has severely disrupted supply chains and industrial production. Consumers face shortages and higher prices."
 ALG_import_restrictions_light: "Automobile Import Restrictions"
 ALG_import_restrictions_light_desc: "Partial restrictions on automobile imports have been implemented. This measured approach maintains some trade relationships while addressing public anger over the corruption scandal. The economic impact is manageable but still noticeable."
 ALG_4g_rollout_tt: "§GAlgeria launches nationwide 4G mobile network:§!\n- High-speed mobile internet\n- Improved business connectivity\n- Digital services expansion"
 ALG_4g_coverage_basic: "4G Coverage - Basic"
 ALG_4g_coverage_basic_desc: "Our 4G network is operational but coverage is limited to major urban centers. Continued infrastructure investment is needed."
 ALG_4g_coverage_moderate: "4G Coverage - Moderate"
 ALG_4g_coverage_moderate_desc: "4G coverage now extends to most cities and towns. Businesses and citizens are benefiting from improved connectivity."
 ALG_4g_coverage_good: "4G Coverage - Good"
 ALG_4g_coverage_good_desc: "Strong 4G coverage across most of Algeria. The digital economy is flourishing and productivity is rising."
 ALG_4g_coverage_excellent: "4G Coverage - Excellent"
 ALG_4g_coverage_excellent_desc: "Nationwide 4G coverage achieved! Algeria is now a regional leader in mobile connectivity. The foundation is set for 5G development."
 algerian_event.51.t: "Algerian Spacecraft Successfully Lands on the Moon!"
 algerian_event.51.desc: "The Algerian Space Agency (ASAL) has achieved a historic milestone! Our lunar lander has successfully completed a soft landing on the lunar surface, making Algeria only the fifth nation in history to accomplish this feat.\n\nThe descent was broadcast live across the nation, with millions of Algerians watching in awe as our spacecraft touched down near the lunar south pole. Scientists at the control center in Algiers erupted in celebration as telemetry confirmed the successful landing.\n\nThis achievement places Algeria alongside the USSR, the USA, China, and India in the elite club of nations capable of lunar soft landings. It represents the culmination of decades of investment in our space program and signals Algeria's emergence as a major space power.\n\nThe world watches in admiration as the green and white flag is planted on the moon."
 algerian_event.51.a: "A giant leap for Algeria!"
 ALG_missile_leverage: "Missile Leverage"
 ALG_missile_leverage_desc: "Our relationship with China presents an opportunity to acquire advanced missile technology. By leveraging our diplomatic ties and strategic position, we can negotiate the transfer of ground-launched cruise missiles and mobile launch platforms. This will significantly enhance Algeria's deterrence capabilities."
 ALG_build_nuclear_reactor_tt: "§GConstruct Nuclear Reactor:§!\n- Establish civilian nuclear power capability\n- Reduce dependence on fossil fuels\n- Train nuclear scientists and engineers\n- Foundation for advanced nuclear research"
 ALG_election_pending: "National Elections Pending"
 ALG_opposition_reforms_1: "Opposition Reforms: Media Freedom"
 ALG_opposition_reforms_1_desc: "The opposition government has begun its reform program by guaranteeing media freedom. A free press now holds the government accountable and informs the public."
 ALG_opposition_reforms_2: "Opposition Reforms: Justice System"
 ALG_opposition_reforms_2_desc: "Building on media reforms, the opposition government has reformed the judiciary. Independent courts now ensure justice for all Algerians and combat corruption."
 ALG_opposition_reforms_3: "Opposition Reforms: Education"
 ALG_opposition_reforms_3_desc: "The opposition's reform program continues with major investments in education. A modernized system is preparing Algeria's youth for the challenges ahead."
 ALG_opposition_reforms_4: "A New Era for Algeria"
 ALG_opposition_reforms_4_desc: "The opposition's comprehensive reform program is complete. Algeria has been transformed into a modern, democratic, and prosperous nation. Free media, independent courts, quality education, and economic opportunity define this new era."
 ALG_fis_movement: "Islamic Salvation Movement"
 ALG_fis_movement_desc: "The FIS has galvanized the Algerian people with its message of Islamic democracy, social justice, and anti-corruption. Mosques serve as community centers, providing social services the government neglected. Popular support grows daily."
 ALG_fln.1.t: "Corruption Scandal Rocks Algeria"
 ALG_fln.1.desc: "Investigative journalists have uncovered a web of corruption extending across Algeria's political establishment. Bank records reveal millions diverted from public funds into private accounts. Multiple parties appear implicated, including members of our own FLN.\n\nThe scandal has erupted into public view and we cannot ignore it. The evidence is damning, but how we respond could either stabilize or destabilize the entire political system. We must decide our course of action carefully."
 ALG_fln.1.a: "Bury the story"
 ALG_cover_up_corruption_tt: "§RCover Up the Scandal:§!\n• Corruption increases significantly\n• Minor political power loss\n• FLN reputation slightly damaged\n• Stability preserved for now\n\n§7\"What the people don't know won't hurt them.\"§!"
 ALG_fln.1.b: "Blame the opposition parties"
 ALG_blame_others_tt: "§YBlame Opposition Parties:§!\n• Corruption increases\n• Opposition parties heavily damaged\n• FLN gains some support\n• Some stability lost\n\n§7\"They are the real criminals here!\"§!"
 ALG_fln.1.c: "Let the truth come out"
 ALG_expose_all_tt: "§GExpose All Corruption:§!\n• All parties damaged (including FLN)\n• Significant stability loss\n• Heavy political power cost\n• BUT corruption decreases\n• Anti-corruption momentum (1 year bonus)\n\n§7\"The people deserve the truth.\"§!"
 ALG_fln.1.e: "Launch a full anti-corruption campaign"
 ALG_anti_corruption_campaign_tt: "§GLaunch Anti-Corruption Campaign:§!\n• All parties damaged (including FLN)\n• Heavy treasury cost (§R-15§!)\n• Major political power cost (§R-100§!)\n• BUT corruption decreases significantly\n• §GPermanent anti-corruption reforms§!\n• Long-term stability gain\n\n§7\"We will root out this cancer entirely!\"§!"
 ALG_anti_corruption_momentum: "Anti-Corruption Momentum"
 ALG_anti_corruption_momentum_desc: "The exposure of corruption has sparked public demand for reform. While painful, this moment of transparency has created momentum for positive change."
 ALG_anti_corruption_reforms: "Anti-Corruption Reforms"
 ALG_anti_corruption_reforms_desc: "Comprehensive anti-corruption measures have been implemented across the government. Transparent procurement, independent auditors, and whistleblower protections are reducing graft and restoring public trust."
 ALG_fln.2.t: "Sonatrach Corruption Scandal"
 ALG_fln.2.desc: "A massive corruption scandal has erupted at Sonatrach, Algeria's state oil company. Investigations reveal billions embezzled through fake contracts and offshore accounts. Senior executives and foreign partners are implicated.\n\nThe public demands answers. How will we respond?"
 ALG_fln.2.a: "Cover it up"
 ALG_fln.2.b: "Investigate the corruption"
 ALG_fln.2.c: "Blame the opposition"
 ALG_fln.3.t: "The Hirak Awakens"
 ALG_fln.3.desc: "Millions of Algerians have taken to the streets in a mass movement demanding change. The Hirak protests have united people across all divisions - young and old, secular and religious.\n\n\"Yetnahaw Ga3!\" (They all must go!) echoes through every city.\n\nThe old order trembles. The people have found their voice."
 ALG_fln.3.a: "The people have spoken."
 ALG_grievance_increase_5_tt: "§YPeople's Grievance:§! +5"
 ALG_cover_up_scandal: "Scandal Cover-Up"
 ALG_cover_up_scandal_desc: "The Sonatrach corruption scandal has been buried, but whispers persist. Foreign intelligence agencies are aware of the cover-up, and the truth threatens to resurface at any moment."
 ALG_anti_corruption_probe: "Anti-Corruption Probe"
 ALG_anti_corruption_probe_desc: "A thorough investigation into Sonatrach corruption is underway. While it disrupts business as usual, the probe is restoring public trust and rooting out corrupt officials."
 ALG_shift_blame: "Blame Shifted to Opposition"
 ALG_shift_blame_desc: "The government has successfully redirected public anger over the Sonatrach scandal toward opposition parties. While effective propaganda, this deflection does nothing to address the underlying corruption."
 ALG_sonatrach_corruption: "Sonatrach Corruption Scandal"
 ALG_sonatrach_corruption_desc: "The massive Sonatrach corruption scandal has shaken public trust. Billions were embezzled while ordinary Algerians struggled. The oil sector's reputation is tarnished."
 ALG_mass_protests: "Mass Protests"
 ALG_mass_protests_desc: "The Hirak movement has brought millions to the streets across Algeria. Economic activity is disrupted as the people demand fundamental change. The old order is shaking."
 ALG_FLN_chosen: "FLN Path Chosen"
 ALG_fln_opp_path: "FLN Opposition Path"
 ALG_expand_hydro_TT: "Will add §G100 GWh§! of Energy Storage for every GW of §Hhydropower generated§! from the §HBeni Haroun Dam§!."
 ALG_domestic_development_focus: "Domestic Development Focus"
 ALG_domestic_development_focus_desc: "Algeria has chosen to invest in its own development rather than foreign expansion. Infrastructure projects, industrial development, and social programs are transforming the nation into a modern, prosperous state."
 ALG_middle_east_expansion: "Middle East Expansion"
 ALG_middle_east_expansion_desc: "Our armies march toward the Middle East. The troops are well-supplied and motivated by visions of glory and conquest."
 ALG_domestic_focus_bonus: "Domestic Development"
 ALG_integrate_kabylie_tt: "§GIntegrate Kabylie peacefully§!
 ALG_de_arabisation_effect_TT: "§YDe-Arabisation Policy:§!\n\n§G Berber Language Revival§!\n   Tamazight becomes co-official language\n\n§G Cultural Recognition§!\n   Amazigh identity celebrated nationally\n\n§G Education Reform§!\n   Berber history taught in schools\n\n§RConsequences:§!\n   -Arab nationalist support\n   -Relations with Arab League\n   +Kabyle regional stability"
