 ALG_local_arms_production: "Local Arms Production"
 ALG_local_arms_production_desc: "Encouraging domestic arms production to reduce foreign dependency and speed up infantry equipment output."

 ALG_training_doctrine: "Modern Training Doctrine"
 ALG_training_doctrine_desc: "Upgrading training standards and routines to increase the experience gain of our military forces."

 ALG_logistics_reform: "Logistics Reform"
 ALG_logistics_reform_desc: "Enhancing our logistical capabilities to reduce supply consumption and improve operational endurance."

 ALG_finalized_military_doctrine: "Finalized Doctrine"
 ALG_finalized_military_doctrine_desc: "After extensive reforms, we are implementing a finalized doctrine tailored to our unique military needs."

 ALG_armor_development: "Armor Development Program"
 ALG_armor_development_desc: "Developing better armored vehicles to improve speed, survivability, and tactical flexibility."

 ALG_military_academy_national: "National Military Academy"
 ALG_military_academy_national_desc: "Establishing a prestigious national academy to advance military research and officer training."

 ALG_special_ops_unit: "Special Operations Unit"
 ALG_special_ops_unit_desc: "Our elite special forces receive enhanced training and equipment, enabling superior performance."

 ALG_joint_ops_coordination: "Joint Operations Coordination"
 ALG_joint_ops_coordination_desc: "Improving command structures for more effective joint operations between army branches."

 ALG_national_weapons_dev: "National Weapons Development"
 ALG_national_weapons_dev_desc: "Investing in local weapons research and innovation to enhance the quality and speed of production."

 ALG_integrated_defense_net: "Integrated Defense Network"
 ALG_integrated_defense_net_desc: "Creating a nationwide radar and early warning network to improve response and coordination."

 ALG_military_industry_growth: "Military Industrial Growth"
 ALG_military_industry_growth_desc: "Expanding the defense industry to meet long-term procurement and modernization goals."

 ALG_modern_c4isr: "Modern C4ISR Infrastructure"
 ALG_modern_c4isr_desc: "Implementing modern command, control, communications, and intelligence systems to enhance command efficiency."

 ALG_modernized_military_status: "Modernized Armed Forces"
 ALG_modernized_military_status_desc: "We have achieved a modern and capable military force, ready to project power and defend national interests."

 ALG_african_union_member: "African Union Membership"
 ALG_african_union_member_desc: "We are now fully engaged in the African Union, enhancing diplomatic and economic ties across the continent."

 ALG_idea_us_support: "U.S. Strategic Support"
 ALG_idea_us_support_desc: "Strategic cooperation with the United States strengthens our global position through military and economic assistance."

 ALG_idea_chinese_investment: "Chinese Infrastructure Investment"
 ALG_idea_chinese_investment_desc: "China has committed to large-scale infrastructure investments, boosting our industrial capacity."

 ALG_idea_chinese_loans: "Chinese Development Loans"
 ALG_idea_chinese_loans_desc: "We've accepted Chinese development loans, improving construction output but increasing our financial obligations."

 ALG_idea_russian_arms: "Russian Arms Agreement"
 ALG_idea_russian_arms_desc: "We've secured a military supply agreement with Russia, accelerating the development of our armed forces."

 ALG_idea_non_aligned_policy: "Non-Aligned Foreign Policy"
 ALG_idea_non_aligned_policy_desc: "Our independent path allows us to benefit from all blocs without aligning with any."

 ALG_global_south_network: "Global South Solidarity Network"
 ALG_global_south_network_desc: "Stronger South-South cooperation enhances our international influence and soft power."

 ALG_arab_league_reaffirmed: "Reaffirm Arab League Commitment"
 ALG_arab_league_reaffirmed_desc: "We reaffirm our commitment to the Arab League and strengthen our bonds with fellow Arab nations."

 ALG_pan_arab_network: "Pan-Arab Diplomatic Network"
 ALG_pan_arab_network_desc: "A renewed diplomatic push promotes Arab cooperation and collective strength in global affairs."

 ALG_palestinian_support: "Support the Palestinian Cause"
 ALG_palestinian_support_desc: "We provide support to the Palestinian people in their struggle for self-determination, reinforcing our regional stance."

# Presidential Crisis Focuses
 ALG_presidential_succession_crisis: "Presidential Succession Crisis"
 ALG_presidential_succession_crisis_desc: "With stability eroding, the question of leadership re-emerges. Do we continue under the old regime or forge a new path?"

 ALG_stay_with_bouteflika: "Maintain Bouteflika's Leadership"
 ALG_stay_with_bouteflika_desc: "Bouteflika represents continuity. and corruption. We may gain financial stability, but at the cost of legitimacy."

 ALG_choose_tebboune: "Appoint Tebboune"
 ALG_choose_tebboune_desc: "A moderate technocrat with stability-oriented reforms, but one who will cost the treasury dearly."

 ALG_choose_msp: "Appoint MSP Leader"
 ALG_choose_msp_desc: "An Islamist alternative aligned with the Muslim Brotherhood. It brings popularity among certain circles, but risks civil conflict with the entrenched military elite."

 ALG_random_president: "Choose a Random President"
 ALG_random_president_desc: "A wild card. This new president might save or doom Algeria."

 ALG_resolve_presidency_crisis: "Presidency Resolved"
 ALG_resolve_presidency_crisis_desc: "The question of leadership has been answered. It is now time to move forward."

# Ideas
 ALG_idea_bouteflika_legacy: "Bouteflika's Legacy"
 ALG_idea_bouteflika_legacy_desc: "Despite deep corruption and mistrust, Bouteflika's era remains synonymous with Algeria's past governance. His network remains influential."

 ALG_idea_tebboune_moderate: "Tebboune's Moderate Presidency"
 ALG_idea_tebboune_moderate_desc: "With an image of stability and incremental reform, Tebboune seeks to maintain order while cleaning up governance."

 ALG_idea_msp_presidency: "MSP Presidency"
 ALG_idea_msp_presidency_desc: "The Movement of Society for Peace has taken power. Whether this marks a peaceful transformation or descent into conflict remains to be seen."

 ALG_idea_random_good: "Effective New President"
 ALG_idea_random_good_desc: "Through luck or strategy, the new president is competent and inspired, bringing reform and direction."

 ALG_idea_random_bad: "Inept New President"
 ALG_idea_random_bad_desc: "This leader is unprepared, overwhelmed, and possibly corrupt. A poor choice for a critical time."

 ALG_presidency.1.t: "Tensions with the Military"
 ALG_presidency.1.d: "Following the appointment of the MSP leader as President, the military elite is furious. They see this as a threat to their longstanding grip on power. Rumors swirl about secret mobilizations, and armed units loyal to the old guard begin to maneuver. Will the military accept this change or will they rebel?"

 ALG_presidency.1.a: "The Military Accepts the New Government"
 ALG_presidency.1.b: "The Military Rebels – Civil War Begins!"

 ALG_presidency_army_accepts_tt: "The Army reluctantly accepts the MSP government. For now, peace holds."
 ALG_presidency_army_civilwar_tt: "A military coup erupts into open civil war!"
 ALG_economy_digital_initiative: "Digital Economy Initiative"
 ALG_economy_digital_initiative_desc: "Algeria must embrace the digital age to modernize its economy. Investment in technology infrastructure, e-government services, and digital literacy programs will position us for the 21st century economy."
 ALG_digital_initiative_tt: "§GAlgeria launches a comprehensive digital transformation program:§!\n- Modernize government services\n- Expand internet infrastructure\n- Promote tech startups\n- Train workforce in digital skills"
 ALG_digital_initiative_bonus: "Digital Economy Initiative"
 ALG_digital_economy_initiative: "Digital Economy Initiative"
 ALG_digital_economy_initiative_desc: "Our investment in digital infrastructure and technology education is paying dividends. Government services are more efficient, businesses are adopting modern practices, and a new generation of tech-savvy workers is entering the workforce."
 ALG_arpt_regulatory_framework: "Establish ARPT Regulatory Authority"
 ALG_arpt_regulatory_framework_desc: "The Autorité de Régulation de la Poste et des Télécommunications (ARPT) will ensure a competitive telecom market and protect consumer rights."

 ALG_algerie_telecom_expansion: "Algerie Telecom Modernization"
 ALG_algerie_telecom_expansion_desc: "Modernize and expand Algeria Telecom's infrastructure to improve broadband access and public communications."

 ALG_nedjma_and_mobilis: "Nedjma & Mobilis Competition"
 ALG_nedjma_and_mobilis_desc: "Encouraging healthy competition between telecom operators such as Nedjma and Mobilis will lower prices and improve service quality."

 ALG_fiber_optic_program: "Fiber Optic Infrastructure"
 ALG_fiber_optic_program_desc: "Invest in nationwide fiber optic deployment to increase connectivity and network speed across the country."

 ALG_4g_rollout: "Roll Out 4G Services"
 ALG_4g_rollout_desc: "Launching 4G mobile internet will transform connectivity, enabling better e-services and digital productivity."

 ALG_air_algerie_modernization: "Air Algérie Modernization"
 ALG_air_algerie_modernization_desc: "Strengthening Air Algérie's fleet and routes will boost tourism and improve international logistics."

 ALG_international_airports_upgrade: "Upgrade Major Airports"
 ALG_international_airports_upgrade_desc: "Invest in airports like Algiers, Oran, and Constantine to become hubs of regional and global air traffic."

 ALG_aadl_housing_projects: "AADL Housing Programs"
 ALG_aadl_housing_projects_desc: "The AADL projects will provide subsidized housing and urban development for the growing urban population."

 ALG_urbanization_initiatives: "Urban Development Initiatives"
 ALG_urbanization_initiatives_desc: "Expanding roads, utilities, and building zones will support our growing cities and improve quality of life."

# Ideas Localization
 ALG_arpt_regulation: "ARPT Regulation Authority"
 ALG_arpt_regulation_desc: "The ARPT ensures fair market practices, competition, and consumer protection in the telecom sector."

 ALG_algerie_telecom_program: "Algerie Telecom Program"
 ALG_algerie_telecom_program_desc: "A comprehensive modernization plan for the state telecom operator."

 ALG_mobile_operator_competition: "Telecom Competition Reform"
 ALG_mobile_operator_competition_desc: "Market competitiveness between Nedjma and Mobilis has encouraged innovation and affordable pricing."

 ALG_fiber_investment: "Fiber Optic Rollout"
 ALG_fiber_investment_desc: "Expanding fiber networks will provide high-speed access across key cities and industrial zones."

 ALG_4g_coverage: "4G National Coverage"
 ALG_4g_coverage_desc: "Advanced mobile broadband enhances communication and supports a digital economy."

 ALG_national_innovation_push: "National Innovation Push"
 ALG_national_innovation_push_desc: "A government-backed initiative to promote innovation and technological development across all sectors."

 ALG_highway_project: "East–West Highway Project"
 ALG_highway_project_desc: "A $13 billion project connecting the East and West will modernize transportation and reduce travel time."

 ALG_air_algerie_investment: "Air Algérie Investment"
 ALG_air_algerie_investment_desc: "Expanding Algeria's national airline opens new trade and travel opportunities."

 ALG_air_hub_status: "Algiers Regional Air Hub"
 ALG_air_hub_status_desc: "Algiers has the potential to become a central hub between Africa, Europe, and the Middle East."

 ALG_aadl_program: "AADL Housing Initiative"
 ALG_aadl_program_desc: "The AADL aims to build affordable housing for thousands of families across Algeria."
 ALG_berber_autonomy_idea: "Berber Autonomy Initiative"
 ALG_berber_autonomy_idea_desc: "Through negotiation and dialogue, we've acknowledged Berber identity and granted limited self-governance in the Kabylie region."

 ALG_federal_charter_idea: "Federal Charter"
 ALG_federal_charter_idea_desc: "A new federal framework offers cultural and administrative autonomy to Algeria's diverse regions, easing ethnic tensions while maintaining unity."

 ALG_strict_centralization_idea: "Strict Centralization"
 ALG_strict_centralization_idea_desc: "Regionalism must not be allowed to divide Algeria. Power has been consolidated in Algiers to ensure national integrity."
 ALG_kabylia_unrest: "Kabylia Unrest"
 ALG_kabylia_unrest_desc: "Since the 'Berber Spring' of 1980, Kabylia has been marked by periodic protests, cultural demands, and mistrust toward the central government. These tensions simmer beneath the surface, undermining stability and threatening to erupt into wider unrest if not addressed. If unresolved, events could escalate dramatically in the future."

 ALG_black_spring.1.t: "Unrest in Kabylia"
 ALG_black_spring.1.d: "Following the killing of Massinissa Guermah by gendarmerie forces, mass protests have broken out in Kabylia. The unrest is growing by the day."
 ALG_black_spring.1.a: "This must be addressed."
 ALG_black_decade: "Black Decade"
 ALG_black_decade_desc: "The Algerian Civil War, known in Algeria as the Black Decade, was a civil war fought between the Algerian government and various Islamist rebel groups from 11 January 1992 (following a coup negating an Islamist electoral victory) to 8 February 2002. The war began slowly, as it initially appeared the government had successfully crushed the Islamist movement, but armed groups emerged to declare jihad and by 1994, violence had reached such a level that it appeared the government might not be able to withstand it.[18] By 1996–97, it had become clear that the Islamist resistance had lost its popular support, although fighting continued for several years after."
 algeria.157.t: "Algerian Arms Deal"
 algeria.157.d: "The Algerian military wants to buy our MIG29, shall we sell it to them?"
 algeria.157.a: "Give Them Weapons!"
 algeria.157.b: "No"
 algeria.158.t: "Russia Accepts"
 algeria.158.d: "They will sell us MIG29 Jets"
 algeria.158.a: "Great"
 algeria.159.t: "Russia denies"
 algeria.159.d: "They will not sell us MIG29 Jets"
 algeria.159.a: "Damn"
 ALG_mig29_TT: "We will send a request to §Y[SOV.GetNamewithFlag]§! for the purchase of §Y20 units of MIG29§! for $10 Billion"
 algeria_events.38.t: "[ALG.GetFlag] Algeria Wants to Buy SU-27 Air Planes"
 algeria_events.38.d: "[ALG.GetFlag] As a regional power, safeguarding our vast borders and projecting influence across the Maghreb and Sahel is paramount. Our military high command has identified the legendary Su-27 'Flanker' from Russia as the ideal platform to significantly enhance our air superiority. This acquisition would not only boost our fleet's strength and standardize logistics, but also provide a decisive, immediate advantage, though it will undoubtedly draw significant international attention."
 algeria_events.38.a: "Seal the Deal! Acquire the Flankers"
 algeria_events.38.b: "Cancel the Request: It's Too Risky"

 algeria_events.39.t: "[SOV.GetFlag] Kremlin Approves Flanker Sale to Algiers"
 algeria_events.39.d: "After careful consideration, the Kremlin [SOV.GetFlag] has formally approved Algeria's request for a substantial number of Su-27 'Flanker' fighters. This deal is more than just an arms sale; it represents a deepening of strategic ties, a significant boost to our defense industry's exports, and a crucial expansion of our influence in North Africa, a region increasingly vital to our geopolitical interests."
 algeria_events.39.a: "Excellent: A Strategic Partnership Deepens"

 algeria_events.40.t: "[SOV.GetFlag] Kremlin Declines Algerian Flanker Request"
 algeria_events.40.d: "Despite Algeria's long-standing relationship and interest, Moscow has regrettably informed Algiers that it cannot fulfill the request for additional Su-27 'Flanker' fighters. Current geopolitical realities, coupled with heightened domestic demand for military hardware and strained production capacities, mean that our own armed forces must take priority. While we value our strategic partnership with Algeria, our national security concerns and industrial limitations prevent us from diverting these vital assets for export at this time."
 algeria_events.40.a: "Deep Disappointment: Re-evaluate our Defense Strategy."
 ALG_event_40_TT: "Weapon Deal"
 # Maghreb Events
 ALG_maghreb_invite.1.t: "Invitation to the Maghreb Union"
 ALG_maghreb_invite.1.d: "Algeria proposes a North African economic and military alliance. Will we join?"
 ALG_maghreb_invite.1.a: "Join the Union"
 ALG_maghreb_invite.1.b: "Refuse (Morocco Only)"
 ALG_maghreb_trade_hub: "Maghreb Trade Hub"
 ALG_maghreb_trade_hub_desc: "Our economy thrives as the center of North African commerce."
 # Sahel Event
 ALG_sahel_aid.1.t: "Algerian Aid to the Sahel"
 ALG_sahel_aid.1.d: "Our stabilization force in Mali can either win hearts with development projects or crush militants with brute force. Which path will we take?"
 ALG_sahel_aid.1.a: "Deploy Engineers and Doctors"
 ALG_sahel_aid.1.b: "Focus on Counterterrorism Only"

# Idea Loc
 ALG_sahel_intervention: "Sahel Intervention"
 ALG_sahel_intervention_desc: "Our troops are deployed across the Sahara, fighting insurgents and securing resources."

 ALG_sahel_hearts_and_minds: "Hearts and Minds"
 ALG_sahel_hearts_and_minds_desc: "Humanitarian aid improves Algeria's reputation."
 ALG_maghreb_diplomacy: "Maghreb Diplomacy"
 ALG_maghreb_diplomacy_desc: "Algeria is asserting itself as the leader of North Africa, fostering unity through trade and shared security."
 ALG_maghreb_union_tt: "Maghreb Union Formed\nAlgeria, Tunisia,and other North African nations now share economic and military ties under our leadership."
 ALG_trade_allies: "Trade Allies"
 ALG_egypt_algiers_axis: "Egypt-Algiers Axis"
 ALG_egypt_algiers_axis_desc: "Our Relations goes way back with Egypt We Must Continue to Strengthen our Position in Africa and Lead this Continent."
 FIS_Are_Terrorists: "FIS are Terrorists"
 ALG_un_peacekeepers: "United Nations Peacekeepers Deployed"
 ALG_un_peacekeepers_desc: "The United Nations has dispatched peacekeeping forces to stabilize the region and prevent further conflict. Their mission is to maintain order, protect civilians, and support diplomatic efforts towards lasting peace."
 ALG_civil_war_recovered: "Civil War Overcome"
 ALG_civil_war_recovered_desc: "The nation has emerged from the turmoil of civil war, beginning the long process of healing and reconstruction. Efforts are focused on restoring unity, rebuilding infrastructure, and preventing future internal conflict."
 ALG_sonatrach_restructure: "Sonatrach Restructuring"
 ALG_sonatrach_restructure_desc: "The national oil company Sonatrach is undergoing a major restructuring to improve efficiency, increase production, and strengthen economic stability. This transformation aims to boost the country's energy sector and support long-term growth"
 ALG_investment_boom_modifier: "Investment Boom"
 ALG_investment_boom_modifier_desc: "The country is experiencing a surge in domestic and foreign investments, fueling rapid economic growth and development. This boom enhances industrial capacity, infrastructure, and overall prosperity."
 ALG_foreign_oil_licensing_bonus: "Foreign Oil Licensing"
 ALG_foreign_oil_licensing_bonus_desc: "Grants temporary access to foreign oil fields, increasing your oil production capacity."
 ALG_rural_cooperative_initiative: "Rural Cooperative Initiative"
 ALG_rural_cooperative_initiative_desc: "Promotes rural development and agricultural output through cooperative ventures. Increases agricultural production."
 ALG_idea_pro_palestinian_campaign: "Pro Palestinian Campaign"
 ALG_idea_pro_palestinian_campaign_desc: "Increases relations with Palestinian groups and potentially boosts support for Algerian independence movements in the region."
 ALG_charter_peace_modifier: "Algerian Charter for Peace"
 ALG_charter_peace_modifier_desc: "A comprehensive peace agreement signed in 1995 aimed at ending the Algerian Civil War.  The charter outlined a framework for reconciliation, amnesty, and political reforms to address the root causes of the conflict and create a lasting peace."
 ALG_urban_development_bonus: "Urbanization Drive"
 ALG_urban_development_bonus_desc: "This initiative prioritizes rapid development and expansion of urban areas in Algeria.  It aims to create economic hubs and improve living conditions for citizens through focused investment in infrastructure, housing, and industry."
 ALG_idea_palestinian_backing: "Algeria's Backing of Palestinian Rights"
 ALG_idea_palestinian_backing_desc: " Analysis of Algeria's historical and ongoing support for Palestinian rights, including diplomatic stances, aid initiatives, and broader political engagement."
 ALG_idea_palestinian_aid_fund: "Algerian Palestinian Aid Fund"
 ALG_idea_palestinian_aid_fund_desc: "A fund established by Algeria to provide humanitarian and development aid to the Palestinian people.  This could include emergency relief, infrastructure development, education, and economic empowerment initiatives."
 ALG_neutrality_idea: "Algerian Neutrality Policy"
 ALG_neutrality_idea_desc: "A proposed policy for Algeria to maintain a neutral stance in international conflicts and disputes, avoiding involvement in military actions or taking sides in geopolitical rivalries.  This could involve a commitment to diplomatic solutions and non-interference in the affairs of other nations."
 ALG_intervention_isolation: "Algerian Interventionist Isolationism"
 ALG_intervention_isolation_desc: "A proposed policy for Algeria that prioritizes national interests and security while avoiding direct military intervention in foreign conflicts.  However, it could involve selective support for specific allies or regions where Algerian interests are directly threatened, even if it means isolating Algeria from certain international partnerships."
 ALG_hardliner_controlled_state: "A Hardline State Under Tight Control"
 ALG_hardliner_controlled_state_desc: "A policy scenario in which Algeria's government adopts a highly authoritarian stance, suppressing dissent and limiting freedoms.  This could involve a strong emphasis on national unity, often through the use of propaganda, strict social controls, and potentially violent crackdowns on opposition groups.  Economic policies might prioritize national self-sufficiency and favor a close relationship with select allies, potentially at the expense of economic diversification and openness."
 ALG_surveillance_state: "A Surveillance State"
 ALG_surveillance_state_desc: "Algeria increasingly utilizes sophisticated surveillance technologies and methods to monitor its citizens' activities, both online and offline.  This could involve widespread use of facial recognition, data collection from various sources, and perhaps even the infiltration of civil society groups.  The potential for repression and abuse of power is significant, with citizens facing potential restrictions on their freedom of expression and assembly."
 ALG_reform_government: "Government Reform Efforts"
 ALG_reform_government_desc: "This describes ongoing or proposed efforts within the Algerian government to reform various aspects of its governance.  This could include initiatives related to economic diversification, political liberalization, judicial independence, or anti-corruption measures.  The description should specify the nature of the reforms, their perceived success or challenges, and the broader context in which they are taking place."
 ALG_amnesty_reform: "Government Reform Efforts"
 ALG_amnesty_reform_desc: "This describes ongoing or proposed efforts within the Algerian government to reform various aspects of its governance.  This could include initiatives related to economic diversification, political liberalization, judicial independence, or anti-corruption measures.  The description should specify the nature of the reforms, their perceived success or challenges, and the broader context in which they are taking place."
 ALG_crackdown_backfired: "Crackdown Backfired"
 ALG_primary_education_reform: "Primary Education Reform"
 ALG_idea_refoming_education1: "Reform Education"
 ALG_idea_refoming_education: "Reform Education"
 ALG_university_expansion: "University Expansion"
 ALG_health_insurance_idea: "Healing Insurance"
 ALG_health_insurance_idea1: "Healing Insurance"
 ALG_basic_income_support: "Basic Income Support"
 ALG_housing_support_idea: "Housing Support"
 ALG_childcare_reform: "Childcare Reform"
 ALG_civil_rights: "Grant Civil Rights"
 ALG_public_admin_reform: "Free Public Transportation"
 MSP_switch_to_morocco: "Abandon Sahrawi"
 MSP_switch_to_morocco_desc: "Supporting Sahrawi has soured our relations with Morocco. Morocco is a rising economical power, a powerful nation right next to us. It would make most sense to drop our senseless support for Sahrawi and build friendly terms with Morocco instead."
 MSP_influence_mauritania: "Influence Mauritania"
 MSP_influence_mauritania_desc: "Mauritania waged a short war against Morocco for Western Sahara after Spain pulled out of the region. They no longer claim the territory, but they have followed the Western Sahara conflict intensely and are one of the supporters of the Polisario Front. It is important to increase our control of them to solve the Western Sahara conflict."
 MSP_casablanca_accords: "Casablanca Accords"
 MSP_casablanca_accords_desc: "The conflict in Western Sahara has been in a frozen state for decades with no one being able to solve it. We need to use our influence in the region to solve the conflict."
 MSP_casablanca_accords_tt: "The Mission will be active for §Y365 days§!. While the mission is active, we will have to convince other participants (§Y[LBA.GetNameWithFlag], [MOR.GetNameWithFlag], [SHA.GetNameWithFlag] and [MAU.GetNameWithFlag]§!) of our chosen solution. The main way to make countries agree to our solution is §YInfluence§!\n\n"


 ALG_influence_mauritania: "Influence Mauritania"
 ALG_influence_mauritania_desc: "Mauritania waged a short war against Morocco for Western Sahara after Spain pulled out of the region. They no longer claim the territory, but they have followed the Western Sahara conflict intensely and are one of the supporters of the Polisario Front. It is important to increase our control of them to solve the Western Sahara conflict."
 ALG_energy_reform: "Energy Reform"
 ALG_energy_reform_desc: "We need to fix our Energy Issue , By reforming the energy industry we can distribute energy for the whole country."
 ALG_focus_on_oil: "Focus on oil"
 ALG_focus_on_oil_desc: "There are many untapped oil veins all across Algeria, and according to some studies Algeria might be one of the oil richest countries in the world, most of that oil is just untapped. As such, we should be focusing on oil"
 ALG_focus_on_oil_tt: "§CFocusing on oil will allow us to make more profit in selling energy to our neighbours but it will be disastrous to the Hassi Messaoud!§!"
 ALG_focus_on_renewables: "Focus on Renewables"
 ALG_focus_on_renewables_desc: "Algeria is a country where no village is too small for the sun. We need to show an example to the rest of the world and build a sustainable energy network. It will be expensive, but it will be worth it for the future generations"
 ALG_focus_on_renewables_tt: "§CFocusing on renewable energy will not make as much profit as using oil but it will be better for the Hassi Messaoud!§!"
 ALG_oil_production: "Work with Sonatrach"
 ALG_oil_production_desc: "The main Algerian oil and gas company is Sonatrach, a state-owned entity. It's a major player in the global energy market and actively seeks investment and partnerships in the oil and gas sector. Sonatrach is involved in all aspects of the hydrocarbon value chain, from exploration and production to refining and distribution."
 ALG_grid_expansion: "Grid Expansion"
 ALG_grid_expansion_desc: "It's nice that we can produce our own electricity, but we also need a robust electric grid to move the electricity around the country and to our neighbours"
 ALG_solar_panel_grid: "Solar Panel Grid"
 ALG_solar_panel_grid_desc: "Considering our geographical position, sun is almost always in abundance in Algeria. This makes it an amazing location for setting up solar power plants"
 ALG_hassi_massoud_exploitation: "Hassi Messaoud Exploitation"
 ALG_resource_excavation_research: "Excavation Research"
 ALG_resource_excavation_research_desc: "Some of the Oil is in hard to reach places. We need to work together with BIUST to find ways to excavate every piece of Oil possible"
 ALG_wind_turbine_research: "Wind Turbine Research"
 ALG_wind_turbine_research_desc: "With the current technology, setting up wind parks in Algeria is impossible. The wind conditions simply aren't suitable for contemporary turbines. We need to invest into researching solutions for this problem"
 ALG_ethanol_power_plant: "Ethanol Power Plant"
 ALG_ethanol_power_plant_desc: "Using ethanol derived from cow manure, we can create a sustainable way of generating electricity"
 ALG_algeria_steelworks: "Algeria Steelworks"
 ALG_algeria_steelworks_desc: "We need to dig more Oil! With all the extra Oil, we can also setup a steel factory"
 ALG_Adrar_wind_park: "Adrar Wind Park"
 ALG_Adrar_wind_park_desc: "The Adrar wind Farm is a natural Farm in the Southern part of Algeria. The terrain near the Farm is suitable for setting up wind Farms, and that is where we will set up Algeria's first wind Farm"
 ALG_algeria_fiber_cable_tt: "Algeria Fiber Cable through all Cities"
 ALG_national_space_program: "National Space Program"
 ALG_national_space_program_desc: "Algeria must establish a national space program to join the ranks of spacefaring nations. This initiative will lay the groundwork for future achievements in space exploration and satellite technology."
 ALG_arab_world_outreach: "Deepen Arab Diplomatic Ties"
 ALG_arab_world_outreach_desc: "To strengthen Algeria's influence in the Arab world, we must revitalize our diplomatic outreach and coordination efforts. Through bilateral visits, summits, and trade initiatives, Algeria can assert itself as a unifying force in the region."

 ALG_join_arab_league: "Strengthen Arab League Engagement"
 ALG_join_arab_league_desc: "As an existing member of the Arab League, Algeria can go beyond participation and take on a leading diplomatic role. Promoting economic coordination, defense consultations, and cultural solidarity will enhance our standing in the Arab world."

 ALG_support_palestine: "Support the Palestinian Cause"
 ALG_support_palestine_desc: "Algeria's longstanding relationship with Palestine is rooted in shared historical experiences and political solidarity.  This connection manifests in various forms, including diplomatic support for Palestinian self-determination and humanitarian aid.  Algeria's commitment to the Palestinian cause is a key aspect of its foreign policy."

 ALG_algeria_algiers_axis: "Forge the Egypt-Algiers Axis"
 ALG_algeria_algiers_axis_desc: "By aligning more closely with Egypt, Algeria can help form a powerful regional bloc capable of guiding Arab unity, securing North African stability, and counterbalancing foreign influence."

 ALG_condemn_israel: "Condemn Israeli Actions"
 ALG_condemn_israel_desc: "In light of continued aggression and human rights violations, Algeria will formally condemn Israeli actions on the international stage, rallying support for a just peace and opposing normalization without resolution."

 ALG_palestinian_aid_package: "Palestinian Aid Package"
 ALG_palestinian_aid_package_desc: "We will allocate resources to provide humanitarian, economic, and technical assistance to the Palestinian territories, ensuring Algeria's commitment extends beyond words to real, impactful aid."

 ALG_pan_african_defense_initiative: "Pan-African Defense Initiative"
 ALG_pan_african_defense_initiative_desc: "To protect African sovereignty and enhance continental stability, Algeria will propose a coordinated African defense initiative that builds collective military readiness against shared threats."

 ALG_send_troops_to_sahel: "Deploy Forces to the Sahel"
 ALG_send_troops_to_sahel_desc: "In response to growing instability in the Sahel, Algeria will send troops to support peacekeeping operations, border protection, and anti-terror campaigns in collaboration with regional governments."

 ALG_sahel_stabilization_force: "Sahel Stabilization Force"
 ALG_sahel_stabilization_force_desc: "Algeria will take the lead in establishing a permanent Sahel Stabilization Force—an African-led security framework to counter insurgencies and criminal networks in the region."

 ALG_exploit_sahel_resources: "Exploit Sahel Resources"
 ALG_exploit_sahel_resources_desc: "Algerian influence in the Sahel offers access to untapped natural resources. By negotiating mining and infrastructure contracts, we can secure economic gains and strategic partnerships in the region."

 ALG_propose_maghreb_union: "Propose the Maghreb Union"
 ALG_propose_maghreb_union_desc: "It is time to revive the vision of a united Maghreb. Algeria will take the initiative to propose renewed integration efforts, focusing on economic cooperation, joint infrastructure, and diplomatic alignment."

 ALG_economic_integration_initiative: "Maghreb Economic Integration"
 ALG_economic_integration_initiative_desc: "Through reduced tariffs, infrastructure investment, and synchronized monetary policy discussions, Algeria will drive efforts to create a common Maghreb economic zone that benefits all member states."

 ALG_maghreb_joint_defense_pact: "Maghreb Joint Defense Pact"
 ALG_maghreb_joint_defense_pact_desc: "A secure Maghreb requires collective defense. We will propose a regional military pact focused on border protection, intelligence sharing, and joint military exercises."
 ALG_idea_joint_military_arab: "Arab Joint Military"
 palestine_issue_very_positive: "Support the Palestinian Issue"
 ALG_algerian_airforce: "Modernize the Algerian Air Force"
 ALG_algerian_airforce_desc: "A modern and capable air force is essential to national defense. We will invest in restructuring, pilot training, and equipment procurement to enhance aerial readiness."

 ALG_buy_russia_su_27: "Procure Russian SU-27s"
 ALG_buy_russia_su_27_desc: "As part of our air force modernization, we will negotiate with Russia to purchase a batch of SU-27 fighters, bolstering our air superiority and strategic deterrence."

 ALG_oum_el_bouaghi_airbase: "Expand Oum El Bouaghi Airbase"
 ALG_oum_el_bouaghi_airbase_desc: "Strategically located in the east, Oum El Bouaghi will be expanded into a major operational hub for Algeria's air force, enhancing our rapid deployment capabilities."

 ALG_protect_the_skies: "Protect the Skies"
 ALG_protect_the_skies_desc: "With regional air threats on the rise, Algeria must ensure it can detect and intercept any incursions. Strengthening our air defenses is a national security priority."

 ALG_russia_mig_servicing: "Russian MiG Servicing Contracts"
 ALG_russia_mig_servicing_desc: "Maintaining and upgrading our MiG fleet requires deeper cooperation with Russian contractors. These servicing agreements will ensure operational longevity for existing aircraft."

 ALG_bosnian_parts: "Secure Bosnian Spare Parts"
 ALG_bosnian_parts_desc: "Algeria will secure surplus components from Bosnia's defense industry to support and retrofit our aging airframes, ensuring cost-effective maintenance and repair."

 ALG_comprehensive_radar_installations: "Radar Coverage Expansion"
 ALG_comprehensive_radar_installations_desc: "To achieve full national radar coverage, we will build advanced radar installations across Algeria's borders and coasts, closing all blind spots in our airspace."

 ALG_chahid_el_taib_djabar_academy: "Expand Chahid El Taib Djabar Academy"
 ALG_chahid_el_taib_djabar_academy_desc: "This premier air force academy will receive expanded funding and modern training infrastructure to prepare a new generation of Algerian pilots and engineers."
### ⚖️ **Civil War Custom Branch**
 ALG_reform_or_control: "Reform or Control"
 ALG_reform_or_control_desc: "Algeria stands at a political crossroads. The choice between true democratic reform or consolidating authoritarian control will define the nation's future."

 ALG_national_reconciliation_path: "Pursue National Reconciliation"
 ALG_national_reconciliation_path_desc: "To heal the wounds of civil war, we must reach out to former opponents, demilitarize politics, and seek an inclusive national dialogue that ensures long-term stability."

 ALG_military_consolidation: "Consolidate Military Control"
 ALG_military_consolidation_desc: "In times of uncertainty, the armed forces must maintain order. Expanding the military's role in governance will secure the regime against insurgent threats."

 ALG_legalize_moderate_islamists: "Legalize Moderate Islamists"
 ALG_legalize_moderate_islamists_desc: "Recognizing moderate Islamist parties offers a path to stability through inclusion. Carefully monitored participation in elections can defuse radical sentiments."

 ALG_restore_elections: "Restore Electoral Processes"
 ALG_restore_elections_desc: "To re-legitimize the state, Algeria must resume free and fair elections. Transparency and accountability will be the pillars of our new political era."

 ALG_public_media_and_transparency: "Empower Public Media and Transparency"
 ALG_public_media_and_transparency_desc: "State media reform and press freedom are vital to rebuilding public trust. An informed citizenry is essential for democratic development."

 ALG_crackdown_on_opposition: "Crack Down on Opposition"
 ALG_crackdown_on_opposition_desc: "To prevent destabilization, dissent must be contained. Surveillance, censorship, and targeted arrests will neutralize anti-government elements."

 ALG_state_surveillance_network: "State Surveillance Network"
 ALG_state_surveillance_network_desc: "A national intelligence network will be expanded to monitor political activities, ensuring threats are neutralized before they can escalate."

 ALG_amnesty_and_integration: "Amnesty and Integration Program"
 ALG_amnesty_and_integration_desc: "Former militants and dissidents will be offered amnesty in exchange for disarmament and reintegration into civilian life—bridging the gap between peace and justice."

 ALG_joint_governance_experiment: "Joint Governance Experiment"
 ALG_joint_governance_experiment_desc: "We will test a new form of power-sharing between secular and religious forces to prevent renewed conflict. This risky experiment could bring either peace or paralysis."
 ALG_a_radical_reorientation: "A Radical Reorientation"
 ALG_a_radical_reorientation_desc: "The existing order has failed. Through divine mandate and ideological clarity, a new path emerges—one guided by uncompromising belief and rejection of the secular state's legitimacy."

 ALG_covert_support_for_islamist_radicals: "Covert Support for Islamist Radicals"
 ALG_covert_support_for_islamist_radicals_desc: "Radical networks remain active in the shadows. With strategic funding and covert logistical assistance, we can empower these groups to act against the regime from within."

 ALG_tolerate_radical_preachers: "Tolerate Radical Preachers"
 ALG_tolerate_radical_preachers_desc: "The pulpit is a powerful tool. By turning a blind eye to firebrand sermons, we allow ideology to spread organically through mosques and media, radicalizing the population in our favor."

 ALG_welcome_militants: "Welcome Foreign Militants"
 ALG_welcome_militants_desc: "Our cause transcends borders. Foreign fighters aligned with our ideology can be safely harbored and integrated into local cells, bringing combat experience and unwavering dedication."

 ALG_arms_smuggling: "Arms Smuggling Operations"
 ALG_arms_smuggling_desc: "To prepare for a future confrontation, we must establish underground supply chains for weapons and munitions. Alliances with transnational arms dealers will serve our needs."

 ALG_start_the_uprising: "Start the Uprising"
 ALG_start_the_uprising_desc: "Now is the time. With our networks activated, our fighters armed, and our ideology spreading, we will rise against the regime and declare a new Islamic order."

 ALG_clamp_down_on_vices: "Clamp Down on Vices"
 ALG_clamp_down_on_vices_desc: "Gambling, alcohol, and moral decay have no place in our society. A sweeping campaign to eliminate these vices will cleanse the nation and assert religious authority."

 ALG_revolutionize_the_ulema: "Revolutionize the Ulema"
 ALG_revolutionize_the_ulema_desc: "The religious establishment must align itself with the revolutionary cause. Traditional ulema will be purged or re-educated, while loyal clerics take their place as spiritual leaders of the state."

 ALG_traditional_gender_roles: "Reinforce Traditional Gender Roles"
 ALG_traditional_gender_roles_desc: "The modern era has corrupted the natural order. We will return to the divinely ordained roles of men and women, instituting a strict legal framework that reflects these values."

 ALG_pledge_allegiance_to_al_qaeda: "Pledge Allegiance to al-Qaeda"
 ALG_pledge_allegiance_to_al_qaeda_desc: "For global jihad to succeed, unity is essential. We will swear loyalty to al-Qaeda, aligning ourselves with their vision and gaining support from a broader Islamist network."
 ALG_pledge_allegiance_to_daesh: "Pledge Allegiance to Islamic State"
 ALG_pledge_allegiance_to_daesh_desc: "Al-Qaeda is a decrepit, decaying movement that has lost sight of its original goal to wage global jihad, instead getting bogged down in affairs at the local level. It is time for a new movement with a new sense of purpose to take its place."
 ALG_secure_the_loyalty_of_aqim: "Secure the Loyalty of AQIM"
 ALG_secure_the_loyalty_of_aqim_desc: "Al-Qaeda in the Islamic Maghreb must recognize our leadership and operate in coordination with our state. Their loyalty will ensure lasting control over regional jihadist operations."
 ALG_war_on_daesh: "War on Daesh"
 ALG_secure_the_loyalty_effect_tt: "Effects will depends on having any of the next countries as puppets: [AQY.GetNameWithFlag], [NUS.GetNameWithFlag], [TTP.GetNameWithFlag]"
 ALG_war_on_daesh_desc: "The so-called \"Islamic State\" is a clear threat to our leadership of the global jihadist movement. Their rejection of our authority and their unconventional tactics can be tolerated no longer. It is time for us to wage all out war against the upstart Daesh."
 ALG_jihad_in_the_maghreb: "Jihad in the Maghreb"
 ALG_jihad_in_the_maghreb_desc: "The secular regimes of Morocco, Tunisia, and Algeria must fall. We will expand our Caliphate by force, beginning a regional campaign of religious warfare and territorial expansion."
 ALG_jihad_in_arabia: "Jihad in Arabia"
 ALG_jihad_in_arabia_desc: "As the home of the holy sites of Mecca and Medina, the Arabian peninsula is perhaps the most religiously significant territory in the world. It therefore cannot be allowed to continue to be governed by insufficiently pious, corrupt governments."
 ALG_jihad_in_the_levant: "Jihad in Iraq and al-Sham"
 ALG_jihad_in_the_levant_desc: "Iraq and the Levant are regions that have been torn apart by foreign forces since the colonial era. It is only through force of arms that the Crusader and Zionist occupiers in the Levant can be expelled."
 ALG_jihad_in_west_africa: "Jihad in West Africa"
 ALG_jihad_in_west_africa_desc: "Our revolution does not stop at the Maghreb. The time has come to export jihad into West Africa, toppling regimes in Mali, Niger, and Mauritania as we march southward."
 AlgeriaFocus.56.t: "[FROM.GetNameDef] Supports Our Independence"
 AlgeriaFocus.56.d: "[FROM.GetNameDef] has affirmed their support for our independence from Morocco and have signalled they want to work even more closely with us in the future."
 AlgeriaFocus.56.a: "Great"
 AlgeriaFocus.57.t: "[FROM.GetNameDef] Abandons Us"
 AlgeriaFocus.57.d: "[FROM.GetNameDef] has pulled back their support for our independence. They have been our supporter for decades but it seems they have now abandoned us in order to get on better terms with Morocco."
 AlgeriaFocus.57.a: "Traitors!"
 AlgeriaFocus.58.t: "[FROM.GetNameDef] Holds Peace Conference"
 AlgeriaFocus.58.d: "[FROM.GetAdjective] has organised a peace conference, calling it the Casablanca Accords. Their goal is to create a lasting peace solution to the existing conflict in Western Sahara. We have been asked to send a delegation to their conference."
 AlgeriaFocus.58.a: "Send a delegation"
 algeria_algerian_foreign_policy: "Algerian Foreign Policy"
 AlgeriaFocus.59.t: "Choosing A Peace Plan"
 AlgeriaFocus.59.d: "We need to draft a solution for the conflict in Western Sahara. In essence, there are four valid options:\n\n1. Annexation of Western Sahara by Morocco\n2. Limited Autonomy for Western Sahara\n3. Full independence for Sahrawi\n4. Joining the area with Mauritania."
 AlgeriaFocus.59.a: "Western Sahara should be part of Morocco"
 algeria_western_sahara_peace_plan_annexation_tt: "§YThis option is favoured by [MOR.GetNameWithFlag], but others will most likely oppose it§!"
 AlgeriaFocus.59.b: "Western Sahara should have limited autonomy"
 algeria_western_sahara_peace_plan_autonomy_tt: "§YThis is a compromise solution for which all parties could be influenced to accept§!"
 AlgeriaFocus.59.c: "Western Sahara should be independent"
 algeria_western_sahara_peace_plan_independence_tt: "§YThis option is favoured by [SHA.GetNameWithFlag] and [ALG.GetNameWithFlag], but [MOR.GetNameWithFlag] will most likely oppose it§!"
 AlgeriaFocus.59.de: "Join Western Sahara with Mauritania"
 algeria_western_sahara_peace_plan_mauritania_tt: "§YThis option will most likely be opposed by all except a nationalist [MAU.GetNameWithFLag]§!"
 AlgeriaFocus.60.t: "[FROM.GetNameDef] Requests Our Support For Their Peace Plan"
 AlgeriaFocus.60.da: "[FROM.GetName] is asking our support for their peace plan for Western Sahara. Their plan is for the whole region to be annexed into Morocco. Can we support this?"
 AlgeriaFocus.60.db: "[FROM.GetName] is asking our support for their peace plan for Western Sahara. Their plan is for Western Sahara to be an autonomous part of Morocco. Can we support this?"
 AlgeriaFocus.60.dc: "[FROM.GetName] is asking our support for their peace plan for Western Sahara. Their plan is for Western Sahara to become independent of Morocco. Can we support this?"
 AlgeriaFocus.60.dd: "[FROM.GetName] is asking our support for their peace plan for Western Sahara. Their plan is for Western Sahara to be annexed into Mauritania. Can we support this?"
 AlgeriaFocus.60.a: "We can accept this plan"
 AlgeriaFocus.60.b: "This is not acceptable to us"
 AlgeriaFocus.60.c: "This conference is pointless, withdraw our delegation"
 AlgeriaFocus.590.t: "Palestinian Proxies from Jordan"
 AlgeriaFocus.590.d: "It seems that the government of [FROM.GetName] has armed some Palestinian refugees residing in Jordan and set them loose in Israel. Their clear intention is to use these Palestinians as proxies for causing trouble in Israel."
 AlgeriaFocus.590.a: "Ridiculous"
 AlgeriaFocus.600.t: "Palestinian Proxies Conduct a Raid"
 AlgeriaFocus.600.d: "Several Palestinian proxy militia units have crossed the border from Jordan to Israel to raid border towns. These militias are clearly backed by [FROM.GetName], and this is an open declaration of war. We need to strike back and show [FROM.GetName] that we are not to be pushed around."
 AlgeriaFocus.600.a: "Strike Back!"
 AlgeriaFocus.610.t: "Israel Attacks Algeria"
 AlgeriaFocus.610.d: "Israel has attacked Algeria in response to Palestinian proxies based in Jordan. We now have a chance to reclaim Palestine if we agree to submit to Algeria."
 AlgeriaFocus.610.a: "A worthy sacrifice"
 AlgeriaFocus.610.b: "We will not rely on them"
 AlgeriaFocus.620.t: "[FROM.GetName] Offers Submission"
 AlgeriaFocus.620.d: "[FROM.GetName] is offering to become our subject if we help them reclaim Palestine"
 AlgeriaFocus.620.a: "Of Course"
 AlgeriaFocus.620.b: "We don't need them"
 AlgeriaFocus.61.t: "[FROM.GetNameDef] Accepts Peace Plan"
 AlgeriaFocus.61.d: "[FROM.GetNameDef] has accepted our solution for the Western Sahara conflict."
 AlgeriaFocus.61.a: "Great"
 AlgeriaFocus.62.t: "[FROM.GetNameDef] Rejects Peace Plan"
 AlgeriaFocus.62.d: "[FROM.GetNameDef] has rejected our solution for the Western Sahara conflict."
 AlgeriaFocus.62.a: "Damn"
 AlgeriaFocus.63.t: "[FROM.GetNameDef] Leaves Peace Conference"
 AlgeriaFocus.63.d: "The [FROM.GetAdjective] delegation has announced it will be leaving the Casablanca Accords. They have stated that our demands for peace are ridiculous, and they no longer have an interest to take part."
 AlgeriaFocus.63.a: "Damn"
 AlgeriaFocus.64.t: "[FROM.GetNameDef] Demands Cretan Autonomy"
 AlgeriaFocus.64.d: "The [FROM.GetAdjective] government has stated that they are worried about our position on the island of Crete. According to them, our tight hold on the island compromises their security. They are demanding that Crete is given limited autonomy to ensure our reduced military and political presence in the area."
 AlgeriaFocus.64.a: "I guess we can"
 AlgeriaFocus.64.b: "That's ridiculous"
 AlgeriaFocus.65.t: "[FROM.GetNameDef] Accepts"
 AlgeriaFocus.65.d: "The [FROM.GetAdjective] government has accepted our demands to increase autonomy for the Cretan people."
 AlgeriaFocus.65.a: "Success"
 AlgeriaFocus.66.t: "[FROM.GetNameDef] Rejects"
 AlgeriaFocus.66.d: "The [FROM.GetAdjective] government has rejected our demands to increase autonomy for the Cretan people."
 AlgeriaFocus.66.a: "They will regret this"
 AlgeriaFocus.66.b: "We will bide our time"
 AlgeriaFocus.67.t: "Hamas Starts New Intifada"
 AlgeriaFocus.67.d: "Hamas has called a new intifada against us. We are seeing increased movement from Hamas militants and there have already been several demonstrations against our rule over Palestine. We have reports that Algeria might be behind arming and motivating Hamas for this new campaign."
 AlgeriaFocus.67.a: "They will regret this"
 AlgeriaFocus.68.t: "[FROM.GetNameDef] Sponsors a New Intifada"
 AlgeriaFocus.68.d: "[FROM.GetAdjective] has sent weapons and money for us to start a new Intifada against Israel. We already have a line of new recruits near our offices, and people are mobilising to protest against the Israeli occupiers."
 AlgeriaFocus.68.a: "We thank Algeria"
 AlgeriaFocus.69.t: "Hamas Rises Up"
 AlgeriaFocus.69.d: "We are receiving reports of Hamas fighters taking over key institutions and buildings on the Gaza strip. They have vowed that Israel will suffer from a new Intifada."
 AlgeriaFocus.69.a: "Damn"
 AlgeriaFocus.69.b: "Strike them down!"
 AlgeriaFocus.70.t: "[FROM.GetNameDef] Contacts Toubou"
 AlgeriaFocus.70.d: "We have received reports that Algeria has started arming Toubou rebels in the North of our country. If Algeria invades, these rebels will surely join their cause."
 AlgeriaFocus.70.a: "Worrying"
 AlgeriaFocus.71.t: "[FROM.GetNameDef] Suggests Joint Mining"
 AlgeriaFocus.71.d: "The [FROM.GetAdjective] government has suggested a joint uranium mining venture in Aouzou strip. This will provide resources for both our countries in the future. How should we respond?"
 AlgeriaFocus.71.a: "A great idea!"
 AlgeriaFocus.71.b: "We don't care"
 AlgeriaFocus.72.t: "[FROM.GetNameDef] Accepts Our Deal"
 AlgeriaFocus.72.d: "The [FROM.GetAdjective] government has accepted our deal on joint mining"
 AlgeriaFocus.72.a: "Great"
 AlgeriaFocus.73.t: "[FROM.GetNameDef] Rejects Our Deal"
 AlgeriaFocus.73.d: "The [FROM.GetAdjective] government has rejected our deal on joint mining"
 AlgeriaFocus.73.a: "Damn"
 AlgeriaFocus.74.t: "[FROM.GetNameDef] Starts Uranium Mining"
 AlgeriaFocus.74.d: "[FROM.GetNameDef] has started mining uranium in the Aouzou Strip. While most of the resources go to them, we also get a small share and the [FROM.GetAdjective] have agreed to cover all the costs of the excavation."
 AlgeriaFocus.74.a: "Okay"
 AlgeriaFocus.90.t: "Autonomy For Western Sahara"
 AlgeriaFocus.90.d: "The [FROM.GetAdjective] hosted Casablanca accords have resulted in a very favourable resolution from our perspective. The countries partaking in the accords have decided that Western Sahara should be part of Morocco."
 AlgeriaFocus.90.a: "Great"
 AlgeriaFocus.910.d: "The [FROM.GetAdjective] hosted Casablanca accords have resulted in a very favourable resolution from our perspective. All the parties have agreed that the conflict should be solved by giving the West Saharans, or Sahrawi, limited autonomy within Morocco."
 AlgeriaFocus.910.a: "Great"
 AlgeriaFocus.910.b: "Great"
 AlgeriaFocus.91.t: "Government expansion"
 AlgeriaFocus.91.d: "Now that we are in charge, we have to solidify our position to carry further reforms by expanding our support base. 2 parties offered to ally with us but on certain conditions. A small but aspiring party is lead by federalists seeking to decentralize power structures and introduce direct democracy initiatives. The other party lead by populist republicans seeking a centralized bureaucratic power base that can act as a capable unifying force of order and justice fully opposed to the federal solution. We will ally with:"
 AlgeriaFocus.91.a: "The federalists"
 AlgeriaFocus.91.b: "The populist republicans"
 AlgeriaFocus.91.c: "Yeah We can talk about that later"
 AlgeriaFocus.92.t: "Independence For Western Sahara"
 AlgeriaFocus.92.d: "The [FROM.GetAdjective] hosted Casablanca accords have resulted in Western Sahara gaining full independence from Morocco. In the future, the country will be called the Sahrawi Democratic Arab Republic."
 AlgeriaFocus.92.a: "Okay"
 AlgeriaFocus.92.b: "Great"
 AlgeriaFocus.93.t: "Western Sahara Joins Mauritania"
 AlgeriaFocus.93.d: "The [FROM.GetAdjective] hosted Casablanca accords have resulted in Western Sahara being annexed by Mauritania."
 AlgeriaFocus.93.a: "Okay"
 AlgeriaFocus.93.b: "Great"
 AlgeriaFocusNews.8.t: "The Casablanca Accords Announced"
 AlgeriaFocusNews.8.d: "The [FROM.GetAdjective] government has announced a peace conference regarding the status of Western Sahara. Morocco, Algeria, Mauritania and representatives from the POLISARIO Front have all been invited to the meeting. [FROM.GetLeader] has an ambitious goal of trying to find a solution to the frozen conflict."
 AlgeriaFocusNews.8.a: "Interesting"
 AlgeriaFocusNews.16.t: "Casablanca Accords Reach A Conclusion"
 AlgeriaFocusNews.16.annex.d: "When [ALG.GetLeader] announced they would be holding a international meeting for solving the status of Western Sahara, many were skeptical. However, it seems that the accords have reached some kind of conclusion. In their declaration, dubbed the [GetYear] Casablanca Agreement, they outline the plan of officially integrating Western Sahara into Morocco. After studying historical documents, the accords came to a conclusion that legally Western Sahara is Moroccan territory. Whether or not [SHA.GetNameDef] will accept this decision, is uncertain at this point."
 AlgeriaFocusNews.16.autonomy.d: "When [ALG.GetLeader] announced they would be holding an international meeting for solving the status of Western Sahara, many were skeptical. However, it seems that the accords have reached some kind of conclusion. In their declaration, dubbed the [GetYear] Casablanca Agreement, they outline the plan to annex Western Sahara to Morocco while allowing the Sahrawis to still hold significant autonomy. There is a clear agreement that Western Sahara will be allowed to have their military and direct control of their internal politics, while Morocco will be responsible for the region's international relations, including defence against external threats."
 AlgeriaFocusNews.16.independence.d: "When [ALG.GetLeader] announced they would be holding a international meeting for solving the status of Western Sahara, many were skeptical. However, it seems that the accords have reached some kind of conclusion. In their declaration, dubbed the [GetYear] Casablanca Agreement, the signatories outline a clear support for the full independence of Western Sahara. The Accords clearly saw that the Western Saharan desire for independence overrules any possible historical records that would legally make the area Moroccan. Whether or not [MOR.GetNameDef] will accept this decision, is uncertain at this point."
 AlgeriaFocusNews.16.mauritania.d: "When [ALG.GetLeader] announced they would be holding a international meeting for solving the status of Western Sahara, many were skeptical. However, it seems that the accords have reached some kind of conclusion. In their declaration, dubbed the [GetYear] Casablanca Agreement, they declare that Western Sahara is legally Mauritanian. After studying historical documents and past diplomatic agreements, from their point of view it is clear that Mauritania should hold the territory. Whether or not [MOR.GetNameDef] and [SHA.GetNameDef] will accept this decision, is uncertain at this point."
 AlgeriaFocusNews.16.a: "Interesting"
 AlgeriaFocusNews.17.t: "Casablanca Accords Fail To Reach A Conclusion"
 AlgeriaFocusNews.17.d: "When [ALG.GetLeader] announced they would be holding a international meeting for solving the status of Western Sahara, many were skeptical. That skepticism was well placed, after a year of negotiations, no tangible results have been achieved. Frustrated with the process, [ALG.GetLeader] has called the accords to be ended. It seems that Western Sahara will remain a contested area even in the future."
 AlgeriaFocusNews.17.a: "Interesting"
 AlgeriaFocusNews.18.t: "Casablanca Accords Fall Apart"
 AlgeriaFocusNews.18.d: "When [ALG.GetLeader] announced they would be holding a international meeting for solving the status of Western Sahara, many were skeptical. That skepticism was well placed, as serious disagreements between the partaking countries has forced the accords to be ended early. Several delegations already abandoned the accords in content as they felt that their needs weren't being heard. This has certainly been an embarrassment to [ALG.GetLeader]."
 AlgeriaFocusNews.18.a: "Interesting"
 AlgeriaFocusNews.19.t: "[ENG.GetAdjective] Intervention In Algeria"
 AlgeriaFocusNews.19.d: "After the assassination attempt of the Algerian royal family in [ENG.GetNameDef], the [ENG.GetAdjective] government demanded immediate compensation and apology from the [ALG.GetAdjective] government. [ENG.GetNameDef] had discovered that [ALG.GetNameDef] had strong links to the terror attack. As no apology or compensation arrive, [ENG.GetNameDef] considered this an attack against the nation. Still bearing the scars of the Lockerbie bombing, [ENG.GetNameDef] has had no choice but to topple the [ALG.GetAdjective] government in order to stop further attacks."
 AlgeriaFocusNews.19.a: "Interesting"
 ALG_claim_jerusalem_for_arabs: "Claim Jerusalem For Arabs"
 ALG_claim_jerusalem_for_arabs_desc: "Neither the Israelis or Palestinians deserve the region. They have shown they will only make a mess of it. It should be up to true Arabs to rule over the region and bring peace and stability."
 ALG_claim_jerusalem_for_arabs_tt: "We will be able to turn §YClaimed§! states in the Levant into §YCores§!"
 ALG_approach_hamas: "Approach Hamas"
 ALG_approach_hamas_desc: "Hamas is the only true force trying to prevent Zionism. We need to build better ties with them to prepare to topple Israel."
 ALG_send_fighters_to_hamas: "Send Fighters To Hamas"
 ALG_send_fighters_to_hamas_desc: "While the Palestinians are bravely resisting the Zionist invaders, the simple truth is that they are outnumbered. We need to arrange a group of volunteers to travel to Palestine and joins Hamas' ranks."
 MSP_claim_jerusalem_for_arabs: "Claim Jerusalem For Arabs"
 MSP_claim_jerusalem_for_arabs_desc: "Neither the Israelis or Palestinians deserve the region. They have shown they will only make a mess of it. It should be up to true Arabs to rule over the region and bring peace and stability."
 MSP_claim_jerusalem_for_arabs_tt: "We will be able to turn §YClaimed§! states in the Levant into §YCores§!"
 MSP_approach_hamas: "Approach Hamas"
 MSP_approach_hamas_desc: "Hamas is the only true force trying to prevent Zionism. We need to build better ties with them to prepare to topple Israel."
 MSP_send_fighters_to_hamas: "Send Fighters To Hamas"
 MSP_send_fighters_to_hamas_desc: "While the Palestinians are bravely resisting the Zionist invaders, the simple truth is that they are outnumbered. We need to arrange a group of volunteers to travel to Palestine and joins Hamas' ranks."
 ALG_BSEC_COOPERATION_TT: "We will be able to invest CIW funds in BSEC countries"
 MSP_condemn_china: "Condemn China"
 MSP_condemn_china_desc: "China's treatment of its native Muslims is abhorrent and should be condemned"
 MSP_improve_relations_with_algeria: "Improve Relations With Egypt"
 MSP_improve_relations_with_algeria_desc: "Turkey has a rocky history with Egypt, mainly due to our past conflicts. We are all on the same side here and we shouldn't be so cold to the Egyptians"
 MSP_investments_in_iraq: "Iraqi Friendship"
 MSP_investments_in_iraq_desc: "Despite Iraq having less than ideal ties with us in the past, it is best that we warm up to each other. We can invest in Iraqi infrastructure and gain their trust"
 MSP_work_together_with_BSEC: "Work Together With BSEC"
 MSP_work_together_with_BSEC_desc: "The BSEC (Black Sea Economic Cooperation) is an organization aimed at bringing prosperity around the Black Sea. The organization is composed of countries around the Black Sea and some countries from the Southern Balkans. We need to work together with these countries for increased benefit"
 MSP_fixing_ideals: "Repairing Ideals"

 AlgeriaInvestment.1.t: "[ALG.GetNameDef] Invites Us to Invest in their Projects"
 AlgeriaInvestment.1.desc: "Recently recovered from the war against the Taliban, the government of [ALG.GetNameWithFlag] is inviting us to invest in some of the projects in their country. However, whether to invest or not is up to us. if we choose to invest, we can gain some influence on their government, if the terror threat remains high in Algeria, we better not risk it."
 AlgeriaInvestment.1.a: "Invest in their infrastructure!"
 AlgeriaInvestment.1.b: "Invest in their civilian industry!"
 AlgeriaInvestment.1.c: "Invest in their service industry!"
 AlgeriaInvestment.1.d: "We'd better not risk it."
 AlgeriaInvestment.2.t: "[FROM.GetNameDef] Invested in our Infrastructure!"
 AlgeriaInvestment.2.d: "After days of negotiations, [FROM.GetNameWithFlag] has agreed to invest in our infrastructure in exchange for some minimal concessions. The investment will benefit our rural population in the country."
 AlgeriaInvestment.2.a: "We are grateful for their help!"
 AlgeriaInvestment.3.t: "[FROM.GetNameDef] Invested in our Civilian Industry!"
 AlgeriaInvestment.3.d: "After days of negotiations, [FROM.GetNameWithFlag] has agreed to help us build some civilian factories in exchange for some minor concessions. The investment will benefit our country's industry sector and facilitate the modernization of the country."
 AlgeriaInvestment.3.a: "We are grateful for their help!"
 AlgeriaInvestment.4.t: "[FROM.GetNameDef] Invested in our Service Industry!"
 AlgeriaInvestment.4.d: "After days of negotiations, [FROM.GetNameWithFlag] has agreed to invest in our service industry by building some offices in exchange for some minor concessions. The investment will benefit our country's financial sector and facilitate the modernization of the country."
 AlgeriaInvestment.4.a: "We are grateful for their help!"
 AlgeriaInvestment.5.t: "[FROM.GetNameDef] Declined to Invest!"
 AlgeriaInvestment.5.d: "After days of negotiations, [FROM.GetNameWithFlag] has rejected our invitation of investment, citing that the business environment in our country is not safe enough yet and will be carefully evaluating future investment deals with us."
 AlgeriaInvestment.5.a: "Guess we need to do more work!"
 AlgeriaInvestment.6.t: "Algeria Seeks Middle Eastern Investment Following WTO Membership"
 AlgeriaInvestment.6.d: "With its recent accession to the World Trade Organization (WTO), Algeria is eyeing increased capital infusion to propel economic development. Officials are reaching out to Middle Eastern nations, appealing for greater cooperation and investment in key sectors. This move signals Algeria's commitment to leveraging international partnerships to drive growth and stability in the region."
 AlgeriaInvestment.7.t: "They Sign a Trade Deal"
 AlgeriaInvestment.7.d: "They would like to propose a trade agreement to boost greater cooperation and have a door open for future investment"
 AlgeriaInvestment.7.a: "Sure"
 AlgeriaInvestment.6.a: "Sign a Trade Deal"
 AlgeriaInvestment.6.b: "Invest in a Factory"
 AlgeriaInvestment.6.c: "No Thank you"
 Algeria.11.t: "[ALG.GetNameDef] Requests our Protection"
 Algeria.11.d: "After decades of unrest, the Algerian government fears a reignition of war or external interference and invasion, the [ALG.GetNameWithFlag] President [ALG.GetLeader] has visited the Zhongnanhai and approached General Secretary [CHI.GetLeader] for a defence treaty. If we agree to protect them, we will be able to make sure that they are within our sphere of influence, but we will also have the obligation to defend [ALG.GetNameWithFlag] from external threats as well as provide assistance in maintaining stability of the country, especially countering the £GFX_ALG_salafist_jihadism  Taliban insurgency. Taking account of our country's situation, should we sign a defence treaty with [ALG.GetLeader]?"
 Algeria.11.a: "Another Iron Brother!"
 Algeria.11.b: "We have nothing to spare for a treaty!"
 Algeria.12.t: "[CHI.GetNameDef] has Agreed to Protect Us"
 Algeria.12.d: "Thanks to our diplomatic efforts, [CHI.GetNameWithFlag]'s General Secretary [CHI.GetLeader] has formally signed a defence treaty with our President [ALG.GetLeader], by signing this defence treaty, [FROM.GetNameWithFlag] will not only protect us from external aggression, but also provide assistance on maintaining our internal stability."
 Algeria.12.a: "Excellent!"
 Algeria.13.t: "[CHI.GetNameDef] Refused to Sign!"
 Algeria.13.d: "Despite our President [ALG.GetLeader] visiting [CHI.GetNameWithFlag] for security assistance, [CHI.GetLeader] was apparently close-mouthed about any sort of treaties. [CHI.GetLeader] has said to our president that \"We will always be committed to regional security and stability.\" But it is very obvious that [CHI.GetLeader]'s commitment only remains in words, we have to defend ourselves alone."
 Algeria.13.a: "What a disappointment"
 ALG_reconciliation_path: "Completed National Reconciliation Focus"
 ALG_join_nato_partnership: "Join NATO Partnership"
 ALG_eu_trade_agreements: "EU Trade Agreements"
 ALG_expand_russian_gas_investments: "Expand Russian Gas Investment"
 ALG_expand_russian_gas_investments_desc: "Expand the deals with Russia to gain more Gas and build our Nation."
