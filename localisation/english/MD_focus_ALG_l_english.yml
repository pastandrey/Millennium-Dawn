 #FOCUSES
 ALG_the_nation_stands_at_a_crossroads: "The Nation Stands at a Crossroads"
 ALG_the_nation_stands_at_a_crossroads_desc: "Algeria emerges from the Black Decade scarred. Over 200,000 dead, entire villages razed, and an economy guttered by civil war. President Bouteflika has staked his mandate on the Civil Concord, offering amnesty to militants and promising reform. But behind him stands le Pouvoir — the shadowy network of generals and intelligence officers who have ruled Algeria since independence. The path forward belongs to whoever controls what comes next.
 ALG_restore_the_presidency_desc: "In the wake of political upheaval, the presidency has been weakened. It is time to restore the authority of our elected leader and reinstate the democratic norms that have been eroded. By reestablishing the presidency, we can bring stability and confidence back to our government."
 ALG_emergency_rule_continues: "§REmergency Rule Continues§!"
 ALG_emergency_rule_continues_desc: "With the nation still in turmoil, the government has decided to extend emergency rule. While this measure is necessary to maintain order, it comes at a cost to civil liberties and democratic processes. We must tread carefully as we navigate these turbulent waters."
 ALG_national_reconciliation: "National Reconciliation"
 ALG_national_reconciliation_desc: "To heal the wounds of division and conflict, we must pursue a path of national reconciliation. By fostering dialogue among all factions and addressing grievances, we can build a more unified society and lay the groundwork for lasting peace."
 ALG_moderate_islamist_talks: "Moderate Islamist Talks"
 ALG_moderate_islamist_talks_desc: "In an effort to bridge divides and promote stability, we are initiating talks with moderate Islamist factions. By engaging in constructive dialogue, we aim to find common ground and create a political environment where diverse voices can coexist peacefully."
 ALG_charter_for_civil_peace: "Charter for Civil Peace"
 ALG_charter_for_civil_peace_desc: "To ensure lasting stability and social harmony, we propose a Charter for Civil Peace. This document will outline the rights and responsibilities of all citizens, promoting tolerance, understanding, and cooperation among different groups within our society."
 ALG_open_democratic_path: "Open the Democratic Path"
 ALG_open_democratic_path_desc: "It is time to embrace democracy fully and open the path to a brighter future. By implementing reforms that empower our citizens and promote political participation, we can create a vibrant democratic society that reflects the will of the people."
 ALG_unlock_reconciliation_decisions_tt: "§tUnlocks decisions related to National Reconciliation§!"
 ALG_clamp_down_on_extremism: "Clamp Down on Extremism"
 ALG_clamp_down_on_extremism_desc: "Using military tribunals and intelligence forces, the government will eliminate all remaining radical Islamist and political threats."
 ALG_counterterrorism_program: "Counterterrorism Program"
 ALG_counterterrorism_program_desc: "A modern security apparatus must be formed to track, infiltrate, and eliminate threats before they destabilize Algeria."
 ALG_authoritarian_restoration: "Authoritarian Restoration"
 ALG_authoritarian_restoration_desc: "Stability can only be guaranteed through firm, centralized rule. The military will take full charge of the nation's future."
 ALG_unlock_crackdown_decisions_tt: "Unlocks decisions to purge political threats and secure control through the intelligence services."
 ALG_the_crisis_reignites: "§4The Crisis Reignites§!"
 ALG_the_crisis_reignites_desc: "Our political crackdown has worsened tensions instead of calming them. Islamist networks are rearming, and signs of an insurgency are appearing again."

 ALG_gia_and_fis_resurge: "GIA and FIS Resurge"
 ALG_gia_and_fis_resurge_desc: "Remnants of the GIA and political Islamists from the banned FIS are now calling for armed uprising."
 ALG_counterterrorism_agency: "Counterterrorism Agency"
 ALG_counterterrorism_agency_desc: "The Département du Renseignement et de la Sécurité (DRS) was rebuilt from the remnants of the old SM military intelligence service following the Civil War. Operating with near-total autonomy from civilian oversight, the DRS became the most powerful institution in Algeria — more feared than the presidency itself.

 ALG_extremism_crackdown_modifier: "Extremism Crackdown"
 ALG_extremism_crackdown_modifier_desc: "In response to rising threats from extremist groups that seek to destabilize our nation, we are implementing a comprehensive crackdown on radicalism. This initiative aims to dismantle extremist networks, enhance surveillance, and strengthen law enforcement capabilities. By promoting a culture of tolerance and understanding, we hope to address the root causes of extremism while ensuring the safety and security of our citizens. Through these measures, we will foster a more cohesive society and protect our democratic values."

 ALG_algeria_slides_into_civil_war: "Algeria Slides into Civil War"
 ALG_algeria_slides_into_civil_war_desc: "The conflict we tried to avoid has now reignited. Armed rebels rise up across the interior, and the army must fight once again for control of the country."

 ALG_civilwar.1.t: "Islamist Forces Declare Jihad"
 ALG_civilwar.1.d: "Radical Islamist commanders have called for another jihad against the regime, rallying supporters and former networks. The conflict has reignited."
 ALG_civilwar.1.a: "Mobilize the Army!"
 ALG_military_regime_restored: "Military Regime Restored"
 ALG_military_regime_restored_desc: "After years of political instability, the military has regained control and restored order. The regime focuses on discipline, national security, and strict governance to rebuild the nation's strength and unity."

 ALG_crisis_events_begin_tt: "A series of events will begin based on unrest and Islamist resurgence."
 ALG_civil_war_factions_tt: "A civil war will erupt between the government and armed Islamist insurgents."

 ALG_reconciliation_path_category: "National Reconciliation"
 ALG_reconciliation_path_category_desc: "\n£AFG_menu1\n\n\n\nTo heal the wounds of division and conflict, we must pursue a path of national reconciliation. By fostering dialogue among all factions and addressing grievances, we can build a more unified society and lay the groundwork for lasting peace."

 ALG_pardon_moderate_islamist: "Pardon Moderate Islamists"
 ALG_pardon_moderate_islamist_desc: "Former non-violent Islamists may be offered conditional amnesty in return for disarmament and renunciation of political violence."

 ALG_initiate_national_dialogues: "Initiate National Dialogue"
 ALG_initiate_national_dialogues_desc: "A national forum will be launched to include former rebels, political parties, and civil society in building a new Algeria."

 ALG_reintegrate_former_fighter: "Reintegrate Former Fighters"
 ALG_reintegrate_former_fighter_desc: "A program to reintegrate surrendered rebels into civilian life through work, housing, or national service."
 ALG_crackdown_category: "Authoritarian Crackdown"
 ALG_crackdown_category_desc: "\n£TAJ_desctext_pamir\n\n\n\nTo ensure the stability of the state, we must suppress subversive elements and strengthen our internal security forces."

 ALG_arrest_political_opponents: "Arrest Political Opponents"
 ALG_arrest_political_opponents_desc: "We will neutralize internal threats by removing radical political actors from the public space."

 ALG_expand_surveillance_services: "Expand Surveillance Services"
 ALG_expand_surveillance_services_desc: "A robust intelligence network will monitor the population and prevent unrest before it spreads."

 ALG_ban_opposition_parties: "Ban Opposition Parties"
 ALG_ban_opposition_parties_desc: "All political parties not aligned with national unity will be banned from participation in politics."
 ALG_economic_recovery_category: "Economic Recovery Program"
 ALG_economic_recovery_category_desc: "\n£MAIN_desctext_dept\n\n\n\nThe IMF offers conditional support and Algeria can now begin broader reforms, loans, and privatization."

 ALG_accept_imf_loan: "Accept IMF Loan"
 ALG_accept_imf_loan_desc: "We can accept financial assistance from the IMF to stabilize our currency and begin reform. This comes at the cost of long-term debt and conditions."

 ALG_start_oil_licensing: "Open Oil Licensing to Foreign Companies"
 ALG_start_oil_licensing_desc: "Allowing multinational corporations access to oil reserves could accelerate growth but increase foreign influence."

 ALG_repay_imf_loan: "Repay the IMF Loan"
 ALG_repay_imf_loan_desc: "With our finances stabilizing, we can pay off our loan to reduce international dependency."
 ALG_civil_war_recovery: "Civil War Recovery"
 ALG_civil_war_recovery_desc: "The wounds of the Black Decade must be healed. The state will now invest in national recovery."

 ALG_improve_public_services: "Improve Public Services"
 ALG_improve_public_services_desc: "We will expand healthcare, education, and support for war victims."

 ALG_international_aid_effort: "International Aid Effort"
 ALG_international_aid_effort_desc: "Partnering with the UN and donors can jumpstart basic services and reconstruction."

 ALG_building_civil_society: "Building Civil Society"
 ALG_building_civil_society_desc: "Empowering communities and social programs can help prevent renewed conflict."

 ALG_economic_recovery_program: "Economic Recovery Program"
 ALG_economic_recovery_program_desc: "We launch a national plan for growth, supported by foreign assistance and state reform."

 ALG_remove_international_monitors: "Remove International Monitors"
 ALG_remove_international_monitors_desc: "Algeria has recovered enough to regain full sovereignty over its economic path."
