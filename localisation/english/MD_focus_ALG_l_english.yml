 ALG_bribe_malian_generals: "Bribe Malian Generals"
 ALG_bribe_malian_generals_desc: "The Malian military junta can be influenced through careful distribution of funds. By bribing key generals, Algeria can gain leverage over Bamako's decision-making and secure our interests in the Sahel."
 ALG_isolate_mali_regime: "Isolate Mali Regime"
 ALG_isolate_mali_regime_desc: "The military regime in Bamako has destabilized the region and threatened Tuareg populations. Algeria will work to isolate the junta internationally, positioning ourselves as the legitimate mediator in the Sahel crisis."
 ALG_bribe_malian_generals_tt: "§HYBribe Malian Military Leadership§!\nEstablish a network of paid informants and allies within Mali's military junta.\n\n§YBenefits:§!\n- Influence over Malian decisions\n- Intelligence network established\n- Friendly regime in Bamako\n\n§RCosts:§!\n- Treasury expense\n- Mali becomes more corrupt"
 ALG_isolate_mali_tt: "§HYIsolate the Malian Regime§!\nUse diplomatic pressure and African Union channels to condemn the military junta.\n\n§YBenefits:§!\n- Regional leadership for Algeria\n- Tuareg support increased\n- Mali weakened\n- AU influence gained\n\n§WOutcome:§!\nAlgeria becomes the key mediator in Sahel affairs"
 ALG_unlock_mali_influence_decisions_tt: "§GUnlocks Mali Influence Decisions§!"
 ALG_au_condemns_mali_tt: "§YAfrican Union condemns Malian regime§!\nAll AU members reduce opinion of Mali"
 ALG_malian_general_network: "Malian General Network"
 ALG_malian_general_network_desc: "A network of bribed Malian generals provides Algeria with intelligence and influence over the military junta in Bamako."
 ALG_sahel_mediator: "Sahel Mediator"
 ALG_sahel_mediator_desc: "Algeria has emerged as the primary diplomatic mediator in Sahel conflicts. Our voice carries weight in regional affairs."
 MAL_international_isolation: "International Isolation"
 MAL_international_isolation_desc: "The military regime faces international condemnation and isolation. Trade is disrupted, foreign aid suspended, and the government struggles to maintain control."
