 ALG_align_with_us: "Align with the United States"
 ALG_align_with_us_desc: "Cooperating with the United States can bring security and economic leverage."

 ALG_align_with_china: "Align with the People's Republic of China"
 ALG_align_with_china_desc: "China offers non-interventionist economic development and deep investment potential."

 ALG_align_with_russia: "Align with the Russian Federation"
 ALG_align_with_russia_desc: "Russia provides military technology and shares Algeria's skepticism of Western dominance."

 ALG_non_aligned_revival: "Revive Non-Aligned Foreign Policy"
 ALG_non_aligned_revival_desc: "We will revive the spirit of neutrality and southern solidarity, just as in the 1960s."

 ALG_global_south_solidarity: "Global South Solidarity"
 ALG_global_south_solidarity_desc: "Algeria will strengthen ties with post-colonial nations through trade, diplomacy, and aid."
 ALG_future_national_policy: "§G Algeria's Future§!"
 ALG_future_national_policy_desc: "With the civil war behind us, we must now define Algeria's new political direction.\n §RNOTE§!: §YPicking this Focus will lead to focuses in the end that will overwrite the current focus tree with customize one for each Party so finish other important focuses before ending This§!"

 ALG_approach_nato: "§CApproach NATO§!"
 ALG_approach_nato_desc: "Western alignment could bring economic growth and security guarantees."

 ALG_aspire_nato_support: "Aspire to NATO Partnership"
 ALG_aspire_nato_support_desc: "By meeting conditions, Algeria can become a Major Non-NATO Ally."

 ALG_invite_western_investors: "Invite Western Investors"
 ALG_invite_western_investors_desc: "Attract capital and trade from democratic nations."

 ALG_request_us_protection: "Request U.S. Protection"
 ALG_request_us_protection_desc: "Algeria will ask the United States for military protection or guarantees."

 ALG_remain_neutral: "§gRemain Neutral§!"
 ALG_remain_neutral_desc: "Non-alignment offers freedom of diplomacy and domestic stability."

 ALG_economy_first: "Put Economy First"
 ALG_economy_first_desc: "Reduce military spending and boost education and long-term development."

 ALG_seek_un_protection: "Seek International Protection"
 ALG_seek_un_protection_desc: "If threats rise, we will look to the UN Security Council for protection."

 ALG_align_with_china1: "§tAlign with China and Russia§!"
