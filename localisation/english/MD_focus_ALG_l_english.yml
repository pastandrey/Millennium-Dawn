 ### Automobile Industry Path ###
 ALG_automobile_industry: "Develop the Automobile Industry"
 ALG_automobile_industry_desc: "Algeria has long relied on imports to meet its automotive needs. By developing a domestic automobile industry, we can create jobs, reduce imports, and establish Algeria as a regional manufacturing hub."
 ### Foreign Partnerships ###
 ALG_peugeot_deal: "Peugeot Investment"
 ALG_peugeot_deal_desc: "Peugeot has expressed interest in opening a plant in Algeria. This partnership could provide us with much-needed industrial capacity."
 ALG_renault_oran: "Renault in Oran"
 ALG_renault_oran_desc: "Renault is willing to establish production in Oran, providing a steady flow of vehicles and boosting our economy."
 ALG_hyundai_tiaret: "Hyundai in Tiaret"
 ALG_hyundai_tiaret_desc: "South Korea's Hyundai is ready to establish a partnership in Tiaret, creating jobs and reducing our dependency on European manufacturers."
 ALG_volkswagen_relizane: "Volkswagen in Relizane"
 ALG_volkswagen_relizane_desc: "Volkswagen and its associated brands (Skoda, Audi, Seat) are prepared to open a plant in Relizane, further diversifying our industrial base."

 ALG_bmw_deal: "BMW Partnership"
 ALG_bmw_deal_desc: "Germany's BMW has shown interest in assembling luxury and premium vehicles in Algeria, elevating our automotive industry to international standards."

 ALG_mercedes_trucks: "Mercedes Trucks"
 ALG_mercedes_trucks_desc: "By working with Daimler, we can assemble Mercedes military trucks and heavy vehicles in Algeria, directly supporting our armed forces."

 ### Scandal & Crisis ###
 ALG_auto_scandal: "Automobile Corruption Scandal"
 ALG_auto_scandal_desc: "Revelations have exposed Algeria's car assembly industry as a corruption-ridden sham, with subsidies misused and factories doing little more than reassembling imported kits. The scandal will have severe political and economic repercussions."

 ALG_import_ban: "Ban Car Imports"
 ALG_import_ban_desc: "In an effort to protect our domestic industry, we will ban the import of most foreign cars. This measure is controversial and will create economic strain in the short term."

 ALG_fiat_deal: "Fiat Investment Deal"
 ALG_fiat_deal_desc: "Fiat has offered to return to Algeria with a modern industrial complex, promising to restart production and restore public trust in our automotive sector."

 ### Indigenous Path ###
 ALG_indigenous_brand: "Create Indigenous Brand"
 ALG_indigenous_brand_desc: "Rather than rely on foreign companies, Algeria should create its own indigenous car manufacturer, designed and built locally by Algerians."

 ALG_auto_exports: "Export Algerian Cars"
 ALG_auto_exports_desc: "With a stable domestic car industry, we can now look outward and begin exporting Algerian-made vehicles to African and Mediterranean markets."

 alg.1000.t: "Automobile Industry Corruption Scandal"
 alg.1000.d: "A massive corruption scandal has shaken Algeria's automobile sector. Investigations revealed that many so-called 'factories' were mere reassembly plants that abused state subsidies and inflated costs. Public trust is collapsing, and the industry is facing paralysis."
 alg.1000.a: "A national humiliation."

 ALG_auto_corruption_idea: "Automobile Corruption Scandal"
 ALG_auto_corruption_idea_desc: "The automobile sector has been exposed as a corruption-ridden sham. Confidence in domestic production is low, and foreign investors are hesitant to return."

 ALG_tebboune_tt: "Abdelmadjid Tebboune becomes President of Algeria following the 2019 Hirak protests. The notorious (Gang) of corrupt politicians — including Ahmed Ouyahia, Abdelmalek Sellal, Ali Haddad, and Mahieddine Tahkout — are arrested and face justice. This marks the beginning of a new era, though many doubt how deep the reforms will truly go."
 ALG_corruption_network: "Bouteflika's Entourage"
 ALG_corruption_network_desc: "A corrupt network of politicians and businessmen, including Ouyahia, Sellal, and Tahkout, dominates Algerian politics. Their influence weakens the state and fuels public anger."
 ALG_cleaning_the_state: "Cleaning the State"
 ALG_clean_government: "Clean Government"
 ALG_political_repression: "Political Repression"
 ALG_investor_confidence: "Investor Confidence"
 ALG_diversification: "Diversification"
 ALG_subsidies: "Subsidies"
 ALG_balanced_foreign_policy: "Balanced Foreign Policy"
 ALG_russia_cooperation: "Russia Cooperation"
 ALG_chinese_investments: "Chinese Investments"
 ALG_military_junta: "Military Junta"
 ALG_cleaning_the_state_desc: "With the fall of the Entourage, Algeria is finally taking steps to purge corruption from its institutions and restore the people's trust."
 algeria_reforms.1.t: "Reforms Under Tebboune"
 algeria_reforms.1.d: "Following the resignation of Abdelaziz Bouteflika and the election of Abdelmadjid Tebboune, Algeria enters a new political chapter. Tebboune has promised reforms, a new constitution, and the dismantling of the notorious corruption network known as the 'ʿIsābah' (the gang), which included former prime ministers Ahmed Ouyahia, Abdelmalek Sellal, and business magnates like Ali Haddad and Mahieddine Tahkout. \n\nThe Hirak movement, however, remains skeptical of his promises. Will these reforms lead to true democratization, or are they simply a way to preserve the regime under new leadership?"
 algeria_reforms.1.a: "Support Tebboune's Reforms"
 algeria_reforms.1.b: "The People Demand More!"
 ALG_arrest_the_gang: "Arrest the Entourage"
 ALG_arrest_the_gang_desc: "The Algerian people demand justice. Tebboune will continue the prosecutions against Ouyahia, Sellal, Haddad, Tahkout, and other corrupt figures who drained the nation's wealth."
 ALG_at_a_crossroads: "The Nation Stands at a Crossroads"
 ALG_at_a_crossroads_desc: "As our nation faces unprecedented challenges, we stand at a pivotal moment in our history. The choices we make now will shape our future and determine the course of our society. Will we embrace change and reform, or cling to the past? The path we choose will define our legacy."
 ALG_promises_of_reform: "Promises of Reform"
 ALG_promises_of_reform_desc: "A new Algeria requires a new constitution. Tebboune promises reforms to limit presidential terms, strengthen parliament, and guarantee more freedoms."
 ALG_suppressed_opposition: "Suppressed Opposition"
 ALG_black_decade_methods: "Black Decade Methods"
 ALG_black_market: "Black Market"
 ALG_pna_expansion: "PNA Expansion"
 ALG_global_power: "Global Power"
 ALG_crackdown_on_dissent: "Crackdown on the Hirak"
 ALG_crackdown_on_dissent_desc: "The protests have not stopped. Instead of dialogue, Tebboune has chosen repression, hoping to silence dissent and preserve the state."

 ALG_rebuild_trust_investors: "Rebuild Trust with Investors"
 ALG_rebuild_trust_investors_desc: "After years of corruption and instability, we must regain the trust of foreign and domestic investors in our economy."

 ALG_diversify_economy: "Diversify the Economy"
 ALG_diversify_economy_desc: "Algeria cannot rely solely on oil and gas. Renewables, agriculture, and manufacturing will be the pillars of our future."

 ALG_social_subsidies: "Protect Social Subsidies"
 ALG_social_subsidies_desc: "The people rely on subsidies for fuel, bread, and housing. Tebboune promises to maintain these protections despite economic challenges."

 ALG_balance_regional_powers: "Balance Regional Powers"
 ALG_balance_regional_powers_desc: "Algeria stands between Europe, Africa, and the Arab world. We must maintain a balanced foreign policy that serves our interests."

 ALG_strengthen_russia_ties: "Strengthen Ties with Russia"
 ALG_strengthen_russia_ties_desc: "Our historic friendship with Moscow can deepen through defense cooperation and energy deals."

 ALG_china_investments: "Chinese Investments"
 ALG_china_investments_desc: "The Belt and Road Initiative offers Algeria a chance to modernize infrastructure and attract major Chinese investment projects."
 ALG_north_south_highway: "North-South Highway Project"
 ALG_automobile_factories: "Automobile Industry"
 ALG_automobile_factories_desc: "To employ our population and gain more economic capacity, we might need to invite foreign car producers into our country."
 algeria_policy.1.t: "Denouncing Colonialist Regimes"
 algeria_policy.1.d: "The FLN has issued a strong condemnation of past colonialist regimes, denouncing crimes committed during the occupation of Algeria. The declaration has stirred national pride at home but has provoked anger in Paris, worsening Algerian–French relations."
 algeria_policy.1.a: "Expose the crimes of Colonialism!"
 algeria_disaster.1.t: "The Boumerdès Earthquake"
 algeria_disaster.1.d: "A devastating earthquake has struck northern Algeria, centered near the city of Boumerdès. Thousands have lost their lives, tens of thousands more are injured, and vast parts of Algiers and the coastal region have been reduced to rubble. The nation stands in shock as rescue operations struggle to cope with the scale of the disaster. Immediate action is required to restore order and provide relief to the affected population."
 algeria_disaster.1.a: "Mobilize emergency response teams and begin rebuilding efforts"
 ALG_earthquake_recovery_tt: "Rescue operations begin. The government will soon decide how to finance the reconstruction."
 algeria_disaster.2.t: "Reconstruction and Recovery Efforts"
 algeria_disaster.2.d: "The aftermath of the earthquake has left Algeria facing one of the worst humanitarian crises in its modern history. Thousands remain without shelter, and vital infrastructure lies in ruins. The government must decide how to fund the reconstruction — either by creating a national aid fund using state resources, or by seeking foreign assistance, which may come with political strings attached."
 algeria_disaster.2.a: "Establish a State Aid Fund"
 ALG_state_aid_fund_tt: "Allocate state resources to rebuild the affected regions. This will strain the treasury but strengthen domestic confidence in the government."
 algeria_disaster.2.b: "Seek Foreign Assistance"
 ALG_foreign_aid_dependence_tt: "Request aid from international partners. This will ease financial pressure but increase foreign influence over Algeria's internal affairs."
 ALG_french_influence: "French Influence in the Shadows"
 ALG_french_influence_desc: "Although independent on paper, Algeria's politics remain under the shadow of French influence. Corrupt generals and politicians tied to Paris shape decision-making, limiting true sovereignty."
 ALG_shadow_state: "Le Pouvoir in the Shadows"
 ALG_shadow_state_desc: "The hidden network of generals, intelligence officers, and businessmen — often called 'Le Pouvoir' — dominates Algeria. Corruption weakens the state, but this shadow system ensures political stability and strengthens the regime's grip on power."
 algeria_emerging_youth: "Youth organizations"
 algeria_nationalist_youth: "Youth organizations"
 algeria_nationalist_rise: "Nationalist Revival"
 algeria_nationalist_rise_desc: "Nationalism in Algeria is becoming more popular than ever. Due to the government's clear opposition to foreign interference in the state, and its staunch support for the sovereignty and independence of the state"
 algeria_cultural_rebirth: "Cultural rebirth"
 ALG_PNA_victory: "§RYMilitary Rule§!"
 ALG_PNA_victory_desc: "Armée nationale populaire (People's National Army) is the military of Algeria. Ever since Algerias independence in 1962, it had a big role in politics. It practically controlled the government until 1988, when a multi-party system was established. It remains to have influence over Algeria's politics though, with the most recent example being president Abdelaziz Bouteflika abdicating in 2019 after protests led to a loss of support by the military."
 ALG_kick_out_morocco: "Kick Out Morocco"
 ALG_kick_out_morocco_desc: "Morocco has always subjugated us under their control and there's no reason for us to maintain our ties with them. It is the right time to kick these ideological enemies out of Algeria!"
 ALG_statist_rise: "Statist Rise"
 ALG_statist_rise_desc: "Liberal Economics allow exploitation of our people and compromises our national independence and control. It is best for Algeria to connect every aspect of economy to the state."
 ALG_maintain_military_role: "Maintain Army Leverages"
 ALG_maintain_military_role_desc: "The World is entering dark and awkward times so we have to protect our nation, doesn't matter what it costs."
 ALG_kick_out_iran: "Kick Out Iran"
 ALG_kick_out_iran_desc: "Iran has always subjugated us under their control and there's no reason for us to maintain our ties with them. It is the right time to kick these ideological enemies out of Algeria!"
 ALG_nationalize_oligarchic_holdings: "Nationalize Holdings"
 ALG_nationalize_oligarchic_holdings_desc: "We will nationalize the holdings and properties of various rogue oligarchs to strengthen our grip over the economy."
 ALG_subsidise_police: "Subsidise Police"
 ALG_subsidise_police_desc: "Police is one of the most important thing to make our people feel safe and guarantee our rule in Algeria and it has been very underfunded. This has to change."
 ALG_maintain_socialistic_policies: "Maintain Socialist Laws"
 ALG_maintain_socialistic_policies_desc: "One thing the previous government got right, and is the ultimate reason why they were relatively more popular is their socialist policies that supported the lower classes. We will continue the policies implemented by the former president hafez al assad and depict ourselves as the true supporters of the oppressed."
 ALG_government_planned_economic_projects: "Government Projects"
 ALG_government_planned_economic_projects_desc: "We should initiate public projects to enhance our image as a responsible government and to gather support from the common people."
 ALG_patriotic_propaganda: "Patriotic Propaganda"
 ALG_patriotic_propaganda_desc: "We will strengthen our ideological positions by emphasizing the importance of national pride and state loyalty."
 ALG_gather_support_from_peasantry: "Peasantry Support"
 ALG_gather_support_from_peasantry_desc: "Peasants are the backbone of our nation and we have to make sure that they are supporting us."
 ALG_strong_government: "Strong Government"
 ALG_strong_government_desc: "We will have to show our people that our government is stable and capable enough to rule. This will allow us to gain their trust"
 ALG_expand_youth_organizations: "Expand Youth Organizations"
 ALG_expand_youth_organizations_desc: "Our parties have relied notably on youth organizations and now that we are in a position of power it's time to encourage the youth to support our ideological causes by winning their hearts and minds."
 ALG_illiberal_democracy: "Illiberal Democracy"
 ALG_illiberal_democracy_desc: "Liberalism is a virus that infects and exploits poor nations. What the people need is true democracy that truly represents the people and at the same time unites them under one banner. We are a democracy no matter what."
 ALG_reestablish_intelligence_committee: "Reestablish Intel Agencies"
 ALG_reestablish_intelligence_committee_desc: "The future wars are not with guns and tanks, but with information. It's our responsibility to create a fully functional intelligence agency."
 ALG_national_security_act: "National Security Act"
 ALG_national_security_act_desc: "The extremists groups are killing our nation slowly and pose a threat to our people. Their attacks are a clear threat to our nation and if anything we have to stop them immediately no matter what the cost, no matter what happens. TERRORISM SHALL STOP."
 ALG_pan_algerian_nationalism: "Pan Algerianism"
 ALG_pan_algerian_nationalism_desc: "Algeria is the country that should brighten all over North Africa with it's unique identity. Our rich history and culture makes it clear that it's our duty to show our true potential and identity to the world."
 ALG_cultural_rebirth: "Cultural Rebirth"
 ALG_cultural_rebirth_desc: "Our nation is slowly but surely recognizing it's identity. Petty divides should not stop in the way of realizing the beauty of our people. Our people should acknowledge that no matter what, we're still algerians after all."
 ALG_deal_with_the_trade_unions: "A Deal With Unions"
 ALG_deal_with_the_trade_unions_desc: "The key of a strong country is it's production and economy so we have to make sure that all workers of Algeria are supporting us."
 ALG_reassert_russian_ties: "Russian Ties"
 ALG_reassert_russian_ties_desc: "Russia is the only and true ally that helps us to become a modern, safe and prosperous nation."
 ALG_russian_oil_excavation: "Russian Oil Deals"
 ALG_russian_oil_excavation_desc: "There is a big treasure in our nation and our ally, Russia, will help us reach these resources."
 ALG_russian_algiers_base_expansion: "Expand Russian Naval Presence"
 ALG_russian_algiers_base_expansion_desc: "We can't create a strong navy immediately but our Russian friends will help us keep our coasts safe by aiding in the expansion of the port's capabilities."
 ALG_houarist_rise: "Houarist Rise"
 ALG_houarist_rise_desc: "Houarrism is rising again and ready to make Algeria great again."
 ALG_islamic_socialism: "Islamic Socialism"
 ALG_islamic_socialism_desc: "People seem to forget that islam advocates lots of practices attributed to socialism such as zakat and sadaka. We should emphasize this relationship by basing our ideals around it as this will also gather support from the islamists that always stood against our ideals. Islamic socialism is the true way towards making our nation a modern, strong and virtuous republic."
 ALG_Get_rid_of_oligarchs: "Purge The Oligarchs"
 ALG_news.1.t: "Algeria at a Crossroads"
 ALG_news.1.d: "After nearly a decade of brutal violence, economic disintegration, and political stagnation, Algeria in the year 2000 stands at a decisive moment. The civil war, known by many as the 'Black Decade', has left tens of thousands dead and many more displaced. While the intensity of fighting has decreased, tensions remain high, and the wounds are far from healed.\n\nWith the nation's future uncertain, competing forces now push in different directions. One path seeks national reconciliation and democratic reforms to unify the country. Another leans toward prolonging emergency rule, maintaining the current regime's grip on power. Yet a third whispers of continued war — of unfinished battles, radical promises, and those who refuse to lay down arms.\n\nThe road Algeria chooses next may shape its destiny for generations."
 ALG_news.1.a: "All eyes are on Algiers."
 ALG_maghreb_union_sah_tt: "Completing this Focus means you cannot do the Forming the Maghreb Union Focus"
 Arab_Defense_Bloc: "Arab Defense Bloc"
 The_Maghreb_Joint_Defense: "The Maghreb Joint Defense"
 # Event
 alg_political_struggle_event_title: "The Ghosts of Bouteflika"
 alg_political_struggle_event_desc: "With Bouteflika gone, Algeria stands at a crossroads. The military elite cling to power, while the streets demand change. How will we navigate this crisis?"
 alg_political_struggle_event_option: "The struggle begins"
 # Balance of Power Tooltips
 ALG_bouteflika.3.t: "Bouteflika Health Crisis"
 ALG_bouteflika.3.d: "As Of 2013, Bouteflika had a debilitating stroke.A journalist, Hichem Aboud, was pursued for threatening national security, territorial integrity, and normal management of the Republic's institutions and the newspapers for which he wrote were censored, because he wrote that the President had returned from Val-de-Grâce in a comatose state and had characterized Saïd Bouteflika as the puppet-master running the administration."
 ALG_bouteflika.3.a: "What Will Happen ?"
 ALG_boteflika_tt: "This will unlock the Algeria President Health Crisis Focus"
 ALG_bouteflika: "Bouteflika Health Crisis News"
 ALG_bouteflika.2.t: "2014 Algerian presidential election"
 ALG_bouteflika.2.d: "Presidential elections were held in Algeria on 17 April 2014.Incumbent President Abdelaziz Bouteflika was re-elected with 82% of the vote. Issues in the campaign included a desire for domestic stability after the bloody civil war of the 1990s"
 ALG_bouteflika.2.a: "Bouteflika Wins"
 # Focus Names
 # --- 2013 Health Crisis ---
 ALG_bouteflika_health_crisis: "Bouteflika's Health Crisis"
 ALG_bouteflika_health_crisis_desc: "The President's deteriorating health threatens to destabilize Algeria. Will we keep him in power or prepare for a transition?"

 # --- 2014 Elections ---
 ALG_2014_elections: "2014 Presidential Election"
 ALG_2014_elections_desc: "Despite his illness, Bouteflika runs for a fourth term. The opposition is silenced, and the results are a foregone conclusion."

 # --- 2014 Oil Crash ---
 ALG_2014_oil_crash: "Oil Price Collapse"
 ALG_2014_oil_crash_desc: "Plummeting oil prices devastate Algeria's economy. The people blame corruption and demand change."

 # --- Crackdown vs. Reforms (Branching Path) ---
 ALG_silence_hirak: "Crush the Hirak Protests"
 ALG_silence_hirak_desc: "The military and police will suppress dissent. The streets will run red, but the regime will survive."

 ALG_listen_to_hirak: "Concede to Reformist Demands"
 ALG_listen_to_hirak_desc: "Promise political reforms to appease protesters. The old guard will resist, but the people's anger may subside."

 # --- 2019 Elections (Climax) ---
 ALG_2019_elections: "2019 Political Crisis"
 ALG_2019_elections_desc: "Bouteflika's bid for a fifth term ignites nationwide fury. Will Algeria erupt in revolution or submit to tyranny?"
 # --- Mutually Exclusive Endgame Focuses ---
 ALG_new_president: "Appoint a New President"
 ALG_new_president_desc: "The Hirak movement has won. A transitional government will hold free elections, ending decades of authoritarian rule."
 ALG_release_political_prisoners: "Release Political Prisoners"
 ALG_release_political_prisoners_desc: "Thousands of activists, journalists, and opposition figures languish in detention for their role in the Hirak protests. Releasing them would signal a genuine break from the old regime and bolster democratic legitimacy."
 ALG_corrupt_successor: "Install a Loyalist Successor"
 ALG_corrupt_successor_desc: "The military ensures a puppet takes power. Bouteflika's legacy of corruption lives on."
 alg_oil_crash_title: "Oil Prices Collapse"
 alg_oil_crash_desc: "Oil prices collapse, will our Nation Survive?"
 alg_oil_crash_option: "This is Concerning!"
 alg_hirak_victory_title: "The People Win"
 alg_hirak_victory_desc: "After years of protests, Bouteflika steps down. A new era begins—but can it last?"
 alg_military_rule_title: "The Generals Decide"
 alg_military_rule_desc: "The army installs a puppet leader. The Hirak is crushed for now."
 algeria_tebboune.1.t: "The 2019 Presidential Elections"
 algeria_tebboune.1.d: "After months of protests and the resignation of Abdelaziz Bouteflika, Algerians head to the polls in the most contentious election in decades. Many view the process as dominated by the old guard, while others cling to hope for reform or even an Islamist revival. Three main candidates have emerged as frontrunners: Abdelmadjid Tebboune, the continuity candidate tied to the establishment; Ali Benflis, a liberal reformist with his own movement; and Abdelkader Bengrina, an Islamist leader with ties to the Movement of Society for Peace. The choice will determine Algeria's future path."
 algeria_tebboune.1.a: "Elect Abdelmadjid Tebboune"
 algeria_tebboune.1.b: "Elect Ali Benflis"
 algeria_tebboune.1.c: "Elect Abdelkader Bengrina"
 ALG_benflis_tt: "§YAli Benflis§! becomes President of Algeria, leading the liberal reformists."
 ALG_bengrina_tt: "§YAbdelkader Bengrina§! becomes President of Algeria, representing the Islamist opposition."
 kabyle_resistance_info: "The Kabyle region is experiencing unrest. Resistance level: [?state_resistance@438|%Y]"
 kabyle_resistance_effects: "Monitor the provinces of Tizi Ouzou, Bejaia, Jijel and Sétif for rising separatist support [?ALG_resistance_growth_change|-%] (Current: [?ALG_resistance_growth|-%]) Resistance level: [?state_resistance@385|%Y]"
 ALG_kabyle_resistance_tooltip: "Resistance Level in Kabylia:\n[!kabyle_resistance_level_text]"
 ALG_suppress_kabyle: "Suppress the Kabyle Movement"
 ALG_suppress_kabyle_desc: "The Kabyle unrest poses a threat to national sovereignty. We cannot allow secessionist rhetoric to flourish. A strong crackdown may be the only way to reassert control — even if it means facing fierce resistance."
 ALG_recognize_kabyle: "Recognize Kabyle Independence"
 ALG_recognize_kabyle_desc: "Decades of tension, protest, and unrest have led us to this moment. It may be time to acknowledge Kabyle aspirations for independence. Doing so would end the immediate unrest, but at the cost of territorial integrity."
 KBY_granted_autonomy: "Autonomy Granted"
 KBY_granted_autonomy_desc: "Algeria has officially granted us greater self-rule. While we remain part of the Algerian state, our regional governance is now recognized and empowered."
 KBY_suppressed_resistance: "Suppressed by Force"
 KBY_suppressed_resistance_desc: "Following a harsh crackdown by the central government, our region faces tight surveillance, curfews, and political repression."
 KBY_independence_recognized: "Independence Recognized"
 KBY_independence_recognized_desc: "Algeria has formally recognized our right to self-determination. We now stand as an independent state, free to chart our own future."
 ALG_recognize_tamazight: "Recognize Tamazight"
 ALG_recognize_tamazight_desc: "Recognizing Tamazight as an official language is a key demand of the Kabyle population. Doing so may legitimize their cultural identity while preserving national unity."

 ALG_kabyle_cultural_reforms: "Kabyle Cultural Reforms"
 ALG_kabyle_cultural_reforms_desc: "We must support education, local institutions, and cultural rights in the Kabyle region to foster integration and mutual respect."

 ALG_internal_troops_kabyle: "Deploy Internal Troops"
 ALG_internal_troops_kabyle_desc: "The situation in Kabylia demands a strong security presence. We will deploy internal troops to secure the region and suppress unrest."

 ALG_disrupting_kabyle_networks: "Disrupt Kabyle Political Networks"
 ALG_disrupting_kabyle_networks_desc: "Separatist activity is coordinated through underground political networks. Disruption through surveillance and arrests is necessary to preserve national security."
 ALG_disrupt_kabyle_networks: "Disrupt Kabyle Political Networks"
 ALG_disrupt_kabyle_networks_desc: "Separatist activity is coordinated through underground political networks. Disruption through surveillance and arrests is necessary to preserve national security."
 KBY_build_a_new_state: "Build a New State"
 KBY_build_a_new_state_desc: "Now independent, we must lay the foundations of a functioning republic. A constitution, governance, and social services are top priorities."

 KBY_secure_our_borders: "Secure Our Borders"
 KBY_secure_our_borders_desc: "With our sovereignty declared, we must fortify our vulnerable borders and ensure our survival in a hostile environment."
 idea_ALG_neutrality: "Algeria Neutrality"
 idea_ALG_neutrality_desc: "Algeria can no longer afford war, neutrality is our best option."
 idea_ALG_neutrality_2: "Algeria Neutrality"
 idea_ALG_neutrality_2_desc: ""
 idea_ALG_neutrality_3: "Algeria Resurgent"
 idea_ALG_neutrality_3_desc: ""
 ALG_UN_security_council_seat: "Seek UN Security Council Seat"
 ALG_UN_security_council_seat_desc: "As a country that was forcibly divided by the US and the Soviet Union after World War II, which led to the first proxy war in the Cold War, the world should give Algeria some compensation. A permanent seat on the UN Security Council would be a good option.\n\n§Y[USA.GetFlag]The United State§!: [Root.recognises_UNSC_seat_USA]\n§Y[SOV.GetFlag]The Russian Federation§!: [Root.recognises_UNSC_seat_SOV]\n§Y[ENG.GetFlag]The United Kingdom§!: [Root.recognises_UNSC_seat_ENG]\n§Y[FRA.GetFlag]The French Republic§!: [Root.recognises_UNSC_seat_FRA]\n§Y[CHI.GetFlag]The China People's Republic§!: [Root.recognises_UNSC_seat_CHI]"
