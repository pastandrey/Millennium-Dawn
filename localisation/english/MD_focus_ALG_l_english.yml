 ALG_constitution_1996: "1996 Constitution"
 ALG_constitution_1996_desc: "The revised 1996 Constitution was meant to stabilize Algeria after the turmoil of the Black Decade. However, many provisions were designed with regime survival in mind, rather than genuine democratization. Its rigid secular framework was seen by large parts of the Islamist movement as illegitimate and 'un-Islamic.' While it consolidates state control and strengthens the presidency, it also restricts political participation, reduces trust between the government and society, and hinders long-term reform. The legacy of this constitution continues to weigh heavily on Algeria's stability and legitimacy."
 ALG_enahda_media_network_idea: "Ennahda Media Network"
 ALG_enahda_media_network_idea_desc: "The Ennahda movement has established its own media channels to spread its message and mobilize public support. These outlets promote religiously inspired values while criticizing the regime's failures.\n\n§YThis idea will be removed if we are not aligned with Ennahda§!"

 ALG_supreme_islamic_council_idea: "Supreme Islamic Council"
 ALG_supreme_islamic_council_idea_desc: "An advisory council composed of senior ulema and Islamic scholars has been established to guide state policy along religious lines. While not holding direct power, its influence on legislation and public life is significant.\n\n§YThis idea will be removed if we are not Salafist or Islamist§!"
 ALG_new_constitution: "Reformed Constitution"
 ALG_new_constitution_desc: "The outdated 1996 Constitution has been amended to reflect a more balanced and democratic Algeria. While still imperfect, the reforms strengthen institutions, encourage reconciliation between Islamists and secularists, and open space for social and economic progress. Its success will depend on how faithfully it is implemented."
 alg_constitution.1.t: "The Constitution is Reformed"
 alg_constitution.1.d: "After years of controversy, the 1996 Constitution has been revised. The new framework removes some of the most authoritarian provisions, introduces checks on executive power, and seeks to create a better balance between Algeria's Islamic and secular currents. Many view this as a necessary step towards reconciliation, while others doubt whether the reforms will truly change the entrenched system of le pouvoir."
 alg_constitution.1.a: "Adopt the new Constitution"
 alg_constitution.1.a.tt: "Replaces the §Y1996 Constitution§! with a §YReformed Constitution§!, providing bonuses to stability, political power, and economic growth."

