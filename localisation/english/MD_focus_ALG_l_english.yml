 ALG_air_reform4: "Air Reform"
 ALG_naval_reform: "Naval Reform"
 ALG_naval_reform2: "Naval Reform"
 ALG_naval_reform3: "Naval Reform"
 ALG_naval_reform4: "Naval Reform"
 ALG_shipbuilding: "Algerian Shipbuilding"
 ALG_shipbuilding2: "Algerian Shipbuilding"
 ALG_resist_le_pouvoir_system_tt: "§YNew System Unlocked: People's Grievance and Army Influence§!\n\n- §OPeople's Grievance§! measures popular dissatisfaction. It increases if unemployment, education, or healthcare are neglected.\n- If grievance grows too high, mass protests or civil war may break out.\n\n- §OArmy Influence§! tracks the military's role in politics. Weakening it through reforms may allow a peaceful transition, but if influence grows, the army can suppress democracy and tighten its grip.\n\nYou must balance reform, stability, and the military's power to survive this path."
