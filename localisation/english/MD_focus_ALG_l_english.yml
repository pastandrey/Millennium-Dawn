 ALG_request_chinese_protection: "Request Chinese Protection"
 ALG_request_chinese_protection_desc: "Beijing may agree to guarantee Algerian independence and investments."
 ALG_reform_the_military: "Reform the Military"
 ALG_reform_the_military_desc: "The Algerian military requires deep structural reform to meet the challenges of the 21st century."

 ALG_military_academy_upgrade: "Upgrade Military Academy"
 ALG_military_academy_upgrade_desc: "Investing in education is key to building competent and professional officers."

 ALG_internal_security_brigade: "Form Internal Security Brigades"
 ALG_internal_security_brigade_desc: "We must ensure internal order through specialized internal security units."

 ALG_military_industry_support: "Support Military Industry"
 ALG_military_industry_support_desc: "Boosting our military-industrial base will help ensure self-sufficiency."

 ALG_anti_air_force: "Establish Anti-Air Command"
 ALG_anti_air_force_desc: "Air defense capabilities are vital to protect our skies."

 ALG_mechanized_modernization: "Mechanized Forces Modernization"
 ALG_mechanized_modernization_desc: "Modern mechanized units are the core of an effective land force."

 ALG_uav_development: "Drone Development Program"
 ALG_uav_development_desc: "Unmanned aerial systems will give us surveillance and precision strike capability."

 ALG_national_guard_initiative: "National Guard Initiative"
 ALG_national_guard_initiative_desc: "A citizen-based defense corps can help stabilize rural and frontier areas."

 ALG_air_force_reform: "Reform the Air Force"
 ALG_air_force_reform_desc: "Revamping doctrines and equipment is critical for our air superiority."

 ALG_infantry_equipment_project: "Modernize Infantry Equipment"
 ALG_infantry_equipment_project_desc: "Our infantry deserves the latest in weapons and protective gear."

 ALG_ballistic_program: "Ballistic Missile Program"
 ALG_ballistic_program_desc: "Expanding our missile capabilities will enhance strategic deterrence."

 ALG_simulation_center: "Military Simulation Center"
 ALG_simulation_center_desc: "Establishing modern training centers will drastically improve our combat readiness."

 ALG_logistics_command: "Establish Logistics Command"
 ALG_logistics_command_desc: "Streamlining logistics ensures that our troops remain combat-effective."

 ALG_military_doctrine_finalization: "Finalize Military Doctrine"
 ALG_military_doctrine_finalization_desc: "We must consolidate reforms into a modern doctrine."

 ALG_foreign_arms_contracts: "Foreign Arms Contracts"
 ALG_foreign_arms_contracts_desc: "Strategic partnerships can help rapidly fill gaps in our arsenal."

 ALG_local_armor_production: "Local Armor Production"
 ALG_local_armor_production_desc: "Initiating local APC and tank production ensures autonomy and growth."

 ALG_military_university_program: "Military University Program"
 ALG_military_university_program_desc: "Investing in military academics will prepare our next generation of leaders."

 ALG_heavy_artillery_project: "Heavy Artillery Initiative"
 ALG_heavy_artillery_project_desc: "We will prioritize domestic heavy artillery research and development."

 ALG_special_operations_command: "Special Operations Command"
 ALG_special_operations_command_desc: "A centralized command for elite units improves coordination and effectiveness."

 ALG_joint_command_center: "Establish Joint Command Center"
 ALG_joint_command_center_desc: "Combining branches into a joint operations hub will enhance strategic integration."

 ALG_indigenous_rifle_program: "Indigenous Rifle Program"
 ALG_indigenous_rifle_program_desc: "Developing our own advanced small arms is a national priority."

 ALG_integrated_defense_network: "Integrated Defense Network"
 ALG_integrated_defense_network_desc: "A unified radar and communication system strengthens national defense."

 ALG_military_industrial_complex: "Military-Industrial Complex"
 ALG_military_industrial_complex_desc: "Supporting our defense companies will spur innovation and self-reliance."

 ALG_advanced_command_structure: "Advanced Command Structure"
 ALG_advanced_command_structure_desc: "We will implement a modern C4ISR command system for the digital battlefield."

 ALG_military_modernization_complete: "Military Modernization Complete"
 ALG_military_modernization_complete_desc: "Our long path to reform has finally borne fruit — Algeria now fields a modern, cohesive force."

 ALG_full_modern_army_tt: "Algeria now maintains a fully modernized armed force, capable of autonomous military action."
 ALG_military_education: "Military Education Reform"
 ALG_military_education_desc: "We are reforming our military education institutions to produce better officers and accelerate battlefield learning."

 ALG_internal_troops_deployed: "Internal Troops"
 ALG_internal_troops_deployed_desc: "Deploying disciplined internal troops to maintain domestic stability and improve anti-insurgency capabilities."

 ALG_military_industry_idea: "Military Industrial Stimulus"
 ALG_military_industry_idea_desc: "Boosting our arms industry to improve production efficiency and meet growing military demands."

 ALG_anti_air_command: "Anti-Air Command"
