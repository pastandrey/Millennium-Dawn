 ### CABINET COMPOSITION IDEAS ###
 ALG_cabinet_loyal: "Loyal Cabinet"
 ALG_cabinet_loyal_desc: "The current cabinet is composed primarily of loyalists. Political reliability is high, but administrative talent is thin."
 ALG_cabinet_competent: "Competent Cabinet"
 ALG_cabinet_competent_desc: "The current cabinet features capable technocrats and experienced administrators. Governance is effective, though loyalty cannot always be guaranteed."
 ALG_cabinet_balanced: "Balanced Cabinet"
 ALG_cabinet_balanced_desc: "The current cabinet strikes a reasonable balance between political reliability and technical competence."
 ALG_cabinet_reformist: "Reformist Cabinet"
 ALG_cabinet_reformist_desc: "The current cabinet leans toward reform-minded figures with limited ties to the deep state. Governance may improve, but the military establishment is uneasy."
 ALG_cabinet_disloyal: "Disloyal Cabinet"
 ALG_cabinet_disloyal_desc: "Key cabinet members have doubtful loyalty. Governance is paralyzed by factional rivalry and mistrust."
 ALG_cabinet_incompetent: "Incompetent Cabinet"
 ALG_cabinet_incompetent_desc: "The cabinet lacks administrative talent. Policy implementation is slow and unreliable."
 ALG_cabinet_deep_state_dominated: "Deep State Cabinet"
 ALG_cabinet_deep_state_dominated_desc: "The cabinet is heavily penetrated by the military and intelligence establishment. Civilian control is nominal at best."
 ### FINANCE MINISTER SPECIAL ###
 ALG_economic_liberalization: "Economic Liberalization"
 ALG_economic_liberalization_desc: "The Finance Ministry is pursuing liberal economic reforms, opening markets and reducing state intervention."
 ALG_military_industrial_complex: "Military-Industrial Complex"
 ALG_patronage_networks: "Patronage Networks"
 ALG_crush_all_opposition: "Crush All Opposition"
 ALG_control_hydrocarbons: "Control the Hydrocarbons"
 ALG_fortress_algeria: "Fortress Algeria"
 ALG_military_industrial_complex_desc: "The military expands its economic empire, building weapons factories and securing lucrative defense contracts. The officer corps becomes a business class, with generals sitting on corporate boards and accumulating vast wealth."
 ALG_patronage_networks_desc: "A web of patronage connects the regime to business elites and regional power brokers. Loyalty is purchased with contracts, licenses, and access. The state becomes an instrument for private enrichment."
 ALG_crush_all_opposition_desc: "The regime eliminates all organized opposition through arrests, censorship, and intimidation. Political parties are co-opted or banned. Civil society is gutted. Only the regime's voice is heard."
 ALG_control_hydrocarbons_desc: "The state seizes total control of the hydrocarbon sector, funneling oil and gas revenues directly into regime coffers. Foreign partners are squeezed, independent operators are absorbed, and the deep state controls the spigot."
 ALG_fortress_algeria_desc: "Algeria becomes a garrison state - militarized, closed, and suspicious of the outside world. The army is strong, the borders are sealed, and the population is kept in line through a combination of oil wealth and repression."
 ### TOOLTIPS ###
 ALG_oil_crash_weakens_regime_tt: "The oil crash has severely weakened the regime's ability to buy social peace. Popular discontent is rising."
 ALG_hirak_wins_tt: "The Hirak movement has triumphed. A new Algeria is possible."
 ALG_military_wins_tt: "The deep state has prevailed. Military rule continues under a new face."
 ALG_republic_new_era_tt: "A new era begins for the Republic of Algeria. The old system is being dismantled."
 ALG_parliamentary_republic_tt: "Algeria has adopted a parliamentary system of government. The National Assembly is supreme."
 ALG_semi_presidential_republic_tt: "Algeria has adopted a semi-presidential system of government. Power is shared between president and parliament."
 ALG_presidential_republic_tt: "Algeria has adopted a presidential system of government. The president holds dominant executive authority."
 ALG_patronage_enriches_regime_tt: "Patronage networks enrich the regime and its allies at the expense of the Algerian people."
 ALG_fortress_state_tt: "Algeria has become a fortress state. The deep state rules absolutely, and the nation is closed to the world."
 ALG_2019_elections_tt: "The outcome depends on the balance of power between the Hirak movement and the deep state."
 ### IDEA NAMES ###
 ALG_military_industrial_economy: "Military-Industrial Economy"
 ALG_state_hydrocarbon_monopoly: "State Hydrocarbon Monopoly"
 ALG_fortress_state: "Fortress State"
 ### IDEA DESCRIPTIONS ###
 ALG_military_industrial_economy_desc: "The military has expanded into arms production and defense industry, creating a self-sustaining economic base for the regime. Generals sit on corporate boards and the line between uniform and business suit has blurred."
 ALG_state_hydrocarbon_monopoly_desc: "Total state control over oil and gas revenues funds the regime and its patronage networks. The hydrocarbon sector is a closed world where only the connected may operate."
 ALG_fortress_state_desc: "Algeria has become a closed, militarized state. The army is powerful, society is controlled, and the deep state rules without challenge. Stability has been purchased at the price of freedom."

 ### RedMed / Star Aviation Focus Names
 ALG_redmed_group_expansion: "RedMed Group Expansion"
 ALG_redmed_group_expansion_desc: "RedMed Group has proven itself as a reliable logistics partner to the oil and gas sector around Hassi Messaoud. With the right investment, it can grow into a broader industrial force."
 ALG_star_aviation_operations: "Star Aviation Operations"
 ALG_star_aviation_operations_desc: "RedMed Group's aviation subsidiary has maintained a perfect safety record since its founding. We should leverage this reputation to deepen our involvement in the aviation sector."
 ALG_military_aviation_contract: "Military Aviation Contracts"
 ALG_military_aviation_contract_desc: "Star Aviation's operational excellence has caught the attention of the military. Securing defense contracts will open the door to advanced aerospace development — and fund the next phase of expansion."
 ALG_missile_development_initiative: "Missile Development Initiative"
 ALG_missile_development_initiative_desc: "A modern military cannot rely on foreign arms alone. We will begin a domestic missile program through RedMed Group, laying the groundwork for strategic deterrence."
 ALG_star_aviation_uav_division: "Star Aviation UAV Division"
 ALG_star_aviation_uav_division_desc: "With foreign UAV technology in hand, Star Aviation is ready to establish a dedicated drone division. Algerian engineers will study, adapt, and eventually surpass what they have been given."
 ALG_domestic_uav_production: "Domestic UAV Production"
 ALG_domestic_uav_production_desc: "The reverse engineering phase is complete. Star Aviation's facilities are ready to produce Algerian-designed UAVs at scale. This is no longer about imports — it is about sovereignty."
 ALG_russian_missile_cooperation: "Russian Missile Cooperation"
 ALG_russian_missile_cooperation_desc: "Russia's missile industry is among the most advanced in the world. A partnership with Moscow will accelerate our program significantly — at the cost of deepening our dependence on Russian goodwill."
 ALG_chinese_missile_cooperation: "Chinese Missile Cooperation"
 ALG_chinese_missile_cooperation_desc: "China has shown willingness to share missile technology with friendly states. A deal with Beijing offers access to modern systems and strengthens our position in the emerging multipolar world."
 ALG_redmed_star_convergence: "RedMed-Star Convergence"
 ALG_redmed_star_convergence_desc: "The time has come to unite RedMed's missile division with Star Aviation's UAV capabilities under a single integrated defense structure. Algeria will no longer import its security — it will manufacture it."
 ALG_regional_defense_leader: "Maghreb Defense Leader"
 ALG_regional_defense_leader_desc: "Algeria's defense industry now stands without peer in the Maghreb. Our UAVs patrol the Sahara, our missiles deter our rivals, and our technology is sought by neighbors who once looked to Europe. This is what sovereignty looks like."

 ### Decision Category Names
 ALG_uav_procurement_category: "UAV Procurement"
 ALG_uav_procurement_category_desc: "Star Aviation requires a reference platform to begin reverse engineering. Select a foreign UAV supplier."
 ALG_drone_program_category: "Drone Development Program"
 ALG_drone_program_category_desc: "Star Aviation's UAV division is ready to develop Algeria's first domestic drone. Choose a development direction."

 ### UAV Procurement Decisions
 ALG_purchase_turkish_uavs: "Purchase Turkish UAVs"
 ALG_purchase_turkish_uavs_desc: "The Bayraktar TB2 has proven itself in multiple conflicts. Acquiring it from Turkey will provide operational UAV experience and a solid platform for reverse engineering — at the cost of drawing closer to Ankara."
 ALG_purchase_chinese_uavs: "Purchase Chinese UAVs"
 ALG_purchase_chinese_uavs_desc: "China's Wing Loong II offers comparable capabilities to Western systems at a fraction of the price. Beijing has also shown willingness to include technology transfer provisions in such deals."
 ALG_purchase_iranian_uavs: "Purchase Iranian UAVs"
 ALG_purchase_iranian_uavs_desc: "Iran's Mohajer-6 is cost-effective and battle-tested. Acquiring it from Tehran is the cheapest option and deepens ties with a natural strategic partner — though it may draw international scrutiny."

 ### Drone Development Decisions
 ALG_develop_amel_recon_uav: "Develop the Amel UAV"
 ALG_develop_amel_recon_uav_desc: "The Amel will be Algeria's first domestically designed reconnaissance UAV — a high-endurance platform optimized for border surveillance and intelligence gathering across the vast Saharan south."
 ALG_develop_el_djazair_ucav: "Develop the El-Djazair UCAV"
 ALG_develop_el_djazair_ucav_desc: "The El-Djazair will be a true combat drone — an armed UCAV capable of precision strikes. More expensive and technically demanding than a recon platform, but a far more potent military asset."
 ALG_develop_swarm_loitering: "Develop Swarm Loitering Munitions"
 ALG_develop_swarm_loitering_desc: "Rather than a single large drone, Algeria will invest in swarms of small, cheap, coordinated loitering munitions. Harder to intercept, devastating in numbers, and cheaper to produce at scale."

