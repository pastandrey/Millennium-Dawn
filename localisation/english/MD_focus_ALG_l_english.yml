 become_a_UNSC_state1: "Apply for permanent membership of the UN Security Council"
 ALG_a_globalized_algeria: "A Globalized Algeria"
 ALG_a_globalized_algeria_desc: "Today is an era of globalisation, in which Algeria must participate."
 ALG_international_investments: "International Investments"
 ALG_international_investments_desc: ""
 ALG_export_driven_growth: "Export-Driven Growth"
 ALG_export_driven_growth_desc: ""
 ALG_promote_sovereignty: "Promote Sovereignty"
 ALG_promote_sovereignty_desc: ""
 ALG_promote_human_rights: "Promote Human Rights"
 ALG_promote_human_rights_desc: "Human rights above all, even if it's the national sovereignty."
 ALG_extract_favorable_terms: "Extract Favorable Terms"
 ALG_extract_favorable_terms_desc: ""
 ALG_a_norm_entrepreneur: "A Norm Entrepreneur"
 ALG_a_norm_entrepreneur_desc: ""
 ALG_Algeria_resplendent: "Algeria Resplendent"
 ALG_Algeria_resplendent_desc: ""
 ALG_national_strength: "National Strength"
 ALG_national_strength_desc: ""
 ALG_terror_2003_hostage_title: "Sahara Hostage Crisis"
 ALG_terror_2003_hostage_desc: "A group of European tourists were taken hostage in the Algerian desert by Islamist militants. While no casualties were reported, this marks the start of a disturbing rise in organized jihadist activity."
 ALG_terror_2003_hostage_option: "A troubling sign of things to come"

 ALG_terror_monitor: "Monitor Terror Threat"
 ALG_conduct_security_raids: "Conduct Security Raids"

 ALG_terror_threat_category: "Terrorism Threat Monitor"
 ALG_terror_2007_algiers_title: "Algiers Bombings"
 ALG_terror_2007_algiers_desc: "A massive suicide bombing has struck the Government Palace in Algiers. Over 30 civilians and government staff were killed in one of the deadliest attacks in recent years."
 ALG_terror_2007_batna_title: "Batna Bombing"
 ALG_terror_2007_batna_desc: "A suicide bomber detonated a device near a crowd waiting to see the president in Batna. The attack left more than 20 dead."
 ALG_terror_2008_issers_title: "Issers Police Academy Bombing"
 ALG_terror_2008_issers_desc: "A vehicle-borne suicide attack targeted police recruits at Issers academy, killing 43 and injuring dozens."
 ALG_terror_generic_option: "Tragic news."
 ALG_terror_2000_bus_ambush_title: "Bus Ambush Near Médéa"
 ALG_terror_2000_bus_ambush_desc: "Armed militants staged a deadly ambush on a passenger bus near Médéa. Nineteen civilians lost their lives. This attack signals continued instability in the post-civil war period."

 ALG_terror_2002_tazmalt_title: "Tazmalt Bombing"
 ALG_terror_2002_tazmalt_desc: "A bomb exploded in Tazmalt, killing and injuring several civilians. Security forces suspect remnants of the GSPC."

 ALG_terror_2002_miliana_title: "Miliana Bombing"
 ALG_terror_2002_miliana_desc: "A roadside IED detonated near Miliana, wounding several soldiers."

 ALG_terror_2002_hammam_title: "Hammam Righa Bombing"
 ALG_terror_2002_hammam_desc: "A homemade explosive device detonated in Hammam Righa, targeting a military convoy."

 ALG_terror_2002_larbaa_title: "Larbaa Bombing"
 ALG_terror_2002_larbaa_desc: "Militants detonated a bomb in Larbaa, continuing their campaign against state authorities."

 ALG_terror_2002_msila_title: "M'Sila Bombing"
 ALG_terror_2002_msila_desc: "An IED exploded in M'Sila, further showcasing the persistence of terrorist networks in the region."

 ALG_terror_2003_tizi_title: "Tizi Ouzou Bombing"
 ALG_terror_2003_tizi_desc: "A deadly explosion occurred in Tizi Ouzou. Civilians were among the dead, and security forces suspect GSPC involvement."

 ALG_terror_2004_tebessa_title: "Tebessa Bombing"
 ALG_terror_2004_tebessa_desc: "A coordinated bombing in Tebessa killed 7 people. The growing scale of attacks is alarming."
 ALG_idea_arab_diplomacy: "Arab Diplomacy"
 ALG_terror_2005_tidjelabine_title: "Tidjelabine Bombing"
 ALG_terror_2005_tidjelabine_desc: "Two gendarmes were killed in Tidjelabine after a car bomb struck their patrol."
 ALG_relying_on_our_own_strength_spirit: "Relying On Our Own Strength"
 ALG_relying_on_our_own_strength_spirit_desc: "Algeria only needs Algerians to thrive, no one else."
 ALG_reverse_engineering_spirit: "Reverse Engineering Effort"
 ALG_reverse_engineering_spirit_desc: "We don't need to waste time coming up with new designs, we can just look at the pre-existing ones."
 ALG_hydroelectric_power_plants_upgraded_idea: "§RSonatrach§! - Hydroelectric Power Plants Upgraded"
 FLN_legacy_revolution: "§CFLN§!"
 FLN_legacy_revolution_desc: "Front de libération nationale (National Liberation Front) is an Algerian nationalist party. it was the sole legal party until 1989, when it ruled Algeria as a one-party state. After the Algerian Civil War, it regained power in 2002 as the most popular party and remained it ever since. Its ideology follows a pan-Arab nationalist mindset with anti-colonialism as its original core value. It supports socialism, but particularly Arab socialism, as it opposes marxist ideas."
 FLN_nationalize_resources: "Nationalize Resources"
 FLN_nationalize_resources_desc: "Algeria's natural resources are the key to its sovereignty and prosperity. By nationalizing our resources, we can ensure that the wealth generated from oil, gas, and minerals directly benefits the people of Algeria, laying the foundation for long-term economic independence."
 FLN_devlop_industry: "Develop National Industry"
 FLN_devlop_industry_desc: "Algeria's future depends on strengthening its industrial base. By focusing on the development of key sectors such as manufacturing, energy production, and technology, we can reduce dependence on foreign imports and build a self-sufficient economy."
 FLN_expand_hydro: "Expand Hydroelectric Infrastructure"
 FLN_expand_hydro_desc: "To  support our nation's growing energy demands and reduce dependency on Foreign resources , we must invest in expanding Hydroelectric power. Harnessing our rivers will not only provide clean energy but also Strengthen our Industrial base and improve the livelihoods of our citizens."
 FLN_optimize_water_management: "Optimize Water Management"
 FLN_optimize_water_management_desc: "To combat water scarcity and improve agricultural output, we must implement modern water management systems. Efficient distribution and conservation will support both rural communities and growing urban centers while making our land more resilient to drought."
 FLN_hydroelectric_authority: "National Hydroelectric Authority"
 FLN_hydroelectric_authority_desc: "By establishing a centralized hydroelectric authority, we can systematically develop Algeria's untapped water resources. This will provide reliable electricity for industrialization while creating jobs and technical expertise in renewable energy sectors."
 FLN_electrify_rural_algeria: "Electrify Rural Algeria"
 FLN_electrify_rural_algeria_desc: "Bringing electricity to Algeria's countryside is essential for modern development. Through grid expansion and local hydro projects, we can improve living standards, enable mechanized farming, and connect remote communities to national progress."
 FLN_foreign_investment: "Attract Foreign Investment"
 FLN_foreign_investment_desc: "To accelerate our economic development, we must create favorable conditions for international capital. Strategic partnerships in infrastructure and energy projects will bring both funding and technical knowledge while maintaining national sovereignty."
 ALG_revivify_non_aligned_movement: "Revivify the Non-Aligned Movement"
 ALG_revivify_non_aligned_movement_desc: "As a proud member of the Non-Aligned Movement, Algeria must reinvigorate this bloc of independent nations. By strengthening ties with fellow neutral states, we can resist superpower domination and forge a path of true sovereignty in a divided world."

 ALG_reach_out_ASEAN: "Reach out to ASEAN"
 ALG_reach_out_ASEAN_desc: "The nations of Southeast Asia share our desire for development free from foreign interference. Establishing closer cooperation with ASEAN will open new economic opportunities while reinforcing a multipolar world order."

 ALG_support_developing_world: "Support the Developing World"
 ALG_support_developing_world_desc: "Algeria stands in solidarity with oppressed and impoverished nations. Through economic aid, technical exchanges, and diplomatic advocacy, we can help uplift the Global South and challenge neocolonial exploitation."

 ALG_between_east_and_west: "Between East and West"
 ALG_between_east_and_west_desc: "Caught between rival blocs, Algeria must navigate carefully. By maintaining balanced relations with both capitalist and socialist powers, we can secure vital investments without surrendering our independence to either camp."

 ALG_mediate_great_power_conflict: "Mediate Great Power Conflict"
 ALG_mediate_great_power_conflict_desc: "As tensions rise between the superpowers, Algeria can serve as an honest broker. Our neutrality and moral authority position us to de-escalate crises and promote peaceful coexistence in an increasingly unstable world."

 ALG_promote_reconciliation: "Promote Reconciliation"
 ALG_promote_reconciliation_desc: "From Africa to the Middle East, conflicts rage between brothers. Algeria, with its revolutionary heritage and diplomatic experience, must foster dialogue and unity among divided nations."

 ALG_secure_balance: "Secure Balance"
 ALG_secure_balance_desc: "In a world of competing hegemonies, equilibrium is our safeguard. By carefully calibrating our foreign policy, we can prevent domination by any single power while extracting maximum benefits from all."
 ALG_joining_brics: "Join BRICS"
 ALG_joining_brics_desc: "Algeria seeks to strengthen its global influence by joining the BRICS group of emerging economies, enhancing both economic growth and political cooperation."
 ALG_align_with_brazil: "Strengthen Ties with Brazil"
 ALG_align_with_brazil_desc: "Brazil, like Algeria, seeks an independent path in world affairs. By deepening our partnership with this South American giant, we can enhance trade in agriculture and technology while presenting a united front against neocolonial pressures in global forums."
 ALG_align_with_india: "Forge Strategic Partnership with India"
 ALG_align_with_india_desc: "India's non-aligned stance and growing industrial power make it a natural ally. Collaborating on energy projects, military exchanges, and UN diplomacy will strengthen both our nations against superpower dominance while fostering South-South cooperation."
 ALG_islamic_monarchy_idea: "Islamic Monarchy"
 ALG_islamic_monarchy_idea_desc: "Algeria has restored a divine monarchy rooted in Islamic principles and national tradition."

 ALG_caliph_crowned: "Crowned Caliph"
 ALG_caliph_crowned_desc: "The Caliph rules not only by law but by the will of the people and the legacy of the faith."

 ALG_amir_al_muminin_idea: "Amir al-Mu'minin"
 ALG_amir_al_muminin_idea_desc: "Commander of the Faithful — a title with spiritual and political weight across the Islamic world."

 ALG_umayyad_revival_idea: "Umayyad Legacy Restored"
 ALG_umayyad_revival_idea_desc: "Echoing the past glory of the Umayyads, Algeria claims to revive a legacy that once stretched from Damascus to Córdoba."

 ALG_maghreb_alliance_idea: "Pillars of the Maghreb"
 ALG_maghreb_alliance_idea_desc: "Algeria leads an effort to unify the western Islamic world under a new religious and political order."

 ALG_restore_caliphate_in_algiers: "Restore the Caliphate in Algiers"
 ALG_restore_caliphate_in_algiers_desc: "The republic has failed. The time has come to restore a divine monarchy, rooted in faith and history. From Algiers, a new Caliphate shall rise."

 ALG_crown_the_caliph: "Crown the Caliph"
 ALG_crown_the_caliph_desc: "A rightful heir to the Caliphate has been chosen. With a ceremony in Algiers, the crown shall be restored and the world will recognize the new Amir al-Mu'minin."

 ALG_amir_al_muminin: "The Amir al-Mu'minin"
 ALG_amir_al_muminin_desc: "We declare the Caliph as Amir al-Mu'minin — the Commander of the Faithful. This title grants him spiritual and political legitimacy across the Islamic world."

 ALG_umayyad_legacy: "Declare the Umayyad Legacy"
 ALG_umayyad_legacy_desc: "Algeria invokes the memory of the Umayyads, whose glory once stretched across continents. We position ourselves as the inheritors of their legacy."

 ALG_reclaim_al_andalus: "Reclaim al-Andalus"
 ALG_reclaim_al_andalus_desc: "The lands of Al-Andalus were once the jewel of the Islamic world. The time has come to reclaim them and revive our ancient civilization in Iberia."
 ALG_reclaim_the_crown: "Reclaim the Crown"
 ALG_reclaim_the_crown_desc: "The time has come to restore a rightful, divinely-guided monarchy rooted in Islamic legitimacy. In the ashes of republican failure and civil war, we shall resurrect the historical crown—uniting the nation under a royal standard of faith, order, and heritage. Whether an Abbasid successor, a revived Berber dynasty, or a symbol of new Islamic unity, the crown will once again shine over Algeria."

 ALG_pillars_of_the_maghreb: "The Pillars of the Maghreb"
 ALG_pillars_of_the_maghreb_desc: "Algeria seeks unity with its western brothers — Morocco and Tunisia — to form the foundation of a united Islamic bloc in North Africa."
 ALG_monarchy_tt: "§OAs the new Monarch of Algeria, we collect Jizya and Zakat from the faithful. By Allah's guidance, we shall continue our rule.§!"
 ALG_recovering_from_the_civil_war: "La décennie noire"
 ALG_recovering_from_the_civil_war_desc: "The Algerian Civil War left deep scars on the nation. Although the conflict has ended, its effects linger, influencing the political landscape and national psyche. Years after the civil war, Algeria still grapples with its shadows. The wounds of conflict have yet to fully heal, but the nation remains determined to rebuild."
 MSP_non_aligned_revival: "Revive Non-Aligned Foreign Policy"
 MSP_non_aligned_revival_desc: "We will revive the spirit of neutrality and southern solidarity, just as in the 1960s."

 MSP_global_south_solidarity: "Global South Solidarity"
 MSP_global_south_solidarity_desc: "Algeria will strengthen ties with post-colonial nations through trade, diplomacy, and aid."
 MSP_north_africa_first: "North Africa First"
 MSP_north_africa_first_desc: "We will focus on leading diplomacy and development in our immediate region."

 MSP_western_sahara_position: "Support Western Sahara"
 MSP_western_sahara_position_desc: "We reaffirm our support for Sahrawi independence against Moroccan claims."

 MSP_african_union_engagement: "Join the African Union"
 MSP_african_union_engagement_desc: "Algeria must rejoin and take a leadership role in continental diplomacy."

 MSP_sahel_initiatives: "Expand into the Sahel"
 MSP_sahel_initiatives_desc: "We will combat instability and terrorism in the Sahel through soft power and defense."
 MSP_arab_world_outreach: "Deepen Arab Diplomatic Ties"
 MSP_arab_world_outreach_desc: "To strengthen Algeria's influence in the Arab world, we must revitalize our diplomatic outreach and coordination efforts. Through bilateral visits, summits, and trade initiatives, Algeria can assert itself as a unifying force in the region."

 MSP_join_arab_league: "Strengthen Arab League Engagement"
 MSP_join_arab_league_desc: "As an existing member of the Arab League, Algeria can go beyond participation and take on a leading diplomatic role. Promoting economic coordination, defense consultations, and cultural solidarity will enhance our standing in the Arab world."

 MSP_support_palestine: "Support the Palestinian Cause"
 MSP_support_palestine_desc: "Algeria has long stood by the Palestinian struggle for self-determination. Renewed diplomatic support, humanitarian aid, and international advocacy will reaffirm our principled stance in defense of Palestinian rights."

 MSP_algeria_algiers_axis: "Forge the Egypt-Algiers Axis"
 MSP_algeria_algiers_axis_desc: "By aligning more closely with Egypt, Algeria can help form a powerful regional bloc capable of guiding Arab unity, securing North African stability, and counterbalancing foreign influence."

 MSP_condemn_israel: "Condemn Israeli Actions"
 MSP_condemn_israel_desc: "In light of continued aggression and human rights violations, Algeria will formally condemn Israeli actions on the international stage, rallying support for a just peace and opposing normalization without resolution."

 MSP_palestinian_aid_package: "Palestinian Aid Package"
 MSP_palestinian_aid_package_desc: "We will allocate resources to provide humanitarian, economic, and technical assistance to the Palestinian territories, ensuring Algeria's commitment extends beyond words to real, impactful aid."

 MSP_pan_african_defense_initiative: "Pan-African Defense Initiative"
 MSP_pan_african_defense_initiative_desc: "To protect African sovereignty and enhance continental stability, Algeria will propose a coordinated African defense initiative that builds collective military readiness against shared threats."

 MSP_send_troops_to_sahel: "Deploy Forces to the Sahel"
 MSP_send_troops_to_sahel_desc: "In response to growing instability in the Sahel, Algeria will send troops to support peacekeeping operations, border protection, and anti-terror campaigns in collaboration with regional governments."

 MSP_sahel_stabilization_force: "Sahel Stabilization Force"
 MSP_sahel_stabilization_force_desc: "Algeria will take the lead in establishing a permanent Sahel Stabilization Force—an African-led security framework to counter insurgencies and criminal networks in the region."

 MSP_exploit_sahel_resources: "Exploit Sahel Resources"
 MSP_exploit_sahel_resources_desc: "Algerian influence in the Sahel offers access to untapped natural resources. By negotiating mining and infrastructure contracts, we can secure economic gains and strategic partnerships in the region."

 MSP_propose_maghreb_union: "Propose the Maghreb Union"
 MSP_propose_maghreb_union_desc: "It is time to revive the vision of a united Maghreb. Algeria will take the initiative to propose renewed integration efforts, focusing on economic cooperation, joint infrastructure, and diplomatic alignment."

 MSP_economic_integration_initiative: "Maghreb Economic Integration"
 MSP_economic_integration_initiative_desc: "Through reduced tariffs, infrastructure investment, and synchronized monetary policy discussions, Algeria will drive efforts to create a common Maghreb economic zone that benefits all member states."

 MSP_maghreb_joint_defense_pact: "Maghreb Joint Defense Pact"
 MSP_maghreb_joint_defense_pact_desc: "A secure Maghreb requires collective defense. We will propose a regional military pact focused on border protection, intelligence sharing, and joint military exercises."
 MSP_mediterranean_dialogue: "The Mediterranean Dialogue"
 MSP_new_era: "A New Era"
 MSP_new_era_desc: "A new era will be brought about for the region. An era of peace, and stability, free from oppression, and injustice"
 MSP_islamic_nato: "Islamic NATO"
 MSP_islamic_nato_desc: "While NATO provides us security, NATO members have shown their complete disregard of the Middle East. If they can't provide the stability and prosperity, we must take up the mantle. We will form our own military alliance, the Mediterranean Treaty Organization, or MTO"
 MSP_invite_iraq: "Invite Iraq"
 MSP_invite_iraq_desc: "We need to invite Iraq into our alliance as they are slowly starting to get their act together, and we would seriously benefit from mutual cooperation"
 MSP_invite_syria: "Invite Syria"
 MSP_invite_syria_desc: "Having Syria just south of our nation means that we are very vulnerable. Inviting Syria into our faction would be a great way to guarantee our security and safety"
 MSP_invite_algeria: "Invite Egypt"
 MSP_invite_algeria_desc: "Egypt is an up and coming power-house, and with a population of its size, our alliance will be able to achieve virtually anything"
 MSP_assistance_to_bulgaria: "Assistance to Bulgaria"
 MSP_assistance_to_bulgaria_desc: "We should assist Bulgaria in developing its infrastructure so that we may be able to conduct more investments beyond its borders with ease"
 MSP_islamic_economic_cooperation: "Islamic Economic Cooperation"
 MSP_islamic_economic_cooperation_desc: "Many Muslim countries are swimming in money and they use that money for nonsensical things. We should form an economic alliance to pool our resources into common economic project"
 MSP_supp_plo: "Support the PLO"
 MSP_supp_plo_desc: "The Palestinian Liberation Organization (PLO) has long been a key player in the fight for Palestinian self-determination. Supporting the PLO could bolster our standing with international allies and promote a peaceful resolution to the conflict."
 MSP_the_pal_issue: "The Palestinian Issue"
 MSP_the_pal_issue_desc: "The question of Palestine remains a pivotal issue in our foreign policy. Our stance on the Palestinian struggle will define our international alliances and influence in the region. We must decide how to address this ongoing conflict."
 MSP_supp_hamas: "Support Hamas"
 MSP_supp_hamas_desc: "Hamas represents a significant faction within the Palestinian resistance. By providing support, we can strengthen our ties with this group, enhancing our influence in the region and aligning ourselves with their struggle."
 MSP_algeria_islamic: "§GMSP§!"
 MSP_algeria_islamic_desc: "Mouvement de la société pour la paix (Movement of Society for Peace) is a right-wing to far-right political party in Algeria. It was founded in 1990 by the Muslim Brotherhood, which it remains aligned with. It is Sunni Islamist and follows islamic, conservative democracy. It had its largest success in the 1997 legislative elections, being the second largest party and getting 69 out of 380 seats. It also ran once in the presidential elections in 1995, getting 25.6% of votes. It entered an electoral coalition with the MRN and MRI in 2012. The party is known also as \"Hamas\", as an abbreviation of its Arabic name \"Harakat mujtama' as-silm\"."
 MSP_Get_rid_of_military_corrupt: "Purge The Military Corrupts"
 MSP_Get_rid_of_military_corrupt_desc: "The Military is entrenched in our institutions and are a clear threat to our country's future. We will arrest them on corruption charges and confiscate what properties we can get our hands on"
 MSP_islamist_opposition_victory: "Islamist Opposition Government"
 MSP_islamist_opposition_victory_desc: "The islamist opposition coalition has won the elections and will be tasked in leading Algeria into becoming a conservative islamic republic"
 MSP_islamist_renaissance: "Islamist Renaissance"
 MSP_islamist_renaissance_desc: "Our victory has emboldened our support throughout the masses. A new culture has evolved and we are all for supporting it"
 MSP_empower_sharia_courts: "Empower Sharia Courts"
 MSP_empower_sharia_courts_desc: "It's time to empower the islamic judiciary and expand it's influence"
 MSP_turkish_inspired_islamism: "Turkish Inspired Islamism"
 MSP_turkish_inspired_islamism_desc: "We will draw inspiration from the islamist movements that took place in turkey after the establishment of their republic. This will paint our movement in a more favorable light for now and may attract turkish conservative businessmen into investing in our country."
 MSP_deregulate_economy: "Deregulated Economy"
 MSP_deregulate_economy_desc: "To empower the middle classes and merchants that we draw lots of our support from, we will reduce restrictions on them and provide the space required for their growth"
 MSP_algerian_islamic_movement: "Algerian Islamic Movement"
 MSP_algerian_islamic_movement_desc: "The Islamic movement in short was an islamist movement in turkey that was very popular between students advocating for a pacifist and modern view of islam. We will draw inspiration from their teachings and reform our school curriculums to advocate for islamic values and teach them to students as well as improve education overall."
 MSP_moderate_conservatism: "Moderate Conservatism"
 MSP_moderate_conservatism_desc: "We will root out extremist elements within our ranks and reshape our image as a force for conservatism that has nothing to do with religious fanaticism"
 MSP_religious_values: "Our Values Unwavering"
 MSP_religious_values_desc: "It might be that our previous policies to appease the populace and soften our image has allowed us to stray from the true values our ideals are built upon. We care less for what others view us and our only goal is to establish sharia in our lands nomatter how unpopular that may be"
 MSP_religious_economic_charity: "Religious Donations"
 MSP_religious_economic_charity_desc: "Our movements have been always associated with charities and foundations that have been beneficial to our communities. Now that we have a more prominent position we will institutionalize them further to alleviate our economic burdens"
 MSP_qatari_support: "Qatari Support"
 MSP_qatari_support_desc: "We have drawn the interest of various qatari investors"
 MSP_flourishment_of_central_economy: "Develop Urban Centres"
 MSP_flourishment_of_central_economy_desc: "Our support base mainly comes from various urban regions and we should start to develop them to embolden our support from their population"
 MSP_turkish_investments: "Turkish Investments"
 MSP_turkish_investments_desc: "We have attracted lots of turkish investors thanks to our deregulation policies as well as our ideological similarities to them"
 MSP_reverse_secularization: "Reverse Secularization"
 MSP_arm_palestinians_to_fight: "Arm Palestinians"
 MSP_arm_palestinians_to_fight_desc: "Jordan is home to a large population of Palestinian refugees. We can turn these refugees into fighters, and instigate them to cause havoc in Palestine and Israel. Since they are proxy fighters, we can use them to instigate Israel to retaliate, making them look like the bad guy in the conflict"
 MSP_zionist_threat: "The Zionist Threat"
 MSP_zionist_threat_desc: "Israel is the biggest affront to all Muslims, and an abominable fake state in the heart of Islam. They need to be wiped off the face of the earth."
 MSP_help_sahara: "Our Saharian Friends"
 MSP_help_sahara_desc: "We are in contact with many movements that support our pan-Arabist cause, one such movement is the Polisario Front, which seeks to liberate the people of Northern Sahara. For the past century the Polisario fought colonial and then Moroccan oppression and now the Fron controls only a small area of the Western Sahara. For the moment the conflict is frozen, but we can change that by sending our friends military aid and equipping the Sahrawi with everything they need to continue their struggle."
 ALG_kabyle_issue: "Kabyle Issue"
 ALG_kabyle_issue_map: "Satisfaction of the [KBY.GetFlag] Amazigh People on our Government!"
 ALG_2014_oil_crash_idea: "Oil Crash"
 ALG_algeria_resplendent: "Algeria Resplendent"
 ALG_algeria_resplendent_desc: ""
 KBY_new_state_born: "A New State Is Born"
 KBY_new_state_born_desc: "Kabylia has been reborn as a sovereign nation. The early days of our independence must be marked by consolidation, celebration, and caution."

 KBY_border_readiness: "Border Readiness"
 KBY_border_readiness_desc: "We must secure the perimeter of our homeland to prevent infiltration, smuggling, or incursions."

 KBY_diplomatic_push: "Diplomatic Push"
 KBY_diplomatic_push_desc: "Gaining international recognition is vital to our survival. We will initiate an organized diplomatic campaign."

 KBY_new_institutions: "New Institutions"
 KBY_new_institutions_desc: "A functioning state must stand on the foundation of trusted and stable institutions."

 KBY_state_economy_plan: "State Economic Plan"
 KBY_state_economy_plan_desc: "We must outline the structure of our economy — whether it be centralized, market-driven, or mixed."

 KBY_african_diplomacy: "African Diplomacy"
 KBY_african_diplomacy_desc: "Seeking regional legitimacy among African neighbors will bolster our standing and economic opportunities."

 KBY_internal_stability_measures: "Internal Stability Measures"
 KBY_internal_stability_measures_desc: "Maintaining internal stability is essential. We will empower institutions to ensure peace and order."


 KBY_international_recognition_campaign: "International Recognition Campaign"
 KBY_international_recognition_campaign_desc: "Our survival depends on legitimacy in the eyes of other nations. Launch a targeted diplomatic push."
 KBY_international_recognition_campaign_completion: "Diplomatic channels opened—now begins the hard work of persuasion."

 KBY_establish_governance_structures: "Establish Governance Structures"
 KBY_establish_governance_structures_desc: "Institutions must be created to ensure that our governing principles endure."
 KBY_establish_governance_structures_completion: "Governmental institutions are now operational, ready to serve our citizens."



 KBY_plan_the_economy: "Plan the Economy"
 KBY_plan_the_economy_desc: "Decide our economic future: state-led, liberal, or mixed. Each path offers unique trade‑offs."
 KBY_plan_the_economy_completion: "Economic planning underway—choose wisely for long‑term prosperity."



 KBY_seek_regional_support: "Seek Regional Support"
 KBY_seek_regional_support_desc: "Support from our neighbors and the African community will strengthen our legitimacy."
 KBY_seek_regional_support_completion: "Regional outreach efforts deployed—now awaiting responses."



 KBY_secure_internal_stability: "Secure Internal Stability"
 KBY_secure_internal_stability_desc: "With external threats under control, we must address internal dissent and resistance."
 KBY_secure_internal_stability_completion: "Security protocols activated—public order has improved."

 # KBY.10 - Diplomatic Push
 KBY.10.t: "Establishing International Relations"
 KBY.10.d: "With our independence now recognized by the international community, it is time for Kabylia to establish formal diplomatic relations with other nations. Our diplomats are prepared to reach out to potential partners, starting with France—given our historical ties—and Turkey, which has shown interest in the Amazigh cause.\n\nThis diplomatic push will help legitimize our young nation and open doors for future cooperation."
 KBY.10.a: "We will reach out to all nations!"
 # KBY.15 - African Union Membership
 KBY.15.t: "Seeking African Unity"
 KBY.15.d: "Our African diplomacy initiative has laid the groundwork for deeper integration with the continent. The African Union represents an important forum for our nation—membership would provide legitimacy, economic opportunities, and a platform to advocate for Amazigh rights across North Africa.\n\nNiger, with its significant Tuareg population, has expressed support for our application."
 KBY.15.a: "Apply to the African Union"
 # KBY.20 - Economic Model Choice
 KBY.20.t: "Choosing Our Economic Path"
 KBY.20.d: "As a new nation, we must decide the fundamental structure of our economy. This choice will shape our development for decades to come.\n\nShould the state take the lead in guiding economic development, ensuring resources benefit all citizens? Or should we embrace free markets, allowing private enterprise to drive growth? Perhaps a middle path—combining state oversight with market freedoms—would serve us best."
 KBY.20.a: "Adopt a State-Led Economy"
 KBY.20.b: "Pursue a Liberal Market Economy"
 KBY.20.c: "Choose a Mixed Model"
 # Named Threats
 KBY_diplomatic_push: "Kabylian Diplomatic Push"
 KBY_au_membership_attempt: "Kabylian AU Membership Attempt"
 KBY_state_economy_model_statist: "State-Led Economy"
 KBY_state_economy_model_liberal: "Liberal Market Economy"
 KBY_state_economy_model_mixed: "Mixed Economic Model"


# Tree Title
 ALG_recover_from_the_war: "Recovering from the Civil War"

# First Tier
 ALG_restoring_order: "Restoring Order"
 ALG_restoring_order_desc: "The immediate priority is reestablishing state authority and halting the chaos that continues in some regions. The population longs for peace and structure after years of devastation."

 ALG_secure_weapons_shipments: "Secure Weapons Shipments"
 ALG_secure_weapons_shipments_desc: "Ensuring our army is well-supplied will allow us to maintain internal order and prevent renewed insurgency."

 ALG_recover_from_the_war_desc: "We must now begin the long process of rebuilding our nation. The Black Decade has scarred Algeria, but with determination, we can rise from the ashes."

# Economic Path
 ALG_restoring_the_broken_economy: "Revive the National Economy"
 ALG_restoring_the_broken_economy_desc: "The civil war has paralyzed our financial institutions. We must implement emergency measures to stabilize the economy."

 ALG_arresting_extremists: "Neutralize Armed Threats"
 ALG_arresting_extremists_desc: "Extremist groups still operate in remote areas. A renewed security campaign will restore full national control."

 ALG_economic_recovery: "Economic Recovery"
 ALG_economic_recovery_desc: "Our policies are beginning to yield results. We are now entering a phase of gradual recovery and rebuilding confidence."

 ALG_regain_banks: "Restore Confidence in Banking Sector"
 ALG_regain_banks_desc: "Reviving the banking sector is crucial to restoring investor trust and restarting domestic credit."

 ALG_financial_reform: "Reform the Financial System"
 ALG_financial_reform_desc: "Modernizing Algeria's financial system will encourage sustainable growth and allow us to avoid future shocks."

 ALG_begin_full_recovery: "Begin Full Economic Restoration"
 ALG_begin_full_recovery_desc: "With security ensured and the economy stabilized, we can now begin a full, nationwide economic revival."

# Infrastructure Path
 ALG_repairing_the_roads: "Repair the Infrastructure"
 ALG_repairing_the_roads_desc: "Roads, bridges, and communication lines have collapsed. Rebuilding our logistical network is essential for national cohesion."

 ALG_rebuild_north: "Rebuild Kabylie & Algiers"
 ALG_rebuild_north_desc: "These urban centers were among the worst hit. Priority must be given to restoring basic services in Kabylie and Algiers."

 ALG_rebuild_centre: "Rebuild the Highlands"
 ALG_rebuild_centre_desc: "The central highlands were both a battlefield and a humanitarian crisis. They need targeted reconstruction."
 ALG_rebuild_west: "Rebuild the West"
 ALG_rebuild_west_desc: "Infrastructure in the West was neglected even before the war. It is time to integrate these remote regions."
 ALG_rebuild_algeria: "Rebuild Algeria"
 ALG_rebuild_algeria_desc: "It's time to rebuild our nation and become the great power again, this civil war caused too much wound now it's time to heal"

 ALG_rebuild_south: "Rebuild the South"
 ALG_rebuild_south_desc: "Infrastructure in the south was neglected even before the war. It is time to integrate these remote regions."

 ALG_order_restored_in_algeria: "Order Restored in Algeria"
 ALG_order_restored_in_algeria_desc: "For the first time in decades, Algeria is stable and united. The path ahead is long, but peace has returned."

# Factory Path
 ALG_state_and_imf_funding: "State & IMF Funding"
 ALG_state_and_imf_funding_desc: "Through loans and foreign aid—especially from the IMF—we can inject life into our deadlocked economy."

 ALG_restocking_factories: "Restocking Factories"
 ALG_restocking_factories_desc: "Many factories were damaged or emptied. With new supplies, we can restart production."

 ALG_rebuilding_factories: "Rebuilding Industrial Zones"
 ALG_rebuilding_factories_desc: "Several industrial zones have fallen into ruin. Rebuilding them will provide jobs and produce materials needed for recovery."

 ALG_export_controls: "Export Controls & Federation Aid"
 ALG_export_controls_desc: "To protect strategic goods and ensure internal development, we'll impose temporary export restrictions—balanced by external support."

# Civil War Recovery Ideas

 ALG_post_war_recovery: "Post-Civil War Recovery"
 ALG_post_war_recovery_desc: "Algeria remains scarred by the brutal civil conflict of the 1990s. Though peace has been restored, the nation still suffers from instability, underutilized factories, strained infrastructure, and a fragile political system."

 ALG_imf_funding_idea: "IMF Emergency Funding"
 ALG_imf_funding_idea_desc: "The International Monetary Fund has stepped in to provide much-needed liquidity and budgetary relief. While these funds help stabilize the economy, they come with strings attached."

 ALG_export_controls_idea: "Export Controls"
 ALG_export_controls_idea_desc: "In order to prioritize domestic recovery, the government has imposed export restrictions on key materials. This policy stabilizes internal markets but can damage international trade relations."

 ALG_anti_terror_sweeps: "Anti-Terror Operations"
 ALG_anti_terror_sweeps_desc: "Security forces are carrying out aggressive operations to eliminate remaining extremist elements. While this improves national safety, it must be balanced to avoid suppressing civil freedoms."

 ALG_banking_confidence_restored: "Banking Sector Confidence Restored"
 ALG_banking_confidence_restored_desc: "After a period of severe distrust and stagnation, the banking sector has regained some stability, allowing both citizens and investors to reengage with Algeria's financial system."

 ALG_structural_reform: "Structural Economic Reforms"
 ALG_structural_reform_desc: "Comprehensive reforms are underway to modernize Algeria's economy. These changes aim to reduce inflation, streamline institutions, and promote long-term growth."

 ALG_national_recovery_completed: "National Recovery Completed"
 ALG_national_recovery_completed_desc: "With infrastructure rebuilt, security ensured, and the economy revived, Algeria has finally emerged from its darkest chapter. A new era of hope and progress begins."
 ALG_whispers_of_power_TT: "£decision_icon_small §YUnlocks§! Nuclear Ambitions §YDecisions§!"
 ALG_mastering_atom: "Mastering the Atom"
 ALG_missile_chi_TT: "Algeria will upgrade their §HNuclear Reactor§! Technology"
 CHI_rejected_ALG: " Offer Rejected by China"
 ALG_technological_ties: "Technological Ties"
 ALG_steal_russ_TT: "Enables §YSteal Russian ICBM's§! mission.\n(Requires §YArmy Infiltration§!)"
 # Nuclear Tree

 ALG_continue_1991_program: "Continue the 1991 Nuclear Program"
 ALG_continue_1991_program_desc: "Although our nuclear program was suspended in the 1990s, its foundations remain. By reviving the old projects, we can pursue both energy security and greater independence—though international sanctions are likely to follow."

 ALG_seek_china_help: "Seek Chinese Assistance"
 ALG_seek_china_help_desc: "China has long been willing to cooperate with Algeria on nuclear technology. Renewed partnership will provide us with equipment, expertise, and training that bypasses Western restrictions."

 ALG_1983_deal: "Revive the 1983 Missile Deal"
 ALG_1983_deal_desc: "Our earlier cooperation with China in 1983 provided us with missile technology and limited nuclear assistance. Reviving this arrangement would accelerate both our civilian and military nuclear ambitions."

 ALG_missile_cooperation: "Expand Missile Cooperation"
 ALG_missile_cooperation_desc: "Beyond reactors and fuel, China can also provide us with missile systems capable of carrying nuclear payloads. This step, however, will attract serious attention from the West."

 ALG_hoggar_nuclear_facility: "Construct the Hoggar Facility"
 ALG_hoggar_nuclear_facility_desc: "Deep in the Hoggar mountains, a secure nuclear facility can be built, shielded from outside interference. This will serve as the centerpiece of Algeria's nuclear program."

 ALG_the_search_for_uranium: "The Search for Uranium"
 ALG_the_search_for_uranium_desc: "Our scientists are convinced that Algeria's vast desert hides large uranium reserves. Locating and extracting these deposits will provide the backbone of any independent nuclear project."

 ALG_dig_in_tamanrasset: "Dig in Tamanrasset"
 ALG_dig_in_tamanrasset_desc: "Tamanrasset's desert plains conceal significant uranium deposits. By investing in mining infrastructure here, Algeria can free itself from dependency on foreign suppliers."


 ALG_withdrawal_from_npt: "Withdraw from the NPT"
 ALG_withdrawal_from_npt_desc: "Algeria can no longer allow its sovereignty to be bound by foreign treaties. By withdrawing from the Nuclear Non-Proliferation Treaty, we declare our intent to pursue nuclear weapons openly."

 ALG_wmds: "Weapons of Mass Destruction"
 ALG_wmds_desc: "With enrichment facilities complete and missiles ready, the time has come to finalize Algeria's nuclear deterrent. The world will take notice, and our enemies will think twice before threatening us."

 ALG_algiers_agreement: "The Algiers Agreement"
 ALG_algiers_agreement_desc: "Instead of pursuing nuclear armament, Algeria can present itself as a champion of peace. The Algiers Agreement will serve as a pledge of restraint, opening the door to foreign investment and international legitimacy."

 ALG_sign_BWC: "Sign the Biological Weapons Convention"
 ALG_sign_BWC_desc: "By acceding to international agreements against weapons of mass destruction, we demonstrate Algeria's commitment to peace. This will reassure foreign investors and reduce suspicion about our nuclear activities."
 ALG_build_nuclear_reactor: "Build a Nuclear Reactor"
 ALG_build_nuclear_reactor_desc: "Our nuclear program is ready to take the next step. By constructing a full-scale reactor, Algeria will acquire both a powerful source of energy and a front for further enrichment activities. While the world may see peaceful intent, the reality may be far more complex."

 ALG_IAEA_safeguards_leave: "IAEA Safeguards Completed"
 ALG_IAEA_safeguards_leave_desc: "After years of oversight and compliance, Algeria has fully implemented its commitments under the Algiers Agreement and the Biological Weapons Convention. With the final IAEA inspectors departing our territory, sanctions are lifted and our nation is recognized as a responsible regional power."

 ALG_reformist_better_TT: "If we have a £ALG_Autocracy §HReformist President§! we will be able to remove the §HNo Diplomatic Ties§! modifier with the §H[USA.GetFlag] United States§!\n - This will be available as an Algerian presidential decision in the §HSend Diplomats to the West§! decision\n - If relations are high enough, they may be compelled to lift all sanctions rather than just ease them"
