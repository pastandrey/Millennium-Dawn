 CT_TERR_ORGS: "§YTerrorist Organizations§!"
 CT_TERR_ORGS_TT: "A list of all known active terrorist organizations."
 CT_CUR_INTEL: "§YCurrent Intelligence On:§!"
 CT_CUR_INTEL_TT: "Displays our current intelligence on the selected organization."
 CT_CUR_THREAT: "§RTerror Threat Level§!"
 CT_CUR_THREAT_TT: "Displays the current estimated threat level of a terror attack from the organization. The worse this gets, the more likely a terror attack is to occur."
 CT_CUR_DEFENSE: "§YTerror Defense Level§!"
 CT_CUR_DEFENSE_TT: "Displays our current defensive level against a terror attack. The higher this gets, the less likely a terror attack is to succeed inside our nation."
 CT_CUR_SEL_INTEL: "§YIntel Accuracy§!"
 CT_CUR_SEL_INTEL_TT: "Displays how effective our intelligence gathering currently is against this organization"
 CT_CUR_LOCATION: "§YPossible Headquarters Location§!"
 CT_CUR_LOCATION_TT: "Displays where we possibly think a regional headquarters may be located."
 CT_CUR_FOREIGN: "§YForeign Advisors§!"
 CT_CUR_FOREIGN_TT: "This number represents the number of countries that have sent us advisors to assist with our counter-terrorism operations. Each nation that sends an advisor will increase our §YIntel Accuracy§! modifier by §G1%§!, improving our §YIntel Accuracy§!. Additionally, nations with §YForeign Advisors§! in our nation will have their operations inside our nation improved."
 CT_SYS_DESC: "The §YCounter-Terror System§! works by having the global situation determine if terror organizations will increase in threat, and how visible they are to intelligence agencies. As the §RTerror Threat Level§! rises, the frequency and strength of attacks by the organization will increase. World Tension, country content, and player actions can increase or decrease the §RTerror Threat Level.§! These numbers are updated monthly, or after major actions.\n\nPlayers can conduct intelligence gathering operations using the spy system, actions in this menu, and conduct raids using the raids system, to gather intelligence, and reduce §RTerror Threat Level§!. As §YIntel Accuracy§! rises, you will be able to more specifically target terror organizations, culminiating with the ability to raid their HQ and eliminate the threat."
