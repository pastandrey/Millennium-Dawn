 is_ct_infil_agent_tt: "Attempts to infiltrate an agent into §Y[name_of_org_disp]§!. If successful, we will gain a permanent boost to our §YIntel Accuracy§!. If the infilatration fails, our §YIntel Accuracy§! will degrade for a short time, and §Y[name_of_org_disp]'s§! §RTerror Threat Level§! will rise.\n\nThe chance to succeed on the infil attempt is modified by our §YIntel Accuracy§! and overall §YIntelligence Agency§! agent training."
 is_ct_asset_seizure_tt: "Seizing assets will reduce the §RTerror Threat Level§! of §Y[name_of_org_disp]§!, but will also make it harder to gain §YIntel Accuracy§! against §Y[name_of_org_disp]§! for a short time."
 is_ct_arrest_sympathizers_tt: "Arresting Sympathizers will reduce the §RTerror Threat Level§! of §Y[name_of_org_disp]§!, allong with increasing §YIntel Accuracy§! on §Y[name_of_org_disp]§!. However, there is a chance innocent people can be caught up in the arrests, and if they are caught, we may face political backlash.\n\nThe effectiveness of the arrests will depend based on our §YIntel Accuracy§! and our §YIntelligence Agency§! Counter-Intelligence and Counter-Terrorism upgrades.\n"
