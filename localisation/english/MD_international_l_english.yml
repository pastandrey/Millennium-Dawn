 un_ascent_effect_tt: "Submits a request for §BUN§! §YAscension§!, starting with a §YSecurity Council§! Vote, and then proceeding to a §YGeneral Assembly§! vote if the §YSecurity Council§! vote passes.\n\nTo achieve §YInternational Recognition§! and be accepted as a §BUnited Nations§! state, we must accomplish the following:\n\n§GPass§! a recommendation vote in the §YSecurity Council§!, requiring §Y9§! §GYes§! votes in total and §Y0§! §RNo§! votes by a §YPermanent Security Council Member§!\n\n§GPass§! a §Y2/3§! majority vote in the §BUnited Nations§! §YGeneral Assembly§!, after §GPassing§! the §YSecurity Council§! vote."
