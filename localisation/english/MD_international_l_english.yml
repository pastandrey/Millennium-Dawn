 #IDEAS FOR CT
 CT_internet_monitoring: "Mass Data Gathering Protests"
 CT_internat_monitoring_desc: "Our citizens have begun protesting our efforts to protect them through mass data gathering. We must ride out their outrage..."
 CT_protesting_arrests: "Counter-Terror Arrests Protests"
 CT_protesting_arrests_desc: "Our citizens have begun to protest our use of mass arrests to deal with terrorism threats. We should improve the quality of our intelligence to prevent protests like these in the future."
 CT_struck_by_terror_attack: "Struck by Terror Attack"
 CT_struck_by_terror_attack_desc: "Our nation has be struck by a terror attack from an international terror organization. It will take us time to recover from this brutal attack, both from a military and economic standpoint."
 CT_terror_attack_happened: "Global Terror Attack Occured"
 CT_terror_attack_happened_desc: "Our citizens are afraid that they may be next, if the terror attacks around the world keep occuring. We must do something to ensure their security."
 CT_terror_attack_prevented: "Terror Attack Prevented"
 CT_terror_attack_prevented_desc: "Our intelligence and Counter-Terrorism forces have recently stopped a terror attack against our nation, solidifying the people's faith in our ability to protect them!"

 MD_terror.1.t: "[org_doing_attack] Conducts Terror Attack!"
 MD_terror.1.d: "[org_doing_attack] conducted a terror attack against us today, an attack our intelligence and counter-terrorism agencies were unable to prevent. Reports about the damage and casulties are still coming in, but they are estimated to both be significant. We must now make a decision about our next move, in order to provide safety, security, and support to our citizens in this time of crisis."
 MD_terror.1.a: "We need to let local responses ocurr."
 MD_terror.1.b: "Send as much aid as we can!"

 MD_terror.2.t: "[org_doing_attack] Terror Attack Prevented!"
 MD_terror.2.d: "[org_doing_attack] attempted to conduct a terrorist attack today, but it was prevented thanks to the effective intelligence gathering of our agencies, and the brave action of our counter-terrorism teams. All of the involved terrorists have been either killed or captured, and their safehouses are currently being investigated for any further intelligence we can gain. Today is a great success for our Counter-Terror Forces!"
 MD_terror.2.a: "A Great Victory for [THIS.GetNameDef]!"

 MD_terror.3.t: "[FROM.GetName] Struck by Terror Attack!"
 MD_terror.3.d: "[FROM.GetName] was struck today by an attack from [org_doing_attack_int], who have managed to inflict significant damage and casulties on the the nation. As [FROM.GetName] reels from the attack, our own citizens are beginning to grow concerned about the possability of attacks on our own soil. We must make choices on if we shall send support to [FROM.GetName], and must decide what we shall do to provide comfort to our own citizens."
 MD_terror.3.a: "What a tragedy."
 MD_terror.3.b: "We must tighten our own security!"

 MD_terror.4.t: "[FROM.GetName] Prevented Terror Attack!"
 MD_terror.4.d: "The government of [FROM.GetName] annouced today that they had successfully prevented a terror attack by [org_doing_attack_int] inside their nation, using effective intelligence, police, and military operations to disrupt the terror cell prior to their attack. This success today is a great acheivement for the Global War on Terror!"
 MD_terror.4.a: "[FROM.GetNameDef] clearly was prepared."

 MD_terror.5.t: "Protests over Mass Data Collection"
 MD_terror.5.d: "Due to leaks in our intelligence community, the public has become aware of our mass data collection, in our efforts to prevent terrorism. The people, however, have seen this as a massive invasion of privacy, and have begun to criticize and protests against what they see as government overreach."
 MD_terror.5.a: "It's for their own good!"

 MD_terror.6.t: "Protests over Mass Arrests"
 MD_terror.6.d: "While our mass arrests of [name_of_org_disp] supporters have been effective in disrupting their operations, we have also accidentially arrested a large number of innocent civilians and bystanders, simply due to bad intelligence. As a result, the public has become upset with our counter-terror operations, and are beginning to protest the use of mass arrests and other critical techniques we must use to keep our nation safe."
 MD_terror.6.a: "Is saying sorry not enough?"

 MD_terror.7.t: "Succesful Infiltration!"
 MD_terror.7.d: "Our agent has finally reported back: he is successfully in place, and is now inside the organization. It may take some time, but as we move our operations foward, the intelligence they are able to pass us will be of great use to our nation."
 MD_terror.7.a: "His information will be of great value!"

 MD_terror.8.t: "Agent Killed"
 MD_terror.8.d: "Unfortunately, after not hearing from our agent for some time, we finally know why. A video was posted today by [name_of_org_disp], showing them executing our agent, amoung several others. He was clearly found out or caught, and as a result, any information we had from him before, or are currently gathering, has less value, as they know we are looking into him now."
 MD_terror.8.a: "What a loss"

 MD_terror.9.t: "Anger over Increased Security Measures"
 MD_terror.9.d: "Citizens have become upset at the increased security measures we have implemented, that have complicated air, sea, and land travel on public transportation. They are also upset about the increased security levels at government events, which are causing a strain on our relations with our citizens."
 MD_terror.9.a: "The Measures Must Stay!"
 MD_terror.9.b: "Perhaps we can reduce their impact a bit..."

 MD_terror.11.t: "[FROM.GetName] Proposes Joint Counter-Terror Exercises"
 MD_terror.11.d: "[FROM.GetName] has proposed that we conduct joint Counter-Terrorism exercises, to expand the capabilities of our military forces and counter-terrorism forces. If we accept, we will have to spend some funding to make the exercises happen, but they will have to spend some money as well. If we refuse, we will likely upset them, but they will get over it."
 MD_terror.11.a: "Conduct the Exercises!"
 MD_terror.11.b: "This is a waste of time."

 MD_terror.13.t: "[FROM.GetName] offers Advisors"
 MD_terror.13.d: "[FROM.GetName] has proposed sending us assistance, in the form of foreign advisors. While this would increase our counter-terrorism capabilities, we also must assume those advisors will report on our activities and capabilities, which could result in intelligence leaks."
 MD_terror.13.a: "Accept the Offer!"
 MD_terror.13.b: "[THIS.GetName] needs no assistance!"

 MD_terror.14.t: "[FROM.GetName] removes Advisors"
 MD_terror.14.d: "[FROM.GetName] has removed their counter-terrorism from our country, which has decreased our capabilities to conduct counter-terror operations."
 MD_terror.14.a: "How dare they do this!"

 MD_terror.15.t: "[FROM.GetName] accepts Advisors!"
 MD_terror.15.d: "[FROM.GetName] has accepted our offer of counter-terrorism advisors from our intel agencies! Not only will this help us improve their counter-terror opreations, but it also will give us an inside look at their intelligence gathering and processing operations."
 MD_terror.15.a: "They made the smart choice!"

 MD_terror.16.t: "[FROM.GetName] refuses Advisors!"
 MD_terror.16.d: "[FROM.GetName] has refused to allow our counter-terror advisors into their country."
 MD_terror.16.a: "Well, it's their loss."
