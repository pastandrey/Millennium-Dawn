l_japanese:
 equipment_doctrine_folder: "装備ドクトリン"
 elite_forces_doctrine_folder: "精鋭部隊ドクトリン"
 SPECIAL_FORCES_ELITE: "精鋭特殊部隊"
 SPECIAL_FORCES_ELITE_DESC: "このドクトリンは、精密さと慎重さを要する複雑かつ優先度の高い任務のために訓練された、厳選された部隊として特殊部隊を編成する。精鋭特殊部隊の概念は、多様な環境における高度な能力統合と作戦効果を重視する。"
 GRAND_DOCTRINE_LOCAL_AIRSPACE_DEFENCE: "地域空域防衛"
 GRAND_DOCTRINE_STRATEGIC_DESTRUCTION: "戦略的破壊"
 GRAND_DOCTRINE_AIR_SUPREMACY: "航空優勢"
 GRAND_DOCTRINE_MIXED_ROLE: "混合役割"
 GRAND_DOCTRINE_COMBINED_ARMS: "諸兵科連合"
 GRAND_DOCTRINE_SHOCK_AND_AWE: "衝撃と畏怖"
 GRAND_DOCTRINE_SHOCK_AND_AWE_DESC: "この主要ドクトリンは、決定的な作戦効果を達成するために戦闘力を迅速かつ集中的に適用することを中心として地上作戦を編成する。衝撃と畏怖の概念は、テンポ、優勢、そして協調した戦力運用を重視する。"
 GRAND_DOCTRINE_DEFENCE_IN_DEPTH: "縦深防御"
 GRAND_DOCTRINE_DEFENCE_IN_DEPTH_DESC: "この主要ドクトリンは、戦場全体にわたる層状の陣地と縦深に基づく戦力運用によって地上防衛を構築する。縦深防御の概念は、継続的な防御的一体性と統制された作戦空間を重視する。"
 GRAND_DOCTRINE_MISSION_COMMAND: "任務司令部"
 GRAND_DOCTRINE_BATTLEFIELD_SUPPORT: "戦場支援"
 GRAND_DOCTRINE_MISSION_COMMAND_DESC: "この主要ドクトリンは、明確な意図と定義された目標によって導かれる権限委任を基盤として地上戦力を編成する。任務司令部の概念は、複数の階層にわたる主体的行動と協調した実行を重視する。"
 GRAND_DOCTRINE_GUERRILLA_WARFARE: "ゲリラ戦"
 GRAND_DOCTRINE_GUERRILLA_WARFARE_DESC: "この主要ドクトリンは、分散し持続的な戦闘活動を行う非正規部隊を中心として地上作戦を編成する。ゲリラ戦の概念は、係争環境における地域的組織化と継続的な圧力を重視する。"
 GRAND_DOCTRINE_EQUIPMENT_MIXED: "混合装備"
 GRAND_DOCTRINE_EQUIPMENT_MIXED_DESC: "この主要ドクトリンは、多様な作戦要求を支えるために複数のシステムをバランスよく組み合わせた装備構成を基盤として戦力装備を編成する。混合装備の概念は、異なる戦闘役割にわたって部隊を装備させる柔軟性を重視する。"
 GRAND_DOCTRINE_EQUIPMENT_LIGHT: "軽装備"
 GRAND_DOCTRINE_EQUIPMENT_HEAVY: "重装備"
 GRAND_DOCTRINE_EQUIPMENT_MOBILE: "機動装備"
 GRAND_DOCTRINE_EQUIPMENT_FIRES: "火力支援装備"
 GRAND_DOCTRINE_EQUIPMENT_FULL: "完全装備"
 GRAND_DOCTRINE_BLUE_WATER: "外洋海軍"
 GRAND_DOCTRINE_GREEN_WATER: "地域海軍"
 GRAND_DOCTRINE_JEUNE_ECOLE: "青年学派"
 GRAND_DOCTRINE_GUERRE_DE_COURSE: "通商破壊"
 GRAND_DOCTRINE_COMBINED_ARMS_DESC: "この主要ドクトリンは、機動、火力支援、後方支援要素の統合運用を中心として地上戦力を編成する。諸兵科連合の概念は、戦場効果を一体的に生み出すための部隊間の連携行動を重視する。"
 DOCTRINE_TRACK_SPECIAL_FORCES_MARINES: "特殊海兵部隊"
