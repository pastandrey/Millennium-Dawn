 DOCTRINE_TRACK_INFANTRY_EQP: "歩兵装備"
 DOCTRINE_TRACK_MOTORIZED_EQP: "自動車化装備"
 DOCTRINE_TRACK_MECHANIZED_EQP: "機械化装備"
 DOCTRINE_TRACK_ARMORED_EQP: "装甲装備"
 DOCTRINE_TRACK_FIRES_EQP: "砲兵火力支援"
 DOCTRINE_TRACK_AIRMOB_EQP: "空中機動装備"
 DOCTRINE_TRACK_OPERAITONAL_THEORY: "作戦理論"
 DOCTRINE_TRACK_DEDICATED_DOCTRINE: "専任ドクトリン"
 DOCTRINE_TRACK_TRAINING: "訓練"
 DOCTRINE_TRACK_LEADERSHIP: "指導部"
