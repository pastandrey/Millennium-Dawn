 DOCTRINE_TRACK_STRUCTURE: "構造"
 DOCTRINE_TRACK_CAPITAL: "主力艦"
 DOCTRINE_TRACK_ESCORT: "護衛艦"
 DOCTRINE_TRACK_SUBMARINES: "潜水艦"
 DOCTRINE_TRACK_SUPPORT: "支援艦"
 MARINE_SPECIAL_FORCES: "海兵隊特殊部隊"
 MARINE_SPECIAL_FORCES_DESC: "このドクトリンは、沿岸および河川環境での作戦のために訓練された専門部隊として海兵部隊を編成する。海兵隊特殊部隊の概念は、精密性、適応性、そして海上・地上の統合を重視する。"
 MARINE_MASSIVE_FORCES: "水陸両用大隊"
 MARINE_SPECIAL_FORCES_MASSIVE_DESC: "このドクトリンは、持続的な前線および沿岸作戦のために設計された、より大規模な水陸両用編成として海兵部隊を組織する。水陸両用大隊の概念は、協調した上陸作戦と継続的な地上戦闘を重視する。"
 AIRBORN_FORCES_SPECIALS: "空挺兵"
 AIRBORN_FORCES_SPECIALS_DESC: "このドクトリンは、敵戦線後方への迅速な投入を中心として空挺部隊を編成する。空挺兵の概念は、奇襲、作戦到達力、そして係争地域における独立行動を重視する。"
 AIRBORN_FORCES_OPERAIONS: "空挺司令部"
 AIRBORN_FORCES_OPERAIONS_DESC: "このドクトリンは、友軍戦線の外側での長期作戦に焦点を当てた専用指揮体系の下で空挺作戦を組織する。空挺司令部の概念は、持久力、協調、そして持続的な作戦展開を重視する。"
 RANGER_FORCES_DOCTRINES: "レンジャー運用"
 RANGER_FORCES_DOCTRINES_DESC: "このドクトリンは、複雑で困難な地形での作戦のために訓練された高度に適応的な部隊としてレンジャー部隊を編成する。レンジャー運用の概念は、機動性、主体性、そして精密な戦力運用を重視する。"
 SUBDOCTRINE_OPERATIONS_CENTRAL_COMMAND: "集中化された指揮系統"
 SUBDOCTRINE_OPERATIONS_CENTRAL_COMMAND_DESC: "このドクトリンは、航空作戦を統一された中央指揮の下に置き、計画、優先順位付け、実行を単一の権限から指導する。集中化された指揮系統は、戦域全体にわたる航空戦力の一貫した作戦意図と協調運用を確保する。"
 SUBDOCTRINE_OPERATIONS_DETACHED_COMMAND: "分散化された指揮系統"
 SUBDOCTRINE_OPERATIONS_DETACHED_COMMAND_DESC: "このドクトリンは、航空作戦を半独立の司令部に割り当て、定められた作戦範囲内で計画と実行に関する権限を委任する。分散化された指揮系統は、全体的な戦略目標との整合性を維持しつつ、地域レベルでの意思決定を可能にする。"
 SUBDOCTRINE_OPERATIONS_NAVAL_AIR: "海軍指揮"
 SUBDOCTRINE_OPERATIONS_NAVAL_AIR_DESC: "このドクトリンは、航空作戦を海軍指揮系統下に統合し、航空戦力の計画と実行を海上目標と整合させる。海軍指揮は、艦隊作戦および海洋領域の統制を支援するための航空戦力の協調運用を確保する。"
 SUBDOCTRINE_DESIGN_MULTIROLE: "マルチロール設計"
 SUBDOCTRINE_DESIGN_MULTIROLE_DESC: "このドクトリンは、単一の機体で複数の任務プロファイルを遂行できる航空機の開発を重視する。マルチロール設計は、航空領域における幅広い作戦要求を支援するための適応性と統合システムを重視する。"
 SUBDOCTRINE_DESIGN_DEDICATED: "専用設計"
 SUBDOCTRINE_DESIGN_DEDICATED_DESC: "このドクトリンは、特定の作戦役割に最適化された航空機の開発に焦点を当てる。専用設計は、航空領域における明確に定義された任務要件を満たすための専門化と特化した性能を重視する。"
 SUBDOCTRINE_DESIGN_HEAVY: "重設計"
 SUBDOCTRINE_DESIGN_HEAVY_DESC: "このドクトリンは、航続距離、搭載量、そして持続的な作戦展開能力に重点を置いた大型で堅牢な航空機設計の開発を重視する。重設計は、厳しい航空作戦を支えるための構造強度と統合システムを優先する。"
 SUBDOCTRINE_DESIGN_DRONE: "ドローン設計"
 SUBDOCTRINE_HEAVY_STRATEGIC_BOMBER: "戦略爆撃機"
 SUBDOCTRINE_HEAVY_STRATEGIC_BOMBER_DESC: "このドクトリンは、長距離の戦略打撃作戦のために設計された航空機の開発に焦点を当てる。戦略爆撃機は、広大な距離にわたり持続的な航空戦力を投射し、全体的な軍事目標を支援することを目的として構想される。"
 SUBDOCTRINE_HEAVY_NAVAL_BOMBERS: "対艦攻撃機"
 SUBDOCTRINE_HEAVY_NAVAL_BOMBERS_DESC: "このドクトリンは、海軍部隊と緊密に連携して運用される航空機の開発を重視する。対艦攻撃機の設計は、海軍作戦および海上統制目標を支援するため、海洋環境上での航空戦力の展開を拡張することに焦点を当てる。"
 SUBDOCTRINE_HEAVY_GUNSHIPS: "重武装ガンシップ"
 SUBDOCTRINE_HEAVY_GUNSHIPS_DESC: "このドクトリンは、持続的な空中火力を提供するために設計された重武装航空機の開発に焦点を当てる。重武装ガンシップの設計は、統合兵装システムと長時間の滞空能力を重視し、係争環境における航空作戦を支援する。"
 SUBDOCTRINE_MULTIROLE_MIXED: "混合マルチロール"
 SUBDOCTRINE_MULTIROLE_MIXED_DESC: "このドクトリンは、単一の空軍内で多様な設計思想を組み合わせることにより、多用途航空機開発への均衡の取れたアプローチを促進する。混合マルチロールの概念は、幅広い作戦要求に対応するための戦力構成の柔軟性を重視する。"
 SUBDOCTRINE_MULTIROLE_STRIKE: "攻撃機"
 SUBDOCTRINE_MULTIROLE_STRIKE_DESC: "このドクトリンは、攻勢航空作戦に指向したマルチロール航空機の開発を重視する。攻撃志向の設計は、より広範な作戦目標を支援するため、指定目標に対する航空戦力の効果的な投射を優先する。"
 SUBDOCTRINE_MULTIROLE_OPERATIONS: "マルチロール作戦"
 SUBDOCTRINE_MULTIROLE_OPERATIONS_DESC: "このドクトリンは、多様な任務要件を遂行可能なマルチロール航空機を中心として航空作戦を構築する。マルチロール作戦は、幅広い作戦目標を支援するための適応性の高い航空プラットフォームの協調運用を重視する。"
 SUBDOCTRINE_STRIKE_CAS: "近接航空支援機"
 SUBDOCTRINE_STRIKE_CAS_DESC: "この教義は、直接的な空中戦闘を通じて地上作戦を支援するよう設計された航空機の開発に焦点を当てている。CAS機は、陸上部隊と緊密に連携し、即応性のある持続的な航空戦力を提供できるよう構成されている。"
 SUBDOCTRINE_STRIKE_NAVAL: "海軍攻撃機"
 SUBDOCTRINE_STRIKE_NAVAL_DESC: "このドクトリンは、海上目標の支援を目的として運用される攻撃機の開発を中心とする。海軍攻撃機の概念は、海上戦域における戦力投射のために航空戦力と海軍作戦の統合を重視する。"
 SUBDOCTRINE_STRIKE_MUNITIONS: "攻撃弾薬"
 SUBDOCTRINE_STRIKE_MUNITIONS_DESC: "このドクトリンは、精密打撃作戦のために設計された兵器の開発と統合を重視する。攻撃弾薬の概念は、作戦目標を支援するための航空投射火力の効果的運用を強化することに焦点を当てる。"
 SUBDOCTRINE_FIGHTER_LIGHT: "軽戦闘機"
 SUBDOCTRINE_FIGHTER_LIGHT_DESC: "ドクトリンは、機動性と迅速な航空作戦に最適化された軽量戦闘機の開発に焦点を当てる。軽戦闘機の設計は、航空戦闘の枠組みの中での効率的な性能と柔軟な運用を重視する。"
 SUBDOCTRINE_FIGHTER_AIR_SUP: "航空優勢"
 SUBDOCTRINE_FIGHTER_AIR_SUP_DESC: "このドクトリンは、航空領域の支配を確立し維持するための戦闘機の開発と運用を中心とする。航空優勢の概念は、戦域全体にわたる行動の自由を確保するための協調した航空戦闘作戦を重視する。"
 SUBDOCTRINE_STRUCTURE_CENTRAL_COMMAND: "集中化された指揮系統"
 SUBDOCTRINE_STRUCTURE_CENTRAL_COMMAND_DESC: "このドクトリンは、計画、調整、実行を単一の権限から指導する統一された中央指揮の下で地上部隊を編成する。集中化された指揮系統は、戦場全体にわたる地上戦力の一貫した作戦意図と同期運用を確保する。"
 SUBDOCTRINE_STRUCTURE_DECENTRAL_COMMAND: "分散化された指揮系統"
 SUBDOCTRINE_STRUCTURE_DECENTRAL_COMMAND_DESC: "このドクトリンは、地上部隊内の複数の階層に指揮権限を分配し、下位部隊が割り当てられた目標の範囲内で作戦を計画・実行できるようにする。分散化された指揮系統は、戦場全体における主体的行動と迅速な意思決定を重視する。"
 SUBDOCTRINE_STRUCTURE_BCT: "大隊戦闘団"
 SUBDOCTRINE_STRUCTURE_BCT_DESC: "このドクトリンは、諸兵科連合作戦を実施するために設計された自立型の大隊規模編成を中心として地上部隊を編成する。大隊戦闘団は、機動、火力支援、後方支援要素を統合し、割り当てられた作戦地域で効果的に行動する。"
 SUBDOCTRINE_OPERATION_DECENTRALIZED_SUPPLY: "分散型補給"
 SUBDOCTRINE_OPERATION_DECENTRALIZED_SUPPLY_DESC: "このドクトリンは、複数の作戦地域にわたる部隊を支援する分散型兵站構造によって地上部隊の維持を行う。分散型補給の概念は、作戦テンポと継続性を維持するための資源の地域的管理を重視する。"
 SUBDOCTRINE_OPERATION_CENTRALIZED_SUPPLY: "集中型補給"
 SUBDOCTRINE_OPERATION_CENTRALIZED_SUPPLY_DESC: "このドクトリンは、作戦地域全体にわたる補給配分を調整する中央集権的兵站構造の下で地上部隊の維持を組織する。集中型補給の概念は、地上作戦への一貫した支援を確保するための統一された計画と統制を重視する。"
 SUBDOCTRINE_OPERATION_SCAVENGING_SUPPLY: "略奪補給"
 SUBDOCTRINE_OPERATION_SCAVENGING_SUPPLY_DESC: "このドクトリンは、作戦環境内で入手可能な資源を利用することによって地上部隊を維持する。略奪補給の概念は、継続中の地上作戦を支援するため、捕獲または即席資材の適応的な調達と統合に焦点を当てる。"
 SUBDOCTRINE_OPERATION_ADVERSE: "悪条件作戦"
 SUBDOCTRINE_OPERATION_ADVERSE_DESC: "このドクトリンは、敵対的かつ劣悪な状況下で作戦を遂行するために地上部隊を準備する。悪条件作戦は、困難な作戦環境における適応力、持久力、そして持続的な有効性を重視する。"
 SUBDOCTRINE_OPERATION_VOLUNTEER: "義勇兵作戦"
 SUBDOCTRINE_OPERATION_VOLUNTEER_DESC: "このドクトリンは、国家の外部目標を支援するために選抜された部隊を国外へ派遣することを中心として地上作戦を構築する。義勇兵作戦は、限定規模の介入、作戦上の自律性、そして広範な戦略意図との整合を重視する。"
 SUBDOCTRINE_OPERATION_DEEP_BATTLE: "縦深戦闘作戦"
 SUBDOCTRINE_OPERATION_DEEP_BATTLE_DESC: "このドクトリンは、戦場の複数の縦深にわたって同時に敵部隊と交戦するよう地上作戦を構築する。縦深戦闘の概念は、前線の背後にある指揮、兵站、機動要素を攪乱するための協調行動を重視する。"
 SUBDOCTRINE_OPERATION_THUNDER_RUN: "雷撃戦作戦"
 SUBDOCTRINE_OPERATION_THUNDER_RUN_DESC: "このドクトリンは、速度と衝撃によって決定的効果を達成することを目的とした迅速で集中的な突進を中心として地上作戦を構築する。雷撃戦作戦は、作戦環境を攪乱するための勢いと集中的機動を重視する。"
 SUBDOCTRINE_OPERATION_LIGHT_INFANTRY: "軽歩兵作戦"
 SUBDOCTRINE_OPERATION_LIGHT_INFANTRY_DESC: "このドクトリンは、多様な地形および作戦条件に適した高機動の歩兵部隊を中心として地上作戦を組織する。軽歩兵作戦は、戦場全体における柔軟性、迅速な展開、そして持続的な展開を重視する。"
 SUBDOCTRINE_OPERATION_GUERRILLA: "ゲリラ作戦"
 SUBDOCTRINE_OPERATION_GUERRILLA_DESC: "このドクトリンは、係争環境で活動する非正規かつ分散型の戦闘編成を中心として地上作戦を構築する。ゲリラ作戦は、地上戦場を形成するための機動性、地域的主体性、そして持続的圧力を重視する。"
 SUBDOCTRINE_OPERATION_STATIC_DEFENSE: "固定防御作戦"
 SUBDOCTRINE_OPERATION_STATIC_DEFENSE_DESC: "このドクトリンは、固定陣地と準備された防御網を中心として防御的地上作戦を構築する。固定防御作戦は、重要地形を保持するための地域統制と戦力の組織的運用を重視する。"
 SUBDOCTRINE_OPERATION_ELASTIC_DEFENSE: "弾性防御作戦"
 SUBDOCTRINE_OPERATION_ELASTIC_DEFENSE_DESC: "このドクトリンは、統制された後退と縦深に基づく戦力運用によって防御作戦を組織する。弾性防御の概念は、連続する防御層にわたり戦闘効果を保持しつつ戦場を形成することを重視する。"
 SUBDOCTRINE_OPERATION_MOBILE_DEFENSE: "機動防御作戦"
 SUBDOCTRINE_OPERATION_MOBILE_DEFENSE_DESC: "このドクトリンは、敵の行動に動的に対応できる機動志向の部隊を中心として防御的地上作戦を構築する。機動防御の概念は、防御戦場における柔軟性と協調した反機動を重視する。"
 SUBDOCTRINE_OPERATION_INSURGENT: "反乱作戦"
 SUBDOCTRINE_OPERATION_INSURGENT_DESC: "このドクトリンは、分散型で地域社会に埋め込まれた戦闘要素によって行われる非正規戦を中心として地上部隊を組織する。反乱作戦は、作戦環境に影響を与えるための持続的な交戦と住民中心の統制を重視する。"
 SUBDOCTRINE_TECHNOLOGY_HIGH: "ハイテク軍隊"
 SUBDOCTRINE_TECHNOLOGY_HIGH_DESC: "このドクトリンは、戦闘、指揮、後方支援の各機能において先進技術を広範に統合することを中心として地上部隊を編成する。ハイテク軍隊の概念は、作戦効果の中核要素として技術的優位を重視する。"
 SUBDOCTRINE_TECHNOLOGY_COMMON: "共通技術軍隊"
 SUBDOCTRINE_TECHNOLOGY_COMMON_DESC: "このドクトリンは、広く利用可能で標準化された軍事技術を中心として地上部隊を組織する。共通技術軍隊の概念は、部隊間における信頼性、拡張性、そして広範な相互運用性を重視する。"
 SUBDOCTRINE_TECHNOLOGY_LOW: "ローテク軍隊"
 SUBDOCTRINE_TECHNOLOGY_LOW_DESC: "このドクトリンは、高度な技術システムへの依存を最小限に抑えることを基盤として地上部隊を編成する。ローテク軍隊の概念は、基本装備、単純性、そして技術的制約下での作戦機能を重視する。"
 SUBDOCTRINE_TRAINING_REDUCED: "訓練の削減"
 SUBDOCTRINE_TRAINING_REDUCED_DESC: "このドクトリンは、兵力の生成と展開を加速するために正式な訓練要件を最小化する。訓練の削減の概念は、基本的な作戦即応性と迅速な兵力確保を重視する。"
 SUBDOCTRINE_TRAINING_ADVANCED: "高度な訓練"
 SUBDOCTRINE_TRAINING_ADVANCED_DESC: "このドクトリンは、部隊の結束と作戦能力を向上させるための広範で体系的な訓練計画を重視する。高度な訓練の概念は、複雑で困難な作戦環境に備えることに焦点を当てる。"
 SUBDOCTRINE_TRAINING_SKILLS: "技能学校"
 SUBDOCTRINE_TRAINING_SKILLS_DESC: "このドクトリンは、専門的な軍事技能の体系的発展を中心として訓練を構築する。技能重視の訓練は、地上部隊における技術的能力と役割特化の熟練を重視する。"
 SUBDOCTRINE_TRAINING_SURVIVAL: "生存訓練"
 SUBDOCTRINE_TRAINING_SURVIVA_DESC: "このドクトリンは、厳しいかつ敵対的な環境における持久力と適応力に焦点を当てた訓練を重視する。生存訓練の概念は、不利な条件下でも作戦を継続できるよう部隊を準備する。"
 SUBDOCTRINE_LEADERSHIP_OFFICER: "士官養成"
 SUBDOCTRINE_LEADERSHIP_OFFICER_DESC: "このドクトリンは、正式な教育と指揮準備を通じて士官を中心に指導力育成を行う。士官養成の概念は、地上部隊における計画、調整、そして組織的統制を重視する。"
 SUBDOCTRINE_LEADERSHIP_NCO: "下士官養成"
 SUBDOCTRINE_LEADERSHIP_NCO_DESC: "このドクトリンは、地上部隊指揮の中核として下士官を中心に指導力育成を構築する。下士官養成の概念は、戦術的指導力と日常的な部隊運用の有効性を重視する。"
 SUBDOCTRINE_LEADERSHIP_REDUCED: "基準の緩和"
 SUBDOCTRINE_LEADERSHIP_REDUCED_DESC: "このドクトリンは、指揮能力を拡大するために正式な指導者資格要件を引き下げる。基準の緩和の概念は、兵力拡張を支えるための迅速な指導者育成を重視する。"
 SUBDOCTRINE_EQUIPMENT_BASE_INFANTRY: "基本歩兵装備"
 SUBDOCTRINE_EQUIPMENT_BASE_INFANTRY_DESC: "このドクトリンは、基本的な兵器と支援装備に重点を置いた標準化された歩兵装備構成を定義する。基本歩兵装備の概念は、持続的な地上作戦のための均衡と汎用能力を重視する。"
 SUBDOCTRINE_EQUIPMENT_LIGHT_INFANTRY: "軽歩兵装備"
 SUBDOCTRINE_EQUIPMENT_LIGHT_INFANTRY_DESC: "このドクトリンは、重量を抑えた簡素な装備構成を中心として歩兵装備を構築する。軽歩兵装備の概念は、多様な作戦環境における機動性と展開の容易さを重視する。"
 SUBDOCTRINE_EQUIPMENT_HEAVY_INFANTRY: "重歩兵装備"
 SUBDOCTRINE_EQUIPMENT_HEAVY_INFANTRY_DESC: "このドクトリンは、拡張された兵器と防護システムを歩兵部隊に装備させる。重歩兵装備の概念は、地上戦闘における火力と耐久力の向上を重視する。"
 SUBDOCTRINE_EQUIPMENT_BASE_MOTORIZED: "基本型自動車化セットアップ"
 SUBDOCTRINE_EQUIPMENT_BASE_MOTORIZED_DESC: "This doctrine defines a standardized equipment configuration for motorized infantry units. Motorized basic setups emphasize balanced mobility and combat capability supported by wheeled transport."
 SUBDOCTRINE_EQUIPMENT_LIGHT_MOTORIZED: "軽型自動車化セットアップ"
 SUBDOCTRINE_EQUIPMENT_LIGHT_MOTORIZED_DESC: "This doctrine structures motorized unit equipment around lighter vehicles and reduced onboard systems. Light motorized setups emphasize speed and operational flexibility in ground operations."
 SUBDOCTRINE_EQUIPMENT_HEAVY_MOTORIZED: "重型自動車化セットアップ"
 SUBDOCTRINE_EQUIPMENT_HEAVY_MOTORIZED_DESC: "This doctrine equips motorized units with heavier vehicles and enhanced onboard equipment. Heavy motorized setups emphasize protection and sustained combat capability during ground operations."
 SUBDOCTRINE_EQUIPMENT_MIXED_MECHANIZED: "混合機械化セットアップ"
 SUBDOCTRINE_EQUIPMENT_MIXED_MECHANIZED_DESC: "This doctrine structures mechanized formations around a combination of transport and combat vehicles. Mixed mechanized setups emphasize adaptability through diverse equipment integration."
 SUBDOCTRINE_EQUIPMENT_APC_MECHANIZED: "装甲兵員輸送車機械化セットアップ"
 SUBDOCTRINE_EQUIPMENT_APC_MECHANIZED_DESC: "This doctrine organizes mechanized units around armored personnel carriers as the primary transport platform. APC mechanized setups emphasize protected mobility and infantry support in ground operations."
 SUBDOCTRINE_EQUIPMENT_IFV_MECHANIZED: "歩兵戦闘車機械化セットアップ"
 SUBDOCTRINE_EQUIPMENT_IFV_MECHANIZED_DESC: "This doctrine structures mechanized forces around infantry fighting vehicles with integrated combat systems. IFV mechanized setups emphasize combined mobility and direct fire support."
 SUBDOCTRINE_EQUIPMENT_MBT_TANK: "戦車装備"
 SUBDOCTRINE_EQUIPMENT_MBT_TANK_DESC: "This doctrine focuses on the deployment and sustainment of main battle tank formations. Tank equipment concepts emphasize armored firepower as a central element of ground combat forces."
 SUBDOCTRINE_EQUIPMENT_LIGHT_TANK: "軽戦車セットアップ"
 SUBDOCTRINE_EQUIPMENT_LIGHT_TANK_DESC: "This doctrine structures armored units around lighter tank platforms suited for flexible ground operations. Light tank setups emphasize mobility and operational reach within armored formations."
 SUBDOCTRINE_EQUIPMENT_SUPERHEAVY_TANK: "超重装備"
 SUBDOCTRINE_EQUIPMENT_SUPERHEAVY_TANK_DESC: "This doctrine organizes armored forces around exceptionally heavy and protected vehicle platforms. Superheavy equipment concepts emphasize maximum armored presence within ground formations."
 SUBDOCTRINE_EQUIPMENT_TOWED_ARTILLERY: "牽引式野戦砲"
 SUBDOCTRINE_EQUIPMENT_TOWED_ARTILLERY_DESC: "This doctrine structures artillery forces around deployable gun systems supported by transport assets. Towed artillery concepts emphasize flexible fire support across ground operations."
 SUBDOCTRINE_EQUIPMENT_SP_ARTILLERY: "自走砲装備"
 SUBDOCTRINE_EQUIPMENT_SP_ARTILLERY_DESC: "This doctrine equips artillery units with self-propelled platforms capable of operating alongside maneuver forces. SPART equipment concepts emphasize mobile and responsive fire support."
 SUBDOCTRINE_EQUIPMENT_ROCKET_ARTILLERY: "多連装ロケットシステム装備"
 SUBDOCTRINE_EQUIPMENT_ROCKET_ARTILLERY_DESC: "This doctrine structures artillery forces around multiple-launch rocket systems for area fire missions. MLRS equipment concepts emphasize coordinated firepower delivery across the battlespace."
 SUBDOCTRINE_EQUIPMENT_ATK_HELICOPTER: "攻撃ヘリコプター"
 SUBDOCTRINE_EQUIPMENT_ATK_HELICOPTER_DESC: "This doctrine integrates attack helicopter platforms into ground force equipment structures. Attack helicopter concepts emphasize aerial fire support and battlefield integration with land operations."
 SUBDOCTRINE_EQUIPMENT_TRANS_HELICOPTER: "輸送ヘリコプター"
 SUBDOCTRINE_EQUIPMENT_TRANS_HELICOPTER_DESC: "This doctrine structures ground force mobility around rotary-wing transport platforms. Transport helicopter concepts emphasize air mobility and rapid force repositioning."
 SUBDOCTRINE_CAPITAL_CARRIER: "航空母艦作戦"
 SUBDOCTRINE_CAPITAL_CARRIER_DESC: "This doctrine structures naval power projection around aircraft carriers as central fleet assets. Carrier operations emphasize coordinated employment of embarked air wings to extend naval influence across maritime theaters."
 SUBDOCTRINE_CAPITAL_HLS: "ヘリコプター揚陸艦"
 SUBDOCTRINE_CAPITAL_HLS_DESC: "このドクトリンは、ヘリコプター搭載可能な揚陸艦を海軍部隊構成に統合するものである。ヘリ揚陸艦の概念は、海上作戦における垂直移動能力と水陸両用支援を重視する。"
 SUBDOCTRINE_CAPITAL_ESCORT_CARRIER: "護衛空母"
 SUBDOCTRINE_CAPITAL_ESCORT_CARRIER_DESC: "This doctrine organizes naval aviation around smaller carrier platforms operating alongside fleet elements. Escort carrier concepts emphasize distributed air support within naval formations."
 SUBDOCTRINE_CAPITAL_LOTS: "海の支配者"
 SUBDOCTRINE_CAPITAL_LOTS_DESC: "This doctrine structures naval forces to assert sustained control over key maritime regions. Lords of the Sea concepts emphasize dominant fleet presence and continuous maritime influence."
 SUBDOCTRINE_CAPITAL_CARRIER_ESCORTS: "空母護衛"
 SUBDOCTRINE_CAPITAL_CARRIER_ESCORTS_DESC: "This doctrine organizes fleet elements to provide layered protection for carrier groups. Carrier escort concepts emphasize coordinated defense and operational continuity for capital ships."
 SUBDOCTRINE_CAPITAL_FLEET_CRUISERS: "艦隊巡洋艦"
 SUBDOCTRINE_CAPITAL_FLEET_CRUISERS_DESC: "This doctrine centers fleet organization around cruiser-class vessels capable of independent and group operations. Fleet cruiser concepts emphasize command presence and multi-mission maritime capability."
 SUBDOCTRINE_CAPITAL_DESTROYER_FLEET: "駆逐艦隊"
 SUBDOCTRINE_CAPITAL_DESTROYER_FLEET_DESC: "This doctrine structures naval forces around destroyers as the primary surface combat element. Destroyer fleet concepts emphasize flexible engagement and fleet-level operational support."
 SUBDOCTRINE_CAPITAL_SUPPORT_DESTROYERS: "支援駆逐艦"
 SUBDOCTRINE_CAPITAL_SUPPORT_DESTROYERS_DESC: "This doctrine assigns destroyer forces to support and screen higher-value fleet units. Support destroyer concepts emphasize protection, coordination, and sustained fleet operations."
 SUBDOCTRINE_CAPITAL_FRIGATE_CAPITAL: "主力フリゲート艦"
 SUBDOCTRINE_CAPITAL_FRIGATE_CAPITAL_DESC: "This doctrine elevates frigate-class vessels to central roles within naval formations. Frigate capital concepts emphasize balanced capabilities and distributed maritime presence."
 SUBDOCTRINE_ESCORT_MULTIROLE_FRIGATE: "多用途フリゲート"
 SUBDOCTRINE_ESCORT_MULTIROLE_FRIGATE_DESC: "This doctrine structures escort forces around frigates capable of performing diverse maritime tasks. Multirole frigate concepts emphasize adaptability within escort and patrol operations."
 SUBDOCTRINE_ESCORT_ANTI_SUB_CORVETTE: "対潜コルベット艦"
 SUBDOCTRINE_ESCORT_ANTI_SUB_CORVETTE_DESC: "This doctrine organizes escort forces around corvettes specialized in submarine detection and engagement. Anti-sub corvette concepts emphasize localized undersea control."
 SUBDOCTRINE_ESCORT_ANTI_AIR_CORVETTE: "対空コルベット艦"
 SUBDOCTRINE_ESCORT_ANTI_AIR_CORVETTE_DESC: "This doctrine structures escort formations around corvettes focused on air defense roles. Anti-air corvette concepts emphasize protection of fleet units against aerial threats."
 SUBDOCTRINE_ESCORT_STEALTH_ESCORTS: "ステルス護衛艦"
 SUBDOCTRINE_ESCORT_STEALTH_ESCORTS_DESC: "This doctrine integrates low-observable escort vessels into naval formations. Stealth escort concepts emphasize reduced detectability and operational discretion in maritime environments."
 SUBDOCTRINE_SUBMARINE_ESCORT_ATTACK: "護衛攻撃潜水艦"
 SUBDOCTRINE_SUBMARINE_ESCORT_ATTACK_DESC: "This doctrine assigns submarine forces to operate in close coordination with surface fleets. Escort attack submarine concepts emphasize submerged support of naval operations."
 SUBDOCTRINE_SUBMARINE_HUNTER_KILLER: "ハンター・キラー潜水艦"
 SUBDOCTRINE_SUBMARINE_HUNTER_KILLER_DESC: "This doctrine structures submarine forces around independent offensive patrols. Hunter-killer submarine concepts emphasize sustained undersea presence and targeted engagement."
 SUBDOCTRINE_SUBMARINE_MISSILE_BOATS: "ミサイル艇"
 SUBDOCTRINE_SUBMARINE_MISSILE_BOATS_DESC: "This doctrine organizes submarine forces around platforms equipped for missile deployment. Missile boat concepts emphasize strategic and operational strike capability from the maritime domain."
 SUBDOCTRINE_OPERATIONS_RAIDING_FLEETS: "襲撃艦隊"
 SUBDOCTRINE_OPERATIONS_RAIDING_FLEETS_DESC: "This doctrine structures naval operations around mobile task groups conducting disruptive maritime actions. Raiding fleet concepts emphasize operational reach and flexible force employment."
 SUBDOCTRINE_OPERATIONS_NAVAL_SUPREMACY: "海上覇権"
 SUBDOCTRINE_OPERATIONS_NAVAL_SUPREMACY_DESC: "This doctrine organizes naval operations to establish and maintain control over maritime spaces. Naval supremacy concepts emphasize coordinated fleet action across sea lines of communication."
 SUBDOCTRINE_OPERATIONS_COSTAL_DEFENSE: "沿岸防衛"
 SUBDOCTRINE_OPERATIONS_COSTAL_DEFENSE_DESC: "This doctrine structures naval forces to protect territorial waters and coastal approaches. Coastal defense concepts emphasize layered maritime security and regional sea control."
