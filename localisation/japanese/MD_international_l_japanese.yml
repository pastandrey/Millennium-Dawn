 CT_SYS_DESC: "§Y対テロ・システム§!は、世界情勢によってテロ組織の脅威が増大するかどうか、また情報機関からどれだけ把握しやすいかが決まる仕組みである。§Rテロ脅威レベル§!が上昇すると、その組織による攻撃の頻度と規模が増加する。国際緊張度、各国コンテンツ、プレイヤーの行動によって§Rテロ脅威レベル§!は増減する。これらの数値は毎月、または大きな行動の後に更新される。\n\nプレイヤーは、諜報（スパイ）システムやこのメニュー内の行動、さらに襲撃システムによる襲撃を実施して情報を収集し、§Rテロ脅威レベル§!を低下させられる。§Y諜報精度§!が上がるほど、より具体的にテロ組織を標的にできるようになり、最終的には本部を襲撃して脅威を排除できるようになる。"
