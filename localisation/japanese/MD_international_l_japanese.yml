 IS_un_aid_general_budget: "§Y一般運営予算§!: $$[?global.un_operating_budget_base|+G3] /週"
 IS_un_aid_general_budget_tt: "Displays the contributions of nations, in descending order, to the §BUN§! §YGeneral Operating Budget§!"
 IS_un_aid_general_budget_tt_delayed: "§Y一般運営予算§!は、最低要件を満たしている場合、すべての§B国連§!加盟国が拠出する全体の基礎予算である。最低予算拠出額はGDPの§Y[?global.general_operating_budget_contribute_percent|%]§!であり、毎年年初に計算される。また、予算に加えられるためには最低でも§G$0.001§!の拠出が必要である。この最低額を満たさない国家は、その年は予算に拠出せず、その結果としていかなる予算拠出の恩恵も受けない。\n\n§Y一般運営予算§!は、加盟国によって毎週§B国際連合§!に提供され、各種§B国連§!§Y援助計画§!に配分される資金の基礎額である。これらの拠出はすべての計画に均等に配分され、各計画が毎週運営のために受け取る初期の基礎額を提供する。\n\n国家は、その拠出の見返りとして、§Y一般運営予算§!への拠出割合に等しい£foreign_influence_modifier_texticon §Y外国影響力§!倍率および£foreign_influence_defense_modifier_texticon §Y外国影響力防衛§!倍率のボーナスを受ける。"
 is_un_aid_total_budget_spending: "§C国連§!への§R総支出§!:"
 is_un_aid_total_budget_spending_tt: "We currently spend $[?united_nations_expenses|-3] on §BUN§! Funding"
 is_un_aid_total_budget_spending_tt_delayed: "この数値は、§Y一般運営予算§!への拠出と、その後のすべての§B国連§!計画に対する個別の拠出決定を含め、我々がすべての§B国連§!§Y援助計画§!全体にわたってどれだけ支出しているかを表示する。"
 is_un_basic_budget_spending: "§C国連§!§Y予算§!への§R支出§!:"
 is_un_basic_budget_spending_tt: "We currently spend $[?united_nations_base_expenses|-3] on the §BUN§! §YGeneral Operating Budget§!"
 is_un_basic_budget_spending_tt_delayed: "§Y一般運営予算§!は、加盟国によって毎週§B国際連合§!に提供され、各種§B国連§!§Y援助計画§!に配分される資金の基礎額である。これらの拠出はすべての計画に均等に配分され、各計画が毎週運営のために受け取る初期の基礎額を提供する。この予算から資金提供を受ける計画は、§YUNDIO§!、§YUNCDF§!、および§YUNESCOE§!である。"
 is_un_aid_unescoe_spending: "§YUNESCOE§!への§R支出§!:"
 is_un_aid_unescoe_spending_tt: "We currently spend $[?united_nations_unescoe_funding|-3] on the §YUNSCOE Program§!"
 is_un_aid_unescoe_spending_tt_delayed: "§B国際連合§!§Y教育科学文化機関§!は、教育の改善、開発途上国への技術的助言の提供、そして成長の支援を必要とする国家への政策対話の提供を目的とした援助機関である。\n\nこの§B国連§!§Y援助計画§!は、£research_speed_texticon §Y研究速度§!および£political_power_texticon §Y政治力獲得§!にボーナスを与える。"
 is_un_aid_unido_spending: "§YUNIDO§!への§R支出§!:"
 is_un_aid_unido_spending_tt: "We currently spend $[?united_nations_unido_funding|-3] on the §YUNIDO Program§!"
 is_un_aid_unido_spending_tt_delayed: "§B国際連合§!§Y工業開発機関§!は、工業開発を促進することを目的とした援助計画である。開発途上国が自国の産業を確立するのを支援することで、この計画は貧困と闘い、包摂的なグローバル化を確立し、さらに環境の持続可能性にも取り組む。\n\nこの§B国連§!§Y援助計画§!は、無償で賃借された§Y民需産業§!を獲得する能力を提供するとともに、各国の産業基盤、電力インフラ、建設インフラの改善を支援するため、£construction_speed_texticon §Y建設速度§!を向上させる。"
 is_un_aid_uncdf_spending: "§YUNCDF§!への§R支出§!:"
 is_un_aid_uncdf_spending_tt: "We currently spend $[?united_nations_uncdf_funding|-3] on the §YUNCDF Program§!"
 is_un_aid_uncdf_spending_tt_delayed: "§B国際連合§!§Y資本開発基金§!は、国内投資のための資本の流れを改善することを目的とした援助計画である。この計画の目標は、投資計画とデジタル金融を通じて、雇用を創出し、持続可能な経済成長を生み出すことである。\n\nこの§B国連§!§Y援助計画§!は、この計画から援助を受ける国家に対して、§Y金融§!面と§Y開発§!面の両方の支援を提供する。この計画は、予算の改善と生産性成長の押し上げを支援するために設計されている。"
 is_un_aid_spending_percent: "§Y基礎予算§!に占める割合:"
 is_un_aid_spending_percent_tt: "The percentage of the §YGeneral Operating Budget§! that we contribute is [?united_nations_contribution_percent|Y%2]"
 is_un_aid_spending_percent_tt_delayed: "§Y一般運営予算§!に占める割合は、威信の問題であると同時に、力の問題でもある。我々がより多く拠出するほど、他国に対してより多くの£foreign_influence_modifier_texticon §Y外国影響力§!を確立でき、我々の影響力はより効果的になる。この割合は、高くできるほどよい。"
 is_un_aid_additional_percent: "§C国連§!§Y援助計画§!に占める割合:"
 is_un_aid_additional_percent_tt: "The percentage of all §YAid Program Additional Contributions§! that we contribute is [?united_nations_aid_program_contribution_percent|Y%2]"
 is_un_aid_additional_percent_tt_delayed: "§YAid Program Additional Contributions§!として拠出する割合が高いほど、各計画から援助を受けている国家に対する影響力が増し、さらに£political_power_texticon §Y政治力獲得§!も増加する。加えて、我々の§Y投資§!に必要な時間と費用の両方を§G減少§!させることで、他国に我々の§Y投資§!が受け入れられる可能性も高める。"
 is_un_aid_total_budget_ido_tt_delayed: "§Y25%§! of the program's budget goes to helping countries improve their £construction_speed_texticon §YConstruction Speed§!, and the remaining §Y75%§! is used to provide Leased §YCivilian Industries§! to §GSubsidized§! nations."
