 is_ct_infil_agent_tt: "§Y[name_of_org_disp]§!に工作員を潜入させようとする。成功した場合、我々の§Y諜報精度§!が恒久的に上昇する。潜入が失敗した場合、§Y諜報精度§!は短期間低下し、§Y[name_of_org_disp]の§!§Rテロ脅威レベル§!が上昇する。\n\n潜入の成功確率は、我々の§Y諜報精度§!と、§Y情報機関§!の工作員訓練全体によって補正される。"
 is_ct_asset_seizure_tt: "資産を押収することで、§Y[name_of_org_disp]§! の§Rテロ脅威レベル§!は低下するが、短期間のあいだ§Y[name_of_org_disp]§!に対する§Y諜報精度§!を得にくくもなる。"
 is_ct_arrest_sympathizers_tt: "支持者の逮捕により、§Y[name_of_org_disp]§!の§Rテロ脅威レベル§!が低下し、同時に§Y[name_of_org_disp]§!に対する§Y諜報精度§!が上昇する。ただし、逮捕の過程で無関係の市民が巻き込まれる可能性があり、もし巻き込まれた場合は政治的な反発を招くおそれがある。\n\n逮捕の有効性は、我々の§Y諜報精度§!と、§Y情報機関§!の防諜および対テロのアップグレードに左右される。\n"
 ct_has_infiltrated_org: "[name_of_org_disp]への潜入にまだ成功していない"
 ct_has_failed_recent_infil_against: "直近で[name_of_org_disp]への潜入作戦に失敗していない"
 is_ct_does_not_have_advisors: "[?selected_ct_nation.GetName]は[?ROOT.GetName]からの対テロ顧問を持っていない"
 is_ct_does_have_advisors: "[?selected_ct_nation.GetName]は[?ROOT.GetName]からの対テロ顧問を持っている"
 is_ct_send_advisors_too: "[?selected_ct_nation.GetName]に対テロ顧問を送る。これが効果を持つには、彼らが我々の顧問を受け入れなければならない。"
 is_ct_recall_advisors_from: "[?selected_ct_nation.GetName]から対テロ顧問を呼び戻す"
 ct_has_intel_to_exploit: "活用可能な情報がある"
 ct_offer_joint_exercises: "[?selected_ct_nation.GetName]と共同対テロ訓練を実施することを提案する。"
 counter_terrorism_operations: "対テロ作戦"
 counter_terrorism_operations_desc: "我が国の対テロへの取り組みは、重点を定めて進めなければならない。個人の自由、財政、さらには命を犠牲にすることになるかもしれないが、テロの脅威は阻止されなければならない。"
 ct_not_has_done_recent_intel_op: "次の情報収集作戦まで§Y[?recent_ct_intel_op:days_left|0Y]日§!待機する。"
 ct_not_has_done_recent_asset_seizure: "次の資産押収まで§Y[?recent_ct_asset_seizure:days_left|0Y]日§!待機する。"
 no_recent_joint_exercises: "この国家と最近§Y共同演習§!を実施していない。"
 recent_ct_intel_op: "Recently Conducted Intel Gathering Operation"
 CT_internet_monitoring: "Mass Data Gathering Protests"
 CT_internat_monitoring_desc: "Our citizens have begun protesting our efforts to protect them through mass data gathering. We must ride out their outrage..."
 CT_protesting_arrests: "Counter-Terror Arrests Protests"
 CT_protesting_arrests_desc: "Our citizens have begun to protest our use of mass arrests to deal with terrorism threats. We should improve the quality of our intelligence to prevent protests like these in the future."
 CT_struck_by_terror_attack: "Struck by Terror Attack"
 CT_struck_by_terror_attack_desc: "Our nation has be struck by a terror attack from an international terror organization. It will take us time to recover from this brutal attack, both from a military and economic standpoint."
 CT_terror_attack_happened: "世界的なテロ攻撃の発生"
 CT_terror_attack_happened_desc: "世界各地でテロ攻撃が起き続ければ、次は自分たちかもしれないと、国民は不安を抱いている。彼らの安全を確保するため、我々は何らかの対策を講じなければならない。"
 CT_terror_attack_prevented: "Terror Attack Prevented"
 CT_terror_attack_prevented_desc: "Our intelligence and Counter-Terrorism forces have recently stopped a terror attack against our nation, solidifying the people's faith in our ability to protect them!"
 MD_terror.1.t: "[org_doing_attack] Conducts Terror Attack!"
 MD_terror.1.d: "[org_doing_attack] conducted a terror attack against us today, an attack our intelligence and counter-terrorism agencies were unable to prevent. Reports about the damage and casulties are still coming in, but they are estimated to both be significant. We must now make a decision about our next move, in order to provide safety, security, and support to our citizens in this time of crisis."
 MD_terror.1.a: "We need to let local responses ocurr."
 MD_terror.1.b: "Send as much aid as we can!"
 MD_terror.2.t: "[org_doing_attack]によるテロ攻撃を阻止！"
 MD_terror.2.d: "[org_doing_attack]は本日、テロ攻撃の実行を試みたが、我が機関による効果的な情報収集と、対テロ部隊の勇敢な行動により阻止された。関与したテロリストは全員、殺害または拘束されており、彼らの隠れ家は、さらに得られる情報がないか現在調査中である。本日は我々の対テロ部隊にとって大きな成功だ！"
 MD_terror.2.a: "[THIS.GetNameDef]にとっての大勝利だ！"
 MD_terror.3.t: "[FROM.GetName]がテロ攻撃に見舞われた！"
 MD_terror.3.d: "[FROM.GetName]は本日、[org_doing_attack_int]による攻撃を受け、同組織は同国に重大な損害と死傷者をもたらすことに成功した。[FROM.GetName]が攻撃の衝撃に揺れる中、我が国の市民も、我が国の領土内で攻撃が起こる可能性について懸念を募らせ始めている。我々は[FROM.GetName]に支援を送るべきかどうか選択しなければならず、また自国の市民を安心させるために何を行うか決めなければならない。"
 MD_terror.3.a: "なんという悲劇だ。"
 MD_terror.3.b: "我々は自国の警備を強化しなければならない！"
 MD_terror.4.t: "[FROM.GetName]がテロ攻撃を阻止！"
 MD_terror.4.d: "[FROM.GetName]政府は本日、効果的な諜報・警察・軍の作戦を用いて、国内で[org_doing_attack_int]によるテロ攻撃を成功裏に阻止したと発表した。攻撃に先立ってテロ細胞を無力化したという。この本日の成功は、対テロ戦争における大きな成果である！"
 MD_terror.4.a: "[FROM.GetNameDef]は明らかに備えていた。"
 MD_terror.5.t: "大量データ収集に対する抗議"
 MD_terror.5.d: "情報機関内での漏えいにより、テロを未然に防ぐために我々が実施している大量データ収集が、世間に知られることとなった。だが人々はこれを、プライバシーへの重大な侵害だと受け止め、政府の行き過ぎだとみなして批判と抗議を始めている。"
 MD_terror.5.a: "彼らのためなのだ！"
 MD_terror.6.t: "大量逮捕への抗議"
 MD_terror.6.d: "[name_of_org_disp]の支持者に対する大規模な逮捕は、彼らの活動を妨害するうえで効果を上げている。しかし、ずさんな情報のせいで、多数の無実の市民や通行人まで誤って逮捕してしまった。その結果、世論は我々の対テロ作戦に不満を強め、国家の安全を守るために必要な大規模逮捕やその他の強硬な手法の使用に対し、抗議を始めている。"
 MD_terror.6.a: "謝罪だけでは足りないのか？"
 MD_terror.7.t: "潜入成功！"
 MD_terror.7.d: "工作員からようやく報告が届いた。潜入は成功し、現在は組織内部に入り込んでいる。時間はかかるかもしれないが、作戦を進めていく中で、彼がもたらす諜報は我が国にとって大いに役立つだろう。"
 MD_terror.7.a: "彼の情報は大きな価値がある！"
 MD_terror.8.t: "工作員の死亡"
 MD_terror.8.d: "しばらくの間、工作員から連絡が途絶えていたが、ようやくその理由が判明した。[name_of_org_disp]が本日公開した動画には、他の数名とともに我々の工作員が処刑される様子が映っていた。彼は明らかに正体を見破られ、あるいは拘束されたのだろう。その結果、彼から得られていた（あるいは現在収集中の）情報の価値は低下してしまった。彼らは、我々が彼を通じて捜査していることを把握したからだ。"
 MD_terror.8.a: "なんという損失だ"
 MD_terror.9.t: "治安強化措置への怒り"
 MD_terror.9.d: "私たちが実施した治安強化措置により、公共交通機関を利用した空路・海路・陸路の移動が煩雑になり、市民の不満が高まっている。さらに、政府関連の行事における警備水準の引き上げにも反発が出ており、市民との関係に負担が生じている。"
 MD_terror.9.a: "措置は維持しなければならない！"
 MD_terror.9.b: "影響を少し抑えられるかもしれない…"
 MD_terror.11.t: "[FROM.GetName] Proposes Joint Counter-Terror Exercises"
 MD_terror.11.d: "[FROM.GetName] has proposed that we conduct joint Counter-Terrorism exercises, to expand the capabilities of our military forces and counter-terrorism forces. If we accept, we will have to spend some funding to make the exercises happen, but they will have to spend some money as well. If we refuse, we will likely upset them, but they will get over it."
 MD_terror.11.a: "Conduct the Exercises!"
 MD_terror.11.b: "This is a waste of time."
 MD_terror.13.t: "[FROM.GetName] offers Advisors"
 MD_terror.13.d: "[FROM.GetName] has proposed sending us assistance, in the form of foreign advisors. While this would increase our counter-terrorism capabilities, we also must assume those advisors will report on our activities and capabilities, which could result in intelligence leaks."
 MD_terror.13.a: "Accept the Offer!"
 MD_terror.13.b: "[THIS.GetName] needs no assistance!"
 MD_terror.14.t: "[FROM.GetName]が顧問を撤収"
 MD_terror.14.d: "[FROM.GetName]は我が国から対テロ顧問を撤収させた。これにより、我々の対テロ作戦遂行能力は低下した。"
 MD_terror.14.a: "よくもこんなことを！"
 MD_terror.15.t: "[FROM.GetName] accepts Advisors!"
 MD_terror.15.d: "[FROM.GetName] has accepted our offer of counter-terrorism advisors from our intel agencies! Not only will this help us improve their counter-terror opreations, but it also will give us an inside look at their intelligence gathering and processing operations."
 MD_terror.15.a: "They made the smart choice!"
 MD_terror.16.t: "[FROM.GetName] refuses Advisors!"
 MD_terror.16.d: "[FROM.GetName] has refused to allow our counter-terror advisors into their country."
 MD_terror.16.a: "Well, it's their loss."
