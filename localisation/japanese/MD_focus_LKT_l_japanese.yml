l_japanese:
 Republic_of_Lakota_focus: "ラコタ共和国 国家方針ツリー"
 LKT_Sakakawea_capital: "§Yサカガウィア§!を首都にした"
 LKT_Sakakawea_capital_name: "サカガウィア"
 LKT_Pierre_capital: "§Yピア§!を首都にした"
 LKT_Pierre_capital_name: "ピア"
 LKT_Fort_Nakanin_capital: "§Yフォート・ナカニン§!を首都にした"
 LKT_Fort_Nakanin_capital_name: "フォート・ナカニン"
 LKT_New_Cheyenne_capital: "§Yニュー・シャイアン§!を首都にした"
 LKT_New_Cheyenne_capital_name: "ニュー・シャイアン"
 LKT_Old_Cheyenne_capital_name: "オールド・シャイアン"
 LKT_decisions_war_time_mobilization_category: "戦時動員"
 LKT_decisions_war_time_mobilization_category_desc: "必要が生じたとき、我々は少なくとも戦線の隙間を埋めるために人々の義勇軍団を召集することができる。戦争がいつ来るかは分からないが、我々の上に降りかかることは分かっている。"
 LKT_war_time_mobilization: "第一次動員"
 LKT_war_time_mobilization_desc: "召集令状が我々の上にあり、我々は家の防衛を確実にするために結集しなければならない。武器を取れ、ディキシーの少年たち！\" # Note: \"Dixie boys"
 LKT_war_second_wave_defenders: "第二次防衛隊"
 LKT_war_second_wave_defenders_desc: "敵は前進してくる、したがって我々は別の防衛隊の波を徴兵しなければならない。国家の士気は苦しむだろうが、我々には軍隊が必要だ。"
 LKT_war_desperate_defenders: "決死の防衛隊"
 LKT_war_desperate_defenders_desc: "事態は厳しくなっている、我々は戦線を維持するために、可能な限り、あるいはそうでなくても、利用可能な全ての人員が必要だ。もしかしたら、もしかしたら、まだこれを勝てるかもしれない。"
 LKT_ideas_economic_development_commission: "経済開発委員会"
 LKT_ideas_economic_development_commission_desc: "開拓戦線と国家政府との間の結束がかつてないほど強固になったことで。我が国の経済構成を開発し理解するために使用される新しい経済委員会が創設された。今や底辺と頂点の両方が協力しており、偉大な国家の未来は真の統一に向けたもう一つのピースに過ぎない。"
 LKT_event.1.t: "政府の長"
 LKT_event.1.d: "現時点ではさらに北に目を向ける意図はないため、国家の首都の安全保障は我々の最も北にある４つの州にかかっている。ダコタ諸州、モンタナ州、ワイオミング州である。首都が前線から遠ければ遠いほど、援助と注意が引き離されると信じているため、一部はこの考えを思いとどまらせるが。それにもかかわらず、我々はこの気晴らしの口論によって妨げられることはできない。しかし、多くの人々はまた、首都名の命名をより基本的なものに保つべきか、それとも土地の先住民の起源に訴えるべきか疑問に思っている。今のところ、これらの４つの候補州は、自州が選ばれるために国家始まりの委員会にとって魅力的に見えるように準備を進めている。"
 LKT_event.1.o1: "これと同じような理由で\n崩壊しなかったか？"
 LKT_event.2.t: "核心での議論"
 LKT_event.2.d: "４つの候補者のうち、古いものにより沿ったものと、土地の先住民の影響により調和したいと望む者たちとの間で意見が分かれている。先住民側には、近くにあった古い先住民居留地（ナコダ族とアアニニン族のためのもの）にちなんで名付けられたフォート・ナカニンのあるモンタナ州がある。ノースダコタ州では、州最大の川にちなんでサカガウィアがある。南部の参加者では、サウスダコタ州ピアが選択肢であり、州ではあまり開発が見られないため、州内の多くの人々は、新しい連邦首都がピアのより広い大都市圏パズルの一部となる独自の地区を作成するのが容易であると信じている。最後に、州のほぼ中央右にあるニュー・シャイアンがあり、それはオールド・シャイアンと改名されるワイオミング州の旧州都に優先するだろう。一部の住民はこの考えに少し傷ついているが、連邦首都が若い国家の歴史の新しいページのトーチを取るにつれて、それが再生の良い象徴であると多くの人々は信じている。"
 LKT_event.2.o1: "サカガウィア"
 LKT_event.2.o2: "ピア"
 LKT_event.2.o3: "フォート・ナカニン"
 LKT_event.2.o4: "ニュー・シャイアン"
 LKT_event.3.t: "南部の監査"
 LKT_event.3.d: "国家を安定させるための長く退屈な冒険の後、我々はついに、明らかに我々を助けているこの所謂「開拓戦線」組織に対処することができた。しかし、我々はこれらの人々がなぜ既に確立された家を離れて突然新しい家を作ることを決定したのか、その本当の理由を見つけるために監査人をそこに送った。それにもかかわらず、我々が真に行動するのであれば、正確に何が報告されるかを見るのを待たなければならない。"
 LKT_event.3.o1: "そんなに悪いはずがない、\nそうだろ？"
 LKT_event.4.t: "初期報告"
 LKT_event.4.d: "一部の情報が戻ってきたが、良くて複雑、悪くて混乱している状況だ。報告によっては、RFは文字通り彼らが主張する通りであるという。南部共和国から逃れ、新たな居場所を求め移住した先住民の集団だ。その結果、カンザス州の経済状況は全米平均を上回る速度で成長している。しかし一方で、RFメンバーの一部が地元住民に対する犯罪行為や、自らの評判を維持するための疑似マフィア的活動に手を染めているとの報告もある。こうした二面性ゆえに、我々は復興に真に協力できる可能性もあれば、腹にナイフを突き刺される危険性もある。いずれにせよ、我々は重大な選択を迫られている。その選択が、将来後悔する結果を招くかもしれない行動につながる可能性すらあるのだ。"
 LKT_event.4.o1: "犯罪者だ、全員！"
 LKT_event.4.o2: "待て、これには何か\n別の意味があるかも"
 LKT_event.5.t: "断れない提案"
 LKT_event.5.d: "RFのより違法な活動に関する衝撃的な報告を受けて、監査人はイニシアチブを取り、RFの指導部と会い、多かれ少なかれ彼らに提案をした。彼らの大言壮語の一部を鎮め、北部の国家政府がより多くの功績を得るようにさせれば、我々はあなた方を放っておくだろう。当然ながら、RF指導部からは様々な反応があり、それはますます大きくなる集団的な反応であった最も声高なものであった。その反応は、「我々は平和的な人々であり、あなた方が我々を一般的な犯罪者や、古き白人のカウンターパートのような組織化されたギャングスターであると信じていることに、徹底的に侮辱されている。我々は、我々の人々を汚名を着せるような、そのような失礼で品位を下げる発言に我慢しないことを示すだろう。」と引用された。監査人は追い出され、ネブラスカ国境までずっと嫌がらせを受けた。これにより、我々の仮定が正しく、十分すぐに我々は行動しなければならないことは明らかである。"
 LKT_event.5.o1: "少し譲れば\n州全体を取られる"
 LKT_event.6.t: "国家を結集せよ"
 LKT_event.6.d: "RFのメンバーと地方指導部が全体としてこの反抗的な運動に味方し始めたため、カンザスでの不安が高まっている。そのため、北部諸州は結集し始めており、我々が本当にいつでもどこかへ到達するのであれば、何らかの動員を開始する必要がある。"
 LKT_event.6.o1: "我々の国だ、\n彼らのものではない"
 LKT_event.7.t: "公然たる反乱"
 LKT_event.7.d: "あの忌々しい裏切り者たちはついにそれをやった、彼らはカンザス州旗を高く掲げ、共和国からの州の独立を宣言した。我々は軍隊を組織し、隣人が弱点を見る前にこれを終わらせる必要がある。"
 LKT_event.7.o1: "結集の呼びかけを鳴らせ"
 LKT_event.8.t: "戦争へ！"
 LKT_event.8.d: "国家は動員された、それがどれほどの価値があるにせよ、そしてこのように我々はこれらの裏切り者の日和見的な害虫から我々の土地を守るために南へ行進する。善意とか、そんなもの、ばあああ、せいぜいくだらない戯言の束であり、最悪の場合はもっと多くの嘘の束だ。"
 LKT_event.8.o1: "南へ進軍！"
 LKT_event.9.t: "彼らは我々に選択肢を残さない"
 LKT_event.9.d: "彼らは我々を泥棒、悪党、犯罪者と呼ぶ。まあ、我々はそうではないし、カンザスのこれらの寛大で親切な人々と共に我々自身を守るだろう。カンザスのために、そして真の自由のために！"
 LKT_event.9.o1: "我々は自由のために戦う！"
 LKT_event.5000.t: "さらなる調査"
 LKT_event.5000.d: "継続的な報告は、組織の活動の違法な側面に関する主張が前提において誤りであることがますます証明されていることを示している。そのため、国家経済を活性化し、人々のより調和のとれた連合に向けてより努力することについての交渉が始まり始めた。"
 LKT_event.5000.o1: "さらに調査して良かった"
 LKT_event.5001.t: "さらなる計画"
 LKT_event.5001.d: "初期の協議と投資計画は、全体的に成長する経済をもたらした。そのような成長は、我々の国家に、数ヶ月かかると考えていたもの、すなわち発展を見させた。事態が進むにつれて、我々は偉大な国家とその多くの人々のバランスの取れた着実な経済発展を確実にするために、経済委員会を設立することを検討しなければならない。"
 LKT_event.5001.o1: "繁栄へ！"
 LKT_event.5002.t: "委員会"
 LKT_event.5002.d: "継続的な交渉と発展は、「経済開発委員会」の形成をもたらした。この委員会は、将来の世代にわたって我が国を助ける、より結束力のある経済計画と成長ドクトリンをもたらした。"
 LKT_event.5002.o1: "我々は団結して立ち上がり、二度と分かたれるまい"
 LKT_organizing_the_farmers: "農民の組織化"
 LKT_organizing_the_farmers_desc: "我々が持っているものは多くないが、持っているものは結集し、必要な時に備えて準備しなければならない。"
 LKT_creating_infantry_reserves: "予備役の創設"
 LKT_creating_infantry_reserves_desc: "周囲の敵に包囲されている我々は、最悪の事態を想定しなければならない。時が来た時に敵に対して準備ができるよう、即応予備軍を創設しよう。"
 LKT_mobilizing_the_reserves: "予備役の動員"
 LKT_mobilizing_the_reserves_desc: "時は近づいており、我々は愛する市民の安全を確保しなければならない。予備軍を招集し、我らの故郷を守るために出撃しよう。"
 LKT_focus_a_capital_conundrum: "A Capital Conundrum"
 LKT_focus_a_capital_conundrum_desc: "With limited bounds being held together that we call a nation, we must seek out a base for which we can call our nation's capital. To the north we look and hope for a resolution."
 LKT_focus_montana_monster: "Montana Monster"
 LKT_focus_montana_monster_desc: "The reconstruction has finally begun, our nation must be able to serve and feed itself before we can even think about anything else. As such agriculture will be the priority in these early days."
 LKT_focus_montana_marvel: "The Montana Marvel"
 LKT_focus_montana_marvel_desc: "From rags to riches, or at least from empty to full stomachs. As such we can start rolling our civil and general municipal services to help stabilize society within the state and bring forth a new peace to these lands."
 LKT_focus_northern_troubles: "Northern Troubles"
 LKT_focus_northern_troubles_desc: "The Dakota's like most of our nation are very sparse and not really developed despite the population counts of some states. Regardless we must solidify our nothern border territories before opportunist attempt to take them away, not to mention any folks who are trying to leave will also be a great loss for our nation. For now lets just get some kind of economy going."
 LKT_focus_our_northern_light: "Our Northern Light"
 LKT_focus_our_northern_light_desc: "With economic and the beginnings of social stability returning to North Dakota, we can now start expanding local emergency and civil services. From this we can expand the realm of control within our young nation."
 LKT_focus_yellowstone_yelling: "The Yellowstone Yelling"
 LKT_focus_yellowstone_yelling_desc: "The lands cry for their is chaos and danger throughout them, we must set forth an initiative to return peace and quiet to these parts. There are not many within the state however with this in mind that means there is even less development and stuff to work with in general. But the wpeople must have something and we shall give them food for their bellies."
 LKT_focus_worland_wonder: "The Worland Wonder"
 LKT_focus_worland_wonder_desc: "Finally a sembalance of peace has been restored and with that civil services and other municipal amendities can be restored bringing back societal cohesion to more of our nation. Soon we can truly enjoy a place we can call home."
 LKT_focus_southern_turmoil: "Southern Turmoil"
 LKT_focus_southern_turmoil_desc: "Bubble bubble toil and trouble, we stir the pot of all that troubles. From the bottoms of despair we bring to the surface something we can clean and repair. With an economy and food on the tables we set, we shall tell tales what once were fables which had beset. Now forward we march to set the pace, for our people need us in these dire needs of fate."
 LKT_focus_rapid_city_revival: "Rapid City Revival"
 LKT_focus_rapid_city_revival_desc: "With a steady hand we make our peace, for the people's of these lands we shall let them feasts...okay enough with the shitty rhymes. You've built some kind of economy, now start rolling in governmental administration and civil services to restore social cohesion and reclaim solidarity of another part of your nation."
 LKT_focus_industry_what_industry: "Industry, What Industry?"
 LKT_focus_industry_what_industry_desc: "Now despite what many would love to claim, to the obvious reality we do have some industrial might....it may not be much but it's something regardless of the fact. This at least helps us to stabilize and diversify our economic makeup over all."
 LKT_focus_nebraska_neck_breaker: "Nebraska Neck Breaker"
 LKT_focus_nebraska_neck_breaker_desc: "With the nation all injured we must work to heal its wounds. As such restoring some kind of economic baseline will allow for people to come together and restart society as we know it."
 LKT_focus_from_broken_bow_to_fixed: "From Broken Bow To Fixed"
 LKT_focus_from_broken_bow_to_fixed_desc: "The wounds heal but the scars still remain, it'll take time to fully heal and move on from the past but we can do it, one piece at a time."
 LKT_focus_kansas_city_catastrophe: "Kansas City Catastrophe"
 LKT_focus_kansas_city_catastrophe_desc: "Kansas City, Kansas, what a place, full of people, things to do and things to take out of context and make fun of. Yet that could be said about a lot of things, however a spark was lit and the city was alight with more than just jeers and cheers. Now we must bring back what was once lost and set forth a new path to renewal."
 LKT_focus_the_kansas_city_kitty: "The Kansas City Kitty"
 LKT_focus_the_kansas_city_kitty_desc: "Now that the economy is, well existing we can get back into the swing of things. I hear the club is open down on main street and so we can dance the night away like they use to in the good old days."
 LKT_focus_the_new_republic: "The New Republic"
 LKT_focus_the_new_republic_desc: "From the ashes of old rises a new. now we set forth to discover not only ourselves but the future for which we wish to make."
 LKT_focus_new_elections_begin: "New Elections Begin"
 LKT_focus_new_elections_begin_desc: "Now is the time to begin our political foundations. By holding our first national election we set the stage for our people to come to their own conclusions and take charge in the fate for which they desire."
 LKT_focus_the_councils_of_authority: "The Councils Of Authority"
 LKT_focus_the_councils_of_authority_desc: "In an interesting twist of fate it seems that one of the many, almost \"oligarchic\" parties has won out in the election. The real question now is just what do any of these parties have planned for the nation. I mean the term oligarchy is such an imposing distinction that surely this doesn't bode well for the nation. Just what were the people thinking?"
 LKT_focus_DDP_political_plan: "The Dakota Democracy Party Political Plan"
 LKT_focus_DDP_political_plan_desc: "In the conclusion of the first elections, it appears that the Dakota Democracy Party has secured victory. Now they plan to implement their policies to help mold the nation and it's people in these early and unsure days."
 LKT_focus_skill_assessment_fairs: "Skill Assessment Fairs"
 LKT_focus_skill_assessment_fairs_desc: "The SAF's are federally sponsored events designed to hone in and have the population learn and understand their skills in all fields. This allows us to help employ individuals as well as gives us a better grasps on what talent we have within our nation."
 LKT_focus_light_industry_investment: "Light Industry Investments"
 LKT_focus_light_industry_investment_desc: "Establishing limited but meaningful industries in our nation will give passive exposure to new skill sets and job opportunities. It may not be much, but it's honest work as they say."
 LKT_focus_business_taxes_redraft: "Business Taxes Redraft"
 LKT_focus_business_taxes_redraft_desc: "By concluding an initial individual businesses tax redraft. We shall set a new floor for which our taxation policies can actually be carried out. While our economy doesn't have much in the way of specifics, overbloating the demands on said businesses by blanket corporate taxes will no doubt have a negative effect on our revenue."
 LKT_focus_education_streamlining: "Education Streamlining"
 LKT_focus_education_streamlining_desc: "Simplifying the curriculum into the fundamentals for which students can use in their day to day will allow us to look into better classroom management, as well as how to reform the curriculum in the future."
 LKT_focus_basic_arms_industry_investment: "Basic Arms Industry Investment"
 LKT_focus_basic_arms_industry_investment_desc: "Our nation is sparse and under developed. We'll be seen as an easy target by many and while we don't want to be an easy target, for us to develop such early militaristic ambitions, we must create a reason for it. As such we'll set the basis for local arms manufacturing to support hunting and help maintain arms for our standing military forces."
 LKT_focus_extensive_geological_surveys: "Extensive Geological Surveys"
 LKT_focus_extensive_geological_surveys_desc: "Through extensive research and surveying the lands of what are perceived as \"low value deposits\", we can begin to find ways to make these what seem like miniscule resource deposits and turn them into something meaningful. While it will be costly in the beginning, the long term benefits and security of our national independence are well worth the price."
 LKT_focus_KCK_political_plan: "The KCK Political Plan"
 LKT_focus_KCK_political_plan_desc: "The Kansas City Koalition is a collective of business leaders and political figures who want to get the nation on track as fast as reasonably possible. As such their main things are focusing on economic stability and population management due to the \"Great Collapse\"."
 LKT_focus_zoning_reforms: "Zoning Reforms"
 LKT_focus_zoning_reforms_desc: "Allowing for more flexible and a different approach to more traditional forms of zoning should allow our towns and cities to become more adaptable to the needs of our citizens and the economy at large."
 LKT_focus_integrated_health_plans: "Integrated Health Plans"
 LKT_focus_integrated_health_plans_desc: "By incorporating mandatory provided health care plans into businesses will allow for more flexible hiring means as well as streamline the needs of employees to work environment demands."
 LKT_focus_regulatory_cutbacks: "Regulatory Cutbacks"
 LKT_focus_regulatory_cutbacks_desc: "Removing a lot of tedious and counter productive regulations will allow businesses to better support the nation and the people they employ."
 LKT_focus_national_employment_commission: "National Employment Commission"
 LKT_focus_national_employment_commission_desc: "The NEC is a national body implemented in the task of seeking out both domestic and foreign neighboring manpower to fill jobs and grow a more stable and well rounded economy. Of course it'll be a bit dicey to \"head hunt\" foreign workers, however our continental brothers and sisters will be treated as regular citizens since the whole point of the program is to ensure that the economy is not outpacing the workforce available."
 LKT_focus_ensuring_military_stockpiles: "Ensuring Military Stockpiles"
 LKT_focus_ensuring_military_stockpiles_desc: "National defense is important, however to actually be able to defend ones own nation one must first have the equipment needed to do so. As such an expansion with the NEC will allow us to employ more people into factories to create these stockpiles so our army and air force can defend our nation from unseemly interest."
 LKT_focus_LTP_political_plan: "The LTP Political Plan"
 LKT_focus_LTP_political_plan_desc: "The Lakotan Technocratic Party is a party of progress and innovation. Focusing on education, R&D as well as creating the economic environment to fund such endeavors, the LTP is hopeful to create a nation which strives to do better and find ways to do better still."
 LKT_focus_mandatory_education_programs: "Mandatory Education Programs"
 LKT_focus_mandatory_education_programs_desc: "The MEPs are programs which are designed to further the limits of education by not going through the simple grade school levels. But independent programs outside of the standard to encourage new opportunities for folks regardless of age."
 LKT_focus_the_means_of_efficiency: "The Means Of Efficiency"
 LKT_focus_the_means_of_efficiency_desc: "Our nation is sparsely populated and as such we must focus and adapt to this reality. As such we must seize the means of efficiency and work to make due with what we have."
 LKT_focus_ends_of_a_means: "Ends Of A Means"
 LKT_focus_ends_of_a_means_desc: "We have access to a core resource which is iron ore. We can turn this ore into steel which is a fundamental piece to the modern economic puzzle. As such we must invest heavily into extracting this resource if we are to have a true stepping stone for our self sufficiency."
 LKT_focus_economic_expansion_act: "Economic Expansion Act"
 LKT_focus_economic_expansion_act_desc: "General industrial developments will allow our economic base to expand. This in turn should allow us to build more capital for further investments."
 LKT_focus_peoples_defense_act: "The Peoples Defense Act"
 LKT_focus_peoples_defense_act_desc: "The PDA is a limited national defense program that created limited industrial and contracting opportunities to give our nation a means to equip our soldiers with equipment."
 LKT_focus_militarized_politics_plan: "Militarized Politics Plan"
 LKT_focus_militarized_politics_plan_desc: "With the nation at odds about what is right and wrong in how to move forward, elements of the AFL, Armed Forces of Lakota, have seized the initiative and somehow secured a voting majority to win this first election. Though many doubt they'd win a less divisive election, more still are just happy to have a direction than simply wondering in the unknown."
 LKT_focus_national_conscription_period: "National Conscription Period"
 LKT_focus_national_conscription_period_desc: "Due to our overwhelmingly low population count compared to our coastal neighbors, we must introduce a mandatory conscription period of at least half a year. Many will disapprove of the move, however if we are to genuinely focus on national defense and prepare for any such tomfoolery from the other powers at be, then as such we must do this."
 LKT_focus_military_classroom_standards: "Military Classroom Standards"
 LKT_focus_military_classroom_standards_desc: "By incorporating simple requirements like physical prowess and basic type knowledge in drill formations as well as small unit tactics, we can thus create a loose form of basic training which then prepares the future conscripted young adults for their mandatory conscription period."
 LKT_focus_basic_economic_investments: "Basic Economic Investments"
 LKT_focus_basic_economic_investments_desc: "If we are to have a chance at defending ourselves then we must actually have a means to support such endeavors. As such we'll create limited industrial expansion projects so we have such means."
 LKT_focus_military_industrial_sector: "Military Industrial Sector"
 LKT_focus_military_industrial_sector_desc: "The MIS is our form of a military industrial complex. However the key difference is that these factories will be multi-purpose in that they will be built with the means of adaptability. What we mean by that is these still contribute to the civilian economy in limited forms during peace time but can easily convert and ramp up production of war materials when the time comes."
 LKT_focus_less_for_more: "Less For More"
 LKT_focus_less_for_more_desc: "Focusing on investments to require less manpower to be used in individual businesses and economic sectors frees up more for the military and for economic expansion. With this in mind our population is also abhorrently small compared to the rest of the continent practically. As such we'll invest in food production, supply chains and seize the means of reproduction so our citizens can live and love as they please."
 LKT_focus_general_military_improvements_funding: "General Military Improvements Funding"
 LKT_focus_general_military_improvements_funding_desc: "The GMIF is a robust funding package to allow our military to improve in means we deem needed for the potential battlefields we may find ourselves on. With air being the biggest threat, we shall split the investments evenly between the air force and army for the time being."
 LKT_focus_the_parties_for_tradition: "The Parties For Tradition"
 LKT_focus_the_parties_for_tradition_desc: "A collection of parties from center-right to more just plainly right leaning are coming together to form a voting block known as the Parties for Tradition. As such it a curiosity to see if and what party the people might gravitate towards in the nation's first election."
 LKT_focus_ORP_political_plan: "The ORP Political Plan"
 LKT_focus_ORP_political_plan_desc: "The Old Republic Party uses a platform of stability and caution. THis platform can be seen as slow and steady winning the race and considering the situation we find ourselves in as a nation I believe many wouldn't have voted for them if they decided to jump the gun like some parties."
 LKT_focus_strategic_mechanization_act: "Strategic Mechanization Act"
 LKT_focus_strategic_mechanization_act_desc: "The over reliance of our economy to be around agriculture in some degree or another means that a lot of people are tied up in this endeavor. As such, despite the up roar this may create, we must enforce some form of mechanization efforts as a means to better distribute the available work force we have."
 LKT_focus_better_neighbors_act: "Better Neighbors Act"
 LKT_focus_better_neighbors_act_desc: "With the primary economic sector being agriculture, food abundance is not an uncommon thing. As such we can incentivize \"asylum seekers\" from our neighboring nations to kick start the population and help to rebuild our economy as a whole. Jobs mean nothing without people to fill them after all."
 LKT_focus_green_thumb_officers_act: "Green Thumb Officers Act"
 LKT_focus_green_thumb_officers_act_desc: "The GTO Act is designed to help improve funding for law enforcement as well as better distribute resources to neighborhoods and livelihoods of those in more isolated regions."
 LKT_focus_kansas_economic_upgrade: "Kansas Economic Upgrade"
 LKT_focus_kansas_economic_upgrade_desc: "A significant area of development is our most southern state of Kansas. This state for all it's development has a higher than expected agricultural reliance. As such, through some generous investments we plan to convert a specific area of the greater agricultural economy into a mix of light and heavy industry."
 LKT_focus_better_budgeting_act: "Better Budgeting Act"
 LKT_focus_better_budgeting_act_desc: "The Better Budgeting Act takes the existing education budget and does a full and detailed audit to help streamline and better allocate fiscal resources. With this we plan to improve educational standards by removing as much as possible the inconsistency that budgeting failures can have on students and staff."
 LKT_focus_experimental_extractions_act: "Experimental Extractions Act"
 LKT_focus_experimental_extractions_act_desc: "Our nation lacks a core steel and or just a decent iron ore supply. As such geological surveys and heavy investment, regardless of net profitability will be conducted in the states of Kansas and Nebraska to ensure our nation has access to this critical building block of modern economics."
 LKT_focus_GLP_political_plan: "The Great Liberal Party Political Plan"
 LKT_focus_GLP_political_plan_desc: "Using moderately liberal policies to improve our agriculture will support our nation and its people. Many voted for the Great Liberal Party because it was seen as a party of slow progress, of change in forms that people could adapt and understand. But only time will tell if these will stay true."
 LKT_focus_food_bank_securities_act: "The Food Bank Securities Act"
 LKT_focus_food_bank_securities_act_desc: "The FBS Act is legislation to create government bonds and private investment bonds that will go into the purchase of common foods that households may have. These \"food banks\" will then be used to help families acquire the daily needs they may not be able to afford in times of need. Charities that have stable and consistent structures which help to feed homeless and other impovershed citizens may also apply for such securities but will be accompanied by federal regulators to ensure the fiscal and foods are being used for intended purposes."
 LKT_focus_audit_commissions_act: "Audit Commissions Act"
 LKT_focus_audit_commissions_act_desc: "The ACA or Auditing Act is legislation built to establish an independent commission of auditors to ensure federal agencies and personnel are allocating fiscal and material resources to the listed and intended means. This body will comeprise of individuals not associated with any political institution and or political party and as such will come from the respective fields of finance and regulation to ensure impartiality."
 LKT_focus_raw_value_act: "The Raw Value Act"
 LKT_focus_raw_value_act_desc: "Our nation can only get so much value from agriculture. People want stuff and stuff requires mineral resources and as such we will invest in rare earth element and other high value mineral mines to ensure we can diversify our national portfolio for lack of better words."
 LKT_focus_improving_immigration_processes: "Improving Immigration Processes"
 LKT_focus_improving_immigration_processes_desc: "By investing in improve the resources dedicated to immigration enforcement and the general process to become a citizen, we can hope for a smoother and better appeal to foreign nationals. This hope will be that they choose our nation as their new home and we can give them a new lease on life and its ever precious meaning."
 LKT_focus_invest_care_act: "The Invest Care Act"
 LKT_focus_invest_care_act_desc: "Invest Care is a budgeting initiative to put more consistent funding to medical services. With these improved funding efforts we hope to raise employee morale and encourage future employment opportunities as well as make sure buildings are up to code and equipment is working as intended. Your care is our investment, for a better people means a better nation."
 LKT_focus_national_defense_upgrades: "National Defense Upgrades"
 LKT_focus_national_defense_upgrades_desc: "Improved investments to better equipment and personnel familiarity with said equipment will increase our abilities to help defend our nation from foreign acts of aggression."
 LKT_focus_TTP_political_plan: "TTP Political Plan"
 LKT_focus_TTP_political_plan_desc: "The Tribal Traditions Party is a party that is semi-nativist in nature but not in a degree which many would assume. The nativism comes around the idea that while these lands were once tribal lands, in order to move forward, preserve and survive we must band together as one nation of many peoples. Using tradition for unity, such as family, community and belief in principles for which we set to hold true to ourselves."
 LKT_focus_defense_spending_program: "Defense Spending Program"
 LKT_focus_defense_spending_program_desc: "The DSP is a spending package designed around prepping the nation for more defensive posturing. Our lands are both open and closed in vast areas and as such we must work these terrains to our advantage."
 LKT_focus_families_security_stipend: "Families Security Stipend"
 LKT_focus_families_security_stipend_desc: "The Families Stipend as many are calling it is a fileable stipend that families can apply and get to help relieve any economic tension they may be facing in relation to family needs. Food, clothes and child care needs are covered under the stipend as well as a list of other registered items with your federal stipend card."
 LKT_focus_food_supply_mandate: "Food Supply Mandate"
 LKT_focus_food_supply_mandate_desc: "Our people live on fertile lands, lands which should easily feed the peoples who live on them. With this we shall invest and create a mandate that our citizens will always have cheap and good food for every meal where possible, for it is the very survival of our nation which hangs in the balance of our food supply."
 LKT_focus_limited_industrialization_efforts: "Limited Industrialization Efforts"
 LKT_focus_limited_industrialization_efforts_desc: "To diversify the economy and ensure a healthy and robust job market, we must invest in limited industrial developments to ensure our human resources are as diverse as these lands will provide."
 LKT_focus_setting_up_new_contracts: "Setting Up New Contracts"
 LKT_focus_setting_up_new_contracts_desc: "Creating a limited baseline for our military manufacturing capabilities will give us at least a metric of the demands we may face if war should ever break out on the Northern American continent."
 LKT_focus_strategic_mining_operations: "Strategic Mining Operations"
 LKT_focus_strategic_mining_operations_desc: "Our nation has resources, but we need to invest fairly heavily to acquire more vaulable and or economic far reaching minerals. With that in mind we shall invest in precious metal extractions in Wyoming and limited light metal operations in South Dakota. It won't be much, but supplementing some R&D funding should pay off in due course."
 LKT_focus_LTSP_political_plan: "LTSP Political Plan"
 LKT_focus_LTSP_political_plan_desc: "The Lakotan Traditional & Solidarity Party is a party of fairly generic conservative means. Looking to focus on community and family matters and using this as a means to foster national unity, many wonder why this party and some other similarly conservative parties even exist in the fractured state they are."
 LKT_focus_community_improvement_programs: "Community Improvement Programs"
 LKT_focus_community_improvement_programs_desc: "The CIPs are designed to provide community out reach and general improvement efforts to bring communities together and encourage general developments out of smaller and or more rural areas."
 LKT_focus_farming_expansion_efforts: "Farming Expansion Efforts"
 LKT_focus_farming_expansion_efforts_desc: "Our nation's stability thrives on the fact we have plenty of fertile lands and as such we will develop these lands to encourage our people to grow with the fields they cultivate."
 LKT_focus_building_to_new_heights: "Building To New Heights"
 LKT_focus_building_to_new_heights_desc: "The office and tech sectors need expanding. If we are to properly diversify our economy and our citizen's potential then we must invest into new developments as well as education efforts to support them."
 LKT_focus_manufacturing_new_industries: "Manufacturing New Industries"
 LKT_focus_manufacturing_new_industries_desc: "Developing the core base of our economy is fundamental towards general expansion."
 LKT_focus_securing_armaments: "Securing Armaments"
 LKT_focus_securing_armaments_desc: "Being able to supply our troops is paramount to our national defense. Since we don't expect anything in the near future, we'll start small and develop a couple of factories to handle basic equipment shortages."
 LKT_focus_natural_resources_act: "The Natural Resources Act"
 LKT_focus_natural_resources_act_desc: "An extensive and well rounded mining investment package that looks to revolutionize the resource capabilities of our nation. Though it will be costly it will pay for itself as time marches on."
 LKT_focus_the_common_folk_progress_parties: "The Common Folk Progress Parties"
 LKT_focus_the_common_folk_progress_parties_desc: "The Common Folk Parties as some like to preferably call the rising socialist economic aligned parties are a group of parties that in some form or fashion believe that they need to gain traction so that the, \"far-right\" does not. Regardless of what some party officials in these different groups want to use as the excuse, many see these parties as a more commonality way of viewing the nation as most of the lands are not developed and so \"Big Business\" doesn't really exist in the traditional sense."
 LKT_focus_FPP_political_plan: "The FPP Political Plan"
 LKT_focus_FPP_political_plan_desc: "Working on the basis as a farmer's labor party, the Farmer's Progress Party is using the idea of democratic socialist principles for a farmer's nation. Essentially instead of the main focus being industrial workers, their focus will be on bettering agricultural workers. Considering the makeup of our nation's economy, its no wonder they won the election."
 LKT_focus_american_asylum_act: "\"American\" Asylum Act"
 LKT_focus_american_asylum_act_desc: "The triple A act as some call it, is a pseudo open border policy. Essentially speaking those who can prove they lived for long standing period of time that they lived on the territories of the old republic will be granted asylum in the nation. This sort of take on the motto used around the statue of liberty out east is a great way to bring people into our nation and grow our economy through filling jobs that we seem to be making more of then we have folks to fill em."
 LKT_focus_expanded_health_services: "Expanded Health Services"
 LKT_focus_expanded_health_services_desc: "Improving our health care abilities and being able to reach anyone within a reasonable amount of time will ensure survival rates and improve overall health of our citizens."
 LKT_focus_fine_tuning_industrial_regulations: "Fine Tuning Industrial Regulations"
 LKT_focus_fine_tuning_industrial_regulations_desc: "While our economic makeup is not heavily reliant on industry, we can still beat the curve by adjusting an pre-emptively striking certain troublesome regulations which have stifled or outright hurt citizens of a host of nations."
 LKT_focus_more_for_more_act: "More For More Act"
 LKT_focus_more_for_more_act_desc: "This funding initiative will help to better streamline agricultural practices while also encouraging new farms and related industries to be built. The more for more part is accounted for the fact that less people will go into farming in the long term, however the same kind of farming folk will still be able to participate."
 LKT_focus_farmer_jims_research_emporium: "Farmer Jim's Research Emporium"
 LKT_focus_farmer_jims_research_emporium_desc: "An agricultural research emporium will help to generate new generations of farmers as well as it can double as a research facility in helping to better make agricultural products."
 LKT_focus_steeled_veins_act: "Steeled Veins Act"
 LKT_focus_steeled_veins_act_desc: "Iron ore, the live blood to create steel a critical pillar of modern economies and structures is below our very feet. We must invest and ensure we can secure this commonly demanded resource if we are to have a stable and functional economy."
 LKT_focus_LAS_political_plan: "LAS Political Plan"
 LKT_focus_LAS_political_plan_desc: "The Lakotan Agrarian Society is a collectivist movement which seeks to modernize agrarian policies while also looking at ways to cut government in ways that gives more power back to the people itself."
 LKT_focus_asylum_experiment: "Asylum Experiment"
 LKT_focus_asylum_experiment_desc: "We seek to populate our lands, our farms and our very nation itself. As such we must seek out the best forms of asylum seeking and do whatever it takes to make up these critical short comings."
 LKT_focus_improving_farming_methods: "Improving Farming Methods"
 LKT_focus_improving_farming_methods_desc: "Investing towards improving basic economic needs like food production will benefit every individual regardless of background. As such we'll look into ways to improve farming in any way to better our food supplies."
 LKT_focus_mechanized_agriculture_union: "Mechanized Agriculture Union"
 LKT_focus_mechanized_agriculture_union_desc: "By uniting the economic sectors of industry and agriculture we set a mutual precedent that these sectors cannot function without the betterment of the other. As such mutual growth and development must be ensured if we are to have a truly equal society."
 LKT_focus_local_farming_initiatives: "Local Farming Initiatives"
 LKT_focus_local_farming_initiatives_desc: "The biggest problem to food security is supply lines. Being able to bulk produce goods means nothing if they spoil before they get to store shelves. With this in mind we'll encourage more local developments to lessen the need for long haul transportation of food stuffs. Improving price per item and the ready currency that our people will have for their needs."
 LKT_focus_more_ways_to_work_the_land: "More Ways To Work The Land"
 LKT_focus_more_ways_to_work_the_land_desc: "Agriculture can only get us so far and the demands of modern agriculture methods means we must properly go through the lands and find mineral resources. As such a nationally balanced set of geological surveys, mining operations as well as creating new processing facilities will put our nation on heights never before seen in the modern age."
 LKT_focus_the_land_of_opportunity: "The Land Of Opportunity"
 LKT_focus_the_land_of_opportunity_desc: "Our lands are vast, empty and ripe for communities to thrive and work together. Let us set forth a mandate of welcoming in those who seek a better tomorrow."
 LKT_focus_PNP_political_plan: "PNP Political Plan"
 LKT_focus_PNP_political_plan_desc: "The party for national preservation is a pretty standard green party. Though compromising compared to more traditional ones, the PNP looks to modernize as well as ensure the nation's natural beauty stays in tact."
 LKT_focus_building_tall_not_wide: "Building Tall Not Wide"
 LKT_focus_building_tall_not_wide_desc: "By researching new forms of factory efficiency we can work together in finding ways to keep up with the demands of our society without needing to use up so much land in the process."
 LKT_focus_stable_economics: "Stable Economics"
 LKT_focus_stable_economics_desc: "Focusing on our economic stability, we must find a balance between efficiency in factories and other economic sectors while also looking to compensate the differing job market. As such we'll need to better our investments into social services and economic planning initiatives."
 LKT_focus_local_food_producers: "Local Food Producers"
 LKT_focus_local_food_producers_desc: "The LFP program establishes a handful of farms which are designed to feed local populations. Greatly lowering food costs as well as encouraging more domestic spending rather than foreign import and exporting."
 LKT_focus_sufficient_tech_investments: "Sufficient Tech Investments"
 LKT_focus_sufficient_tech_investments_desc: "The tech sector in our nation is little to nothing. however we do have the resources to do some decent investing in so we can at least have both the diversity in jobs as well as resources avilable to use further."
 LKT_focus_domestic_arms_production_efforts: "Domestic Arms Production Efforts"
 LKT_focus_domestic_arms_production_efforts_desc: "Our ability to preserve our lands and our people is leveraged only by the abilities of our standing military force. While nothing seems to be happening in the near future, having nothing to begin with is also not planning by any stretch of the imagination."
 LKT_focus_eco_extraction_efforts: "Eco-Extraction Efforts"
 LKT_focus_eco_extraction_efforts_desc: "By fine tooling and refining the means of resource extraction, we can have a vast and diverse pool of resources. however the direct amounts will be severely limited simply due to our own self restraint on mining operations. But we hope to further develop means to get more from less as technology advances."
 LKT_focus_RBP_political_plan: "RBP Political Plan"
 LKT_focus_RBP_political_plan_desc: "The Rose Bush Party looks to advance workers rights and generally move the nation forward through a progressive industrialization path. Looking to create more of a union between economic development and social development. The RBP will do what they can to ensure stability and prosperity between bosses and workers."
 LKT_focus_revamped_corporate_taxes: "Revamped Corporate Taxes"
 LKT_focus_revamped_corporate_taxes_desc: "By overhauling the tax code, especially around the more standardized corporate tax rate, we can ensure we have a steady form of income and shift more of the taxing needs to corporate and or office entities rather than the average tax payer."
 LKT_focus_education_for_all: "Education For All"
 LKT_focus_education_for_all_desc: "Vastly expanding our education systems and the ability of every citizen to acquire the knowledges of the world around us. This allows us to reap passive benefits as our population becomes more educated and reaches higher and higher standards as a baseline."
 LKT_focus_fixing_our_ore_deal: "Fixing Our Ore Deal"
 LKT_focus_fixing_our_ore_deal_desc: "Iron, steel, the modern pillar which upholds any economy after concrete itself. We must invest decently into making our own supplylines of steel if we are to survive long on our own. We're surrounded on all sides by unknowns, so lets at least make one thing known."
 LKT_focus_from_fields_to_cities_act: "From Fields To Cities Act"
 LKT_focus_from_fields_to_cities_act_desc: "General developments in both our rural and urban centers allows for a overall diverse expansion to the job market and quality of jobs available to our citizens."
 LKT_focus_from_it_sector_developments: "IT Sector Developments"
 LKT_focus_from_it_sector_developments_desc: "Having a small but self reliant IT and or tech sector will be most beneficial to continuing efforts to properly diversify our economic makeup."
 LKT_focus_supplying_our_military_needs: "Supplying Our Military Needs"
 LKT_focus_supplying_our_military_needs_desc: "Basic needs should be met at all times, regardless if it be civilian or military. If we are to defend ourselves from any foreign incursions then we must develop some factories to ensure military production is viable to our needs."
 LKT_focus_new_lakotan_nationals_parties: "New Lakotan Nationals, Parties"
 LKT_focus_new_lakotan_nationals_parties_desc: "The rising tide of socialist economic thought, the sudden and violent implosion of the old republic and the unchanged and untouched lands for which our nation occupies. These are but a few reasons for which you, the citizens of our glorious nation should vote for one of us. The New Lakotan Nationals! Join us in keeping the new identity for which we have forged free of foreign meddling and Marxist or even Maoist idealism. Vote Today and Do Your Part!"
 LKT_focus_YIP_political_plan: "YIP Political Plan"
 LKT_focus_YIP_political_plan_desc: "The YIP or Young Industrialist Party is a party focused on modernization and putting prosperity at the forefront of policy. Though some fear they are mearly just oligarchs in cloaks, many within the party focus on showing and proving planned endeavors rather than entertaining the traditional political mud slinging."
 LKT_focus_sponsored_immigration: "Sponsored Immigration"
 LKT_focus_sponsored_immigration_desc: "Our lands are barren, our citizens few and as such we must bring new comers seeking a better life. An empty job market waiting to be filled and land to settle as far as the eye can see. That is our promise to these new pioneers."
 LKT_focus_recruiting_talent: "Recruiting Talent"
 LKT_focus_recruiting_talent_desc: "Other ways to improve our head count for population is to provide opportunities for skilled workers. Better wages and living conditions is always a nice incentive."
 LKT_focus_south_munitions: "South Munitions"
 LKT_focus_south_munitions_desc: "Securing local production chains for military supplies will allow our service members to deal with any threats posturing against us."
 LKT_focus_central_industries: "Central Industries"
 LKT_focus_central_industries_desc: "Can't support a military without supporting the people themselves. As such we'll centralize the industrial developments to better accommodate travel needs for jobs."
 LKT_focus_bismarck_bombs: "Bismarck Bombs"
 LKT_focus_bismarck_bombs_desc: "More military manufactories up in the northern plains will allow us to deal with more volatile materials with limited collateral damages should anything ever occur."
 LKT_focus_promoting_human_resources: "Promoting Human Resources"
 LKT_focus_promoting_human_resources_desc: "The fields are ripe for the picking and so are the people too. By incentivizing agricultural production and the people to get it from field to tables across the country we must ensure targeted developments of immigration efforts as well as the economic support to do so."
 LKT_focus_CDS_political_plan: "CDS Political Plan"
 LKT_focus_CDS_political_plan_desc: "Geographic nationalism and staunch isolationism. These two pillars are what hold up the core values of the \"Society\" and its something many are confused on. For one, how does one only be \"Geographically Nationalist\" and two, how can isolationism even help us with such little development to our name to begin with. Whatever the case may be the Crop Duster's Society charges forward as they seize victory in the election."
 LKT_focus_learning_social_values: "Learning Social Values"
 LKT_focus_learning_social_values_desc: "Our society is in shambles because the people don't know what to uphold as our own. The family, nation and spirit of the lands we live on are all key values to promote and ensure a more stable and just society."
 LKT_focus_character_creation_programs: "Character Creation Programs"
 LKT_focus_character_creation_programs_desc: "Through a mixture of volunteer and mandatory programs that integrate parts of education and military service, many of our citizens and future generations will be empowered with the understanding of responsibility and duty. Not just to the nation but to themselves, their family and those they hold dear to them."
 LKT_focus_supply_chains: "Supply Chains"
 LKT_focus_supply_chains_desc: "Our nation is vast, mostly flat and overall a fairly under developed nation at that. We must do our best to create strong and flexible supply lines to support our nation."
 LKT_focus_domestic_families_act: "Domestic Families Act"
 LKT_focus_domestic_families_act_desc: "The DFA is a budgetary package designed to promote and actually subsidize larger families and thus encouraging domestic population growth. As foreign talent may be hard to find that can fit our cultural standards we must ensure that our low population count is never a critical factor in our own survival."
 LKT_focus_encouraging_favorable_migrants: "Encouraging Favorable Migrants"
 LKT_focus_encouraging_favorable_migrants_desc: "We must scan and search for the talent and skills our nation and its citizens need. For our survival is limited only to our ability and as such we must force to increase the very abilities we can have."
 LKT_focus_increased_military_investments: "Increased Military Investments"
 LKT_focus_increased_military_investments_desc: "We need to ensure our service members are equipped and ready for any enemy force which may befall our lands."
 LKT_focus_LGF_political_plan: "LGF Political Plan"
 LKT_focus_LGF_political_plan_desc: "The League of the Golden Fields as many refer to is a party not many believed to win, yet here we are. Many are unsure how such a party won to begin with but with such uncertain times I guess there is little in the way of what can be done. Lets just hope its more good than bad."
 LKT_focus_improved_food_production: "Improved Food Production"
 LKT_focus_improved_food_production_desc: "Securing food for our population encourages domestic growth and social stability."
 LKT_focus_increasing_industrial_base: "Increasing Industrial Base"
 LKT_focus_increasing_industrial_base_desc: "Growing our industrial capacity allows us to diversify our economy, improve its overall health and provide our citizens more opportunities then they'd ever find in those that border us."
 LKT_focus_local_military_production: "Local Military Production"
 LKT_focus_local_military_production_desc: "Investing in local military manufacturing allows us to secure equipment for our armed services and prevents the decay of our military. However we must look further into this if we are to truly defend ourselves from the savages who eye our lands with greed and envy."
 LKT_focus_increasing_lawful_order: "Increasing Lawful Order"
 LKT_focus_increasing_lawful_order_desc: "By increasing the budet for police and security services we can go after crimes of all kinds. Thus allowing us to keep corporate entities in line as well as potential foreign meddlers who may mix into the crowd of law abiding citizens."
 LKT_focus_military_education_act: "Military Education Act"
 LKT_focus_military_education_act_desc: "The MEA is a standardization of education around the guidelines of a military organization. No longer will intellectuals infect the minds of our youth with boisterous ideas which errode the foundations of our society. Now it is duty, honor, courage, respect and sacrifice. For home, family and those cherished in the hearts and minds of all our citizens."
 LKT_focus_self_mobilization: "Self Mobilization Act"
 LKT_focus_self_mobilization_desc: "The Self Mobilization Act is a comprehensive economic plan to mobilize the nation and its citizens in a sort of \"quarter stance\", per say. This means that tooling the economy to be more efficient, employing more people pre-emptively incase of real mobilization as well as increasing conscription efforts to mentally and socially prepare the population for the needs of any hostile incursions against us."
 LKT_focus_HOY_political_plan: "HoY Political Plan"
 LKT_focus_HOY_political_plan_desc: "The House of Yellowstone is apart of the wider global phenomenon which is the \"Modern Monarchist Movement\". This general and mildly diverse political movement has only one main tenant which is glory to the vote and not the blood. This translates to simply keeping and refining the voting process to be more wide spread and flexible. Things like universal sufferage to the age of 18, ranked choice voting for candidates and turning elected offices into titles. Meaning the president is now the King or say a representative is now a lord or whatnot. Many are confused but most are slowly being sold on the idea of being a duke, baron or whatnot simply for being a civil servant of the nation."
 LKT_focus_office_titles_act: "Office Titles Act"
 LKT_focus_office_titles_act_desc: "Standardizing the feudal titles around the offices of government will show people that if they work hard enough, even they can be a prince or princess."
 LKT_focus_expanding_mining_operations: "Expanding Mining Operations"
 LKT_focus_expanding_mining_operations_desc: "We need to ensure that our nation can actually stand on its own two feet. As such we need to invest in mining operation related to mineral extraction of resources which we are critically deficient in."
 LKT_focus_farmers_primacy_act: "Farmers Primacy Act"
 LKT_focus_farmers_primacy_act_desc: "Our food security is the only thing to create a stable economy. With our population being so small we must do whatever we can to encourage its growth and food is one of the best ways to do so."
 LKT_focus_expanding_immigration_efforts: "Expanding Immigration Efforts"
 LKT_focus_expanding_immigration_efforts_desc: "The state of things in the world is like a balancing act. Some nations are good, others are okay and others still are just bad. We must strive to make those who border us see that we are one of the better nations. Encouraging immigration helps stabilize our job market and helps to spur development in areas that are severely lacking."
 LKT_focus_improving_education_standards: "Improving Education Standards"
 LKT_focus_improving_education_standards_desc: "We must advance the standards of education to ensure our ability to innovate and produce both goods and services can be as least wasteful as possible."
 LKT_focus_national_economic_investments: "National Economic Investments"
 LKT_focus_national_economic_investments_desc: "To diversify our economy is to passively secure our national independence. By producing just a little bit of everything we can use this stepping stool as a way to bargain and work our way into foreign relations and trade deals alike."
 LKT_focus_industrialization_question: "The Industrial Question"
 LKT_focus_industrialization_question_desc: "The \"Great Plains States\", as many refer to a good portion of the states we have under our control are some of the least developed lands in the old republic and certainly within the new republic we have. However we have a new government and fresh start to do whatever we want. As such we must ask ourselves one question. To industrialize or not."
 LKT_focus_the_great_northern_railway: "The Great Northern Railway"
 LKT_focus_the_great_northern_railway_desc: "Once a mere cog in the Burlington Northern Sante Fe railroad, now it is once again an independent venture. With the reorganization of what limited infrastructure we have available to us, we can establish both a fallen flag in railroad history as well as improve and fund our growing infrastructure."
 LKT_focus_northern_bypass: "Northern Bypass"
 LKT_focus_northern_bypass_desc: "The borderlands route along the Canadian border will allow us to have an alternative route to transporting goods from Montana to North Dakota. not to mention the potential for trade deal related transport needs as well."
 LKT_focus_great_western_mainline: "Great Western Mainline"
 LKT_focus_great_western_mainline_desc: "Meandering through Montana into Wyoming will allow us to trek great amounts of cargo through the various hilly and mountainous terrains of our western region."
 LKT_focus_the_southern_extension: "The Southern Extension"
 LKT_focus_the_southern_extension_desc: "Working our way to Kansas allows us to haul goods from far north in the Dakotas all the way south to the more or less isolated state and thus furthering the cooperation between all states within our republic."
 LKT_focus_completing_the_network: "Completing The Network"
 LKT_focus_completing_the_network_desc: "Rounding out our investments by creating bypasses at different strategic locations allows us to have alternative routes in case of natural disaster, man made accidents or whatever may occur which could damage one or more existing routes."
 LKT_focus_modern_agrarian_economy: "A Modern Agrarian Economy"
 LKT_focus_modern_agrarian_economy_desc: "Our lands are vast, fertile and bountiful. It would be a damn shame to just let it all go to waste under the crippling and toxic nature that is modern industrialism. We must return to simpler and yet more sophisticated means of attaining our economic dependency. These lands will be the key to that, for every bit of this land shall be a farm to nurture the world at large."
 LKT_focus_northern_farms_adaptation_act: "Northern Farms Adaptation Act"
 LKT_focus_northern_farms_adaptation_act_desc: "The NFAA is legislation to invest towards farms and agricultural centers in the northern states. These include investments and funding as well as training for winter adaptation methods as well as potentially new structures and means of providing products even in the dead set of winter. Green houses and properly insulated and heated facilities for live stock means there will be a steady means of bein a farmer nearly all year round."
 LKT_focus_centralia_farms_act: "Centralia Farms Act"
 LKT_focus_centralia_farms_act_desc: "The CFA will reorganize the farms in the central states of our nation under a joint public and private corporate entity. The main goal of this is to instigate balance in growth as well as ensure diversity in agricultural products based on the abilities of each state at hand. Being the largest division at nearly half the state, the shared interest of private wealth generation as well as the security of public interest in food security is why this is a joint venture."
 LKT_focus_southern_farming_traditions: "Southern Farming Traditions"
 LKT_focus_southern_farming_traditions_desc: "In the southern part of the nation as well as the old republic, a sort of soft tradition of sorts was the importance of growing cash crops. Now while we are a new nation, it cannot be under stated the importance of some of these cash crops in terms of export and domestic value to be had. As such we shall gear our more climate stable southern state of Kansas to be more inclined to produce a mix of these cash crops."
 LKT_focus_targeted_mechanization_efforts: "Targeted Mechanization Efforts"
 LKT_focus_targeted_mechanization_efforts_desc: "By focusing any industrial efforts into boosting the agricultural sector, we can ensure a vast productivity increase and proper diversified economy to fall back, You never know if the weather or a global phenomenon should attempt to harm us."
 LKT_focus_bio_fuel_investments: "Bio-Fuel Investments"
 LKT_focus_bio_fuel_investments_desc: "Using our education system to diversify and imporve the benefits of an agrarian economy. We can now look into refining and exploring new forms of bio-fuels to help power our cars, homes and businesses."
 LKT_focus_the_farmers_tax_code: "The Farmer's Tax Code"
 LKT_focus_the_farmers_tax_code_desc: "By doing a complete redraft of the tax code and building it around the precedent of preserving our agrarian means of production. We can ensure stability within the work force and look to help invest in future farms and farmers for our nation."
 LKT_focus_funding_general_education_improvements: "Funding General Education Improvements"
 LKT_focus_funding_general_education_improvements_desc: "Dedicating our budgeting to education will help prepare future generations to help progress our technological needs as curiosity and the need itself arises."
 LKT_focus_bio_fuel_engineering_institute: "Bio-Fuel Engineering Institute"
 LKT_focus_bio_fuel_engineering_institute_desc: "The BFEI is a dedicated research and higher education facility dedicated to improving the applications and overall efficiency of bio-fuels. We'll use this institution as a pillar for education and better the effectiveness of our economic prowess."
 LKT_focus_skill_set_education_programs: "Skill Set Education Programs"
 LKT_focus_skill_set_education_programs_desc: "The SSEP is a funding intiative to further diversify and improve the general skill sets our citizens can acquire in their life. We hope this will greatly improve employment efforts and bring a more stable as well as a more well rounded approach to economic growth and development."
 LKT_focus_lakotan_development_fund: "The Lakotan Development Fund"
 LKT_focus_lakotan_development_fund_desc: "By allocating a specific section of the budget, we can ensure targeted developments are created to balance out and better grow our economic base."
 LKT_focus_the_fifth_revolution: "The 5th Industrial Revolution"
 LKT_focus_the_fifth_revolution_desc: "By the turn of the millennia the acts of industrialization had gone through two major iteration. From there we saw the third being the rise of automation elements and the fouth being the rise of AI and computer integrations beyond what was thought possible. Now we set the stage for the fifth revolution, one where we, a nation of fields and mere nothing in terms of industry, shall rival even the rise of those in the far east in their modernization."
 LKT_focus_rushmore_revival: "Project Rushmore Revival"
 LKT_focus_rushmore_revival_desc: "The Dakotas are a symbol, not only of the new more neutral and or new identity name we've chosen for our nation. But these two states are a symbol for the core identity of the lands for which we occupy. As such we must make these two the first priority in our new revolution policy for industrialization of the nation at large."
 LKT_focus_rocky_roads_no_more: "Project Rocky Roads No More"
 LKT_focus_rocky_roads_no_more_desc: "Our states of Montana and Wyoming, those which border or are practically whole sections of the rocky mountain range are of strategic importance. These states serve as connections through the mountain range as well as challenges for development due to the terrain. Therefore comprehesive investments in infrastructure as well as economic developments must be under taken to ensure these states are not left behind."
 LKT_focus_kansas_city_kerosene: "Project Kansas City Kerosene"
 LKT_focus_kansas_city_kerosene_desc: "The states of Kansas and Nebraska have untapped potential. With these states having noticeable oil as well as natural gas fields that technically stem from the Texas origins. We can utilize these resources to propel our nation to the fore front of industrialism. Through coordinated mining efforts as well as economic investments, we should be able to expect great things to come."
 LKT_focus_rare_earth_energy_act: "Rare Earth Energy Act"
 LKT_focus_rare_earth_energy_act_desc: "The development of rare earth elemental mines as well as expanding our domestic energy capacity will allow us not only to continue the growth of our industrial base, but also provide us with bargaining chips for diplomatic efforts."
 LKT_focus_project_nebraska_namesake: "Project Nebraska Namesake"
 LKT_focus_project_nebraska_namesake_desc: "The state of Nebraska has a lot of strategic resources which are un-explored for true scale or outright just untouched resources we do know about. As such we shall begin a comprehensive mining and surveying campaign to ensure these strategic resources are brought forth to fuel not only our industrialization, but also increase our foreign potential political capital."
 LKT_focus_business_tax_reforms: "Business Tax Reforms"
 LKT_focus_business_tax_reforms_desc: "With our ever increasing industrial base, our economic makeup becomes more and more diverse. As such we need to take a good look and overhaul the tax code of our various business sectors to ensure the fair and just nature of the code. This should allow us to increase the natural means for which citizens themselves can create startups as well as just save their own money and contribute to the economy in whatever way they see fit."
 LKT_focus_peoples_tax_reforms: "The People's Tax Reforms"
 LKT_focus_peoples_tax_reforms_desc: "While business is good, those businesses only do as good as the people themselves are. As such we need to ensure the tax code is simplified, modernized and reasonable to the sustainment of an ever industrializing citizenry."
 LKT_focus_establishing_lakotan_institute_of_technology: "The Lakotan Institute Of Technology"
 LKT_focus_establishing_lakotan_institute_of_technology_desc: "The creation of the LIT is a breakthrough in centralized R&D efforts. Not only do we get to pool resources both material and human into a more localized area. This institution is designed to help develop and improve the known sciences to the best of anyone's capabilities."
 LKT_focus_national_investment_progrmas: "National Investment Programs"
 LKT_focus_national_investment_progrmas_desc: "With our economy on track and things looking on the up and up, we now can begin to calm down and set a steady course. Some general investments across the board in terms of budgeting programs will allow our people to specialize, grow and adapt to the ever changing economy of the modern age."
 LKT_focus_a_new_economy: "A New Economy"
 LKT_focus_a_new_economy_desc: "With the economy situated we can now focus on our politics. In general we now grow one step closer to looking beyond our internal affairs."
 LKT_focus_department_of_energy: "The Department Of Energy"
 LKT_focus_department_of_energy_desc: "Having an economy is all fine and dandy, however it means nothing if we can't actually power and use it. As such we'll establish the Lakotan Energy Department to ensure we solve this issue at hand."
 LKT_focus_fueling_agrarianism: "Fueling Agrarianism"
 LKT_focus_fueling_agrarianism_desc: "With the national economy being that of agricultural supremacy we must adapt and grow our energy economy to meet such demands. The good thing is that with proper investments we really don't need to grow the energy infrastructure, rather we just need to develop how far the fuel goes from the sources which need it more than others."
 LKT_focus_fueling_tomorrows_economy: "Fueling Tomorrow's Economy"
 LKT_focus_fueling_tomorrows_economy_desc: "Our needs are vast, but our lands and resources are vaster still. We must develop an energy sector to ensure our demands and the demands of the future will be secured by domestic means."
 LKT_focus_a_new_green_deal: "A New Green Deal"
 LKT_focus_a_new_green_deal_desc: "The New Green Deal or NGD is a comprehensive energy investment scheme to develop and ensure the most efficient and literally only true green energy production method is utilized to its best ability that current and hopefully future breakthroughs will unlock. Small more efficient plants, limited investment in spent fuel recycling efforts. The whole nine yards and some."
 LKT_focus_finalizing_doe_capabilities: "Finializing DoE Capabilities"
 LKT_focus_finalizing_doe_capabilities_desc: "With our energy sector now in line with our economic needs, we can work to synergize these two things and propel our nation into the future we shall create."
 LKT_focus_increased_funding_for_donr: "Increased Funding For DoNR"
 LKT_focus_increased_funding_for_donr_desc: "By investing more into acquiring the natural resources which are beneath our very feet, we can ensure a more self sufficient economy or at the very least a more well balanced one at that."
 LKT_focus_massive_investments: "Massive Investments"
 LKT_focus_massive_investments_desc: "To ensure we get everything we will invest as much as possible to acquire as much and as many difference mineral resources we could possibly get."
 LKT_focus_need_by_need_investment_strategy: "Need By Need Investment Strategy"
 LKT_focus_need_by_need_investment_strategy_desc: "Our mining efforts should supplement our main economic efforts. As such we'll invest into the Department of Natural Resources on a need by need basis to keep demands in check."
 LKT_focus_iron_ore_revival: "Iron Ore Revival Act"
 LKT_focus_iron_ore_revival_desc: "Our iron ore deposits are untapped at best and even cut short due to past mistakes. However that will not be the case anymore. Through investments in South Dakota, Kansas and Montana to name a few, we will expand existing operations as well as reopen old operations like the one in kansas which was closed pre-maturally due to environmental concerns. The clean up and such may be a bit costly, but a significant iron ore production means we'll have a healthy domestic supply of one of the key materials of the modern world. Steel."
 LKT_focus_bauxite_brawls_act: "Bauxite Brawls Act"
 LKT_focus_bauxite_brawls_act_desc: "Ensuring our economy has access to more flexible metals means we can also delve into both civilian and military applications. As such reviving, expanding as well as investing in more energy intensive mining sites will become worth it in the long run of things."
 LKT_focus_precious_mines_act: "Precious Mines Act"
 LKT_focus_precious_mines_act_desc: "Multiple states have REE's or Rare Earth Elemental deposits. As such we shall invest in opening and expandeing operations to potential commercial scales to ensure the peak diversity in our economic makeup. After all, more domestic materials means more foreign interest."
 LKT_focus_rubber_stamp_act: "The Rubber Stamp Act"
 LKT_focus_rubber_stamp_act_desc: "We have a lot of domestic oil production. Some of this can be strategically reallocated to synthetic chemicals and rubber production to ensure we have the peak of resource diversity among our lands."
 LKT_focus_lakotan_military_development_board: "Lakotan Military Development Board"
 LKT_focus_lakotan_military_development_board_desc: "The LMDB is designed to streamline development and enhancing our military capabilities. Considering we really only have two branches of service to worry about, it should be a straight forward endeavor. However some personnel who were formally apart of the old republic's navy do hope to establish a Lakotan Navy some day. But for now its army and air force all the way."
 LKT_focus_military_refinement: "Military Refinement"
 LKT_focus_military_refinement_desc: "Through trial and error, plenty of investment in both material and personnel, as well as just time itself. We have finally created at the very least one solidified service branch of our armed forces to ensure the national defense and security of our citizens and their homes."
 LKT_focus_lakotan_army_pay_standards: "Lakotan Army Pay Standards"
 LKT_focus_lakotan_army_pay_standards_desc: "Ensuring a quality pay and the ability for our soldiers to take care of not only themselves but potentially their loved ones at home will passively raise morale. As a bonus this increased dedication is likely to spill over in training turn over rates and the quality of soldiers we can look to produce from said training."
 LKT_focus_establishing_arms_contractors: "Establishing Arms Contractors"
 LKT_focus_establishing_arms_contractors_desc: "Creating a dedicated arms industry to support essentially the main support beam of our national defense is paramount. As such we'll secure funding to ensure the steady supply of our troops with quality armaments."
 LKT_focus_sundance_war_college: "The Sundance War College"
 LKT_focus_sundance_war_college_desc: "My creating a dedicated military schooling institute we can prepare both future NCO's and commissioned officers for the battlefields of tomorrow. Training them in tactics, leadership and deligation of responsibility. Most importantly we'll be teaching them adaptability as any good soldier should always understand that if things can go wrong they most likely will."
 LKT_focus_butte_testing_facilities: "Butte Testing Facilities"
 LKT_focus_butte_testing_facilities_desc: "By creating a dedicated testing and R&D facility complex, we can ensure the ever growing quality of our troops so they can be ready for the potential conflicts in the future."
 LKT_focus_research_mania: "Research Mania"
 LKT_focus_research_mania_desc: "R&D is where it is at. We shall invest heavily into the development of new armaments, munitions and support equipment to ensure the quality of our troops are quite beyond those who wish to harm us in any way."
 LKT_focus_geneva_compliant_munitions: "Geneva \"Compliant\" Munitions"
 LKT_focus_geneva_compliant_munitions_desc: "While we of course must look good in the eyes of the international community, this doesn't mean we can't test the limits of things. Right?"
 LKT_focus_experiemental_weapons_platoon: "Experimental Weapons Platoon"
 LKT_focus_experiemental_weapons_platoon_desc: "The EWP will be a dedicated unit that will be apart of the broader \"Experiementla Weapons Corps\". This sub-branch of our army will designate support platoons to help field test and give units in a jam or situation a needed boost as and when requested. Mostly the EWP will comprise of experiemental anti anything weaponry and can adapt to the needs of the army's requests in an ever changing battlefield."
 LKT_focus_the_corps: "The \"Corps\""
 LKT_focus_the_corps_desc: "The establishment of an Experiemental Weapons Corps allows us to direct funding, training and testing efforts to the fullest and most flexible extent possible. This new R&D corps will be the beacon of light which will guide and help us to defend against all enemies of our lands."
 LKT_focus_logistical_primacy: "Logistical Primacy School Of Thought"
 LKT_focus_logistical_primacy_desc: "By focusing our efforts on the logistics of fighting a war, we can out last our foes by pure attritional means if things genuinely devolve into such depravity."
 LKT_focus_bread_and_butter_doctrine: "The Bread & Butter Doctrine"
 LKT_focus_bread_and_butter_doctrine_desc: "By retooling economic awareness towards a conflict of survival, pre-emptive measures of rationing as well as proper strategically located food stores will not only help our military but any recovery efforts as well."
 LKT_focus_supply_heroes: "Supply Heroes"
 LKT_focus_supply_heroes_desc: "Bullets don't fly without supply. Regardless of the pedantic measurements of what it means to be a hero, we can all agree that anyone has the capabilities to excel in their field and be the hero that people need. As such we'll be promoting the Supply Corps and opening up distinctive supply and logistics based trainign efforts to ensure the maximum cohesion between supply chains and the units they serve."
 LKT_focus_logistics_corps_training_programs: "Logistics Corps Training Programs"
 LKT_focus_logistics_corps_training_programs_desc: "Opening up our military to all walks of life doesn't always mean they have to be frontline grunts. And a \"POG\" doesn't always have to be a drain on the mood for a frontline grunt. As such we'll dedicate to having new training and a specialized doctrine for our logistics corps to ensure frontline cohesion, supply line efficiency and overall military effectiveness on the battlefield."
 LKT_focus_lakotan_air_force_training_improvements: "Lakotan Air Force Training Improvements"
 LKT_focus_lakotan_air_force_training_improvements_desc: "Through proper standardization of qualifying criteria we hope to establish a new cream of the crops in terms of pilot effectiveness in combat situations."
 LKT_focus_fighter_priority_structure: "Fighter Priority Structure"
 LKT_focus_fighter_priority_structure_desc: "The FPS organizational effort is to retool the primary functionality of the air force service branch around the fighter class of aircraft. Training and unit composition will ensure a primacy of fighters over ground support or general strategic bomber support. What little we do make should be able to fly un-molested by enemy aircraft where ever our fighters are."
 LKT_focus_fighter_supremacy_doctrine: "Fighter Supremacy Doctrine"
 LKT_focus_fighter_supremacy_doctrine_desc: "The development of our air doctrine to revolve more exclusively around fighters is to ensure the complete and total control of the skies above. So regardless of where we might lack in bomber or ground assistance, we can ensure a free testing grounds for these aspects with unchecked air supremacy."
 LKT_focus_ground_support_priority_structure: "Ground Support Priority Structure"
 LKT_focus_ground_support_priority_structure_desc: "The GSPS organizational effort will retool the air force branch of service to prioritize the development and deployment of ground support type aircraft. This will ensure that while we may lack total air supremacy efforts, we should still be able to hit and run the enemy from the air and ensure frontline stability at the very least."
 LKT_focus_ground_support_supremacy_doctrine: "Ground Support Supremacy Doctrine"
 LKT_focus_ground_support_supremacy_doctrine_desc: "The development of our air doctrine to prioritize ground support type aircraft will ensure frontline stability as well as rob the enemy's ability to fight for a prolonged period. Organizational damage only does so much but if we destroy the enemy's supplies and equipment then they can't fight to begin with."
 LKT_focus_strategic_bomber_priority_structure: "Strategic Bomber Priority Structure"
 LKT_focus_strategic_bomber_priority_structure_desc: "The SBPS organizational effort will allow our air force to crush the enemy's will to fight. Industry and infrastructure are mission critical for any nation to protect in case of a protracted conflict. As such we will develop strategic bombers to demolish these war machines and tear the ribbons of road and rail which give our enemies the ability to try and harm us."
 LKT_focus_strategic_bomber_supremacy_doctrine: "Strategic Bomber Supremacy Doctrine"
 LKT_focus_strategic_bomber_supremacy_doctrine_desc: "By refining our air doctrine around strategic bomber class aircraft, we will zap away the enemy's ability to fight us. Without an economy or an arms industry the enemy can't arm its people or employ them as well. In the end we may not get a quick war, but we will make sure that no one will destroy our people and these lands for which we defend."
 LKT_focus_clear_skies_for_all: "Clear Skies For All"
 LKT_focus_clear_skies_for_all_desc: "The refinement and improvements of our air force will be on display for all to see. Encouraging organized air shows and training venues for the public to see will allow us to ensure citizens that our nation will have bright skies for days to come."
 LKT_focus_creating_a_real_navy: "Creating A Real Navy"
 LKT_focus_creating_a_real_navy_desc: "The day is finally here when we can create a real navy and not some skippers to go river rafting. however the journey will be tedious as a river is nothing like the open ocean."
 LKT_focus_early_ship_construction_efforts: "Early Ship Construction Efforts"
 LKT_focus_early_ship_construction_efforts_desc: "Our naval prowess may never be the \"top of the line\", but we can certainly start with a bottomline."
 LKT_focus_formalizing_naval_training_programs: "Formalizing Naval Training Programs"
 LKT_focus_formalizing_naval_training_programs_desc: "By finally adopting a real training program with environmental help from our new coastal waters, we can ensure the quality of our naval personnel is of respectible means."
 LKT_focus_our_naval_priority: "Our Naval Priority"
 LKT_focus_our_naval_priority_desc: "By creating a new priority in our naval development we set at least a standard of sorts that future generations may build upon."
 LKT_focus_naval_command_structure: "Naval Command Structure"
 LKT_focus_naval_command_structure_desc: "The naval service branch of the LAF were considered a joke at best and a punishment at worst. However with the acquisition of new water front properties and the start of blue water vessel construction efforts, we must turn this joke into a serious and tangeble service branch. As such the formalization of the LNCS or Lakotan Naval Command Structure will be created in order to facilitate and establish future progress to naval excellence."
 LKT_focus_gulf_dry_docking_facilities: "Gulf Dry Docking Facilities"
 LKT_focus_gulf_dry_docking_facilities_desc: "Expanding our naval construction efforts will allow us to adapt and grow our navy."
 LKT_focus_mid_atlantic_shipping_investments: "Mid-Atlantic Shipping Investments"
 LKT_focus_mid_atlantic_shipping_investments_desc: "Continued efforts to expand our navy must be taken if we are to cover all of this territory."
 LKT_focus_beyond_the_plains: "Beyond The Plains"
 LKT_focus_beyond_the_plains_desc: "With our homeland now stabilized and prosperous we must think beyond our borders. Whether or not we seek to expand is regardless of the point, for we must think beyond simply due to the fact that many others look beyond their own borders. We must decide what our future will be."
 LKT_focus_A_New_Destiny: "A New Destiny"
 LKT_focus_A_New_Destiny_desc: "The mandate has been lost, those on the Northern American continent seek to reclaim it. We know this to be true through the rumors of the lands and as such we shall stake our claim and come out on top. For it is our destiny to behold and not of those in the east or of the west."
 LKT_focus_eyeing_the_borderlands: "Eyeing The Borderlands"
 LKT_focus_eyeing_the_borderlands_desc: "The start of our destiny begins with the first steps outside our own borders. As such we must work to ensure our own borders are where we set our first steps."
 LKT_focus_the_pacific_shores: "The Pacific Shores"
 LKT_focus_the_pacific_shores_desc: "We shall have our sunset basked in the sea breeze of the pacific coastlines. The west is a shorter distance to cover than the east at least."
 LKT_focus_great_lakes_great_takes: "Great Lakes, Great Takes"
 LKT_focus_great_lakes_great_takes_desc: "Expanding eastward means we'll be dealing with vast and diverse lands. We must utilize our efforts to understand and be able to navigate the vastness that is the Great Lakes Region."
 LKT_focus_southern_summaries: "Southern Summaries"
 LKT_focus_southern_summaries_desc: "From marshlands to mountain heights, the southern region of the US will likely be our most difficult to traverse. As such practice, study and training ourselves to tackle such challenges will be needed while we seek to secure these future lands."
 LKT_focus_northeastern_needs: "Northeastern Needs"
 LKT_focus_northeastern_needs_desc: "Mountains and forests as far as the eye can see. We'll need time and certainly energy to tackle these lands."
 LKT_focus_manifesting_strength_for_our_destiny: "Manifesting Strength For Our Destiny"
 LKT_focus_manifesting_strength_for_our_destiny_desc: "We must prepare and continue to build up our forces. For the destiny we set out to create shall be ours in due course."
 LKT_focus_operation_cascadian_calamity: "Operation Cascadian Calamity"
 LKT_focus_operation_cascadian_calamity_desc: "The start of our great crusade for continental security begins. We'll start with the closest one to our power which is Cascadia. The mountains will be tough but they'll serve as great training grounds for our soldiers."
 LKT_focus_operation_san_jose: "Operation San Jose"
 LKT_focus_operation_san_jose_desc: "Sweeping down the west coast allows us to create our own wall, that being the pacific ocean. As such the next step towards continental security is assured once we take California."
 LKT_focus_operation_sierra_mist: "Operation Sierra Mist"
 LKT_focus_operation_sierra_mist_desc: "Securing the energy rich region of the southwest as well as the rest of the rocky mountains allows us to establish a great defensive line should anything breach our western shores."
 LKT_focus_operation_sam_houston: "Operation Sam Houston"
 LKT_focus_operation_sam_houston_desc: "Securing the biggest identity on the Northern American continent means we secure the will of the various peoples. The Texan folks are a proud and independent minded people and to secure them paves the way for any eastern incursions we may embark on."
 LKT_focus_reorganizing_civil_services: "Reorganizing Civil Services"
 LKT_focus_reorganizing_civil_services_desc: "Creating new standardized civil services allows us to better manage our territories and improve integration efforts to allow folks to move past the wars of recent memory. It won't be perfect, but it's certainly a step in the right direction."
 LKT_focus_operation_rustic: "Operation Rustic"
 LKT_focus_operation_rustic_desc: "Our march east begins, taking the northern route gives as more plains, rolling hills and forests. While not a cake walk to be sure, it would be good practice before our southern advance."
 LKT_focus_operation_charleston: "Operation Charleston"
 LKT_focus_operation_charleston_desc: "From the Mississippi to the Atlantic, we march to secure the southern route and connect ourselves from sea to shining sea."
 LKT_focus_operation_north_east_corridor: "Operation North East Corridor"
 LKT_focus_operation_north_east_corridor_desc: "The final stretch to reclaiming the mandate. With this we shall have complete control of the continental republic and secure our destiny...nevermind we still have to rebuild, but I digress."
 LKT_focus_west_coast_cleanup: "West Coast Cleanup"
 LKT_focus_west_coast_cleanup_desc: "With the nation under our control we can now focus on cleaning up and rebuilding the war torn lands. The best approach would be to start west and sweep through towards the east."
 LKT_focus_south_central_rebuilding: "South Central Rebuilding"
 LKT_focus_south_central_rebuilding_desc: "With the west secured we can now focus on our bottom line, in this case the states which finish up the western half of the new republic. Consolidating these territories just leaves everything east of the Mississippi left, should be done in short order."
 LKT_focus_mississippi_miracle: "Mississippi Miracle"
 LKT_focus_mississippi_miracle_desc: "The march east begins and with the crossing of the Mississippi we can rebuild and integrate the southern states into the new nation."
 LKT_focus_reviving_the_rustbelt: "Reviving The Rustbelt"
 LKT_focus_reviving_the_rustbelt_desc: "Rebuilding and bringing back economic stability to the old rustbelt states will help to integrate the lands as well as the people on these lands."
 LKT_focus_northeast_renewal: "Northeast Renewal"
 LKT_focus_northeast_renewal_desc: "The final stretch, integrating these last states will secure unity from the pacific to the atlantic."
 LKT_focus_the_second_republic: "The Second Republic"
 LKT_focus_the_second_republic_desc: "The journey was long and it was costly, but peace has been brought back to the lands and unity once again presents itself on the Northern American continent. Only one final step to take in secure the future we have set out to creat for ourselves."
 LKT_focus_Containment_Plan_West: "Containment Plan West"
 LKT_focus_Containment_Plan_West_desc: "Expansion is paramount to survive in this unstable and hostile world. The new world is shattered and we must stake our claim to a portion of it. The Cambrian Plan or Westward Containment Plan will be for us to solidify our control of everything west of the Mississippi. This should allow us to strengthen and create a new and more stable sense of security for our people."
 LKT_focus_war_plan_purple: "War Plan Purple"
 LKT_focus_war_plan_purple_desc: "One of our first steps to securing the western half of the Northern American continent would be to secure our flank. As such Cascadia is in the way for our pacific vacations."
 LKT_focus_war_plan_skorpion: "War Plan Skorpion"
 LKT_focus_war_plan_skorpion_desc: "Securing the energy rich region of the southwestern states will help boost our economic stability as well as secure a significant edge from our western rivals."
 LKT_focus_war_plan_yellow: "War Plan Yellow"
 LKT_focus_war_plan_yellow_desc: "Securing the Pacific coast means we've secured about half of the western lands. We will continue to claim our future and solidify the grounds for our new way forward."
 LKT_focus_war_plan_blue: "War Plan Blue"
 LKT_focus_war_plan_blue_desc: "Texas secures the second to final piece of the western puzzle that we are attempting to assemble. Oklahoma would be the final piece however we are unsure exactly what crossing the Mississippi would entail politically and as such we can table that debate for another time."
 LKT_focus_consolidating_the_territories: "Consolidating The Territories"
 LKT_focus_consolidating_the_territories_desc: "With the west now under our control, we must work towards integrating and molding the lands and people into a new nation."
 LKT_focus_pacific_pearls: "Pacific Pearls"
 LKT_focus_pacific_pearls_desc: "Working to integrate and rebuild the pacific states will help to open a lot of the world back up to trade and tourism for our nation. Revitalization of ports and tourist hotspots is critical moving forward."
 LKT_focus_southern_sunrise: "Southern Sunrise"
 LKT_focus_southern_sunrise_desc: "Rebuilding the energy rich southwest as well as the economically endowed state of Texas will give our nation a much needed boost to stability and prosperity."
 LKT_focus_the_western_identity: "The Western Identity"
 LKT_focus_the_western_identity_desc: "With these lands which we have united we declare a new nation, a new people and a new culture moving forward."
 LKT_focus_The_Great_Barrier_Plan: "The Great Barrier Plan"
 LKT_focus_The_Great_Barrier_Plan_desc: "Fundamentally no one should have direct control over so much territory. So we should change that and ensure stability is forged on the Northern American continent. If we can consolidate the middle ground and puppet and or buy the loyalty of the east and west then we can create a sort of North American Confederal Union...probably needs a better name."
 LKT_focus_vegas_odds: "Vegas Odds"
 LKT_focus_vegas_odds_desc: "The lands of the union we do not fully need and as such we'll use that to our advantage when acquiring them for the future we seek."
 LKT_focus_texas_tussle: "Texas Tussle"
 LKT_focus_texas_tussle_desc: "The formation of the Great Barrier will be to secure the central states of the roughly geographic center of the Northern American continent. This first step with Texas shall help set the stage for more southern incursions."
 LKT_focus_western_consolidation: "Western Consolidation"
 LKT_focus_western_consolidation_desc: "Consolidating the puppeted territory that orders us allows for a more equal division of territory. Thus giving more incentive to our new puppet for when we seek out the pacific coastline."
 LKT_focus_the_great_war: "The Great War"
 LKT_focus_the_great_war_desc: "The Great continental war shall begin as we secure the gulf territories of the Southern Republic. While we certainly do not need the southern states, their inability to relinquish the state of Oklahoma means we have no other choice. As a bonus aside from the fact we can also secure that no eastern power will rise enough to challenge both us and the south."
 LKT_focus_eastern_consolidation: "Eastern Consolidation"
 LKT_focus_eastern_consolidation_desc: "With the Great Continental War over with we can now integrate what central states we wanted as well as secure the southern states in understanding that they will not be annexed outright."
 LKT_focus_cartel_cleanup: "Cartel Cleanup"
 LKT_focus_cartel_cleanup_desc: "The southern extent of the Great Barrier Plan is that of acquiring Mexico. What better justification than to clean house of the rampant cartel organizations which paralyze the nation."
 LKT_focus_reorganizing_mexican_territories: "Reorganizing Mexican Territories"
 LKT_focus_reorganizing_mexican_territories_desc: "By dividing up the territories of Mexico we can give favor to our western puppet while also solidifying our power over the current state of affairs."
 LKT_focus_securing_the_western_coastline: "Securing The Western Coastline"
 LKT_focus_securing_the_western_coastline_desc: "With the near western states under our control and the southern front secure, we can now look to the far west with the pacific coast. Securing these lands will prepare us for the final challenge ahead of us."
 LKT_focus_dividing_up_the_west: "Dividing Up The West"
 LKT_focus_dividing_up_the_west_desc: "With the western lands under our control it is now up to us how to reasonably divide these lands so as to promote unity and the ability to cooperate and move forward together."
 LKT_focus_improving_the_homefront: "Improving The Homefront"
 LKT_focus_improving_the_homefront_desc: "By consolidating and working on making our current gains more cohesive, we set the stage to secure our final objective in the plan. The northern conquest will be underway in no time, but how to deal with it is another question."
 LKT_focus_northern_investment_opportunity: "Northern Investment Opportunity"
 LKT_focus_northern_investment_opportunity_desc: "We must cooperate with Canada to ensure our nations can work together, as such an infrastructure investment via railroads will better connect us."
 LKT_focus_operation_polar_bear: "Operation Polar Bear"
 LKT_focus_operation_polar_bear_desc: "We go north, to secure the rest of our barrier and thus secure the future we wish to create for ourselves."
 LKT_focus_the_northern_concessions: "The Northern Concessions"
 LKT_focus_the_northern_concessions_desc: "Securing the north we must now redivide the lands and ensure stability on the Northern American continent for future generations to come."
 LKT_focus_the_continental_confederation: "The Continental Confederation"
 LKT_focus_the_continental_confederation_desc: "Our Nations stand proud and united, for the new world has seen new unity under the former Lakota banner and as such we will forge together with a new name for a new nation. A nation which seeks to unite the peoples, not the lands, but the peoples under a new identity and when they are ready we shall form a united north america."
 LKT_country_flag_elections: "The Elections Begin"
 LKT_Canadian_War_Goal_Unlock: "Then It Is War"
 LKT_Prairie_Federation_desc: "[LKT.GetFlag]§YRepublic of Lakota§! Changes Name To [LKT.GetFlag]§YThe Prairie Federation§!"
 LKT_Free_Fields_Society_desc: "[LKT.GetFlag]§YRepublic of Lakota§! Changes Name To [LKT.GetFlag]§YFree Fields Society§!"
 LKT_Grand_Duchy_Of_Yellowstone_desc: "[LKT.GetFlag]§YRepublic of Lakota§! Changes Name To The [LKT.GetFlag]§YGrand Duchy Of Yellowstone§!"
 LKT_Second_American_Republic_desc: "[LKT.GetFlag]§YRepublic of Lakota§! Changes Name To The [LKT.GetFlag]§Y2nd American Republic§!"
 LKT_Cambrian_Nation_desc: "[LKT.GetFlag]§YRepublic of Lakota§! Changes Name To The [LKT.GetFlag]§YCambria§!"
 LKT_Continental_Confederation_desc: "[LKT.GetFlag]§YRepublic of Lakota§! Changes Name To The [LKT.GetFlag]§YContinental Confederation§!"
 LKT_divided_we_fell: "Divided We Fell"
 LKT_divided_we_fell_desc: "The ashes have settled and though we are battered, we are not defeated by this sudden and unprecedented event which befalls us. We need to march forwards and begin to stand on our own two feet."
 LKT_federal_budgets: "National Budgets"
 LKT_federal_budgets_desc: "If we are to get anywhere meaningful then we must assess and work our budgets to fit our needs. Fix what fails and expand what works, now if only it'll be that easy."
 LKT_domestic_policies: "Lakotan Domestic Affairs Administration"
 LKT_domestic_policies_desc: "The LDAA is the dedicated branch of government responsible in assessing and working to mold the policies and laws passed by the national government into the wider nation itself. In short, wanna know whats going on with the people, then check out the LDAA."
 LKT_industrial_policies: "Department of Commerce & Economic Activities"
 LKT_industrial_policies_desc: "The DCEA is responsible for the administration and development of the national economy. Regulations, business grants and so forth are carried out by the administration to ensure a fairly balanced and stable economy."
 LKT_resource_management_policies: "Department of Natural Resources"
 LKT_resource_management_policies_desc: "The DNR is responsible for employment and managing our domestic resources, be they human or material in nature."
 LKT_tax_policies: "Department of Revenue"
 LKT_tax_policies_desc: "The DoR is responsible for the collection and enforcement of taxable revenues. Changes to the tax code or trade conditions means the department must adapt and conform the citizens and trading parties to pay their share due when engaging in any and all forms of commerce or economic activity."
 LKT_army_service_branch: "The Lakotan Republican Army"
 LKT_army_service_branch_desc: "The LRA is the main armed service branch which defends our nation. While the skies above are filled with our fly boys, they mean nothing if those on the ground cannot do anything about the enemy forces present."
 LKT_air_force_service_branch: "Lakotan Air Force"
 LKT_air_force_service_branch_desc: "The LAF is responsible in securing the skies above to ensure the un-molestation of our ground and naval forces are continued from enemy aerial incursions."
 LKT_navy_service_branch: "The Lakotan Naval Service"
 LKT_navy_service_branch_desc: "The LNS is a mixed bag. Being relegated to only notable waterways which slither through our nation, the naval service is seen more as a joke or a cheaper way to reduce unemployment."
 LKT_ideas_foreign_isolation_office: "Foreign Isolation Office"
 LKT_ideas_foreign_isolation_office_desc: "In the wake of such a violent and seemingly impossible turn of events, our nation is now...well a nation. With the implosion of the old republic we now form a new and more safe betting republic. Using the name of lakota to appeal to the native minorities allows for stability and us to form a new identity altogether. However with this new found hope, many are wary of our neighbors as well as just foreign meddling as a whole. It is this sentiment which persist around our nation and why some have jokingly dubbed the Foreign Office as the \"Foreign Isolation Office\", due to no real efforts at diplomacy are being made by the government."
 LKT_ideas_agrarian_fuel_economy: "Agrarian Fuel Economy"
 LKT_ideas_agrarian_fuel_economy_desc: "With agriculture providing the lion's share of economic output, we must develop and adapt our energy sector to this at once. Research investments into bio-fuel production and ways to reduce the need for large infrastructure apparatuses will surely help streamline and make best of our energy needs."
 LKT_ideas_a_new_green_deal: "A Green New Deal"
 LKT_ideas_a_new_green_deal_desc: "A comprehensive investment package, the NGD will invest in nuclear power production and make it as efficient and practical as modern and potential future breakthroughs will allow us to have. Smaller plants, spent fuel rod recycling centers and more as science permits us."
 LKT_ideas_well_rounded_energy_sector: "Well Rounded Energy Sector"
 LKT_ideas_well_rounded_energy_sector_desc: "With our Department of Energy in line with our national economic needs we can now ensure a stable and prosperous future."
 LKT_ideas_improved_rail_network: "Improved Rail Network"
 LKT_ideas_improved_rail_network_desc: "By investing in our railways we have been able to better connect the nation as well as improve supply lines both military and civilian wise."
 LKT_ideas_experimental_weapons_corp: "Experimental Weapons Corps"
 LKT_ideas_experimental_weapons_corp_desc: "Dedicated to achieving the most flexible of response units, the EWC is dedicated to R&D efforts and combat field testing to ensure that when an army unit needs help, it will get the help in needs."
 LKT_ideas_lctp: "Logistics Corps Training Program"
 LKT_ideas_lctp_desc: "The LCT Program is designed to open recruitment opportunities to those who may not be frontline material. To ensure frontline stability and effectiveness our supply chains must be at their best and as such we will ensure they are as such."
 LKT_ideas_fighter_supremacy: "Fighter Supremacy"
 LKT_ideas_fighter_supremacy_desc: "By prioritizing fighter development and deployment in our air force, we set the stage to create clear and un-molested skies from enemy invaders."
 LKT_ideas_ground_support_supremacy: "Ground Support Supremacy"
 LKT_ideas_ground_support_supremacy_desc: "By prioritizing gorund support aircraft, we can ensure that even our short falls in air supremacy shouldn't hinder our ability to hit and run the enemy ground forces. Allowing our frontlines to stabilize and prevent the enemy from destroying our lands."
 LKT_ideas_strategic_bomber_supremacy: "Strategic Bomber Supremacy"
 LKT_ideas_strategic_bomber_supremacy_desc: "By prioritizing the development and deployment of strategic bombers, we will crush the enemy's will and ability to fight. Industry and infrastructure will crumble before our mighty bombers."
 LKT_ideas_strategically_cheap: "Strategically Cheap Doctrine"
 LKT_ideas_strategically_cheap_desc: "Smaller targets mean harder to hit as well. We can use our river rafting and limited coastal experiences to create new hit and run tactics for our naval vessels to be designed around. Of course there will be some draw backs but it's not like we know better, so we got to learn one way or another."
 LKT_ideas_naval_command_structure: "Naval Command Structure"
 LKT_ideas_naval_command_structure_desc: "By establishing a genuine and organized naval command structure, we will further solidify our efforts to creating a real naval service branch."
 LKT_anarchist_asylum_experiement: "Anarchist Asylum Experiment"
 LKT_anarchist_asylum_experiement_desc: "Our lands are vast and underdeveloped, we must promise to fill these lands by bringing folks far and wide who wish to seek a better tomorrow."
 LKT_ideas_standardized_civil_services: "Standardized Civil Services"
 LKT_ideas_standardized_civil_services_desc: "Creating a new standard form of civil administration and general public services allows us to passively integrate the new lands that we have gained. As a bonus it also works as public outreach and gives more of a hearts and minds approach to things then simply beating folks into submission."
 LKT_ideas_the_second_american_republic: "The Second American Republic"
 LKT_ideas_the_second_american_republic_desc: "With the lands now reunified and the mandate claimed, we establish from the ruins of old the 2nd American Republic."
 LKT_ideas_cultivating_a_new_identity: "Cultivating A New Identity"
 LKT_ideas_cultivating_a_new_identity_desc: "The lands west of the Mississippi are under our control, now we must work to solidify the hearts and minds of the people and forge together a new path forward."
 LKT_ideas_securing_the_new_order: "Securing The New Order"
 LKT_ideas_securing_the_new_order_desc: "Our Great Barrier Plan has continued on the path of completion and it is with this understanding that we focus more on internal affairs to secure the stability of said order. The Northern American continent will see peace and prosperity through a union of nations working together for a common goal."
 LKT_collapse_event.1.t: "Not Much, But Just Enough"
 LKT_collapse_event.1.d: "As the storm passes us and things begin to calm down, we must now look to rebuild our states and reorganize ourselves into a new nation. However with there not being much development to begin with, means we also don't have much to rebuild. As such one of our main questions to put forth to the people will be just what kind of economy for our nation do we want. Regardless, it ain't much, but its honest work anyways."
 LKT_collapse_event.1.o1: "Well Let's Get To Work I Guess"
 LKT_nation_name_event.1.t: "A New Nation"
 LKT_nation_name_event.1.d: "With the natives being so small we have no care in the world to keep the supposed \"safe geographic and history respecting\" name of Lakota. Instead we shall become Great Plainsmen of the new Prairie Federation."
 LKT_nation_name_event.1.o1: "For These Lands Are Our Lands!"
 LKT_nation_name_event.2.t: "A Free Nation?"
 LKT_nation_name_event.2.d: "With the society being elected, many wonder if this is truly the new leaf we must turn to in order to prevail in our near future. As such a great debate has arose to which we shall find as a nation to be our guide. On one hand we have those who wish to prevail under the pretext of the Free Fields Society. Essentially an anarchist adjacent setting for which to stand on our own. The other is keeping the status quo and looking for better options if possible. But what do the people want?"
 LKT_nation_name_event.2.o1: "The Free Fields Society!"
 LKT_nation_name_event.2.o2: "Maybe It's Too Early?"
 LKT_nation_name_event.3.t: "A Royal Nation?"
 LKT_nation_name_event.3.d: "In a shocking twist the House of Yellowstone has been elected. The party promises expanded democratic means for the voting process as well as a basic universal sufferage to ensure the most involvement of the nation's citizens. The only difference is that feudal titles will be assigned to elected offices and thus in a way cosmestically changing the meanings and ethos behind government itself. Some wonder if we should begin a real transition of nation to fit this or stay the course."
 LKT_nation_name_event.3.o1: "The Grand Duchy We Shall Be!"
 LKT_nation_name_event.3.o2: "Maybe This Is A Bit Too Whimsical To Be Practical?"
 LKT_nation_name_event.4.t: "Establishing The New Republic"
 LKT_nation_name_event.4.d: "With the nation on the edge of being rebuilt we must solidify our mandate with the establishment of the 2nd American Republic. From the ashes of old rises a new way forward."
 LKT_nation_name_event.4.o1: "Ave Nova Republica!"
 LKT_nation_name_event.5.t: "The Western Identity"
 LKT_nation_name_event.5.d: "The Western lands are under one banner and it is with this that we declare a new nation. Cambria. In reference to the timeless landmark that defines a significant portion of our lands the Rocky Mountain range. With cambrian era fossils found throughout them we use this as a staple to show we are citizens and the people of Cambria. We will defend and nurture the lands and our peoples to the ends of time."
 LKT_nation_name_event.5.o1: "Glory To Cambria!!!"
 LKT_event.10.t: "The \"Mutual Investment\""
 LKT_event.10.d: "Canada is developed only where it has to be, we could \"help them\" by investing in a mutual railroad connection to better trade and transport values for our nations. If they accept, then there is no problem, if they deny...well we have a problem then."
 LKT_event.10.o1: "Lets Hope They Accept"
 LKT_event.11.t: "A Investment Offer"
 LKT_event.11.d: "The Republic of Lakota has come to us with an interesting offer. They want to build a railway from the Dakotas through to the Mainline in Regina, Saskatchewan as well as Winnepeg, Manitoba. These would help with trade deals, tourism and just general cooperation between our two nations. We don't really see a problem with it, but some in parliament see this as a false pretext with the recent activities that the republic has undergone recently. So what is our response?"
 LKT_event.11.o1: "Approve The Deal"
 LKT_event.11.o2: "Kindly Refuse Their Offer"
 LKT_event.111.t: "The Deal Collapses"
 LKT_event.111.d: "The Canadians have declined our offer, we'll now need to reapproach the situation since there is no other avenue to pursue at this time."
 LKT_event.111.o1: "Are Those Drums I Hear?"
 LKT_event.12.t: "Construction Begins"
 LKT_event.12.d: "The deal is approved and we've begun construction, hopefully this is a smooth project and will be completed by the end of the month."
 LKT_event.12.o1: "All According To The Plan"
 LKT_event.13.t: "Trouble On The Great Northern"
 LKT_event.13.d: "The crews from the project report that a strange inccidents have been occurring. Despite the project being nearly done there have been reports of missing crew members and a building animosity from our folks against the Lakotans. We're unsure just what is happening but we suspect foul play at the bare minimum."
 LKT_event.13.o1: "I Don't Like This Feeling..."
 LKT_event.14.t: "Blood Thirsty Canadians!?!"
 LKT_event.14.d: "News papers and tv outlets scream, Blood Thirst Canadians Kill Kind Working Lakotans, as the nation is in uproar about the rumors coming out of the recent rail project between us and the Canadian government. With things working out better than expected we'll use this to instigate the war we want rather than the war we could've had."
 LKT_event.14.o1: "Send Them Our Demands!"
 LKT_event.15.t: "A Worsening Situation"
 LKT_event.15.d: "Lakotan demands have suddenly reached the government, they demand compensation for the lost Lakotan lives in the form of industrial investments as well as a payout price of the project. The total sum comes to roughly 35 billion and many Canadians are outraged at the accusations laid against their countrymen. As such we have a real difficult decision to make."
 LKT_event.15.o1: "Save Face And Just Pay Them"
 LKT_event.15.o2: "Screw That We'll Show Them"
 LKT_event.16.t: "An Unexpected Outcome"
 LKT_event.16.d: "Well somehow we failed...successfully? But this isn't the real outcome we wanted and as such we'll need to prepare for plan B."
 LKT_event.16.o1: "Organize The Troops"
 LKT_politics.1.t: "Campaigning Begins"
 LKT_politics.1.d: "All across the nation, political parties are forming and people are beginning to rally behind those which they believe to be the next suited ruling political entity for the nation. As some minor squabbles also begin amongst more hardliner parties, many are excited to see just where the nation will go from here."
 LKT_politics.1.o1: "All's Fair In Love And War"
 LKT_politics.2.t: "The \"Council of Authority Parties\""
 LKT_politics.2.d: "In all the confusion and clambering for votes, a collection of parties with somewhat similar leadership styles has come forth to create a block for voting. This supposed Council of Authority is what many believe to be a collection of parties which function like Oligarchies. Though each party refuses such a demeaning reference point, some member can't deny certain aspects of handling that have happened recently. Regardless it is up to the people to vote and figure out just who they want leading the nation."
 LKT_politics.2.o1: "DDP Wins!"
 LKT_politics.2.o2: "KCK Wins!"
 LKT_politics.2.o3: "LTP Wins!"
 LKT_politics.2.o4: "AFL Wins?"
 LKT_politics.2.o5: "This Can't Be Everybody, Who's Next"
 LKT_politics.3.t: "The Parties For Tradition"
 LKT_politics.3.d: "As things continue to heat up a new power bloc has begun to form as a collection of right and center right leaning parties attempt to form a voting bloc. Rallying around the shared interest of holding new and old traditions known to the lands and it's peoples. The parties for tradition believe that change can happen, but it must not throw away the past for the sake of said change. Nevertheless it is up to the people to vote, vote and vote to secure a victory for the party they wish to lead the nation."
 LKT_politics.3.o1: "ORP Wins!"
 LKT_politics.3.o2: "TTP Wins!"
 LKT_politics.3.o3: "LTSP Wins!"
 LKT_politics.3.o4: "Surely There Are more Options. Wait Look Over There"
 LKT_politics.4.t: "The Common Folk Progress Parties"
 LKT_politics.4.d: "The emerging socialist economic bloc of political parties has gain traction purely to spite the rise in the New Lakotan National Parties. This supposed \"left, right\" dichotomy means that the politics of the nation is further splintering into more and more factions. But as the voting begins and the people look to take their step forward with what they believe is right for the nation, many wonder just who will become the first ruling party of the young nation."
 LKT_politics.4.o1: "FPP Takes The Lead"
 LKT_politics.4.o2: "FRF Neck And Neck With LAS"
 LKT_politics.4.o3: "RBP Neck And Neck With RRA"
 LKT_politics.4.o4: "You Said There's More?!"
 LKT_politics.5.t: "The New Lakotan Nationals, Parties"
 LKT_politics.5.d: "The New Lakotan Nationals is a rising pro-nationalist movement of parties looking to focus more on isolation and preserving the new identity over most other things. Many in the nation are skeptical of what this would mean for the differing minority groups, but most also believe that the interconnected nature of the globe is what brought upon the great implosion of the old republic. Though some may vote with the new bloc of parties simply to spite the rising socialist economic parties that seem to have more naturally grew out of the limited to no development of the lands of the nation."
 LKT_politics.5.o1: "YIP Wins!"
 LKT_politics.5.o2: "CDS Ties Race With LGF"
 LKT_politics.5.o3: "The House Always Wins?"
 LKT_politics.5.o4: "It's Rewind Time"
 LKT_focus_metallic_bloodlines_act: "Metallic Bloodlines Act"
 LKT_focus_metallic_bloodlines_act_desc: "The MBA is a funding package around jumpstarting and securing our nation's ability to have a domestic supply of iron and steel. Steel especially is the second pillar of life to an economy next to manpower and concrete."
 LKT_focus_metallic_masters: "Metallic Means"
 LKT_focus_metallic_masters_desc: "Further means of our national independence means we must unfortunately dig both deep and greedily. As such a small host of light metals can be found in the state of South Dakota which should allow us to diversify our economic capabilities."
 LKT_focus_bio_fuel_prominence: "Bio-Fuel Prominence"
 LKT_focus_bio_fuel_prominence_desc: "Through dedicated and tireless development efforts into bio-fuels and the stage which needs to be set up around them, we can create a more efficient and plentiful form of energy. This will help to reduce our overall demands as well as the potential cost in land and resource usage which can be reserved for better needs of the people and nation at large."