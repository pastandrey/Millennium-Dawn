 ENG_carrier_wing_procurement: "Aircraft Carrier Wing Procurement"
 ENG_carrier_wing_procurement_desc: "The Expanded Aircraft Carrier Wing Procurement initiative underscores the commitment of the United Kingdom to bolster the air power capabilities of its Queen Elizabeth-class aircraft carriers. This strategic effort involves the acquisition and expansion of carrier-based aircraft, focusing on advanced platforms to enhance the operational reach and versatility of the aircraft carrier wing. The procurement initiative includes the integration of cutting-edge aircraft, such as the F-35B Lightning II, alongside support and reconnaissance assets. This expansion is designed to strengthen the aircraft carriers' capabilities, ensuring a formidable aircraft carrier strike group that can operate across a spectrum of missions."
 ENG_strategic_aircraft_strategy_idea: "Strategic Aircraft Strategy"
