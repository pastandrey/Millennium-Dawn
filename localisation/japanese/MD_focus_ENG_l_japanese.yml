 ENGGetAscendedQueenTrait_tt: "[ENGQueentrait]\n\n[ENGGetAscendedQueenTrait]"
 ENG_andrew_epstein_punishment: "$ENG_prince_andrew_leader_name$ は現役の王族の一員ではありません"
 ENG_queen_elizabeth_class_carrier: "クイーン・エリザベス級航空母艦"
 ENG_queen_elizabeth_class_carrier_desc: "クイーン・エリザベス級航空母艦は、イギリス海軍航空における頂点であり、航空母艦能力における画期的飛躍を示すものであった。これらの巨大艦は、その先進技術、航空機搭載能力、広大な作戦行動範囲によって現代性を体現しつつ、イギリスの海上戦力投射を強化し、国家の世界的防衛上の地位を強固なものにした。"
 ENG_elizabeth_line_decision: "エリザベス線の完成"
 ENG_elizabeth_line_decision_desc: "ロンドンを横断するエリザベス線を完成させ、ヒースロー、ウェスト・エンド、シティ、カナリー・ワーフを、高速かつ高頻度で都市を横断する列車で結び、所要時間を短縮して生産性を高める。"
 ENG_elizabeth_queen: "エリザベス2世"
 ENG_elizabeth_queen_trait: "女王"
 ENG_elizabeth_queen_idea: "$ENG_elizabeth_queen_trait$"
 ENG_elizabeth_queen_charles_andrew: "$ENG_queen_eldest$"
 ENG_elizabeth_queen_anne_edward: "$ENG_queen_middle$"
 ENG_elizabeth_queen_philip_william: "$ENG_queen_youngest$"
 ENG_elizabeth_ruling_monarch: "§Y$ENG_elizabeth_queen$§!は現在の§Y統治君主§!である"
 ENG_typhoon_tranche_debate: "タイフーン・トランシェ1論争"
 ENG_typhoon_tranche_debate_desc: "タイフーン・トランシェ1論争とは、複数の欧州諸国が開発した多用途戦闘機であるユーロファイター・タイフーンをめぐる議論と分析を指す。これらの議論では、タイフーンの性能、能力、費用対効果、そして現代の航空戦における戦略的重要性など、様々な側面が掘り下げられる。"
 ENG_silicon_glenn: "Silicon Glenn"
 ENG_silicon_glenn_tt: "§YYearly Technology Boost for $CAT_computing_tech$, $CAT_internet_tech$ or $CAT_ai$§!"
 ENG_operation_excellence_desc: "我が国の軍隊は小規模ながらも専門性と能力に優れた部隊であり、要請があれば迅速に国内に展開し、民政やその他の政府機関への支援を提供することができます。この国内治安維持能力は、英国の安全を守るために拡大・強化していくことができます。"
 ENG_modern_littoral_force_desc: "イギリスの現代沿岸戦力は、沿岸地域における海軍能力を重視する戦略的構想である。イギリス主導のこの現代化戦力は、先進的な海軍技術、多用途艦艇、迅速対応能力を統合し、沿岸環境における海上優勢を確保する。機動性と適応性を重視することで、この戦力は沿岸の利益を守り、新たな脅威に対応し、地域の安定に貢献するイギリスの能力を高める。"
 ENG_trident_nuclear_program_desc: "トライデント計画は、ヴァンガード級潜水艦にトライデントII D5弾道ミサイルを配備する、イギリスの常時海上核抑止である。オールダーマストンおよびバーグフィールドの施設で管理されるこの戦略的構想は、機動的かつ強力な防衛能力を維持するという国家の姿勢を示している。"
 ENG_mothballing_operations: "予備保管運用"
 ENG_mothballing_operations_desc: "財政的制約への対応として、イギリス政府は海軍艦艇を予備保管状態に置くという現実的な道を選択する。この決定は、とりわけBAEを中心とする海軍産業から懸念をもって受け止められている。資源を温存することを目的としたこの措置は、生産と労働力への潜在的影響について業界内で不安を引き起こしている。"
 ENG_modern_landing_craft_desc: "海軍能力の強化に向けた継続的な取り組みの中で、イギリスは新型揚陸艇への投資を含む近代化施策を進めてきた。未来コマンド部隊計画と連動して、イギリスは、とりわけ王立海兵隊を中心とする水陸両用戦力を強化し、沿岸作戦および水陸両用作戦における有効性の向上を目指している。"
 ENG_mechanised_amphibious_assault_desc: "英国は、適応性とスピードを重視し、包括的な機械化水陸両用強襲作戦（MVA）の教義を策定しています。英国海兵隊と英国海軍の相乗効果を基盤とするこの戦略は、沿岸部への迅速な展開を可能にする特殊な水陸両用強襲車両（AAV）と上陸用舟艇を活用します。統合指揮統制、航空支援、そして専用水陸両用強襲艦の配備は、厳格な訓練と演習を通じて多様なシナリオへの即応性を確保し、強力かつ多用途な部隊を維持するという英国のコミットメントを強調するものです。"
 ENG_strike_brigades_desc: "変化する脅威への対応として、イギリスは、機動的な地上作戦のために設計された、多用途かつ迅速展開可能な部隊であるイギリス打撃旅団を創設する。歩兵、装甲部隊、砲兵から構成されるこれらの旅団は、迅速かつ柔軟な軍事対応に対する国家の姿勢を体現している。打撃旅団への重点は、動的かつ多様な安全保障上の課題に対して、イギリスが戦力を投射し、効果的に対応する能力を高める。"
 ENG_carrier_group_debate_desc: "現代海軍において、空母打撃部隊は不可欠な構成要素である。これをどのように編成するのが最善か、我々は議論する必要がある。"
 ENG_mothballing_operations_idea: "海軍予備保管運用"
 ENG_mothballing_operations_idea_desc: "財政的圧力が高まる中、イギリス政府は海軍艦艇を予備保管状態に置く方向へ傾いており、この現実的な措置は、とりわけBAEを中心とする海軍産業から賛否入り混じった反応を受けている。資源の温存を狙ったものである一方、この決定は業界内に懸念を呼び起こし、生産面と労働力面の両方に影を落としている。"
 ENG_quality_over_quantity_desc: "量より質の原則に導かれ、イギリスは自国軍において卓越性と技術的優位を重視する。この国民精神は、先進的かつ高度な装備の調達を重視し、強力で技術的に先進した防衛態勢を確保するものである。質に重点を置くことで、イギリスは自国軍の有効性を最大化し、現代の課題に直面する中で戦略的優位を生み出すことを目指す。"
 ENG_mothballing_operations_idea_tt: "この国民精神が有効な間、§Y海軍国家方針§!を取得することは§Rできない§!"
 ENG_mothballing_operations_negative_opinion_tt: "この国民精神を保有している間、§Y海事産業評価§!に§R-20§!の修正"