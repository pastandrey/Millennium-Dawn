 ENG_military.007.t: "Outpost on the Moon"
 ENG_military.007.d: "Our scientists and engineers are ready to send astronauts and equipment to live semi-permanently on the Moon. A total sum of roughly 12 astronauts will be sent there, along with tens of millions of dollars worth of equipment, supplies, living spaces, and personal items. This outpost will need to be regularly moved as the Lunar day lasts 29 Earth days, which is far too long for batteries to keep stored power on the Moon.\n\nThe base itself will be on the poles, easily moveable, to get the maximum usage of our solar panels. Additionally, experiments will be carried out to determine long-term living conditions on the Moon. Extraction of lunar ice could not only lead to liquid water for plants and food for astronauts on the Moon, but also lead to separating it into oxygen and hydrogen, rocket fuel.\n\nThis may take months or years to get the research needed to do this. Within this time, however, using the funds for this project, we will build a depot orbiting the Moon to allow easier access to the Moon, and refueling to get to Earth.\n\nAll of this is achievable within the next decade. Now, however, is the time to launch."
 ENG_military.007.a: "Launch!"
 ENG_military.008.t: "Moonbase Alpha"
 ENG_military.008.d: "Our scientists and engineers have officially landed on the Moon, and are currently in the process of setting up the Moon-base. Each section is divided into \"modules,\"not quite buildings on their own, but not together as one. There is a habitation module, for rest, food module, for growing food, lab module, which is the largest with most of the scientific equipment, a maintenance module, containing all the maintenance tools to repair things if they get broken, an amenities module, since these people are here for 6 months, and working all day everyday isn't good for the mind, and quite a few solar panels. \n\nFood deliveries will be common for these first months as it takes time to grow food. Water and oxygen will be obtained through the Lunar ice. Lastly, these scientists will stay until shortly after moving to the next location in roughly 6 months time when the solar panels become defunct due to the Lunar day and night where the outpost is located lasts 6 months.\n\nMoonbase Alpha is complete."
 ENG_military.008.a: "Science!"
 ENG_military.009.t: "Colony Progresses"
 ENG_military.009.d: "Our scientific outpost on the Moon has had a major breakthrough. With expansion of their current solar panel network, and recent discoveries making separating water to make oxygen and hydrogen easier, they have been able to come up with enough oxygen and hydrogen to fully fuel the most recent supply rocket. This is such a necessary breakthrough which will allow the Moon itself, given enough time and investment, can become a hub for future space ventures into outer space.\n\nSpace itself is getting smaller."
 ENG_military.009.a: "We're good at being pioneers"
 ENG_military.010.t: "Crisis on the Moon"
 ENG_military.010.d: "Drastic measures need to be taken place immediately. For reasons currently unknown, the habitation module has ruptured and \"exploded.\"\n\nAn hour ago, all 12 scientists were doing their duties when, all of a sudden, there was a massive rupture in the habitation module.\n\nSince waves don't travel in a vacuum, most didn't realize until they physically saw what had happened.\n\nThere is an emergency fund as part of the budget, so there is no need to allocate more funds to the project, and the scientists can always sleep in the other isolated modules; however, this has spooked many, stating that a few, many, or even all of our scientists could have died, and has also lowered the morale of the scientists since they could have died. Thus, attempting to continue the outpost on the Moon will be politically costly, and a rotation of scientists may need to happen now rather than later, due to the sapping of morale.\n\nWhat shall we do?"
 ENG_military.010.a: "Send emergency aid!"
 ENG_military.010.b: "Abandon the project. It's not meant for us"
 ENG_military.011.t: "Colony Progresses Further"
 ENG_military.011.d: "Our Moon outpost has made another major breakthrough. They have managed to ship Hydrogen 3, a gas which seems perfect for fusion, to Earth, and scientists at home have figured out how to conduct fusion with it! Not only this, but the power generated from this fusion is near the amount used to do the reaction in the first place. This means that, with some improvements, this could result in successful fusion power! Not only does this allow immense benefits at home, along with knowledge we may be able to use in using other materials for fusion, we can use this on the Moon, allowing a permanent outpost rather than mobile outposts!\n\nAll of this is far ahead of schedule, which is a surprise, and many at UKSC have been left unprepared to implement this into the current Moonbase. So, a new Moonbase is needed, in a much better spot for rapid expansion than the current location of Moonbase Alpha. It's time to start preparations on Moonbase Beta."
 ENG_military.011.a: "Life continues on"
 ENG_military.012.t: "Another Crisis on the Moon"
 ENG_military.012.d: "More drastic measures need to be taken now. Two more modules have ruptured. This time, it's both the Food and Amenities modules.\n\nRoughly forty minutes ago, a scientist was about to enter the Food module when it suddenly exploded. The scientist is fine, and no-one but the plants were harmed. However, it was adjacent to the Amenities module, and it caused it to rupture and explode. Again, no-one was hurt.\n\nThis new occurrence, however, has raised the hairs of many back home, questioning the safety of the modules. After the previous explosion, UKSC replaced the modules, ensuring that they wouldn't explode, but it seems like prolonged pressure can cause something to break much more easily than it would otherwise. UKSC has already quickly responded, ordering new modules be made immediately, as well as a close inspection of all current modules (As you can't \"recall\"modules from the Moon as of this moment).\n\nWith mounting pressure at home to stop going forward with the project until all safety concerns are resolved, the continuation of the Moonbase program comes into question. In addition to the political pushback, the emergency fund has been cut in half, so UKSC is requesting another $5 billion to sort out future concerns. It remains your choice to decide whether to continue."
 ENG_military.012.a: "Send more emergency aid!"
 ENG_military.012.b: "We can't continue doing things like this"
 ENG_military.013.t: "Moonbase Beta"
 ENG_military.013.d: "At this point, our scientists and engineers on the Moon need to move to another location on the poles. The costs for doing this are already established in the long-term budget, so we don't need to add any new funding to the project yet.\n\nWith this new moonbase, we will be able to use new discoveries we have uncovered to allow the base to be established permanently, unlike our previous moonbase. With the use of better rockets, better power generation, better ice extraction and separation, we can use this new base, at a site more suited for rapid expansion, to facilitate colonization efforts of the Moon. This is not the only good news, entrepreneurs and corporations are flooding to UKSC en-mass for requests to put their newly developed mining systems on the Moon. Even other space programs in other countries are now extremely interested in starting up scientific and mining outposts on the Moon, however, due to your diligent efforts, we not only have a massive head start, but we are the only country actively attempting to colonize the Moon.\n\nThe future on our Moon is bright and Chinese."
 ENG_military.013.a: "Finally Afternoon Tea On The Moon!"
 ENG_Moonbase_beta_completed: "Moonbase Beta Completed"
 ENG_Mars_Colony_tt: "時が経つにつれ、我々の火星植民地は、それを危険にさらしかねない困難や危機を経験するかもしれない。しかし、それが成功すれば、報酬は莫大なものとなる。\n"
 ENG_military.014.t: "Mars Rover Mission"
 ENG_military.014.d: "Our scientists and engineers are ready to send our Rover to the mars. It has a total sum of roughly 14 sensors installed, along with tens of millions of dollars worth of equipment. This Rover will need to be regularly moved as the Mars day lasts 1 1/5 Earth days, which is far too long for batteries to keep stored power on the Mars.\n\nThe Rover itself will be on the poles, easily moveable, to get the maximum usage of our solar panels. Additionally, experiments will be carried out to determine long-term living conditions on the Mars. Extraction of ice could not only lead to liquid water for plants and food for future astronauts on the Mars, but also lead to separating it into oxygen and hydrogen, rocket fuel.\n\nThis may take months or years to get the research needed to do this. Within this time, however, using the funds for this project, we will build a depot orbiting the Mars to allow easier access to the Mars, and refueling to get to Earth.\n\nAll of this is achievable within the next decade. Now, however, is the time to launch."
 ENG_military.014.a: "Launch!"
 ENG_military.015.t: "Mars Colony Project"
 ENG_military.015.d: "If humans want to colonize Mars, they must establish a permanent base that is self-sustaining. This is the dream of countless space explorers and the only way for humans to set foot in the space. All this will become a reality today."
 ENG_military.015.a: "Mars here we come!"
 ENG_military.016.t: "Landing System failure"
 ENG_military.016.d: "After a journey of nearly 60 million kilometers, our spacecraft finally appeared over Mars. The iron oxide all over Mars showed a red appearance. The planet, long visible only through a lens, is now within sight. \nThe spacecraft enters landing mode. The captain, who had practiced countless times on the simulator, issued the order, but there seemed to be a problem with the landing device. At this time, large beads of sweat instantly covered the captain's forehead."
 ENG_military.016.a: "London, we've had a problem."
 ENG_military.017.t: "Vehicle Failure"
 ENG_military.017.d: "After a thrilling half hour, the spacecraft finally escaped the risk of crashing and landed crookedly on the Mars Utopia Plain. This is also the landing site of the previous Beagle rover. It is recognized as the largest impact basin on Mars and the solar system, with an estimated diameter of 3,300 kilometers. \nAfter landing, the crew will transfer to a special rover and head to the southern part of the plain to establish a base, but the vibrations from the previous landing of the spacecraft seem to have had some impact on the rover. It is clear that situation has developed not necessarily to crew's advantage"
 ENG_military.017.a: "There seems to be something wrong with our bloody vehicle today."
 ENG_military.018.t: "Arrival at Base"
 ENG_military.018.d: "40 kilometers, the first time humans have traveled such a long march on a planet other than Earth. Such an ordinary distance on earth is a breakthrough in the history of human spaceflight. \nAfter going through the tense process of setting up camp, transmitting all necessary data back to the earth, and checking the parameters of all equipment, the captain who was sitting on the bed could finally take a drink of tea. \nThrough the window of transparent synthetic material above the head, a light point among the stars shone with a little blue light, and that was the Earth. \n\n'Better.' the captain muttered."
 ENG_military.018.a: "Don't be afraid of being late for a good meal."
 ENG_military.019.t: "Successful Landing"
 ENG_military.019.d: "Everything was perfect, as expected, the spacecraft landed at the designated landing site exactly, and the human journey to Mars began in peace. \n"
 ENG_military.019.a: "I knew our crew would be able to complete the mission."
 ENG_military.020.t: "Arrival at Base"
 ENG_military.020.d: "The landing point of the spacecraft was the preset address of the base, and the crew began to camp on the spot to prepare for the construction of mankind's first permanent base on Mars. No one noticed that the space boots left countless messy footprints on the Martian soil."
 ENG_military.020.a: "One small step for Mars, one giant leap for mankind."
 ENG_military.021.t: "Locate Water Source"
 ENG_military.021.d: "Water is an essential resource for human survival. One of the main purposes of previous Mars exploration activities was to find water sources on Mars. Although there are no surface lakes or rivers like Earth, Mars' water resources basically exist in the form of ice under the surface of Mars. \nHowever, the actual precise positioning requires someone to conduct on-site surveys in person."
 ENG_military.021.a: "We can't survive without our tea!"
 ENG_military.022.t: "Underground Radiation Protection"
 ENG_military.022.d: "Due to the thin atmosphere of Mars and the lack of a planetary magnetic field, radiation from space reaches the surface unimpeded. The base could not provide enough shelter when it was first built, so digging a nest in the ground became the first choice to avoid radiation. \nWitnessing the pride to create a new base for the United Kingdom, Reminded the crew of the great days of the British Empire."
 ENG_military.022.a: "Britannia Rules the Space"
 ENG_military.023.t: "The First Harvest on Mars"
 ENG_military.023.d: "The problem of water sources has been solved, and the energy source is temporarily provided by solar power. Therefore, the production of food (and Tea) on Mars has become the most important matter at present. \nTraditional cereal crops have been excluded due to their growth cycles and harvesting processes, and potatoes have become the first human crops to be grown on Mars. Although Mars is not as bright as Earth due to the distance from the sun, the potatoes in the greenhouse seem to grow more lushly. Humanity's first harvest on Mars is in sight."
 ENG_military.023.a: "All nature, organic, Martian-grown potatoes."
 ENG_military.024.t: "Sandstorm"
 ENG_military.024.d: "Sandstorm are a common occurrence on Mars. Although the air pressure on Mars is much lower than that of the Earth, the Martian storm is not as devastating as the previous legends, just like in that movie. \nHowever, the raised dust still poses a lot of hidden dangers to human bases, especially since solar energy is an indispensable energy source for current bases."
 ENG_military.024.a: "We have no chance to save Matt Damon here."
 ENG_military.025.t: "Accident"
 ENG_military.025.d: "To go up the mountain often and eventually run into a tiger. The Martian dust storm lasted far longer than previously expected, and the battery life inside the base seemed to be in a very pessimistic situation. \nIn order to continue the Mars colony mission, we need to make a decision, choose to evacuate and find a new location, or continue to repair the damaged facilities."
 ENG_military.025.a: "Evacuate"
 ENG_military.025.b: "Fix Base"
 ENG_military.026.t: "Evacuate"
 ENG_military.026.d: "We can't wait any longer. The situation is now very critical and it's time to use backup rockets for evacuation. After checking that all the team members had safely boarded the ship, the captain reluctantly looked back at the base building that was still in building. He suppressed the grief in his heart and gave the order to the artificial intelligence guide to launch the spacecraft. \n'We will be back!' As a huge burst of smoke rose, the spacecraft broke away from the Martian ground and slowly rose into the sky."
 ENG_military.026.a: "Where there is life, there is hope."
 ENG_military.027.t: "Repair Damaged Base"
 ENG_military.027.d: "We cannot sit back and wait, we must start repairs on the base immediately with any cost, otherwise all the gains we have made on Mars will be ruined, and no one can survive in this chaos. Saving the base means saving ourselves."
 ENG_military.027.a: "For the sake of sacrifice and great ambition, we dare to make a new world."
 ENG_military.028.t: "Mars City Project"
 ENG_military.028.d: "We have made outstanding achievements in building a Mars colony. But there is still some distance to go before we can finally achieve our goal. Do we still want to continue investing in Mars construction?"
 ENG_military.028.a: "Upgrade"
 ENG_military.028.b: "Don´t need it"
 ENG_military.029.t: "Yes"
 ENG_military.029.d: "As long as we take one more step forward, our mission on Mars will be completely completed. There is no half-measures in our agenda."
 ENG_military.029.a: "Don't pass the responsibility to the next generation."
 ENG_military.030.t: "No"
 ENG_military.030.d: "The current Mars base is complete enough, and it is unwise to continue to invest more. We still have many problems to face on earth, and it is impossible to just throw money into space."
 ENG_military.030.a: "Believe in the wisdom of future generations."
 ENG_military.031.t: "Mars City completed"
 ENG_military.031.d: "After our unremitting efforts, our colony on Mars has finally been completed. Human beings will never forget these efforts, and one day human beings will set foot on the entire galaxy."
 ENG_military.031.a: "Our journey is the whole galaxy."
 ENG_military.032.t: "Established New Sub-base"
 ENG_military.032.d: "As more spacecraft brought more personnel and materials, the originally Mars base began to prosper. The water resources under the original base can no longer carry more people, and it is urgent to establish a new sub-base. \nAs the spacecraft of the first team gradually disappeared from sight, the former captain and today the mayor of first new London city recalled the past when the Mars rover fell into a trench."
 ENG_military.032.a: "Mom, I'm going on a long voyage today."
 ENG_military.033.t: "Mars City Monument"
 ENG_military.033.d: "As humans have traveled across Mars, Mars has become the new home for humans on Earth. The terraforming of Mars is proceeding in an orderly manner. At the first landing point of the human spacecraft, a huge monument was built to commemorate the men and women who sacrificed their lives during the journey and construction in the process of conquering Mars. They will forever be engraved in the journey of human civilization."
 ENG_military.033.a: "For the mankind!"
 ENG_mars_city_building_completed: "Mars city building completed"
 ENG_military.001.t: "Launching the Asteroid Mining Initiative"
 ENG_military.001.d: "Asteroid Mining has been a fantasy for many before us. Asteroids themselves carry much wanted platinum group metals, gold, silver, and iron group metals. It could become extremely lucrative for any spacefaring country. So today, the establishment of an British Royal Asteroid Mining Company, or BRAMC, will provide the first step towards mining asteroids. Using vast telescope arrays across the Empire, we can look for suitable asteroids in nearby outer space, then pull it into orbit and mine it. Spotting a suitable asteroid will be difficult, as, relative to the distance they are at, they are quite small. Luckily, there's actually quite a few which pass by Earth every so often, so it wouldn't take long to get one to stay in Earth's orbit."
 ENG_military.001.a: "Just need to wait for an asteroid..."
 ENG_military.002.t: "Asteroid Spotted"
 ENG_military.002.d: "Recently, our scientists at BRAMC spotted a suitable asteroid passing near Earth. This has been a relief for the BRAMC, as some doubted if we'd actually ever spot a suitable, economical asteroid at all. However, this asteroid is moving slowly enough, is large enough, and is rich enough to be moved into orbit and mined. The asteroid is, in-fact, larger than Wales. The next step is simply to move this asteroid into orbit around Earth, which has never been done before. In the meantime, British Space Command Engineers, and even private enterprises like Virgin Galactic, have invented mechanisms to mine the asteroid, so they will be ready by the time the asteroid gets into orbit."
 ENG_military.002.a: "Let's get that baby into orbit"
 ENG_military.003.t: "Asteroid in Orbit"
 ENG_military.003.d: "With the asteroid in orbit, UKSC and Virgin are both sending missions to the orbiting asteroid. UKSC is mainly concerned about collecting scientific data, while Virgin Galactic is more concerned about mining the material. No doubt this is a noteworthy achievement, which gives us an edge in space. There is even talk about bringing in more asteroids, but many say that additional asteroids can come later, as this asteroid is very large and well suited for mining. Other countries are already looking at us with envy, and are considering their own asteroid mining programs. The costs are extremely high even to develop the technology to even get there, so there is little worry among Virgin Galactic or UKSC that competition will arive."
 ENG_military.003.a: "Mining shall begin"
 ENG_military.004.t: "Profits from Mining Start Pouring in"
 ENG_military.004.d: "After establishing mining operations, Virgin Galactic and UKSC have both sent back their first shipments of space-material to labs and markets around the globe. The world has jelously looked on us, and there have been open talks in their respective chambers of legislation about opening their own asteroid mining operations. While we soon may get competition, we can enjoy the monopoly for now."
 ENG_military.004.a: "I'm Chuffed To Bits!"
 ENG_military.005.t: "Profits from Asteroid Mining"
 ENG_military.005.d: "The latest shipments from our asteroid mining operations have come in, and have generated many revenues. These shipments include platinum, gold, and silver. Putting the revenues to good use would be wise."
 ENG_military.005.a: "Excellent!"
 ENG_military.006.t: "Potential for Asteroid Mining"
 ENG_military.006.d: "Recently, The House of Commons has allowed UKSC and Virgin Galactic, a private space company, to bring a fairly large asteroid into orbit of Earth and mine it. Our advisors recommend we invest in this new space, as it could allow rare materials to be delivered straight to our country. Some, however, have cited the massive bill the United Kingdom had to pay to even start the operations, and oppose expanding into space. The return for this investment depends, but it may take 25 years to just break even. More substantial investment can bring this down, but we'll be far behind the rest for quite a while. \n\nWhat shall we do in regards to Asteroid Mining? Start a national program, or ignore it altogether?"
 ENG_military.006.a: "Invest in Asteroid Mining"
 ENG_military.006.b: "Too expensive and a waste of our time!"
 Mobile_Fires_Platorm_Program.1.t: "機動火力プラットフォーム計画の提携先選択"
 Mobile_Fires_Platorm_Program.1.d: "冷戦の終結と、ドイツ平原での紛争への予想が薄れたことを受けて、陸軍の155mm砲兵システムの保有は減少した。だが今や新たな脅威が地平線上に現れる中、国防省はこの能力を復活させるための措置を講じることを決定した。この契約を満たすために、多数の計画と提携先が名乗りを上げているが、成功するのは1つだけである。"
 ENG_military.034.a: "アーチャー砲兵同盟"
 ENG_military.034.b: "K9A1サンダー開発グループ"
 ENG_military.034.c: "ボクサー計画"
 ENG_military.034.e: "カエサル協力計画"
 ENG_military.035.t: "Britain Invites us to a Joint Expeditionary Force"
 ENG_military.035.d: "The United Kingdom extends a cordial invitation to [Receiving Country] to join the Joint Expeditionary Force (JEF), a collaborative initiative aimed at fostering international cooperation and enhancing collective security. This significant event marks the beginning of a new chapter in our shared commitment to promoting stability, responding to global challenges, and safeguarding the values we hold dear."
 ENG_military.035.a: "We Join!"
 ENG_military.035.b: "No Thank You, Old Chap"
 ENG_military.036.t: "[From.GetName] Accepts!"
 ENG_military.036.d: "[From.GetName] will join our Joint Expeditionary Force. Together we can prepare our military forces for rapid response"
 ENG_military.036.a: "Welcome"
 ENG_military.037.t: "[From.GetName] Refuses!"
 ENG_military.037.d: "[From.GetName] will not join our Joint Expeditionary Force. They prefer standing on there own"
 ENG_military.037.a: "They will regret over time"
 ENG_military.038.t: "ダートマス海軍兵学校の拡張"
 ENG_military.038.d: "最先端技術、戦略的思考、そして実地経験に重点を置くことで、ダートマス海軍兵学校は次世代の海軍指揮官を形作るうえで中核的役割を果たすことになる。"
 ENG_military.038.a: "空母こそが海戦の未来だ"
 ENG_military.038.b: "海上で敵を打ち破るには駆逐艦と巡洋艦が必要だ"
 ENG_military.040.t: "タイフーン・トランシェ1論争"
 ENG_military.040.d: "軍当局者、防衛アナリスト、政府関係者などの利害関係者は、進化する脅威に対処するうえでのこの航空機の有効性、国家防衛戦略におけるその役割、そして国際的提携国への輸出可能性について議論を行っている。タイフーン・トランシェ1をめぐる議論は、この先進的戦闘機の調達、配備、将来開発に関する決定を形作るうえで重要な役割を果たす。"
 ENG_military.040.a: "生産を継続"
 ENG_military.040.b: "後継機を研究"
 ENG_military.040.c: "備蓄を削減"
 ENG_military.039.t: "軍の専門化"
 ENG_military.039.d: "専門分野を選択せよ"
 ENG_military.039.a: "陸軍"
 ENG_military.039.b: "空軍"
 ENG_military.039.c: "海軍"
 ENG_military.039.e: "参謀"
 ENG_military.041.t: "UK Invites us to buy their innovation for Aircraft"
 ENG_military.041.d: "The UK made massive investments in their aircraft and aviation industry capabilities. Because of our special relationship, they offer to share their innovation for a small price. They are British afterall"
 ENG_military.041.a: "Innovation? Yes Please!"
 ENG_military.041.b: "No Thanks Old Chap"
 ENG_military.042.t: "UK Invites us to buy their innovation for Aircraft"
 ENG_military.042.d: "The UK made massive investments in their aircraft and aviation industry capabilities. Because of our special relationship, they offer to share their innovation for a small price. They are British afterall"
 ENG_military.042.a: "Innovation? Yes Please!"
 ENG_military.042.b: "No Thanks Old Chap"
 ENG_military.043.t: "US Accepts"
 ENG_military.043.d: "The US Accepted our offer to sell our innovation"
 ENG_military.043.a: "As expected"
 ENG_military.044.t: "US Refuses"
 ENG_military.044.d: "The US refused our Innovation Selling Offer. They believe the UK isn't the viable partner they need"
 ENG_military.044.a: "They will know eventually"
 United_Kingdom.002.t: "シリコン・グレンの成果"
 United_Kingdom.002.d: "我々のスコットランドのシリコン・グレンへの投資が実を結んでいる。地元の大学、半導体設計企業、ソフトウェア企業は、さらなる成長、新たな特許、そして熟練した卒業生が経済全体へ安定して流入している一年であったと報告している。"
 United_Kingdom.002.a: "グレンに最前線を押し広げさせよう"
 United_Kingdom.003.t: "越境協力の提案"
 United_Kingdom.003.d: "イギリスは、我々との共有国境における物流の改善と官僚的負担の軽減を目的とする提案を持ちかけてきた。提案された協力枠組みは、インフラの整合、通関手続きの簡素化、そして共同規制委員会に重点を置いている。\n\nこれを受け入れるべきだろうか？"
 United_Kingdom.003.a: "枠組みを受け入れる"
 United_Kingdom.003.b: "提案を拒否する"
 United_Kingdom.004.t: "アイルランド、越境協力を受諾"
 United_Kingdom.004.d: "アイルランド政府は、国境を越えた経済協調の円滑化に関する我々の提案を受け入れた。煩雑な手続きを削減し、基準を整合させ、アイリッシュ海および陸上国境を越える物資の移動をより円滑にするための委員会が設置された。"
 United_Kingdom.004.a: "提携による前進"
 United_Kingdom.005.t: "アイルランド、越境協力提案を拒否"
 United_Kingdom.005.d: "当初は関心を示していたにもかかわらず、アイルランド政府は最終的に我々の越境協力枠組みへの参加を見送ることを決定した。当局者たちは、法的な複雑さと政治的なためらいを拒否の主な理由として挙げている。"
 United_Kingdom.005.a: "残念だが、予想の範囲内だ"
 scottish.1.t: "Scottish Parliamentary Elections"
 scottish.1.d: "The results of the Scottish Parliamentary elections have come in, and we can finally see whether or not the Scottish people have voted for Pro-Independence parties."
 scottish.1.a: "Okay"
 britain_md.1.a: "では、始めよう"
 britain_md.2.a: "賭けに出よう"
 britain_md.2.b: "その勝算は気に入らない"
 britain_md.3.a: "労働組合に訴えかける"
 britain_md.3.b: "軍産複合体に訴えかける"
 britain_md.3.c: "化石燃料産業に訴えかける"
 britain_md.4.a: "産業資本家に課税する"
 britain_md.4.b: "軍に課税する"
 britain_md.4.c: "化石燃料産業に課税する"
 britain_md.4.d1: "そもそも誰かに課税する必要があるのか？"
 britain_md.5.a: "前進せよ！"
 britain_md.6.d: "我々のインフラは早急な改良を必要としている。必ずしも劣悪というわけではないが、世界の主要国と競うには、都市を拡張する必要がある。しかし、インフラの全面的な拡張だけに注力するのではなく、我々は開発を進める特定の地域を選ぶことにする。そうすることで、新たな投資の拠点を生み出し、それらの地域を繁栄させることができるだろう。"
 britain_md.6.a: "北部を開発する"
 britain_md.6.b: "中部を開発する"
 britain_md.6.c: "南部を開発する"
 britain_md.7.a: "仕事に取りかかろう"
 britain_md.8.a: "それらは確かに結びついていない！移民は問題ない"
 britain_md.8.b: "いや、データは嘘をつかない"
 britain_md.9.a: "時間を無駄にしている暇はない、取りかかろう"
 britain_md.10.a: "少し変えてみよう"
 britain_md.10.b: "断じて駄目だ"
 britain_md.11.a: "よし、では取りかかろう"
 britain_md.12.a: "Okay"
 britain_md.12.b: "No"
 britain_md.13.a: "了解"
 britain_md.14.a: "Bastards"
 britain_md.15.a: "Okay"
 britain_md.16.a: "穏健クーデター：これ以上の支配は求めない"
 britain_md.16.b: "強硬クーデター：衛星国家化を目指す"
 britain_md.17.a: "よし"
 britain_md.18.a: "最悪だ"
 britain_md.19.a: "よし"
 britain_md.20.a: "As expected"
 britain_md.21.a: "Nonsense! But what can we do?"
 britain_md.21.b: "Nonsense! Mobilize the army!"
 britain_md.22.a: "There's no turning back now"
 britain_md.22.b: "Well hold on now, what if we give it back?"
 britain_md.23.a: "Na so fear go control you?"
 britain_md.24.a: "英国への大志"
 britain_md.24.b: "英国を前へ、後ろへではなく"
 britain_md.24.c: "すべての人に公正な未来"
 britain_md.24.a1: "It's Time For Common Sense"
 britain_md.24.b1: "Are You Thinking What We're Thinking?"
 britain_md.24.c1: "Invitation to the Government of Britain"
 britain_md.25.a: "さあ始めよう！"
 britain_md.26.a: "島々の統合に注力する"
 britain_md.26.b: "さらに西へ進まねばならない"
 britain_md.26.c: "島々を返還する"
 britain_md.27.t: "英国がフォークランドを返還"
 britain_md.27.d: "天文学的に衝撃的な出来事として、1980年代にフォークランドをめぐって我々と戦った国家である[ENG.GetName]が、島々を我々の統治下へ返還することを決定した。何がこれを促したのか、なぜこのようなことをしたのかは分からないが、我々はすでに部隊を島へ戻し、駐屯させるために移動させている。英国政府は、この措置は我々およびより広い南米地域との関係を「親密化させる」試みであると述べた。"
 britain_md.27.a: "こちらとしては結構だ！"
 britain_md.28.t: "ジンバブエでの政権転覆作戦が成功"
 britain_md.28.d: "ジンバブエの独裁者を打倒する作戦に続き、我々の部隊によって民主変革運動（MDC）党が政権に据えられた。これは、周到な計画と、長年続いた同国の体制を打倒するための英国特殊部隊による作戦の結果である。"
 britain_md.28.a: "よし、当然の結果だ"
 britain_md.29.t: "[ENG.GetName]がクーデターを実行！"
 britain_md.29.d: "[ENG.GetName]が我が国で秘密作戦を実行し、その結果として従来の政権が打倒され、新政府が樹立されたようだ。軍部は事前に接触を受けており、英国軍が気付かれずに国内へ入れるよう道を開いてさえいた。"
 britain_md.29.a: "なんだと？"
 britain_md.30.t: "作戦「イースタン・ディバイド」への接近"
 britain_md.30.d: "現在、エジプトはシナイを完全に支配しており、これまでにイスラエルとの小規模な衝突が時折発生してきた。しかし我が国は、より効率的な交易路を切実に必要としており、スエズを通過するたびに課される税負担は、もはや理解を超えるほど積み上がり始めている。エジプトと取引をまとめる必要がある。さもなければ、我々はさらなる行動を取らざるを得なくなるだろう。"
 britain_md.30.a: "交渉を始めよう"
 britain_md.30.b: "交渉している暇はない、進攻せよ"
 britain_md.31.t: "英国がシナイの共同管理を要求"
 britain_md.31.d: "英国政府は、シナイにおける共同管理の可能性を協議するため、外交官を[EGY.capital.GetCapitalVictoryPointName]に派遣し、我々の閣僚に面会した。彼らは、英国の船舶と商人があまりにも不公平に扱われてきたと主張し、これに同意することは、我々の政府が信頼に値することを示すものになるとしている。"
 britain_md.31.a: "シナイを割譲するくらいなら、エジプト人は皆死ぬ！"
 britain_md.31.b: "何とか折り合いを付けられるかもしれない……"
 britain_md.32.t: "エジプト、交渉を拒否"
 britain_md.32.d: "エジプトは、たとえ我々が大きな譲歩を与える用意があるとしても、スエズの支配をめぐって我々と交渉する意思はないと表明した。我々に残された選択肢は、軍事介入を検討する以外にない。"
 britain_md.32.a: "進攻の時だ"
 britain_md.32.b: "もういい、忘れろ"
 britain_md.33.t: "エジプトが交渉を提案"
 britain_md.33.d: "エジプトは、シナイをめぐる交渉の要請に同意し、軍事・商業の双方についてシナイを直接通行できるようにする代わりに、税を軽減した上で一定額の現金の支払いを求めてきた。"
 britain_md.33.a: "こちらとしては結構だ"
 britain_md.33.b: "本気か？侮辱だ！"
 britain_md.34.t: "Operation Eastern Divide: Underway"
 britain_md.34.d: "Operation Eastern Divide is currently underway, with troops having landed in the Sinai. We must begin mobilization of a larger quantity of forces that'll allow for a larger-scale operation."
 britain_md.34.a: "Go, go, go!"
 britain_md.35.t: "[FROM.GetName] Calls For Deeper Integration"
 britain_md.35.d: "The [ENG.GetName] has called for deeper integration, claiming that by surrendering a little bit of our sovereignty, we'll be able to muster our forces together and bring our position to that of a global power once more. Though many of our citizens are wary of such a proposal, the [ENG.GetName] has in recent years proven itself a strong contender by surpassing us in all sectors."
 britain_md.35.a: "We must unite"
 britain_md.35.b: "We will not surrender our sovereignty"
 britain_md.36.t: "[FROM.GetName] Seeks Greater Integration"
 britain_md.36.d: "[FROM.GetName] has signaled that it is infact interested in deeper integration, offering several roadmaps to merging core bureaucratic institutions and bodies. Our diploamts and bureaucrats are working overtime to ensure a smooth, safe, and stable transition."
 britain_md.36.a: "Good"
 britain_md.37.t: "[FROM.GetName] Turns Down Further Integration"
 britain_md.37.d: "It appears that the [FROM.GetAdjective] government is uninterested in further integration, instead insisting that our recent moves infringe on their sovereignty."
 britain_md.37.a: "Okay"
 britain_md.38.t: "Trial of the Royal Family"
 britain_md.38.d: "The time has come for us to put the greedy, gluttonous, and useless money pit that is the royal family. We'll let a state appointed judge (and the people, indirectly) decide the fate of these criminals who for centuries have done nothing but waste state resources on extravagent material objects."
 britain_md.38.a: "Exile, we can't be too rash"
 britain_md.38.b: "Life in prison!"
 britain_md.38.c: "The French had some bright ideas.."
 britain_md.39.t: "Electing a Figurehead"
 britain_md.39.d: "While we understand the implications of giving some form of power to another politician, we need to recognize the need for a representitive that'll appease the crowds who are weary of a military leader in charge of the state. We'll swiftly find someone to prop up as a puppet who will represent the state."
 britain_md.39.a: "Put that fool Farage in"
 britain_md.39.b: "Find where Griffin is hiding"
 britain_md.39.c: "Is Michael Holmes around?"
 britain_md.39.d1: "The military will serve us just fine"
 british_flavor.1.t: "サンダーランド近郊での日産工場拡張計画"
 british_flavor.1.d: "日本の自動車メーカーである日産は、近く発売予定の新世代アルメーラ・ハッチバックおよびセダンの生産を含めるため、サンダーランドの工場拡張を求めている。政府当局者たちは、この拡張によって地元工場や国内自動車メーカーが競争しにくくなる可能性を懸念している。"
 british_flavor.1.a: "承認する"
 british_flavor.1.b: "いや、これは認められない"
 british_flavor.2.t: "アウグスト・ピノチェトの引き渡し"
 british_flavor.2.d: "医療的証拠により、元チリ独裁者アウグスト・ピノチェトは裁判に耐えうる状態ではないと結論づけられた。この調査結果を受け、元独裁者を母国チリへ送還すべきだという声が高まっている。しかし、その送還を求める人々に対して、ここイギリスで引き続き裁判を行うべきだと主張する者たちもいる。"
 british_flavor.2.a: "彼を送り返す"
 british_flavor.2.b: "彼はここに留まる"
 british_flavor.3.t: "ソルウェイ・ハーベスター沈没"
 british_flavor.3.d: "ソルウェイ・ハーベスターが、荒れた海の中でマン島沖にて沈没したと報告された。また、乗組員11名全員が死亡したとも報告されており、船体は引き揚げ可能とみられるものの、大きく損傷しているという。"
 british_flavor.3.a: "その件は後で対応しよう"
 british_flavor.3.b: "乗組員の遺体を収容し、葬儀の準備を進める"
 british_flavor.4.t: "アリアナ・アフガン航空機ハイジャック"
 british_flavor.4.d: "アフガニスタンでハイジャッカー集団が航空機に乗り込み、その機を[ENG.GetName]へ向かわせ、ロンドンに着陸させた。当局はハイジャッカーに対処するため小規模な部隊を派遣する準備を進めているが、その後彼らをどう扱うかはまだ決まっていない。"
 british_flavor.4.a: "逮捕し、その後国外追放する"
 british_flavor.4.b: "逮捕し、裁判にかけるため送る！"
 british_flavor.5.t: "ナットウエスト銀行への敵対的買収"
 british_flavor.5.d: "現在、スコットランドの銀行がイングランドの銀行であるナットウエスト銀行に対して敵対的買収を試みている。ロイヤル・バンク・オブ・スコットランドは現時点では両行のうち小規模な側であり、その成否は、もう一つの銀行であるバンク・オブ・スコットランドによる別の提案に大きく左右されている。"
 british_flavor.5.a: "我々の問題ではない"
 british_flavor.5.b: "銀行を救う"
 british_flavor.6.t: "BMW、ローバー・グループ売却計画を発表"
 british_flavor.6.d: "ドイツに拠点を置く自動車メーカーBMWは、ローバー・グループを売却する計画を発表し、ロンドンを拠点とするアルケミー・コンソーシアムが買収の有力候補として浮上している。この買収により、我々は自動車業界における影響力をより強められるかもしれないが、一方で、ただでさえ脆弱さを増している自動車業界において、さらなる重荷を抱えることにもなりかねない。"
 british_flavor.6.a: "我々は構わない"
 british_flavor.6.b: "再考したほうがよいのでは……"
 british_flavor.7.t: "デイヴィッド・トリンブル、アルスター統一党の党首選に勝利"
 british_flavor.7.d: "連合維持を掲げる政党であり、イギリスで3番目に古い政党でもあるアルスター統一党の党首選で、デイヴィッド・トリンブルが勝利した。彼の勝利は保守派の間で祝われている一方、より大きな自治を望む者たちは、いつものように結果に無関心であるか、不満を抱いている。"
 british_flavor.7.a: "勝者を祝福する"
 british_flavor.8.t: "移民・庇護法"
 british_flavor.8.d: "移民・庇護法が現在審議されており、これが可決されれば、すべての難民および移民は食料と衣類の費用を賄うための引換券を受け取る権利を得ることになる。これを拒否するのはやや非人道的かもしれないが、最終的にはイギリスの納税者にとってより高い負担をもたらすことになる。"
 british_flavor.8.a: "承認する"
 british_flavor.8.b: "拒否する"
 british_flavor.9.t: "国会議事堂広場で反資本主義暴動"
 british_flavor.9.d: "反資本主義の暴徒たちが街頭へ繰り出し、元イギリス首相ウィンストン・チャーチルの像を損壊した。この暴動は「メーデー暴動」と呼ばれており、群衆は当分解散しそうにない。一部では対応を求める声が上がる一方、いずれ疲れて帰るだろうとする意見もある。"
 british_flavor.9.a: "様子を見る"
 british_flavor.9.b: "清掃隊と警察を投入する"
 british_flavor.10.t: "[ENG.GetLeader]、女性協会でやじを浴びる"
 british_flavor.10.d: "[ENG.GetLeader]は女性協会で敵意ある歓迎を受け、怒った会員たちからやじを飛ばされ、皮肉まじりのゆっくりした拍手を浴びせられた。この気まずい対応は、党内や一般市民の間で、我々の指導部のあり方について疑問を投げかける結果となっている。"
 british_flavor.10.a: "無視する"
 british_flavor.10.b: "批判に応じる"
 british_flavor.11.t: "スコットランド、セクション28の廃止を求める"
 british_flavor.11.d: "スコットランド議会は、地方自治体による「同性愛の助長」を禁じる1988年地方政府法の物議を醸しているセクション28の廃止を求めている。この法律の廃止を認めれば、他地域でも同様の廃止要求が高まり、政治的不安定を招く可能性がある。"
 british_flavor.11.a: "阻止する"
 british_flavor.11.b: "我々は気にしない"
 british_flavor.12.t: "アレックス・サモンド、SNP党首を辞任"
 british_flavor.12.d: "アレックス・サモンドは、党内の財政戦略をめぐる対立を受けて、スコットランド国民党（SNP）での指導的役割を辞任した。彼の辞任により、我々はSNPが弱っている今のうちに攻勢をかける好機を得た。これによって、彼らの内部ではさらなる分裂が進む可能性がある。"
 british_flavor.12.a: "何もしないのが最善だ"
 british_flavor.12.b: "政治攻勢を仕掛ける"
 british_flavor.13.t: "最後の80人"
 british_flavor.13.d: "As part of the Northern Ireland Peace Process, arrangements have been made to release the final 80 prisoners held at Maze prison. These prisoners were either members of the Irish National Liberation Army, or have had strong links with them, with an incident occurring in 1997 where these prisoners killed and shot a loyalist volunteer force leader."
 british_flavor.13.a: "やはり拘束を続けるべきかもしれない……"
 british_flavor.13.b: "分かった、釈放しよう"
 british_flavor.14.t: "ポールズグローブ団地で暴動発生"
 british_flavor.14.d: "ポーツマスのポールズグローブ団地で、100人以上が、児童性犯罪で有罪判決を受けた人物を住まわせているとされるアパート棟を包囲した後、暴動が発生した。これは、ニューズ・オブ・ザ・ワールドによる「名指しと恥さらし」キャンペーン開始以来続いている、性犯罪容疑者に対する自警団的暴力の最新の事例である。"
 british_flavor.14.a: "まあ、我々にできることはなかった"
 british_flavor.14.b: "警察を投入する"
 british_flavor.15.t: "燃料価格抗議デモの発生"
 british_flavor.15.d: "抗議者たちは、高騰する燃料価格に抗議するため、石油精製所の入口を封鎖した。自動車利用者たちは燃料の買いだめを始めており、それが全国的な燃料不足と石油価格のさらなる上昇を招き始めている。報告によれば、この状況の結果として多数のガソリンスタンドが営業停止に追い込まれ始めており、政府は解決策を見つけるため奔走している。"
 british_flavor.15.a: "化石燃料産業を非難する"
 british_flavor.15.b: "厳格な石油使用割当を強制する"
 british_flavor.15.c: "§R何もしない§!"
 british_flavor.151.t: "Riots Erupt in Lieu of Government Inaction"
 british_flavor.151.d: "It appears that our lack of resolve in fixing the fuel shortage has only fueled further anger, with more and more people taking to the streets demanding a government resolution. As it stands, protesters are marching towards government buildings and vandalising statues, buildings, and symbols of the government."
 british_flavor.151.a: "We're trying!"
 british_flavor.152.t: "Calls for Change Grow Stronger"
 british_flavor.152.d: "It appears that the peoples resolve has only grown stronger, with hatred and anger being directed at [ENG.GetLeader] and the ruling establishment. Furthermore, calls for the re-allocation of royal funds towards aiding fuel subsidies have grown, with some even calling for the monarchy to step down in shame."
 british_flavor.152.a: "Ridiculous!"
 british_flavor.153.t: "House of Commons Set on Fire"
 british_flavor.153.d: "A state of emergency has been declared as the protests and riots have taken a dramatic shift towards outright anarchy rather than organized civil disobedience. The House of Commons was set ablaze by angry protesters as police were unable to hold back the angry mobs. There are reports that the protesters are planning on marching towards other state institutions, however it is unclear on who the next target will be."
 british_flavor.153.a: "Oh lord"
 british_flavor.154.t: "The Queen Abdicates!"
 british_flavor.154.d: "In light of the recent uprising and continued government failures, the Queen has officially declared that she will be abdicating and is planning on addressing the nation in a formal speech later this afternoon. While many are sad that she will be gone, it is still unclear whether or not she will be replaced, as hatred towards the monarchy has only grown stronger since the start of the protests."
 british_flavor.154.a: "Farewell to the jewel crown and the velvet gown"
 british_flavor.155.t: "[ENG.GetLeader] Resigns With No Clear Successor"
 british_flavor.155.d: "[ENG.GetLeader] has resigned, with his party being unable to quickly locate a suitable replacement. This state of anarchy has left the country in disarray, confusion, and vulnerable. Never has Britain ever faced such a crisis, and the government has shown that it is inept in its abilities to resolve anything at the moment."
 british_flavor.155.a: "What happens next?!"
 british_flavor.156.t: "Military Seized Control"
 british_flavor.156.d: "The British Armed Forces have declared their direct involvement in re-establishing authority, with a spokesperson announcing that anyone violating a 4PM curfew will be 'dealt with swiftly' and he declared that everything they intend on doing will be for 'the greater good of all Britons'. This has prompted outrage amongst members of the Labour party and Conservative party, calling this seizure of power an usurption of power, with some even denouncing the move as a radical shift towards dictatorship. Still, politicians have proven their inability in resolving state matters, with no clear successor following the resignation of [ENG.GetLeader]."
 british_flavor.156.a: "What will the future hold?"
 british_flavor.157.t: "Report: State of Affairs of the New Government"
 british_flavor.157.d: "Addressed to his excellency, [ENG.GetLeader],\nDate:[GetDateText]\n\nSubject I: State of Order\nYour excellency, the British Armed Forces have promptly secured control of major urban areas such as London, Birmingham, Manchester, and Liverpool among others. For now at least, it seems that people are slowly starting to disperse from their crowds and are beginning to head home as we've begun to establish government-funded oil subsidies and programs to help the country get back on its feet.\n\nSubject II: Calls From the Left & Right\nLabour & Conservative politicians have begun calling on our emergency administration to begin the process required to re-establish democratic rule in the country, with some polticians declaring the new administration a symbol of authoritarianism and military over-reach. One Labour politician even stated that 'the men with guns need to stay in their bases, and the men with pens need to resume their duty as civil servants'.\n\nSubject III: Further Consolidation\nOur men have begun finding politicians and bureaucrats who were disgruntled with the old system, calling on them to come serve in the stead of former politicians of the two-party system. Seizing authority in this manner will almost certainly equate to a national conflict of sorts, however as it stands we have no other means of consolidating our control."
 british_flavor.157.a: "Good to know"
 british_flavor.16.t: "保守党、世論調査で支持率上昇"
 british_flavor.16.d: "MORIの世論調査で、保守党が38％となり、労働党を2ポイント上回ったことが判明し、保守党支持者たちはこれを祝っている。これは、保守党が全国的な世論調査で労働党をリードした初めての事例となった。1993年以来のことである。"
 british_flavor.16.a: "了解"
 british_flavor.17.t: "ウォリックシャーを地震が襲う"
 british_flavor.17.d: "儀礼州ウォリックシャーを地震が襲い、周辺の建物にいくらかの被害が生じた。被害を受けた建物の再建を支援するため政府の援助を求める声が上がっているが、近頃は政府予算がますます厳しくなっており、ウェストミンスターは一貫した結論を出すのに苦慮している。"
 british_flavor.17.a: "無事であることを願うしかない"
 british_flavor.17.b: "政府援助を認可する"
 british_flavor.18.t: "ドナルド・デュワー、緊急搬送"
 british_flavor.18.d: "スコットランド首相ドナルド・デュワーが、公邸であるエディンバラのビュート・ハウスの外で転倒した後、病院へ緊急搬送された。彼の容体は急速に悪化しており、高度な医療チームを派遣するよう求める声が高まっている。"
 british_flavor.18.a: "彼の回復を祈る"
 british_flavor.18.b: "高度医療チームの派遣を認可する"
 United_Kingdom_News.2.t: "Riots Erupt in the United Kingdom"
 United_Kingdom_News.2.d: "Following a nation wide shortage of fuel and a spike in gas prices, British authorities opted to wait out the shortages in hopes of the economy bouncing back on its own naturally. However the situation did not improve, rather, it only worsened with the situation ultimately spiraling out of control earlier this week when protesters set fire to the House of Commons. British authorities have claimed that they are not responsible for the shortages and are stating that the issue is merely natural and will pass. One protester stated that: 'I have no fuel to put in my car! I have no means to get to work, and I have no heating in my home to keep my family warm, what is happening today is the result of an ineffective system and government'.\nThe government has insisted that it is doing everything possible to mitigate the situation, but as it stands, the protests are not going anywhere."
 United_Kingdom_News.2.a: "Anger erupts once more"
 United_Kingdom_News.3.t: "Queen Elizabeth II Abdicated"
 United_Kingdom_News.3.d: "In lieu of recent events, the Queen of the United Kingdom, Elizabeth II has announced her official abdication from the throne. This comes as protesters began demanding an end to the monarchy, associating it with symbols of corruption, greed, and money pits. More specifically this time around the anger was directed at the monarchy because people demanded money bne re-allocated to government fuel subsidies, their calls however fell on deaf ears in Westminster. It is unknown as to whether or not another royal will ascend the throne, but as it stands right now, the monarchy can only stand back and watch as the country burns."
 United_Kingdom_News.3.a: "The throne crumbles"
 United_Kingdom_News.4.t: "British Armed Forces Seize Control of London"
 United_Kingdom_News.4.d: "The British Armed Forces have declared their official involvement in enforcing the state mandated state of emergency, with them explicitly stating that anyone violating the 4PM curfew will be deal with 'swiftly'. This comes following weeks of protests and riots in the United Kingdom, with protesters having set the House of Commons ablaze in their fit of rage. It is not yet known the intentions of this new administrative body, but it is reportedly fit with military strong-men who intend on reducing the power that the Labour and Conservative party hold on the British establishment."
 United_Kingdom_News.4.a: "Is this the end of the United Kingdom?"
 ENG_inner_circle.01.t: "The Rise of [GetAscendingAdvisorName]"
 ENG_inner_circle.01.desc: "[GetAscendingAdvisorName] has shown sharp ambition and quietly expanded their influence within the Royal Household. Yet every step toward greater authority has stirred objections from other courtiers and senior figures, and the palace now hums with a familiar struggle for access and precedence. The question is whether [GetAscendingAdvisorName] has impressed The Queen enough to earn a true place within the Queen's Inner Circle."
 ENG_inner_circle.01.a: "Replace [GetAscendedAdvisorName1]"
 ENG_inner_circle.01.b: "Replace [GetAscendedAdvisorName2]"
 ENG_inner_circle.01.c: "Replace [GetAscendedAdvisorName3]"
 ENG_inner_circle.01.d: "[GetAscendingAdvisorName] is not worthy."
 ENG_inner_circle_charles.03.t: "The Prince's Harmony Visit"
 ENG_inner_circle_charles.03.desc: "The Prince of Wales has arrived on a visit, blending courtly diplomacy with a clear message on environmental stewardship. Meetings with senior officials and civil society leaders have focused on restoring trust, expanding practical cooperation, and framing climate resilience as a shared strategic interest rather than a talking point."
 ENG_inner_circle_charles.03.a: "Let harmony guide our relations."
 ENG_inner_circle_charles.04.t: "Prince Charles Champions Rainforest Protection"
 ENG_inner_circle_charles.04.desc: "We have been informed that His Royal Highness Prince Charles, the Prince of Wales, has called for increased global action to protect tropical rainforests. As founder of the Prince's Rainforests Project, he has used his influence to work with governments, businesses and civil society to highlight the importance of stopping deforestation and preserving these critical ecosystems for climate stability and biodiversity."
 ENG_inner_circle_charles.04.a: "We welcome Prince Charles on rainforest protection"
 ENG_inner_circle_charles.05.t: "Prince Charles' Environmental Diplomacy"
 ENG_inner_circle_charles.05.desc: "We have received word that His Royal Highness Prince Charles, the Prince of Wales, has completed an environmental diplomacy tour in our country, advocating for cooperation on climate, sustainability and ecological resilience. As one of the most longstanding voices for environmental action over decades, the Prince highlighted the need for collective efforts across nations and sectors to address global environmental challenges and promote sustainable solutions."
 ENG_inner_circle_charles.05.a: "Support sustainability."
 ENG_inner_circle_charles.06.t: "Prince Charles Promotes Organic Agriculture"
 ENG_inner_circle_charles.06.desc: "We have learned that His Royal Highness Prince Charles, the Prince of Wales, has taken active steps to support the development of organic and sustainable agriculture in our nation. Drawing on decades of pioneering work on organic farming methods at Highgrove and Duchy Home Farm, he emphasised the environmental and social benefits of organic practices and encouraged cooperation on agricultural sustainability."
 ENG_inner_circle_charles.06.a: "Support sustainable farming."
 ENG_inner_circle_andrew.04.t: "Prince Andrew on Trade Mission"
 ENG_inner_circle_andrew.04.desc: "His Royal Highness Prince Andrew, acting as the United Kingdom's trade representative, visited our nation to promote stronger commercial ties and economic cooperation. During his mission he engaged with government officials, business leaders and potential investors to highlight opportunities for trade and investment that benefit both our economy and that of the United Kingdom."
 ENG_inner_circle_andrew.04.a: "Welcome"
 ENG_inner_circle_andrew.05.t: "Trade Agreement Concluded"
 ENG_inner_circle_andrew.05.desc: "We are pleased to report that, following recent discussions and negotiations led by His Royal Highness Prince Andrew, the Duke of York, a new trade agreement has been concluded between our nation and the United Kingdom. The accord opens up avenues for increased commercial exchange, cooperation on key industries and mutual economic benefit, reflecting shared interests and strengthened ties between our economies."
 ENG_inner_circle_andrew.05.a: "Agree to partnership."
 ENG_military.045.t: "Britain's Request for Strategic Partnership"
 ENG_military.045.d: "The United Kingdom, led by a constitutional monarch and committed to Western cooperation, has formally requested Major Non-NATO Ally status. Granting this would enhance transatlantic relations and secure a key partner in Europe."
 ENG_military.045.a: "Approve their request, a valuable ally."
 ENG_military.045.b: "Decline, we must be cautious with such designations."
 ENG_integrate_ireland: "Integrate [IRE.GetFlag] Ireland"
 ENG_integrate_ireland_desc: "After decades we've finally subdued and integrated the lands of Ireland, it's about time that we formalize the integration process."
 ENG_a_more_united_kingdom_decisions: "王国統一"
 ENG_a_more_united_kingdom_decisions_desc: "冷戦期におけるイギリス帝国の漸進的衰退と脱植民地化を経て、我らの王国は着実な衰退を経験してきた。外交的手段と覇権の拡大を通じて、我々は再び我らの王国を統一することができるだろう。\n\n詳細は色付きの文字にカーソルを合わせて確認してください。。"
 ENG_core_objectives_text: "中核目標"
 ENG_econ_hegemony_text: "経済的覇権"
 ENG_military_hegemony_text: "軍事的覇権"
 ENG_political_hegemony_text: "政治的覇権"
 ENG_declare_economic_hegemony: "経済的覇権の宣言"
 ENG_declare_economic_hegemony_desc: "我々がコモンウェルスの経済的覇権国であると宣言する時が来た。"
 ENG_declare_military_hegemony: "軍事的覇権の宣言"
 ENG_declare_military_hegemony_desc: "我々がコモンウェルスの軍事的覇権国であると宣言する時が来た。"
 ENG_declare_political_hegemony: "政治的覇権の宣言"
 ENG_declare_political_hegemony_desc: "我々がコモンウェルスの政治的覇権国であると宣言する時が来た。"
 ENG_fractured_kingdom_united_state_decisions: "The Next Era"
 ENG_fractured_kingdom_united_state_decisions_desc: "With the ushering of a new regime in [ENG.GetFlag] Britain, we'll be able to finally spread our influence outward rapidly, swiftly, and aggressively.\n\nWe'll be able to establish a PMC organization under our command to wreak havoc on the world."
 ENG_grant_land_in_isle_of_man: "Transform the Isle of Man"
 ENG_grant_land_in_isle_of_man_desc: "Despite its historical importance, the Isle of Man serves us very little purpose today outside of resource extraction. However, if we grant this land to our new PMC organization, they'll be able to fully unlock their potential and use it as a possible base to move to do operations from."
 ENG_devolved_matters: "委譲事項"
 ENG_devolved_matters_desc: "Our constituent states have been pushing for a more §HDevolved State§! so that they may gain nominal or out-right independence. The three primary states, [SCO.GetFlag] §HScotland§!, [NIR.GetFlag] §HNorthern Island§!, and [WAS.GetFlag] §HWales§!.\n\nIf the state of our nation worsens, constituents will try and pass bills that'll reduce their dependence which we can veto at the risk of increasing their agitation.\n\nDecisions will become available as devolution progresses, and more information can be found in the devolution GUI found on the bottom right side of the screen represented by the puzzle piece.\n\nNext Constituent Election: [?ROOT.ENG_election_var|Y0] Month(s)"
 ENG_appease_scotland: "Targeted Subsidies for [SCO.GetFlag] Scotland"
 ENG_appease_nireland: "Targeted Subsidies for [NIR.GetFlag] Northern Ireland"
 ENG_appease_wales: "Targeted Subsidies for [WAS.GetFlag] Wales"
 ENG_doing_other_decision: "Doing another decision"
 ENG_welsh_referendum: "[GetYear] [WAS.GetFlag] Welsh Referendum for Independence"
 ENG_welsh_referendum_desc: "The [WAS.GetFlag] Welsh people will vote on a referendum that'll determine their future as a nation, constituent, and a player in the British isles."
 ENG_release_scotland: "Approve the [GetYear] [SCO.GetFlag] Scottish Referendum for Independence"
 ENG_release_scotland_desc: "'Scotland Foreeeeeeever!'\n\nPerhaps we vetoed the previous attempt at referendum too hastily, we can reverse on that mistake."
 ENG_release_ireland: "Approve the [GetYear] [NIR.GetFlag] Northern Irish Referendum for Independence"
 ENG_release_ireland_desc: "Perhaps we vetoed the previous attempt at referendum too hastily, we can reverse on that mistake."
 ENG_release_wales: "Approve the [GetYear] [WAS.GetFlag] Welsh Referendum for Independence"
 ENG_release_wales_desc: "Perhaps we vetoed the previous attempt at referendum too hastily, we can reverse on that mistake."
 decisions_ENG: "[ENG.GetName]ディシジョン"
 decisions_ENG_desc: "ここで政府は、ミッションの遂行を進め、英国の進路を導くための断固たる措置を講じることができる。産業を支援し、研究の方向を定め、地域を強化し、国の変化する需要に対応するのだ。"
 falkland_policy: "Falkland Policy"
 denounce_status_as_the_commonwealth_of_nation_member: "§YDenounce§! Status As The Commonwealth of Nations Member"
 denounce_status_as_the_commonwealth_of_nation_member_desc: "Break free from outdated ties. Denounce Commonwealth membership and chart a course towards true national sovereignty. Reclaim your destiny. Forge your own path. Independence awaits."
 ENG_bankers_switch_faction: "国際銀行家を支援"
 ENG_bankers_switch_faction_desc: "内部の同盟関係を組み替えて国際銀行家派閥を優遇し、政策をグローバル金融、開放的な資本移動、そしてサービス主導型経済へと傾ける。"
 ENG_scottish_parliament: "[SCO.GetFlag] Scottish Parliament"
 ENG_scottish_parliament_desc: "[SCO.GetFlag] Scottish Parliament members have not, and will not always be loyal to London. There will be §HPro-Independence§! Parliament Members that will fight for the creation of an autonomous, or independent [SCO.GetFlag] Scotland.\n\nIf the §HPro-Independence§! Parliament Members hold the majority, they will start passing bills to grant them more autonomy that we can approve or veto. If we consistently accept their requests, we will have a friendly, and loyal [SCO.GetFlag] Scottish Constituent state. But if we repeatedly deny their requests, their §Hagitation§! may result in a very messy situation. If [SCO.GetFlag] §HScottish Agitation§! reaches §H100§!, then they will demand independence.\n\n§HPro-Independence Seats§!: [? ENG_scottish_nationalists]/129\n\n[SCO.GetFlag] §HScottish Agitation§!: [?ENG_scottish_agitation]"
 ENG_invest_northern_ireland_mission: "インベスト・ノーザンアイルランドの建設還元"
 ENG_ireland_border_cooperation: "アイルランド国境協力条約"
 ENG_clydach_nickel_decision: "クライダハ・ニッケル精錬所の近代化"
 ENG_clydach_nickel_decision_desc: "南ウェールズのクライダハ・ニッケル精錬所を改良し、バッテリー用金属および高級合金向けの生産能力を拡大することで、我々の重要鉱物供給を強化する。"
 ENG_alloys_modernisation: "Modernise Alloy Production"
 ENG_alloys_modernisation_desc: "We invest in new smelters and rolling lines for specialist alloys, improving quality and throughput for everything from turbines and armour plate to high-performance components."
 ENG_ellesmere_port_decision: "エルズミア・ポート希土類磁石工場"
 ENG_ellesmere_port_decision_desc: "エルズミア・ポートにおける希土類処理を拡張し、風力タービン、電気自動車、先進防衛システム向けの高品質磁石を生産する。"
 ENG_shetland_hydrocarbon_decision: "シェトランド西方の炭化水素開発推進"
 ENG_shetland_hydrocarbon_decision_desc: "シェトランド西方の油田・ガス田開発を加速し、深海の埋蔵資源を活用して国内の炭化水素供給とエネルギー安全保障を強化する。"
 ENG_rosebank_field_decision: "ローズバンク油田の開発"
 ENG_rosebank_field_decision_desc: "ローズバンクの油田・ガス田の本格開発にゴーサインを出し、新たな洋上プラットフォームとパイプラインを稼働させて長期的なエネルギー供給を強化する。"
 ENG_cambo_offshore_decision: "カンボ沖合鉱区の開発"
 ENG_cambo_offshore_decision_desc: "カンボ沖合計画を推進し、新たな坑井と海底連結設備を追加して、その石油・ガス埋蔵量を生産段階へ移行させる。"
 ENG_hornsea_wind_farm_decision: "Expand Hornsea Wind Farm"
 ENG_hornsea_wind_farm_decision_desc: "We back further phases of the Hornsea offshore wind zone in the North Sea, adding turbines and grid links to deliver more clean power from the world's largest wind farm."
 ENG_drakeland_tungsten_decision: "ドレイクランズ・タングステン鉱山の再開"
 ENG_drakeland_tungsten_decision_desc: "プリマス近郊のドレイクランズ鉱山を再稼働させ、錫とタングステンの生産を再開することで、英国の重要技術金属の供給を強化する。"
 ENG_south_crofty_tin_decision: "Reopen South Crofty Tin Mine"
 ENG_south_crofty_tin_decision_desc: "We fund the reopening of South Crofty in Cornwall, reviving deep tin mining and adding a steady domestic source of high-grade ore for our industry."
 ENG_scottish_industry_mission: "Scottish Industry Windfall"
 ENG_scottish_industry_mission_desc: "Our investments in Scottish steel and heavy industry may unlock new seams, contracts and side-stream projects. There is a fair chance that renewed activity in the mills and yards will reveal extra resources we can bring into production."
 ENG_celsa_steel_mission: "Celsa Steel Output Review"
 ENG_celsa_steel_mission_desc: "Each year we review Celsa's Cardiff mill to see whether new orders, efficiency gains or scrap flows can justify another step up in steel production."
 ENG_roysth_naval_port_decision: "ロサイス海軍港の拡張"
 ENG_roysth_naval_port_decision_desc: "ロサイスのドックと支援施設を拡張し、フォース湾を改修、支援、そして将来の軍艦建造のためのより強力な拠点へと変える。"
 ENG_expand_belfast_decision: "ベルファスト工業団地の拡張"
 ENG_expand_belfast_decision_desc: "ベルファストのドック周辺および郊外で新たな区画を整備し、北アイルランド全域で工場、造船所、事務所のための追加用地を開放する。"
 ENG_highland_main_line_decision: "ハイランド本線の改良"
 ENG_highland_main_line_decision_desc: "パースとインヴァネスを結ぶハイランド本線を改良し、所要時間を短縮するとともに、沿線の町々に必要とされていた接続性と生産性の向上をもたらす。"
 ENG_titanic_quarter_decision: "Develop the Titanic Quarter"
 ENG_titanic_quarter_decision_desc: "We redevelop Belfast's former shipyard lands into the Titanic Quarter, mixing offices, studios and waterfront industry to breathe new life into the old Harland & Wolff site."
 ENG_productivity_gap_mission: "生産性の低下"
 ENG_hs2_mission: "ハイスピード2の建設"
 ENG_northen_powerhouse_mission: "ノーザン・パワーハウス鉄道の建設"
 ENG_build_london: "グレーター・ロンドンの開発"
 ENG_build_london_desc: "我々はグレーター・ロンドン地域の有権者に、改修が行われると約束した。ゆえに、我々はこの約束を果たさなければならない。"
 ENG_promise_labour: "労働組合への公約"
 ENG_promise_labour_desc: "我々は労働組合に公約を行った以上、それに応じて行動しなければならない。"
 ENG_promise_military: "軍産複合体への公約"
 ENG_promise_military_desc: "我々は軍産複合体に公約を行った以上、それに応じて行動しなければならない。"
 ENG_promise_fossil_fuel: "化石燃料産業への公約"
 ENG_promise_fossil_fuel_desc: "我々は化石燃料産業に公約を行った以上、それに応じて行動しなければならない。"
 ENG_monarchy_decision_category: "ウィンザー家"
 ENG_monarchy_decision_category_desc: "ウィンザー家は1917年から統治しており、戦争、社会変化、そして新世紀の圧力を通じて現代の君主制を担ってきた。それは英国の公的生活の中心に立ち、儀礼、奉仕、そして王国を結び留める静かな日常の営みに織り込まれた王朝である。その構成員は、後援、訪問、そして目立たない介入を通じて影響力を持ち、政治だけでは届かない形で、慈善、外交、軍へと関与する。ここでは王室の取り組みが表示され、各王族が追求できる施策と、その存在が何を動かし得るのかが示される。"
 ENG_monarchy: "House of Windsor"
 ENG_charles_youth_sustainability_decision: "若者の持続可能性推進"
 ENG_charles_youth_sustainability_decision_desc: "チャールズ皇太子殿下は、若者が持続可能で気候にやさしい取り組みを主導できるよう支援する計画を立ち上げる。青少年慈善活動および環境問題に数十年にわたって取り組んできた経験を踏まえ、プリンス・オブ・ウェールズは、生態学的な強靱性に合致する教育、技能開発、そして事業を推進する。この計画は、より持続可能な未来を築くうえで、若い世代が果たす重要な役割を認識するものである。"
 ENG_charles_sustainable_urban_planning_decision: "持続可能な都市計画の推進"
 ENG_charles_sustainable_urban_planning_decision_desc: "チャールズ皇太子殿下は、人々、環境、そして長期的な強靱性を優先する包括的な設計原則に基づく、持続可能な都市および地域社会の計画を提唱する。気候や文化的背景を尊重する地域社会づくりを長年訴えてきたその主張を踏まえ、この計画は、建築、インフラ、土地利用において、伝統的かつ環境に配慮した手法を推進する。"
 ENG_charles_organic_agriculture_decision: "有機農業と持続可能な農業を推進"
 ENG_charles_organic_agriculture_decision_desc: "チャールズ皇太子殿下は、その影響力を用いて、国内の農村社会および世界の地域社会の双方において、有機的かつ持続可能な農法を推進する。生態系の保全と再生型農業に対する数十年にわたる献身を踏まえ、皇太子は土壌の健全性を高め、家族経営農家を支え、環境負荷を軽減する実践を促進していく。"
 ENG_charles_environmental_diplomacy_tour_decision: "環境外交ツアー"
 ENG_charles_environmental_diplomacy_tour_decision_desc: "チャールズ皇太子殿下は、持続可能性および気候関連の取り組みに関する協力を促進するため、国際環境外交ツアーに乗り出す。皇太子としての数十年にわたる奉仕の中で、彼は数多くの国々を訪問し、指導者や地域社会と関わりながら、気候変動への対応、熱帯雨林の保護、持続可能な開発に向けた行動を促してきた。このツアーは、世界的な連携を強化し、自然界を守るという共通のコミットメントを際立たせることを目指す。"
 ENG_charles_rainforest_help_decision: "世界の熱帯雨林保護を支援"
 ENG_charles_rainforest_help_decision_desc: "チャールズ皇太子殿下は、熱帯雨林の破壊に対する国際的な行動を促進する計画を主導する。プリンスズ・レインフォレスツ・プロジェクトの創設者として、政府、各種組織、市民社会と連携し、熱帯雨林の保全の重要性と、それが気候変動対策に果たす役割を訴えていく。"
 ENG_charles_charities_network_decision: "プリンス慈善ネットワークを起動"
 ENG_charles_charities_network_decision_desc: "チャールズ皇太子殿下は、国内外の社会・教育・環境の諸活動を支援するため、広範な慈善団体ネットワークを起動する。皇太子によって設立または後援される諸団体からなる「プリンス・チャリティーズ」の総裁として、彼はそれらの集合的な専門性を活用し、持続可能なコミュニティを築き、機会を促進し、複数の地域にわたって福祉を改善する。"
 ENG_charles_harmony_tour_decision: "「ハーモニー」外交ツアーを実施"
 ENG_charles_harmony_tour_decision_desc: "チャールズ皇太子殿下は、自身の「ハーモニー」の理念を推進し、環境および持続可能性の課題に関する協力を促すため、国際ツアーに乗り出す。皇太子としての数十年にわたる奉仕の中で、彼は一貫して影響力を用い、気候変動対策、熱帯雨林の保護、持続可能な開発の必要性を強調してきた。このツアーは、これらの共通目標を軸に国際的な連携を強化することを目指す。"
 ENG_andrew_naval_haritage_decision: "Embrace Naval Heritage"
 ENG_andrew_naval_haritage_decision_desc: "Prince Andrew will draw on his long naval career to highlight his nation's maritime traditions and service. Having served as a Royal Navy helicopter pilot, instructor and commander with active service in the Falklands conflict, he will encourage respect for naval heritage and foster cooperation with allied fleets and maritime training institutions around the world."
 ENG_andrew_trade_representive_decision: "Trade Representative Mission"
 ENG_andrew_trade_representive_decision_desc: "Prince Andrew will embark on a trade representative mission to promote British commercial interests overseas. Drawing on his experience as the United Kingdom's Special Representative for International Trade and Investment, he will engage foreign governments, business leaders and investors to highlight opportunities for UK exports and inward investment, strengthening economic ties and fostering cooperation on trade and enterprise."
 ENG_andrew_emerging_trade_agreement_decision: "Pursue Emerging Trade Agreements"
 ENG_andrew_emerging_trade_agreement_decision_desc: "Prince Andrew will spearhead efforts to pursue trade agreements and business partnerships in emerging global markets. Drawing on his extensive experience representing British commercial interests abroad, he will seek to open up opportunities for exports, partnerships and investment with developing economies that show high potential for future growth and cooperation."
 ENG_andrew_emerging_economy_benefits_decision: "Leverage Emerging Economy Partnerships"
 ENG_andrew_emerging_economy_benefits_decision_desc: "Prince Andrew will focus on strengthening partnerships with emerging economies to expand opportunities for trade, investment and shared economic growth. Drawing on his extensive experience promoting British commercial interests around the world, this initiative aims to attract investment and expertise from fast-developing markets, boost domestic productivity and foster a more dynamic business environment."
 ENG_andrew_digital_enterprise_decision: "Digital Enterprise Initiative"
 ENG_andrew_digital_enterprise_decision_desc: "Prince Andrew will launch a digital enterprise initiative to promote digital skills and entrepreneurship across the nation. Drawing on his work with digital enterprise awards that helped people develop online, technical and business skills, this programme aims to support aspiring digital innovators, encourage technological literacy and build a stronger foundation for the digital economy."
 ENG_anne_national_charity_decision: "Princess Royal National Charities"
 ENG_anne_national_charity_decision_desc: "The Princess Royal will expand and coordinate her national patronages to push practical outcomes rather than photo opportunities. Funding drives, volunteer mobilization, and public attention will be directed where capacity is breaking.."
 ENG_anne_carers_promotion_decision: "Carers Recognition Drive"
 ENG_anne_carers_promotion_decision_desc: "Anne will put unpaid carers at the center of national attention, pressing institutions to treat care as essential service rather than private burden. The campaign elevates respite support, workplace flexibility, and public respect through royal patronage and relentless visibility."
 ENG_anne_military_readiness_decision: "Standards of Readiness"
 ENG_anne_military_readiness_decision_desc: "The Princess Royal will use her military appointments to demand professionalism, training discipline, and the unglamorous routines that keep units deployable. Inspections, exercises, and logistics follow-through will be pushed as the measure of seriousness."
 ENG_anne_navy_readiness_decision: "Fleet Readiness Inspections"
 ENG_anne_navy_readiness_decision_desc: "The Royal Navy will be pressed to prove it can sail, fight, and sustain itself under pressure. Anne's presence forces standards: maintenance, crew proficiency, and operational tempo will be treated as non negotiable."
 ENG_anne_tourism_decision: "A Royal Tourism Push"
 ENG_anne_tourism_decision_desc: "Britain's reputation is an asset, and the Princess Royal will spend it with purpose. A focused tourism push will highlight heritage, events, and local economies that need demand, turning royal engagements into bookings and investment."
 ENG_edward_beach_youth_decision: "Coastal Youth Outreach"
 ENG_edward_beach_youth_decision_desc: "The Earl of Wessex will take the Crown's youth work to the coastline, using visits, award programmes, and local partnerships to pull young people toward skills and service. The message is practical: confidence, discipline, and a way forward. "
 ENG_edward_global_youth_decision: "Global Youth Engagement"
 ENG_edward_global_youth_decision_desc: "Edward will extend youth engagement beyond Britain, strengthening ties through exchanges, training, and shared civic projects with partners abroad."
 ENG_edward_arts_culture_patronage_decision: "Patronage of Arts and Culture"
 ENG_edward_arts_culture_patronage_decision_desc: "The Crown will champion Britain's arts and cultural sector as both identity and strategic influence. Royal patronage will raise visibility, unlock funding, and protect institutions that shape national narrative at home and abroad."
 ENG_edward_production_guild_decision: "Support the Production Guilds"
 ENG_edward_production_guild_decision_desc: "Britain's guilds and skilled production trades are the backbone of quality and export strength. Edward will back the production guilds through recognition, training links, and industry coordination that keeps crafts alive and pipelines open. "
 ENG_edward_veteran_support_decision: "Wessex Veteran Support"
 ENG_edward_veteran_support_decision_desc: "Service does not end with discharge, and the Crown will not treat veterans as an afterthought. The Earl of Wessex will coordinate charities, employers, and local authorities to improve transition support, housing stability, and employment pathways. "
 ENG_philip_award_medal_decision: "Present the Prince Philip Medal"
 ENG_philip_award_medal_decision_desc: "Prince Philip will embark on his own mission to present the Prince Philip Medal to a leading engineer of exceptional global impact. This award recognises outstanding achievement in engineering practice and innovation under his personal patronage."
 ENG_philip_award_expansion_decision: "Expand the Duke's Youth Awards"
 ENG_philip_award_expansion_decision_desc: "Prince Philip will travel to launch an expansion of the Duke of Edinburgh's Award, aiming to open this youth programme to a broader international audience. His efforts seek to strengthen youth resilience and civic skills across many nations."
 ENG_philip_trust_funds_grants_decision: "Activate Prince Philip Trust Grants"
 ENG_philip_trust_funds_grants_decision_desc: "Prince Philip will personally oversee the disbursement of grants from the Prince Philip Trust Fund to local community and educational projects. His direct involvement ensures support for initiatives that improve recreation, learning and civic life."
 ENG_philip_faith_conservation_decision: "Launch Faith and Conservation Initiative"
 ENG_philip_faith_conservation_decision_desc: "Prince Philip will embark on a programme to unite religious communities and environmental groups for joint stewardship of nature. He aims to mobilise moral and community resources behind sustainable conservation goals."
 ENG_philip_innovation_recognition_decision: "Establish National Innovation Recognition"
 ENG_philip_innovation_recognition_decision_desc: "Prince Philip will begin a national scheme to reward outstanding industrial design, science and practical problem-solving. His initiative highlights ingenuity as a pillar of economic growth and national success."
 ENG_william_air_ambulance_decision: "Fly an Air Ambulance Shift"
 ENG_william_air_ambulance_decision_desc: "Prince William heads out for another air ambulance shift, flying emergency missions and meeting the crews on the ground."
 ENG_william_mental_health_at_work_decision: "Mental Health at Work"
 ENG_william_mental_health_at_work_decision_desc: "Prince William sets off to rally employers and charities behind a mental health at work push."
 ENG_william_step_into_health_decision: "Step into Health Drive"
 ENG_william_step_into_health_decision_desc: "Prince William goes on the road to back Step into Health and open NHS pathways for veterans and service families."
 ENG_william_early_years_forum_decision: "Convene the Early Years Forum"
 ENG_william_early_years_forum_decision_desc: "Prince William convenes an Early Years forum to pull experts, charities and business into the same room."
 ENG_william_chogm_youth_decision: "CHOGM Youth Message"
 ENG_william_chogm_youth_decision_desc: "Prince William attends a Commonwealth Heads of Government Meeting (CHOGM) youth session to signal that the next generation matters to the Commonwealth's future."
 ENG_seize_sierra_leone_resources: "Exploit [SIE.GetFlag] Sierra Leone"
 ENG_seize_sierra_leone_resources_desc: "It is time that we get something out of Operation Barras. We'll seize vital resources in Sierra Leone and establish economic influence for a period of 500 days."
 ENG_war_for_delta: "War for the Delta"
 ENG_war_for_delta_desc: "We've perhaps pushed the Nigerians a tad bit too far, allowing for their ego to suppress any fears they may have of confronting our forces. Nonetheless, we'll have to take their capital to show them who truly runs things down here."
 ENG_end_of_the_world: "世界の果てを征服"
 ENG_end_of_the_world_desc: "「世界の果て」とも呼ばれるティエラ・デル・フエゴは、重要な諸島であり、南極への玄関口でもある。この要衝を確保することは国家全体に計り知れない利益をもたらし得るため、我々はそれを得るために戦う覚悟がある。"
 ENG_operation_eastern_divide: "Operation Eastern Divide"
 ENG_operation_eastern_divide_desc: "The Egyptians have not satisfied our calls for fair and equal access through the Suez, and as a result, we've been left with no choice but to resort to military action."
 ENG_a_more_united_kingdom: "より統一されたイギリス"
 ENG_a_more_united_kingdom_desc: "我が国は現状でも統一国家ではあるが、かつて我らの領域の一部は分裂し、独立国家として離脱していった。真に統一された王国となるためには、世界各地のコモンウェルス諸国を再統合しなければならない。"
 ENG_fractured_kingdom_united_state: "Fractured Kingdom, United State"
 ENG_fractured_kingdom_united_state_desc: "§R'Citizen, not subject'§!\nWhile the monarchy and the previous regime faded into oblivion the state only grew stronger. The time has come for us to take a more assertive, dominant stance on the world stage and to finally punish those who plundered this land for centuries."
 ENG_deeper_commonwealth_integration: "英連邦統合深化"
 ENG_deeper_commonwealth_integration_desc: "我々が真に統一された国家となるためには、まず我々が統合したい相手に対し、我々が適切な受け入れ先であると納得させる方向で取り組まなければならない。その時になって初めて、次の段階へ進むことができる。"
 ENG_sovereignty_above_all: "主権最優先"
 ENG_sovereignty_above_all_desc: "我々の行政官が国民の未来を決定する能力ほど重要なものはない。我々の物事の進め方に、我が国以外の国家が口を出すべきではない。"
 ENG_establishing_new_leadership: "Establishing the New Regime"
 ENG_establishing_new_leadership_desc: "Before we can get to work, we'll have to establish a new regime. Societal uprooting will be required, and we must begin planning for a new transitional authority to take charge in parts of the country to make the process smoother."
 ENG_two_way_concessions: "Two-Way Concessions"
 ENG_two_way_concessions_desc: "We can't expect progress to be made in coming to an agreement with devolution if only one side makes an effort. We'll make some concessions and also expect the other side in Scotland to do the same."
 ENG_uniting_the_isle: "Uniting the Isle"
 ENG_uniting_the_isle_desc: "The Irish are the cause of much of our problems, from stoking tensions to having political parties call for Northern-Irish separatism. It's about due time that we move in and teach them a lesson."
 ENG_revolution_not_devolution: "Revolution, Not Devolution"
 ENG_revolution_not_devolution_desc: "In order to have a truly united state we must first destroy the cause of devolution. We need a national revolution, not devolution!"
 ENG_bring_in_canada: "Bring in Canada"
 ENG_bring_in_canada_desc: "We must extend a hand to Canada as the largest Commonwealth member in terms of land size. Our Canadian friends have maintained a close proximity through time, so it shouldn't be too hard to get them onboard."
 ENG_the_realm_of_britain: "The Realm of Britain"
 ENG_the_realm_of_britain_desc: "The Realm of Britain is something that can never be shattered, with te spirit of the British people persevering during times of particular hardship."
 ENG_glory_of_pax_britannica: "The Glory of Pax Britannica"
 ENG_glory_of_pax_britannica_desc: "Our past is a glorious one, and there are some who say that the past isn't truly gone, but rather a foreshadowing of what is to come. We need to realize the dreams of our forefathers, and restore the glory of Pax Britannica!"
 ENG_australian_outreach: "Australian Outreach"
 ENG_australian_outreach_desc: "We cannot forget the sacrifices that the Australians have made throughout history for our cause. Therefore it's imperative that we move to invite them to join us in the future to come."
 ENG_new_zealands_offer: "New Zealands Offer"
 ENG_new_zealands_offer_desc: "The Kiwi people have for the longest time remained a staunch ally of ours, and through good and bad have stuck with us. It's only appropriate that we ask them to join us."
 ENG_fracture_nato_unity: "Fracture NATO Unity"
 ENG_fracture_nato_unity_desc: "While it's true that we benefited from NATO security for the longest time, it is no longer the case. We must understand that our former friends wish nothing more than to divide and fracture our state, and our people must be made aware of that."
 ENG_end_eastern_suffering: "End Eastern Suffering"
 ENG_end_eastern_suffering_desc: "The pathetic lump of states in Eastern Europe headed by Russia are suffering a slow and terrible decline. It is better that we move in and establish true prosperity and order in that region."
 ENG_declare_the_commonwealth: "Declare the Commonwealth"
 ENG_declare_the_commonwealth_desc: "Now that all the lands (the important ones atleast) of the Commonwealth have joined us under one banner, it is only appropriate that we declare to the world that the Commonwealth Federation is here, and that it is here to stay."
 ENG_active_resource_project: "§Y進行中の重要鉱物事業§!"
 ENG_active_productivity_project: "§Y進行中の国家生産性事業§!"
 ENG_ucl_east_campus: "UCL East Campus"
 ENG_mechanic_menu_explanation: "地方分権"
 ENG_devolution_HEADER_TITTLE_LOC: "委譲事項"
 ENG_mechanic_menu_explanation_2: "地方分権により、いくらかの権限を各構成地域の住民の手に戻すことができる。\n各構成地域は、該当するステートをクリックすることで管理できる。\n各構成地域は§C議会§!、§R反発度§!、そして§G依存度§!を持つ。\n詳しい説明は§G情報§!ボタンにカーソルを合わせて確認できる。"
 ENG_parliament_gui_tooltip: "各構成地域はそれぞれ独自の議会を持つ。各構成地域の反発度に応じて、人々は独立支持派の議員に投票しやすくなったり、しにくくなったりする。ただし、いったん独立支持派の議員が就任すると、彼らが落選する可能性は非常に低くなる。独立支持派の議員が多数派になれば、依存度を低下させる法案を推進し始める可能性があり、やがては住民投票を要求するに至ることもある。\n\n我々の従属地域は我々に対して評価を持っており、それは反発度によって表される。構成地域は、我々の政党、我々が拒否権を行使した法案の数、あるいは我々が彼らの依存度を強制的に高めたかどうかに応じて、より強く反発することがある。反発度は、特定のイベント、ディシジョン、または国家方針によって影響を受けることがある。構成地域の反発度が100に達すると、その地域は王国からの独立を要求し始める。\n\n依存度は、構成地域がどの程度自立して対処できるかを決定する。依存度が低い場合、その地域は王国がなくても十分にやっていけるため、さらなる自由を求め始める可能性がある。我々は、受け取るイベントや取得する国家方針に基づいて、彼らの依存度を下げる、または上げる機会を得ることになる。\n\n北アイルランド緊張度は、ユニオニストのプロテスタントと、リパブリカンのカトリックの間の緊張を表す。我々の下す決定は緊張を激化させる可能性があり、緊張が50％に達すると、時折暴力的衝突が発生するようになる。緊張が50％を超えてさらに高まり続ければ、衝突の発生頻度は増加する。"
 ENG_dependency_gui_tooltip2: "依存度は、構成地域がどの程度自立して対処できるかを決定する。依存度が低い場合、その地域は王国がなくても十分にやっていけるため、さらなる自由を求め始める可能性がある。我々は、受け取るイベントや取得する国家方針に基づいて、彼らの依存度を下げる、または上げる機会を得ることになる。"
 ENG_parliament_gui_tooltip2: "各構成地域はそれぞれ独自の議会を持つ。各構成地域の反発度に応じて、人々は独立支持派の議員に投票しやすくなったり、しにくくなったりする。ただし、いったん独立支持派の議員が就任すると、彼らが落選する可能性は非常に低くなる。独立支持派の議員が多数派になれば、依存度を低下させる法案を推進し始める可能性があり、やがては住民投票を要求するに至ることもある。"
 ENG_agitation_gui_tooltip2: "我々の従属地域は我々に対する見解を持っており、それは彼らの反発度によって表される。構成地域は、我々の政党、我々が拒否権を行使した法案の数、あるいは我々が彼らの依存度を強制的に引き上げたかどうかに応じて、より強く反発することがある。反発度は、特定のイベント、ディシジョン、または国家方針によって影響を受けることがある。ある構成地域の反発度が100に達すると、その地域は王国からの独立を要求し始める。"
 ENG_irish_tension_tooltip: "北アイルランド緊張度は、ユニオニストのプロテスタントと、リパブリカンのカトリックの間の緊張を表す。我々の下す決定は緊張を激化させる可能性があり、緊張が50％に達すると、時折暴力的衝突が発生するようになる。緊張が50％を超えてさらに高まり続ければ、衝突の発生頻度は増加する。"
 ENG_scotland_gui_tooltip: "スコットランド\n-------------\n£GFX_click_right §Y右クリック§!で反発度を2低下\n有効中は税収の§R5%§!を消費する！"
