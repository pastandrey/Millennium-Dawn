 ENG_glasgow_shipbuilding_idea2: "グラスゴー造船拠点"
 ENG_glasgow_shipbuilding_idea2_desc: "クライド造船所への投資により、設計、溶接、艤装が効率化され、グラスゴーおよびその周辺で建造される我が国のすべての艦艇の生産コストが削減された。"
