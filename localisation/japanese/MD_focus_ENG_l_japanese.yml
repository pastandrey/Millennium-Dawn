 ENG_auxiliary_navy1: "王立海軍補助部隊"
 ENG_auxiliary_navy1_desc: "王立海軍補助部隊の概念は、海軍作戦における民間支援の重要性を強調し、王立海軍がその海上任務を遂行するうえでの有効性と即応性を確保するための、軍人と民間人の協力的な取り組みを示している。"
 ENG_auxiliary_navy2: "王立海軍補助部隊"
 ENG_auxiliary_navy2_desc: "王立海軍補助部隊の概念は、海軍作戦における民間支援の重要性を強調し、王立海軍がその海上任務を遂行するうえでの有効性と即応性を確保するための、軍人と民間人の協力的な取り組みを示している。"
 ENG_royal_army1: "英国王立陸軍"
 ENG_royal_army1_desc: "英国陸軍は英国軍の陸上戦部門であり、イギリスの主要な地上軍事力として機能している。数世紀にわたる豊かな歴史を持つ英国陸軍は、その専門性、適応力、そして作戦遂行能力で知られている。多様な背景を持つ高度に訓練された兵士で構成される陸軍は、戦闘作戦、平和維持任務、災害救援活動、人道支援任務など、幅広い任務を遂行できる装備と能力を備えている。"
 ENG_royal_army2: "英国王立陸軍"
 ENG_royal_army2_desc: "英国陸軍は英国軍の陸上戦部門であり、イギリスの主要な地上軍事力として機能している。数世紀にわたる豊かな歴史を持つ英国陸軍は、その専門性、適応力、そして作戦遂行能力で知られている。多様な背景を持つ高度に訓練された兵士で構成される陸軍は、戦闘作戦、平和維持任務、災害救援活動、人道支援任務など、幅広い任務を遂行できる装備と能力を備えている。"
 ENG_royal_army3: "英国王立陸軍"
 ENG_royal_army3_desc: "英国陸軍は英国軍の陸上戦部門であり、イギリスの主要な地上軍事力として機能している。数世紀にわたる豊かな歴史を持つ英国陸軍は、その専門性、適応力、そして作戦遂行能力で知られている。多様な背景を持つ高度に訓練された兵士で構成される陸軍は、戦闘作戦、平和維持任務、災害救援活動、人道支援任務など、幅広い任務を遂行できる装備と能力を備えている。"
 ENG_royal_airforce1: "王立空軍の亡霊たち"
 ENG_royal_airforce1_desc: "その輝かしい歴史にもかかわらず、時代遅れの王立空軍（RAF）は、老朽化した装備と限られた能力の時代を反映している。旧式の航空機と不十分な近代化努力に妨げられ、この国民精神は、時代遅れの技術で制空権を維持することの困難を象徴している。しかし、そうした制約の中にあっても、RAFの遺産の精神はなお生き続け、適応し克服しようとする粘り強さと決意を鼓舞している。"
 ENG_royal_airforce2: "王立空軍近代化"
 ENG_royal_airforce2_desc: "王立空軍近代化は、包括的な近代化努力を通じて航空戦力能力を再活性化する方向への戦略的転換を体現する。航空機の改良、技術能力の強化、最先端システムへの投資に重点を置くこの国民精神は、変化する戦場環境において王立空軍が航空優勢の最前線にあり続けることを確実にするための、積極的な取り組みを示している。"
 ENG_royal_airforce3: "近代化された王立空軍"
 ENG_royal_airforce3_desc: "航空優勢と迅速対応を中心とする近代化された王立空軍は、最先端の戦闘機と高度な戦闘能力を備えた強力な戦力を示している。空を支配し、比類なき速度と精度で敵と交戦できる機動的な戦闘機を備えたこの国民精神は、王立空軍が航空優勢を維持し、比類なき航空戦力によって国家の利益を守ることへの姿勢を体現している。"
 ENG_royal_airforce4: "近代化された王立空軍"
 ENG_royal_airforce4_desc: "近代化された王立空軍は、最先端の爆撃機と精密打撃能力によって特徴づけられる、戦略的航空戦力投射の新時代を告げる。長距離任務と精密誘導兵器に対応した先進的爆撃機を備えたこの国民精神は、高価値目標に対して決定的かつ精密な航空打撃を加える王立空軍の能力を示し、比類なき精度で戦力を投射し、敵を抑止する。"
 ENG_royal_airforce5: "近代化された王立空軍"
 ENG_royal_airforce5_desc: "近代化された王立空軍は、最先端の爆撃機と精密打撃能力によって特徴づけられる、戦略的航空戦力投射の新時代を告げる。長距離任務と精密誘導兵器に対応した先進的爆撃機を備えたこの国民精神は、高価値目標に対して決定的かつ精密な航空打撃を加える王立空軍の能力を示し、比類なき精度で戦力を投射し、敵を抑止する。"
 ENG_airbus_expansion: "Airbus Expansion"
 ENG_airbus_expansion_desc: "The Airbus Expansion underscores the company's commitment to innovation, excellence, and customer satisfaction, while also contributing to economic development, job creation, and technological advancement in the British aerospace industry."
 ENG_land_rover_idea: "Land Rover"
 ENG_homegrown_innovation: "国内発イノベーション"
 ENG_homegrown_innovation_desc: "国内発イノベーションの誘導は、イギリスの航空宇宙および航空分野において、革新と起業家精神の文化を育むことを目的としている。"
