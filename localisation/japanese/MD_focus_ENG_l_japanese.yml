 ENG_celsa_steel_idea: "セルサ製鉄提携"
 ENG_celsa_steel_idea_desc: "セルサのカーディフ製鉄所との長期的提携により、再生スクラップから新たな鋼材への安定した供給が確保され、資源収率が向上するとともに、毎年さらなる増産を求めるためのてこを得られる。"
 ENG_celsa_steel_tt: "§Y毎年50％の確率で§G+2§!§Y$country_resource_steel$§!を獲得§!"
 ENG_coal_opencast_mining: "スコットランドの露天掘り石炭"
 ENG_coal_opencast_mining_desc: "スコットランドの炭田に新設された露天掘り鉱山が、火力発電所へ安価な燃料を安定して供給し、発電所をより高稼働で運転させ、送電網向けの電力生産を増やしている。"
 ENG_glasgow_shipbuilding_idea1: "グラスゴー造船拠点"
 ENG_glasgow_shipbuilding_idea1_desc: "クライド造船所への投資により、設計、溶接、艤装が効率化され、グラスゴーおよびその周辺で建造される我が国のすべての艦艇の生産コストが削減された。"
