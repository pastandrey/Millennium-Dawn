 ENG_core_desc_TT: "経済的、軍事的、そして政治的覇権を達成することで、我々はコモンウェルスの主要3か国に対し、我々が彼らを支え、守ることができると示せるようになる。さらに、我々の条件のほうが優れていれば、彼らの国民も我々に加わく傾向が強まる。"
 ENG_econ_hegemony_TT: "「金がすべてを解決する」\n\n経済的覇権を達成することで、我々はコモンウェルス諸国のような他の経済圏を統合するのに適した状態になる。これを達成するためには、以下が必要である:\n\n3か国の合計より高いGDP\n- 我々は現在 $[?gdp_per_capita]（千） \n- 彼らは現在 $[?commonwealth_total_gdp]（千）"
 ENG_military_hegemony_TT: "「強い軍は強い支配に等しい」\n\n軍事的覇権を達成することで、我々は自らの領土と国民を防衛できる能力があることを示すうえで有利な立場に立てる。これを達成するためには、以下が必要である:\n\n3か国の合計より多い展開兵力\n- 我々は現在[?ENG.deployed_army_manpower_k]（千）の兵を展開している\n- 彼らは現在[?commonwealth_total_army]（千）の兵を展開している"
 ENG_political_hegemony_TT: "「必要なのは糸を引くことだけだ」\n\n政治的覇権を達成することで、我々はウェストミンスターの支配が安定しており、結びつきが強く、あらゆる階層のすべての人々に通じていることを示すことになる。これを達成するためには、以下が必要である:\n\n強力な影響圏\n- 3か国すべてで50%以上の影響力を持つこと"
 ENG_tooltip_TT: "経済的覇権の全要件を満たしている"
