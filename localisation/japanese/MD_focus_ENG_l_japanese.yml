 ENG_andrew_3_idea: "Duke of York"
 ENG_andrew_3_idea_desc: "The title Duke of York was bestowed on Andrew as a mark of his status as a senior royal and second son of the sovereign. Traditionally granted to younger sons of the monarch, it carries historic prestige and longstanding associations with royal service and public duty."
