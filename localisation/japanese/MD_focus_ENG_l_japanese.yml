 ENG_the_inner_circle_dm_desc: "女王の側近は、王室の家政機関と[ENG.GetNameDef]における最も信頼された人物たちを集め、女王$ENG_elizabeth_queen$の権威を支え、王冠の利益を守ることに忠誠を誓う。義務と名誉によって結ばれた彼らは、君主の近くにいること、任命、そして信任をめぐって競い合い、宮廷での影響力が公の目を超えて政策を形作り得ることを知っている。その手は軍事・産業・政治の意思決定にまで及び、後援、接触経路、そして静かな指導を通じて英国を導く。"
