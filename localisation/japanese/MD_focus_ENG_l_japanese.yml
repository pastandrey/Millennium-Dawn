 raid_type_ENG_raid_nigeria: "作戦「デルタ・ガード」"
 raid_type_ENG_raid_nigeria_desC: "不安定なナイジェリア政府は、デルタ周辺の油田を管理する能力において無能であることを自ら証明した。結果として、我々が介入し、再安定化に向けた措置を講じなければならない。"
 raid_type_ENG_raid_zimbabwe: "作戦「セーフガード」"
 raid_type_ENG_raid_zimbabwe_desc: "ジンバブエを支配する暴君は、国家を統治することを任せられる存在ではないため、直ちに追放されなければならない。英国系の人々とジンバブエの現地住民に対する彼の行為は、彼に越えてはならない一線など存在しないことを示しており、そして明らかに、我々の一線を越える意思がある。"
 ENG_dartmouth_naval_college_expansion: "Dartmouth Naval College Expansion"
 ENG_dartmouth_naval_college_expansion_desc: "The expansion of Dartmouth Naval College marks a significant investment in maritime education and training within the United Kingdom. Building upon its rich naval tradition, the expansion envisions state-of-the-art facilities, advanced training programs, and increased capacity to accommodate a growing demand for skilled naval personnel."
 ENG_type_32_frigate_guardian_class: "Type 32 Frigate Guardian Class"
 ENG_type_32_frigate_guardian_class_desc: "The Type 32 frigate is a frigate in the United Kingdom for the Royal Navy. It was officially announced in November 2020 by Prime Minister Boris Johnson as a result of the Integrated Review. Built after the Type 26 and Type 31 frigates, the ship will be general-purpose and modular in its design and is expected to help grow the Royal Navy's surface escort fleet."
 ENG_charles_harmony: "British Prince Charles Harmony Tour"
 ENG_election_unlock_tt: "§Yこの国家方針は、選挙によって新政府が成立したときに解禁される§!"
 ENG_army_special_operations_brigade_desc: "The Army Special Operations Brigade represents the pinnacle of the United Kingdom's military capabilities, dedicated to executing clandestine and challenging missions. Composed of exceptional personnel drawn from different branches, this elite brigade operates with unparalleled precision and adaptability. Armed with cutting-edge technology and rigorous training, the unit is primed for counter-terrorism, intelligence gathering, and other high-impact operations, solidifying its role as a key asset in the country's defense and security apparatus."
 ENG_glasgow_shipbuilidng_tt: "この効果は、§Y$ENG_refine_natural_bauxite$§!を完了することで強化できる。"
 ENG_refine_natural_bauxite_tt: "これは§Y$ENG_glasgow_shipbuilidng$§!の効果を強化する"
 ENG_the_queens_speech: "[ENG_the_queens_speech_focus_title]"
 ENG_the_queens_speech_desc_key: "The nation listens differently when the Sovereign speaks as the voice of state, not ceremony. In the Queen's Speech, a new political settlement will be declared and the government's agenda will be bound to the Crown's mandate. From this day forward, policy will carry royal authority, and Britain will act as a realm with a single will."
 ENG_the_kings_speech_desc_key: "The nation listens differently when the Sovereign speaks as the voice of state, not ceremony. In the King's Speech, a new political settlement will be declared and the government's agenda will be bound to the Crown's mandate. From this day forward, policy will carry royal authority, and Britain will act as a realm with a single will."
 ENG_inner_circle_andrew.06.t: "Prince Andrew Cast Out of the Royal Family"
 ENG_inner_circle_andrew.056.d: "Following the fallout from his ties to Jeffrey Epstein, Prince Andrew has become politically toxic. Under mounting public and institutional pressure, he is stripped of his remaining standing within the Royal Family and removed from the inner circle."
 ENG_inner_circle_andrew.06.a: "He can no longer remain"
 ENG_inner_circle_philip.04.t: "Prince Philip Has Died"
 ENG_inner_circle_philip.04.d: "Prince Philip, Duke of Edinburgh, has died after decades at the center of royal public life. His death marks the end of an era for the monarchy and will be felt across the United Kingdom."
 ENG_inner_circle_philip.04.a: "The nation mourns"
