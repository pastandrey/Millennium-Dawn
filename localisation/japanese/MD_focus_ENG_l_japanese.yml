 ENG_typhoon_tranche_debate: "Typhoon Tranche 1 Debate"
 ENG_typhoon_tranche_debate_desc: "The Typhoon Tranche 1 Debate refers to discussions and analyses surrounding the Eurofighter Typhoon, a versatile multi-role combat aircraft developed by several European nations. These debates often delve into various aspects of the Typhoon, including its performance, capabilities, cost-effectiveness, and strategic significance in modern air warfare."
