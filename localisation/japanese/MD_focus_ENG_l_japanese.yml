 raid_type_ENG_raid_nigeria: "作戦「デルタ・ガード」"
 raid_type_ENG_raid_nigeria_desC: "不安定なナイジェリア政府は、デルタ周辺の油田を管理する能力において無能であることを自ら証明した。結果として、我々が介入し、再安定化に向けた措置を講じなければならない。"
 raid_type_ENG_raid_zimbabwe: "作戦「セーフガード」"
 raid_type_ENG_raid_zimbabwe_desc: "ジンバブエを支配する暴君は、国家を統治することを任せられる存在ではないため、直ちに追放されなければならない。英国系の人々とジンバブエの現地住民に対する彼の行為は、彼に越えてはならない一線など存在しないことを示しており、そして明らかに、我々の一線を越える意思がある。"
 ENG_dartmouth_naval_college_expansion: "ダートマス海軍兵学校の拡張"
 ENG_dartmouth_naval_college_expansion_desc: "ダートマス海軍兵学校の拡張は、イギリスにおける海事教育および訓練への重要な投資を示すものである。その豊かな海軍の伝統を基盤として、この拡張では、最先端の施設、高度な訓練課程、そして熟練した海軍人員への高まる需要に対応するための収容能力の増強が構想されている。"
 ENG_type_32_frigate_guardian_class: "32型フリゲート・ガーディアン級"
 ENG_type_32_frigate_guardian_class_desc: "32型フリゲートは、イギリスにおける王立海軍向けのフリゲートである。これは統合レビューの結果として、2020年11月にボリス・ジョンソン首相によって正式に発表された。26型フリゲートおよび31型フリゲートに続いて建造されるこの艦は、汎用かつモジュール式の設計となる予定であり、王立海軍の水上護衛艦隊の拡充に役立つと期待されている。"
 ENG_charles_harmony: "英国チャールズ皇太子ハーモニーツアー"
 ENG_election_unlock_tt: "§Yこの国家方針は、選挙によって新政府が成立したときに解禁される§!"
 ENG_army_special_operations_brigade_desc: "陸軍特殊作戦旅団は、秘密裏かつ困難な任務の遂行に特化した、イギリスの軍事能力の頂点を示す存在である。各軍種から選抜された優秀な人員で構成されるこの精鋭旅団は、比類なき精度と適応力をもって行動する。最先端技術と厳格な訓練を備えたこの部隊は、対テロ作戦、情報収集、その他の高影響作戦に対応できるよう整えられており、国家の防衛・安全保障体制における重要な戦力としての役割を確固たるものにしている。"
 ENG_glasgow_shipbuilidng_tt: "この効果は、§Y$ENG_refine_natural_bauxite$§!を完了することで強化できる。"
 ENG_refine_natural_bauxite_tt: "これは§Y$ENG_glasgow_shipbuilidng$§!の効果を強化する"
 ENG_the_queens_speech: "[ENG_the_queens_speech_focus_title]"
 ENG_the_queens_speech_desc_key: "君主が儀式ではなく、国の声として語る時、国民の耳目は変わります。女王の演説において、新たな政治的合意が宣言され、政府の政策は国王の命によって定められます。この日以降、政策は国王の権威によって支えられ、英国は一つの意志を持つ王国として行動することになります。"
 ENG_the_kings_speech_desc_key: "君主が儀式ではなく国家の声として語る時、国民の耳目は一変する。国王の演説において、新たな政治的合意が宣言され、政府の政策は国王の命運に委ねられる。この日を境に、政策は国王の権威によって担われ、英国は一つの意志を持つ王国として行動する。"
 ENG_inner_circle_andrew.06.t: "Prince Andrew Cast Out of the Royal Family"
 ENG_inner_circle_andrew.056.d: "Following the fallout from his ties to Jeffrey Epstein, Prince Andrew has become politically toxic. Under mounting public and institutional pressure, he is stripped of his remaining standing within the Royal Family and removed from the inner circle."
 ENG_inner_circle_andrew.06.a: "He can no longer remain"
 ENG_inner_circle_philip.04.t: "フィリップ王子が逝去"
 ENG_inner_circle_philip.04.d: "エディンバラ公フィリップ殿下は、数十年にわたり王室の公務の中心に君臨した後、逝去されました。彼の死は王室の時代の終焉を告げるものであり、英国全土にその影響が及ぶでしょう。"
 ENG_inner_circle_philip.04.a: "国民たちは悲しみに伏せている"
