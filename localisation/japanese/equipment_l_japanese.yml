 light_tank_equipment_4: "2035年型軽戦車"
 BSH_Anti_Air_0: "9K32 ストレラ-2"
 BSH_Anti_Air_0_desc: "冷戦初期に比例航法ロジックを使用して設計され、アメリカの核爆撃機をロックオンして破壊することを目的としている。3700～4200mの目標を攻撃できる最も基本的な対空砲の1つである。"
 BSH_Anti_Air_1: "9K38 イグラ"
 BSH_Anti_Air_1_desc: "イグラはストレラのより近代的なバージョンであり、2004年にロシアによって配備された。ストレラよりもはるかに優れたデュアル波長帯赤外線（Sバージョン）誘導システムを使用している。"
 BSH_Anti_Air_2: "9K38 イグラ-S"
 BSH_Anti_Air_2_desc: "最新の派生型であり、射程が長く、より感度の高いシーカー、最新の対抗手段に対する耐性の向上、及びより重い弾頭を備えた大幅に改良された派生型である。製造業者は命中確率を0.8～0.9と報告している。"
 BSH_Anti_Air_3: "9K42"
 BSH_Anti_Air_4: "9K48"
 BSH_APC_1: "BTR-60"
 BSH_APC_1_desc: "現在も現役の旧式車両の1つであるBTR-60には、装弾数500発の14.5mm KPVT重機関銃が搭載されている。副兵装は、装弾数3,000発の7.62mm pkt同軸機銃である。軽歩兵の移動やQRFに最適である。"
 BSH_APC_1_short: "BTR-60"
 BSH_APC_2: "MT-LB"
 BSH_APC_2_desc: "MT-LBは1970年代に製造された。安価で高速に製造されたため、ソビエト連邦では軽対空戦闘や歩兵戦闘に使用された。"
 BSH_APC_2_short: "MT-LB"
 BSH_APC_3: "BTR-70"
 BSH_APC_3_desc: "BTR-70は1972年から使用されており、ソ連・アフガニスタン戦争では部隊の移動と火力支援に使用された。BTR-60との唯一の違いは、装甲がより重いことである。"
 BSH_APC_3_short: "BTR-70"
 BSH_APC_4: "BTR-80"
 BSH_APC_4_desc: "BTR-80は、ソ連で設計された8x8輪の水陸両用装甲兵員輸送車である。1986年に採用され、ソ連軍の従来の車両であるBTR-60およびBTR-70に代わるものであった。ソ連のアフガニスタン戦争中に初めて配備された。"
 BSH_APC_4_short: "BTR-80"
 BSH_APC_5: "BTR-90"
 BSH_APC_5_desc: "1994年に、対テロ戦闘員用に製造された。装弾数500発の30mmシプノフ2A42機関砲で強力な打撃力を持つ。"
 BSH_APC_5_short: "BTR-90"
 BSH_APC_6: "クルガネツ-25"
 BSH_APC_6_desc: "より近代的なロシア車両の一つであるクルガネツ-25は2015年に製造された。IFVとして製造され、ブーメランク-BM軽機関砲と12.7mmコルド機関銃を装備している。アメリカのブラッドレーIFVに酷似してモデル化されている。"
 BSH_APC_6_short: "クルガネツ-25"
 BSH_APC_7: "クルガネツ-35"
 BSH_APC_7_desc: "主にIFVである25型と同様に、APCである35型は12名を輸送でき、IFV運用において25型とほぼ同様の能力を発揮する。"
 BSH_APC_7_short: "クルガネツ-35"
 BSH_APC_8: "クルガネツ-45"
 BSH_APC_8_desc: "このスーパーAPCについては多くは知られていないが、40mm機関砲を搭載し、12名を輸送できる。"
 BSH_APC_8_short: "クルガネツ-45"
 BSH_Heavy_Anti_tank_0: "BRDM-2 9P148 コンクルス"
 BSH_Heavy_Anti_tank_0_desc: "多くの戦争や多くの車両で使用された。有効射程は500～3,000mである。"
 BSH_Heavy_Anti_tank_1: "MTLB コンクルス"
 BSH_Heavy_Anti_tank_1_desc: "A heavier missile system firing more than one. The Konkurs can hit targets at 4km and devastate the enemies largest of tanks."
 BSH_Heavy_Anti_tank_2: "コルネット-E"
 BSH_Heavy_Anti_tank_3: "コルネット-DM"
 BSH_Heavy_Anti_tank_4: "9M178 人民"
 BSH_IFV_1: "BMP-1"
 BSH_IFV_1_desc: "BMP-1はソ連の水陸両用装軌式歩兵戦闘車である。ソ連・アフガニスタン戦争で兵士の輸送やジハード戦士との戦闘に使用された。73mm2A28とATGMランチャーを使用している。"
 BSH_IFV_1_short: "BMP-1"
 BSH_IFV_2: "BMP-2"
 BSH_IFV_2_desc: "ジハード主義者の最大の恐怖は、30mm砲と強力な履帯を備え、極めて高速かつ効率的なBMP-2である。"
 BSH_IFV_2_short: "BMP-2"
 BSH_IFV_3: "BMP-2M"
 BSH_IFV_3_short: "BMP-2M"
 BSH_IFV_4: "BMP-3"
 BSH_IFV_4_desc: "BMP-3はソ連の歩兵戦闘車で、BMP-1およびBMP-2の後継車である。100mm砲と重榴弾を発射する。"
 BSH_IFV_4_short: "BMP-3"
 BSH_IFV_5: "BMP-3M"
 BSH_IFV_5_desc: "BMP-3Mはソビエトの歩兵戦闘車であり、BMP-1およびBMP-2の後継車であり、3の派生型である。改良された大砲とエンジンを使用する。"
 BSH_IFV_5_short: "BMP-3M"
 BSH_IFV_6: "T-15 アルマータ"
 BSH_IFV_6_desc: ""
 BSH_IFV_6_short: "T-15"
 BSH_IFV_7: "T-15M"
 BSH_IFV_7_short: "T-15M"
 BSH_IFV_8: "T-16"
 BSH_IFV_8_short: "T-16"
 BSH_Anti_tank_0: "RPG-7"
 BSH_Anti_tank_0_desc: "多くの戦争や多くの車両で使用された。"
 BSH_Anti_tank_1: "AT-4 ファゴット"
 BSH_Anti_tank_1_desc: "他のATGMシステムよりもはるかに軽量で旧式である。このATGMは70～2,500mでしか命中せず、他と比較して射程がはるかに短いが、より安価でもある。"
 BSH_Anti_tank_2: "9M133M コルネットM"
 BSH_Anti_tank_2_desc: "9M133M コルネットM"
 BSH_Anti_tank_3: "9M134M ブラート-M"
 BSH_Anti_tank_4: "9M142 シチューカ"
 BSH_MBT_1: "T-55"
 BSH_MBT_1_desc: "The T-54/55 is perhaps the most produced tank in the world. Designed and produced in the early years of the Cold War, it was the might and the backbone of the Red Army. Once feared as a symbol of the Russian might, it has become the iconic representation of Middle-Eastern armoured forces getting destroyed in the wake of an American air strike."
 BSH_MBT_1_short: "T-55"
 BSH_MBT_2: "T-72"
 BSH_MBT_2_desc: "T-72は、おそらくロシアが生産した中で最も成功した設計である。冷戦終結期におけるソ連軍事力の頂点であり、数千両が生産され、今日に至るまでロシア陸軍の屋台骨として機能している。中東紛争での壊滅的な失敗で悪名高くなったものの、T-72は依然として将来のロシア戦車設計の開発プラットフォームとして使用されており、今日の近代戦の基準を満たすために絶え間ない改良とアップグレードが施されている。かつてソ連軍の槍であったこの戦車を過小評価してはならない。"
 BSH_MBT_2_short: "T-72"
 BSH_MBT_3: "T-80"
 BSH_MBT_3_desc: "この200万ドルの戦車であり戦場の野獣は、T-72と同じ主砲を使用し、追加装甲とコブラATGMを装備している。"
 BSH_MBT_3_short: "T-80"
 BSH_MBT_4: "T-90"
 BSH_MBT_4_desc: "最大の射撃能力と効率性のために3門の砲システムで武装している。3門の125mm砲発射機を装備。"
 BSH_MBT_4_short: "T-90"
 BSH_MBT_5: "T-14 アルマータ"
 BSH_MBT_5_desc: "流麗な外形と強力な152mm砲を備えた、ロシア陸軍で最も先進的な主力戦車である。"
 BSH_MBT_5_short: "T-14"
 BSH_MBT_7: "T-14M"
 BSH_MBT_7_short: "T-14M"
 BSH_MBT_8: "T-99 黒い鷲"
 BSH_MBT_8_short: "T-99"
 BSH_mbt_equipment_0: "T-62"
 BSH_mbt_equipment_1: "T-72"
 BSH_mbt_equipment_2: "T-90"
 BSH_mbt_equipment_3: "T-14"
 BSH_mbt_equipment_4: "T-24"
 BSH_Rec_tank_0: "PT-76"
 BSH_Rec_tank_0_desc: "この超高速水陸両用軽戦車は、川の向こうから敵陣地に忍び寄り、猛攻撃を加えることができる。76.2mm D-56Tライフル戦車砲を装備。"
 BSH_Rec_tank_0_short: "PT-76"
 BSH_Rec_tank_1: "2S25 スプルート-SD"
 BSH_Rec_tank_1_desc: "自走水陸両用戦車駆逐車であり、この車両は敵戦車に忍び寄り、T-72やT-80が搭載する125mm砲を発射することができる。"
 BSH_Rec_tank_1_short: "2S25 スプルート-SD"
 BSH_Rec_tank_2: "BMPT ターミネーター"
 BSH_Rec_tank_2_desc: "おそらくこれまでに作られた中で最も強力なガラスの大砲の一つである。戦車には対抗できないが、一個縦隊全体を破壊することができる。130mm発射機4基と30mm機関砲2門を装備している。"
 BSH_Rec_tank_2_short: "BMPT ターミネーター"
 BSH_Rec_tank_3: "K-18 ブーメランク"
 BSH_Rec_tank_3_desc: "ブーメランクは当初、近代ロシア陸軍向けの費用対効果の高いAPC兼IFVとして発表された。しかし、ブーメランクは専用の対戦車プラットフォームとしても使用され、125mm砲を搭載することが2018年に詳細が明らかにされた。アメリカのストライカーMGSと同様に、ブーメランクはBMPTのような火力支援車両として機能する。"
 BSH_Rec_tank_4: "2025年型軽戦車"
 BSH_Rec_tank_4_short: "2025年型軽戦車"
 BSH_Rec_tank_5: "2035年型軽戦車"
 BSH_Rec_tank_5_short: "2035年型軽戦車"
 BSH_SP_Anti_Air_0: "ZSU-23-4 シルカ"
 BSH_SP_Anti_Air_1: "9K35 ストレラ-10"
 BSH_SP_Anti_Air_2: "2K22 ツングースカ"
 BSH_SP_Anti_Air_2_desc: "最大8発のミサイルを発射するこの機械は、接近するあらゆる航空機を撃墜することができる。それだけでなく、機関砲で輸送機を粉砕することも可能である。"
 BSH_SP_Anti_Air_3: "パーンツィリ-S1M"
 BSH_SP_Anti_Air_4: "パーンツィリ-S4L"
 BSH_SP_R_arty_0: "BM-21 グラート"
 BSH_SP_R_arty_0_desc: "近代的な作戦ではあまり使用されないが、SAMSとMLRSの祖父は主に第二次世界大戦とアフガニスタンで使用された。有効射程は20kmである。"
 BSH_SP_R_arty_1: "BM-30 スメルチ"
 BSH_SP_R_arty_1_desc: "この車両はグラートのより現代的なバージョンである。雪、氷、砂漠など、世界のどこへでも行くことができる。有効射程は35kmである。"
 BSH_SP_R_arty_2: "9A52-4 トーネード"
 BSH_SP_R_arty_2_desc: "対処しなければ都市全体を破壊できる、極めて重い砲兵中隊である。最大射程は90km。"
 BSH_SP_arty_0: "2S1グヴォズジーカ"
 BSH_SP_arty_0_desc: "2S1 グヴォズディカは、MT-LBu多目的シャーシをベースにしたソ連の自走榴弾砲で、122mm 2A18榴弾砲を搭載している。「2S1」はGRAUの名称である。ロシアでの名称はSAU-122だが、陸軍では一般にグヴォズディカとして知られている。"
 BSH_SP_arty_1: "2S3 アカーツィヤ"
 BSH_SP_arty_1_desc: "必要とあらば天から太陽を撃ち落とすことも可能な152.4mm D-22砲を装備している。これは射程50kmの注目すべき砲兵中隊である。"
 BSH_SP_arty_2: "2S19M2 ムスタ-S"
 BSH_SP_arty_2_desc: "2S19 ムスタ-Sは冷戦末期に開発され、新技術を取り入れ、前任機と比較して射程が向上した。"
 BSH_SP_arty_3: "2S35 コアリツィヤ-SV"
 BSH_SP_arty_3_desc: "2S35は、広範な自動化、自動砲弾種別選択、及び統一された指揮統制システムを備えた、真の21世紀の砲兵プラットフォームである。"
 BSH_SP_arty_4: "2S38 コアリツィヤ-M"
 BSH_artillery_0: "D-30"
 BSH_artillery_0_desc: "ソ連によって多くの戦争で使用された122mm牽引式砲兵中隊。射程は15～25km。"
 BSH_artillery_1: "2A65 ムスタ-B"
 BSH_artillery_1_desc: "この野獣のような大砲は、152mm榴弾を28.9km先まで発射し、歩兵小隊や車両縦隊全体を撃破することができる。"
 BSH_artillery_2: "D-40"
 BSH_artillery_3: "D-50"
 BSH_artillery_4: "D-60"
 BSH_util_vehicle_1: "ZIL-131"
 BSH_util_vehicle_1_desc: "世界中の多くの軍隊で使用されている兵站トラック及び兵員輸送車である。"
 BSH_util_vehicle_2: "ウラル-4320"
 BSH_util_vehicle_2_desc: "世界中の多くの軍隊で使用されている兵站トラック及び兵員輸送車である。"
 BSH_util_vehicle_3: "KamAZ-4310"
 BSH_util_vehicle_3_desc: "世界中の多くの軍隊で使用されている兵站トラック及び兵員輸送車である。"
 BSH_util_vehicle_4: "KamAZ-4350"
 BSH_util_vehicle_4_desc: "フォルクと同様に、この車両は8門の重機関銃を搭載できるだけでなく、上部には重機関銃も搭載可能。車列の先導に用いられる。"
 BSH_util_vehicle_5: "GAZ ティーグル"
 BSH_util_vehicle_5_desc: "この装甲兵員輸送車はさまざまな武器を搭載でき、最大 11 人の兵員を輸送できます。"
 BSH_util_vehicle_6: "VPK-3927 ヴォルク"
 BSH_util_vehicle_6_desc: "The VPK can carry 2+8 men. With STANAG 4569 Level 3 armor. Great for special forces and police forces."
 BSH_util_vehicle_7: "Z-STS アフマト"
 BSH_util_vehicle_7_desc: "Z-STS Akhmat is made on the Trehosnaya all-wheel drive chassis KAMAZ-5350. It has high characteristics of mobility and patency, and in addition, it does not differ in the complexity of operation. It is curious that an armored car, unlike a basic truck, is built according to the hood scheme. This made it possible to shift the crew's places back and increase their safety."
 WAG_Anti_Air_0: "9K32 ストレラ-2"
 WAG_Anti_Air_0_desc: "冷戦初期に比例航法ロジックを使用して設計され、アメリカの核爆撃機をロックオンして破壊することを目的としている。3700～4200mの目標を攻撃できる最も基本的な対空砲の1つである。"
 WAG_Anti_Air_1: "9K38 イグラ"
 WAG_Anti_Air_1_desc: "イグラはストレラのより近代的なバージョンであり、2004年にロシアによって配備された。ストレラよりもはるかに優れたデュアル波長帯赤外線（Sバージョン）誘導システムを使用している。"
 WAG_Anti_Air_2: "9K38 イグラ-S"
 WAG_Anti_Air_2_desc: "最新の派生型であり、射程が長く、より感度の高いシーカー、最新の対抗手段に対する耐性の向上、及びより重い弾頭を備えた大幅に改良された派生型である。製造業者は命中確率を0.8～0.9と報告している。"
 WAG_Anti_Air_3: "9K42"
 WAG_Anti_Air_4: "9K48"
 WAG_APC_1: "BTR-60"
 WAG_APC_1_desc: "現在も現役の旧式車両の1つであるBTR-60には、装弾数500発の14.5mm KPVT重機関銃が搭載されている。副兵装は、装弾数3,000発の7.62mm pkt同軸機銃である。軽歩兵の移動やQRFに最適である。"
 WAG_APC_1_short: "BTR-60"
 WAG_APC_2: "MT-LB"
 WAG_APC_2_desc: "MT-LBは1970年代に製造された。安価で高速に製造されたため、ソビエト連邦では軽対空戦闘や歩兵戦闘に使用された。"
 WAG_APC_2_short: "MT-LB"
 WAG_APC_3: "BTR-70"
 WAG_APC_3_desc: "BTR-70は1972年から使用されており、ソ連・アフガニスタン戦争では部隊の移動と火力支援に使用された。BTR-60との唯一の違いは、装甲がより重いことである。"
 WAG_APC_3_short: "BTR-70"
 WAG_APC_4: "BTR-80"
 WAG_APC_4_desc: "BTR-80は、ソ連で設計された8x8輪の水陸両用装甲兵員輸送車である。1986年に採用され、ソ連軍の従来の車両であるBTR-60およびBTR-70に代わるものであった。ソ連のアフガニスタン戦争中に初めて配備された。"
 WAG_APC_4_short: "BTR-80"
 WAG_APC_5: "BTR-90"
 WAG_APC_5_desc: "1994年に、対テロ戦闘員用に製造された。装弾数500発の30mmシプノフ2A42機関砲で強力な打撃力を持つ。"
 WAG_APC_5_short: "BTR-90"
 WAG_APC_6: "クルガネツ-25"
 WAG_APC_6_desc: "より近代的なロシア車両の一つであるクルガネツ-25は2015年に製造された。IFVとして製造され、ブーメランク-BM軽機関砲と12.7mmコルド機関銃を装備している。アメリカのブラッドレーIFVに酷似してモデル化されている。"
 WAG_APC_6_short: "クルガネツ-25"
 WAG_APC_7: "クルガネツ-35"
 WAG_APC_7_desc: "主にIFVである25型と同様に、APCである35型は12名を輸送でき、IFV運用において25型とほぼ同様の能力を発揮する。"
 WAG_APC_7_short: "クルガネツ-35"
 WAG_APC_8: "クルガネツ-45"
 WAG_APC_8_desc: "このスーパーAPCについては多くは知られていないが、40mm機関砲を搭載し、12名を輸送できる。"
 WAG_APC_8_short: "クルガネツ-45"
 WAG_Heavy_Anti_tank_0: "BRDM-2 9P148 コンクルス"
 WAG_Heavy_Anti_tank_0_desc: "多くの戦争や多くの車両で使用された。有効射程は500～3,000mである。"
 WAG_Heavy_Anti_tank_1: "MTLB コンクルス"
 WAG_Heavy_Anti_tank_1_desc: "A heavier missile system firing more than one. The Konkurs can hit targets at 4km and devastate the enemies largest of tanks."
 WAG_Heavy_Anti_tank_2: "コルネット-E"
 WAG_Heavy_Anti_tank_3: "コルネット-DM"
 WAG_Heavy_Anti_tank_4: "9M178 人民"
 WAG_IFV_1: "BMP-1"
 WAG_IFV_1_desc: "BMP-1はソ連の水陸両用装軌式歩兵戦闘車である。ソ連・アフガニスタン戦争で兵士の輸送やジハード戦士との戦闘に使用された。73mm2A28とATGMランチャーを使用している。"
 WAG_IFV_1_short: "BMP-1"
 WAG_IFV_2: "BMP-2"
 WAG_IFV_2_desc: "ジハード主義者の最大の恐怖は、30mm砲と強力な履帯を備え、極めて高速かつ効率的なBMP-2である。"
 WAG_IFV_2_short: "BMP-2"
 WAG_IFV_3: "BMP-2M"
 WAG_IFV_3_short: "BMP-2M"
 WAG_IFV_4: "BMP-3"
 WAG_IFV_4_desc: "BMP-3はソ連の歩兵戦闘車で、BMP-1およびBMP-2の後継車である。100mm砲と重榴弾を発射する。"
 WAG_IFV_4_short: "BMP-3"
 WAG_IFV_5: "BMP-3M"
 WAG_IFV_5_desc: "BMP-3Mはソビエトの歩兵戦闘車であり、BMP-1およびBMP-2の後継車であり、3の派生型である。改良された大砲とエンジンを使用する。"
 WAG_IFV_5_short: "BMP-3M"
 WAG_IFV_6: "T-15 アルマータ"
 WAG_IFV_6_desc: ""
 WAG_IFV_6_short: "T-15"
 WAG_IFV_7: "T-15M"
 WAG_IFV_7_short: "T-15M"
 WAG_IFV_8: "T-16"
 WAG_IFV_8_short: "T-16"
 WAG_Anti_tank_0: "RPG-7"
 WAG_Anti_tank_0_desc: "多くの戦争や多くの車両で使用された。"
 WAG_Anti_tank_1: "AT-4 ファゴット"
 WAG_Anti_tank_1_desc: "他のATGMシステムよりもはるかに軽量で旧式である。このATGMは70～2,500mでしか命中せず、他と比較して射程がはるかに短いが、より安価でもある。"
