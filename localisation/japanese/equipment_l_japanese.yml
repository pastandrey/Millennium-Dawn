 LUR_infantry_weapons_4_desc: "M16A4はM16シリーズの第4世代です。取り外し可能なキャリングハンドルと、光学機器やその他の補助装置を取り付けるためのフルレングスのクアッドピカティニーレールを備えています。セーフ/セミ/バーストのセレクティブファイアを採用したFN M16A4は、アメリカ海兵隊の標準装備となりました。軍用ライフルにはナイツ・アーマメント社製のM5 RASハンドガードも装備されており、垂直グリップ、レーザー、タクティカルライトなどのアクセサリーを取り付けることができます。このことから、アメリカ陸軍の野戦教範ではM16A4 MWS（モジュラー・ウェポン・システム）という名称が付けられています。"
 LUR_infantry_weapons_5_desc: "M4カービンは、M16アサルトライフルの短縮型・軽量型です。M4は、5.56x45mm NATO弾を使用し、空冷式、ダイレクトインピンジメント式、ガス作動式、マガジン給弾式のカービンです。14.5インチ（370mm）の銃身と伸縮式ストックを備えています。"
 AFR_infantry_weapons_1_desc: "1959年に開発されたAKMは、ミハイル・カラシニコフが開発したAK-47ライフルの最も一般的な近代化バージョンである。AKMは、その前身よりもはるかに軽量で、自動射撃時の精度が向上している。"
