 USA_infantry_weapons_1_desc: "M14ライフル、正式名称アメリカ合衆国ライフル、口径7.62mm、M14は、7.62x51mm NATO弾（.308インチ）を発射するアメリカの選抜射撃ライフルである。1959年にアメリカ軍の標準装備ライフルとなり、1961年までにアメリカ陸軍でM1ガーランドライフルに取って代わった。"
