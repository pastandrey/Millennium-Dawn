 SIN_infantry_weapons_4: "SAR 21"
 SIN_infantry_weapons_4_desc: "The first successful indigenous assault rifle designed and produced locally by ST Kinetics, the SAR 21 is the contemporary solution for the SAF's needs in the 21st Century. Despite looking similar to the Steyr AUG, its mechanisms are based off the AR-15 models modified and improved for the SAF needs. Replacing the obsolete M16S1, the SAR 21 now serves as the current mainstay weapon for every soldier, personnel and reservist in the SAF."
 SIN_infantry_weapons_5: "SAR 21 MMS"
 SIN_infantry_weapons_5_desc: "In the early 2000s the Ministry of Defence had unveiled a new framework for a technologically advanced fighting force, launching the initiative to transform the SAF into a 3rd Generation Army. The SAR 21 MMS is a modified variant of the SAR 21 that comes under the Advanced Combat Man System. It is introduced in 2005 to give every serviceman the situational awareness they need in the modern battlefield, fully integrated with HUD displays, tactical data-links and an advanced network of communications as part of the SAF's transition into a 3G Fighting Force."
 SIN_infantry_weapons_6: "BR 18 BMCR"
 SIN_infantry_weapons_6_desc: "The BMCR was first revealed in the 2014 Singapore Air Show as part of the SAF's future technology. It soon became the BR-18 Assault Rifle that will be replacing the SAR 21, quickly entering production in 2018."
 SIN_util_vehicle_6: "ベルレックス PCSV"
 SIN_util_vehicle_6_short: "ベルレックス"
 SIN_util_vehicle_6_desc: "The Belrex PCSV was revealed in 2016 as part of the SAF's initiative to transform its Army into a 3rd Generation Fighting Force. Originally derived from the South African Marauder MRAP, the Belrex is designed to serve a similar role but with the flexibility to be modified for different missions and needs. The Belrex was to replace SAF's 5-ton trucks and armoured vehicles."
