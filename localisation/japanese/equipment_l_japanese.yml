 WAG_SP_Anti_Air_1: "9K35 ストレラ-10"
 WAG_SP_Anti_Air_2: "2K22 ツングースカ"
 WAG_SP_Anti_Air_2_desc: "最大8発のミサイルを発射するこの機械は、接近するあらゆる航空機を撃墜することができる。それだけでなく、機関砲で輸送機を粉砕することも可能である。"
 WAG_SP_Anti_Air_3: "パーンツィリ-S1M"
 WAG_SP_Anti_Air_4: "パーンツィリ-S4L"
 WAG_SP_R_arty_0: "BM-21 グラート"
 WAG_SP_R_arty_0_desc: "近代的な作戦ではあまり使用されないが、SAMSとMLRSの祖父は主に第二次世界大戦とアフガニスタンで使用された。有効射程は20kmである。"
 WAG_SP_R_arty_1: "BM-30 スメルチ"
 WAG_SP_R_arty_1_desc: "この車両はグラートのより現代的なバージョンである。雪、氷、砂漠など、世界のどこへでも行くことができる。有効射程は35kmである。"
 WAG_SP_R_arty_2: "9A52-4 トーネード"
 WAG_SP_R_arty_2_desc: "An extremely heavy artillery battery that if not dealt with, can destroy entire cities. With as maximum range of 90km."
 WAG_SP_arty_0: "2S1グヴォズジーカ"
 WAG_SP_arty_0_desc: "2S1 グヴォズディカは、MT-LBu多目的シャーシをベースにしたソ連の自走榴弾砲で、122mm 2A18榴弾砲を搭載している。「2S1」はGRAUの名称である。ロシアでの名称はSAU-122だが、陸軍では一般にグヴォズディカとして知られている。"
 WAG_SP_arty_1: "2S3 アカーツィヤ"
 WAG_SP_arty_1_desc: "必要とあらば天から太陽を撃ち落とすことも可能な152.4mm D-22砲を装備している。これは射程50kmの注目すべき砲兵中隊である。"
