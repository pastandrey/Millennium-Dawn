 CZE_AS_Fighter4: "アエロ L-41 ヴォラフカ"
 CZE_AS_Fighter4_desc: "ヴォラフカは視界外射程兵器を装備した、マッハ2.5超の制空戦闘機である。"
 CZE_AS_Fighter5: "Let-47 オレシュニーク"
 CZE_AS_Fighter5_desc: "Let-47 is Engine-vectoring supermaneuverable aircraft with sensor fusion made to know the enemies before they know the plane."
 CZE_AS_Fighter6: "アエロ L-72 ヴラシュトフカ"
 CZE_AS_Fighter6_desc: "ヴラシュトフカは、超巡航ステルス性能を備えた制空戦闘機であり、モジュラーソフトウェア設計を採用している。これは中核コードと、様々な兵器メーカーが提供するモジュラーコード部品を組み合わせた構成であり、各兵器システムの部品が固有の目的のために専用にコーディングされることを可能にする。これによりソフトウェアの更新が容易になり、互換性の問題がほぼ発生しない。"
 CZE_AS_Fighter7: "Let-80 オレル"
 CZE_AS_Fighter7_desc: "オレルは、人工知能パイロットを搭載した、有人・無人両用の直接エネルギー兵器変形・形状変化型制空戦闘機である。"
