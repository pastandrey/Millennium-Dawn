 GER_transport_helicopter_2_desc: "CH-53Gは、シコルスキー・エアクラフト社が設計し、VFW-フォッカー社がライセンス生産したアメリカの大型輸送ヘリコプターです。CH-53Gは、パイロット、副操縦士、クルーチーフ、航空観測員の4名で搭乗します。最大38名の完全装備兵員を搭乗させ、機内積載量は8,000ポンド（3,600kg）、またはシングルポイントスリングフックによる機外積載量は13,000ポンド（5,900kg）と、様々なペイロードを搭載可能です。"
