 ITA_Anti_Air_0: "FIM-43 レッドアイ"
 ITA_Anti_Air_0_desc: "Developed by our own General Dynamics, this missile system uses passive infrared homing to track aircraft based on the heat from their exhaust, after the operator tracks their target visually as they would any other small arms. Requiring a direct hit to be lethal, this weapon is crude yet effective."
 ITA_Anti_Air_1: "FIM-92 スティンガー"
 ITA_Anti_Air_1_desc: "Designed much like its predecessor, this passive air-to-surface missile features several new upgrades from the earlier model such as improved ballistics, software, and a variant with dual IR and UV detection."
 ITA_Anti_Air_2: "FIM-92E スティンガー"
 ITA_Anti_Air_2_desc: "ジェネラル・ダイナミクスは、「スティンガー」プラットフォームの信頼性を継承し、新しいロールオーバーセンサーの追加と制御ソフトウェアの改訂によりシステムを改良し、飛行挙動も大幅に改善した。さらに、ドローン、巡航ミサイル、軽偵察ヘリコプターなどの小型ターゲットに対する性能も大幅に向上した。"
 ITA_Anti_Air_3: "FIM-194 スピアガン"
 ITA_Anti_Air_3_desc: "第5世代航空機が戦場で顕著な存在感を示すようになったため、このMANPADシステムの最新版では、この新しい敵に対処するために多くの変更が実装されている。最も注目すべきは、その照準能力が、指令見通し線、レーザー誘導、ならびにUVおよびIR照準に及ぶことである。"
 ITA_Anti_Air_4: "FIM-245 ハートストライカー"
 ITA_Anti_Air_4_desc: "DARPAの取り組みによって開発されたこのシステムは、MANPAD兵器プラットフォームの最高峰である。最近の進歩とセンサーの小型化により、当社のエンジニアは1人の人間で、敵が利用できる最もステルス性の高い航空機の一部を破壊または無力化できる効果的な力を実現した。"
