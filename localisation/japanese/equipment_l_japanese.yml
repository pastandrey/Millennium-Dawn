 CAN_CV_L_Strike_fighter1_short: "CA-4E スカイホーク"
 CAN_CV_L_Strike_fighter2: "シーハリアー CF-A2"
 CAN_CV_L_Strike_fighter2_short: "シーハリアー CF-A2"
