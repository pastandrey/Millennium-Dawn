 ISR_infantry_weapons_3_desc: "M16A2ライフルの開発は、ベトナム戦争におけるXM16E1およびM16A1の戦闘経験を踏まえ、アメリカ海兵隊から要請されました。1982年に国防総省によって「US Rifle, 5.56mm, M16A2」として正式に採用されました。海兵隊は1980年代初頭から中頃にアメリカ軍で初めてM16A2を採用し、その後1980年代後半にはアメリカ陸軍もこれに続きました。"
 KOR_infantry_weapons_1_desc: "M14ライフル、正式名称アメリカ合衆国ライフル、口径7.62mm、M14は、7.62x51mm NATO弾（.308インチ）を発射するアメリカの選抜射撃ライフルである。1959年にアメリカ軍の標準装備ライフルとなり、1961年までにアメリカ陸軍でM1ガーランドライフルに取って代わった。"
 KOR_infantry_weapons_2_desc: "M16ライフル（正式名称：5.56mm口径ライフル、M16）は、アメリカ軍向けにアーマライトAR-15ライフルを改良した軍用ライフルのシリーズです。オリジナルのM16ライフルは、20発装填の5.56mm口径自動小銃でした。"
 NKO_infantry_weapons_6_desc: "AK-12はロシアの新しいアサルトライフルです。「ラトニク未来歩兵計画」に基づいて開発されました。特殊部隊向けに製造され、AK-103の生産を置き換える予定です。AK-12はバランスと人間工学の改良により、現在ロシアで最も高性能なアサルトライフルとなっています。"
 BLR_infantry_weapons_1_desc: "1959年に開発されたAKMは、ミハイル・カラシニコフが開発したAK-47ライフルの最も一般的な近代化バージョンである。AKMは、その前身よりもはるかに軽量で、自動射撃時の精度が向上している。"
 BLR_infantry_weapons_2_desc: "AK-74はAKMをベースに開発され、前身機種に比べて大幅な改良が施されています。特に注目すべきは、当時の標準であったワルシャワ条約機構加盟国による7.62mm弾ではなく、5.45mm弾を使用する点です。"
 BLR_infantry_weapons_3_desc: "AK-74N は内部的には AK-74 と似ていますが、光学機器用のダブテールマウントが装備されています。"
 BLR_infantry_weapons_4_desc: "1991年、イジェフスク市のイジュマシュ工場は、AK-74の近代化改良型であるAK-74Mの本格生産を開始しました。軽量化されたボルトとキャリアーアセンブリに加え、ガラス繊維を充填したポリアミドストックが採用されました。"
 BLR_infantry_weapons_5_desc: "AK-103アサルトライフルは、7.62x39mm M43弾を使用するAK-74Mの派生型です。旧型のAKMと同様に、103は暗視装置や望遠鏡など、様々な照準装置を装備できます。また、銃剣やグレネードランチャーも装備可能です。多くのAKと異なる点は、103がプラスチック製で安価な素材を使用していることです。"
