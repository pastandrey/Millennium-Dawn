 GUA_infantry_weapons_5_desc: "M4カービンは、M16アサルトライフルの短縮型・軽量型です。M4は、5.56x45mm NATO弾を使用し、空冷式、ダイレクトインピンジメント式、ガス作動式、マガジン給弾式のカービンです。14.5インチ（370mm）の銃身と伸縮式ストックを備えています。"
 BLZ_infantry_weapons_3_desc: "M16A2ライフルの開発は、ベトナム戦争におけるXM16E1およびM16A1の戦闘経験を踏まえ、アメリカ海兵隊から要請されました。1982年に国防総省によって「US Rifle, 5.56mm, M16A2」として正式に採用されました。海兵隊は1980年代初頭から中頃にアメリカ軍で初めてM16A2を採用し、その後1980年代後半にはアメリカ陸軍もこれに続きました。"
