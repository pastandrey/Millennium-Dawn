l_japanese:
 combat_eng_equipment: "戦闘工兵装備"
 combat_eng_equipment_desc: "戦闘工兵は近代の軍で重要な役割であり、常に軍隊または戦闘部隊に組み込まれている。"
 L_Drone_equipment: "ドローン装備"
 L_Drone_equipment_desc: "短距離偵察ドローン（UAVs）はリアルタイムでの偵察や戦場の状況確認を可能とする。また、軽量であるため比較的容易に持ち運び出来る。"
 artillery_equipment: "野戦砲"
 artillery_equipment_desc: "野戦砲は歩兵の小火器の射程と能力を遥かに超えて敵に打撃を与えられる大型兵器である。"
 artillery_desc: "野戦砲は歩兵の小火器の射程と能力を遥かに超えて敵に打撃を与えられる大型兵器である。"
 artillery_0: "1965年型野戦砲"
 artillery_0_desc: "強力な間接射撃能力を備えた野戦砲は、戦場の必要な場所に視覚範囲をはるかに超えて持続的な精密攻撃を提供する。また、乗組員が直接再装填できる。移動には外部車両が必要であるため、攻撃の合間に移動するのが難しく、敵の砲兵の反撃に対して脆弱になる。軽量の小口径の物は手動で運ぶことができ、輸送機内に収まるので空中操作に適している。"
 artillery_1: "1985年型野戦砲"
 artillery_1_desc: "強力な間接射撃能力を備えた野戦砲は、戦場の必要な場所に視覚範囲をはるかに超えて持続的な精密攻撃を提供する。また、乗組員が直接再装填できる。移動には外部車両が必要であるため、攻撃の合間に移動するのが難しく、敵の砲兵の反撃に対して脆弱になる。軽量の小口径の物は手動で運ぶことができ、輸送機内に収まるので空中操作に適している。"
 artillery_2: "2005年型野戦砲"
 artillery_2_desc: "強力な間接射撃能力を備えた野戦砲は、戦場の必要な場所に視覚範囲をはるかに超えて持続的な精密攻撃を提供する。また、乗組員が直接再装填できる。移動には外部車両が必要であるため、攻撃の合間に移動するのが難しく、敵の砲兵の反撃に対して脆弱になる。軽量の小口径の物は手動で運ぶことができ、輸送機内に収まるので空中操作に適している。"
 artillery_3: "2025年型野戦砲"
 artillery_3_desc: "強力な間接射撃能力を備えた野戦砲は、戦場の必要な場所に視覚範囲をはるかに超えて持続的な精密攻撃を提供する。また、乗組員が直接再装填できる。移動には外部車両が必要であるため、攻撃の合間に移動するのが難しく、敵の砲兵の反撃に対して脆弱になる。軽量の小口径の物は手動で運ぶことができ、輸送機内に収まるので空中操作に適している。"
 artillery_4: "2035年型野戦砲"
 artillery_4_desc: "強力な間接射撃能力を備えた野戦砲は、戦場の必要な場所に視覚範囲をはるかに超えて持続的な精密攻撃を提供する。また、乗組員が直接再装填できる。移動には外部車両が必要であるため、攻撃の合間に移動するのが難しく、敵の砲兵の反撃に対して脆弱になる。軽量の小口径の物は手動で運ぶことができ、輸送機内に収まるので空中操作に適している。"
 SP_arty_equipment: "自走砲"
 SP_arty_equipment_desc: "自走砲は、目標に移動するための推進装置を備えた野戦砲である。それらは通常、大型の榴弾砲、野砲、迫撃砲、または何らかの形のロケットまたはミサイル発射装置のいずれかを運ぶ、無限軌道を持つ高機動車両である。"
 SP_arty_0: "1965年型自走砲"
 SP_arty_0_desc: "強力な間接射撃能力とともに、自走砲は戦場においてはるかに目視範囲を超えて必要な持続的で高精度な攻撃を提供する。そしてそれは乗組員が直接再装填することができ、敵の砲撃による反撃を避けるために移動することができる。"
 SP_arty_desc: "自走砲は、目標に移動するための推進装置を備えた野戦砲である。それらは通常、大型の榴弾砲、野砲、迫撃砲、または何らかの形のロケットまたはミサイル発射装置のいずれかを運ぶ、無限軌道を持つ高機動車両である。"
 SP_R_arty_equipment: "多連装ロケットシステム"
 SP_R_arty_0: "1965年型多連装ロケットシステム"
 SP_R_arty_0_desc: "自走式の多連装ロケット砲は、広範囲を覆うほどのロケットを高速で発射できる。それらはしばしば敵の集結地に対して使用される。大規模な破壊により、通常の野戦砲よりも最小交戦範囲が長くなる。また、精度が低いため、精密攻撃には適していない。再装填には専用の支援車両が必要である。"
 SP_arty_1: "1985年型自走砲"
 SP_arty_1_desc: "強力な間接射撃能力とともに、自走砲は戦場においてはるかに目視範囲を超えて必要な持続的で高精度な攻撃を提供する。そしてそれは乗組員が直接再装填することができ、敵の砲撃による反撃を避けるために移動することができる。"
