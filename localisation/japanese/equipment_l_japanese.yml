 Air_UAV1: "2005年型無人航空機"
 Air_UAV1_desc: "無人航空機（UAV）は、一般にドローン、無人航空機システム（UAS）、または他のさまざまな名前で知られ、人間のパイロットが搭乗していない航空機である。UAVの飛行は、人間のオペレーターによる遠隔操作、または搭載されたコンピューターによる完全または断続的な自律操作など、さまざまなレベルの自律性で動作する。"
