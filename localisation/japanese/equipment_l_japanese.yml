 EQUIPMENT_DESCRIPTION: "$NAME$"
 CAN_APC_2_desc: "1974年、カナダ陸軍はスイスの車両モワク・ピラーニャ6x6を選定した。車両の生産は、カナダのゼネラルモーターズ・オブ・カナダの一部門であるディーゼル部門によってライセンス供与された。"
 CAN_APC_3_desc: "In 1988, Diesel Division, a department of General Motors of Canada, was assigned to build a prototype 8x8 wheeled armored vehicle. It was based on the chassis and engine of the Light Armored Vehicle (LAV). The Canadian army requested an order for a modified infantry section carrier version called Bison."
 CAN_APC_4_desc: "Surplus LAV TUA hulls fitted with Nanuck remotely controlled weapon stations to function as infantry section carriers."
 CAN_APC_5_desc: "The final upgrade of the LAV III to LAV 6.0 standards, while maintaining a higher roof line for infantry or cargo transport. The upgrades increased protection including better electronics, IED protection, and addon armour while maintaining a machine gun armed Protector remotely controlled weapon station."
 CAN_MBT_1: "センチュリオン"
 CAN_MBT_1_short: "センチュリオン"
 CAN_MBT_1_desc: "When it first came out, the Centurion's design was revolutionary in pioneering the model for early main battle tanks. Designed and produced at the closing stages of the Second World War, the Centurion only saw service in the post-war periods but it quickly became the West's answer to the Soviet's T-54 tanks. Until the early 1970s, the Centurion tanks formed the bulk of the Canadian tank force."
 CAN_MBT_2: "レオパルト C1"
 CAN_MBT_2_desc: "Canada acquired the German Leopard main battle tank in 1978. 127 were bought in total, 114 of which were \"Canadianized\" with specific local requirements, based on the Leopard 1A3 standard."
 CAN_MBT_2_short: "レオパルト C1"
 CAN_MBT_3: "レオパルト C2"
 CAN_MBT_3_desc: "An upgraded version of the Leopard C1. These were upgraded generally to Leopard 1A5 standard. A troop was further upgraded with add-on armour and sent to Kosovo in 1999, while in 2006 a squardon was upgraded with MEXAS appliqué modular armour and spall liners, for use in Afghanistan."
 CAN_MBT_3_short: "レオパルト C2"
 CAN_MBT_4: "レオパルト 2A4M CAN"
 CAN_MBT_4_desc: "The Leopard 2A4M CAN is the upgraded Canadian version of the Leopard 2A4. The tank is a re-conditioned Leopard 2A4 fitted with the “M” Mine armor package and other additional upgrades. It was successfully deployed to support ISAF Forces during the Afghanistan War. The protection of the Leopard 2A4M CAN has been further augmented with the addition of appliqué armour resembling that found on the recent Leopard 2A7+ variant, but modified to fit the turret configuration of the 2A4 as it retains the Rheinmetall 120 mm L/44 smoothbore gun of the base A4 variant."
 CAN_MBT_4_short: "レオパルト 2A4M CAN"
 CAN_MBT_5: "レオパルト 2A6M CAN"
 CAN_MBT_5_desc: "レオパルト2A6M CAN戦車は、レオパルト2A6戦車のカナダ版である。重要な改造点としては、地雷防護用ベリーアーマーが追加され、これにより戦車に「M」の呼称が与えられたこと、砲塔後部に取り付けられた特徴的な黄褐色の箱には、カナダ軍指定の通信機器と「T」アンテナスタンドを含む対IED（即席爆発装置）妨害装置が収められていること、そしてスタンドオフスラットアーマーがある。"
 CAN_MBT_5_short: "レオパルト 2A6M CAN"
 CAN_IFV_1: "CTL ボブキャット"
 CAN_IFV_1_desc: "The Bobcat project begun in 1952 as a logical development to replace the wartime Ram Kangaroo APC and correct for the faults of that converted tank. Amendments to the concept proceeded over the next four years as the concept swung between an amphibious fully armored carrier and a modernized replacement for the Universal Carrier."
 CAN_IFV_1_short: "CTL ボブキャット"
 CAN_IFV_2: "グリズリー AVGP"
 CAN_IFV_2_desc: "1974年、カナダ陸軍はスイスの車両モワク・ピラーニャ6x6を選定した。車両の生産は、カナダのゼネラルモーターズ・オブ・カナダの一部門であるディーゼル部門によってライセンス供与された。グリズリーバリアントはキャデラック・ゲージ1m砲塔を使用した。"
 CAN_IFV_2_short: "グリズリー AVGP"
 CAN_IFV_3_short: "LAV-III コディアック"
 CAN_IFV_4_desc: "LAV運用要件統合タスク（LORIT）の下で実施された、LAV IIIの新しい砲塔と電子機器、強化されたIED防護、及び追加装甲を備えたアップグレード版。"
 CAN_IFV_5: "LAV-6 IFV"
 CAN_IFV_5_desc: "LAV IIIをLAV 6.0標準に最終アップグレードしたもの。アップグレードにより、新しい砲塔、より優れた電子機器、強化されたIED防護、及び追加装甲など防護力が向上し、同時に元のLAV IIIと同様の25mmチェーンガンと同軸GPMGで武装した砲塔を利用している。"
 CAN_IFV_5_short: "LAV-6 IFV"
 CAN_Rec_tank_3: "LAV-II コヨーテ"
 CAN_Rec_tank_3_short: "LAV-II コヨーテ"
 CAN_util_vehicle_1: "M38A1 CDN"
 CAN_util_vehicle_3: "LSVW"
 CAN_util_vehicle_4: "LUVW SMP"
 CAN_util_vehicle_5: "RG-31 ニアラ"
 CAN_util_vehicle_6: "セネター APC"
 CAN_util_vehicle_7: "Senator APC NG"
