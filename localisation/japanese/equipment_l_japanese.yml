 ITA_infantry_weapons_1_desc: "BM59は、1959年にイタリアで開発された自動小銃である。M1ガーランドライフルをベースに、7.62x51mm NATO弾を使用し、着脱式弾倉を使用するように改造され、セレクティブファイアが可能である。後の改訂版では、より近代的なライフルに共通する他の機能が組み込まれた。"
