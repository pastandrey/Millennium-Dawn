 CZE_Anti_tank_0_desc: "チェコ初の対戦車誘導ミサイルである。MCLOS誘導方式を採用し、射程3kmで最大400mmの装甲を貫通、速度は130m/sである。この遅い速度は、目標に命中する前に、より精密な誘導と長い反応時間を可能にするために意図的に用いられている。"
 CZE_Anti_tank_1: "RPTZ-84"
 CZE_Anti_tank_1_desc: "共和国で生産された対戦車誘導ミサイルである。SACLOS誘導方式を採用し、射程3kmで最大400mmの装甲を貫通、速度は350m/sである。これは国家の敵の装甲における最新の進歩への対応であった。"
 CZE_Anti_tank_2: "RPTZ-96"
 CZE_Anti_tank_2_desc: "Raketová Protitanková Zbraň 96はロケット対戦車兵器96型を意味する。我が国チェコ独自のF&F（撃ちっ放し）設計の最初の試作品である。最終的に、このプロジェクトは、時には自走砲と家屋を取り違えるかなり信頼性の低い撃ちっ放しソフトウェアと、非常に精密なSACLOSシステムとの間でモードを切り替えることができる兵器をもたらした。"
 CZE_Anti_tank_3: "PTŘS-101"
 CZE_Anti_tank_3_desc: "ATGM-101を意味する。最初の試作品からわずか5つの試作品で実現した、最初の信頼性の高いF&F設計である。また、新たに出現したアクティブ防護システム（APS）の脅威に対抗するために前駆ミサイルも使用する。そのアイデアは外国の設計とは異なり、最初に発射される弾頭は依然として戦車の外部や砲塔上部のセンサーを破片で攻撃するための爆薬が詰められており、2番目の弾頭が貫通タンデム弾頭となっている。"
 CZE_Anti_tank_4: "PTŘS-109 パンシル"
 CZE_Anti_tank_4_desc: "ATGM-109を意味する。前駆ミサイル（そう、2つの前駆弾頭と1つの実弾頭）を利用する第2世代タンデムATGM設計であり、2500mm RHAの貫通力を持つタンデム弾頭の前にAPSシステムに命中する。弾頭は500m/sの速度を持ち、3kmの距離でも敵のAPSと乗員にほとんど反応時間を与えない。この移動式兵器システムをいくつか組み合わせることで、圧倒的な数のATGMであらゆる戦車を破壊することができる。"
 CZE_Anti_Air_0: "PLŘS-KD vz. 2 ストリェラ"
 CZE_Anti_Air_0_desc: "第2世代の地対空ミサイルである。射程は10kmと短い。その名称ストリェラはミサイルを意味する。vz. 2は赤外線ホーミングミサイルであり、容易に回避される可能性があるが、その一方で試験場の目標に対しては高い信頼性を示した。"
 CZE_Anti_Air_1: "PLŘS-MD vz. 3 リフリーク"
 CZE_Anti_Air_1_desc: "我が社の製造した第2世代中距離地対空ミサイルである。第2世代ファミリーであるvz.2短距離、vz.3中距離、vz.4長距離ミサイルの一部である。マッハ2で飛行するセミアクティブレーダー誘導ミサイルであり、事前にミサイルを検知していないことを期待して編隊飛行する攻撃戦闘機を狙った大型破片弾頭を搭載している。"
 CZE_Anti_Air_2: "PLŘS-SD vz. 5 イェフラ"
 CZE_Anti_Air_2_desc: "第3世代の地対空ミサイルである。弾頭シーカー内にアクティブレーダーを搭載した短距離ミサイルである。第3世代ファミリーには、vz. 6 AMRSAM、vz. 7 LRSAM、vz. 8 ALRSAMも含まれる。このミサイルは最大16Gの機動が可能で、静止位置から発射された場合はマッハ2まで飛行する。航空機用のバージョンも作られ、マッハ3.5で30km先の目標を破壊することができる。"
 CZE_Anti_Air_3: "PLŘŠ-KD vz. 13 フロズニーシュ"
 CZE_Anti_Air_3_desc: "チェコ製第5世代短距離SAMである。設計はパッシブレーダーと赤外線シーカーを備え、外部接続がないため妨害を受けやすい。終末誘導では、ミサイル揚力体の大部分を利用してマッハ3で14Gの機動が可能だが、ミサイル自体はマッハ4、高さ5kmから発射された場合はマッハ4.5が可能である。ミサイルコンピュータは目標速度を認識し、より良い旋回半径を得るために減速することができる。航空機からの射程は150kmである。"
 CZE_Anti_Air_4: "PLŘS-MD vz. 25 ズミイェ"
 CZE_Anti_Air_4_desc: "このミサイルは最新技術とハードウェアを利用して、敵の最もステルス性の高い航空機でさえも命中させる。ステルス機でさえ可視スペクトルではステルスではないため、ミサイルをあらゆるステルス機に誘導する衛星リンクが含まれている。"
 CZE_MBT_1: "T-54AR リェカ"
 CZE_MBT_1_desc: "ソ連製T-55をベースに開発されたチェコ戦車である。車体からソフトウェアの最後の部分に至るまで徹底的に見直され、戦車の潜在能力を指数関数的に向上させた。クラディヴォと呼ばれる新しい射撃管制システムは、戦車の精度を6倍に向上させた。これにより、この戦車は依然として新型戦車に匹敵する性能を持つ。"
 CZE_MBT_2: "T-72M1"
 CZE_MBT_2_desc: "T-72の第2次近代化計画で、安定化装置と射撃管制システムが改良された。また、新しい主砲と追加装甲も装備された。"
 CZE_MBT_3: "T-72M4 CZモデル"
 CZE_MBT_3_short: "T-72M4CZ"
 CZE_MBT_3_desc: "T-72M1の第5次チェコ近代化改修であり、戦車を戦場環境における最新基準に引き上げ、全てのソフトウェア、ハードウェアを改良し、新型の反応装甲DYNAを追加した。この戦車はT-72の潜在能力の限界にある。"
 CZE_MBT_4: "T-8 オハルシュ"
 CZE_MBT_4_desc: "VOPノヴィー・イチーン社によって開発された新しい車体をベースにした戦車である。反応性部品を備えた新しい複合装甲と、車体内に乗員室を配置し砲塔に自動装填装置を備えた革新的な戦車内装を特徴とする。この戦車はまた、自動変速機、レーザー照射およびATGM用の新しいセンサー、新しい補助動力装置も備えている。"
 CZE_MBT_5: "T-15 オタカル"
 CZE_MBT_5_desc: "我が国の戦車乗員が新たに得た戦闘経験により、過去の技術からさらに一歩進んだこの戦車は、経験豊富な乗員によって指摘された多くの小さな改良点が小型化された車体内に施されている。この戦車は運転手兼車長と砲手兼装填手として機能するわずか2名の兵士によって運用される。この戦車は、無線手や他の乗員を削減する内外通信システムを備えている。チェコ製のデシュトニークと呼ばれるアクティブ防護システムが、360°の範囲を持つ砲塔に設置されている。"
 CZE_MBT_7: "T-25 オスカー"
 CZE_MBT_7_desc: "モジュール式装甲システムにより装甲配置が改良された。装甲を外した状態では非常に高速に移動でき、降車時に装甲が追加される。このシステムはまた、整備と修理を容易にする。この戦車は、タンデム弾頭と通常弾頭に対処するために二重構成で搭載されたシュティートと呼ばれる新しいアクティブ防護システムを特徴とする。それらの間に少なくとも0.5秒あれば最大3発、同時に2発の飛来ミサイルを破壊することができる。"
 CZE_MBT_8: "T-35 オリョール"
 CZE_MBT_8_desc: "T-25/T-35シリーズとT-72近代化改修の経験から、T-35オレルは第二次世界大戦前の絶頂期以来、灰の中から蘇ったチェコ産業独自の製品として設計された。電気装甲や4チャンネルAPSなどのモジュール式部品で構成された戦車は、あらゆる脅威に対処することができる。砲塔には、戦車用原子炉を利用して注入されたプラズマを加熱し、敵戦車に加速させる指向性エネルギー兵器が搭載されている。原子炉はまた、戦車に必要な動力を供給する。"
 CZE_APC_1: "OT-64 スコット"
 CZE_APC_1_desc: "Obrněný Transportér 64、または装甲兵員輸送車64は、乗員2名を含む20名の兵士を戦闘に輸送することができ、オプションで重機関銃を装備している。機関銃なしのバージョンは、個人兵器用のスペースと弾薬用の貨物スペースがより多く確保されている。"
 CZE_APC_2: "OT-90"
 CZE_APC_2_desc: "OT-90はOT-64の後継であり、装甲の保護下で兵員を戦闘に輸送し、機関砲または重機関銃を装備している。BVP-1の車体から、車体を改造し、砲塔をなしにするか小型のものに交換することによって開発された。"
 CZE_APC_3: "OT-90M"
 CZE_APC_3_desc: "OT-90の老朽化に対応するため、第2次近代化計画が実施された。車両は再び基本的に一から再建された。兵装は最新の重機関銃に交換され、車両の機械部品は新しく発明された軽量なものに交換された。重い無線機材も現代のコンピュータに置き換えられ、車両は路上でも路外でもより高速になった。"
 CZE_APC_4: "OT-105 ホウセンカ"
 CZE_APC_4_desc: "統合兵器システム「ホウセンカ」は、軍のあらゆるニーズを満たすために、多くの派生型で1つの車体を利用している。対空ロケット砲やATGM運搬車として使用される。APCとしては、遠隔操作式HMG1基と16人分の乗員席を装備している。"
 CZE_APC_5: "OT-105M2"
 CZE_APC_5_desc: "絶えず変化する世界で車両の価値を維持するためにホウセンカの近代化が必要と見なされた。HMGは時限信管弾を装備できる新しいものに交換された。車両のソフトウェアはバージョン4.5に更新され、多くの変更と、壁や遮蔽物の背後にいる敵に対処するための時限信管を使用する機能も備えている。"
 CZE_APC_6: "OT-121 トパーズ"
 CZE_APC_6_desc: "ホウセンカUWSの後継であるUWSトパーズは、モジュール式装甲と部品を利用している。APCバージョンは最も低い防護力の装甲パッケージAを装備しているが、それでも様々なRPGや軽ATGMの貫通を防ぐのに十分である。装甲は複合部品と車両周囲のケージで強化されている。"
 CZE_APC_7: "OT-133 ヴァヴルジーン"
 CZE_APC_7_desc: "UWSヴァヴルジーンは、乗員と乗客の安全を確保するために最新のアクティブ防護システムを利用している。車両はまた、赤外線シグネチャーを低減する熱遮断装置を装備している。車両は通常燃料またはバイオマスで走行可能なハイブリッドエンジンを使用しており、いくつかの（多数の）木を供給することで補給なしで長期間活動することができる。"
 CZE_APC_8: "OT-136 レクニーン"
 CZE_APC_8_desc: "UWSレクニーンはUWSヴァヴルジーンの後継である。主攻撃・防御兵器としてレーザーの固体指向性エネルギー兵器、そして対人HMGを装備している。レーザーは高速移動するATGMを飛行中に命中させ、その誘導装置を破壊または妨害することができる。レーザーが故障した場合、車両は車両の両側に1つずつ、デュアルAPSシュティートを備えている。ただし、これは戦車砲弾から車両を保護するものではない。"
 CZE_IFV_1: "BVP-1"
 CZE_IFV_1_desc: "BVPはBojové vozidlo pěchoty、装甲歩兵戦闘車（AIFV）の略である。主に兵員輸送に使用され、時には攻撃作戦で部隊を展開し、軽装甲目標に対して機関砲で、または対人弾薬で支援する。乗客8名を運ぶ。"
 CZE_IFV_2: "BVP-1K"
 CZE_IFV_2_desc: "ATGMミサイルと新しい通信・計算装置を装備したBVP-1のアップグレード版である。車両はまた、軽量な新しい無線・通信装置と新しいエンジンを特徴とする。"
 CZE_IFV_3: "BVP-2"
 CZE_IFV_3_desc: "新しい車体、新しい機関砲、新しいATGM。BVP-2はまた、より強力な装甲とより高度な電子機器を備えている。BVP-1からかなりの進歩である。乗員3名と乗客3名を運ぶ。"
 CZE_IFV_4: "BVP スニェシュカ"
 CZE_IFV_4_desc: "BVPスニェシュカは、最新の電子機器と技術で大幅に改造されたBVP-2である。"
 CZE_IFV_5: "KBVP パンドゥール II"
 CZE_IFV_5_desc: "オーストリアから購入し、チェコ共和国で分解されたパンドゥールII。その後、一から開発・生産されたこの統合兵器システムには、ATGM運搬車、通信車両、指揮車両、APC、IFV、その他のAFVが含まれる。SPIKE-LR ATGMを使用。"
 CZE_IFV_5_short: "KBVP"
 CZE_IFV_6: "KBVP M1 パンドゥール II"
 CZE_IFV_6_desc: "パンドゥールIIのチェコ製アップグレードであり、この近代化改修では主にRPGに対するケージ装甲の追加により防御能力が向上している。また、粉塵や砂塵環境制御とその信頼性のための改良されたフィルターとエアメカニクスも備えている。SPIKE-LR ATGMを使用。"
 CZE_IFV_6_short: "KBVP M1"
 CZE_IFV_7: "KBVP コマール"
 CZE_IFV_7_desc: "KBVPはKolové bojové vozidlo pěchoty、装輪AIFVの略である。モジュール式装甲パッケージBシステムを利用したOT-133のより重装甲で装備の充実したバージョンとして使用される。その砲塔には相互交換可能な2つのバージョンがある。"
 CZE_IFV_8: "KBVP ヴァシュカ"
 CZE_IFV_8_desc: "KBVPヴァシュカは、OT-136の全ての機能を備えたバージョンとして開発されたが、歩兵収容能力が低く、また装甲パッケージBを使用したより重い兵装と防護力を備えている。OT-136と同じレーザーを使用し、より強力なAPUがそれをサポートしている。"
 CZE_Rec_tank_0: "BPzV スヴァタヴァ"
 CZE_Rec_tank_0_desc: "増幅された光学機器とセンサー装置を備えたBVP-1の偵察バージョンである。"
 CZE_Rec_tank_1: "LOS"
 CZE_Rec_tank_1_desc: "偵察仕様のOT-90。装備のアップグレードやC2Iデバイスなど、偵察技術の進歩が見られる。"
 CZE_Rec_tank_2: "KBVP-PZ パンドゥール II"
 CZE_Rec_tank_2_desc: "偵察仕様のパンドゥール II"
 CZE_Rec_tank_3: "KBVP-PZ M1 パンドゥール II"
 CZE_Rec_tank_3_desc: "偵察仕様のパンドゥール II M1"
 CZE_Rec_tank_4: "KBVP-PZ コマール"
 CZE_Rec_tank_4_desc: "コマールの偵察バージョンである。"
 CZE_Rec_tank_5: "BVP-PZ ヴァシュカ"
 CZE_Rec_tank_5_desc: "ヴァシュカの偵察バージョンである。"
 CZE_Heavy_Anti_tank_0: "BRDM-1-ST"
 CZE_Heavy_Anti_tank_0_desc: "国内生産されたソ連製ATGM運搬車である。"
 CZE_Heavy_Anti_tank_1: "BRDM-2-ST"
 CZE_Heavy_Anti_tank_1_desc: "アップグレードされたシステムを備えた国内生産の第2世代BRDM ATGM運搬車である。"
 CZE_Heavy_Anti_tank_2: "KBVP-ST パンドゥール II"
 CZE_Heavy_Anti_tank_2_short: "KBVP-ST"
 CZE_Heavy_Anti_tank_2_desc: "オーストリアからライセンス購入し、チェコ共和国で組み立てられたパンドゥールII。この統合兵器システムには、ATGM運搬車、通信車両、指揮車両、APC、IFV、その他のAFVが含まれる。SPIKE-LR ATGMを使用。"
 CZE_Heavy_Anti_tank_3: "KBVP-ST MS パンドゥール II"
 CZE_Heavy_Anti_tank_3_short: "KBVP-ST MS"
 CZE_Heavy_Anti_tank_3_desc: "Czech-made upgrades on the Pandur II making upgrades into the Modernization 2 modification improving its defence and dust or sand environmental reliability and control. Using SPIKE-LR ATGMs."
 CZE_Heavy_Anti_tank_4: "KBVP-ST コマール"
 CZE_Heavy_Anti_tank_4_desc: "Based from KBVP Komár, equipped with PTŘS-109 Pancíř."
 CZE_SP_Anti_Air_0: "PLRK ストリェラ-1M"
 CZE_SP_Anti_Air_0_desc: "Fast wheeled SAM vehicle with small or medium range missiles."
 CZE_SP_Anti_Air_1: "PLRK Osa"
 CZE_SP_Anti_Air_1_desc: "Fast wheeled SAM vehicle with medium range missiles."
 CZE_SP_Anti_Air_2: "PLRK-121 イェフラ"
 CZE_SP_Anti_Air_2_desc: "Based from OT-121 Unified Weapon System equipped with latest SAM missiles PLŘS vz. 13, 14 or 15 Hroznýš."
 CZE_SP_Anti_Air_3: "PLRK-133 フロズニーシュ"
 CZE_SP_Anti_Air_3_desc: "Based from OT-133 Unified Weapon System equipped with latest SAM missiles PLŘS vz. 16, 17, 18 or 19 Chřestýš."
 CZE_SP_Anti_Air_4: "PLRK-136 ズミイェ"
 CZE_SP_Anti_Air_4_desc: "Based from OT-136 Unified Weapon System equipped with latest SAM missiles PLŘS vz. 25,26,27 or 28 Zmije."
 CZE_SP_R_arty_0: "RM-51"
 CZE_SP_R_arty_0_desc: "ソ連の多連装ロケットシステム（MLRS）と第二次世界大戦で使用されたカチューシャの原型を基に設計された。32発のロケット弾を搭載し、8kmの射程を持つ。"
 CZE_SP_R_arty_1: "RM-70 グラート"
 CZE_SP_R_arty_1_desc: "Successor to the RM-51 utilizing new chassis and targeting systems extending range to 20km with its 40 rockets."
 CZE_SP_R_arty_2: "RM-71 ヴァンパイア"
 CZE_SP_R_arty_2_desc: "Successor to the RM-70 has new armored cabin for crew and guided artillery shells able to strike targets 100km from the vehicle."
 CZE_SP_R_arty_3: "RM-94 モンズーン"
 CZE_SP_R_arty_3_desc: "The new generation of MLRS has been developed into the RM-94. It features better communication and radio equipment and its shells has been replaced with new smart ammunition guided by many systems including GPS or Galileo."
 CZE_SP_R_arty_4: "RM-96 タイフーン"
 CZE_SP_R_arty_4_desc: "RM96 is the masterpiece of artillery. 42 independent enemy targets struck at the same time with precision from 300km away vehicle manned from any position on Earth."
 CZE_SP_arty_0: "ShM vz. 85 PRÁM-S"
 CZE_SP_arty_0_desc: "This BVP-2 converted into mortar carrier is useful close-range support when our fellow soldiers gets under fire."
 CZE_SP_arty_1: "ShKH vz. 77 DANA"
 CZE_SP_arty_1_desc: "Widely exported artillery DANA has very mobile wheeled chassis and advanced targeting computers allowing high precision of fire and relocation."
 CZE_SP_arty_2: "ShKH vz. 77 ダナ M2"
 CZE_SP_arty_2_desc: "DANAの近代化により、最新の基準と技術にアップグレードされ、新しい弾薬タイプが導入されました。新しい車輪軸とエンジン、そして新しい射撃管制・通信システムを搭載し、より高度な戦術的・戦略的資産への射撃と通信のより正確な調整が可能になりました。"
 CZE_SP_arty_3: "ShKH vz. 105 カトカ"
 CZE_SP_arty_3_desc: "DANAの後継機であるKATKA砲は、前任機の高い機動性を基盤としつつ、あらゆる軍事資産との高度な相互接続性を実現し、天候などの状況、位置、動きをリアルタイムで計算することで、より精密な攻撃を可能にします。長砲身とガスベントを備えた新型砲を搭載しています。"
 CZE_SP_arty_4: "ShKH vz. 109 バラ"
 CZE_SP_arty_4_desc: "Bára is the masterpiece of the engineering. It is prone to counter-artillery fire loses due to remote control and fast off-road speeds, but also high ammunition stores for longevity of its fire and resupplying."
 CZE_artillery_0: "122mm vz. 38/74榴弾砲"
