 ALB_infantry_weapons_2: "ASh-82"
 ARM_infantry_weapons_2: "AK-74"
 ARM_infantry_weapons_2_desc: "AK-74はAKMをベースに開発され、前身機種に比べて大幅な改良が施されています。特に注目すべきは、当時の標準であったワルシャワ条約機構加盟国による7.62mm弾ではなく、5.45mm弾を使用する点です。"
 ARM_infantry_weapons_3: "K6-92 BORZ"
 ARM_infantry_weapons_3_desc: "The K6-92 submachine gun was developed in Armenia, which, after gaining independence in 1991, was actually in a state of armed conflict with Azerbaijan over Nagorno-Karabakh. The Armenian armed formations acutely felt the shortage of small arms, the need for which prompted Armenian engineers in 1991-92 to create a relatively simple K6-92 submachine gun."
 ARM_infantry_weapons_4: "VAHAN"
 ARM_infantry_weapons_4_desc: "The Vahan was developed on the basis of an experimental 7.62x39 mm assault rifle (sometimes called the MBK-2) designed by Manasyan while serving in the Soviet army. The automatic weapon works on the principle of a semi-free shutter, which makes it possible to simplify the design for semi-handicraft production."
 ARM_infantry_weapons_5: "K-3"
 ARM_infantry_weapons_5_desc: "K-3 is an Armenian bullpup assault rifle developed in the mid-1990s on the basis of the Soviet AK-74 assault rifle, with the possibility of automatic and semi-automatic fire, as well as fire from an underbarrel grenade launcher. Developed by the department of the military industry under the Ministry of Defense of Armenia. Produced in small series."
 ARM_infantry_weapons_6: "AS-300"
 ARM_infantry_weapons_6_desc: "Presented in Armenia at the Ardzagank 2013 military command and staff exercises in October 2013, the AS-300 assault rifle is designed to use 7.62 x 35 mm cartridges and has a similar silencer. The assault rifle has a 30-round box magazine, a different butt design, and a vertical front grip. Gas automatics provides a rate of fire of up to 500 rounds per minute. Trigger mechanism of the trigger type, fire mode - single and automatic. The production of the AS-300 uses a bolt mechanism from a Kalashnikov assault rifle, although a new barrel, stock and other parts are installed."
 ARM_infantry_weapons_7: "ASR-545"
 ARM_infantry_weapons_7_desc: "Presented in Armenia at the Ardzagank 2013 military command and staff exercises in October 2013, the ASR-545 rifle has gas-operated automatics. The rifle is designed to conduct accurate silent fire from hidden positions to destroy enemy manpower and lightly armored vehicles (armor-piercing cartridges of our own production are used for the latter). The rifles are equipped with Picatinny rails for optical and collimator sights, as well as other devices. The rifle uses a 5.45x39 mm cartridge with a subsonic bullet."
 ARM_infantry_weapons_8: "RDL-34"
 ARM_infantry_weapons_8_desc: "The latest development of ASPAR Arms, created on the basis of ar-15, uses magazines and caliber cartridges from a Kalashnikov assault rifle, while having a fairly reliable design that is not inferior to its counterparts."
