 CAN_CV_MR_Fighter2_desc: "マクドネル・ダグラス F/A-18 ホーネットは全天候型超音速の双発機かつ空母運用能力を持つ多用途戦闘機であり、戦闘機及び攻撃機として設計された（F/Aの名称の由来）。設計はマクドネル・ダグラス（現ボーイング）とノースロップによって行われ、1970年代に試作機であるYF-17から派生して、アメリカ海軍と海兵隊で運用され始めた。"
