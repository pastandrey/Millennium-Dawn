 medium_tank_chassis: "主力戦車"
 medium_tank_chassis_desc: "主力戦車（MBT）、または戦闘戦車、汎用戦車としても知られ、多くの近代軍隊において装甲で防護された直接射撃と機動の役割を担う戦車である。"
 medium_tank_artillery_chassis: "自走砲"
 medium_tank_artillery_chassis_desc: "自走砲は、目標に向かって移動するための独自の推進システムを備えた砲兵である。これらは高い機動性を持つ車両で、通常は無限軌道を基にしており、大型榴弾砲、野砲、迫撃砲、あるいは何らかの形のロケットまたはミサイルランチャーを搭載している。"
 medium_tank_rocket_chassis: "多連装ロケットシステム"
 medium_tank_rocket_chassis_desc: "自走式MLRSは、目標に向かって移動するための独自の推進システムを備えた砲兵システムである。これらは高い機動性を持つ車両で、通常は無限軌道を基にしているが、壊滅的な間接射撃のためのロケットランチャーを搭載した装輪車両も見られる。"
 medium_tank_amphibious_chassis: "装甲兵員輸送車"
 medium_tank_amphibious_chassis_desc: "装甲兵員輸送車（APC）は、戦闘地帯で人員と装備を輸送するために設計された装甲軍用車両の広範なタイプである。第一次世界大戦以来、APCは世界中で非常に一般的な軍事装備となっている。"
 medium_tank_flame_chassis: "歩兵戦闘車"
 medium_tank_flame_chassis_desc: "歩兵戦闘車（IFV）、または機械化歩兵戦闘車（MICV）としても知られ、歩兵を戦闘に投入し、直接射撃支援を提供するために使用される装甲戦闘車両の一種である。"
 medium_tank_destroyer_chassis: "軽戦車"
 medium_tank_destroyer_chassis_desc: "装甲偵察は、戦車や装輪または装軌式の装甲偵察車両を使用する兵士による、地上偵察と装甲戦の組み合わせである。"
 medium_tank_aa_chassis: "自走対空砲"
 medium_tank_aa_chassis_desc: "対空車両、または自走対空砲（SPAAG）、自走防空システム（SPAD）としても知られ、専用の対空能力を持つ移動車両である。"
 heavy_tank_chassis: "攻撃ヘリコプター"
 heavy_tank_chassis_desc: "攻撃ヘリコプターは、敵の歩兵や装甲戦闘車両などの地上目標を攻撃する能力を持つ、攻撃機を主たる役割とする武装ヘリコプターである。重武装のため、ヘリコプターガンシップと呼ばれることもある。"
