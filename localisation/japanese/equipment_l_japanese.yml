 util_vehicle_type: "汎用車両"
 util_vehicle_type_desc: "一般的には動力付きで、汎用車両よりも効率的に特定の作業を実行するように設計された実用車両。"
 util_vehicle_8: "2035年型汎用車両"
 util_vehicle_8_desc: "多用途車両は、機械化歩兵部隊が戦場への輸送手段として用いる車両です。初期世代のモデルであるジープやトラックは、実質的に非装甲で、民間車両との大きな違いは、より頑丈で困難な地形での機動性が高いことです。後期世代のモデルは、より優れた装甲を備えたハンヴィーのような車両や、乗員保護がさらに強化された対地雷車両を特徴としています。車両に武装が搭載されている場合でも、通常は機関銃などの軽火器です。"
 attack_helicopter_1: "1965年型攻撃ヘリコプター"
 attack_helicopter_1_desc: "攻撃ヘリコプターは、攻撃兵器を搭載した軍用ヘリコプターです。主な武装は、速射機関火器（機関砲および機関銃）、ロケットランチャー、精密誘導兵器（ミサイル）です。多くの攻撃ヘリコプターは対空ミサイルも搭載可能ですが、主に自衛目的で使用されます。今日の攻撃ヘリコプターは、固定翼攻撃機と機能的に類似しており、歩兵、装甲車両、建物などの地上目標を攻撃するために特別に設計されています。"
 attack_helicopter_2: "1985年型攻撃ヘリコプター"
 attack_helicopter_2_desc: "攻撃ヘリコプターは、攻撃兵器を搭載した軍用ヘリコプターです。主な武装は、速射機関火器（機関砲および機関銃）、ロケットランチャー、精密誘導兵器（ミサイル）です。多くの攻撃ヘリコプターは対空ミサイルも搭載可能ですが、主に自衛目的で使用されます。今日の攻撃ヘリコプターは、固定翼攻撃機と機能的に類似しており、歩兵、装甲車両、建物などの地上目標を攻撃するために特別に設計されています。"
 attack_helicopter_3: "2005年型攻撃ヘリコプター"
