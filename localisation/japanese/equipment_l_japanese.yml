 USA_infantry_weapons_2: "M16A1"
 USA_infantry_weapons_2_desc: "M16ライフル（正式名称：5.56mm口径ライフル、M16）は、アメリカ軍向けにアーマライトAR-15ライフルを改良した軍用ライフルのシリーズです。オリジナルのM16ライフルは、20発装填の5.56mm口径自動小銃でした。"
 USA_infantry_weapons_3: "M16A2"
 USA_infantry_weapons_3_desc: "M16A2ライフルの開発は、ベトナム戦争におけるXM16E1およびM16A1の戦闘経験を踏まえ、アメリカ海兵隊から要請されました。1982年に国防総省によって「US Rifle, 5.56mm, M16A2」として正式に採用されました。海兵隊は1980年代初頭から中頃にアメリカ軍で初めてM16A2を採用し、その後1980年代後半にはアメリカ陸軍もこれに続きました。"
 USA_infantry_weapons_4: "M16A4"
 USA_infantry_weapons_4_desc: "M16A4はM16シリーズの第4世代です。取り外し可能なキャリングハンドルと、光学機器やその他の補助装置を取り付けるためのフルレングスのクアッドピカティニーレールを備えています。セーフ/セミ/バーストのセレクティブファイアを採用したFN M16A4は、アメリカ海兵隊の標準装備となりました。軍用ライフルにはナイツ・アーマメント社製のM5 RASハンドガードも装備されており、垂直グリップ、レーザー、タクティカルライトなどのアクセサリーを取り付けることができます。このことから、アメリカ陸軍の野戦教範ではM16A4 MWS（モジュラー・ウェポン・システム）という名称が付けられています。"
 USA_infantry_weapons_5: "M4A1"
 USA_infantry_weapons_5_desc: "M4カービンは、M16アサルトライフルの短縮型・軽量型です。M4は、5.56x45mm NATO弾を使用し、空冷式、ダイレクトインピンジメント式、ガス作動式、マガジン給弾式のカービンです。14.5インチ（370mm）の銃身と伸縮式ストックを備えています。"
 USA_infantry_weapons_7: "M7 スピア"
 USA_infantry_weapons_7_desc: "最先端の素材と高度な弾道コンピューターを組み込んだ革新的な新デザイン。"
 USA_infantry_weapons_6: "M27 IAR"
 USA_infantry_weapons_6_desc: ""
 USA_infantry_weapons_8: "タイタン APPL"
 USA_infantry_weapons_8_desc: "この兵器プラットフォームは、M4システムと同様のアメリカ製の信頼性を備えつつ、21世紀に全く新しい技術を採用しています。ケースレス弾薬の使用により軽量化を実現しているだけでなく、小型磁気加速装置も活用することで、初期の携帯型ハイブリッドレールガンとしての役割も担っています。"
