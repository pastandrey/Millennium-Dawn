 KUR_infantry_weapons_5_desc: "M4カービンは、M16アサルトライフルの短縮型・軽量型です。M4は、5.56x45mm NATO弾を使用し、空冷式、ダイレクトインピンジメント式、ガス作動式、マガジン給弾式のカービンです。14.5インチ（370mm）の銃身と伸縮式ストックを備えています。"
 ROJ_infantry_weapons_1_desc: "1959年に開発されたAKMは、ミハイル・カラシニコフが開発したAK-47ライフルの最も一般的な近代化バージョンである。AKMは、その前身よりもはるかに軽量で、自動射撃時の精度が向上している。"
 ROJ_infantry_weapons_2_desc: "G3A3はG3の中で最もよく知られているバージョンです。改良されたフロントサイトと新たに改良されたリアドラムサイト、フラッシュサプレッサー/マズルブレーキ、固定式の頑丈なプラスチック製バットストック、そしてフリーフローティングバレルに接触しないプラスチック製ハンドガードを備えています。ハンドガードはスリムでベンチレーション機能を備えたバージョンとワイドバージョンがあり、後者はバイポッドを装着することで安定性が向上します。"
 ROJ_infantry_weapons_3_desc: "M16A2ライフルの開発は、ベトナム戦争におけるXM16E1およびM16A1の戦闘経験を踏まえ、アメリカ海兵隊から要請されました。1982年に国防総省によって「US Rifle, 5.56mm, M16A2」として正式に採用されました。海兵隊は1980年代初頭から中頃にアメリカ軍で初めてM16A2を採用し、その後1980年代後半にはアメリカ陸軍もこれに続きました。"
 ROJ_infantry_weapons_4_desc: "M16A4はM16シリーズの第4世代です。取り外し可能なキャリングハンドルと、光学機器やその他の補助装置を取り付けるためのフルレングスのクアッドピカティニーレールを備えています。セーフ/セミ/バーストのセレクティブファイアを採用したFN M16A4は、アメリカ海兵隊の標準装備となりました。軍用ライフルにはナイツ・アーマメント社製のM5 RASハンドガードも装備されており、垂直グリップ、レーザー、タクティカルライトなどのアクセサリーを取り付けることができます。このことから、アメリカ陸軍の野戦教範ではM16A4 MWS（モジュラー・ウェポン・システム）という名称が付けられています。"
 ROJ_infantry_weapons_5_desc: "M4カービンは、M16アサルトライフルの短縮型・軽量型です。M4は、5.56x45mm NATO弾を使用し、空冷式、ダイレクトインピンジメント式、ガス作動式、マガジン給弾式のカービンです。14.5インチ（370mm）の銃身と伸縮式ストックを備えています。"
 SAU_infantry_weapons_2_desc: "G3A3はG3の中で最もよく知られているバージョンです。改良されたフロントサイトと新たに改良されたリアドラムサイト、フラッシュサプレッサー/マズルブレーキ、固定式の頑丈なプラスチック製バットストック、そしてフリーフローティングバレルに接触しないプラスチック製ハンドガードを備えています。ハンドガードはスリムでベンチレーション機能を備えたバージョンとワイドバージョンがあり、後者はバイポッドを装着することで安定性が向上します。"
 SAU_infantry_weapons_4_desc: "ヘッケラー＆コッホG36（ゲヴェーア36）は、ドイツの兵器メーカーであるヘッケラー＆コッホが1990年代初頭に、より重たい7.62x51mm弾を使用するG3モデルの代替として設計した5.56x45mm弾を使用するアサルトライフルです。1990年代半ばにはドイツ連邦軍に採用され、G3の後継として採用されました。その後、輸出も盛んに行われ、ドイツ、スペイン、イギリスなど、多くの国の軍隊や警察で活躍しています。"
 SAU_infantry_weapons_5_desc: "M4カービンは、M16アサルトライフルの短縮型・軽量型です。M4は、5.56x45mm NATO弾を使用し、空冷式、ダイレクトインピンジメント式、ガス作動式、マガジン給弾式のカービンです。14.5インチ（370mm）の銃身と伸縮式ストックを備えています。"
 YEM_infantry_weapons_1_desc: "1959年に開発されたAKMは、ミハイル・カラシニコフが開発したAK-47ライフルの最も一般的な近代化バージョンである。AKMは、その前身よりもはるかに軽量で、自動射撃時の精度が向上している。"
 YEM_infantry_weapons_2_desc: "AK-74はAKMをベースに開発され、前身機種に比べて大幅な改良が施されています。特に注目すべきは、当時の標準であったワルシャワ条約機構加盟国による7.62mm弾ではなく、5.45mm弾を使用する点です。"
 YEM_infantry_weapons_3_desc: "AK-74N は内部的には AK-74 と似ていますが、光学機器用のダブテールマウントが装備されています。"
 YEM_infantry_weapons_4_desc: "1991年、イジェフスク市のイジュマシュ工場は、AK-74の近代化改良型であるAK-74Mの本格生産を開始しました。軽量化されたボルトとキャリアーアセンブリに加え、ガラス繊維を充填したポリアミドストックが採用されました。"
 YEM_infantry_weapons_5_desc: "AK-103アサルトライフルは、7.62x39mm M43弾を使用するAK-74Mの派生型です。旧型のAKMと同様に、103は暗視装置や望遠鏡など、様々な照準装置を装備できます。また、銃剣やグレネードランチャーも装備可能です。多くのAKと異なる点は、103がプラスチック製で安価な素材を使用していることです。"
 YEM_infantry_weapons_6_desc: "AK-12はロシアの新しいアサルトライフルです。「ラトニク未来歩兵計画」に基づいて開発されました。特殊部隊向けに製造され、AK-103の生産を置き換える予定です。AK-12はバランスと人間工学の改良により、現在ロシアで最も高性能なアサルトライフルとなっています。"
