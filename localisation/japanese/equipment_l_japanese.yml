 SOM_infantry_weapons_2_desc: "ヘッケラー＆コッホG3（ゲヴェーア3）は、1950年代に西ドイツでドイツの兵器メーカーであるヘッケラー＆コッホ（H&K）がスペインの国営設計開発機関CETMEと共同で開発した7.62x51mm NATO弾を使用する選抜射撃バトルライフルである。G3は1959年から標準ライフルとしてFN FAL/G1に取って代わり、1963年に改良型のG3A1モデルにアップグレードされるまで使用された。"
 SOM_infantry_weapons_3_desc: "M16A2ライフルの開発は、ベトナム戦争におけるXM16E1およびM16A1の戦闘経験を踏まえ、アメリカ海兵隊から要請されました。1982年に国防総省によって「US Rifle, 5.56mm, M16A2」として正式に採用されました。海兵隊は1980年代初頭から中頃にアメリカ軍で初めてM16A2を採用し、その後1980年代後半にはアメリカ陸軍もこれに続きました。"
 SOM_infantry_weapons_4_desc: "M16A4はM16シリーズの第4世代です。取り外し可能なキャリングハンドルと、光学機器やその他の補助装置を取り付けるためのフルレングスのクアッドピカティニーレールを備えています。セーフ/セミ/バーストのセレクティブファイアを採用したFN M16A4は、アメリカ海兵隊の標準装備となりました。軍用ライフルにはナイツ・アーマメント社製のM5 RASハンドガードも装備されており、垂直グリップ、レーザー、タクティカルライトなどのアクセサリーを取り付けることができます。このことから、アメリカ陸軍の野戦教範ではM16A4 MWS（モジュラー・ウェポン・システム）という名称が付けられています。"
 SOM_infantry_weapons_5_desc: "M4カービンは、M16アサルトライフルの短縮型・軽量型です。M4は、5.56x45mm NATO弾を使用し、空冷式、ダイレクトインピンジメント式、ガス作動式、マガジン給弾式のカービンです。14.5インチ（370mm）の銃身と伸縮式ストックを備えています。"
