 cnc_equipment_type: "C&C装備"
 cnc_equipment_type_desc: "Command and Control Equipment is the system empowering leadership to exercise authority and direction over assigned forces for the accomplishment of missions and tasks."
 cnc_equipment_1: "C2装備"
 cnc_equipment_1_desc: "Command and Control Equipment is the system empowering leadership to exercise authority and direction over assigned forces for the accomplishment of missions and tasks. Efficient Command and Control leads to greater organization and morale. C2 (Command and Control) is the first generation of C2 equipment."
 cnc_equipment_2: "C3装備"
 cnc_equipment_2_desc: "Command and Control Equipment is the system empowering leadership to exercise authority and direction over assigned forces for the accomplishment of missions and tasks. Efficient Command and Control leads to greater organization and morale. C3 (Command, Control & Communication) is the second generation of C2 equipment."
 cnc_equipment_3: "C3ISTAR装備"
 cnc_equipment_3_desc: "Command and Control Equipment is the system empowering leadership to exercise authority and direction over assigned forces for the accomplishment of missions and tasks. Efficient Command and Control leads to greater organization and morale. C3ISTAR (Command, Control & Communication, Intelligence, Surveillance, Target Acquisition, and Reconnaissance) is the third generation of C2 equipment."
 cnc_equipment_4: "C4I装備"
 cnc_equipment_4_desc: "Command and Control Equipment is the system empowering leadership to exercise authority and direction over assigned forces for the accomplishment of missions and tasks. Efficient Command and Control leads to greater organization and morale. C4I (Command, Control, Communications, Computers, Intelligence, and Interoperability) is the fourth generation of C2 equipment."
 cnc_equipment_5: "C4ISTAR装備"
