 SIN_infantry_weapons_1_desc: "M16S1は、STキネティクス社にライセンス供与され、現地生産された米国製M16A1ライフルの輸出用派生型です。シンガポール空軍（SAF）の黎明期には、M16S1は全兵士の標準装備でした。現地での使用に合わせてM16A1に若干の改良が加えられたにもかかわらず、M16S1には初期の欠点がいくつか残っており、シンガポールの防衛産業はより優れた設計を模索するようになりました。M16S1は現在も保管され、予備兵器として使用されています。"
