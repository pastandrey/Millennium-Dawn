 CRM_util_vehicle_8: "VMCTS ドロズド-B"
 CRM_util_vehicle_8_desc: "陸軍の2020年型装甲車「ドロズド」におけるCRMionの発表が成功した後、試作車が試験に出発し、この車両の防御力の低さが示されました。その結果、改良型「ドロズド-B」が登場しました。この最新型装甲車は、河川の障害物やオフロードを克服でき、低熱反射性も備えています。複合装甲で構成された車体下部の合理的なV字型形状は、対麻薬防御力を強化しています。"
