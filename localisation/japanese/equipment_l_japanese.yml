 GER_infantry_weapons_2: "ヘッケラー&コッホ G3A3"
 GER_infantry_weapons_2_short: "G3A3"
 GER_infantry_weapons_2_desc: "G3A3はG3の中で最もよく知られているバージョンです。改良されたフロントサイトと新たに改良されたリアドラムサイト、フラッシュサプレッサー/マズルブレーキ、固定式の頑丈なプラスチック製バットストック、そしてフリーフローティングバレルに接触しないプラスチック製ハンドガードを備えています。ハンドガードはスリムでベンチレーション機能を備えたバージョンとワイドバージョンがあり、後者はバイポッドを装着することで安定性が向上します。"
 GER_infantry_weapons_3: "ヘッケラー&コッホ G3A4"
 GER_infantry_weapons_3_short: "G3A4"
 GER_infantry_weapons_3_desc: "G3A4は、ドラムサイトと新設計のシングルポジションを採用した、前モデルのG3A3の改良版です。一部のモデルには、左利きの射手に対応するため、左右どちらの手でも操作可能なトリガーグループと真鍮製のデフレクターが搭載されています。G3A4は1974年に最前線の歩兵部隊向けに配備され、1990年代後半まで運用されましたが、その後段階的に廃止され、後継機に置き換えられました。"
 GER_infantry_weapons_4: "ヘッケラー&コッホ G36"
 GER_infantry_weapons_4_short: "G36"
 GER_infantry_weapons_4_desc: "ヘッケラー＆コッホG36（ゲヴェーア36）は、ドイツの兵器メーカーであるヘッケラー＆コッホが1990年代初頭に、より重たい7.62x51mm弾を使用するG3モデルの代替として設計した5.56x45mm弾を使用するアサルトライフルです。1990年代半ばにはドイツ連邦軍に採用され、G3の後継として採用されました。その後、輸出も盛んに行われ、ドイツ、スペイン、イギリスなど、多くの国の軍隊や警察で活躍しています。"
 GER_infantry_weapons_5: "ヘッケラー&コッホ G36A2"
 GER_infantry_weapons_5_short: "G36A2"
 GER_infantry_weapons_5_desc: "G36A2モデルは、G36モデルの改良型です。G36A2は、ピカティニーレールに取り付けられたクイックデタッチャブルのツァイスRSAリフレックスレッドドットサイトを搭載しており、デュアルコンバットサイティングシステムのオリジナルのレッドドットサイトと交換できます。G36A2アップグレードキットには、短縮されたG36Cストック、オプションの4つのピカティニーレールを備えた新しいアルミ製ハンドガード、そしてエリコン・コントレイブLLM01レーザーライトモジュールを操作するためのスイッチが組み込まれた垂直フォアグリップが含まれています。"
 GER_infantry_weapons_6: "ヘッケラー&コッホ G36A3"
 GER_infantry_weapons_6_short: "G36A3"
 GER_infantry_weapons_6_desc: "G36A3 ライフルは G36 プラットフォームをさらに近代化したものであって、より大きなピカティニー レール、4 ポジションの格納式ロッキング ストック、一体型 Zeiss RSA 反射レッド ドット サイト光学装置/キャリング ハンドルが Hensoldt 光学装置に置き換えられています。"
 GER_infantry_weapons_7: "ヘッケラー&コッホ G95K"
 GER_infantry_weapons_7_short: "G95K"
 GER_infantry_weapons_7_desc: "ヘッケラー＆コッホHK416は、5.56x45mm NATO弾を使用するガス作動式アサルトライフルです。ドイツのヘッケラー＆コッホ社によって設計・製造されています。AR-15クラスの銃器をベースとしていますが、ヘッケラー＆コッホ社が開発したG36ファミリーのライフルから受け継いだ独自のショートストローク・ガスピストンシステムを採用しています。また、HK416は、複数のアクセサリーを装着できるよう、四方にレールを備えた独自のアクセサリーレールフォアアームを装備しています。"
 GER_infantry_weapons_8: "ヘッケラー&コッホ 433"
 GER_infantry_weapons_8_short: "HK 433"
 GER_infantry_weapons_8_desc: "ヘッケラー＆コッホ433（HK433）は、5.56mm×45口径弾を使用する、近代的でモジュール式のコンパクトなアサルトライフルです。従来のG36とHK416サービスライフルの長所と優れた機能を兼ね備えています。HK433には、高さ調節可能なチークレストを備えた折りたたみ式の格納式バットストックが新たに搭載され、精度が向上しています。また、近接戦闘（CQC）時には、バットストックを折りたたんだ状態でも使用できます。"
