 MR_Fighter1: "第3世代マルチロール機"
 MR_Fighter1_desc: "マルチロール戦闘機とは、空軍の主力戦闘機である。いかなる役割や任務にも対応できるが、その設計は妥協の産物であり、その結果、どのような専用戦闘機よりもそれぞれの役割を不得手としている。"
