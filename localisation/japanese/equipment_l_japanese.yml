 CUB_infantry_weapons_1_desc: "1959年に開発されたAKMは、ミハイル・カラシニコフが開発したAK-47ライフルの最も一般的な近代化バージョンである。AKMは、その前身よりもはるかに軽量で、自動射撃時の精度が向上している。"
 CUB_infantry_weapons_2_desc: "AK-74はAKMをベースに開発され、前身機種に比べて大幅な改良が施されています。特に注目すべきは、当時の標準であったワルシャワ条約機構加盟国による7.62mm弾ではなく、5.45mm弾を使用する点です。"
 CUB_infantry_weapons_3_desc: "AK-74N は内部的には AK-74 と似ていますが、光学機器用のダブテールマウントが装備されています。"
 CUB_infantry_weapons_4_desc: "1991年、イジェフスク市のイジュマシュ工場は、AK-74の近代化改良型であるAK-74Mの本格生産を開始しました。軽量化されたボルトとキャリアーアセンブリに加え、ガラス繊維を充填したポリアミドストックが採用されました。"
 CUB_infantry_weapons_5_desc: "AK-103アサルトライフルは、7.62x39mm M43弾を使用するAK-74Mの派生型です。旧型のAKMと同様に、103は暗視装置や望遠鏡など、様々な照準装置を装備できます。また、銃剣やグレネードランチャーも装備可能です。多くのAKと異なる点は、103がプラスチック製で安価な素材を使用していることです。"
 CUB_infantry_weapons_6_desc: "AK-12はロシアの新しいアサルトライフルです。「ラトニク未来歩兵計画」に基づいて開発されました。特殊部隊向けに製造され、AK-103の生産を置き換える予定です。AK-12はバランスと人間工学の改良により、現在ロシアで最も高性能なアサルトライフルとなっています。"
 VEN_infantry_weapons_1_desc: "1959年に開発されたAKMは、ミハイル・カラシニコフが開発したAK-47ライフルの最も一般的な近代化バージョンである。AKMは、その前身よりもはるかに軽量で、自動射撃時の精度が向上している。"
