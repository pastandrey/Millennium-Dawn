 BLZ_infantry_weapons_5_desc: "M4カービンは、M16アサルトライフルの短縮型・軽量型です。M4は、5.56x45mm NATO弾を使用し、空冷式、ダイレクトインピンジメント式、ガス作動式、マガジン給弾式のカービンです。14.5インチ（370mm）の銃身と伸縮式ストックを備えています。"
 MEX_infantry_weapons_1_desc: "ヘッケラー＆コッホG3（ゲヴェーア3）は、1950年代に西ドイツでドイツの兵器メーカーであるヘッケラー＆コッホ（H&K）がスペインの国営設計開発機関CETMEと共同で開発した7.62x51mm NATO弾を使用する選抜射撃バトルライフルである。G3は1959年から標準ライフルとしてFN FAL/G1に取って代わり、1963年に改良型のG3A1モデルにアップグレードされるまで使用された。"
 MEX_infantry_weapons_2_desc: "G3A3はG3の中で最もよく知られているバージョンです。改良されたフロントサイトと新たに改良されたリアドラムサイト、フラッシュサプレッサー/マズルブレーキ、固定式の頑丈なプラスチック製バットストック、そしてフリーフローティングバレルに接触しないプラスチック製ハンドガードを備えています。ハンドガードはスリムでベンチレーション機能を備えたバージョンとワイドバージョンがあり、後者はバイポッドを装着することで安定性が向上します。"
 MEX_infantry_weapons_3_desc: "G3A4は、ドラムサイトと新設計のシングルポジションを採用した、前モデルのG3A3の改良版です。一部のモデルには、左利きの射手に対応するため、左右どちらの手でも操作可能なトリガーグループと真鍮製のデフレクターが搭載されています。G3A4は1974年に最前線の歩兵部隊向けに配備され、1990年代後半まで運用されましたが、その後段階的に廃止され、後継機に置き換えられました。"
 JAM_infantry_weapons_3_desc: "M16A2ライフルの開発は、ベトナム戦争におけるXM16E1およびM16A1の戦闘経験を踏まえ、アメリカ海兵隊から要請されました。1982年に国防総省によって「US Rifle, 5.56mm, M16A2」として正式に採用されました。海兵隊は1980年代初頭から中頃にアメリカ軍で初めてM16A2を採用し、その後1980年代後半にはアメリカ陸軍もこれに続きました。"
