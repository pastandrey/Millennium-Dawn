 WAG_mbt_equipment_3: "T-14"
 WAG_mbt_equipment_4: "T-24"
 WAG_Rec_tank_0: "PT-76"
 WAG_Rec_tank_0_desc: "この超高速水陸両用軽戦車は、川の向こうから敵陣地に忍び寄り、猛攻撃を加えることができる。76.2mm D-56Tライフル戦車砲を装備。"
 WAG_Rec_tank_0_short: "PT-76"
 WAG_Rec_tank_1: "2S25 スプルート-SD"
 WAG_Rec_tank_1_desc: "自走水陸両用戦車駆逐車であり、この車両は敵戦車に忍び寄り、T-72やT-80が搭載する125mm砲を発射することができる。"
 WAG_Rec_tank_1_short: "2S25 スプルート-SD"
 WAG_Rec_tank_2: "BMPT ターミネーター"
 WAG_Rec_tank_2_desc: "おそらくこれまでに作られた中で最も強力なガラスの大砲の一つである。戦車には対抗できないが、一個縦隊全体を破壊することができる。130mm発射機4基と30mm機関砲2門を装備している。"
 WAG_Rec_tank_2_short: "BMPT ターミネーター"
 WAG_Rec_tank_3: "K-18 ブーメランク"
 WAG_Rec_tank_3_desc: "ブーメランクは当初、近代ロシア陸軍向けの費用対効果の高いAPC兼IFVとして発表された。しかし、ブーメランクは専用の対戦車プラットフォームとしても使用され、125mm砲を搭載することが2018年に詳細が明らかにされた。アメリカのストライカーMGSと同様に、ブーメランクはBMPTのような火力支援車両として機能する。"
 WAG_Rec_tank_4: "2025年型軽戦車"
 WAG_Rec_tank_4_short: "2025年型軽戦車"
 WAG_Rec_tank_5: "2035年型軽戦車"
 WAG_Rec_tank_5_short: "2035年型軽戦車"
