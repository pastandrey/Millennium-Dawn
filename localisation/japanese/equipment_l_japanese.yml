 SPR_infantry_weapons_5_desc: "G36A2モデルは、G36モデルの改良型です。G36A2は、ピカティニーレールに取り付けられたクイックデタッチャブルのツァイスRSAリフレックスレッドドットサイトを搭載しており、デュアルコンバットサイティングシステムのオリジナルのレッドドットサイトと交換できます。G36A2アップグレードキットには、短縮されたG36Cストック、オプションの4つのピカティニーレールを備えた新しいアルミ製ハンドガード、そしてエリコン・コントレイブLLM01レーザーライトモジュールを操作するためのスイッチが組み込まれた垂直フォアグリップが含まれています。"
 SPR_infantry_weapons_6_desc: "G36A3 ライフルは G36 プラットフォームをさらに近代化したものであって、より大きなピカティニー レール、4 ポジションの格納式ロッキング ストック、一体型 Zeiss RSA 反射レッド ドット サイト光学装置/キャリング ハンドルが Hensoldt 光学装置に置き換えられています。"
 SPR_infantry_weapons_8_desc: "ヘッケラー＆コッホ433（HK433）は、5.56mm×45口径弾を使用する、近代的でモジュール式のコンパクトなアサルトライフルです。従来のG36とHK416サービスライフルの長所と優れた機能を兼ね備えています。HK433には、高さ調節可能なチークレストを備えた折りたたみ式の格納式バットストックが新たに搭載され、精度が向上しています。また、近接戦闘（CQC）時には、バットストックを折りたたんだ状態でも使用できます。"
 TAI_infantry_weapons_2_desc: "M16ライフル（正式名称：5.56mm口径ライフル、M16）は、アメリカ軍向けにアーマライトAR-15ライフルを改良した軍用ライフルのシリーズです。オリジナルのM16ライフルは、20発装填の5.56mm口径自動小銃でした。"
 UKR_infantry_weapons_1_desc: "1959年に開発されたAKMは、ミハイル・カラシニコフが開発したAK-47ライフルの最も一般的な近代化バージョンである。AKMは、その前身よりもはるかに軽量で、自動射撃時の精度が向上している。"
