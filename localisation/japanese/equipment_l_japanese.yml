 WAG_Anti_tank_3: "9M134M ブラート-M"
 WAG_Anti_tank_4: "9M142 シチューカ"
 WAG_MBT_1: "T-55"
 WAG_MBT_1_desc: "The T-54/55 is perhaps the most produced tank in the world. Designed and produced in the early years of the Cold War, it was the might and the backbone of the Red Army. Once feared as a symbol of the Russian might, it has become the iconic representation of Middle-Eastern armoured forces getting destroyed in the wake of an American air strike."
 WAG_MBT_1_short: "T-55"
 WAG_MBT_2: "T-72"
 WAG_MBT_2_desc: "T-72は、おそらくロシアが生産した中で最も成功した設計である。冷戦終結期におけるソ連軍事力の頂点であり、数千両が生産され、今日に至るまでロシア陸軍の屋台骨として機能している。中東紛争での壊滅的な失敗で悪名高くなったものの、T-72は依然として将来のロシア戦車設計の開発プラットフォームとして使用されており、今日の近代戦の基準を満たすために絶え間ない改良とアップグレードが施されている。かつてソ連軍の槍であったこの戦車を過小評価してはならない。"
 WAG_MBT_2_short: "T-72"
 WAG_MBT_3: "T-80"
 WAG_MBT_3_desc: "この200万ドルの戦車であり戦場の野獣は、T-72と同じ主砲を使用し、追加装甲とコブラATGMを装備している。"
 WAG_MBT_3_short: "T-80"
 WAG_MBT_4: "T-90"
 WAG_MBT_4_desc: "最大の射撃能力と効率性のために3門の砲システムで武装している。3門の125mm砲発射機を装備。"
 WAG_MBT_4_short: "T-90"
 WAG_MBT_5: "T-14 アルマータ"
 WAG_MBT_5_desc: "流麗な外形と強力な152mm砲を備えた、ロシア陸軍で最も先進的な主力戦車である。"
 WAG_MBT_5_short: "T-14"
 WAG_MBT_7: "T-14M"
 WAG_MBT_7_short: "T-14M"
