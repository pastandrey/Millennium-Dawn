 PAR_infantry_weapons_4_desc: "M16A4はM16シリーズの第4世代です。取り外し可能なキャリングハンドルと、光学機器やその他の補助装置を取り付けるためのフルレングスのクアッドピカティニーレールを備えています。セーフ/セミ/バーストのセレクティブファイアを採用したFN M16A4は、アメリカ海兵隊の標準装備となりました。軍用ライフルにはナイツ・アーマメント社製のM5 RASハンドガードも装備されており、垂直グリップ、レーザー、タクティカルライトなどのアクセサリーを取り付けることができます。このことから、アメリカ陸軍の野戦教範ではM16A4 MWS（モジュラー・ウェポン・システム）という名称が付けられています。"
