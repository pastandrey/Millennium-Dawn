 L_Strike_fighter1: "1975年型ライトジェット"
 L_Strike_fighter_desc: "軽戦闘機は、戦闘機が実戦配備される重量、コスト、複雑さの点で実用的な範囲の下限に近い戦闘機である。"
 L_Strike_fighter1_desc: "軽ジェット爆撃機は練習機として設計されている。しかし、攻撃用のペイロードを搭載できるように改造すると、特に反乱軍など独自の航空部隊を持たない敵に対する近接航空支援に使用できる。"
