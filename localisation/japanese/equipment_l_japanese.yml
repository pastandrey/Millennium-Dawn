 cnc_equipment_6: "C5I装備"
 cnc_equipment_6_desc: "Command and Control Equipment is the system empowering leadership to exercise authority and direction over assigned forces for the accomplishment of missions and tasks. Efficient Command and Control leads to greater organization and morale. C4ISTAR (Command, Control, Communications, Computers, Collaboration and Intelligence) is the Sixth generation of C2 equipment."
 cnc_equipment_7: "C5ISTAR装備"
 cnc_equipment_7_desc: "指揮統制装置は、任務やタスクの達成のために、指揮官が割り当てられた部隊に対して権限と指示を行使できるようにするシステムです。効率的な指揮統制は、組織力と士気の向上につながります。C4ISTAR（指揮、統制、通信、コンピューター、連携、情報収集、相互運用性、監視、目標捕捉、偵察）は、第7世代のC2装置です。"
