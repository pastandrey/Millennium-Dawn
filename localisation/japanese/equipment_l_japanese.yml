 CAN_Rec_tank_1_desc: "オリジナルのM113と外観は似ているが、CVは指揮および偵察用に大幅に改造された。兵員室は完全に取り除かれた。M113に搭載されていたのと同じゼネラルモーターズ製6気筒エンジンが後部に配置された。M113のサスペンションは維持されたが、転輪が1つ減らされ、各側面に4つだけが残された。"
 CAN_Rec_tank_2_desc: "1974年、カナダ陸軍はスイス製の車両モワク・ピラーニャ6x6を選定した。車両の生産は、カナダのゼネラルモーターズ・オブ・カナダの一部門であるディーゼル・ディビジョン社によってライセンス生産された。クーガー派生型はFV101スコーピオンの砲塔を使用した。"
 CAN_Rec_tank_3_desc: "LAV II コヨーテは、ゼネラルモーターズ（現ジェネラル・ダイナミクス）によって製造された8x8装輪装甲車である。この車両は偵察任務用に設計され、LAV-25をベースにしている。監視装置には、地上監視レーダーと、長距離ビデオカメラおよびレーザー測距儀を備えた電気光学/赤外線監視システムが含まれる。この監視システムは、最大12km離れた戦車サイズの目標や、最大24km離れた大型トラックサイズの目標を検出できる。"
