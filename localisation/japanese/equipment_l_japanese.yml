 ITA_infantry_weapons_2: "AR70/223"
 ITA_infantry_weapons_2_desc: ""
 ITA_infantry_weapons_3: "AR70/90"
 ITA_infantry_weapons_3_desc: "The Beretta AR70/90 is a gas-operated assault rifle chambered for the 5.56x45 mm NATO cartridge, and is the standard issue service rifle of the Italian Armed Forces. The weapon is also designed to be fitted with a rifle grenade and has grenade sights. "
 ITA_infantry_weapons_4: "SCP70/90"
 ITA_infantry_weapons_4_desc: "the SC70/90 variants (Special Carbine) with folding stock were adopted, mainly used by Alpine troops, and the SCP70/90 (Special Carbine Paratroopers) rifle for paratroopers with recoil pad foldable and shorter barrel than the SC which allows insertion into the rifle sheath used in parachute jumps."
 ITA_infantry_weapons_5: "ARX160"
 ITA_infantry_weapons_5_desc: "The Beretta ARX160 is an Italian modular assault rifle manufactured by Beretta. Developed for the Italian Armed Forces as part of the Soldato Futuro (English: \"Future Soldier\") program, the ARX160 was launched in 2008 as a commercial weapon system independent from the Soldato Futuro ensemble, complete with a companion single-shot 40x46mm NATO low-velocity grenade launcher, called the GLX160, which can be mounted underneath the rifle or used with an ad hoc stock system as a stand-alone weapon."
 ITA_infantry_weapons_6: "ARX160A3"
 ITA_infantry_weapons_6_desc: "The Beretta ARX160 A3 is an improved variant of the ARX160 which features some design changes. The changes include a redesigned handguard, where its top row air vent slits have been replaced with larger square cut outs, though the bottom row air vent still retains the thinner slits. These larger cut outs reduce some weight of the rifle while letting more air circulate around the barrel."
 ITA_infantry_weapons_7: "ARX180 6.8"
 ITA_infantry_weapons_8: "FN SCAR-NG"
 ITA_cnc_equipment_1: "BFT"
 ITA_cnc_equipment_1_desc: "C&C Equipment from Cold-war era produced with Slovakia at the Czechoslovak era."
 ITA_cnc_equipment_2: "LC2"
 ITA_cnc_equipment_2_desc: "C2 (Command and Control) is the first generation of C2 equipment. Command and Control Equipment is the system empowering leadership to exercise authority and direction over assigned forces for the accomplishment of missions and tasks. Efficient Command and Control leads to greater organization and morale."
 ITA_cnc_equipment_3: "LC2EVO"
 ITA_cnc_equipment_3_desc: "C3 (Command, Control & Communication) is the second generation of C2 equipment. Command and Control Equipment is the system empowering leadership to exercise authority and direction over assigned forces for the accomplishment of missions and tasks. Efficient Command and Control leads to greater organization and morale."
 ITA_cnc_equipment_4: "SICCONA"
 ITA_cnc_equipment_4_desc: "C3ISTAR (Command, Control & Communication, Intelligence, Surveillance, Target Acquisition, and Reconnaissance) is the third generation of C2 equipment. Command and Control Equipment is the system empowering leadership to exercise authority and direction over assigned forces for the accomplishment of missions and tasks. Efficient Command and Control leads to greater organization and morale."
 ITA_cnc_equipment_5: "SIACCON ADV"
 ITA_cnc_equipment_5_desc: "C4I (Command, Control, Communications, Computers, Intelligence, and Interoperability) is the fourth generation of C2 equipment. Command and Control Equipment is the system empowering leadership to exercise authority and direction over assigned forces for the accomplishment of missions and tasks. Efficient Command and Control leads to greater organization and morale. C4I (Command, Control, Communications, Computers, Intelligence, and Interoperability) is the fourth generation of C2 equipment."
 ITA_cnc_equipment_6: "SIACCON NCW"
 ITA_cnc_equipment_6_desc: "C4ISTAR (Command, Control, Communications, Computers, Intelligence, Interoperability, Surveillance, Target Acquisition, and Reconnaissance) is the Fifth generation of C2 equipment. Command and Control Equipment is the system empowering leadership to exercise authority and direction over assigned forces for the accomplishment of missions and tasks. Efficient Command and Control leads to greater organization and morale."
 ITA_cnc_equipment_7: "SIACCON NCW ADV"
 ITA_cnc_equipment_7_desc: "C4ISTAR (Command, Control, Communications, Computers, Collaboration, Intelligence, Interoperability, Surveillance, Target Acquisition, and Reconnaissance ) is the Seventh generation of C2 equipment. Command and Control Equipment is the system empowering leadership to exercise authority and direction over assigned forces for the accomplishment of missions and tasks. Efficient Command and Control leads to greater organization and morale."
