 PMR_MBT_1: "T-55"
 PMR_MBT_1_desc: "The T-54/55 is perhaps the most produced tank in the world. Designed and produced in the early years of the Cold War, it was the might and the backbone of the Red Army. Once feared as a symbol of the Russian might, it has become the iconic representation of Middle-Eastern armoured forces getting destroyed in the wake of an American air strike."
 PMR_MBT_1_short: "T-55"
 PMR_MBT_2: "T-72"
 PMR_MBT_2_desc: "The T-72 is perhaps the most successful design produced by Russia. It was the pinnacle of the Soviets' military might at the closing stage of the Cold War produced in the thousands, serving as the backbone of the Russian Army even till today. Though it has become infamous for its catastrophic failings in the Middle-Eastern conflicts, the T-72 is still being used as a development platform for future Russian tank designs and has been given constant modifications and upgrades to meet the standards of modern warfare today. Do not underestimate the tank that was once the spear of the Soviet forces."
