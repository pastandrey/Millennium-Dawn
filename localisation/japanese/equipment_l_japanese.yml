 BOT_infantry_weapons_5_desc: "M4カービンは、M16アサルトライフルの短縮型・軽量型です。M4は、5.56x45mm NATO弾を使用し、空冷式、ダイレクトインピンジメント式、ガス作動式、マガジン給弾式のカービンです。14.5インチ（370mm）の銃身と伸縮式ストックを備えています。"
 ZIM_infantry_weapons_1_desc: "1959年に開発されたAKMは、ミハイル・カラシニコフが開発したAK-47ライフルの最も一般的な近代化バージョンである。AKMは、その前身よりもはるかに軽量で、自動射撃時の精度が向上している。"
 ZIM_infantry_weapons_2_desc: "ヘッケラー＆コッホG3（ゲヴェーア3）は、1950年代に西ドイツでドイツの兵器メーカーであるヘッケラー＆コッホ（H&K）がスペインの国営設計開発機関CETMEと共同で開発した7.62x51mm NATO弾を使用する選抜射撃バトルライフルである。G3は1959年から標準ライフルとしてFN FAL/G1に取って代わり、1963年に改良型のG3A1モデルにアップグレードされるまで使用された。"
 ZIM_infantry_weapons_3_desc: "M16A2ライフルの開発は、ベトナム戦争におけるXM16E1およびM16A1の戦闘経験を踏まえ、アメリカ海兵隊から要請されました。1982年に国防総省によって「US Rifle, 5.56mm, M16A2」として正式に採用されました。海兵隊は1980年代初頭から中頃にアメリカ軍で初めてM16A2を採用し、その後1980年代後半にはアメリカ陸軍もこれに続きました。"
