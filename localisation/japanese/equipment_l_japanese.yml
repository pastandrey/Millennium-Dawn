 USA_attack_helicopter_1_short: "AH-1 コブラ"
 USA_attack_helicopter_2: "AH-64 アパッチ"
 USA_attack_helicopter_2_desc: "ボーイングAH-64 アパッチは、アメリカ製の双発ターボシャフト攻撃ヘリコプターで、尾輪式の着陸装置と2人乗りのタンデムコックピットを備えています。機首には目標捕捉および暗視システム用のセンサースイートが搭載されています。武装は、主脚の間、機体前部胴体下部に30mm（1.18インチ）M230チェーンガンを搭載し、スタブウィングパイロンには4つのハードポイントが設置されています。ハードポイントには、主にAGM-114ヘルファイアミサイルとハイドラ70ロケットポッドを組み合わせた武装と物資を搭載します。AH-64は、戦闘時の生存性を向上させるために、システムを大幅に冗長化しています。"
 USA_attack_helicopter_2_short: "AH-64 アパッチ"
 USA_attack_helicopter_3: "AH-64D アパッチ・ロングボウ"
 USA_attack_helicopter_3_desc: "AH-64D アパッチ ロングボウはグラスコックピットと最新センサーを搭載しており、中でも特に注目すべきは、メインローター上部のドームに収納された AN/APG-78 ロングボウミリ波火器管制レーダー (FCR) 目標捕捉システムとレーダー周波数干渉計 (RFI) です。レドームを高くすることで、ヘリコプターが障害物 (地形、樹木、建物など) の背後にいる場合でも目標の探知が可能になります。AN/APG-78 は最大 128 個の目標を同時に追尾し、最大 16 個を同時に攻撃することが可能で、30 秒以内に攻撃を開始できます。センサースイートに統合された無線モデムにより、地上部隊や他のアパッチとデータを共有できるため、1 機のヘリコプターで探知した目標に対しても、これらの部隊が射撃を行うことができます。"
 USA_attack_helicopter_3_short: "AH-64D アパッチ"
 USA_attack_helicopter_4: "AH-64E アパッチ・ガーディアン"
 USA_attack_helicopter_4_desc: "以前はAH-64DブロックIIIとして知られていましたが、2012年に能力の向上を示すためAH-64Eガーディアンに改称されました。AH-64Eは、改良されたデジタル接続性、統合戦術情報配信システム（JTIIS）、より強力なT700-GE-701Dエンジンと改良されたフェイスギアトランスミッションによる出力向上、無人航空機（UAV）の操縦能力、完全なIFR機能、そして改良された着陸装置を備えています。"
 USA_attack_helicopter_4_short: "AH-64E アパッチ"
 USA_attack_helicopter_5: "AH-66 コマンチ"
 USA_attack_helicopter_5_desc: "ボーイング・シコルスキーRAH-66コマンチは、アメリカ陸軍向けに設計されたステルス武装偵察・攻撃ヘリコプターです。数十年にわたる開発を経て、2004年にRAH-66プログラムは量産開始前に中止されました。その時点で既に70億ドル近くが費やされていました。"
 USA_attack_helicopter_5_short: "AH-66 コマンチ"
