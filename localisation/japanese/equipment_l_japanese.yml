 SOV_Anti_tank_0: "RPG-7"
 SOV_Anti_tank_0_desc: "多くの戦争や多くの車両で使用されている。"
 SOV_Anti_tank_1: "9K111 ファゴット"
 SOV_Anti_tank_1_desc: "他のATGMシステムよりもはるかに軽量で旧式である。このATGMは70～2,500mでしか命中せず、他と比較して射程がはるかに短いが、より安価でもある。"
 SOV_Anti_tank_2: "9M133M コルネットM"
 SOV_Anti_tank_2_desc: "9M133M コルネットM"
 SOV_Anti_tank_3: "9M134M ブラート-M"
 SOV_Anti_tank_4: "9M142 シチューカ"
 SOV_MBT_1: "T-55"
 SOV_MBT_1_desc: "The T-54/55 is perhaps the most produced tank in the world. Designed and produced in the early years of the Cold War, it was the might and the backbone of the Red Army. Once feared as a symbol of the Russian might, it has become the iconic representation of Middle-Eastern armoured forces getting destroyed in the wake of an American air strike."
 SOV_MBT_1_short: "T-55"
 SOV_MBT_2: "T-72"
 SOV_MBT_2_desc: "T-72は、おそらくロシアが生産した中で最も成功した設計である。冷戦終結期におけるソ連軍事力の頂点であり、数千両が生産され、今日に至るまでロシア陸軍の屋台骨として機能している。中東紛争での壊滅的な失敗で悪名高くなったものの、T-72は依然として将来のロシア戦車設計の開発プラットフォームとして使用されており、今日の近代戦の基準を満たすために絶え間ない改良とアップグレードが施されている。かつてソ連軍の槍であったこの戦車を過小評価してはならない。"
 SOV_MBT_2_short: "T-72"
 SOV_MBT_3: "T-80"
 SOV_MBT_3_desc: "この200万ドルの戦車であり戦場の野獣は、T-72と同じ主砲を使用し、追加装甲とコブラATGMを装備している。"
 SOV_MBT_3_short: "T-80"
 SOV_MBT_4: "T-90"
 SOV_MBT_4_desc: "最大の射撃能力と効率性のために3門の砲システムで武装している。3門の125mm砲発射機を装備。"
 SOV_MBT_4_short: "T-90"
 SOV_MBT_5: "T-14 アルマータ"
 SOV_MBT_5_desc: "流麗な外形と強力な152mm砲を備えた、ロシア陸軍で最も先進的な主力戦車である。"
 SOV_MBT_5_short: "T-14"
 SOV_MBT_7: "T-14M"
 SOV_MBT_7_short: "T-14M"
 SOV_MBT_8: "T-99 黒鷲"
 SOV_MBT_8_short: "T-99"
 SOV_Rec_tank_0: "PT-76"
 SOV_Rec_tank_0_desc: "この超高速水陸両用軽戦車は、川の向こうから敵陣地に忍び寄り、猛攻撃を加えることができる。76.2mm D-56Tライフル戦車砲を装備。"
 SOV_Rec_tank_0_short: "PT-76"
 SOV_Rec_tank_1: "2S25 スプルート-SD"
 SOV_Rec_tank_1_desc: "自走水陸両用戦車駆逐車であり、この車両は敵戦車に忍び寄り、T-72やT-80が搭載する125mm砲を発射することができる。"
 SOV_Rec_tank_1_short: "2S25 スプルート-SD"
 SOV_Rec_tank_2: "BMPT ターミネーター"
 SOV_Rec_tank_2_desc: "おそらくこれまでに作られた中で最も強力なガラスの大砲の一つである。戦車には対抗できないが、一個縦隊全体を破壊することができる。130mm発射機4基と30mm機関砲2門を装備している。"
 SOV_Rec_tank_2_short: "BMPT ターミネーター"
 SOV_Rec_tank_3: "K-18 ブーメランク"
 SOV_SP_Anti_Air_0: "ZSU-23-4 シルカ"
 SOV_SP_Anti_Air_1: "9K35 ストレラ-10"
 SOV_SP_Anti_Air_2: "2K22 ツングースカ"
 SOV_SP_Anti_Air_2_desc: "最大8発のミサイルを発射するこの機械は、接近するあらゆる航空機を撃墜することができる。それだけでなく、機関砲で輸送機を粉砕することも可能である。"
 SOV_SP_Anti_Air_3: "パーンツィリ-S1M"
 SOV_SP_Anti_Air_4: "パーンツィリ-S4L"
 SOV_SP_R_arty_0: "BM-21 グラート"
 SOV_SP_R_arty_0_desc: "近代的な作戦ではあまり使用されないが、SAMSとMLRSの祖父は主に第二次世界大戦とアフガニスタンで使用された。有効射程は20kmである。"
 SOV_SP_R_arty_1: "BM-30 スメルチ"
 SOV_SP_R_arty_1_desc: "この車両はグラートのより現代的なバージョンである。雪、氷、砂漠など、世界のどこへでも行くことができる。有効射程は35kmである。"
 SOV_SP_R_arty_2: "9A52-4 トーネード"
 SOV_SP_R_arty_2_desc: "対処しなければ都市全体を破壊できる、極めて重い砲兵中隊である。最大射程は90km。"
 SOV_SP_arty_0: "2S1 グヴォズジーカ"
 SOV_SP_arty_0_desc: "2S1 グヴォズディカは、MT-LBu多目的シャーシをベースにしたソ連の自走榴弾砲で、122mm 2A18榴弾砲を搭載している。「2S1」はGRAUの名称である。ロシアでの名称はSAU-122だが、陸軍では一般にグヴォズディカとして知られている。"
 SOV_SP_arty_1: "2S3 アカーツィヤ"
 SOV_SP_arty_1_desc: "必要とあらば天から太陽を撃ち落とすことも可能な152.4mm D-22砲を装備している。これは射程50kmの注目すべき砲兵中隊である。"
 SOV_SP_arty_2: "2S19M2 ムスタ-S"
 SOV_SP_arty_2_desc: "2S19 ムスタ-Sは冷戦末期に開発され、新技術を取り入れ、前任機と比較して射程が向上した。"
 SOV_SP_arty_3: "2S35 コアリツィヤ-SV"
 SOV_SP_arty_3_desc: "2S35は、広範な自動化、自動砲弾種別選択、及び統一された指揮統制システムを備えた、真の21世紀の砲兵プラットフォームである。"
 SOV_SP_arty_4: "2S38 コアリツィヤ-M"
 SOV_artillery_0: "D-30"
 SOV_artillery_0_desc: "ソ連によって多くの戦争で使用された122mm牽引式砲兵中隊。射程は15～25km。"
 SOV_artillery_1: "2A65 ムスタ-B"
 SOV_artillery_1_desc: "この野獣のような大砲は、152mm榴弾を28.9km先まで発射し、歩兵小隊や車両縦隊全体を撃破することができる。"
