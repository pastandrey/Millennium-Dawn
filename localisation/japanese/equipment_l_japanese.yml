 Anti_Air_4: "2035年型携帯式防空ミサイルシステム"
 Anti_Air_4_desc: "携帯式防空システムとは、肩に担いで発射できる地対空ミサイルである。携帯性を重視するため、ミサイルの大きさに厳しい制限があり、短射程のシステムである。そのため、低空飛行の航空機にとっては脅威となり、ヘリコプターにとっては致命的である。"
 SP_Anti_Air_4: "2035年型自走対空砲"
 SP_Anti_Air_4_desc: "短中距離車両搭載型防空システムは、携帯式防空ミサイルシステムよりも大型で射程の長いミサイルを使用できるため、すべての航空機に脅威を与えることができる。また、より多くのミサイルを搭載することができる。このような対空システムは、専用の防空大隊や大隊に編成される。"
 early_helicopter: "輸送ヘリコプター"
 early_helicopter_desc: "初期のヘリコプターの設計である。これにより、輸送用ヘリコプターと攻撃用ヘリコプターの研究ができるようになる。"
 attack_helicopter_equipment: "攻撃ヘリコプター"
 attack_helicopter_desc: "攻撃ヘリコプターは、地上部隊を支援するよう設計されたヘリコプターである。装甲車や対空戦闘力のない部隊に対して優れており、適切に対抗できない敵に迅速に対処することができる。しかし、攻撃ヘリコプターは戦闘機や対空兵器に対して非常に脆弱である。"
 carrier_0: "1965年型航空母艦"
 carrier_0_desc: "第二次世界大戦の終結以来、航空戦力は海軍の教義において最高の地位を占めており、航空戦力は海軍にとって最も貴重な財産であることが多い。航空母艦の存在は、戦闘の成否を左右する。航空母艦は極めて重要で影響力があるにもかかわらず、自衛能力が非常に低いため、常に護衛が必要となる。"
