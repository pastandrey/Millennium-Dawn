 SPR_transport_helicopter_1: "ベル UH-1H ヒューイ"
 SPR_transport_helicopter_1_short: "UH-1H ヒューイ"
 SPR_transport_helicopter_1_desc: "単発ターボシャフトエンジンを搭載し、2枚羽根のメインローターとテールローターを備えた多用途軍用ヘリコプター。多くの実績を誇るヒューイファミリーの最初のモデルであり、1952年にアメリカ陸軍が定めた医療搬送および多用途ヘリコプターの要件を満たすためにベル・ヘリコプター社によって開発され、1956年に初飛行しました。UH-1はアメリカ軍向けに製造された最初のタービンエンジン搭載ヘリコプターであり、1960年以降16,000機以上が製造されています。"
 SPR_transport_helicopter_2: "エアバス・ヘリコプター AS 332 シュペルピューマ"
 SPR_transport_helicopter_2_short: "As332 シュペルピューマ"
 SPR_transport_helicopter_2_desc: "A four-bladed, twin-engine, medium-size utility helicopter developed and marketed by Airbus Helicopters. It is a re-engined and more voluminous version of the original Aérospatiale SA 330 Puma."
 SPR_transport_helicopter_3: "ボーイング CH-47 チヌーク"
 SPR_transport_helicopter_3_short: "CH-47 チヌーク"
 SPR_transport_helicopter_3_desc: "Twin-engined, tandem rotor, heavy-lift helicopter developed by American rotorcraft company Vertol and manufactured by Boeing Rotorcraft Systems. The CH-47 is among the heaviest lifting Western helicopters. The Chinook possesses several means of loading various cargoes, including multiple doors across the fuselage, a wide loading ramp located at the rear of the fuselage, and a total of three external ventral cargo hooks to carry underslung loads, as well."
 SPR_transport_helicopter_4: "NHインダストリーズ NH-90"
 SPR_transport_helicopter_4_short: "NH-90"
 SPR_transport_helicopter_4_desc: "A medium-sized, twin-engine, multi-role military helicopter. It was developed in response to NATO requirements for a battlefield helicopter which would also be capable of being operated in naval environments. The Spanish NH90 variant features domestically assembled General Electric CT7 8F5 engines, customised communications suite, and Indra-developed electronic warning systems."
 SPR_transport_helicopter_5: "シコルスキー UH-60 ステルスホーク"
 SPR_transport_helicopter_5_short: "シコルスキー UH-60S ステルスホーク"
 SPR_attack_helicopter_1: "ベル・ヘリコプター テキストロン AH-1 コブラ"
 SPR_attack_helicopter_1_short: "AH-1 コブラ"
 SPR_attack_helicopter_1_desc: "A two-blade, single-engine attack helicopter manufactured by Bell Helicopter. It was developed using the engine, transmission and rotor system of the Bell UH-1 Iroquois. A member of the prolific Huey family, the AH-1 is also referred to as the HueyCobra or Snake. The Spanish Navy designated the type \"Z-14\". These were equipped with the M35 20 mm cannon system, and were used to support coastal patrol boats."
 SPR_attack_helicopter_2: "ベル・ヘリコプター OH-58A カイオワ"
 SPR_attack_helicopter_2_short: "OH-58A カイオワ"
 SPR_attack_helicopter_2_desc: "The OH-58A Kiowa is a 4-place observation helicopter. The Kiowa has two-place pilot seating, although the controls in the left seat are designed to be removed to carry a passenger up front. During its Vietnam development, it was fitted with the M134 Minigun, a 7.62 mm electrically operated machine gun."
 SPR_attack_helicopter_3: "ユーロコプター ティーガー"
 SPR_attack_helicopter_3_short: "ティーガー"
 SPR_attack_helicopter_4: "ユーロコプター ティーガー E Mk2"
 SPR_attack_helicopter_4_short: "ティーガー E Mk2"
 SPR_attack_helicopter_4_desc: "A four-bladed, twin-engined attack helicopter. It is manufactured by Airbus Helicopters, wich designate it as the EC665. In Spain it is called the Tigre. The Tigre has the distinction of being the first all-composite helicopter developed in Europe; incorporates advanced features such as a glass cockpit, stealth technology, and high agility to increase its survivability."
 SPR_attack_helicopter_5: "エアバス・ヘリコプターズ EC665 ティーガー Mark3"
 SPR_attack_helicopter_5_short: "ティーガー MK3"
 SPR_attack_helicopter_5_desc: "スペインはフランス、ドイツ、オーストラリアと協力し、タイガーHAD（タイガーMk3）の改修を行いました。この改修の重要な点は、共通対戦車ミサイルの採用と、通信システムなどの改良です。"
