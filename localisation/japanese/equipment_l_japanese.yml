 ICE_infantry_weapons_3_desc: "M16A2ライフルの開発は、ベトナム戦争におけるXM16E1およびM16A1の戦闘経験を踏まえ、アメリカ海兵隊から要請されました。1982年に国防総省によって「US Rifle, 5.56mm, M16A2」として正式に採用されました。海兵隊は1980年代初頭から中頃にアメリカ軍で初めてM16A2を採用し、その後1980年代後半にはアメリカ陸軍もこれに続きました。"
 ICE_infantry_weapons_4_desc: "ヘッケラー＆コッホG36（ゲヴェーア36）は、ドイツの兵器メーカーであるヘッケラー＆コッホが1990年代初頭に、より重たい7.62x51mm弾を使用するG3モデルの代替として設計した5.56x45mm弾を使用するアサルトライフルです。1990年代半ばにはドイツ連邦軍に採用され、G3の後継として採用されました。その後、輸出も盛んに行われ、ドイツ、スペイン、イギリスなど、多くの国の軍隊や警察で活躍しています。"
 ICE_infantry_weapons_5_desc: "G36A2モデルは、G36モデルの改良型です。G36A2は、ピカティニーレールに取り付けられたクイックデタッチャブルのツァイスRSAリフレックスレッドドットサイトを搭載しており、デュアルコンバットサイティングシステムのオリジナルのレッドドットサイトと交換できます。G36A2アップグレードキットには、短縮されたG36Cストック、オプションの4つのピカティニーレールを備えた新しいアルミ製ハンドガード、そしてエリコン・コントレイブLLM01レーザーライトモジュールを操作するためのスイッチが組み込まれた垂直フォアグリップが含まれています。"
 ICE_infantry_weapons_6_desc: "ヘッケラー＆コッホHK416は、5.56x45mm NATO弾を使用するガス作動式アサルトライフルです。ドイツのヘッケラー＆コッホ社によって設計・製造されています。AR-15クラスの銃器をベースとしていますが、ヘッケラー＆コッホ社が開発したG36ファミリーのライフルから受け継いだ独自のショートストローク・ガスピストンシステムを採用しています。また、HK416は、複数のアクセサリーを装着できるよう、四方にレールを備えた独自のアクセサリーレールフォアアームを装備しています。"
