 KAZ_infantry_weapons_6_desc: "AK-12はロシアの新しいアサルトライフルです。「ラトニク未来歩兵計画」に基づいて開発されました。特殊部隊向けに製造され、AK-103の生産を置き換える予定です。AK-12はバランスと人間工学の改良により、現在ロシアで最も高性能なアサルトライフルとなっています。"
 FYR_infantry_weapons_1_desc: "1959年に開発されたAKMは、ミハイル・カラシニコフが開発したAK-47ライフルの最も一般的な近代化バージョンである。AKMは、その前身よりもはるかに軽量で、自動射撃時の精度が向上している。"
 FYR_infantry_weapons_2_desc: "AK-74はAKMをベースに開発され、前身機種に比べて大幅な改良が施されています。特に注目すべきは、当時の標準であったワルシャワ条約機構加盟国による7.62mm弾ではなく、5.45mm弾を使用する点です。"
 FYR_infantry_weapons_3_desc: "AK-74N は内部的には AK-74 と似ていますが、光学機器用のダブテールマウントが装備されています。"
