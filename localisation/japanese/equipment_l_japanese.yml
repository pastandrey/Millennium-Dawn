 TAT_SP_Anti_Air_1: "9K35 ストレラ-10"
 TAT_SP_Anti_Air_2: "2K22 ツングースカ"
 TAT_SP_Anti_Air_2_desc: "最大8発のミサイルを発射するこの機械は、接近するあらゆる航空機を撃墜することができる。それだけでなく、機関砲で輸送機を粉砕することも可能である。"
 TAT_SP_Anti_Air_3: "パーンツィリ-S1M"
 TAT_SP_Anti_Air_4: "パーンツィリ-S4L"
 TAT_SP_R_arty_0: "BM-21 グラート"
 TAT_SP_R_arty_0_desc: "近代的な作戦ではあまり使用されないが、SAMSとMLRSの祖父は主に第二次世界大戦とアフガニスタンで使用された。有効射程は20kmである。"
 TAT_SP_R_arty_1: "BM-30 スメルチ"
 TAT_SP_R_arty_1_desc: "この車両はグラートのより現代的なバージョンである。雪、氷、砂漠など、世界のどこへでも行くことができる。有効射程は35kmである。"
 TAT_SP_R_arty_2: "9A52-4 トーネード"
 TAT_SP_R_arty_2_desc: "対処しなければ都市全体を破壊できる、極めて重い砲兵中隊である。最大射程は90km。"
 TAT_SP_arty_0: "2S1 グヴォズジーカ"
 TAT_SP_arty_0_desc: "2S1 グヴォズディカは、MT-LBu多目的シャーシをベースにしたソ連の自走榴弾砲で、122mm 2A18榴弾砲を搭載している。「2S1」はGRAUの名称である。ロシアでの名称はSAU-122だが、陸軍では一般にグヴォズディカとして知られている。"
 TAT_SP_arty_1: "2S3 アカーツィヤ"
 TAT_SP_arty_1_desc: "必要とあらば天から太陽を撃ち落とすことも可能な152.4mm D-22砲を装備している。これは射程50kmの注目すべき砲兵中隊である。"
 TAT_SP_arty_2: "2S19M2 ムスタ-S"
 TAT_SP_arty_2_desc: "2S19 ムスタ-Sは冷戦末期に開発され、新技術を取り入れ、前任機と比較して射程が向上した。"
 TAT_SP_arty_3: "2S35 コアリツィヤ-SV"
 TAT_SP_arty_3_desc: "2S35は、広範な自動化、自動砲弾種別選択、及び統一された指揮統制システムを備えた、真の21世紀の砲兵プラットフォームである。"
 TAT_SP_arty_4: "2S38 コアリツィヤ-M"
 TAT_artillery_0: "D-30"
 TAT_artillery_0_desc: "ソ連によって多くの戦争で使用された122mm牽引式砲兵中隊。射程は15～25km。"
 TAT_artillery_1: "2A65 ムスタ-B"
 TAT_artillery_1_desc: "この野獣のような大砲は、152mm榴弾を28.9km先まで発射し、歩兵小隊や車両縦隊全体を撃破することができる。"
 TAT_artillery_2: "D-40"
 TAT_artillery_3: "D-50"
 TAT_artillery_4: "D-60"
 TAT_util_vehicle_1: "ZIL-131"
 TAT_util_vehicle_1_desc: "世界中の多くの軍隊で使用されている兵站トラック及び兵員輸送車である。"
 TAT_util_vehicle_2: "ウラル-4320"
 TAT_util_vehicle_2_desc: "世界中の多くの軍隊で使用されている兵站トラック及び兵員輸送車である。"
 TAT_util_vehicle_3: "KamAZ-4310"
 TAT_util_vehicle_3_desc: "世界中の多くの軍隊で使用されている兵站トラック及び兵員輸送車である。"
 TAT_util_vehicle_4: "KamAZ-4350"
 TAT_util_vehicle_4_desc: "フォルクと同様に、この車両は8門の重機関銃を搭載できるだけでなく、上部には重機関銃も搭載可能。車列の先導に用いられる。"
 TAT_util_vehicle_5: "GAZ ティーグル"
 TAT_util_vehicle_5_desc: "この装甲兵員輸送車はさまざまな武器を搭載でき、最大 11 人の兵員を輸送できます。"
 TAT_util_vehicle_6: "VPK-3927 ヴォルク"
 TAT_util_vehicle_6_desc: "The VPK can carry 2+8 men. With STANAG 4569 Level 3 armor. Great for special forces and police forces."
 TAT_util_vehicle_7: "Z-STS アフマト"
 TAT_util_vehicle_7_desc: "Z-STS Akhmat is made on the Trehosnaya all-wheel drive chassis KAMAZ-5350. It has high characteristics of mobility and patency, and in addition, it does not differ in the complexity of operation. It is curious that an armored car, unlike a basic truck, is built according to the hood scheme. This made it possible to shift the crew's places back and increase their safety."
 PMR_Anti_Air_0: "9K32 ストレラ-2"
 PMR_Anti_Air_0_desc: "冷戦初期に比例航法ロジックを使用して設計され、アメリカの核爆撃機をロックオンして破壊することを目的としている。3700～4200mの目標を攻撃できる最も基本的な対空砲の1つである。"
 PMR_Anti_Air_1: "9K38 イグラ"
 PMR_Anti_Air_1_desc: "イグラはストレラのより近代的なバージョンであり、2004年にロシアによって配備された。ストレラよりもはるかに優れたデュアル波長帯赤外線（Sバージョン）誘導システムを使用している。"
 PMR_Anti_Air_2: "9K38 イグラ-S"
 PMR_Anti_Air_2_desc: "最新の派生型であり、射程が長く、より感度の高いシーカー、最新の対抗手段に対する耐性の向上、及びより重い弾頭を備えた大幅に改良された派生型である。製造業者は命中確率を0.8～0.9と報告している。"
 PMR_APC_1: "BTR-60"
 PMR_APC_1_desc: "現在も現役の旧式車両の1つであるBTR-60には、装弾数500発の14.5mm KPVT重機関銃が搭載されている。副兵装は、装弾数3,000発の7.62mm pkt同軸機銃である。軽歩兵の移動やQRFに最適である。"
 PMR_APC_1_short: "BTR-60"
 PMR_APC_2: "MT-LB"
 PMR_APC_2_desc: "MT-LBは1970年代に製造された。安価で高速に製造されたため、ソビエト連邦では軽対空戦闘や歩兵戦闘に使用された。"
 PMR_APC_2_short: "MT-LB"
 PMR_APC_3: "BTR-70"
 PMR_APC_3_desc: "BTR-70は1972年から使用されており、ソ連・アフガニスタン戦争では部隊の移動と火力支援に使用された。BTR-60との唯一の違いは、装甲がより重いことである。"
 PMR_APC_3_short: "BTR-70"
 PMR_APC_4: "BTR-80"
 PMR_APC_4_desc: "BTR-80は、ソ連で設計された8x8輪の水陸両用装甲兵員輸送車である。1986年に採用され、ソ連軍の従来の車両であるBTR-60およびBTR-70に代わるものであった。ソ連のアフガニスタン戦争中に初めて配備された。"
 PMR_APC_4_short: "BTR-80"
 PMR_APC_5: "BTR-90"
 PMR_APC_5_desc: "1994年に、対テロ戦闘員用に製造された。装弾数500発の30mmシプノフ2A42機関砲で強力な打撃力を持つ。"
 PMR_APC_5_short: "BTR-90"
