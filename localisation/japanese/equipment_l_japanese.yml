 CAN_CV_L_Strike_fighter3_short: "CF-A8B ハリアー II"
 CAN_CV_L_Strike_fighter4: "CF-35B ライトニング II"
 CAN_CV_L_Strike_fighter4_short: "CF-35B ライトニング II"
 CAN_CV_L_Strike_fighter5: "CF-79B オーシャンレイダー"
 CAN_CV_L_Strike_fighter5_short: "CF-79B オーシャンレイダー"
 CAN_naval_plane4: "P-8 ポセイドン"
 CAN_naval_plane4_short: "P-8 ポセイドン"
 CRM_Anti_Air_0: "9K32 ストレラ-2"
 CRM_Anti_Air_0_desc: "冷戦初期に比例航法ロジックを使用して設計され、アメリカの核爆撃機をロックオンして破壊することを目的としている。3700～4200mの目標を攻撃できる最も基本的な対空砲の1つである。"
 CRM_Anti_Air_1: "9K38 イグラ"
 CRM_Anti_Air_1_desc: "イグラはストレラのより近代的なバージョンであり、2004年にロシアによって配備された。ストレラよりもはるかに優れたデュアル波長帯赤外線（Sバージョン）誘導システムを使用している。"
 CRM_Anti_Air_2: "9K38 イグラ-S"
 CRM_Anti_Air_2_desc: "最新の派生型であり、射程が長く、より感度の高いシーカー、最新の対抗手段に対する耐性の向上、及びより重い弾頭を備えた大幅に改良された派生型である。製造業者は命中確率を0.8～0.9と報告している。"
 CRM_Anti_Air_3: "9K42"
 CRM_Anti_Air_4: "9K48"
 CRM_APC_1: "BTR-60"
 CRM_APC_1_desc: "現在も現役の旧式車両の1つであるBTR-60には、装弾数500発の14.5mm KPVT重機関銃が搭載されている。副兵装は、装弾数3,000発の7.62mm pkt同軸機銃である。軽歩兵の移動やQRFに最適である。"
 CRM_APC_1_short: "BTR-60"
 CRM_APC_2: "MT-LB"
 CRM_APC_2_desc: "MT-LBは1970年代に製造された。安価で高速に製造されたため、ソビエト連邦では軽対空戦闘や歩兵戦闘に使用された。"
 CRM_APC_2_short: "MT-LB"
 CRM_APC_3: "BTR-70"
 CRM_APC_3_desc: "BTR-70は1972年から使用されており、ソ連・アフガニスタン戦争では部隊の移動と火力支援に使用された。BTR-60との唯一の違いは、装甲がより重いことである。"
 CRM_APC_3_short: "BTR-70"
 CRM_APC_4: "BTR-80"
 CRM_APC_4_desc: "BTR-80は、ソ連で設計された8x8輪の水陸両用装甲兵員輸送車である。1986年に採用され、ソ連軍の従来の車両であるBTR-60およびBTR-70に代わるものであった。ソ連のアフガニスタン戦争中に初めて配備された。"
 CRM_APC_4_short: "BTR-80"
 CRM_APC_5: "BTR-90"
 CRM_APC_5_desc: "1994年に、対テロ戦闘員用に製造された。装弾数500発の30mmシプノフ2A42機関砲で強力な打撃力を持つ。"
 CRM_APC_5_short: "BTR-90"
 CRM_APC_6: "クルガネツ-25"
 CRM_APC_6_desc: "より近代的なロシア車両の一つであるクルガネツ-25は2015年に製造された。IFVとして製造され、ブーメランク-BM軽機関砲と12.7mmコルド機関銃を装備している。アメリカのブラッドレーIFVに酷似してモデル化されている。"
 CRM_APC_6_short: "クルガネツ-25"
 CRM_APC_7: "クルガネツ-35"
 CRM_APC_7_desc: "主にIFVである25型と同様に、APCである35型は12名を輸送でき、IFV運用において25型とほぼ同様の能力を発揮する。"
 CRM_APC_7_short: "クルガネツ-35"
 CRM_APC_8: "クルガネツ-45"
 CRM_APC_8_desc: "このスーパーAPCについては多くは知られていないが、40mm機関砲を搭載し、12名を輸送できる。"
 CRM_APC_8_short: "クルガネツ-45"
 CRM_Heavy_Anti_tank_0: "BRDM-2 9P148 コンクルス"
 CRM_Heavy_Anti_tank_0_desc: "多くの戦争や多くの車両で使用された。有効射程は500～3,000mである。"
 CRM_Heavy_Anti_tank_1: "MTLB コンクルス"
 CRM_Heavy_Anti_tank_1_desc: "複数発射可能な、より重いミサイルシステムである。コンクールスは4km先の目標に命中し、敵の最大の戦車を破壊することができる。"
 CRM_Heavy_Anti_tank_2: "コルネット-E"
 CRM_Heavy_Anti_tank_3: "コルネットDM"
 CRM_Heavy_Anti_tank_4: "9M178 人民"
 CRM_IFV_1: "BMP-1"
 CRM_IFV_1_desc: "BMP-1はソ連の水陸両用装軌式歩兵戦闘車である。ソ連・アフガニスタン戦争で兵士の輸送やジハード戦士との戦闘に使用された。73mm2A28とATGMランチャーを使用している。"
 CRM_IFV_1_short: "BMP-1"
 CRM_IFV_2: "BMP-2"
 CRM_IFV_2_desc: "ジハード主義者の最大の恐怖は、30mm砲と強力な履帯を備え、極めて高速かつ効率的なBMP-2である。"
 CRM_IFV_2_short: "BMP-2"
 CRM_IFV_3: "BMP-2M"
 CRM_IFV_3_short: "BMP-2M"
 CRM_IFV_4: "BMP-3"
 CRM_IFV_4_desc: "BMP-3はソ連の歩兵戦闘車で、BMP-1およびBMP-2の後継車である。100mm砲と重榴弾を発射する。"
 CRM_IFV_4_short: "BMP-3"
 CRM_IFV_5: "BMP-3M"
 CRM_IFV_5_desc: "BMP-3Mはソビエトの歩兵戦闘車であり、BMP-1およびBMP-2の後継車であり、3の派生型である。改良された大砲とエンジンを使用する。"
 CRM_IFV_5_short: "BMP-3M"
 CRM_IFV_6: "T-15 アルマータ"
 CRM_IFV_6_desc: ""
 CRM_IFV_6_short: "T-15"
 CRM_IFV_7: "T-15M"
 CRM_IFV_7_short: "T-15M"
 CRM_IFV_8: "T-16"
 CRM_IFV_8_short: "T-16"
 CRM_Anti_tank_0: "RPG-7"
 CRM_Anti_tank_0_desc: "多くの戦争や多くの車両で使用された。"
 CRM_Anti_tank_1: "AT-4 ファゴット"
 CRM_Anti_tank_1_desc: "他のATGMシステムよりもはるかに軽量で旧式である。このATGMは70～2,500mでしか命中せず、他と比較して射程がはるかに短いが、より安価でもある。"
 CRM_Anti_tank_2: "9M133M コルネットM"
 CRM_Anti_tank_2_desc: "9M133M コルネットM"
 CRM_Anti_tank_3: "9M134M ブラート-M"
 CRM_Anti_tank_4: "9M142 シチューカ"
 CRM_MBT_1: "T-55"
 CRM_MBT_1_desc: "T-54/55は、おそらく世界で最も多く生産された戦車である。冷戦初期に設計・生産され、赤軍の力と屋台骨であった。かつてロシアの力の象徴として恐れられたが、アメリカの空爆によって破壊される中東の装甲部隊の象徴的な表現となっている。"
 CRM_MBT_1_short: "T-55"
 CRM_MBT_2: "T-72"
 CRM_MBT_2_desc: "T-72は、おそらくロシアが生産した中で最も成功した設計である。冷戦終結期におけるソ連軍事力の頂点であり、数千両が生産され、今日に至るまでロシア陸軍の屋台骨として機能している。中東紛争での壊滅的な失敗で悪名高くなったものの、T-72は依然として将来のロシア戦車設計の開発プラットフォームとして使用されており、今日の近代戦の基準を満たすために絶え間ない改良とアップグレードが施されている。かつてソ連軍の槍であったこの戦車を過小評価してはならない。"
 CRM_MBT_2_short: "T-72"
 CRM_MBT_3: "T-80"
 CRM_MBT_3_desc: "この200万ドルの戦車であり戦場の野獣は、T-72と同じ主砲を使用し、追加装甲とコブラATGMを装備している。"
 CRM_MBT_3_short: "T-80"
 CRM_MBT_4: "T-90"
 CRM_MBT_4_desc: "最大の射撃能力と効率性のために3門の砲システムで武装している。3門の125mm砲発射機を装備。"
 CRM_MBT_4_short: "T-90"
 CRM_MBT_5: "T-14 アルマータ"
 CRM_MBT_5_desc: "流麗な外形と強力な152mm砲を備えた、ロシア陸軍で最も先進的な主力戦車である。"
 CRM_MBT_5_short: "T-14"
 CRM_MBT_7: "T-14M"
 CRM_MBT_7_short: "T-14M"
 CRM_MBT_8: "T-99 黒い鷲"
 CRM_MBT_8_short: "T-99"
 CRM_mbt_equipment_0: "T-62"
 CRM_mbt_equipment_1: "T-72"
 CRM_mbt_equipment_2: "T-90"
 CRM_mbt_equipment_3: "T-14"
 CRM_mbt_equipment_4: "T-24"
 CRM_Rec_tank_0: "PT-76"
 CRM_Rec_tank_0_desc: "この超高速水陸両用軽戦車は、川の向こうから敵陣地に忍び寄り、猛攻撃を加えることができる。76.2mm D-56Tライフル戦車砲を装備。"
 CRM_Rec_tank_0_short: "PT-76"
 CRM_Rec_tank_1: "2S25 スプルート-SD"
 CRM_Rec_tank_1_desc: "自走水陸両用戦車駆逐車であり、この車両は敵戦車に忍び寄り、T-72やT-80が搭載する125mm砲を発射することができる。"
 CRM_Rec_tank_1_short: "2S25 スプルート-SD"
 CRM_Rec_tank_2: "BMPT ターミネーター"
 CRM_Rec_tank_2_desc: "おそらくこれまでに作られた中で最も強力なガラスの大砲の一つである。戦車には対抗できないが、一個縦隊全体を破壊することができる。130mm発射機4基と30mm機関砲2門を装備している。"
 CRM_Rec_tank_2_short: "BMPT ターミネーター"
 CRM_Rec_tank_3: "K-18 ブーメランク"
 CRM_Rec_tank_3_desc: "ブーメランクは当初、近代ロシア陸軍向けの費用対効果の高いAPC兼IFVとして発表された。しかし、ブーメランクは専用の対戦車プラットフォームとしても使用され、125mm砲を搭載することが2018年に詳細が明らかにされた。アメリカのストライカーMGSと同様に、ブーメランクはBMPTのような火力支援車両として機能する。"
 CRM_Rec_tank_4: "2025年型軽戦車"
 CRM_Rec_tank_4_short: "2025年型軽戦車"
 CRM_Rec_tank_5: "2035年型軽戦車"
 CRM_Rec_tank_5_short: "2035年型軽戦車"
 CRM_SP_Anti_Air_0: "ZSU-23-4 シルカ"
 CRM_SP_Anti_Air_1: "9K35 ストレラ-10"
 CRM_SP_Anti_Air_2: "2K22 ツングースカ"
 CRM_SP_Anti_Air_2_desc: "最大8発のミサイルを発射するこの機械は、接近するあらゆる航空機を撃墜することができる。それだけでなく、機関砲で輸送機を粉砕することも可能である。"
 CRM_SP_Anti_Air_3: "パーンツィリ-S1M"
 CRM_SP_Anti_Air_4: "パーンツィリ-S4L"
 CRM_SP_R_arty_0: "BM-21 グラート"
 CRM_SP_R_arty_0_desc: "近代的な作戦ではあまり使用されないが、SAMSとMLRSの祖父は主に第二次世界大戦とアフガニスタンで使用された。有効射程は20kmである。"
 CRM_SP_R_arty_1: "BM-30 スメルチ"
 CRM_SP_R_arty_1_desc: "この車両はグラートのより現代的なバージョンである。雪、氷、砂漠など、世界のどこへでも行くことができる。有効射程は35kmである。"
 CRM_SP_R_arty_2: "9A52-4 トーネード"
 CRM_SP_R_arty_2_desc: "対処しなければ都市全体を破壊できる、極めて重い砲兵中隊である。最大射程は90km。"
 CRM_SP_arty_0: "2S1グヴォズジーカ"
 CRM_SP_arty_0_desc: "2S1 グヴォズディカは、MT-LBu多目的シャーシをベースにしたソ連の自走榴弾砲で、122mm 2A18榴弾砲を搭載している。「2S1」はGRAUの名称である。ロシアでの名称はSAU-122だが、陸軍では一般にグヴォズディカとして知られている。"
 CRM_SP_arty_1: "2S3 アカーツィヤ"
 CRM_SP_arty_1_desc: "必要とあらば天から太陽を撃ち落とすことも可能な152.4mm D-22砲を装備している。これは射程50kmの注目すべき砲兵中隊である。"
 CRM_SP_arty_2: "2S19M2 ムスタ-S"
 CRM_SP_arty_2_desc: "2S19 ムスタ-Sは冷戦末期に開発され、新技術を取り入れ、前任機と比較して射程が向上した。"
 CRM_SP_arty_3: "2S35 コアリツィヤ-SV"
 CRM_SP_arty_3_desc: "2S35は、広範な自動化、自動砲弾種別選択、及び統一された指揮統制システムを備えた、真の21世紀の砲兵プラットフォームである。"
 CRM_SP_arty_4: "2S38 コアリツィヤ-M"
 CRM_artillery_0: "D-30"
 CRM_artillery_0_desc: "ソ連によって多くの戦争で使用された122mm牽引式砲兵中隊。射程は15～25km。"
 CRM_artillery_1: "2A65 ムスタ-B"
 CRM_artillery_1_desc: "この野獣のような大砲は、152mm榴弾を28.9km先まで発射し、歩兵小隊や車両縦隊全体を撃破することができる。"
 CRM_artillery_2: "D-40"
 CRM_artillery_3: "D-50"
 CRM_artillery_4: "D-60"
 CRM_util_vehicle_1: "ZIL-131"
 CRM_util_vehicle_1_desc: "世界中の多くの軍隊で使用されている兵站トラック及び兵員輸送車である。"
 CRM_util_vehicle_2: "ウラル-4320"
 CRM_util_vehicle_2_desc: "世界中の多くの軍隊で使用されている兵站トラック及び兵員輸送車である。"
 CRM_util_vehicle_3: "KamAZ-4310"
 CRM_util_vehicle_3_desc: "世界中の多くの軍隊で使用されている兵站トラック及び兵員輸送車である。"
 CRM_util_vehicle_4: "KamAZ-4350"
 CRM_util_vehicle_4_desc: "フォルクと同様に、この車両は8門の重機関銃を搭載できるだけでなく、上部には重機関銃も搭載可能。車列の先導に用いられる。"
 CRM_util_vehicle_5: "GAZ ティーグル"
 CRM_util_vehicle_5_desc: "この装甲兵員輸送車はさまざまな武器を搭載でき、最大 11 人の兵員を輸送できます。"
 CRM_util_vehicle_6: "VPK-3927 ヴォルク"
 CRM_util_vehicle_6_desc: "The VPK can carry 2+8 men. With STANAG 4569 Level 3 armor. Great for special forces and police forces."
 CRM_util_vehicle_7: "Z-STS アフマト"
 CRM_util_vehicle_7_desc: "Z-STS Akhmat is made on the Trehosnaya all-wheel drive chassis KAMAZ-5350. It has high characteristics of mobility and patency, and in addition, it does not differ in the complexity of operation. It is curious that an armored car, unlike a basic truck, is built according to the hood scheme. This made it possible to shift the crew's places back and increase their safety."
