 VEN_infantry_weapons_5_desc: "AK-103アサルトライフルは、7.62x39mm M43弾を使用するAK-74Mの派生型です。旧型のAKMと同様に、103は暗視装置や望遠鏡など、様々な照準装置を装備できます。また、銃剣やグレネードランチャーも装備可能です。多くのAKと異なる点は、103がプラスチック製で安価な素材を使用していることです。"
 VEN_infantry_weapons_6_desc: "AK-12はロシアの新しいアサルトライフルです。「ラトニク未来歩兵計画」に基づいて開発されました。特殊部隊向けに製造され、AK-103の生産を置き換える予定です。AK-12はバランスと人間工学の改良により、現在ロシアで最も高性能なアサルトライフルとなっています。"
 OMA_infantry_weapons_2_desc: "G3A3はG3の中で最もよく知られているバージョンです。改良されたフロントサイトと新たに改良されたリアドラムサイト、フラッシュサプレッサー/マズルブレーキ、固定式の頑丈なプラスチック製バットストック、そしてフリーフローティングバレルに接触しないプラスチック製ハンドガードを備えています。ハンドガードはスリムでベンチレーション機能を備えたバージョンとワイドバージョンがあり、後者はバイポッドを装着することで安定性が向上します。"
 OMA_infantry_weapons_3_desc: "M16A2ライフルの開発は、ベトナム戦争におけるXM16E1およびM16A1の戦闘経験を踏まえ、アメリカ海兵隊から要請されました。1982年に国防総省によって「US Rifle, 5.56mm, M16A2」として正式に採用されました。海兵隊は1980年代初頭から中頃にアメリカ軍で初めてM16A2を採用し、その後1980年代後半にはアメリカ陸軍もこれに続きました。"
 OMA_infantry_weapons_4_desc: "ヘッケラー＆コッホG36（ゲヴェーア36）は、ドイツの兵器メーカーであるヘッケラー＆コッホが1990年代初頭に、より重たい7.62x51mm弾を使用するG3モデルの代替として設計した5.56x45mm弾を使用するアサルトライフルです。1990年代半ばにはドイツ連邦軍に採用され、G3の後継として採用されました。その後、輸出も盛んに行われ、ドイツ、スペイン、イギリスなど、多くの国の軍隊や警察で活躍しています。"
 OMA_infantry_weapons_5_desc: "M4カービンは、M16アサルトライフルの短縮型・軽量型です。M4は、5.56x45mm NATO弾を使用し、空冷式、ダイレクトインピンジメント式、ガス作動式、マガジン給弾式のカービンです。14.5インチ（370mm）の銃身と伸縮式ストックを備えています。"
 UAE_infantry_weapons_2_desc: "G3A3はG3の中で最もよく知られているバージョンです。改良されたフロントサイトと新たに改良されたリアドラムサイト、フラッシュサプレッサー/マズルブレーキ、固定式の頑丈なプラスチック製バットストック、そしてフリーフローティングバレルに接触しないプラスチック製ハンドガードを備えています。ハンドガードはスリムでベンチレーション機能を備えたバージョンとワイドバージョンがあり、後者はバイポッドを装着することで安定性が向上します。"
