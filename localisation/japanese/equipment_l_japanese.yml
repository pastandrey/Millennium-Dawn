 CZE_attack_helicopter_1: "ミル Mi-171S"
 CZE_attack_helicopter_1_desc: "Domestically overhauled Mi-8/Mi-17/Mi-18 into basic attach helicopter equipped with AGM and AAM missile on its underwing pylons. The helicopter is still capable of carrying 16 passengers inside its airframe."
 CZE_attack_helicopter_2: "Mi-24D"
 CZE_attack_helicopter_2_desc: "ソ連製の Mi-24 の国内生産輸出バージョンで、新しいセンサー アレイ、光学系、ヘリコプターを介したネットワークの改良など、チェコの新しいソフトウェアとハ​​ードウェアが搭載され、現代の基準に合わせて簡素化されています。"
 CZE_attack_helicopter_3: "Mi-35M"
 CZE_attack_helicopter_3_desc: "Mi-35M is 1st batch of modernizations to this craft. It has 6 underwing pylons which can carry many types of guided, unguided weapon systems or gunpods of the latest generation."
 CZE_attack_helicopter_4: "BL-38 ブレスク"
 CZE_attack_helicopter_4_desc: "Experience from past helicopter upgrades and projects allowed us to design our own battle helicopter. The result is BV-14 Blesk who has pusher propeller in addition to the main rotor allowing this helicopter to fly at amazing 450kph speeds. This was also achieved by making its shape very streamlined and aerodynamic and putting all weapons unside its internal storage for them. In emergency situations, there are always two Air-to-Air missiles ready to be fired even from this internal space to the 90°degree radius in front of the helicopter."
 CZE_attack_helicopter_5: "BV-43 ヴィクル"
 CZE_attack_helicopter_5_desc: "First stealth helicopter prototypes with code names BV-40, 41 and 42 resulted in this machine combining their abilities together. The helicopter uses many features from BV-38 and features also internal automatic reloader for missiles allowing the helicopter to have none external pylons even when needed unlike in the BV-38. There are 4 shafts for the missiles instead loaded with two AGM and two AAM with another 16 missiles of each type in the automatic reloader."
 CZE_transport_helicopter_1: "ミル Mi-4 CZ"
 CZE_transport_helicopter_1_desc: "Domestically produced version of Soviet Mi-4 used for various cargo transfers and troop paradrops featuring new engine and refitted internal space of the airframe featuring bigger cargo space and new cockpit design."
 CZE_transport_helicopter_2: "ミル Mi-17M CZ"
 CZE_transport_helicopter_2_desc: "Domestically produced version of Soviet Mi-8 used as large cargo hauler capable of transporting 16 passengers and 2 pilots. It has new digital cockpit and side-mounted MGs."
 CZE_transport_helicopter_3: "V-5 コロヴラーテク"
 CZE_transport_helicopter_3_desc: "Experience from past helicopter upgrades and projects allowed us to design our own machines from the ground. The result is V-1,2,3 and 4 prototypes. And their first production model of V-5. It has 26m rotor blades allowing it to haul many tons of cargo or small vehicle."
 CZE_transport_helicopter_4: "V-15 スコカン"
 CZE_transport_helicopter_4_desc: "This helicopter has two rotors mounted on wings and can haul even larger amount of cargo or passengers to the destination. It is also armed with defensive armament and Air-to-Air missiles."
 CZE_transport_helicopter_5: "V-41 ソコル"
 CZE_transport_helicopter_5_desc: "Stealth helicopter with aerodynamic airframe coated with radar absorbent materials, storing cargo and optionally mounted weapons inside internal weapons bay."
