l_japanese:
 internal_factions_events.53.t: "党への忠誠心が精査の対象に"
 internal_factions_events.53.d: "共産党幹部は、思想的に信頼できないと考える官僚のリストを政府に提出した。彼らは正式な忠誠調査の実施と、党の基準を満たさない者の排除を求めている。"
 internal_factions_events.53.o1: "粛清を実行する"
 internal_factions_events.53.o2: "彼らの要求を拒否する"
 internal_factions_events.53.o3: "限定的な調査を開始する"
 internal_factions_events.54.t: "幹部が集団化を要求"
 internal_factions_events.54.d: "共産党幹部は私有農地の存在に苛立ちを募らせている。彼らは効率性と思想的統一を高めるため、農地を国家管理のもとに統合する集団化運動の開始を政府に求めている。"
 internal_factions_events.54.o1: "集団化を支持する"
 internal_factions_events.54.o2: "提案を拒否する"
 internal_factions_events.54.o3: "限定的な土地改革を進める"
 internal_factions_events.55.t: "産業界が港湾拡張を要求"
 internal_factions_events.55.d: "海運業界は、港の混雑によって毎年数百万の損失が出ていると主張し、沿岸の港湾施設を拡張する提案を提出した。地元の地主や都市計画担当者は、住民の立ち退きや都市機能の混乱を理由に反対している。"
 internal_factions_events.55.o1: "拡張を承認する"
 internal_factions_events.55.o2: "提案を却下する"
 internal_factions_events.55.o3: "妥協案について交渉する"
 internal_factions_events.56.t: "海賊行為が航路を混乱させる"
 internal_factions_events.56.d: "海賊行為の急増により、商業航路が脅威にさらされている。海運業界の代表者は、船舶と貨物を守るための政府の介入を求めており、対策を取らなければ保険料が上昇し投資が阻害されると警告している。"
 internal_factions_events.56.o1: "海軍護衛計画に資金を提供する"
 internal_factions_events.56.o2: "問題を無視する"
 internal_factions_events.56.o3: "国際協力を求める"
 internal_factions_events.57.t: "外国のスパイ組織が発覚"
 internal_factions_events.57.d: "情報分析官は、我が国の領内で活動する外国のスパイ組織を特定した。情報機関は、このネットワークがさらに機密情報を入手する前に断固とした行動を取るよう政府に迫っている。"
 internal_factions_events.57.o1: "組織を公に暴露する"
 internal_factions_events.57.o2: "密かに無力化する"
 internal_factions_events.57.o3: "何も行動しない"
 internal_factions_events.58.t: "議会が情報機関の支出に疑問"
 internal_factions_events.58.d: "次の選挙周期を前に、議会の議員たちは情報機関の不透明な予算について厳しい疑問を提起している。市民団体はより高い説明責任を求めている一方で、情報機関は透明性が進行中の作戦を危険にさらすと警告している。"
 internal_factions_events.58.o1: "予算を全面的に擁護する"
 internal_factions_events.58.o2: "部分的な情報を公開する"
 internal_factions_events.58.o3: "完全な透明性を約束する"
 internal_factions_events.59.t: "外国人戦闘員が国境を越える"
 internal_factions_events.59.d: "進行中の紛争に引き寄せられ、多くの外国人戦闘員が我々の領土へ侵入してきた。彼らは我々の大義のために奉仕すると申し出ているが、その信頼性や規律には不確実性が残る。外国人ジハード主義者ネットワークは、彼らに役割を与えるよう政府に求めている。"
 internal_factions_events.59.o1: "正規部隊に編入する"
 internal_factions_events.59.o2: "直ちに前線へ投入する"
 internal_factions_events.59.o3: "国境で追い返す"
 internal_factions_events.60.t: "ジハード旅団が自治を要求"
 internal_factions_events.60.d: "数を増やしたことで勢いづいた外国人ジハード旅団は、自らの指揮体系の下で行動する自治部隊として正式に認めるよう要求している。彼らは、作戦上の独立性があれば官僚的干渉なしにより効果的に行動できると主張している。"
 internal_factions_events.60.o1: "作戦上の自治を認める"
 internal_factions_events.60.o2: "要求を拒否する"
 internal_factions_events.60.o3: "国家指揮系統に統合する"
 internal_factions_events.61.t: "コッズ部隊が追加資源を要求"
 internal_factions_events.61.d: "コッズ部隊の指導部は、地域における代理勢力作戦を拡大するため、追加の資金と装備を求める正式な要請を提出した。彼らは戦略的機会は今であり、資金不足はライバル勢力に影響力を譲る危険があると主張している。"
 internal_factions_events.61.o1: "全面的に資金を提供する"
 internal_factions_events.61.o2: "部分的な支援を提供する"
 internal_factions_events.61.o3: "要求を拒否する"
 internal_factions_events.62.t: "隣国の脆弱性"
 internal_factions_events.62.d: "コッズ部隊の情報によれば、現在紛争に巻き込まれている隣国は代理勢力による圧力に対して脆弱である。機会の窓は狭いが、潜在的な戦略的利益は大きい。"
 internal_factions_events.62.o1: "状況を利用する"
 internal_factions_events.62.o2: "友好国と情報を共有する"
 internal_factions_events.62.o3: "この機会を見送る"
 establish_political_commissars_decision: "政治将校を配置"
 establish_political_commissars_decision_desc: "思想的忠誠を徹底し士気を高めるため、軍部隊内に党の政治将校を配置する。政治将校は共産党幹部に直接報告し、軍に対する彼らの影響力を強化する。"
 worker_reeducation_programme_decision: "労働者再教育計画"
 worker_reeducation_programme_decision_desc: "労働者の間で党の思想を強化するため、国家主導の再教育計画に資金を投入する。労働者が国家の優先事項へ努力を振り向けることで従順さが高まり、消費需要は低下する。"
 maritime_safety_inspections_decision: "海上安全の義務検査"
 maritime_safety_inspections_decision_desc: "国内のすべての港湾および造船施設に対して包括的な安全検査体制を導入する。基準の向上は業界の信頼を高め、検査期間中の造船所の生産性を改善する。"
 naval_shipping_subsidy_decision: "海運補助金"
 naval_shipping_subsidy_decision_desc: "国内の長距離海運業者に政府の直接補助金を提供する。この計画により商船隊の運用範囲が拡大し、造船所の処理能力が向上する。"
 counter_intelligence_sweep_decision: "対諜報掃討"
 counter_intelligence_sweep_decision_desc: "政府および軍のネットワークに対する外国の侵入を調査するため、情報機関に体系的な掃討作戦を許可する。作戦期間中、外国の諜報活動による損失は減少し、通信の安全性が向上する。"
 expand_intelligence_network_decision: "情報ネットワークの拡張"
 expand_intelligence_network_decision_desc: "新たな海外情報拠点と人的情報資産の設立に資金を提供する。拡張されたネットワークは敵の通信解読能力と外国軍の動向監視能力を向上させる。"
 jihadi_recruitment_drive_decision: "ジハード主義者の募集活動"
 jihadi_recruitment_drive_decision_desc: "共感的なネットワーク全体で積極的な募集キャンペーンを支援し、外国人戦闘員を我々の大義へ引き寄せる。追加の人員が流入し、特殊部隊能力が拡大する。"
 martyr_glorification_campaign_decision: "殉教者顕彰キャンペーン"
 martyr_glorification_campaign_decision_desc: "戦死した戦闘員を称え、殉教を文化的理想として高める宣伝キャンペーンを開始する。戦争への熱狂は大きく高まるが、その過激化するメッセージは過激主義感情を煽る危険がある。"
 support_proxy_networks_decision: "代理勢力ネットワーク支援"
 support_proxy_networks_decision_desc: "コッズ部隊を通じて資金と装備を隣国で活動する地域の代理勢力に提供する。これらのネットワークを強化することで戦略的影響力が拡大し、ライバル勢力に圧力をかけ続ける直接的コストが減少する。"
 quds_force_training_programme_decision: "コッズ部隊訓練計画"
 quds_force_training_programme_decision_desc: "選抜された軍部隊に対して高度な非正規戦訓練を実施することをコッズ部隊に許可する。非通常戦能力が向上し、特殊部隊の戦力が拡大する。"
 internal_factions_events.63.t: "請負企業が輸出契約の獲得を働きかける"
 internal_factions_events.63.d: "防衛請負企業は、海外向け兵器輸出契約の一連の案件を政府が支持するよう強く求めている。彼らはこれらの取引が大きな収益をもたらし、国内生産ラインを維持すると主張しているが、批評家は広範な販売が地域の緊張を高め、望ましくない国際的監視を招く可能性があると警告している。"
 internal_factions_events.63.o1: "全面的な輸出を承認する"
 internal_factions_events.63.o2: "同盟国への販売に限定する"
 internal_factions_events.63.o3: "働きかけを拒否する"
 defense_procurement_programme_decision: "防衛調達計画"
 defense_procurement_programme_decision_desc: "国内兵器メーカーに安定した発注を保証する専用の調達サイクルを開始する。継続的な契約は軍需産業からの税収を増加させ、消費財負担を軽減し、防衛産業の継続的な協力に報いる。"
 classified_research_programme_decision: "機密研究計画"
 classified_research_programme_decision_desc: "防衛産業パートナーを通じて行われる軍事技術研究に機密資金を投入する。この投資により研究成果が加速し、通信の安全性が強化され、計画開始時には資金移転が行われる。"
 issue_government_bonds_decision: "銀行保証付き国債を発行"
 issue_government_bonds_decision_desc: "国際的な銀行ネットワークを通じて管理される銀行保証付き国債の発行を認可する。即時の資本注入は安定性を高めるが、債務返済により期間中は金利がやや上昇する。"
 attract_foreign_investment_decision: "外国投資を誘致"
 attract_foreign_investment_decision_desc: "国際的な銀行関係者と連携し、安定性を示すとともに参入障壁を下げる。この取り組みにより外国投資を受け取るまでの時間が短縮され、流入資本からの税収が増加する。"
 internal_factions_cadre_purge: "幹部の粛清"
 internal_factions_cadre_purge_desc: "党コミッサールが官僚機構全体で忠誠調査を実施しており、行政の混乱と引き換えに思想的規律を強化している。"
 internal_factions_collectivisation_drive: "集団化運動"
 internal_factions_collectivisation_drive_desc: "農業の集団化が進行中であり、私有農場が国家管理へ移行する中で供給網が混乱し、消費財不足が増大している。"
 internal_factions_convoy_escort: "海軍護衛計画"
 internal_factions_convoy_escort_desc: "政府資金による海軍護衛が商業航路を保護しており、海軍要員の自信と経験を高めている。"
 internal_factions_piracy_losses: "海賊行為による混乱"
 internal_factions_piracy_losses_desc: "抑えられていない海賊行為が我々の航路を混乱させ、貿易への信頼を損ない、広範な経済を不安定化させている。"
 internal_factions_neutralised_spies: "諜報ネットワークを解体"
 internal_factions_neutralised_spies_desc: "外国の諜報ネットワークが密かに無力化され、一定期間我々の防諜能力が向上している。"
 internal_factions_transparency_costs: "情報公開の代償"
 internal_factions_transparency_costs_desc: "情報作戦の公開により、敵対者が新たに明らかになった手法へ適応した結果、我々の暗号セキュリティが弱体化している。"
 internal_factions_jihadi_frontline: "ジハード主義者の前線投入"
 internal_factions_jihadi_frontline_desc: "前線へ直接投入された外国人戦闘員は敵戦線を積極的に圧迫しているが、正規軍との連携が不十分なため側面が無防備な状態となっている。"
 internal_factions_jihadi_autonomy: "ジハード自治部隊"
 internal_factions_jihadi_autonomy_desc: "正式に認められた自治ジハード旅団は独自の指揮下で活動しており、我々の特殊部隊の上限を大きく拡大している。"
 internal_factions_jihadi_integrated: "統合ジハード部隊"
 internal_factions_jihadi_integrated_desc: "国家指揮体系に正式に統合された外国人戦闘員は、部隊の結束力と組織の回復速度を向上させている。"
 internal_factions_quds_expanded: "コッズ部隊作戦拡大"
 internal_factions_quds_expanded_desc: "追加資源によりコッズ部隊は代理勢力作戦を拡大できるようになり、外国での破壊活動の維持費が減少している。"
 internal_factions_quds_operation: "コッズ部隊の戦略作戦"
 internal_factions_quds_operation_desc: "コッズ部隊は隣国の不安定な状況を積極的に利用しており、進行中の作戦に戦術的優位をもたらしている。"
 fund_religious_schools_decision: "宗教学校への資金提供"
 fund_religious_schools_decision_desc: "ワッハーブ派ウラマーの監督下で運営される宗教学校のネットワークに政府資金を投入する。これらの機関が影響力を拡大するにつれ、識字率が向上し社会の安定性が高まる。"
 enforce_moral_codes_decision: "道徳規範の施行"
 enforce_moral_codes_decision_desc: "宗教当局に全国で公共の道徳基準を施行する権限を与える。この措置はウラマーの影響力を強め社会的結束を高めるが、より厳しい規制により消費支出はわずかに増加する。"
 agricultural_subsidies_decision: "農業補助金"
 agricultural_subsidies_decision_desc: "農業部門に直接補助金を提供し、生産量を増やすとともに協力している農民派閥に報いる。初期支出により国庫準備は減少するが、生産性の向上が計画期間中の経済を支える。"
 rural_infrastructure_fund_decision: "農村インフラ基金"
 rural_infrastructure_fund_decision_desc: "農村地域の道路、灌漑、貯蔵施設の改善に政府資金を投入する。この投資は農業地域の労働負担を軽減し、農村社会からの好意を得る。"
 infrastructure_investment_programme_decision: "インフラ投資計画"
 infrastructure_investment_programme_decision_desc: "主要コングロマリットと提携し、国内の生産基盤全体にわたる広範なインフラ改善へ資金を投入する。計画期間中は工場およびオフィスの生産量が増加し、コングロマリットの経済的支柱としての役割が強化される。"