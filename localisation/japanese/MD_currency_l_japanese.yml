l_japanese:
 reserve_currency: "Reserve Currency Policy"
 reserve_currency_desc: "The currency basis of this nation's monetary reserves and international debt. Countries that align with a major reserve currency gain access to its liquidity networks and settlement infrastructure, while nations that maintain domestic reserves retain full monetary sovereignty at the cost of international credit access."
 us_dollar: "[1182.owner.GetAdjective] Dollar"
 us_dollar_desc: "The dominant global reserve currency. Holding reserves in dollars provides unmatched liquidity and access to international credit markets, but leaves the country exposed to dollar-denominated debt costs that swell when the domestic currency weakens."
 euro: "Euro"
 euro_desc: "The currency of the European Union, the second most traded reserve currency in the world. Available to EU member states, the euro provides regional monetary stability and preferential access to European capital markets."
 chinese_yuan: "[547.owner.GetAdjective] Yuan"
 chinese_yuan_desc: "The renminbi, China's national currency, is an emerging reserve asset championed by Beijing as an alternative to dollar dominance. Trade partners within China's economic orbit benefit from its growing settlement network."
 russia_rouble: "[652.owner.GetAdjective] Rouble"
 russia_rouble_desc: "The currency of the Russian Federation, used within the Eurasian Economic Union and among post-Soviet trade partners. Holding rouble reserves integrates a country into Russia's alternative payment systems and energy settlement framework."
 japanese_yen: "[615.owner.GetAdjective] Yen"
 japanese_yen_desc: "The currency of Japan and the third most traded currency in the world. Countries within Japan's economic orbit benefit from its established settlement networks and the relative stability of the yen, though its reserve adoption outside East Asia remains limited."
 british_pound: "[13.owner.GetAdjective] Pound"
 british_pound_desc: "The oldest reserve currency still in active international use. The pound underpins trade and financial flows across the Commonwealth and retains a significant foothold in global foreign exchange reserves, offering countries aligned with the United Kingdom stable access to London's deep capital markets."
 swiss_frank: "[74.owner.GetAdjective] Franc"
 swiss_frank_desc: "The currency of Switzerland, renowned globally as a safe-haven asset. While rarely adopted as a formal reserve by other nations, the franc's strict monetary discipline and Switzerland's political neutrality make it uniquely resistant to currency crises and external shocks."
 no_foreign_reserve: "Domestic Reserve"
 no_foreign_reserve_desc: "This nation holds its reserves in domestic currency rather than a foreign standard. It retains full monetary sovereignty and insulates itself from external exchange-rate shocks, but foregoes access to the liquidity networks and international credit facilities tied to major reserve currencies."
 currency_strength_modifier: "Currency Strength"
 reserve_roi_bonus: "Reserve Currency ROI"
 reserve_roi_bonus_desc: "Additional return on investment from holding a strong foreign reserve currency. Scales monthly with the issuer's currency strength and adoption network size — a weakening issuer economy reduces this bonus."
 reserve_trade_bonus: "Reserve Currency Trade Alignment"
 reserve_trade_bonus_desc: "Small trade opinion bonus from operating within the same currency bloc. Reflects the preferential trade relationships and payment infrastructure shared between nations using the same reserve currency."
 seigniorage_income_modifier: "Seigniorage Income"
 monetary_policy_decisions: "Monetary Policy"
 monetary_policy_expand_money_supply: "Expand Money Supply"
 monetary_policy_expand_money_supply_desc: "Direct the central bank to expand the money supply. Nations that issue reserve currencies benefit most, as foreign demand for their currency absorbs much of the inflationary pressure. All nations face some degree of currency weakening."
 monetary_policy_austerity: "Austerity Measures"
 monetary_policy_austerity_desc: "Tighten fiscal policy and restrain the money supply. Reduces short-term income pressure but strengthens the currency and disciplines the national budget."
 currency_backing: "Currency Backing"
 currency_backing_desc: "The asset standard underlying the national currency. Hard-money standards tie the currency to a commodity reserve, imposing discipline but limiting monetary flexibility. Fiat systems permit full monetary sovereignty at the cost of greater inflation risk."
 gold_standard_back: "Gold Standard"
 gold_standard_back_desc: "The national currency is pegged to and redeemable in gold at a fixed rate. Monetary expansion is constrained by physical gold reserves, instilling long-term confidence but restricting the government's ability to respond to economic crises."
 silver_standard: "Silver Standard"
 silver_standard_desc: "The national currency is backed by silver reserves at a fixed conversion rate. Less restrictive than a gold peg, the silver standard provides a degree of commodity discipline while allowing modestly greater monetary flexibility."
 bi_metal_standard: "Bimetallic Standard"
 bi_metal_standard_desc: "The currency is backed by both gold and silver at fixed exchange ratios. Historically adopted to broaden the monetary base, this standard balances commodity discipline with greater supply flexibility than a pure single-metal peg."
 no_currency_backing: "Fiat Currency"
 no_currency_backing_desc: "The currency is backed solely by the authority and creditworthiness of the issuing government. Without commodity constraints, monetary policy is fully flexible — enabling rapid crisis response but increasing susceptibility to inflationary pressure."