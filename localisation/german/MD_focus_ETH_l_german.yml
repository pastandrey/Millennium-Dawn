 ETH_block_from_ERI_decisions_INT_TT: "Wird von allen weiteren Versuchen der §YIntegration§! §Rausgeschlossen§!"
 ETH_federalise_ERI_flip_TT: "Führt derzeit keine Entscheidung zur Durchführung einer §YIntegrations§!-Operation aus"
 ETH_blocked_from_ERI_decisions_FED_TT: "Ist nicht von weiteren §YFöderalisierungs§!-Maßnahmen ausgeschlossen"
 ETH_block_from_ERI_decisions_FED_TT: "Wird von allen weiteren Versuchen der §YFöderalisierung§! §Rausgeschlossen§!"
