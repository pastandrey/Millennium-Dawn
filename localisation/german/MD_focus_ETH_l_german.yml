l_german:
 ETH_eritrea_focus: "Äthiopien - Eritrea-Fokusbaum"
 ethiopia_focus: "Äthiopischer Fokusbaum"
 ETH_invite_foreign_investors: "Ausländische Investoren einladen"
 ETH_invite_foreign_investors_desc: "Äthiopien benötigt dringend wirtschaftliche Chancen. Unser Land verfügt über eine enorme Erwerbsbevölkerung, ein niedriges Einkommensniveau und eine beträchtliche Arbeitslosenquote - ideale Bedingungen für Investitionen von Unternehmen aus wohlhabenden Staaten."
 ETH_invite_coca_cola: "Coca-Cola einladen"
 ETH_invite_coca_cola_desc: "Der amerikanische Mega-Konzern Coca-Cola verfügt in Äthiopien über großes Potenzial an Arbeitskräften und Konsumenten. Wir sollten ihn dazu ermutigen, die East Africa Bottling Share Company, eine Coca-Cola-Franchise in Äthiopien, zu finanzieren und zu unterstützen."
 ETH_invite_karuturi_global: "Karuturi Global einladen"
 ETH_invite_karuturi_global_desc: "Karuturi Global stammt aus Indien und ist ein riesiger Agrarkonzern. Auch wenn das Unternehmen sich vor allem auf den Anbau von Zierblumen konzentriert, könnte die Erfahrung dieser Fachleute nicht nur die Einkommen unserer Bürger steigern, sondern auch das landwirtschaftliche Wissen unserer Bauern verbessern."
 ETH_invite_lifan_industry: "Lifan Industry einladen"
 ETH_invite_lifan_industry_desc: "Lifan Industry ist ein 1992 in China gegründetes Schwerindustrieunternehmen. Das Unternehmen konzentriert sich hauptsächlich auf die Montage von Autos, Motorrädern und Lastwagen und könnte uns zweifellos dabei helfen, den niedrigen Motorisierungsgrad unserer Bevölkerung zu überwinden."
 ETH_american_industrial_investments: "Amerikanische Industrieinvestitionen"
 ETH_american_industrial_investments_desc: "Amerikanische Unternehmen fühlen sich angesichts der wachsenden Konkurrenz ihrer chinesischen Rivalen um potenzielle Gewinne in Äthiopien zunehmend bedroht. Wir könnten beide Seiten gegeneinander ausspielen - zum Vorteil unseres Volkes."
 ETH_request_international_loans: "Internationale Kredite beantragen"
 ETH_request_international_loans_desc: "Äthiopiens Wirtschaft verbessert sich, doch unsere staatlichen Ausgabemöglichkeiten bleiben aufgrund unserer eher niedrigen Bonität und unserer Randlage auf der Weltbühne begrenzt. Indem wir gezielt Großmächte um Finanzkredite bitten, könnten wir dieses Problem womöglich lindern."
 ETH_support_messobo_cement: "Messebo Cement unterstützen"
 ETH_support_messobo_cement_desc: "Die Messebo-Cement-Fabrik ist einer unserer stärkeren heimischen Konzerne und wichtig für den Bauboom, den wir im Land vorantreiben wollen. Wenn wir die Mittel für Messebo erhöhen, werden wir Bauprojekte schneller abschließen können."
 ETH_homegrown_companies: "Einheimische Unternehmen"
 ETH_homegrown_companies_desc: "Nachdem wir unsere Wirtschaft mit Hilfe internationaler Unternehmen gestärkt haben, fühlt sich unsere Bevölkerung durch die Aussicht auf dauerhaft niedrige Löhne und neokoloniale Wirtschaftsstrukturen bedroht. Wir müssen starke und unabhängige äthiopische Firmen aufbauen, die mit den internationalen Unternehmen konkurrieren - zum Vorteil beider Seiten und der äthiopischen Wirtschaft."
 ETH_fund_ethio_agri_ceft: "Ethio Agri-CEFT finanzieren"
 ETH_fund_ethio_agri_ceft_desc: "Ethio Agri-CEFT ist auf dem Weg, zu einem der größten Privatunternehmen auf den Agrarmärkten Ostafrikas zu werden. Wir müssen dieses Unternehmen weiter stärken, um sowohl mit Karuturi zu konkurrieren als auch unsere Bürger abzusichern."
 ETH_fund_ethiopian_airlines: "Ethiopian Airlines finanzieren"
 ETH_fund_ethiopian_airlines_desc: "Ethiopian Airlines ist die nationale und staatseigene Fluggesellschaft Äthiopiens. Sie ist von entscheidender Bedeutung, um Touristen und äthiopischen Bürgern Flüge von und nach unserem Land zu ermöglichen. Die Finanzierung von Ethiopian Airlines wird künftige internationale Vorhaben stärken."
 ETH_fund_marathon_motors_engineering: "Marathon Motors Engineering finanzieren"
 ETH_fund_marathon_motors_engineering_desc: "Marathon Motor Engineering PLC ist ein Gemeinschaftsunternehmen des japanischen Automobilkonzerns Hyundai und des einheimischen Superstars Haile Gebrselassie. Das Unternehmen wird sich auf den Import von Hyundai-Fahrzeugen in das Land konzentrieren - und unseren Landsleuten mehr Auswahl bei ihren Fahrzeugen bieten. Sollen die Chinesen und die Japaner doch miteinander um die niedrigstmöglichen Preise konkurrieren."
 ETH_industrial_buildup_1: "Wachstums- und Transformationsplan"
 ETH_industrial_buildup_1_desc: "Wir müssen zusätzliche Bauflächen für Industriekomplexe sichern."
 ETH_industrial_buildup_2: "Industrialisierung II"
 ETH_industrial_buildup_2_desc: "Wir brauchen mehr Bauprojekte. Zusätzliche zivile Industrieanlagen für die Hauptarbeit zu errichten, ist der richtige Weg."
 ETH_industrial_buildup_3: "Industrialisierung III"
 ETH_industrial_buildup_3_desc: "Mehr Industrie bedeutet mehr Beschäftigung. Mehr Beschäftigung bedeutet mehr Wohlstand."
 ETH_industrial_buildup_4: "Industrialisierung IV"
 ETH_industrial_buildup_4_desc: "Wir müssen zusätzliche Bauflächen für Industriekomplexe sichern."
 ETH_military_buildup_1: "Militärischer Ausbau"
 ETH_military_buildup_1_desc: "Unsere militärisch-industriellen Fähigkeiten reichen nicht aus, um den Fortbestand unseres Landes zu sichern."
 ETH_military_buildup_2: "Militärischer Ausbau II"
 ETH_military_buildup_2_desc: "Wir müssen zusätzliche Gewehre, Panzer und Flugzeuge herstellen! Von allem mehr!"
 ETH_international_diplomacy: "Internationale Diplomatie"
 ETH_international_diplomacy_desc: "Die Welt ist ein gefährlicher Ort, wenn niemand auf uns achtgibt. Es ist äußerst wichtig, dass wir beginnen, um die Welt um uns herum zu werben."
 ETH_refactor_our_debt: "Unsere Schulden umstrukturieren"
 ETH_refactor_our_debt_desc: "Eine Umstrukturierung unserer Schulden wird helfen, unsere Wirtschaft von ihren Nachkriegsproblemen zu entlasten. Allerdings wird dies bei all unseren Gläubigern äußerst unpopulär sein."
 ETH_african_economic_relationships: "Afrikanische Wirtschaftsbeziehungen"
 ETH_african_economic_relationships_desc: "Afrika ist nach den meisten Maßstäben arm, und unter äthiopischer Führung können wir den Entwicklungsismus auf dem ganzen Kontinent vorantreiben und jedes Land zu einem besseren Ort machen."
 ETH_european_economic_relationships: "Europäische Wirtschaftsbeziehungen"
 ETH_european_economic_relationships_desc: "Europa ist ein naheliegender Partner, wenn es um die Stärkung unserer Wirtschaft geht. Zudem gehören europäische Verträge und Investitionen zu den lukrativsten Projekten."
 ETH_italian_ethiopian_friendship: "Italienisch-äthiopische Freundschaft"
 ETH_italian_ethiopian_friendship_desc: "Italien mag uns zweimal überfallen haben, doch das bedeutet nicht, dass wir unsere Differenzen nicht überwinden und Freunde werden können."
 ETH_request_chinese_investments: "Chinesische Investitionen beantragen"
 ETH_request_chinese_investments_desc: "China verfügt über enorme Reichtümer, die überall eingesetzt werden können. Chinesische Investoren suchen andernorts nach Möglichkeiten, ihr Geld anzulegen. Überzeugen wir sie davon, es hier in Äthiopien zu tun!"
 ETH_african_union_commitment: "Bekenntnis zur Afrikanischen Union"
 ETH_african_union_commitment_desc: "Die Afrikanische Union ist wichtig, um unseren vielfältigen Kontinent gegen jede Form ausländischer Ausbeutung zu einen. Wir sollten uns erneut zu ihrer Funktion und ihrem Zweck bekennen."
 ETH_request_european_investments: "Europäische Investitionen beantragen"
 ETH_request_european_investments_desc: "Wir sollten einige Abkommen mit den Europäern eingehen. Sie haben Investoren, die nur darauf warten, am äthiopischen Markt teilzunehmen."
 ETH_befriend_france: "Frankreich annähern"
 ETH_befriend_france_desc: "Frankreich ist ein natürlicher Verbündeter, wenn es darum geht, unseren Rückhalt bei einem der wirtschaftlich am weitesten entwickelten Länder auszubauen."
 ETH_establish_connections_with_tongji: "Verbindungen zur CSCEC aufbauen"
 ETH_establish_connections_with_tongji_desc: "Im Rahmen unserer Pläne, ein neues Hauptquartier für die Afrikanische Union in Addis Abeba zu errichten, sollten wir Beziehungen zu mehreren Architekturnetzwerken knüpfen. China und die CSCEC haben vorgeschlagen, uns bei diesem Vorhaben zu unterstützen."
 ETH_expand_the_diplomatic_corps: "Das diplomatische Korps erweitern"
 ETH_expand_the_diplomatic_corps_desc: "Diplomatie ist unerlässlich, wenn wir von hier an irgendein Vorhaben verfolgen wollen."
 ETH_anti_corruption_measurements: "Antikorruptionsmaßnahmen"
 ETH_anti_corruption_measurements_desc: "Der Staat ist furchtbar korrupt. Es ist an der Zeit, entschlossen voranzugehen und die Korruption innerhalb unserer Grenzen auszurotten. Es gibt kaum etwas Erfüllenderes, als diejenigen hinter Gitter zu bringen, die es verdienen."
 ETH_the_new_african_union_headquarters: "Das neue Hauptquartier der Afrikanischen Union"
 ETH_the_new_african_union_headquarters_desc: "Die Zeit ist gekommen. Der Bau eines neuen Hauptquartiers für die Afrikanische Union in unserer Hauptstadt Addis Abeba wird die Welt über die Stärke Afrikas im Allgemeinen und Äthiopiens im Besonderen staunen lassen."
 ETH_stabilize_the_food_supply: "Die Lebensmittelversorgung stabilisieren"
 ETH_stabilize_the_food_supply_desc: "Die Ernährungslage ist gefährlich. Missernten und die jüngsten Kriege mit Eritrea haben dazu geführt, dass wir unseren Zugang zum Meer verloren haben. Wir sollten daran arbeiten, den Handel wiederherzustellen und zu normalisieren - andernfalls wird unser Volk hungern."
 ETH_local_relationships: "Regionale Beziehungen"
 ETH_local_relationships_desc: "Das Horn von Afrika ist ein instabiler und gefährlicher Ort. Der Bürgerkrieg in Somalia und die äthiopisch-eritreischen Kriege haben uns dazu gezwungen, neu zu bewerten, wer unsere Freunde sind. Deshalb müssen wir uns auf die Pflege unserer regionalen Beziehungen konzentrieren."
 ETH_african_alliance_initiative: "Initiative für ein afrikanisches Bündnis"
 ETH_african_alliance_initiative_desc: "Afrika ist noch immer ein Schlachtfeld fremder Mächte. Die Amerikaner, die Europäer und die Chinesen teilen unseren großen Kontinent, die Wiege der Menschheit, unter sich auf. Soll Afrika der Spielball feindlicher Megakonzerne sein? Nein! Um Interventionen und Invasionen zu widerstehen, müssen wir ein internationales Bündnis aufbauen."
 ETH_invite_european_armament_companies: "Europäische Rüstungsunternehmen einladen"
 ETH_invite_european_armament_companies_desc: "Einige Waffenunternehmen innerhalb unserer Grenzen zu haben, wäre von großem Wert."
 ETH_defense_of_ethiopia: "Verteidigung Äthiopiens"
 ETH_defense_of_ethiopia_desc: "Äthiopien hat viele Kriege geführt, um seine Unabhängigkeit gegen Eindringlinge zu verteidigen. Die Kriege, die wir von nun an führen werden, unterscheiden sich nicht von denen, die wir in längst vergangenen Jahren geführt haben."
 ETH_expand_the_endf: "Die ENDF erweitern"
 ETH_expand_the_endf_desc: "Die Ethiopian National Defense Force (ENDF) ist eine der stärksten Streitkräfte Afrikas. Wir müssen unsere Streitkräfte ausbauen, um ihre Wettbewerbsfähigkeit zu erhalten."
 ETH_expand_the_etaf: "Die ETAF erweitern"
 ETH_expand_the_etaf_desc: "Unsere Luftwaffe braucht dringend einen Ausbau. Wir verfügen über nur wenige Flugplätze sowie veraltete Jagdflugzeuge und Ausrüstung. Das muss sich ändern."
 ETH_secure_the_eritrean_border: "Die eritreische Grenze sichern"
 ETH_secure_the_eritrean_border_desc: "Befestigungen entlang der Grenze zu Eritrea werden uns helfen, falls es künftig zu einem Konflikt zwischen den beiden Regierungen kommt."
 ETH_secure_the_eritrean_border_TT: "Fügt an der Grenze zu Eritrea §Y3 Landsfestungen§! hinzu"
 ETH_fund_homicho: "Homicho finanzieren"
 ETH_fund_homicho_desc: "Der Homicho Ammunition Engineering Complex ist für Äthiopiens Versorgung mit Handfeuerwaffen und insbesondere mit Munition von entscheidender Bedeutung. Wir müssen unsere Infanterie mit neuen Waffen und unsere Lagerhäuser mit Tonnen von Munition ausstatten."
 ETH_air_training_program: "Luftwaffenausbildungsprogramm"
 ETH_air_training_program_desc: "Die Ausbildung der Luftwaffe braucht ein eigenes Programm. Treiben wir seine Entwicklung voran."
 ETH_secure_the_somali_border: "Die somalische Grenze sichern"
 ETH_secure_the_somali_border_desc: "Der Bürgerkrieg in Somalia hat uns verunsichert, da der Konflikt Flüchtlinge über unsere Grenze treibt und es sogar zu Scharmützeln in der Nähe militärischer und wichtiger ziviler Ziele kommt. Es ist an der Zeit, entlang der somalischen Grenze zusätzliche Befestigungen auszubauen."
 ETH_secure_the_somali_border_TT: "Fügt an der Grenze zu Somalia §Y3 Landsfestungen§! hinzu"
 ETH_provide_assistance_to_somalia: "Somalia unterstützen"
 ETH_provide_assistance_to_somalia_desc: "Die Union islamischer Gerichte bedroht derzeit unsere Grenzen. Wir sollten [SOM.GetName] Truppen und Unterstützung schicken, damit wir den Aufstieg des radikalen Islams besiegen können, bevor er zu unserem Problem wird."
 ETH_secure_the_kenyan_border: "Die kenianische Grenze sichern"
 ETH_secure_the_kenyan_border_desc: "Der Omo-Fluss-Staudamm hat große Spannungen zwischen unseren beiden großartigen Ländern verursacht. In der Grenzregion sind Konflikte entstanden, da Stämme auf beiden Seiten Wasserressourcen verlieren. Unser Militär sollte einige Außenposten und Stützpunkte in der Region errichten, um sie hoffentlich zu stabilisieren."
 ETH_secure_the_kenyan_border_TT: "Fügt an der Grenze zu Kenia §Y3 Landsfestungen§! hinzu"
 ETH_modern_officer_corps: "Modernes Offizierskorps"
 ETH_modern_officer_corps_desc: "Investitionen in die Ausbildung und Fähigkeiten unserer Offiziere werden es uns ermöglichen, ein wirklich modernes Offizierskorps zu schaffen."
 ETH_expand_the_military: "Das Militär ausbauen"
 ETH_expand_the_military_desc: "Ein umfassender Ausbau aller Teilstreitkräfte ist erforderlich, um unser Militär auf die notwendige Größe zu bringen."
 ETH_aircraft_production: "Flugzeugproduktion"
 ETH_aircraft_production_desc: "Die heimische Flugzeugproduktion ist sowohl billiger als auch besser für die Wirtschaft!"
 ETH_secure_the_sudanese_border: "Die sudanesische Grenze sichern"
 ETH_secure_the_sudanese_border_desc: "Die sudanesisch-äthiopischen Beziehungen sind aufgrund der Lage im Südsudan etwas angespannt. Wir sollten uns vorbereiten, falls der Krieg nicht innerhalb ihrer Grenzen bleibt."
 ETH_secure_the_sudanese_border_TT: "Fügt an der Grenze zum Sudan §Y3 Landsfestungen§! hinzu"
 ETH_study_foreign_armor_designs: "Ausländische Panzerentwürfe studieren"
 ETH_study_foreign_armor_designs_desc: "Das Studium ausländischer Panzerfahrzeuge wird uns viel darüber lehren, wie wir unsere eigenen gepanzerten Fahrzeuge entwickeln können."
 ETH_study_foreign_aircraft_designs: "Ausländische Flugzeugentwürfe studieren"
 ETH_study_foreign_aircraft_designs_desc: "Das Studium bemerkenswerter Flugzeugentwürfe aus großen Staaten wie den Vereinigten Staaten, Russland, Frankreich, England und China könnte sich für unsere Luftwaffe als äußerst nützlich erweisen."
 ETH_request_chinese_military_assistance: "Chinesische Militärhilfe beantragen"
 ETH_request_chinese_military_assistance_desc: "China ist eine aufstrebende Macht. Seine Militärstruktur ist vorbildlich, und wir sollten darüber sprechen, etwas Ähnliches hier in Äthiopien einzuführen."
 ETH_request_american_military_assistance: "Amerikanische Militärhilfe beantragen"
 ETH_request_american_military_assistance_desc: "Das amerikanische Militär ist eines der größten und modernsten der Welt. Wir sollten uns bei unserer militärischen Entwicklung an ihnen orientieren."
 ETH_modernize_the_military: "Das Militär modernisieren"
 ETH_modernize_the_military_desc: "Das Militär verwendet Ausrüstung aus dem Jahr 1975, Fahrzeuge fallen auseinander und die Flugzeuge können kaum noch abheben. Wir sollten auf eine Modernisierung der Streitkräfte hinarbeiten, um in der Region eine Macht zu bleiben."
 ETH_land_doctrine: "Landdoktrin"
 ETH_land_doctrine_desc: "Unsere Bodentruppen sind einer unserer wichtigsten Teilstreitkräfte, da unsere Nachbarn ständig in Konflikte verwickelt sind. Wir sollten neue Wege besprechen, unser Heer und unsere Strategien zu verbessern."
 ETH_air_doctrine: "Luftdoktrin"
 ETH_air_doctrine_desc: "Unsere Luftdoktrin ist veraltet. Schicken wir unsere besten Köpfe an ausländische Akademien, um zu sehen, ob wir einen Teil dieses Wissens nach Hause bringen können."
 ETH_the_future_of_ethiopia: "Die Zukunft Äthiopiens"
 ETH_the_future_of_ethiopia_desc: "Äthiopien hat in den letzten 50 Jahren die absolute Monarchie, den Kommunismus und die Demokratie erlebt. Unsere Nation hat Entbehrungen, Hungersnöte, Bürgerkrieg und politisches Chaos erlitten."
 ETH_legacy_of_abyssinia: "Das Erbe Abessiniens"
 ETH_legacy_of_abyssinia_desc: "Äthiopien blickt als einer der ersten Nationalstaaten Afrikas westlicher Prägung unter der Führung des Kaisers auf eine glorreiche Geschichte zurück. Dieses Land, das im Westen gemeinhin 'Abessinien' genannt wurde, wäre dazu bestimmt, eine führende Rolle in Afrika und der Welt einzunehmen, sollte es jemals wiedererstehen."
 ETH_endorse_the_monarchists: "Die Monarchisten unterstützen"
 ETH_endorse_the_monarchists_desc: "Seit der Derg Haile Selassie I. am 12. September 1974 stürzte, verfügt der Kronrat Äthiopiens über keine reale Macht mehr. 1993 nahm der Kronrat seine Tätigkeit wieder auf, nachdem er zu dem Schluss gekommen war, dass der Titel 'Kaiser von Äthiopien' weiterhin besteht. Wir sollten den Kronrat wieder in die Bundesverwaltung eingliedern."
 ETH_glorify_the_italo_ethiopian_wars: "Die italienisch-äthiopischen Kriege verherrlichen"
 ETH_glorify_the_italo_ethiopian_wars_desc: "Staaten, Nationen und Nationalismus werden im Konflikt geschmiedet. Äthiopien wurde auf den Schlachtfeldern von 1895 und 1935 geformt. Wir sollten die Welt an den italienischen Verrat erinnern - und an den unendlichen Mut der technologisch unterlegenen äthiopischen Streitkräfte. Italien wollte uns töten, uns zerstören, unsere Nation vernichten - und dennoch stehen wir noch immer!"
 ETH_restore_the_throne: "Den Thron wiederherstellen"
 ETH_restore_the_throne_desc: "Der Kronrat, nunmehr gestärkt im politischen Entscheidungsprozess, hat vorgeschlagen, die Wiederherstellung des Äthiopischen Reiches offiziell auszurufen. Es braucht nur... nun ja, eine neue Verfassung."
 ETH_befriend_jamaica: "Jamaika annähern"
 ETH_befriend_jamaica_desc: "Da die äthiopische Monarchie Haile Selassies auf ihre Wiederherstellung zusteuert, sollten wir erwägen, die Beziehungen zur Rastafari-Bewegung zu stärken - jener religiösen Gruppe, die unseren früheren Kaiser als wiedergekehrten Messias verehrt. Die Hauptgruppe der Rastafari befindet sich auf Jamaika, daher sollten wir vielleicht ein breiteres Spektrum diplomatischer Beziehungen mit diesem fernen Land aufbauen."
 ETH_invite_zera_yacob: "Zera Yacob einladen"
 ETH_invite_zera_yacob_desc: "Zera Yacob Amha Selassie, Enkel Haile Selassies I., ist der rechtmäßige Anwärter auf den äthiopischen Kaiserthron. Er wurde in Eton ausgebildet und nach der kommunistischen Revolution von 1974 zusammen mit dem Rest der Königsfamilie ins Exil gezwungen. Derzeit lebt er abwechselnd im Vereinigten Königreich und in den Vereinigten Staaten."
 ETH_weaken_the_parliament: "Das Parlament schwächen"
 ETH_weaken_the_parliament_desc: "Die beiden Kammern des äthiopischen Parlaments stehen unserem nationalen und internationalen Einfluss nur im Weg. Wir sollten dem Parlament mehrere Zuständigkeiten entziehen und sie der kaiserlichen Regierung übertragen."
 ETH_imperial_nostalgia: "Kaiserliche Nostalgie"
 ETH_imperial_nostalgia_desc: "Wünschst du dir nicht manchmal, wir könnten die Zeit zurückdrehen - zu den guten alten Zeiten?"
 ETH_imperial_guard: "Äthiopische Kaisergarde"
 ETH_imperial_guard_desc: "Die Kebur Zabagna war eine Eliteeinheit, bestehend aus den tapfersten und ehrenhaftesten Männern unserer Armee, die mit der Verteidigung unserer Hauptstadt und des Kaisers beauftragt war."
 ETH_reclaim_eritrea: "Eritrea zurückfordern"
 ETH_reclaim_eritrea_desc: "Eritrea ist rechtmäßiges äthiopisches Territorium! Unser Zugang zum Meer wird durch die bloße Existenz dieses Schurkenstaates gefährdet. Wir sollten sie daran erinnern, wem ihr Gebiet in Wahrheit gehört."
 ETH_strengthen_the_republic: "Die Republik stärken"
 ETH_strengthen_the_republic_desc: "Die äthiopische Verfassung von 1995, die nicht nur Bürgerrechte garantierte, sondern auch kommunistische und monarchistische Fraktionen schwächte, muss das Leitbild der äthiopischen Gesellschaft sein. Demokratie und panafrikanische Integration sind der Weg in die Zukunft."
 ETH_guarantee_freedom_of_speech: "Meinungsfreiheit garantieren"
 ETH_guarantee_freedom_of_speech_desc: "Äthiopien ist religiös, ethnisch und politisch vielfältig. Um die Überlegenheit der Demokratie gegenüber anderen Ideologien und des Säkularismus gegenüber jeder Form moralistischer Lehre zu beweisen, müssen wir politische Meinungsfreiheit im Privaten wie im Öffentlichen zulassen und garantieren. Außerdem werden wir politische Radio- und Fernsehprogramme finanzieren, um die Nation weiter zu stärken."
 ETH_healthcare_program: "Gesundheitsprogramm"
 ETH_healthcare_program_desc: "Eine nationale Gesundheitsversorgung in einem Land mit Hunger- und Krankheitsproblemen wie Äthiopien zu garantieren, wird ein gewaltiges Unterfangen sein - doch mit internationaler Hilfe, einem Fokus auf medizinische Ausbildung und der Finanzierung regionaler Kliniken und Ärzte könnte Äthiopien wieder auf die Beine kommen."
 ETH_guarantee_freedom_of_religion: "Religionsfreiheit garantieren"
 ETH_guarantee_freedom_of_religion_desc: "Äthiopien ist die Heimat der äthiopisch-orthodoxen Tewahedo-Kirche (43%), der protestantischen Pentay (18%), des sunnitischen Islams sufischer Prägung (34%), der Katholiken (1%) und traditioneller Glaubensrichtungen (3%). Wir müssen garantieren, dass jede dieser vielfältigen und unterschiedlichen Gruppen in Frieden leben und ihren Glauben ausüben kann. Religiös geprägte Schulen müssen ebenfalls entsegregiert werden."
 ETH_education_program: "Bildungsprogramm"
 ETH_education_program_desc: "Wenn ein Volk modernisiert und erneuert werden soll, muss man die Kinder bilden."
 ETH_endorse_the_african_union: "Die Afrikanische Union unterstützen"
 ETH_endorse_the_african_union_desc: "Äthiopien allein ist nicht mächtig genug. Stattdessen sollten wir uns darauf konzentrieren, die politischen Führungen Afrikas zusammenzuführen und die AU dazu zu ermutigen, stärker der EU zu ähneln."
 ETH_reckless_industrial_expansion: "Rücksichtsloser Industrieausbau"
 ETH_reckless_industrial_expansion_desc: "Äthiopien muss modern, stark und frei sein! Wir müssen Platz für neue Dörfer, Städte und insbesondere für Industrieanlagen schaffen."
 ETH_secure_agricultural_production: "Die landwirtschaftliche Produktion sichern"
 ETH_secure_agricultural_production_desc: "Es ist wichtiger, die Menschen zu ernähren als die Nation. Wir sollten in Erwägung ziehen, weitgehend agrarisch zu bleiben, wenn dies das Überleben unseres Volkes sichert."
 ETH_declare_mengistu_innocent: "Mengistu für unschuldig erklären"
 ETH_declare_mengistu_innocent_desc: "Mengistu Haile Mariam ist der ehemalige kommunistische Diktator Äthiopiens. Unter seiner Herrschaft zwischen 1977 und 1991 erlebte Äthiopien Hyper-Militarisierung, Unterdrückung von Dissens und Bürgerkrieg. Er floh 1991 nach Simbabwe und wurde während seiner Abwesenheit von einem äthiopischen Gericht wegen Völkermords verurteilt. Eigentlich sind Völkermord und Diktatur ja gar nicht so schlimm. Wir sollten Mengistu vermutlich freisprechen."
 ETH_condemn_the_pretenders: "Die Prätendenten verurteilen"
 ETH_condemn_the_pretenders_desc: "Die frühere Königsfamilie Äthiopiens lebt im Exil, seit sie in den frühen 1970er Jahren gestürzt wurde. Wir sollten sie wissen lassen, dass sie nur der Tod erwartet, falls sie jemals nach Äthiopien zurückkehren sollten."
 ETH_return_of_mengistu: "Mengistus Rückkehr"
 ETH_return_of_mengistu_desc: "Nachdem wir unsere ungerechte Behandlung unseres früheren glorreichen Führers rückgängig gemacht haben, sollten wir ihm vielleicht erlauben, in das Land zurückzukehren."
 ETH_restore_the_pdre: "Die PDRE wiederherstellen"
 ETH_restore_the_pdre_desc: "Die Volksdemokratische Republik Äthiopien markierte die größte Epoche unserer nationalen Geschichte. Wir sollten der Welt die Wiederherstellung der PDRE - und die Rückkehr Mengistus auf die Weltbühne - verkünden."
 ETH_national_communism: "Nationalkommunismus"
 ETH_national_communism_desc: "Die afrikanischen Völker wurden so lange von fremden Imperialisten unterdrückt. Ein Bündnis mit den chinesischen Betrügerkommunisten wäre Heuchelei und reiner Verrat. Äthiopien wird auf eigenen Füßen stehen."
 ETH_align_to_china: "An China annähern"
 ETH_align_to_china_desc: "Mao Zedong hat es offenbar besser gemacht als Wladimir Lenin - sein Land existiert noch. Die früheren Beziehungen der PDRE zur Sowjetunion gehören wirklich der Vergangenheit an. Wir müssen uns mit China verbünden, der einzig wahren Macht."
 ETH_pan_african_communism: "Panafrikanischer Kommunismus"
 ETH_pan_african_communism_desc: "Die Revolution in der Heimat ist gesichert! Wir müssen sie verbreiten, Genossen! Arbeiter der Welt, vereinigt euch!"
 ETH_eritrea_start: "Der Krieg ist vorbei..."
 ETH_eritrea_start_desc: "...doch der Krieg gegen den Terrorismus hat gerade erst begonnen. Viele ehemalige Soldaten der nun aufgelösten EDF haben sich der neu formierten EPLF im benachbarten Sudan angeschlossen und bereiten sich auf den Gegenschlag vor. Es liegt nun an uns, welchen Weg wir einschlagen."
 ETH_eritrea_dissolve_assembly: "Die Eritreische Nationalversammlung auflösen"
 ETH_eritrea_dissolve_assembly_desc: "Die Eritreische Nationalversammlung ist ein schreckliches und überholtes System. Wir müssen dieses System auflösen und unser Bestes tun, ihnen ihren Irrweg aufzuzeigen. Die Eritreer werden durchaus Vertretung erhalten - allerdings über das Repräsentantenhaus der Völker und das Haus der Föderation."
 ETH_eritrea_arrest_leaders: "Afwerki verurteilen"
 ETH_eritrea_arrest_leaders_desc: "Isaias Afwerkis Prozesstermin steht an, und es wird wohl keine gute Zeit für ihn werden - und das sollte es auch nicht. Wir müssen dem eritreischen Volk zeigen, was geschieht, wenn es versucht, gegen die äthiopische Nation und den unvermeidlichen Wandel zu kämpfen, der letztlich für alle besser ist."
 ETH_detain_rabble_rousers: "Potenzielle separatistische Anführer festsetzen"
 ETH_detain_rabble_rousers_desc: "Während des Prozesses wurde rund um das Gerichtsgebäude zusätzliche Sicherheit stationiert; zum Glück wurde sie nicht benötigt. Allerdings gelang es den Kräften, einige auffällige Persönlichkeiten herauszufiltern. Diese Aufrührer sollten festgesetzt werden, bevor sie auf Gedanken des Widerstands kommen..."
 ETH_maintain_a_watchful_eye: "Ein wachsames Auge bewahren"
 ETH_maintain_a_watchful_eye_desc: "Da die schlimmsten Agitatoren keine Bedrohung mehr darstellen, ist es wichtig, unsere neuen Gebiete weiterhin genau zu überwachen - zumindest so lange, bis sie lernen zu akzeptieren, dass ein Leben unter der äthiopischen Zentralregierung für alle Beteiligten besser ist."
 ETH_eritrea_annex: "Eritrea annektieren"
 ETH_eritrea_annex_desc: "Seit 1991 ist Eritrea unabhängig und wurde als Einparteienstaat unter dem diktatorischen Regime Afwerkis regiert. Nun, da wir dieses Regime endgültig besiegt und den Widerstand der lokalen Bevölkerung zermürbt haben, können wir unsere eigene Herrschaft vollständig errichten."
 ETH_eritrea_teach_amharic: "Sie Amharisch lehren"
 ETH_eritrea_teach_amharic_desc: "Wie sollen wir über das eritreische Volk herrschen, wenn es uns nicht versteht? Indem wir Amharisch in speziellen Sprachschulen als Pflichtfach für die eritreische Bevölkerung einführen, erwarten wir, dass insbesondere die jüngeren Eritreer es rasch lernen; den älteren Generationen dürfte dies allerdings schwerer fallen."
 ETH_eritrea_propaganda: "Propaganda-Verteilungsnetzwerk"
 ETH_eritrea_propaganda_desc: "Auch wenn es grob klingen mag, dies 'Propaganda' zu nennen, ist es notwendig, Dokumente zu verbreiten, die die Vorteile der äthiopischen Herrschaft hervorheben. Je größer unser Propagandanetzwerk ist, desto mehr Material können wir verbreiten und desto leichter wird es sein, den Eritreern unseren Standpunkt zu vermitteln."
 ETH_eritrea_federation: "Eritreisch-äthiopisches Föderationsgesetz"
 ETH_eritrea_federation_desc: "Die erste Föderation zwischen unseren beiden Ländern zerfiel offen gesagt an den imperialistischen Ambitionen Haile Selassies. Wir sind überzeugt, dass nun der richtige Zeitpunkt gekommen ist, sie in demokratischer Form wiederzubeleben."
 ETH_eritrea_assembly: "Eritreische Parteizweige äthiopischer Parteien zulassen"
 ETH_eritrea_assembly_desc: "Auch wenn wir die Machtverfestigung Afwerkis verurteilen, könnte es notwendig sein, die dortigen Machtstrukturen auszunutzen, um die Föderalisierung voranzutreiben. Indem wir unseren eigenen Parteien erlauben, Zweigstellen zu gründen und in Eritrea zu Wahlen anzutreten, werden äthiopienfreundliche Kandidaten, die das Föderationsgesetz befürworten, mit hoher Wahrscheinlichkeit gewinnen. Auf diese Weise können wir unser Ziel erreichen, den ehemaligen eritreischen Staat als autonome Region in das neue Äthiopien zu integrieren."
 ETH_eritrea_lawbooks: "Die Gesetzbücher umschreiben"
 ETH_eritrea_lawbooks_desc: "Die eritreischen Gesetze in den Büchern sind primitiv und veraltet. Niemand sollte sich beispielsweise bei der Regierung registrieren müssen, um einen Glauben auszuüben. Wir müssen diese Gesetze neu schreiben, um stärker zu betonen, dass wir eine moderne Föderation sind und sein werden."
 ETH_eritrea_constitution: "Eine neue Verfassung verfassen"
 ETH_eritrea_constitution_desc: "Die alte eritreische Verfassung war derart ungeeignet, dass sie nicht einmal richtig umgesetzt wurde. Wir müssen eine Verfassung ausarbeiten, die unsere eigene ergänzt, statt mit ihr zu kollidieren, und sicherstellen, dass sie diesmal auch tatsächlich korrekt umgesetzt wird."
 ETH_eritrean_federal_state: "Mit Eritrea ordnungsgemäß föderalisieren"
 ETH_eritrean_federal_state_desc: "Endlich haben sich unsere Bemühungen ausgezahlt. Die letzten Schritte sollen nun umgesetzt werden, und sowohl Äthiopier als auch Eritreer sollen einander auf den Straßen und Märkten in die Arme gefallen sein. Ein Ziel, das noch vor nicht einmal einem Jahrzehnt als unmöglich galt, ist Wirklichkeit geworden."
 ETH_stabilize_the_food_supply_TT: "§YDie Hungersnot könnte sich verschlimmern, wenn die Lebensmittelversorgung nicht rechtzeitig stabilisiert wird.§!\n"
 ETH_ERI_acceptance_100_TT: "Akzeptanz der §HIntegration§! beträgt §G100%§!"
 ETH_ERI_federalisation_100_TT: "Akzeptanz der §HFöderalisierung§! beträgt §G100%§!"
 ETH_eritrea_federal_parties_allowed_TT: "Erlaubt §Y[ERI.GetNameWithFlag]§!, ihre eigenen Angelegenheiten und Wahlprozesse zu verwalten, während §Y[ETH.GetNameWithFlag]§! weiterhin die Kontrolle über die Region behält.\n\nLokale Wahlen sind für die kommenden Wochen angesetzt."
 ETH_eritrea_locked_TT: "§RDie Auswirkungen dieses Fokus sind erst bekannt, nachdem über das Schicksal Eritreas entschieden wurde!§!"
 ETH_annexation_support_TT: "Der Integrationsprozess steht bei §G100%§!"
 ETH_eritrean_federal_acceptance_TT: "Der Föderalisierungsprozess steht bei §G100%§!"
 ETH_federation_support_TT: "Die Unterstützung für die Föderation beträgt §G100%§!"
