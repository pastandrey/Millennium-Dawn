 ETH_eritrea_assembly_TT: "Du machst bereits etwas Dummes, also nimm wenigstens etwas Geld"
 ETH_eritrea_integration_trigger_TT: "Hat im Ereignis §Y$ethiopia.24.t$§! den Weg der §YIntegration§! gewählt oder anschließend beschlossen, die Versammlung §Raufzulösen§!"
