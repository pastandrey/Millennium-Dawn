 update_ETH_bozo_crackdown_TT: "§YUnterdrückung von Separatisten§!: [?ETH_crackdown_change|2+]% (Aktuelle §YUnterdrückung von Separatisten§!: [?ETH_crackdown_on_bozos|2Y]%)"
 ethiopia.1.t: "Äthiopische Kreditanfragen"
 ethiopia.1.d: "Die äthiopische Regierung versucht, die nationale Wirtschaft wieder anzukurbeln, indem sie internationale Unternehmen einlädt und lokale sowie regionale Wirtschaftssektoren mit staatlichen Investitionen stärkt.\n\nNun hat sich Äthiopien an unser Finanzministerium gewandt und um weitere staatliche Kredite für den äthiopischen Industrie- und Wirtschaftsentwicklungssektor gebeten. Für unsere Regierung scheint dabei wenig zu gewinnen zu sein, doch unsere Unternehmer warnen uns: Wenn wir Äthiopien keine Kredite gewähren, wird es jemand anderes tun. Und wenn unsere Unternehmen aufgrund unserer feindseligen Haltung gegenüber dem Land abgelehnt werden, werden mit Sicherheit Firmen anderer Staaten akzeptiert."
 ethiopia.1.a: "Wir werden zusätzliche Kredite gewähren."
 ethiopia.1.b: "Wir können derzeit nichts bereitstellen."
 ethiopia.2.t: "Äthiopien sucht Investitionen"
 ethiopia.2.d: "Der äthiopische Industriesektor hat in letzter Zeit einen enormen Aufschwung erlebt, den die Regierung von [ETH.GetLeader] nun weiter ausbauen möchte. Die Hoffnung, Äthiopien in eine industrielle Großmacht zu verwandeln, kann jedoch nur durch ausländische Investitionen verwirklicht werden - und die äthiopische Regierung hat sich an uns gewandt, um unsere nationalen Unternehmen davon zu überzeugen, Äthiopiens wachsende Wirtschaft zu unterstützen."
 ethiopia.2.a: "Wir stimmen zu!"
 ethiopia.2.b: "Der Markt soll entscheiden."
 ethiopia.3.t: "Äthiopien sucht Investitionen"
 ethiopia.3.d: "Der äthiopische Industriesektor hat in letzter Zeit einen enormen Aufschwung erlebt, den die Regierung von [ETH.GetLeader] nun weiter ausbauen möchte. Die Hoffnung, Äthiopien in eine industrielle Großmacht zu verwandeln, kann jedoch nur durch ausländische Investitionen verwirklicht werden - und die äthiopische Regierung hat sich an uns gewandt, um unsere nationalen Unternehmen davon zu überzeugen, Äthiopiens wachsende Wirtschaft zu unterstützen."
 ethiopia.3.a: "Wir stimmen zu!"
 ethiopia.3.b: "Der Markt soll entscheiden."
 ethiopia.4.t: "Äthiopien sucht Investitionen"
 ethiopia.4.d: "Der äthiopische Industriesektor hat in letzter Zeit einen enormen Aufschwung erlebt, den die Regierung von [ETH.GetLeader] nun weiter ausbauen möchte. Die Hoffnung, Äthiopien in eine industrielle Großmacht zu verwandeln, kann jedoch nur durch ausländische Investitionen verwirklicht werden - und die äthiopische Regierung hat sich an uns gewandt, um unsere nationalen Unternehmen davon zu überzeugen, Äthiopiens wachsende Wirtschaft zu unterstützen."
 ethiopia.4.a: "Wir stimmen zu!"
 ethiopia.4.b: "Der Markt soll entscheiden."
 ethiopia.7.t: "Addis-Abeba-Stadtbahn fertiggestellt"
 ethiopia.7.d: "Die Addis-Abeba-Stadtbahn hat endlich ihre Bauphase abgeschlossen und befindet sich nun in der Testphase. Ursprünglich war vorgesehen, dass die Stadtbahn auf ihren beiden Linien insgesamt 41 Stationen haben würde (von denen 39 fertiggestellt wurden), und jeder Zug hat eine Kapazität von 286 Passagieren. Damit wird das Stadtbahnsystem in der Lage sein, 15.000 Fahrgäste pro Stunde und Richtung zu befördern und insgesamt 60.000 in alle vier Richtungen, während die Fahrpreise 2 bis 6 äthiopische Birr betragen.\n\nDer Bau der Bahn wurde von der China Railway Group Limited übernommen und sie wird von der Shenzhen Metro Group betrieben. Die Addis-Abeba-Stadtbahn verfügt derzeit über eine Flotte von 41 dreiteiligen Niederflur-Straßenbahnen mit 70 % Niederfluranteil, hergestellt von CNR Changchun."
 ethiopia.7.a: "Endlich keine Staus mehr!"
 ethiopia.8.t: "Ethio-Dschibuti-Eisenbahn stellt ihren Betrieb ein"
 ethiopia.8.d: "Nach dem Zweiten Weltkrieg begann für die Eisenbahn eine lange Phase des Niedergangs. Zwischen 1953 und 1957 halbierte sich das Verkehrsaufkommen, da der Straßenverkehr zunehmend Konkurrenz machte. Der Ogadenkrieg von 1977 bis 1978 versetzte der Bahn einen weiteren Schlag, als somalische Truppen einmarschierten und die Strecke bis nach Dire Dawa besetzten. Teile der Bahnlinie wurden im Krieg gesprengt, wodurch der Bahnbetrieb erneut halbiert wurde. Nach Kriegsende setzte sich der Niedergang aufgrund mangelnder Wartung und Angriffen von Rebellen wie der Ogaden Liberation Front fort.\n\nSowohl der Wartungsmangel als auch ein ehrgeiziges Straßenbauprogramm machten den Schienenverkehr zunehmend unrentabel. Im Januar 1985 kamen bei der Awash-Zugkatastrophe 429 Passagiere ums Leben, als ihr Zug auf der Awash-Brücke entgleiste und in die darunterliegende Schlucht stürzte. Der Bahnverkehr zwischen Addis Abeba und Dire Dawa endete schließlich in diesem Jahr, doch Züge verkehrten weiterhin zwischen Dire Dawa und Dschibuti. Die Gleise zwischen Dire Dawa und Addis Abeba verfielen vollständig, und viele Schienen wurden gestohlen und als Schrott verkauft."
 ethiopia.8.a: "Wir hätten sie früher reparieren sollen"
 ethiopia.9.t: "Addis-Abeba-Stadtbahn erweitert"
 ethiopia.9.d: "Die neu gebaute Linie ist vollständig kreuzungsfrei. Neben der Verlängerung der bestehenden Linien wurden zwei neue Linien gebaut. Die erste beginnt an der St.-Georgs-Kathedrale, führt über den Mexico Square zum Hauptquartier der Afrikanischen Union und endet in Lebu, wo sie an das neue nationale Schienennetz angeschlossen ist. Die zweite Linie beginnt am Megenagna-Kreisverkehr und führt über den Flughafen Bole, das Gebiet Wello Sefer, den Saris-Marktbereich und das Jommo-Gebiet und endet ebenfalls in Lebu."
 ethiopia.9.a: "Von Addis Abeba nach Dschibuti!"
 ethiopia.10.t: "Addis-Abeba-Dschibuti-Eisenbahn fertiggestellt"
 ethiopia.10.d: "Diese Strecke wird das Rückgrat unseres neuen äthiopischen Eisenbahnnetzes bilden. Sie verschafft uns Zugang zum Meer und verbindet unsere Hauptstadt Addis Abeba mit Dschibuti und dessen Hafen Doraleh."
 ethiopia.10.a: "Das wird unserer Wirtschaft helfen"
 ETH_railway_repaired_tt: "Die Ethio-Dschibuti-Eisenbahn ist repariert"
 ETH_railway_destroyed_flg: "Die Ethio-Dschibuti-Eisenbahn ist zerstört"
 ethiopia.11.t: "Die EPLF greift... schon wieder zu den Waffen!"
 ethiopia.11.d: "Zum zweiten Mal seit dem Ende des Zweiten Weltkriegs befindet sich Eritrea unter äthiopischer Besatzung. Viele ehemalige hochrangige Politiker und Militärführer konnten den äthiopischen Streitkräften entkommen und sind in den Sudan ins selbst auferlegte Exil gegangen. Von dort aus haben sie offenbar die Eritrean People's Liberation Front neu gegründet.\n\nDie ursprüngliche EPLF wandelte sich kurz nach der eritreischen Unabhängigkeit von Äthiopien im Jahr 1991 in die Volksfront für Demokratie und Gerechtigkeit um und fungierte bis zu ihrer jüngsten Zerschlagung als einzige legale Partei Eritreas. Seit Isaias' jüngster Gefangennahme und dem anschließenden Hausarrest soll sein Präsidialberater Yemane Gebreab die Überreste der Partei übernommen haben und die verbliebenen Anhänger dazu sammeln, erneut unter dem Banner der EPLF zu den Waffen zu greifen."
 ethiopia.11.a: "Mögen sie es auch versuchen, wir werden nicht erschüttert."
 ethiopia.13.t: "Isaias Afewerki verhaftet"
 ethiopia.13.d: "Als das Schussfeuer rund um Asmara verstummte und Eritreas letzte standhafte Verteidiger ihre Waffen niederlegten, waren Isaias Afwerki und seine treuesten Gefolgsleute bereits in einem relativ unauffälligen Fahrzeugkonvoi auf dem Weg in den benachbarten Sudan - ein letzter verzweifelter Versuch, der äthiopischen Justiz zu entkommen. Seine Leibwächter leisteten den geringen Widerstand, zu dem sie noch in der Lage waren, doch die Zahlen standen schlicht nicht zu ihren Gunsten.\n\nIsaias Afewerki wurde umgehend festgenommen und in ein Militärfahrzeug nach Addis Abeba gebracht. Sein Schicksal bleibt ungewiss, doch bis dahin steht er unter Hausarrest, bewacht von Äthiopiens besten Soldaten."
 ethiopia.13.a: "Die Gerechtigkeit wird siegen."
 ethiopia.14.t: "Der Prozess gegen Isaias Afewerki"
 ethiopia.14.d: "Heute ist der Prozesstermin des ehemaligen Führers Eritreas, Isaias Afwerki. Inmitten der ohnehin lautstarken Gerichtsverhandlungen war Isaias lauter als alle anderen zu hören, wie er gegen seine Lage protestierte. Als die Kameras auf ihn gerichtet wurden, während er den Saal betrat, wies er die Korruptionsvorwürfe des Gerichts und des äthiopischen Justizsystems insgesamt zurück und behauptete, der Prozess sei nichts weiter als eine Farce, da sein Schicksal schon lange vor Beginn jeglicher Verhandlungen festgestanden habe.\n\nViele internationale Reporter und Beobachter des Prozesses, die seiner Lage sympathisch gegenüberstanden, schlossen sich seinen Bedenken an, doch die Rufe nach Korruption und manipulierten Verfahren können den angeblichen Tyrannen Eritreas nicht retten. Nach mehreren Tagen der Beratung und der Prüfung aller Beweise wird er rasch für schuldig befunden, und sein Urteil lautet..."
 ethiopia.14.a: "...Tod."
 ethiopia.14.b: "...lebenslange Haft."
 ethiopia.18.t: "Zera Selassie kehrt nach Äthiopien zurück"
 ethiopia.18.d: "Zera Selassie kehrt zurück, um erneut seine Rolle als König von Äthiopien anzutreten. Möge er lange leben und sein Land unter seiner großartigen Führung gedeihen."
 ethiopia.18.a: "Wir heißen ihn willkommen"
 ethiopia.19.t: "Die Krönung Zera Selassies"
 ethiopia.19.d: "Der Tag ist perfekt gewählt, die Sonne scheint hell und kein einziges Wölkchen ist am Himmel. Zera Selassie reitet auf seinem Pferd, umgeben von einer großen jubelnden Menge, auf die Medhane-Alem-Kathedrale in Addis Abeba zu. Heute ist seine offizielle Krönung zu Seiner Kaiserlichen Majestät Kaiser Amha Selassie I., Erwählter Gottes, siegreicher Löwe aus dem Stamm Juda und König der Könige von Äthiopien.\n\nGemeinsam mit seinem einzigen Kind hält er vor der Kathedrale, die mit den kaiserlichen Bannern geschmückt wurde, und schreitet zum Eingang. Im Inneren der Kathedrale wartet alles, was in Äthiopien Rang und Namen hat, voller Erwartung auf die Krönung.\n\nAls Zera auf den Presbyter zugeht, beginnt sein Herz schneller zu schlagen. Dies ist wahrlich ein Moment, den er nie vergessen wird und den er sich nicht einmal in seinen wildesten Träumen hätte vorstellen können. Die Zeremonie selbst ist recht schnell vorüber, und als er als rechtmäßiger König Äthiopiens hinaustritt, verbeugt sich jeder vor ihm."
 ethiopia.19.a: "Lang lebe Seine Majestät!"
 ethiopia.20.t: "Die Hungersnot bricht aus!"
 ethiopia.20.d: "Der jüngste Konflikt zwischen unseren Nachbarn und die Verweigerung der Zusammenarbeit zwischen Eritrea und Äthiopien haben etwas noch viel Verheerenderes ausgelöst. Das Land ist in eine Hungersnot gefallen, und Menschen beginnen zu sterben, da der Lebensmittelmarkt im Land durch die mangelnde Kooperation unserer Nachbarn stranguliert wird. Die Regierung muss etwas unternehmen, um dem Volk zu helfen. Sie muss handeln, bevor das Land in sich zusammenbricht."
 ethiopia.20.a: "Oh nein"
 ethiopia.21.t: "Niederlage auf dem Feld"
 ethiopia.21.d: "Nach Monaten des Stillstands hat der Feind endlich unsere Linien durchbrochen und ist in unser eigentliches Kernland eingedrungen. Vielleicht sollten wir dem Friedensrahmen zustimmen, den die Organisation für Afrikanische Einheit 1998 vorgelegt hat, und einen Waffenstillstand vorschlagen?"
 ethiopia.21.a: "Frieden ist die einzige Option"
 ethiopia.21.b: "Krieg ist die einzige Option"
 ethiopia.22.t: "[FROM.GetName] schlägt Waffenstillstand vor"
 ethiopia.22.d: "Nachdem unsere Streitkräfte die feindlichen Linien durchbrochen hatten, wurden wir von der Regierung [FROM.GetAdjective] kontaktiert, die erklärte, sie stimme dem Friedensrahmen der Organisation für Afrikanische Einheit zu. Sie schlägt einen sofortigen Waffenstillstand vor"
 ethiopia.22.a: "Endlich! Sieg!"
 ethiopia.22.b: "Wir werden nicht aufhören, bis sie vor uns niederknien!"
 ethiopia.23.t: "Die Prozesse gegen die eritreischen Abgeordneten"
 ethiopia.23.d: "Genau wie Afwerki müssen auch jene, die für eritreische Aufwiegelung eintreten, für ihre Verbrechen gegen Äthiopien und sein Volk vor Gericht gestellt werden. Die Frage ist nun: Sollen wir diese Abgeordneten zum Tode verurteilen oder sie einfach lebenslang hinter Gitter bringen?"
 ethiopia.23.a: "Der Tod soll es sein!"
 ethiopia.23.b: "Lebenslange Haft ist genug."
 ethiopia.24.t: "Das Schicksal Eritreas"
 ethiopia.24.d: "Eritrea wurde im Krieg besiegt, und viele fordern, die Besatzung aufrechtzuerhalten, um das eritreische Volk vollständig unter unsere Kontrolle zu bringen. Andere wiederum vertreten einen liberaleren Ansatz und wünschen sich ein zweites Föderationsgesetz. Letztlich liegt es an [ETH.GetLeader], was aus dem eritreischen Staat wird."
 ethiopia.24.a: "Besatzung aufrechterhalten!"
 ethiopia.24.b: "Wir sollten föderalisieren."
 ethiopia_news.1.t: "Äthiopien erhält chinesische Militärhilfe"
 ethiopia_news.1.d: "Nach einer langwierigen Rivalität zwischen amerikanischen und chinesischen Rüstungsunternehmen um die Versorgung des äthiopischen Militärs hat die äthiopische Regierung den chinesischen Konzernen weitreichende Freiheiten eingeräumt und mehrere militärisch-wirtschaftliche Verträge mit der Volksrepublik China unterzeichnet.\n\nDer Außenminister der Vereinigten Staaten hat bereits großes Bedauern über die äthiopische Entscheidung geäußert."
 ethiopia_news.1.a: "Äthiopien hat sich Amerika widersetzt."
 ethiopia_news.2.t: "Äthiopien erhält amerikanische Militärhilfe"
 ethiopia_news.2.d: "Sowohl die Vereinigten Staaten von Amerika als auch die Volksrepublik China haben in den vergangenen Monaten versucht, Rüstungsverträge mit dem äthiopischen Verteidigungsministerium zu erhalten.\n\nÄthiopien hat sich nun entschieden, große Mengen an Waffen bei amerikanischen Konzernen zu bestellen. Die Volksrepublik China hat bereits begonnen, Gesetze zu erlassen, die es chinesischen Unternehmen erschweren sollen, mit Äthiopien Handel zu treiben, um den ostafrikanischen Staat zu bestrafen, der es gewagt hat, sich ihnen zu widersetzen."
 ethiopia_news.2.a: "Äthiopien hat sich China widersetzt."
 ethiopia_news.3.t: "Zera Yacob kehrt nach Äthiopien zurück"
 ethiopia_news.3.d: "Äthiopien hat kürzlich die Wiederherstellung seines kaiserlichen Thrones angekündigt, der unter der kommunistischen PDRE und der nachfolgenden demokratischen Verfassung von 1995 abgeschafft worden war.\n\nDer rechtmäßige Thronprätendent, der Enkel Haile Selassies I., Zera Yacob, lebt seit den 1970er Jahren mit seiner Familie in Florida in den Vereinigten Staaten. Nun hat er öffentlich erklärt, dass er die offizielle Einladung der äthiopischen Regierung annehmen, in das Land seiner Vorfahren zurückkehren, seinen rechtmäßigen Thron beanspruchen und seine rechtmäßige Position als Kaiser von Äthiopien einnehmen wird."
 ethiopia_news.3.a: "Der Kaiser schlägt zurück."
 ethiopia_news.4.t: "Mengistu freigesprochen"
 ethiopia_news.4.d: "Der Oberste Gerichtshof Äthiopiens hat heute bestätigt, dass die Verurteilung des ehemaligen äthiopischen kommunistischen Diktators Mengistu Haile Mariam unrechtmäßig war, und ihn offiziell von allen Anklagen freigesprochen. Mariam, der sich derzeit im Zimbabwe Robert Mugabes im Exil befindet, war zuvor des Völkermords an Minderheiten und der Verbrechen gegen die Menschlichkeit am eigenen Volk schuldig gesprochen worden. In Äthiopien gilt er nun als unschuldiger Mann, doch es ist noch nicht klar, ob er beabsichtigt, in seine Heimat zurückzukehren.\n\nDie Entscheidung stieß sowohl innerhalb als auch außerhalb des afrikanischen Kontinents auf internationale Verurteilung."
 ethiopia_news.4.a: "Ein riskanter Schritt."
 ethiopia_news.5.t: "Mengistu kehrt zurück"
 ethiopia_news.5.d: "Nach einer langen Phase der Überlegung und einer offiziellen Einladung durch die äthiopische Regierung hat sich der ehemalige kommunistische Diktator Mengistu Haile Mariam entschieden, nach Äthiopien zurückzukehren. Dort wird erwartet, dass er erneut eine führende Position innerhalb der kommunistischen Partei Äthiopiens einnimmt."
 ethiopia_news.5.a: "Der Diktator kehrt zurück."
 ethiopia_news.6.t: "Die Wiederherstellung der PDRE"
 ethiopia_news.6.d: "In einem politischen Schock hat die äthiopische Regierung beschlossen, die Verfassung von 1995 aufzuheben und die Macht erneut an die kommunistische Partei zu übergeben.\n\nMengistu Haile Mariam hat heute erneut die Führung des Landes übernommen - einen Eid, der seine nun wieder grenzenlose Macht im Land an ein festes Regelwerk gebunden hätte, lehnte er jedoch ab. Auf die Frage eines der wenigen verbliebenen internationalen Journalisten kommentierte er: \"Ich weiß, was gut für das Volk ist, ich brauche keinen Eid.\"\n\nEs wird nun weithin erwartet, dass Äthiopien in die dunklen Tage der 1980er Jahre zurückfallen wird."
 ethiopia_news.6.a: "Die PDRE ist auf die Weltbühne zurückgekehrt."
 ethiopia_news.7.t: "Waffenstillstand zwischen Äthiopien und Eritrea"
 ethiopia_news.7.d: "Die Regierungen Äthiopiens und Eritreas haben sich darauf geeinigt, die Feindseligkeiten einzustellen und einen Waffenstillstand zu erklären. Seit Beginn des Konflikts im Jahr 1998 hat die Organisation für Afrikanische Einheit versucht, einen Friedensplan zur Lösung des Grenzkonflikts zwischen beiden Ländern vorzuschlagen. Offenbar haben sich die Länder nun endlich darauf geeinigt, ihre Probleme friedlich zu lösen."
 ethiopia_news.7.a: "Endlich"
 ethiopia_news.8.t: "Eritrea im Eritreisch-Äthiopischen Krieg besiegt!"
 ethiopia_news.8.d: "Heftige Kämpfe seit Ausbruch der Feindseligkeiten am 6. Mai 1998 wurden von Experten als Patt eingeschätzt, doch die Experten irrten sich!\n\nBerichten zufolge wurde Isaias Afwerki von äthiopischen Streitkräften festgenommen, und das Schicksal des eritreischen Staates bleibt ungewiss."
 ethiopia_news.8.a: "Besorgniserregende Entwicklungen!"
 ETH_looming_famine: "Drohende Hungersnot"
 ETH_looming_famine_desc: "Eine Hungersnot zeichnet sich weiterhin am Horizont ab. Wenn wir die Lage in unserer Nation nicht bald stabilisieren, droht eine weitverbreitete Hungersnot. Unser Krieg mit Eritrea und der Verlust unserer Küstengebiete haben dieses Problem nur noch verschärft."
 ETH_idea_monarchist: "Monarchismus im Aufschwung"
 ETH_idea_monarchist_desc: "Im Land und innerhalb der Regierung wächst die Unterstützung für die Dynastie Selassie."
 ETH_idea_stabilized_food_supply: "Stabilisierte Lebensmittelversorgung"
 ETH_idea_stabilized_food_supply_desc: "Die Lebensmittelversorgung ist endlich stabilisiert worden, und wir können unsere Bevölkerung weiterhin versorgen und unterstützen. Eine sichere und stabile Lebensmittelversorgung ist von entscheidender Bedeutung für das Wachstum unserer Nation."
 ETH_idea_famine_strikes: "Hungersnot!"
 ETH_idea_famine_strikes_desc: "Die Hungersnot hat die Nation getroffen! Wir müssen unsere Aufmerksamkeit nach innen richten und unsere Lebensmittelversorgung in Ordnung bringen, bevor sich die Lage weiter verschlimmert und unsere Nation schweren Schaden erleidet."
 ETH_idea_cscec: "CSCEC-Investitionen"
 ETH_idea_cscec_desc: "Die China State Construction Engineering Corporation (CSCEC) hat begonnen, in unserem Land zu investieren. Sie hilft uns zwar bei unserer Entwicklung, doch um den Preis, dass wir anfälliger für chinesischen Einfluss in der Region werden."
 ETH_eritrean_friction: "Anhaltende Spannungen in Eritrea"
 ETH_eritrean_friction_desc: "Die anhaltenden Spannungen in Eritrea haben zu einem Mangel an Stabilität im Land geführt, und viele Flüchtlinge verlassen das Land aus Angst vor dem, was noch kommen könnte."
 ETH_dissolved_the_assembly: ""
 ETH_dissolved_the_assembly_desc: "Die Auflösung der Eritreischen Nationalversammlung hat viele Eritreer äußerst widerwillig gemacht, Veränderungen innerhalb der Grenzen ihrer ehemaligen Nation zu akzeptieren. Dieser Widerstand dürfte mit der Zeit nachlassen, wird jedoch zu mangelnder Gefügigkeit in den besetzten Gebieten führen."
 ETH_1984_mode: "Eritreisches Überwachungsnetzwerk"
 ETH_1984_mode_desc: "Die Prozesse gegen Afwerki und seine Abgeordneten haben die Einrichtung eines weitreichenden und tief verwurzelten Überwachungsnetzes aus Überwachungskameras und Informanten erforderlich gemacht. Es ist zu hoffen, dass dieses Netz nicht lange gebraucht wird, doch das hängt ganz davon ab, wie schnell sich das eritreische Volk integriert und seine neue Identität annimmt."
 ETH_eritrean_constitution: "Äthiopisch-eritreische Bundesverfassung"
 ETH_eritrean_constitution_desc: "Mit einer neuen Verfassung hat Äthiopien seinen Griff über Eritrea gefestigt, allerdings um den Preis, zumindest einen Teil der finanziellen Verantwortung für Eritreas innere Angelegenheiten zu tragen."
 ETH_eritrean_federalisation_underway: "Föderalisierungsgespräche im Gange"
 ETH_eritrean_federalisation_underway_desc: "Solange die Föderalisierung im Gange ist, ist angesichts der laufenden Verhandlungen mit einem gewissen Auswanderungsfaktor zu rechnen."
 ETH_ethiopian_intervention_forces: "Äthiopische Interventionsstreitkräfte"
 ETH_ethiopian_intervention_forces_desc: ""
 ETH_idea_messebo: "Messebo Cement"
 ETH_idea_messebo_desc: ""
 ETH_diplomacy_corps: "Diplomatisches Korps"
 ETH_diplomacy_corps_desc: ""
 ETH_aircraft_investments: ""
 ETH_aircraft_investments_desc: ""
 ETH_motorization_investments: "Marathon Motors Engineering"
 ETH_motorization_investments_desc: ""
 ETH_agricultural_investments: ""
 ETH_agricultural_investments_desc: ""
 ETH_educating_the_people: "Bildung für das Volk"
 ETH_educating_the_people_desc: ""
 ETH_idea_refactored_debt: "Umstrukturierte Schulden"
 ETH_idea_refactored_debt_desc: "Die Umstrukturierung unserer Schulden ist ein sicherer Weg, um mehr Stabilität in unsere Nation zu bringen."
 ETH_eritrean_integration_category: "Eritreische Integrationsbemühungen"
 ETH_eritrean_integration_category_desc: "Wir arbeiten derzeit mit Nachdruck daran, das eritreische Volk in unsere Nation zu integrieren. Der Weg bis an unser Ziel mag schwierig sein, doch er ist notwendig, wenn wir eine Nation unter einem Banner sein wollen.\n\n\n§HAktueller Integrationsstand§!: §G[?ETH_eritrean_acceptance|2]%§!\n\n§HVerbreitung der amharischen Sprache§!: §G[?ETH_amharic_speakers|2]%§!\n\n§HPropagandaverbreitung§!: §G[?ETH_propaganda_distribution|2]%§!\n\n§HUnterdrückung von Separatisten§!: §G[?ETH_crackdown_on_bozos|2]%§!"
 ETH_integration_process_tick: "Integrationsprozess"
 ETH_full_integration: "Vollständige Integration durchsetzen"
 ETH_full_integration_desc: "Da das §Y[ERI.GetAdjective]§! Volk nun fest unter unserer Kontrolle steht, ist die Zeit gekommen, die letzten Überreste des künstlichen Staates auszulöschen, der einst als §Y[ERI.GetName]§! bekannt war."
 ETH_federalise_ERI_flip: "Prozess der §YFöderalisierung§! einleiten"
 ETH_federalise_ERI_flip_desc: "Die fortgesetzte Besetzung des §Y[ERI.GetAdjective]§! Staates ist kein tragfähiges Unterfangen mehr. Und die Menschen dort verlangen nach einer Form der Vertretung, also sollten wir eine neue Regierung einsetzen, die mit unserer eigenen Ausrichtung übereinstimmt."
 ETH_fund_amharic_schools: "Amharischunterricht durchsetzen"
 ETH_fund_amharic_schools_desc: "Die Finanzierung von Amharisch-Sprachschulen wird auf etwa §Y$1.00 Milliarden§! geschätzt. Es ist von entscheidender Bedeutung, dafür zu sorgen, dass das §Y[ERI.GetAdjective]§! Volk unsere Lingua franca versteht, denn wenn es uns nicht versteht, wie sollen wir es regieren?"
 ETH_distribute_propaganda: "Propagandakampagnen"
 ETH_distribute_propaganda_desc: "Auch wenn manche Botschaften teuer sind, ist die Botschaft „Benimmt euch - oder sonst“ recht günstig auf Werbetafeln anzubringen. Die Werbetafeln der neu annektierten Gebiete können für den geringen Preis von §Y$0.50 Milliarden§! mit dieser Botschaft plakatiert werden."
 ETH_utilise_informants: "Informantennetzwerk nutzen"
 ETH_utilise_informants_desc: "Informanten sind teuer, doch glücklicherweise war §Y[ERI.GetName]§! arm und wird uns daher kein Vermögen kosten. Das Kommando unserer Besatzung schätzt, dass wir §R$1.00 Milliarden§! für Bestechungsgelder an den richtigen Stellen bereitstellen müssen."
 ETH_harsh_crackdowns: "Hartes Vorgehen gegen Separatisten"
 ETH_harsh_crackdowns_desc: "Widerspruch ist in unserem neuen §Y[ETH.GetName]§! willkommen, denn so lassen sich Unruhestifter am schnellsten aufspüren. Indem wir die nötigen Mittel bereitstellen, können wir Operationen zur Niederschlagung dieses Widerstands in der Bevölkerung durchführen."
 ETH_make_arrests: "Lautstarke Kritiker verhaften"
 ETH_make_arrests_desc: "„Jeder ist ein Kritiker“ - das ist eine törichte Redensart, denn sie impliziert, dass alle gleich seien. Das sind sie nicht. Die einfachste Lösung dieses Problems besteht darin, jene zu verhaften, die uns und unsere Regierung negativ kritisieren."
 ETH_eritrean_federalisation_category: "Fortschritt der eritreischen Föderalisierung"
 ETH_eritrean_federalisation_category_desc: "Wir arbeiten derzeit mit Nachdruck daran, das Föderationsgesetz durchzusetzen. Der Weg bis an unser Ziel mag schwierig sein, doch er ist notwendig, wenn wir eine zumindest einigermaßen geeinte Nation unter einem föderalen Banner sein wollen.\n\n\n§HAktueller Fortschritt der Föderalisierung§!: §G[?ETH_eritrean_federation_process|2]%§!\n\n§HVerbreitung der amharischen Sprache§!: §G[?ETH_amharic_speakers2|2]%§!\n\n§HPropagandaverbreitung§!: §G[?ETH_propaganda_distribution2|2]%§!\n\n§HUnterdrückung von Separatisten§!: §G[?ETH_crackdown_on_bozos2|2]%§!"
 ETH_federalisation_process_tick: "Föderalisierungsprozess"
 ETH_federalisation_process_tick_desc: "Alle §Y30 Tage§! werden wir über unseren Fortschritt dabei informiert, das §Y[ERI.GetAdjective]§! Volk und seine Systeme mit unserer eigenen Denkweise in Einklang zu bringen."
 ETH_full_federalisation: "Das zweite Föderationsgesetz unterzeichnen"
 ETH_full_federalisation_desc: "Da das §Y[ERI.GetAdjective]§! Volk das Föderationsgesetz nun unterstützt, kann es offiziell in Kraft gesetzt werden. Dies wird §Y[ETH.GetNameWithFlag]§! jedoch daran hindern, die Region zu annektieren."
 ETH_dissolve_ERI_assembly_flip: "Die Versammlung von §Y[ERI.GetNameWithFlag]§! auflösen"
 ETH_dissolve_ERI_assembly_flip_desc: "Das Experiment der Föderalisierung ist ein schrecklicher Fehlschlag gewesen. Das §Y[ERI.GetAdjective]§! Volk ist schlicht ein zu starker destabilisierender Faktor, um ihm die von uns geplante Autonomie zu gewähren. Wir müssen ihre Versammlung auflösen und gegen jedes Gerede von „Autonomie“ hart vorgehen."
 ETH_encourage_language_schools: "Mehr Mittel an Amharisch-Schulen senden"
 ETH_encourage_language_schools_desc: "Die Finanzierung von Amharisch-Sprachschulen wird auf etwa §Y$1.00 Milliarden§! geschätzt. Es ist wichtig, dem §Y[ERI.GetAdjective]§! Volk zu helfen, unsere Lingua franca zu verstehen, denn wenn es uns nicht versteht, wie sollen wir es regieren?"
 ETH_show_off_benefits_federation: "Die Vorteile der Föderalisierung hervorheben"
 ETH_show_off_benefits_federation_desc: "Werbetafeln, Flugblätter, Plakate und Aufkleber - all das ist teuer, genauer gesagt etwa §Y$2.50 Milliarden§!. Doch es ist eine notwendige Investition, wenn wir die Vorteile eines Föderationsgesetzes angemessen herausstellen wollen."
 ETH_falsify_evidence: "Beweise für Verfehlungen fälschen"
 ETH_falsify_evidence_desc: "Am Ende des Tages müssen Agitatoren verschwinden, und wenn sie das Gesetz nicht brechen, besteht der beste Weg darin, ... „alternative Fakten“ zu präsentieren. Manche nennen das Beweisfälschung, aber das können sie dann auch hinter Gittern sagen."
 ETH_deport_agitators: "Agitatoren deportieren"
 ETH_deport_agitators_desc: "Die Schlimmsten der Schlimmen können weder rehabilitiert noch umerzogen werden; sie können schlicht zum Problem eines anderen werden. Unter Nutzung militärischer Strukturen werden wir jene, die unsere neuen Gesetze gebrochen haben, über unsere Grenzen hinaus abschieben."
 ETH_chi_investments_category: "Chinesische Investitionsprojekte"
 ETH_chi_investments_category_desc: "Dank einer Reihe gezielter Investitionen ist es der chinesischen Regierung gelungen, mit uns ein Investitionsabkommen abzuschließen. Dieses Abkommen erlaubt es der chinesischen Regierung, Einfluss in unserem Land zu gewinnen, während wir im Gegenzug kritische Infrastruktur- und wirtschaftliche Entwicklungsprojekte erhalten."
 ETH_european_investments_category: "Europäische Investitionsprojekte"
 ETH_european_investments_category_desc: "Nach mehreren Wochen der Verhandlungen mit der Europäischen Union ist es uns gelungen, eine Reihe von Abkommen über Investitionen in unserem Land abzuschließen."
 ETH_light_rail: "Die Addis-Abeba-Stadtbahn bauen"
 ETH_light_rail_desc: "Die wachsende Stadt Addis Abeba leidet jeden Tag unter Staus, doch China hat bereits eine ausgezeichnete Lösung für dieses Problem: ein brandneues Stadtbahnsystem, das von unseren chinesischen Freunden unterstützt wird."
 ETH_construct_light_rail: "Bau der Addis-Abeba-Stadtbahn"
 ETH_light_rail_2: "Das Stadtbahnnetz erweitern"
 ETH_light_rail_2_desc: "In alle vier Richtungen unseres Stadtbahnnetzes besteht Raum für Erweiterungen. Außerdem können wir die Stadtbahn mit der ebenfalls kürzlich gebauten Addis-Abeba-Dschibuti-Eisenbahn verbinden."
 ETH_construct_light_rail_2: "Erweiterung des Stadtbahnnetzes"
 ETH_construct_light_rail_2_desc: "Nach einer kurzen Diskussion über Haushaltsmaßnahmen haben wir beschlossen, unser Stadtbahnnetz zu erweitern. Diese Erweiterung wird mehr wirtschaftliche Freiheit innerhalb des Landes ermöglichen und zugleich einige unserer Probleme bei der Einfuhr von Lebensmitteln von der Küste lindern."
 ETH_rehabilitation: "Sanierung der Ethio-Dschibuti-Eisenbahn"
 ETH_rehabilitation_desc: "Die Ethio-Dschibuti-Eisenbahn hat ihren Betrieb eingestellt, und jeder Versuch, sie instand zu setzen, wäre Zeitverschwendung. Viele Streckenabschnitte müssen inzwischen vollständig ersetzt werden, um den Betrieb wieder aufnehmen zu können."
 ETH_rehabilitation_railway: "Sanierung der Ethio-Dschibuti-Eisenbahn"
 ETH_rehabilitation_railway_desc: "Die Arbeiten zur Wiederherstellung der Ethio-Dschibuti-Eisenbahn haben begonnen."
 ETH_repair_railway: "Die Ethio-Dschibuti-Eisenbahn reparieren"
 ETH_repair_railway_desc: "Die Ethio-Dschibuti-Eisenbahn muss dringend instand gesetzt werden, und wenn wir das nicht jetzt tun, können die Folgen kostspielig werden."
 ETH_rehabilitation_railway_2: "Sanierung der Ethio-Dschibuti-Eisenbahn"
 ETH_rehabilitation_railway_2_desc: "Die Arbeiten zur Reparatur der Ethio-Dschibuti-Eisenbahn haben begonnen"
 ETH_addis_ababa_djibouti_railway: "Die Addis-Abeba-Dschibuti-Eisenbahn bauen"
 ETH_addis_ababa_djibouti_railway_desc: "Mehr als 95 % des äthiopischen Handels verlaufen über Dschibuti, was das Land für unsere Wirtschaft unverzichtbar macht. Indem wir unsere Hauptstadt direkt mit Dschibuti über eine moderne Eisenbahn verbinden, können wir Reisezeiten und Transportkosten für unsere Waren drastisch senken."
 ETH_construct_addis_ababa_djibouti_railway: "Bau der Addis-Abeba-Dschibuti-Eisenbahn"
 ETH_construct_addis_ababa_djibouti_railway_desc: "Die Arbeiten zum Bau der Addis-Abeba-Dschibuti-Eisenbahn haben begonnen."
 ETH_eritrea_tackle_separatist: "Aufstandsbekämpfungsoperationen"
 ETH_eritrea_tackle_separatist_desc: "Wir haben die potenzielle Bedrohung durch Separatisten noch nicht vollständig beseitigt, die aus irgendeinem Grund zur alten Ordnung zurückkehren wollen. Wenn wir sie nicht mit dem Zuckerbrot überzeugen können, müssen wir womöglich zum Stock greifen."
 ETH_zera_yacob_returns_TT: "Zera Yacob kehrt nach Äthiopien zurück!\n"
 ETH_imperial_guard_TT: "§GDie Kebur Zabagna war die offizielle Garde des Kaisers. Durch ihre Wiederherstellung sichern wir sowohl die Sicherheit des neuen Kaisers als auch sein Prestige.§!"