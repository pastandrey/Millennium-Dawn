 ETH_BANNED_RELEASE_ERI_TOOLTIP: "§Y[ROOT.GetNameWithFlag]§! kann §Y[FROM.GetNameWithFlag]§! nur freilassen, indem die entsprechende Entscheidung zur §YFöderalisierung§! gewählt wird.\n\nFalls diese Entscheidung nicht verfügbar ist, steht §Y[FROM.GetNameWithFlag]§! dauerhaft unter §Y[ROOT.GetAdjective]§! Herrschaft."
