 CYBER_ATTRIB_BTN_TT: "§YVoraussetzungen:§!\n[!cyber_attribution_hunt_button_click_enabled]\n§YWirkung:§!\n[!cyber_attribution_hunt_button_click]"
 CYBER_GPS_BTN_TT_DELAYED: "Spezialisierte Schadsoftware infiltriert die Satellitenempfangsinfrastruktur des Ziels und überflutet militärische Navigationssysteme mit gefälschten Signalen. Im Feld haben Kommandeure Mühe, ihre Kräfte zu koordinieren, da vertraute Orientierungspunkte von ihren digitalen Karten verschwinden. Selbst routinemäßige Manöver werden gefährlich, wenn präzise Navigation versagt."
 CYBER_SIGINT_BTN_TT_DELAYED: "Ein dauerhaftes Implantat gräbt sich lautlos in das Rückgrat der Telekommunikationsinfrastruktur des Ziels ein und kopiert Datenverkehr über Regierungs-, Militär- und Diplomatiekanäle hinweg. Woche für Woche entsteht aus den abgefangenen Strömen ein detailliertes Bild der Absichten, Schwachstellen und inneren Konflikte des Ziels – nachrichtendienstliche Erkenntnisse, die kein konventioneller Spion beschaffen könnte."
 CYBER_RADAR_BTN_TT_DELAYED: "Phantomkontakte erscheinen auf den Luftverteidigungsradarschirmen des Ziels. Die Bedienmannschaften hetzen der Verfolgung von Flugzeugen nach, die gar nicht existieren, und verbrauchen ihre Alarmzyklen bei der Jagd nach Gespenstern. Echte Flüge schlüpfen unbemerkt durch die Lücken. Das Zeitfenster ist kurz, doch dreißig Tage verminderter Lufterfassung können in einer aktiven Kampagne entscheidend sein."
 CYBER_ECON_BTN_TT_DELAYED: "Zahlungsabwickler beginnen Fehlermeldungen auszugeben. Handelsalgorithmen ersticken an beschädigten Datenströmen. Steuerungssysteme in Fabriken erhalten fehlerhafte Updatepakete. Der Angriff ist auf Abstreitbarkeit ausgelegt – eine Kaskade scheinbar unzusammenhängender technischer Ausfälle, die die Wirtschaftsleistung des Ziels über Monate hinweg unauffällig aushöhlt."
 CYBER_PROP_BTN_TT_DELAYED: "Tausende koordinierte Konten überschwemmen die Medienlandschaft des Ziels mit widersprüchlichen Erzählungen. Gefälschte Regierungsdokumente kursieren in sozialen Netzwerken. Das Ziel ist nicht Täuschung, sondern Erschöpfung – eine Bevölkerung, die Wahrheit und Fiktion nicht mehr unterscheiden kann, verliert das Vertrauen in sämtliche Institutionen, einschließlich ihrer eigenen Regierung."
 CYBER_ELECT_BTN_TT_DELAYED: "Wählerregister werden unauffällig manipuliert. In den letzten Tagen vor der Abstimmung kursieren Deepfake-Aufnahmen von Oppositionsführern. Algorithmen sozialer Medien werden ausgenutzt, um bestehende Spaltungen zu verschärfen. Die demokratischen Institutionen des Ziels werden nicht zerstört – sie werden leise unglaubwürdig gemacht, ihre Ergebnisse noch vor Auszählung der ersten Stimme in Zweifel gezogen."
 CYBER_ESPION_BTN_TT_DELAYED: "Eine Spear-Phishing-Kampagne platziert maßgeschneiderte Implantate tief in den sensibelsten Forschungsnetzwerken des Ziels. Die Schadsoftware breitet sich über Monate seitwärts aus und schöpft Baupläne, Testdaten und geschützte Formeln ab. Bis der Einbruch entdeckt wird, bauen unsere Forscher bereits auf dem Gestohlenen auf."
 CYBER_COMMS_BTN_TT_DELAYED: "Eine lautlose Man-in-the-Middle-Operation positioniert sich über den sensibelsten Kommunikationsknoten des Ziels. Befehle von Generälen, Depeschen von Botschaftern und Beratungen des Kabinetts laufen durch dasselbe kompromittierte Relais – kopiert, katalogisiert und in Echtzeit an unsere Analysten weitergeleitet. Das Ziel trifft weiterhin Entscheidungen, ohne zu wissen, dass wir jede einzelne mitlesen."
 CYBER_INFRA_BTN_TT_DELAYED: "Industrielle Kontrollsysteme zur Steuerung von Stromverteilung, Wasseraufbereitung und Logistikknoten erhalten unauffällige, bösartige Firmware-Updates. Sobald die Nutzlast ausgelöst wird, überrollen Kaskadenausfälle die Reparaturteams in mehreren Sektoren gleichzeitig. Der Schaden ist real, physisch und nur langsam rückgängig zu machen."
 CYBER_FIN_BTN_TT_DELAYED: "Die Abwicklungssysteme der Zentralbank brechen zusammen. Geldautomatennetze fallen landesweit aus. Währungshandelsalgorithmen erhalten vergiftete Eingaben, die einen Flash-Crash auslösen. Die Störung reicht weit über das hinaus, was konventionelle Sanktionen erreichen könnten – und anders als Sanktionen bleibt sie ohne eindeutige Zuschreibung."
 CYBER_LOG_BTN_TT_DELAYED: "Software zur Lieferkettenverwaltung stürzt in sämtlichen vorgeschobenen Operationsbasen gleichzeitig ab. Munitionsanforderungen verschwinden in beschädigten Warteschlangen. Algorithmen zur Treibstoffzuteilung leiten Konvois zu nicht existierenden Depots um. Die Kriegsmaschinerie des Feindes zerbricht nicht in der Schlacht – sie verhungert an Ort und Stelle."
 CYBER_SLEEP_BTN_TT_DELAYED: "Geduldig, methodisch, unsichtbar. Unsere Operateure sind nicht hier, um anzugreifen – sie sind hier, um zu bleiben. Ruhende Zugangspunkte werden im kritischen Netzwerkgeflecht des Ziels verankert und stehen zur Aktivierung auf Befehl bereit. Für das nächste Jahr könnten ihre empfindlichsten Systeme praktisch keine Geheimnisse mehr haben."
 CYBER_CRIT_BTN_TT_DELAYED: "Das volle Gewicht unseres Cyberarsenals schlägt auf einmal zu. Stromnetze fallen aus. Militärkommunikation bricht zusammen. Die Industrieproduktion kommt zum Erliegen. Finanzsysteme erstarren. Diese Operation ist das digitale Äquivalent einer strategischen Bombardierungskampagne – sie hinterlässt das Ziel in sämtlichen Bereichen nationaler Macht funktional gelähmt."
 CYBER_DECEPT_BTN_TT_DELAYED: "Wir greifen nicht die Systeme des Ziels an. Wir korrumpieren seinen Verstand. Gefälschte Lagebeurteilungen, manipulierte Befehle mit den Authentifizierungssignaturen ranghoher Kommandeure, verfälschtes Bildmaterial für Entscheidungsträger auf höchster Ebene – jede Entscheidung des Ziels kann auf einer Realität beruhen, die wir konstruiert haben."
 CYBER_ZERO_BTN_TT_DELAYED: "Ein klassifiziertes Arsenal bislang unbekannter Exploits, über Jahre angesammelt und genau für diesen Moment zurückgehalten, wird gleichzeitig gegen die kritischsten Systeme des Ziels eingesetzt. Bis ihre Analysten begreifen, was geschehen ist, sind die Schwachstellen verbrannt und der Schaden irreversibel."
 CYBER_HARDEN_BTN_TT_DELAYED: "Unsere Sicherheitsteams prüfen jede exponierte Schnittstelle, schließen jede bekannte Schwachstelle und härten die Protokolle, die ausländische Nachrichtendienste am häufigsten ins Visier nehmen. Die Arbeit ist unerquicklich, doch jede geschlossene Tür ist ein Angriffsvektor weniger für den Gegner. Die beste Cyberoperation ist die, die nie einschlägt."
 CYBER_CNTRINT_BTN_TT_DELAYED: "Analysten durchforsten Netzwerkprotokolle und Systemtelemetrie nach subtilen Anzeichen ausländischer Präsenz – anomalen Zugriffsmustern, unerwarteten ausgehenden Verbindungen und ruhenden Prozessen ohne legitimen Zweck. Ein infiziertes Netzwerk zu säubern ist langsame, sorgfältige Arbeit. Ein unentdecktes Implantat ist weit gefährlicher als ein bekanntes."
 CYBER_ATTRIB_BTN_TT_DELAYED: "Unsere digitalen Forensikteams rekonstruieren den Angriffsweg – sie verfolgen Malware-Signaturen, kartieren Kommando-und-Kontroll-Infrastrukturen und katalogisieren die Operationssicherheitsmuster, die den verantwortlichen Akteur identifizieren. Den Staat hinter dem Eindringen zu benennen, ist der erste Schritt zu einer verhältnismäßigen Antwort."
