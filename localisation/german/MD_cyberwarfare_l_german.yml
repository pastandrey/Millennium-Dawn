 has_cyber_capability_4: "[THIS.GetNameWithFlag] verfügt über ein §YCyberkommando§! der §GStufe 4§!"
 cyber_not_recently_attacked_target_tt: "[THIS.GetNameWithFlag] hat nicht kürzlich einen Cyberangriff gegen die ausgewählte Nation durchgeführt."
 cyber_not_at_op_capacity_tt: "Das §YCyberkommando§! von [THIS.GetNameWithFlag] operiert nicht an seiner maximalen Einsatzkapazität."
 cyber_has_valid_target_tt: "Das derzeit ausgewählte Ziel ist ein gültiges Ziel für Cyberangriffe."
 cyber_not_doing_current_mission_against_tt: "[ROOT.GetNameWithFlag] führt derzeit keine Mission dieses Typs gegen die ausgewählte Zielnation durch."
 cyber_has_expanded_offensive_tt: "Hat die offensiven Cyberkriegsführungsfähigkeiten unserer Nation erweitert."
 cyber_has_expanded_defensive_tt: "Hat die defensiven Cyberkriegsführungsfähigkeiten unserer Nation erweitert."