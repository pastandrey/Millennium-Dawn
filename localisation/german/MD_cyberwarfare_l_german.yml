 cyber_sigint_surveillance_tracking: "SIGINT-Überwachung aktiv"
 cyber_sigint_surveillance_tracking_desc: "Unsere Fernmeldeaufklärungsteams überwachen die Kommunikation und den Netzwerkverkehr des Ziels und beschleunigen die Erkenntnisgewinnung weit über die normale passive Rate hinaus. Die Operation wird etwa 180 Tage andauern."
 cyber_radar_spoofing_tracking: "Radar-Täuschung aktiv"
 cyber_radar_spoofing_tracking_desc: "Eine koordinierte Nutzlast der elektronischen Kampfführung speist Falschziele in die Lufterfassungsnetzwerke des Ziels ein und beeinträchtigt dessen Lagebild. Die Operation wird innerhalb von 30 Tagen abgeschlossen sein."
 cyber_election_interference_tracking: "Wahlbeeinflussung aktiv"
 cyber_election_interference_tracking_desc: "Unsere Operateure führen eine koordinierte Einflusskampagne gegen den politischen Informationsraum des Ziels durch, streuen Desinformation und finanzieren Oppositionsnetzwerke, um das öffentliche Vertrauen in die Regierung zu untergraben. Die Operation wird etwa 180 Tage andauern."
 cyber_industrial_espionage_tracking: "Industriespionage aktiv"
 cyber_industrial_espionage_tracking_desc: "Unsere Teams haben sich Zugang zu den Forschungsnetzwerken des Ziels verschafft und extrahieren klassifizierte technische und industrielle Daten. Analysten werten das gestohlene Material aus."
 cyber_comms_intercept_tracking: "Kommunikationsabfang aktiv"
 cyber_comms_intercept_tracking_desc: "Unsere Fernmeldeteams haben die Regierungs- und Diplomatiekommunikationskanäle des Ziels infiltriert. Wir überwachen deren Verkehr und gewinnen in Echtzeit verwertbare Erkenntnisse."
 cyber_financial_system_attack_tracking: "Angriff auf das Finanzsystem aktiv"
 cyber_financial_system_attack_tracking_desc: "Unsere Operateure haben zerstörerische Nutzlasten gegen die Zentralbank- und Zahlungsabwicklungsinfrastruktur des Ziels eingesetzt und damit dessen Fähigkeit, Handel zu betreiben und staatliche Operationen zu finanzieren, massiv eingeschränkt. Die Operation wird etwa 150 Tage andauern."
 cyber_logistics_disruption_tracking: "Störung der Militärlogistik aktiv"
 cyber_logistics_disruption_tracking_desc: "Wir beeinträchtigen aktiv die militärischen Führungs- und Kontrollsysteme sowie die Software zur Verwaltung der Lieferketten des Ziels, wodurch dessen Nachschub- und Verstärkungszyklen gestört werden. Die Operation wird innerhalb von 90 Tagen abgeschlossen."
 cyber_sleeper_network_tracking: "Schläfernetzwerk aktiviert"
 cyber_sleeper_network_tracking_desc: "Wir haben dauerhaften, vorbereiteten Zugriff innerhalb der kritischen Netzwerke des Ziels eingerichtet. Dieser Brückenkopf ermöglicht schnellere und kostengünstigere künftige Operationen, solange er unentdeckt bleibt — bis zu ein Jahr lang."
 cyber_deception_campaign_tracking: "Strategische Täuschungskampagne aktiv"
