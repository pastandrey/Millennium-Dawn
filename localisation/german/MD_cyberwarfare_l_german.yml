 cyber_sleeper_network_tracking_complete_tt: "Implantation des Schläfernetzwerks abgeschlossen. Unsere Teams haben Werkzeuge für dauerhaften Zugriff in den Netzwerken des Gegners für eine spätere Aktivierung eingebettet."
 cyber_deception_campaign_tracking_complete_tt: "Täuschungskampagne abgeschlossen. Unsere Operateure haben ihre False-Flag-Operation zur Irreführung der Nachrichtendienstanalysten des Gegners beendet."
 cyber_zero_day_strike_tracking_complete_tt: "Zero-Day-Schlag abgeschlossen. Unsere Einheiten haben einen hochwirksamen Exploit gegen eine nicht offengelegte Schwachstelle in den kritischen Systemen des Gegners eingesetzt."
 cyber_network_hardening_active: "Netzwerke gehärtet"
 cyber_network_hardening_active_desc: "Unsere Cybersicherheitsteams haben Authentifizierungssysteme verstärkt, bekannte Schwachstellen geschlossen und kritische Zugriffskanäle isoliert. Solange diese Verteidigungsmaßnahmen bestehen, sind ausländische Infiltrationsversuche deutlich weniger wahrscheinlich erfolgreich."
 cyber_counter_intrusion_active: "Gegeninfiltrationssuche"
 cyber_counter_intrusion_active_desc: "Analysten fahnden aktiv nach fremder Präsenz in unseren Netzwerken — sie durchforsten Protokolle, isolieren ungewöhnliche Prozesse und entfernen persistente Implantate. Das Bewusstsein für operative Sicherheit ist in sämtlichen Regierungssystemen erhöht."
 cyber_attribution_hunt_active: "Attributionssuche im Gange"
 cyber_attribution_hunt_active_desc: "Digitale Forensikteams rekonstruieren Angriffspfade und katalogisieren die Signaturen des verantwortlichen Akteurs. Die gewonnenen Erkenntnisse werden unsere Verteidigung stärken und eine verhältnismäßige Reaktion ermöglichen."
 MD_cyber.201.t: "Infiltration beseitigt"
 MD_cyber.201.d: "Unsere Gegeninfiltrationsteams haben ihre Durchsuchung abgeschlossen. Fremde Zugriffswerkzeuge, Überwachungsimplantate und persistente Hintertüren wurden identifiziert und entfernt. Unsere Netzwerke sind bereinigt."
 MD_cyber.201.a: "Gute Arbeit. Bleiben Sie wachsam."
 MD_cyber.202.t: "Durchsuchung abgeschlossen — Netzwerke gesichert"
 MD_cyber.202.d: "Unsere Gegeninfiltrationsteams haben ihre Durchsuchung sämtlicher kritischer Systeme abgeschlossen. Es wurden keine fremden Zugriffswerkzeuge oder Überwachungsimplantate entdeckt. Unsere Netzwerke scheinen sicher zu sein."
 MD_cyber.202.a: "Die Wachsamkeit aufrechterhalten."
 MD_cyber.1.t: "Operation erfolgreich"
 MD_cyber.1.d: "Unsere Cyberteams haben die Operation erfolgreich durchgeführt. Es wurden keinerlei Spuren hinterlassen — das Ziel hat keinen Hinweis auf unsere Beteiligung."
 MD_cyber.1.a: "Ausgezeichnete Arbeit."
 MD_cyber.2.t: "Fremde Infiltration entdeckt"
 MD_cyber.2.d: "Unsere Sicherheitsteams haben Anzeichen eines externen Cyberangriffs festgestellt. Die Angreifer haben ihren Ursprung wirksam verschleiert — wir können nicht feststellen, wer verantwortlich ist."
 MD_cyber.2.a: "Unsere Verteidigung verstärken."
 MD_cyber.3.t: "Cyberangriff durch [?disp_name_agressor.GetNameWithFlag] identifiziert"
 MD_cyber.3.d: "Unsere Nachrichtendienste haben eine kürzliche Cyberinfiltration auf [?disp_name_agressor.GetNameWithFlag] zurückgeführt. Der Angriff war gezielt und vorsätzlich. Wir haben formell diplomatischen Protest eingelegt."
 MD_cyber.3.a: "Den Aggressor verurteilen."
 MD_cyber.4.t: "Operation abgebrochen"
 MD_cyber.4.d: "Unsere Cyberteams konnten keinen verlässlichen Zugriffspunkt in den Systemen des Ziels etablieren. Die Operation wurde abgebrochen, bevor Maßnahmen ergriffen werden konnten. Weitere Vorbereitungen sind erforderlich."
 MD_cyber.4.a: "Neu formieren und Lage bewerten."
 MD_cyber.11.t: "GPS-Signalstörung"
 MD_cyber.11.d: "Militäreinheiten melden weitreichende Ausfälle der satellitengestützten Navigationssysteme. Kommandeure im Feld haben Schwierigkeiten, ihre Kräfte wirksam zu koordinieren. Ein externer Angriff auf unsere Navigationssignale wird vermutet."
 MD_cyber.11.a: "Auf Ersatznavigation umstellen."
 MD_cyber.12.t: "Finanznetzwerke kompromittiert"
 MD_cyber.12.d: "Banken, Börsen und Zahlungsabwickler melden kaskadierende Systemausfälle. Die Störung ist kein Zufall — unsere Analysten gehen davon aus, dass fremde Operateure unsere Finanzinfrastruktur ins Visier genommen haben."
 MD_cyber.12.a: "Schäden isolieren und eindämmen."
 MD_cyber.13.t: "Informationsraum infiltriert"
 MD_cyber.13.d: "Soziale Medien und Nachrichtennetzwerke werden mit koordinierter Desinformation überflutet. Das öffentliche Vertrauen in die Regierung schwindet. Unsere Analysten gehen von einer ausländischen Einflussoperation aus."
 MD_cyber.13.a: "Eine Gegenkampagne einleiten."
 MD_cyber.14.t: "Kritische Infrastruktur unter Angriff"
 MD_cyber.14.d: "Kraftwerke, Verkehrsknotenpunkte und Kommunikationszentren haben gleichzeitig Ausfälle erlitten. Ingenieure berichten von gezielter Sabotage über unsere Kontrollsysteme. Dies stellt eine erhebliche Eskalation dar."
 MD_cyber.14.a: "Nationalen Notstand ausrufen."
 MD_cyber.15.t: "Katastrophaler Cyberangriff"
 MD_cyber.15.d: "Jedes kritische System im Land wurde gleichzeitig getroffen — Finanznetzwerke, Stromnetze, militärische Kommunikation und Lieferketten. Umfang und Präzision dieses Angriffs sind beispiellos. Das Land ist gelähmt."
 MD_cyber.15.a: "Alles mobilisieren, was wir haben."
 MD_cyber.16.t: "Kommunikation kompromittiert"
 MD_cyber.16.d: "Fremde Operateure haben unsere verschlüsselten Kommunikationskanäle infiltriert. Sensible Übertragungen werden vermutlich von einem feindlichen staatlichen Akteur überwacht."
 MD_cyber.16.a: "Kommunikationssperre einleiten."
 MD_cyber.17.t: "Radarnetzwerke gestört"
 MD_cyber.17.d: "Unsere Luftverteidigungsradare liefern falsche Signale. Geisterkontakte überlasten die Bedienmannschaften — feindliche Flugzeuge könnten das Chaos ausnutzen."
 MD_cyber.17.a: "Auf Ersatzprotokolle umstellen."
 MD_cyber.18.t: "Ausländische Einflussoperation entdeckt"
 MD_cyber.18.d: "Es sind Beweise für eine koordinierte ausländische Einflusskampagne gegen unsere innenpolitische Landschaft aufgetaucht. Desinformation verbreitet sich über soziale Netzwerke und vertieft gesellschaftliche Spaltungen."
 MD_cyber.18.a: "Ausländische Einmischung verurteilen."
 MD_cyber.19.t: "Forschungsnetzwerke kompromittiert"
 MD_cyber.19.d: "Geheime Forschungsdaten und industrielle Entwürfe wurden aus unseren nationalen Laboren und von Verteidigungsunternehmen gestohlen. Das volle Ausmaß des Diebstahls wird noch untersucht."
 MD_cyber.19.a: "Alle geheimen Systeme überprüfen."
 MD_cyber.110.t: "Führungsnetzwerke infiltriert"
 MD_cyber.110.d: "Unsere militärischen und diplomatischen Kommunikationskanäle wurden infiltriert. Feindliche Operateure fangen Befehle und sensible Korrespondenz in Echtzeit ab."
 MD_cyber.110.a: "Alle kompromittierten Kanäle bereinigen."
 MD_cyber.111.t: "Zentralbanksysteme unter Angriff"
 MD_cyber.111.d: "Unsere Zentralbank und die zentrale Finanzabwicklungsinfrastruktur stehen unter anhaltendem Cyberangriff. Die Transaktionsabwicklung ist zum Erliegen gekommen und die Währungsmärkte geraten rasch in Instabilität."
 MD_cyber.111.a: "Finanziellen Notstand ausrufen."
 MD_cyber.112.t: "Militärische Lieferketten gestört"
 MD_cyber.112.d: "Die Führungssoftware unserer Frontlogistik ist in mehreren Sektoren ausgefallen. Einheiten an der Front melden Versorgungsengpässe, da sich die Störung durch das gesamte System frisst."
 MD_cyber.112.a: "Auf manuelle Versorgung umstellen."
 MD_cyber.113.t: "Persistente Infiltration entdeckt"
 MD_cyber.113.d: "Unsere Sicherheitsdienste haben ruhende Zugriffspunkte tief in unserer kritischen Netzwerkinfrastruktur entdeckt. Die Implantate sind hochentwickelt und vermutlich bereits seit einiger Zeit aktiv."
 MD_cyber.113.a: "Umfassende Netzwerkprüfung einleiten."
 MD_cyber.114.t: "Führungsaufklärung kompromittiert"
 MD_cyber.114.d: "Unsere Nachrichtendienste haben eine systematische Kampagne gefälschter Signalübertragungen und manipulierter Kommunikation aufgedeckt. Unsere militärischen Kommandeure könnten auf bewusst verfälschte Informationen reagiert haben."
 MD_cyber.114.a: "Taskforce zur Signalverifikation einrichten."
 MD_cyber.115.t: "Zero-Day-Schlag"
 MD_cyber.115.d: "Ein verheerender präziser Cyberangriff hat gleichzeitig unsere kritischsten Systeme getroffen und bislang unbekannte Exploits genutzt. Industriesteuerungen, Energieinfrastruktur und Verteidigungsnetzwerke sind betroffen."
 MD_cyber.115.a: "Nationale Cybernotfallprotokolle aktivieren."
 cyber_propaganda_ops_malus: "Informationsraum infiltriert"
 cyber_propaganda_ops_malus_desc: "Eine koordinierte ausländische Desinformationskampagne untergräbt aktiv das öffentliche Vertrauen in unsere Regierung und Institutionen, verringert die politische Leistungsfähigkeit und schwächt den nationalen Zusammenhalt."
 cyber_gps_jamming_malus: "GPS-Systeme gestört"
 cyber_gps_jamming_malus_desc: "Fremde Cyberoperateure haben unsere militärische Satellitennavigationsinfrastruktur kompromittiert und dadurch die Truppenkoordination sowie das Lagebewusstsein auf dem Gefechtsfeld erheblich beeinträchtigt."
 cyber_economic_disruption_malus: "Finanznetzwerke kompromittiert"
 cyber_economic_disruption_malus_desc: "Eine anhaltende ausländische Cyberkampagne beeinträchtigt unsere Bankensysteme, Zahlungsnetzwerke und Industrieproduktion. Die wirtschaftliche Erholung wird Zeit in Anspruch nehmen."
 cyber_infrastructure_damage_malus: "Infrastrukturschäden"
 cyber_infrastructure_damage_malus_desc: "Fremde Cyberangreifer haben unserer kritischen Infrastruktur erheblichen Schaden zugefügt und dadurch Logistik, Bauwesen und Versorgungsverteilung beeinträchtigt."
 cyber_critical_strike_malus: "Katastrophaler Cyberangriff"
 cyber_critical_strike_malus_desc: "Ein verheerender umfassender Cyberangriff hat unsere industrielle Basis, Kommunikation und Lieferketten gleichzeitig gelähmt. Die Erholung wird langwierig und schmerzhaft sein."
 cyber_sigint_surveillance_malus: "Kommunikation unter Überwachung"
 cyber_sigint_surveillance_malus_desc: "Fremde Operateure haben unsere verschlüsselte Kommunikationsinfrastruktur infiltriert. Sensible Übertragungen werden vermutlich überwacht, was koordinierte politische Maßnahmen erschwert."
 cyber_radar_spoofing_malus: "Radarnetzwerk kompromittiert"
 cyber_radar_spoofing_malus_desc: "Fremde Cyberoperateure speisen Falschsignale in unsere Luftverteidigungsradare ein und beeinträchtigen dadurch unsere Aufklärungs- und Abfangfähigkeiten."
 cyber_election_interference_malus: "Ausländische Einflusskampagne aktiv"
 cyber_election_interference_malus_desc: "Eine koordinierte ausländische Desinformationskampagne untergräbt das öffentliche Vertrauen und vertieft innenpolitische Spaltungen."
 cyber_industrial_espionage_malus: "Forschungsnetzwerke kompromittiert"
 cyber_industrial_espionage_malus_desc: "Geheime Forschungsdaten und industrielle Entwürfe wurden aus unseren nationalen Laboren und von Verteidigungsunternehmen gestohlen, wodurch unsere Entwicklungsprogramme zurückgeworfen werden."
 cyber_comms_intercept_malus: "Führungsnetzwerke kompromittiert"
 cyber_comms_intercept_malus_desc: "Unsere militärische und diplomatische Kommunikation wurde infiltriert. Die operative Sicherheit ist beeinträchtigt und die Koordination leidet."
 cyber_financial_system_attack_malus: "Finanzinfrastruktur unter Angriff"
 cyber_financial_system_attack_malus_desc: "Ein anhaltender Angriff auf unsere Zentralbank- und Zahlungsinfrastruktur hat in der gesamten Wirtschaft kaskadierende Ausfälle verursacht."
 cyber_logistics_disruption_malus: "Militärische Lieferketten gestört"
 cyber_logistics_disruption_malus_desc: "Die Führungssoftware unserer Frontlogistik wurde kompromittiert. Einheiten an der Front leiden unter Versorgungsengpässen."
 cyber_sleeper_network_malus: "Persistente Netzwerkinfiltration"
 cyber_sleeper_network_malus_desc: "Fremde Operateure haben ruhende Zugriffspunkte tief in unseren kritischen Netzwerken eingebettet und halten dadurch einen dauerhaften Zugriff niedriger Intensität auf sensible Systeme aufrecht."
 cyber_deception_campaign_malus: "Führungsaufklärung vergiftet"
 cyber_deception_campaign_malus_desc: "Unsere Kommandeure haben auf gefälschte Signalübertragungen und manipulierte Kommunikation reagiert. Militärische Koordination und Lagebewusstsein sind schwer beeinträchtigt."
 cyber_zero_day_strike_malus: "Zero-Day-Schlag"
 cyber_zero_day_strike_malus_desc: "Ein verheerender Präzisionsschlag mit klassifizierten Zero-Day-Exploits hat gleichzeitig unsere kritischsten industriellen Systeme und Infrastrukturen getroffen."
 upgrade_establish_cyber_operations_division: "Cyberoperationsabteilung"
 upgrade_establish_cyber_operations_division_desc: "Richtet innerhalb des Nachrichtendienstes eine eigene Cyberoperationsabteilung ein und schafft damit die grundlegenden Fähigkeiten für einfache digitale Kriegsführung. Diese Abteilung schaltet für uns die Möglichkeit frei, §YCyberkriegsführungs§!-Operationen durchzuführen."
 upgrade_offensive_cyber_operations: "Offensive Cyberkriegsführung"
 upgrade_offensive_cyber_operations_desc: "Erweitert die Abteilung um fortgeschrittene Werkzeugkästen für anhaltende Bedrohungen und die Erforschung von Zero-Day-Exploits, wodurch anspruchsvollere Operationen möglich werden."
 upgrade_cyber_warfare_operational_planning: "Cyberkommando mit vollem Einsatzspektrum"
 upgrade_cyber_warfare_operational_planning_desc: "Entwickelt die Abteilung zu einem vollständig integrierten Cyberkommando weiter, das in der Lage ist, komplexe mehrdimensionale Operationen gegen gehärtete Ziele zu koordinieren."
 upgrade_defensive_cyber_operations: "Defensive Cyberoperationen"
 upgrade_defensive_cyber_operations_desc: "Baut ein eigenes Verteidigungsteam auf, das auf die Härtung unserer eigenen Netzwerke, die Erkennung von Infiltrationen und die Verschleierung unserer digitalen Spuren spezialisiert ist."
 upgrade_cyber_elite: "Zero-Day-Arsenal"
 upgrade_cyber_elite_desc: "Entwickelt und bevorratet ein klassifiziertes Arsenal elitärer Zero-Day-Exploits, die selbst die am stärksten gehärteten Systeme der Welt durchdringen können."
 cyber_offense_power_modifier: "Offensive Cyberkriegsführung"
 cyber_offense_power_modifier_desc: "Dieser Wert bestimmt, wie stark unsere offensiven Cyberkriegsführungsoperationen sind."
 cyber_defense_rating_modifier: "Defensive Cyberkriegsführung"
 cyber_capability_modifier: "Cyberkriegsführungsfähigkeit"
 cyber_attribution_bonus_modifier: "Cyber-Attributionsbonus"
 cyber_unlock: "Schaltet das System §YCyberkriegsführung§! in der Oberfläche der §YInternationalen Systeme§! frei"
