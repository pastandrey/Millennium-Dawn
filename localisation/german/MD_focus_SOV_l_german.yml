 SOV_scientific_councils_desc: "Wir müssen die begabtesten jungen Russen zügig durch Spitzeninstitutionen schleusen, damit sie der Revolution dienen. Ihre Innovationen und Erfindungen werden unseren wissenschaftlichen und militärischen Vorsprung sichern."
 RUS_establish_me: "Ein neues Russland"
 RUS_establish_me_desc: "Nach dem Zusammenbruch der russischen Regierung muss ein neuer russischer Staat aufgebaut werden."
 RUS_hold_kaliningrad_conference: "Die Kaliningrad-Konferenz abhalten"
 RUS_hold_kaliningrad_conference_desc: "Der russische Staat muss eine geeinte, zusammenhängende und handlungsfähige Kraft sein. Wir müssen die Kaliningrad-Konferenz organisieren, um sicherzustellen, dass das Neue Russland ein stabiler und demokratischer Staat wird."
 RUS_continue_reunification: "Die Einigungsbemühungen fortsetzen"
 RUS_continue_reunification_desc: "Offenbar halten einige Menschen noch immer Gebiete des ehemaligen russischen Staates besetzt, und wir müssen so schnell wie möglich durch Verhandlungen eingreifen, um das zu regeln."
 RUS_establish_rusfor: "RUSFOR gründen"
 RUS_establish_rusfor_desc: "Russland existiert nicht mehr, und das ist in mancher Hinsicht ein Problem. Wir müssen uns mit der Schaffung eines neuen Territoriums für den russischen Staat befassen."
 russia.119.t: "Heiligsprechung der Romanow-Familie"
 russia.119.d: "Die Familie Romanow wurde heute Morgen von der Russisch-Orthodoxen Kirche heiliggesprochen. Dies war von Streit aus verschiedenen gesellschaftlichen Bereichen begleitet, sogar innerhalb der Kirche selbst. Viele glauben, dass die Heiligsprechung dem Begriff der Heiligkeit nicht gerecht wird, doch die Kirche hat diesen Schritt dennoch vollzogen."
 russia.119.a: "Die Kommunisten an ihre Taten erinnern!"
 russia.119.b: "Die Toten ehren..."
 russia.120.t: "Gescheiterter Testflug der Su-37"
 russia.120.d: "Heute wurde in der Nähe von Schatura ein Testflug durchgeführt, doch das Flugzeug erlitt eine schwere Fehlfunktion. Das linke Höhenleitwerk brach während eines Manövers mit hoher g-Belastung ab, was zum Absturz und zum Verlust der Maschine führte. Das strukturelle Versagen wurde durch wiederholtes Überschreiten der Auslegungsgrenze während sechs Jahren Testbetrieb verursacht."
 russia.120.a: "Bedauerlich..."
 russia_news.10000.t: "Wladimir Putin in einen Skandal verwickelt"
 russia_news.10000.d: "Die russischen Medien berichten derzeit mit großer Geschwindigkeit über den jüngsten Skandal um Wladimir Putin. Ihm wird vorgeworfen, bestimmten Personen größere Monopole in einzelnen Industriezweigen versprochen zu haben, und diese Behauptung wird durch eine geheime Aufnahme gestützt, die ein verbitterter Geschäftsmann der Presse zugespielt hat. Die Nachricht von diesem Skandal hat sich rasch in ganz Russland und der Region verbreitet und Putins Ansehen schwer beschädigt. Seine politischen Gegner haben dies sofort aufgegriffen, Putin angegriffen und ihn als einen Mann dargestellt, der Russland an Unternehmensinteressen verkauft. Einige spekulieren bereits, dass er dadurch die Wahl verlieren könnte, was einer scheinbar langen und erfolgreichen Karriere ein schnelles Ende setzen würde."
 russia_news.10000.a: "Der Wind der Demokratie weht erneut"
