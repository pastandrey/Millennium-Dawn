 SOV_svr_open: "§YAuslandsnachrichtendienst§!: §GÖffnen§!"
 SOV_svr_close: "§YAuslandsnachrichtendienst§!: §RSchließen§!"
 SOV_constantinople_rename: "Konstantinopel ist wiedergeboren"
 SOV_constantinople_rename_desc: "Wir stellen den historischen Namen Konstantinopel wieder her. Unsere Aufgabe ist es, seinen früheren Glanz zurückzubringen, wie vor dem Fall von Byzanz, als Symbol unserer erneuerten Macht in der Region."
 SOV_constantinople_police_operation: "Spezielle Polizeioperation"
 SOV_constantinople_police_operation_desc: "Türkischer Widerstand bedroht unsere Kontrolle in der Region. Wir werden die Sicherheitskräfte einsetzen, um jeden Widerstand vollständig zu unterdrücken und Stabilität zu sichern. Diese Operation stellt unsere Vorherrschaft sicher."
 SOV_constantinople_subject_rf: "Konstantinopel in seinen natürlichen Hafen"
 SOV_constantinople_subject_rf_desc: "Nachdem der Widerstand zerschlagen und die wichtigsten Einrichtungen gesichert wurden, sind wir bereit, dieses Gebiet vollständig in unser großes Imperium einzugliedern. Das markiert ein neues Kapitel unserer Expansion."
 SOV_jirik_conts_reform_idea: "Verfassungsreform"
 SOV_jirik_new_conts_monarchy_idea: "Die konstitutionelle Monarchie Russlands"
 SOV_jirik_new_romanov_monarchy_idea: "Die neue Romanow-Monarchie"
 SOV_jirik_police_state_reform_idea: "Reformierte Innenministerien"
 russia_governorate.20.t: "Russland hat beschlossen, aus uns ein Gouvernement zu machen"
 russia_governorate.20.d: "Russland lehnt die bisherige Staatsstruktur entschieden ab und drängt auf die Rückkehr administrativer Gliederungen. Sie bestehen darauf, dass wir eines ihrer Gouvernements werden."
 russia_governorate.20.o1: "Gemeinsam werden wir das große Reich wiederbeleben!"
 russia_governorate.20.o2: "Widerstand leisten und zubeißen!"
 russia_governorate.20.o3: "Einen Unionsstaat vorschlagen"
 russia_governorate.21.t: "Armenien kehrt heim"
 russia_governorate.21.d: "Die Regierung Armeniens hat klug gehandelt und eine Konfrontation vermieden. Armenien wird erneut Teil des Russischen Reiches und stellt alte Bindungen wieder her."
 russia_governorate.21.o1: "Ausgezeichnet."
 russia_governorate.22.t: "Armenien widersetzt sich uns!"
 russia_governorate.22.d: "Armenien hat sich mutig Russlands Wünschen nach einem Unionsstaat widersetzt. Wir müssen eine angemessene Antwort auf diese Auflehnung vorbereiten."
 russia_governorate.22.o1: "Narren."
 russia_governorate.23.t: "Armenien schlägt einen Unionsstaat vor"
 russia_governorate.23.d: "Die armenische Regierung hat eine weniger aggressive Alternative angeboten: die beschleunigte Schaffung eines Unionsstaates. Offenbar will sie ihre möglichen Machtverluste verringern."
 russia_governorate.23.o1: "So soll es einen Unionsstaat geben"
 russia_governorate.23.o2: "Kein Armenien."
 sov_nationalists.52.t: "[FROM.GetName] hat in unserem Land einen Putsch durchgeführt!"
 sov_nationalists.52.d: "Russische Geheimdienste haben in unserem Land einen Putsch organisiert und einen ihnen loyalen Herrscher an die Macht gebracht. Erneut sind wir an die Ketten russischer Kontrolle gebunden."
 sov_nationalists.52.o1: "Oh nein"
 sov_nationalists.53.t: "Operation: Grill"
 sov_nationalists.53.d: "Russische Streitkräfte haben überraschende Präventivschläge gegen aserbaidschanische Militäreinrichtungen durchgeführt und rücken rasch auf Baku vor – der Beginn eines neuen Krieges."
 sov_nationalists.53.o1: "Beenden wir das"
 sov_nationalists.53.o2: "Oh nein"
 sov_nationalists.54.t: "Integration Istanbuls"
 sov_nationalists.54.d: "Unsere Priorität ist es, Istanbul und die umliegenden Gebiete in das territoriale System Russlands einzugliedern und das byzantinische Kulturerbe wiederzubeleben. Wir werden unverzüglich damit beginnen, historische Namen wiederherzustellen."
 sov_nationalists.54.o1: "Wunderbar"
 sov_nationalists.55.t: "Türkischer Widerstand"
 sov_nationalists.55.d: "Lokale türkische Bürger haben gemeinsam mit ehemaligen Militär- und Geheimdienstangehörigen Widerstand gegen unsere Maßnahmen in Istanbul und den umliegenden Gebieten organisiert."
 sov_nationalists.55.o1: "Es wird unerträglich"
 sov_nationalists.56.t: "Spezielle Polizeioperation"
 sov_nationalists.56.d: "Unsere Polizeioperation war erfolgreich und hat den türkischen Widerstand vollständig unterdrückt. Wir können nun ohne Widerstand mit der Integration dieser Gebiete fortfahren."
 sov_nationalists.56.o1: "Wunderbar"
 sov_nationalists.57.t: "Konstantinopel ist Teil Russlands"
 sov_nationalists.57.d: "Der historischen Gerechtigkeit wurde endlich Genüge getan. Konstantinopel ist Teil Russlands geworden und erfüllt einen jahrhundertealten Traum unserer Herrscher – ein großer Sieg für das Reich."
 sov_nationalists.57.o1: "Das ist ein großer Sieg!"
 SOV_Petrograd: "Petrograd"
 SOV_Constantinople: "Konstantinopel"
 SOV_const_rebels: "Türkischer Widerstand"
 sov_nationalists_news.3.t: "Der Moskauer Pakt"
 sov_nationalists_news.3.d: "Russlands Führer [SOV.GetLeader] kündigte Pläne zur Schaffung eines neuen militärisch-wirtschaftlichen Bündnisses namens „Moskauer Pakt“ an, um russische Interessen und befreundete Nationen zu schützen. Er verwies auf den beispiellosen Druck des Westens und lud ehemalige Sowjetstaaten zum Beitritt ein. Experten warnen, dies sei ein Signal für einen neuen Kalten Krieg."
 sov_nationalists_news.3.a: "Eine alarmierende Entwicklung"
 sov_nationalists_news.4.t: "Die neue russische Hauptstadt"
 sov_nationalists_news.4.d: "[SOV.GetLeader] kündigte an, Russlands Hauptstadt von Moskau in die historische Stadt Petrograd (früher Sankt Petersburg) zu verlegen – als „Wiederherstellung historischer Gerechtigkeit“. Alle staatlichen Stellen sollen innerhalb eines Jahres umziehen, obwohl manche warnen, dass dies die Hauptstadt NATO-Bedrohungen aussetzen würde."
 sov_nationalists_news.4.a: "Der Versuch, die Vergangenheit wiederherzustellen"
 sov_nationalists_news.5.t: "Russland verkündet seine Ambitionen"
 sov_nationalists_news.5.d: "In einer markigen Rede erhob Russlands Staatsoberhaupt Ansprüche auf ehemalige imperiale Gebiete und gab den Bolschewiki sowie dem Westen die Schuld am Untergang des Reiches. Er beschuldigte westliche Staaten der Einmischung und des Völkermords an Russen und verkündete ein „Großrussland“, das bereit sei, verlorene Gebiete mit allen Mitteln zurückzuholen – sogar unter Androhung eines Atomkriegs."
 sov_nationalists_news.5.a: "Nur Gott kann uns retten..."
 sov_nationalists_news.6.t: "Der Oberste Herrscher Russlands"
 sov_nationalists_news.6.d: "Russlands neue Verfassung schafft das Präsidentenamt ab und ersetzt es durch einen Obersten Herrscher mit weitreichenden Befugnissen, wodurch alle Staatsgewalten effektiv unter einer Autorität zentralisiert werden. [SOV.GetLeader] erklärte, Russland brauche einen starken Führer, um seine Größe wiederherzustellen, und markierte damit den Beginn einer neuen autoritären Ära."
 sov_nationalists_news.6.a: "Heil [SOV.GetLeader]!"
 sov_nationalists_news.7.t: "Das neue Russische Reich"
 sov_nationalists_news.7.d: "Auf einer regulären Sitzung der Staatsduma erklärte der russische Präsident [SOV.GetLeader], dass das Russische Reich wiederhergestellt werden müsse. In seiner Rede bezeichnete er den Untergang des alten Reiches als „historischen Fehler“ und schlug die Einberufung einer Verfassungskonferenz zur Annahme einer neuen „Kaiserlichen Verfassung“ vor. Ein besonderes Organ, die „Provisorische Regentschaft“, soll gebildet werden, um diese Verfassung auszuarbeiten und einen Kandidaten für die Kaiserkrone auszuwählen. Seine Rede wurde von der Regierungspartei mit begeistertem Applaus aufgenommen, wobei ein Abgeordneter erklärte: „Darauf habe ich mein ganzes Leben gewartet.“ Angesichts der weitreichenden Säuberungen der Opposition und der zunehmenden Zentralisierung der Macht scheint [SOV.GetLeader] bereit zu sein, den Staat vollständig umzubauen. Die Wiederbelebung des Reiches signalisiert, dass Russland seine Ansprüche auf ehemalige imperiale Gebiete erneut bekräftigt."
 sov_nationalists_news.7.a: "Ganz und gar nicht unerwartet..."
 sov_nationalists_news.8.t: "Russland will die Nationalbolschewiken absorbieren"
 sov_nationalists_news.8.d: "Präsident [SOV.GetLeader] hat angekündigt, dass mehrere führende Mitglieder der Nationalbolschewistischen Partei, darunter ihr umstrittenes Oberhaupt Eduard Limonow, der russischen Regierung beitreten werden. Obwohl ihre genauen Aufgaben noch unbekannt sind, bedeutet ihr Eintritt in die Regierung eine erhebliche ideologische Verschiebung hin zum Nationalbolschewismus. Diese Ideologie befürwortet eine aggressive territoriale Expansion im ehemaligen Sowjetraum. Der Westen und die GUS-Staaten stellen sich nun auf eine wahrscheinliche Eskalation der Spannungen ein."
 sov_nationalists_news.8.a: "Ganz und gar nicht unerwartet..."
 sov_nationalists_news.9.t: "Krönung von Nikolaus Romanow"
 sov_nationalists_news.9.d: "Nikolaus Romanow wurde in einer prunkvollen Zeremonie in der Moskauer Uspenski-Kathedrale offiziell zum Kaiser des Russischen Reiches gekrönt. An der Veranstaltung nahmen Regierungsvertreter, ausländische Würdenträger, Monarchisten und der Regent des Kaisers, [SOV.GetLeader], teil. In seiner Ansprache beanspruchte Nikolaus die Nachfolge Nikolaus’ II. und bekräftigte die Legitimität des neuen Reiches. Zugleich sprach er [SOV.GetLeader] öffentlich seine Unterstützung aus, um die neue zaristische Regierung zu führen. Allerdings wurde in der neu verabschiedeten Verfassung die Rolle des Premierministers zugunsten des Kaisers geschwächt, was Zweifel an [SOV.GetLeader]s künftigem Einfluss auf die Staatsgeschäfte aufwirft."
 sov_nationalists_news.9.a: "Der Imperialismus schlägt zurück."
 sov_nationalists_news.10.t: "Krönung von Maria Romanowa"
 sov_nationalists_news.10.d: "Maria Romanowa wurde in einer zeremoniellen Veranstaltung in der Moskauer Uspenski-Kathedrale zur neuen Kaiserin Russlands gekrönt. Die von imperialer Tradition geprägte Zeremonie wurde von Staatsvertretern, ausländischen Würdenträgern und Monarchisten besucht, neben dem Regenten [SOV.GetLeader]. In ihrer Rede beanspruchte Maria die Nachfolge Nikolaus’ II., bekräftigte die Rechtmäßigkeit des neuen Reiches und äußerte ihre Absicht, [SOV.GetLeader] zum Leiter der zaristischen Regierung zu ernennen. Trotz ihrer Unterstützung verleiht die neue Verfassung dem Kaiser größere Macht, wodurch [SOV.GetLeader]s künftige politische Rolle ungewiss bleibt."
 sov_nationalists_news.10.a: "Der Imperialismus schlägt zurück."
 sov_nationalists_news.11.t: "Krönung von Georg Romanow"
 sov_nationalists_news.11.d: "Georg Romanow hat den Thron als neuer Kaiser Russlands bestiegen und wurde in der historischen Uspenski-Kathedrale in Moskau gekrönt. Der Zeremonie wohnten Staatsvertreter, ausländische Würdenträger und Monarchisten bei, ebenso Regent [SOV.GetLeader]. In seiner Rede betonte Georg seine Verbindung zu Nikolaus II. und unterstrich die Legitimität des neuen Russischen Reiches. Er äußerte zudem den Wunsch, [SOV.GetLeader] zum Leiter der zaristischen Regierung zu ernennen. Da die Verfassung die Macht stärker auf den Kaiser verlagert, ist [SOV.GetLeader]s Rolle in der Staatsführung nun fraglich."
 sov_nationalists_news.11.a: "Der Imperialismus schlägt zurück."
 sov_nationalists_news.12.t: "Krönung von Andrei Romanow"
 sov_nationalists_news.12.d: "Andrei Romanow wurde in einer Zeremonie in der Uspenski-Kathedrale in Moskau, einem Ort voller imperialer Geschichte, zum Kaiser des Russischen Reiches gekrönt. An der Krönung nahmen Staatsvertreter, ausländische Würdenträger, Monarchisten und Regent [SOV.GetLeader] teil. In seiner öffentlichen Ansprache stellte der neue Kaiser die Kontinuität zu Nikolaus II. her und verkündete die Wiederbelebung von Russlands imperialem Erbe. Außerdem sprach er sich dafür aus, [SOV.GetLeader] zum Leiter der neuen zaristischen Regierung zu machen. Trotz dieser Unterstützung stärkt die neue Verfassung die Rolle des Kaisers und deutet damit auf einen möglichen Rückgang von [SOV.GetLeader]s Einfluss hin."
 sov_nationalists_news.12.a: "Der Imperialismus schlägt zurück."
 sov_nationalists_news.28.t: "Heiliger Regent Russlands"
 sov_nationalists_news.28.d: "Nach langen Beratungen über den nächsten Kaiser Russlands überraschte Regent [SOV.GetLeader] die Nation mit der Erklärung, kein Kandidat sei würdig. Er löste die Provisorische Regentschaft auf und proklamierte sich selbst zum Heiligen Regenten und einzig legitimen Kaiser Russlands. Unter Berufung auf eine göttliche Pflicht zur Wiederherstellung „historischer Gerechtigkeit“ zentralisierte [SOV.GetLeader] die gesamte Macht vollständig in seinen Händen. Auch wenn die rechtliche Grundlage dieser Erklärung unklar bleibt, ist offensichtlich, dass keine innere Kraft seine Autorität infrage stellen wird. Seine Ambitionen auf Expansion und Dominanz sind nun völlig entfesselt."
 sov_nationalists_news.28.a: "Was für ein Wahnsinn!"
 sov_nationalists_news.13.t: "Das Dritte Rom"
 sov_nationalists_news.13.d: "In einer Fernsehansprache erklärte [SOV.GetLeader], das moderne Russland habe die Rolle eines einfachen Staates überwunden. Er behauptete, Russland habe seine geistige Mission erfüllt, indem es das Erbe des Römischen Reiches wiederbelebt habe, und daher müsse nun ein „Drittes Rom“ entstehen. Diese Aussage schockierte internationale Beobachter, die nun ihre möglichen geopolitischen Folgen fürchten. Der Schritt deutet auf einen grundlegenden Wandel im Selbstverständnis Russlands und seinen künftigen Ambitionen hin. Die Welt könnte gerade den Beginn einer neuen ideologischen Ära erleben."
 sov_nationalists_news.13.a: "Und was soll das bitte bedeuten?"
 sov_nationalists_news.14.t: "Russland marschiert in Zentralasien ein"
 sov_nationalists_news.14.d: "Die russische Regierung hat eine großangelegte Militäroperation in Zentralasien begonnen. Moskau beschuldigt die zentralasiatischen Staaten, eine russophobe Politik zu betreiben, ethnische Russen zu unterdrücken und unkontrollierte Migration zuzulassen, die Russland innerlich destabilisiere. Das russische Staatsoberhaupt erklärte zudem, diese Gebiete seien rechtmäßig russisch. Die internationalen Reaktionen fielen rasch aus: Nachbarstaaten und Großmächte verurteilten die Aggression. Sanktionen und diplomatische Vergeltungsmaßnahmen des Westens werden erwartet."
 sov_nationalists_news.14.a: "Das neue Zeitalter des Imperialismus"
 sov_nationalists_news.15.t: "Russland marschiert in die Ukraine ein"
 sov_nationalists_news.15.d: "Russland hat eine groß angelegte Invasion der Ukraine angekündigt. In einer Ansprache an die Nation erklärte [SOV.GetLeader], die Ukraine gehöre zu den angestammten russischen Gebieten, und bezeichnete den ukrainischen Staat als „antirussisches Projekt“. Er nannte die moderne Ukraine „Malorossija“ und sprach von ihrer Rückkehr als „historischer Pflicht“. Die internationale Verurteilung erfolgte umgehend. Westliche Staaten stuften die Invasion als ernste Bedrohung der europäischen Sicherheit ein und sagten Kiew wirtschaftliche und militärische Unterstützung zu. Das globale Machtgleichgewicht könnte sich mit dem weiteren Verlauf dieses Konflikts schon bald verschieben."
 sov_nationalists_news.15.a: "Hoffen wir auf das Beste"
 sov_nationalists_news.16.t: "Russland setzt Belarus unter Druck"
 sov_nationalists_news.16.d: "Russland hat Belarus ein formelles Ultimatum gestellt und fordert seine Eingliederung in Russland als halbautonomes Gouvernement. Das Ultimatum löste Schockwellen in der internationalen Gemeinschaft aus. Das belarussische Außenministerium bezeichnete den Vorschlag als ebenso unerwartet wie alarmierend. Ob Belarus diesen Forderungen nachgeben wird oder ob es sich lediglich um einen strategischen Bluff Moskaus handelt, ist bislang unklar. Angesichts der angespannten Lage verfolgen die Nachbarstaaten aufmerksam, wie Minsk reagieren wird."
 sov_nationalists_news.16.a: "Wie belastend"
 sov_nationalists_news.17.t: "Russland setzt das Baltikum unter Druck"
 sov_nationalists_news.17.d: "Mit einem alarmierenden Ultimatum hat Russland gefordert, dass die baltischen Staaten als halbautonome Gouvernements in sein Staatsgebiet eingegliedert werden. Die Ankündigung hat die internationale Gemeinschaft erschüttert. Die baltischen Staats- und Regierungschefs kamen zu einer Krisensitzung zusammen und bezeichneten das Ultimatum als „erwartet, aber zutiefst beunruhigend“. Dennoch fiel eine gemeinsame Antwort schwer. Während die Angst vor einer militärischen Eskalation wächst, hängt über der Region nun Unsicherheit, während NATO- und EU-Führungen ihre nächsten Schritte beraten."
 sov_nationalists_news.17.a: "Wie belastend"
 sov_nationalists_news.18.t: "Russland setzt Georgien unter Druck"
 sov_nationalists_news.18.d: "Russland hat Georgien ein Ultimatum übermittelt und verlangt, dass es zu einem halbautonomen Teil der Russischen Föderation wird. Die georgische Regierung berief umgehend eine Krisensitzung ein und bezeichnete das Ultimatum als direkte Bedrohung. Russische Truppen wurden bereits nahe der abtrünnigen Republiken an der georgischen Grenze verlegt, was darauf hindeutet, dass bei einer Ablehnung militärische Schritte wahrscheinlich sind. Die Lage bleibt angespannt, während sich Georgien auf eine mögliche Eskalation vorbereitet."
 sov_nationalists_news.18.a: "Wie belastend"
 sov_nationalists_news.19.t: "Russland setzt Moldau unter Druck"
 sov_nationalists_news.19.d: "Moldau ist zum jüngsten Ziel russischen Drucks geworden, nachdem ein Ultimatum seine Eingliederung in Russland als halbautonomes Gouvernement fordert. Moldauische Regierungsvertreter reagierten in einer Krisensitzung alarmiert und verwiesen auf die Präsenz russischer Truppen in Transnistrien als bedrohliches Signal. Die Regierung stellt sich auf die Möglichkeit eines Konflikts ein, während internationale Beobachter ihre Sorge über Moskaus zunehmend aggressive Haltung in Osteuropa äußern."
 sov_nationalists_news.19.a: "Wie belastend"
 sov_nationalists_news.20.t: "Russland verkündet Ansprüche in Ostasien"
 sov_nationalists_news.20.d: "Auf einer Pressekonferenz bekräftigte [SOV.GetLeader] Russlands Ansprüche auf mehrere Gebiete in Ostasien, insbesondere auf die Mongolei und die Mandschurei. Unter Hinweis auf deren strategische Bedeutung erklärte er diese Regionen zu einem Teil von Russlands neuer politischer Agenda. Zwar betonte er, eine friedliche Lösung sei vorzuziehen, schloss militärische Optionen jedoch nicht aus. Zudem kritisierte er Japans historisches Verhalten und verlangte öffentliche Entschuldigungen. Die Mongolei, China und Japan verurteilten Russlands Äußerungen als provokativ und unrealistisch. Die Region ist nun in Alarmbereitschaft und fürchtet neue Instabilität."
 sov_nationalists_news.20.a: "Ich hoffe, das sind nur Worte"
 sov_nationalists_news.21.t: "Russland setzt die Mongolei unter Druck"
 sov_nationalists_news.21.d: "Russland hat der Mongolei ein Ultimatum gestellt und verlangt, dass sie als halbautonomes Gouvernement unter russische Kontrolle tritt. Die mongolische Regierung bezeichnete das Ultimatum als verstörend und berief eine Krisensitzung ein, um die Bedrohung zu bewerten. Die internationale Gemeinschaft verfolgt diese Entwicklung aufmerksam und ist sich nicht sicher, ob sie echte Aggression oder kalkulierte Einschüchterung signalisiert. So oder so könnte sich das Kräfteverhältnis in der Region verschieben."
 sov_nationalists_news.21.a: "Wie belastend"
 sov_nationalists_news.22.t: "Russland erweitert seine Präsenz im Pazifik"
 sov_nationalists_news.22.d: "Während einer UN-Sitzung beschuldigte Japans Premierminister Russland, seine militärische Präsenz im Pazifik erheblich auszubauen. Er warnte, dass solche Schritte Vorbereitungen für eine künftige Invasion sein könnten. Russlands UN-Vertreter wies diese Vorwürfe zurück und erklärte, der Aufmarsch stehe im Zusammenhang mit bevorstehenden Militärübungen. Trotzdem steigen die Spannungen zwischen beiden Staaten weiter an, und die Wahrscheinlichkeit eines Konflikts nimmt zu. Diplomatische Kanäle bleiben vorerst offen."
 sov_nationalists_news.22.a: "Wie belastend"
 sov_nationalists_news.23.t: "Russland setzt Armenien unter Druck"
 sov_nationalists_news.23.d: "Russland hat Armenien kürzlich vorgeschlagen, sich mit weitreichender Autonomie und dem Versprechen territorialer Rückerstattungen dem russischen Staat anzuschließen. Der Vorschlag beinhaltete zugleich eine kaum verhüllte Drohung mit militärischer Intervention für den Fall einer Ablehnung. Armenische Vertreter beschrieben das Angebot als „seltsam und beängstigend“ und beraten derzeit über ihre Reaktion. Das Ultimatum hat die internationale Gemeinschaft verunsichert, während die Region gespannt auf Armeniens Entscheidung blickt."
 sov_nationalists_news.23.a: "Was für ein seltsames Ultimatum"
 sov_nationalists_news.24.t: "Operation „Grill“"
 sov_nationalists_news.24.d: "Russland hat eine Militäroperation gegen Aserbaidschan begonnen und wirft dem Land vor, die Region zu destabilisieren und Völkermord an Russen und Armeniern zu begehen. Das Außenministerium erklärte, Russland habe eine moralische Pflicht, Christen im Kaukasus zu schützen. Analysten gehen davon aus, dass die Operation auch auf die Sicherung der wertvollen aserbaidschanischen Ölreserven abzielt, was ein wesentlicher Beweggrund für den Feldzug sein könnte. Die internationale Reaktion fiel schnell und kritisch aus, begleitet von Sorgen über eine weitere Eskalation in der Region."
 sov_nationalists_news.24.a: "Ziemlich beängstigend."
 sov_nationalists_news.29.t: "Militärübungen an der türkischen Grenze"
 sov_nationalists_news.29.d: "Russland hat umfangreiche gemeinsame Militärübungen nahe der türkischen Grenze begonnen. Offiziellen Angaben zufolge sollen die Manöver eine Reaktion auf eine hypothetische Invasion durch „neoimperialistische Kräfte“ simulieren. Die Übungen umfassen Luftoperationen, Stadtkampfsimulationen und Marineinvasionen. Die Türkei hat die Manöver scharf verurteilt und gewarnt, dass diese Maßnahmen wie Vorbereitungen auf einen großangelegten Konflikt wirkten. Die Lage hat die Spannungen in der Region verschärft und international Besorgnis ausgelöst."
 sov_nationalists_news.29.a: "Ziemlich beängstigend."
 sov_nationalists_news.25.t: "Russland ruft den neuen Kreuzzug aus"
 sov_nationalists_news.25.d: "In einer umstrittenen Ansprache erklärte das russische Staatsoberhaupt, christliche Bevölkerungen im Osten seien Verfolgung und Völkermord ausgesetzt. Er rief Russland dazu auf, die Rolle des Verteidigers des weltweiten Christentums zu übernehmen. Mit der Ausrufung eines „Neuen Kreuzzugs“ gelobte er, christliche Gemeinschaften zu schützen und ihr kulturelles Erbe mit allen notwendigen Mitteln zu bewahren. Die Ankündigung löste Empörung in der islamischen Welt aus. In einer gemeinsamen Reaktion gelobten islamische Staaten, jeder Aggression zu widerstehen und ihre Souveränität zu verteidigen."
 sov_nationalists_news.25.a: "Ave Maria!"
 sov_nationalists_news.26.t: "Russland plant die Integration Istanbuls"
 sov_nationalists_news.26.d: "Nach Russlands militärischen Aktionen in der Türkei besuchte das russische Staatsoberhaupt Istanbul und kündigte Pläne an, die Stadt in den russischen Staat einzugliedern. Er erklärte zudem, Istanbul werde wieder seinen historischen Namen Konstantinopel tragen. Außerdem betonte er die Notwendigkeit umfangreicher Polizeioperationen, um alle verbliebenen Widerstandszellen in der Stadt zu beseitigen. Die Ankündigung stieß in der internationalen Gemeinschaft auf heftige Reaktionen; viele werten sie sowohl als symbolische Provokation als auch als strategischen Schritt."
 sov_nationalists_news.26.a: "Interessant."
 sov_nationalists_news.27.t: "Russland fordert Europa heraus"
 sov_nationalists_news.27.d: "In einer markigen Rede vor hochrangigen Funktionären beschuldigte [SOV.GetLeader] die westlichen Mächte, den Zusammenbruch des Russischen Reiches und der Sowjetunion herbeigeführt zu haben. Er behauptete, das langfristige Ziel des Westens sei es, Russland schwach und gespalten zu halten. Mit der Erklärung eines Endes westlicher Hegemonie bekräftigte er Russlands Anspruch auf eine Führungsrolle in Europa. Europas Staats- und Regierungschefs reagierten prompt und warnten, dass ein Konflikt mit Russland bald unvermeidlich sein könnte. Verteidigungshaushalte werden bereits erhöht und die militärische Bereitschaft auf dem gesamten Kontinent überprüft."
 sov_nationalists_news.27.a: "Interessant."
