 SOV_airforce_space_forces_upgrade: "Reform der Weltraumstreitkräfte"
 SOV_airforce_space_forces_upgrade_desc: "Die Entwicklung der Luftfahrt erfordert Reformen in allen Teilstreitkräften, einschließlich der Weltraumstreitkräfte."
 SOV_air_rocket_defence: "Luft- und Raketenabwehrtruppen"
 SOV_air_rocket_defence_desc: "Diese neue Truppengattung wird wichtige staatliche und militärische Einrichtungen vor Luft- und Raumfahrtangriffen schützen."
 SOV_radio_defense_investments: "Funktechnische Truppen"
