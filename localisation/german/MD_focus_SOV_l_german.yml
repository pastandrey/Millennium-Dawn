 SOV_expand_conscription: "Computerisierte Wirtschaft"
 SOV_expand_conscription_desc: "Unsere Wirtschaft ist veraltet. Unsere Menschen sind klug genug, Computer zum Nutzen Russlands einzusetzen. Unsere Wissenschaftler, Fabrikarbeiter und Beschäftigten des militärisch-industriellen Komplexes müssen mit den leistungsfähigsten und effizientesten elektronischen Rechenmaschinen arbeiten, um unsere Wirtschaft zu verbessern!"
