 SOV_Bring_back_the_legacy_of_the_Russian_Empire_desc: "Es ist an der Zeit, die historischen Namen russischer Städte wiederherzustellen und so unser Erbe zu ehren. Diese Wiederbelebung wird uns mit unserer glorreichen Vergangenheit verbinden und im ganzen Land Nationalstolz wecken."
 SOV_Former_Russian_capital: "Ehemalige russische Hauptstadt"
 SOV_Former_Russian_capital_desc: "Um Russlands kulturelles Erbe zurückzugewinnen, müssen wir St. Petersburg wieder zu unserer Hauptstadt machen. Dieser symbolische Schritt wird der Stadt ihren historischen Status zurückgeben und unser Bekenntnis zur Tradition bekräftigen."
 sov_nationalists.1.t: "Die nationale Verfassung ändern"
 sov_nationalists.1.d: "Unsere bisherige Verfassung war wohl die schlechteste der russischen Geschichte! Um dieses beschämende Dokument auszulöschen, werden wir eine wirklich russische Verfassung schaffen. Die entscheidende Frage ist, ob wir die traditionelle Zentralisierung beibehalten oder einen dezentraleren, aber expansionistischen Weg einschlagen. Welche Richtung sollen wir wählen?"
 sov_nationalists.1.a: "Russland muss sich stabilisieren, bevor es anderen hilft!"
 sov_nationalists.1.b: "Expansionismus ist unser nationales Schicksal und muss in der Verfassung verankert werden!"
 sov_nationalists.3.t: "Russland bietet uns seinen Schutz an"
 sov_nationalists.3.d: "Heute hat der Präsident Russlands offiziell vorgeschlagen, Militärbasen auf unserem Boden zu stationieren, um uns vor äußeren Bedrohungen zu schützen. Dieses Angebot könnte unsere Sicherheit erheblich stärken."
 sov_nationalists.3.a: "Russland wird uns retten!"
 sov_nationalists.3.b: "Wir kommen allein zurecht!"
 sov_nationalists.4.t: "Russland bietet an, uns die Wagner-PMCs zu schicken"
 sov_nationalists.4.d: "Die russische Regierung hat angeboten, die bekannten Spezialisten der privaten Militärfirma Wagner zu schicken, um uns zu unterstützen. Ihre Präsenz könnte das Kräfteverhältnis zu unseren Gunsten verändern."
 sov_nationalists.4.a: "Wir akzeptieren sie"
 sov_nationalists.4.b: "Wir brauchen hier keine Söldner!"
 sov_nationalists.5.t: "Russland bietet uns an, die Entente wiederzubeleben"
 sov_nationalists.5.d: "Die russische Regierung hat vorgeschlagen, das Entente-Bündnis wiederzubeleben. Dieses unerwartete Angebot könnte es unseren Völkern ermöglichen, erneut gemeinsam gegen gemeinsame Bedrohungen zusammenzustehen."
 sov_nationalists.5.a: "Lang lebe die Entente!"
 sov_nationalists.5.b: "Das brauchen wir nicht"
 sov_nationalists.6.t: "Die russische Revolution"
 sov_nationalists.6.d: "Unsere Republik hat nun die Chance, ihre Unabhängigkeit zu gewinnen! Nationalbolschewiken haben ihre Kameraden hierher gebracht, und gemeinsam werden wir unsere Feinde besiegen und unsere Zukunft erkämpfen."
 sov_nationalists.6.a: "Russland wird uns retten!"
 sov_nationalists.7.t: "§Y[SOV.GetNameWithFlag]§! bietet Schutz an"
 sov_nationalists.7.d: "Die russische Regierung bietet an, eine Reihe von Abkommen zu unterzeichnen, die uns vor ausländischen Invasionen schützen sollen. Werden wir diesen Sicherheitspakt annehmen?"
 sov_nationalists.7.a: "Russland wird uns retten!"
 sov_nationalists.7.b: "Nein"
 sov_nationalists.8.t: "§Y[SOV.GetNameWithFlag]§! bietet an, dem Bündnis beizutreten"
 sov_nationalists.8.d: "Die russische Regierung schlägt die Bildung eines Bündnisses durch eine Reihe von Abkommen vor, die uns vor äußeren Bedrohungen schützen sollen. Werden wir zustimmen?"
 sov_nationalists.8.a: "Russland wird uns retten!"
 sov_nationalists.8.b: "Nein"
 sov_nationalists.9.t: ""
 sov_nationalists.9.d: ""
 sov_nationalists.9.a: ""
 russia.29.t: "Referendum über die Verfassung der Tschetschenischen Republik"
 russia.29.d: "Nach dem Ende eines brutalen und blutigen Konflikts hat Tschetschenien nun die Möglichkeit, in ein friedliches Leben zurückzukehren. Die nächste Frage betrifft die Struktur seiner Beziehung zu Moskau — wird es vollständig als Föderationssubjekt integriert bleiben oder bestimmte Autonomien behalten?"
 russia.29.o1: "Ein wenig Autonomie wird ihnen nicht schaden"
 russia.29.o2: "Ich bin bereit, Tschetschenien persönlich zu regieren"
 sov_vybory.2.t: "Putin zum Präsidenten gewählt"
 sov_vybory.2.d: "Wladimir Putin hat die erste Runde der Präsidentschaftswahl mit 63,75 % der Stimmen gewonnen, bei 99 % ausgezählten Stimmzetteln. Die Opposition hat die Legitimität der Ergebnisse infrage gestellt und mit Massenprotesten gedroht. Nach den neuesten Daten der Zentralen Wahlkommission nahmen 65,3 % der Wahlberechtigten an der Wahl teil."
 sov_vybory.2.a: "Der Führer ist wieder da!"
 sov_vybory.1.t: "Medwedew zum Präsidenten gewählt"
 sov_vybory.1.d: "Dmitri Medwedew, Erster Stellvertretender Ministerpräsident, hat einen deutlichen und erwarteten Sieg bei der Präsidentschaftswahl errungen und folgt damit Wladimir Putin nach. Obwohl Medwedew einen liberalen Kurswechsel verspricht, glauben viele, dass die Macht weiterhin fest in Putins Händen liegt."
 sov_vybory.1.a: "Mal sehen, wie er sich schlägt!"
 russia_med.1.t: "Militsiya in Politsiya umbenannt"
 russia_med.1.d: "Präsident Dmitri Medwedew hat das Polizeigesetz unterzeichnet und damit eine wichtige Reform des Systems der Strafverfolgung eingeleitet. Die Reform ändert den Namen „Militsiya“ in „Politsiya“ und soll bürokratische Überschneidungen abbauen, während die Partnerschaft zwischen Polizei und Zivilgesellschaft gestärkt wird. Außerdem werden die Pflichten, Rechte und Verantwortlichkeiten der Polizeibeamten neu definiert."
 russia_med.1.a: "Das verändert alles."
 russia_med.2.t: "Putin fährt nach Pikalyovo"
 russia_med.2.d: "Inmitten einer tiefen Finanzkrise wurden zwei der drei wichtigsten Industriebetriebe der Stadt Pikalyovo stillgelegt, wodurch die Arbeiter arbeitslos und verzweifelt wurden. Es brachen Massenproteste aus, die staatliches Eingreifen auslösten. Putin besuchte die Stadt persönlich, bestellte die beteiligten Oligarchen ein und verlangte die Wiedereröffnung der Fabriken — ein Beweis seiner Autorität über Russlands Wirtschaftselite."
 russia_med.2.a: "Geben Sie mir bitte meinen Stift zurück!"
 rusboloto.1.t: "Proteste in Moskau!"
 rusboloto.1.d: "Frustriert über einen weiteren politischen Machtwechsel sind in Moskau massive Proteste ausgebrochen. Die Schätzungen reichen von 25.000 bis 150.000 Menschen. Demonstrationen für faire Wahlen fanden in 99 russischen Städten und 45 Städten im Ausland statt. Die plötzliche Ansetzung einer Schulprüfung durch das Moskauer Bildungsministerium verschärfte die öffentliche Wut nur noch weiter. Die Demonstranten, bewaffnet mit selbstgemachten Schildern, fordern faire und transparente Wahlen."
 rusboloto.1.a: "Zerschlagt sie mit den Sicherheitskräften!"
 rusboloto.2.t: "Zunehmende Proteste in Moskau!"
 rusboloto.2.d: "Trotz des Widerstands der Polizei versammeln sich die Demonstranten weiterhin auf dem Bolotnaja-Platz. Berichten zufolge wurden mehrere Beamte durch Flaschen und Molotowcocktails verletzt, die aus der Menge geworfen wurden. Die Polizei reagierte mit Festnahmen von Oppositionellen, verzichtete jedoch auf den Einsatz von Gas. Organisatoren wie Nawalny und Udalzow werden nun nach Gesetzen über die Anstiftung zu Unruhen und Gewalt gegen Sicherheitskräfte untersucht."
 rusboloto.2.a: "Zerschlagt sie mit den Sicherheitskräften (noch einmal)!"
 rusboloto.2.b: "Na gut."
 rusboloto.3.t: "Die Proteste wurden von der Polizei bewältigt"
 rusboloto.3.d: "Die Protestbewegung hat ihre Ziele nicht erreicht und wurde von den Behörden erfolgreich unterdrückt. Die Lage ist nun unter Kontrolle."
 rusboloto.3.a: "Wunderbar"
 sov_other.2.t: "Kommunisten in Russland gewählt"
 sov_other.2.d: "In einem bedeutenden politischen Wandel ist die Kommunistische Partei in Russland an die Macht zurückgekehrt. Mit dem Versprechen, die sozialistische Ordnung wiederherzustellen, treibt sie nun eine vollständige ideologische Transformation voran. Die neue Führung behauptet, bereit zu sein, Russlands Zukunft vollständig umzukrempeln — indem sie die Vergangenheit wieder zum Leben erweckt."
 sov_other.2.a: "Neue UdSSR?"
 sov_other.3.t: "Comedy Club macht Witze über unseren Präsidenten"
 sov_other.3.d: "Komiker der beliebten armenischen Fernsehsendung Comedy Club haben kürzlich Witze über unseren neu gewählten Präsidenten gemacht. Sollen wir es dabei belassen oder eine Entschuldigung für diese Respektlosigkeit verlangen?"
 sov_other.3.a: "Noch nicht."
 sov_other.3.b: "Fordert eine Entschuldigung."
 sov_other.6.t: "Großer Russischer Marsch"
 sov_other.6.d: "In letzter Zeit fanden in ganz Russland massive nationalistische Märsche statt, an denen Nationalisten, Monarchisten, orthodoxe Geistliche und heidnische Rodnover teilnahmen. Es kam zu Zusammenstößen mit ethnischen Minderheiten aus islamischen Republiken. Die Lage ist angespannt und könnte sich zu etwas noch Gefährlicherem entwickeln."
 sov_other.6.a: "Russen — Vorwärts!"
 sov_other.9.t: "Russland unterstützt die Ukraine!"
 sov_other.9.d: "Russlands neue demokratische Regierung hat eine diplomatische Initiative gestartet, um die Beziehungen zur Ukraine zu verbessern. Sie umfasst kulturelle Integration, Unterstützung im Kampf gegen Korruption und Vorschläge für gegenseitige Zusammenarbeit beim Aufbau demokratischer Institutionen."
 sov_other.9.a: "Brüder für immer!"
 sov_other.9.b: "Die Wahrheit liegt in der Brüderlichkeit"
 sov_other.10.t: "Russland hilft uns bei der Bekämpfung der Korruption!"
 sov_other.10.d: "Im Rahmen eines neuen Antikorruptionsabkommens hat Russland bei der Verhaftung und Vermögensbeschlagnahmung eines großen korrupten Oligarchen geholfen. Diese Zusammenarbeit hat der Korruption in unserem Land einen schweren Schlag versetzt."
 sov_other.10.a: "Danke"
 SOV_undo_putin_TT: "Wir werden beginnen, das gesetzlose Regierungssystem abzubauen, das uns vorausging!"
 sov_other.11.t: "Massive russisch-NATO-Militärübungen!"
 sov_other.11.d: "Nach seiner Hinwendung zum Westen hat Russland großangelegte gemeinsame Militärübungen mit NATO-Streitkräften auf russischem Boden eingeleitet. Diese Übungen symbolisieren eine neue Ära der Zusammenarbeit und des gegenseitigen Vertrauens."
 sov_other.11.a: "Einst Feinde, nun Freunde."
 sov_other.12.t: "NATO-Truppen in Russland"
 sov_other.12.d: "Im Rahmen seiner neuen Westorientierung hat Russland NATO-Streitkräften erlaubt, auf seinem Territorium stationiert zu werden, um regionale Stabilität und gemeinsame Sicherheit zu fördern."
 sov_other.12.a: "Gut.."
 SOV_combined_economic_system: "Kombiniertes Wirtschaftssystem"
 SOV_combined_economic_system_desc: "Indem wir einen Kompromiss zwischen staatlichen Institutionen und oligarchischen Interessen schmieden, schaffen wir eine einzigartig russische Lösung für die wirtschaftliche Erholung. Gleichgewicht und Kontrolle werden unseren weiteren Weg bestimmen."
 SOV_oligarchic_republic: "Oligarchische Republik"
 SOV_oligarchic_republic_desc: "Nachdem die Oligarchen ihre Unternehmensfusionen abgeschlossen haben, beginnt eine neue Ära — ein von Oligarchen geführtes Russland, in dem private Macht die nationale Politik bestimmt."
 SOV_continue_etatist_rise: "Den etatistischen Aufstieg fortsetzen"
 SOV_continue_etatist_rise_desc: "Russland kann es sich nicht leisten, von zügellosen Oligarchenclans regiert zu werden, die unsere Ressourcen zu ihrem eigenen Vorteil exportieren. Wir brauchen eine feste Führung, und wir sind bereit, sie zu liefern."
 sov_other.13.t: "Russischer Vorschlag..."
 sov_other.13.d: "Die neue demokratische Regierung Russlands hat der Ukraine ein gegenseitiges Sprachabkommen vorgeschlagen. Russisch würde in der Ukraine offiziellen Status erhalten, während Russland die ukrainischsprachige Bildung unter ethnischen Ukrainern fördern würde. Diese Initiative soll Frieden, kulturellen Austausch und langfristige Freundschaft zwischen unseren Nationen fördern."
 sov_other.13.a: "Wunderbare Idee!"
 sov_other.13.b: "Tut uns leid, nein"
 sov_other.14.t: "Die Ukraine hat unseren Vorschlag angenommen!"
 sov_other.14.d: "Die Ukraine hat unserem Vorschlag zur gegenseitigen sprachlichen Integration zugestimmt. Eine neue Ära der Zusammenarbeit hat begonnen."
 sov_other.14.a: "Wunderbar"
 sov_other.15.t: "Die Ukraine hat unseren Vorschlag abgelehnt!"
 sov_other.15.d: "Die Ukraine hat unser Angebot zur gegenseitigen sprachlichen Integration und Zusammenarbeit abgelehnt."
 sov_other.15.a: "Warum?"
 SOV_nemtsov: "Boris Nemzow"
 SOV_nemtsov_desc: "Boris Jefimowitsch Nemzow (9. Oktober 1959 – 27. Februar 2015) ist ein russischer Physiker, liberaler Politiker und offener Kritiker Wladimir Putins. Er spielte eine Schlüsselrolle bei der Gestaltung wirtschaftlicher Reformen während des Übergangs von der Sowjetzeit und bekleidete unter Präsident Jelzin hohe Ämter, darunter Gouverneur von Nischni Nowgorod, Minister für Brennstoffe und Energie sowie stellvertretender Ministerpräsident. Später gründete Nemzow die Bewegung Junges Russland, war Mitbegründer von Rechtes Werk und half bei der Schaffung der Union rechter Kräfte, eines liberalen reformistischen politischen Blocks. Sein Vermächtnis bleibt ein Symbol des demokratischen Widerstands in der modernen russischen Geschichte."
 SOV_union_of_right_forces: "Union rechter Kräfte"
 SOV_union_of_right_forces_desc: "Nun werden wir an der Spitze der Macht stehen. Die Union rechter Kräfte will Russland in Richtung demokratischer Werte und wirtschaftlichen Liberalismus lenken. Mit erfahrenen Reformern und einer klaren Agenda werden wir daran arbeiten, das Land von innen heraus zu modernisieren."
 SOV_conservative_russia: "Konservatives Russland"
 SOV_conservative_russia_desc: "Globale Veränderungen haben Russland beinahe erneut zerstört, es ist Zeit, zu friedlichen Reformen zurückzukehren. Ein konservativer Kurs wird helfen, traditionelle Werte zu bewahren, Ordnung wiederherzustellen und unsere Nation in unsicheren Zeiten zu stabilisieren."
 SOV_tsar_boris: "Zar Boris"
 SOV_tsar_boris_desc: "Jahrzehnte unter sowjetischer Herrschaft haben unserem Volk das spirituelle Gleichgewicht genommen und Russland vom rechten Weg abgebracht. Nur eine Monarchie, wenn auch symbolisch, kann unsere Nation auf den rechten Pfad zurückführen. Eine wiederhergestellte Monarchie wird in einer zerrissenen Gesellschaft als vereinigende kulturelle Kraft dienen."
 SOV_reform_constitution: "Verfassungsreform"
 SOV_reform_constitution_desc: "Unsere Verfassung muss angesichts der Rückkehr der Monarchie, wenn auch in sehr begrenzter Form, reformiert werden. Diese Änderungen werden die zeremonielle Rolle der Monarchie verankern und zugleich demokratische Institutionen und Rechtsstaatlichkeit bewahren."
 SOV_curb_corruption: "Kampf gegen Korruption"
 SOV_curb_corruption_desc: "Korrupte Beamte sind die Feinde Russlands. Sie auszumerzen ist entscheidend, um das Vertrauen in die Regierung wiederherzustellen und Investitionen anzuziehen. Dieses Vorhaben wird tiefgreifende Reformen und einen starken politischen Willen erfordern."
 SOV_economical_liberalism: "Wirtschaftsliberalismus"
 SOV_economical_liberalism_desc: "Freie Märkte sind der Schlüssel, um Russland aus der Armut zu führen. Wir sollten die Regierung aus dem privaten Sektor heraushalten und Unternehmen unabhängig arbeiten lassen. Der Abbau von Bürokratie und die Förderung des Unternehmertums werden das wahre wirtschaftliche Potenzial des Landes freisetzen."
 SOV_affirm_orthodoxy: "Die Kirche ist unser Freund"
 SOV_affirm_orthodoxy_desc: "Die Jahre des Staatsatheismus unter der Sowjetunion haben uns von Gott entfernt. Indem wir unsere Kirchen wiederbeleben und den Geistlichen das zurückgeben, was man ihnen genommen hat, werden wir mit der spirituellen Heilung unserer Nation beginnen. Die orthodoxe Kirche wird als moralisches Fundament unserer nationalen Wiedergeburt dienen."
 SOV_russian_history_patr: "Respektiert die Geschichte Russlands"
 SOV_russian_history_patr_desc: "Es ist unmöglich, dem sowjetischen Modell der Herabwürdigung unserer imperialen Vergangenheit zu folgen. Wir müssen das gesamte Spektrum der russischen Geschichte ehren — von den Zaren bis zur Moderne. Eine starke Zukunft hängt davon ab, unser Erbe zu verstehen und zu respektieren."
 SOV_joint_us_ventures: "Partnerschaft mit den USA"
 SOV_joint_us_ventures_desc: "Wir werden den Vereinigten Staaten erlauben, Militärbasen auf unserem Territorium zu errichten, und gemeinsame wirtschaftliche Vorhaben unterstützen. Dies wird die diplomatischen Beziehungen stärken, unsere Wirtschaft modernisieren und unseren Einfluss auf der globalen Bühne vergrößern."
 SOV_iron_guard_militarism: "Die Eiserne Garde"
 SOV_iron_guard_militarism_desc: "Wir werden eine Spezialeinheit schaffen — die Eiserne Garde. Sie wird als königliche Elite dienen, verantwortlich für den Schutz der Monarchie, sensible Missionen und die Führung an vorderster Front. Ihre Loyalität und Ausbildung werden sie zu einem Symbol der neuen Ära machen."
 SOV_laying_the_bricks: "Ein großes Land Stein für Stein aufbauen"
 SOV_laying_the_bricks_desc: "Jeder Schritt, den wir tun, ist wie ein Stein beim Bau eines Hauses und bringt uns dem Aufbau eines Großen Russlands näher. Fortschritt wird schrittweise kommen, durch Geduld, Weitsicht und harte Arbeit. Das ist das Fundament unserer nationalen Wiedergeburt."
 SOV_navalny: "Alexei Nawalny"
 SOV_navalny_desc: "Alexei Anatoljewitsch Nawalny (geboren am 4. Juni 1976) ist ein russischer Oppositionsführer, Jurist und Antikorruptionsaktivist. Er hat zahlreiche Proteste organisiert und Putins Machtanspruch herausgefordert. Als Führer der Partei Russland der Zukunft und Gründer des Antikorruptionsfonds ist Nawalny international für seine Menschenrechtsarbeit anerkannt. Amnesty International erklärte ihn zum gewaltlosen politischen Gefangenen, und er erhielt den Sacharow-Preis für geistige Freiheit. Seine Bezeichnung von Einiges Russland als „Partei der Gauner und Diebe“ wurde zu einem Schlachtruf der Reformisten."
 SOV_path_of_western: "Pfad des Westlertums"
 SOV_path_of_western_desc: "Der Kalte Krieg ist vorbei. Nationalismus und Kommunismus gehören unserer Vergangenheit an. Der einzige Weg nach vorn ist die Demokratie, hin zum Ende der Geschichte. Die Übernahme westlicher Werte und Institutionen wird Russlands Platz in der modernen Welt sichern."
 SOV_new_russia: "Neues Russland"
 SOV_new_russia_desc: "Es ist Zeit, dass Russland eine neue Richtung wählt – einen Weg, auf den es sich seit Jahrhunderten zubewegt."
 SOV_release_prisoners: "Die politischen Gefangenen freilassen"
 SOV_release_prisoners_desc: "Politische Gefangene haben in unserem schönen Land keinen Platz. Wir müssen ihnen ihre Freiheit gewähren."
 SOV_true_federalism: "Wahrer Föderalismus"
 SOV_true_federalism_desc: "Es ist Zeit, den falschen Föderalismus zu beenden, der in den 1990er Jahren aufgezwungen wurde. Wir werden den Regionen echte Autonomie zurückgeben."
 SOV_rework_constituion: "Verfassungsreferendum der Demokratie"
 SOV_rework_constituion_desc: "Wir werden eine umfassende Reform der Verfassung durchführen und uns dabei besonders auf die Rechte und Beziehungen der Föderationssubjekte konzentrieren."
 SOV_referendum_start: "Referendum der Subjekte Russlands"
 SOV_referendum_start_desc: "Jedes Föderationssubjekt wird ein eigenes Referendum abhalten, um zu entscheiden, ob es Teil Russlands bleiben oder unabhängig werden will."
 SOV_return_arms_subject: "Die Subjekte mit Gewalt zurückholen"
 SOV_return_arms_subject_desc: "Wir erkennen ihren Wunsch nach Abspaltung nicht an und werden Gewalt anwenden, um sie zurückzuholen."
 SOV_subject_guarantee: "Die Unabhängigkeit garantieren"
 SOV_subject_guarantee_desc: "Wir werden ihre Unabhängigkeit respektieren und sogar formell garantieren."
 SOV_usr: "Vereinigte Staaten von Russland"
 SOV_usr_desc: "Inspiriert vom Erfolg der USA werden wir unser System reformieren, damit es ihrem stärker ähnelt."
 SOV_new_establishment: "Das neue Establishment"
 SOV_new_establishment_desc: "Neue Republiken werden neue Führungen benötigen, um ihre Interessen innerhalb des russischen Staates zu vertreten."
 SOV_like_usa_weapon: "Freier Zugang zu Waffen"
 SOV_like_usa_weapon_desc: "Es lebe die Waffenfreiheit! Wir werden Maßnahmen einführen, die den Bürgern das Recht auf Waffenbesitz nach amerikanischem Vorbild ermöglichen. Das wird den Einzelnen stärken und die Idee von Freiheit und Selbstverantwortung festigen."
 SOV_our_own_section_230: "Unser eigener Section 230"
 SOV_our_own_section_230_desc: "Wir übernehmen die Praxis von Section 230 in unsere Gesetzgebung. Indem wir Online-Plattformen vor Haftung für nutzergenerierte Inhalte schützen, fördern wir ein freieres und offeneres Internet. Innovation gedeiht dort, wo Meinungsfreiheit geschützt wird."
 SOV_liberal_loyalty_idea: "Liberale Loyalität"
 SOV_karabakh_question: "Die Arzach-Frage lösen"
 SOV_karabakh_question_desc: "Es ist Zeit, sich darum zu kümmern. Der Konflikt um Arzach ist weiterhin eine Quelle der Instabilität in der Region. Russland muss eine klare und prinzipientreue Position einnehmen, um dauerhaften Frieden zu bringen."
 SOV_georgia_question: "Die georgische Frage"
 SOV_georgia_question_desc: "Es ist Zeit, sich darum zu kümmern. Die Beziehungen zu Georgien waren angespannt, und ungelöste Territorialfragen bestehen weiter. Eine langfristige Strategie muss entwickelt werden, um den Konflikt zu lösen und den Kaukasus zu stabilisieren."
 sov_other.17.t: "Russland unterstützt Armenien!"
 sov_other.17.d: "Russland hat kürzlich offen seine Unterstützung für Armenien und dessen Bemühungen erklärt, verlorene Gebiete zurückzugewinnen. Dieser Schritt markiert einen Wandel unserer Regionalpolitik und könnte das Machtgleichgewicht im Kaukasus erheblich verändern."
 sov_other.17.a: "Interessant"
 sov_other.18.t: "Russland beschließt, den Status quo zu wahren"
 sov_other.18.d: "Russland hat beschlossen, Armeniens territoriale Ansprüche nicht offen zu unterstützen. Vorerst hat sich die Regierung für einen vorsichtigeren, neutralen Ansatz entschieden, um eine weitere Eskalation in der Region zu vermeiden."
 sov_other.18.a: "Interessant"
 SOV_FSB_expansion: "FSB erweitern"
 SOV_FSB_expansion_desc: "Der FSB ist unsere wichtigste Sicherheitsbehörde, und wir müssen sicherstellen, dass er über moderne Einrichtungen und Ressourcen verfügt, um den heutigen Herausforderungen gerecht zu werden."
 SOV_alpha_omon_exp: "Alpha-Gruppe"
 SOV_alpha_omon_exp_desc: "Die Alpha-Gruppe, offiziell Direktion A des Spezialzentrums des FSB, ist eine Elite-Spezialeinheit, die 1974 vom sowjetischen KGB gegründet wurde. Sie operiert unter direkter politischer Kontrolle und führt hochriskante verdeckte und paramilitärische Operationen im In- und Ausland durch."
 SOV_form_yunarmiya: "Yunarmiya gründen"
 SOV_form_yunarmiya_desc: "Yunarmiya ist eine patriotische Jugendorganisation, die zukünftige Generationen zur Unterstützung des Militärs inspirieren soll."
 SOV_first_bars_start: "§YBARS 1§! - Kuban-Kosakenabteilung benannt nach S. Tschepego"
 SOV_first_bars_start_desc: "Auf dem Gebiet des Kuban aus Kosakenfreiwilligen gebildet."
 SOV_second_bars_start: "§YBARS 2§! - Freiwillige aus Jakutien"
 SOV_third_bars_start: "§YBARS 3§! - Rodina"
 SOV_four_bars_start: "§YBARS 4,5§! und §Y7§!"
 SOV_six_bars_start: "§YBARS 6§! - „Forstadt“"
 SOV_eight_bars_start: "§YBARS 8§! - Rus"
 SOV_nine_bars_start: "§YBARS 9,10,11§! und §Y12§!"
 SOV_thirdteen_bars_start: "§YBARS 13§! - Russkiy Mir"
 SOV_fiveteen_bars_start: "§YBARS 15§! - Ermak"
