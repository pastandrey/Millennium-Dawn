 PMR_gazprom_gaz: "Gazprom in Transnistrien"
 sov_economic.37.t: "Kostenloses Gas von Gazprom"
 sov_economic.37.d: "Russland unterstützt unsere Unabhängigkeit und bietet kostenlose Gaslieferungen an. Diese Großzügigkeit hat jedoch ihren politischen Preis, da sie genutzt werden könnte, um unsere Politik zu beeinflussen."
 sov_economic.37.a: "Annehmen."
 sov_economic.37.b: "Ablehnen."
 sov_economic.38.t: "Kostenloses Gas für Transnistrien"
 sov_economic.38.d: "Die transnistrischen Behörden haben positiv auf unser Angebot für kostenloses Gas reagiert und damit unsere Position in der Region gestärkt."
 sov_economic.38.a: "Gute Nachrichten."
 sov_economic.39.t: "Kostenloses Gas für Transnistrien"
 sov_economic.39.d: "Die transnistrischen Behörden haben unser Angebot für kostenloses Gas abgelehnt, was einen enttäuschenden Rückschlag für unseren regionalen Einfluss darstellt."
 sov_economic.39.a: "Bedauerlich."
