 SOV_democratic_constitution_desc: "Unsere Verfassung wurde nun in ein wirklich demokratisches Dokument verwandelt. Sie garantiert grundlegende bürgerliche Rechte wie Meinungs-, Versammlungs- und Religionsfreiheit sowie das Recht zu wählen und sich politisch zu betätigen. Darüber hinaus definiert sie Russlands Rolle in internationalen Angelegenheiten klar und schafft Schutzmechanismen für soziale Sicherheit in allen Bereichen der Gesellschaft."
 SOV_interrao_buy_pmr_gres_desc: "Das Kutschurgan-Kraftwerk befindet sich seit langem in einem schlechten Zustand, und die Regierung von §Y[PMR.GetNameWithFlag]§! erwägt eine Option, bei der wir es privatisieren und in unseren Besitz überführen können. Dadurch stärken wir unseren Einfluss in diesem Staat und verschaffen ihm zusätzliche Energiekapazitäten."
