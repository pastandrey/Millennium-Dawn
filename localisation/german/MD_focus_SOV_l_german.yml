 SOV_armyreform_anti_air: "Luftverteidigungstruppen"
 SOV_armyreform_anti_air_desc: "Diese Truppen schützen unsere Einheiten und Einrichtungen bei verschiedenen Operationen vor feindlichen Luftangriffen."
 SOV_armyreform_engineer: "Pioniertruppen"
 SOV_armyreform_engineer_desc: "Pioniertruppen führen spezialisierte militärische Ingenieuraufgaben aus und unterstützen Operationen gegen feindliche Kräfte."
 SOV_railway_troops: "Eisenbahntruppen"
 SOV_railway_troops_desc: "Die Eisenbahntruppen sichern die Verteidigung Russlands durch den Schutz und Betrieb des Eisenbahnnetzes."
