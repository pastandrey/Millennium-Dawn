 SOV_russia_good: "Vereintes und unteilbares Land"
 SOV_russia_good_desc: "Das Referendum hat bestätigt, dass unser Volk keine Veränderung der territorialen Integrität Russlands wünscht."
 SOV_good_federalism: "Erfolgreicher Föderalismus"
 SOV_good_federalism_desc: "Unser föderales System ist gereift und bringt sowohl der Zentralregierung als auch ihren Gliedstaaten Vorteile."
 SOV_federal_police: "Bundespolizei"
 SOV_federal_police_desc: "Wir werden die Polizei reformieren, sie in föderale und regionale Kräfte aufteilen, die Regionen stärken und die Belastung des Zentralhaushalts verringern."
 SOV_federation_army: "Föderale Armee"
 SOV_federation_army_desc: "Da viele Einheiten eigene Verbände aufstellen können, wird die Last der föderalen Armee erheblich reduziert."
 SOV_no_taxes_subjects: "Föderale Steuern abschaffen"
 SOV_no_taxes_subjects_desc: "Wir werden die föderalen Steuern für die Subjekte abschaffen, um ihre finanzielle Belastung zu verringern und die lokalen Wirtschaften anzukurbeln."
 sov_liberals.1.t: "Reformen abgeschlossen!"
 sov_liberals.1.d: "Wir haben unser Wirtschaftssystem in nur 500 Tagen erfolgreich reformiert! Das ist eine große Leistung und übertrifft das, was Gaidar und Jelzin erreichen konnten. Jetzt müssen wir ein stetiges Wachstum aufrechterhalten und das Wohlergehen unserer Bürger verbessern."
 sov_liberals.1.o1: "Lasst uns feiern!"
 sov_liberals.2.t: "Reformen gescheitert!"
 sov_liberals.2.d: "Unsere Reformbemühungen sind gescheitert. Es ist uns nicht gelungen, das erhoffte Wirtschaftswunder zu schaffen. Nun müssen wir uns auf das Schlimmste vorbereiten und wahrscheinlich einen wirtschaftlichen Abschwung wie in den 1990er Jahren erleben."
 sov_liberals.2.o1: "Oh nein..."
 sov_liberals.2.o2: "Oh nein..."
 sov_liberals.2.o3: "Oh nein..."
 sov_liberals.3.t: "Das große russische demokratische Referendum"
 sov_liberals.3.d: "Der Moment ist gekommen, über die Zukunft der staatlich-territorialen Struktur Russlands zu entscheiden. Ein landesweites Referendum wird endlich zeigen, wie sich das Volk die territoriale Zukunft unseres Landes vorstellt."
 sov_liberals.3.o1: "Das Volk entscheidet über das Schicksal des Landes."
 SOV_great_democratic_referendum_tt: "Die Ergebnisse des §YReferendums§! hängen vom Zustand des £text_icon_sov_empire §Yrussischen Erbes§! ab. Je stärker sich das £text_icon_sov_empire §Yrussische Erbe§! in Richtung £text_icon_sov_democratic §2Demokratie§! neigt, desto größer ist die Wahrscheinlichkeit einer Veränderung der territorialen Struktur des Landes infolge des §YReferendums§!."
 SOV_subjects_exist_tt: "§YRussland§! hat mindestens ein Subjekt."
 SOV_subjects_federalization_buff_tt: "Die nationale Idee des §YWahren Föderalismus§! wird §Yverändert§! und eine §Gverbesserte Version§! davon wird nun §Yverfügbar§! sein."
 sov_liberals_news.1.d: "Ein historisches Referendum über die territoriale Zukunft Russlands hat stattgefunden. Die inneren Grenzen haben sich dramatisch verändert und viele schockiert, da den einfachen Bürgern die Macht gegeben wurde, über das Schicksal des Landes zu entscheiden."
 sov_liberals_news.1.a: "Ist das wahre Demokratie?"
 SOV_system_democratic_referendum_tt: "Das gewählte §Ypolitische System§! wird die Ergebnisse des §Ybevorstehenden Referendums§! beeinflussen."
