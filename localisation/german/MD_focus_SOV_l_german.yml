 Sov_warsaw_pact.7.t: "Referendum über die Vereinigung zu einem einzigen Staat"
 Sov_warsaw_pact.7.d: "Das tschechische und das slowakische Volk haben nicht vergessen, wie ihre Führung sie vor nicht allzu langer Zeit täuschte, indem sie ihr Land ohne Vorwarnung teilte. Nun ergibt sich die Gelegenheit, diesen historischen Fehler zu korrigieren und sich erneut zu einem starken Staat zu vereinen. Russland wird als neutraler Vermittler auftreten, um einen fairen und sicheren Ablauf des Referendums zu gewährleisten."
 Sov_warsaw_pact.7.a: "Es ist Zeit, sich zu vereinen!"
 Sov_warsaw_pact.8.t: "Proteste in der Tschechischen Republik und in der Slowakei"
 Sov_warsaw_pact.8.d: "In der Slowakei und in der Tschechischen Republik sind weitreichende Proteste ausgebrochen. Die Demonstranten werfen den derzeitigen Regierungen Fehlverhalten vor und geben ihnen die Schuld an der Teilung der ehemaligen Tschechoslowakei. Sie fordern den Rücktritt ihrer Führungen und verlangen ein nationales Referendum, um die Trennung des Landes neu zu bewerten."
 Sov_warsaw_pact.8.a: "Die Welt scheint in die Vergangenheit zurückzugleiten..."
 SOV_protests_by_scientists_idea: "Proteste ostdeutscher Wissenschaftler"
 SOV_protests_by_scientists_idea_desc: "Nach der deutschen Wiedervereinigung im Jahr 1990 wurden die Bildungsabschlüsse vieler ostdeutscher Wissenschaftler für ungültig erklärt, was zu massiven Arbeitsplatzverlusten führte. In jüngster Zeit haben diese Wissenschaftler begonnen zu protestieren und Anerkennung sowie Gerechtigkeit für ihre Leistungen und Qualifikationen zu fordern."
 SOV_east_german_military_discontent_idea: "Streiks ostdeutscher Militäroffiziere"
 SOV_east_german_military_discontent_idea_desc: "Nach der deutschen Wiedervereinigung wurden alle militärischen Ränge ostdeutscher Offiziere annulliert. Das hat zu tiefer Unzufriedenheit unter diesen Offizieren geführt, die sich unfair behandelt und innerhalb der neuen Militärstruktur an den Rand gedrängt fühlen."
 Sov_warsaw_pact.10.t: "Der Aufstieg der Ostalgie in Deutschland"
 Sov_warsaw_pact.10.d: "Eine Bewegung namens „Ostalgie“, die das Leben in Ostdeutschland romantisiert, gewinnt im Osten deutlich an Zulauf. Zwar existiert sie schon länger, doch ihre aktuelle Intensität hat internationale Experten alarmiert, die einen verdeckten Einfluss von Geheimdiensten des Warschauer Pakts vermuten."
 Sov_warsaw_pact.10.a: "Interessant"
 Sov_warsaw_pact.11.t: "Ungewöhnliche Aktivitäten in Ostdeutschland"
 Sov_warsaw_pact.11.d: "Wir haben in letzter Zeit eine Zunahme unterirdischer kommunistischer Aktivitäten in Ostdeutschland festgestellt. Unsere Geheimdienste berichten von Sabotage innerhalb des Militärs und einem gebremsten wissenschaftlichen Fortschritt. Diese Aktionen scheinen verdeckt von der UdSSR unterstützt zu werden. Zusätzliche staatliche Mittel wurden bereitgestellt, um diesen subversiven Aktivitäten entgegenzuwirken."
 Sov_warsaw_pact.11.a: "Wir müssen unser Personal auf Kollaborateure überprüfen"
