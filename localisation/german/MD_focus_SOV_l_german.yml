 sov_communists.1.t: "Verbot des Privateigentums"
 sov_communists.1.d: "Nach einer Reihe antibürgerlicher Gesetze, die von unserer Regierung verabschiedet wurden, haben wir nun endlich den letzten Schritt zur Beseitigung des Kapitalismus von russischem Boden erreicht. So wie es unsere ruhmreichen Genossen bereits in den 1920er Jahren taten, werden wir nun das Privateigentum verbieten. Die einzige verbleibende Frage ist, wie weit diese Enteignung gehen soll – total, moderat oder selektiv?"
 sov_communists.1.a: "Die vollständige Konfiskation hat damals funktioniert und wird auch jetzt funktionieren!"
 sov_communists.1.b: "Seien wir etwas gemäßigter."
 sov_communists.1.c: "Nur große Industriezweige enteignen."
 sov_communists.2.t: "Nationalkommunistische Verfassung"
 sov_communists.2.d: "Da nun sowohl die NPA als auch die KPRF auf einer Linie liegen, sind wir bereit, eine neue Verfassung auszuarbeiten. Die Frage ist, ob unser ideologisches Fundament eher zum internationalistischen Kommunismus oder zu einem nationalistischerem, isolationistischen Weg tendieren soll. Die zukünftige Richtung steht auf dem Spiel."
 sov_communists.2.a: "Wir müssen stolz darauf sein, Russen zu sein!"
 sov_communists.2.b: "Wir dürfen unsere Hauptideologie nicht vergessen."
 sov_communists.3.t: "Demokratische Verfassung"
 sov_communists.3.d: "Wir haben einige der vielversprechendsten Ideen unserer ideologischen Führer aus der Perestroika-Zeit übernommen. Um eine hellere und freiere Zukunft zu schaffen, müssen wir unsere Verfassung neu schreiben. Doch sollen wir sie in eine liberalere Richtung lenken oder den Kern unserer vorherrschenden Ideologie bewahren?"
 sov_communists.3.a: "Wir müssen Gorbatschows Ideen bewahren!"
 sov_communists.3.b: "Wir dürfen unsere Hauptideologie nicht vergessen."
 sov_communists.4.t: "Verfassung der Kommunistischen Partei"
 sov_communists.4.d: "Da die absolute Macht nun in den Händen der Partei liegt, können wir endlich die Verfassung nach unseren Werten neu schreiben. Allerdings haben sich innerhalb unserer Reihen ideologische Fraktionen gebildet, und wir müssen entscheiden, welche Fraktion den Ton für unsere wahrhaft sowjetische Verfassung angeben wird."
 sov_communists.4.a: "Natürlich brauchen wir die Stalinisten."
 sov_communists.4.b: "Wir brauchen einen gemäßigteren Aufstieg."
 sov_communists.5.t: "Wiederaufbau sowjetischer Militärdenkmäler"
 sov_communists.5.d: "Über unser riesiges Land verstreut verfallen tausende Denkmäler des Großen Vaterländischen Krieges. Es ist unsere Pflicht, sie wiederherzustellen, um unsere gefallenen Helden zu ehren. Wir müssen auch erwägen, neue Denkmäler zu errichten, damit zukünftige Generationen die Opfer und den Ruhm unseres Volkes niemals vergessen."
 sov_communists.5.a: "Sie sollen mehr Trauer ausdrücken."
 sov_communists.5.b: "Sie müssen unser Heldentum verherrlichen!"
 sov_communists.6.t: "Restalinisierung"
 sov_communists.6.d: "Die Chruschtschowisten haben es versäumt, das Erbe unseres größten Führers zu bewahren. Nun ist es an der Zeit, das zu korrigieren. Wir müssen entscheiden, wie weit wir bei der Umbenennung unserer Städte zu Ehren Stalins und der sowjetischen Vergangenheit gehen wollen."
 sov_communists.6.a: "Behalten wir die historischen Optionen."
 sov_communists.6.b: "Volle Stalinisierung!"
