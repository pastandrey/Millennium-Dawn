 sov_nationalists.50.d: "[FROM.GetName] wurde offiziell als Provinz in unseren Staat eingegliedert. Nun müssen wir uns auf die vollständige Integration konzentrieren und vergangene Fehler vermeiden, die zu Instabilität geführt haben."
 sov_nationalists.50.o1: "Ein und unteilbar"
 sov_nationalists.51.t: "[FROM.GetName] wurde in [SOV.GetName] integriert"
 sov_nationalists.51.d: "[FROM.GetName] wurde vollständig in unser großes Reich aufgenommen. Unsere Nation wird stärker, während wir verlorene Gebiete zurückholen, und wir haben nicht vor, mit der Expansion aufzuhören."
 sov_nationalists.51.o1: "Unser Land ist größer geworden"
 sov_nationalists_news.1.t: "Schirinowski zum Präsidenten gewählt"
 sov_nationalists_news.1.d: "Nach den jüngsten Regierungsveränderungen hat die nationalistische LDPR-Partei unter der Führung von [SOV.GetLeader] in Russland die Macht übernommen. Sie kündigte ein radikales politisches Programm an, darunter die Wiederherstellung der alten Flagge und die Verfolgung einer konservativ-nationalistischen Agenda."
 sov_nationalists_news.1.a: "Was erwartet Russland?"
 sov_nationalists_news.2.t: "Das neue Russische Reich"
 sov_nationalists_news.2.d: "In einer Fernsehansprache erklärte Russlands Präsident seine Absicht, das Russische Reich mit allen notwendigen Mitteln wiederzubeleben. Das alarmierte viele Staaten, insbesondere ehemalige Sowjetrepubliken, die darin eine Bedrohung ihrer Souveränität sehen. Die Welt hofft, dass diese aggressive Rhetorik nur Wahlkampfgetöse ist."
 sov_nationalists_news.2.a: "Eine alarmierende Erklärung"
 sov_economic.22.t: "Der Gazprom-Skandal"
 sov_economic.22.d: "Ein Skandal um Gazprom ist durch Medienberichte an die Öffentlichkeit gelangt. Das hat zu einem Rückgang des Aktienkurses des Unternehmens geführt und Bedenken hinsichtlich seines Rufs ausgelöst."
 sov_economic.22.a: "Gebt den Medien die Schuld."
 sov_economic.23.t: "Der Sberbank-Skandal"
 sov_economic.23.d: "Die Sberbank ist in einen Skandal verwickelt, über den breit in den Medien berichtet wird. Das hat ihre Aktienkurse belastet und das Vertrauen der Investoren erschüttert."
 sov_economic.23.a: "Schon wieder Medienangriffe."
 sov_economic.24.t: "Der Rosneft-Skandal"
 sov_economic.24.d: "Rosneft ist in einen Skandal verwickelt, der umfassend publik gemacht wurde, den Ruf des Unternehmens beschädigt und den Aktienwert einbrechen ließ."
 sov_economic.24.a: "Medienmanipulation."
 sov_economic.25.t: "Zusammenbruch der Kapitalisierung großer Unternehmen."
 sov_economic.25.d: "Die Sanktionen gegen unser Land haben dazu geführt, dass viele ausländische Investoren sich aus großen Unternehmen zurückzogen, was einen starken Rückgang ihrer Marktkapitalisierung verursachte."
 sov_economic.25.a: "Gebt ausländischen Interessen die Schuld."
 sov_economic.26.t: "Folgen der Oligarchensäuberung"
 sov_economic.26.d: "Unser hartes Vorgehen gegen Oligarchen führte zu zahlreichen Strafverfahren, was große Unternehmen negativ traf, da Investoren aus Angst reagierten und ihr Kapital abzogen."
 sov_economic.26.a: "Törichte Investoren."
 sov_economic.27.t: "Unfall in einer Rosneft-Anlage"
 sov_economic.27.d: "Ein Unfall in einer Rosneft-Anlage verursachte schwerwiegende wirtschaftliche und ökologische Schäden. Investoren verkauften hastig ihre Anteile, da sie mit harten staatlichen Strafen rechnen."
 sov_economic.27.a: "Wer hat vergessen, das Ventil zu schließen?"
 sov_economic.28.t: "Unfall in einer Gazprom-Anlage"
 sov_economic.28.d: "In einer Gazprom-Anlage ereignete sich ein schwerer Zwischenfall, der wirtschaftliche und ökologische Folgen hatte. Investoren warfen ihre Anteile rasch auf den Markt, weil sie staatliche Sanktionen befürchten."
 sov_economic.28.a: "Schon wieder ein Ventilfehler?"
 sov_economic.29.t: "Schließung von Gazproms Gasleitung"
 sov_economic.29.d: "Die Nachricht von der Schließung einer Gasleitung traf den Aktienmarkt hart, wodurch Gazprom-Aktien stark fielen, da Investoren ein verlangsamtes Wachstum und Verluste fürchten."
 sov_economic.29.a: "Kurzsichtige Investoren."
 sov_economic.30.t: "Eröffnung einer neuen Gasleitung"
 sov_economic.30.d: "Der Aktienmarkt eröffnete mit positiven Nachrichten: Die Aktien von Gazprom stiegen stark nach der Ankündigung der Inbetriebnahme einer neuen Gasleitung."
 sov_economic.30.a: "Ausgezeichnete Nachrichten."
 sov_economic.31.t: "Panik wegen Verstaatlichung"
 sov_economic.31.d: "Gerüchte über eine Überprüfung der Privatisierungen der 1990er Jahre lösten Panik unter Investoren aus, die den Verlust ihrer Vermögenswerte fürchteten und massenhaft Aktien verkauften."
 sov_economic.31.a: "Überreaktion der Investoren."
 sov_economic.32.t: "Reaktion auf den WTO-Beitritt"
 sov_economic.32.d: "Nach unserem offiziellen Beitritt zur WTO kam es an der Moskauer Börse zu einem Aufschwung, da Investoren in Erwartung starken Wachstums begierig Aktien kauften."
 sov_economic.32.a: "Fantastisch!"
 sov_economic.33.t: "Wiederaufnahme des Handels an der Moskauer Börse"
 sov_economic.33.d: "Nach einer erzwungenen Schließung von einem Monat hat die Moskauer Börse wieder geöffnet und der Handel ist zum Normalbetrieb zurückgekehrt."
 sov_economic.33.a: "Willkommen zurück."
