 SOV_funding_could_fail_TT: "§HAufgrund von Korruption besteht eine geringe Wahrscheinlichkeit, dass das Geld veruntreut wurde.§!"
 SOV_funding_success_TT: "§GAufgrund unserer Korruptionsfreiheit werden die Gelder nicht veruntreut.§!"
