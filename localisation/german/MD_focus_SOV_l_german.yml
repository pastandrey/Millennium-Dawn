 SOV_new_russia_army: "Neue russische Armee"
 SOV_new_russia_army_desc: "Das moderne Zeitalter verlangt eine moderne Armee. Wir müssen unsere Streitkräfte an neue Technologien und Herausforderungen anpassen."
 SOV_oligarch_pay_for_army: "Oligarchen finanzieren die Armee"
 SOV_oligarch_pay_for_army_desc: "Wir haben finanzielle Unterstützung von Oligarchen erhalten, die im Gegenzug vor Strafverfolgung geschützt werden."
 SOV_more_yunarmy: "Ausbau der Yunarmiya"
 SOV_more_yunarmy_desc: "Wir werden die Junge Armee erweitern, um ihre Reichweite und Effektivität als Instrument patriotischer Erziehung und Propaganda zu erhöhen."
 SOV_propaganda_army: "Technologischer Durchbruch"
 SOV_propaganda_army_desc: "Unser technologischer Fortschritt muss mit dem der Welt Schritt halten. Das Militär wird bei der Einführung neuer Innovationen eine führende Rolle spielen."
 SOV_leib_guard: "Reform des Präsidentenregiments"
 SOV_leib_guard_desc: "Das Präsidentenregiment wird in die Imperiale Garde umgewandelt und knüpft an die prestigeträchtige Einheit aus der Zeit des Russischen Reiches an."
 SOV_ratnik_3: "Ratnik-3"
 SOV_ratnik_3_desc: "Wir werden massiv in das Ratnik-3-Programm investieren, um unsere Soldaten mit der modernsten Kampfausrüstung auszustatten."
 SOV_pmc_patriot: "PMC Patriot"
 SOV_pmc_patriot_desc: "Das Verteidigungsministerium plant die Gründung einer neuen privaten Militärfirma, um unseren Einfluss und unsere operativen Möglichkeiten zu erweitern."
 SOV_morpeh_vdv: "Reform der Luftlandetruppen und Marineinfanterie"
 SOV_morpeh_vdv_desc: "Die Marineinfanterie und die Luftlandetruppen müssen umstrukturiert werden, um den Anforderungen moderner Kriegsführung gerecht zu werden."
 SOV_uav_arms: "Drohnenstreitkräfte"
 SOV_uav_arms_desc: "Drohnen sind ein entscheidender Faktor moderner Kriegsführung. Wir werden ein eigenes Drohnenkorps aufstellen, um ihr strategisches und taktisches Potenzial voll auszuschöpfen."
