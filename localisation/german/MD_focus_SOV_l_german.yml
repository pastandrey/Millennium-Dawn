 GOV_NKR: "Gouvernement Schemacha"
 russia_governorate.16.t: "Russland hat beschlossen, aus uns ein Gouvernement zu machen"
 russia_governorate.16.d: "Russland ist entschieden gegen die alte Staatsstruktur. Sie drängen auf die Rückkehr administrativer Gliederungen und wollen, dass wir eines ihrer Gouvernements werden."
 russia_governorate.16.o1: "Gemeinsam werden wir das große Reich wiederbeleben!"
 russia_governorate.16.o2: "Widerstand leisten und zubeißen!"
 russia_governorate.16.o3: "Einen Unionsstaat vorschlagen"
 russia_governorate.17.t: "Belarus kehrt heim"
 russia_governorate.17.d: "Die Regierung von Belarus hat klug gehandelt, indem sie einen Konflikt mit uns vermieden hat. Belarus wird erneut Teil des Russischen Reiches und stärkt unser Bündnis."
 russia_governorate.17.o1: "Ausgezeichnet."
 russia_governorate.18.t: "Belarus widersetzt sich uns!"
 russia_governorate.18.d: "Belarus hatte die Dreistigkeit, sich Russlands Wünschen nach einem Unionsstaat zu widersetzen. Wir müssen eine entschlossene Antwort auf diese Auflehnung vorbereiten."
 russia_governorate.18.o1: "Narren."
 russia_governorate.19.t: "Belarus schlägt einen Unionsstaat vor"
 russia_governorate.19.d: "Die belarussische Regierung hat einen alternativen, weniger aggressiven Ansatz angeboten: die beschleunigte Schaffung eines Unionsstaates. Offenbar wollen sie die Machtverluste minimieren, die sie erleiden könnten."
 russia_governorate.19.o1: "So soll es einen Unionsstaat geben"
 russia_governorate.19.o2: "Kein Belarus."
 SOV_west_east_bop_left_side: "£text_icon_sov_democratic §YNeues Demokratisches Russland§!"
 SOV_west_east_bop_right_side: "£text_icon_sov_empire §YErben des Großen Russlands§!"
 SOV_west_east_bop: "§YDie Zukunft Russlands§!"
 SOV_west_east_bop_mid_range: "£text_icon_sov_democratic §YJelzins Erben§!"
 SOV_west_east_left_win_range: "£text_icon_sov_democratic §YRussische Demokratie§!"
 SOV_west_east_left_advanced_range: "£text_icon_sov_democratic §YDemokratische Prinzipien§!"
 SOV_west_east_left_medium_range: "£text_icon_sov_democratic §YDemokratisches Bewusstsein§!"
 SOV_west_east_left_low_range: "£text_icon_sov_democratic §YErste Schritte der Demokratie§!"
 SOV_west_east_right_win_range: "£text_icon_sov_empire §YDas Dritte Rom§!"
 SOV_west_east_right_advanced_range: "£text_icon_sov_empire §YDas Neue Imperium§!"
 SOV_west_east_right_medium_range: "£text_icon_sov_empire §YBewusstsein der Größe§!"
 SOV_west_east_right_low_range: "£text_icon_sov_empire §YDie große Vergangenheit§!"
 russian_legacy_empire: "£text_icon_sov_empire Imperiales Erbe"
 russian_legacy_empire_desc: "Russland war stets ein großes Imperium, und wir werden dieses Erbe nicht aufgeben, nur um flüchtigen demokratischen Illusionen nachzujagen."
 russian_legacy_democratic: "£text_icon_sov_democratic Demokratisches Erbe"
 russian_legacy_democratic_desc: "Auch wenn Russland lange Phasen der Autokratie erlebt hat, gab es ebenso Momente demokratischer Hoffnung. Dieses Erbe der Freiheit werden wir bewahren und ausbauen."
 SOV_kosmo_voiska: "Russische Weltraumstreitkräfte"
 SOV_kosmo_voiska_desc: "Die russischen Weltraumstreitkräfte bilden den Weltraumzweig der Luft- und Raumfahrtstreitkräfte."
 SOV_armyreform_ipso: "Truppen für Informationsoperationen"
 SOV_armyreform_ipso_desc: "Diese Truppen führen Cyberoperationen durch, verwalten militärische Netzwerke und schützen Kommunikationssysteme vor Cyberbedrohungen."
 SOV_army_mto: "Logistische Unterstützung der russischen Streitkräfte"
 SOV_army_sso: "Spezialoperationskräfte"
 SOV_army_ipso: "Truppen für Informationsoperationen"
 SOV_russian_spaceforce: "Russische Weltraumstreitkräfte"
 SOV_putinism_propaganda: "Propaganda des Putinismus"
 SOV_putinism_propaganda_desc: "Vor Putin war Russland ein zerschlagenes und gedemütigtes Land. Unter seiner Führung wurden Hoffnung und Stolz wiederhergestellt. Wir werden diese Wiedergeburt feiern und sicherstellen, dass alle Bürger die Größe erkennen, die er Russland gebracht hat."
 SOV_idea_putinism_propaganda: "Putinismus-Propaganda"
 SOV_putinism_system_protest: "Protest gegen Putins System"
 SOV_wagner_isis_hunters: "ISIS-Jäger"
 SOV_moscow_no_more: "Petrograd ist die Hauptstadt Russlands"
 SOV_KUB_separ_tt: "§RSeparatismus§! in §Y[KUB.GetNameWithFlag]§!: §Y[?KUB.subjectinped]§!%"
 GOV_TRK: "Gouvernement Turkestan"
 SOV_stabilisation_fund: "Stabilisierungsfonds"
 SOV_stabilisation_fund_desc: "Der Stabilisierungsfonds dient als finanzielle Reserve im Falle einer Wirtschaftskrise. Er wird helfen, die nationale Stabilität in wirtschaftlichen Abschwüngen zu bewahren und sicherzustellen, dass öffentliche Dienste weiterhin funktionieren. Dieses Sicherheitsnetz stärkt unsere Position sowohl auf nationalen als auch auf internationalen Märkten."
 SOV_kasyanov_govern: "Kasyanows Regierung"
 SOV_kasyanov_govern_desc: "Die Regierung Kasyanow plant eine Einigung mit dem Pariser Club, um einen Teil unserer Staatsschulden erlassen zu lassen. Dies würde die finanziellen Belastungen reduzieren und das Wirtschaftswachstum ankurbeln. Mit mehr finanziellen Spielräumen können wir uns stärker auf Entwicklung und soziale Wohlfahrt konzentrieren."
 SOV_young_guard: "Junge Garde"
 SOV_young_guard_desc: "Die Junge Garde ist die Jugendorganisation der Partei Einiges Russland. Ihr Name geht auf eine heroische Untergrundbewegung des Zweiten Weltkriegs zurück. Als pro-putinistische Aktionsgruppe verfügt sie über 85 Regionalverbände von Kaliningrad bis Wladiwostok und mobilisiert patriotische Jugend im ganzen Land."
 SOV_reform_sovfed: "Reform des Föderationsrates"
 SOV_reform_sovfed_desc: "Wir reformieren den Föderationsrat, um seine Arbeit effektiver zu gestalten. In seiner derzeitigen Form erfüllt er nur begrenzte Aufgaben. Mit klareren Strukturen und einer eindeutigen Funktion kann der Rat zu einem wichtigen Instrument der Politikgestaltung werden."
 SOV_stab_fund_idea: "Stabilisierungsfonds"
 SOV_young_guard_idea: "Junge Garde"
 SOV_stab_fund_tt: "Im Falle einer §Rschlechten wirtschaftlichen Lage§! wird der §YStabilisierungsfonds§! eingesetzt, um die Wirtschaft zu stabilisieren\n"
 SOV_economic_russian: "Die russische Wirtschaft"
 SOV_economic_russian_desc: "Unsere Wirtschaft ist weiterhin durch die Krisen der 1990er Jahre, den Zusammenbruch der UdSSR und andere langfristige Folgen geschwächt. Es ist an der Zeit, entschlossene Maßnahmen zu ergreifen, um das wirtschaftliche Fundament unserer Nation wieder aufzubauen und zu stärken."
 SOV_economic_reform_gazprom: "Reform von Gazprom"
 SOV_economic_reform_gazprom_desc: "Gazprom hat unter der Krise der 1990er Jahre stark gelitten. Die Reform dieses für unser Land zentralen Unternehmens ist entscheidend, um es als mächtigen Motor unseres Wirtschaftswachstums zu erhalten."
 SOV_economic_buy_sibur: "SIBUR-Vermögenswerte erwerben"
 SOV_economic_buy_sibur_desc: "Wir erwerben Vermögenswerte des Ölunternehmens SIBUR, um unsere industriellen Kapazitäten auszubauen und unseren Energiesektor zu sichern."
 SOV_economic_zapolyarnoe: "Gasfeld Sapoljarnoye"
 SOV_economic_zapolyarnoe_desc: "Die gewaltigen Gas-, Öl- und Kondensatreserven von Sapoljarnoye, die bereits in den 1960er Jahren entdeckt wurden, stehen nun zur Förderung bereit, um unsere Energieproduktion zu steigern."
 SOV_economic_gazprom_tes: "Bau von Wärmekraftwerken"
 SOV_economic_gazprom_tes_desc: "Im Rahmen unseres Energieentwicklungsprogramms werden wir im ganzen Land mehrere Wärmekraftwerke errichten, um eine stabile Stromversorgung sicherzustellen."
 SOV_economic_nat_gas_sakhalin: "Gasförderung auf Sachalin"
 SOV_economic_nat_gas_sakhalin_desc: "Investitionen in die Gasfelder Sachalins werden beträchtliche Gewinne sichern und unsere Energieexporte stärken."
 SOV_economic_gazprom_stream: "Bau von Stream-Pipelines"
 SOV_economic_gazprom_stream_desc: "Wir sind bereit, neue Gaspipelines zu bauen, die bestimmte Länder umgehen und so stabile und verlässliche Gasexporte sichern."
 SOV_economic_gazprom_norstream: "Nord Stream"
 SOV_economic_gazprom_norstream_desc: "Wir werden eine direkte Gaspipeline nach Deutschland bauen, um eine konstante Versorgung sicherzustellen und die wirtschaftlichen Beziehungen zu stärken."
 SOV_economic_gazprom_bluestream: "Blue Stream"
 SOV_economic_gazprom_bluestream_desc: "Eine Gaspipeline in die Türkei ist geplant, um unsere Energieexporte auszuweiten und die regionale Zusammenarbeit zu stärken."
 SOV_economic_gazprom_turkeystream: "Turkish Stream"
 SOV_economic_gazprom_nordstream2: "Nord Stream 2"
 SOV_economic_gazprom_nordstream2_desc: "Wir planen, unsere Gaspartnerschaft mit Deutschland durch den Bau einer zweiten Pipeline auszubauen, um die steigende Nachfrage zu decken."
 SOV_outer_space_vostochniy: "Kosmodrom Wostotschny"
 SOV_outer_space_vostochniy_desc: "Um unsere Abhängigkeit von Baikonur zu verringern, werden wir mit dem Bau des Kosmodroms Wostotschny für künftige Starts beginnen."
 SOV_outer_space_asteroids_mining: "Ressourcen aus Asteroiden"
 SOV_outer_space_asteroids_mining_desc: "Unsere Raumfahrttechnologie ermöglicht nun die Gewinnung wertvoller Rohstoffe aus Asteroiden, und wir werden diese Möglichkeit nutzen."
 SOV_outer_space_space_combat_wombat: "Vorbereitung auf das Wettrennen im All"
 SOV_outer_space_space_combat_wombat_desc: "Das Rennen im Weltraum hat nach einer Pause wieder begonnen, und wir müssen unsere Anstrengungen verstärken, um die Führung zurückzugewinnen."
 SOV_outer_space_sateelites: "Investitionen in Satelliten"
 SOV_outer_space_sateelites_desc: "Satelliten sind unverzichtbare Augen im All, nicht nur für das Wettrennen, sondern auch für mögliche künftige Konflikte."
 SOV_outer_space_weaponized_space: "Militarisierung des Weltraums"
 SOV_outer_space_weaponized_space_desc: "Der Weltraum wird unweigerlich zu einem militarisierten Bereich werden, daher ist es entscheidend, dass wir zuerst handeln, um unsere Interessen zu sichern."
 SOV_outer_space_moon_base: "Mondbasis"
 SOV_outer_space_moon_base_desc: "Die Errichtung einer Mondbasis wird ein großer Meilenstein auf unserem Weg zur Eroberung des Sonnensystems sein."
 SOV_outer_space_marines: "Russische Weltraummarines"
 SOV_outer_space_marines_desc: "Unser neuer Zweig der Weltraummarines wird keine Gnade kennen und jeden Feind im Kampf im All besiegen."
 SOV_economic_floating_nuclear: "Schwimmende Kernkraftwerke"
 SOV_economic_floating_nuclear_desc: "Rosatom entwickelt autarke, schwimmende Kernkraftwerke, die in Serie produziert und in der Nähe von Orten mit hohem Strombedarf eingesetzt werden sollen."
 SOV_economic_securing_rosatom: "Industrielle Sicherheit"
 SOV_economic_securing_rosatom_desc: "Wir werden die Sicherheit in Nuklearanlagen verstärken, um katastrophale Zwischenfälle zu verhindern."
 SOV_economic_anti_terrorist_rosatom: "Anti-Terror-Schutz"
 SOV_economic_anti_terrorist_rosatom_desc: "Wir werden mit der Nationalgarde zusammenarbeiten, um unsere Nuklearanlagen vollständig vor terroristischen Bedrohungen zu schützen."
 SOV_economic_rao_ues: "Liquidierung von RAO UES"
 SOV_economic_rao_ues_desc: "Die Reform des Energiesektors erfordert die Zerschlagung des derzeitigen Marktmonopolisten RAO UES."
 SOV_economic_rus_hydro: "Gründung von RusHydro"
 SOV_economic_rus_hydro_desc: "Wir werden RusHydro gründen, um Energieerzeugungsanlagen effizient zu kontrollieren und zu verwalten."
 SOV_economic_rus_hydro_expanded: "Ausbau von RusHydro"
 SOV_economic_rus_hydro_expanded_desc: "Investitionen haben RusHydro gestärkt und dem Unternehmen ermöglicht, im ganzen Land neue Energieinfrastruktur zu errichten."
 SOV_economic_interrao: "Inter RAO"
 SOV_economic_interrao_desc: "Inter RAO wurde 1997 gegründet und wird im Rahmen unserer Energiereform durch den Erwerb inländischer Stromnetze expandieren."
 SOV_economic_interrao_expand: "Ausbau von Inter RAO"
 SOV_economic_interrao_expand_desc: "Mit staatlicher Unterstützung ist Inter RAO bereit, im ganzen Land neue Energieanlagen zu errichten."
 SOV_economic_trikolov_tv: "Tricolor TV"
 SOV_economic_trikolov_tv_desc: "Obwohl es sich um ein Privatunternehmen handelt, werden wir verdeckt die Kontrolle über das Sendenetz von Tricolor TV aufrechterhalten."
 SOV_economic_gazprom_media: "Gazprom Media"
 SOV_economic_gazprom_media_desc: "Gazprom plant die Schaffung einer eigenen Medienholding; wir müssen diese Entwicklung lenken und beeinflussen."
 SOV_economic_gazprom_neft: "Gazprom Neft"
 SOV_economic_gazprom_neft_desc: "Nach der Liquidierung von Sibneft erwarb Gazprom eine Mehrheitsbeteiligung und die vollständige Kontrolle über dessen Vermögenswerte."
 SOV_economic_gas_with_sibur: "Öl- und Gasprojekt mit SIBUR"
 SOV_economic_gas_with_sibur_desc: "Gazprom entwickelt gemeinsam mit SIBUR ein Öl- und Gasprojekt, um die regionale Produktion zu steigern."
 SOV_economic_arctic_gas: "Öl- und Gasfelder in der Arktis"
 SOV_economic_arctic_gas_desc: "Gazprom plant, die gewaltigen Reserven der arktischen Öl- und Gasfelder zu erkunden und auszubeuten."
 SOV_economic_oil_nenets: "Öl- und Gasprojekt in [NEE.GetName]"
 SOV_economic_oil_nenets_desc: "Gazprom setzt die Entwicklung von Öl- und Gasprojekten in dieser strategisch wichtigen Region fort."
 SOV_economic_oil_yamao: "Öl- und Gasprojekt in [YAM.GetName]"
 SOV_economic_oil_yamao_desc: "Die weitere Erschließung der Öl- und Gasressourcen in diesem Gebiet bleibt für Gazprom eine Priorität."
 SOV_economic_oil_khmao: "Öl- und Gasprojekt in [KHM.GetName]"
 SOV_economic_oil_khmao_desc: "Gazprom beabsichtigt, die Öl- und Gasförderung in dieser Region auszuweiten."
 SOV_economic_slavneft: "Erwerb der SLAVNEFT-Vermögenswerte"
 SOV_economic_slavneft_desc: "Rosneft und Gazprom planen, die Vermögenswerte von Slawneft aufzuteilen und zu übernehmen."
 SOV_economic_reform_rosneft: "Rosneft-Reform"
 SOV_economic_reform_rosneft_desc: "Rosneft will seine Strukturen reformieren und seine Tätigkeit ausweiten, um seine Marktposition zu stärken."
 SOV_economic_use_yukos: "YUKOS-Vermögenswerte nutzen"
 SOV_economic_use_yukos_desc: "Rosneft wird die aus der Liquidierung von Yukos übernommenen Vermögenswerte für die weitere Entwicklung des Unternehmens nutzen."
 SOV_economic_buy_itera: "Übernahme von ITERA"
 SOV_economic_buy_itera_desc: "Rosneft plant, ITERA als neuen strategischen Vermögenswert in sein Portfolio aufzunehmen."
 SOV_economic_buy_severnaya_neft: "Übernahme von SevernayaNeft"
 SOV_economic_buy_severnaya_neft_desc: "Die Übernahme von SevernayaNeft wird die Rohstoffbasis von Rosneft erweitern."
 SOV_economic_buy_thk_bp: "Übernahme von TNK"
 SOV_economic_buy_thk_bp_desc: "Rosneft beabsichtigt, TNK zu übernehmen, um seine Ölproduktionskapazitäten zu stärken."
 SOV_economic_efko: "Efko"
 SOV_economic_efko_desc: "Efko ist ein führender russischer Hersteller von Fetten, Margarine, Mayonnaise, Pflanzenölen und Molkereiprodukten und zählt zu den größten agroindustriellen Unternehmen des Landes."
 SOV_economic_miratorg: "Miratorg"
 SOV_economic_miratorg_desc: "Miratorg ist Russlands größte vertikal integrierte Agrarholding und produziert Schweinefleisch und Fleischprodukte entlang der gesamten Lieferkette."
 SOV_economic_rusagro: "RusAgro"
 SOV_economic_rusagro_desc: "RusAgro ist eines der größten Agrarunternehmen Russlands und spezialisiert sich auf die Produktion von Schweinefleisch, Fetten und Zucker. Es wurde 1995 gegründet."
 SOV_economic_efko_expanded: "Ausbau von Efko"
 SOV_economic_efko_expanded_desc: "Efko plant weiteres Wachstum, unterstützt durch staatliche Subventionen zur Förderung seiner Entwicklung."
 SOV_economic_miratorg_expanded: "Ausbau von Miratorg"
 SOV_economic_miratorg_expanded_desc: "Miratorg will mit Hilfe staatlicher Investitionen seine Produktion erweitern."
 SOV_economic_rusagro_expanded: "Ausbau von RusAgro"
 SOV_economic_rusagro_expanded_desc: "RusAgro strebt eine weitere Entwicklung an, die durch staatliche Mittel unterstützt wird."
 SOV_economic_phos_agro: "PhosAgro"
 SOV_economic_phos_agro_desc: "PhosAgro mit Sitz in Moskau ist Europas größter Hersteller von phosphatbasierten Düngemitteln und verwandten Chemikalien."
 SOV_economic_belarus_integrate: "Integration der belarussischen Industrie"
 SOV_economic_belarus_integrate_desc: "Wir werden belarussische Fabriken in die russische Wirtschaft integrieren und diese Industrien unter unsere Kontrolle bringen."
 SOV_economic_mzkt_annex: "MZKT integrieren"
 SOV_economic_mzkt_annex_desc: "MZKT, ein belarussischer Hersteller schwerer und spezialisierter Fahrzeuge, wird in unsere Zuständigkeit eingegliedert."
 SOV_economic_140_annex: "140. Reparaturwerk integrieren"
 SOV_economic_140_annex_desc: "Das 140. Reparaturwerk ist auf die Modernisierung gepanzerter Fahrzeuge spezialisiert und wird annektiert, um unsere militärisch-industriellen Kapazitäten auszubauen."
 SOV_economic_peleng_annex: "Peleng integrieren"
 SOV_economic_peleng_annex_desc: "Peleng, ein führendes belarussisches Unternehmen im Bereich der Optoelektronik für militärische und zivile Zwecke, wird Teil unseres Industriesystems."
 SOV_economic_grodno_annex: "Grodno Azot integrieren"
 SOV_economic_grodno_annex_desc: "Grodno Azot produziert für die Landwirtschaft wichtige Düngemittel, und seine Integration wird unsere Marktstellung stärken."
 SOV_economic_evraz: "EVRAZ"
 SOV_economic_evraz_desc: "EVRAZ ist ein multinationales Stahl- und Bergbauunternehmen, das teilweise russischen Oligarchen gehört und hauptsächlich in Russland, den USA, Kanada und Kasachstan tätig ist."
 SOV_economic_mechel: "Mechel"
 SOV_economic_mechel_desc: "Mechel ist ein bedeutender russischer Produzent von Kohle, Eisenerz und Stahlprodukten mit Sitz in Moskau und Verkäufen im In- und Ausland."
 SOV_economic_severstal: "Severstal"
 SOV_economic_severstal_desc: "Severstal ist Russlands größter Stahlhersteller mit Sitz in Tscherepowez und wird vom Milliardär Alexei Mordaschow kontrolliert."
 SOV_economic_evraz_asset: "Ausbau von EVRAZ"
 SOV_economic_evraz_asset_desc: "EVRAZ wird weiter expandieren, wobei staatliche Subventionen sein Wachstum unterstützen."
 SOV_economic_yakut_ugol: "Übernahme von YakutUgol"
 SOV_economic_yakut_ugol_desc: "Mechel plant, die Vermögenswerte von YakutUgol zu übernehmen, um seine Kohleförderkapazitäten auszuweiten."
 SOV_economic_severstal_expanded: "Ausbau von Severstal"
 SOV_economic_severstal_expanded_desc: "Severstal strebt mit staatlicher Unterstützung für neue Projekte weiteres Wachstum an."
 SOV_economic_nornickel: "Nornickel"
 SOV_economic_nornickel_desc: "Nornickel ist ein führendes russisches Bergbau- und Hüttenunternehmen, das sich auf Nickel und Palladium spezialisiert und hauptsächlich in der Nähe von Norilsk tätig ist."
 SOV_economic_buy_polus: "Polyus kaufen"
 SOV_economic_buy_polus_desc: "Polyus ist Russlands größter Goldproduzent und eines der weltweit führenden Bergbauunternehmen nach Fördermenge."
 SOV_economic_alrosa: "Alrosa"
 SOV_economic_alrosa_desc: "Alrosa ist weltweit führend bei der Diamantenproduktion nach Volumen und steht für 95 % der russischen Diamantenförderung sowie 27 % der weltweiten Produktion."
 SOV_economic_nakynskoe: "Nyurbinsky Bergbau- und Aufbereitungskombinat"
 SOV_economic_nakynskoe_desc: "Alrosa hat das Nyurbinsky-Werk eröffnet und damit seine Bergbau- und Verarbeitungskapazitäten erweitert."
 SOV_economic_rusal: "Rusal"
 SOV_economic_rusal_desc: "Rusal ist der zweitgrößte Aluminiumproduzent der Welt und verantwortlich für fast 9 % der globalen Produktion."
 SOV_economic_buy_sual: "SUAL-Vermögenswerte erwerben"
 SOV_economic_buy_sual_desc: "Der Abschluss der Integration von SUAL wird die vollständige Bildung des Unternehmens unter unserer Kontrolle abschließen."
 SOV_economic_aeroflot: "Aeroflot"
 SOV_economic_aeroflot_desc: "Aeroflot ist Russlands nationale Fluggesellschaft, hervorgegangen aus dem sowjetischen Staatsunternehmen und heute international tätig."
 SOV_economic_poebda: "Pobeda"
 SOV_economic_poebda_desc: "Pobeda ist eine russische Billigfluggesellschaft und Tochter von Aeroflot mit Basis am Moskauer Flughafen Wnukowo."
 SOV_economic_new_airports: "Neue Flughäfen bauen"
 SOV_economic_new_airports_desc: "Aeroflot plant, in den Bau neuer Flughäfen im ganzen Land zu investieren, um die Erreichbarkeit des Luftverkehrs zu verbessern."
 SOV_economic_rjd: "RZD"
 SOV_economic_rjd_desc: "Die Russischen Eisenbahnen sind ein staatliches, vertikal integriertes Unternehmen, das die öffentliche Infrastruktur besitzt und der größte Betreiber im russischen Eisenbahnnetz ist. Es wurde auf Grundlage des ehemaligen russischen Eisenbahnministeriums gegründet. Das Unternehmen spielt eine entscheidende Rolle bei der Verbindung der riesigen Regionen des Landes und bei der Unterstützung der wirtschaftlichen Entwicklung."
 SOV_economic_rjd_sochi: "Infrastruktur in Sotschi"
 SOV_economic_rjd_sochi_desc: "Die Russischen Eisenbahnen planen erhebliche Investitionen in die Infrastruktur von Sotschi, um den Tourismus zu fördern und die Verkehrskapazitäten der Region zu verbessern. Diese Maßnahmen sollen Sotschi zu einem besser erreichbaren und attraktiveren Ziel für in- und ausländische Besucher machen."
 SOV_economic_rjd_more_trains: "Anschaffung von Zügen"
 SOV_economic_rjd_more_trains_desc: "Die Russischen Eisenbahnen erweitern ihre Flotte durch die dringende Bestellung einer großen Zahl neuer Waggons. Dieser Schritt wird das Netz modernisieren und die Transportkapazität im ganzen Land verbessern."
 SOV_economic_rjd_moscow_circle: "Moskauer Zentralkreis"
 SOV_economic_rjd_moscow_circle_desc: "Der Moskauer Zentralkreis (MCC), bekannt als Linie 14 und in erdbeerrot-weißen Farben markiert, ist eine 54 Kilometer lange städtische Bahnlinie, die das historische Moskau umrundet. Sie stellt eine wichtige Ringverbindung dar, entlastet überlastete Strecken und verbindet viele zentrale Gebiete der Stadt."
 SOV_economic_rjd_transsib: "Transsibirische Eisenbahn"
 SOV_economic_rjd_transsib_desc: "Die Transsibirische Eisenbahn, historisch als Große Sibirische Route bekannt und oft als Transsib abgekürzt, ist ein riesiges Schienennetz, das das europäische Russland mit dem russischen Fernen Osten verbindet. Sie ist für den Güter- und Personenverkehr über den Kontinent hinweg von entscheidender Bedeutung."
 SOV_economic_rjd_baikal_amure: "Baikal-Amur-Magistrale"
 SOV_economic_rjd_baikal_amure_desc: "Die Baikal-Amur-Magistrale (BAM) ist eine breitspurige Eisenbahnstrecke von 4.324 Kilometern Länge, die sich durch Ostsibirien und den russischen Fernen Osten zieht. Sie verläuft etwa 610 bis 770 Kilometer nördlich und parallel zur Transsibirischen Eisenbahn und stellt einen wichtigen alternativen Transportkorridor dar."
 SOV_economic_rjd_north_latitudinal: "Nördliche Breitenbahn"
 SOV_economic_rjd_north_latitudinal_desc: "Die Nördliche Breitenbahn, die derzeit im Autonomen Kreis der Jamal-Nenzen gebaut wird, wird 707 Kilometer lang sein. Sie wird den westlichen und östlichen Teil der Region verbinden und die Nördliche Eisenbahn im Osten mit der Oblast Swerdlowsk verknüpfen, wodurch die regionale Anbindung erheblich verbessert wird."
 SOV_economic_rjd_sakhalin: "Verkehrsinfrastruktur auf Sachalin"
 SOV_economic_rjd_sakhalin_desc: "Die Verkehrsinfrastruktur Sachalins muss modernisiert werden, um das wirtschaftliche Wachstum der Insel zu unterstützen. Die Russischen Eisenbahnen planen Ausbauprojekte, um die Konnektivität innerhalb Sachalins zu modernisieren und zu verbessern."
 SOV_economic_rjd_mcd: "Moskauer Zentrale Durchmesserlinien"
 SOV_economic_rjd_mcd_desc: "Die Moskauer Zentralen Durchmesserlinien (MCD) sind Pendlerbahnverbindungen, die auf bestehenden Vorortbahnstrecken in Moskau und dem umliegenden Moskauer Gebiet verkehren. Diese Verbindungen verbessern die Effizienz des Verkehrs, indem sie Randgebiete direkt mit dem Stadtzentrum verbinden."
 SOV_economic_rubber: "Inländische Reifenindustrie"
 SOV_economic_rubber_desc: "Unsere heimische Reifenindustrie ist weiterhin unterentwickelt und benötigt dringend mehr Investitionen. Durch mehrere Haushaltszuteilungen wollen wir die Produktion modernisieren und diesen wichtigen Bereich unserer Wirtschaft stärken."
 SOV_economic_rubber_foreign: "Ausländische Investoren"
 SOV_economic_rubber_foreign_desc: "Wir planen, führende Reifenhersteller und Marken aus dem Ausland anzuziehen, damit sie Produktionsstätten in Russland errichten. Das wird fortschrittliche Technologien ins Land bringen und die Entwicklung der heimischen Industrie fördern."
 SOV_economic_auto: "Automobilindustrie"
 SOV_economic_auto_desc: "Die Nachfrage nach Automobilen ist in den vergangenen zehn Jahren deutlich gestiegen, weshalb wir die zukünftige Ausrichtung unserer Automobilindustrie festlegen müssen. Investitionen und strategische Partnerschaften werden helfen, diesen wachsenden Bedarf zu decken."
 SOV_economic_invite_investors: "Ausländische Marken einladen"
 SOV_economic_invite_investors_desc: "Wir sind bereit, ausländische Automarken willkommen zu heißen, damit sie Fabriken in Russland errichten. Das wird unseren Markt diversifizieren und modernste Automobiltechnologien ins Land bringen."
 SOV_economic_cars_usa: "Amerikanische Automarken"
 SOV_economic_cars_usa_desc: "Amerikanische Automobilhersteller sind eingeladen, in unseren Markt einzutreten und ihre Präsenz auszubauen. Diese Zusammenarbeit wird die Auswahl für Verbraucher verbessern und den Wettbewerb fördern."
 SOV_economic_cars_europe: "Europäische Automarken"
 SOV_economic_cars_europe_desc: "Wir sind bereit, europäische Automarken vollständig in den russischen Markt zu integrieren. Ihr Engagement wird zum technologischen Wachstum und zur Vielfalt des Marktes beitragen."
 SOV_economic_reno_nissan_autovaz: "AvtoVAZ Renault Nissan"
 SOV_economic_reno_nissan_autovaz_desc: "Die Allianz zwischen AvtoVAZ, Renault und Nissan soll unseren Automobilsektor stärken und durch gemeinsames Fachwissen und gemeinsame Ressourcen positive Auswirkungen auf den Markt haben."
 SOV_economic_cars_west_market: "Westlicher Automarkt"
 SOV_economic_cars_west_market_desc: "Unser Markt ist zunehmend mit westlichen Autoherstellern verflochten. Dieser Trend wird sich voraussichtlich fortsetzen, die Branche modernisieren und den Verbrauchern eine größere Auswahl an Fahrzeugen bieten."
 SOV_economic_cars_japan_market: "Japanischer Automarkt"
 SOV_economic_cars_japan_market_desc: "Wir planen, unsere Partnerschaften mit japanischen Autoherstellern zu vertiefen, um von ihren fortschrittlichen Technologien und Produktionsstandards zu profitieren."
 SOV_economic_cars_china_market: "Chinesischer Automarkt"
 SOV_economic_cars_china_market_desc: "Die Stärkung der Beziehungen zu chinesischen Autoherstellern wird neue Chancen eröffnen und russischen Verbrauchern Zugang zu innovativen Modellen verschaffen."
 SOV_economic_cars_udar_market: "Breiter Zugang für chinesische Hersteller"
 SOV_economic_cars_udar_market_desc: "Wir werden die Präsenz chinesischer Hersteller auf unserem Binnenmarkt ausweiten. Das wird den Wettbewerb erhöhen und Käufern mehr erschwingliche Optionen bieten."
 SOV_economic_cars_moskvich: "Moskwitsch"
 SOV_economic_cars_moskvich_desc: "Wir planen, die traditionsreiche Marke Moskwitsch wiederzubeleben, indem wir ausländische Fahrzeugdesigns lizenzieren. Dieser Ansatz verbindet historisches Erbe mit moderner Technologie."
 SOV_economic_aurus: "Aurus"
 SOV_economic_aurus_desc: "Aurus ist eine angesehene russische Marke, die für Repräsentations- und Luxusfahrzeuge bekannt ist. Ursprünglich als Einheitliche Modulare Plattform und als Projekt Tuple entwickelt, steht sie für unsere handwerkliche Kompetenz im Premiumsegment."
 SOV_economic_domestic: "Fokus auf inländische Automarken"
 SOV_economic_domestic_desc: "Es ist unerlässlich, unseren heimischen Automobilherstellern Vorrang zu geben und sie zu schützen, statt uns ausschließlich auf ausländische Lösungen zu verlassen. Der Aufbau lokaler Kapazitäten stärkt unsere Wirtschaft und unsere Unabhängigkeit im Automobilsektor."
 SOV_economic_avtovaz: "AvtoVAZ"
 SOV_economic_avtovaz_desc: "AvtoVAZ ist ein großer russischer staatlicher Automobilhersteller, der früher unter dem Namen VAZ bekannt war. Das Unternehmen ist vor allem für seine Lada-Reihe bekannt; seine Fahrzeuge wurden früher unter verschiedenen Namen wie Schiguli, Oka und Sputnik verkauft, die in den 1990er Jahren zugunsten der Marke Lada aufgegeben wurden."
 SOV_economic_kamaz: "KAMAZ"
 SOV_economic_kamaz_desc: "KAMAZ mit Sitz in Nabereschnyje Tschelny ist ein führender russischer Hersteller von Lastwagen, Bussen und Motoren. Das 1969 gegründete Unternehmen ist besonders für seine Frontlenker-LKWs bekannt."
 SOV_economic_gaz: "GAZ"
 SOV_economic_gaz_desc: "GAZ, oder Gorkowski Awtomobilny Sawod, ist ein bedeutender russischer Automobilhersteller mit Sitz in Nischni Nowgorod. Das Unternehmen ist die zentrale Tochtergesellschaft der GAZ Group Holding, die wiederum Teil der Industriegruppe Basic Element ist."
 SOV_economic_national_proud: "Nationaler Stolz"
 SOV_economic_national_proud_desc: "Unsere heimischen Autos sind eine Quelle des nationalen Stolzes. Wir bleiben ihrer Förderung verpflichtet und werden dafür sorgen, dass sie zu den besten Fahrzeugen der Welt werden."
 SOV_economic_vaz_electro_car: "VAZ-Elektroautos"
 SOV_economic_vaz_electro_car_desc: "VAZ plant die Einführung einer eigenen Reihe von Elektrofahrzeugen. Diese Initiative ist Teil einer umfassenderen Strategie zur Modernisierung der Automobilindustrie und zur Vorbereitung auf künftige Anforderungen."
 SOV_economic_own_mosnosti: "Unsere Kapazitäten"
 SOV_economic_own_mosnosti_desc: "Wir beabsichtigen, uns beim Wachstum der Automobilindustrie ausschließlich auf unsere eigenen Produktionskapazitäten zu stützen. Das wird helfen, die Qualitätskontrolle zu bewahren und die heimische Fertigung zu stärken."
 SOV_economic_chaika: "Tschaika"
 SOV_economic_chaika_desc: "Die traditionsreiche Marke Tschaika wird mit modernen Aktualisierungen und neuen Funktionen wiederbelebt. Diese Rückkehr soll klassisches Erbe mit zeitgemäßem Automobildesign verbinden."
 SOV_economic_rostelekom: "Rostelekom"
 SOV_economic_rostelekom_desc: "Rostelekom ist Russlands größter Anbieter digitaler Dienstleistungen und bedient Haushalte, Unternehmen, Behörden und Telekommunikationsbetreiber. Das Unternehmen verbindet lokale Netze zu einem einheitlichen landesweiten System für Ferngespräche und Internetdienste und spielt eine entscheidende Rolle in Russlands Kommunikationsinfrastruktur."
 SOV_economic_inter_networks: "Interne Netzbetreiber"
 SOV_economic_inter_networks_desc: "Rostelekom plant, viele kleinere Netzbetreiber in ganz Russland zu übernehmen und unter seiner Kontrolle zusammenzuführen. Diese Strategie wird die Effizienz verbessern und den Marktanteil ausweiten."
 SOV_economic_gosuslugi: "Gosuslugi"
 SOV_economic_gosuslugi_desc: "Gosuslugi ist eine föderale digitale Plattform der russischen Regierung, die einen Onlinezugang zu Informationen über staatliche und kommunale Dienstleistungen bietet. Sie stellt elektronische Formulare bereit und vereinfacht die Interaktion zwischen Bürgern, Unternehmen und Staat."
 SOV_economic_mts: "MTS"
 SOV_economic_mts_desc: "Mobile TeleSystems (MTS) ist Russlands größter Mobilfunknetzbetreiber mit Hauptsitz in Moskau. Das Unternehmen bietet Dienste über GSM-, UMTS- und LTE-Standards sowie Festnetztelefonie, Breitbandinternet und verschiedene Fernsehdienste an."
 SOV_economic_mts_expanding: "Ausbau von MTS"
 SOV_economic_mts_expanding_desc: "MTS investiert in den Bau zahlreicher Funkmasten im ganzen Land. Diese Erweiterung wird die Netzabdeckung und die Kommunikationsqualität in ganz Russland verbessern und Millionen von Nutzern zugutekommen."
 SOV_economic_tele2: "Tele2 Russland"
 SOV_economic_tele2_desc: "Tele2 Russland, ursprünglich vom schwedischen Unternehmen Tele2 gegründet, ist heute eine hundertprozentige Tochtergesellschaft von Rostelekom. Es ist ein wichtiger Akteur auf dem russischen Telekommunikationsmarkt."
 SOV_economic_megaphon: "MegaFon"
 SOV_economic_megaphon_desc: "MegaFon, früher North-West GSM, ist Russlands zweitgrößter Mobilfunkanbieter und der drittgrößte Telekommunikationsanbieter insgesamt. Das Unternehmen bietet Dienste über GSM-, UMTS- und LTE-Netze im ganzen Land an."
 SOV_economic_it_sphere: "Russischer IT-Sektor"
 SOV_economic_it_sphere_desc: "Wir sind entschlossen, den heimischen IT-Sektor zu entwickeln, weil Technologie das Fundament der Zukunft ist. Investitionen in die IT sichern, dass unser Land wettbewerbsfähig und innovativ bleibt."
 SOV_economic_destiny_sber: "Neuausrichtung der Sberbank"
 SOV_economic_destiny_sber_desc: "Es ist an der Zeit, dass die Sberbank ein umfassendes Rebranding durchläuft. Die alte Struktur und das bisherige Erscheinungsbild sind überholt. Heute ist die Sberbank nicht nur eine Bank, sondern ein vollständiges Ökosystem, das eine Vielzahl finanzieller und digitaler Dienstleistungen anbietet."
 SOV_economic_destiny_vk: "Zukunft von VK"
 SOV_economic_destiny_vk_desc: "VKontakte ist Russlands größtes soziales Netzwerk und sein Einfluss reicht weit über das hinaus, was wir uns hätten vorstellen können. Vielleicht ist es an der Zeit, diese Plattform unter staatliche Kontrolle zu bringen, um ihre Ausrichtung an den nationalen Interessen sicherzustellen."
 SOV_economic_mir: "Mir"
 SOV_economic_mir_desc: "Mir ist ein russisches elektronisches Zahlungssystem, das von der Zentralbank Russlands geschaffen wurde. Es bietet Finanzinstituten markengebundene Zahlungsprodukte, die für Kredit-, Debit- und andere Kartenprogramme genutzt werden, und stellt damit eine inländische Alternative zu internationalen Kartensystemen dar."
 SOV_economic_destiny_yandex: "Zukunft von Yandex"
 SOV_economic_destiny_yandex_desc: "Yandex begann als kleines Unternehmen und ist inzwischen zum dominierenden Akteur im russischen IT-Sektor geworden. Es ist nun so einflussreich, dass staatliche Beteiligung erforderlich sein könnte, um seine weitere Entwicklung zu lenken."
 SOV_economic_glonass: "GLONASS"
 SOV_economic_glonass_desc: "GLONASS ist Russlands Satellitennavigationssystem mit globaler Abdeckung. Als Alternative zum GPS-System bietet es präzise Positionsdienste, die für zivile und militärische Zwecke von entscheidender Bedeutung sind."
