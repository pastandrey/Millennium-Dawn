 SOV_cis_return_desc: "Trotz früherer Misserfolge beabsichtigen wir, die GUS als Union freier postsowjetischer Staaten wiederzubeleben."
 SOV_cis_reform: "Verhandlungen über Reformen"
 SOV_cis_reform_desc: "Die GUS muss reformiert werden, wenn wir vergangene Fehler nicht wiederholen und langfristigen Erfolg sichern wollen."
 SOV_cis_returning_members: "Auf neue Mitglieder zugehen"
 SOV_cis_returning_members_desc: "Einige Länder haben die GUS verlassen und betrachten sich nicht länger als Mitglieder. Wir planen, sie zurückzubringen."
 SOV_cis_new_member: "Neue GUS-Mitglieder"
 SOV_cis_new_member_desc: "Die GUS muss wachsen, indem sie jede ehemalige Sowjetrepublik einschließt, um die Union zu stärken."
 SOV_cis_unity_state: "GUS-Konföderation"
 SOV_cis_unity_state_desc: "Ursprünglich als Konföderation gedacht, wollen wir dieses Projekt allen GUS-Mitgliedern erneut vorschlagen – trotz möglicher Risiken."
 SOV_cis_military_forces: "Streitkräfte der GUS"
 SOV_cis_military_forces_desc: "Die GUS muss über moderne und starke Streitkräfte verfügen, und wir sind ihrem Wiederaufbau verpflichtet."
 SOV_kasyanov_economic_reform: "Großangelegte Wirtschaftsreformen"
 SOV_kasyanov_economic_reform_desc: "Trotz reichlicher Ressourcen stagniert unsere Wirtschaft. Wir werden die Beschränkungen der vorherigen Regierung beseitigen und das Wachstum wiederbeleben."
 SOV_kasyanov_infrastructure: "Großangelegtes Infrastrukturprogramm"
 SOV_kasyanov_infrastructure_desc: "Unsere Infrastruktur befindet sich in schlechtem Zustand. Wir müssen ein föderales Programm starten, um sie dringend zu modernisieren."
 SOV_kasyanov_human_capital: "Humankapital"
 SOV_kasyanov_human_capital_desc: "Die Bürger sind das Fundament des Staates, und wir werden massiv in ihr Wohlergehen und ihre Entwicklung investieren."
 SOV_kasyanov_far_east: "Föderales Fernostprogramm"
 SOV_kasyanov_far_east_desc: "Der Ferne Osten benötigt ernsthafte Investitionen. Wir werden ein spezielles föderales Programm zur Entwicklung der Region schaffen."
 SOV_kasyanov_militia: "Investitionen in die Landwirtschaft"
 SOV_kasyanov_militia_desc: "Landwirte müssen sich finanziell und rechtlich geschützt fühlen. Wir werden Reformen umsetzen, um die private Landwirtschaft zu verbessern."
 SOV_kasyanov_konkurentsia: "Mehr Befugnisse für das Kartellamt"
 SOV_kasyanov_konkurentsia_desc: "Der Föderale Antimonopoldienst wird stärkere Befugnisse erhalten, um illegale Marktaktivitäten zu bekämpfen."
 SOV_political_reforms: "Großangelegte politische Reform"
 SOV_political_reforms_desc: "Unser politisches System braucht grundlegende Veränderungen. Wir werden Reformen einleiten, um totalitäre Kontrolle zu beenden und das politische Leben wiederzubeleben."
 SOV_kasyanov_political: "Großes demokratisches Russland"
 SOV_kasyanov_happy_farmers_idea: "Staatliche Unterstützung für Landwirte"
 SOV_kasyanov_fas: "Föderaler Antimonopoldienst"
 SOV_kasyanov_anti_corruption_agency: "Unabhängige Anti-Korruptionsbehörde"
 sov_liberals.4.t: "[FROM.GetNameWithFlag] lädt uns in ein Bündnis ein"
 sov_liberals.4.d: "[FROM.GetNameWithFlag] lädt uns ein, ihrer Allianz freier unabhängiger Staaten beizutreten, die die Demokratie in der ehemaligen Sowjetunion und darüber hinaus verteidigen soll. Gemeinsam können wir unsere Verteidigung stärken, unsere Wirtschaft ausbauen und unseren geopolitischen Einfluss vergrößern. Eine Ablehnung bedeutet, in Konflikten auf wichtige Unterstützung zu verzichten und allein dazustehen. Die Wahl liegt bei uns: beitreten und kooperieren oder alleine handeln."
 sov_liberals.4.a: "Wir nehmen ihr Angebot an"
 sov_liberals.4.b: "Das ist nicht der richtige Zeitpunkt"
 sov_liberals.5.t: "[FROM.GetNameWithFlag] stimmt dem Beitritt zu unserem Bündnis zu"
 sov_liberals.5.d: "[FROM.GetNameWithFlag] hat unsere Einladung angenommen, der Allianz freier unabhängiger Staaten beizutreten! Sie stehen nun unter unserem Schutz."
 sov_liberals.5.a: "Ausgezeichnet!"
 sov_liberals.6.t: "[FROM.GetNameWithFlag] hat den Beitritt zu unserem Bündnis abgelehnt"
 sov_liberals.6.d: "[FROM.GetNameWithFlag] hat unsere Einladung zur Allianz freier unabhängiger Staaten abgelehnt."
 sov_liberals.6.a: "Das ist ihre Entscheidung."
 sov_liberals.6.b: "Wir lassen das nicht auf sich beruhen – wir werden mit Gewalt handeln!"
 sov_liberals.7.t: "[FROM.GetNameWithFlag] lädt uns in ein Bündnis ein"
 sov_liberals.7.d: "[FROM.GetNameWithFlag] lädt uns ein, ihrer Allianz freier unabhängiger Staaten beizutreten, um die Demokratie im postsowjetischen Raum und darüber hinaus zu verteidigen. Ein Beitritt wird unsere Verteidigung, Wirtschaft und unseren globalen Einfluss stärken. Eine Ablehnung birgt das Risiko der Isolation im Konfliktfall."
 sov_liberals.7.a: "Wir nehmen an"
 sov_liberals.7.b: "Momentan können wir nicht"
 sov_liberals.8.t: "[FROM.GetNameWithFlag] lädt uns in ein Bündnis ein"
 sov_liberals.8.d: "[FROM.GetNameWithFlag] lädt uns ein, ihrer Allianz freier unabhängiger Staaten beizutreten, die den Schutz der Demokratie in der ehemaligen Sowjetunion und weltweit zum Ziel hat. Gemeinsam können wir die Verteidigung stärken, die Wirtschaft entwickeln und den Einfluss ausweiten. Eine Ablehnung birgt das Risiko, im Konfliktfall Verbündete zu verlieren."
 sov_liberals.8.a: "Wir nehmen an"
 sov_liberals.8.b: "Jetzt nicht"
 sov_liberals.9.t: "[FROM.GetNameWithFlag] lädt uns in ein Bündnis ein"
 sov_liberals.9.d: "[FROM.GetNameWithFlag] lädt uns ein, ihrer Allianz freier unabhängiger Staaten beizutreten, die sich dem Schutz der Demokratie im postsowjetischen Raum und darüber hinaus widmet. Zusammenarbeit verspricht Verteidigungsstärke, Wirtschaftswachstum und geopolitischen Einfluss. Eine Ablehnung könnte uns isolieren."
 sov_liberals.9.a: "Wir nehmen an"
 sov_liberals.9.b: "Wir müssen vorerst ablehnen"
 sov_liberals.10.t: "[FROM.GetNameWithFlag] lädt uns in ein Bündnis ein"
 sov_liberals.10.d: "[FROM.GetNameWithFlag] lädt uns ein, ihrer Allianz freier unabhängiger Staaten beizutreten, um die Demokratie in der ehemaligen Sowjetunion und weltweit zu verteidigen. Ein Beitritt wird unsere Verteidigung, wirtschaftliche Entwicklung und internationale Stellung stärken. Eine Ablehnung birgt das Risiko, wichtige Unterstützung zu verlieren."
 sov_liberals.10.a: "Wir nehmen an"
 sov_liberals.10.b: "Wir lehnen vorerst ab"
 sov_liberals.11.t: "[FROM.GetNameWithFlag] lädt uns in die GUS ein"
 sov_liberals.11.d: "[FROM.GetNameWithFlag] versucht erneut, die GUS wiederzubeleben, und lädt uns zur Rückkehr ein. Mit einer demokratischeren Führung könnte die GUS zu einer echten Union unabhängiger Staaten werden statt zu einem Werkzeug des Moskauer Einflusses."
 sov_liberals.11.a: "Wir stimmen dem Wiedereintritt zu"
 sov_liberals.11.b: "Nein"
 sov_liberals.12.t: "[FROM.GetNameWithFlag] hat dem Beitritt zur GUS zugestimmt"
 sov_liberals.12.d: "[FROM.GetNameWithFlag] hat unsere Einladung zum Beitritt zur GUS angenommen, unsere Position gestärkt und gezeigt, dass das Projekt noch lebt."
 sov_liberals.12.a: "Gut"
 sov_liberals.13.t: "[FROM.GetNameWithFlag] hat den Beitritt zur GUS abgelehnt"
 sov_liberals.13.d: "[FROM.GetNameWithFlag] hat unser Angebot abgelehnt und nur geringes Interesse an einer Zusammenarbeit im postsowjetischen Raum gezeigt."
 sov_liberals.13.a: "Bedauerlich"
 sov_liberals.14.t: "[FROM.GetNameWithFlag] schlägt die Gründung einer GUS-Konföderation vor"
 sov_liberals.14.d: "[FROM.GetNameWithFlag] schlägt vor, die GUS zu einer Konföderation auszubauen und damit ihre Form der 1990er Jahre teilweise wiederherzustellen. Das würde zwar Vorteile bringen, birgt aber auch das Risiko, Autonomie zu verlieren, da Moskau wieder größere Kontrolle erlangen würde."
 sov_liberals.14.a: "Wir stimmen zu"
 sov_liberals.14.b: "Nein"
 sov_liberals.15.t: "[FROM.GetNameWithFlag] wurde Mitglied der GUS-Konföderation"
 sov_liberals.15.d: "[FROM.GetNameWithFlag] hat unterschrieben, gemeinsam mit uns der GUS-Konföderation beizutreten. Damit rücken wir einem nahezu geeinten Staat näher, und der Zusammenbruch der 1990er Jahre wirkt wie eine ferne Erinnerung."
 sov_liberals.15.a: "Gut"
 sov_liberals.16.t: "[FROM.GetNameWithFlag] hat die Mitgliedschaft in der GUS-Konföderation abgelehnt"
 sov_liberals.16.d: "[FROM.GetNameWithFlag] hat das Abkommen über die GUS-Konföderation abgelehnt und aus Empörung über den Souveränitätsverlust die GUS sofort verlassen."
 sov_liberals.16.a: "Bedauerlich"
 sov_liberals.17.t: "[FROM.GetNameWithFlag] schlägt die Schaffung von Streitkräften der GUS vor"
 sov_liberals.17.d: "[FROM.GetNameWithFlag] möchte die Streitkräfte der GUS für eine bessere Koordination unter den Mitgliedstaaten wiederbeleben. Das würde die militärische Stärke, aber auch den russischen Einfluss erhöhen."
 sov_liberals.17.a: "Wir stimmen zu"
 sov_liberals.17.b: "Nein"
 sov_liberals.18.t: "[FROM.GetNameWithFlag] stimmt der Teilnahme an den Streitkräften der GUS zu"
 sov_liberals.18.d: "[FROM.GetNameWithFlag] hat dem Beitritt zu den Streitkräften der GUS zugestimmt und die militärische Stärke der Union damit erheblich erhöht."
 sov_liberals.18.a: "Gut"
 sov_liberals.19.t: "[FROM.GetNameWithFlag] hat die Teilnahme an den Streitkräften der GUS abgelehnt"
 sov_liberals.19.d: "[FROM.GetNameWithFlag] hat den Beitritt zu den wiederbelebten Streitkräften der GUS abgelehnt und hält die derzeitige Mitgliedschaft für ausreichend."
 sov_liberals.19.a: "Bedauerlich"
 sov_liberals.20.t: "Unser Schicksal in der GUS"
 sov_liberals.20.d: "Mit dem Machtwechsel in Russland hält die neue Regierung nicht länger an den demokratischen Werten der Vergangenheit fest. Nun müssen wir entscheiden, ob wir in der GUS bleiben."
 sov_liberals.20.a: "Wir bleiben"
 sov_liberals.20.b: "Wir gehen"
 sov_liberals.21.t: "[FROM.GetNameWithFlag] verlässt die GUS"
 sov_liberals.21.d: "[FROM.GetNameWithFlag] ist mit der neuen russischen Regierung und ihrer Politik nicht einverstanden und hat ein Dekret zum Austritt aus der GUS und ihren Strukturen unterzeichnet."
 sov_liberals.21.a: "Bedauerlich"
 sov_liberals.22.t: "[FROM.GetNameWithFlag] bietet Investitionen in Kaliningrad an"
 sov_liberals.22.d: "[FROM.GetNameWithFlag] hat seine Politik gegenüber Kaliningrad geändert, die Region für ausländische Investitionen geöffnet und eine Zusammenarbeit vorgeschlagen."
 sov_liberals.22.a: "Wir stimmen zu"
 sov_liberals.22.b: "Nein"
 sov_liberals.23.t: "[FROM.GetNameWithFlag] hat Investitionen in das Gebiet Kaliningrad zugestimmt"
 sov_liberals.23.d: "[FROM.GetNameWithFlag] hat unseren Investitionsvorschlag angenommen und bereitet die endgültige Vereinbarung vor."
 sov_liberals.23.a: "Ausgezeichnet"
 sov_liberals.24.t: "[FROM.GetNameWithFlag] hat Investitionen in das Gebiet Kaliningrad abgelehnt"
 sov_liberals.24.d: "[FROM.GetNameWithFlag] hat unser Investitionsangebot abgelehnt und sieht darin offenbar keinen Vorteil für sich."
 sov_liberals.24.a: "Bedauerlich"
 sov_liberals.25.t: "Ergebnisse der Investitionen in die Region Kaliningrad"
 sov_liberals.25.d: "Wir haben mehreren europäischen Ländern Investitionsvorschläge für Kaliningrad unterbreitet, und die Ergebnisse sind vielversprechend."
 sov_liberals.25.a: "Okay"
 SOV_one_CIS_member_tt: "Mindestens §Yein anderes Land§! ist Mitglied der §2GUS§!"
