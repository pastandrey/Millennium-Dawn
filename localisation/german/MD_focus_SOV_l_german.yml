 SOV_azot_fertilizers_idea: "Zugang zu chemischen Düngemitteln"
 SOV_azot_fertilizers_idea_desc: "Chemische Düngemittel sind für gute Ernten unverzichtbar, besonders unter schwierigen klimatischen Bedingungen."
 SOV_azod_phosagro_idea: "PhosAgro-Düngemittel"
 SOV_azod_phosagro_idea_desc: "PhosAgro ist eine russische Chemieholding, die Düngemittel, Phosphate und Futterphosphate produziert. Das Unternehmen hat seinen Sitz in Moskau, und zu seinen Tochtergesellschaften gehört Apatit, ein im Gebiet Murmansk ansässiges Unternehmen, das Apatitgestein abbaut. Das Unternehmen ist Europas größter Hersteller phosphatbasierter Düngemittel."
 SOV_azod_phosagro_income: "Düngemittel PhosAgro"
 SOV_azod_phosagro_income_desc: "PhosAgro verkauft seine Produkte erfolgreich in viele Länder der Welt und bringt unserem Land gute Einnahmen aus dem Verkauf."
 SOV_michelin_idea: "Michelin"
 SOV_yokohama_idea: "Yokohama"
 SOV_nokian_idea: "Nokian"
 SOV_continental_idea: "Continental"
 SOV_pirelly_idea: "Pirelli"
 SOV_azot_fertilizers_income: "Düngemittel GrodnoAzot"
 SOV_azot_fertilizers_income_desc: "Grodno Azot verkauft seine Produkte erfolgreich in viele Länder der Welt und bringt unserem Land gute Einnahmen aus dem Verkauf."
 sov_economic.1.t: "Der Fall Chodorkowski"
 sov_economic.1.d: "Michail Chodorkowski wurde unter dem Verdacht auf umfangreichen Diebstahl und Korruption in seinem Ölunternehmen Yukos verhaftet. Er besitzt erheblichen Einfluss unter den Oligarchen und könnte eine Gefahr für die innere Stabilität darstellen. Obwohl es keine eindeutigen Beweise für seine Schuld gibt, müssen wir sorgfältig entscheiden, wie wir vorgehen. Diese Entscheidung könnte langfristige politische Folgen haben."
 sov_economic.1.a: "Schuldig!"
 sov_economic.1.b: "Er ist ein guter Geschäftsmann, kein Dieb!"
 sov_economic.2.t: "Der Prozess gegen Chodorkowski"
 sov_economic.2.d: "Nach einer schnellen Untersuchung ist es an der Zeit, über Chodorkowski zu urteilen. Wir müssen über die angemessene Strafe entscheiden. Unsere Entscheidung wird ein starkes Signal senden, wie wir mit hochrangigen Korruptionsfällen umgehen."
 sov_economic.2.a: "Steckt ihn ins Gefängnis!"
 sov_economic.2.b: "Eine Geldstrafe reicht aus."
 sov_economic.3.t: "Der Fall Gusinsky"
 sov_economic.3.d: "Wladimir Gusinsky, Geschäftsführer von Russlands größtem privaten Medienunternehmen NTV, wurde des schweren Betrugs beschuldigt und verhaftet. Er hat vorgeschlagen, seine gesamte Medienholding an die Regierung zu verkaufen und das Land zu verlassen. Sollten wir dieses Angebot annehmen, um weitere Komplikationen zu vermeiden?"
 sov_economic.3.a: "Kauft die Anteile und lasst ihn gehen."
 sov_economic.3.b: "Er ist unschuldig! Lasst ihn frei!"
 sov_economic.3.c: "Wir brauchen seine Medien nicht. Sperrt ihn ein!"
 sov_economic.4.t: "Fusion von Rosneft mit TNK"
 sov_economic.4.d: "Rosneft hat angeboten, mit seinem Hauptkonkurrenten TNK zu fusionieren. Dieser Schritt widerspricht den Prinzipien des freien Marktes, nützt jedoch der Regierung. Sollen wir diese Fusion trotz der Risiken genehmigen?"
 sov_economic.4.a: "Ja! Rosneft soll dominieren."
 sov_economic.4.b: "Nein! Schützt den freien Markt, TNK soll unabhängig bleiben."
 sov_economic.5.t: "Fusion von Gazprom mit Sibneft"
 sov_economic.5.d: "Gazprom plant die Übernahme von Sibneft, einem großen Ölunternehmen im Besitz von Roman Abramowitsch. Das bedroht zwar die Marktfreiheit, stärkt aber staatliche Konzerne. Sollen wir diesem Geschäft zustimmen?"
 sov_economic.5.a: "Genehmigt es! Sibneft gehört uns."
 sov_economic.5.b: "Lehnt es ab! Der freie Markt ist für Russland lebenswichtig."
 sov_economic.6.t: "Liquidation von RAO UES"
 sov_economic.6.d: "RAO UES war eine große Elektrizitäts-Holding, die den Großteil von Russlands Stromkapazitäten und Stromnetz kontrollierte. Nach den Reformen wurde dieses Unternehmen aufgelöst und durch viele kleinere Einheiten ersetzt. Das markiert eine neue Ära für den Energiesektor."
 sov_economic.6.a: "Zur Kenntnis genommen."
 sov_economic.7.t: "Nord Stream"
 sov_economic.7.d: "Russland schlägt den Bau der Gaspipeline Nord Stream vor. Dieses Projekt verspricht, unsere Wirtschaft und unseren Energiesektor erheblich zu stärken."
 sov_economic.7.a: "Zustimmen"
 sov_economic.7.b: "Ablehnen"
 sov_economic.8.t: "Eröffnung der Gaspipeline"
 sov_economic.8.d: "Unser Vorschlag zur Eröffnung einer Gaspipeline in ihr Land wurde angenommen. Das ist ein neuer Schritt in unserer wirtschaftlichen Zusammenarbeit."
 sov_economic.8.a: "Positive Entwicklung"
 sov_economic.9.t: "Eröffnung der Gaspipeline"
 sov_economic.9.d: "Unser Angebot zur Eröffnung einer Gaspipeline wurde abgelehnt, was einen unerwarteten Rückschlag darstellt. Wir müssen unsere Strategie überdenken."
 sov_economic.9.a: "Sie werden es bereuen"
 sov_economic.10.t: "Blue Stream"
 sov_economic.10.d: "Russland bietet den Bau der Blue-Stream-Gaspipeline an, die unsere Energieinfrastruktur und unser Wirtschaftswachstum verbessern wird."
 sov_economic.10.a: "Akzeptieren"
 sov_economic.10.b: "Ablehnen"
 sov_economic.11.t: "Turkish Stream"
 sov_economic.11.d: "Russland schlägt die Gaspipeline Turkish Stream vor. Dieses Projekt könnte unsere wirtschaftlichen Beziehungen und unsere Energiesicherheit erheblich verbessern."
 sov_economic.11.a: "Ja"
 sov_economic.11.b: "Nein"
 sov_economic.12.t: "Nord Stream 2"
 sov_economic.12.d: "Das Angebot zum Bau von Nord Stream 2 verspricht, unsere Wirtschaft durch verbesserte Energieexportkapazitäten zu stärken."
 sov_economic.12.a: "Genehmigen"
 sov_economic.12.b: "Ablehnen"
 sov_economic.13.t: "Investitionen in die russische Reifenindustrie"
 sov_economic.13.d: "Die russische Reifenindustrie kämpft ums Überleben und benötigt Investitionen. Die Regierung ist offen für unsere Beteiligung und erlaubt uns, vor unseren Konkurrenten ein Werk zu bauen."
 sov_economic.13.a: "Investieren"
 sov_economic.13.b: "Ablehnen"
 sov_economic.14.t: "Russische Reifenindustrie"
 sov_economic.14.d: "Die Regierung hat zugestimmt, in unsere Reifenindustrie zu investieren, was neue Chancen für Wachstum und Modernisierung eröffnet."
 sov_economic.14.a: "Gute Nachrichten"
 sov_economic.15.t: "Russische Reifenindustrie"
 sov_economic.15.d: "Die Regierung hat es abgelehnt, in unsere Reifenindustrie zu investieren. Das ist ein Rückschlag, der Fortschritt und Wettbewerbsfähigkeit bremsen könnte."
 sov_economic.15.a: "Enttäuschend"
 sov_economic.16.t: "Russland schlägt ein Handelsabkommen über chemische Düngemittel vor."
 sov_economic.16.d: "Russland hat uns einen Exklusivvertrag für hochwertige chemische Düngemittel angeboten. Die Annahme dieses Geschäfts könnte unsere landwirtschaftlichen Erträge erheblich steigern, auch wenn manche die politischen Folgen hinterfragen könnten."
 sov_economic.16.a: "Annehmen"
 sov_economic.16.b: "Vorläufig ablehnen"
 sov_economic.17.t: "[From.GetName] akzeptiert"
 sov_economic.17.d: "Unsere Verhandlungen mit [From.GetName] waren erfolgreich. Der Vertrag ist unterzeichnet, und die erste Zahlung wird bald erwartet. Das ist ein positiver Schritt nach vorn."
 sov_economic.17.a: "Endlich gute Nachrichten."
 sov_economic.18.t: "[From.GetName] lehnt unser Angebot ab."
 sov_economic.18.d: "Unser Geschäft mit [From.GetName] ist gescheitert. Wir erhielten keine Antwort, und die Aussichten sind schlecht. Wir müssen unser Vorgehen überdenken."
 sov_economic.18.a: "Frustrierender Rückschlag."
 sov_economic.19.t: "Russland schlägt ein Handelsabkommen über chemische Düngemittel vor."
 sov_economic.19.d: "Russland bot einen Exklusivvertrag für hochwertige chemische Düngemittel an. Dieses Geschäft verspricht höhere Ernteerträge, könnte aber bei einigen Parteien politische Bedenken auslösen."
 sov_economic.19.a: "Angebot annehmen."
 sov_economic.19.b: "Vorläufig ablehnen."
 sov_economic.20.t: "[From.GetName] akzeptiert"
 sov_economic.20.d: "Das Geschäft mit [From.GetName] ist abgeschlossen. Der Vertrag ist unterzeichnet und die Zahlungen werden bald beginnen, was einen bedeutenden Erfolg darstellt."
 sov_economic.20.a: "Großartige Nachrichten."
 sov_economic.21.t: "[From.GetName] lehnt unser Angebot ab."
 sov_economic.21.d: "Die Verhandlungen mit [From.GetName] sind ohne Antwort ins Stocken geraten. Das Geschäft scheint vorerst vom Tisch zu sein."
 sov_economic.21.a: "Enttäuschende Ablehnung."
 SOV_economy_category: "Russische Wirtschaft"
 SOV_economy_category_desc: "[SOV.GetFlag]§YDie russische§! Wirtschaft befindet sich derzeit in schwierigen Zeiten. Wir müssen nicht nur das Erbe der Vergangenheit wiederbeleben, sondern auch zu den führenden Volkswirtschaften der Welt aufsteigen.\nUm die nationale Idee der §Rzerrütteten Wirtschaft§! zu entfernen, ist es notwendig, §GSchwerpunkte§! im §Ywirtschaftlichen Zweig§! zu §Gabschließen§!. Je mehr £text_icon_sov_ruble §YWirtschaftliche Erholung§! wir haben, desto schneller werden wir diesen §RMalus§! §Gentfernen§!.\n£text_icon_sov_ruble §YKapitalisierung§!: Die größten Unternehmen in [SOV.GetFlag]§YRussland§! besitzen eine £text_icon_sov_ruble §YKapitalisierung§!, die in ihrem Panel angezeigt wird. Sie verändert sich ständig aufgrund verschiedener Faktoren: Erwerb neuer Vermögenswerte in Russland und im Ausland, hohe oder niedrige Korruption, Krieg, Wirtschaftswachstum usw.\nWenn §RKommunisten§! an der §YMacht§! sind, wird die £text_icon_sov_ruble §YKapitalisierung§! nicht mehr aktualisiert oder verändert.\nWenn §2Oligarchen§! an der Macht sind, wird die £text_icon_sov_ruble §YKapitalisierung§! der Unternehmen erheblich §Rverringert§!."
