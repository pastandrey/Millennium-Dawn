 SOV_referendum_in_kuban: "Projekt der [KUB.GetFlag]Kuban-Republik"
 SOV_referendum_in_kuban_desc: "Die Kuban-Republik war ein historisches Gebilde während des Russischen Bürgerkriegs. Heute erwägen wir, ihre Autonomie erneut auszuweiten – zum wirtschaftlichen Vorteil sowohl der Region als auch Russlands."
 SOV_referendum_in_ural: "Projekt der [URA.GetFlag]Ural-Republik wiederbeleben"
 SOV_referendum_in_ural_desc: "Die Ural-Republik wurde einst von Gouverneur Eduard Rossel vorgeschlagen, um der Region den gleichen Status wie nationalen Republiken zu verleihen. Obwohl das Projekt rechtlich blockiert wurde, lebt die Idee bis heute fort."
 ukraha_rebellion: "In der Ukraine gab es einen Maidan"
 SOV_finish_chechnya_idea: "Siegreicher Marsch auf Tschetschenien"
 SOV_paid_cons_tt: "Zusätzliches Einkommen: $§G0.015§! pro 10 Millionen Menschen durch die §YFreigekauften Wehrpflichtigen§!\n"
 SOV_party_earnings_tt: "Zusätzliches Einkommen: $$§G0.300§! aus den §YParteieinnahmen§!\n"
 SOV_bumaga: "Vereint nur auf dem Papier"
 SOV_bumaga_desc: "Obwohl die LDPR an der Macht ist, bestehen weiterhin interne Spaltungen, die den Zusammenhalt der Partei untergraben. Trotz des formalen Auftretens agieren die verschiedenen Fraktionen in unterschiedliche Richtungen. Es ist an der Zeit, unsere Partei endlich zu einen und die internen Konflikte beizulegen, um eine starke und einheitliche Front zu bilden."
 SOV_jirik_partiya: "Schirinowskis Partei"
 SOV_jirik_partiya_desc: "Schirinowskis Partei steht geschlossen hinter ihrem Vorsitzenden. Loyalität und Disziplin haben den Kern der Partei gefestigt und ermöglichen es ihr, ihre nationalistische Agenda mit Überzeugung zu verfolgen. Diese Einheit stärkt unsere Position in der russischen Politiklandschaft."
 SOV_jirik_partiya_jirinovci: "Bringt die Treuen näher heran."
 SOV_jirik_partiya_jirinovci_desc: "Wir müssen die engagiertesten und loyalsten Mitglieder gewinnen, die Befehle ohne Zögern befolgen. Diese standhaften Unterstützer bilden das Rückgrat unserer Partei und sind bereit, im Bedarfsfall entschlossen zu handeln. Die Stärkung der Loyalität ist für unser Überleben unerlässlich."
 SOV_jirik_partiya_chistki: "Parteisäuberungen"
 SOV_jirik_partiya_chistki_desc: "Es ist an der Zeit, die Partei von Freidenkern und potenziellen Verrätern zu säubern, die unsere Einheit gefährden. Durch die Entfernung von Andersdenkenden gewährleisten wir eine disziplinierte und gehorsame Organisation. Diese Säuberung ist unerlässlich für unsere politische Zukunft."
 SOV_jirik_partiya_puppet_sovet: "Der Marionetten-Oberste Rat"
 SOV_jirik_partiya_puppet_sovet_desc: "Der Oberste Rat darf lediglich als unser Sprachrohr dienen und darf keine wirkliche Autonomie oder Macht besitzen. Durch die Unterordnung dieses Gremiums verhindern wir Herausforderungen der Führung und sichern die absolute Kontrolle über Parteientscheidungen."
 SOV_jirik_partiya_young: "Militarisierung des Jugendflügels"
 SOV_jirik_partiya_young_desc: "Die Jugend muss auf den bevorstehenden Konflikt vorbereitet werden, denn die friedlichen Zeiten gehen zu Ende. Die Ausbildung und Militarisierung junger Parteimitglieder wird eine neue Generation hervorbringen, die bereit ist, unsere Ideale zu verteidigen. Diese Fokussierung auf die Jugend ist entscheidend für unsere langfristige Stärke."
 SOV_jirik_partiya_total_control: "Totale Kontrolle"
 SOV_jirik_partiya_total_control_desc: "Unsere Partei muss vollständig unter unserer Kontrolle stehen, um jegliche Rebellion oder unautorisierte Aktionen zu verhindern. Die absolute Dominanz über alle Parteifunktionen gewährleistet Effizienz und Loyalität. Nur durch totale Kontrolle können wir unsere Ziele erreichen."
 SOV_jirik_partiya_and: "Schirinowski und die Partei"
 SOV_jirik_partiya_and_desc: "Die Macht der Partei ruht nicht allein auf ihrem Vorsitzenden; sie ergänzt und unterstützt ihn. Diese symbiotische Beziehung ermöglicht eine koordinierte Führung und breite Unterstützung über verschiedene Parteiflügel hinweg. Gemeinsam bilden sie eine geeinte Kraft."
 SOV_jirik_partiya_and_samodeal: "Selbstaktivität fördern"
 SOV_jirik_partiya_and_samodeal_desc: "Wir werden Eigeninitiative und selbstständiges Handeln innerhalb der Partei fördern. Indem wir die Mitglieder ermutigen, Verantwortung zu übernehmen und proaktiv zu handeln, stärken wir unsere Bewegung von innen heraus. Dieser Ansatz trägt zum Aufbau einer widerstandsfähigeren Organisation bei."
 SOV_jirik_partiya_and_kadres: "Pragmatischer Ansatz im Personalwesen"
 SOV_jirik_partiya_and_kadres_desc: "Statt blinde Loyalität zu fordern, suchen wir die fähigsten und effektivsten Mitarbeiter für die Partei. Kompetenz und Ergebnisse haben Vorrang vor bloßer Hingabe und gewährleisten so eine stärkere und effizientere Führung."
 SOV_jirik_partiya_and_sovet: "Den Obersten Rat stärken"
 SOV_jirik_partiya_and_sovet_desc: "Der Oberste Rat sollte beweisen, dass Schirinowski kein Diktator ist und dass die Partei eine Meinungsvielfalt zulässt. Durch die Stärkung dieses Gremiums demonstrieren wir das Bekenntnis der Partei zu innerparteilicher Debatte und gemeinsamer Führung."
 SOV_jirik_partiya_and_money: "Zusätzliche Einnahmen"
 SOV_jirik_partiya_and_money_desc: "Wir werden die Parteieinnahmen durch verschiedene Quellen ausbauen, um unsere Aktivitäten effektiver zu finanzieren. Die Erhöhung der finanziellen Mittel ist unerlässlich, um unseren Einfluss zu vergrößern und langfristige Kampagnen zu gewährleisten. Die Diversifizierung der Einnahmequellen hat strategische Priorität."
 SOV_jirik_partiya_and_autonomous: "Die Autonome Partei"
 SOV_jirik_partiya_and_autonomous_desc: "Eine autonome Partei gewährleistet Meinungsfreiheit und Vielfalt in ihren Reihen. Die Gewährung interner Unabhängigkeit fördert Innovation und Debatte, was unsere politische Plattform und Anpassungsfähigkeit stärkt."
 SOV_alliance_armenia: "Ende Aserbaidschan"
 SOV_alliance_armenia_desc: "Die Geschichtsfälschung Aserbaidschans behindert unser brüderliches Armenien. Wir werden dieses Hindernis überwinden, um Armeniens Sicherheit und Wohlstand zu gewährleisten."
 SOV_south_azer_admistration: "Das iranische Gouvernement"
 SOV_south_azer_admistration_desc: "Wir beabsichtigen, uns treu ergebene lokale Kräfte in Südaserbaidschan zu unterstützen, um einen Aufstand zu entfachen, der den iranischen Einfluss schwächen soll. Diese Strategie zielt darauf ab, die iranische Herrschaft zu destabilisieren und unseren Einfluss auszuweiten."
 SOV_nov: "Noworossija zurückholen"
 SOV_nov_desc: "Es ist an der Zeit, Noworossija an seinen rechtmäßigen Platz in unserem Imperium zurückzuführen. Die Wiederherstellung dieser Region stärkt unsere Südgrenzen und belebt unser historisches Erbe."
 SOV_galicia: "Gouvernement Galizien"
 SOV_galicia_desc: "Galizien ist eine besondere Region, die umfassende Reformen für eine vollständige Integration in unser Imperium benötigt. Auch wenn dies Zeit braucht, wird Galizien letztlich den Status eines Gouvernements erhalten und zu einem loyalen Teil unseres Reiches werden."
 SOV_help_sirya: "Die syrischen Brüder"
 SOV_help_sirya_desc: "Wir beabsichtigen, unseren Einfluss in Syrien auszubauen, einem Land, das von westlichen Globalisten ins Visier genommen wurde, die seine Zerstörung anstreben. Die Unterstützung Syriens schützt unsere strategischen Interessen und wirkt feindlichen Kräften entgegen."
 SOV_zhirinovsky_attack_ukraha: "Militäroperation in der Ukraine"
 SOV_zhirinovsky_attack_ukraha_desc: "Unser Ziel ist es, die Existenz der Ukraine als unabhängiger Staat zu beenden. Es ist Zeit, dass die russische Flagge wieder über Kiew weht und unsere historische Kontrolle wiederhergestellt wird."
 SOV_question_of_bavaria: "Bayerischer Separatismus"
 SOV_question_of_bavaria_desc: "Wir unterstützen den Wunsch Bayerns, sich von Deutschland abzuspalten. Die Förderung separatistischer Bestrebungen wird Deutschland schwächen und unseren strategischen Interessen in der Region dienen."
 SOV_question_of_east_german: "Die DDR in Erinnerung rufen"
 SOV_question_of_east_german_desc: "Wir werden die Menschen in Ostdeutschland an die stolze Geschichte der DDR erinnern. Die Wiederbelebung dieses Erbes dient unseren breiteren politischen Zielen und unserem regionalen Einfluss."
 SOV_europe_pizda: "Vorbereitung auf den Marsch nach Europa"
 SOV_europe_pizda_desc: "Die Zeit ist gekommen, die europäische Bedrohung zu beseitigen. Wir werden Europa von innen untergraben und seine Macht vollständig brechen. Diese Kampagne markiert den Beginn unseres entscheidenden Vorstoßes nach Europa."
 SOV_question_of_spain: "Geteiltes Spanien"
 SOV_question_of_spain_desc: "Spanien hat seine autonomen Regionen lange im Gleichgewicht gehalten, um den Separatismus einzudämmen. Wir beabsichtigen, dieses Gleichgewicht zu stören, um Spanien zu schwächen und regionale Spaltungen zu fördern. Diese Strategie wird die Einheit Spaniens zerschlagen."
 SOV_question_of_germany: "Das deutsche Problem"
 SOV_question_of_germany_desc: "Deutschland bleibt ein zentraler strategischer Rivale. Wir beabsichtigen nicht länger, Nachsicht zu zeigen wie in früheren Jahrhunderten. Die Lösung des deutschen Problems ist entscheidend, um unsere Vorherrschaft in Europa zu sichern."
 SOV_crusade_russian: "Der russische Kreuzzug"
 SOV_crusade_russian_desc: "Es ist Zeit, unseren großen russischen Kreuzzug ins Heilige Land zu beginnen. Was frühere Kaiser nicht erreichen konnten, werden wir mit Entschlossenheit und Stärke vollenden. Diese Mission erneuert unseren geistigen und imperialen Auftrag."
 SOV_crusade_antioch: "Gouvernement Antiochia"
 SOV_crusade_antioch_desc: "Diese Ländereien gehörten einst zum Königreich Antiochia, und wir werden sie wiederherstellen. Die Wiederbelebung dieses Gouvernements stellt unsere Präsenz wieder her und ehrt historische Ansprüche."
 SOV_crusade_assiryan: "Assyrisches Gouvernement"
 SOV_crusade_assiryan_desc: "Das heutige Syrien ist nur ein Schatten des großen assyrischen Reiches. Wir werden die Syrer unter russischer Herrschaft zurück zu alter Größe führen und ihre frühere Macht und ihr Ansehen wiederherstellen."
 SOV_crusade_isr: "Gouvernement Jerusalem"
 SOV_crusade_isr_desc: "Jerusalem ist das endgültige Ziel unserer Kampagne. Das Heilige Grab wird von nun an uns gehören und unseren geistlichen und politischen Einfluss in der Region festigen."
 SOV_crusade_egy: "Koptisches Gouvernement"
 SOV_crusade_egy_desc: "Die Kopten sind die wahren Herrscher Ägyptens. Wir werden ihre Sache unterstützen und alles tun, um ihnen zu helfen, ihre rechtmäßige Stellung innerhalb unseres Imperiums zurückzuerlangen."
 SOV_romanian_shit: "Rumänische Bedrohung"
 SOV_romanian_shit_desc: "Rumänien bedroht unsere südwestlichen Grenzen. Wir müssen dieses Problem rasch lösen, um unsere Grenzlinien zu sichern und die regionale Stabilität zu wahren."
 SOV_treaty_with_afganistan: "Zurück nach Afghanistan"
 SOV_treaty_with_afganistan_desc: "Unser Imperium hat erneut die Grenzen Afghanistans erreicht. Vielleicht wird uns diesmal das Glück hold sein und wir werden die Kontrolle über diese strategische Region zurückgewinnen."
 SOV_allied_nrk: "Bündnis mit Nordkorea"
 SOV_allied_nrk_desc: "Wir wollen unseren Einfluss im Osten stärken, indem wir unsere Bündnisse ausbauen – beginnend mit einer Nation, deren Volk unsere Unterstützung für seine Existenz anerkennt. Diese Partnerschaft wird unsere Position in der Region festigen."
 SOV_return_kgb: "Den KGB wiederherstellen"
 SOV_return_kgb_desc: "Die gegenwärtigen Geheimdienste sind nur eine schwache Nachahmung des sowjetischen KGB, der am wirksamsten war. Wir werden den KGB wiederbeleben, um Stärke und Sicherheit wiederherzustellen."
 SOV_storm_v: "Gefangene in den Krieg schicken"
 SOV_storm_v_desc: "Gefangene belasten die öffentlichen Ressourcen, ohne etwas beizutragen. Nun werden sie für ihr Land kämpfen und ihre Schuld durch Dienst an der Waffe begleichen."
 SOV_new_russian_army: "Russische Freiwilligenarmee"
 SOV_new_russian_army_desc: "Unsere Streitkräfte benötigen tiefgreifende Reformen. Das derzeitige System hat versagt, und es ist an der Zeit, eine Freiwilligenarmee zu schaffen, die Russland mit neuem Elan verteidigt."
 SOV_women: "Frauenbataillone"
 SOV_women_desc: "Unsere Frauenbataillone werden dem Feind Angst einjagen. Ihre bloße Anwesenheit wird die Gegner in Panik fliehen lassen."
 SOV_kazachestvo: "Die Kosaken militarisieren"
 SOV_kazachestvo_desc: "Die Kosaken müssen ihr zügelloses Verhalten beenden und wieder zu einem disziplinierten Teil des russischen Militärs werden."
 SOV_war_kafedra: "Militärabteilungen wiederherstellen"
 SOV_war_kafedra_desc: "Die Abschaffung der Militärabteilungen war ein schwerer Fehler. Wir werden sie wieder einführen, um unsere Armee und die militärische Ausbildung zu stärken."
 SOV_nationalize: "Die Ergebnisse der Privatisierung überprüfen"
 SOV_nationalize_desc: "Wir werden die zerstörerischen Folgen der Privatisierung neu bewerten und ihre schädlichen Ergebnisse rückgängig machen, um nationale Interessen zu schützen."
 SOV_minister_propaganda: "Ein Propagandaministerium schaffen"
 SOV_minister_propaganda_desc: "Die Propaganda muss unter einem eigenen Ministerium zentralisiert werden, um die vollständige Kontrolle und Wirksamkeit aller Botschaften sicherzustellen."
 SOV_pay_off_army: "Möglichkeit, sich vom Militär freizukaufen"
 SOV_pay_off_army_desc: "Wir werden Einzelpersonen erlauben, gegen eine hohe Gebühr dem Militärdienst zu entgehen; diese Mittel werden wieder in die Stärkung der Armee investiert."
 SOV_jirik_cult: "Der Kult um Schirinowski"
 SOV_jirik_cult_desc: "Schirinowski ist zu einer Ikone unseres Staates geworden. Das Volk hat einen Kult um ihn geschaffen, und wir werden zulassen, dass dieser weiter wächst."
 SOV_fuck_parties: "Zur Hölle mit der Demokratie"
 SOV_fuck_parties_desc: "Demokratie ist ein Werkzeug westlicher Geheimdienste, um Propaganda zu verbreiten. Wir werden keinen feindlichen Einfluss auf unserem Boden zulassen."
 SOV_jirik_fear: "Der Polizeistaat"
 SOV_jirik_fear_desc: "Feinden des Vaterlandes wird keine Gnade gezeigt. Unsere Polizei hat eine schwere Aufgabe, um die Ordnung aufrechtzuerhalten."
 SOV_jirik_stand: "Das Vaterland steht über allem"
 SOV_jirik_stand_desc: "Die Verteidigung des Vaterlandes ist die Pflicht jedes Bürgers. Selbst Zivilisten sollen bereit sein, ihr Land mit unerschütterlichem Mut zu schützen."
 SOV_jirik_warlord: "Der oberste Herrscher"
 SOV_jirik_warlord_desc: "Vorwärts in eine strahlende Zukunft für ein großes und mächtiges Russland!"
