l_german:
 russia_focus: "Russischer Fokusbaum"
 SOV_reign_of_yeltsin: "Die Ära Boris Jelzins"
 SOV_reign_of_yeltsin_desc: "Boris Jelzin war von 1991 bis 1999 der erste Präsident der neu gegründeten Russischen Föderation, dem Nachfolgestaat der UdSSR. Seine Amtszeit war geprägt von schweren wirtschaftlichen Problemen und einem verheerenden Krieg in Tschetschenien. Am 31. Dezember 1999 übergab er sein Amt an Premierminister Wladimir Putin."
 SOV_groznyy_offensive: "Offensive auf Grosny"
 SOV_groznyy_offensive_desc: "Der Zweite Tschetschenienkrieg begann im August 1999, als tschetschenische Kämpfer aus dem de facto unabhängigen Ichkeria in das benachbarte Dagestan eindrangen. Der Gegenangriff des russischen Militärs führte zur Belagerung von Grosny, dessen Fall bis Ende Januar oder Anfang Februar erwartet wird."
 SOV_putin: "Wladimir Putin"
 SOV_putin_desc: "Wladimir Putin, geboren in Leningrad, ist ein ehemaliger Geheimdienstoffizier des KGB, der kurzzeitig als Direktor des FSB und Sekretär des Sicherheitsrates diente, bevor er im August 1999 zum Premierminister ernannt wurde. Aufgrund seiner Erfahrung im Auslandsgeheimdienst gilt Putin als eine der fähigsten – wenn nicht die einflussreichste – Persönlichkeiten, um Russland in diesen turbulenten Zeiten zu führen."
 SOV_the_grand_bargain: "Der große Kompromiss"
 SOV_the_grand_bargain_desc: "Russland befindet sich derzeit im Griff der Oligarchen. Wenn wir echte Macht im Land erlangen wollen, müssen wir ihnen ein Angebot machen, das sie nicht ablehnen können."
 SOV_putinism: "Putinismus"
 SOV_putinism_desc: "Obwohl Wladimir Putin keine formelle Ideologie besitzt, ist seine Herrschaft durch die Dominanz von Oligarchen und ehemaligen Militär- und Sicherheitsbeamten – den sogenannten Silowiki – geprägt. Dieses Regierungsmodell wird als „Putinismus“ bezeichnet und betont Kontrolle, Loyalität und staatliche Autorität."
 SOV_found_rosatom: "Rosatom gründen"
 SOV_found_rosatom_desc: "Rosatom ist der staatliche Atomenergiekonzern, der Russlands nuklear-industriellen Komplex beaufsichtigt."
 SOV_empower_siloviki: "Die Silowiki stärken"
 SOV_empower_siloviki_desc: "Der Begriff „Silowiki“ bezeichnet ehemalige Militär- und Geheimdienstoffiziere, die in die Politik gewechselt sind. Indem wir sie stärken, sichern wir innere Geschlossenheit und Entscheidungsprozesse, die von gemeinsamen Werten und Disziplin geprägt sind."
 SOV_remove_guzinsky: "Gusinsky ausschalten"
 SOV_remove_guzinsky_desc: "Der Medienmogul Wladimir Gusinsky weigert sich, mit der Regierung und den Oligarchen zusammenzuarbeiten, und muss deshalb ausgeschaltet werden."
 SOV_delay_sibirneft_merger: "Fusion mit Sibneft verzögern"
 SOV_delay_sibirneft_merger_desc: "Die geplante Fusion von Yukos und Sibneft wurde durch konstruierte Vorwürfe gegen Chodorkowski blockiert, um dessen Kontrolle zu verhindern."
 SOV_gen_3_nuclear_plants: "Generation-III+-Kernreaktoren"
 SOV_gen_3_nuclear_plants_desc: "Generation-III+-Kernreaktoren sind weiterentwickelte Versionen früherer Designs und bieten höhere Sicherheit sowie größere Effizienz im Betrieb. Sie wurden in den 1990er Jahren entwickelt und repräsentieren die Zukunft einer stabilen und sauberen Energieversorgung für Russland."
 SOV_khodorkovsky_case: "Der Fall Chodorkowski"
 SOV_khodorkovsky_case_desc: "Angesichts von Korruptions- und Steuerhinterziehungsvorwürfen wird Chodorkowski seine Beteiligungen an Yukos Oil voraussichtlich verlieren."
 SOV_revision_6: "Revision Nummer 6"
 SOV_revision_6_desc: "Revision Nummer 6 ist ein weitreichendes Überwachungsgesetz, das der Regierung volle Befugnisse zur Kontrolle von Kommunikationssystemen im ganzen Land einräumt. Obwohl es umstritten ist, wird es als Maßnahme zur nationalen Sicherheit gerechtfertigt."
 SOV_state_corporatism: "Staatskorporatismus"
 SOV_state_corporatism_desc: "Viele der größten russischen Unternehmen werden von Personen mit engen Verbindungen zur Regierung geführt. Durch die Verschmelzung von staatlicher und wirtschaftlicher Macht können wir Ineffizienzen beseitigen und wirtschaftliche Aktivitäten stärker an nationalen Zielen ausrichten."
 SOV_seize_yukos_oil: "Yukos Oil beschlagnahmen"
 SOV_seize_yukos_oil_desc: "Nachdem Chodorkowski ausgeschaltet ist, können wir Yukos Oil übernehmen und dessen Vermögenswerte an loyale Akteure umverteilen."
 SOV_khodorkovsky_trial: "Die Chodorkowski-Prozesse"
 SOV_khodorkovsky_trial_desc: "Nachdem wir ausreichend Beweise gesammelt haben, werden wir mit dem Prozess gegen Chodorkowski fortfahren, auch wenn das Ergebnis bereits feststeht."
 SOV_join_wto: "Der WTO beitreten"
 SOV_join_wto_desc: "Der Beitritt zur Welthandelsorganisation wird uns stärker in die Weltwirtschaft integrieren und unserem Volk Wohlstand bringen."
 SOV_subjects: "Subjekte der Föderation"
 SOV_subjects_desc: "Wir wollen klarere und strukturiertere Beziehungen zu den Föderationssubjekten schaffen. Dadurch wird eine bessere wirtschaftliche Koordination und stärkere politische Kohäsion in allen Regionen erreicht."
 SOV_referendum_in_chechnya: "Referendum in Tschetschenien"
 SOV_referendum_in_chechnya_desc: "Tschetschenien ist kulturell und politisch vom restlichen Russland verschieden. Der einzige Weg zum Frieden besteht darin, die Bevölkerung selbst entscheiden zu lassen – vollständige Integration in die Russische Föderation oder ein gewisses Maß an Autonomie."
 SOV_referendum_in_bashkiria: "Status von [BSH.GetNamewithFlag]"
 SOV_referendum_in_bashkiria_desc: "Wir werden unsere Verfassung und unseren Rechtsrahmen an jene von [BSH.GetNamewithFlag] angleichen. Dies ist ein entscheidender Schritt hin zu einheitlicher Regierungsführung und administrativer Klarheit."
 SOV_referendum_in_tatarstan: "Status von [TAT.GetNamewithFlag]"
 SOV_referendum_in_tatarstan_desc: "Wir werden unsere Verfassung und unseren Rechtsrahmen an jene von [TAT.GetNamewithFlag] angleichen. Die Angleichung dieser Dokumente gewährleistet Einheitlichkeit innerhalb der Föderation."
 SOV_referendum_in_khmao: "Status von [KHM.GetNamewithFlag]"
 SOV_referendum_in_khmao_desc: "Wir werden unsere Rechtsordnung an jene von [KHM.GetNamewithFlag] angleichen, um eine bessere Integration und Verwaltung zu gewährleisten. Diese rechtliche Vereinheitlichung wird Spannungen verringern und dazu beitragen, die Regierungsführung in allen Regionen zu standardisieren."
 SOV_referendum_in_crimea: "Status von [CRM.GetNamewithFlag]"
 SOV_referendum_in_crimea_desc: "Wir werden unsere Verfassung und unsere Gesetze an jene von [CRM.GetNamewithFlag] angleichen und damit seinen Platz innerhalb der Föderation festigen. Rechtliche Klarheit ist entscheidend für langfristige Stabilität und Legitimität."
 SOV_the_putinka: "Die Putinka"
 SOV_the_putinka_desc: "Die alten Chruschtschowkas werden durch ein neues Wohnmodell ersetzt – die Putinka. Modern, geräumig und langlebiger markieren diese Gebäude eine neue Ära der russischen Stadtentwicklung."
 SOV_sign_bologna_accords: "Bologna-Abkommen unterzeichnen"
 SOV_sign_bologna_accords_desc: "Der Bologna-Prozess ist eine europäische Vereinbarung zur Standardisierung der Hochschulbildung. Durch die Unterzeichnung der Abkommen passen wir uns internationalen Bildungsstandards an."
 SOV_enforce_oligarchs_control: "Kontrolle über die Oligarchen durchsetzen"
 SOV_enforce_oligarchs_control_desc: "Oligarchen mögen Einfluss besitzen, doch eine direkte Kontrolle durch den Staat ist weitaus wirksamer. Indem wir zeigen, dass der Staat die stärkere Kraft ist, können wir ein stabiles System staatlich geführter Unternehmen schaffen, das dem ganzen Land zugutekommt."
 SOV_2011_healthcare_reforms: "Gesundheitsreformen von 2011"
 SOV_2011_healthcare_reforms_desc: "Die Gesundheitsreformen von 2011 wurden von Premierminister Wladimir Putin vorgeschlagen. Sie stellten über 300 Milliarden Rubel zur Verbesserung des Gesundheitswesens in ganz Russland bereit, mit dem Ziel, Zugang und Qualität für alle Bürger zu erhöhen."
 SOV_npp: "Nationale Prioritätsprojekte"
 SOV_npp_desc: "Seit dem Zusammenbruch der Sowjetunion sind die Lebensstandards in Russland gesunken. Im Jahr 2005 wurden die Nationalen Prioritätsprojekte ins Leben gerufen, um Gesundheitswesen, Bildung, Wohnungsbau und Landwirtschaft zu verbessern. Diese Projekte sollen zentrale Bereiche des täglichen Lebens revitalisieren und die Nation von Grund auf stärken."
 SOV_mitigate_financial_crisis: "Die Finanzkrise abmildern"
 SOV_mitigate_financial_crisis_desc: "Die weltweite Rezession von 2008 trifft Russland ebenso wie den Rest der Welt. Wir müssen entschlossene Maßnahmen ergreifen, um unsere Wirtschaft zu schützen und die Fortschritte seit dem Zusammenbruch der Sowjetunion zu bewahren."
 SOV_develop_it_industry: "IT-Industrie ausbauen"
 SOV_develop_it_industry_desc: "Russlands IT-Sektor liegt Jahrzehnte hinter seinen westlichen Gegenstücken zurück. Wir brauchen innovative Führungspersönlichkeiten und Unternehmen wie Steve Jobs, Bill Gates, Google, Microsoft, Apple und Facebook, um unsere Technologie voranzubringen."
 SOV_renewable_energy_investments: "Investitionen in erneuerbare Energien"
 SOV_renewable_energy_investments_desc: "Unsere Öl- und Gasressourcen sind begrenzt, und der Klimawandel stellt eine ernste Bedrohung dar. Investitionen in erneuerbare Energien werden unsere Abhängigkeit von Kohlenwasserstoffen verringern und Russland dabei helfen, zu einem weltweiten Vorreiter in sauberer Energietechnologie zu werden."
 SOV_commercialize_glonass: "GLONASS kommerzialisieren"
 SOV_commercialize_glonass_desc: "GLONASS ist Russlands Satellitennavigationssystem und stellt eine Alternative zu GPS dar. Eine Ausweitung seiner kommerziellen Nutzung wird unsere technologische Unabhängigkeit stärken und neue wirtschaftliche Chancen eröffnen."
 SOV_increase_roscosmos_funding: "Roskosmos-Finanzierung erhöhen"
 SOV_increase_roscosmos_funding_desc: "Roskosmos, Erbe des sowjetischen Raumfahrtprogramms, ist Russlands wichtigste Raumfahrtbehörde. Eine Erhöhung ihrer Finanzierung ist unerlässlich, um im internationalen Wettlauf ins All mitzuhalten und unsere technologischen Fähigkeiten weiterzuentwickeln."
 SOV_go_russia: "Vorwärts, Russland!"
 SOV_go_russia_desc: "Russland ist eine Großmacht mit unaufhaltsamem Potenzial. Unter Putins Führung werden wir in den kommenden Jahren unseren rechtmäßigen Platz als dominante globale Supermacht zurückerobern."
 SOV_medvedev_modernization_program: "Medwedews Modernisierungsprogramm"
 SOV_medvedev_modernization_program_desc: "Das 2009 gestartete Modernisierungsprogramm Medwedews sollte Russlands Wirtschaft diversifizieren und die Abhängigkeit von Öl und Gas verringern. Es setzte Prioritäten bei Energieeffizienz, Nukleartechnologie, IT, Pharmazeutik und Raumfahrt und förderte zugleich staatliche Transparenz und Rechenschaftspflicht."
 SOV_rokirovka: "Rokirovka"
 SOV_rokirovka_desc: "Rokirovka, im Schach die Rochade, bezeichnet Putins Rücktritt nach seiner Präsidentschaftszeit, um Medwedew den Machtantritt zu ermöglichen. Dieser strategische Zug sicherte die Kontinuität der Führung innerhalb des russischen politischen Systems."
 SOV_gay_propaganda_laws: "LGBT-Propagandagesetze"
 SOV_gay_propaganda_laws_desc: "Wir beabsichtigen, gegen die Darstellung von LGBT in unserer Gesellschaft vorzugehen, um die Werte unseres Volkes zu schützen und die Jugend vor Einflüssen zu bewahren, die wir als schädlich ansehen."
 SOV_anti_corruption_foundation: "Antikorruptionsstiftung"
 SOV_anti_corruption_foundation_desc: "Korruption hat Russlands politisches und wirtschaftliches System tief durchdrungen. Um dieses Problem gründlich zu bekämpfen und das Vertrauen der Öffentlichkeit wiederherzustellen, ist die Schaffung eines eigenen Regierungskomitees mit echter Autorität notwendig."
 SOV_economic_liberalism: "Freie Märkte, freie Menschen"
 SOV_economic_liberalism_desc: "Freie Märkte sind unerlässlich, um Russland aus der Armut zu führen und Wachstum zu fördern. Die Regierung sollte sich zurückhalten und Unternehmen frei arbeiten lassen, ohne Eingriffe oder Bevorzugung."
 SOV_the_novorossiyan_uprising: "Der Aufstand in Noworossija"
 SOV_the_novorossiyan_uprising_desc: "Die Menschen in Luhansk und Donezk streben nach nationaler Souveränität gegenüber der Ukraine. Eine verdeckte Unterstützung dieser Freiheitskämpfer könnte das regionale Kräfteverhältnis zugunsten Russlands verschieben."
 SOV_annexation_of_crimea: "Annexion der Krim"
 SOV_annexation_of_crimea_desc: "Die Einnahme der Krim, einer strategisch wichtigen und ethnisch russischen Halbinsel, ist von entscheidender Bedeutung. Der Einsatz nicht gekennzeichneter Truppen zur Unterstützung lokaler Aufstände wird glaubhafte Abstreitbarkeit wahren und jede westliche Intervention verzögern."
 SOV_the_new_dictator: "Der Diktator"
 SOV_the_new_dictator_desc: "Demokratische Vorwände sind nicht länger notwendig. Putin, Medwedew und Einiges Russland wissen, was für Russland am besten ist. Die Führung muss stark und dauerhaft sein, um die Zukunft des Landes zu sichern."
 SOV_police_reforms: "Sicherheitsreformen"
 SOV_police_reforms_desc: "Die Reform der Geheimdienste ist für Stabilität und Antikorruptionsbemühungen von entscheidender Bedeutung. Eine Verringerung der Macht der Silowiki wird dazu beitragen, Russlands Demokratie zu schützen und die staatliche Kontrolle zu stärken."
 SOV_root_out_corruption: "Mit den Oligarchen aufräumen"
 SOV_root_out_corruption_desc: "Die Oligarchen verkörpern die korrupten Überreste der Putin-Ära. Sie müssen beseitigt, ihre Vermögenswerte beschlagnahmt und ihr Einfluss zerschlagen werden, um Ordnung und Gerechtigkeit wiederherzustellen."
 SOV_multi_party_encouragement: "Sprachabkommen"
 SOV_multi_party_encouragement_desc: "Russen und Ukrainer teilen tiefe kulturelle und sprachliche Bindungen. Wir sollten gleiche Sprachrechte gewährleisten, um Einheit und gegenseitigen Respekt zwischen unseren Völkern zu stärken."
 SOV_democracy_in_russia: "Maßnahmen zur Integrität von Wahlen"
 SOV_democracy_in_russia_desc: "Die Menschen vertrauen Wahlen nur dann, wenn sie fair und transparent sind. Wir müssen Schritte unternehmen, um das Vertrauen in Russlands Wahlprozess nach Jahren der Korruption und des Zweifels wiederherzustellen."
 SOV_neoliberal_foreign_policy: "Liberale Hegemonie"
 SOV_neoliberal_foreign_policy_desc: "Um unsere Sicherheit zu schützen und liberale Demokratien weltweit zu unterstützen, müssen wir autokratischen Regimen überall dort entschlossen entgegentreten, wo sie Frieden und Stabilität bedrohen."
 SOV_withdraw_from_the_sco: "Aus der SCO austreten"
 SOV_withdraw_from_the_sco_desc: "Die Shanghaier Organisation für Zusammenarbeit besteht aus autokratischen Regierungen, die unseren Werten entgegenstehen. Es liegt im Interesse Russlands, sich von dieser Gruppe zu distanzieren."
 SOV_rein_in_the_government: "Die Regierung an die Leine nehmen"
 SOV_rein_in_the_government_desc: "Da die Opposition wirksam neutralisiert wurde, können wir die Kontrolle über die föderale Regierung stärken und eine einheitliche Richtung für Russlands Zukunft sicherstellen."
 SOV_support_euromaidan: "Der Ukraine helfen"
 SOV_support_euromaidan_desc: "Die Ukraine steht vor schweren Unruhen. Die Unterstützung unserer Brudernation wird helfen, ihre Regierung zu stabilisieren und unsere regionalen Interessen zu sichern."
 SOV_support_democratic_belarus: "Die Demokratie nach Belarus bringen"
 SOV_support_democratic_belarus_desc: "Es ist an der Zeit, Belarus von der Diktatur zu befreien und die Entwicklung von Demokratie und Freiheit für sein Volk zu unterstützen."
 SOV_buy_belarus: "Wichtige Beamte bestechen"
 SOV_buy_belarus_desc: "Um Einfluss in Belarus zu gewinnen, müssen wir strategisch zentrale Beamte bestechen und ihre Loyalität für unsere Sache sichern."
 SOV_civil_war_belarus: "Die Besatzer von Belarus stürzen"
 SOV_civil_war_belarus_desc: "Der Augenblick ist gekommen, Belarus von fremder Besatzung zu befreien und die Souveränität seinem rechtmäßigen Volk zurückzugeben."
 SOV_green_energy_investments: "Investitionen in grüne Energie"
 SOV_green_energy_investments_desc: "Ölgesellschaften kontrollieren seit Langem die russische Politik und Wirtschaft. Eine Verringerung der Abhängigkeit von fossilen Brennstoffen wird Korruption bekämpfen und den Weg für eine sauberere Energiezukunft ebnen."
 SOV_nato_exercises: "NATO-Russland-Manöver"
 SOV_nato_exercises_desc: "Um stärkere Beziehungen aufzubauen, werden russische und NATO-Streitkräfte schon bald regelmäßige gemeinsame Übungen abhalten und dadurch Zusammenarbeit und gegenseitiges Verständnis fördern."
 SOV_nato_standardization: "NATO-Standards übernehmen"
 SOV_nato_standardization_desc: "Ein Beitritt zur NATO erfordert die Angleichung unserer Ausrüstung und Produktion an ihre Standards. Dies wird tiefgreifende Reformen in unserer Rüstungsindustrie notwendig machen."
 SOV_closer_ties_with_the_west: "Engere Beziehungen zum Westen"
 SOV_closer_ties_with_the_west_desc: "Der Kalte Krieg ist vorbei. Es ist an der Zeit, alte Konflikte hinter uns zu lassen und neue Freundschaften mit den westlichen Nationen aufzubauen."
 SOV_may_decrees: "Mai dekrete"
 SOV_may_decrees_desc: "An seinem ersten Tag als Präsident im Jahr 2012 erließ Putin 14 Präsidialdekrete, die als Maidekrete bekannt wurden. Sie konzentrierten sich auf Bildung, Wohnungsbau, Fachkräfte, Beziehungen zur EU, die Rüstungsindustrie und interethnische Beziehungen, um Russlands Entwicklung zu lenken."
 SOV_loosen_government_censorship: "Staatliche Zensur verschärfen"
 SOV_loosen_government_censorship_desc: "Nach der Sicherung einer beispiellosen dritten Amtszeit ist es wichtig, die Kontrolle über Medien und Informationen zu stärken, um Stabilität zu bewahren und Dissens zu verhindern."
 SOV_unite_with_asia: "Zentralasiatische Union"
 SOV_unite_with_asia_desc: "Wir müssen unsere Union mit den zentralasiatischen Nationen festigen, solange wir noch können. Dies wird unseren Einfluss stärken und die Zukunft der Region sichern."
 SOV_counter_euromaidan: "Euromaidan entgegentreten"
 SOV_counter_euromaidan_desc: "Die Ukraine entfernt sich immer weiter von unserem Einfluss. Wir müssen entschlossen handeln, um sie daran zu erinnern, wer ihre wahren Verbündeten sind."
 SOV_extend_term_limits: "Amtszeitbegrenzungen verlängern"
 SOV_extend_term_limits_desc: "Derzeit beträgt die Amtszeit des Präsidenten vier Jahre. Eine Verlängerung auf sechs Jahre wird stabile Regierungsführung und Kontinuität zumindest bis 2018 ermöglichen."
 SOV_moscow_tehran_axis: "Achse Moskau-Teheran"
 SOV_moscow_tehran_axis_desc: "Russland und Iran sind natürliche Verbündete mit gemeinsamen Interessen. Es lebe die Freundschaft zwischen dem russischen und dem persischen Imperium."
 SOV_fly_byu_drones: "Militärische Zusammenarbeit ausbauen"
 SOV_fly_byu_drones_desc: "Wir werden die militärische Zusammenarbeit mit Iran ausweiten, indem wir Kampfflugzeuge liefern und im Gegenzug ihre Kamikaze-Drohnentechnologie erhalten, um unsere Streitkräfte zu stärken."
 SOV_alliance_with_india: "Abkommen von Delhi"
 SOV_alliance_with_india_desc: "Indien und Russland verbindet eine lange Geschichte des Widerstands gegen den Imperialismus. Wir feiern unsere Freundschaft und hoffen, dass sie noch viele Jahre andauern wird."
 SOV_alliance_with_china: "Konferenz von Shanghai"
 SOV_alliance_with_china_desc: "Gemeinsam bilden China und Russland einen starken Block gegen den globalistischen Westen. Wir sind entschlossen, seinen Einfluss durch unseren eigenen zu ersetzen."
 SOV_acquire_drones: "Ausländische Drohnen beschaffen"
 SOV_acquire_drones_desc: "Iran bietet uns fortschrittliche Drohnentechnologie zur Unterstützung unserer besonderen Militäroperationen an. Die Annahme dieses Angebots könnte unsere Fähigkeiten erheblich stärken."
 SOV_aggressive_foreign_policy: "Aggressive Außenpolitik"
 SOV_aggressive_foreign_policy_desc: "Da die innere Opposition unterdrückt wurde, kann Russland nun auch im Ausland selbstbewusster auftreten. Der Schutz ethnischer Russen im Ausland liefert die Rechtfertigung für Einflussnahme und gegebenenfalls Interventionen."
 SOV_challenge_nato: "Die NATO herausfordern"
 SOV_challenge_nato_desc: "NATO steht für North Atlantic Terrorist Organization. Wir müssen ihrer imperialistischen Kontrolle ein Ende setzen und unsere Hegemonie über Europa errichten."
 SOV_zov_in_belarus: "Versuchen, den Einfluss in Belarus zurückzugewinnen"
 SOV_zov_in_belarus_desc: "Wir werden versuchen, die Kontrolle über Belarus zurückzuerlangen, obwohl seine Behörden eine eindeutig antirussische Haltung eingenommen haben. Dieses Vorhaben ist entscheidend, um unseren Einfluss wiederherzustellen und unsere strategischen Interessen in der Region zu sichern."
 SOV_support_vitebsk: "Das Projekt Witebsk entwickeln"
 SOV_support_vitebsk_desc: "Unser langjähriges Projekt der Witebsker Volksrepublik ist bereit zur Umsetzung. Es ist an der Zeit, einen Aufstand zu entfachen, der uns als Brückenkopf zur Ausweitung unseres Einflusses in Belarus dienen wird."
 SOV_wagner_to_vitebsk: "Wagner in Witebsk"
 SOV_wagner_to_vitebsk_desc: "Die private Militärfirma Wagner ist bereit, die Rebellen in Witebsk mit ihren erfahrenen Söldnern zu unterstützen. Ihr Eingreifen wird den Aufstand stärken und seine Erfolgschancen erhöhen."
 SOV_condemn_belarusian_russophobes: "Die belarussische antirussische Politik verurteilen"
 SOV_condemn_belarusian_russophobes_desc: "Wir werden das derzeitige belarussische Regime weiterhin öffentlich für seine gefährliche antirussische Politik verurteilen. Diese Rhetorik wird helfen, das Regime zu isolieren und Unterstützung unter dem belarussischen Volk zu mobilisieren."
 SOV_belarus_strike: "Minsk in 3 Tagen"
 SOV_belarus_strike_desc: "Die Zeit für einen entscheidenden Schlag gegen das nationalistische Regime in Belarus ist gekommen. Ein schneller und vernichtender Angriff auf Minsk wird unsere Entschlossenheit zeigen und das Kräfteverhältnis in der Region verschieben."
 SOV_belarus_passports: "Russische Pässe in Witebsk verteilen"
 SOV_belarus_passports_desc: "Wir werden damit beginnen, russische Staatsbürgerschaften an die Bewohner Witebsks zu verteilen. Dieser Schritt wird unseren Anspruch auf die Region stärken und unseren Menschen dort größeren Schutz und mehr Rechte verleihen."
 SOV_2021_ukrainian_coup: "Der ukrainische Putsch"
 SOV_2021_ukrainian_coup_desc: "Für Verhandlungen mit Kiew ist kein Raum mehr. Wir müssen daran arbeiten, das Regime mit allen notwendigen Mitteln zu verändern und eine Regierung wiederherzustellen, die russischen Interessen gegenüber aufgeschlossener ist."
 SOV_blr_union_programm: "Unionsprogramme mit Belarus abstimmen"
 SOV_blr_union_programm_desc: "Um unsere Beziehungen zu stärken, werden wir mehrere Integrationsfahrpläne mit Belarus abstimmen und umsetzen. Diese Programme werden unsere wirtschaftliche und politische Zusammenarbeit vertiefen."
 SOV_recognize_novorossiya: "Noworossija anerkennen"
 SOV_recognize_novorossiya_desc: "Noworossija ist eine historische Region in der Ostukraine mit einer überwiegend russischen Bevölkerung. Wir können unser Volk nicht einer ukrainischen Regierung überlassen, die offen gegen russische Kultur und Interessen auftritt."
 SOV_condemn_ukrainian_russophobes: "Ukrainische Russophobe verurteilen"
 SOV_condemn_ukrainian_russophobes_desc: "Die jüngsten politischen Entwicklungen in der Ukraine machen deutlich, dass die Regierung in Kiew nicht die Absicht hat, die jahrzehntelangen Bande zwischen Russland und seinen Grenzgebieten zu respektieren. Wir müssen unsere diplomatische Rhetorik entsprechend anpassen und womöglich sogar Vorfälle fabrizieren, um unsere Haltung zu rechtfertigen."
 SOV_exercises_belarus_start: "Verbündete Entschlossenheit — Übungen"
 SOV_exercises_belarus_start_desc: "Russische und belarussische Streitkräfte werden gemeinsame Militärübungen durchführen, um unsere Einigkeit und Bereitschaft zu demonstrieren, unsere gemeinsamen Interessen zu verteidigen."
 SOV_the_final_strike: "Der letzte Schlag"
 SOV_the_final_strike_desc: "Die Ukraine hat einen Weg gewählt, der die regionale Stabilität bedroht. Es ist Zeit, entschlossen zu handeln und diesen Kurs zu korrigieren. Vorwärts zum Sieg!"
 SOV_secret_strike: "Der unerwartete Schlag"
 SOV_secret_strike_desc: "Während wir die Aufmerksamkeit der Welt ablenken, war unser wahres Ziel Finnland. Es ist Zeit, für vergangene Konflikte mit einem Überraschungsschlag Vergeltung zu üben. Ruhm unseren Streitkräften!"
 SOV_pasports_novorossiya: "Russische Pässe verteilen"
 SOV_pasports_novorossiya_desc: "Wir werden den Bewohnern der von uns befreiten Regionen die russische Staatsbürgerschaft verleihen, ihre Bindung an das Mutterland festigen und sie unter russischem Recht schützen."
 SOV_russian_taker: "Der Sammler russischer Lande"
 SOV_russian_taker_desc: "Unsere Mission ist es, historisch russische Gebiete an ihren rechtmäßigen Platz innerhalb Russlands zurückzuführen. Wir werden diese Verantwortung mit Stolz und Entschlossenheit tragen."
 SOV_karelian_republic: "Karelisch-Finnische Republik"
 SOV_karelian_republic_desc: "Wegen der Schwierigkeiten, mit denen die russische Minderheit in Teilen Finnlands konfrontiert ist, werden wir Teile Finnlands annektieren und unserer Karelischen Republik anschließen. Dieser Schritt ist durch die Unterdrückung gerechtfertigt, der die Karelier in diesen Gebieten ausgesetzt sind."
 SOV_UVZ_expanding: "Uralwagonsawod zu 146 % arbeiten lassen"
 SOV_UVZ_expanding_desc: "Unser Land braucht dringend Panzer in großen Mengen. Wir werden Uralwagonsawod dazu antreiben, die Produktion zu steigern und diese Anforderungen zu erfüllen, um unsere militärische Stärke sicherzustellen."
 SOV_more_drones: "In die Drohnenproduktion investieren"
 SOV_more_drones_desc: "Moderne Kriegsführung stützt sich in hohem Maße auf unbemannte Technologie. Wir müssen erheblich in die Drohnenproduktion investieren, um mit den zeitgenössischen militärischen Entwicklungen Schritt zu halten."
 SOV_vstavai_strana: "Nationale Bataillone"
 SOV_vstavai_strana_desc: "Die Völker Russlands müssen sich gemeinsam zur Verteidigung unseres Vaterlandes erheben. Nationale Bataillone werden diesen Geist verkörpern und mit unvergleichlicher Entschlossenheit kämpfen."
 SOV_armneia_arbat: "Armenisches Bataillon Arbat"
 SOV_armneia_arbat_desc: "Unsere armenischen Brüder stehen bereit, uns in diesem Konflikt zu unterstützen. Ihre Entschlossenheit und Tapferkeit werden unsere Anstrengungen auf dem Schlachtfeld stärken."
 SOV_npp_again: "Neue nationale Projekte"
 SOV_npp_again_desc: "Die Regierung hat neue nationale Projekte ins Leben gerufen, die die Wirtschaft auf ein beispielloses Niveau heben sollen. Diese Initiativen werden zahlreiche Bereiche betreffen, von der sozialen Wohlfahrt bis zum technologischen Fortschritt."
 SOV_m12: "Föderale Fernstraße M12 „Wostok“"
 SOV_m12_desc: "Die föderale Fernstraße M12 Wostok verbindet große Städte wie Moskau, Wladimir, Murom, Arsamas, Kasan, Nischnekamsk, Jekaterinburg und Tjumen. Diese Infrastrukturentwicklung ist ein zentraler Bestandteil unserer nationalen Modernisierungsbemühungen."
 SOV_volunteer_gifts: "Spenden aus der Bevölkerung"
 SOV_volunteer_gifts_desc: "Besorgte Bürger leisten großzügige Beiträge zur Unterstützung der Front. Ihre Spenden stellen wichtige Ressourcen bereit und stärken die Moral unserer Truppen."
 SOV_reconservation: "Entkonservierung"
 SOV_reconservation_desc: "Wir werden Waffen- und Ausrüstungsbestände reaktivieren, die seit der Sowjetzeit eingelagert wurden. Dadurch können wir unsere militärischen Fähigkeiten schnell stärken, ohne auf neue Produktion angewiesen zu sein."
 SOV_contracts_with_minobr: "Vertrag mit dem Verteidigungsministerium"
 SOV_contracts_with_minobr_desc: "Um Ordnung in die Truppen zu bringen, muss sämtliches Personal formelle Verträge mit dem Verteidigungsministerium unterzeichnen. Dies wird Disziplin und Klarheit in der Befehlskette sicherstellen."
 SOV_african_corps: "Das Afrikakorps gründen"
 SOV_african_corps_desc: "Wir wollen unsere strategischen Beziehungen in Afrika aufrechterhalten, die durch die Aktivitäten der Wagner-PMC aufgebaut wurden. Die Bildung eines offiziellen Korps innerhalb der Streitkräfte wird die laufende Zusammenarbeit mit afrikanischen Nationen stärken."
 SOV_unite_as_one: "Die Geschichte Russlands achten"
 SOV_unite_as_one_desc: "Unsere Nation verfügt über eine gewaltige und reiche Geschichte. Wir müssen unser Erbe ehren und achten, als Fundament für Einheit und Stolz auf unserem weiteren Weg."
 SOV_pmc_gazproms: "Unternehmens-PMKs"
 SOV_pmc_gazproms_desc: "Gazprom finanziert die Gründung eigener Bataillone privater Militärfirmen."
 SOV_anti_bsb: "Die Opposition verbieten"
 SOV_anti_bsb_desc: "Es ist an der Zeit, entschlossen gegen prowestliche Oppositionsgruppen vorzugehen, die unsere Stabilität untergraben und fremden Einfluss verbreiten."
 SOV_pogranci_fsb: "FSB-Grenzdienst Russlands"
 SOV_pogranci_fsb_desc: "Der Grenzdienst ist ein Zweig des FSB, der für die Überwachung und den Schutz der ausgedehnten Landgrenzen Russlands verantwortlich ist."
 SOV_referendums_novorossiya: "Referenden über den Beitritt zu Russland"
 SOV_referendums_novorossiya_desc: "Die Zeit ist gekommen, dass Noworossija sich formell wieder mit Russland vereinigt. Referenden werden es dem Volk ermöglichen, seinen Willen auszudrücken und diesen Prozess zu legitimieren."
 SOV_attack_moldova: "Moldau befreien"
 SOV_attack_moldova_desc: "Unsere Verbündeten in Transnistrien leiden unter moldauischer Kontrolle. Die Ausweitung unserer Pufferzone gegen die NATO durch die Befreiung Moldaus wird Russlands Westgrenze sichern und unsere Interessen schützen."
 SOV_information_war: "Informationskrieg"
 SOV_information_war_desc: "Um die westliche Unterstützung für die Ukraine zu schwächen, müssen wir gezielte Propaganda im Internet verbreiten. Die Kontrolle über das Narrativ ist entscheidend, um die internationale Meinung zu beeinflussen und unsere Ziele zu sichern."
 SOV_zyuganov: "Gennadi Sjuganow"
 SOV_zyuganov_desc: "Gennadi Sjuganow, geboren 1944, führt seit 1993 die Kommunistische Partei der Russischen Föderation. Bei der Präsidentschaftswahl 1996 galt er zunächst als Favorit gegen Boris Jelzin, verlor jedoch letztlich in der zweiten Runde mit 40,7 Prozent der Stimmen gegenüber Jelzins 54,4 Prozent. Sjuganows Politik verbindet linke Ideologie mit einer stark nationalistischen Perspektive."
 SOV_coup_major_post_soviet_countries: "Die Republiken stürzen"
 SOV_coup_major_post_soviet_countries_desc: "Anstatt eine katastrophale militärische Intervention zu riskieren, werden wir den abtrünnigen Republiken ein unwiderstehliches Angebot machen. Dieser diplomatische Ansatz soll sie ohne Blutvergießen wieder unter unseren Einfluss bringen."
 SOV_mobilize_the_masses: "Die Massen mobilisieren"
 SOV_mobilize_the_masses_desc: "Eine Revolution braucht breite Unterstützung im Volk, nicht nur eine Vorhutpartei. Die Kommunistische Partei muss russische Arbeiter und Bauern politisch und wirtschaftlich einbinden, indem sie Arbeitsplätze schafft, Fabriken renoviert und Arbeitskollektive aufbaut."
 SOV_fight_international_capitalists: "Internationale Kapitalisten bekämpfen"
 SOV_fight_international_capitalists_desc: "Die Oligarchen gleichen den Kulaken von einst – korrupt und gefährlich. Seit dem Zusammenbruch der UdSSR haben sie ihre Kontrolle ausgebaut, Arbeiter verdrängt und den globalen Kapitalismus gefördert. Um Russland wiederzubeleben, müssen wir zunächst diese internationale Kapitalistenklasse zerschlagen."
 SOV_weaken_the_banks: "Die Banken schwächen"
 SOV_weaken_the_banks_desc: "Banken sind die Vollstrecker des Kapitalismus und beuten Arbeiter weltweit durch Lohndruck und räuberische Kreditvergabe aus. Sie manipulieren die Politik sowohl mit legalen als auch illegalen Mitteln. Banken müssen entmachtet und auf die Rolle einfacher, unpolitischer Kreditgeber reduziert werden."
 SOV_communist_purges: "Kommunistische Säuberungen"
 SOV_communist_purges_desc: "Der Zusammenbruch des Kommunismus im Jahr 1991 war eine demütigende Niederlage. Wir müssen jene innerhalb der Partei ausfindig machen, die für diesen Verrat verantwortlich sind, und sie aus den Machtpositionen entfernen."
 SOV_restalinization: "Restalinisierung"
 SOV_restalinization_desc: "Stalin verdient neue Ehrung dafür, den Sozialismus aufgebaut und die Menschheit vor dem Faschismus geschützt zu haben. Die Größe seiner Epoche ist unbestreitbar, selbst für seine schärfsten Kritiker. Unter seinem Vermächtnis werden wir die Welt befreien."
 SOV_communist_party_dominance: "Vorherrschaft der Kommunistischen Partei"
 SOV_communist_party_dominance_desc: "Die Kommunistische Partei der Russischen Föderation weiß am besten, wie man regiert. Wenn man ihr freie Hand lässt, werden wir eine wahre kommunistische Utopie errichten, die dort Erfolg hat, wo die Vergangenheit scheiterte."
 SOV_empower_the_communist_party: "Die Kommunistische Partei stärken"
 SOV_empower_the_communist_party_desc: "Erst ein Jahrzehnt ist seit dem Aufstieg des Kapitalismus vergangen, und doch ist sein politisches System bereits fest verankert und muss beseitigt werden. Der erste Schritt zur Vorherrschaft der Partei besteht darin, lokale und regionale Wahlen zu gewinnen."
 SOV_zyuganov_constitution: "Die Sjuganow-Verfassung"
 SOV_zyuganov_constitution_desc: "Es ist Zeit, die kapitalistische Verfassung von 1991 zu verwerfen. Wir brauchen ein neues Dokument, das politische und wirtschaftliche Rechte garantiert, welche die Werte sowjetischer Bürger widerspiegeln – Rechte, die ihnen im Westen verwehrt werden."
 SOV_honor_gorbachevs_legacy: "Gorbatschows Vermächtnis ehren"
 SOV_honor_gorbachevs_legacy_desc: "Gorbatschows Reformen wurden von verborgenen Kapitalisten sabotiert, die den Kommunismus zerstören wollten. Wir sollten seine Reformen wiederherstellen und eine gemischte Wirtschaft beibehalten, um als moderne kommunistische Bastion zu dienen."
 SOV_nationalize_foreign_business: "Ausländische Unternehmen verstaatlichen"
 SOV_nationalize_foreign_business_desc: "Ausländisch kontrollierte Industrieanlagen stellen ein Risiko für unsere wirtschaftliche Sicherheit dar. Angesichts von Sanktionen könnten ihre Eigentümer fliehen und lebenswichtige Vermögenswerte mitnehmen. Wir müssen diese Industrien verstaatlichen, um unsere Wirtschaft zu schützen, ungeachtet diplomatischer Konsequenzen."
 SOV_condemn_globalism: "Globalismus verurteilen"
 SOV_condemn_globalism_desc: "Der Globalismus behauptet, weltweite Zusammenarbeit zu fördern, ist in Wahrheit aber ein kapitalistisches System zur Ausbeutung des russischen Volkes und seiner Ressourcen. Wir werden ihn zurückweisen und unsere Wirtschaft, Gesellschaft und Armee aufbauen, um die Pax Americana zu stürzen."
 SOV_russian_sfsr: "Die RSFSR"
 SOV_russian_sfsr_desc: "Der Zusammenbruch der UdSSR resultierte aus einer Überbetonung der Gleichheit unter den Nationen. Wir werden einen kommunistischen Staat aufbauen, der sich ausschließlich auf russische Nationalinteressen konzentriert, um eine stärkere und stabilere Union zu schaffen."
 SOV_reunite_the_ussr: "Die UdSSR"
 SOV_reunite_the_ussr_desc: "Trotz der Gefahren nationalistischer Separatismen ist die Schaffung einer zweiten UdSSR von entscheidender Bedeutung, um die sowjetische Revolution fortzuführen. Eine starke kommunistische Überstruktur kann den Nationalismus überwinden und unterschiedliche Völker vereinen."
 SOV_european_communist_pressure: "Kommunistischer Druck auf Europa"
 SOV_european_communist_pressure_desc: "Europäer fürchten den Kommunismus oft aufgrund kapitalistischer Propaganda. Sobald wir diese Barriere durchbrechen, wird das kapitalistische System zusammenbrechen und die Wahrheit über das Versprechen des Kommunismus offenbaren."
 SOV_first_two_year_plan: "Erster Fünfjahresplan"
 SOV_first_two_year_plan_desc: "Westliche Freimarktmodelle bieten dem Sozialismus keine Zukunft. Eine Rückkehr zur Planwirtschaft durch sowjetische Fünfjahrespläne wird die staatliche Kontrolle über die Wirtschaft wiederherstellen."
 SOV_civilian_industrial_councils: "Zivile Industrieräte"
 SOV_civilian_industrial_councils_desc: "Um die russische Industrie wiederzubeleben, müssen wir Arbeitsplätze schaffen, die sich auf den Bau schwerer Maschinen konzentrieren. Auch wenn dies nicht primär für den Export gedacht ist, wird es zudem revolutionäre Bewegungen im Ausland mit russischer Ausrüstung unterstützen."
 SOV_a_second_two_year_plan: "Zweiter Fünfjahresplan"
 SOV_a_second_two_year_plan_desc: "Ein zweiter Fünfjahresplan wird die sowjetische wirtschaftliche Sicherheit und Unabhängigkeit vertiefen und langfristiges industrielles Wachstum sowie Vorherrschaft sichern."
 SOV_recollectivization: "Rekollektivierung"
 SOV_recollectivization_desc: "Privateigentum ist inakzeptabel. Land und Eigentum gehören dem Volk, nicht kapitalistischen Eliten. Wir verlangen die Rückgabe unseres Landes an jene, die es bearbeiten."
 SOV_reestablish_the_military_industrial_complex: "Den militärisch-industriellen Komplex wiedererrichten"
 SOV_reestablish_the_military_industrial_complex_desc: "Die Armee und das Volk sind eins. Der Wiederaufbau unseres militärisch-industriellen Komplexes wird unsere Verteidigung und unsere revolutionären Fähigkeiten stärken."
 SOV_territorial_demands: "Territoriale Forderungen"
 SOV_territorial_demands_desc: "Die Wiederherstellung sowjetischer Größe erfordert die Auflösung jener Nationalstaaten, die geschaffen wurden, um kapitalistische Interessen zu schützen. Diese willkürlichen Grenzen müssen beseitigt werden, um das Proletariat zu vereinen."
 SOV_military_industrial_councils: "Militärische Industrieräte"
 SOV_military_industrial_councils_desc: "Neben zivilen Räten wird eine parteikontrollierte Rüstungsindustrie es uns ermöglichen, Waffen zur Verteidigung des Roten Russland und zur Unterstützung kommunistischer Revolutionen weltweit zu produzieren."
 SOV_increase_minimum_wage: "Den Mindestlohn erhöhen"
 SOV_increase_minimum_wage_desc: "Jeder verdient einen Lohn, der ein glückliches und würdiges Leben ermöglicht. Die Erhöhung des Mindestlohns ist unerlässlich, um dieses Recht zu verwirklichen."
 SOV_merge_tank_and_aircraft_plants: "Panzer- und Flugzeugwerke zusammenlegen"
 SOV_merge_tank_and_aircraft_plants_desc: "Mehrere Unternehmen produzieren ähnliche Materialien auf ineffiziente Weise. Durch die Zusammenlegung dieser Werke werden wir Doppelstrukturen abbauen und die industrielle Leistung maximieren."
 SOV_empower_the_nkvd: "Den KGB stärken"
 SOV_empower_the_nkvd_desc: "Unsere Staatssicherheit muss mehr Finanzierung und mehr Autonomie erhalten, um kapitalistische Interessen sowohl im Inland als auch im Ausland wirksam zu bekämpfen."
 SOV_scientific_councils: "Wissenschaftliche Räte"
 SOV_challenge_nato_3: "Befreiung Europas"
 SOV_challenge_nato_3_desc: "Die Regierungen Europas haben das Proletariat lange genug getäuscht. Es ist Zeit für eine besondere Militäroperation zur erneuten Entnazifizierung Europas – genau wie wir es 1945 getan haben."
 SOV_soviet_war_memorials: "Sowjetische Kriegsdenkmäler"
 SOV_soviet_war_memorials_desc: "27 Millionen sowjetische Bürger starben im Großen Vaterländischen Krieg. Wir müssen ihr Opfer ehren und ihre Erinnerung für kommende Generationen in ewigem Ruhm bewahren."
 SOV_glory_of_the_red_army: "Der Ruhm der Roten Armee"
 SOV_glory_of_the_red_army_desc: "Die Rote Armee bleibt die mächtigste und angesehenste Streitmacht der Geschichte."
 SOV_soviet_academy_of_sciences: "Sowjetische Akademie der Wissenschaften"
 SOV_soviet_academy_of_sciences_desc: "Die Sowjetische Akademie der Wissenschaften ist die führende wissenschaftliche Institution der UdSSR. Unsere klügsten Köpfe arbeiten unermüdlich daran, Durchbrüche zu erzielen, die die kapitalistische Welt neidisch machen."
 SOV_ban_private_land_ownership: "Privaten Landbesitz verbieten"
 SOV_ban_private_land_ownership_desc: "Land ist ein grundlegendes Menschenrecht, keine Ware. Eigentum muss dem Volk gehören, nicht entfernten Kapitalisten, die auf Kosten der Arbeiter Profit machen."
 SOV_honor_soviet_legacy: "Das sowjetische Erbe ehren"
 SOV_honor_soviet_legacy_desc: "Die Sowjetunion war das größte Land der Geschichte. In nur dreißig Jahren führte sie uns von agrarischer Mühsal bis in den Weltraum – Leistungen, die die kapitalistischen Nationen weit übertrafen."
 SOV_gay_propaganda_laws_2: "Bewahrung der traditionellen Ehe"
 SOV_gay_propaganda_laws_2_desc: "Die Ehe ist ein Bund zwischen Mann und Frau. Alternative Lebensweisen, die vom Kapitalismus gefördert werden, zielen darauf ab, unsere Gesellschaft von innen heraus zu schwächen."
 SOV_preserve_perestroika_ideas: "Die Ideen der Perestroika bewahren"
 SOV_preserve_perestroika_ideas_desc: "Gorbatschows Reformen halfen, die Stagnation der UdSSR in den 1980er Jahren zu überwinden. Diese Politik bleibt wirksam und sollte unsere gegenwärtigen Reformen leiten."
 SOV_a_new_economic_policy: "Eine neue Wirtschaftspolitik"
 SOV_a_new_economic_policy_desc: "Auch wenn die Fünfjahrespläne funktionierten, reichen sie allein nicht aus. Anpassungen sind nötig, um das Wirtschaftswachstum maximal zu steigern."
 SOV_christian_communism: "Christlicher Kommunismus"
 SOV_christian_communism_desc: "Marx nannte die Religion das Opium des Volkes, doch Kirchen niederzubrennen ist weder praktikabel noch wünschenswert. Viele Bürger bleiben gläubig, daher sollten wir das orthodoxe Christentum zur Staatsreligion machen, um den gesellschaftlichen Zusammenhalt zu stärken."
 SOV_consolidate_intel_agencies: "Die Geheimdienste zusammenführen"
 SOV_consolidate_intel_agencies_desc: "Unsere Geheimdienste sind zersplittert. Ihre Vereinigung unter einem gemeinsamen Kommando wird Effizienz und operative Schlagkraft erhöhen."
 SOV_harsher_punishments: "Härtere Strafen"
 SOV_harsher_punishments_desc: "Um Recht und Ordnung wiederherzustellen, müssen wir die strengen Strafen aus der Zeit der UdSSR wieder einführen. Dadurch wird die Kriminalität deutlich zurückgehen."
 SOV_military_education: "Sowjetische patriotische Schulen"
 SOV_military_education_desc: "Die jüngere Generation muss über den Ruhm der Sowjetunion und die Opfer ihrer Vorfahren unterrichtet werden, damit sie dieses Erbe fortführen kann."
 SOV_belt_and_road: "Sowjetischer Infrastrukturplan"
 SOV_belt_and_road_desc: "Unsere Straßen sind in schlechtem Zustand, und die Züge sind unzuverlässig. Wäre Stalin noch am Leben, würde er unverzügliches Handeln verlangen, um dieses Problem zu beheben."
 SOV_nuclear_development: "Nuklearentwicklung"
 SOV_nuclear_development_desc: "Die UdSSR war ein weltweiter Vorreiter in der Nukleartechnologie. Als ihr Nachfolgestaat müssen wir diese Position zurückerobern und weiter ausbauen."
 SOV_red_cyber_army: "Rote Cyberarmee"
 SOV_red_cyber_army_desc: "Nach dem Vorbild von Chinas 50-Cent-Armee wird diese bezahlte Gruppe prosowjetischer Internettrolle Propaganda verbreiten und Unruhe in westlichen Gesellschaften stiften."
 SOV_aero_improvements: "Verbesserungen im Flugzeugbau"
 SOV_aero_improvements_desc: "Die sowjetische Luft- und Raumfahrtindustrie wurde durch den Zusammenbruch von 1991 schwer getroffen. Nach Jahren der Misswirtschaft und Unterfinanzierung ist es an der Zeit, diesen kritischen Sektor wiederzubeleben."
 SOV_rocketry: "Fortschrittliche Raketentechnik"
 SOV_rocketry_desc: "Die sowjetische Raketentechnik war stets auf dem neuesten Stand. Wir sind weiterhin führend und werden auf diesem Gebiet auch künftig Innovationen vorantreiben."
 SOV_revitalize_air_bases: "Luftwaffenstützpunkte revitalisieren"
 SOV_revitalize_air_bases_desc: "Die UdSSR hat viele Flugplätze ungenutzt zurückgelassen. Wir müssen diese Basen wiederherstellen und strategisch nutzen."
 SOV_radical_tax_reform: "Kommunistischer Steuerplan"
 SOV_radical_tax_reform_desc: "Die Reichen zahlen nicht ihren gerechten Anteil. Wir werden ihre Steuern erhöhen und zugleich die Last für die Armen verringern."
 SOV_national_patriotic_alliance: "National-patriotisches Bündnis"
 SOV_national_patriotic_alliance_desc: "Wir werden eine Koalition aus Nationalisten, Patrioten und Kommunisten bilden, um die Sowjetunion auf einer starken politischen und patriotischen Grundlage wiederzuvereinigen."
 SOV_empower_national_patriotic_alliance: "Das Bündnis stärken"
 SOV_empower_national_patriotic_alliance_desc: "Um die Koalition zu stärken, werden wir ihre Mitglieder gemeinsam mit unseren eigenen in Machtpositionen bringen, wobei unsere Kräfte leicht dominieren, um die Kontrolle zu behalten."
 SOV_a_new_constitution: "Neue sowjetische Verfassung"
 SOV_a_new_constitution_desc: "Gemeinsam mit neuen Verbündeten werden wir eine verfassungsgebende Versammlung einberufen, um eine neue, einheitliche Verfassung auszuarbeiten und zu verabschieden."
 SOV_expand_university_enrollment: "Die Hochschulzulassung ausweiten"
 SOV_expand_university_enrollment_desc: "Hochschulbildung ist der Schlüssel zu persönlichem Erfolg und wirtschaftlicher Produktivität. Wir werden die Zahl der Studienplätze erhöhen, um eine stärkere Arbeitnehmerschaft zu entwickeln."
 SOV_automation_for_the_people: "Internetinitiative"
 SOV_automation_for_the_people_desc: "Das 21. Jahrhundert bringt Automatisierung, Internet und KI. Wenn diese Technologien richtig entwickelt werden, könnten sie die Menschen von der Arbeit befreien und eine vollautomatisierte luxuriöse kommunistische Gesellschaft ermöglichen."
 SOV_political_purges: "Politische Säuberungen"
 SOV_political_purges_desc: "Unter uns befinden sich unzuverlässige und illoyale Elemente. Sie müssen identifiziert, isoliert und aus dem öffentlichen Leben entfernt werden."
 SOV_guarantee_multi_party_system: "Das Mehrparteiensystem garantieren"
 SOV_guarantee_multi_party_system_desc: "Eine von Gorbatschows Reformen war die Zulassung einer Mehrparteiendemokratie. Wir sollten dies bewahren, um sein reformistisches Vermächtnis zu ehren."
 SOV_the_chinese_question: "Der revisionistische Verräter"
 SOV_the_chinese_question_desc: "Seit Maos Zeit verfolgt China einen imperialistischen, revisionistischen Kurs. Wir müssen dies korrigieren und den wahren Sozialismus nach China zurückbringen."
 SOV_our_socialist_brother: "Unser sozialistischer Bruder"
 SOV_our_socialist_brother_desc: "Nach dem Zusammenbruch der UdSSR hat China die sozialistische Fackel übernommen. Gemeinsam werden wir den Sozialismus im 21. Jahrhundert weiter voranbringen."
 SOV_nork_deals: "Abkommen mit dem Norden"
 SOV_nork_deals_desc: ""
 SOV_chicom_cooperation: "Wirtschaftliche Zusammenarbeit ausweiten"
 SOV_chicom_cooperation_desc: ""
 SOV_support_the_kpa: "Die Koreanische Volksarmee unterstützen"
 SOV_support_the_kpa_desc: "Einige innerhalb der Koreanischen Volksarmee lehnen das Kim-Regime ab und sind bereit, sich mit uns zu verbünden. Wir müssen daran arbeiten, ihre Unterstützung zu sichern."
 SOV_nork_coup: "Der nordkoreanische Putsch"
 SOV_nork_coup_desc: "Auf unser Signal hin wird der General der KVA einen Staatsstreich gegen die Kim-Dynastie durchführen und hoffentlich eine loyalere, wahrhaft sozialistische Regierung einsetzen."
 SOV_zyuganovs_cult_of_personality: "Sjuganows Personenkult"
 SOV_zyuganovs_cult_of_personality_desc: "Gennadi Sjuganow ist der stärkste, klügste und charismatischste kommunistische Führer, der je gelebt hat!"
 SOV_international_revolution: "Die internationale Revolution exportieren"
 SOV_international_revolution_desc: "Die Revolution kann nicht allein in Russland überleben. Das Proletariat der ganzen Welt muss sich erheben, um den Kapitalismus zu stürzen und eine kommunistische Utopie aufzubauen."
 SOV_export_class_struggle: "Klassenkampf exportieren"
 SOV_export_class_struggle_desc: "Der marxistische Sozialismus lehrt, dass die Geschichte durch den Klassenkampf bestimmt wird. Das Proletariat wird die Bourgeoisie unweigerlich stürzen!"
 SOV_reignite_revolutionary_spirit: "Den revolutionären Geist entfachen"
 SOV_reignite_revolutionary_spirit_desc: "Die Revolution ist ewig und muss durch ständige Wachsamkeit und entschlossenes Handeln am Leben gehalten werden."
 SOV_fifth_international: "Die Fünfte Internationale gründen"
 SOV_fifth_international_desc: "Die sowjetische kommunistische Bewegung spaltete sich historisch zwischen Stalins Dritter Internationale und Trotzkis Vierter Internationale, was in brutalen Säuberungen gipfelte. Wir brauchen eine neue Internationale, um die Kommunisten weltweit zu vereinen."
 SOV_empower_ex_soviet_communists: "Ehemalige sowjetische Kommunisten stärken"
 SOV_empower_ex_soviet_communists_desc: "Viele Veteranen der Sowjetzeit leben noch immer in Russland und den ehemaligen Republiken. Wir sollten sie stärken, damit sie bei der Wiedervereinigung der UdSSR helfen."
 SOV_a_loyal_cpc: "Eine loyale KPCh"
 SOV_a_loyal_cpc_desc: "Die Kommunistische Partei Chinas ist revisionistisch geworden und unfähig zu regieren. Wir müssen sie mit Gewalt und mit Hilfe innerer Verbündeter stürzen, um den wahren Kommunismus wiederherzustellen."
 SOV_zhirinovsky: "Wladimir Schirinowski"
 SOV_zhirinovsky_desc: "Wladimir Schirinowski (geb. 1946) führt seit 1991 die hypernationalistische Liberaldemokratische Partei Russlands. Bekannt für seine scharfe Rhetorik und einen berüchtigten Streit mit dem Zentristen Boris Nemzow im Jahr 1995, befürwortet Schirinowski eine aggressive und unberechenbare Politik. Zu seinen extremsten Vorschlägen gehört die Kontamination der NATO-Mitgliedstaaten des Baltikums durch das Abwerfen radioaktiver Abfälle über deren Grenzen. Seine umstrittenen Ideen prägen weiterhin den nationalistischen Diskurs in Russland."
 SOV_russian_irredentism: "Russischer Irredentismus"
 SOV_russian_irredentism_desc: "Russland war einst ein mächtiges Imperium, doch Revolutionen, Staatsstreiche und Bürgerkriege schwächten es. Nun müssen wir unseren früheren Ruhm wiederherstellen, indem wir verlorene Gebiete zurückerobern. Die Krim und der Donbass gehören uns, und unsere Panzer werden bis nach Prag vorrücken. Dies ist unsere Bestimmung und Pflicht."
 SOV_governorates: "Gouveränate"
 SOV_governorates_desc: "Wir haben zu viele nationale Republiken und die Marginalisierung der ethnischen Russen ertragen müssen. Durch die Neugliederung des Landes in 30 Gouvernements werden wir effektiver regieren und den Staat einen. Diese Reform stärkt die Zentralgewalt und stellt die Ordnung wieder her."
 SOV_strengthen_union_state: "Gouvernement Minsk"
 SOV_strengthen_union_state_desc: "Es ist an der Zeit, der vorgetäuschten Unabhängigkeit von Belarus ein Ende zu setzen. Die Wiedereingliederung von Belarus als Gouvernement innerhalb unseres Imperiums ist der beste Weg, Stabilität und Kontrolle zu gewährleisten. Diese Reintegration wird beiden Völkern zugutekommen und unsere Grenzen stärken."
 SOV_maintain_csto_1: "Die CSTO auflösen"
 SOV_maintain_csto_1_desc: "Die OVKS ist eine überflüssige und ineffektive Organisation, die unseren Interessen nicht mehr dient. Es ist an der Zeit, sie aufzulösen und überholte Bündnisse hinter uns zu lassen. Unsere Zukunft liegt in stärkeren und zielgerichteteren Partnerschaften."
 SOV_rus_sphere_united_arms: "Moskauer Pakt"
 SOV_rus_sphere_united_arms_desc: "Wir müssen ein neues, schlagkräftiges politisches und militärisches Bündnis schmieden. Alte Abkommen haben sich als unzureichend erwiesen; es ist an der Zeit, eine eigene Koalition zu bilden, die unseren Einfluss weltweit geltend macht und die westliche Vorherrschaft herausfordert."
 SOV_integrate_abkhazia: "Gouvernement Tiflis"
 SOV_integrate_abkhazia_desc: "Wir müssen uns auf die Gebiete des ehemaligen Russischen Reiches im Kaukasus konzentrieren. Die andauernden Konflikte zwischen Georgien, Ossetien und Abchasien gefährden die regionale Stabilität. Unser Ziel ist es, diese Streitigkeiten endgültig beizulegen und die Ordnung unter unserer Kontrolle wiederherzustellen."
 SOV_support_serbia: "Unterstützt Serbien"
 SOV_support_serbia_desc: "Serbien bleibt unser wichtigster Verbündeter in Südeuropa. Wir sollten ihnen immer dann Hilfe leisten, wenn sie diese benötigen, um diese wichtige Partnerschaft zu stärken und unsere gemeinsamen Interessen in der Region zu fördern."
 SOV_help_armenia: "Armenisch-Russische Union"
 SOV_help_armenia_desc: "Armenien war schon immer ein brüderliches christliches Land mit tiefen Verbindungen zu uns. Wir sind bereit, Armenien ein echtes Bündnis anzubieten, das auf Vertrauen und gegenseitiger Unterstützung beruht. Unsere Freundschaft wurzelt in einer jahrhundertealten gemeinsamen Geschichte."
 SOV_approach_iran: "Annäherung an Iran"
 SOV_approach_iran_desc: "Wir planen, dem Iran ein Bündnis anzubieten, das unsere Position in der Region deutlich stärken wird. Der Aufbau dieser Partnerschaft ist entscheidend, um Einfluss zu sichern und westlicher Einmischung entgegenzuwirken."
 SOV_proclamation_of_greater_russia: "Ausrufung Großrusslands"
 SOV_proclamation_of_greater_russia_desc: "Russland ist heute eine globale Supermacht, die Eurasien dominiert und die Weltpolitik prägt. Mit neu gewonnener Stärke werden wir dem Westen die Stirn bieten und unseren rechtmäßigen Platz auf der Weltbühne sichern."
 SOV_zhirinovsky_secure_central_asia: "Unterwerfung Zentralasiens fordern"
 SOV_zhirinovsky_secure_central_asia_desc: "Zentralasien gehörte schon immer zu unserer Einflusssphäre. Wir müssen die Region fest an uns binden, damit weder die Iraner noch die Chinesen dort Fuß fassen können. Unsere Vorherrschaft dort ist nicht verhandelbar."
 SOV_expand_welfare_programs: "Sozialprogramme ausweiten"
 SOV_expand_welfare_programs_desc: "Das russische Volk hat lange genug unter dem gescheiterten sowjetischen Gesundheitssystem gelitten. Es ist Zeit für eine nationale Erholung und den Ausbau der Sozialprogramme, um die Lebensqualität und die öffentliche Gesundheit zu verbessern."
 SOV_revive_the_great_idea: "Die russisch-griechische Brüderlichkeit"
 SOV_revive_the_great_idea_desc: "Die Westküste Anatoliens war historisch griechisch-orthodoxes Gebiet, das den Griechen von den Osmanen ungerecht genommen wurde. Wenn die Griechen es zurückfordern wollen, haben sie unsere volle Unterstützung. Diese Brüderlichkeit stärkt unseren Einfluss in der Region."
 SOV_zhirinovsky_attack_ruthenia: "Destabilisierung der Ukraine"
 SOV_zhirinovsky_attack_ruthenia_desc: "Die Ukraine verfolgt seit dem Zusammenbruch der UdSSR eine antirussische Politik. Wir können nicht zulassen, dass diese Region zu einer feindlichen Hochburg wird. Wir werden entschieden handeln, um diese Bedrohung ein für alle Mal zu neutralisieren."
 SOV_zhirinovsky_take_trans: "Transnistrisches Referendum"
 SOV_zhirinovsky_take_trans_desc: "Das anhaltende Problem mit Moldawien soll zu deren Kopfschmerz werden, denn wir nehmen Pridnestrowien unter unsere Kontrolle. Dieses Referendum wird unseren Anspruch legitimieren und unseren Einfluss ausweiten."
 SOV_question_of_poland: "Die Frage Polens"
 SOV_question_of_poland_desc: "Im August 2014 drohte Schirinowski damit, Polen mit Flächenbombardements zu überziehen – ein Ausdruck seiner aggressiven Haltung gegenüber diesem Land. Diese Drohung unterstreicht die Spannungen in unseren Beziehungen."
 SOV_syria_kurdistan_armenia_summit: "Gemeinsame Militärübungen"
 SOV_syria_kurdistan_armenia_summit_desc: "Unsere antitürkische Koalition wird gemeinsame Militärübungen durchführen, um die Kampffähigkeit Syriens, Kurdistans und Armeniens zu stärken. Diese Übungen bereiten uns auf koordinierte Verteidigungs- und Offensivoperationen vor."
 SOV_istanbul_is_constantinople: "Istanbul ist Konstantinopel"
 SOV_istanbul_is_constantinople_desc: "Es ist an der Zeit, die Kriegspläne des Anti-Türkei-Gipfels umzusetzen und verlorene Gebiete zurückzuerobern. Die Rückgabe Istanbuls an seine frühere Identität ist ein zentrales Ziel dieser Kampagne."
 SOV_crush_europe: "Europa zerschlagen"
 SOV_crush_europe_desc: "Europa bietet nur Globalisten, Dekadenz und moralischen Verfall. Wir werden diese Verderbtheit zerschlagen und die Ordnung wiederherstellen. Unsere Kampagne zielt auf das Herz des europäischen Niedergangs."
 SOV_treaty_with_turkmenistan: "Vertrag mit Turkmenistan"
 SOV_treaty_with_turkmenistan_desc: "Es besteht keine Notwendigkeit, gegen die Turkmenen zu kämpfen. Wir sind überzeugt, dass sie sich friedlich wieder mit unserem Imperium vereinen werden. Dieser Vertrag wird unsere Bindungen festigen und unseren Einfluss erweitern."
 SOV_co_op_wagner: "Prigoschin das Kommando geben"
 SOV_co_op_wagner_desc: "Da die Hauptfinanzierung von Jewgeni Prigoschin kommt, ist es nur logisch, ihn an die Spitze der PMCs zu setzen. Seine Führung wird für mehr Koordination und Effizienz sorgen."
 SOV_imperial_russian_lands: "Imperial-russische Ländereien"
 SOV_imperial_russian_lands_desc: "Der erste Schritt unseres Plans ist die Rückgewinnung der angestammten Gebiete, die während der kommunistischen Herrschaft verloren gingen. Mit Gottes Hilfe werden wir die früheren Territorien unseres Reiches wiederherstellen."
 SOV_claim_finland: "Anspruch auf Finnland"
 SOV_claim_finland_desc: "Finnlands Grenze liegt zu nah an Sankt Petersburg. Wir müssen sie nach Norden und Westen verschieben, so wie es schon Peter der Große tat, und die nordischen Staaten entscheidend schlagen, damit sie uns nie wieder bedrohen. Das ist lebenswichtig für unsere Sicherheit."
 SOV_zhirinovsky_secure_east_asia: "Asiatische Ambitionen"
 SOV_zhirinovsky_secure_east_asia_desc: "Die russische Diplomatie war immer komplex und vielschichtig. Wir müssen unseren Einfluss in Asien sichern und ausbauen, um unsere globale Stellung zu stärken. Ruhm für Russland!"
 SOV_demand_manchuria: "Zurück nach Scheltorossija"
 SOV_demand_manchuria_desc: "Es ist Zeit, das alte Projekt Gelbrussland wiederzubeleben. Wir sind bereit, von China die Gebiete zu fordern, die einst zum Russischen Reich gehörten. Dieser kühne Anspruch wird unseren Einfluss in der Mandschurei wiederherstellen."
 SOV_zheltoros: "Mongolisches Gouvernement"
 SOV_zheltoros_desc: "Die Mongolei diente lange als Puffer zwischen uns und China. Es ist Zeit, diese Regelung zu beenden und die Mongolei zu einem offiziellen Subjekt unseres Russischen Reiches zu machen, um unsere Grenzen und unsere Kontrolle zu stärken."
 SOV_expand_pacific_naval_presence: "Marinepräsenz im Pazifik ausbauen"
 SOV_expand_pacific_naval_presence_desc: "Durch den Ausbau des Schiffbaus im Fernen Osten können wir das regionale Wachstum fördern und eine stärkere Seemacht im gesamten Pazifik projizieren, wodurch wir unsere strategischen Ambitionen vorantreiben."
 SOV_avenge_tsushima: "Zushima rächen"
 SOV_avenge_tsushima_desc: "Der Russisch-Japanische Krieg von 1904–1905 war eine demütigende Niederlage für unsere Nation. Es ist Zeit, unsere Vorfahren zu rächen, indem wir Japan ein für alle Mal entscheidend besiegen."
 SOV_end_the_usa: "Die USA beenden"
 SOV_end_the_usa_desc: "Von moralischem Verfall bis globalem Terrorismus stellen die Vereinigten Staaten eine grundlegende Bedrohung für unser Überleben und für die Stabilität der Welt dar. Sie müssen zerstört werden, um unsere Zukunft zu sichern."
 SOV_side_with_the_people: "Auf der Seite des Volkes stehen"
 SOV_side_with_the_people_desc: "Jahrhundertelang wurden die einfachen Menschen von Eliten und kriminellen Mafias unterdrückt. Es ist Zeit, dieses Unrecht zu korrigieren und fest auf der Seite des Volkes zu stehen."
 SOV_purge_disloyal_oligarchs: "Illoyale Oligarchen säubern"
 SOV_purge_disloyal_oligarchs_desc: "Trotz unserer Bemühungen weigern sich einige Oligarchen, unsere Sache zu unterstützen. Wir werden ihnen Bedingungen anbieten, die sie nicht ablehnen können, und jene beseitigen, die sich uns in den Weg stellen."
 SOV_integrate_serbia: "Unionsstaat mit Serbien"
 SOV_integrate_serbia_desc: "Wir werden Serbien vorschlagen, das Projekt des Unionsstaates wiederzubeleben, das unsere Partei in den 1990er Jahren nachdrücklich unterstützt hat. Diese Union wird die Zusammenarbeit vertiefen und unsere strategische Position in Europa stärken."
 SOV_ensure_a_balance: "Ein Gleichgewicht sichern"
 SOV_ensure_a_balance_desc: "Die russische Gesellschaft ist hauptsächlich zwischen Eliten und einfachem Volk gespalten. Wir müssen ein empfindliches Gleichgewicht wahren und beide Gruppen unterstützen, da beide für die Stabilität des Landes wichtig sind."
 SOV_zhirinovsky_economic_policy: "Schirinowskis Wirtschaftspolitik"
 SOV_zhirinovsky_economic_policy_desc: "Jahrhunderte des Experimentierens mit Plan- und Marktwirtschaft haben gezeigt, dass ein gemischter Ansatz nötig ist, um Russlands Wirtschaft im 21. Jahrhundert voranzubringen."
 SOV_progressive_taxation: "Progressive Besteuerung"
 SOV_progressive_taxation_desc: "Ein Steuersystem, bei dem Besserverdienende einen größeren Prozentsatz zahlen, während Menschen mit geringem Einkommen weniger zahlen. Diese Politik fördert Fairness und sozialen Ausgleich."
 SOV_guarantee_the_people: "Dem Volk Garantien geben"
 SOV_guarantee_the_people_desc: "Das Volk ist die Grundlage der Macht Russlands – und auch unserer Macht. Wir müssen seine Unterstützung sichern, um unsere Autorität und Stabilität aufrechtzuerhalten."
 SOV_revitalize_russian_industrial_sector: "Den russischen Industriesektor wiederbeleben"
 SOV_revitalize_russian_industrial_sector_desc: "Die russische Industrie hat uns einst von einer Agrargesellschaft zu einer Raumfahrtnation gemacht. Mit den richtigen Investitionen und einer klugen Führung kann sie uns vom Industriezeitalter ins Informationszeitalter führen."
 SOV_increase_fossil_fuel_investments: "Investitionen in fossile Brennstoffe erhöhen"
 SOV_increase_fossil_fuel_investments_desc: "Trotz globalistischer Opposition bleiben fossile Brennstoffe unverzichtbar. Wir müssen massiv in diesen Sektor investieren, um Russlands Wohlstand und Energiesicherheit zu gewährleisten."
 SOV_idea_comp_industry: "Computerindustrie"
 SOV_idea_comp_industry_desc: "Unsere Wirtschaft ist veraltet. Unsere fähigen Wissenschaftler und Arbeiter müssen Computertechnologie nutzen, um Russlands Wirtschaft und militärisch-industriellen Komplex auf ein neues Niveau zu heben."
 SOV_increased_arms_exports: "Erhöhte Waffenexporte"
 SOV_increased_arms_exports_desc: "Russlands renommierte Rüstungsindustrie ist ein mächtiges Instrument, um weltweit Einfluss zu gewinnen. Wir müssen die Infrastruktur schaffen, um Waffenproduktion und -exporte auszuweiten."
 SOV_zhirinovsky_secure_baltics: "Das Baltikum sichern"
 SOV_zhirinovsky_secure_baltics_desc: "1991 drohte Schirinowski den baltischen Staaten mit extremen Maßnahmen, darunter die Entsorgung von Atommüll und Strahlungsangriffe. 2014 drohte er mit Flächenbombardements. Die Sicherung des Baltikums bleibt eine Priorität."
 SOV_arrest_zyuganov: "Sjuganow verhaften"
 SOV_arrest_zyuganov_desc: "Gennadi Sjuganow, Führer der Kommunistischen Partei, ist ein gefährlicher Gegner. Seine Verhaftung wird eine große Bedrohung für unsere Herrschaft neutralisieren."
 SOV_coopt_zyuganov: "Sjuganow vereinnahmen"
 SOV_coopt_zyuganov_desc: "Obwohl Sjuganow zur Opposition gehört, verfolgen wir ähnliche Ziele. Die Vereinigung unserer Kräfte könnte den Weg zu einem Größeren Russland stärken."
 SOV_supreme_leader: "Zum obersten Führer werden"
 SOV_supreme_leader_desc: "Wir können die absolute Macht übernehmen, ohne Kontrolle oder Gegengewicht, und mit unangefochtener Autorität herrschen."
 SOV_remain_president: "Präsident bleiben"
 SOV_remain_president_desc: "Wir verfügen bereits über nahezu absolute Macht; es besteht keine Notwendigkeit, weitere Veränderungen anzustreben."
 SOV_iron_regency: "Eiserne Regentschaft"
 SOV_iron_regency_desc: "Wir können zu einer Monarchie übergehen und einen Regentschaftsrat ernennen, der den Wandel während der Übergangszeit lenkt."
 SOV_make_russia_great_again: "Machen wir Russland wieder großartig!"
 SOV_make_russia_great_again_desc: "Russlands Größe wird wiederhergestellt werden, und wir werden alles in unserer Macht Stehende tun, um dieses Ziel zu erreichen."
 SOV_coopt_hyper_nationalists: "Ultranationalisten vereinnahmen"
 SOV_coopt_hyper_nationalists_desc: "Wir sollten uns mit dem radikal-nationalistischen Flügel unserer Partei verbünden und ihm mehr Macht in der Regierung einräumen."
 SOV_rva: "Eine russische Freiwilligenarmee aufstellen"
 SOV_rva_desc: "Angesichts der wachsenden Zahl nationalistischer Gruppen werden wir paramilitärische Einheiten in einer Russischen Freiwilligenarmee vereinen, die im Kriegsfall einsatzbereit ist."
 SOV_kill_western_opposition: "Die westliche Opposition töten"
 SOV_kill_western_opposition_desc: "Die Ultranationalisten fordern die Eliminierung der Opposition, die mit dem Westen verbündet ist. Wir sollten ihnen erlauben, diese Maßnahmen durchzuführen."
 SOV_amend_the_russian_constitution: "Die russische Verfassung ändern"
 SOV_amend_the_russian_constitution_desc: "Die Verfassung ist mit einigen Anpassungen an unsere Agenda akzeptabel."
 SOV_new_russian_status_quo: "Neuer russischer Status quo"
 SOV_new_russian_status_quo_desc: "Die Macht wurde konsolidiert; ein neues Establishment regiert nun Russland."
 SOV_decommunization: "Entkommunisierung"
 SOV_decommunization_desc: "Der Kommunismus hat Russland zerstört und Millionen Hunger, Diebstahl, Gefängnis und Tod gebracht. Wir werden dieses dunkle Erbe nicht länger ehren. Nieder mit dem Kommunismus!"
 SOV_embrace_monarchists: "Monarchisten einbinden"
 SOV_embrace_monarchists_desc: "Die Unterstützung für die Monarchie wächst. Wir sollten Monarchisten einladen, sich unserer Partei und unserem Einflussbereich anzuschließen."
 SOV_condemn_the_partition_of_india: "Indisch-russischer Freundschaftsvertrag"
 SOV_condemn_the_partition_of_india_desc: "Indien und Russland haben sich historisch gemeinsam gegen den Westen gestellt. Unser Hauptgegner ist nun China, dessen Aufstieg uns existenziell bedroht."
 SOV_praise_china: "Chinesisch-russischer Freundschaftsvertrag"
 SOV_praise_china_desc: "China und Russland haben sich gegen die westlichen Mächte zusammengeschlossen. Unser wichtigster Gegner ist Indien, dessen wachsender Einfluss eine Bedrohung darstellt."
 SOV_reconcile_the_cprf: "Uns mit der KPRF aussöhnen"
 SOV_reconcile_the_cprf_desc: "Wir teilen viele Ziele mit der Kommunistischen Partei. Vielleicht können wir sie auf unsere Seite ziehen und vergangene Spaltungen überwinden."
 SOV_support_workers_rights: "Arbeiterrechte unterstützen"
 SOV_support_workers_rights_desc: "Arbeiter sind ein wesentlicher Teil unserer Nation. Wir müssen Reformen umsetzen, um ihre Rechte zu stärken, selbst wenn dies die Produktivität beeinträchtigt."
 SOV_social_conservatism: "Sozialkonservatismus"
 SOV_social_conservatism_desc: "Der Sozialkonservatismus befürwortet die staatliche Durchsetzung traditioneller Werte, da diese als essenziell für den Erhalt von Zivilisation und Anstand angesehen werden."
 SOV_ally_national_bolsheviks: "Mit den Nationalbolschewiken verbünden"
 SOV_ally_national_bolsheviks_desc: "Die Nationalbolschewiken sind eine lautstarke, extrem rechte nationalistische Gruppe. Sie könnten zu einem nützlichen politischen Verbündeten werden."
 SOV_national_bolshevik_thought: "Nationalbolschewistisches Denken"
 SOV_national_bolshevik_thought_desc: "Die nationalbolschewistische Ideologie verbindet Nationalismus mit bolschewistischen Prinzipien, um ein Großrussland zu verwirklichen."
 SOV_national_bolshevik_cooperation: "Zusammenarbeit mit den Nationalbolschewiken"
 SOV_national_bolshevik_cooperation_desc: "Wir haben die Zusammenarbeit mit den Nationalbolschewiken gesichert, um die nationalistische Unterstützung zu monopolisieren und unsere Bewegung zu stärken."
 SOV_national_bolshevik_coup: "Koalition mit den Nationalbolschewiken"
 SOV_national_bolshevik_coup_desc: "Eine Koalition mit dieser großen Oppositionspartei zuzulassen, wird den Druck mindern und unsere Kontrolle festigen."
 SOV_absolute_monarchy: "Absolute Monarchie"
 SOV_absolute_monarchy_desc: "Eine Monarchie ohne verfassungsrechtliche Einschränkungen ist der beste Weg zu starker Führung."
 SOV_constitutional_monarchy: "Konstitutionelle Monarchie"
 SOV_constitutional_monarchy_desc: "Absolute Macht korrumpiert. Eine gewisse Begrenzung der Macht des Monarchen ist nötig, damit sich die Fehler der Romanows nicht wiederholen."
 SOV_empower_the_romanovs: "Die Romanows ehren"
 SOV_empower_the_romanovs_desc: "Die Romanow-Dynastie herrschte jahrhundertelang über Russland, bis sie ungerecht von den Bolschewiki gestürzt wurde. Wir sollten ihr Vermächtnis und ihre Errungenschaften ehren."
 SOV_zhirinovsky_iron_regent: "Die Krone beanspruchen"
 SOV_zhirinovsky_iron_regent_desc: "Die Revolution von 1917 stürzte Russland ins Chaos. Wladimir Schirinowski, dazu bestimmt, der nächste Zar zu werden, wird die Ordnung wiederherstellen und die tiefsten Krisen der Nation lösen."
 SOV_compromise_with_old_believers: "Kompromiss mit den Altgläubigen"
 SOV_compromise_with_old_believers_desc: "Die Altgläubigen lehnen Patriarch Kirill ab. Wir sollten einen religiösen Kompromiss finden und möglicherweise einen neuen Patriarchen ernennen, der für sie als Staatsreligion akzeptabel ist."
 SOV_crush_old_believers: "Die Altgläubigen zerschlagen"
 SOV_crush_old_believers_desc: "Die Altgläubigen weigern sich, Patriarch Kirill anzuerkennen. Wir müssen sie unterdrücken, um unsere eigene Staatsreligion zu etablieren."
 SOV_the_third_rome_desc: "Moskau, das Dritte Rom, ist die Vorstellung, dass Moskau der Nachfolger des antiken Rom und von Byzanz sei und das Erbe des Römischen Reiches fortführe. Dieses Konzept wurde in der europäischen Geschichte immer wieder diskutiert – insbesondere hinsichtlich der Frage, welche Stadt dieses Erbe rechtmäßig innehat."
 SOV_unity_of_church_and_state: "Einheit von Kirche und Staat"
 SOV_unity_of_church_and_state_desc: "Die Orthodoxie ist das Fundament der russischen Nation. Ohne ihre Unterstützung ist die Herrschaft über unser weites Reich unmöglich. Wir werden die Religion entsprechend in die Staatsführung integrieren."
 SOV_god_save_the_tsar: "Bozhe, Tsarya Khrani!"
 SOV_god_save_the_tsar_desc: "Gott schütze den Zaren!"
 SOV_yavlinsky: "Grigori Jawlinski"
 SOV_yavlinsky_desc: "Grigori Jawlinski (geboren 1952) war zu Beginn der 1990er Jahre als Verfasser des „500-Tage-Programms“ an den sowjetischen Wirtschaftsreformen beteiligt. Er führt das sozialliberale Bündnis Jabloko und erhielt 1996 7,3 % der Stimmen. Seine Unterstützung stammt hauptsächlich aus städtischen und bürgerlichen Wählerschichten, und außenpolitisch vertritt er einen westfreundlichen Kurs."
 SOV_maintain_good_relationships_with_central_asia: "Freundschaft mit Zentralasien bewahren"
 SOV_maintain_good_relationships_with_central_asia_desc: "Mit den Nationen Zentralasiens verbindet uns eine kulturelle und historische Freundschaft, geeint durch eine gemeinsame bolschewistische Vergangenheit. Es ist Zeit, diese engen Bande wiederzubeleben und weitere Zusammenarbeit auszuloten."
 SOV_befriend_india: "Indien annähern"
 SOV_befriend_india_desc: "Die Sowjetunion unterstützte die indische Unabhängigkeit. Nun ist der Moment gekommen, diese Freundschaft neu zu beleben und unsere Partnerschaft zu stärken."
 SOV_befriend_pakistan: "Pakistan annähern"
 SOV_befriend_pakistan_desc: "Obwohl wir während des Kalten Krieges Indien unterstützt haben, müssen wir an dieser Linie nicht länger festhalten. Pakistan bietet für unsere Interessen die bessere strategische Partnerschaft."
 SOV_support_israel: "Israel unterstützen"
 SOV_support_israel_desc: "Unser Land blickt auf eine lange Geschichte der Beziehungen zu Israel und seinem Volk zurück. Wir sollten diese Freundschaft weiter pflegen."
 SOV_support_palestine: "Palästina unterstützen"
 SOV_support_palestine_desc: "Die Araber leiden seit vielen Jahren unter israelischer Unterdrückung. In diesen schwierigen Zeiten müssen wir an ihrer Seite stehen."
 SOV_pressure_the_persians: "Iran angreifen"
 SOV_pressure_the_persians_desc: "Die iranischen Mullahs stellen die letzte Bastion von Autokratie, Korruption und Extremismus in unserer Region dar. Ihre Beseitigung ist für den russischen und weltweiten Frieden sowie die Sicherheit von entscheidender Bedeutung und wird zugleich die Demokratie im unruhigen Nahen Osten fördern."
 SOV_honor_victims_of_repression: "Der Opfer der Repression gedenken"
 SOV_honor_victims_of_repression_desc: "Sowjetische Säuberungen, Hungersnöte und Staatsterror trafen Millionen und betrafen nahezu jeden russischen Haushalt. Wir dürfen diese Opfer niemals vergessen. Nie wieder."
 SOV_a_pragmatic_approach: "Ein pragmatischer Ansatz"
 SOV_a_pragmatic_approach_desc: "So wünschenswert Demokratie auch sein mag, ein direkter Übergang von der kommunistischen Diktatur zur kapitalistischen Demokratie wird nicht funktionieren. Eine Schocktherapie würde unseren fragilen neuen Staat zerschlagen."
 SOV_democratic_idealism: "Demokratischer Idealismus"
 SOV_democratic_idealism_desc: "Es ist Zeit, die Geister der Vergangenheit hinter uns zu lassen und demokratische Reformen um jeden Preis voranzutreiben."
 SOV_respect_soviet_legacy: "Das sowjetische Erbe achten"
 SOV_respect_soviet_legacy_desc: "Unsere Geschichte ist unsere Geschichte. Sie zu ignorieren oder zu hassen ist selbstzerstörerisch. Wir sollten die sowjetische Vergangenheit für ihre Leistungen achten, ohne ihre Fehler zu vergessen."
 SOV_decommunize_russian_society: "Die russische Gesellschaft entkommunisieren"
 SOV_decommunize_russian_society_desc: "Der Kommunismus ist gefallen. Wir sollten seine Symbole und Bilder entfernen, um nationalistischer und neokommunistischer Rhetorik keinen weiteren Nährboden zu bieten."
 SOV_rehabilitate_purged_figures: "Gesäuberte Persönlichkeiten rehabilitieren"
 SOV_rehabilitate_purged_figures_desc: "Viele fähige und loyale Menschen wurden zu Sowjetzeiten gesäubert und aus der Geschichte getilgt. Wir müssen ihrer gedenken und ihr Vermächtnis bewahren."
 SOV_reconcile_the_cprf_2: "Mit der KPRF aussöhnen"
 SOV_reconcile_the_cprf_2_desc: "Die Kommunistische Partei der Russischen Föderation bleibt eine starke politische Kraft. Eine Aussöhnung mit ihr ist der einzige Weg, als legitime Regierung wahrgenommen zu werden."
 SOV_ostracize_the_cprf: "Die KPRF ausgrenzen"
 SOV_ostracize_the_cprf_desc: "Die KPRF ist der sterbende Überrest des alten sowjetischen Systems. Wir sollten sie aus der respektablen Gesellschaft ausschließen."
 SOV_foster_multi_party_democracy: "Konvent für ein demokratisches Russland"
 SOV_foster_multi_party_democracy_desc: "Da nationalistische und kommunistische Opposition ausgeschaltet wurde, ist es an der Zeit, einen landesweiten Konvent einzuberufen, um die Regeln und Normen für ein neues demokratisches Russland festzulegen."
 SOV_economic_bill_of_rights: "Wirtschaftliche Grundrechte"
 SOV_economic_bill_of_rights_desc: "Um Leben, Freiheit und das Streben nach Glück genießen zu können, brauchen die Menschen grundlegende wirtschaftliche Freiheiten. Niemand sollte wegen Armut dieser Rechte beraubt werden. Wir brauchen einen Katalog wirtschaftlicher Grundrechte, um die Bürger vor den Exzessen des Kapitalismus zu schützen."
 SOV_influence_central_asian_change: "Veränderungen in Zentralasien beeinflussen"
 SOV_influence_central_asian_change_desc: "Zentralasien wird von korrupten Autokraten beherrscht. Ohne unser Eingreifen werden diese Nationen aus unserem Einflussbereich abdriften."
 SOV_join_nato: "Sich zur NATO bekennen"
 SOV_join_nato_desc: "Der Kalte Krieg ist vorbei, und unsere Lage ist schwierig. Als Demokratie sollten wir uns mit anderen Demokratien verbünden, um unser Überleben zu sichern."
 SOV_pan_eurasian_infrastructure: "Eurasisches Infrastrukturprogramm"
 SOV_pan_eurasian_infrastructure_desc: "Russlands Infrastruktur ist in schlechtem Zustand. Wir müssen Straßen, Brücken, Eisenbahnen und andere Projekte bauen, um die Wirtschaft anzukurbeln."
 SOV_status_quo: "Den koreanischen Status quo bewahren"
 SOV_status_quo_desc: "Eine stabile koreanische Halbinsel dient Russlands Interessen am besten. Wenn Veränderungen kommen müssen, dann schrittweise und kontrolliert, nicht chaotisch."
 SOV_strengthen_relations_with_north: "Beziehungen zum Norden stärken"
 SOV_strengthen_relations_with_north_desc: "Nordkorea ist unser Verbündeter, seit wir während des Koreakriegs MiG-15 geliefert haben. Auf 80 Jahre Freundschaft!"
 SOV_encourage_economic_reforms: "Nordkoreanische Wirtschaftsreformen fördern"
 SOV_encourage_economic_reforms_desc: "In einer globalisierten Welt hat Russland noch immer einen abgeschotteten, unterentwickelten Verbündeten. Das liegt nicht in unserem Interesse."
 SOV_expand_business_with_south: "Geschäfte mit Südkorea ausweiten"
 SOV_expand_business_with_south_desc: "Südkorea verfügt über Kapital und Fachwissen, während wir Ressourcen und Arbeitskraft besitzen. Diese Partnerschaft kann Russlands Interessen nur zugutekommen und unseren Einfluss vergrößern."
 SOV_export_more_energy: "Mehr Energie nach Südkorea exportieren"
 SOV_export_more_energy_desc: "Südkoreas Wirtschaft ist stark. Eine Versorgung mit Energie verbessert unsere geopolitische Position und unseren Einfluss."
 SOV_support_peaceful_korean_unification: "Friedliche koreanische Wiedervereinigung unterstützen"
 SOV_support_peaceful_korean_unification_desc: "Eine friedliche Wiedervereinigung würde einen riesigen nördlichen Markt, eine starke südliche Wirtschaft und eine neue Regionalmacht schaffen und so helfen, den Einfluss der USA und Chinas auszubalancieren."
 SOV_east_asia_in_democracy: "Ostasien demokratisieren"
 SOV_east_asia_in_democracy_desc: "Ostasien, insbesondere China und Nordkorea, sind die letzten kommunistischen Hochburgen. Unsere Politik sollte sich darauf konzentrieren, diese Völker zu befreien und den Kommunismus endgültig in die Geschichte zu verbannen."
 SOV_expand_trade_with_taiwan: "Handel mit Taiwan ausweiten"
 SOV_expand_trade_with_taiwan_desc: "Taiwan produziert fortschrittliche Halbleiter und andere Hochtechnologieprodukte. Ein Ausbau des Handels dient unseren Interessen und stärkt unseren Einfluss."
 SOV_support_taiwan_military_buildup: "Taiwans militärische Aufrüstung unterstützen"
 SOV_support_taiwan_military_buildup_desc: "Um chinesische Aggression abzuschrecken, sollten wir Taiwan beim Ausbau seiner Verteidigung helfen."
 SOV_support_south_led_unification: "Von Süden geführte Wiedervereinigung unterstützen"
 SOV_support_south_led_unification_desc: "Die Zukunft Koreas liegt in Seoul."
 SOV_export_military_hardware_to_south_korea: "Militärgerät in den Süden exportieren"
 SOV_export_military_hardware_to_south_korea_desc: "Südkorea benötigt Unterstützung, um die Halbinsel zu vereinen. Wir sollten militärisches Gerät liefern, um ihnen dabei zu helfen."
 SOV_behead_autocratic_dragons: "Autokratische Drachen köpfen"
 SOV_behead_autocratic_dragons_desc: "Totalitäre Staaten sind bösartige Drachen. Schlagt ihnen die Köpfe ab, ruft „Verwüstung!“ und entfesselt die Hunde des Krieges!"
 SOV_ignite_second_korean_war: "Den Zweiten Koreakrieg entfachen"
 SOV_ignite_second_korean_war_desc: "Das nordkoreanische Regime ist ein veraltetes stalinistisches Relikt, das auf den Müllhaufen der Geschichte gehört. Wenn Südkorea die Halbinsel mit Gewalt vereinen will, hat es unsere volle Unterstützung."
 SOV_outer_space_initiative: "Entwicklung von Roskosmos"
 SOV_outer_space_initiative_desc: "Russlands Ambitionen im Weltraum erfordern ein finanziell stabiles und verlässliches Roskosmos, das unsere Erforschung und technologischen Anstrengungen anführt."
 SOV_finish_1998_reforms: "Die Militärreformen von 1998 abschließen"
 SOV_finish_1998_reforms_desc: "Die unter Verteidigungsminister Igor Sergejew eingeleiteten Reformen von 1998 klassifizierten Einheiten entweder als kampfbereit oder als Friedenszeit-Einheiten und wandelten andere in Ausrüstungs-Lagerbasen um. Auch die Luft- und Weltraumstreitkräfte wurden neu organisiert."
 SOV_2001_military_reforms: "Militärreformen beginnen"
 SOV_2001_military_reforms_desc: "Verteidigungsminister Sergei Iwanow kündigte Reformen an, die freiwillige Einheiten dauerhaft kampfbereit machen, während das Wehrpflichtsystem beibehalten wird."
 SOV_black_gussard: "Schwarze Husaren"
 SOV_black_gussard_desc: "Die 15. selbständige Gardemotorschützenbrigade Alexandrien ist die einzige Friedensbrigade der russischen Landstreitkräfte."
 SOV_2008_military_reforms: "Militärreformen fortsetzen"
 SOV_2008_military_reforms_desc: "Das Verteidigungsministerium beschloss eine weitere Verkleinerung der Streitkräfte, um durch geringere Truppenstärke größere strategische und taktische Flexibilität zu erreichen."
 SOV_increased_arms_exports_2: "Erhöhte Waffenexporte"
 SOV_increased_arms_exports_2_desc: "Waffenexporte sind seit langem ein wichtiger Bestandteil der russischen Wirtschaft. Einnahmen aus diesen Geschäften werden unsere heimische Wirtschaft stärken – auch wenn einige Waffen möglicherweise in zweifelhafte Hände gelangen."
 SOV_reserve_officer_training_system: "Reserveoffiziers-Ausbildungssystem"
 SOV_reserve_officer_training_system_desc: "Unser veraltetes Ausbildungssystem für Reserveoffiziere muss reformiert werden, um das Personal durch bessere militärische Bildung vorzubereiten."
 SOV_coastal_fleet_reforms: "Reformen der Küstenflotte"
 SOV_form_the_uac: "Die UAC gründen"
 SOV_form_the_uac_desc: "Die am 20. Februar 2006 gegründete United Aircraft Corporation vereint führende Flugzeughersteller, um Produktion zu optimieren und Verluste zu reduzieren."
 SOV_roscosmos_intel: "Satellitenkonstellation"
 SOV_roscosmos_intel_desc: "Wir werden ein aktives Netzwerk von Aufklärungssatelliten einsetzen, um unsere Streitkräfte mit wichtigen Informationen zu versorgen."
 SOV_airforce_structure_change: "Strukturreformen"
 SOV_airforce_structure_change_desc: "Personalreformen werden durchgeführt, um die Rangstruktur unserer Luftwaffe zu modernisieren."
 SOV_fighter_production: "Produktion von Jagdflugzeugen stärken"
 SOV_fighter_production_desc: "Mehr Jäger bedeuten einen sichereren und friedlicheren Himmel."
 SOV_uav_production: "Drohnenproduktion ausbauen"
 SOV_uav_production_desc: "Wir streben an, Drohnen weit verbreitet in unseren Streitkräften einzusetzen."
 SOV_bombers_production: "Bomberproduktion erhöhen"
 SOV_bombers_production_desc: "Unsere Feinde werden von der Macht unserer Bomber überwältigt werden."
 SOV_pakfa: "PAKFA"
 SOV_pakfa_desc: "Unsere Jagdflugzeuge der SU-Serie gehören zu den besten der Welt."
 SOV_pakda: "PAKDA"
 SOV_pakda_desc: "Die PAKDA-Serie umfasst einige der modernsten Bomber der Welt."
 SOV_radioelectronic_warfare: "Elektronische Kampfführung"
 SOV_radioelectronic_warfare_desc: "Diese Einheiten dominieren den elektromagnetischen Raum, schützen unsere Systeme vor feindlicher Störung und unterbrechen feindliche Kommunikation."
 SOV_modernize_soviet_missile_stockpiles: "Verbesserung der Raketensilos"
 SOV_modernize_soviet_missile_stockpiles_desc: "Unsere Raketensilos sind veraltet und müssen dringend modernisiert werden."
 SOV_missile_defense_investments: "Flugabwehrraketentruppen"
 SOV_missile_defense_investments_desc: "Diese Truppen schützen wichtige Einrichtungen und Einheiten vor feindlichen Luftangriffen."
 SOV_hypersonic_missiles: "Hyperschallraketen"
 SOV_hypersonic_missiles_desc: "Hyperschallraketen fliegen schneller als Mach 5 und lassen dem Gegner keine Zeit zur Entdeckung oder Reaktion."
 SOV_russian_airspace_forces: "Russische Luft- und Raumfahrtstreitkräfte"
 SOV_russian_airspace_forces_desc: "Nach einer Phase des Niedergangs ist unsere Luftwaffe nun wieder ausgerüstet und bereit, die Luftherrschaft zurückzuerobern."
 SOV_space_forces_improvement: "Mehr Investitionen in die Luftfahrt"
 SOV_space_forces_improvement_desc: "Wir werden die Finanzierung unserer Weltraumtruppen erhöhen."
 SOV_mechanized_infantry_renovations: "„Armata“ für APCs und IFVs einsetzen"
 SOV_mechanized_infantry_renovations_desc: "Unsere mechanisierte Infanterie nutzt derzeit veraltete sowjetische Schützenpanzer und Transportpanzer, die modernisiert werden müssen."
 SOV_armata_universal_combat_platform: "Armata-Universalplattform"
 SOV_armata_universal_combat_platform_desc: "Die Armata-Plattform ist ein modulares, schweres Kettenfahrzeug der nächsten Generation, das ältere Panzer und Transportfahrzeuge ersetzen soll."
 SOV_reform_army: "Neue Armeereform"
 SOV_reform_army_desc: "Es ist an der Zeit, unsere Armee zu modernisieren, um den Anforderungen moderner Kriegsführung gerecht zu werden."
 SOV_armyreform_spec: "Spezialkräfte sind unsere Stärke"
 SOV_armyreform_spec_desc: "Wir werden unsere Spezialkräfte erweitern und ihre Ausbildung sowie Ausrüstung verbessern."
 SOV_mto: "Logistiktruppen schaffen"
 SOV_mto_desc: "Die Logistiktruppen leisten technische und logistische Unterstützung für alle Teilstreitkräfte."
 SOV_arta: "Artillerie ist der Gott des Krieges"
 SOV_arta_desc: "Wir werden das sowjetische Prinzip der Artillerieüberlegenheit beibehalten und sicherstellen, dass unsere Artillerie weiterhin die beste bleibt."
 SOV_mechanize: "Mechanisierung der Armee"
 SOV_mechanize_desc: "Unsere Armee muss mobil und mechanisiert sein, und wir werden alle Anstrengungen unternehmen, um dieses Ziel zu erreichen."
 SOV_bmpt: "BMPT Terminator"
 SOV_ratnik_program: "Das Ratnik-Programm"
 SOV_ratnik_program_desc: "Ratnik ist ein modernes Gefechtsausrüstungssystem, das die Überlebensfähigkeit und Kampfkraft einzelner Soldaten durch fortschrittliche Technologie verbessert."
 SOV_csto_training_exercises: "OVKS-Ausbildungsübungen"
 SOV_csto_training_exercises_desc: "Unser Bündnis bleibt durch regelmäßige gemeinsame Manöver und Trainings stark."
 SOV_rosgvardia: "Die Rosgwardija gründen"
 SOV_rosgvardia_desc: "Die Nationalgarde Russlands ist eine unabhängige innere Militärtruppe, die für Grenzsicherung, Terrorismusbekämpfung, Waffenaufsicht und öffentliche Ordnung zuständig ist."
 SOV_rosguard_start_org: "Mit der Bildung von Brigaden beginnen"
 SOV_rosguard_start_org_desc: "Es ist Zeit, mit der Aufstellung der ersten Brigaden zu beginnen."
 SOV_rosguard_armor: "Neue gepanzerte Fahrzeuge"
 SOV_rosguard_armor_desc: "Im Zuge der Reformen wird die Nationalgarde neue gepanzerte Fahrzeuge erhalten, um ihre Kampffähigkeit zu verbessern."
 SOV_rosguard_military: "Kommando der Nationalgardetruppen"
 SOV_rosguard_military_desc: "Diese staatliche Militärorganisation sorgt für öffentliche und staatliche Sicherheit und entwickelte sich aus den Inneren Truppen des Innenministeriums."
 SOV_rosguard_occup: "Umwandlung von OMON und SOBR"
 SOV_rosguard_occup_desc: "OMON- und SOBR-Einheiten werden in die Nationalgarde integriert, wobei Personal und Ausrüstung erweitert und modernisiert werden."
 SOV_rosguard_tank: "Rosgwardija den Einsatz von Panzern erlauben"
 SOV_rosguard_tank_desc: "Nach dem Prigoschin-Aufstand sind wir bereit, die Rosgwardija mit Panzern auszustatten."
 SOV_form_bars: "BARS aufstellen"
 SOV_form_bars_desc: "Die besondere Gefechtsarmee-Reserve (BARS) besteht aus Zehntausenden frischer Reservisten, die in Wehrersatzämtern eine strenge Auswahl durchlaufen und Verträge mit dem Verteidigungsministerium unterzeichnet haben. Bevorzugt werden kürzlich Entlassene, die wichtige militärische Fähigkeiten in Schlüsselspezialisierungen bewahrt haben."
 SOV_reorganize_airforce: "Die Luftwaffe reorganisieren"
 SOV_reorganize_airforce_desc: "Unsere Luftwaffe befindet sich in schlechtem Zustand. Eine Reihe großer Reformen wird sie wieder in bessere Verfassung bringen."
 SOV_missile_development: "Strategische Raketentruppen"
 SOV_missile_development_desc: "Diese Truppen gewährleisten die ständige Gefechtsbereitschaft der nuklearen Abschreckung und sind zu massiven oder gezielten Atomschlägen fähig. Sie bilden den Kern unserer militärischen und wirtschaftlichen Stärke, und alle russischen Interkontinentalraketen unterstehen ihrem Kommando."
 SOV_avtovaz: "AVTOVAZ"
 SOV_avtovaz_desc: "AvtoVAZ ist ein führender russischer Automobilhersteller, der 1966 gegründet wurde. Ursprünglich war das Unternehmen als VAZ bekannt, was auf Russisch für Wolga-Automobilwerk steht. AvtoVAZ ist vor allem für die ikonische Lada-Reihe bekannt, einen festen Bestandteil der russischen Automobilgeschichte."
 SOV_gaz: "GAZ"
 SOV_gaz_desc: "GAZ, oder Gorkowski Awtomobilny Sawod, ist ein bedeutender russischer Automobilhersteller mit Sitz in Nischni Nowgorod, das früher Gorki hieß. Das Unternehmen bildet die Kern-Tochter der GAZ Group Holding, die wiederum Teil des größeren Industriekonglomerats Basic Element ist."
 SOV_rostech: "Rostech"
 SOV_rostech_desc: "Rostec ist ein staatlicher Verteidigungskonzern, der sich der Entwicklung, Produktion und dem Export moderner Technologien widmet."
 SOV_rosoboronprom: "Rosoboronprom"
 SOV_rosoboronprom_desc: "Rosoboronprom ist Russlands staatlicher Exporteur von Militärprodukten, Dual-Use-Technologien und entsprechenden Dienstleistungen."
 SOV_kbp: "KBP"
 SOV_kbp_desc: "KBP ist ein führendes russisches Rüstungsunternehmen mit Sitz in Tula, das sich auf Waffenentwicklung spezialisiert hat."
 SOV_tula_arms: "Tula Arms"
 SOV_tula_arms_desc: "Das 1712 von Peter dem Großen gegründete Tulaer Waffenwerk hat eine lange Tradition in der Herstellung von Waffen für Russland."
 SOV_orsis: "Orsis"
 SOV_orsis_desc: "Orsis mit Sitz in Moskau produziert Präzisionsgewehre für militärische und zivile Zwecke."
 SOV_lobaev_arms: "Lobaev Arms"
 SOV_lobaev_arms_desc: "Lobaev Arms entwickelt und produziert Präzisionsgewehre und Munition und hat seinen Sitz in der Oblast Kaluga."
 SOV_kamaz: "KAMAZ"
 SOV_kamaz_desc: "KAMAZ, gegründet 1969, ist ein bedeutender russischer Hersteller von Lastwagen, Bussen und Motoren mit Hauptsitz in Nabereschnyje Tschelny. Das Unternehmen ist für seine zuverlässigen Frontlenker-Lkw bekannt, die sowohl im Inland als auch international weit verbreitet sind."
 SOV_aurus: "AURUS"
 SOV_aurus_desc: "Aurus Motors ist eine russische Luxusautomarke, die im Jahr 2000 gegründet wurde. Ursprünglich für staatliche Fahrzeugkolonnen entwickelt, hat Aurus sich inzwischen mit hochwertigen Modellen auf den Luxusautomarkt ausgeweitet."
 SOV_focus_on_luxury_cars: "Auf Luxusfahrzeuge setzen"
 SOV_focus_on_luxury_cars_desc: "Das russische Volk verdient mehr als nur einen weiteren erschwinglichen Lada. Wir müssen die Aurus-Modellpalette erweitern und das Wachstum anderer Luxusautomarken fördern, um Russlands Ansehen in der Automobilwelt zu steigern."
 SOV_focus_on_affordable_cars: "Auf erschwingliche Autos setzen"
 SOV_focus_on_affordable_cars_desc: "Russland ist derzeit stark auf importierte Fahrzeuge angewiesen. Um unseren Binnenmarkt zu stärken, müssen wir die Produktion erschwinglicher russischer Autos steigern und sicherstellen, dass jeder Bürger ein Fahrzeug aus heimischer Produktion besitzen kann."
 SOV_revitalized_automobile_industry: "Wiederbelebte Automobilindustrie"
 SOV_revitalized_automobile_industry_desc: "Nach kostspieligen Modernisierungs- und Ausbauprogrammen hat unsere Automobilindustrie endlich wieder ein respektables Niveau bei Produktion und Qualität erreicht. Diese Wiederbelebung markiert einen wichtigen Meilenstein beim Wiederaufbau unserer Wirtschaft."
 SOV_economic_programs: "Wirtschaftsreformen"
 SOV_economic_programs_desc: "Nach dem Zusammenbruch der UdSSR und den Turbulenzen der 1990er Jahre bedarf Russlands Wirtschaft weiterhin umfassender Reformen und einer Erneuerung. Unser Ziel ist es, Stabilität wiederherzustellen und nachhaltiges Wachstum zu fördern."
 SOV_uralvagonzavod: "Uralwagonsawod"
 SOV_uralvagonzavod_desc: "Uralwagonsawod ist ein bedeutendes russisches Maschinenbauunternehmen mit Sitz in Nischni Tagil. Es zählt zu den größten Industriekomplexen Russlands und gilt als weltweit führender Hersteller von Kampfpanzern."
 SOV_national_center_for_aviabuilding: "Nationales Zentrum für Flugzeugbau"
 SOV_national_center_for_aviabuilding_desc: "Die russische Luftfahrtindustrie gehört weiterhin zu unseren vielversprechendsten Sektoren. Investitionen in dieses Feld sind unverzichtbar, um unsere Stellung als führende Macht in der Luft- und Raumfahrttechnologie zu sichern."
 SOV_domestic_helicopter_production: "Inländische Hubschrauberproduktion"
 SOV_domestic_helicopter_production_desc: "Russlands Hubschrauberindustrie blickt auf eine stolze Tradition in der Entwicklung und Herstellung einiger der fortschrittlichsten Hubschrauber der Welt zurück. Fortgesetzte Investitionen sind entscheidend, um diesen Erfolg zu bewahren und auszubauen."
 SOV_heavy_industry_investments: "Investitionen in die Schwerindustrie"
 SOV_heavy_industry_investments_desc: "Die Schwerindustrie war das Rückgrat der sowjetischen Wirtschaft. Eine Wiederbelebung dieses Sektors durch gezielte Investitionen ist entscheidend, um Russlands wirtschaftliches Fundament zu stärken."
 SOV_refined_metallurgy: "Veredelte Metallurgie"
 SOV_refined_metallurgy_desc: "Die Metallurgie ist eine strategische Branche von zentraler Bedeutung für unsere nationale Entwicklung. Wir müssen massiv investieren, um diesen Sektor auszubauen und zu modernisieren, damit er den künftigen Anforderungen gerecht wird."
 SOV_expand_tungsten_mining: "Wolframförderung ausweiten"
 SOV_expand_tungsten_mining_desc: "Wolfram ist ein seltenes Metall mit einzigartigen Eigenschaften, darunter außergewöhnliche Härte und hohe Dichte. Diese Merkmale machen es für militärische Anwendungen wie panzerbrechende Geschosse unverzichtbar. Ein Ausbau der Wolframförderung wird unsere Rohstoffbasis stärken."
 SOV_expand_iron_mining: "Stahlproduktion ausweiten"
 SOV_expand_iron_mining_desc: "Stahl, eine Legierung aus Eisen und Kohlenstoff, ist aufgrund seiner Festigkeit und Haltbarkeit für Bauwesen, Infrastruktur, Transport, Maschinenbau und Bewaffnung unverzichtbar. Eine Steigerung der Stahlproduktion ist für nationale Entwicklung und Verteidigung von zentraler Bedeutung."
 SOV_expand_gold_mining: "Goldförderung ausweiten"
 SOV_expand_gold_mining_desc: "Gold ist nicht nur wegen seines wirtschaftlichen Werts begehrt, sondern auch wegen seiner industriellen Nutzung in korrosionsbeständigen elektrischen Kontakten, Infrarotabschirmung, farbigem Glas und der Zahnmedizin. Eine Ausweitung der Goldförderung wird sowohl unsere Wirtschaft als auch unsere technologischen Fähigkeiten stärken."
 SOV_expand_aluminium_mining: "Aluminiumförderung ausweiten"
 SOV_expand_aluminium_mining_desc: "Aluminium ist ein leichtes, haltbares Metall, das in Transportwesen, Maschinenbau, Bauwesen und Verpackung breit eingesetzt wird. Es ist insbesondere für den Flugzeugbau von entscheidender Bedeutung. Ein Ausbau der Aluminiumförderung wird Schlüsselsektoren und technologischen Fortschritt unterstützen."
 SOV_industrial_expansion_plan: "Plan zur industriellen Expansion"
 SOV_industrial_expansion_plan_desc: "Die schwere Wirtschaftskrise der späten 1990er Jahre hinterließ Russland mit hoher Arbeitslosigkeit und weitverbreiteter Armut. Dies war das Ergebnis einer raschen Privatisierung sowie einer Abwanderung qualifizierter Arbeitskräfte und Unternehmen in den Westen. Die 2000er Jahre müssen sich auf den Wiederaufbau der zivilen Industrie konzentrieren, um den Binnen- und Außenhandel zu beleben."
 SOV_domestic_aircraft_production: "Inländische Flugzeugproduktion"
 SOV_domestic_aircraft_production_desc: "Russland besitzt eine bedeutende Tradition in der Herstellung hochwertiger Flugzeuge. Um unsere führende Rolle in der Luft- und Raumfahrt zu bewahren, müssen wir Investitionen priorisieren, die diesen entscheidenden Sektor ausbauen und modernisieren."
 SOV_expand_tankograd: "Tankograd ausbauen"
 SOV_expand_tankograd_desc: "Tankograd, der Spitzname des Tscheljabinsker Traktorenwerks, war während des Großen Vaterländischen Krieges ein zentrales Zentrum der Panzerproduktion. Auch während der Sowjetzeit wurden dort Panzer gebaut. Ein moderner Ausbau wird seine Kapazität und Produktionsmöglichkeiten für die Zukunft erhöhen."
 SOV_domestic_auto_production: "Inländische Automobilproduktion"
 SOV_domestic_auto_production_desc: "Russlands Automobilindustrie für Endverbraucher war historisch eher bescheiden, doch bekannte Marken wie Lada und Aurus haben deutliche Akzente gesetzt. Eine Förderung dieser Unternehmen wird Exporte steigern und Russlands globale Soft Power stärken."
 SOV_expand_kalashnikov_concern: "Kalaschnikow-Konzern ausbauen"
 SOV_expand_kalashnikov_concern_desc: "Der Kalaschnikow-Konzern, früher das Maschinenbauwerk Ischewsk, ist Russlands größter Rüstungshersteller. Er produziert 95 % der Kleinwaffen des Landes und entwickelt außerdem gelenkte Artilleriesysteme und Präzisionswaffen. Sein Ausbau ist für unsere Rüstungsindustrie von entscheidender Bedeutung."
 SOV_revaluation_of_the_ruble: "Aufwertung des Rubels"
 SOV_revaluation_of_the_ruble_desc: "Im vergangenen Jahrzehnt hat der russische Rubel aufgrund schlechter Handelspolitik und ungebremster Inflation erheblich an Wert verloren. Das Vertrauen in den Rubel wiederherzustellen, ist notwendig, um unsere Wirtschaft zu stabilisieren und die Kaufkraft unserer Bürger zu schützen."
 SOV_european_interaction_plan: "Plan für die Beziehungen zu Europa"
 SOV_european_interaction_plan_desc: "Europa bleibt trotz gelegentlicher Sanktionen einer unserer wichtigsten Wirtschaftspartner. Die Entwicklung eines strategischen Plans zur Steuerung dieser Beziehungen ist für anhaltendes Wirtschaftswachstum von entscheidender Bedeutung."
 SOV_nord_stream: "Nord Stream"
 SOV_nord_stream_desc: "Nord Stream ist eine bedeutende Gaspipeline durch die Ostsee, die Russland direkt mit Deutschland verbindet. Diese Route umgeht osteuropäische Staaten, verschafft Russland erheblichen Einfluss in der Region und ermöglicht es Deutschland, sich aus regionalen Spannungen herauszuhalten."
 SOV_south_stream: "South Stream"
 SOV_south_stream_desc: "South Stream ist eine ergänzende Gaspipeline, die von Rostow in Russland durch das Schwarze Meer verläuft, Bulgarien durchquert und sich in Richtung Österreich und Italien verzweigt. Diese Pipeline stärkt unsere Fähigkeit, Energie nach Europa zu exportieren."
 SOV_east_stream: "Sila Sibiri"
 SOV_east_stream_desc: "Sila Sibiri, die „Kraft Sibiriens“, ist die dritte große Pipelineverbindung zwischen Russland und China. Sie sichert unserem engen Verbündeten eine verlässliche Energieversorgung und eröffnet uns einen strategischen Absatzmarkt für unsere Öl- und Gasexporte, wodurch westliche Sanktionen umgangen werden können."
 SOV_resist_the_washington_consensus: "Dem Washington-Konsens widerstehen"
 SOV_resist_the_washington_consensus_desc: "Die von Washington Jelzin auferlegten Wirtschaftspolitiken haben unsere Wirtschaft geschwächt und westlichen Interessen den Zugriff auf unser Staatseigentum ermöglicht. Wir müssen diese Pläne zurückweisen und eigenständig eine neue Strategie zur Wiederbelebung der russischen Wirtschaft entwickeln."
 SOV_return_to_the_gold_standard: "Zum Goldstandard zurückkehren"
 SOV_return_to_the_gold_standard_desc: "Papiergeld ohne physische Deckung verliert mit der Zeit an Wert. Die Wiedereinführung des Goldstandards wird den Rubel stabilisieren und das Vertrauen in unsere Währung wiederherstellen."
 SOV_decree_no_585: "Dekret Nr. 585"
 SOV_decree_no_585_desc: "Mit dem 2003 erlassenen Dekret Nr. 585 wurde die RŽD als Aktiengesellschaft gegründet. RŽD ist für die Verwaltung des weitläufigen russischen Eisenbahnnetzes verantwortlich."
 SOV_sakhalin_railway: "Die Sachalin-Eisenbahn revitalisieren"
 SOV_sakhalin_railway_desc: "Die Sachalin-Eisenbahn auf der Insel nahe Japan ist für die dortige Wirtschaft von zentraler Bedeutung. Ihre Modernisierung und Wiederbelebung wird die regionale Anbindung und wirtschaftliche Entwicklung stärken."
 SOV_expand_the_trans_siberian_railroad: "Die Transsibirische Eisenbahn ausbauen"
 SOV_expand_the_trans_siberian_railroad_desc: "Die Transsibirische Eisenbahn verbindet Moskau mit Wladiwostok und bildet das wirtschaftliche Rückgrat Russlands. Der Ausbau dieses Netzes ist für nationale Entwicklung und Handel unverzichtbar."
 SOV_appease_the_moscow_oligarchs: "Die Moskauer Oligarchen besänftigen"
 SOV_appease_the_moscow_oligarchs_desc: "Gezielte Investitionen zur Besänftigung der Moskauer Oligarchen werden ihre Unterstützung sichern und die Stabilität innerhalb der wirtschaftlichen Elite bewahren."
 SOV_high_speed_rail_construction: "Bau von Hochgeschwindigkeitsstrecken"
 SOV_high_speed_rail_construction_desc: "Russlands derzeitige Eisenbahninfrastruktur ist veraltet. Investitionen in Hochgeschwindigkeitstechnologie werden den Transport modernisieren und die Effizienz im ganzen Land verbessern."
 SOV_explore_arctic_gas_fields: "Arktische Gasfelder erschließen"
 SOV_explore_arctic_gas_fields_desc: "Die Arktis verfügt über enorme Öl- und Erdgasreserven. Die Erkundung und Erschließung dieser Felder könnte Russlands Energieproduktionskapazitäten erheblich steigern."
 SOV_expansionary_monetary_policy: "Expansive Geldpolitik"
 SOV_expansionary_monetary_policy_desc: "Zusätzliche Liquidität in der Wirtschaft wird Wachstum anregen und Investitionen fördern, wodurch die langfristigen Wirtschaftsaussichten verbessert werden."
 SOV_attract_foreign_investors: "Ausländische Investoren anlocken"
 SOV_attract_foreign_investors_desc: "Ausländische Investitionen anzuziehen ist einer der wirksamsten Wege, Wirtschaftswachstum zu befeuern und neue Handelsmöglichkeiten zu schaffen."
 SOV_economic_stimulus: "Wirtschaftsimpulse"
 SOV_economic_stimulus_desc: "Gezielte Konjunkturmaßnahmen werden dabei helfen, zentrale Wirtschaftssektoren wiederzubeleben und nachhaltiges Wachstum zu stützen."
 SOV_state_capitalism: "Staatskapitalismus"
 SOV_state_capitalism_desc: "Den Einfluss der Moskauer Oligarchen zurückzudrängen, ist unerlässlich, um die wachsende Korruption zu bekämpfen, die den Fortschritt unseres Landes bedroht."
 SOV_rise_of_the_oligarchs: "Aufstieg der Oligarchen"
 SOV_rise_of_the_oligarchs_desc: "Die Unterstützung der Oligarchen wird unsere Beziehungen zu ihnen verbessern und uns womöglich neue Quellen von Finanzierung und Einfluss erschließen."
 SOV_russian_federation_stabilization_fund: "Stabilisierungsfonds der Russischen Föderation"
 SOV_russian_federation_stabilization_fund_desc: "Der 2004 unter der Putin-Regierung geschaffene Stabilisierungsfonds sollte Russlands Ölindustrie gegen die Auswirkungen schwankender Ölpreise absichern. Diese Maßnahme beruhte auf den Lehren aus der Wirtschaftskrise von 1998, die unter anderem durch volatile Öl- und Gasmärkte ausgelöst wurde."
 SOV_deregulation: "Deregulierung"
 SOV_deregulation_desc: "Übermäßige Marktregulierung fördert häufig Korruption und wirtschaftliche Ineffizienz. Die Förderung von Freihandel, freiem Währungsverkehr und Tauschsystemen wird eine robustere und dynamischere Wirtschaft hervorbringen."
 SOV_ignore_oligarchic_corruption: "Oligarchische Korruption ignorieren"
 SOV_ignore_oligarchic_corruption_desc: "Die Oligarchen sind wichtige Verbündete, und solange sie finanziell beitragen, können wir ihre fragwürdigen Aktivitäten im Interesse der politischen Stabilität übersehen."
 SOV_entice_oligarchic_investment: "Oligarchische Investitionen anreizen"
 SOV_entice_oligarchic_investment_desc: "Die Oligarchen verfügen über bedeutendes Kapital. Steuererleichterungen und andere Anreize können sie dazu bewegen, aktiver in die Wirtschaft zu investieren, was letztlich der ganzen Nation zugutekommt."
 SOV_regulate_the_market: "Den Markt regulieren"
 SOV_regulate_the_market_desc: "Freie Märkte bringen oft keine Ergebnisse hervor, die den nationalen Interessen dienen. Unsere Regierung muss aktiv in die Regulierung des Marktes eingreifen, damit wirtschaftliches Wachstum allen Russen zugutekommt."
 SOV_nationalize_foreign_industry: "Ausländische Industrien verstaatlichen"
 SOV_nationalize_foreign_industry_desc: "Ausländisch kontrollierte Industrieanlagen stellen insbesondere unter anhaltenden Sanktionen ein Sicherheitsrisiko dar. Die Verstaatlichung dieser Industrien wird lebenswichtige Produktionskapazitäten schützen, auch wenn dies diplomatische Spannungen mit sich bringt."
 SOV_root_out_oligarchs: "Oligarchen ausmerzen"
 SOV_root_out_oligarchs_desc: "Auch wenn es unmöglich sein mag, die Oligarchenklasse vollständig zu beseitigen, muss ihr ungebührlicher Einfluss auf die Wirtschaft eingeschränkt werden, um Gerechtigkeit und nationale Kontrolle wiederherzustellen."
 SOV_intl_oil_price_agreements: "Internationale Ölpreisabkommen"
 SOV_intl_oil_price_agreements_desc: "Russland konkurriert mit der OPEC, einem Zusammenschluss von fünfzehn Ölexporteuren, der den Weltölpreis wirksam steuert. Eine diskrete Zusammenarbeit mit der OPEC könnte helfen, die Ölpreise zu stabilisieren und im russischen Interesse anzuheben."
 SOV_trade_with_the_east: "Mit dem Osten handeln"
 SOV_trade_with_the_east_desc: "Auch wenn westliche Märkte wichtig bleiben, eröffnet ein Ausbau des Handels mit östlichen Partnern – insbesondere China – erhebliche neue Wachstumschancen."
 SOV_expand_aeroflot_routes: "Aeroflot-Routen ausweiten"
 SOV_expand_aeroflot_routes_desc: "Aeroflot, Russlands nationale Fluggesellschaft seit Sowjetzeiten, sollte ihre Strecken noch weiter über das Land ausdehnen. Das wird die nationale Einheit stärken und die wirtschaftliche Integration fördern."
 SOV_expand_economic_policy: "Modernisierte Wirtschaft"
 SOV_expand_economic_policy_desc: "Moderne Volkswirtschaften beruhen auf fortschrittlichen Technologien wie Informatik, künstlicher Intelligenz und alternativer Energie. Russland muss massiv in diese Bereiche investieren, um im 21. Jahrhundert wettbewerbsfähig zu bleiben."
 SOV_southern_arms_exports: "Projekt Chasri"
 SOV_southern_arms_exports_desc: "Der Waffenexport an unsere Verbündeten auf dem indischen Subkontinent wird Russlands Einfluss ausweiten und die strategischen Beziehungen in der Region stärken."
 SOV_nord_stream_2: "Nord Stream 2"
 SOV_nord_stream_2_desc: "Nord Stream 2 ist eine Erweiterung der ursprünglichen Pipeline nach Deutschland. Sie wird Deutschlands Abhängigkeit von russischem Gas vergrößern und das Kräfteverhältnis in Osteuropa weiter verschieben."
 SOV_manufacturing_improvements: "Verbesserungen in der Fertigung"
 SOV_manufacturing_improvements_desc: "Unsere Industriemaschinen sind veraltet und begrenzen die Qualität der Produktion. Wir müssen neue Fertigungstechnologien und -verfahren einführen, um Effizienz und Ausstoß zu steigern."
 SOV_computers: "Computerisierte Industrie"
 SOV_computers_desc: "Die Einbindung von Computern in industrielle Prozesse ist entscheidend, um die Produktion zu modernisieren und die Wettbewerbsfähigkeit in allen Sektoren zu erhöhen."
 SOV_expand_the_tech_industry: "Russischer IT-Sektor"
 SOV_expand_the_tech_industry_desc: "Der IT-Sektor wächst weltweit rasant. Die Beherrschung der Informationstechnologie wird die globale Führungsrolle in diesem Jahrhundert bestimmen, und Russland muss seinen Platz an der Spitze beanspruchen."
 SOV_advanced_semiconductor_manufacturing: "Fortgeschrittene Halbleiterfertigung"
 SOV_advanced_semiconductor_manufacturing_desc: "Halbleiter sind das Fundament moderner Technologie – von Fahrzeugen über Computer bis zur Luft- und Raumfahrt. Die Kontrolle über ihre Produktion ist für nationale Sicherheit und technologische Unabhängigkeit von entscheidender Bedeutung."
 SOV_the_silicon_taiga: "Die Silicon-Taiga"
 SOV_the_silicon_taiga_desc: "„Silicon Taiga“ ist Russlands Spitzname für seine aufstrebende IT-Industrie – in Anlehnung an das amerikanische Silicon Valley."
 SOV_yandex: "Yandex"
 SOV_yandex_desc: "Yandex LLC ist Russlands größtes multinationales Technologieunternehmen und bietet vor allem in Russland und der GUS Internetdienste an. Es fungiert gewissermaßen als russisches Google, hält über 42 % des russischsprachigen Suchmaschinenmarktes und rangiert weltweit auf Platz fünf."
 SOV_vkontakte: "VKontakte"
 SOV_vkontakte_desc: "VKontakte (VK) ist Russlands führende Plattform für soziale Medien und Netzwerke mit Sitz in Sankt Petersburg. Oft mit Facebook verglichen, bedient VK vor allem russischsprachige Nutzer und verfügte 2018 über mehr als 500 Millionen Benutzerkonten."
 SOV_quantum_computing: "Quantencomputing"
 SOV_quantum_computing_desc: "Quantencomputer nutzen die Prinzipien der Quantenmechanik, um Berechnungen auszuführen, die weit über die Fähigkeiten klassischer Computer hinausgehen. Ein skalierbarer Quantencomputer könnte Bereiche wie Kryptografie, physikalische Simulationen und komplexe Problemlösungen revolutionieren."
 SOV_uranium_one_sale: "Verkauf von Uranium One"
 SOV_uranium_one_sale_desc: "Uranium One ist ein internationaler Kernbrennstoffkonzern unter dem Dach der Rosatom-Staatskorporation. 2010 an russische Interessen verkauft, wurde er 2013 zu einer hundertprozentigen Tochter der in Moskau ansässigen Uranium One Group und stärkte damit Russlands Stellung auf dem globalen Nuklearmarkt."
 SOV_jinr: "Gemeinsames Institut für Kernforschung"
 SOV_jinr_desc: "Das in Dubna ansässige Gemeinsame Institut für Kernforschung ist ein multinationales Zentrum für kernwissenschaftliche Forschung mit über 5.500 Mitarbeitern, darunter 1.200 Forscher mit Promotionen aus achtzehn Ländern. Es umfasst sieben spezialisierte Labore für theoretische Physik, Teilchenphysik, Schwerionenphysik und weitere Gebiete."
 SOV_gamaleya_institute: "Gamaleja-Institut"
 SOV_gamaleya_institute_desc: "Das Gamaleja-Forschungsinstitut für Epidemiologie und Mikrobiologie ist ein führendes russisches medizinisches Forschungszentrum unter dem Gesundheitsministerium. Es erlangte weltweite Bekanntheit durch die Entwicklung von Sputnik V, dem ersten COVID-19-Impfstoff, der auf den Markt kam."
 SOV_tighten_ties_with_ukraine: "Beziehungen zur Ukraine vertiefen"
 SOV_tighten_ties_with_ukraine_desc: "Auch wenn manche Ukrainer dies vielleicht nur schwer begreifen, müssen wir eines klarstellen: Wir teilen eine gemeinsame ethnische Herkunft und ein gemeinsames Erbe. Deshalb ist es von wesentlicher Bedeutung, engere und freundlichere Beziehungen zu ihnen aufzubauen. Eine Stärkung dieser Bindungen wird beiden Nationen langfristig zugutekommen."
 SOV_CSTO_enlargement_with_ukr: "Die Ukraine in die OVKS einladen"
 SOV_CSTO_enlargement_with_ukr_desc: "Belarus ist bereits Teil unseres brüderlichen Bündnisses. Nun ist die Zeit gekommen, auch die Ukraine in unseren vertrauten Block einzuladen und damit unsere kollektive Sicherheit und Zusammenarbeit zu stärken."
 SOV_mutual_economic_prosperity: "Gegenseitige wirtschaftliche Zusammenarbeit"
 SOV_mutual_economic_prosperity_desc: "Nachbarländer sollten den Handel miteinander nicht behindern. Um wirtschaftliches Wachstum zu fördern, müssen wir alle Hindernisse beseitigen, die den freien Handel behindern, und gegenseitigen Wohlstand begünstigen."
 SOV_ukrainian_russian_defense: "Gemeinsame russisch-ukrainische Verteidigung"
 SOV_ukrainian_russian_defense_desc: "Als Brüder müssen Russland und die Ukraine einander verteidigen. Wir verpflichten uns, einander zu schützen und Seite an Seite zu kämpfen, komme, was wolle."
 SOV_religious_subjugation: "Religiöse Unterordnung"
 SOV_religious_subjugation_desc: "Es gibt keinen Grund, warum die Ukraine eine eigene, getrennte Kirche unterhalten sollte. Beide Nationen sind orthodox, und in religiösen Fragen sollte uns nichts trennen. Die Einheit im Glauben wird unser Band stärken."
 SOV_promote_russian_language: "Ein zweisprachiger Staat"
 SOV_promote_russian_language_desc: "Es ist an der Zeit, die russische Sprache in der Ukraine zu fördern und die sprachlichen Barrieren zwischen unseren Völkern endlich niederzureißen. Größere sprachliche Einheit wird Verständigung und Zusammenarbeit fördern."
 SOV_brotherhood_forever: "Brüderlichkeit für immer!"
 SOV_brotherhood_forever_desc: "Wir sind postsowjetische Brüder mit gemeinsamer Geschichte und Kultur. Es ist von entscheidender Bedeutung, diese dauerhafte Freundschaft auch für kommende Generationen zu bewahren und zu pflegen."
 SOV_eat_burgers_with_obama: "Burger mit Obama essen"
 SOV_eat_burgers_with_obama_desc: "Um unsere geopolitische Rückkehr zu verkünden, werden wir unseren Präsidenten zu einem Staatsbesuch bei unserem früheren Rivalen und heutigen Freund, den Vereinigten Staaten, entsenden. Dieses symbolische Treffen markiert ein neues Kapitel der Zusammenarbeit und Diplomatie."
 SOV_freedom_better_than_non_freedom: "Freiheit ist besser als Unterdrückung"
 SOV_freedom_better_than_non_freedom_desc: "Die Unterdrückung unserer Bürger dient keinem Zweck. Der Staat sollte freies Denken und Kreativität schützen, denn genau daraus erwachsen die Ideen, die wir zum Wiederaufbau und zur Stärkung unseres Landes brauchen."
 SOV_police_not_milice: "Polizija, nicht Milizija!"
 SOV_police_not_milice_desc: "Im Rahmen einer umfassenden Polizeireform wollen wir das Ansehen und die Professionalität unserer Sicherheitskräfte wiederherstellen. Die Umbenennung der Milizija in Polizija ist ein zentraler Schritt auf diesem Weg."
 SOV_crush_cult_of_stalin: "Den Stalin-Kult verurteilen"
 SOV_crush_cult_of_stalin_desc: "Viele unserer Mitbürger glauben noch immer, Stalin sei Russlands größter Führer gewesen. Wir müssen diesen Personenkult zerschlagen und das russische Volk dazu bringen, stattdessen unseren gegenwärtigen und zukünftigen Führern zu vertrauen."
 SOV_rostech_idea: "Rostec"
 SOV_kbp_idea: "KBP Instrumenten-Konstruktionsbüro"
 SOV_rosoboronprom_idea: "Oboronprom"
 SOV_kalashnikov_idea: "Kalaschnikow-Konzern"
 russia_governorate.1.t: "Russland hat beschlossen, aus uns ein Gouvernement zu machen"
 russia_governorate.1.d: "Russland lehnt die alte Struktur seines Staates entschieden ab. Ein Beispiel dafür ist die Rückkehr zu administrativen Gliederungen. Russland ist bestrebt, uns einzuladen, eines seiner Gouvernements zu werden und Teil dieser neuen Ordnung zu sein."
 russia_governorate.1.o1: "Gemeinsam werden wir das große Reich wiederbeleben!"
 russia_governorate.2.t: "[LIT.GetName] kehrt heim"
 russia_governorate.2.d: "Die Regierung von [LIT.GetName] hat klug gehandelt, indem sie eine Konfrontation mit uns vermieden hat. [LIT.GetName] wird wieder Teil des Russischen Reiches sein und damit unsere Einheit und unsere gemeinsame Zukunft stärken."
 russia_governorate.2.o1: "Endlich"
 russia_governorate.3.t: "[LIT.GetName] widersetzt sich uns!"
 russia_governorate.3.d: "Die Regierung von [LIT.GetName] hat unser großzügiges Angebot abgelehnt, friedlich eine unserer Provinzen zu werden. Wenn sie die Diplomatie ablehnen, werden wir gezwungen sein, mit Gewalt zu handeln."
 russia_governorate.3.o1: "Narren"
 russia_governorate.4.t: "Russland hat beschlossen, aus uns ein Gouvernement zu machen"
 russia_governorate.4.d: "Russland lehnt die alte Staatsstruktur entschieden ab. Ein Beispiel dafür ist die Wiedereinführung administrativer Gliederungen. Russland ist fest entschlossen, uns einzuladen, eines seiner Gouvernements zu werden."
 russia_governorate.4.o1: "Gemeinsam werden wir das große Reich wiederbeleben!"
 russia_governorate.5.t: "[LAT.GetName] kehrt heim"
 russia_governorate.5.d: "Die Regierung von [LAT.GetName] hat umsichtig gehandelt, indem sie einen Konflikt mit uns vermieden hat. [LAT.GetName] wird wieder Teil des Russischen Reiches und stärkt damit unser Band."
 russia_governorate.5.o1: "Endlich"
 russia_governorate.6.t: "[LAT.GetName] widersetzt sich uns!"
 russia_governorate.6.d: "Die Regierung von [LAT.GetName] hat unser großzügiges Angebot abgelehnt, sich uns friedlich als Provinz anzuschließen. Uns bleibt keine andere Wahl, als sie mit Gewalt zu nehmen."
 russia_governorate.6.o1: "Narren"
 russia_governorate.7.t: "Russland hat beschlossen, aus uns ein Gouvernement zu machen"
 russia_governorate.7.d: "Russland ist entschieden gegen die alte Staatsstruktur. Ein Beispiel dafür ist die Wiedereinführung administrativer Gliederungen. Russland möchte uns einladen, eines seiner Gouvernements zu werden."
 russia_governorate.7.o1: "Gemeinsam werden wir das große Reich wiederbeleben!"
 russia_governorate.8.t: "[EST.GetName] kehrt heim"
 russia_governorate.8.d: "Die Regierung von [EST.GetName] hat eine Konfrontation mit uns klugerweise vermieden. [EST.GetName] wird wieder Teil des Russischen Reiches und schließt sich unserer erneuerten Stärke an."
 russia_governorate.8.o1: "Endlich"
 russia_governorate.9.t: "[EST.GetName] widersetzt sich uns!"
 russia_governorate.9.d: "Die Regierung von [EST.GetName] hat unser großzügiges Angebot abgelehnt, friedlich unsere Provinz zu werden. Wenn sie darauf beharren, werden wir entschlossen handeln müssen."
 russia_governorate.9.o1: "Narren"
 russia_governorate.10.t: "Russland hat beschlossen, aus uns ein Gouvernement zu machen"
 russia_governorate.10.d: "Russland lehnt die alte Staatsstruktur ab und unterstützt die Rückkehr administrativer Gliederungen. Sie wünschen nachdrücklich, dass wir eines ihrer Gouvernements werden."
 russia_governorate.10.o1: "Gemeinsam werden wir das große Reich wiederbeleben!"
 russia_governorate.11.t: "Georgien kehrt heim"
 russia_governorate.11.d: "Die Regierung Georgiens hat klug entschieden, indem sie eine Konfrontation mit uns vermieden hat. Georgien wird erneut Teil des Russischen Reiches und erneuert alte Bindungen."
 russia_governorate.11.o1: "Endlich"
 russia_governorate.12.t: "Georgien widersetzt sich uns!"
 russia_governorate.12.d: "Die Regierung Georgiens hat unser großzügiges Angebot einer friedlichen Eingliederung als Provinz abgelehnt. Uns bleibt keine andere Wahl, als sie mit Gewalt zu nehmen."
 russia_governorate.12.o1: "Narren"
 russia_governorate.13.t: "Russland hat beschlossen, aus uns ein Gouvernement zu machen"
 russia_governorate.13.d: "Russland lehnt die bisherige Staatsstruktur entschieden ab und unterstützt die Rückkehr administrativer Gliederungen. Sie wollen uns einladen, eines ihrer Gouvernements zu werden."
 russia_governorate.13.o1: "Gemeinsam werden wir das große Reich wiederbeleben!"
 russia_governorate.14.t: "Moldau kehrt heim"
 russia_governorate.14.d: "Die Regierung Moldaus hat klug gehandelt, indem sie eine Konfrontation vermieden hat. Moldau wird erneut Teil des Russischen Reiches und stärkt unsere Einheit."
 russia_governorate.14.o1: "Endlich"
 russia_governorate.15.t: "Moldau widersetzt sich uns!"
 russia_governorate.15.d: "Die Regierung Moldaus hat unser großzügiges Angebot abgelehnt, sich uns friedlich als Provinz anzuschließen. Wenn sie weiter Widerstand leistet, werden wir gezwungen sein, sie mit Gewalt zu nehmen."
 russia_governorate.15.o1: "Narren"
 russia.0.t: "Russland lädt uns in seine Fraktion ein"
 russia.0.d: "Russland hat uns eingeladen, ihrer Fraktion beizutreten, um unser Bündnis zu stärken und eine solide militärische Partnerschaft aufzubauen. Dieses Angebot könnte unsere strategische Position neu gestalten und erhebliche Sicherheitsvorteile bieten."
 russia.0.o1: "Akzeptieren. Der Russische Bär wird uns beschützen"
 russia.0.o2: "Ablehnen. Der Bär ist schwach!"
 russia.1.t: "Die Kursk-U-Boot-Katastrophe"
 russia.1.d: "Die Kursk-U-Boot-Katastrophe ereignete sich 75 Kilometer nördlich der Kola-Halbinsel in Russland. Eine fehlerhafte Schweißnaht an einem Übungstorpedo verursachte eine Peroxid-Explosion, die die Detonation von mindestens fünf Torpedosprengköpfen auslöste. Das russische Marinekommando unterschätzte das Ausmaß der Tragödie erheblich und lehnte internationale Hilfe ab, da es eine Beteiligung der NATO vermutete. Obwohl viele Besatzungsmitglieder die erste Explosion überlebten und unter Wasser eingeschlossen waren, führten langsame und ineffektive Rettungsmaßnahmen tragischerweise zum Tod aller 118 Seeleute an Bord."
 russia.1.o1: "Schrecklich!"
 russia.5.t: "Russischer Imperialismus bedroht unsere Souveränität!"
 russia.5.d: "Russland hat sich mit Belarus auf eine Weise vereinigt, die die Regierung in Minsk faktisch machtlos macht. Dies zeigt deutlich, dass Russland seine eigenen neo-sowjetischen imperialen Ambitionen über die Interessen seiner Verbündeten stellt. Wir müssen entscheiden, wie wir auf diese offensichtliche Bedrohung unserer Souveränität reagieren."
 russia.5.o1: "Wir müssen unsere Beziehungen abbrechen."
 russia.5.o2: "Wir müssen auf das Beste hoffen..."
 russia.6.t: "Russisches Südschutzprogramm"
 russia.6.d: "Russland hat seine Unterstützung für uns im Falle eines militärischen Konflikts erklärt und Militärberater entsandt, um uns beim Ausbau unserer Verteidigung gegen unsere Feinde zu helfen. Ihr Engagement könnte unsere Fähigkeiten erheblich stärken."
 russia.6.o1: "Ausgezeichnet."
 russia.6.o2: "Natürlich nicht!"
 russia.7.t: "Die Invasion der Krim"
 russia.7.d: "Obwohl ethnische Russen in unserer Bevölkerung nie vollständig zufrieden waren, rechtfertigt dies nicht das Auftreten unmarkierter, schwer bewaffneter Milizen, die von Osten aus in die Krim einfallen und unsere Truppen verdrängen. Es ist nun offensichtlich, dass diese Separatisten von russischen Streitkräften unterstützt, bewaffnet und geführt werden, die sich an unseren Grenzen zusammenziehen. Wir müssen entscheiden, wie wir auf diese Aggression reagieren."
 russia.7.o1: "Wir werden nachgeben."
 russia.7.o2: "Wir werden standhalten und kämpfen!"
 russia.8.t: "Die Ukraine gibt nach!"
 russia.8.d: "Die ukrainische Regierung wurde zum Rückzug gezwungen. Die Krim befindet sich nun unter unserer Kontrolle."
 russia.8.o1: "Ausgezeichnet."
 threat_SOV_annexiation_of_crimea: "Annexion der Krim"
 russia.9.t: "Die Ukraine nimmt unsere Herausforderung an!"
 russia.9.d: "Entgegen allen Erwartungen hat sich die Ukraine entschieden, für die Krim zu kämpfen. Unsere Kommandeure haben bereits den Vormarsch angeordnet. Wir haben einen Konflikt entfacht, der sich nicht leicht eindämmen lassen wird."
 russia.9.o1: "Los geht's."
 russia.10.t1: "Russland fordert unsere Integration"
 russia.10.t2: "Unterwerft euch Russland"
 russia.10.d1: "Wir standen lange Zeit unter russischem Einfluss. Heute traf eine Delegation mit einem unerwarteten Vorschlag ein: Russland möchte unser Land vollständig integrieren und unseren Status als abhängiger Staat beenden. Wir müssen entscheiden, wie wir fortfahren."
 russia.10.d2: "Russland hat unsere vollständige Unterwerfung gefordert und beabsichtigt, sich selbst als unsere souveränen Herrscher einzusetzen. Sollen wir dem Druck widerstehen oder den Willen des Großen Bären akzeptieren?"
 russia.10.o1: "Wir haben keine Wahl"
 russia.10.o2: "Wir werden uns niemals unterwerfen!"
 russia.11.t: "Russland fordert unsere Annexion!"
 russia.11.d: "Russland zeigt zunehmend subtile Aggression gegenüber unserer Regierung, verborgen hinter diplomatischen Höflichkeiten. Wenn wir die Forderungen dieser Supermacht ablehnen, sollten wir uns auf das Schlimmste vorbereiten."
 russia.11.o1: "Wir sind eins mit Russland"
 russia.11.o2: "Niemals"
 russia.12.t1: "[From.GetName] akzeptiert!"
 russia.12.d1: "[From.GetName] hat unseren Vorschlag angenommen. Wir sollten umgehend beginnen, die lokalen Regierungen zu übernehmen und Stabilität in der Region herzustellen. Die abchasischen Behörden haben beschlossen, sich zu integrieren und eng mit unseren Gesandten zusammenzuarbeiten, um die Besatzungstruppen zu unterstützen."
 russia.12.t2: "[From.GetName] akzeptiert!"
 russia.12.d2: "[From.GetName] hat unseren Vorschlag angenommen. Wir sollten rasch die Kontrolle über die lokalen Regierungen übernehmen und Ordnung herstellen. Die südossetische Regierung hat beschlossen, sich zu integrieren und gemeinsam mit unseren Gesandten die Besatzung zu unterstützen."
 russia.12.o1: "Wunderbar"
 russia.13.t1: "[From.GetName] lehnt ab!"
 russia.13.d1: "[From.GetName] hat unser Integrationsangebot zurückgewiesen. Wie können sie es wagen! Bereitet die in der Region stationierten Truppen vor. Diese rebellischen Pseudorepubliken müssen daran erinnert werden, wer ihr wahrer Wohltäter ist."
 russia.13.t2: "[From.GetName] lehnt ab!"
 russia.13.d2: "[From.GetName] hat unser Integrationsangebot zurückgewiesen. Wie können sie es wagen! Macht die Truppen in der Region bereit. Diese widerspenstigen Pseudostaaten müssen an ihren Platz erinnert werden."
 russia.13.o1: "Bedauerlich"
 russia.14.t: "Russische Investitionen"
 russia.14.d: "Russland hat angeboten, in unser Land zu investieren und unsere industrielle Basis auf eigene Kosten auszubauen. Diese Großzügigkeit hat jedoch ihren Preis, denn ein wachsender russischer Einfluss auf unsere Regierung wäre unvermeidlich."
 russia.14.o1: "Ein paar Fabriken könnten wir gebrauchen"
 russia.14.o2: "Russen, bleibt fern!"
 russia.15.t: "Antikriegsproteste"
 russia.15.d: "Die von uns gestartete Spezialoperation hat im ganzen Land Antikriegsproteste ausgelöst. Die Demonstranten haben die weiß-blau-weiße Flagge als Symbol angenommen – ein Zeichen für ein Russland ohne Blutvergießen und ohne imperiale Ambitionen."
 russia.15.o1: "Ihre Flagge sieht aus wie ein OMON-Auto"
 russia.16.t: "„Russischer Frühling“ im Donbass"
 russia.16.d: "Die Unruhen in der Ukraine haben Aufstände in Donezk, Luhansk und anderen Regionen ausgelöst. Zwar konnten nicht überall die Kontrolle übernommen werden, doch dort, wo es gelungen ist, könnten wir die Gelegenheit haben, ihre Bemühungen zu unterstützen."
 russia.16.o1: "DVR spielen"
 russia.16.o2: "LVR spielen"
 russia.16.o3: "HVR spielen"
 russia.16.o4: "OPR spielen"
 russia.16.o5: "Ich bin Russe, ich stehe bis zum Ende"
 russia.17.t: "Die Gruppe „Otvazhnye“"
 russia.17.d: "Unsere Armee hat eine Eliteeinheit gebildet, zusammengestellt aus den besten Soldaten und ausgerüstet mit der modernsten verfügbaren Ausrüstung. Diese Einheit, bekannt als „Tapfere“, wird unsere militärischen Fähigkeiten im Angriff erheblich stärken."
 russia.17.o1: "Ruhm den russischen Waffen"
 russia.63.t: "PMCs „Fakel“, „Flame“, „Potok“"
 russia.63.d: "Gazprom hat mehrere private Militärunternehmen vollständig finanziert und aufgebaut, die bereit sind, in den Kampf zu ziehen und im Namen Russlands zu kämpfen."
 russia.63.a: "Sind das nicht zu viele PMCs?"
 russia.64.t: "Bataillon „Hispaniola“"
 russia.64.d: "Das Hispaniola-Bataillon ist eine russische militärische Formation, die aus radikalen Fußballfans von Vereinen wie ZSKA, Spartak, Torpedo, Zenit, Lokomotiv, Orel und anderen besteht. Sein Kommandeur ist Stanislaw Orlow, bekannt unter dem Rufzeichen „Spaniard“, ein Vertreter der Gruppe Red-Blue Warriors."
 russia.64.a: "Sogar Fußballfans ziehen in den Krieg"
 russia.65.t: "Russische Nationale Einheit"
 russia.65.d: "Die gesamtrussische patriotische Bewegung „Russische Nationale Einheit“, auch bekannt als „Barkaschowiten“ oder „Barkaschow-Garde“, ist eine nationalistische, irredentistische, paramilitärische orthodox-fundamentalistische Gruppe. Sie wurde 1990 von ehemaligen Aktivisten der Gruppe „Pamyat“ unter Alexander Barkaschow gegründet. Ihre Mitglieder haben auch ein Freiwilligenbataillon gebildet, um an den Kämpfen teilzunehmen."
 russia.65.a: "Wir brauchen jede Hilfe"
 russia.66.t: "Russland hat Hilfe geschickt"
 russia.66.d: "Die russische Regierung hat humanitäre Hilfe, militärtechnische Unterstützung sowie zahlreiche Freiwillige – darunter die berühmten Donkosaken – entsandt, um uns zu unterstützen."
 russia.66.a: "Danke, Russland!"
 russia.67.t: "Russland hat Hilfe geschickt"
 russia.67.d: "Die russische Regierung hat humanitäre und militärtechnische Hilfe geliefert sowie Freiwillige aus Russland selbst entsandt, darunter ein tschetschenisches Freiwilligenbataillon."
 russia.67.a: "Danke, Russland!"
 russia.68.t: "Russland hat Hilfe geschickt"
 russia.68.d: "Die russische Regierung hat uns humanitäre und militärtechnische Unterstützung geschickt sowie Freiwillige aus Russland, darunter Mitglieder der privaten Militärfirma E.N.O.T."
 russia.68.a: "Danke, Russland!"
 russia.69.t: ""
 russia.69.d: ""
 russia.69.a: ""
 russia.70.t: ""
 russia.70.d: ""
 russia.70.a: ""
 russia.71.t: ""
 russia.71.d: ""
 russia.71.a: ""
 russia.21.t: "Russland fordert Alaska"
 russia.21.d: "Russland hat offiziell die Annexion Alaskas gefordert. Unter Berufung auf historische Ansprüche versucht ihr sogenanntes „Imperium“, ehemalige Gebiete des Russischen Reiches zurückzuerobern – Alaska ganz offensichtlich eingeschlossen. Wir müssen entscheiden, ob wir nachgeben oder uns auf den Widerstand gegen diese kühne Ambition vorbereiten."
 russia.21.o1: "Wir müssen uns fügen..."
 russia.21.o2: "In Anchorage wird es keine Russen geben."
 russia.22.t1: "Die Vereinigten Staaten akzeptieren unsere Forderung"
 russia.22.d1: "Die Vereinigten Staaten haben unsere Forderung nach Alaska akzeptiert. Endlich haben wir die Kontrolle über die nördlichen Gebiete zurückgewonnen – ein symbolischer und strategischer Sieg für unsere Nation."
 russia.22.o1: "Slawa Rossii!"
 russia.23.t1: "Die USA lehnen unsere Forderung ab"
 russia.23.d1: "Die Vereinigten Staaten haben unsere Forderung nach der Rückgabe Alaskas zurückgewiesen. Wenn wir zurückholen wollen, was uns gehört, werden wir dafür kämpfen müssen."
 russia.23.o1: "Dann bereiten wir ihnen eben ein „Geschenk“ vor."
 russia.24.t: "Russland schlägt einen Unionsstaat vor"
 russia.24.d: "Unsere Freunde in Russland haben vorgeschlagen, unseren bestehenden Unionsstaat zu einer vollständigen Staatsunion auszubauen. Die Annahme dieses Angebots würde das Ende der belarussischen Unabhängigkeit bedeuten – doch vielleicht ist dies ein notwendiger Schritt hin zu Einheit und Stärke."
 russia.24.o1: "Dann soll es die Union sein!"
 russia.24.o2: "Widerstehen und zubeißen!"
 russia.25.t: "Belarus akzeptiert!"
 russia.25.d: "Belarus hat dem Vorschlag für eine Staatsunion zugestimmt. Von nun an werden sie unseren Weisungen folgen. Dieser Schritt könnte jedoch bei unseren anderen Verbündeten Besorgnis auslösen."
 russia.25.o1: "Ausgezeichnet."
 russia.31.t: "Russland schlägt Pipeline-Investitionen vor"
 russia.31.d: "Russland hat ein gemeinsames Investitionsprojekt zum Ausbau der Energieinfrastruktur zwischen unseren Ländern vorgeschlagen. Sie bieten an, eine Pipeline zu errichten, um ihr Öl und Gas in unser Gebiet zu transportieren. Das könnte große wirtschaftliche Vorteile bringen – sofern wir den politischen Preis akzeptieren können."
 russia.31.o1: "Sicher!"
 russia.31.o2: "Russen, bleibt weg!"
 russia.32.t: "Russland schlägt Investitionen in die Rüstungsindustrie vor"
 russia.32.d: "Russland hat eine gemeinsame Investition in unsere Rüstungsindustrie vorgeschlagen. Sie sind bereit, eine Waffenfabrik zu errichten, um sowohl unsere Verteidigungsfähigkeiten als auch unsere wirtschaftlichen Beziehungen zu stärken. Die Annahme dieses Angebots könnte unseren Verteidigungssektor grundlegend verändern."
 russia.32.o1: "Sicher!"
 russia.32.o2: "Russen, bleibt weg!"
 russia.38.t: "[FROM.GetName] stimmt wirtschaftlicher Zusammenarbeit zu!"
 russia.38.d: "[FROM.GetName] hat positiv auf unseren Investitionsvorschlag reagiert. Dies markiert den Beginn einer vertieften Zusammenarbeit und eines gemeinsamen Wachstums zwischen unseren Nationen."
 russia.38.o1: "Ausgezeichnet."
 russia.39.t: "[FROM.GetName] lehnt die wirtschaftliche Zusammenarbeit ab!"
 russia.39.d: "[FROM.GetName] hat unseren Investitionsvorschlag abgelehnt und damit jeden weiteren Fortschritt bei diesem Projekt gestoppt. Die Chance auf wirtschaftliche Zusammenarbeit ist zumindest vorerst vertan."
 russia.39.o1: "Schade"
 russia.40.t: "Die Sahel-Konföderation unter direkte Kontrolle nehmen"
 russia.40.d: "Wir sind der Ansicht, dass es am besten wäre, die Angelegenheiten der Sahel-Konföderation persönlich zu beaufsichtigen. Direkte Kontrolle könnte Stabilität und eine wirksamere Verwaltung in der Region gewährleisten."
 russia.40.o1: "Nein"
 russia.40.o2: "Nehmen wir die Sahel-Konföderation."
 russia.41.t: "[SOV.GetNamewithFlag] bietet uns sein schweres Flammenwerfersystem an"
 russia.41.d: "Russland hat uns eine seiner neuesten militärischen Entwicklungen angeboten – ein mächtiges schweres Flammenwerfersystem. Diese fortschrittliche Waffe könnte unsere Fähigkeiten erheblich stärken. Sollen wir das Angebot annehmen?"
 russia.41.o1: "Ja"
 russia.41.o2: "Nein"
 russia.44.t: "Kauf unserer schweren Flammenwerfersysteme"
 russia.44.d: "[FROM.GetName] hat dem Kauf unserer schweren Flammenwerfersysteme zugestimmt. Dieser Verkauf stärkt unsere wirtschaftlichen und militärischen Beziehungen zu ihnen."
 russia.44.a: "Gut"
 russia.45.t: "Kauf unserer schweren Flammenwerfersysteme"
 russia.45.d: "[FROM.GetName] hat den Kauf unserer schweren Flammenwerfersysteme abgelehnt. Ein mögliches Geschäft ist damit geplatzt."
 russia.45.a: "Schade."
 russia.46.t: "[SOV.GetNamewithFlag] bietet uns seine Panzer an"
 russia.46.d: "Russland bietet uns eine seiner neuesten Entwicklungen im Bereich der Panzerkriegführung an – ein hochmodernes Panzersystem. Die Beschaffung dieser Ausrüstung könnte unsere Landstreitkräfte erheblich stärken."
 russia.46.o1: "Ja"
 russia.46.o2: "Nein"
 russia.47.t: "Kauf unserer Panzer"
 russia.47.d: "[FROM.GetName] hat dem Kauf unserer Panzer zugestimmt. Dieses Geschäft wird sowohl unseren Volkswirtschaften als auch unseren strategischen Positionen zugutekommen."
 russia.47.a: "Gut"
 russia.48.t: "Kauf unserer Panzer"
 russia.48.d: "[FROM.GetName] hat den Kauf unserer Panzer abgelehnt. Wir werden uns nach neuen Kunden umsehen müssen."
 russia.48.a: "Schade."
 russia.49.t: "Konflikt in Karabach"
 russia.49.d: "Der endlose Konflikt in Karabach hat erneut einen kritischen Punkt erreicht. Wir müssen nun entscheiden, wen wir in dieser instabilen und historisch umkämpften Region unterstützen."
 russia.49.a: "Wir werden Armenien helfen."
 russia.49.b: "Wir werden Aserbaidschan helfen."
 russia.50.t: "Georgischer Konflikt"
 russia.50.d: "Abchasien und Südossetien bereiten Georgien seit Langem Probleme. Ihre Abspaltung in den 1990er Jahren führte zu Jahren der Unruhen und Streitigkeiten. Nun ist die Zeit gekommen, die Zukunft dieser Gebiete zu bestimmen."
 russia.50.a: "Wir werden Abchasien und Ossetien für uns nehmen."
 russia.50.b: "Georgien wird Abchasien und Ossetien erhalten."
 russia.33.t: "Gerüchte über einen russischen Putsch machen die Runde!"
 russia.33.d: "Halbwegs zuverlässige Quellen haben uns über einen möglichen Putschversuch informiert, der von prorussischen Elementen orchestriert werden soll. Um diese Bedrohung abzuwenden, müssen wir womöglich rasch handeln und korrupte Beamte mit Verbindungen nach Moskau verhaften."
 russia.33.o1: "Hm..."
 russia.34.t: "Der ukrainische Putsch war erfolgreich!"
 russia.34.d: "Berichte aus Kyjiw bestätigen, dass prorussische Kräfte die Kontrolle über die Regierung übernommen haben. Eine neue, Moskau loyale Administration ist nun an der Macht."
 russia.34.o1: "Ura!"
 russia.35.t: "Der ukrainische Putsch ist gescheitert!"
 russia.35.d: "Prorussische Elemente sind bei ihrem Versuch gescheitert, die ukrainische Regierung zu übernehmen. Alle Verschwörer wurden verhaftet, und Kyjiw hat offiziellen Protest eingelegt."
 russia.35.o1: "Blyat."
 russia_news.9.t: "Der russische Putsch in der Ukraine war erfolgreich."
 russia_news.9.d: "Berichte aus Kyjiw besagen, dass prorussische Kräfte erfolgreich die Kontrolle über die ukrainische Verwaltung übernommen und eine loyale Regierung eingesetzt haben. Russland bestreitet jede Beteiligung an dem Putsch."
 russia_news.9.o1: "Russen eben."
 russia_news.9.o2: "Unsere Brüder haben den richtigen Weg gewählt!"
 russia_news.9.o3: "Was zur Hölle?"
 russia_news.10.t: "Der russische Putsch in der Ukraine ist gescheitert."
 russia_news.10.d: "Berichte aus Kyjiw besagen, dass prorussische Akteure daran gescheitert sind, die Kontrolle über die Verwaltung zu übernehmen. Russland bestreitet jede Verbindung zu den Rebellen oder dem gescheiterten Umsturzversuch."
 russia_news.10.o1: "Russen eben."
 russia_news.10.o2: "Blyat!"
 russia_news.10.o3: "Verdammte Russen."
 russia.30.t: "Vorfall im Sajano-Schuschensker Wasserkraftwerk"
 russia.30.d: "Russlands größte Wasserkraftanlage wurde von einer Katastrophe getroffen. Eine der Turbinen im Sajano-Schuschensker Kraftwerk ist kollabiert, wobei 75 Mitarbeiter getötet wurden und der Damm schwer beschädigt wurde. Aktuelle Berichte deuten darauf hin, dass 9 von 10 Turbinen außer Betrieb gesetzt wurden. Die Lage ist kritisch und erfordert sofortiges Handeln."
 russia.30.o1: "Bundesmittel einsetzen und schnellstmöglich reparieren!"
 russia.30.o2: "Das wahre Ausmaß zensieren."
 russia_news.6.t: "Vorfall im Sajano-Schuschensker Wasserkraftwerk"
 russia_news.6.d: "Am heutigen Morgen ereignete sich in Russlands größtem Wasserkraftwerk, dem Sajano-Schuschensker Kraftwerk, eine Katastrophe. Eine Turbine kollabierte, tötete 75 Mitarbeiter und beschädigte den Damm schwer. Berichten zufolge wurden 9 von 10 Turbinen in Mitleidenschaft gezogen, wodurch der Betrieb der Anlage nahezu lahmgelegt wurde."
 russia_news.6.o1: "Schrecklich."
 russia_news.6.o2: "Unser Beileid."
 russia_news.6.o3: "Wir hoffen, dass Russland das übersteht"
 russia_news.6.o4: "Sie haben bekommen, was sie verdienen!"
 russia_news.1.t: "Wladimir Putin zum Präsidenten gewählt"
 russia_news.1.d: "Wie erwartet hat Wladimir Putin – amtierender Präsident seit dem 31. Dezember 1999 – die russische Präsidentschaftswahl gewonnen. Anfangs galt er lediglich als verlängerter Arm von Boris Jelzins politischem Willen, doch mit seinem entschlossenen Umgang mit der Tschetschenienkrise hat Putin bereits viele überrascht und bewiesen, dass er wohl doch nicht so lenkbar ist wie zunächst angenommen."
 russia_news.1.o1: "Mal sehen, wie er sich schlägt."
 russia_news.2.t: "Wladimir Schirinowski zum Präsidenten gewählt"
 russia_news.2.d: "In einer überraschenden Wendung hat die nationalistische Liberal-Demokratische Partei die Präsidentschaft für ihren lautstarken Führer Wladimir Schirinowski errungen. Viele hatten geglaubt, Wladimir Putin würde mühelos gewinnen, doch das russische Volk scheint einen radikaleren Weg gewählt zu haben."
 russia_news.2.o1: "Putins Karriere ist beendet."
 russia_news.3.t: "Gennadi Sjuganow zum Präsidenten gewählt"
 russia_news.3.d: "In einer erstaunlichen Wendung hat der Kommunist Gennadi Sjuganow die Präsidentschaft gewonnen. Die meisten waren davon ausgegangen, dass Putin das Rennen aufgrund seiner Verbindung zu Boris Jelzin sicher in der Tasche habe. Dieses Ergebnis wirft ernste Fragen über Russlands Zukunft und eine mögliche Rückkehr zu sowjetischer Herrschaft auf."
 russia_news.3.o1: "Ist das die Wiedergeburt der UdSSR?"
 russia_news.4.t: "Grigori Jawlinski zum Präsidenten gewählt"
 russia_news.4.d: "Außerhalb aktivistischer Kreise praktisch unbekannt, ist Grigori Jawlinski in einem schockierenden Wahlausgang zu Russlands neuem Präsidenten geworden. Putin, der klare Favorit und Erbe Jelzins, schien einem leichten Sieg entgegenzugehen. Doch die Wählerschaft entschied sich für einen anderen Weg – womöglich ein Zeichen der Ablehnung oligarchischer Politik und der Vorliebe für liberale Reformen."
 russia_news.4.o1: "Viel Glück, Grigori!"
 russia_news.4.o2: "...wer?"
 russia_news.5.t: "Aufstieg der Sowjetunion"
 russia_news.5.d: "Russlands neue kommunistische Führung hat ihre Absichten deutlich gemacht – sie strebt die Wiederherstellung der alten Sowjetunion durch die Wiedervereinigung ihrer ehemaligen Republiken an. Je nach politischem Standpunkt verbreitet sich eine Welle der Begeisterung oder der Alarmierung."
 russia_news.5.o1: "Ausgezeichnet"
 russia_news.5.o2: "Unterstützt die Neue Union!"
 russia_news.5.o3: "Beunruhigende Nachrichten"
 russia_news.5.o4: "Schrecklich."
 russia_news.50.t: "Die Kursk-U-Boot-Katastrophe"
 russia_news.50.d: "Russische Stellen haben den Untergang des U-Boots K-141 „Kursk“ in der Barentssee, 75 Kilometer vor der Kola-Halbinsel, bestätigt. Die Katastrophe ereignete sich heute früher infolge einer internen Explosion. Während Russland mehrere Erklärungen anbot, darunter eine Kollision mit einem NATO-U-Boot, hat das Bündnis jede Beteiligung entschieden bestritten. Alle 118 Besatzungsmitglieder kamen bei dem Unglück ums Leben."
 russia_news.50.o1: "Eine große Tragödie!"
 russia_news.50.o2: "Unser Beileid an unsere Verbündeten."
 russia_news.50.o3: "Wir hoffen, dass die Russen das überstehen."
 russia_news.50.o4: "Sie haben bekommen, was sie verdient haben."
 russia_news.7.t: "Russland tritt der WTO bei!"
 russia_news.7.d: "Nach einem langwierigen Verhandlungsprozess wurde Russland in die Welthandelsorganisation aufgenommen. Um die Zustimmung zu erhalten, musste Russland echte Wirtschaftsreformen nachweisen – insbesondere gegenüber den Vereinigten Staaten und der EU. Russische Staatsmedien feiern dies als Meilenstein der postsowjetischen Erholung des Landes."
 russia_news.7.o1: "Wir öffnen unsere Türen!"
 russia_news.7.o2: "Russland öffnet sich der Welt."
 russia_news.7.o3: "Russland öffnet sich der Welt."
 russia_news.7.o4: "Verflucht seien sie."
 russia_news.8.t: "Russland benennt die Miliz in Polizei um"
 russia_news.8.d: "Präsident Dmitri Medwedew hat ein umfassendes Reformgesetz unterzeichnet, das die russische „Miliz“ in „Polizei“ umbenennt. Das Gesetz definiert neue Rechte und Pflichten für Beamte, beseitigt überflüssige Strukturen und soll das Vertrauen der Öffentlichkeit stärken, indem es eine Partnerschaft zwischen Polizei und Gesellschaft fördert."
 russia_news.8.o1: "Wie interessant."
 russia_news.8.o2: "Gut"
