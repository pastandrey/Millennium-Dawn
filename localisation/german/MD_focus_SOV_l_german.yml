 SOV_warsaw_influence_close1: "Entscheidungen zur Revolution in §Y[ROM.GetNameWithFlag]§! schließen"
 SOV_warsaw_influence_close2: "Entscheidungen zur Revolution in §Y[HUN.GetNameWithFlag]§! schließen"
 SOV_warsaw_influence_close3: "Entscheidungen zur Revolution in §Y[CZE.GetNameWithFlag]§! und §Y[SLO.GetNameWithFlag]§! schließen"
 Sov_warsaw_pact.12.t: "Beginn gemeinsamer Militärübungen des Warschauer Pakts"
 Sov_warsaw_pact.12.d: "Der Vereinte Generalstab der Staaten des Warschauer Pakts hat den Beginn gemeinsamer Militärübungen angekündigt. Westliche Experten sehen darin in erster Linie eine Machtdemonstration, die NATO einschüchtern und die militärische Präsenz des Pakts bekräftigen soll."
 Sov_warsaw_pact.12.a: "Es ist schwer zu glauben, dass sich diese Ereignisse wiederholen..."
 Sov_warsaw_pact.13.t: "Bewaffneter Aufstand in Ostdeutschland"
 Sov_warsaw_pact.13.d: "In Ostdeutschland ist ein bewaffneter Aufstand ausgebrochen. Mit finanzieller und militärischer Unterstützung des Warschauer Pakts haben ostdeutsche Streitkräfte die Kontrolle über wichtige Institutionen übernommen und die Wiedererrichtung der Deutschen Demokratischen Republik verkündet. Die Rebellen verurteilen die Wiedervereinigung mit Westdeutschland als schweren Fehler, der rückgängig gemacht werden müsse."
 Sov_warsaw_pact.13.a: "Steht die Welt am Rand des Dritten Weltkriegs?"
