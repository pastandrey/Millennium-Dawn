 SOV_storm_z_siberia: "Gefangene aus den Strafkolonien Sibiriens rekrutieren"
 SOV_storm_z_central_russia: "Gefangene von Storm Z"
 SOV_storm_z_central_russia_desc: "Viele Gefangene konnten das Massaker überleben, in das wir sie geschickt haben. Nun sind sie offiziell freigelassen, doch viele von ihnen haben beschlossen, zu dem zurückzukehren, was sie am besten können – rauben und töten."
