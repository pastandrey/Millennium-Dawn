 SOV_start_fleet_reforms: "Reformen der russischen Marine"
 SOV_start_fleet_reforms_desc: "Unsere Marine benötigt umfassende Reformen, um ihre Effektivität wiederherzustellen."
 SOV_cancel_unnecessary_projects: "Unnötige Projekte einstellen"
 SOV_cancel_unnecessary_projects_desc: "Wir müssen unsere Ressourcen auf die wichtigsten Marineprojekte konzentrieren."
 SOV_Updated_naval_doctrine: "Aktualisierte Marinedoktrin"
 SOV_Updated_naval_doctrine_desc: "Es ist an der Zeit, unsere Marinedoktrin an moderne Herausforderungen anzupassen."
 SOV_begin_modernization_of_our_fleet: "Modernisierung unserer Flotte beginnen"
 SOV_begin_modernization_of_our_fleet_desc: "Die Modernisierung unserer Flotte ist entscheidend, um unsere maritime Stärke zu bewahren."
 SOV_Optimize_our_fleet: "Unsere Flotte optimieren"
 SOV_Optimize_our_fleet_desc: "Wir straffen die Ausgaben der Flotte, um Mittel für notwendige Modernisierungen freizusetzen."
 SOV_The_high_seas_fleet: "Hochseeflotte"
 SOV_The_high_seas_fleet_desc: "Wir streben den Aufbau einer mächtigen Hochseeflotte an, ähnlich der Großbritanniens."
 SOV_revived_russian_navy2: "Hochseeflotte"
 SOV_revived_russian_navy1: "Optimierte Flotte"
 SOV_the_plundered_russian_navy1: "Die ausgeplünderte russische Marine"
 SOV_the_plundered_russian_navy2: "Teilweise wiederaufgebaute Flotte"
 SOV_the_plundered_russian_navy3: "Fast wiederaufgebaute Flotte"
 SOV_restoration_of_warsaw_pact: "Wiederherstellung des Warschauer Pakts"
 SOV_restoration_of_warsaw_pact_desc: "Die Lage in Osteuropa ist zunehmend instabil geworden, und mehrere ehemalige Verbündete des Warschauer Pakts sind bereits zur NATO übergelaufen. Je länger das andauert, desto schwieriger wird es, weltweit wieder Einfluss zu gewinnen. Wir müssen zurückholen, was verloren ging, und ein bipolares Gleichgewicht der Weltordnung wiederherstellen."
 Sov_warsaw_pact.14.t: "Der Warschauer Pakt bietet militärischen Schutz an"
 Sov_warsaw_pact.14.d: "Um unsere Souveränität zu sichern und unser Vaterland gegen äußere Bedrohungen zu verteidigen, bieten uns die Staaten des Warschauer Pakts militärischen Schutz an. Wenn wir dieses Angebot annehmen, wird unsere Verteidigung gestärkt und unsere Sicherheit gewährleistet."
 Sov_warsaw_pact.14.a: "Es ist Zeit, unser Vaterland zu schützen"
 SOV_AUTH_SS: "Russischer Sowjetischer Nationalstaat"
 SOV_soviet_empire: "Sowjetimperium"
 Sov_warsaw_pact.15.t: "Chance, sich vom russischen Einfluss zu befreien"
 Sov_warsaw_pact.15.d: "Die jüngsten Unruhen innerhalb Russlands haben uns eine Gelegenheit eröffnet, ihren Einfluss auf unser Land zu verringern. Während Russland mit seinen inneren Problemen beschäftigt ist, müssen wir entscheiden, ob wir Verbündeter bleiben oder unseren eigenen unabhängigen Weg einschlagen."
 Sov_warsaw_pact.15.a: "Russland ist nicht länger unser Verbündeter"
 Sov_warsaw_pact.15.b: "Wir bleiben"
 Sov_warsaw_pact.17.t: "Invasion Ostdeutschlands"
 Sov_warsaw_pact.17.d: "Vor nur wenigen Stunden wurden unsere Kräfte in Ostdeutschland angegriffen, was unsere Grenztruppen zum Rückzug zwang. Die Welt steht nun am Rand eines nuklearen Konflikts. Wir stehen vor einer schwerwiegenden Entscheidung: unsere Verbündeten verteidigen und die globale Vernichtung riskieren oder einen Verbündeten opfern, um den Frieden zu bewahren."
 Sov_warsaw_pact.17.a: "Die Armee mobilisieren, es ist Zeit zu marschieren!"
 Sov_warsaw_pact.17.b: "Kein Verbündeter ist die völlige Zerstörung des Planeten wert"
 WP_escaped: "Hat unsere Einflusssphäre verlassen"
 Sov_warsaw_pact.16.t: "Der Aufstand hat Erfolg"
 Sov_warsaw_pact.16.d: "Mit Hilfe unserer historischen Verbündeten haben wir die Kontrolle über wichtige Kommandozentren in Ostdeutschland übernommen. Der Warschauer Pakt hat uns im Gegenzug für strategische Zusammenarbeit den Schutz unserer Souveränität angeboten, was unsere Position stärkt."
 Sov_warsaw_pact.16.a: "Ruhm der DDR und ihrem Volk!"
 Sov_warsaw_pact.18.t: "Die UdSSR verweigert Hilfe"
 Sov_warsaw_pact.18.d: "Um den Dritten Weltkrieg zu verhindern, zieht die UdSSR ihre Truppen aus unserem Gebiet ab und überlässt uns den Bedrohungen allein."
 Sov_warsaw_pact.18.a: "Verräter!"
 OVD_raspalsa: "Der Warschauer Pakt ist zusammengebrochen"
 Sov_warsaw_pact.19.t: "Die UdSSR zieht Truppen aus Ostdeutschland ab"
 Sov_warsaw_pact.19.d: "Der Konflikt in Ostdeutschland hat die Welt an den Rand eines Krieges gebracht. Um einen umfassenden Konflikt zu vermeiden, hat die sowjetische Führung den vollständigen Rückzug ihrer Truppen befohlen. Die Welt schaut aufmerksam zu, während der letzte sowjetische Soldat die neu ausgerufene Deutsche Demokratische Republik verlässt."
 Sov_warsaw_pact.19.a: "\"In der sowjetischen Armee braucht es mehr Mut zum Rückzug als zum Vormarsch.\""
 birth_of_eastern_germany_world_tension: "Aufstand in Ostdeutschland"
 SOV_nazbols: "Russland ist alles. Der Rest ist nichts"
 SOV_nazbols_desc: "Die Zeit ist gekommen, Russlands frühere Größe wiederherzustellen. Nur wir verstehen wirklich, was unser großes Vaterland braucht."
 SOV_nazbols_nato: "Antiwestliche Rhetorik"
 SOV_nazbols_nato_desc: "Der Westen war immer unser Feind und wird es bleiben. Unsere Rhetorik darf sich niemals ändern."
 SOV_nazbols_foreign_legion: "Die Fremdenlegion"
 SOV_nazbols_foreign_legion_desc: "Nach dem Vorbild der französischen Fremdenlegion werden wir eine russische Legion schaffen, in der Ausländer dienen und die Staatsbürgerschaft erwerben können."
 SOV_nazbols_ekb: "Die Hauptstadt nach Jekaterinburg verlegen"
 SOV_nazbols_ekb_desc: "Es ist Zeit, die Hauptstadt in das Herz Russlands zu verlegen! Der Ural ist perfekt. Moskau ist von vielen Regionen zu weit entfernt."
 SOV_nazbols_empire: "Das Sowjetimperium"
 SOV_nazbols_empire_desc: "Unsere Macht ist zurückgekehrt! Ruhm dem Sowjetimperium!"
 SOV_anti_west_idea: "Antiwestliche Doktrin"
 sov_nationalists.2.t: "Die Russische Revolution in unserem Land!"
 sov_nationalists.2.d: "§Y[SOV.GetNameWithFlag]§! stachelt die russischsprachige Bevölkerung unseres Landes zum Aufstand an und bereitet zugleich die Entsendung von Truppen für eine Intervention vor. Die Spannungen steigen rasant."
 sov_nationalists.2.a: "Gott helfe uns"
 sov_sover_state.1.t: "§Y[SOV.GetNameWithFlag]§! bietet uns die Idee einer Wiederbelebung der USS an"
 sov_sover_state.1.d: "§YDie Union Souveräner Staaten§! wurde ursprünglich noch vor ihrer Verwirklichung zerschlagen und zerfiel im politischen Chaos des Putschs des Staatlichen Notstandskomitees in Moskau. Nun kehrt die Initiative mit neuer Kraft zurück. Das Projekt bietet eine zweite Chance, postsowjetische Staaten unter einem neuen, flexibleren Rahmen zu vereinen. Dieser Vorschlag könnte die regionale Ordnung neu gestalten."
 sov_sover_state.1.a: "Wir stimmen einer Teilnahme zu"
 sov_sover_state.1.b: "Das interessiert uns nicht"
 sov_sover_state.2.t: "Der Georgienkonflikt – Abstimmung"
 sov_sover_state.2.d: "Wir müssen endlich die Zukunft Georgiens und seiner abtrünnigen Regionen bestimmen. Soll Georgien vollständig wiederhergestellt werden, oder bleiben Abchasien und Südossetien unabhängig und werden Mitglieder der Union Souveräner Staaten? Das Ergebnis dieser Abstimmung könnte die Grenzen der Region für Jahre festlegen."
 sov_sover_state.2.a: "Georgien sollte ganz und unteilbar sein"
 sov_sover_state.2.b: "Abchasien und Südossetien sind unabhängige Staaten"
 sov_sover_state.3.t: "Der Georgienkonflikt – Abstimmung"
 sov_sover_state.3.d: "Die Ergebnisse liegen vor – Abchasien und Südossetien wurden als rechtmäßige Gebiete bestätigt, die an uns zurückgegeben werden sollen. Diese Entscheidung bekräftigt unsere historischen Ansprüche und stellt einen diplomatischen Sieg dar. Die internationale Gemeinschaft verfolgt aufmerksam, wie sich die Lage weiterentwickelt."
 sov_sover_state.3.a: "Wir haben gewonnen!"
 sov_sover_state.4.t: "Der Georgienkonflikt – Abstimmung"
 sov_sover_state.4.d: "Heute wurde in einer Abstimmung unsere Souveränität bestätigt, wodurch sichergestellt wurde, dass unser Land unabhängig bleibt. Wir haben nicht nur unsere Freiheit bewahrt, sondern auch die offizielle Anerkennung unseres Status erhalten. Das markiert einen Wendepunkt auf unserem nationalen Weg."
 sov_sover_state.4.a: "Wir haben gewonnen!"
 sov_sover_state.5.t: "Erklärung der Union Souveräner Staaten"
 sov_sover_state.5.d: "Der endgültige Vertragsentwurf wurde uns zur Prüfung vorgelegt. Nun liegt es an uns zu entscheiden, ob wir ihn unterzeichnen und der Union Souveräner Staaten offiziell beitreten. Diese Wahl wird unsere Rolle im neuen regionalen Bündnis prägen."
 sov_sover_state.5.a: "Ja"
 sov_sover_state.5.b: "Nein"
 sov_sover_state.6.t: "Union Souveräner Staaten"
 sov_sover_state.6.d: "Der Unterzeichnungsprozess ist abgeschlossen, und die Union Souveräner Staaten wurde offiziell gegründet. Dieses historische Ereignis markiert den Beginn einer neuen Ära der Zusammenarbeit, der gemeinsamen Entwicklung und der geteilten Regierungsführung unter ihren Mitgliedern."
 sov_sover_state.6.a: "Hurra!"
 sov_sover_state.7.t: "Abchasien und Südossetien bleiben unabhängig"
 sov_sover_state.7.d: "Die Abstimmungsergebnisse der Mitgliedstaaten der Union Souveräner Staaten haben bestätigt, dass Abchasien und Südossetien unabhängig bleiben werden. Diese Republiken werden nun eingeladen, Vollmitglieder der Union zu werden. Diese Entscheidung könnte weitreichende Auswirkungen auf die regionale Diplomatie haben."
 sov_sover_state.7.a: "Interessant"
 sov_sover_state.8.t: "Georgien bekommt seine Gebiete zurück"
 sov_sover_state.8.d: "Das Ergebnis der Abstimmung unter den künftigen Mitgliedern der Union Souveräner Staaten hat ergeben, dass die abtrünnigen georgischen Gebiete unverzüglich an Georgien zurückgegeben werden müssen. Dieser Schritt wird als Beitrag zur Wiederherstellung der territorialen Integrität des georgischen Staates gewertet."
 sov_sover_state.8.a: "Interessant"
 sov_sover_state.9.t: "Der armenisch-aserbaidschanische Konflikt"
 sov_sover_state.9.d: "Bergkarabach ist seit Jahrzehnten eine Quelle gewaltsamer Konflikte und tiefer nationaler Spaltung. Nun ist die Zeit gekommen, seine rechtmäßige Zugehörigkeit zu bestimmen. Soll es Armenien oder Aserbaidschan gehören? Die Antwort wird dauerhafte Auswirkungen auf beide Länder und die gesamte Region haben."
 sov_sover_state.9.a: "Karabach gehört zu Aserbaidschan"
 sov_sover_state.9.b: "Karabach gehört zu Armenien"
 sov_sover_state.10.t: "Der armenisch-aserbaidschanische Konflikt"
 sov_sover_state.10.d: "Nach Beratungen unter den Mitgliedern der Union Souveräner Staaten wurde die Entscheidung getroffen: Bergkarabach wird Aserbaidschan zugesprochen. Dieses Ergebnis könnte die Spannungen erneut anheizen und wird wahrscheinlich internationale Aufmerksamkeit erregen."
 sov_sover_state.10.a: "Interessant"
 sov_sover_state.11.t: "Der armenisch-aserbaidschanische Konflikt"
 sov_sover_state.11.d: "Die Abstimmung unter den künftigen Mitgliedern der Union Souveräner Staaten endete mit der Entscheidung, Bergkarabach Armenien zuzuschlagen. Diese Entscheidung dürfte in Baku und im Ausland heftige Reaktionen hervorrufen und mögliche geopolitische Folgen nach sich ziehen."
 sov_sover_state.11.a: "Interessant"
 sov_sover_state.12.t: "Der armenisch-aserbaidschanische Konflikt"
 sov_sover_state.12.d: "Eine zweite Abstimmung hat erneut bestätigt, dass Bergkarabach als Teil Aserbaidschans anerkannt wird. Dieses Urteil stärkt Bakus Position weiter, könnte jedoch die Feindseligkeiten in der Region vertiefen."
 sov_sover_state.12.a: "Interessant"
 sov_sover_state.13.t: "Der armenisch-aserbaidschanische Konflikt"
 sov_sover_state.13.d: "Eine weitere Abstimmung der Union Souveräner Staaten endete mit der Entscheidung, Bergkarabach als armenisches Gebiet anzuerkennen. Es wird erwartet, dass diese Resolution die diplomatischen Spannungen mit Aserbaidschan verschärft."
 sov_sover_state.13.a: "Interessant"
 sov_sover_state.14.t: "Union Souveräner Staaten"
 sov_sover_state.14.d: "§Y[FROM.GetNamewithFlag]§! hat offiziell zugestimmt, Kandidat für eine Mitgliedschaft in der Union Souveräner Staaten zu werden. Dies ist ein entscheidender Schritt hin zum Aufbau einer geeinten Konföderation souveräner Republiken."
 sov_sover_state.14.a: "Hurra!"
 sov_sover_state.15.t: "Union Souveräner Staaten"
 sov_sover_state.15.d: "§Y[FROM.GetNamewithFlag]§! hat das formelle Abkommen zum Beitritt zur Union Souveräner Staaten unterzeichnet. Damit tritt das Land offiziell der Union bei und stärkt das Bündnis."
 sov_sover_state.15.a: "Hurra!"
 sov_sover_state.16.t: "Der Krimkonflikt"
 sov_sover_state.16.d: "Nach Russlands Annexion der Krim von der Ukraine wird der Status der Region innerhalb der Union Souveräner Staaten nun überprüft. Soll die Krim unter russischer Kontrolle bleiben oder an die Ukraine zurückgegeben werden? Das Ergebnis dieser Abstimmung wird schwerwiegende Folgen für die Glaubwürdigkeit der Union haben."
 sov_sover_state.16.a: "Die Krim muss russisch bleiben"
 sov_sover_state.16.b: "Die Krim sollte wieder ukrainisch werden"
 sov_sover_state.17.t: "Der Krimkonflikt"
 sov_sover_state.17.d: "Die Mitgliedstaaten der Union Souveräner Staaten haben dafür gestimmt, die Krim an §Y[UKR.GetNamewithFlag]§! zurückzugeben. Diese Entscheidung könnte in Russland heftige Gegenreaktionen auslösen und gilt als mutiger Schritt in Richtung Konfliktlösung und Legitimität."
 sov_sover_state.17.a: "Interessant"
 sov_sover_state.18.t: "Der Krimkonflikt"
 sov_sover_state.18.d: "Die Union Souveräner Staaten hat dafür gestimmt, die Krim als Teil von §Y[SOV.GetNamewithFlag]§! zu bestätigen. Dieses Urteil stützt Russlands Position und festigt seine Ansprüche, wird aber mit Sicherheit eine starke Reaktion der Ukraine und des Westens hervorrufen."
 sov_sover_state.18.a: "Interessant"
 sov_sover_state.19.t: "Der Krimkonflikt"
 sov_sover_state.19.d: "Eine Abstimmung der Union Souveräner Staaten hat erneut bestätigt, dass die Krim zum Gebiet von §Y[UKR.GetNamewithFlag]§! gehört. Diese Entscheidung dürfte die Spannungen mit Russland verschärfen, wird aber als Sieg der ukrainischen Souveränität gewertet."
 sov_sover_state.19.a: "Interessant"
 sov_sover_state.20.t: "Der Krimkonflikt"
 sov_sover_state.20.d: "Die Union Souveräner Staaten hat die Krim zum rechtmäßigen Gebiet von §Y[SOV.GetNamewithFlag]§! erklärt. Das Ergebnis stärkt Moskaus Kontrolle und bekräftigt seine Dominanz über die Halbinsel, was die internationalen Beziehungen weiter belastet."
 sov_sover_state.20.a: "Interessant"
 SOV_reassure_ruthenia: "Projekt der Union Souveräner Staaten"
 SOV_reassure_ruthenia_desc: "Wir beabsichtigen, das lange aufgegebene Projekt der Union Souveräner Staaten wiederzubeleben – eine konföderale Alternative zur UdSSR. Durch die Einladung ausgewählter Nationen hoffen wir, unter einem neuen Rahmen wieder regionale Geschlossenheit herzustellen und die Fehler des sowjetischen Erbes zu korrigieren."
 SOV_Sign_mutual_cooperation_agreements: "Mitgliedschaft in der Union der Staaten"
 SOV_Sign_mutual_cooperation_agreements_desc: "Wir werden an mehrere Nationen mit Vorschlägen herantreten, der Union der Staaten beizutreten. Diese Länder werden voraussichtlich von unserem gemeinsamen Wohlstand und regionaler Stabilität profitieren und dazu beitragen."
 SOV_Putting_out_the_fire_in_the_post-Soviet_space: "Die Unterzeichnungszeremonie des Abkommens ankündigen"
 SOV_Putting_out_the_fire_in_the_post-Soviet_space_desc: "Wir werden das Datum der Unterzeichnungszeremonie für den Unionsvertrag offiziell bekannt geben. Dieses Ereignis wird zeigen, welche Nationen bereit sind, unserer Union beizutreten und gemeinsam auf gemeinsame Ziele hinzuarbeiten."
 SOV_Gorbachev_dream: "Die Union der Staaten erweitern"
 SOV_Gorbachev_dream_desc: "Die Gründungszeremonie ist abgeschlossen. Nachdem die Formalitäten erledigt sind, werden wir mit der Erweiterung der Union der Staaten fortfahren und ihre Präsenz und ihren Einfluss im postsowjetischen Raum festigen."
 SOV_ssg_category: "Union Souveräner Staaten"
 SOV_ssg_category_desc: "Die Union Souveräner Staaten war als reformierte Version der UdSSR gedacht – weicher, dezentraler und konföderaler angelegt. Heute haben wir die Chance, diese Vision Wirklichkeit werden zu lassen, aus vergangenen Fehlern zu lernen und eine stärkere Zukunft aufzubauen."
 SOV_conflict_geo: "Die Lösung des §YKonflikts in Georgien§! zur Abstimmung stellen"
 SOV_conflict_geo_resolve: "Den §YGeorgienkonflikt§! endgültig lösen"
 SOV_conflict_nkr: "Die Lösung des §YKonflikts in Arzach§! zur Abstimmung stellen"
 SOV_conflict_nkr_resolve: "Den §Yarmenisch-aserbaidschanischen Konflikt§! endgültig lösen"
 SOV_conflict_ukr: "Die Lösung des §YKonflikts auf der Krim§! zur Abstimmung stellen"
 SOV_conflict_ukr_resolve: "Den §YKrimkonflikt§! endgültig lösen"
 SOV_bulgarian_ally: "Alter slawischer Bruder"
 SOV_bulgarian_ally_desc: "Nach der Befreiung Bulgariens von der osmanischen Herrschaft im Jahr 1878 hätte es ein starker Verbündeter werden können, doch die Zaren haben diese Chance verpasst. Das müssen wir nun korrigieren, indem wir die Gunst des bulgarischen Volkes gewinnen und die brüderlichen Bande wiederherstellen."
 russia.42.t: "Transnistrien hält ein Referendum über den Beitritt zur Sowjetunion ab"
 russia.42.d: "In Transnistrien wird ein neues Referendum über den Beitritt zur Sowjetunion abgehalten. Unser Volk steht erneut an einem Scheideweg der Geschichte, und seine Entscheidung wird das nächste Kapitel unserer Zukunft bestimmen."
 russia.42.a: "Wir sind bereit, der Sowjetunion beizutreten"
 SOV_annex12: "Der Brückenkopf am Dnister"
 SOV_annex13: "Die separatistischen Regionen zurückholen"
 russia.43.t: "Russland bietet uns Schutz an"
 russia.43.d: "In letzter Zeit ist unserem Volk bewusst geworden, dass unser Land von stärkeren Gegnern zerschlagen wird, wenn wir nicht den Schutz eines mächtigen Staates erhalten. Deshalb müssen wir uns und unser Volk absichern, indem wir Teil Russlands werden."
 russia.43.a: "Es ist Zeit, unsere Nation zu sichern"
 SOV_Civil_nationalism: "Bürgerlicher Nationalismus"
 SOV_Civil_nationalism_desc: "Die Nation muss an erster Stelle stehen. Wir werden nationale Interessen über alles andere stellen und die Gesellschaft um eine gemeinsame Identität und einen gemeinsamen Zweck vereinen."
 SOV_embrace_the_legacy_of_the_USSR: "Das Erbe der UdSSR annehmen"
 SOV_embrace_the_legacy_of_the_USSR_desc: "Das Erbe der Sowjetunion prägt weiterhin unsere politische und kulturelle Entwicklung. Ihre Errungenschaften bleiben der Grundstein unserer nationalen Identität und unserer Ambitionen."
 SOV_Introduce_visa_regime_with_Central_Asia: "Visaregime mit Zentralasien"
 SOV_Introduce_visa_regime_with_Central_Asia_desc: "Um unsere Grenzen besser zu kontrollieren und wirtschaftliche sowie soziale Probleme anzugehen, werden wir ein Visaregime mit Zentralasien einführen. Diese Maßnahme soll illegale Migration verringern und die nationale Stabilität schützen."
 SOV_Utilize_the_country_economic_potential_100_percent: "Wirtschaftliches Potenzial voll ausschöpfen"
 SOV_Utilize_the_country_economic_potential_100_percent_desc: "Wir werden das wirtschaftliche Potenzial des Landes vollständig entfalten. Jede Ressource und jede Gelegenheit muss genutzt werden, um Wachstum und Wohlstand voranzutreiben."
 SOV_Cooperation_with_Taiwan: "Zusammenarbeit mit Taiwan"
 SOV_Cooperation_with_Taiwan_desc: "Die strategische Zusammenarbeit mit Taiwan wird uns Zugang zu fortschrittlicher Technologie und erheblichen wirtschaftlichen Vorteilen verschaffen. Diese Partnerschaft kann unsere Entwicklung beschleunigen."
 SOV_Buy_out_Taiwans_microchip_technology: "Taiwans Mikrochiptechnologie erwerben"
 SOV_Buy_out_Taiwans_microchip_technology_desc: "Wir haben ein Abkommen geschlossen, um Mikrochip-Fertigungstechnologie aus Taiwan zu kaufen. Dieser Erwerb wird die Grundlage für unseren technologischen und wirtschaftlichen Sprung nach vorn bilden."
 SOV_Promote_Russian_companies_in_the_post-Soviet_space: "Russische Unternehmen im postsowjetischen Raum fördern"
 SOV_Promote_Russian_companies_in_the_post-Soviet_space_desc: "Wir werden russische Unternehmen bei ihrer Expansion in den postsowjetischen Raum offensiv unterstützen. Unser Ziel ist es, auf diesen Märkten eine dominierende Stellung einzunehmen."
 SOV_Monopoly_in_the_post-Soviet_space: "Monopol im postsowjetischen Raum"
 SOV_Monopoly_in_the_post-Soviet_space_desc: "Russische Unternehmen sollen auf den Märkten des postsowjetischen Raums eine beherrschende Stellung erreichen. Durch strategische Investitionen und politischen Einfluss werden wir dies verwirklichen."
 SOV_Economic_Empire: "Wirtschaftsimperium"
 SOV_Economic_Empire_desc: "Ein starkes Russland braucht keinen Krieg, um sich zu behaupten. Durch wirtschaftliche Macht und Einfluss werden wir unseren Platz als globale Führungsmacht sichern."
 SOV_Make_the_Anti-Corruption_Foundation_a_State_Company: "Antikorruptionsstiftung"
 SOV_Make_the_Anti-Corruption_Foundation_a_State_Company_desc: "Um den Kampf gegen Korruption zu institutionalisieren, wird die Antikorruptionsstiftung in ein staatseigenes Organ mit voller Unterstützung der Regierung umgewandelt."
 SOV_Demonopolization_of_the_strategic_economy: "Entmonopolisierung der strategischen Wirtschaft"
 SOV_Demonopolization_of_the_strategic_economy_desc: "Wir werden Monopole in strategischen Wirtschaftssektoren aufbrechen, um Transparenz, Wettbewerb und Effizienz zu verbessern."
 SOV_Unite_the_network_of_state-owned_companies: "Staatsunternehmen vereinen"
 SOV_Unite_the_network_of_state-owned_companies_desc: "Wir werden unsere staatseigenen Unternehmen zu einem zusammenhängenden und effizienten Netzwerk zusammenschließen, das den nationalen Interessen dient und langfristiges Wachstum vorantreibt."
 SOV_Increase_salaries_and_pensions_for_the_military_and_the_population: "Gehälter und Renten erhöhen"
 SOV_Increase_salaries_and_pensions_for_the_military_and_the_population_desc: "Wir haben ein Versprechen gegeben – und wir werden es halten. Die Gehälter und Renten sowohl für das Militär als auch für die Zivilbevölkerung werden deutlich angehoben."
 SOV_Measures_of_rapprochement_with_the_West: "Annäherung an den Westen"
 SOV_Measures_of_rapprochement_with_the_West_desc: "Der Westen sollte nicht als Bedrohung, sondern als Partner gesehen werden. Durch Zusammenarbeit und Dialog werden wir Vertrauen wiederaufbauen und unsere Beziehungen neu definieren."
 SOV_The_way_of_free_russia: "Der Weg des freien Russland"
 SOV_The_way_of_free_russia_desc: "Ein freies Russland ist ein starkes Russland. Wir werden Freiheit, Demokratie und nationalen Stolz als Grundlage für eine bessere Zukunft verfolgen."
 SOV_eu_state: "Echter westlicher Staat"
 SOV_new_pensions_reform: "Neue Rentenreform"
 SOV_demonopolisation_reform: "Entmonopolisierung der strategischen Industrie"
 SOV_fbk_organization_category: "Hauptquartier der Antikorruptionsstiftung"
 SOV_fbk_organization_category_desc: "Jahre der Autokratie haben unseren Staat mit Korruption durchsetzt. Die Antikorruptionsstiftung hat sich dem Ziel verschrieben, sie auszurotten und die Ehre des öffentlichen Dienstes wiederherzustellen."
 SOV_democracy_taiwam_category: "Russische Demokratie in Taiwan"
 SOV_democracy_taiwam_category_desc: "Taiwan bleibt ein Dorn in Chinas Auge. Da sich unsere Rivalität mit China verschärft, ist die Sicherung von Einfluss auf Taiwan zu einer unserer strategischen Prioritäten geworden."
 SOV_boost_opinion_of_rus: "Die Beziehungen weiter verbessern"
 SOV_more_weapon_taiwan: "Mehr Waffen für Taiwan"
 SOV_invest_taiwan: "Investitionen in Taiwan"
 SOV_puppet_taiwan: "Taiwan unterwerfen"
 SOV_Civil_Nationalism_idea: "Wahrer bürgerlicher Nationalismus"
 SOV_Combating_illegal_migration_idea: "Bekämpfung illegaler Migration"
 SOV_Finding_corrupt_officials_in_the_party: "Korrupte Funktionäre in der Partei identifizieren"
 SOV_Check_police_personnel: "Polizeipersonal überprüfen"
 SOV_expose_corrupt_schemes_in_the_smuggling_trade: "Schmuggelkorruption aufdecken"
 SOV_check_data_on_illegal_migration: "Daten zur illegalen Migration auswerten"
 SOV_operation_Sweet_Gifts: "Operation Süße Geschenke"
 SOV_Prepare_the_test_purchase: "Den Testkauf vorbereiten"
 SOV_Train_specialized_personnel: "Spezialisiertes Personal ausbilden"
 SOV_Finalize_the_sweet_gifts_operation: "Operation Süße Geschenke abschließen"
 SOV_Free_Russia_idea: "Freies Russland"
 SOV_Russian_Microchip_idea: "Baikal Core i9"
 russia.52.t: "Russische Delegation in Taiwan"
 russia.52.d: "Eine russische Delegation ist mit einem Vorschlag eingetroffen: den Erwerb eines Anteils an unserer Mikrochiptechnologie im Austausch gegen wichtige russische Rohstoffe. Dieses Geschäft könnte beiden Seiten Vorteile bringen."
 russia.52.a: "Das ist ein guter Deal"
 russia.52.b: "Russland? Und wie viele Divisionen hat es?"
 russia.53.t: "Taiwan hat den Deal platzen lassen"
 russia.53.d: "Die taiwanische Regierung hat unser Angebot als unvorteilhaft abgelehnt. Die Verhandlungen sind gescheitert, und die Spannungen könnten steigen."
 russia.53.a: "Taiwan erkennt die Überlegenheit der Baikal-Prozessoren einfach nicht an"
 russia.54.t: "Russische Luft- und Weltraumverteidigungskräfte"
 russia.54.d: "Das russische Militär hat offiziell einen neuen Truppenzweig geschaffen: die Luft- und Weltraumverteidigungskräfte. Diese Reform soll Luft- und Weltraumoperationen effektiver miteinander verbinden."
 russia.54.a: "Hurra!"
 russia.55.t: "Die Krönung von Zar Boris"
 russia.55.d: "Boris Jelzin ist ins öffentliche Leben zurückgekehrt und wird nun von vielen als symbolischer Zar ganz Russlands gesehen. Obwohl dies größtenteils zeremoniell ist, ist diese Wiederbelebung der Monarchie historisch – wenn auch auf ungewöhnliche Weise."
 russia.55.a: "Was für ein Unsinn"
 russia.58.t: "Armeereformen"
 russia.58.d: "Unsere Militärreformen beginnen sich auszuzahlen. Neue talentierte Generäle sind in unsere Reihen eingetreten und bringen Stärke und erneuerten Professionalismus mit."
 russia.58.a: "Gut"
 russia.59.t: "Armeereformen"
 russia.59.d: "Unsere Militärreformen beginnen sich auszuzahlen. Neue talentierte Generäle sind in unsere Reihen eingetreten und bringen Stärke und erneuerten Professionalismus mit."
 russia.59.a: "Gut"
 russia.60.t: "Malorossische Republik"
 russia.60.d: "Wir haben auf ukrainischem Gebiet den Staat Malorossija errichtet. Nun stellt sich die Frage, ob wir die direkte Kontrolle über diese neue Republik ausüben sollten."
 russia.60.a: "Ja"
 russia.60.b: "Nein"
 russia.61.t: ""
 russia.61.d: ""
 russia.61.a: ""
 russia.62.t: "Das Mi-8-Unglück nahe dem Dorf Jermakowskoje"
 russia.62.d: "Im April 2002 starb General Alexander Lebed im Alter von 53 Jahren auf tragische Weise bei einem Mi-8-Hubschrauberabsturz nahe dem Oiskoje-See im Ostsajan. Das Fluggerät kollidierte bei schlechtem Wetter mit Stromleitungen, wobei neben ihm sieben weitere Menschen ums Leben kamen. Offiziell wurde unzureichende Vorbereitung der Besatzung als Ursache genannt, doch alternative Theorien sprechen von Sabotage oder Druck, trotz unsicherer Bedingungen zu fliegen. Widersprüchliche Berichte und das Fehlen detaillierter Luftfahrkarten haben die genaue Ursache bis heute unklar gelassen."
 russia.62.a: "Tragödie"
 SOV_prepare_a_deal: "Ein Geschäft vorbereiten"
 SOV_buy_microchips: "Taiwanische Mikrochips kaufen"
 SOV_Economic_blockade_of_Georgia_idea: "Wirtschaftsblockade gegen Georgien"
 SOV_Dominance_of_russian_companies_idea: "Dominanz russischer Unternehmen"
 SOV_Visa_regime_with_central_asia_idea: "Visaregime mit Zentralasien"
 SOV_Economic_Empire_idea: "Wirtschaftsimperium"
 SOV_Dependence_on_Russian_technologies_idea: "Abhängigkeit von russischen Technologien"
 SOV_FBK_TT: "Schaltet Entscheidungen der §YAntikorruptionsstiftung§! frei"
 SOV_cross_the_rubicon: "Den Rubikon überschreiten"
 SOV_cross_the_rubicon_desc: "Die Zeit ist gekommen, dass Russlands wahrer Führer die Macht an sich reißt. Wir müssen entschlossen handeln, um die Zukunft unserer Nation zu sichern und die Zügel der Geschichte zu ergreifen."
 SOV_tandemokratia: "Tandemokratie"
 SOV_tandemokratia_desc: "Tandemokratie bezeichnet das Duumvirat von Putin und Medwedew. Gemeinsam werden sie Russland nun als geeinte Kraft regieren und ihre Stärken zu einer einzigen Macht verschmelzen."
 SOV_unlimited_samoderzhaviye: "Unbegrenzte Samoderzhawije"
 SOV_unlimited_samoderzhaviye_desc: "Wir kehren zum Prinzip der Samoderzhawije zurück – der absoluten Herrschaft. Mit zwei Zaren an der Spitze spiegelt unsere Regierungsform die Macht der alten russischen Autokratie wider."
 SOV_establish_new_oligarchate: "Neue Oligarchie errichten"
 SOV_establish_new_oligarchate_desc: "Oligarchen prägen seit Langem die russische Politik. Indem wir Putins Getreue durch unsere eigenen Verbündeten ersetzen, werden wir dauerhafte Stabilität und loyale Unterstützung sichern."
 SOV_peace_with_the_west: "Frieden mit dem Westen"
 SOV_peace_with_the_west_desc: "Da unsere inneren Angelegenheiten im Wandel sind, ist ein Konflikt mit dem Westen nicht tragbar. Vorerst muss Frieden herrschen – bis die Zeit reif ist."
 SOV_continue_reformism: "Reformismus fortsetzen"
 SOV_continue_reformism_desc: "Putins konservative Politik führte zur Stagnation. Unsere neue Regierung wird Russland durch umfassende Reformen und frische Führung erneuern."
 SOV_secure_the_FSB: "Den FSB sichern"
 SOV_secure_the_FSB_desc: "Der FSB bleibt eine Hochburg des Putinismus. Eine Säuberung ist notwendig, um diese letzte Bastion des alten Regimes zu zerschlagen."
 SOV_crush_putinism: "Putinismus zerschlagen"
 SOV_crush_putinism_desc: "Der Putinismus muss vollständig demontiert werden – seine Politik, seine Netzwerke, seine Ideologie. Wir müssen ihn hinter uns lassen, um voranzukommen."
 SOV_western_russia: "Neue Welle im alten Stil"
 SOV_western_russia_desc: "Obwohl die Regierungspartei die Macht zurückgewonnen hat, wird sie nun von einem reformorientierten Flügel geführt. Ihr Ziel ist es, das System so umzugestalten, dass es mit demokratischen Partnerschaften und westlicher Zusammenarbeit vereinbar ist."
 SOV_enforce_liberal_values: "Überlegenheit liberaler Werte"
 SOV_enforce_liberal_values_desc: "Der Liberalismus ist das Fundament eines freien und wohlhabenden Russland. Wir müssen diese Werte verteidigen und verbreiten, während wir die Nation neu aufbauen."
 SOV_focus_on_economy: "Russisches Wirtschaftswunder"
 SOV_focus_on_economy_desc: "Das liberale Zeitalter verspricht wirtschaftlichen Aufschwung. Durch Marktöffnung und Reformen werden wir ein neues Zeitalter des Wohlstands, des Friedens und der Freiheit einläuten."
 SOV_abandon_foreign_policy: "Außenpolitik aufgeben"
 SOV_abandon_foreign_policy_desc: "Der Kalte Krieg ist vorbei. Wir sind keine kommunistische Bedrohung für den Westen mehr. Es ist Zeit, vergangene Feindseligkeiten hinter uns zu lassen und dauerhaften Frieden anzunehmen."
 SOV_age_of_stability: "Stabiles Russland"
 SOV_age_of_stability_desc: "Nach Jahrzehnten des Aufruhrs und der Ungleichheit hat Russland Frieden gefunden. Mit einem visionären Reformer an der Spitze treten wir in ein Zeitalter dauerhafter Stabilität und nationaler Einheit ein."
 SOV_establish_controlled_opposition: "Kontrollierte Opposition etablieren"
 SOV_establish_controlled_opposition_desc: "Eine kontrollierte Opposition in der Duma wird den Anschein von Demokratie schaffen, während wir Reformen ungehindert durchsetzen können."
 SOV_special_economic_operation: "Spezielle Wirtschaftsoperation"
 SOV_special_economic_operation_desc: "Belarus und die Ukraine müssen erkennen, dass die Ära des Putinismus vorbei ist. Wir werden mit ihnen durch Zusammenarbeit statt durch Zwang umgehen und die Beziehungen auf neuer Grundlage wiederaufbauen."
 SOV_the_iron_dimon: "Eiserne Herrschaft"
 SOV_the_iron_dimon_desc: "Das Volk hat die Schwäche satt. Es verlangt nach Stärke. Ein wahrer Führer – hart, unbeugsam und entschlossen – wird aufsteigen, um diesem Ruf zu folgen."
 SOV_the_new_dictatorship: "Neue Diktatur"
 SOV_the_new_dictatorship_desc: "Um unsere Autorität zu festigen, werden wir die Struktur und Effizienz einer neuen Diktatur annehmen, zugeschnitten auf moderne Bedürfnisse."
 SOV_medvedeism: "Medwedewismus"
 SOV_medvedeism_desc: "Der Putinismus hat die Nation im Stich gelassen. Nun kommt eine neue Doktrin: der Medwedewismus – geschaffen, um die Vergangenheit zu korrigieren und Russland in die Zukunft zu führen."
 SOV_defend_national_interests: "Nationale Interessen verteidigen"
 SOV_defend_national_interests_desc: "Da der Staat gesichert ist, werden wir unseren Blick nach außen richten. Die rechtmäßigen Gebiete des russischen Volkes müssen unter unseren Schutz zurückkehren."
 iron_dimon: "Eiserner Dimon"
 pro_western_dima: "Wahrer Liberaler"
 russian_duumviri: "Russische Duumvirn"
 SOV_dimon: "Großrussland"
 sov_medvedev.1.t: "Medwedew entreißt Putin die Macht!"
 sov_medvedev.1.d: "Ursprünglich ins Amt gebracht, um die präsidialen Amtszeitbegrenzungen zu umgehen, hat sich Dmitri Medwedew nun aus Putins Schatten gelöst. Mit seinem Rivalen aus dem Weg steht Medwedew allein an der Spitze der russischen Macht. Ein neues Kapitel der russischen Geschichte beginnt."
 sov_medvedev.1.a: "Unsere Zukunft ist ungewiss."
 sov_medvedev.2.t: ""
 sov_medvedev.2.d: ""
