 SOV_npp_category_desc: "\n\n\n\n\n\n£SOV_desctext_npp \n\n\n\n\n\n\n\n\nUm unsere aktuelle wirtschaftliche Situation zu verbessern, hat die Regierung ein Programm nationaler Projekte gestartet. Es wird uns helfen, das große Russland der Zukunft aufzubauen!\nWir haben §G[?SOV.npp_completed]§! §Ynationale Projekte§! von 5 abgeschlossen, die notwendig sind, um die NPP-Initiative abzuschließen."
