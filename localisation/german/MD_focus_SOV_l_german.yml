 sov_gru.1.t: "Russland will den GRU in unser Land entsenden"
 sov_gru.1.d: "Der russische Geheimdienst hat vorgeschlagen, GRU-Ausbilder und Kampfspezialisten zur Unterstützung unseres Landes zu entsenden."
 sov_gru.1.a: "Wir stimmen zu"
 sov_gru.1.b: "Wir brauchen sie nicht"
 sov_gru.2.t: "[FROM.GetNameWithFlag] hat der Aufnahme unseres GRU zugestimmt"
 sov_gru.2.d: "Ihre Regierung hat zugestimmt, unseren GRU-Operativen die Teilnahme an ihren Militäroperationen zu erlauben. Wir sind bereit, volle Unterstützung zu leisten."
 sov_gru.2.a: "Schön"
 sov_gru.3.t: "[FROM.GetNameWithFlag] hat unseren GRU abgelehnt"
 sov_gru.3.d: "Ihre Regierung hat die Beteiligung unserer Spezialeinheiten abgelehnt, da sie dies als zu starken Eingriff in ihr politisches System ansieht."
 sov_gru.3.a: "Schwächlinge"
 sov_gru.4.t: "GRU-Agenten kehren nach Hause zurück"
 sov_gru.4.d: "GRU-Offiziere sind von ihrer Mission zurückgekehrt und bereit, der Heimat weiter zu dienen."
 sov_gru.4.a: "Gut"
 sov_gru.5.t: "Gründung des Zentrums E"
 sov_gru.5.d: "Wir werden eine neue Abteilung des FSB schaffen, die sich auf die Bekämpfung oppositioneller Aktivitäten konzentriert, insbesondere gegen prowestliche Gruppen."
 sov_gru.5.a: "Gut"
 sov_gru.6.t: "Russland bietet Unterstützung durch die Wagner-PMCs an"
 sov_gru.6.d: "Russische diplomatische Kanäle haben angeboten, ein Kontingent der Wagner-PMC zu entsenden, um uns in der aktuellen Lage zu unterstützen."
 sov_gru.6.a: "Wir stimmen zu"
 sov_gru.6.b: "Wir brauchen sie nicht"
 sov_gru.7.t: "[FROM.GetNameWithFlag] hat Hilfe durch die Wagner-PMCs angenommen"
 sov_gru.7.d: "Ihre Regierung hat unser Angebot einer Unterstützung durch die Wagner-PMC angenommen. Unsere Kämpfer treten eine neue Mission an."
 sov_gru.7.a: "Schön"
 sov_gru.8.t: "[FROM.GetNameWithFlag] hat Hilfe durch die Wagner-PMCs abgelehnt"
 sov_gru.8.d: "Ihre Regierung hat die Unterstützung durch die Wagner-PMC abgelehnt und ist offenbar überzeugt, dass sie die Lage allein bewältigen kann."
 sov_gru.8.a: "Schwächlinge"
 sov_gru.9.t: "PMC Wagner kehrt nach Hause zurück"
 sov_gru.9.d: "Kämpfer der Wagner-PMC haben ihre Mission abgeschlossen und kehren nach Hause zurück."
 sov_gru.9.a: "Schön"
 sov_gru.10.t: "Russland bietet erneut Unterstützung durch die Wagner-PMCs an"
 sov_gru.10.d: "Russische diplomatische Kanäle haben erneut Unterstützung durch die Wagner-PMC angeboten, um uns bei der Bewältigung der Lage zu helfen."
 sov_gru.10.a: "Wir stimmen zu"
 sov_gru.10.b: "Wir brauchen sie nicht"
 sov_gru.11.t: "[FROM.GetNameWithFlag] hat Hilfe durch die Wagner-PMCs angenommen"
 sov_gru.11.d: "Ihre Regierung hat zugestimmt, Unterstützung durch die Wagner-PMC anzunehmen. Unsere Kämpfer werden erneut entsandt."
 sov_gru.11.a: "Schön"
 sov_gru.12.t: "[FROM.GetNameWithFlag] hat Hilfe durch die Wagner-PMCs abgelehnt"
 sov_gru.12.d: "Ihre Regierung hat die Hilfe der Wagner-PMC abgelehnt und vertraut auf ihre eigenen Fähigkeiten."
 sov_gru.12.a: "Schwächlinge"
 sov_gru.13.t: "PMC Wagner kehrt nach Hause zurück"
 sov_gru.13.d: "Kämpfer der Wagner-PMC haben ihren Auftrag beendet und sind auf dem Weg zurück nach Hause."
 sov_gru.13.a: "Schön"
 sov_liberals.26.t: "Die Entwicklung des Fernen Ostens – die zweite Phase"
 sov_liberals.26.d: "Unser Entwicklungsprogramm für den Fernen Osten wird fortgesetzt, während wir die nächste Finanzierungsphase für das Wachstum der Region ankündigen."
 sov_liberals.26.a: "Gut"
 sov_liberals.27.t: "Das Schicksal Georgiens"
 sov_liberals.27.d: "Georgien bleibt eine Herausforderung im Kaukasus. Wir müssen entscheiden, wie wir unsere Beziehungen zu diesem Land gestalten."
 sov_liberals.27.a: "Marsch auf Tiflis"
 sov_liberals.27.b: "Friedliche Beziehungen bleiben unsere Priorität"
 sov_liberals.28.t: "Operation „Sweet Gifts“ wurde erfolgreich abgeschlossen"
 sov_liberals.28.d: "Wir haben das größte Korruptionsnetzwerk des Landes aufgedeckt und zerschlagen sowie führende Oligarchen und Abgeordnete verhaftet. Unsere Hauptaufgabe besteht nun darin, diese neue Ordnung aufrechtzuerhalten."
 sov_liberals.28.a: "Die Anti-Korruptions-Stiftung hat ihre Mission erfüllt"
 sov_liberals.29.t: "Boris Nemzow wurde getötet!"
 sov_liberals.29.d: "Boris Nemzow wurde am 27. Februar 2015 in der Nähe der Großen Moskworezki-Brücke in Moskau ermordet, während er mit dem ukrainischen Model Anna Durizkaja spazieren ging. Die Angreifer kannten seine Route und feuerten sechs Schüsse von hinten ab, die lebenswichtige Organe trafen. Die Täter flohen in einem weißen Auto. Mehrere Verdächtige wurden zu Haftstrafen zwischen 11 und 20 Jahren verurteilt. Der Auftraggeber bleibt unbekannt."
 sov_liberals.29.a: "Zur Kenntnis genommen"
 sov_liberals.30.t: "Jelzins Vermächtnis"
 sov_liberals.30.d: "Nach dem Zusammenbruch der Sowjetunion stand Boris Jelzin, ein schwieriger Anführer, an der Spitze einer schweren Zeit: die Auflösung des Obersten Sowjets, die Tschetschenienkriege, Wirtschaftskrisen und gescheiterte Reformen. Russland suchte später Stabilität unter einer neuen Führung, die Ordnung und Wachstum versprach. Das politische System wandelte sich und konsolidierte die Nation nach den Wirren. Die Zukunft bleibt ungewiss."
 sov_liberals.30.a: "Beobachten wir die Lage genau."
 sov_liberals.31.t: "Jelzins Tod"
 sov_liberals.31.d: "RIA berichtet, dass Boris Jelzin, der erste Präsident des unabhängigen Russland, nach einem langen Kampf gegen eine Herzerkrankung gestorben ist. An der nach ihm benannten Universität wurde eine Schweigeminute abgehalten, und viele westliche Staats- und Regierungschefs haben ihr Beileid ausgesprochen."
 sov_liberals.31.a: "Ruhe in Frieden, Kämpfer für die Freiheit."
 sov_liberals.31.b: "Ruhe in Frieden."
 sov_liberals_news.1.t: "Das große russische demokratische Referendum"
 SOV_nazbols_new_russian_order: "Die neue russische Ordnung"
 SOV_nazbols_new_russian_order_desc: "Eine neue Ordnung dämmert für Russland! Es ist Zeit, die Zersplitterung zu beenden und dem Land die Einheit zurückzubringen."
 SOV_nazbols_no_more_oligarch: "Mit den Oligarchen abrechnen"
 SOV_nazbols_no_more_oligarch_desc: "Die Oligarchen müssen aufhören, Russland auszubeuten. Wir werden entschlossen handeln, um ihre Plünderung zu beenden!"
 SOV_nazbols_natiolalize: "Verstaatlichung der Konzerne"
 SOV_nazbols_natiolalize_desc: "Großkonzerne sind eine düstere Erinnerung an die 90er Jahre. Wir werden sie verstaatlichen, damit sie dem Land und dem Volk zugutekommen."
 SOV_nazbols_west_nationalise: "Verstaatlichung westlicher Unternehmen"
 SOV_nazbols_west_nationalise_desc: "Westliche Konzerne, die in den 90er Jahren auf unser Territorium kamen, müssen gehen. Es ist Zeit, zurückzuholen, was uns gehört."
 SOV_nazbols_destroy_republic: "Die nationalen Republiken beenden"
 SOV_nazbols_destroy_republic_desc: "Nationale Republiken haben in Russland keinen Platz. Wir werden die Fehler der Sowjetunion nicht wiederholen."
 SOV_nazbols_federalism: "An föderalen Ideen festhalten"
 SOV_nazbols_federalism_desc: "Wir unterstützen echten Föderalismus! Die Subjekte sollten autonom sein und nicht nur Regionen, die der Hauptstadt dienen."
 SOV_nazbols_no_export: "Die geschlossene russische Wirtschaft"
 SOV_nazbols_no_export_desc: "Eine geschlossene Wirtschaft ist eine starke Wirtschaft. Russland kann sich diesen Ansatz leisten, weil es alles hat, was es braucht."
 SOV_nazbols_cut_fsb: "Das Budget des FSB kürzen"
 SOV_nazbols_cut_fsb_desc: "Unsere Regierung gibt zu viel für Geheimdienste aus, die die Bürger exzessiv überwachen. Wir werden das Budget des FSB kürzen und diese Struktur verkleinern, denn wir sind ein freies Land!"
 SOV_nazbols_help_science: "Wissenschaft im Dienst Russlands"
 SOV_nazbols_help_science_desc: "Wissenschaft treibt den Fortschritt voran, und wir werden diesen Motor mit erhöhter Finanzierung voll antreiben."
 SOV_nazbols_hate_democracy: "Hass auf Liberalismus und Kommunismus"
 SOV_nazbols_hate_democracy_desc: "Liberalismus und Kommunismus haben zum Niedergang unserer Nation und zum Verlust des russischen Geistes geführt. Wir werden nicht zulassen, dass sie unser Land zerstören."
 SOV_nazbols_new_industrialization: "Neue Industrialisierung"
 SOV_nazbols_new_industrialization_desc: "Wir werden eine neue Industrialisierung starten, um die Stärke der sowjetischen Industrie wiederzubeleben!"
 SOV_nazbols_capital_return: "Abteilung zur Rückführung von Kapital"
 SOV_nazbols_capital_return_desc: "Wir planen die Schaffung einer Sonderbehörde, die damit beauftragt ist, russisches Kapital aus dem Ausland zurückzuholen – mit allen nötigen Mitteln."
 SOV_nazbols_free_weapon: "Freies Tragen von Waffen"
 SOV_nazbols_free_weapon_desc: "Das Recht, Waffen frei zu tragen, wird die russische Gesellschaft verändern! Jeder Bürger sollte das Recht auf Selbstverteidigung haben."
 SOV_nazbols_back_russians: "Die Russen in die Heimat zurückholen"
 SOV_nazbols_back_russians_desc: "Wir werden aktiv die Rückkehr russischsprachiger Menschen in ihre Heimat fördern und finanziell unterstützen."
 SOV_nazbols_return_russian_territories: "Umstrittene russische Gebiete zurückholen"
 SOV_nazbols_return_russian_territories_desc: "Die russische Frage in der ehemaligen Sowjetunion bleibt ungelöst. Wir werden sie entschlossen angehen – entweder mit Ultimaten, oder wir riskieren, selbst verschlungen zu werden."
 SOV_nazbols_belarus_go_home: "Belarus zurückholen"
 SOV_nazbols_belarus_go_home_desc: "Belarus ist ein Stück unserer Heimat, das uns zu Unrecht genommen wurde. Es gibt kein Land, das den Russen ursprünglicher gehört als diese kleine Region."
 SOV_nazbols_separatists_go_home: "Die Separatistenrepubliken annektieren"
 SOV_nazbols_separatists_go_home_desc: "Transnistrien, Abchasien, Südossetien – ihre sogenannte Unabhängigkeit ist ein Überbleibsel von Jelzins Russland. Wir werden das korrigieren."
 SOV_nazbols_help_artsakh: "Arzach schützen"
 SOV_nazbols_help_artsakh_desc: "Arzach ist das standhafteste christliche Gebiet im postsowjetischen Raum, Heimat der ursprünglichsten Armenier. Wir müssen sie schützen!"
 SOV_nazbols_help_kurdistan: "Kurdistan schützen"
 SOV_nazbols_help_kurdistan_desc: "Kurdistan wird unser Brückenkopf in der Region sein, wenn wir dort diplomatischen Einfluss gewinnen. Iran, Irak und die Türkei werden mit unserer Macht dort rechnen müssen."
 SOV_nazbols_anti_westes: "Antiwestliche Doktrin"
 SOV_nazbols_anti_westes_desc: "Keine Gnade für die westlichen Besatzer des russischen Geistes!"
 SOV_nazbols_ayatolla: "Der russische Ajatollah"
 SOV_nazbols_ayatolla_desc: "Nach dem Vorbild des iranischen Ajatollah braucht Russland einen geistlichen Führer, um das moralische Gleichgewicht des Volkes zu bewahren, und nicht seelenlose Ministerien."
 SOV_nazbols_our_irgc: "Das Korps der Wächter der kommunistisch-orthodoxen Revolution"
 SOV_nazbols_our_irgc_desc: "Wir werden ein russisches Gegenstück zu den iranischen Revolutionsgarden schaffen, um die ideologischen Errungenschaften unseres Regimes zu schützen."
 SOV_nazbols_ruralisation: "Ruralisierung"
 SOV_nazbols_ruralisation_desc: "Wir werden massiv in die Entwicklung des agroindustriellen Sektors unserer Wirtschaft investieren."
 SOV_nazbols_new_religion: "Die kommunistisch-orthodoxe Kirche"
 SOV_nazbols_new_religion_desc: "Die orthodoxe Kirche hat ihre Glaubwürdigkeit verloren und im Zweiten Weltkrieg sogar mit den Nazis kooperiert. Wir werden eine neue Kirche schaffen, die das gesamte geistige Erbe Russlands vereint."
 SOV_russian_foreign_legion_idea: "Fremdenlegion"
 SOV_free_weapon: "Freies Tragen von Waffen"
 SOV_russians_back_idea: "Rückkehr der Landsleute"
 SOV_nazbol_irgc_idea: "Das Korps der Wächter der kommunistisch-orthodoxen Revolution"
 sov_nazbol.1.t: "Russland will uns annektieren"
 sov_nazbol.1.d: "Die russische Regierung hat ein Ultimatum gestellt und ein Referendum über den Beitritt zu Russland gefordert. Wir kennen das wahrscheinliche Ergebnis, also ist es Zeit, über unsere Antwort zu entscheiden."
 sov_nazbol.1.a: "Natürlich, es ist Zeit, nach Hause zurückzukehren – nach Russland"
 sov_nazbol.1.b: "Heute nicht"
 sov_nazbol.2.t: "[FROM.GetName] ist in [SOV.GetName] integriert"
 sov_nazbol.2.d: "[FROM.GetName] wurde vollständig in unser glorreiches Reich integriert. Wir holen zurück, was im letzten Jahrhundert verloren ging, und wir werden jetzt nicht aufhören."
 sov_nazbol.2.a: "Unser Land ist stärker geworden"
 sov_nazbol.3.t: "Russland beansprucht unsere Gebiete!"
 sov_nazbol.3.d: "Russland fordert per Ultimatum einen Teil unseres Landes, den es als sein Eigentum betrachtet. Wir müssen entscheiden, wie wir reagieren."
 sov_nazbol.3.a: "Wir werden nachgeben"
 sov_nazbol.3.b: "Niemals"
 sov_nazbol.4.t: "Nationalbolschewiken treten der Koalition bei"
 sov_nazbol.4.d: "Die Nationalbolschewiken sind unserer Regierungskoalition beigetreten und gewinnen Einfluss auf die Politik unseres Landes."
 sov_nazbol.4.a: "Ja, zum Sieg!"
 SOV_nazbol_destroy_republics_TT: "Alle §Ynationalen Republiken§! wurden nicht §Rzerstört§!"
 SOV_wagner_minoboroni: "Versorgung durch das Verteidigungsministerium"
 SOV_wagner_minoboroni_desc: "Das Verteidigungsministerium wird uns mit den nötigen Waffen versorgen, damit wir unsere Operationen durchführen können. Diese Unterstützung wird unsere Fähigkeiten erheblich stärken."
 SOV_wagner_cadres: "Den Rekrutierungsprozess starten"
 SOV_wagner_cadres_desc: "Wir werden damit beginnen, die ersten Kandidaten für unsere PMCs zu rekrutieren. Eine sorgfältige Auswahl ist entscheidend für den Erfolg unserer Operationen."
 SOV_wagner_first_pmc: "Das erste Bataillon der PMCs"
 SOV_wagner_first_pmc_desc: "Unser erstes PMC-Bataillon wurde aufgestellt, und wir sind fast bereit, unsere ersten Kampfeinsätze zu beginnen. Das ist ein wichtiger Meilenstein beim Ausbau unseres Einflusses."
 SOV_wagner_more_operations: "Ausweitung der Aktivitäten"
 SOV_wagner_more_operations_desc: "Unsere PMC ist nun bereit, weltweit an Operationen teilzunehmen. Diese Expansion wird unsere globale Reichweite und Wirkung vergrößern."
 SOV_wagner_african: "Afrikanische Richtung"
 SOV_wagner_african_desc: "Afrika ging nach dem Zusammenbruch der UdSSR verloren; es ist Zeit, unseren Einfluss dort zurückzugewinnen. Eine Wiederherstellung unserer Präsenz wird neue strategische Möglichkeiten eröffnen."
 SOV_wagner_support_gru: "Unterstützung für GRU-Operationen"
 SOV_wagner_support_gru_desc: "Wir werden GRU-Missionen unterstützen, um die Wirksamkeit der russischen Außenpolitik zu erhöhen. Zusammenarbeit wird die Erfolgsquote verdeckter Operationen steigern."
 SOV_wagner_rusich: "DschRG Rusitsch"
 SOV_wagner_rusich_desc: "Wir werden außerdem ein kleines Bataillon von Nationalisten in unsere Reihen aufnehmen und so unsere PMCs verstärken. Ihr ideologisches Engagement macht sie zu wertvollen Verbündeten in unseren Einsätzen."
 SOV_russian_government_idea: "Die russische Regierung"
 SOV_russian_government_idea_desc: "Russlands politische Lage war immer instabil, besonders nach dem Zusammenbruch der UdSSR, da viele politische Faktoren wie innerer Separatismus, politische Instabilität und die Apathie der Bevölkerung gegenüber dem Schicksal des Staates eine Rolle spielen können."
