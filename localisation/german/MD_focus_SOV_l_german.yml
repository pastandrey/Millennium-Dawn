 SOV_inter_rao: "InterRAO in Transnistrien"
 sov_economic.34.t: "Privatisierung des Kraftwerks Kutschurgan"
 sov_economic.34.d: "Inter RAO, ein russisches Unternehmen, plant die Privatisierung unseres leistungsstarken GRES-Kraftwerks. Es verspricht den kontinuierlichen Betrieb sowie schrittweise technische Modernisierungen, was unserem Energiesektor zugutekommen wird."
 sov_economic.34.a: "Wir stimmen zu."
 sov_economic.34.b: "Wir stimmen nicht zu."
 sov_economic.35.t: "Privatisierung des Kraftwerks Kutschurgan"
 sov_economic.35.d: "Die transnistrischen Behörden haben unserem Privatisierungsvorschlag zugestimmt und damit unseren Einfluss in der Region vergrößert."
 sov_economic.35.a: "Positives Ergebnis."
 sov_economic.36.t: "Privatisierung des Kraftwerks Kutschurgan"
 sov_economic.36.d: "Unerwartet haben die transnistrischen Behörden unser Privatisierungsangebot abgelehnt. Wir müssen ihre Entscheidung akzeptieren und weitermachen."
 sov_economic.36.a: "Bedauerlich."
