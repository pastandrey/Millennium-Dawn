 SOV_economic_mmvb: "Moskauer Interbanken-Devisenbörse"
 SOV_economic_mmvb_desc: "Die Moskauer Interbanken-Devisenbörse ist ein wichtiges Finanzinstitut für den Handel mit Währungen und Wertpapieren. Sie spielt eine bedeutende Rolle auf Russlands Finanzmärkten."
 SOV_economic_mosbirja: "Moskauer Börse"
 SOV_economic_mosbirja_desc: "Die Moskauer Börse ist Russlands wichtigste Plattform für den Handel mit Aktien, Anleihen, Derivaten und Währungen. Sie bildet das Rückgrat der finanziellen Infrastruktur des Landes."
 SOV_economic_sber_reorg: "Reform der Sberbank"
 SOV_economic_sber_reorg_desc: "Die Sberbank durchläuft umfassende Reformen, um ihre Abläufe zu modernisieren und ihre Dienstleistungen zu verbessern. Dieser Wandel soll sie kundenorientierter und wettbewerbsfähiger in einer sich wandelnden Finanzlandschaft machen."
 SOV_economic_sber_ipo: "Volks-IPO der Sberbank"
 SOV_economic_sber_ipo_desc: "Die Sberbank plant einen öffentlichen Börsengang, um die Eigentümerstruktur zu verbreitern und ihre Kapitalbasis zu stärken. Diese Initiative wird die Transparenz erhöhen und eine stärkere Beteiligung der Öffentlichkeit ermöglichen."
 SOV_economic_vtb_ipo: "Volks-IPO der VTB"
 SOV_economic_vtb_ipo_desc: "Die VTB Bank bereitet einen öffentlichen Börsengang vor, um Investitionen anzuziehen und ihre Marktpräsenz auszubauen. Dieser Schritt wird ihre finanzielle Stabilität stärken und weiteres Wachstum unterstützen."
 SOV_economic_vtb: "VTB Bank"
 SOV_economic_vtb_desc: "Die VTB Bank ist ein großes russisches Finanzinstitut, das Privatpersonen und Unternehmen ein breites Spektrum an Bankdienstleistungen anbietet. Sie spielt eine Schlüsselrolle im russischen Bankensektor."
 SOV_economic_alpha: "Alpha Bank"
 SOV_economic_alpha_desc: "Die Alpha Bank ist eine führende Privatbank in Russland und bekannt für ihr umfassendes Angebot an Finanzprodukten und Dienstleistungen. Sie betreut sowohl Privat- als auch Firmenkunden."
 SOV_economic_alpha_lab: "Alpha Lab"
 SOV_economic_alpha_lab_desc: "Alpha Lab ist das Innovationszentrum der Alpha Bank und konzentriert sich auf die Entwicklung moderner Finanztechnologien und digitaler Lösungen zur Verbesserung des Kundenerlebnisses."
 SOV_economic_kasperskyi: "Kaspersky Lab"
 SOV_economic_kasperskyi_desc: "Kaspersky Lab ist ein weltweit anerkanntes Cybersicherheitsunternehmen mit Hauptsitz in Russland. Es entwickelt fortschrittliche Antiviren- und Sicherheitssoftware, die Nutzer auf der ganzen Welt schützt."
 SOV_economic_bilene: "Beeline"
 SOV_economic_bilene_desc: "Beeline ist ein führendes russisches Telekommunikationsunternehmen, das Mobilfunk- und Internetdienste im ganzen Land anbietet. Es spielt eine bedeutende Rolle bei der Vernetzung von Menschen und Unternehmen."
