 SOV_nazbol_inner_modifier: "Innenpolitik von [SOV.GetNamewithFlag]"
 SOV_nazbol_inner_modifier_desc: "Die Politik des nationalbolschewistischen Russlands ist das Ergebnis revanchistischer Sehnsucht nach gleich zwei zerstörten Imperien – der UdSSR und dem Russischen Reich. Keine Verhandlungen, nur Krieg."
 SOV_navalny_inner_modifier: "Innenpolitik des Neuen Russland"
 SOV_navalny_inner_modifier_desc: "Die Politik unter liberaler Herrschaft ist durch eine Konzentration auf Russlands Wirtschaftswachstum und eine geringere Fokussierung auf militärische und politische Maßnahmen gekennzeichnet."
 SOV_koba_politic_modifier: "Das Konzept der Öffentlichen Sicherheit"
 SOV_koba_politic_modifier_desc: "Das Konzept der öffentlichen Sicherheit vermittelt ein Verständnis dafür, warum wir glücklich oder unglücklich, gesund oder krank sind, warum jemand Glück hat und jemand anderes nicht, und wie man dies beeinflussen kann. Es liefert Antworten auf die Fragen: Was ist gut und was ist schlecht, was sind Scham und Gewissen, was ist Intuition und warum hören manche auf sie und andere nicht – und ist es wirklich so schwer, das Schicksal zu verändern?"
