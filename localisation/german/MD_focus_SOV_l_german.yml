 SOV_reunification_mission: "Runder Tisch zur Wiedervereinigung"
 sov_dissolution.1.t: "Regionalismus auf dem Vormarsch"
 sov_dissolution.1.d: "Da der jüngste Krieg eine Wende zum Schlechteren nimmt, beginnen immer mehr staatliche Akteure, ihre Unabhängigkeit zu behaupten. Es ist nur eine Frage der Zeit, bis diese Situation außer Kontrolle gerät und zu weitreichender Instabilität führt."
 sov_dissolution.1.a: "Unmöglich"
 sov_dissolution.2.t: "Ein Teil Russlands reintegriert"
 sov_dissolution.2.d: "Nach langen Verhandlungen ist eine weitere Region der Heimat unter ihre wahre Flagge zurückgekehrt. Dies ist ein bedeutender Schritt in Richtung Wiedervereinigung und nationaler Stabilität."
 sov_dissolution.2.a: "Ein Schritt näher"
 sov_dissolution.3.t: "Russland bittet um Freigabe eines Marionettenstaates"
 sov_dissolution.3.d: "Die russische Regierung hat Kontakt aufgenommen, um über die vollständige Unabhängigkeit eines ihrer ehemaligen Gebiete zu verhandeln. Dieser Schritt könnte das Kräfteverhältnis in der Region verändern."
 sov_dissolution.3.a: "Finanzielle Investitionen könnten hilfreich sein"
 sov_dissolution.3.b: "Wir könnten ihre Staatsvermögen aufkaufen"
 sov_dissolution.3.c: "Kommt nicht infrage"
 sov_dissolution.4.t: "[FROM.GetName] verlangt finanzielle Entschädigung"
 sov_dissolution.4.d: "Im Anschluss an Gespräche mit [FROM.GetNamewithFlag] über die mögliche Freigabe von Teilen ihres Landes haben sie eine finanzielle Entschädigung als Gegenleistung vorgeschlagen. Solche Forderungen erschweren den Verhandlungsprozess."
 sov_dissolution.4.a: "Ein kleiner Preis"
 sov_dissolution.4.b: "Nicht möglich"
 sov_dissolution.5.t: "[FROM.GetName] verlangt die Übertragung von Staatsvermögen"
 sov_dissolution.5.d: "In Gesprächen über die Freigabe bestimmter Regionen hat [FROM.GetNamewithFlag] die Übertragung staatlicher Vermögenswerte als Entschädigung gefordert. Diese Forderung muss sorgfältig geprüft werden, bevor es weitergeht."
 sov_dissolution.5.a: "Ein kleiner Preis"
 sov_dissolution.5.b: "Nicht möglich"
 sov_dissolution.6.t: "[FROM.GetName] lehnt mögliche Verhandlungen ab"
 sov_dissolution.6.d: "Trotz unserer Kontaktversuche hat [FROM.GetNamewithFlag] sämtliche Vorschläge zur Freigabe von Teilen seines Territoriums rundweg abgelehnt. Die Lage bleibt angespannt und instabil, und es gibt wenig Hoffnung auf eine baldige Lösung."
 sov_dissolution.6.a: "Arrogante Narren!"
 sov_dissolution.7.t: "[SOV.GetName] stimmt unseren Bedingungen zu"
 sov_dissolution.7.d: "[SOV.GetName] hat unsere angemessenen Entschädigungsforderungen zur Freigabe unseres verbundenen Staates akzeptiert. Dieses Abkommen bringt uns der Wiedervereinigung und dem Frieden näher."
 sov_dissolution.7.a: "Nur Geschäft"
 sov_dissolution.8.t: "[SOV.GetName] lehnt unsere Bedingungen ab"
 sov_dissolution.8.d: "[SOV.GetName] hat sich geweigert, unsere angemessenen Entschädigungsforderungen für die Freigabe unseres verbundenen Staates zu berücksichtigen. Diese Ablehnung könnte den Fortschritt verzögern und die Spannungen erhöhen."
 sov_dissolution.8.a: "Ihr Verlust"
 sov_dissolution.10.t: "Politische Turbulenzen während der Verhandlungen"
 sov_dissolution.10.d: "Während der Gespräche über eine mögliche Reintegration in Russland sind mehrere sensible Fragen aufgetaucht, die den Verhandlungsprozess praktisch zum Stillstand gebracht haben. Das politische Klima bleibt ungewiss und fragil."
 sov_dissolution.10.a: "Nutzen wir einige unserer verfügbaren Mittel"
 sov_dissolution.10.b: "Diese Runde müssen wir aussitzen"
 sov_dissolution.11.t: "Mangel an Mitteln für die Verhandlungen"
 sov_dissolution.11.d: "Während der Gespräche über die Reintegration wurde eine finanzielle Entschädigung vorgeschlagen, um Verwaltungskosten im Zusammenhang mit der Staatsübertragung zu decken. Allerdings drohen Finanzierungslücken den Fortschritt zu stoppen und erfordern eine sorgfältige Haushaltsplanung."
 sov_dissolution.11.a: "Teil des Prozesses"
 sov_dissolution.11.b: "Es ist kein Geld da – aber haltet durch!"
 sov_dissolution.12.t: "Unvereinbare Staatsvermögen"
 sov_dissolution.12.d: "Es hat sich herausgestellt, dass einige staatliche Vermögenswerte während der Reintegration in den Bankrott geraten würden. Wir müssen entschlossen handeln, um diese Probleme zu lösen und die Gespräche voranzubringen."
 sov_dissolution.12.a: "Jetzt verkaufen."
 sov_dissolution.12.b: "Wir brauchen diese Vermögenswerte"
 SOV_reunification_plus_10: "§GDies wird den Fortschritt der Wiedervereinigung um 10 erhöhen§!"
 SOV_reunification_plus_15: "§GDies wird den Fortschritt der Wiedervereinigung um 15 erhöhen§!"
 SOV_reunification_plus_20: "§GDies wird den Fortschritt der Wiedervereinigung um 20 erhöhen§!"
 SOV_reunification_minus_10: "§RDies wird den Fortschritt der Wiedervereinigung um 10 verringern§!"
 pmc_african_corps_TT: "§Y[SOV.GetFlag]Das Afrikakorps§!-Bataillon ist nicht §Gangemietet§!"
 russia.108.t: "Militärmeuterei der Generäle"
 russia.108.d: "Unser Aufstieg an die Macht war für viele in der Bevölkerung und in den russischen Behörden unerwünscht. Unerwartet flohen die Generäle Schoigu und Gerassimow hastig aus Moskau, sammelten ihre Loyalisten in Tatarstan und Tuwa und erklärten uns den Krieg. Dieser Verrat erschütterte die Nation."
 russia.108.a: "Verdammte Verräter!"
 russia.109.t: "Rosgwardija hat einen Aufstand begonnen"
 russia.109.d: "Die von den Generälen Schoigu und Gerassimow angeführte Rebellion hat das Land ins Chaos gestürzt. Nun hat sich auch Solotow, der Chef der Rosgwardija, mit seinen loyalen Kräften dem Aufstand angeschlossen, stellt unsere Regierung offen infrage und vertieft den Bürgerkrieg."
 russia.109.a: "Die Garde der Verräter!"
 russia.110.t: "Die Regierung hat uns verraten"
 russia.110.d: "Regierungsvertreter unter Führung von Wolodin haben in den von ihnen kontrollierten Regionen das Kriegsrecht verhängt. Die Armee ist zersplittert, sodass wir nun nicht nur Rebellen, sondern auch ehemalige Verbündete bekämpfen müssen, die sich gegnerischen Amtsträgern angeschlossen haben."
 russia.110.a: "Beamte sind wie Ratten"
 russia.111.t: "Der kommunistische Aufstand"
 russia.111.d: "Wolgograd ist zum Zentrum eines neuen kommunistischen Aufstands geworden. Mehrere Regionen haben ihre Abspaltung erklärt und wollen ein neues Gegenstück zur UdSSR schaffen. Ein neuer und gefährlicher Feind ist aufgetaucht."
 russia.111.a: "Jetzt auch noch die"
 russia.112.t: "Der neue Tschetschenienkrieg"
 russia.112.d: "Die tschetschenische Regierung hat uns den Krieg erklärt und ihre Loyalität gegenüber Russland aufgekündigt. Sie weigert sich, ein Land zu unterstützen, das sein Überleben und seine Unabhängigkeit nicht garantieren konnte."
 russia.112.a: "Diesmal müssen wir sie endgültig erledigen"
 russia.113.t: "Wütende Patrioten erheben sich"
 russia.113.d: "Igor Strelkow, ein bekannter Militärveteran und Patriot, ist kürzlich in Donezk eingetroffen. Er rief die Bevölkerung des Donbass dazu auf, sich gegen uns zu stellen und die Regierung zu bekämpfen, die sie als korrupt und kriminell betrachten."
 russia.113.a: "Der Donbass hat uns verraten."
 russia.114.t: "Sibirien erhebt sich"
 russia.114.d: "Sibirische Aktivisten haben im Fernen Osten ihre Republik ausgerufen und weigern sich, unsere Regierung anzuerkennen. Diese Abspaltung trennt uns von lebenswichtigen östlichen Gebieten und Ressourcen."
 russia.114.a: "Wir kommen noch zu ihnen."
 russia.115.t: "Die Rückkehr der Uralrepublik"
 russia.115.d: "Die Uralrepublik, ein Projekt von Gouverneur Rossel aus den späten 90er Jahren, wurde von Jelzin zerschlagen. Nun flammt unter den Uralern revanchistische Stimmung wieder auf, und sie arbeiten daran, die frühere Republik wiederzubeleben."
 russia.115.a: "Der Ural wird dafür bezahlen."
 russia.116.t: "Der Aufstand im Norden"
 russia.116.d: "Mitten im Chaos haben liberale Aktivisten im Norden Russlands eine Regierung gebildet, die uns bekämpfen und stürzen will. Ihr Aufstieg eröffnet eine neue Front in den Wirren, die das Land erschüttern."
 russia.116.a: "Sogar diese?!"
