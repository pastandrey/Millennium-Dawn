 SOV_russian_bad_economy_idea: "Zerrüttete Wirtschaft"
 SOV_russian_bad_economy_idea_desc: "Die 90er Jahre hatten enorme Auswirkungen auf die russische Wirtschaft. Die vollständige Zerstörung der sowjetischen Industrie und Forschung und Entwicklung führte zu einer schweren Wirtschaftskrise, die wir lösen müssen."
 sov_economic.41.t: "Initiative der Nationalen Projekte gescheitert!"
 sov_economic.41.d: "Der jüngste Bericht des Wirtschaftsministeriums zeigt, dass wir die Ziele unserer Nationalen Projekte nicht erreicht haben. Dieses Scheitern schadet sowohl unserem internationalen Ansehen als auch dem Vertrauen im Inland. Wie sollen wir auf diesen Rückschlag reagieren?"
 sov_economic.41.o1: "Manipuliert die Fakten; Stabilität ist am wichtigsten."
 sov_economic.41.o2: "Gebt das Scheitern ehrlich zu."
 sov_economic.42.t: "Initiative der Nationalen Projekte erfolgreich!"
 sov_economic.42.d: "Das Wirtschaftsministerium berichtet, dass wir die Ziele unserer Nationalen Projekte erreicht haben! Dieser Erfolg zeigt die Stärke und Fähigkeit unseres Volkes. Es ist ein stolzer Moment für Russland."
 sov_economic.42.o1: "Wir haben es geschafft! Ura!"
