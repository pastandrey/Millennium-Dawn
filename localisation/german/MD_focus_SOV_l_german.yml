 russia.51.d: ""
 russia.51.t: ""
 korea_agree: "§Y[NKO.GetNameWithFlag]§! stimmt zu"
 SOV_borya_ded: "Boris Jelzin ist gestorben"
 SOV_parnas: "PARNAS"
 SOV_parnas_desc: "Die Volksfreiheitspartei (PARNAS) ist eine liberaldemokratische politische Partei und eine der ersten Oppositionsparteien, die in der späten Sowjetzeit gegründet wurden."
 SOV_kasyanov: "Michail Kasjanow"
 SOV_kasyanov_desc: "Michail Michailowitsch Kasjanow (geboren am 8. Dezember 1957) ist ein russischer Staatsmann und Politiker und derzeit Vorsitzender der Volksfreiheitspartei."
 SOV_from_center_to_regions: "Vom Zentrum in die Regionen"
 SOV_from_center_to_regions_desc: "Wir glauben, dass wahrer wirtschaftlicher Wohlstand davon abhängt, den Regionen und Kommunen politisch, wirtschaftlich und administrativ mehr Macht zu geben."
 SOV_eliminate_FSS: "FSS auflösen"
 SOV_eliminate_FSS_desc: "Den FSS in einen Föderalen Gegenspionagedienst umwandeln, indem Ermittlungs- und Anti-Korruptionsfunktionen entfernt und der Regierungsfernmeldedienst sowie die Grenztruppen ausgeschlossen werden."
 SOV_demilitarize_mia: "Das Innenministerium entmilitarisieren"
 SOV_demilitarize_mia_desc: "Die inneren Truppen aus dem Innenministerium abziehen und eine Volksnationalgarde unter Aufsicht von Präsident und Parlament schaffen, wobei der Einsatz von OMON gegen friedliche Proteste verboten wird."
 SOV_reduce_taxes_on_small_businesses: "Steuern für kleine Unternehmen senken"
 SOV_reduce_taxes_on_small_businesses_desc: "Die Senkung der Steuern für kleine Unternehmen ist entscheidend, um unsere Wirtschaft anzukurbeln und Wachstum zu fördern."
 SOV_ease_administrative_pressure: "Den Verwaltungsdruck verringern"
 SOV_ease_administrative_pressure_desc: "Der Verwaltungsdruck auf die Regionen nimmt zu, und wir müssen handeln, um diesen Trend zu stoppen und umzukehren."
 SOV_anti_corruption_agency: "Anti-Korruptionsbehörde"
 SOV_anti_corruption_agency_desc: "Korruption ist tief in der Macht verankert. Ein entschlossenes landesweites Anti-Korruptionsprogramm unter Beteiligung aller Bürger ist unerlässlich."
 SOV_adhere_to_nato_policy: "Sich an der NATO-Politik orientieren"
 SOV_adhere_to_nato_policy_desc: "Die Zusammenarbeit mit der NATO fördert Sicherheit, Stabilität und gegenseitiges Verständnis. Sie hält Russland einflussreich und gleicht globale Interessen aus."
 SOV_establishment_of_free_independent_alliance: "Gründung der Allianz freier unabhängiger Staaten"
 SOV_establishment_of_free_independent_alliance_desc: "Wir müssen die diplomatischen Beziehungen zu allen postsowjetischen Staaten wiederherstellen und möglicherweise eine Union zur gemeinsamen wirtschaftlichen und militärischen Entwicklung bilden."
 SOV_membership_in_a_free_independent_alliance: "Mitgliedschaft in einer Allianz freier unabhängiger Staaten"
 SOV_membership_in_a_free_independent_alliance_desc: "Nachdem unsere Allianz gegründet wurde, werden wir alle ehemaligen Sowjetrepubliken einladen, ihr beizutreten und gemeinsam die Demokratie zu verteidigen."
 SOV_membership_subjects: "Mitgliedschaft der Subjekte"
 SOV_membership_subjects_desc: "Unsere Allianz ist ohne die Beteiligung der Subjekte unserer Föderation nicht vollständig."
 SOV_membership_east: "Mitgliedschaft des Ostens"
 SOV_membership_east_desc: "Die Einladung östlicher Länder wird unsere Allianz mit ihren Ressourcen, Volkswirtschaften und militärischen Fähigkeiten stärken und damit unsere Verteidigung und den Schutz der Demokratie verbessern."
 SOV_membership_pribalt: "Mitgliedschaft des Baltikums"
 SOV_membership_pribalt_desc: "Die Einbeziehung der baltischen Staaten bietet strategischen Zugang zur Ostsee und stärkt Industrie und Technologie. Ohne sie droht unsere Allianz wichtiges Territorium und Verbündete zu verlieren."
 SOV_membership_caucasus: "Mitgliedschaft des Kaukasus"
 SOV_membership_caucasus_desc: "Der Kaukasus bringt strategische Ressourcen und geopolitische Bedeutung mit sich. Ihn auszuschließen würde unseren regionalen Einfluss und die demokratische Stabilität schwächen."
 SOV_membership_ces: "Mitgliedschaft Zentralasiens"
 SOV_membership_ces_desc: "Die Ressourcen und die Lage Zentralasiens sind von entscheidender Bedeutung. Ihre Einbeziehung wird Märkte erweitern, die Sicherheit stärken und unseren regionalen Einfluss erhöhen."
 SOV_free_economic_zone: "Freie Wirtschaftszone"
 SOV_free_economic_zone_desc: "Wir sollten Kaliningrad in eine freie Wirtschaftszone verwandeln, die als Brücke für die Zusammenarbeit zwischen Russland und der EU dient."
 SOV_transfer_state_shares_to_pension_funds: "Staatsanteile an Pensionsfonds übertragen"
 SOV_transfer_state_shares_to_pension_funds_desc: "Um den Lebensstandard und die Lebenserwartung der Bürger zu verbessern, werden staatliche Anteile mit eingeschränkten Stimmrechten an den Russischen Rentenfonds übertragen."
