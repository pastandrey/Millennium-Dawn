 sov_nationalists.10.t: "Bündnis mit §Y[PER.GetNameWithFlag]§!"
 sov_nationalists.10.d: "Die iranische Regierung hat sich geweigert, unserem Bündnis durch einen Vertrag beizutreten. Es scheint, dass wir unseren Willen mit Gewalt durchsetzen müssen."
 sov_nationalists.10.a: "Der Iran wird uns gehören!"
 sov_nationalists.11.t: ""
 sov_nationalists.11.d: ""
 sov_nationalists.11.a: ""
 sov_nationalists.12.t: "§Y[SOV.GetNameWithFlag]§! bietet an, dem Bündnis beizutreten"
 sov_nationalists.12.d: "Die russische Regierung schlägt eine Reihe von Abkommen vor, die uns vor einer Invasion schützen sollen. Werden wir ihr Angebot annehmen und dem Bündnis beitreten?"
 sov_nationalists.12.a: "Russland wird uns retten!"
 sov_nationalists.12.b: "Nein"
 sov_nationalists.13.t: "Bündnis mit §Y[FROM.GetNameWithFlag]§!"
 sov_nationalists.13.d: "Die Regierung von [FROM.GetName] hat sich geweigert, unserem Bündnis per Vertrag beizutreten. Offenbar müssen wir unseren Willen mit Gewalt durchsetzen."
 sov_nationalists.13.a: "Traurige Nachrichten"
 sov_nationalists.14.t: "Militärübungen mit §Y[FROM.GetNameWithFlag]§!"
 sov_nationalists.14.d: "Russland führt gemeinsame Militärübungen mit unseren Streitkräften und denen anderer Verbündeter durch, um sich auf eine mögliche militärische Intervention in der Türkei vorzubereiten."
 sov_nationalists.14.a: "Wir werden bereit sein"
 sov_nationalists.15.t: "Der Unionsstaat mit §Y[SOV.GetNameWithFlag]§!"
 sov_nationalists.15.d: "Die russische Regierung schlägt vor, das frühere Projekt eines Unionsstaates zwischen Russland und Serbien wiederzubeleben. Ursprünglich in den 1990er-Jahren von der Jelzin-Regierung abgelehnt, wollen sie dieses Bündnis nun wieder aufleben lassen. Werden wir zustimmen?"
 sov_nationalists.15.a: "Ja"
 sov_nationalists.15.b: "Nein"
 sov_nationalists.16.t: "Der Unionsstaat mit §Y[SER.GetNameWithFlag]§!"
 sov_nationalists.16.d: "Die serbische Regierung hat zugestimmt, das Projekt des Unionsstaates wiederaufzunehmen, was ein neues Kapitel unserer Zusammenarbeit einläutet."
 sov_nationalists.16.a: "Gut"
 sov_nationalists.17.t: "Der Unionsstaat mit §Y[SER.GetNameWithFlag]§!"
 sov_nationalists.17.d: "Die serbische Regierung hat sich geweigert, das Projekt des Unionsstaates wieder aufzunehmen. Dieser Rückschlag ist enttäuschend für jene, die hofften, unsere Beziehungen zu stärken und unsere Nationen zu vereinen. Wir müssen unsere nächsten Schritte sorgfältig abwägen."
 sov_nationalists.17.a: "Bedauerlich"
 sov_nationalists.18.t: ""
 sov_nationalists.18.d: ""
 sov_nationalists.18.a: ""
 sov_nationalists.19.t: "Abkommen mit Russland"
 sov_nationalists.19.d: "Russlands imperiale Ambitionen haben bereits unsere Grenzen erreicht. Seine Regierung hat ein direktes Ultimatum gestellt und die Kontrolle über unser Land gefordert. Die Frage bleibt: Sollen wir Widerstand leisten oder uns ihren Forderungen beugen?"
 sov_nationalists.19.a: "Wir geben auf"
 sov_nationalists.19.b: "Heute nicht"
 sov_nationalists.20.t: "Neues Russisches Reich"
 sov_nationalists.20.d: "Präsident Schirinowski hat die Wiederbelebung des Russischen Reiches zum Grundpfeiler seiner politischen Agenda erklärt. Ob mit friedlichen Mitteln oder mit Gewalt – Russland ist bereit, seine einstigen Gebiete zurückzufordern. Wir müssen uns auf die Möglichkeit erneuter Konflikte vorbereiten, während das Reich wieder aufersteht."
 sov_nationalists.20.a: "Gott schütze den Präsidenten."
 sov_nationalists.21.t: "Reimperialisierung"
 sov_nationalists.21.d: "Nach dem Aufstand von 1917 versuchten die Kommunisten, die Erinnerung an die Vergangenheit unserer Heimat auszulöschen und durch ihre Ideologie zu ersetzen. Viele russische Städte wurden nach kommunistischen Führern und Symbolen umbenannt. Wir müssen unsere Geschichte und Würde wiederherstellen, indem wir den Städten ihre vorrevolutionären Namen zurückgeben."
 sov_nationalists.21.a: "Bringen wir die alten vorrevolutionären Stadtnamen zurück"
 sov_nationalists.21.b: "Die Vorkriegstitel waren besser"
 sov_nationalists.22.t: "Russland schlägt vor, ein Referendum abzuhalten"
 sov_nationalists.22.d: "Die russische Regierung hat vorgeschlagen, ein dringendes Referendum über den Beitritt zu ihrer Union abzuhalten. Dieser plötzliche Vorschlag unterstreicht das Tempo und die Entschlossenheit hinter Russlands neuer Politik. Die Frage ist: Werden wir dieses Referendum abhalten und sein Ergebnis akzeptieren?"
 sov_nationalists.22.a: "Tun wir es und akzeptieren wir das Ergebnis"
 sov_nationalists.22.b: "Wir wollen nicht Teil Russlands sein"
 sov_nationalists.23.t: "Russland fordert die Mandschurei"
 sov_nationalists.23.d: "Russland hat die Annexion der Mandschurei als Teil seines Plans zur Wiedererschaffung Scheltorossijas gefordert. Dieser aggressive Anspruch zwingt uns dazu, zu entscheiden, ob wir uns fügen oder ihren Ambitionen widerstehen."
 sov_nationalists.23.a: "Wir müssen uns fügen..."
 sov_nationalists.23.b: "Heute kein Scheltorossija."
 sov_nationalists.24.t: "China akzeptiert unsere Forderung"
 sov_nationalists.24.d: "China hat unseren Forderungen bezüglich der Mandschurei zugestimmt. Mit dieser Einwilligung haben wir endlich die Kontrolle über Scheltorossija gesichert. Dieser Sieg markiert einen wichtigen Schritt in unseren regionalen Ambitionen."
 sov_nationalists.24.a: "Slawa Rossii!"
 sov_nationalists.25.t: "China lehnt unsere Forderung ab"
 sov_nationalists.25.d: "China hat unsere Forderungen bezüglich der Mandschurei abgelehnt. Nun müssen wir militärische Maßnahmen in Erwägung ziehen, um Scheltorossija zurückzuerobern und unsere Ansprüche durchzusetzen."
 sov_nationalists.25.a: "Sie haben den Tod gewählt."
 sov_nationalists.26.t: "Russland erklärt den USA den Krieg"
 sov_nationalists.26.d: "Die nationalistische Regierung Russlands hat einen Einigungskrieg gegen die atlantizistische Bedrohung der Weltordnung erklärt. Diese plötzliche Erklärung signalisiert eine neue Phase des globalen Konflikts."
 sov_nationalists.26.a: "Was zur Hölle?!"
 sov_nationalists.27.t: "Abkommen mit Russland"
 sov_nationalists.27.d: "Russlands imperiale Ambitionen haben nun unsere Grenzen erreicht. Seine Regierung hat ein direktes Ultimatum gestellt und die Kontrolle über unser Land gefordert. Die Frage bleibt: Sollen wir Widerstand leisten oder uns fügen?"
 sov_nationalists.27.a: "Wir geben auf"
 sov_nationalists.27.b: "Heute nicht"
 sov_nationalists.28.t: "Schutz vor Georgien"
 sov_nationalists.28.d: "Russland hat angeboten, ein Referendum über unseren Beitritt zu seiner Union abzuhalten. Das erwartete Ergebnis ist klar, doch wir müssen entscheiden, ob wir diesen Vorschlag annehmen oder ablehnen."
 sov_nationalists.28.a: "Natürlich, es ist Zeit, nach Hause zu gehen – nach Russland"
 sov_nationalists.28.b: "Heute nicht"
 sov_nationalists.29.t: "Unerwartete Union"
 sov_nationalists.29.d: "Niemand hatte mit einer Zusammenarbeit mit den Kommunisten gerechnet, doch sie ist nun zu einer unerwarteten Entwicklung geworden. Dieses Bündnis könnte die politische Landschaft dramatisch verändern."
 sov_nationalists.29.a: "Interessant"
 sov_nationalists.30.t: "Den neuen Monarchen wählen..."
 sov_nationalists.30.d: "Russland braucht einen starken neuen Monarchen, um das wiederbelebte Reich zu führen. Wir müssen entscheiden, wer den Thron besteigen und die Nation durch diese turbulenten Zeiten führen soll."
 sov_nationalists.30.d1: "Andrei Romanow ist der legitimste Kandidat!"
 sov_nationalists.30.b: "Maria Wladimirowna!"
 sov_nationalists.30.c: "Georgij sollte herrschen!"
 sov_nationalists.30.a: "Nikolaus der Dritte!"
 sov_nationalists.31.t: "Vereinigung von Kirche und Staat"
 sov_nationalists.31.d: "Die Regierung hat die Verschmelzung von Kirche und Staat zu einer einheitlichen Ordnung angekündigt. Die orthodoxe Kirche ist nun vollständig in die herrschenden Kreise integriert, wodurch die historische Harmonie zwischen geistlicher und politischer Autorität wiederhergestellt wird."
 sov_nationalists.31.a: "Zarebozhniki."
 sov_nationalists.32.t: "Schirinowski zum Präsidenten gewählt"
 sov_nationalists.32.d: "Beim jüngsten Regierungswechsel hat die nationalistische LDPR die Macht errungen, und Wladimir Schirinowski wurde zum Präsidenten gewählt. Sie haben weitreichende Reformen versprochen, darunter die Wiederherstellung der alten Flagge und die Verfolgung einer konservativ-nationalistischen Agenda."
 sov_nationalists.32.a: "Was erwartet Russland?"
 sov_nationalists.33.t: "Militäroperation in [UKR.GetName]"
 sov_nationalists.33.d: "Die diplomatischen Bemühungen, die Ukraine in das Russische Reich zurückzuführen, sind gescheitert. Nun werden militärische Maßnahmen ergriffen, um die derzeitige Regierung zu stürzen und diese Gebiete zurückzuerobern."
 sov_nationalists.33.a: "Kiew wird uns gehören!"
 sov_nationalists.34.t: "Die Armee von [SOV.GetName]"
 sov_nationalists.34.d: "Unser wiedergeborener Staat braucht ein starkes und fähiges Militär. Wir werden Reformen durchführen, um unsere Streitkräfte für die kommenden Herausforderungen zu modernisieren und zu stärken."
 sov_nationalists.34.a: "Für [SOV.GetName]!"
 sov_nationalists.35.t: "Das Moskauer Abkommen wurde unterzeichnet!"
 sov_nationalists.35.d: "Wir haben offiziell ein neues militärisch-politisches Bündnis geschaffen, das der Förderung russischer Interessen und dem Widerstand gegen die westlichen Mächte dient. Dieser Block wird ein zentrales Instrument unserer erneuerten Stärke sein."
 sov_nationalists.35.a: "Für [SOV.GetName]!"
 sov_nationalists.36.t: "Gouvernement [NOV.GetName]"
 sov_nationalists.36.d: "[NOV.GetName] wird vollständig in das Russische Reich eingegliedert. Die russische Flagge wird erneut über diesem Land wehen und seine Rückkehr ins Mutterland markieren."
 sov_nationalists.36.a: "Für [SOV.GetName]!"
 sov_nationalists.37.t: "Kosakenaufstände in [KAZ.GetName]"
 sov_nationalists.37.d: "Uns loyale Kosakengruppen in [KAZ.GetName] haben bewaffnete Aufstände begonnen, nachdem wir angekündigt haben, diese Gebiete für [SOV.GetName] zurückzufordern. Ihre erbitterte Loyalität nährt diesen Aufstand."
 sov_nationalists.37.a: "Für [SOV.GetName]!"
 sov_nationalists.38.t: "Militäroperation in Zentralasien"
 sov_nationalists.38.d: "Die zentralasiatischen Republiken sind ein Produkt sowjetischer Fehlentscheidungen, die ihnen eine falsche Unabhängigkeit verliehen haben. Wir werden diese Gebiete notfalls mit Gewalt in unser großes Reich zurückführen."
 sov_nationalists.38.a: "Für [SOV.GetName]!"
 sov_nationalists.39.t: "Antirussischer bewaffneter Aufstand"
 sov_nationalists.39.d: "Unsere prorussische Politik hat unter einigen Generälen eine Meuterei ausgelöst, die nun auf Warschau marschieren, um die russischen Besatzungstruppen zu stürzen, welche die polnische Regierung kontrollieren."
 sov_nationalists.39.a: "Oh Gott"
 SOV_URA_separ_tt: "§RSeparatismus§! in §Y[URA.GetNameWithFlag]§!: §Y[?URA.subjectinped]§!%"
 SOV_question_of_genrih: "Die deutsche monarchische Revolution"
 SOV_question_of_genrih_desc: "Wir planen, die korrupte und scheiternde deutsche Regierung zu stürzen und den Deutschen ihre frühere Größe zurückzugeben – natürlich als Teil Russlands. Diese Revolution wird das Kräfteverhältnis in Europa neu ordnen."
 SOV_suppress_nationalists: "Nationalisten unterdrücken"
 SOV_suppress_nationalists_desc: "Russische Nationalisten bedrohen die Entstehung jeder westlich geprägten Demokratie. Sie müssen unterdrückt werden."
 jirik_czech_slovak_tt: "£text_icon_empire §YSchaltet§! §Y[CZE.GetFlag] tschechische und [SLO.GetFlag] slowakische Gouvernements§!-Entscheidungen §Yfrei§!"
 SOV_iraq_moscow_pact: "Irak schützen"
 SOV_iraq_moscow_pact_desc: ""
 sov_nationalists.40.t: "Antirussischer bewaffneter Aufstand"
 sov_nationalists.40.d: "Unsere prorussische Haltung hat bestimmte Generäle zum Aufstand veranlasst, die nun erklären, die gesamte prorussische Regierung gewaltsam aus der Tschechischen Republik vertreiben zu wollen."
 sov_nationalists.40.a: "Oh Gott"
 SOV_czechoslovak_region: "Tschechoslowakische Region"
 SOV_czechoslovak_region_desc: "Wie schon 1968 ist die Tschechoslowakei für uns weiterhin von großem strategischem Interesse. Die Sicherung unseres Einflusses hier wird unsere Vormachtstellung in Osteuropa festigen. Wir müssen entschlossen handeln, um unsere Position wiederherzustellen."
 SOV_promotion_of_unite_with_russia_agains_chechos: "§YRussische§! Interessen in §Y[CZE.GetNameWithFlag]§! und §Y[SLO.GetNameWithFlag]§! fördern"
 SOV_perevorot_czechia_govern: "§Y[SOV.GetFlag]§!§YPro-russischer§! Putsch in §Y[CZE.GetNameWithFlag]§!"
 SOV_perevorot_slovakia_govern: "§Y[SOV.GetFlag]§!§YPro-russischer§! Putsch in §Y[SLO.GetNameWithFlag]§!"
 SOV_unite_of_greater_russia: "Vereint, großartig und unteilbar"
 SOV_unite_of_greater_russia_desc: "Russland muss ein geeintes, unteilbares Land ohne nationale Spaltungen sein. Die Zersplitterung in Republiken hat einst unseren mächtigen Staat zerstört, und nur die Einheit kann unsere Stärke wiederherstellen."
 SOV_republickill_23_TT: "[CHE.GetFlag][TAT.GetFlag][BSH.GetFlag] Die meisten §YNationalrepubliken§! wurden §Rliquidiert§!§Y(Mehr als 18)§!"
 sov_nationalists.41.t: "§Y[SOV.GetNameWithFlag]§! fordert Truppen auf unserem Territorium"
 sov_nationalists.41.d: "Die russische Regierung fürchtet eine mögliche Bedrohung unsererseits und verlangt militärischen Zugang zu unserem Land. Sollen wir ihnen den Durchmarsch gewähren, um Spannungen abzubauen, oder ablehnen?"
 sov_nationalists.41.a: "Wenn das der Weg zu einer friedlichen Lösung ist, stimmen wir zu"
 sov_nationalists.41.b: "Nein"
 sov_nationalists.42.t: "Sie haben unseren Vorschlag abgelehnt"
 sov_nationalists.42.d: "Ihre Weigerung zur Zusammenarbeit hat uns überzeugt, dass sie eine echte Bedrohung für die Sicherheit unserer Nation darstellen. Wir müssen auf weitere Konflikte vorbereitet sein."
 sov_nationalists.42.o1: "Narren"
 sov_war_cult_idea: "Der Kriegskult"
 sov_war_cult_idea_desc: "Russlands Geschichte ist von Krieg und Sieg geprägt. Von Napoleon bis Hitler haben wir zahllosen Bedrohungen standgehalten. Diese Geschichte hat eine tiefe kulturelle Verehrung für Stärke und Opferbereitschaft hervorgebracht."
 SOV_return_alaska: "Rückkehr Alaskas"
 SOV_return_alaska_desc: "Alaska wurde vor Jahrhunderten von törichten Herrschern für einen Spottpreis verkauft. Nun ist es an der Zeit, dieses lebenswichtige Gebiet zurückzuerobern und in seine rechtmäßige Heimat zurückzuführen."
 SOV_jirik_war_religion: "Imperiale Militärreligion"
 SOV_jirik_war_religion_desc: "Unsere Nation muss dem Pazifismus abschwören und einen militarisierten orthodoxen Glauben annehmen, um das Volk zu einen und zu stärken."
 GOV_SLO: "Slowakisches Gouvernement"
 GOV_CZE: "Königreich Böhmen"
 GOV_ASK: "Gouvernement Alaska"
 sov_nationalists.43.t: "Invasion Alaskas"
 sov_nationalists.43.d: "Unsere Streitkräfte sind erfolgreich auf alaskischem Boden gelandet und bereit, dieses Gebiet mit Gewalt zurückzuerobern. Dies markiert den Beginn einer kühnen neuen Kampagne."
 sov_nationalists.43.o1: "Das Gouvernement Alaska sollte zurückkehren"
 SOV_protect_russians: "Das Gesetz zum Schutz der Russen"
 SOV_protect_russians_desc: "Wir werden Russen überall dort schützen, wo sie leben, und unsere Landsleute nicht im Stich lassen. Dieses Gesetz sichert ihre Rechte und ihre Sicherheit und bekräftigt unser Engagement für das russische Volk weltweit."
 SOV_IRQ_base: "[SOV.GetFlag]Russischer Militärstützpunkt"
 SOV_IRQ_base_desc: "Der russische Militärstützpunkt, der sich in der Nähe unserer Hauptstadt befindet, erinnert uns daran, dass Russland uns im Falle eines globalen Krieges nicht im Stich lassen wird. Doch wenn sich das Regime in unserem Land oder in Russland drastisch ändert, wird der Stützpunkt sofort geschlossen."
 SOV_IRQ_military_advisors: "Militärausbilder aus [SOV.GetNameWithFlag]"
 SOV_iraq_weapons: "§Y[IRQ.GetNameWithFlag]§! Waffen anbieten"
 SOV_iraq_instructors: "GRU nach §Y[IRQ.GetNameWithFlag]§! entsenden"
 SOV_iraq_bases: "Die Stationierung einer Militärbasis in §Y[IRQ.GetNameWithFlag]§! anbieten"
 jirik_iraq_tt: "£text_icon_empire §YSchaltet§! §GUnterstützung§! für §Y[IRQ.GetNameWithFlag]§! in außenpolitischen Entscheidungen §Yfrei§!"
 sov_nationalists.44.t: "[FROM.GetName] bietet Waffen an"
 sov_nationalists.44.d: "[FROM.GetName] hat angeboten, uns Waffen zu liefern, die in unseren kommenden Konflikten von unschätzbarem Wert sein werden. Diese Unterstützung wird unsere militärischen Fähigkeiten stärken."
 sov_nationalists.44.o1: "Wir stimmen zu"
 sov_nationalists.44.o2: "Wir brauchen das nicht"
 sov_nationalists.45.t: "[FROM.GetName] hat unserem Vorschlag zugestimmt"
 sov_nationalists.45.d: "[FROM.GetName] hat unser großzügiges Angebot angenommen, was einen weiteren Schritt zur Stärkung unseres Bündnisses und zur Ausweitung unseres Einflusses in der Region darstellt."
 sov_nationalists.45.o1: "Gut"
 sov_nationalists.46.t: "[FROM.GetName] bietet Militärausbilder an"
 sov_nationalists.46.d: "[FROM.GetName] schlägt vor, Militärausbilder zu entsenden, um unsere Truppen in modernen Kriegstaktiken auszubilden. Diese Ausbildung wird die Effektivität unserer Armee erhöhen."
 sov_nationalists.46.o1: "Wir stimmen zu"
 sov_nationalists.46.o2: "Wir brauchen das nicht"
 sov_nationalists.47.t: "[FROM.GetName] hat unserem Vorschlag zugestimmt"
 sov_nationalists.47.d: "[FROM.GetName] hat unser Angebot angenommen und damit unser Bündnis weiter gefestigt und unseren politischen Einfluss in diesem Gebiet ausgebaut."
 sov_nationalists.47.o1: "Gut"
 sov_nationalists.48.t: "[FROM.GetName] hat unser Angebot abgelehnt"
 sov_nationalists.48.d: "[FROM.GetName] hat unser großzügiges Angebot zurückgewiesen und damit eine Gelegenheit verpasst, unseren Einfluss zu stärken und die eigene politische Lage zu stabilisieren."
 sov_nationalists.48.o1: "Bedauerlich"
 sov_nationalists.49.t: "[FROM.GetName] bietet an, einen Militärstützpunkt zu beherbergen"
 sov_nationalists.49.d: "[FROM.GetName] hat angeboten, auf seinem Territorium einen Militärstützpunkt einzurichten, um uns bei der Abwehr potenzieller Gegner zu unterstützen. Das könnte ein strategischer Vorteil sein."
 sov_nationalists.49.o1: "Wir stimmen zu"
 sov_nationalists.49.o2: "Wir brauchen das nicht"
 SOV_save_gaddafi: "Schützt Libyen"
 SOV_save_gaddafi_desc: "Ausländischen Armeen wird nicht erlaubt werden, Tripolis zu beherrschen. Wir sind entschlossen, die Souveränität Libyens zu verteidigen und uns gegen ausländische militärische Interventionen zu stellen."
 SOV_help_karabah: "Karabach von Aserbaidschan befreien."
 SOV_help_karabah_desc: "Wir erkennen die aserbaidschanische Besetzung Karabachs nicht an und beabsichtigen, diese Gebiete unserem Reich zurückzugeben. Diese Befreiung wird die historische Gerechtigkeit wiederherstellen und unsere südlichen Grenzen stärken."
 SOV_LBA_base: "[SOV.GetFlag]Russischer Militärstützpunkt"
 SOV_LBA_base_desc: "Der russische Militärstützpunkt, der sich in der Nähe unserer Hauptstadt befindet, erinnert uns daran, dass Russland uns im Falle eines globalen Krieges nicht im Stich lassen wird. Doch wenn sich das Regime in unserem Land oder in Russland drastisch ändert, wird der Stützpunkt sofort geschlossen."
 SOV_libya_weapons: "§Y[LBA.GetNameWithFlag]§! Waffen anbieten"
 SOV_libya_instructors: "GRU nach §Y[LBA.GetNameWithFlag]§! entsenden"
 SOV_libya_bases: "Die Stationierung einer Militärbasis in §Y[LBA.GetNameWithFlag]§! anbieten"
 jirik_lybia_tt: "£text_icon_empire §YSchaltet§! §GUnterstützung§! für §Y[LBA.GetNameWithFlag]§! in außenpolitischen Entscheidungen §Yfrei§!"
