 demsov_supp_aze: "Wir haben Aserbaidschan unterstützt"
 sov_furgal.1.t: "Fall Sergei Furgal"
 sov_furgal.1.d: "In Russlands Region Chabarowsk präsentiert sich der Gouverneur der nationalistischen LDPR als „heiliger Mann“. Er entfernt Beamte, die uns loyal sind, bekämpft Korruption aggressiv, kürzt Gehälter und entlässt viele Bürokraten. Einerseits können wir ihn als Beispiel für Integrität loben. Andererseits stört er die Geschäftsinteressen der uns loyalen Oligarchen zu sehr und stärkt nationalistische und demokratische Ideen. Wie sollen wir mit dieser Situation umgehen?"
 sov_furgal.1.a: "Er hat mein Vertrauen verloren. Erfindet ein Strafverfahren gegen ihn."
 sov_furgal.1.b: "Unterstützen wir dieses Verhalten!"
 sov_furgal.2.t: "Furgal ist im Gefängnis!"
 sov_furgal.2.d: "Furgal wurde verurteilt und inhaftiert. Die regionale Hauptstadt wurde von Chabarowsk nach Wladiwostok verlegt. Allerdings protestieren die Einwohner Chabarowsks gegen Furgals Verhaftung, fordern die Absetzung unseres obersten Führers und verlangen seine Freilassung. Anders als liberale Demonstranten schwenken Furgals Unterstützer Chabarowsk-Flaggen. Was werden wir tun?"
 sov_furgal.2.a: "Zerschlagt die Proteste!"
 sov_girkin.1.t: "Einnahme von Slawjansk!"
 sov_girkin.1.d: "Anfangs war der Konflikt im Donbass nicht gewalttätig. Obwohl die Volksrepublik Donezk ausgerufen wurde und der pro-Euromaidan-Aktivist Dmitri Tschernjawski getötet wurde, fehlte den Separatisten echte Macht. Polizei und Sicherheitskräfte zögerten, und die lokale Unterstützung war gering. Die meisten Menschen nahmen nur an friedlichen Kundgebungen teil, während die besetzte Regionalverwaltung von einer Mischung aus Extremisten, Kriminellen und russischen Aktivisten aus Grenzgebieten gehalten wurde. Nur wenige Führer der DVR wie Alexander Chryakow und Andrei Purgin waren bekannt. Die meisten glaubten, die Separatisten würden sich schnell zerstreuen. Doch die Lage eskalierte unerwartet in Slawjansk, einer Stadt mit 120.000 Einwohnern im Norden von Donezk. Eine Gruppe von 52 bewaffneten Männern nahm mit nur geringem Widerstand die städtische Polizeistation ein. Sie benutzten Sprengstoff und ein Fahrzeug, um in das Gebäude einzubrechen — ein Wendepunkt im Konflikt."
 sov_girkin.1.a: "Interessant"
 SOV_support_nov_idea: "Russische Unterstützung"
 SOV_supportlnrdnr_rus: "LVR und DVR unterstützen"
 SOV_supportlnrdnr_rus_desc: "Es ist Zeit, die Republiken im Donbass zu unterstützen und unseren Einfluss dort zu stärken."
 SOV_peacekeeping_in_artsakh: "Friedenssicherung in Arzach"
 SOV_peacekeeping_in_artsakh_desc: "Als führende Macht im postsowjetischen Raum müssen wir unseren Status wahren, indem wir den Arzach-Konflikt verantwortungsvoll und entschlossen lösen."
 SOV_friend_assad: "Assad darf NICHT gehen"
 SOV_friend_assad_desc: "Syrien ist ein wichtiger Verbündeter für uns. Wir müssen sicherstellen, dass Assads Regime stabil bleibt, um unsere Interessen in der Region zu schützen."
 rec_nov_TT: "Wir werden [NOV.GetFlag]§YDonbass§! als unabhängig anerkennen und uns auf eine §RInvasion§! vorbereiten"
 annex_nov_TT: "Wir werden die [NOV.GetFlag]§YRepubliken des Donbass§! durch dort abgehaltene Referenden §Rannektieren§!"
 gazprom_pmc_TT: "§2Gazprom§! wird §YPMC-Bataillone§! bilden, um sie in den §RKrieg§! zu schicken"
 SOV_malorussia_lib_army_tt: "Ein Bataillon der £text_icon_moa §YMalorossija-Befreiungsarmee§! wird aufgestellt"
 SOV_trade_with_kazakhstan: "Handel mit Kasachstan"
 SOV_trade_with_kazakhstan_desc: "Kasachstan war schon immer einer unserer engsten Freunde in Zentralasien. Eine Ausweitung des Handels zwischen unseren Ländern wird beiden Volkswirtschaften zugutekommen und unseren regionalen Einfluss stärken."
 SOV_trade_with_azerbaijan: "Handel mit Aserbaidschan"
 SOV_trade_with_azerbaijan_desc: "Aserbaidschan ist ein vielversprechender Partner. Eine Intensivierung des Handels mit ihm wird helfen, unsere Präsenz im Kaukasus auszubauen und die wirtschaftlichen Beziehungen zu stärken."
 SOV_trade_with_tajikistan: "Handel mit Tadschikistan"
 SOV_trade_with_tajikistan_desc: "Tadschikistan ist seit langem ein verlässlicher Partner. Eine Stärkung der Handelsbeziehungen wird gewinnbringende Möglichkeiten schaffen und unser Bündnis festigen."
 SOV_trade_with_kyrgyzstan: "Handel mit Kirgisistan"
 SOV_trade_with_kyrgyzstan_desc: "Kirgisistan ist ein wichtiger Verbündeter in Zentralasien. Eine Ausweitung des Handels mit ihm wird unsere Partnerschaft festigen und gegenseitiges Wachstum fördern."
 SOV_trade_with_armenia: "Handel mit Armenien"
 SOV_trade_with_armenia_desc: "Armenier sind unsere Brüder im Kaukasus. Mehr Handel mit Armenien wird beiden Volkswirtschaften zugutekommen und unsere regionale Zusammenarbeit vertiefen."
 SOV_trade_with_uzbekistan: "Handel mit Usbekistan"
 SOV_trade_with_uzbekistan_desc: "Usbekistan stellt einen großen und wachsenden Markt dar. Die Förderung des Handels mit ihm wird unserer Wirtschaft einen erheblichen Schub geben."
 SOV_indian_partnership: "Indische Partnerschaft"
 SOV_indian_partnership_desc: "Indien ist ein riesiger Entwicklungsmarkt, der unsere Waren braucht, während wir vom Zugang zu seinen Märkten profitieren können. Eine Ausweitung der Handelsbeziehungen mit Indien ist für beide Seiten ein kluger Schritt."
 sov_other.19.t: "Russischer Friedensvorschlag!"
 sov_other.19.d: "Russland schlägt einen Friedensvertrag vor, der es uns erlaubt, Hadrut und Karvachar zu übernehmen, während Stepanakert bei den Armeniern bleibt. Russische Friedenstruppen würden in Stepanakert stationiert. Dieses Angebot abzulehnen, würde den politischen Interessen Russlands zuwiderlaufen."
 sov_other.19.a: "Sicher."
 sov_other.19.b: "Wir werden bis zum Ende kämpfen!"
 sov_other.20.t: "Russischer Vorschlag."
 sov_other.20.d: "Russland bietet an, bei der Regelung des Konflikts um Bergkarabach zu helfen, indem es Friedenstruppen entsendet, verlangt dafür aber, dass wir einige Gebiete abtreten."
 sov_other.20.a: "Nein, danke."
 sov_other.20.b: "Ja, bitte schickt Hilfe."
 sov_other.21.t: "Armenien lehnt ab."
 sov_other.21.d: "Armenien glaubt, den Konflikt selbst bewältigen zu können, und hat russische Hilfe abgelehnt."
 sov_other.21.a: "Na dann..."
 sov_other.22.t: "Russland bietet an, unsere Artillerie zu kaufen"
 sov_other.22.d: "Russland hat ein lukratives Angebot gemacht, eine große Menge unserer Artilleriesysteme zu kaufen. Die Gelder werden unserer Wirtschaft einen bedeutenden Schub geben."
 sov_other.22.a: "Das ist ein großartiges Angebot!"
 sov_other.22.b: "Wir lehnen ab."
 sov_other.23.t: "Abkommen mit Nordkorea."
 sov_other.23.d: "Nordkorea hat zugestimmt, uns eine große Menge Artilleriesysteme zu liefern und damit unsere militärischen Fähigkeiten zu stärken."
 sov_other.23.a: "Das ist ein großartiges Angebot!"
 sov_other.24.t: "Abkommen mit Nordkorea"
 sov_other.24.d: "Nordkorea hat unseren Vorschlag zur Lieferung von Artillerie abgelehnt. Leider ist dies eine weitere Enttäuschung."
 sov_other.24.a: "Bedauerlich."
 sov_other.25.t: "Abkommen mit Nordkorea"
 sov_other.25.d: "Russland hat mit Nordkorea ein Abkommen über den Kauf von Artilleriesystemen geschlossen, von denen ein Teil uns zugewiesen wurde."
 sov_other.25.a: "Gut."
 SOV_union_luka: "Lukaschenko ist der Premierminister"
 SOV_union_luka_desc: "Obwohl der Unionsstaat geschaffen wurde, dürfen Alexander Grigorjewitschs Talente nicht verschwendet werden. Ihn als Premierminister des Unionsstaats zu bestätigen, ist eine kluge Entscheidung."
 SOV_unite_with_nkpr: "Abkommen mit Nordkorea"
 SOV_unite_with_nkpr_desc: "Wir werden Nordkorea ein Abkommen zum Kauf einer großen Menge ihrer Artillerie anbieten, um unsere Bestände wieder aufzufüllen."
 sov_other.26.t: "Terroranschlag auf Dubrovka"
 sov_other.26.d: "Der Terroranschlag auf Dubrovka war eine drei Tage andauernde Geiselnahme in Moskau. Eine Gruppe von 40 bewaffneten tschetschenischen Militanten unter Führung von Mowsar Barajew nahm während einer Aufführung des Musicals Nord-Ost im Theaterzentrum 916 Geiseln. Der FSB und Spezialkräfte beendeten die Belagerung schließlich, töteten alle Terroristen und retteten die meisten Geiseln. Offiziell starben während der Krise 130 Geiseln."
 sov_other.26.a: "Sie werden dafür bezahlen"
 sov_other.32.t: "Referendum über den Status unserer Republik"
 sov_other.32.d: "Verfassungsreformen in Russland erlauben es uns, einen neuen Status zu wählen — entweder Teil Russlands zu bleiben oder die Unabhängigkeit zu erklären. Sind wir bereit, diese Entscheidung zu treffen?"
 sov_other.32.a: "Wir werden Teil Russlands bleiben."
 sov_other.32.b: "Wir unterstützen die Unabhängigkeit."
 sov_other.33.t: "Sie bleiben bei uns"
 sov_other.33.d: "[FROM.GetNameWithFlag] hat beschlossen, Teil Russlands zu bleiben."
 sov_other.33.a: "Hurra!"
 sov_other.34.t: "Eine weitere Republik hat uns verlassen"
 sov_other.34.d: "[FROM.GetNameWithFlag] hat beschlossen, unser Land zu verlassen. Wir respektieren ihre Entscheidung."
 sov_other.34.a: "Bedauerlich"
 sov_other.35.t: "Ehemaliger General bittet darum, in der Staatsduma zu sprechen."
 sov_other.35.d: "Ein ehemaliger General der inzwischen aufgelösten Raumstreitkräfte bittet darum, in der nächsten Sitzung der Staatsduma zu sprechen. Berichten zufolge vertritt er wahnhafte und möglicherweise schizophrene Ideen, die er verbreiten will."
 sov_other.35.a: "Wir lassen ihn trotzdem sprechen."
 sov_other.35.b: "Ignoriert ihn"
 sov_other.36.t: "Die Ideen des pensionierten Generals gewinnen an Popularität"
 sov_other.36.d: "Die umstrittenen Ideen von General Petrow gewinnen beispiellose Unterstützung, insbesondere innerhalb militärischer Kreise. Dieser Trend ist für unsere Stabilität äußerst besorgniserregend."
 sov_other.36.a: "Nichts tun."
 sov_other.36.b: "Verhaftet den General und seine treuen Anhänger"
 sov_other.37.t: "Der General putscht!"
 sov_other.37.d: "Wie konnten wir das übersehen? General Petrow hat einen Militärputsch gestartet und die Regierung gestürzt. Er ist ohne Widerstand in den Kreml eingezogen."
 sov_other.37.a: "Das ist katastrophal"
 sov_other.38.t: "Die neue Leiterin der Zentralbank"
 sov_other.38.d: "Wir sind bereit, Elwira Nabiullina zur neuen Leiterin der Zentralbank zu ernennen. Nachdem sie ihre Fähigkeiten als Wirtschaftsministerin bewiesen hat, wird erwartet, dass ihre Führung sich positiv auf unsere Wirtschaft auswirkt."
 sov_other.38.a: "Gratuliert ihnen"
 sov_other.39.t: ""
 sov_other.39.d: ""
 sov_other.39.a: ""
 SOV_z_propaganda: "Z Propaganda"
 SOV_z_propaganda1: "Z Propaganda"
 sov_final_strike.1.t: "Erklärung eine Militär Operation"
 sov_final_strike.1.d: "Früh am heutigen Morgen verkündete unser Präsident den Beginn einer Spezialoperation in der Ukraine, die auf Entnazifizierung und Entmilitarisierung abzielt. Eine großangelegte Invasion steht unmittelbar bevor und markiert eine ernste Eskalation des Konflikts."
 sov_final_strike.1.a: "Das wird ernste Konsequenzen haben"
 russia_news.11.t: "Russland erklärt eine Militäroperation!"
 russia_news.11.d: "Heute hat der russische Präsident eine Militäroperation in der Ukraine angekündigt. Die erklärten Ziele sind die vollständige Entnazifizierung und Entmilitarisierung. Das russische Verteidigungsministerium behauptet, die Operation richte sich nur gegen militärische Einrichtungen, doch westliche Staats- und Regierungschefs haben Kiew bereits Unterstützung zugesagt."
 russia_news.11.o1: "Vorwärts!"
 russia_news.11.o2: "Wir sollten Russland unterstützen!"
 russia_news.11.o3: "Wir werden die Ukraine unterstützen!"
 russia_news.11.o4: "Verdammte Russen."
 russia_news.11.o5: "Schon wieder ein Krieg auf den Ruinen der Union."
 russia_news.12.t: ""
 russia_news.12.d: ""
 russia_news.12.o1: ""
 russia_news.12.o2: ""
 russia_news.12.o3: ""
 russia_news.12.o4: ""
 russia_news.12.o5: ""
 russia_news.13.t: "Russland erklärt eine Militäroperation!"
 russia_news.13.d: "Heute Morgen erklärte der russische Präsident eine Militäroperation in der Ukraine mit dem Ziel der „Entnazifizierung“ und „Demilitarisierung“. Das Verteidigungsministerium betont, dass nur militärische Ziele angegriffen werden, doch westliche Staats- und Regierungschefs haben Unterstützung für Kiew zugesagt."
 russia_news.13.o1: "Vorwärts!"
 russia_news.13.o2: "Wir sollten Russland unterstützen!"
 russia_news.13.o3: "Wir sollten Finland Unterstützen"
 russia_news.13.o4: "Verdammte Russen."
 russia_news.13.o5: "Ein weiterer Krieg auf den Ruinen des Russischen Reiches."
 sov_final_strike.2.t: "Das Militär ist beim erreichen des Hauptziels gescheitert"
 sov_final_strike.2.d: "Die derzeitige Operation hat ihre Ziele nicht erreicht, vor allem wegen der weit verbreiteten Korruption innerhalb unserer Streitkräfte. Dieses Scheitern offenbart den wahren Zustand unserer militärischen Fähigkeiten."
 sov_final_strike.2.a: "Für einen langen Krieg vorbereiten."
 SOV_slow_advance_idea: "Unvorbereitetes Militär"
 sov_final_strike.3.t: "Das Militär hat erfolgreich die Hauptziele erreicht."
 sov_final_strike.3.d: "Die derzeitige Operation schreitet erfolgreich voran und demonstriert die hohe Leistungsfähigkeit unserer Streitkräfte, dank der jüngsten Reformen und einer erfolgreichen Anti-Korruptionskampagne."
 sov_final_strike.3.a: "Ausgezeichnet."
 sov_final_strike.4.t: "Sanktionen für Russland"
 sov_final_strike.4.a: "Industriesektor-Sanktionen verhängen."
 sov_final_strike.4.b: "Handels-Sanktionen verhängen."
 sov_final_strike.4.d: "Der Konflikt in der Ukraine muss beendet werden. Wir können versuchen, Russland durch Wirtschaftssanktionen zu schwächen, aber das könnte auch unserer eigenen Wirtschaft schaden. Sollten wir uns auf einen umfassenden Sanktionskrieg vorbereiten?"
 sov_final_strike.5.t: "[FROM.GetName] verhängt Sanktionen gegen uns!"
 sov_final_strike.5.d: "[FROM.GetName] hat Sanktionen gegen uns verhängt, um die Ukraine zu unterstützen. Diese Maßnahmen könnten unserer Wirtschaft schweren Schaden zufügen."
 sov_final_strike.5.a: "Verflucht seien sie."
 sov_final_strike.6.t: "Russland bietet uns die Teilnahme an einer SMO in der Ukraine an!"
 sov_final_strike.6.d: "In einem persönlichen Gespräch lud uns der russische Präsident zur Teilnahme an der Militäroperation in der Ukraine ein. Wir müssen dieses Angebot sorgfältig abwägen, da ein Kriegseintritt weitreichende Folgen haben wird."
 sov_final_strike.6.a: "Wir werden unseren Brüdern helfen!"
 sov_final_strike.6.b: "Ich glaube nicht, dass wir uns einmischen sollten."
 sov_final_strike.7.t: "Finanzkrise nach Sanktionen"
 sov_final_strike.7.d: "Die westlichen Sanktionen lösten eine schwere Finanzpanik in unserer Bevölkerung aus und führten zu einem gefährlichen Ungleichgewicht zwischen Rubelangebot und -nachfrage. Der Zusammenbruch unseres Nationalen Wohlfahrtsfonds, der diese Krise hätte abmildern können, verschärft die Lage zusätzlich. Uns droht nun ein finanzieller Kollaps."
 sov_final_strike.7.a: "Möge Gott uns helfen"
 SOV_western_sanctions_modifier: "Westliche Sanktionen"
 SOV_western_sanctions_modifier_desc: "Unser aggressives Vorgehen hat westliche Nationen und ihre Verbündeten veranlasst, harte Sanktionen gegen uns zu verhängen. Dies ist eine ernstzunehmende Warnung, und wir müssen uns auf weitere Drohungen von ihnen vorbereiten."
 SOV_ruble_collapse: "Finanzkollaps"
 SOV_ruble_collapse_1: "Wirtschaftlicher Abschwung"
 SOV_ruble_collapse_2: "Stagnation"
 SOV_sanction_backfire_idea_moderate: "Geringe Schäden durch Sanktionen."
 SOV_sanction_backfire_idea_harsh: "Mäßige Schäden durch Sanktionen."
 SOV_sanction_backfire_idea_ultimate: "Schwere Schäden durch Sanktionen"
 SOV_sanctions_warning_TT: "§YDiese Entscheidung§! wird §Rernste§! wirtschaftliche Folgen haben."
 SOV_sanctions_eras_TT: "Die Auswirkungen der Sanktionen werden für uns §Gverringert§! sein."
 sov_final_strike.8.t: "Erklärung eine Militär Operation"
 sov_final_strike.8.d: "Heute Morgen kündigte der Präsident den Beginn einer speziellen Militäroperation in Finnland an, was viele überraschte. Eine groß angelegte Invasion steht kurz bevor."
 sov_final_strike.8.a: "Das wird ernste Konsequenzen haben"
 sov_final_strike.9.t: "Sanktionen für Russland"
 sov_final_strike.9.a: "Industriesektor-Sanktionen verhängen."
 sov_final_strike.9.b: "Handels-Sanktionen verhängen."
 sov_final_strike.9.d: "Der Konflikt in Finnland muss enden. Wirtschaftliche Maßnahmen gegen Russland könnten dies bewirken, könnten jedoch auch unserer eigenen Wirtschaft schaden. Sollen wir umfassende Sanktionen vorbereiten?"
 SOV_western_sanctions: "Sanktionen wurden gegen uns verhängt"
 SOV_russian_resistance_economy: "Russische Widerstandswirtschaft"
 SOV_russian_resistance_economy_desc: "Angesichts eines massiven Wirtschaftskriegs aus dem Westen bleibt uns nur eine Möglichkeit: eine robuste, autarke Wirtschaft aufzubauen — eine echte Widerstandswirtschaft."
 SOV_fnb_destroyed: "Den Nationalen Wohlfahrtsfonds auflösen."
 SOV_fnb_destroyed_desc: "Die Mittel des Nationalen Wohlfahrtsfonds sind entscheidend, um die Folgen der Sanktionen zu mildern."
 SOV_prevent_panic_on_currency_exchange: "Die Panik an den Aktienmärkten stoppen."
 SOV_prevent_panic_on_currency_exchange_desc: "An den Aktien-, Termin- und Anleihemärkten ist öffentliche Panik ausgebrochen. Die Menschen versuchen hastig, Fremdwährungen von ihren Konten abzuheben. Das muss gestoppt werden."
 SOV_stop_moex_sessions: "Die Moskauer Börse vorübergehend schließen."
 SOV_stop_moex_sessions_desc: "Eine vorübergehende Schließung der Märkte wird helfen, sie nach den jüngsten Turbulenzen zu beruhigen."
 SOV_prevent_ruble_collapse: "Den Rubel vor dem Zusammenbruch retten."
 SOV_prevent_ruble_collapse_desc: "Es ist unerlässlich, den Wechselkurs des Rubels zu kontrollieren, um einen Kollaps zu verhindern."
 SOV_stabilized_finances: "Stabilisiere die Wirtschaft"
 SOV_stabilized_finances_desc: "Wir haben die schlimmste Phase der Panik hinter uns. Jetzt ist es an der Zeit, die Wirtschaft schrittweise zu stabilisieren."
 SOV_expansion_of_importozamesheniye: "Importsubstitution etablieren."
 SOV_expansion_of_importozamesheniye_desc: "Es ist Zeit, die inländischen Industrien auszubauen und die Abhängigkeit von Importen zu reduzieren."
 SOV_add_liquidity: "Liquidität in die Wirtschaft einspeisen."
 SOV_add_liquidity_desc: "Unsere Wirtschaft benötigt dringend zusätzliche Liquidität, um funktionsfähig zu bleiben."
 SOV_consumer_goods_replacement: "Einheimische Marken"
 SOV_consumer_goods_replacement_desc: "Wir brauchen keine ausländischen Produkte — wir haben unsere eigenen hochwertigen heimischen Marken."
 SOV_the_turn_to_the_east: "U-turn in richtung Osten"
 SOV_the_turn_to_the_east_desc: "Der Westen hat sich als unzuverlässiger Partner erwiesen. Es ist Zeit, unseren Blick nach Osten zu richten."
 SOV_creation_of_sovereign_economy: "Souveräne Wirtschaft"
 SOV_creation_of_sovereign_economy_desc: "Unsere Nation wird eine souveräne und unabhängige Wirtschaft aufbauen, die frei von ausländischem Einfluss ist."
 SOV_back_to_growth: "Und wieder Wachsen"
 SOV_back_to_growth_desc: "Nichts kann uns langfristig aufhalten; Rückschläge werden uns nur vorübergehend bremsen."
 SOV_help_prigoba: "Schicke Ausrüstung in den Sahel"
 SOV_help_prigoba_desc: "Unser Stellvertreterstaat in der Sahelregion benötigt dringend militärische Unterstützung."
 SOV_pmc_redut: "PMC Redut"
 SOV_pmc_redut_desc: "Redut ist eine russische private Militärfirma, die in der Ukraine aktiv ist und hauptsächlich aus Veteranen verschiedener Militär- und Geheimdienstzweige besteht."
 SOV_pmc_redut_coprs: "Das 1. Freiwilligenkorps"
 SOV_pmc_redut_coprs_desc: "Nach Prigoschins Meuterei wurde das Erste Freiwilligenkorps gegründet, das zahlreiche Freiwilligenbataillone unter der Aufsicht von PMC Redut vereint."
 SOV_storm_z: "Storm-Z"
 SOV_storm_z_desc: "Wir werden Gefangene rekrutieren, um in unserer militärischen Einheit zu dienen und ihre Strafe in eine Chance zu verwandeln, für das Vaterland zu kämpfen."
 SOV_special_o: "Spezialeinheit „O“"
 SOV_special_o_desc: "Wir werden eine Elite-Spezialeinheit schaffen, die im Krieg die gefährlichsten und wichtigsten Missionen übernimmt."
