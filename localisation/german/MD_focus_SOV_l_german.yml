 SOV_500_days_category: "500-Tage-Programm"
 SOV_500_days_category_desc: "Das 500-Tage-Programm war eine 1990 vom sowjetischen Ökonomen Stanislaw Schatalin und dem Vorsitzenden der Kommission für Wirtschaftsreformen Grigori Jawlinski vorgeschlagene Initiative. Der Hauptzweck dieses Programms besteht darin, den Übergang von der Planwirtschaft zum echten Marktkapitalismus zu vollziehen, indem die Rolle des Staates in der Wirtschaft reduziert wird. Leider wurde das Programm nie umgesetzt, weil die sowjetische Führung es für zu radikal hielt.\nNach den Fehlern von Gaidars Schocktherapie und dem wirtschaftlichen Missmanagement früherer Regierungen erfordert die aktuelle wirtschaftliche Lage, dass wir es erneut versuchen und das 500-Tage-Programm vollständig umsetzen, um den vollständigen Übergang zu einer modernen Marktwirtschaft zu vollziehen!"
