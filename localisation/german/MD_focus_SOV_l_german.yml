 SOV_jreci_usa_tooltip: "£text_icon_corrector §0Der Prädiktor-Korrektor§! §twird endlich vernichtet werden§! Er versteckt sich in §Y[USA.GetNameWithFlag]§!.\n"
 SOV_jreci_1_tooltip: "Endlich ist in §Y[SOV.GetNameWithFlag]§! eine Regierung an die Macht gekommen, die die wahre Wahrheit über die Verschwörung der £text_icon_jreci §0ägyptischen Priester§! und des £text_icon_corrector §0Prädiktor-Korrektors§! kennt.\n"
 SOV_jreci_2_tooltip: "Jeder russische Militärangehörige muss umgeschult werden, damit er weiß, gegen wen in Zukunft zu kämpfen ist. Gegen die Diener des £text_icon_corrector §0Prädiktor-Korrektors§!.\n"
 SOV_jreci_3_tooltip: "Jeder Abgeordnete, Beamte und andere regionale Funktionsträger wird einen besonderen theoretischen Kurs zur Bekämpfung von Agenten der £text_icon_jreci §0ägyptischen Priester§! absolvieren.\n"
 SOV_jreci_4_tooltip: "§tDie Oligarchen§! sind die wahren Agenten der £text_icon_jreci §0ägyptischen Priester§!, die vom £text_icon_corrector §0Prädiktor-Korrektor§! zum Zusammenbruch Russlands ausgesandt wurden. Damit werden wir aufräumen.\n"
 SOV_jreci_5_tooltip: "§tEine neue Religion§! ist der Schlüssel zum Sieg im Krieg gegen die Diener des £text_icon_corrector §0Prädiktor-Korrektors§!.\n"
 SOV_jreci_6_tooltip: "§tInternetpropaganda§! wird unseren Bürgern endlich die wahre Wahrheit zeigen, die die £text_icon_jreci §0ägyptischen Priester§! vor ihnen verborgen haben.\n"
 SOV_jreci_7_tooltip: "Alles, was wir brauchen, ist die §tWahrheit!§!.\n"
 SOV_jreci_8_tooltip: "Um den £text_icon_corrector §0Prädiktor-Korrektor§! zu besiegen, müssen wir nicht nur in der Luft und am Boden dominieren. Wir müssen zu Herren des Kosmos werden!.\n"
 SOV_jreci_9_tooltip: "Wahre russische Krieger sind §tWitjasi§!. Genau diesen Stand werden wir wiedererschaffen, um eine heilige Armee gegen unsere Feinde vorzubereiten.\n"
 SOV_jreci_10_tooltip: "§tDer Bolschewismus§! ist für einen russischen Menschen ebenso natürlich wie der Wunsch nach Gerechtigkeit und Frieden.\n"
 SOV_jreci_11_tooltip: "Lasst uns die Verfassung umschreiben und alles hinauswerfen, was uns die £text_icon_jreci §0ägyptischen Priester§! hineinzuschreiben gezwungen haben.\n"
 SOV_jreci_12_tooltip: "Stalin war ein §tweiser Mann§!, und seine Methoden verzögerten die Eroberung Russlands durch den £text_icon_corrector §0Prädiktor-Korrektor§! – es ist Zeit, sich an die alten Wege zu erinnern.\n"
 SOV_jreci_13_tooltip: "Das Buch §tTotes Wasser§! ist Pflichtlektüre für jeden Russen \n"
 SOV_jreci_14_tooltip: "Es ist Zeit, in Mutter Russland nach £text_icon_jreci §0ägyptischen Priestern§! zu suchen, danach werden wir die ganze Welt von ihnen befreien \n"
 SOV_jreci_15_tooltip: "Westliche Agenten des £text_icon_corrector §0Prädiktor-Korrektors§! werden vernichtet oder aus unserem Russland vertrieben \n"
