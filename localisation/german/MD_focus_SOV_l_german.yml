 SOV_yabloko: "RDDP Jabloko"
 SOV_yabloko_desc: "Jabloko, eine der ältesten liberalen Parteien im modernen Russland, ist nun endlich an die Macht gekommen – getragen von einer neuen Welle der Unterstützung für eine westlich geprägte Demokratie. Die Partei ist zu einer politischen Heimat für Reformer geworden – von erfahrenen Demokraten der 1990er Jahre bis hin zu einer neuen Generation, inspiriert vom Versprechen einer liberalen und gerechten Gesellschaft. Ihr Ziel ist nichts Geringeres, als Russland in eine westliche liberale Musterdemokratie zu verwandeln."
 SOV_yavlinskiy: "Grigori Jawlinski"
 SOV_yavlinskiy_desc: "Grigori Jawlinski wurde am 10. April 1952 in Lwiw geboren, doch seine politische Laufbahn begann in den sowjetischen Regierungsinstitutionen Moskaus. Der ausgebildete Ökonom erhielt einst den Auftrag, Marktreformen für die UdSSR zu entwerfen, doch seine Vorschläge wurden schließlich zugunsten anderer Strategien verworfen. Trotz aller Rückschläge blieb er ein entschiedener Verfechter von Reformen und führt die Partei Jabloko seit den frühen 1990er Jahren bis heute. Seine beständige Präsenz in der russischen Politik spiegelt sein Engagement für ein demokratisches und wirtschaftlich liberales Russland wider."
 SOV_russian_liberalism: "Russischer Liberalismus"
 SOV_russian_liberalism_desc: "Seit Jahrhunderten leidet Russland unter Autokraten – von den Zaren bis zum Sowjetregime. Wahre Demokratie hatte nie die Möglichkeit, sich zu entfalten. Nun ist die Zeit gekommen, mit diesem Erbe zu brechen. Indem wir westliche liberale Werte wie Selbstbestimmung, Menschenrechte und Meinungsfreiheit annehmen, können wir Russland in eine neue Ära demokratischer Regierungsführung und bürgerlicher Selbstermächtigung führen."
 SOV_fix_eltsyn_shit: "Die Fehler der 90er beheben"
 SOV_fix_eltsyn_shit_desc: "Die Wirtschaftspolitik Gaidars und Jelzins in den 1990er Jahren führte Russland auf einen gefährlichen Weg. Statt einer lebendigen Marktwirtschaft versank das Land in einer Oligarchie, in der Reichtum und Macht in den Händen weniger konzentriert wurden. Wir müssen diese Fehler nun korrigieren und beweisen, dass echter Kapitalismus in Russland funktionieren kann. Eine transparente und wettbewerbsorientierte Wirtschaft muss das Klientelsystem ersetzen, das sich damals festgesetzt hat."
 SOV_russian_free_speech: "Russische Meinungsfreiheit"
 SOV_russian_free_speech_desc: "Meinungsfreiheit ist eine grundlegende Säule jeder liberalen Gesellschaft. Wenn Menschen zum Schweigen gebracht werden, wird der Staat stagnierend und entfremdet sich von seinen Bürgern. Diese Unterdrückung führte sowohl im Zarenreich als auch in der Sowjetunion zum Zusammenbruch. Um unsere Zukunft zu sichern und einen weiteren Kreislauf des Verfalls zu verhindern, müssen wir offenen Diskurs und freie Meinungsäußerung für alle schützen und fördern."
 SOV_no_repressions: "Repressive Gesetze rückgängig machen"
 SOV_no_repressions_desc: "Vor unserem Machtantritt verabschiedete die Regierung Gesetze, die Bürgerrechte einschränkten und unschuldige Menschen inhaftierten. Solche repressiven Maßnahmen haben in einer liberalen Demokratie keinen Platz. Wir müssen diese Gesetze abschaffen und all jene freilassen, die zu Unrecht bestraft wurden. Dies ist ein notwendiger Schritt hin zu Gerechtigkeit, Versöhnung und der Wiederherstellung des öffentlichen Vertrauens in den Staat."
 SOV_depoliticize_oligarchs: "Oligarchen entpolitisieren"
 SOV_depoliticize_oligarchs_desc: "Die Verschmelzung politischer und wirtschaftlicher Macht in den 1990er Jahren brachte eine tief verwurzelte Oligarchie hervor, die unsere Demokratie geschwächt hat. Diese Eliten behandeln das Land wie ihren Privatbesitz. Es ist unerlässlich, dieses unheilige Bündnis zu zerschlagen und sicherzustellen, dass politischer Einfluss allein beim Volk liegt. Nur so können wir die Macht an ihren rechtmäßigen Ort zurückbringen – in die Hände der Bürger."
 SOV_depoliticize_oligarchs_focus_TT: "Wir werden einen langen Prozess der Entpolitisierung der Oligarchen beginnen. Sie könnten Widerstand leisten!"
 SOV_new_society: "Die Große Gesellschaft"
 SOV_new_society_desc: "Russland hat die Phase der Erholung überstanden. Jetzt ist es an der Zeit, mit dem Umbau unserer Gesellschaft zu beginnen. Wir wollen einen liberalen Rahmen sowohl für Staat als auch für Wirtschaft schaffen und uns von den autoritären und kollektivistischen Werten der Vergangenheit abwenden. Unsere Initiative der Großen Gesellschaft ist von Lyndon B. Johnsons Vision inspiriert, doch unser Anspruch ist noch größer: Russland grundlegend in eine moderne, zukunftsorientierte liberale Demokratie zu verwandeln."
 SOV_capitalism_in_500_days: "Das 500-Tage-Programm beginnen"
 SOV_capitalism_in_500_days_desc: "Das 500-Tage-Programm wurde ursprünglich entwickelt, um die sowjetische Wirtschaft in ein marktbasiertes System zu überführen. Obwohl es zugunsten von Gaidars Schocktherapie aufgegeben wurde, bleibt der Bedarf an einer solchen Reform bestehen. Wir werden das Programm wiederbeleben und modernisieren, um einen stabileren und inklusiveren wirtschaftlichen Wandel zu schaffen. Wenn es richtig umgesetzt wird, legt es das Fundament für langfristigen Wohlstand und demokratische Stabilität."
 SOV_lgbt_rights: "LGBT-Rechte"
 SOV_lgbt_rights_desc: "Eine wirklich liberale Gesellschaft muss die Rechte und die Würde jedes Menschen respektieren – unabhängig von seiner sexuellen Orientierung. LGBT-Personen verdienen gleichen Schutz vor dem Gesetz und gleiche Chancen. Die Anerkennung ihrer Rechte ist nicht nur ein moralisches Gebot, sondern auch ein notwendiger Schritt zum Aufbau eines inklusiven und modernen Russlands."
 SOV_kill_communists: "Kommunistische Sympathisanten zerschlagen"
 SOV_kill_communists_desc: "Der Kommunismus bleibt eine der größten Bedrohungen für liberale Reformen in Russland. Angetrieben von Nostalgie für eine fehlerhafte Vergangenheit versuchen seine Anhänger, unseren Fortschritt rückgängig zu machen. Wir müssen ihre Netzwerke entschlossen zerschlagen und das Wiederaufleben eines autoritären Sozialismus verhindern. Für diese Ideologie darf es in einem modernen demokratischen Staat keinen Platz geben."
 SOV_kill_revanchism: "Revanchistische Gedanken zerschlagen"
 SOV_kill_revanchism_desc: "Was nährt Totalitarismus und illiberale Ideologien? Revanchismus. Er gärt in schwachen Systemen und wartet auf die Gelegenheit, wieder aufzutauchen. Wie ein hartnäckiges Virus muss er ausgerottet werden, wenn wir unsere liberale Zukunft sichern wollen. Wir müssen ihn frontal bekämpfen – mit Bildung, Reformen und starken Institutionen –, damit er unsere Gesellschaft nie wieder infiziert."
 SOV_communist_angry_focus_TT: "Wir werden die Kommunisten wütend machen!"
 SOV_kill_fascists: "Die nationalistische Welle beruhigen"
 SOV_kill_fascists_desc: "Nationalismus stellt, wenn er ins Extreme getrieben wird, eine ernste Gefahr für eine liberale multiethnische Gesellschaft dar. Die Geschichte hat die verheerenden Folgen nationalistischer Regime deutlich gezeigt. Wir müssen diese Bewegungen zerschlagen, bevor sie an Dynamik gewinnen. Ein freies und inklusives Russland muss Vorrang vor engen ethnonationalistischen Agenden haben."
 SOV_fascists_angry_focus_TT: "Wir werden die Nationalisten wütend machen!"
 SOV_better_russia: "Ein besseres Russland"
 SOV_better_russia_desc: "Auch wenn unsere Arbeit noch lange nicht beendet ist, haben wir entscheidende Schritte hin zu einem freieren und gerechteren Russland unternommen. Zum ersten Mal seit Generationen wurde der Kreislauf der Tyrannei unterbrochen. Wir haben die Rückkehr der Diktatur verhindert, und mit weiterem Einsatz können wir eine Zukunft aufbauen, die von Demokratie und Chancen geprägt ist."
 SOV_500_days_ura_tt: "Hat §Y5§! Phasen des 500-Tage-Programms abgeschlossen"
 SOV_500_days_pizda_tt: "Wenn wir unsere Reformen nicht abschließen, könnten die Folgen unberechenbar sein!"
 SOV_500_days_focus_TT: "Schaltet die Entscheidungen zu den Wirtschaftsreformen frei. Sei dir bewusst: Wenn wir unser Programm nicht rechtzeitig abschließen, könnten die Folgen unberechenbar sein!"
 SOV_depolitisation_of_oligarchs: "Entpolitisierung der Oligarchen"
 SOV_new_broken_economy: "Folgen gescheiterter Reformen"
 SOV_new_broken_economy_desc: "Es ist uns nicht gelungen, unsere Wirtschaftsreformen umzusetzen. Nun befindet sich das Land im Griff einer tiefen Rezession – einer, die mit dem katastrophalen Einbruch der 1990er Jahre konkurriert. Unternehmen brechen zusammen, das Vertrauen der Bevölkerung schwindet, und die Arbeitslosigkeit steigt rapide. Das Versäumnis, rechtzeitig zu handeln, hat einen verheerenden Preis gefordert."
 SOV_communist_angry: "Kommunistische Proteste!"
 SOV_nationalists_angry: "Nationalistische Proteste!"
 SOV_the_onf: "Allrussische Volksfront"
 SOV_the_onf_desc: "Einige argumentieren, dass der Machterhalt die Abschaffung von Wahlen und die Einführung einer Diktatur erfordere. Diesen Weg lehnen wir ab. Autoritarismus führt zu Stagnation und Niedergang. Stattdessen schlagen wir eine breite Koalition aus zivilgesellschaftlichen Organisationen und politischen Parteien vor – als Plattform für konstruktive Debatten, Innovation und Kontrolle. Durch diese Volksfront werden wir die Demokratie stärken und zugleich politische Stabilität bewahren."
 SOV_the_onf_TT: "§YDie breite Koalition§! der Parteien wird geschaffen, um §Ypolitische Stabilität§! zu sichern!"
 SOV_preserve_working_system: "Das funktionierende System bewahren"
 SOV_preserve_working_system_desc: "Einige behaupten, der einzige Weg zu einem fairen föderalen System bestehe darin, den Regionen maximale Autonomie zu gewähren oder die bestehende Struktur vollständig umzustürzen. Wir sehen das anders. Das gegenwärtige föderale System ist, obwohl es durch frühere autoritäre Regime diskreditiert wurde, im Kern tragfähig. Durch durchdachte demokratische Reformen können wir sein volles Potenzial entfalten und dafür sorgen, dass es allen Russen dient."
 SOV_more_fair_taxation: "Faire Besteuerung"
 SOV_more_fair_taxation_desc: "Ein entscheidender Mangel unseres heutigen Systems liegt in der regionalen Besteuerung. Gegenwärtig werden Steuern vor Ort erhoben, an die föderale Regierung abgeführt und dann – oft unfair – umverteilt. Dieses System konzentriert Reichtum in Schlüsselregionen und lässt andere unterentwickelt zurück. Wir müssen dieses Verfahren reformieren, damit die Regionen über einen fairen Anteil ihrer eigenen Mittel verfügen können. Das wird eine ausgewogene Entwicklung fördern und wirtschaftliche Ungleichheit sowie separatistische Tendenzen verringern."
 SOV_equal_regions: "Gleichheit der Regionen"
 SOV_equal_regions_desc: "Es besteht keine Notwendigkeit, unsere föderale Struktur zu zerschlagen oder radikal zu verändern. Was wir brauchen, ist ein erneuertes Bekenntnis zu demokratischer Regierungsführung und Chancengleichheit für alle Regionen. Indem wir den Missbrauch der Vergangenheit korrigieren und umfassende Reformen durchführen, können wir ein System schaffen, in dem jede Region – unabhängig von Größe oder Wohlstand – eine Stimme und die Mittel zum Gedeihen hat."
 SOV_what_we_dreamt_about: "Unser Traum"
 SOV_what_we_dreamt_about_desc: "Wir haben erreicht, was die ursprünglichen Architekten des russischen Föderalismus nur erträumt haben. Unser System ist nun funktionsfähig, demokratisch und gerecht. Der Erfolg unserer Reformen beweist, dass Russland Einheit und Gleichheit bewahren kann, ohne seine föderalen Grundlagen aufzugeben. Das ist das Russland, von dem wir geträumt haben – stark, frei und gerecht für alle."
 SOV_idea_russian_federalism: "Russisches Föderalsystem"
 SOV_idea_russian_federalism_1: "Russisches Föderalsystem"
 SOV_idea_russian_federalism_2: "Russisches Föderalsystem"
 SOV_new_form_of_the_gov: "Die neue Staatsform"
 SOV_new_form_of_the_gov_desc: "Jahrzehnte autoritärer Herrschaft haben die demokratischen Grundsätze, die unsere Regierung einst leiteten, ausgehöhlt. Die Exekutive hat unkontrolliert an Macht gewonnen. Es ist unsere Pflicht, die Rollen der zentralen Staatsorgane neu zu bewerten und neu auszubalancieren. Nur durch die Wiederherstellung demokratischer Gewaltenteilung können wir eine Regierung schaffen, die dem Volk wirklich dient."
 SOV_empower_duma: "Die Föderalversammlung stärken"
 SOV_empower_duma_desc: "Auch wenn die Befugnisse des Präsidenten auf dem Papier begrenzt erscheinen, ermöglichen sie in der Praxis die Manipulation aller Staatsgewalten. Um die Demokratie zu bewahren, müssen wir die Verfassung ändern und die Macht des Präsidenten beschränken. Wir werden das Amt entweder auf eine zeremonielle Rolle reduzieren oder ganz abschaffen und die tatsächliche Gesetzgebungsmacht der Föderalversammlung übertragen."
 SOV_mixed_system: "Das gemischte System"
 SOV_mixed_system_desc: "Russlands derzeitiges semipräsidentielles System wurzelt in liberalen westlichen Prinzipien, insbesondere jenen der Verfassung von 1993. Kritiker behaupten, es fördere Diktatur, doch mit den richtigen Änderungen können wir Gewaltenteilung stärken, ohne das System vollständig umzustoßen. Durch seine Verfeinerung werden wir Machtkonzentration verhindern und zugleich institutionelle Kontinuität bewahren."
 SOV_all_powers_to_the_presidents: "Alle Macht dem Präsidenten"
 SOV_all_powers_to_the_presidents_desc: "Viele glauben, Russland funktioniere de facto bereits als Präsidialrepublik, in der der Präsident den Großteil der tatsächlichen Macht hält. Dieses Modell kann innerhalb einer Demokratie weiterhin funktionieren, wenn es sorgfältig neu geordnet wird. Wir werden die Verfassung anpassen, damit der Präsident formal zum Oberhaupt der Exekutive wird, die Aufgaben des Premierministers übernimmt und die Regierungsführung effizienter gestaltet."
 SOV_changes_in_the_constitution: "Wirklich demokratische Verfassung"
 SOV_changes_in_the_constitution_desc: "Nach ausführlichen Beratungen sind wir bereit, eine neue Welle von Verfassungsänderungen umzusetzen. Diese Änderungen werden die Struktur der Staatsgewalt neu definieren, demokratische Prinzipien verankern und bürgerliche Freiheitsrechte garantieren. Vor allem werden sie die Meinungsfreiheit bewahren und den Machtmissbrauch für kommende Generationen verhindern."
 SOV_semipres_focus_TT: "Wir bleiben eine semipräsidentielle Republik"
 SOV_parliament_focus_TT: "Wir werden eine parlamentarische Republik"
 SOV_president_focus_TT: "Wir werden eine Präsidialrepublik"
 SOV_idea_parliamentary_republic: "Parlamentarische Republik"
 SOV_idea_presidential_republic: "Präsidialrepublik"
 SOV_idea_semi_presidential_republic: "Semipräsidentielle Republik"
 SOV_freind_kyr: "Freundschaft mit Kirgisistan"
 SOV_freind_kyr_desc: "Die Stärkung unseres Einflusses in Zentralasien ist eine unserer strategischen Prioritäten. Durch engere Beziehungen zu Kirgisistan können wir dauerhafte Partnerschaften mit postsowjetischen Staaten aufbauen und die Region stabilisieren."
 SOV_freind_kaz: "Freundschaft mit Kasachstan"
 SOV_freind_kaz_desc: "Die Stärkung unseres Einflusses in Zentralasien ist eine unserer strategischen Prioritäten. Kasachstan nimmt in der Region eine Schlüsselstellung ein, und starke bilaterale Beziehungen werden beiden Nationen zugutekommen."
 SOV_freind_uzb: "Freundschaft mit Usbekistan"
 SOV_freind_uzb_desc: "Die Stärkung unseres Einflusses in Zentralasien ist eine unserer strategischen Prioritäten. Eine enge Partnerschaft mit Usbekistan wird gegenseitige wirtschaftliche und diplomatische Vorteile bringen."
 SOV_freind_taj: "Freundschaft mit Tadschikistan"
 SOV_freind_taj_desc: "Die Stärkung unseres Einflusses in Zentralasien ist eine unserer strategischen Prioritäten. Die Erneuerung der Beziehungen zu Tadschikistan wird helfen, Frieden, Zusammenarbeit und gemeinsame Entwicklung in der Region zu sichern."
 SOV_freind_trk: "Freundschaft mit Turkmenistan"
 SOV_freind_trk_desc: "Die Stärkung unseres Einflusses in Zentralasien ist eine unserer strategischen Prioritäten. Engere Beziehungen zu Turkmenistan werden helfen, regionale Zusammenarbeit und gegenseitiges Vertrauen zu fördern."
 SOV_attack_uzb: "Demokratie nach Usbekistan bringen"
 SOV_attack_uzb_desc: "Ein Großteil Zentralasiens befindet sich weiterhin im Griff autoritärer Führer, die wie moderne Khane regieren. Wir werden handeln, um in Usbekistan echte demokratische Regierungsführung einzuführen und sein Volk von der Autokratie zu befreien."
 SOV_attack_kaz: "Demokratie nach Kasachstan bringen"
 SOV_attack_kaz_desc: "Ein Großteil Zentralasiens befindet sich weiterhin im Griff autoritärer Führer, die wie moderne Khane regieren. Kasachstan verdient eine Zukunft, die auf Freiheit, Menschenrechten und demokratischen Institutionen aufbaut."
 SOV_attack_kyr: "Demokratie nach Kirgisistan bringen"
 SOV_attack_kyr_desc: "Ein Großteil Zentralasiens befindet sich weiterhin im Griff autoritärer Führer, die wie moderne Khane regieren. Kirgisistan muss die Chance erhalten, durch echte demokratische Reformen aufzublühen."
 SOV_attack_trk: "Demokratie nach Turkmenistan bringen"
 SOV_attack_trk_desc: "Ein Großteil Zentralasiens befindet sich weiterhin im Griff autoritärer Führer, die wie moderne Khane regieren. Das Volk Turkmenistans verdient ein System, in dem seine Stimmen gehört und respektiert werden."
 SOV_attack_taj: "Demokratie nach Tadschikistan bringen"
 SOV_attack_taj_desc: "Ein Großteil Zentralasiens befindet sich weiterhin im Griff autoritärer Führer, die wie moderne Khane regieren. Tadschikistan muss die Gelegenheit erhalten, eine hellere und demokratischere Zukunft zu wählen."
 SOV_support_democracy_in_georgia: "Demokratie in Georgien unterstützen"
 SOV_support_democracy_in_georgia_desc: "Georgien steht an der Frontlinie der demokratischen Entwicklung im Kaukasus. Wir werden seine Bemühungen unterstützen, demokratische Institutionen zu stärken und politische Freiheiten für alle Bürger zu fördern."
 SOV_state_investments: "Staatliche Investitionen in Georgien"
 SOV_state_investments_desc: "Indem wir in Georgien investieren, stärken wir unsere Präsenz im Kaukasus und fördern das Wirtschaftswachstum eines wichtigen Partners. Diese Investitionen werden Stabilität und gegenseitige Zusammenarbeit in der Region stärken."
 SOV_naval_base_in_georgia: "Marinebasis in Georgien"
 SOV_naval_base_in_georgia_desc: "Die Einrichtung einer Marinebasis an der georgischen Küste wird unsere Fähigkeit, die Schwarzmeerregion zu überwachen und zu kontrollieren, erheblich verbessern. Auch wenn Russlands Grenzen weiter nach Norden verschoben wurden, bleibt seine Seemacht im Schwarzen Meer lebenswichtig und dauerhaft. Diese Basis wird unsere strategischen Interessen sichern und die regionale Sicherheit stärken."
 SOV_mediate_ossetianabkhaz_question: "Die ossetisch-abchasische Frage vermitteln"
 SOV_mediate_ossetianabkhaz_question_desc: "Der langjährige Konflikt um Ossetien und Abchasien passt nicht mehr in die moderne geopolitische Realität. Wir müssen als neutraler Vermittler auftreten, um Spannungen abzubauen und Frieden im Kaukasus zu fördern, damit Stabilität und Zusammenarbeit zwischen allen Beteiligten wachsen können."
 SOV_friendship_armenia: "Freundschaft mit Armenien"
 SOV_friendship_armenia_desc: "Die Stärkung unserer Beziehung zu Armenien ist essenziell. Als enger historischer und regionaler Partner verdient Armenien verstärkte Aufmerksamkeit, um politische, wirtschaftliche und kulturelle Bindungen zu vertiefen."
 SOV_friendship_azerbaijan: "Freundschaft mit Aserbaidschan"
 SOV_friendship_azerbaijan_desc: "Verbesserte Beziehungen zu Aserbaidschan, der wichtigsten Ölmacht im Südkaukasus, sind ein strategischer Schritt. Eine engere Zusammenarbeit wird beiden Ländern nützen und helfen, die Region wirtschaftlich und politisch zu stabilisieren."
 SOV_invest_in_arm_it: "In Armenien investieren"
 SOV_invest_in_arm_it_desc: "Investitionen in Armenien werden die wirtschaftliche Entwicklung fördern und unseren Einfluss im Kaukasus stärken. Zielgerichtete Unterstützung kann Infrastruktur, Industrie und bilaterale Zusammenarbeit voranbringen."
 SOV_invest_in_aze_oil: "In aserbaidschanisches Öl investieren"
 SOV_invest_in_aze_oil_desc: "Die Erschließung der aserbaidschanischen Ölfelder ist entscheidend für die Vertiefung der zwischenstaatlichen Zusammenarbeit. Diese Investition wird Energieressourcen sichern und die wirtschaftlichen Beziehungen zwischen unseren Nationen stärken."
 SOV_decide_side: "Entscheiden, auf wessen Seite wir stehen"
 SOV_decide_side_desc: "Auch wenn wir ausgewogene Beziehungen zu allen postsowjetischen Staaten im Kaukasus anstreben, zwingt uns der ungelöste Konflikt zwischen Armenien und Aserbaidschan zu einer Entscheidung. Es ist unmöglich, in diesem komplexen regionalen Streit beide Seiten gleichermaßen zu unterstützen."
 SOV_support_artsakh: "Arzach unterstützen"
 SOV_support_artsakh_desc: "Unsere Sympathien liegen eher bei Armenien, das unser engster und freundlichster Partner im Kaukasus bleibt. Die Unterstützung Arzachs spiegelt unser Bekenntnis zu dieser Allianz und zum Schutz befreundeter Nationen in der Region wider."
 SOV_support_azerbaijan: "Aserbaidschan unterstützen"
 SOV_support_azerbaijan_desc: "Trotz unserer historischen Freundschaft mit Armenien müssen wir auch wirtschaftliche und strategische Realitäten berücksichtigen. Die starke Position Aserbaidschans und seine gewaltigen Ölreserven machen es zu einem wichtigen Partner, dessen Interessen nicht ignoriert werden können."
 SOV_invite_shah: "Den Schah einladen"
 SOV_invite_shah_desc: "Die politische Lage im Iran ist zunehmend instabil. Die Einladung des Kronprinzen könnte uns einen wertvollen Verbündeten verschaffen und helfen, die Ordnung wiederherzustellen. Seine Rückkehr könnte in diesen unsicheren Zeiten das Kräfteverhältnis zu unseren Gunsten beeinflussen."
 SOV_support_the_reformists: "Die Reformer unterstützen"
 SOV_support_the_reformists_desc: "Die reformistische Fraktion im Iran entspricht eher unseren Interessen und unserer Vision für die Region. Ihre Unterstützung könnte zu moderateren politischen Entscheidungen und zu einer stabilen Partnerschaft führen, von der beide Seiten profitieren."
 SOV_invest_in_iran: "In den Iran investieren"
 SOV_invest_in_iran_desc: "Der Iran bietet bedeutende wirtschaftliche Chancen, die wir nicht ignorieren können. Durch Investitionen in seine Entwicklung können wir profitable Erträge sichern und unseren Einfluss in der Region stärken."
 SOV_neutral_relations: "Neutrale Beziehungen"
 SOV_neutral_relations_desc: "Frieden ist dem Konflikt vorzuziehen. Wir werden unsere Ziele durch Diplomatie und Zusammenarbeit verfolgen, Kriege vermeiden und Stabilität in der Region fördern."
 SOV_passage_through_caucasus: "Durchgang durch den Kaukasus"
 SOV_passage_through_caucasus_desc: "Ein sicherer Korridor durch den Südkaukasus wird unsere strategische Position stärken und zugleich freundschaftliche Beziehungen zum Iran erhalten. Diese Lösung bringt unsere regionalen Interessen ins Gleichgewicht und fördert die Zusammenarbeit."
 SOV_animosity_to_iran: "Feindseligkeit gegenüber dem Iran"
 SOV_animosity_to_iran_desc: "Die Verfolgung der eigenen Bevölkerung durch die iranische Regierung hat Feindseligkeit gegenüber uns erzeugt. Diese Haltung macht den Iran zu einem unfreundlichen und unberechenbaren Nachbarn, dem wir mit Vorsicht begegnen müssen."
 SOV_ignite_revolution_in_iran: "Revolution im Iran entfachen"
 SOV_ignite_revolution_in_iran_desc: "Wir haben nun die Gelegenheit, die Befreiung des iranischen Volkes zu unterstützen. Eine Revolution wird die Region stärker an unsere Interessen binden und eine für uns günstigere Stabilität fördern."
 SOV_poland_relations: "Russisch-polnische Freundschaft"
 SOV_poland_relations_desc: "Es ist an der Zeit, alte Konflikte hinter uns zu lassen und gemeinsam mit unseren polnischen Nachbarn eine stärkere slawische Welt aufzubauen. Die Zusammenarbeit mit Polen wird gegenseitige Vorteile und regionale Stabilität bringen."
 SOV_befriend_france: "Freundschaft mit Frankreich"
 SOV_befriend_france_desc: "Die Stärkung unserer Beziehungen zu Frankreich ist essenziell, um unsere globalen Ziele zu erreichen. Eine enge Partnerschaft wird Frieden und Zusammenarbeit auf der internationalen Bühne fördern."
 SOV_mutual_def_poland: "Zusammenarbeit mit Polen"
 SOV_mutual_def_poland_desc: "Polen ist ein wertvoller Handelspartner. Eine intensivere wirtschaftliche und diplomatische Zusammenarbeit wird unseren regionalen Einfluss und den gegenseitigen Wohlstand stärken."
 SOV_befriend_germany: "Freundschaft mit Deutschland"
 SOV_befriend_germany_desc: "Die wirtschaftliche Stärke Deutschlands macht es zu einem unverzichtbaren Partner für uns. Der Ausbau enger Beziehungen wird zahlreiche Vorteile bringen und unsere Position in Europa und darüber hinaus stärken."
 SOV_peugeout: "Peugeot"
 SOV_peugeout_desc: "Peugeot ist einer der führenden französischen Automobilhersteller und ein zentraler Bestandteil von PSA Peugeot Citroën, dem im Jahr 2007 zweitgrößten Autobauer Europas. Eine Partnerschaft mit ihnen bietet großes Potenzial für industrielle Zusammenarbeit."
 SOV_volkswagen: "Volkswagen"
 SOV_volkswagen_desc: "Volkswagen ist ein ikonischer deutscher Automobilhersteller. Jeder Russe sollte Zugang zu hochwertigen Fahrzeugen wie diesen haben, die Modernität und Zuverlässigkeit symbolisieren."
 SOV_us_brotherhood: "Russisch-amerikanische Freundschaft"
 SOV_us_brotherhood_desc: "Wir müssen die Feindseligkeiten des Kalten Krieges hinter uns lassen und eine neue, vielversprechende Beziehung zu den Vereinigten Staaten aufbauen. Gemeinsam können wir eine sicherere und wohlhabendere Welt für alle schaffen."
 SOV_us_russia_defence_pact: "US-russischer Verteidigungspakt"
 SOV_us_russia_defence_pact_desc: "Mit der Unterzeichnung dieses Vertrags werden wir Jahrzehnte der Rivalität zwischen den USA und Russland beenden. Dieser historische Pakt wird den Weg für dauerhaften Frieden und globale Sicherheit ebnen."
 SOV_ger_nuclear_deal: "Nuklearabkommen mit dem Westen"
 SOV_ger_nuclear_deal_desc: "Die Zeit ist gekommen, einen neuen Vertrag über strategische Waffen zu unterzeichnen. Dieses Abkommen wird nukleare Spannungen abbauen und ein neues Kapitel in unseren Beziehungen zu den westlichen Mächten eröffnen."
 SOV_democratic_constitution: "Demokratische Verfassung"
 russia.77.t: "Investitionen aus Russland"
 russia.77.d: "Russland bietet Investitionen zur Unterstützung unserer Wirtschaft an. Die Annahme dieses Angebots wird unserem Land erheblich nützen, unsere wirtschaftlichen Grundlagen stärken und neue Wachstumschancen eröffnen."
 russia.77.o1: "Großartig, wir sind dabei!"
 russia.77.o2: "Nein, wir sind in der Lage, uns selbst zu entwickeln"
 russia.78.t: "Unser Angebot wurde angenommen"
 russia.78.d: "Sie haben unser Angebot angenommen, was einen positiven Schritt nach vorn in unserer Zusammenarbeit und gemeinsamen Entwicklung markiert."
 russia.78.o1: "URAAAA!"
 russia.79.t: "Unser Angebot wurde abgelehnt"
 russia.79.d: "Leider wurde unser Angebot abgelehnt, was bedeutet, dass wir unseren Ansatz überdenken und nach anderen Möglichkeiten suchen müssen."
 russia.79.o1: "Schade"
 russia.83.t: "Ein Vorschlag zur Lösung unseres alten Konflikts mit Georgien"
 russia.83.d: "Russland hat vorgeschlagen, ein Abkommen zu unterzeichnen, das darauf abzielt, die Spannungen zu verringern und den langjährigen Konflikt in der Region zu entschärfen. Dieses Angebot eröffnet die Möglichkeit, die Stabilität zu verbessern und weitere Feindseligkeiten zu vermeiden. Auch wenn Russland durchblicken lässt, dass es mit unserer Zustimmung rechnet, müssen wir sorgfältig abwägen, ob dieses Abkommen unsere Souveränität und unsere Interessen wirklich schützt."
 russia.83.o1: "Wir stimmen zu"
 russia.83.o2: "Nein, wir haben unsere Unabhängigkeit errungen und wir werden sie verteidigen!"
 russia.80.t: "Investitionen in unsere Energieindustrie"
 russia.80.d: "Russland bietet Investitionen zur Entwicklung unseres Energiesektors an und erwartet im Gegenzug größeren Einfluss. Die Annahme dieses Angebots würde unsere Energieinfrastruktur stärken und unsere wirtschaftlichen Beziehungen zu Russland vertiefen. Dennoch müssen wir die Vorteile gegen den möglichen Verlust eines Teils der Kontrolle über diesen lebenswichtigen Industriezweig abwägen."
 russia.80.o1: "Natürlich, das aserbaidschanische Öl muss florieren!"
 russia.80.o2: "Russland? Hä?"
 russia.81.t: "Unser Angebot wurde angenommen"
 russia.81.d: "Sie haben unseren Vorschlag angenommen, was eine positive Entwicklung in unseren Beziehungen darstellt. Diese Zustimmung eröffnet neue Möglichkeiten für Zusammenarbeit und gegenseitigen Nutzen in naher Zukunft."
 russia.81.o1: "URAAAA!"
 russia.84.t: "Russland bringt seine Unterstützung für uns zum Ausdruck"
 russia.84.d: "Die russische Führung hat öffentlich ihre Unterstützung für unsere Regierung erklärt und ihre Bereitschaft bekundet, die diplomatischen und freundschaftlichen Beziehungen zu vertiefen. Diese Rückendeckung könnte den Weg für eine engere Zusammenarbeit und mehr Stabilität in der Region ebnen."
 russia.84.o1: "Aue!"
 russia.85.t: "Das Auftauchen des alten Schahs von Iran"
 russia.85.d: "Es sind Berichte aufgetaucht, wonach der ehemalige Schah des Iran, der noch immer Ambitionen hegt, die Macht zurückzuerlangen, wieder in Erscheinung getreten ist. Seine Rückkehr könnte die politische Landschaft Irans und die regionale Dynamik erheblich beeinflussen und uns dazu zwingen, unsere Strategien in der Region neu zu bewerten."
 russia.85.o1: "Interessant"
 russia.86.t: "Der gegenseitige Verteidigungspakt zwischen den USA und Russland"
 russia.86.d: "Nach einer Phase der Annäherung haben wir nun die Möglichkeit, einen gegenseitigen Verteidigungspakt mit Russland zu unterzeichnen, der auf die Sicherung eines dauerhaften Friedens zwischen unseren Nationen abzielt. Dieser Pakt würde einen bedeutenden Schritt nach vorn für internationale Zusammenarbeit und Stabilität symbolisieren."
 russia.86.o1: "Das ist die beste Entscheidung, die wir treffen können"
 russia.86.o2: "Es kann nur eine Supermacht auf der Welt geben, und das sind wir!"
 russia.89.t: "Nuklearabkommen"
 russia.89.d: "Russland schlägt vor, dass wir einen Vertrag zur strategischen nuklearen Sicherheit abschließen. Ein solches Abkommen würde unsere gemeinsame Haltung zur Nichtverbreitung von Kernwaffen stärken und das Risiko eines nuklearen Konflikts in der Region und darüber hinaus verringern."
 russia.89.o1: "Wir stimmen zu"
 russia.89.o2: "Nein, das ist nicht, was wir wollen"
 russia.90.t: "Nuklearabkommen"
 russia.90.d: "[FROM.GetNameWithFlag] hat dem Nuklearabkommen formell zugestimmt. Dies markiert einen wichtigen Meilenstein in unseren Bemühungen, regionale Sicherheit zu gewährleisten und den Frieden zu fördern."
 russia.90.o1: "Gut"
 russia.91.t: ""
 russia.91.d: ""
 russia.91.o1: ""
 russia.92.t: "Der gegenseitige Verteidigungspakt zwischen Polen und Russland"
 russia.92.d: "Russland hat angeboten, einen gegenseitigen Verteidigungspakt mit Polen zu unterzeichnen, was auf ein mögliches Tauwetter in den Beziehungen hindeutet. Während einige Regierungsvertreter weiterhin vorsichtig bleiben und eine russische Dominanz in Osteuropa fürchten, könnte dieses Abkommen eine neue Ära der Zusammenarbeit und Sicherheit für unser Land einläuten."
 russia.92.o1: "Es ist Zeit, Russland zu vergeben"
 russia.92.o2: "Russland bleibt Russland. Lehnt den Pakt ab!"
 russia.93.t: "Polen hat zugestimmt!"
 russia.93.d: "Die polnische Regierung hat offiziell zugestimmt, den gegenseitigen Verteidigungspakt mit Russland zu unterzeichnen. Dieses Abkommen spiegelt die Bereitschaft wider, vergangene Differenzen zu überwinden und gemeinsam an gegenseitiger Sicherheit zu arbeiten."
 russia.93.o1: "Brüderliche Slawen schlagen wieder zu!"
 russia.94.t: "Polen hat abgelehnt!"
 russia.94.d: "Die polnische Regierung hat die Unterzeichnung des gegenseitigen Verteidigungspakts abgelehnt und ihre vorsichtige Haltung gegenüber Russland beibehalten. So enttäuschend diese Entscheidung auch ist, sie spiegelt die anhaltenden Sorgen über das regionale Kräfteverhältnis wider."
 russia.94.o1: "Ihre Entscheidung"
 russia.95.t: "Russische Marinebasis"
 russia.95.d: "Russland hat vorgeschlagen, innerhalb unserer Grenzen eine Marinebasis zu errichten. Eine solche Basis würde unsere strategische Partnerschaft stärken und die regionale Sicherheit erhöhen, könnte aber auch Bedenken hinsichtlich Souveränität und militärischem Einfluss wecken."
 russia.95.o1: "Baut so viel ihr wollt!"
 russia.95.o2: "Russland bleibt Russland. Lehnt das Angebot ab!"
 russia.96.t: "Georgien hat erlaubt!"
 russia.96.d: "Georgien hat die Genehmigung erteilt, auf seinem Territorium eine russische Marinebasis zu errichten. Dieser Schritt könnte die bilateralen Beziehungen verbessern und die sicherheitspolitische Zusammenarbeit in der Region stärken."
 russia.96.o1: "Spasibo, Brüder!"
 russia.97.t: "Georgien hat abgelehnt!"
 russia.97.d: "Georgien hat unsere Anfrage zum Bau einer russischen Marinebasis abgelehnt. Diese Zurückweisung spiegelt anhaltende Spannungen und unterschiedliche strategische Prioritäten wider, die mit sorgfältiger Diplomatie behandelt werden müssen."
 russia.97.o1: "Ihre Entscheidung"
 SOV_a_just_russia: "Ein gerechtes Russland"
 SOV_a_just_russia_desc: "Ein gerechtes Russland wurde 2006–2007 durch den Zusammenschluss mehrerer linker Parteien gegründet. Anfangs glaubten viele, es handle sich um ein von der Präsidialverwaltung kontrolliertes Projekt, das lediglich politischen Wettbewerb simulieren sollte. Diese Annahmen erwiesen sich jedoch als falsch, als Ein gerechtes Russland bei den Wahlen überraschend eine deutliche Mehrheit errang und damit die politische Landschaft veränderte. Der Aufstieg der Partei spiegelt echte Unterstützung in der Bevölkerung und den Wunsch nach sozialer Gerechtigkeit wider."
 SOV_direction: "Ausrichtung der Partei"
 SOV_direction_desc: "Nach unserem Machtantritt wurde die Frage nach der Ausrichtung unserer Partei dringend. Obwohl wir viele Grundwerte teilen, haben sich zwei Hauptströmungen herausgebildet: Anhänger der liberalen „Weißstreifen“-Bewegung und Vertreter des sozialen Patriotismus. Diese unterschiedlichen Visionen werden auf dem kommenden Parteitag diskutiert, der letztlich über unseren zukünftigen Kurs entscheiden wird. Diese Entscheidung wird die Politik und Prioritäten unserer Partei maßgeblich prägen."
 SOV_white_stripe_movement_preveil: "Die Weißstreifen-Bewegung setzt sich durch"
 SOV_white_stripe_movement_preveil_desc: "Der Parteitag hat beschlossen, die Agenda der Weißstreifen-Bewegung zu unterstützen, die auf eine tiefere Demokratisierung und engere Beziehungen zum Westen setzt. Dieser Kurs orientiert die Partei an einer europäischen Sozialdemokratie und befürwortet Reformen, die auf mehr politische Freiheit und Modernisierung abzielen. Diese Entscheidung signalisiert ein Bekenntnis zu Offenheit, Transparenz und Zusammenarbeit mit demokratischen Nationen."
 SOV_russian_democracy: "Russische Sozialdemokratie"
 SOV_russian_democracy_desc: "Das Streben nach Gerechtigkeit und sozialer Reform war schon immer eine prägende Leidenschaft des russischen Volkes. Im Laufe der Geschichte fühlten sich die Menschen in Russland immer wieder zu Ideen von Gleichheit, Freiheit und sozialer Fairness hingezogen. Dieser Trend setzte sich auch nach dem Zusammenbruch der Sowjetunion fort, als sich Bürger hinter Bewegungen versammelten, die echte Reformen versprachen. Nun, da wir an der Macht sind, liegt es in unserer Verantwortung, diese Hoffnungen zu erfüllen und sie in echten sozialen Fortschritt und Demokratie zu verwandeln."
 SOV_democratisation: "Abhängigkeit vom föderalen Zentrum verringern"
 SOV_democratisation_desc: "Soziale Reformer haben sich stets für Föderalismus und Dezentralisierung als Schlüssel zu einem gerechten und funktionierenden Russland eingesetzt. Um eine ausgewogene Entwicklung im ganzen Land zu erreichen, ist es notwendig, die Abhängigkeit der Regionen vom föderalen Zentrum zu verringern. Indem wir lokalen Regierungen mehr Autonomie und Ressourcen geben, werden wir Gleichheit und eine reaktionsfähigere Regierungsführung in allen Regionen fördern."
 SOV_real_welfare: "Ein echter Sozialstaat"
 SOV_real_welfare_desc: "Die Reform des Wohlfahrtssystems ist eine der obersten Prioritäten unserer Regierung. Viel zu lange litten gewöhnliche Menschen unter gescheiterten Marktreformen und unzureichenden Systemen sozialer Absicherung. Wir sind entschlossen, die soziale Sicherung grundlegend zu überarbeiten, um schutzbedürftige Bürger besser zu unterstützen und ihre Lebensqualität zu verbessern. Unser Ziel ist ein System, das wirklich den Bedürfnissen der vielen dient und nicht nur den Privilegien weniger."
 SOV_empower_legislature: "Erbe der russischen Konstituierenden Versammlung"
 SOV_empower_legislature_desc: "Die russische Konstituierende Versammlung war das erste wirklich repräsentative Organ, das dazu bestimmt war, die Zukunft des Landes zu gestalten. Obwohl sie von den Bolschewiki frühzeitig beendet wurde, inspirierte ihr Vermächtnis die Schaffung der Staatsduma als Parlament des Volkes. Leider hat die Duma seitdem viel von ihrer Glaubwürdigkeit und ihrem Einfluss verloren. Es ist an der Zeit, das Vertrauen in diese Institution wiederherzustellen, indem wir ihr echte Befugnisse verleihen und eine wirkliche Volksvertretung sicherstellen."
 SOV_defend_people: "Unser Volk verteidigen"
 SOV_defend_people_desc: "Es schmerzt uns zu sehen, wie alleinerziehende Mütter Schwierigkeiten haben, Medikamente für ihre Kinder zu bezahlen, oder wie große Familien unter hochverzinsten Krediten für kleine Wohnungen leiden. Armut breitet sich in unseren Regionen aus, während Banken und Konzerne immer reicher werden. Um diese Ungerechtigkeit zu bekämpfen, müssen wir ein System sozialer Leistungen und Garantien aufbauen, das unsere Bürger vor Verelendung schützt. Jeder Mensch verdient Würde und Schutz."
 SOV_social_gurantees: "Soziale Garantien und Gesundheitswesen"
 SOV_social_gurantees_desc: "Russlands System sozialer Sicherung steht vor zwei großen Herausforderungen: der Rentenversorgung und einem angeschlagenen Gesundheitswesen. Viele ältere Bürger können sich notwendige Medikamente nicht leisten, und Krankenhäuser sind oft nicht in der Lage, angemessene Versorgung zu bieten. Wir werden die Finanzierung und die Zuschüsse erhöhen, damit Rentner einen würdigen Lebensstandard erhalten und Gesundheitsdienste für alle zugänglich und verlässlich werden."
 SOV_a_just_system: "Ein gerechtes System"
 SOV_a_just_system_desc: "Unsere Vision ist eine Gesellschaft, in der jeder Mensch zählt, grundlegende Menschenrechte geachtet werden und politische Teilhabe gefördert wird. Wir streben nach einem System, das faire Wahlen ermöglicht und Entscheidungen im Interesse aller Bürger trifft. Dies ist das gerechte System, das sich die Revolutionäre der Vergangenheit vorgestellt haben – eine Gesellschaft, die auf Gleichheit, Freiheit und echter Demokratie beruht."
 SOV_a_just_economy: "Eine gerechte Wirtschaft"
 SOV_a_just_economy_desc: "Unser größtes Ziel ist nicht nur eine wohlhabende Wirtschaft, sondern eine wohlhabende Nation. Jeder sollte finanzielle Sicherheit und sozialen Schutz genießen; niemand darf zurückgelassen werden. Um eine solche Gesellschaft aufzubauen, muss Reichtum gerecht verteilt werden – mit höheren Steuern auf übermäßige Gewinne und Entlastung für die weniger Begünstigten. Dieser Ansatz wird Gleichheit und soziale Gerechtigkeit fördern und damit das Fundament für ein stärkeres und geeinteres Land legen."
 SOV_question_of_direction: "Richtungsfrage"
 SOV_question_of_direction_desc: "Die Frage nach der künftigen Ausrichtung unserer Partei ist immer drängender geworden. Einige sind der Meinung, dass unsere sozialen Reformen nicht weit genug gehen und fordern radikale Veränderungen, die die gesellschaftliche Ordnung vollständig umgestalten. Andere glauben, wir sollten den erfolgreichen europäischen sozialdemokratischen Parteien folgen und schrittweise, pragmatische Reformen verfolgen. Die Entscheidung, vor der wir stehen, wird unsere Identität bestimmen und den zukünftigen Kurs der Nation beeinflussen."
 SOV_revive_spirit_of_socialist_revolutionaries: "Den Geist der Sozialrevolutionäre wiederbeleben"
 SOV_revive_spirit_of_socialist_revolutionaries_desc: "Die Sozialrevolutionäre wollten die russische Gesellschaft durch einen agrarischen Sozialismus grundlegend umgestalten und sahen in den Bauern die treibende Kraft der Revolution. Auch wenn Ein gerechtes Russland keine direkte Nachfolge beansprucht, haben unsere Reformen einen friedlichen, aber tiefgreifenden gesellschaftlichen Wandel ausgelöst, der an den Geist dieser historischen Revolutionäre erinnert. Ihre Ideen mögen jahrhundertealt sein, doch sie bleiben bis heute relevant und inspirieren uns dazu, die Sozialrevolutionäre Partei womöglich offiziell wieder ins Leben zu rufen."
 SOV_land_socialisation: "Vergesellschaftung des Landes"
 SOV_land_socialisation_desc: "Ein zentrales Prinzip des Programms der Sozialrevolutionäre war die Vergesellschaftung des Bodens, also die Vorstellung, dass Land allen Russen kollektiv gehören sollte. Im Grunde bedeutet dies, dass Land in staatliches Eigentum übergeht, jedoch zum Nutzen des Volkes gerecht verwaltet wird. Als Vertreter des Volkes verpflichten wir uns, dieses Land gerecht zu nutzen, um das öffentliche Wohl und die landwirtschaftliche Produktivität zu maximieren."
 SOV_social_democracy_sr: "Sozialdemokratie bleibt modern"
 SOV_social_democracy_sr_desc: "Die Sozialdemokratie bleibt eine der erfolgreichsten politischen Ideen, die Europa hervorgebracht hat. Die Geschichte zeigt zahlreiche Beispiele dafür, wie sozialdemokratische Politik das Leben der Bürger verbessert und zugleich wirtschaftliche Leistungsfähigkeit bewahrt hat. Indem wir diese Prinzipien übernehmen, können wir wirksame Reformen umsetzen, die soziale Gerechtigkeit und Wohlstand für alle Russen fördern."
 SOV_third_way: "Der Dritte Weg"
 SOV_third_way_desc: "Demokratische Regierungsführung erfordert ständigen Ausgleich und Verhandlung. Viele sozialdemokratische Länder haben sich von traditionellen linken Politikansätzen hin zu marktorientierten, aber sozial verantwortlichen Konzepten bewegt, die als „Dritter Weg“ bekannt sind. Diese Philosophie verbindet marktwirtschaftliche Praktiken mit sozialstaatlichen Zielen und schafft so ein ausgewogenes System, das unseren heutigen Bedürfnissen entspricht. Die Annahme des Dritten Weges wird uns helfen, eine moderne, effiziente und gerechte Wirtschaft aufzubauen."
 SOV_centre_holds: "Das Zentrum bleibt stark"
 SOV_centre_holds_desc: "Auf dem Parteitag setzte sich die Linie des Zentralkomitees durch, die ein patriotisches Programm zur Stärkung von Russlands Souveränität, der zentralen Staatsmacht und der nationalen Einheit verfolgt. Dieses Programm soll Russland von einem zersplitterten und schwachen Staat in eine starke Supermacht verwandeln, die ihre Grenzen verteidigen und ihre vielfältigen Völker schützen kann. Es steht für Stabilität, Stärke und nationalen Stolz."
 SOV_russian_patriotism: "Russischer Sozialpatriotismus"
 SOV_russian_patriotism_desc: "Unsere zentrale Ideologie ist der Sozialpatriotismus, der die Schaffung eines starken, souveränen Sozialstaates betont. Dieser Staat muss die Interessen seiner Bürger sowohl international als auch im Inneren verteidigen. Es ist die Pflicht der Regierung, Bedingungen für einen hohen Lebensstandard zu schaffen, während die Bürger im Gegenzug ihrer Heimat Loyalität schulden, indem sie die Gesetze achten, ihren Dienst leisten und nationale Traditionen bewahren. Dieses Gleichgewicht zwischen Rechten und Pflichten ist das Fundament unserer Vision eines wohlhabenden Russlands."
 SOV_empower_nation: "Das russische Volk stärken"
 SOV_empower_nation_desc: "Wir definieren die russische Nation nicht allein ethnisch, sondern als alle Völker, die auf den weiten Territorien Russlands leben. Dazu gehören die Wolgaregion, Sibirien und der Kaukasus, deren Völker russische Sprache, Kultur und Werte teilen. Diese multinationale russische Nation muss vom Staat in den Mittelpunkt gestellt werden und ihre kollektiven Interessen vertreten. Ausländer sollten keine Sonderrechte beanspruchen – Russland gehört allein seiner vielfältigen, geeinten und starken russischen Nation."
 SOV_talks_with_rodina: "Gespräche mit der Rodina-Fraktion"
 SOV_talks_with_rodina_desc: "Unsere Beziehung zur Rodina-Fraktion ist tief verwurzelt, da wir Anfang der 2000er Jahre einst Teil derselben Partei waren. Interne Konflikte zersplitterten die Bewegung, was zur Gründung von Ein gerechtes Russland durch einige ehemalige Rodina-Mitglieder führte. Jetzt, da politische Unterschiede abgeschwächt sind und die Programme einander stark ähneln, ist es nur logisch, die Beziehungen wiederaufzunehmen und auf eine Vereinigung hinzuarbeiten. Eine solche Einheit wird unsere Fähigkeit stärken, gemeinsame Politik wirksam umzusetzen."
 SOV_form_national_patriotic_front: "Die Nationale Patriotische Front bilden"
 SOV_form_national_patriotic_front_desc: "Auch wenn das russische Volk als Einzelne stark ist, bleibt es verletzlich, solange es gespalten ist. Vereint jedoch können wir jede Herausforderung überwinden und die Zukunft unserer Nation neu gestalten. Um politische Stärke und Einfluss zu erlangen, müssen wir eine breite Koalition aus Parteien bilden, die patriotische und sozialistische Werte teilen. Nur geeint können wir ein wohlhabendes, unabhängiges Russland schaffen, das auf der Weltbühne stark bestehen kann."
 SOV_social_platform: "Die soziale Plattform priorisieren"
 SOV_social_platform_desc: "Ein hoher Lebensstandard ist für die Entwicklung unseres Staates von entscheidender Bedeutung. Wenn Bürger sich sicher fühlen und zuversichtlich in die Zukunft blicken, gedeiht die Nation. Unsere Regierung wird die Sozialpolitik in den Mittelpunkt stellen und dafür sorgen, dass die Menschen die Unterstützung und Ressourcen erhalten, die sie für ihr Wohlergehen benötigen. In Sozialprogramme zu investieren heißt, in Russlands Stabilität und Wachstum zu investieren."
 SOV_do_not_forget_about_people: "Vergesst die Menschen nicht!"
 SOV_do_not_forget_about_people_desc: "Das Volk ist die wahre Quelle der Macht in unserem Land, und wir müssen seine Bedürfnisse stets im Blick behalten. Eine glückliche und wohlhabende Nation kann Großes leisten, während eine arme und vernachlässigte Bevölkerung den Zusammenbruch und Unruhen riskiert. Unsere Politik muss darauf ausgerichtet sein, das Leben aller Bürger zu verbessern, um Russlands Zukunft zu sichern."
 SOV_more_regulations: "Verstaatlichung der Konzerne"
 SOV_more_regulations_desc: "Viel zu lange haben Kapitalisten sowohl unser Volk als auch unseren Staat ausgebeutet und Reichtum angehäuft, ohne der Gesellschaft etwas zurückzugeben. Liberale Gesetze haben maßlose kapitalistische Exzesse ermöglicht, von denen nur wenige profitierten. Um das zu ändern, werden wir die großen Industrien verstaatlichen und Staatskonzerne schaffen, die die Richtung des Marktes bestimmen. Dadurch können wir die wirtschaftliche Macht zum Nutzen aller Bürger einsetzen."
 SOV_economical_platform: "Die wirtschaftliche Plattform priorisieren"
 SOV_economical_platform_desc: "Damit unser Volk gedeihen kann und Russland floriert, ist eine starke Wirtschaft unverzichtbar. Keine Zivilisation kann ohne wirtschaftliche Kraft und Wachstum bestehen. Wir werden unsere Anstrengungen darauf konzentrieren, die wirtschaftliche Stärke des Landes wiederherzustellen, indem wir der wirtschaftspolitischen Agenda der Nationalen Patriotischen Front Vorrang geben. Die Wiederherstellung von Russlands wirtschaftlicher Macht ist die Grundlage für dauerhaften Wohlstand."
 SOV_invest_in_beneficial_sectors: "In vorteilhafte Sektoren investieren"
 SOV_invest_in_beneficial_sectors_desc: "Die Wiederbelebung der produktiven Kapazitäten des Landes erfordert erhebliche Kapitalinvestitionen. Deshalb müssen wir Mittel in Schlüsselsektoren der Wirtschaft lenken, die nachhaltige langfristige Erträge versprechen. Indem wir uns auf Industrien konzentrieren, die zukünftiges Wachstum antreiben, werden wir Russlands BIP stärken und eine stabile wirtschaftliche Zukunft sichern."
 SOV_rapid_militarisation: "Rasche Militarisierung"
 SOV_rapid_militarisation_desc: "Ein starker, souveräner Staat braucht ein mächtiges Militär. Wir werden die Militarisierung beschleunigen, indem wir militärische Ausbildung in die Schulen integrieren und verpflichtende zivile militärische Aktivitäten organisieren. Die Verteidigungsausgaben werden steigen, damit die Armee jede Invasion abwehren kann. Der russische Staat und das russische Volk müssen bereit und geeint sein, um ihre Heimat gegen jede Bedrohung zu verteidigen."
 SOV_under_a_leader: "Unter einem starken Führer"
 SOV_under_a_leader_desc: "Russische Staatlichkeit war historisch stets auf starke Führer ausgerichtet – Persönlichkeiten wie Iwan der Schreckliche, Alexander III. und Josef Stalin genossen tiefen Respekt und prägten das Schicksal der Nation. Heute brauchen sowohl das Volk als auch der Staat erneut eine solche starke Führungspersönlichkeit, um sie hinter einer großen nationalen Mission zu einen. Wir sind bereit, eine solche Führung bereitzustellen und Russland zu neuen Höhen zu führen."
 SOV_talks_with_left_patriots: "Gespräche mit linken Patrioten"
 SOV_talks_with_left_patriots_desc: "Gennadi Semigins Partei Patrioten Russlands verfügt über erhebliche Unterstützung in der Bevölkerung und finanzielle Ressourcen und vertritt einen linken Patriotismus, der dem unseren ähnelt. Wir erkennen in ihr einen natürlichen Verbündeten und werden Verhandlungen aufnehmen, um Patrioten Russlands in die Nationale Patriotische Front zu integrieren. Ihre Einbindung wird unsere Koalition stärken und ihnen eine Vertretung in der Regierung sichern."
 SOV_unite_patriotic_parties: "Patriotische Parteien vereinen"
 SOV_unite_patriotic_parties_desc: "Der Zerfall der Rodina-Partei führte zu vielen kleinen Parteien mit patriotischen Idealen, die für sich genommen jedoch wenig Einfluss haben. Obwohl sie einzeln schwach sind, kann die politische Erfahrung ihrer Führungen von großem Wert sein, wenn sie für ein gemeinsames Ziel vereint werden. Wir werden diese Parteien in die Nationale Patriotische Front eingliedern und ihnen Regierungsämter anbieten, um patriotische Kräfte zu bündeln und ihre Wirkung zu verstärken."
 SOV_a_just_russia_prevails: "Ein gerechtes Russland setzt sich durch"
 SOV_a_just_russia_prevails_desc: "Innerhalb der Nationalen Patriotischen Front ist Ein gerechtes Russland die dominierende Kraft geblieben. Nur Ein gerechtes Russland besitzt die Einheit, die Vision und die Stärke, die nötig sind, um den Zusammenhalt der Koalition zu wahren und Russland zu wahrer Größe zu führen. Unsere Führung wird sicherstellen, dass die Front standhaft bleibt und sich auf den Aufbau einer starken und gerechten Nation konzentriert."
 SOV_rodina_prevails: "Rodina setzt sich durch"
 SOV_rodina_prevails_desc: "Rodina hat ihre politische Stellung wieder aufgebaut und innerhalb der Koalition das Vertrauen der Wähler zurückgewonnen, wodurch sie stark genug wurde, um die Führung der Nationalen Patriotischen Front zu übernehmen. Dies markiert den Beginn einer neuen Ära, in der Rodina die Front und Russland in eine hellere und wohlhabendere Zukunft führen wird. Der Zusammenhalt der Koalition war nie stärker."
 SOV_rodina_tt: "Rodina wird die Führung der NPF übernehmen"
 SOV_blr_democracy_tt: "Wird in Belarus eine Demokratie einsetzen"
 SOV_under_a_banner: "Unter dem großen Banner"
 SOV_under_a_banner_desc: "Die Flaggen des Russischen Kaiserreichs, der Sowjetunion und die moderne russische Trikolore sind mächtige Symbole unserer Geschichte. Unter diesen Bannern erreichte Russland große Höhen in Kultur, Wirtschaft, Wissenschaft und Außenpolitik. Unsere Vorfahren brachten unter diesen Flaggen gewaltige Opfer – vom Krimkrieg bis zum Großen Vaterländischen Krieg. Nun werden wir unter der russischen Trikolore danach streben, noch größere Leistungen und nationalen Ruhm zu erringen."
 SOV_empower_executive: "Den Präsidenten stärken"
 SOV_empower_executive_desc: "Wir haben lange argumentiert, dass das Amt des Präsidenten Russlands durch übermäßige Einschränkungen behindert wird, die eine wirksame Regierungsführung verhindern. Um die Politik des Sozialpatriotismus vollständig umzusetzen, müssen diese unnötigen Begrenzungen beseitigt werden. Den Präsidenten mit weitreichenderen Befugnissen auszustatten, ist für entschlossene Führung und nationalen Fortschritt unverzichtbar."
 SOV_united_country: "Vereintes Vaterland"
 SOV_united_country_desc: "Die Verwirklichung unserer nationalen Ziele erfordert die Einheit des russischen Volkes. Nur durch Zusammenhalt kann Russland Größe und dauerhaften Wohlstand erreichen. Die Bürger müssen sich hinter einer gemeinsamen Ideologie, einem geachteten Führer und einem starken Staat versammeln. Solange das russische Volk vereint steht, kann keine Kraft unsere Nation brechen."
 russia.87.t: "Unser Angebot wurde angenommen"
 russia.87.d: "Die Vereinigten Staaten haben zugestimmt, einen gegenseitigen Verteidigungsvertrag zu unterzeichnen, was einen bedeutenden Schritt hin zu einer engeren militärischen Zusammenarbeit zwischen unseren Nationen darstellt. Dieses Abkommen verspricht, unsere gegenseitige Sicherheit zu stärken und größeres Vertrauen auf internationaler Ebene zu fördern."
 russia.87.o1: "Ausgezeichnet!"
 SOV_investments_in_ben: "Investitionen in vorteilhafte Sektoren"
 russia.88.t: "Unser Angebot wurde abgelehnt"
 russia.88.d: "Leider wurde unser Vorschlag abgelehnt. So enttäuschend dies auch ist, wir werden weiterhin nach anderen Partnern und Möglichkeiten suchen, um unsere Interessen voranzubringen und unsere Position zu stärken."
 russia.88.o1: "Wir haben unser Bestes versucht."
 russia.82.t: "Unser Angebot wurde abgelehnt"
 russia.82.d: "Leider wurde unser Angebot abgelehnt. Dieser Rückschlag bedeutet, dass wir unsere Strategien überdenken und alternative Wege finden müssen, um unsere Interessen voranzubringen."
 russia.82.o1: "Einen Versuch war es wert"
 russia.98.t: "Angelegenheiten der Partei"
 russia.98.d: "Mit der Amtseinführung Alexei Nawalnys sind die Unterschiede zwischen seiner Politik und jener der Jabloko-Partei immer deutlicher geworden. Obwohl Nawalny und Jabloko in vielen Punkten ähnliche Programme haben, bestehen in der Parteiführung weiterhin Streitigkeiten. Gerüchten zufolge könnte Nawalny austreten, um seine eigene Organisation zu gründen, was Fragen nach der künftigen Einheit und Ausrichtung der Partei aufwirft."
 russia.98.o1: "Präsident Nawalny bleibt bei Jabloko!"
 russia.98.o2: "Präsident Nawalny wird seine eigene Partei gründen!"
 russia.99.t: "Nawalnys Partei"
 russia.99.d: "Nach Nawalnys Austritt aus Jabloko traten seine engen Verbündeten und Regierungsmitglieder zu einem außerordentlichen Kongress zusammen, um eine neue Partei zu gründen. Das Parteiprogramm wurde einstimmig angenommen, doch über den Namen und die Symbolik entbrannte eine heftige Debatte. Mehrere Optionen wurden vorgeschlagen, wobei sich drei Hauptkandidaten in der Diskussion herauskristallisierten. Welche davon soll diese neue Bewegung repräsentieren?"
 russia.99.o1: "§YVolksallianz§!"
 russia.99.o2: "§YPartei des Fortschritts§!"
 russia.99.o3: "§YZukunft Russlands§!"
 russia.100.t: "Parteistreit"
 russia.100.d: "Nach seiner Amtseinführung sind ernsthafte Meinungsverschiedenheiten zwischen Präsident Nawalny und der Führung von Jabloko entstanden. Die Partei wirft Nawalny nationalistische Ansichten vor, die im Widerspruch zu ihrer Programmatik stehen. Während Nawalny öffentlich schweigt, kursieren zahlreiche Spekulationen über einen möglichen Austritt und die Gründung einer neuen Partei unter dem Banner von „NAROD“. Zugleich gibt es Anzeichen dafür, dass er einen Kompromiss sucht, um eine Spaltung zu vermeiden. Der Ausgang bleibt ungewiss."
 russia.100.o1: "Ein Kompromiss wird gefunden werden."
 russia.100.o2: "Die neue Nationaldemokratische Partei wird entstehen!"
 russia.101.t: "Umbenennung?"
 russia.101.d: "Unsere Partei steht vor einem Dilemma bezüglich ihrer Identität, während wir die Demokratisierung vorantreiben. Viele Veteranen möchten den historischen Namen der Partei als Symbol ihres Erbes bewahren, während andere dafür plädieren, das Wort „Kommunistisch“ aus dem Namen zu streichen, um eine modernere, demokratischere Ausrichtung widerzuspiegeln. Diese Debatte zeigt die Spannung zwischen Tradition und Wandel innerhalb der Partei."
 russia.101.o1: "KPRF jetzt! KPRF für immer!"
 russia.101.o2: "Wir sind keine Stalinisten mehr!"
 russia.102.t: "Rückkehr Gorbatschows?"
 russia.102.d: "Im Zuge unserer politischen Neuordnung wird die Abwesenheit Michail Gorbatschows – des Mannes, der diese Reformen ursprünglich eingeleitet hat – besonders deutlich. Die Frage stellt sich: Sollen wir Gorbatschow eine zweite Chance geben, diesen Prozess zu führen oder zu beeinflussen? Sein Vermächtnis bleibt umstritten."
 russia.102.o1: "Er ist ein Verräter!"
 russia.102.o2: "Es lebe Gorbatschow!"
 russia.103.t: "Unser Afrika-Korps wurde angeworben"
 russia.103.d: "Eines unserer Bataillone des Afrikakorps wurde von [FROM.GetNameWithFlag] angeworben. Diese Zusammenarbeit stärkt unsere Beziehungen und zeigt die wachsende internationale Rolle unseres Militärs. Wir freuen uns auf eine weitere Zusammenarbeit."
 russia.103.a: "Gut"
 russia.104.t: "Politische Vorherrschaft"
 russia.104.d: "Unsere Regierung steht vor dem Problem eines zersplitterten Parteiensystems, das zu Chaos in der Staatsduma führt. Keine politische Kraft verfügt über eine eindeutige Mehrheit, was zu ständigen Machtkämpfen führt. Auf regionaler Ebene stärkt die Zersplitterung lokale Eliten und schwächt die föderale Kontrolle. Derzeit gibt es drei Hauptkräfte: die regierungsnahe Partei Einheit, den Block Vaterland – Ganz Russland und die Reformpartei Unser Haus Russland. Wir können entweder die regierungsnahen Fraktionen ausbauen, um eine Koalition zu bilden, die ein gewisses Maß an Demokratie bewahrt, oder sie in einer einzigen „Partei der Macht“ vereinen, um Zentralisierung und stärkere Regierungsfähigkeit zu sichern."
 russia.104.o1: "Die „Präsidialkoalition“ muss geschaffen werden!"
 russia.104.o2: "Lasst sie uns vereinen."
 russia.105.t: "Einiges Russland"
 russia.105.d: "Nach langen Verhandlungen wurde eine neue regierungsnahe politische Partei, „Einiges Russland“, gegründet. Diese Partei vereint fast die gesamte regionale Elite und föderale Beamte, die uns loyal sind. Dank dieser Vereinigung sicherten wir uns eine Mehrheit sowohl in der Staatsduma als auch in den Regionalparlamenten, sodass wir wichtige Gesetze verabschieden und die Kontrolle über die Regionalpolitik behalten können."
 russia.105.a: "Ein neues Russland erwartet uns!"
 russia.106.t: "Ein gerechtes Russland"
 russia.106.d: "Eine neue politische Kraft namens „Ein gerechtes Russland“ ist aus der Vereinigung verschiedener links-patriotischer Bewegungen hervorgegangen. Ihr Programm betont soziale Wohlfahrt, eine stärkere staatliche Beteiligung an der Wirtschaft und den Schutz der nationalen Souveränität. Obwohl manche vermuten, die Partei sei geschaffen worden, um Protestwähler aufzufangen, besitzt sie erhebliches Potenzial, zu einem einflussreichen Akteur in Russlands sich wandelnder politischer Landschaft zu werden."
 russia.106.a: "Die Stimme des Volkes!"
 russia.107.t: "Neue Leute?"
 russia.107.d: "Eine neue politische Partei namens Neue Leute wurde unter der Führung des bekannten Unternehmers Andrei Netschajew gegründet. Sie tritt für Meinungsfreiheit, liberale Demokratie, unternehmerische Rechte und die Digitalisierung von Wirtschaft und Verwaltung ein und präsentiert damit eine moderne Vision. Es bleibt abzuwarten, ob sich Neue Leute dauerhaft im russischen politischen System etablieren oder bald wieder verschwinden wird."
 russia.107.a: "Neue Leute und das alte System"
 SOV_the_party_TT: "Die Regierungspartei wird geändert!"
 SOV_the_nonparty_TT: "Eine neue Partei wird erscheinen."
 sov_just_russia.1.t: "Der Parteitag"
 sov_just_russia.1.d: "Nach ihrem beeindruckenden Wahlsieg hielt Ein gerechtes Russland einen außerordentlichen Parteitag ab, um über die künftige Ausrichtung der Partei, die Regierungsbildung und die Wahl des Zentralrats zu entscheiden. Die Delegierten debattierten über zwei Hauptwege: die Fortführung der Agenda der Pro-Weißstreifen-Bewegung oder die Annahme des vom Parteiapparat vertretenen Programms des Sozialpatriotismus. Der Parteitag wird über das Schicksal der Partei entscheiden."
 sov_just_russia.1.o1: "Der Parteitag unterstützte die Parteiführung"
 sov_just_russia.1.o2: "Der Parteitag unterstützte die Weißstreifen-Bewegung"
 sov_just_russia.2.t: "Gespräche mit der Rodina-Fraktion"
 sov_just_russia.2.d: "Nach langen Verhandlungen zwischen den Führungen von Ein gerechtes Russland und Rodina wurde eine Vereinbarung erzielt: Rodina wird die derzeitige Regierung von Ein gerechtes Russland unterstützen, die im Gegenzug verspricht, Rodina bei allen wichtigen Regierungsentscheidungen zu konsultieren. Beide Parteien einigten sich außerdem darauf, mit der Bildung einer breiten Koalition patriotischer Organisationen und Parteien zu beginnen."
 sov_just_russia.2.o1: "Unsere Rodina"
 sov_just_russia.3.t: "Nationale Patriotische Front"
 sov_just_russia.3.d: "Heute haben die Führungen von Rodina und Ein gerechtes Russland gemeinsam mit den Spitzen von Gewerkschaften und öffentlichen Organisationen nach einem langen Formierungsprozess die Gründung der Nationalen Patriotischen Front angekündigt – einer breiten Volkskoalition. Ihre Hauptideologie ist der Sozialpatriotismus, wie ihn Sergei Mironow formuliert hat, mit dem Ziel sozialistischer und patriotischer Reformen zur Umgestaltung des Landes. Laut Koalitionsvereinbarung dürfen Mitgliedsparteien an staatlichen Beratungen teilnehmen, und große Organisationen können Regierungssitze beantragen. Rodina erhält als Ko-Vorsitzender einen Regierungssitz und mehrere Ministerposten."
 sov_just_russia.3.o1: "Gemeinsam vorwärts – in die Zukunft!"
 SOV_democracy_in_kaz: "Russische Demokratie in [KAZ.GetNameWithFlag]"
 SOV_democracy_in_kaz_desc: "Wir werden den Überraschungseffekt nutzen, um erfolgreich eine Operation in [KAZ.GetNameWithFlag] zu starten. Allerdings ist die Zeit knapp, daher ist schnelles und entschlossenes Handeln entscheidend für den Erfolg."
 SOV_democracy_in_kyr: "Russische Demokratie in [KYR.GetNameWithFlag]"
 SOV_democracy_in_kyr_desc: "Mit Hilfe von Überraschungstaktiken planen wir, schnell in [KYR.GetNameWithFlag] zuzuschlagen. Das Zeitfenster für den Beginn der Operation ist eng, daher ist Geschwindigkeit entscheidend."
 SOV_democracy_in_taj: "Russische Demokratie in [TAJ.GetNameWithFlag]"
 SOV_democracy_in_taj_desc: "Wir werden den Überraschungseffekt ausnutzen, um eine wirksame Operation in [TAJ.GetNameWithFlag] durchzuführen. Rasches Handeln ist entscheidend, um unsere Ziele zu erreichen."
 SOV_democracy_in_trk: "Russische Demokratie in [TRK.GetNameWithFlag]"
 SOV_democracy_in_trk_desc: "Unsere Strategie umfasst einen Überraschungsangriff in [TRK.GetNameWithFlag]. Die Operation muss schnell beginnen, um erfolgreich zu sein."
 SOV_democracy_in_uzb: "Russische Demokratie in [UZB.GetNameWithFlag]"
 SOV_democracy_in_uzb_desc: "Wir werden den Überraschungseffekt nutzen, um in [UZB.GetNameWithFlag] eine erfolgreiche Operation zu starten, doch wir müssen rasch handeln, bevor sich die Gelegenheit schließt."
 SOV_i_blin_idea: "Inländische CPUs"
 rosgvardia_wagner: "Jewgeni Prigoschin wurde getötet"
 SOV_wagner_rosguard_idea: "Wagner-PMK als Teil der Rosgwardija"
 SOV_rosguard_wagner: "Die Wagner-PMK in die Rosgwardija aufnehmen"
 SOV_rosguard_wagner_desc: "Nach dem Tod von Jewgeni Prigoschin zerfielen seine PMK vor unseren Augen: Einige blieben in Belarus, viele kündigten, doch einige sind bereit, sich unserer direkten Kontrolle zu unterstellen. Wir sind bereit, sie zu einem Teil der Rosgwardija zu machen."
 SOV_mvd_category: "[SOV.GetFlag]Spezialdienste Russlands"
 SOV_mvd_category_desc: "Die Sicherheit des Landes hängt nicht nur von den Streitkräften ab. Die Sicherheit des Landes liegt auch auf den Schultern staatlicher Behörden wie des Innenministeriums sowie vieler Spezialdienste, die als Erbe der UdSSR erhalten geblieben sind. Diese riesige Maschinerie aus verschiedenen Behörden und Abteilungen wird das Land bei richtiger Führung vor allen Problemen bewahren.\nDer Separatismus in den [SOV.GetFlag]§Yrussischen§! Regionen wird allmählich §Rzunehmen§!, sobald die §YStabilität§! unter §R32%§! fällt."
 SOV_grom_to_rosgvardia: "Die Spezialeinheit §YGrom§! an die §RRosgwardija§! §Yüberstellen§!"
 SOV_mobilise_omon: "Die §ROMON§! §Ymobilisieren§!"
 SOV_mobilise_sobr: "Die §RSOBR§! §Ymobilisieren§!"
 SOV_help_with_sheriff: "§YRussland§! hat einen Deal mit §Rdem Sheriff§!"
 SOV_anti_sheriff: "§YTransnistrien§! vom Einfluss §Rdes Sheriff§! befreien"
