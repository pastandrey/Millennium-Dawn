 SOV_joint_research_ttip: "§RDiese Boni können nur einmal verwendet werden und gelten nur für Länder innerhalb des Warschauer Pakts. Länder außerhalb des historischen Warschauer Pakts erhalten diese Boni nicht. Nutze sie nur, wenn du sicher bist, dass all deine Verbündeten Paktmitglieder sind, da nur sie davon profitieren.§!"
