 SOV_CHE_separ_tt: "§RSeparatismus§! in §Y[CHE.GetNameWithFlag]§!: §Y[?CHE.subjectinped]§!%"
 sov_reunification_category: "Wiedervereinigung Russlands"
 sov_reunification_category_desc: "Das Ergebnis des Krieges hat Russland zersplittert zurückgelassen; nachdem sich der Staub gelegt hat, müssen wir die Mühen der Wiedervereinigung auf uns nehmen.\nAktueller Fortschritt der Wiedervereinigung: [?THIS.reunification_progress]."
 start_talks_with_karelia: "Wiedervereinigungsgespräche mit [KAE.GetNamewithFlag] beginnen"
 start_talks_with_don: "Wiedervereinigungsgespräche mit [DON.GetNamewithFlag] beginnen"
