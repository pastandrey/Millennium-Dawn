 sov_kasyanov.1.t: "Unabhängigkeit Itschkeriens"
 sov_kasyanov.1.d: "Im Zuge der demokratischen Umgestaltung Russlands und des Wunsches nach Frieden unternahm die russische Regierung den mutigen Schritt, Tschetschenien formell die Unabhängigkeit zu gewähren.\n\nNach langen Verhandlungen und diplomatischen Bemühungen einigten sich beide Seiten auf diesen historischen Kompromiss. Russland erkannte Tschetscheniens Recht auf Unabhängigkeit an und schlug damit ein neues Kapitel in den Beziehungen zwischen beiden Gebilden auf. Dieser Akt wurde zum Symbol des Wunsches nach Frieden und Dialog in einer Region, die zuvor von Spannungen und Feindseligkeiten geprägt war."
 sov_kasyanov.1.a: "Diplomatische Beziehungen aufnehmen"
 sov_kasyanov.2.t: "Frage der Zugehörigkeit der Südlichen Kurilen"
 sov_kasyanov.2.d: "Nach dem Zweiten Weltkrieg wurden alle Kurileninseln Teil der UdSSR und später Russlands, doch die Zugehörigkeit der Inseln Iturup, Kunaschir, Schikotan und der Inselgruppe Habomai wird von uns bestritten; wir betrachten und betrachteten sie stets als besetzten Teil unseres Landes. Heute hat Russland Verhandlungen mit uns über diese Frage begonnen. Wie lautet unsere Antwort?"
 sov_kasyanov.2.a: "Die Südlichen Kurilen waren schon immer japanisch"
 sov_kasyanov.2.b: "Na gut, sollen sie sie behalten"
 sov_kasyanov.3.t: "Die Japaner haben sich geweigert, ihre Ansprüche auf die Südlichen Kurilen aufzugeben"
 sov_kasyanov.3.d: "Vor Kurzem fanden Gespräche zwischen uns und Japan statt. Das Ergebnis lautet wie folgt: Die Japaner ändern ihre Position nicht und betrachten die Südlichen Kurilen weiterhin als ihr Territorium."
 sov_kasyanov.3.a: "Gut, wir werden die Kurilen nicht mit Gewalt halten, wir geben sie ab!"
 sov_kasyanov.3.b: "Zur Hölle mit ihnen."
 sov_kasyanov.3.c: "Dafür werden sie bezahlen"
 sov_kasyanov.4.t: "Die Japaner haben zugestimmt, keine Ansprüche auf die Südlichen Kurilen mehr zu erheben"
 sov_kasyanov.4.d: "Vor Kurzem fanden Gespräche zwischen uns und Japan statt. Sie haben zugestimmt, ihre Ansprüche auf die Südlichen Kurilen zurückzuziehen."
 sov_kasyanov.4.a: "Wir wussten immer, dass die Japaner gute Menschen sind"
 SOV_from_center_category: "Vom Zentrum in die Regionen!"
 SOV_from_center_category_desc: "Zehn Jahre lang hat sich Russland faktisch in einen Einheitsstaat verwandelt, dessen Subjekte schwere finanzielle Verpflichtungen gegenüber Moskau tragen, jedoch ihrer Rechte beraubt sind – auf einen angemessenen Anteil an den Ausgaben entsprechend ihres tatsächlichen Beitrags zur Wirtschaft, auf Entwicklung sowie auf historische und kulturelle Vielfalt. Wir fordern den sofortigen Abbau der berüchtigten und für Russland schädlichen „Machtvertikale“."
