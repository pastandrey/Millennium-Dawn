 sov_medvedev.4.t: "Russland schlägt einen Neustart der Beziehungen vor"
 sov_medvedev.4.d: "Die neue russische Regierung, die deutlich westlich orientierter ist als Putins Regime, hat angeboten, die Beziehungen neu zu beginnen. Ihre Diplomaten schlagen einen frischen Start, einen 'Reset' der Zusammenarbeit vor."
 sov_medvedev.4.a: "Natürlich! Russen können gute Freunde sein!"
 sov_medvedev.4.b: "Mit ihnen können wir keine Freunde sein."
 sov_medvedev.6.t: "Putin und Medwedew verkünden ein Duumvirat!"
 sov_medvedev.6.d: "In einem überraschenden politischen Schritt haben der Präsident und der Premierminister Russlands gemeinsam angekündigt, das Land künftig in einem formellen Duumvirat zu regieren. Diese beispiellose Vereinbarung verändert Russlands Machtstruktur grundlegend."
 sov_medvedev.6.a: "Gut"
 sov_medvedev.7.t: "Das neue russische Regime"
 sov_medvedev.7.d: "Unser Präsident äußert sich in den sozialen Medien zunehmend offensiv und vertritt dort neue, radikale Ansichten über den Westen. Seine Rhetorik hat sich dramatisch verschoben und signalisiert Russlands Rückkehr auf einen Kurs selbstbewusster Unabhängigkeit."
 sov_medvedev.7.a: "Ich hasse sie, sie sind Bastarde und Degenerierte."
 sov_medvedev.8.t: "Russlands Kurswechsel Richtung Westen"
 sov_medvedev.8.d: "Der Präsident hat eine mutige neue Politik angekündigt. Russland wird den Westen nun nicht länger als Feind, sondern als wichtigen Partner betrachten. Unsere Nation schlägt ein neues Kapitel auf."
 sov_medvedev.8.a: "Gott segne Amerika!... und Russland!"
 SOV_kob_party_start: "Konzeptionelle Parteieinheit"
 SOV_kob_party_start_desc: "Die Konzeptionelle Parteieinheit unter Führung unseres visionären Führers General Konstantin Petrow hat die Macht übernommen. Es ist an der Zeit, ideologischen Krieg gegen den Predictor Corrector zu führen und Russland von seinen verborgenen Ketten zu befreien."
 SOV_kobnod: "Russische Volksbewegung für die Macht Gottes"
 SOV_establish_militar_loyal: "Militärische Loyalität herstellen"
 SOV_establish_militar_loyal_desc: "General Petrow muss sich die vollständige Loyalität des Militärs sichern. Alle Teilstreitkräfte müssen ihm als Glawkowerch – dem Obersten Befehlshaber ganz Russlands – die Treue schwören."
 SOV_establish_loyalistii: "Regionaler Loyalismus"
 SOV_establish_loyalistii_desc: "Wir müssen ergebenen Parteimitgliedern regionale Machtpositionen übertragen, um absolute Loyalität sicherzustellen und jeden Widerstand gegen unseren Weg zu verhindern."
 SOV_regional_control: "Die Oligarchie säubern"
 SOV_regional_control_desc: "Die Oligarchen haben dem Volk viel zu lange das Blut ausgesaugt. Nun werden wir zurückschlagen und dieses parasitäre Elitegefüge aus dem Land tilgen."
 SOV_establish_new_religion: "Neue Religionspolitik"
 SOV_establish_new_religion_desc: "Die moderne organisierte Religion wurde geschaffen, um den Geist zu versklaven und unabhängiges Denken zu unterdrücken. Wir müssen das Volk aus dieser geistigen Knechtschaft befreien."
 SOV_internet_propaganda: "Internetpropaganda"
 SOV_internet_propaganda_desc: "Nur wenige verstehen die wahre Macht des Internets. Wie einst der Predictor Corrector werden wir es einsetzen, um das öffentliche Denken neu zu formen und falsches Bewusstsein zu zerschlagen."
 SOV_course_of_truth: "Kurs der Wahrheit"
 SOV_course_of_truth_desc: "Viel zu lange hat der orthodoxe Klerus dem Volk tiefere Wahrheiten vorenthalten. Nun werden wir diese Geheimnisse ans Licht bringen und die ganze Wahrheit unserer Geschichte enthüllen."
 SOV_new_cosmic_warfare_desc: "General Petrow, ein Spezialist für Weltraumkriegsführung, betrachtet die Sterne als Russlands nächste Grenze. Wir müssen das Erbe des sowjetischen Raumfahrtprogramms wiederherstellen und weiterentwickeln."
 SOV_russian_knights_desc: "Im Kern des russischen Geistes liegt die Seele des Witjas – des edlen Kriegers. Auch wenn sie nur wenige sind, tragen diese modernen Ritter das Erbe der Rus in die Schlacht."
 SOV_russian_knights: "Russischer Witjas"
 SOV_new_cosmic_warfare: "Neue kosmische Kriegsführung"
 SOV_remaking_constitution: "Verfassung neu gestalten"
 SOV_remaking_constitution_desc: "Die derzeitige Verfassung schränkt unseren Reformwillen ein. Sie muss vollständig neu geschrieben werden, damit sie unsere Vision von Russlands göttlicher Zukunft widerspiegelt."
 SOV_iron_hand_of_koba: "Stalinistisches Erbe"
 SOV_iron_hand_of_koba_desc: "Stalin war der geistige Erbe der Zaren und der Architekt eines disziplinierten, starken Russland. Wir müssen sein Vermächtnis wiederbeleben und dem Pfad folgen, den er geschmiedet hat."
 SOV_natural_bloshevism: "Natürlicher Bolschewismus"
 SOV_natural_bloshevism_desc: "Der Fall des Zarenreiches und der Aufstieg des Bolschewismus waren keine Zufälle – sie waren die natürliche Entwicklung unserer Nation. Wir müssen dieses Schicksal vollständig annehmen."
 SOV_slavic_reincarnation: "Slawische Wiedergeburt"
 SOV_slavic_reincarnation_desc: "Wahre geistige Erneuerung liegt im Glauben unserer Ahnen. Alle fremden Religionen müssen abgeschafft werden zugunsten einer Rückkehr zum einheimischen slawischen Heidentum."
 SOV_merge_pantheons: "Mit Zvenyashie Kedry verschmelzen"
 SOV_merge_pantheons_desc: "Indem wir uns mit Zvenyashie Kedry vereinen, können wir unsere heiligen Vorstellungen zu einem einzigen starken Glauben verschmelzen, um den Manipulationen der ägyptischen Priester entgegenzutreten."
 SOV_support_nod: "NOD unterstützen"
 SOV_support_nod_desc: "Die NOD-Bewegung ist entschlossen antiwestlich. Ihre Ideologie stimmt mit der unseren überein, und sie sollte in unsere Verwaltung integriert werden."
 SOV_educational_water: "Totes Wasser"
 SOV_educational_water_desc: "Totes Wasser, eine religiös-politische Lehre, inspiriert von russischer Folklore und ursprünglich vom geheimnisvollen Priesterzentrum der Sowjetunion entwickelt, soll das Volk geistig wiederbeleben. Heute bildet sie die ideologische Grundlage unserer Konzeptionellen Parteieinheit."
 SOV_search_for_priests: "Nach den Priestern suchen"
 SOV_search_for_priests_desc: "Die ägyptischen Priester haben die Welt viel zu lange aus dem Schatten manipuliert. Wir müssen ihre Agenten aufspüren, die sich innerhalb unserer Grenzen verbergen."
 SOV_purge_westernists: "Westler säubern"
 SOV_purge_westernists_desc: "Westler sind blinde Diener des globalen Kapitalismus. Ihr giftiger Einfluss muss aus Regierung und Gesellschaft entfernt werden."
 SOV_revolutions_in_other_slavic_states: "Bogorodichnaja Revolution"
 SOV_revolutions_in_other_slavic_states_desc: "Wir müssen die Revolution in alle slawischen Länder tragen, um unsere Brüder von der Kontrolle des Predictor Corrector zu befreien. Das Zeitalter der Befreiung ist angebrochen."
 SOV_seek_for_them_in_israel: "In Israel nach ihnen suchen"
 SOV_seek_for_them_in_israel_desc: "General Petrow zufolge könnten die ägyptischen Priester sogar in Israel Agenten haben. Wir müssen ermitteln und ihren verborgenen Einfluss aufdecken."
 SOV_seek_for_them_in_swiss: "In der Schweiz nach ihnen suchen"
 SOV_seek_for_them_in_swiss_desc: "Die Schweiz gilt seit Langem als möglicher Hauptsitz des Predictor Corrector. Wir werden jeden Winkel durchsuchen, um die Wahrheit zu finden."
 SOV_seek_for_them_in_egypt: "In Ägypten nach ihnen suchen"
 SOV_seek_for_them_in_egypt_desc: "Vielleicht haben sich die ägyptischen Priester in der Wiege ihrer Macht verborgen. Wir müssen in ihrer alten Heimat nach der Wahrheit suchen."
 SOV_kill_predictor_corrector: "Predictor Corrector töten!"
 SOV_kill_predictor_corrector_desc: "Wir haben den Aufenthaltsort des Predictor Corrector aufgedeckt. Es ist Zeit, unseren heiligen Kreuzzug zu beginnen – gegen Kapitalismus, Manipulation und die Feinde der Wahrheit."
 SOV_semibankirshina_desc: "Semibankirschtschina oder 'die Gruppe der sieben Banker' bezeichnet die mächtigsten Oligarchen, die in der Jelzin-Ära enormen Einfluss auf die russische Politik ausübten."
 SOV_enforce_oligarhic_rule: "Oligarchenherrschaft durchsetzen"
 SOV_enforce_oligarhic_rule_desc: "Der Staat hat die Oligarchen zu lange unterdrückt und zugleich wenig für wirtschaftlichen Fortschritt getan. Es ist Zeit, die Macht jenen zu übergeben, die Wachstum tatsächlich vorantreiben."
 SOV_revive_oligarch_influence: "Oligarcheneinfluss wiederbeleben"
 SOV_revive_oligarch_influence_desc: "Es ist an der Zeit, dass unser Kreis von Oligarchen wieder in den Vordergrund tritt und seinen Einfluss auf die russische Staatsführung zurückgewinnt."
 SOV_bring_the_old_gang_from_abroad: "Die alte Clique aus dem Ausland zurückholen"
 SOV_bring_the_old_gang_from_abroad_desc: "Viele unserer früheren Verbündeten wurden ins Exil gedrängt. Nun, da sich die Zeiten ändern, können wir sie nach Hause zurückholen und unser Einflussimperium wiederaufbauen."
 SOV_privatize_state_corporations: "Staatskonzerne privatisieren"
 SOV_privatize_state_corporations_desc: "Die staatsgelenkte Wirtschaft unter Putin war ineffizient und aufgebläht. Wir müssen diese Konzerne zerschlagen und wieder in private Hände überführen."
 SOV_move_oligarchic_entites_back_to_russia: "Oligarchische Vermögen zurückholen"
 SOV_move_oligarchic_entites_back_to_russia_desc: "Russischer Reichtum, der im Ausland verborgen liegt, muss heimkehren. Da unsere Kontrolle nun gesichert ist, können wir diese Ressourcen für Profit und Fortschritt nutzen."
 SOV_exploit_natural_wealth: "Russlands natürlichen Reichtum ausbeuten"
 SOV_exploit_natural_wealth_desc: "Russland besitzt gewaltige natürliche Ressourcen. Wir werden sie effizient erschließen – das Volk soll zufrieden sein und die Oligarchen reich bleiben."
 SOV_semi_criminal_government: "Halbkriminelle Regierung"
 SOV_semi_criminal_government_desc: "Oligarchen haben seit Langem Verbindungen zur organisierten Kriminalität. Warum dagegen kämpfen? Wir werden dieses Verhältnis formalisieren und sie in die Regierung holen."
 SOV_end_lawsuits_against_oligarchs: "Klagen gegen Oligarchen beenden"
 SOV_end_lawsuits_against_oligarchs_desc: "Putin führte einen juristischen Krieg gegen die Oligarchen, um seine Herrschaft zu sichern. Wir werden diesem Unrecht ein Ende setzen und die Würde unserer erfolgreichsten Bürger wiederherstellen."
 SOV_restore_semibankirshina: "Semibankirschtschina wiederherstellen"
 SOV_restore_semibankirshina_desc: "Die Semibankirschtschina – die sieben mächtigen Banker – ist zurück. Jetzt, da Putin beseitigt ist, stehen sie geeint da und sind bereit, Russlands Schicksal erneut zu bestimmen."
 SOV_back_to_the_west: "Zurück zum Westen"
 SOV_back_to_the_west_desc: "Die Feindseligkeit gegenüber dem Westen hat unsere Wirtschaft schwer geschädigt. Es ist Zeit, die überholte Logik des Kalten Krieges aufzugeben und neue Bündnisse für den Wohlstand zu schmieden."
 SOV_oligarchs_democracy: "Geblendet von ihren Versprechen"
 SOV_oligarchs_democracy_desc: "Der Wahlsieg pro-oligarchischer Kräfte schockierte viele. Geblendet von Versprechungen wählte das Volk dieselben Eliten, die das Land bereits unter Jelzin geplündert hatten."
 sov_oligarchs.1.t: "Regierungsumbildungen!"
 sov_oligarchs.1.d: "Die Oligarchen waren einst geschwächt, doch nicht mehr. Um ihre Unterstützung zu sichern, hat der Präsident ihnen beispiellosen Einfluss gewährt. Oligarchentreue Minister übernehmen die Macht – und leiten ein neues Zeitalter der Elitenherrschaft ein."
 sov_oligarchs.1.a: "Gott schütze Russland..."
 sov_oligarchs.2.t: "Gusinski kehrt nach Russland zurück!"
 sov_oligarchs.2.d: "Der russische Medienmagnat Wladimir Gusinski, einst von früheren Behörden ins Exil getrieben, ist zurückgekehrt. Die Zeiten haben sich geändert – und er wird willkommen geheißen."
 sov_oligarchs.2.a: "Willkommen zurück!"
 sov_oligarchs.3.t: "Beresowski kehrt nach Russland zurück!"
 sov_oligarchs.3.d: "Boris Beresowski – einer der reichsten und umstrittensten Oligarchen Russlands – ist zurückgekehrt. Es fühlt sich an wie in den 1990ern."
 sov_oligarchs.3.a: "Wie in den 90ern!"
 sov_oligarchs.4.t: "Semibankirschtschina übernimmt die Macht in Russland!"
 sov_oligarchs.4.d: "Der Einfluss der Oligarchen hat seinen Höhepunkt erreicht. Die sieben Tycoons der Jelzin-Ära haben alle Rivalen zerschlagen und die Macht an sich gerissen. Die Zukunft der russischen Regierung liegt nun in ihren Händen – doch die Frage bleibt: Wer wird führen?"
 sov_oligarchs.4.a: "Direkte Herrschaft des Rates!"
 sov_oligarchs.4.b: "Wir werden Neuwahlen mit einem anderen Kandidaten abhalten."
 sov_oligarchs.4.c: "Wir könnten den derzeitigen Präsidenten manipulieren."
 sov_oligarchs.5.t: "Manipulierte Wahlen!"
 sov_oligarchs.5.d: "Um unsere Herrschaft zu legitimieren, müssen wir neue Wahlen inszenieren und den Sieg der Partei Liberales Russland sicherstellen. Das einzige Dilemma besteht in der Wahl des Präsidentschaftskandidaten: eine Marionette oder einer von uns?"
 sov_oligarchs.5.a: "Newsorow ist unser Kandidat!"
 sov_oligarchs.5.b: "Boris Beresowski wird Präsident."
 sov_oligarchs.5.c: "Michail Chodorkowski wird Präsident."
