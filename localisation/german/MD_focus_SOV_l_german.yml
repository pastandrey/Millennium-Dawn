 SOV_buran_hangar: "Verbleibende Zeit, um Buran zu retten"
 SOV_buran_hangar_desc: "Zwischen dem schlechten Zustand des Hangars und der allgemeinen Verschlechterung des Shuttles ist unsere Zeit, Buran zu retten, begrenzt."
 SOV_begin_funding: "Ein neues vorübergehendes Zuhause für Buran"
 SOV_begin_funding_desc: "Bringt das Shuttle aus dem alternden Hangar heraus und stellt ein Team aus erfahrenen Ingenieuren zusammen."
 SOV_dissassemble_the_shuttle: "Erste Reparaturphase beginnen"
 SOV_dissassemble_the_shuttle_desc: "Beginnt die erste Phase der Reparaturen."
 SOV_build_hangar: "Bau eines neuen permanenten Hangars für Buran"
 SOV_build_hangar_desc: "Wir werden einen speziellen Hangar für Buran bauen."
 SOV_make_repairs_at_temp_hangar: "Endgültige Reparaturen im provisorischen Hangar durchführen"
 SOV_make_repairs_at_temp_hangar_desc: "Der nächste Schritt ist die Reparatur der Shuttle-Struktur und der sorgfältige Wiederzusammenbau, um seine ursprüngliche Integrität wiederherzustellen."
 SOV_announce_full_restoration: "Testflug durchführen und Shuttle in den neuen Hangar verlegen"
 SOV_announce_full_restoration_desc: "Dies ist der letzte notwendige Schritt, der letzte Vorstoß nach vorn. Eine Testbesatzung wurde in den vergangenen Monaten ausgebildet und das Shuttle ist bereit für seinen Testflug. Nach Abschluss wird es in seinen neuen permanenten Hangar verlegt und ist bereit für ein neues Kapitel."
