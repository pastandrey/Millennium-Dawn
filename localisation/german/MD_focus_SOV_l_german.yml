 russian_legacy: "£text_icon_sov_empire Russisches Erbe"
 russian_legacy_desc: "Seit Jahrhunderten geht Russland seinen eigenen einzigartigen Weg, oft isoliert und unter starker Herrschaft. Wandel kommt langsam, doch die Zeit für eine Veränderung könnte reif sein."
 SOV_idea_restalinization_desc: "Russland ist vom richtigen Weg abgekommen. Um unsere Stärke und Unabhängigkeit zurückzugewinnen, müssen wir zu den Methoden und der Vision Stalins zurückkehren."
 SOV_vk_durov_idea: "VKontakte"
 sov_economic.40.t: "Schicksal des sozialen Netzwerks Vkontakte"
 sov_economic.40.d: "Vkontakte begann als soziales Netzwerk für Universitäten, entwickelte sich jedoch zur größten Plattform Russlands. Nun müssen wir über seine Zukunft entscheiden, da sein Einfluss auf die Gesellschaft rasant wächst."
 sov_economic.40.a: "Lasst es unabhängig."
 sov_economic.40.b: "Bringt VK unter staatliche Kontrolle."
