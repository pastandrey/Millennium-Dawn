 Sov_warsaw_pact.1.t: "Die Wiederbelebung des Warschauer Pakts"
 Sov_warsaw_pact.1.d: "Unsere Bevölkerung hat nach all den Jahren der \"Besatzung\" durch den Westen erkannt, dass die Zeiten, in denen die UdSSR das brüderliche Polen verteidigte, stabil und geordnet waren. Das Schicksal gibt unserer Republik erneut die Möglichkeit, unter den Schutz Russlands zu treten."
 Sov_warsaw_pact.1.a: "Unterzeichnen wir einen neuen Vertrag!"
 Sov_warsaw_pact.2.t: "Die Wiederbelebung des Warschauer Pakts"
 Sov_warsaw_pact.2.d: "Etwas ist geschehen, womit niemand gerechnet hat. Aus den Ruinen der kommunistischen Vergangenheit ist der Warschauer Pakt zurückgekehrt. Die kommunistische Revolution in Polen und das dort etablierte prorussische Sowjetregime haben die Wiederbelebung dieses Militärbündnisses angekündigt. Die Welt steht erneut am Rande eines Kalten Krieges."
 Sov_warsaw_pact.2.a: "Möge Gott uns helfen"
 Sov_warsaw_pact.3.t: "Polen gehört wieder uns"
 Sov_warsaw_pact.3.d: "In Polen hat ein prokommunistischer Putsch stattgefunden, und eine uns loyale Regierung ist an die Macht gekommen. Wir haben bereits die Gründung eines neuen Warschauer Pakts zwischen uns und Polen angekündigt – nun bleibt nur noch die formale Legitimierung."
 Sov_warsaw_pact.3.a: "Ruhm der UdSSR"
 Sov_warsaw_pact.4.t: "Erweiterung des Warschauer Pakts"
 Sov_warsaw_pact.4.d: "Seit der jüngsten Wiederherstellung des Warschauer Pakts stellen sich viele Politiker und Experten die Frage: Wann wird die nächste Erweiterung erfolgen? Heute feiert der Warschauer Pakt eine neue Ausdehnung seines Bündnisses. Ein neuer Kalter Krieg hat begonnen, und der Einfluss der USA in Osteuropa beginnt zu bröckeln."
 Sov_warsaw_pact.4.a: "Die Lage wird immer angespannter..."
 Sov_warsaw_pact.5.t: "Ein neuer Verbündeter und neue Möglichkeiten"
 Sov_warsaw_pact.5.d: "Erneut hat unsere Diplomatie ihre Wirksamkeit bewiesen – im Gegensatz zur westlichen Diplomatie. Neue Verbündete eröffnen neue Möglichkeiten für unsere militärische Präsenz in Europa und für diplomatischen Druck auf NATO-Staaten. Wir müssen unsere Politik fortsetzen, um unseren Status als Supermacht dauerhaft zu sichern."
 Sov_warsaw_pact.5.a: "Ruhm der Sowjetunion!"
 Sov_warsaw_pact.6.t: "Beitritt zu einem Bündnis"
 Sov_warsaw_pact.6.d: "Unser Volk hat erkannt, dass der Westen uns täuscht. Seine Methoden zerstören unsere Unabhängigkeit, unsere Kultur und sogar unsere Bevölkerung. Wir müssen dem ein Ende setzen, indem wir unter den Schutz unseres langjährigen Verbündeten, der UdSSR, treten. Gemeinsam können wir diese westliche Seuche besiegen."
 Sov_warsaw_pact.6.a: "Unterzeichnen wir einen neuen Vertrag!"
 sov_warsaw_pact.9.t: "Kommunistischer Aufstand in Ostdeutschland"
 sov_warsaw_pact.9.d: "Die Situation ist außer Kontrolle geraten. Unsere Bemühungen, Stabilität im Land zu gewährleisten, waren vergeblich. In Ostdeutschland ist ein Aufstand ausgebrochen, um eine unabhängige DDR zu schaffen. Mit militärischer Unterstützung sowie heimlicher finanzieller und militärischer Hilfe der UdSSR wurden alle administrativen und militärischen Gebäude im Osten des Landes besetzt. Berlin wurde vom Rest des Landes abgeschnitten. Wegen der Gefahr eines Konflikts mit der Sowjetunion sind wir gezwungen, nur begrenzte Angriffe gegen das Gebiet der neu gegründeten DDR durchzuführen. Alternativ könnten wir jedoch eine direkte Intervention im Interessengebiet der UdSSR starten – was jedoch zum Dritten Weltkrieg führen könnte. Was sollen wir tun?"
 sov_warsaw_pact.9.a: "Wir zerquetschen sie wie Wanzen!"
 german_proxy_war.1.t: "Erfolgreiche Operation!"
 german_proxy_war.1.d: "Wir haben erfolgreich eine Antiterroroperation durchgeführt! Die Reste der feindlichen Armee sind geflohen."
 german_proxy_war.1.a: "Die Welt hält die deutsche Armee zu Recht für eine der stärksten der Welt"
 german_proxy_war.2.t: "Scheitern der Antiterroroperation"
 german_proxy_war.2.d: "Es ist uns nicht gelungen, die feindliche Armee zurückzudrängen, und wir wurden besiegt. Da die Operation zu kostspielig geworden ist, sind wir gezwungen, der Gegenseite Zugeständnisse zu machen."
 german_proxy_war.2.a: "Unsere Armee muss wohl doch reformiert werden."
