 SOV_we_can_invest_TT: "§HWir können in Kasachstan investieren, um die Infrastruktur zu verbessern§!"
 russia.200.t: "Gute Nachrichten aus Baikonur"
 russia.200.d: "Das Buran-Reparaturteam hat uns heute bestätigt, dass das Shuttle erfolgreich aus dem alternden Hangar gebracht wurde, womit der Beginn seiner Demontage markiert ist. Ein Team erfahrener Ingenieure wurde zusammengestellt, um den Abbau der Struktur zu überwachen."
 russia.200.a: "Wie geplant"
 russia.300.t: "Buran-Gelder veruntreut"
 russia.300.d: "Mittel, die für das Buran-Restaurierungsprogramm vorgesehen waren, wurden Berichten zufolge veruntreut, wodurch dem Projekt entscheidende Ressourcen entzogen wurden. Die Bemühungen, den Schuldigen zu ermitteln, waren bisher erfolglos. Verschwundene Finanzunterlagen und Korruption auf höchster Ebene haben die Untersuchung behindert."
 russia.300.a: "Verdammt!"
 russia.301.t: "Die internationale Gemeinschaft ist voller Bewunderung"
 russia.301.d: "Dank unserer drakonischen, aber erfolgreichen Bemühungen bei der Reparatur des Buran-Shuttles ist die internationale Gemeinschaft von unseren Leistungen beeindruckt. Wir können diesen Moment weltweiter Anerkennung nutzen und seine Wirkung maximieren, solange das Rampenlicht auf uns gerichtet bleibt."
 russia.301.a: "Die Ingenieure würdigen!"
 russia.301.b: "[SOV.GetLeader] würdigen!"
 russia.302.t: "Buran-Shuttle repariert"
 russia.302.d: "Nach Monaten sorgfältiger Arbeit wurde das Buran-Shuttle vollständig restauriert und steht bereit für ein neues Kapitel in der Raumfahrt. Jede Schraube, jedes Bauteil wurde doppelt überprüft, und ein erfolgreicher Testflug hat seine Einsatzbereitschaft bewiesen. Nun ist es für zukünftige Missionen vorbereitet – ein triumphaler Moment für Russland. Die Wiederbelebung eines legendären Raumfahrzeugs, das einst als verloren galt."
 russia.302.a: "Ein Schritt vorwärts für die Raumfahrt!"
 russia.3022.t: "Buran-Shuttle von Russland repariert"
 russia.3022.d: "Nach Monaten sorgfältiger Arbeit wurde das Buran-Shuttle vollständig restauriert und steht bereit für ein neues Kapitel in der Raumfahrt. Jede Schraube, jedes Bauteil wurde doppelt überprüft, und ein erfolgreicher Testflug hat seine Einsatzbereitschaft bewiesen. Nun ist es für zukünftige Missionen vorbereitet – ein triumphaler Moment für Russland. Die Wiederbelebung eines legendären Raumfahrzeugs, das einst als verloren galt."
 russia.3022.a: "Ein Schritt vorwärts für die Raumfahrt!"
 russia.303.t: "Buran während der Reparatur bei einem Hangarbrand zerstört"
 russia.303.d: "Am 16. Juni 2003 schlug das Unglück zu, als ein Feuer den provisorischen Hangar erfasste, in dem das Buran-Shuttle repariert wurde, und es vollständig zerstörte. Nach all den Bemühungen, es zu restaurieren und für zukünftige Missionen vorzubereiten, wurde das Vermächtnis des Shuttles zu Asche. Der Verlust war verheerend – ein tragisches Ende dessen, was eine triumphale Rückkehr des Shuttles in den Himmel hätte werden können."
 russia.303.a: "Träume, die niemals Wirklichkeit werden"
 russia.3033.t: "Buran während der Reparatur bei einem Hangarbrand zerstört"
 russia.3033.d: "Am 16. Juni 2003 schlug das Unglück zu, als ein Feuer den provisorischen Hangar erfasste, in dem das Buran-Shuttle repariert wurde, und es vollständig zerstörte. Nach all den Bemühungen, es zu restaurieren und für zukünftige Missionen vorzubereiten, wurde das Vermächtnis des Shuttles zu Asche. Der Verlust war verheerend – ein tragisches Ende dessen, was eine triumphale Rückkehr des Shuttles in den Himmel hätte werden können."
 russia.3033.a: "Träume, die niemals Wirklichkeit werden"
 russia.304.t: "Buran bei einem Hangareinsturz zerstört"
 russia.304.d: "Am 12. Mai 2002 ereignete sich eine Tragödie, als das Buran-Shuttle bei einem verheerenden Einsturz des Hangars verloren ging, seine Geschichte unter einem Trümmerhaufen endete und mehrere Todesopfer forderte. Dieses einst stolze Symbol der Raumfahrt wurde zu Ruinen und sollte nie wieder fliegen. Es war ein herzzerreißendes Ende für ein Raumfahrzeug, das so viel Hoffnung und Ehrgeiz verkörperte und nun für immer außer Reichweite ist."
 russia.304.a: "Träume, die niemals Wirklichkeit werden"
