 russia.118.t: "Das Schicksal des Kreuzers „Baku“"
 russia.118.d: "Das Schicksal des Kreuzers Baku ist seit Jahren ungewiss. Seit den 90er Jahren hat Indien Interesse an einem Kauf bekundet. Nun müssen wir entscheiden, ob wir den Kreuzer behalten und für unsere Marine modernisieren oder ihn an Indien verkaufen, um Geldmittel zu gewinnen."
 russia.118.a: "Modernisieren"
 russia.118.b: "Verkaufen"
 SOV_slavic_wagner_TT: "PMC Wagner wird geschaffen"
 russia_news.51.t: "Der Tod von Alexander Dugin"
 russia_news.51.d: "Alexander Dugin, ein umstrittener russischer Ideologe und Begründer der Eurasismus-Bewegung, ist zu Hause an Tollwut gestorben, die er sich angeblich von seiner Hausratte Logos zugezogen hatte. Die Behörden rätseln, warum er keine medizinische Hilfe in Anspruch nahm. Aufgrund der verdächtigen Umstände wird der Fall als möglicher Mord untersucht."
 russia_news.51.o1: "Eine große Tragödie!"
 russia_news.51.o2: "Ein grausamer Tod"
 SOV_promotion_of_unite_with_russia_bulgaria: "§YRussische§! Interessen in §Y[BUL.GetNameWithFlag]§! fördern"
 russia_governorate.24.t: "Das Problem von Arzach"
 russia_governorate.24.d: "Die Republik Arzach steht angesichts der aktuellen Umstände an einem Scheideweg, wer sie regieren wird. Jetzt, da Armenien und Russland enger denn je verbunden sind, steht die Zukunft Arzachs auf dem Spiel."
 russia_governorate.24.o1: "Russland soll die Kontrolle übernehmen"
 russia_governorate.24.o2: "Arzach ist unseres."
 sov_economic.43.t: "[From.GetName] und MTS"
 sov_economic.43.d: "[From.GetName] und unser Unternehmen MTS haben ein neues Abkommen unterzeichnet, das uns Zugang zu ihrem Markt gewährt. Diese Partnerschaft dürfte die Kapitalisierung unseres Unternehmens deutlich steigern."
 sov_economic.43.a: "Ausgezeichnet"
 sov_economic.44.t: "[From.GetName] und Gazprom"
 sov_economic.44.d: "[From.GetName] und Gazprom haben ein Abkommen abgeschlossen, das uns Zugang zu ihrem Markt eröffnet. Dieses Geschäft dürfte unsere Kapitalisierung und Marktpräsenz stärken."
 sov_economic.44.a: "Ausgezeichnet"
 sov_economic.45.t: "[From.GetName] und VTB"
 sov_economic.45.d: "[From.GetName] und VTB haben ein Abkommen unterzeichnet, das uns über ihr Netzwerk Marktzugang verschafft, was sich positiv auf unsere Kapitalisierung auswirken dürfte."
 sov_economic.45.a: "Ausgezeichnet"
 sov_economic.46.t: "[From.GetName] und Rosneft"
 sov_economic.46.d: "[From.GetName] und Rosneft haben ein Abkommen geschlossen, das uns Zugang zu ihrem Markt gewährt und sich voraussichtlich positiv auf unsere Kapitalisierung auswirken wird."
 sov_economic.46.a: "Ausgezeichnet"
 sov_economic.47.t: "[From.GetName] und Alrosa"
 sov_economic.47.d: "[From.GetName] und Alrosa haben ein Abkommen unterzeichnet, das uns über dieses Unternehmen Zugang zu ihrem Markt verschafft. Es wird erwartet, dass dieses Geschäft unsere Kapitalisierung verbessert."
 sov_economic.47.a: "Ausgezeichnet"
 SOV_georgia_instructors: "GRU nach §Y[GEO.GetNameWithFlag]§! entsenden"
 SOV_wagner_georgia_instructors: "PMC Wagner nach §Y[GEO.GetNameWithFlag]§! entsenden"
 SOV_allied_nrk_2: "Bündnis mit Nordkorea"
 SOV_allied_nrk_2_desc: "Wir planen, unsere Bündnisse nach Osten auszuweiten, beginnend mit Nordkorea – einer Nation, deren Volk unsere frühere Unterstützung zu schätzen weiß und deren fortbestehende Existenz sie zu großen Teilen uns verdankt."
 SOV_warsaw_finland: "Rotes Finnland"
 SOV_warsaw_finland_desc: "Während des Russischen Bürgerkriegs wurde versucht, in Finnland eine sozialistische Regierung zu errichten, um verlorenes Gebiet zurückzugewinnen. Nun sind wir bereit, diese Mission zu vollenden, indem wir Finnland in den Warschauer Pakt eingliedern."
 SOV_mongolia_question: "Die mongolische Frage"
 SOV_mongolia_question_desc: "Die Mongolei hat auf unseren Wunsch hin historisch Neutralität bewahrt, um Konflikte mit China zu vermeiden und freundschaftliche Beziehungen aufrechtzuerhalten. Nun sind wir jedoch bereit, diese Bedenken beiseitezuschieben und eine vollständige Union mit der Mongolei vorzuschlagen."
 SOV_vietnam_question: "Die vietnamesische Frage"
 SOV_vietnam_question_desc: "Vietnam ist seit Langem ein verlässlicher Verbündeter und Partner. Die Zeit ist gekommen, unsere Zusammenarbeit zu vertiefen und diese Partnerschaft auf eine neue Ebene zu heben."
 SOV_spain_influ: "Das Ergebnis des Bürgerkriegs überprüfen"
 SOV_spain_influ_desc: "Die sozialistischen Kräfte wurden im Spanischen Bürgerkrieg besiegt. Wir sind bereit, den spanischen Kommunisten dabei zu helfen, sich erneut zu erheben, um die Diktatur des Proletariats in Spanien wiederherzustellen."
 SOV_avenge_afgan: "Zweite Intervention in Afghanistan"
 SOV_avenge_afgan_desc: "Unser erster Versuch, Afghanistan unter Kontrolle zu bringen, endete in einem Fehlschlag. Nun sind wir bereit, diese Niederlage zu rächen und unsere Ziele auf dem sogenannten „Friedhof der Imperien“ endlich zu erreichen."
 SOV_iraq_influ_desc: "Obwohl der Irak geografisch weit entfernt ist und uns nie eng verbunden war, sind wir bereit, seine Bemühungen zum Sturz des derzeit herrschenden antisowjetischen Regimes zu unterstützen."
 SOV_warsaw_greece: "Den Bürgerkrieg in Griechenland wiederholen"
 SOV_warsaw_greece_desc: "Der griechische Bürgerkrieg von 1946 bis 1949 endete mit einer Niederlage der kommunistischen Kräfte. Nun sind wir bereit zurückzukehren und Rache zu nehmen, um unseren Einfluss zurückzugewinnen."
 SOV_influence_on_spain: "Zusammenarbeit mit den spanischen Kommunisten"
 SOV_iraq_influ: "Roter Irak"
 SOV_influence_on_greece: "Zusammenarbeit mit den griechischen Kommunisten"
 SOV_warsaw_perevorot_greece: "Kommunistischer Putsch in §Y[GRE.GetNameWithFlag]§!"
 SOV_influence_on_vietnam: "Zusammenarbeit mit den vietnamesischen Kommunisten"
 SOV_warsaw_perevorot_vietnam: "Kommunistischer Putsch in §Y[VIE.GetNameWithFlag]§!"
 SOV_influence_on_mongolia: "Zusammenarbeit mit den mongolischen Kommunisten"
 SOV_warsaw_perevorot_mongolia: "Kommunistischer Putsch in §Y[MON.GetNameWithFlag]§!"
 SOV_influence_on_finland: "Zusammenarbeit mit den finnischen Kommunisten"
 SOV_warsaw_perevorot_finland: "Kommunistischer Putsch in §Y[FIN.GetNameWithFlag]§!"
 SOV_warsaw_perevorot_poland: "Kommunistischer Putsch in §Y[POL.GetNameWithFlag]§!"
 SOV_warsaw_perevorot_bulgaria: "Kommunistischer Putsch in §Y[BUL.GetNameWithFlag]§!"
 SOV_warsaw_perevorot_romania: "Kommunistischer Putsch in §Y[ROM.GetNameWithFlag]§!"
 SOV_warsaw_perevorot_hungary: "Kommunistischer Putsch in §Y[HUN.GetNameWithFlag]§!"
 SOV_warsaw_perevorot_czr: "Kommunistischer Putsch in §Y[CZE.GetNameWithFlag]§! und §Y[SLO.GetNameWithFlag]§!"
 SOV_warsaw_perevorot_albania: "Kommunistischer Putsch in §Y[ALB.GetNameWithFlag]§!"
 SOV_warsaw_perevorot_germany: "Einen Aufstand der Ostdeutschen starten"
 SOV_red_army: "Neue Rote Armee"
 SOV_red_army_desc: "Die Wiedergeburt der Roten Armee symbolisiert eine Rückkehr zu Stärke und Disziplin – eine Streitmacht, die den Bedrohungen der modernen Welt gewachsen ist."
 SOV_pogran: "Alte Militärprojekte wiederbeleben"
 SOV_pogran_desc: "Wir werden mehrere längst vergessene Militärinitiativen wieder aufnehmen, um unsere Verteidigungsfähigkeit zu stärken."
 SOV_til_vs: "Das Hinterland der Streitkräfte wiederbeleben"
 SOV_til_vs_desc: "Unsere Logistik- und Unterstützungseinheiten sind das Rückgrat des Militärs. Ihre Wiederbelebung wird dauerhafte Operationen ermöglichen."
 SOV_kafedra_return: "Militärische Lehrstühle wiederherstellen"
 SOV_kafedra_return_desc: "Militärische Lehrstühle an Bildungseinrichtungen werden wieder eingeführt, um zukünftige Offiziere und Spezialisten auszubilden."
 SOV_fleet: "Glorreiche sowjetische Marine"
 SOV_fleet_desc: "Wir wollen die stolze Tradition und Stärke der sowjetischen Marine wiederherstellen und unsere Macht über die Meere projizieren."
 SOV_rocketi: "Strategische Raketentruppen stärken"
 SOV_rocketi_desc: "Unsere Strategischen Raketentruppen sind der Grundpfeiler der Abschreckung – ihre Stärkung ist entscheidend für unsere nationale Sicherheit."
 SOV_aviatcia: "Luftwaffe stärken"
 SOV_aviatcia_desc: "Wir werden die Fähigkeiten unserer Luftwaffe verbessern und die Luftherrschaft sichern."
 SOV_academy: "Militärschulen wiederherstellen"
 SOV_academy_desc: "Militärakademien werden revitalisiert, um die nächste Generation von Kommandeuren und Spezialisten auszubilden."
 SOV_kirov: "Die Armee ist der Motor des Fortschritts"
 SOV_kirov_desc: "Eine starke Armee treibt nationalen Fortschritt und Stabilität voran. Wir werden sicherstellen, dass unsere Streitkräfte diese Rolle erfüllen."
