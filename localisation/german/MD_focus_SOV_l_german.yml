 SOV_united_group_troops_TT: "Einheiten des £text_icon_sov_gru §YGRU§! und der £text_icon_sov_internal_troops §YInneren Truppen§! nehmen ebenfalls am §RTschetschenien-Feldzug§! teil."
 SOV_safe_russia: "Sicherheit des Landes"
 SOV_safe_russia_desc: "Unser Land ist riesig, und um es effektiv zu schützen, benötigen wir umfangreiche Streitkräfte sowie spezialisierte Einheiten und Behörden, die rund um die Uhr arbeiten, um die Sicherheit der Nation zu gewährleisten."
 SOV_vimpel_omon_exp: "Vympel-Gruppe"
 SOV_vimpel_omon_exp_desc: "Die Vympel-Gruppe oder Direktion V ist eine Speznas-Einheit des FSB, oft als KGB-Direktion V bezeichnet. Sie ist die Schwestereinheit der Alpha-Gruppe und spezialisiert sich auf strategische Operationen unter FSB-Kommando."
 SOV_second_slujba: "Zweiter Dienst"
 SOV_second_slujba_desc: "Auch bekannt als Dienst zum Schutz der verfassungsmäßigen Ordnung und zur Bekämpfung des Terrorismus. Der Zweite Dienst bekämpft Terrorismus, Extremismus und interne politische Bedrohungen, schützt die verfassungsmäßige Ordnung Russlands und betreibt Gegenspionage in sensiblen gesellschaftlichen und kulturellen Bereichen."
 SOV_inner_army: "Innere Truppen"
 SOV_inner_army_desc: "Die Inneren Truppen des Innenministeriums sind eine paramilitärische Kraft, die für die Kontrolle von Menschenmengen, den Schutz wichtiger Einrichtungen und die Unterstützung von Polizeieinsätzen zuständig ist. Sie spielten eine wichtige Rolle in innerstaatlichen Konflikten wie den Tschetschenienkriegen."
 SOV_omon: "OMON"
 SOV_omon_desc: "OMON ist ein System von Spezialeinheiten der Polizei innerhalb Russlands, das ursprünglich 1988 gegründet wurde. Bekannt für Aufstandsbekämpfung und paramilitärische Polizeiarbeit, existiert OMON auch in mehreren postsowjetischen Staaten mit ähnlichen Aufgaben."
 SOV_upravlenie_k: "Abteilung K"
 SOV_upravlenie_k_desc: "Abteilung K des Innenministeriums ist auf die Bekämpfung von Cyberkriminalität und illegalem Handel mit elektronischen Geräten und Überwachungstechnik spezialisiert."
 SOV_centr_t: "Zentrum zur Bekämpfung von Extremismus"
 SOV_centr_t_desc: "Auch bekannt als Zentrum E, ist diese Einheit des Innenministeriums für die Aufdeckung und Unterdrückung extremistischer Aktivitäten in ganz Russland zuständig."
 SOV_gusb: "Hauptdirektion für Innere Sicherheit"
 SOV_gusb_desc: "Die Hauptdirektion für Innere Sicherheit ist eine unabhängige Polizeieinheit innerhalb des Innenministeriums, die Korruption und interne Straftaten verhindert und die Integrität der Strafverfolgungsbehörden sicherstellt."
 SOV_sobr: "SOBR"
 SOV_sobr_desc: "SOBR ist eine Speznas-Schnelleinsatztruppe mit militärischer Ausbildung und Ausrüstung. Gemeinsam mit OMON fungiert sie als paramilitärische Polizeieinheit für Hochrisikoeinsätze."
 SOV_anti_corrupt_upravlenie_desc: "Diese Direktion führt die Bemühungen des Innenministeriums zur Bekämpfung von Wirtschaftskriminalität und Korruption an und setzt staatliche Politik sowie rechtliche Maßnahmen zum Schutz der wirtschaftlichen Sicherheit Russlands um."
 SOV_gru_desc: "Die GRU ist Russlands militärischer Auslandsgeheimdienst unter dem Generalstab. Sie führt militärische Aufklärung sowie Speznas-Einheiten und ist bekannt für komplexe und risikoreiche Operationen weltweit unter der Aufsicht des Verteidigungsministeriums."
 SOV_gru_spetznaz: "Speznas GRU"
 SOV_gru_spetznaz_desc: "Die Speznas-Einheiten der GRU sind Spezialkräfte, die für verdeckte militärische Operationen und Geheimdienstmissionen im Ausland eingesetzt werden."
 SOV_zaslon: "Zaslon"
 SOV_zaslon_desc: "Zaslon ist eine streng geheime Spezialeinheit des SVR, die 1997 gegründet wurde. Sie unterstützt Auslandsgeheimdienstoperationen militärisch, schützt russische diplomatische Missionen und sichert die Führung des SVR bei Hochrisikoeinsätzen."
 SOV_outer: "Auslandsaufklärung"
 SOV_outer_desc: "Unsere nationale Sicherheit hängt davon ab, wie gut wir unsere Gegner beobachten und schwächen. Wir müssen wachsam bleiben gegenüber jedem Feind, der versucht, uns zu untergraben."
 SOV_fsb_idea: "Erhöhte Finanzierung des FSB"
 SOV_fsb_pogranci: "FSB-Grenzdienst"
 SOV_alpha_idea: "Spezialeinheit Alpha"
 SOV_alpha_idea_desc: "Spezialeinheit des Zentrums für Spezialoperationen des Föderalen Sicherheitsdienstes der Russischen Föderation. Die Hauptaufgaben der Abteilung A bestehen in der Durchführung spezieller Sicherheitsoperationen zur Verhinderung terroristischer Anschläge, zur Suche, Neutralisierung oder Eliminierung von Terroristen, zur Befreiung von Geiseln usw. Darüber hinaus sind die Kämpfer der Alpha-Gruppe auch an weiteren besonders komplexen Operationen des FSB Russlands beteiligt und operieren zudem in „Hotspots“."
