l_german:
 preah_vihear_decisions_category: "Grenzkonflikt um Preah Vihear"
 preah_vihear_dispute: "Konflikt um den Tempel von Preah Vihear"
 SIA_escalate_preah_vihear_tensions: "Grenzspannungen verschärfen"
 SIA_escalate_preah_vihear_tensions_desc: "Nationalistische Proteste gegen die kambodschanischen Ansprüche auf den Tempel von Preah Vihear nehmen weiter zu. Wir können diese Dynamik nutzen, um den Druck auf Kambodscha in der umstrittenen Grenzregion zu erhöhen."
 SIA_attack_preah_vihear: "Grenzüberschreitung einleiten"
 SIA_attack_preah_vihear_desc: "Entsenden Sie Truppen, um das umstrittene Gebiet rund um den Tempel von Preah Vihear zu sichern. Dies wird eine bewaffnete Reaktion provozieren, könnte aber unsere Präsenz in der Region festigen."
 SIA_request_asean_mediation: "ASEAN-Vermittlung beantragen"
 SIA_request_asean_mediation_desc: "Bitten Sie die ASEAN, im Grenzkonflikt mit Kambodscha zu vermitteln. Dieser diplomatische Ansatz könnte helfen, die Spannungen zu entschärfen und eine friedliche Lösung zu finden."
 SIA_accept_icj_ruling: "IGH-Urteil akzeptieren"
 SIA_accept_icj_ruling_desc: "Akzeptieren Sie das Urteil des Internationalen Gerichtshofs im Konflikt um den Tempel von Preah Vihear. Dies wird den Konflikt beenden, könnte jedoch als diplomatische Niederlage gewertet werden."
 SIA_reject_icj_ruling: "IGH-Urteil zurückweisen"
 SIA_reject_icj_ruling_desc: "Weisen Sie das Urteil des IGH zurück und halten Sie weiterhin an unseren Ansprüchen auf das umstrittene Gebiet fest. Dies wird die internationalen Spannungen verschärfen, zeigt jedoch unsere Entschlossenheit."
 CBD_protest_thai_actions: "Diplomatischen Protest einlegen"
 CBD_protest_thai_actions_desc: "Legen Sie formell Protest gegen thailändische Provokationen in der Grenzregion ein. Dies könnte helfen, internationale Spannungen zu verringern und Sympathie für unsere Position zu gewinnen."
 CBD_attack_border_region: "Grenzregion zum Gegenangriff angreifen"
 CBD_attack_border_region_desc: "Starten Sie einen Vergeltungsschlag gegen thailändische Truppen im umstrittenen Grenzgebiet. Wir müssen unsere Souveränität und den Tempelkomplex verteidigen."
 CBD_request_asean_mediation: "ASEAN-Vermittlung beantragen"
 CBD_request_asean_mediation_desc: "Bitten Sie die ASEAN, im Grenzkonflikt mit Thailand zu vermitteln. Eine regionale diplomatische Lösung könnte helfen, unsere Ansprüche zu schützen."
 CBD_appeal_to_icj: "Den IGH anrufen"
 CBD_appeal_to_icj_desc: "Reichen Sie beim Internationalen Gerichtshof Klage ein, um Kambodschas Souveränität über den Tempel von Preah Vihear und das umliegende Gebiet zu bekräftigen."
 preah_vihear.100.t: "UNESCO erklärt Preah Vihear zum Weltkulturerbe"
 preah_vihear.100.d: "Die Organisation der Vereinten Nationen für Bildung, Wissenschaft und Kultur hat den Tempel von Preah Vihear offiziell zum Weltkulturerbe erklärt und ihn Kambodscha zugeschrieben. In ganz Thailand sind nationalistische Proteste ausgebrochen, bei denen Demonstranten militärisches Eingreifen fordern, um zu schützen, was sie als thailändisches Territorium betrachten. Die Lage an der Grenze verschlechtert sich rasch."
 preah_vihear.100.a: "Das ist ein Skandal! Mobilisiert unsere Streitkräfte!"
 preah_vihear.100.b: "Wir sollten die internationale Entscheidung respektieren"
 preah_vihear.101.t: "UNESCO erkennt Preah Vihear an"
 preah_vihear.101.d: "Die UNESCO hat den antiken Tempel von Preah Vihear offiziell unter kambodschanischer Souveränität zum Weltkulturerbe erklärt. Dies ist ein bedeutender diplomatischer Sieg, der das IGH-Urteil von 1962 bekräftigt. Nationalistische Proteste in Thailand könnten jedoch zu steigenden Spannungen an unserer Grenze führen."
 preah_vihear.101.a: "Ein großer Tag für Kambodscha!"
 preah_vihear.1.t: "Thailändische Provokationen an der Grenze"
 preah_vihear.1.d: "Thailand hat die Spannungen an unserer Grenze nahe dem Tempel von Preah Vihear verschärft. Nationalistische Protestierende in Bangkok fordern militärisches Handeln, und thailändische Truppen wurden näher an das umstrittene Gebiet verlegt."
 preah_vihear.1.a: "Wir müssen wachsam bleiben"
 preah_vihear.5.t: "Thailändische Streitkräfte greifen an!"
 preah_vihear.5.d: "Thailändische Streitkräfte haben einen Vorstoß in die umstrittene Grenzregion nahe dem Tempel von Preah Vihear begonnen. Unsere Truppen bekämpfen die Angreifer. Die internationale Gemeinschaft beobachtet die Lage, da sie zu einem offenen Konflikt zu eskalieren droht."
 preah_vihear.5.a: "Verteidigt unser Territorium!"
 preah_vihear.6.t: "Kambodschanischer Gegenangriff"
 preah_vihear.6.d: "Kambodschanische Streitkräfte haben einen Gegenangriff auf unsere Stellungen nahe dem Tempel von Preah Vihear eingeleitet. Artillerie- und Handfeuerwaffenbeschuss ist entlang der Grenze zu hören."
 preah_vihear.6.a: "Wir müssen unsere Stellungen halten"
 preah_vihear.10.t: "Sieg im Grenzzwischenfall"
 preah_vihear.10.d: "Unsere Streitkräfte haben ihre Ziele im Grenzzwischenfall bei Preah Vihear erreicht. Der Feind wurde zurückgedrängt, und wir haben unsere militärischen Fähigkeiten in der Region unter Beweis gestellt."
 preah_vihear.10.a: "Ausgezeichnete Nachrichten"
 preah_vihear.11.t: "Niederlage im Grenzzwischenfall"
 preah_vihear.11.d: "Unsere Streitkräfte wurden im Grenzzwischenfall bei Preah Vihear zurückgeschlagen. Das Gefecht endete erfolglos, und unsere Truppen zogen sich unter Verlusten auf ihre vorherigen Stellungen zurück."
 preah_vihear.11.a: "Ein bitterer Rückschlag"
 preah_vihear.12.t: "Grenzzwischenfall ohne Ergebnis"
 preah_vihear.12.d: "Der Grenzzwischenfall bei Preah Vihear ist in einem Patt geendet. Beide Seiten haben sich zurückgezogen, ohne ihre Ziele zu erreichen, wenngleich beide wertvolle Kampferfahrung sammeln konnten."
 preah_vihear.12.a: "Neu formieren und Lage neu bewerten"
 preah_vihear.13.t: "Sieg im Gegenangriff"
 preah_vihear.13.d: "Unser Gegenangriff hat die feindlichen Kräfte erfolgreich zurückgedrängt. Wir haben gezeigt, dass jede Aggression gegen unser Territorium auf entschlossenen Widerstand stoßen wird."
 preah_vihear.13.a: "Unsere Souveränität ist verteidigt"
 preah_vihear.14.t: "Gegenangriff zurückgeschlagen"
 preah_vihear.14.d: "Unser Gegenangriff wurde von feindlichen Kräften zurückgeschlagen. Trotz unserer besten Bemühungen gelang es uns nicht, sie aus ihren Stellungen im umstrittenen Gebiet zu vertreiben."
 preah_vihear.14.a: "Wir werden uns davon erholen"
 preah_vihear.20.t: "ASEAN-Vermittlungsvorschlag"
 preah_vihear.20.d: "Thailand hat ASEAN-Vermittlung im Grenzkonflikt um Preah Vihear beantragt. Indonesien schlägt als ASEAN-Vorsitz vor, Beobachter in die Grenzregion zu entsenden und Verhandlungen zwischen beiden Parteien zu ermöglichen."
 preah_vihear.20.a: "Vermittlung akzeptieren"
 preah_vihear.20.b: "Vermittlung ablehnen"
 preah_vihear.21.t: "ASEAN-Vermittlungsvorschlag"
 preah_vihear.21.d: "Kambodscha hat ASEAN-Vermittlung im Grenzkonflikt um Preah Vihear beantragt. Indonesien schlägt als ASEAN-Vorsitz vor, Beobachter in die Grenzregion zu entsenden und Verhandlungen zwischen beiden Parteien zu ermöglichen."
 preah_vihear.21.a: "Vermittlung akzeptieren"
 preah_vihear.21.b: "Vermittlung ablehnen"
 preah_vihear.22.t: "ASEAN-Vermittlung angenommen"
 preah_vihear.22.d: "Sowohl Thailand als auch Kambodscha haben einer ASEAN-Vermittlung zugestimmt. Indonesische Beobachter werden in die Grenzregion entsandt, und diplomatische Verhandlungen beginnen, um eine friedliche Lösung des Konflikts zu finden."
 preah_vihear.22.a: "Ein Weg zum Frieden"
 preah_vihear.23.t: "ASEAN-Vermittlung abgelehnt"
 preah_vihear.23.d: "Die andere Partei hat die ASEAN-Vermittlung im Konflikt um Preah Vihear abgelehnt. Die diplomatischen Bemühungen sind gescheitert, und die Spannungen an der Grenze bleiben hoch."
 preah_vihear.23.a: "Wir müssen uns auf eine anhaltende Konfrontation vorbereiten"
 preah_vihear.30.t: "Kambodscha ruft den IGH an"
 preah_vihear.30.d: "Kambodscha hat beim Internationalen Gerichtshof Klage im Konflikt um den Tempel von Preah Vihear eingereicht. Das Gericht wird Kambodschas Antrag auf vorläufige Maßnahmen prüfen und schließlich über die Frage der Souveränität entscheiden."
 preah_vihear.30.a: "Wir warten die Entscheidung des Gerichts ab"
 preah_vihear.31.t: "IGH urteilt zu unseren Gunsten"
 preah_vihear.31.d: "Der Internationale Gerichtshof hat Kambodschas Souveränität über den Tempel von Preah Vihear bekräftigt und beiden Seiten befohlen, militärisches Personal aus einer vorläufigen entmilitarisierten Zone rund um den Tempel abzuziehen."
 preah_vihear.31.a: "Das Völkerrecht steht auf unserer Seite"
 preah_vihear.32.t: "IGH urteilt gegen uns"
 preah_vihear.32.d: "Der Internationale Gerichtshof hat zugunsten von Kambodschas Souveränitätsansprüchen auf den Tempel von Preah Vihear entschieden. Das Gericht hat die Einrichtung einer entmilitarisierten Zone rund um das umstrittene Gebiet angeordnet."
 preah_vihear.32.a: "Dies ist ein ungerechtes Urteil"
 preah_vihear.35.t: "Thailand akzeptiert das IGH-Urteil"
 preah_vihear.35.d: "Thailand hat das IGH-Urteil im Konflikt um den Tempel von Preah Vihear akzeptiert. Thailändische Streitkräfte werden sich aus der entmilitarisierten Zone zurückziehen, womit die Grenzkrise faktisch beendet wird."
 preah_vihear.35.a: "Endlich Frieden"
 preah_vihear.36.t: "Thailand weist das IGH-Urteil zurück"
 preah_vihear.36.d: "Thailand hat das IGH-Urteil im Konflikt um den Tempel von Preah Vihear zurückgewiesen, es als ungerecht bezeichnet und sich geweigert, die Zuständigkeit des Gerichts anzuerkennen. Es wird erwartet, dass die Spannungen an der Grenze weiter zunehmen."
 preah_vihear.36.a: "Wir müssen uns auf einen anhaltenden Konflikt vorbereiten"
 preah_vihear_news.1.t: "Konflikt um Preah Vihear beigelegt"
 preah_vihear_news.1.d: "Der langjährige Grenzkonflikt zwischen Thailand und Kambodscha um den Tempel von Preah Vihear wurde beigelegt. Thailand hat das Urteil des Internationalen Gerichtshofs akzeptiert, das Kambodschas Souveränität über den Tempelkomplex bestätigt. Beide Nationen haben sich darauf geeinigt, ihre Streitkräfte aus dem Gebiet abzuziehen und normale diplomatische Beziehungen aufzunehmen."
 preah_vihear_news.1.o1: "Die regionale Stabilität ist wiederhergestellt"
 preah_vihear_news.2.t: "ASEAN vermittelt im Grenzkonflikt"
 preah_vihear_news.2.d: "Durch ASEAN-Vermittlung haben sich Thailand und Kambodscha darauf geeinigt, den Grenzkonflikt um den Tempel von Preah Vihear zu entschärfen. Indonesische Beobachter werden die Waffenruhe überwachen, während beide Nationen auf eine diplomatische Lösung hinarbeiten."
 preah_vihear_news.2.o1: "Die Diplomatie setzt sich durch"
 preah_vihear_news.3.t: "Grenzgefechte zwischen Thailand und Kambodscha brechen aus"
 preah_vihear_news.3.d: "Entlang der thailändisch-kambodschanischen Grenze nahe dem umstrittenen Tempel von Preah Vihear sind bewaffnete Gefechte ausgebrochen. Thailändische Streitkräfte haben militärische Operationen in dem Gebiet begonnen, und kambodschanische Truppen leisten Widerstand. Artilleriebeschuss und Gefechte mit Handfeuerwaffen wurden gemeldet. Der antike Tempelkomplex, ein UNESCO-Weltkulturerbe, gerät ins Kreuzfeuer, während beide Nationen ihren Territorialkonflikt weiter verschärfen."
 preah_vihear_news.3.o1: "Eine gefährliche Eskalation"