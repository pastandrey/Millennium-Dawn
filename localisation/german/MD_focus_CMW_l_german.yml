l_german:
 CMW_focus: "Fokusbaum des Commonwealth"
 Commonwealth_member_modifier: "Mitglied des Commonwealth"
 CMW_Aso_Rock_Declaration: "Aso-Rock-Erklärung"
 CMW_Aso_Rock_Declaration_desc: "Die Aso-Rock-Erklärung des Commonwealth war eine wichtige Erklärung, die während des Treffens der Regierungschefs des Commonwealth 2003 in Abuja, Nigeria, verabschiedet wurde. Diese Erklärung bekräftigte das Engagement des Commonwealth für die Förderung von Demokratie, guter Regierungsführung, Menschenrechten und nachhaltiger wirtschaftlicher Entwicklung. Sie betonte die Bedeutung von gegenseitigem Respekt, Inklusivität und Zusammenarbeit unter den Mitgliedstaaten, um globale Herausforderungen wirksam anzugehen."
 CMW_of_Learning: "Commonwealth des Lernens"
 CMW_of_Learning_desc: "Das Commonwealth of Learning, eine zwischenstaatliche Organisation des Commonwealth mit Sitz in Metro Vancouver, Kanada, arbeitet mit verschiedenen Partnern im Commonwealth und mit internationalen Entwicklungsagenturen zusammen, um offenes Lernen und Fernunterricht voranzubringen."
 CMW_New_Petroleum_Group: "Diskussionsgruppe der Erdölproduzenten"
 CMW_New_Petroleum_Group_desc: "Die Diskussionsgruppe der neuen Erdölproduzenten ist eine Plattform der Zusammenarbeit, auf der aufstrebende ölproduzierende Staaten Erkenntnisse und Strategien zur Entwicklung der Erdölindustrie austauschen."
 CMW_Hub_And_Spokes_Program: "Hub-and-Spokes-Handelsprogramm"
 CMW_Hub_And_Spokes_Program_desc: "Das Hub-and-Spokes-Handelsprogramm ist eine Initiative zur Förderung von Handelspartnerschaften zwischen mehreren Ländern, die sich insbesondere auf Kapazitätsaufbau und handelsbezogene Entwicklungsmaßnahmen konzentriert."
 CMW_Leaving_The_Organisation: "Austritt aus dem Commonwealth"
 CMW_Leaving_The_Organisation_desc: "Die Entscheidung, das Commonwealth zu verlassen, markiert einen bedeutenden Wandel in den internationalen Beziehungen. Dieser Schritt spiegelt eine strategische Neuausrichtung der Außenpolitik wider, bei der nationale Souveränität und Unabhängigkeit über traditionelle Bündnisse gestellt werden. Mit dem Austritt aus dem Commonwealth versucht [ROOT.GetNamewithFlag], neue Partnerschaften zu schmieden und einen eigenständigeren Weg in globalen Angelegenheiten zu verfolgen."
 CMW_Leaving_The_Organisation_tt: "[ROOT.GetNamewithFlag] entfernt §HMitglied des Commonwealth§! "
 CMW_Charter: "Charta des Commonwealth"
 CMW_Charter_desc: "Die Charta des Commonwealth ist ein Dokument, das die gemeinsamen Werte und Grundsätze des Commonwealth of Nations festhält – einer Gruppe von 54 Mitgliedstaaten, die sich zu Menschenrechten, nachhaltiger Entwicklung und Rechtsstaatlichkeit bekennen."
 CMW_Ministerial_Action_Group: "Ministerielle Aktionsgruppe"
 CMW_Ministerial_Action_Group_desc: "Die Ministerielle Aktionsgruppe des Commonwealth ist ein Gremium aus Ministern der Mitgliedstaaten des Commonwealth. Sie ist dafür verantwortlich, Fragen der Regierungsführung und politischen Entwicklungen in Mitgliedstaaten zu behandeln und Maßnahmen zu ergreifen, um die Werte des Commonwealth zu wahren."
 CMW_Kampala_Review: "Kampala-Überprüfung"
 CMW_Kampala_Review_desc: "Die Kampala-Überprüfung, die während des Treffens der Regierungschefs des Commonwealth 2007 stattfand, hatte zum Ziel, die Wirksamkeit des Commonwealth bei der Förderung von Demokratie, Entwicklung und guter Regierungsführung zu bewerten und zu verbessern. Diese Überprüfung konzentrierte sich darauf, die Fähigkeit der Organisation zu stärken, auf gegenwärtige globale Herausforderungen zu reagieren, und sicherzustellen, dass ihre Werte und Ziele für alle Mitgliedstaaten relevant und wirkungsvoll bleiben."
 CMW_Anti_Corruption_Centre: "Afrikanisches Anti-Korruptionszentrum des Commonwealth"
 CMW_Anti_Corruption_Centre_desc: "Das Afrikanische Anti-Korruptionszentrum des Commonwealth ist eine innerhalb des Commonwealth geschaffene Institution, die Korruption in afrikanischen Mitgliedstaaten bekämpfen und Transparenz sowie gute Regierungsführung fördern soll."
 CMW_Association_Legislative_Council: "Vereinigung der Legislativberater"
 CMW_Association_Legislative_Council_desc: "Die Commonwealth Association of Legislative Counsel ist eine Organisation, die Rechtsexperten zusammenbringt, die Parlamente und gesetzgebende Körperschaften in den Mitgliedstaaten des Commonwealth beraten und unterstützen. Sie fördert die Zusammenarbeit und den Austausch von Fachwissen unter Legislativberatern."
 CMW_Connectivity_Agenda: "Konnektivitätsagenda des Commonwealth"
 CMW_Connectivity_Agenda_desc: "Die Konnektivitätsagenda des Commonwealth ist eine Plattform, auf der Länder bewährte Verfahren und Erfahrungen in Handel und Investitionen austauschen und innerstaatliche Reformen vorantreiben können."
 CMW_Parliament: "Parlament des Commonwealth"
 CMW_Parliament_tt: "Alle Mitgliedstaaten des §HCommonwealth of Nations§! erlauben, dass in ihren Ländern Wahlen abgehalten werden"
 CMW_Legal_Education_Association: "Commonwealth-Vereinigung für juristische Bildung"
 CMW_Legal_Education_Association_desc: "Die Commonwealth Legal Education Association ist eine Organisation, die die juristische Bildung und Zusammenarbeit unter den Mitgliedstaaten des Commonwealth fördert."
 CMW_Fintech_Toolkit: "Fintech-Werkzeugkasten des Commonwealth"
 CMW_Fintech_Toolkit_desc: "Der Fintech-Werkzeugkasten des Commonwealth ist eine Ressource, die die Entwicklung und Innovation im Bereich Finanztechnologie in den Mitgliedstaaten des Commonwealth unterstützen soll."
 CMW_CFTC: "Commonwealth-Fonds für technische Zusammenarbeit"
 CMW_CFTC_desc: "Der Commonwealth Fund for Technical Co-operation (CFTC) ist ein Finanzierungsmechanismus, der Mitgliedstaaten des Commonwealth bei der Umsetzung technischer Kooperationsprojekte und Entwicklungsinitiativen unterstützt."
 CMW_School_Leaders: "Berufsstandards des Sekretariats"
 CMW_School_Leaders_desc: "Das Rahmenwerk für Berufsstandards des Sekretariats für Lehrkräfte und Schulleitungen ist ein Satz von Richtlinien und Maßstäben, der die berufliche Entwicklung und Leistung von Pädagogen und Schulleitungen innerhalb des Zuständigkeitsbereichs des Sekretariats verbessern soll."
 CMW_Trade_Association: "Handelsvereinigung des Commonwealth"
 CMW_Trade_Association_desc: "Die Handelsvereinigung des Commonwealth (CTA) zielt darauf ab, die wirtschaftliche Zusammenarbeit und die Handelsbeziehungen zwischen den Mitgliedstaaten zu stärken. Durch die Förderung eines stärker integrierten und kooperativen Handelsumfelds soll die CTA Zölle senken, Zollverfahren vereinfachen und nachhaltiges Wirtschaftswachstum fördern."
 CMW_Joint_Research_Initiative: "Gemeinsame Forschungsinitiative des Commonwealth"
 CMW_Joint_Research_Initiative_desc: "Die Gemeinsame Forschungsinitiative des Commonwealth ist ein kooperatives Vorhaben zur Förderung wissenschaftlicher und technologischer Innovation in den Mitgliedstaaten. Diese Initiative ermutigt zum Austausch von Wissen, Ressourcen und Fachkompetenz, um gemeinsame Herausforderungen wie Klimawandel, Gesundheitsversorgung und nachhaltige Entwicklung anzugehen. Durch die Förderung eines Netzwerks aus Forschungseinrichtungen und Experten will das Commonwealth Fortschritt und Innovation zum gemeinsamen Nutzen aller Mitgliedstaaten vorantreiben."
 CMW_Valuta: "Einführung des Commo"
 CMW_Valuta_desc: "Die Einführung des Commo markiert einen historischen Schritt hin zu wirtschaftlicher Integration innerhalb des Commonwealth of Nations. Diese gemeinsame Währung soll den Handel erleichtern, die finanzielle Stabilität stärken und die wirtschaftliche Zusammenarbeit unter den Mitgliedstaaten fördern. Mit der Einführung des Commo will das Commonwealth Wechselkursbarrieren abbauen, regionale Volkswirtschaften stabilisieren und eine stärker geeinte Wirtschaftsgemeinschaft fördern."
 CMW_Promoting_Democracy: "Ideologie fördern"
 CMW_Promoting_Democracy_desc: "Wir werden das Commonwealth an Großbritannien ausrichten, damit wir unsere diplomatische Macht in der Welt erhöhen."
 CMW_Counter_Insurgency_Training: "Tag der Aufstandsbekämpfung des Commonwealth"
 CMW_Counter_Insurgency_Training_desc: "Die Ausbildungsinitiative zur Aufstandsbekämpfung des Commonwealth soll die Fähigkeit der Mitgliedstaaten des Commonwealth stärken, aufständische Bedrohungen wirksam zu bekämpfen und einzudämmen. Sie stellt spezialisierte Ausbildung, Ressourcen und Fachwissen bereit, um Staaten bei der Bewältigung innerer Sicherheitsherausforderungen zu unterstützen und so Stabilität und Frieden zu fördern."
 CMW_Cyber_Declaration: "Cyber-Erklärungsprogramm des Commonwealth"
 CMW_Cyber_Declaration_desc: "Das Cyber-Erklärungsprogramm des Commonwealth ist eine Initiative, die sich mit Cybersicherheitsfragen befasst und die Zusammenarbeit der Mitgliedstaaten des Commonwealth fördern soll, um digitale Sicherheit zu stärken und vor Cyberbedrohungen zu schützen."
 CMW_Intelligence_Network: "Geheimdienstnetzwerk des Commonwealth"
 CMW_Intelligence_Network_desc: "Die Bildung des Geheimdienstnetzwerks des Commonwealth (CIN), angeführt von der neu gegründeten Geheimdienstagentur des Commonwealth (CIA), soll die Sicherheit und den Nachrichtenaustausch unter den Mitgliedstaaten stärken. Dieses Netzwerk erleichtert den Austausch kritischer Informationen, gemeinsame Gegenspionageoperationen und abgestimmte Reaktionen auf globale Bedrohungen. Durch die Vertiefung der geheimdienstlichen Zusammenarbeit will das Commonwealth seine Mitgliedstaaten vor Spionage, Terrorismus und Cyberbedrohungen schützen."
 CMW_Patrol_Boat_Program: "Patrouillenbootprogramm des Commonwealth"
 CMW_Patrol_Boat_Program_desc: "Das Patrouillenbootprogramm des Commonwealth ist ein strategisches Vorhaben, das die gemeinsame Entwicklung und den Einsatz maritimer Patrouillenboote durch Mitgliedstaaten des Commonwealth umfasst. Diese Schiffe sollen die maritime Sicherheit stärken, Hoheitsgewässer schützen und verschiedene Marineeinsätze unterstützen und damit zur Sicherheit und Stabilität in den Regionen des Commonwealth beitragen."
 CMW_Chief_Of_Staff: "Generalstabschef des Commonwealth"
 CMW_Chief_Of_Staff_desc: "Der Generalstabschef des Commonwealth ist ein hochrangiges Amt, das für die Überwachung und Koordinierung militärischer Operationen und Strategien innerhalb der Mitgliedstaaten des Commonwealth verantwortlich ist. Diese Rolle spielt eine entscheidende Rolle für die Sicherheit und Verteidigung des Commonwealth und fördert zugleich die Zusammenarbeit und Einsatzbereitschaft der Streitkräfte, um Frieden und Stabilität zu gewährleisten."
 CMW_Secretariat_CVE: "Sekretariatseinheit zur Bekämpfung gewalttätigen Extremismus"
 CMW_Secretariat_CVE_desc: "Die Einheit des Commonwealth-Sekretariats zur Bekämpfung gewalttätigen Extremismus (CVE) ist ein spezialisierter Bereich innerhalb des Commonwealth-Sekretariats, der sich mit gewalttätigem Extremismus in den Mitgliedstaaten befasst und dabei insbesondere auf die Verhinderung von Radikalisierung sowie die Förderung von Frieden und Stabilität fokussiert ist."
 CMW_Offices_For_Peace: "Commonwealth-Büros für den Frieden"
 CMW_Offices_For_Peace_desc: "Die Einrichtung der Commonwealth Offices for Peace (COP) unterstreicht das Engagement des Commonwealth für globalen Frieden und Konfliktlösung. Diese Büros, die sich in wichtigen Regionen der Mitgliedstaaten befinden, arbeiten an der Vermittlung in Konflikten, der Förderung der Diplomatie und der Unterstützung friedensschaffender Initiativen."
 CMW_Academy: "Militärakademie des Commonwealth"
 CMW_Academy_desc: "Die Militärakademie des Commonwealth (CMA) wurde gegründet, um Angehörigen aller Mitgliedstaaten eine fortgeschrittene militärische Ausbildung und Bildung zu bieten. Diese Einrichtung soll die beruflichen Fähigkeiten, strategischen Kenntnisse und Führungsqualitäten von Offizieren verbessern. Durch die Förderung gemeinsamer Ausbildungsstandards und eines Geistes der Zusammenarbeit stärkt die CMA die kollektiven Verteidigungsfähigkeiten des Commonwealth."
 CMW_Training_Day: "Weltweite Gebietsausbildung"
 CMW_Training_Day_desc: "Die weltweite Gebietsausbildung ist ein globales Programm, das die Bereitschaft und Fähigkeiten von Staaten zur Bewältigung territorialer und grenzbezogener Fragen verbessern soll. Diese Initiative bietet Ausbildung und Ressourcen, um das Verständnis und das Management geografischer Grenzen zu verbessern und Staaten dabei zu helfen, Grenzstreitigkeiten zu lösen, friedliches Zusammenleben zu fördern und territoriale Stabilität weltweit zu stärken."
 CMW_Defense_Treaty: "Verteidigungsvertrag des Commonwealth"
 CMW_Defense_Treaty_desc: "Der Verteidigungsvertrag des Commonwealth ist ein bedeutendes internationales Abkommen zwischen Mitgliedstaaten des Commonwealth, das gegenseitige Verteidigungsverpflichtungen und Zusagen festlegt. Dieser Vertrag dient als Rahmen kollektiver Sicherheit, in dem sich die Mitgliedstaaten verpflichten, einander bei äußeren Bedrohungen oder Angriffen zu unterstützen, und so ihr Engagement für die Sicherheit und Souveränität aller Unterzeichnerstaaten innerhalb des Commonwealth bekräftigen."
 CMW_New_CMW: "Neues Commonwealth of Nations"
 CMW_New_CMW_desc: "Nach einer Reihe umfassender Reformen steht das Commonwealth of Nations erneuert und bereit da, sich neuen globalen Herausforderungen zu stellen. Diese Reformen haben die Regierungsstrukturen modernisiert, Entscheidungsprozesse gestrafft und das Bekenntnis zu zentralen Werten wie Demokratie, Entwicklung und Menschenrechten gestärkt. Das neue Commonwealth ist nun bereit, seine Mitgliedstaaten in eine neue Ära der Zusammenarbeit, Inklusivität und Widerstandsfähigkeit zu führen und die Herausforderungen des 21. Jahrhunderts anzugehen."
 CMW_Education_Framework: "Bildungsrahmen des Commonwealth"
 CMW_Education_Framework_desc: "Der Bildungsrahmen des Commonwealth ist ein umfassendes System zur Orientierung von Bildungspolitik und Bildungspraktiken in den Mitgliedstaaten des Commonwealth."
 CMW_Debt_Swaps: "Schuldenumwandlungen des Commonwealth"
 CMW_Debt_Swaps_desc: "Schuldenumwandlungen des Commonwealth beziehen sich auf finanzielle Vereinbarungen oder Initiativen innerhalb des Commonwealth, die den Austausch oder die Umstrukturierung von Schulden umfassen, um wirtschaftliche und finanzielle Herausforderungen in Mitgliedstaaten zu bewältigen."
 CMW_Climate_Hub: "Knotenpunkt des Commonwealth für Zugang zu Klimafinanzierung"
 CMW_Climate_Hub_desc: "Der Commonwealth Climate Finance Access Hub ist eine innerhalb des Commonwealth eingerichtete Plattform, die den Zugang zu Klimafinanzierung erleichtern und Mitgliedstaaten bei Maßnahmen gegen den Klimawandel sowie bei Nachhaltigkeitsinitiativen unterstützen soll."
 CMW_Blue_Charter: "Blaue Charta des Commonwealth"
 CMW_Blue_Charter_desc: "Die Blaue Charta des Commonwealth ist eine Verpflichtung der Mitgliedstaaten des Commonwealth, gemeinsam daran zu arbeiten, die Gesundheit und Nachhaltigkeit der Weltmeere und marinen Umwelt zu schützen."
 CMW_Living_Lands: "Charta der lebendigen Landschaften"
 CMW_Living_Lands_desc: "Die Charta der lebendigen Landschaften ist eine wegweisende Umweltinitiative des Commonwealth of Nations. Diese Charta verpflichtet die Mitgliedstaaten zu nachhaltiger Landbewirtschaftung, Biodiversitätsschutz und der Bekämpfung des Klimawandels. Durch die Förderung von Wiederaufforstung, Bodensanierung und dem Schutz natürlicher Lebensräume will das Commonwealth sicherstellen, dass künftige Generationen eine gesunde und widerstandsfähige Umwelt erben."
 CMW_Health_Section: "Gesundheitsabteilung des Sekretariats"
 CMW_Health_Section_desc: "Die Gesundheitsabteilung des Commonwealth-Sekretariats ist ein Bereich innerhalb des Commonwealth-Sekretariats, der dafür verantwortlich ist, die Mitgliedstaaten des Commonwealth in Fragen der Gesundheitsversorgung, des öffentlichen Gesundheitswesens sowie der Entwicklung von Gesundheitsstrategien und -programmen zu unterstützen und zu beraten. Sie erleichtert die Zusammenarbeit und den Austausch bewährter Verfahren im Gesundheitsbereich zwischen den Mitgliedstaaten."
 CMW_Body_And_Sports: "Beratungsgremium des Commonwealth für Sport"
 CMW_Body_And_Sports_desc: "Das Beratungsgremium des Commonwealth für Sport ist ein Ausschuss, der die Mitgliedstaaten des Commonwealth in sportbezogenen Strategien und Programmen berät, mit besonderem Fokus auf die Förderung sozialer Entwicklung, Gesundheit und Wohlbefinden durch Sport."
 CMW_Youth_Networks: "Jugendnetzwerke des Commonwealth"
 CMW_Youth_Networks_desc: "Die Jugendnetzwerke des Commonwealth sind spezielle jugendorientierte Gruppen oder Organisationen innerhalb des Commonwealth, die Zusammenarbeit, Informationsaustausch und gemeinsames Handeln junger Menschen in den Mitgliedstaaten erleichtern. Diese Netzwerke befassen sich häufig mit jugendrelevanten Themen wie Bildung, Beschäftigung und sozialer Entwicklung."
 CMW_Defense_Association: "Verteidigungsvereinigung des Commonwealth"
 CMW_Defense_Association_desc: "Die Verteidigungsvereinigung des Commonwealth ist ein kooperativer Zusammenschluss von Mitgliedstaaten des Commonwealth, der sich auf die Stärkung ihrer kollektiven Verteidigungsfähigkeiten und Sicherheit konzentriert. Dieses Bündnis dient als Plattform für gegenseitige Unterstützung, strategische Koordinierung sowie das gemeinsame Streben nach Frieden und Stabilität innerhalb der Gemeinschaft des Commonwealth."
 CMW_Leaving.1.t: "[THIS.GetName] hat das Commonwealth of Nations verlassen"
 CMW_Leaving.1.d: "[THIS.GetName] hat offiziell seinen Austritt aus dem Commonwealth of Nations angekündigt. Diese Entscheidung markiert einen bedeutenden Wandel in seiner Außenpolitik und spiegelt den Wunsch nach größerer Eigenständigkeit und neuen internationalen Bündnissen wider. Der Austritt könnte die diplomatischen Beziehungen und wirtschaftlichen Verbindungen innerhalb des Commonwealth beeinflussen und sowohl für den austretenden Staat als auch für die verbleibenden Mitgliedstaaten neue Herausforderungen und Chancen schaffen."
 CMW_Leaving.1.a: "Viel Glück"
 Commonwealth_allies_tech_share_name: "Bildungsrahmen des Commonwealth"
 Commonwealth_allies_tech_share_desc: "Der Bildungsrahmen des Commonwealth schafft einen einheitlichen Ansatz für Bildungsstandards und -praktiken in den Mitgliedstaaten"
 CMW_Patrol_Boat_Program_Member: "Patrouillenbootprogramm des Commonwealth"
 CMW_Patrol_Boat_Program_Leader: "Initiator des Patrouillenbootprogramms des Commonwealth"
 Commonwealth_member_modifier_desc: "Als Mitglied des Commonwealth of Nations profitiert unser Land von starken diplomatischen Beziehungen und wirtschaftlicher Zusammenarbeit mit anderen Mitgliedstaaten. Diese historische Gemeinschaft bietet uns ein Netzwerk gegenseitiger Unterstützung und gemeinsamer Werte, was unser internationales Ansehen und unsere Handelsmöglichkeiten stärkt. Gleichzeitig kann das Gleichgewicht zwischen unserer nationalen Souveränität und den kollektiven Interessen des Commonwealth gelegentlich zu diplomatischen und politischen Herausforderungen führen."
 CMW_Parliament_desc: "Die Einrichtung des Parlaments des Commonwealth of Nations stellt einen bedeutenden Schritt hin zu größerer politischer Integration und Zusammenarbeit unter den Mitgliedstaaten dar. Dieses gesetzgebende Organ soll den Dialog erleichtern, demokratische Werte fördern und die Umsetzung der Politik des Commonwealth überwachen. Es dient als Plattform für Vertreter aller Mitgliedsländer, um gemeinsame Herausforderungen zu erörtern und anzugehen, und stärkt so Einigkeit und gemeinsames Handeln."