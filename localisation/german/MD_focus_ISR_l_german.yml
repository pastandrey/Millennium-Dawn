 israel.86.t: "Zerschlagung der Labore von Jenin"
 israel.86.d: "Wir haben die geheimen unterirdischen Militärlabore in Jenin erobert. Wir müssen entscheiden, was wir damit tun."
 israel.86.a: "Ihre Bestände beschlagnahmen."
 israel.86.b: "Die Anlagen übernehmen"
 israel.86.c: "Die Anlagen demontieren und verlegen!"
 ISR_add_nazeat_missile_tt: "§G10§! §YNazeat bodengestützte Marschflugkörper§! zum nationalen Vorrat hinzufügen."
 increased_autonomy: "Autonomie nach den jüngsten Ereignissen erhöht"
 ISR_jenin_labs: "Die Einrichtungen von Jenin beschlagnahmt"
 jericho_casinos: "Die Casinos von Jericho"
 ISR_fate_of_jericho: "Über das Schicksal Jerichos verhandeln"
 israel.87.t: "[FROM.GetNamewithFlag] bittet um Verhandlungen!"
 israel.87.d: "Seit Beginn der Antiterroroperationen bittet [FROM.GetNamewithFlag] um Verhandlungen über die zukünftige Rolle der Casinos von Jericho. Wir müssen entscheiden, was wir mit ihnen tun sollen."
 israel.87.a: "Die Oslo-Protokolle annullieren."
 israel.87.b: "Es so belassen, wie es vereinbart wurde."
 ISR_border_raid_hebron: "Grenzschutzrazzia in Hebron"
 israel.88.t: "Schicksal der Höhle der Patriarchen"
 israel.88.d: "Unsere Truppen haben die Höhle der Patriarchen erreicht. Wir sollten entscheiden, was wir mit ihr tun."
 israel.88.a: "Die Synagoge räumen!"
 israel.88.b: "Die Gebetsstraße militarisieren."
 israel.88.c: "Den Status quo beibehalten?"
 israel.89.t: "Das Tegart-Fort von Tulkarm"
 israel.89.d: "Nun müssen wir entscheiden, wie wir mit dem Tegart-Fort von Tulkarm umgehen sollen. Was ist unser Plan?"
 israel.89.a: "Das Fort zerstören!"
 israel.89.b: "In eine Kasbah umwandeln."
 israel.90.t: "Mit den Tanzim umgehen"
 israel.90.d: "Tanzim war einst der Jugendflügel der Fatah. Allerdings haben sie sich von der Partei abgespalten und sind nun nur noch lose mit ihr verbündet. Jetzt sollten wir ihre Angelegenheit regeln."
 israel.90.a: "Ihre Eingliederung zulassen."
 israel.90.b: "Die Tanzim auflösen."
 israel.91.t: "Operation erfolgreich!"
 israel.91.d: "Die Antiterroroperation war erfolgreich und die Terrorzellen wurden zerschlagen. Wir sind wieder sicher und können nun hoffnungsvoll in die Zukunft blicken."
 israel.91.a: "Großartig!"
 israel.92.t: "Operation fehlgeschlagen!"
 israel.92.d: "[operation_namefi] ist gescheitert... Die Terroristen, die wir zerschlagen wollten, sind nun stärker als je zuvor und fühlen sich in ihrem Handeln bestätigt. Es ist nur eine Frage der Zeit, bis sie erneut zuschlagen. Wir müssen auf das Schlimmste vorbereitet sein und bereit für alle Folgen dieser Katastrophe."
 israel.92.a: "Sehr bedauerlich..."
 israel.92.b: "Jassir Arafat entführen!"
 israel.92.c: "Ach, Scheiße..."
