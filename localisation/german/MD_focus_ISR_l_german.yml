 israel_economy.71.t: "Israel erkennt den armenischen Völkermord an!"
 israel_economy.71.d: "Die israelische Regierung hat kürzlich angekündigt, den armenischen Völkermord vollständig anzuerkennen. Außerdem wurde ein neuer Fahrplan für politische und wirtschaftliche Zusammenarbeit zwischen Israel und Armenien vorgestellt."
 israel_economy.71.a: "Vielen Dank!"
 israel_economy.72.t: "Israel erkennt Artsakh an!"
 israel_economy.72.d: "Die israelische und die armenische Regierung haben beschlossen, gleichzeitig Artsakh anzuerkennen und einen offiziellen Vertrag zu schließen. Nun bittet Israel darum, Militärbasen auf unserem Territorium zu errichten. Sollen wir zustimmen?"
 israel_economy.72.a: "Natürlich!"
 israel_economy.72.b: "Danke, aber nein."
 ifweagree_tt: "Wenn wir zustimmen, wird ihr Einfluss in Artsakh um 6% und in Armenien um 4% steigen. Sie haben bereits zuvor 5% Einfluss auf uns."
