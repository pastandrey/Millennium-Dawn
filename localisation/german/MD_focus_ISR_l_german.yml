 israel_labour.1.t: "Frage der sozialen Bewegung"
 israel_labour.1.d: "Shelly Rachel Yachimovich ist in letzter Zeit zu einem aufsteigenden Stern linker politischer Bewegungen geworden. Ihre Bewegung ist unseren ideologischen Positionen ziemlich nahe. Wenn wir ihre Bewegung in unsere Partei aufnehmen, ist die Chance ziemlich hoch, dass sie schon bald die Führung in unserer Partei übernehmen könnte ... Sollen wir sie integrieren?"
 israel_labour.1.a: "Klar! Kommt herein!"
 israel_labour.1.b: "Niedrige Politik interessiert unser Land nicht."
 israel_labour.2.t: "Die Demokraten"
 israel_labour.2.d: "Heute wurde bekannt, dass eine neue politische Partei gegründet wurde – £ISR_democrats die Demokraten –, die aus der Fusion der £ISR_socialism Arbeiterpartei und der £ISR_neutral_Social Meretz-Partei hervorgegangen ist. Dieses Ereignis kam für die Gesellschaft nicht überraschend, da diese Parteien historisch immer zusammengearbeitet und bei Wahlen als gemeinsame Koalition agiert haben; die Gründung von £ISR_democrats den Demokraten war ein logischer Schritt in ihrer Beziehung. Tatsächlich handelt es sich noch nicht um eine vollständige Vereinigung, da die Parteien derzeit noch getrennte Budgets und unabhängige Fraktionen in den Kommunen haben, doch auf die eine oder andere Weise hat dieses Bündnis gute Chancen bei Wahlen und eine vielversprechende Zukunft."
 israel_labour.2.a: "Die Linke vereint sich."
 israel_labour.3.t: "Die Gründung von Yesh Atid"
 israel_labour.3.d: "Seit zwei Jahren wird im israelischen politischen Umfeld spekuliert, dass Yair Lapid, ein populärer Journalist und Sohn des Vorsitzenden der liberalen politischen Partei £ISR_liberalism_alt2 Shinui, seine journalistische Karriere aufgeben und in die Politik gehen werde. Viele haben zudem spekuliert, dass Lapid einer bestehenden Partei beitreten würde. Im Januar kündigte Yair Lapid an, tatsächlich in die Politik zu gehen, und bereits im April dieses Jahres beantragte Lapid die Gründung einer neuen politischen Partei, ISR.liberalism_alt3 Yesh Atid. Die Partei wird die politische Tradition von Shinui fortsetzen und liberalen Zionismus sowie politischen Zentrismus vertreten."
 israel_labour.3.a: "Yair Lapid hat eine glänzende Zukunft."
 israel_labour.3.b: "Nichts Interessantes."
 israel_labour.4.t: "Die Gründung von Hosen LeYisrael"
 israel_labour.4.d: "Der ehemalige Generalstabschef der IDF Benjamin „Benny“ Gantz kündigte die Gründung einer neuen politischen Partei an, £ISR_liberalism_alt4 Israels Resilienz. Die Partei versteht sich als zentristisch und befürwortet ein unpolitischeres Verhalten im Namen der Landesverteidigung."
 israel_labour.4.a: "Benny Gantz wird Israel vereinen!"
 israel_labour.4.b: "Nichts Interessantes."
 israel_labour.5.t: "Die Gründung von Tikva Hadasha"
 israel_labour.5.d: "Inmitten der massiven „Bibisierung“ des Likud kündigte das frühere £ISR_conservatism Likud-Mitglied Gideon Sa'ar die Gründung einer neuen politischen Partei an, £ISR_conservatism_alt Neue Hoffnung. Die Partei vertritt rechte Positionen und unterstützt zugleich liberale politische Reformen sowie staatliche Eingriffe in den Markt."
 israel_labour.5.a: "Benny Gantz wird Israel vereinen!"
 israel_labour.5.b: "Nichts Interessantes."
