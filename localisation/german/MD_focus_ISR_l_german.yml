 israel_economy.115.a: "Bruh."
 israel_economy.116.t: "Israel fordert Reparationen!"
 israel_economy.116.d: "Kürzlich ist die israelische Regierung an uns herangetreten und hat die Unterzeichnung des Vertrags von Susa verlangt. Dieser Vertrag würde uns verpflichten, Israel für iranische Israelis zu entschädigen, die während der Revolution im 20. Jahrhundert geflohen sind. Sollen wir zustimmen?"
 israel_economy.116.a: "Es ist unsere Pflicht!"
 israel_economy.116.b: "Das ist zu viel..."
 israel_economy.117.t: "Iran stimmt zu!"
 israel_economy.117.d: "Iran hat zugestimmt, die Reparationen zu zahlen!"
 israel_economy.117.a: "Großartig!"
 israel_economy.118.t: "Iran hat nicht zugestimmt!"
 israel_economy.118.d: "Sie werden uns keine Reparationen für Taten zahlen, die ihre Regierung nicht begangen hat."
 israel_economy.118.a: "Ugh."
 israel_economy.119.t: "Taba-Konferenz"
 israel_economy.119.d: "Israel hat ein neues Format für gegenseitige Sicherheit und die Normalisierung der Beziehungen vorgeschlagen, in dem Ägypten die aktive Unterstützung Palästinas einstellen und ein geheimer Nichtangriffspakt zwischen Israel und Ägypten unterzeichnet werden soll."
 israel_economy.119.a: "Klar."
 israel_economy.119.b: "Nein."
 israel_economy.120.t: "Ägypten hat zugestimmt"
 israel_economy.120.d: "Ägypten hat unseren Plan zur Bewältigung der Lage in der Region angenommen. Ein geheimer Nichtangriffspakt zwischen Ägypten und Israel wurde ebenfalls unterzeichnet."
 israel_economy.120.a: "Großartig!"
 israel_economy.121.t: "Ägypten hat unser Angebot abgelehnt"
 israel_economy.121.d: "Ägypten hat es abgelehnt, unseren Plan zur Bewältigung der Lage in unserer Region anzunehmen."
 israel_economy.121.a: "Schade."
 israel_economy.122.t: "Israel verlangt die Rückgabe eines gefangenen Agenten"
 israel_economy.122.d: "Israel verlangt die Auslieferung ihres gefangenen Agenten als Geste des guten Willens."
 israel_economy.122.a: "In Ordnung."
 israel_economy.122.b: "Nein."
 israel_economy.123.t: "Ägypten hat zugestimmt"
 israel_economy.123.d: "Nach langen Verhandlungen hat die ägyptische Regierung zugestimmt, unseren gefangenen Agenten an uns auszuliefern."
 israel_economy.123.a: "Großartig!"
 israel_economy.124.t: "Ägypten hat die Auslieferung unseres Agenten verweigert"
 israel_economy.124.d: "Die ägyptische Regierung hat die Auslieferung unseres Agenten verweigert. Er bleibt in einem ägyptischen Gefängnis in Haft."
 israel_economy.124.a: "Schade."
 ISR_kill_scientist_idea: "Nuklearwissenschaftler eliminiert!"
 nuclear_scientist_unlock: "Entscheidung zur Eliminierung von Wissenschaftlern freigeschaltet"
 ISR_REV_IRQ_TT: "§YWir werden im Irak eine Revolution starten, um ihre Regierung zu stürzen§!"
 ISR_REV_SYR_TT: "§YWir werden in Syrien eine Revolution starten, um ihre Regierung zu stürzen§!"
 ISR_REV_JOR_TT: "§YWir werden in Jordanien eine Revolution starten, um ihre Regierung zu stürzen§!"
 israel_economy.125.t: "Israel will CENTO beitreten!"
 israel_economy.125.d: "Israel hat kürzlich den Wunsch geäußert, CENTO beizutreten. Sollen wir zustimmen?"
 israel_economy.125.a: "Sicher!"
 israel_economy.125.b: "Nein, danke."
 israel_economy.126.t: "Iran stimmt zu!"
 israel_economy.126.d: "Alle Dokumente wurden unterzeichnet."
 israel_economy.126.a: "Großartig!"
 israel_economy.127.t: "Iran hat nicht zugestimmt!"
 israel_economy.127.d: "Iran hat unserem Beitritt zu ihrer Fraktion nicht zugestimmt."
 israel_economy.127.a: "Bruh."
 periphery_pactt: "Peripheriepakt"
 faction_periph_TT: "§RBesondere Fraktionsregeln§!\n- Jeder, der von den Kernmitgliedern genehmigt wird, darf der Fraktion beitreten\n- Länder können nur in Verteidigungskriege gerufen werden"
 ISR_trade_agr_seks: "§OAktiviert das Freihandelsabkommen.§!"
 israel_economy.128.t: "Israel bietet eine Wiederannäherung an!"
 israel_economy.128.d: "Angesichts unserer gemeinsamen Feinde im Nahen Osten bietet Israel uns den Beginn eines neuen Kooperationsplans gegen unsere Gegner und möglicherweise auch in vielen weiteren Bereichen an. Sollen wir zustimmen?"
 israel_economy.128.a: "Wir stimmen zu. Niemand darf davon erfahren."
 israel_economy.128.b: "Wir werden unsere Sache niemals verraten!"
 israel_economy.129.t: "Saudi-Arabien stimmt zu!"
 israel_economy.129.d: "Saudi-Arabien hat zugestimmt, mit uns gegen unsere gemeinsamen Feinde zu kooperieren und uns bei verschiedenen künftigen Gemeinschaftsprojekten zu unterstützen."
 israel_economy.129.a: "Sehr gut..."
 israel_economy.130.t: "Saudi-Arabien hat unser Angebot abgelehnt!"
 israel_economy.130.d: "Sie sagen, wir würden sie nicht vom gerechten Pfad des Widerstands gegen uns abbringen können."
 israel_economy.130.a: "Aha, klar."
 israel_economy.131.t: "Israel entschuldigt sich für vergangene Handlungen!"
 israel_economy.131.d: "Israel entschuldigt sich für frühere Spionageaktivitäten und verspricht, so etwas in Zukunft nicht mehr zu tun. Sie bieten uns als Zeichen ihrer Vergebung und ihres Kooperationswillens ein Geschenk an..."
 israel_economy.131.a: "Ihnen sei vergeben."
 israel_economy.131.b: "Was für eine Unverschämtheit!"
 israel_economy.132.t: "[From.GetName] akzeptiert"
 israel_economy.132.d: "Unsere Entschuldigung wurde angenommen und unsere früheren Handlungen wurden vergeben."
 israel_economy.132.a: "Großartig!"
 israel_economy.133.t: "[From.GetName] lehnt ab"
 israel_economy.133.d: "Sie betrachteten unsere Geste als unverschämten und unmoralischen Akt egoistischer expansionistischer Ambitionen."
 israel_economy.133.a: "Ja, klar."
 easten_andinf_tt: "Wir werden die §YSpannungen§! §Glindern§! und §O2% Einfluss§! auf §Ysie§! gewinnen."
 israel_economy.134.t: "Der israelische Premierminister besucht Oman!"
 israel_economy.134.d: "Heute ist Premierminister [ISR.GetLeader] heimlich im Oman gelandet und zusammen mit Mossad-Chef Yossi Cohen und dem Nationalen Sicherheitsberater Meir Ben-Shabbat zum Al-Husun-Palast in der südlichen Stadt Salala gereist, um Sultan [OMA.GetLeader] zu treffen. Der Sultan führte den Premierminister durch den Palast und zeigte ihm zahlreiche alte Artefakte und Karten des Sultanats. Dort besprachen sie Möglichkeiten, den Friedensprozess im Nahen Osten voranzubringen, sowie eine Reihe gemeinsamer Anliegen zur Förderung von Frieden und Stabilität in der Region. Dies ist das erste Treffen eines omanischen Sultans mit einem israelischen Premierminister seit dem Besuch Shimon Peres' im Jahr 1996 in dem arabischen Land, das trotz fehlender Anerkennung Israels enge diplomatische Beziehungen zu dem Staat unterhielt. Beide einigten sich zudem auf mehrere Handelsabkommen und die Einrichtung eines inoffiziellen israelischen Handelsbüros in Maskat. Der israelische Premierminister [ISR.GetLeader] hat unser Land besucht, um uns ein neues Kooperationsabkommen im diplomatischen und militärischen Bereich anzubieten. Sollen wir ihrem Vorschlag zustimmen?"
 israel_economy.134.a: "Sicher!"
 israel_economy.134.b: "Nein, danke."
 israel_economy.135.t: "Oman stimmt zu!"
 israel_economy.135.d: "Nach dem Besuch von [ISR.GetLeader] im Oman haben sie zugestimmt, mit unserem Land im diplomatischen und militärischen Bereich zusammenzuarbeiten."
 israel_economy.135.a: "Großartig!"
 israel_economy.136.t: "Oman lehnt ab!"
 israel_economy.136.d: "Sie wollen nicht mit unserem Land kooperieren."
 israel_economy.136.a: "Warum?! Was für eine Beleidigung!"
 ISR_gulf_mossad_protecc: "Schutz des Mossad"
 ISR_gulf_mossad_protecc_desc: "Angesichts der wachsenden Bedrohung durch Iran hat unser Land zugestimmt, israelische Mossad-Agenten aufzunehmen, um iranischen Einfluss einzudämmen."
 canc_if_isrwar_tt: "Diese §YIdee§! wird §Rabgebrochen§!, falls wir uns im §YKrieg§! mit [ISR.GetNamewithFlag] befinden"
 israel_economy.137.t: "Israel bietet eine geheime Partnerschaft an."
 israel_economy.137.d: "Kürzlich hat Israel uns eine geheime Nachricht geschickt und uns guten Schutz vor der iranischen Bedrohung angeboten. Sie wollen ihre Mossad-Agenten in unserem Land unterbringen, damit sie dem iranischen Einfluss wirksam entgegenwirken können."
 israel_economy.137.a: "Aber sicher!"
 israel_economy.137.b: "Äh? Nein."
 israel_economy.138.t: "[FROM.GetNamewithFlag] stimmt zu!"
 israel_economy.138.d: "[FROM.GetNamewithFlag] hat zugestimmt, unsere Agenten in ihrem Land zu beherbergen."
 israel_economy.138.a: "Wunderbar!"
 israel_economy.139.t: "[FROM.GetNamewithFlag] lehnt ab!"
 israel_economy.139.d: "[FROM.GetNamewithFlag] hat unser Angebot abgelehnt und es als Komplott gegen ihre Souveränität betrachtet."
 israel_economy.139.a: "Ach komm schon!"
 wewillspendtwenty_tt: "Für einen Deal werden wir §Y10 Mrd.$§! ausgeben!"
 theywillget_tt: "Sie werden eine §YIdee§! erhalten"
 israel_economy.140.t: "Israel will an Ausstellungen in Dubai teilnehmen!"
 israel_economy.140.d: "Israel möchte mit uns einen Handelsvertrag unterzeichnen und an Messen und Ausstellungen in Dubai teilnehmen. Sie bitten uns, ihre Teilnahme zu genehmigen. Sollen wir zustimmen?"
 israel_economy.140.a: "Sicher!"
 israel_economy.140.b: "Nein, danke."
 israel_economy.141.t: "Die VAE stimmen zu!"
 israel_economy.141.d: "Die VAE haben unserer Teilnahme an Messen und Ausstellungen in Dubai zugestimmt. Außerdem haben wir einen Handelsvertrag unterzeichnet, der sich positiv auf unsere gegenseitigen Beziehungen auswirken wird."
 israel_economy.141.a: "Großartig!"
 israel_economy.142.t: "Die VAE lehnen ab!"
 israel_economy.142.d: "Sie wollen uns nicht auf ihren Messen und Ausstellungen sehen."
 israel_economy.142.a: "Bruh."
 moss_diplo_tt: "§YMossad§! wird in der Lage sein, §0heimlich unseren Einfluss§! §6bei unseren Geheimdienstpartnern§! §Yauszuweiten!§!"
 israel_economy.143.t: "Wirtschaftsforum Bahrain"
 israel_economy.143.d: "Israel bietet uns einen Deal an, bei dem sie möchten, dass wir in die Infrastruktur Palästinas investieren, um die Spannungen zu lindern und Palästina wirtschaftlich zu entlasten. Was sollen wir tun?"
 israel_economy.143.a: "Klar, wir stimmen zu!"
 israel_economy.143.b: "Noch eine jüdische Intrige?"
 reduc_pal_tens_aut_tt: "Dies wird die §3Autonomie§! der §YPalästinenser§! §Rverringern§!, aber die §GSpannungen lindern!§!"
 gulf_invested_thing: "Israelisch-golfischer Investitionsplan"
 israel_economy.144.t: "[FROM.GetNamewithFlag] stimmt zu!"
 israel_economy.144.d: "[FROM.GetNamewithFlag] hat zugestimmt, in Palästina zu investieren, um dessen Autonomie zu verringern und die Spannungen zu lindern."
 israel_economy.144.a: "Großartig!"
 israel_economy.145.t: "[FROM.GetNamewithFlag] lehnt ab!"
 israel_economy.145.d: "[FROM.GetNamewithFlag] hat unser Angebot wegen ihrer Unterstützung für die palästinensische Sache abgelehnt."
 israel_economy.145.a: "Wie auch immer."
 israel_economy.146.t: "[FROM.GetNamewithFlag] investiert im Auftrag Israels in unser Land!"
 israel_economy.146.d: "Auf Einladung Israels haben sie beschlossen, in unserem Land in die Infrastruktur zu investieren, um die Spannungen zu lindern."
 israel_economy.146.a: "Na gut, schätze ich?"
 ISR_visa_free_moroc: "Israelisch-marokkanisches Visaabkommen"
 israel_economy.147.t: "Israel schlägt ein Visaabkommen vor!"
 israel_economy.147.d: "Die israelische Regierung schlägt ein neues Abkommen über indirekte Reisen israelischer Bürger nach Marokko über Drittländer vor. Sollen wir zustimmen?"
 israel_economy.147.a: "Sicher!"
 israel_economy.147.b: "Nein."
 israel_economy.148.t: "[FROM.GetNamewithFlag] stimmt zu!"
 israel_economy.148.d: "Sie haben unserem Vorschlag zugestimmt und nun können unsere Bürger nach Marokko reisen."
 israel_economy.148.a: "Großartig!"
 israel_economy.149.t: "[FROM.GetNamewithFlag] lehnt ab!"
 israel_economy.149.d: "Sie haben unserem Angebot nicht zugestimmt."
 israel_economy.149.a: "Sehr bedauerlich."
 israel_economy.150.t: "Israel schlägt gemeinsame Unterstützung für Marokko vor!"
 israel_economy.150.d: "Israel bittet uns, Marokko in seinem Konflikt mit der Polisario-Bewegung zu unterstützen. Sie möchten, dass wir gemeinsam eine Erklärung abgeben und die legitime Regierung Marokkos unterstützen. Sollen wir zustimmen?"
 israel_economy.150.a: "Klar! Schickt unsere Diplomaten!"
 israel_economy.150.b: "Das müssen sie alleine machen."
 israel_economy.151.t: "Die USA und Israel unterstützen die marokkanische Regierung!"
 israel_economy.151.d: "Kürzlich haben die Vereinigten Staaten und Israel eine gemeinsame Erklärung abgegeben, in der sie die marokkanische Regierung unterstützen und die separatistische Polisario-Bewegung verurteilen."
 israel_economy.151.a: "Großartig!"
 israel_economy.152.t: "Israel unterstützt die marokkanische Regierung!"
 israel_economy.152.d: "Kürzlich hat Israel eine Erklärung abgegeben, in der es die marokkanische Regierung unterstützt und die separatistische Polisario-Bewegung verurteilt!"
 israel_economy.152.a: "Großartig!"
 israel_economy.153.t: "Israel schlägt die Abraham-Abkommen vor!"
 israel_economy.153.d: "Im Rahmen der Normalisierung der Beziehungen mit Israel schlagen sie die Unterzeichnung eines neuen Dokuments vor. Das Abkommen enthält auch die Anerkennung der Souveränität Israels und ermöglicht die Aufnahme vollständiger diplomatischer Beziehungen. Sollen wir unterschreiben?"
 israel_economy.153.a: "Sicher!"
 israel_economy.153.b: "Nein!"
 israel_economy.154.t: "[FROM.GetNamewithFlag] stimmt zu!"
 israel_economy.154.d: "[FROM.GetNamewithFlag] hat zugestimmt, die Abraham-Abkommen zu unterzeichnen, die Souveränität Israels anzuerkennen und die Aufnahme vollständiger diplomatischer Beziehungen zu ermöglichen!"
 israel_economy.154.a: "Großartig!"
 israel_economy.155.t: "[FROM.GetNamewithFlag] lehnt ab!"
 israel_economy.155.d: "Sie wollten die Beziehungen zu uns nicht normalisieren und die Abraham-Abkommen nicht unterzeichnen."
 israel_economy.155.a: "Sehr bedauerlich."
 norm_rel_infl_tt: "Die §YBeziehungen§! zwischen uns und den Unterzeichnern werden sich §Gverbessern§!, und der §Ygegenseitige Einfluss§! aufeinander wird §Gsteigen§!."
 idea_israel_negev_forum: "Partnerschaft im Negev-Forum"
 israel_economy.156.t: "Israel lädt uns zum Negev-Forum ein!"
 israel_economy.156.d: "Nach der Unterzeichnung der Abraham-Abkommen in Washington und dem Fortschritt der Normalisierung zwischen Israel und vielen seiner arabischen Nachbarn möchten israelische Entscheidungsträger nicht nur verhindern, dass dieser Frieden langfristig so kalt wird wie mit Ägypten und Jordanien, sondern auch eine stärkere regionale Koalition aufbauen, um Israels Zukunft in der Region zu sichern, wirtschaftliche Chancen zu schaffen und dem iranischen Einfluss in der Region entgegenzutreten. Deshalb wurden wir vom israelischen Außenminister und dem US-Außenminister eingeladen, an einem Treffen in der Negev-Wüste teilzunehmen, um die Bildung eines politischen Blocks zu besprechen, der Terrorismus, Klimawandel, wirtschaftliche Isolation und Wasserknappheit in der Region bekämpfen und die arabisch-israelische Zusammenarbeit stärken soll. Sollen wir an diesem Treffen teilnehmen?"
 israel_economy.156.a: "Der Außenminister von [Root.GetAdjective] soll teilnehmen."
 israel_economy.157.t: "[FROM.GetNamewithFlag] tritt dem Negev-Forum bei!"
 israel_economy.157.d: "[FROM.GetNamewithFlag] hat beschlossen, am Negev-Forum teilzunehmen."
 israel_economy.157.a: "Großartig!"
 israel_economy.158.t: "[FROM.GetNamewithFlag] boykottiert das Negev-Forum!"
 israel_economy.158.d: "Sie wollen nicht daran teilnehmen."
 israel_economy.158.a: "Bruh."
 neg_for_tt: "Sie erhalten die §YIdee§!, unser §YEinfluss§! auf sie wird §Gsteigen§! und unsere §YHandelsbeziehungen§! werden sich §Gverbessern§!."
 israel_economy.159.t: "Israel schlägt ein Kooperationsabkommen vor."
 israel_economy.159.d: "Israel hat uns ein neues Abkommen vorgeschlagen, in dem wir einen neuen vollständigen Friedensvertrag zwischen unseren Ländern schließen würden. Der Vertrag enthält außerdem Punkte über militärische Zusammenarbeit und Garantien. Was sollen wir tun?"
 israel_economy.159.a: "Wir stimmen zu!"
 israel_economy.159.b: "Nein!"
 israel_economy.160.t: "[FROM.GetNamewithFlag] stimmt zu!"
 israel_economy.160.d: "[FROM.GetNamewithFlag] hat unserem Vorschlag zugestimmt und ein Nichtangriffsvertrag wurde unterzeichnet!"
 israel_economy.160.a: "Großartig!"
 israel_economy.161.t: "[FROM.GetNamewithFlag] lehnt ab!"
 israel_economy.161.d: "[FROM.GetNamewithFlag] hat unseren Vorschlag abgelehnt."
 israel_economy.161.a: "Hm..."
 full_mil_tt: "Wir werden §Yvollständige Garantien§! errichten, §GEinfluss§! auf die §YUnterzeichner§! gewinnen, §3Nichtangriffspakte§! werden unterzeichnet und §7Militärbasen§! werden §Yerrichtet§!."
 ideological_alliance: "Ideologisches Bündnis"
 israel_observer_african_union: "Beobachterstaat der Afrikanischen Union"
 israel_economy.162.t: "Israel will Beobachterstaat der AU werden!"
 israel_economy.162.d: "Israels Beziehungen zu Subsahara-Afrika florierten in den 1950er und 1960er Jahren. Doch im Jom-Kippur-Krieg überquerten israelische Streitkräfte den Kanal und besetzten afrikanischen Boden. Dies führte dazu, dass fast der gesamte Kontinent – praktisch alle außer Malawi und dem Apartheid-Regime in Südafrika, einschließlich uns – die Beziehungen zu diesem Land abbrach. Diese Beziehungen wurden in den 1990er Jahren nach den Oslo-Abkommen schrittweise wiederhergestellt, und viele in der israelischen Regierung sehen Afrika als den Kontinent, über den Israel sein internationales Ansehen verbessern kann. Premierminister [ISR.GetLeader] hat kürzlich eine Kampagne zur „Rückkehr nach Afrika“ gestartet, bei der unsere Entsalzungstechnologien und andere innovative Start-ups genutzt werden, um das Leben der afrikanischen Bevölkerung zu verbessern. Daher hat Jerusalem uns gebeten, der Afrikanischen Union ähnlich wie die PLO als Beobachterstaat beizutreten. Während viele, besonders in der OAG, dies unterstützen würden, haben Algerien und insbesondere Südafrika starke Opposition gegen diesen Schritt erklärt."
 israel_economy.162.a: "[ISR.GetLeader] ist ein wahrer Freund Afrikas."
 israel_economy.162.b: "Apartheidstaaten haben in Afrika nichts verloren."
 israel_economy.163.t: "Äthiopien stimmt zu!"
 israel_economy.163.d: "Gestern bei der Eröffnungszeremonie der Afrikanischen Union in Addis Abeba hat Israels Botschafter in Äthiopien dem Vorsitzenden der Kommission der Afrikanischen Union Israels Akkreditierung als Beobachtermitglied der Afrikanischen Union übergeben. In den 1990er Jahren war Israel Beobachtermitglied der Organisation für Afrikanische Einheit, bis diese aufgelöst und durch die Afrikanische Union ersetzt wurde. Ein erneuter Beitritt scheiterte jedoch am Druck Südafrikas und Algeriens – zweier der größten Staaten des Kontinents. Doch nicht mehr. Ein politischer Block, hauptsächlich angeführt von Botswana, Äthiopien und Mitgliedern der Ostafrikanischen Gemeinschaft, konnte den arabisch-südafrikanischen Block überstimmen und diese Aufnahme durchsetzen. Dieser diplomatische Erfolg ist das Ergebnis endloser Bemühungen des Außenministeriums, der Afrika-Abteilung und der israelischen Botschaften auf dem Kontinent. Dies ist ein Korrekturschritt gegenüber der Anomalie, die fast zwei Jahrzehnte lang bestanden hat, und ein wichtiger Teil der Stärkung von Israels außenpolitischem Gefüge."
 israel_economy.163.a: "Großartig!"
 israel_economy.164.t: "Äthiopien legt Veto gegen unseren Status ein!"
 israel_economy.164.d: "Bei einer heutigen Abstimmung in der Kommission der Afrikanischen Union über den israelischen Beitritt haben sich unsere Hoffnungen als vergeblich erwiesen. Trotz starker Unterstützung durch Botswana, Äthiopien, Mitglieder der Ostafrikanischen Gemeinschaft und die Demokratische Republik Kongo reichte es nicht aus, die Stimmen zu übertreffen, die sich gegen unseren Beitritt als Beobachterstaat in der Afrikanischen Union richteten. In den 1990er Jahren war Israel Beobachtermitglied der Organisation für Afrikanische Einheit, bis diese aufgelöst und durch die Afrikanische Union ersetzt wurde. Ein erneuter Beitritt scheiterte jedoch am Druck der arabischen Staaten sowie Südafrikas. Es ist in der Tat traurig zu sehen, wie die Afrikanische Union von einer kleinen Zahl extremistischer Staaten wie Algerien und Südafrika als Geisel gehalten wird, die von Hass getrieben und von iranischen und katarischen Interessen kontrolliert werden. Israel wird seine Beziehungen zu Afrika weiter vertiefen, ganz gleich ob über die Afrikanische Union oder über Hinterkanäle, und ganz gleich, wie demütigend es war, mit ansehen zu müssen, wie unsere Diplomaten nach der Abstimmung gewaltsam aus dem Saal entfernt wurden."
 israel_economy.164.a: "Okay..."
 israel_economy.165.t: "Israel bietet Investitionen an!"
 israel_economy.165.d: "Israel möchte in unsere Wirtschaft investieren, indem es in unserem Land einen Industriekomplex errichtet. Sollen wir zustimmen?"
 israel_economy.165.a: "Sicher!"
 israel_economy.165.b: "Nein."
 israel_economy.166.t: "[FROM.GetNamewithFlag] stimmt zu!"
 israel_economy.166.d: "Sie haben unser Investitionsangebot angenommen!"
 israel_economy.166.a: "Großartig!"
 israel_economy.167.t: "[FROM.GetNamewithFlag] lehnt ab!"
 israel_economy.167.d: "Sie haben unserem Investitionsangebot nicht zugestimmt."
 israel_economy.167.a: "In Ordnung."
 israel_economy.168.t: "Israel unterstützt Äthiopien im Nil-Streit!"
 israel_economy.168.d: "Während der jüngsten Verhandlungen erklärte die israelische Regierung, dass sie die äthiopische Regierung im Nil-Streit zwischen Äthiopien und Ägypten voll unterstütze."
 israel_economy.168.a: "Interessant."
 israel_economy.169.t: "Israel unterstützt Ägypten im Nil-Streit!"
 israel_economy.169.d: "Während der jüngsten Verhandlungen erklärte die israelische Regierung, dass sie die ägyptische Regierung im Nil-Streit zwischen Äthiopien und Ägypten voll unterstütze."
 israel_economy.169.a: "Interessant."
 ISR_eth_jews_migr: "Jüdische Einwanderung"
 ISR_eth_jews_migr_isr: "Einwanderung äthiopischer Juden"
 israel_economy.170.t: "Israel fordert die Rückkehr äthiopischer Juden."
 israel_economy.170.d: "Israel fordert mit Nachdruck die Rückkehr äthiopischer Juden nach Israel im Austausch gegen Geld. Falls wir nicht zustimmen, drohen sie mit aggressiveren Maßnahmen."
 israel_economy.170.a: "Klar, klar!"
 israel_economy.170.b: "Leck mich."
 israel_economy.171.t: "Äthiopien stimmt zu!"
 israel_economy.171.d: "Die Vorbereitungen haben begonnen und äthiopische Juden werden anfangen, in ihre Heimat zurückzukehren!"
 israel_economy.171.a: "Großartig!"
 israel_economy.172.t: "Äthiopien lehnt ab!"
 israel_economy.172.d: "Äthiopien hat sich geweigert, unser Volk nach Hause zurückkehren zu lassen."
 israel_economy.172.a: "Sehr bedauerlich!"
 israel_economy.172.b: "Das haben sie sich selbst zuzuschreiben!"
