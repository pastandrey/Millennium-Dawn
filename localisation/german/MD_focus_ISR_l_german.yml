 israel.122.t: "Israel verlangt unsere Beteiligung an Anti-Terror-Operationen!"
 israel.122.d: "Nach der jüngsten Krise im Westjordanland verlangt Israel unsere Beteiligung an Anti-Terror-Operationen, die sie auf unserem Gebiet durchführen wollen. Sollen wir zustimmen?"
 israel.122.a: "Das würde unsere Herrschaft legitimieren."
 israel.122.b: "Wir werden niemals mit den Zionisten zusammenarbeiten!"
 israel.123.t: "Die palästinensischen Sicherheitsdienste haben der Aufgabenteilung zugestimmt!"
 israel.123.d: "Es wurde eine Einigung erzielt, eine Anti-Terror-Aktion im Westjordanland zu beginnen. Jetzt müssen wir koordinieren und schnell handeln."
 israel.123.a: "Großartig!"
 israel.124.t: "Abbas lehnt Beteiligung an Anti-Terror-Operationen ab!"
 israel.124.d: "Die Regierung im Westjordanland hat jegliche Zusammenarbeit mit uns selbst angesichts einer terroristischen Bedrohung auf ihrem Boden abgelehnt. Sie will nicht mit unserem Land kooperieren."
 israel.124.a: "Pah!"
 theymayrej_pal_tt: "Falls §Y[PAL.GetNamewithFlag]§! §Gunseren Vorschlag§! §Rablehnt§!, wird dieser §YFokus§! §Ynicht abgeschlossen§! und wir §Gkehren zu anderen Optionen zurück§!!"
 pal_rejected_conter: "Palästina hat den Vorschlag zur Zusammenarbeit bei der Terrorismusbekämpfung abgelehnt."
 israel.125.t: "Das Maptash liefert Ausrüstung für die Anti-Terror-Operation!"
 israel.125.d: "Israel schickt uns Ausrüstung, damit wir auf die künftige Operation vorbereitet sind."
 israel.125.a: "Wir freuen uns über ihre Unterstützung."
 coract_gaz_tt: "§YWir werden entscheiden müssen, welchen Kurs wir in Gaza einschlagen...§!"
 israel.126.t: "Israel schlägt eine Hudna vor!"
 israel.126.d: "Kürzlich, nach unserer Übernahme Gazas, trat die israelische Regierung mit dem Vorschlag an uns heran, die Blockade im Austausch gegen einen langfristigen Waffenstillstand aufzuheben. Außerdem verspricht sie Investitionen in unsere Wirtschaft, falls wir zustimmen. Was sollen wir tun?"
 israel.126.a: "Wieder so eine idiotische zionistische Verschwörung!"
 israel.126.b: "Zuerst das Geld, meine Herren..."
 hudna_accept: "Gaza hat die Hudna akzeptiert!"
 hudna_notaccept: "Gaza hat die Hudna abgelehnt!"
 hudna_whatdo_tt: "Wir werden §Yeinen Brief§! an §R[HAM.GetNamewithFlag]§! mit einem §Ywirtschaftlichen und politischen Vorschlag§! schicken.\n\n§6Das wird über das Schicksal des Gazastreifens entscheiden...§!"
 israel.127.t: "[HAM.GetNamewithFlag] lehnt ab!"
 israel.127.d: "[HAM.GetNamewithFlag] hat unseren politisch-wirtschaftlichen Vorschlag abgelehnt und wird unter keinen Umständen mit uns kooperieren.\n\nEs gibt offenbar keine Verhandlungen mit ihnen..."
 israel.127.a: "Pech für sie."
 israel.128.t: "[HAM.GetNamewithFlag] akzeptiert!"
 israel.128.d: "Überraschenderweise hat [HAM.GetNamewithFlag] unseren Vorschlag angenommen und wird mit uns kooperieren, trotz ihrer früheren feindseligen Erklärungen.\n\nDas Leben ist überraschend, nicht wahr?"
 israel.128.a: "Es hat tatsächlich funktioniert?"
