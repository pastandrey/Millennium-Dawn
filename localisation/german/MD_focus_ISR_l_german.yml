 israel.117.t: "Religiös-zionistische Rabbiner protestieren gegen das Gesetz!"
 israel.117.d: "Kürzlich haben viele religiös-zionistische Führer gegen das Gesetz protestiert und Bewegungen gegen die Regierung unterstützt. Was sollen wir tun?"
 israel.117.a: "Die Rabbiner nicht beleidigen."
 israel.117.b: "Empörung über ihre Einmischung in die Politik entfachen!"
 israel.118.t: "Aufrufe zur Meuterei gegen das Gesetz!"
 israel.118.d: "Viele Demonstranten in Israel rufen zu einer Meuterei gegen das Abkopplungsgesetz auf. Sie wollen bestimmte Rücknahmeakte ohne Zustimmung der Regierung durchführen. Was sollen wir tun?"
 israel.118.a: "Diejenigen bestrafen, die das Gesetz moralisch verachten!"
 israel.118.b: "Erlauben, dass sie sich während der Abkopplung zurückhalten"
 israel.119.t: "Parlamentsmitglieder fordern ein Referendum über den Plan!"
 israel.119.d: "Viele Mitglieder der Knesset schlagen ein neues Referendum über den Abkopplungsplan vor. Sollen wir eines durchführen?"
 israel.119.a: "Das Volk hat uns ein Mandat zum Regieren gegeben!"
 israel.119.b: "Mit dem Obersten Gericht kippen."
 wemaypiss_people_but_money_tt: "Wir werden die Siedlungen von §G[ISR.GetNamewithFlag]§! aus §R[HAM.GetNamewithFlag]§! evakuieren und dadurch die §RGeldausgaben§! für die §YUnterstützung von Siedlungen§! in §R[HAM.GetNamewithFlag]§! §Gsenken§!.\n\n§YAllerdings§! könnten §Yviele Gruppen§! diese §YEntscheidung§! §Rnicht besonders unterstützen§!."
