 israel.149.t: "Die Frage der Histadrut"
 israel.149.d: "Unsere Partei ist seit Langem ein Unterstützer verschiedener Gewerkschaften, der sogenannten Histadruts, in unserem Land. Ihr Einfluss ist jedoch in jüngster Zeit durch gesellschaftlich-politische Umstände erheblich zurückgegangen.\n\nDie Frage ist also: Sollen wir den erneuten Aufstieg der Histadruts unterstützen, oder sollten wir uns eher auf die neu entstehende Hightech-Industrie stützen, mit der wir produktive Beziehungen aufbauen könnten?"
 israel.149.a: "Lasst uns den früheren Ruhm der Gewerkschaften wiederherstellen!"
 israel.148.b: "Die Geistlichen auf unsere Seite ziehen."
