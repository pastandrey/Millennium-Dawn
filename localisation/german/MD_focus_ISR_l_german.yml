 ISR_united_party_desc: "Der Moment ist gekommen, in dem die beiden linken Parteien einfach zu einer Einheit verschmelzen müssen. Allein werden uns die rechten Parteien schlagen, aber gemeinsam können wir einen populären zionistischen Staat erschaffen!"
