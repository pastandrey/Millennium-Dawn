 ISR_assassinate_soleimani: "Operation Schlangenkopf"
 ISR_assassinate_soleimani_desc: "Qasem Soleimani ist derzeit unsere größte Bedrohung im Nahen Osten. Wir sollten gemeinsam mit den Vereinigten Staaten eine Operation durchführen, um ihn zu neutralisieren."
 ISR_sayeret_drill: "Sayeret-Matkal-Übungen"
 ISR_sayeret_drill_desc: "Wir sollten gemeinsam mit unserem engsten Verbündeten, den Vereinigten Staaten, trainieren und lernen – besonders angesichts ihrer Erfahrung in der urbanen Kriegsführung, die uns sehr helfen kann, falls wir mit Gaza in den Krieg ziehen."
 ISR_prepare_maneuvers: "Auf Massenmanöver vorbereiten"
