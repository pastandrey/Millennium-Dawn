 israel_economy.67.a: "Egh."
 israel_economy.68.t: "Israel bietet wirtschaftliche Zusammenarbeit an!"
 israel_economy.68.d: "Israel hat beschlossen, uns zu kontaktieren und eine für beide Seiten vorteilhafte wirtschaftliche Zusammenarbeit anzubieten. Sollen wir zustimmen?"
 israel_economy.68.a: "Sicher!"
 israel_economy.68.b: "Nein, danke."
 israel_economy.69.t: "[From.GetName] akzeptiert."
 israel_economy.69.d: "Sie haben unser Angebot angenommen!"
