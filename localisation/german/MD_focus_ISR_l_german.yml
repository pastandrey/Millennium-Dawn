 israel_economy.32.d: "Sie haben unserem Angebot nicht zugestimmt."
 israel_economy.32.a: "Sehr bedauerlich."
 israel_economy.33.t: "Diplomatisches Treffen Israel-[BRM.GetName]"
 israel_economy.33.d: "Myanmar und Israel haben sich kürzlich zu einem diplomatischen Treffen zusammengefunden, das einen bemerkenswerten Schritt zur Stärkung der bilateralen Beziehungen zwischen den beiden Nationen darstellt. Das Treffen, das von Herzlichkeit und gegenseitigem Respekt geprägt war, umfasste Gespräche über eine Vielzahl von Themen, die diplomatische, wirtschaftliche und technologische Zusammenarbeit einschließen. Beide Länder bekundeten ein starkes Interesse daran, die Zusammenarbeit in verschiedenen Bereichen wie Landwirtschaft, Verteidigung und Gesundheitswesen auszubauen. Dieser diplomatische Austausch unterstreicht das Engagement Myanmars und Israels, engere Beziehungen zu fördern und in den kommenden Jahren Wege für für beide Seiten vorteilhafte Partnerschaften zu erkunden."
 israel_economy.33.a: "Großartig!"
 israel_economy.34.t: "Verhandlungen über OECD-Unterstützung"
 israel_economy.34.d: "Die OECD hat unseren Unterstützungsvorschlag angenommen. Nun müssen wir wählen, worum wir sie bitten wollen."
 israel_economy.34.a: "Bildungsunterstützung"
 israel_economy.34.b: "Wirtschaftliche Unterstützung"
 israel_economy.34.c: "Soziale Unterstützung"
