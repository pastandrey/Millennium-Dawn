 israel.coalition.0.t: "Unser zufriedener Partner"
 israel.coalition.0.d: "Unser Partner war mit der Politik zufrieden, die wir umgesetzt haben, trotz der Meinungsverschiedenheiten innerhalb seiner Partei. Jetzt ist unsere Regierung etwas stabiler als zuvor."
 israel.coalition.0.a: "Gut"
 israel.coalition.1.t: "Liebermans Minister sind zurückgetreten!"
 israel.coalition.1.d: "Liebermans Team ist von allen Regierungsposten zurückgetreten und hat sich offiziell aus der Regierung zurückgezogen. Die Stabilität unserer Regierung wurde untergraben, und wir müssen dringend Ersatz für diese Positionen finden."
 israel.coalition.1.a: "Bastarde!"
