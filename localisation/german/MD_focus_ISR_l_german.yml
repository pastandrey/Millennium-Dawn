 israel_likud.5.t: "Ein Antrag auf Immunität"
 israel_likud.5.d: "Premierminister Netanjahu hat angesichts der Vorwürfe gegen ihn vor Gericht beim Sprecher der Knesset einen Antrag auf Immunität gestellt. Die Knesset wird nun entscheiden müssen, ob Benjamin Netanjahu Immunität gewährt wird oder nicht."
 israel_likud.5.a: "Meint er das ernst?"
 israel_likud.6.t: "Die Partei stimmt zu"
 israel_likud.6.d: "Likud-Abgeordnete unterstützten Netanjahus Antrag und forderten, so schnell wie möglich ein Entscheidungskomitee einzusetzen."
 israel_likud.6.a: "Großartig!"
 israel_likud.7.t: "Die Partei lehnt ab"
 israel_likud.7.d: "Likud-Abgeordnete kritisierten Netanjahus Antrag und forderten, den Antrag abzulehnen."
 israel_likud.7.a: "Auf keinen Fall!"
 israel_likud.8.t: "Die Koalition unterstützt uns"
 israel_likud.8.d: "Unsere Koalitionspartner unterstützten den Antrag und forderten, so schnell wie möglich ein Entscheidungskomitee einzusetzen."
 israel_likud.8.a: "Wahre Freunde!"
 israel_likud.9.t: "Die Koalition unterstützt uns"
 israel_likud.9.d: "Unsere Koalitionspartner lehnten den Antrag ab und forderten seine Zurückweisung."
 israel_likud.9.a: "Verräter!"
 israel_likud.10.t: "Die Menschen sind wütend!"
 israel_likud.10.d: "Die Nachricht über den Antrag hat sich in ganz Israel verbreitet und in der Bevölkerung Unmut ausgelöst. Die Opposition organisiert Kundgebungen gegen die Anhörungen und fordert den Rückzug des Antrags."
 israel_likud.10.a: "Sie verstehen es nicht!"
 israel_likud.11.t: "Der Erste Kanal schweigt"
 israel_likud.11.d: "Dank der Reform des Ersten Kanals entschieden sich seine Reporter, den Antrag auf Immunität nicht zu behandeln, wodurch keine große öffentliche Aufmerksamkeit entstand."
 israel_likud.11.a: "Gut."
 israel_likud.12.t: "Bericht des Ersten Kanals"
 israel_likud.12.d: "Der Bericht von Kanal Eins über den Antrag löste starke Emotionen in der Bevölkerung aus und verstärkte damit den Groll oppositionell eingestellter Bürger sowie den Widerstand der Opposition gegen den Antrag."
 israel_likud.12.a: "Eine Katastrophe."
 israel_likud.13.t: "Der Antrag wird angenommen!"
 israel_likud.13.d: "Trotz aller Widersprüche und des Widerstands der Opposition wurde das zuständige Komitee eingesetzt. Im Ergebnis der Sitzung beschloss das Komitee, dem Premierminister Immunität zu gewähren."
 israel_likud.13.a: "Ein Sieg für Israel!"
 israel_likud.14.t: "Der Antrag wird abgelehnt!"
 israel_likud.14.d: "Trotz aller Versuche entschied der Vorsitzende, kein Komitee zu bilden und Netanjahu keine Immunität zu gewähren."
 israel_likud.14.a: "Katastrophe!"
 israel_likud.15.t: "Die Hexenjagd"
 israel_likud.15.d: "Netanjahus Korruptionsermittlung ist erneut in den Medien. Sie behaupten, Benjamin besitze mit Staatsgeldern erworbene Auslandsimmobilien in großem Umfang. Netanjahu erklärte jedoch, dass nichts davon wahr sei und die Medien eine Hexenjagd betreiben."
 israel_likud.15.a: "Genau das ist es!"
 israel_likud.16.t: "Die Proteste!"
 israel_likud.16.d: "Menschen, die mit unserer Justizreform unzufrieden sind, gingen heute in den städtischen Zentren auf die Straße. Die Demonstranten fordern ein Ende des Gesetzgebungsverfahrens, und einige Radikalisierte verlangen den Rücktritt der Regierung."
 israel_likud.16.a: "Liberale!"
 israel_likud.17.t: "Massendesertionen"
 israel_likud.17.d: "Wir erhalten Berichte, dass viele mobilisierte und eingezogene Männer aus Protest gegen unser Gesetz massenhaft aus der Armee desertieren. Sie behaupten, ihrer Pflicht nicht nachkommen zu wollen, wenn die Justizreform nicht gestoppt wird."
 israel_likud.17.a: "Das ist nicht gut"
 israel_likud.18.t: "Sorgen im Verteidigungsministerium"
 israel_likud.18.d: "Unser Verteidigungsminister ist wegen der Lage rund um die Justizreform sehr besorgt. Er sagte, ein weiteres Vorantreiben des Gesetzes bedrohe die nationale Sicherheit des Landes und könne unvorhersehbare Folgen haben, weshalb wir einen Rückzieher machen müssten."
 israel_likud.18.a: "Er hat recht, Rückzug!"
 israel_likud.18.b: "Feuert ihn!"
 israel_likud.19.t: "Der Millionen-Protest"
 israel_likud.19.d: "Tel Aviv dröhnt von den Rufen der Massen, die gegen die Justizreform auf die Straße gegangen sind. Die Demonstranten fordern den Rücktritt der Regierung und ein Ende des Reformverfahrens. Die Lage ist äußerst gefährlich, die Menschen radikalisieren sich immer weiter und unser Handlungsspielraum wird immer kleiner. Wir können die Reform stoppen – dann haben wir eine Chance, unsere Regierung zu retten – oder wir müssen die Proteste niederschlagen, aber das könnte sehr ernste Folgen haben."
 israel_likud.19.a: "Zu riskant, Rückzug!"
 israel_likud.19.b: "Die Polizei wird sich um sie kümmern."
 israel_likud.20.t: "Ziviler Ungehorsam"
 israel_likud.20.d: "Wir verzeichnen im ganzen Land, insbesondere in Tel Aviv, Akte des zivilen Ungehorsams. Die liberale Opposition hat eine Übergangsregierung organisiert und ruft ihre Anhänger dazu auf, sich zu bewaffnen und die Regierung zu stürmen, da wir ihrer Ansicht nach nicht länger legitim sind. Rechtsradikale beschuldigten Netanjahu der Ohnmacht und Schwäche und übernahmen mit Hilfe interner Kräfte die Macht. Nun ist die Lage eskaliert und es gibt kein Zurück mehr – nur Blutvergießen erwartet uns."
 israel_likud.20.a: "Wir sind bereit!"
 israel_likud.0.t: "Netanjahus Rede vor Gericht!"
 israel_likud.0.d: "In einer jüngsten Erklärung sagte der israelische Premierminister Benjamin Netanjahu, der Korruptionsskandal um ihn sei nichts weiter als ein Täuschungsmanöver, das geschaffen wurde, um seinen Ruf zu beschädigen."
 israel_likud.0.a: "Es war nichts, es ist nichts, es wird nichts sein!"
 israel_likud.1.t: "Israelische Medien entfesseln einen Skandal!"
 israel_likud.1.d: "Kürzlich veröffentlichten israelische Medien einen skandalösen Bericht über Premierminister Benjamin Netanjahu, in dem sie ihm korrupte Geschäfte, unethisches Verhalten und die Verschwendung des Staatshaushalts für sinnlose Ausgaben vorwerfen."
 israel_likud.1.a: "Idioten!"
 israel_likud.2.t: "Also, ist er sauber?"
 israel_likud.2.d: "Medien berichten, dass sie im Fall Netanjahu und im Korruptionsskandal nichts Neues aufdecken konnten. Es ist nicht bekannt, ob dieser Zustand anhalten wird oder ob sich alles in eine völlig andere Richtung entwickeln wird."
 israel_likud.3.t: "Netanjahu unterwirft die Likud-Partei!"
 israel_likud.3.d: "Netanjahu war in der Lage, den Likud vollständig in seine persönliche Partei umzuwandeln und alle innerparteilichen Machtzirkel zu unterwerfen, wodurch er einen Kreis von Loyalisten und Jasagern um sich schuf."
 israel_likud.3.a: "Chuzpe trägt ihre Früchte..."
 israel_likud.4.t: "Netanjahu hat eine neue Koalition gebildet!"
 israel_likud.4.d: "Netanjahu bildet eine neue Koalition rechter Parteien unter dem Schutz der Likud-Partei. Die neue Bewegung vereint alle rechten zionistischen Bewegungen in einem einzigen Block."
 israel_likud.4.a: "Fürchtet uns, Liberale!"
 israel_likud.2.a: "Ha!"
 israel_likud.21.t: "Bibismus"
 israel_likud.21.d: "Netanjahu ist seit langer Zeit Premierminister. In dieser Zeit haben seine Politik und auch die Likud-Partei selbst bedeutende Veränderungen durchlaufen und sich von gemäßigtem Konservatismus zu rechtspopulistischer Rhetorik bewegt. Zusammen mit Netanjahus Anklagen in Korruptionsskandalen verliert seine Partei rasch Unterstützung unter moderaten Wählern, doch Netanjahus Image als „Kämpfer gegen den Elitismus“ und seine politische Radikalisierung machen Bibi für rechte und anti-establishment-orientierte Wähler deutlich attraktiver. Vielleicht erleben wir gerade eine neue Ära des israelischen politischen Systems und des Likud selbst."
 israel_likud.21.a: "Der große Wandel."
 israel_likud.22.t: "Weltweiter Populismus"
 israel_likud.22.d: "Unsere Gegner verwenden bei ihrer Kritik an uns das Wort Populismus. Sie sagen, wir könnten nur Versprechungen machen und verließen uns nur auf leere Worte. Für uns bedeutet Populismus jedoch Politik für das Volk. Unsere Regierung vertritt nicht die Interessen einer kleinen Elite, sondern die Interessen des gewöhnlichen Israelis, der an der Bewahrung seiner Kultur und Traditionen interessiert ist.\n Unsere Erfahrung wird jedoch auch in anderen Ländern wahrgenommen; unsere Ideen verbreiten sich unter Gruppen, die sich früher antisemitisch nannten, jetzt aber erkennen, dass es das jüdische Volk ist, das die wahre rechte Ideologie und Traditionen trägt.\n Und wir werden weiterhin ihre Augen öffnen, wir werden jede Bewegung unterstützen, die die Idee des Rechtspopulismus unterstützt und sich für bessere Beziehungen zu Israel einsetzt."
 israel_likud.22.a: "Das populistische Zeitalter."
 israel_likud.23.t: "Der Aufstieg des europäischen Populismus"
 israel_likud.23.d: "Vor dem Hintergrund weltweiter Ereignisse gewinnen neue ideologische Parteien in ganz Europa an Popularität. Angesichts der Unzufriedenheit der Menschen mit der wirtschaftlichen Lage der europäischen Länder, dem Rückgang der Kaufkraft und der Unzufriedenheit mancher Menschen mit der Einwanderungspolitik betreten rechtspopulistische und euroskeptische Parteien die politische Bühne. Indem sie mit den Gefühlen der Menschen spielen, gewinnen diese Parteien rasch an Unterstützung, was manche Länder als Bedrohung für Demokratie und europäische Einheit betrachten."
 israel_likud.23.a: "Das populistische Zeitalter."
 israel_likud.24.t: "Der Aufstieg des polnischen Populismus"
 israel_likud.24.d: "Recht und Gerechtigkeit gewinnt an Popularität, indem es eine rechtspopulistische Plattform übernimmt. Auch wenn es sich um eine etablierte Partei handelt, hindert sie das nicht daran, aus Netanjahus Erfahrungen zu lernen und eine populistische Plattform zu übernehmen, die die Massen anspricht."
 israel_likud.24.a: "Das populistische Zeitalter."
 israel_likud.25.t: "Der Aufstieg des ungarischen Populismus"
 israel_likud.25.d: "Orbáns Partei gewinnt an Popularität, indem sie eine rechtspopulistische Plattform übernimmt. Auch wenn es sich um eine etablierte Partei handelt, hindert sie das nicht daran, Netanjahus Erfahrungen zu übernehmen und eine populistische Plattform anzuwenden, die die Massen anspricht."
 israel_likud.25.a: "Das populistische Zeitalter."
 israel_likud.26.t: "Der Aufstieg des amerikanischen Populismus"
 israel_likud.26.d: "Die Republikanische Partei erlebt tiefgreifende Veränderungen. Der wirtschaftliche Abschwung und die Migrationspolitik sorgen unter den amerikanischen Wählern für Unzufriedenheit und schaffen einen idealen Nährboden für das Aufkommen populistischer Bewegungen. Vor dem Hintergrund der Popularität von Bernie Sanders’ linkspopulistischen Ideen innerhalb der demokratischen Wählerschaft entstehen in der Republikanischen Partei Politiker, die eine rechtspopulistische Agenda vertreten. Nur die Zeit wird zeigen, ob populistische Politiker im politischen System der USA Erfolge erzielen können."
 israel_likud.27.t: "Netanjahus Besuch"
 israel_likud.27.d: "Kürzlich reiste Premierminister Benjamin Netanjahu nach Washington, D.C., wo er sich mit führenden Mitgliedern der Republikanischen Partei traf. Im Ergebnis des Treffens bekräftigten die Republikaner ihren Beitrag zum israelischen Kampf um das Existenzrecht und versprachen ihre Unterstützung unter einer republikanischen Regierung. Es ist klar, dass Netanjahu versucht, die Republikaner dafür zu gewinnen, für israelische Interessen zu werben, um zusätzliche militärische und politische Unterstützung zu erhalten."
 israel_likud.27.a: "Interessant."
 israel_likud.28.t: "Treffen mit dem republikanischen Establishment"
 israel_likud.28.d: "Wir haben uns in Washington mit hochrangigen Mitgliedern der Republikanischen Partei getroffen. Im Ergebnis des Treffens bekräftigten die Republikaner ihre Anerkennung des Kampfes des israelischen Volkes für das Recht, in seinem Land zu leben, und versicherten, dass Israel unter ihrer Regierung mit verstärkter militärischer und politischer Unterstützung rechnen könne."
 israel_likud.28.a: "Unsere größten Freunde."
 israel_likud.29.t: "Netanjahus Besuch in Moskau"
 israel_likud.29.d: "Der israelische Premierminister Benjamin Netanjahu ist in Moskau eingetroffen, um sich mit unserer Regierung zu treffen. Im Ergebnis des Treffens gelangten wir zu gegenseitigem Verständnis und schlossen mehrere für beide Seiten vorteilhafte Verträge ab."
 israel_likud.29.a: "Was für ein schönes Treffen!"
 israel_likud.30.t: "Treffen mit der russischen Führung"
 israel_likud.30.d: "Wir trafen uns in Moskau mit hochrangigen russischen Beamten. Im Ergebnis des Treffens sicherten wir uns vorteilhafte Vereinbarungen und stärkten die russisch-israelische Freundschaft."
 israel_likud.30.a: "Was für ein schönes Treffen!"
 israel_likud.31.t: "Netanjahus Besuch in Brasília"
 israel_likud.31.d: "Der israelische Premierminister Benjamin Netanjahu ist in Brasília eingetroffen, um unseren Präsidenten zu treffen. Im Ergebnis des Treffens gelangten wir zu gegenseitigem Verständnis und sicherten mehrere für beide Seiten vorteilhafte Investitionsprojekte."
 israel_likud.31.a: "Was für ein schönes Treffen!"
 israel_likud.32.t: "Treffen mit Bolsonaro"
 israel_likud.32.d: "Wir trafen den brasilianischen Präsidenten Bolsonaro in Brasília. Im Ergebnis des Treffens sicherten wir uns vorteilhafte Investitionsprojekte und stärkten die brasilianisch-israelische Freundschaft."
 israel_likud.32.a: "Was für ein schönes Treffen!"
 israel_likud.33.t: "Netanjahus offizieller Besuch"
 israel_likud.33.d: "Premierminister Netanjahu ist in Washington eingetroffen, um unseren Präsidenten zu treffen. Die israelische Seite wünscht unsere Unterstützung, und Benjamin Netanjahu erinnerte zudem an das Versprechen der Republikanischen Partei, die Militärhilfe für Israel zu erhöhen."
 israel_likud.33.a: "Sie können nur unsere politische Unterstützung erhalten."
 israel_likud.33.b: "Wir können ihnen wirtschaftliche Unterstützung geben."
 israel_likud.33.c: "Wir werden unser Versprechen erfüllen."
 israel_likud.33.e: "Wir können euch derzeit in keiner Weise helfen."
 israel_likud.34.t: "Ergebnisse unseres Besuchs"
 israel_likud.34.d: "Als Ergebnis unseres offiziellen Besuchs konnten wir lediglich politische Unterstützung vereinbaren."
 israel_likud.34.a: "Besser als nichts."
 israel_likud.35.t: "Ergebnisse unseres Besuchs"
 israel_likud.35.d: "Als Ergebnis des offiziellen Besuchs konnten wir keine militärische Unterstützung erhalten, aber die amerikanische Seite bot an, einige vorteilhafte Investitionsprojekte zu unterzeichnen."
 israel_likud.35.a: "Ein lohnender Deal."
 israel_likud.36.t: "Ergebnisse unseres Besuchs"
 israel_likud.36.d: "Als Ergebnis unseres offiziellen Besuchs konnten wir eine Einigung erzielen und uns militärische sowie politische Unterstützung sichern."
 israel_likud.36.a: "Hurra!"
 israel_likud.37.t: "Ergebnisse unseres Besuchs"
 israel_likud.37.d: "Als Ergebnis unseres offiziellen Besuchs konnten wir keine Verständigung erreichen. Daher kehrten wir mit leeren Händen zurück."
 israel_likud.37.a: "Was für ein Desaster!"
 israel_likud.38.t: "Gast aus Israel"
 israel_likud.38.d: "Der israelische Premierminister Benjamin Netanjahu ist zu einem offiziellen Besuch in Budapest eingetroffen. Während seines Besuchs lobte Netanjahu unser Engagement für den Erhalt konservativer Werte und Traditionen und bot uns außerdem seine politische und wirtschaftliche Unterstützung an."
 israel_likud.38.a: "Wir nehmen sie gerne an."
 israel_likud.38.b: "Wir brauchen eure Hilfe nicht wirklich."
 israel_likud.39.t: "Erfolg!"
 israel_likud.39.d: "Unser Besuch war ein Erfolg, und wir konnten die ungarische Regierung davon überzeugen, unsere Unterstützung anzunehmen."
 israel_likud.39.a: "Neuer Verbündeter."
 israel_likud.40.t: "Scheitern!"
 israel_likud.40.d: "Unser Besuch endete mit einem Fehlschlag; wir konnten die ungarische Regierung nicht davon überzeugen, unsere Unterstützung anzunehmen."
 israel_likud.40.a: "Was für eine Schande!"
 israel_likud.41.t: "Eine Nachricht aus Israel"
 israel_likud.41.d: "Wir haben eine Nachricht von der israelischen Regierung erhalten. Sie sind besorgt über unsere Haltung zur Frage der Beteiligung des polnischen Volkes am Holocaust am jüdischen Volk und verlangen eine offizielle Klarstellung in dieser Angelegenheit."
 israel_likud.41.a: "Wir sind beide Opfer des größten Schreckens."
 israel_likud.41.b: "Kein einziger Pole war am Holocaust an den Juden beteiligt!"
 israel_likud.42.t: "Eine Nachricht"
 israel_likud.42.d: "Wir haben eine Antwort von der polnischen Regierung erhalten. Sie erkannten an, dass der Holocaust am jüdischen Volk eine Katastrophe war, sehen jedoch keine eigene Beteiligung der Polen daran. Die polnische Regierung erklärte außerdem, dass das polnische und das jüdische Volk schreckliches Leid durchlebt hätten und wir gemeinsam die Erinnerung an die Verbrechen der Nazis wachhalten müssten."
 israel_likud.42.a: "Vielleicht haben sie recht."
 israel_likud.43.t: "Eine Nachricht"
 israel_likud.43.d: "Wir haben eine Antwort von der polnischen Regierung erhalten, und sie erkannten an, dass der Holocaust am jüdischen Volk eine Katastrophe war, erklärten jedoch, dass die Beteiligung des polnischen Volkes daran Fake News sei und dass das polnische Volk selbst unter dem Nazi-Regime gelitten habe. Sie erklärten außerdem, dass Behauptungen über eine Beteiligung des polnischen Volkes am Völkermord eine Herabwürdigung der Würde des Volkes seien."
 israel_likud.43.a: "Wie können sie es wagen!?"
 israel_likud.44.t: "Ein interessanter Vorschlag"
 israel_likud.44.d: "Die Regierung Israels hat uns einen interessanten Vorschlag unterbreitet. Sie bietet uns an, ein Abkommen zu schließen, durch das die Registrierung ziviler Ehen in Zypern in Israel als legal anerkannt wird."
 israel_likud.44.a: "Gebt mir sofort einen Stift!"
 israel_likud.44.b: "Wir lehnen höflich ab"
 israel_likud.45.t: "Zypern-Regelung"
 israel_likud.45.d: "Wir konnten erfolgreich eine Vereinbarung mit der Regierung Zyperns abschließen."
 israel_likud.45.a: "Gut für sie."
 israel_likud.46.t: "Scheitern!"
 israel_likud.46.d: "Die Regierung Zyperns hat unseren Vorschlag abgelehnt."
 israel_likud.46.a: "Schlecht für sie."
 israel_likud.47.t: "Das EU-Israel-Assoziierungsabkommen"
 israel_likud.47.d: "Die Regierung Israels hat uns ein Assoziierungsabkommen angeboten. Es enthält eine große Zahl von Handels- und politischen Vereinbarungen sowie die Einrichtung spezieller Ausschüsse zur Diskussion und Koordinierung der Politik in der Region."
 israel_likud.47.a: "Wir nehmen sie gerne an."
 israel_likud.47.b: "Wir sind nicht interessiert."
 israel_likud.48.t: "Das EU-Israel-Assoziierungsabkommen ist unterzeichnet!"
 israel_likud.48.d: "Die Vertreter der EU haben unserem Vorschlag für ein Assoziierungsabkommen zugestimmt!"
 israel_likud.48.a: "Erfolg!"
 israel_likud.49.t: "Scheitern..."
 israel_likud.49.d: "Die Vertreter der EU haben unseren Vorschlag für ein Assoziierungsabkommen abgelehnt!"
 israel_likud.49.a: "Schande über sie!"
 israel_likud.50.t: "Das US-Israel-Assoziierungsabkommen"
 israel_likud.50.d: "Die Regierung Israels hat uns ein Assoziierungsabkommen angeboten. Es enthält eine große Zahl von Handels- und politischen Vereinbarungen sowie die Einrichtung spezieller Ausschüsse zur Diskussion und Koordinierung der Politik in der Region."
 israel_likud.50.a: "Wir nehmen sie gerne an."
 israel_likud.50.b: "Wir sind nicht interessiert."
 israel_likud.51.t: "Das US-Israel-Assoziierungsabkommen ist unterzeichnet"
 israel_likud.51.d: "Die Vertreter der USA haben unserem Vorschlag für ein Assoziierungsabkommen zugestimmt!"
 israel_likud.51.a: "Erfolg!"
 israel_likud.52.t: "Scheitern..."
 israel_likud.52.d: "Die Vertreter der USA haben unseren Vorschlag für ein Assoziierungsabkommen abgelehnt!"
 israel_likud.52.a: "Schande über sie!"
 israel_likud.53.t: "Ein Vorschlag aus Israel"
 israel_likud.53.d: "Die israelische Regierung möchte unseren Anteil am Rat der Handelshäfen verstaatlichen und bietet uns dafür eine Entschädigung an."
 israel_likud.53.a: "Ein lohnender Deal."
 israel_likud.53.b: "Wir sind nicht interessiert."
 israel_likud.54.t: "Erfolg!"
 israel_likud.54.d: "Die EU hat zugestimmt, uns ihren Anteil zu verkaufen!"
 israel_likud.54.a: "Gut für uns."
 israel_likud.55.t: "Scheitern!"
 israel_likud.55.d: "Die EU hat unseren Vorschlag abgelehnt, uns ihren Anteil zu verkaufen!"
 israel_likud.55.a: "So ist es nun einmal."
 israel_likud.55.b: "Dann werden wir ihn mit Gewalt nehmen!"
 israel_likud.56.t: "Die gewaltsame Übernahme!"
 israel_likud.56.d: "Die israelische Regierung hat unter Verletzung aller Vereinbarungen unseren Anteil am Rat übernommen!"
 israel_likud.56.a: "Arschlöcher!"
 israel_likud.57.t: "Ein Vorschlag aus Israel"
 israel_likud.57.d: "Die israelische Regierung möchte unseren Anteil am Rat der Handelshäfen verstaatlichen und bietet uns dafür eine Entschädigung an."
 israel_likud.57.a: "Ein lohnender Deal."
 israel_likud.58.t: "Erfolg!"
 israel_likud.58.d: "Die USA haben zugestimmt, uns ihren Anteil zu verkaufen!"
 israel_likud.58.a: "Gut für uns."
 israel_likud.59.t: "Scheitern!"
 israel_likud.59.d: "Die USA haben unseren Vorschlag abgelehnt, uns ihren Anteil zu verkaufen!"
 israel_likud.59.a: "So ist es nun einmal."
 israel_likud.59.b: "Dann werden wir ihn mit Gewalt nehmen!"
 israel_likud.60.t: "Die gewaltsame Übernahme!"
 israel_likud.60.d: "Die israelische Regierung hat unter Verletzung aller Vereinbarungen unseren Anteil am Rat übernommen!"
 israel_likud.60.a: "Arschlöcher!"
 israel_likud.61.t: "Ärger im Paradies"
 israel_likud.61.d: "Die jüngsten Ereignisse im Gazastreifen und der Umgang der Regierung mit ihnen haben innerhalb des Likud heftige Kontroversen ausgelöst. Parteichef Ariel Sharon und seine gemäßigten Unterstützer kündigten ihren Austritt aus der Partei und die Gründung einer neuen politischen Partei, Kadima, an. Sharons Platz wurde von seinem politischen Rivalen Benjamin Netanjahu eingenommen. Auch wenn Kadima recht gute Chancen hat, ihre Stellung in der Knesset zu behaupten, ändert dies nichts daran, dass Ariel Sharons Stellung in der politischen Landschaft äußerst wackelig geworden ist."
 israel_likud.61.a: "Hoffen wir, dass £ISR_liberalism_alt1 Kadima eine Zukunft hat."
 israel_likud.61.b: "Schwerer Schaden für die Regierung"
 israel_likud.63.t: "Ärger im Paradies"
 israel_likud.63.d: "Ariel Sharons sich verschlechternder Gesundheitszustand erlaubt es ihm nicht mehr, das Amt des Premierministers auszuüben, und sein Rücktritt kam nicht überraschend, erschütterte jedoch die Position der neu gegründeten Partei schwer. Ehud Olmert hat das Amt des Premierministers übernommen, aber seine niedrigen Zustimmungswerte in der Bevölkerung lassen keine Hoffnung auf eine rosige Zukunft der neuen Regierung aufkommen."
 israel_likud.63.a: "Für Olmert sieht es düster aus."
 israel_likud.64.t: "Die Führungswahl"
 israel_likud.64.d: "Die Wahl des Parteivorsitzenden von Kadima steht unmittelbar bevor, und Olmerts Position wird zunehmend unsicher, während die Möglichkeit seiner Wiederwahl gegen Null sinkt. Wer wird die Partei führen?"
 israel_likud.64.a: "Olmert wird die Partei bis zum Ende führen!"
 israel_likud.64.b: "Der progressive Flügel um Livni wird sich durchsetzen."
 israel_likud.64.c: "Der gemäßigte Flügel um Mofaz wird sich durchsetzen."
 israel_home.1.t: "Die Führungsfrage"
 israel_home.1.d: "Da die Partei faktisch von einem Duo geführt wird, ist die Frage aufgekommen, wer Israels Regierung anführen soll. Viele bevorzugen die Kandidatur von Ayelet Shaked, die sich für eine stärkere Beteiligung religiöser Frauen am Nationaldienst einsetzt, doch ein großer Teil der Partei unterstützt auch Naftali Bennett, einen Befürworter maximaler Nichteinmischung in die Wirtschaft."
 israel_home.1.a: "Naftali wird Premierminister"
 israel_home.1.b: "Ayelet Shaked wird Premierminister"
