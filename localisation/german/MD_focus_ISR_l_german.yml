 ISR_raid_beit_leiha: "Beit Lahia überfallen"
 israel.101.t: "[ISR.GetNamewithFlag] führt eine erfolgreiche Operation durch!"
 israel.101.d: "Kürzlich hat Israel einen Angriff gegen [HAM.GetNamewithFlag] begonnen und Beit Lahia überfallen.\n\nInfolgedessen wurde der Anführer des Popular Resistance Committee getötet."
 israel.101.a: "Großartig!"
 israel.101.b: "Nehmt ihren Soldaten gefangen!"
 israel.101.c: "Vergeltungsangriff verbieten."
 israel.102.t: "[HAM.GetNamewithFlag] verteidigt Beit Lahia erfolgreich!"
 israel.102.d: "Kürzlich versuchte [ISR.GetNamewithFlag], Beit Lahia anzugreifen und den Anführer des Popular Resistance Committee zu töten. Allerdings scheiterten sie, und [HAM.GetNamewithFlag] ging als Sieger hervor."
 israel.102.b: "Großartig!"
 israel.103.t: "Zusammenstöße zwischen [ISR.GetNamewithFlag] und [HAM.GetNamewithFlag] unentschieden!"
 israel.103.d: "Die Zusammenstöße zwischen den beiden Seiten wurden unterbrochen."
 israel.102.a: "Sehr bedauerlich..."
 israel.104.t: "[HAM.GetNamewithFlag] nimmt unseren Soldaten gefangen!"
 israel.104.d: "Nach den jüngsten Zusammenstößen hat [HAM.GetNamewithFlag] einen Soldaten namens Gilad Schalit gefangen genommen und hält ihn als Geisel."
 israel.104.a: "Mist!"
 ISR_jabel_mukaber_judge: "Urteil über Jabel Mukaber fällen"
 israel.105.t: "Was sollen wir mit Jabel Mukaber tun?"
 israel.105.d: "Jabel Mukaber ist ein überwiegend palästinensisches Viertel im südlichen Ostjerusalem. Es grenzt im Westen an Ost-Talpiot, im Norden an Abu Tor und Silwan und im Süden an Sur Baher.\n\nUnsere Experten behaupten, dass es sich um einen trostlosen Slum handelt, in dem Müll aus den Containern auf die Straßen quillt, ohne Spielplätze und ohne Grünflächen, mit einem Mangel an Klassenräumen und Kindergärten und nur einer Oberschule für Jungen, die erst vor zwei Jahren nach 20 Jahren Bitten der Bewohner eröffnet wurde. Sie zahlen Steuern an den Staat und Grundsteuer an die Gemeinde, scheinen dafür aber nichts Sichtbares zurückzubekommen.\n\nWas sollen wir tun?"
 israel.105.a: "Ihre Frist verlängern."
 israel.105.b: "Ihre Räumung fordern!"
 israel.106.t: "Israel setzt Jabel Mukaber unter Druck!"
