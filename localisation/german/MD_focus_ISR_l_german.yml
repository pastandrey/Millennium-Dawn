 israel.coalition.11.t: "Wahlergebnisse"
 israel.coalition.11.d: "Die Wahlen sind vorbei, jetzt ist es Zeit, Mandate und Ausschüsse zu verteilen."
 israel.coalition.11.a: "Und das erste Gesetz..."
 israel.coalition.12.t: "Wahlergebnisse"
 israel.coalition.12.d: "Keine Partei hat es geschafft, eine Mehrheit in der Knesset zu erringen und eine funktionsfähige Regierung zu bilden. Jetzt müssen wir erneut Wahlen abhalten."
 israel.coalition.12.a: "Oh Mist!"
 israel.coalition.13.t: "Regierungszusammenbruch!"
 israel.coalition.13.d: "Unsere Partner haben die Koalition massenhaft verlassen, was zu einer politischen Krise und dem Zusammenbruch der Regierung geführt hat. Wir werden erneut Wahlen abhalten müssen."
 israel.coalition.13.a: "Politische Krise..."
 israel.knesset.0.t: "Gesetzentwurf wird der Knesset vorgelegt"
 israel.knesset.0.d: "Wir haben den Gesetzentwurf in die Knesset eingebracht. Er wird nun vom zuständigen Ausschuss geprüft. Bald wird er den Abgeordneten vorgestellt und zur Abstimmung eingebracht."
 israel.knesset.0.a: "Wünscht uns Glück!"
 israel.knesset.1.t: "Die Medien haben unseren Gesetzentwurf kritisiert!"
 israel.knesset.1.d: "In vielen verschiedenen Medien erschienen Artikel, die unseren Gesetzentwurf scharf kritisieren. Einige Medien nennen ihn unmenschlich, andere bezeichnen die Verfasser des Gesetzentwurfs als „analphabetische Esel“. Infolgedessen haben sich einige Parlamentarier unserer Fraktion geweigert, für unseren Gesetzentwurf zu stimmen."
 israel.knesset.1.a: "Die wahren Esel sitzen dort!"
 israel.knesset.2.t: "Die Medien unterstützen unseren Gesetzentwurf!"
 israel.knesset.2.d: "In vielen verschiedenen Medien erschienen Artikel, die unseren Gesetzentwurf unterstützen. Viele Medien sprechen positiv über den Entwurf und rufen alle Abgeordneten dazu auf, dafür zu stimmen. Wir haben Gerüchte gehört, dass Mitglieder der Oppositionsfraktionen darüber nachdenken, den Entwurf zu unterstützen."
 israel.knesset.2.a: "Wie überraschend!"
 israel.knesset.3.t: "Diskussion innerhalb der Koalition"
 israel.knesset.3.d: "Unsere Koalitionspartner haben uns ein Paket von Änderungen am Gesetzentwurf vorgelegt. Es enthält eine große Zahl an Anpassungen, von denen sie glauben, dass sie ihrer Wählerschaft und unserem Staat zugutekommen werden. Wenn wir sie nicht umsetzen, könnten unsere Partner gegen den Gesetzentwurf stimmen und unsere Koalition destabilisieren."
 israel.knesset.3.a: "Setzen wir sie um!"
 israel.knesset.3.b: "Unser Gesetz, unsere Regeln!"
 israel.knesset.4.t: "Prüfung durch den zuständigen Ausschuss"
 israel.knesset.4.d: "Der zuständige Ausschuss hat unseren Gesetzentwurf geprüft. Obwohl die Ausschussmitglieder ihn mehrheitlich passieren ließen, baten uns die Oppositionsmitglieder des Ausschusses, zusätzliche Änderungen am Gesetz vorzunehmen und alle von ihnen eingebrachten Anmerkungen zu berücksichtigen. Das könnte den Entwurf für gegnerische Fraktionen attraktiver machen, aber unsere Wählerschaft und unsere Partei könnten mit dem Gesetzentwurf unzufrieden werden."
 israel.knesset.4.a: "Nehmt die Änderungen vor."
 israel.knesset.4.b: "Unser Gesetzentwurf ist bereits perfekt."
 israel.knesset.5.t: "Antrag angenommen!"
 israel.knesset.5.d: "In der Schlussabstimmung wurde unser Gesetzentwurf mit Mehrheit angenommen. Sobald er vom Präsidenten unterzeichnet wurde, wird unser Gesetz offiziell in Kraft treten."
 israel.knesset.5.a: "Wir haben es geschafft!"
 israel.knesset.6.t: "Antrag gescheitert!"
 israel.knesset.6.d: "In der Schlussabstimmung konnte unser Gesetzentwurf keine Mehrheit der Stimmen der Abgeordneten erhalten. Wir können es beim nächsten Mal erneut versuchen."
 israel.knesset.6.a: "Oh nein..."
 israel.knesset.7.t: "Dubiose Deals"
 israel.knesset.7.d: "Bei der Schlussabstimmung wäre es gar nicht schlecht, ein paar zusätzliche Stimmen zu haben. Wir könnten einer kleinen Parlamentsfraktion etwas finanzielle Hilfe anbieten und so ihre Unterstützung bekommen."
 israel.knesset.7.a: "Gebt ihnen, was sie wollen."
 israel.knesset.7.b: "Wir brauchen ihre Stimmen nicht."
 israel.knesset.8.t: "Korruptionsskandal!"
 israel.knesset.8.d: "Die Massenmedien haben Kameraaufnahmen erhalten, auf denen der Vorsitzende der Parlamentsfraktion unserer Partei den Abgeordneten einer anderen Fraktion einen Koffer voller Geld überreicht. Obwohl die Informationen über das genaue Ziel dieser Transaktion von den Medien nicht aufgedeckt wurden, wird dies die Popularität unserer Partei und der Partei unseres Partners stark beeinträchtigen."
 israel.knesset.8.a: "Bastarde!"
 israel_economy.173.t: "Israel hebt die Entmilitarisierung des Sinai auf!"
 israel_economy.173.d: "Die israelische Regierung hat angesichts all der jüngsten positiven diplomatischen Schritte beschlossen, die Aufhebung des demilitarisierten Status des Sinai zu genehmigen. Endlich können unsere Truppen diese Region auch in Friedenszeiten betreten."
 israel_economy.173.a: "Großartig!"
 ISR_egy_surveillance_drones: "Israelische Drohnenaufklärung"
 israel_economy.174.t: "Israel stellt Drohnenaufklärung bereit!"
 israel_economy.174.d: "Die israelische Regierung hat beschlossen, uns Aufklärung durch ihre Drohnen nahe unserer Grenze bereitzustellen, damit wir effektiver gegen die salafistischen Aufständischen im Sinai kämpfen können!"
 israel_economy.174.a: "Vielen Dank!"
 israel_economy.174.b: "Wir brauchen eure Hilfe nicht!"
 israel_economy.175.t: "Ägypten akzeptiert!"
 israel_economy.175.d: "Sie haben unser Angebot angenommen. Wir werden ihnen Aufklärung durch unsere Drohnen bereitstellen."
 israel_economy.175.a: "Großartig!"
 israel_economy.176.t: "Ägypten lehnt ab!"
 israel_economy.176.d: "Sie haben sich geweigert, unsere Unterstützung anzunehmen. Sie sagen, sie könnten das alleine schaffen."
 israel_economy.176.a: "Was?"
 jordanian_waqf_authprity: "Jordanischer Waqf"
 saudi_waqf_authprity: "Saudi-Waqf"
 ISR_jordan_waqf_slek: "Jordanischer Waqf"
 ISR_jordan_waqf_slek_desc: "Seit dem Sechstagekrieg (und bekräftigt durch den Arava-Friedensvertrag von 1994) üben die jordanischen religiösen Behörden (Waqf) die Oberhoheit über die Verwaltung und Funktion der Al-Aqsa-Moschee und des Tempelberg-Komplexes aus."
 ISR_saud_waqf_slek: "Saudi-Waqf"
 ISR_saud_waqf_slek_desc: "Nach verschiedenen Gesprächen hat die israelische Regierung die Zuständigkeit über Al-Aqsa an Saudi-Arabien übertragen."
 israel_economy.177.t: "Israel weist unseren Waqf aus!"
 israel_economy.177.d: "Kürzlich hat die israelische Regierung beschlossen, unsere Waqf-Behörde aus der Al-Aqsa-Moschee und dem Tempelberg-Komplex zu entfernen. Wenig überraschend entschieden sie sich nicht einmal dafür, die Aufsicht einem anderen muslimischen Land zu übergeben, sondern die Anlage selbst zu verwalten."
 israel_economy.177.a: "Sind die verrückt?"
 israel_economy.178.t: "Israel überträgt Saudi-Arabien die Zuständigkeit über Al-Aqsa!"
 israel_economy.178.d: "Kürzlich hat die israelische Regierung beschlossen, Jordaniens Waqf-Behörde aus der Al-Aqsa-Moschee und dem Tempelberg-Komplex zu entfernen. Nun wird Saudi-Arabien die Verwaltung übernehmen und seine Geistlichen werden die Stätte kontrollieren."
 israel_economy.178.a: "Veränderungen stehen bevor."
 ISR_jor_isr_treaty: "Erweiterung des Arava-Vertrags"
 israel_economy.179.t: "Israel schlägt eine Erweiterung des Arava-Vertrags vor"
 israel_economy.179.d: "Kürzlich sind israelische Regierungsvertreter mit dem Vorschlag an uns herangetreten, den Arava-Vertrag zu erweitern, den wir bereits in der Vergangenheit angenommen haben. Diese neue Erweiterung des Vertrags würde es unseren Regierungen ermöglichen, gemeinsame Wirtschaftsprojekte durchzuführen. Sollen wir zustimmen?"
 israel_economy.179.a: "Sicher!"
 israel_economy.156.b: "[Root.GetName] hat dort nichts zu suchen."
 israel_economy.180.t: "Jordanien stimmt zu!"
 israel_economy.180.d: "Sie haben unserer Vertragserweiterung zugestimmt!"
 israel_economy.180.a: "Großartig!"
 israel_economy.181.t: "Jordanien lehnt ab!"
 israel_economy.181.d: "Sie haben unsere Vertragserweiterung abgelehnt."
 israel_economy.181.a: "Sehr bedauerlich."
 israel_economy.182.t: "Israel schlägt ein Projekt zum Schutz des Toten Meeres vor!"
 israel_economy.182.d: "Israel schlägt ein neues gemeinsames Projekt zur Rettung des Toten Meeres vor. Es erfordert nicht viel Geld, wird aber uns beiden zugutekommen."
 israel_economy.182.a: "Wir stimmen zu!"
 israel_economy.182.b: "Nein."
 israel_economy.183.t: "Jordanien stimmt zu!"
 israel_economy.183.d: "Jordanien hat zugestimmt, in das gemeinsame Projekt zum Schutz des Toten Meeres zu investieren!"
 israel_economy.183.a: "Großartig!"
 israel_economy.184.t: "Jordanien lehnt ab!"
 israel_economy.184.d: "Jordanien hat abgelehnt, in das gemeinsame Projekt zum Schutz des Toten Meeres zu investieren!"
 israel_economy.184.a: "Bruh."
 ISR_jor_water_share: "Abkommen über Wasserressourcen aus dem Toten Meer"
 israel_economy.185.t: "Israel schlägt ein Abkommen über Wasserressourcen aus dem Toten Meer vor!"
 israel_economy.185.d: "Kürzlich hat Israel ein neues Abkommen vorgeschlagen, durch das unser landwirtschaftlicher und sonstiger Wasserbedarf vollständig durch Wasser aus dem Toten Meer gedeckt werden soll. Sollen wir zustimmen?"
 israel_economy.185.a: "Sicher!"
 israel_economy.185.b: "Nein."
 israel_economy.186.t: "Jordanien stimmt zu!"
 israel_economy.186.d: "Jordanien hat unserem Vorschlag zugestimmt und wir werden beginnen, ihnen Wasser aus dem Toten Meer zu liefern."
 israel_economy.186.a: "Großartig!"
 israel_economy.187.t: "Jordanien lehnt ab!"
 israel_economy.187.d: "Sie wollen kein Wasser aus unserem Land kaufen."
 israel_economy.187.a: "Sehr bedauerlich."
 ISR_solar_farms: "Solarfarmen"
 israel_economy.188.t: "Israel schlägt den Green-Blue-Deal vor!"
 israel_economy.188.d: "Der Green-Blue-Deal für den Nahen Osten ist eine mutige Initiative zur Förderung von Klimasicherheit und regionalem Frieden. Israel schlägt vor, in unserem Land Solarpaneele zu errichten, so wie sie es bereits für sich selbst getan haben. Sollen wir zustimmen?"
 israel_economy.188.a: "Sicher!"
 israel_economy.188.b: "Nein, danke."
 israel_economy.189.t: "[FROM.GetNamewithFlag] stimmt zu!"
 israel_economy.189.d: "Wir werden drei Solarfarmen für sie errichten."
 israel_economy.189.a: "Großartig!"
 israel_economy.190.t: "[FROM.GetNamewithFlag] lehnt ab!"
 israel_economy.190.d: "Sie wollen sich nicht am Projekt beteiligen."
 israel_economy.190.a: "Sehr bedauerlich."
 ISR_jor_attack_idea: "Plan zur Flut Jordaniens"
 israel_economy.191.t: "Ermordung eines haschemitischen Thronfolgers!"
 israel_economy.191.d: "Kürzlich haben unbekannte Täter einen der Erben der haschemitischen Dynastie ermordet. Die Bombe wurde unter seinem Auto angebracht, als er gerade den Palast verlassen wollte. Viele Offizielle in Jordanien weisen darauf hin, dass Al-Qaida hinter diesem Anschlag stecken könnte."
 israel_economy.191.a: "Interessant."
 ISR_jor_unloyal_mil_idea: "Gerüchte über illoyales Militär"
 israel_economy.192.t: "Verschwörung im Militär!"
 israel_economy.192.d: "In letzter Zeit haben sich Gerüchte über eine mögliche Putschverschwörung gegen die jordanische Regierung im Militär verbreitet. Angeblich besticht eine ausländische Macht über verschiedene Geldquellen hinweg zahlreiche jordanische Generäle, damit sie sich in einem für sie günstigen Moment erheben. Jordanien sollte sich mit ausländischem Einfluss befassen, bevor es zu spät ist."
 israel_economy.192.a: "Es wird heiß."
 ISR_economic_startup: "Wirtschaftliche Subventionen"
 ISR_begin_projects: "Priorität für Infrastruktur im Süden"
 ISR_begin_projects2: "Nördliche Wirtschaftspriorität"
 israel_economy.193.t: "Israel schlägt die Nitzana-Linie vor!"
 israel_economy.193.d: "Israel schlägt den Bau einer Eisenbahn vor, die unsere Länder verbinden soll. Die Kosten würden zu gleichen Teilen zwischen uns aufgeteilt. Sollen wir zustimmen?"
 israel_economy.193.a: "Sicher!"
 israel_economy.193.b: "Nein!"
 israel_economy.194.t: "Ägypten stimmt zu!"
 israel_economy.194.d: "Ägypten hat unserem Angebot zugestimmt. Der Bau wird in Kürze beginnen."
 israel_economy.194.a: "Großartig!"
