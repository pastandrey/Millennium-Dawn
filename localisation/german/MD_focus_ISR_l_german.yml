 ISR_isr_iran_oil: "Eilat-Ashkelon-Pipelinegesellschaft"
 israel_economy.103.t: "Israel bietet die Wiedereröffnung der Eilat-Ashkelon-Pipelinegesellschaft an!"
 israel_economy.103.d: "Vor vielen Jahren, vor der Islamischen Revolution im Iran, betrieben Israel und Iran ein gemeinsames Ölunternehmen, das beiden damals Profit brachte. Nun, da das tyrannische Regime der Ajatollahs im Iran verschwunden ist, bietet die israelische Regierung die Wiedereröffnung dieses Unternehmens an. Sollen wir zustimmen?"
 israel_economy.103.a: "Wo muss ich unterschreiben?"
 israel_economy.103.b: "Nein."
 israel_economy.104.t: "Iran stimmt zu!"
 israel_economy.104.d: "Das Unternehmen wurde gegründet!"
 israel_economy.104.a: "Großartig!"
 israel_economy.105.t: "Iran hat nicht zugestimmt!"
 israel_economy.105.d: "Sie wollen das Unternehmen nicht wiedereröffnen."
 israel_economy.105.a: "Sehr bedauerlich."
 israel_economy.106.t: "Israel schickt uns ein Geschenk!"
 israel_economy.106.d: "Kürzlich haben israelische Offizielle uns als Geste des guten Willens einige iranische Damhirsche geschenkt. Damals überreichte der Schah von Iran sie Israel als Zeichen der Freundschaft. Seit jener Zeit sind diese Hirsche im Iran selbst ausgestorben, doch diejenigen, die einst Israel geschenkt wurden, überlebten dort. Nun erwidern sie uns die Geste!"
 israel_economy.106.a: "Vielen Dank!"
