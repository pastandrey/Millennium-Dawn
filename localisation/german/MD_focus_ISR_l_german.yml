 israel_economy.78.t: "Israel bietet uns Unterstützung an!"
 israel_economy.78.d: "Israel möchte unserem aufstrebenden Land eine große Menge Unterstützung anbieten, um den Einfluss Irans im Nahen Osten zu bekämpfen. Dies wird ihren Einfluss auf uns erhöhen und könnte uns etwas Geld kosten, aber das Angebot ist sehr vielversprechend..."
 israel_economy.78.a: "Natürlich stimmen wir zu!"
 israel_economy.78.b: "Wir werden nicht Teil eurer Pläne sein!"
 israel_economy.79.t: "Kurdistan stimmt zu!"
 israel_economy.79.d: "Kurdistan hat zugestimmt, unsere Unterstützung anzunehmen, und Bereitschaft gezeigt, künftig mit uns zusammenzuarbeiten."
 israel_economy.79.a: "Großartig!"
 israel_economy.80.t: "Kurdistan hat nicht zugestimmt!"
 israel_economy.80.d: "Kurdistan hat unsere Unterstützung nicht angenommen. Sie sagen, wir sollten aufhören, sie als Werkzeug für unsere Intrigen zu benutzen."
 israel_economy.80.a: "Sind die verrückt?"
 israel_news.11.t: "Iran International"
 israel_news.11.d: "Kürzlich hat die israelische Regierung in Zusammenarbeit mit iranischen Dissidenten die Gründung des Nachrichtensenders Iran International bekannt gegeben. Das neue Medienunternehmen positioniert sich entschieden gegen die Propaganda des Ajatollah-Regimes. Viele Kritiker im Iran selbst bezeichneten das neue Medienunternehmen als zionistische Propaganda und forderten ein Verbot im Iran."
 israel_news.11.o1: "Noch ein zionistischer Mist!"
 israel_news.11.o2: "Hoffen wir, dass das die Lage nicht noch weiter eskalieren lässt."
 israel_economy.81.t: "Reza Schah Pahlavi besucht Israel!"
 israel_economy.81.d: "Irans im Exil lebender Kronprinz Reza Pahlavi reist angesichts der steigenden Spannungen mit dem Iran nach Israel, um eine Botschaft der Freundschaft vom iranischen Volk zu überbringen. Israel und Iran unterhielten während der Monarchie freundschaftliche Beziehungen, als Zehntausende iranische Juden dort über viele Jahrhunderte in Frieden und Harmonie lebten. Die große Mehrheit verließ Iran um 1979, als die antiisraelischen Revolutionäre die Monarchie stürzten und eine Schreckensherrschaft gegen alle begannen, die sie als unerwünscht betrachteten. Viele Juden in Israel und in der Diaspora sehen eine historische Freundschaft mit dem iranischen Volk, die 2.500 Jahre zurückreicht, als der persische König Kyros der Große die in Mesopotamien gefangenen Juden befreite und ihnen half, nach Jerusalem zurückzukehren. Die meisten Iraner, die sich dem Klerikerregime widersetzen, äußern ebenfalls freundliche und unterstützende Haltungen gegenüber Israel und sehen in der finanziellen und militärischen Unterstützung antiisraelischer Kräfte durch ihre Regierung eine Verschwendung ihres nationalen Reichtums."
 israel_economy.81.a: "Sei gegrüßt, Freund!"
 israel_economy.82.t: "Maryam Rajavi besucht Israel!"
 israel_economy.82.d: "Maryam Rajavi, die prominente Anführerin der Volksmudschahedin des Iran, ist heute zu einem wegweisenden Besuch in Israel eingetroffen, der darauf abzielt, die Koalition gegen das iranische Regime zu stärken. Rajavis Besuch unterstreicht eine bedeutende Entwicklung in der geopolitischen Dynamik des Nahen Ostens und spiegelt das gemeinsame Interesse der MEK und Israels wider, dem iranischen Einfluss in der Region entgegenzutreten. Während ihres Besuchs traf Rajavi hochrangige israelische Vertreter, darunter den Premierminister und den Präsidenten. Im Mittelpunkt der Gespräche standen gemeinsame Sorgen über Irans nukleare Ambitionen, seine Unterstützung von Stellvertretermilizen im gesamten Nahen Osten sowie Menschenrechtsverletzungen im Iran."
 israel_economy.82.a: "Willkommen!"
 ISR_government_company_hacked: "Iranisches Netzwerk gehackt"
 israel_economy.83.t: "Israel hackt das iranische Regierungsnetzwerk!"
 israel_economy.83.d: "Kürzlich haben israelische Hacker erfolgreich das iranische Regierungsnetzwerk gehackt und iranische Daten von Servern gestohlen."
 israel_economy.83.a: "Verdammte Zionisten!"
 israel_economy.83.b: "Großartige Arbeit!"
 israel_economy.84.t: "Proteste im Iran!"
 israel_economy.84.d: "In letzter Zeit sind in vielen Teilen der Islamischen Republik Iran Proteste gegen die Regierung ausgebrochen. Viele Offizielle im Iran behaupten, diese würden von ausländischen Mächten angefacht, um die iranische Regierung zu stürzen..."
 israel_economy.84.a: "Die Zionisten stecken dahinter!"
 ISR_drone_better_operations: "Fortgeschrittene Drohnenoperationen"
 israel_news.12.t: "Die USA und Israel starten gemeinsamen Angriff auf Iran, um nukleare Bedrohung abzuwenden"
 israel_news.12.d: "Präsident [USA.GetLeader] wandte sich an die Nation und erklärte, die Entscheidung zur Kriegserklärung sei nicht leichtfertig getroffen worden, sondern durch die unmittelbare Bedrohung durch Irans nukleare Ambitionen notwendig geworden. \n - Unsere Geheimdienste haben bestätigt, dass Iran dem Besitz einer Atomwaffe gefährlich nahe ist - sagte Präsident [USA.GetLeader]. \n - Dies stellt eine inakzeptable Bedrohung für die globale Sicherheit und Stabilität dar. In Abstimmung mit unserem Verbündeten Israel haben wir keine andere Wahl, als entschlossene militärische Maßnahmen zu ergreifen, um diese Bedrohung zu neutralisieren. \n Diese Erklärungen folgten auf Wochen wachsender Spannungen und gescheiterter diplomatischer Bemühungen, Irans Atomprogramm einzudämmen. Die gemeinsame Militärkampagne zielt darauf ab, Irans Nuklearanlagen und militärische Infrastruktur anzugreifen, um die weitere Entwicklung seiner nuklearen Fähigkeiten zu verhindern."
 israel_news.12.o1: "Hannibal ante portas?"
 israel_economy.85.t: "Israel schlägt eine Militäroperation gegen Iran vor!"
 israel_economy.85.d: "Nach den jüngsten Erkenntnissen über das iranische Atomprogramm und der Aufdeckung iranischer Pläne durch ihren Geheimdienst schlägt Israel eine sofortige militärische Antwort gegen Iran vor!"
 israel_economy.85.a: "Zeit, Demokratie zu verbreiten!"
 israel_economy.85.b: "Nettes Märchen."
 israel_economy.86.t: "Die USA stimmen zu!"
 israel_economy.86.d: "Die Operation hat begonnen, US-Streitkräfte werden in Kürze verlegt!"
 israel_economy.86.a: "Los geht's!"
 israel_economy.87.t: "Die USA lehnen unseren Vorschlag ab."
 israel_economy.87.d: "Sie werden sich nicht an dieser Operation beteiligen."
 israel_economy.87.a: "Wie auch immer!"
 israel_economy.88.t: "Israel schlägt eine Wiederherstellung der Beziehungen vor!"
 israel_economy.88.d: "Kürzlich hat die israelische Regierung während gegenseitiger Verhandlungen in Oman einen erneuerten Friedensvertrag zwischen unseren Ländern vorgeschlagen. Sie sagen, wir sollten unsere gegenseitige Feindschaft beenden und einen Nichtangriffspakt unterzeichnen."
 israel_economy.88.a: "Na gut, meinetwegen..."
 israel_economy.88.b: "Noch eine zionistische Intrige?!"
 israel_economy.89.t: "Iran stimmt zu!"
 israel_economy.89.d: "Der Nichtangriffspakt wurde unterzeichnet."
 israel_economy.89.a: "Großartig!"
 israel_news.13.t: "Israel und Iran unterzeichnen einen Nichtangriffspakt!"
 israel_news.13.d: "In einer bahnbrechenden Entwicklung haben Iran und Israel eine Reihe von Nichtangriffs- und Friedensverträgen unterzeichnet, was einen bedeutenden Meilenstein in der Diplomatie des Nahen Ostens darstellt. Die Vereinbarungen, die mit Hilfe internationaler Vermittler ausgehandelt wurden, wurden am Mittwoch in Genf unterzeichnet und signalisieren eine neue Ära der Zusammenarbeit und Stabilität in der Region.\n\nDie historischen Abkommen umfassen einen umfassenden Nichtangriffspakt, die gegenseitige Anerkennung der Souveränität sowie Rahmenwerke für wirtschaftliche und kulturelle Zusammenarbeit. An der Unterzeichnungszeremonie nahmen hochrangige Vertreter beider Nationen sowie Repräsentanten der Vereinten Nationen, der Europäischen Union und weiterer wichtiger internationaler Akteure teil."
 israel_news.13.o1: "Eine Hoffnung auf einen neuen Status quo?"
