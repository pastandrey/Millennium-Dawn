 israel.129.t: "Israel blockiert Gaza!"
 israel.129.d: "Kürzlich, nachdem wir Gaza übernommen haben, entschied Israel, unsere Grenze wirtschaftlich zu blockieren. Nun sind wir von israelischer Seite teilweise isoliert."
 israel.129.a: "Verdammte Zionisten!"
 israel.130.t: "Israel bittet um eine Blockade Gazas!"
 israel.130.d: "Kürzlich hat sich die israelische Regierung an uns gewandt, um eine gemeinsame Blockade des Gazastreifens vorzuschlagen, die die Terroristen in Gaza stark schwächen, unsere Grenzen vor Waffenschmugglern sichern und insgesamt unsere Sicherheit erhöhen würde. Was sollen wir sagen?"
 israel.130.a: "Klar!"
 israel.130.b: "Nein, das werden wir nicht."
 israel.131.t: "Ägypten blockiert Gaza!"
 israel.131.d: "Kürzlich hat die Regierung Ägyptens beschlossen, den Gazastreifen nach der jüngsten Übernahme Gazas durch Extremisten zu blockieren.\n\nViele Experten behaupten, dass diese Entscheidung wegen der engen Beziehungen der ägyptischen Regierung zu Israel getroffen wurde."
 israel.131.a: "Großartig!"
 israel.131.b: "Verräter!"
 israel.132.t: "Ägypten lehnt die Blockade ab!"
 israel.132.d: "Die ägyptische Regierung hat unseren Vorschlag zur Blockade Gazas abgelehnt, da sie ihn als mögliche Grundlage für eine humanitäre Krise betrachtet."
 israel.132.a: "Huh."
 egyopi_tt: "Wenn die Beziehungen zu [EGY.GetNamewithFlag] §Ygut genug§! sind, werden sie §R[HAM.GetNamewithFlag]§! §Gblockieren§! und dem Gazastreifen schwere Probleme bereiten."
 israel.133.t: "Israel beschränkt die Fischereirechte!"
 israel.133.d: "Israel hat die Seegrenze Gazas geschlossen. Nun sind die Fischereirechte eingeschränkt und wir sind noch stärker blockiert."
 israel.133.a: "Argh!"
 tur_mrmr_tt: "Wir werden §Yeinen Militäreinsatz§! gegen §R[TUR.GetFlag]türkische§! Schiffe durchführen, die §R[HAM.GetNamewithFlag]§! beliefern. Das könnte §Yverschiedene Konsequenzen§! haben."
 willincr_bloc_tt: "Dies wird §Gerhöht die Blockade§! von §R[HAM.GetNamewithFlag]§!"
 ISR_gazan_workers: "Billige Arbeitskräfte aus Gaza"
 ISR_gazan_workershama: "Arbeitsmigration"
 israel.134.t: "Geld von unseren Sponsoren..."
 israel.134.d: "Kürzlich haben sich unsere Sponsoren und Israel darauf geeinigt, dass wir Israel zwei Jahre lang nicht angreifen; dafür werden unsere Sponsoren uns Geld bereitstellen."
 israel.134.a: "Wir haben keine andere Wahl, als das zu akzeptieren."
 focus_eff_ch_tt: "§GDie Wirkung§! dieses Fokus hängt von der §Yregierenden Partei§! in §R[HAM.GetNamewithFlag]§! ab."
 israel.135.t: "Israel schlägt eine gemeinsame Investition vor."
 israel.135.d: "Nach der jüngsten Hudna zwischen Israel und der neuen Regierung Gazas möchte Israel, dass wir ihnen beim Bau von Casinos im Gazastreifen helfen. Sollen wir zustimmen?"
 israel.135.a: "Klar!"
 israel.135.b: "Äh? Nein."
 gaza_casinos: "Casinos in Gaza"
 israel.136.t: "Die USA stimmen zu!"
 israel.136.d: "Die Vereinigten Staaten haben unserem Vorschlag zugestimmt und werden die Kosten für die Casinos in Gaza mit uns teilen."
 israel.136.a: "Großartig!"
 israel.137.t: "Die USA lehnen ab!"
 israel.137.d: "Die Vereinigten Staaten haben unseren Vorschlag abgelehnt, daher werden wir die Kosten des Casino-Projekts in Gaza vollständig selbst tragen."
 israel.137.a: "Na gut."
 gazan_casino_tt: "Wir werden §Y[USA.GetNamewithFlag]§! ein §Ygemeinsames Investitionsangebot§! unterbreiten. Falls §Y[USA.GetNamewithFlag]§! das Angebot ablehnt, werden wir die §YAusgaben selbst übernehmen§!.\n\nNach dem Ereignis erhält Gaza:"
 PAL_newsingapore: "Neues Singapur"
 israel.138.t: "Israel bittet um Spenden für Gaza!"
 israel.138.d: "Nach der Hudna mit Gaza bittet Israel uns, Geld in die Entwicklung Gazas zu investieren. Sollen wir zustimmen?"
 israel.138.a: "Klar!"
 israel.138.b: "Wir sind mit anderen Dingen beschäftigt."
 israel.139.t: "[FROM.GetNamewithFlag] spendet Geld für Gaza!"
 israel.139.d: "Kürzlich haben sie auf Israels Bitte hin Geld für das Entwicklungsprojekt in Gaza gespendet."
 israel.139.a: "Großartig!"
 israel.139.b: "Wunderbar."
 israel.140.t: "[FROM.GetNamewithFlag] lehnt Spenden für Gaza ab!"
 israel.140.d: "Sie wollen sich nicht am Entwicklungsprojekt für Gaza beteiligen."
 israel.140.a: "In Ordnung."
 israel.141.t: "Shalit-Abkommen"
 israel.141.d: "Einer unserer Soldaten, der von Terroristen aus Gaza gefangen genommen wurde, Gilad Shalit, wird schon viel zu lange in palästinensischer Gefangenschaft festgehalten.\n\nUnsere politischen Experten wollen ihn allein gegen 1027 palästinensische Terroristen aus unseren Gefängnissen austauschen. Sollen wir diesem Vorschlag zustimmen?"
 israel.141.a: "Ja. Holt unseren Jungen nach Hause."
 israel.141.b: "Ein sehr dummer Vorschlag!"
 israel.142.t: "Der Yesha-Rat wird gegründet!"
 israel.142.d: "Kürzlich wurde der Yesha-Rat neu formiert, und Israel muss nun entscheiden, worauf er sich in Bezug auf seine Siedlungen auf unserem Gebiet konzentrieren wird. Sie haben die Kontrolle über unsere Gebiete bereits verschärft."
 israel.142.a: "Argh!"
 israel.143.t: "Israel konzentriert sich auf Exklaven!"
 israel.143.d: "Die Siedlungspolitik wurde verschärft, weil Israel seinen Fokus auf Exklaven im Westjordanland gelegt hat!"
 israel.143.a: "Wir müssen uns dagegen wehren."
 israel.144.t: "Die Frage von Amona"
 israel.144.d: "Der Generalstaatsanwalt warnt davor, privates Land in Amona zu beschlagnahmen.\n\nSiedlerfreundliche Abgeordnete haben versucht, eine juristische Lücke zu finden, um den Außenposten an Ort und Stelle zu belassen, aber Generalstaatsanwalt Avichai Mandelblit hat gewarnt, dass ein Gesetz zur Legalisierung der Beschlagnahmung privaten Landes verfassungswidrig wäre.\n\nWas sollen wir tun?"
 israel.144.a: "Das Gesetz so anpassen, dass es den Anforderungen des Obersten Gerichts entspricht."
 israel.144.b: "Die Hinweise des Generalstaatsanwalts ignorieren."
 amona_tt: "Wir werden über die §YZukunft§! der §GBeschlagnahmung privaten Landes§! in §R[PAL.GetFlag]Amona§! entscheiden."
 israel.145.t: "Verhandlungen über Eviatar"
 israel.145.d: "Das Sicherheitsministerium und die Siedler verhandeln über Eviatar.\n\nDer Regionalrat von Samaria bezeichnete Eviatar als Siedlung statt als Außenposten, eine Charakterisierung, die auch von israelischen und internationalen Medien übernommen wurde, die mit der Schärfe der rechtlichen Definitionen, die für das Westjordanland einzigartig sind, nicht vertraut sind. Die Errichtung einer Siedlung folgt einem rechtlichen Verfahren, während die Errichtung eines Außenpostens nach israelischem Recht illegal ist.\n\nWessen Seite sollen wir einnehmen?"
 israel.145.a: "Ein nahegelegenes Grundstück der Siedlung zuweisen."
 israel.145.b: "Eviatar in seinem jetzigen Zustand genehmigen."
 eviatar_tt: "Wir werden über die §YZukunft§! der §YAußenposten§! in §R[PAL.GetFlag]Eviatar§! entscheiden."
 israel.146.t: "Vorfall außerhalb von Homesh bringt Siedler vor Gericht!"
 israel.146.d: "Kürzlich kam es zu einem Vorfall zwischen fanatischen Siedlern und dem Yesha-Rat. Was sollen wir tun?"
 israel.146.a: "Sie sind unschuldig, fasst die Täter!"
 israel.146.b: "Wir müssen das Völkerrecht respektieren."
 homesh_tt: "Wir werden über die §YZukunft§! der §YSiedlung§! in §R[PAL.GetFlag]Homesh§! entscheiden."
 ISR_operation_pager: "Operation Neue Ordnung"
 ISR_operation_pager_desc: "Wir sollten den Kopf der Hisbollah ausschalten und ihre Befehlskette durchtrennen, bevor wir einmarschieren."
 israel.147.t: "Pager-Explosionen im Südlibanon!"
 israel.147.d: "Israels Geheimdienst Mossad platzierte Monate vor den Detonationen am Dienstag eine kleine Menge Sprengstoff in 5.000 in Taiwan hergestellten Pagern, die von der libanesischen Gruppe Hisbollah bestellt worden waren, wie eine ranghohe libanesische Sicherheitsquelle und eine weitere Quelle Reuters mitteilten.\n\nDie Operation stellte eine beispiellose Sicherheitslücke bei der Hisbollah dar: Tausende Pager detonierten im ganzen Libanon, töteten neun Menschen und verletzten fast 3.000 weitere, darunter Kämpfer der Gruppe und den iranischen Gesandten in Beirut.\n\nNun beginnt Israel, die von der Hisbollah kontrollierten Gebiete zu beschießen."
 israel.147.a: "Tzrich le'ashot nikma."
 israel.147.b: "Verdammte Zionisten!"
