 israel_economy.65.t: "Israelische strategische Partnerschaft!"
 israel_economy.65.d: "Israel bietet uns ein strategisches Partnerschaftsprogramm an, bei dem sie eine neue Luftbasis für uns bauen und uns bitten, ein geheimes Abkommen gegen Iran zu unterzeichnen. Sollen wir zustimmen?"
 israel_economy.65.a: "Wir stimmen zu!"
 israel_economy.65.b: "Das Risiko können wir nicht eingehen..."
 israel_economy.66.t: "[From.GetName] akzeptiert."
 israel_economy.66.d: "Sie haben unserem strategischen Partnerschaftsplan zugestimmt und sich bereit erklärt, Iran anzugreifen, falls Iran uns angreift."
 israel_economy.66.a: "Großartig."
 israel_economy.67.t: "[From.GetName] hat unseren Plan abgelehnt."
