 israel.120.t: "Anführer der Bewegung Löwengrube gefangen genommen!"
 israel.120.d: "Kürzlich haben israelische Streitkräfte Nablus belagert und die Anführer der Bewegung Löwengrube gefangen genommen."
 israel.120.a: "Sehr bedauerlich."
 israel.121.t: "Israels Operation gescheitert!"
 israel.121.d: "Kürzlich haben israelische Streitkräfte Nablus belagert und versucht, die Anführer der Bewegung Löwengrube gefangen zu nehmen. Sie waren jedoch erfolglos."
 israel.121.a: "Sehr gut."
