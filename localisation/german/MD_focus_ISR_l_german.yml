 arab_mafia_1: "§tUnkontrollierbare§! arabische Mafia"
 arab_mafia_1_desc: "Während die israelische Polizei ein Programm zur schrittweisen Zerschlagung der israelischen kriminellen Banden begonnen hat, konzentrierte sie sich bisher nur auf die jüdischen Gruppen. Gleichzeitig stiegen die innertribalen und innerfamiliären Kriminalitätsraten unter der arabischen Bevölkerung sprunghaft an, angeheizt durch große Mengen an Waffen, die aus dem Westjordanland und Jordanien eingeschmuggelt wurden und endlose Gewaltspiralen finanzierten, an deren Ende immer mehr unschuldige israelisch-arabische Zivilisten starben."
