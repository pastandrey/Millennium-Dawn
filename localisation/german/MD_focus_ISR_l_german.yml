 israel_focus: "Israelischer Fokusbaum"
 ISR_speak_to_government: "Vor die Knesset treten"
 ISR_speak_to_government_desc: "Es ist an der Zeit, mit unserer Regierung zu sprechen und damit zu beginnen, unser innenpolitisches Leben zu ordnen."
 ISR_democratic_first: "§tJüdisch, aber demokratisch§!"
 ISR_democratic_first_desc: "Wir sind jüdisch, ja, doch demokratische Prinzipien sind der wichtigste Bestandteil unseres Staates und zeichnen unsere Grundwerte aus."
 ISR_democratic_jewish_balance: "§1Jüdisch und demokratisch§!"
 ISR_democratic_jewish_balance_desc: "Jüdisch und demokratisch zu sein, ist kein Widerspruch. Wir sollten beide Aspekte unserer neuen politischen Identität annehmen."
 ISR_jewish_first: "§2Demokratisch, aber jüdisch§!"
 ISR_jewish_first_desc: "Wir sollten zuerst jüdisch sein und dann die Werte unserer demokratischen Freiheiten annehmen. Es gibt keine Rechte ohne Pflichten!"
 ISR_economy_branch_focus: "§YEin ökonomischer Schutzschild§!"
 ISR_economy_branch_focus_desc: "Die Wirtschaft muss unser Schutzschild gegen unsere Feinde sein, das das Wohlergehen unserer Bevölkerung verbessert und sichert."
 ISR_infrastructure_focus: "Straße Sechs fertigstellen"
 ISR_infrastructure_focus_desc: "Wir müssen die Infrastrukturprojekte, die wir bereits begonnen haben, weiterführen und abschließen."
 ISR_tel_aviv_priority: "Die Kernregion priorisieren"
 ISR_tel_aviv_priority_desc: "Wir sollten uns darauf konzentrieren, Tel Aviv und seine wachsenden Wirtschaftssektoren zu entwickeln."
 ISR_southern_priority_infra: "Den Süden priorisieren"
 ISR_southern_priority_infra_desc: "Bevor wir uns den nördlichen Regionen widmen, sollten wir die infrastrukturellen Probleme des Südens priorisieren."
 ISR_northern_priority_infra: "Den Norden priorisieren"
 ISR_northern_priority_infra_desc: "Bevor wir die Probleme des Südens lösen, sollten wir uns auf die wirtschaftlichen Fragen im Norden konzentrieren."
 ISR_coastal_southern_road: "Die südliche Küstenbahn"
 ISR_coastal_southern_road_desc: "Wir planen den Bau von Küstenbahnstrecken im Süden schon lange; nun können wir das Projekt endlich beginnen."
 ISR_egypt_train_offer: "Die Nitzana-Linie vorschlagen"
 ISR_egypt_train_offer_desc: "Um effektiver mit Ägypten zu handeln, sollten wir unser Eisenbahnnetz mit dem ihren verbinden."
 ISR_negev_trains: "Die nördlichen Negev-Linien"
 ISR_negev_trains_desc: "Der nördliche Teil des Negev benötigt dringend Eisenbahnen und Landstraßen. Wir müssen dieses Problem angehen."
 ISR_eilat_train: "Die letzte Etappe"
 ISR_eilat_train_desc: "Die Hochgeschwindigkeitsbahn nach Eilat ist eine geplante israelische Eisenbahnverbindung, die die wichtigsten Bevölkerungszentren Israels und die Mittelmeerhäfen mit der südlichen Stadt Eilat am Roten Meer verbinden und zudem den Güterverkehr zwischen Mittelmeer und Rotem Meer bedienen soll."
 ISR_high_speed_tel_aviv_jerusalem: "Durch den Frontvorsprung"
 ISR_high_speed_tel_aviv_jerusalem_desc: "Wir können mit dem Bau einer Hochgeschwindigkeitsverbindung zwischen Tel Aviv und Jerusalem beginnen. Allerdings könnte dies die Spannungen zwischen uns und Palästina verschärfen."
 ISR_tel_aviv_metro: "Die Metro von Tel Aviv"
 ISR_tel_aviv_metro_desc: "Endlich können wir mit dem Bau der neuen Metro in Tel Aviv beginnen, um den Bedarf der Bevölkerung an günstigem Nahverkehr zu decken."
 ISR_jerusalem_light_rail: "Die Jerusalemer Stadtbahn"
 ISR_jerusalem_light_rail_desc: "Die Jerusalemer Stadtbahn ist ein Stadtbahnsystem in Jerusalem. Derzeit ist nur die Rote Linie in Betrieb, die erste von mehreren geplanten Stadtbahnlinien."
 ISR_jerus_lightrail_mod: "Jerusalemer Stadtbahn"
 ISR_galilee_railways: "Die Galiläa-Linien"
 ISR_galilee_railways_desc: "Um unsere Infrastruktur im Norden zu verbessern, sollten wir die Galiläa-Linien bauen."
 ISR_restore_jezreel_railway: "Die Jesreelbahn wiederherstellen"
 ISR_restore_jezreel_railway_desc: "Wir sollten die Jesreelbahn wiederherstellen und dadurch unser Wissen über Eisenbahnbauprojekte erweitern."
 ISR_jordan_israel_rail: "Die „Friedensinsel“-Bahn"
 ISR_jordan_israel_rail_desc: "Wir sollten eine Eisenbahnverbindung nach Jordanien bauen, um unsere Exportmöglichkeiten über jordanisches Gebiet zu erhöhen."
 ISR_israel_gulf_highway: "Das Projekt der wiedererstehenden Hegemonie"
 ISR_israel_gulf_highway_desc: "Um den Handel zwischen uns und dem Golf zu fördern, müssen wir eine Eisenbahn nach Saudi-Arabien bauen und uns mit der Arabischen Halbinsel verbinden."
 ISR_middle_eastern_quad: "Das I2U2-Projekt"
 ISR_middle_eastern_quad_desc: "I2U2 ist eine Partnerschaft zwischen Indien, Israel, den VAE und den USA, die globale Herausforderungen angehen und wirtschaftliche Chancen fördern soll."
 ISR_shine_like_a_diamond: "Wie ein Diamant glänzen"
 ISR_shine_like_a_diamond_desc: "Wir sollten unsere Politik des Diamantenimports fortsetzen und das Geschäft ausbauen."
 ISR_kimberley_process: "Den Kimberley-Prozess schaffen"
 ISR_kimberley_process_desc: "Unethische Praktiken beim illegalen Import kongolesischer Diamanten müssen gestoppt, das Geld konfisziert und die Täter ins Gefängnis gebracht werden!"
 ISR_dan_gantler_affairs: "Operation Gertler"
 ISR_dan_gantler_affairs_desc: "Viele ... nicht ganz faire Geschäftsleute in unserem Land wollen kongolesische Warlords kontaktieren, um Diamanten zu kaufen. Angesichts der unethischen Natur solcher Praktiken könnten die Vorteile des Geschäfts die moralischen Bedenken überwiegen."
 ISR_liberman_affair: "Die Gertler-Liberman-Affäre"
 ISR_send_diamonds_to_asia: "Nach Osten"
 ISR_send_diamonds_to_asia_desc: "Der asiatische Markt eignet sich besser für den Verkauf unserer Diamanten."
 ISR_send_diamonds_to_america_desc: "Der amerikanische Markt eignet sich besser für den Verkauf unserer Diamanten."
 ISR_send_diamonds_to_america: "Nach Westen"
 ISR_transition_to_manufacturing: "Übergang zur Fertigung"
 ISR_transition_to_manufacturing_desc: "Wir müssen unsere Techniken zum Schleifen von Diamanten modernisieren, um weltweit mehr Kunden anzusprechen."
 ISR_open_the_material_halls: "Die Materialhallen öffnen"
 ISR_open_the_material_halls_desc: "Die neuen Bedingungen im Diamantenhandelsviertel sorgen dafür, dass andere Länder stärker auf den Diamantenexport angewiesen sind."
 ISR_diamond_district: "Das Diamantenviertel"
 ISR_diamond_district_desc: "Das Diamantenviertel ist das Zentrum der israelischen Diamantenindustrie und zugleich ein bedeutendes Handelszentrum."
 ISR_foreign_companies_gas: "Mit ausländischen Förderern verhandeln"
 ISR_foreign_companies_gas_desc: "Royal Dutch Shell bietet uns interessante Geschäfte an, die wir vielleicht zu unserem Vorteil nutzen können."
 ISR_pass_the_gas_deal: "Das Gasabkommen durchsetzen"
 ISR_pass_the_gas_deal_desc: "Wir sollten unser Gas eigenständig fördern und verwalten, ohne ausländischen Unternehmen die Kontrolle zu überlassen."
 ISR_compromise_gas_deal: "Das norwegische Modell"
 ISR_compromise_gas_deal_desc: "Wir sollten das norwegische Modell des Sozialstaats übernehmen und die Einnahmen aus dem Gas für soziale Wohlfahrt einsetzen."
 ISR_lighthouse: "Ein Licht für die Nationen"
 ISR_lighthouse_desc: "In unseren Augen sind wir ein leuchtendes Beispiel technologischen Fortschritts und der Zivilisation. Wir sollten entsprechend unserer Vision voranschreiten."
 ISR_yotzma: "Die Yotzma-Initiative"
 ISR_yotzma_desc: "Wir sollten Bedingungen schaffen, unter denen ausländische Staaten eher bereit sind, in unsere IT-Branche zu investieren."
 ISR_venture_capital: "Steuern erhöhen"
 ISR_venture_capital_desc: "Wenn wir dringend Geld brauchen, könnte eine vorübergehende Steuererhöhung von Vorteil sein ..."
 ISR_chutzpah: "Chuzpe fördern"
 ISR_chutzpah_desc: "Chuzpe ist die Eigenschaft der Kühnheit, im Guten wie im Schlechten. Ein nahes englisches Äquivalent ist mitunter „Hubris“. Wir sollten wagen, groß zu denken."
 ISR_army_concentrate_innovation: "Der große Filter"
 ISR_army_concentrate_innovation_desc: "Das Militär ist heutzutage ein Auswahlmechanismus, der genutzt werden kann, um die zivile Cyberindustrie zu stärken."
 ISR_silicon_wadi: "Silicon Wadi"
 ISR_silicon_wadi_desc: "Silicon Wadi ist eine Region in Israel und eines der globalen Zentren der Hochtechnologie. Sie erstreckt sich über die israelische Küstenebene und gilt als einer der Gründe, warum das Land als Start-up-Nation bekannt geworden ist."
 ISR_hightech_fortress: "Die Hightech-Festung"
 ISR_hightech_fortress_desc: "Um die Golanhöhen für Investitionen interessanter zu machen, sollten wir dort eine IT-Ausbildungsinfrastruktur schaffen."
 ISR_ben_gurion_university: "Ben-Gurions Wüstenperle"
 ISR_ben_gurion_university_desc: "Die Ben-Gurion-Universität des Negev ist eine der führenden Forschungsuniversitäten Israels und in vielen Bereichen weltweit führend."
 ISR_start_up_nation: "Start-up-Nation"
 ISR_start_up_nation_desc: "Schließlich sollte unser Land als die Start-up-Nation des Nahen Ostens gelten!"
 ISR_dimona: "Dimona-Shimon-Peres-Zentrum"
 ISR_dimona_desc: "Wir haben eine ... sehr radioaktive Textilfabrik in unserem Land. Wir müssen entscheiden, was wir damit tun."
 ISR_ben_gvir_path: "§8Jüdische Stärke§!"
 ISR_ben_gvir_path_desc: "Seit den verhängnisvollen Oslo-Abkommen haben Atheisten und Araber den Kopf erhoben und das Gefühl, ihnen gehöre der jüdische Staat, den sie Stück für Stück zerlegen könnten. Nicht länger. Wir werden ihnen allen zeigen, wem dieses Land wirklich gehört – dem jüdischen Volk."
 ISR_ben_gvir_am_israel: "Das Volk Israel"
 ISR_ben_gvir_am_israel_desc: "Ursprünglich als 'Otzma LeYisrael' gegründet und später in 'Otzma Yehudit' umbenannt, ist die von Itamar Ben-Gvir geführte Partei der ideologische Nachfolger der verbotenen 'Kach'-Partei. Ihre Ideologie ist rechtsextrem, antiarabisch, ultranationalistisch und kahanistisch (eine religiös-zionistische Ideologie, deren Kern die Durchsetzung des jüdischen Gesetzes im Staat ist). Die Partei und damit ihr Anführer Ben-Gvir glauben an jüdische Vorherrschaft und befürworten die Abschiebung arabischer Extremisten, den entschlossenen Schutz und Ausbau jüdischer Siedlungen, eine stärkere Vermittlung des jüdischen Gesetzes an die jüngeren Generationen und den sogenannten jüdischen Kapitalismus."
 ISR_ben_gvir_kahanism_1: "Kahanismus - Der Weg der Tora"
 ISR_ben_gvir_kahanism_1_desc: "Den Worten unseres Gründers, Rabbi Meir Kahane, folgend, wollen wir einen jüdischen theokratischen Staat errichten, in dem allein unsere hebräischen Brüder das Land Israel betreten dürfen."
 ISR_ben_gvir_kahanism_2: "Kahanismus - Datiim"
 ISR_ben_gvir_kahanism_2_desc: "Wir gehen einen weiteren Schritt auf dem Weg zu unserer Vision eines Landes Israel, das allein von Israeliten gemäß Gottes Willen bevölkert ist."
 ISR_ben_gvir_kahanism_3: "Kahanismus - Sicarii"
 ISR_ben_gvir_kahanism_3_desc: "In unserem heiligen Land ist kein Platz für Nachkommen von Nicht-Israeliten. Gottes Wort ist unser einziges Licht im Staat, und Gottes Gerechtigkeit wird unerbittlich angewandt werden."
 ISR_ben_gvir_kahanism_4: "Kahanismus - Gottes Land"
 ISR_ben_gvir_kahanism_4_desc: "Das Land Israel befindet sich nun endlich in den Händen der Israeliten, mit dem Gesetz des Maimonides als unserem Leitfaden."
 ISR_ben_gvir_torat_israel: "Die Bibel Israels"
 ISR_ben_gvir_torat_israel_desc: "Religiöser Zionismus ist eine grundlegende Ideologie von 'Otzma Yehudit', die glaubt, dass das Land Israel den alten Israeliten von Gott versprochen wurde und dass wir daher die Pflicht haben, das Land gemäß der Tora zu verteidigen und zu bearbeiten. Alle Siedler im Land Israel müssen den religiösen Vorschriften als Kinder Israels folgen."
 ISR_ben_gvir_eretz_israel: "Das Land Israel"
 ISR_ben_gvir_eretz_israel_desc: "Eretz Yisrael, das Land Israel, die Region, die Gott unseren Vorfahren und ihren Nachkommen, den Israeliten, gemäß dem Tanach und der Bibel versprochen hat."
 ISR_question_1923_partition: "Die Kairo-Konferenz infrage stellen"
 ISR_question_1923_partition_desc: "1923 erlaubte Großbritannien der haschemitischen Dynastie, den Teil des Mandats östlich des Jordan, Transjordanien genannt, zu verwalten, und gewährte ihm 1946 die volle Unabhängigkeit. Dieses Gebiet ist heute als Königreich Jordanien bekannt. Wir jedoch glauben, dass das Land jenseits des Jordan den Nachkommen der Israeliten gehört ..."
 ISR_promised_land: "Das Gelobte Land"
 ISR_promised_land_desc: "Gott versprach uns ein größeres Land als das, was uns von der UN gegeben wurde; es ist an der Zeit, es zurückzuholen ... und vielleicht dabei noch etwas mehr hinzuzufügen, warum nicht."
 ISR_farright_iraq: "An den Flüssen Babylons"
 ISR_farright_iraq_desc: "Wir, das Volk Gottes, müssen erneut seine Hand bei der Zerstörung Babylons sein!"
 ISR_farright_lebanon: "Das Land Ba'als zerschmettern"
 ISR_farright_lebanon_desc: "Es ist Zeit, den Libanon zu zerschlagen und in Großisrael einzugliedern!"
 ISR_farright_syria: "Rache an Laban dem Aramäer"
 ISR_farright_syria_desc: "Syrien ist uns schon lange ein Ärgernis. Zeit, es von der Landkarte zu tilgen!"
 ISR_farright_saudia: "Die Ismaeliten unterwerfen"
 ISR_farright_saudia_desc: "Saudi-Arabien ist eine Bedrohung für die Rechtschaffenen. Wie könnten wir das hinnehmen?"
 ISR_farright_china: "Kahanes Kreuzzug vollenden"
 ISR_farright_china_desc: "Wir sollten Kahanes Kreuzzug vollenden und schließlich China unterwerfen!"
 ISR_farright_america: "Den Assimilations-Holocaust stoppen"
 ISR_farright_america_desc: "Amerikanische Gojim beeinflussen unser Volk schon viel zu lange! Alles Widerwärtige in unserem Land kommt aus Amerika und von Angehörigen unseres Stammes, die von ihnen assimiliert wurden!"
 ISR_death_to_terrorists: "Die Todesstrafe verhängen"
 ISR_death_to_terrorists_desc: "Die Todesstrafe ist in Israel legal, auch wenn sie seit den 1990er Jahren nicht mehr angewandt wird. Allerdings zeigen Umfragen, dass die Mehrheit der israelischen Bevölkerung Todesurteile gegen Terroristen befürwortet, die israelische Bürger ermordet haben. Dann machen wir die Mehrheit eben glücklich."
 ISR_make_us_of_terrorist_families: "Der Kedar-Vorschlag"
 ISR_make_us_of_terrorist_families_desc: "Terroristen kennen keine Gnade, wenn es darum geht, israelische Bürger zu bedrohen, ganz gleich welchen Alters oder Status. Aber sie haben auch Familien, und die können wir nutzen, um Druckmittel zu gewinnen."
 ISR_spread_out_land: "Jeschiwa-Studenten und Soldaten begünstigen"
 ISR_spread_out_land_desc: "Unsere Jeschiwa-Studenten und Soldaten sind die Säulen unserer großen Gesellschaft, und sie verdienen für ihren Dienst besondere Vorteile. Geben wir ihnen ein paar Stücke Land."
 ISR_immunity_to_soldiers: "Ihnen Immunität gewähren"
 ISR_immunity_to_soldiers_desc: "Es ist inakzeptabel, dass unsere Helden vor Gericht gestellt werden, nur weil sie ihre Pflicht tun. Wir werden ihnen den Rücken freihalten, während sie unsere Bürger vor Terroristen schützen."
 ISR_engagement_reform: "Die Ketten von der Waffe brechen"
 ISR_engagement_reform_desc: "Es ist an der Zeit, die Einsatzregeln für unsere Soldaten im Kampf gegen Terroristen zu lockern."
 ISR_hebrew_justice: "Hebräische Gerechtigkeit wiederherstellen"
 ISR_hebrew_justice_desc: "Wir haben uns zu weit vom Tzedek, der Gerechtigkeit Gottes, entfernt. Nun ist es an der Zeit, zu Gottes Willen zurückzukehren und die im Deuteronomium formulierte Vorstellung des 'gerechten Menschen' wiederherzustellen."
 ISR_basic_law_torah: "Grundgesetz: Tora-Studium"
 ISR_basic_law_torah_desc: "Das Studium der Tora ist grundlegend für den Aufbau einer blühenden Gesellschaft im Land Israel. Machen wir es verpflichtend."
 ISR_hebraic_studies: "Hebräische Studien fördern"
 ISR_hebraic_studies_desc: "Keine andere Bildung ist mit der hebräischen vergleichbar! Unsere Schüler sollten sich von anderen kulturellen Einflüssen fernhalten und sich stattdessen auf unser historisches Erbe konzentrieren."
 ISR_ban_women_from_military: "Den Miller-Fall rückgängig machen"
 ISR_ban_women_from_military_desc: "Frauen sollten nicht in unseren Streitkräften kämpfen, sondern sich um den Haushalt kümmern. Wir werden die Verfassung ändern, damit sie zu Hause bleiben, während ihre Männer das Land verteidigen."
 ISR_outlaw_lgbt: "Innere Säuberungen durchführen"
 ISR_outlaw_lgbt_desc: "Ich sehe in der Bibel keinen Hinweis auf LGBT-Ideologien, daher ergibt es keinen Sinn, gleichgeschlechtliche Ehen oder andere Erleichterungen dafür zuzulassen. Viele werden vielleicht das Land verlassen, aber wen kümmert das?"
 ISR_kaplan_trials: "Die Kaplan-Prozesse"
 ISR_kaplan_trials_desc: "Die Justizreform führte zu Protesten und Unruhen, organisiert von Menschen, die ihre Bedeutung nicht verstanden haben. Diese Menschen sind Verräter an unserem Land und dürfen nicht ungestraft bleiben."
 ISR_third_temple: "Der Dritte Tempel"
 ISR_third_temple_desc: "Mit dem Tempel in Jerusalem sind zwei Bauwerke gemeint, die zunächst den Israeliten und später den Juden als zentraler heiliger Ort der Anbetung dienten. Beide Tempel wurden jedoch bei Belagerungen der Heiligen Stadt zerstört. Nun ist es an der Zeit, ihn wieder aufzubauen und unserem Volk einen prächtigen Ort zum Beten zu geben. Ganz gleich, wie sehr unsere Nachbarn protestieren werden, der Dritte Tempel wird auf dem Berg Moriah entstehen, der nun einmal im Westjordanland liegt ... nun ja."
 ISR_likud_path: "§2Die Konsolidierung§!"
 ISR_likud_path_desc: "Likud, direkt übersetzt als 'Die Konsolidierung', ist die moderne Wiedergeburt der revisionistisch-zionistischen Bewegung, die von Ze'ev Jabotinsky während des Unabhängigkeitskampfes gegründet wurde. Diese Bewegung fand ihre militante Form in den Widerstandsbewegungen Irgun und Lehi, die sich in der ersten israelischen Knesset zur Freiheitspartei zusammenschlossen. Schließlich verschmolz Herut unter Menachem Begin 1973 mit den liberalen Parteien zum Liberalen Freiheitsblock, und 1977 wurde dies als 'Likud' bezeichnet. Die Partei gewann tatsächlich diese Wahl und beendete damit 29 aufeinanderfolgende Jahre der Labour-Herrschaft."
 ISR_rein_in_partners: "Unsere Partner zügeln"
 ISR_rein_in_partners_desc: "Trotz unserer Abhängigkeit vom Nationalen Block, um an der Macht zu bleiben, müssen wir klarstellen, dass unsere eigenen Interessen an erster Stelle stehen. Unsere Koalitionspartner sind unserer Koalition beigetreten, nicht umgekehrt. Sie müssen ihren Platz kennen und von einer extremistischen Agenda Abstand nehmen."
 ISR_judicial_reform_partial: "Mit dem Präsidenten verhandeln"
 ISR_judicial_reform_partial_desc: "Viele im Nationalen Block, auch innerhalb der Likud-Partei, fordern eine Reform der Judikative im Namen größerer Vielfalt am Gericht, das ihrer Ansicht nach die israelische Gesellschaft nicht repräsentiert, sowie die Entmachtung einer 'nicht gewählten Elite'. Ihre ursprünglichen Vorschläge sind katastrophal und würden die Öffentlichkeit in Rage versetzen, aber vielleicht können wir durch Vermittlung des israelischen Präsidenten eine Krise verhindern."
 ISR_judicial_reform_full: "Die Levin-Reformen einleiten"
 ISR_judicial_reform_full_desc: "Die Justiz ist, mehr noch als die anderen Organe der israelischen Rechtsordnung, korrumpiert worden. Nicht gewählte und elitäre Richter, die sich im Ernennungsausschuss der Justiz selbst bestimmen, fesseln die Fähigkeit der Regierung, ihr vom Volk erteiltes Mandat auszuüben, und neigen überwältigend nach links. Wir müssen die Kontrolle über die Regierung zurückgewinnen und die Justizclique wieder an ihren Platz verweisen."
 ISR_national_camp: "Das Nationale Lager formen"
 ISR_national_camp_desc: "Die korrupten und unredlichen Ermittlungen haben dazu geführt, dass alle linken und zentristischen Parteien Netanyahu boykottieren und sich weigern, einer Koalition unter ihm beizutreten. So sei es! Wir werden neue, unkonventionelle Partner finden. Gemeinsam wird das Nationale Lager Israels Sicherheit für Generationen sichern."
 ISR_corrupt_likud: "Die Partei vereinnahmen"
 ISR_corrupt_likud_desc: "Die Likud-Partei besitzt einen starken liberalen und ideologischen Flügel, der dem deutlich größeren populistisch-konservativen Lager unter Netanyahu gegenübersteht. Diese Gruppe, angeführt von Figuren wie Gideon Sa'ar, sollte aus den Parteigeschäften gedrängt werden, und die Partei soll für Bibis persönliche Agenda vereinnahmt werden."
 ISR_request_immuity: "Immunität beantragen"
 ISR_request_immuity_desc: "Die Öffentlichkeit kann klar erkennen, dass diese sogenannten 'Fälle' vor Gericht einer nach dem anderen in sich zusammenfallen. Doch um sicherzustellen, dass die Sicht der Öffentlichkeit anerkannt wird, müssen wir beim Parlament Immunität beantragen. Das sogenannte 'französische Gesetz', das Ermittlungen gegen Staats- und Regierungschefs verbietet, sollte in Betracht gezogen werden."
 ISR_witch_hunt: "Von einer Hexenjagd sprechen"
 ISR_witch_hunt_desc: "Vor einem halben Jahrhundert hat das Histadrut-Labour-Establishment die sephardische und mizrachische Bevölkerung von den Aussichten auf Wohlstand in der israelischen Gesellschaft ausgeschlossen, und tatsächlich werden Establishment und Bürokratie immer noch von diesen weißen, beinahe aristokratischen Kreisen dominiert. Sie jagen heute Netanyahu genauso, wie sie damals die Eltern seiner Wähler gejagt haben. Ein Versuch, einen amtierenden Premierminister zu stürzen – wie feige!"
 ISR_reform_public_broadcasting: "Den Ersten Kanal reformieren"
 ISR_reform_public_broadcasting_desc: "Die Rundfunkbehörde war über mehr als vier Jahrzehnte Israels erster und einziger Fernsehsender, bis in den 1990er Jahren Kanal 2 und Anfang der 2000er Jahre ein weiterer Sender eröffnet wurden. Wir sollten die laufende Umstrukturierung und Privatisierung von Kanal 1 nutzen, um ihn in einen 'ausgewogeneren' und rechteren Sender zu verwandeln."
 ISR_attack_the_media: "Die Medien angreifen"
 ISR_attack_the_media_desc: "Ähnlich wie Justiz und Polizei wurden auch die Medien von einer linken Clique übernommen und korrumpiert, die überall Fake News verbreitet. Wir müssen dem entgegentreten und die Menschen über ihre Propaganda aufklären!"
 ISR_lo_haya_klum: "'Es war nichts, es ist nichts!'"
 ISR_lo_haya_klum_desc: "Diese Fälle, die von der israelischen Polizei und dem Generalstaatsanwalt an die Öffentlichkeit gebracht wurden, sind so offensichtlich konstruiert, dass klar sein sollte: Es handelt sich um eine Verschwörung, um den populären rechten Premierminister unter linkem Druck aus dem Amt zu drängen. Wir werden Widerstand leisten! Wir wissen, dass da nichts war, weil da nichts ist!"
 ISR_bibism: "Bibismus"
 ISR_bibism_desc: "Die jüngsten Wahlen haben gezeigt, dass das Volk seine Sicherheit Mr. Security anvertraut hat. Netanyahu ist der Einzige, der Israels Wirtschaft und Sicherheit verteidigen kann und einen riesigen Likud gegen alle Linken anführt."
 ISR_netanyahu_plan: "Das Programm des Königs"
 ISR_netanyahu_plan_desc: "Netanyahu hat auf Grundlage seiner Vision einen konkreten gesellschaftlichen Plan entwickelt. Es ist an der Zeit, mit seiner Umsetzung zu beginnen."
 ISR_pension_reform: "Die Renten reformieren"
 ISR_pension_reform_desc: "Angesichts unserer Haushaltsprobleme müssen wir die Renten reformieren und einen neuen Plan verabschieden."
 ISR_lower_income_tax: "Die Einkommensteuer senken"
 ISR_lower_income_tax_desc: "Wir müssen die Einkommensteuern senken, ohne zuzulassen, dass Steuern unsere lebendige und wachsende Wirtschaft ersticken."
 ISR_shrink_the_public_sector: "Den öffentlichen Sektor verkleinern"
 ISR_shrink_the_public_sector_desc: "Die Politik unserer Vorgänger hat den Verwaltungsapparat auf unverhältnismäßige Dimensionen aufgebläht. Wir müssen dem Privatsektor erlauben, sich selbst zu regulieren."
 ISR_reform_bituach_leumi: "Die Nationalversicherung reformieren"
 ISR_reform_bituach_leumi_desc: "Die NII bietet gefährdeten Bevölkerungsgruppen und Familien, die in vorübergehende oder langfristige Notlagen geraten, wirtschaftlichen Schutz durch die Auszahlung von Leistungen."
 ISR_bachar_reform: "Das Bachar-Komitee"
 ISR_bachar_reform_desc: "Der neue Bachar-Plan wird den Wettbewerb auf dem Markt erhöhen, und zwar auf Grundlage von Leistung, Servicequalität und Verlässlichkeit."
 ISR_cut_social_spending: "Sozialausgaben kürzen"
 ISR_cut_social_spending_desc: "Es ist an der Zeit, nicht länger allen Teilen der Bevölkerung einfach Geld zu schenken. Wir sollten einige Sozialhilfekosten kürzen und das eingesparte Geld für andere Zwecke verwenden."
 ISR_cut_child_benefits: "Kindergeld kürzen"
 ISR_cut_child_benefits_desc: "Die Orthodoxen vermehren sich sehr schnell, übernehmen keine Verantwortung und leugnen oft sogar Israels Existenzberechtigung ... Es ist Zeit, die Hilfen für sie zu kürzen."
 ISR_world_populists: "Weltweite Populisten unterstützen"
 ISR_world_populists_desc: "Trotz unterschiedlicher außenpolitischer Ansichten gibt es viele Politiker auf der Welt mit einer ähnlichen ideologischen Grundlage wie wir, und wir sollten versuchen, uns mit ihnen anzufreunden."
 ISR_euroscepticism: "Euroskeptizismus fördern"
 ISR_euroscepticism_desc: "In Israel besteht unter linken Parteien die Tendenz, einen proeuropäischen Kurs einzuschlagen. Wir müssen diese Stimmung brechen, indem wir den Euroskeptizismus nicht nur in Israel, sondern in ganz Europa unterstützen."
 ISR_befriend_russia: "Staatsbesuch in Russland"
 ISR_befriend_russia_desc: "Es ist Zeit, Russland zu besuchen und unsere diplomatischen Beziehungen fortzusetzen."
 ISR_befriend_republicans: "Die Republikanische Partei begünstigen"
 ISR_befriend_republicans_desc: "Es liegt in unserem politischen Interesse, die Beziehungen zur konservativen Partei zu pflegen, um sie für weitere politische Zwecke zu nutzen ..."
 ISR_befriend_brazil: "Nach Brasilien reisen"
 ISR_befriend_brazil_desc: "Merkwürdigerweise haben die jüngsten politischen Veränderungen in Brasilien die diplomatischen Beziehungen zwischen uns begünstigt. Das müssen wir nutzen."
 ISR_befriend_trump: "Sich mit der amerikanischen Rechten anfreunden"
 ISR_befriend_trump_desc: "Die Konservativen und die Rechte in den USA haben uns zwar nicht immer einheitlich positiv gegenübergestanden, aber unsere politischen Ansichten überschneiden sich auf überraschende Weise, und das müssen wir nutzen."
 ISR_support_hungary: "Staatsbesuch in Ungarn"
 ISR_support_hungary_desc: "Ungarn hat sich in jüngster Zeit politisch nach rechts bewegt und Interesse an einer Zusammenarbeit mit uns gezeigt. Das sollten wir nutzen."
 ISR_matter_of_poland: "Die Frage Polens"
 ISR_matter_of_poland_desc: "Polen nimmt sich zu viel heraus und leugnet seine Beteiligung an den Ereignissen des zwanzigsten Jahrhunderts. Es ist an der Zeit, das zu klären und ihnen eine eindeutige Frage zu stellen."
 ISR_tama_38: "Das Tama-38-Programm"
 ISR_tama_38_desc: "Tama 38 gewährt Mietern Baurechte, deren Gebäude verstärkt werden."
 ISR_harish: "Harish entwickeln"
 ISR_harish_desc: "Harish ist eine Stadt im Bezirk Haifa in Israel. Wir sollten sie zum Zentrum unserer Geschäfte machen."
 ISR_kachlon_program: "Die Kachlon-Reformen"
 ISR_kachlon_program_desc: "Finanzminister Moshe Kahlon stellte den vorgeschlagenen Wirtschaftsplan vor, der mehrere Reformen umfasst, um Probleme wie Marktkonzentration, Lebenshaltungskosten, Produktivität und die Wohnungskrise anzugehen."
 ISR_reform_doar: "Den Postdienst reformieren"
 ISR_reform_doar_desc: "Im Rahmen der israelischen Postreform beschloss die Regierung, dass die israelische Postbehörde nicht länger als gesetzliche Körperschaft tätig sein soll und alle ihre Aufgaben auf ein neu geschaffenes staatliches Unternehmen übertragen werden."
 ISR_reform_hashmal: "Elektrizitätsdienste deregulieren"
 ISR_reform_hashmal_desc: "Im Rahmen von Kahlons Reformpaket müssen wir unser Stromnetz und unsere Stromversorgung deregulieren."
 ISR_privatize_bank_leumi: "Bank Leumi privatisieren"
 ISR_privatize_bank_leumi_desc: "Bank Leumi ist eine israelische Bank. Sie wurde am 27. Februar 1902 in Jaffa als Anglo Palestine Company gegründet, als Tochtergesellschaft des zuvor in London von Mitgliedern der zionistischen Bewegung gegründeten Jewish Colonial Trust, um Industrie, Bauwesen, Landwirtschaft und Infrastruktur in jenem Land zu fördern, das letztlich Israel werden sollte."
 ISR_open_skies_desc: "Das Open-Skies-Abkommen gilt als bedeutender Schub für die israelische Wirtschaft, da es Flugpreise senkt und die Schaffung zusätzlicher Routen fördert."
 ISR_privatize_elal: "El Al privatisieren"
 ISR_privatize_elal_desc: "El Al ist die nationale Fluggesellschaft Israels und die Flagcarrier-Airline des Landes. Sie fliegt außerdem nach Afrika, Asien, Europa und Nordamerika. El Al bedient 48 Ziele."
 ISR_gas_deal: "Gesetz zur Deregulierung der Gasfelder"
 ISR_gas_deal_desc: "Der nächste konsequente Schritt unserer Reformen besteht darin, mehr Gasunternehmen für unseren Markt zu gewinnen."
 ISR_shtrum_committee_desc: "Das Shtrum-Komitee wird ein gemeinsames Gremium sein, das politische Empfehlungen zur Stärkung des Wettbewerbs im israelischen Finanzsystem ausarbeiten soll."
 ISR_path_plus: "Das Path-Plus-Programm"
 ISR_path_plus_desc: "Nun müssen wir die Autobahnen verbreitern und neue Fahrspuren hinzufügen, um die Mobilitätsmöglichkeiten für Autobesitzer zu verbessern."
 ISR_road_6: "Straße Sechs bauen"
 ISR_road_6_desc: "Highway 6 ist die erste israelische Build-Operate-Transfer-Straße, die errichtet wird. Sie wird überwiegend vom Privatsektor gebaut, der im Gegenzug für eine festgelegte Anzahl von Jahren Maut auf der Autobahn erheben darf. Sie ist zudem eines der größten Infrastrukturprojekte, die in Israel durchgeführt werden."
 ISR_supertanker: "Den Supertanker entfesseln"
 ISR_supertanker_desc: "Wir müssen Möglichkeiten für neuen bezahlbaren Wohnraum für alle Teile der israelischen Bevölkerung schaffen. Dies wird der Plan für die vollständige Besiedlung aller Regionen Israels sein, unter Einbeziehung privater Auftragnehmer zur Durchführung dieses Projekts."
 ISR_legalize_cannabis_desc: "Ein weiser Mann sagte einst,\n\n§7Der größte Killer auf dem Planeten ist Stress, und ich denke noch immer, dass die beste Medizin Cannabis ist und immer war.§!"
 ISR_tourism_gay_parade: "Die Tel-Aviv-Parade popularisieren"
 ISR_tourism_gay_parade_desc: "Wir sollten die Gay-Pride-Paraden in Tel Aviv als Lockmittel für westliche Touristen nutzen, die kommen werden, um sich diese ... Märsche anzusehen."
 ISR_association_agreement_usa: "Amerikanisches Assoziierungsabkommen"
 ISR_association_agreement_usa_desc: "Wir müssen die Vereinigten Staaten bitten, neue Gremien zu schaffen, um eine gemeinsame und einheitliche Haltung zu regionalen Fragen zu entwickeln, die unsere Interessen sowie wirtschaftliche und politische Abkommen zwischen uns und den Vereinigten Staaten betreffen."
 ISR_association_agreement_eu: "Europäisches Assoziierungsabkommen"
 ISR_association_agreement_eu_desc: "Wir müssen die Europäische Union bitten, neue Gremien zu schaffen, um eine gemeinsame und einheitliche Haltung zu regionalen Fragen zu entwickeln, die unsere Interessen sowie wirtschaftliche und politische Abkommen zwischen uns und der Europäischen Union betreffen."
 ISR_cyprus_marriage: "Eine Vereinbarung mit Zypern"
 ISR_cyprus_marriage_desc: "Aus religiösen Gründen können wir Zivilehen in Israel selbst nicht zulassen, also sollten wir mit Zypern verhandeln, um diese Ehen dort registrieren zu lassen und so die religiösen Gesetze zu umgehen."
 ISR_likud_family_values_desc: "Unser jüdisches Volk gründet auf traditionellen jüdischen Familienwerten, zu denen starke familiäre Bindungen und ein starker Gemeinschaftssinn gehören."
 ISR_likud_lgbt_acceptance: "Die stolzen Likudniks formen"
 ISR_likud_lgbt_acceptance_desc: "Likud Pride ist eine konservative LGBT-Organisation, die gegründet wurde und mit der israelischen rechtsgerichteten Likud-Partei verbunden ist."
 ISR_privatize_ports: "Die Hafenbehörde zerschlagen"
 ISR_privatize_ports_desc: "Wir müssen die Hafengremien auflösen und mit externen Investoren über die vollständige Übertragung der Hafengremien an uns verhandeln."
 ISR_likud_sephardic_crisis: "Den Drachen anketten"
 ISR_likud_sephardic_crisis_desc: "Wir müssen größere Anstrengungen unternehmen, um Sephardim in unsere Gesellschaft zu integrieren und günstige Bedingungen für eine stärkere Konsolidierung zu schaffen."
 ISR_shas_path: "§0Sephardische Tora-Bewahrer§!"
 ISR_shas_path_desc: "Shas ist eine zionistische haredische religiöse Partei in Israel. Sie wurde 1984 unter der Führung von Rabbi Ovadia Yosef gegründet und vertritt in erster Linie die Interessen sephardischer und mizrachischer haredischer Juden."
 ISR_the_transparents: "Die Unsichtbaren beachten"
 ISR_the_transparents_desc: "Wir müssen an jüdischen Prinzipien festhalten und die gegenseitige soziale Unterstützung in unserer Gesellschaft stärken."
 ISR_baalei_teshuva: "Ba'alei Teshuva"
 ISR_baalei_teshuva_desc: "Wir sollten die Sozialausgaben erhöhen, um sicherzustellen, dass die haredische Gemeinschaft zufrieden ist."
 ISR_haredi_arab: "Haredisch-arabische Zusammenarbeit"
 ISR_haredi_arab_desc: "Wir können versuchen, eine haredisch-arabische Zusammenarbeit zu gestalten und dabei vielleicht gute Ergebnisse bei der gegenseitigen politischen Unterstützung erzielen. Aber es könnte auch anders kommen ..."
 ISR_legacy_of_yosef: "Das Vermächtnis Ovadia Yosefs"
 ISR_legacy_of_yosef_desc: "Ovadia Yosef war ein im Irak geborener Talmudgelehrter, ein Posek, von 1973 bis 1983 sephardischer Oberrabbiner Israels und Gründer sowie langjähriger geistlicher Führer der ultraorthodoxen Shas-Partei Israels."
 ISR_adinas_donations: "Adinas Spenden"
 ISR_adinas_donations_desc: "Wir müssen für die Armen spenden und damit die Praktiken der Shas-Partei fortführen und unterstützen."
 ISR_strong_aryeh: "Ein starker Löwe"
 ISR_strong_aryeh_desc: "Unsere Koalition mit Shas ist stärker denn je, und wir sollten das nutzen, um unsere Beliebtheit unter den haredischen Juden zu steigern."
 ISR_food_checks: "Lebensmittelgutscheine für die Armen"
 ISR_food_checks_desc: "Viele Menschen in unserem Land können sich nicht einmal Nahrung für sich und ihre Familien leisten. Wir sollten sicherstellen, dass jeder essen kann, und Lebensmittelgutscheine für die Armen bereitstellen."
 ISR_crown_to_its_former_glory: "Lehakhzir Atara Le'Yoshna"
 ISR_crown_to_its_former_glory_desc: "Wir müssen unsere Krone zu ihrem früheren Glanz zurückführen und den westlichen Einfluss auf unser Land verringern ..."
 ISR_yemenite_affair: "Die jemenitische Affäre untersuchen"
 ISR_yemenite_affair_desc: "Die Affäre um die jemenitischen Kinder bezieht sich auf das Verschwinden vor allem jemenitisch-jüdischer Säuglinge und Kleinkinder von Einwanderern im neu gegründeten Staat Israel zwischen 1948 und 1954."
 ISR_sephardic_cultural_heritage: "Sephardisches Erbe schützen"
 ISR_sephardic_cultural_heritage_desc: "Wir müssen das sephardische Erbe schützen und die Geschichte der sephardischen Juden im Lehrplan fördern."
 ISR_toranic_education: "Halachische Bildung fördern"
 ISR_toranic_education_desc: "Vielleicht sollten wir das besondere toranische Bildungssystem von Shas für die sephardischen Ultraorthodoxen finanzieren."
 ISR_utj_path: "§3Tora- und Schabbatjudentum§!"
 ISR_utj_path_desc: "Vereinigtes Tora-Judentum, oft nach seinem Wahlsymbol auch Gimel genannt, ist ein haredisches, religiös-konservatives politisches Bündnis zwischen Agudat Yisrael und Degel HaTorah. Anders als andere religiöse Parteien in Israel ist UTJ nichtzionistisch und weist einige sozialdemokratische Züge auf."
 ISR_tal_law: "Das Tal-Gesetz"
 ISR_tal_law_desc: "Seit 1949 ist die ultraorthodoxe Gemeinschaft informell vom Militärdienst ausgenommen, da dieser mit ihren Werten kollidiert. Es ist an der Zeit, ein offizielles Gesetz zu verabschieden, das unseren Jeschiwa-Studenten eine Befreiung vom Militärdienst gewährt, denn sie sind zu wichtig, um in den IDF zu dienen."
 ISR_reject_liba: "LIBA-Sanktionen umgehen"
 ISR_reject_liba_desc: "LIBA, der Kernlehrplan des Bildungsministeriums, der auch Englischunterricht umfasst, wurde eingeführt, um zu verhindern, dass bestimmte Gruppen ausschließlich Hebräisch und andere religiöse Themen unterrichten. Diese Entscheidung muss rückgängig gemacht werden, da sie unsere Unabhängigkeit beeinträchtigt, unsere Kultur an unsere Jugend zu vermitteln. Sollen sie selbst entscheiden, ob sie Englisch unterrichten wollen oder nicht."
 ISR_obstruct_mamlakhti: "Mamach behindern"
 ISR_obstruct_mamlakhti_desc: "Mamach ist ein alternativer orthodoxer Lehrplan, der eigene Unterrichtsinhalte in Fächern wie Englisch, Mathematik und anderen entwickelt hat. Er ist jedoch noch immer zu progressiv und bedroht die Köpfe unserer jungen Schüler. Wir werden ihn nicht abschaffen, aber wir können seine Anwendung etwas erschweren."
 ISR_shopkeepers_law: "Das Ladenbesitzergesetz"
 ISR_shopkeepers_law_desc: "Die Tora sagt eindeutig, dass der Schabbat ein Ruhetag für Juden ist, an dem keine Arbeit verrichtet werden soll. Wir werden dies gesetzlich festschreiben und die Schließung von Läden und Märkten an diesem Tag verpflichtend machen."
 ISR_saturday_construction: "Nur Pikuach Nefesh"
 ISR_saturday_construction_desc: "Am Schabbat ist keine Arbeit erlaubt, nicht einmal Bauarbeit, außer in Fällen von Pikuach Nefesh, also der Bewahrung menschlichen Lebens, einem in der Halacha bekannten Grundsatz. Wir werden alle Bauarbeiten am Schabbat verbieten."
 ISR_new_conscription_law: "Neues Wehrpflichtgesetz"
 ISR_new_conscription_law_desc: "Unsere Sicherheit ist wichtig, aber die Tora-Ausbildung unserer jungen Studenten ist es noch mehr. Sie dürfen nicht so viel Zeit durch den Zwangsdienst in unseren Verteidigungskräften verlieren."
 ISR_anti_reformism: "Reformisten anprangern"
 ISR_anti_reformism_desc: "Das Reformjudentum ist eine stark liberale Strömung des Judentums. Es zeichnet sich durch einen geringen Fokus auf Rituale und persönliche Religionsausübung aus, betrachtet das jüdische Gesetz als nicht bindend und akzeptiert moderne gesellschaftliche Vorstellungen, einschließlich LGBTQ+-Gemeinschaften. Es hat sich vor allem in den USA entwickelt."
 ISR_kotel_protocols: "Die Kotel-Frauen-Frage"
 ISR_kotel_protocols_desc: "Women of the Wall, auch als Kotel Women bekannt, ist eine feministische Vereinigung, die dafür kämpft, die Geschlechtertrennung an der Klagemauer aufzuheben, wo Frauen und Männer während der Tora-Lesungen getrennt werden."
 ISR_segregated_prayers: "Gebete trennen"
 ISR_segregated_prayers_desc: "Women of the Wall versuchen, die Geschlechtertrennung während der Tora-Lesung an der Klagemauer zu beseitigen. Das ist völliger Unsinn; tatsächlich werden wir noch stärkere Barrieren errichten, um genau das zu verhindern."
 ISR_anti_lgbt_propaganda: "Schlimmer als die Hisbollah"
 ISR_anti_lgbt_propaganda_desc: "LGBTQ+-Menschen machen uns alle schwächer, an die Sünde gebunden statt an die Tora."
 ISR_rz_path: "§9Partei des Religiösen Zionismus§!"
 ISR_rz_path_desc: "Die Partei des Religiösen Zionismus, auch als Tkuma oder Nationale Union-Tkuma bekannt, ist eine rechtsextreme, ultranationalistische, jüdisch-suprematistische und religiös-zionistische Partei."
 ISR_subsidize_outposts: "Außenposten subventionieren"
 ISR_subsidize_outposts_desc: "Warum sollten wir unsere Freunde und Brüder im Westjordanland nicht subventionieren? Sie brauchen unsere Hilfe, um eine tragfähige Agrarwirtschaft aufzubauen. Es spielt keine Rolle, welches Land sie besetzen."
 ISR_settlements_subsidized_1: "Subventionierte Siedlungen - Ein Neuanfang"
 ISR_settlements_subsidized_1_desc: "Unsere Brüder in den Siedlungen brauchen Geld, um einen neuen, stabilen Pfeiler der israelischen Wirtschaft aufzubauen."
 ISR_settlements_subsidized_2: "Subventionierte Siedlungen - Pfeiler des Landes"
 ISR_settlements_subsidized_2_desc: "Unsere Brüder in den Siedlungen werden immer stärker, aber sie brauchen noch mehr Geld, um sich weiter auszudehnen."
 ISR_economic_settlers: "Wirtschaftliche Besiedlung fördern"
 ISR_economic_settlers_desc: "Die Lebenshaltungskosten in unseren Städten sind ohnehin zu hoch, also sollten wir dazu ermutigen, in unsere Siedlungen zu ziehen, wo Familien mit geringen Kosten wachsen können."
 ISR_protect_terrorists: "Jeden Kompromiss ablehnen"
 ISR_protect_terrorists_desc: "Seit Jahren werden einige unserer Brüder, die an der inzwischen aufgelösten Kach-Partei beteiligt waren, als Terroristen dargestellt. In Wirklichkeit sind sie Patrioten und verdienen es nicht, im Gefängnis zu sitzen. Sie verdienen stattdessen eine Begnadigung."
 ISR_protect_ideological_core: "Die ideologischen Pfeiler"
 ISR_protect_ideological_core_desc: "Armee, Bibel und Land: die Pfeiler unserer Gesellschaft, alle grundlegend für die Bewahrung einer stabilen und festen Gemeinschaft. Wir müssen allerdings entscheiden, was wir in unserer Agenda priorisieren."
 ISR_denounce_mafdal: "Die liberalen Mafdalniks diskreditieren"
 ISR_denounce_mafdal_desc: "Mafdal, oder besser gesagt die Nationalreligiöse Partei, war die Vertreterin der religiös-zionistischen Ideologie in Israel. Sie sind jedoch zu weich, nicht stark genug, um unsere Gesellschaft zu stabilisieren!"
 ISR_late_marriage: "Späte Eheschließungen angehen"
 ISR_late_marriage_desc: "Statistiken zeigen, dass 50 % der israelischen Paare erst nach dem 30. Lebensjahr heiraten; wir müssen frühe Ehen fördern und dazu ermutigen, so bald wie möglich neue kleine Israelis zu bekommen."
 ISR_promote_early_marriage: "Frühe Ehe fördern"
 ISR_promote_early_marriage_desc: "In einer schnell alternden Gesellschaft ist es wichtig, durch frühe Eheschließungen möglichst viele Geburten zu fördern."
 ISR_civilian_oversight: "Zivile Verwaltungskontrolle"
 ISR_civilian_oversight_desc: "Es ist Zeit, im Westjordanland eine zivile Regierung einzusetzen; selbstverständlich unter israelischer Führung."
 ISR_jewish_home_path: "§3Das Jüdische Heim§!"
 ISR_jewish_home_path_desc: "Die Nationalreligiöse Partei Religiöser Zionismus, oder Mafdal Religiöser Zionismus, ist eine rechtsgerichtete religiös-zionistische Partei in Israel. Bei allen Wahlen seit ihrer Gründung 1998 ist die Partei gemeinsam mit anderen Fraktionen als Teil einer vereinten Liste angetreten."
 ISR_get_five: "'Hol die Fünf!'"
 ISR_get_five_desc: "Wir müssen den Mathematikunterricht in den Schulen fördern, um technisches Denken zu stärken und indirekt unseren IT-Sektor zu unterstützen."
 ISR_dont_apologize_desc: "Rechtsextrem ist kein Schimpfwort! Es ist ein ehrenvolles Abzeichen, das wir tragen und allen zeigen. Sollen die Gegner doch neidisch sein!"
 ISR_kaminitz_law: "Das Kaminitz-Gesetz erlassen"
 ISR_kaminitz_law_desc: "Das Kaminitz-Gesetz gibt den Exekutivbehörden die Macht, Strafen zu verhängen – etwa Abriss- und Baustoppverfügungen, die Beschlagnahmung von Baumaschinen und Fahrzeugen sowie Verhaftungen – und das alles ohne Einschaltung des Justizsystems."
 ISR_associations_law: "Das Verbändegesetz unterzeichnen"
 ISR_associations_law_desc: "Das Vereinigungsrecht ist die Gesamtheit der Gesetze und Regeln, die die verschiedenen Vereinigungen von Mitgliedern oder Partnern regeln."
 ISR_conservative_judges: "Die langsame Revolution"
 ISR_conservative_judges_desc: "Wir müssen konservative Menschen in verschiedene Regierungspositionen berufen, um die Degeneration unserer politischen und sozialen Kultur aufzuhalten."
 ISR_nation_state: "Das Nationalstaatsgesetz"
 ISR_nation_state_desc: "Das Nationalstaatsgesetz legt eine Reihe von Aufgaben und Verpflichtungen fest, an die Israel gebunden ist, um seinen Zweck als Nationalstaat des jüdischen Volkes zu erfüllen."
 ISR_bennet_rule: "Der Aufstieg Bennetts"
 ISR_bennet_rule_desc: "Naftali Bennett ist ein israelischer Hightech-Unternehmer. Während seines Wehrdienstes in den 1990er Jahren diente Bennett in Sayeret Matkal und Maglan, Elite-Kommandotruppen, die hinter feindlichen Linien operieren. Anschließend absolvierte er ein Jurastudium an der Hebräischen Universität Jerusalem. Als Sohn amerikanischer Einwanderer nach Israel verließ Bennett Israel in Richtung New York und gründete 1999 mit anderen zusammen ein Unternehmen für Betrugsbekämpfungssoftware."
 ISR_promote_trickle_down: "Wie in den Tagen Reagans"
 ISR_promote_trickle_down_desc: "Wir müssen das konservative Modell der USA als Vorbild für unsere neue Politik nehmen. Genau wie in den guten alten Reagan-Jahren!"
 ISR_machette_bureaucracy: "Die Machete der Regierung"
 ISR_machette_bureaucracy_desc: "Es ist an der Zeit, mit unserer Machete der Gerechtigkeit durch den Staatsapparat ineffektiver Bastarde zu schneiden!"
 ISR_limit_the_labor: "Die Histadrut begrenzen"
 ISR_limit_the_labor_desc: "Gewerkschaften tun nichts Nützliches, außer Hindernisse für Arbeiter zu schaffen. Ihr Einfluss auf die Wirtschaft muss begrenzt werden ..."
 ISR_tax_reductions: "Steuern für Reiche senken"
 ISR_tax_reductions_desc: "Warum die Reichen besteuern? Das schafft nur Präzedenzfälle dafür, nicht reich werden zu wollen. Dem müssen wir ein Ende setzen."
 ISR_crush_the_shelters: "Die Schutzgruppen zerschlagen"
 ISR_crush_the_shelters_desc: "Lobbyisten haben sich wie Parasiten in jeden Bereich unseres politischen Lebens eingeschlichen. Das muss aufhören!"
 ISR_a_new_singapore: "Den Singapur-Plan umsetzen"
 ISR_a_new_singapore_desc: "Wir müssen dem Beispiel Singapurs folgen und einen Plan umsetzen, der Israel zum weltweit besten Ort für Geschäfte macht."
 ISR_shaked_rule: "Ayelet Shaked stärken"
 ISR_shaked_rule_desc: "Ayelet Shaked ist eine israelische Politikerin, Aktivistin und Softwareingenieurin. Trotz ihrer Zeit bei Das Jüdische Heim, einer religiösen Partei, bezeichnet sie sich selbst als Säkularistin. Vor ihrem Eintritt in die Politik begann Shaked ihre Karriere in der israelischen Hightech-Industrie und arbeitete kurz nach ihrem Abschluss an der Universität Tel Aviv als Ingenieurin bei Texas Instruments."
 ISR_trust_busting: "Wie ein Bull Moose"
 ISR_trust_busting_desc: "Wir müssen uns an Theodore Roosevelt und seinen politischen Programmen und Idealen orientieren. Genau das braucht Israel."
 ISR_over_legislation: "Übergesetzgebung bekämpfen"
 ISR_over_legislation_desc: "Wir müssen aufhören, die Gesetzgebung auf eine Größe aufzublähen, die in keinem Verhältnis zu ihren Aufgaben steht."
 ISR_promote_national_service: "Nationaldienst fördern"
 ISR_promote_national_service_desc: "Orthodoxe Frauen können nicht in der Armee dienen, aber wir können ihnen einen Nationaldienst im öffentlichen Sektor anbieten."
 ISR_public_works: "Öffentliche Arbeiten nutzen"
 ISR_public_works_desc: "Es ist notwendig, Bedingungen zu schaffen, unter denen öffentliche Arbeiten dauerhaft und planbar werden."
 ISR_israels_thatcher: "Der Geist Thatchers"
 ISR_israels_thatcher_desc: "Wir müssen dem britischen Pragmatismus folgen und den Geist Margaret Thatchers symbolisch wiederbeleben."
 ISR_russian_party_path: "§2Israel ist unser Zuhause§!"
 ISR_russian_party_path_desc: "Yisrael Beiteinu ist eine konservative politische Partei in Israel. Die Basis der Partei bestand ursprünglich aus säkularen russischsprachigen Einwanderern, auch wenn die Unterstützung aus dieser Bevölkerungsgruppe zurückgeht."
 ISR_retirement_homes: "Altersheime finanzieren"
 ISR_retirement_homes_desc: "Wir müssen Altersheime finanzieren und sicherstellen, dass unsere ältere Bevölkerung in Komfort und Frieden leben kann."
 ISR_soviet_voters: "Sowjetische Wähler ansprechen"
 ISR_soviet_voters_desc: "Viele russischsprachige Juden sind noch immer stark mit der russischen Kultur verbunden. Wir müssen sie mit unserer Werbung und unseren politischen Maßnahmen ansprechen."
 ISR_russian_tv: "Russischsprachige Fernsehsender"
 ISR_russian_tv_desc: "Viele unserer neuen Bürger, die aus dem postsowjetischen Raum heimkehren, sprechen kein Hebräisch. Damit sie sich reibungsloser integrieren können, sollten wir russischsprachige Fernsehsender schaffen und russische Sender in Israel ausstrahlen lassen."
 ISR_five_mems: "Die fünf Mems übernehmen"
 ISR_five_mems_desc: "Jabotinskys fünf M stehen für zentrale Elemente des revisionistischen Zionismus: Makkabäer (militärische Stärke), Masada (Heldentum), Mischkan (spirituelles Erbe), Melukha (politische Souveränität) und Moadim (nationale Einheit durch Traditionen). Sie betonen jüdische Widerstandskraft, Selbstständigkeit und Staatlichkeit."
 ISR_citizenship_law: "'Ohne Loyalität keine Staatsbürgerschaft!'"
 ISR_citizenship_law_desc: "Araber müssen einen Loyalitätseid leisten, um in unserem Land leben zu dürfen; es ist absolut notwendig, die volle Loyalität fremder Elemente sicherzustellen."
 ISR_empower_city_rabbis: "Stadtrabbiner stärken"
 ISR_empower_city_rabbis_desc: "Wir müssen religiöse Autoritäten aus den Städten bevorzugen und den spirituellen Konsens um die Reformer herum zentralisieren."
 ISR_reform_conversions: "Jüdische Konversionen reformieren"
 ISR_reform_conversions_desc: "Wir müssen Konvertiten zum Judentum die Rückkehr nach Israel erlauben. Sie sind nicht weniger jüdisch als wir."
 ISR_promote_aliyah: "Die jüdische Welt"
 ISR_promote_aliyah_desc: "Wir müssen die Rückkehr aller Juden nach Israel fördern und zur Alija ermutigen."
 ISR_national_secular_government: "Nationale säkulare Regierung"
 ISR_national_secular_government_desc: "Nun werden wir ein vollständig nationaler und säkularer Staat sein."
 ISR_aliyah_encouraged: "Alija gefördert"
 ISR_new_hope_path: "§1Eine neue Hoffnung§!"
 ISR_new_hope_path_desc: "Ende 2020 gründete Gideon Sa'ar die israelische Mitte-rechts-Partei Eine neue Hoffnung, die nationale Sicherheit, gute Regierungsführung und Justizreformen priorisiert. Obwohl sie Schwierigkeiten hatte, sich an der Macht zu halten, versucht sie, eine gemäßigte Alternative zum Likud zu bieten."
 ISR_gantz_tree: "§4Israels Resilienz§!"
 ISR_gantz_tree_desc: "Benjamin Gantz ist ein israelischer Politiker und pensionierter General. Er ist zentristisch ausgerichtet und vertritt militaristische politische Positionen. Die Partei Resilience wurde Ende 2018 gegründet."
 ISR_radical_centrism_desc: "Wir sollten uns nicht länger auf ideologische Kämpfe und Idealvorstellungen konzentrieren. Wir sollten radikal zentristisch sein und die Praxis über die Ideologie stellen."
 ISR_general_politics: "Politik eines großen Generals"
 ISR_general_politics_desc: "Gantz ist ein ehemaliger General, und seine politischen Ambitionen sowie sein Ordnungsdenken sind in der Tat vom Militär geprägt."
 ISR_above_all: "Israel Lifnei HaKol"
 ISR_above_all_desc: "Ein Grundsatz sollte unser politisches Handeln leiten - Israel steht über allem!"
 ISR_increase_army_pay: "Unsere Söhne und Töchter"
 ISR_increase_army_pay_desc: "Wir sollten unsere Militärausgaben erhöhen und sicherstellen, dass die Söhne und Töchter Israels alles bekommen, was sie brauchen."
 ISR_increase_pensions: "Bürgerrenten erhöhen"
 ISR_increase_pensions_desc: "Wir sollten die Renten für unsere Bürger im Ruhestand erhöhen. Sie sollten bekommen, was sie verdienen."
 ISR_attorney_general: "Die Generalstaatsanwaltschaft aufteilen"
 ISR_attorney_general_desc: "Wir sollten die Ämter des Generalstaatsanwalts und des obersten Anklägers voneinander trennen."
 ISR_regulate_ottoman_agencies: "Die osmanischen Behörden regulieren"
 ISR_regulate_ottoman_agencies_desc: "Wir sollten die osmanischen Behörden regulieren, da sie in ihrem derzeitigen Zustand ineffizient sind."
 ISR_the_begin_project: "Der Beginn des Projekts"
 ISR_the_begin_project_desc: "Obwohl wir ideologisch mit dem Likud übereinstimmen, unterstützen wir die Korruptionspraktiken dieser Partei nicht."
 ISR_shasha_biton: "Der Shasha-Biton-Plan"
 ISR_shasha_biton_desc: "Wir müssen die Bildung für die untere und mittlere Klasse verbessern, um eine umfassende Bildung in unserem Land sicherzustellen."
 ISR_social_cabinet: "Ein sozioökonomisches Kabinett"
 ISR_social_cabinet_desc: "Unser neues Kabinett sollte sich präzise auf wirtschaftliche Fragen konzentrieren."
 ISR_national_unity: "Lager der nationalen Einheit"
 ISR_national_unity_desc: "Unsere neue Koalition sollte eine rechte Agenda verfolgen und ein starkes und widerstandsfähiges Israel aufbauen!"
 ISR_bluewhite: "Die Blau-Weiße Koalition wurde gebildet!"
 ISR_blue_white: "Blau und Weiß"
 ISR_blue_white_desc: "Unsere neue Koalition sollte Gleichheit und Stabilität zu unseren neuen Grundwerten machen, mit denen wir ein neues Israel aufbauen."
 ISR_limit_terms: "Amtszeitbegrenzungen einführen"
 ISR_limit_terms_desc: "Wir sollten die Wahlgesetze ändern, um die Fortsetzung des demokratischen Prozesses sicherzustellen."
 ISR_empower_regional_governments: "Regionale Regierungen stärken"
 ISR_empower_regional_governments_desc: "Wir sollten die regionalen Regierungen stärken und ihnen mehr tatsächliche Befugnisse zur Selbstverwaltung geben."
 ISR_reform_electoral_system: "Das Wahlsystem reformieren"
 ISR_reform_electoral_system_desc: "Wir sollten uns von einer verhältnisbasierten Vertretung hin zu einer wahlkreisbezogenen Vertretung bewegen."
 mofaz_rules: "Kadima wurde gegründet!"
 ISR_olmert_focus: "§2Eine neue politische Ära§!"
 ISR_olmert_focus_desc: "Ehud Olmert ist ein israelischer Politiker und Anwalt. Seine Partei Kadima ist eine zentristische und liberale politische Partei in Israel."
 ISR_mofaz: "Mofaz' Politik umsetzen"
 ISR_mofaz_desc: "Shaul Mofaz ist ein pensionierter israelischer Offizier und Politiker. Er trat 1966 den Israelischen Verteidigungsstreitkräften bei und diente in der Fallschirmjägerbrigade. Er kämpfte im Sechstagekrieg, im Jom-Kippur-Krieg, im Libanonkrieg 1982 und bei der Operation Entebbe mit den Fallschirmjägern und Sayeret Matkal, einer Elite-Spezialeinheit. 1998 wurde er der sechzehnte Generalstabschef der IDF."
 ISR_livni: "Livnis Politik umsetzen"
 ISR_livni_desc: "Tziporah Malka Livni ist eine israelische Politikerin, Diplomatin und Anwältin. Sie ist unter anderem für ihre Bemühungen zur Lösung des israelisch-palästinensischen Konflikts bekannt."
 ISR_nationalcamp: "Das Nationale Lager wurde gebildet!"
 ISR_continue_to_change: "Wir verändern uns weiter!"
 ISR_continue_to_change_desc: "Veränderungen sind unvermeidlich, und wir müssen den Fortschritt meistern, der uns voranträgt!"
 ISR_merav_cohen_plan: "Cohens Fürsorge für die Älteren"
 ISR_merav_cohen_plan_desc: "Cohen hat einen konkreten Plan zur Reform der sozialen Unterstützung. Dieser Plan muss umgesetzt werden."
 ISR_lapid_histadrut: "Dem Land die Kehle packen"
 ISR_lapid_histadrut_desc: "Wir sollten die soziale Wohlfahrt rasch reformieren und die Unterstützung für die Bevölkerung ausweiten."
 ISR_ministry_of_social_development: "Ministerium für soziale Entwicklung"
 ISR_ministry_of_social_development_desc: "Wir müssen ein neues Ministerium für soziale Entwicklung schaffen und es so gut wie möglich unterstützen."
 ISR_holocaust_survivors: "Kostenlose medizinische Versorgung für Überlebende"
 ISR_holocaust_survivors_desc: "Wir sollten die Überlebenden des Holocaust mit Respekt behandeln und ihnen kostenlose medizinische Versorgung anbieten."
 ISR_disabled_people: "Menschen mit Behinderung fördern"
 ISR_disabled_people_desc: "Wir sollten die Menschen mit Behinderung in unserer Gesellschaft unterstützen und das für sie vorgesehene Budget erhöhen."
 ISR_take_money_from_settlements: "Mittel von den Siedlungen umlenken"
 ISR_take_money_from_settlements_desc: "Die Siedlungen saugen unseren Haushalt aus! Wir sollten uns dieses Geld endlich zurückholen!"
 ISR_take_money_from_yeshivas: "Mittel von den Jeschiwas umlenken"
 ISR_take_money_from_yeshivas_desc: "Die Jeschiwas fressen unseren Haushalt auf, wir sollten uns das Geld von ihnen zurückholen!"
 ISR_where_is_the_money: "'Wo ist das Geld?'"
 ISR_where_is_the_money_desc: "Wir sollten untersuchen, wohin das Geld unserer Steuerzahler fließt. Unser Haushalt ist nicht unerschöpflich!"
 ISR_yesh_atid_focus: "§9Es gibt eine Zukunft§!"
 ISR_yesh_atid_focus_desc: "Jesch Atid ist eine zentristische, liberal-zionistische politische Partei in Israel. Sie wurde im April 2012 vom Fernsehjournalisten Jair Lapid gegründet, dem Sohn des früheren Shinui-Politikers und israelischen Justizministers Tommy Lapid."
 ISR_middle_class: "Der Krieg der Mittelschicht"
 ISR_middle_class_desc: "Wir müssen unsere politischen Möglichkeiten voll ausschöpfen, um die Mittelschicht umfassend zu unterstützen. Diese Menschen sind der Grund, warum wir regieren!"
 ISR_public_residence: "Öffentlichen Wohnraum fördern"
 ISR_public_residence_desc: "Öffentlicher Wohnraum ist das Wundermittel, mit dem wir die Wohnungsfrage in unserem Land lösen sollten."
 ISR_zero_vat: "Efes Ma'am"
 ISR_zero_vat_desc: "Die Mehrwertsteuer sollte nicht länger existieren. Sie schadet der Wirtschaft und erhöht die Kosten für die Verbraucher."
 ISR_lapid_eu: "Das Freihandelsabkommen ausweiten"
 ISR_lapid_eu_desc: "Wir sollten Handel und Freundschaft mit der Europäischen Union fördern!"
 ISR_came_to_change: "Wir sind gekommen, um zu verändern"
 ISR_came_to_change_desc: "Wir müssen den Kampf gegen die Korruption aufnehmen und das Land von solchen Problemen säubern."
 ISR_non_portfolio: "Die Minister ohne Geschäftsbereich hinauswerfen"
 ISR_eighteen_ministers: "Nur achtzehn Minister"
 ISR_eighteen_ministers_desc: "Unsere Regierung sollte nur aus achtzehn Ministern bestehen."
 ISR_corruption_war: "Wir kamen, wir sahen, wir kämpften"
 ISR_corruption_war_desc: "Unser Kampf gegen Korruption muss systematisch sein und tief in der Methodik unserer Partei verankert werden."
 ISR_negotiate_syria: "Mit Syrien verhandeln?"
 ISR_negotiate_syria_desc: "Vielleicht können wir die syrische Regierung davon überzeugen, ihre Haltung uns gegenüber zu überdenken."
 ISR_labour_path: "§tDie Israelische Arbeitspartei§!"
 ISR_labour_path_desc: "Die Israelische Arbeitspartei, allgemein als HaAvoda bekannt, ist eine sozialdemokratische politische Partei in Israel. Als Partei in der Tradition des Arbeiterzionismus unterstützt sie den Wohlfahrtsstaat und die Verbindung zu Gewerkschaften. Die Arbeitspartei steht für die Unterstützung des israelisch-palästinensischen Friedensprozesses, pragmatische Außenpolitik und sozialdemokratische Wirtschaftspolitik."
 ISR_haifa_model: "Das Haifa-Modell"
 ISR_haifa_model_desc: "Wir sollten das Modell von Haifa als Leitbild für die Klugheit unserer wirtschaftlichen Entscheidungen nutzen."
 ISR_education_relief_plan: "Entlastungsplan für das Bildungswesen"
 ISR_education_relief_plan_desc: "Wir müssen einige Entlastungsmaßnahmen umsetzen, bevor wir mit den Bildungsreformen beginnen."
 ISR_smaller_classes: "Kleinere Klassen"
 ISR_smaller_classes_desc: "Wissenschaftliche Daten zeigen, dass Kinder umso effektiver lernen, je kleiner die Klassen sind. Das müssen wir umsetzen."
 ISR_israel_green_deal: "Der israelische Green Deal"
 ISR_israel_green_deal_desc: "Ökologische Nachhaltigkeit ist der einzige Weg, auf dem wir in unserer Energiepolitik vorankommen können. Ökologie ist die Garantie unserer Zukunft."
 ISR_social_protests: "'Das Volk fordert soziale Gerechtigkeit!'"
 ISR_social_protests_desc: "Nun müssen wir entscheiden, wie wir mit einer der populärsten sozialen Bewegungen unseres Landes umgehen."
 ISR_raise_minimum_wage: "Den Mindestlohn erhöhen"
 ISR_raise_minimum_wage_desc: "Wir müssen den Mindestlohn erhöhen, um eine Flut billiger Arbeitskräfte zu verhindern und den Lebensstandard zu sichern."
 ISR_public_transport: "Den öffentlichen Verkehr bevorzugen"
 ISR_public_transport_desc: "Das Priestertum kann jammern, so viel es will, aber wir müssen den öffentlichen Verkehr am Schabbat sicherstellen und die Orthodoxen entschlossen in unsere Gesellschaft integrieren."
 ISR_raise_tax_on_wealthy: "Steuern für Reiche erhöhen"
 ISR_raise_tax_on_wealthy_desc: "Die Reichen sind zu reich! Wir müssen ihr Geld auf nützlichere Weise einsetzen."
 ISR_digital_education: "Digitale Bildung fördern"
 ISR_digital_education_desc: "Auch die Bildung muss digitalisiert werden. Kinder verdienen nur das Beste!"
 ISR_deliver_computers: "Eine digitale Regierung"
 ISR_deliver_computers_desc: "Wir müssen unsere Regierung so weit wie möglich digitalisieren, um die Effizienz des Verwaltungsapparats zu steigern."
 ISR_recover_public_services: "Den öffentlichen Dienst wiederaufbauen"
 ISR_recover_public_services_desc: "Wir müssen den öffentlichen Dienst wiederherstellen und ihn zu alter Stärke zurückführen."
 ISR_regulate_finance: "Das Finanzsystem regulieren"
 ISR_regulate_finance_desc: "Wir müssen das Finanzsystem regulieren, um Gleichheit in unserer Gesellschaft sicherzustellen."
 ISR_agricultural_protection_act: "Gesetz zum Schutz der Landwirtschaft"
 ISR_agricultural_protection_act_desc: "Wir müssen unseren Agrarsektor schützen, da er zu den wichtigsten Bereichen gehört, die von Kibbuzim und Siedlern getragen werden."
 ISR_agricultural_sector: "Auf Bauernverbände setzen"
 ISR_agricultural_sector_desc: "Wir sollten die Bildung von Bauernverbänden unterstützen und unseren Agrarsektor ausweiten."
 ISR_labour_unions_focus: "Die Histadrut stärken"
 ISR_labour_unions_focus_desc: "Wir sollten entscheiden, was wir mit den Gewerkschaften tun werden, und endlich ihre Stellung in unserem Staat festlegen."
 ISR_amend_protection_act: "Das Investitionsschutzgesetz ändern"
 ISR_amend_protection_act_desc: "Wir sollten das Investitionsschutzgesetz anpassen und entsprechend in unserer Wirtschaftspolitik handeln."
 ISR_subsidize_businesses: "Unabhängige Unternehmen subventionieren"
 ISR_subsidize_businesses_desc: "Unabhängige Unternehmen sollten von uns unterstützt werden, um das wirtschaftliche Gleichgewicht zu sichern."
 ISR_youth_movements: "Die Jugendbewegungen"
 ISR_youth_movements_desc: "Wir müssen die Tzofim in unserem Land unterstützen, denn sie sind die einzige sichere Garantie für eine gleichgesinnte Jugend in der Zukunft."
 ISR_competition_directory: "Nationale Wettbewerbsbehörde"
 ISR_competition_directory_desc: "Wir sollten eine nationale Wettbewerbsbehörde schaffen, die gegen die Monopolisierung unserer Wirtschaft kämpft."
 ISR_sponsored_products: "Produktsponsoring ausweiten"
 ISR_sponsored_products_desc: "Wir müssen das Sponsoring verschiedener Produkte, das wir bereits betreiben, ausweiten."
 ISR_forgot_to_be_jews: "Erkennen, was wir vergessen haben"
 ISR_forgot_to_be_jews_desc: "Avraham Gabbay ist ein israelischer Geschäftsmann und Politiker. Er war Geschäftsführer des Telekommunikationsunternehmens Bezeq und wechselte dann in die Politik."
 ISR_bring_the_lost_voters: "Versuchen, sie zurückzugewinnen"
 ISR_bring_the_lost_voters_desc: "Amir Peretz ist ein israelischer Politiker, der als Abgeordneter der Knesset für die Arbeitspartei diente. Seit 1988 fast durchgehend Mitglied der Knesset, hatte er verschiedene Positionen innerhalb der Regierung inne."
 ISR_zionist_union: "Die Zionistische Union"
 ISR_zionist_union_desc: "Isaac Bougie Herzog ist ein israelischer Politiker. Als Sohn des ehemaligen israelischen Präsidenten Chaim Herzog ist er von Beruf Anwalt und war von 1999 bis 2001 Kabinettssekretär."
 ISR_regret_our_past_sephardics: "Die große Reue"
 ISR_regret_our_past_sephardics_desc: "Wir müssen unsere Vergangenheit bereuen und mehr Anstrengungen unternehmen, um die Sepharden zu integrieren."
 ISR_constitution: "Die israelische Verfassung schreiben"
 ISR_basic_law_amendment: "Neue Verfassung"
 ISR_basic_law_amendment_desc: "Endlich können wir unsere neue Verfassung entwerfen!"
 ISR_public_transport_shabbat: "Öffentlicher Verkehr am Samstag"
 ISR_public_transport_shabbat_desc: "Beenden wir endlich die Frage des öffentlichen Verkehrs an Feiertagen."
 ISR_matkal_women: "HaTovot LaKravi"
 ISR_matkal_women_desc: "Wir sollten Frauen nicht nur den Militärdienst erlauben, sondern auch Kampfeinsätze."
 ISR_millet_system: "Das Millet-System aufgeben"
 ISR_millet_system_desc: "Das Priestertum hat unser Land zu lange beeinflusst, es ist Zeit, dem ein Ende zu setzen."
 ISR_lgbt_marriage: "LGBT-Ehe legalisieren"
 ISR_lgbt_marriage_desc: "Wir sollten LGBT-Ehen legalisieren und die Akzeptanz von LGBT fördern."
 ISR_redraft_conscription_law: "Das Tal-Gesetz neu fassen"
 ISR_redraft_conscription_law_desc: "Wir müssen nun damit beginnen, Ultraorthodoxe für Zahal einzuziehen."
 ISR_stop_yeshiva_money: "Die Finanzierung der Jeschiwas beenden"
 ISR_stop_yeshiva_money_desc: "Kein Geld mehr für Ultraorthodoxe! Sie sind wie Parasiten auf dem Körper der steuerzahlenden Gesellschaft!"
 ISR_accept_kotel_protocols: "Die Kotel-Frauen anerkennen"
 ISR_accept_kotel_protocols_desc: "Die Anerkennung der Kotel-Women-Bewegung ist nicht nur unsere ideologische Entscheidung, sondern auch eine rationale. Nieder mit dem Dogmatismus!"
 ISR_recognize_reformist_conversions: "Reformistische Konversionen anerkennen"
 ISR_recognize_reformist_conversions_desc: "Wir müssen reformistische Konversionen anerkennen und Juden aus aller Welt die Rückkehr nach Israel ermöglichen."
 ISR_religous_status_quo_revisit: "Die Unabhängigkeitserklärung neu betrachten"
 ISR_religous_status_quo_revisit_desc: "Endlich können wir die Unabhängigkeitserklärung erneut prüfen und den religiösen Status quo zurücknehmen."
 ISR_meretz: "§7Die Partei der Tatkraft§!"
 ISR_meretz_desc: "Meretz ist eine linke, sozialdemokratische, säkularistische und arbeiterzionistische Partei. Sie betont die Zweistaatenlösung zur Lösung des israelisch-palästinensischen Konflikts, fördert soziale Gerechtigkeit und Menschenrechte, religiöse Freiheit und legt einen besonderen Schwerpunkt auf Umweltschutz."
 ISR_jewish_arab_partnership: "Jüdisch-palästinensische Partnerschaften"
 ISR_jewish_arab_partnership_desc: "Als erster Schritt hin zu Zusammenarbeit und hoffentlich Frieden werden wir ein Handelsabkommen mit unseren Nachbarn unterzeichnen, um den Austausch von Waren zu erleichtern. Davon werden beide Volkswirtschaften profitieren."
 ISR_affirmative_action: "Affirmative Action unterstützen"
 ISR_affirmative_action_desc: "Als weiteren Schritt hin zum Zusammenleben werden wir die Wirtschaft unserer Nachbarn mit Investitionen unterstützen. Wir sind sicher, dass sie das zu schätzen wissen werden, und die Stabilität der Region wird zunehmen."
 ISR_meretz_green: "Neuer Green Deal"
 ISR_meretz_green_desc: "Unser Land leidet, unsere Erde braucht einen respektvolleren Umgang. Wir müssen uns von fossilen Brennstoffen abwenden und darauf hinarbeiten, unsere CO2-Emissionen zu neutralisieren. Dazu werden wir massiv in erneuerbare Energien investieren. Das wird Geld kosten, aber es ist das Richtige."
 ISR_ideological_feminism: "Ideologischer Feminismus"
 ISR_ideological_feminism_desc: "Wir bekräftigen unsere Überzeugung, dass Frauen in unserer Gesellschaft die gleichen Rechte haben sollten!"
 ISR_fight_gender_discrimination: "Häusliche Gewalt bekämpfen"
 ISR_fight_gender_discrimination_desc: "Es ist Zeit, korrigierende Maßnahmen gegen Geschlechterdiskriminierung und häusliche Gewalt zu ergreifen, unsere Gesellschaft kann das nicht länger tolerieren. Deshalb werden wir den Militärdienst reformieren und Vaterschaftsurlaub einführen."
 ISR_kibbutz_meretz: "Die Kibbuzbewegung fördern"
 ISR_kibbutz_meretz_desc: "Die Kibbuzim sind ein Fundament des Staates Israel und ein großartiges Beispiel gemeinschaftlichen Lebens, in dem Menschen zusammenarbeiten, um ein gemeinsames Ziel zu erreichen und ihr Leben zu teilen. Wir werden dies mit Investitionen fördern und erleichtern."
 ISR_western_world: "Teil der europäischen Zivilisation"
 ISR_western_world_desc: "Wir sind ein Teil der europäischen Zivilisation und sollten entsprechend handeln!"
 meretz_affirmative: "Israelisch-palästinensische Partnerschaft"
 ISR_raam_party: "§6Die Vereinigte Arabische Liste§!"
 ISR_raam_party_desc: "Die Vereinigte Arabische Liste, allgemein unter ihrem hebräischen Akronym Ra'am bekannt, ist eine arabische politische Partei in Israel und der politische Arm des südlichen Zweigs der islamischen Bewegung."
 ISR_shura_council: "Abbas und der Schura-Rat"
 ISR_shura_council_desc: "Wir sollten versuchen, den Streit innerhalb der Raam-Partei beizulegen. Das könnte sich auch auf Palästina auswirken."
 ISR_bedouin_interests: "Beduineninteressen"
 ISR_bedouin_interests_desc: "Beduinen leben im südlichen Teil Israels. Wir müssen diesen entwickeln, um ihre Bedürfnisse zu erfüllen."
 ISR_recognize_illegal_outposts: "Illegale Außenposten anerkennen"
 ISR_recognize_illegal_outposts_desc: "Wir müssen illegale Außenposten anerkennen und den Druck auf Palästina verringern."
 ISR_family_values: "'Alte und gute' Familienwerte"
 ISR_family_values_desc: "Wir müssen muslimische Familienwerte unterstützen und sie in unsere Sozialpolitik integrieren."
 ISR_legalize_polygamy: "Polygamie legalisieren"
 ISR_legalize_polygamy_desc: "Wir müssen Polygamie entsprechend den Forderungen der Raam-Partei legalisieren."
 ISR_conversion_therapies: "Arabische Konversionstherapeuten"
 ISR_conversion_therapies_desc: "Wir müssen Konversionstherapeuten mit arabischer Besonderheit zulassen ..."
 ISR_legalized_plygamy: "Polygamie legalisiert"
 ISR_down_with_imperialism: "Nieder mit den Imperialisten!"
 ISR_down_with_imperialism_desc: "Es war der amerikanische Imperialismus, der die religiösen Konflikte in unserem Land ausgelöst und fortgeführt hat. Wir müssen unser Leid rächen!"
 ISR_join_arab_league: "Der Arabischen Liga beitreten"
 ISR_join_arab_league_desc: "Bei einer so großen arabischen Bevölkerung in unserem Land müssen wir der Arabischen Liga beitreten."
 ISR_befriend_china_isratine: "China annähern"
 ISR_befriend_china_isratine_desc: "China ist ein befreundetes internationalistisches Land. Wir sollten uns mit ihnen anfreunden!"
 ISR_befriend_libya: "An Gaddafis Prophezeiung erinnern"
 ISR_befriend_libya_desc: "Es war zuerst Gaddafis Prophezeiung, die eine Vision von Juden und Palästinensern hatte, die in Freundschaft zusammenfinden."
 ISR_identity_atheism: "Die Ketten der Religion brechen"
 ISR_identity_atheism_desc: "Keine spaltende Religiosität mehr! Es sind diese Unterschiede, die uns auseinandergetrieben haben."
 ISR_identity_religion: "Alle Menschen unter Gott"
 ISR_identity_religion_desc: "Wir dürfen Religion nicht als Teil unserer Identität ablehnen, sondern sollten unsere Unterschiede vielmehr annehmen."
 ISR_judean_legacy: "Ein gemeinsames judäisches Erbe"
 ISR_judean_legacy_desc: "Wir sind alle große Erben Judäas, einst getrennt durch das schwere Schicksal, das unsere Völker spaltete. Wir müssen in die Zeit des Königreichs Juda zurückkehren."
 ISR_galilea_identity: "An die galiläische Zeit erinnern"
 ISR_galilea_identity_desc: "Wir müssen uns an Zeiten erinnern, in denen Freundlichkeit und gegenseitiges Verständnis in unserem Land herrschten. An die Zeit, in der Palästinenser und Juden in Harmonie und gemeinsam existierten."
 ISR_canaan_identity: "Zurück nach Kanaan"
 ISR_canaan_identity_desc: "Denn die Kanaaniter und alle Bewohner des Landes werden es hören, uns ringsum umzingeln und unseren Namen von der Erde tilgen. Und was wirst du dann mit deinem großen Namen tun?"
 ISR_identity_question: "Eine neue Identität schaffen"
 ISR_identity_question_desc: "Um unseren neuen binationalen Staat zu festigen, müssen wir eine neue Identität für unser Volk schaffen ..."
 ISR_binational_state: "§LHeveinu Shalom Aleichem§!"
 ISR_binational_state_desc: "Jede Feindseligkeit muss enden, und ebenso unser sinnloser Kampf mit Palästina. Es ist Zeit, uns zu vereinen."
 ISR_return_refugees: "Das Rückkehrgesetz überarbeiten"
 ISR_return_refugees_desc: "Da wir nun ein binationaler Staat sind, können sowohl Juden als auch Palästinenser in unser Land zurückkehren."
 ISR_un_inspections: "Inspektoren der Vereinten Nationen zulassen"
 ISR_un_inspections_desc: "Inspektoren der Vereinten Nationen müssen Zugang zu allen Informationen über unsere nuklearen Fähigkeiten erhalten."
 ISR_abandon_nukes: "Ein Akt der Geste"
 ISR_keep_nukes: "Ihre Ängste beruhigen"
 ISR_befriend_south_africa: "Unser gemeinsames Erbe"
 ISR_befriend_south_africa_desc: "Wir sollten uns nach so vielen Jahren der Feindseligkeit mit Südafrika anfreunden."
 ISR_federalism: "Das Heilige Land föderalisieren"
 ISR_federalism_desc: "Wir müssen Isratine föderalisieren, um weitere ethno-politische Spaltungen zu verhindern."
 ISR_palestinian_army: "Die Sicherheitskräfte integrieren"
 ISR_palestinian_army_desc: "Wir sollten die Sicherheitskräfte integrieren und neue arabisch-jüdische gemeinsame Einheiten schaffen."
 ISR_milk_and_honey: "Land von Milch und Honig"
 ISR_milk_and_honey_desc: "Wir sollten ein Land des Wohlstands und des Glücks sein."
 ISR_judean_identity: "Judäische Identität"
 ISR_canaans_identity: "Moloch-Identität"
 ISR_galil_identity: "Galiläische Identität"
 religious_divide: "Religiöse Spaltung"
 ISR_idea_isratine_federalism: "Föderalismus im Heiligen Land"
 ISR_discover_gas: "Die größte Entdeckung"
 ISR_discover_gas_desc: "Wir haben entdeckt, dass unsere umliegenden Gewässer voller förderbaren Gases sind. Um die erste Phase zu beginnen, müssen wir Marinestützpunkte an unseren Küsten errichten."
 ISR_tamar: "Tamar erschließen"
 ISR_tamar_desc: "Wir sollten die Küsten vor Tel Aviv erschließen, um Gas aus dem Meer zu fördern."
 ISR_leviathan: "Leviathan erschließen"
 ISR_leviathan_desc: "Auch Galiläa ist reich an natürlichem unterirdischem Gas. Holen wir es heraus."
 ISR_dolphin: "Dolphin erschließen"
 ISR_dolphin_desc: "Auch die Küsten des Negev sind reich an Erdgas. Wir müssen auch dieses fördern."
 ISR_prefer_turkey: "Die Beziehungen zur Türkei neu beleben"
 ISR_prefer_turkey_desc: "Wir sollten mit der Türkei kooperieren und unsere Beziehungen zu ihr ausbauen."
 ISR_prefer_greece: "Ein hellenisches Bündnis schmieden"
 ISR_prefer_greece_desc: "Wir sollten mit Griechenland bei künftigen Pipelineprojekten sowie in anderen wirtschaftlichen und politischen Fragen zusammenarbeiten."
 ISR_blue_flag: "Blue-Flag-Manöver"
 ISR_blue_flag_desc: "Wir sollten Griechenland militärische Zusammenarbeit anbieten, als unserem wichtigsten Partner im Mittelmeerraum."
 ISR_east_med_pipeline: "Das East-Med-Projekt"
 ISR_east_med_pipeline_desc: "Unsere Beziehungen zu Zypern und Griechenland machen sie zu den natürlichen Partnern, mit denen wir unsere Pipeline bauen sollten."
 ISR_visit_greece: "Militärattaché nach Griechenland"
 ISR_visit_greece_desc: "Wir müssen Griechenlands Unabhängigkeit und Souveränität sichern, da dies in unserem unmittelbaren Interesse liegt."
 ISR_claim_aphrodite: "Das Aphrodite-Feld beanspruchen"
 ISR_claim_aphrodite_desc: "Um unsere Ansprüche auf das Aphrodite-Feld zu untermauern, müssen wir Nordzypern unterstützen."
 ISR_support_blue_homeland: "Die Blaue Heimat anerkennen"
 ISR_support_blue_homeland_desc: "Wir können versuchen, der Türkei militärische Zusammenarbeit anzubieten und gemeinsame Manöver zu beginnen."
 ISR_israel_turkey_pipeline: "Israelisch-türkische Gaspipeline"
 ISR_israel_turkey_pipeline_desc: "Wir sollten unsere Pipeline mit der Türkei bauen, da sie sich uns als guter Verbündeter erwiesen hat."
 ISR_karish: "Mit Bohrungen in Karish beginnen"
 ISR_karish_desc: "Wir können versuchen, in der Region Karish mit Gasbohrungen zu beginnen. Das könnte jedoch die Hisbollah ernsthaft verärgern. Wenn unsere Armee stark genug ist, könnten sie allerdings eine vorübergehende Vereinbarung akzeptieren ..."
 ISR_madan: "Die Nachrichtendirektion"
 ISR_madan_desc: "Die israelische Marineaufklärungsabteilung ist eine Stabseinheit im Hauptquartier der israelischen Marine. Wie andere Nachrichtendienste der IDF ist sie fachlich der Nachrichtendirektion unterstellt."
 ISR_tech_superiority: "Unseren Vorsprung bewahren"
 ISR_tech_superiority_desc: "Wir sollten uns nicht nur auf ausländische Lieferungen von Schiffen und U-Booten verlassen, sondern unsere eigene Forschung und Produktion ausbauen."
 ISR_bibi_submarine_deal: "Fragwürdige Geschäfte tätigen"
 ISR_bibi_submarine_deal_desc: "Wir sollten nicht auf das Establishment hören, das einem weiteren gleichartigen Vertrag mit den Deutschen höchst skeptisch gegenübersteht. Wir sollten die Zustimmung zu dem Geschäft vortäuschen und es vorantreiben."
 ISR_dakar: "Dakar vorbereiten"
 ISR_dolphin_1: "Die Dolphin-II-Klasse"
 ISR_dolphin_1_desc: "Wir sollten die U-Boote studieren und unsere technologischen Möglichkeiten bei der U-Boot-Produktion erweitern."
 ISR_thyssenkrupp_deal: "Ein Abkommen mit Thyssenkrupp"
 ISR_thyssenkrupp_deal_desc: "Kaufen wir fünf ältere deutsche U-Boote, um unseren Schutz sicherzustellen, bis wir neue entwerfen und bauen können."
 ISR_ships_dvora: "Die Dvora"
 ISR_ships_dvora_desc: "Das schnelle Patrouillenboot der Dvora-Klasse ist eine Klasse schneller Patrouillenboote, die von Israel Aerospace Industries für das israelische Seekorps auf Grundlage der israelischen Dabur-Klasse gebaut wurde."
 ISR_ships_bat_yam: "Bat Yam"
 ISR_ships_bat_yam_desc: "Wir sollten in Bat Yam Werften bauen, damit unsere Militär- und Handelsflotte dort gebaut und repariert werden kann."
 ISR_ships_saar: "Die Sa'ar aufrüsten"
 ISR_ships_saar_desc: "Wir sollten die Sa'ar-Werften modernisieren, damit unsere Schiffe dort effektiver repariert werden können."
 ISR_middle_east_peace: "Jesajas Träume"
 ISR_middle_east_peace_desc: "Nun sollten wir unsere ganze Aufmerksamkeit darauf richten, engere Beziehungen zu befreundeten Ländern im Nahen Osten aufzubauen."
 ISR_enemy_of_my_enemy: "Neue gemeinsame Feinde"
 ISR_enemy_of_my_enemy_desc: "Angesichts der neuen geopolitischen Lage im Nahen Osten sollten wir vielleicht einen neuen Prozess zur Verbesserung der Beziehungen zu Saudi-Arabien beginnen."
 ISR_travel_morocco: "Mohammed VI. besuchen"
 ISR_travel_morocco_desc: "Marokko ist eines der wenigen arabischen Länder, das einigermaßen gute Beziehungen zu uns hat. Wir müssen diese Beziehungen zu einer echten Freundschaft ausbauen!"
 ISR_gulf_offices: "Büros am Golf eröffnen"
 ISR_gulf_offices_desc: "Um unseren Einfluss in den Golfstaaten auszuweiten, müssen wir unsere Regierungsbüros in den Golfstaaten wiedereröffnen."
 ISR_apologize_past_actions: "Uns für Zwischenfälle entschuldigen"
 ISR_apologize_past_actions_desc: "Früher mussten wir aus reiner Notwendigkeit Mossad-Agenten auf dem Gebiet einiger Golfstaaten einsetzen, um unerwünschten Einfluss zu bekämpfen. Nun müssen wir die Beziehungen zu diesen Ländern reparieren und uns für unser Handeln entschuldigen."
 ISR_abraham_accords_focus: "Die Abraham-Abkommen"
 ISR_abraham_accords_focus_desc: "Wir sollten ein neues diplomatisches Treffen einberufen, bei dem wir versuchen werden, das Eis zwischen verschiedenen arabischen Ländern und Israel zu schmelzen."
 ISR_negev_forum_focus: "Das Negev-Forum"
 ISR_negev_forum_focus_desc: "Um die regionale Sicherheit zu erhöhen und die regionale Zusammenarbeit zu stärken, können wir ein neues Forum für unsere Partner im Nahen Osten schaffen."
 ISR_cultural_ties: "Kulturelle Verbindungen bekräftigen"
 ISR_cultural_ties_desc: "Die jüdische Diaspora in Marokko ist noch immer recht groß und hat erheblichen Einfluss auf die marokkanische Wirtschaft. Vielleicht sollten wir das nutzen ..."
 ISR_visa_indirect_travel: "Indirekte visafreie Reisen"
 ISR_visa_indirect_travel_desc: "Um Reisen unserer Bürger zwischen Marokko und Israel zu erleichtern, könnten wir versuchen, eine indirekte visafreie Reiselösung auszuhandeln."
 ISR_denounce_polisario_iran: "Die größte Verbindung anprangern"
 ISR_denounce_polisario_iran_desc: "Wir müssen Marokko in seinem Kampf gegen die Separatisten und Terroristen der Polisario unterstützen."
 ISR_restore_security_links: "Sicherheitsverbindungen wiederherstellen"
 ISR_restore_security_links_desc: "Wir müssen Marokko auch im Bereich der Nachrichtendienste unterstützen, da wir tatsächlich in einer Win-win-Konstellation davon profitieren können."
 ISR_usa_mor_isr_deal: "Ein dreiseitiges Abkommen?"
 ISR_usa_mor_isr_deal_desc: "Um unsere marokkanischen Partner bei der Normalisierung der Beziehungen zu unterstützen, können wir versuchen, die USA um Unterstützung bei unseren diplomatischen Bemühungen zu bitten."
 ISR_return_to_africa: "Nach Afrika zurückkehren"
 ISR_return_to_africa_desc: "Wir müssen unseren Einfluss in Afrika weiter ausbauen, denn viele unserer stärksten Verbündeten stammen von diesem Kontinent."
 ISR_invest_in_eac: "Nach Ostafrika reisen"
 ISR_invest_in_eac_desc: "Wir müssen uns mit ostafrikanischen Staaten anfreunden und unseren Einfluss auf sie ausweiten."
 ISR_eritrean_bases: "Stützpunkte in Eritrea"
 ISR_eritrean_bases_desc: "Vielleicht können wir versuchen, mit Eritrea militärische Zusammenarbeit auszuhandeln, von der beide Seiten profitieren."
 ISR_kampala_meeting: "Ein Treffen in Kampala"
 ISR_kampala_meeting_desc: "Fast ein halbes Jahrzehnt ist vergangen, seit israelische Spezialeinheiten im Rahmen der Operation Entebbe den internationalen Flughafen von Kampala stürmten, um die Geiseln eines entführten Flugzeugs zu befreien, und heute ist Israels Premierminister [ISR.GetLeader] mit einer El-Al-Maschine in Uganda gelandet. Zwar hat die Normalisierung der Beziehungen zwischen Israel und den Mitgliedern der Ostafrikanischen Gemeinschaft bereits in den 1990er Jahren begonnen, doch haben sich die Beziehungen nicht in das goldene Zeitalter zurückentwickelt, das die Entscheidungsträger in Jerusalem vor dem Jom-Kippur-Krieg auf dem Kontinent genossen. Unter [ISR.GetLeader] plant Israel jedoch seine „Rückkehr nach Afrika“, indem es israelische Technologien, insbesondere Entsalzungs- und Wassertechnologien, nutzt, um die Türen des afrikanischen Kontinents zu öffnen. Laut [ISR.GetLeader] ist Ostafrika das Tor, durch das Israel den Kontinent betritt, und er möchte die wirtschaftlichen, politischen und diplomatischen Beziehungen zu den ostafrikanischen Staaten sowie zu ganz Subsahara-Afrika erheblich ausbauen."
 ISR_peace_sudan: "Das Washingtoner Memorandum"
 ISR_peace_sudan_desc: "Vielleicht können wir versuchen, die Beziehungen zum Sudan zu normalisieren, indem wir unsere wirtschaftlichen Verbindungen zu ihm ausbauen."
 ISR_peace_chad: "Die N'Djamena-Protokolle"
 ISR_peace_chad_desc: "Angesichts der aktuellen Lage im Tschad könnten wir davon profitieren, indem wir ihnen ein Waffenpaket und die Normalisierung der Beziehungen anbieten."
 ISR_peace_sahel: "Die Sahelzone ansprechen"
 ISR_peace_sahel_desc: "Nun können wir versuchen, uns den Staaten der Sahelzone anzunähern, indem wir unsere Zusammenarbeit ausbauen und vielleicht in sie investieren."
 ISR_visit_oman: "Nach Oman reisen"
 ISR_visit_oman_desc: "Oman ist einer der wenigen möglichen Verbündeten von uns im Nahen Osten. Wir müssen gute Beziehungen zu ihm pflegen."
 ISR_covert_ties: "Verdeckte Verbindungen knüpfen"
 ISR_covert_ties_desc: "Wir müssen verdeckte Verbindungen zu unseren Verbündeten am Golf knüpfen. Mossad-Agenten sollten bereitstehen, falls sie zustimmen ..."
 ISR_yemen_intervene: "Die Meerengen beobachten"
 ISR_yemen_intervene_desc: "Auch wenn Jemen nicht zu unseren engsten Freunden gezählt werden kann, ist es vernünftiger, sie gegen iranische Stellvertreter zu unterstützen, als alles einfach laufen zu lassen."
 ISR_yemen_war: "Operation Krone von Saba"
 ISR_yemen_war_desc: "Es ist an der Zeit, in den jemenitischen Bürgerkrieg einzugreifen und die Bedrohung durch die Huthis zu beenden!"
 ISR_mossad_diplomacy: "Mossad-Diplomatie"
 ISR_mossad_diplomacy_desc: "Wir können den Mossad nutzen, um ein breiteres Spektrum diplomatischer Aktionen im Nahen Osten durchzuführen, insbesondere dann, wenn unsere Partner nichts dagegen haben."
 ISR_bahrain_economic_conference: "Wirtschaftskonferenz von Manama"
 ISR_bahrain_economic_conference_desc: "Wir können versuchen, bei einer neuen Wirtschaftskonferenz in Manama ein Abkommen mit den Golfstaaten zu schließen. Davon könnten sowohl unsere Partner am Golf als auch wir profitieren."
 ISR_visit_saudi: "Nach Saudi-Arabien reisen"
 ISR_visit_saudi_desc: "Um einen letzten Schutzschild gegen unseren größten Feind zu errichten, sollten wir Saudi-Arabien heimlich besuchen und militärische Kooperation vereinbaren."
 ISR_treaty_saudi: "Den goldenen Apfel erreichen"
 ISR_treaty_saudi_desc: "Wir können versuchen, endlich mit Saudi-Arabien zu verhandeln und vielleicht einen vollständigen Frieden zwischen unseren Ländern herzustellen."
 ISR_position_of_strength: "Aus einer Position der Stärke heraus"
 ISR_position_of_strength_desc: "Warum sollten wir uns mit Bündnisbindungen und Verpflichtungen belasten, wenn wir unsere Sicherheit auch durch indirekte Beteiligung und selektive Abkommen erhöhen können ..."
 ISR_new_middle_east: "Ein neuer Naher Osten"
 ISR_new_middle_east_desc: "Nach all unseren diplomatischen Bemühungen muss nun endlich ein neuer Naher Osten Gestalt annehmen!"
 ISR_exhibitions_dubai: "Die Ausstellungen in Dubai besuchen"
 ISR_exhibitions_dubai_desc: "Um unsere Stellung im Golf und im Welthandel zu festigen, sollten wir unsere Unternehmen möglicherweise auf den jüngsten Wirtschafts- und Technologieausstellungen Dubais vertreten."
 ISR_uae_invest: "Emiratisch-israelische Partnerschaften"
 ISR_uae_invest_desc: "Angesichts des heutigen Wachstumszustands der Wirtschaft der VAE sollten wir, um unsere Zusammenarbeit mit ihnen zu vertiefen, um Investitionen bitten."
 ISR_visit_japan: "Der aufgehenden Sonne nachjagen"
 ISR_visit_japan_desc: "Japan ist die aufgehende Sonne des wirtschaftlichen Erfolgs im Fernen Osten. Gute Beziehungen zu ihnen aufzubauen, ist für uns notwendig."
 ISR_visit_vietnam: "Sich Vietnam öffnen"
 ISR_visit_vietnam_desc: "Der Agrarsektor Vietnams wächst rasch. Das können wir zu unserem beiderseitigen Vorteil nutzen."
 ISR_deal_with_neighbors: "Einen Olivenzweig ausstrecken"
 ISR_deal_with_neighbors_desc: "Nun sollten wir unsere diplomatischen Bemühungen gegenüber Ägypten und Jordanien beginnen."
 ISR_deal_with_jordan: "Jenseits des Jordan"
 ISR_deal_with_jordan_desc: "Wir müssen jetzt unsere diplomatischen Beziehungen zu Jordanien aufnehmen und entscheiden, wie wir unser beiderseitiges Verhältnis gestalten."
 ISR_jordan_defensive: "Unsere Ostflanke sichern"
 ISR_jordan_defensive_desc: "Wir müssen unsere jordanischen Partner unterstützen und mit ihnen im militärischen Bereich kooperieren."
 ISR_jordan_offensive: "Weder lügen noch vergeben"
 ISR_jordan_offensive_desc: "Jordanien muss unserer Regierung unterworfen werden. Jüngste Entwicklungen haben das Land für unsere diplomatischen Bedürfnisse ungeeignet gemacht."
 ISR_jordan_military_bases: "Das Militär bestechen"
 ISR_jordan_military_bases_desc: "Um die jordanische Souveränität zu untergraben, sollten wir ihre Generäle bestechen, damit sie sich unserer Seite anschließen ..."
 ISR_manipulate_royal_family: "Die königliche Politik manipulieren"
 ISR_manipulate_royal_family_desc: "Im haschemitischen Herrscherhaus und unter seinen Anhängern gibt es viele Menschen, die gegen unseren Einfluss sind. Wir sollten sie entfernen."
 ISR_puppet_jordan: "In Jordanien intervenieren"
 ISR_puppet_jordan_desc: "Endlich sind alle Vorbereitungen abgeschlossen. Nun können wir Jordanien den letzten Schlag versetzen!"
 ISR_war_with_isis: "Operation Festung der Wölfe"
 ISR_war_with_isis_desc: "Angesichts der existenziellen Bedrohung durch salafistische Feinde vor unseren Toren müssen wir präventiv handeln und sie vernichten!"
 ISR_black_september_legacy: "Das Erbe des Schwarzen September"
 ISR_black_september_legacy_desc: "Wir sollten Jordanien um jeden Preis schützen, denn sie bilden unsere Ostflanke, die uns vor Feinden schützt."
 ISR_green_blue_deal: "Das grün-blaue Abkommen"
 ISR_green_blue_deal_desc: "Wir sollten mit Jordanien und den VAE einen dreiseitigen Vertrag über neue Möglichkeiten im Bereich grüner Energie unterzeichnen."
 ISR_tourism_port_jordan: "Eilat-Aqaba-Verbindungen"
 ISR_tourism_port_jordan_desc: "Wir sollten mit privaten jordanischen Unternehmen zusammenarbeiten, um unsere südlichen Häfen auszubauen und Verbindungen zwischen Eilat und Aqaba herzustellen."
 ISR_preserve_the_dead_sea: "Das Tote Meer bewahren"
 ISR_preserve_the_dead_sea_desc: "Gemeinsam mit Jordanien sollten wir versuchen, das Tote Meer für unsere künftigen Projekte zu bewahren."
 ISR_open_degania_dam: "Den Degania-Damm bauen"
 ISR_open_degania_dam_desc: "Auch wenn das Jordanien verärgern könnte, sollten wir unser Wasser nur für uns selbst nutzen, indem wir den Degania-Damm bauen."
 ISR_jordan_river_agreement: "Weg von den Ufern des Kinneret"
 ISR_jordan_river_agreement_desc: "Wir sollten eine weniger radikale Haltung einnehmen und versuchen, einen für uns und Jordanien annehmbareren Plan auszuhandeln."
 ISR_intelligence_sharing_jordan: "Das Treffen von Mofaz und Malakhwi"
 ISR_intelligence_sharing_jordan_desc: "Wir sollten unsere Mossad-Agenten in Jordanien einsetzen, um die legitime haschemitische Regierung vor unseren gemeinsamen Feinden zu schützen."
 ISR_iraq_war: "Der neue Nebukadnezar"
 ISR_iraq_war_desc: "Saddams Irak ist eine existenzielle Bedrohung für uns und für Jordanien. Wir sollten Maßnahmen gegen den irakischen Einfluss ergreifen."
 ISR_expand_on_jordan_treaty: "Den Arava-Vertrag ausbauen"
 ISR_expand_on_jordan_treaty_desc: "Am 26. Oktober 1994 unterzeichneten Jordanien und Israel den Friedensvertrag in einer Zeremonie im Arava-Tal in Israel, nördlich von Eilat und nahe der jordanischen Grenze. Premierminister Rabin und Premierminister Abdelsalam al-Majali unterzeichneten den Vertrag, und der Präsident Israels, Ezer Weizman, schüttelte König Hussein die Hand."
 ISR_mediate_nile_egypt: "Den Nil-Staudamm verurteilen"
 ISR_mediate_nile_egypt_desc: "Im Streit zwischen Ägypten und Äthiopien sollten wir eine proägyptische Haltung einnehmen."
 ISR_mediate_nile_ethiopia: "Pro-äthiopische Haltung"
 ISR_mediate_nile_ethiopia_desc: "Im Streit zwischen Ägypten und Äthiopien sollten wir eine proäthiopische Haltung einnehmen."
 ISR_bring_back_falashmura: "Die Falaschmura zurückholen"
 ISR_bring_back_falashmura_desc: "Wir sollten die Rückkehr aller äthiopischen Juden nach Israel verlangen. Falls Äthiopien nicht zustimmt, müssen wir in unseren Beziehungen zu ihnen eine härtere Haltung einnehmen ..."
 ISR_fallow_deer_diplomacy: "Damhirsch-Diplomatie"
 ISR_fallow_deer_diplomacy_desc: "Damals schenkte der Schah von Iran sie Israel als Geste der Freundschaft. Seither sind diese Hirsche im Iran selbst ausgestorben, doch die nach Israel gebrachten Tiere haben überlebt."
 ISR_propaganda_in_iran: "Bemühungen um ein gutes Gesicht"
 ISR_propaganda_in_iran_desc: "Wir müssen die freundliche Regierung Irans unterstützen und dadurch möglicherweise mehr Einfluss auf sie gewinnen."
 ISR_water_and_life: "Wasser und Leben bringen"
 ISR_water_and_life_desc: "Iran hat seit langem Probleme mit Bewässerung und Wasserversorgung. Dabei können wir ihnen gegen Bezahlung helfen."
 ISR_direct_flights_to_iran: "El Al zurückbringen"
 ISR_invest_iran: "In den Iran zurückkehren"
 ISR_invest_iran_desc: "Um unsere gegenseitige Abhängigkeit zu vertiefen, können wir versuchen, Iran um Investitionen zu bitten."
 ISR_eilat_ashkelon_route: "Die Eilat-Aschkelon-Pipeline"
 ISR_eilat_ashkelon_route_desc: "Die Eilat Ashkelon Pipeline Company betreibt mehrere Pipelines für Rohöl und raffinierte Erdölprodukte in Israel, am bekanntesten die Eilat-Aschkelon-Pipeline, die Rohöl durch den Süden Israels zwischen dem Roten Meer und dem Mittelmeer transportiert. Die EAPC betreibt außerdem zwei maritime Ölterminals sowie Öllagerdepots im Land."
 ISR_transasiatic_oil: "Die Transasiatische Ölgesellschaft"
 ISR_transasiatic_oil_desc: "Nun, da unsere Handelsrouten mit Iran offen sind, können wir in ihr Öl investieren."
 ISR_gamliel_plan: "Der Gamliel-Plan"
 ISR_gamliel_plan_desc: "Wir müssen die Handelsbeziehungen zwischen unserem Land und Iran fördern, um die regionale Integration zu vertiefen."
 ISR_iran_singapore_model: "Das singapurische Modell"
 ISR_iran_singapore_model_desc: "So wie wir damals die Armee Singapurs ausgebildet haben, müssen wir nun unsere iranischen Freunde unterstützen, indem wir ihre Armee mit unserer Erfahrung formen."
 ISR_flower_ii_project: "Flower-Tsur II"
 ISR_flower_ii_project_desc: "Nach dem Abschluss eines Partnerschaftsvertrags über militärische Zusammenarbeit müssen wir eine neue gemeinsame Anstrengung zur Raketenentwicklung beginnen."
 ISR_parash_partner: "PARASH-Partnerschaft"
 ISR_parash_partner_desc: "Da unsere Ziele mit denen Irans übereinstimmen, können wir mit Iran im Bereich der Nachrichtendienste kooperieren."
 ISR_military_liason_office: "Die Rosen-Grimberg-Mission"
 ISR_military_liason_office_desc: "Nun können wir mit Iran ein militärisches Koordinierungszentrum errichten, um unsere Strategie in ein kohärentes Vorgehen einzubinden."
 ISR_treaty_of_susa: "Der Vertrag von Susa"
 ISR_treaty_of_susa_desc: "Wir müssen von Iran Entschädigungen für iranische Israelis verlangen, die während der Revolution geflohen sind."
 ISR_india_to_kush: "Von Hodu bis Kush"
 ISR_india_to_kush_desc: "Von Hodu bis Kush muss unser Sicherheitsgürtel vollständig errichtet werden."
 ISR_intervention_afghanistan: "Den Blick nach Afghanistan richten"
 ISR_intervention_afghanistan_desc: "Wir müssen verhindern, dass die Taliban an die Macht kommen, auch wenn unsere Beziehungen zu Afghanistan zuvor nie besonders eng waren."
 ISR_operation_silk_road: "Operation Seidenstraße"
 ISR_operation_silk_road_desc: "Um die Sicherheit der gesamten Region zu gewährleisten, müssen wir Pakistan absichern und sicher machen."
 ISR_royal_road: "Die Königsstraße wiederherstellen"
 ISR_royal_road_desc: "Wir müssen die alte Struktur der internationalen Politik wiederherstellen und sie zu unseren Gunsten gestalten ..."
 ISR_royal_road_iraq: "Den Blick auf Babylon richten"
 ISR_royal_road_iraq_desc: "Der Irak muss gesichert werden, damit unser großes Projekt vollendet werden kann."
 ISR_royal_road_syria: "Den Blick auf Aram-Damaskus richten"
 ISR_royal_road_syria_desc: "Wir sollten die syrische Bedrohung so schnell wie möglich neutralisieren."
 ISR_periphery_pact: "Den Peripherie-Pakt wiederherstellen"
 ISR_periphery_pact_desc: "Wir müssen unser eigenes Bündnis schaffen und einen neuen Peripherie-Pakt errichten."
 ISR_cento_iran: "Das Haus der Nationen"
 ISR_cento_iran_desc: "Da Iran den CENTO-Pakt kürzlich wiederbelebt hat, müssen wir ihm zur regionalen Sicherheit beitreten."
 ISR_operation_rolling_dice: "Operation Rolling Dice"
 ISR_jews_iran: "Kehilat Iran wiederherstellen"
 ISR_eshter_tomb: "Das Grab des Mordechai wiederherstellen"
 ISR_shared_enemies: "Unsere gemeinsamen Feinde"
 ISR_shared_enemies_desc: "Nun müssen wir mit der Planung unserer Politik gegenüber unseren Feinden im Nahen Osten beginnen."
 ISR_root_of_all_extremism: "Operation Falkennest"
 ISR_root_of_all_extremism_desc: "Es ist an der Zeit, dem salafistischen Schlangenhaupt ein für alle Mal den Kopf abzuschlagen!"
 ISR_deal_with_egypt: "Durch die Wüste Sinai"
 ISR_deal_with_egypt_desc: "Nach all unseren Problemen mit Ägypten scheint nun ein neues Licht der Hoffnung auf Frieden für unsere Länder."
 ISR_sinai_tourism: "Honeymoon-Diplomatie"
 ISR_sinai_tourism_desc: "Angesichts der wachsenden ägyptischen Wirtschaft sind Kooperation und Investitionen gute Möglichkeiten für uns."
 ISR_sharem_flight: "Direkte Verbindungen nach Sharm"
 ISR_sharem_flight_desc: "Wir sollten direkte Flugverbindungen von Israel nach Scharm asch-Schaich einrichten, da unsere Partnerschaft mit Ägypten und die Nachfrage israelischer Touristen recht hoch sind."
 ISR_azam_azam: "Um eine Geste des guten Willens bitten"
 ISR_azam_azam_desc: "Azam Azam ist ein israelischer Druse, der in den 1990er Jahren von Ägypten als Spion gefangen genommen wurde. Vielleicht können wir im Zuge des Normalisierungsprozesses seiner Freilassung als Geste des guten Willens erbitten."
 ISR_visit_south_korea: "Den südlichen Tiger treffen"
 ISR_visit_south_korea_desc: "Ein weiterer aufstrebender asiatischer Wirtschaftstiger ist die Republik Korea. Wir müssen gute wirtschaftliche Beziehungen zwischen unseren Ländern aufbauen."
 ISR_sinai_investigation: "Schutz in Taba fordern"
 ISR_sinai_investigation_desc: "Taba ist eine Stadt in Ägypten nahe unserer Grenze. Sie zieht viele israelische Touristen an, daher sollten wir daran arbeiten, die Sicherheit unserer Leute dort zu erhöhen."
 ISR_assam_ibrahims_mission: "Die Mission von Ahssam Ibrahim"
 ISR_assam_ibrahims_mission_desc: "Ahssam Ibrahim ist der ägyptische Botschafter in Israel, unter dem sich die Beziehungen im Bereich der militärischen Zusammenarbeit und des Nachrichtenaustauschs deutlich verbessert haben."
 ISR_arish_ashkelon: "Die Arisch-Aschkelon-Pipeline"
 ISR_arish_ashkelon_desc: "Nun können wir versuchen, durch den Bau einer neuen Pipeline wesentlich stärkere wirtschaftliche Beziehungen zu Ägypten aufzubauen."
 ISR_war_qatar: "Operation Perlenprinzessin"
 ISR_war_qatar_desc: "Extremisten halten Gaza zu fest in der Hand, als dass sie jemals friedlich aufgeben würden. Es ist an der Zeit, die Wurzel der Gaza-Krise zu beenden ... Wir müssen diejenigen treffen, die Hamas aus dem Ausland unterstützen, und sie entwaffnen."
 ISR_invite_egypt_to_gas_project: "Zu Pipelineprojekten einladen"
 ISR_invite_egypt_to_gas_project_desc: "Wir müssen Ägypten zu unseren Pipelineprojekten einladen, von denen beide Seiten profitieren werden."
 ISR_egypt_anti_iran: "Pro-ägyptische Haltung"
 ISR_egypt_anti_iran_desc: "Ägypten hat sich als verlässlicherer ideologischer und politischer Verbündeter erwiesen. Sie sollten die Tiran-Inseln erhalten."
 ISR_question_of_tiran: "Das Tiran-Abkommen infrage stellen"
 ISR_question_of_tiran_desc: "Wir sollten die Unterstützung für die saudische Eigentümerschaft an den Tiran-Inseln fortsetzen, da dies für uns vorteilhafter ist."
 ISR_isis_sinai: "Die Bemühungen im Sinai unterstützen"
 ISR_isis_sinai_desc: "Wir sollten Ägypten in seinen Bemühungen unterstützen, indem wir ihnen Überwachungsdaten unserer Grenzpatrouillendrohnen zur Verfügung stellen."
 ISR_sisi_barak_call: "Die Vertragsbestimmungen ändern"
 ISR_sisi_barak_call_desc: "Vielleicht müssen wir angesichts aller Umstände den entmilitarisierten Status Ägyptens aufheben."
 ISR_arab_spring: "Mit Tahrir verhandeln"
 ISR_arab_spring_desc: "Nun sollten wir entscheiden, was wir mit Ägypten tun, nachdem dort ein feindliches Regime an die Macht gekommen ist."
 ISR_deport_from_gaza: "Ein neues Reservat"
 ISR_revive_yamit: "Jamit wiederherstellen"
 ISR_revive_yamit_desc: "Da wir den Sinai nun kontrollieren, sollten wir ihn in unser Land integrieren."
 ISR_returning_the_favor: "Den Gefallen erwidern"
 ISR_returning_the_favor_desc: "Angesichts aller Umstände sollten wir nun das Regime in Ägypten stürzen."
 ISR_watch_their_moves: "Ihre Schritte beobachten"
 ISR_watch_their_moves_desc: "Auch wenn das heutige Regime in Ägypten uns feindlich gesinnt ist, sollten wir keine radikalen Positionen einnehmen, sondern seine Schritte beobachten und das Regime von außen destabilisieren."
 ISR_deal_with_migrants: "Die ägyptische Grenzmauer"
 ISR_deal_with_migrants_desc: "Nun müssen wir eine neue Mauer gegen illegale Migranten aus Ägypten errichten."
 ISR_negotiate_with_indonesia: "Mit Indonesien verhandeln"
 ISR_negotiate_with_indonesia_desc: "Indonesien hat uns wegen seiner Unterstützung für Palästina nicht anerkannt, dennoch sind unsere wirtschaftlichen Beziehungen trotz allem weiterhin groß."
 ISR_negotiate_with_malaysia: "Druck auf Malaysia ausüben"
 ISR_temple_mount_issue: "Ein empfindliches Gleichgewicht"
 ISR_temple_mount_issue_desc: "Seit dem Sechstagekrieg (und endgültig gefestigt durch den Arava-Friedensvertrag von 1994) behalten die jordanischen religiösen Behörden, der Waqf, die Oberhoheit über Verwaltung und Funktion der Al-Aqsa-Moschee und des Tempelberg-Komplexes. Wir können zwischen einer Änderung des Status quo und der direkten Übernahme des Moscheekomplexes wählen – oder den Status quo beibehalten."
 ISR_status_quo_temple_mount: "Den Status quo beibehalten"
 ISR_status_quo_temple_mount_desc: "Vielleicht sollten wir die muslimische Kontrolle über Al-Aqsa beibehalten und zugleich unsere Verbündeten begünstigen."
 ISR_amend_status_quo: "Den Status quo ändern"
 ISR_amend_status_quo_desc: "Wir sollten keiner fremden Macht die Möglichkeit geben, unsere verschiedenen Stätten und Orte zu ihrem Vorteil zu beeinflussen! Wir sollten die direkte Kontrolle übernehmen und den Waqf vertreiben."
 ISR_temple_mount_jordanian: "Den jordanischen Waqf treffen"
 ISR_temple_mount_jordanian_desc: "Wir sollten unsere Politik gegenüber Al-Aqsa nicht überarbeiten, sondern die Zusammenarbeit mit Jordanien fortsetzen."
 ISR_temple_mount_saudi: "Die Hüterschaft überarbeiten"
 ISR_temple_mount_saudi_desc: "Vielleicht sollten wir die Zuständigkeit über Al-Aqsa Saudi-Arabien übertragen, um sie in unserer künftigen Diplomatie zu bevorzugen."
 ISR_strike_libya: "Operation Rosa Sand"
 ISR_strike_iraq: "Operation Sequel Movie"
 ISR_strike_iran: "Operation Goldene Kronreife"
 ISR_speak_to_police: "§YMit dem Mafkal sprechen§!"
 ISR_speak_to_police_desc: "Unsere innere Sicherheit leidet stark unter kriminellen Aktivitäten und der Unfähigkeit der Polizei, mit ihnen umzugehen. Das müssen wir ändern."
 ISR_form_the_national_guard: "Die Nationalgarde aufstellen"
 ISR_form_the_national_guard_desc: "Da unser Land von allen Seiten bedrängt wird, müssen wir unser Militär durch eine neue Nationalgarde verstärken."
 ISR_promote_the_swiss_model: "Das Schweizer Modell fördern"
 ISR_promote_the_swiss_model_desc: "Wir müssen uns am Schweizer Modell der Nationalgarde orientieren, um unsere entsprechend zu gestalten."
 ISR_learn_from_october_events: "Aus unseren Fehlern lernen"
 ISR_learn_from_october_events_desc: "Unsere Nationalgarde muss dafür eingesetzt werden, Geschäfte der Mafia zu stürmen."
 ISR_strenghen_ministry_of_national_security: "Ministerium für nationale Sicherheit"
 ISR_strenghen_ministry_of_national_security_desc: "Das Ministerium für nationale Sicherheit ist die landesweite Strafverfolgungsbehörde und beaufsichtigt die israelische Polizei, den israelischen Strafvollzugsdienst, die israelischen Feuer- und Rettungsdienste, die israelische Grenzpolizei, die nationale Hauptstelle zum Schutz von Kindern im Internet, die nationale Behörde für Gemeinschaftssicherheit sowie die Behörde für Zeugenschutz."
 ISR_dont_form_the_national_guard: "Das Altalena-Versprechen bewahren"
 ISR_dont_form_the_national_guard_desc: "Wir brauchen keine übermilitarisierte Struktur, um unsere Gesellschaft intakt und Kriminelle in Schach zu halten. Wir müssen die Polizei stärken, als einzige Garantie der inneren Sicherheit."
 ISR_rely_on_magav: "Die Grenzpolizei ausbauen"
 ISR_rely_on_magav_desc: "Um sicherzustellen, dass feindliche Fremde mit böswilligen Absichten nicht in unser Land gelangen, müssen wir unsere Grenzpolizei unterstützen."
 ISR_rely_on_gideonites: "Die Aktion der Gideoniter"
 ISR_rely_on_gideonites_desc: "Wir müssen Kriminelle in unserem Land ins Visier nehmen und das Land von illegalen Geschäften säubern."
 ISR_focus_yamam: "Yamam ehren"
 ISR_focus_yamam_desc: "Yamam ist sowohl zu Geiselbefreiungen als auch zu offensiven Überfalloperationen gegen Terrorziele in zivilen Gebieten fähig. Neben militärischen und antiterroristischen Aufgaben übernimmt sie auch taktische Spezialeinheitsaufgaben und verdeckte Polizeiarbeit."
 ISR_deal_with_police_racism: "Die Sorgen von Beta Israel anhören"
 ISR_deal_with_police_racism_desc: "Wir müssen Rassismus in unserer Polizei bekämpfen und gleiche Chancen bei der Einstellung fördern."
 ISR_reform_the_fire_fighting_force: "Fragwürdige Gebäude überprüfen"
 ISR_reform_the_fire_fighting_force_desc: "Wir werden mehr Durchsuchungen und Razzien gegen Kriminelle durchführen."
 ISR_shabac_intervention_no: "Ein gemeinsames Komitee bilden"
 ISR_shabac_intervention_yes: "Gesetz zur Beobachtung der nationalen Sicherheit"
 ISR_shabac_intervention_yes_desc: "Wir müssen die innere Sicherheit erhöhen, indem wir unsere Maßnahmen gegen Kriminalität rechtlich absichern."
 ISR_gather_all_the_equipment: "Alle Waffen einsammeln"
 ISR_gather_all_the_equipment_desc: "Wir müssen die USA darum ersuchen, Spezialwaffen an unsere Polizeikräfte zu verkaufen."
 ISR_show_more_presence: "Mehr Präsenz zeigen"
 ISR_show_more_presence_desc: "Wir müssen an als verdächtig geltenden Objekten stärker präsent sein und sie aktiv kontrollieren."
 ISR_storm_tuba_zangariya: "Tuba Zangariya stürmen"
 ISR_storm_tuba_zangariya_desc: "Wir müssen der Mafia den endgültigen Schlag versetzen und Tuba Zangariya, eine Stadt im Nordbezirk Israels, stürmen."
