 israel_economy.35.t: "Israel will unser Getreide kaufen!"
 israel_economy.35.d: "Israel hat ein Handelsabkommen vorgeschlagen, im Rahmen dessen sie eine große Menge unseres Getreides kaufen werden. Sollen wir zustimmen?"
 israel_economy.35.a: "Klar!"
 israel_economy.35.b: "Wir haben kein Getreide übrig."
