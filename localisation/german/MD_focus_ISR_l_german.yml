 ISR_vie_isr_coop: "Israelisch-vietnamesische landwirtschaftliche Zusammenarbeit"
 israel_economy.30.t: "Israel bietet landwirtschaftliche Zusammenarbeit an"
 israel_economy.30.d: "Die israelische Regierung hat uns kürzlich angeboten, unsere Erfahrungen im landwirtschaftlichen Bereich gegenseitig zu teilen und in der Agrarsphäre zusammenzuarbeiten. Sollen wir zustimmen?"
 israel_economy.30.a: "Klar!"
 israel_economy.30.b: "Tut uns leid, nein."
