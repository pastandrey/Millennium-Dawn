 harari_compromise: "Der Harari-Kompromiss"
 harari_compromise_desc: "Israel ist die einzige verfassungsmäßige Regierung der Welt, die niemals eine Verfassung geschaffen hat. Der von der ersten Knesset eingesetzte Verfassungsausschuss konnte sich nicht auf eine Verfassung einigen, die alle zufriedenstellt, weshalb die Regierung einen provisorischen Satz von „Grundgesetzen“ vorschlug, bis eine Verfassung ausgearbeitet würde. Wie so oft in Israel wurde auch dies jedoch dauerhaft. Das bedeutet, dass die verfassungsrechtliche Ordnung des Staates im Vergleich zu den Verfassungen anderer Länder viel leichter verändert werden kann – eine gefährliche Bedrohung für die israelische Demokratie, sollte jemand beschließen, diese Macht auszunutzen."
