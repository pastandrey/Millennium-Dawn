 israel.82.t: "Vorgehen bei der Geburtskirche"
 israel.82.d: "Unsere Truppen wurden von Terroristen angegriffen, die sich in der Geburtskirche verstecken und von dort aus Angriffe durchführen. Wir müssen sie beseitigen – aber wie?"
 israel.82.a: "Eine Kirche, die Militante beherbergt? Niederträchtig."
 israel.82.b: "Einen friedlichen Abzug aushandeln."
 israel.82.c: "Die Heiligkeit der Kirche respektieren!"
 israel.83.t: "Erfolgreiche Erstürmung!"
 israel.83.d: "Die Streitkräfte von [ROOT.GetNamewithFlag] haben die Geburtskirche erfolgreich gestürmt und geräumt und dabei 50 Terroristen getötet, die dort Zuflucht gesucht hatten!"
 israel.83.a: "Großartig!"
 israel.84.t: "Erstürmung gescheitert!"
 israel.84.d: "Die Streitkräfte von [ROOT.GetNamewithFlag] gerieten bei dem Versuch, die Geburtskirche zu stürmen, in einen Hinterhalt und wurden getötet. Alle Terroristen konnten nach dem Gefecht erfolgreich entkommen."
 israel.84.a: "Scheiße."
 storm_res_tt: "Wir werden in §Y25 Tagen§! §YEreignisse§! erhalten, die uns die §YErgebnisse der Erstürmungsoperation§! mitteilen. Sie kann §Rscheitern§! oder §Rerfolgreich sein§!!\n\nDiese Option ist deutlich riskanter, bringt aber bei Erfolg größere Ergebnisse!"
 oper_def_shiel_tt: "[ISR.GetNamewithFlag] wird die Operation §YDefensive Shield§! beginnen und versuchen, die §RTerroristen§! aus dem §YWestjordanland§! zu vertreiben!"
 oper_city_wall_tt: "[PAL.GetNamewithFlag] wird die Operation §YCity Wall§! beginnen und versuchen, die §RTerroristen§! aus dem §YWestjordanland§! zu vertreiben!"
 israel.85.t: "Zerschlagung der Kasbah von Nablus"
 israel.85.d: "Da wir nun die Kasbah von Nablus kontrollieren, können wir entscheiden, welche Funktion sie künftig für uns erfüllen soll. Was sollen wir mit ihr tun?"
 israel.85.a: "In eine Sicherheitskräfte-Station umwandeln."
 israel.85.b: "Sie soll wieder ein altmodischer Marktplatz werden."
 israel.85.c: "In ein provisorisches Hauptquartier umwandeln."
 israel.85.e: "An Arafats Leute übergeben."
 ISR_nablus_market: "Der Kasbah-Souk von Nablus"
