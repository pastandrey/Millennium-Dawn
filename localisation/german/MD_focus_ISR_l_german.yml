 palestine.1.t: "Yasser Arafat stirbt"
 palestine.1.d: "Nach Wochen der Verschlechterung seines Zustands ist Yasser Arafat, der Palästina in den vergangenen Jahrzehnten geführt hat, gestorben. Nachdem er in ein Koma gefallen war, verstarb er heute früher an einem hämorrhagischen Schlaganfall. Auch wenn unbekannt ist, was diese Erkrankung ausgelöst hat, kann die palästinensische Nation wegen der Details von Arafats Tod nicht stillstehen. Rawhi Fattouh wurde zum Interimsführer gewählt, bis die nächste Wahlrunde stattfindet."
 palestine.1.a: "Inna Lillahi Wa Inna Iaihi Rajioon"
 palestine.2.t: "Wahlzeit"
 palestine.2.d: "Die Wahllokale für die Wahl des nächsten Präsidenten der Palästinensischen Autonomiebehörde haben geöffnet. Die beiden Hauptkandidaten sind Mahmoud Abbas und Mustafa Barghouti. Noch ist unklar, wer gewinnen wird, doch Umfragen deuten stark darauf hin, dass der nächste Präsident sehr wahrscheinlich ... sein wird,"
 palestine.2.a: "Mahmoud Abbas, Arafats Nachfolger"
 palestine.2.b: "Mustafa Barghouti, ein unabhängiger Kandidat"
 PAL_arafat_dead_TT: "§HYasser Arafat§! stirbt"
 ISR_isr_liberman_coalition_ticker_mission_desc: "Bringt die Agenda von Yisrael Beiteinu voran: säkulare Regierungsführung, nationale Sicherheit und die Interessen der russischsprachigen Wählerschaft.\n\nDas Abschließen von Fokussen dieser Partei erlaubt es dir, diese Mission abzuschließen."
 ISR_isr_givir_coalition_ticker_mission_desc: "Verfolgt die Agenda von Otzma Yehudit mit starker nationaler Sicherheit und rechtsnationalistischen Positionen.\n\nDas Abschließen von Fokussen dieser Partei erlaubt es dir, diese Mission abzuschließen."
 ISR_isr_likud_coalition_ticker_mission_desc: "Setzt die Likud-Agenda konservativer Regierungsführung und sicherheitsorientierter Staatspolitik um.\n\nDas Abschließen von Fokussen dieser Partei erlaubt es dir, diese Mission abzuschließen."
 ISR_isr_shas_coalition_ticker_mission_desc: "Unterstützt die Shas-Agenda ultraorthodoxer religiöser Interessen und sozialer Fürsorge für ihre Gemeinschaft.\n\nDas Abschließen von Fokussen dieser Partei erlaubt es dir, diese Mission abzuschließen."
 ISR_isr_jud_coalition_ticker_mission_desc: "Bringt die Agenda von Yahadut HaTora mit Toratreue und ultraorthodoxen religiösen Prioritäten voran.\n\nDas Abschließen von Fokussen dieser Partei erlaubt es dir, diese Mission abzuschließen."
 ISR_isr_nz_coalition_ticker_mission_desc: "Verfolgt die Agenda der National Union mit rechtsnationalistischen Positionen und territorialen Sicherheitsinteressen.\n\nDas Abschließen von Fokussen dieser Partei erlaubt es dir, diese Mission abzuschließen."
 ISR_isr_jewish_home_coalition_ticker_mission_desc: "Setzt die Agenda von Jewish Home mit religiösem Zionismus und Siedlungsausbau um.\n\nDas Abschließen von Fokussen dieser Partei erlaubt es dir, diese Mission abzuschließen."
 ISR_isr_labour_coalition_ticker_mission_desc: "Unterstützt die Avoda-Agenda von Sozialdemokratie, Arbeiterrechten und progressiver Regierungsführung.\n\nDas Abschließen von Fokussen dieser Partei erlaubt es dir, diese Mission abzuschließen."
 ISR_isr_meretz_coalition_ticker_mission_desc: "Bringt die Meretz-Agenda mit linken progressiven Werten und friedensorientierter Diplomatie voran.\n\nDas Abschließen von Fokussen dieser Partei erlaubt es dir, diese Mission abzuschließen."
 ISR_isr_arab_coalition_ticker_mission_desc: "Unterstützt die Ra'am-Agenda der Rechte der arabisch-israelischen Minderheit und ihrer Gemeinschaftsinteressen.\n\nDas Abschließen von Fokussen dieser Partei erlaubt es dir, diese Mission abzuschließen."
 ISR_liberamn_done_desc: "Yisrael Beiteinu ist mit unserer Regierungsführung und unseren politischen Entscheidungen zufrieden.\n\nDas Abschließen von Fokussen dieser Partei erlaubt es dir, diese Mission abzuschließen."
