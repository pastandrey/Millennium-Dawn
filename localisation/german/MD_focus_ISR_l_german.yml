 israel_economy.210.b: "Überflutet Galiläa!"
 israel_economy.211.t: "Hisbollah stimmt zu!"
 israel_economy.211.d: "Sie haben unserem vorübergehenden Öl-Abkommen zugestimmt, und die Probleme zwischen uns und ihnen haben sich fürs Erste etwas entspannt."
