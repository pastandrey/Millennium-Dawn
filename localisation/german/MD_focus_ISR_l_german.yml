 ISR_national_camp_TT: "Wir werden mit allen §Brechten Parteien§! §Yzusammenarbeiten§! können, aber die §YLiberalen§! werden §Rwütend§! sein"
 ISR_national_camp_disband_TT: "Das §BNationale Lager§! wird §Raufgelöst§!"
