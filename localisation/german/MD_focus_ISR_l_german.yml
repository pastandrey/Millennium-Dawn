 israel_economy.20.a: "Basiert!"
 israel_economy.21.t: "Indien hat nicht zugestimmt."
 israel_economy.21.d: "Sie wollen unsere Drohnen nicht."
 israel_economy.21.a: "Sehr bedauerlich."
 israel_economy.22.t: "Indisch-israelische Handelskooperation"
 israel_economy.22.d: "Die indisch-israelische Handelskooperation hat zugenommen, und die bilateralen Beziehungen haben sich verbessert."
 israel_economy.22.a: "Großartig!"
 israel_economy.23.t: "Israel hilft beim Wasserproblem!"
 israel_economy.23.d: "Israel hat Spezialisten entsandt, um unserem Land bei Wasserproblemen zu helfen und ihre Erfahrung sowie Technologie zu teilen."
 israel_economy.23.a: "Großartig!"
 israel_economy.24.t: "Israel schlägt ein gemeinsames Raumfahrtprogramm vor!"
 israel_economy.24.d: "Israel schlägt eine Zusammenarbeit bei den Bemühungen zur Erforschung des Weltraums vor und möchte in diesem Bereich kooperieren sowie Technologie austauschen."
 israel_economy.24.a: "Klar!"
 israel_economy.24.b: "Tut uns leid, nein."
 israel_economy.25.t: "Indien stimmt zu!"
 israel_economy.25.d: "Wir haben unsere Raumfahrtanstrengungen gebündelt und einer Zusammenarbeit zugestimmt."
 israel_economy.25.a: "Großartig!"
 israel_economy.26.t: "Indien hat nicht zugestimmt."
 israel_economy.26.d: "Sie wollen nicht mit unserem Land kooperieren."
 israel_economy.26.a: "Eh ..."
 israel_economy.27.t: "Israel bittet um Investitionen"
 israel_economy.27.d: "Die israelische Regierung hat unser Land bei einem jüngsten bilateralen Treffen eingeladen, Geld in ihre Wirtschaft zu investieren, um die für beide Seiten vorteilhafte Zusammenarbeit weiter auszubauen. Sollen wir zustimmen?"
 israel_economy.27.a: "Bereitet das Investitionspaket vor!"
 israel_economy.27.b: "Tut uns leid, nein."
 israel_economy.28.t: "[From.GetName] stimmt zu!"
 israel_economy.28.d: "Sie haben zugestimmt, in unsere Wirtschaft zu investieren."
 israel_economy.28.a: "Großartig!"
