 israel_economy.1.t: "Israelisches Waffengeschäft"
 israel_economy.1.d: "Das israelische Militär möchte unsere Sturmgewehre kaufen. Sollen wir sie ihnen verkaufen?"
 israel_economy.1.a: "Gebt ihnen Waffen!"
 israel_economy.1.b: "Nein"
 israel_economy.2.t: "[From.GetName] akzeptiert"
 israel_economy.2.d: "Wir haben mit [From.GetName] ein Abkommen über den Kauf einiger brandneuer Sturmgewehre geschlossen!"
 israel_economy.2.a: "Großartig!"
 israel_economy.3.t: "[From.GetName] lehnt ab"
 israel_economy.3.d: "Sie werden uns keine Sturmgewehre verkaufen, aber unsere Freunde in Afrika haben vielleicht einige zuverlässige AKs, die wir kaufen könnten ..."
 israel_economy.3.a: "Verdammt"
 israel_economy.4.t: "Israel bietet den Verkauf seiner Drohnen an"
 israel_economy.4.d: "Israel hat uns kürzlich angeboten, ihre neuesten Drohnen zu kaufen. Sollen wir zustimmen?"
 israel_economy.4.a: "Natürlich!"
 israel_economy.4.b: "Tut uns leid, nein."
 israel_economy.5.t: "Abkommen mit China."
 israel_economy.5.d: "China hat zugestimmt, und wir besiegeln das Geschäft."
 israel_economy.5.a: "Basiert!"
 israel_economy.6.t: "China hat nicht zugestimmt."
 israel_economy.6.d: "Sie wollen unsere Drohnen nicht."
 israel_economy.6.a: "Sehr bedauerlich."
 israel_economy.7.t: "Das Gemeinsame Komitee China-Israel für Innovation und Zusammenarbeit"
 israel_economy.7.d: "Das Gemeinsame Komitee China-Israel für Innovationszusammenarbeit trat heute zum ersten Mal im Rahmen von Veranstaltungen zusammen, die langjährige diplomatische Beziehungen zwischen beiden Ländern würdigen. Das Komitee ist ein umfassender Rahmen, der Verbindungen und Dialoge zwischen etwa 15 Ministerien und Regierungsbehörden beider Seiten fördern soll, um die Zusammenarbeit der Länder in einer Vielzahl von Bereichen mit besonderem Schwerpunkt auf wirtschaftlicher Kooperation zu vertiefen."
 israel_economy.7.a: "Großartig!"
 ISR_chi_isr_forum: "Israelisch-chinesisches Kooperationsforum"
 israel_economy.8.t: "Israel bittet um Infrastrukturinvestitionen!"
 israel_economy.8.d: "Israel bittet unser Land, durch den Bau von Infrastruktur in ihre Wirtschaft zu investieren. Sollen wir zustimmen?"
 israel_economy.8.a: "Eine wunderbare Gelegenheit, unseren Einfluss auszuweiten!"
 israel_economy.8.b: "Tut uns leid, nein."
 israel_economy.9.t: "[From.GetName] hat unser Angebot angenommen!"
 israel_economy.9.d: "Sie werden in unsere Wirtschaft investieren."
 israel_economy.9.a: "Großartig!"
 israel_economy.10.t: "[From.GetName] hat unser Angebot abgelehnt!"
 israel_economy.10.d: "Sie wollen nicht in unser Land investieren."
 israel_economy.10.a: "Sehr bedauerlich."
 israel_economy.11.t: "Gemeinsame wirtschaftliche Entwicklungsgruppe Israel-Vereinigte Staaten"
 israel_economy.11.d: "Israel und die Vereinigten Staaten haben die Bildung einer bahnbrechenden Partnerschaft mit der Gründung der Gemeinsamen wirtschaftlichen Entwicklungsgruppe Israel-Vereinigte Staaten bekannt gegeben. Diese Zusammenarbeit soll wirtschaftliches Wachstum, Innovation und Wohlstand durch geteiltes Fachwissen und gemeinsame Ressourcen fördern. Mit einem Schwerpunkt auf Technologie, Infrastruktur und Handel wird dieses Bündnis die bilateralen Beziehungen stärken und eine nachhaltige Entwicklung in beiden Nationen und darüber hinaus vorantreiben."
 israel_economy.11.a: "Großartig!"
 israel_economy.12.t: "Israel bewirbt sich für das Visa-Waiver-Programm!"
 israel_economy.12.d: "Das Visa-Waiver-Programm (VWP) ermöglicht Bürgern bestimmter Länder Reisen in die Vereinigten Staaten zu touristischen oder geschäftlichen Zwecken für Aufenthalte von bis zu 90 Tagen, ohne ein Visum beantragen zu müssen. Teilnehmer des Programms müssen bestimmte Anforderungen erfüllen, darunter der Besitz einer gültigen Genehmigung des Electronic System for Travel Authorization (ESTA), bevor sie ihren Flug antreten. Das VWP erleichtert Reisen und fördert den wirtschaftlichen und kulturellen Austausch zwischen den Vereinigten Staaten und ihren Partnerländern."
 israel_economy.12.a: "Wir werden ihre Aufnahme unter Auflagen akzeptieren."
 israel_economy.12.b: "Ihr Antrag ist nicht ernst zu nehmen. Pah!"
 ISR_us_visa_free: "Visa-Waiver-Programm"
 israel_economy.13.t: "Die USA stimmen zu!"
 israel_economy.13.d: "Nun sind wir dem Visa-Waiver-Programm beigetreten."
 israel_economy.13.a: "Großartig!"
 israel_economy.14.t: "Die USA stimmen nicht zu."
 israel_economy.14.d: "Sie haben nicht zugestimmt."
 israel_economy.14.a: "Ugh ..."
 israel_economy.15.t: "[ISR.GetLeader] berät über Vorschläge für einen Verteidigungspakt"
 israel_economy.15.d: "Nach dem jüngsten Treffen zwischen US-amerikanischen und israelischen Vertretern wurde ein neues Verteidigungsabkommen zwischen den USA und Israel geschlossen."
 israel_economy.15.a: "Großartig!"
 ISR_tel_aviv_metro_mod: "Metro Tel Aviv"
 israel_economy.16.t: "Israel schlägt medizinische Zusammenarbeit vor."
 israel_economy.16.d: "Die israelische Regierung hat kürzlich eine Zusammenarbeit zwischen unseren Medizinunternehmen vorgeschlagen, um unsere gemeinsame Forschung im medizinischen Bereich zu stärken. Sollen wir zustimmen?"
 israel_economy.16.a: "Klar!"
 israel_economy.16.b: "Tut uns leid, nein."
 israel_economy.17.t: "Deutschland stimmt zu!"
 israel_economy.17.d: "Wir werden eine gegenseitige medizinische Zusammenarbeit aufbauen."
 israel_economy.17.a: "Großartig!"
 israel_economy.18.t: "Deutschland nimmt unser Angebot nicht an."
 israel_economy.18.d: "Sie wollen nicht mit unserem Land kooperieren."
 israel_economy.18.a: "Bruh."
