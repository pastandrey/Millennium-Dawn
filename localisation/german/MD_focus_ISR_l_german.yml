 legacy_of_yitzhak_rabin: "Das Vermächtnis Yitzhak Rabins"
 legacy_of_yitzhak_rabin_desc: "Am 4. November 1995 ermordete der rechtsextreme Extremist Yigal Amir den israelischen Premierminister Yitzhak Rabin während einer Kundgebung in Tel Aviv, um den Fortschritt seiner Friedensgespräche mit den Palästinensern zu verhindern. Seither sind politische Gewalt und Aktionen gegen die Maßnahmen einer demokratisch gewählten Regierung in der israelischen Gesellschaft zu einem Tabu geworden, während die Generation, die seinen Tod als Jugendliche im Fernsehen sah und Blumen und Kerzen auf dem Kikar Rabin niederlegte, nun in der Wahlpolitik mitzureden beginnt."
 eddaic_ghost_1: "Eddaischer Geist - §tDer dritte Wunsch...§!"
 eddaic_ghost_1_desc: "Der Geist hat seinen dritten Wunsch genommen. §R„Lass einen Bruder seine Hand gegen seinen Bruder erheben, und lass sie Krieg führen“,§! sagte er. \n\nWährend Israel von aschkenasischen Juden – also Juden europäischer Herkunft – gegründet wurde, führte der Krieg gegen die arabischen Staaten dazu, dass fast eine Million Juden aus Nordafrika und dem Nahen Osten, die als Sepharden bezeichnet werden, nach Israel kamen. Die Regierungen der Arbeiterpartei versuchten, die Sepharden im Sinne eines „Schmelztiegels“ an die aschkenasische Kultur anzugleichen, steckten sie in unterentwickelte Vorstädte mit geringer staatlicher Unterstützung und blickten auf ihren kulturellen Hintergrund herab. Obwohl Sepharden heute die Mehrheit der Juden in Israel stellen, sind sie im Staatsapparat noch immer stark unterrepräsentiert, was zu Ressentiments und sektiererischen Spannungen führt."
 eddaic_ghost_2: "Eddaischer Geist - §ODer zweite Wunsch...§!"
 eddaic_ghost_2_desc: "Der Geist hat seinen zweiten Wunsch genommen. §R„Lass einen Mann seinen Bruder hassen, und lass sie Zwietracht erleiden“,§! sagte er. \n\nWährend Israel von aschkenasischen Juden – also Juden europäischer Herkunft – gegründet wurde, führte der Krieg gegen die arabischen Staaten dazu, dass fast eine Million Juden aus Nordafrika und dem Nahen Osten, die als Sepharden bezeichnet werden, nach Israel kamen. Die Regierungen der Arbeiterpartei versuchten, die Sepharden im Sinne eines „Schmelztiegels“ an die aschkenasische Kultur anzugleichen, steckten sie in unterentwickelte Vorstädte mit geringer staatlicher Unterstützung und blickten auf ihren kulturellen Hintergrund herab. Obwohl Sepharden heute die Mehrheit der Juden in Israel stellen, sind sie im Staatsapparat noch immer stark unterrepräsentiert, was zu Ressentiments und sektiererischen Spannungen führt."
 eddaic_ghost_3: "Eddaischer Geist - §9Der erste Wunsch...§!"
 eddaic_ghost_3_desc: "Der Geist hat seinen ersten Wunsch genommen. §R„Lass einen Mann niemandem außer sich selbst vertrauen, und lass sie einander fern bleiben“,§! sagte er. \n\nWährend Israel von aschkenasischen Juden – also Juden europäischer Herkunft – gegründet wurde, führte der Krieg gegen die arabischen Staaten dazu, dass fast eine Million Juden aus Nordafrika und dem Nahen Osten, die als Sepharden bezeichnet werden, nach Israel kamen. Die Regierungen der Arbeiterpartei versuchten, die Sepharden im Sinne eines „Schmelztiegels“ an die aschkenasische Kultur anzugleichen, steckten sie in unterentwickelte Vorstädte mit geringer staatlicher Unterstützung und blickten auf ihren kulturellen Hintergrund herab. Obwohl Sepharden heute die Mehrheit der Juden in Israel stellen, sind sie im Staatsapparat noch immer stark unterrepräsentiert, was zu Ressentiments und sektiererischen Spannungen führt."
 eddaic_ghost_4: "Eddaischer Geist - §HIm Schrank verborgen...§!"
 eddaic_ghost_4_desc: "Der Geist hat sich im Schrank versteckt, unter dem Bett, §Rund terrorisiert doch weiterhin die Ängste vieler...§! \n\nWährend Israel von aschkenasischen Juden – also Juden europäischer Herkunft – gegründet wurde, führte der Krieg gegen die arabischen Staaten dazu, dass fast eine Million Juden aus Nordafrika und dem Nahen Osten, die als Sepharden bezeichnet werden, nach Israel kamen. Die Regierungen der Arbeiterpartei versuchten, die Sepharden im Sinne eines „Schmelztiegels“ an die aschkenasische Kultur anzugleichen, steckten sie in unterentwickelte Vorstädte mit geringer staatlicher Unterstützung und blickten auf ihren kulturellen Hintergrund herab. Obwohl Sepharden heute die Mehrheit der Juden in Israel stellen, sind sie im Staatsapparat noch immer stark unterrepräsentiert, was zu Ressentiments und sektiererischen Spannungen führt."
 eddaic_ghost_5: "Eddaischer Geist - §6Zurück in die Flasche gesteckt...§!"
 eddaic_ghost_5_desc: "Der Geist wurde endlich zurück in die Flasche gesperrt, aber die Flasche steht noch immer im Raum. §RDort wartet er darauf, erneut entfesselt zu werden.§! \n\nWährend Israel von aschkenasischen Juden – also Juden europäischer Herkunft – gegründet wurde, führte der Krieg gegen die arabischen Staaten dazu, dass fast eine Million Juden aus Nordafrika und dem Nahen Osten, die als Sepharden bezeichnet werden, nach Israel kamen. Die Regierungen der Arbeiterpartei versuchten, die Sepharden im Sinne eines „Schmelztiegels“ an die aschkenasische Kultur anzugleichen, steckten sie in unterentwickelte Vorstädte mit geringer staatlicher Unterstützung und blickten auf ihren kulturellen Hintergrund herab. Obwohl Sepharden heute die Mehrheit der Juden in Israel stellen, sind sie im Staatsapparat noch immer stark unterrepräsentiert, was zu Ressentiments und sektiererischen Spannungen führt."
 eddaic_ghost_6: "Eddaischer Geist - §7Ins Meer geworfen...§!"
 eddaic_ghost_6_desc: "Die Flasche des Geistes wurde nun ins Wasser geworfen und treibt den Jordan hinab, §Rin Erwartung dessen, dass jemand sie aufhebt und ihn erneut freilässt...§! \n\nWährend Israel von aschkenasischen Juden – also Juden europäischer Herkunft – gegründet wurde, führte der Krieg gegen die arabischen Staaten dazu, dass fast eine Million Juden aus Nordafrika und dem Nahen Osten, die als Sepharden bezeichnet werden, nach Israel kamen. Die Regierungen der Arbeiterpartei versuchten, die Sepharden im Sinne eines „Schmelztiegels“ an die aschkenasische Kultur anzugleichen, steckten sie in unterentwickelte Vorstädte mit geringer staatlicher Unterstützung und blickten auf ihren kulturellen Hintergrund herab. Obwohl Sepharden heute die Mehrheit der Juden in Israel stellen, sind sie im Staatsapparat noch immer stark unterrepräsentiert, was zu Ressentiments und sektiererischen Spannungen führt."
 peoples_army_1: "Die Volksarmee - §tAufgegeben§!"
 peoples_army_1_desc: "Das Modell der Volksarmee ist ein von David Ben-Gurion, Israels Staatsgründer und erstem Premierminister, geprägtes Konzept, das die Israelischen Verteidigungsstreitkräfte als Werkzeug seines „Schmelztiegel“-Projekts verstand, mit dem alle jüdischen Gruppen in eine gemeinsame israelische Identität integriert werden sollten. Anhänger dieser Schule sehen in den IDF eine weit größere Rolle als nur die Verteidigung des Landes und betrachten die Wehrpflicht daher als Grundpfeiler nicht nur der israelischen Existenz, sondern auch der israelischen Demokratie und Gesellschaft. Debatten über einen Übergang zu einer Berufsarmee waren deshalb jahrzehntelang ein großes Tabu in Israel, doch die Diskussion über die Wehrdienstbefreiung Ultraorthodoxer hat bei vielen gewöhnlichen Israelis Fragen über ihre eigene Einberufung aufgeworfen. Die Mauer, die diese Debatte verhinderte, beginnt zu fallen, und Regierung wie Generalstab werden sich mit dem Thema befassen müssen. \n\nJe mehr §twir uns von der Volksarmee entfernen§!, desto mehr Armeeerfahrung und Befehlsmacht erhalten wir sowie günstigere Forschung für Landdoktrinen und Divisionsorganisation. Je mehr §6wir uns der Volksarmee wieder annähern§!, desto mehr politische Macht, Kriegsunterstützung, Armeemoral und rekrutierbare Bevölkerung erhalten wir."
