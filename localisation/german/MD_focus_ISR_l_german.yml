 ISR_request_immunity_TT: "§YWir werden ein Immunitätsverfahren einleiten!§!"
 ISR_judicial_reform_TT: "§YWir werden versuchen, eine neue Justizreform durchzusetzen!§!\n\n §RSeid euch bewusst: Unser Handeln wird schwerwiegende Folgen haben!§!"
