 ISR_knesset_desc_loc: "  Die §4Knesset§! ist das Repräsentantenhaus [ISR.GetNamewithFlag]s (das Parlament) und \n  hat vier Hauptfunktionen: §YGesetze zu verabschieden§! – die §4Knesset§! hat die alleinige \n  Befugnis, Gesetze zu verabschieden –, die Arbeit der Regierung zu überwachen, den \n  §YPräsidenten§! von [ISR.GetNamewithFlag] und den Staatskontrolleur zu wählen sowie über \n  Staatsangelegenheiten durch die §4Knesset§!-Ausschüsse und die Arbeit der\n  Vollversammlung zu beraten.\n\n  Um §Yunsere Regierung§! zu erhalten, sollten wir §9Koalitionen bilden§! und die \n  Bedürfnisse unserer Koalitionspartner erfüllen, was uns auch mehr Unterstützung und \n  mehr Möglichkeiten geben wird, die Haushaltsgesetze zu ändern. Unsere Unterstützung und \n  Popularität in der §4Knesset§! wird durch die Zahl der Sitze dargestellt, die wir dort haben."
