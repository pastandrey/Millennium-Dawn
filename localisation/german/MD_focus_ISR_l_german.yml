 israel_arab_boycott_category: "Boykott Israels"
 israel_arab_boycott_category_desc: "\n\n\n\n\n\n£ISR_desctext_blockade\n\n\n\n\n\n\n\n\n§YNach§! dem §tSechstagekrieg§! begannen viele §7Nahoststaaten§!, aus Solidarität mit [PAL.GetFlag]Palästina und untereinander, eine §Oökonomische und diplomatische Blockade§! gegen [ISR.GetFlag]Israel. In der gegenwärtigen §CSituation§! bestehen solche Haltungen noch immer §Rfort§!, doch Kontakte zwischen beiden Seiten können das Blatt wenden.\n\n[saud_bloc_loc]\n[kuw_bloc_loc]\n[irq_bloc_loc]\n[per_bloc_loc]\n[leb_bloc_loc]\n[syr_bloc_loc]\n[yem_bloc_loc]\n[lba_bloc_loc]\n[agl_bloc_loc]\n[sha_bloc_loc]\n[sud_bloc_loc]\n[uae_bloc_loc]\n[qat_bloc_loc]\n[tun_bloc_loc]\n[bhr_bloc_loc]\n[mor_bloc_loc]\n[oma_bloc_loc]\n[mau_bloc_loc]\n[egy_bloc_loc]\n[jor_bloc_loc]"
