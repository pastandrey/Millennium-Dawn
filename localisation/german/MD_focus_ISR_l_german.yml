 israel.151.t: "Hamas übernimmt Gaza!"
 israel.151.d: "Nach dem Aufstand hat Hamas im Gazastreifen die Macht übernommen. Die vorherige moderate Regierung flieht nun aus der Region, und die Frage, was im Gazastreifen geschehen wird, ist dringender denn je. Auch das Schicksal der nicht evakuierten israelischen Bewohner des Gazastreifens ist wichtig."
