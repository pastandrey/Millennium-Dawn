 ISR_periphery_recruitments: "Die Eliten bei den Rekrutierungen brechen"
 ISR_periphery_recruitments_desc: "Wir sollten die alte Offizierselite entlassen und neue Offiziere aus unseren Berufskräften einsetzen."
 ISR_passover_massacre: "Das Passah-Massaker"
 ISR_passover_massacre_desc: "Falls terroristische Anschläge stattfinden, müssen wir sowohl davor als auch danach vorbereitet sein. Nun müssen wir die Herausgabe der Namen der Täter des Terroranschlags von Palästina verlangen!"
