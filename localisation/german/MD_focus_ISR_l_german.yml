 israeli_settlements: "Israelische Siedlungen"
 israeli_settlements_desc: "Kurz nach dem israelischen Sieg im Sechstagekrieg von 1967, in dessen Folge Israel die Kontrolle über das Westjordanland von Jordanien übernahm, weigerte sich eine Gruppe zionistischer Aktivisten, die in einem Hotel in Hebron untergebracht war, dieses zu verlassen. Die israelische Regierung suchte einen Kompromiss mit den Aktivisten, indem sie die erste jüdische Siedlung im Westjordanland errichtete und dadurch palästinensische Hirten daran hinderte, dieses Land weiterhin zu nutzen. Dieses Ereignis markierte den Beginn einer Entwicklung, die bis heute anhält: Es wurden über hundert Siedlungen errichtet, sehr zum wachsenden Unmut der palästinensischen Bevölkerung."
 israeli_settlements2: "Israelische Siedlungen"
 israeli_settlements2_desc: "Kurz nach dem israelischen Sieg im Sechstagekrieg von 1967, in dessen Folge Israel die Kontrolle über das Westjordanland von Jordanien übernahm, weigerte sich eine Gruppe zionistischer Aktivisten, die in einem Hotel in Hebron untergebracht war, dieses zu verlassen. Die israelische Regierung suchte einen Kompromiss mit den Aktivisten, indem sie die erste jüdische Siedlung im Westjordanland errichtete und dadurch palästinensische Hirten daran hinderte, dieses Land weiterhin zu nutzen. Dieses Ereignis markierte den Beginn einer Entwicklung, die bis heute anhält: Es wurden über hundert Siedlungen errichtet, sehr zum wachsenden Unmut der palästinensischen Bevölkerung."
 israeli_settlements3: "Israelische Siedlungen"
 israeli_settlements3_desc: "Kurz nach dem israelischen Sieg im Sechstagekrieg von 1967, in dessen Folge Israel die Kontrolle über das Westjordanland von Jordanien übernahm, weigerte sich eine Gruppe zionistischer Aktivisten, die in einem Hotel in Hebron untergebracht war, dieses zu verlassen. Die israelische Regierung suchte einen Kompromiss mit den Aktivisten, indem sie die erste jüdische Siedlung im Westjordanland errichtete und dadurch palästinensische Hirten daran hinderte, dieses Land weiterhin zu nutzen. Dieses Ereignis markierte den Beginn einer Entwicklung, die bis heute anhält: Es wurden über hundert Siedlungen errichtet, sehr zum wachsenden Unmut der palästinensischen Bevölkerung."
 israeli_blockade: "Israelische Blockade"
 israeli_blockade_desc: "Seit Hamas die Kontrolle über den Gazastreifen von Fatah übernommen hat, haben Ägypten und Israel eine Blockade zu Land, in der Luft und zur See gegen Gaza durchgesetzt. Während Israel behauptet, die Blockade sei nach internationalem Recht legal und notwendig, um die israelische Sicherheit zu gewährleisten und Druck auf eine gewalttätige Terrororganisation auszuüben, werfen humanitäre und zwischenstaatliche Organisationen Israel vor, durch die Blockade eine Kollektivbestrafung der Menschen in Gaza zu verhängen und die Bewohner des Gebiets dazu zu zwingen, von humanitärer Hilfe abhängig zu bleiben."
 israeli_blockade2: "Israelisch-ägyptische Blockade"
 israeli_blockade2_desc: "Seit Hamas die Kontrolle über den Gazastreifen von Fatah übernommen hat, haben Ägypten und Israel eine Blockade zu Land, in der Luft und zur See gegen Gaza durchgesetzt. Während Israel behauptet, die Blockade sei nach internationalem Recht legal und notwendig, um die israelische Sicherheit zu gewährleisten und Druck auf eine gewalttätige Terrororganisation auszuüben, werfen humanitäre und zwischenstaatliche Organisationen Israel vor, durch die Blockade eine Kollektivbestrafung der Menschen in Gaza zu verhängen und die Bewohner des Gebiets dazu zu zwingen, von humanitärer Hilfe abhängig zu bleiben."
 israel.116.t: "[ISR.GetLeader] schlägt das Abkopplungsgesetz vor!"
 israel.116.d: "Kürzlich hat die israelische Regierung nach den jüngsten Ereignissen vorgeschlagen, ihre Präsenz im Gazastreifen zu verringern und die Siedlungen in dieser Region zu räumen. Das wird unsere wirtschaftliche Lage erleichtern, allerdings könnten viele Teile der israelischen Gesellschaft darüber sehr wütend werden."
 israel.116.a: "Hoffen wir, dass sie vernünftig genug sein werden."
 israel.116.b: "Großartig!"
 ISR_support_of_settlements: "Unterstützung für Siedlungen"
 ISR_support_of_settlements_desc: "Unsere Regierung unterstützt Siedlungen im de jure zu Palästina gehörenden Gebiet, indem sie einen bestimmten Prozentsatz unseres Haushalts für die finanziellen Bedürfnisse der Siedlungen bereitstellt."
