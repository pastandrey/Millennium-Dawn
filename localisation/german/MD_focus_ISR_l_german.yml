 israel_economy.210.t: "Seegrenzstreit mit Israel!"
 israel_economy.210.d: "Israel hat kürzlich begonnen, weitere Gasfelder vor Galiläa zu beanspruchen und seine Marineoperationen sogar bis nahe an unsere Küsten auszudehnen. Um den Konflikt nicht eskalieren zu lassen, hat Israel uns ein vorübergehendes Öl-Abkommen angeboten. Sollen wir zustimmen?"
