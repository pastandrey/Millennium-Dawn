 israel_news.15.t: "[PAL.GetName] beginnt eine neue Intifada"
 israel_news.15.d: "Nach dem jüngsten Besuch Ariel Sharons auf dem Tempelberg hat Palästina eine neue Intifada gegen Israel begonnen und die Spannungen auf das höchstmögliche Niveau getrieben. Dutzende palästinensische Jugendliche demonstrieren im ganzen Land, verbrennen Reifen und bewerfen israelische Soldaten mit Steinen."
 israel_news.15.o1: "Der Nahe Osten steht in Flammen..."
 intifada_darkest_TT: "§YWir werden in der Lage sein, mit der Organisation des Widerstands gegen die Intifada zu beginnen und eine Befehlskette aufzubauen!§!"
 ISR_shabac_dominance: "Schabak-Dominanz"
 ISR_8200_dominance: "Dominanz der Einheit 8200"
 ISR_tzamams: "Tzamams"
 israel.63.t: "Schicksal des Josephsgrabes"
 israel.63.d: "Kürzlich wurde in der Knesset eine neue Frage zur Diskussion gestellt. Sollen wir den Religiösen weiterhin erlauben, mit gepanzerten Fahrzeugen zum Josephsgrab in Nablus zu fahren? Das könnte die Spannungen erhöhen. Wenn wir ihnen den Besuch des Josephsgrabes jedoch nicht erlauben, könnten sie, vorsichtig gesagt, sehr unzufrieden werden."
 israel.63.a: "Lasst sie es besuchen!"
 israel.63.b: "Besuche verbieten."
 jos_tomb_fate_tt: "Wir werden entweder den Besuch des §YJosephsgrabes§! §tverbieten§! oder ihn §5erlauben§!. Beide Entscheidungen können jedoch §5Vor-§! und §tNachteile§! haben!"
 israel.64.t: "Passah-Massaker in israelischem Hotel fordert 19 Tote!"
 israel.64.d: "Ein Selbstmordattentäter tötete am Mittwoch, zu Beginn des jüdischen Passahfestes, mindestens 19 Menschen und verletzte 172 weitere in einem beliebten Hotel am Meer. Mindestens 48 der Verletzten wurden als schwer verletzt beschrieben.\nDer Anschlag ereignete sich in einem überfüllten Speisesaal des Park Hotels, eines Küstenhotels, während des traditionellen Mahls zum Beginn des Passahfests.\nRa'anan Gissin, ein leitender Berater des israelischen Premierministers Ariel Sharon, nannte den Anschlag ein Passah-Massaker und sagte, die Regierung werde alle notwendigen Maßnahmen ergreifen, um weitere Terroranschläge zu verhindern."
 israel.64.a: "Oh Gott!"
 israel.64.b: "Sie haben es selbst provoziert!"
 israel.65.t: "Terroristen greifen israelisches Hotel an und töten 3!"
 israel.65.d: "Kürzlich stoppten israelische Polizeikräfte einen Selbstmordattentäter in der Nähe eines beliebten Hotels am Meer. Die Polizeikräfte konnten den Terroristen erfolgreich verfolgen und griffen ihn in der Nähe des Hoteleingangs an. Die Bombe detonierte jedoch und tötete 3 Menschen: einen Polizisten und zwei Passanten.\nRa'anan Gissin, ein leitender Berater des israelischen Premierministers Ariel Sharon, bezeichnete den Anschlag als versuchtes Massaker und sagte, die Regierung werde alle notwendigen Maßnahmen ergreifen, um weitere Terroranschläge zu verhindern."
 israel.65.a: "Es hätte schlimmer kommen können!"
 israel.65.b: "Sie haben es selbst provoziert!"
 israel.66.t: "Terroristen in Israel gefasst!"
 israel.66.d: "Kürzlich deckten israelische Polizeikräfte eine geheime Terrorzelle aus Hamas-nahen Palästinensern auf, die geplant hatte, in der Nähe des Park Hotels eine Bombe zu zünden."
 israel.66.a: "Gut gemacht, Jungs!"
 israel.66.b: "Interessant."
 israel.67.t: "Dringende Nachricht vom Polizeipräsidium!"
 israel.67.d: "Die Polizei hat uns den neuesten Bericht über die jüngsten Ereignisse geschickt.\nWir sollten ihn uns ansehen. Er könnte uns überraschen."
 israel.67.a: "Was ist passiert?!"
 outc_polsped_tt: "§YDer Ausgang dieses Ereignisses hängt vollständig von eurem Polizeibudget ab!§!"
 pass_happened: "Passah-Anschlag ist passiert!"
 israel.68.t: "Israelische Forderung!"
 israel.68.d: "Israel verlangt die Auslieferung der Verantwortlichen für die Planung des jüngsten Terroranschlags in Israel. Wenn wir nicht kooperieren, werden sie ohne unsere Zustimmung eine Strafoperation durchführen!\nEs ist erwähnenswert, dass die Täter dieses Anschlags HAMAS und PIJ waren, unsere vorübergehenden Verbündeten gegen Israel, die gleichzeitig unsere politischen Rivalen sind.\nSollen wir einer Zusammenarbeit zustimmen?"
 israel.68.a: "Wir werden nicht kooperieren!"
 israel.68.b: "Die Terroristen müssen bestraft werden."
 didnot_coop_isr_pas: "Palästina hat bei der Suche nach den Tätern des Passah-Massakers nicht mit Israel kooperiert."
 did_coop_isr_pas: "Palästina hat bei der Suche nach den Tätern des Passah-Massakers mit Israel kooperiert."
 israel.69.t: "Palästina stimmt zu!"
 israel.69.d: "Der palästinensische Führer [PAL.GetLeader] verurteilt den Terroranschlag und erklärt sich bereit, mit uns bei der Suche und Bestrafung der Täter zusammenzuarbeiten."
 israel.69.a: "Überraschend gut!"
 israel.70.t: "Palästina lehnt ab!"
 israel.70.d: "Der palästinensische Führer [PAL.GetLeader] verurteilte den Terroranschlag, stimmte jedoch keiner Zusammenarbeit mit uns bei der Suche und Bestrafung der Täter zu, da er dies als direkte Bedrohung ihrer Existenz ansieht."
 israel.70.a: "Dann umso schlimmer für sie!"
 pal_dem_tt: "Wir werden die §YAuslieferung§! der §RVerantwortlichen§! für den jüngsten §RTerroranschlag§! fordern. Falls [PAL.GetNamewithFlag] §Rab­lehnt§!, können wir §YOperation Homat Mahgehn§! starten; falls [PAL.GetNamewithFlag] §Gzustimmt§!, können wir §YOperation Irr Homa§! beginnen."
 ISR_peaceful_approach: "Humane Verfahren"
 ISR_neighbor_procedure: "Nachbarverfahren"
 israel.71.t: "Hilfe für die palästinensischen Brüder!"
 israel.71.d: "Palästina hat eine neue Intifada gegen das zionistische Regime begonnen. Wir könnten versuchen, über die Seehäfen im Gazastreifen Waffen dorthin zu schicken. Sollen wir das tun?"
 israel.71.a: "Kontaktiert sie!"
 israel.71.b: "Das liegt nicht in unserem Interesse"
 israel.75.t: "Der Iran bietet uns Hilfe an!"
 israel.75.d: "Der Iran schlägt vor, eine große Waffenlieferung direkt vor Israels Nase zu schicken, indem ein getarntes Handelsschiff in den Hafen von Gaza eingeschleust wird. Stimmen wir einem solchen Risiko zu?"
 israel.75.a: "Wir brauchen keine Hilfe!"
 israel.75.b: "Gebt uns Waffen!"
 israel.72.t: "Palästina stimmt zu!"
 israel.72.d: "Palästina hat zugestimmt, unsere Lieferung anzunehmen, und bereitet einen geheimen Hafen in Gaza vor, um unsere Waffenlieferung entgegenzunehmen. Allerdings könnte dies bereits vom Mossad entdeckt worden sein..."
 israel.72.a: "Wir hoffen, dass unsere Hilfe ankommt!"
 israel.74.t: "Palästina lehnt ab!"
 israel.74.d: "Die palästinensischen Behörden haben erklärt, dass sie die Lage selbst bewältigen und unsere Hilfe nicht benötigen."
 israel.74.a: "Idioten!"
 israel.73.t: "Schiff mit Lieferungen aus dem Iran!"
 israel.73.d: "Unsere Mossad-Agenten haben einen Plan iranischer und palästinensischer Behörden aufgedeckt, Waffen per See direkt in den Gazastreifen zu transportieren. Wir müssen das verhindern."
 israel.73.a: "Wir müssen uns beeilen!"
 israel.76.t: "Iranische Waffenlieferung erfolgreich!"
 israel.76.d: "Kürzlich gelang es den iranischen Behörden, eine beträchtliche Menge an Waffen nach Palästina zu bringen, direkt unter den Augen der israelischen Behörden. Ob Israel Informationen über diese Lieferung hatte oder nicht, ist unbekannt, aber das offensichtliche Versagen lässt daran keinen Zweifel."
 israel.76.a: "Unsere kostbaren Waffen."
 israel.77.t: "Iranische Waffenlieferung erfolgreich!"
 israel.77.d: "Kürzlich gelang es den iranischen Behörden, eine beträchtliche Menge an Waffen nach Palästina zu bringen, direkt unter den Augen der israelischen Behörden. Ob Israel Informationen über diese Lieferung hatte oder nicht, ist unbekannt, aber das offensichtliche Versagen lässt daran keinen Zweifel."
 israel.77.a: "Wie können sie es wagen!"
 israel.78.t: "Karine-A-Affäre!"
 israel.78.d: "Unsere Einheiten kaperten einen großen, der Palästinensischen Autonomiebehörde gehörenden Frachter, beladen mit 50 Tonnen Waffen, darunter 345 Katyusha-Raketen mit großer Reichweite, aus dem Iran unter Beteiligung der Hisbollah. Das Schiff war auf dem Weg nach Gaza, um dort entladen zu werden, wurde jedoch gestoppt und alle Waffen beschlagnahmt."
 israel.78.a: "Gute Arbeit!"
 israel.79.t: "Iranische Waffenlieferung erfolgreich!"
 israel.79.d: "Es ist uns gelungen, eine beträchtliche Menge Waffen nach Palästina zu bringen, direkt unter den Augen der israelischen Behörden. Ob Israel Informationen über diese Lieferung hatte oder nicht, ist unbekannt, aber das offensichtliche Versagen lässt daran keinen Zweifel."
 israel.79.a: "Allahu Akbar!"
 israel.80.t: "Karine-A-Affäre!"
 israel.80.d: "Kürzlich kaperten Einheiten der israelischen Marine und Luftwaffe unseren Frachter, beladen mit 50 Tonnen Waffen, darunter 345 Katyusha-Raketen mit großer Reichweite, aus dem Iran unter Beteiligung der Hisbollah. Das Schiff sollte in Gaza entladen werden, wurde jedoch gestoppt und alle Waffen beschlagnahmt."
 israel.80.a: "Wie können sie es wagen!"
 israel.81.t: "Karine-A-Affäre!"
 israel.81.d: "Kürzlich kaperten Einheiten der israelischen Marine und Luftwaffe unseren Frachter, beladen mit 50 Tonnen Waffen, darunter 345 Katyusha-Raketen mit großer Reichweite, aus dem Iran unter Beteiligung der Hisbollah. Das Schiff sollte in Gaza entladen werden, wurde jedoch gestoppt und alle Waffen beschlagnahmt."
 israel.81.a: "Wie können sie es wagen!"
 operation_noahs_TT: "[ISR.GetNamewithFlag] wird die §YOperation Noahs Arche§! durchführen und das Schiff von §R[PER.GetNamewithFlag]§! stoppen!\n[ISR.GetNamewithFlag], [PAL.GetNamewithFlag] und [PER.GetNamewithFlag] werden Ereignisse erhalten!"
 ISR_catch_the_boat: "Iranische Waffenlieferung"
 ISR_boat_aint_catched_TT: "§RDer Iran wird eine beträchtliche Menge Waffen nach Palästina schicken§!"
 ISR_catch_boat: "Der Iran hat ein Versorgungsschiff nach Gaza geschickt!"
 ISR_boat_start_TT: "§RWir werden 52 Tage Zeit haben, um die iranische Fregatte zu stoppen!§!"
 ISR_calm_security: "Palästinensischer Widerstand - §7Ruhige Sicherheitslage§!"
 ISR_calm_security_desc: "Seit die zionistischen Siedler Ende des 19. Jahrhunderts erstmals nach Palästina kamen, haben Spannungen zwischen jüdischen Einwanderern und der palästinensischen Bevölkerung häufig zu Gewaltausbrüchen zwischen den beiden Gemeinschaften geführt. Nach der Gründung Israels haben palästinensische Gruppen und sogar Einzelpersonen Angriffe auf israelische Interessen verübt – ein Phänomen, das trotz der Unterzeichnung der Oslo-Abkommen anhält. Dies geschah aufgrund der weit verbreiteten palästinensischen Unzufriedenheit über den fortgesetzten Bau israelischer Siedlungen im Westjordanland und Israels Weigerung, die Kontrolle über Jerusalem zu teilen, neben weiteren Beschwerden. Diese Angriffe haben zu einem Gefühl israelischer Unsicherheit und zur Unterstützung harter politischer Kräfte beigetragen."
 ISR_stable_security: "Palästinensischer Widerstand - §6Stabile Sicherheitslage§!"
 ISR_stable_security_desc: "Seit die zionistischen Siedler Ende des 19. Jahrhunderts erstmals nach Palästina kamen, haben Spannungen zwischen jüdischen Einwanderern und der palästinensischen Bevölkerung häufig zu Gewaltausbrüchen zwischen den beiden Gemeinschaften geführt. Nach der Gründung Israels haben palästinensische Gruppen und sogar Einzelpersonen Angriffe auf israelische Interessen verübt – ein Phänomen, das trotz der Unterzeichnung der Oslo-Abkommen anhält. Dies geschah aufgrund der weit verbreiteten palästinensischen Unzufriedenheit über den fortgesetzten Bau israelischer Siedlungen im Westjordanland und Israels Weigerung, die Kontrolle über Jerusalem zu teilen, neben weiteren Beschwerden. Diese Angriffe haben zu einem Gefühl israelischer Unsicherheit und zur Unterstützung harter politischer Kräfte beigetragen."
 ISR_routine_security: "Palästinensischer Widerstand - §5Routinemäßige Sicherheitslage§!"
 ISR_routine_security_desc: "Seit die zionistischen Siedler Ende des 19. Jahrhunderts erstmals nach Palästina kamen, haben Spannungen zwischen jüdischen Einwanderern und der palästinensischen Bevölkerung häufig zu Gewaltausbrüchen zwischen den beiden Gemeinschaften geführt. Nach der Gründung Israels haben palästinensische Gruppen und sogar Einzelpersonen Angriffe auf israelische Interessen verübt – ein Phänomen, das trotz der Unterzeichnung der Oslo-Abkommen anhält. Dies geschah aufgrund der weit verbreiteten palästinensischen Unzufriedenheit über den fortgesetzten Bau israelischer Siedlungen im Westjordanland und Israels Weigerung, die Kontrolle über Jerusalem zu teilen, neben weiteren Beschwerden. Diese Angriffe haben zu einem Gefühl israelischer Unsicherheit und zur Unterstützung harter politischer Kräfte beigetragen."
