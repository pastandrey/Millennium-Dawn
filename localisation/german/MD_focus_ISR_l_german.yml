 israel.115.t: "Gipfel am Roten Meer"
 israel.115.d: "Kürzlich haben US-Vertreter nach unseren Beratungen mit ihnen einen neuen Friedensfahrplan vorgeschlagen. Er sieht vor, mit dem Rückzug aus Gaza und dem nördlichen Samaria zu beginnen, im Gegenzug dafür, dass Arafat die Macht dezentralisiert, indem er Mahmud Abbas zum Premierminister ernennt."
 israel.115.a: "Hoffen wir, dass [PAL.GetLeader] vernünftig genug ist."
 israel.115.b: "Wir stimmen diesem Vorschlag zu."
