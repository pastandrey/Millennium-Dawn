 kirya_glilot_tensions: "Spannungen zwischen Kirya und Glilot"
 kirya_glilot_tensions_desc: "Israel ist vielleicht eines der wenigen Länder der Welt, in dem die wichtigsten Nachrichtendienste tatsächlich in das Militär eingebunden sind. Zwar gehört Israels militärischer Nachrichtendienst zu den erfolgreichsten der Welt, doch die beiden Einheiten, die hauptsächlich für die Auswertung der gesammelten Informationen verantwortlich sind, stehen in ständiger Rivalität zueinander: die Forschungsabteilung, die Informationen analysiert und an die Regierung weiterleitet, und die Einheit 8200, die diese Informationen beschafft und liefert. Die Konflikte zwischen beiden nehmen oft einen scharfen Ton an, was ihre Zusammenarbeit erheblich erschwert."
 state_of_tel_aviv: "Der Staat Tel Aviv"
 state_of_tel_aviv_desc: "Während die meisten urbanen Zentren ein Mikrokosmos ihres Heimatlandes sind, stellt Tel Aviv für Israel insgesamt eine echte Ausnahme dar. Es ist vielleicht das drittgrößte Zentrum für Start-ups und Innovation weltweit – nach dem Silicon Valley und dem Perlflussdelta – und zieht Milliarden an ausländischen Investitionen an. Es ist außerdem ein Epizentrum liberalen Denkens: die Stadt mit dem weltweit höchsten LGBT-Anteil pro Kopf und die vegane und vegetarische Hauptstadt außerhalb Indiens. Für viele Araber und ländliche Israelis wirkt die Stadt beinahe wie eine politische Blase, so sehr, dass Kommentatoren von einer „Zwei-Staaten-Lösung“ in ganz anderem Sinne sprechen: dem Staat Israel und dem Staat Tel Aviv."
 unintegrated_ultraorthodox_community_1: "§tIsolationistische§! orthodoxe Gemeinschaft"
 unintegrated_ultraorthodox_community_1_desc: "Die ultraorthodoxe Gemeinschaft, gemeinhin als Haredim bekannt, ist eine besonders religiöse Strömung innerhalb des orthodoxen Judentums. Trotz ihrer geringen Zahl nach dem Holocaust gewährte David Ben-Gurion ihnen zahlreiche Zugeständnisse in Form der „Vier Punkte“. Diese ermöglichten es insbesondere Jeschiwa-Studenten, die Tora zu studieren, ohne sich um nichtreligiöse Fächer, Wehrdienst oder die Eingliederung in den Arbeitsmarkt kümmern zu müssen – während der Staat ihren Lebensunterhalt subventionierte. Angesichts des erwarteten starken Bevölkerungswachstums in den kommenden Jahrzehnten aufgrund der hohen Geburtenrate ist die Vorstellung, eine so große nicht arbeitende Bevölkerung dauerhaft aus Staatsmitteln zu finanzieren, nicht tragbar. Irgendetwas muss sich ändern."
