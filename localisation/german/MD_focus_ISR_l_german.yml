 israel_economy.40.d: "Russland hat unseren Vorschlag abgelehnt!"
 israel_economy.40.a: "Eh ..."
 serg_court_tt: "Wir werden die Kosten mit §Y[SOV.GetNamewithFlag]§! teilen und beide für §G$3,25 Milliarden§! eine Fabrik erhalten"
 israel_economy.41.t: "Israel bittet um Ratifizierung des Freihandelsabkommens der EAWU!"
 israel_economy.41.d: "Sie wollen das Freihandelsabkommen ratifizieren. Sollen wir zustimmen?"
 israel_economy.41.a: "Klar!"
 israel_economy.41.b: "Nein."
 israel_economy.42.t: "Russland stimmt zu!"
 israel_economy.42.d: "Sie haben zugestimmt, das Abkommen zu unterzeichnen."
 israel_economy.42.a: "Großartig."
 israel_economy.43.t: "Russland hat nicht zugestimmt."
 israel_economy.43.d: "Sie wollten das Abkommen nicht unterzeichnen."
 israel_economy.43.a: "Ugh."
 ISR_idea_eacu_cooperation: "Israelisch-EAWU-Kooperation"
 ISR_idea_eacu_cooperation_desc: "Die Eurasische Zollunion (ursprünglich die Eurasische Wirtschaftsgemeinschaft) fördert wirtschaftliche Verbindungen zwischen den meisten postsowjetischen Staaten. Die Union erhebt einen gemeinsamen Außenzoll auf alle Waren, die in die Union eingeführt werden, und handelt bei Handelsabkommen und Verhandlungen als eine einheitliche Körperschaft."
 ISR_idea_fir_ukr_work: "Arbeiter an Israel überlassen"
 ISR_idea_two_ukr_work: "Ukrainische Arbeiter erhalten"
 israel_economy.44.t: "Israel bietet uns ein Abkommen über ausländische Arbeitskräfte an!"
 israel_economy.44.d: "Israel hat uns kürzlich ein Abkommen vorgeschlagen, durch das unsere Arbeiter als ausländische Arbeitskräfte auf dem israelischen Markt arbeiten können. Das wird uns im industriellen Bereich Probleme bereiten, könnte uns aber sehr schnell Geld einbringen."
 israel_economy.44.a: "Klar, warum nicht!"
 israel_economy.44.b: "Äh, nein."
 israel_economy.45.t: "Die Ukraine stimmt zu!"
 israel_economy.45.d: "Sie werden unserem Markt für zwei Jahre Arbeitskräfte zur Verfügung stellen."
 israel_economy.45.a: "Großartig!"
 israel_economy.46.t: "Die Ukraine hat unser Angebot abgelehnt."
 israel_economy.46.d: "Sie haben unserem Angebot nicht zugestimmt."
 israel_economy.46.a: "Wie auch immer ..."
 rad_isr_tt: "Israel wird 2 Radarstationen des Typs Red Color bauen, wenn wir ihnen $3,5 Milliarden zahlen."
 israel_economy.47.t: "Israel bietet uns Red-Color-Radarsysteme an"
 israel_economy.47.d: "Israel bietet uns an, zwei Red-Color-Radarstationen in unserem Land zu errichten. Sollen wir zustimmen?"
 israel_economy.47.a: "Klar!"
 israel_economy.47.b: "Nein."
 israel_economy.48.t: "Die Ukraine stimmt zu!"
 israel_economy.48.d: "Der Vertrag ist unterzeichnet."
 israel_economy.48.a: "Großartig!"
 israel_economy.49.t: "Die Ukraine lehnt ab!"
 israel_economy.49.d: "Sie haben unser Angebot nicht angenommen."
 israel_economy.49.a: "Okay."
 ukr_acc_redcol: "Wir werden 2 Radarstationen an §Y[UKR.GetNamewithFlag]§! für §G$3,5 Milliarden§! exportieren"
 ird_isr_tt: "Israel wird 2 Iron-Dome-Flugabwehrstellungen bauen, wenn wir ihnen §G$3,25 Milliarden§! zahlen."
 israel_economy.50.t: "Israel bietet uns Iron-Dome-Flugabwehrsysteme an."
 israel_economy.50.d: "Sollen wir diesem Vertrag zustimmen?"
 israel_economy.50.a: "Klar!"
 israel_economy.50.b: "Tut uns leid, nein."
 israel_economy.51.t: "Die Ukraine stimmt zu!"
 israel_economy.51.d: "Der Vertrag ist unterzeichnet."
 israel_economy.51.a: "Großartig!"
 israel_economy.52.t: "Die Ukraine lehnt ab!"
 israel_economy.52.d: "Sie haben unser Angebot nicht angenommen."
 israel_economy.52.a: "Okay."
 ukr_acc_irdo: "Wir werden 2 Flugabwehrsysteme an §Y[UKR.GetNamewithFlag]§! für §G$3,25 Milliarden§! exportieren"
 israel_military.1.t: "Briefings in der Kirya"
 israel_military.1.d: "Später"
 israel_military.1.a: "Okay"
 israel_military.2.t: "Die Winograd-Kommission"
 israel_military.2.d: "Später"
 israel_military.2.a: "Sehen wir uns zuerst die Fehler der Manöverdirektion an."
 israel_military.2.b: "Sehen wir uns stattdessen die Fehler der Operationsabteilung an."
 israel_military.3.t: "Überprüfung der Manöverdirektion"
 israel_military.3.d: "Später"
 israel_military.3.a: "Wir bevorzugen kleine und konzentrierte Gefechte."
 israel_military.3.b: "Wir werden zu Blitzoffensiven zurückkehren."
 israel_military.4.t: "Überprüfung der Operationsabteilung"
 israel_military.4.d: "Später"
 israel_military.4.a: "Wir haben keinen Spielraum, auf kleinere Armeen zu setzen."
 israel_military.4.b: "Eine kluge, aber kleine Armee ist besser als die Alternative."
 israel_military.5.t: "Treffen mit der Strategieabteilung"
 israel_military.5.d: "Später"
 israel_military.5.a: "Wir sollten nach Norden blicken."
 israel_military.5.b: "Wir sollten nach Süden blicken."
 ISR_speak_to_malal: "§YMit dem Mal'al sprechen§!"
 ISR_speak_to_malal_desc: "Israel muss im neuen Jahrhundert eine sehr vorsichtige und fein austarierte Außenpolitik betreiben, um unsere Sicherheit zu wahren."
 ISR_usa_china_balance: "Auf dem Seil tanzen"
 ISR_usa_china_balance_desc: "Israels Beziehungen zu den USA und China befinden sich nun auf einem neuen Höhepunkt. Jetzt müssen wir entscheiden, was wir mit unseren neu eröffneten Möglichkeiten anfangen."
 ISR_balance_favor_america: "Das alte Bündnis"
 ISR_balance_favor_america_desc: "Die USA sind unser längster und ältester Verbündeter. Wirtschaftliche Zusammenarbeit zwischen uns und ihnen ist die rationalste Entscheidung, die wir treffen können."
 ISR_balance_favor_china: "Das Erbe der Seidenstraße"
 ISR_balance_favor_china_desc: "In der sich wandelnden politischen Landschaft der Gegenwart könnte es unserer Wirtschaft nützen, China den Vorzug zu geben."
 ISR_joint_development_zone: "Gemeinsame wirtschaftliche Entwicklungsgruppe"
 ISR_joint_development_zone_desc: "Die Gemeinsame wirtschaftliche Entwicklungsgruppe USA-Israel (JEDG) ist das jährliche bilaterale Treffen zwischen Israel und den Vereinigten Staaten, bei dem die wirtschaftlichen Bedingungen in beiden Ländern sowie mögliche Wirtschaftsreformen der israelischen Regierung erörtert werden."
 ISR_visa_free_request: "Dem Visa-Waiver-Programm beitreten"
 ISR_visa_free_request_desc: "Das Visa-Waiver-Programm ermöglicht Bürgern bestimmter Länder Reisen in die Vereinigten Staaten zu touristischen oder geschäftlichen Zwecken für Aufenthalte von bis zu 90 Tagen, ohne ein Visum beantragen zu müssen. Teilnehmer des Programms müssen bestimmte Anforderungen erfüllen, darunter der Besitz einer gültigen Genehmigung des Electronic System for Travel Authorization vor dem Boarding."
 ISR_defence_pact_usa: "Einen Verteidigungspakt vorschlagen"
 ISR_defence_pact_usa_desc: "Wir müssen unsere Verteidigungsabkommen mit den USA überdenken und die Zusammenarbeit wahrscheinlich vertiefen."
 ISR_china_arm_shipments: "Anspruchsvolle Waffenexporte"
 ISR_china_arm_shipments_desc: "Wir könnten im Verteidigungsbereich mit China kooperieren, indem wir ihnen unsere Waffen zum Verkauf anbieten."
 ISR_israel_china_innovation_conference: "Forum der Israel-China-Innovationskonferenz"
 ISR_israel_china_innovation_conference_desc: "Das Gemeinsame Komitee China-Israel für Innovationszusammenarbeit ist eine Initiative des israelischen Außenministeriums, um einen hochrangigen Mechanismus zwischen den Regierungen beider Länder aufzubauen."
 ISR_haifa_port_lease: "Eine Pacht für den Hafen von Haifa gewähren"
 ISR_haifa_port_lease_desc: "Die Verpachtung des Hafens von Haifa könnte für uns und China vorteilhaft sein und unseren gegenseitigen Handel ankurbeln."
 ISR_cyrus_accords: "Nehemias Traum"
 ISR_cyrus_accords_desc: "Als Artaxerxes den Propheten Nehemia nach Jerusalem sandte, um dessen Mauern wiederherzustellen, bekräftigte er nicht nur das Versprechen, das Kyros den Juden gegeben hatte; er festigte auch eine jahrhundertealte Freundschaft zwischen dem persischen Volk und den Söhnen Israels. Die Ajatollahs handeln, so sehr sie es auch zu verbergen versuchen, gegen den Willen ihres eigenen Volkes, indem sie unsere Vernichtung anstreben. Wir werden das iranische Volk unterstützen, in der Hoffnung auf eine neue und bessere Ära."
 ISR_cyrus_accords_sign: "Die Kyros-Abkommen unterzeichnen"
 ISR_cyrus_accords_sign_desc: "Nachdem Iran vom tyrannischen Regime der Ajatollahs befreit worden ist, müssen wir einen neuen Vertrag zwischen unseren Ländern unterzeichnen."
 ISR_cyrus_promise: "Ben Ushiels Rache"
 ISR_cyrus_promise_desc: "Vor mehr als eineinhalb Jahrtausenden wurde Nehemia Ben Ushiel vom persischen Schah Chosrau II. in Tyros geopfert – als Vorwand, um den letzten Versuch jüdischer Staatlichkeit vor dem Staat Israel auszulöschen. Nun, da wir in das Heilige Land zurückgekehrt sind, werden wir Ushiels Opfer nicht vergessen: Iran und seine Führung sind eine existenzielle Bedrohung für den jüdischen Staat, und solange das so ist, werden sie keinen ruhigen Schlaf finden."
 ISR_iran_command: "Direktion für Strategie und den Dritten Kreis"
 ISR_iran_command_desc: "Die Direktion für Strategie und den Dritten Kreis soll die Aktivitäten der IDF gegenüber Israels Feinden im sogenannten dritten Kreis bündeln, also jenen, mit denen Israel keine Grenze teilt. An erster Stelle steht dabei Iran. Daher trägt die Direktion auch den Beinamen Iran-Kommando. Geleitet wird sie von einem hochrangigen IDF-Offizier im Rang eines Aluf, was einem Generalmajor entspricht."
 ISR_cyber_defence_unit: "Die Cyber-Verteidigungsbrigade aufstellen"
 ISR_cyber_defence_unit_desc: "Wir müssen in der Lage sein, uns nicht nur im Bereich der physischen Sicherheit zu verteidigen, sondern auch im Cyberspace."
 ISR_cyber_attack_iran: "Vergeltungs-Cyberangriffe vorschlagen"
 ISR_cyber_attack_iran_desc: "Wir müssen Cyberangriffe auf iranische Regierungsbehörden durchführen, um sicherzustellen, dass kein Teil ihres bösartigen Plans unserer Aufmerksamkeit entgeht ..."
 ISR_operation_olympic_games: "Operation Olympic Games"
 ISR_operation_olympic_games_desc: "Wir müssen gemeinsam mit den Vereinigten Staaten eine Sabotagekampagne mittels Cyberangriffen gegen iranische Nuklearanlagen durchführen."
 ISR_deniable_drone_strikes: "Fortgeschrittene abstreitbare Drohnenangriffe"
 ISR_deniable_drone_strikes_desc: "Wir haben viel Erfahrung mit abstreitbaren Drohnenangriffen gesammelt. Diese Erfahrung sollten wir nutzen, um unsere Methoden weiter zu verbessern."
 ISR_supply_the_pjaks: "Plan Gimmel umsetzen"
 ISR_supply_the_pjaks_desc: "Iran hat ein interessantes innenpolitisches Problem: die kurdische PJAK-Bewegung. Auch wenn unsere ideologischen Positionen recht unterschiedlich sind, können wir erheblich davon profitieren, ihren Kampf zu unterstützen ..."
 ISR_accept_diplomacy: "Maximalen Druck aufgeben"
 ISR_accept_diplomacy_desc: "Wir müssen versuchen, Irans Ambitionen einzudämmen, indem wir in neuen Gesprächen eine gute Verhandlungsposition finden."
 ISR_strike_with_america: "Auf eine gemeinsame Operation drängen"
 ISR_strike_with_america_desc: "Wir müssen eine gemeinsame Operation durchführen, um die iranische Nuklearbedrohung zu neutralisieren."
 ISR_strike_alone: "Für immer das Schwert verschlingen"
 ISR_strike_alone_desc: "Es ist allein unsere Pflicht, das Schwert über unseren Köpfen zu zerschlagen, das unsere Existenz bedroht."
 ISR_invite_rajavi: "Treffen mit Maryam Rajavi"
 ISR_invite_rajavi_desc: "Maryam Rajavi ist die Frau des sehr bekannten iranischen linken Oppositionsführers Massoud Rajavi. Vielleicht sollten wir versuchen, ihre Unterstützung zu gewinnen ..."
 ISR_invite_pahlavi: "Treffen mit Reza Pahlavi"
 ISR_invite_pahlavi_desc: "Um die Legitimität unserer subversiven Aktionen gegen Iran sicherzustellen, müssen wir Reza Pahlavi, den Sohn des ehemaligen Schahs von Iran, treffen, um seine Unterstützung zu gewinnen."
 ISR_support_iranian_protesters: "Iranische Protestierende unterstützen"
 ISR_support_iranian_protesters_desc: "Wir müssen die politische Landschaft Irans destabilisieren und die Proteste gegen das Regime unterstützen ..."
 ISR_steal_the_nuclear_archive: "Das iranische Nukleararchiv stehlen"
 ISR_steal_the_nuclear_archive_desc: "Unsere Agenten befinden sich bereits in Teheran und warten auf den Befehl, ein besonderes militärisches Objekt zu betreten. Wir müssen ihre Aktionen direkt koordinieren und auf jedes Detail achten."
 ISR_bct_pipleine_azerbaijan: "Baku-Tiflis-Ceyhan-Importe"
 ISR_bct_pipleine_azerbaijan_desc: "Eine Stärkung der Beziehungen zu Aserbaidschan kann für unsere Wirtschaft und unsere Fähigkeiten im Kampf gegen Iran sehr vorteilhaft sein."
 ISR_tavor_arm_shipments: "Tavor-Waffenlieferungen"
 ISR_tavor_arm_shipments_desc: "Wir können profitieren, indem wir die aserbaidschanische Armee mit unseren Tavor-Gewehren beliefern und zugleich die Beziehungen zwischen unseren Ländern stärken."
 ISR_uvda_airlift: "Die Uvda-Luftbrücke"
 ISR_uvda_airlift_desc: "Wir müssen eine Grundlage für Luftoperationen und Landungen schaffen."
 ISR_sitalchay_airbase_lease: "Die Luftbasis Sitalchay pachten"
 ISR_sitalchay_airbase_lease_desc: "Möglicherweise müssen wir die Aserbaidschaner bitten, uns die Luftbasis Sitalchay zu verpachten, damit wir iranische Aggressionen besser verhindern und einen geheimen Pakt mit ihnen schließen können."
 ISR_mossads_door: "Die Tür des Mossad"
 ISR_mossads_door_desc: "Aserbaidschan hat trotz der Feindseligkeit zwischen beiden Ländern enge Verbindungen nach Iran. Menschen aus beiden Ländern bewegen sich auf dem Territorium des jeweils anderen, und die Handelsbeziehungen florieren trotz der politischen Unterschiede. Vielleicht gibt uns Aserbaidschan die Möglichkeit, ihr Land als Zufluchtsort für unsere Agenten zu nutzen, die nach Iran eindringen."
 ISR_karabakh_victory: "Sieg in Karabach"
 ISR_karabakh_victory_desc: "Teilweise dank unserer Bemühungen wurde Karabach endlich von iranischen Stellvertretern befreit. Der Sieg gehört uns!"
 ISR_reconsider_caucasus_position: "Unsere Rolle in der Geschichte überdenken"
 ISR_reconsider_caucasus_position_desc: "Wir müssen aus unserer Geschichte lernen und uns Armenien sowie dem armenischen Volk wieder annähern. Unsere gemeinsame Geschichte zeigt viele Ähnlichkeiten, und wir dürfen diese nicht leugnen."
 ISR_recognize_arm_genocide: "Den armenischen Genozid anerkennen"
 ISR_recognize_arm_genocide_desc: "Unser jüdisches Volk hat, genau wie die Armenier, in der Vergangenheit das gleiche Schicksal der Verfolgung erlitten. Wir müssen das Leid der Armenier anerkennen, auch wenn das unsere Beziehungen zur Türkei verschlechtern wird."
 ISR_syunik_air_base: "Die Luftbasis Syunik pachten"
 ISR_syunik_air_base_desc: "Wir müssen Armenien um geheime Zusammenarbeit bitten, falls unser Land angegriffen wird. Eine Luftbasis muss eingerichtet werden, damit unsere Pläne erfolgreich sein können."
 ISR_armenia_mossad_door: "Das offene Fenster des Mossad"
 ISR_armenia_mossad_door_desc: "Wir müssen Armenien um Zusammenarbeit gegen die gemeinsame iranische Bedrohung bitten. Wenn sie zustimmen, werden unsere Spione über ihre Grenze nach Iran eindringen."
 ISR_airlift_support_armenia: "Operation Berg Ararat"
 ISR_airlift_support_armenia_desc: "Wir müssen militärisch mit Armenien kooperieren und sie mit unseren neuesten Drohnen beliefern."
 ISR_recognize_artsakh: "Unsere Position zur Artsakh-Frage"
 ISR_recognize_artsakh_desc: "Es ist an der Zeit, unsere endgültige Haltung zur Artsakh-Frage zu verkünden. Dies wird unseren Einfluss auf Armenien und Artsakh drastisch erhöhen."
 ISR_influence_caucasus: "Die Tore Alexanders schachmatt setzen"
 ISR_influence_caucasus_desc: "Wir müssen starke Verbindungen aufbauen und Einfluss sowie Handelsbeziehungen im gesamten Kaukasus verbreiten, selbst mit Ländern, die uns nicht wirklich mögen."
 ISR_free_trade_geo: "Israelisch-georgisches Freihandelsabkommen"
 ISR_free_trade_geo_desc: "Zu unserem gegenseitigen wirtschaftlichen Vorteil müssen wir ein Freihandelsabkommen zwischen unseren Ländern abschließen und die wirtschaftlichen Beziehungen ausbauen."
 ISR_mil_cyb_geo: "Militärische Fähigkeiten exportieren"
 ISR_mil_cyb_geo_desc: "Militärische Zusammenarbeit mit dem relativ friedlichen Georgien könnte für uns im langfristigen Plan zur Einflussnahme im Südkaukasus sehr nützlich sein."
 ISR_approach_georgia: "Annäherung an Georgien"
 ISR_approach_georgia_desc: "Georgien ist eines der Länder, das stets ein gewisses Interesse an einer Zusammenarbeit mit unserem Land gezeigt hat. Wir sollten versuchen, sie als Freunde zu gewinnen."
 ISR_balance_favor_ukraine: "Ukrainischen Weizen importieren"
 ISR_balance_favor_ukraine_desc: "Die Ukraine hat eine der größten jüdischen Diasporas der Welt. Wir können ihr großzügiges Angebot, ihr Getreide zu kaufen und dadurch unsere Handelsbeziehungen zu stärken, nicht ausschlagen."
 ISR_balance_favor_russia: "Russischen Weizen importieren"
 ISR_balance_favor_russia_desc: "Um Russland zu zeigen, dass wir der Idee einer Freundschaft mit ihnen sehr zugeneigt sind, könnten wir als ersten Schritt zur Zusammenarbeit Getreide von ihnen kaufen."
 ISR_russian_military_coordination: "Russische Militärkoordinierung"
 ISR_russian_military_coordination_desc: "Um unsere Beziehungen zu Russland zu fördern, könnten wir militärische Zusammenarbeit zwischen unseren Ländern vorschlagen."
 ISR_honor_the_red_army: "Die Rote Armee ehren"
 ISR_honor_the_red_army_desc: "Unser Volk hat gemeinsam gegen die Bedrohung durch die Nazis im Zweiten Weltkrieg gekämpft. Wir müssen diese Geschichte der Brüderlichkeit unterstützen und die Rote Armee ehren!"
 ISR_cede_sergeys_courtyard: "Abkommen über Sergeys Hof"
 ISR_cede_sergeys_courtyard_desc: "Das Russische Viertel ist eines der ältesten Viertel im Zentrum Jerusalems. Es umfasst eine große russisch-orthodoxe Kirche, den russischen Sergei-Hof sowie die Gebäude des russischen Generalkonsulats in Jerusalem. Hinzu kommen ehemalige Pilgerherbergen, von denen einige heute von israelischen Regierungsstellen genutzt werden und eine das Museum der Untergrundgefangenen beherbergt."
 ISR_part_of_the_russian_world: "Teil der russischen Welt"
 ISR_part_of_the_russian_world_desc: "Um unsere Beziehungen zu Russland zu vertiefen und gegenseitigen Nutzen zu gewinnen, könnten wir ein Freihandelsabkommen mit der EAWU unterzeichnen."
 ISR_ukrainian_foreign_workers: "Ukrainische Gastarbeiter"
 ISR_ukrainian_foreign_workers_desc: "Im Rahmen der wirtschaftlichen Zusammenarbeit mit der Ukraine können wir ihre Arbeiter in unser Land einladen. Vielleicht wird das beiden Seiten nützen."
 ISR_ukrainian_refugees: "Der Shaked-Vorschlag"
 ISR_ukrainian_refugees_desc: "Obwohl unsere Beziehungen zur Ukraine derzeit stark sind, müssen wir die Rückkehr unserer Diaspora aus der Ukraine nach Israel unterstützen."
 ISR_visit_central_asia: "Nach Zentralasien reisen"
 ISR_visit_central_asia_desc: "Es ist an der Zeit, unsere Beziehungen zu den zentralasiatischen Ländern zu verbessern."
 ISR_red_color_systems: "Tzeva-Adom-Systeme exportieren"
 ISR_red_color_systems_desc: "Angesichts der heutigen politischen Lage in der Ukraine könnte es vorausschauend sein, unsere Frühwarnradarsysteme dorthin zu exportieren."
 ISR_deliver_kipot_barzel_to_ukraine: "Das Abkommen des nördlichen Himmels"
 ISR_deliver_kipot_barzel_to_ukraine_desc: "Unser nächster Schritt zur Sicherung unserer Beziehungen zur Ukraine wäre der Export des Iron Dome dorthin."
 ISR_travel_to_europe: "Durch Europa reisen"
 ISR_travel_to_europe_desc: "Abgesehen von den Vereinigten Staaten sind die europäischen Staaten unsere engsten Handels- und Militärpartner. Wir müssen unsere Beziehungen zu ihnen verbessern."
 ISR_germany_relations: "Die Staatsräson stärken"
 ISR_join_oecd: "OECD-Unterstützung"
 ISR_join_oecd_desc: "Die Organisation für wirtschaftliche Zusammenarbeit und Entwicklung ist eine zwischenstaatliche Organisation, die 1961 gegründet wurde, um wirtschaftlichen Fortschritt und Welthandel zu fördern. Sie ist ein Forum, dessen Mitgliedstaaten sich selbst als der Demokratie und der Marktwirtschaft verpflichtet beschreiben, und bietet eine Plattform, um politische Erfahrungen zu vergleichen, Antworten auf gemeinsame Probleme zu suchen, gute Praktiken zu identifizieren und nationale sowie internationale Politiken ihrer Mitglieder zu koordinieren."
 ISR_germany_relations_desc: "Trotz unserer vergangenen ... Probleme mit Deutschland hat sich die moderne deutsche Regierung für ihre früheren Taten entschuldigt und unserem Volk Freundschaft erklärt."
 ISR_kosovo_question: "Die Balkanpolitik überdenken"
 ISR_kosovo_question_desc: "Indem wir das mehrheitlich muslimische Kosovo unterstützen, könnten wir insgesamt diplomatische Vorteile in der islamischen Welt erzielen. Darüber hinaus kann das westlich ausgerichtete Kosovo helfen, unser Bild zugunsten der westlichen Mächte zu verbessern."
 ISR_approach_singapore: "Eine neue Mission nach Singapur"
 ISR_approach_singapore_desc: "Singapur ist einer unserer ältesten und engsten Verbündeten in Ostasien. Wir müssen unser militärisches Kooperationsabkommen erneuern und unsere gemeinsamen Bemühungen vertiefen."
 ISR_approach_mynamar: "Das Erbe Thakin Nus"
 ISR_approach_mynamar_desc: "Myanmar war eines der ersten Länder, das uns anerkannte und gute Beziehungen zu uns aufbaute. Diese fruchtbare Freundschaft müssen wir fortsetzen!"
 ISR_state_visit_to_india: "Staatsbesuch in Indien"
 ISR_state_visit_to_india_desc: "Indien ist einer unserer engsten militärischen und politischen Partner gegen die islamische Aggression im Nahen Osten. Wir müssen die guten Beziehungen zwischen unseren Staaten fördern."
 ISR_promote_after_army_trips: "Nach-Armee-Reisen nach Indien"
 ISR_promote_after_army_trips_desc: "Indien möchte seinen Tourismussektor stärken. Wir können ihnen dabei helfen, indem wir Reisen nach dem Militärdienst für unsere Soldaten nach Indien etablieren."
 ISR_arm_exports_to_india: "Waffenexporte nach Indien"
 ISR_arm_exports_to_india_desc: "Das indische Militär könnte sehr an unseren Rüstungsprodukten interessiert sein. Bieten wir ihnen unsere Waffen zum Verkauf an."
 ISR_ashdod_port: "Eine Pacht für den Hafen von Ashdod gewähren"
 ISR_ashdod_port_desc: "Indien ist seit langem an Zugang zum Hafen von Ashdod interessiert. Das können wir zu unserem gegenseitigen Vorteil nutzen."
 ISR_joint_space_program: "Zusammenarbeit bei Raumfahrtprogrammen"
 ISR_joint_space_program_desc: "Das gemeinsame israelisch-indische Raumfahrtprogramm ist ein Beweis für das unerschütterliche Engagement beider Nationen, die Grenzen der Weltraumforschung weiter zu verschieben."
 ISR_make_in_india: "Made in India"
 ISR_make_in_india_desc: "Wir müssen unsere Handelsbeziehungen zu Indien ausbauen, um gegenseitigen Nutzen zu erzielen. Die jüngst ausgerufenen neuen indischen Wirtschaftsprogramme sind dafür eine gute Gelegenheit."
 ISR_salinization_support_india: "Unterstützung mit Wassertechnologie anbieten"
 ISR_salinization_support_india_desc: "Indien hat, genau wie wir früher, Probleme mit der Wasseraufbereitung. Das können wir nutzen, um mehr Einfluss auf sie zu gewinnen."
 ISR_iran_international: "Iran International beherbergen"
 ISR_iran_international_desc: "Iran International ist ein persischsprachiges Nachrichtenmedium, das sich der Gegenpropaganda gegenüber der iranischen Bevölkerung widmet."
 ISR_plan_bet: "Plan Bet umsetzen"
 ISR_plan_bet_desc: "Um Irans bösartige Pläne zu durchkreuzen und die irakischen Schiiten in Schach zu halten, müssen wir den kurdischen De-facto-Staat und ethnische Milizen unterstützen."
 ISR_indian_imports: "Israelisch-indischer Handelsschub"
 ISR_speak_to_staff: "§8Mit dem Matkal sprechen§!"
 ISR_speak_to_staff_desc: "Unser Land ist von Feinden umgeben. Wir können uns keinen unkonzentrierten Ansatz in unserem Militär leisten."
 ISR_women_corps: "Das Frauenkorps auflösen"
 ISR_women_corps_desc: "Wir sollten das Frauenkorps auflösen, damit Soldatinnen der Autorität einzelner Einheiten entsprechend ihrer Aufgaben und nicht ihres Geschlechts unterstellt werden."
 ISR_yohalam: "Die Yohalam"
 ISR_yohalam_desc: "Diese Einheit ist dafür verantwortlich, Richtlinien zur Verhinderung sexueller Belästigung innerhalb der IDF umzusetzen und den Generalstabschef sowie das Generalstabsforum der IDF in Fragen gleicher Geschlechterchancen und der Optimierung des Dienstes von Frauen in der IDF zu beraten."
 ISR_unite_courses: "Offizierskurse zusammenlegen"
 ISR_unite_courses_desc: "Wir sollten die Offizierskurse für Frauen und Männer zusammenlegen, um die Offiziersausbildung zu zentralisieren."
 ISR_netzah_yehuda: "Netzah-Yehuda-Bataillon"
 ISR_netzah_yehuda_desc: "Das 97. Netzah-Yehuda-Bataillon, früher als Nahal Haredi bekannt, ist ein Bataillon der Kfir-Brigade der Israelischen Verteidigungsstreitkräfte. Der Zweck der Einheit ist es, haredischen jüdischen Männern den Dienst als Kampfsoldaten in der israelischen Armee zu ermöglichen, indem ein Umfeld geschaffen wird, das ihren religiösen Überzeugungen und der strengen Einhaltung der Halacha entspricht."
 ISR_karakal: "Caracal-Bataillon"
 ISR_karakal_desc: "Das 33. Caracal-Bataillon ist ein Infanterie-Kampfbataillon der Israelischen Verteidigungsstreitkräfte, eine von drei vollständig kampffähigen Einheiten der Paran-Brigade, die sowohl aus männlichen als auch aus weiblichen Soldaten bestehen."
 ISR_army_builds_society: "Am Bone Tzava Bone Am"
 ISR_army_builds_society_desc: "Die Armee formt unsere Gesellschaft und ist der Kern unserer Staatlichkeit!"
 ISR_gsharim: "Gsharim"
 ISR_gsharim_desc: "Das Gsharim-Programm sollte unseren Soldaten ermöglichen, nach ihrem Ausscheiden aus der IDF Leistungspunkte zu erhalten."
 ISR_titkadmu: "Mitkadmin BeTzahal"
 ISR_titkadmu_desc: "Titkadmu ist ein Militärprogramm für Soldaten im Autismus-Spektrum. Im Rahmen der Vision der IDF, diese Jugendlichen in die allgemeine Gesellschaft zu integrieren, entwickelte MPOTP ein Programm, um Führungspersonal darin zu schulen, mit Soldaten im Spektrum umzugehen. Außerdem entwarfen wir ein Programm, das diesen Soldaten hilft, sich erfolgreich in den Militäralltag einzugliedern."
 titkadmu_idea: "Titkadmu"
 ISR_fill_our_stocks: "Unsere Lager füllen"
 ISR_fill_our_stocks_desc: "Wir müssen unsere Bestände so schnell wie möglich auffüllen. Daher sollten wir verschiedene Waffenhändler kontaktieren und Waffen für unsere Armee kaufen."
 ISR_merkava_focus: "Der Merkava"
 ISR_merkava_focus_desc: "Der Merkava ist eine Reihe von Kampfpanzern, die von den Israelischen Verteidigungsstreitkräften eingesetzt werden und das Rückgrat des Panzerkorps der IDF bilden."
 ISR_mafat: "Das Maf'at schaffen"
 ISR_mafat_desc: "Die DDR&D ist mit der Entwicklung innovativer Konzepte für Verteidigungstechnologie beauftragt, verwaltet kurz- und langfristige Projekte des israelischen Verteidigungsministeriums im Bereich der Verteidigungstechnologie, dient als fachlich-technisches Organ für Forschung und Entwicklung militärischer und defensiver Technologien, kooperiert mit internationalen Partnern in Forschung und Entwicklung und bildet die nächste Generation von Fachkräften und Technikexperten des Verteidigungssektors aus."
 ISR_military_industry: "Führender Waffenproduzent werden"
 ISR_military_industry_desc: "Wir sollten die Waffenproduktion zu einem der größten Sektoren unserer Wirtschaft machen."
 ISR_eitan: "Der Eitan"
 ISR_eitan_desc: "Eitan ist ein gepanzertes Kampffahrzeug, das von der Merkava- und Panzerfahrzeugdirektion des IMOD entwickelt wurde, um den veralteten M113-Schützenpanzer der Israelischen Verteidigungsstreitkräfte zu ersetzen."
 ISR_pere: "Der Pereh"
 ISR_pere_desc: "Der Pereh ist ein israelischer Panzerabwehrraketenträger, der als Panzer getarnt ist. Er dient den Israelischen Verteidigungsstreitkräften in der Rolle präziser Artillerie."
 ISR_barak_tank: "Den Barak einführen"
 ISR_barak_tank_desc: "Der Barak-Panzer vereint bahnbrechende Technologien, die den Soldaten des Panzerkorps einzigartige defensive und offensive Fähigkeiten verleihen und ihre Manövrierfähigkeit erheblich verbessern."
 ISR_winegrad_commission: "Anhörungen der Winograd-Kommission"
 ISR_winegrad_commission_desc: "Die Winograd-Kommission ist eine von der israelischen Regierung eingesetzte Untersuchungskommission unter dem Vorsitz des pensionierten Richters Eliyahu Winograd, die den Libanonkrieg untersuchte und Lehren daraus zog."
 ISR_unit_as_etrog: "Die Einheit als Etrog"
 ISR_multi_facid_manuevers: "Mehrgliedrige Brigaden"
 ISR_tenufa_project: "Das Tnufa-Projekt"
 ISR_tenufa_project_desc: "Der Tnufa-Plan hat bislang noch keine offizielle Zustimmung des israelischen Kabinetts erhalten und ist nicht in einem mehrjährigen Haushaltsabkommen verankert."
 ISR_gideon_plan: "Der Gideon-Plan"
 ISR_gideon_plan_desc: "Der Gideon-Plan verfolgt zwei Ziele. Erstens soll er Kürzungen vermeiden und tatsächlich eine weitere Erhöhung des Verteidigungshaushalts auf Kosten von Wohlfahrt, Bildung, Gesundheit und allen anderen nationalen Notwendigkeiten erreichen."
 ISR_flash_formations: "Blitzformationen"
 ISR_flash_formations_desc: "Wir sollten Blitzformationen einsetzen, um unsere Bodentruppen in der Praxis effizienter zu machen."
 ISR_lightning_campaign: "Rein und raus"
 ISR_lightning_campaign_desc: "Unsere Streitkräfte sollten für schnelle Überfälle und den Austausch von Einheiten bereit sein, was uns besonders in städtischen Gebieten zugutekommen wird."
 ISR_prioritize_givati: "Givati priorisieren"
 ISR_prioritize_givati_desc: "Die 84. Givati-Brigade ist eine Infanteriebrigade der Israelischen Verteidigungsstreitkräfte, die 1947 gegründet wurde. Während des Krieges von 1948 war sie an der Eroberung palästinensischer Dörfer in den Operationen Hametz, Barak und Pleshet beteiligt."
 ISR_ghost_units: "Geistereinheiten 888"
 ISR_ghost_units_desc: "Einheit 888 ist eine kombinierte Spezialeinsatztruppe innerhalb der 99. Infanteriedivision. Wir sollten sie priorisieren und als eigenständige Einheit ausgliedern."
 ISR_urban_warfare: "Auf urbane Kriegsführung vorbereiten"
 ISR_urban_warfare_desc: "Nun sollten wir die letzten Vorbereitungen treffen, um für jedes mögliche Kriegsszenario mit urbanem Umfeld bereit zu sein."
 ISR_paphos_drill: "Die Paphos-Kriegsspiele"
 ISR_paphos_drill_desc: "Wir sollten mit Zypern trainieren, um mehr Erfahrung in der Gebirgskriegsführung für unsere Nordfront zu sammeln."
 ISR_operating_to_victory: "Doktrin des Sieges"
 ISR_operating_to_victory_desc: "Wir sollten auf den Sieg hinarbeiten, nicht auf Teillösungen!"
 ISR_prioritize_golani: "Golani Sheli"
 ISR_prioritize_golani_desc: "Wir müssen die Golanhöhen als unseren wichtigsten Verteidigungssektor priorisieren."
 ISR_focus_on_the_battalion: "Den Fokus auf den Gdud legen"
 ISR_focus_on_the_battalion_desc: "Bataillone sollten unsere höchste Priorität sein, denn sie werden unser Schild gegen nördliche Feinde sein."
 ISR_mountain_warfare: "Auf Gebirgskrieg vorbereiten"
 ISR_mountain_warfare_desc: "Nun sollte unsere Armee für jeden Krieg an der Nordfront und für jede Gebirgsoperation bereit sein."
 ISR_focus_air: "Die israelische Luftwaffe"
 ISR_focus_air_desc: "Die israelische Luftwaffe dient als Zweig der Israelischen Verteidigungsstreitkräfte für Luft- und Weltraumkrieg. Sie wurde am 28. Mai 1948, kurz nach der israelischen Unabhängigkeitserklärung, gegründet."
 ISR_focus_navy: "Die israelische Marine"
 ISR_focus_navy_desc: "Um die Sicherheit unseres Landes zu gewährleisten, sollten wir uns auch auf unsere maritime Sicherheit konzentrieren."
 ISR_focus_ground_forces: "Die israelischen Bodentruppen"
 ISR_focus_ground_forces_desc: "Die israelischen Bodentruppen sind die Landstreitkräfte der Israelischen Verteidigungsstreitkräfte. Ihr Kommandeur ist der General Officer Commanding im Rang eines Generalmajors, der Mazi, der dem Generalstabschef unterstellt ist."
 ISR_extend_standing_period: "Die aktive Dienstzeit verlängern"
 ISR_extend_standing_period_desc: "Piloten werden keine „Saisonarbeiter“ sein, die erst im Krieg einberufen werden. Wir werden ihre aktive Dienstzeit verlängern und ihnen politische Betätigung untersagen."
 ISR_shorten_standing_period: "Die aktive Dienstzeit verkürzen"
 ISR_shorten_standing_period_desc: "Wir sollten die Ausbildungszeit verkürzen, um unsere Reservisten massenhaft ausbilden zu können."
 ISR_shorten_flight_course: "Den Flugkurs reformieren"
 ISR_shorten_flight_course_desc: "Wir sollten den Ausbildungskurs für Luftwaffenpersonal reformieren. Das wird mehr Zeit in der Ausbildung erfordern, sie aber auch professioneller machen."
 ISR_small_but_professional: "Klein, aber professionell"
 ISR_small_but_professional_desc: "Die Offiziere unserer Luftwaffe sollten zahlenmäßig klein, aber langfristig im Dienst sein."
 ISR_miller_case: "Den Miller-Fall umsetzen"
 ISR_miller_case_desc: "1994 stellte sich eine mutige junge Frau gegen das System und forderte die Chance, in eine der elitärsten Einheiten der IDF aufgenommen zu werden. Alice Miller, ursprünglich aus Südafrika, wanderte im Alter von 6 Jahren mit ihrer Familie nach Israel aus. Miller hatte stets eine Leidenschaft für die Luftfahrt. Nach der Schule erwarb sie ihre zivile Pilotenlizenz und studierte Luft- und Raumfahrttechnik. Mit 23 Jahren verklagte sie das Militär auf ihr Recht, in den prestigeträchtigen Pilotenkurs aufgenommen zu werden. In einer historischen Entscheidung erklärte der Oberste Gerichtshof Israels das Verbot weiblicher Rekruten im Flugkurs für verfassungswidrig."
 ISR_begin_doctrine: "Die Begin-Doktrin stärken"
 ISR_operation_orchard: "Operation Outside the Box"
 ISR_operation_orchard_desc: "Wir müssen einen Luftangriff auf einen mutmaßlichen Nuklearreaktor durchführen, der als Al-Kibar-Anlage in der Region Deir ez-Zor in Syrien bezeichnet wird."
 ISR_prevent_iranian_nukes: "Operation Rosenkönigin"
 ISR_prevent_iranian_nukes_desc: "Nun wissen wir mit Sicherheit, dass Iran entweder bereits Atomwaffen besitzt oder kurz davor steht, sie zu erwerben. Wir müssen diesen Prozess verlangsamen."
 ISR_prevent_libyan_nukes: "Operation Dünenstürme"
 ISR_prevent_libyan_nukes_desc: "Falls die libysche Regierung uns feindlich gesinnt ist und Atomwaffen entwickeln oder kaufen will, sollten wir ihren Angriff verhindern, indem wir ihre nuklearen Objekte bombardieren."
 ISR_prevent_iraqi_nukes: "Operation Letzter Zug"
 ISR_prevent_iraqi_nukes_desc: "Falls die irakische Regierung uns feindlich gesinnt ist und Atomwaffen entwickeln oder kaufen will, sollten wir ihren Angriff verhindern, indem wir ihre nuklearen Objekte bombardieren."
 ISR_war_between_the_wars: "Die Front zwischen den Kriegen"
 ISR_war_between_the_wars_desc: "Um dem iranischen Regime entgegenzuwirken, müssen wir einen hybriden Krieg gegen Iran führen und ihnen an ihren entferntesten Fronten entgegentreten."
 ISR_villa_in_the_jungle: "Aus der Villa im Dschungel"
 ISR_villa_in_the_jungle_desc: "Vielleicht können wir versuchen, Syrien dazu zu bewegen, iranische Truppen von seinem Boden abzuziehen und es vielleicht sogar zu einem Geiselverbündeten zu machen ..."
 ISR_expand_lamdan: "Auf den Nachrichtendienst-Lahak setzen"
 ISR_expand_lamdan_desc: "Wir sollten uns darauf verlassen, dass LAMDAN sämtliche Aufklärung der Luftwaffe übernimmt."
 ISR_researchers_with_idi: "Forscher in IDI-Basen stationieren"
 ISR_researchers_with_idi_desc: "Wir sollten unsere Militärforscher auf IDI-Basen stationieren, um mehr Informationen über die aktuellen Taktiken und Bedürfnisse unserer Armee zu gewinnen."
 ISR_shuffle_squadrons: "Umbesetzungen in den Staffeln"
 ISR_shuffle_squadrons_desc: "Wir sollten politische Vereinigungen, die von Fliegern gegründet wurden, neu ordnen. Das wird ihre politische Loyalität sicherstellen."
 ISR_research_department_focus: "Kiryah verteidigen"
 ISR_research_department_focus_desc: "Wir sollten die Dominanz der Kiryah-Abteilung über Gilot sicherstellen."
 ISR_aman_info_focus: "Glilot verteidigen"
 ISR_aman_info_focus_desc: "Wir sollten die Dominanz der Gilot-Abteilung über Kiryah sicherstellen."
 ISR_balance_hatam_aman_focus: "Die Künstler der Information"
 ISR_balance_hatam_aman_focus_desc: "Wir sollten das Gleichgewicht zwischen Kiryah und Gilot sichern, auch wenn ihnen das nicht gefallen wird."
 ISR_brothers_squadrons: "Staffeln von Brüdern"
 ISR_brothers_squadrons_desc: "Reservisten dürfen sich, anders als aktive Soldaten, politisch betätigen. Besonders deutlich zeigt sich das an ihrer Vereinigung Brothers in Arms, die die Anti-Justizreform anführte."
 ISR_brothers_in_arms_air: "Brüder und Schwestern in Waffen"
 ISR_brothers_in_arms_air_desc: "Wir sollten weiblichen Offizieren erlauben, sich unserer Vereinigung anzuschließen, und die Zahl der Luftwaffenangehörigen, die beitreten können, erweitern."
 ISR_sion_sead: "Das Si'on-SEAD"
 ISR_sion_sead_desc: "Wir sollten zur Unterdrückung feindlicher Luftabwehr bereit sein und mehr Hightech-Drohnen produzieren, um solche Operationen durchführen zu können."
 ISR_kochav: "Fortgeschrittene Drohnenproduktion"
 ISR_kochav_desc: "Mit unseren Fähigkeiten sollten wir unsere Drohnen produzieren und möglicherweise exportieren, um mehr Geld und Stärke zu gewinnen."
 ISR_prioritize_ramat_david: "Ramat David priorisieren"
 ISR_prioritize_ramat_david_desc: "Wenn wir in Ramat David einen Luftwaffenstützpunkt errichten, können wir die südlichen Regionen unseres Landes sichern."
 ISR_prioritize_nevatim: "Nevatim priorisieren"
 ISR_prioritize_nevatim_desc: "Wir sollten Nevatim wegen seiner geografischen Lage für den Bau eines Luftwaffenstützpunkts priorisieren."
 ISR_raam: "Die Ra'am"
 ISR_raam_desc: "Ein Mehrzweck-Langstreckenjäger für Angriff und Abfang. Dieses Flugzeug – das beste seiner Art im Nahen Osten – trat im Januar 1998 in den Dienst und ist das Spitzenflugzeug der IAF. Die Ra'am ist eine speziell für Israel von McDonnell Douglas (heute Boeing) entwickelte Version der F-15E Strike Eagle. Ihre enorme Nutzlastkapazität in Verbindung mit ihren fortschrittlichen Systemen ermöglicht Tiefenangriffe mit großer Waffenlast, auf große Entfernungen, in niedriger Höhe, zu jeder Tages- und Nachtzeit und bei jedem Wetter."
 ISR_sufa: "Die Sufa"
 ISR_sufa_desc: "Die F-16I, genannt „Sufa“ oder Gewittersturm, ist eine neu gestaltete und speziell angepasste Version der F-16, die auf die Anforderungen der israelischen Luftwaffe zugeschnitten wurde. Die F-16I unterscheidet sich von jeder anderen F-16, einschließlich jener der US-Luftwaffe."
 ISR_snunit: "Die Snunit"
 ISR_snunit_desc: "Die Grob G 120 ist ein deutsches zweisitziges Schulflugzeug. Sie wird aktiv von den Israelischen Verteidigungsstreitkräften und der IDF zur Pilotenausbildung genutzt."
 ISR_lavi: "Die Lavi"
 ISR_lavi_desc: "Die IAI Lavi ist ein von IAI gebauter Prototyp eines Kampfflugzeugs. Das Projekt wurde eingestellt, doch einige Kampfjetprogramme anderer Länder nutzen die Forschungsergebnisse aus der Entwicklung der Lavi."
 ISR_adir: "Die Adirs erhalten"
 ISR_adir_desc: "Die israelische Beschaffung der Lockheed Martin F-35 Lightning II ist das Ergebnis eines Abkommens, nach dem die Regierung Israels die Lockheed Martin F-35 Lightning II für die israelische Luftwaffe als F-35I „Adir“ beschafft. Die ersten neun F-35 wurden im Dezember 2017 bei der israelischen Luftwaffe einsatzbereit."
 ISR_repair_the_atalefs: "Die Atalefs reparieren"
 ISR_repair_the_atalefs_desc: "Der Eurocopter AS565 Panther Atalef ist ein französischer Mehrzweckhubschrauber, die militärische Version des zivilen Eurocopter AS365 Dauphin. Der Panther wird für ein breites Spektrum an Aufgaben eingesetzt: Luftunterstützung, Kampflandungen, Bekämpfung von Bodenzielen, U-Boot-Abwehr, Such- und Rettungseinsätze sowie Verwundetenevakuierung."
 ISR_yassur: "Die Yass'ur"
 ISR_yassur_desc: "Die CH-53 Sea Stallion (Sikorsky S-65) ist eine amerikanische Familie schwerer Transporthubschrauber, die vom amerikanischen Hersteller Sikorsky Aircraft entwickelt und gebaut wurde."
 ISR_yanshuf: "Die Yanshuf"
 ISR_yanshuf_desc: "Die Sikorsky UH-60 Black Hawk ist ein vierblättriger, zweimotoriger, mittlerer militärischer Mehrzweckhubschrauber von Sikorsky Aircraft. Sikorsky reichte 1972 den Entwurf S-70 für den Wettbewerb des Utility Tactical Transport Aircraft System (UTTAS) der US Army ein."
 ISR_saraph: "Die Saraph erhalten"
 ISR_saraph_desc: "Die Boeing AH-64 Apache ist ein amerikanischer Kampfhubschrauber mit zwei Turbowellenmotoren, Heckradfahrwerk und Tandemcockpit für eine zweiköpfige Besatzung."
 ISR_unit_669: "Einheit 669"
 ISR_air_officers: "Die Besten zum Flug"
 ISR_air_officers_desc: "Wir sollten nur professionelle Piloten als unsere Flieger und Offiziere auswählen. Diese Politikänderung könnte jedoch die Zustimmung der Knesset erfordern."
 ISR_air_reservists: "Den Status quo beibehalten"
 ISR_air_reservists_desc: "Wir sollten die Strategie stärken, nach kurzer Ausbildung einberufene Reservisten zum Kern unserer Luftwaffe zu machen."
 ISR_aerospace_industries_focus: "Die Israel Aerospace Industries"
 ISR_aerospace_industries_focus_desc: "Israel Aerospace Industries ist Israels wichtigster Hersteller in der Luft- und Raumfahrt und produziert Luft- und Raumfahrtsysteme sowohl für militärische als auch für zivile Zwecke."
 ISR_ilan_ramon: "Der Flug Ilan Ramons"
 ISR_ilan_ramon_desc: "Ilan Ramon ist ein israelischer Kampfpilot und der erste israelische Astronaut. Er wird der erste Israeli im Weltraum sein. Hoffen wir, dass alles gut verläuft."
 ISR_air_defence_pact: "Der Luftverteidigungspakt"
 ISR_spaceil: "SpaceIL gründen"
 ISR_spaceil_desc: "SpaceIL ist eine gemeinnützige Organisation zur Förderung von Wissenschaft und naturwissenschaftlicher Bildung. SpaceIL plant jedoch auch, verschiedene Raumfahrzeuge ins All zu schicken und möglicherweise sogar auf dem Mond zu landen."
 ISR_bereshit: "Die Genesis-Sonde starten"
 ISR_bereshit_desc: "Wir sollten versuchen, Beresheet1 zu starten, damit sie den Mond erreicht und einen neuen Ausgangspunkt für SpaceIL schafft!"
 ISR_project_samson: "Projekt SAMSON"
 ISR_project_samson_desc: "Die Samson-Option ist Israels Abschreckungsstrategie der massiven Vergeltung mit Atomwaffen als letztes Mittel gegen ein Land, dessen Militär große Teile Israels überrannt oder zerstört hat."
 ISR_ofek_satellites: "Die Ofeq vorbereiten"
 ISR_ofek_satellites_desc: "Ofeq ist die Bezeichnung für eine Reihe israelischer Aufklärungssatelliten. Die meisten Ofeq-Satelliten wurden auf Shavit-Trägerraketen von der Palmachim-Luftbasis an Israels Mittelmeerküste gestartet. Die Satelliten im niedrigen Erdorbit umrunden die Erde alle 90 Minuten."
 ISR_davids_sling: "Davids Schleuder"
 ISR_davids_sling_desc: "David's Sling, früher auch Magic Wand genannt, ist ein militärisches System der Israelischen Verteidigungsstreitkräfte, das zur Abwehr feindlicher Flugzeuge, Drohnen, taktischer ballistischer Raketen, mittel- und langstreckiger Raketen sowie Marschflugkörper dient."
 ISR_magic_wand: "Der Zauberstab"
 ISR_magic_wand_desc: "Der Zauberstab ist der Name des Raketenprototyps, der die Grundlage des künftigen David's-Sling-Projekts bilden soll."
 ISR_jericho_missile: "Die Jerichos aufrüsten"
 ISR_jericho_missile_desc: "Jericho ist eine allgemeine Bezeichnung für eine lose zusammenhängende Familie ballistischer Raketen, die seit den 1960er Jahren von Israel entwickelt und eingesetzt werden."
 ISR_arrow: "Die Arrows testen"
 ISR_arrow_desc: "Arrow oder Hetz ist eine Familie antiballistischer Raketen, die entwickelt wurde, um Israels Bedarf an einem Raketenabwehrsystem zu erfüllen, das gegen ballistische Raketen wirksamer ist als die Boden-Luft-Rakete MIM-104 Patriot."
 ISR_iron_dome: "Ein Iron Dome"
 ISR_iron_dome_desc: "Iron Dome ist ein israelisches mobiles Allwetter-Luftverteidigungssystem, das von Rafael Advanced Defense Systems und Israel Aerospace Industries entwickelt wurde. Das System ist dafür ausgelegt, Kurzstreckenraketen und Artilleriegeschosse abzufangen und zu zerstören, die aus Entfernungen von 4 bis 70 Kilometern abgefeuert werden und deren Flugbahn auf ein israelisches Siedlungsgebiet gerichtet ist."
 ISR_reconsider_lebanese_policy: "§YDie Libanonpolitik überdenken§!"
 ISR_reconsider_lebanese_policy_desc: "Wir müssen unsere Haltung gegenüber Libanon und der Hisbollah überdenken und unsere Probleme im Norden endlich beseitigen ..."
 ISR_accept_the_equation: "Seine Gleichung akzeptieren"
 ISR_accept_the_equation_desc: "Wir dürfen nicht zu direkt vorgehen und die Hisbollah nur in Syrien angreifen, damit die Lage im Libanon nicht eskaliert und wir vorsichtiger vorgehen können ..."
 ISR_reject_the_equation: "Seine Gleichung ablehnen"
 ISR_reject_the_equation_desc: "Wir dürfen uns nicht Regeln beugen, die von Terroristen auferlegt werden! Wir werden die Hisbollah direkt angreifen, um diese Plage von der Landkarte zu tilgen!"
 ISR_premptive_strike_lebanon: "Sie in die Steinzeit zurückbomben"
 ISR_premptive_strike_lebanon_desc: "Wir haben die Existenz der Hisbollah lange genug ertragen. Es ist Zeit, sie alle in die Steinzeit zurückzuschicken!"
 ISR_sponser_insurgets_lebanon: "Die stille Hand"
 ISR_sponser_insurgets_lebanon_desc: "Wir müssen pro-israelische Gruppen im Libanon unterstützen, um unseren Erfolg in einem künftigen Krieg sicherzustellen ..."
 ISR_recon_planes_lebanon: "Unsere Köpfe zeigen"
 ISR_recon_planes_lebanon_desc: "Wenn wir unsere Aufklärungsflugzeuge über Libanon einsetzen, können wir ihren Luftraum zu unserem Vorteil nutzen."
 ISR_northern_shield: "Operation Nördlicher Schild"
 ISR_northern_shield_desc: "Die Hisbollah gräbt tiefe Tunnel, um zu gegebener Zeit in unser Grenzgebiet einzudringen. Das müssen wir stoppen."
 ISR_fortify_har_dov: "Har Dov befestigen"
 ISR_fortify_har_dov_desc: "Wir müssen unsere Grenze zur Hisbollah befestigen und auf einen umfassenden Krieg vorbereitet sein."
 ISR_prepare_radwan: "Galiläa schützen"
 ISR_prepare_radwan_desc: "Wir müssen in die Radwan-Kräfte eindringen und ihre Organisation schwächen."
 ISR_hold_him_accountable: "Ihn zur Rechenschaft ziehen"
 ISR_hold_him_accountable_desc: "Die Hamas verlangt von der Hisbollah, ihre Raketenangriffe auf uns zu unterstützen. Dafür müssen wir sie zur Rechenschaft ziehen."
 ISR_speak_to_cabinet: "§YMit dem Kabinett zusammentreffen§!"
 ISR_speak_to_cabinet_desc: "Unser Land hat viele Probleme im Zusammenhang mit Palästina und der Hisbollah. Wir müssen eine Dringlichkeitssitzung des Kabinetts einberufen, um einen möglichen Aktionsplan zu besprechen."
 ISR_intifada_darkest_hour: "BeKol Dor VaDor"
 ISR_intifada_darkest_hour_desc: "Ein berühmter jüdischer Psalm aus dem Pessachfest lautet: 'In jeder Generation und in jeder Generation stehen sie gegen uns auf, um uns auszulöschen, und Gott rettet uns vor ihnen.' Da Busse in jeder größeren Stadt explodieren und Hunderte Israelis tot daliegen, ist dies nur die nächste Generation, die gegen das jüdische Volk aufsteht. Sorgen wir dafür, dass es die letzte sein wird."
 ISR_rely_on_shabac: "Auf den Shabak setzen"
 ISR_rely_on_shabac_desc: "Shabak ist neben Aman und Mossad eine der drei wichtigsten Organisationen der israelischen Nachrichtengemeinschaft."
 ISR_rely_on_8200: "Auf die ISNU setzen"
 ISR_rely_on_8200_desc: "Einheit 8200 ist eine Einheit des israelischen Nachrichtendienstkorps der Israelischen Verteidigungsstreitkräfte und verantwortlich für verdeckte Operationen, Signalaufklärung und Entschlüsselung, Gegenspionage, Cyberkrieg, Militärnachrichtendienst und Überwachung."
 ISR_establish_tzamams: "Tzamams einrichten"
 ISR_establish_tzamams_desc: "Wir müssen Tzamams einrichten, damit unsere Nachrichtendienste zusammenarbeiten und ihre Handlungen koordinieren."
 ISR_recover_josephs_tomb: "Das Schicksal von Josephs Grab"
 ISR_recover_josephs_tomb_desc: "Wir sollten entscheiden, ob Juden weiterhin mit gepanzerten Fahrzeugen zu Josephs Grab in Nablus fahren dürfen oder nicht."
 ISR_operation_noahs_ark: "Noahs Archen beschlagnahmen"
 ISR_operation_noahs_ark_desc: "Iran plante, Waffen per Schiff nach Palästina zu liefern. Das sollten wir präventiv stoppen."
 ISR_operation_defensive_shield: "Operation Homat Magen"
 ISR_operation_defensive_shield_desc: "Wir müssen erneut ins Westjordanland einrücken und die terroristische Bedrohung selbst ausrotten. Arafat hat sich entschieden, uns nicht zu helfen."
 ISR_operation_city_wall: "Operation Ir Homa"
 ISR_operation_city_wall_desc: "Palästina hat zugestimmt, die Anti-Terror-Operation selbst durchzuführen, nur mit einfacher Unterstützung durch uns. Sehen wir, wie es läuft ..."
 ISR_nohal_shakhen: "Nachbarschaftsverfahren"
 ISR_nohal_shakhen_desc: "Das Nachbarschaftsverfahren bedeutet, dass bei einer Festnahmeoperation ein Nachbar sein Haus verlassen und in ein anderes Haus hineingehen muss, um die Menschen darin aufzufordern, herauszukommen – aus dem Haus, in dem sich der Gesuchte befinden soll."
 ISR_refuse_nohal: "Das Verfahren ablehnen"
 ISR_refuse_nohal_desc: "Wir müssen jedes unmenschliche Verfahren ablehnen, selbst wenn wir es mit Terroristen zu tun haben."
 ISR_disentanglement_plan: "Der Entflechtungsplan"
 ISR_disengagement_plan: "Der Rückzugsplan"
 ISR_disengagement_plan_desc: "Israelische Siedlungen im Gazastreifen und vier israelische Siedlungen im Westjordanland werden einseitig aufgelöst. Israelische Siedler und die Armee werden aus dem Inneren des Gazastreifens evakuiert, während das Militär entlang der Grenze neu stationiert wird."
 ISR_economic_borders: "Grenzen des Wohlstands"
 ISR_economic_borders_desc: "Wir müssen wirtschaftliche Grenzen zwischen uns und Palästina schaffen und Handel sowie gegenseitige Investitionen fördern."
 ISR_construct_the_wall_settlements: "Die Siedlungen einbeziehen"
 ISR_construct_the_wall_settlements_desc: "Wir müssen die Mauer um das Westjordanland errichten, dabei aber auch unsere Siedlungen einbeziehen."
 ISR_construct_the_wall_no_settlements: "Die Sperranlage im Westjordanland errichten"
 ISR_construct_the_wall_no_settlements_desc: "Wir dürfen die Siedlungen nicht aufgeben, aber die Mauer sollte unser Kernland vom de jure Palästina und dem Westjordanland trennen."
 ISR_propose_hudna: "Eine Hudna vorschlagen"
 ISR_propose_hudna_desc: "Was wäre, wenn wir ihnen vor einer wirtschaftlichen Blockade des Gazastreifens ein gutes, mit Geld unterlegtes Angebot für den künftigen Wohlstand Gazas machen? Vielleicht funktioniert es ... vielleicht."
 ISR_blockade_gaza: "Eine Quarantäne errichten"
 ISR_blockade_gaza_desc: "Wir sollten den Gazastreifen blockieren, um sicherzustellen, dass die Terroristen unsere Grenze nicht überschreiten können. Wir sollten Gaza belagern und uns auf künftige Zusammenstöße vorbereiten ..."
 ISR_gaza_uprising: "§6Der Aufstand in Gaza§!"
 ISR_gaza_uprising_desc: "Radikale haben Gaza übernommen. Wir müssen jetzt handeln."
 ISR_question_gazan_workers: "Billigarbeit aus Gaza"
 ISR_question_gazan_workers_desc: "Wir sollten billige Arbeitskräfte aus Gaza ermutigen, in Israel zu arbeiten, und dadurch der radikalen Regierung im Gazastreifen keinen Nutzen bringen."
 ISR_ships_not_pass: "Schiffe dürfen nicht passieren"
 ISR_ships_not_pass_desc: "Keine ausländischen Schiffe dürfen den Gazastreifen erreichen. Wir sollten sechs zivile Schiffe der Gaza Freedom Flotilla aufbringen, die die Terroristen in Gaza versorgen."
 ISR_egypt_joint_blockade: "Mit Ägypten verhandeln"
 ISR_egypt_joint_blockade_desc: "Vielleicht sollten wir versuchen, Ägypten zu überzeugen, den Gazastreifen gemeinsam mit uns zu blockieren."
 ISR_limit_fishing_rights: "Gazás Fischereizone begrenzen"
 ISR_limit_fishing_rights_desc: "Wir sollten die Fischereizone Gazas einschränken, um die Blockade zu verschärfen."
 ISR_qatari_dollars_yes: "Die Geldsäcke der Sponsoren zulassen"
 ISR_qatari_dollars_yes_desc: "Wir sollten den Sponsoren der Terroristen in Gaza erlauben, im Gegenzug für einen kurzen Waffenstillstand Gehälter zu schicken."
 ISR_qatari_dollars_no: "Doha ausbooten"
 ISR_qatari_dollars_no_desc: "Wir sollten überhaupt kein Geld nach Gaza fließen lassen. Zumindest nicht mehr, als wir verhindern können."
 ISR_saudi_donations: "Den saudischen Vorschlag annehmen"
 ISR_emirati_donations: "Den emiratischen Vorschlag annehmen"
 ISR_gazan_casinos: "Der Aleman-Vorschlag"
 ISR_gazan_casinos_desc: "Wir sollten versuchen, aus dem Gazastreifen ein neues Las Vegas zu machen. Mögen die Einnahmen fließen und die Stadt gedeihen ..."
 ISR_gazan_port: "Den Hafen von Gaza ausbauen"
 ISR_gazan_port_desc: "Als eine der ersten Stufen eines neuen Entwicklungsplans für Gaza sollten wir einen neuen Hafen in Gaza bauen."
 ISR_gazan_airport: "Einen Flughafen in Gaza errichten"
 ISR_gazan_airport_desc: "Um Gaza auf den neuen Zustrom von Touristen vorzubereiten, müssen wir einen neuen Flughafen schaffen."
 ISR_little_singapore: "Ein kleines Singapur"
 ISR_little_singapore_desc: "Gaza wird das neue kleine Singapur des Nahen Ostens werden."
 ISR_shalit_agreement: "Unseren Jungen nach Hause bringen"
 ISR_shalit_agreement_desc: "Wir sollten einen Vorschlag bezüglich eines israelischen Gefangenen besprechen, der von der Regierung Gazas als Geisel gehalten wird ..."
 ISR_jericho_walls: "Die Mauern von Jericho niederreißen"
 ISR_jericho_walls_desc: "Wir sollten die Mauern von Jericho niederreißen und in Gaza einmarschieren, um diese Plage ein für alle Mal zu beenden ..."
 ISR_operation_sea_of_mercy: "§YOperation Yam HaRakhamim§!"
 ISR_operation_sea_of_mercy_desc: "Unsere Geduld ist zu lange auf die Probe gestellt worden. Die Zeit ist gekommen."
 ISR_jenin_situation: "Operation Shover Galim"
 ISR_jenin_situation_desc: "Wir beginnen eine Operation gegen terroristische Infrastruktur im Westjordanland, und die Regierung hat uns die volle Autorität und alle notwendigen Befugnisse erteilt."
 ISR_daniel_lions_cage: "Daniel in der Löwengrube"
 ISR_daniel_lions_cage_desc: "Palästina ist uns schon zu lange ein Ärgernis. Es ist an der Zeit, die Sache endgültig ein für alle Mal zu regeln."
 ISR_tear_down_oslo: "Die Oslo-Abkommen aufkündigen"
 ISR_tear_down_oslo_desc: "Die Oslo-Abkommen sind nur Fesseln an unseren Händen, die unsere Macht einschränken! Wir müssen dieses dumme Abkommen anprangern und mit entschlossenen Maßnahmen beginnen!"
 ISR_disarm_the_palestinian_forces: "Die Behörde der Fatah entwaffnen"
 ISR_disarm_the_palestinian_forces_desc: "Wir müssen endlich ins Westjordanland einrücken, die Palästinensische Autonomiebehörde entwaffnen und dieser Geschichte ein Ende setzen."
 ISR_strangle_jenin: "Jenin strangulieren"
 ISR_strangle_jenin_desc: "Wir müssen bereit sein, eine begrenzte Operation im Westjordanland durchzuführen, wobei unsere Streitkräfte die Hauptrolle spielen."
 ISR_restore_palestinian_authority: "Ordnung im Westjordanland wiederherstellen"
 ISR_restore_palestinian_authority_desc: "Wir sollten dem Völkerrecht folgen und die Ordnung im Westjordanland wiederherstellen."
 ISR_arm_their_security_services: "Die palästinensischen Sicherheitsdienste bewaffnen"
 ISR_arm_their_security_services_desc: "Palästina hat zugestimmt, mit uns im Kampf gegen den Terror zusammenzuarbeiten. Nun müssen wir ihre Sicherheitsdienste bewaffnen, um eine gemeinsame Operation durchzuführen."
 ISR_restart_negotiations: "Fatah legitimieren"
 ISR_restart_negotiations_desc: "Wir müssen die Fatah legitimieren und unterstützen, da sie die einzige kooperative Regierung Palästinas ist."
 ISR_deligitimize_abbas: "Anti-Abbas-Propaganda"
 ISR_deligitimize_abbas_desc: "Wir müssen Mahmoud Abbas delegitimieren und eine Propagandakampagne gegen ihn starten."
 ISR_deal_with_nablus: "Nablus belagern"
 ISR_deal_with_nablus_desc: "Palästinensische Dschihadisten halten die Kasba von Nablus, wir müssen versuchen, sie zu stürmen und die Terroristen zu fassen."
 ISR_focus_on_the_clusters: "Auf die Blöcke konzentrieren"
 ISR_focus_on_the_clusters_desc: "Wir sollten die Zweistaatenlösung unterstützen und uns auf die Blöcke konzentrieren."
 ISR_the_enclave_settlements: "Das Regulierungsgesetz"
 ISR_the_enclave_settlements_desc: "Wir müssen uns auf die stärker isolierten Siedlungen im Westjordanland konzentrieren und härtere Mittel zur Unterstützung dieser Siedlungen anwenden."
 ISR_yesha_council: "§YDen Yesha-Rat bilden§!"
 ISR_yesha_council_desc: "Der Yesha-Rat ist eine Dachorganisation kommunaler Räte jüdischer Siedlungen im Westjordanland, bekannt unter dem hebräischen Akronym Yesha."
 ISR_settlement_amona: "Amona legalisieren"
 ISR_settlement_amona_desc: "Wir müssen entscheiden, was wir in der Frage der Privatisierung des Landes von Amona tun sollen."
 ISR_settlement_evyatar: "Evyatar verteidigen"
 ISR_settlement_evyatar_desc: "Das Sicherheitsministerium und die Siedler verhandeln über Evyatar. Wir müssen Stellung beziehen und das Problem vielleicht lösen."
 ISR_settlement_homesh: "Die Jeschiwa von Homesh schützen"
 ISR_settlement_homesh_desc: "Nun müssen wir entscheiden, was wir mit der Jeschiwa von Homesh tun."
 ISR_samarian_wine: "Samarischer Wein"
 ISR_samarian_wine_desc: "Shomron ist Israels größte Weinregion und umfasst die Küstengebiete südlich des Hafens von Haifa, einschließlich der Sharon-Ebene, des Karmelgebirges und Ramat Menashe."
 ISR_expand_gush_etzion: "Gush Etzion ausbauen"
 ISR_expand_gush_etzion_desc: "Gush Etzion ist ein Block israelischer Siedlungen in den judäischen Bergen, direkt südlich von Jerusalem und Bethlehem im Westjordanland."
 ISR_ariel_industrial_zone: "Die Industriegebiete von Ariel"
 ISR_ariel_industrial_zone_desc: "Ariel ist eine israelische Siedlung, die als Stadtrat im zentralen Westjordanland organisiert ist, Teil der von Israel besetzten Gebiete, ungefähr 20 Kilometer östlich der Grünen Linie und 34 Kilometer westlich der jordanischen Grenze."
 ISR_edumim_tourist_mall_center: "Ma'ale Adumim Design City"
 ISR_edumim_tourist_mall_center_desc: "Ma'ale Adumim ist eine städtische israelische Siedlung, organisiert als Stadtrat im Westjordanland, sieben Kilometer östlich von Jerusalem."
 ISR_support_our_pmcs: "Unsere PMCs unterstützen"
 ISR_support_our_pmcs_desc: "PMCs haben ihre Zweckmäßigkeit und Nützlichkeit bereits auf der ganzen Welt bewiesen. Wir müssen unsere eigenen PMCs für Verteidigung und Stellvertreterkrieg gegen unsere Gegner aufbauen."
 ISR_keep_them_checked: "Die PMCs in Schach halten"
 ISR_keep_them_checked_desc: "Wir freuen uns, unsere eigenen privaten Militärunternehmen zu haben, aber es ist notwendig, sie sorgfältig unter Kontrolle zu halten, um Aufstände und Unordnung im Militär zu verhindern."
 ISR_jewish_outer_heaven: "Jüdisches Outer Heaven"
 ISR_jewish_outer_heaven_desc: "Die Kontrolle über unsere PMCs wird ihre Lage nur verschärfen. Wenn wir ihnen folgen, machen wir sie weniger unabhängig, und das bedeutet, dass sie an Wirksamkeit verlieren werden."
 ISR_tavor: "TAR-21"
 ISR_tavor_desc: "Das TAR-21 ist ein Modell eines modernen israelischen Sturmgewehrs im Kaliber 5,56x45 mm, hergestellt von Israel Weapon Industries."
 ISR_IWI_com: "IWI"
 ISR_IWI_com_desc: "IWI ist ein israelisches Privatunternehmen, das sich auf die Entwicklung, Produktion und den Verkauf von Rüstungsgütern spezialisiert hat. Das Unternehmen entstand nach der Privatisierung des Magen-Werks, das dem staatlichen Rüstungskonzern Israel Military Industries gehörte. Die Hauptabnehmer seiner Produkte sind die israelischen Nachrichtendienste und die Israelischen Verteidigungsstreitkräfte."
 ISR_fab_defense: "FAB-Defense"
 ISR_fab_defense_desc: "Das israelische Unternehmen FAB-Defense entwickelt und produziert seit 50 Jahren Zubehör und Tuningteile für Handfeuerwaffen und nimmt derzeit eine führende Position auf dem internationalen Markt ein. Bei der Entwicklung seiner Produkte nutzen die Ingenieure des Unternehmens aktiv die Erfahrungen und Wünsche israelischer Sicherheitsbehörden wie Polizei und Armee und arbeiten eng mit SWAT- und Spezialeinheiten auf der ganzen Welt zusammen."
 ISR_ak_alfa: "AK-Alfa-Projekt"
 ISR_ak_alfa_desc: "Durch die Zusammenarbeit mit dem Kalaschnikow-Konzern können wir neue Waffen für unsere Armee schaffen und zugleich von russischen Erfahrungen in der Waffenentwicklung lernen."
 ISR_gideon_plan_idea: "Gideon-Plan"
 ISR_tenufa_project_idea: "Tenufa-Projekt"
 ISR_paphos_drills_1: "Kriegsspiele von Paphos"
 ISR_ak: "AK-Alfa"
 ISR_civillian_exports: "Zivile Exporte"
 ISR_civillian_exports_desc: "Wir müssen einen Teil unserer Waffen auf den zivilen Markt exportieren. Das wird uns langfristig viele Einnahmen bringen."
 civ_guns_exports: "Zivile Waffenexporte"
 ISR_Labour: "Die Avoda"
 ISR_barak_tree: "Ehud Barak"
 ISR_dawn_of_a_new_day: "Der Beginn eines neuen Tages"
 ISR_dawn_of_a_new_day_desc: "Das neue Jahrtausend hat begonnen und wir sollten uns mit den Problemen der Vergangenheit befassen, um zu sehen, was die Zukunft bringt. Wir haben den Südlibanon bereits eine Zeit lang besetzt gehalten – nun müssen wir über das Schicksal dieser Initiative entscheiden."
 ISR_south_lebanon_repatriation_act: "Gesetz zur Rückführung libanesischer Soldaten"
 ISR_south_lebanon_repatriation_act_desc: "Da wir gewissen Einfluss auf Frankreich haben und der Libanon eine ehemalige französische Kolonie ist, könnten wir erreichen, dass libanesische Soldaten dorthin umsiedeln."
 ISR_south_lebanon_fighters_act: "Gesetz für Kämpfer aus dem Südlibanon"
 ISR_south_lebanon_fighters_act_desc: "Wir sollten libanesischen Christen ermöglichen, nach Israel zu migrieren, falls sie im Falle einer Machtübernahme durch die Hisbollah Verfolgung fürchten."
 ISR_herzog_declaration: "Die Herzog-Erklärung"
 ISR_herzog_declaration_desc: "Unsere Regierung sollte in der Knesset Verhandlungen über einen Truppenabzug aus dem Südlibanon beginnen. Das würde uns Zeit verschaffen, die Öffentlichkeit zu beruhigen."
 ISR_abandon_ansar_prison: "Das Schicksal des Ansar-Gefängnisses"
 ISR_abandon_ansar_prison_desc: "Das Ansar-Gefängnis ist voller Hisbollah-Kämpfer und Terroristen, die wir in den 90er Jahren gefangen genommen haben. Wir müssen entscheiden, was wir mit ihnen tun."
 ISR_withdraw_from_the_security_belt: "Bringt unsere Jungen nach Hause"
 ISR_withdraw_from_the_security_belt_desc: "Wir sollten unsere Truppen nach Hause holen und damit der Forderung unserer Bevölkerung nachkommen."
 ISR_camp_david_2000: "Treffen in Camp David"
 ISR_camp_david_2000_desc: "Die Führungen Palästinas, Israels und der USA haben sich darauf geeinigt, sich in Camp David zu treffen, um die Möglichkeit eines umfassenden Friedensabkommens zu besprechen."
 ISR_talk_to_sharon: "Sharon zur Vernunft bringen"
 ISR_talk_to_sharon_desc: "Wir müssen mit Ariel Sharon sprechen und ihn davon überzeugen, den Tempelberg nicht zu besuchen. Dies ist ein gefährliches Vorhaben, das keine positiven Folgen haben wird."
 ISR_respond_with_caution: "Mit Vorsicht reagieren"
 ISR_respond_with_caution_desc: "Wir müssen auf die jüngsten Unruhen mit Vorsicht reagieren und Sharon möglicherweise für seine Handlungen zur Verantwortung ziehen."
 ISR_dont_show_weakness: "Keine Schwäche zeigen"
 ISR_dont_show_weakness_desc: "Wir dürfen gegenüber inneren Feinden keine Schwäche zeigen. Proteste müssen unterdrückt werden!"
 ISR_get_out_of_the_recession: "Die Rezession überwinden"
 ISR_deris_education_reform: "Aryeh Deris Bildungsreform"
 ISR_sarids_education_reform: "Yosi Sarids Bildungsreform"
 ISR_increase_student_paychecks: "Gesetz zur Unterstützung von Studenten"
 ISR_question_armenia: "Gesetz zur Anerkennung und zum Gedenken an den armenischen Völkermord"
 ISR_toranic_school_system: "Das halachische Schulsystem finanzieren"
 ISR_food_security_checks: "Lebensmittelbeihilfen gewähren"
 ISR_sephardic_history_in_education: "Die Darwish-Schulbücher"
 ISR_meet_with_the_committee: "Treffen mit dem Arabischen Hohen Komitee"
 ISR_meet_with_the_committee_desc: "Nun sollten wir uns mit dem Arabischen Hohen Komitee treffen und die Ergebnisse der Untersuchung besprechen."
 ISR_investigation_october_events: "Eine Untersuchungskommission einrichten"
 ISR_investigation_october_events_desc: "Wir müssen untersuchen, wer hinter den Protesten stand, und Polizeibeamte bestrafen, die sich fehlverhalten haben."
 ISR_2_show_hezbollah: "Merkt euch unsere Worte"
 ISR_taba_conference: "An der Taba-Konferenz teilnehmen"
 ISR_taba_conference_desc: "Die Taba-Konferenz ist ein ägyptischer Versuch, zwischen Israel und den Palästinensern zu vermitteln, um Spannungen zu verringern."
 ISR_sharem_conference: "Den Scharm-Rahmen akzeptieren"
 ISR_the_shohat_plan: "Der Shohat-Plan"
 ISR_tax_the_tase: "Die TASE besteuern"
 ISR_invest_in_tourism: "Auf der Welle des Tourismus reiten"
 ISR_create_better_insurances: "Bessere Versicherungsoptionen schaffen"
 ISR_rewrite_inheritance_laws: "Erbrecht reformieren"
 ishrael.52.t: "Gesetz für Kämpfer aus dem Südlibanon"
 ishrael.53.t: "Israel verabschiedet das Gesetz zur Rückführung und Finanzierung libanesischer Soldaten"
 ishrael.54.t: "Herzog legt der Regierung eine Rückzugserklärung vor"
 ishrael.55.t: "Was soll mit dem Ansar-Gefängnis geschehen?"
 ishrael.56.t: "Die letzten Soldaten verlassen den Sicherheitsgürtel"
 ishrael.57.t: "Die Zionisten geben ihre sogenannte Sicherheitszone auf"
 ishrael.58.t: "Die Knesset debattiert über das Gesetz zur Anerkennung des armenischen Völkermords"
 ishrael.59.t: "Ehud Barak weist israelische Abgeordnete bei der Anerkennung des Völkermords zurück"
 ishrael.6.t: "Die israelische Knesset erkennt den armenischen Völkermord an"
 ishrael.61.t: "Israelische Abgeordnete erkennen die Ereignisse von 1916 als Völkermord an"
 ishrael.62.t: "Barak schlägt ein Dreiertreffen in Camp David vor"
 ishrael.63.t: "Die 21. Sonderwahl zum Premierminister"
 ishrael.63.d: "Nachdem Ehud Barak aus Camp David zurückkehrte und erklärte, es gebe keinen Partner für Verhandlungen, zerbrach seine erst ein Jahr alte Koalition. Die ultraorthodoxe Partei Shas war nur aufgrund von Versprechen bezüglich des Bildungssystems in die Regierung eingetreten, doch Streitigkeiten zwischen Bildungsminister Yosi Sarid und seinem stellvertretenden Minister von Shas, Naharri, führten dazu, dass sie die Koalition verließen, während der Premierminister seine Reise nach Camp David vorbereitete. Gleichzeitig erklärte die Partei Meretz unter Sarid, sie werde nur solange Teil der Koalition bleiben, wie die Friedensverhandlungen andauern – Baraks Scheitern in Camp David führte jedoch auch zu ihrem Austritt. Barak blieb letztlich nichts anderes übrig, als Neuwahlen zur Bestätigung des Amtes des Premierministers auszurufen, während ein erstarkter Likud drohte, den Mann zu stürzen, der den \"Beginn eines neuen Tages\" versprochen hatte, aber vor allem die Schrecken der Intifada ins Herz Israels brachte."
 ishrael.63.a: "Barak das Vertrauen geben, seine Amtszeit zu beenden."
 ishrael.63.b: "Likud mit der Stabilisierung der Situation betrauen."
 ishrael.63.c: "Benjamin Netanyahu erneut zum Premierminister wählen."
 ishrael.7.t: "Shas verlässt Ehud Baraks Regierungskoalition"
 ishrael.71.t: "Netanyahus Debatten vor den Vorwahlen"
 ishrael.71.a: "Netanyahu kandidiert und erhält problemlos die Nominierung."
 ishrael.71.b: "Netanyahu verzichtet auf die Nominierung und ermöglicht Sharon den Sieg."
 ishrael.15.t: "Arabische Reaktion auf Sharons Besuch am Tempelberg"
 ishrael.15.d: "Nach Sharons Besuch am Tempelberg sind mehrere arabische Staaten empört. Insbesondere Tunesien, Oman, Bahrain, Katar und Marokko haben eine Lockerung der diplomatischen Beziehungen angekündigt, was uns auf der regionalen Bühne noch stärker isolieren dürfte."
 ishrael.15.a: "Verdammt!"
 ishrael.151.t: "Sharons Besuch am Tempelberg"
 ishrael.151.d: "Der israelische Politiker Ariel Sharon hat den Tempelberg besucht, eine heilige Stätte in Jerusalem. Diplomaten aus mehreren Staaten des Nahen Ostens haben diese Entscheidung verurteilt und diplomatische Konsequenzen angekündigt sowie uns dazu aufgefordert, dasselbe zu tun."
 ishrael.151.a: "Es scheint, als hätten wir keine andere Wahl."
 ishrael.152.t: "Sharons Besuch am Tempelberg"
 ishrael.152.d: "Der israelische Politiker Ariel Sharon hat den Tempelberg besucht, eine heilige Stätte in Jerusalem. Diplomaten aus mehreren Staaten des Nahen Ostens haben diese Entscheidung verurteilt und diplomatische Konsequenzen angekündigt sowie uns dazu aufgefordert, ebenfalls zu reagieren. Wir könnten entweder die Beziehungen vollständig abbrechen oder zumindest einen Rest an Beziehungen aufrechterhalten."
 ishrael.152.a: "Unsere Handelsabkommen beibehalten."
 ishrael.152.b: "Unerhört!"
 ishrael.155.t: "Israel hebt den Status quo an der Al-Aqsa-Moschee auf"
 ishrael.156.t: "Jüdische Siedler beten auf dem Tempelberg"
 ishrael.157.t: "Israel annulliert unsere Rechte an der Al-Aqsa-Moschee"
 ishrael.158.t: "Israel weist den jordanischen Waqf von der Al-Aqsa-Moschee aus"
 ishrael.159.t: "Itamar Ben-Gvir stellt unsere Souveränität infrage!"
 ishrael.16.t: "Israels Führung bekräftigt Ansprüche auf das Gelobte Land"
 ishrael.161.t: "Erinnerung an Gottes Versprechen an Abraham"
 ishrael.162.t: "Die Kaplan-Prozesse"
 israel_economy.62.t: "Israel bittet um Zugang für Spionageoperationen"
 israel_economy.62.d: "Israelische Beamte sind kürzlich mit dem Vorschlag einer geheimen Zusammenarbeit zwischen unserem Land und Israel an uns herangetreten. Sie schlagen ein heikles Abkommen vor, das Mossad-Agenten, die in den Iran eindringen, in unserem Land einen sicheren Zufluchtsort bieten würde. Sollten wir zustimmen?"
 israel_economy.62.a: "Ja"
 israel_economy.62.b: "Nein"
 israel_economy.63.t: "Sie haben unser Angebot angenommen!"
 israel_economy.63.d: "Der Mossad wird unser Territorium nun als Ausgangsbasis für Operationen im Iran nutzen."
 israel_economy.63.a: "Großartig!"
 israel_economy.64.t: "Sie haben unser Angebot abgelehnt!"
 israel_economy.64.d: "Sie wollen mit solchen Plänen nichts zu tun haben."
 israel_economy.64.a: "Bedauerlich."
 israel.1.t: "Israelische Soldaten reisen nach ihrem Dienst nach Indien"
 israel.1.d: "Israel und Indien haben ein bedeutendes Abkommen geschlossen, das israelischen Soldaten nach Abschluss ihres Wehrdienstes Reisen nach Indien ermöglicht. Ziel ist es, den kulturellen Austausch zu fördern und die bilateralen Beziehungen zu stärken. Das Abkommen erlaubt israelischem Militärpersonal nach dem Ende ihres Dienstes, Indien zu Freizeit- und Bildungszwecken zu besuchen, und unterstreicht das Engagement beider Länder, den Tourismus zu fördern und ihre Beziehungen über die militärische Zusammenarbeit hinaus zu vertiefen. Dieser Schritt stellt einen wichtigen Meilenstein für die Stärkung der diplomatischen und wirtschaftlichen Beziehungen dar und zeigt das gemeinsame Bestreben beider Staaten nach gegenseitigem Verständnis und Zusammenarbeit in verschiedenen Bereichen."
 israel.1.a: "Großartig!"
 ISR_strategy: "Für immer das Schwert verschlingen"
 ISR_strategy_desc: "Als König Saul den jungen David bis in eine Höhle bei Ein Gedi verfolgte, fragte Sauls Heerführer Abner Joab ben Zeruja: „Soll das Schwert ewig wüten?“ Die Zeit zeigte, dass es so sein würde. Jerusalem, die Stadt, die Joab für König David eroberte, ist heute das Herz eines Staates, der von Geiern umkreist wird. Daher werden wir stets mit gezücktem Schwert bereitstehen und bei jeder erkennbaren Bedrohung zuerst zuschlagen."
 ACCEPTED_GOLAN: "Wenn diese Option gewählt wird und beide Seiten dem Friedensabkommen zustimmen: Der Staat Golanhöhen erhält zusätzlich 14.000 Einwohner, während der Staat Galiläa 14.000 Einwohner verliert. Israelische Kernstaaten in Syrien gehen verloren und Syrien erhält den Staat Golan. Der Siegpunkt im Golan wird Quneitra heißen und einen Wert von 5 Siegpunkten erhalten. Der Staat wird in Jawlan umbenannt.\n"
 REJECTED_GOLAN: "Wenn diese Option gewählt wird und beide Seiten dem Friedensabkommen zustimmen: Israelische Kernstaaten in Syrien gehen verloren und Syrien erhält den Staat Golan. Der Siegpunkt im Golan wird Quneitra heißen und einen Wert von 5 Siegpunkten erhalten. Der Staat wird in Jawlan umbenannt."
 ACCEPTED_GALILEE: "Wenn diese Option gewählt wird und beide Seiten dem Friedensabkommen zustimmen: Der Golan erhält einen Infrastrukturbonus.\n"
 NEUTRAL_GALILEE: "Wenn diese Option gewählt wird, erhält die Provinz nördlich von Afula 2 zusätzliche Siegpunkte.\n"
 REJECTED_GALILEE: "Wenn diese Option gewählt wird und beide Seiten dem Friedensabkommen zustimmen: Galiläa erhält einen Infrastrukturbonus.\n"
 ACCEPTED_HERMON: "Wenn diese Option gewählt wird und beide Seiten dem Friedensabkommen zustimmen: Ein Siegpunkt mit einem Wert von 5 namens „Jabal al-Sheikh“ wird hinzugefügt.\n"
 REJECTED_HERMON: "Wenn diese Option gewählt wird und beide Seiten dem Friedensabkommen zustimmen: Israel erhält militärischen Zugang zu Syrien, und Syrien kann diesen nicht widerrufen, solange kein Krieg zwischen beiden ausbricht.\n"
 ACCEPTED_GOLANS: "Wenn diese Option gewählt wird und beide Seiten dem Friedensabkommen zustimmen: Der Golan wird nach der Übergabe an Syrien demilitarisiert.\n"
 NEUTRAL_TIES_GOLAN: "Wenn diese Option gewählt wird und beide Seiten dem Friedensabkommen zustimmen: Keine Auswirkungen.\n"
 ACCEPTED_SYRIA: "Wenn diese Option gewählt wird, wird der syrische Einfluss auf die Hisbollah deutlich reduziert, jeglicher iranischer und Hisbollah-Einfluss auf Syrien entfernt, die Beziehungen zwischen Syrien und Hisbollah sowie Syrien und Iran verschlechtert, während sich die Meinung der USA über Syrien verbessert.\n"
 REJECTED_SYRIA: "Wenn diese Option gewählt wird und beide Seiten dem Friedensabkommen zustimmen: Keine Auswirkungen.\n"
 ACCEPTED_ELI_COHAN: "Wenn diese Option gewählt wird und beide Seiten dem Friedensabkommen zustimmen: Israel erhält gegenüber Syrien den Meinungsmodifikator „Weigerung, Eli Cohen zurückzugeben“.\n"
 REJECTED_ELI_COHAN: "Wenn diese Option gewählt wird und beide Seiten dem Friedensabkommen zustimmen: Israel erhält einen Bonus auf politische Macht und einen Meinungsbonus gegenüber Syrien „Eli Cohen zurückgegeben“.\n"
 REJECTED_GOLANS: "Wenn diese Option gewählt wird und beide Seiten dem Friedensabkommen zustimmen: Galiläa wird demilitarisiert.\n"
 US_HEIGHTS: "[USA.GetLeader]-Höhen"
 israel_news.1.t: "Angriff auf mutmaßliches Nuklearziel in Syrien"
 israel_news.1.d: "Mehr als siebzehn Tonnen Bomben wurden spät in der Nacht über einer militärischen Anlage namens „Bustan“ südöstlich von Deir ez-Zor im Nordosten Syriens abgeworfen, direkt am Euphrat. Während zahlreiche Möglichkeiten über den möglichen Urheber des Angriffs diskutiert werden, verweisen westliche Analysten auf Israel als wahrscheinlichsten Akteur. Geheimdienstberichte deuten darauf hin, dass es sich bei der Anlage tatsächlich um einen Reaktor eines angeblich geheimen syrischen Atomprogramms handelt, der mit nordkoreanischer Hilfe errichtet wurde. Ob diese Berichte zutreffen und in welchem Ausmaß die US-Regierung über den Angriff informiert war, bleibt unklar. Während [SYR.GetLeader] schnell versucht, sämtliche Hinweise auf ein Atomprogramm zu beseitigen, ist eines klar – sechsundzwanzig Jahre nachdem Israel das erste Atomprogramm des Irak zerstörte, wird die Begin-Doktrin weiterhin von israelischen Entscheidungsträgern verfolgt."
 israel_news.1.o1: "Mission erfüllt!"
 israel_news.1.o2: "Die Zionisten können sich Geschichten ausdenken, so viel sie wollen."
 israel_news.1.o3: "Israels nationale Sicherheit wurde geschützt."
 israel_news.1.o4: "Ein weiterer Versuch, sich nach dem Krieg reinzuwaschen."
 israel_news.1.o5: "Zionistischer Imperialismus schlägt erneut zu."
 israel_news.1.o6: "Eine Botschaft an den Iran."
 israel_news.1.o7: "Schmutzige Geschichten imperialistischer Propaganda!"
 israel_news.2.t: "Die Machtübernahme im Gazastreifen!"
 israel_news.2.d: "Im Gazastreifen hat ein Putsch stattgefunden, der die Hamas – eine Gruppe, die von vielen als islamistisch und extremistisch bezeichnet wird – an die Macht brachte. Auch wenn nicht alle in der Region diese Einschätzung teilen, sorgen sich sowohl die israelische als auch die palästinensische Regierung sowie die internationale Gemeinschaft über die Situation und die Zukunft der Region.\nSteht ein neuer Krieg bevor?"
 israel_news.2.o1: "Ein beispielloser Moment."
 israel_news.3.t: "Der Vertrag von Dschidda"
 israel_news.3.d: "Seit der Unterzeichnung der Abraham-Abkommen mit den Vereinigten Arabischen Emiraten und Bahrain sowie dem geheimen Besuch von [ISR.GetLeader] in Dschidda beim saudischen Kronprinzen fragten sich viele, ob Riad den Weg Abu Dhabis gehen und seine verdeckten Beziehungen zu Israel offenlegen würde. Heute ist es schließlich geschehen. Nachdem [SAU.GetLeader] einem Vertrag im Austausch für amerikanische Sicherheitsgarantien und israelische Zugeständnisse in der Palästinenserfrage zugestimmt hatte, lud [USA.GetLeader] den saudischen Außenminister und den israelischen Premierminister zur Unterzeichnung eines offiziellen Friedensvertrags ein. Dies eröffnet neue Möglichkeiten der Zusammenarbeit angesichts gemeinsamer Bedrohungen im Nahen Osten und des saudischen Wunsches, mithilfe israelischer High-Tech-Investitionen seine Wirtschaft zu diversifizieren."
 israel_news.3.o1: "Der große Preis wurde gewonnen!"
 israel_news.3.o2: "Wir treten in die Fußstapfen unserer Vorfahren."
 israel_news.3.o3: "Wir sind alle Söhne Abrahams."
 israel_news.3.o4: "Unsere größten regionalen Partner – vereint."
 israel_news.3.o5: "Ha! So viel zur Führung der muslimischen Welt..."
 israel_news.3.o6: "Das wird den Nahen Osten erschüttern."
 israel_news.4.t: "[ISR.GetLeader] befiehlt Angriffe auf iranische Nuklearziele"
 israel_news.4.d: "Sirenen, Explosionen, Rauch und abstürzende Flugzeuge – dies waren die Eindrücke, die Millionen Iraner heute Nacht in mehreren Regionen des Landes sahen und hörten. Israel hat – möglicherweise mit militärischer Unterstützung oder zumindest mit Wissen Washingtons – die Islamische Republik mit Dutzenden Flugzeugen der israelischen Luftwaffe angegriffen, die auf die nuklearen Einrichtungen des Landes zielten. Dies dürfte kaum jemanden überrascht haben: Seit Jahrzehnten droht Jerusalem mit militärischen Maßnahmen, um zu verhindern, dass der Iran jemals eine Atomwaffe entwickelt – im Einklang mit der Begin-Doktrin und nach ähnlichen Aktionen gegen Syrien und Irak. Doch dieser Angriff wird nicht ohne Folgen bleiben. Bereits haben Hunderttausende israelische Zivilisten Schutzräume aufgesucht, während Luftabwehrsysteme in höchste Alarmbereitschaft versetzt wurden, vorbereitet auf tausende Raketen, die auf israelische Städte niedergehen könnten."
 israel_news.4.o1: "Wir hatten keine andere Wahl."
 israel_news.4.o2: "Ein verheerender Schlag gegen die Mullahs."
 israel_news.4.o3: "Der Feind meines Feindes ist mein Freund."
 israel_news.4.o4: "Lasst die Zionisten in ihre Schutzräume fliehen!"
 israel_news.4.o5: "Israel und Iran stehen vor dem Krieg."
 israel_news.5.t: "Die Genfer Abkommen"
 israel_news.5.d: "Jahrzehnte sind vergangen, seit israelische und syrische Panzer zuletzt auf den Golanhöhen aufeinandertrafen, und selbst seit der Madrider Konferenz, bei der israelische und syrische Diplomaten erstmals über Frieden verhandelten. Heute wird Geschichte geschrieben. Türkische und amerikanische Diplomaten haben bekannt gegeben, dass ein umfassendes Abkommen zwischen Delegationen aus Damaskus und Jerusalem ausgearbeitet wurde, während Schweizer Regierungsvertreter eine Zeremonie vorbereiten, an der [ISR.GetLeader] und [SYR.GetLeader] teilnehmen werden. Der Vertrag sieht hauptsächlich vor, dass Israel sich weitgehend aus den während des Sechstagekriegs eroberten Gebieten zurückzieht, während Syrien seine besonderen Beziehungen zu Akteuren aufgibt, die Israels Zerstörung anstreben. Gleichzeitig soll eine vollständige Normalisierung der Beziehungen und ein Austausch von Botschaftern erfolgen."
 israel_news.5.o1: "Der Friedensvertrag ist endlich unterzeichnet!"
 israel_news.5.o2: "Unsere Bemühungen haben Früchte getragen."
 israel_news.5.o3: "Al-Jawlan ist endlich zurück."
 israel_news.5.o4: "Verräter, Verräter, Verräter!"
 israel_news.5.o5: "Ein historischer Moment."
 israel_news.6.t: "Die Allianz des östlichen Mittelmeers"
 israel_news.6.d: "Der Wettlauf um die Kontrolle über die neu entdeckten Gasfelder im östlichen Mittelmeer hat zu neuen Bündnissen in der Region geführt. Höhepunkt dieser Entwicklung ist der kürzlich in Larnaka unterzeichnete Vertrag zwischen [ISR.GetLeader], [CYP.GetLeader] und [GRE.GetLeader]. Griechenland, lange als einer der kritischsten Staaten gegenüber Israel in der Palästinafrage bekannt, hat sich mit Jerusalem verbündet, um eine gemeinsame Front gegen türkische Ansprüche im Mittelmeer zu bilden und israelisches sowie möglicherweise ägyptisches Gas in die Europäische Union zu exportieren. Die Türkei reagierte mit Wut: [TUR.GetLeader] erklärte, nichts werde die Türkei daran hindern, ihre „Blaue Heimat“ zu erreichen, und ordnete die Ausweisung des israelischen Botschafters aus Ankara an. Die Europäische Union unter Führung Frankreichs begrüßte hingegen diese Entwicklungen."
 israel_news.6.o1: "Wir stehen vereint."
 israel_news.6.o2: "Eine geeinte Front gegen die Türkei."
 israel_news.6.o3: "Ein Bündnis aus Plünderern und Verrätern!"
 israel_news.6.o4: "Unsere Türen stehen offen."
 israel_news.6.o5: "Der Wettbewerb eskaliert."
 israel_news.7.t: "Die Cyrus-Abkommen"
 israel_news.7.d: "Heute wurden in Jerusalem wahrhaft historische Bilder aufgenommen – Bilder, die noch vor wenigen Jahren undenkbar gewesen wären. Diplomaten der provisorischen iranischen Regierung trafen mit einem Direktflug aus Teheran am internationalen Flughafen Ben-Gurion ein. Von dort aus besuchten sie Yad Vashem und begaben sich anschließend zur Knesset, wo ein Vertrag unterzeichnet wurde, der den seit der Islamischen Revolution von 1979 bestehenden Kriegszustand zwischen Israel und Iran beendet. Das Abkommen beinhaltet das Versprechen, keine oppositionellen Gruppen mehr zu unterstützen, sowie die Einrichtung gegenseitiger Botschaften. Nach der zweiten iranischen Revolution, die mit dem Sturz der Mullahs endete, stellt dies einen entscheidenden Schritt zur Wiederherstellung der strategischen Partnerschaft zwischen Iran und Israel aus der Zeit von Reza Schah dar – im Geiste von Cyrus, der die Juden einst aus der babylonischen Gefangenschaft befreite."
 israel_news.7.o1: "Wir kommen mit einem Olivenzweig."
 israel_news.7.o2: "Ein diplomatischer Sieg!"
 israel_news.7.o3: "Im Geiste von Kourosh."
 israel_news.7.o4: "Ein weiterer Schritt zu Frieden im Nahen Osten."
 israel_news.8.t: "Die Nahost-Vertragsorganisation"
 israel_news.8.d: "Schockierende Nachrichten kommen heute aus Israel. In den letzten Jahren haben viele arabische Staaten den Boykott aufgegeben, den die Arabische Liga auf der Khartum-Konferenz gegen Israel beschlossen hatte. Einige haben Israel sogar akzeptiert – zumindest aus wirtschaftlichen Interessen, aus Angst vor einem regionalen Machtvakuum und wegen gemeinsamer globaler Gegner. Heute haben sich diese Beziehungen von bilateralen Kontakten zu einem formellen Bündnis entwickelt, das zwischen [ISR.GetLeader] und zahlreichen arabischen Ministern und Staatsmännern in Tel Aviv unterzeichnet wurde. Ziel dieses Bündnisses ist es, eine strategische und politische Architektur für den Nahen Osten zu schaffen – in einer Zeit, in der die amerikanische Machtprojektion in der Region abnimmt – um gemeinsame Rivalen auszugleichen und das Blutvergießen der vergangenen Jahrzehnte zu beenden. Tatsächlich kann dies auch als amerikanischer Erfolg gesehen werden, der Washington den strategischen Schwerpunktwechsel nach Asien erleichtert, um Pekings Einfluss im Fernen Osten entgegenzuwirken."
 israel_news.8.o1: "Endlich wirklich in der Region akzeptiert."
 israel_news.8.o2: "Was für eine Erleichterung!"
 israel_news.8.o3: "Mögen die Waffen endlich schweigen."
 israel_news.8.o4: "Sie haben sich als schlimmer als die Zionisten erwiesen!"
 israel_news.8.o5: "Eine schockierende Entwicklung."
 israel_news.9.t: "Das Negev-Forum"
 israel_news.9.d: "Im luxuriösen Hotel „Beresheet“ in Mitzpe Ramon, unweit des Grabes von Ben Gurion – dem Gründer des Staates Israel – haben sich mehrere arabische Außenminister zusammen mit dem US-Außenminister und dem israelischen Außenminister versammelt, um eine politische Initiative namens „Negev-Forum“ ins Leben zu rufen. Ziel ist es, die Zusammenarbeit in Bereichen wie Klimawandel, Terrorismusbekämpfung, Landwirtschaft, Infrastruktur, Hochtechnologie und Wasserentsalzung zu bündeln. Die Außenminister beschlossen, das Forum jährlich an wechselnden Wüstenorten abzuhalten. Viele Beobachter sehen darin den nächsten Schritt der Abraham-Abkommen: den Übergang von bloßer Normalisierung hin zu einer echten Allianz zwischen Israel und mehreren moderaten sunnitisch-arabischen Staaten. Ob daraus eine militärische Allianz entsteht, bleibt unklar – doch es ist ein historischer Schritt für Israels Bemühungen, seine Zukunft im Nahen Osten zu sichern."
 israel_news.9.o1: "Die Wüste zum Blühen bringen."
 israel_news.9.o2: "Ein historischer Schritt."
 israel_news.9.o3: "In den Fußstapfen unserer Vorfahren."
 israel_news.9.o4: "Verräter!"
 israel_news.9.o5: "Interessante Entwicklungen."
 israel_news.10.t: "Israel beginnt einen begrenzten Krieg in Syrien"
 israel_news.10.d: "Die Intensivierung des syrischen Bürgerkriegs hat in vielen Gebieten unter Kontrolle der Regierung in Damaskus ein Machtvakuum geschaffen – ein Vakuum, das Teheran zu füllen begann. Während Iran das syrische Regime unterstützte, nutzte es die Gelegenheit, um dauerhaft Hisbollah-Kämpfer sowie andere schiitische Milizen unter Führung der Revolutionsgarden in Syrien zu stationieren. Diese Kräfte sollen iranischen Einfluss ausweiten und als Basis für einen zukünftigen Angriffstag gegen Israel dienen. Laut ausländischen Quellen haben israelische Entscheidungsträger ihren europäischen und amerikanischen Partnern jedoch mitgeteilt, dass Jerusalem nicht tatenlos zusehen könne, wie Syrien zu „einem zweiten Libanon“ wird. Daher würden nun „alle Optionen auf dem Tisch liegen“. Quellen sprechen von einer möglichen Luftkampagne gegen iranische Milizen im ganzen Land, während Ziele des syrischen Regimes bewusst vermieden werden sollen, um nicht als direkte Intervention im Bürgerkrieg wahrgenommen zu werden."
 israel_news.10.o1: "Der syrische Konflikt eskaliert."
 israel_news.10.o2: "Sie werden nicht durchkommen!"
 israel_news.10.o3: "Die zionistische Verschwörung entfaltet sich!"
 israel_news.10.o4: "Was für eine Verletzung der syrischen Souveränität."
 israel_news.10.o5: "Wir werden die Golan-Front eröffnen!"
 israel_news.10.o6: "Wir beobachten die Lage mit Interesse."
 ISR_begin_mabam: "ISRAELMYMAN"
 ISR_arab_diplo_tooltip: "Arabischer Boykott: Der diplomatische Status dieses Landes erlaubt uns, diese Aktion durchzuführen"
 ISR_bruh: "BRUH"
 alice_miller_v_ministry_of_defence: "Alice Miller gegen das Verteidigungsministerium nicht umgesetzt"
 alice_miller_v_ministry_of_defence_desc: "Im April 1994 verklagte die Luftwaffenoffizierin Lt. Alice Miller das Verteidigungsministerium vor dem Obersten Gerichtshof und prangerte die Ungerechtigkeit an, dass die israelische Luftwaffe Frauen nicht erlaubte, sich für die Flugakademie zu bewerben und Pilotinnen zu werden. Der Oberste Gerichtshof entschied im Dezember 1995 zu ihren Gunsten, dennoch blieb die Aufnahme und Ausbildung von Frauen an der Flugakademie begrenzt und wurde unprofessionell gehandhabt."
 daneils_final_prophecy_1: "Daniels letzte Vision"
 daneils_final_prophecy_1_desc: "In der letzten Vision, die Gott ihm gewährte, wurde Daniel ein letzter Krieg zwischen dem König des Nordens und dem König des Südens offenbart – ein Krieg, der die Fähigkeit des jüdischen Volkes prüfen würde, zu erkennen, wer Gottes Diener ist und wer mit Satan verbündet ist, bevor die Endzeit über die Menschheit hereinbricht. Heute befinden wir uns zwischen den wachsenden Chancen einer Zusammenarbeit mit dem chinesischen Riesen und dem Misstrauen unserer größten Verbündeten in Washington. Die Entscheidung, wem wir vertrauen, liegt bei uns."
 daneils_final_prophecy_2: "Daniels letzte Vision"
 daneils_final_prophecy_2_desc: "In der letzten Vision, die Gott ihm gewährte, wurde Daniel ein letzter Krieg zwischen dem König des Nordens und dem König des Südens offenbart – ein Krieg, der die Fähigkeit des jüdischen Volkes prüfen würde, zu erkennen, wer Gottes Diener ist und wer mit Satan verbündet ist, bevor die Endzeit über die Menschheit hereinbricht. Heute befinden wir uns zwischen den wachsenden Chancen einer Zusammenarbeit mit dem chinesischen Riesen und dem Misstrauen unserer größten Verbündeten in Washington. Die Entscheidung, wem wir vertrauen, liegt bei uns."
 daneils_final_prophecy_3: "Daniels letzte Vision"
 daneils_final_prophecy_3_desc: "In der letzten Vision, die Gott ihm gewährte, wurde Daniel ein letzter Krieg zwischen dem König des Nordens und dem König des Südens offenbart – ein Krieg, der die Fähigkeit des jüdischen Volkes prüfen würde, zu erkennen, wer Gottes Diener ist und wer mit Satan verbündet ist, bevor die Endzeit über die Menschheit hereinbricht. Heute befinden wir uns zwischen den wachsenden Chancen einer Zusammenarbeit mit dem chinesischen Riesen und dem Misstrauen unserer größten Verbündeten in Washington. Die Entscheidung, wem wir vertrauen, liegt bei uns."
 daneils_final_prophecy_4: "Daniels letzte Vision"
 daneils_final_prophecy_4_desc: "In der letzten Vision, die Gott ihm gewährte, wurde Daniel ein letzter Krieg zwischen dem König des Nordens und dem König des Südens offenbart – ein Krieg, der die Fähigkeit des jüdischen Volkes prüfen würde, zu erkennen, wer Gottes Diener ist und wer mit Satan verbündet ist, bevor die Endzeit über die Menschheit hereinbricht. Heute befinden wir uns zwischen den wachsenden Chancen einer Zusammenarbeit mit dem chinesischen Riesen und dem Misstrauen unserer größten Verbündeten in Washington. Die Entscheidung, wem wir vertrauen, liegt bei uns."
 oslo_accords_1: "Die Oslo-Abkommen"
 oslo_accords_1_desc: "Mit der historischen Unterzeichnung im Weißen Haus zwischen Premierminister Yitzhak Rabin und dem Vorsitzenden der Palästinensischen Befreiungsorganisation, Yasser Arafat, im September 1993 akzeptierte Israel die Schaffung einer von der PLO geführten Palästinensischen Nationalbehörde in den großen urbanen Gebieten des Westjordanlands und deren Umgebung – als vorübergehende Maßnahme bis zu einem endgültigen Friedensabkommen. Doch wie die Geschichte zeigt, wird alles, was als „vorübergehend“ unterzeichnet wird, irgendwann dauerhaft; und trotz der israelischen Anerkennung der PLO als legitime Vertretung der Palästinenser sowie der palästinensischen Anerkennung des Existenzrechts Israels steht ein endgültiges Friedensabkommen weiterhin aus."
