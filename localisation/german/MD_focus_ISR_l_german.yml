 israel_labour.0.t: "Jugendbewegungen der Arbeiterpartei"
 israel_labour.0.d: "Nun erhält Tzofim mehr Aufmerksamkeit von unserer Regierung. Tzofim ist bekanntermaßen die erste egalitäre Pfadfinderbewegung der Welt, in der Jungen und Mädchen gemeinsam und auf gleicher Grundlage teilnehmen. Sie sind die Zukunft unseres Landes."
 israel_labour.0.a: "In der Tat!"
