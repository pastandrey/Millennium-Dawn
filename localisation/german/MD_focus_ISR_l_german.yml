 israel_economy.213.a: "Wunderbar!"
 israel_economy.214.t: "Israel-Griechenland-Gaspipeline!"
 israel_economy.214.d: "Die Israel-Griechenland-Gaspipeline wird fertiggestellt und schließlich gebaut. Beide Nationen werden erheblich davon profitieren! Alle Kosten werden von Israel getragen."
 israel_economy.214.a: "Wunderbar!"
 israel_economy.215.t: "Israel bietet ein Gaspipeline-Projekt an!"
 israel_economy.215.d: "Israel bietet uns ein neues Gaspipeline-Projekt zwischen uns und Israel an. Sollen wir zustimmen?"
 israel_economy.215.a: "Wo muss ich unterschreiben?"
 israel_economy.215.b: "Nein."
 israel_economy.216.t: "Ägypten stimmt zu!"
 israel_economy.216.d: "Ägypten hat unserem Angebot zugestimmt."
 israel_economy.216.a: "Großartig!"
 israel_economy.217.t: "Ägypten lehnt ab!"
 israel_economy.217.d: "Ägypten hat unser Angebot abgelehnt."
 israel_economy.217.a: "Sehr bedauerlich."
 israel_economy.218.t: "Israel schlägt Operation Olympic Games vor!"
 israel_economy.218.d: "Kürzlich hat sich die israelische Regierung über geheime Kommunikationskanäle an uns gewandt, um eine geheime Sabotagekampagne mittels Cyberstörungen gegen iranische Nuklearanlagen vorzuschlagen. Sollen wir diese Operation unterstützen?"
 israel_economy.218.a: "Cyberspezialisten werden entsandt."
 israel_economy.218.b: "Wir werden daran nicht teilnehmen."
 israel_economy.219.t: "Die USA wollen teilnehmen!"
 israel_economy.219.d: "Die USA werden an der Operation Olympic Games teilnehmen."
 israel_economy.219.a: "Großartig!"
 israel_economy.220.t: "Die USA werden nicht teilnehmen."
 israel_economy.220.d: "Sie sagen, dass dies die Spannungen drastisch erhöhen würde, und daran wollen sie sich nicht beteiligen."
 israel_economy.220.a: "Okay..."
 ISR_olympic_games: "Operation Olympic Games"
 ISR_olympic_games_op: "Operation Olympic Games"
 olymp_games_thr: "Operation Olympic Games"
 israel_mechanic.15.t: "Cyberangriff auf iranische Nuklearanlagen!"
 israel_mechanic.15.d: "Kürzlich wurde eine offensichtliche, aber weiterhin nicht offiziell bestätigte Sabotagekampagne mittels Cyberstörungen gegen iranische Nuklearanlagen durchgeführt. Iran behauptet, dass Israel und die USA dafür verantwortlich seien. Diese Länder haben diese Vorwürfe jedoch nicht bestätigt."
 israel_mechanic.15.a: "Interessant."
 israel_mechanic.16.t: "Gescheiterter Cyberangriff auf iranische Nuklearanlagen!"
 israel_mechanic.16.d: "Kürzlich haben iranische Firewalls einen neuen Cyberwurm entdeckt, der in die Systeme iranischer Nuklearanlagen eingeschleust wurde, um die nukleare Entwicklung Irans zu stören."
 israel_mechanic.17.t: "Unsere Agenten in Teheran!"
 israel_mechanic.17.d: "Unsere Agenten befinden sich in der Nähe des Lagerhauses, in dem sich angeblich das iranische Nukleararchiv befindet. Die Frühschicht der iranischen Wachen würde nach einem Jahr Überwachung des Lagerhauses gegen 7 Uhr morgens eintreffen, und unsere Agenten haben den Befehl, vor 5 Uhr morgens zu verschwinden. Wir müssen schnell handeln und rasch entscheiden, was zu tun ist."
 israel_mechanic.17.a: "Nehmt Schneidbrenner und schneidet die Safes auf."
 israel_mechanic.17.b: "Nehmt C4 und sprengt den Eingang schnell auf."
 israel_mechanic.1711.t: "Explosion am Stadtrand von Teheran"
 israel_mechanic.1711.d: "Unsere internen Quellen übermitteln uns eine Nachricht über eine Explosion in der Nähe des Lagerhauses, in dem wir unser Nukleararchiv aufbewahren."
 israel_mechanic.1711.a: "Schickt die Wachen!"
 israel_mechanic.18.t: "Operation erfolgreich!"
 israel_mechanic.18.d: "Unsere Agenten haben das iranische Nukleararchiv erfolgreich geborgen. Als die iranischen Aufseher eintrafen, war sofort klar, dass jemand einen großen Teil des geheimen Nukleararchivs des Landes gestohlen hatte, das jahrelange Arbeit an Atomwaffen, Sprengkopfkonstruktionen und Produktionsplänen dokumentierte."
 israel_mechanic.18.a: "Wunderbar!"
 israel_mechanic.1811.t: "Unser Nukleararchiv wurde gestohlen!"
 israel_mechanic.1811.d: "Mossad-Agenten haben unser Nukleararchiv gestohlen und nun besitzt Israel all unsere Pläne und Forschungsunterlagen zu unseren Nuklearprojekten."
 israel_mechanic.1811.a: "Verdammt!"
 israel_mechanic.19.t: "Operation fehlgeschlagen!"
 israel_mechanic.19.d: "Unsere Agenten wurden gefasst und werden vom iranischen Innenministerium verhört. Es gelang ihnen nicht, die Dokumente vor ihrer Festnahme zu übermitteln."
 israel_mechanic.19.a: "Oh, sch..."
 israel_mechanic.1911.t: "Israelische Agenten gefasst!"
 israel_mechanic.1911.d: "Kürzlich wurden israelische Agenten am Stadtrand von Teheran gefasst, als sie versuchten, unser Nukleararchiv zu stehlen. Diese Agenten werden festgehalten und verhört."
 israel_mechanic.1911.a: "Belohnt unsere Wachen!"
 israel_mechanic.20.t: "Operation ohne eindeutiges Ergebnis!"
 israel_mechanic.20.d: "Unsere Agenten konnten entkommen, jedoch wurde das Gebäude zerstört, und alle Informationen, die wir hätten erhalten können, wurden ebenfalls vernichtet."
 israel_mechanic.20.a: "Nun ja..."
 ISR_archive_stolen: "Unser Nukleararchiv gestohlen"
 ISR_archive_destroyed: "Zerstörtes Nukleararchiv"
 israel_mechanic.2011.t: "Unser Nukleararchiv wurde zerstört!"
 israel_mechanic.2011.d: "Es scheint, dass Mossad-Agenten die Unterlagen aus unserem geheimen Lagerhaus am Stadtrand von Teheran stehlen wollten, das Gebäude jedoch wegen ihrer Unfähigkeit einfach zerstörten. Wahrscheinlich sind sie bereits aus dem Land geflohen, aber vielleicht ist dieses Ergebnis nicht das schlechteste aller möglichen."
 israel_mechanic.2011.a: "Nun ja..."
 full_blockades_isr: "Boykottiert Israel"
 part_blockades_isr: "Boykottiert Israel teilweise"
 full_isr_boycotte: "§OVollständiger§! §YBoykott§! von [ISR.GetNamewithFlag]"
 full_isr_boycotte_desc: "Die Blockade von [ISR.GetNamewithFlag] durch viele Staaten des Nahen Ostens umfasst verschiedene Formen wirtschaftlicher, diplomatischer und militärischer Beschränkungen.\n\nLänder wie [ROOT.GetNamewithFlag] beteiligen sich an den Bemühungen, [ISR.GetNamewithFlag] zu isolieren, indem sie ihren Luftraum für Flugzeuge aus [ISR.GetNamewithFlag] schließen, Handel verbieten und das Existenzrecht von [ISR.GetNamewithFlag] nicht anerkennen.\n\nSolche Maßnahmen sind Teil einer breiteren Strategie der §7Arabischen Liga§! und sympathisierender Länder des Nahen Ostens, um die Wirtschaft von [ISR.GetNamewithFlag] zu schwächen und seinen regionalen Einfluss einzuschränken. Die Blockade umfasst außerdem den Boykott von Unternehmen, die Geschäfte mit [ISR.GetNamewithFlag] machen, sowie die Unterstützung palästinensischer §8Widerstands§!§Gbewegungen§!."
 pol_isr_boycotte: "§CPolitischer§! §YBoykott§! von [ISR.GetNamewithFlag]"
 pol_isr_boycotte_desc: "Die Blockade von [ISR.GetNamewithFlag] durch viele Staaten des Nahen Ostens umfasst verschiedene Formen wirtschaftlicher, diplomatischer und militärischer Beschränkungen.\n\nLänder wie [ROOT.GetNamewithFlag] beteiligen sich daran, [ISR.GetNamewithFlag] ausschließlich politisch zu isolieren, indem sie mitunter das Existenzrecht von [ISR.GetNamewithFlag] nicht anerkennen, keine Pässe aus [ISR.GetNamewithFlag] akzeptieren und keine direkten politischen Beziehungen unterhalten, dabei aber die Möglichkeit zum Handel aufrechterhalten.\n\nSolche Maßnahmen sind Teil einer breiteren Strategie der §7Arabischen Liga§! und sympathisierender Länder des Nahen Ostens, um die Wirtschaft von [ISR.GetNamewithFlag] zu schwächen und seinen regionalen Einfluss einzuschränken. Die Blockade umfasst außerdem den Boykott von Unternehmen, die Geschäfte mit [ISR.GetNamewithFlag] machen, sowie die Unterstützung palästinensischer §8Widerstands§!§Gbewegungen§!."
 econ_isr_boycotte: "§7Wirtschaftlicher§! §YBoykott§! von [ISR.GetNamewithFlag]"
 econ_isr_boycotte_desc: "Die Blockade von [ISR.GetNamewithFlag] durch viele Staaten des Nahen Ostens umfasst verschiedene Formen wirtschaftlicher, diplomatischer und militärischer Beschränkungen.\n\nLänder wie [ROOT.GetNamewithFlag] beteiligen sich an den Bemühungen, [ISR.GetNamewithFlag] zu isolieren, indem sie ihren Luftraum für Flugzeuge aus [ISR.GetNamewithFlag] schließen, Handel verbieten und sich nicht an Investitionsprojekten beteiligen, während politische Verhandlungen weiterhin möglich bleiben.\n\nSolche Maßnahmen sind Teil einer breiteren Strategie der §7Arabischen Liga§! und sympathisierender §7Nahoststaaten§!, um die Wirtschaft von [ISR.GetNamewithFlag] zu schwächen und seinen regionalen Einfluss einzuschränken. Die Blockade umfasst außerdem den Boykott von Unternehmen, die Geschäfte mit [ISR.GetNamewithFlag] machen, sowie die Unterstützung palästinensischer §8Widerstands§!§Gbewegungen§!."
 ISR_boycott_map: "Länder, die unser Land boykottieren könnten:"
 ISR_juj_map: "Springe auf der Karte zu [ISR.GetNamewithFlag]"
 israel_boycott_arabside_category: "Boykott von [ISR.GetNamewithFlag]"
 israel_boycott_arabside_category_desc: "Unser Land, [ROOT.GetNamewithFlag], kann als muslimisches Land [ISR.GetNamewithFlag] boykottieren, um deren §8wirtschaftliche oder politische Expansion§! zu stoppen, oder den Boykott aufheben, um stärker mit [ISR.GetNamewithFlag] zu kooperieren.\nWenn wir den teilweisen Boykott fortsetzen, werden wir [ISR.GetNamewithFlag] nur in einem bestimmten Bereich §Oeinschränken§! – entweder in den wirtschaftlichen oder in den politischen Beziehungen zu uns.\nWenn wir uns dafür entscheiden, Israel §Rvollständig zu boykottieren§!, werden wir keinerlei diplomatische oder wirtschaftliche Beziehungen zu [ISR.GetNamewithFlag] unterhalten können."
 stop_boyc_me: "Den Boykott §Ybeenden§!"
 strict_the_boyc: "Den Boykott §Overschärfen§!"
 leave_the_boyc: "Den Boykott vollständig §7aufgeben§!"
 aband_boyc: "Den Boykott aufgegeben"
 decreses_boyc_tt: "§YDies wird den Boykott des betroffenen Landes oder der betroffenen Länder verringern!§!"
 israel_economy.221.t: "[FROM.GetNamewithFlag] hat beschlossen, den Boykott zu beenden!"
 israel_economy.221.d: "Kürzlich hat die Regierung von [FROM.GetNamewithFlag] beschlossen, den Boykott gegen unser Land zu beenden. Alle notwendigen Beziehungen werden wiederhergestellt. Sie sagen jedoch, dass sie uns wieder boykottieren könnten, falls unsere Politik negative Auswirkungen auf sie oder die Region haben sollte."
 israel_economy.221.a: "Großartig!"
 israel_economy.222.t: "[FROM.GetNamewithFlag] hat beschlossen, den Boykott zu verschärfen!"
 israel_economy.222.d: "Kürzlich hat die Regierung von [FROM.GetNamewithFlag] beschlossen, den Boykott gegen unser Land zu verschärfen. Viele Verbindungen zu ihnen sind nun unterbrochen. Sie sagen jedoch, dass sie den Boykott wieder lockern könnten, falls unsere Politik positive Auswirkungen auf sie oder die Region haben sollte."
 israel_economy.222.a: "Tja!"
 israel_economy.223.t: "[FROM.GetNamewithFlag] hat beschlossen, den Boykott vollständig aufzugeben!"
 israel_economy.223.d: "Kürzlich hat die Regierung von [FROM.GetNamewithFlag] beschlossen, den Boykott gegen unser Land für immer aufzugeben. Alle notwendigen Beziehungen werden wiederhergestellt und ihr Fortbestand garantiert. Das bedeutet nicht, dass sie jegliche Feindseligkeit unsererseits dulden würden, aber der Geist der Freundschaft in unseren Beziehungen ist nun deutlich erkennbar."
 israel_economy.223.a: "Großartig!"
 Cat_GENES: "Genforschung"
 israel.5.t: "Gemeinsame Übungen der USA und Israels!"
 israel.5.d: "Kürzlich haben unsere Streitkräfte gemeinsam mit [ISR.GetNamewithFlag] Militärübungen durchgeführt, wodurch beide Länder mehr Erfahrung in urbaner Kriegsführung, Koordination und Logistik gewonnen haben."
 israel.5.a: "Großartig!"
 will_appear_after_dec_tt: "§YDie Wirkung dieses Schwerpunktes tritt ein, nachdem wir entschieden haben, welchen Militärplan wir verwenden sollen!§!"
 golan_fort_tt: "§YFügt an der Grenze zu Hisbollah und Syrien Landfestungen der Stufe 2 hinzu!§!"
 israel.6.t: "Gemeinsame Übungen von Zypern und Israel!"
 israel.6.d: "Kürzlich haben unsere Streitkräfte gemeinsam mit [ISR.GetNamewithFlag] Militärübungen durchgeführt, wodurch beide Länder mehr Erfahrung in Gebirgskrieg, Koordination und Logistik gewonnen haben."
 israel.6.a: "Großartig!"
 israel.7.t: "Israel will unsere Flugzeuge kaufen"
 israel.7.d: "Israel möchte mehrere Dutzend unserer Schulflugzeuge für seine Armee und die IDF kaufen. Stimmen wir zu?"
 israel.7.a: "Sicher."
 israel.7.b: "Nein."
 israel.8.t: "Deutschland hat zugestimmt"
 israel.8.d: "Deutschland hat die Lieferung seiner Schulflugzeuge an uns offiziell genehmigt. Die erste Charge Flugzeuge wird bald in unserem Land eintreffen."
 israel.8.a: "Großartig."
 israel.9.t: "Deutschland hat uns abgelehnt"
 israel.9.d: "Deutschland hat unser Angebot zum Kauf seiner Schulflugzeuge abgelehnt. Offenbar müssen wir uns einen anderen verlässlichen Lieferanten suchen."
 israel.9.a: "Schade."
 israel.10.t: "Israel will eine Charge unserer Flugzeuge kaufen"
 israel.10.d: "Israel bittet um unsere F-35 für seine Luftregimenter. Diese Flugzeuge gehören zu den modernsten überhaupt, doch mit ihnen können wir unseren Einfluss im Nahen Osten und in Israel vergrößern. Sollen wir sie verkaufen?"
 israel.10.a: "Sicher."
 israel.10.b: "Nein."
 israel.11.t: "Amerika hat dem Verkauf der F-35 zugestimmt"
 israel.11.d: "Amerika hat dem Verkauf seiner neuesten Flugzeuge an uns zugestimmt. Mit ihrer Hilfe werden wir in der Lage sein, in unserer Region Luftüberlegenheit zu erlangen. Die erste Charge Flugzeuge ist bereits in unserem Land eingetroffen."
 israel.11.a: "Großartig."
 israel.12.t: "Amerika hat abgelehnt"
 israel.12.d: "Amerika hat sich geweigert, uns seine Flugzeuge zu liefern. Sie wollen nicht, dass ihre Flugzeuge in die falschen Hände geraten. Wir müssen einen neuen Lieferanten moderner Kampfjets finden."
 israel.12.a: "Schade."
 ISR_modernization_of_armored_forces_idea: "Modernisiertes Panzerkorps"
 ISR_ger_fleet_tt: "Wir werden eine Anfrage an §Y[GER.GetNamewithFlag]§! senden, um §Y5 deutsche U-Boote§! für 6 Milliarden Dollar zu kaufen."
 ISR_ger_fleet_again_tt: "Wir werden erneut eine Anfrage an §Y[GER.GetNamewithFlag]§! senden, um §Y5 deutsche U-Boote§! für 6 Milliarden Dollar zu kaufen.\nAllerdings könnte das §YEstablishment§! §Rskeptisch§! sein, denselben Deal noch einmal durchzuführen."
 ISR_GER_agree_to_sell_tt: "Wir stimmen zu, §Y5 U-Boote§! für 6 Milliarden Dollar zu bauen"
 ISR_ITA_agree_to_sell_tt: "Wir stimmen zu, §Y3 unserer Fregatten§! für 6 Milliarden Dollar zu bauen"
 ISR_FRA_agree_to_sell_tt: "Wir stimmen zu, §Y1 Flugzeugträger§! für 8 Milliarden Dollar zu bauen"
 israel.13.t: "[ISR.GetNamewithFlag] hat einen interessanten Vorschlag gesendet"
 israel.13.d: "Eine Delegation aus [ISR.GetNamewithFlag] ist mit einem interessanten Vorschlag in unserem Land eingetroffen. Sie bieten an, einige Schiffe für sie zu bauen – im Austausch gegen viel Geld."
 israel.13.a: "Machen wir das!"
 israel.13.b: "Unsere Flotte ist keine Ware, die man verkauft."
 israel.14.t: "[FROM.GetNamewithFlag] stimmt zu!"
 israel.14.d: "[FROM.GetNamewithFlag] stimmt unserem Vorschlag zu, einige Schiffe für uns zu bauen!"
 israel.14.a: "Großartig!"
 israel.15.t: "[FROM.GetNamewithFlag] lehnt ab!"
 israel.15.d: "[FROM.GetNamewithFlag] lehnt unseren Vorschlag ab, einige Schiffe für uns zu bauen!"
 israel.15.a: "Verdammt!"
 madan_idea: "Israelische Marineaufklärungsabteilung"
 ISR_air_reservists_idea: "Reservistenstrategie"
 ISR_air_profs_idea: "Berufspiloten"
 cheap_solut_tt: "§YDieser Schwerpunkt§! ist §Ggünstiger§! und benötigt §Gkeine§! Zustimmung der §4Knesset§!!"
 ISR_intelligence_lahak: "Der Aufklärungs-Lahak"
 ISR_idid_rest: "IDI-Dominanz"
 kirya_ontop: "Kirya-Dominanz"
 gilot_ontop: "Gilot-Dominanz"
 kirya_gilot_middle: "Gleichgewicht zwischen Kirya und Gilot"
 israel.16.t: "Raumflug STS-107, Space Shuttle Columbia"
 israel.16.d: "Der Raumflug STS-107 ist startbereit. Mehrere Jahre lang haben israelische und US-amerikanische Astronauten für diesen Flug trainiert. Die Menschen unserer Nationen erwarten den Start mit Spannung.\nSTS-107 Columbia ist als 16-tägiger Flug mit einer speziellen Wissenschafts- und Forschungsmission geplant. Wenn der Flug §Gerfolgreich§! verläuft, erhalten wir und [ISR.GetNamewithFlag] einen Forschungsbonus für Raketen. Sollen wir den Start durchführen?"
 israel.16.a: "Natürlich!"
 israel.16.b: "Den Start absagen."
 israel.17.t: "STS-107 ist gestartet!"
 israel.17.d: "STS-107 Columbia ist als 16-tägiger Flug mit einer speziellen Wissenschafts- und Forschungsmission geplant. Allerdings wurde die linke Flügelkante des Shuttles beim Start von Trümmern des externen Tanks getroffen. Hoffen wir, dass alles gut geht..."
 israel.17.a: "Viel Glück"
 israel.18.t: "Der Start von STS-107 wurde abgesagt!"
 israel.18.d: "Die NASA hat beschlossen, den Start wegen Sicherheitsproblemen und anderer Bedenken abzusagen. Ilan Ramon wird nach Israel zurückkehren."
 israel.18.a: "Sehr bedauerlich."
 israel.19.t: "STS-107 bereitet die Rückkehr vor!"
 israel.19.d: "STS-107 bereitet sich auf die Rückkehr zur Erde vor. Hoffen wir, dass die Schäden am Shuttle die Landung nicht beeinträchtigen werden."
 israel.19.a: "Möge Gott sie beschützen..."
 israel.20.t: "Katastrophe des Space Shuttle Columbia!"
 israel.20.d: "Das Space Shuttle Columbia zerbrach beim Wiedereintritt in die Atmosphäre über Texas und Louisiana, wobei alle sieben Astronauten an Bord ums Leben kamen. Es war die zweite Space-Shuttle-Mission, die in einer Katastrophe endete, nach dem Verlust der Challenger und ihrer Besatzung im Jahr 1986.\nVor dem Wiedereintritt hatte das NASA-Management die Untersuchung eingeschränkt, da man davon ausging, dass die Besatzung das Problem selbst bei Bestätigung nicht hätte beheben können. Als Columbia wieder in die Erdatmosphäre eintrat, drangen durch den Schaden heiße atmosphärische Gase in den Hitzeschild ein und zerstörten die innere Flügelstruktur, wodurch der Orbiter instabil wurde und auseinanderbrach."
 israel.20.a: "Wir trauern um ihren Verlust."
 israel.21.t: "STS-107 erfolgreich gelandet!"
 israel.21.d: "Trotz der Schäden am Shuttle konnte die Besatzung sicher auf der Erde landen. Sämtliche Forschungsmaterialien wurden erfolgreich geborgen!"
 israel.21.a: "Großartig!"
 isr_usa_flight_tt: "Wir werden §G10 Milliarden Dollar§! ausgeben, wenn [USA.GetNamewithFlag] dem gemeinsamen Flug zustimmt.\nEs gibt eine §Y50%ige Chance§!, dass der Flug §Rfehlschlägt§!.\nFalls der Flug §Gerfolgreich§! verläuft, erhalten wir und [USA.GetNamewithFlag] einen Forschungsbonus für Raketen."
 israel.22.t: "Beresheet erreicht den Mond!"
 israel.22.d: "Beresheet1 ist eine private Mondmission der israelischen Non-Profit-Organisation SpaceIL. Beresheet1 sollte mehr Israelis dazu inspirieren, einen MINT-Beruf zu ergreifen. Beresheet1 erreichte erfolgreich den Mond, stürzte jedoch bei der Landung ab."
 israel.22.a: "Interessant!"
 ISR_sion_production: "Fortgeschrittene Drohnenproduktion"
 israel_mechanic.21.t: "Vorbereitung des Attentats..."
 israel_mechanic.21.d: "Unser Hauptquartier hat heute ein Treffen über unseren Plan zur Beseitigung des Hamas-Führers vorbereitet. Uns wurden zwei Möglichkeiten aufgezeigt. Unsere Agenten können den Aufenthaltsort des Feindes verfolgen, einen improvisierten Sprengsatz in seinem Hotelzimmer anbringen und ihn zünden, sobald er dort eintrifft. Oder wir könnten, falls wir dazu in der Lage sind, eine Rakete aus Irakisch-Kurdistan abfeuern. Was sollen wir tun?"
 israel_mechanic.21.a: "Platziert die Bombe!"
 israel_mechanic.21.b: "Setzt die Raketen ein."
 israel_mechanic.22.t: "Ermordung des Anführers von [HAM.GetNamewithFlag]!"
 israel_mechanic.22.d: "[HAM.GetLeader], Chef des Politbüros von [HAM.GetNamewithFlag], wurde bei einem israelischen Schlag getötet. Arabischsprachige Medien berichteten, dass der Angriff auf die Residenz von [HAM.GetNamewithFlag] durch eine Rakete durchgeführt wurde, die von außerhalb des Iran abgeschossen wurde. Gleichzeitig befand sich der Führer des Palästinensischen Islamischen Dschihad, Ziyad al-Nakhala, auf einer anderen Etage desselben Gebäudes und wurde nicht verletzt, was Zweifel an der Glaubwürdigkeit dieser Informationen aufwirft."
 israel_mechanic.22.a: "Hm."
 israel_mechanic.23.t: "Gescheiterte Ermordung des Anführers von [HAM.GetNamewithFlag]!"
 israel_mechanic.23.d: "Kürzlich ereignete sich im Iran ein Terroranschlag, als [HAM.GetLeader], der Führer von [HAM.GetNamewithFlag], den Iran besuchte. Der Attentatsversuch scheiterte jedoch, und [HAM.GetLeader] überlebte. Iranische Offizielle behaupten nun, dies sei eine gefährliche Provokation israelischer Terroristen, die versuchen, die Achse des Widerstands zu destabilisieren."
 israel_mechanic.23.a: "Interessant."
 wesill_be_creful2_tt: "Unsere §4Mossad§!-Agenten werden [PER.GetNamewithFlag] über den §YSüdkaukasus§! betreten und versuchen, den §GFührer von [HAM.GetNamewithFlag] zu ermorden§!. Wir müssen §Yvorsichtig§! sein, welche Befehle wir erteilen."
 israel_lebanon_occup_category: "Sicherheitsgürtel Südlibanon"
 israel_lebanon_occup_category_desc: "Die Verwaltung des Sicherheitsgürtels in §YSüdlibanon§! ist ein lokales provisorisches Regierungsorgan in §YSüdlibanon§!, in den Gebieten des Sicherheitsgürtels Südlibanon. Sie ersetzte die Institutionen des §YFreien Staates Libanon§! und operiert seit 1985 mit voller logistischer und militärischer Unterstützung von [ISR.GetNamewithFlag].\n§YUnsere Bevölkerung§! ist gegen die Fortsetzung der §RBesatzung§!, und der derzeitige Führer [ISR.GetLeader] hat versprochen, unsere Truppen abzuziehen. Wir können uns jedoch dafür entscheiden, die Truppen in Südlibanon §Ybeizubehalten§!, was zu innenpolitischem Gegenwind führen könnte, uns aber helfen wird, falls es künftig zu einem Krieg kommt."
 south_lebanon_occupation_ticker_mission: "Politischer Gegenwind!"
 south_lebanon_occupation_ticker_mission_desc: "Wir sollten unsere Haltung zur Besatzung Südlibanons festlegen. Wenn wir nichts unternehmen, bekommen wir doppelte Probleme, behalten die Truppen dort und werden dies später nicht mehr ändern können.\nWir sollten entweder den Schwerpunkt §YDie Truppen bleiben§! oder §YBringt unsere Jungs nach Hause§! abschließen."
 result_dep_on_pol_tt: "Das Ergebnis hängt von unseren Entscheidungen ab!"
 israel_mechanic.24.t: "Politische Proteste!"
 israel_mechanic.24.d: "Die Besetzung Südlibanons geht weiter, jedoch ist die Unterstützung unserer Bevölkerung für unsere Regierung drastisch gesunken."
 israel_mechanic.24.a: "Sie werden uns später danken."
 israel_mechanic.25.t: "Politische Unterstützung steigt!"
 israel_mechanic.25.d: "Nach dem Abzug unserer Truppen aus Südlibanon ist die politische Unterstützung für unsere Regierung drastisch gestiegen und die Bevölkerung unterstützt uns!"
 israel_mechanic.25.a: "Nun ja..."
 ISR_not_withdraw_from_the_security_belt: "Die Truppen bleiben"
 ISR_not_withdraw_from_the_security_belt_desc: "Wir sollten die Besetzung Südlibanons trotz des öffentlichen Widerstands fortsetzen. Das wird uns mehr Vorteile verschaffen, falls die Hisbollah uns in Zukunft angreift."
 israel_mechanic.26.t: "Starker politischer Gegenwind!"
 israel_mechanic.26.d: "Die Besetzung Südlibanons geht weiter, doch die Unterstützung unserer Bevölkerung für unsere Regierung ist drastisch gesunken, und Proteste haben begonnen. Die Regierung hat das Problem nicht einmal angesprochen und die Wähler ignoriert."
 israel_mechanic.26.a: "Wie dumm!"
 israel_mechanic.27.t: "Migration aus dem Libanon!"
 israel_mechanic.27.d: "Kürzlich haben sich aufgrund des israelischen Rückzugs aus Südlibanon viele libanesische Christen dazu entschlossen, nach Frankreich auszuwandern, um der Verfolgung durch die Hisbollah zu entkommen."
 israel_mechanic.27.a: "Willkommen, schätze ich?"
 israel_mechanic.28.t: "Schicksal des Ansar-Gefängnisses"
 israel_mechanic.28.d: "Während unserer langen Besetzung Südlibanons kontrollierten wir ein Gefängnis, in dem wir viele Hisbollah-Kämpfer gefangen hielten. Nun sollten wir, bevor wir über einen Rückzug entscheiden, das Schicksal dieses Gefängnisses festlegen."
 israel_mechanic.28.a: "Lassen wir das Gefängnis zurück."
 israel_mechanic.28.b: "Bringt die Gefangenen nach Israel."
 we_willget_events_tt: "§YDer Countdown wird enden und wir werden Ereignisse erhalten!§!"
 israel_nationalist.1.t: "Die Kaplan-Prozesse haben begonnen"
 israel_nationalist.1.d: "TODO"
 israel_nationalist.1.o1: "Lebenslange Haft"
 israel_nationalist.1.o2: "Todesstrafe"
 we_willget_events2_tt: "§YDer Countdown wird enden und wir werden Ereignisse erhalten!§!\n§RWir werden starken politischen Gegenwind erhalten!§!"
 camp_david_tt: "§YIsrael und Palästina werden Ereignisse erhalten und Palästina wird nach dem Treffen seine Maßnahmen wählen!§!"
 israel_nationalist.2.t: "Israel vertreibt den Waqf aus Jerusalem!"
 israel_nationalist.2.d: "Der Jerusalemer Waqf ist die jordanische Organisation, die für die Kontrolle der Al-Aqsa-Moschee in der Altstadt Jerusalems verantwortlich ist, einer der wichtigsten Moscheen der gesamten Welt. Der Waqf ist ein Rat aus 18 Mitgliedern, die alle vom Königreich Jordanien ernannt werden.\nIsrael vertreibt unsere Organisation aus Jerusalem, und wir werden die Al-Aqsa-Moschee nicht länger verwalten können!"
 israel_nationalist.2.o1: "Sie werden unseren ganzen Zorn zu spüren bekommen!"
 israel_nationalist.2.o2: "Das ist inakzeptabel"
 israel_nationalist.2.o3: "Ach nun ja"
 israel_nationalist.3.t: "Israel hat den Dritten Tempel gebaut"
 israel_nationalist.3.d: "Israel ignorierte völlig die Bedenken vieler internationaler Institutionen und beschloss, den Dritten Tempel zu errichten, wobei Proteste blutig niedergeschlagen und Muslimen sowie Christen, die Jerusalem ebenfalls als heiligen Ort betrachten, Land weggenommen wurde."
 israel_nationalist.3.o1: "Wie können sie es wagen?!?"
 israel_nationalist.3.o2: "Das ist nicht akzeptabel"
 israel_nationalist.3.o3: "Ach nun ja"
 israel_nationalist.3.o4: "Gut gemacht!"
 israel_nationalist.4.t: "Die Säulen der Gesellschaft"
 israel_nationalist.4.d: "Da wir nicht über unbegrenzte Ressourcen verfügen, müssen wir uns auf einen unserer ideologischen Kernbereiche konzentrieren:"
 israel_nationalist.4.o1: "Israelische Verteidigungsstreitkräfte"
 israel_nationalist.4.o2: "Siedler"
 israel_nationalist.4.o3: "Zionistische Gemeinschaften"
 israel.23.t: "Camp-David-Treffen"
 israel.23.d: "Nach einem diplomatischen Dreiertreffen zwischen Israel, Palästina und den USA in Camp David gelang es den Parteien nicht, eine Einigung zu erzielen, und das Abkommen wurde abgesagt. Die Parteien versprachen zwar, die Verhandlungen fortzusetzen, doch das weitere Engagement hängt vom Willen zur Zusammenarbeit und zur Förderung des Friedens ab..."
 israel.23.a: "Die militärische Koordination mit Israel abbrechen!"
 israel.23.b: "Beim nächsten Mal werden wir bestimmt eine Einigung erzielen."
 israel.23.c: "Es gibt keinen Partner für Friedensverhandlungen"
 israel.23.e: "Hoffen wir, dass alles gut wird."
 no_militar_coord: "Die militärische Koordination abbrechen!"
 israel.24.t: "Palästina bricht die militärische Koordination ab!"
 israel.24.d: "Nach dem Camp-David-Treffen brach Yasser Arafat die militärische Koordination mit Israel ab und versprach, einen politischen Waffenstillstand mit der Hamas zu schließen, um mit Israel konkurrieren zu können."
 israel.24.a: "Verdammt!"
 israel.25.t: "Nachricht der PNA!"
 israel.25.d: "Trotz des Scheiterns der Verhandlungen in Camp David hofft die Palästinensische Nationalbehörde weiterhin, sich künftig erneut zu treffen und die Angelegenheiten wieder zu besprechen."
 israel.25.a: "Es hätte schlimmer kommen können."
 israel.26.t: "Ankündigung von Ariel Sharon!"
 israel.26.d: "Als Reaktion auf das jüngste Camp-David-Treffen erklärte Ariel Sharon (Oppositionsführer des Likud), dass er nächsten Monat zu Rosch HaSchana den Tempelberg besuchen werde. Wenn wir ihm nicht innerhalb von 30 Tagen Vernunft einreden, könnte das schwerwiegende Folgen haben."
 israel.26.a: "Wir müssen etwas dagegen unternehmen..."
 ahsrfoc_tt: "Wir müssen den Schwerpunkt §YSharon Vernunft einreden§! abschließen, um ihn davon zu überzeugen, den Tempelberg nicht zu besuchen!"
 sharon_announce: "Sharon hat den Besuch des Tempelbergs angekündigt"
 sharnotconv_tt: "§YSharon ist nicht überzeugt!§!"
 sharconv_tt: "§YSharon ist überzeugt!§!"
 resthirdday_tt: "§YDas Ergebnis wird anschließend bekannt sein!§!"
 israel.27.t: "Sharons Entscheidung..."
 israel.27.d: "Nach unseren Gesprächen mit Ariel Sharon wollen wir sehen, wie er sich entscheidet..."
 israel.27.a: "Erwarten wir eine neue Intifada?"
 israel.27.b: "Gut, dass er zugestimmt hat!"
 israel.28.t: "Sharon besucht den Tempelberg!"
 israel.28.d: "Umgeben von Hunderten israelischen Bereitschaftspolizisten marschierten Herr Sharon und eine Handvoll Likud-Politiker zum Haram al-Sharif, dem Ort des goldenen Felsendoms, der als drittheiligstes Heiligtum des Islam gilt."
 israel.28.a: "Scheiße."
 israel.28.b: "Das ist inakzeptabel!"
 israel.29.t: "Vorbereitungen auf die Intifada!"
 israel.29.d: "Nach den ungeheuerlichen Taten Ariel Sharons müssen wir entscheiden, wie wir darauf antworten! Die Menschen warten auf unsere Befehle."
 israel.29.a: "Die Zweite Intifada ausrufen!"
 israel.29.b: "Entfachen wir nicht zu viel..."
 israel.30.t: "Israels Araber protestieren!"
 israel.30.d: "Arabische Israelis haben in mehreren Städten massive Proteste zur Unterstützung der Palästinenser begonnen, besonders in Kafr Kanna. Auf den Straßen herrscht Gewalt, und wir müssen schnell etwas dagegen unternehmen!"
 israel.30.a: "Bastarde!"
 israel.30.b: "Großartig!"
 ISR_arab_protests: "Protest israelischer Araber!"
 ISR_arab_protests_desc: "Die arabische Bevölkerung hat Proteste gegen unsere Regierung begonnen!"
 israel.31.t: "Die Festnahme Ariel Sharons!"
 israel.31.d: "Kürzlich wurde der umstrittene rechte Politiker Ariel Sharon nach Kundgebungen israelischer Araber festgenommen und steht nun vor einem Prozess, der ein endgültiges Urteil über seine jüngsten Handlungen fällen wird."
 israel.31.a: "Wir haben versucht, ihm Vernunft einzureden!"
 ISR_good_size_knesset: "Mehrheit in der Knesset!"
 ISR_big_size_knesset: "Überwältigende Mehrheit in der Knesset!"
 ISR_small_knesset: "Minderheit in der Knesset!"
 israel.32.t: "Niederschlagung der Proteste!"
 israel.32.d: "Der israelischen Polizei gelang es, die Proteste niederzuschlagen, doch dabei wurden 13 israelische Araber und 1 israelischer Jude getötet. Die gewaltsame Unterdrückung der Proteste hat die Unterstützung der israelischen Araber für unsere Regierung verringert. Auch Palästina hat die Handlungen der israelischen Regierung verurteilt."
 israel.32.a: "Wir hatten keine andere Wahl."
 israel.33.t: "Vorschlag für einen grenzüberschreitenden Überfall!"
 israel.33.d: "Im Moment sind die Truppen des zionistischen Regimes aufgrund ihrer inneren Proteste, der jüngsten Spannungen zwischen Israel und dem Westjordanland sowie interner bürokratischer Spielchen in einem sehr zersplitterten Zustand. Unsere Berater schlagen einen Überfall und eine Geiselnahme durch das israelische Militär vor."
 israel.33.a: "Vorwärts!"
 raidhas_happ_hez: "Die Hisbollah hat den Überfall durchgeführt!"
 israel.34.t: "Grenzüberschreitender Überfall der Hisbollah!"
 israel.34.d: "Hisbollah-Kämpfer nahmen drei israelische Soldaten gefangen, während diese den Sicherheitszaun patrouillierten, und brachten sie anschließend in den Libanon. Sie haben 3 IDF-Soldaten gefangen genommen und halten sie als Geiseln fest."
 israel.34.a: "Verdammt!"
 israel_utj.1.t: "Frauen der Mauer"
 israel_utj.1.d: "Women of the Wall (Neshot HaKotel) ist eine jüdisch-feministische Organisation, deren Ziel es ist, das Recht von Frauen zu sichern, an der Westmauer, auch Kotel genannt, zu beten."
 israel_utj.1.o1: "Unsinn, wir behalten die Geschlechtertrennung bei"
 israel_utj.1.o2: "Machen wir ihnen einige Zugeständnisse"
 ISR_2000_show_hezbollah: "Der Hisbollah Stärke zeigen!"
 ISR_2000_show_hezbollah_desc: "Die jüngsten Taten der Terroristen im Norden sind ungeheuerlich! Wir müssen ihnen zeigen, dass wir das nicht länger dulden werden!"
 israel.35.t: "Operation Gerechte Lehre"
 israel.35.d: "Unsere Befehlskette bietet zwei Möglichkeiten an, wie wir auf die Hisbollah reagieren können. Das erste Szenario ist der Start einer begrenzten Militäroperation gegen die Hisbollah in dem Versuch, unsere Gefangenen aus ihrer Gewalt zu befreien. Die zweite Möglichkeit ist, ihren nächstgelegenen Außenposten mit unseren Raketen zu treffen, gemäß der Doktrin der Hannibal-Direktive. Wie gehen wir in diesem Fall vor?"
 israel.35.a: "Schickt unsere Kräfte, um unsere Leute zu retten!"
 israel.35.b: "Wir müssen der Hannibal-Direktive folgen."
 israel.36.t: "Israel führt Operation Gerechte Lehre erfolgreich durch!"
 israel.36.d: "Kürzlich hat Israel nach dem grenzüberschreitenden Überfall der Hisbollah eine Spezialoperation als Antwort auf diese Ereignisse gestartet und seine Soldaten erfolgreich aus der Gefangenschaft der Hisbollah befreit!"
 israel.36.a: "Großartig!"
 israel.36.b: "Wir hätten sie hinrichten sollen!"
 israel.37.t: "Israel scheitert mit Operation Gerechte Lehre!"
 israel.37.d: "Kürzlich hat Israel nach dem grenzüberschreitenden Überfall der Hisbollah eine Spezialoperation als Antwort auf diese Ereignisse gestartet und es nicht geschafft, seine Soldaten aus der Gefangenschaft der Hisbollah zu befreien!"
 israel.37.a: "Man wird sich an sie erinnern."
 israel.37.b: "Unsere Macht ist groß!"
 israel.38.t: "Ergebnisloser Grenzkrieg!"
 israel.38.d: "Kürzlich hat Israel nach dem grenzüberschreitenden Überfall der Hisbollah eine Spezialoperation als Antwort auf diese Ereignisse gestartet. Das Ergebnis dieser Gefechte wird jedoch als ergebnislos betrachtet."
 israel.38.a: "Bis zum nächsten Mal, Zionisten!"
 israel.38.b: "Wir sollten das in unserem Hauptquartier besprechen..."
 israel.39.t: "Israelischer Raketenangriff auf die Hisbollah!"
 israel.39.d: "Kürzlich hat Israel nach dem grenzüberschreitenden Überfall der Hisbollah einen Raketenangriff auf Hisbollah-Stellungen gestartet, an denen sich gefangene IDF-Soldaten und ein ranghoher Hisbollah-Offizier befanden."
 israel.39.a: "Wir werden sie rächen!"
 israel.39.b: "Großartig!"
 israel.40.t: "Fehlgeschlagener Raketenangriff!"
 israel.40.d: "Kürzlich hat Israel nach dem grenzüberschreitenden Überfall der Hisbollah einen Raketenangriff auf Hisbollah-Stellungen gestartet, an denen sich gefangene IDF-Soldaten und ein ranghoher Hisbollah-Offizier befanden. Die Raketen wurden jedoch abgefangen, und die Operation scheiterte."
 israel.40.a: "Ein weiterer Sieg!"
 israel.40.b: "Ugh..."
 mis_borwar_tt: "Wir werden in der Lage sein, eine §YSpezialoperation§! an der Grenze zu §R[HEZ.GetNamewithFlag]§! zu starten oder einen begrenzten §YRaketenangriff§! auf ihren §RStützpunkt§! durchzuführen!"
 ISR_tolerate_hezbollah: "Austauschabkommen"
 ISR_tolerate_hezbollah_desc: "Es ist offensichtlich, dass die Hisbollah unsere gefangengenommenen Soldaten wahrscheinlich bereits getötet hat, dies aber nur getan hat, um einen neuen Geiselaustausch zu erzwingen. Angesichts unserer aktuellen Probleme sollten wir die Situation nicht eskalieren."
 israel.41.t: "Gefangenenaustausch"
 israel.41.d: "Die Regierung Israels gab bekannt, dass eine Vereinbarung über die Rückkehr der drei vermissten IDF-Soldaten getroffen wurde – ebenso wie des entführten israelischen Geschäftsmanns und IDF-Reserveobersts Elchanan Tenenbaum, der von der Hisbollah gefangen genommen worden war, nachdem er für einen Drogendeal nach Dubai gelockt worden war.\nDie Hisbollah leitete Verhandlungen über die Freilassung von 14 libanesischen Gefangenen sowie einer Anzahl palästinensischer Gefangener ein. 30 libanesische und arabische Gefangene, 400 palästinensische Gefangene, der deutsche Staatsangehörige und Hisbollah-Angehörige Steven Smyrek sowie die Überreste von 59 libanesischen Kämpfern und Zivilisten wurden an die Hisbollah überstellt, zusammen mit Karten, die israelische Minen in Südlibanon zeigten, im Austausch gegen Tenenbaum und die Überreste der drei toten Soldaten."
 israel.41.a: "Sehr gut!"
 israel.41.b: "Wir haben getan, was wir mussten."
 israel.42.t: "Untersuchung der Oktoberereignisse!"
 israel.42.d: "Nach der Niederschlagung der Proteste sollten wir das Fehlverhalten der Polizei untersuchen und diejenigen finden, die die Proteste ausgelöst haben. Das Arabische Komitee Israels möchte an der Untersuchung teilnehmen, als eine teilweise Wiedergutmachung unsererseits für das Geschehene. Sollen wir ihnen erlauben, die Arbeit der Polizei zu überwachen?"
 israel.42.a: "Natürlich!"
 israel.42.b: "Die Polizei wird die Arbeit erledigen."
 israel.43.t: "Haltung zu Kafr Qasim!"
 israel.43.d: "Das Massaker von Kafr Qasim ereignete sich im israelisch-arabischen Dorf Kafr Qasim an der Grünen Linie, die damals de facto die Grenze zwischen Israel und dem jordanischen Westjordanland bildete, am 29. Oktober 1956. Es wurde von der israelischen Grenzpolizei verübt, die arabische Zivilisten tötete, die von der Arbeit zurückkehrten, während einer Ausgangssperre, von der sie nichts wussten und die früher am Tag am Vorabend des Sinai-Krieges verhängt worden war.\nNach den jüngsten Ereignissen könnten wir diese Vorfälle anerkennen und uns bei den israelischen Arabern entschuldigen."
 israel.43.a: "Wir müssen uns entschuldigen."
 israel.43.b: "Das ist nie passiert!"
 israel.44.t: "Verhandlungen mit Syrien!"
 israel.44.d: "In einem Versuch, Syrien aus der iranischen Einflusssphäre herauszulösen, können wir versuchen, die Bedingungen einer Normalisierung der Beziehungen mit ihnen auszuhandeln. Mit welcher Position sollen wir in die Gespräche gehen?"
 israel.44.a: "Normalisierung ohne Bedingungen."
 israel.44.b: "Wir sind bereit, die Golanhöhen abzutreten!"
 israel.45.t: "Israel bietet die Normalisierung der Beziehungen an!"
 israel.45.d: "Kürzlich hat die israelische Regierung unserem Land eine Normalisierung der Beziehungen ohne jegliche Vorbedingungen angeboten. Das Einzige, was sie wollen, ist, dass wir unsere Ansprüche auf die Golanhöhen aufgeben."
 israel.45.a: "Gut, wir geben unsere Ansprüche auf."
 israel.45.b: "Verschwinde, zionistischer Diplomat!"
 syracc_negot: "Syrien hat den israelischen Vorschlag angenommen"
 israel.46.t: "Syrien nimmt an!"
 israel.46.d: "Sie werden ihre Ansprüche auf die Golanhöhen aufgeben und die Beziehungen zu unserem Land normalisieren!"
 israel.46.a: "Großartig!"
 israel.47.t: "Syrien lehnt ab!"
 israel.47.d: "Syrien hat weitere Verhandlungen mit unserem Land abgelehnt. Unsere Bedingungen und ihre Bedingungen sind absolut nicht dieselben, und sie sehen das Problem nicht nur in unserer mangelnden Kooperation, sondern in unserer Existenz als Ganzes."
 israel.47.a: "Ugh."
 israel.48.t: "Israel bietet an, den Golan an unser Land abzutreten!"
 israel.48.d: "Israel bietet an, den Golan an unser Land abzutreten, wenn wir einen Nichtangriffspakt mit ihnen unterzeichnen und die Beziehungen normalisieren."
 israel.48.a: "Wo muss ich unterschreiben?"
 israel.48.b: "Ist das ein zionistischer Trick?"
 israel.49.t: "Syrien nimmt an!"
 israel.49.d: "Syrien hat dem Abkommen zur Übergabe des Golan zugestimmt und ist unserem Land nun freundlich gesinnt."
 israel.49.a: "Wenigstens so..."
 syr_negotgol_tt: "Wir werden wählen können zwischen §Yder Forderung nach Normalisierung ohne Bedingungen§! mit §Y[SYR.GetNamewithFlag]§! oder der Abtretung des §YGolan§! an §Y[SYR.GetNamewithFlag]§! im Austausch für §Gfreundschaftliche Beziehungen§!."
 israel.50.t: "Israel greift Hisbollah-Stützpunkte in Syrien an!"
 israel.50.d: "Kürzlich haben israelische Luftangriffe Hisbollah-Stützpunkte in Syrien getroffen. Die syrischen Behörden haben sich dazu noch nicht geäußert, doch die Hisbollah hat bereits versprochen, die Taten des sogenannten zionistischen Regimes zu rächen. Einige Hisbollah-Offiziere wurden getötet, und Dutzende Soldaten wurden verwundet."
 israel.50.a: "Großartig!"
 israel.50.b: "Verdammt!"
 israel.50.c: "Verdammte Zionisten!"
 israel.50.e: "Verdammte Zionisten!"
 syrhez_tt: "Wir werden die Stützpunkte von §R[HEZ.GetNamewithFlag]§! in §R[SYR.GetNamewithFlag]§! angreifen, den Einfluss von §R[HEZ.GetNamewithFlag]§! auf §R[SYR.GetNamewithFlag]§! verringern und zufällig Gebäude in syrischen Regionen beschädigen!"
 istspechez_tt: "Wir werden §R[HEZ.GetNamewithFlag]§! direkt angreifen und unsere Spezialkräfte in den §YSüdlibanon§! entsenden. Sie werden strategische Objekte von §R[HEZ.GetNamewithFlag]§! sabotieren und sich anschließend über §YGaliläa§! zurückziehen."
 israel.51.t: "Spezialkräfte von [ISR.GetNamewithFlag] führen einen Angriff gegen [HEZ.GetNamewithFlag] durch!"
 israel.51.d: "Kürzlich sind israelische Spezialkräfte in kleinen Gruppen über die Grenze zum Libanon eingesickert und haben Hisbollah-Kämpfer angegriffen. Anschließend sabotierten sie strategische Anlagen im Südlibanon. Ohne die allgemeine Frontlage zu verändern, konnten die israelischen Spezialkräfte erfolgreich über Galiläa entkommen."
 israel.51.a: "Gut gemacht, Jungs!"
 israel.51.b: "Die Rache wird bald kommen!"
 israel.51.c: "Die Rache wird bald kommen!"
 ISR_collapsed_tunnels: "Eingestürzte Tunnel!"
 ISR_collapsed_tunnels_desc: "Die israelischen Truppen haben unsere Tunnel gesprengt, die die israelische Grenze überquerten. Es wird beträchtliche Zeit brauchen, neue Tunnel zu graben und die verbliebenen zu reparieren."
 israel.52.t: "Israel sprengt unsere Tunnel!"
 israel.52.d: "Die israelischen Truppen haben unsere Tunnel gesprengt, die die israelische Grenze überquerten. Es wird beträchtliche Zeit brauchen, neue Tunnel zu graben und die verbliebenen zu reparieren."
 israel.52.a: "Tja!"
 israel.53.t: "Die Radwan-Kräfte wurden infiltriert!"
 israel.53.d: "Israel konnte unsere Spezialkräfte infiltrieren und einige unserer Pläne in Erfahrung bringen."
 israel.53.a: "Verdammt!"
 ISR_leb_air: "Unsere Luftwaffe über dem Libanon"
 ISR_bibi_power: "Der Likud hat sich gespalten"
 leb_willris_tt: "Pro-[ISR.GetNamewithFlag]-Gruppen im Libanon werden sich erheben, wenn ihre Popularität bei Kriegsbeginn mindestens 10 % beträgt."
 isr_will_attack_leb_tt: "§G[ISR.GetNamewithFlag]§! wird in den §YSüdlibanon§! einmarschieren, um §R[HEZ.GetNamewithFlag]§! auszulöschen!\nWenn pro-§G[ISR.GetNamewithFlag]§!-Gruppen im Libanon eine Popularität von mindestens 10 % haben, werden sie sich gegen §R[HEZ.GetNamewithFlag]§! erheben!"
 ISR_ben_gvir_easy_trigger_1: "Einsatzregeln - Gelockert"
 ISR_ben_gvir_easy_trigger_1_desc: "Der tägliche Umgang mit palästinensischem Terrorismus erfordert besondere, gelockerte Einsatzregeln."
 ISR_ben_gvir_easy_trigger_2: "Einsatzregeln - Kaum noch vorhanden"
 ISR_ben_gvir_easy_trigger_2_desc: "Ein weiterer Schritt, um unsere Helden vor unsinnigen Einsatzregeln zu schützen, die unsere Einsatzfähigkeit einschränken."
 ISR_freedom_of_teaching_1: "Unabhängige Bildung - LIBA ausgesetzt"
 ISR_freedom_of_teaching_1_desc: "LIBA, der Kernlehrplan des Bildungsministeriums, der auch Englischunterricht umfasst, wurde eingeführt, um zu verhindern, dass bestimmte Gruppen nur Hebräisch und andere religiöse Themen unterrichten. Diese Entscheidung muss rückgängig gemacht werden, da sie unsere Unabhängigkeit beeinträchtigt, unsere Kultur an unsere jungen Menschen weiterzugeben. Sollen sie selbst entscheiden, ob sie Englisch unterrichten wollen oder nicht."
 ISR_freedom_of_teaching_2: "Unabhängige Bildung - Mamach"
 ISR_freedom_of_teaching_2_desc: "Der nächste Schritt im haredischen Bildungssystem: Wir werden unser eigenes Englisch lehren, den Geschichtsunterricht mit den Traditionen Israels stärken und die Vermittlung unsinniger Theorien wie Gender oder Darwinismus verbieten."
 ISR_only_pikuach_nefesh: "Nur Pikuach Nefesh"
 ISR_only_pikuach_nefesh_desc: "Am Schabbat ist keine Arbeit erlaubt, nicht einmal Bauarbeit, außer im Fall von Pikuach Nefesh – dem Schutz menschlichen Lebens, einem in der Halacha bekannten Prinzip."
 ISR_gender_equality: "Gleichstellung der Geschlechter"
 ISR_gender_equality_desc: "Kein Geschlecht ist überlegen; jeder wird unabhängig vom Geschlecht gleichermaßen zur Gesellschaft beitragen."
 ISR_renewable_energy_focused: "Fokus auf erneuerbare Energien"
 ISR_renewable_energy_focused_desc: "Unser Land kann keine weiteren Schäden durch menschliche Umweltverschmutzung und Verwüstung ertragen. Legen wir unseren Schwerpunkt auf erneuerbare Energien, um unser Wachstum nachhaltig zu sichern."
 bomcatisra_tt: "Dies wird §Gerlauben, den Einfluss von §R[PER.GetNamewithFlag]§! in der §YRegion§! zu bekämpfen§! und §Yverdeckte Operationen durchzuführen§!!"
 israel.54.t: "Israel bombardiert einen mutmaßlichen Nuklearreaktor in Syrien!"
 israel.54.d: "Kürzlich haben israelische Streitkräfte einen Luftangriff auf einen mutmaßlichen Nuklearreaktor durchgeführt, die sogenannte Al-Kibar-Anlage, in der Syrien angeblich versuchte, aus unbekannten Gründen einen Nuklearreaktor zu errichten. Israelische Spezialkräfte konnten außerdem syrisches Gebiet betreten und Überreste der Anlage bergen."
 israel.54.a: "Großartig!"
 israel.54.b: "Verdammte Zionisten!"
 israel.54.c: "Interessant."
 israel.55.t: "Israelische Flugzeuge in Syrien abgeschossen!"
 israel.55.d: "Mehrere israelische Militärjets wurden kürzlich in Syrien abgeschossen, als sie versuchten, in syrischen Luftraum einzudringen. Israel hat die Situation bislang nicht kommentiert."
 israel.55.a: "Ach Mist."
 israel.55.b: "Ein weiterer Sieg!"
 israel.55.c: "Die Syrer haben gute Arbeit geleistet."
 syr_ope_aa_tt: "Die §GErfolgswahrscheinlichkeit§! hängt direkt mit dem §Ygesamten Luftabwehrniveau§! von [SYR.GetNamewithFlag] zusammen."
 israel.56.t: "Geheime Nachricht von [ISR.GetNamewithFlag]!"
 israel.56.d: "Kürzlich hat Israel uns eine Nachricht geschickt und uns ein dubioses Abkommen angeboten, wonach wir alle iranischen Truppen aus Syrien vertreiben und Israel uns schützen würde, falls Iran etwas gegen Syrien unternehmen sollte."
 israel.56.a: "Iran, geht nach Hause!"
 israel.56.b: "Schon wieder ein dummer zionistischer Plan!"
 israel.57.t: "Syrien nimmt an!"
 israel.57.d: "Trotz ideologischer Unterschiede zwischen uns und Syrien haben sie unserem Vorschlag zugestimmt, und Syrien hat alle iranischen Kräfte von seinem Boden vertrieben."
 israel.57.a: "Großartig!"
 israel.58.t: "Syrien zieht unsere Truppen aus seinem Gebiet ab!"
 israel.58.d: "Unsere Agenten haben uns informiert, dass Syrien und Israel sich darauf geeinigt haben, unseren Einfluss in der Region zu bekämpfen. Syrien hat unsere Streitkräfte aus seinem Gebiet vertrieben. Was sollen wir tun?"
 israel.58.a: "Wir werden uns später rächen..."
 israel.58.b: "Truppen sammeln!"
 israel.59.t: "Syrien lehnt ab!"
 israel.59.d: "Syrien hat unseren geheimen Vorschlag abgelehnt und wird weiterhin Verbündeter Irans und Teil der Achse des Widerstands bleiben."
 israel.59.a: "Sehr bedauerlich."
 syr_manip_tt: "Wir werden den §GAbzug§! der Truppen von §R[PER.GetNamewithFlag]§! aus §Y[SYR.GetNamewithFlag]§! fordern und die Unabhängigkeit von §Y[SYR.GetNamewithFlag]§! §Ggarantieren§!, falls Syrien zustimmt. Allerdings könnte §R[PER.GetNamewithFlag]§! §Y[SYR.GetNamewithFlag]§! angreifen, wenn die Weltspannung hoch ist!\nDer Akzeptanzfaktor von §Y[SYR.GetNamewithFlag]§! hängt von der §Yregierenden Partei§! in §Y[SYR.GetNamewithFlag]§! ab."
 lba_ope_aa_tt: "Die §GErfolgswahrscheinlichkeit§! hängt direkt mit dem §Ygesamten Luftabwehrniveau§! von [LBA.GetNamewithFlag] zusammen."
 israel.60.t: "Israel bombardiert unseren Nuklearreaktor!"
 israel.60.d: "Israelische Flugzeuge sind in unseren Luftraum eingedrungen und haben einige unserer Nuklearreaktoren bombardiert!"
 israel.60.a: "Verdammt!"
 israel.62.t: "Erfolgreicher Bombenangriff in [FROM.GetNamewithFlag]!"
 israel.62.d: "Unsere Flugzeuge sind erfolgreich in den Luftraum von [FROM.GetNamewithFlag] eingedrungen und haben die Nuklearreaktoren bombardiert. Das wird sie für eine Weile aufhalten."
 israel.62.a: "Großartig!"
 israel.61.t: "Israel scheitert beim Bombardement nuklearer Anlagen!"
 israel.61.d: "Israelische Jets wurden abgeschossen, die nuklearen Anlagen von [FROM.GetNamewithFlag] bleiben unversehrt."
 israel.61.a: "Scheiße!"
 israel.61.b: "Schön!"
 irq_ope_aa_tt: "Die §GErfolgswahrscheinlichkeit§! hängt direkt mit dem §Ygesamten Luftabwehrniveau§! von [IRQ.GetNamewithFlag] zusammen."
 per_ope_aa_tt: "Die §GErfolgswahrscheinlichkeit§! hängt direkt mit dem §Ygesamten Luftabwehrniveau§! von [PER.GetNamewithFlag] zusammen."
 israel_news.14.t: "Israel hat die Dokumente über Ammoniak freigegeben!"
 israel_news.14.d: "Israel hat die Schließung seiner geheimen Nuklearanlage angekündigt und versprochen, die sorgfältig verborgenen Atomwaffen vollständig aufzugeben. Viele Länder des Nahen Ostens haben jedoch Zweifel geäußert, ob Israel sie nicht erneut täuschen wird."
 israel_news.14.o1: "Interessant."
 israel_palestine_category: "[ISR.GetNamewithFlag] - [PAL.GetNamewithFlag] Spannungen"
 ISR_palestine_desc_loc: "Unsere aktuellen §RSpannungen§! [?ISR_palestine_situation|0+]\n\n[?PAL_arab_popularity|=0+] von £ISR_Communist_State £ISR_Autocracy £ISR_anarchist_communism £ISR_Neutral_Muslim_Brotherhood §Yarabischen Parteien§! in Umfragen\n[?PAL_war_support_in_isr|=0+] aus der aktuellen §4israelischen§! Kriegsunterstützung\n\n[?PAL_arab_parties_rulling|=0+] durch den Ausschluss von £ISR_Communist_State £ISR_Autocracy £ISR_anarchist_communism £ISR_Neutral_Muslim_Brotherhood §Yarabischen Parteien§! aus der §YRegierung§! von [ISR.GetNamewithFlag]\n\n[select_thingie_palisr]\n\nNach zahlreichen §Yisraelisch-arabischen Kriegen und Intifadas§! steht die Lage in [PAL.GetNamewithFlag] fast vollständig unter §4israelischer§! Kontrolle. Erhöhte §RSpannungen§! zwischen \n[ISR.GetNamewithFlag] und [PAL.GetNamewithFlag] können jedoch zu §RUnruhen, Kriegen und möglichen Aufständen§! führen und §Ydas Machtgleichgewicht§! sowie die §Ygesamte Lage§! verändern.\n\nJe stärker die §RSpannungen steigen§!, desto §Rgewalttätiger§! wird die Situation!\n\nDie Höhe der §RSpannungen§! hängt außerdem vom §YAutonomieniveau§! von [PAL.GetNamewithFlag] ab!"
