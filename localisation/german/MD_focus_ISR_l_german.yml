 ISR_ask_egypt_to_mediate: "Ägypten um diplomatische Vermittlung bitten"
 israel.93.t: "Israel bittet um einen diplomatischen Gefallen!"
 israel.93.d: "Die israelische Regierung hat sich kürzlich an uns gewandt und gebeten, dass unsere diplomatische Mission zwischen Israel und Palästina vermittelt.\n\nDa sich unsere Beziehungen zu Israel in letzter Zeit erwärmt haben und Palästina uns stärker vertraut, könnten wir dies vielleicht tun, um diplomatisch an Gewicht zu gewinnen. Sollen wir zustimmen?"
 israel.93.a: "Ruft Arafat an!"
 israel.93.b: "Keine Geschäfte mit dem Teufel."
 israel.94.t: "Ägypten lehnt ab!"
 israel.94.d: "Der ägyptische Staatschef [EGY.GetLeader] hat unseren Vorschlag abgelehnt. Sie sagen, dass sie kein Interesse daran haben, zwischen uns und Palästina zu vermitteln. Sie betrachten diesen Versuch diplomatischer Täuschung als einen Pakt mit dem Teufel, den sie niemals eingehen werden."
 israel.94.a: "Was?!"
 medsuc_pr_tt: "Wenn die §YVermittlung§! §Gerfolgreich§! ist, werden wir viele §GVorteile§! erhalten!\n\nDadurch werden die Spannungen zwischen Palästina und Israel sinken!"
 israel.95.t: "Treffen in Scharm El-Scheich!"
 israel.95.d: "Kürzlich wurde die ägyptische Regierung von der israelischen Regierung gebeten, eine Senkung der Spannungen zwischen uns und Israel zu vermitteln.\n\nBeide diplomatischen Missionen sind in Scharm El-Scheich eingetroffen, und wir sind bereit, unser erstes Wort zu sprechen, das den Ausgang des Treffens bestimmen wird."
 israel.95.a: "Wir stimmen zu, die Lage zu beruhigen."
 israel.95.b: "Idioteninitiative!"
 israel.96.t: "Erfolgreiches Treffen in Scharm El-Scheich!"
 israel.96.d: "Glücklicherweise haben Israel und Palästina dank der Bemühungen der ägyptischen Regierung ihre Spannungen gesenkt, und es wurde eine vorübergehende Einigung erzielt."
 israel.96.a: "Großartig!"
 israel.96.b: "Danke, Ägypten!"
 israel.97.t: "Erfolgloses Treffen in Scharm El-Scheich!"
 israel.97.d: "Nach einer Stunde Verhandlungen verließ die palästinensische Delegation die Konferenz und wird die Gespräche nicht fortsetzen."
 israel.97.a: "Nun ja... wir haben es versucht."
 israel.97.b: "Sturer Unsinn!"
 PAL_emergency_quartet_meeting: "Ein dringendes Quartett-Treffen beantragen"
 ISR_associate_with_waronterror: "Sich mit dem Krieg gegen den Terror assoziieren!"
 ISR_clearance_tax_discuss: "Über Steuerfreigaben beraten"
 israel.98.t: "Beratung über Steuerfreigaben"
 israel.98.d: "Sollen wir die Steuerfreigaben für Palästina erhöhen oder senken? Was ist unsere jetzige Entscheidung?"
 israel.98.a: "Erhöhen!"
 israel.98.b: "Senken."
 israel.98.c: "Ich habe es mir anders überlegt."
 israel.99.t: "Israel senkt die Steuerfreigaben!"
 israel.99.d: "Israel hat kürzlich beschlossen, die Steuerfreigaben zu senken. Nun leiden wir weniger darunter."
 israel.99.a: "Gut!"
 israel.100.t: "Israel erhöht die Steuerfreigaben!"
 israel.100.d: "Israel hat kürzlich beschlossen, die Steuerfreigaben zu erhöhen. Nun leiden wir stärker darunter."
 israel.100.a: "Arschlöcher!"
