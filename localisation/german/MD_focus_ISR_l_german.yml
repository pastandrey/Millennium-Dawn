 law_of_return_desc: "Unser Staat ist im Kern seines Selbstverständnisses der Nationalstaat aller Juden. Auf dieser Grundlage kehren Juden aus aller Welt ständig in ihre Heimat zurück. Allerdings machen die Polarisierung der Meinungen und die unterschiedlichen Hintergründe der Neuankömmlinge die Schaffung eines ideologisch einheitlichen politischen Systems unmöglich."
