 ISR_quad_idea: "I2U2-Partnerschaft"
 israel_economy.202.t: "Israel schlägt das I2U2-Bündnis vor!"
 israel_economy.202.d: "Die Gruppe hat das Ziel, Kapital und Fachwissen aus dem Privatsektor zu mobilisieren, um eine Vielzahl von Zielen zu erreichen, darunter die Modernisierung von Infrastruktur, die Förderung emissionsarmer Entwicklungswege und die Verbesserung der öffentlichen Gesundheit. Projekte und Initiativen der I2U2-Partnerschaft sind geografisch nicht begrenzt – die Gruppe wird überall dort Möglichkeiten prüfen, wo sie positive Auswirkungen erzielen kann. Die I2U2-Gruppe wird von hochrangigen Regierungsvertretern jedes Partnerlandes geleitet, darunter vier führende Beamte, die eng zusammenarbeiten und den Regierungschefs Bericht erstatten."
 israel_economy.202.a: "Wo müssen wir unterschreiben?"
 israel_economy.202.b: "Nein."
 israel_economy.203.t: "[FROM.GetNamewithFlag] stimmt zu!"
 israel_economy.203.d: "[FROM.GetNamewithFlag] hat unserem Angebot zugestimmt und wird unserem Abkommen in Kürze beitreten!"
 israel_economy.203.a: "Großartig!"
 israel_economy.204.t: "[FROM.GetNamewithFlag] lehnt ab!"
 israel_economy.204.d: "Sie werden dem I2U2-Projekt nicht beitreten."
 israel_economy.204.a: "Sehr bedauerlich."
 israel.2.t: "Israel bietet militärische Zusammenarbeit an"
 israel.2.d: "Die israelische Delegation schlägt eine militärische Zusammenarbeit zwischen ihren Rüstungskonzernen und unserem Kalaschnikow-Konzern vor, um Waffen für die israelische Armee zu entwickeln. Insbesondere bieten sie die gemeinsame Entwicklung des Sturmgewehrs AK Alfa über unsere amerikanische Tochtergesellschaft Kalashnikov USA an. Sollen wir zustimmen?"
 israel.2.a: "Wir stimmen zu."
 israel.2.b: "Nein."
 israel.3.t: "Russland hat zugestimmt"
 israel.3.d: "Wir werden bald mit der gemeinsamen Waffenentwicklung mit dem Kalaschnikow-Konzern beginnen."
 israel.3.a: "Großartig!"
 israel.4.t: "Russland hat abgelehnt"
 israel.4.d: "Sie haben unser Angebot abgelehnt, wir werden unsere Pläne ändern müssen..."
 israel.4.a: "Verdammt."
