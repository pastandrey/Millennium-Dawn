l_german:
 faction_manifest_containment_of_decadence_name: "Eindämmung der westlichen Dekadenz"
 faction_manifest_containment_of_decadence_desc: "'Im Namen Gottes, des Barmherzigen, des Gnädigen'\n--------------\nWas haben wir außer unserem eigenen Fleisch und Blut, um dieses Land zu schützen? Der imperialistische Durst nach fremdem Boden kann niemals mit einfacher Diplomatie gestillt werden. Letztendlich ist eine Achse des Widerstands der einzige Weg, um zu verhindern, dass weitere imperialistische Agenden in der Welt Fuß fassen, selbst wenn dies bedeutet, bis zum letzten Mann zu kämpfen."
 faction_manifest_peace_in_our_time_name: "Frieden in der Welt"
 faction_manifest_peace_in_our_time_desc: "„Animus in consulendo liber“\n------------- -\nDer Zusammenbruch des Warschauer Pakts und die Wiederherstellung der internationalen Rechtsordnung sind allein den gemeinsamen Anstrengungen der NATO-Mitgliedstaaten zu verdanken. Heute scheint es jedoch, dass einige Staaten unserer Welt beschlossen haben, diese Ära der Stabilität für ihre eigenen Interessen auszunutzen, und aktiv gegen die Bemühungen der NATO arbeiten. Um die Sicherheit in unserer Zeit zu gewährleisten, müssen wir daran arbeiten, das Bündnis auf neue Gebiete auszuweiten und die Sicherheit aller Menschen weltweit zu gewährleisten."
 faction_manifest_unite_islamic_countries_name: "Vereinigt die islamische Welt"
 faction_manifest_unite_islamic_countries_desc: "Seit Jahrhunderten ist die islamische Welt gespalten – nun können wir durch Zusammenarbeit und Verständnis wieder vereint werden."
 faction_manifest_the_second_red_wave_goal_name: "Die zweite rote Welle"
 faction_manifest_the_second_red_wave_goal_desc: "Als die Bolschewiki die Macht übernahmen, entfachten sie ein Feuer, das Jahrzehnte lang brannte. Dennoch konnten sie den größten Mangel ihres neuen Systems nicht beheben: die inkompetente Führung. Während der Westen immer stärker wurde, stagnierte die Sowjetunion. Wir haben zu lange unter kommunistischen Diktaturen gelebt. Jetzt ist es an der Zeit, dass wir die Welt nach unserer eigenen Vision des Kommunismus regieren."
 faction_manifest_comeback_of_the_monarchy_name: "Die Rückkehr der Monarchie"
 faction_manifest_comeback_of_the_monarchy_desc: "Seit Jahrhunderten regierten Monarchien die Welt mit Weisheit und Stärke. In den letzten Jahrzehnten haben jedoch Republiken und Demokratien die Macht übernommen und nur vorübergehenden Frieden und Stabilität gebracht. Dieser Wohlstand begann zu schwinden, daher ist es an der Zeit, dass die Monarchien wieder an Macht gewinnen, um Ordnung und Tradition in unseren Nationen wiederherzustellen. Durch Einheit und Zusammenarbeit können wir den Glanz der Monarchie zurückbringen und unser Volk in eine bessere Zukunft führen."
 faction_manifest_preserving_our_place_name: "Unseren Platz in der Welt sichern"
 faction_manifest_preserving_our_place_desc: "\"Kollektive Sicherheit in einer multipolaren Welt\"\n--------------\nDer Zusammenbruch der Sowjetunion führte zur Gründung mehrerer Staaten. Dieses Ereignis bot dem westlichen Block eine Chance, wobei die Vereinigten Staaten und die übrigen NATO-Staaten versuchten, die ehemaligen Sowjetstaaten unter ihren Einfluss zu bringen. Auch wenn viele behaupten, dass die Vereinigten Staaten als neue Hegemonialmacht die einzige Supermacht der Welt sind, ist es das Ziel unserer Fraktionen, jegliche Hoffnung darauf zu zerstören, dass dies dauerhaft Realität wird. Durch gemeinsame Stärke werden wir sicherstellen, dass der postsowjetische Raum geschützt, bewaffnet und vorbereitet ist."