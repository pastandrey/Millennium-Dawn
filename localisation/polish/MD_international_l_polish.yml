 IS_counter_terror_nation_text: "Naród"
 IS_counter_terror_button_text_tt: "Otwiera ekran §YZwalczanie terroryzmu§!. Tutaj możemy zarządzać naszymi działaniami antyterrorystycznymi, a także wspierać działania innych państw w walce z terroryzmem."
 IS_state_recognition_button_text_tt: "Otwiera ekran §YState Recognition§!. Tutaj możemy uznawać państwa za niepodległe narody, a także pomagać innym państwom w kampaniach na rzecz uznania ich państwowości."
 recognition_category_desc: "Kilka nieuznanych państw dąży do przystąpienia do społeczności międzynarodowej. Musimy zdecydować, czy wesprzeć ich kampanie. Jeśli uzyskają wystarczające poparcie ze strony państw członkowskich ONZ, mogą zostać przyjęte do Organizacji Narodów Zjednoczonych, pozbywając się statusu nieuznanego i związanych z nim niedogodności. W przypadku państw, które już uznaliśmy, możemy dodatkowo wesprzeć ich kampanie, zachęcając inne państwa członkowskie ONZ do uznania ich również."
