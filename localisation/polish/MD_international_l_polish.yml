 un_ga_manipulate_vote_tt: "By spending political power and influence, we can move a resolution to the front of the list, making it eaiser to get measure we want passed to a vote faster. Likewise, we can spend influence to move resolutions to the end of the list.\n\n§YOn Left Click:§!\nMove resolution to the front of the queue.\n\n§YOn Right Click:§!\nMove resolution to the end of the queue.\n\n§RWARNING:§! When moving votes to the front of the list, they will not bypass §BUN§! §YSecurity Council§! seat confirmation votes, nor will they bypass §RRaid Sanction§! votes."
 propose_ga_resolution_tt: "§YPropose Resolution§!"
 propose_ga_resolution_tt_delayed: "Opens the §YGeneral Assembly§! resolution proposal panel. You may propose non-binding resolutions for the §YGeneral Assembly§! to vote on. Each proposal costs §Y200§! political power."
