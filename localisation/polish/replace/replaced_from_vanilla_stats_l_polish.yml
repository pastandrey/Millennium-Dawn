l_polish:
 STAT_NAVY_SUB_VISIBILITY: "Podstępne ukrycie:"
 STAT_NAVY_SUB_VISIBILITY_DESC: "Jak cicha i niewidoczna jest ta łódź podwodna."
 STAT_NAVY_SHORE_BOMBARDMENT: "Możliwość ataku amfibijnego:"
 STAT_NAVY_SHORE_BOMBARDMENT_DESC: "Zdolność statku do wspomagania żołnierzy zaokrętowanych w atakach desantowych i walkach na pobliskich wybrzeżach podczas misji Wstrzymaj."
 STAT_NAVY_MISSION_COVERAGE: "Skuteczność wykrywania wroga:"
 STAT_NAVY_MISSION_COVERAGE_DESC: "§TJak skuteczny jest statek w wykrywaniu wrogów. Każdy statek dodaje swoją skuteczność wykrywania.§!"
 STAT_NAVY_FIRE_RANGE_DESC: "Zasięg głównych rakiet okrętu."
 STAT_NAVY_EVASION: "Broń do obrony punktowej:"
 STAT_NAVY_EVASION_DESC: "Zdolność statków do unikania trafień wroga flarami, CIWS i innymi środkami zaradczymi. Mniejsze statki naturalnie częściej unikają trafień."
 STAT_NAVY_SUB_ATTACK: "Walka z okrętami podwodnymi:"
 STAT_NAVY_SUB_ATTACK_DESC: "Ile szkód możemy wyrządzić okrętom podwodnym wroga."
 STAT_NAVY_ATTACK: "Siła ognia rakiety:"
 STAT_NAVY_ATTACK_DESC: "Ile i jak potężnych mamy rakiet przeciwokrętowych."
 STAT_NAVY_ANTI_AIR_ATTACK_DESC: "Ile i jak potężnych rakiet przeciwlotniczych musimy wycelować w samoloty wroga."
 STAT_NAVY_ANTI_AIR_TARGETTING_DESC: "Jak dobrze radar statku może śledzić i namierzać samoloty wroga."
 STAT_AIR_RANGE: "Zasięg lotu:"
 STAT_AIR_AGILITY: "Zaleta radaru:"
 STAT_AIR_AGILITY_DESC: "W jaki sposób właściwości niewidzialności samolotu, awionika samolotu, systemy uzbrojenia i wyszkolenie pilotów dają mu przewagę w BVR i w bliskim starciu."
 STAT_AIR_DEFENCE: "Obrona powietrzna:"
 STAT_AIR_DEFENCE_DESC: "Zdolność statku powietrznego do zwabienia i/lub wymanewrowania lub całkowitego zniszczenia nadlatującego zagrożenia bronią."
 STAT_NAVY_RAIDING_COORDINATION:1 "Koordynacja najazdu:"
 STAT_NAVY_PATROL_COORDINATION:1 "Koordynacja patrolu:"
 STAT_NAVY_TORPEDO_ATTACK: "Torpedy:"
 STAT_NAVY_TORPEDO_ATTACK_DESC: "Ile szkód możemy wyrządzić, korzystając z torped okrętu."
 STAT_NAVY_HG_ATTACK:1 "Rakiety przeciwokrętowe:"
 STAT_NAVY_HG_ATTACK_DESC: "Ilość uszkodzeń i ataków, jakie rakiety przeciwokrętowe są w stanie zadać wrogim statkom."
 STAT_NAVY_HG_ARMOR_PIERCING:1 "Przebicie rakiet przeciwokrętowych: "
 STAT_NAVY_HG_ARMOR_PIERCING_DESC: "Statystyka ta określa, jak skutecznie ataki rakietowe przeciw okrętom będą w stanie przebić się przez wrogie punkty obronne i pancerz."
 STAT_NAVY_LG_ATTACK:1 "Atak armatni: "
 STAT_NAVY_LG_ATTACK_DESC: "Uszkodzenia spowodowane przez artylerię morską, armaty automatyczne i karabiny maszynowe są również przydatne w przypadku bombardowania brzegu."
 STAT_NAVY_LG_ARMOR_PIERCING:1 "Przebicie (lekkie): "
 STAT_NAVY_LG_ARMOR_PIERCING_DESC: "Przebijanie pancerza lekkich dział, wyższe wartości przebijania zwiększają szansę na trafienia krytyczne, podczas gdy wartości przebijania poniżej pancerza wroga poważnie zmniejszają obrażenia."
 STAT_NAVY_SURFACE_VISIBILITY: "Widoczność - o. nawodny:"
 STAT_NAVY_SURFACE_VISIBILITY_DESC: "Jak trudno jest znaleźć i trafić ten statek, mniejsze wartości zwiększą przeżywalność, a także sprawią, że statek będzie trudniejszy do wykrycia"
 STAT_COMMON_ARMOR: "Armor/CIWS: "