 RULE_ZOMBIE_DIFFICULTY_INSANE: "Szalony"
 RULE_ZOMBIE_DIFFICULTY_INSANE_DESC: "Zombie mają 37 milionów zombie oraz bonus do ataku i obrony na początku gry."
 RULE_ZOMBIE_GAME_MODE: "Włącz tryb gry Zombie"
 RULE_ZOMBIE_GAME_MODE_NO_DESC: "Tryb gry Zombie nie zostanie włączony."
 RULE_ZOMBIE_GAME_MODE_YES_DESC: "Gra Zombie będzie dostępna. Cała pozostała zawartość Millennium Dawn nadal będzie dostępna, więc miej to na uwadze. Jeśli chcesz grać jako Zombie, zacznij od Indii."
 zombie: "Wirus Zombie"
 zombie_desc: "Wirus zamienia niegroźnych ludzi w potwory."
 zombie_0: "Wirus Zombie"
 zombie_0_desc: "Wirus zamienia niegroźnych ludzi w potwory."
 Zombie: "Zombie"
 Zombie_desc: "Jedynym celem zombie jest zjadanie ludzi."
 better_instincts: "Lepsze instynkty"
 better_instincts_desc: "Zombie są jeszcze lepsze w zabijaniu ludzi."
 shock_and_zombie_awe: "Panika..."
 shock_and_zombie_awe_desc: "Wśród ludności narasta panika. Nikt nie mógł być przygotowany na zombie i na to, jak szybko zaatakowali pozycje wojskowe, przygotowując desperackie obrony..."
 zombie.1.t: "Wirus rozprzestrzenia się na Anglię"
 zombie.1.d: "Kanał La Manche nie okazuje się godnym przeciwnikiem dla nieustającej zarazy. Zakażeni uchodźcy lądują na białych klifach Dover, a tętniące życiem ulice Londynu zapadają w upiorną ciszę, gdy wirus przedziera się przez serce Imperium. Brytyjska wyspiarska forteca zamienia się w więzienie, gdy zmarli zaczynają się budzić."
 zombie.1.a: "Grrr!"
 zombie.2.t: "Wirus rozprzestrzenia się na Irlandię"
 zombie.2.d: "Morze Irlandzkie nie stanowi żadnej bariery dla plagi nieumarłych. Kutry rybackie wracają do portów, przewożąc więcej niż połów, a nadmorskie miasta milkną jedno po drugim. Zakażenie rozprzestrzenia się w głąb lądu z Dublina i Corku, pochłaniając Szmaragdową Wyspę falą powłóczących trupów."
 zombie.2.a: "Mniam mniam..."
 zombie.3.t: "Wirus rozprzestrzenia się w Stanach Zjednoczonych"
 zombie.3.d: "Pomimo desperackich środków kwarantanny, zarażeni uchodźcy uciekający z Europy przenieśli zarazę przez Atlantyk. Główne miasta portowe na wschodnim wybrzeżu zgłaszają ogniska choroby, a infekcja rozprzestrzenia się na zachód z przerażającą szybkością. Amerykański sen staje się koszmarem żywych trupów."
 zombie.3.a: "Móóóóózzzzgiiiii..."
 zombie.4.t: "Wirus rozprzestrzenia się na Japonię"
 zombie.4.d: "Kraj Kwitnącej Wiśni mierzy się teraz z armią, która nie zna honoru ani litości. Z Tokio, Osaki i innych ośrodków miejskich napływają doniesienia, że ​​gęsto zaludnione miasta stają się śmiertelnymi pułapkami. Starożytne świątynie i nowoczesne wieżowce padają ofiarą nieustającej fali zarażonych."
 zombie.4.a: "Urrgh, kawaii..."
 zombie.5.t: "Wirus rozprzestrzenia się na Australię"
 zombie.5.d: "Rozległy ocean zapewnia jedynie chwilową ulgę. Statki towarowe z zarażonymi członkami załogi przypływają do Sydney i Melbourne, a epidemia rozpętuje się po kontynencie. Nawet surowy Outback oferuje niewiele schronienia przed rozprzestrzeniającą się zarazą, gdy ostatnia wyspiarska twierdza ludzkości zaczyna chylić się ku upadkowi."
 zombie.5.a: "Raaargh..."
 zombie.6.t: "Wirus rozprzestrzenia się na Nową Zelandię"
 zombie.6.d: "Odległe wyspy, które były inspiracją dla Śródziemia, teraz stoją w obliczu własnej apokalipsy. Zakażenie przybywa drogą powietrzną i morską, rozprzestrzeniając się przez Wellington i Auckland. Izolacja Nowej Zelandii, niegdyś jej najpotężniejsza linia obrony, oznacza, że ​​nie ma już dokąd uciec."
 zombie.6.a: "Urrrgh..."
 zombie.7.t: "Wirus rozprzestrzenia się na Filipiny"
 zombie.7.d: "Infekcja przetacza się przez filipiński archipelag niczym tropikalna burza. Przemieszczający się z wyspy na wyspę ocaleńcy przenoszą zarazę z Luzonu na Mindanao, a tysiące wysp, które kiedyś stanowiły naturalne bariery, stają się odizolowanymi enklawami grozy, bez szans na ucieczkę."
 zombie.7.a: "Mmmm... Nngh..."
 zombie.8.t: "Horda Zombie"
 zombie.8.d: "Martwi chodzą po Ziemi. Horda zombie pojawiła się w [459.GetName] i szybko zabija tysiące ludzi, zjadając ich lub zarażając. Eksperci na całym świecie, nie do końca kreatywnie, nazwali ten konflikt „Epidemią”, ale wojna o przetrwanie ludzkości dopiero się rozpoczęła... Cóż, Madagaskar właśnie zamknął swoje lotniska."
 zombie.8.a: "Wyślij zombie do grobu!"
 zombie.8.b: "Era Człowieka dobiegła końca..."
 zombie.9.t: "[FROM.GetName] Prośby o pomoc w walce z zombie"
 zombie.9.d: "[FROM.GetName] zwrócił się o pomoc i stara się pozyskać wsparcie wszystkich głównych państw świata, aby powstrzymać falę epidemii. Możemy porzucić ich w potrzebie albo dołączyć do nich w walce o przetrwanie. Co powinniśmy zrobić?"
 zombie.9.a: "Dołączymy!"
 zombie.9.b: "Do diabła z tym! Ratujcie się!"
 RULE_ZOMBIE_JOINING_FACTION_GAME_MODE: "Koalicja Antyzombie dołącza do frakcji"
 RULE_ZOMBIE_JOINING_FACTION_NORMAL: "Domyślne zachowanie frakcji"
 RULE_ZOMBIE_JOINING_FACTION_NORMAL_DESC: "Zachowanie frakcji jest domyślne dla tego trybu gry."
 RULE_ZOMBIE_JOINING_FACTION_NO_MAJORS: "Brak liderów"
 RULE_ZOMBIE_JOINING_FACTION_NO_MAJORS_DESC: "Żaden lider nie dołączy do koalicji antyzombie."
 RULE_ZOMBIE_JOINING_FACTION_ALL_MAJORS: "Wszyscy liderzy dołączają do koalicji"
 RULE_ZOMBIE_JOINING_FACTION_ALL_MAJORS_DESC: "Do Koalicji Antyzombie przyłączają się wszyscy liderzy."
 zombie.10.t: "Pandemia!"
 zombie.10.d: "Wygląda na to, że wirus zombie dotarł do naszych ziem i zaczyna rozprzestrzeniać się poprzez [?var:random_outbreak_state.GetName]. Czas pokaże, jak źle to będzie..."
 zombie.10.a: "Zmobilizować wojska!"
 zombie.11.t: "Pandemia w [FROM.GetName]"
 zombie.11.d: "W [FROM.GetName] wybuchła epidemia, która z godziny na godzinę narasta. Wirus zombie rozprzestrzenia się jak pożar, a czas pokaże, czy to początek końca..."
 zombie.11.a: "Niepokojący..."
 zombie.11.b: "Raaargh..."
 RULE_ZOMBIE_SPAWN_LOCATION: "Zombie Spawn Location"
 RULE_ZOMBIE_SPAWN_INDIA: "India (Default)"
 RULE_ZOMBIE_SPAWN_INDIA_DESC: "The Zombie Horde spawns in India as normal."
 RULE_ZOMBIE_SPAWN_AFRICA: "Central Africa"
 RULE_ZOMBIE_SPAWN_AFRICA_DESC: "The Zombie Horde spawns in Central Africa (Congo region), opening a new front that threatens Europe and the Middle East earlier."
 RULE_ZOMBIE_SPAWN_EAST_ASIA: "East Asia"
 RULE_ZOMBIE_SPAWN_EAST_ASIA_DESC: "The Zombie Horde spawns on the Chinese coast, immediately threatening East Asia, Japan, and the Pacific."
 RULE_ZOMBIE_SPAWN_MULTIPLE: "Multiple Locations"
 RULE_ZOMBIE_SPAWN_MULTIPLE_DESC: "The Zombie Horde spawns simultaneously in India, Central Africa, and East Asia with smaller initial forces at each location."
 RULE_ZOMBIE_COALITION_ENABLED: "Anti-Zombie Coalition Faction"
 RULE_ZOMBIE_COALITION_ENABLED_YES: "Enabled (Default)"
 RULE_ZOMBIE_COALITION_ENABLED_YES_DESC: "The Anti-Zombie Coalition forms normally. Major powers will be invited to join the fight against the Zombie Horde."
 RULE_ZOMBIE_COALITION_ENABLED_NO: "Disabled"
 RULE_ZOMBIE_COALITION_ENABLED_NO_DESC: "The Anti-Zombie Coalition will not form. Nations must survive the outbreak on their own without an organised coalition."
 RULE_ZOMBIE_COALITION_DELAY: "Zombie Spawn Delay"
 RULE_ZOMBIE_COALITION_DELAY_NONE: "No Delay (Default)"
 RULE_ZOMBIE_COALITION_DELAY_NONE_DESC: "The Zombie Horde spawns immediately at the start of the game."
 RULE_ZOMBIE_COALITION_DELAY_ONE_YEAR: "1 Year"
 RULE_ZOMBIE_COALITION_DELAY_ONE_YEAR_DESC: "The Zombie Horde spawns after a one-year countdown, giving nations time to prepare before the outbreak begins."
 RULE_ZOMBIE_COALITION_DELAY_TWO_YEARS: "2 Years"
 RULE_ZOMBIE_COALITION_DELAY_TWO_YEARS_DESC: "The Zombie Horde spawns after a two-year countdown, giving nations significant time to build up their economies and militaries."
 RULE_ZOMBIE_COALITION_DELAY_THREE_YEARS: "3 Years"
 RULE_ZOMBIE_COALITION_DELAY_THREE_YEARS_DESC: "The Zombie Horde spawns after a three-year countdown, giving nations extensive preparation time before the outbreak begins."
 zombie_runner: "Runner Strain"
 zombie_runner_desc: "A faster, more aggressive mutation of the zombie virus. Runners move in swarms and overwhelm defenses through sheer speed and volume."
 zombie_runner_0: "Runner Strain"
 zombie_runner_0_desc: "A faster, more aggressive mutation of the zombie virus. Runners move in swarms and overwhelm defenses through sheer speed and volume."
 zombie_brute: "Brute Strain"
 zombie_brute_desc: "A heavily mutated strain that produces larger, more resilient zombies. Brutes absorb tremendous punishment and crash through defensive lines."
 zombie_brute_0: "Brute Strain"
 zombie_brute_0_desc: "A heavily mutated strain that produces larger, more resilient zombies. Brutes absorb tremendous punishment and crash through defensive lines."
 zombie.12.t: "The Virus Spreads to Nigeria"
 zombie.12.d: "The plague has leapt across the continent. Port cities along the Gulf of Guinea report mass casualties as the infected swarm inland from the coast. Nigeria's vast population and dense urban centres make it fertile ground for the spreading horror — West Africa may never be the same."
 zombie.12.a: "Grrr..."
 zombie.13.t: "The Virus Spreads to Brazil"
 zombie.13.d: "The Amazon provides no barrier. The infection emerges in São Paulo and Rio de Janeiro simultaneously, tearing through South America's largest cities with frightening speed. Millions of panicked civilians clog the highways heading inland, unknowingly carrying the virus with them."
 zombie.13.a: "Braaaaiiiinnssss..."
 zombie.14.t: "The Virus Spreads to Turkey"
 zombie.14.d: "Straddling two continents, Turkey becomes the bridge between the Eastern infection and Europe. Outbreaks erupt in Istanbul and Ankara as authorities scramble to contain what is rapidly becoming uncontainable. The Bosphorus, once a symbol of connection, now carries only death."
 zombie.14.a: "Urrgh..."
 zombie.15.t: "The Horde Evolves"
 zombie.15.d: "The virus is changing. Scouts report a new breed of infected among our ranks — faster, more savage variants that move in packs, and larger, more resilient specimens that shrug off small arms fire. The horde grows more dangerous by the day."
 zombie.15.a: "Raaargh!"
 ZOM_cure_developed: "Zombie Cure Prototype"
 ZOM_cure_developed_desc: "Our scientists have developed an experimental cure for the zombie virus. Distributed through coalition supply chains, the vaccine grants all forces fighting the undead a marked combat advantage."
 ZOM_research_cure: "Develop a Cure"
 ZOM_research_cure_desc: "The greatest threat humanity has ever faced demands our greatest scientific effort. By pooling our resources and expertise, we may be able to develop a cure or vaccine that could turn the tide of this war. Upon completion, all nations fighting the Zombie Horde will receive a combat bonus."
 ZOM_establish_safe_zones: "Establish Safe Zones"
 ZOM_establish_safe_zones_desc: "Designate and fortify civilian safe zones to protect non-combatants and maintain public order. Organized evacuation corridors and hardened shelters will buy time and stabilize the home front."
 ZOM_develop_a_cure: "Develop a Cure"
 ZOM_develop_a_cure_desc: "Fund and complete the Develop a Cure decision. Upon success, all nations fighting the Zombie Horde receive a combat bonus against the undead."
 ZOM_protect_civilian_population: "Protect the Civilian Population"
 ZOM_protect_civilian_population_desc: "Maintain stability above 60% to ensure civilian safety and societal cohesion."
 ZOM_global_mobilization: "Global Mobilization"
 ZOM_global_mobilization_desc: "Grow the Anti-Zombie Coalition to at least 8 member nations."
 ZOM_defeat_the_zombie_horde: "Defeat the Zombie Horde"
 ZOM_defeat_the_zombie_horde_desc: "Eliminate the Zombie Horde and end the threat to humanity."
 the_horde_spreads: "The Horde Spreads"
 ZOM_apocalypse_countdown_1yr: "The Outbreak Approaches"
 ZOM_apocalypse_countdown_1yr_desc: "Reports of a mysterious pathogen are surfacing across the globe. Intelligence agencies estimate one year before the situation becomes uncontainable."
 ZOM_apocalypse_countdown_2yr: "The Outbreak Approaches"
 ZOM_apocalypse_countdown_2yr_desc: "Disturbing reports from remote regions describe a pathogen unlike anything seen before. Experts believe we have two years to prepare before it reaches critical mass."
 ZOM_apocalypse_countdown_3yr: "The Outbreak Approaches"
 ZOM_apocalypse_countdown_3yr_desc: "Isolated incidents of unexplained violence and reanimation have been reported. Scientists estimate three years before the virus mutates into its final, unstoppable form."
 zombie_capitulation.1.t: "The Red Dragon Falls"
 zombie_capitulation.1.d: "The most populous nation on Earth has been consumed. China's vast armies, its Great Wall, its billion-strong population — none of it mattered. Beijing fell in days, Shanghai in hours. The sheer density of China's cities turned them into slaughterhouses, and now over a billion corpses march under the banner of the Horde. If China could not hold, what hope remains for the rest of us?"
 zombie_capitulation.1.a: "God help us all."
 zombie_capitulation.1.b: "A billion new soldiers for the Horde."
 zombie_capitulation.2.t: "The Bear Forever Hibernation"
 zombie_capitulation.2.d: "The largest country on Earth has succumbed to the undead plague. Russia's endless expanse of frozen tundra and dense forests, once thought to be a natural fortress against the Horde, proved meaningless against an enemy that does not feel cold, does not tire, and does not stop. Moscow's defenses crumbled, and the Kremlin stands silent. The Horde now commands a territory stretching from Europe to the Pacific."
 zombie_capitulation.2.a: "There is nowhere left to hide."
 zombie_capitulation.2.b: "From sea to frozen sea."
 zombie_capitulation.3.t: "The Eagle No Longer Soars"
 zombie_capitulation.3.d: "The last superpower has fallen. The United States, with all its military might, its nuclear arsenal, and its oceans of separation, could not stop the tide. The Eastern Seaboard was overrun first, then the heartland, and finally the holdouts in the Rockies went silent. The Stars and Stripes no longer flies over Washington. For many, this marks the true end of human civilization as we knew it."
 zombie_capitulation.3.a: "This is the end."
 zombie_capitulation.3.b: "The New World belongs to the dead."
