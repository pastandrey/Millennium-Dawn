 sp_space_weapons: "Space Based Weapons"
 has_completed_space_program_tt: "Has completed special project: §Y$sp_space_program_gdm$§!"
 has_completed_space_weapons_tt: "Has completed special project: §Y$sp_space_weapons_gdm$§!"
 sp_microchip_production: "Microchip Production Laboratories"
 sp_microchip_production_desc: "By experimenting with miniturizing our computing processes, and learning how to make them on a large scale, we will be able to produce our own microchips to use in modern weapons and equipment."
 sp_composite_production: "Composite Production Laboratories"
 sp_composite_production_desc: "By experimenting with new technologies and smelting, mixing, and other chemical methods, we can refine ways to make modern, advanced composite materials."
 sp_recon_land_drone: "Land Reconnaissance Drones"
 sp_recon_land_drone_desc: "Modern land warfare increasingly depends on information superiority and early threat detection. By deploying dedicated reconnaissance drones alongside our ground forces, we extend their awareness far beyond traditional scouting methods. This investment enables faster decision-making, improved coordination, and a clearer picture of the battlefield before direct engagement occurs."
 sp_smart_bullets: "Smart Bullets"
 sp_smart_bullets_desc: "Advances in guidance and targeting are beginning to influence even the smallest elements of the battlefield. By investing in smart ammunition for our infantry and support weapons, we aim to improve accuracy and effectiveness in complex combat environments."
 sp_recon_drone_land: "Ground Reconnaissance Drone Systems"
 sp_recon_drone_land_desc: "With the widespread use of unmanned aerial vehicles on the battlefield, ground reconnaissance drones provide land forces with continuous real-time intelligence over the front line. Operating close to combat units, these drones improve situational awareness, target identification, and coordination without exposing personnel to direct risk."
 sp_airless_tires: "Airless Tires"
 sp_airless_tires_desc: "Mobility remains a critical factor in modern land operations, particularly in harsh and unpredictable environments. By adopting airless tire technology for military vehicles, we can reduce maintenance demands and eliminate vulnerability to punctures. This investment improves operational reliability, allowing our forces to sustain movement even under adverse conditions."
 sp_exoskeletal_engine_tank: "Exoskeletal Engine Systems"
 sp_exoskeletal_engine_tank_desc: "Conventional engines rely on central shafts and discs that carry inherent limitations in weight, stress, and efficiency. By exploring exoskeletal engine designs — where rotating blades are supported within a drum-rotor structure — we aim to reduce weight, improve reliability, and open new possibilities for compact, high-power propulsion."
 sp_nuclear_engine_tank: "Nuclear-Powered Engine Systems"
 sp_nuclear_engine_tank_desc: "Rising fuel demands and extended operational ranges are placing increasing strain on conventional armored logistics. By exploring nuclear-powered engine systems for heavy ground vehicles, we seek to reduce dependence on supply lines while sustaining long-term mobility."
 sp_light_walker_tank_chassis: "Light Walker Tank Chassis"
 sp_light_walker_tank_chassis_desc: "A lightweight bipedal armored chassis designed to traverse broken terrain, rubble, and urban obstacles that constrain conventional tracked vehicles. While its elevated profile and complex actuators introduce maintenance and reliability challenges, a light walker platform can offer exceptional mobility in dense cities and rough ground when properly supported by infantry and drones."
 sp_drone_lrs: "Drone Launch Rocket System"
 sp_drone_lrs_desc: "By replacing conventional rocket munitions with large numbers of expendable drones, this launch system delivers swarm-based firepower across wide areas. Once deployed, the drones disperse to conduct reconnaissance, strike, or loitering attacks, allowing land forces to saturate enemy defenses, adapt to targets in flight, and maintain pressure without relying on traditional missile payloads."
 sp_heavy_walker_tank_chassis: "Heavy Walker Tank Chassis"
 sp_heavy_walker_tank_chassis_desc: "Building on earlier walker concepts, heavy bipedal armored platforms combine thick armor protection with articulated mobility to traverse terrain impassable to conventional heavy tanks. While slower and more mechanically complex, these vehicles emphasize frontal durability and stable weapons platforms, allowing them to support breakthrough operations in dense urban and rugged environments."
 sp_walker_tank_chassis: "Walker Tank Chassis"
 sp_walker_tank_chassis_desc: "Combining armored vehicle design with articulated leg-based mobility, walker tank chassis are intended to operate in terrain where conventional tracked platforms struggle. By stepping over obstacles and navigating uneven ground, these vehicles offer improved flexibility in urban, mountainous, and heavily damaged environments, at the cost of increased mechanical complexity and maintenance demands."
 sp_hover_suspension: "Hover Suspension Systems"
 sp_hover_suspension_desc: "By replacing traditional tracked running gear with lift-generating hover systems, armored personnel carriers gain the ability to move above the ground surface rather than across it. This allows vehicles to traverse mud, snow, water, and debris with reduced ground contact, improving mobility and deployment flexibility while introducing new power and maintenance requirements."
 sp_magneto_explosive_munition: "Magneto-Hydrodynamic Explosive Munitions"
 sp_magneto_explosive_munition_desc: "Heavily armored vehicles continue to drive the development of more advanced anti-tank weapons. By exploring magneto-hydrodynamic explosive munitions, we seek to enhance the penetration and disruptive effects of our guided missiles."
 sp_drone_torpedoes: "Drone Torpedoes"
 sp_drone_torpedoes_desc: "Naval warfare is rapidly evolving, and traditional torpedoes are no longer sufficient against modern threats. By investing in drone-based torpedo systems, we aim to increase our striking power beneath the waves. These new torpedoes are capable of independent target tracking and adaptive engagement, allowing our fleets to maintain the initiative in anti-submarine and naval operations."
 sp_anti_drone_laser_modules: "Anti-Drone Laser Modules"
 sp_anti_drone_laser_modules_desc: "The increasing use of drones and precision-guided munitions at sea is forcing a rethink of naval air defense. By integrating laser-based counter-drone systems into our ships, we can respond to these threats with speed and accuracy that traditional weapons cannot match."
 sp_mineclearing_drone: "Drone Mineclearing Systems"
 sp_mineclearing_drone_desc: "Naval mines remain one of the most persistent and cost-effective threats to maritime operations. By shifting mine countermeasure duties to unmanned drone systems, we reduce the risk to crews while improving the speed and reach of clearance operations."
 sp_naval_recon_drone: "Naval Reconnaissance Drones"
 sp_naval_recon_drone_desc: "Maintaining situational awareness at sea is becoming increasingly complex as naval theaters grow more crowded and contested. By investing in dedicated naval reconnaissance drones, we extend our surveillance reach beyond the limits of manned platforms. These systems allow our fleets to detect, track, and respond to threats earlier, ensuring better-informed command decisions and greater operational flexibility."
 sp_drone_submarine: "Drone Submarine"
 sp_drone_submarine_desc: "Subsurface warfare is shifting toward persistence and deniability rather than raw firepower alone. By developing unmanned submarine platforms, we can maintain a continuous underwater presence without risking crews or high-value assets. These drone submarines allow us to monitor, disrupt, and contest key maritime areas while operating below the threshold of conventional escalation."
 sp_modern_sail_ships: "Modern Sail-Assisted Ships"
 sp_modern_sail_ships_desc: "Rising energy demands and extended naval logistics are forcing a reassessment of how our support fleets operate. By reintroducing modern sail-assisted designs for select vessels, we can reduce fuel consumption while maintaining operational reliability."
 sp_drone_patrol_boat: "Drone Patrol Boats"
 sp_drone_patrol_boat_desc: "Coastal security and maritime patrol duties are increasingly stretched by limited manpower and expanding operational demands. By deploying unmanned patrol boats, we can maintain a constant presence in key coastal and littoral zones without committing larger warships. These platforms allow us to monitor, deter, and respond to low-intensity threats with greater efficiency and flexibility."
 sp_drone_corvette: "Drone Corvettes"
 sp_drone_corvette_desc: "As naval engagements grow more distributed and risk-intensive, the role of smaller surface combatants is being reconsidered. By investing in unmanned or optionally crewed corvette platforms, we can project force and maintain sea control without exposing crews to unnecessary danger."
 sp_rail_gun_naval_battery: "Naval Railgun Battery"
 sp_rail_gun_naval_battery_desc: "While early railgun concepts focused on single high-impact shots, evolving naval combat demands sustained and flexible firepower. By developing a multi-barrel railgun battery, we shift toward higher rates of fire and improved target saturation."
 sp_nuclear_torpedoes: "Nuclear Torpedoes"
 sp_nuclear_torpedoes_desc: "As naval deterrence shifts toward undersea dominance, conventional payloads alone may no longer be sufficient. By developing nuclear-armed torpedoes, we introduce a weapon capable of denying vast maritime areas and decisively countering high-value naval formations."
 sp_fusion_reactor_engine: "Fusion Reactor Engine"
 sp_fusion_reactor_engine_desc: "The growing power demands of modern naval systems are pushing conventional propulsion and energy generation to their limits. By investing in fusion-based reactor engines for our ships, we aim to support advanced weapons, sensors, and propulsion without compromising endurance. This project lays the foundation for a new generation of high-energy naval platforms, ensuring long-term operational superiority at sea."
 sp_naval_swarm_module: "Naval Swarm Drone Launch Systems"
 sp_naval_swarm_module_desc: "With the integration of modular launch systems aboard surface vessels, naval platforms gain the ability to deploy large numbers of autonomous drones for reconnaissance, electronic warfare, and strike missions. These swarming systems extend a ship's sensor range, overwhelm enemy defenses, and provide flexible force projection without exposing the host vessel to direct engagement."
 sp_radar_jamming_module: "Naval Radar Jamming Systems"
 sp_radar_jamming_module_desc: "By employing advanced electronic warfare suites designed to disrupt and degrade enemy radar systems, surface vessels can obscure their true position and movements at sea. These jamming systems interfere with target acquisition and fire control, reducing the effectiveness of hostile sensors and increasing survivability during naval engagements."
 sp_anti_torpedo_module: "Naval Anti-Torpedo Systems"
 sp_anti_torpedo_module_desc: "By employing dedicated anti-torpedo defense suites designed to detect, classify, and neutralize incoming underwater threats, surface vessels can reduce the risk posed by modern torpedoes during transit and combat operations. These systems combine rapid sonar tracking, automated countermeasure deployment, and intercept solutions to disrupt guidance and defeat torpedoes before impact, improving survivability in contested waters."
 sp_anti_ship_drone_missile: "Anti-Ship Drone Missiles"
 sp_anti_ship_drone_missile_desc: "Naval strike capabilities are increasingly defined by reach, precision, and survivability. By developing drone-based anti-ship missile systems, we can extend our ability to threaten hostile vessels while reducing the risk to manned aircraft."
 sp_hover_helicopter_engine: "Hover-Capable Helicopter Engines"
 sp_hover_helicopter_engine_desc: "Urban environments and confined terrain are placing new demands on rotary-wing aviation. By developing hover-capable engine systems, we aim to improve low-speed stability and vertical control during complex operations."
 sp_hypersonic_engine: "Hypersonic Propulsion Systems"
 sp_hypersonic_engine_desc: "Air superiority is increasingly shaped by speed, reach, and the ability to penetrate defended airspace. By investing in hypersonic propulsion systems, we seek to push beyond the limits of conventional aircraft performance."
 sp_awacs_project: "Airborne Warning and Control System"
 sp_awacs_project_desc: "With the increasing complexity of modern air operations, airborne warning and control systems have become a critical capability for advanced air forces. By mounting powerful radar arrays and command systems onto long-endurance aircraft platforms."
 sp_fiber_drones: "Fiber-Optic Guided Drone"
 sp_fiber_drones_desc: "With the rapid development of unmanned systems and electronic warfare, fiber-optic guided drones have emerged as a solution to counter jamming and signal interference. By transmitting control signals through physical fiber links rather than radio communications, these drones can operate reliably in contested environments while maintaining precise control over their payloads."
 sp_air_railguns: "Air-to-Air Railgun"
 sp_air_railguns_desc: "With the continuous search for higher engagement speeds and extended interception ranges, air-to-air railguns have been proposed as an alternative to conventional missile systems."
 sp_air_railguns_helicopter: "Helicopter Railgun"
 sp_air_railguns_helicopter_desc: "By integrating compact electromagnetic cannons into rotary-wing platforms, helicopters can deliver extremely high-velocity fire capable of penetrating hardened targets that would normally require heavier aircraft or ground systems"
 sp_space_artillery: "Orbital Fire Support"
 sp_space_artillery_desc: "With the increasing integration of space-based systems into modern warfare, the concept of orbital fire support has emerged as a means to deliver precision strikes from space onto ground targets."
 sp_air_pdl: "Point Defense Lasers"
 sp_air_pdl_desc: "With the growing threat of high-speed missiles and saturation attacks, airborne point defense lasers provide a means of intercepting incoming threats at the speed of light. By mounting high-energy laser systems on aircraft platforms, these weapons can engage and neutralize missiles in flight, reducing reliance on limited interceptor stocks and improving survivability in contested airspace."
 sp_air_helicopter_drone_control: "Helicopter Drone Control"
 sp_air_helicopter_drone_control_desc: "Integrating a full drone control architecture into rotary-wing platforms transforms helicopters into airborne command nodes for unmanned reconnaissance and strike assets. This approach reduces the need to risk crews on routine exposure tasks while improving coordination, targeting, and tempo across the battlespace. The capability is expensive to field, demanding advanced avionics, secure datalinks, and additional power and cooling capacity."
 sp_air_gunship_railcannons: "Gunship Railcannons"
 sp_air_gunship_railcannons_desc: "This project mounts heavy railcannon arrays onto dedicated gunship airframes, creating an aircraft that can shred targets with sustained electromagnetic fire. With extreme muzzle velocity and precision fire control, it can dismantle drones, aircraft, and ground formations faster than conventional guns can react. The capability is ruinously expensive, demanding exceptional power generation, advanced cooling, and high-grade materials to keep the system operational."
 sp_deep_sea_mining: "Deep Sea Mining"
 sp_deep_sea_mining_desc: "Growing industrial and technological demands are placing increasing pressure on traditional resource supply chains. By investing in deep sea mining capabilities, we aim to secure access to critical minerals located beyond conventional extraction zones."
 sp_agriculture_drone: "Agricultural Drone Systems"
 sp_agriculture_drone_desc: "Feeding a growing population while preserving efficiency is becoming a central strategic challenge. By introducing advanced agricultural drone systems, we can modernize farming practices through improved monitoring, precision treatment, and automation."
 sp_vertical_farming: "Vertical Farming"
 sp_vertical_farming_desc: "Urbanization and land scarcity are reshaping how food production must be approached. By investing in vertical farming, we shift agricultural output into controlled, high-density environments that are less dependent on weather and geography."
 sp_robotic_humanoid: "Domestic Robotic Assistants"
 sp_robotic_humanoid_desc: "As daily life becomes more technologically integrated, there is growing potential for humanoid robots to assist people within their homes. By developing domestic robotic assistants, we aim to support everyday tasks such as household maintenance, caregiving, and personal assistance."
 sp_robotic_surgery: "Robotic Surgery"
 sp_robotic_surgery_desc: "Medical systems are facing increasing pressure from aging populations and rising healthcare demands. By expanding the use of robotic-assisted surgery, we aim to improve precision, reduce recovery times, and make advanced procedures more widely available."
 sp_smart_grid: "Smart Grid Infrastructure"
 sp_smart_grid_desc: "Growing energy consumption and the integration of advanced technologies are placing new demands on national power networks. By investing in smart grid infrastructure, we can better manage electricity distribution, balance supply and demand, and reduce systemic inefficiencies."
 sp_equipment_recycling: "Military Equipment Recycling Program"
 sp_equipment_recycling_desc: "A comprehensive program to recover, refurbish, and recycle obsolete or damaged military equipment. By reclaiming critical materials and components from decommissioned platforms, the armed forces can reduce industrial strain, improve supply resilience, and partially offset production losses during prolonged conflicts."
 sp_epigenetic_reprogramming: "Epigenetic Reprogramming"
 sp_epigenetic_reprogramming_desc: "A biomedical research program focused on altering gene expression without modifying DNA sequences, aiming to enhance physical resilience, cognitive performance, and recovery rates in military personnel. While offering potential long-term advantages in training efficiency and combat readiness, the program raises ethical concerns and requires strict regulatory oversight."
 sp_nuclear_energy: "Nuclear Energy Reactor"
 sp_nuclear_energy_desc: "Nuclear reactors are good for producing materials for bombs. But the amount of energy produced could instead supply civilian and military industry with power."
 sp_nuclear_bomb: "Nuclear Fission Bomb Project"
 sp_nuclear_bomb_desc: "A bomb using the process of nuclear fission to release the stored energy of the atom in one apocalyptic moment. With such a weapon in our arsenal, who would dare oppose us?"
 sp_amws_combat_system: "AMWS-21 Combat System"
 sp_zamws_advanced_mws: "XAMWS-24 Advanced Multiple Weapon System"
 sp_xciws_close_in_weapon_system: "XCIWS-2B Close In Weapon System"
 sp_close_range_battle_halberd: "Type-77 Close Range Battle Halberd"
 sp_great_sword: "BWS-3 Great Sword"