 IS_un_humaid_button_text: "§YUN Aid§!"
 IS_un_humaid_button_text_tt: "Opens the §YUN Aid§! screen. Here we can fund programs such as UNDP, UNIDO, and UNCDF, to help developing nations grow."
 IS_gen_assembly_button_text: "§YGeneral Assembly§!"
 IS_gen_assembly_button_text_tt: "Opens the §YGeneral Assembly§! screen. This allows world affairs to be managed by the entire assembly of §BUN§! Nations."
 IS_sec_con_button_text: "§YSecurity Council§!"
 IS_sec_con_button_text_tt: "Opens the §YSecurity Council§! screen. Here, the §BUnited Nations§! can §Rimpose sanctions§!, §Rauthorize military force§!, and §Gattempt conflict resolution§!"
 IS_domestic_terror_prevention_text: "§YCounter-Terror Operations§!"
 IS_domestic_terror_prevention_text_tt: "Opens the §YCounter-Terror Operations§! screen. Here we can manage our counter-terror operations in the nation."
 IS_international_terror_hunt_text: "§YGlobal War on Terror§!"
 IS_international_terror_hunt_text_tt: "Opens the §YGlobal War on Terror§! screen. Here we can participate in the global war on terror, and attempt to hunt down and defeat international terror organizations."
 recog_cat_nation_guide_tt: "As an unrecognized nation, we must strive to get the §CUnited Nations§! to recognize us as an independent state. Through working with allies, petitioning the §CUN§!, and other political maneuvering, we will eventually be able to get the support needed to §YAscend§!"
 is_un_is_recognized_nation: "[THIS.GetNameWithFlag] is a recognized §BUN§! Member State"
 is_un_ascension_warning_tt: "§RNOT§! have recently submitted a §BUN§! §YAscension§! request. We must wait §Y[?recent_un_ascension_attempt:days_left|0] days§! before submitting another attempt."
 un_ascent_effect_tt: "Submits a request for §BUN§! §YAscension§!, starting with a §YSecurity Council§! Vote, and then proceeding to a §YGeneral Assembly§! vote if the §YSecurity Council§! vote passes.\n\nTo achieve §YInternational Recognition§! and be accepted as a §BUnited Nations§! state, we must accomplish the following:\n\n§GPass§! a recommendation vote in the §YSecurity Council§!, requiring §Y9§! §GYes§! votes in total and §Y0§! §RNo§! votes by a §YPermanent Security Council Member§!\n\n§GPass§! a §Y2/3§! majority vote in the §BUnited Nations§! §YGeneral Assembly§!, after §GPassing§! the §YSecurity Council§! vote."
