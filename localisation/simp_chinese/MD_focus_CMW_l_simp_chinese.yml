l_simp_chinese:
 CMW_focus: "英联邦国策树"
 Commonwealth_member_modifier: "英联邦成员"
 CMW_Aso_Rock_Declaration: "阿索罗克宣言"
 CMW_Aso_Rock_Declaration_desc: "英联邦阿索罗克宣言是2003年在尼日利亚阿布贾举行的英联邦政府首脑会议上发表的一项重要声明。该宣言重申了英联邦致力于促进民主、善治、人权和可持续经济发展的承诺。它强调了成员国之间相互尊重、包容与合作对于有效应对全球挑战的重要性。"
 CMW_of_Learning: "英联邦学习共同体"
 CMW_of_Learning_desc: "英联邦学习共同体是英联邦的一个政府间组织，总部位于加拿大温哥华都会区，与英联邦的各个合作伙伴和国际发展机构合作，推进开放式学习和远程教育。"
 CMW_New_Petroleum_Group: "石油生产国讨论小组"
 CMW_New_Petroleum_Group_desc: "新兴石油生产国讨论小组是一个合作平台，供新兴石油生产国分享对石油行业发展的见解和战略。"
 CMW_Hub_And_Spokes_Program: "枢纽辐射式贸易计划"
 CMW_Hub_And_Spokes_Program_desc: "枢纽辐射贸易计划是一项旨在促进多国之间贸易伙伴关系的倡议，尤其侧重于能力建设和与贸易相关的发展工作。"
 CMW_Leaving_The_Organisation: "退出英联邦"
 CMW_Leaving_The_Organisation_desc: "退出英联邦的决定标志着国际关系的一次重大转变。此举反映了外交政策的战略调整，将国家主权和独立置于传统联盟之上。通过退出英联邦，[ROOT.GetNamewithFlag]寻求建立新的伙伴关系，并在全球事务中走一条更加自主的道路。"
 CMW_Leaving_The_Organisation_tt: "[ROOT.GetNamewithFlag]移除§H英联邦成员国§!"
 CMW_Charter: "英联邦宪章"
 CMW_Charter_desc: "英联邦宪章是一份文件，概述了英联邦的共同价值观和原则。英联邦是由54个成员国组成的团体，致力于人权、可持续发展和法治。"
 CMW_Ministerial_Action_Group: "部长级行动小组"
 CMW_Ministerial_Action_Group_desc: "英联邦部长行动小组是由英联邦成员国部长组成的机构，负责处理和应对成员国治理和政治发展相关问题，以维护英联邦价值观。"
 CMW_Kampala_Review: "坎帕拉重估"
 CMW_Kampala_Review_desc: "2007年英联邦政府首脑会议期间举行的坎帕拉重估旨在评估和提升英联邦在促进民主、发展和良好治理方面的成效。此次重估的重点是加强英联邦应对当代全球挑战的能力，确保其价值观和目标对所有成员国都具有现实意义和影响力。"
 CMW_Anti_Corruption_Centre: "英联邦非洲反腐败中心"
 CMW_Anti_Corruption_Centre_desc: "英联邦非洲反腐败中心是英联邦内部设立的机构，旨在解决和打击非洲成员国的腐败问题，促进透明度和良好治理。"
 CMW_Association_Legislative_Council: "协会立法委员会"
 CMW_Association_Legislative_Council_desc: "英联邦立法顾问协会是一个汇集了为英联邦成员国立法机构和议会提供咨询和支持的法律专业人士的组织。它促进立法顾问之间的合作和专业知识共享。"
 CMW_Connectivity_Agenda: "英联邦互联互通议程"
 CMW_Connectivity_Agenda_desc: "英联邦互联互通议程是一个平台，各国可以在此交流贸易和投资方面的最佳实践和经验，并进行国内改革。"
 CMW_Parliament: "英联邦议会"
 CMW_Parliament_Desc: "英联邦议会的成立标志着成员国之间政治一体化与合作迈出了重要一步。该立法机构旨在促进对话、弘扬民主价值观并监督英联邦政策的实施。它为所有成员国的代表提供了一个平台，共同探讨和应对共同挑战，从而促进团结和集体行动。"
 CMW_Parliament_tt: "所有§H英联邦成员国§!都允许在其境内举行选举。"
 CMW_Legal_Education_Association: "英联邦法律教育协会"
 CMW_Legal_Education_Association_desc: "英联邦法律教育协会是一个促进英联邦成员国之间法律教育与合作的组织。"
 CMW_School_Leaders: "秘书处专业标准"
 CMW_School_Leaders_desc: "秘书处教师和学校领导专业标准框架是一套指导方针和基准，旨在提高秘书处管辖范围内教育工作者和学校领导的专业发展和绩效。"
 CMW_Trade_Association: "英联邦贸易协会"
 CMW_Trade_Association_desc: "英联邦贸易协会旨在加强成员国之间的经济合作和贸易关系。通过营造更加一体化和协作的贸易环境，英联邦贸易协会力求降低关税、简化海关程序并促进可持续经济增长。"
 CMW_Joint_Research_Initiative: "英联邦联合研究计划"
 CMW_Joint_Research_Initiative_desc: "英联邦联合研究计划是一项旨在促进成员国之间科学技术创新合作的举措。该计划鼓励知识、资源和专业技能的共享，以应对气候变化、医疗保健和可持续发展等共同挑战。通过构建研究机构和专家网络，英联邦致力于推动进步和创新，造福所有成员国。"
 CMW_Valuta: "采用共同货币"
 CMW_Valuta_desc: "英联邦共同货币的推出标志着英联邦在经济一体化进程中迈出了历史性的一步。这种共同货币旨在促进贸易、增强金融稳定并推动成员国之间的经济合作。通过采用英联邦共同货币，英联邦的目标是减少货币兑换壁垒、稳定区域经济并促进更加统一的经济共同体。"
 CMW_Promoting_Democracy: "宣扬意识形态"
 CMW_Promoting_Democracy_desc: "我们将使英联邦与英国结盟，以增强我们在世界上的外交影响力。"
 CMW_Counter_Insurgency_Training: "英联邦反叛乱日"
 CMW_Counter_Insurgency_Training_desc: "英联邦反叛乱训练计划旨在提升英联邦成员国有效应对和减轻叛乱威胁的能力。该计划提供专门的培训、资源和专业知识，帮助各国管理和应对内部安全挑战，从而促进稳定与和平。"
 CMW_Cyber_Declaration: "英联邦网络宣言计划"
 CMW_Cyber_Declaration_desc: "英联邦网络宣言计划是一项旨在解决网络安全问题并促进英联邦成员国之间合作以加强数字安全和抵御网络威胁的倡议。"
 CMW_Intelligence_Network: "英联邦情报网络"
 CMW_Intelligence_Network_desc: "由新成立的英联邦情报局牵头组建的英联邦情报网络旨在加强成员国之间的安全和情报共享。该网络促进关键信息的交流、协同反间谍行动以及对全球威胁的统一应对。通过加强情报合作，英联邦力求保护其成员国免受间谍活动、恐怖主义和网络威胁。"
 CMW_Patrol_Boat_Program: "英联邦巡逻艇计划"
 CMW_Patrol_Boat_Program_desc: "英联邦巡逻艇计划是一项战略举措，涉及英联邦成员国合作开发和部署海上巡逻艇。这些舰艇旨在加强海上安全、保护领海并支持各种海军任务，从而为英联邦地区的安全与稳定做出贡献。"
 CMW_Chief_Of_Staff: "英联邦参谋长"
 CMW_Chief_Of_Staff_desc: "英联邦参谋长是一个高级职位，负责监督和协调英联邦成员国的军事行动和战略。这一职位在确保英联邦的安全和国防方面发挥着至关重要的作用，同时也有助于促进各国军队之间的合作和战备，以维护和平与稳定。"
 CMW_Secretariat_CVE: "秘书处打击暴力极端主义部门"
 CMW_Secretariat_CVE_desc: "英联邦秘书处打击暴力极端主义部门是英联邦秘书处内的一个专门部门，负责处理和打击英联邦成员国境内的暴力极端主义，重点是防止激进化和促进和平与稳定。"
 CMW_Offices_For_Peace: "英联邦和平办公室"
 CMW_Offices_For_Peace_desc: "英联邦和平办公室的设立彰显了英联邦对全球和平与冲突解决的承诺。这些办公室分布在成员国的关键地区，致力于调解冲突、促进外交斡旋和支持和平建设倡议。"
 CMW_Academy: "英联邦军事学院"
 CMW_Academy_desc: "英联邦军事学院的设立旨在为所有成员国的军官提供高级军事训练和教育。该学院致力于提升军官的专业技能、战略知识和领导能力。通过推广共同的训练标准和培养合作精神，英联邦军事学院增强了英联邦的集体防御能力。"
 CMW_Training_Day: "世界领土培训"
 CMW_Training_Day_desc: "世界领土培训是一项旨在提高各国应对领土和边界相关问题的准备和能力的全球性计划。该计划提供培训和资源，以增进对地理边界的理解和管理，帮助各国解决边界争端，促进和平共处，并维护全球领土稳定。"
 CMW_Defense_Treaty: "英联邦防御条约"
 CMW_Defense_Treaty_desc: "英联邦防务条约是英联邦成员国之间一项重要的国际协议，概述了成员国之间的共同防御承诺和义务。该条约构成了一个集体安全框架，成员国承诺在面临外部威胁或侵略时相互支持，从而强化了维护英联邦所有缔约国安全和主权的承诺。"
 CMW_New_CMW: "新英联邦"
 CMW_New_CMW_desc: "经过一系列全面改革，英联邦焕然一新，已做好应对全新全球挑战的准备。这些改革实现了治理结构的现代化，简化了决策流程，并强化了对民主、发展和人权等核心价值观的承诺。如今，新的英联邦已蓄势待发，将引领成员国迈入合作、包容和韧性的新时代，迎接21世纪的复杂挑战。"
 CMW_Fintech_Toolkit: "英联邦教育框架"
 CMW_Fintech_Toolkit_desc: "英联邦金融科技套件是一个旨在支持英联邦成员国金融科技发展和创新的资源。"
 CMW_Education_Framework: "英联邦教育框架"
 CMW_Education_Framework_desc: "英联邦教育框架是一个综合体系，旨在指导英联邦成员国的教育政策和实践。"
 CMW_CFTC: "英联邦技术合作基金"
 CMW_CFTC_desc: "英联邦技术合作基金是一个金融机制，旨在帮助英联邦成员国实施技术合作项目和发展倡议。"
 CMW_Debt_Swaps: "英联邦债务互换"
 CMW_Debt_Swaps_desc: "英联邦债务互换是指英联邦内部的金融协议或倡议，涉及债务的交换或重组，以此作为解决成员国经济和金融挑战的手段。"
 CMW_Climate_Hub: "英联邦气候融资准入中心"
 CMW_Climate_Hub_desc: "英联邦气候融资准入中心是英联邦内部设立的一个平台，旨在促进成员国获得气候融资，并支持其应对气候变化和可持续发展相关举措。"
 CMW_Blue_Charter: "英联邦蓝色宪章"
 CMW_Blue_Charter_desc: "英联邦蓝色宪章是英联邦成员国为合作解决和保护世界海洋及海洋环境的健康和可持续性而作出的承诺。"
 CMW_Living_Lands: "生命土地宪章"
 CMW_Living_Lands_desc: "生命土地宪章是英联邦通过的一项开创性的环境倡议。该宪章承诺成员国将致力于可持续的土地管理实践、生物多样性保护和应对气候变化。通过促进植树造林、土壤修复和自然栖息地保护，英联邦旨在确保子孙后代能够继承一个健康且具有韧性的环境。"
 CMW_Health_Section: "秘书处卫生科"
 CMW_Health_Section_desc: "英联邦秘书处卫生科是英联邦秘书处下属的一个部门，负责向英联邦成员国提供与医疗保健、公共卫生以及英联邦内部卫生政策和方案制定相关的支持和指导。它在促进成员国之间在卫生领域的合作和最佳实践分享方面发挥着重要作用。"
 CMW_Body_And_Sports: "英联邦体育咨询机构"
 CMW_Body_And_Sports_desc: "英联邦体育咨询机构是一个委员会，负责就体育相关政策和方案向英联邦成员国提供建议和指导，重点是通过体育运动促进社会发展、健康和福祉。"
 CMW_Youth_Networks: "英联邦青年网络"
 CMW_Youth_Networks_desc: "英联邦青年网络是指英联邦内部专门面向青年的团体或组织，旨在促进英联邦成员国青年之间的合作、信息共享和集体行动。这些网络通常关注与青年息息相关的问题，例如教育、就业和社会发展。"
 CMW_Defense_Association: "英联邦防卫协会"
 CMW_Defense_Association_desc: "英联邦防务协会是由英联邦成员国组成的合作联盟，致力于加强其集体防御能力和安全。该联盟为英联邦成员国之间的相互支持、战略协调以及共同追求英联邦内部的和平与稳定提供了一个平台。"
 CMW_Leaving.1.t: "[THIS.GetName]已退出英联邦"
 CMW_Leaving.1.d: "[THIS.GetName]已正式宣布退出英联邦。此举标志着其外交政策的重大转变，反映出其寻求更大自主权和建立新的国际联盟的愿望。退出英联邦可能会影响英联邦内部的外交关系和经济联系，给退出国和剩余成员国都带来新的挑战和机遇。"
 CMW_Leaving.1.a: "祝你好运"
 Commonwealth_allies_tech_share_name: "英联邦教育框架"
 Commonwealth_allies_tech_share_desc: "英联邦教育框架为各成员国的教育标准和实践确立了统一的方法。"
 CMW_Patrol_Boat_Program_Member: "英联邦巡逻艇计划"
 CMW_Patrol_Boat_Program_Leader: "英联邦巡逻艇项目发起人"
 Commonwealth_member_modifier_desc: "作为英联邦成员国，我国受益于与其他成员国之间牢固的外交关系和经济合作。这一历史悠久的联盟为我们提供了一个互助互惠、共享价值观的网络，提升了我们的国际地位和贸易机遇。然而，如何在维护国家主权与维护英联邦集体利益之间取得平衡，有时也会带来外交和政治上的挑战。"