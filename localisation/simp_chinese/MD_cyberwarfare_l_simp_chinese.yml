 cyber_counter_intrusion_complete_tt: "反入侵扫描完成。所有检测到的外来植入程序和持久性有效载荷均已从我们的网络中移除。"
 cyber_attribution_hunt_complete_tt: "归责调查完成。情报分析人员已完成对近期入侵活动的取证审查。"
 cyber_gps_tracking_complete_tt: "GPS干扰行动已完成。我方信号小组已完成对目标卫星导航系统的干扰。"
 cyber_economic_tracking_complete_tt: "经济动荡行动已完成。我们的网络团队已结束针对敌方金融基础设施的攻击行动。"
 cyber_propaganda_tracking_complete_tt: "宣传行动已完成。我们的信息部门已结束针对目标人群的影响宣传活动。"
 cyber_infra_tracking_complete_tt: "基础设施攻击已完成。我方特工已结束对敌方关键基础设施的持续攻击。"
 cyber_crit_tracking_complete_tt: "致命一击行动完成。我方部队已对目标最关键的系统执行了高优先级攻击载荷。"
 cyber_sigint_surveillance_tracking_complete_tt: "信号情报监视行动已结束。我方截获小组已完成对目标信号情报的采集。"
 cyber_radar_spoofing_tracking_complete_tt: "雷达欺骗行动已完成。我方电子战小组已完成对敌方空中监视网络的干扰。"
 cyber_election_interference_tracking_complete_tt: "选举干涉行动已结束。我方影响力部门已结束针对敌方选举进程的秘密行动。"
 cyber_industrial_espionage_tracking_complete_tt: "工业间谍行动已完成。我方特工已从敌方获取了目标研发数据。"
 cyber_comms_intercept_tracking_complete_tt: "通信拦截行动已完成。我方团队已结束对敌方指挥控制网络的持续渗透。"
 cyber_financial_system_attack_tracking_complete_tt: "金融系统攻击已完成。我方部队已完成针对敌方银行和支付基础设施的行动。"
 cyber_logistics_disruption_tracking_complete_tt: "后勤中断行动已完成。我方特工已结束针对敌方供应链和配送系统的行动。"
 cyber_sleeper_network_tracking_complete_tt: "沉睡网络部署已完成。我们的团队已在敌方网络中植入持久访问工具，以备将来激活。"
 cyber_deception_campaign_tracking_complete_tt: "欺骗行动已结束。我方特工已完成旨在误导敌方情报分析人员的假旗行动。"
 cyber_zero_day_strike_tracking_complete_tt: "零日攻击已完成。我方部队已对敌方关键系统中一个未公开的漏洞实施了高影响力攻击。"
 cyber_network_hardening_active: "网络已强化"
 cyber_network_hardening_active_desc: "我们的网络安全团队已加强身份验证系统，修复了已知漏洞，并隔离了关键访问通道。只要这些防御措施持续有效，境外入侵企图成功的可能性就会显著降低。"
 cyber_counter_intrusion_active: "反入侵扫描"
 cyber_counter_intrusion_active_desc: "分析人员正在积极搜寻我们网络中的外国势力活动 - 梳理日志、隔离异常进程并清除持久性植入程序。所有政府系统的运行安全意识均已提高。"
 cyber_attribution_hunt_active: "归责调查进行中"
 cyber_attribution_hunt_active_desc: "数字取证团队正在重建攻击路径，并对攻击者的特征进行编目。收集到的情报将加强我们的防御，并为采取适当的应对措施提供依据。"
 MD_cyber.201.t: "渗透已清除"
 MD_cyber.201.d: "我们的反入侵小组已完成全面排查。所有外国入侵工具、监控植入程序和持久性后门均已被识别并清除。我们的网络已恢复安全。"
 MD_cyber.201.a: "干得好。保持警惕。"
 MD_cyber.202.t: "扫描完成 - 网络清朗"
 MD_cyber.202.d: "我们的反入侵小组已完成对所有关键系统的扫描。未检测到任何外国入侵工具或监控植入程序。我们的网络目前看来安全无虞。"
 MD_cyber.202.a: "保持秘密监控。"
 MD_cyber.1.t: "行动成功"
 MD_cyber.1.d: "我们的网络团队成功执行了此次行动。没有留下任何痕迹 - 目标方没有发现我们参与其中的任何迹象。"
 MD_cyber.1.a: "干得漂亮"
 MD_cyber.2.t: "检测到外国入侵"
 MD_cyber.2.d: "我们的安全团队已发现外部网络入侵迹象。攻击者有效地掩盖了其来源 - 我们无法确定责任方。"
 MD_cyber.2.a: "加强我们的防御。"
 MD_cyber.3.t: "[?disp_name_agressor.GetNameWithFlag]的网络攻击已被认定"
 MD_cyber.3.d: "我们的情报部门追踪到近期由[?disp_name_agressor.GetNameWithFlag]发起的网络入侵。此次攻击是蓄意且有针对性的。我们已提出正式外交抗议。"
 MD_cyber.3.a: "谴责侵略者。"
 MD_cyber.4.t: "行动中止"
 MD_cyber.4.d: "我们的网络团队未能成功入侵目标系统，行动在采取任何行动之前便已中止。我们需要进行更多准备工作。"
 MD_cyber.4.a: "重新集结并评估。"
 MD_cyber.11.t: "GPS信号中断"
 MD_cyber.11.d: "各军事单位报告卫星导航系统大范围故障。前线指挥官难以有效协调行动。怀疑是外部信号干扰攻击所致。"
 MD_cyber.11.a: "切换到备用导航。"
 MD_cyber.12.t: "金融网络遭到破坏"
 MD_cyber.12.d: "银行、交易所和支付处理机构报告称，系统出现连锁故障。此次中断并非偶然 - 我们的分析师认为，外国势力已将目标对准了我们的金融基础设施。"
 MD_cyber.12.a: "隔离并控制损失。"
 MD_cyber.13.t: "信息空间遭到渗透"
 MD_cyber.13.d: "社交媒体平台和新闻网络正被大量有组织的虚假信息所淹没。公众对政府的信任度正在下降。我们的分析人士认为这是一起外国势力干预行动。"
 MD_cyber.13.a: "发起一场反叙事运动。"
 MD_cyber.14.t: "关键基础设施遭受攻击"
 MD_cyber.14.d: "发电站、交通枢纽和通信节点同时发生故障。工程师报告称，我们的控制系统出现了蓄意破坏的迹象。事态已显著升级。"
 MD_cyber.14.a: "宣布国家进入紧急状态。"
 MD_cyber.15.t: "灾难性的网络攻击"
 MD_cyber.15.d: "全国所有关键系统同时遭到攻击 - 金融网络、电网、军事通信和供应链。此次攻击的规模和精准度前所未有。国家陷入瘫痪。"
 MD_cyber.15.a: "调动我们所有资源。"
 MD_cyber.16.t: "通讯受损"
 MD_cyber.16.d: "外国特工已渗透到我们的加密通信渠道。敏感信息传输很可能正被敌对国家行为体监听。"
 MD_cyber.16.a: "启动通信封锁。"
 MD_cyber.17.t: "雷达网络中断"
 MD_cyber.17.d: "我们的防空雷达网络出现错误读数。大量虚假目标令操作员应接不暇 - 敌机可能正在利用这种混乱局面。"
 MD_cyber.17.a: "切换到备用检测协议。"
 MD_cyber.18.t: "发现外国势力干预行动"
 MD_cyber.18.d: "有证据表明，一场有组织的外国势力干预我国国内政治局势的活动正在展开。虚假信息正通过社交媒体网络传播，加剧公众分裂。"
 MD_cyber.18.a: "谴责外国干涉。"
 MD_cyber.19.t: "研究网络遭到入侵"
 MD_cyber.19.d: "我们的国家实验室和国防承包商的机密研究数据和工业设计遭到窃取。目前仍在评估盗窃事件的全部范围。"
 MD_cyber.19.a: "对所有机密系统进行审计。"
 MD_cyber.110.t: "指挥网络被渗透"
 MD_cyber.110.d: "我们的军事和外交通信渠道已被渗透。敌方人员正在实时截获命令和敏感信件。"
 MD_cyber.110.a: "清除所有被入侵的通道。"
 MD_cyber.111.t: "中央银行系统遭受攻击"
 MD_cyber.111.d: "我们的中央银行和主要金融清算基础设施遭受了持续的网络攻击。交易处理已经停止，货币市场正在迅速动荡。"
 MD_cyber.111.a: "宣布进入财务紧急状态。"
 MD_cyber.112.t: "军事供应链中断"
 MD_cyber.112.d: "负责前线后勤管理的指挥控制软件在多个部门发生崩溃。随着故障蔓延至整个系统，前线部队报告物资短缺。"
 MD_cyber.112.a: "恢复人工供应流程。"
 MD_cyber.113.t: "检测到持续入侵"
 MD_cyber.113.d: "我们的安全部门在关键网络基础设施深处发现了休眠的接入点。这些植入式设备非常复杂，而且可能已经运行了一段时间。"
 MD_cyber.113.a: "启动全面的网络审计。"
 MD_cyber.114.t: "指挥情报泄露"
 MD_cyber.114.d: "我们的情报部门已发现一起系统性的伪造信号和虚假通信活动。我们的军事指挥官可能受到了蓄意误导的信息影响。"
 MD_cyber.114.a: "成立信号核查工作组。"
 MD_cyber.115.t: "零日攻击"
 MD_cyber.115.d: "一次毁灭性的精准网络攻击利用前所未见的漏洞，同时袭击了我们最关键的系统。工业控制系统、电力基础设施和国防网络均受到影响。"
 MD_cyber.115.a: "启动国家网络应急预案。"
 cyber_propaganda_ops_malus: "信息空间遭到渗透"
 cyber_propaganda_ops_malus_desc: "一场有组织的外国虚假信息宣传活动正在积极削弱公众对我国政府和机构的信任，压制政治产出，破坏国家凝聚力。"
 cyber_gps_jamming_malus: "GPS系统中断"
 cyber_gps_jamming_malus_desc: "外国网络作战人员破坏了我们的军事卫星导航基础设施，严重削弱了部队协调和战场态势感知能力。"
 cyber_economic_disruption_malus: "金融网络遭到破坏"
 cyber_economic_disruption_malus_desc: "持续不断的外国网络攻击正在削弱我们的银行系统、支付网络和工业产出。经济复苏需要时间。"
 cyber_infrastructure_damage_malus: "基础设施损坏"
 cyber_infrastructure_damage_malus_desc: "外国网络攻击者对我们的关键基础设施造成了重大破坏，阻碍了物流、建设和物资配送。"
 cyber_critical_strike_malus: "灾难性的网络攻击"
 cyber_critical_strike_malus_desc: "一场毁灭性的全方位网络攻击同时瘫痪了我们的工业基础、通信和供应链。恢复过程将漫长而痛苦。"
 cyber_sigint_surveillance_malus: "通信受到监控"
 cyber_sigint_surveillance_malus_desc: "外国特工已渗透到我们的加密通信基础设施中。敏感信息传输可能正被监听，这阻碍了协调一致的政治行动。"
 cyber_radar_spoofing_malus: "雷达网络遭到入侵"
 cyber_radar_spoofing_malus_desc: "外国网络作战人员正在向我们的防空雷达网络输入虚假回波，降低我们的探测和拦截能力。"
 cyber_election_interference_malus: "外国影响力活动活跃"
 cyber_election_interference_malus_desc: "一场有组织的外国虚假信息宣传活动正在削弱公众信心，并加深国内政治分裂。"
 cyber_industrial_espionage_malus: "研究网络遭到入侵"
 cyber_industrial_espionage_malus_desc: "我们的国家实验室和国防承包商的机密研究数据和工业设计被窃取，阻碍了我们的研发计划。"
 cyber_comms_intercept_malus: "指挥网络遭到入侵"
 cyber_comms_intercept_malus_desc: "我们的军事和外交通信系统已被渗透。行动安全受到威胁，协调工作也受到影响。"
 cyber_financial_system_attack_malus: "金融基础设施遭受攻击"
 cyber_financial_system_attack_malus_desc: "对我们的中央银行和支付基础设施的持续攻击，已经导致整个经济出现连锁反应。"
 cyber_logistics_disruption_malus: "军事供应链中断"
 cyber_logistics_disruption_malus_desc: "负责前线后勤指挥的软件系统遭到入侵。前线部队正面临物资短缺。"
 cyber_sleeper_network_malus: "持续性网络入侵"
 cyber_sleeper_network_malus_desc: "外国特工已将休眠接入点深深植入我们的关键网络，持续对敏感系统保持低级别访问权限。"
 cyber_deception_campaign_malus: "指挥情报中毒"
 cyber_deception_campaign_malus_desc: "我们的指挥官一直依据捏造的信号和虚假通信采取行动。军事协调和态势感知能力严重下降。"
 cyber_zero_day_strike_malus: "零日攻击"
 cyber_zero_day_strike_malus_desc: "利用机密零日漏洞发起的毁灭性精准打击，同时袭击了我们最关键的工业和基础设施系统。"
 upgrade_establish_cyber_operations_division: "网络作战部门"
 upgrade_establish_cyber_operations_division_desc: "在机构内部设立专门的网络作战部门，为基础数字战提供基础能力。该部门将使我们能够开展§Y网络战§!行动。"
 upgrade_offensive_cyber_operations: "进攻性网络战"
 upgrade_offensive_cyber_operations_desc: "利用先进的持续性威胁工具包和零日漏洞利用研究来扩展该部门，从而实现更复杂的操作。"
 upgrade_cyber_warfare_operational_planning: "全频谱网络司令部"
 upgrade_cyber_warfare_operational_planning_desc: "将该部门发展成为一个完全一体化的网络司令部，能够协调针对坚固目标的复杂多向量作战。"
 upgrade_defensive_cyber_operations: "防御性网络战行动"
 upgrade_defensive_cyber_operations_desc: "组建一支专门的防御团队，负责加强我们自己的网络、检测入侵和隐藏我们的数字足迹。"
 upgrade_cyber_elite: "零日武器库"
 upgrade_cyber_elite_desc: "开发并储备一套机密的精英零日漏洞利用程序，能够渗透世界上最坚固的系统。"
 cyber_offense_power_modifier: "进攻性网络战"
 cyber_offense_power_modifier_desc: "决定我们进攻性网络战行动强度的数值。"
 cyber_defense_rating_modifier: "防御性网络战行动"
 cyber_capability_modifier: "网络战能力"
 cyber_attribution_bonus_modifier: "网络战归责加成"
 cyber_unlock: "在§Y国际体系§!界面解锁§Y网络战§!系统"
 has_cyber_capability_1: "[THIS.GetNameWithFlag]拥有§G1级§!§Y网络战司令部§!"
 has_cyber_capability_2: "[THIS.GetNameWithFlag]拥有§G2级§!§Y网络战司令部§!"
 has_cyber_capability_3: "[THIS.GetNameWithFlag]拥有§G3级§!§Y网络战司令部§!"
 has_cyber_capability_4: "[THIS.GetNameWithFlag]拥有§G4级§!§Y网络战司令部§!"
 cyber_not_recently_attacked_target_tt: "[THIS.GetNameWithFlag]最近没有对所选国家/地区发起网络攻击。"
 cyber_not_at_op_capacity_tt: "[THIS.GetNameWithFlag]§Y网络战司令部§!尚未达到最大运行能力。"
 cyber_has_valid_target_tt: "当前选定的目标是网络攻击的有效目标。"
 cyber_not_doing_current_mission_against_tt: "[ROOT.GetNameWithFlag]当前未对选定的目标国家/地区执行此类任务。"
 cyber_has_expanded_offensive_tt: "增强了我国的进攻性网络战能力。"
 cyber_has_expanded_defensive_tt: "增强了我国的防御性网络战能力。"