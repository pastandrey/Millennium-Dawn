 CYBER_GPS_BTN_TT_DELAYED: "特制恶意软件会渗透目标的卫星接收基础设施，用伪造信号淹没军用导航系统。在战场上，指挥官们难以协调行动，因为熟悉的标志性建筑会从数字地图上消失。即使是例行演习，一旦精确导航失效，也会变得极其危险。"
 CYBER_SIGINT_BTN_TT_DELAYED: "一种持久性植入程序悄无声息地潜入目标的电信骨干网，窃取政府、军事和外交渠道的通信流量。每周，截获的流量都会逐渐构建出目标意图、弱点和内部纷争的详细画像 - 这是任何传统间谍都无法获取的情报。"
 CYBER_RADAR_BTN_TT_DELAYED: "目标防空雷达屏幕上充斥着虚幻的目标。操作员们争分夺秒地追踪根本不存在的飞机，白白浪费警报周期追逐幽灵。真正的飞行器却能悄无声息地从雷达缝隙中溜走。虽然窗口期很短，但三十天的空中探测能力下降在一次积极的空战行动中可能起到决定性作用。"
 CYBER_ECON_BTN_TT_DELAYED: "支付处理系统开始报错。交易算法因数据源损坏而瘫痪。工厂车间控制器收到格式错误的更新包。此次攻击旨在使其难以被察觉 - 一系列看似无关的技术故障悄无声息地消耗目标经济产出数月之久。"
 CYBER_PROP_BTN_TT_DELAYED: "数以千计的协同账号向目标受众的媒体环境散布相互矛盾的叙事。伪造的政府文件在社交网络上流传。其目的并非欺骗，而是消耗民众的精力 - 当民众无法分辨事实与虚构时，他们就会对所有机构，包括自己的政府，失去信任。"
 CYBER_ELECT_BTN_TT_DELAYED: "选民登记系统遭到暗中破坏。反对派领导人的深度伪造视频在投票前的最后几天流传。社交媒体算法被操纵，以加剧现有的社会分裂。目标国家的民主制度并未被摧毁 - 而是被悄悄地变得不可信，其选举结果在计票之前就遭到质疑。"
 CYBER_ESPION_BTN_TT_DELAYED: "一场鱼叉式网络钓鱼攻击将定制植入程序植入目标最敏感的研究网络深处。该恶意软件会横向移动数月，窃取蓝图、测试数据和专有配方。等到入侵被发现时，我们的研究人员已经利用窃取的信息开展了后续工作。"
 CYBER_COMMS_BTN_TT_DELAYED: "一名沉默的中间人潜伏在目标最敏感的通信节点上。将军的命令、大使的电报和内阁的讨论都通过同一个被入侵的中继传输 - 被复制、编目并实时传递给我们的分析人员。目标继续做出决策，却浑然不知我们已读取了每一条信息。"
 CYBER_INFRA_BTN_TT_DELAYED: "管理电力分配、水处理和物流节点的工业控制系统会悄无声息地收到恶意固件更新。一旦恶意代码触发，就会引发连锁故障，导致多个行业的维修团队同时疲于应对。这种损害是真实存在的，而且难以逆转。"
 CYBER_FIN_BTN_TT_DELAYED: "央行结算系统瘫痪。全国范围内的ATM网络瘫痪。外汇交易算法接收到恶意输入，引发闪崩。这种破坏的影响远远超出了传统制裁所能达到的范围 - 而且与制裁不同的是，它无法追溯责任。"
 CYBER_LOG_BTN_TT_DELAYED: "所有前线作战基地的供应链管理软件同时崩溃。弹药请求在损坏的队列中消失。燃料分配算法将车队导向根本不存在的油库。敌军的军事机器没有在战斗中崩溃 - 而是在原地挨饿。"
 CYBER_SLEEP_BTN_TT_DELAYED: "耐心、有条不紊、隐蔽行动。我们的特工并非前来攻击 - 而是长期驻守。休眠接入点已嵌入目标的关键网络结构中，随时准备根据指令激活。未来一年，他们最敏感的系统可能完全没有秘密可言。"
 CYBER_CRIT_BTN_TT_DELAYED: "我们的网络武库火力瞬间倾泻而下。电网瘫痪，军事通信崩溃，工业生产停滞，金融系统冻结。此次行动相当于一场数字版的战略轰炸 - 使目标国家所有领域的实力同时瘫痪。"
 CYBER_DECEPT_BTN_TT_DELAYED: "我们不攻击目标的系统，而是腐蚀其思想。捏造情报评估，伪造带有高级指挥官认证签名的命令，向最高决策者展示篡改过的图像 - 目标做出的每一个选择都可能建立在我们制造的现实之上。"
 CYBER_ZERO_BTN_TT_DELAYED: "多年来积累并专门为此刻准备的、此前从未公开的机密漏洞利用程序库，将同时部署到目标最关键的系统上。等到分析人员弄清发生了什么时，漏洞已被利用，损失已无法挽回。"
 CYBER_HARDEN_BTN_TT_DELAYED: "我们的安全团队会对每个暴露的接口进行审计，修补所有已知的漏洞，并加固外国情报机构最常探测的协议。这项工作并不光鲜亮丽，但我们关闭的每一扇门都意味着对手少了一个可利用的途径。最好的网络行动就是不落地成功。"
 CYBER_CNTRINT_BTN_TT_DELAYED: "分析人员仔细检查网络日志和系统遥测数据，寻找外来入侵的蛛丝马迹 - 异常的访问模式、意外的出站连接、无正当用途的休眠进程。清理受感染的网络是一项缓慢而细致的工作。未被发现的植入程序远比已知的植入程序危险得多。"
 CYBER_ATTRIB_BTN_TT_DELAYED: "我们的数字取证团队会重构攻击路径 - 追踪恶意软件特征、绘制命令与控制基础设施图，并记录识别责任方的操作安全模式。查明入侵背后的国家是采取相应应对措施的第一步。"
