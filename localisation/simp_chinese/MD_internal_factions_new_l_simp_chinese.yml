l_simp_chinese:
 internal_factions_events.53.t: "党派忠诚度受到审视"
 internal_factions_events.53.d: "共产党干部已向政府提交了一份他们认为意识形态不可靠的官员名单。他们要求对这些官员进行正式的忠诚度调查，并清除那些不符合党标准的官员。"
 internal_factions_events.53.o1: "进行清洗"
 internal_factions_events.53.o2: "拒绝他们的要求"
 internal_factions_events.53.o3: "启动有限审查"
 internal_factions_events.54.t: "干部呼吁集体化"
 internal_factions_events.54.d: "共产党干部对私人农业持股越来越不耐烦。他们正敦促政府开展集体化运动，将农田集中到国家控制之下，以提高效率和意识形态一致性。"
 internal_factions_events.54.o1: "支持集体化"
 internal_factions_events.54.o2: "拒绝提议"
 internal_factions_events.54.o3: "推行有限的土地改革"
 internal_factions_events.55.t: "工业需求港口扩建"
 internal_factions_events.55.d: "海事工业业已提交一份扩建沿海港口设施的提案，声称港口拥堵每年给他们造成数百万美元的损失。当地土地所有者和城市规划者对此表示反对，理由是担心会造成居民流离失所和城市环境破坏。"
 internal_factions_events.55.o1: "批准扩建"
 internal_factions_events.55.o2: "拒绝建议"
 internal_factions_events.55.o3: "协商妥协方案"
 internal_factions_events.56.t: "海盗行为扰乱航运路线"
 internal_factions_events.56.d: "海盗活动激增，对我们的商业航道构成威胁。海事行业代表要求政府介入，保护他们的船舶和货物，并警告称，不作为将推高保险成本，阻碍投资。"
 internal_factions_events.56.o1: "为海军护航计划提供资金"
 internal_factions_events.56.o2: "视若无睹"
 internal_factions_events.56.o3: "寻求国际合作"
 internal_factions_events.57.t: "外国间谍组织被破获"
 internal_factions_events.57.d: "情报分析人员已发现一个在我国境内活动的外国间谍组织。情报界正敦促政府采取果断行动，以防该组织窃取更多机密信息。"
 internal_factions_events.57.o1: "公开网络"
 internal_factions_events.57.o2: "静默清除"
 internal_factions_events.57.o3: "不采取行动"
 internal_factions_events.58.t: "立法机构质疑情报支出"
 internal_factions_events.58.d: "在下一轮选举周期到来之际，立法机构成员对情报部门不透明的预算提出了尖锐的质疑。倡导团体呼吁加强问责制，而情报界则警告说，透明度的缺失会损害正在进行的行动。"
 internal_factions_events.58.o1: "全力捍卫预算。"
 internal_factions_events.58.o2: "发布部分信息"
 internal_factions_events.58.o3: "承诺做到完全透明"
 internal_factions_events.59.t: "外国战斗人员越境"
 internal_factions_events.59.d: "受持续冲突的影响，一大批外国武装分子涌入我国领土。他们表示愿意为我方效力，但他们的可靠性和纪律性仍不明朗。外国圣战组织正在敦促政府为他们安排角色。"
 internal_factions_events.59.o1: "将它们整合到常规单位中"
 internal_factions_events.59.o2: "立即将他们部署到前线"
 internal_factions_events.59.o3: "在边境将他们遣返"
 internal_factions_events.60.t: "圣战旅要求自治"
 internal_factions_events.60.d: "随着人数的不断增长，外国圣战旅的胆子越来越大，他们要求获得正式承认，成为一支拥有独立指挥体系的自主力量。他们认为，行动上的独立性将使他们能够更有效地采取行动，免受官僚机构的干预。"
 internal_factions_events.60.o1: "赋予他们行动自主权"
 internal_factions_events.60.o2: "拒绝要求"
 internal_factions_events.60.o3: "将它们纳入国家指挥体系"
 internal_factions_events.61.t: "圣战部队寻求更多资源"
 internal_factions_events.61.d: "圣城旅领导层已正式请求追加资金和物资，以扩大其在该地区代理人的行动。他们认为，现在是战略机遇，资金不足可能会导致影响力向竞争对手流失。"
 internal_factions_events.61.o1: "提供全额资金"
 internal_factions_events.61.o2: "提供部分支持"
 internal_factions_events.61.o3: "拒绝要求"
 internal_factions_events.62.t: "邻国的脆弱性"
 internal_factions_events.62.d: "圣城旅情报显示，一个目前深陷冲突的邻国极易受到代理人的压力。机会窗口虽短，但潜在的战略收益却十分巨大。"
 internal_factions_events.62.o1: "利用这种情况"
 internal_factions_events.62.o2: "与盟友国家共享情报"
 internal_factions_events.62.o3: "让机会溜走吧"
 establish_political_commissars_decision: "嵌入政治委员"
 establish_political_commissars_decision_desc: "在军事单位内部署党政委员，以强化意识形态忠诚并鼓舞士气。党政委员将直接向共产党干部汇报，从而加强共产党对军队的影响力。"
 worker_reeducation_programme_decision: "工人再教育计划"
 worker_reeducation_programme_decision_desc: "资助一项国家主导的再教育计划，以强化劳动者对党的意识形态认同。随着劳动者将精力转向国家优先事项，服从度提高，消费需求下降。"
 maritime_safety_inspections_decision: "强制性海事安全检查"
 maritime_safety_inspections_decision_desc: "在国内所有港口和造船厂设施中建立一套全面的安全检查制度。提高标准能够增强行业的信心，并在检查期间提升船坞的产量。"
 naval_shipping_subsidy_decision: "海军运输补贴"
 naval_shipping_subsidy_decision_desc: "政府直接向国内远洋航运运营商提供补贴。该计划扩大了我国商船队的运营范围，并提高了船坞的吞吐量。"
 counter_intelligence_sweep_decision: "反间谍扫荡"
 counter_intelligence_sweep_decision_desc: "授权情报部门对政府和军事网络进行系统性排查，以排查外国渗透活动。行动期间，外国间谍活动的成本将降低，我们的通信安全也将得到提升。"
 expand_intelligence_network_decision: "扩展情报网络"
 expand_intelligence_network_decision_desc: "为建立新的海外情报站和人力情报资源提供资金。扩展后的情报网络将提升我们破译敌方通信和监视外国军事动向的能力。"
 jihadi_recruitment_drive_decision: "圣战分子招募活动"
 jihadi_recruitment_drive_decision_desc: "在支持者网络中发起积极的招募活动，吸引外国战士加入我们的事业。更多的人力会涌入，我们的特种部队实力也会增强。"
 martyr_glorification_campaign_decision: "殉道者荣耀运动"
 martyr_glorification_campaign_decision_desc: "发起一场宣传运动，颂扬阵亡战士，并将殉道提升为一种文化理想。战争热情急剧上升，但这种激进的信息有可能煽动极端主义情绪。"
 support_proxy_networks_decision: "支持代理人网络"
 support_proxy_networks_decision_desc: "通过圣城旅向在邻国活动的区域代理组织输送资金和装备。加强这些网络可以扩大我们的战略影响范围，并降低对竞争对手施压的直接成本。"
 quds_force_training_programme_decision: "圣城旅训练计划"
 quds_force_training_programme_decision_desc: "授权圣城旅为特定军事单位开展高级非常规作战训练。这将提高非常规作战能力，并扩大特种部队的作战能力。"
 internal_factions_events.63.t: "承包商游说达成出口协议"
 internal_factions_events.63.d: "国防承包商正敦促政府支持一系列海外武器出口合同。他们认为这些交易将带来可观的收入并维持国内生产线，但批评人士警告称，大规模的军售可能会加剧地区紧张局势，并招致不必要的国际关注。"
 internal_factions_events.63.o1: "批准全额出口"
 internal_factions_events.63.o2: "限制向关联买家销售"
 internal_factions_events.63.o3: "拒绝游说活动"
 defense_procurement_programme_decision: "国防采购计划"
 defense_procurement_programme_decision_desc: "启动专门的采购周期，确保国内军火制造商获得稳定的订单。持续的合同能够增加军工产业的税收收入，减轻消费品负担，以此奖励国防工业的持续合作。"
 classified_research_programme_decision: "机密研究计划"
 classified_research_programme_decision_desc: "将机密资金用于通过国防工业合作伙伴开展的军事技术研究。这项投资将加快研究成果产出并加强通信安全，资金将在项目启动时到位。"
 issue_government_bonds_decision: "发行银行担保政府债券"
 issue_government_bonds_decision_desc: "授权发行由银行担保、通过国际银行网络管理的政府债券。此举可立即注入资金，提振市场稳定性，但偿债过程会在债券存续期间推高利率。"
 attract_foreign_investment_decision: "吸引外资"
 attract_foreign_investment_decision_desc: "与国际银行界人士协调合作，传递稳定信号，降低准入门槛。此举缩短了获得外国投资所需的时间，并增加了来自外资的税收收入。"
 internal_factions_cadre_purge: "干部清洗"
 internal_factions_cadre_purge_desc: "党政委员正在对整个官僚机构进行忠诚度调查，以行政混乱为代价加强意识形态纪律。"
 internal_factions_collectivisation_drive: "集体化运动"
 internal_factions_collectivisation_drive_desc: "农业集体化正在进行中，随着私营农场过渡到国家控制，供应链受到扰乱，消费品短缺问题日益严重。"
 internal_factions_convoy_escort: "海军护航计划"
 internal_factions_convoy_escort_desc: "政府资助的海军护航行动正在保护商业航道，增强了我们海军人员的信心和经验。"
 internal_factions_piracy_losses: "海盗纷扰"
 internal_factions_piracy_losses_desc: "不受控制的海盗行为正在扰乱我们的航运路线，削弱贸易信心，并破坏更广泛的经济稳定。"
 internal_factions_neutralised_spies: "间谍网络被摧毁"
 internal_factions_neutralised_spies_desc: "一个外国情报网络已被悄然瓦解，这在一段时间内提高了我们的反间谍能力。"
 internal_factions_transparency_costs: "情报透明度的代价"
 internal_factions_transparency_costs_desc: "情报行动的公开披露削弱了我们的加密安全，因为对手会适应新披露的方法。"
 internal_factions_jihadi_frontline: "圣战分子前线部署"
 internal_factions_jihadi_frontline_desc: "直接部署到前线的外国武装人员正在积极向敌军阵地施压，但由于他们与正规军缺乏融合，导致侧翼暴露。"
 internal_factions_jihadi_autonomy: "圣战分子自主部队"
 internal_factions_jihadi_autonomy_desc: "公认的自主圣战旅在自己的指挥下行动，大大提高了我们特种部队的规模。"
 internal_factions_jihadi_integrated: "整合圣战分子部队"
 internal_factions_jihadi_integrated_desc: "正式融入国家指挥体系的外国战斗人员提高了部队的凝聚力和组织恢复率。"
 internal_factions_quds_expanded: "圣城旅扩大行动"
 internal_factions_quds_expanded_desc: "额外的资源使圣城旅能够扩大其代理人行动，从而降低维持外国颠覆活动的成本。"
 internal_factions_quds_operation: "圣城旅战略行动"
 internal_factions_quds_operation_desc: "圣城旅正积极利用邻国的不稳定局势，在正在进行的行动中获得战术优势。"
 fund_religious_schools_decision: "资助宗教学校"
 fund_religious_schools_decision_desc: "将政府资金投入到由瓦哈比派乌里玛监管的宗教学校网络中。随着这些机构扩大影响力，识字率提高，社会稳定性增强。"
 enforce_moral_codes_decision: "强制执行道德准则"
 enforce_moral_codes_decision_desc: "赋予宗教权威机构在全国范围内执行公共道德标准的权力。这项措施增强了乌里玛的影响力，提高了社会凝聚力，但更严格的限制也会刺激消费支出增长。"
 agricultural_subsidies_decision: "农业补贴"
 agricultural_subsidies_decision_desc: "向农业部门提供直接补贴，以提高产量，并奖励农民群体的合作。初期投入会减少国库储备，但生产力的提高将通过该计划维持经济运转。"
 rural_infrastructure_fund_decision: "农村基础设施基金"
 rural_infrastructure_fund_decision_desc: "政府应投入资金改善农村地区的道路、灌溉和仓储设施。这项投资可以减轻农业地区的劳动力负担，并赢得农民社区的好感。"
 infrastructure_investment_programme_decision: "基础设施投资计划"
 infrastructure_investment_programme_decision_desc: "与大型工业集团合作，为全国生产基地的基础设施进行全面升级提供资金。在项目实施期间，工厂和办公楼的产出将有所增长，从而巩固这些集团作为经济支柱的地位。"