l_simp_chinese:
 Republic_of_Lakota_focus: "拉科塔共和国国策树"
 LKT_Sakakawea_capital: "已将§Y萨卡加维亚§!定为首都"
 LKT_Sakakawea_capital_name: "萨卡加维亚"
 LKT_Pierre_capital: "已将§Y皮埃尔§!定为首都"
 LKT_Fort_Nakanin_capital: "已将§Y纳卡宁堡§!定为首都"
 LKT_Fort_Nakanin_capital_name: "纳卡宁堡"
 LKT_New_Cheyenne_capital: "已将§Y新夏延§!定为首都"
 LKT_New_Cheyenne_capital_name: "新夏延"
 LKT_Old_Cheyenne_capital_name: "旧夏延"
 LKT_decisions_war_time_mobilization_category: "战时动员"
 LKT_decisions_war_time_mobilization_category_desc: "当需要时，我们可以召集一支志愿军，至少填补防线的空缺。因为我们不知道战争何时会爆发，但我们知道战争会降临到我们头上。"
 LKT_war_time_mobilization: "第一轮动员"
 LKT_war_time_mobilization_desc: "战斗的号召已经响起，我们必须团结起来，确保我们的家园安全。为迪克西男孩们，武装起来！"
 LKT_war_second_wave_defenders: "第二轮动员"
 LKT_war_second_wave_defenders_desc: "敌人不断逼近，我们必须再征召一波守军。国家士气会受到打击，但我们需要军队。"
 LKT_war_desperate_defenders: "绝望的捍卫者"
 LKT_war_desperate_defenders_desc: "形势越来越严峻，我们需要每一个可用的人手来守住阵地。也许，只是也许，我们可能还能赢得这场胜利。"
 LKT_ideas_economic_development_commission: "经济发展委员会"
 LKT_ideas_economic_development_commission_desc: "随着垦殖阵线与国家政府之间的团结比以往任何时候都更加强大。一个用于发展和了解我国经济结构的新经济委员会成立了。现在，底层和顶层都齐心协力，我们伟大国家的未来离真正的团结又近了一步。"
 LKT_event.1.t: "政府首脑"
 LKT_event.1.d: "由于我们目前无意向北发展，因此我们国家首都的安全依赖于我们最北部的四个州。南北达科他州、蒙大拿州和怀俄明州。虽然有些人不相信这种想法，因为他们认为首都离前线越远，援助和关注就会越远。然而，我们不能被这种分散注意力的争吵所阻碍。然而，许多人也在想，我们是否应该坚持更基本的首都命名，还是应该诉诸土地的本土起源。目前，这四个候选州正在为国家起源委员会留出空间，让他们的州被选中。"
 LKT_event.1.o1: "我们不是刚刚因为这种事情而崩溃了吗？"
 LKT_event.2.t: "内心的争论"
 LKT_event.2.d: "在我们的四个竞争者中，我们分成了两派，一派更倾向于遵循旧约，另一派则更倾向于与当地原住民的影响保持一致。在原住民方面，我们有蒙大拿州的纳卡宁堡，它是附近古老的原住民保留地的延伸，原先是纳科达部落和阿纳宁部落的保留地。在北达科他州，我们有萨卡卡维亚，它以该州最大的河流命名。在南部的参与者中，我们有南达科他州皮埃尔作为他们的选择，因为该州的发展不多，州内许多人认为，新的联邦首都将很容易建立自己的区，成为皮埃尔大都市拼图的一部分。最后是新夏延，它大致位于该州的中右翼，它将取代怀俄明州的旧州首府，后者将更名为旧夏延。一些居民对这个想法感到有点伤心，但许多人认为这是一个很好的复兴象征，因为联邦首都将掀开这个年轻国家历史新页的火炬。"
 LKT_event.2.o1: "萨卡加维亚"
 LKT_event.2.o2: "皮埃尔"
 LKT_event.2.o3: "纳卡宁堡"
 LKT_event.2.o4: "新夏延"
 LKT_event.3.t: "审计南方"
 LKT_event.3.d: "经过漫长而乏味的稳定国家的努力，我们终于能够解决这个所谓的“垦殖阵线”组织，它似乎在帮助我们。然而，我们已派审计员去那里查明这些人决定离开已经建立的家园突然建造新房的真正原因。无论如何，如果我们要真正采取行动，我们必须等待，看看到底报告了什么。"
 LKT_event.3.o1: "不会那么糟糕吧？"
 LKT_event.4.t: "初步报告"
 LKT_event.4.d: "一些信息已经传回，往好了说是混杂，往坏了说是令人困惑。一些报道指出，垦殖阵线确实如他们所说。一群逃离南方共和国的原住民试图为自己建立新家园。结果，堪萨斯州的经济增长速度超过了全国其他地区。然而，另一方面，有报道称，一些垦殖阵线成员正在针对当地居民开展犯罪活动，甚至进行一些类似黑手党的活动，以维护他们的名声。这种反复无常意味着我们可能真的参与了重建，也可能被一把刺进肚子里的刀子捅了。无论如何，我们都需要做出一个严肃的选择，而这个选择可能会导致我们日后后悔的行动。"
 LKT_event.4.o1: "他们全都是罪犯！"
 LKT_event.4.o2: "先等等，也许还有其他事情"
 LKT_event.5.t: "他们无法拒绝的提议"
 LKT_event.5.d: "随着有关垦殖阵线非法活动的令人震惊的报道，一名审计员主动与垦殖阵线领导层会面，或多或少地向他们提出了一个提议。平息他们的一些浮夸之风，让北方国家政府获得更多的功劳，我们就不会打扰你们。垦殖阵线领导层自然对此反应不一，其中最响亮的是日益增长的集体反应。回应如下：“我们是一群和平的人，你们认为我们是普通罪犯和有组织的歹徒，就像你们过去的白人对手一样，这让我们非常生气。我们会向你们表明，我们不会容忍这种粗鲁和有辱人格的言论来污蔑我们的人民。”审计员被赶了出去，一路被骚扰到内布拉斯加州边境，很明显我们的假设是正确的，我们必须尽快采取行动。"
 LKT_event.5.o1: "给他们一英寸，他们就能夺走整个州"
 LKT_event.6.t: "团结全国"
 LKT_event.6.d: "随着垦殖阵线成员和当地领导层开始站在整个反叛运动一​​边，堪萨斯州的骚乱日益加剧。因此，北方各州开始团结起来，如果我们想在短期内真正取得进展，就需要开始某种动员。"
 LKT_event.6.o1: "这是我们的国家，不是他们的"
 LKT_event.7.t: "公开叛乱"
 LKT_event.7.d: "那些该死的叛徒终于做到了，他们高高升起了堪萨斯州的州旗，宣布该州脱离共和国独立。我们需要组织军队，在我们的邻居看到我们的软弱之前完成这件事。"
 LKT_event.7.o1: "吹响集结号角"
 LKT_event.8.t: "开战！"
 LKT_event.8.d: "国家动员起来，不惜一切代价，向南进军，保卫我们的土地，抵御这些投机取巧的叛徒。善意之类的，唉，充其量是一堆废话，最坏的情况是一堆谎言。"
 LKT_event.8.o1: "我们向南进军！"
 LKT_event.9.t: "他们让我们别无选择"
 LKT_event.9.d: "他们称我们为小偷、骗子和罪犯。但我们不是这样的人，我们将与这些善良仁慈的堪萨斯人民一起保卫自己。为了堪萨斯，为了真正的自由！"
 LKT_event.9.o1: "我们为自由而战！"
 LKT_event.5000.t: "进一步调查"
 LKT_event.5000.d: "持续的报道显示，越来越多关于该组织非法活动的指控被证明是错误的。因此，关于振兴国家经济和更加和谐的民族联盟的谈判已经开始。"
 LKT_event.5000.o1: "感谢上帝，我们看得更远"
 LKT_event.5001.t: "进一步计划"
 LKT_event.5001.d: "初步谈判和投资计划已经看到经济全面增长。这种增长让我们的国家看到了我们原以为需要几个月才能实现的事情，那就是发展。鉴于目前的情况，我们必须考虑成立一个经济委员会，以确保我们伟大国家及其众多人民的均衡和稳定的经济发展。"
 LKT_event.5001.o1: "走向繁荣！"
 LKT_event.5002.t: "委员会"
 LKT_event.5002.d: "持续的谈判和发展促成了“经济发展委员会”的成立。该委员会制定了更具凝聚力的经济规划和增长理论，将造福于我们国家的子孙后代。"
 LKT_event.5002.o1: "团结一致，永不分裂"
 LKT_Pierre_capital_name: "皮埃尔"
 LKT_organizing_the_farmers: "组织农民"
 LKT_organizing_the_farmers_desc: "我们没有多少资源，但我们必须团结起来，做好准备，以备不时之需。"
 LKT_creating_infantry_reserves: "建立预备役"
 LKT_creating_infantry_reserves_desc: "我们四面受敌，必须做最坏的打算。让我们建立一支常备预备役部队，以便在关键时刻能够随时迎击来犯之敌。"
 LKT_mobilizing_the_reserves: "动员预备役"
 LKT_mobilizing_the_reserves_desc: "危急时刻已迫在眉睫，我们必须确保同胞们的安全。让我们集结预备役力量，挺身保卫家园。"
 LKT_focus_a_capital_conundrum: "首都难题"
 LKT_focus_a_capital_conundrum_desc: "在被勉强维系在一起的支离破碎的国土上，我们必须为这个国家的首都寻求一个根基。我们寄望于北方寻求解决之道。"
 LKT_focus_montana_monster: "蒙大拿巨兽"
 LKT_focus_montana_monster_desc: "重建工程终于启动，我们的国家必须首先实现自给自足，才能考虑其他事务。因此在这一初期阶段，农业将成为重中之重。"
 LKT_focus_montana_marvel: "蒙大拿奇迹"
 LKT_focus_montana_marvel_desc: "从赤贫到富足，或者说至少从饥肠辘辘到填饱肚子。因此，我们可以着手启动民事及市政公共服务，以助力稳定本州社会秩序，并为这片土地带来新的和平。"
 LKT_focus_northern_troubles: "北境之忧"
 LKT_focus_northern_troubles_desc: "达科他地区与美国大部分国土一样地广人稀，尽管某些州人口基数尚可，整体发展仍显滞后。但我们必须抢在投机分子觊觎之前稳固北部边境领土，更遑论任何试图外逃的人口都将构成国家重大损失。当前首要任务是先建立起基础经济体系。"
 LKT_focus_our_northern_light: "北境之光"
 LKT_focus_our_northern_light_desc: "随着经济复苏与北达科他州社会初步稳定，我们现已着手深化地方应急与民事服务体系建设。以此为根基，新生国家的治理疆域将得以拓展。"
 LKT_focus_yellowstone_yelling: "黄石呐喊"
 LKT_focus_yellowstone_yelling_desc: "这片土地在呐喊，混乱与危险遍及各处，我们必须发起倡议，为这些地区重归和平宁静。该州人口本就不多，这意味着总体发展程度较低，可利用资源更为有限。但人们必须有点吃的，我们会让他们吃饱肚子。"
 LKT_focus_worland_wonder: "沃兰德奇迹"
 LKT_focus_worland_wonder_desc: "终于恢复了一定程度的和平，随着公务员和其他市政机构的恢复，国家社会凝聚力进一步拓展至更广阔疆域。不久之后，我们终将真正拥有一个可称之为家园的栖身之所。"
 LKT_focus_southern_turmoil: "南方动荡"
 LKT_focus_southern_turmoil_desc: "泡沫泡沫，辛劳与烦恼，我们搅动着所有烦恼的大锅。从绝望的深渊中，我们捞出那些可以清理和修复的东西。在我们摆好的餐桌上，有经济也有食物，我们将讲述那些曾经困扰人们的寓言故事。现在，我们勇往直前，引领步伐，因为我们的人民在命运的危难时刻需要我们。"
 LKT_focus_rapid_city_revival: "拉皮德城复兴"
 LKT_focus_rapid_city_revival_desc: "我们沉着坚定，谋求和平；为这片土地上的人民，让他们尽享盛宴…… 行了，别再整这些烂押韵了。你已经建立起一定的经济体系，现在要着手推进政府治理与公共服务建设，以此修复社会凝聚力，重新赢取国家另一地区民众的团结一心。"
 LKT_focus_industry_what_industry: "工业，什么工业？"
 LKT_focus_industry_what_industry_desc: "尽管很多人喜欢夸夸其谈，但面对显而易见的现实，我们确实具备一定的工业实力…… 或许不算强大，但无论如何也算有所成就。这至少有助于我们从整体上稳定经济结构，并实现经济多元化发展。"
 LKT_focus_nebraska_neck_breaker: "内布拉斯加重创者"
 LKT_focus_nebraska_neck_breaker_desc: "国家满目疮痍，我们必须致力治愈创伤。为此，恢复某种经济基础，将使人民凝聚一心，重启我们熟知的社会秩序。"
 LKT_focus_from_broken_bow_to_fixed: "从破碎到愈合"
 LKT_focus_from_broken_bow_to_fixed_desc: "伤口会愈合，但伤疤仍会留存，要完全从过去走出来需要时间，但我们可以做到，一点一点地来。"
 LKT_focus_kansas_city_catastrophe: "堪萨斯城灾难"
 LKT_focus_kansas_city_catastrophe_desc: "堪萨斯州的堪萨斯城，真是一个地方。这里人很多，有很多事可以做，也有很多事会被断章取义、拿来取笑。不过很多事情都是这样。然而，一点火花被点燃了，这座城市被点亮的不只是嘲笑和欢呼。现在我们必须找回曾经失去的东西，开启一条新的复兴之路。"
 LKT_focus_the_kansas_city_kitty: "堪萨斯城猫咪"
 LKT_focus_the_kansas_city_kitty_desc: "既然经济还在运转，那我们就能重新回到正轨。我听说主街上的俱乐部已经开门了，我们可以像过去好日子里那样，彻夜跳舞。"
 LKT_focus_the_new_republic: "新共和国"
 LKT_focus_the_new_republic_desc: "从旧事物的灰烬中崛起出新生的一切。现在我们启程，不仅要发现自我，更要去开创我们想要的未来。"
 LKT_focus_new_elections_begin: "新选举开始"
 LKT_focus_new_elections_begin_desc: "现在是建立我们政治基础的时候了。通过举行我们第一次全国选举，我们为人民自己做出决定并掌控自己期望的命运奠定了基础。"
 LKT_focus_the_councils_of_authority: "权力委员会"
 LKT_focus_the_councils_of_authority_desc: "命运开了个有趣的玩笑，众多近乎 “寡头政治” 色彩的政党中，居然有一个在选举中胜出了。现在真正的问题是，这些政党究竟为这个国家规划了怎样的蓝图。我想说，寡头统治这个称谓本身就极具威慑力，这对该国而言显然不是个好兆头。民众当时到底是怎么想的？"
 LKT_focus_DDP_political_plan: "达科塔民主党政治计划"
 LKT_focus_DDP_political_plan_desc: "首轮选举结束后，达科塔民主党似乎已锁定胜局。现在，他们计划实施各项政策，以帮助塑造国家及其人民，度过这段充满不确定性的初期时期。"
 LKT_focus_skill_assessment_fairs: "技能评估博览会"
 LKT_focus_skill_assessment_fairs_desc: "技能评估博览会是由联邦政府赞助的活动，旨在帮助民众了解和掌握各领域的技能。这不仅有助于我们帮助人们就业，还能让我们更好地了解我国的人才储备。"
 LKT_focus_light_industry_investment: "轻工业投资"
 LKT_focus_light_industry_investment_desc: "在我国建立规模虽小但意义重大的产业，能让人们潜移默化地接触到新的技能和就业机会。或许规模不大，但正如人们常说的，这是诚实劳动。"
 LKT_focus_business_taxes_redraft: "商业税重新起草"
 LKT_focus_business_taxes_redraft_desc: "通过完成初步的个人企业税收改革草案，我们将设定一个新的底线，使我们的税收政策得以切实执行。虽然我国经济的具体情况尚不明朗，但通过一刀切的企业税对企业造成过重的负担，无疑会对我们的财政收入产生负面影响。"
 LKT_focus_education_streamlining: "教育精简"
 LKT_focus_education_streamlining_desc: "将课程简化为学生日常生活中可以使用的基本知识，将使我们能够研究更好的课堂管理，以及未来如何改革课程。"
 LKT_focus_basic_arms_industry_investment: "基础武器工业投资"
 LKT_focus_basic_arms_industry_investment_desc: "我们国家人口稀少，发展滞后。许多人会把我们视为易受攻击的目标。虽然我们不想成为易受攻击的目标，但要想过早地发展军事野心，我们必须找到一个理由。因此，我们将奠定本地武器制造的基础，以支持狩猎活动并维持常备军的武器装备。"
 LKT_focus_extensive_geological_surveys: "广泛的地质探勘"
 LKT_focus_extensive_geological_surveys_desc: "通过对那些被认为是“低价值矿藏”的土地进行广泛的研究和勘测，我们可以找到方法，将这些看似微不足道的资源转化为有意义的东西。虽然初期成本会很高，但从长远来看，这带来的利益和国家独立的保障绝对值得付出这些代价。"
 LKT_focus_KCK_political_plan: "堪萨斯城联盟政治计划"
 LKT_focus_KCK_political_plan_desc: "堪萨斯城联盟是由商界领袖和政治人物组成的团体，他们希望尽快使国家走上正轨。因此，由于“大崩溃”，他们的主要工作是关注经济稳定和人口管理。"
 LKT_focus_zoning_reforms: "分区改革"
 LKT_focus_zoning_reforms_desc: "允许采用更灵活、与传统分区形式不同的方法，应该能够使我们的城镇更好地适应市民和整体经济的需求。"
 LKT_focus_integrated_health_plans: "综合健康计划"
 LKT_focus_integrated_health_plans_desc: "将强制性医疗保健计划纳入企业运营，将使招聘方式更加灵活，并简化员工需求与工作环境要求之间的匹配。"
 LKT_focus_regulatory_cutbacks: "监管削减"
 LKT_focus_regulatory_cutbacks_desc: "废除大量繁琐且适得其反的法规，将使企业能够更好地支持国家及其所雇佣的人民。"
 LKT_focus_national_employment_commission: "国家就业委员会"
 LKT_focus_national_employment_commission_desc: "国家就业委员会是一个国家级机构，其任务是招募国内外邻近地区的劳动力来填补工作岗位，以促进经济更加稳定和全面发展。当然，\"猎头\"外国工人可能会有些棘手，但我们的洲内兄弟姐妹将被视为普通公民对待，因为该计划的根本目的是确保经济发展不会超出可用劳动力的承受范围。"
 LKT_focus_ensuring_military_stockpiles: "确保军事储备充足"
 LKT_focus_ensuring_military_stockpiles_desc: "国防固然重要，但要想真正保卫国家，首先必须拥有所需的装备。因此，与国家就业委员会合作进行扩张，将使我们能够雇佣更多人员进入工厂，以建立这些储备，从而让我们的陆军和空军能够保卫国家免受不正当的觊觎。"
 LKT_focus_LTP_political_plan: "拉科塔技术统治党政治计划"
 LKT_focus_LTP_political_plan_desc: "拉科塔技术统治党是一个致力于进步与创新的政党。该党聚焦于教育、研发以及营造能够资助此类事业的经济环境，满怀希望地致力于打造一个不断追求卓越、持续探索更优发展路径的国家。"
 LKT_focus_mandatory_education_programs: "义务教育计划"
 LKT_focus_mandatory_education_programs_desc: "义务教育计划旨在突破教育界限，它们不局限于基础教育阶段，而是作为标准体系之外的独立项目，为各年龄段人群创造新的学习机会。"
 LKT_focus_the_means_of_efficiency: "效率之道"
 LKT_focus_the_means_of_efficiency_desc: "我国人口稀少，因此我们必须聚焦并适应这一现实。为此，我们必须掌握高效的手段，努力利用现有资源实现目标。"
 LKT_focus_ends_of_a_means: "手段的目的"
 LKT_focus_ends_of_a_means_desc: "我们拥有铁矿石这一核心资源。我们可以将铁矿石提炼成钢铁，而钢铁是现代经济体系中不可或缺的一部分。因此，如果我们想要真正实现自给自足，就必须大力投资开采这种资源。"
 LKT_focus_economic_expansion_act: "经济扩张法案"
 LKT_focus_economic_expansion_act_desc: "工业整体发展将扩大我们的经济基础。反过来，这将使我们能够积累更多资本，用于进一步投资。"
 LKT_focus_peoples_defense_act: "人民防卫法案"
 LKT_focus_peoples_defense_act_desc: "人民防卫法案是一项有限的国防计划，它创造了有限的工业和承包机会，使我们的国家能够为我们的士兵提供装备。"
 LKT_focus_militarized_politics_plan: "军事化政治计划"
 LKT_focus_militarized_politics_plan_desc: "在全国上下对未来发展方向存在分歧之际，拉科塔武装部队的部分成员抓住了主动权，设法赢得了首届选举的多数选票。尽管许多人怀疑，如果选举不那么分裂，他们是否还能获胜，但更多的人只是乐于看到方向，而不是在未知中摸索。"
 LKT_focus_national_conscription_period: "全国征兵时期"
 LKT_focus_national_conscription_period_desc: "鉴于我国人口数量远低于沿海邻国，我们必须实行至少半年的强制征兵制。许多人会反对这一举措，但如果我们真心想要重视国防，并防范其他列强的任何此类愚蠢行为，那么我们就必须这样做。"
 LKT_focus_military_classroom_standards: "军事课堂标准"
 LKT_focus_military_classroom_standards_desc: "通过在队列训练和小队战术中加入体能和基本类型知识等简单要求，我们可以创造一种宽松的基础训练形式，从而使未来应征入伍的年轻人为他们的强制征兵期做好准备。"
 LKT_focus_basic_economic_investments: "基本经济投资"
 LKT_focus_basic_economic_investments_desc: "如果我们想要有机会自卫，就必须拥有支持这些行动的手段。因此，我们将开展有限的工业扩张项目，以便获得这些手段。"
 LKT_focus_military_industrial_sector: "军事工业部门"
 LKT_focus_military_industrial_sector_desc: "军事工业部门是我们的一种军事工业综合体。然而，关键区别在于，这些工厂将是多用途的，因为它们在建造时就考虑到了适应性。这意味着，在和平时期，它们仍然以有限的形式为民用经济做出贡献，但一旦需要，它们可以很容易地转换用途并迅速提高军需品的生产能力。"
 LKT_focus_less_for_more: "少即是多"
 LKT_focus_less_for_more_desc: "专注于减少各企业和经济部门所需人力的投资，可以释放更多资源用于军事和经济扩张。考虑到这一点，我国人口数量与非洲大陆其他国家相比也少得惊人。因此，我们将投资粮食生产、供应链，并掌握生育资料，使我们的公民能够自由自在地生活和恋爱。"
 LKT_focus_general_military_improvements_funding: "军事综合发展基金"
 LKT_focus_general_military_improvements_funding_desc: "军事综合发展基金是一项强有力的资金支持计划，旨在使我军能够根据未来可能面临的战场形势，在必要方面进行改进。鉴于空中威胁最大，我们将暂时把投资平均分配给空军和陆军。"
 LKT_focus_the_parties_for_tradition: "争取传统的政党"
 LKT_focus_the_parties_for_tradition_desc: "从中间偏右到更明显的右翼政党联合起来，组成了一个名为“传统政党联盟”的投票集团。因此，人们很想知道，在全国首次大选中，民众会倾向于哪个政党。"
 LKT_focus_ORP_political_plan: "老共和党政治计划"
 LKT_focus_ORP_political_plan_desc: "老共和党奉行稳定谨慎的纲领。这种纲领可以理解为稳扎稳打，赢得胜利。考虑到我们国家目前的处境，我相信如果他们像某些政党那样操之过急，很多人就不会投票给他们了。"
 LKT_focus_strategic_mechanization_act: "战略机械化法案"
 LKT_focus_strategic_mechanization_act_desc: "我们的经济在某种程度上过度依赖农业，这意味着很多人都从事农业生产。因此，尽管这可能会引起争议，但我们必须推行某种形式的机械化，以此更好地分配现有的劳动力。"
 LKT_focus_better_neighbors_act: "睦邻友好法案"
 LKT_focus_better_neighbors_act_desc: "由于农业是主要经济部门，粮食充足并不罕见。因此，我们可以鼓励来自邻国的“寻求庇护者”前来，以促进人口增长，并帮助重建整体经济。毕竟，没有人来填补这些职位，工作岗位就毫无意义。"
 LKT_focus_green_thumb_officers_act: "绿拇指警官法案"
 LKT_focus_green_thumb_officers_act_desc: "绿拇指警官法案旨在帮助改善执法部门的资金状况，并更好地将资源分配给偏远地区的社区和居民的生计。"
 LKT_focus_kansas_economic_upgrade: "堪萨斯经济升级"
 LKT_focus_kansas_economic_upgrade_desc: "堪萨斯州是我们最南端的一个重点发展区域。尽管该州发展迅速，但其对农业的依赖程度高于预期。因此，我们计划通过一些慷慨的投资，将该地区特定区域的农业经济转型为轻重工业混合型产业。"
 LKT_focus_better_budgeting_act: "优化预算法案"
 LKT_focus_better_budgeting_act_desc: "优化预算法案将对现有的教育预算进行全面细致的审计，以帮助简化和更好地分配财政资源。我们计划通过此举，尽可能消除预算失误对学生和教职员工造成的不便，从而提高教育水平。"
 LKT_focus_experimental_extractions_act: "实验萃取法案"
 LKT_focus_experimental_extractions_act_desc: "我国缺乏核心钢铁资源，或者说缺乏足够的铁矿石供应。因此，无论最终能否盈利，我们都将在堪萨斯州和内布拉斯加州进行地质勘测和大量投资，以确保我国能够获得这一现代经济的关键基础资源。"
 LKT_focus_GLP_political_plan: "大自由党政治计划"
 LKT_focus_GLP_political_plan_desc: "采取温和的自由主义政策来改善农业，将有利于我们的国家和人民。许多人投票支持大自由党，是因为它被视为一个循序渐进的政党，其变革方式易于人们适应和理解。但这些看法是否仍然成立，只有时间才能证明。"
 LKT_focus_food_bank_securities_act: "食品银行保障法案"
 LKT_focus_food_bank_securities_act_desc: "食品银行保障法案旨在发行政府债券和私人投资债券，用于购买家庭可能缺乏的常用食品。这些“食品银行”将用于帮助那些在困境中无力负担日常必需品的家庭。拥有稳定且持续运作、致力于帮助无家可归者和其他贫困公民的慈善机构也可以申请此类证券，但需接受联邦监管机构的监督，以确保资金和食品用于既定用途。"
 LKT_focus_audit_commissions_act: "审计委员会法案"
 LKT_focus_audit_commissions_act_desc: "审计委员会法案是一项旨在设立独立审计委员会的立法，以确保联邦机构和人员将财政和物质资源用于既定用途。该委员会成员均不隶属于任何政治机构或政党，且来自金融和监管等相关领域，以确保公正性。"
 LKT_focus_raw_value_act: "原始价值法案"
 LKT_focus_raw_value_act_desc: "我们国家从农业中获得的价值是有限的。人们需要各种商品，而商品的生产需要矿产资源，因此我们将投资稀土元素和其他高价值矿产，以确保我们能够实现国家资产组合的多元化（暂且这么说吧）。"
 LKT_focus_improving_immigration_processes: "改进移民流程"
 LKT_focus_improving_immigration_processes_desc: "通过加大投入，改善移民执法资源和入籍流程，我们可以期待更顺畅、更有效地吸引外国公民。我们希望他们选择我们的国家作为新的家园，从而赋予他们新的生命和更宝贵的意义。"
 LKT_focus_invest_care_act: "投资关怀法案"
 LKT_focus_invest_care_act_desc: "投资关怀是一项预算计划，旨在为医疗服务提供更稳定的资金支持。我们希望通过这些资金改善措施，提升员工士气，创造更多就业机会，并确保建筑符合规范，设备运转正常。您的健康就是我们的投资，因为人民的福祉造就国家的繁荣昌盛。"
 LKT_focus_national_defense_upgrades: "国防升级"
 LKT_focus_national_defense_upgrades_desc: "加大对设备的投入，提高人员对这些设备的熟悉程度，将增强我们保卫国家免受外国侵略的能力。"
 LKT_focus_TTP_political_plan: "部落传统党政治计划"
 LKT_focus_TTP_political_plan_desc: "部落传统党本质上是一个半本土主义政党，但其本土主义程度并不像许多人认为的那样强烈。其本土主义理念的核心在于：虽然这些土地曾经是部落领地，但为了向前发展、保护和生存，我们必须团结起来，成为一个多民族共同体。我们利用传统来维系团结，例如家庭、社区以及我们所坚守的原则。"
 LKT_focus_defense_spending_program: "国防开支计划"
 LKT_focus_defense_spending_program_desc: "国防开支计划是一项旨在使国家做好加强防御准备的支出方案。我国国土辽阔，既有开放区域，也有封闭区域，因此我们必须充分利用这些地形优势。"
 LKT_focus_families_security_stipend: "家庭安全津贴"
 LKT_focus_families_security_stipend_desc: "许多人称之为“家庭津贴”的这项补助金，是一项可申报的补助金，符合条件的家庭可以申请领取，以帮助缓解因家庭需求而面临的经济压力。该​​补助金涵盖食品、衣物和儿童保育需求，以及联邦津贴卡上列出的其他项目。"
 LKT_focus_food_supply_mandate: "食品供应令"
 LKT_focus_food_supply_mandate_desc: "我们的人民生活在肥沃的土地上，这片土地理应能够轻松养活居住于此的人民。我们将利用这片土地进行投资，并制定相关政策，尽可能确保我们的公民每餐都能享用到物美价廉的食物，因为我们国家的存亡就维系在粮食供应的平衡之上。"
 LKT_focus_limited_industrialization_efforts: "有限的工业化努力"
 LKT_focus_limited_industrialization_efforts_desc: "为了实现经济多元化，确保就业市场健康强劲，我们必须投资于有限的工业发展，以确保我们的人力资源能够像这片土地所能提供的一样多样化。"
 LKT_focus_setting_up_new_contracts: "签订新合同"
 LKT_focus_setting_up_new_contracts_desc: "为我们的军事制造能力建立一个有限的基准，至少可以让我们了解如果北美大陆爆发战争，我们可能会面临的需求。"
 LKT_focus_strategic_mining_operations: "战略采矿作业"
 LKT_focus_strategic_mining_operations_desc: "我们国家拥有丰富的资源，但我们需要投入相当多的资金来获取更有价值或经济效益更显著的矿产资源。鉴于此，我们将投资怀俄明州的贵金属开采和南达科他州的少量轻金属开采。投资额虽然不大，但补充一些研发经费最终会带来回报。"
 LKT_focus_LTSP_political_plan: "拉科坦传统与团结党政治计划"
 LKT_focus_LTSP_political_plan_desc: "拉科坦传统与团结党是一个立场较为保守的政党。该党致力于关注社区和家庭事务，并以此促进民族团结。然而，许多人不禁质疑，为何该党以及其他一些类似的保守派政党会以如今四分五裂的状态继续存在。"
 LKT_focus_community_improvement_programs: "社区改善计划"
 LKT_focus_community_improvement_programs_desc: "社区改善计划旨在提供社区外展和总体改善工作，以促进社区团结，并鼓励较小或较偏远地区的总体发展。"
 LKT_focus_farming_expansion_efforts: "农业扩张效果"
 LKT_focus_farming_expansion_efforts_desc: "我们国家的稳定得益于我们拥有大量肥沃的土地，因此我们将开发这些土地，鼓励我们的人民在他们耕耘的田地里发展壮大。"
 LKT_focus_building_to_new_heights: "迈向新高度"
 LKT_focus_building_to_new_heights_desc: "办公和科技行业需要扩张。如果我们想要真正实现经济多元化，充分发挥公民的潜力，就必须投资于新的发展项目以及相应的教育支持工作。"
 LKT_focus_manufacturing_new_industries: "制造新兴产业"
 LKT_focus_manufacturing_new_industries_desc: "发展经济核心基础是实现全面扩张的根本。"
 LKT_focus_securing_armaments: "保障军备"
 LKT_focus_securing_armaments_desc: "保障军队物资供应对国防至关重要。鉴于近期内预计不会有任何物资短缺，我们将从小规模做起，先建立几家工厂来应对基本装备的短缺。"
 LKT_focus_natural_resources_act: "自然资源法案"
 LKT_focus_natural_resources_act_desc: "这是一项全面而完善的矿业投资计划，旨在彻底改变我国的资源开发能力。虽然前期投入巨大，但随着时间的推移，必将获得丰厚的回报。"
 LKT_focus_the_common_folk_progress_parties: "平民进步党"
 LKT_focus_the_common_folk_progress_parties_desc: "一些人更喜欢称这些新兴的社会主义经济派政党为“平民政党”，它们都认为自己需要争取支持，以阻止“极右翼”势力的发展。无论这些政党的官员们用什么借口，许多人都认为这些政党代表了一种更贴近民众的视角，因为大部分土地尚未开发，传统意义上的“大企业”并不真正存在。"
 LKT_focus_FPP_political_plan: "农民进步党政治计划"
 LKT_focus_FPP_political_plan_desc: "以农业劳工党为基础的农民进步党，运用民主社会主义原则来建设一个农民国家。本质上，他们的关注点并非产业工人，而是改善农业工人的境遇。考虑到我国经济的构成，他们赢得选举也就不足为奇了。"
 LKT_focus_american_asylum_act: "‘美利坚’庇护法"
 LKT_focus_american_asylum_act_desc: "有些人称之为“三A法案”的政策，实际上是一种伪开放边境政策。简而言之，只要能证明自己曾在旧共和国领土上长期居住，就能获得庇护。这种对东部自由女神像周围格言的解读，是吸引人们进入我国、通过填补我们似乎供不应求的就业岗位来促进经济增长的绝佳途径。"
 LKT_focus_expanded_health_services: "扩展医疗服务"
 LKT_focus_expanded_health_services_desc: "提高我们的医疗保健能力，并能够在合理的时间内为任何人提供医疗服务，将确保生存率并改善我们公民的整体健康状况。"
 LKT_focus_fine_tuning_industrial_regulations: "完善工业法规"
 LKT_focus_fine_tuning_industrial_regulations_desc: "虽然我们的经济结构并不严重依赖工业，但我们仍然可以通过调整和先发制人地废除某些阻碍或直接伤害许多国家公民的麻烦法规来扭转局面。"
 LKT_focus_more_for_more_act: "高质高价法案"
 LKT_focus_more_for_more_act_desc: "这项资助计划将有助于更好地规范农业生产流程，同时鼓励建设新的农场及相关产业。之所以提倡“高质高价”，是因为从长远来看，从事农业的人数将会减少，但同样的农业从业者仍有机会参与其中。"
 LKT_focus_farmer_jims_research_emporium: "吉姆农夫的研究商场"
 LKT_focus_farmer_jims_research_emporium_desc: "农业研究中心不仅有助于培养新一代农民，还可以兼作研究机构，帮助更好地生产农产品。"
 LKT_focus_steeled_veins_act: "钢铁静脉法案"
 LKT_focus_steeled_veins_act_desc: "铁矿石是炼钢的命脉，而钢铁又是现代经济和结构的重要支柱，它就蕴藏在我们脚下。为了拥有稳定高效的经济，我们必须投资并确保这种需求量巨大的资源能够得到保障。"
 LKT_focus_LAS_political_plan: "拉科塔农业学会政治计划"
 LKT_focus_LAS_political_plan_desc: "拉科塔农业学会是一个集体主义运动，旨在实现农业政策的现代化，同时寻求削减政府开支的方法，从而将更多权力归还给人民。"
 LKT_focus_asylum_experiment: "庇护实验"
 LKT_focus_asylum_experiment_desc: "我们力求使我们的土地、农场乃至整个国家都人口稠密。因此，我们必须寻求最佳的庇护申请途径，并竭尽所能弥补这些关键的不足。"
 LKT_focus_improving_farming_methods: "改进耕作方法"
 LKT_focus_improving_farming_methods_desc: "投资改善粮食生产等基本经济需求，将使每个人受益，无论其背景如何。因此，我们将探索各种方法来改进农业，从而改善我们的粮食供应。"
 LKT_focus_mechanized_agriculture_union: "机械化农业联盟"
 LKT_focus_mechanized_agriculture_union_desc: "通过将工业和农业这两个经济部门结合起来，我们树立了一个相互借鉴的先例，即这两个部门的运作离不开彼此的促进。因此，如果我们想要建立一个真正平等的社会，就必须确保它们共同增长和发展。"
 LKT_focus_local_farming_initiatives: "地方农业倡议"
 LKT_focus_local_farming_initiatives_desc: "粮食安全面临的最大问题是供应链。如果货物在到达商店货架之前就腐烂变质，那么大规模生产就毫无意义。鉴于此，我们将鼓励更多本地化发展，以减少食品长途运输的需求。同时，我们将努力提高单价，并改善民众可用于满足自身需求的可用货币。"
 LKT_focus_more_ways_to_work_the_land: "更多耕作土地的方式"
 LKT_focus_more_ways_to_work_the_land_desc: "农业只能带我们走到一定程度，而现代农业发展方式的要求意味着我们必须认真勘察土地，寻找矿产资源。因此，开展全国均衡的地质勘测、采矿作业以及建设新的加工设施，将使我们的国家达到现代史上前所未有的高度。"
 LKT_focus_the_land_of_opportunity: "机会之地"
 LKT_focus_the_land_of_opportunity_desc: "我们的土地广袤无垠，人烟稀少，正是社区繁荣发展、携手共进的理想之地。让我们秉持着欢迎所有追求更美好未来的人们的宗旨。"
 LKT_focus_PNP_political_plan: "国家保护党战争计划"
 LKT_focus_PNP_political_plan_desc: "国家保护党是一个相当标准的绿党。虽然与更传统的政党相比有所妥协，但国家保护党力求在实现现代化的同时，确保国家的自然美景不受破坏。"
 LKT_focus_building_tall_not_wide: "要建高而不是要建宽。"
 LKT_focus_building_tall_not_wide_desc: "通过研究提高工厂效率的新方法，我们可以共同努力，找到既能满足社会需求又无需占用大量土地的方法。"
 LKT_focus_stable_economics: "稳定的经济"
 LKT_focus_stable_economics_desc: "为了维护经济稳定，我们必须在提高工厂和其他经济部门效率的同时，努力弥补就业市场的差异。因此，我们需要加大对社会服务和经济规划举措的投入。"
 LKT_focus_local_food_producers: "当地食品生产商"
 LKT_focus_local_food_producers_desc: "“本地食品生产商计划”旨在建立少量农场，专门为当地居民提供食品。此举不仅大幅降低了食品成本，还鼓励更多地在国内消费，而非依赖进口和出口。"
 LKT_focus_sufficient_tech_investments: "充足的技术投资"
 LKT_focus_sufficient_tech_investments_desc: "我国的科技产业规模很小，几乎可以忽略不计。然而，我们确实拥有足够的资源进行一些像样的投资，这样至少可以实现就业机会的多样化，并拥有可供进一步利用的资源。"
 LKT_focus_domestic_arms_production_efforts: "国内武器生产效果"
 LKT_focus_domestic_arms_production_efforts_desc: "我们保护土地和人民的能力完全取决于我们常备军的实力。虽然近期似乎不会发生什么大事，但一开始就什么都没有，无论如何都算不上是计划。"
 LKT_focus_eco_extraction_efforts: "生态开采效果"
 LKT_focus_eco_extraction_efforts_desc: "通过精细的工具制造和资源开采方式的改进，我们可以拥有丰富多样的资源。然而，由于我们自身对采矿活动的克制，直接资源量将受到极大限制。但我们希望随着技术的进步，能够进一步开发出以更少资源获取更多资源的方法。"
 LKT_focus_RBP_political_plan: "玫瑰丛党政治计划"
 LKT_focus_RBP_political_plan_desc: "玫瑰丛党致力于提升工人权益，并通过渐进式工业化道路推动国家整体进步。该党力求加强经济发展与社会发展的融合，并将竭尽所能确保劳资双方关系的稳定与繁荣。"
 LKT_focus_revamped_corporate_taxes: "企业税改革"
 LKT_focus_revamped_corporate_taxes_desc: "通过改革税法，特别是围绕更加标准化的企业税率，我们可以确保我们拥有稳定的收入形式，并将更多的征税需求转移到公司或办公实体，而不是普通纳税人。"
 LKT_focus_education_for_all: "全民教育"
 LKT_focus_education_for_all_desc: "大幅扩展我们的教育体系，提升每位公民获取周围世界知识的能力。这将使我们获得被动收益，因为我们的人口受教育程度不断提高，基本水平也越来越高。"
 LKT_focus_fixing_our_ore_deal: "恢复我们的矿石交易"
 LKT_focus_fixing_our_ore_deal_desc: "钢铁，是继混凝土之后支撑现代经济的支柱。如果我们想要长期自力更生，就必须大力投资建立自己的钢铁供应链。我们四面楚歌，充满未知，所以至少要明确一点。"
 LKT_focus_from_fields_to_cities_act: "从田野到城市法案"
 LKT_focus_from_fields_to_cities_act_desc: "我们的农村和城市中心的总体发展，使得就业市场整体多元化扩张，并提高了公民可获得的就业机会的质量。"
 LKT_focus_from_it_sector_developments: "IT部门发展"
 LKT_focus_from_it_sector_developments_desc: "拥有规模虽小但能自力更生的信息技术和/或科技产业，对于继续努力实现经济结构多元化将大有裨益。"
 LKT_focus_supplying_our_military_needs: "满足我们的军事需求"
 LKT_focus_supplying_our_military_needs_desc: "无论民用还是军用，基本需求都必须始终得到满足。如果我们想要抵御外敌入侵，就必须发展一些工厂，以确保军工生产能够满足我们的需求。"
 LKT_focus_new_lakotan_nationals_parties: "新拉科塔民族党"
 LKT_focus_new_lakotan_nationals_parties_desc: "社会主义经济思想的兴起，旧共和国的突然而剧烈的瓦解，以及我们国家所拥有的未受破坏的原始土地。这些只是你们——我们光荣国家的公民 - 应该投票支持我们其中一人的部分原因。新拉科塔国民党！加入我们，共同捍卫我们摆脱外国干涉和马克思主义乃至毛泽东主义理想，缔造的全新身份认同。今天就投票，尽你所能！"
 LKT_focus_YIP_political_plan: "青年实业家党政治计划"
 LKT_focus_YIP_political_plan_desc: "青年实业家党是一个以现代化和繁荣为政策核心的政党。尽管有人担心他们不过是披着斗篷的寡头，但党内许多人更注重展示和证明既定的计划，而不是参与传统的政治抹黑。"
 LKT_focus_sponsored_immigration: "担保移民"
 LKT_focus_sponsored_immigration_desc: "我们的土地贫瘠，人口稀少，因此我们必须引进寻求更好生活的新移民。这里有待填补的就业市场，还有一望无际的土地可供定居。这是我们对这些新拓荒者的承诺。"
 LKT_focus_recruiting_talent: "人才招聘"
 LKT_focus_recruiting_talent_desc: "提高人口比例的其他方法是为技术工人提供就业机会。更高的工资和更好的生活条件始终是很好的激励措施。"
 LKT_focus_south_munitions: "南方军需品"
 LKT_focus_south_munitions_desc: "保障军需品的本地生产链，将使我们的军人能够应对任何针对我们的威胁。"
 LKT_focus_central_industries: "中部工业"
 LKT_focus_central_industries_desc: "不支持人民，就无法支持军队。因此，我们将集中发展工业，以更好地满足就业人员的出行需求。"
 LKT_focus_bismarck_bombs: "俾斯麦炸弹"
 LKT_focus_bismarck_bombs_desc: "在北部平原建立更多的军工厂，将使我们能够在发生任何意外情况时，以最小的附带损害来处理更多不稳定的材料。"
 LKT_focus_promoting_human_resources: "促进人力资源"
 LKT_focus_promoting_human_resources_desc: "田地已熟透，待收割的作物也已成熟，人们也同样需要帮助。我们必须通过激励农业生产，并鼓励人们将农产品从田间运送到全国各地的餐桌，来确保移民工作的发展具有针对性，并提供相应的经济支持。"
 LKT_focus_CDS_political_plan: "农作物喷洒者协会政治计划"
 LKT_focus_CDS_political_plan_desc: "地理民族主义和坚定的孤立主义。这两大支柱支撑着“社团”的核心价值观，但很多人对此感到困惑。首先，一个人怎么可能仅仅是“地理民族主义者”？其次，我们本来就发展程度如此之低，孤立主义又能对我们有什么帮助呢？无论如何，“农作物喷洒者协会”在选举中获胜后，继续向前迈进。"
 LKT_focus_learning_social_values: "学习社会价值观"
 LKT_focus_learning_social_values_desc: "我们的社会一片混乱，因为人们不知道应该捍卫什么。家庭、国家以及我们所居住的土地的精神，都是促进和确保社会更加稳定公正的关键价值。"
 LKT_focus_character_creation_programs: "角色创建项目"
 LKT_focus_character_creation_programs_desc: "通过结合志愿服务和义务教育的混合项目，将教育和军事服务相结合，我们的许多公民和子孙后代将能够更好地理解责任和义务。这种责任和义务不仅对国家负责，也对自身、家庭以及所爱之人负责。"
 LKT_focus_supply_chains: "补给链"
 LKT_focus_supply_chains_desc: "我国幅员辽阔，地势平坦，总体而言发展水平相对较低。我们必须竭尽全力建立强大而灵活的补给链，以支撑我国的各项事业。"
 LKT_focus_domestic_families_act: "国内家庭法案"
 LKT_focus_domestic_families_act_desc: "国内家庭法案是一项旨在促进并实际补贴多子女家庭、从而鼓励国内人口增长的预算方案。由于符合我们文化标准的外国人才可能难以寻觅，我们必须确保人口数量过低永远不会成为我们自身生存的关键因素。"
 LKT_focus_encouraging_favorable_migrants: "鼓励有利的移民"
 LKT_focus_encouraging_favorable_migrants_desc: "我们必须搜寻并寻找国家及其公民所需的才能和技能。因为我们的生存取决于我们自身的能力，因此我们必须努力提升我们自身所能拥有的能力。"
 LKT_focus_increased_military_investments: "增加军事投资"
 LKT_focus_increased_military_investments_desc: "我们需要确保我们的军人装备精良，随时准备应对可能入侵我们领土的任何敌军。"
 LKT_focus_LGF_political_plan: "金田联盟政治计划"
 LKT_focus_LGF_political_plan_desc: "许多人称之为金田联盟的政党，当初几乎没人看好它能获胜，但它最终还是赢了。很多人不明白这样一个政党当初是如何胜出的，但在如今这个充满变数的时代，恐怕也无能为力。我们只能祈祷它带来的是好事多于坏事。"
 LKT_focus_improved_food_production: "提高粮食产量"
 LKT_focus_improved_food_production_desc: "保障国民粮食安全有助于促进国内经济增长和社会稳定。"
 LKT_focus_increasing_industrial_base: "不断扩大的工业基础"
 LKT_focus_increasing_industrial_base_desc: "提高工业产能可以使我们的经济多元化，改善经济整体状况，并为我们的公民提供比邻国更多的机会。"
 LKT_focus_local_military_production: "本地军工生产"
 LKT_focus_local_military_production_desc: "投资本地军工产业能够保障我们军队的装备供应，并防止军队衰落。然而，如果我们想要真正抵御那些贪婪嫉妒我们土地的野蛮人，就必须对此进行更深入的研究。"
 LKT_focus_increasing_lawful_order: "加强法律秩序"
 LKT_focus_increasing_lawful_order_desc: "通过增加警务和安全部门的预算，我们可以打击各种犯罪活动。这样一来，我们就能约束企业实体，也能阻止可能混入守法公民群体中的潜在外国干涉者。"
 LKT_focus_military_education_act: "军事教育法案"
 LKT_focus_military_education_act_desc: "军事教育法案旨在按照军事组织的指导方针规范教育。知识分子将不再用那些动辄破坏社会根基的喧嚣思想毒害我们的青年。如今，我们追求的是责任、荣誉、勇气、尊重和牺牲。为了家园、家人，为了我们所有公民心中珍视的一切。"
 LKT_focus_self_mobilization: "自发动员法案"
 LKT_focus_self_mobilization_desc: "自发动员法案是一项全面的经济计划，旨在动员国家及其公民进入一种“四分之一姿态”。这意味着要调整经济结构以提高效率，提前雇用更多人员以应对可能发生的真正动员，并加大征兵力度，使民众在心理和社会层面做好准备，以应对任何敌对入侵。"
 LKT_focus_HOY_political_plan: "黄石王室政治计划"
 LKT_focus_HOY_political_plan_desc: "黄石王室是“现代君主主义运动”这一更广泛的全球现象的一部分。这场范围广泛、略显多元化的政治运动只有一个核心信条：荣耀归于选票而非血统。这意味着要保留并完善选举制度，使其更加普及和灵活。例如，赋予18岁以下公民普选权、采用排序复选制选举候选人，以及将民选职位赋予头衔。这意味着总统现在相当于国王，或者众议员现在相当于领主等等。许多人对此感到困惑，但大多数人正在逐渐接受仅仅因为担任国家公务员就能获得公爵、男爵或其他头衔的想法。"
 LKT_focus_office_titles_act: "官员头衔法案"
 LKT_focus_office_titles_act_desc: "将政府官职的封建头衔标准化，可以向人们表明，只要足够努力，即使是他们也能成为王子或公主。"
 LKT_focus_expanding_mining_operations: "扩大采矿作业"
 LKT_focus_expanding_mining_operations_desc: "我们需要确保国家真正能够自力更生。因此，我们需要投资于矿产资源开采相关的采矿作业，因为我们严重缺乏这些资源。"
 LKT_focus_farmers_primacy_act: "农民优先法案"
 LKT_focus_farmers_primacy_act_desc: "粮食安全是构建稳定经济的唯一保障。鉴于我国人口稀少，我们必须竭尽所能促进人口增长，而粮食安全是实现这一目标的最佳途径之一。"
 LKT_focus_expanding_immigration_efforts: "扩大移民工作"
 LKT_focus_expanding_immigration_efforts_desc: "世界局势就像走钢丝。有些国家很好，有些国家还不错，还有些国家很糟糕。我们必须努力让邻国看到，我们是比较好的国家之一。鼓励移民有助于稳定就业市场，并有助于促进严重欠发达地区的经济发展。"
 LKT_focus_improving_education_standards: "提高教育标准"
 LKT_focus_improving_education_standards_desc: "我们必须提高教育水平，以确保我们在创新和生产商品及服务方面的能力能够尽可能减少浪费。"
 LKT_focus_national_economic_investments: "国民经济投资"
 LKT_focus_national_economic_investments_desc: "经济多元化就是被动地保障国家独立。通过少量生产各种产品，我们可以利用这个跳板，在对外关系和贸易协定中游刃有余地进行谈判和谈判。"
 LKT_focus_industrialization_question: "工业问题"
 LKT_focus_industrialization_question_desc: "许多人将我们控制下的州称为“大平原州”，这些州是旧共和国时期最不发达的地区之一，当然也是我们现在这个新共和国中最不发达的地区之一。然而，我们拥有了新的政府和全新的开始，可以做任何我们想做的事情。因此，我们必须扪心自问一个问题：是否要实现工业化？"
 LKT_focus_the_great_northern_railway: "大北方铁路"
 LKT_focus_the_great_northern_railway_desc: "它曾是伯灵顿北方圣达菲铁路公司的一个不起眼的小部件，如今再次成为一家独立运营的公司。通过对现有有限基础设施的重组，我们既可以重塑铁路史上一个已逝的品牌，又能改善和资助我们不断发展的基础设施。"
 LKT_focus_northern_bypass: "北方小径"
 LKT_focus_northern_bypass_desc: "沿加拿大边境的这条边境路线将为我们提供一条从蒙大拿州向北达科他州运输货物的替代路线。更不用说它还能满足与贸易协定相关的潜在运输需求。"
 LKT_focus_great_western_mainline: "大西部干线"
 LKT_focus_great_western_mainline_desc: "蜿蜒穿过蒙大拿州进入怀俄明州，将使我们能够跋涉穿越西部地区各种丘陵和山区地形，运送大量货物。"
 LKT_focus_the_southern_extension: "南部延伸段"
 LKT_focus_the_southern_extension_desc: "我们一路向堪萨斯州进发，可以将货物从遥远的达科他州北部一直运送到南部这个相对孤立的州，从而促进我们共和国内各州之间的合作。"
 LKT_focus_completing_the_network: "完成网络"
 LKT_focus_completing_the_network_desc: "我们在不同的战略位置修建绕行道路，完善了我们的投资，这样在发生自然灾害、人为事故或任何可能损坏一条或多条现有道路的情况时，我们就有替代路线。"
 LKT_focus_modern_agrarian_economy: "现代农业经济"
 LKT_focus_modern_agrarian_economy_desc: "我们的土地广袤、肥沃、物产丰饶。如果任由它们在现代工业化这种破坏性和毒害性的环境下荒废，那将是莫大的遗憾。我们必须回归到更简单却也更精妙的经济发展模式。这些土地将是关键所在，因为每一寸土地都将成为滋养世界的农场。"
 LKT_focus_northern_farms_adaptation_act: "北方农场适应法案"
 LKT_focus_northern_farms_adaptation_act_desc: "北方农场适应法案是一项旨在投资北方各州农场和农业中心的立法。这些投资包括资金和资金支持，以及冬季适应方法的培训，并可能包括新建设施和在严冬也能提供农产品的途径。温室和隔热供暖良好的牲畜设施意味着农民几乎可以全年稳定地从事农业生产。"
 LKT_focus_centralia_farms_act: "中部农场法案"
 LKT_focus_centralia_farms_act_desc: "中部农场法案将对我国中部各州的农场进行重组，成立一家公私合营的企业实体。其主要目标是促进经济增长平衡，并确保农产品多样化，充分发挥各州的优势。由于该州面积接近全州的一半，是人口最多的地区，因此，为了兼顾私人财富创造和公共粮食安全，我们决定采用合资模式。"
 LKT_focus_southern_farming_traditions: "南部农耕传统"
 LKT_focus_southern_farming_traditions_desc: "在我国南部地区以及旧共和国时期，种植经济作物一直被视为一种不成文的传统。如今，虽然我们是一个新兴国家，但这些经济作物在出口和国内价值方面的重要性仍然不容忽视。因此，我们将引导气候较为稳定的堪萨斯州，更加倾向于种植多种经济作物。"
 LKT_focus_targeted_mechanization_efforts: "有针对性的机械化工作"
 LKT_focus_targeted_mechanization_efforts_desc: "通过将工业力量集中用于促进农业发展，我们可以确保生产力大幅提高，并实现经济多元化，以应对可能出现的意外情况。你永远无法预料天气或全球性现象是否会对我们造成伤害。"
 LKT_focus_bio_fuel_investments: "生物燃料投资"
 LKT_focus_bio_fuel_investments_desc: "利用我们的教育体系，实现农业经济多元化并提升其效益。现在，我们可以着手研究和探索新型生物燃料，为我们的汽车、家庭和企业提供动力。"
 LKT_focus_the_farmers_tax_code: "农业税法"
 LKT_focus_the_farmers_tax_code_desc: "通过对税法进行全面修订，并以其保护农业生产方式为先例，我们可以确保劳动力市场的稳定，并着眼于投资国家未来的农场和农民。"
 LKT_focus_funding_general_education_improvements: "为普通教育改进提供资金"
 LKT_focus_funding_general_education_improvements_desc: "将预算用于教育将有助于培养子孙后代，以满足我们不断增长的技术需求，满足我们自身的好奇心和实际需要。"
 LKT_focus_bio_fuel_engineering_institute: "生物燃料工程研究所"
 LKT_focus_bio_fuel_engineering_institute_desc: "生物燃料工程研究所是一所专门从事生物燃料应用和整体效率提升的研究和高等教育机构。我们将以该研究所为支柱，大力发展教育，并提升我国的经济实力。"
 LKT_focus_skill_set_education_programs: "技能培训项目"
 LKT_focus_skill_set_education_programs_desc: "技能培训项目是一项旨在进一步丰富和提升公民生活技能的资助计划。我们希望这将极大地促进就业，并为经济增长和发展带来更加稳定和全面的途径。"
 LKT_focus_lakotan_development_fund: "拉科塔发展基金"
 LKT_focus_lakotan_development_fund_desc: "通过拨出预算中的特定部分，我们可以确保有针对性的发展，以平衡和更好地发展我们的经济基础。"
 LKT_focus_the_fifth_revolution: "第五次工业革命"
 LKT_focus_the_fifth_revolution_desc: "千禧年之交，工业化进程经历了两次重大迭代。此后，我们见证了第三次工业化——自动化元素的兴起，以及第四次工业化 - 人工智能和计算机集成技术的飞速发展，其程度远超人们的想象。如今，我们正为第五次工业革命奠定基础，在这个革命中，我们这个曾经以田野为主、工业基础薄弱的国家，将在现代化进程中与远东国家的崛起相媲美。"
 LKT_focus_rushmore_revival: "拉什莫尔山复兴计划"
 LKT_focus_rushmore_revival_desc: "达科他州不仅象征着我们为国家选择的新名称——一个更加中立或更具新身份认同的名称，而且这两个州也象征着我们所居住土地的核心认同。因此，我们必须将这两个州作为我们旨在实现全国工业化的新革命政策的首要任务。"
 LKT_focus_rocky_roads_no_more: "“不再崎岖之路”项目"
 LKT_focus_rocky_roads_no_more_desc: "蒙大拿州和怀俄明州，这两个与落基山脉接壤或几乎占据落基山脉全部区域的州，具有重要的战略意义。它们既是连接落基山脉的纽带，又因地形复杂而给发展带来挑战。因此，必须对基础设施和经济发展进行全面投资，以确保这两个州不落后于其他州。"
 LKT_focus_kansas_city_kerosene: "堪萨斯城煤油项目"
 LKT_focus_kansas_city_kerosene_desc: "堪萨斯州和内布拉斯加州蕴藏着巨大的未开发潜力。这两个州拥有丰富的石油和天然气资源，其源头可追溯至德克萨斯州。我们可以利用这些资源，推动我国在工业化进程中走在前列。通过协调一致的采矿作业和经济投资，我们有望迎来辉煌的未来。"
 LKT_focus_rare_earth_energy_act: "稀土能源法案"
 LKT_focus_rare_earth_energy_act_desc: "开发稀土元素矿山以及扩大国内能源产能，不仅能够使我们继续发展工业基础，还能为我们的外交努力提供谈判筹码。"
 LKT_focus_project_nebraska_namesake: "内布拉斯加州同名项目"
 LKT_focus_project_nebraska_namesake_desc: "内布拉斯加州拥有大量战略资源，其中一些尚未得到充分开发，或者我们所知的资源根本未被开发利用。因此，我们将启动一项全面的采矿和勘测计划，以确保这些战略资源得到开发利用，不仅能够推动我们的工业化进程，还能提升我们在国际上的潜在政治影响力。"
 LKT_focus_business_tax_reforms: "企业税制改革"
 LKT_focus_business_tax_reforms_desc: "随着工业基础的不断扩大，我国经济结构日益多元化。因此，我们需要认真审视并全面改革各行业的税法，以确保其公平公正。这将有助于公民创造更多自主创业的机会，同时也能让他们更好地储蓄，并以他们认为合适的方式为经济发展做出贡献。"
 LKT_focus_peoples_tax_reforms: "人民的税制改革"
 LKT_focus_peoples_tax_reforms_desc: "商业繁荣固然重要，但企业的成功离不开民众的福祉。因此，我们需要确保税法简化、现代化，并使其合理化，以维持不断工业化的民众的生活。"
 LKT_focus_establishing_lakotan_institute_of_technology: "拉科塔理工学院"
 LKT_focus_establishing_lakotan_institute_of_technology_desc: "拉科塔理工学院的成立是集中式研发工作的一项突破。它不仅能将物质和人力资源集中到一个更本地化的区域，而且其宗旨还在于最大限度地发挥每个人的能力，帮助发展和改进已知科学。"
 LKT_focus_national_investment_progrmas: "国家投资计划"
 LKT_focus_national_investment_progrmas_desc: "随着经济步入正轨，形势一片大好，我们现在可以开始放慢脚步，制定稳健的发展方向。在预算项目方面进行一些全面的投资，将使我们的人民能够专精于特定领域，不断成长，并适应现代经济瞬息万变的局面。"
 LKT_focus_a_new_economy: "新经济"
 LKT_focus_a_new_economy_desc: "经济形势稳定后，我们现在可以专注于政治。总的来说，我们离关注内政以外的领域又近了一步。"
 LKT_focus_department_of_energy: "能源部"
 LKT_focus_department_of_energy_desc: "拥有经济固然很好，但如果无法为其提供动力和利用，一切都毫无意义。因此，我们将成立拉科塔能源部，以确保解决当前的问题。"
 LKT_focus_fueling_agrarianism: "农业能源主义"
 LKT_focus_fueling_agrarianism_desc: "鉴于我国经济以农业为主，我们必须调整并发展能源经济以满足这些需求。好消息是，只要投资得当，我们其实无需扩建能源基础设施，而只需提高燃料从最需要的地方输送到其他地方的距离即可。"
 LKT_focus_fueling_tomorrows_economy: "为未来经济提供动力"
 LKT_focus_fueling_tomorrows_economy_desc: "我们的需求巨大，但我们的土地和资源更加辽阔。我们必须发展能源产业，以确保我们自身以及未来的需求都能通过国内手段得到满足。"
 LKT_focus_a_new_green_deal: "新绿色协议"
 LKT_focus_a_new_green_deal_desc: "新绿色协议是一项全面的能源投资计划，旨在开发并确保充分利用最高效、也是真正意义上的唯一绿色能源生产方式，而这得益于当前以及未来有望取得的突破性进展。该计划包括建设小型高效电厂，并对废燃料回收利用进行有限的投资。总之，涵盖了所有相关方面，甚至更多。"
 LKT_focus_finalizing_doe_capabilities: "最终确定能源部能力"
 LKT_focus_finalizing_doe_capabilities_desc: "如今，我们的能源行业与经济需求相符，我们可以努力将这两者结合起来，推动我们的国家走向我们将要创造的未来。"
 LKT_focus_increased_funding_for_donr: "增加对自然资源部的拨款"
 LKT_focus_increased_funding_for_donr_desc: "通过加大对脚下自然资源的投入，我们可以确保经济更加自给自足，或者至少能够实现更加平衡的经济发展。"
 LKT_focus_massive_investments: "大规模投资"
 LKT_focus_massive_investments_desc: "为了确保我们获得一切，我们将尽可能投入资金，以获取尽可能多的不同矿产资源。"
 LKT_focus_need_by_need_investment_strategy: "按需投资策略"
 LKT_focus_need_by_need_investment_strategy_desc: "我们的采矿活动应当作为对主要经济活动的补充。因此，我们将根据实际需要对自然资源部进行投资，以控制需求。"
 LKT_focus_iron_ore_revival: "铁矿石复兴法案"
 LKT_focus_iron_ore_revival_desc: "我们的铁矿石储量充其量也只是尚未开发，甚至由于过去的失误而未能充分开发。然而，这种情况将不复存在。通过在南达科他州、堪萨斯州和蒙大拿州等地的投资，我们将扩大现有业务，并重启一些老旧矿场，例如堪萨斯州那座因环境问题而提前关闭的矿场。清理等工作可能会耗费一些资金，但可观的铁矿石产量意味着我们将拥有充足的国内供应，而钢铁正是现代世界的关键材料之一。"
 LKT_focus_bauxite_brawls_act: "铝土矿争斗法案"
 LKT_focus_bauxite_brawls_act_desc: "确保我们的经济能够获得更灵活的金属资源，意味着我们也可以深入探索其在民用和军事领域的应用。因此，从长远来看，复兴、扩建以及投资更多高能耗矿场将是值得的。"
 LKT_focus_precious_mines_act: "贵重矿产法案"
 LKT_focus_precious_mines_act_desc: "多个州都拥有稀土元素矿藏。因此，我们将投资开发和扩大矿产开采规模，使其达到潜在的商业规模，以确保我国经济结构实现最大程度的多元化。毕竟，更多的国内资源意味着更多的外国投资。"
 LKT_focus_rubber_stamp_act: "橡皮图章法案"
 LKT_focus_rubber_stamp_act_desc: "我们国内石油产量很高。其中一部分可以进行战略性重新分配，用于合成化学品和橡胶生产，以确保我们的土地资源多样性达到最佳状态。"
 LKT_focus_lakotan_military_development_board: "拉科塔军事发展委员会"
 LKT_focus_lakotan_military_development_board_desc: "拉科塔军事发展委员会旨在简化军事发展流程并提升军事能力。考虑到我们实际上只需要关注陆军和空军这两个军种，这项工作应该会比较顺利。然而，一些曾在旧共和国海军服役的人员希望有朝一日能够建立一支拉科塔海军。但就目前而言，陆军和空军才是我们的主力军。"
 LKT_focus_military_refinement: "完善军事"
 LKT_focus_military_refinement_desc: "经过反复试验，投入大量物资和人力，以及漫长的时间，我们终于至少建立了一个稳固的武装力量分支，以确保国家安全和公民及其家园的安全。"
 LKT_focus_lakotan_army_pay_standards: "拉科塔军队薪酬标准"
 LKT_focus_lakotan_army_pay_standards_desc: "确保士兵获得优厚的薪酬，并有能力照顾好自己以及家中的亲人，这将潜移默化地提升士气。此外，这种更高的敬业精神很可能还会带来训练人员更替率的提升，并提高我们通过训练所能培养出的士兵素质。"
 LKT_focus_establishing_arms_contractors: "建立武器承包商"
 LKT_focus_establishing_arms_contractors_desc: "建立一支专门的军工产业队伍，为我国国防这一核心支柱提供强有力的支持，至关重要。为此，我们将确保资金到位，保障我军能够持续获得高质量的武器装备。"
 LKT_focus_sundance_war_college: "日舞战争学院"
 LKT_focus_sundance_war_college_desc: "通过创建一所专门的军事院校，我们可以为未来的士官和军官做好迎接未来战场挑战的准备。我们将训练他们的战术、领导力和责任委派能力。最重要的是，我们将培养他们的适应能力，因为任何优秀的士兵都应该明白，凡事皆有可能出错，而且很可能真的会出错。"
 LKT_focus_butte_testing_facilities: "孤丘测试设施"
 LKT_focus_butte_testing_facilities_desc: "通过建立专门的测试和研发设施综合体，我们可以确保我们部队的素质不断提高，使他们能够为未来可能发生的冲突做好准备。"
 LKT_focus_research_mania: "研究狂热"
 LKT_focus_research_mania_desc: "研发才是关键所在。我们将大力投资于新型武器、弹药和支援装备的研发，以确保我军的素质远超任何企图以任何方式伤害我们的人。"
 LKT_focus_geneva_compliant_munitions: "符合日内瓦公约的军火"
 LKT_focus_geneva_compliant_munitions_desc: "我们当然要在国际社会面前保持良好形象，但这并不意味着我们不能挑战一些事情的底线。对吧？"
 LKT_focus_experiemental_weapons_platoon: "实验武器排"
 LKT_focus_experiemental_weapons_platoon_desc: "实验武器排将作为一支专门部队，隶属于更广泛的“实验武器兵团”。该兵团将指派支援排，协助进行实地测试，并在部队陷入困境或遭遇紧急情况时提供必要的支援。实验武器排主要装备实验性反坦克武器，并能根据不断变化的战场形势，灵活调整以适应军队的需求。"
 LKT_focus_the_corps: "‘军团’"
 LKT_focus_the_corps_desc: "实验武器部队的成立使我们能够最大限度地、灵活地调配资金、开展训练和测试工作。这支新的研发部队将成为指引我们、帮助我们抵御一切入侵我们领土的敌人的灯塔。"
 LKT_focus_logistical_primacy: "后勤优先论"
 LKT_focus_logistical_primacy_desc: "如果局势真的恶化到如此地步，我们可以通过集中精力进行战争后勤保障，以纯粹的消耗战手段战胜敌人。"
 LKT_focus_bread_and_butter_doctrine: "面包与黄油原则"
 LKT_focus_bread_and_butter_doctrine_desc: "通过调整经济意识以应对生存冲突，采取先发制人的配给措施以及建立适当的战略位置的食品储备，不仅有助于我们的军队，而且有助于任何灾后重建工作。"
 LKT_focus_supply_heroes: "后勤英雄"
 LKT_focus_supply_heroes_desc: "没有补给，子弹就无法飞行。无论对英雄的定义有何繁琐的界定，我们都认同每个人都有能力在自己的领域脱颖而出，成为人们需要的英雄。因此，我们将大力发展后勤保障部队，并开展以后勤保障为基础的特色训练，以确保供应链与其所服务的部队之间实现最大程度的协同运作。"
 LKT_focus_logistics_corps_training_programs: "后勤兵团训练计划"
 LKT_focus_logistics_corps_training_programs_desc: "向各行各业的人士开放军队并不总是意味着他们必须是前线士兵。同样，“后勤人员”也不一定总是会给前线士兵带来负面影响。因此，我们将致力于为后勤部队制定新的训练计划和专门的作战条令，以确保前线协同作战、补给线高效运转以及战场上的整体军事效能。"
 LKT_focus_lakotan_air_force_training_improvements: "拉科塔空军训练改进"
 LKT_focus_lakotan_air_force_training_improvements_desc: "通过对资格标准的适当标准化，我们希望在战斗情况下培养出一批最优秀的飞行员。"
 LKT_focus_fighter_priority_structure: "战斗机优先结构"
 LKT_focus_fighter_priority_structure_desc: "战斗机优先结构改革旨在围绕战斗机重新调整空军各军种的主要职能。训练和部队组成将确保战斗机优先于地面支援或一般战略轰炸机支援。我们少量生产的战斗机必须能够在我方战斗机部署的任何地点不受敌机干扰地飞行。"
 LKT_focus_fighter_supremacy_doctrine: "战斗机至上理论"
 LKT_focus_fighter_supremacy_doctrine_desc: "我们的空军战略发展更加侧重于战斗机，是为了确保对制空权的完全掌控。因此，无论我们在轰炸机或地面支援方面存在何种不足，我们都能凭借绝对的制空权，为这些方面提供自由的试验场。"
 LKT_focus_ground_support_priority_structure: "地面支援优先结构"
 LKT_focus_ground_support_priority_structure_desc: "地面支援优先结构改革将调整空军的作战结构，优先发展和部署地面支援型飞机。这将确保即使我们无法完全掌握制空权，至少也能对敌人进行空中打击，从而保障前线稳定。"
 LKT_focus_ground_support_supremacy_doctrine: "地面支援至上理论"
 LKT_focus_ground_support_supremacy_doctrine_desc: "我军空军战略的发展，优先发展地面支援型飞机，将确保前线稳定，并削弱敌军长期作战的能力。组织上的破坏固然有限，但如果我们摧毁敌军的补给和装备，他们就根本无法作战。"
 LKT_focus_strategic_bomber_priority_structure: "战略轰炸机优先结构"
 LKT_focus_strategic_bomber_priority_structure_desc: "战略轰炸机优先结构建设将使我空军能够彻底摧毁敌人的战斗意志。工业和基础设施对于任何国家在持久战中都至关重要。因此，我们将研发战略轰炸机，摧毁这些战争机器，切断敌人赖以攻击我们的公路和铁路网络。"
 LKT_focus_strategic_bomber_supremacy_doctrine: "战略轰炸机至上理论"
 LKT_focus_strategic_bomber_supremacy_doctrine_desc: "通过围绕战略轰炸机完善我们的空军作战理论，我们将彻底削弱敌人的作战能力。没有经济实力和军工产业，敌人就无法武装其人民，也无法像我们一样有效地利用他们的劳动力。最终，我们或许无法速战速决，但我们将确保没有任何人能够摧毁我们的人民和我们捍卫的土地。"
 LKT_focus_clear_skies_for_all: "晴空万里"
 LKT_focus_clear_skies_for_all_desc: "我军的改进和提升将向世人展示。鼓励举办有组织的航空表演和训练活动，让公众有机会观看，将有助于我们向公民保证，在未来的日子里，我国的天空将一片晴朗。"
 LKT_focus_creating_a_real_navy: "打造一支真正的海军"
 LKT_focus_creating_a_real_navy_desc: "终于到了我们可以组建一支真正的海军，而不是一群只会漂流的船长的日子了。然而，这段旅程将会十分艰辛，因为河流与浩瀚的海洋截然不同。"
 LKT_focus_early_ship_construction_efforts: "早期船舶建造工作"
 LKT_focus_early_ship_construction_efforts_desc: "我们的海军实力或许永远无法达到“顶尖水平”，但我们肯定可以从底线开始。"
 LKT_focus_formalizing_naval_training_programs: "规范海军训练计划"
 LKT_focus_formalizing_naval_training_programs_desc: "通过最终采用真正的训练计划，并借助我们新的沿海水域的环境优势，我们可以确保我们海军人员的素质达到令人满意的水平。"
 LKT_focus_our_naval_priority: "我们的海军优先事项"
 LKT_focus_our_naval_priority_desc: "通过在海军发展中设立新的优先事项，我们至少树立了一种标准，供后代在此基础上发展。"
 LKT_focus_naval_command_structure: "海军指挥结构"
 LKT_focus_naval_command_structure_desc: "拉科塔尔武装部队的海军部门曾一度被视为笑柄，甚至是一种惩罚。然而，随着新滨水地块的购置和远洋舰艇建造工作的启动，我们必须将这个笑柄转变为一个严肃而切实的军种。因此，我们将正式建立拉科塔海军指挥结构，以促进和巩固海军未来在卓越发展道路上的进步。"
 LKT_focus_gulf_dry_docking_facilities: "海湾干船坞设施"
 LKT_focus_gulf_dry_docking_facilities_desc: "扩大海军建设规模将使我们能够调整和发展我们的海军。"
 LKT_focus_mid_atlantic_shipping_investments: "中大西洋航运投资"
 LKT_focus_mid_atlantic_shipping_investments_desc: "要覆盖所有这些地区，就必须继续努力扩充我们的海军。"
 LKT_focus_beyond_the_plains: "平原之外"
 LKT_focus_beyond_the_plains_desc: "如今祖国稳定繁荣，我们必须放眼全球。是否寻求扩张并不重要，重要的是，我们必须放眼全球，因为许多其他国家都在关注自身以外的世界。我们必须决定自己的未来。"
 LKT_focus_A_New_Destiny: "新的宿命"
 LKT_focus_A_New_Destiny_desc: "我们失去了统治权，北美大陆的人们正试图夺回它。我们从各地的传言中得知此事，因此我们将捍卫我们的主权，并最终取得胜利。因为这本应属于我们，而不是东方或西方的那些人。"
 LKT_focus_eyeing_the_borderlands: "关注边境之地"
 LKT_focus_eyeing_the_borderlands_desc: "我们的命运始于走出国门的第一步。因此，我们必须努力确保我们迈出的第一步是从我们自己的国界开始的。"
 LKT_focus_the_pacific_shores: "太平洋海岸"
 LKT_focus_the_pacific_shores_desc: "我们将沐浴在太平洋沿岸的海风中欣赏日落。至少向西走的路比向东走的路要短。"
 LKT_focus_great_lakes_great_takes: "五大湖，精彩纷呈"
 LKT_focus_great_lakes_great_takes_desc: "向东扩张意味着我们将面对广袤而多样的土地。我们必须竭尽全力去了解并驾驭五大湖地区的辽阔疆域。"
 LKT_focus_southern_summaries: "南方概况"
 LKT_focus_southern_summaries_desc: "从沼泽地到巍峨山巅，美国南部地区很可能是我们最难穿越的地带。因此，在努力确保这些未来土地安全的同时，我们需要进行实践、学习和训练，以应对这些挑战。"
 LKT_focus_northeastern_needs: "东北需求"
 LKT_focus_northeastern_needs_desc: "目之所及皆是群山和森林。我们需要时间和精力来征服这片土地。"
 LKT_focus_manifesting_strength_for_our_destiny: "展现力量，成就我们的命运"
 LKT_focus_manifesting_strength_for_our_destiny_desc: "我们必须做好准备，并继续增强我们的力量。因为我们所创造的命运终将属于我们。"
 LKT_focus_operation_cascadian_calamity: "卡斯卡迪亚灾难行动"
 LKT_focus_operation_cascadian_calamity_desc: "我们为维护大陆安全而发起的伟大征程正式拉开帷幕。我们将从离我们势力范围最近的卡斯卡迪亚地区开始。那里的山地地形崎岖险峻，但将成为我们士兵绝佳的训练场。"
 LKT_focus_operation_san_jose: "圣何塞行动"
 LKT_focus_operation_san_jose_desc: "沿着西海岸南下，我们就能构筑自己的屏障 - 太平洋。因此，一旦我们拿下加利福尼亚，实现大陆安全的下一步就指日可待了。"
 LKT_focus_operation_sierra_mist: "雾之山行动"
 LKT_focus_operation_sierra_mist_desc: "确保西南地区能源丰富的区域以及落基山脉其他地区的安全，使我们能够建立一道强大的防线，以防任何势力突破我们的西部海岸。"
 LKT_focus_operation_sam_houston: "山姆·休斯顿行动"
 LKT_focus_operation_sam_houston_desc: "巩固北美大陆上最重要的民族认同，意味着赢得各民族的意志。德克萨斯人民骄傲而独立，赢得他们的支持，将为我们日后向东部扩张铺平道路。"
 LKT_focus_reorganizing_civil_services: "重组公务员队伍"
 LKT_focus_reorganizing_civil_services_desc: "建立新的标准化公务员制度，能够帮助我们更好地管理领土，并加强融合工作，使人们能够走出近期战争的阴影。这或许并不完美，但无疑是朝着正确方向迈出的一步。"
 LKT_focus_operation_rustic: "乡村行动"
 LKT_focus_operation_rustic_desc: "我们的东进之旅开始了，走北线的话，沿途会经过更多的平原、绵延的丘陵和森林。虽然这绝非易事，但对于我们南下进军来说，无疑是一次很好的练兵机会。"
 LKT_focus_operation_charleston: "查尔斯敦行动"
 LKT_focus_operation_charleston_desc: "从密西西比河到大西洋，我们进军以确保南部路线的安全，并将我们自己从东海岸连接到西海岸。"
 LKT_focus_operation_north_east_corridor: "东北走廊行动"
 LKT_focus_operation_north_east_corridor_desc: "夺回天命的最后冲刺。有了它，我们将完全掌控大陆共和国，确保我们的命运……算了，我们还得重建，不过我扯远了。"
 LKT_focus_west_coast_cleanup: "西海岸清理"
 LKT_focus_west_coast_cleanup_desc: "现在国家已在我们的掌控之中，我们可以集中精力清理和重建饱受战争蹂躏的土地。最佳方案是从西向东推进。"
 LKT_focus_south_central_rebuilding: "南中部重建"
 LKT_focus_south_central_rebuilding_desc: "西部地区稳固后，我们现在可以专注于最终目标，也就是完成新共和国西部地区的收尾工作。整合这些领土后，剩下的就是密西西比河以东的所有地区，应该很快就能完成。"
 LKT_focus_mississippi_miracle: "密西西比奇迹"
 LKT_focus_mississippi_miracle_desc: "东进的征程开始了，随着我们渡过密西西比河，我们就能重建南方各州，并将它们融入到这个新国家中。"
 LKT_focus_reviving_the_rustbelt: "重振铁锈带"
 LKT_focus_reviving_the_rustbelt_desc: "重建并恢复昔日铁锈带各州的经济稳定，将有助于整合这些土地以及生活在这些土地上的人民。"
 LKT_focus_northeast_renewal: "东北复兴"
 LKT_focus_northeast_renewal_desc: "最后阶段，将这些最后的几个州整合起来，将确保从太平洋到大西洋的统一。"
 LKT_focus_the_second_republic: "第二共和国"
 LKT_focus_the_second_republic_desc: "这段旅程漫长而代价高昂，但和平已重返这片土地，北美大陆再次迎来团结。我们只需迈出最后一步，就能确保我们为自己创造的未来。"
 LKT_focus_Containment_Plan_West: "西部遏制计划"
 LKT_focus_Containment_Plan_West_desc: "在这个动荡不安、危机四伏的世界中，扩张至关重要。新世界已然破碎，我们必须占据其中的一部分。坎布里亚计划，又称西进遏制计划，旨在巩固我们对密西西比河以西所有地区的控制。这将使我们能够增强自身实力，并为我们的人民创造一种新的、更加稳定的安全感。"
 LKT_focus_war_plan_purple: "紫色战争计划"
 LKT_focus_war_plan_purple_desc: "确保北美大陆西半部安全的首要步骤之一，就是确保我们的侧翼安全。因此，喀斯喀特山脉挡住了我们前往太平洋度假的路。"
 LKT_focus_war_plan_skorpion: "蝎子战争计划"
 LKT_focus_war_plan_skorpion_desc: "确保西南各州能源丰富地区的安全，将有助于提升我们的经济稳定性，并使我们比西部竞争对手获得显著优势。"
 LKT_focus_war_plan_yellow: "黄色战争计划"
 LKT_focus_war_plan_yellow_desc: "确保太平洋沿岸的控制权意味着我们已经控制了西部大约一半的土地。我们将继续争取我们的未来，并巩固我们未来发展道路的基础。"
 LKT_focus_war_plan_blue: "蓝色战争计划"
 LKT_focus_war_plan_blue_desc: "德克萨斯州的加入，为我们拼凑西部版图的倒数第二块拼图奠定了基础。俄克拉荷马州将是最后一块拼图，但我们尚不确定跨越密西西比河在政治上会带来哪些影响，因此我们可以将这一讨论留待以后再议。"
 LKT_focus_consolidating_the_territories: "整合领土"
 LKT_focus_consolidating_the_territories_desc: "现在西部地区已在我们的控制之下，我们必须努力将这片土地和人民融合起来，塑造成一个新的国家。"
 LKT_focus_pacific_pearls: "太平洋珍珠"
 LKT_focus_pacific_pearls_desc: "致力于太平洋沿岸各州的整合与重建，将有助于我国重新向世界开放贸易和旅游业。振兴港口和旅游热点地区对于未来的发展至关重要。"
 LKT_focus_southern_sunrise: "南方日出"
 LKT_focus_southern_sunrise_desc: "重建能源丰富的西南部地区以及经济实力雄厚的德克萨斯州，将为我们国家的稳定和繁荣带来急需的推动力。"
 LKT_focus_the_western_identity: "西部身份认同"
 LKT_focus_the_western_identity_desc: "我们联合起来，在这片土地上，宣告一个崭新的国家、一个新的民族和一种崭新的文化即将诞生。"
 LKT_focus_The_Great_Barrier_Plan: "大屏障计划"
 LKT_focus_The_Great_Barrier_Plan_desc: "从根本上讲，任何人都不应该直接控制如此广阔的领土。因此，我们应该改变这种现状，确保北美大陆的稳定。如果我们能够巩固中间立场，并控制或收买东西方，那么我们就可以建立一个类似北美邦联的组织……或许需要一个更好的名字。"
 LKT_focus_vegas_odds: "拉斯维加斯赔率"
 LKT_focus_vegas_odds_desc: "我们并不完全需要联邦的土地，因此，我们将利用这一点，在为我们追求的未来获取土地时，为我们所用。"
 LKT_focus_texas_tussle: "德州混战"
 LKT_focus_texas_tussle_desc: "大屏障的构筑旨在确保北美大陆大致地理中心地带的中部各州的安全。攻占德克萨斯州这一第一步，将有助于为进一步向南入侵奠定基础。"
 LKT_focus_western_consolidation: "巩固西部"
 LKT_focus_western_consolidation_desc: "巩固控制我们、奴役我们的傀儡政权，可以实现更公平的领土划分。这样一来，当我们寻求太平洋沿岸时，就能更有动力去控制这个新的傀儡政权。"
 LKT_focus_the_great_war: "大战"
 LKT_focus_the_great_war_desc: "当我们夺取南方共和国在海湾地区的领土后，伟大的大陆战争便会打响。虽然我们并非一定要得到南方各州，但他们拒绝放弃俄克拉荷马州，这意味着我们别无选择。此外，我们还能确保没有哪个东部势力能够崛起，同时挑战我们和南方。"
 LKT_focus_eastern_consolidation: "巩固东部"
 LKT_focus_eastern_consolidation_desc: "随着大陆战争的结束，我们现在可以整合我们想要的中部各州，同时也能确保南部各州的安全，因为我们不会直接吞并它们。"
 LKT_focus_cartel_cleanup: "卡特尔清理"
 LKT_focus_cartel_cleanup_desc: "“大屏障计划”的南端目标是吞并墨西哥。还有什么比铲除那些瘫痪国家的猖獗贩毒集团更好的理由呢？"
 LKT_focus_reorganizing_mexican_territories: "墨西哥领土重组"
 LKT_focus_reorganizing_mexican_territories_desc: "通过瓜分墨西哥的领土，我们既可以偏袒我们的西方傀儡政权，又可以巩固我们对当前局势的控制权。"
 LKT_focus_securing_the_western_coastline: "确保西海岸线安全"
 LKT_focus_securing_the_western_coastline_desc: "随着西部近邻各州落入我们掌控，南部战线也已稳固，我们现在可以将目光投向遥远的西部，也就是太平洋沿岸地区。拿下这些土地将使我们为即将到来的最终挑战做好准备。"
 LKT_focus_dividing_up_the_west: "瓜分西部"
 LKT_focus_dividing_up_the_west_desc: "西部的土地已经落入我们手中，现在如何合理划分这些土地，以促进团结和合作，共同前进，就取决于我们自己了。"
 LKT_focus_improving_the_homefront: "改善后方"
 LKT_focus_improving_the_homefront_desc: "通过巩固和加强现有成果的整合，我们为实现计划中的最终目标奠定了基础。北方攻势即将展开，但如何应对则是另一个问题。"
 LKT_focus_northern_investment_opportunity: "北方投资机会"
 LKT_focus_northern_investment_opportunity_desc: "我们必须与加拿大合作，确保我们两国能够携手共进，因为通过铁路进行基础设施投资将更好地连接我们。"
 LKT_focus_operation_polar_bear: "北极熊行动"
 LKT_focus_operation_polar_bear_desc: "我们向北进发，是为了巩固我们剩余的防线，从而确保我们能够创造我们想要的未来。"
 LKT_focus_the_northern_concessions: "北部租界"
 LKT_focus_the_northern_concessions_desc: "为了确保北方安全，我们现在必须重新划分土地，并确保北美大陆的稳定，造福子孙后代。"
 LKT_country_flag_elections: "选举开始"
 LKT_Canadian_War_Goal_Unlock: "那就只有战争了"
 LKT_Prairie_Federation_desc: "[LKT.GetFlag]§Y拉科塔共和国§!改名为[LKT.GetFlag]§Y草原联盟§!"
 LKT_Free_Fields_Society_desc: "[LKT.GetFlag]§Y拉科塔共和国§!改名为[LKT.GetFlag]§Y自由田地协会§!"
 LKT_Grand_Duchy_Of_Yellowstone_desc: "[LKT.GetFlag]§Y拉科塔共和国§!改名为[LKT.GetFlag]§Y黄石大公国§!"
 LKT_Second_American_Republic_desc: "[LKT.GetFlag]§Y拉科塔共和国§!改名为[LKT.GetFlag]§Y美利坚第二共和国§!"
 LKT_Cambrian_Nation_desc: "[LKT.GetFlag]§Y拉科塔共和国§!改名为[LKT.GetFlag]§Y坎布里亚§!"
 LKT_Continental_Confederation_desc: "[LKT.GetFlag]§Y拉科塔共和国§!改名为[LKT.GetFlag]§Y大陆邦联§!"
 LKT_divided_we_fell: "分裂导致失败"
 LKT_divided_we_fell_desc: "尘埃落定，尽管我们遭受重创，但我们不会被这场突如其来的、前所未有的灾难击垮。我们需要继续前进，重新站起来。"
 LKT_federal_budgets: "国家预算"
 LKT_federal_budgets_desc: "如果我们想要取得任何有意义的进展，就必须评估并调整预算以满足我们的需求。改进失败的方面，扩大成功的方面，要是真有那么容易就好了。"
 LKT_domestic_policies: "拉科塔国内事务管理局"
 LKT_domestic_policies_desc: "拉科塔国内事务管理局是政府专门负责评估和调整国家政府通过的政策和法律，使其在全国范围内得到落实的部门。简而言之，想了解民众的近况，就去看看拉科塔国内事务管理局吧。"
 LKT_industrial_policies: "商业和经济活动部"
 LKT_industrial_policies_desc: "商业和经济活动部负责国民经济的管理和发展。该部门负责执行各项法规、发放商业补助金等，以确保经济的平衡和稳定。"
 LKT_resource_management_policies: "自然资源部"
 LKT_resource_management_policies_desc: "自然资源部负责雇佣和管理我们的国内资源，无论是人力资源还是物质资源。"
 LKT_tax_policies: "税务部门"
 LKT_tax_policies_desc: "税务部负责征收和执行税款。税法或贸易条件的变化意味着税务部门必须做出相应调整，确保公民和贸易各方在从事任何形式的商业或经济活动时，都能按规定缴纳应缴税款。"
 LKT_army_service_branch: "拉科塔共和军"
 LKT_army_service_branch_desc: "拉科塔共和军是保卫我们国家的主要武装力量。虽然我们的飞行员翱翔于蓝天，但如果地面部队无法有效对抗敌军，他们的存在就毫无意义。"
 LKT_air_force_service_branch: "拉科塔空军"
 LKT_air_force_service_branch_desc: "拉科塔空军负责保卫上空，确保我方地面和海军部队免受敌方空中入侵的骚扰。"
 LKT_navy_service_branch: "拉科塔海军"
 LKT_navy_service_branch_desc: "拉科塔海军的情况褒贬不一。由于其活动范围仅限于蜿蜒流经我国境内的几条著名水道，这支海军部队更多地被视为一个笑话，或是一种降低失业率的廉价手段。"
 LKT_ideas_foreign_isolation_office: "外交孤立办公室"
 LKT_ideas_foreign_isolation_office_desc: "在经历了如此剧烈且看似不可能的变故之后，我们的国家如今……的确是一个国家了。随着旧共和国的瓦解，我们组建了一个全新的、更加稳妥的共和国。使用拉科塔这个名字来吸引原住民少数族裔，有助于国家的稳定，并让我们形成一种全新的身份认同。然而，在这份新生的希望中，许多人对邻国以及所有外国干涉都保持警惕。正是这种情绪在我国蔓延，也正因如此，有人戏称外交部为“外交隔离办公室”，因为政府在外交方面几乎没有任何实际行动。"
 LKT_ideas_agrarian_fuel_economy: "农业燃料经济"
 LKT_ideas_agrarian_fuel_economy_desc: "农业贡献了经济产出的绝大部分，因此我们必须立即发展并调整能源部门以适应这一趋势。加大对生物燃料生产的研究投资，以及探索减少对大型基础设施需求的方法，无疑将有助于简化能源供应流程，并最大限度地满足我们的能源需求。"
 LKT_ideas_a_new_green_deal: "绿色新政"
 LKT_ideas_a_new_green_deal_desc: "绿色新政是一项全面的投资计划，旨在投资核能生产，并使其尽可能高效实用，充分利用现代技术和未来潜在的突破性进展。我们将根据科学发展情况，建设小型核电站、乏燃料棒回收中心等设施。"
 LKT_ideas_well_rounded_energy_sector: "全面发展的能源行业"
 LKT_ideas_well_rounded_energy_sector_desc: "我们的能源部与国家经济需求保持一致，现在我们可以确保一个稳定繁荣的未来。"
 LKT_ideas_improved_rail_network: "改善后的铁路网络"
 LKT_ideas_improved_rail_network_desc: "通过投资铁路，我们能够更好地连接全国各地，并改善军事和民用方面的供应链。"
 LKT_ideas_experimental_weapons_corp_desc: "实验武器兵团致力于打造最灵活的反应部队，致力于研发工作和战场测试，以确保当一支军队需要帮助时，能够及时获得所需的帮助。"
 LKT_ideas_lctp: "后勤兵团训练计划"
 LKT_ideas_lctp_desc: "后勤兵团训练计划旨在为那些可能不适合一线作战的人员提供招募机会。为了确保一线作战的稳定性和有效性，我们的供应链必须保持最佳状态，因此我们将确保供应链始终处于最佳状态。"
 LKT_ideas_fighter_supremacy: "战斗机至上"
 LKT_ideas_fighter_supremacy_desc: "通过优先发展和部署空军战斗机，我们为创造免受敌方入侵者侵扰的晴朗无垠的天空奠定了基础。"
 LKT_ideas_ground_support_supremacy: "地面支援至上"
 LKT_ideas_ground_support_supremacy_desc: "通过优先保障地面支援飞机，我们可以确保即使空中优势有所不足，也不会影响我们对敌方地面部队进行打击和撤退的能力，从而使我们的前线得以稳定，并阻止敌人破坏我们的国土。"
 LKT_ideas_strategic_bomber_supremacy: "战略轰炸机至上"
 LKT_ideas_strategic_bomber_supremacy_desc: "通过优先发展和部署战略轰炸机，我们将彻底摧毁敌人的意志和战斗能力。工业和基础设施将在我们强大的轰炸机面前土崩瓦解。"
 LKT_ideas_strategically_cheap: "战略性廉价理论"
 LKT_ideas_strategically_cheap_desc: "目标越小，击中难度也就越大。我们可以利用在河流漂流和有限的沿海作战经验，为海军舰艇设计新的突袭战术。当然，这样做肯定会有一些弊端，但我们也没有更好的办法，所以只能想办法学习。"
 LKT_ideas_naval_command_structure: "海军指挥结构"
 LKT_ideas_naval_command_structure_desc: "通过建立真正有组织、有秩序的海军指挥体系，我们将进一步巩固我们创建真正的海军军种的努力。"
 LKT_anarchist_asylum_experiement: "无政府主义者庇护所实验"
 LKT_anarchist_asylum_experiement_desc: "我们的土地辽阔而未开发，我们必须承诺通过吸引来自四面八方、渴望追求更美好未来的人们来开发这些土地。"
 LKT_ideas_standardized_civil_services: "标准化公务员制度"
 LKT_ideas_standardized_civil_services_desc: "建立一套新的标准民政管理和公共服务体系，能够帮助我们逐步整合新获得的土地。此外，它还能起到宣传作用，更注重赢得民心，而非一味强迫民众屈服。"
 LKT_ideas_the_second_american_republic: "美利坚第二共和国"
 LKT_ideas_the_second_american_republic_desc: "随着土地的重新统一和授权的获得，我们从旧共和国的废墟中建立了第二美利坚共和国。"
 LKT_ideas_cultivating_a_new_identity: "塑造新的身份认同"
 LKT_ideas_cultivating_a_new_identity_desc: "密西西比河以西的土地已在我们的控制之下，现在我们必须努力巩固人民的民心，共同开辟一条新的前进道路。"
 LKT_ideas_securing_the_new_order: "保卫新秩序"
 LKT_ideas_securing_the_new_order_desc: "我们的“大屏障计划”正按部就班地推进，正是基于这种认识，我们更加注重内部事务，以确保秩序的稳定。北美大陆将通过各国携手合作、为共同目标而努力，实现和平与繁荣。"
 LKT_collapse_event.1.t: "虽不丰厚，却已足够"
 LKT_collapse_event.1.d: "风暴渐渐远去，局势开始趋于平稳，我们现在必须着眼于重建各州，重组成一个新的国家。不过，由于本来开发不多，我们也没有太多需要重建的空间因此，我们最想向民众提出的一个主要问题是，我们到底想要怎样的国家经济。无论如何，这番事业虽不算宏大，却实实在在、问心无愧。"
 LKT_collapse_event.1.o1: "好吧，我想我们该开始干活了。"
 LKT_nation_name_event.1.t: "一个新国家"
 LKT_nation_name_event.1.d: "原住民人口如此稀少，我们根本没必要继续使用所谓 “尊重地理与历史安全” 的拉科塔这一名称。取而代之，我们将成为新草原联邦的大平原人。"
 LKT_nation_name_event.1.o1: "因为这些土地是我们的土地！"
 LKT_nation_name_event.2.t: "自由之国？"
 LKT_nation_name_event.2.d: "随着新一届社团的选举，许多人都在思考，这是否真的是我们为了在不久的将来取得成功而必须翻开的新一页。由此引发了一场激烈的辩论，而这场辩论将指引我们整个国家。一方面，有人希望以自由田园社团为幌子来取得胜利。自由田园社团本质上是一个与无政府主义有关联的组织，旨在让我们独立自主。另一方面，有人则希望维持现状，并尽可能寻找更好的选择。但是，人民究竟想要什么呢？"
 LKT_nation_name_event.2.o1: "自由田地协会"
 LKT_nation_name_event.2.o2: "或许现在还为时过早？"
 LKT_nation_name_event.3.t: "一个君主制国家？"
 LKT_nation_name_event.3.d: "令人震惊的是，黄石王室竟然当选了。该党承诺扩大民主投票机制，并实行普选制，以确保公民最大程度地参与国家事务。唯一的区别在于，当选官员将沿用封建头衔，这在某种程度上从根本上改变了政府的意义和精神。有人质疑，我们是否应该开始真正的国家转型以适应这一变化，还是应该继续沿用既定路线。"
 LKT_nation_name_event.3.o1: "我们将成为大公国！"
 LKT_nation_name_event.3.o2: "或许这有点过于异想天开，不太实际？"
 LKT_nation_name_event.4.t: "建立新共和国"
 LKT_nation_name_event.4.d: "国家即将重建之际，我们必须通过建立第二美利坚共和国来巩固我们的使命。从旧时代的灰烬中，一条新的道路正在崛起。"
 LKT_nation_name_event.4.o1: "新共和国万岁！"
 LKT_nation_name_event.5.t: "西部身份认同"
 LKT_nation_name_event.5.d: "西部的土地同属一面旗帜之下，我们以此宣告一个新国家的诞生：坎布里亚。我们以落基山脉为名，它如同永恒的地标，定义了我们土地的重要部分。落基山脉遍布寒武纪时期的化石，我们以此为标志，表明我们是坎布里亚的公民和人民。我们将永远捍卫和守护这片土地和我们的人民。"
 LKT_nation_name_event.5.o1: "荣耀归于坎布里亚！！！"
 LKT_event.10.t: "“共同投资”"
 LKT_event.10.d: "加拿大只在必要的地方发展，我们可以通过投资建设互惠铁路来“帮助他们”，从而提升我们两国的贸易和运输价值。如果他们接受，那就没问题；如果他们拒绝……那我们就麻烦了。"
 LKT_event.10.o1: "希望他们接受"
 LKT_event.11.t: "投资提议"
 LKT_event.11.d: "拉科塔共和国向我们提出了一项有趣的提议。他们希望修建一条从达科他地区经萨斯喀彻温省里贾纳市和曼尼托巴省温尼伯市与主干线相连的铁路。这将有助于促进我们两国之间的贸易、旅游业发展以及整体合作。我们对此并无异议，但议会中一些人认为，鉴于拉科塔共和国近期的种种举动，这只是一个虚假的借口。那么，我们该如何回应呢？"
 LKT_event.11.o1: "批准协议"
 LKT_event.11.o2: "请婉拒他们的提议"
 LKT_event.111.t: "交易破裂"
 LKT_event.111.d: "加拿大方面拒绝了你的提议，现在由于没有其他途径可以采取，他们需要处理这种情况。"
 LKT_event.111.o1: "我听到的是鼓声吗？"
 LKT_event.12.t: "建造开始"
 LKT_event.12.d: "交易已获批准，我们已经开始施工，希望项目进展顺利，并能在月底前完工。"
 LKT_event.12.o1: "一切都在计划之中"
 LKT_event.13.t: "大北方危机"
 LKT_event.13.d: "项目工作人员报告称，近期发生了多起离奇事件。尽管项目已接近完工，但不断有工作人员失踪的报告，而且我方人员对拉科塔人的敌意也在不断加剧。我们尚不清楚具体发生了什么，但至少可以怀疑其中存在不当行为。"
 LKT_event.13.o1: "我不喜欢这种感觉……"
 LKT_event.14.t: "嗜血的加拿大人？！"
 LKT_event.14.d: "报纸和电视台大肆报道“嗜血的加拿大人杀害善良的拉科塔人”，全国上下都对我们和加拿大政府最近合作的铁路项目传出的谣言感到愤怒。由于项目进展比预期要好，我们将利用这一点来挑起我们想要的战争，而不是我们原本可能面临的战争。"
 LKT_event.14.o1: "把我们的诉求转达给他们！"
 LKT_event.15.t: "情况恶化"
 LKT_event.15.d: "拉科塔人的诉求突然传到了政府耳中，他们要求政府以工业投资的形式赔偿拉科塔人逝去的生命，并支付项目款项。总金额约为350亿加元，许多加拿大人对针对他们同胞的指控感到愤怒。因此，我们面临着一个艰难的抉择。"
 LKT_event.15.o1: "保全面子，付钱给他们吧。"
 LKT_event.15.o2: "管他呢，我们让他们见识见识。"
 LKT_event.16.t: "意料之外的结果"
 LKT_event.16.d: "好吧，我们算是失败了……但又成功了？但这并非我们真正想要的结果，因此我们需要准备B计划。"
 LKT_event.16.o1: "组织部队"
 LKT_politics.1.t: "活动开始"
 LKT_politics.1.d: "全国各地，政党纷纷涌现，民众开始支持他们认为最适合执政的政党。与此同时，一些强硬派政党之间也出现了小规模的争执，许多人对国家未来的走向充满期待。"
 LKT_politics.1.o1: "爱情和战争中无所不用其极。"
 LKT_politics.2.t: "“权力政党理事会”"
 LKT_politics.2.d: "在一片混乱和争夺选票的浪潮中，一些领导风格颇为相似的政党联合起来，试图形成一个投票联盟。这个所谓的“权力委员会”被许多人认为是寡头政治的政党联盟。尽管每个政党都否认这种贬义的说法，但一些成员也无法否认近期发生的某些事情。无论如何，最终决定权在于人民，由他们投票选出自己心目中的国家领导人。"
 LKT_politics.2.o1: "达科塔民主党胜出！"
 LKT_politics.2.o2: "堪萨斯城联盟胜出！"
 LKT_politics.2.o3: "拉科塔技术统治党胜出！"
 LKT_politics.2.o4: "拉克塔武装力量胜出？"
 LKT_politics.2.o5: "这不可能是每一个，下一个是谁？"
 LKT_politics.3.t: "争取传统的政党"
 LKT_politics.3.d: "随着局势持续升温，一个新的权力集团正在形成，一些右翼和中间偏右的政党正试图组成一个投票联盟。他们团结起来，共同维护这片土地及其人民所熟知的新旧传统。这些捍卫传统的政党相信变革可以发生，但绝不能为了变革而抛弃过去。然而，最终还是要靠人民投票，确保他们心仪的政党赢得胜利，领导国家。"
 LKT_politics.3.o1: "老共和党胜出！"
 LKT_politics.3.o2: "部落传统党胜出！"
 LKT_politics.3.o3: "拉科塔传统与团结党胜出！"
 LKT_politics.3.o4: "肯定还有更多选择。等等，看那边。"
 LKT_politics.4.t: "平民进步党"
 LKT_politics.4.d: "新兴的社会主义经济政党联盟之所以能够崛起，完全是为了遏制新拉科塔民族党的崛起。这种所谓的“左派、右派”二元对立意味着国家政治正进一步分裂成越来越多的派系。随着投票的开始，人民希望选择他们认为对国家有利的道路，许多人都在思考，究竟谁将成为这个年轻国家的首个执政党。"
 LKT_politics.4.o1: "农民进步党领先"
 LKT_politics.4.o2: "农民革命阵线与拉科塔农业学会并驾齐驱"
 LKT_politics.4.o3: "玫瑰丛党与玫瑰革命协会并驾齐驱"
 LKT_politics.4.o4: "你说还有更多？！"
 LKT_politics.5.t: "新拉科塔民族党"
 LKT_politics.5.d: "新拉科塔民族党是一股正在崛起的民族主义政党运动，主张优先推行孤立政策，并维护全新的国家身份认同，将其置于其他一切事务之上。国内许多人对这一主张将如何影响国内不同少数族群持怀疑态度，但大多数人也认为，正是全球高度互联的特性，才导致了旧共和国的最终崩溃。不过，部分人投票支持这一新兴政党联盟，仅仅是为了抵制日益壮大的社会主义经济政党，后者似乎是在本国土地发展有限甚至毫无发展的背景下，自然而然兴起的。"
 LKT_politics.5.o1: "青年实业家党胜出！"
 LKT_politics.5.o2: "农作物喷洒者协会与金田联盟战成平手"
 LKT_politics.5.o3: "豪斯先生总是赢家？"
 LKT_politics.5.o4: "昨日重现"
 LKT_focus_metallic_bloodlines_act: "金属血统法案"
 LKT_focus_metallic_bloodlines_act_desc: "金属血统法案是一项旨在启动和保障我国国内钢铁供应能力的资金方案。钢铁尤其重要，它是继劳动力和混凝土之后，经济的第二大支柱。"
 LKT_focus_metallic_masters: "金属材料"
 LKT_focus_metallic_masters_desc: "为了进一步实现国家独立，我们不得不进行深入且贪婪的开采。南达科他州蕴藏着少量轻金属，这将有助于我们实现经济多元化。"
 LKT_focus_the_continental_confederation: "大陆邦联"
 LKT_focus_the_continental_confederation_desc: "我们的民族骄傲而团结地屹立着，因为在昔日拉科塔人的旗帜下，新世界见证了新的团结，因此，我们将携手共建一个新国家，并赋予它一个新名字。这个国家寻求的是团结人民，而非土地，而是团结人民，赋予他们新的身份认同。当他们准备就绪时，我们将建立一个统一的北美。"
 LKT_focus_bio_fuel_prominence: "生物燃料的突出地位"
 LKT_focus_bio_fuel_prominence_desc: "通过对生物燃料及其相关配套设施的专注和不懈研发，我们可以创造一种更高效、更丰富的能源形式。这将有助于降低我们的整体能源需求，并减少土地和资源使用的潜在成本，从而将这些资源用于满足人民和国家更迫切的需求。"
 LKT_ideas_experimental_weapons_corp: "实验武器兵团"