 LKT_ideas_foreign_isolation_office: "Foreign Isolation Office"
 LKT_ideas_foreign_isolation_office_desc: "In the wake of such a violent and seemingly impossible turn of events, our nation is now...well a nation. With the implosion of the old republic we now form a new and more safe betting republic. Using the name of lakota to appeal to the native minorities allows for stability and us to form a new identity altogether. However with this new found hope, many are wary of our neighbors as well as just foreign meddling as a whole. It is this sentiment which persist around our nation and why some have jokingly dubbed the Foreign Office as the \"Foreign Isolation Office\", due to no real efforts at diplomacy are being made by the government."
 LKT_ideas_agrarian_fuel_economy: "Agrarian Fuel Economy"
 LKT_ideas_agrarian_fuel_economy_desc: "With agriculture providing the lion's share of economic output, we must develop and adapt our energy sector to this at once. Research investments into bio-fuel production and ways to reduce the need for large infrastructure apparatuses will surely help streamline and make best of our energy needs."
 LKT_ideas_a_new_green_deal: "A Green New Deal"
 LKT_ideas_a_new_green_deal_desc: "A comprehensive investment package, the NGD will invest in nuclear power production and make it as efficient and practical as modern and potential future breakthroughs will allow us to have. Smaller plants, spent fuel rod recycling centers and more as science permits us."
 LKT_ideas_well_rounded_energy_sector: "Well Rounded Energy Sector"
 LKT_ideas_well_rounded_energy_sector_desc: "With our Department of Energy in line with our national economic needs we can now ensure a stable and prosperous future."
 LKT_ideas_improved_rail_network: "Improved Rail Network"
 LKT_ideas_improved_rail_network_desc: "By investing in our railways we have been able to better connect the nation as well as improve supply lines both militarily and civilian wise."
 LKT_ideas_experimental_weapons_corp: "Experiemental Weapons Corps"
 LKT_ideas_experimental_weapons_corp_desc: "Dedicated to achieving the most flexible of response units, the EWC is dedicated to R&D efforts and combat field testing to ensure that when an army unit needs help, it will get the help in needs."
 LKT_ideas_lctp: "Logistics Corps Training Program"
 LKT_ideas_lctp_desc: "The LCT Program is designed to open recruitment opportunities to those who may not be frontline material. To ensure frontline stability and effectiveness our supply chains must be at their best and as such we will ensure they are as such."
 LKT_ideas_fighter_supremacy: "Fighter Supremacy"
 LKT_ideas_fighter_supremacy_desc: "By prioritizing fighter development and deployment in our air force, we set the stage to create clear and un-molested skies from enemy invaders."
 LKT_ideas_ground_support_supremacy: "Ground Support Supremacy"
 LKT_ideas_ground_support_supremacy_desc: "By prioritizing gorund support aircraft, we can ensure that even our short falls in air supremacy shouldn't hinder our ability to hit and run the enemy ground forces. Allowing our frontlines to stabilize and prevent the enemy from destroying our lands."
 LKT_ideas_strategic_bomber_supremacy: "Strategic Bomber Supremacy"
 LKT_ideas_strategic_bomber_supremacy_desc: "By prioritizing the development and deployment of strategic bombers, we will crush the enemy's will and ability to fight. Industry and infrastructure will crumble before our mighty bombers."
 LKT_ideas_strategically_cheap: "Strategically Cheap Doctrine"
 LKT_ideas_strategically_cheap_desc: "Smaller targets mean harder to hit as well. We can use our river rafting and limited coastal experiences to create new hit and run tactics for our naval vessels to be designed around. Of course there will be some draw backs but it's not like we know better, so we got to learn one way or another."
 LKT_ideas_naval_command_structure: "Naval Command Structure"
 LKT_ideas_naval_command_structure_desc: "By establishing a genuine and organized naval command structure, we will further solidify our efforts to creating a real naval service branch."
 LKT_anarchist_asylum_experiement: "Anarchist Asylum Experiment"
 LKT_anarchist_asylum_experiement_desc: "Our lands are vast and underdeveloped, we must promise to fill these lands by bringing folks far and wide who wish to seek a better tomorrow."
 LKT_ideas_standardized_civil_services: "Standardized Civil Services"
 LKT_ideas_standardized_civil_services_desc: "Creating a new standard form of civil administration and general public services allows us to passively integrate the new lands that we have gained. As a bonus it also works as public outreach and gives more of a hearts and minds approach to things then simply beating folks into submission."
 LKT_ideas_the_second_american_republic: "The Second American Republic"
 LKT_ideas_the_second_american_republic_desc: "With the lands now reunified and the mandate claimed, we establish from the ruins of old the 2nd American Republic."
 LKT_ideas_cultivating_a_new_identity: "Cultivating A New Identity"
 LKT_ideas_cultivating_a_new_identity_desc: "The lands west of the Mississippi are under our control, now we must work to solidify the hearts and minds of the people and forge together a new path forward."
 LKT_ideas_securing_the_new_order: "Securing The New Order"
 LKT_ideas_securing_the_new_order_desc: "Our Great Barrier Plan has continued on the path of completion and it is with this understanding that we focus more on internal affairs to secure the stability of said order. The continent will see peace and prosperity through a union of nations working together for a common goal."
 LKT_collapse_event.1.t: "虽不丰厚，却已足够"
 LKT_collapse_event.1.d: "风暴渐渐远去，局势开始趋于平稳，我们现在必须着眼于重建各州，重组成一个新的国家。不过，由于本来开发不多，我们也没有太多需要重建的空间因此，我们最想向民众提出的一个主要问题是，我们到底想要怎样的国家经济。无论如何，这番事业虽不算宏大，却实实在在、问心无愧。"
 LKT_collapse_event.1.o1: "好吧，我想我们该开始干活了。"
 LKT_nation_name_event.1.t: "一个新国家"
 LKT_nation_name_event.1.d: "原住民人口如此稀少，我们根本没必要继续使用所谓 “尊重地理与历史安全” 的拉科塔这一名称。取而代之，我们将成为新草原联邦的大平原人。"
 LKT_nation_name_event.1.o1: "因为这些土地是我们的土地！"
 LKT_nation_name_event.2.t: "A Free Nation?"
 LKT_nation_name_event.2.d: "With the society being elected, many wonder if this is truly the new leaf we must turn to in order to prevail in our near future. As such a great debate has arose to which we shall find as a nation to be our guide. On one hand we have those who wish to prevail under the pretext of the Free Fields Society. Essentially an anarchist adjacent setting for which to stand on our own. The other is keeping the status quo and looking for better options if possible. But what do the people want?"
 LKT_nation_name_event.2.o1: "The Free Fields Society!"
 LKT_nation_name_event.2.o2: "Maybe It's Too Early?"
 LKT_nation_name_event.3.t: "A Royal Nation?"
 LKT_nation_name_event.3.d: "In a shocking twist the House of Yellowstone has been elected. The party promises expanded democratic means for the voting process as well as a basic universal sufferage to ensure the most involvement of the nation's citizens. The only difference is that feudal titles will be assigned to elected offices and thus in a way cosmestically changing the meanings and ethos behind government itself. Some wonder if we should begin a real transition of nation to fit this or stay the course."
 LKT_nation_name_event.3.o1: "The Grand Duchy We Shall Be!"
 LKT_nation_name_event.3.o2: "Maybe This Is A Bit Too Whimsical To Be Practical?"
 LKT_nation_name_event.4.t: "Establishing The New Republic"
 LKT_nation_name_event.4.d: "With the nation on the edge of being rebuilt we must solidify our mandate with the establishment of the 2nd American Republic. From the ashes of old rises a new way forward."
 LKT_nation_name_event.4.o1: "Ave Nova Republica!"
 LKT_nation_name_event.5.t: "The Western Identity"
 LKT_nation_name_event.5.d: "The Western lands are under one banner and it is with this that we declare a new nation. Cambria. In reference to the timeless landmark that defines a significant portion of our lands the Rocky Mountain range. With cambrian era fossils found throughout them we use this as a staple to show we are citizens and the people of Cambria. We will defend and nurture the lands and our peoples to the ends of time."
 LKT_nation_name_event.5.o1: "Glory To Cambria!!!"
 LKT_event.10.t: "The \"Mutual Investment\""
 LKT_event.10.d: "Canada is developed only where it has to be, we could \"help them\" by investing in a mutual railroad connection to better trade and transport values for our nations. If they accept, then there is no problem, if they deny...well we have a problem then."
 LKT_event.10.o1: "Lets Hope They Accept"
 LKT_event.11.t: "A Investment Offer"
 LKT_event.11.d: "The Republic of Lakota has come to us with an interesting offer. They want to build a railway from the Dakotas through to the Mainline in Regina, Saskatchewan as well as Winnepeg, Manitoba. These would help with trade deals, tourism and just general cooperation between our two nations. We don't really see a problem with it, but some in parliament see this as a false pretext with the recent activities that the republic has undergone recently. So what is our response?"
 LKT_event.11.o1: "Approve The Deal"
 LKT_event.11.o2: "Kindly Refuse Their Offer"
 LKT_event.111.t: "The Deal Collapses"
 LKT_event.111.d: "The Canadians have declined our offer, we'll now need to reapproach the situation since there is no other avenue to pursue at this time."
 LKT_event.111.o1: "Are Those Drums I Hear?"
 LKT_event.12.t: "Construction Begins"
 LKT_event.12.d: "The deal is approved and we've begun construction, hopefully this is a smooth project and will be completed by the end of the month."
 LKT_event.12.o1: "All According To The Plan"
 LKT_event.13.t: "大北方危机"
 LKT_event.13.d: "项目工作人员报告称，近期发生了多起离奇事件。尽管项目已接近完工，但不断有工作人员失踪的报告，而且我方人员对拉科塔人的敌意也在不断加剧。我们尚不清楚具体发生了什么，但至少可以怀疑其中存在不当行为。"
 LKT_event.13.o1: "我不喜欢这种感觉……"
 LKT_event.14.t: "Blood Thirsty Canadians!?!"
 LKT_event.14.d: "News papers and tv outlets scream, Blood Thirst Canadians Kill Kind Working Lakotans, as the nation is in uproar about the rumors coming out of the recent rail project between us and the Canadian government. With things working out better than expected we'll use this to instigate the war we want rather than the war we could've had."
 LKT_event.14.o1: "Send Them Our Demands!"
 LKT_event.15.t: "A Worsening Situation"
 LKT_event.15.d: "Lakotan demands have suddenly reached the government, they demand compensation for the lost Lakotan lives in the form of industrial investments as well as a payout price of the project. The total sum comes to roughly 35 billion and many Canadians are outraged at the accusations laid against their countrymen. As such we have a real difficult decision to make."
 LKT_event.15.o1: "Save Face And Just Pay Them"
 LKT_event.15.o2: "Screw That We'll Show Them"
 LKT_event.16.t: "An Unexpected Outcome"
 LKT_event.16.d: "Well somehow we failed...successfully? But this isn't the real outcome we wanted and as such we'll need to prepare for plan B."
 LKT_event.16.o1: "Organize The Troops"
 LKT_politics.1.t: "Campaigning Begins"
 LKT_politics.1.d: "All across the nation, political parties are forming and people are beginning to rally behind those which they believe to be the next suited ruling political entity for the nation. As some minor squabbles also begin amongst more hardliner parties, many are excited to see just where the nation will go from here."
 LKT_politics.1.o1: "All's Fair In Love And War"
 LKT_politics.2.t: "The \"Council of Authority Parties\""
 LKT_politics.2.d: "In all the confusion and clambering for votes, a collection of parties with somewhat similar leadership styles has come forth to create a block for voting. This supposed Council of Authority is what many believe to be a collection of parties which function like Oligarchies. Though each party refuses such a demeaning reference point, some member can't deny certain aspects of handling that have happened recently. Regardless it is up to the people to vote and figure out just who they want leading the nation."
 LKT_politics.2.o1: "达科塔民主党胜出！"
 LKT_politics.2.o2: "KCK Wins!"
 LKT_politics.2.o3: "LTP Wins!"
 LKT_politics.2.o4: "AFL Wins?"
 LKT_politics.2.o5: "This Can't Be Everybody, Who's Next"
 LKT_politics.3.t: "The Parties For Tradition"
 LKT_politics.3.d: "As things continue to heat up a new power bloc has begun to form as a collection of right and center right leaning parties attempt to form a voting bloc. Rallying around the shared interest of holding new and old traditions known to the lands and it's peoples. The parties for tradition believe that change can happen, but it must not throw away the past for the sake of said change. Nevertheless it is up to the people to vote, vote and vote to secure a victory for the party they wish to lead the nation."
 LKT_politics.3.o1: "ORP Wins!"
 LKT_politics.3.o2: "TTP Wins!"
 LKT_politics.3.o3: "LTSP Wins!"
 LKT_politics.3.o4: "Surely There Are more Options. Wait Look Over There"
 LKT_politics.4.t: "The Common Folk Progress Parties"
 LKT_politics.4.d: "The emerging socialist economic bloc of political parties has gain traction purely to spite the rise in the New Lakotan National Parties. This supposed \"left, right\" dichotomy means that the politics of the nation is further splintering into more and more factions. But as the voting begins and the people look to take their step forward with what they believe is right for the nation, many wonder just who will become the first ruling party of the young nation."
 LKT_politics.4.o1: "FPP Takes The Lead"
 LKT_politics.4.o2: "FRF Neck And Neck With LAS"
 LKT_politics.4.o3: "RBP Neck And Neck With RRA"
 LKT_politics.4.o4: "You Said There's More?!"
 LKT_politics.5.t: "新拉科塔民族党"
 LKT_politics.5.d: "新拉科塔民族党是一股正在崛起的民族主义政党运动，主张优先推行孤立政策，并维护全新的国家身份认同，将其置于其他一切事务之上。国内许多人对这一主张将如何影响国内不同少数族群持怀疑态度，但大多数人也认为，正是全球高度互联的特性，才导致了旧共和国的最终崩溃。不过，部分人投票支持这一新兴政党联盟，仅仅是为了抵制日益壮大的社会主义经济政党，后者似乎是在本国土地发展有限甚至毫无发展的背景下，自然而然兴起的。"
 LKT_politics.5.o1: "YIP Wins!"
 LKT_politics.5.o2: "CDS Ties Race With LGF"
 LKT_politics.5.o3: "豪斯先生总是赢家？"
 LKT_politics.5.o4: "It's Rewind Time"