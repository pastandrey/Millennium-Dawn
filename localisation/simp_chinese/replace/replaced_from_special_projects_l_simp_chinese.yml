 sp_air_generic_reward_test_failure_2: "装置爆炸"
 sp_air_generic_reward_test_failure_3: "创意灾难"
 sp_air_generic_reward_resource_scarcity: "资源稀缺"
 sp_air_generic_reward_critical_failure: "致命失败"
 sp_improved_space_solar_farms_idea: "空间太阳能发电场"
 sp_afv_double_cannons: "双管火炮"
 sp_afv_double_cannons_desc: "一般情况下，我们的轻型装甲战车只配备一种武器，通常是自动机关炮。不过，我们或许可以创造一种并排安装两门机关炮的系统。"
 sp_afv_double_cannons_reward_improved_autoloader: "改进型自动装弹机"
 sp_afv_double_cannons_reward_improved_autoloader_desc: "我们的工程师在研究双管火炮装弹系统的同时，还为我们的坦克开发了一种改进的自动装弹机。"
 sp_coilgun_memes: "步兵线圈炮"
 sp_coilgun_memes_desc: "通过对我们坦克的电磁炮技术进行“亲爱的，我把孩子们缩小了”，我们可以为我们的步兵提供马赫数的钨弹丸的威力。\n不要试图激怒疯子开发者，因为我发誓我会在晚上做这样的事。"
 sp_multipurpose_warhead: "多用途弹头"
 sp_multipurpose_warhead_desc: "我们有针对坦克的导弹和针对飞机的导弹。但如果我们能让导弹对两者都有效呢？这样，在紧急情况下，反坦克导弹和防空导弹就可以用来对付除预定目标以外的其他目标。"
 sp_supercarrier_1: "早期超级航母"
 sp_supercarrier_1_desc: "扩大甲板空间以及建造这种规模的舰船的能力对于我们的远程力量投射至关重要。"
 sp_supercarrier_2: "后期超级航母"
 sp_supercarrier_2_desc: "随着核动力发动机的引入，更大的动力意味着更大的船舶和更大的甲板空间。"
 sp_stealth_technology: "隐形实验"
 sp_stealth_technology_desc: "为了使我们比敌人更具优势，我们必须想办法让我们的战斗机不易被雷达探测到。"
 sp_arsenal_bird: "军械巨鸟"
 sp_aresnal_bird_desc: "随着全自主飞行器、核动力飞行器发动机和先进飞行控制系统的发展，我们可以制造出一架能够搭载整个无人机空军的飞机。这种飞机虽然价格极其昂贵，但将成为空战系统的巅峰。"
 sp_multipurpose_warhead_reward_improved_warhead: "改进型弹头"
 sp_multipurpose_warhead_reward_improved_warhead_desc: "我们的工程师在研究如何给反坦克导弹增加防空性能、给防空导弹增加反坦克性能的同时，也研究出如何提高一种导弹的综合性能。"
 sp_multipurpose_warhead_reward_improved_warhead_at: "更好的反坦克性能"
 sp_multipurpose_warhead_reward_improved_warhead_aa: "更好的防空性能"
 sp_emp_warhead: "改进电子战"
 sp_emp_warhead_desc: "坦克和飞机都具有反电子战措施，可以减少电磁脉冲武器的影响。由于不同平台使用不同的架构，我们只能有效地集中精力对付一种类型的目标。"
 sp_emp_warhead_reward_improved_warhead_at: "优先考虑陆上目标"
 sp_emp_warhead_reward_improved_warhead_aa: "优先考虑空中目标"
 sp_fire_support_land_drone_reward_improved_communication_desc: "在开发无人机的有效控制方法的同时，我们的工程师还开发了一种改进的无线通信方法。我们可以将这一突破应用于民用或军事领域。"
 sp_double_shot_rifle_tt: "增加所有§Y特种部队§!单位§Y防御§!与§Y突破§!§G5%§!\n"
 sp_double_shot_rifle_tech: "双重射击步枪"
 sp_ground_fireandforget: "射后不理反坦克导弹"
 sp_ground_fireandforget_desc: "电子设备小型化如今使得导弹能够通过热能锁自动引导自身到达目标。"
 sp_5thgen_airframe_tt: "研究§Y第5代机身§!的关键步骤"
 sp_modern_air_electronics: "现代航空电子学"
 sp_modern_air_electronics_desc: "机载雷达、驾驶舱和其他系统的电子设备的新一代进步。"
 sp_future_air_electronics: "未来航空电子学"
 sp_future_air_electronics_desc: "融合智能人工智能、激光系统和纳米技术的最新技术，打造高效机载设备。"
 sp_future_air_electronics_tt: "解锁§Y2020年现代航空电子学§!"
 sp_modern_air_weapons: "智能航空武器"
 sp_modern_air_weapons_desc: "智能瞄准，武器搭载毫米波雷达，发射后锁定。新一代武器为未来战场铺平道路。"
 sp_modern_air_weapons_tt: "解锁§Y2020年现代航空电子学§!"
 sp_future_air_weapons: "人工智能增强型航空武器"
 sp_future_air_weapons_desc: "使用人工智能处理器和更精细的检测和瞄准系统增强上一代机载导弹和传感器。"
 sp_future_air_weapons_tt: "解锁§Y2030年现代航空武器§!"
 sp_hypersonic_missile: "高超音速导弹"
 sp_hypersonic_missile_desc: "高超音速导弹将使我们的战略导弹部队能够以不久前认为不可能的速度深入敌方领土。"
 sp_hypersonic_missile_tt: "解锁§Y高超音速导弹技术§!"
 sp_naval_generic_reward_army_xp_1: "思想流的变化"
 sp_naval_generic_reward_army_xp_2: "思想浪潮"
 sp_naval_generic_reward_army_xp_3: "创新海啸！"
 sp_space_program_gdm: "太空计划"
 sp_space_program_gdm_desc: "每个人都想进入太空，除了波兰。波兰无法进入太空。"
 sp_space_weapons_gdm: "太空武器"
 sp_space_weapons_gdm_desc: "曾经只是科幻小说中的作品，如今我们的科学家终于开始设计卫星杀手和其他可以在太空真空中使用的武器。使用这些武器的能力不仅会让我们防御能力更强，而且会让我们进攻能力更强，因为我们将能够拦截、破坏和阻止星际中的敌对势力。"
 sp_space_program_non_gdm: "太空计划"
 sp_space_program_non_gdm_desc: "每个人都想进入太空，除了波兰。波兰无法进入太空。"
 sp_space_weapons_non_gdm: "太空武器"
 sp_space_weapons_non_gdm_desc: "曾经只是科幻小说中的作品，如今我们的科学家终于开始设计卫星杀手和其他可以在太空真空中使用的武器。使用这些武器的能力不仅会让我们防御能力更强，而且会让我们进攻能力更强，因为我们将能够拦截、破坏和阻止星际中的敌对势力。"
 sp_emp_warhead_reward_improved_warhead: "电子战武器"
 sp_emp_warhead_reward_improved_warhead_desc: "电子装备可以使我们在空战时抢占先机"
 sp_helicopter_project_desc: "就像设计汽车和其他车辆一样，设计和制造直升机需要本地知识，以便在当地生产这些专用车辆。我们应该进行一些设计实验，直到我们自己开发出一个版本。"
 sp_helicopter_project: "直升机设计实验"
 sp_helicopter_project_tt: "解锁以下§Y技术路线§!：\n- §Y运输直升机§!\n- §Y攻击直升机§!\n"
 sp_missile_project_non_got: "导弹试验"
 sp_missile_project_non_got_desc: "当我们买不起真正的飞机时，导弹可以成为一种廉价的替代品。我们需要投资导弹科学（而不是火箭科学）来获得一些额外的进攻能力"
 sp_missile_project_non_got_tt: "我们将可以研发§Y洲际弹道导弹§!，§Y中程弹道导弹§!，§Y陆基巡航导弹§!和§Y地对空导弹§!"
 sp_air_generic_reward_army_xp_1: "清新气息"
 sp_air_generic_reward_army_xp_2: "创新之风"
 sp_air_generic_reward_army_xp_3: "变革之风"
 sp_tank_stealth_armor_early: "早期隐形装甲"
 sp_tank_stealth_armor_early_desc: "通过制造不仅能保护我们的坦克，而且还能提供更好的隐蔽性的装甲，我们可以拥抱最好的装甲理论：不被击中比阻止击中更好。"
 sp_electronic_government: "电子政务"
 sp_electronic_government_desc: "为了最大限度地提高政府效率，公民应该能够在家中舒适地访问政府信息并与其互动。这将提高公民的互联网素养，并将政府支出削减至极低的水平。"
 sp_tank_nera_armor: "重型非爆炸反应装甲"
 sp_tank_nera_armor_desc: "我们可以研究先进材料来生产更重、更耐用的装甲类型，例如贫铀插入件"
 sp_tank_nera_armor_tt: "我们将能够在我们的坦克上安装更先进的装甲。"
 sp_aircraft_project_bba_tt: "解锁以下§Y技术路线§!：\n- §Y轻型机身§!\n- §Y中型机身§!\n- §Y重型机身§!\n- §Y攻击直升机§!\n- §Y运输直升机§!\n"
 sp_aircraft_project_non_bba_tt: "解锁以下§Y技术线§!：\n- §Y战斗机§!\n- §Y对地支援机§!\n- §Y轰炸机§!\n- §Y无人作战飞机§!\n- §Y轻型战斗机§!\n"
 sp_space_weapons: "太空武器"
 has_completed_space_program_tt: "已完成特殊项目：§Y$sp_space_program_gdm$§!"
 has_completed_space_weapons_tt: "已完成特殊项目：§Y$sp_space_weapons_gdm$§!"
 sp_microchip_production: "微芯片生产实验室"
 sp_microchip_production_desc: "通过试验计算过程的小型化，并学习如何大规模制造它们，我们将能够生产自己的微芯片，用于现代武器和装备。"
 sp_composite_production: "复合材料生产实验室"
 sp_composite_production_desc: "通过试验新技术以及冶炼、混合和其他化学方法，我们可以改进制造现代先进复合材料的方法。"
 sp_recon_land_drone: "陆地侦察无人机"
 sp_recon_land_drone_desc: "现代陆地战争越来越依赖信息优势和早期威胁探测。通过在地面部队部署专用侦察无人机，我们可以将他们的感知能力扩展到远超传统侦察方式的范畴。这项投入能够加快决策速度，提升协同作战能力，并在直接交战前更清晰地掌握战场态势。"
 sp_smart_bullets: "智能子弹"
 sp_smart_bullets_desc: "制导和目标定位技术的进步正开始影响战场上哪怕是最微小的环节。通过投资研发步兵和支援武器的智能弹药，我们旨在提高在复杂作战环境中的精度和效能。"
 sp_recon_drone_land: "地面侦察无人机系统"
 sp_recon_drone_land_desc: "随着无人机在战场上的广泛应用，地面侦察无人机为陆军部队提供前线持续的实时情报。这些无人机在作战部队附近作业，提高了态势感知、目标识别和协同作战能力，同时避免了人员直接暴露于危险之中。"
 sp_airless_tires: "非充气轮胎"
 sp_airless_tires_desc: "机动性仍是现代地面作战中的关键因素，尤其在恶劣且多变的环境下。通过为军用车辆采用无气轮胎技术，我们能够降低维护需求，并消除车辆因轮胎被刺穿而丧失作战能力的风险。这项投入提升了作战可靠性，使我方部队即使在恶劣条件下也能保持机动能力。"
 sp_exoskeletal_engine_tank: "外骨骼引擎系统"
 sp_exoskeletal_engine_tank_desc: "传统发动机依赖中心轴和圆盘结构，这在重量、应力和效率方面存在固有局限。我们通过探索外骨骼发动机设计——将旋转叶片支撑在转鼓式转子结构内——旨在减轻重量、提升可靠性，并为紧凑型、高功率推进系统开辟全新可能。"
 sp_nuclear_engine_tank: "核能发动机系统"
 sp_nuclear_engine_tank_desc: "日益增长的燃料需求和不断扩大的作战范围，正给传统装甲后勤带来越来越大的压力。通过为重型地面车辆探索核动力发动机系统，我们力求降低对补给线的依赖，同时维持长期机动能力。"
 sp_light_walker_tank_chassis: "轻型步行坦克底盘"
 sp_light_walker_tank_chassis_desc: "这是一款轻型双足装甲底盘，专为穿越崎岖地形、瓦砾和城市障碍物而设计，这些地形和障碍物限制了传统履带车辆的通行。虽然其较高的外形和复杂的驱动装置带来了维护和可靠性方面的挑战，但当得到步兵和无人机的适当支援时，这种轻型步行平台可以在人口密集的城市和崎岖的地形中提供卓越的机动性。"
 sp_drone_lrs: "无人机火箭发射系统"
 sp_drone_lrs_desc: "该发射系统用大量低成本一次性无人机取代传统火箭弹药，可在广阔区域提供蜂群式火力。无人机一经部署便会分散执行侦察、打击或巡飞攻击任务，使地面部队能够压制敌方防御、在飞行中调整攻击目标，并在不依赖传统导弹载荷的情况下持续保持攻势压力。"
 sp_heavy_walker_tank_chassis: "重型步行坦克底盘"
 sp_heavy_walker_tank_chassis_desc: "在早期步行机概念的基础上，重型双足装甲平台将厚重装甲防护与关节式机动能力相结合，能够穿越传统重型坦克无法通行的地形。尽管速度较慢且机械结构更为复杂，这类载具重点强化正面防护能力与武器平台稳定性，使其可在密集城市与崎岖环境中为突击突破作战提供支援。"
 sp_walker_tank_chassis: "步行坦克底盘"
 sp_walker_tank_chassis_desc: "步行坦克底盘将装甲车辆设计与基于关节式腿部的机动能力相结合，旨在传统履带式平台难以通行的地形中作战。通过跨越障碍与在崎岖地面行驶，这类载具在城市、山地及严重损毁环境中具备更强的灵活性，但代价是机械复杂度与维护需求更高。"
 sp_hover_suspension: "悬浮悬挂系统"
 sp_hover_suspension_desc: "通过用升力悬浮系统取代传统的履带式行走装置，装甲运兵车获得了在地面上方而非地面上行驶的能力。这使得车辆能够以更少的地面接触面积穿越泥泞、雪地、水面和碎石路面，从而提高机动性和部署灵活性，但同时也带来了新的动力和维护需求。"
 sp_magneto_explosive_munition: "磁流体动力爆炸弹药"
 sp_magneto_explosive_munition_desc: "重型装甲车辆持续推动着更先进反坦克武器的研发。通过探索磁流体动力爆炸弹药，我们力求提升制导导弹的穿透力和破坏效果。"
 sp_drone_torpedoes: "无人机鱼雷"
 sp_drone_torpedoes_desc: "海战正在迅速演变，传统鱼雷已不足以应对现代威胁。通过投资无人机鱼雷系统，我们旨在提升水下打击能力。这些新型鱼雷具备独立目标跟踪和自适应交战能力，使我们的舰队能够在反潜和海上作战中保持主动权。"
 sp_anti_drone_laser_modules: "反无人机激光模块"
 sp_anti_drone_laser_modules_desc: "海上无人机和精确制导武器的日益普及，迫使我们重新思考海军防空战略。通过将激光反无人机系统集成到舰艇上，我们可以以传统武器无法比拟的速度和精度应对这些威胁。"
 sp_mineclearing_drone: "无人机扫雷系统"
 sp_mineclearing_drone_desc: "水雷仍然是海上作业中最持久、最具成本效益的威胁之一。通过将扫雷任务转移到无人机系统，我们既能降低船员的风险，又能提高扫雷行动的速度和范围。"
 sp_naval_recon_drone: "海军侦察无人机"
 sp_naval_recon_drone_desc: "随着海战区域日益拥挤和竞争激烈，保持海上态势感知变得愈发复杂。通过投资专用海军侦察无人机，我们可以将监视范围扩展到有人驾驶平台的局限之外。这些系统使我们的舰队能够更早地发现、跟踪和应对威胁，从而确保更明智的指挥决策和更大的作战灵活性。"
 sp_drone_submarine: "无人潜艇"
 sp_drone_submarine_desc: "水下作战正从单纯依靠火力转向持久性和隐蔽性。通过研发无人潜艇平台，我们可以在不牺牲人员或高价值资产的情况下，保持持续的水下存在。这些无人潜艇使我们能够在低于常规冲突升级阈值的前提下，对关键海域进行监视、干扰和对抗。"
 sp_modern_sail_ships: "现代风帆辅助船舶"
 sp_modern_sail_ships_desc: "能源需求的不断增长和海军后勤保障的日益扩展，迫使我们重新评估支援舰队的运作方式。通过为部分舰艇重新引入现代化的帆辅助设计，我们可以在保持作战可靠性的同时降低燃料消耗。"
 sp_drone_patrol_boat: "无人机巡逻艇"
 sp_drone_patrol_boat_desc: "由于人力有限且作战需求不断增长，海岸安全和海上巡逻任务日益捉襟见肘。通过部署无人巡逻艇，我们可以在关键的沿海和近岸区域保持持续存在，而无需投入大型军舰。这些平台使我们能够以更高的效率和灵活性监测、威慑和应对低强度威胁。"
 sp_drone_corvette: "无人机轻型护卫舰"
 sp_drone_corvette_desc: "随着海战日益分散化和风险加剧，小型水面作战舰艇的作用正被重新评估。通过投资无人或可选载人的轻型护卫舰平台，我们可以在不使舰员面临不必要危险的情况下，投射力量并维持海上控制。"
 sp_rail_gun_naval_battery: "海军轨道炮台"
 sp_rail_gun_naval_battery_desc: "早期的电磁炮概念侧重于单次高威力射击，但不断发展的海战需要持续灵活的火力。通过研发多管电磁炮，我们可以提高射速并增强目标饱和度。"
 sp_nuclear_torpedoes: "核鱼雷"
 sp_nuclear_torpedoes_desc: "随着海军威慑力量向水下优势转移，仅靠常规武器可能已不足以应对挑战。通过研发核鱼雷，我们引入了一种能够封锁大片海域并有效打击高价值海军编队的武器。"
 sp_fusion_reactor_engine: "聚变反应堆引擎"
 sp_fusion_reactor_engine_desc: "现代海军系统日益增长的电力需求正将传统推进和能源生产方式推向极限。通过投资研发基于聚变反应堆的舰艇发动机，我们旨在为先进武器、传感器和推进系统提供支持，同时又不影响舰艇的续航能力。该项目为新一代高能海军平台奠定了基础，确保了我们在海上长期的作战优势。"
 sp_naval_swarm_module: "海军集群无人机发射系统"
 sp_naval_swarm_module_desc: "通过在水面舰艇上集成模块化发射系统，海军平台能够部署大量自主无人机，执行侦察、电子战和打击任务。这些集群系统能够扩展舰艇的传感器探测范围，压制敌方防御，并提供灵活的兵力投送能力，同时避免母舰直接暴露于敌方火力之下。"
 sp_radar_jamming_module: "海军雷达干扰系统"
 sp_radar_jamming_module_desc: "通过部署旨在干扰和削弱敌方雷达系统的先进电子战系统，水面舰艇可以隐藏其在海上的真实位置和动向。这些干扰系统会干扰目标捕获和火控，降低敌方传感器的效能，从而提高海战中的生存能力。"
 sp_anti_torpedo_module: "海军反鱼雷系统"
 sp_anti_torpedo_module_desc: "通过部署专门设计的反鱼雷防御系统，水面舰艇能够探测、识别并摧毁来袭的水下威胁，从而降低现代鱼雷在航行和作战行动中带来的风险。这些系统结合了快速声呐跟踪、自动对抗措施部署和拦截方案，能够在鱼雷命中目标前干扰其制导并使其失效，从而提高在敌对水域的生存能力。"
 sp_anti_ship_drone_missile: "无人机反舰导弹"
 sp_anti_ship_drone_missile_desc: "海军打击能力日益取决于射程、精度和生存能力。通过研发无人机反舰导弹系统，我们既可以扩大对敌方舰艇的威胁范围，又能降低有人驾驶飞机的风险。"
 sp_hover_helicopter_engine: "悬停直升机发动机"
 sp_hover_helicopter_engine_desc: "城市环境和狭窄地形对旋翼航空提出了新的要求。通过研发具备悬停能力的发动机系统，我们旨在提升旋翼机在复杂作业中的低速稳定性和垂直控制性能。"
 sp_hypersonic_engine: "高超音速推进系统"
 sp_hypersonic_engine_desc: "空中优势日益取决于速度、航程和突破敌方防御空域的能力。通过投资高超音速推进系统，我们力求突破传统飞机性能的极限。"
 sp_awacs_project: "机载预警和控制系统"
 sp_awacs_project_desc: "随着现代空中作战日益复杂，机载预警和控制系统已成为先进空军的关键能力。这可以通过在长航时飞机平台上安装强大的雷达阵列和指挥系统来实现。"
 sp_fiber_drones: "光纤导引无人机"
 sp_fiber_drones_desc: "随着无人系统和电子战技术的快速发展，光纤制导无人机应运而生，成为对抗干扰和信号干扰的有效解决方案。这些无人机通过光纤链路而非无线电通信传输控制信号，能够在对抗环境中可靠运行，同时保持对有效载荷的精确控制。"
 sp_air_railguns: "空对空轨道炮"
 sp_air_railguns_desc: "随着人们不断追求更高的交战速度和更远的拦截距离，空空电磁炮被提出作为传统导弹系统的替代方案。"
 sp_air_railguns_helicopter: "直升机轨道炮"
 sp_air_railguns_helicopter_desc: "通过将紧凑型电磁炮集成到旋翼平台上，直升机可以发射速度极高的火力，足以穿透通常需要更重型飞机或地面系统才能击穿的加固目标。"
 sp_space_artillery: "轨道火力支援"
 sp_space_artillery_desc: "随着天基系统越来越多地融入现代战争，轨道火力支援的概念应运而生，成为从太空对地面目标进行精确打击的一种手段。"
 sp_air_pdl: "点防御激光"
 sp_air_pdl_desc: "随着高速导弹和饱和攻击威胁的日益加剧，机载点防御激光器提供了一种以光速拦截来袭威胁的手段。通过将高能激光系统安装在飞机平台上，这些武器可以拦截并摧毁飞行中的导弹，从而减少对有限拦截器库存的依赖，并提高在敌对空域的生存能力。"
 sp_air_helicopter_drone_control: "直升机无人机控制"
 sp_air_helicopter_drone_control_desc: "将完整的无人机控制架构集成到旋翼平台中，可将直升机转变为无人侦察和打击力量的空中指挥节点。这种方法减少了机组人员执行日常暴露任务的风险，同时提高了战场上的协调性、目标定位能力和作战节奏。然而，部署这项能力成本高昂，需要先进的航空电子设备、安全的数据链路以及额外的电力和冷却能力。"
 sp_air_gunship_railcannons: "武装直升机轨道炮"
 sp_air_gunship_railcannons_desc: "该项目将重型轨道炮阵列安装在专用武装直升机机身上，打造出一种能够以持续电磁火力摧毁目标的飞机。凭借极高的炮口初速和精确的火控系统，它能够以远超传统火炮反应速度的速度摧毁无人机、飞机和地面部队。然而，这项能力的研发成本极其高昂，需要卓越的发电系统、先进的冷却技术和高品质的材料来维持系统的正常运行。"
 sp_deep_sea_mining: "深海采矿"
 sp_deep_sea_mining_desc: "日益增长的工业和技术需求正给传统资源供应链带来越来越大的压力。通过投资深海采矿能力，我们旨在确保获得位于常规开采区之外的关键矿产资源。"
 sp_agriculture_drone: "农业无人机系统"
 sp_agriculture_drone_desc: "在满足不断增长的人口粮食需求的同时保持效率，正成为一项核心战略挑战。通过引入先进的农业无人机系统，我们可以通过改进监测、精准施肥和自动化，实现农业生产的现代化。"
 sp_vertical_farming: "垂直农业"
 sp_vertical_farming_desc: "城市化和土地稀缺正在重塑粮食生产方式。通过投资垂直农业，我们可以将农业生产转移到可控的高密度环境中，从而减少对天气和地理位置的依赖。"
 sp_robotic_humanoid: "家用机器人助手"
 sp_robotic_humanoid_desc: "随着日常生活与科技的融合日益加深，人形机器人为人们提供居家辅助的潜力也越来越大。我们致力于研发家用机器人助手，旨在帮助人们完成诸如家务维护、照护和个人协助等日常任务。"
 sp_robotic_surgery: "机器人手术"
 sp_robotic_surgery_desc: "人口老龄化和医疗保健需求不断增长，给医疗系统带来了越来越大的压力。通过扩大机器人辅助手术的应用，我们旨在提高手术精准度，缩短恢复时间，并使先进的手术方式惠及更多患者。"
 sp_smart_grid: "智能网格基础设施"
 sp_smart_grid_desc: "能源消耗的增长和先进技术的融合对国家电网提出了新的要求。通过投资智能电网基础设施，我们可以更好地管理电力分配，平衡供需，并减少系统性低效问题。"
 sp_equipment_recycling: "军事装备回收计划"
 sp_equipment_recycling_desc: "一项旨在回收、翻新和再利用过时或损坏的军事装备的综合计划。通过从退役平台上回收关键材料和部件，武装部队可以减轻工业压力，提高供应韧性，并在长期冲突期间部分弥补生产损失。"
 sp_epigenetic_reprogramming: "表观遗传重编程"
 sp_epigenetic_reprogramming_desc: "一项生物医学研究项目旨在通过改变基因表达而不改变DNA序列，来增强军人的体能、认知能力和恢复速度。该项目虽然有望在训练效率和战备方面带来长期优势，但也引发了伦理方面的担忧，需要严格的监管。"
 sp_nuclear_energy: "核能反应堆"
 sp_nuclear_energy_desc: "核反应堆适合生产制造炸弹的材料。但它产生的能量完全可以用于为民用和军工产业提供电力。"
 sp_nuclear_bomb: "核裂变炸弹计划"
 sp_nuclear_bomb_desc: "一种利用核裂变过程释放原子储存能量，瞬间毁灭世界的炸弹。有了这样的武器，谁还敢与我们对抗？"
 sp_amws_combat_system: "AMWS-21作战系统"
 sp_zamws_advanced_mws: "XAMWS-24先进多用途武器系统"
 sp_xciws_close_in_weapon_system: "XCIWS-2B近程武器系统"
 sp_close_range_battle_halberd: "77式近程战斗戟"
 sp_great_sword: "BWS-3大剑"