 ENG_highland_main_line: "高地干线"
 ENG_highland_main_line_desc: "升级后的高地干线铁路连接珀斯和因弗内斯，列车运行速度更快、可靠性更高，帮助当地企业更轻松地到达市场、接触员工和服务场所。"
 ENG_crossrail: "横贯铁路"
 ENG_crossrail_desc: "伊丽莎白线将希思罗机场、西区、伦敦金融城和金丝雀码头连接成一个单一的劳动力市场，缓解了通勤压力，减少了拥挤的排队现象，提高了伦敦办公经济的生产力。"
 ENG_high_value_manufacturing_zone: "高价值工业区"
 ENG_hs2_idea: "二号高速铁路"
 ENG_northern_powerhouse_rail_idea: "北方动力铁路"
 ENG_andrew_digital_enterprise_modifier: "皇家企业数字化转型"
 ENG_andrew_digital_enterprise_modifier_desc: "在约克公爵的人脉网络支持下，一股新的推动力量正在兴起，旨在通过更现代化的商业框架将投资者、区域企业和科技公司联系起来。贸易促进机构、商业论坛和私营部门伙伴关系正被用来加速数字化转型，并提升英国企业在国内外的知名度。"
 ENG_edward_beach_youth_modifier: "公爵的青年拓展活动"
 ENG_edward_beach_youth_modifier_desc: "在威塞克斯伯爵的赞助下，青年参与计划通过奖励项目、社区网络和遍布全国的公共活动得以扩展。该计划强调培养青年的自信心、公民服务和实用技能，在加强社会凝聚力的同时，鼓励新一代参与国家事务。"
 ENG_prince_charles: "查尔斯"
 ENG_prince_charles_trait: "威尔士亲王"
 ENG_charles_1_idea: "威尔士亲王"
 ENG_charles_1_idea_desc: "查尔斯被尊称为威尔士亲王，是英国王位的法定继承人。这一头衔由特许状授予，并经正式册封仪式确认，标志着他作为王位继承人的首要地位，以及他与威尔士和更广阔的王国之间的永久联系。"
