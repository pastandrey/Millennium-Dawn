 ENG_prince_andrew_leader_name: "$ENG_prince_andrew_trait$ Prince $ENG_prince_andrew$ "
 ENG_andrew_1_idea: "Royal Navy Commander"
 ENG_andrew_1_idea_desc: "As Royal Navy Commander, Andrew served with distinction in the British fleet, including duties as a helicopter pilot and ship commander. This reflects his long active service and leadership in maritime operations, and signifies his deep connection to the United Kingdom's naval heritage."
