 ENG_glasgow_shipbuilding_idea2: "格拉斯哥造船中心"
 ENG_glasgow_shipbuilding_idea2_desc: "对克莱德造船厂的投资简化了设计、焊接和舾装流程，降低了我们在格拉斯哥及其他地区建造的所有海军舰艇的生产成本。"
