 ENG_create_new_faction_TT: "将创建一个新阵营：大西洋安全组织\n\n我们将能够利用[ADS.GetFlag]阿尔比恩推翻外国政府！\n - 此能力可使用三次，可通过影响力菜单中的政变按钮启用。启用后会出现一个额外选项，允许你使用[ADS.GetFlag]阿尔比恩推翻欧洲的某个政府，从而获得一个附庸国和盟友。"
 ENG_collapse_of_society_TT: "£text_icon_kaldanger 选择此选项可能会导致政府垮台！\n - 这将使我们能够专注于§H分裂王国和美国§!的国策。\n - 军方将在某个时刻介入并接管国家。"
 ENG_do_fp_TT: "至少完成§H3§!项外交政策国策"
 ENG_core_desc_TT: "通过实现经济、军事和政治霸权，我们将能够向三大英联邦成员国证明我们有能力供养和保护它们。此外，如果我们的境况更好，它们的民众也会更倾向于加入我们。"
 ENG_econ_hegemony_TT: "“金钱能解决一切问题”\n\n通过实现经济霸权，我们将处于一个良好的状态，可以与其他经济体（例如英联邦成员国的经济体）进行整合。为了实现这一目标，我们需要：\n\n比这三个国家加起来的GDP还要高。\n- 我国当前$[?gdp_per_capita]K \n- 他们当前$[?commonwealth_total_gdp]K"
 ENG_military_hegemony_TT: "“强大的军队等于强大的统治”\n\n通过取得军事霸权，我们将能够有力地证明我们有能力保卫我们的领土和人民。为了实现这一目标，我们需要：\n\n部署的军队比这三个国家加起来还要多。\n- 我国当前已部署[?ENG.deployed_army_manpower_k]K部队\n- 他们当前已部署[?commonwealth_total_army]K部队"
 ENG_political_hegemony_TT: "“只需要动用关系就行了。”\n\n通过取得政治霸权，我们将证明威斯敏斯特的统治是稳定的、联系紧密的，并且与各行各业的人民都有联系。为了实现这一目标，我们需要：\n\n强大的影响力范围\n- 在所有三个国家至少拥有50%或以上的影响力"
 ENG_tooltip_TT: "已满足经济霸权的所有要求"
 ENG_tooltip2_TT: "已满足军事霸权的所有要求"
 ENG_has_met_all_requirements_TT: "在所有三个类别中都是霸权"
 ENG_hold_for_280_TT: "我们必须据有我们的首都280天！"
 ENG_seize_sierra_leone_TT: "如果[SIE.GetFlag]§H塞拉利昂§!处于亲西方并且未处于战争状态：\n- 我们将能够通过一项决定暂时接管他们在§H弗里敦§!的资源。"
