 ENG_coal_opencast_mining: "苏格兰露天煤矿"
 ENG_coal_opencast_mining_desc: "苏格兰煤田新建的露天煤矿为我们的化石燃料发电站提供了源源不断的廉价燃料，使它们能够更高效地运转，并为电网产生更多电力。"
 ENG_glasgow_shipbuilding_idea1: "格拉斯哥造船中心"
 ENG_glasgow_shipbuilding_idea1_desc: "对克莱德造船厂的投资简化了设计、焊接和舾装流程，降低了我们在格拉斯哥及其他地区建造的所有海军舰艇的生产成本。"
