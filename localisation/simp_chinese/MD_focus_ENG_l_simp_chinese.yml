l_simp_chinese:
 united_kingdom_focus: "联合王国国策树"
 ENG_royal_army: "英国陆军"
 ENG_royal_army_desc: "英国陆军是英国武装部队的主要陆上力量，其历史可以追溯到1707年苏格兰和英格兰军队根据《联合法案》合并之时。它几乎参与了所有重大战争，包括七年战争、美国独立战争、拿破仑战争、克里米亚战争以及第一次和第二次世界大战。在此期间，它从一支以步兵为主的部队发展成为一支高度先进且机械化的军队，拥有各种支援部队和世界一流的特种部队，其特种部队已成为其他国际军种的标杆。"
 ENG_irish_referendum: "[GetYear][NIR.GetFlag]北爱尔兰独立公投"
 ENG_irish_referendum_desc: "[NIR.GetFlag]爱尔兰人民将就一项全民公投进行投票，该公投将决定他们作为一个国家、一个组成部分以及不列颠群岛的参与者的未来。"
 ENG_scottish_referendum: "[GetYear][SCO.GetFlag]苏格兰独立公投"
 ENG_scottish_referendum_desc: "[SCO.GetFlag]苏格兰人民将就一项公投进行投票，该公投将决定他们作为一个国家、一个组成部分以及不列颠群岛中的一员的未来。"
 ENG_merit_based_education_system_idea: "精英教育体系"
 britain_md.1.t: "我们对英国的雄心壮志"
 britain_md.1.d: "人民已经发声，他们选择工党作为他们未来代表的政党。我们对英国成为真正最美好国家的愿景和抱负没有止境，我们将立即着手解决我们伟大联盟面临的各项问题。"
 britain_md.2.t: "我们是在冒险吗？"
 britain_md.2.d: "我们可以通过鼓励对某些细分行业的投资来对国家市场产生巨大影响。但这样做可能会让那些已将资金投入竞争行业的投资者感到恐慌，从而导致轻微的经济下滑。目前，内阁对于此时采取这一举措是否最佳存在分歧。"
 britain_md.3.t: "做出一个伟大的承诺"
 britain_md.3.d: "为了赢得更广泛的选民支持，我们需要争取内部某个派系的支持。这样做不仅能展现我们高效运作多个政府部门的能力，还能让我们获得一些额外的资金来资助其他项目。此外，凭借对这些派系新获得的影响力，我们将能够在未来的选举中扭转局势，战胜我们的政治对手。"
 britain_md.4.t: "我们对哪些人征税？"
 britain_md.4.d: "我国政府面临着一个特殊的情况。为了增加政府收入，我们需要提高税收来资助社会支出项目。然而，这样做必然会激怒一部分民众，而且普遍征税已被警告，因为它最有可能损害我国的声誉。因此，内阁提议只对一部分民众征税，以免引起众怒。"
 britain_md.5.t: "英国向前走，莫回头"
 britain_md.5.d: "我们必须阻止社会倒退回某些政治对手不断鼓吹的那种压迫深渊。我们将竭力确保英国向前迈进，不受任何阻碍。我们的价值观、秩序和稳定绝不能在任何情况下受到损害，我们将全力以赴，确保在选举中保持领先地位。"
 britain_md.6.t: "掠过英国天空"
 britain_md.7.t: "不让任何人掉队"
 britain_md.7.d: "无论在欧洲、亚洲、非洲还是美洲，世界各地不平等现象都在加剧。工资停滞不前，物价飞涨，生活本身已成为一种负担。然而，对于英国公民来说，情况并非必须如此！通过迅速的改革和新的政策，我们将向世界证明，你们不必屈服于日益加剧的不平等趋势。"
 britain_md.8.t: "两者之间有何联系？"
 britain_md.8.d: "许多右翼人士宣称，近年来犯罪率上升与移民数量增加直接相关。尽管许多人反驳这些说法，称其为仇外和偏执，但也有人认为，犯罪率上升的原因是部分移民和难民无法融入[ENG.GetAdjective]文化。"
 britain_md.9.t: "总有改进的空间"
 britain_md.9.d: "英国不必与世界其他国家一样，它可以做得更好。通过严肃的政治改革，我们可以扭转民主倒退的趋势，使英国成为它所能达到的最佳状态。这一次，工党承诺带来彻底的社会和政治改革，我们的信息将以前所未有的方式传达给英国人民。"
 britain_md.10.t: "重新审议游说法？"
 britain_md.10.d: "内阁中一些人越来越呼吁我们重新考虑游说法案。当然，此举必将引起轩然大波，并可能导致政府内部腐败案件增多。然而，如果我们想为党派迅速争取支持和资金，至少应该考虑对该法案进行一些修改。"
 britain_md.11.t: "让英国清醒过来"
 britain_md.11.d: "是时候让这个饱受混乱蹂躏的国家恢复正常了。常识似乎已被彻底抛弃，工党开始推行一些会造成不可逆转损害的改革。我们的政府将致力于推动英国走向一个更强大、更独立的国家，而不是一个由布鲁塞尔或左翼内阁掌控的国家。"
 britain_md.12.t: "[FROM.GetName]请求军事通行权"
 britain_md.12.d: "为了使欧洲在国防方面更加灵活，[ENG.GetAdjective]显然决定发出军事通行请求。虽然我们实际上不会从中获得任何好处，但基本上也不会失去什么。"
 britain_md.13.t: "英国的参与"
 britain_md.13.d: "英国政府已承诺协助我们对抗敌人，捍卫国家主权。但他们并未明确说明希望我们做出怎样的回报。我们从可靠渠道获悉，如果英国政府对我们拥有相当大的影响力，他们计划在弗里敦征用我们的资源长达500天。无论我们是否允许他们部署军队，他们都打算这样做。"
 britain_md.14.t: "英国人掠夺了我们的资源！"
 britain_md.14.d: "英国人占领了我们的资源，因为他们对我们拥有相当大的影响力。这种情况将持续500天，直到他们撤离为止。"
 britain_md.15.t: "任务结束：巴拉斯"
 britain_md.15.d: "我们在塞拉利昂的时间即将结束，我们已经开始准备撤离那些将资源从塞拉利昂转移出去以获取英国收入的机构。"
 britain_md.16.t: "冈比亚发生政变？"
 britain_md.16.d: "现在是时候彻底结束冈比亚[GAM.GetLeader]的暴政统治了。我们将组织推翻他们的政府，但如果我们操之过急，可能会演变成内战，最终失控。"
 britain_md.17.t: "冈比亚政变成功"
 britain_md.17.d: "我们已成功推翻冈比亚的压迫政权，并扶植了我们属意的政府上台执政。冈比亚人民将不再遭受不必要的压迫。"
 britain_md.18.t: "冈比亚政变失败"
 britain_md.18.d: "我们推翻[GAM.GetLeader]的行动失败了，结果导致我们损失了数名英国军人。我们的政变企图正受到国际社会的严厉审视，与冈比亚政府的关系也进一步恶化。"
 britain_md.19.t: "冈比亚政变取得巨大成功"
 britain_md.19.d: "我们在冈比亚的行动取得了巨大的成功。我们不仅推翻了压迫性的政府，而且还牢牢控制了该国，实际上将其变成了一个卫星国。"
 britain_md.20.t: "三角洲卫队行动：成功"
 britain_md.20.d: "我们成功夺取了三角洲地区的战略油田，尼日利亚军队已被目击向北撤退至首都附近。目前尚不清楚他们是否会进行报复，但就目前而言，我们正在享受战争的胜利果实。"
 britain_md.21.t: "英国军队夺取三角洲石油"
 britain_md.21.d: "英国军队严重侵犯了我们的主权，并宣布我们神圣的油田处于“临时保护”之下，还指责我们的政府不稳定且不可信赖。我们不明白他们为何认为军事行动是最佳解决方案，但有一点可以肯定，我们绝不能坐视不管。"
 britain_md.22.t: "尼日利亚采取报复行动"
 britain_md.22.d: "多名英国军人在尼日利亚武装部队的报复性袭击中受伤，甚至有人丧生。这是我们对我们夺取三角洲地区多个油田的回应，此举确保了我们从动荡的尼日利亚政府手中获得至关重要的石油供应。我们必须占领尼日利亚首都，才能让他们认清自己的位置。"
 britain_md.23.t: "英军撤退"
 britain_md.23.d: "由于畏惧强大的尼日利亚武装部队和英勇的[NIG.GetLeader]领导，懦弱的英国军队已撤出三角洲地区，并停止了所有石油作业。我们在这件事上取得了胜利，预计英国不会再进行任何报复。"
 britain_md.24.t: "选择议程"
 britain_md.24.d: "我们党赢得了选举，现在是我们制定施政纲领的时候了。"
 britain_md.25.t: "英国 - 信息，请阅读"
 britain_md.25.d: "您好！看来您已选择英国作为您的首选国家/地区，希望您玩得愉快！\n\n您目前正在体验英国重制版的第一阶段，其中包括重制后的国策树、一系列决策以及君主制机制。您可能会问是否还有更多内容即将推出，答案是肯定的，更多内容即将到来。\n\n第二阶段：\n在第二阶段，您可以期待看到更加深入的权力下放制度和改进的下议院制度。\n\n第三阶段：\n在第三阶段，您可以期待扩展的外交政策树、额外的政治路线等等！\n\n如果您对这棵树有任何反馈，请在我们的Discord、Reddit或Github上告诉我们！\n\n - 千禧黎明英国团队"
 britain_md.26.t: "推进新的福克兰群岛政策"
 britain_md.26.d: "目前，要求进一步推进福克兰群岛一体化进程或采取进一步行动的呼声日益高涨。虽然后者可能略显激进，但从长远来看，最终将对我们有利。也有人希望我们归还福克兰群岛，以巩固我们在南美地区的形象。"
 ENG_british_flag_on_the_moon: "插上月球的英国国旗"
 ENG_british_flag_on_the_moon_desc: "英国正致力于在月球上建立英国基地，开启一项雄心勃勃的登月计划。这项登月计划标志着英国对太空探索的坚定承诺，展现了其强大的技术实力，并促进了科学创新。开拓宇宙疆界，提升英国在全球太空探索领域的地位。"
 ENG_set_sail_to_mars: "扬帆火星之旅"
 ENG_set_sail_to_mars_desc: "英国勇于突破地球的界限，大胆计划在火星上建立存在。这项富有远见的计划旨在引领火星探索，突破太空技术的极限，并将英国定位为人类征服这颗红色星球的关键力量。迎接征服火星的挑战，定义英国在未来星际探索中的角色。"
 ENG_new_thirteen_colonies: "新十三殖民地"
 ENG_new_thirteen_colonies_desc: "英国正着眼于开拓新领域，从历史中汲取灵感，构想在火星上建立新的十三殖民地。这项雄心勃勃的计划秉承了最初十三殖民地的精神，标志着英国致力于火星定居，勇于迎接星际殖民的挑战。引领这颗红色星球，创造新的历史篇章，让英国先驱者踏上一段与国家历史渊源相呼应的旅程。"
 ENG_asteroid_mining: "小行星采矿"
 ENG_asteroid_mining_desc: "随着英国皇家小行星采矿公司成立，英国正积极投身于太空资源开采领域，携手迈向浩瀚宇宙。这项旨在从小行星上提取宝贵资源的计划，象征着英国致力于开拓太空资源利用和尖端技术的决心。"
 ENG_standardized_space_parts: "标准化空间部件"
 ENG_standardized_space_parts_desc: "英国正大力推进航天部件标准化，以彻底改变太空探索的成本控制方式。通过简化和标准化零部件，这项举措旨在提高太空探索的成本效益，彰显英国致力于促进经济实惠的太空探索事业的决心。"
 ENG_virgin_galactic: "维珍银河"
 ENG_virgin_galactic_desc: "作为太空旅游行业的领军企业，维珍银河致力于让所有人都能探索宇宙。凭借创新的航天器和对突破太空探索极限的执着追求，维珍银河彰显了英国在塑造民用太空探险未来方面所扮演的重要角色。"
 ENG_british_commercial_spaceport: "英国商业航天港"
 ENG_british_commercial_spaceport_desc: "随着全球太空探索竞赛日趋激烈，英国意识到巩固其在太空探索前沿地位的必要性。建立英国商业航天港是提升英国在商业航天领域地位的关键举措。通过投资建设和发展专用航天港，英国渴望促进创新，吸引国际合作，并将本国航空航天业推向新的高度，从而确保其在太空探索领域作为关键参与者拥有光明的前景。"
 ENG_united_kingdom_space_command: "英国太空司令部"
 ENG_united_kingdom_space_command_desc: "随着宇宙成为战略影响力的新舞台，英国认识到整合其太空行动力量的必要性。英国太空司令部的成立是旨在统一和加强国家太空能力的一项决定性举措。通过集中指挥、促进联合行动以及投资尖端技术，英国致力于维护其在宇宙领域的利益，确保在星际间拥有强大的存在，并在太空时代捍卫国家安全。"
 ENG_istari_programme: "伊斯塔里计划"
 ENG_istari_programme_desc: "为了应对不断变化的全球形势，英国推出了伊斯塔里计划，这是一项雄心勃勃的计划，致力于网络领域的情报、监视、目标获取和侦察。"
 ENG_space_red_coats: "太空步兵"
 ENG_space_red_coats_desc: "英国从辉煌的历史中汲取灵感，通过21世纪太空突击队重振红衣军团的传奇。这一举措唤起人们对历史韧性的记忆，并将英国的太空探索推向新的时代。身着象征性的红色制服，太空红衣军团致力于探索宇宙，传承探索的传统，并将英国的影响力投射到浩瀚的星空。"
 ENG_1st_space_force_division: "第一太空师"
 ENG_1st_space_force_division_desc: "英国迈出了超越地球界限的步伐，创建英国太空部队，开辟了一条大胆的道路。这在历史上前所未有，标志着英国首个专门的太空部队的成立，开启了新的篇章。太空部队肩负着保护太空利益、探索未知领域的重任，象征着英国致力于探索和守护宇宙前沿的决心，届时，英国国旗将在星辰间飘扬。"
 ENG_space_capabilities: "网络空间能力"
 ENG_space_capabilities_desc: "英国认识到数字领域至关重要，因此将重点放在提升网络空间能力上。在信息就是力量的时代，这项举措标志着英国致力于增强国家在网络空间作战方面的实力。"
 ENG_strategic_defence_review: "[GetYear]国防白皮书"
 ENG_strategic_defence_review_desc: "我们的优先事项和面临的威胁瞬息万变，我们的军事机构也应随之发展以应对这些变化。通过与政府各部门及盟友协调制定新的国家安全应对措施，我们可以确保我们的军队始终能够适应变化，并随时准备应对英国安全面临的威胁。"
 ENG_AS90: "AS-90 “勇敢的心”"
 ENG_AS90_desc: "AS90（1990年代火炮系统），又称155毫米L131型火炮，是英国陆军使用的主要装甲​​自行火炮。它由维克斯造船工程公司的军备部门于1982年至1987年间设计制造，并于1992年开始生产，共生产了179辆。它取代了老旧的105毫米FV433“阿伯特”自行火炮和更早期的M109 155毫米自行火炮。目前已提出对AS90进行现代化改造的方案，旨在为其配备更大口径的炮管，使其能够发射52倍径弹药，从而增加其无辅助射程并使用远程弹药。"
 ENG_operation_excellence: "特种司令部"
 ENG_utility_vehicle_modernisation: "通用载具现代化"
 ENG_utility_vehicle_modernisation_desc: "北爱尔兰冲突期间的经验表明，陆军目前使用的步兵通用载具，例如“斯纳奇”路虎，对简易爆炸装置和地雷的防护能力几乎为零，幸存者报告显示，这些车辆甚至会对爆炸的幸存者造成伤害。因此，英国国防部已开始探索使用配备防雷和防伏击装甲的现代化车辆，例如美国的“美洲狮”防地雷反伏击车。"
 ENG_nlaw_anti_tank_system: "NLAW反坦克系统"
 ENG_nlaw_anti_tank_system_desc: "萨博博福斯动力下一代轻型反坦克武器（也称MBT LAW或R85）是一款发射后不管、轻便、肩扛式、一次性使用的视距导弹系统，专为步兵设计。该系统由萨博公司为英国和瑞典国防部在英国的下一代轻型反坦克武器团队设计，并由包括泰雷兹防空公司在内的多家分包商参与。"
 ENG_startstreak_anti_air_system: "星光防空系统"
 ENG_startstreak_anti_air_system_desc: "“星光”是英国的一种短程地对空导弹，既可作为便携式防空导弹系统使用，也可用于多种配置的直升机和车辆，实现移动防空覆盖。它由位于北爱尔兰贝尔法斯特的泰雷兹防空公司制造。导弹发射后加速至超过4马赫，是目前速度最快的短程地对空导弹。为了进一步提升其作战效能，该导弹会向目标发射三枚激光驾束子弹药，从而提高命中率。"
 ENG_M270: "为M270重新注资"
 ENG_M270_desc: "英国国防部计划投资对现役的M270履带式导弹发射系统和各种导弹进行升级改造，以配合其采购的制导火箭发射系统弹药。计划引进新型发动机、装甲防护和现代化火控系统。"
 ENG_mobile_fires_platform_program: "移动火力平台计划"
 ENG_mobile_fires_platform_program_desc: "冷战结束后，随着人们对德国平原冲突的预期减弱，陆军155毫米火炮系统的库存有所下降。如今，随着新的威胁逐渐显现，国防部决定采取措施恢复这项能力。众多竞标者纷纷加入，但最终只有一家能够中标。"
 ENG_fres_program: "未来快速效应系统计划"
 ENG_fres_program_desc: "未来快速效应系统计划代表了一种前瞻性的军事能力发展方法。未来快速效应系统注重敏捷性和适应性，旨在为英国武装部队提供一系列用途广泛的陆地平台，包括装甲车辆和支援系统。"
 ENG_fix_civil_servant: "修复“公务员”问题"
 ENG_fix_civil_servant_desc: "由于部队中频繁出现抱怨和性能问题，L85A1步枪最初进行了全面升级，以解决其维护困难和运行不可靠等问题。由于其可靠性差、功能复杂，L85A1步枪常被戏称为“公务员”。这些问题促使军方在2000年至2002年间对其进行了大规模改造。当时现存的32万支L85A1自动步枪中，约有20万支进行了翻新。"
 ENG_modern_littoral_force: "现代近岸部队"
 ENG_trident_nuclear_program: "三叉戟核计划"
 ENG_general_dynamics_ajax: "通用动力阿贾克斯"
 ENG_general_dynamics_ajax_desc: "通用动力公司生产的阿贾克斯侦察车是一款最先进的侦察车，它成为英国武装部队现代化进程中的基石。这款敏捷先进的装甲车旨在满足现代战争的严苛需求，它集成了尖端技术，具备无与伦比的侦察能力。"
 ENG_challenger_lethality_improvement_programme: "挑战者坦克杀伤力提升计划"
 ENG_challenger_lethality_improvement_programme_desc: "“挑战者”坦克杀伤力提升计划旨在用目前豹2和M1艾布拉姆斯坦克使用的莱茵金属120毫米滑膛炮替换现有的L30A1线膛炮。使用滑膛炮将使“挑战者”2坦克能够使用北约标准弹药，包括钨基动能穿甲弹。钨基动能穿甲弹不像贫铀弹那样存在政治和环境方面的争议。"
 ENG_challenger_3: "挑战者3"
 ENG_challenger_3_desc: "由英国自主研发的挑战者3型坦克，堪称尖端装甲战的典范。凭借先进的技术、强大的火力以及增强的防护能力，挑战者3型坦克确保了战场上的绝对优势。这款现代化坦克彰显了英国致力于打造一支强大的装甲部队，以应对现代战争挑战的决心。"
 ENG_modern_landing_craft: "现代化登陆艇"
 ENG_mechanised_amphibious_assault: "机械化两栖突击"
 ENG_aircraft_ai_integration: "飞机AI集成"
 ENG_aircraft_ai_integration_desc: "秉持“质量重于数量”的原则，英国将卓越性和技术优势置于军队建设的首要位置。这种国家精神强调采购先进精密的装备，以确保强大的技术防御能力。通过注重质量，英国旨在最大限度地提高军队效能，从而在应对现代挑战时形成战略优势。"
 ENG_strike_brigades: "打击旅"
 ENG_future_soldier_armed_forces: "未来士兵武装部队"
 ENG_future_soldier_armed_forces_desc: "“未来士兵”计划是包括英国在内的各国武装部队所采取的一项前瞻性战略。该计划的重点是为士兵配备尖端技术和能力，以提高他们在现代战场上的作战效能。"
 ENG_joint_expeditionary_force: "联合远征军"
 ENG_joint_expeditionary_force_desc: "联合远征军起源于2012年，由时任国防参谋长戴维·理查兹爵士提出，其前身是联合快速反应部队，当时英国正将重心放在阿富汗和伊拉克战争上。联合远征军由英国皇家海军、皇家海军陆战队、英国陆军和皇家空军的人员和装备组成，其英国部分优先考虑高度一体化。这种一体化在与他国军队协同作战时尤为突出，标志着与以往模式的重大转变。"
 ENG_carrier_group_debate: "航空母舰集群辩论"
 ENG_worldwide_reach: "全球影响力"
 ENG_worldwide_reach_desc: "英国曾是超级大国，拥有遍布全球的影响力来保护自身利益。我们需要重拾这种力量，以维护我们在全球的利益。"
 ENG_national_service_debate: "国民服役辩论"
 ENG_national_service_debate_desc: "一支完全依靠志愿兵的军队无法满足全球范围内日益增长的英国军队需求。我们需要增加征兵人数以满足这一需求。"
 ENG_army_special_operations_brigade: "陆军特种作战旅"
 ENG_reestablish_far_east_command: "重建远东司令部"
 ENG_reestablish_far_east_command_desc: "英国重建远东司令部标志着其战略重心转向加强在这一关键地区的军事能力。此举涉及部署指挥机构、作战部队和后勤保障，以有效应对不断变化的安全形势。通过加强在远东的存在和协调，英国武装部队旨在灵活应对地区挑战，加强与盟友的伙伴关系，并为这一具有重要战略意义地区的整体稳定做出重大贡献。"
 ENG_britannia_armed_forces: "不列颠尼亚武装部队"
 ENG_britannia_armed_forces_desc: "通过我们重塑世界军事力量的努力，我们终于可以自豪地说，我们拥有一支能够捍卫英国在全球利益的军队。"
 ENG_allied_basing_efforts: "盟军基地建设工作"
 ENG_allied_basing_efforts_desc: "盟军基地建设倡议体现了联盟成员国加强战略能力的共同承诺。根据该倡议，英国的基础设施，包括铁路、空军基地、港口等，将得到持续而显著的改善。这种长期提升增强了英国的后勤能力和整体作战效能。"
 ENG_reactivate_naval_defense_act_1889: "重新启用1889年海军防御法案"
 ENG_reactivate_naval_defense_act_1889_desc: "为象征性地致敬英国历史上辉煌的海上地位，1889年海军防御法案的重新启用标志着英国致力于加强海军能力的前瞻性承诺。该法案旨在将昔日的精神融入现代海军的战备之中。通过重振原法案的原则，英国表明了其维护一支强大且技术先进的海军力量的决心。该法案可能包含海军资产现代化、海军基础设施扩建以及战略投资等方面的条款，以确保英国皇家海军在全球舞台上保持强大的影响力。"
 ENG_royal_navy: "皇家海军"
 ENG_royal_navy_desc: "英国皇家海军是世界顶尖的海上力量之一，拥有数百年悠久的历史。皇家海军以其适应能力和技术实力而闻名，在维护英国海上利益和在全球范围内投射力量方面发挥着至关重要的作用。"
 ENG_british_foreign_legion: "英国外籍军团"
 ENG_british_foreign_legion_desc: "秉持国际服务模式，英国外籍军团欢迎希望在英国军队服役的外国公民。该军团旨在培养战友情谊、多元文化和共同目标感，为来自不同背景的人士提供为英国国防做出贡献的独特途径。"
 ENG_multi_ocean_navy: "多洋海军"
 ENG_multi_ocean_navy_desc: "为了保护英国在全球的利益，我们需要增强跨洋打击的海军能力。"
 ENG_Strategic_Aircraft_Training: "战略飞机训练"
 ENG_Strategic_Aircraft_Training_desc: "在现代社会，拥有一支能够跨越所有海洋进行打击的空军至关重要。我们需要加强战略飞机的作战能力，才能具备这种能力。"
 ENG_field_army_expansion: "野战部队扩充"
 ENG_field_army_expansion_desc: "英国野战部队扩充计划标志着英国加强其地面部队的战略承诺，旨在确保其拥有强大且适应性强的军事能力。此次扩充计划包括扩大野战部队的规模和提升其能力，涵盖英国陆军的核心地面部队。"
 ENG_type_31_frigate_inspiration_class: "31型护卫舰“灵感”级"
 ENG_type_31_frigate_inspiration_class_desc: "31型护卫舰是英国皇家海军研发的一种通用护卫舰，兼具先进性能和经济性。这些护卫舰旨在胜任多种任务，从护航、海上安全到人道主义援助和灾害救援，均可发挥出色作用。31型护卫舰注重模块化和适应性，配备了现代化的传感器套件、武器系统和灵活的任务舱。这一经济高效的平台增强了英国皇家海军的全球影响力，并有助于其应对21世纪各种海上挑战。"
 ENG_multi_role_support_ship_project: "多用途支援舰项目"
 ENG_multi_role_support_ship_project_desc: ""
 ENG_expanded_carrier_wing_procurement: "扩大航母舰载机群采购"
 ENG_expanded_carrier_wing_procurement_desc: "通过投资扩建航母舰载机联队，英国旨在投射力量、保护海上利益，并为国际安全做出重大贡献。这一举措体现了英国致力于在瞬息万变的全球安全格局中保持一支现代化且能力卓越的海军航空部队的决心。"
 ENG_strategic_aircraft_strategy: "战略飞机战略"
 ENG_strategic_aircraft_strategy_desc: "战略飞机战略概述了英国在战略飞机资产的获取、部署和利用方面的方针。这项综合战略涵盖了诸多考量因素，包括国家防御优先事项、全球安全挑战和技术进步。"
 ENG_continent_operational_considerations: "大陆作战考量"
 ENG_continent_operational_considerations_desc: "我们需要优先考虑对武装力量及盟友的承诺，因此必须选定陆军中重点发展的兵种。"
 ENG_astute_class: "机敏级潜艇"
 ENG_astute_class_desc: "机敏级是英国皇家海军现役的最新一级核动力舰队潜艇。这些潜艇由贝宜系统潜艇部门在巴罗因弗内斯建造。"
 ENG_type_45_destroyer_upgrades: "45型驱逐舰升级"
 ENG_type_45_destroyer_upgrades_desc: "45型驱逐舰升级项目旨在通过先进技术和系统改进，提升英国皇家海军45型驱逐舰的作战能力。重点升级领域包括雷达系统、作战系统、推进装置以及导弹防御系统。"
 ENG_dreadnought_class: "无畏级潜艇"
 ENG_dreadnought_class_desc: "无畏级潜艇项目涉及为皇家海军设计、建造并整合下一代弹道导弹潜艇。这些潜艇将具备先进的隐身性、推进系统和战略武器能力，确保英国拥有可靠的核威慑力量。"
 ENG_type_26_frigate: "26型护卫舰"
 ENG_type_26_frigate_desc: "26型护卫舰项目涉及为皇家海军建造一类新型多功能战舰。这些护卫舰设计灵活，可适应多种任务角色，包括反潜作战、防空以及人道主义援助。凭借先进的传感器套件、武器系统和推进技术，26型护卫舰将成为皇家海军水面舰队的核心力量，提升其在现代海军环境中高效作战的能力。"
 ENG_type_83_destroyer: "83型驱逐舰"
 ENG_type_83_destroyer_desc: "83型驱逐舰是英国皇家海军计划于21世纪30年代中后期列装的一级新型导弹驱逐舰。该级舰设计旨在满足不断演进的海军需求，承诺提供先进作战能力与现代化特性。作为兼具多功能性与强大战力的舰艇，83型驱逐舰标志着皇家海军海上力量的关键性进步，将确保其在未来作战环境中保持高度战备状态与作战效能。"
 ENG_qinetiq_dragonfire_system: "奎奈蒂克\"龙焰\"系统"
 ENG_qinetiq_dragonfire_system_desc: "\"龙焰\"激光武器系统代表了英国最前沿的激光定向能武器技术验证成果。该系统于2017年在伦敦国际防务与安全装备展上首次亮相，由英国\"龙焰\"联合体——包括MBDA英国公司、莱昂纳多英国公司、奎奈蒂克集团及国防科技实验室——共同研发。作为关键技术验证平台，\"龙焰\"将通过严格测试评估激光定向能武器技术及其在英国武装部队中的潜在应用，标志着英国军事创新与能力建设迈出重要步伐。"
 ENG_auxiliary_royal_navy: "皇家海军辅助舰队"
 ENG_auxiliary_royal_navy_desc: "历史上，辅助皇家海军是指在冲突或危机时期，为支援和补充皇家海军行动而由平民船员操作的船只。"
 ENG_revitalise_merchant_navy: "振兴商船队"
 ENG_revitalise_merchant_navy_desc: ""
 ENG_bay_slass_landing_ships: "海湾级登陆舰"
 ENG_bay_slass_landing_ships_desc: "海湾级登陆舰是多功能两栖舰艇，旨在支持包括人道主义援助、灾害救援及两栖突击任务在内的多种军事行动。该型舰艇拥有大型飞行甲板与井型甲板，可用于投放和回收登陆艇及两栖作战车辆。"
 ENG_river_class_patrol_boat: "江河级巡逻艇"
 ENG_river_class_patrol_boat_desc: "江河级巡逻艇作为多功能近海巡逻舰，广泛用于海上安全、边境防护及执法任务。凭借先进的监视与通信系统，这些巡逻艇能高效巡航沿海水域，有力捍卫领土完整与海洋权益。该级舰艇以持久续航和灵活部署为设计核心，在强化英国水域乃至全球范围内的海上安全、维护海洋法律秩序方面发挥着关键作用。"
 ENG_point_class_sealift_ships: "点级海运舰"
 ENG_point_class_sealift_ships_desc: "\"点\"级海运船是皇家辅助舰队的重要资产，专为运输军事物资与装备以支持远征行动而设计。这些滚装船具备多功能货物处理能力，可在不同港口及海洋环境中高效装卸车辆与补给物资。凭借其战略投送能力，\"点\"级舰船显著提升了英国的后勤保障水平，在和平时期与冲突场景下均能实现军事力量与装备的快速部署。"
 ENG_bae_cv90_MkIV: "BAE CV90 Mk IV"
 ENG_bae_cv90_MkIV_desc: "贝宜CV90 Mk IV是CV90步兵战车的升级版本，集成了现代战争所需的前沿技术与改进。该车型在机动性、生存能力和火力方面均有显著提升，使其成为装甲步兵单位在战场上的强大作战资产。"
 ENG_expand_sandhurst_academy: "扩建桑德赫斯特学院"
 ENG_expand_sandhurst_academy_desc: "桑德赫斯特皇家军事学院（RMAS）是世界顶尖军事训练机构之一，以其严格的课程体系和培养卓越军事领导者的坚定承诺而闻名。学院成立于1802年，不仅是英国陆军的主要军官培训基地，也为多个国际盟友及合作伙伴提供军事教育。"
 ENG_soldier_welfare_initiative: "士兵福利倡议"
 ENG_soldier_welfare_initiative_desc: "通过优先考虑士兵及其家庭的福祉，这一举措彰显了我们致力于表彰他们的奉献与牺牲，同时培育一个支持型、坚韧不拔的军事社区。"
 ENG_mgcs_program: "MGCS计划"
 ENG_mgcs_program_desc: "主地面作战系统（MGCS）是一项旨在为现代战争场景中的地面部队提供先进能力的下一代装甲战车项目。作为德国与法国的合作成果，MGCS致力于开发一款多功能且技术先进的主战坦克，以适应多样化战场环境的高效作战需求。"
 ENG_royal_airforce_modernisation: "皇家空军现代化"
 ENG_royal_airforce_modernisation_desc: "通过皇家空军现代化计划，英国皇家空军重申其承诺，在日益复杂且充满竞争的全球安全环境中，保持空中优势、投射力量并捍卫国家利益。"
 ENG_watchkeeper_wk450: "守望者WK450"
 ENG_watchkeeper_wk450_desc: "\"守望者WK450\"是一款专为情报、监视与侦察任务设计的先进无人机系统。由泰雷兹集团研发的这款中空长航时无人机搭载了多种精密传感器和摄像设备，能够执行实时监控与目标锁定任务。凭借其卓越的续航能力和自主飞行性能，该机型可显著提升军事部队在多样化作战环境中的态势感知能力，并为关键情报收集提供有力支持。"
 ENG_reaper_purchase: "采购“死神”"
 ENG_reaper_purchase_desc: "世界各地的军事力量已装备MQ-9\"死神\"无人机，以增强其情报、监视与侦察能力，并对高价值目标实施精准打击。该机型能在目标区域长时间巡航的特性，配合先进的传感器系统，使其成为获取实时情报与支援地面部队的宝贵资产。"
 ENG_missile_development: "导弹研发"
 ENG_missile_development_desc: "我们需要升级导弹能力，以保持现代化空军的地位。"
 ENG_electronic_warfare_measures: "电子战措施"
 ENG_electronic_warfare_measures_desc: "我们需要现代化计算系统以防范网络攻击。"
 ENG_nato_joint_airforce_training: "北约联合空中训练"
 ENG_nato_joint_airforce_training_desc: "通过模拟场景、实兵演练及联合训练活动，参演空军在空战、对地作战、空中加油及防空等领域不断提升并完善作战能力。这些训练活动增进了盟国空军间的相互理解、信任与合作，确保它们能在多国联军环境中无缝协同作战，有效应对地区乃至全球安全挑战。"
 ENG_c19_globemasters: "C-17环球霸王运输机"
 ENG_c19_globemasters_desc: "C-17环球霸王III型运输机是一款多功能战略空运飞机，被全球各国空军用于执行快速远程运输任务。由波音公司制造的这款重型运输机能够向偏远地区和简陋机场运送包括部队、车辆及人道主义救援物资在内的大型载荷。凭借先进的航电系统、高翼设计以及短距起降能力，C-17环球霸王III型运输机在全球军事行动和人道主义救援中发挥着至关重要的作用。"
 ENG_airbus_a400m: "空中客车A400M"
 ENG_airbus_a400m_desc: "空中客车A400M是一款现代军用运输机，旨在满足全球各空军部队的作战需求。该机型采用上单翼布局和先进的涡轮螺旋桨发动机，具备卓越性能，包括短距起降能力、长航程特性以及能在半整备跑道上起降的能力。"
 ENG_nimrod_mra4: "\"猎迷\"MRA4"
 ENG_nimrod_mra4_desc: "\"猎迷\"MRA4是标志性\"猎迷\"海上巡逻机的现代化版本，旨在为反潜作战、海上监视以及搜救任务提供增强能力。该机型配备先进的传感器、通信系统和任务设备，相比前代机型在性能与多功能性方面均有显著提升。"
 ENG_apache_wah64: "阿古斯塔·韦斯特兰 阿帕奇"
 ENG_apache_wah64_desc: "英国引进并部署奥古斯塔·韦斯特兰阿帕奇直升机，标志着其空中作战武库的重大升级。这款直升机在标准阿帕奇设计基础上进行了多项改进，包括升级版劳斯莱斯发动机、便于存储的折叠旋翼系统、旋翼防冰装置以及增强型火箭弹容量。作为提升国家空中力量的重要装备，这款精密攻击直升机象征着军事航空技术与战略作战效能的飞跃性进步。"
 ENG_boeing_p8_poseidon: "波音P-8海神"
 ENG_boeing_p8_poseidon_desc: "波音P-8\"海神\"是一款多任务海上巡逻机，专为远程反潜作战、反水面作战以及情报、监视和侦察任务而设计。该机型基于波音737客机平台打造，配备先进的传感器、通信系统和武器能力，使其成为执行海上巡逻任务的高效平台。"
 ENG_revive_p125_project: "重启P125项目"
 ENG_revive_p125_project_desc: "重启的P125项目旨在开发一款多功能、高性价比的飞机平台，能够胜任多种任务角色，包括空中优势、近距离空中支援、侦察和训练。通过整合先进的航空电子设备、传感器和武器系统，现代化的P125飞机将提供更强的性能、生存能力和任务执行效率。"
 ENG_joint_strike_fighter_project: "联合攻击战斗机项目"
 ENG_joint_strike_fighter_project_desc: "凭借先进的隐身能力、传感器融合技术以及多任务执行能力，F-35联合攻击战斗机在空对空与空对地作战中提供了无与伦比的战场态势感知能力和致命打击力。"
 ENG_bae_systems_tempest: "BAE系统公司 “风暴”"
 ENG_bae_systems_tempest_desc: "贝宜系统公司的\"风暴\"是一款尖端的第六代战斗机概念机，旨在满足现代空战的不断演变需求。该机型集先进隐身技术、传感器融合能力及自主系统于一身，致力于在复杂空域环境中提供卓越的性能、生存能力和杀伤力。"
 ENG_defence_industrial_policy: "国防工业政策"
 ENG_defence_industrial_policy_desc: "英国国防工业政策概述了指导国家国防工业基础发展、管理与可持续性的战略框架。凭借悠久的创新传统和卓越成就，英国国防工业在支持国家安全目标、促进经济繁荣以及维护全球技术领导地位方面发挥着关键作用。"
 ENG_return_our_national_champions: "国家冠军回归"
 ENG_return_our_national_champions_desc: "国防工业回归国家冠军企业，体现了英国在日益复杂和充满竞争的安全环境中，加强国家主权、促进经济韧性以及确保英国武装部队的战备状态和作战效能方面的战略调整。"
 ENG_industry_partnerships: "工业伙伴"
 ENG_industry_partnerships_desc: "向被认定为国家冠军的关键国防企业提供有针对性的资金和支持，以促进研发、扩大生产能力和增强竞争力。"
 ENG_maintaining_selective_competition: "维持选择性竞争"
 ENG_maintaining_selective_competition_desc: "我们只想要最好的。通过严格的竞争机制来确保这一原则得到贯彻执行。"
 ENG_mandated_non_competitive_supply: "强制性非竞争性供应"
 ENG_mandated_non_competitive_supply_desc: "我们需要本地的冠军选手提供装备，而无需举办新的比赛。"
 ENG_mod_industry_code_of_practice: "国防部工业行为准则"
 ENG_mod_industry_code_of_practice_desc: ""
 ENG_european_defence_industry_framework: "欧洲国防工业框架"
 ENG_european_defence_industry_framework_desc: "欧洲国防工业框架概述了欧盟成员国之间的合作方式，旨在增强国防能力、促进工业合作，并推动欧洲国防领域的技术创新。"
 ENG_trans_atlantic_defence_buisness: "跨大西洋防务业务"
 ENG_trans_atlantic_defence_buisness_desc: "跨大西洋防务商业计划代表着大西洋两岸国防工业和政府机构之间的战略合作。该计划旨在促进北美和欧洲国家之间的伙伴关系、贸易往来，并加强在国防领域的合作。"
 ENG_focusing_on_research_and_development: "专注于研发"
 ENG_focusing_on_research_and_development_desc: "我们需要重点关注士兵的新装备。"
 ENG_mod_continuing_the_competitive_marketplace: "竞争激烈的市场"
 ENG_mod_continuing_the_competitive_marketplace_desc: ""
 ENG_investing_in_our_partners: "投资我们的合作伙伴"
 ENG_investing_in_our_partners_desc: "我们再也无法重现昔日的军工生产强国地位。与其如此，不如投资于能够满足我们需求的合作伙伴。"
 ENG_streamlining_our_industry: "精简我们的工业"
 ENG_streamlining_our_industry_desc: "我们的合作伙伴要求我们简化行业流程，以帮助他们开发我们需要的设备。"
 ENG_british_overseas_territories: "英国海外领土"
 ENG_british_overseas_territories_desc: "英国海外领土涵盖了散布在全球各地的众多地区和司法管辖区，每个地区都拥有独特的文化、地理和政治特征。这些领土包括直布罗陀、百慕大和开曼群岛等标志性地点，它们与英国保持着紧密的联系，同时享有不同程度的自治权和自主权。"
 ENG_cayman_enterprise_city: "开曼企业城"
 ENG_cayman_enterprise_city_desc: "开曼企业城是开曼群岛的一个经济特区，为国际企业在免税管辖区设立实体机构提供了一个独特的平台。凭借简化的流程和优惠政策，它为科技、生物科技和媒体等行业的公司提供了有利的发展环境。"
 ENG_illex_fishery: "伊莱克斯渔业"
 ENG_illex_fishery_desc: "伊莱克斯渔业是福克兰群岛经济的重要组成部分，其主要目标是可持续地捕捞伊莱克斯鱿鱼。该渔业经过精心管理，确保长期可持续发展，不仅支撑着当地居民的生计，也为该地区的粮食安全和经济稳定做出了贡献。"
 ENG_north_mole_power_plant: "北莫尔发电厂"
 ENG_north_mole_power_plant_desc: "位于直布罗陀的北莫尔发电厂在满足该地区的能源需求方面发挥着至关重要的作用。该发电厂配备了现代化的技术和基础设施，提供可靠的电力供应，为直布罗陀居民和企业的日常生活和经济活动提供支持。"
 ENG_biras_creek_resort: "比拉斯溪度假村"
 ENG_biras_creek_resort_desc: "比拉斯溪度假村坐落于英属维尔京群岛，在令人叹为观止的自然美景中提供奢华的度假体验。度假村以其僻静的海滩、高档的住宿和个性化的服务而闻名，为寻求在热带天堂放松身心、焕发活力的旅行者提供了一处理想的世外桃源。"
 ENG_bermuda_innovation_sprint: "百慕大创新冲刺"
 ENG_bermuda_innovation_sprint_desc: "百慕大创新冲刺计划旨在促进岛上的创新和创业精神。该计划通过加速器项目、导师指导和资金支持，帮助初创企业和科技公司开发创新解决方案，并推动百慕大的经济增长。"
 ENG_princes_lodge_plantation: "普林斯庄园种植园"
 ENG_princes_lodge_plantation_desc: "普林斯庄园是圣赫勒拿岛上的一处历史悠久的庄园，展现了该岛丰富的文化遗产和农业传统。庄园风景如画，保存完好的殖民时期建筑让游客得以一窥岛屿的过去，同时也为文化旅游和当地遗产保护做出了贡献。"
 ENG_beaches_turks_caicos: "特克斯和凯科斯海滩"
 ENG_beaches_turks_caicos_desc: "特克斯和凯科斯群岛海滩度假村是一家豪华全包式度假村，以其原始海滩、高端设施和适合家庭的氛围而闻名。度假村提供丰富多彩的活动和娱乐选择，为各个年龄段的宾客在特克斯和凯科斯群岛打造难忘的假期体验。"
 ENG_little_bay_port_development_project: "利特湾港口开发项目"
 ENG_little_bay_port_development_project_desc: "利特湾港口开发项目旨在通过在小湾建设一座现代化港口设施，提升蒙特塞拉特的基础设施和经济前景。该项目旨在通过改善运输和物流能力，促进岛上的贸易、旅游和投资发展。"
 ENG_pitcairn_islands_study_center: "皮特凯恩群岛研究中心"
 ENG_pitcairn_islands_study_center_desc: "皮特凯恩群岛研究中心是一个致力于研究和保护皮特凯恩群岛历史、文化和生物多样性的研究机构。它通过其档案、出版物和教育项目，提高人们对这些偏远而独特的地区的认识和欣赏。"
 ENG_share_vtol_research: "分享垂直起降飞行器研究"
 ENG_share_vtol_research_desc: "共享垂直起降飞行器研究计划涉及行业利益相关者和研究机构之间的合作和知识共享举措，旨在推进垂直起降技术的发展。"
 ENG_channel_homegrown_innovation: "渠道本土创新"
 ENG_channel_homegrown_innovation_desc: "通过扶持本土初创企业、研究机构和小企业，该机构致力于推动尖端技术和解决方案的研发，以应对行业面临的关键挑战和机遇。通过合作、资金支持和生态系统建设，该机构旨在将英国打造成为航空创新领域的全球领导者，从而促进经济增长和提升竞争力。"
 ENG_revive_british_aviation_industry: "重振英国航空业"
 ENG_revive_british_aviation_industry_desc: "通过促进投资、创新和技能发展，力求重振国内生产能力，增强供应链韧性，并在全国范围内创造高质量的就业机会。"
 ENG_focus_on_component_manufacturing: "专注于零部件制造"
 ENG_focus_on_component_manufacturing_desc: "通过投资先进制造技术、员工培训和供应链韧性措施，该公司旨在提升其在全球航空航天市场的价值和竞争力。通过与原始设备制造商、一级供应商和研究机构的合作，该公司致力于促进整个航空航天零部件生态系统的创新、效率和质量。"
 ENG_us_uk_collaboration: "美国-英国合作"
 ENG_us_uk_collaboration_desc: "美国一直在寻找优秀的合作伙伴。通过与英国航空项目合作，我们可以共同获得更多资金，并向他们提供一些我们的创新成果。"
 ENG_skylon_engine: "云霄塔引擎"
 ENG_skylon_engine_desc: "云霄塔引擎代表了英国航空航天业的一项突破性举措，专注于开发下一代推进系统。该项目通过先进的工程技术、材料科学和计算建模，旨在设计和制造具有卓越效率、可靠性和可持续性的高性能喷气发动机。"
 ENG_rebirthing_black_arrow: "黑箭重生"
 ENG_rebirthing_black_arrow_desc: "“黑箭重生”计划旨在纪念英国历史悠久的航天运载火箭项目 - 黑箭计划。该计划旨在通过发展先进的发射能力和卫星技术，重振和革新英国的太空探索精神。"
 ENG_invest_bae_international: "投资贝宜国际"
 ENG_invest_bae_international_desc: "贝宜是我们最大的军事组织。有了资金，我们可以扩大其在英国以外的业务，以提升其能力。"
 ENG_lightweight_fire_platform_artillery: "轻型火力平台炮兵"
 ENG_lightweight_fire_platform_artillery_desc: "轻型火力平台炮兵项目旨在研发和部署一种多功能、机动性强的火炮系统，该系统针对快速部署和精确火力支援进行了优化。通过采用轻质材料、模块化设计原则和先进的火控系统，该项目力求提升炮兵部队在各种作战环境中的机动性、响应速度和杀伤力。"
 ENG_harpoon_replacement: "鱼叉替换件"
 ENG_harpoon_replacement_desc: "“鱼叉”导弹替换计划旨在研发新一代反舰导弹系统，以取代英国军火库中老旧的“鱼叉”导弹。该计划通过运用先进的制导、推进和目标瞄准技术，旨在提升海军在海上环境中打击水面目标的射程、精度和杀伤力。"
 ENG_codify_service_economy: "服务型经济成文化"
 ENG_codify_service_economy_desc: "几十年来，英国的经济模式逐渐向服务业主导型转变。金融、咨询和媒体行业填补了工厂倒闭留下的空白。现在是时候将这种转变明确化为一项战略了。"
 ENG_gate_burton_energy: "建设盖特伯顿能源公园"
 ENG_gate_burton_energy_desc: "盖特伯顿能源园将把林肯郡盖特伯顿附近的农田改造成一个大型太阳能和电池储能基地，向国家电网输送清洁电力，并帮助取代老旧的煤炭和天然气发电设施。"
 ENG_gate_burton_energy_tt: "增加§G§!§Y储能园区§!"
 ENG_ai_white_collar: "AI在白领工作中的应用"
 ENG_ai_white_collar_desc: "从律师事务所到会计师事务所，AI系统开始处理日常分析和文档工作。工作岗位减少，利润率上升。"
 ENG_empower_city_london: "强化伦敦金融城"
 ENG_empower_city_london_desc: "通过放宽规划规则并支持在金融城兴建新大楼，我们鼓励银行和服务公司扩大业务规模。伦敦金融城的全新甲级写字楼将加速拔地而起，巩固伦敦作为全球金融中心的地位。"
 ENG_empower_edinburgh: "强化爱丁堡金融区"
 ENG_empower_edinburgh_desc: "通过支持新城和交易所区周边新建甲级写字楼和基础设施，我们帮助爱丁堡的银行和资产管理公司扩大业务范围，从而巩固伦敦以外英国第二大金融中心的地位。"
 ENG_found_invest_northern_ireland: "成立北爱尔兰投资发展局"
 ENG_found_invest_northern_ireland_desc: "我们成立了北爱尔兰投资局，旨在向海外推广该地区，并吸引源源不断的新工厂、办公室和船坞。"
 ENG_digital_government: "大搞数字政府改革"
 ENG_digital_government_desc: "我们将公共服务、税收、许可证发放、福利发放等流程数字化，从而减少文书工作并降低成本。"
 ENG_invest_silicon_glenn: "投资硅谷"
 ENG_invest_silicon_glenn_desc: "我们将资金投入苏格兰的硅谷，扩建实验室和科技园区，以加快计算机、互联网和人工智能领域的研究。"
 ENG_cross_border_cooperation: "跨境合作"
 ENG_cross_border_cooperation_desc: "我们深化北爱尔兰与爱尔兰之间的务实合作，减少繁文缛节，促进跨境贸易和影响力。"
 ENG_national_data_infrastructure: "国家数据基础设施"
 ENG_national_data_infrastructure_desc: "我们在全国范围内推广光纤、数据中心和骨干网络，以加快数字连接速度，扩大供应范围，并提高整个经济的生产力。"
 ENG_admiral_group: "与安美惠尔集团合作"
 ENG_admiral_group_desc: "我们与卡迪夫的安美惠尔集团合作，扩大私人保险覆盖范围，以减轻福利和医疗保健预算的压力。"
 ENG_fintech_open_banking: "金融科技与开放银行中心"
 ENG_fintech_open_banking_desc: "我们将英国打造成为领先的金融科技和开放银行中心，在提高企业税收的同时降低政府借贷成本。"
 ENG_global_consulting_state: "全球咨询之国"
 ENG_global_consulting_state_desc: "我们为全球的英国咨询公司和律师事务所提供支持，扩大我们的影响力，深化研究联系，并吸引更多外国投资。"
 ENG_lean_manufacturing: "精益生产"
 ENG_lean_manufacturing_desc: "通过在工厂推广机器人、传感器和准时制工作流程，我们用自动化生产线取代了重复性的人工操作。工厂耗电量增加，但所需工人减少，同时产量和效率随着每次生产运行而提高。"
 ENG_cloud_isles: "云之岛"
 ENG_cloud_isles_desc: "我们将英国打造成大型数据中心和云园区的中心。办公楼需要消耗更多电力来支持服务器集群，但它们托管的数字服务却能带来更高的税收收入和更快的研究突破。"
 ENG_algorithmic_finance: "算法金融"
 ENG_algorithmic_finance_desc: "我们部署先进的风险引擎和自动化财务系统来管理现金流、债务和支付，从而减少官僚主义，降低政府的运营成本。"
 ENG_invest_harland_wolff: "投资哈兰德与沃尔夫造船厂"
 ENG_invest_harland_wolff_desc: "我们将新的资金投入到哈兰德·沃尔夫位于贝尔法斯特及其他地区的船厂，重新开放船坞，雇用熟练工人，提高船坞的产量。"
 ENG_critical_minerals_strategy: "关键矿产战略"
 ENG_critical_minerals_strategy_desc: "我们启动了一项国家关键矿产战略，支持康沃尔郡、威尔士及其他地区的新项目，以确保关键矿石的供应，并改善英国获取重要资源的途径。"
 ENG_dogger_bank_offshore_desc: "我们支持北海的多格滩海上风电项目，该项目将建设世界上最大的海上风电场，为数百万英国家庭提供清洁能源。"
 ENG_hinkley_point_c: "完成欣克利角C"
 ENG_hinkley_point_c_desc: "我们推进位于萨默塞特的欣克利角C双反应堆项目，为电网增加超过3GW的长期低碳基荷电力。"
 ENG_acknowledge_industrial_collapse: "承认工业崩溃"
 ENG_acknowledge_industrial_collapse_desc: "从蒂斯河畔的雷德卡到南威尔士的塔尔伯特港，高炉已经熄灭，整个社区失去了工业支柱。我们必须最终承认英国重工业衰落到何种地步，才能重建它。"
 ENG_building_brittain_fit_future: "建设面向未来的英国"
 ENG_building_brittain_fit_future_desc: "我们启动了一项长期产业战略，旨在提高生产力和收入能力，投资于英国各地的创意、人才、基础设施和场所。"
 ENG_northern_powerhouse: "北方动力和中部引擎"
 ENG_northern_powerhouse_desc: "我们将北方经济引擎和中部引擎连接成一个单一的增长走廊，支持交通、技能和商业投资，以提高从利物浦和曼彻斯特经伯明翰到东米德兰兹的生产力。"
 ENG_aerospace_wales: "威尔士航空航天"
 ENG_aerospace_wales_desc: "我们支持以空客布劳顿、圣阿森及更广泛的维修、修理和大修中心为中心的威尔士航空航天集群，促进当地机翼生产、维修工作和高价值航空就业。"
 ENG_marine_power_systems: "支持海洋动力系统"
 ENG_marine_power_systems_desc: "我们支持总部位于威尔士的海洋动力系统公司扩大浮式风能和波浪能平台的规模，将当地的造船厂和港口转变为下一代海洋能源中心。"
 ENG_develop_edinburgh_west_end: "发展爱丁堡西区"
 ENG_develop_edinburgh_west_end_desc: "我们将西区的交易所区升级改造为办公楼、实验室和现代化车间的密集混合体，提高当地的研究产出和生产效率，同时为我们的主要派系提供新的扩张空间。"
 ENG_develop_bae_aerospace: "在苏格兰发展贝宜航空航天公司"
 ENG_develop_bae_aerospace_desc: "我们扩大了贝宜在普雷斯蒂克和其他苏格兰地区的航空航天业务版图，新增了机库、车间和工程团队，以支持先进的战斗机和未来的项目。"
 ENG_glasgow_shipbuilidng: "格拉斯哥造船中心"
 ENG_glasgow_shipbuilidng_desc: "我们对位于戈万和斯科茨顿的克莱德造船厂进行现代化改造，使格拉斯哥成为军舰建造和海军出口的长期中心。"
 ENG_high_value_manufacturing_zones: "高价值工业区"
 ENG_high_value_manufacturing_zones_desc: "我们在弹射型中心和科技园区周围划定高价值制造区，使企业能够更快地获得实验室、技能和现代化设施，从而提高生产力和先进产品。"
 ENG_high_value_manufacturing_zones_tt: "如果一个地区拥有§G5§!§Y$infrastructure$§!，至少§G10§!§Y$industrial_complex$§!，至少§G5§!§Y$offices$§!，以及至少§G5§!§Y$arms_factory$§!或§G5§!§Y$dockyard$§!，我们将为每个地区添加："
 ENG_steel_guarantee: "钢铁保证"
 ENG_steel_guarantee_desc: "我们承诺为低碳钢铁项目提供长期资金和担保，使投资者有信心对工厂进行现代化改造，并确保未来几十年国内钢铁生产的稳定。"
 ENG_steel_guarantee_tt: "§Y[10.GetName]、[11.GetName]、[12.GetName]§!或§Y[1191.GetName]§!将获得：\n超过§Y4个$industrial_complex$§!：§G+6§!§Y$country_resource_steel$§!。\n超过§Y4个$offices$§!：§G+3§!§Y$country_resource_tungsten$§!。\n任何§Y设施§!和§Y$sp_improved_synthetic_diamonds$§!完成：额外§G+3§!§Y$country_resource_chromium$§!。"
 ENG_celsa_steel: "支持卡迪夫塞尔萨钢铁厂"
 ENG_celsa_steel_desc: "我们支持塞尔萨在卡迪夫的电弧钢厂和棒材轧机，提高低碳钢筋和线材的产量，同时保持威尔士一家大型回收企业和雇主满负荷运转。"
 ENG_expand_scottish_steel: "扩建苏格兰钢铁公司"
 ENG_expand_scottish_steel_desc: "我们投资达尔泽尔和克莱德布里奇工厂，以重启钢板生产，确保苏格兰钢铁供应军舰和海上风电项目，并在苏格兰北部建立现代化重型钢铁基地。"
 ENG_refine_natural_bauxite: "精炼天然铝土矿"
 ENG_refine_natural_bauxite_desc: "我们在爱丁堡周边建设氧化铝厂，将进口铝土矿提炼成高等级原料，从而提高苏格兰国内铝产量。"
 ENG_deep_mining_coal: "重振苏格兰深层煤矿开采"
 ENG_deep_mining_coal_desc: "我们重新开采苏格兰老煤田的深层煤层，开凿新竖井并重建矿井基础设施，以恢复苏格兰北部地区的地下煤炭生产。"
 ENG_opencast_mining: "扩大苏格兰露天采矿规模"
 ENG_opencast_mining_desc: "我们在苏格兰煤田发放新的露天矿开采许可证，剥离表土以开采浅层煤层，从而增加国内煤炭供应。"
 ENG_cononish_gold_silver: "康尼什金银制品厂"
 ENG_cononish_gold_silver_desc: "我们支持泰恩德拉姆附近的科诺尼什金矿，将苏格兰唯一的商业金银矿藏变成该国稳定的贵金属来源。"
 ENG_national_productivity_commission: "国家生产力委员会"
 ENG_national_productivity_commission_desc: "我们成立了国家生产力委员会，旨在将投资、基础设施和创新政策围绕一个共同的目标进行协调：提高全英国的生产力。"
 ENG_infrastructure_for_productivty: "国家基础设施战略"
 ENG_infrastructure_for_productivty_desc: "我们实施国家基础设施战略，重点发展公路、铁路和数字网络，以提高生产力而不是阻碍生产力。"
 ENG_universaties_engines_of_growth: "地方优势基金"
 ENG_universaties_engines_of_growth_desc: "我们推出了一项类似“优势地区”的基金，支持英格兰各地的大学与企业合作，将当地的研究优势转化为就业、投资和增长。"
 ENG_hs2: "发起二号高速铁路"
 ENG_hs2_desc: "我们正式批准高速铁路2号线项目，授权建设伦敦至米德兰兹地区的第一阶段工程，并承诺在未来几十年内对新建高速铁路进行投资。"
 ENG_northern_powerhouse_rail: "北方动力铁路"
 ENG_northern_powerhouse_rail_desc: "我们致力于建设北方动力铁路，这是一个全新的、升级后的东西向铁路网，连接利物浦、曼彻斯特、利兹和更广阔的北方地区，提供更快、更频繁的列车以及更大的客货运输能力。"
 ENG_euston_canary_wharf_integration: "将尤斯顿和金丝雀码头整合起来"
 ENG_euston_canary_wharf_integration_desc: "我们将尤斯顿的二号高速铁路终点站与伦敦东西向铁路和地铁网络连接起来，从而与伦敦金融城和金丝雀码头无缝连接，使高速列车乘客能够在几分钟内到达首都的金融区。"
 ENG_midland_main_lines: "米德兰干线升级改造"
 ENG_midland_main_lines_desc: "我们正在推进伦敦和东米德兰兹之间的米德兰干线的升级和电气化改造，以缩短旅程时间，并释放客运和货运能力。"
 ENG_russel_group: "罗素集团大学"
 ENG_russel_group_desc: "我们深化与罗素集团研究型大学的联系，支持联合项目，将世界领先的科学成果转化为全国范围内的增长。"
 ENG_golden_triangle_research: "金三角研究弧"
 ENG_golden_triangle_research_desc: "我们深化牛津、剑桥和伦敦顶尖大学之间的联系，构建一个“黄金三角”研究弧，将世界一流的实验室、人才和资金集中到一个具有高影响力的创新走廊中。"
 ENG_imperial_king_tech_clusters: "帝国与国王科技集群"
 ENG_imperial_king_tech_clusters_desc: "我们将帝国理工学院的白城创新园区与国王学院的科技和医疗保健中心连接起来，构建密集集群，让实验室、初创企业和投资者能够将前沿研究转化为商业突破。"
 ENG_skill_england_technical: "英格兰技能与技术路径"
 ENG_skill_england_technical_desc: "我们与英格兰技能局合作，绘制技能差距图，扩大技术途径和学徒计划，为更多人提供清晰、高质量的技能工作途径。"
 ENG_closing_britains_productivity_gap: "缩小英国的生产力差距"
 ENG_closing_britains_productivity_gap_desc: "经过多年对基础设施、大学和技能的定向投资，我们的生产力差距终于开始缩小，提高了每个工人的产出，并为经济提供了更高的工资和更好的服务的空间。"
 ENG_closing_britains_productivity_gap_tt: "我们可以通过研究§Y$CAT_infrastructure$§!来逆转生产效率惩罚。"
 ENG_ambitions_for_britain: "英国的雄心壮志"
 ENG_ambitions_for_britain_desc: "随着时间的流逝，英国不能任其衰败。英国必须雄心勃勃，而要实现这一目标，英国人民需要工党。凭借坚定的决心，工党将带领英国跃升为当今时代全球最强大的力量之一。新千年将属于我们。"
 ENG_deeper_prosperity: "更深层次的繁荣"
 ENG_deeper_prosperity_desc: "我们将通过创造更多就业机会并激励人民寻求就业机会来实现更深层次的繁荣。而这只有通过创造可持续发展的环境，特别是通过完善的基础设施才能实现。"
 ENG_every_region_of_the_country: "全国所有地区"
 ENG_every_region_of_the_country_desc: "我们的努力不会局限于社会主要中心，而是会优先考虑全国各地。毕竟，我们是一个联盟。如果资源分配不均，国家就会分裂，造成城乡人口严重不平等。"
 ENG_the_foundation: "基础"
 ENG_the_foundation_desc: "国家的基石、支柱和脊梁是辛勤劳作的劳动者，他们为国家奉献了无数时间。在假期、休假和病假方面，推行改革以赋予工作场所更大的灵活性，对于保持这一社会支柱的强大至关重要。"
 ENG_nhs_reform: "国家医疗服务体系改革"
 ENG_nhs_reform_desc: "英国国家医疗服务体系亟需改革。我们追求的不仅仅是表面上的改革，比如新建医院和医疗设施；不，我们更要推动公私部门协同合作，共同改善国家医疗服务体系，从而缩短患者等待时间，升级现有设施，并更及时地接收更多患者。"
 ENG_reinassaince_of_status: "社会地位的复兴"
 ENG_reinassaince_of_status_desc: "我们的人民需要有机会提升社会地位，实现经济进步。因此，我们必须尽早介入他们的人生阶段。通过为高等教育机构提供必要的资源，我们将能够更便捷地为人民提供社会发展所需的资源。"
 ENG_a_grand_promise: "伟大的承诺"
 ENG_a_grand_promise_desc: "为了维持选民对我们党的支持，我们需要做出一个能够打动选民的重大承诺。兑现这一承诺，我们将能够巩固联盟的信誉，并给予反对派沉重打击。"
 ENG_more_frontline_staff: "更多一线员工"
 ENG_more_frontline_staff_desc: "我们需要鼓励更多一线员工重返工作岗位，从而提高农业生产力。通过激励计划，我们将能够重振我国日渐衰落的农业精神。"
 ENG_foster_the_tech_revolution: "推动硅革命"
 ENG_foster_the_tech_revolution_desc: "一场新的革命正在我们眼前悄然展开——硅革命。科技正以前所未有的方式改变着全球经济。曾经的农村和农业社会，如今已借助微芯片和其他电子产品，转型成为一些最强大的经济体。我们也必须尽快抓住这一新趋势带来的机遇。"
 ENG_uplift_traditional_industry: "提升传统产业"
 ENG_uplift_traditional_industry_desc: "我们无需像世界其他地方那样，沉迷于电子产品的潮流。相反，我们可以专注于历史上行之有效的方法 - 脚踏实地的实干。我们为什么要冒险去做那些可能危及经济的琐事呢？"
 ENG_prioritize_the_teachers: "优先考虑教育工作者"
 ENG_prioritize_the_teachers_desc: "明确[ENG.GetAdjective]教育工作者在社会中的角色将带来巨大的益处，其影响将遍及全国乃至整个地区。通过确立教育工作者在普通民众日常生活中的作用，人们最终将开始真正理解教育的意义所在。"
 ENG_prioritize_the_doctors: "优先考虑医生"
 ENG_prioritize_the_doctors_desc: "医生是挽救生命、阻止疾病传播、维护国家整体安全感的关键所在。通过提升医生和医务人员的地位，我们也能鼓励更多人加入英国国家医疗服务体系，填补目前严重人手不足的岗位。"
 ENG_strengthening_communities: "加强社区建设"
 ENG_strengthening_communities_desc: "加强社区建设，进而增强英国民族认同感，将有助于我们培养更强的民族团结意识。这将使我们能够在更有效地促进社会凝聚力的同时，保护我们最珍视的价值观。"
 ENG_to_europa_and_beyond: "前往欧罗巴及更远的地方！"
 ENG_to_europa_and_beyond_desc: "我们首先是欧洲人，其次才是英国人。忘记我们的区域家园，就是忘记我们是谁。我们必须与欧洲大陆和整个欧盟进行更深层次的融合，以便支持全体欧洲人民的宏伟愿景。"
 ENG_no_one_left_behind: "不让任何人掉队"
 ENG_no_one_left_behind_desc: "在迈向辉煌的征程中，我们不会让任何一个英国人掉队。每个人都将得到帮助，共同迈向社会发展的终点线，我们将携手共进，克服这场通往成功的伟大挑战。"
 ENG_criminal_justice_reform: "刑事司法改革"
 ENG_criminal_justice_reform_desc: "加强司法体系反过来也会巩固我们长期以来的民主规范。通过简化司法程序，民众对民主制度的信任度将会提升，对政府的长期支持也更有可能建立起来。"
 ENG_welfare_reform: "福利改革"
 ENG_welfare_reform_desc: "只有改革福利制度，才能与选民建立起可信赖的关系。通过展现我们对他们日常生活的关心，我们就能给他们提供十几个理由，让他们继续投票支持我们。"
 ENG_tax_reform: "税制改革"
 ENG_tax_reform_desc: "§R'等等……我的钱去哪儿了？！'§!\n\n通过税收改革，不仅能够提振经济和财政，还能为我们的社会改革项目筹集资金。尽管这可能会引起部分纳税人的不满。"
 ENG_productivity_challenge: "生产力挑战"
 ENG_productivity_challenge_desc: "我们发现越来越难以让一些员工正常工作。通过推行一些变革，我们或许能够促使他们重新投入到生产性工作中。"
 ENG_britain_forward_not_back: "英国向前走，莫回头"
 ENG_britain_forward_not_back_desc: "我们只需展望前方，便能看清前进的方向；若不能掌控自己的未来，命运便将交由天意摆布。这绝非我们所愿。我们要引领国家走向辉煌，而实现这一目标的前提，正是确立当下必须完成的首要任务。"
 ENG_competition_planning_and_regulation: "竞争规划与监管"
 ENG_competition_planning_and_regulation_desc: "没有监管就没有公平竞争。若缺乏适当的护栏，企业便会偏离正轨，吞并小型企业，实质上将剥夺成千上万乃至数百万人的收入来源。"
 ENG_new_rights_new_choices: "新权利，新选择"
 ENG_new_rights_new_choices_desc: "通过赋予民众更多选择工作时间的权利，我们将能够提升全国的生产力。目前，某些工作场所限制未达退休年龄的人员就业，而达到退休年龄的人正被逐渐边缘化。通过让超过退休门槛的人群重新获得工作机会，我们将实现更稳定的经济发展。"
 ENG_supporting_science: "支持科学"
 ENG_supporting_science_desc: "通过支持新的科学发掘方法，我们将能够增强国内研究项目的供给能力，并在国际舞台上提升更多商品的出口实力。"
 ENG_codify_key_of_convetions: "“宪法惯例”法典化"
 ENG_codify_key_of_convetions_desc: "通过最终将诸“宪法惯例”法典化，我们将把政治规则转变为法律规则。我们的政治将不再由传统主导，而是由法律来规范，借此我们将能进一步推进民主进程。"
 ENG_generations_of_tomorrow: "明日世代"
 ENG_generations_of_tomorrow_desc: "改革养老金制度将最终使我们能够为当代及子孙后代建立起坚实的社会保障网。当前许多人领取的津贴过低甚至完全没有，现在是时候采取行动解决这个问题了。"
 ENG_fostering_entrepreneurship: "鼓励创业精神"
 ENG_fostering_entrepreneurship_desc: "我们希望创新者能涌入我国，为此，我们需要开始投入部分政府资金，为那些愿意投资的人创造一个可持续的环境，让他们能够顺利进入。"
 ENG_modern_transport_infrastructure: "现代化交通基础设施"
 ENG_modern_transport_infrastructure_desc: "如果我们的道路全都乱七八糟、破败不堪，开车又有什么用呢？投资于创新性的基础设施项目，将为建设一个更美好、更高效的英国铺平道路。"
 ENG_thriving_rural_scene: "繁荣的乡村"
 ENG_thriving_rural_scene_desc: "我们的乡村聚落不能任由历史的风吹雨打而被遗忘。相反，我们将拥抱这些乡村地区，并进一步鼓励它们的活动。"
 ENG_scraping_the_skies: "直冲云霄"
 ENG_scraping_the_skies_desc: "若要在国际舞台上树立我们的形象，我们得建造一些摩天大厦，尤其是那些宏伟到足以令世界惊叹的巨塔。"
 ENG_creative_cities: "创意城市"
 ENG_creative_cities_desc: "通过培育文化影响力来设计新的城市地标，我们将为提升人民的精神与士气创造理想条件，无论他们身处何方。"
 ENG_party_of_pensior_poverty: "养老金贫困党"
 ENG_party_of_pensior_poverty_desc: "保守党，或称我们口中的“养老金贫困党”，正在损害我们福利体系的完整性，并积极破坏那些依赖养老金维持生计者的生活。我们必须采取行动，确保民众认识到他们这种倒退的做法。"
 ENG_fostering_home_ownership: "促进住房自有"
 ENG_fostering_home_ownership_desc: "与其鼓励人们依赖政府资金生活，不如帮助他们为自己和家人购置家园。这样一来，他们便能安心居住，不必担心所居之地非己所有。"
 ENG_social_housing: "社会住房计划"
 ENG_social_housing_desc: "现实一点吧，房价已经开始飙升，而且丝毫没有停下来的迹象。我们必须大力推进社会住房计划，确保我们的选民有房可住，免受风吹雨打。"
 ENG_copyright_in_a_digital_age: "数字时代的版权"
 ENG_copyright_in_a_digital_age_desc: "我国现行的版权法规尚不完善，许多条款存在缺失或表述模糊。我们必须系统性地编纂相关法规，为媒体行业提供更有力的法律保障。"
 ENG_strengthening_our_grids: "强化电网"
 ENG_strengthening_our_grids_desc: "我们的人民需要强大、可靠且稳定的能源来维持日常生活。偶尔的停电在所难免，但不应该成为日常。通过加强我们的主要电网，我们将确保能源部门的可靠性。"
 ENG_strengthen_pension_credit: "加强养老金信贷"
 ENG_strengthen_pension_credit_desc: "通过向达到国家养老金年龄的低收入人群提供政府福利选项，我们将能够把他们的周收入提升至最低标准，并帮助支付住房费用及其他开销。"
 ENG_the_workers_of_yesterday: "昨日的工人"
 ENG_the_workers_of_yesterday_desc: "我们不能让昨日的辛勤劳动付诸东流，我们将为退休人员增加养老金计划，如果他们决定将专业知识传授给新一代，甚至可能提供更多福利。"
 ENG_tenant_regulation: "租房条例"
 ENG_tenant_regulation_desc: "我们绝不能抛弃那些出租房产的房主。房产必须得到尊重，因此，制定法规是确保各方满意的必要因素。"
 ENG_a_future_fair_for_all: "全民共享的美好未来"
 ENG_a_future_fair_for_all_desc: "随着世界的发展，人们的生活条件似乎却在不断恶化。在新千年的曙光带来的短暂兴奋之后，满怀希望的世界人民曾相信他们的政府终将改弦更张。然而事实并非如此。民主倒退、成本上升以及普遍的混乱使世界偏离了正轨。我们必须竭尽全力，确保联合王国不会坠入这种死亡螺旋。"
 ENG_crime_and_immigration: "犯罪与移民"
 ENG_crime_and_immigration_desc: "右翼人士呼吁加强对移民的限制。虽然我们理解他们的出发点，但若屈从于他们的要求，就意味着背离我们党的核心原则，走向更保守的方向。"
 ENG_democratic_reform: "推进民主改革"
 ENG_democratic_reform_desc: "当前，地区层面确实存在一些漏洞，使得更专制的决策得以通过。是时候我们亲自动手，向议会提交一项法案，迫使那些从这种政治模糊性中获益的人就范了。"
 ENG_a_global_future: "全球未来"
 ENG_a_global_future_desc: "我们不能只专注于国家事务，还必须关注全球事务。在考虑他国主权的前提下，我们将致力于在全球范围内扩大[ENG.GetAdjective]影响力。"
 ENG_national_renewal: "民族复兴"
 ENG_national_renewal_desc: "[ENG.GetAdjective]政治格局的重新定位引发了一场全国性的复兴运动，民众持续要求变革。我们不会停歇，也不会止步，只会继续推动变革——当然是好的变革。"
 ENG_with_open_arms: "敞开怀抱"
 ENG_with_open_arms_desc: "我们必须认识到移民的重要性。无论我们是否敞开怀抱，如果继续将他们拒之门外，我们将错失一些原本无法获得的顶尖人才。"
 ENG_community_payback: "社区回馈计划"
 ENG_community_payback_desc: "社区回馈计划旨在让社区自行决定应如何惩罚罪犯。这可以包括服刑时间的长短或社区服务的类型。一切都将由地方社区决定，但整个国家都将从中受益。"
 ENG_checks_on_migration: "审查移民"
 ENG_checks_on_migration_desc: "无论我们多么需要移民，也不能毫无筛选地让他们入境。我们将对移民建立一些审查机制，以确保他们确实没有恶意。"
 ENG_australian_style_point_system: "澳式积分制"
 ENG_australian_style_point_system_desc: "效仿澳大利亚朋友的做法，我们将建立积分制移民体系，根据移民的技能及其为国家做贡献的能力来决定是否接纳。"
 ENG_tough_on_anti_social_behavior: "严打反社会行为"
 ENG_tough_on_anti_social_behavior_desc: "我们需要激励人民去工作。整天待在家里无所事事可不行。通过允许年轻人在警察和军队中实习，特别是在国防工业领域，我们将能够促使他们投入工作。"
 ENG_renewed_police_budget: "新订警务预算"
 ENG_renewed_police_budget_desc: "我们的警察队伍绝不能资金不足，我们必须认识到一支强大、有力的警察力量对于确保社区安全至关重要。"
 ENG_established_refugee_programs: "建立难民安置计划"
 ENG_established_refugee_programs_desc: "如果没有一个妥善的难民安置计划，那些逃离家园的人们将一无所有地来到我们这里。我们将制定一个全面的计划，让难民融入社会，并让他们为国家的经济发展贡献力量。"
 ENG_streamlined_citizenship_process: "简化入籍流程"
 ENG_streamlined_citizenship_process_desc: "开门见山地说，在获取公民身份时设置额外障碍并无必要。长远来看，允许更快速的融合对所有人都会更加有利。"
 ENG_neighbourhood_police_teams: "邻里警务团队"
 ENG_neighbourhood_police_teams_desc: "与其增加治安成本，不如反其道而行。通过号召社区组建治安团队，我们能够将司法权下放至恰到好处的程度——既能确保犯罪行为得以上报给相应机构处理，又无需让巡逻单位同时覆盖所有区域。"
 ENG_cctv_reduce_fear: "监控消除恐惧"
 ENG_cctv_reduce_fear_desc: "公共场所的摄像头是维护国家和公民安全的重要组成部分。如果民众知道罪犯会被抓获，他们就能保持安心，而罪犯在犯罪前也会三思而行。"
 ENG_britain_can_be_better: "英国会更好"
 ENG_britain_can_be_better_desc: "通过适当的变革与改革，英国可以变得更好。这并不是说现在的英国不好，而是总有改进的空间。英国人民已经将领导英国进行改革的重任托付给了我们工党。我们不能让他们失望，必须竭尽全力确保他们的声音被倾听。"
 ENG_more_power_to_people: "更多权力赋人民"
 ENG_more_power_to_people_desc: "政府的权力必须掌握在人民手中。毕竟，政治家本就来自人民。我们绝不能让政治王朝崛起并掌控一切。"
 ENG_westminster_reinforced: "强化威斯敏斯特"
 ENG_westminster_reinforced_desc: "有时民众并不清楚自己真正需要什么。在这种情况下，政府必须加强介入，让政治专家出面为他们做出决策。"
 ENG_further_digital_governance: "进一步数字化治理"
 ENG_further_digital_governance_desc: "人民应当能够更自由地与政府互动。互联网是实现这一目标的完美工具，通过允许民众在数字空间中访问政府资源，我们能够毫无障碍地进一步提升治理能力。"
 ENG_a_union_of_nations: "民族联盟"
 ENG_a_union_of_nations_desc: "英国并非单一民族国家，而是多民族联合体。我们将确保每个民族都能获得准确代表，这要通过我们为其提供经济机遇的能力来实现。"
 ENG_reconsider_the_lobbying_act: "重新审议《游说法案》"
 ENG_reconsider_the_lobbying_act_desc: "《游说法》常被指责极大地提升了政府透明度，因为它要求游说团体公开资金来源、限制其支出额度等。然而，这也影响了我们的活动，因此有人呼吁重新审视这项法案。"
 ENG_people_led_constitutional_convention: "人民主导的代表大会"
 ENG_people_led_constitutional_convention_desc: "我们将号召人民领导制宪会议，以多元取代单一。通过人民的投票，他们对我们的信心将永远得到保障。"
 ENG_corporaet_led_constitutional_convention: "企业主导的代表大会"
 ENG_corporaet_led_constitutional_convention_desc: "企业最清楚什么对英国最有利。因此，我们必须优先考虑他们的利益，让他们来领导国家，毕竟他们才是掌握财富的人。"
 ENG_revised_town_laws: "修订城镇法令"
 ENG_revised_town_laws_desc: "一些城镇法规仍保留着相当过时的规章制度。我们最好开始着手清理这些，尤其是其中某些规定已经对某些行业的活动造成了干扰。"
 ENG_replacing_the_house_of_lords: "废除上议院"
 ENG_replacing_the_house_of_lords_desc: "上议院是世界上最古老的机构之一，却也最为落后。他们不断干预议会事务，使得法案通过变得困难重重，必须采取行动加以应对。"
 ENG_ulift_peerages: "提升贵族爵位"
 ENG_ulift_peerages_desc: "防止英国背离其传统的第一步，是提升贵族爵位。有了爵位制度，我们就能守护传统与宫廷文化。"
 ENG_abolish_life_peerages: "废除终身贵族"
 ENG_abolish_life_peerages_desc: "爵位并非选举产生，它们完全基于世袭或任命。爵位制度毫无民主可言，废除它们将极大削弱贵族的影响力。"
 ENG_common_expertise: "人民的智慧"
 ENG_common_expertise_desc: "我们需要的是普通人的智慧，而非企业、政客或外国人的意见。我们需要来自平民阶层的真实民众来引领国家，推动它走向更光明、更美好的未来。"
 ENG_technocratic_expertise: "专家的智慧"
 ENG_technocratic_expertise_desc: "那些证明了自己价值的人几乎总是富有且受过良好教育。将他们的专业知识引入政府，将使英国的进步速度提升十倍。"
 ENG_labour_for_workers_and_ceos_alike: "工党：工人和老板，我们都照顾"
 ENG_labour_for_workers_and_ceos_alike_desc: "我们需要避免疏远首席执行官和社会上层人士。相反，我们应该安抚他们，努力通过谈判和妥协来达成更好的劳动法规。"
 ENG_the_queens_family: "女王家族"
 ENG_the_queens_family_desc: "君主的强大不仅在于法律或传统，更在于国家面临压力时站在她身后的那个核心圈层。受邀进入女王核心圈层者将以她的名义行使影响力，但切不可将亲近误认为权力。王权是唯一恒常的存在，而女王将决定她的家族如何为之效力。"
 ENG_the_prince_trust: "王子信托基金"
 ENG_the_prince_trust_desc: "王权之所以能延续，是因为它懂得适应。在众多工具中，王储信托基金被证明是最为实用的之一。通过扩大其覆盖范围，我们将王室的支持转化为可衡量的机遇、培训、学徒计划，以及为那些被社会遗忘的人提供重返社会的阶梯。这是一种能产生实际成果的软实力，它在最重要的地方——普通英国民众的生活中——巩固了君主制。"
 ENG_harmony_doctrine: "谐律主义"
 ENG_harmony_doctrine_desc: "在这个两极分化的时代，君主的权威在于其能够凝聚人心而非统治。我们将推行谐律主义理念，在政府、产业、信仰团体和公民社会之间进行温和斡旋，以减少分裂并重建国家凝聚力。国家可以号令天下，但唯有王权能够弥合裂痕。"
 ENG_climate_alarm_bell: "敲响气候警钟"
 ENG_climate_alarm_bell_desc: "警告已不再是理论上的空谈，拖延现在意味着国家要付出代价。我们将利用王储的影响力平台，将气候风险强制纳入每一项议程——从能源安全到粮食韧性，再到基础设施规划。当王室明确表态时，连最不情愿的政府部门也不得不侧耳倾听。"
 ENG_duchy_originals: "公爵原产"
 ENG_duchy_originals_desc: "公国不止是传统；它可以证明现代管理是有利可图的。我们将扩展\"公爵原产\"品牌，将其打造为可持续生产、道德供应链和乡村企业的典范，在保持社区活力的同时避免掏空其根基。如果王室必须树立榜样，那就让它成为一个能自负盈亏的榜样。"
 ENG_heir_of_the_realm: "王国继承人"
 ENG_heir_of_the_realm_desc: "伊丽莎白女王的统治定义了一个时代，但王国必须始终着眼于未来。我们将正式确立王储的国家角色，提升其公众能见度，深化其接触国家情报的权限，并使其在整个英联邦内拥有更明确的存在感。延续性并非理所当然，而是需要精心筹备。"
 ENG_naval_prince: "海军王子"
 ENG_naval_prince_desc: "皇家服役并非作秀，而是身着戎装赢得的公信力象征。我们将把约克公爵的海军身份置于礼仪与征兵工作的核心，以此巩固王室与舰队之间的纽带。在变幻莫测的时代洪流中，恪尽职守的象征依然能稳定国家航向。"
 ENG_naval_prince_tt: "解锁§Y军事最高指挥部§!中的§Y$ENG_prince_andrew_leader_name$§!"
 ENG_appoint_trade_representative: "任命皇家贸易代表"
 ENG_appoint_trade_representative_desc: "英国的影响力在政府授权与王室威望的双重加持下最能远播四方。我们将任命一位皇家贸易代表，以打开市场大门、稳固伙伴关系，并为出口商在谈判中提供一位备受瞩目的代言人。在大臣们讨价还价之处，王室可赋予权威加持。"
 ENG_emerging_markets_circuit: "巡回新兴市场"
 ENG_emerging_markets_circuit_desc: "世界格局正在演变，英国绝不能成为迟到的客人。我们将启动新兴市场巡回访问、投资论坛与战略推介计划，旨在让英国企业牢牢扎根于下一轮全球需求浪潮之中。目标很明确：先建立关系，后发挥影响力。"
 ENG_digital_enterprise_patronage: "数字企业扶持政策"
 ENG_digital_enterprise_patronage_desc: "贸易正日益以代码而非货物形式书写。我们将运用王室赞助来提升英国的数字化企业、金融科技、网络安全、高端服务以及推动这些领域发展的初创企业，将声望转化为投资，将投资转化为就业。如果王室能够现代化，经济亦能如此。"
 ENG_duty_of_the_crown: "王冠之责"
 ENG_duty_of_the_crown_desc: "王室头衔并非护身符，而是责任担当。我们将围绕可见的奉献、克制的代表行为以及足以证明该制度在国家生活中地位的成果，来塑造公爵的公共形象。在君主制中，唯有责任是永不贬值的货币。"
 ENG_workhorse_of_the_crown: "王国的中坚力量"
 ENG_workhorse_of_the_crown_desc: "君主制的存续不仅依靠盛大的场面，更依赖于持续不懈、可见的服务。我们将提升长公主殿下的责任典范——紧凑的日程、地方事务的参与以及低调而坚定的后续行动——使之成为公众认可的真正工作标准。当王权受到质疑时，这将是它最有力的回应。"
 ENG_carers_recognition_campaign: "关怀者认可行动"
 ENG_carers_recognition_campaign_desc: "英国的关怀常常由那些默默无闻、鲜少休息的人们传递。我们将在王室赞助下发起全国性的\"关怀者认可行动\"，推动政府与民间社会以实际援助和公众尊重支持无偿照护者。一个能在海外尊重奉献的国家，也必须在国内同样尊重奉献。"
 ENG_discipline_service: "规范履职"
 ENG_discipline_service_desc: "飘摇的王冠易成众矢之的，而纪律严明的王冠方能重树体制威严。我们将严格规范行为准则，精进王室日常运作，并要求所有公共职责都展现专业水准。安妮的榜样或许不够耀眼，却经得起时间考验。"
 ENG_princess_admiral_royal_navy: "皇家海军公主上将"
 ENG_princess_admiral_royal_navy_desc: "皇家海军不仅是舰船装备，更是传统、身份与国家影响力的象征。我们将深化长公主殿下的海军职责，以提振士气、促进征兵，并加强海军与国家的纽带。无论和平时期还是危机时刻，舰队都应知晓王室与其同在。"
 ENG_princess_admiral_royal_navy_tt: "解锁§Y军事最高指挥部§!中的§Y$ENG_princess_anne_leader_name$§!"
 ENG_colonel_of_horse_logistics: "骑兵与后勤上校"
 ENG_colonel_of_horse_logistics_desc: "军队靠纪律和后勤运转，而非空谈。我们将正式确立长公主的军事任命，以强调战备状态、持续保障能力以及那些赢得战役却鲜为人知的扎实本领。现代军队需要的是那些尊重前线背后默默付出的实干家。"
 ENG_quiet_professionalism: "专业而静默"
 ENG_quiet_professionalism_desc: "克制中蕴含力量，恒常中建立信誉。我们将以低调专业的姿态作为王室的行事准则：减少浮夸作秀，注重务实成效，在联邦境内保持稳定持重的存在。若英国需要的是一个名副其实的君主制，这便是实现之道。"
 ENG_chairman_international_award: "国际奖项主席"
 ENG_chairman_international_award_desc: "遗产由超越任何单一统治时期的制度所保存。我们将加强公爵对国际奖项的领导力，以在下一代中培养实践技能、公民自信和领导才能。一个投资于青年的君主制，就是在投资自身的未来。"
 ENG_trustee_network: "信托网络"
 ENG_trustee_network_desc: "影响力无需宣示，它通过理事会、慈善机构以及公共生活的静默机制得以维系。我们将拓展信托网络，将信誉卓著的机构与王室赞助相联结，从而提升跨领域协作效率并推进行业标准。当王室统筹责任时，权威便自然彰显。"
 ENG_commonwealth_youth_outreach: "英联邦青年外展计划"
 ENG_commonwealth_youth_outreach_desc: "英联邦不能仅靠礼仪维系，它必须让年轻人感受到其相关性。我们将持续开展交流、培训项目和联合公民倡议，让英国的联系在未来领导人的生活中保持活力。当软实力融入个人层面时，其影响力最为强大。"
 ENG_production_guild_patronage: "赞助工艺行会"
 ENG_production_guild_patronage_desc: "工业既是商业，也是文化，英国的创意与生产部门是战略资产。我们将通过皇室赞助来支持那些使英国生产在全球具有竞争力的行会、工作室和熟练工匠。声望带来关注，关注带来投资。"
 ENG_steady_hand: "稳操胜券"
 ENG_steady_hand_desc: "在一个以审视为常态的家庭里，沉稳便成了一种战略美德。我们将把公爵塑造成一个稳健可靠、行事可期、专注于服务而非追逐头条的形象。有时，王室成员最有价值的角色，恰恰是让整个体制稳如磐石。"
 ENG_duke_charities: "公爵的慈善事业"
 ENG_duke_charities_desc: "爱丁堡公爵的遗产体现在他所建立的机构，而非发表的演说。我们将整合并专业化他的慈善事业组合，以确保长期资金支持、更高效的治理以及持久的公众信任。若要使君主制赢得尊重，其慈善事业必须如仪式般严谨有序。"
 ENG_international_award_conference: "国际奖项大会"
 ENG_international_award_conference_desc: "奖项的力量始终在于其全球网络与共享标准。我们将召开国际奖项会议，以协调合作伙伴、扩大参与范围，并为新一代实现项目现代化。当一项王室遗产在国际层面被系统化组织时，它便成为了一套体系。"
 ENG_wwf_president_emeritus: "世界自然基金会名誉主席"
 ENG_wwf_president_emeritus_desc: "环保已不再是边缘议题，而是国家安全的另一种表述。我们将借助公爵作为世界自然基金会荣誉主席的声望，将野生动物保护、生物多样性和环境管理提升为重要的政策优先事项。当王室将自然保护定位为战略要务时，各国政府便更难忽视。"
 ENG_prince_phillip_medal: "菲利普亲王勋章"
 ENG_prince_phillip_medal_desc: "象征在嘉奖正确的美德时，可谓意义重大。我们将设立菲利普亲王勋章，以表彰那些在实践服务、工程技术、工业制造、应急响应以及维持英国运转的不起眼但至关重要的能力方面做出贡献的人。这是一枚以金属传递的皇家讯息：结果才是一切。"
 ENG_strength_and_stay: "力量与坚守"
 ENG_strength_and_stay_desc: "君主制在压力下坚守不移，方能持久延续。我们将把公爵古老的哲学——纪律、韧性以及不随波逐流的精神——注入王室对外的姿态之中。当风暴来临时，王权必须显得坚不可摧。"
 ENG_from_sandhurst_to_service: "从桑德赫斯特到服役"
 ENG_from_sandhurst_to_service_desc: "王位的下一代继承人必须在仪式之外更具公信力。我们将以纪律严明的服务、军事专业素养、责任担当以及从艰苦实践中习得的务实领导力，来奠定王子公共角色的基石。桑德赫斯特并非一枚徽章，而是一种标杆。"
 ENG_royal_foundation: "皇家基金会"
 ENG_royal_foundation_desc: "现代君主制的衡量标准在于影响力，而非传统。我们将以皇家基金会作为王子的核心工具，通过专业项目、可衡量的成果以及能够经受政治更迭考验的合作伙伴关系来拓展其影响力。若王室欲引领时代，就必须有所作为。"
 ENG_heads_together: "携手同心"
 ENG_heads_together_desc: "一个坚韧的国家需要的不仅是坚固的疆界，更需要强大的精神力量。我们将把\"携手同心\"计划提升为国家层面的行动，推动心理健康知识普及、消除社会偏见，并为那些在沉默中挣扎的人们提供切实支持。王室虽无法通过立法强制仁爱，却能让其成为社会常态。"
 ENG_veteran_armed_forces_support: "支持退伍军人"
 ENG_veteran_armed_forces_support_desc: "脱下军装，服务不止。我们将通过慈善机构、雇主及政府协调，强化对退伍军人及武装部队的支持，确保那些曾负重前行者不被事后遗忘。一个要求牺牲的国家，必须保障尊严。"
 ENG_bridge_to_the_future: "通往未来的桥梁"
 ENG_bridge_to_the_future_desc: "伊丽莎白的统治象征着延续，而威廉必须代表变革。我们将把王子塑造成通往未来的桥梁——方法现代、作风严谨，并植根于服务人民的正统性。王室的下一篇章，在权杖交接前已然开启。"
 ENG_queen_eldest: "长老议会"
 ENG_queen_eldest_desc: "女王转向她的长子一脉，以在国外展现延续性，在国内树立信心。凭借继承人的公众影响力与王室特使的渠道，王室能够开启大臣们无法开启的大门，确保英国的声音传遍各国首都。"
 ENG_queen_middle: "中流砥柱"
 ENG_queen_middle_desc: "女王依靠中坚一代，以纪律和执行力维系着体制的运转。他们的力量不在于排场，而在于恪守日程、坚持标准，以及那份守护王室免于丑闻与迷失的沉稳才干。"
 ENG_queen_youngest: "通往明日之桥"
 ENG_queen_youngest_desc: "女王以久经考验的稳健作风稳固王室根基，同时为新时代的过渡铺平道路。凭借资深伴侣的体制分量与未来继承人的现代服役履历，君主制正传递出这样的信号：革新是可控有序的，而非混乱失序的。"
 ENG_triumph_of_the_crown: "王冠的胜利"
 ENG_triumph_of_the_crown_desc: "局势已然改变，王权不再仅凭传统维系。随着君主执掌国政，英国进入了新的秩序——忠诚者得赏赐，异议者受管控，国家方向由宫廷定夺。如今整个王国将同心协力向前迈进，世界必将明白：王权已重掌统治。"
 ENG_the_queens_speech_title: "女王的演讲"
 ENG_the_kings_speech_title: "国王的演讲"
 ENG_the_queens_speech_desc: "[ENG_the_queens_speech_focus_description]"
 ENG_restore_civil_liberties: "恢复公民自由"
 ENG_restore_civil_liberties_desc: "王冠的统治力，亦需以自我约束来证明。我们将收回非常时期的特权，恢复正当程序，并重申赋予英国权威合法性的各项权利。任由对手称之为软弱，整个王国将视之为自信的彰显。"
 ENG_rule_sword_sceptre: "剑与权杖的统治"
 ENG_rule_sword_sceptre_desc: "旧日的束缚已然失效，王国不能再由犹豫所统治。我们将把王室权威与国家权力工具融为一体，确保王室的意志得以毫无迟延地执行。英国将变得秩序井然、决策果断，让那些误将礼节当作软弱之人感到畏惧。"
 ENG_royal_prerogative_activation: "行使皇家特权"
 ENG_royal_prerogative_activation_desc: "宪法阴影中潜藏着某些权力，它们被审慎使用，被谨慎提及。我们将启动皇家特权，以推动国家高速运转，绕过瘫痪状态，迫使政府机构协调一致。当王权行动时，整个王国都将追随。"
 ENG_a_bid_soft_power: "软实力之争"
 ENG_a_bid_soft_power_desc: "实力不仅体现在舰船与预算上，更在于威望、渠道以及设定国际生活基调的能力。我们将使王室成为英国软实力的引擎，拓展文化外交、海外王室赞助以及超越任何内阁任期的影响力网络。当他人追逐头条时，我们将定义时代叙事。"
 ENG_commonwealth_summit: "召开英联邦首脑会议"
 ENG_commonwealth_summit_desc: "英联邦并非帝国的残响，而是一张可淬炼为战略的协作网络。我们将在王室主导下召开英联邦峰会，以巩固贸易、安全合作与共同发展领域的新承诺。若英国要重掌领导权，便要从汇聚盟友于一室开始。"
 ENG_crown_procurement_program: "王室采购计划"
 ENG_crown_procurement_program_desc: "君主统治不能依赖缓慢的合同与部委间的领地之争。我们将建立王室采购计划，集中采购权，加速重整军备，并奖励那些按时按量交付的企业。当王宫签署命令时，工业界必将闻风而动。"
 ENG_modernize_royal_navy: "现代化皇家海军"
 ENG_modernize_royal_navy_desc: "英国的势力向来以海洋为依托，王室绝不会统治一个无法掌控海上航线的国度。我们将以新型舰体、更精进的作战理念以及远海作战所需的补给体系，全面革新皇家海军。就让对手们紧盯我们的港口，细数每一艘出航的舰船吧。"
 ENG_raf_army_overhaul: "全面改革皇家空军和陆军"
 ENG_raf_army_overhaul_desc: "没有空中掩护和地面力量支持的舰队只是象征，而非盾牌。我们将以现代化指挥体系、升级装备和适应高强度战争的训练，彻底改造皇家空军与陆军。王室绝不会将权威押注在过时的军队之上。"
 ENG_leverage_crown_estate: "利用王室资产"
 ENG_leverage_crown_estate_desc: "王室财产不仅仅是继承，更是战略工具。我们将利用其资产为国家项目融资，稳定关键产业，并锚定长期发展，无需为每一英镑向议会乞讨。若君主制要统治，它也必须学会投资。"
 ENG_national_service_act: "通过《国家服役法案》"
 ENG_national_service_act_desc: "一个渴望安全的国家必须愿意承担其责任。我们将通过《国民服役法案》来建设人力、纪律以及全国共同的责任感。有人会称之为强制，而王室将称之为义务。"
 ENG_new_constitutional_charter: "起草新宪章"
 ENG_new_constitutional_charter_desc: "旧时的协议是为一个不同的英国而写，如今在压力下已难以为继。我们将起草一部新的宪章，明确界定君主的权力、议会的界限，以及超越政治范畴的公民权利。一旦宪章落定，王国将获得明晰的秩序——而明晰，即是力量。"
 ENG_secure_succession: "确保继承权"
 ENG_secure_succession_desc: "君主统治容不得顶层的不确定性。我们将通过明确的法律、严密的规划以及公开确认继承人的合法性来确保王位传承。延续性并非理所当然，而是必须强制执行。"
 ENG_rule_councillorship: "委员会执政"
 ENG_rule_councillorship_desc: "议会制催生党派纷争，而王室可通过信赖之人治国。我们将授权组建皇家顾问委员会，由其起草政策、监督各部，确保国家与王室意志一致。英国将由才干与忠诚治理，而非党派交易。"
 ENG_convene_foreign_secretary_cabinet: "召开外交大臣内阁会议"
 ENG_convene_foreign_secretary_cabinet_desc: "当王权的权威岌岌可危时，外交事务不容丝毫草率。我们将召开外交大臣内阁会议，统筹协调大使、情报人员、贸易特使和国防规划者，确保他们遵循统一指挥。英国将在国际舞台上发出同一个声音，且必须是正确的声音。"
 ENG_champion_liberal_values: "拥护自由主义价值观"
 ENG_champion_liberal_values_desc: "若君主制要统治，就必须以英国能够认同的原则来统治。我们将捍卫自由价值观，维护自由制度，并证明王权能够与权利和约束共存。王权将强大，也将合法。"
 ENG_european_outreach: "向欧洲外延"
 ENG_european_outreach_desc: "英国无法承受在自家门口陷入孤立。我们将发起一场欧洲外联行动，重建沟通渠道，在利益重叠领域确保合作，并防止对手在没有我们参与的情况下主导欧洲事务规则。王室将亲自斡旋，欧洲必将予以重视。"
 ENG_close_proximity_nato: "与北约密切接触"
 ENG_close_proximity_nato_desc: "北大西洋公约组织不仅是一纸条约，更是威慑与介入的杠杆。我们将与联盟保持紧密联系，确保情报共享、作战协同与战略纵深，同时维护王室行动自由的完整性。英国将成为盟友，但绝不沦为附庸。"
 ENG_joint_operational_command: "设立联合行动指挥部"
 ENG_joint_operational_command_desc: "军种间的内耗浪费时间，而时间就是生命。我们将设立联合作战司令部，在统一的作战原则下，统筹海军、陆军和皇家空军的规划、后勤与行动。一旦王室下达命令，所有军种都将步调一致地行动。"
 ENG_reaffirm_special_relationship: "重申特殊关系"
 ENG_reaffirm_special_relationship_desc: "实力赢得尊重，美国依然是王国最坚定的伙伴。我们将通过情报合作、防务协调及最高层级的共同战略规划，来巩固英美特殊关系。不列颠必将在决定世界命运的谈判桌上，牢牢守住自己的席位。"
 ENG_royal_charitable_initiative: "皇家慈善倡议"
 ENG_royal_charitable_initiative_desc: "当子民感受到被关怀时，统治便会更加稳固。我们将启动一项皇家慈善计划，将资金、志愿者和公众关注引向那些处于困境的社区，以此证明王室能够以仁爱之心施政。在援助最先抵达之处，忠诚将以最快的速度滋长。"
 ENG_time_for_common_sense: "回归常识"
 ENG_time_for_common_sense_desc: "现在是回归常识的时候了。工党政府多年的领导让我们的人民偏离了使英国成为昔日强国的理想。我们绝不能像温斯顿·丘吉尔这样的伟人的努力付诸东流，不，我们将重塑英国，使其成为它本应成为的样子——一个强国。"
 ENG_knowing_who_we_are: "了解我们是谁"
 ENG_knowing_who_we_are_desc: "我们首先是英国人，其次才是欧洲人。我们不能忘记自己的身份，我们是世界前所未见的超级大国的继承者。大英帝国的太阳永不落，只要我们有能力，它就会一直如此。"
 ENG_a_world_leader: "世界领袖"
 ENG_a_world_leader_desc: "我们是大不列颠，举世无双，我们是世界领袖与自由的捍卫者，绝不能让我们作为世界领导者的地位有所动摇。相反，我们将重新确立自己作为全球领导地位的前沿。"
 ENG_fighting_the_power_of_brussels: "对抗布鲁塞尔淫威"
 ENG_fighting_the_power_of_brussels_desc: "布鲁塞尔方面已经越权行事。他们正通过其言论积极削弱我们国家的独立性，这对我们为英国选择未来的能力构成了威胁！"
 ENG_a_civilized_society: "文明社会"
 ENG_a_civilized_society_desc: "作为一个文明社会，英国不会受制于他人的宣传。因此，我们必须迅速采取行动，打破那些试图彻底改变我们生活方式者的影响力。"
 ENG_a_stronger_society: "强大社会"
 ENG_a_stronger_society_desc: "我们的社会将比以往任何时候都更加强大和团结。我们不能让他人以\"改革\"为名分裂我们的团结。只有继续守护我们的核心价值观，我们的社会才能变得更加强大。"
 ENG_a_staunch_ally: "坚定盟友"
 ENG_a_staunch_ally_desc: "我们只是北约伙伴们坚定的盟友！任何胆敢指责我们是搭便车者、累赘或类似说法的人，从哪来滚哪去。"
 ENG_town_and_country: "小镇与乡村"
 ENG_town_and_country_desc: "我们是一个不会忘记那些小而质朴、谦逊的乡村小镇的国家。我们必须竭尽全力记住这些人，并激励他们继续前行。"
 ENG_a_more_flexible_europe: "灵活欧洲政策"
 ENG_a_more_flexible_europe_desc: "欧洲在整体外交政策目标上需要更加灵活。如果我们想成为一个更强大的大陆整体，欧洲就必须放弃整个\"统一\"议程，朝着更加灵活的方向努力。"
 ENG_rural_friendly_transport_services: "乡村友好型交通服务"
 ENG_rural_friendly_transport_services_desc: "我们的交通服务对农村社区并不太友好。我们得想办法让这些人满意。"
 ENG_industrial_friendly_transport_services: "工业友好型运输服务"
 ENG_industrial_friendly_transport_services_desc: "工人需要能够顺利上下班。我们必须考虑对工业区的交通服务进行改造或至少加以改进。"
 ENG_no_army_outside_of_europe: "欧洲之外无驻军"
 ENG_no_army_outside_of_europe_desc: "为什么英国军人会出现在欧洲边界之外？他们在亚洲、非洲和中东有何立足之地？相反，我们需要集中精力将我们的军队保留在欧洲境内。"
 ENG_abolish_centrally_planned_housing: "废除中央计划住房"
 ENG_abolish_centrally_planned_housing_desc: "与其将预算集中在中央计划的住房议程上，不如将资金重新分配到更重要的领域。"
 ENG_coming_to_the_aid_of_others: "援助他人"
 ENG_coming_to_the_aid_of_others_desc: "世界上有些人急需我们的援助，而我们就在这里为他们提供帮助。"
 ENG_global_matters_global_problems: "全球事务，全球问题"
 ENG_global_matters_global_problems_desc: "我们为什么要关心别人在经历什么？那是他们的问题，不是我们的！他们需要自己解决。"
 ENG_credit_based_public_transport: "信用制公共交通"
 ENG_credit_based_public_transport_desc: "你工作吗？很好，你不用担心支付车费。通过让那些工作的人免费乘坐公共交通，我们将能够激励人们去找工作并工作。"
 ENG_safe_haven_not_safe_touch: "庇护，而非温情"
 ENG_safe_haven_not_safe_touch_desc: "我们是真正需要帮助之人的避风港，若让任何人随意进入，只会让我们的国家腐朽至消亡。"
 ENG_are_you_thinking_what_were_thinking: "你也在想我所想？"
 ENG_are_you_thinking_what_were_thinking_desc: ""
 ENG_power_to_the_bank_of_england: "强化英格兰银行"
 ENG_power_to_the_bank_of_england_desc: "目前，英格兰银行的状况比以往任何时候都更加糟糕。因此，我们必须采取行动，强化这一机构。"
 ENG_british_dream: "不列颠之梦"
 ENG_british_dream_desc: "不列颠之梦，一个许多人已许久未曾触及的愿景。它承载着全体不列颠人的梦想与抱负——在无需承受集体损失后果的前提下，共享繁荣昌盛。"
 ENG_whats_wrong_with_discipline: "纪律有什么问题？"
 ENG_whats_wrong_with_discipline_desc: "看来我们的学校变得过于温和，开始回避采取必要的纪律措施。教育年轻人懂得规矩是我们的责任，我们必须确保教育工作者明白这一点。"
 ENG_across_the_board_tax_slashes: "全面减税"
 ENG_across_the_board_tax_slashes_desc: "如果我们全面减税，社会各阶层的人民都将感受到负担的显著减轻。我们绝不能区别对待！"
 ENG_tax_slashes_only_for_some: "部分减税"
 ENG_tax_slashes_only_for_some_desc: "我们没有预算也没有意愿为所有人减税。我们必须协调一致，只在有利于我们的地方减税。"
 ENG_icnreased_control_for_administrators: "扩大管理层权限"
 ENG_icnreased_control_for_administrators_desc: "我们学校的教职员工需要有能力参与学校事务的决策。这样做将有助于培养新的学者人才。"
 ENG_keeping_hospitals_clean: "保持医院清洁"
 ENG_keeping_hospitals_clean_desc: "我们必须保持医院的清洁，无论是外在环境还是信誉声誉。"
 ENG_corporate_invitations: "邀请企业"
 ENG_corporate_invitations_desc: "我们需要邀请企业来协助我们制定经济政策。他们是经济的命脉，没有他们，我们将一事无成。"
 ENG_more_police_less_crime: "警力增加，犯罪减少"
 ENG_more_police_less_crime_desc: "这不是很明显吗？如果我们有更多警察在街上巡逻，犯罪率肯定会大大降低。"
 ENG_cutting_wait_times: "缩短等待时间"
 ENG_cutting_wait_times_desc: "人们等待医疗服务的时间太长了，是时候采取行动，将等候时间减半了！"
 ENG_turnaround_schools: "改造学校"
 ENG_turnaround_schools_desc: "如果学生无法在课堂上端正坐好、认真听讲，那我们就得另想办法。把他们送进改造学校，最终将能解决我们这一小部分学生的问题。"
 ENG_structural_overhaul_of_nhs: "国民医疗服务体系改革"
 ENG_structural_overhaul_of_nhs_desc: "就目前情况来看，国民医疗服务体系已难以为继。它正吞噬我们所有的资金，却让病患在门外苦苦等待、病情延误。我们必须启动一系列改革，从根本上重建国民医疗服务体系。"
 ENG_trusting_local_professionals: "相信专业人士"
 ENG_trusting_local_professionals_desc: "既然没坏，何必修理？我们将把医疗事务交给专业人士处理，让国民医疗服务体系在微调后继续运作。"
 ENG_keeping_up_our_guard: "保持警惕"
 ENG_keeping_up_our_guard_desc: "眼下风平浪静，我们更不能掉以轻心。即便在安定繁荣的时期，也要做好应对各种情况的准备。"
 ENG_benefitting_the_taxpayer: "惠及纳税人"
 ENG_benefitting_the_taxpayer_desc: "我们不为纳税人服务，还能为谁服务？必须推行能让纳税人确信他们的钱不会白花的政策。"
 ENG_invitation_to_the_government_of_britain: "致英国政府的邀请"
 ENG_invitation_to_the_government_of_britain_desc: ""
 ENG_get_britain_moving_again: "让英国行动起来"
 ENG_get_britain_moving_again_desc: "是时候让英国再次行动起来。我们绝不能再沿用那种缓慢、按部就班且墨守成规的策略，坐等经济自我修复。我们要将主动权掌握在自己手中。"
 ENG_cleanup_westminster: "清理威斯敏斯特"
 ENG_cleanup_westminster_desc: "威斯敏斯特简直一团糟，官僚主义泛滥成灾，是时候拿起大锤彻底整顿这个地方了。"
 ENG_big_society_not_big_government: "大社会，而非大政府"
 ENG_big_society_not_big_government_desc: "为什么我们需要一个大政府？如果我们的社会已经足够完善，为何还要监控、管理并指挥人民生活的方方面面？相反，我们将缩减政府规模，让社会自主运行。"
 ENG_household_debt_management_programs: "家庭债务管理计划"
 ENG_household_debt_management_programs_desc: "有时候人们就是无法偿还债务，这没关系。我们会设立债务管理计划，要么承担部分债务，要么帮助他们制定还款方案。"
 ENG_bigger_place_for_educators: "增加教育工作者机会"
 ENG_bigger_place_for_educators_desc: "国家需要为我们的教育工作者提供更多发展空间。我们给予他们的认可远远不够，尤其是对他们所从事的工作而言。"
 ENG_the_most_family_friendly_country: "最注重家庭的国家"
 ENG_the_most_family_friendly_country_desc: "我国需要更加开放地接纳家庭和生育。我们的人口不能停滞不前、规模过小，我们需要增长并培育良好的价值观。"
 ENG_knowledge_for_industry: "工业知识"
 ENG_knowledge_for_industry_desc: "与其让知识在其他地方白白浪费，不如将这部分智力资源引导至新兴产业，比如军事工业。"
 ENG_power_of_recall: "罢免权"
 ENG_power_of_recall_desc: "显然，某些首相存在谎言行为，若其无法兑现承诺就必须被撤换。我们必须允许民众罢免那些不再受拥护的领导人。"
 ENG_a_more_balanced_economy: "更平衡的经济"
 ENG_a_more_balanced_economy_desc: "由于工党数十年的无能，我们的经济状况不佳，是时候让一切重回正轨了！"
 ENG_bye_bye_bureaucracy: "再见，官僚主义"
 ENG_bye_bye_bureaucracy_desc: "既然我们可以拥有充分的自由，谁还需要庞大的政府呢？我们的选民在日常生活中不需要官僚机构，而是需要更大的自由。"
 ENG_case_by_case_intervention: "个案干预"
 ENG_case_by_case_intervention_desC: "我们不能仅仅因为厌恶政府规模扩大就放弃在公共事务中发表意见的权利。相反，我们必须具体问题具体分析，努力寻求更佳的解决方案。"
 ENG_protecting_childhood: "保护儿童"
 ENG_protecting_childhood_desc: "目前，我们的青少年极易受到不法分子通过多种渠道（包括网络和街头）的伤害。我们必须采取更多措施保护他们的童年，让他们能够健康快乐地成长。"
 ENG_investigate_lost_funds: "调查资金失踪情况"
 ENG_investigate_lost_funds_desc: "几年前，一大笔政府资金不知何故不翼而飞。现在是时候展开彻底调查，查明真相了。"
 ENG_a_more_transparent_government: "一个更加透明的政府"
 ENG_a_more_transparent_government_desc: "我们的政府透明度远远不够，我们必须采取更多措施，确保我们的选民了解威斯敏斯特正在发生的事情。"
 ENG_petitions_for_debate: "辩论请愿书"
 ENG_petitions_for_debate_desc: "如果我们允许人们在变革请愿书上收集到大量签名，我们就可以将这些请愿书提交给议会审查，并更直接地落实人民的反馈意见。"
 ENG_public_reading_stage: "公开朗读舞台"
 ENG_public_reading_stage_desc: "我们将设立一个网络论坛，让民众可以对议会通过的旨在提高透明度和加强政府对外沟通的各项改革措施进行评论和讨论。"
 ENG_for_the_common_man: "为了大众"
 ENG_for_the_common_man_desc: "我们的政府是为普通民众服务的，而不是为那些掌权者服务的。我们将推行有针对性的改革，让普通民众能够更多地参与政治活动。"
 ENG_for_the_wealthy_man: "为了富人"
 ENG_for_the_wealthy_man_desc: "穷人跟政府到底有什么关系？他们大多数都是左翼游手好闲之徒，只想靠政府补贴混日子。我们应该优先服务那些真正工作、为经济做出贡献的社会成员。"
 ENG_a_brighter_more_secure_future: "更美好、更安全的未来"
 ENG_a_brighter_more_secure_future_desc: ""
 ENG_operation_dagger: "匕首行动"
 ENG_operation_dagger_desc: "波斯湾曾一度由我军主导，我军几乎可以完全掌控物资的进出。然而如今，我军与地区各方谈判的筹码减少，不得不依靠自身实力来达成目标。夺取穆桑达姆湖，我军将重获波斯湾的主导地位。"
 ENG_operation_barras: "巴拉斯行动"
 ENG_operation_barras_desc: "§R'是的，那就是他们的真名。§!\n\n我们收到报告称，民兵组织“西区黑帮”俘虏了几名英国士兵，并将他们扣为人质。我们面临着以某种方式介入以营救人质的压力，为此，我们的军事指挥部制定了“巴拉斯行动”。我们还可以选择在行动中缴获重要物资，但这并非强制性措施。"
 ENG_operation_coastal_star: "海岸之星行动"
 ENG_operation_coastal_star_desc: "冈比亚正危险地滑向威权主义和动荡的深渊，而且肯定已经脱离了我们的掌控。我们需要以某种形式进行干预，促使其改变方向，否则西非其他国家可能会步其后尘。"
 ENG_operation_delta_guard: "三角洲卫队行动"
 ENG_operation_delta_guard_desc: "显然，尼日利亚人对治理国家一窍不通，我们有义务采取措施，解决三角洲地区石油资源浪费的问题。否则，这些资源就只能白白浪费，而没有人希望看到这种情况发生。“三角洲卫士行动”将帮助我们重振在尼日利亚的经济主导地位，而由此产生的收入也必将造福于本州。"
 ENG_the_sun_which_never_set: "日永不落"
 ENG_the_sun_which_never_set_desc: "英国的确是永不落日，我们将确保这种情况继续保持下去。"
 ENG_operation_resolute_banner: "坚决旗帜行动"
 ENG_operation_resolute_banner_desc: "塞尔维亚政府持续威胁科索沃，因此我们被迫介入并划定红线。"
 ENG_falklands_policy: "福克兰群岛政策"
 ENG_falklands_policy_desc: "尽管二十多年前我们与阿根廷就福克兰群岛问题发生过小冲突，但许多人对那场冲突的记忆依然鲜明。我们现在可以着手制定新的岛屿政策，或许还会采取其他措施。"
 ENG_regime_change_in_zimbabwe: "守护行动"
 ENG_regime_change_in_zimbabwe_desc: "津巴布韦的长期独裁者[ZIM.GetLeader]必须被推翻，不惜一切手段。他对英国人和津巴布韦人民的压迫绝不能被忽视，正义必须迅速得到伸张。"
 ENG_operation_east_divide: "东部分隔行动"
 ENG_operation_east_divide_desc: "苏伊士运河是英国的领土，失去它，我们就不得不忍受“国际贸易规则”带来​​的种种弊端。因此，我们将努力与埃及达成协议，争取对西奈半岛的部分控制权，否则我们将别无选择，只能采取行动。"
 ENG_operation_ninety_seven: "97行动"
 ENG_operation_ninety_seven_desc: "将香港交还给中国是一个错误，而且是一个严重的错误。如果我们想要重新确立自身的经济霸权地位，就必须寻找新的途径，让香港再次回到我们的控制之下。"
 devolution.1.t: "选民寻求通过法案以减少依赖性"
 devolution.1.d: "近期国内形势的发展促使各组成州纷纷采取措施，减少对中央政府的依赖。我们有权否决这些法案，但这样做可能会引发更大的不满。"
 devolution.1.a: "批准"
 devolution.1.b: "否决"
 devolution.1.c: "请出示每张账单。"
 devolution.2.t: "苏格兰法案"
 devolution.2.d: "苏格兰议会已向政府提交一项法案，该法案将扩大苏格兰的自治权，并推动其走向权力下放的局面。否决这项法案可能会激怒苏格兰民众，但批准该法案将促使苏格兰走向权力下放。"
 devolution.2.a: "批准"
 devolution.2.b: "否决"
 devolution.3.t: "北爱尔兰法案"
 devolution.3.d: "北爱尔兰议会已向政府提交一项法案，该法案将扩大北爱尔兰的自治权，并推动其走向权力下放的局面。否决这项法案可能会激怒北爱尔兰民众，但批准该法案将促使他们走向权力下放。"
 devolution.3.a: "批准"
 devolution.3.b: "否决"
 devolution.4.t: "威尔士法案"
 devolution.4.d: "威尔士议会已向政府提交一项法案，该法案将扩大威尔士的自治权，并推动威尔士走向权力下放的局面。否决这项法案可能会激怒威尔士，但批准该法案将促使威尔士走向权力下放。"
 devolution.4.a: "批准"
 devolution.4.b: "否决"
 devolution.5.t: "苏格兰独立呼声日益高涨"
 devolution.5.d: "每天，新闻主播们都站在人群面前，要求举行全民公投，以决定苏格兰是否留在[ENG.GetName]。显然，威斯敏斯特议会普遍反对这一想法，但直接否决可能会引发动荡。"
 devolution.5.a: "好吧，让我们看看会发生什么。"
 devolution.5.b: "否决"
 devolution.6.t: "北爱尔兰独立呼声日益高涨"
 devolution.6.d: "每天，新闻主播们都站在人群面前，要求举行全民公投，以决定北爱尔兰是否继续留在[ENG.GetName]。显然，威斯敏斯特议会普遍反对这一想法，但直接否决可能会引发动荡。"
 devolution.6.a: "好吧，让我们看看会发生什么。"
 devolution.6.b: "否决"
 devolution.7.t: "威尔士独立呼声日益高涨"
 devolution.7.d: "每天，新闻主播们都站在人群面前，要求举行全民公投，以决定威尔士是否留在[ENG.GetName]。显然，威斯敏斯特议会普遍反对这一想法，但直接否决可能会引发动荡。"
 devolution.7.a: "好吧，让我们看看会发生什么。"
 devolution.7.b: "否决"
 devolution.10.t: "选民选举"
 devolution.10.d: "各选区的选举已经到来。每个选区都将在其各自的议会中选出新的议员，这些议员要么支持独立，要么支持[ENG.GetName]。这些支持独立的议员能否当选，取决于各选区各自的动员力度。"
 devolution.10.a: "好的"
 britain_md.100.t: "即将展开匕首行动"
 britain_md.100.d: "穆桑达姆地处战略要地，犹如波斯湾的利刃。每天都有无数油轮和船队穿过霍尔木兹海峡，但随着该地区局势日益动荡，我们无法确保航道安全。如果我们能够控制该省，就能更好地保护我们在该地区的舰队和资产。"
 britain_md.100.a: "尝试与阿曼达成协议"
 britain_md.100.b: "没有时间谈判，继续"
 britain_md.101.t: "[ENG.GetName]就穆桑达姆事宜与我们联系"
 britain_md.101.d: "英国人来和我们谈判。更确切地说，他们是来争夺我们的领土。听到英国人的提议后，我们的外交官怒不可遏地愤然离去，他们一听说英国人来此是为了穆桑达姆岛谈判，就无法控制自己的情绪。如此咄咄逼人的要求，必将激起我们人民难以想象的愤怒。尽管英国人重申，拒绝这样的要求将使他们别无选择，只能“另寻他法”。"
 britain_md.101.a: "绝不！"
 britain_md.101.b: "我们还有别的选择吗？"
 britain_md.102.t: "阿曼拒绝谈判"
 britain_md.102.d: "阿曼政府已明确表示对任何形式的谈判都不感兴趣，反而选择斥责我们的外交官。"
 britain_md.102.a: "他们让我们别无选择。"
 britain_md.102.b: "算了吧"
 britain_md.103.t: "阿曼给我们提供了条款"
 britain_md.103.d: "阿曼政府采取了明智的举措，与我们展开谈判，甚至提出了条件。他们要求我们预先支付一大笔款项，并保证在一段时间内保护阿曼的安全。拒绝这一提议意味着阿曼不会将穆桑达姆岛的开发权授予我们。"
 britain_md.103.a: "好吧"
 britain_md.103.b: "不，我们换个方式。"
 britain_md.103.c: "算了吧"
 ENG_western_allies_western_ideals: "西方盟国，西方理念"
 ENG_western_allies_western_ideals_desc: ""
 ENG_out_with_the_new_in_with_the_old: "淘汰新事物，迎接旧事物"
 ENG_out_with_the_new_in_with_the_old_desc: ""
 royal_workers_idea: "皇家工人"
 ENG_crown_procurement_program_idea: "皇冠采购计划"
 ENG_recent_defections: "近期叛逃事件"
 ENG_recent_defections_desc: "士兵、将军和经验丰富的飞行员都在逃离我们的队伍，希望切断与政府的联系，因为他们认为我们对国家构成威胁。"
 ENG_war_of_independence: "独立战争"
 ENG_war_of_independence_desc: "我们的战士们士气高昂，精神抖擞，准备迎接伦敦暴政统治的终结。"
 ENG_typhoon_debate1: "台风战机产量增加"
 ENG_resistance_against_westminster: "反对威斯敏斯特"
 ENG_resistance_against_westminster_desC: "该州选区选民拒绝了全民公投的提议，并以公民不服从和小规模暴力事件的形式进行了坚决抵抗，以表达他们的不满。"
 ENG_political_modifier: "威斯敏斯特体系"
 ENG_two_party_system_idea: "两党制 -工党与保守党"
 ENG_economy_modifier: "[ENG.GetName]的经济"
 ENG_building_britain_idea: "建设面向未来的英国"
 ENG_building_britain_idea_desc: "长期产业战略将对理念、人才、基础设施和场所的投资结合起来，逐步提高生产力，使企业有信心在全国范围内进行规划、招聘和建设。"
 ENG_ireland_border_cooperation_idea_IRE: "爱尔兰边境合作"
 ENG_ireland_border_cooperation_idea_IRE_desc: "切实可行的跨境机构和联合项目将北爱尔兰和爱尔兰在贸易、基础设施和服务方面联系起来，简化文书工作，帮助货物、人员和思想更自由地跨境流动。"
 ENG_Space_Command0: "英国网络空间能力"
 ENG_Space_Command0_desc: "英国正致力于提升其太空能力并维护其在太空领域的利益。"
 ENG_Space_Command1: "英国太空司令部"
 ENG_Space_Command1_desc: "英国太空司令部是负责太空作战、太空人员和太空能力的国防领导机构。它是一个联合司令部，总部设在海威科姆皇家空军基地，人员来自英国皇家海军、英国陆军和皇家空军，此外还有公务员和承包商。"
 ENG_Space_Command2: "英国太空司令部"
 Eng_Space_Command2_desc: "英国太空司令部是负责太空作战、太空人员和太空能力的国防领导机构。它是一个联合司令部，总部设在海威科姆皇家空军基地，人员来自皇家海军、英国陆军和皇家空军，此外还有公务员和承包商。随着著名的红衣军团的回归，该机构士气高昂，有望重拾昔日荣光。"
 ENG_Space_Command3: "英国太空司令部"
 ENG_Space_Command3_desc: "英国太空司令部是英国国防中负责太空作战、太空人员和太空能力的牵头单位。它是一个联合司令部，总部设在海威科姆皇家空军基地，人员来自英国皇家海军、陆军和空军，此外还有公务员和承包商。第一太空师成立之初，其表现就超出了全世界的预期，英国正在经历一场全新的“无畏战舰”式的太空探索。"
 ENG_standardized_space_parts1: "标准化空间部件"
 ENG_standardized_space_parts1_desc: "通过支持商业公司使太空变得平易近人且价格合理，太空产品的制造成本得以降低。"
 ENG_british_commercial_spaceport1: "英国航天港私有化"
 ENG_british_commercial_spaceport1_desc: "英国正拥抱太空探索的新领域，将航天港私有化以促进地球以外的商业活动。这些私营设施标志着英国正朝着鼓励创新和支持蓬勃发展的商业航天产业的方向转变。"
 ENG_british_commercial_spaceport2: "英国航天港私有化"
 ENG_british_commercial_spaceport2_desc: "英国正拥抱太空探索的新领域，将航天港私有化以促进地球以外的商业活动。这些私营设施标志着英国正朝着鼓励创新和支持蓬勃发展的商业航天产业的方向转变。"
 ENG_Historical_Valor1: "勇武之史"
 ENG_Historical_Varlor1_desc: "英国军队根深蒂固地秉持传统，并为其辉煌的历史传承而自豪。然而，总参谋部仍然坚持传统的战略，对未经检验的战术持怀疑态度。随着军队即将迎来变革，如何在保持自豪感的同时兼顾适应性，成为国家防御的本质所在。"
 ENG_Aging_Military1: "衰老的军队"
 ENG_Aging_Military1_desc: "由于资金投入不足，英国军队面临严重的装备老化问题，老旧装备和质量下降令人担忧。财政忽视的影响波及整个军队，给维持一支现代化且高效的国防力量带来了挑战。"
 ENG_desert_hawk: "沙漠之鹰"
 ENG_desert_hawk_desc: "洛克希德·马丁“沙漠之鹰”III型无人机是由洛克希德·马丁公司航空部门的臭鼬工厂设计的一款无人机。它是一款小型侦察无人机，能够进行雷达观测、信号情报和通信拦截，并配备夜视、热成像和光电传感器进行远程观测。"
 ENG_archer_artillery_alliance: "弓箭手火炮联盟"
 ENG_archer_artillery_alliance_desc: "由瑞典开发的“弓箭手”火炮联盟标志着远程精确火力的突破。凭借自动化装填和快速部署，该火炮系统可确保在战场上提供精准灵活的火力支援。其模块化设计增强了军事行动能力，为瑞典和英国在作战中带来战略优势。"
 ENG_K9A1_thunder_development_group: "K9A1 雷霆开发小组"
 ENG_K9A1_thunder_development_group_desc: "韩国K9A1“雷霆”自行榴弹炮研发小组致力于提升装甲火炮作战能力。这款尖端平台集机动性、火力与先进技术于一体，具备快速反应能力和极高的生存能力。凭借自动化装填和改进的瞄准系统，K9A1“雷霆”显著提升了韩国和英国军队的炮兵作战效能。"
 ENG_Boxer_Program: "拳师犬项目"
 ENG_Boxer_Program_desc: "德国和荷兰合作研发的拳师犬装甲运兵车项目，开启了装甲运兵车的新纪元。拳师犬采用模块化设计，可轻松适应各种任务，包括部队运输和医疗后送。凭借先进的防护性能和卓越的机动性，该车能够提升军事人员在各种作战环境下的安全性和作战效能。"
 ENG_warrior_capability_sustainment_programme: "武士装甲车能力维持计划"
 ENG_warrior_capability_sustainment_programme_desc: "“勇士”装甲车老旧的30毫米拉登炮无法在行进中精确射击，这促使人们研究新的武器系统和炮塔设计，以延长其作战寿命。目前的计划设想加装一个全稳定式40毫米CT40炮塔、改进电子架构以及配备快速安装套件的模块化装甲防护系统。与此同时，“装甲战斗群支援车辆”项目提议将该平台改装成装甲运兵车，以取代FV432装甲车。"
 ENG_warrior_ajax_upgrades: "勇士装甲车阿贾克斯升级"
 ENG_warrior_ajax_upgrades_desc: "由英国主导的“武士·阿贾克斯”升级项目，标志着标志性的“武士”步兵战车性能的显著提升。通过一系列先进改进，包括增强火力、改进通信系统和升级装甲，武士·阿贾克斯战车在战场上展现出卓越的性能。这些升级增强了英国的军事能力，为地面部队在各种作战场景中提供现代化且用途广泛的装甲支援。"
 ENG_fres_program_Idea: "未来快速效应系统计划"
 ENG_fres_program_Idea_desc: "英国的“未来快速效应系统计划”是一项具有前瞻性的举措，旨在通过多功能陆地平台增强军队的敏捷性。该计划整合了尖端技术以实现快速反应，确保英国在各种任务中都能保持战备状态。"
 ENG_fixing_civil_servant_idea: "整顿公务员"
 ENG_fixing_civil_servant_idea_desc: "我们的士兵需要可靠的装备。我们正在努力满足这一需求。"
 ENG_special_command1: "特种司令部"
 ENG_special_command1_desc: "我们致力于提升军队的专业化水平和作战效能，力求增强军队的作战能力。然而，这一承诺也意味着更高的开支和更苛刻的资源需求。"
 ENG_special_command2: "特种司令部"
 ENG_special_command2_desc: "我们致力于提升军队的专业化水平和作战效能，力求增强军队的作战能力。然而，这一承诺也意味着更高的开支和更苛刻的资源需求。"
 ENG_special_command3: "特种司令部"
 ENG_special_command3_desc: "我们致力于提升军队的专业化水平和作战效能，力求增强军队的作战能力。然而，这一承诺也意味着更高的开支和更苛刻的资源需求。"
 ENG_UKSF1: "英国陆军特种部队"
 ENG_UKSF1_desc: "由特种空勤团和特殊舟艇队等精锐部队组成的英国特种部队，训练有素，擅长秘密行动、反恐和非常规战争。这支精英特种部队的存在提升了英国的战略灵活性和反恐能力，体现了精准性和适应性的卓越品质。"
 ENG_UKSF2: "英国陆军特种部队"
 ENG_UKSF2_desc: "由特种空勤团和特殊舟艇队等精锐部队组成的英国特种部队，训练有素，擅长秘密行动、反恐和非常规战争。这支精英特种部队的存在提升了英国的战略灵活性和反恐能力，体现了精准性和适应性的卓越品质。"
 ENG_aircraft_ai_idea: "飞机AI集成"
 ENG_aircraft_ai_idea_desc: "随着科技进步，英国在飞机人工智能集成领域处于领先地位，将尖端人工智能与空中作战能力相结合。这种国家精神体现了其致力于利用人工智能提升飞机性能、自主系统和自适应任务能力的决心。"
 ENG_quality_over_quantity: "质胜于量"
 ENG_worldwide_command1: "全球司令部"
 ENG_worldwide_command1_desc: "英国全球军事司令部的概念设想了一种战略方针，即英国军队将其作战范围扩展至全球。这项举措包括建立一个能够协调和开展全球军事行动的指挥体系。通过在各个地区部署兵力，英国武装部队旨在增强其全球影响力，应对新出现的威胁，并为国际安全做出贡献。英国全球军事司令部体现了英国致力于积极主动、灵活多变的军事行动，以适应不断变化的全球安全挑战。"
 ENG_worldwide_command2: "全球司令部"
 ENG_worldwide_command2_desc: "英国全球军事司令部的概念设想了一种战略方针，即英国军队将其作战范围扩展至全球。这项举措包括建立一个能够协调和开展全球军事行动的指挥体系。通过在各个地区部署兵力，英国武装部队旨在增强其全球影响力，应对新出现的威胁，并为国际安全做出贡献。英国全球军事司令部体现了英国致力于积极主动、灵活多变的军事行动，以适应不断变化的全球安全挑战。"
