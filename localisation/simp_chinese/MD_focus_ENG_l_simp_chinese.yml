 raid_type_ENG_raid_nigeria: "三角洲卫队行动"
 raid_type_ENG_raid_nigeria_desC: "尼日利亚政府政局不稳，已证明其无力管理三角洲周边的油田。因此，我们必须介入并采取措施，以实现局势的重新稳定。"
 raid_type_ENG_raid_zimbabwe: "守护行动"
 raid_type_ENG_raid_zimbabwe_desc: "统治津巴布韦的暴君必须立即被推翻，因为他根本不配治理国家。他对英国裔人士和津巴布韦本土人民的暴行表明，他毫无底线，显然，他愿意跨越我们的底线。"
 ENG_joint_strike_fighter_project_US1_desc: "美国正与英国合作，对空军进行创新。"
 ENG_dartmouth_naval_college_expansion: "达特茅斯海军学院扩建"
 ENG_dartmouth_naval_college_expansion_desc: "达特茅斯海军学院的扩建标志着英国对海事教育和培训的一项重大投资。该学院以其悠久的海军传统为基础，扩建计划配备最先进的设施，开展先进的培训项目，并提升招生能力，以满足日益增长的对技术娴熟的海军人员的需求。"
 ENG_type_32_frigate_guardian_class: "31型护卫舰“守卫者”级"
 ENG_type_32_frigate_guardian_class_desc: "32型护卫舰是英国皇家海军的一艘护卫舰。2020年11月，首相鲍里斯·约翰逊根据综合评估报告正式宣布了该舰的建造计划。该舰在26型和31型护卫舰之后建造，采用通用模块化设计，预计将有助于壮大英国皇家海军的水面护卫舰队。"
 ENG_charles_harmony: "英国查尔斯王子和谐之旅"
 ENG_election_unlock_tt: "§Y当选举产生新政府后，该国策将可用。§!"
 ENG_army_special_operations_brigade_desc: "陆军特种作战旅代表了英国军事能力的巅峰，致力于执行秘密且极具挑战性的任务。这支精锐旅由来自不同军种的杰出人员组成，以无与伦比的精准度和适应性开展行动。凭借尖端技术和严格的训练，该部队已做好充分准备，执行反恐、情报搜集和其他高影响力行动，巩固了其作为国家国防和安全体系关键力量的地位。"
 ENG_glasgow_shipbuilidng_tt: "可以通过完成§Y$ENG_refine_natural_bauxite$§!来增加效果"
 ENG_refine_natural_bauxite_tt: "这将增强§Y$ENG_glasgow_shipbuilidng$§!的效果"
 ENG_the_queens_speech: "[ENG_the_queens_speech_focus_title]"
 ENG_the_queens_speech_desc_key: "当君主以国家之声而非礼仪之名发声时，国民的聆听方式截然不同。在女王的演讲中，一项新的政治格局将被宣告，政府的各项议程都将受制于王室的授权。从此以后，政策将具有王室权威，英国将作为一个拥有统一意志的王国行事。"
 ENG_the_kings_speech_desc_key: "当君主以国家之声而非礼节性仪式发言时，国民的聆听方式截然不同。在国王的演讲中，一项新的政治安排将被宣布，政府的议程将受制于王室的授权。从此以后，政策将具有王室权威，英国将作为一个拥有统一意志的王国行事。"
 ENG_inner_circle_andrew.06.t: "安德鲁王子被逐出王室"
 ENG_inner_circle_andrew.056.d: "由于与杰弗里·爱泼斯坦的关系曝光，安德鲁王子在政治上变得炙手可热。在公众和体制内的压力日益增大，他被剥夺了在王室的剩余地位，并被逐出核心圈子。"
 ENG_inner_circle_andrew.06.a: "他没法再留下了。"
 ENG_inner_circle_philip.04.t: "菲利普亲王去世"
 ENG_inner_circle_philip.04.d: "爱丁堡公爵菲利普亲王在成为英国王室公共生活中心人物数十年后逝世。他的去世标志着英国君主制一个时代的终结，并将给整个英国带来巨大影响。"
 ENG_inner_circle_philip.04.a: "举国哀悼"
