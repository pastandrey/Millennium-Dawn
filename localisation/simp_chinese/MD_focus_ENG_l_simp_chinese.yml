 ENG_anne_1_idea: "Princess Royal"
 ENG_anne_1_idea_desc: "The title Princess Royal is held by Anne as a mark of seniority and exceptional service within the Royal Family. Traditionally granted by the sovereign to their eldest daughter, it is not automatic and is bestowed only as a personal honor. It carries historic prestige and signals a lifetime expectation of visible duty and unwavering commitment to the Crown."
