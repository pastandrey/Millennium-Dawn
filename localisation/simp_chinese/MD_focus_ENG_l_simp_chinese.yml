 ENG_prince_andrew: "安德鲁"
 ENG_prince_andrew_trait: "约克公爵"
 ENG_prince_andrew_leader_name: "$ENG_prince_andrew_trait$王子$ENG_prince_andrew$"
 ENG_andrew_1_idea: "皇家海军指挥官"
 ENG_andrew_1_idea_desc: "作为皇家海军指挥官，安德鲁曾在英国舰队中服役，表现卓越，曾担任直升机飞行员和舰艇指挥官。这体现了他长期在海上行动中的现役经历和领导才能，也表明了他与英国海军传统的深厚渊源。"
 ENG_andrew_2_idea: "$ENG_andrew_1_idea$"
 ENG_andrew_2_idea_desc: "$ENG_andrew_1_idea_desc$"
 ENG_andrew_3_idea: "约克公爵"
 ENG_andrew_3_idea_desc: "约克公爵的头衔授予安德鲁，标志着他作为王室高级成员和君主次子的地位。该头衔传统上授予君主的幼子，具有历史声望，并与王室服务和公共职责有着长期的联系。"
