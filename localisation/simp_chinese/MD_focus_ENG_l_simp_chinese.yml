 ENG_william_1_idea_desc: "The title Duke of Cambridge was granted to Prince William as a senior royal distinction marking his role as a leading figure of the next generation. Traditionally bestowed by the sovereign on prominent members of the Royal Family, it carries prestige and a clear expectation of national representation and public duty. In modern Britain it serves as a platform for patronage, service, and the steady preparation of an heir for future responsibility."
