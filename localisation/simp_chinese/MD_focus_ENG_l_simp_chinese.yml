 ENG_worldwide_command3_desc: "英国全球军事司令部的概念设想了一种战略方针，即英国军队将其作战范围扩展至全球。这项举措包括建立一个能够协调和开展全球军事行动的指挥体系。通过在各个地区部署兵力，英国武装部队旨在增强其全球影响力，应对新出现的威胁，并为国际安全做出贡献。英国全球军事司令部体现了英国致力于积极主动、灵活多变的军事行动，以适应不断变化的全球安全挑战。"
 ENG_worldwide_command4: "全球司令部"
 ENG_worldwide_command4_desc: "英国全球军事司令部的概念设想了一种战略方针，即英国军队将其作战范围扩展至全球。这项举措包括建立一个能够协调和开展全球军事行动的指挥体系。通过在各个地区部署兵力，英国武装部队旨在增强其全球影响力，应对新出现的威胁，并为国际安全做出贡献。英国全球军事司令部体现了英国致力于积极主动、灵活多变的军事行动，以适应不断变化的全球安全挑战。"
 ENG_far_east_command1: "远东司令部"
 ENG_far_east_command1_desc: "英国武装部队向全球指挥体系的扩展已延伸至远东地区，这体现了其对这一关键地区安全与稳定的战略承诺。该举措旨在建立战略性部署的指挥节点和作战中心，以增强军队快速应对远东地区不断演变的威胁和挑战的能力。"
 ENG_far_east_command2: "远东司令部"
 ENG_far_east_command2_desc: "英国武装部队向全球指挥体系的扩展已延伸至远东地区，这体现了其对这一关键地区安全与稳定的战略承诺。该举措旨在建立战略性部署的指挥节点和作战中心，以增强军队快速应对远东地区不断演变的威胁和挑战的能力。"
 ENG_naval_defense_act_1889_1: "1889年海军防御法案"
 ENG_naval_defense_act_1889_1_desc: "1889年海军防御法案是英国议会的一项法案。该法案于1889年5月31日获得御准，正式采纳了“两强标准”，并增强了英国的海军实力。该标准要求英国皇家海军拥有的战列舰数量至少要相当于当时世界第二和第三大海军力量的总和。"
 ENG_naval_defense_act_1889_1_tt: "§R一旦我们成为大陆海上强国，它将变为期两年的临时国家精神。§!"
 ENG_army_special_operations_brigade_idea: "陆军特种作战旅"
 ENG_army_special_operations_brigade_idea_desc: "英国陆军特种作战旅是英国军队中一支精锐且高度专业化的部队。该旅由来自各个部队的训练有素的士兵组成，专门执行非常规且高风险的任务。凭借先进的武器装备、专业的训练和对多用途作战能力的执着追求，英国陆军特种作战旅在应对复杂威胁、执行精确作战以及为国家整体防御战略做出贡献方面发挥着关键作用。"
 ENG_allied_basing_efforts_Idea: "盟军基地建设工作"
 ENG_allied_basing_efforts_Idea_desc: "“盟军基地建设计划”旨在为联盟成员国提供一套全面加强基础设施和战略资产的方案。该计划涵盖对交通网络、空军基地、港口和其他关键设施的必要改进。作为联盟的主要贡献国，英国的基础设施将得到显著而持久的提升，从而提高后勤效率和战略战备水平。"
 ENG_royal_navy_Idea1: "英国皇家海军"
 ENG_royal_navy_Idea1_desc: "英国皇家海军是世界顶尖的海上力量之一，拥有数百年悠久的历史。皇家海军以其适应能力和技术实力而闻名，在维护英国海上利益和在全球范围内投射力量方面发挥着至关重要的作用。"
 ENG_royal_navy_Idea2: "英国皇家海军"
 ENG_royal_navy_Idea2_desc: "英国皇家海军是世界顶尖的海上力量之一，拥有数百年悠久的历史。皇家海军以其适应能力和技术实力而闻名，在维护英国海上利益和在全球范围内投射力量方面发挥着至关重要的作用。"
 ENG_royal_navy_Idea3: "英国皇家海军"
 ENG_royal_navy_Idea3_desc: "英国皇家海军是世界顶尖的海上力量之一，拥有数百年悠久的历史。皇家海军以其适应能力和技术实力而闻名，在维护英国海上利益和在全球范围内投射力量方面发挥着至关重要的作用。"
 ENG_royal_navy_Idea4: "英国皇家海军"
 ENG_royal_navy_Idea4_desc: "英国皇家海军是世界顶尖的海上力量之一，拥有数百年悠久的历史。皇家海军以其适应能力和技术实力而闻名，在维护英国海上利益和在全球范围内投射力量方面发挥着至关重要的作用。"
 ENG_royal_navy_Idea5: "英国皇家海军"
 ENG_royal_navy_Idea5_desc: "英国皇家海军是世界顶尖的海上力量之一，拥有数百年悠久的历史。皇家海军以其适应能力和技术实力而闻名，在维护英国海上利益和在全球范围内投射力量方面发挥着至关重要的作用。"
 ENG_british_foregin_legion_idea: "英国外籍军团"
 ENG_british_foregin_legion_idea_desc: "我们允许世界各地的士兵加入英国军队，以维护英国的利益。"
 ENG_field_army_expansion_idea: "野战部队扩充"
 ENG_field_army_expansion_idea_desc: "扩充后的野战部队旨在适应从常规战争到维和任务等各种作战环境，并能发挥卓越作用。这项举措与英国更广泛的国防战略相契合，强调战备、机动性和与盟军的互操作性。通过投资发展和现代化其野战部队，英国强化了其维护一支能够应对21世纪不断演变的威胁的多功能、敏捷地面部队的承诺。"
 ENG_multi_ocean_training: "多洋训练"
 ENG_multi_ocean_training_desc: "这项战略计划旨在通过专门的训练演习、模拟和实战演练，提升英国皇家海军的能力和战备水平。通过让海军人员体验从大西洋到太平洋乃至更远海域不同海洋带来的独特挑战，该计划确保了海军在全球范围内具备适应性、多功能性和高效的海上作战能力。"
 ENG_carrier_wing_procurement: "航母舰载机群采"
 ENG_carrier_wing_procurement_desc: "“扩充航母舰载机联队采购计划”彰显了英国致力于提升其“伊丽莎白女王”级航母空中力量的决心。这项战略举措旨在采购和扩充舰载机，重点在于引进先进平台，以增强航母舰载机联队的作战范围和多功能性。该采购计划包括整合F-35B“闪电II”等尖端战机以及支援和侦察装备。此次扩充旨在强化航母作战能力，确保打造一支能够执行各种任务的强大航母打击群。"
 ENG_strategic_aircraft_strategy_idea: "战略飞机战略"
