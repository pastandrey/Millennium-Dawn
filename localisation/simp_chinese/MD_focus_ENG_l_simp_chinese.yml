 ENG_anne_1_idea: "皇家公主"
 ENG_anne_1_idea_desc: "安妮公主拥有“皇家公主”的头衔，这象征着她在王室中的资历和卓越贡献。按照传统，这一头衔由君主授予长女，并非自动获得，而是一种个人荣誉。它承载着历史的尊荣，也预示着终身履行职责、对王室矢志不渝的期望。"
