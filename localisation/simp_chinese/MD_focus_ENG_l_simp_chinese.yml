 ENG_the_inner_circle_dm_desc: "女王的核心集团由王室成员和最值得信赖的[ENG.GetNameDef]人物组成，他们忠心耿耿地维护$ENG_elizabeth_queen$女王的权威，捍卫王室的利益。他们受职责和威望的约束，竞相争取亲近女王、获得任命和赢得君主的信任，因为他们深知，宫廷的影响力足以左右远超公众视野的政策走向。他们的触角遍及军事、工业和政治决策，通过恩惠、人脉和幕后操纵，左右着英国的命运。"
