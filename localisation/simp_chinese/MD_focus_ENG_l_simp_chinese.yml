 ENG_military.007.t: "月球前哨站"
 ENG_military.007.d: "我们的科学家和工程师已准备好将宇航员和设备送到月球上半永久地生活。总共有12名宇航员将被送往那里，同时还将携带价值数千万美元的设备，补给品，生活空间和一些个人物品。这个前哨基地将需要定期移动，因为1个月球日等于29个地球日，这对于电池来说，无法在月球上保持蓄电太长时间。\n\n基地本身将建立在月球两极上，易于移动，以使我们的太阳能电池板得到最大的利用。此外，还将进行实验以确定月球上的长期生活所需条件。提取月球冰不仅可以为月球上的植物提供液态水，为宇航员提供食物，还可以将其分离成氧气和氢气，作为火箭燃料。\n\n这可能需要数月或数年的时间才能得到所需的研究成果。但在这段时间内，利用这个项目的资金，我们将建立一个围绕月球运行的仓库，以便更方便地进入月球，并为返回地球补充燃料。\n\n这些都是可以在未来十年内实现的。不过，现在时候是发射了。"
 ENG_military.007.a: "发射！"
 ENG_military.008.t: "初代月球基地"
 ENG_military.008.d: "我们的科学家和工程师已经正式登陆月球，目前正在建立月球基地的过程中。每个部分都被划分为 \"模块\"，不完全是独立的建筑，但也不是合为一体。有一个居住模块，用于休息；食物模块，用于种植食物；实验室模块，这是最大的模块，有绝大部分科学设备；维修模块，包含所有的维修工具，以便在东西坏了的时候进行维修；便利设施模块，因为这些人在这里呆了6个月，整日工作对精神有害；还有相当多的太阳能电池板。\n\n在最初的几个月里，食物的运送将是常见的，因为种植食物需要时间。水和氧气将通过月球的冰层获得。最后，这些科学家将呆到大约6个月后，直到搬到下一个地点后，由于前哨站所在的月球昼夜持续6个月，太阳能电池板将失去作用。\n\n月球基地的开端已经完成。"
 ENG_military.008.a: "科学！"
 ENG_military.009.t: "殖民地发展"
 ENG_military.009.d: "位于月球的科研前哨战取得了重大的进展。他们扩大了对太阳能充电板的应用，而且最近还研究出来了分解水制取氧气氢气一种更为简便的方法，因此他们可以提供足够的氧气和氢气来为最新的支援火箭提供燃料。这种科学突破是如此实用，只要时间和资金充裕，月球甚至可以成为航天企业未来探索外太空的枢纽。\n\n宇宙变得更小了。"
 ENG_military.009.a: "我们擅长于当开拓者"
 ENG_military.010.t: "月球危机"
 ENG_military.010.d: "由于目前未知的原因，居住舱已经破裂并“爆炸”。需要立即采取严格措施。\n\n一个小时前，所有12名科学家都在履行他们各自的职责，突然，居住舱发生了巨大的破裂。\n\n由于声波无法在真空中传播，所以直到他们亲眼看到前，大多数人都没有意识到发生了什么。\n\n作为预算的一部分，该项目有一个应急基金以应对所有的紧急情况，所以无需为这个项目拨出更多的资金。科学家们可以居住在其他与破损模块隔离的模块中；然而，这吓坏了许多人，这件事情表示我们的几个、许多甚至所有的科学家都存在死亡的几率，这件事情也降低了科学家们的士气，因为他们随时可能会死。因此，试图在月球上继续前哨，将付出巨大的政治代价，由于士气的消磨，可能需要立刻而不是以后进行科学家的轮换。\n\n我们该怎么做？"
 ENG_military.010.a: "紧急援助他们！"
 ENG_military.010.b: "放弃计划吧。它对我们不重要"
 ENG_military.011.t: "殖民地进一步发展"
 ENG_military.011.d: "我国月球前哨站取得重大突破，成功将极具核聚变潜力的氦-3气体运送回地球，而地面科学家已掌握其聚变技术！更令人振奋的是，此次聚变产生的能量值已接近反应触发所需能耗。这意味着通过技术优化，人类即将叩开可控核聚变能源的大门！这项突破不仅将在地球带来巨大效益，其衍生技术更有望拓展至其他聚变材料应用领域，还能直接应用于月球基地建设——未来我们建立的将是永久性驻月基地，而非临时性移动前哨！\n\n所有进展远超既定时间表，令UKSC众多专家始料未及，现有初代月球基地的架构已无法承载新技术应用。为此，我们需要选址建设二代月球基地，新址将比现有基地更具快速拓展优势。现在，是时候正式开启二代月球基地的建设征程了。"
 ENG_military.011.a: "生活还得继续啊"
 ENG_military.012.t: "又一场月球危机"
 ENG_military.012.d: "现在必须采取更严厉的措施。又有两个模块破裂了。这次是食品模块和生活设施模块。\n\n大约四十分钟前，一名科学家正准备进入食物舱时，食物舱突然爆炸。科学家安然无恙，除了植物外，无人受伤。然而，食物舱紧邻生活设施舱，爆炸导致生活设施舱破裂并爆炸。同样，无人受伤。\n\n然而，这次新的爆炸事件引起了许多地球人的担忧，他们开始质疑这些舱段的安全性。上次爆炸后，英国航天中心更换了舱段，确保它们不会再次爆炸，但似乎长时间的压力会导致舱段更容易破裂。英国航天中心已迅速做出反应，下令立即制造新的舱段，并对所有现有舱段进行彻底检查（因为目前无法从月球上“召回”舱段）。\n\n由于国内要求在所有安全隐患消除之前停止该项目的压力越来越大，月球基地计划的继续推进前景堪忧。除了政治阻力之外，紧急资金也被削减了一半，因此英国航天局正在申请额外50亿美元以应对未来的安全隐患。是否继续推进该计划，最终取决于您的决定。"
 ENG_military.012.a: "给他们更多紧急援助！"
 ENG_military.012.b: "我们不能再这么做了"
 ENG_military.013.t: "二代月球基地"
 ENG_military.013.d: "根据当前计划，我国科学家与工程师团队需向月球极区的另一处选址迁移。相关迁移成本已在长期预算中完成规划，暂无需为该项目追加新的资金投入。\n\n借助这一全新的月球基地，我们将能运用最新科研成果实现永久性驻留——这与先前临时性基地有着本质区别。通过采用更先进的火箭技术、更高效的能量生成系统、更精准的冰层提取与分离工艺，这座坐落于更适宜快速拓展区域的新基地，将有力推动月面殖民开发进程。捷报不仅于此：众多企业家和商业机构正纷纷涌向UKSC，迫切希望将其新研发的采矿系统部署月球。国际其他航天机构也对建立月球科研与采矿前哨表现出浓厚兴趣。然而，正是得益于您的勤勉奋斗，我国不仅赢得了显著先发优势，更成为当前唯一切实推进月球殖民计划的国家。\n\n月球的未来必将光明璀璨，且必将闪耀华夏之光。"
 ENG_military.013.a: "终于可以在月球上享用下午茶了！"
 ENG_Moonbase_beta_completed: "月球基地二期已经完成"
 ENG_Mars_Colony_tt: "随着时间的推移，我们的火星殖民点可能会遇到可能危及它的挑战或危机。然而，如果成功的话，回报也是巨大的。\n"
 ENG_military.014.t: "火星探测器任务"
 ENG_military.014.d: "我们的科学家和工程师已准备就绪，即将向火星发射探测车。这辆探测车总共安装了约14个传感器，以及价值数千万美元的设备。由于火星日相当于地球的1.2天，电池难以在火星上长时间维持电力储存，探测车需要定期移动。\n\n探测车将部署在火星极地地区，便于灵活移动，以最大限度利用太阳能电池板。此外，我们将开展实验以确定火星上的长期生存条件。冰层开采不仅能提取液态水用于植物培育，为未来火星宇航员提供食物来源，还能通过分解获得氧气和氢气——这些正是火箭燃料的组成部分。\n\n相关研究可能需要数月乃至数年时间。在此期间，我们将利用项目资金建造环火星轨道补给站，以便更便捷地抵达火星，并为返回地球的航行补充燃料。\n\n所有这些目标都可在未来十年内实现。而现在，正是启程的最佳时刻。"
 ENG_military.014.a: "发射！"
 ENG_military.015.t: "火星殖民计划"
 ENG_military.015.d: "如果人类想要殖民火星，就必须建立一个能够自我维持的永久基地。这是无数太空探索者的梦想，也是人类踏足太空的必由之路。这一切今天都将成为现实。"
 ENG_military.015.a: "火星，我们来了！"
 ENG_military.016.t: "着陆系统出现故障"
 ENG_military.016.d: "经过近6000万公里的漫长旅程，我们的探测器终于出现在火星上空。火星表面遍布的氧化铁呈现出红色。这颗长期以来只能通过透镜观测到的星球，如今已清晰可见。\n飞船进入着陆模式。在模拟器上练习过无数次的舰长下达了指令，但着陆装置似乎出现了故障。此时，舰长的额头上瞬间渗出了大颗大颗的汗珠。"
 ENG_military.016.a: "伦敦，我们有麻烦了。"
 ENG_military.017.t: "载具故障"
 ENG_military.017.d: "经过惊心动魄的半小时，探测器终于摆脱了坠毁的危险，歪斜地降落在火星乌托邦平原上。这里也是之前“猎犬”号火星车的着陆点。它被认为是火星乃至太阳系中最大的撞击盆地，直径估计达3300公里。 \n着陆后，宇航员将转移到一辆特制的探测车上，前往平原南部建立基地。但此前飞船着陆产生的震动似乎对探测车造成了一定影响。显然，这种情况的发展对宇航员来说并非十分有利。"
 ENG_military.017.a: "我们这些该死的车今天好像出了点问题。"
 ENG_military.018.t: "到达基地"
 ENG_military.018.d: "40公里，这是人类首次在地球以外的行星完成如此长距离的行进。这段在地球上平平无奇的路程，却成为人类航天史上的突破性足迹。\n经历搭建营地、传输所有必要数据回地球、检测全部设备参数的紧张流程后，坐在床沿的指令长终于能喝上一口热茶。\n透过头顶透明合成材料制成的舷窗，星海中的一个光点正泛着淡蓝色的微光——那便是地球。\n\n“好多了。”指令长低声自语道。"
 ENG_military.018.a: "好饭不怕晚。"
 ENG_military.019.t: "着陆成功"
 ENG_military.019.d: "一切完美如预期，飞船精准降落在预定着陆点，人类的火星之旅平静地开始了。\n"
 ENG_military.019.a: "我就知道我们的人一定可以完成任务。"
 ENG_military.020.t: "到达基地"
 ENG_military.020.d: "飞船的着陆点是预设的基地地址，队员们开始就地扎营，为建造人类第一个火星永久基地做准备。没有人注意到太空靴在火星土壤上留下了无数凌乱的脚印。"
 ENG_military.020.a: "火星上的一小步，人类的一大步。"
 ENG_military.021.t: "寻找水源"
 ENG_military.021.d: "水是人类生存的重要资源。此前火星探测活动的主要目的之一就是寻找火星上的水源。虽然没有像地球一样的地表湖泊或河流，但火星的水资源基本以冰的形式存在于火星表面之下。\n但实际的精确定位需要专人亲自进行现场勘察。"
 ENG_military.021.a: "离了茶我们可没得活！"
 ENG_military.022.t: "地下辐射防护"
 ENG_military.022.d: "由于火星大气层稀薄且缺乏行星磁场，来自太空的辐射可以毫无阻碍地到达火星表面。基地刚建成时无法提供足够的庇护，所以挖地窝子就成了避免辐射的首选。\n亲眼目睹英国建立新基地的自豪感，让船员们想起了大英帝国的辉煌岁月。"
 ENG_military.022.a: "不列颠尼亚统治太空"
 ENG_military.023.t: "火星上的第一次收获"
 ENG_military.023.d: "水源问题已经解决，能源暂时由太阳能提供。 因此，在火星上生产食物（和茶叶）就成了目前最重要的事情。\n传统的谷类作物因其生长周期和收获过程而被排除在外，而土豆成为人类在火星上种植的第一种作物。虽然火星由于距离太阳较远，光照没有地球丰富，但温室里的土豆似乎长得更加茂盛。人类在火星上的第一次收获指日可待。"
 ENG_military.023.a: "全天然，有机，火星种植的土豆。"
 ENG_military.024.t: "沙暴"
 ENG_military.024.d: "沙尘暴在火星上很常见。虽然火星上的气压比地球低很多，但火星风暴并不像之前传说中那样具有毁灭性，就像那部电影中那样。\n但扬起的尘埃仍然给人类基地带来不少隐患，尤其是太阳能是目前基地不可或缺的能源。"
 ENG_military.024.a: "我们没有机会在这里拯救马特·达蒙。"
 ENG_military.025.t: "意外"
 ENG_military.025.d: "上得山多终遇虎。火星沙尘暴的持续时间远比之前预期的要长，基地内部的电池寿命似乎处于非常悲观的境地。\n为了继续火星殖民任务，我们需要做出决定，选择撤离并寻找新的地点，还是继续修复受损的设施。"
 ENG_military.025.a: "撤离"
 ENG_military.025.b: "修复基地"
 ENG_military.026.t: "撤离"
 ENG_military.026.d: "我们不能再等了。 现在情况非常危急，是时候动用备用火箭进行撤离了。检查完所有队员都安全登船后，指令长恋恋不舍地回头看向还在建设中的基地建筑。他压下心中的悲痛，向人工智能导航下达了发射飞船的命令。\n“我们会回来的！”随着一阵巨大的烟雾升起，飞船脱离了火星地面，缓缓升上了天空。"
 ENG_military.026.a: "留得青山在，不愁没柴烧。"
 ENG_military.027.t: "修复受损基地"
 ENG_military.027.d: "我们不能坐以待毙，必须不惜一切代价立即开始修复基地，否则我们在火星上取得的一切成果都将付诸东流，同时没有人能够在这场混乱中幸存。拯救基地就等于拯救我们自己。"
 ENG_military.027.a: "为有牺牲多壮志，敢教日月换新天。"
 ENG_military.028.t: "火星城市计划"
 ENG_military.028.d: "我们在建设火星殖民地方面取得了杰出成就。但距离最终实现我们的目标还有一段距离。我们还要继续投资火星建设吗？"
 ENG_military.028.a: "升级"
 ENG_military.028.b: "我们不需要这些"
 ENG_military.029.t: "是"
 ENG_military.029.d: "只要我们再向前迈出一步，我们的火星使命就将彻底完成。我们的字典里没有半途而废这个词。"
 ENG_military.029.a: "不要把责任推给下一代。"
 ENG_military.030.t: "不"
 ENG_military.030.d: "目前的火星基地已经足够完整，继续加大投入是不明智的。我们在地球上还有很多问题要面对，光把钱扔到太空是不可能的。"
 ENG_military.030.a: "相信后人的智慧"
 ENG_military.031.t: "火星城市完工"
 ENG_military.031.d: "经过不懈努力，我们在火星上的殖民地终于建设完成。人类永远不会忘记这些努力，终有一日，人类将踏足整个银河。"
 ENG_military.031.a: "我们的征途是星辰大海。"
 ENG_military.032.t: "建立新的分基地"
 ENG_military.032.d: "随着更多的飞船带来了更多的人员和物资，原本的火星基地开始繁荣起来。原先基地下的水资源已经无法承载更多的人，急需建立新的分基地。\n随着第一支队的飞船逐渐消失在视线中，这位前指令长、今天的第一新伦敦市市长回忆起了火星车掉进壕沟里的往事。"
 ENG_military.032.a: "妈妈我今天要远航。"
 ENG_military.033.t: "火星城市纪念碑"
 ENG_military.033.d: "随着人类穿越火星，火星也成为了地球上人类的新家园。火星改造工作正在有条不紊地进行。 在人类飞船的第一个着陆点，修建了一座巨大的纪念碑，纪念在征服火星过程中的旅程和建设中牺牲的男男女女。他们将永远铭刻在人类文明的征程上。"
 ENG_military.033.a: "为了人类！"
 ENG_mars_city_building_completed: "火星城市已经竣工"
 ENG_military.001.t: "启动小行星采矿计划"
 ENG_military.001.d: "小行星采矿一直是我们之前很多人的幻想。小行星本身就蕴藏着人们非常想要的铂族金属、金、银以及铁族金属。对于任何一个航天国家来说，这都可能成为极为丰厚的利润。所以，今天英国皇家小行星采矿公司的成立，将标志着小行星采矿迈出了第一步。我们将利用遍布帝国的庞大望远镜阵列，在近地外太空寻找合适的小行星，然后将其拖入轨道进行开采。发现一颗合适的小行星会很困难，因为相对于它们与Sól III所处的距离，它们非常小。幸运的是，其实有不少小行星每隔一段时间就会经过地球，所以要想让一颗小行星停留在地球的轨道上，并不需要很长时间。"
 ENG_military.001.a: "只需要等小行星经过就行了..."
 ENG_military.002.t: "发现小行星"
 ENG_military.002.d: "最近，我们英国皇家小行星采矿公司的科学家们发现一颗合适的近地小行星正从地球附近经过。这让英国皇家小行星采矿公司松了一口气，因为有人怀疑我们是否真的能发现一颗合适的、经济的小行星。然而，这颗小行星的移动速度够慢，体积够大，而且富含丰富的物质，可以移入轨道进行开采。事实上，这颗小行星的体积，比纽约州还要大。下一步只需将这颗小行星移入环绕地球的轨道即可，这在以前从未有人做过。与此同时，英国宇航中心的工程师，甚至像维珍银河这样的私人企业，都发明了开采小行星的方法，所以在小行星进入轨道的时候，他们会做好准备。"
 ENG_military.002.a: "让我们把它带到轨道上来吧"
 ENG_military.003.t: "轨道上的小行星"
 ENG_military.003.d: "随着这颗小行星进入轨道，英国航天中心和维珍银河公司都向其发射了探测任务。英国航天中心主要关注收集科学数据，而维珍银河则更侧重于开采小行星上的物质。毫无疑问，这是一项意义非凡的成就，使我们在太空领域占据了优势。甚至有人提议探测更多的小行星，但许多人认为，由于这颗小行星体积庞大，非常适合开采，所以可以稍后再探测其他小行星。其他国家已经开始羡慕我们，并考虑开展自己的小行星采矿计划。即使仅仅是研发到达那里所需的技术，成本也极其高昂，因此维珍银河和英国航天中心并不担心会面临竞争。"
 ENG_military.003.a: "采矿即将开始"
 ENG_military.004.t: "采矿的利润开始产出"
 ENG_military.004.d: "维珍银河和英国航天中心在建立采矿作业后，都已将首批太空材料运回全球各地的实验室和市场。世界各国都对我们羡慕不已，并在各自的立法机构中公开讨论开展自己的小行星采矿作业。虽然我们可能很快就会面临竞争，但目前我们仍可享受垄断地位。"
 ENG_military.004.a: "我高兴极了！"
 ENG_military.005.t: "小行星采矿的收益"
 ENG_military.005.d: "小行星开采行动的最新货物已经送来了，这能产生很多利润。货物里有铂、金和银。我们应该好好利用这些收益。"
 ENG_military.005.a: "棒极了！"
 ENG_military.006.t: "小行星采矿的潜在价值"
 ENG_military.006.d: "最近，下议院允许了英国宇航中心和一家私人航天公司维珍银河将一颗相当大的小行星带入地球轨道并对其进行开采。我们的顾问建议我们对这个可以使稀有材料直接运送到我们的国家新领域进行投资。但是，有些人以英国在项目开始阶段就不得不支付的巨额账单为由来反对向太空扩张。投资该项目的收益目前还不清楚，但要达到收支平衡可能需要25年。加大投资可以减少这一损失，但在相当长的一段时间内，我们将远远落后于其他国家。\n\n对于这个小行星开采项目我们应该怎么办？启动这个国家项目还是完全忽略它？"
 ENG_military.006.a: "投资小行星采矿业"
 ENG_military.006.b: "贵得离谱！这简直是浪费时间"
 Mobile_Fires_Platorm_Program.1.t: "移动火力平台计划选项"
 Mobile_Fires_Platorm_Program.1.d: "冷战结束后，随着人们对德国平原冲突的预期减弱，陆军的155毫米火炮系统库存减少。如今，随着新的威胁出现，国防部决定采取措施恢复这一能力。众多项目和合作伙伴纷纷提出履行合同，但最终只有一家能够胜出。"
 ENG_military.034.a: "弓箭手火炮联盟"
 ENG_military.034.b: "K9A1 雷霆开发小组"
 ENG_military.034.c: "拳师犬项目"
 ENG_military.034.e: "恺撒合作"
 ENG_military.035.t: "英国邀请我们加入联合远征军"
 ENG_military.035.d: "英国诚挚邀请[Receiving Country]加入联合远征军。联合远征军是一项旨在促进国际合作、加强集体安全的合作倡议。这一重要举措标志着我们在促进稳定、应对全球挑战和捍卫我们珍视的价值观方面开启了新的篇章。"
 ENG_military.035.a: "我们加入！"
 ENG_military.035.b: "不用了，老兄。"
 ENG_military.036.t: "[From.GetName]同意！"
 ENG_military.036.d: "[From.GetName]将加入我们的联合远征军。我们携手合作，可以使我们的军队做好快速反应的准备。"
 ENG_military.036.a: "欢迎"
 ENG_military.037.t: "[From.GetName]拒绝！"
 ENG_military.037.d: "[From.GetName]不会加入我们的联合远征军。他们更倾向于独立行动。"
 ENG_military.037.a: "随着时间的推移，他们会后悔的。"
 ENG_military.038.t: "达特茅斯海军学院扩建"
 ENG_military.038.d: "达特茅斯海军学院注重尖端技术、战略思维和实践经验，将在塑造下一代海军领导人方面发挥关键作用。"
 ENG_military.038.a: "航空母舰是未来海战的发展方向"
 ENG_military.038.b: "我们需要驱逐舰和巡洋舰来击败海上敌人。"
 ENG_military.040.t: "“台风” T1论争"
 ENG_military.040.d: "包括军方官员、国防分析人士和政府代表在内的利益相关方就该型战机应对不断演变的威胁的有效性、其在国家防御战略中的作用以及其出口到国际伙伴的潜力展开讨论。“台风”战斗机第一批次辩论在制定与该先进战斗机的采购、部署和未来发展相关的决策方面发挥着至关重要的作用。"
 ENG_military.040.a: "继续生产"
 ENG_military.040.b: "研究其后续产品"
 ENG_military.040.c: "减少库存"
 ENG_military.039.t: "武装部队专业化"
 ENG_military.039.d: "选择你的专业化方向"
 ENG_military.039.a: "陆军"
 ENG_military.039.b: "空军"
 ENG_military.039.c: "海军"
 ENG_military.039.e: "参谋"
 ENG_military.041.t: "英国邀请我们购买他们用于飞机的创新产品"
 ENG_military.041.d: "英国对其飞机和航空工业能力进行了巨额投资。由于我们之间的特殊关系，他们愿意以较低的价格分享他们的创新成果。毕竟，他们是英国人。"
 ENG_military.041.a: "创新？当然好！"
 ENG_military.041.b: "不用了，老兄。"
 ENG_military.042.t: "英国邀请我们购买他们用于飞机的创新产品"
 ENG_military.042.d: "英国对其飞机和航空工业能力进行了巨额投资。由于我们之间的特殊关系，他们愿意以较低的价格分享他们的创新成果。毕竟，他们是英国人。"
 ENG_military.042.a: "创新？当然好！"
 ENG_military.042.b: "不用了，老兄。"
 ENG_military.043.t: "美国接受了"
 ENG_military.043.d: "美国接受了我们出售这项创新技术的提议。"
 ENG_military.043.a: "不出所料"
 ENG_military.044.t: "美国拒绝了"
 ENG_military.044.d: "美国拒绝了我们的创新销售方案。他们认为英国并非他们需要的合适合作伙伴。"
 ENG_military.044.a: "他们最终会重新考虑"
 United_Kingdom.002.t: "硅谷交付"
 United_Kingdom.002.d: "我们在苏格兰硅谷的投资正在取得回报。当地大学、芯片设计公司和软件公司报告称，又一年保持增长，获得了新的专利，并且源源不断地有高技能毕业生涌入更广泛的经济领域。"
 United_Kingdom.002.a: "让硅谷继续开拓疆界"
 United_Kingdom.003.t: "跨境合作提案"
 United_Kingdom.003.d: "英国已向我们提出一项建议，旨在改善我们共同边境的贸易物流并减少官僚主义作风。该建议的合作框架侧重于基础设施对接、简化海关手续以及设立联合监管委员会。\n\n我们应该接受吗？"
 United_Kingdom.003.a: "接受框架"
 United_Kingdom.003.b: "拒绝提议"
 United_Kingdom.004.t: "爱尔兰接受跨境合作"
 United_Kingdom.004.d: "爱尔兰政府已接受我们提出的简化跨境经济协调方案。相关委员会已成立，旨在减少繁文缛节，统一标准，并促进货物更顺畅地跨越爱尔兰海和陆地边界。"
 United_Kingdom.004.a: "通过合作取得进展"
 United_Kingdom.005.t: "爱尔兰拒绝跨境提议"
 United_Kingdom.005.d: "尽管最初表现出兴趣，但爱尔兰政府最终决定不参与我们的跨境合作框架。官员们指出，法律上的复杂性和政治上的犹豫是拒绝的主要原因。"
 United_Kingdom.005.a: "遗憾，但也在意料之中"
 scottish.1.t: "苏格兰议会选举"
 scottish.1.d: "苏格兰议会选举结果已经出炉，我们终于可以看到苏格兰人民是否投票支持独立政党了。"
 scottish.1.a: "好的"
 britain_md.1.a: "那我们赶紧出发吧"
 britain_md.2.a: "我们会抓住机会。"
 britain_md.2.b: "我不喜欢这样的赔率。"
 britain_md.3.a: "向工会发出呼吁"
 britain_md.3.b: "诉诸军工复合体"
 britain_md.3.c: "向化石燃料行业发出呼吁"
 britain_md.4.a: "对工业家征税"
 britain_md.4.b: "对军方征税"
 britain_md.4.c: "对化石燃料行业征税"
 britain_md.4.d1: "我们真的需要向什么人征税吗？"
 britain_md.5.a: "前进！"
 britain_md.6.d: "我们的基础设施亟需升级。这并非全然是坏事，但为了与全球竞争对手抗衡，我们需要扩建城市。然而，我们不会仅仅着眼于大范围的基础设施扩张，而是会选择一个特定区域进行重点发展。这样，我们就能打造新的投资中心，并促进这些地区的繁荣发展。"
 britain_md.6.a: "北部的工作"
 britain_md.6.b: "中部的工作"
 britain_md.6.c: "南部的工作"
 britain_md.7.a: "让我们开工吧"
 britain_md.8.a: "它们之间肯定没有联系！移民没问题。"
 britain_md.8.b: "数据不会说谎"
 britain_md.9.a: "时间紧迫，我们赶紧开始吧。"
 britain_md.10.a: "我们来稍微改变一下吧。"
 britain_md.10.b: "绝对不行"
 britain_md.11.a: "好，现在我们继续。"
 britain_md.12.a: "好的"
 britain_md.12.b: "不"
 britain_md.13.a: "好的"
 britain_md.14.a: "杂种"
 britain_md.15.a: "好的"
 britain_md.16.a: "这是一场软政变，我们不会寻求进一步的控制。"
 britain_md.16.b: "一场强硬政变，我们将推动建立一个卫星国。"
 britain_md.17.a: "很好"
 britain_md.18.a: "该死"
 britain_md.19.a: "很好"
 britain_md.20.a: "不出所料"
 britain_md.21.a: "胡说！但我们又能怎么办呢？"
 britain_md.21.b: "胡说！动员军队！"
 britain_md.22.a: "现在已没有回头路了。"
 britain_md.22.b: "等等，如果我们把它还回去呢？"
 britain_md.23.a: "恐惧真的能控制你吗？"
 britain_md.24.a: "英国的雄心壮志"
 britain_md.24.b: "英国向前走，莫回头"
 britain_md.24.c: "全民共享的美好未来"
 britain_md.24.a1: "回归常识"
 britain_md.24.b1: "你也在想我所想？"
 britain_md.24.c1: "致英国政府的邀请"
 britain_md.25.a: "动手吧！"
 britain_md.26.a: "重点关注岛屿一体化"
 britain_md.26.b: "我们必须进一步向西推进。"
 britain_md.26.c: "归还岛屿"
 britain_md.27.t: "英国归还福克兰群岛"
 britain_md.27.d: "令人震惊的是，曾在上世纪80年代与我们争夺福克兰群岛的[ENG.GetName]国，竟然决定将这些岛屿归还给我们。我们不知道是什么促使他们这样做，也不知道他们为什么要这样做，但我们的部队已经向该岛集结完毕，准备驻扎。英国政府声称，此举是为了“改善”与我们以及整个南美地区的关系。"
 britain_md.27.a: "听起来对我们不错！"
 britain_md.28.t: "津巴布韦政权更迭行动成功"
 britain_md.28.d: "在推翻津巴布韦独裁者的行动之后，变革运动党已由我方部队扶植上台。此前，英国特种部队经过周密计划和行动，推翻了该国长期执政的政权。"
 britain_md.28.a: "很好，我们对此毫不意外。"
 britain_md.29.t: "[ENG.GetName]发动政变！"
 britain_md.29.d: "看来[ENG.GetName]在我国进行了一次秘密行动，导致前政权垮台，新政府上台。军方事先已接到通知，甚至为英国军队秘密进入我国铺平了道路。"
 britain_md.29.a: "啥？"
 britain_md.30.t: "即将展开东部分隔行动"
 britain_md.30.d: "目前埃及完全控制着西奈半岛，多年来与以色列之间偶有冲突。然而，我国迫切需要更高效的贸易路线，每次途经苏伊士运河都要缴纳高额税款，这笔费用已经累积到难以承受的地步。我们必须与埃及达成协议，否则将被迫采取进一步行动。"
 britain_md.30.a: "让我们开始谈判吧。"
 britain_md.30.b: "没有谈判时间，立即行动。"
 britain_md.31.t: "英国要求共同控制西奈半岛"
 britain_md.31.d: "英国政府已派遣外交官前往[EGY.capital.GetCapitalVictoryPointName]会见我方大臣，商讨在西奈半岛实行联合管辖的可能性。他们表示，英国的船只和商船受到了极不公平的待遇，同意联合管辖将表明我方政府值得信赖。"
 britain_md.31.a: "在我们离开西奈半岛之前，所有埃及人都会死去！"
 britain_md.31.b: "或许我们可以想个办法……"
 britain_md.32.t: "埃及拒绝谈判"
 britain_md.32.d: "埃及方面已表明，他们无意与我们就苏伊士运河控制权进行谈判，即便这意味着我们愿意做出重大让步。我们别无选择，只能考虑军事干预。"
 britain_md.32.a: "现在是时候前进了"
 britain_md.32.b: "算了吧"
 britain_md.33.t: "埃及提出谈判"
 britain_md.33.d: "埃及方面同意了我们关于西奈半岛谈判的要求，并要求支付一笔现金，以便通过西奈半岛直接进行军事和商业活动，同时享受较低的税收。"
 britain_md.33.a: "听起来对我们不错"
 britain_md.33.b: "真的吗？这是侮辱！"
 britain_md.34.t: "东部分隔行动：进行中"
 britain_md.34.d: "东部分隔行动目前正在进行中，部队已在西奈半岛登陆。我们必须开始动员更多兵力，以便开展更大规模的行动。"
 britain_md.34.a: "冲，冲，冲！"
 britain_md.35.t: "[FROM.GetName]呼吁更深层次的整合"
 britain_md.35.d: "[ENG.GetName]呼吁深化一体化，声称通过放弃部分主权，我们将能够团结力量，再次成为全球强国。尽管许多公民对这一提议持谨慎态度，但近年来，[ENG.GetName]在各个领域都超越了我们，证明了自身强大的竞争力。"
 britain_md.35.a: "我们必须团结"
 britain_md.35.b: "我们绝不会放弃我们的主权。"
 britain_md.36.t: "[FROM.GetName]寻求更深入的整合"
 britain_md.36.d: "[FROM.GetName] 已表明其确实有意进行更深层次的整合，并提出了若干合并核心官僚机构和部门的路线图。我们的外交官和官员正在加班加点地工作，以确保平稳、安全、稳定的过渡。"
 britain_md.36.a: "很好"
 britain_md.37.t: "[FROM.GetName]拒绝进一步整合"
 britain_md.37.d: "看来[FROM.GetAdjective]政府对进一步一体化不感兴趣，反而坚持认为我们最近的举措侵犯了他们的主权。"
 britain_md.37.a: "好的"
 britain_md.38.t: "王室审判"
 britain_md.38.d: "是时候将贪婪、暴食、毫无用处的皇室家族绳之以法了。我们将由国家任命的法官（以及人民，间接地）来决定这些罪犯的命运，他们几个世纪以来除了挥霍国家资源购买奢侈的物质享受之外，什么也没做。"
 britain_md.38.a: "流放，我们不能太鲁莽。"
 britain_md.38.b: "终身监禁!"
 britain_md.38.c: "法国人有一些不错的想法……"
 britain_md.39.t: "选举傀儡领袖"
 britain_md.39.d: "我们虽然理解将某种权力赋予另一位政治人物的后果，但也必须认识到，我们需要一位能够安抚民众的代表，因为他们已经厌倦了由军方领导人掌权。我们会迅速找到一个傀儡来代表国家。"
 britain_md.39.a: "把那个傻瓜法拉奇放进去"
 britain_md.39.b: "找到格里芬的藏身之处"
 britain_md.39.c: "迈克尔·霍姆斯在吗？"
 britain_md.39.d1: "军队会很好地为我们服务的。"
 british_flavor.1.t: "日产汽车寻求在桑德兰附近扩建工厂"
 british_flavor.1.d: "日本汽车制造商日产计划扩建其位于桑德兰的工厂，以生产即将上市的新一代阿尔梅拉掀背车和轿车。政府官员担心，此次扩建可能会使当地工厂和本土汽车制造商更难与之竞争。"
 british_flavor.1.a: "批准"
 british_flavor.1.b: "不，我们不能让这种事发生。"
 british_flavor.2.t: "引渡奥古斯托·皮诺切特"
 british_flavor.2.d: "医学证据表明，智利前独裁者奥古斯托·皮诺切特不适合接受审判。由于这项调查，要求将这位前独裁者遣返回智利的呼声日益高涨。但与此同时，也有人呼吁继续在英国对他进行审判。"
 british_flavor.2.a: "把他送回去"
 british_flavor.2.b: "他必须得留下来"
 british_flavor.3.t: "索尔威收割者沉没"
 british_flavor.3.d: "据报道，“索尔威收割者”号在马恩岛附近海域遭遇巨浪沉没。另据报道，船上11名船员全部遇难，该船虽可打捞，但损毁严重。"
 british_flavor.3.a: "我们以后再考虑这个问题吧。"
 british_flavor.3.b: "找到遇难船员的遗体并安排葬礼"
 british_flavor.4.t: "阿里亚纳阿富汗航空公司遭劫持"
 british_flavor.4.d: "一群阿富汗劫机者登上了一架飞机，迫使其偏离航线前往[ENG.GetName]，最终降落在伦敦。当局正准备派遣一支小部队与劫机者对峙，但事后如何处置他们尚不得而知。"
 british_flavor.4.a: "逮捕他们，然后驱逐出境。"
 british_flavor.4.b: "逮捕他们，然后送上法庭受审！"
 british_flavor.5.t: "恶意收购国民西敏寺银行"
 british_flavor.5.d: "一家苏格兰银行目前正试图恶意收购英格兰国民西敏寺银行。苏格兰皇家银行目前规模较小，其收购能否成功很大程度上取决于另一家银行 - 苏格兰银行 - 提出的收购要约。"
 british_flavor.5.a: "这不是我们的问题"
 british_flavor.5.b: "拯救银行"
 british_flavor.6.t: "宝马宣布计划出售罗孚集团"
 british_flavor.6.d: "德国汽车制造商宝马宣布计划出售罗孚集团，总部位于伦敦的炼金术伙伴财团被认为是主要收购目标。虽然此次收购可能会提升我们在汽车领域的影响力，但在这个日益脆弱的汽车市场中，最终也会增加我们的负担。"
 british_flavor.6.a: "我们没意见"
 british_flavor.6.b: "或许他们应该重新考虑一下……"
 british_flavor.7.t: "戴维·特林布尔赢得阿尔斯特统一党领导人选举"
 british_flavor.7.d: "戴维·特林布尔赢得了阿尔斯特统一党（一个支持统一的政党，也是英国历史第三悠久的政党）的党魁选举。他的胜利受到保守派的庆祝，而那些希望获得更大自治权的人则像往常一样，要么对结果漠不关心，要么感到不满。"
 british_flavor.7.a: "恭喜胜者"
 british_flavor.8.t: "移民和庇护法案"
 british_flavor.8.d: "移民和庇护法案目前正在讨论中，如果最终获得通过，所有难民和移民都将有权获得代金券，用于支付食品和衣物费用。否决这项法案或许有些不人道，但最终会导致英国纳税人承担更高的成本。"
 british_flavor.8.a: "批准"
 british_flavor.8.b: "否决"
 british_flavor.9.t: "议会广场爆发反资本主义骚乱"
 british_flavor.9.d: "反资本主义暴徒走上街头，损毁了英国前首相温斯顿·丘吉尔的雕像。这场暴乱被称为“五一节”暴乱，人群似乎没有散去的迹象。一些人呼吁采取行动，而另一些人则表示他们最终会感到疲惫并回家。"
 british_flavor.9.a: "我们等等看。"
 british_flavor.9.b: "派出清理人员和警察"
 british_flavor.10.t: "[ENG.GetLeader]在妇女协会遭到嘲讽"
 british_flavor.10.d: "[ENG.GetLeader]在妇女协会遭遇冷遇，被愤怒的成员们起哄和慢吞吞地鼓掌。这次尴尬的遭遇引发了党内成员和公众对领导层某些方面的质疑。"
 british_flavor.10.a: "无视它"
 british_flavor.10.b: "回应批评"
 british_flavor.11.t: "苏格兰寻求废除第28条"
 british_flavor.11.d: "苏格兰议会正寻求废除备受争议的1988年地方政府法案第28条，该条款禁止地方当局“传播同性恋”。允许他们废除这项法律可能会引发其他地区也效仿，从而造成政治动荡。"
 british_flavor.11.a: "制止他们"
 british_flavor.11.b: "我们不在乎"
 british_flavor.12.t: "亚历克斯·萨尔蒙德辞去苏格兰民族党职务"
 british_flavor.12.d: "亚历克斯·萨尔蒙德因与苏格兰民族党在党内财务策略上存在分歧而辞去党魁职务。他的辞职为我们提供了一个趁苏格兰民族党虚弱之际攻击该党的机会，从而加剧其内部的分裂。"
 british_flavor.12.a: "我们最好什么都不做。"
 british_flavor.12.b: "发动政治攻击"
 british_flavor.13.t: "最后的八十"
 british_flavor.13.d: "作为北爱尔兰和平进程的一部分，已安排释放梅兹监狱最后80名囚犯。这些囚犯要么是爱尔兰民族解放军成员，要么与该组织关系密切。1997年曾发生过一起事件，这些囚犯杀害并枪击了一名效忠派志愿部队领导人。"
 british_flavor.13.a: "或许我们会留下它们……"
 british_flavor.13.b: "好吧，让他们就走吧。"
 british_flavor.14.t: "保尔斯格罗夫庄园爆发骚乱"
 british_flavor.14.d: "在普罗茨茅斯保尔斯格罗夫庄园，一百多人围攻了一栋公寓楼，据称该公寓楼内藏匿着一名已被定罪的儿童性侵犯者，随后爆发了骚乱。这是自《世界新闻报》发起“点名羞辱”运动以来，针对性侵犯嫌疑人的又一起私刑事件。"
 british_flavor.14.a: "唉，我们对此也无能为力。"
 british_flavor.14.b: "派出警察"
 british_flavor.15.t: "燃油抗议活动爆发"
 british_flavor.15.d: "抗议者封锁了炼油厂入口，试图以此抗议高昂的燃油价格。驾车者开始恐慌性抢购燃油，导致全国燃油短缺，油价持续上涨。据报道，大量加油站因此被迫关闭，政府正紧急寻找解决方案。"
 british_flavor.15.a: "指责化石燃料行业"
 british_flavor.15.b: "强制执行严格的石油使用配额"
 british_flavor.15.c: "§R什么也不做§!"
 british_flavor.151.t: "政府不作为引发骚乱。"
 british_flavor.151.d: "看来，我们在解决燃油短缺问题上的犹豫不决只会进一步激起民众的愤怒，越来越多的人走上街头，要求政府尽快解决问题。目前，抗议者正向政府大楼进发，并破坏政府的雕像、建筑物和标志。"
 british_flavor.151.a: "我们尽力了！"
 british_flavor.152.t: "变革的呼声日益高涨"
 british_flavor.152.d: "民众的决心似乎有增无减，仇恨和愤怒的矛头直指[ENG.GetLeader]和统治集团。此外，要求将王室资金重新分配用于补贴燃油的呼声日益高涨，甚至有人呼吁君主制耻辱地退位。"
 british_flavor.152.a: "荒谬！"
 british_flavor.153.t: "下议院遭纵火"
 british_flavor.153.d: "由于抗议和骚乱已从有组织的公民不服从运动急剧演变为彻底的无政府状态，政府宣布进入紧急状态。愤怒的抗议者纵火焚烧了下议院，警方无力阻止暴徒。有报道称，抗议者计划向其他国家机构进军，但下一个目标尚不清楚。"
 british_flavor.153.a: "主啊......"
 british_flavor.154.t: "女王退位！"
 british_flavor.154.d: "鉴于近期爆发的民众起义和政府持续失职，女王已正式宣布退位，并计划于今天下午晚些时候发表正式讲话。虽然许多人对她的离职感到惋惜，但目前尚不清楚是否会有继任者，因为自抗议活动开始以来，民众对君主制的仇恨与日俱增。"
 british_flavor.154.a: "告别珠宝皇冠和天鹅绒礼服"
 british_flavor.155.t: "[ENG.GetLeader]辞职，没有明确的继任者"
 british_flavor.155.d: "[ENG.GetLeader]已经辞职，他的政党未能迅速找到合适的继任者。这种无政府状态使国家陷入混乱、困惑和脆弱之中。英国从未面临过如此危机，而政府也已表明，它目前无力解决任何问题。"
 british_flavor.155.a: "接下来会发生什么？"
 british_flavor.156.t: "军方夺取控制权"
 british_flavor.156.d: "英国武装部队已宣布直接参与重建政权，一位发言人宣布，任何违反下午4点宵禁的人都将“受到迅速处理”，并声称他们采取的一切行动都将“为了全体英国人的福祉”。这引发了工党和保守党成员的强烈愤慨，他们称此举是篡权，一些人甚至谴责这是向独裁统治的激进转变。然而，政客们在解决国家事务方面依然无能为力，在[ENG.GetLeader]辞职后，目前还没有明确的继任者。"
 british_flavor.156.a: "未来会怎样？"
 british_flavor.157.t: "报告：新政府的状况"
 british_flavor.157.d: "致阁下，[ENG.GetLeader]，\n日期：[GetDateText]\n\n主题一：秩序状况\n阁下，英国武装部队已迅速控制了包括伦敦、伯明翰、曼彻斯特和利物浦在内的主要城市地区。至少目前看来，随着政府开始实施石油补贴和相关计划以帮助国家恢复正常运转，人们似乎正逐渐从人群中散去，开始返回家园。\n\n主题二：来自左翼和右翼的呼吁\n工党和保守党政客已开始呼吁紧急政府启动重建国家民主统治所需的程序，一些政客甚至宣称新政府是威权主义和军方权力过度扩张的象征。一位工党政客甚至表示，“持枪者应该待在基地里，而执笔者应该重返公务员岗位”。\n\n第三部分：进一步巩固\n我们的人员已经开始寻找那些对旧体制不满的政客和官僚，号召他们来取代两党制下的前政客。以这种方式夺取政权几乎肯定会引发某种形式的全国性冲突，但就目前而言，我们没有其他巩固控制的手段。"
 british_flavor.157.a: "很高兴知道"
 british_flavor.16.t: "保守党民调支持率上升"
 british_flavor.16.d: "保守党支持者们得知保守党在MORI民调中以38%的支持率领先工党两个百分点后，纷纷欢呼雀跃。这是自1993年以来，保守党首次在全国民调中领先工党。"
 british_flavor.16.a: "好的"
 british_flavor.17.t: "沃里克郡发生地震"
 british_flavor.17.d: "地震袭击了沃里克郡，造成附近建筑物受损。有人呼吁政府提供援助，帮助重建部分受损建筑，但近来政府预算日益紧张，使得威斯敏斯特议会难以达成一致意见。"
 british_flavor.17.a: "我们只能祈祷一切平安无事了。"
 british_flavor.17.b: "授权政府援助"
 british_flavor.18.t: "唐纳德·杜瓦尔被紧急送往医院"
 british_flavor.18.d: "苏格兰首席大臣唐纳德·杜瓦在位于爱丁堡的官邸布特宫外摔倒后被紧急送往医院。他的健康状况迅速恶化，各界呼吁政府介入，调集高级医疗团队的呼声日益高涨。"
 british_flavor.18.a: "为他祈祷康复"
 british_flavor.18.b: "授权高级医疗队前往救助他"
 United_Kingdom_News.2.t: "英国爆发骚乱"
 United_Kingdom_News.2.d: "由于全国范围内的燃料短缺和汽油价格飙升，英国当局选择等待，希望经济能够自然复苏。然而，情况并未好转，反而愈演愈烈，最终在本周早些时候彻底失控，抗议者纵火焚烧了下议院。英国当局声称他们对燃料短缺不负有责任，并表示这只是自然现象，终将过去。一位抗议者表示：“我的车没油了！我没法去上班，家里也没暖气，我的家人无法取暖。今天发生的一切都是低效的体制和政府造成的。”\n政府一直坚称正在尽一切可能缓解局势，但就目前情况来看，抗议活动并没有停止的迹象。"
 United_Kingdom_News.2.a: "怒火再次爆发"
 United_Kingdom_News.3.t: "伊丽莎白二世女王退位"
 United_Kingdom_News.3.d: "鉴于近期发生的一系列事件，英国女王伊丽莎白二世宣布正式退位。此前，抗议者开始要求废除君主制，并将君主制与腐败、贪婪和无底洞联系起来。更具体地说，此次民众的愤怒指向君主制，是因为人们要求将部分资金重新分配给政府的燃油补贴，然而他们的呼声在威斯敏斯特却无人理睬。目前尚不清楚是否会有其他王室成员继承王位，但就目前的情况来看，君主制只能眼睁睁地看着国家陷入混乱。"
 United_Kingdom_News.3.a: "王座崩塌"
 United_Kingdom_News.4.t: "英国武装部队控制伦敦"
 United_Kingdom_News.4.d: "英国武装部队已正式宣布参与执行政府颁布的紧急状态令，并明确表示任何违反下午4点宵禁的人都将受到“迅速”处置。此前，英国已持续数周爆发抗议和骚乱，抗议者甚至在愤怒之下纵火焚烧了下议院。目前尚不清楚这个新成立的行政机构的意图，但据报道，该机构由军方强人组成，旨在削弱工党和保守党在英国政坛的影响力。"
 United_Kingdom_News.4.a: "联合王国就此终结了吗？"
 ENG_inner_circle.01.t: "[GetAscendingAdvisorName]的崛起"
 ENG_inner_circle.01.desc: "[GetAscendingAdvisorName]展现出了强烈的野心，并在王室内部悄然扩大了自己的影响力。然而，他每一步迈向更大权力的步伐都招致了其他朝臣和高层的反对，如今宫廷里再次上演着一场争夺权力和地位的熟悉斗争。问题是，[GetAscendingAdvisorName]是否已经给女王留下了足够的印象，从而在女王的核心圈子中赢得一席之地。"
 ENG_inner_circle.01.a: "替换[GetAscendedAdvisorName1]"
 ENG_inner_circle.01.b: "替换[GetAscendedAdvisorName2]"
 ENG_inner_circle.01.c: "替换[GetAscendedAdvisorName3]"
 ENG_inner_circle.01.d: "[GetAscendingAdvisorName]不值得使用。"
 ENG_inner_circle_charles.03.t: "王子的和谐访问"
 ENG_inner_circle_charles.03.desc: "威尔士亲王到访，此次访问融合了宫廷外交礼仪和对环境保护的明确承诺。他与高级官员和民间社会领袖的会晤重点在于重建信任、扩大务实合作，并将气候适应能力视为共同的战略利益，而非空谈。"
 ENG_inner_circle_charles.03.a: "让和谐引导我们的关系。"
 ENG_inner_circle_charles.04.t: "查尔斯王子倡导保护热带雨林"
 ENG_inner_circle_charles.04.desc: "我们获悉，威尔士亲王查尔斯王子殿下呼吁全球加大力度保护热带雨林。作为“王子雨林项目”的发起人，他利用自身的影响力与各国政府、企业和民间社会合作，强调制止森林砍伐、保护这些对气候稳定和生物多样性至关重要的生态系统的重要性。"
 ENG_inner_circle_charles.04.a: "我们欢迎查尔斯王子支持雨林保护"
 ENG_inner_circle_charles.05.t: "查尔斯王子的环保主义外交"
 ENG_inner_circle_charles.05.desc: "我们获悉，威尔士亲王查尔斯王子殿下已完成在我国的环境外交访问，倡导在气候、可持续发展和生态韧性方面开展合作。作为数十年来最坚定的环保行动倡导者之一，王子强调各国和各界需要携手合作，共同应对全球环境挑战，并推广可持续的解决方案。"
 ENG_inner_circle_charles.05.a: "支持可持续发展。"
 ENG_inner_circle_charles.06.t: "查尔斯王子倡导有机农业"
 ENG_inner_circle_charles.06.desc: "我们获悉，威尔士亲王查尔斯王子殿下已采取积极措施，支持我国有机和可持续农业的发展。他借鉴了在海格罗夫庄园和公爵府农场数十年来在有机耕作方法方面的开拓性工作，强调了有机耕作方式对环境和社会带来的益处，并鼓励在农业可持续发展方面开展合作。"
 ENG_inner_circle_charles.06.a: "支持可持续农业。"
 ENG_inner_circle_andrew.04.t: "安德鲁王子贸易访问团"
 ENG_inner_circle_andrew.04.desc: "英国安德鲁王子殿下以英国贸易代表的身份访问我国，旨在促进加强两国经贸联系和经济合作。访问期间，他与政府官员、商界领袖和潜在投资者进行了交流，重点介绍了有利于我国和英国两国经济的贸易和投资机遇。"
 ENG_inner_circle_andrew.04.a: "欢迎"
 ENG_inner_circle_andrew.05.t: "贸易协定已签订"
 ENG_inner_circle_andrew.05.desc: "我们欣然宣布，在约克公爵安德鲁王子殿下的主持下，经过近期磋商和谈判，我国与英国已达成新的贸易协定。该协定为加强商业交流、关键产业合作以及互惠互利开辟了新途径，体现了我们两国共同的利益和日益紧密的经济体联系。"
 ENG_inner_circle_andrew.05.a: "同意建立合作关系。"
 ENG_military.045.t: "英国提出的战略伙伴关系请求"
 ENG_military.045.d: "英国实行君主立宪制，致力于与西方合作，已正式申请成为北约主要非盟国。获此殊荣将加强跨大西洋关系，并确保英国在欧洲获得一个关键伙伴。"
 ENG_military.045.a: "批准他们的请求，他们是一位宝贵的盟友。"
 ENG_military.045.b: "拒绝，我们必须谨慎对待此类称谓。"
 ENG_integrate_ireland: "整合[IRE.GetFlag]爱尔兰"
 ENG_integrate_ireland_desc: "经过数十年的努力，我们终于征服并整合了爱尔兰的土地，现在是时候正式确立这一整合进程了。"
 ENG_a_more_united_kingdom_decisions: "统一王国"
 ENG_a_more_united_kingdom_decisions_desc: "随着大英帝国的逐渐衰落和冷战期间的非殖民化，我们的王国也经历了持续的衰落。通过外交手段和霸权扩张，我们将能够再次统一我们的王国。\n\n将鼠标悬停在彩色文字上可查看更多信息。"
 ENG_core_objectives_text: "核心化目标"
 ENG_econ_hegemony_text: "经济霸权"
 ENG_military_hegemony_text: "军事霸权"
 ENG_political_hegemony_text: "政治霸权"
 ENG_declare_economic_hegemony: "宣告经济霸权"
 ENG_declare_economic_hegemony_desc: "现在是我们宣布自己成为英联邦经济霸主的时候了。"
 ENG_declare_military_hegemony: "宣告军事霸权"
 ENG_declare_military_hegemony_desc: "现在是我们宣布自己成为英联邦军事霸主的时候了。"
 ENG_declare_political_hegemony: "宣告政治霸权"
 ENG_declare_political_hegemony_desc: "现在是我们宣布自己成为英联邦政治霸主的时候了。"
 ENG_fractured_kingdom_united_state_decisions: "下一个时代"
 ENG_fractured_kingdom_united_state_decisions_desc: "随着[ENG.GetFlag]英国新政权的建立，我们将能够最终迅速、迅猛、积极地向外扩张我们的影响力。\n\n我们将能够建立一个由我们指挥的私人军事公司，在世界上制造混乱。"
 ENG_grant_land_in_isle_of_man: "马恩岛转型"
 ENG_grant_land_in_isle_of_man_desc: "尽管马恩岛具有重要的历史意义，但如今除了资源开采之外，它对我们的用途微乎其微。然而，如果我们把这片土地授予我们新成立的私人军事公司，他们就能充分发挥潜力，并将其作为开展行动的基地。"
 ENG_devolved_matters: "下放事项"
 ENG_devolved_matters_desc: "我们的各构成国一直在努力争取建立一个更加§H权力下放的国度§!，以便获得名义上的或彻底的独立。三个主要国家，[SCO.GetFlag]§H苏格兰§!，[NIR.GetFlag]§H北爱尔兰§!，[WAS.GetFlag]§H威尔士§!。\n\n如果我们的国家状况恶化，构成国将试图通过法案来减少他们对政府的依赖，而我们可以否决这些法案，但这可能会加剧他们的不满。\n\n随着权力下放的推进，决策将会陆续公布，更多信息可以在屏幕右下角以拼图图标表示的权力下放图形用户界面中找到。\n\n下一次选区选举：[?ROOT.ENG_election_var|Y0]月"
 ENG_appease_scotland: "针对[SCO.GetFlag]苏格兰的定向补贴"
 ENG_appease_nireland: "针对[NIR.GetFlag]北爱尔兰的定向补贴"
 ENG_appease_wales: "针对[WAS.GetFlag]威尔士的定向补贴"
 ENG_doing_other_decision: "执行另一个决议"
 ENG_welsh_referendum: "[GetYear][WAS.GetFlag]威尔士独立公投"
 ENG_welsh_referendum_desc: "[WAS.GetFlag]威尔士人民将就一项公投进行投票，该公投将决定他们作为一个国家、一个组成部分以及不列颠群岛中的一员的未来。"
 ENG_release_scotland: "批准[GetYear] [SCO.GetFlag]苏格兰独立公投"
 ENG_release_scotland_desc: "“苏格兰万岁！”\n\n或许我们之前否决全民公投的尝试过于草率，我们可以纠正这个错误。"
 ENG_release_ireland: "批准[GetYear][NIR.GetFlag]北爱尔兰独立公投"
 ENG_release_ireland_desc: "或许我们之前否决全民公投的尝试过于草率，我们可以纠正这个错误。"
 ENG_release_wales: "批准[GetYear][WAS.GetFlag]威尔士独立公投"
 ENG_release_wales_desc: "或许我们之前否决全民公投的尝试过于草率，我们可以纠正这个错误。"
 decisions_ENG: "[ENG.GetName]决议"
 decisions_ENG_desc: "在这里，政府可以启动各项任务并采取果断行动来指导英国的发展方向，支持产业发展，塑造研究成果，加强区域建设，并应对国家不断变化的需求。"
 falkland_policy: "福克兰政策"
 denounce_status_as_the_commonwealth_of_nation_member: "§Y放弃§!英联邦成员国地位"
 denounce_status_as_the_commonwealth_of_nation_member_desc: "挣脱过时的束缚。退出英联邦，走上真正国家主权之路。重掌命运。开辟属于自己的道路。独立就在前方。"
 ENG_bankers_switch_faction: "支持国际银行家"
 ENG_bankers_switch_faction_desc: "我们重新调整内部联盟，以偏袒国际银行家派系，使政策向全球金融、开放资本流动和服务型经济倾斜。"
 ENG_scottish_parliament: "[SCO.GetFlag]苏格兰议会"
 ENG_scottish_parliament_desc: "[SCO.GetFlag]苏格兰议会议员曾经不忠于伦敦，将来也不会永远忠于伦敦。将会有§H支持独立的议员§!他们将为建立一个自治或独立的[SCO.GetFlag]苏格兰而奋斗。\n\n如果§H支持独立§!的议员们占据多数席位，他们就会开始通过法案，赋予他们更大的自主权，而我们可以批准或否决这些法案。如果我们一贯接受他们的请求，我们将拥有一个友好而忠诚的[SCO.GetFlag]苏格兰构成国。但如果我们一再拒绝他们的请求，他们的§H不满§!可能会导致非常混乱的局面。如果[SCO.GetFlag]§H苏格兰的不满§!达到§H100§!，然后他们会要求独立。\n\n§H支持独立的席位§!：[? ENG_scottish_nationalists]/129\n\n[SCO.GetFlag]§H苏格兰的不满§!：[?ENG_scottish_agitation]"
 ENG_invest_northern_ireland_mission: "投资北爱尔兰建筑业回报"
 ENG_ireland_border_cooperation: "爱尔兰边境合作条约"
 ENG_clydach_nickel_decision: "克莱达克镍精炼厂现代化"
 ENG_clydach_nickel_decision_desc: "我们对位于南威尔士的克莱达赫镍精炼厂进行了升级改造，扩大了电池金属和高品位合金的产能，以加强我们关键矿物的供应。"
 ENG_alloys_modernisation: "合金生产现代化"
 ENG_alloys_modernisation_desc: "我们投资建设新的冶炼厂和轧制生产线，用于生产特种合金，从而提高从涡轮机和装甲板到高性能部件等各种产品的质量和产量。"
 ENG_ellesmere_port_decision: "埃尔斯米尔港稀土磁铁厂"
 ENG_ellesmere_port_decision_desc: "我们在埃尔斯米尔港扩大了稀土加工规模，生产用于风力涡轮机、电动汽车和先进国防系统的高品质磁体。"
 ENG_shetland_hydrocarbon_decision: "设得兰群岛以西的油气推进"
 ENG_shetland_hydrocarbon_decision_desc: "我们将加大力度开发设得兰群岛以西的油气田，开采深水储量，以提高国内油气产量和能源安全。"
 ENG_rosebank_field_decision: "开发罗斯班克油田"
 ENG_rosebank_field_decision_desc: "我们批准全面开发罗斯班克油气田，将新的海上平台和管道投入使用，以加强我们的长期能源供应。"
 ENG_cambo_offshore_decision: "开发坎博海上油田"
 ENG_cambo_offshore_decision_desc: "我们推进坎博海上项目，增加新油井和海底连接，使其石油和天然气储量投入生产。"
 ENG_hornsea_wind_farm_decision: "扩建霍恩西风电场"
 ENG_hornsea_wind_farm_decision_desc: "我们支持北海霍恩西海上风电区的后续阶段建设，增加涡轮机和电网连接，以从世界上最大的风电场输送更多清洁能源。"
 ENG_drakeland_tungsten_decision: "重新开放德雷克兰钨矿"
 ENG_drakeland_tungsten_decision_desc: "我们重启了普利茅斯附近的德雷克兰矿井，恢复了锡和钨的生产，以加强英国关键技术金属的供应。"
 ENG_south_crofty_tin_decision: "重新开放南克罗夫蒂锡矿"
 ENG_south_crofty_tin_decision_desc: "我们资助康沃尔郡南克罗夫蒂矿的重新开采，恢复了深层锡矿开采，并为我们的行业增加了稳定的国内高品位矿石来源。"
 ENG_scottish_industry_mission: "苏格兰工业意外之财"
 ENG_scottish_industry_mission_desc: "我们在苏格兰钢铁和重工业领域的投资可能会带来新的矿脉、合同和相关项目。钢厂和堆场的重新运转很有可能会发现我们可以投入生产的额外资源。"
 ENG_celsa_steel_mission: "塞尔萨钢铁产量评测"
 ENG_celsa_steel_mission_desc: "每年我们都会对塞尔萨的卡迪夫钢厂进行审查，看看新订单、效率提升或废钢流量是否足以证明进一步提高钢铁产量的合理性。"
 ENG_roysth_naval_port_decision: "扩建罗塞斯海军港"
 ENG_roysth_naval_port_decision_desc: "我们扩建了罗塞斯的船坞和配套设施，使福斯河口成为更强大的改装、支持和未来军舰建造基地。"
 ENG_expand_belfast_decision: "扩建贝尔法斯特工业园区"
 ENG_expand_belfast_decision_desc: "我们清理和维护贝尔法斯特码头和郊区周围的新地块，为北爱尔兰各地的工厂、堆场和办公室腾出更多空间。"
 ENG_highland_main_line_decision: "升级高地干线"
 ENG_highland_main_line_decision_desc: "我们对珀斯和因弗内斯之间的高地干线进行了升级改造，缩短了旅程时间，并为沿线城镇带来了急需的交通连接和生产力提升。"
 ENG_titanic_quarter_decision: "开发泰坦尼克区"
 ENG_titanic_quarter_decision_desc: "我们将贝尔法斯特以前的造船厂用地重新开发成泰坦尼克区，将办公楼、工作室和滨水工业融合在一起，为哈兰德与沃尔夫造船厂旧址注入新的活力。"
 ENG_productivity_gap_mission: "失去生产率"
 ENG_hs2_mission: "建造二号高速铁路"
 ENG_northen_powerhouse_mission: "建造北方动力铁路"
 ENG_build_london: "开发大伦敦"
 ENG_build_london_desc: "我们已向大伦敦地区的选民承诺，将会进行翻新工程。因此，我们必须兑现这一承诺。"
 ENG_promise_labour: "对工会的承诺"
 ENG_promise_labour_desc: "我们已经向工会做出了承诺，我们必须履行承诺。"
 ENG_promise_military: "对军工复合体的承诺"
 ENG_promise_military_desc: "我们已经向军工复合体做出了承诺，就必须履行承诺。"
 ENG_promise_fossil_fuel: "对化石燃料行业的承诺"
 ENG_promise_fossil_fuel_desc: "我们已经向化石燃料行业做出了承诺，我们必须履行承诺。"
 ENG_monarchy_decision_category: "温莎王室"
 ENG_monarchy_decision_category_desc: "自1917年以来，温莎王室一直统治着英国，带领现代君主制走过了战争、社会变革以及新世纪的种种挑战。它处于英国公共生活的中心，这个王朝的血脉融入了礼仪、服务和维系王国运转的日常事务之中。王室成员通过赞助、访问和谨慎的干预来施加影响，在慈善、外交和军队等领域发挥着仅靠政治手段无法企及的作用。这里展示了王室成员的各项活动，阐明了每位王室成员可以开展哪些项目，以及他们的存在能够带来哪些变革。"
 ENG_monarchy: "温莎王室"
 ENG_charles_youth_sustainability_decision: "赋权青年，促进可持续发展"
 ENG_charles_youth_sustainability_decision_desc: "查尔斯王子殿下将启动一项计划，旨在支持年轻人引领可持续发展和气候友好型倡议。凭借数十年来与青年慈善机构和环保事业的合作经验，威尔士亲王将致力于推广与生态韧性相契合的教育、技能发展和企业建设。该计划旨在认可年轻一代在构建更可持续的未来中所发挥的关键作用。"
 ENG_charles_sustainable_urban_planning_decision: "促进可持续城市规划"
 ENG_charles_sustainable_urban_planning_decision_desc: "查尔斯王子殿下将倡导以人为本、注重环境和长期韧性的整体设计原则为基础的可持续城市和社区规划。秉承他长期以来对建设尊重气候和文化背景的社区的理念，该计划将推广兼顾传统与环境敏感性的建筑、基础设施和土地利用方式。"
 ENG_charles_organic_agriculture_decision: "倡导有机和可持续农业"
 ENG_charles_organic_agriculture_decision_desc: "查尔斯王子殿下将利用其影响力，在农村和全球社区倡导有机和可持续的耕作方式。凭借数十年来对生态管理和再生农业的投入，王子将推广能够增强土壤健康、支持家庭农场并减少环境影响的耕作方式。"
 ENG_charles_environmental_diplomacy_tour_decision: "环保主义外交之旅"
 ENG_charles_environmental_diplomacy_tour_decision_desc: "威尔士亲王查尔斯殿下将开启国际环保主义外交之旅，旨在促进可持续发展和气候倡议方面的合作。在他数十年的威尔士亲王生涯中，他曾访问过众多国家，与各国领导人和社区进行交流，鼓励他们采取行动应对气候变化、保护热带雨林并推动可持续发展。此次访问将致力于加强全球伙伴关系，并强调各方在保护自然环境方面的共同承诺。"
 ENG_charles_rainforest_help_decision: "支持全球雨林保护"
 ENG_charles_rainforest_help_decision_desc: "查尔斯王子殿下将牵头开展一项旨在促进全球采取行动应对热带雨林破坏的项目。作为“王子雨林项目”的创始人，他将与各国政府、组织和民间社会合作，强调保护热带雨林的重要性及其在应对气候变化中的作用。"
 ENG_charles_charities_network_decision: "启动王子慈善网络"
 ENG_charles_charities_network_decision_desc: "查尔斯王子殿下将调动其庞大的慈善组织网络，支持国内外的社会、教育和环境事业。作为威尔士亲王创立或赞助的慈善机构集团——王子慈善会的会长，他将充分利用这些机构的集体智慧，在多个地区建设可持续发展的社区，促进发展机遇，提升民众福祉。"
 ENG_charles_harmony_tour_decision: "参加和谐外交之旅"
 ENG_charles_harmony_tour_decision_desc: "威尔士亲王查尔斯殿下将开启国际访问之旅，旨在推广其“和谐”理念，并鼓励在环境和可持续发展问题上开展合作。在他数十年的威尔士亲王生涯中，他始终利用自身的影响力，强调气候行动、雨林保护和可持续发展的重要性。此次访问将致力于加强围绕这些共同目标的全球伙伴关系。"
 ENG_andrew_naval_haritage_decision: "拥抱海军传统"
 ENG_andrew_naval_haritage_decision_desc: "安德鲁王子将凭借其漫长的海军生涯，彰显英国的海上传统和服务精神。他曾担任英国皇家海军直升机飞行员、教官和指挥官，并在福克兰群岛战争中服役。他将倡导尊重海军传统，并促进与世界各地盟军舰队和海上训练机构的合作。"
 ENG_andrew_trade_representive_decision: "贸易代表团"
 ENG_andrew_trade_representive_decision_desc: "安德鲁王子将开启贸易代表访问之旅，旨在促进英国在海外的商业利益。凭借其担任英国国际贸易和投资特别代表的经验，他将与外国政府、商界领袖和投资者进行交流，重点介绍英国出口和吸引投资的机遇，加强经济联系，促进贸易和企业合作。"
 ENG_andrew_emerging_trade_agreement_decision: "寻求新兴贸易协定"
 ENG_andrew_emerging_trade_agreement_decision_desc: "安德鲁王子将牵头推动在新兴全球市场达成贸易协定和建立商业伙伴关系。凭借其在海外代表英国商业利益的丰富经验，他将致力于为那些具有巨大未来增长与合作潜力的发展中经济体开拓出口、合作和投资机会。"
 ENG_andrew_emerging_economy_benefits_decision: "利用新兴经济体伙伴关系"
 ENG_andrew_emerging_economy_benefits_decision_desc: "安德鲁王子将致力于加强与新兴经济体的伙伴关系，以拓展贸易、投资和共同经济增长的机遇。凭借其在世界各地促进英国商业利益的丰富经验，这项举措旨在吸引来自快速发展市场的投资和专业技术，提升国内生产力，并营造更具活力的营商环境。"
 ENG_andrew_digital_enterprise_decision: "数字企业计划"
 ENG_andrew_digital_enterprise_decision_desc: "安德鲁王子将启动一项数字企业计划，旨在提升全国的数字技能和创业精神。该计划借鉴了他此前设立的数字企业奖项的经验，这些奖项曾帮助人们提升在线技能、技术和商业技能。该计划旨在支持有抱负的数字创新者，提高公众的技术素养，并为数字经济奠定更坚实的基础。"
 ENG_anne_national_charity_decision: "皇家公主国家慈善机构"
 ENG_anne_national_charity_decision_desc: "安妮公主将扩大并协调她在全国范围内的赞助活动，以推动切实成果，而非仅仅作秀。筹款活动、志愿者动员和公众关注都将集中于能力不足的领域。"
 ENG_anne_carers_promotion_decision: "关爱者认可活动"
 ENG_anne_carers_promotion_decision_desc: "安妮将把无偿照护者置于全国关注的中心，敦促各机构把照护视为一项基本服务，而非私人负担。这项运动通过皇室的支持和持续不断的宣传，提升了喘息服务、工作场所灵活性和公众尊重的重要性。"
 ENG_anne_military_readiness_decision: "战备标准"
 ENG_anne_military_readiness_decision_desc: "安妮公主将利用其军事职务，要求部队展现专业精神、训练纪律，并重视那些维持部队随时待命的繁琐日常工作。视察、演习和后勤保障将被视为衡量部队认真程度的标准。"
 ENG_anne_navy_readiness_decision: "舰队战备检查"
 ENG_anne_navy_readiness_decision_desc: "英国皇家海军将面临严峻考验，必须证明其能够在压力下航行、作战并维持自身生存。安妮女王的到来将强制推行各项标准：维护保养、船员技能水平和作战节奏将被视为不容妥协的底线。"
 ENG_anne_tourism_decision: "皇家旅游推广"
 ENG_anne_tourism_decision_desc: "英国的声誉是一项宝贵的资产，安妮公主将善加利用。一项重点推广旅游的计划将着重宣传英国的文化遗产、活动和亟需发展的当地经济，从而将王室活动转化为实际的预订和投资。"
 ENG_edward_beach_youth_decision: "沿海青年外展"
 ENG_edward_beach_youth_decision_desc: "威塞克斯伯爵将把王室的青年工作带到沿海地区，通过访问、奖励计划和与当地合作，引导年轻人掌握技能并投身公益事业。其传递的信息务实有效：培养自信、自律，并指明前进的方向。"
 ENG_edward_global_youth_decision: "全球青年参与"
 ENG_edward_global_youth_decision_desc: "爱德华将把青年参与的范围扩大到英国以外，通过与国外伙伴的交流、培训和共同开展的公民项目来加强联系。"
 ENG_edward_arts_culture_patronage_decision: "赞助艺术与文化"
 ENG_edward_arts_culture_patronage_decision_desc: "英国王室将大力支持英国的艺术和文化领域，将其视为身份认同和战略影响力的象征。王室的赞助将提升这些机构的知名度，为其提供资金支持，并保护那些在国内外塑造国家形象的机构。"
 ENG_edward_production_guild_decision: "支持生产行会"
 ENG_edward_production_guild_decision_desc: "英国的行会和技术工人行业是产品质量和出口实力的支柱。爱德华将通过认可、培训联系和行业协调来支持这些生产行会，从而保持传统工艺的传承和贸易渠道的畅通。"
 ENG_edward_veteran_support_decision: "威塞克斯退伍军人支持"
 ENG_edward_veteran_support_decision_desc: "服役不会随着退伍而结束，王室也不会将退伍军人视为无关紧要之人。威塞克斯伯爵将协调慈善机构、雇主和地方当局，以改善退伍军人的过渡支持、住房保障和就业途径。"
 ENG_philip_award_medal_decision: "颁发菲利普亲王奖章"
 ENG_philip_award_medal_decision_desc: "菲利普亲王将亲自前往，向一位具有卓越全球影响力的杰出工程师颁发菲利普亲王奖章。该奖项旨在表彰在他个人赞助下，在工程实践和创新领域取得杰出成就的工程师。"
 ENG_philip_award_expansion_decision: "扩大公爵青年奖"
 ENG_philip_award_expansion_decision_desc: "菲利普亲王将前往启动爱丁堡公爵奖的拓展计划，旨在将这项青年项目推广至更广泛的国际群体。他的努力旨在增强许多国家青年的韧性和公民技能。"
 ENG_philip_trust_funds_grants_decision: "启动菲利普亲王信托基金拨款"
 ENG_philip_trust_funds_grants_decision_desc: "菲利普亲王将亲自监督菲利普亲王信托基金向当地社区和教育项目发放拨款。他的直接参与确保了旨在改善休闲娱乐、学习和公民生活的各项举措能够获得支持。"
 ENG_philip_faith_conservation_decision: "启动信仰与自然保护倡议"
 ENG_philip_faith_conservation_decision_desc: "菲利普亲王将启动一项计划，旨在联合宗教团体和环保组织，共同守护自然。他的目标是调动道德和社会资源，支持可持续的自然保护目标。"
 ENG_philip_innovation_recognition_decision: "建立国家创新认可机制"
 ENG_philip_innovation_recognition_decision_desc: "菲利普亲王将启动一项全国性计划，旨在奖励杰出的工业设计、科学和实际问题解决能力。他的这项举措凸显了创造力作为经济增长和国家成功支柱的重要性。"
 ENG_william_air_ambulance_decision: "执行空中救护轮班任务"
 ENG_william_air_ambulance_decision_desc: "威廉王子再次出动执行空中救护任务，执行紧急救援飞行任务并与地面机组人员会面。"
 ENG_william_mental_health_at_work_decision: "工作场所的心理健康"
 ENG_william_mental_health_at_work_decision_desc: "威廉王子启程，旨在动员雇主和慈善机构支持工作场所心理健康倡议。"
 ENG_william_step_into_health_decision: "步入健康之旅"
 ENG_william_step_into_health_decision_desc: "威廉王子踏上旅程，支持“走进健康”项目，为退伍军人和军属开辟英国国家医疗服务体系的就医途径。"
 ENG_william_early_years_forum_decision: "召开幼儿论坛"
 ENG_william_early_years_forum_decision_desc: "威廉王子召开幼儿论坛，将专家、慈善机构和企业代表聚集在一起。"
 ENG_william_chogm_youth_decision: "英联邦政府首脑会议青年寄语"
 ENG_william_chogm_youth_decision_desc: "威廉王子出席英联邦政府首脑会议青年会议，表明下一代对英联邦的未来至关重要。"
 ENG_seize_sierra_leone_resources: "利用[SIE.GetFlag]塞拉利昂"
 ENG_seize_sierra_leone_resources_desc: "是时候让“巴拉斯行动”有所斩获了。我们将夺取塞拉利昂的重要资源，并在500天内建立​​经济影响力。"
 ENG_war_for_delta: "三角洲之战"
 ENG_war_for_delta_desc: "我们或许对尼日利亚人有点太过分了，让他们自负到不敢与我们对峙。尽管如此，我们还是要攻占他们的首都，让他们知道谁才是这里真正的主宰。"
 ENG_end_of_the_world: "征服世界尽头"
 ENG_end_of_the_world_desc: "火地岛，也被称为“世界尽头”，是一个重要的群岛，也是通往南极洲的门户。夺取这个至关重要的地点将对整个国家带来巨大的利益，以至于我们愿意为此而战。"
 ENG_operation_eastern_divide: "东部分隔行动"
 ENG_operation_eastern_divide_desc: "埃及方面没有满足我们关于通过苏伊士运河获得公平平等通行权的要求，因此我们别无选择，只能诉诸军事行动。"
 ENG_a_more_united_kingdom: "一个更联合的王国"
 ENG_a_more_united_kingdom_desc: "虽然我们国家目前保持统一，但我们领土的一部分已经分裂，脱离成为独立国家。如果我们想要真正成为一个联合王国，我们就需要重新联合来自世界各地的英联邦国家。"
 ENG_fractured_kingdom_united_state: "分裂王国，美国"
 ENG_fractured_kingdom_united_state_desc: "§R“公民，而非臣民”§!\n随着君主制和前政权的消亡，国家反而日益强大。现在是我们在世界舞台上采取更加自信、更具主导地位的姿态，并最终惩罚那些几个世纪以来掠夺这片土地的人的时候了。"
 ENG_deeper_commonwealth_integration: "更深入的英联邦整合"
 ENG_deeper_commonwealth_integration_desc: "如果我们想要成为一个真正统一的国家，首先必须努力说服那些我们希望融入的国家，让他们相信我们是合适的东道国。只有这样，我们才能采取下一步行动。"
 ENG_sovereignty_above_all: "主权高于一切"
 ENG_sovereignty_above_all_desc: "没有什么比我们的管理者能够决定我们人民的未来更重要的了。除了我们自己以外，任何其他国家都无权干涉我们如何治理国家。"
 ENG_establishing_new_leadership: "建立新政权"
 ENG_establishing_new_leadership_desc: "在我们能够着手工作之前，我们必须先建立新的政权。这需要对社会进行彻底的变革，我们必须开始规划一个新的过渡机构，由其负责部分地区的事务，以使这一过程更加平稳。"
 ENG_two_way_concessions: "双向让步"
 ENG_two_way_concessions_desc: "如果只有一方做出努力，我们就不能指望在权力下放协议方面取得进展。我们会做出一些让步，也希望苏格兰方面做出同样的让步。"
 ENG_uniting_the_isle: "统一小岛"
 ENG_uniting_the_isle_desc: "爱尔兰人是造成我们诸多问题的根源，从煽动紧张局势到让各政党呼吁北爱尔兰分离主义，无一例外。我们早就应该采取行动，给他们一个教训了。"
 ENG_revolution_not_devolution: "革命，而非权力下放"
 ENG_revolution_not_devolution_desc: "为了建立一个真正统一的国家，我们必须首先摧毁权力下放的根源。我们需要的是一场民族革命，而不是权力下放！"
 ENG_bring_in_canada: "引入加拿大"
 ENG_bring_in_canada_desc: "作为英联邦国土面积最大的成员国，我们必须向加拿大伸出援手。我们的加拿大朋友历来与我们保持着密切的联系，因此争取他们的支持应该不会太难。"
 ENG_the_realm_of_britain: "不列颠王国"
 ENG_the_realm_of_britain_desc: "大不列颠王国是永远不会被摧毁的，英国人民的精神在特别艰难的时期也始终坚韧不拔。"
 ENG_glory_of_pax_britannica: "不列颠治世的荣光"
 ENG_glory_of_pax_britannica_desc: "我们的过去辉煌灿烂，有人说过去并未真正消逝，而是对未来的预示。我们需要实现先辈的梦想，重现不列颠治世的荣光！"
 ENG_australian_outreach: "澳大利亚外联"
 ENG_australian_outreach_desc: "我们不能忘记澳大利亚人民在历史上为我们的事业所做出的牺牲。因此，我们必须邀请他们未来加入我们。"
 ENG_new_zealands_offer: "新西兰的提议"
 ENG_new_zealands_offer_desc: "新西兰人民长期以来一直是我们的坚定盟友，无论顺境逆境都与我们站在一起。我们邀请他们加入我们是理所当然的。"
 ENG_fracture_nato_unity: "分裂北约团结"
 ENG_fracture_nato_unity_desc: "虽然我们确实长期以来受益于北约的安全保障，但这种情况已经改变。我们必须明白，我们昔日的盟友现在最希望的就是分裂和瓦解我们的国家，我们必须让人民意识到这一点。"
 ENG_end_eastern_suffering: "结束东方苦难"
 ENG_end_eastern_suffering_desc: "以俄罗斯为首的东欧那些可怜的国家正在经历缓慢而可怕的衰落。我们最好介入并在那里建立真正的繁荣与秩序。"
 ENG_declare_the_commonwealth: "宣布建立联邦"
 ENG_declare_the_commonwealth_desc: "既然英联邦所有领土（至少是重要的领土）都已加入我们，并加入了同一面旗帜之下，那么我们理应向世界宣布，英联邦已经成立，并且它将一直存在下去。"
 ENG_active_resource_project: "§Y启动关键矿产项目§!"
 ENG_active_productivity_project: "§Y启动国家生产力项目§!"
 ENG_ucl_east_campus: "伦敦大学学院东校区"
 ENG_mechanic_menu_explanation: "权力下放"
 ENG_devolution_HEADER_TITTLE_LOC: "下放事项"
 ENG_mechanic_menu_explanation_2: "权力下放使我们能够将部分权力交还给\n选区。 我们可以通过点击它们所处的状态来\n管理它们。每一个选区将拥有§C议会§!，\n§R不满度§!级别与§G依赖程度§!级别。将鼠标悬停于\n§G信息§!按钮以获得进一步信息。"
 ENG_parliament_gui_tooltip: "每个选区都将拥有自己的议会。根据各选区民众的诉求程度，他们投票支持独立派议员的可能性可能有所不同。然而，一旦支持独立的议员就职，他们被选下台的可能性就非常小。如果支持独立的议员占据多数席位，他们可能会开始推动旨在减少对欧盟依赖的法案，并在某个时候最终要求举行全民公投。\n\n我们的臣民会对我们有自己的看法，这种看法体现在他们的不满情绪上。臣民的不满情绪会因我们的政党、我们否决的法案数量以及我们是否强行增强他们的依赖性而有所不同。某些事件、决策或关注点会影响煽动情绪。如果臣民的不满情绪达到100，他们就会开始要求脱离王国独立。\n\n依赖程度决定了信徒能够自理的程度。如果依赖程度低，他们可能会开始争取更多自由，因为他们觉得即使没有母国也能很好地照顾自己。我们将有机会根据我们所经历的事件和我们采取的重点来降低或提高他们的依赖程度。\n\n北爱尔兰紧张局势指的是联合派新教徒和共和派天主教徒之间的紧张关系。我们做出的决定可能会加剧这种紧张局势，如果紧张程度达到50%，就会发生零星的暴力冲突。如果紧张程度继续超过50%，冲突发生的频率也会增加。"
 ENG_dependency_gui_tooltip2: "依赖程度决定了信徒能够自理的程度。如果依赖程度低，他们可能会开始争取更多自由，因为他们觉得即使没有天国也能很好地照顾自己。我们将有机会根据我们所经历的事件和我们采取的重点来降低或提高他们的依赖程度。"
 ENG_parliament_gui_tooltip2: "每个选区都将拥有自己的议会。根据各选区民众的诉求程度，他们投票支持独立派议员的可能性可能有所不同。然而，一旦支持独立的议员就职，他们被选下台的可能性就非常小。如果支持独立的议员占据多数席位，他们可能会开始推动旨在减少对欧盟依赖的法案，并在某个时候最终要求举行全民公投。"
 ENG_agitation_gui_tooltip2: "我们的臣民会对我们有自己的看法，这种看法体现在他们的不满情绪上。臣民的不满情绪会因我们的政党、我们否决的法案数量以及我们是否强行增强他们的依赖性而有所不同。某些事件、决策或关注点会影响不满情绪。如果臣民的不满情绪达到100，他们就会开始要求脱离王国独立。"
 ENG_irish_tension_tooltip: "北爱尔兰紧张局势指的是联合派新教徒和共和派天主教徒之间的紧张关系。我们做出的决定可能会加剧这种紧张局势，如果紧张程度达到50%，就会发生零星的暴力冲突。如果紧张程度继续超过50%，冲突发生的频率也会增加。"
 ENG_scotland_gui_tooltip: "苏格兰\n-------------\n£GFX_click_right §Y右键点击§!以降低2不满情绪\n - 期间将支出税收收入的§R5%§!"
 ENG_northern_ireland_tooltip: "北爱尔兰\n-------------\n£GFX_click_right §Y右键点击§!以降低2不满情绪\n - 期间将支出税收收入的§R5%§!"
