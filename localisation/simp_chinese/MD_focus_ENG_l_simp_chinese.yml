 ENG_queen_elizabeth_class_carrier: "伊丽莎白女王级航空母舰"
 ENG_queen_elizabeth_class_carrier_desc: "伊丽莎白女王级航空母舰是英国海军航空兵的巅峰之作，标志着航母作战能力的变革性飞跃。这些庞然大物增强了英国的海上投射能力，凭借其先进的技术、强大的舰载机容量和广阔的作战范围，体现了现代化的理念，巩固了英国的全球防御地位。"
 ENG_elizabeth_line_decision: "完成伊丽莎白线"
 ENG_elizabeth_line_decision_desc: "我们完成了横贯伦敦的伊丽莎白线，该线路连接希思罗机场、西区、伦敦金融城和金丝雀码头，提供快速、频繁的跨城列车，缩短旅程时间，提高效率。"
