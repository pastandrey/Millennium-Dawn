 ENG_highland_main_line: "Highland Main Line"
 ENG_highland_main_line_desc: "The upgraded Highland Main Line links Perth and Inverness with faster, more reliable trains, helping local firms reach markets, workers and services more easily."
 ENG_crossrail: "Crossrail Network"
 ENG_crossrail_desc: "The Elizabeth Line knits Heathrow, the West End, the City and Canary Wharf into a single labour market, easing commutes, relieving crowded lines and lifting the productivity of London's office economy."
 ENG_high_value_manufacturing_zone: "High Value Manufacturering Zone"
 ENG_hs2_idea: "High-Speed 2"
 ENG_northern_powerhouse_rail_idea: "Northern Powerhouse Rail"
 ENG_andrew_digital_enterprise_modifier: "Royal Enterprise Digitization Drive"
 ENG_andrew_digital_enterprise_modifier_desc: "Backed by the Duke of York's patronage networks, a new push has emerged to connect investors, regional firms, and technology ventures through a more modern commercial framework. Trade promotion offices, business forums, and private sector partnerships are being used to accelerate digital adoption and improve the visibility of British enterprise at home and abroad."
 ENG_edward_beach_youth_modifier: "Duke's Youth Outreach Campaign"
 ENG_edward_beach_youth_modifier_desc: "Under the Earl of Wessex's patronage, youth engagement initiatives have been expanded through award programs, community networks, and public events across the country. The campaign emphasizes confidence, civic service, and practical skills, strengthening social cohesion while encouraging a new generation to take part in national life."
 ENG_prince_charles: "Charles"
 ENG_prince_charles_trait: "Prince of Wales"
 ENG_charles_1_idea: "Prince of Wales"
 ENG_charles_1_idea_desc: "Charles was styled Prince of Wales as the heir apparent to the United Kingdom. This title, granted by letters patent and marked by formal investiture, signified his primary status as successor to the Crown and his enduring link to Wales and the wider realms."
