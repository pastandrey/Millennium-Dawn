 ENG_queen_elizabeth_class_carrier: "伊丽莎白女王级航空母舰"
 ENG_queen_elizabeth_class_carrier_desc: "伊丽莎白女王级航空母舰是英国海军航空兵的巅峰之作，标志着航母作战能力的变革性飞跃。这些庞然大物增强了英国的海上投射能力，凭借其先进的技术、强大的舰载机容量和广阔的作战范围，体现了现代化的理念，巩固了英国的全球防御地位。"
 ENG_elizabeth_line_decision: "完成伊丽莎白线"
 ENG_elizabeth_line_decision_desc: "我们完成了横贯伦敦的伊丽莎白线，该线路连接希思罗机场、西区、伦敦金融城和金丝雀码头，提供快速、频繁的跨城列车，缩短旅程时间，提高效率。"
 ENG_elizabeth_queen: "伊丽莎白二世"
 ENG_elizabeth_queen_trait: "女王"
 ENG_elizabeth_queen_idea: "$ENG_elizabeth_queen_trait$"
 ENG_elizabeth_queen_charles_andrew: "$ENG_queen_eldest$"
 ENG_elizabeth_queen_anne_edward: "$ENG_queen_middle$"
 ENG_elizabeth_queen_philip_william: "$ENG_queen_youngest$"
 ENG_elizabeth_ruling_monarch: "§Y$ENG_elizabeth_queen$§!是当前的§Y统治君主§!"
 ENG_typhoon_tranche_debate: "“台风” T1论争"
 ENG_typhoon_tranche_debate_desc: "“台风”战斗机T1之争指的是围绕欧洲战斗机“台风”展开的讨论和分析。“台风”是一款由多个欧洲国家联合研制的多用途战斗机。这些讨论通常会深入探讨“台风”战斗机的各个方面，包括其性能、能力、成本效益以及在现代空战中的战略意义。"
 ENG_silicon_glenn: "硅谷"
 ENG_silicon_glenn_tt: "§Y$CAT_computing_tech$，$CAT_internet_tech$或$CAT_ai$的年度技术提升§!"
 ENG_operation_excellence_desc: "我们的军队规模虽小，但专业且能力出众，能够在本土迅速部署，在接到请求时为民事部门和其他政府部门提供援助。这种本土安全能力可以得到扩展和加强，以保障英国的安全。"
 ENG_modern_littoral_force_desc: "英国现代近岸部队是一项战略举措，旨在提升英国在沿海地区的海军能力。这支由英国领导的现代化部队整合了先进的海军技术、多用途舰艇和快速反应能力，以确保在近岸环境中的海上优势。该部队注重敏捷性和适应性，增强了英国维护沿海利益、应对新出现的威胁以及为区域稳定做出贡献的能力。"
 ENG_trident_nuclear_program_desc: "“三叉戟”计划是英国持续的海上核威慑力量，部署配备“三叉戟II D5”弹道导弹的“先锋”级潜艇。这项战略计划由位于奥尔德马斯顿和伯格菲尔德的设施负责管理，凸显了英国致力于打造敏捷而强大的国防能力的决心。"
 ENG_mothballing_operations: "封存行动"
 ENG_mothballing_operations_desc: "为应对财政困境，英国政府选择了务实的做法，即封存部分海军舰艇。这一决定遭到了海军工业界的保留意见，尤其是贝宜系统。此举旨在节约资源，但也引发了业内人士对生产和劳动力可能受到影响的担忧。"
 ENG_modern_landing_craft_desc: "英国一直致力于提升海军能力，并已推行多项现代化举措，包括投资建造新型登陆艇。配合“未来突击队”计划，英国旨在加强其两栖部队，特别是皇家海军陆战队，从而提高其在近岸和两栖作战中的效能。"
 ENG_mechanised_amphibious_assault_desc: "英国强调适应性和速度，制定了一套全面的机械化两栖突击作战理论。该理论以皇家海军陆战队和皇家海军的协同作战为基础，运用专用两栖突击车和登陆艇实现快速的沿海部署。一体化的指挥控制、空中支援以及专用两栖攻击舰的部署，彰显了英国致力于维持一支强大且多用途部队的决心，并通过严格的训练和演习确保其能够应对各种不同的作战场景。"
 ENG_strike_brigades_desc: "为应对不断演变的威胁，英国组建了英国打击旅，这些部队用途广泛、部署迅速，专为灵活地面作战而设计。打击旅由步兵、装甲兵和炮兵组成，体现了英国致力于快速灵活应对军事挑战的承诺。对打击旅的重视增强了英国投射力量和有效应对动态多变的安全挑战的能力。"
 ENG_carrier_group_debate_desc: "航空母舰打击力量是现代海军的重要组成部分。我们需要探讨如何才能最好地打造这支力量。"
 ENG_mothballing_operations_idea: "海军封存行动"
 ENG_mothballing_operations_idea_desc: "随着财政压力日益加剧，英国政府倾向于封存部分海军舰艇，这一务实举措在海军工业界，尤其是贝宜系统内部，反响不一。尽管此举旨在节约资源，但也引发了业内人士的担忧，给生产和劳动力保障都蒙上了一层阴影。"
 ENG_quality_over_quantity_desc: "秉持“质量重于数量”的原则，英国将卓越性和技术优势置于军队建设的首要位置。这种国家精神强调采购先进精密的装备，以确保强大的技术防御能力。通过注重质量，英国旨在最大限度地提高军队效能，从而在应对现代挑战时形成战略优势。"
