 ENG_prince_edward: "爱德华"
 ENG_prince_edward_trait: "威塞克斯伯爵"
 ENG_edward_1_idea: "威塞克斯伯爵"
 ENG_edward_1_idea_desc: "爱德华被授予威塞克斯伯爵头衔，这是王室授予的高级荣誉，与服务和公共责任紧密相连。该头衔源自一个具有深厚历史底蕴的古老英国姓氏，它本身就带有威望，但并不代表君主拥有宪法赋予的权力。在现代英国，威塞克斯伯爵头衔是君主在公共事务上进行赞助、代表和持续支持的平台。"
