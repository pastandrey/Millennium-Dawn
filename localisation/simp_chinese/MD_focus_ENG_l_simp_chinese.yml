 ENG_glasgow_shipbuilding_idea1: "Glasgow Shipbuilding Hub"
 ENG_glasgow_shipbuilding_idea1_desc: "Investment in the Clyde yards has streamlined design, welding and outfitting, cutting the production cost of all our naval vessels built in Glasgow and beyond."
