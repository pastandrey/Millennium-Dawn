 ENG_royal_army1: "英国皇家陆军"
 ENG_royal_army1_desc: "英国陆军是英国武装部队的陆上作战力量，是英国的主要地面军事力量。英国陆军拥有数百年悠久历史，以其专业性、适应性和作战效能而闻名。陆军由来自不同背景的训练有素的士兵组成，能够执行包括作战行动、维和任务、救灾行动和人道主义援助在内的各种任务。"
 ENG_royal_army2: "英国皇家陆军"
 ENG_royal_army2_desc: "英国陆军是英国武装部队的陆上作战力量，是英国的主要地面军事力量。英国陆军拥有数百年悠久历史，以其专业性、适应性和作战效能而闻名。陆军由来自不同背景的训练有素的士兵组成，能够执行包括作战行动、维和任务、救灾行动和人道主义援助在内的各种任务。"
 ENG_royal_army3: "英国皇家陆军"
 ENG_royal_army3_desc: "英国陆军是英国武装部队的陆上作战力量，是英国的主要地面军事力量。英国陆军拥有数百年悠久历史，以其专业性、适应性和作战效能而闻名。陆军由来自不同背景的训练有素的士兵组成，能够执行包括作战行动、维和任务、救灾行动和人道主义援助在内的各种任务。"
 ENG_royal_airforce1: "皇家空军的幽灵"
 ENG_royal_airforce1_desc: "尽管拥有辉煌的历史，但英国皇家空的现状反映了其装备老化、能力有限的时代特征。由于飞机老旧、现代化程度不足，这种民族精神象征着在技术落后的情况下维持空中优势所面临的挑战。然而，即便在这些限制之下，皇家空军的精神遗产依然长存，激励着人们展现出坚韧不拔的毅力和适应并克服困难的决心。"
 ENG_royal_airforce2: "皇家空军现代化"
 ENG_royal_airforce2_desc: "英国皇家空军现代化计划体现了其战略转型，即通过全面的现代化努力重振空中力量。该计划着重于飞机升级、提升技术能力以及投资尖端系统，展现了英国皇家空军积极主动的战略方针，旨在确保其在不断变化的战场环境中始终保持空中优势。"
 ENG_royal_airforce3: "现代化的皇家空军"
 ENG_royal_airforce3_desc: "以制空权和快速反应为核心，现代化后的英国皇家空军是一支实力强大的力量，配备了尖端战斗机和先进的作战能力。凭借能够主宰天空、以无与伦比的速度和精度打击敌军的敏捷战斗机，这种国家精神体现了英国皇家空军致力于维护制空权、捍卫国家利益的坚定决心。"
 ENG_royal_airforce4: "现代化的皇家空军"
 ENG_royal_airforce4_desc: "现代化后的英国皇家空军标志着战略空中力量投射新时代的到来，其特点是拥有最先进的轰炸机和精确打击能力。凭借配备远程任务装备和精确制导武器的先进轰炸机，这种国家精神凸显了英国皇家空军对高价值目标实施决定性、精确空袭的能力，以无与伦比的精准度投射力量并威慑对手。"
 ENG_royal_airforce5: "现代化的皇家空军"
 ENG_royal_airforce5_desc: "现代化后的英国皇家空军标志着战略空中力量投射新时代的到来，其特点是拥有最先进的轰炸机和精确打击能力。凭借配备远程任务装备和精确制导武器的先进轰炸机，这种国家精神凸显了英国皇家空军对高价值目标实施决定性、精确空袭的能力，以无与伦比的精准度投射力量并威慑对手。"
