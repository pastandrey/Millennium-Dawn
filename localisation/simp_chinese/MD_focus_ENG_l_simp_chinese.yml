 ENG_prince_phillip_trait: "爱丁堡公爵"
 ENG_phillip_1_idea: "爱丁堡公爵"
 ENG_phillip_1_idea_desc: "爱丁堡公爵的头衔是菲利普亲王作为君主身边重要臣属的象征，也是他毕生为国家服务的标志。这一头衔在他与伊丽莎白公主结婚时被授予，它既蕴含着历史的尊荣，又体现了建立在责任、纪律和制度支持之上的现代身份认同。在公共生活中，这一头衔与他的赞助活动以及维系君主制几代人的实际工作紧密相连。"
