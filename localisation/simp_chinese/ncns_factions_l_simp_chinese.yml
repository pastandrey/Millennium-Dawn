l_simp_chinese:
 faction_manifest_containment_of_decadence_name: "遏制西方堕落浪潮"
 faction_manifest_containment_of_decadence_desc: "'奉至仁至慈真主的名义'\n--------------\n除了我们自己的血肉之躯，还有什么能守护这片土地？帝国主义者对不属于他们的土地的渴求，绝非简单外交所能平息。最终，抵抗之轴是阻止帝国主义议程在世界上进一步蔓延的唯一途径，战斗到最后一人也在所不惜。"
 faction_manifest_peace_in_our_time_name: "世界和平"
 faction_manifest_peace_in_our_time_desc: "'深思熟虑，意志自由'\n--------------\n华沙条约组织的崩溃与国际法律与秩序的再度兴起，完全依靠北大西洋公约组织成员国的集体努力。然而，今日看来，世界上某些国家似乎决定利用这一稳定时代谋取私利，并积极阻挠北约的各项努力。为确保我们时代的安全，我们必须致力于将联盟扩展到新的疆界，并保障全球人民的安全。"
 faction_manifest_unite_islamic_countries_name: "统一伊斯兰世界"
 faction_manifest_unite_islamic_countries_desc: "几个世纪以来，伊斯兰世界一直处于分裂状态——现在，通过合作与理解，我们可以再次团结起来。"
 faction_manifest_the_second_red_wave_goal_name: "第二波赤潮"
 faction_manifest_the_second_red_wave_goal_desc: "布尔什维克夺取政权之初，点燃了一场持续数十年的革命之火。然而，他们却无法解决新体制最大的缺陷：领导层的无能。西方日益强大，而苏联却停滞不前。我们生活在共产主义独裁统治之下太久了。现在，是时候按照我们自己对共产主义的愿景统治世界了。"
 faction_manifest_comeback_of_the_monarchy_name: "君主制的复兴"
 faction_manifest_comeback_of_the_monarchy_desc: "几个世纪以来，君主制凭借其智慧和力量统治着世界。然而，近几十年来，共和国和民主政体兴起，带来的只是暂时的和平与稳定。繁荣开始衰落，因此，君主制是时候复兴，为我们的国家恢复秩序和传统了。通过团结与合作，我们可以重现君主制的辉煌，引领我们的人民走向更加美好的未来。"
 faction_manifest_preserving_our_place_name: "维护我们的地位"
 faction_manifest_preserving_our_place_desc: "'多极世界中的集体安全'\n--------------\n苏联解体催生了多个国家的诞生。这一事件为西方集团带来了机遇，美国及北约其他成员国试图将前苏联国家纳入其势力范围。尽管许多人声称新晋霸权的美国是唯一的超级大国，但我方阵营意图打破这种局面永久化的任何希望。通过团结的力量，我们将确保后苏联空间得到保护、武装并做好准备。"