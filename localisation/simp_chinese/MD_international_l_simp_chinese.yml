 CT_internet_monitoring: "大规模数据收集抗议"
 CT_internat_monitoring_desc: "我们的公民开始抗议我们通过大规模数据收集来保护他们的努力。我们必须挺过他们的愤怒……"
 CT_protesting_arrests: "反恐逮捕抗议活动"
 CT_protesting_arrests_desc: "我国公民开始抗议我们使用大规模逮捕来应对恐怖主义威胁。我们应当提升情报工作的质量，以避免未来再次发生此类抗议。"
 CT_struck_by_terror_attack: "遭遇恐怖袭击"
 CT_struck_by_terror_attack_desc: "我国遭受了国际恐怖组织的恐怖袭击。从军事和经济角度来看，我们都将需要时间来从这场残酷的袭击中恢复过来。"
 CT_terror_attack_happened: "全球恐怖袭击事件发生"
 CT_terror_attack_happened_desc: "我们的公民担心，如果全球范围内的恐怖袭击持续发生，他们可能会成为下一个目标。我们必须采取行动，确保他们的安全。"
 CT_terror_attack_prevented: "恐怖袭击被阻止"
 CT_terror_attack_prevented_desc: "我们的情报与反恐部队近期成功阻止了一起针对我国的恐怖袭击，进一步巩固了人民对我们保护能力的信任！"
 MD_terror.1.t: "[org_doing_attack] 发动恐怖袭击！"
 MD_terror.1.d: "[org_doing_attack]今日对我们发动了恐怖袭击，我们的情报和反恐机构未能阻止此次攻击。关于损失和伤亡的报告仍在不断传来，但预计两者都相当严重。现在我们必须就下一步行动做出决定，以在这场危机中为我们的公民提供安全、保障和支持。"
 MD_terror.1.a: "我们需要让地方反应自行发生。"
 MD_terror.1.b: "尽我们所能提供援助！"
 MD_terror.2.t: "[org_doing_attack] 恐怖袭击被阻止！"
 MD_terror.2.d: "[org_doing_attack]今天企图发动恐怖袭击，但由于我们机构有效的情报收集以及反恐团队的英勇行动，袭击得以被阻止。所有涉案恐怖分子均已被击毙或逮捕，他们的安全屋正在接受调查，以获取更多情报。今天是我们反恐部队的一次重大胜利！"
 MD_terror.2.a: "[THIS.GetNameDef]的伟大胜利！"
 MD_terror.3.t: "[FROM.GetName] 遭遇恐怖袭击！"
 MD_terror.3.d: "今日，[FROM.GetName]遭受了来自[org_doing_attack_int]的袭击，此次攻击对该国造成了重大破坏和人员伤亡。在[FROM.GetName]遭受重创之际，我国民众也开始担忧本土可能遭遇类似攻击。我们必须决定是否向[FROM.GetName]提供支援，并需采取措施安抚国内民众的情绪。"
 MD_terror.3.a: "真是一场悲剧。"
 MD_terror.3.b: "我们必须加强自身的安全防范！"
 MD_terror.4.t: "[FROM.GetName] 成功阻止恐怖袭击！"
 MD_terror.4.d: "[FROM.GetName]政府今日宣布，已成功挫败[org_doing_attack_int]在其境内策划的恐怖袭击。通过高效的情报工作、警力部署及军事行动，该国在袭击发生前瓦解了恐怖分子网络。此次成功是全球反恐战争中的重大胜利！"
 MD_terror.4.a: "[FROM.GetNameDef]显然早有准备。"
 MD_terror.5.t: "大规模数据收集引发抗议"
 MD_terror.5.d: "由于情报机构的泄密，公众得知了我们为防范恐怖主义而进行的大规模数据收集行动。然而，民众将此视为对隐私的严重侵犯，并开始批评和抗议他们认为的政府越权行为。"
 MD_terror.5.a: "这是为了他们好！"
 MD_terror.6.t: "大规模逮捕引发抗议"
 MD_terror.6.d: "尽管我们对[name_of_org_disp]支持者的大规模逮捕有效破坏了他们的行动，但由于情报失误，我们也意外逮捕了大量无辜平民和旁观者。结果，公众对我们的反恐行动感到不满，并开始抗议我们为维护国家安全所必须采取的大规模逮捕及其他关键手段。"
 MD_terror.6.a: "难道一句抱歉还不够吗？"
 MD_terror.7.t: "渗透成功！"
 MD_terror.7.d: "我们的特工终于传回消息：他已成功就位，现正潜伏在该组织内部。或许需要些时日，但随着我们行动的推进，他们能传递的情报必将对我国大有裨益。"
 MD_terror.7.a: "他的情报将具有巨大价值！"
 MD_terror.8.t: "特工阵亡"
 MD_terror.8.d: "不幸的是，在我们与特工失联一段时间后，终于得知了原因。今天，[name_of_org_disp]发布了一段视频，显示他们处决了我们的特工以及其他数人。他显然已被发现或抓获，因此，我们之前从他那里获得的任何信息，或目前正在收集的信息，其价值都已降低，因为他们现在知道我们正在调查他。"
 MD_terror.8.a: "真是可惜"
 MD_terror.9.t: "对加强安全措施的愤怒"
 MD_terror.9.d: "公民对我们实施的加强安保措施感到不满，这些措施使公共交通的航空、海运和陆路出行变得复杂。他们对政府活动安保级别的提升也颇有怨言，这正对我们的公民关系造成压力。"
 MD_terror.9.a: "这些措施是必要的！"
 MD_terror.9.b: "或许我们可以稍微削弱一下他们的影响力……"
 MD_terror.11.t: "[FROM.GetName] 提议举行联合反恐演习"
 MD_terror.11.d: "[FROM.GetName] 提议我们举行联合反恐演习，以提升我军及反恐部队的作战能力。若接受提议，我方需投入部分资金支持演习，对方亦需承担相应费用。若拒绝提议，可能会引起对方不快，但影响应属有限。"
 MD_terror.11.a: "执行演习！"
 MD_terror.11.b: "这简直是在浪费时间。"
 MD_terror.13.t: "[FROM.GetName] 提供顾问"
 MD_terror.13.d: "[FROM.GetName]提议派遣外国顾问形式的援助。虽然这将增强我们的反恐能力，但我们也不得不思考这些顾问会报告我们的活动和能力，导致情报泄露的可能性。"
 MD_terror.13.a: "接受提议！"
 MD_terror.13.b: "[THIS.GetName]无需援助！"
 MD_terror.14.t: "[FROM.GetName] 撤离顾问"
 MD_terror.14.d: "[FROM.GetName]已从我国撤回了反恐力量，这降低了我们执行反恐行动的能力。"
 MD_terror.14.a: "他们怎么敢!"
 MD_terror.15.t: "[FROM.GetName]接受顾问！"
 MD_terror.15.d: "[FROM.GetName]已接受我方情报机构提供的反恐顾问援助！这不仅有助于提升其反恐行动能力，也将让我们得以深入了解其情报收集与处理体系的运作方式。"
 MD_terror.15.a: "他们做出了明智的选择！"
 MD_terror.16.t: "[FROM.GetName]拒绝派遣顾问！"
 MD_terror.16.d: "[FROM.GetName]已拒绝让我们的反恐顾问进入该国。"
 MD_terror.16.a: "好吧，那是他们的损失。"
