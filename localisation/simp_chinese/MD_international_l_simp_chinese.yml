 un_aid_subsidies_modifier_desc: "当满足各类§B联合国§!§Y援助计划§!的要求时，所提供的补贴旨在帮助支持发展中国家，并协助其成长为国际社会中富有成效的成员。"
 IS_un_aid_general_budget: "§Y常规运营预算§!: 每周 $$[?global.un_operating_budget_base|+G3]"
 IS_un_aid_general_budget_tt: "显示各国对§B联合国§!§Y常规预算§!的贡献，按降序排列。"
 IS_un_aid_general_budget_tt_delayed: "§Y常规运营预算§!是所有§B联合国§!成员国在满足最低要求时共同贡献的基础总预算。最低预算贡献额为§Y[?global.general_operating_budget_contribute_percent|%]§!的国内生产总值，每年年初计算，且最低需向预算贡献§G$0.001§!。未达到此最低标准的国家当年不会贡献预算，也因此无法获得任何预算贡献相关的收益。\n\n§Y常规运营预算§!是各成员国每周向§B联合国§!提供的基础资金，将分配给各个§B联合国§!的§Y援助计划§!。这些贡献会平均分配给所有计划，为每个计划每周的运作提供初始的基础资金。\n\n作为贡献的回报，各国将根据其对§Y常规运营预算§!的贡献比例，获得£foreign_influence_modifier_texticon §Y外国影响力§!乘数和£foreign_influence_defense_modifier_texticon §Y外国影响力防御§!乘数的加成。"
 is_un_aid_total_budget_spending: "§C联合国§!§R总支出§!："
 is_un_aid_total_budget_spending_tt: "我们目前为§B联合国§!拨款花费$[?united_nations_expenses|-3]"
 is_un_aid_total_budget_spending_tt_delayed: "该数字显示我们在所有§B联合国§!§Y援助计划§!上的总支出，包括§Y一般运营预算§!以及我们对所有其他§B联合国§!计划贡献的独立支出决策。"
 is_un_basic_budget_spending: "于§C联合国§!§Y预算§!的§R支出§!："
 is_un_basic_budget_spending_tt: "我们目前为§B联合国§!§Y常规运营预算§!支出$[?united_nations_base_expenses|-3]。"
 is_un_basic_budget_spending_tt_delayed: "§Y常规运营预算§!是各成员国每周向§B联合国§!提供的基础资金，用于分配给§B联合国§!的各项§Y援助计划§!。这些捐款会平均分配给所有计划，为每个计划每周的运作提供初始基础资金。从该预算获得资助的计划包括§Y联合国发展倡议办公室§!、§Y联合国资本发展基金§!和§Y联合国教科文组织教育计划§!。"
 is_un_aid_unescoe_spending: "于§Y联合国教科文组织§!的§R支出§!："
 is_un_aid_unescoe_spending_tt: "我们目前为§Y联合国教科文组织计划§!花费$[?united_nations_unescoe_funding|-3]"
 is_un_aid_unescoe_spending_tt_delayed: "§B联合国§! §Y教育、科学及文化组织§!是一个旨在改善教育、为发展中国家提供技术咨询，并为需要援助以促进发展的国家提供政策对话的援助机构。\n\n这项§B联合国§! §Y援助计划§!将提升£research_speed_texticon §Y研究速度§!和£political_power_texticon §Y政治点数获取§!。"
 is_un_aid_unido_spending: "于§Y联合国工业发展组织§!的§R支出§!："
 is_un_aid_unido_spending_tt: "我们目前为§Y联合国工业发展组织计划§!花费$[?united_nations_unido_funding|-3]"
 is_un_aid_unido_spending_tt_delayed: "§B联合国§! §Y工业发展组织§!是一项旨在促进工业发展的援助计划。通过帮助发展中国家建立自己的工业体系，该计划致力于消除贫困、推动包容性全球化，并着眼于环境可持续性。\n\n这项§B联合国§! §Y援助计划§!将提供免费租借§Y民用工业§!的能力，同时提升£construction_speed_texticon §Y建设速度§!，以帮助各国改善工业基础、电力基础设施和建设基础设施。"
 is_un_aid_uncdf_spending: "于§Y联合国资本发展基金§!的§R支出§!："
 is_un_aid_uncdf_spending_tt: "我们目前为§Y联合国资本发展基金计划§!花费$[?united_nations_uncdf_funding|-3]"
 is_un_aid_uncdf_spending_tt_delayed: "§B联合国§!§Y资本发展基金§!是一项旨在改善国家投资资本流动的援助计划。该计划的目标是通过投资项目和数字金融创造就业机会，实现可持续经济增长。\n\n此项§B联合国§!§Y援助计划§!将为受援国提供§Y资金§!与§Y发展§!双重支持，旨在帮助改善预算状况并促进生产力增长。"
 is_un_aid_spending_percent: "§Y基本预算§!%："
 is_un_aid_spending_percent_tt: "我们贡献的§Y常规运营预算§!比例为[?united_nations_contribution_percent|Y%2]。"
 is_un_aid_spending_percent_tt_delayed: "§Y常规运营预算§!的占比既关乎声望，也关乎权力。我们贡献得越多，就越能建立对他人£foreign_influence_modifier_texticon §Y外国影响力§!，我们的影响力也将越有效。我们能够将这个百分比提得越高越好。"
 is_un_aid_additional_percent: "% 的§C联合国§!§Y援助计划§!："
 is_un_aid_additional_percent_tt: "我们贡献的§Y援助计划额外贡献§!总额比例为[?united_nations_aid_program_contribution_percent|Y%2]"
 is_un_aid_additional_percent_tt_delayed: "§Y援助计划额外贡献§!的百分比越高，对接受援助计划的国家的影响力就越大，同时为我们带来更多£political_power_texticon §Y政治点数增益§!，并通过§G减少§!我们§Y投资§!所需的时间和成本，提高其他国家接受我们§Y投资§!的机会。"
 is_un_aid_total_budget_ido_tt_delayed: "该项目预算的§Y25%§!用于帮助各国提升其£construction_speed_texticon §Y建造速度§!，其余§Y75%§!则用于向§G受资助§!国家提供租借的§Y民用工业§!。"
 is_un_aid_total_budget_esco_tt_delayed: "该计划预算的§Y25%§!用于帮助各国提升£political_power_texticon §Y政治点数获取§!，其余§Y75%§!则投入旨在改善其£research_speed_texticon §Y科研速度§!的项目。"
