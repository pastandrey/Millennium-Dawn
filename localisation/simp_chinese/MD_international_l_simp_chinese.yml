 CT_SYS_DESC: "§Y反恐系统§!的运行机制基于全球局势，它会决定恐怖组织的威胁程度是否上升，以及情报机构对它们的可见度。随着§R恐怖威胁等级§!的提高，该组织发动袭击的频率和强度也会增加。世界紧张度、国家状况以及玩家行动都可能影响§R恐怖威胁等级§!的升降。这些数值每月更新，或在重大行动后进行调整。\n\n玩家可以通过间谍系统进行情报收集，在此菜单中执行行动，并利用突袭系统开展突袭，以搜集情报并降低§R恐怖威胁等级§!。随着§Y情报准确度§!的提升，你将能更精确地锁定恐怖组织，最终能够突袭其总部并消除威胁。"
