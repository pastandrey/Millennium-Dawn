 IS_un_aid_general_budget: "§YGeneral Operating Budget§!: $$[?global.un_operating_budget_base|+G3] / week"
 IS_un_aid_general_budget_tt: "Displays the contributions of nations, in descending order, to the §BUN§! §YGeneral Operating Budget§!"
 IS_un_aid_general_budget_tt_delayed: "The §YGeneral Operating Budget§! is the overall base budget that all §BUN§! Member states contribute too, if they meet the minimum requirements. The minimum budget contribution is §Y[?global.general_operating_budget_contribute_percent|%]§! of GDP, calculated yearly at the start of the year, with a minimum contribution of §G$0.001§! required to be added to the budget. Nations that do not meet this minimum do not contribute to the budget that year, and do not receive any budget contribution benefits as a result.\n\nThe §YGeneral Operating Budget§! is the base amount of money that is provided weekly to the §BUnited Nations§! by member states, to be distributed to the various §BUN§! §YAid Programs§!. These contributions are evenly distributed over all of the programs, and provide the initial, base amount that each program receives each week to operate.\n\nNation's receive a bonus to £foreign_influence_modifier_texticon §YForeign Influence§! Multiplier & £foreign_influence_defense_modifier_texticon §YForeign Influence Defense§! Multiplier equal to their percentage of contribution to the §YGeneral Operating Budget§! as a benefit for their contributions."
 is_un_aid_total_budget_spending: "§RTotal Spending§! on §CUN§!:"
 is_un_aid_total_budget_spending_tt: "We currently spend $[?united_nations_expenses|-3] on §BUN§! Funding"
 is_un_aid_total_budget_spending_tt_delayed: "This number displays how much we spend across all §BUN§! §YAid Programs§!, including the §YGeneral Operating Budget§! and our independent spending decisions on all further §BUN§! program contributions."
 is_un_basic_budget_spending: "§RSpending§! on §CUN§! §YBudget§!:"
 is_un_basic_budget_spending_tt: "We currently spend $[?united_nations_base_expenses|-3] on the §BUN§! §YGeneral Operating Budget§!"
 is_un_basic_budget_spending_tt_delayed: "The §YGeneral Operating Budget§! is the base amount of money that is provided weekly to the §BUnited Nations§! by member states, to be distributed to the various §BUN§! §YAid Programs§!. These contributions are evenly distributed over all of the programs, and provide the initial, base amount that each program receives each week to operate. The programs that receive funding from this budget are §YUNDIO§!, §YUNCDF§!, and §YUNESCOE§!"
 is_un_aid_unescoe_spending: "§RSpending§! on §YUNESCOE§!:"
 is_un_aid_unescoe_spending_tt: "We currently spend $[?united_nations_unescoe_funding|-3] on the §YUNSCOE Program§!"
 is_un_aid_unescoe_spending_tt_delayed: "The §BUnited Nations§! §YEducational, Scientific, and Cultural Organization§! is an aid organization designed to improve education, provide technical advice to developing nations, and provide policy dialogue to nations who need assistance growing.\n\nThis §BUN§! §YAid Program§! will provide boosts to £research_speed_texticon §YResearch Speed§! and £political_power_texticon §YPolitical Power Gain§!."
 is_un_aid_unido_spending: "§RSpending§! on §YUNIDO§!:"
 is_un_aid_unido_spending_tt: "We currently spend $[?united_nations_unido_funding|-3] on the §YUNIDO Program§!"
 is_un_aid_unido_spending_tt_delayed: "The §BUnited Nations§! §YIndustrial Development Organization§! is an aid program designed designed to promote industrial development. By helping developing nations establish their own industry, this program fights poverty, establishes inclusive globalization, and also targets environmental sustainability.\n\nThis §BUN§! §YAid Program§! will provide the ability to gain free leased §YCivilian Industry§!, along with improving £construction_speed_texticon §YConstruction Speed§! for nations to help improve their industrial base, power infrastructure, and construction infrastructure."
 is_un_aid_uncdf_spending: "§RSpending§! on §YUNCDF§!:"
 is_un_aid_uncdf_spending_tt: "We currently spend $[?united_nations_uncdf_funding|-3] on the §YUNCDF Program§!"
 is_un_aid_uncdf_spending_tt_delayed: "The §BUnited Nations§! §YCapital Development Fund§! is an aid program designed to improve the flow of capital for national investment. The goal of this program is to create jobs and generate sustainable economic growth, through investment programs and digital finance.\n\nThis §BUN§! §YAid Program§! will provide both §YFinancial§! and §YDevelopment§! support to nations receiving the aid from the program. This program is designed to help improve budgets and boost productivity growth."
 is_un_aid_spending_percent: "§Y基本预算§!%："
 is_un_aid_spending_percent_tt: "The percentage of the §YGeneral Operating Budget§! that we contribute is [?united_nations_contribution_percent|Y%2]"
 is_un_aid_spending_percent_tt_delayed: "The percentage of the §YGeneral Operating Budget§! is both a matter of prestige, and a matter of power. The more we contribute, the more £foreign_influence_modifier_texticon §YForeign Influence§! we will be able to establish over others, and the more effective our influence will be. The higher we are able to make this percentage, the better."
 is_un_aid_additional_percent: "% of §CUN§! §YAid Programs§!:"
 is_un_aid_additional_percent_tt: "The percentage of all §YAid Program Additional Contributions§! that we contribute is [?united_nations_aid_program_contribution_percent|Y%2]"
 is_un_aid_additional_percent_tt_delayed: "The percentage of §YAid Program Additional Contributions§! give is more influence over nations that are receiving aid from the programs, and gives us more £political_power_texticon §YPolitical Power Gain§!, along with improving our chances of getting our §YInvestments§! accepted by other nations by §GDecreasing§! both the time and cost required for our §YInvestments§!"
 is_un_aid_total_budget_ido_tt_delayed: "§Y25%§! of the program's budget goes to helping countries improve their £construction_speed_texticon §YConstruction Speed§!, and the remaining §Y75%§! is used to provide Leased §YCivilian Industries§! to §GSubsidized§! nations."
