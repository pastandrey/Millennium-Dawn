l_simp_chinese:
 Solomon_Islands.1.t: "蒙达协议"
 Solomon_Islands.1.d: "在英联邦特使西蒂韦尼·拉布卡的积极斡旋下，省政府和反对派领导人签署了蒙达协议。该协议概述了一项九点计划，旨在缓和种族暴力，并为宪法改革制定路线图。"
 Solomon_Islands.1.a: "脆弱的和平胜过没有和平。"
 Solomon_Islands.1.b: "废除协议"
 Solomon_Islands.2.t: "马拉伊塔雄鹰部队政变"
 Solomon_Islands.2.d: "政治局势已达到崩溃边缘。今天清晨，据报道，马拉伊塔雄鹰部队成员在准军事警察部队的协助下，控制了霍尼亚拉的关键战略要地。总理[SOL.GetLeader]已被持枪软禁。马拉伊塔雄鹰部队领导层声称政府未能保护马拉伊塔人的利益，并要求立即进行权力交接。民主进程实际上已被中止。"
 Solomon_Islands.2.a: "马纳西·索加瓦雷"
 Solomon_Islands.2.b: "吉米·“拉斯特”·卢西巴埃"
 Solomon_Islands.3.t: "伊萨塔布自由运动袭击霍尼亚拉"
 Solomon_Islands.3.d: "伊萨塔布自由运动发起大规模反攻，旨在将马拉伊坦人的影响力驱逐出岛。游击队员从丛林中涌出，围攻首都霍尼亚拉。由于官方警察部队因种族分歧而分裂，该国已陷入全面内战。伊萨塔布自由运动要求彻底驱逐马拉伊坦定居者，而政府控制的政府则准备血腥保卫城市中心。"
 Solomon_Islands.3.a: "太平洋战争。"
 Solomon_Islands.4.t: "所罗门群岛危机"
 Solomon_Islands.4.d: "[SOL.GetNameWithFlag]已陷入内乱。总理[SOL.GetLeader]的政府因伊萨塔布自由运动和马拉伊塔雄鹰部队之间不断升级的紧张局势而陷入瘫痪。冲突的根源在于瓜达尔卡纳尔岛内部移民问题和原住民土地权利的争议。至关重要的是，金岭矿和其他重要产业已停止运营，威胁到我们在南太平洋的经济利益。"
 Solomon_Islands.4.a: "我们不能忽视这种不稳定性。"
 Solomon_Islands.4.b: "谁在乎他们？我是[ROOT.GetLeader]"
 Solomon_Islands.5.t: "请求调解"
 Solomon_Islands.5.d: "为了竭力避免一场彻底的人道主义灾难，[FROM.GetNameWithFlag]正式请求我们主办一次和平峰会。他们的提议提出了一个通过权力下放和自治改革来安抚各族群的框架，以促进和解。此外，他们还请求派遣一支行政和军事顾问队伍，以确保改革进程不受武装分子干扰。"
 Solomon_Islands.5.a: "接受和平进程"
 Solomon_Islands.5.b: "这是我们的内部纷争，其他人闪开"
 Solomon_Islands.6.t: "拒绝调解"
 Solomon_Islands.6.d: "[SOL.GetNameWithFlag]断然拒绝了我们调解当前危机的提议。其领导层在一份措辞强硬的公报中表示，他们绝不容忍新殖民主义干涉其内政。他们明确表示不欢迎外国顾问和外交干预，并坚持所罗门群岛将在没有外部监督的情况下自行解决争端。"
 Solomon_Islands.6.a: "那么他们将独自承担后果。"
 Solomon_IslandsNews.1000.t: "澳大利亚斡旋所罗门群岛停火"
 Solomon_IslandsNews.1000.d: "经过在昆士兰州汤斯维尔皇家空军基地数日的谈判，各方达成妥协。[SOL.GetNameWithFlag]政府签署了一项全面的和平条约。[AST.GetNameWithFlag]承诺领导国际和平监督小组，监督为期30天的枪支特赦和缴获武器的销毁工作。而[AST.capital.GetName]仍对任务范围扩大保持警惕。"
 Solomon_IslandsNews.1000.a: "所罗门群岛恢复稳定"
 Solomon_IslandsNews.1001.t: "所罗门群岛停火"
 Solomon_IslandsNews.1001.d: "[FROM.GetNameWithFlag]已成功促成[SOL.GetNameWithFlag]交战各方之间的停火。该协议概述了裁军和宪法改革路线图。各方均同意立即停止敌对行动，并建立一支中立的监督部队。"
 Solomon_IslandsNews.1001.a: "所罗门群岛恢复稳定"
 Solomon_IslandsNews.1002.t: "所罗门群岛发生政变"
 Solomon_IslandsNews.1002.d: "马拉伊塔雄鹰部队是一个马拉伊塔武装组织，已占领首都霍尼亚拉。今天清晨，马拉伊塔雄鹰部队利用偷来的警用武器，并在部分警察部队成员的支持下，包围了总理巴塞洛缪·乌卢法阿卢的住所。在重兵把守和城市军火库落入叛军手中后，乌卢法阿卢被迫辞职。马拉伊塔雄鹰部队支持的政府现在声称自己是霍尼亚拉的唯一执政权。"
 Solomon_IslandsNews.1002.a: "风暴将至"
 Solomon_IslandsNews.1003.t: "所罗门群岛陷入叛乱"
 Solomon_IslandsNews.1003.d: "内战以伊萨塔布自由运动的全面胜利告终。经过长期的游击战，伊萨塔布自由运动成功迫使霍尼亚拉的马拉伊塔雄鹰部队政权垮台。"
 Solomon_IslandsNews.1003.a: "霍尼亚拉的民主制度崩溃了。"
 Solomon_IslandsNews.1004.t: "所罗门群岛内战的结束"
 Solomon_IslandsNews.1004.d: "内战以伊萨塔布自由运动的全面胜利告终。经过长期的游击战，伊萨塔布自由运动成功迫使霍尼亚拉的马拉伊塔雄鹰部队政权垮台。"
 Solomon_IslandsNews.1004.a: "下一章是什么？"
 Solomon_IslandsNews.1005.t: "所罗门群岛内战的结束"
 Solomon_IslandsNews.1005.d: "马拉伊塔雄鹰部队与残存的国家警察部队联合行动，最终粉碎了伊萨塔布自由运动的叛乱。此前，他们向瓜达尔卡纳尔岛内陆发动了残酷的进攻。"
 Solomon_IslandsNews.1005.a: "下一章是什么？"
 SOL_Histoical_path_TT: "这是[SOL.GetNameWithFlag]的§Y史实选择§!"
 SOL_Lead_to_hostilities_TT: "这将在[SOL.GetNameWithFlag]引发§R敌对行动§!"
 SOL_IFM: "伊萨塔布自由运动"