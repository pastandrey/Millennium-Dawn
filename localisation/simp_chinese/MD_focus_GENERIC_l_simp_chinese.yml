l_simp_chinese:
 GENERIC_anti_corruption_reforms: "反腐改革"
 GENERIC_anti_corruption_reforms_desc: "通过批准反腐败改革，我们有希望减少我们国家的内部腐败。"
 GENERIC_network_infrastructure: "互联网基础设施"
 GENERIC_network_infrastructure_desc: "现代世界已经将互联网变成了人类的基本需求。投资于这一需求将有助于教育、建筑工作等等。"
 GENERIC_centralization: "集权制"
 GENERIC_centralization_desc: "国家的中央集权将有助于维持我们广阔的国家。国家的中央化也将有助于带来更多的政治资本，并在提高政治资本的同时，产生一些额外的税收收入。"
 GENERIC_decentralization: "地方分权"
 GENERIC_decentralization_desc: "将国家权力下放，消除繁文缛节，将有助于减少整体的官僚主义成本，鼓励更多的增长。"
 GENERIC_political_reform: "政治改革"
 GENERIC_political_reform_desc: "为了防止国内政局停滞，政府必须使国家和他的人民都积极参与到包括起草法律、任命政府官员、通过资金计划和规划公共项目的政治活动当中去。[Root.GetAdjective]政府在现代化和提升国家实力方面可能是不会满足的。"
 GENERIC_cabinet_reform: "内阁改革"
 GENERIC_cabinet_reform_desc: "通过替换目前在内阁中的几个主要的反对政府首脑行为的人物，行政部门可以在处理即将到来的政治问题和危机时发挥力量和决心。在做这些时，我们必须无视仇恨者、失败者和反对者。"
 GENERIC_expand_the_secret_service: "扩大特勤局"
 GENERIC_expand_the_secret_service_desc: "[Root.GetNameDef]的安全在很大程度上取决于其军事和民用情报机构的实力。我们必须找到有效的对策来对抗敌对特工、社会上的颠覆分子、恐怖分子或敌人潜在的核打击（至少并非不可能）。"
 GENERIC_build_intelligence_stations: "建立情报站"
 GENERIC_build_intelligence_stations_desc: "作为二战时期雷达站的延续，情报站将向我们提供有关敌军行动和侵入飞机的详细报告。我们将利用冷战时期间谍活动和策划阴谋的经验。"
 GENERIC_strengthen_government: "强化政府"
 GENERIC_strengthen_government_desc: "我们现有的政府需要加强一些力量。在政治上巩固我们党的地位将使我们有更多的选择来推行各种政策。"
 GENERIC_political_games: "政治博弈"
 GENERIC_political_games_desc: "没有广阔的政治文化的政府是什么？我们必须播下辩论和讨论的种子，使我们的政治环境繁荣和稳定。"
 GENERIC_the_establishment: "加强现有体制"
 GENERIC_the_establishment_desc: "建制派的人物已经加强了他们对国家政治的控制。我们可以利用这一点，为国家事务争取更多的自主权。"
 GENERIC_the_state: "我们的国家"
 GENERIC_the_state_desc: "只要我们坚定地掌管我们的国土，我们就能一劳永逸地消除那些分裂和拖延的害虫，它们已经困扰了我们的国家很久了。"
 GENERIC_diplomatic_positions: "外交位置"
 GENERIC_diplomatic_positions_desc: "在进行政治改革和关注外交事务之后，我们可以与邻国建立统一的外交立场，实现更大的国际合作。"
 GENERIC_our_place: "我们的地盘"
 GENERIC_our_place_desc: "我们是自己的主人 - 我们应该摆脱那些贪婪的影响力者的控制。"
 GENERIC_station_in_the_world: "对于世界的看法"
 GENERIC_station_in_the_world_desc: "把我们的国家展现给世界，将会给我们带来无数的好处 - 包括让我们的领导人拥有更多的行动力。"
 GENERIC_the_west: "亲近西方"
 GENERIC_the_west_desc: "西方国家强调民主和自由，并常向美国靠拢，其努力保持世界政治的现状。"
 GENERIC_eastern_emergence: "东方崛起"
 GENERIC_eastern_emergence_desc: "在政治上，新兴国家希望偏离目前的世界秩序，并建立新的组织来取代旧的组织。虽然不是严格意义上的反美或反西方，但新兴国家经常试图破坏西方的影响。"
 GENERIC_non_aligned: "不结盟主义"
 GENERIC_non_aligned_desc: "中立国家尽量不参与全球政治，通常专注于内部或区域发展。他们对西方或东方都没有强烈的感觉。"
 GENERIC_the_conservative_approach: "保守主义"
 GENERIC_the_conservative_approach_desc: "保守国家积极地试图维持全球现状，专注于维护西方旧势力的政治风格和国际视野。"
 GENERIC_the_nationalist_rise: "民族主义"
 GENERIC_the_nationalist_rise_desc: "民族主义国家非常注重自身，以及他们国家过去的辉煌。他们经常陷入专制政治，并促进单一种族或民族的存在。"
 GENERIC_the_salafist_rise: "萨拉菲派崛起"
 GENERIC_the_salafist_rise_desc: "萨拉菲主义是对伊斯兰教的一种极端保守的解释。萨拉菲主义者希望改革伊斯兰教，使其回到更传统和字面的根源，必要时可使用武力。"
 GENERIC_western_ideas: "西方的观点"
 GENERIC_western_ideas_desc: "西方所珍视的民主和自由的理想，是任何有尊严的国家成功的关键。我们应该效仿它们。"
 GENERIC_the_rising_powers: "崛起的力量"
 GENERIC_the_rising_powers_desc: "一个国家应该遵循不可见的操纵者的规则多久呢？让我们摆脱这个不公正和腐败的世界秩序，和我们的同胞一起崛起吧。"
 GENERIC_us_above_all: "我们最重要"
 GENERIC_us_above_all_desc: "国家是世界上唯一神圣和纯洁的东西。它不仅应该受到尊重，而且应该满足它的需求 - 不管别人对此有多么强烈的感受！"
 GENERIC_jihad: "吉哈德"
 GENERIC_jihad_desc: "真主是伟大的！"
 GENERIC_international_diplomacy: "国际外交"
 GENERIC_international_diplomacy_desc: "国际外交就是进行幕后交易，公开表达自命清高以及大国之间分割弱邻的艺术，这种具有悠久而务实的马基雅维里主义思想的实践由来已久。 无论如何，外交的主要目标是确保本国的石油供应。[Root.GetNameDef]也不会落后。"
 GENERIC_trade_with_the_neighbors: "与邻国的贸易"
 GENERIC_trade_with_the_neighbors_desc: "在通过扩大外交人员和扩大交通网络与我们的近邻取得联系后，我们现在可以与我们的邻国伙伴进行更紧密的贸易一体化。 这对于我们的大公司和小商人都是有利可图的。"
 GENERIC_alignment_debate: "结盟辩论"
 GENERIC_alignment_debate_desc: "在国际外交中孤立主义与干涉主义相互冲突又相互依存的问题是一个没有定论的问题。"
 GENERIC_neutrality: "中立主义"
 GENERIC_neutrality_desc: "我们应该始终最关心[Root.GetAdjective]公民的安全与繁荣。 我们不能将我们的年轻人，自然资源和金融资产浪费在外国的瓜葛之中。 相反，我们必须通过保卫我们的边境和避免加入国际同盟网来确保他们的家园是安全的。"
 GENERIC_interventionism: "干涉主义"
 GENERIC_interventionism_desc: "在国际舞台上只看我们自己，不仅是自私的，而且是对世界各国人民的侮辱。无论付出什么代价，我们都应该确保该地区乃至全球每个人的繁荣和安全！如果我们在使用[Root.GetNameDef]时碰巧占用了一些额外的资源和满足感..."
 GENERIC_build_fortifications: "建设防御工事"
 GENERIC_build_fortifications_desc: "强大的防御建筑是在外国势力入侵时保障坚不可摧的前线的关键。"
 GENERIC_militarism: "军国主义"
 GENERIC_militarism_desc: "军国主义是指一个国家拥有一支强大的军队，用于在国内和国外确保和保护国家利益的想法。"
 GENERIC_peaceful_emergence: "和平崛起"
 GENERIC_peaceful_emergence_desc: "尽管我们的世界观不同，但我们不应该敌视旧秩序，而是慢慢地通过外交和经济来努力改变世界。"
 GENERIC_revanchism: "复仇主义"
 GENERIC_revanchism_desc: "复仇主义指的是一个国家想要夺回先前失去的领土的意愿。复仇主义在法国失去阿尔萨斯-洛林后流行起来，至今仍然是许多国家政治中的关键因素。"
 GENERIC_build_roads: "修建道路"
 GENERIC_build_roads_desc: "交通是世界上任何发达地区的关键，我们可以通过在全国各地建设道路，特别是在欠发达地区，来鼓励人们更多地接受教育和享受城市生活。"
 GENERIC_build_railways: "修建铁路"
 GENERIC_build_railways_desc: "交通是世界上任何发达地区的关键，我们可以通过在国家较不发达的地区修建铁路，来促进工业化以及建立快速而便宜的运输方式。"
 GENERIC_build_highways: "修建高速公路"
 GENERIC_build_highways_desc: "为了方便[Root.GetNameDef]全境的长途交通，我们需要高速公路。让我们建造一些吧。"
 GENERIC_expand_urban_areas: "城镇扩张"
 GENERIC_expand_urban_areas_desc: "[Root.GetNameDef]的城市地区是它进步和潜在经济的核心。通过扩大和改善城市化生活，我们可以进一步集中经济并激发公民活力。"
 GENERIC_developmentalism: "唯发展主义"
 GENERIC_developmentalism_desc: "唯发展主义是一种经济理论，它认为发展欠发达国家经济的最佳途径是建立一个强大的、多样化的、高关税的内部市场。"
 GENERIC_increase_resource_production: "改善资源生产"
 GENERIC_increase_resource_production_desc: "我们生产场所的资源产量越高，批量出口时的收入就越高。优先考虑资源开采，可以让我们提升经济水平，也可以让我们为我们的军队生产更多的装备。"
 GENERIC_economic_autonomy: "经济自主"
 GENERIC_economic_autonomy_desc: "对一个国家来说，最大的危险之一是将我们的经济交给外国势力。我们的人民不是给他们压迫的，那是我们的份内之事。"
 GENERIC_autarky: "自给自足"
 GENERIC_autarky_desc: "自给自足是我们可以教给公民的最重要的事情之一。它不仅意味着官僚机构的工作量减少，而且意味着国家安全威胁减少、对国内政治的控制增强、以及人民素质提高。"
 GENERIC_economic_measures: "经济措施"
 GENERIC_economic_measures_desc: "通过实施经济监管措施和国际债务控制，我们可以刺激地方预算增长并降低债务利率。"
 GENERIC_assure_the_national_fuel_reserve: "保障国家燃料储备"
 GENERIC_assure_the_national_fuel_reserve_desc: "我们的石油非常重要，不仅对于军用车辆和装甲而言，也对于普通民用交通和日常使用而言。我们可以加深燃料仓库，以使国家燃料储备更有效地储存这种黑色黄金。"
 GENERIC_ease_of_business_reforms: "经济改革"
 GENERIC_ease_of_business_reforms_desc: "鼓励[Root.GetAdjective]公民消费和创业的一种可能方法是改革法律和经济，使得独立企业家更容易也更有利可图地谋生。"
 GENERIC_attract_foreign_investors: "吸引外国投资者"
 GENERIC_attract_foreign_investors_desc: "通过放松商业法律，我们可以让我们的土地对那些机会主义的外国投资者更有吸引力，他们可能会在我们所在之处看到一两颗闪亮的星星。"
 GENERIC_mobilize_the_working_class: "动员工人阶级"
 GENERIC_mobilize_the_working_class_desc: "增加招募中心的支出是确保我们有足够人力和工业支持来推动[Root.GetNameDef]走向胜利（如果发生冲突）的最可靠方法之一。"
 GENERIC_light_industry_investments: "发展轻工业"
 GENERIC_light_industry_investments_desc: "向民用产业以及石油综合体注入资本可以帮助我们在最艰难的时刻推动我们的经济前进。"
 GENERIC_heavy_industry_investments: "发展重工业"
 GENERIC_heavy_industry_investments_desc: "向军工联合体注入资本将提高装备产量，确保我们所有的部队都有良好的作战装备。"
 GENERIC_refitting_the_military_industry: "改造军事工业"
 GENERIC_refitting_the_military_industry_desc: "我们可以建立新工厂，以确保我们的设备生产不会落后。"
 GENERIC_satisfy_the_middle_class: "满足中产阶级"
 GENERIC_satisfy_the_middle_class_desc: "中产阶级也许是这个国家最大的利益群体。主要由工业和商业集团组成，可以预期到，扩大城市基础设施会让他们满意。"
 GENERIC_build_churches: "建造教堂"
 GENERIC_build_churches_desc: "如果我们想让神父和神职人员高兴，我们还必须注入一些资本，通过土地建设教堂、寺庙和其他赞美的地方。普通公民也将更加脚踏实地，这也是一种好处。"
 GENERIC_please_the_upper_class: "取悦上层阶级"
 GENERIC_please_the_upper_class_desc: "寡头政治在任何国家中都是一个小而重要的部分，他们是投资、土地收购和微观和宏观经济背后的不可见之手。讨好他们对我们来说是很自然的事情。"
 GENERIC_import_foreign_automobiles: "进口外国汽车"
 GENERIC_import_foreign_automobiles_desc: "外国的月亮比较圆，邻国的汽车也总是比自己的干净。直接从外国工厂进口汽车，将是一个很好的借口，让我们为自己制造一些政府的宣传。"
 GENERIC_invest_in_biofuels: "投资生物燃料"
 GENERIC_invest_in_biofuels_desc: "替代能源是未来！…至少投资者是这么说的。不管怎样，我们相信他们的利益和我们国家的利益是一致的。"
 GENERIC_assure_intellectual_freedoms: "保障知识分子自由"
 GENERIC_assure_intellectual_freedoms_desc: "让[Root.GetNameDef]所有的知识分子知道，他们的科学努力不仅有价值，而且是我们繁荣的关键，无论他们的意识形态或政治立场如何，我们都会保护他们。"
 GENERIC_create_an_automotive_industry: "创办汽车工业"
 GENERIC_create_an_automotive_industry_desc: "等我们学会了那些讨厌的外国人制造汽车的所有小秘密，我们就可以开始利用我们自己的替代方案来刺激国内工业，并顺便取悦下层阶级。"
 GENERIC_build_primary_schools: "建立基础教育"
 GENERIC_build_primary_schools_desc: "教育——世界上任何国家人民的心脏和灵魂。特别是初等教育，非常重要，必须让所有人都能接受——因为一个没有受过教育的孩子会长成一个没有受过教育的成年人。建立更多的初等教育机构将让我们提高国家的识字率。"
 GENERIC_assure_access_to_education: "保障受教育权"
 GENERIC_assure_access_to_education_desc: " 教育不仅是一种基本需求，更是一种权利！我们需要确保它能够充分地为所有公民提供，无论何时何地。下一代知识分子一定会在完成后给我们提供一些支持。"
 GENERIC_expand_the_universities: "扩展大学"
 GENERIC_expand_the_universities_desc: " 现在初等教育的基础已经建立，我们可以开始投资高等教育，让天才和世界闻名的知识分子也能从[Root.GetNameDef]出现。"
 GENERIC_industrial_research_task_forces: "工业研究特遣队"
 GENERIC_industrial_research_task_forces_desc: "我们的工业研究特遣队将是一个由国家资助的研究团队，致力于观察最佳工业实践，以便我们将来可以实施它们。"
 GENERIC_naval_reform: "海军改革"
 GENERIC_naval_reform_desc: "是时候摒弃我们过时的海军做法，开始更加重视水上力量了。"
 GENERIC_naval_bases: "海军基地"
 GENERIC_naval_bases_desc: "在沿海地区建造码头和港口不仅有利于工业，也有利于海军。"
 GENERIC_submarines: "潜艇"
 GENERIC_submarines_desc: "我们可以开始研究潜艇技术，以防止任何入侵者靠近我们水面上的船只。"
 GENERIC_surface_ships: "水面舰艇"
 GENERIC_surface_ships_desc: "作为任何海上行动背后的强大力量，调查最有效和现代化的水面舰艇将直接带领我们走向海上霸权。"
 GENERIC_dockyards: "海军船坞"
 GENERIC_dockyards_desc: "建造更多的港口和刺激海军工业是我们在商业和战场中蓬勃发展所必需的！"
 GENERIC_nuclear_submarines: "核潜艇"
 GENERIC_nuclear_submarines_desc: "核潜艇是由核反应堆提供动力的潜艇。它们更强大，速度更快，而且几乎永远不需要补充燃料。"
 GENERIC_naval_doctrine_innovations: "海军学说革新"
 GENERIC_naval_doctrine_innovations_desc: "我们可以学习一些最强大的军事世界秩序的标准派别学说，以使我们自己在海上作战中变得更加有效。"
 GENERIC_aircraft_carriers: "航空母舰"
 GENERIC_aircraft_carriers_desc: "航空母舰是作为海上空军基地的军舰，配备有全长的飞行甲板和运载、武装、部署和回收飞机的设施。"
 GENERIC_naval_doctrine_expertise: "海军学说专精"
 GENERIC_naval_doctrine_expertise_desc: "把现代海军理论的每一个要素都整合到一套综合战术中，即使是最强大的海上强国也会因我们的实力而战栗。"
 GENERIC_vessel_production: "船舶建造"
 GENERIC_vessel_production_desc: "通过优化造船厂文书工作和促进沿海地区的海军文化，可能会提高海军生产率。"
 GENERIC_air_force_reform: "空军改革"
 GENERIC_air_force_reform_desc: "在一个国家控制自己的天空就是一个国家控制自己的土地这一原则下，我们必须在有关空军的所有学说中追求现代化。"
 GENERIC_fighter_planes: "战斗机"
 GENERIC_fighter_planes_desc: "战斗机或歼击机在设计时就考虑到了空对空交战。 它们是我们空军在任何战场上获得空中优势的主要方式。"
 GENERIC_air_doctrine_innovations: "空军学说革新"
 GENERIC_air_doctrine_innovations_desc: "空中条令的变化与我们和我们敌人的技术一样快，并随之发展和演变。 是时候加快这个进程了。"
 GENERIC_countermeasures_against_aircraft: "对空策略"
 GENERIC_countermeasures_against_aircraft_desc: "如果我们要保卫我们的土地免受潜在空中优势对手的攻击，那么我们必须特别关注防空武器技术。"
 GENERIC_bomber_planes: "轰炸机"
 GENERIC_bomber_planes_desc: "即使在当今运输不规则的时代，使用轰炸机进行战略轰炸也会挫伤敌人的士气并破坏其后勤网络。 这是进攻时的优先事项。"
 GENERIC_drones: "无人机"
 GENERIC_drones_desc: "无人机技术将使我们能够轰炸、暗杀和消灭远距离目标，无论是人类还是基础设施，而无需牺牲一点人力，因为无人机是远程控制的。"
 GENERIC_air_doctrine_expertise: "空军学说专精"
 GENERIC_air_doctrine_expertise_desc: "我们的空军现在确实是一支不可忽视的力量——我们所采用的战术也是如此。 继续现代化和发展我们的学说将使我们能够以前所未有的方式控制天空。"
 GENERIC_army_reform: "陆军改革"
 GENERIC_army_reform_desc: "陆军改革将是首要任务，没有强大的陆军我们就无法保卫我们的国家。"
 GENERIC_military_emergency: "军事应急"
 GENERIC_military_emergency_desc: "战局已对我们极为不利的境地，我们只好发出紧急征召，集中一切力量，共克时艰。"
 GENERIC_land_doctrine_innovations: "陆军学说革新"
 GENERIC_land_doctrine_innovations_desc: "现代战争需要适应。通过用新战略和新技术更新我们的理论，我们可以确保我们的军队保持高效，并为未来的冲突做好准备。"
 GENERIC_military_exercises: "军事演习"
 GENERIC_military_exercises_desc: "密集的演习提高了战斗准备和部队协调能力，确保我们的部队在压力下完美地发挥作用。"
 GENERIC_military_education_reform: "军事教育改革"
 GENERIC_military_education_reform_desc: "现代化军事教育可以培养更强大的领导者、更敏锐的战略家和一支能够应对当代挑战的力量。"
 GENERIC_infantry_equipment_development: "步兵装备研发"
 GENERIC_infantry_equipment_development_desc: "先进的步兵装备确保我们的士兵拥有先进的工具，提高他们在战场上的作战效率和生存能力。"
 GENERIC_land_doctrine_expertise: "陆军学说专精"
 GENERIC_land_doctrine_expertise_desc: "增强对现代陆军理论的理解使我们能够最大限度地提高战场效率并智胜任何对手。"
 GENERIC_artillery_experiments: "火炮实验"
 GENERIC_artillery_experiments_desc: "测试新的火炮系统和技术可以提高现代战场的精确度、火力和适应性。"
 GENERIC_uniform_improvements: "改善制服"
 GENERIC_uniform_improvements_desc: "升级军装可以提高舒适性、耐用性和对各种作战环境的适应性。"
 GENERIC_self_propelled_artillery: "自行火炮营"
 GENERIC_self_propelled_artillery_desc: "机动性与火力的结合确保我们的炮兵能够快速支援前进的部队并应对不断变化的战线。"
 GENERIC_develop_armor_prototypes: "开发装甲原型车"
 GENERIC_develop_armor_prototypes_desc: "设计下一代装甲车可以增强我们以强大的火力和防护能力主宰地面战斗的能力。"
 GENERIC_countermeasures_against_armored_units: "反装甲对策"
 GENERIC_countermeasures_against_armored_units_desc: "开发有效的战术和武器来对抗敌人的装甲部队确保我们能够有效地消灭他们的重型部队。"
 GENERIC_energy_sector: "能源领域"
 GENERIC_energy_sector_desc: "一个国家要想维持下去，首先必须让其能源部门保持与时俱进。我们应该建设化石燃料工厂和一些可再生能源基础设施，为整个地区提供负担得起的、可靠的能源。"
 GENERIC_fossil_powerplant: "化石燃料发电厂"
 GENERIC_fossil_powerplant_desc: "我们可以将能源领域的重点放在选择化石燃料作为正确的选择上，牺牲产量和创新来换取廉价且经过充分研究的能源生产方法。"
 GENERIC_improved_energy_cycling: "改进发电厂"
 GENERIC_improved_energy_cycling_desc: "通过公开我们在能源领域的立场，更多的公司和组织将选择化石燃料能源生产。 这也意味着可再生能源将面临停工。"
 GENERIC_renewable_retooling: "可再生能源重组"
 GENERIC_renewable_retooling_desc: "相反，我们可以将能源领域的重点放在选择可持续的替代燃料上，通过牺牲可靠性和承受更高的成本来获得高产量和低环境影响。"
 GENERIC_combined_military_defense_industries: "联合国防工业"
 GENERIC_combined_military_defense_industries_desc: "通过我们的出色工作和努力，我们现在能够更有效地运营我们的国防工业。"
 GENERIC_renewable_infrastructure: "可再生能源基础设施"
 GENERIC_renewable_infrastructure_desc: "既然我们国家对可再生能源的炒作已经升温，我们可以在感兴趣的投资者的财政援助下继续建设可持续的基础设施。"
 GENERIC_unemployment_program: "失业方案"
 GENERIC_unemployment_program_desc: "可能会采取仓促措施，以确保我们能够在国家开始遭受苦难之前取消更高的失业门槛。 它们的实施也可能是为了人民的利益而修改我们的福利和医疗保健预算的一种方式。"
 GENERIC_debt_refactoring: "重组债务"
 GENERIC_debt_refactoring_desc: "为了改善生活和提高政府效率而谈判我们的贷款从来不是一件坏事。"
 GENERIC_productivity_measures: "生产率衡量指标"
 GENERIC_productivity_measures_desc: "只有生产率的提高，才能进一步增强我们国家的实力。"
 GENERIC_improved_worker_productivity: "改善工人生产率"
 GENERIC_improved_worker_productivity_desc: "进一步发展生产率，提高人均产出，可以有效地增加我们的总产量。"
 GENERIC_the_manpower_solution: "人力解决方案"
 GENERIC_the_manpower_solution_desc: "人口不足，则一事无成。采取行动，让我们的人口快速增长。"
 GENERIC_emphasize_autarkic_measures: "强调进一步自给自足措施"
 GENERIC_emphasize_autarkic_measures_desc: "谁需要全球市场？我们可以从自己的工厂供应我们的需求。"
 GENERIC_reaching_to_the_global_market: "进军全球市场"
 GENERIC_reaching_to_the_global_market_desc: "只有走向全球市场，我们才能进一步挖掘我国的潜力，并在世界舞台上站稳脚跟。"
 GENERIC_agricultural_district_subsidization: "农业区补贴"
 GENERIC_agricultural_district_subsidization_desc: "粮食问题不能忽视。补贴我们的农业，尽可能使我国实现粮食自给。"
 GENERIC_nuclear_energy_expansions: "核能扩张"
 GENERIC_nuclear_energy_expansions_desc: "核能利用是未来的趋势，必须进一步深度开发利用。"
 GENERIC_public_service_announcement: "公共服务公告"
 GENERIC_public_service_announcement_desc: "我们必须建立一种标准化的方式，直接通过公民传达公共利益信息。这就是通过公益广告来实现的。"
 GENERIC_domestic_vehicle_research: "车辆试验场"
 GENERIC_domestic_vehicle_research_desc: "为了获得最新的军用车辆，我们不能仅仅依赖战略合作伙伴提供车辆。我们必须建立车辆试验场，在那里测试和开发国产装甲车辆。"
 GENERIC_domestic_naval_research: "[ROOT.GetAdjective]战舰开发"
 GENERIC_domestic_naval_research_desc: "确保航道安全对我们的经济至关重要。如果我们失去盟友的海军力量，我们就会陷入困境。我们必须建立一个可以制造我们自己的军舰的设施。"
 GENERIC_domestic_aircraft_research: "国内喷气式飞机计划"
 GENERIC_domestic_aircraft_research_desc: "飞机是地球上最精密的机器之一，而我们还不知道如何制造它。我们必须制造自己的国产军用飞机，向世界展示我们的技术实力。"
 GENERIC_secret_weapons_program: "秘密武器研究"
 GENERIC_secret_weapons_program_desc: "核武器、太空计划、核聚变能和其他科学奇迹正在等待探索。这将使我们比所有敌人都更具优势。"
 GENERIC_capital_defense_scheme: "首都防御计划"
 GENERIC_capital_defense_scheme_desc: "建立更加周密的防御体系以抵御飞机和其他空中威胁，将确保我们的人民从现在起直至永远感到安全。"
 GENERIC_light_helicopter_operators: "轻型直升机航母"
 GENERIC_light_helicopter_operators_desc: "直升机航母是一种主要用于搭载直升机的航空母舰，但也经常被归类为两栖攻击舰或反潜航空母舰，主要用于执行包括反潜战、两栖作战和近距空中支援等军事航空任务。"
 GENERIC_defense_scheme_beta: "进一步首都防御计划"
 GENERIC_defense_scheme_beta_desc: "进一步完善我国首都的防御，确保在任何情况下都不会出现问题。"
 GENERIC_military_equipment_procurement: "军事装备采购"
 GENERIC_military_equipment_procurement_desc: "如果没有足够的武器，我军就很难完成任何任务，因此我们启动了武器紧急采购工作。"
 GENERIC_capital_defense_scheme_tt: "在§Y随机控制地区§!中产生§G1§!§Y防空建筑§!"
 GENERIC_defense_scheme_beta_tt: "在§Y随机控制地区§!中产生§G1§!§Y防空建筑§!"
 GENERIC_expand_the_strategic_reserves: "扩大战略储备"
 GENERIC_expand_the_strategic_reserves_desc: "在现有国家燃料储备的基础上，我们可以进一步扩大战略储备，以确保危机时期的能源安全。增建的燃料筒仓将保障我们的经济和军事行动。"
 GENERIC_subsistence_agriculture_investments: "自给农业投资"
 GENERIC_subsistence_agriculture_investments_desc: "支持小规模自给农业将确保农村社区的粮食安全，并维护全国的传统农业实践。"
 GENERIC_focus_towards_the_subsistence: "以生存为导向"
 GENERIC_focus_towards_the_subsistence_desc: "通过优先发展自给农业，我们可以增强农村自给自足能力，并确保我们的农业部门保持稳定和韧性。"
 GENERIC_commercialized_agriculture_investments: "商业化农业投资"
 GENERIC_commercialized_agriculture_investments_desc: "投资机械化和商业化农业将提高生产力，并将我们的农业部门转变为现代化的、出口导向型产业。"
 GENERIC_encourage_more_commercial_agriculture: "鼓励商业农业"
 GENERIC_encourage_more_commercial_agriculture_desc: "通过商业化耕作方式进一步实现农业部门的现代化，将提高产量，使我们在全球食品市场更具竞争力。"
 GENERIC_a_new_breadbasket: "新的粮仓"
 GENERIC_a_new_breadbasket_desc: "通过全面实现农业基础设施和实践的现代化，[Root.GetNameDef]可以成为主要的食品生产国，养活我们的人民并出口到世界各地。"
 GENERIC_microchip_research_and_development: "微芯片研发"
 GENERIC_microchip_research_and_development_desc: "半导体技术是现代电子和计算机的基础。投资微芯片研发将提升我们的技术能力，并减少对国外供应商的依赖。"
 GENERIC_microchip_domestic_production: "国内微芯片生产"
 GENERIC_microchip_domestic_production_desc: "建立国内微芯片生产设施将保障我们的技术供应链，并使[Root.GetNameDef]成为全球半导体行业的参与者。"
 GENERIC_synthetic_refinery_expansion: "合成精炼厂扩建"
 GENERIC_synthetic_refinery_expansion_desc: "扩大我们的合成材料生产能力，将确保我们即使在供应中断时期也能获得民用和军用工业所需的关键材料。"
 GENERIC_military_industry_investment_projects: "军事工业投资项目"
 GENERIC_military_industry_investment_projects_desc: "Major investment projects in our defense industry will expand our capacity to produce military equipment and strengthen our industrial base."
 GENERIC_hydroelectric_energy_expansion: "水力发电能源扩张"
 GENERIC_hydroelectric_energy_expansion_desc: "利用水力发电大坝来驾驭我们水道的力量，既能提供清洁、可再生能源，又能减少我们对化石燃料的依赖。"
 GENERIC_geothermal_energy_expansion: "地热能源扩张"
 GENERIC_geothermal_energy_expansion_desc: "开发利用地热能源将提供可靠、可持续的电力，并使我们的可再生能源组合多样化。"
 GENERIC_battery_park_investments: "储能园区投资"
 GENERIC_battery_park_investments_desc: "大规模电池储能设施将使我们能够高效地储存可再生能源，即使在没有阳光或没有风的情况下也能确保稳定的电力供应。"
 GENERIC_nuclear_energy_expansions_two: "进一步扩展核能"
 GENERIC_nuclear_energy_expansions_two_desc: "继续推进核能计划，建设更多反应堆，将在未来几十年内提供充足的无碳电力。"
 GENERIC_reinforced_electric_grid: "强化电网"
 GENERIC_reinforced_electric_grid_desc: "加强和巩固我们的电网基础设施将确保可靠的电力分配，并降低全国范围内停电的风险。"
 GENERIC_high_capacity_electric_grid: "大容量电网"
 GENERIC_high_capacity_electric_grid_desc: "升级为大容量电网将使我们能够应对工业增长和交通电气化带来的日益增长的电力需求。"
 GENERIC_targeted_pension_fund_investments: "定向养老基金投资"
 GENERIC_targeted_pension_fund_investments_desc: "对养老基金的战略性投资将保障我们公民的退休生活，同时也将稳定我们的社会保障体系。"
 GENERIC_emphasize_separation_of_church_and_state: "政教分离"
 GENERIC_emphasize_separation_of_church_and_state_desc: "强调宗教机构与政府的分离，将使我们的政治制度现代化，并确保所有信仰的公民都受到平等对待。"
 GENERIC_artificial_intelligence_investments: "人工智能投资"
 GENERIC_artificial_intelligence_investments_desc: "人工智能代表着技术的未来。投资人工智能的研发将使[Root.GetNameDef]处于这一革命性领域的前沿。"
 GENERIC_large_ship_drydocks: "大型船舶干船坞"
 GENERIC_large_ship_drydocks_desc: "建造能够建造和维护大型军舰（包括航空母舰和两栖攻击舰）的专用干船坞，将增强我们的海军造船能力。"
 GENERIC_improved_repair_facilities: "改进的维修设施"
 GENERIC_improved_repair_facilities_desc: "海军维修设施的现代化将减少维护停机时间，并使我们的舰队始终保持运转和作战准备状态。"
 GENERIC_composite_industrial_expansion: "复合工业扩张"
 GENERIC_composite_industrial_expansion_desc: "扩大复合材料产业规模将为航空航天、海军和装甲车辆生产提供先进材料。"
 GENERIC_weapon_conversion_packages: "武器改装套件"
 GENERIC_weapon_conversion_packages_desc: "开发模块化武器转换组件将使我们能够快速升级和改造现有的军事系统，以应对新的威胁和技术。"
 GENERIC_convoy_and_freighter_production: "护航船队和货船生产"
 GENERIC_convoy_and_freighter_production_desc: "扩大商船和护航船队的生产规模，将确保我们的海上贸易航线安全，并在战时保护重要的补给线。"
 GENERIC_establish_a_marine_corps: "建立海军陆战队"
 GENERIC_establish_a_marine_corps_desc: "建立一支专门从事两栖作战的海军陆战队，将使我们能够从海上投射力量并进行复杂的登陆作战。"
 GENERIC_submarine_expansion_project: "潜艇扩建项目"
 GENERIC_submarine_expansion_project_desc: "扩充我们的潜艇舰队，建造现代化潜艇，将增强我们的水下作战能力，并对潜在对手构成强大的威慑。"
 GENERIC_stealth_ships: "隐形舰艇"
 GENERIC_stealth_ships_desc: "发展隐形海军技术将降低我方舰艇的雷达信号特征，并在现代海战中提供关键的战术优势。"
 GENERIC_air_base: "空军基地建设"
 GENERIC_air_base_desc: "建设新的空军基地和扩建现有设施将为支持一支现代化空军和向该地区投射空中力量提供必要的基础设施。"
 GENERIC_satellite_programs: "卫星计划"
 GENERIC_satellite_programs_desc: "发展军事卫星能力将为我们的武装部队提供侦察、通信和导航支持，使我们获得至关重要的信息优势。"
 GENERIC_air_base_expansion_plan: "空军基地扩建计划"
 GENERIC_air_base_expansion_plan_desc: "全面扩建我们的空军基地网络将扩大我们的作战范围，使我们能够在领土内更有效地部署空中力量。"
 GENERIC_air_base_expansion_plan_two: "高级空军基地扩建"
 GENERIC_air_base_expansion_plan_two_desc: "进一步扩建和现代化我们的空军基地将打造世界一流的军事航空基础设施，能够支持最先进的飞机。"
 GENERIC_domestic_drone_production: "国内无人机生产"
 GENERIC_domestic_drone_production_desc: "建立国内无人机生产设施将确保我们获得这些关键系统的供应，并使我们能够根据我们特定的运营需求定制无人机。"
 GENERIC_domestic_helicopter_production: "国内直升机生产"
 GENERIC_domestic_helicopter_production_desc: "发展国内直升机生产能力，既能为我军提供可靠的运输和通用直升机，又能建设我军的航空航天工业。"
 GENERIC_domestic_attack_helicopter_production: "攻击直升机生产"
 GENERIC_domestic_attack_helicopter_production_desc: "在国内制造攻击直升机将赋予我军强大的近距离空中支援能力，并加强我军航空业。"
 GENERIC_develop_air_cavalry_doctrines: "空中骑兵作战理论"
 GENERIC_develop_air_cavalry_doctrines_desc: "发展专业空中骑兵战术将最大限度地发挥我军直升机部队在快速突击、侦察和火力支援方面的效能。"
 GENERIC_manpads: "单兵便携式防空系统"
 GENERIC_manpads_desc: "为我方步兵配备便携式防空系统，将使前线部队具备防御敌方飞机和直升机的能力。"
 GENERIC_paratrooper_corps: "伞兵部队"
 GENERIC_paratrooper_corps_desc: "建立一支精锐伞兵部队将使我们具备快速部署能力，并能够夺取敌后关键目标。"
 GENERIC_to_conscript_or_not_to_conscript: "征兵问题"
 GENERIC_to_conscript_or_not_to_conscript_desc: "义务兵与志愿兵之争，对我们的国防政策至关重要。我们必须认真考虑哪种方式最能满足国家安全需求。"
 GENERIC_utility_vehicles: "通用载具"
 GENERIC_utility_vehicles_desc: "实现军队通用载具现代化将改善后勤保障、机动性和地面部队的作战效能。"
 GENERIC_special_forces_training_programmes: "特种部队训练计划"
 GENERIC_special_forces_training_programmes_desc: "建立全面的特种部队训练计划，将打造能够进行非常规战争、反恐和高风险行动的精锐部队。"
 GENERIC_rangers_and_light_infantry: "游骑兵和轻步兵"
 GENERIC_rangers_and_light_infantry_desc: "专注于轻步兵和游骑兵战术，将打造一支高度机动、适应性强的部队，能够在各种地形和充满挑战的环境中作战。"
 GENERIC_specialized_mechanized_battalions: "专业机械化营"
 GENERIC_specialized_mechanized_battalions_desc: "组建专业机械化营，可以将步兵与装甲战车结合起来，进行强大的诸兵种合成作战。"
 GENERIC_self_propelled_anti_air: "自行防空炮"
 GENERIC_self_propelled_anti_air_desc: "开发自行防空系统将为我们的地面部队提供能够跟上推进部队步伐并抵御空中威胁的防空能力。"