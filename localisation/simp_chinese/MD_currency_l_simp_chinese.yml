l_simp_chinese:
 reserve_currency: "储备货币政策"
 reserve_currency_desc: "该国货币储备和国际债务的货币基础。与主要储备货币结盟的国家可以获得其流动性网络和结算基础设施的使用权，而维持国内储备的国家则以牺牲国际信贷获取渠道为代价，保留了完全的货币主权。"
 us_dollar: "[1182.owner.GetAdjective]美元"
 us_dollar_desc: "美元是全球主要的储备货币。持有美元储备可以提供无与伦比的流动性和进入国际信贷市场的机会，但也使该国面临以美元计价的债务成本，而当本国货币贬值时，这些成本会急剧上升。"
 euro: "欧元"
 euro_desc: "欧元是欧盟的官方货币，也是全球交易量第二大的储备货币。欧元面向欧盟成员国开放，它为区域货币稳定提供保障，并为成员国进入欧洲资本市场提供优惠准入。"
 chinese_yuan: "[547.owner.GetAdjective]元"
 chinese_yuan_desc: "人民币是中国的法定货币，也是一种新兴的储备资产，北京方面将其视为美元主导地位的替代方案。中国经济圈内的贸易伙伴受益于其日益完善的结算网络。"
 russia_rouble: "[652.owner.GetAdjective]卢布"
 russia_rouble_desc: "卢布是俄罗斯联邦的货币，在欧亚经济联盟内部以及与后苏联贸易伙伴之间通用。持有卢布储备能够使一个国家融入俄罗斯的替代支付体系和能源结算框架。"
 japanese_yen: "[615.owner.GetAdjective]日元"
 japanese_yen_desc: "日元是日本的官方货币，也是全球交易量第三大的货币。日本经济圈内的国家受益于其完善的结算网络和日元的相对稳定性，尽管日元在东亚以外地区的储备货币地位仍然有限。"
 british_pound: "[13.owner.GetAdjective]英镑"
 british_pound_desc: "英镑是目前仍在国际上流通的最古老的储备货币。它支撑着英联邦内部的贸易和金融流动，并在全球外汇储备中占据重要地位，为与英国结盟的国家提供了稳定进入伦敦深厚资本市场的渠道。"
 swiss_frank: "[74.owner.GetAdjective]法郎"
 swiss_frank_desc: "瑞士法郎是瑞士的法定货币，在全球范围内被公认为避险资产。虽然其他国家很少将其作为正式储备货币，但瑞士法郎严格的货币纪律和瑞士的政治中立使其具有独特的抵御货币危机和外部冲击的能力。"
 no_foreign_reserve: "国内储备"
 no_foreign_reserve_desc: "该国以本国货币而非外币持有外汇储备。它保留了完全的货币主权，免受外部汇率冲击的影响，但放弃了获得与主要储备货币挂钩的流动性网络和国际信贷便利的机会。"
 currency_strength_modifier: "货币实力"
 reserve_roi_bonus: "储备货币投资回报率"
 reserve_roi_bonus_desc: "持有强势外汇储备可带来额外的投资回报。该回报每月随发行国货币强度和使用网络规模而变化——发行国经济疲软会降低这项收益。"
 reserve_trade_bonus: "储备货币贸易协调"
 reserve_trade_bonus_desc: "在同一货币集团内运营可获得少量贸易好感度加成。这反映了使用同一种储备货币的国家之间共享的优惠贸易关系和支付基础设施。"
 seigniorage_income_modifier: "铸币税收入"
 monetary_policy_decisions: "货币政策"
 monetary_policy_expand_money_supply: "扩大货币供应量"
 monetary_policy_expand_money_supply_desc: "指示中央银行扩大货币供应量。发行储备货币的国家受益最大，因为外国对其货币的需求吸收了大部分通胀压力。所有国家都面临一定程度的货币贬值。"
 monetary_policy_austerity: "紧缩措施"
 monetary_policy_austerity_desc: "收紧财政政策，抑制货币供应。这可以减轻短期收入压力，但能增强货币实力，并约束国家预算。"
 currency_backing: "货币支持"
 currency_backing_desc: "国家货币所依据的资产标准。硬通货标准将货币与大宗商品储备挂钩，从而起到约束作用，但限制了货币政策的灵活性。法定货币体系允许完全的货币主权，但代价是更高的通胀风险。"
 gold_standard_back: "金本位"
 gold_standard_back_desc: "本国货币与黄金挂钩，并可按固定汇率兑换黄金。货币扩张受到实物黄金储备的制约，这既增强了长期信心，也限制了政府应对经济危机的能力。"
 silver_standard: "银本位"
 silver_standard_desc: "该国货币以白银储备作为支撑，并采用固定汇率。与金本位制相比，白银本位制限制较少，既能起到一定的商品价格纪律作用，又能提供略微更大的货币灵活性。"
 bi_metal_standard: "复本位"
 bi_metal_standard_desc: "该货币以黄金和白银为支撑，并按固定汇率进行兑换。历史上，这种货币体系旨在扩大货币基础，它既能平衡商品纪律，又比单一金属挂钩制度提供更大的供应灵活性。"
 no_currency_backing: "法定货币"
 no_currency_backing_desc: "该货币完全由发行政府的权威和信誉担保。由于不受大宗商品限制，货币政策具有充分的灵活性 - 这既能使政府迅速应对危机，也增加了其受通胀压力的影响。"