l_russian:
 Solomon_Islands.1.t: "Соглашение Мунда"
 Solomon_Islands.1.d: "После активного посредничества Специального посланника Содружества Ситивени Рабуки правительство провинции и лидеры оппозиции подписали Соглашение Мунда. В соглашении излагается План из девяти пунктов, направленный на деэскалацию этнического насилия и разработку дорожной карты конституционной реформы."
 Solomon_Islands.1.a: "Хрупкий мир лучше, чем его отсутствие"
 Solomon_Islands.1.b: "Потопить cоглашения"
 Solomon_Islands.2.t: "Переворот сил Малаитского Орла"
 Solomon_Islands.2.d: "Политическая ситуация достигла критической точки. Сегодня рано утром члены группировки «Орлы Малаиты», которым, по некоторым данным, помогали сотрудники военизированной полиции, захватили ключевые стратегические объекты в Хониаре. Премьер-министр [SOL.GetLeader] был взят под домашний арест под дулом пистолета. Руководство группировки «Орлы Малаиты» заявляет, что правительство не смогло защитить интересы Малаиты, и требует немедленной передачи власти. Демократический процесс фактически приостановлен. "
 Solomon_Islands.2.a: "Манассия Согаваре"
 Solomon_Islands.2.b: "Джимми \"Раста\" Лусибея"
 Solomon_Islands.3.t: "Нападение Движения за свободу Исатабу на Хониару"
 Solomon_Islands.3.d: "Движение за свободу Исатабу начало массированное контрнаступление, чтобы вытеснить малайтское влияние с острова. Партизаны вышли из джунглей, чтобы осадить столицу страны Хониару. Официальная полиция расколота по этническому признаку, и в стране разразилась полномасштабная гражданская война. Движение за свободу Исатабу требует полного изгнания малаитских поселенцев, в то время как правительство, контролируемое правительством, готовится к кровавой обороне центра города. "
 Solomon_Islands.3.a: "Война на Тихом океане."
 Solomon_Islands.4.t: "Кризис на Соломоновых островах"
 Solomon_Islands.4.d: "[SOL.GetNameWithFlag] страна погрузилась в хаос.  Администрация премьер-министра [SOL.GetLeader] парализована из-за нарастающей напряженности между Движением за свободу Исатабу и группировкой «Орлы Малаиты».  Конфликт разгорелся из-за споров о внутренней миграции на Гуадалканал и правах коренных народов на землю.  Что особенно важно, рудник Голд-Ридж и другие жизненно важные предприятия прекратили работу, что угрожает нашим экономическим интересам в южной части Тихого океана."
 Solomon_Islands.4.a: "Мы не можем игнорировать эту нестабильность."
 Solomon_Islands.4.b: "Кому какое дело? Я [ROOT.GetLeader]"
 Solomon_Islands.5.t: "Просьба о посредничестве"
 Solomon_Islands.5.d: "В отчаянной попытке предотвратить полную гуманитарную катастрофу [FROM.GetNameWithFlag] официально обратилась к нам с просьбой провести у нас мирный саммит.  В их предложении предлагается провести реформы по децентрализации и автономии, чтобы примирить этнические группировки.  Кроме того, они попросили предоставить им группу административных и военных советников, чтобы процесс реформ не прерывался из-за вмешательства боевиков."
 Solomon_Islands.5.a: "Примите мирный процесс"
 Solomon_Islands.5.b: "Это наша внутренняя борьба, другие выходят из нее"
 Solomon_Islands.6.t: "Отказ от посредничества"
 Solomon_Islands.6.d: "[SOL.GetNameWithFlag] Соломоновы Острова категорически отвергли наше предложение выступить посредником в урегулировании продолжающегося кризиса. В резком коммюнике руководство страны заявило, что не потерпит неоколониального вмешательства в свои внутренние дела. Оно ясно дало понять, что не приемлет иностранных советников и дипломатическое вмешательство, настаивая на том, что Соломоновы Острова будут решать свои споры самостоятельно, без внешнего контроля. "
 Solomon_Islands.6.a: "Тогда они столкнутся с последствиями в одиночку."
 Solomon_IslandsNews.1000.t: "Австралия выступила посредником в прекращении огня на Соломоновых островах"
 Solomon_IslandsNews.1000.d: "После нескольких дней переговоров на базе Королевских ВВС Австралии в Таунсвилле, штат Квинсленд, был достигнут компромисс. Правительство [SOL.GetNameWithFlag] подписало всеобъемлющий мирный договор.  [AST.GetNameWithFlag] обязалось возглавить Международную группу по наблюдению за установлением мира, которая будет следить за проведением 30-дневной амнистии по сдаче оружия и его уничтожением.  Однако [AST.capital.GetName] по-прежнему опасается расширения миссии."
 Solomon_IslandsNews.1000.a: "Стабильность возвращается на Соломоновы острова"
 Solomon_IslandsNews.1001.t: "Прекращение огня на Соломоновых Островах"
 Solomon_IslandsNews.1001.d: "[FROM.GetNameWithFlag] успешно выступила посредником в заключении соглашения о прекращении огня между враждующими группировками [SOL.GetNameWithFlag]. В соглашении изложена дорожная карта по разоружению и конституционной реформе. Все стороны согласились на немедленное прекращение боевых действий и создание нейтральных сил по наблюдению. "
 Solomon_IslandsNews.1001.a: "Стабильность возвращается на Соломоновы острова"
 Solomon_IslandsNews.1002.t: "Государственный переворот на Соломоновых островах"
 Solomon_IslandsNews.1002.d: "Силы \"Малаита Игл\", малаитская боевая организация, захватили столицу. Используя украденное полицейское оружие и при поддержке негодяев из полевых полицейских сил, отряд \"Малаита Игл\" рано утром окружил резиденцию премьер-министра Бартоломью Улуфаалу. Под усиленной охраной и с городским арсеналом в руках повстанцев Улуфаалу был вынужден подать заявление об отставке. Правительство \"Орла Малаиты\", поддерживаемое вооруженными силами, теперь утверждает, что является единственной властью в Хониаре."
 Solomon_IslandsNews.1002.a: "Надвигающийся Шторм"
 Solomon_IslandsNews.1003.t: "Соломоновы острова охвачены восстанием"
 Solomon_IslandsNews.1003.d: "Гражданская война закончилась полной победой Движения за свободу Исатабу. После длительной кампании партизанской войны. Движение за свободу Исатабу успешно добилось краха силовой администрации \"Орла Малаиты\" в Хониаре."
 Solomon_IslandsNews.1003.a: "Демократия в Хониаре рушится."
 Solomon_IslandsNews.1004.t: "Окончание гражданского конфликта на Соломоновых островах"
 Solomon_IslandsNews.1004.d: "Гражданская война закончилась полной победой Движения за свободу Исатабу. После длительной кампании партизанской войны. Движение за свободу Исатабу успешно добилось краха силовой администрации \"Орла Малаиты\" в Хониаре."
 Solomon_IslandsNews.1004.a: "Какая будет следующая глава"
 Solomon_IslandsNews.1005.t: "Окончание гражданского конфликта на Соломоновых островах"
 Solomon_IslandsNews.1005.d: "Совместные операции сил \"Малаитский орел\" и остатков национальной полиции окончательно подавили мятеж Движения за свободу Исатабу. После жестокого наступления во внутренние районы Гуадалканала. "
 Solomon_IslandsNews.1005.a: "Какая будет следующая глава"
