 md_negative_nuclear_fuel_Desc: "Ваши ядерные реакторы потребляют больше топлива, чем производится. Перейдите на вкладку Строительство, чтобы управлять своей энергией."
 md_negative_expected_social_spending_Desc: "Ваши нынешние законы о социальном обеспечении не соответствуют ожиданиям вашего населения. Перейдите на вкладку Политика, чтобы увеличить социальные расходы."
 md_negative_expected_healthcare_spending_Desc: "Ваши действующие законы о здравоохранении не соответствуют ожиданиям вашего населения. Перейдите на вкладку Политика, чтобы увеличить расходы на здравоохранение."
 md_negative_expected_administrative_spending_Desc: "Ваша нынешняя бюрократия ниже того, чего ожидает ваше население. Перейдите на вкладку Политика, чтобы увеличить административные расходы."
 md_negative_expected_education_spending_Desc: "Ваши нынешние законы об образовании не соответствуют ожиданиям вашего населения. Перейдите на вкладку Политика, чтобы увеличить расходы на образование."
 md_negative_expected_police_spending_Desc: "Ваш текущий бюджет на полицию ниже ожидаемого населением уровня. Перейдите на вкладку «Политика», чтобы увеличить расходы на полицию."
 md_negative_expected_defense_spending_Desc: "Ваши текущие военные расходы ниже того, чего ожидает ваше население. Перейдите на вкладку Политика, чтобы увеличить расходы на оборону."
 md_negative_eletricity_Desc: "Ваше текущее производство энергии не удовлетворяет общий спрос. Перейдите на вкладку Строительство, чтобы построить дополнительные электростанции или отрегулировать потребление энергии."
 md_available_tech_slot_expansion_Desc: "Ваш ВВП или ВВП на душу населения вырос достаточно, чтобы открыть новое место для исследований. Перейдите на вкладку Технология, чтобы заявить о ней."