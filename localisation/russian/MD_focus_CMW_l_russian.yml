l_russian:
 CMW_focus: "Дерево фокуса  содружества"
 Commonwealth_member_modifier: "Член содружества"
 Commonwealth_Member_TT: "Как член Содружества Наций, наша страна пользуется преимуществами прочных дипломатических связей и экономического сотрудничества с другими государствами-членами. Это историческое объединение обеспечивает нам сеть взаимной поддержки и общих ценностей, укрепляя наш международный авторитет и торговые возможности. Однако балансирование нашего суверенитета с коллективными интересами Содружества иногда может привести к дипломатическим и политическим проблемам."
 CMW_Aso_Rock_Declaration: "Декларация Aso Rock"
 CMW_Aso_Rock_Declaration_desc: "Декларация Содружества Асо Рок была ключевым заявлением, сделанным во время встречи глав правительств Содружества, состоявшейся в Абудже, Нигерия, в 2003 году. Эта декларация подтвердила приверженность Содружества продвижению демократии, благого управления, прав человека и устойчивого экономического развития. В нем подчеркивалась важность взаимного уважения, инклюзивности и сотрудничества между государствами-членами для эффективного решения глобальных проблем."
 CMW_of_Learning: "Содружество обучения"
 CMW_of_Learning_desc: "Commonwealth Of Learning, межправительственная организация Содружества, базирующаяся в метро Ванкувера, Канада, сотрудничает с различными партнерами по Содружеству и международными агентствами по развитию в целях продвижения открытого обучения и дистанционного образования."
 CMW_New_Petroleum_Group: "Дискуссионная Группа Производителей Нефти"
 CMW_New_Petroleum_Group_desc: "Дискуссионная группа новых производителей нефти - это платформа для сотрудничества развивающихся нефтедобывающих стран, позволяющая обмениваться мнениями и стратегиями развития нефтяной отрасли."
 CMW_Hub_And_Spokes_Program: "Программа торговли ступицами и спицами"
 CMW_Hub_And_Spokes_Program_desc: "Торговая программа \"Центр и спицы\" - это инициатива, способствующая развитию торговых партнерств между несколькими странами с особым упором на наращивание потенциала и усилия в области развития, связанные с торговлей."
 CMW_Leaving_The_Organisation: "Покидая Содружество"
 CMW_Leaving_The_Organisation_desc: "Решение о выходе из Содружества наций знаменует собой значительный сдвиг в международных отношениях. Этот шаг отражает стратегическую перестройку внешней политики, в которой приоритет отдается национальному суверенитету и независимости, а не традиционным альянсам. Выходя из Содружества наций, [ROOT.GetNamewithFlag] стремится наладить новые партнерские отношения и занять более самостоятельную позицию в международных делах."
 CMW_Leaving_The_Organisation_tt: "[ROOT.GetNamewithFlag] удаляет §HЧлена Содружества§! "
 CMW_Charter: "Устав Содружества"
 CMW_Charter_desc: "Хартия Содружества - это документ, в котором излагаются общие ценности и принципы Содружества Наций, группы из 54 государств-членов, приверженных правам человека, устойчивому развитию и верховенству закона."
 CMW_Ministerial_Action_Group: "Министерская инициативная группа"
 CMW_Ministerial_Action_Group_desc: "Министерская инициативная группа Содружества - это орган, в состав которого входят министры стран-членов Содружества, и он отвечает за рассмотрение вопросов, связанных с управлением, и принятие мер по политическим событиям в государствах-членах для поддержки ценностей Содружества."
 CMW_Kampala_Review: "Кампальский обзор"
 CMW_Kampala_Review_desc: "Кампальский обзор, проведенный во время встречи глав правительств Содружества в 2007 году, был направлен на оценку и повышение эффективности Содружества в продвижении демократии, развития и благого управления. Этот обзор был сосредоточен на укреплении потенциала организации по решению современных глобальных проблем, обеспечении того, чтобы ее ценности и цели оставались актуальными и действенными для всех государств-членов."
 CMW_Anti_Corruption_Centre: "Центр по борьбе с коррупцией Африканского Содружества"
 CMW_Anti_Corruption_Centre_desc: "Антикоррупционный центр Африканского Содружества - это учреждение, созданное в рамках Содружества для решения проблем коррупции в африканских странах-членах и борьбы с ней, содействия прозрачности и благому управлению."
 CMW_Association_Legislative_Council: "Законодательный Совет Ассоциации"
 CMW_Association_Legislative_Council_desc: "Ассоциация законодательных консультантов Содружества - это организация, объединяющая юристов-профессионалов, которые предоставляют консультации и поддержку законодательным органам и парламентам государств-членов Содружества. Это способствует сотрудничеству и обмену опытом между юристами законодательных органов."
 CMW_Connectivity_Agenda: "Программа взаимодействия Содружества"
 CMW_Connectivity_Agenda_desc: "Программа взаимодействия Содружества - это платформа для стран по обмену передовым опытом в области торговли и инвестиций и проведению внутренних реформ."
 CMW_Parliament: "Парламент Содружества"
 CMW_Parliament_Desc: "Учреждение Парламента Содружества Наций представляет собой важный шаг на пути к большей политической интеграции и сотрудничеству между государствами-членами. Этот законодательный орган призван содействовать диалогу, продвигать демократические ценности и осуществлять надзор за осуществлением политики Содружества. Он служит платформой для представителей всех стран-участниц для обсуждения и решения общих проблем, способствуя единству и коллективным действиям."
 CMW_Parliament_tt: "Все государства-члены §HСодружества наций§! разрешают проводить выборы на своей территории"
 CMW_Legal_Education_Association: "Ассоциация Юридического Образования Содружества"
 CMW_Legal_Education_Association_desc: "Ассоциация юридического образования Содружества - это организация, которая продвигает юридическое образование и сотрудничество между странами-членами Содружества."
 CMW_Fintech_Toolkit: "Commonwealth Fintech Toolkit"
 CMW_Fintech_Toolkit_desc: "The Commonwealth Fintech Toolkit is a resource designed to support financial technology development and innovation within Commonwealth member countries."
 CMW_CFTC: "Commonwealth Fund for Technical Co-operation"
 CMW_CFTC_desc: "The Commonwealth Fund for Technical Co-operation (CFTC) is a financial mechanism that assists Commonwealth member countries in implementing technical cooperation projects and initiatives for development."
 CMW_School_Leaders: "Secretariat’s Professional Standards"
 CMW_School_Leaders_desc: "The Secretariat's Professional Standards Framework for Teachers and School Leaders is a set of guidelines and benchmarks designed to enhance the professional development and performance of educators and school leaders within the Secretariat's jurisdiction."
 CMW_Trade_Association: "Commonwealth Trade Association"
 CMW_Trade_Association_desc: "The Commonwealth Trade Association (CTA) aims to enhance economic cooperation and trade relations among member states. By fostering a more integrated and collaborative trade environment, the CTA seeks to reduce tariffs, streamline customs procedures, and promote sustainable economic growth."
 CMW_Joint_Research_Initiative: "Commonwealth Joint Research Initiative"
 CMW_Joint_Research_Initiative_desc: "The Commonwealth Joint Research Initiative is a collaborative effort to advance scientific and technological innovation among member states. This initiative encourages the sharing of knowledge, resources, and expertise to address common challenges such as climate change, healthcare, and sustainable development. By fostering a network of research institutions and experts, the Commonwealth aims to drive progress and innovation for the collective benefit of all member nations."
 CMW_Valuta: "Introduction of the Commo"
 CMW_Valuta_desc: "The introduction of the Commo marks a historic step towards economic integration within the Commonwealth of Nations. This common currency is designed to facilitate trade, enhance financial stability, and promote economic cooperation among member states. By adopting the Commo, the Commonwealth aims to reduce currency exchange barriers, stabilize regional economies, and foster a more unified economic community."
 CMW_Promoting_Democracy: "Promote Ideology"
 CMW_Promoting_Democracy_desc: "We will align the Commonwealth to Britain so we increase our diplomatic power in the world"
 CMW_Counter_Insurgency_Training: "Commonwealth Counter-Insurgency Day"
 CMW_Counter_Insurgency_Training_desc: "Commonwealth Counter-Insurgency Training is an initiative aimed at enhancing the capacity of Commonwealth member countries to effectively address and mitigate insurgent threats. It provides specialized training, resources, and expertise to assist nations in managing and responding to internal security challenges, thereby promoting stability and peace."
 CMW_Cyber_Declaration: "Commonwealth Cyber Declaration Programme"
 CMW_Cyber_Declaration_desc: "The Commonwealth Cyber Declaration Programme is an initiative focused on addressing cybersecurity issues and promoting cooperation in the Commonwealth member countries to enhance digital security and protect against cyber threats."
 CMW_Intelligence_Network: "Commonwealth Intelligence Network"
 CMW_Intelligence_Network_desc: "The formation of the Commonwealth Intelligence Network (CIN), spearheaded by the newly established Commonwealth Intelligence Agency (CIA), aims to bolster security and intelligence-sharing among member states. This network facilitates the exchange of critical information, collaborative counterintelligence operations, and unified responses to global threats. By enhancing intelligence cooperation, the Commonwealth seeks to protect its member states from espionage, terrorism, and cyber threats."
 CMW_Patrol_Boat_Program: "Commonwealth Patrol Boat Program"
 CMW_Patrol_Boat_Program_desc: "The Commonwealth Patrol Boat Program is a strategic endeavor that involves the cooperative development and deployment of maritime patrol boats by Commonwealth member nations. These vessels are designed to enhance maritime security, protect territorial waters, and support various naval missions, thereby contributing to the safety and stability of Commonwealth regions."
 CMW_Chief_Of_Staff: "Commonwealth Chief of Staff"
 CMW_Chief_Of_Staff_desc: "The Commonwealth Chief of Staff is a high-ranking position responsible for overseeing and coordinating military operations and strategies within the Commonwealth member countries. This role plays a crucial part in ensuring the security and defense of the Commonwealth, as well as fostering cooperation and readiness among military forces to maintain peace and stability."
 CMW_Secretariat_CVE: "Secretariat Countering Violent Extremism Unit"
 CMW_Secretariat_CVE_desc: "The Commonwealth Secretariat Countering Violent Extremism (CVE) Unit is a specialized section within the Commonwealth Secretariat responsible for addressing and countering violent extremism within Commonwealth member countries, with a focus on preventing radicalization and promoting peace and stability."
 CMW_Offices_For_Peace: "Commonwealth Offices for Peace"
 CMW_Offices_For_Peace_desc: "The establishment of the Commonwealth Offices for Peace (COP) underscores the Commonwealth's commitment to global peace and conflict resolution. These offices, located in key regions across the member states, work towards mediating conflicts, promoting diplomacy, and supporting peacebuilding initiatives."
 CMW_Academy: "Commonwealth Military Academy"
 CMW_Academy_desc: "The Commonwealth Military Academy (CMA) is established to provide advanced military training and education to personnel from all member states. This institution aims to enhance the professional skills, strategic knowledge, and leadership capabilities of military officers. By promoting shared training standards and fostering a spirit of cooperation, the CMA strengthens the collective defense capabilities of the Commonwealth."
 CMW_Training_Day: "World Territory Training"
 CMW_Training_Day_desc: "World Territory Training is a global program designed to improve the preparedness and capabilities of nations to manage territorial and border-related issues. This initiative offers training and resources to enhance the understanding and management of geographical boundaries, helping countries address border disputes, promote peaceful coexistence, and foster territorial stability worldwide."
 CMW_Defense_Treaty: "Commonwealth Defense Treaty"
 CMW_Defense_Treaty_desc: "The Commonwealth Defense Treaty is a significant international agreement among Commonwealth member countries that outlines mutual defense commitments and obligations. This treaty serves as a collective security framework, where member nations pledge to support each other in times of external threats or aggression, reinforcing the commitment to safeguarding the security and sovereignty of all signatory states within the Commonwealth."
 CMW_New_CMW: "New Commonwealth of Nations"
 CMW_New_CMW_desc: "After a series of comprehensive reforms, the Commonwealth of Nations stands revitalized and prepared to face new global challenges. These reforms have modernized governance structures, streamlined decision-making processes, and reinforced the commitment to core values such as democracy, development, and human rights. The New Commonwealth is now poised to lead its member states into a new era of cooperation, inclusivity, and resilience, ready to tackle the complexities of the 21st century."
 CMW_Education_Framework: "Commonwealth Education Framework"
 CMW_Education_Framework_desc: "The Commonwealth Education Framework is a comprehensive system for guiding education policies and practices in Commonwealth member states."
 CMW_Debt_Swaps: "Commonwealth Debt Swaps"
 CMW_Debt_Swaps_desc: "Commonwealth Debt Swaps refer to financial agreements or initiatives within the Commonwealth that involve the exchange or restructuring of debt as a means to address economic and financial challenges in member countries."
 CMW_Climate_Hub: "Commonwealth Climate Finance Access Hub"
 CMW_Climate_Hub_desc: "The Commonwealth Climate Finance Access Hub is a platform established within the Commonwealth to facilitate access to climate finance and support for member countries in addressing climate change and sustainability-related initiatives."
 CMW_Blue_Charter: "Commonwealth Blue Charter"
 CMW_Blue_Charter_desc: "The Commonwealth Blue Charter is a commitment by Commonwealth member countries to collaborate in addressing and protecting the health and sustainability of the world's oceans and marine environments."
 CMW_Living_Lands: "Living Lands Charter"
 CMW_Living_Lands_desc: "The Living Lands Charter is a groundbreaking environmental initiative adopted by the Commonwealth of Nations. This charter commits member states to sustainable land management practices, conservation of biodiversity, and combating climate change. By promoting reforestation, soil restoration, and the protection of natural habitats, the Commonwealth aims to ensure that future generations inherit a healthy and resilient environment."
 CMW_Health_Section: "Secretariat’s Health Section"
 CMW_Health_Section_desc: "The Commonwealth Secretariat's Health Section is a division within the Commonwealth Secretariat, which is responsible for providing support and guidance to Commonwealth member countries in matters related to healthcare, public health, and the development of health policies and programs within the Commonwealth. It plays a role in facilitating cooperation and sharing of best practices in the field of health among member states."
 CMW_Body_And_Sports: "The Commonwealth Advisory Body on Sport"
 CMW_Body_And_Sports_desc: "The Commonwealth Advisory Body on Sport is a committee that advises and guides Commonwealth member countries on sports-related policies and programs, with a focus on promoting social development, health, and well-being through sports."
 CMW_Youth_Networks: "Commonwealth Youth Networks"
 CMW_Youth_Networks_desc: "Commonwealth Youth Networks are specific youth-focused groups or organizations within the Commonwealth that facilitate collaboration, information sharing, and collective action among young people across Commonwealth member countries. These networks often address issues relevant to youth, such as education, employment, and social development."
 CMW_Defense_Association: "Commonwealth Defensive Association"
 CMW_Defense_Association_desc: "The Commonwealth Defensive Association is a collaborative consortium of Commonwealth member countries focused on bolstering their collective defense capabilities and security. This alliance serves as a platform for mutual support, strategic coordination, and the shared pursuit of peace and stability within the Commonwealth community."
 CMW_Leaving.1.t: "[THIS.GetName] has leaves the Commonwealth of Nations"
 CMW_Leaving.1.d: "[THIS.GetName] has officially announced its departure from the Commonwealth of Nations. This decision marks a significant shift in its foreign policy, reflecting a desire for greater autonomy and new international alliances. The departure may impact diplomatic relations and economic ties within the Commonwealth, presenting new challenges and opportunities for both the departing nation and remaining member states."
 CMW_Leaving.1.a: "Good Luck"
 Commonwealth_allies_tech_share_name: "Commonwealth Education Framework"
 Commonwealth_allies_tech_share_desc: "The Commonwealth Education Framework establishes a unified approach to educational standards and practices across member states"
 CMW_Patrol_Boat_Program_Member: "Commonwealth Patrol Boat Program"
 CMW_Patrol_Boat_Program_Leader: "Commonwealth Patrol Boat Program Initiator"