l_russian:
 CMW_focus: "Дерево фокуса  содружества"
 Commonwealth_member_modifier: "Член содружества"
 CMW_Aso_Rock_Declaration: "Декларация Aso Rock"
 CMW_Aso_Rock_Declaration_desc: "Декларация Содружества Асо Рок была ключевым заявлением, сделанным во время встречи глав правительств Содружества, состоявшейся в Абудже, Нигерия, в 2003 году. Эта декларация подтвердила приверженность Содружества продвижению демократии, благого управления, прав человека и устойчивого экономического развития. В нем подчеркивалась важность взаимного уважения, инклюзивности и сотрудничества между государствами-членами для эффективного решения глобальных проблем."
 CMW_of_Learning: "Содружество обучения"
 CMW_of_Learning_desc: "Commonwealth Of Learning, межправительственная организация Содружества, базирующаяся в метро Ванкувера, Канада, сотрудничает с различными партнерами по Содружеству и международными агентствами по развитию в целях продвижения открытого обучения и дистанционного образования."
 CMW_New_Petroleum_Group: "Дискуссионная Группа Производителей Нефти"
 CMW_New_Petroleum_Group_desc: "Дискуссионная группа новых производителей нефти - это платформа для сотрудничества развивающихся нефтедобывающих стран, позволяющая обмениваться мнениями и стратегиями развития нефтяной отрасли."
 CMW_Hub_And_Spokes_Program: "Программа торговли ступицами и спицами"
 CMW_Hub_And_Spokes_Program_desc: "Торговая программа \"Центр и спицы\" - это инициатива, способствующая развитию торговых партнерств между несколькими странами с особым упором на наращивание потенциала и усилия в области развития, связанные с торговлей."
 CMW_Leaving_The_Organisation: "Покидая Содружество"
 CMW_Leaving_The_Organisation_desc: "Решение о выходе из Содружества наций знаменует собой значительный сдвиг в международных отношениях. Этот шаг отражает стратегическую перестройку внешней политики, в которой приоритет отдается национальному суверенитету и независимости, а не традиционным альянсам. Выходя из Содружества наций, [ROOT.GetNamewithFlag] стремится наладить новые партнерские отношения и занять более самостоятельную позицию в международных делах."
 CMW_Leaving_The_Organisation_tt: "[ROOT.GetNamewithFlag] удаляет §HЧлена Содружества§! "
 CMW_Charter: "Устав Содружества"
 CMW_Charter_desc: "Хартия Содружества - это документ, в котором излагаются общие ценности и принципы Содружества Наций, группы из 54 государств-членов, приверженных правам человека, устойчивому развитию и верховенству закона."
 CMW_Ministerial_Action_Group: "Министерская инициативная группа"
 CMW_Ministerial_Action_Group_desc: "Министерская инициативная группа Содружества - это орган, в состав которого входят министры стран-членов Содружества, и он отвечает за рассмотрение вопросов, связанных с управлением, и принятие мер по политическим событиям в государствах-членах для поддержки ценностей Содружества."
 CMW_Kampala_Review: "Кампальский обзор"
 CMW_Kampala_Review_desc: "Кампальский обзор, проведенный во время встречи глав правительств Содружества в 2007 году, был направлен на оценку и повышение эффективности Содружества в продвижении демократии, развития и благого управления. Этот обзор был сосредоточен на укреплении потенциала организации по решению современных глобальных проблем, обеспечении того, чтобы ее ценности и цели оставались актуальными и действенными для всех государств-членов."
 CMW_Anti_Corruption_Centre: "Центр по борьбе с коррупцией Африканского Содружества"
 CMW_Anti_Corruption_Centre_desc: "Антикоррупционный центр Африканского Содружества - это учреждение, созданное в рамках Содружества для решения проблем коррупции в африканских странах-членах и борьбы с ней, содействия прозрачности и благому управлению."
 CMW_Association_Legislative_Council: "Законодательный Совет Ассоциации"
 CMW_Association_Legislative_Council_desc: "Ассоциация законодательных консультантов Содружества - это организация, объединяющая юристов-профессионалов, которые предоставляют консультации и поддержку законодательным органам и парламентам государств-членов Содружества. Это способствует сотрудничеству и обмену опытом между юристами законодательных органов."
 CMW_Connectivity_Agenda: "Программа взаимодействия Содружества"
 CMW_Connectivity_Agenda_desc: "Программа взаимодействия Содружества - это платформа для стран по обмену передовым опытом в области торговли и инвестиций и проведению внутренних реформ."
 CMW_Parliament: "Парламент Содружества"
 CMW_Parliament_Desc: "Учреждение Парламента Содружества Наций представляет собой важный шаг на пути к большей политической интеграции и сотрудничеству между государствами-членами. Этот законодательный орган призван содействовать диалогу, продвигать демократические ценности и осуществлять надзор за осуществлением политики Содружества. Он служит платформой для представителей всех стран-участниц для обсуждения и решения общих проблем, способствуя единству и коллективным действиям."
 CMW_Parliament_tt: "Все государства-члены §HСодружества наций§! разрешают проводить выборы на своей территории"
 CMW_Legal_Education_Association: "Ассоциация Юридического Образования Содружества"
 CMW_Legal_Education_Association_desc: "Ассоциация юридического образования Содружества - это организация, которая продвигает юридическое образование и сотрудничество между странами-членами Содружества."
 CMW_Fintech_Toolkit: "Финтех-Инструментарий Содружества"
 CMW_Fintech_Toolkit_desc: "Commonwealth Fintech Toolkit - это ресурс, предназначенный для поддержки развития финансовых технологий и инноваций в странах-членах Содружества."
 CMW_CFTC: "Фонд технического сотрудничества Содружества"
 CMW_CFTC_desc: "Фонд технического сотрудничества Содружества (CFTC) - это финансовый механизм, который помогает странам-членам Содружества в реализации проектов технического сотрудничества и инициатив в целях развития."
 CMW_School_Leaders: "Профессиональные стандарты Секретариата"
 CMW_School_Leaders_desc: "Система профессиональных стандартов Секретариата для учителей и руководителей школ представляет собой набор руководящих принципов и контрольных показателей, разработанных для повышения профессионального развития и результативности педагогов и руководителей школ в пределах юрисдикции Секретариата."
 CMW_Trade_Association: "Торговая Ассоциация Содружества"
 CMW_Trade_Association_desc: "Торговая ассоциация Содружества (CTA) направлена на укрепление экономического сотрудничества и торговых отношений между государствами-членами. Способствуя созданию более интегрированной торговой среды, основанной на сотрудничестве, CTA стремится снизить тарифы, упростить таможенные процедуры и способствовать устойчивому экономическому росту."
 CMW_Joint_Research_Initiative: "Совместная Исследовательская инициатива Содружества"
 CMW_Joint_Research_Initiative_desc: "Совместная исследовательская инициатива Содружества - это совместные усилия по продвижению научных и технологических инноваций между государствами-членами. Эта инициатива поощряет обмен знаниями, ресурсами и опытом для решения общих проблем, таких как изменение климата, здравоохранение и устойчивое развитие. Создавая сеть исследовательских институтов и экспертов, Содружество стремится стимулировать прогресс и инновации на коллективное благо всех государств-членов."
 CMW_Valuta: "Введение в систему связи"
 CMW_Valuta_desc: "Введение Commo знаменует собой исторический шаг на пути к экономической интеграции в рамках Содружества Наций. Эта общая валюта предназначена для облегчения торговли, укрепления финансовой стабильности и содействия экономическому сотрудничеству между государствами-членами. Принимая Commo, Содружество стремится снизить барьеры при обмене валюты, стабилизировать региональные экономики и способствовать созданию более единого экономического сообщества."
 CMW_Promoting_Democracy: "Продвигать Идеологию"
 CMW_Promoting_Democracy_desc: "Мы объединим Содружество с Великобританией, чтобы увеличить нашу дипломатическую мощь в мире"
 CMW_Counter_Insurgency_Training: "День борьбы с повстанцами Содружества"
 CMW_Counter_Insurgency_Training_desc: "Подготовка стран Содружества по борьбе с повстанцами - это инициатива, направленная на укрепление потенциала стран-членов Содружества по эффективному противодействию угрозам со стороны повстанцев и смягчению их последствий. Он предоставляет специализированную подготовку, ресурсы и экспертные знания для оказания помощи странам в управлении вызовами внутренней безопасности и реагировании на них, тем самым способствуя стабильности и миру."
 CMW_Cyber_Declaration: "Программа Кибердекларации Содружества"
 CMW_Cyber_Declaration_desc: "Программа кибердекларации Содружества - это инициатива, направленная на решение вопросов кибербезопасности и содействие сотрудничеству в странах-членах Содружества в целях повышения цифровой безопасности и защиты от киберугроз."
 CMW_Intelligence_Network: "Разведывательная сеть Содружества"
 CMW_Intelligence_Network_desc: "Формирование разведывательной сети Содружества (CIN), возглавляемой недавно созданным Разведывательным управлением Содружества (ЦРУ), направлено на укрепление безопасности и обмена разведданными между государствами-членами. Эта сеть облегчает обмен важнейшей информацией, совместные контрразведывательные операции и единые меры реагирования на глобальные угрозы. Укрепляя сотрудничество в области разведки, Содружество стремится защитить свои государства-члены от шпионажа, терроризма и киберугроз."
 CMW_Patrol_Boat_Program: "Программа Патрульных катеров Содружества"
 CMW_Patrol_Boat_Program_desc: "Программа патрульных катеров Содружества - это стратегическое мероприятие, которое предполагает совместную разработку и развертывание морских патрульных катеров странами-членами Содружества. Эти суда предназначены для повышения безопасности на море, защиты территориальных вод и поддержки различных военно-морских миссий, тем самым способствуя безопасности и стабильности регионов Содружества."
 CMW_Chief_Of_Staff: "Глава администрации Содружества"
 CMW_Chief_Of_Staff_desc: "Начальник штаба Содружества - это высокопоставленная должность, ответственная за надзор и координацию военных операций и стратегий в странах-членах Содружества. Эта роль играет решающую роль в обеспечении безопасности и обороноспособности Содружества, а также в укреплении сотрудничества и готовности вооруженных сил к поддержанию мира и стабильности."
 CMW_Secretariat_CVE: "Подразделение Секретариата по борьбе С насильственным Экстремизмом"
 CMW_Secretariat_CVE_desc: "Подразделение Секретариата Содружества по противодействию насильственному экстремизму (CVE) является специализированным подразделением Секретариата Содружества, ответственным за рассмотрение вопросов насильственного экстремизма и противодействие ему в странах-членах Содружества с упором на предотвращение радикализации и содействие миру и стабильности."
 CMW_Offices_For_Peace: "Офисы Содружества за мир"
 CMW_Offices_For_Peace_desc: "Создание Бюро Содружества по вопросам мира (COP) подчеркивает приверженность Содружества глобальному миру и разрешению конфликтов. Эти офисы, расположенные в ключевых регионах государств-членов, работают над урегулированием конфликтов, продвижением дипломатии и поддержкой инициатив в области миростроительства."
 CMW_Academy: "Создание Бюро Содружества по вопросам мира (COP) подчеркивает приверженность Содружества глобальному миру и разрешению конфликтов. Эти офисы, расположенные в ключевых регионах государств-членов, работают над урегулированием конфликтов, продвижением дипломатии и поддержкой инициатив в области миростроительства."
 CMW_Academy_desc: "Военная академия Содружества (CMA) создана для обеспечения углубленной военной подготовки и просвещения персонала из всех государств-членов. Это учебное заведение нацелено на повышение профессиональных навыков, стратегических знаний и лидерских способностей военных офицеров. Продвигая общие стандарты обучения и укрепляя дух сотрудничества, CMA укрепляет возможности коллективной обороны Содружества."
 CMW_Training_Day: "Обучение на территории мира"
 CMW_Training_Day_desc: "World Territory Training - это глобальная программа, направленная на повышение готовности и возможностей стран решать территориальные и пограничные вопросы. Эта инициатива предлагает обучение и ресурсы для улучшения понимания географических границ и управления ими, помогая странам разрешать пограничные споры, содействовать мирному сосуществованию и укреплять территориальную стабильность во всем мире."
 CMW_Defense_Treaty: "Договор Об Обороне Содружества"
 CMW_Defense_Treaty_desc: "Договор об обороне Содружества - это важное международное соглашение между странами-членами Содружества, в котором излагаются взаимные обязательства в области обороны. Этот договор служит основой коллективной безопасности, в рамках которой государства-члены обязуются поддерживать друг друга во времена внешних угроз или агрессии, укрепляя приверженность обеспечению безопасности и суверенитета всех подписавших его государств в рамках Содружества."
 CMW_New_CMW: "Новое Содружество Наций"
 CMW_New_CMW_desc: "После серии всеобъемлющих реформ Содружество Наций возродилось и готово противостоять новым глобальным вызовам. Эти реформы модернизировали структуры управления, упростили процессы принятия решений и укрепили приверженность основным ценностям, таким как демократия, развитие и права человека. Новое Содружество теперь готово повести свои государства-члены в новую эру сотрудничества, инклюзивности и жизнестойкости, готовое справиться со сложностями 21 века."
 CMW_Education_Framework: "Система Образования Содружества"
 CMW_Education_Framework_desc: "Рамочная программа Содружества в области образования - это всеобъемлющая система, определяющая политику и практику в области образования в государствах-членах Содружества."
 CMW_Debt_Swaps: "Долговые Свопы Содружества"
 CMW_Debt_Swaps_desc: "Долговые свопы Содружества относятся к финансовым соглашениям или инициативам в рамках Содружества, которые предполагают обмен или реструктуризацию долга как средство решения экономических и финансовых проблем в странах-членах."
 CMW_Climate_Hub: "Центр Доступа к Климатическому Финансированию Содружества"
 CMW_Climate_Hub_desc: "ентр доступа к климатическому финансированию Содружества - это платформа, созданная в рамках Содружества для облегчения доступа к климатическому финансированию и поддержки стран-членов в решении проблем изменения климата и инициатив, связанных с устойчивым развитием."
 CMW_Blue_Charter: "Голубая Хартия Содружества"
 CMW_Blue_Charter_desc: "Голубая хартия Содружества - это обязательство стран-членов Содружества сотрудничать в решении проблем здоровья и устойчивости мирового океана и морской среды и их защите."
 CMW_Living_Lands: "Хартия Живых Земель"
 CMW_Living_Lands_desc: "Хартия живых земель - это новаторская экологическая инициатива, принятая Содружеством Наций. Эта хартия обязывает государства-члены применять методы устойчивого управления земельными ресурсами, сохранения биоразнообразия и борьбы с изменением климата. Содействуя лесовосстановлению, восстановлению почв и защите естественной среды обитания, Содружество стремится обеспечить, чтобы будущие поколения унаследовали здоровую и устойчивую окружающую среду."
 CMW_Health_Section: "Секция здравоохранения Секретариата"
 CMW_Health_Section_desc: "Секция здравоохранения Секретариата Содружества является подразделением Секретариата Содружества, которое отвечает за оказание поддержки и рекомендаций странам-членам Содружества в вопросах, связанных со здравоохранением, общественным здравоохранением и разработкой политики и программ в области здравоохранения в рамках Содружества. Она играет важную роль в содействии сотрудничеству и обмену передовым опытом в области здравоохранения между государствами-членами."
 CMW_Body_And_Sports: "Консультативный орган Содружества по спорту"
 CMW_Body_And_Sports_desc: "Консультативный орган Содружества по спорту - это комитет, который консультирует и направляет страны-члены Содружества по политике и программам, связанным со спортом, с упором на содействие социальному развитию, здоровью и благополучию посредством спорта."
 CMW_Youth_Networks: "Молодежные сети Содружества"
 CMW_Youth_Networks_desc: "Молодежные сети Содружества - это конкретные группы или организации, ориентированные на молодежь в рамках Содружества, которые способствуют сотрудничеству, обмену информацией и коллективным действиям молодежи во всех странах-членах Содружества. Эти сети часто занимаются вопросами, имеющими отношение к молодежи, такими как образование, занятость и социальное развитие."
 CMW_Defense_Association: "Оборонительная Ассоциация Содружества"
 CMW_Defense_Association_desc: "Оборонительная ассоциация Содружества - это совместный консорциум стран-членов Содружества, направленный на укрепление их потенциала коллективной обороны и безопасности. Этот альянс служит платформой для взаимной поддержки, стратегической координации и совместного стремления к миру и стабильности внутри сообщества Содружества."
 CMW_Leaving.1.t: "[THIS.GetName] покидает Содружество наций"
 CMW_Leaving.1.d: "[THIS.GetName] официально объявила о выходе из Содружества наций. Это решение знаменует собой значительный сдвиг во внешней политике страны, отражающий стремление к большей автономии и новым международным альянсам. Выход из Содружества может повлиять на дипломатические отношения и экономические связи внутри организации, создав новые проблемы и открыв новые возможности как для выходящей страны, так и для остальных государств-членов."
 CMW_Leaving.1.a: "Удачи вам"
 Commonwealth_allies_tech_share_name: "Система Образования Содружества"
 Commonwealth_allies_tech_share_desc: "Рамочная программа Содружества в области образования устанавливает единый подход к образовательным стандартам и практике во всех государствах-членах"
 CMW_Patrol_Boat_Program_Member: "Программа Патрульных катеров Содружества"
 CMW_Patrol_Boat_Program_Leader: "Инициатор Программы Патрульных катеров Содружества"
 Commonwealth_member_modifier_desc: "Как член Содружества Наций, наша страна пользуется преимуществами прочных дипломатических связей и экономического сотрудничества с другими государствами-членами. Это историческое объединение обеспечивает нам сеть взаимной поддержки и общих ценностей, укрепляя наш международный авторитет и торговые возможности. Однако балансирование нашего суверенитета с коллективными интересами Содружества иногда может привести к дипломатическим и политическим проблемам."