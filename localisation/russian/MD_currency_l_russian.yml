l_russian:
 reserve_currency: "Политика резервной валюты"
 reserve_currency_desc: "Валютная основа денежных резервов и международного долга этой страны. Страны, которые ориентируются на основную резервную валюту, получают доступ к её сетям ликвидности и расчетной инфраструктуре, в то время как страны, которые поддерживают внутренние резервы, сохраняют полный денежный суверенитет ценой доступа к международным кредитам."
 us_dollar: "[1182.owner.GetAdjective] Доллар"
 us_dollar_desc: "Доминирующая глобальная резервная валюта. Хранение резервов в долларах обеспечивает беспрецедентную ликвидность и доступ к международным кредитным рынкам, но оставляет страну подверженной долговым издержкам, выраженным в долларах, которые увеличиваются при ослаблении национальной валюты."
 euro: "Евро"
 euro_desc: "Единая валюта Европейского Союза, вторая по объему торговли резервная валюта в мире. Доступное для государств-членов ЕС евро обеспечивает региональную денежно-кредитную стабильность и преференциальный доступ к европейским рынкам капитала."
 chinese_yuan: "[547.owner.GetAdjective] Юань"
 chinese_yuan_desc: "Юань, национальная валюта Китая, является формирующимся резервным активом, отстаиваемым Пекином в качестве альтернативы доминирующему доллару. Торговые партнеры, находящиеся на экономической орбите Китая, извлекают выгоду из его растущей расчетной сети."
 russia_rouble: "[652.owner.GetAdjective] Рубль"
 russia_rouble_desc: "Валюта Российской Федерации, используемая в Евразийском экономическом союзе и между постсоветскими торговыми партнерами. Наличие рублевых резервов интегрирует страну в альтернативные платежные системы России и систему расчетов за энергоресурсы."
 japanese_yen: "[615.owner.GetAdjective] Иена"
 japanese_yen_desc: "Валюта Японии и третья по величине торгуемая валюта в мире. Страны, входящие в экономическую орбиту Японии, извлекают выгоду из ее налаженных расчетных сетей и относительной стабильности иены, хотя использование иены в резервах за пределами Восточной Азии остается ограниченным."
 british_pound: "[13.owner.GetAdjective] Фунт"
 british_pound_desc: "Старейшая резервная валюта, все еще находящаяся в активном международном использовании. Фунт лежит в основе торговых и финансовых потоков по всему Содружеству и сохраняет значительную долю в мировых валютных резервах, предлагая странам, связанным с Соединенным Королевством, стабильный доступ к крупным рынкам капитала Лондона."
 swiss_frank: "[74.owner.GetAdjective] Франк"
 swiss_frank_desc: "Валюта Швейцарии, известная во всем мире как актив-убежище. Несмотря на то, что франк редко используется в качестве официального резерва другими странами, строгая денежно-кредитная дисциплина и политический нейтралитет Швейцарии делают его уникально устойчивым к валютным кризисам и внешним потрясениям."
 no_foreign_reserve: "Внутренний резерв"
 no_foreign_reserve_desc: "Эта страна хранит свои резервы в национальной валюте, а не в иностранной валюте. Он сохраняет полный денежно-кредитный суверенитет и изолирует себя от внешних потрясений обменного курса, но отказывается от доступа к сетям ликвидности и международным кредитным механизмам, привязанным к основным резервным валютам."
 currency_strength_modifier: "Сила валюты"
 reserve_roi_bonus: "Рентабельность инвестиций в резервной валюте"
 reserve_roi_bonus_desc: "Дополнительная отдача от инвестиций за счет владения сильной иностранной резервной валютой. Ежемесячно масштабируется в зависимости от силы валюты эмитента и размера сети внедрения — ослабление экономики эмитента снижает этот бонус."
 reserve_trade_bonus: "Согласование торговли Резервной валютой"
 reserve_trade_bonus_desc: "Небольшой бонус за торговое мнение от работы в рамках одного валютного блока. Отражает преференциальные торговые отношения и платежную инфраструктуру, разделяемую странами, использующими одну и ту же резервную валюту."
 seigniorage_income_modifier: "Доход от сеньоража"
 monetary_policy_decisions: "Денежно-кредитная политика"
 monetary_policy_expand_money_supply: "Расширение денежной массы"
 monetary_policy_expand_money_supply_desc: "Направьте центральный банк на расширение денежной массы. Страны, выпускающие резервные валюты, получают наибольшую выгоду, поскольку иностранный спрос на их валюту в значительной степени компенсирует инфляционное давление. Все страны сталкиваются с той или иной степенью ослабления валюты."
 monetary_policy_austerity: "Меры жесткой экономии"
 monetary_policy_austerity_desc: "Ужесточите налогово-бюджетную политику и ограничьте денежную массу. Снижает краткосрочное давление на доходы, но укрепляет валюту и дисциплинирует национальный бюджет."
 currency_backing: "Валютное обеспечение"
 currency_backing_desc: "Стандарт активов, лежащий в основе национальной валюты. Стандарты твердой валюты привязывают валюту к товарному резерву, устанавливая дисциплину, но ограничивая денежно-кредитную гибкость. Фиатные системы обеспечивают полный денежный суверенитет ценой большего инфляционного риска."
 gold_standard_back: "Золотой стандарт"
 gold_standard_back_desc: "Национальная валюта привязана к золоту и может быть обменена на него по фиксированному курсу. Денежно-кредитная экспансия сдерживается физическими запасами золота, что вселяет долгосрочную уверенность, но ограничивает способность правительства реагировать на экономические кризисы."
 silver_standard: "Серебряный Стандарт"
 silver_standard_desc: "Национальная валюта обеспечена запасами серебра по фиксированному курсу пересчета. Менее строгий, чем привязка к золоту, серебряный стандарт обеспечивает определенную степень товарной дисциплины, обеспечивая при этом несколько большую денежно-кредитную гибкость."
 bi_metal_standard: "Биметаллический Стандарт"
 bi_metal_standard_desc: "Валюта обеспечена как золотом, так и серебром по фиксированным обменным курсам. Исторически принятый для расширения денежной базы, этот стандарт уравновешивает товарную дисциплину с большей гибкостью предложения, чем чисто привязка к одному металлу."
 no_currency_backing: "Фиатная валюта"
 no_currency_backing_desc: "Валюта обеспечена исключительно авторитетом и кредитоспособностью правительства-эмитента. Без ограничений на сырьевые товары денежно—кредитная политика является полностью гибкой, что позволяет быстро реагировать на кризис, но повышает восприимчивость к инфляционному давлению."