l_russian:
 Republic_of_Lakota_focus: "Древо Фокусов Республики Лакота"
 LKT_Sakakawea_capital: "Сделал §YСакакавеа§! Столица"
 LKT_Sakakawea_capital_name: "Сакакавея"
 LKT_Pierre_capital: "Сделал §YПьер§! Столица"
 LKT_Pierre_capital_name: "Пьер"
 LKT_Fort_Nakanin_capital: "Сделал §YФорт Наканин§! Столица"
 LKT_Fort_Nakanin_capital_name: "Форт Наканин"
 LKT_New_Cheyenne_capital: "Сделал §YНью-Шайенн§! Столица"
 LKT_New_Cheyenne_capital_name: "Нью-Шайенн"
 LKT_Old_Cheyenne_capital_name: "Старый Шайенн"
 LKT_decisions_war_time_mobilization_category: "Мобилизация военного времени"
 LKT_decisions_war_time_mobilization_category_desc: "Когда возникнет необходимость, мы можем призвать добровольческий легион людей, чтобы, по крайней мере, заполнить пробелы в рядах. Ибо мы не знаем, когда придет война, но мы знаем, что она придет к нам."
 LKT_war_time_mobilization: "Первая Волна Мобилизации"
 LKT_war_time_mobilization_desc: "Призыв к оружию уже наступил, и мы должны сплотиться, чтобы обеспечить защиту наших домов. К оружию за ребят из Дикси!"
 LKT_war_second_wave_defenders: "Вторая Волна Защитников"
 LKT_war_second_wave_defenders_desc: "Враг наступает, поэтому мы должны призвать еще одну волну защитников. Моральный дух нации пострадает, но нам нужны войска."
 LKT_war_desperate_defenders: "Отчаянные защитники"
 LKT_war_desperate_defenders_desc: "Дела становятся мрачными, нам нужны все доступные тела, способные или нет, чтобы держать оборону. Может быть, просто может быть, мы все еще сможем победить."
 LKT_ideas_economic_development_commission: "Комиссия по экономическому развитию"
 LKT_ideas_economic_development_commission_desc: "С единством между Reclamation Front и национальным правительством, которое стало сильнее, чем когда-либо. Была создана новая экономическая комиссия, которая занималась разработкой и пониманием экономического устройства нашей страны. Теперь, когда верх и низ работают вместе, будущее нашей великой нации — это всего лишь один шаг к истинному единству."
 LKT_event.1.t: "Глава правительства"
 LKT_event.1.d: "Поскольку в настоящее время у нас нет намерения смотреть дальше на север, безопасность столицы нашей страны зависит от наших четырех самых северных штатов. Дакоты, Монтана и Вайоминг. Хотя некоторые разубеждают в этом, поскольку считают, что чем дальше столица от фронта, тем дальше будут привлечены помощь и внимание. Тем не менее, мы не можем позволить себе помешать этим отвлекающим препирательствам. Многие, однако, также задаются вопросом, следует ли нам придерживаться более базового наименования столицы или нам следует обратиться к исконной принадлежности земель. На данный момент эти четыре штата-кандидата освобождают место, чтобы выглядеть привлекательными для комитета по национальным началам для выбора своего штата."
 LKT_event.1.o1: "Разве мы только что не рухнули из-за подобных вещей?"
 LKT_event.2.t: "Дискуссия в сердце"
 LKT_event.2.d: "Из наших четырех претендентов у нас есть раскол между теми, кто больше соответствует старому, и теми, кто хочет быть немного более в гармонии с местными влияниями земель. В туземном углу у нас есть Монтана с фортом Наканин, игра со старой индейской резервацией неподалеку, которая была для племен Накода и А'ананин. В Северной Дакоте у нас есть Сакакавеа в честь самой большой реки в штате. Что касается южных участников, у нас есть Пьер, Южная Дакота, в качестве варианта, поскольку в штате не наблюдается большого развития, многие в штате считают, что новой федеральной столице будет легко создать свой собственный район, чтобы стать частью более широкой столичной головоломки Пьер. Наконец, у нас есть Нью-Шайенн, находящийся примерно в середине справа штата, он будет иметь приоритет над старой столицей штата Вайоминг, которая будет переименована в Старый Шайенн. Некоторые жители немного обижены этой идеей, однако многие считают, что это прекрасный символ обновления, поскольку федеральная столица принимает эстафету новой страницы в истории молодой страны."
 LKT_event.2.o1: "Сакакавеа"
 LKT_event.2.o2: "Пьер"
 LKT_event.2.o3: "Форт Наканин"
 LKT_event.2.o4: "Нью-Шайенн"
 LKT_event.3.t: "Аудит Юга"
 LKT_event.3.d: "После долгого и утомительного предприятия по стабилизации страны мы, наконец, смогли обратиться к этой предполагаемой организации \"Фронт возрождения\", которая, по-видимому, нам помогает. Однако мы отправили туда аудиторов, чтобы выяснить истинную причину, по которой эти люди решили покинуть свои уже существующие дома, чтобы внезапно построить новые. Независимо от этого, мы должны подождать, чтобы увидеть, что именно будет сообщено, если мы действительно хотим действовать."
 LKT_event.3.o1: "Не может быть, чтобы всё было так плохо, верно?"
 LKT_event.4.t: "Первоначальные отчеты"
 LKT_event.4.d: "Появилась кое-какая информация, и она в лучшем случае неоднозначна, а в худшем — сбивает с толку. По некоторым данным, «Республиканец» — это именно то, чем они себя называют. Группа коренных жителей, бежавших из Южной Республики в попытке найти новый дом. В результате экономика Канзаса развивается быстрее, чем экономика страны в целом. С другой стороны, есть сообщения о том, что некоторые члены «Республикинец» совершают преступления против местных жителей и даже ведут себя как мафия, чтобы сохранить свою репутацию. Из-за такой неопределённости мы можем либо принять активное участие в восстановлении, либо почувствовать, как нам в живот воткнули нож. В любом случае нам предстоит сделать серьёзный выбор, который может привести к поступкам, о которых мы впоследствии пожалеем."
 LKT_event.4.o1: "Преступники, все до единого!"
 LKT_event.4.o2: "Подожди-ка, может, тут есть что-то еще?"
 LKT_event.5.t: "Предложение, от которого невозможно отказаться"
 LKT_event.5.d: "С шокирующими сообщениями о более незаконной деятельности РФ аудитор проявил инициативу и встретился с руководством РФ, чтобы более или менее сделать им предложение. Успокойте часть их величественного положения и позвольте северному национальному правительству взять на себя больше заслуг, и мы оставим вас в покое. Естественно, руководство РФ встретило неоднозначную реакцию, и самой громкой из них была растущий коллективный ответ. Ответ был процитирован как: «Мы миролюбивые люди и глубоко оскорблены тем, что вы считаете нас обычными преступниками и организованными гангстерами, вроде ваших старых белых коллег. Мы покажем вам, что не потерпим таких грубых и унизительных замечаний, чтобы заклеймить наши народы». Аудитора вышвырнули и преследовали всю дорогу до границы Небраски, с этим ясно, что наши предположения были верны, и мы должны действовать достаточно быстро."
 LKT_event.5.o1: "Дайте им дюйм, и они займут целый штат"
 LKT_event.6.t: "Соберите нацию"
 LKT_event.6.d: "Растущие волнения в Канзасе, поскольку члены РФ и местное руководство начали вставать на сторону этого мятежного движения в целом. Таким образом, северные штаты начали объединяться, и нам нужно начать своего рода мобилизацию, если мы действительно хотим чего-то добиться в ближайшее время."
 LKT_event.6.o1: "Это наша нация, а не их"
 LKT_event.7.t: "Открытое восстание"
 LKT_event.7.d: "Эти проклятые предатели наконец-то сделали это, они высоко подняли государственный флаг Канзаса и объявили штат независимым от республики. Нам нужно организовать войска и сделать это и покончить с этим, прежде чем наши соседи увидят слабость."
 LKT_event.7.o1: "Озвучьте призыв к митингу"
 LKT_event.8.t: "К войне!"
 LKT_event.8.d: "Нация мобилизована, чего бы это ни стоило, и поэтому мы маршируем на юг, чтобы защитить наши земли от этих предательских оппортунистических паразитов. Добрая воля и все такое, бааа, куча чепухи в лучшем случае и куча лжи в худшем."
 LKT_event.8.o1: "Мы идем на юг!"
 LKT_event.9.t: "Они не оставляют нам выбора"
 LKT_event.9.d: "Они называют нас ворами, мошенниками и преступниками. Ну, мы не такие, и мы будем защищать себя вместе с этими любезными и родственными людьми Канзаса. За Канзас и за истинную свободу!"
 LKT_event.9.o1: "Мы боремся за нашу свободу!"
 LKT_event.5000.t: "Дальнейшие расследования"
 LKT_event.5000.d: "Продолжающиеся сообщения показывают, что все больше и больше заявлений о незаконной стороне деятельности организации оказываются ложными по сути. В связи с этим начали возникать переговоры о том, чтобы подтолкнуть экономику страны и больше работать над более гармоничным союзом народов."
 LKT_event.5000.o1: "Слава Богу, мы посмотрели дальше"
 LKT_event.5001.t: "Дальнейшие планы"
 LKT_event.5001.d: "Первоначальные переговоры и инвестиционные планы показали рост экономики по всему миру. Такой рост заставил нашу страну увидеть то, на что, как мы думали, уйдут месяцы, а именно развитие. Учитывая, как идут дела, мы должны рассмотреть вопрос о создании экономической комиссии для обеспечения сбалансированного и устойчивого экономического развития нашей великой страны и ее многочисленных народов."
 LKT_event.5001.o1: "К процветанию!"
 LKT_event.5002.t: "Комиссия"
 LKT_event.5002.d: "Продолжение переговоров и разработок привело к формированию «Комиссии по экономическому развитию». Эта комиссия привела к более сплоченной доктрине экономического планирования и роста, которая поможет нашей стране на протяжении поколений."
 LKT_event.5002.o1: "Мы едины, разделены мы больше никогда не будем"
 LKT_organizing_the_farmers: "Организация фермеров"
 LKT_organizing_the_farmers_desc: "У нас не так много, но что у нас есть, мы должны объединить и подготовить, чтобы использовать, когда это будет нужно."
 LKT_creating_infantry_reserves: "Создание резервов"
 LKT_creating_infantry_reserves_desc: "Окружённые врагами со всех сторон, мы должны ожидать худшего. Давайте создадим готовые резервные силы, чтобы, когда придёт время, мы были готовы встретить врага."
 LKT_mobilizing_the_reserves: "Мобилизация резервов"
 LKT_mobilizing_the_reserves_desc: "Время пришло, и мы должны обеспечить безопасность наших дорогих граждан. Давайте мобилизуем резервы и выступим на защиту наших домов."
 LKT_focus_a_capital_conundrum: "Серьезная головоломка"
 LKT_focus_a_capital_conundrum_desc: "Поскольку существуют ограниченные границы того, что мы называем нацией, мы должны искать базу, которую мы могли бы назвать столицей нашей страны. Мы смотрим на север и надеемся на разрешение конфликта."
 LKT_focus_montana_monster: "Монстр из Монтаны"
 LKT_focus_montana_monster_desc: "Восстановление наконец началось, наша нация должна быть в состоянии обслуживать и прокормить себя, прежде чем мы сможем даже думать о чем-то другом. Таким образом, сельское хозяйство будет приоритетом в эти первые дни."
 LKT_focus_montana_marvel: "Чудо Монтаны"
 LKT_focus_montana_marvel_desc: "От лохмотьев к богатству или, по крайней мере, от пустого желудка к полному. Таким образом, мы можем начать развертывать наши гражданские и муниципальные службы общего характера, чтобы помочь стабилизировать общество внутри государства и принести новый мир на эти земли"
 LKT_focus_northern_troubles: "Северные проблемы"
 LKT_focus_northern_troubles_desc: "Дакота, как и большая часть нашей страны, очень малонаселена и практически не развита, несмотря на численность населения некоторых штатов. Тем не менее, мы должны укрепить наши северные приграничные территории, прежде чем оппортунисты попытаются их отнять, не говоря уже о том, что любые попытки покинуть страну также станут большой потерей для нашего государства. А пока давайте просто запустим хоть какую-то экономику."
 LKT_focus_our_northern_light: "Наше северное сияние"
 LKT_focus_our_northern_light_desc: "С возвращением экономической и социальной стабильности в Северную Дакоту мы можем начать расширять местные службы экстренной помощи и гражданской обороны. Благодаря этому мы сможем расширить сферу влияния в нашей молодой стране."
 LKT_focus_yellowstone_yelling: "Вопли из Йеллоустоуна"
 LKT_focus_yellowstone_yelling_desc: "Земли взывают о том, что повсюду царят хаос и опасность, мы должны выступить с инициативой по возвращению мира и покоя в эти края. Однако в штате их не так много, учитывая это, это означает, что разработок и материалов для работы в целом еще меньше. Но у людей должно что-то быть, и мы дадим им пищу для их желудков."
 LKT_focus_worland_wonder: "Мировое чудо"
 LKT_focus_worland_wonder_desc: "Наконец-то было восстановлено подобие мира, и вместе с этим могут быть восстановлены государственные службы и другие муниципальные изменения, возвращающие социальную сплоченность большей части нашей нации. Скоро мы сможем по-настоящему наслаждаться местом, которое сможем назвать домом."
 LKT_focus_southern_turmoil: "Южные беспорядки"
 LKT_focus_southern_turmoil_desc: "Мыльный пузырь, мыльный пузырь - тяжелый труд и неприятности, мы перемешиваем все эти неприятности. Со дна отчаяния мы поднимаем на поверхность то, что можем очистить и починить. С экономией и едой на столах, которые мы накрываем, мы будем рассказывать истории, которые когда-то были баснями, окружавшими нас. Теперь мы идем вперед, чтобы задать темп, ибо наш народ нуждается в нас в этих тяжелых испытаниях судьбы."
 LKT_focus_rapid_city_revival: "Быстрое возрождение города"
 LKT_focus_rapid_city_revival_desc: "Твердой рукой мы заключаем наш мир, ради людей этих земель мы позволим им пировать...ладно, хватит с меня этих дерьмовых рифм. Вы построили какую-то экономику, теперь начинайте внедрять государственное управление и гражданские службы, чтобы восстановить социальную сплоченность и восстановить солидарность другой части вашей нации."
 LKT_focus_industry_what_industry: "Отрасль, какая именно?"
 LKT_focus_industry_what_industry_desc: "Вопреки утверждениям многих, очевидно, что мы обладаем определенной промышленной мощью возможно, она невелика, но это все же что-то. По крайней мере, это помогает нам стабилизировать и диверсифицировать нашу экономику в целом."
 LKT_focus_nebraska_neck_breaker: "Ломатель шеи в Небраске"
 LKT_focus_nebraska_neck_breaker_desc: "Поскольку вся нация пострадала, мы должны работать над тем, чтобы залечить ее раны. Таким образом, восстановление какой-то экономической основы позволит людям объединиться и перезапустить общество таким, каким мы его знаем."
 LKT_focus_from_broken_bow_to_fixed: "От сломанного лука до исправленного"
 LKT_focus_from_broken_bow_to_fixed_desc: "Раны заживают, но шрамы все еще остаются, потребуется время, чтобы полностью исцелиться и забыть прошлое, но мы можем сделать это, по частичке за раз."
 LKT_focus_kansas_city_catastrophe: "Катастрофа в Канзас - Сити"
 LKT_focus_kansas_city_catastrophe_desc: "Канзас-Сити, штат Канзас, что за место, полное людей, развлечений и того, что можно вырвать из контекста и посмеяться. Тем не менее, это можно было бы сказать о многих вещах, однако искра была зажжена, и город озарился чем-то большим, чем просто насмешками и одобрительными возгласами. Теперь мы должны вернуть то, что когда-то было утрачено, и проложить новый путь к обновлению."
 LKT_focus_the_kansas_city_kitty: "Котенок из Канзас - Сити"
 LKT_focus_the_kansas_city_kitty_desc: "Теперь, когда экономика хорошо функционирует, мы можем вернуться в привычное русло. Я слышал, что на мэйн-стрит открыт клуб, и мы можем танцевать всю ночь напролет, как в старые добрые времена."
 LKT_focus_the_new_republic: "Новая Республика"
 LKT_focus_the_new_republic_desc: "Из пепла старого восстает новое. теперь мы отправляемся открывать для себя не только самих себя, но и будущее, которое мы хотим создать."
 LKT_focus_new_elections_begin: "Начинаются новые выборы"
 LKT_focus_new_elections_begin_desc: "Сейчас самое время заложить наши политические основы. Проведя наши первые общенациональные выборы, мы подготовили почву для того, чтобы наш народ пришел к своим собственным выводам и взял на себя ответственность за ту судьбу, к которой он стремится."
 LKT_focus_the_councils_of_authority: "Советы власти"
 LKT_focus_the_councils_of_authority_desc: "По интересному повороту судьбы, похоже, что одна из многих, почти \"олигархических\" партий одержала победу на выборах. Реальный вопрос сейчас заключается только в том, что любая из этих партий запланировала для нации. Я имею в виду, что термин \"олигархия\" - это такое внушительное различие, что, конечно, это не сулит ничего хорошего для нации. О чем только думали эти люди?"
 LKT_focus_DDP_political_plan: "Политический план Демократической партии Дакоты"
 LKT_focus_DDP_political_plan_desc: "По итогам первых выборов, судя по всему, победу одержала Демократическая партия Дакоты. Теперь они планируют проводить свою политику, чтобы помочь сформировать нацию и ее народ в эти непростые времена."
 LKT_focus_skill_assessment_fairs: "Ярмарки оценки навыков"
 LKT_focus_skill_assessment_fairs_desc: "SAF - это мероприятия, спонсируемые на федеральном уровне, призванные отточить и заставить население изучить и осознать свои навыки во всех областях. Это позволяет нам помогать нанимать людей, а также дает нам лучшее представление о том, какие таланты есть в нашей стране."
 LKT_focus_light_industry_investment: "Инвестиции в легкую промышленность"
 LKT_focus_light_industry_investment_desc: "Создание ограниченного числа значимых, но перспективных отраслей промышленности в нашей стране обеспечит пассивный доступ к новым навыкам и возможностям трудоустройства. Это может быть и немного, но, как говорится, это честный труд."
 LKT_focus_business_taxes_redraft: "Пересмотр налогов на бизнес"
 LKT_focus_business_taxes_redraft_desc: "Завершив первоначальную переработку налоговой политики для физических лиц, мы установим новый минимальный уровень, на котором наша налоговая политика сможет быть фактически реализована. Хотя в нашей экономике пока мало конкретных данных, чрезмерное увеличение нагрузки на эти предприятия за счет повсеместного корпоративного налогообложения, несомненно, негативно скажется на наших доходах."
 LKT_focus_education_streamlining: "Оптимизация образования"
 LKT_focus_education_streamlining_desc: "Упрощение учебной программы до основных принципов, которые учащиеся смогут применять в повседневной жизни, позволит нам изучить возможности улучшения управления классом, а также определить пути реформирования учебной программы в будущем."
 LKT_focus_basic_arms_industry_investment: "Базовые инвестиции в оружейную промышленность"
 LKT_focus_basic_arms_industry_investment_desc: "Наша страна малонаселена и слаборазвита. Многие будут считать нас легкой мишенью, и хотя мы не хотим ею быть, для развития таких ранних милитаристских амбиций мы должны найти для этого причину. Поэтому мы заложим основу для местного производства оружия, чтобы поддержать охоту и обеспечить вооружением наши постоянные вооруженные силы."
 LKT_focus_extensive_geological_surveys: "Обширные геологические изыскания"
 LKT_focus_extensive_geological_surveys_desc: "Благодаря обширным исследованиям и обследованию земель, которые считаются \"малоценными месторождениями\", мы можем начать находить способы превратить эти кажущиеся незначительными залежи полезных ископаемых во что-то значимое. Хотя вначале это будет дорого стоить, долгосрочные выгоды и безопасность нашей национальной независимости того стоят."
 LKT_focus_KCK_political_plan: "Политический план ККК"
 LKT_focus_KCK_political_plan_desc: "Коалиция Канзас-Сити - это коллектив бизнес-лидеров и политических деятелей, которые хотят как можно быстрее направить страну в нужное русло. Таким образом, их основные задачи сосредоточены на экономической стабильности и управлении населением в связи с \"Великим коллапсом\"."
 LKT_focus_zoning_reforms: "Реформы зонирования"
 LKT_focus_zoning_reforms_desc: "Более гибкий и иной подход по сравнению с традиционными формами зонирования должен позволить нашим городам и поселкам лучше адаптироваться к потребностям наших граждан и экономики в целом."
 LKT_focus_integrated_health_plans: "Комплексные планы медицинского страхования"
 LKT_focus_integrated_health_plans_desc: "Внедрение обязательного медицинского страхования в бизнес позволит обеспечить более гибкие условия найма, а также адаптирует потребности сотрудников к требованиям рабочей среды."
 LKT_focus_regulatory_cutbacks: "Сокращение регулирования"
 LKT_focus_regulatory_cutbacks_desc: "Устранение множества утомительных и контрпродуктивных нормативных актов позволит предприятиям лучше поддерживать страну и людей, которых они нанимают."
 LKT_focus_national_employment_commission: "Национальная комиссия по занятости"
 LKT_focus_national_employment_commission_desc: "НЭК — это национальный орган, созданный для поиска как внутренней, так и зарубежной рабочей силы, чтобы заполнять вакансии и способствовать развитию более стабильной и сбалансированной экономики. Конечно, привлечение иностранных работников может быть непростым процессом, однако наши континентальные братья и сёстры будут рассматриваться как обычные граждане, поскольку основная цель программы — обеспечить, чтобы экономический рост не опережал доступную рабочую силу."
 LKT_focus_ensuring_military_stockpiles: "Обеспечение военных запасов"
 LKT_focus_ensuring_military_stockpiles_desc: "Национальная оборона важна, однако для того, чтобы действительно защитить свою страну, необходимо сначала иметь соответствующее оборудование. Поэтому расширение деятельности Национальной комиссии по трудоустройству позволит нам трудоустроить больше людей на заводах для создания этих запасов, чтобы наша армия и военно-воздушные силы могли защитить нашу страну от нежелательных интересов."
 LKT_focus_LTP_political_plan: "Политический план LTP"
 LKT_focus_LTP_political_plan_desc: "Лакотанская технократическая партия - это партия прогресса и инноваций. Сосредоточившись на образовании, НИОКР, а также на создании экономических условий для финансирования таких начинаний, LTP надеется создать нацию, которая стремится добиваться большего и находит способы добиться еще большего."
 LKT_focus_mandatory_education_programs: "Программы обязательного образования"
 LKT_focus_mandatory_education_programs_desc: "Программы обязательного образования — это программы, призванные расширить возможности образования, минуя базовый уровень начальной школы. Это независимые программы, выходящие за рамки стандартных, призванные открыть новые возможности для людей независимо от возраста."
 LKT_focus_the_means_of_efficiency: "Средства повышения эффективности"
 LKT_focus_the_means_of_efficiency_desc: "Наша страна малонаселенна, и поэтому мы должны сосредоточиться и адаптироваться к этой реальности. Таким образом, мы должны воспользоваться средствами повышения эффективности и работать над тем, чтобы воздать должное тому, что у нас есть."
 LKT_focus_ends_of_a_means: "Цели из средств"
 LKT_focus_ends_of_a_means_desc: "У нас есть доступ к основному ресурсу - железной руде. Мы можем превратить эту руду в сталь, которая является фундаментальным элементом современной экономической головоломки. Таким образом, мы должны вложить значительные средства в добычу этого ресурса, если хотим иметь настоящую ступеньку к нашей самодостаточности."
 LKT_focus_economic_expansion_act: "Закон об экономическом развитии"
 LKT_focus_economic_expansion_act_desc: "Общее промышленное развитие позволит расширить нашу экономическую базу. Это, в свою очередь, должно дать нам возможность нарастить капитал для дальнейших инвестиций."
 LKT_focus_peoples_defense_act: "Закон о защите народа"
 LKT_focus_peoples_defense_act_desc: "Закон о народной обороне — это ограниченная программа национальной обороны, которая создала ограниченные возможности для промышленного производства и заключения контрактов, чтобы дать нашей стране средства для оснащения наших солдат техникой."
 LKT_focus_militarized_politics_plan: "План милитаризованной политики"
 LKT_focus_militarized_politics_plan_desc: "В условиях, когда нация расходится во мнениях о том, что правильно, а что нет в том, как двигаться вперед, элементы AFL, Вооруженных сил Лакоты, перехватили инициативу и каким-то образом обеспечили себе большинство голосов для победы на этих первых выборах. Хотя многие сомневаются, что они выиграли бы менее противоречивые выборы, большинство все же просто рады иметь направление, а не просто гадать в неизвестности."
 LKT_focus_national_conscription_period: "Национальный период призыва на военную службу"
 LKT_focus_national_conscription_period_desc: "Из-за нашей подавляюще низкой численности населения по сравнению с нашими прибрежными соседями, мы должны ввести обязательный призывной период продолжительностью не менее полугода. Многие не одобрят этот шаг, однако, если мы действительно хотим сосредоточиться на национальной обороне и подготовиться к любому подобному дурачеству со стороны других сильных мира сего, то как таковые мы должны это сделать."
 LKT_focus_military_classroom_standards: "Стандарты военного класса"
 LKT_focus_military_classroom_standards_desc: "Включив простые требования, такие как физическая доблесть и базовые знания типов в строевые формирования, а также тактику небольших подразделений, мы можем, таким образом, создать свободную форму базовой подготовки, которая затем готовит будущих призываемых молодых людей к периоду обязательной военной службы."
 LKT_focus_basic_economic_investments: "Базовые экономические инвестиции"
 LKT_focus_basic_economic_investments_desc: "Чтобы иметь шанс защитить себя, нам необходимы средства для поддержки таких начинаний. Поэтому мы будем создавать проекты ограниченного промышленного развития, чтобы обеспечить себя такими средствами."
 LKT_focus_military_industrial_sector: "Военно-промышленный сектор"
 LKT_focus_military_industrial_sector_desc: "Военно-промышленный сектор — это наша разновидность военно-промышленного комплекса. Однако ключевое отличие заключается в том, что эти заводы будут многоцелевыми, то есть будут построены с учетом возможности адаптации. Под этим мы подразумеваем, что в мирное время они будут вносить ограниченный вклад в гражданскую экономику, но при необходимости смогут легко перепрофилироваться и нарастить производство военной продукции."
 LKT_focus_less_for_more: "Меньше за больше"
 LKT_focus_less_for_more_desc: "Сосредоточение инвестиций на сокращении трудовых ресурсов в отдельных предприятиях и секторах экономики позволит высвободить больше средств для военных нужд и экономического роста. При этом наше население, по сути, крайне мало по сравнению с остальной частью континента. Поэтому мы будем инвестировать в производство продуктов питания, цепочки поставок и контролировать средства воспроизводства, чтобы наши граждане могли жить и любить так, как им нравится."
 LKT_focus_general_military_improvements_funding: "Финансирование общих военных улучшений"
 LKT_focus_general_military_improvements_funding_desc: "GMIF - это надежный пакет финансирования, позволяющий нашим военным совершенствовать средства, которые мы считаем необходимыми для потенциальных полей сражений, на которых мы можем оказаться. Поскольку наибольшую угрозу представляет авиация, на данный момент мы разделим инвестиции поровну между военно-воздушными силами и сухопутными войсками."
 LKT_focus_the_parties_for_tradition: "Вечеринки в честь традиций"
 LKT_focus_the_parties_for_tradition_desc: "Группа партий от правоцентристских до более явно правых, собираются вместе, чтобы сформировать избирательный блок, известный как Партии за традиции. Поэтому любопытно посмотреть, будут ли люди тяготеть к какой партии на первых выборах в стране."
 LKT_focus_ORP_political_plan: "Политический план ORP"
 LKT_focus_ORP_political_plan_desc: "Партия \"Старая Республика\" использует платформу стабильности и осторожности. Эту платформу можно рассматривать как медленную и устойчивую победу в гонке, и, учитывая ситуацию, в которой мы оказались как нация, я думаю, что многие не проголосовали бы за них, если бы решили поторопиться, как некоторые партии."
 LKT_focus_strategic_mechanization_act: "Закон о стратегической механизации"
 LKT_focus_strategic_mechanization_act_desc: "Чрезмерная зависимость нашей экономики от сельского хозяйства в той или иной степени означает, что многие люди вовлечены в это начинание. Таким образом, несмотря на шумиху, которую это может вызвать, мы должны принять меры по механизации в той или иной форме, чтобы лучше распределить имеющуюся у нас рабочую силу."
 LKT_focus_better_neighbors_act: "Лучшие соседи действуют"
 LKT_focus_better_neighbors_act_desc: "Поскольку основным сектором экономики является сельское хозяйство, изобилие продовольствия не является чем-то необычным. Таким образом, мы можем стимулировать \"просителей убежища\" из соседних с нами стран к увеличению численности населения и оказанию помощи в восстановлении нашей экономики в целом. В конце концов, рабочие места ничего не значат без людей, которые их заполняют."
 LKT_focus_green_thumb_officers_act: "Офицеры с зелёными пальчиками действуют"
 LKT_focus_green_thumb_officers_act_desc: "Закон о ГТО призван помочь улучшить финансирование правоохранительных органов, а также лучше распределять ресурсы между районами и средства к существованию тех, кто находится в более изолированных регионах."
 LKT_focus_kansas_economic_upgrade: "Экономический подъем Канзаса"
 LKT_focus_kansas_economic_upgrade_desc: "Важной областью застройки является наш самый южный штат Канзас. Этот штат, несмотря на все его развитие, имеет более высокую, чем ожидалось, зависимость от сельского хозяйства. Таким образом, с помощью некоторых щедрых инвестиций мы планируем преобразовать определенную область более крупной сельскохозяйственной экономики в сочетание легкой и тяжелой промышленности."
 LKT_focus_better_budgeting_act: "Закон о совершенствовании бюджетирования"
 LKT_focus_better_budgeting_act_desc: "Закон о совершенствовании бюджетирования учитывает существующий бюджет на образование и проводит полный и детальный аудит, чтобы помочь упорядочить и эффективнее распределять бюджетные ресурсы. Таким образом, мы планируем улучшить образовательные стандарты, устранив, насколько это возможно, несоответствие, которое сбои в составлении бюджета могут оказать на студентов и персонал."
 LKT_focus_experimental_extractions_act: "Закон об экспериментальном извлечении"
 LKT_focus_experimental_extractions_act_desc: "Нашей стране не хватает стержневой стали и / или просто приличных запасов железной руды. Таким образом, геологические изыскания и крупные инвестиции, независимо от чистой прибыльности, будут проводиться в штатах Канзас и Небраска, чтобы обеспечить нашей стране доступ к этому важнейшему строительному блоку современной экономики."
 LKT_focus_GLP_political_plan: "Политический план Великой либеральной партии"
 LKT_focus_GLP_political_plan_desc: "Умеренно либеральная политика, направленная на развитие сельского хозяйства, поддержит нашу страну и ее народ. Многие голосовали за Великую либеральную партию, потому что считали ее партией медленного прогресса, изменений в формах, к которым люди могли бы приспособиться и которые могли бы понять. Но только время покажет, так ли это на самом деле."
 LKT_focus_food_bank_securities_act: "Закон о ценных бумагах Продовольственных банков"
 LKT_focus_food_bank_securities_act_desc: "Закон о FBS - это законодательство о создании государственных облигаций и облигаций частных инвестиций, которые пойдут на покупку обычных продуктов питания, которые могут быть у домашних хозяйств. Эти \"продовольственные банки\" затем будут использоваться для оказания помощи семьям в приобретении продуктов повседневного спроса, которые они, возможно, не смогут себе позволить в трудную минуту. Благотворительные организации, имеющие стабильные и последовательные структуры, которые помогают прокормить бездомных и других обнищавших граждан, также могут подавать заявки на получение таких ценных бумаг, но их будут сопровождать федеральные регулирующие органы для обеспечения того, чтобы финансовые средства и продукты питания использовались по назначению."
 LKT_focus_audit_commissions_act: "Закон о ревизионных комиссиях"
 LKT_focus_audit_commissions_act_desc: "ACA или Закон об аудите - это законодательство, созданное для создания независимой комиссии аудиторов для обеспечения того, чтобы федеральные агентства и персонал выделяли финансовые и материальные ресурсы на перечисленные и предполагаемые цели. Этот орган будет состоять из лиц, не связанных с каким-либо политическим учреждением и / или политической партией, и как таковой будет представлять соответствующие области финансов и регулирования для обеспечения беспристрастности."
 LKT_focus_raw_value_act: "Закон о сырой стоимости"
 LKT_focus_raw_value_act_desc: "Наша страна может извлечь из сельского хозяйства лишь ограниченную выгоду. Люди нуждаются в товарах, а для товаров требуются минеральные ресурсы, поэтому мы будем инвестировать в разработку месторождений редкоземельных элементов и других высокоценных минералов, чтобы, так сказать, диверсифицировать наш национальный инвестиционный портфель."
 LKT_focus_improving_immigration_processes: "Совершенствование иммиграционных процессов"
 LKT_focus_improving_immigration_processes_desc: "Инвестируя в улучшение ресурсов, выделяемых на иммиграционное обеспечение и общий процесс получения гражданства, мы можем надеяться на более плавную и привлекательную работу с иностранными гражданами. Эта надежда будет заключаться в том, что они выберут нашу страну своим новым домом, и мы сможем дать им новый шанс на жизнь и ее неизменный драгоценный смысл."
 LKT_focus_invest_care_act: "Закон об инвестировании средств"
 LKT_focus_invest_care_act_desc: "Invest Care - это бюджетная инициатива, направленная на более последовательное финансирование медицинских услуг. Благодаря этим улучшенным усилиям по финансированию мы надеемся повысить моральный дух сотрудников и стимулировать будущие возможности трудоустройства, а также убедиться, что здания соответствуют нормам и оборудование работает должным образом. Ваша забота - это наша инвестиция, ибо чем лучше люди, тем лучше нация."
 LKT_focus_national_defense_upgrades: "Модернизация национальной обороны"
 LKT_focus_national_defense_upgrades_desc: "Увеличение инвестиций в более совершенное оборудование и знакомство персонала с этим оборудованием повысят наши возможности по защите нашей страны от иностранных актов агрессии."
 LKT_focus_TTP_political_plan: "Политический план ТТП"
 LKT_focus_TTP_political_plan_desc: "Партия племенных традиций - это партия, которая является полунативистской по своей природе, но не в той степени, как многие могли бы предположить. Нативизм зарождается вокруг идеи, что, хотя эти земли когда-то были землями племен, чтобы двигаться вперед, сохраняться и выживать, мы должны объединиться как одна нация из многих народов. Использование традиций для сплочения, таких как семья, сообщество и вера в принципы, которым мы намерены оставаться верными по отношению к самим себе."
 LKT_focus_defense_spending_program: "Программа расходов на оборону"
 LKT_focus_defense_spending_program_desc: "DSP - это пакет расходов, направленный на подготовку нации к более оборонительной позиции. Наши земли как открыты, так и закрыты на обширных территориях, и поэтому мы должны использовать эти территории в наших интересах."
 LKT_focus_families_security_stipend: "Пособие на обеспечение семьи"
 LKT_focus_families_security_stipend_desc: "Семейная стипендия, как многие ее называют, - это стипендия, на которую семьи могут подать заявление и которую они могут получить, чтобы помочь снять любую экономическую напряженность, с которой они могут столкнуться в связи с семейными потребностями. Питание, одежда и уход за ребенком оплачиваются в рамках стипендии, а также списка других предметов, зарегистрированных в вашей федеральной стипендиальной карте."
 LKT_focus_food_supply_mandate: "Мандат на поставку продовольствия"
 LKT_focus_food_supply_mandate_desc: "Наш народ живет на плодородных землях, землях, которые должны легко прокормить народы, которые на них живут. С помощью этого мы будем инвестировать и создадим мандат на то, чтобы у наших граждан всегда были дешевые и хорошие продукты питания для каждого приема пищи, где это возможно, ибо само выживание нашей нации зависит от баланса наших запасов продовольствия."
 LKT_focus_limited_industrialization_efforts: "Ограниченные усилия по индустриализации"
 LKT_focus_limited_industrialization_efforts_desc: "Чтобы диверсифицировать экономику и обеспечить здоровый и энергичный рынок труда, мы должны инвестировать в ограниченное промышленное развитие, чтобы обеспечить такое разнообразие наших человеческих ресурсов, какое только могут обеспечить эти земли."
 LKT_focus_setting_up_new_contracts: "Заключение новых контрактов"
 LKT_focus_setting_up_new_contracts_desc: "Создание ограниченного базового плана развития нашего военного производства даст нам хотя бы приблизительное представление о потребностях, с которыми мы можем столкнуться, если на Североамериканском континенте разразится война."
 LKT_focus_strategic_mining_operations: "Стратегические операции по добыче полезных Ископаемых"
 LKT_focus_strategic_mining_operations_desc: "У нашей страны есть ресурсы, но нам нужно инвестировать довольно значительные средства, чтобы приобрести более ценные и / или экономически значимые полезные ископаемые. Имея это в виду, мы будем инвестировать в добычу драгоценных металлов в Вайоминге и ограниченные операции с легкими металлами в Южной Дакоте. Это будет немного, но дополнение к некоторому финансированию НИОКР должно окупиться со временем."
 LKT_focus_LTSP_political_plan: "Политический план LTSP"
 LKT_focus_LTSP_political_plan_desc: "Лакотанская традиционная партия и партия солидарности - это партия довольно общих консервативных взглядов. Стремясь сосредоточиться на вопросах общества и семьи и используя это как средство укрепления национального единства, многие задаются вопросом, почему эта партия и некоторые другие столь же консервативные партии вообще существуют в таком раздробленном состоянии, какими они являются."
 LKT_focus_community_improvement_programs: "Программы улучшения жизни сообщества"
 LKT_focus_community_improvement_programs_desc: "CIP предназначены для обеспечения доступности для населения и общих усилий по улучшению, направленных на объединение сообществ и стимулирование общего развития в небольших и / или более сельских районах."
 LKT_focus_farming_expansion_efforts: "Усилия по расширению фермерского хозяйства"
 LKT_focus_farming_expansion_efforts_desc: "Стабильность нашей страны зависит от того факта, что у нас много плодородных земель, и поэтому мы будем осваивать эти земли, чтобы стимулировать наш народ расти на полях, которые они возделывают."
 LKT_focus_building_to_new_heights: "Достижение новых высот"
 LKT_focus_building_to_new_heights_desc: "Офисный и технологический секторы нуждаются в расширении. Если мы хотим должным образом диверсифицировать нашу экономику и потенциал наших граждан, то мы должны инвестировать в новые разработки, а также в образовательные усилия для их поддержки."
 LKT_focus_manufacturing_new_industries: "Производство новых отраслей промышленности"
 LKT_focus_manufacturing_new_industries_desc: "Развитие основной базы нашей экономики имеет фундаментальное значение для общего расширения."
 LKT_focus_securing_armaments: "Обеспечение сохранности вооружений"
 LKT_focus_securing_armaments_desc: "Обеспечение наших войск имеет первостепенное значение для национальной обороны. Поскольку в ближайшем будущем мы ничего не ожидаем, начнем с малого и создадим пару заводов для решения проблемы нехватки базового оборудования."
 LKT_focus_natural_resources_act: "Закон о природных ресурсах"
 LKT_focus_natural_resources_act_desc: "Обширный и всесторонне развитый инвестиционный пакет в горнодобывающую промышленность, который призван революционизировать ресурсные возможности нашей страны. Хотя это будет дорого стоить, со временем это окупится само собой."
 LKT_focus_the_common_folk_progress_parties: "Партии простого народа за прогресс"
 LKT_focus_the_common_folk_progress_parties_desc: "Простые народные партии, как некоторые предпочитают называть восходящие социалистические партии, ориентированные на экономику, - это группа партий, которые в той или иной форме или способом считают, что им нужно набирать обороты, чтобы этого не сделали \"крайне правые\". Независимо от того, что некоторые партийные чиновники в этих различных группах хотят использовать в качестве оправдания, многие рассматривают эти партии как более распространенный способ видения нации, поскольку большая часть земель не освоена, и поэтому \"Большого бизнеса\" на самом деле не существует в традиционном смысле."
 LKT_focus_FPP_political_plan: "Политический план ФПП"
 LKT_focus_FPP_political_plan_desc: "Партия «Прогрессивные фермеры», выступающая за интересы фермерских хозяйств, использует идею демократических социалистических принципов для создания «фермерской нации». По сути, вместо того чтобы уделять основное внимание промышленным рабочим, они сосредоточатся на улучшении условий труда сельскохозяйственных рабочих. Учитывая структуру экономики нашей страны, неудивительно, что они победили на выборах."
 LKT_focus_american_asylum_act: "\"Американский\" Закон о предоставлении убежища"
 LKT_focus_american_asylum_act_desc: "Закон \"Три А\", как некоторые его называют, - это псевдооткрытая пограничная политика. По сути, тем, кто сможет доказать, что они долгое время проживали на территории старой республики, будет предоставлено убежище в стране. Такой подход к девизу, используемому вокруг статуи свободы на востоке, - отличный способ привлечь людей в нашу страну и развивать нашу экономику за счет заполнения рабочих мест, которых, кажется, становится больше, чем у нас есть людей, способных их заполнить."
 LKT_focus_expanded_health_services: "Расширенные услуги здравоохранения"
 LKT_focus_expanded_health_services_desc: "Улучшение наших возможностей в области здравоохранения и возможность связаться с любым человеком в разумные сроки обеспечат выживаемость и улучшат общее состояние здоровья наших граждан."
 LKT_focus_fine_tuning_industrial_regulations: "Точная настройка промышленных норм"
 LKT_focus_fine_tuning_industrial_regulations_desc: "Хотя структура нашей экономики не сильно зависит от промышленности, мы все еще можем превзойти ее, скорректировав упреждающий удар по некоторым вызывающим беспокойство нормативным актам, которые душат или прямо вредят гражданам целого ряда стран."
 LKT_focus_more_for_more_act: "Больше за большее действие"
 LKT_focus_more_for_more_act_desc: "Эта инициатива по финансированию поможет оптимизировать сельскохозяйственные практики, а также будет способствовать созданию новых ферм и смежных отраслей. Принцип «чем больше, тем лучше» объясняется тем, что в долгосрочной перспективе в сельское хозяйство будет вовлечено меньше людей, однако те же самые фермеры смогут продолжать заниматься этим делом."
 LKT_focus_farmer_jims_research_emporium: "Исследовательский центр фермера Джима"
 LKT_focus_farmer_jims_research_emporium_desc: "Центр сельскохозяйственных исследований поможет сформировать новые поколения фермеров, а также может стать одновременно исследовательским центром, помогающим совершенствовать производство сельскохозяйственной продукции."
 LKT_focus_steeled_veins_act: "Закаленные вены действуют"
 LKT_focus_steeled_veins_act_desc: "Железная руда, живая кровь для производства стали, важнейшая опора современной экономики и структур, находится у нас под ногами. Мы должны инвестировать и гарантировать, что сможем обеспечить безопасность этого широко востребованного ресурса, если хотим иметь стабильную и функциональную экономику."
 LKT_focus_LAS_political_plan: "Политический план ЛАГ"
 LKT_focus_LAS_political_plan_desc: "Лакотское аграрное общество — это коллективистское движение, которое стремится модернизировать аграрную политику, а также найти способы сократить государственное вмешательство, чтобы вернуть больше власти самим людям."
 LKT_focus_asylum_experiment: "Эксперимент с убежищем"
 LKT_focus_asylum_experiment_desc: "Мы стремимся заселить наши земли, наши фермы и саму нашу нацию. Таким образом, мы должны искать наилучшие формы обращения за убежищем и делать все возможное, чтобы восполнить эти критические недостатки."
 LKT_focus_improving_farming_methods: "Совершенствование методов ведения сельского хозяйства"
 LKT_focus_improving_farming_methods_desc: "Инвестиции в улучшение основных экономических потребностей, таких как производство продуктов питания, принесут пользу каждому человеку, независимо от происхождения. Таким образом, мы рассмотрим способы улучшить сельское хозяйство любым способом, чтобы улучшить наши запасы продовольствия."
 LKT_focus_mechanized_agriculture_union: "Союз механизированного сельского хозяйства"
 LKT_focus_mechanized_agriculture_union_desc: "Объединяя секторы экономики промышленности и сельского хозяйства, мы создаем общий прецедент, согласно которому эти секторы не могут функционировать без улучшения друг друга. Таким образом, если мы хотим иметь действительно равноправное общество, необходимо обеспечить взаимный рост и развитие."
 LKT_focus_local_farming_initiatives: "Инициативы по развитию местного сельского хозяйства"
 LKT_focus_local_farming_initiatives_desc: "Самая большая проблема продовольственной безопасности — это цепочки поставок. Возможность производить товары в больших объемах ничего не значит, если они портятся до того, как попадут на полки магазинов. Поэтому мы будем поощрять развитие местных проектов, чтобы уменьшить необходимость в междугородней транспортировке продуктов питания. Это позволит улучшить цены на товары и увеличить доступную валюту для удовлетворения потребностей наших граждан."
 LKT_focus_more_ways_to_work_the_land: "Больше способов обрабатывать землю"
 LKT_focus_more_ways_to_work_the_land_desc: "Сельское хозяйство может продвинуть нас далеко, а требования современных методов ведения сельского хозяйства означают, что мы должны должным образом исследовать земли и находить полезные ископаемые. Таким образом, сбалансированный на национальном уровне комплекс геологических исследований, горных работ, а также создание новых перерабатывающих мощностей выведут нашу страну на высоты, невиданные ранее в современную эпоху."
 LKT_focus_the_land_of_opportunity: "Страна возможностей"
 LKT_focus_the_land_of_opportunity_desc: "Наши земли обширны, пусты и созрели для того, чтобы сообщества процветали и работали сообща. Давайте сформулируем задачу приветствовать тех, кто стремится к лучшему будущему."
 LKT_focus_PNP_political_plan: "Политический план ПНП"
 LKT_focus_PNP_political_plan_desc: "Партия национального сохранения - довольно стандартная партия зеленых. Несмотря на компромисс по сравнению с более традиционными, PNP стремится к модернизации, а также к тому, чтобы природная красота страны оставалась в такте."
 LKT_focus_building_tall_not_wide: "Здание высокое, но не широкое"
 LKT_focus_building_tall_not_wide_desc: "Исследуя новые формы повышения эффективности производства, мы можем работать вместе над поиском способов соответствовать требованиям нашего общества без необходимости использовать при этом так много земли."
 LKT_focus_stable_economics: "Стабильная экономика"
 LKT_focus_stable_economics_desc: "Сосредоточившись на нашей экономической стабильности, мы должны найти баланс между эффективностью на заводах и в других секторах экономики, одновременно стремясь компенсировать различия на рынке труда. Таким образом, нам необходимо будет увеличить наши инвестиции в социальные услуги и инициативы в области экономического планирования."
 LKT_focus_local_food_producers: "Местные производители продуктов питания"
 LKT_focus_local_food_producers_desc: "В рамках программы LFP создается несколько ферм, предназначенных для прокормления местного населения. Значительно снижая цены на продовольствие, а также поощряя увеличение внутренних расходов, а не импорт и экспорт из-за рубежа."
 LKT_focus_sufficient_tech_investments: "Достаточные инвестиции в технологии"
 LKT_focus_sufficient_tech_investments_desc: "Технологический сектор в нашей стране практически не развит. однако у нас есть ресурсы для достойных инвестиций, так что мы можем, по крайней мере, иметь как разнообразие рабочих мест, так и ресурсы, которые можно использовать в дальнейшем."
 LKT_focus_domestic_arms_production_efforts: "Усилия по внутреннему производству вооружений"
 LKT_focus_domestic_arms_production_efforts_desc: "Наша способность сохранить наши земли и наш народ зависит только от возможностей наших постоянных вооруженных сил. Хотя кажется, что в ближайшем будущем ничего не произойдет, не имея ничего для начала, это также не является планированием с какой-либо натяжкой воображения."
 LKT_focus_eco_extraction_efforts: "Усилия по экозащите"
 LKT_focus_eco_extraction_efforts_desc: "Благодаря тонкому оборудованию и усовершенствованию средств добычи ресурсов мы можем получить обширный и разнообразный пул ресурсов. однако прямые объемы будут строго ограничены просто из-за наших собственных ограничений в добыче полезных ископаемых. Но мы надеемся и дальше развивать способы получения большего за меньшие деньги по мере развития технологий."
 LKT_focus_RBP_political_plan: "Политический план RBP"
 LKT_focus_RBP_political_plan_desc: "Партия Роуз Буш стремится продвигать права трудящихся и в целом продвигать нацию вперед по пути прогрессивной индустриализации. Стремясь создать больший союз между экономическим и социальным развитием. RBP сделает все возможное, чтобы обеспечить стабильность и процветание между начальством и работниками."
 LKT_focus_revamped_corporate_taxes: "Пересмотренные корпоративные налоги"
 LKT_focus_revamped_corporate_taxes_desc: "Изменив налоговый кодекс, особенно в части более стандартизированной ставки корпоративного налога, мы можем гарантировать стабильную форму дохода и переложить большую часть налоговых расходов на корпоративные и / или офисные организации, а не на среднестатистического налогоплательщика."
 LKT_focus_education_for_all: "Образование для всех"
 LKT_focus_education_for_all_desc: "Значительно расширяются наши системы образования и способность каждого гражданина приобретать знания об окружающем нас мире. Это позволяет нам извлекать пассивные выгоды по мере того, как наше население становится более образованным и достигает все более высоких стандартов в качестве базового."
 LKT_focus_fixing_our_ore_deal: "Улаживаем нашу сделку с Рудой"
 LKT_focus_fixing_our_ore_deal_desc: "Железо, сталь - современная опора, на которой держится любая экономика после самого бетона. Мы должны прилично инвестировать в создание наших собственных линий поставок стали, если хотим долго продержаться самостоятельно. Мы окружены со всех сторон неизвестным, так что давайте, по крайней мере, сделаем известной одну вещь."
 LKT_focus_from_fields_to_cities_act: "Закон \" От полей к городам \""
 LKT_focus_from_fields_to_cities_act_desc: "Общее развитие событий как в наших сельских, так и в городских центрах способствует общему разнообразному расширению рынка труда и повышению качества рабочих мест, доступных нашим гражданам."
 LKT_focus_from_it_sector_developments: "Развитие ИТ-сектора"
 LKT_focus_from_it_sector_developments_desc: "Наличие небольшого, но самодостаточного сектора информационных технологий и/или высокотехнологичной отрасли будет наиболее благоприятным фактором для продолжения усилий по диверсификации нашей экономики."
 LKT_focus_supplying_our_military_needs: "Удовлетворение наших военных потребностей"
 LKT_focus_supplying_our_military_needs_desc: "Основные потребности должны удовлетворяться постоянно, независимо от того, гражданские это или военные. Если мы хотим защитить себя от любых иностранных вторжений, то мы должны построить несколько заводов, чтобы обеспечить соответствие военного производства нашим потребностям."
 LKT_focus_new_lakotan_nationals_parties: "Новые граждане Лакотана, Партии"
 LKT_focus_new_lakotan_nationals_parties_desc: "Растущая волна социалистических экономических идей, внезапный и насильственный крах старой республики и нетронутые земли, на которых расположена наша нация — вот лишь несколько причин, по которым вы, граждане нашей славной страны, должны голосовать за нас. За Новых националистов Лакоты! Присоединяйтесь к нам, чтобы сохранить новую идентичность, которую мы создали, свободной от иностранного вмешательства и марксистских или даже маоистских идей. Голосуйте сегодня и внесите свой вклад!"
 LKT_focus_YIP_political_plan: "Политический план YIP"
 LKT_focus_YIP_political_plan_desc: "YIP, или Партия молодых промышленников, - это партия, ориентированная на модернизацию и ставящая процветание во главу угла политики. Хотя некоторые опасаются, что на самом деле они просто олигархи в плащах, многие в партии сосредоточены на демонстрации и доказательстве запланированных усилий, а не на традиционном поливании политической грязью."
 LKT_focus_sponsored_immigration: "Спонсируемая иммиграция"
 LKT_focus_sponsored_immigration_desc: "Наши земли бесплодны, наших граждан мало, и поэтому мы должны привлекать новичков, ищущих лучшей жизни. Пустой рынок труда, ожидающий заполнения, и земля для заселения, насколько хватает глаз. Таково наше обещание этим новым первопроходцам."
 LKT_focus_recruiting_talent: "Подбор талантов"
 LKT_focus_recruiting_talent_desc: "Другие способы увеличить численность населения — предоставить возможности для квалифицированных специалистов. Лучшие зарплаты и условия жизни всегда служат хорошим стимулом."
 LKT_focus_south_munitions: "Южные боеприпасы"
 LKT_focus_south_munitions_desc: "Обеспечение безопасности местных производственных цепочек для военных поставок позволит нашим военнослужащим противостоять любым угрозам, исходящим от нас."
 LKT_focus_central_industries: "Центральные отрасли промышленности"
 LKT_focus_central_industries_desc: "Нельзя содержать армию, не поддерживая самих военных. Поэтому мы централизуем промышленное развитие, чтобы упростить поездки на работу."
 LKT_focus_bismarck_bombs: "Бомбы Бисмарка"
 LKT_focus_bismarck_bombs_desc: "Строительство новых военных заводов на северных равнинах позволит нам работать с более нестабильными материалами с минимальным сопутствующим ущербом в случае непредвиденных обстоятельств."
 LKT_focus_promoting_human_resources: "Содействие развитию людских ресурсов"
 LKT_focus_promoting_human_resources_desc: "Поля созрели для сбора урожая, как и люди. Стимулируя сельскохозяйственное производство и людей доставлять его с полей на столы по всей стране, мы должны обеспечить целенаправленное развитие иммиграционных усилий, а также экономическую поддержку для этого."
 LKT_focus_CDS_political_plan: "Политический план CDS"
 LKT_focus_CDS_political_plan_desc: "Географический национализм и непримиримый изоляционизм. Эти два столпа поддерживают основные ценности «Общества», и многие не понимают, в чем тут дело. Во-первых, как можно быть «географическим националистом», а во-вторых, как изоляционизм может помочь нам, если мы так мало развиваемся? Как бы то ни было, «Общество» уверенно движется вперед, одержав победу на выборах."
 LKT_focus_learning_social_values: "Изучение социальных ценностей"
 LKT_focus_learning_social_values_desc: "Наше общество находится в руинах, потому что люди не знают, что считать своим собственным. Семья, нация и дух земель, на которых мы живем, - все это ключевые ценности для продвижения и обеспечения более стабильного и справедливого общества."
 LKT_focus_character_creation_programs: "Программы создания персонажей"
 LKT_focus_character_creation_programs_desc: "Благодаря сочетанию волонтерских и обязательных программ, которые объединяют элементы образования и военной службы, многие наши граждане и будущие поколения обретут понимание ответственности и долга. Не только перед нацией, но и перед самими собой, своей семьей и теми, кто им дорог."
 LKT_focus_supply_chains: "Цепочки поставок"
 LKT_focus_supply_chains_desc: "Наша страна обширна, в основном равнинна и в целом является довольно слаборазвитой страной. Мы должны сделать все возможное, чтобы создать прочные и гибкие линии снабжения для поддержки нашей страны."
 LKT_focus_domestic_families_act: "Закон о домашних семьях"
 LKT_focus_domestic_families_act_desc: "DFA - это бюджетный пакет, предназначенный для поощрения и фактического субсидирования больших семей и, таким образом, стимулирования роста численности населения внутри страны. Поскольку бывает трудно найти иностранных талантов, соответствующих нашим культурным стандартам, мы должны позаботиться о том, чтобы наша низкая численность населения никогда не была критическим фактором нашего собственного выживания."
 LKT_focus_encouraging_favorable_migrants: "Поощрение благоприятных мигрантов"
 LKT_focus_encouraging_favorable_migrants_desc: "Мы должны сканировать и искать таланты и навыки, необходимые нашей стране и ее гражданам. Ибо наше выживание ограничено только нашими способностями, и поэтому мы должны заставлять себя увеличивать те самые способности, которыми мы можем обладать."
 LKT_focus_increased_military_investments: "Увеличение военных инвестиций"
 LKT_focus_increased_military_investments_desc: "Мы должны убедиться, что наши военнослужащие экипированы и готовы к встрече с любой вражеской силой, которая может обрушиться на наши земли."
 LKT_focus_LGF_political_plan: "Политический план ЛГФ"
 LKT_focus_LGF_political_plan_desc: "Лига Золотых приисков, как многие ее называют, - это партия, в победу которой мало кто верил, и все же мы здесь. Многие с самого начала не уверены, как такая партия победила, но в такие неопределенные времена, я думаю, мало что можно сделать. Давайте просто надеяться, что это скорее хорошо, чем плохо."
 LKT_focus_improved_food_production: "Улучшенное производство продуктов питания"
 LKT_focus_improved_food_production_desc: "Обеспечение нашего населения продовольствием способствует внутреннему росту и социальной стабильности."
 LKT_focus_increasing_industrial_base: "Увеличение промышленной базы"
 LKT_focus_increasing_industrial_base_desc: "Рост нашего промышленного потенциала позволяет нам диверсифицировать нашу экономику, улучшить ее общее состояние и предоставить нашим гражданам больше возможностей, чем они когда-либо могли бы найти в тех странах, которые граничат с нами."
 LKT_focus_local_military_production: "Местное военное производство"
 LKT_focus_local_military_production_desc: "Инвестиции в местное военное производство позволяют нам приобретать оборудование для наших вооруженных сил и предотвращают упадок наших вооруженных сил. Однако мы должны глубже разобраться в этом, если хотим действительно защитить себя от дикарей, которые смотрят на наши земли с жадностью и завистью."
 LKT_focus_increasing_lawful_order: "Укрепление законного порядка"
 LKT_focus_increasing_lawful_order_desc: "Увеличивая потенциал полиции и служб безопасности, мы можем преследовать преступления всех видов. Это позволяет нам держать в узде корпоративные структуры, а также потенциальных иностранных агентов, которые могут смешаться с толпой законопослушных граждан."
 LKT_focus_military_education_act: "Закон о военном образовании"
 LKT_focus_military_education_act_desc: "MEA - это стандартизация образования в соответствии с руководящими принципами военной организации. Интеллектуалы больше не будут заражать умы нашей молодежи буйными идеями, подрывающими основы нашего общества. Теперь это долг, честь, мужество, уважение и самопожертвование. Ради дома, семьи и тех, кто дорог сердцам и умам всех наших граждан."
 LKT_focus_self_mobilization: "Акт самомобилизации"
 LKT_focus_self_mobilization_desc: "Закон о самомобилизации - это всеобъемлющий экономический план по мобилизации нации и ее граждан в своего рода \"четвертной позиции\", скажем так. Это означает, что необходимо повысить эффективность экономики, нанять больше людей упреждающим образом в случае реальной мобилизации, а также активизировать усилия по призыву на военную службу, чтобы морально и социально подготовить население к нуждам любых враждебных вторжений против нас."
 LKT_focus_HOY_political_plan: "Хороший политический план"
 LKT_focus_HOY_political_plan_desc: "Йеллоустонский дом стоит особняком от более широкого глобального явления, которым является \"Современное монархическое движение\". У этого общего и слегка разнообразного политического движения есть только одна главная цель - слава голосованию, а не крови. Это означает простое сохранение и усовершенствование процесса голосования, чтобы сделать его более распространенным и гибким. Такие вещи, как всеобщее избирательное право до достижения 18-летнего возраста, ранжированное голосование за кандидатов и превращение выборных должностей в титулы. Это означает, что президент теперь король, или, скажем, представитель теперь лорд, или что-то еще. Многие сбиты с толку, но большинство постепенно привыкает к идее стать герцогом, бароном или кем-то еще просто за то, что они государственные служащие нации."
 LKT_focus_office_titles_act: "Закон о служебных титулах"
 LKT_focus_office_titles_act_desc: "Стандартизация феодальных титулов в правительственных учреждениях покажет людям, что если они будут достаточно усердно трудиться, то даже они могут стать принцами или принцессами."
 LKT_focus_expanding_mining_operations: "Расширение добычи полезных ископаемых"
 LKT_focus_expanding_mining_operations_desc: "Мы должны быть уверены, что наша нация действительно сможет стоять на своих собственных ногах. Таким образом, нам необходимо инвестировать в горнодобывающую деятельность, связанную с добычей полезных ископаемых, которых у нас критически не хватает."
 LKT_focus_farmers_primacy_act: "Закон о первенстве фермеров"
 LKT_focus_farmers_primacy_act_desc: "Наша продовольственная безопасность - это единственное, что позволяет создать стабильную экономику. Поскольку наше население так мало, мы должны делать все возможное, чтобы стимулировать его рост, и продовольствие - один из лучших способов сделать это."
 LKT_focus_expanding_immigration_efforts: "Расширение иммиграционных усилий"
 LKT_focus_expanding_immigration_efforts_desc: "Положение вещей в мире подобно акту балансирования. Некоторые нации хороши, другие в порядке, а третьи все еще просто плохие. Мы должны стремиться к тому, чтобы те, кто граничит с нами, увидели, что мы - одна из лучших наций. Поощрение иммиграции помогает стабилизировать наш рынок труда и стимулировать развитие в областях, которых остро не хватает."
 LKT_focus_improving_education_standards: "Повышение образовательных стандартов"
 LKT_focus_improving_education_standards_desc: "Мы должны повышать стандарты образования, чтобы гарантировать, что наша способность внедрять инновации и производить как товары, так и услуги будет как можно менее расточительной."
 LKT_focus_national_economic_investments: "Национальные экономические инвестиции"
 LKT_focus_national_economic_investments_desc: "Диверсифицировать нашу экономику - значит пассивно обеспечивать нашу национальную независимость. Производя всего понемногу, мы можем использовать эту подставку для ног как способ торговаться и прокладывать себе путь в международных отношениях и торговых сделках."
 LKT_focus_industrialization_question: "Промышленный вопрос"
 LKT_focus_industrialization_question_desc: "\"Штаты Великих равнин\", как многие называют значительную часть штатов, находящихся под нашим контролем, являются одними из наименее развитых земель в старой республике и, конечно же, в пределах новой республики, которая у нас есть. Однако у нас новое правительство, и мы можем начать делать все, что захотим. Поэтому мы должны задать себе один вопрос. Проводить индустриализацию или нет."
 LKT_focus_the_great_northern_railway: "Великая Северная железная дорога"
 LKT_focus_the_great_northern_railway_desc: "Когда-то это было простое звено железной дороги Берлингтон-Нортер-Санте-Фе, теперь это снова независимое предприятие. С реорганизацией той ограниченной инфраструктуры, которая нам доступна, мы можем как увековечить упавший флаг в истории железных дорог, так и улучшить и профинансировать нашу растущую инфраструктуру."
 LKT_focus_northern_bypass: "Северный обход"
 LKT_focus_northern_bypass_desc: "Маршрут borderlands вдоль канадской границы позволит нам иметь альтернативный маршрут для перевозки грузов из Монтаны в Северную Дакоту. не говоря уже о потенциале транспортных потребностей, связанных с торговыми сделками."
 LKT_focus_great_western_mainline: "Великая Западная магистраль"
 LKT_focus_great_western_mainline_desc: "Извилистый маршрут через Монтану в Вайоминг позволит нам перевозить большое количество грузов по различным холмистым и гористым местностям нашего западного региона."
 LKT_focus_the_southern_extension: "Южная пристройка"
 LKT_focus_the_southern_extension_desc: "Наш путь в Канзас позволяет нам доставлять товары с крайнего севера Дакоты на юг, в более или менее изолированный штат, и таким образом развивать сотрудничество между всеми штатами внутри нашей республики."
 LKT_focus_completing_the_network: "Завершение работы сети"
 LKT_focus_completing_the_network_desc: "Расширение наших инвестиций за счет создания объездных путей в различных стратегических точках позволяет нам иметь альтернативные маршруты на случай стихийных бедствий, техногенных аварий или чего-либо еще, что может привести к повреждению одного или нескольких существующих маршрутов."
 LKT_focus_modern_agrarian_economy: "Современная аграрная экономика"
 LKT_focus_modern_agrarian_economy_desc: "Наши земли обширны, плодородны и изобильны. Было бы чертовски обидно просто позволить всему этому пропасть даром из-за разрушительной и токсичной природы современного индустриализма. Мы должны вернуться к более простым и в то же время более изощренным средствам достижения нашей экономической зависимости. Эти земли станут ключом к этому, ибо каждый клочок этой земли станет фермой для взращивания мира в целом."
 LKT_focus_northern_farms_adaptation_act: "Закон об адаптации Северных Ферм"
 LKT_focus_northern_farms_adaptation_act_desc: "NFAA - это закон об инвестициях в фермы и сельскохозяйственные центры в северных штатах. К ним относятся инвестиции и финансирование, а также обучение методам адаптации к зиме, а также потенциально новые структуры и средства обеспечения продуктами даже в самый разгар зимы. Теплицы и должным образом изолированные и отапливаемые помещения для содержания скота означают, что фермеры смогут стабильно работать практически круглый год."
 LKT_focus_centralia_farms_act: "Закон о фермерских хозяйствах Централии"
 LKT_focus_centralia_farms_act_desc: "CFA реорганизует фермы в центральных штатах нашей страны в рамках совместного государственного и частного корпоративного образования. Основная цель этого - обеспечить сбалансированный рост, а также обеспечить разнообразие сельскохозяйственной продукции в зависимости от возможностей каждого штата. Являясь крупнейшим подразделением почти на половину штата, это совместное предприятие создано из общих интересов создания частного богатства, а также обеспечения общественных интересов в области продовольственной безопасности."
 LKT_focus_southern_farming_traditions: "Традиции Южного земледелия"
 LKT_focus_southern_farming_traditions_desc: "В южной части страны, а также в старой республике своего рода мягкой традицией было подчеркивание важности выращивания товарных культур. Сейчас, когда мы являемся новой нацией, нельзя недооценивать важность некоторых из этих товарных культур с точки зрения экспорта и внутренней ценности. Таким образом, мы сделаем так, чтобы наш более устойчивый к климату южный штат Канзас был более склонен производить смесь этих товарных культур."
 LKT_focus_targeted_mechanization_efforts: "Целенаправленные усилия по механизации"
 LKT_focus_targeted_mechanization_efforts_desc: "Сосредоточив все промышленные усилия на развитии сельскохозяйственного сектора, мы можем обеспечить значительный рост производительности и надлежащую диверсификацию экономики, чтобы не допустить отката назад, Вы никогда не знаете, попытаются ли погодные условия или глобальное явление нанести нам вред."
 LKT_focus_bio_fuel_investments: "Инвестиции в биотопливо"
 LKT_focus_bio_fuel_investments_desc: "Использование нашей системы образования для диверсификации и усиления преимуществ аграрной экономики. Теперь мы можем заняться переработкой и исследованием новых видов биотоплива, которые помогут питать наши автомобили, дома и предприятия."
 LKT_focus_the_farmers_tax_code: "Налоговый кодекс фермера"
 LKT_focus_the_farmers_tax_code_desc: "Полностью переработав налоговый кодекс и построив его вокруг прецедента сохранения наших аграрных средств производства. Мы можем обеспечить стабильность в рабочей силе и надеемся помочь инвестировать в будущие фермы и фермеров для нашей страны."
 LKT_focus_funding_general_education_improvements: "Финансирование улучшения общего образования"
 LKT_focus_funding_general_education_improvements_desc: "Выделение средств из нашего бюджета на образование поможет подготовить будущие поколения к тому, чтобы способствовать развитию наших технологических потребностей по мере возникновения любопытства и самой потребности."
 LKT_focus_bio_fuel_engineering_institute: "Институт разработки биотоплива"
 LKT_focus_bio_fuel_engineering_institute_desc: "BFEI - это специализированное исследовательское и высшее учебное заведение, занимающееся улучшением применения и общей эффективности биотоплива. Мы будем использовать это учебное заведение как опору для образования и повышения эффективности нашей экономической деятельности."
 LKT_focus_skill_set_education_programs: "Образовательные программы по набору навыков"
 LKT_focus_skill_set_education_programs_desc: "SSEP - это инициатива финансирования для дальнейшей диверсификации и улучшения общего набора навыков, которые наши граждане могут приобрести в своей жизни. Мы надеемся, что это значительно улучшит усилия по обеспечению занятости и обеспечит более стабильный и всесторонний подход к экономическому росту и развитию."
 LKT_focus_lakotan_development_fund: "Фонд развития Лакотана"
 LKT_focus_lakotan_development_fund_desc: "Выделяя определенный раздел бюджета, мы можем обеспечить целенаправленное развитие для сбалансирования и лучшего развития нашей экономической базы."
 LKT_focus_the_fifth_revolution: "5 - я Промышленная революция"
 LKT_focus_the_fifth_revolution_desc: "На рубеже тысячелетий акты индустриализации прошли через две основные итерации. Исходя из этого, мы увидели, что третьим является рост элементов автоматизации, а четвертым - рост искусственного интеллекта и компьютерных интеграций за пределы того, что считалось возможным. Теперь мы готовим почву для пятой революции, когда мы, нация полей и ничтожество в плане промышленности, будем соперничать в своей модернизации даже с теми, кто живет на Дальнем Востоке."
 LKT_focus_rushmore_revival: "Проект \" Возрождение Рашмора \""
 LKT_focus_rushmore_revival_desc: "Дакоты - это символ не только нового, более нейтрального и / или нового идентификационного названия, которое мы выбрали для нашей нации. Но эти два государства являются символом основной идентичности земель, которые мы занимаем. Таким образом, мы должны сделать эти два фактора первоочередными в нашей новой революционной политике индустриализации нации в целом."
 LKT_focus_rocky_roads_no_more: "Проекта «Каменистых дорог больше нет»"
 LKT_focus_rocky_roads_no_more_desc: "Наши штаты Монтана и Вайоминг, которые граничат с хребтом скалистых гор или представляют собой практически целые участки, имеют стратегическое значение. Эти государства служат связующими звеньями через горный хребет, а также препятствуют развитию из-за особенностей рельефа. Поэтому необходимо осуществлять масштабные инвестиции в инфраструктуру, а также в экономическое развитие, чтобы гарантировать, что эти государства не останутся в стороне."
 LKT_focus_kansas_city_kerosene: "Проект \" Канзас - Сити Керосин \""
 LKT_focus_kansas_city_kerosene_desc: "Штаты Канзас и Небраска обладают неиспользованным потенциалом. Поскольку в этих штатах есть заметные месторождения нефти, а также природного газа, которые технически происходят из Техаса. Мы можем использовать эти ресурсы, чтобы вывести нашу нацию на передний план индустриализации. Благодаря скоординированным усилиям по добыче полезных ископаемых, а также экономическим инвестициям мы должны быть в состоянии ожидать великих свершений."
 LKT_focus_rare_earth_energy_act: "Закон о редкоземельной энергии"
 LKT_focus_rare_earth_energy_act_desc: "Разработка месторождений редкоземельных элементов, а также расширение наших внутренних энергетических мощностей позволят нам не только продолжить рост нашей промышленной базы, но и предоставят нам козыри для дипломатических усилий."
 LKT_focus_project_nebraska_namesake: "Тезка проекта в Небраске"
 LKT_focus_project_nebraska_namesake_desc: "Штат Небраска обладает множеством стратегических ресурсов, которые не исследованы на предмет истинного масштаба или просто нетронутых ресурсов, о которых мы знаем. Таким образом, мы начнем комплексную кампанию по добыче полезных ископаемых и маркшейдерскому исследованию, чтобы обеспечить использование этих стратегических ресурсов для подпитки не только нашей индустриализации, но и увеличения нашего потенциального иностранного политического капитала."
 LKT_focus_business_tax_reforms: "Налоговые реформы для бизнеса"
 LKT_focus_business_tax_reforms_desc: "С нашей постоянно растущей промышленной базой структура нашей экономики становится все более и более разнообразной. Таким образом, нам необходимо внимательно изучить и пересмотреть налоговый кодекс различных секторов нашего бизнеса, чтобы обеспечить справедливый характер кодекса. Это должно позволить нам увеличить естественные средства, за которые граждане сами могут создавать стартапы, а также просто экономить свои собственные деньги и вносить свой вклад в экономику любым способом, который они сочтут нужным."
 LKT_focus_peoples_tax_reforms: "Народные налоговые реформы"
 LKT_focus_peoples_tax_reforms_desc: "Хотя бизнес идет хорошо, эти предприятия работают настолько хорошо, насколько хороши сами люди. Таким образом, нам необходимо обеспечить упрощение, модернизацию и разумность налогового кодекса для поддержания постоянно развивающейся индустриализации граждан."
 LKT_focus_establishing_lakotan_institute_of_technology: "Лакотанский технологический институт"
 LKT_focus_establishing_lakotan_institute_of_technology_desc: "Создание LIT - это прорыв в централизованных исследованиях и разработках. Мы не только объединяем ресурсы, как материальные, так и человеческие, в более локализованную область. Это учреждение создано для того, чтобы помогать развивать и совершенствовать известные науки в меру возможностей каждого человека."
 LKT_focus_national_investment_progrmas: "Национальные инвестиционные программы"
 LKT_focus_national_investment_progrmas_desc: "Теперь, когда наша экономика на верном пути и дела идут все лучше и лучше, мы можем начать успокаиваться и взять устойчивый курс. Некоторые общие инвестиции по всем направлениям с точки зрения бюджетных программ позволят нашим сотрудникам специализироваться, расти и адаптироваться к постоянно меняющейся экономике современной эпохи."
 LKT_focus_a_new_economy: "Новая Экономика"
 LKT_focus_a_new_economy_desc: "Теперь, когда экономика наладилась, мы можем сосредоточиться на нашей политике. В целом, теперь мы на шаг приблизились к тому, чтобы выйти за рамки наших внутренних дел."
 LKT_focus_department_of_energy: "Министерство энергетики"
 LKT_focus_department_of_energy_desc: "Иметь экономику - это прекрасно, однако это ничего не значит, если мы не можем на самом деле использовать ее. Таким образом, мы создадим Департамент энергетики Лакотана, чтобы гарантировать, что мы решим эту проблему в кратчайшие сроки."
 LKT_focus_fueling_agrarianism: "Подпитка аграризма"
 LKT_focus_fueling_agrarianism_desc: "Поскольку национальная экономика основана на превосходстве сельского хозяйства, мы должны адаптировать и развивать нашу энергетическую экономику для удовлетворения таких потребностей. Хорошо то, что при надлежащих инвестициях нам действительно не нужно развивать энергетическую инфраструктуру, скорее нам просто нужно выяснить, насколько далеко уходит топливо от источников, которые нуждаются в нем больше других."
 LKT_focus_fueling_tomorrows_economy: "Подпитка экономики завтрашнего дня"
 LKT_focus_fueling_tomorrows_economy_desc: "Наши потребности огромны, но наши земли и ресурсы еще обширнее. Мы должны развивать энергетический сектор, чтобы обеспечить удовлетворение наших потребностей и потребностей будущего внутренними средствами."
 LKT_focus_a_new_green_deal: "Новый зеленый курс"
 LKT_focus_a_new_green_deal_desc: "Новый зеленый курс или NGD - это комплексная схема инвестирования в энергетику, направленная на разработку и обеспечение максимально эффективного и буквально единственно верного метода производства зеленой энергии, который, как мы надеемся, откроют нынешние и будущие прорывы. Небольшие, более эффективные установки, ограниченные инвестиции в усилия по переработке отработавшего топлива. Целых девять ярдов и еще немного."
 LKT_focus_finalizing_doe_capabilities: "Доработка возможностей DoE"
 LKT_focus_finalizing_doe_capabilities_desc: "Теперь, когда наш энергетический сектор соответствует нашим экономическим потребностям, мы можем работать над синергизмом этих двух факторов и продвигать нашу нацию в будущее, которое мы создадим."
 LKT_focus_increased_funding_for_donr: "Увеличение финансирования DoNR"
 LKT_focus_increased_funding_for_donr_desc: "Вкладывая больше средств в освоение природных ресурсов, которые находятся у нас под ногами, мы можем обеспечить более самодостаточную экономику или, по крайней мере, более сбалансированную."
 LKT_focus_massive_investments: "Масштабные инвестиции"
 LKT_focus_massive_investments_desc: "Чтобы гарантировать, что мы получим все, мы будем инвестировать как можно больше в приобретение как можно большего количества различных минеральных ресурсов, которые мы только сможем добыть."
 LKT_focus_need_by_need_investment_strategy: "Инвестиционная стратегия \"Потребность за потребностью\""
 LKT_focus_need_by_need_investment_strategy_desc: "Наши усилия по добыче полезных ископаемых должны дополнять наши основные экономические усилия. Таким образом, мы будем инвестировать в Департамент природных ресурсов по мере необходимости, чтобы держать спрос под контролем."
 LKT_focus_iron_ore_revival: "Закон о Возрождении Железной Руды."
 LKT_focus_iron_ore_revival_desc: "Наши месторождения железной руды в лучшем случае не используются и даже сокращаются из-за прошлых ошибок. Однако этого больше не будет. За счет инвестиций в Южную Дакоту, Канзас и Монтану, если назвать некоторые из них, мы расширим существующие предприятия, а также вновь откроем старые, подобные тому, что был закрыт ранее в Канзасе из-за экологических проблем. Очистка и тому подобное может быть немного затратной, но значительная добыча железной руды означает, что у нас будут здоровые внутренние поставки одного из ключевых материалов современного мира. Сталь."
 LKT_focus_bauxite_brawls_act: "Закон о бокситовых драках"
 LKT_focus_bauxite_brawls_act_desc: "Обеспечение нашей экономике доступа к более гибким металлам означает, что мы также можем углубиться как в гражданское, так и в военное применение. Таким образом, возрождение, расширение, а также инвестиции в более энергоемкие участки добычи полезных ископаемых окупятся в долгосрочной перспективе."
 LKT_focus_precious_mines_act: "Закон о драгоценных рудниках"
 LKT_focus_precious_mines_act_desc: "Во многих штатах есть месторождения РЗЭ или редкоземельных элементов. Таким образом, мы будем инвестировать в открытие и расширение производства до потенциальных коммерческих масштабов, чтобы обеспечить максимальное разнообразие в структуре нашей экономики. В конце концов, больше отечественных материалов означает больше иностранного интереса."
 LKT_focus_rubber_stamp_act: "Закон о резиновых штампах"
 LKT_focus_rubber_stamp_act_desc: "У нас большая внутренняя добыча нефти. Часть этих средств может быть стратегически перераспределена на производство синтетических химикатов и резины, чтобы обеспечить максимальное разнообразие ресурсов на наших землях."
 LKT_focus_lakotan_military_development_board: "Совет по военному развитию Лакотана"
 LKT_focus_lakotan_military_development_board_desc: "LMDB предназначена для оптимизации разработки и укрепления нашего военного потенциала. Учитывая, что на самом деле у нас есть только две отрасли обслуживания, о которых стоит беспокоиться, это должно быть простое начинание. Однако некоторые сотрудники, которые формально не входили в состав военно-морского флота старой республики, действительно надеются когда-нибудь создать военно-морской флот Лакотана. Но на данный момент его армия и военно-воздушные силы полностью готовы."
 LKT_focus_military_refinement: "Военная утонченность"
 LKT_focus_military_refinement_desc: "Методом проб и ошибок, с большими инвестициями как в материалы, так и в персонал, а также просто в само время. Мы наконец-то создали по крайней мере одно укрепленное подразделение наших вооруженных сил для обеспечения национальной обороны и безопасности наших граждан и их домов."
 LKT_focus_lakotan_army_pay_standards: "Стандарты оплаты труда Лакотанской армии"
 LKT_focus_lakotan_army_pay_standards_desc: "Обеспечение качественной оплаты труда и способности наших солдат заботиться не только о себе, но, возможно, и о своих близких дома, пассивно повысит моральный дух. В качестве бонуса эта повышенная самоотдача, вероятно, отразится на показателях текучести кадров на тренировках и качестве солдат, которых мы можем ожидать в результате указанных тренировок."
 LKT_focus_establishing_arms_contractors: "Создание подрядчиков по поставкам оружия"
 LKT_focus_establishing_arms_contractors_desc: "Создание специализированной оружейной промышленности для поддержки, по сути, главного опорного элемента нашей национальной обороны имеет первостепенное значение. Таким образом, мы обеспечим финансирование для обеспечения стабильного снабжения наших войск качественным вооружением."
 LKT_focus_sundance_war_college: "Военный колледж Сандэнса"
 LKT_focus_sundance_war_college_desc: "Создав специализированный институт военного обучения, мы сможем готовить как будущих сержантов, так и рядовых офицеров к полям сражений завтрашнего дня. Обучая их тактике, лидерству и распределению ответственности. Самое главное, мы будем учить их приспосабливаемости, поскольку любой хороший солдат всегда должен понимать, что если что-то может пойти не так, то, скорее всего, так и будет."
 LKT_focus_butte_testing_facilities: "Испытательные центры Butte"
 LKT_focus_butte_testing_facilities_desc: "Создавая специализированный испытательный и научно-исследовательский комплекс, мы можем обеспечить постоянно растущее качество наших войск, чтобы они могли быть готовы к потенциальным конфликтам в будущем."
 LKT_focus_research_mania: "Исследовательская Мания"
 LKT_focus_research_mania_desc: "Исследования и разработки - вот где это происходит. Мы будем вкладывать значительные средства в разработку новых вооружений, амуниции и вспомогательного оборудования, чтобы гарантировать, что качество наших войск будет выше тех, кто желает каким-либо образом навредить нам."
 LKT_focus_geneva_compliant_munitions: "\"Совместимые\" с Женевой боеприпасы"
 LKT_focus_geneva_compliant_munitions_desc: "Хотя мы, конечно, должны хорошо выглядеть в глазах международного сообщества, это не значит, что мы не можем испытывать границы дозволенного. Верно?"
 LKT_focus_experiemental_weapons_platoon: "Взвод Экспериментального вооружения"
 LKT_focus_experiemental_weapons_platoon_desc: "EWP будет специальным подразделением, которое будет отделено от более широкого \"Корпуса опытных оружейников\". Это подразделение нашей армии выделит взводы поддержки для проведения полевых испытаний и придания подразделениям, находящимся в затруднительном положении, необходимой поддержки по мере необходимости. В основном EWP будет состоять из опытного противотанкового вооружения и может адаптироваться к потребностям армии в условиях постоянно меняющегося поля боя."
 LKT_focus_the_corps: "\"Корпус\""
 LKT_focus_the_corps_desc: "Создание Экспериментального корпуса вооружений позволяет нам направлять финансирование, обучение и испытания в максимально возможной степени. Этот новый Научно-исследовательский корпус станет маяком света, который будет направлять нас и помогать защищаться от всех врагов наших земель."
 LKT_focus_logistical_primacy: "Школа мысли о первенстве логистики"
 LKT_focus_logistical_primacy_desc: "Сосредоточив наши усилия на материально-техническом обеспечении ведения войны, мы можем победить наших врагов чисто на истощение, если ситуация действительно дойдет до такого разврата."
 LKT_focus_bread_and_butter_doctrine: "Доктрина о хлебе и масле"
 LKT_focus_bread_and_butter_doctrine_desc: "Благодаря переоснащению экономической осведомленности в целях борьбы за выживание, превентивные меры по нормированию, а также надлежащие стратегически расположенные продовольственные склады помогут не только нашим военным, но и любым усилиям по восстановлению."
 LKT_focus_supply_heroes: "Снабжайте Героев"
 LKT_focus_supply_heroes_desc: "Пули не летят без запаса. Независимо от педантичных представлений о том, что значит быть героем, мы все можем согласиться с тем, что у любого человека есть возможности преуспеть в своей области и стать героем, в котором нуждаются люди. Таким образом, мы будем продвигать Службу снабжения и внедрять особые программы обучения, основанные на снабжении и логистике, чтобы обеспечить максимальную согласованность между цепочками поставок и подразделениями, которые они обслуживают."
 LKT_focus_logistics_corps_training_programs: "Учебные программы Корпуса материально-технического обеспечения"
 LKT_focus_logistics_corps_training_programs_desc: "Открытость наших вооруженных сил для всех слоев общества не всегда означает, что они должны быть солдатами на передовой. И \"ПОГ\" не всегда должен портить настроение солдату на передовой. Таким образом, мы посвятим себя новой подготовке и специальной доктрине для нашего корпуса материально-технического обеспечения, чтобы обеспечить сплоченность на передовой, эффективность линий снабжения и общую военную эффективность на поле боя."
 LKT_focus_lakotan_air_force_training_improvements: "Улучшения в подготовке ВВС Лакотана"
 LKT_focus_lakotan_air_force_training_improvements_desc: "Благодаря надлежащей стандартизации квалификационных критериев мы надеемся выйти на новый уровень эффективности пилотирования в боевых ситуациях."
 LKT_focus_fighter_priority_structure: "Структура приоритетов истребителей"
 LKT_focus_fighter_priority_structure_desc: "Организационные усилия FPS заключаются в том, чтобы переоборудовать основную функциональность подразделения обслуживания ВВС в соответствии с классом истребителей. Подготовка и состав подразделений обеспечат превосходство истребителей над наземной поддержкой или общей стратегической бомбардировочной поддержкой. То немногое, что мы зарабатываем, должно позволить нам летать без помех со стороны вражеской авиации, где бы ни находились наши истребители."
 LKT_focus_fighter_supremacy_doctrine: "Доктрина превосходства бойца"
 LKT_focus_fighter_supremacy_doctrine_desc: "Разработка нашей воздушной доктрины, которая будет в большей степени вращаться исключительно вокруг истребителей, направлена на обеспечение полного контроля над небом над головой. Таким образом, независимо от того, где нам может не хватать бомбардировщиков или наземной помощи, мы можем обеспечить бесплатные полигоны для испытаний этих аспектов при неконтролируемом господстве в воздухе."
 LKT_focus_ground_support_priority_structure: "Приоритетная структура наземной поддержки"
 LKT_focus_ground_support_priority_structure_desc: "Организационные усилия GSPS позволят переоснастить род войск ВВС, чтобы уделять приоритетное внимание разработке и развертыванию самолетов наземной поддержки. Это гарантирует, что, хотя нам, возможно, и не удастся добиться полного господства в воздухе, мы все же сможем нанести удар по врагу с воздуха и, по крайней мере, обеспечить стабильность линии фронта."
 LKT_focus_ground_support_supremacy_doctrine: "Доктрина превосходства наземной поддержки"
 LKT_focus_ground_support_supremacy_doctrine_desc: "Разработка нашей воздушной доктрины с уделением приоритетного внимания самолетам наземной поддержки обеспечит стабильность линии фронта, а также лишит противника способности вести боевые действия в течение длительного периода. Организационный ущерб не так уж велик, но если мы уничтожим припасы и оборудование противника, то он вообще не сможет сражаться."
 LKT_focus_strategic_bomber_priority_structure: "Приоритетная структура стратегических бомбардировщиков"
 LKT_focus_strategic_bomber_priority_structure_desc: "Организационные усилия SBPS позволят нашим военно-воздушным силам подавить волю противника к борьбе. Промышленность и инфраструктура имеют решающее значение для защиты любой страны в случае затяжного конфликта. Таким образом, мы разработаем стратегические бомбардировщики, которые уничтожат эти военные машины и разорвут автомобильные и железнодорожные пути, которые дают нашим врагам возможность попытаться причинить нам вред."
 LKT_focus_strategic_bomber_supremacy_doctrine: "Доктрина превосходства стратегических бомбардировщиков"
 LKT_focus_strategic_bomber_supremacy_doctrine_desc: "Совершенствуя нашу воздушную доктрину, ориентируясь на самолеты класса стратегических бомбардировщиков, мы лишим противника возможности сражаться с нами. Без экономики или военной промышленности враг не может вооружить свой народ или нанять его на работу. В конце концов, мы, возможно, не получим быстрой войны, но мы позаботимся о том, чтобы никто не уничтожил наш народ и эти земли, которые мы защищаем."
 LKT_focus_clear_skies_for_all: "Чистое небо для всех"
 LKT_focus_clear_skies_for_all_desc: "Усовершенствование наших военно-воздушных сил будет выставлено на всеобщее обозрение. Поощрение организованных авиашоу и тренировочных площадок для всеобщего обозрения позволит нам гарантировать гражданам, что в ближайшие дни в нашей стране будет ясное небо."
 LKT_focus_creating_a_real_navy: "Создание настоящего Военно- морского флота"
 LKT_focus_creating_a_real_navy_desc: "Наконец-то настал день, когда мы сможем создать настоящий военно-морской флот, а не каких-то шкиперов для сплавов по реке. однако путешествие будет утомительным, поскольку река совсем не похожа на открытый океан."
 LKT_focus_early_ship_construction_efforts: "Первые усилия по строительству судов"
 LKT_focus_early_ship_construction_efforts_desc: "Наша военно-морская доблесть, возможно, никогда не будет \"на высоте\", но мы, безусловно, можем начать с самого низа."
 LKT_focus_formalizing_naval_training_programs: "Формализация программ Военно-морской подготовки"
 LKT_focus_formalizing_naval_training_programs_desc: "Наконец-то внедрив реальную программу обучения с помощью охраны окружающей среды в наших новых прибрежных водах, мы сможем гарантировать достойное качество подготовки нашего военно-морского персонала."
 LKT_focus_our_naval_priority: "Наш военно-морской приоритет"
 LKT_focus_our_naval_priority_desc: "Создавая новый приоритет в развитии нашего военно-морского флота, мы устанавливаем, по крайней мере, своего рода стандарт, на который могут опираться будущие поколения."
 LKT_focus_naval_command_structure: "Структура военно - морского командования"
 LKT_focus_naval_command_structure_desc: "Военно-морская служба LAF считалась в лучшем случае шуткой, а в худшем - наказанием. Однако с приобретением новых объектов на берегу и началом работ по строительству судов blue water мы должны превратить эту шутку в серьезную и осязаемую отрасль обслуживания. Таким образом, формализация LNCS или Структуры командования ВМС Лакотана будет создана для того, чтобы облегчить и закрепить будущий прогресс в достижении военно-морского совершенства."
 LKT_focus_gulf_dry_docking_facilities: "Сухие доковые сооружения Персидского залива"
 LKT_focus_gulf_dry_docking_facilities_desc: "Расширение наших усилий по военно-морскому строительству позволит нам адаптировать и развивать наш военно-морской флот."
 LKT_focus_mid_atlantic_shipping_investments: "Инвестиции в судоходство в Срединно-Атлантическом регионе"
 LKT_focus_mid_atlantic_shipping_investments_desc: "Необходимо продолжать усилия по расширению нашего военно-морского флота, если мы хотим охватить всю эту территорию."
 LKT_focus_beyond_the_plains: "За пределами Равнин"
 LKT_focus_beyond_the_plains_desc: "Теперь, когда наша родина стабилизировалась и процветает, мы должны думать за пределами наших границ. Стремимся мы расширяться или нет, не имеет значения, поскольку мы должны мыслить шире просто из-за того факта, что многие другие смотрят за пределы своих собственных границ. Мы должны решить, каким будет наше будущее."
 LKT_focus_A_New_Destiny: "Новая Судьба"
 LKT_focus_A_New_Destiny_desc: "Мандат утрачен, и те, кто находится на Североамериканском континенте, стремятся вернуть его. Мы знаем, что это правда, судя по слухам, доносящимся с этих земель, и поэтому заявим о своих правах и одержим победу. Ибо это наша судьба, а не тех, кто на востоке или на западе."
 LKT_focus_eyeing_the_borderlands: "Присматриваюсь к пограничным землям"
 LKT_focus_eyeing_the_borderlands_desc: "Начало нашей судьбы начинается с первых шагов за пределами наших собственных границ. Поэтому мы должны работать над тем, чтобы убедиться, что наши собственные границы находятся там, где мы делаем наши первые шаги."
 LKT_focus_the_pacific_shores: "Тихоокеанские берега"
 LKT_focus_the_pacific_shores_desc: "Наш закат будет купаться в морском бризе тихоокеанских побережий. По крайней мере, на запад нужно преодолеть меньшее расстояние, чем на восток."
 LKT_focus_great_lakes_great_takes: "Великие озёра, Великие Дубли"
 LKT_focus_great_lakes_great_takes_desc: "Расширение на восток означает, что мы будем иметь дело с обширными и разнообразными землями. Мы должны приложить все наши усилия, чтобы понять и уметь ориентироваться на просторах Района Великих озер."
 LKT_focus_southern_summaries: "Южные Сводки"
 LKT_focus_southern_summaries_desc: "От болотистых местностей до горных высот южный регион США, вероятно, будет для нас самым труднопроходимым. Поскольку такая практика, изучение и тренировка самих себя для решения таких проблем будут необходимы, пока мы стремимся обезопасить эти будущие земли."
 LKT_focus_northeastern_needs: "Потребности Северо - Востока"
 LKT_focus_northeastern_needs_desc: "Горы и леса, насколько хватает глаз. Нам понадобится время и, конечно же, энергия, чтобы заняться этими землями."
 LKT_focus_manifesting_strength_for_our_destiny: "Проявляя силу для нашей судьбы"
 LKT_focus_manifesting_strength_for_our_destiny_desc: "Мы должны подготовиться и продолжать наращивать наши силы. Ибо судьба, которую мы намереваемся создать, в свое время будет нашей."
 LKT_focus_operation_cascadian_calamity: "Операция \" Каскадное бедствие \""
 LKT_focus_operation_cascadian_calamity_desc: "Начинается наш великий крестовый поход за безопасность континента. Мы начнем с самого близкого к нашей власти объекта - Каскадии. Горы будут суровыми, но они послужат отличными тренировочными площадками для наших солдат."
 LKT_focus_operation_san_jose: "Операция \" Сан - Хосе \""
 LKT_focus_operation_san_jose_desc: "Прочесывание западного побережья позволяет нам создать нашу собственную стену, которой является тихий океан. Таким образом, следующий шаг к континентальной безопасности будет обеспечен, как только мы захватим Калифорнию."
 LKT_focus_operation_sierra_mist: "Операция \" Сьерра - Туман \""
 LKT_focus_operation_sierra_mist_desc: "Обеспечение безопасности богатого энергией региона на юго-западе, а также остальной части скалистых гор позволяет нам создать мощную линию обороны на случай, если что-либо нарушит наши западные берега."
 LKT_focus_operation_sam_houston: "Операция \" Сэм Хьюстон \""
 LKT_focus_operation_sam_houston_desc: "Защищая самобытность крупнейшего народа на североамериканском континенте, мы защищаем волю различных народов. Техасцы — гордый и независимый народ, и их поддержка открывает путь для любых восточных вторжений, которые мы можем предпринять."
 LKT_focus_reorganizing_civil_services: "Реорганизация государственных служб"
 LKT_focus_reorganizing_civil_services_desc: "Создание новых стандартизированных государственных служб позволяет нам лучше управлять нашими территориями и активизировать усилия по интеграции, чтобы позволить людям пережить войны недавней памяти. Это не будет идеально, но это, безусловно, шаг в правильном направлении."
 LKT_focus_operation_rustic: "Операция \" Рустик \""
 LKT_focus_operation_rustic_desc: "Наш марш на восток начинается с того, что мы выбираем северный маршрут, по мере того как вокруг становится все больше равнин, холмов и лесов. Конечно, это была бы не простая прогулка, но это была бы хорошая тренировка перед нашим наступлением на юг."
 LKT_focus_operation_charleston: "Операция \" Чарльстон \""
 LKT_focus_operation_charleston_desc: "От Миссисипи до Атлантики мы идем, чтобы обезопасить южный маршрут и соединиться от моря до сияющего моря."
 LKT_focus_operation_north_east_corridor: "Операция \" Северо - Восточный Коридор \""
 LKT_focus_operation_north_east_corridor_desc: "Последний этап на пути к возвращению мандата. Благодаря этому мы получим полный контроль над континентальной республикой и обеспечим нашу судьбу...неважно, что нам все еще нужно перестраиваться, но я отвлекся."
 LKT_focus_west_coast_cleanup: "Очистка Западного Побережья"
 LKT_focus_west_coast_cleanup_desc: "Теперь, когда нация под нашим контролем, мы можем сосредоточиться на очистке и восстановлении разрушенных войной земель. Лучшим подходом было бы начать с запада и продвигаться на восток."
 LKT_focus_south_central_rebuilding: "Восстановление Южного Централа"
 LKT_focus_south_central_rebuilding_desc: "Теперь, когда запад обеспечен, мы можем сосредоточиться на наших результатах, в данном случае на штатах, которые составляют западную половину новой республики. Консолидация этих территорий просто оставляет все, что осталось к востоку от Миссисипи, и это должно быть сделано в кратчайшие сроки."
 LKT_focus_mississippi_miracle: "Миссисипское чудо"
 LKT_focus_mississippi_miracle_desc: "Начинается поход на восток, и после форсирования Миссисипи мы сможем восстановить и интегрировать южные штаты в состав нового государства."
 LKT_focus_reviving_the_rustbelt: "Возрождение Ржавого пояса."
 LKT_focus_reviving_the_rustbelt_desc: "Восстановление и восстановление экономической стабильности в старых штатах ржавого пояса поможет интегрировать земли, а также людей на этих землях."
 LKT_focus_northeast_renewal: "Обновление на Северо - Востоке"
 LKT_focus_northeast_renewal_desc: "На последнем этапе интеграция этих последних государств обеспечит единство от тихого океана до атлантики."
 LKT_focus_the_second_republic: "Вторая Республика"
 LKT_focus_the_second_republic_desc: "Путь был долгим и трудным, но мир вернулся на эти земли, и на Североамериканском континенте вновь воцарилось единство. Остался лишь один последний шаг на пути к будущему, которое мы стремимся построить для себя сами."
 LKT_focus_Containment_Plan_West: "План сдерживания на Западе"
 LKT_focus_Containment_Plan_West_desc: "Экспансия имеет первостепенное значение для выживания в этом нестабильном и враждебном мире. Новый мир разрушен, и мы должны заявить о своих правах на его часть. Кембрийский план или План сдерживания в Западном направлении будет направлен на то, чтобы укрепить наш контроль над всем, что находится к западу от Миссисипи. Это должно позволить нам укрепить и создать новое и более стабильное чувство безопасности для нашего народа."
 LKT_focus_war_plan_purple: "План войны Фиолетовый"
 LKT_focus_war_plan_purple_desc: "Одним из наших первых шагов по обеспечению безопасности западной части Североамериканского континента станет защита нашего фланга. Таким образом, Каскадия станет частью наших тихоокеанских владений."
 LKT_focus_war_plan_skorpion: "Военный план Скорпиона"
 LKT_focus_war_plan_skorpion_desc: "Обеспечение безопасности богатого энергоресурсами региона юго-западных штатов поможет повысить нашу экономическую стабильность, а также обеспечить значительное преимущество перед нашими западными конкурентами."
 LKT_focus_war_plan_yellow: "План войны Желтого цвета"
 LKT_focus_war_plan_yellow_desc: "Обеспечение безопасности тихоокеанского побережья означает, что мы обеспечили безопасность примерно половины западных земель. Мы будем продолжать заявлять о своем будущем и укреплять основы для нашего нового пути вперед."
 LKT_focus_war_plan_blue: "План войны Синий"
 LKT_focus_war_plan_blue_desc: "Техас - это предпоследняя часть западной головоломки, которую мы пытаемся собрать. Оклахома была бы заключительной частью, однако мы не уверены точно, что за собой повлечет пересечение Миссисипи с политической точки зрения, и поэтому мы можем отложить эти дебаты на другой раз."
 LKT_focus_consolidating_the_territories: "Консолидация территорий"
 LKT_focus_consolidating_the_territories_desc: "Поскольку запад теперь находится под нашим контролем, мы должны работать над интеграцией и формированием земель и людей в новую нацию."
 LKT_focus_pacific_pearls: "Тихоокеанский Жемчуг"
 LKT_focus_pacific_pearls_desc: "Работа по интеграции и восстановлению тихоокеанских штатов поможет нашей стране снова открыть большую часть мира для торговли и туризма. Восстановление портов и туристических центров имеет решающее значение для продвижения вперед."
 LKT_focus_southern_sunrise: "Южный Восход солнца"
 LKT_focus_southern_sunrise_desc: "Восстановление богатого энергией юго-запада, а также экономически обеспеченного штата Техас придаст нашей стране столь необходимый импульс стабильности и процветанию."
 LKT_focus_the_western_identity: "Западная идентичность"
 LKT_focus_the_western_identity_desc: "С этими землями, которые мы объединили, мы заявляем, что новая нация, новый народ и новая культура движутся вперед."
 LKT_focus_The_Great_Barrier_Plan: "План Великого Барьера"
 LKT_focus_The_Great_Barrier_Plan_desc: "По сути, никто не должен иметь прямого контроля над такой обширной территорией. Поэтому мы должны это изменить и обеспечить стабильность на североамериканском континенте. Если мы сможем объединить силы и заручиться поддержкой востока и запада, то сможем создать что-то вроде Североамериканского конфедеративного союза... возможно, ему нужно другое название."
 LKT_focus_vegas_odds: "Коэффициенты в Вегасе"
 LKT_focus_vegas_odds_desc: "Земли союза нам не нужны полностью, и поэтому мы используем это в наших интересах, приобретая их для будущего, к которому мы стремимся."
 LKT_focus_texas_tussle: "Техасская Драка"
 LKT_focus_texas_tussle_desc: "Формирование Великого барьера будет направлено на обеспечение безопасности центральных штатов примерно в географическом центре Североамериканского континента. Этот первый шаг в отношениях с Техасом поможет подготовить почву для новых вторжений с юга."
 LKT_focus_western_consolidation: "Западная Консолидация"
 LKT_focus_western_consolidation_desc: "Консолидация марионеточной территории, которая нам приказывает, позволяет добиться более равного разделения территории. Таким образом, мы придаем больше стимула нашей новой марионетке, когда будем искать тихоокеанское побережье."
 LKT_focus_the_great_war: "Великая война"
 LKT_focus_the_great_war_desc: "Великая континентальная война начнется, когда мы захватим территории Южной Республики в Персидском заливе. Хотя нам, конечно, не нужны южные штаты, их неспособность отказаться от штата Оклахома означает, что у нас нет другого выбора. В качестве бонуса, помимо того факта, что мы также можем гарантировать, что ни одна восточная держава не поднимется настолько, чтобы бросить вызов как нам, так и югу."
 LKT_focus_eastern_consolidation: "Восточная Консолидация"
 LKT_focus_eastern_consolidation_desc: "Теперь, когда Великая континентальная война закончилась, мы можем интегрировать те центральные штаты, которые мы хотели, а также обеспечить южным штатам понимание того, что они не будут аннексированы сразу."
 LKT_focus_cartel_cleanup: "Ликвидация картеля"
 LKT_focus_cartel_cleanup_desc: "Южная часть плана \"Великий барьер\" заключается в захвате Мексики. Нет лучшего оправдания, чем очистить дом от безудержных картельных организаций, которые парализуют нацию."
 LKT_focus_reorganizing_mexican_territories: "Реорганизация Мексиканских территорий"
 LKT_focus_reorganizing_mexican_territories_desc: "Разделив территории Мексики, мы можем оказать благосклонность нашей западной марионетке, одновременно укрепляя нашу власть над текущим положением дел."
 LKT_focus_securing_the_western_coastline: "Обеспечение безопасности Западного побережья"
 LKT_focus_securing_the_western_coastline_desc: "Теперь, когда ближние западные штаты находятся под нашим контролем, а южный фронт в безопасности, мы можем смотреть на дальний запад с тихоокеанским побережьем. Обеспечение безопасности этих земель подготовит нас к последнему испытанию, стоящему перед нами."
 LKT_focus_dividing_up_the_west: "Разделение Запада"
 LKT_focus_dividing_up_the_west_desc: "Поскольку западные земли находятся под нашим контролем, теперь от нас зависит, как разумно разделить эти земли, чтобы способствовать единству и способности сотрудничать и двигаться вперед вместе."
 LKT_focus_improving_the_homefront: "Улучшение домашнего фронта"
 LKT_focus_improving_the_homefront_desc: "Консолидируя наши текущие достижения и работая над тем, чтобы сделать их более последовательными, мы закладываем основу для достижения нашей конечной цели в плане. Завоевание севера начнется в кратчайшие сроки, но как с этим бороться - это другой вопрос."
 LKT_focus_northern_investment_opportunity: "Северная ивестиционная возможность"
 LKT_focus_northern_investment_opportunity_desc: "Мы должны сотрудничать с Канадой, чтобы гарантировать, что наши страны смогут работать вместе, поскольку такие инвестиции в инфраструктуру через железные дороги лучше свяжут нас."
 LKT_focus_operation_polar_bear: "Операция \" Белый медведь \""
 LKT_focus_operation_polar_bear_desc: "Мы идем на север, чтобы обезопасить остальную часть нашего барьера и таким образом обеспечить будущее, которое мы хотим создать для себя."
 LKT_focus_the_northern_concessions: "Северные концессии"
 LKT_focus_the_northern_concessions_desc: "Обезопасив север, мы должны сейчас переделить земли и обеспечить стабильность на североамериканском континенте для грядущих поколений."
 LKT_focus_the_continental_confederation: "Континентальная конфедерация"
 LKT_focus_the_continental_confederation_desc: "Наши нации горды и едины, ибо новый мир увидел новое единство под бывшим знаменем лакота, и поэтому мы будем создавать вместе новое название для новой нации. Нация, которая стремится объединить народы, не земли, а народы под новой идентичностью, и когда они будут готовы, мы сформируем объединенную северную Америку."
 LKT_country_flag_elections: "Выборы начинаются"
 LKT_Canadian_War_Goal_Unlock: "Тогда это война"
 LKT_Prairie_Federation_desc: "[LKT.GetFlag]§YРеспублика Лакота§! меняет название на [LKT.GetFlag]§YФедерацию прерий§!"
 LKT_Free_Fields_Society_desc: "[LKT.GetFlag]§YРеспублика Лакота§! меняет название на [LKT.GetFlag]§YОбщество свободных полей§!"
 LKT_Grand_Duchy_Of_Yellowstone_desc: "[LKT.GetFlag]§YРеспублика Лакота§! меняет название на [LKT.GetFlag]§YВеликое герцогство Йеллоустоун§!"
 LKT_Second_American_Republic_desc: "[LKT.GetFlag]§YРеспублика Лакота§! меняет название на [LKT.GetFlag]§YВторую Американскую республику§!"
 LKT_Cambrian_Nation_desc: "[LKT.GetFlag]§YРеспублика Лакота§! меняет название на [LKT.GetFlag]§YКамбрия§!"
 LKT_Continental_Confederation_desc: "[LKT.GetFlag]§YРеспублика Лакота§! меняет название на [LKT.GetFlag]§YКонтинентальную конфедерацию§!"
 LKT_divided_we_fell: "Разделенные, мы пали"
 LKT_divided_we_fell_desc: "Пепел осел, и хотя мы разбиты, мы не побеждены этим внезапным и беспрецедентным событием, которое с нами произошло. Нам нужно идти вперед и начать стоять на своих собственных ногах."
 LKT_federal_budgets: "Национальные бюджеты"
 LKT_federal_budgets_desc: "Если мы хотим добиться чего-то значимого, то мы должны оценить наши бюджеты и привести их в соответствие с нашими потребностями. Исправьте то, что выходит из строя, и расширьте то, что работает, сейчас, если только это будет так просто."
 LKT_domestic_policies: "Управление внутренних дел Лакотана"
 LKT_domestic_policies_desc: "LDAA - это специальная ветвь власти, ответственная за оценку политики и законов, принятых национальным правительством, и за их внедрение в жизнь самой нации в целом. Короче говоря, хотите знать, что происходит с людьми, тогда загляните в LDAA."
 LKT_industrial_policies: "Министерство торговли и экономической деятельности"
 LKT_industrial_policies_desc: "DCEA отвечает за управление и развитие национальной экономики. Регулирование, бизнес-гранты и так далее осуществляются администрацией для обеспечения достаточно сбалансированной и стабильной экономики."
 LKT_resource_management_policies: "Департамент природных ресурсов"
 LKT_resource_management_policies_desc: "ДНР отвечает за трудоустройство и управление нашими внутренними ресурсами, как человеческими, так и материальными."
 LKT_tax_policies: "Департамент доходов"
 LKT_tax_policies_desc: "DoR отвечает за сбор и обеспечение соблюдения требований по налогообложению доходов. Изменения в налоговом кодексе или торговых условиях означают, что департамент должен адаптировать граждан и торговые организации к тому, чтобы они платили причитающуюся им долю при участии в любых формах торговли или экономической деятельности."
 LKT_army_service_branch: "Республиканская армия Лакотана"
 LKT_army_service_branch_desc: "ЛРА - это главное подразделение вооруженных сил, которое защищает нашу нацию. В то время как небо над головой заполнено нашими летчиками, они ничего не значат, если те, кто находится на земле, ничего не могут поделать с присутствующими силами противника."
 LKT_air_force_service_branch: "Военно - воздушные силы Лакотана"
 LKT_air_force_service_branch_desc: "Военно-воздушные силы Великобритании несут ответственность за обеспечение безопасности в небе над нами, чтобы гарантировать, что наши наземные и военно-морские силы не будут подвергаться нападениям с воздуха противника."
 LKT_navy_service_branch: "Военно - морская служба Лакотана"
 LKT_navy_service_branch_desc: "Военно-морские силы — неоднозначная структура. Поскольку они задействованы только на крупных водных артериях, пролегающих по территории нашей страны, к ним относятся скорее как к шутке или как к более дешевому способу борьбы с безработицей."
 LKT_ideas_foreign_isolation_office: "Отдел изоляции иностранцев"
 LKT_ideas_foreign_isolation_office_desc: "На волне такого жестокого и, казалось бы, невозможного поворота событий сейчас находится наша нация...ну и нация. С распадом старой республики мы теперь формируем новую и более безопасную республику ставок. Использование названия лакота для обращения к коренным меньшинствам позволяет нам сохранить стабильность и сформировать совершенно новую идентичность. Однако с этой вновь обретенной надеждой многие с опаской относятся к нашим соседям, а также просто к иностранному вмешательству в целом. Именно эти настроения сохраняются в нашей стране, и именно поэтому некоторые в шутку называют Министерство иностранных дел \"Управлением внешней изоляции\", поскольку правительство не предпринимает никаких реальных дипломатических усилий."
 LKT_ideas_agrarian_fuel_economy: "Аграрная экономия топлива"
 LKT_ideas_agrarian_fuel_economy_desc: "Поскольку сельское хозяйство обеспечивает львиную долю производства в экономике, мы должны немедленно развивать и адаптировать к этому наш энергетический сектор. Инвестиции в исследования в области производства биотоплива и способы сокращения потребности в крупных инфраструктурных устройствах, несомненно, помогут оптимизировать и наилучшим образом удовлетворить наши потребности в энергии."
 LKT_ideas_a_new_green_deal: "Новый экологичный курс"
 LKT_ideas_a_new_green_deal_desc: "Являясь всеобъемлющим инвестиционным пакетом, NGD будет инвестировать в производство атомной энергии и сделает его настолько эффективным и практичным, насколько это позволят нам современные и потенциальные будущие прорывы. Небольшие заводы, центры переработки отработавших топливных стержней и многое другое, насколько нам позволит наука."
 LKT_ideas_well_rounded_energy_sector: "Всесторонне развитый энергетический сектор"
 LKT_ideas_well_rounded_energy_sector_desc: "Благодаря тому, что наше Министерство энергетики соответствует нашим национальным экономическим потребностям, мы теперь можем обеспечить стабильное и процветающее будущее."
 LKT_ideas_improved_rail_network: "Улучшенная железнодорожная сеть"
 LKT_ideas_improved_rail_network_desc: "Инвестируя в наши железные дороги, мы смогли улучшить транспортное сообщение внутри страны, а также усовершенствовать линии снабжения как для военных, так и для гражданских нужд."
 LKT_ideas_experimental_weapons_corp: "Корпус экспериментального оружия"
 LKT_ideas_experimental_weapons_corp_desc: "Нацеленный на создание наиболее гибких подразделений реагирования, EWC занимается исследованиями и разработками и полевыми испытаниями, чтобы гарантировать, что, когда армейскому подразделению понадобится помощь, оно получит ее по мере необходимости."
 LKT_ideas_lctp: "Программа обучения Корпуса материально-технического обеспечения"
 LKT_ideas_lctp_desc: "Программа LCT предназначена для того, чтобы открыть возможности найма для тех, кто, возможно, не является передовым материалом. Чтобы обеспечить стабильность и эффективность на переднем крае, наши цепочки поставок должны быть наилучшими, и поэтому мы позаботимся о том, чтобы они были именно такими."
 LKT_ideas_fighter_supremacy: "Превосходство бойца"
 LKT_ideas_fighter_supremacy_desc: "Уделяя приоритетное внимание разработке и развертыванию истребителей в наших военно-воздушных силах, мы готовим почву для создания чистого неба, защищенного от вражеских захватчиков."
 LKT_ideas_ground_support_supremacy: "Превосходство наземной поддержки"
 LKT_ideas_ground_support_supremacy_desc: "Отдавая приоритет самолетам поддержки gorund, мы можем гарантировать, что даже наши кратковременные потери в господстве в воздухе не должны препятствовать нашей способности наносить удары по наземным силам противника. Позволяя нашим линиям фронта стабилизироваться и помешать врагу разрушить наши земли."
 LKT_ideas_strategic_bomber_supremacy: "Превосходство стратегических бомбардировщиков"
 LKT_ideas_strategic_bomber_supremacy_desc: "Уделяя приоритетное внимание разработке и развертыванию стратегических бомбардировщиков, мы сокрушим волю и способность противника к борьбе. Промышленность и инфраструктура рухнут под ударами наших могучих бомбардировщиков."
 LKT_ideas_strategically_cheap: "Стратегически дешевая доктрина"
 LKT_ideas_strategically_cheap_desc: "Меньшие цели также означают, что их труднее поразить. Мы можем использовать наш опыт сплавов по реке и ограниченный опыт работы на побережье, чтобы разработать новую тактику нападения и отхода для наших военно-морских судов. Конечно, будут некоторые недостатки, но это не значит, что мы знаем лучше, так что мы должны учиться так или иначе."
 LKT_ideas_naval_command_structure: "Структура военно - морского командования"
 LKT_ideas_naval_command_structure_desc: "Создавая подлинную и организованную структуру военно-морского командования, мы еще больше укрепим наши усилия по созданию настоящего подразделения военно-морской службы."
 LKT_anarchist_asylum_experiement: "Эксперимент с анархистским убежищем"
 LKT_anarchist_asylum_experiement_desc: "Наши земли обширны и неразвиты, мы должны пообещать заполнить эти земли, привлекая людей повсюду, которые хотят стремиться к лучшему будущему."
 LKT_ideas_standardized_civil_services: "Стандартизированные гражданские службы"
 LKT_ideas_standardized_civil_services_desc: "Создание новой стандартной формы гражданского управления и общих государственных услуг позволяет нам пассивно интегрировать новые земли, которые мы приобрели. В качестве бонуса это также работает как разъяснительная работа с общественностью и дает больше подхода к вещам, основанного на сердце и разуме, чем простое принуждение людей к подчинению."
 LKT_ideas_the_second_american_republic: "Вторая Американская Республика"
 LKT_ideas_the_second_american_republic_desc: "Теперь, когда земли воссоединены и заявлен мандат, мы основываем на руинах старой 2-ю Американскую республику."
 LKT_ideas_cultivating_a_new_identity: "Культивирование Новой Идентичности"
 LKT_ideas_cultivating_a_new_identity_desc: "Земли к западу от Миссисипи находятся под нашим контролем, теперь мы должны работать над укреплением сердец и умов людей и вместе прокладывать новый путь вперед."
 LKT_ideas_securing_the_new_order: "Обеспечение Нового Порядка"
 LKT_ideas_securing_the_new_order_desc: "Реализация нашего плана «Великий барьер» продолжается, и именно с этим пониманием мы уделяем больше внимания внутренним вопросам, чтобы обеспечить стабильность существующего порядка. На североамериканском континенте воцарятся мир и процветание благодаря союзу народов, работающих вместе ради общей цели."
 LKT_collapse_event.1.t: "Не много, но как раз достаточно"
 LKT_collapse_event.1.d: "Когда буря проходит мимо нас и все начинает успокаиваться, мы должны теперь подумать о том, чтобы восстановить наши государства и реорганизоваться в новую нацию. Однако, поскольку с самого начала не было большого развития, это означает, что нам также нечего перестраивать. Таким образом, один из наших главных вопросов, который мы должны поставить перед народом, будет заключаться в том, какой экономики для нашей страны мы хотим. Как бы то ни было, это не так уж много, но в любом случае это честная работа."
 LKT_collapse_event.1.o1: "Что ж, полагаю, давайте приступим к работе"
 LKT_nation_name_event.1.t: "Новая нация"
 LKT_nation_name_event.1.d: "Поскольку местные жители такие маленькие, мы ни за что на свете не заботимся о том, чтобы сохранить предполагаемое \"безопасное с точки зрения географии и истории\" название лакота. Вместо этого мы станем Великими жителями Равнин новой Федерации Прерий."
 LKT_nation_name_event.1.o1: "Ибо эти земли — наши земли!"
 LKT_nation_name_event.2.t: "Свободная нация?"
 LKT_nation_name_event.2.d: "избранием общества многие задаются вопросом, действительно ли это та новая страница, к которой мы должны обратиться, чтобы одержать победу в нашем ближайшем будущем. В связи с этим возникла большая дискуссия, в которой мы, как нация, будем руководствоваться. С одной стороны, у нас есть те, кто хочет одержать верх под предлогом Общества Свободных полей. По сути, это примыкающая к анархизму обстановка, за которую нужно постоять самостоятельно. Другой - сохранение статус-кво и поиск лучших вариантов, если это возможно. Но чего хотят люди?"
 LKT_nation_name_event.2.o1: "Общество свободных полей!"
 LKT_nation_name_event.2.o2: "Может быть, еще слишком рано?"
 LKT_nation_name_event.3.t: "Королевская нация?"
 LKT_nation_name_event.3.d: "Шокирующим образом была избрана Палата представителей Йеллоустоуна. Партия обещает расширенные демократические средства для процесса голосования, а также базовое всеобщее избирательное право для обеспечения максимального участия граждан страны. Единственная разница заключается в том, что феодальные титулы будут присваиваться выборным должностям и, таким образом, в некотором смысле кардинально изменят смысл и этос самого правительства. Некоторые задаются вопросом, должны ли мы начать реальную трансформацию нации, чтобы соответствовать этому, или придерживаться прежнего курса."
 LKT_nation_name_event.3.o1: "Великим Герцогством мы станем!"
 LKT_nation_name_event.3.o2: "Может Быть, это слишком причудливо, чтобы быть практичным?"
 LKT_nation_name_event.4.t: "Основание Новой Республики"
 LKT_nation_name_event.4.d: "Поскольку нация находится на пороге восстановления, мы должны укрепить наш мандат созданием 2-й Американской Республики. Из пепла старого восходит новый путь вперед."
 LKT_nation_name_event.4.o1: "Аве, Новая Республика!"
 LKT_nation_name_event.5.t: "Западная идентичность"
 LKT_nation_name_event.5.d: "Западные земли находятся под одним знаменем, и именно с его помощью мы провозглашаем новую нацию. Камбрия. В связи с вечным ориентиром, который определяет значительную часть наших земель, - хребтом Скалистых гор. С окаменелостями кембрийской эпохи, найденными повсюду, мы используем это как основной элемент, чтобы показать, что мы граждане Кембрии. Мы будем защищать и лелеять эти земли и наши народы до скончания веков."
 LKT_nation_name_event.5.o1: "Слава Камбрии!!!"
 LKT_event.10.t: "\"Взаимные инвестиции\""
 LKT_event.10.d: "Канада развита только там, где это необходимо, мы могли бы \"помочь им\", инвестируя во взаимное железнодорожное сообщение, чтобы повысить ценность торговли и транспорта для наших стран. Если они принимают, то нет никаких проблем, если они отрицают...что ж, тогда у нас проблема."
 LKT_event.10.o1: "Будем надеяться, что они согласятся"
 LKT_event.11.t: "Инвестиционное предложение"
 LKT_event.11.d: "Республика Лакота обратилась к нам с интересным предложением. Они хотят построить железную дорогу от Дакоты до магистрали в Реджайне, Саскачеван, а также в Виннепеге, Манитоба. Это помогло бы в торговых сделках, туризме и просто в общем сотрудничестве между нашими двумя странами. На самом деле мы не видим в этом проблемы, но некоторые в парламенте рассматривают это как ложный предлог в связи с недавними событиями, произошедшими в республике в последнее время. Итак, каков же наш ответ?"
 LKT_event.11.o1: "Одобрить сделку"
 LKT_event.11.o2: "Пожалуйста, откажитесь от Их предложения"
 LKT_event.111.t: "Сделка срывается"
 LKT_event.111.d: "Канадцы отклонили наше предложение, теперь нам нужно пересмотреть ситуацию, поскольку на данный момент другого выхода нет."
 LKT_event.111.o1: "Это барабаны, которые я слышу?"
 LKT_event.12.t: "Начинается строительство"
 LKT_event.12.d: "Сделка одобрена, и мы приступили к строительству, надеюсь, это удачный проект, который будет завершен к концу месяца."
 LKT_event.12.o1: "Всё по плану"
 LKT_event.13.t: "Неприятности на Великом Северном"
 LKT_event.13.d: "Команды проекта сообщают, что происходят странные происшествия. Несмотря на то, что проект почти завершен, поступали сообщения о пропавших членах экипажа и растущей враждебности наших людей к лакотанцам. Мы точно не знаем, что происходит, но подозреваем, что это как минимум нечестная игра."
 LKT_event.13.o1: "Мне не нравится это чувство..."
 LKT_event.14.t: "Жаждущие крови канадцы!?!"
 LKT_event.14.d: "Газеты и телеканалы кричат, что канадцы, жаждущие крови, убивают добрых трудящихся лакотанцев, поскольку нация возмущена слухами, распространяемыми в связи с недавним железнодорожным проектом между нами и канадским правительством. Если дела пойдут лучше, чем ожидалось, мы воспользуемся этим, чтобы спровоцировать войну, которую мы хотим, а не ту, которую мы могли бы развязать."
 LKT_event.14.o1: "Отправьте им наши требования!"
 LKT_event.15.t: "Ухудшающаяся ситуация"
 LKT_event.15.d: "Требования лакотанцев внезапно достигли правительства, они требуют компенсации за потерянные жизни лакотанцев в виде промышленных инвестиций, а также выплаты стоимости проекта. Общая сумма составляет примерно 35 миллиардов долларов, и многие канадцы возмущены обвинениями, выдвинутыми против их соотечественников. Таким образом, нам предстоит принять действительно трудное решение."
 LKT_event.15.o1: "Сохраните лицо и просто заплатите им"
 LKT_event.15.o2: "К черту это, мы им покажем"
 LKT_event.16.t: "Неожиданный исход"
 LKT_event.16.d: "Что ж, каким-то образом мы потерпели неудачу...успешно? Но это не тот реальный результат, которого мы хотели, и поэтому нам нужно подготовиться к плану Б."
 LKT_event.16.o1: "Организуйте войска"
 LKT_politics.1.t: "Начинается предвыборная кампания"
 LKT_politics.1.d: "По всей стране формируются политические партии, и люди начинают сплачиваться вокруг тех, кто, по их мнению, является следующим подходящим правящим политическим образованием для нации. Поскольку некоторые мелкие склоки также начинаются среди сторонников жесткой линии, многие с нетерпением ждут, куда пойдет нация дальше."
 LKT_politics.1.o1: "В любви и на войне всё справедливо"
 LKT_politics.2.t: "\"Совет авторитетных партий\""
 LKT_politics.2.d: "Во всей этой неразберихе и борьбе за голоса избирателей группа партий с несколько схожими стилями руководства выступила вперед, чтобы создать блок для голосования. Этот предполагаемый Совет власти - это то, что многие считают собранием партий, действующих подобно олигархиям. Хотя каждая сторона отвергает такую унизительную точку отсчета, некоторые участники не могут отрицать определенные аспекты обращения, которые произошли недавно. Как бы то ни было, люди сами должны проголосовать и решить, кого именно они хотят видеть во главе нации."
 LKT_politics.2.o1: "DDP побеждает!"
 LKT_politics.2.o2: "KCK побеждает!"
 LKT_politics.2.o3: "LTP Побеждает!"
 LKT_politics.2.o4: "AFL выигрывает?"
 LKT_politics.2.o5: "Это не может быть каждый, кто следующий"
 LKT_politics.3.t: "Вечеринки в честь традиций"
 LKT_politics.3.d: "По мере того, как ситуация продолжает накаляться, начал формироваться новый силовой блок, представляющий собой совокупность правых и правоцентристских партий, пытающихся сформировать избирательный блок. Сплочение вокруг общего интереса к сохранению новых и старых традиций, известных этим землям и их народам. Сторонники традиций верят, что перемены могут произойти, но они не должны отбрасывать прошлое ради этих перемен. Тем не менее, люди должны голосовать, голосовать и еще раз голосовать, чтобы обеспечить победу партии, которую они хотят возглавить нацию."
 LKT_politics.3.o1: "ОВП побеждает!"
 LKT_politics.3.o2: "TTP побеждает!"
 LKT_politics.3.o3: "LTSP побеждает!"
 LKT_politics.3.o4: "Конечно, есть и другие варианты. Подожди, посмотри туда"
 LKT_politics.4.t: "Партии простого народа за прогресс"
 LKT_politics.4.d: "Формирующийся социалистический экономический блок политических партий набирает обороты исключительно вопреки росту числа Новых национальных партий Лакотана. Эта предполагаемая дихотомия \"левые - правые\" означает, что политика страны еще больше раскалывается на все новые и новые фракции. Но когда начинается голосование и люди хотят сделать свой шаг вперед с тем, что, по их мнению, является правильным для нации, многие задаются вопросом, кто именно станет первой правящей партией молодой нации."
 LKT_politics.4.o1: "FPP берет на себя инициативу"
 LKT_politics.4.o2: "FRF шея и затылок с LASS"
 LKT_politics.4.o3: "RBP шея и затылок с RRA"
 LKT_politics.4.o4: "Ты сказал, что это еще не все?!"
 LKT_politics.5.t: "Новые граждане Лакотана, Партии"
 LKT_politics.5.d: "Новые граждане Лакотана - растущее националистическое движение партий, стремящихся больше сосредоточиться на изоляции и сохранении новой идентичности, чем на большинстве других вещей. Многие в стране скептически относятся к тому, что это означало бы для различных групп меньшинств, но большинство также считает, что взаимосвязанная природа земного шара - это то, что привело к великому краху старой республики. Хотя некоторые могут проголосовать за новый блок партий просто назло растущим социалистическим экономическим партиям, которые, кажется, более естественным образом выросли из ограниченного или вообще неразвитого освоения земель страны."
 LKT_politics.5.o1: "ИП побеждает!"
 LKT_politics.5.o2: "CDS Связывает Гонку С LGF"
 LKT_politics.5.o3: "Заведение всегда выигрывает?"
 LKT_politics.5.o4: "Это время перемотки назад"
 LKT_focus_metallic_bloodlines_act: "Закон о металлических родословных"
 LKT_focus_metallic_bloodlines_act_desc: "Программа MBA - это пакет финансирования, направленный на то, чтобы дать толчок развитию и обеспечить способность нашей страны обеспечивать внутренние поставки чугуна и стали. Сталь, в частности, является второй опорой экономики после рабочей силы и бетона."
 LKT_focus_metallic_masters: "Металлические средства"
 LKT_focus_metallic_masters_desc: "Дальнейшие средства достижения нашей национальной независимости означают, что мы, к сожалению, должны копать глубоко и жадно. Таким образом, в штате Южная Дакота можно найти небольшое количество легких металлов, что должно позволить нам диверсифицировать наши экономические возможности."
 LKT_focus_bio_fuel_prominence: "Известность биотоплива"
 LKT_focus_bio_fuel_prominence_desc: "Благодаря целенаправленным и неустанным усилиям по разработке биотоплива и созданию условий, которые необходимо создать вокруг него, мы можем создать более эффективный и распространенный вид энергии. Это поможет снизить наши общие потребности, а также потенциальную стоимость использования земли и ресурсов, которые могут быть зарезервированы для удовлетворения лучших потребностей людей и нации в целом."