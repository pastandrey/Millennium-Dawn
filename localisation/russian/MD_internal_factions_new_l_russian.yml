l_russian:
 internal_factions_events.53.t: "Лояльность партии находится под пристальным вниманием"
 internal_factions_events.53.d: "Коммунистические кадры представили правительству список бюрократических чиновников, которых они считают идеологически ненадежными. Они требуют официального расследования лояльности и отстранения от должности тех, кто не соответствует стандартам партии."
 internal_factions_events.53.o1: "Проведите чистку"
 internal_factions_events.53.o2: "Отказывайтесь от их требований"
 internal_factions_events.53.o3: "Запустите ограниченный обзор"
 internal_factions_events.54.t: "Кадры призывают к коллективизации"
 internal_factions_events.54.d: "Коммунистические кадры стали проявлять нетерпение к частным сельскохозяйственным холдингам. Они подталкивают правительство к началу кампании коллективизации, консолидации сельскохозяйственных угодий под контролем государства для повышения эффективности и идеологического соответствия."
 internal_factions_events.54.o1: "Поддержите коллективизацию"
 internal_factions_events.54.o2: "Отклонить предложение"
 internal_factions_events.54.o3: "Проводить ограниченную земельную реформу"
 internal_factions_events.55.t: "Промышленность требует расширения портов"
 internal_factions_events.55.d: "Морская индустрия представила предложение о расширении портовых сооружений вдоль побережья, утверждая, что перегруженность обходится им в миллионы долларов ежегодно. Местные землевладельцы и градостроители выступили с возражениями, сославшись на проблемы с перемещением населения и разрушение городов."
 internal_factions_events.55.o1: "Одобрить расширение"
 internal_factions_events.55.o2: "Отклонить предложение"
 internal_factions_events.55.o3: "Договаривайтесь о компромиссе"
 internal_factions_events.56.t: "Пиратство нарушает судоходные маршруты"
 internal_factions_events.56.d: "Всплеск пиратства поставил под угрозу наши коммерческие судоходные пути. Представители морской отрасли требуют вмешательства правительства для защиты своих судов и грузов, предупреждая, что бездействие приведет к увеличению расходов на страхование и сдерживанию инвестиций."
 internal_factions_events.56.o1: "Финансировать программу военно-морского сопровождения"
 internal_factions_events.56.o2: "Игнорируйте проблему"
 internal_factions_events.56.o3: "Стремиться к международному сотрудничеству"
 internal_factions_events.57.t: "Раскрыта иностранная шпионская сеть"
 internal_factions_events.57.d: "Аналитики разведки выявили иностранную шпионскую сеть, действующую в пределах наших границ. Разведывательное сообщество настаивает на том, чтобы правительство действовало решительно, прежде чем сеть добудет еще какую-либо секретную информацию."
 internal_factions_events.57.o1: "Выставлять сеть на всеобщее обозрение"
 internal_factions_events.57.o2: "Нейтрализуйте это тихо"
 internal_factions_events.57.o3: "Не предпринимайте никаких действий"
 internal_factions_events.58.t: "Законодательный орган ставит под сомнение расходы на разведку"
 internal_factions_events.58.d: "В преддверии следующего избирательного цикла члены законодательного органа подняли острые вопросы о непрозрачном бюджете разведывательных служб. Правозащитные группы призывают к большей подотчетности, в то время как Разведывательное сообщество предупреждает, что прозрачность поставит под угрозу текущие операции."
 internal_factions_events.58.o1: "Защитите бюджет в полном объеме"
 internal_factions_events.58.o2: "Разглашать частичную информацию"
 internal_factions_events.58.o3: "Стремитесь к полной прозрачности"
 internal_factions_events.59.t: "Иностранные боевики пересекают границу"
 internal_factions_events.59.d: "Волна иностранных боевиков вторглась на нашу территорию, привлеченная продолжающимся конфликтом. Они предлагают свои услуги нашему делу, хотя их надежность и дисциплина остаются сомнительными. Иностранные джихадистские сети призывают правительство найти им подходящую роль."
 internal_factions_events.59.o1: "Объедините их в обычные подразделения"
 internal_factions_events.59.o2: "Немедленно выдвигайте их на фронт"
 internal_factions_events.59.o3: "Прогоните их на границе"
 internal_factions_events.60.t: "Бригады джихада требуют автономии"
 internal_factions_events.60.d: "Ободренные своей растущей численностью, иностранные бригады джихада требуют официального признания в качестве автономной силы, действующей под их собственной командной структурой. Они утверждают, что оперативная независимость позволит им действовать более эффективно без бюрократического вмешательства."
 internal_factions_events.60.o1: "Предоставьте им оперативную автономию"
 internal_factions_events.60.o2: "Отклонить запрос"
 internal_factions_events.60.o3: "Интегрировать их в национальное командование"
 internal_factions_events.61.t: "Силы Кудс ищут больше ресурсов"
 internal_factions_events.61.d: "Руководство Сил Кудс подало официальный запрос на дополнительное финансирование и материальные средства для расширения своих региональных операций по доверенности. Они утверждают, что стратегическая возможность появилась именно сейчас и что недофинансирование чревато потерей влияния конкурирующих держав."
 internal_factions_events.61.o1: "Обеспечить полное финансирование"
 internal_factions_events.61.o2: "Предложите частичную поддержку"
 internal_factions_events.61.o3: "Отклонить запрос"
 internal_factions_events.62.t: "Уязвимость соседа"
 internal_factions_events.62.d: "Разведка сил Кудс сообщает, что соседнее государство, в настоящее время втянутое в конфликт, уязвимо для давления со стороны посредников. Окно возможностей невелико, но потенциальные стратегические выгоды значительны."
 internal_factions_events.62.o1: "Воспользуйся ситуацией"
 internal_factions_events.62.o2: "Делитесь разведданными с объединенными государствами"
 internal_factions_events.62.o3: "Упусти эту возможность"
 establish_political_commissars_decision: "Внедрять Политических комиссар"
 establish_political_commissars_decision_desc: "Разместите партийных комиссаров в воинских частях для обеспечения идеологической лояльности и повышения морального духа. Комиссары будут подчиняться непосредственно коммунистическим кадрам, укрепляя их влияние на вооруженные силы."
 worker_reeducation_programme_decision: "Программа переподготовки работников"
 worker_reeducation_programme_decision_desc: "Профинансируйте государственную программу перевоспитания для укрепления партийной идеологии среди рабочей силы. Соблюдение требований растет, а потребительский спрос падает по мере того, как работники перенаправляют усилия на государственные приоритеты."
 maritime_safety_inspections_decision: "Обязательные проверки безопасности на море"
 maritime_safety_inspections_decision_desc: "Ввести комплексный режим проверки безопасности на всех отечественных портовых и верфевых объектах. Повышение стандартов успокаивает отрасль и повышает производительность верфей в течение периода проверки."
 naval_shipping_subsidy_decision: "Субсидия на морское судоходство"
 naval_shipping_subsidy_decision_desc: "Предоставлять прямые государственные субсидии отечественным операторам дальнемагистральных перевозок. Программа расширяет диапазон эксплуатации нашего торгового флота и повышает пропускную способность верфей."
 counter_intelligence_sweep_decision: "Контрразведывательная зачистка"
 counter_intelligence_sweep_decision_desc: "Уполномочить Разведывательное сообщество проводить систематическую зачистку правительственных и военных сетей на предмет иностранного проникновения. Расходы на иностранный шпионаж снижаются, а безопасность наших коммуникаций повышается в ходе операции."
 expand_intelligence_network_decision: "Расширять разведывательные сети"
 expand_intelligence_network_decision_desc: "Финансируйте создание новых зарубежных разведывательных станций и кадровых разведывательных ресурсов. Расширенная сеть повышает нашу способность расшифровывать сообщения противника и отслеживать передвижения иностранных военных."
 jihadi_recruitment_drive_decision: "Стремление к вербовке джихадистов"
 jihadi_recruitment_drive_decision_desc: "Спонсируйте активную вербовочную кампанию в сетях сочувствующих, чтобы привлечь иностранных боевиков к нашему делу. Поступает дополнительная рабочая сила, и потенциал наших сил специального назначения растет."
 martyr_glorification_campaign_decision: "Кампания по прославлению Мучеников"
 martyr_glorification_campaign_decision_desc: "Запустите пропагандистскую кампанию, прославляющую павших бойцов и возвеличивающую мученичество как культурный идеал. Военный пыл резко возрастает, хотя радикализирующее послание рискует разжечь экстремистские настроения."
 support_proxy_networks_decision: "Поддержка прокси-сетей"
 support_proxy_networks_decision_desc: "Направляйте средства и оборудование через силы \"Кудс\" региональным прокси-группам, действующим в соседних государствах. Укрепление этих сетей расширяет наш стратегический охват и снижает прямые затраты на поддержание давления на конкурентов."
 quds_force_training_programme_decision: "Программа подготовки Сил Кудс"
 quds_force_training_programme_decision_desc: "Разрешите силам Кудс провести расширенную нерегулярную военную подготовку для избранных воинских подразделений. Улучшаются навыки ведения нетрадиционной войны и расширяются возможности сил специального назначения."
 internal_factions_events.63.t: "Подрядчики лоббируют экспортные сделки"
 internal_factions_events.63.d: "Оборонные подрядчики оказывают давление на правительство, чтобы оно оказало поддержку ряду зарубежных контрактов на экспорт оружия. Они утверждают, что сделки принесут значительный доход и поддержат отечественные производственные линии, но критики предупреждают, что широкие продажи могут усилить региональную напряженность и привлечь нежелательное международное внимание."
 internal_factions_events.63.o1: "Утвердить полный экспорт"
 internal_factions_events.63.o2: "Ограничьте продажи смежным покупателям"
 internal_factions_events.63.o3: "Отвергните усилия по лоббированию"
 defense_procurement_programme_decision: "Программа оборонных закупок"
 defense_procurement_programme_decision_desc: "Запустите специальный цикл закупок, гарантирующий стабильные заказы для отечественных производителей оружия. Долгосрочные контракты увеличивают налоговые поступления в военную промышленность и снижают нагрузку на потребительские товары, вознаграждая оборонную промышленность за ее постоянное сотрудничество."
 classified_research_programme_decision: "Секретная исследовательская программа"
 classified_research_programme_decision_desc: "Выделите секретное финансирование на исследования в области военных технологий, проводимые через партнеров оборонной промышленности. Инвестиции ускоряют результаты исследований и повышают безопасность коммуникаций, а финансовый перевод осуществляется при запуске программы."
 issue_government_bonds_decision: "Выпуск государственных облигаций, обеспеченных банком"
 issue_government_bonds_decision_desc: "Разрешить выпуск государственных облигаций, обеспеченных банком, через международные банковские сети. Немедленное поступление капитала повышает стабильность, однако обслуживание долга в течение срока его действия слегка повышает процентные ставки."
 attract_foreign_investment_decision: "Привлечение иностранных инвестиций"
 attract_foreign_investment_decision_desc: "Координируйте свои действия с международными банковскими контактами, чтобы сигнализировать о стабильности и снижать барьеры для входа. Кампания сокращает время, необходимое для получения иностранных инвестиций, и увеличивает налоговые поступления от притока капитала."
 internal_factions_cadre_purge: "Кадровая чистка"
 internal_factions_cadre_purge_desc: "Партийные комиссары проводят проверки лояльности во всем бюрократическом аппарате, укрепляя идеологическую дисциплину ценой административных сбоев."
 internal_factions_collectivisation_drive: "Стремление к коллективизации"
 internal_factions_collectivisation_drive_desc: "Идет коллективизация сельского хозяйства, нарушающая цепочки поставок и увеличивающая дефицит потребительских товаров по мере того, как частные фермы переходят под государственный контроль."
 internal_factions_convoy_escort: "Программа Военно-Морского сопровождения"
 internal_factions_convoy_escort_desc: "Военно-морские эскорты, финансируемые правительством, защищают коммерческие судоходные пути, повышая уверенность и опыт нашего военно-морского персонала."
 internal_factions_piracy_losses: "Нарушение правил пиратства"
 internal_factions_piracy_losses_desc: "Неконтролируемое пиратство нарушает работу наших морских путей, подрывает доверие к торговле и дестабилизирует экономику в целом."
 internal_factions_neutralised_spies: "Шпионская сеть ликвидирована"
 internal_factions_neutralised_spies_desc: "Иностранная разведывательная сеть была незаметно нейтрализована, что на некоторое время улучшило наши возможности в области контрразведки."
 internal_factions_transparency_costs: "Затраты на прозрачность разведывательной деятельности"
 internal_factions_transparency_costs_desc: "Публичное раскрытие разведывательных операций ослабило нашу систему шифрования, поскольку злоумышленники приспосабливаются к новым методам."
 internal_factions_jihadi_frontline: "Развертывание джихадистов на передовой"
 internal_factions_jihadi_frontline_desc: "Иностранные боевики, переброшенные непосредственно на передовую, агрессивно наступают на позиции противника, хотя отсутствие у них взаимодействия с регулярными силами оставляет незащищенными фланги."
 internal_factions_jihadi_autonomy: "Автономная сила Джихада"
 internal_factions_jihadi_autonomy_desc: "Признанные автономные бригады джихада действуют под своим собственным командованием, что значительно расширяет возможности нашего спецназа."
 internal_factions_jihadi_integrated: "Объединенные силы джихада"
 internal_factions_jihadi_integrated_desc: "Иностранные бойцы, официально интегрированные в национальную командную структуру, улучшили сплоченность подразделений и темпы организационного восстановления."
 internal_factions_quds_expanded: "Расширенные операции Сил Кудс"
 internal_factions_quds_expanded_desc: "Дополнительные ресурсы позволили Силам Кудса расширить свои опосредованные операции, снизив расходы на содержание иностранной подрывной деятельности."
 internal_factions_quds_operation: "Стратегическая операция Сил Кудс"
 internal_factions_quds_operation_desc: "Силы Кудса активно используют нестабильность в соседнем государстве, обеспечивая тактическое преимущество в текущих операциях."
 fund_religious_schools_decision: "Финансировать религиозные школы"
 fund_religious_schools_decision_desc: "Направьте государственное финансирование в сеть религиозных школ, действующих под надзором ваххабитских улемов. Уровень грамотности повышается, а социальная стабильность повышается по мере расширения охвата учреждений."
 enforce_moral_codes_decision: "Насаждать моральные кодексы"
 enforce_moral_codes_decision_desc: "Наделить религиозные власти полномочиями по обеспечению соблюдения общественных моральных стандартов по всей стране. Эта мера укрепляет влияние улемов и повышает социальную сплоченность, хотя более жесткие ограничения подталкивают потребительские расходы к росту."
 agricultural_subsidies_decision: "Сельскохозяйственные субсидии"
 agricultural_subsidies_decision_desc: "Предоставьте прямые субсидии сельскохозяйственному сектору для увеличения производства и вознаградите фермерскую фракцию за их сотрудничество. Первоначальные расходы сокращают резервы казначейства, но рост производительности поддерживает экономику благодаря этой программе."
 rural_infrastructure_fund_decision: "Фонд Сельской инфраструктуры"
 rural_infrastructure_fund_decision_desc: "Выделите государственные средства на улучшение дорог, ирригации и хранилищ в сельской местности. Инвестиции облегчают трудовую нагрузку на сельскохозяйственные районы и завоевывают расположение фермерских сообществ."
 infrastructure_investment_programme_decision: "Программа инвестиций в инфраструктуру"
 infrastructure_investment_programme_decision_desc: "Сотрудничайте с крупными промышленными конгломератами для финансирования масштабной модернизации инфраструктуры производственной базы страны. Объем производства на заводах и в офисах растет в течение всего срока действия программы, укрепляя роль конгломератов как опоры экономики."