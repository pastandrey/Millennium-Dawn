 independence_request_tt: "[ROOT.GetNameWithFlag] направит запрос в [?prev_owner.GetNameWithFlag] в виде мероприятия. Если [?prev_owner.GetNameWithFlag] ответит положительно, то призовет все страны поддержать независимость [ROOT.GetNameWithFlag], что значительно повысит шансы на успех следующей попытки §BООН§! §YВознесения§!.\n\n Шансы на успех очень малы, но их можно повысить, значительно улучшив отношения с [?prev_owner.GetNameWithFlag]."
