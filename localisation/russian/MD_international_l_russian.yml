 ct_has_failed_recent_infil_against: "Недавно не удалось предотвратить попытку проникновения в [name_of_org_disp]."
 is_ct_does_not_have_advisors: "[?selected_ct_nation.GetName] у нас нет советников по борьбе с терроризмом [?ROOT.GetName]"
 is_ct_does_have_advisors: "[?selected_ct_nation.GetName] имеет в штате консультантов по борьбе с терроризмом из [?ROOT.GetName]"
 is_ct_send_advisors_too: "Отправьте также советников по борьбе с терроризмом [?selected_ct_nation.GetName]. Им придется принять наших советников, чтобы они начали действовать."
