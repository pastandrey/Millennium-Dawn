 IS_sec_con_button_text: "§YСовет Безопасности§!"
 IS_sec_con_button_text_tt: "Открывает экран §YСовета Безопасности§!. Здесь §BООН§! может §Rвводить санкции§!, §Rразрешать применение военной силы§! и §Gпытаться разрешать конфликты§!"
