 recog_cat_nation_guide_tt: "Как непризнанное государство, мы должны стремиться к тому, чтобы §CООН§! признала нас независимым государством. Работая с союзниками, подавая петиции в §CООН§! и используя другие политические манёвры, мы в конечном итоге сможем получить поддержку, необходимую для §YВозвышения§!."
