 threat_level_severe_loc: "§OСерьезный§!"
 threat_level_critical_loc: "§RКритический§!"
 recent_pressure_tt: "Разве в последнее время не оказывалось давление на страны, чтобы они признали другую нацию!"
 mor_promote_tt: "§YНеобходимые условия:§!\n[!mor_promote_tolerant_islam_button_click_enabled]\n§YЭффекты:§!\n[!mor_promote_tolerant_islam_button_click]"
 oma_promote_tt: "§YНеобходимые условия:§!\n[!oma_promote_tolerant_islam_button_click_enabled]\n§YЭффекты:§!\n[!oma_promote_tolerant_islam_button_click]"
 ct_derad_tt: "§YТребования:§!\n[!ct_fund_deradicalisation_programs_button_click_enabled]\n\nЧем выше ваш §Yсоциальный бюджет§!, тем эффективнее будут §Yпрограммы по дерерадикализации§!.\n§YЭффекты:§!\n[!ct_fund_deradicalisation_programs_button_click]"
 ct_train_tt: "§YТребования:§!\n[!ct_training_button_click_enabled]\n\n§YУровень антитеррористической подготовки§! (текущий: [?ct_training|Y2]) определяет вероятность успеха рейдов и авиаударов.\n§YУровень антитеррористической подготовки§! увеличивается в зависимости от количества иностранных советников (текущие иностранные советники: [?foreign_adivsors|Y0]) и действующего закона о подготовке офицеров.\n\nКаждый иностранный советник увеличивает §Yуровень антитеррористической подготовки§! на §G+0.25§! за одну тренировку (текущие иностранные советники: [?foreign_adivsors|Y0])\nКаждый §Yзакон о подготовке офицеров§! после §YOfficer Advanced Training§! увеличивает §Yуровень антитеррористической подготовки§! на §G+0.50§! за одну тренировку.\n\nПроведение тренировки увеличит наш §Yуровень антитеррористической подготовки§! на [?foreign_advisors_math|+G]\n\n§RУровень антитеррористической подготовки имеет максимум§! 10 §Rи снижается с скоростью§! 0.2 §Rв месяц.§!\n\n§YЭффекты:§!\n[!ct_training_button_click]"
 ct_raid_tt: "§YТребования:§!\n[!ct_raid_button_click_enabled]\n\nЕсли рейд §Gуспешен§!, §YTerror Threat§! уменьшится на §G-5§! (текущий уровень угрозы: [?threat_level|Y0]) и §YRadicalization§! увеличится на §R+2§! (текущий уровень радикализации: [?radicalization|Y0]).\nЕсли рейд §Rнеуспешен§!, §YTerror Threat§! не изменится, а §YRadicalization§! увеличится на §R+5§! (текущий уровень радикализации: [?radicalization|Y0]).\n§GИмеет более высокую вероятность успеха, чем авиаудары.§!\n\nБазовая вероятность успеха рейда §Y40%§!\nКаждый уровень §YCounter Terror Training§! увеличивает вероятность успеха на §G+5.00%§!\n(текущий уровень §YCounter Terror Training§!: [?ct_training|Y2])\n\n§YЭффекты:§!\n[!ct_raid_button_click]"
 ct_strike_tt: "§YТребования:§!\n[!ct_strike_button_click_enabled]\n\nЕсли авиаудар §Gуспешен§!, §YTerror Threat§! уменьшится на §G-5§! (текущий уровень угрозы: [?threat_level|Y0]) и §YRadicalization§! увеличится на §R+2§! (текущий уровень радикализации: [?radicalization|Y0]).\nЕсли авиаудар §Rнеуспешен§!, §YTerror Threat§! не изменится, а §YRadicalization§! увеличится на §R+5§! (текущий уровень радикализации: [?radicalization|Y0]).\n§RИмеет меньшую вероятность успеха, чем рейды.§!\n\nБазовая вероятность успеха авиаудара §Y25%§!\nКаждый уровень §YCounter Terror Training§! увеличивает вероятность успеха на §G+5.00%§!\n(текущий уровень §YCounter Terror Training§!: [?ct_training|Y2])\n\n§YЭффекты:§!\n[!ct_strike_button_click]"
