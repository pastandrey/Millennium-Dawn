 counter_terrorism_operations: "Контртеррористические операции"
 counter_terrorism_operations_desc: "Усилия наших стран по борьбе с терроризмом должны быть сосредоточены. Это может стоить личных свобод, финансов и даже жизней, но террористическая угроза должна быть остановлена."
 ct_not_has_done_recent_intel_op: "Подождите §Y[?recent_ct_intel_op:days_left|0Y] Дней§! до следующей операции по сбору."
 ct_not_has_done_recent_asset_seizure: "Подождите §Y[?recent_ct_asset_seizure:days_left|0Y] Дней§! до следующего ареста активов."
 no_recent_joint_exercises: "В последнее время не проводил §Yсовместных учений§! с этой страной."
 recent_ct_intel_op: "Недавно проведенная операция по сбору разведданных"
 CT_internet_monitoring: "Массовые протесты против сбора данных"
 CT_internat_monitoring_desc: "Наши граждане начали протестовать против наших усилий по их защите посредством массового сбора данных. Мы должны противостоять их гневу..."
 CT_protesting_arrests: "Протесты против арестов в связи с борьбой с терроризмом"
 CT_protesting_arrests_desc: "Наши граждане начали протестовать против использования нами массовых арестов для борьбы с террористическими угрозами. Мы должны улучшить качество нашей разведки, чтобы предотвратить подобные протесты в будущем."
 CT_struck_by_terror_attack: "Пострадавший от террористического акта"
 CT_struck_by_terror_attack_desc: "Наша нация подверглась террористическому акту, совершенному международной террористической организацией. Нам потребуется время, чтобы оправиться от этого жестокого нападения, как с военной, так и с экономической точки зрения."
 CT_terror_attack_happened: "Произошла глобальная террористическая атака"
 CT_terror_attack_happened_desc: "Наши граждане боятся, что они могут стать следующими, если террористические атаки по всему миру будут продолжаться. Мы должны предпринять меры для обеспечения их безопасности."
 CT_terror_attack_prevented: "Террористическая атака предотвращена"
 CT_terror_attack_prevented_desc: "Наши разведывательные и антитеррористические силы недавно предотвратили террористическую атаку на нашу страну, укрепив доверие граждан к нашей способности их защищать!"
 MD_terror.1.t: "[org_doing_attack] Проводит теракт!"
 MD_terror.1.d: "[org_doing_attack] Сегодня на нас было совершено террористическое нападение, которое не смогли предотвратить наши разведывательные и контртеррористические службы. Поступающие сообщения о разрушениях и жертвах все еще уточняются, но, по предварительным данным, ущерб и число пострадавших значительны. Теперь мы должны принять решение о дальнейших действиях, чтобы обеспечить безопасность наших граждан в этот кризисный период."
 MD_terror.1.a: "Нам нужно допустить появление локальных ответов."
 MD_terror.1.b: "Пришлите столько помощи, сколько мы сможем!"
 MD_terror.2.t: "[org_doing_attack] Теракт предотвращен!"
 MD_terror.2.d: "[org_doing_attack] Сегодня они попытались совершить террористическую атаку, но она была предотвращена благодаря эффективной работе наших спецслужб по сбору разведданных и смелым действиям наших контртеррористических групп. Все причастные к теракту террористы либо убиты, либо взяты в плен, а их убежища в настоящее время проверяются на предмет наличия дополнительной информации. Сегодняшний день стал большим успехом наших контртеррористических сил!"
 MD_terror.2.a: "Великая победа для [THIS.GetNameDef]!"
 MD_terror.3.t: "[FROM.GetName] Подверглись террористической атаке!"
 MD_terror.3.d: "[FROM.GetName] Сегодня мы подверглись нападению со стороны [org_doing_attack_int], которым удалось нанести значительный ущерб и привести к многочисленным жертвам в нашей стране.  Пока [FROM.GetName] приходит в себя после нападения, наши граждане начинают беспокоиться о возможности атак на нашей территории.  Мы должны решить, стоит ли оказывать поддержку [FROM.GetName], и что мы можем сделать, чтобы успокоить наших граждан."
 MD_terror.3.a: "Какая трагедия."
 MD_terror.3.b: "Мы должны усилить нашу собственную безопасность!"
 MD_terror.4.t: "[FROM.GetName] Предотвращен Теракт!"
 MD_terror.4.d: "Правительство [FROM.GetName] объявило сегодня, что оно успешно предотвратило террористическую атаку со стороны [org_doing_attack_int] на территории своей страны, проведя эффективную разведывательную, полицейскую и военную операцию по ликвидации террористической ячейки до совершения теракта.  Этот успех — большое достижение в глобальной войне с терроризмом!"
 MD_terror.4.a: "[FROM.GetNameDef] явно был подготовлен."
 MD_terror.5.t: "Протесты по поводу массового сбора данных"
 MD_terror.5.d: "Из-за утечек в нашем разведывательном сообществе общественности стало известно о нашем массовом сборе данных в рамках наших усилий по предотвращению терроризма. Люди, однако, восприняли это как массовое вторжение в частную жизнь и начали критиковать и протестовать против того, что они считают злоупотреблением правительства."
 MD_terror.5.a: "Это для их же блага!"
 MD_terror.6.t: "Протесты по поводу массовых арестов"
 MD_terror.6.d: "Несмотря на то, что наши массовые аресты [name_of_org_disp] сторонников группировки привели к срыву их операций, мы также случайно арестовали большое количество ни в чем не повинных гражданских лиц и случайных прохожих просто из-за некачественной разведки.  В результате общественность недовольна нашими контртеррористическими операциями и начинает протестовать против массовых арестов и других радикальных методов, которые мы вынуждены использовать для обеспечения безопасности нашей страны."
 MD_terror.6.a: "Разве извинений недостаточно?"
 MD_terror.7.t: "Успешное проникновение!"
 MD_terror.7.d: "Наш агент, наконец, отчитался: он успешно на месте и сейчас находится внутри организации. Это может занять некоторое время, но по мере продвижения наших операций разведданные, которые они смогут нам передать, будут очень полезны для нашей страны."
 MD_terror.7.a: "Его информация будет иметь огромную ценность!"
 MD_terror.8.t: "Агент убит"
 MD_terror.8.d: "К сожалению, после того как наш агент некоторое время не выходил на связь, мы наконец узнали, в чем дело. Сегодня [name_of_org_disp] опубликовали видео, на котором видно, как они казнят нашего агента и еще нескольких человек. Очевидно, что его вычислили или поймали, и теперь любая информация, которую мы получали от него раньше или собираем сейчас, имеет меньшую ценность, поскольку они знают, что мы его ищем."
 MD_terror.8.a: "Какая потеря"
 MD_terror.9.t: "Гнев по поводу усиления мер безопасности"
 MD_terror.9.d: "Граждане были расстроены введенными нами повышенными мерами безопасности, которые осложнили воздушные, морские и сухопутные поездки на общественном транспорте. Они также расстроены повышенным уровнем безопасности на правительственных мероприятиях, которые создают напряженность в наших отношениях с нашими гражданами."
 MD_terror.9.a: "Принятые меры должны оставаться в силе!"
 MD_terror.9.b: "Возможно, мы сможем немного уменьшить их воздействие..."
 MD_terror.11.t: "[FROM.GetName] Предлагает провести совместные контртеррористические учения"
 MD_terror.11.d: "[FROM.GetName] предложил провести совместные контртеррористические учения, чтобы расширить возможности наших вооруженных сил и подразделений по борьбе с терроризмом. Если мы согласимся, нам придется выделить средства на проведение учений, но и им придется потратить деньги. Если мы откажемся, они, скорее всего, будут недовольны, но переживут это."
 MD_terror.11.a: "Проводите упражнения!"
 MD_terror.11.b: "Это пустая трата времени."
 MD_terror.13.t: "[FROM.GetName] предлагает советников"
 MD_terror.13.d: "[FROM.GetName] предложила направить к нам помощь в виде иностранных советников. Это, конечно, расширит наши возможности в борьбе с терроризмом, но мы также должны понимать, что эти советники будут докладывать о нашей деятельности и возможностях, что может привести к утечке разведданных."
 MD_terror.13.a: "Согласиться!"
 MD_terror.13.b: "[THIS.GetName] не нуждается в помощи!"
 MD_terror.14.t: "[FROM.GetName] отзывает советников"
 MD_terror.14.d: "[FROM.GetName] вывел свои контртеррористические силы из нашей страны, что снизило наши возможности по проведению контртеррористических операций."
 MD_terror.14.a: "Как они посмели это сделать!"
 MD_terror.15.t: "[FROM.GetName] принимает консультантов!"
 MD_terror.15.d: "[FROM.GetName] приняла наше предложение о сотрудничестве в области борьбы с терроризмом с участием наших разведывательных служб! Это не только поможет нам улучшить их контртеррористические операции, но и позволит нам изнутри взглянуть на их операции по сбору и обработке разведывательных данных."
 MD_terror.15.a: "Они сделали правильный выбор!"
 MD_terror.16.t: "[FROM.GetName] отказывается от советников!"
 MD_terror.16.d: "[FROM.GetName] отказалась впустить в свою страну наших советников по борьбе с терроризмом."
 MD_terror.16.a: "Что ж, их потеря."
