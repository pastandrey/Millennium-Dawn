 IS_un_aid_general_budget: "§YОбщий операционный бюджет§!: $$[?global.un_operating_budget_base|+G3] в неделю"
 IS_un_aid_general_budget_tt: "Отображает вклад стран в §BООН§! §Y в порядке убывания§!"
 IS_un_aid_general_budget_tt_delayed: "§YОбщий операционный бюджет§! — это общий базовый бюджет, в который вносят свой вклад все §Bгосударства-члены ООН§!, если они соответствуют минимальным требованиям. Минимальный вклад в бюджет составляет §Y[?global.general_operating_budget_contribute_percent|%]§! от ВВП, рассчитываемого ежегодно в начале года, при этом в бюджет необходимо внести минимальный взнос в размере §G$0,001§!. Страны, не соблюдающие это требование, не вносят взносы в бюджет в текущем году и не получают никаких бюджетных льгот.\n\n§YОбщий операционный бюджет§! — это базовая сумма, которую государства-члены еженедельно перечисляют §BОрганизации Объединенных Наций§! для распределения между различными §Bпрограммами ООН§! §Y по оказанию помощи§!. Эти взносы равномерно распределяются между всеми программами и составляют начальную базовую сумму, которую каждая программа получает еженедельно для своей работы.\n\n Страны получают бонус к множителю £foreign_influence_modifier_texticon §Yиностранного влияния§! и множителю £foreign_influence_defense_modifier_texticon §Yзащиты от иностранного влияния§! в размере своего процента от взноса в §Yобщий операционный бюджет§! в качестве поощрения за свои взносы."
 is_un_aid_total_budget_spending: "§RОбщие расходы§! на §CООН§!:"
 is_un_aid_total_budget_spending_tt: "В настоящее время мы тратим $[?united_nations_expenses|-3] на финансирование §BООН§!"
 is_un_aid_total_budget_spending_tt_delayed: "Эта цифра показывает, сколько мы тратим на все §Bпрограммы ООН§! §Y по оказанию помощи§!, включая §Yобщий операционный бюджет§! и наши независимые решения о расходах на все последующие §Bпрограммы ООН§!."
 is_un_basic_budget_spending: "§RРасходы§! на §Cбюджет§! §Y ООН§!:"
 is_un_basic_budget_spending_tt: "В настоящее время мы тратим $[?united_nations_base_expenses|-3] на §BООН§! §Y Общий операционный бюджет§!"
 is_un_basic_budget_spending_tt_delayed: "§YОбщий операционный бюджет§! — это базовая сумма, которую государства-члены еженедельно перечисляют §BОрганизации Объединенных Наций§! для распределения между различными §Bпрограммами ООН§! §Y по оказанию помощи§!. Эти взносы равномерно распределяются между всеми программами и составляют начальную базовую сумму, которую каждая программа получает еженедельно для своей деятельности. Программы, получающие финансирование из этого бюджета, — это §YЮНИДО§!, §YФКРООН§! и §YЮНЕСКО§!"
 is_un_aid_unescoe_spending: "§RРасходы§! на §YЮНЕСКО§!:"
 is_un_aid_unescoe_spending_tt: "В настоящее время мы тратим $[?united_nations_unescoe_funding|-3] на программу §YUNSCOE§!"
 is_un_aid_unescoe_spending_tt_delayed: "§BОрганизация Объединенных Наций§! §Yпо вопросам образования, науки и культуры§! - это организация по оказанию помощи, призванная улучшать образование, предоставлять технические консультации развивающимся странам и вести политический диалог со странами, которые нуждаются в растущей помощи.\n\nЭта Программа §Bпомощи§! §Y со стороны §!ООН£research_speed_texticon §Y повысит §!скорость исследований£political_power_texticon §Y и §!усиление политической власти, которую они осуществляют."
 is_un_aid_unido_spending: "§RРасходы§! на §YЮНИДО§!:"
 is_un_aid_unido_spending_tt: "В настоящее время мы тратим $[?united_nations_unido_funding|-3] на программу §YЮНИДО§!"
 is_un_aid_unido_spending_tt_delayed: "Организация §BОрганизации Объединенных Наций§! §Yпо промышленному развитию§! - это программа помощи, разработанная с целью содействия промышленному развитию. Помогая развивающимся странам создавать свою собственную промышленность, эта программа борется с бедностью, устанавливает инклюзивную глобализацию, а также нацелена на экологическую устойчивость.\n\nЭта Программа помощи §BООН§! §Y§! предоставит возможность бесплатно арендовать §Yгражданскую промышленность§!, наряду с повышением £construction_speed_texticon §Yскорости§! строительства, чтобы страны могли улучшить свою промышленную базу, энергетическую инфраструктуру и строительную инфраструктуру."
 is_un_aid_uncdf_spending: "§RРасходы§! на §YUNCDF§!:"
 is_un_aid_uncdf_spending_tt: "В настоящее время мы тратим $[?united_nations_uncdf_funding|-3] на программу §YФКРООН§!"
 is_un_aid_uncdf_spending_tt_delayed: "§BФонд развития капитала§! §Y Организации Объединенных Наций§! — это программа помощи, направленная на улучшение притока капитала для национальных инвестиций. Цель этой программы — создание рабочих мест и обеспечение устойчивого экономического роста за счет инвестиционных программ и цифрового финансирования.\n\n Эта §Bпрограмма помощи§! §Y ООН§! будет оказывать §Yфинансовую§! и §Yсодействующую§! поддержку странам, получающим помощь в рамках программы. Эта программа призвана помочь улучшить бюджеты и повысить производительность."
