 is_un_ascension_warning_tt: "§RНЕ§! недавно подавали запрос на §BООН§! §YВозвышение§!. Нам нужно ждать §Y[?recent_un_ascension_attempt:days_left|0] дней§! перед подачей новой заявки."
 un_ascent_effect_tt: "Отправляет запрос на §BООН§! §YВозвышение§!, начиная с голосования в §YСовете Безопасности§!, а затем переходя к голосованию в §YГенеральной Ассамблее§!, если голосование в §YСовете Безопасности§! прошло успешно.\n\nЧтобы достичь §YМеждународного признания§! и быть принятым как государство §BООН§!, мы должны выполнить следующее:\n\n§GПройти§! голосование за рекомендацию в §YСовете Безопасности§!, требующее §Y9§! §GДа§! голосов и §Y0§! §RНет§! голосов от §Yпостоянного члена Совета Безопасности§!.\n\n§GПройти§! голосование большинством §Y2/3§! в §BГенеральной Ассамблее ООН§!, после §Gпринятия§! голосования в §YСовете Безопасности§!."
