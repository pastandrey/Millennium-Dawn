 CT_TERR_ORGS_TT: "Список всех известных действующих террористических организаций."
 CT_CUR_INTEL: "§YИнформация по:§!"
 CT_CUR_INTEL_TT: "Отображает нашу текущую информацию о выбранной организации."
 CT_CUR_THREAT: "§RУгроза терроризма§!"
 CT_CUR_THREAT_TT: "Отображает текущий предполагаемый уровень угрозы террористической атаки со стороны организации. Чем хуже ситуация становится, тем больше вероятность совершения теракта."
 CT_CUR_DEFENSE: "§YЗащита от терроризма§!"
 CT_CUR_DEFENSE_TT: "Отображает наш текущий уровень защиты от террористической атаки. Чем выше этот показатель, тем меньше вероятность успеха террористической атаки внутри нашей страны."
 CT_CUR_SEL_INTEL: "§YТочность разведданных§!"
 CT_CUR_SEL_INTEL_TT: "Показывает, насколько эффективен в настоящее время наш сбор разведданных против этой организации"
 CT_CUR_LOCATION: "§YВозможное расположение Штаб-квартиры§!"
 CT_CUR_LOCATION_TT: "Показывает, где, по нашему мнению, может располагаться региональная штаб-квартира."
 CT_CUR_FOREIGN: "§YИностран. советники§!"
 CT_CUR_FOREIGN_TT: "Это число обозначает количество стран, направивших к нам советников для оказания помощи в борьбе с терроризмом. Каждая страна, направившая советника, увеличивает наш модификатор §Yточности разведданных§! на §G1%§!, повышая нашу §Yточность разведданных§!. Кроме того, операции стран, направивших §Yиностранных советников§! в нашу страну, будут улучшены."
 CT_SYS_DESC: "Система §Yпротиводействия терроризму§! работает так, что глобальная ситуация определяет рост угрозы террористических организаций и их заметность для разведки. По мере повышения §Rуровня террористической угрозы§! увеличиваются частота и сила атак. Мировая напряжённость, контент страны и действия игрока могут повышать или снижать §Rуровень террористической угрозы§!. Показатели обновляются ежемесячно или после крупных действий.\n\nИгроки могут собирать разведданные через систему шпионов, действия в этом меню и рейды, чтобы уменьшить §Rуровень террористической угрозы§!. С ростом §Yточности разведданных§! становится возможным точечно атаковать организации, вплоть до рейда на их штаб и устранения угрозы."
