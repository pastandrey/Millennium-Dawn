 pmc_events.1.t: "[From.GetNameDef] отзывает своих наемников"
 pmc_events.1.d: "Некоторые из наших наемных подразделений отзываются в [From.GetNameDef] по приказу их сюзерена, они предоставят компенсацию за такое преждевременное расторжение контракта, но это все."
 pmc_events.1.a: "Прискорбно"
 pmc_events.2.t: "Наши ЧВК были наняты"
 pmc_events.2.d: "Один из наших ЧВК был нанят [FROM.GetNameWithFlag]. Помимо денег мы также выигрываем от расширения влияния в государстве."
