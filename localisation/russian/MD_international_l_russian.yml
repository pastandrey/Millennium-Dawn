 ct_enable_raid_against_nation_tt: "Это позволит нашей стране провести контртеррористический §Yрейд спецназа§! на территории иностранного государства. Это может повлечь за собой определенные последствия в зависимости от наших отношений с этим государством."
 ct_enable_drone_against_nation_tt: "Это позволит нашей стране провести операцию §Yпо уничтожению террористов с помощью дронов§! на территории иностранного государства. Это может повлечь за собой определенные последствия, в зависимости от наших отношений с этим государством."
 ct_enable_final_raid_against_nation_tt: "Это позволит нашей стране провести §Yрейд по ликвидации внешнего террора§! на территории иностранного государства. Это может повлечь за собой определенные последствия, в зависимости от наших отношений с этим государством, но в случае успеха мы уничтожим международную террористическую организацию."
 ct_not_raid_prepared_tt: "Не подготовлен к §Yрейду спецназа по борьбе с терроризмом§!"
 ct_drone_not_prepared_tt: "Не располагает §Yоперацией по борьбе с терроризмом с использованием дронов§!."
 ct_final_raid_not_prepared: "Не подготовлен §Yрейд на выбывание§!"
 is_ct_dom_suv_tt: "Отрегулируйте §Yуровень защиты от террористов§! с помощью [?defense_var|+] и $terror_threat_base_detect_modifier$ [?intel_gain_var|+]"
 is_ct_mass_gather_tt: "Проводить операции по сбору разведданных для сбора данных для обработки. Данные \"Продолжить\" временно повысят §Yточность данных§! на §Y[name_of_org_disp]§!, снижаясь с каждым месяцем после выполнения действия §YExploit Intelligence§!."
 is_ct_exploit_intel_tt: "Использует собранную нами разведывательную информацию, на короткое время повышая §Yточность разведки§! против §Y[name_of_org_disp]§! на величину, которая снижается с каждым месяцем, пока не перестанет быть полезной."
 is_ct_infil_agent_tt: "Попытка внедрить агента в §Y[name_of_org_disp]§!. В случае успеха мы получим постоянный прирост к нашей §Yточности разведки§!. Если попытка провалится, наша §Yточность разведки§! на короткое время снизится, а §Y[name_of_org_disp]'§! §Rуровень террористической угрозы§! повысится.\n\n Вероятность успеха при попытке внедрения зависит от нашей §Yточности разведки§! и общей подготовки агентов §Yразведывательного управления§!."
 is_ct_asset_seizure_tt: "Захват активов снизит §Rуровень террористической угрозы§! в §Y[name_of_org_disp]§! на некоторое время, но при этом затруднит получение §Yдостоверной информации§! о §Y[name_of_org_disp]§! на короткий срок."
 is_ct_arrest_sympathizers_tt: "Аресты сочувствующих снизят §Rуровень террористической угрозы§! в §Y[name_of_org_disp]§!, а также повысят §Yточность разведданных§! по §Y[name_of_org_disp]§!. Однако есть вероятность, что под аресты попадут невиновные, и если это произойдет, мы можем столкнуться с негативной политической реакцией.\n\nЭффективность арестов будет зависеть от нашей §Yточности разведданных§! и улучшений в области контрразведки и борьбы с терроризмом в нашем §Yразведывательном агентстве§!.\n"
