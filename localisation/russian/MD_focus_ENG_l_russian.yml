 ENG_coal_opencast_mining: "Шотландский уголь, добываемый открытым способом"
 ENG_coal_opencast_mining_desc: "Новые открытые карьеры на угольных месторождениях Шотландии обеспечивают постоянный приток дешевого топлива к нашим электростанциям, работающим на ископаемом топливе, что позволяет им работать более интенсивно и вырабатывать больше электроэнергии для сети."
 ENG_glasgow_shipbuilding_idea1: "Судостроительный центр глазго"
 ENG_glasgow_shipbuilding_idea1_desc: "Инвестиции в верфи Clyde yards позволили оптимизировать проектирование, сварку и оснащение, снизив производственные затраты на все наши военно-морские суда, построенные в Глазго и за его пределами."
 ENG_glasgow_shipbuilding_idea1_tt: "§YСтоимость строительства всех военных кораблей: §! §G-5%§!"
 ENG_glasgow_shipbuilding_idea2: "Судостроительный центр глазго"
 ENG_glasgow_shipbuilding_idea2_desc: "Инвестиции в верфи Clyde yards позволили оптимизировать проектирование, сварку и оснащение, снизив производственные затраты на все наши военно-морские суда, построенные в Глазго и за его пределами."
 ENG_glasgow_shipbuilding_idea2_tt: "§YСтоимость строительства всех военных кораблей:§! §G-5%§!\n §YСтоимость проектирования всех военных кораблей:§! §G-20%§!"
 ENG_highland_main_line: "Главная линия Хайленда"
 ENG_highland_main_line_desc: "Модернизированная магистраль Хайленд-Мейн-Лайн соединяет Перт и Инвернесс более быстрыми и надежными поездами, помогая местным фирмам легче добираться до рынков, работников и услуг."
 ENG_crossrail: "Сеть перекрестных железных дорог"
 ENG_crossrail_desc: "Линия Элизабет объединяет Хитроу, Вест-Энд, Сити и Кэнэри-Уорф в единый рынок труда, облегчая поездки на работу, сокращая переполненные очереди и повышая производительность офисной экономики Лондона."
 ENG_high_value_manufacturing_zone: "Зона производства с высокой добавленной стоимостью"
 ENG_hs2_idea: "Высокая скорость 2"
 ENG_northern_powerhouse_rail_idea: "Железная дорога северной электростанции"
 ENG_andrew_digital_enterprise_modifier: "Стремление Королевского предприятия к цифровизации"
 ENG_andrew_digital_enterprise_modifier_desc: "При поддержке сетей патронажа герцога Йоркского появился новый импульс для объединения инвесторов, региональных фирм и технологических предприятий с помощью более современной коммерческой структуры. Офисы по продвижению торговли, бизнес-форумы и партнерские отношения с частным сектором используются для ускорения внедрения цифровых технологий и повышения узнаваемости британских предприятий внутри страны и за рубежом."
 ENG_edward_beach_youth_modifier: "Кампания герцога по работе с молодёжью"
 ENG_edward_beach_youth_modifier_desc: "Под патронажем графа Уэссекса инициативы по привлечению молодежи были расширены за счет программ награждения, общественных сетей и публичных мероприятий по всей стране. Кампания подчеркивает уверенность в себе, гражданскую службу и практические навыки, укрепляя социальную сплоченность и одновременно поощряя новое поколение к участию в жизни страны."
 ENG_prince_charles: "Чарльз"
 ENG_prince_charles_trait: "Принц Уэльский"
 ENG_charles_1_idea: "Принц Уэльский"
 ENG_charles_1_idea_desc: "Чарльз был назван принцем Уэльским как очевидный наследник Соединенного королевства. Этот титул, выданный на основании патента и отмеченный официальной инвеститурой, означал его основной статус наследника короны и его прочную связь с Уэльсом и другими королевствами в целом."
