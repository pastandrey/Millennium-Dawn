 ENG_queen_elizabeth_class_carrier: "Авианосец класса \" Куин Элизабет \""
 ENG_queen_elizabeth_class_carrier_desc: "Авианосцы типа «Куин Элизабет» стали вершиной британской военно-морской авиации, ознаменовав собой кардинальный скачок в возможностях авианосной группировки. Эти гиганты укрепили позиции Великобритании на море, воплотив в себе современные технологии, вместимость авиапарка и широкий радиус действия, что повысило статус страны в сфере глобальной обороны."
 ENG_elizabeth_line_decision: "Завершите линию Elizabeth"
 ENG_elizabeth_line_decision_desc: "Мы заканчиваем линию Элизабет через Лондон, соединяющую Хитроу, Вест-Энд, Сити и Кэнэри-Уорф быстрыми поездами, курсирующими между городами, что сокращает время в пути и повышает производительность."
