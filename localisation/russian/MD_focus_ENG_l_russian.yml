 ENG_edward_1_idea: "Граф Уэссексский"
 ENG_edward_1_idea_desc: "Титул графа Уэссекса был пожалован Эдуарду как высшая королевская награда, связанная со службой и общественной ответственностью. Опираясь на древнее английское название, имеющее глубокий исторический резонанс, оно несет в себе престиж, не подразумевая конституционной власти. В современной Великобритании он функционирует как платформа для патронажа, представительства и постоянной поддержки общественной деятельности монархии."
