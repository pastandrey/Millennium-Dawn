 ENG_british_foregin_legion_idea: "Британский Иностранный легион"
 ENG_british_foregin_legion_idea_desc: "Мы позволяем солдатам со всего мира вступать в ряды британской армии для защиты британских интересов."
 ENG_field_army_expansion_idea: "Расширение полевой армии"
 ENG_field_army_expansion_idea_desc: "Расширенная полевая армия предназначена для того, чтобы преуспевать в различных оперативных условиях, от обычных боевых действий до миротворческих миссий. Эта инициатива согласуется с более широкой оборонной стратегией Великобритании, делая упор на боеготовность, мобильность и взаимодействие с силами союзников. Инвестируя в рост и модернизацию своей полевой армии, Соединенное Королевство подтверждает свою приверженность сохранению универсальных и маневренных сухопутных войск, способных противостоять растущим угрозам 21 века."
 ENG_multi_ocean_training: "Обучение в нескольких Океанах"
 ENG_multi_ocean_training_desc: "Эта стратегическая программа направлена на повышение возможностей и боеготовности Королевского военно-морского флота с помощью специализированных учебных учений, симуляций и реальных сценариев. Знакомя военно-морской персонал с уникальными проблемами, возникающими в различных океанах, от Атлантического до Тихого и за его пределами, эта инициатива обеспечивает адаптивность, универсальность и эффективность морских операций в глобальном масштабе."
 ENG_carrier_wing_procurement: "Закупка Крыла авианосца"
 ENG_carrier_wing_procurement_desc: "The Expanded Aircraft Carrier Wing Procurement initiative underscores the commitment of the United Kingdom to bolster the air power capabilities of its Queen Elizabeth-class aircraft carriers. This strategic effort involves the acquisition and expansion of carrier-based aircraft, focusing on advanced platforms to enhance the operational reach and versatility of the aircraft carrier wing. The procurement initiative includes the integration of cutting-edge aircraft, such as the F-35B Lightning II, alongside support and reconnaissance assets. This expansion is designed to strengthen the aircraft carriers' capabilities, ensuring a formidable aircraft carrier strike group that can operate across a spectrum of missions."
 ENG_strategic_aircraft_strategy_idea: "Стратегическая авиационная стратегия"
 ENG_strategic_aircraft_strategy_idea_desc: "Стратегия стратегической авиации направлена на обеспечение того, чтобы Соединенное Королевство поддерживало надежный и боеспособный парк стратегической авиации, который может эффективно поддерживать цели национальной обороны, вносить вклад в международные усилия по обеспечению безопасности и адаптироваться к возникающим угрозам в глобальной среде безопасности."
