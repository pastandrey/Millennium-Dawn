 decisions_ENG: "[ENG.GetName]: Решения"
 decisions_ENG_desc: "Здесь правительство может запускать выполнение задач и принимать решительные меры для определения курса Британии, поддерживать промышленность, формировать направления исследований, укреплять регионы и реагировать на изменяющиеся потребности страны."
 falkland_policy: "Фолклендская политика"
 denounce_status_as_the_commonwealth_of_nation_member: "§YОтказ от§! статуса члена Содружества наций"
 denounce_status_as_the_commonwealth_of_nation_member_desc: "Порвите с устаревшими связями. Откажитесь от членства в Содружестве Наций и проложите путь к настоящему национальному суверенитету. Восстановите свою судьбу. Прокладывайте собственный путь. Независимость ждёт вас."
 ENG_bankers_switch_faction: "Поддержите международных банкиров"
 ENG_bankers_switch_faction_desc: "Мы перестраиваем наши внутренние альянсы в пользу фракции международных банкиров, смещая политику в сторону глобальных финансов, открытых потоков капитала и экономики, основанной на услугах."
 ENG_scottish_parliament: "[SCO.GetFlag] Шотландский парламент"
 ENG_scottish_parliament_desc: "[SCO.GetFlag] Члены шотландского парламента не всегда были и не всегда будут лояльны по отношению к Лондону. Будут §Hсторонники независимости§! в парламенте, которые будут бороться за создание автономной или независимой [SCO.GetFlag]Шотландии.\n\n Если §Hсторонники независимости§! в парламенте получат большинство, они начнут принимать законопроекты, предоставляющие им больше автономии, которые мы можем одобрить или наложить на них вето. Если мы будем последовательно удовлетворять их запросы, у нас будет дружественное и лояльное [SCO.GetFlag]Шотландское государство. Но если мы будем раз за разом отклонять их просьбы, их §Hагитация§! может привести к очень неприятным последствиям. Если [SCO.GetFlag] §Hшотландская агитация§! достигнет §H100§!, они потребуют независимости.\n\n§HМеста в парламенте, отданные за независимость§!: [? ENG_scottish_nationalists]/129\n\n[SCO.GetFlag] §HШотландская агитация§!: [?ENG_scottish_agitation]"
 ENG_invest_northern_ireland_mission: "Инвестируйте в строительство в Северной Ирландии с прибылью"
 ENG_ireland_border_cooperation: "Договор о пограничном сотрудничестве Ирландии"
 ENG_clydach_nickel_decision: "Модернизировать никелевый завод в Клайдахе"
 ENG_clydach_nickel_decision_desc: "Мы модернизируем никелевый завод Clydach в Южном Уэльсе, расширяя мощности по производству аккумуляторных металлов и высококачественных сплавов, чтобы увеличить наши запасы важнейших полезных ископаемых."
 ENG_alloys_modernisation: "Модернизировать производство сплавов"
 ENG_alloys_modernisation_desc: "Мы инвестируем в новые плавильные заводы и линии прокатки специальных сплавов, повышая качество и производительность всего - от турбин и броневых листов до высокопроизводительных компонентов."
 ENG_ellesmere_port_decision: "Завод редкоземельных магнитов в Элсмир-Порту"
 ENG_ellesmere_port_decision_desc: "Мы расширяем переработку редкоземельных элементов в порту Элсмир, производя высококачественные магниты для ветряных турбин, электромобилей и передовых оборонных систем."
 ENG_shetland_hydrocarbon_decision: "Выброс углеводородов к западу от Шетландских островов"
 ENG_shetland_hydrocarbon_decision_desc: "Мы наращиваем разработку нефтяных и газовых месторождений к западу от Шетландских островов, используя глубоководные запасы для повышения внутренней углеводородной и энергетической безопасности."
 ENG_rosebank_field_decision: "Разработка нефтяного месторождения Роузбэнк"
 ENG_rosebank_field_decision_desc: "Мы даем зеленый свет полной разработке нефтегазового месторождения Роузбанк, вводя в эксплуатацию новые морские платформы и трубопроводы для укрепления наших долгосрочных поставок энергии."
 ENG_cambo_offshore_decision: "Разработка морского месторождения Камбо"
 ENG_cambo_offshore_decision_desc: "Мы продвигаем оффшорный проект Cambo, добавляя новые скважины и подводные коммуникации, чтобы задействовать его запасы нефти и газа в добыче."
 ENG_hornsea_wind_farm_decision: "Расширение Ветроэлектростанции Хорнси"
 ENG_hornsea_wind_farm_decision_desc: "Мы поддерживаем дальнейшие этапы строительства морской ветряной зоны Hornsea в Северном море, добавляя турбины и сетевые соединения для получения более чистой энергии от крупнейшей в мире ветроэлектростанции."
 ENG_drakeland_tungsten_decision: "Вновь открыть Вольфрамовый рудник в Дрейклендсе"
 ENG_drakeland_tungsten_decision_desc: "Мы перезапускаем рудник Drakelands близ Плимута, возобновляя производство олова и вольфрама, чтобы увеличить поставки важнейших технологических металлов в Великобританию."
 ENG_south_crofty_tin_decision: "Вновь открыть Оловянный рудник в Южном Крофти"
 ENG_south_crofty_tin_decision_desc: "Мы финансируем повторное открытие Южного Крофти в Корнуолле, возрождая глубокую добычу олова и создавая постоянный внутренний источник высококачественной руды для нашей промышленности."
 ENG_scottish_industry_mission: "Неожиданный Доход для Шотландской промышленности"
 ENG_scottish_industry_mission_desc: "Наши инвестиции в шотландскую сталелитейную и тяжелую промышленность могут открыть новые месторождения, контракты и побочные проекты. Существует большая вероятность того, что возобновление деятельности заводов и верфей позволит выявить дополнительные ресурсы, которые мы сможем задействовать в производстве."
 ENG_celsa_steel_mission: "Обзор производства Стали Celsa"
 ENG_celsa_steel_mission_desc: "Каждый год мы проводим обзор Кардиффского стана Celsa, чтобы понять, могут ли новые заказы, повышение эффективности или потоки металлолома оправдать очередной шаг в производстве стали."
 ENG_roysth_naval_port_decision: "Расширить Военно-морской порт Розит"
 ENG_roysth_naval_port_decision_desc: "Мы расширяем доки и вспомогательные сооружения в Росайте, превращая устье реки Форт в более прочную базу для ремонта, поддержки и строительства будущих боевых кораблей."
 ENG_expand_belfast_decision: "Расширение Промышленной зоны Белфаста"
 ENG_expand_belfast_decision_desc: "Мы расчищаем и обслуживаем новые участки вокруг доков и окраин Белфаста, открывая дополнительные площади для заводов, верфей и офисов по всей Северной Ирландии."
 ENG_highland_main_line_decision: "Модернизируйте магистраль Хайленд"
 ENG_highland_main_line_decision_desc: "Мы модернизируем магистраль Хайленд-Мейн между Пертом и Инвернессом, сокращая время в пути и предоставляя городам вдоль маршрута столь необходимый прирост связности и производительности."
 ENG_titanic_quarter_decision: "Развивайте Титанический квартал"
 ENG_titanic_quarter_decision_desc: "Мы перестраиваем бывшие земли верфи в Белфасте в квартал Титаник, объединяя офисы, студии и прибрежную индустрию, чтобы вдохнуть новую жизнь в старую территорию Harland & Wolff."
 ENG_productivity_gap_mission: "Снижение производительности"
 ENG_hs2_mission: "Строительство высокоскоростной магистрали 2"
 ENG_northen_powerhouse_mission: "Строительство железной дороги Northen Powerhouse Rail"
 ENG_build_london: "Развивающийся Большой Лондон"
 ENG_build_london_desc: "Мы обещали нашим избирателям в Большом Лондоне, что в городе будет проведена реконструкция. И мы должны сдержать это обещание."
 ENG_promise_labour: "Обещание профсоюзам"
 ENG_promise_labour_desc: "Мы дали обещание профсоюзам, и мы должны действовать в соответствии с ним."
 ENG_promise_military: "Обещание Военно-промышленному комплексу"
 ENG_promise_military_desc: "Мы дали обещание военно-промышленному комплексу, и мы должны действовать в соответствии с ним."
 ENG_promise_fossil_fuel: "Перспективы для отрасли, работающей на ископаемом топливе"
 ENG_promise_fossil_fuel_desc: "Мы дали обещание производителям ископаемого топлива, и мы должны действовать в соответствии с ним."
 ENG_monarchy_decision_category: "Виндзорский дом"
 ENG_monarchy_decision_category_desc: "Виндзорский дом правит с 1917 года, неся современную монархию через войны, социальные перемены и давление нового века. Он стоит в центре общественной жизни Британии, династия, переплетенная с церемониями, службой и спокойной рутиной, которые скрепляют королевство. Его члены оказывают влияние посредством покровительства, визитов и осторожного вмешательства, обращаясь к благотворительным организациям, дипломатии и вооруженным силам такими способами, которые недоступны одной политике. Здесь представлены начинания Королевской семьи, показывающие, какие инициативы может осуществлять каждый член королевской семьи и что их присутствие может привести в движение."
 ENG_monarchy: "Виндзорский дом"
 ENG_charles_youth_sustainability_decision: "Расширение прав и возможностей молодежи в интересах устойчивого развития"
 ENG_charles_youth_sustainability_decision_desc: "Его Королевское высочество принц Чарльз запустит программу поддержки молодежи в реализации устойчивых и благоприятных для климата инициатив. Опираясь на десятилетия работы с молодежными благотворительными организациями и экологическими организациями, принц Уэльский будет продвигать образование, развитие навыков и предпринимательство, которые соответствуют экологической устойчивости. В этой программе признается жизненно важная роль молодого поколения в построении более устойчивого будущего."
 ENG_charles_sustainable_urban_planning_decision: "Содействие устойчивому городскому планированию"
 ENG_charles_sustainable_urban_planning_decision_desc: "Его Королевское высочество принц Чарльз будет выступать за устойчивое городское и общественное планирование, основанное на целостных принципах проектирования, в которых приоритет отдается людям, окружающей среде и долгосрочной устойчивости. Опираясь на его давнюю пропаганду создания сообществ, уважающих климат и культурный контекст, эта программа будет продвигать традиционные и экологически чувствительные подходы к архитектуре, инфраструктуре и землепользованию."
 ENG_charles_organic_agriculture_decision: "Чемпион Органического и устойчивого сельского хозяйства"
 ENG_charles_organic_agriculture_decision_desc: "Его королевское высочество принц Чарльз будет использовать свое влияние для продвижения органических и устойчивых методов ведения сельского хозяйства как в сельских, так и во всем мире. Опираясь на свою десятилетнюю приверженность экологическому управлению и восстановительному сельскому хозяйству, принц будет продвигать методы, которые укрепляют здоровье почвы, поддерживают семейные фермы и снижают воздействие на окружающую среду."
 ENG_charles_environmental_diplomacy_tour_decision: "Тур по экологической дипломатии"
 ENG_charles_environmental_diplomacy_tour_decision_desc: "Его королевское высочество принц Чарльз отправится в международное экологическое дипломатическое турне с целью содействия сотрудничеству в области устойчивого развития и климатических инициатив. За десятилетия своей службы в качестве принца Уэльского он посетил множество стран и взаимодействовал с лидерами и сообществами, поощряя действия по борьбе с изменением климата, защитой тропических лесов и устойчивым развитием. Этот тур будет направлен на укрепление глобального партнерства и подчеркивание общих обязательств по охране окружающей среды."
 ENG_charles_rainforest_help_decision: "Поддержка глобальной защиты тропических лесов"
 ENG_charles_rainforest_help_decision_desc: "Его королевское высочество принц Чарльз возглавит программу содействия глобальным действиям по борьбе с уничтожением тропических лесов. Как основатель проекта Prince Rainforests Project, он будет работать с правительствами, организациями и гражданским обществом, чтобы подчеркнуть важность сохранения тропических лесов и их роль в борьбе с изменением климата."
 ENG_charles_charities_network_decision: "Активируйте благотворительную сеть принца"
 ENG_charles_charities_network_decision_desc: "Его Королевское высочество принц Чарльз активизирует свою обширную сеть благотворительных организаций для поддержки социальных, образовательных и экологических проектов в стране и за рубежом. Как президент благотворительных организаций принца, группы организаций, основанных или находящихся под патронажем принца Уэльского, он будет использовать их коллективный опыт для создания устойчивых сообществ, расширения возможностей и улучшения благосостояния во многих регионах."
 ENG_charles_harmony_tour_decision: "Совершите Дипломатический тур по Гармонии"
 ENG_charles_harmony_tour_decision_desc: "Его королевское высочество принц Чарльз отправится в международное турне, чтобы продвигать свою философию гармонии и поощрять сотрудничество по вопросам охраны окружающей среды и устойчивого развития. На протяжении десятилетий своей службы в качестве принца Уэльского он последовательно использовал свое влияние, чтобы подчеркнуть необходимость действий в области изменения климата, защиты тропических лесов и устойчивого развития, и этот тур будет направлен на укрепление глобального партнерства вокруг этих общих целей."
 ENG_andrew_naval_haritage_decision: "Примите Военно-Морское наследие"
 ENG_andrew_naval_haritage_decision_desc: "Принц Эндрю воспользуется своей долгой военно-морской карьерой, чтобы подчеркнуть морские традиции и службу своей страны. Отслужив пилотом вертолета, инструктором и командиром Королевского военно-морского флота во время Фолклендского конфликта, он будет поощрять уважение к военно-морскому наследию и развивать сотрудничество с флотами союзников и морскими учебными заведениями по всему миру."
 ENG_andrew_trade_representive_decision: "Миссия торгового представителя"
 ENG_andrew_trade_representive_decision_desc: "Принц Эндрю отправится в миссию торгового представителя для продвижения британских коммерческих интересов за рубежом. Опираясь на свой опыт работы специальным представителем Соединенного Королевства по международной торговле и инвестициям, он привлечет иностранные правительства, бизнес-лидеров и инвесторов к освещению возможностей для экспорта и внутренних инвестиций Великобритании, укреплению экономических связей и развитию сотрудничества в области торговли и предпринимательства."
 ENG_andrew_emerging_trade_agreement_decision: "Добиваться заключения новых торговых соглашений"
 ENG_andrew_emerging_trade_agreement_decision_desc: "Принц Эндрю возглавит усилия по заключению торговых соглашений и делового партнерства на развивающихся мировых рынках. Опираясь на свой обширный опыт представления британских коммерческих интересов за рубежом, он будет стремиться открыть возможности для экспорта, партнерства и инвестиций с развивающимися экономиками, которые демонстрируют высокий потенциал для будущего роста и сотрудничества."
 ENG_andrew_emerging_economy_benefits_decision: "Использование партнерских отношений с развивающимися Экономиками"
 ENG_andrew_emerging_economy_benefits_decision_desc: "Принц Эндрю сосредоточится на укреплении партнерских отношений с развивающимися экономиками, чтобы расширить возможности для торговли, инвестиций и совместного экономического роста. Опираясь на его обширный опыт продвижения британских коммерческих интересов по всему миру, эта инициатива направлена на привлечение инвестиций и опыта с быстро развивающихся рынков, повышение внутренней производительности и создание более динамичной бизнес-среды."
 ENG_andrew_digital_enterprise_decision: "Инициатива Цифрового предприятия"
 ENG_andrew_digital_enterprise_decision_desc: "Принц Эндрю запустит инициативу цифрового предпринимательства, направленную на продвижение цифровых навыков и предпринимательства по всей стране. Опираясь на его работу с digital enterprise awards, которая помогла людям развить онлайн-, технические и деловые навыки, эта программа направлена на поддержку начинающих цифровых новаторов, поощрение технологической грамотности и создание более прочной основы для цифровой экономики."
 ENG_anne_national_charity_decision: "Национальные Благотворительные организации Princess Royal"
 ENG_anne_national_charity_decision_desc: "Королевская принцесса будет расширять и координировать свои национальные патронажи, чтобы добиваться практических результатов, а не возможностей для фотосъемки. Финансовые стимулы, мобилизация добровольцев и общественное внимание будут направлены туда, где не хватает возможностей.."
 ENG_anne_carers_promotion_decision: "Стремление к признанию со стороны Лиц, осуществляющих уход"
 ENG_anne_carers_promotion_decision_desc: "Энн поставит неоплачиваемых лиц, осуществляющих уход, в центр внимания всей страны, настаивая на том, чтобы учреждения относились к уходу как к важной услуге, а не как к частному бремени. Кампания повышает уровень поддержки \"передышки\", гибкость на рабочем месте и общественное уважение благодаря королевскому покровительству и постоянной известности."
 ENG_anne_military_readiness_decision: "Стандарты готовности"
 ENG_anne_military_readiness_decision_desc: "Королевская принцесса будет использовать свои назначения в армию, чтобы требовать профессионализма, учебной дисциплины и неброских процедур, которые обеспечивают возможность развертывания подразделений. Проверки, учения и последующее материально-техническое обеспечение будут рассматриваться в качестве меры серьезности."
 ENG_anne_navy_readiness_decision: "Проверки готовности автопарка"
 ENG_anne_navy_readiness_decision_desc: "На Королевский военно-морской флот будет оказано давление, чтобы доказать, что он может плавать, сражаться и поддерживать себя в трудных условиях. Стандарты службы поддержки Anne: техническое обслуживание, квалификация экипажа и оперативный темп не подлежат обсуждению."
 ENG_anne_tourism_decision: "Королевский туристический рывок"
 ENG_anne_tourism_decision_desc: "Репутация Британии - это ценный актив, и королевская принцесса потратит его с пользой. Целенаправленный туристический толчок привлечет внимание к наследию, событиям и местной экономике, которые нуждаются в спросе, превращая королевские мероприятия в заказы и инвестиции."
 ENG_edward_beach_youth_decision: "Работа с молодежью Прибрежных районов"
 ENG_edward_beach_youth_decision_desc: "Граф Уэссекс перенесет работу короны с молодежью на побережье, используя визиты, программы награждения и местные партнерства, чтобы привлечь молодых людей к приобретению навыков и служению. Послание носит практический характер: уверенность, дисциплина и путь вперед. "
 ENG_edward_global_youth_decision: "Глобальное Вовлечение молодежи"
 ENG_edward_global_youth_decision_desc: "Эдвард будет расширять участие молодежи за пределами Великобритании, укрепляя связи посредством обменов, обучения и совместных гражданских проектов с партнерами за рубежом."
 ENG_edward_arts_culture_patronage_decision: "Покровительство искусству и культуре"
 ENG_edward_arts_culture_patronage_decision_desc: "Корона будет отстаивать британское искусство и культурный сектор как самобытность и стратегическое влияние. Королевский патронаж повысит узнаваемость, разблокирует финансирование и защитит институты, которые формируют национальное повествование внутри страны и за рубежом."
 ENG_edward_production_guild_decision: "Поддерживайте производственные гильдии"
 ENG_edward_production_guild_decision_desc: "Британские гильдии и квалифицированные производственные профессии являются основой качества и экспортной мощи. Эдвард поддержит производственные гильдии через признание, учебные связи и отраслевую координацию, которые поддерживают ремесла живыми и открывают конвейеры. "
 ENG_edward_veteran_support_decision: "Поддержка ветеранов Уэссекса"
 ENG_edward_veteran_support_decision_desc: "Служба не заканчивается увольнением, и Корона не будет относиться к ветеранам как к запоздалой мысли. Граф Уэссексский будет координировать деятельность благотворительных организаций, работодателей и местных властей для улучшения поддержки в переходный период, стабильности жилищных условий и путей трудоустройства. "
 ENG_philip_award_medal_decision: "Вручить медаль принца Филиппа"
 ENG_philip_award_medal_decision_desc: "Принц Филипп приступит к выполнению своей собственной миссии по вручению медали принца Филиппа ведущему инженеру, имеющему исключительное мировое значение. Эта награда присуждается за выдающиеся достижения в инженерной практике и инновациях под его личным патронажем."
 ENG_philip_award_expansion_decision: "Расширить список молодежных наград герцога"
 ENG_philip_award_expansion_decision_desc: "Принц Филипп отправится в поездку, чтобы объявить о расширении премии герцога Эдинбургского, направленной на то, чтобы открыть эту молодежную программу для более широкой международной аудитории. Его усилия направлены на укрепление жизнестойкости молодежи и гражданских навыков во многих странах."
 ENG_philip_trust_funds_grants_decision: "Активировать Трастовые Гранты принца Филиппа"
 ENG_philip_trust_funds_grants_decision_desc: "Принц Филипп будет лично следить за распределением грантов из Целевого фонда принца Филиппа на нужды местного сообщества и образовательные проекты. Его непосредственное участие обеспечивает поддержку инициатив, улучшающих отдых, обучение и общественную жизнь."
 ENG_philip_faith_conservation_decision: "Запустить инициативу \"Вера и сохранение природы\""
 ENG_philip_faith_conservation_decision_desc: "Принц Филипп приступит к реализации программы по объединению религиозных общин и экологических групп для совместного управления природой. Он стремится мобилизовать моральные и общественные ресурсы для достижения целей устойчивого сохранения природы."
 ENG_philip_innovation_recognition_decision: "Добиться признания инноваций на национальном уровне"
 ENG_philip_innovation_recognition_decision_desc: "Принц Филипп запустит национальную программу поощрения выдающихся представителей промышленного дизайна, науки и практического решения проблем. Его инициатива подчеркивает изобретательность как основу экономического роста и национального успеха."
 ENG_william_air_ambulance_decision: "Летайте в смене Санитарной авиации"
 ENG_william_air_ambulance_decision_desc: "Принц Уильям отправляется на очередную смену санитарной авиации, выполняя экстренные задания и встречаясь с экипажами на земле."
 ENG_william_mental_health_at_work_decision: "Психическое здоровье на работе"
 ENG_william_mental_health_at_work_decision_desc: "Принц Уильям намеревается объединить работодателей и благотворительные организации в борьбе за психическое здоровье на рабочем месте."
 ENG_william_step_into_health_decision: "Сделайте шаг навстречу стремлению к здоровью"
 ENG_william_step_into_health_decision_desc: "Принц Уильям встает на путь возвращения к здравоохранению и открытия возможностей Национальной службы здравоохранения для ветеранов и семей военнослужащих."
 ENG_william_early_years_forum_decision: "Созвать Форум первых лет жизни"
 ENG_william_early_years_forum_decision_desc: "Принц Уильям созывает форум первых лет жизни, чтобы собрать экспертов, благотворительные организации и бизнесменов в одном зале."
 ENG_william_chogm_youth_decision: "Молодежное послание ЧОГМА"
 ENG_william_chogm_youth_decision_desc: "Принц Уильям посещает молодежную сессию Встречи глав правительств Содружества (CHOGM), чтобы показать, что следующее поколение имеет значение для будущего Содружества."
 ENG_seize_sierra_leone_resources: "Эксплуатировать [SIE.GetFlag] Сьерра - Леоне"
 ENG_seize_sierra_leone_resources_desc: "Пришло время нам получить что-то от операции \"Баррас\". Мы захватим жизненно важные ресурсы Сьерра-Леоне и установим экономическое влияние в течение 500 дней."
 ENG_war_for_delta: "Война за Дельту"
 ENG_war_for_delta_desc: "Возможно, мы немного перегнули палку с нигерийцами, позволив их эго подавить любые опасения, которые у них могут возникнуть при столкновении с нашими силами. Тем не менее, нам придется захватить их столицу, чтобы показать им, кто на самом деле здесь всем заправляет."
 ENG_end_of_the_world: "Покорение Конца света"
 ENG_end_of_the_world_desc: "Огненная земля, также известная как \"Край света\", является важным архипелагом и воротами в Антарктиду. Захват этого жизненно важного места мог бы принести огромную пользу нации в целом, настолько большую, что мы готовы бороться за это."
 ENG_operation_eastern_divide: "Операция \" Восточный рубеж \""
 ENG_operation_eastern_divide_desc: "Египтяне не удовлетворили наши призывы к справедливому и равному доступу через Суэцкий канал, и в результате у нас не осталось иного выбора, кроме как прибегнуть к военным действиям."
 ENG_a_more_united_kingdom: "Более объединённое Королевство"
 ENG_a_more_united_kingdom_desc: "Хотя наше государство в настоящий момент едино, части нашего королевства отделились и образовали независимые государства. Если мы действительно хотим быть Объединённым Королевством, нам необходимо воссоединить государства Содружества со всех уголков мира."
 ENG_fractured_kingdom_united_state: "Расколотое Королевство, Объединённое Государство"
 ENG_fractured_kingdom_united_state_desc: "§R«Гражданин, а не подданный»§!\nПока монархия и прежний режим канули в Лету, государство только крепло. Настало время занять более решительную, доминирующую позицию на мировой арене и наконец наказать тех, кто веками грабил эту землю."
 ENG_deeper_commonwealth_integration: "Более глубокая интеграция в Содружество"
 ENG_deeper_commonwealth_integration_desc: "Если мы хотим стать действительно единым государством, нам сначала придется поработать над тем, чтобы убедить тех, кого мы хотим интегрировать, в том, что мы являемся подходящим принимающей стороной. Только тогда мы сможем предпринять следующие шаги."
 ENG_sovereignty_above_all: "Суверенитет превыше всего"
 ENG_sovereignty_above_all_desc: "Ничто так не важно, как способность наших администраторов определять будущее наших сотрудников. Ни одно другое государство, кроме нашего, не должно иметь права голоса в том, как мы управляем делами."
 ENG_establishing_new_leadership: "Установление нового режима"
 ENG_establishing_new_leadership_desc: "Прежде чем мы сможем приступить к работе, нам придется установить новый режим. Потребуется искоренение общества, и мы должны начать планировать создание нового переходного органа власти, который возьмет на себя ответственность в некоторых частях страны, чтобы сделать процесс более плавным."
 ENG_two_way_concessions: "Двусторонние уступки"
 ENG_two_way_concessions_desc: "Мы не можем ожидать прогресса в достижении соглашения о передаче полномочий, если только одна сторона приложит усилия. Мы пойдем на некоторые уступки и также ожидаем, что другая сторона в Шотландии сделает то же самое."
 ENG_uniting_the_isle: "Объединение острова"
 ENG_uniting_the_isle_desc: "Ирландцы являются причиной многих наших проблем, от разжигания напряженности до того, что политические партии призывают к североирландскому сепаратизму. Как раз пришло время нам переехать и преподать им урок."
 ENG_revolution_not_devolution: "Революция, а не передача полномочий"
 ENG_revolution_not_devolution_desc: "Чтобы иметь действительно единое государство, мы должны сначала уничтожить причину деволюции. Нам нужна национальная революция, а не передача полномочий!"
 ENG_bring_in_canada: "Привезти в Канаду"
 ENG_bring_in_canada_desc: "Мы должны протянуть руку помощи Канаде как крупнейшему члену Содружества с точки зрения площади территории. Наши канадские друзья поддерживали тесную связь на протяжении всего времени, так что доставить их на борт не должно быть слишком сложно."
 ENG_the_realm_of_britain: "Британское королевство"
 ENG_the_realm_of_britain_desc: "Королевство Британия - это то, что никогда не может быть разрушено, благодаря духу британского народа, стойкому во времена особых трудностей."
 ENG_glory_of_pax_britannica: "Слава Pax Britannica"
 ENG_glory_of_pax_britannica_desc: "Наше прошлое славно, и есть те, кто говорит, что на самом деле оно не ушло, а скорее является предзнаменованием того, что должно произойти. Нам нужно воплотить мечты наших предков и восстановить славу Pax Britannica!"
 ENG_australian_outreach: "Информационно - пропагандистская деятельность в Австралии"
 ENG_australian_outreach_desc: "Мы не можем забыть о жертвах, которые австралийцы приносили на протяжении всей истории ради нашего дела. Поэтому крайне важно, чтобы мы предприняли шаги, чтобы пригласить их присоединиться к нам в будущем."
 ENG_new_zealands_offer: "Предложение Новой Зеландии"
 ENG_new_zealands_offer_desc: "Новозеландцы долгое время оставались нашими верными союзниками и поддерживали нас и в хорошие, и в плохие времена. Будет справедливо, если мы пригласим их присоединиться к нам."
 ENG_fracture_nato_unity: "Разрушение единства НАТО"
 ENG_fracture_nato_unity_desc: "Хотя это правда, что мы долгое время извлекали выгоду из безопасности НАТО, теперь это не так. Мы должны понимать, что наши бывшие друзья ничего так не желают, как разделить и расколоть наше государство, и наш народ должен быть поставлен об этом в известность."
 ENG_end_eastern_suffering: "Положить конец Восточным Страданиям"
 ENG_end_eastern_suffering_desc: "Жалкая горстка государств Восточной Европы во главе с Россией переживает медленный и ужасный упадок. Будет лучше, если мы переедем туда и установим истинное процветание и порядок в этом регионе."
 ENG_declare_the_commonwealth: "Провозгласить Содружество"
 ENG_declare_the_commonwealth_desc: "Теперь, когда все земли (по крайней мере, самые важные) Содружества объединились под одним знаменем, самое время заявить всему миру, что Федерация Содружества существует и никуда не денется."
 ENG_active_resource_project: "§YАктивный проект по добыче важнейших полезных ископаемых§!"
 ENG_active_productivity_project: "§YАктивный Национальный проект по повышению производительности труда§!"
 ENG_ucl_east_campus: "Восточный кампус Калифорнийского университета"
 ENG_mechanic_menu_explanation: "Деволюция"
 ENG_devolution_HEADER_TITTLE_LOC: "Делегированные полномочия"
 ENG_mechanic_menu_explanation_2: "Деволюция позволяет передать часть власти обратно\nв руки наших регионов. Управлять ими можно, нажав\nна соответствующий регион. У каждого региона будет §CПарламент§!,\nуровень §RАгитации§! и уровень §GЗависимости§!. Наведите курсор на\nкнопку §Gинформация§!, чтобы увидеть подробное объяснение."
 ENG_parliament_gui_tooltip: "У каждого региона будет свой собственный парламент. В зависимости от уровня агитации, жители могут быть более или менее склонны голосовать за сторонника независимости. Однако, как только сторонник независимости займёт место в парламенте, его будет крайне трудно сместить. Если сторонники независимости станут большинством, они могут начать продвигать законы, уменьшающие их зависимость, и в какой-то момент могут потребовать проведения референдума.\n\nНаши подданные будут иметь своё мнение о нас, которое выражается через показатель Агитации. Уровень агитации региона может меняться в зависимости от нашей политической партии, количества законопроектов, на которые мы наложили вето, или если мы принудительно увеличиваем их зависимость. Агитация может также меняться из-за событий, решений или фокусов. Если уровень агитации региона достигнет 100, они начнут требовать независимости от Королевства.\n\nПоказатель Зависимости определяет, насколько регион способен самостоятельно справляться с управлением. Если зависимость низкая, они могут начать требовать больше свобод, так как смогут обходиться без Королевства. У нас будет возможность снижать или повышать их зависимость в зависимости от получаемых событий и принятых фокусов.\n\nНапряжённость в Северной Ирландии отражает конфликт между юнионистскими протестантами и республиканскими католиками. Наши решения могут усиливать напряжённость, и если она достигнет 50%, будут происходить случайные насильственные столкновения. Если напряжённость продолжит расти выше 50%, частота столкновений увеличится."
 ENG_dependency_gui_tooltip2: "Зависимость определяет уровень, на котором составляющая может управлять собой. Если зависимость невелика, то они могут начать настаивать на большем количестве свобод, поскольку прекрасно могут справиться с собой и без Королевства. У нас будет возможность снизить или увеличить их зависимость в зависимости от событий, которые мы получаем, и от того, какое внимание мы уделяем."
 ENG_parliament_gui_tooltip2: "У каждого региона будет свой собственный парламент. В зависимости от уровня агитации жители могут быть более или менее склонны голосовать за сторонника независимости. Однако, как только сторонник независимости займёт место в парламенте, его будет крайне трудно сместить. Если сторонники независимости станут большинством, они могут начать продвигать законы, снижающие их зависимость, и в какой-то момент могут потребовать проведения референдума."
 ENG_agitation_gui_tooltip2: "У наших подданных будет свое мнение о нас, и это выражается в их Агитации. Избиратель может быть более взволнован в зависимости от нашей политической партии, количества законопроектов, на которые мы накладываем вето, или от того, усилим ли мы его зависимость. Агитация может быть вызвана определенными событиями, решениями или фокусами внимания. Если агитация избирателей достигнет 100 человек, то они начнут требовать независимости от Королевства."
 ENG_irish_tension_tooltip: "Напряженность в североирландских отношениях представляет собой напряженность между протестантами-юнионистами и католиками-республиканцами. Принимаемые нами решения могут привести к обострению напряженности, и если напряженность достигнет 50%, то время от времени будут возникать ожесточенные столкновения. Если напряженность продолжит расти выше 50%, то скорость возникновения столкновений возрастет."
 ENG_scotland_gui_tooltip: "Шотландия\n-------------\n£GFX_click_right §YПравый клик§! — уменьшить агитацию на 2\n - Будет тратить §R5%§! налоговых поступлений, пока активна!"
