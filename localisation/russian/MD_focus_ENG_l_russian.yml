 ENG_royal_navy_Idea3_desc: "Королевский военно-морской флот Великобритании является одной из ведущих морских сил мира, история которой уходит корнями в глубь веков. Известный своей адаптивностью и технологическим совершенством, Королевский военно-морской флот играет решающую роль в защите морских интересов Соединенного Королевства и распространении мощи по всему миру."
