 ENG_declare_economic_hegemony_desc: "Пришло время нам объявить себя экономическим гегемоном Содружества"
 ENG_declare_military_hegemony: "Провозгласить военную гегемонию"
 ENG_declare_military_hegemony_desc: "Пришло время нам объявить себя военным гегемоном Содружества"
 ENG_declare_political_hegemony: "Провозгласить политическую гегемонию"
 ENG_declare_political_hegemony_desc: "Пришло время нам объявить себя политическим гегемоном Содружества"
 ENG_fractured_kingdom_united_state_decisions: "Следующая эпоха"
 ENG_fractured_kingdom_united_state_decisions_desc: "С приходом к власти нового режима в [ENG.GetFlag] Британии мы наконец сможем быстро, стремительно и агрессивно распространить свое влияние на другие страны.\n\n Мы сможем создать под своим началом частную военную компанию, которая будет сеять хаос по всему миру."
 ENG_grant_land_in_isle_of_man: "Преобразите остров Мэн"
 ENG_grant_land_in_isle_of_man_desc: "Несмотря на свое историческое значение, остров Мэн сегодня служит нам очень мало для чего, кроме добычи ресурсов. Однако, если мы предоставим эту землю нашей новой организации PMC, они смогут полностью раскрыть свой потенциал и использовать ее как возможную базу для переезда для проведения операций."
 ENG_devolved_matters: "Делегированные полномочия"
 ENG_devolved_matters_desc: "Входящие в состав нашей страны штаты настаивали на более §Hразвитом государстве§!, чтобы они могли получить номинальную или действительную независимость. Три основных штата: [SCO.GetFlag] §HШотландия§!, [NIR.GetFlag] §HСеверный остров§! и [WAS.GetFlag] §HУэльс§!.\n\nЕсли положение нашей страны ухудшится, избиратели попытаются принять законопроекты, которые уменьшат их зависимость, на которые мы можем наложить вето, рискуя усилить их агитацию.\n\nРешения будут приниматься по мере децентрализации. Дополнительную информацию можно найти в графическом интерфейсе децентрализации в правом нижнем углу экрана, который обозначен фрагментом пазла. \n\n Следующие выборы в Учредительное собрание: [?ROOT.ENG_election_var|Y0] Месяц(и)"
