 ENG_the_inner_circle_dm_desc: "Ближайшее окружение королевы состоит из членов королевской семьи и самых доверенных лиц [ENG.GetNameDef], преданных королеве $ENG_elizabeth_queen$ и готовых отстаивать ее авторитет и защищать интересы короны.  Связанные долгом и престижем, они соперничают за близость к монарху, назначения и его доверие, зная, что влияние при дворе может формировать политику, скрытую от глаз общественности.  Их руки тянутся к военным, промышленным и политическим решениям, направляя Британию с помощью покровительства, доступа к информации и негласного руководства."
