 ENG_create_new_faction_TT: "Будет создана новая фракция: Организация атлантической безопасности\n\n Мы сможем свергать иностранные правительства с помощью [ADS.GetFlag] Альбиониса!\n — у нас будет 3 попытки использовать эту способность, которая доступна в меню влияния через кнопку переворота. Появится дополнительная опция, которая позволит вам использовать [ADS.GetFlag] Альбиониса, чтобы свергнуть правительство в Европе, получив вассала и союзника."
 ENG_collapse_of_society_TT: "£text_icon_kaldanger Выбор этого варианта может привести к свержению правительства!\n - Это позволит нам сосредоточиться на §H«Расколотом королевстве», «Соединенных штатах»§!\n - Через некоторое время в дело вступят военные и возьмут власть в свои руки"
 ENG_do_fp_TT: "Прошла как минимум §H3§! курса по внешней политике"
 ENG_core_desc_TT: "Добившись экономической, военной и политической гегемонии, мы сможем показать трем основным государствам Содружества, что мы можем обеспечить их и защитить. Кроме того, их избиратели будут более склонны присоединиться к нам, если наши условия будут лучше."
 ENG_econ_hegemony_TT: "«Деньги решают все»\n\n Достигнув экономической гегемонии, мы сможем интегрировать другие экономики, например экономики стран Содружества. Для этого нам нужно:\n\n Иметь ВВП выше, чем у всех трех стран вместе взятых\n — наш ВВП в настоящее время составляет $[?gdp_per_capita] (тысяч) \n — их ВВП в настоящее время составляет $[?commonwealth_total_gdp] (тысяч)"
 ENG_military_hegemony_TT: "«Сильная армия — сильное государство»\n\n Достигнув военной гегемонии, мы сможем продемонстрировать, что способны защитить наши территории и народ. Для этого нам нужно:\n\n Больше личного состава, чем у всех трех стран вместе взятых\n — в настоящее время у нас [?ENG.deployed_army_manpower_k] (тысяч) военнослужащих\n — в настоящее время у них [?commonwealth_total_army] (тысяч) военнослужащих"
 ENG_political_hegemony_TT: "«Все, что нужно, — это дергать за ниточки»\n\n Добившись политической гегемонии, мы продемонстрируем, что правление Вестминстера стабильно, что оно налажено и что мы поддерживаем связь со всеми людьми из всех слоев общества. Для этого нам нужно:\n\n Сильная сфера влияния\n — не менее 50 % влияния во всех трех странах."
 ENG_tooltip_TT: "Отвечал всем требованиям, предъявляемым к экономической Гегемонии"
 ENG_tooltip2_TT: "Отвечал всем требованиям, предъявляемым к военной гегемонии"
 ENG_has_met_all_requirements_TT: "Является гегемоном во всех трех категориях"
 ENG_hold_for_280_TT: "Мы должны удерживать нашу столицу в течение 280 дней!"
 ENG_seize_sierra_leone_TT: "Если [SIE.GetFlag] §HСьерра-Леоне§! останется прозападной страной и будет сохранять мир:\n - мы сможем временно захватить их ресурсы в §HФритауне§! на основании решения"
