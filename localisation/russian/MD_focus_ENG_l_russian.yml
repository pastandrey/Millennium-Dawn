 ENG_william_1_idea: "Герцог Кембриджский"
 ENG_william_1_idea_desc: "Титул герцога Кембриджского был присвоен принцу Уильяму в качестве высшего королевского отличия, отмечающего его роль ведущей фигуры следующего поколения. Традиционно вручаемый сувереном выдающимся членам королевской семьи, он несет в себе престиж и четкое представление о национальном представительстве и общественном долге. В современной Великобритании это служит платформой для патронажа, служения и постоянной подготовки наследника к будущей ответственности."
