 ENG_prince_andrew: "Эндрю"
 ENG_prince_andrew_trait: "Герцог Йоркский"
 ENG_prince_andrew_leader_name: "$ENG_prince_andrew_trait$ Принц $ENG_prince_andrew$ "
 ENG_andrew_1_idea: "Командующий Королевским военно - морским флотом"
 ENG_andrew_1_idea_desc: "Будучи командующим Королевским военно-морским флотом, Эндрю с отличием служил в британском флоте, включая обязанности пилота вертолета и командира корабля. Это отражает его долгую действительную службу и лидерство в морских операциях, а также означает его глубокую связь с военно-морским наследием Соединенного Королевства."
 ENG_andrew_2_idea: "$ENG_andrew_1_idea$"
 ENG_andrew_2_idea_desc: "$ENG_andrew_1_idea_desc$"
 ENG_andrew_3_idea: "Герцог Йоркский"
 ENG_andrew_3_idea_desc: "Титул герцога Йоркского был присвоен Эндрю в знак его статуса старшего члена королевской семьи и второго сына государя. Традиционно вручаемый младшим сыновьям монарха, он обладает историческим престижем и давними ассоциациями с королевской службой и общественным долгом."
