 ENG_celsa_steel_idea_desc: "Долгосрочное партнерство с Кардиффским заводом Celsa обеспечивает постоянный приток переработанного лома в новую сталь, повышая выход сырья и давая нам рычаги для дальнейшего увеличения производства с каждым годом."
