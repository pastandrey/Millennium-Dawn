l_russian:
 united_kingdom_focus: "Дерево фокусов Соединенного Королевства"
 ENG_royal_army: "Британская армия"
 ENG_royal_army_desc: "Британская армия — основной сухопутный род войск Британских вооруженных сил. Она ведет свою историю от шотландской и английской армий, которые объединились в 1707 году в соответствии с Актом об унии. Британская армия участвовала почти во всех крупных войнах, включая Семилетнюю войну, Войну за независимость США, Наполеоновские войны, Крымскую войну, а также Первую и Вторую мировые войны. За это время она превратилась из преимущественно пехотной армии в высокотехнологичную механизированную армию с различными вспомогательными подразделениями и спецподразделениями мирового уровня, которые служат образцом для других армий мира."
 ENG_irish_referendum: "[GetYear] [NIR.GetFlag] Референдум о независимости Северной Ирландии"
 ENG_irish_referendum_desc: "[NIR.GetFlag] Ирландцы проголосуют на референдуме, который определит их будущее как нации, субъекта и игрока на Британских островах."
 ENG_scottish_referendum: "[GetYear] [SCO.GetFlag] Шотландский референдум о независимости"
 ENG_scottish_referendum_desc: "[SCO.GetFlag] Шотландцы проголосуют на референдуме, который определит их будущее как нации, субъекта и игрока на Британских островах."
 ENG_merit_based_education_system_idea: "Система образования, основанная на заслугах"
 britain_md.1.t: "Наши амбиции в отношении Британии"
 britain_md.1.d: "Народ высказался, и было решено, что Лейбористская партия — это партия, которую народ хочет видеть в качестве своего представителя в будущем. Наше стремление к тому, чтобы Британия стала лучшей страной в мире, безгранично, и мы немедленно приступим к решению проблем нашего великого союза."
 britain_md.2.t: "Воспользуемся нашим шансом?"
 britain_md.2.d: "Мы можем оказать значительное влияние на национальный рынок, поощряя инвестиции в определенные нишевые отрасли. Но это может вызвать опасения у инвесторов, вложивших деньги в конкурирующие отрасли, что приведет к небольшому экономическому спаду. В настоящее время в правительстве нет единого мнения о том, стоит ли предпринимать такие шаги сейчас."
 britain_md.3.t: "Даю великое обещание"
 britain_md.3.d: "Чтобы привлечь более широкую электоральную базу, нам нужно обратиться к одной из наших внутренних фракций. Это не только продемонстрирует нашу способность эффективно управлять различными сферами государственного управления, но и позволит нам получить немного дополнительного капитала для финансирования других проектов. Кроме того, получив рычаги влияния на эти фракции, мы сможем переломить ход будущих выборов в свою пользу и обойти наших политических соперников."
 britain_md.4.t: "Кого мы облагаем налогом?"
 britain_md.4.d: "Наше правительство оказалось в уникальной ситуации. Чтобы увеличить доходы государства, нам нужно повысить налоги для финансирования социальных программ. Однако это так или иначе вызовет недовольство одной из групп населения, а против всеобщего повышения налогов выступают, поскольку оно может нанести наибольший ущерб нашей репутации. Вместо этого наш кабинет министров предлагает обложить налогами одну из групп населения, чтобы никого не обидеть."
 britain_md.5.t: "Британия Вперед, А не Назад"
 britain_md.5.d: "Мы должны не допустить возвращения общества к репрессиям, к которым продолжают призывать некоторые наши политические оппоненты. Мы будем бороться за то, чтобы Британия продолжала уверенно двигаться в будущее. Наши ценности, порядок и стабильность не должны подвергаться сомнению ни при каких обстоятельствах, и мы будем бороться за то, чтобы оставаться у власти."
 britain_md.6.t: "Царапающий Британское небо"
 britain_md.7.t: "Никто не остался позади"
 britain_md.7.d: "Неравенство продолжает расти во всем мире, будь то в Европе, Азии, Африке или Америке. Зарплаты стагнируют, цены стремительно растут, и жизнь сама по себе становится непосильной ношей. Однако для граждан Соединенного Королевства это не должно быть нормой! Благодаря быстрым реформам и новой политике мы докажем всему миру, что не стоит поддаваться растущему неравенству."
 britain_md.8.t: "Связи между этими двумя?"
 britain_md.8.d: "Многие представители правого политического спектра заявляют, что рост преступности напрямую связан с увеличением миграционного потока в последние годы. Хотя многие опровергают эти утверждения, называя их ксенофобскими и нетерпимыми, другие утверждают, что причина в неспособности некоторых мигрантов и беженцев ассимилироваться в [ENG.GetAdjective] культуре."
 britain_md.9.t: "Всегда может быть лучше"
 britain_md.9.d: "Британия не обязана быть такой же, как весь остальной мир, она может быть лучше. Благодаря серьезным политическим реформам мы можем переломить тенденцию к откату от демократических принципов и сделать Британию такой, какой она могла бы быть. На этот раз Лейбористская партия пообещала провести радикальные социальные и политические реформы, и наше послание дойдет до жителей Британии как никогда раньше."
 britain_md.10.t: "Пересмотр закона о лоббировании?"
 britain_md.10.d: "Некоторые члены нашего кабинета все чаще призывают пересмотреть закон о лоббировании. Такой шаг, конечно, вызовет бурю негодования и может привести к росту коррупции в правительстве. Однако, если мы хотим быстро заручиться поддержкой и финансированием для нашей партии, возможно, нам стоит хотя бы рассмотреть возможность внесения некоторых изменений в закон."
 britain_md.11.t: "Как вбить немного здравого смысла в голову британцам"
 britain_md.11.d: "Пора вернуть эту страну, погрязшую в хаосе, к нормальной жизни. Похоже, здравый смысл был полностью отвергнут, когда представители Лейбористской партии начали проводить реформы, которые могут привести к необратимым последствиям. Наше правительство должно подтолкнуть Британию к созданию более сильного и независимого государства, не зависящего от Брюсселя или кабинета левых."
 britain_md.12.t: "[FROM.GetName] запрашивает военный доступ"
 britain_md.12.d: "В явной попытке сделать Европу более гибким континентом в вопросах обороны [ENG.GetAdjective] решили разослать запросы на предоставление военного доступа.  Хотя мы ничего не выиграем от этого, мы и не потеряем ничего существенного."
 britain_md.13.t: "Британское участие"
 britain_md.13.d: "Британское правительство поклялось помочь нам в борьбе с нашими врагами и защите суверенитета нашего государства. Но оно не особо прояснило, чего ожидает взамен. Мы получили информацию из надежного источника о том, что британское правительство намерено захватить наши ресурсы во Фритауне на срок до 500 дней, если оно будет иметь значительное влияние на нас. Они намерены сделать это независимо от того, разрешим мы им ввести войска или нет."
 britain_md.14.t: "Британцы захватывают наши ресурсы!"
 britain_md.14.d: "Британцы захватили наши ресурсы, потому что имеют значительное влияние на нас. Это продлится 500 дней, пока они не уйдут."
 britain_md.15.t: "Конец миссии: Баррас"
 britain_md.15.d: "Наше пребывание в Сьерра-Леоне подходит к концу, и мы начали подготовку к ликвидации организаций, которые вывозили ресурсы из Сьерра-Леоне для получения прибыли в Великобритании."
 britain_md.16.t: "Переворот в Гамбии?"
 britain_md.16.d: "Пришло время положить конец тирании [GAM.GetLeader] в Гамбии.  Мы организуем свержение их правительства, но если мы перестараемся, это может привести к гражданской войне и выйти из-под нашего контроля."
 britain_md.17.t: "Успешный государственный переворот в Гамбии"
 britain_md.17.d: "Мы успешно свергли деспотичный режим в Гамбии и привели к власти правительство, которое нам подходит. Народ Гамбии больше не будет страдать от бессмысленных репрессий."
 britain_md.18.t: "Провал попытки государственного переворота в Гамбии"
 britain_md.18.d: "Нам не удалось свергнуть [GAM.GetLeader], и в результате мы потеряли нескольких британских военнослужащих.  Наша попытка государственного переворота вызвала резкую критику на международном уровне, а отношения с правительством Гамбии ухудшились."
 britain_md.19.t: "Невероятно успешный переворот в Гамбии"
 britain_md.19.d: "Наши усилия в Гамбии увенчались более чем успехом. Мы не только свергли деспотичное правительство, но и установили жесткий контроль над государством, фактически превратив его в сателлит."
 britain_md.20.t: "Операция \"Дельта Гвардия\": Успех"
 britain_md.20.d: "Нам удалось захватить стратегически важные нефтяные месторождения в дельте Нигера, и нигерийские войска отступают на север, к своей столице.  Пока неизвестно, предпримут ли они ответные действия, но пока мы наслаждаемся плодами войны."
 britain_md.21.t: "Британские войска захватывают нефтяные месторождения в дельте Нила"
 britain_md.21.d: "Британские войска грубо нарушили наш суверенитет и объявили наши священные нефтяные месторождения находящимися под «временной защитой», назвав наше правительство нестабильным и ненадежным.  Мы понятия не имеем, почему они решили, что военные действия — это лучший выход из сложившейся ситуации, но одно можно сказать наверняка: мы не можем оставить это без внимания."
 britain_md.22.t: "Нигерия наносит ответный удар"
 britain_md.22.d: "Несколько британских военнослужащих получили ранения, а некоторые даже погибли в результате ответной атаки вооруженных сил Нигерии. Это стало ответом на захват Дельтой нескольких нефтяных месторождений, обеспечивший доступ к жизненно важной нефти, добываемой нестабильным правительством Нигерии. Мы должны захватить столицу Нигерии, чтобы поставить их на место."
 britain_md.23.t: "Британские войска Отступают"
 britain_md.23.d: "Опасаясь мощи великих нигерийских вооруженных сил и доблестного руководства [NIG.GetLeader], трусливые британские войска покинули дельту Нигера и прекратили все операции по добыче нефти.  Мы одержали победу в этом сражении и не ожидаем дальнейших ответных действий со стороны британцев."
 britain_md.24.t: "Выберите повестку дня"
 britain_md.24.d: "Наша партия победила на выборах, и теперь нам нужно определиться с повесткой."
 britain_md.25.t: "Соединённое Королевство — информация, пожалуйста, прочтите"
 britain_md.25.d: "Привет! Похоже, вы выбрали Соединённое Королевство в качестве вашей страны, надеемся, вам понравится!\n\nВ данный момент вы играете в Фазу I переработки Великобритании, которая включает обновлённое дерево фокусов, набор решений и механики монархии. Возможно, вы задаётесь вопросом, будет ли что-то ещё — ответ: да, будет.\n\nФаза II:\nВ Фазе II вы можете ожидать более глубокой системы деволюции и улучшенной системы Палаты общин.\n\nФаза III:\nВ Фазе III вас ждёт расширенное дерево внешней политики, дополнительные политические пути и многое другое!\n\nЕсли у вас есть отзывы о дереве фокусов, пожалуйста, сообщите нам через Discord, Reddit или GitHub!\n\n— Команда MD United Kingdom"
 britain_md.26.t: "Переходим к Новой политике в отношении Фолклендских островов"
 britain_md.26.d: "В последнее время все чаще звучат призывы к дальнейшей работе по интеграции Фолклендских островов или к принятию дальнейших мер. Последние могут показаться несколько агрессивными, но в долгосрочной перспективе они принесут нам пользу. Есть и те, кто хочет, чтобы мы вернули Фолклендские острова и укрепили свой имидж в южноамериканском регионе."
 ENG_british_flag_on_the_moon: "Британский флаг на Луне"
 ENG_british_flag_on_the_moon_desc: "Отправляйтесь в амбициозную лунную миссию, поскольку Соединенное Королевство стремится создать британскую базу на Луне. Эта лунная инициатива символизирует приверженность страны освоению космоса, демонстрирует технологическое мастерство и способствует научным инновациям. Открывайте космические рубежи, повышая глобальный авторитет Великобритании в области освоения космоса."
 ENG_set_sail_to_mars: "Отправляйся в плавание на Марс"
 ENG_set_sail_to_mars_desc: "Выходя за пределы Земли, Соединенное Королевство смело стремится установить свое присутствие на Марсе. Эта дальновидная инициатива направлена на новаторское исследование Марса, расширение границ космических технологий и позиционирование Великобритании как ключевого игрока в стремлении человечества достичь Красной планеты. Примите вызов покорения Марса, определяя роль Великобритании в будущем межпланетных исследований."
 ENG_new_thirteen_colonies: "Новые тринадцать колоний"
 ENG_new_thirteen_colonies_desc: "Прокладывая курс на новые рубежи, Соединенное Королевство черпает вдохновение из истории, представляя создание новых тринадцати колоний на Марсе. Перекликаясь с духом первоначальных тринадцати колоний, эта амбициозная инициатива свидетельствует о приверженности Великобритании заселению Марса, принимая во внимание проблемы межпланетной колонизации. Возглавьте работу по созданию нового наследия на Красной планете, где британские первопроходцы отправляются в путешествие, напоминающее об исторических корнях нации."
 ENG_asteroid_mining: "Добыча полезных ископаемых на астероидах"
 ENG_asteroid_mining_desc: "Продвигайтесь вперед в космос вместе с Британской королевской компанией по добыче астероидов, поскольку Соединенное Королевство занимается добычей небесных ресурсов. Эта инициатива, направленная на извлечение ценных ресурсов из астероидов, символизирует приверженность страны новаторскому использованию космических ресурсов и передовых технологий."
 ENG_standardized_space_parts: "Стандартизированные части пространства"
 ENG_standardized_space_parts_desc: "Произведите революцию в доступности космических исследований благодаря стремлению к производству стандартизированных космических запчастей в Соединенном Королевстве. За счет оптимизации и стандартизации компонентов эта инициатива направлена на то, чтобы сделать космические предприятия более рентабельными, что свидетельствует о приверженности страны содействию доступному и экономичному освоению космоса."
 ENG_virgin_galactic: "Virgin Galactic"
 ENG_virgin_galactic_desc: "Являясь лидером в индустрии космического туризма, Virgin Galactic стремится сделать космос доступным для всех. Благодаря инновационным космическим аппаратам и стремлению расширять границы освоения космоса Virgin Galactic символизирует роль Великобритании в формировании будущего гражданских космических приключений."
 ENG_british_commercial_spaceport: "Британский коммерческий космодром"
 ENG_british_commercial_spaceport_desc: "В условиях обострения глобальной космической гонки Соединенное Королевство осознает настоятельную необходимость закрепления своих позиций на переднем крае освоения космоса. Создание британского коммерческого космодрома является ключевым направлением в продвижении позиций страны в коммерческом космосе. Инвестируя в строительство и развитие специализированного космодрома, Великобритания стремится стимулировать инновации, привлекать международных партнеров и поднимать свою аэрокосмическую промышленность на новые высоты, обеспечивая себе многообещающее будущее в качестве ключевого игрока на космических рубежах."
 ENG_united_kingdom_space_command: "Космическое командование Соединенного Королевства"
 ENG_united_kingdom_space_command_desc: "Поскольку космос становится новой ареной стратегического влияния, Соединенное Королевство признает необходимость консолидации своих усилий в области космических операций. Создание космического командования Соединенного Королевства является решающим шагом, направленным на объединение и укрепление космического потенциала страны. Централизуя командование, поощряя совместные операции и инвестируя в передовые технологии, Великобритания стремится защитить свои интересы в космической сфере, обеспечивая грозное присутствие среди звезд и защищая национальную безопасность в космическую эпоху."
 ENG_istari_programme: "Программа ISTARI"
 ENG_istari_programme_desc: "В ответ на меняющийся глобальный ландшафт Соединенное Королевство вводит Программу ISTARI - амбициозный проект, посвященный разведке, наблюдению, обнаружению целей и рекогносцировке в киберпространстве."
 ENG_space_red_coats: "Космические фузилёры"
 ENG_space_red_coats_desc: "Черпая вдохновение из славного прошлого, Великобритания возрождает наследие «Красных мундиров» в лице Космических фузилёров XXI века. Олицетворяя дух исторической стойкости, эта инициатива выводит британские исследования космоса на новый уровень. В символических красных мундирах Космические Красные мундиры стремятся исследовать Вселенную, продолжая традицию открытий и проецируя влияние Великобритании на небесные просторы."
 ENG_1st_space_force_division: "1-я дивизия космических войск"
 ENG_1st_space_force_division_desc: "Проложив курс за пределы Земли, Великобритания смело создаёт Британскую дивизию космических войск. Беспрецедентная в истории, она открывает новую эру, становясь первым специализированным космическим подразделением страны. Задача дивизии — защищать космические интересы и осваивать неизведанное. Дивизия космических войск символизирует приверженность нации исследованию и обеспечению безопасности космического пространства, где Юнион Джек будет развеваться среди звёзд."
 ENG_space_capabilities: "Киберспособность"
 ENG_space_capabilities_desc: "Осознавая первостепенное значение цифрового пространства, Великобритания сосредотачивается на развитии киберспособностей. В эпоху, когда информация — это сила, эта инициатива отражает стремление укрепить позиции страны в кибероперациях."
 ENG_strategic_defence_review: "Белая книга по обороне [GetYear]"
 ENG_strategic_defence_review_desc: "Наши приоритеты и угрозы постоянно меняются, и военная бюрократия должна развиваться, чтобы им противостоять. Координируя новый ответ в области национальной безопасности с партнёрами в правительстве и союзниками, мы обеспечиваем адаптивность армии и её готовность противостоять угрозам безопасности Великобритании."
 ENG_AS90: "AS90 'Braveheart'"
 ENG_AS90_desc: "AS90 (Artillery System for the 1990s), также известная как Gun Equipment 155mm L131, - это основная бронированная самоходная артиллерийская установка, состоящая на вооружении британской армии. Она была разработана и построена оружейным подразделением компании Vickers Shipbuilding and Engineering в период с 1982 по 1987 год, а серийное производство началось в 1992 году - всего было выпущено 179 машин. AS90 заменила устаревшую 105-мм САУ FV433 Abbot, а также более старую 155-мм САУ M109. Предлагались программы модернизации AS90, предусматривающие установку более длинного ствола калибра 52, что позволило бы увеличить дальность стрельбы без применения вспомогательных средств, а также использовать боеприпасы увеличенной дальности."
 ENG_operation_excellence: "Специальное командование"
 ENG_Operation_Excellence_desc: "Наши вооруженные силы — это небольшая, но профессиональная и боеспособная группировка, способная оперативно развертываться на территории страны для оказания помощи гражданским властям и другим правительственным ведомствам по мере необходимости. Этот потенциал обеспечения безопасности внутри страны может быть расширен и поддержан для защиты Великобритании."
 ENG_utility_vehicle_modernisation: "Модернизация вспомогательной техники"
 ENG_utility_vehicle_modernisation_desc: "Опыт, полученный в Северной Ирландии в период конфликта «Смуты» (The Troubles), показал, что используемые армией пехотные вспомогательные автомобили, такие как Snatch Land Rover, практически не обеспечивают защиту от самодельных взрывных устройств и мин; в отчетах о выживших указывалось, что сама конструкция машины нередко причиняла дополнительный вред экипажу при подрыве. В связи с этим Министерство обороны начало рассматривать варианты замены на современные машины с противоминной и противозасадной защитой по типу американского MRAP Cougar."
 ENG_nlaw_anti_tank_system: "ПТРК NLAW"
 ENG_nlaw_anti_tank_system_desc: "Противотанковый ракетный комплекс NLAW (MBT LAW или R85) от SAAB Bofors Dynamics — это одноразовая, легкая, управляемая по линии прицеливания ракета «выстрелил — забыл», предназначенная для пехоты. Он был разработан компанией SAAB для министерств обороны Великобритании и Швеции в рамках проекта Team NLAW с участием различных подрядчиков, включая значительную роль Thales Air Defences."
 ENG_startstreak_anti_air_system: "Зенитный ракетный комплекс Starstreak"
 ENG_startstreak_anti_air_system_desc: "Starstreak — британская зенитная ракета малой дальности, как переносной зенитный ракетный комплекс (ПЗРК), так и в различных вариантах установки на вертолетах и бронетехнике для мобильного прикрытия. Производится компанией Thales Air Defence в Белфасте, Северная Ирландия. После запуска ракета разгоняется до скорости свыше Маха 4, что делает её самой быстрой ракетой малой дальности в мире. Для повышения эффективности она выпускает три самонаводящихся боевых элемента, движущихся по лазерному лучу, что увеличивает вероятность попадания в цель."
 ENG_M270: "Модернизация САУ M270"
 ENG_M270_desc: "Министерство обороны планирует вложить средства в модернизацию (капитальный ремонт) действующих гусеничных пусковых установок M270 и различных типов ракет для них, чтобы дополнить закупку боеприпасов для системы Guided Launch Rocket System. Планируется установка новых двигателей, усиленной брони и современного комплекса управления огнём."
 ENG_mobile_fires_platform_program: "Программа мобильных артиллерийских платформ"
 ENG_mobile_fires_platform_program_desc: "После окончания холодной войны и снижения угрозы конфликта на Германских равнинах запасы 155-мм артиллерийских систем армии сократились. Теперь, с появлением новых угроз, Министерство обороны решило восстановить эту способность. Появилось множество претендентов на выполнение этого контракта, но успешным будет только один из них."
 ENG_fres_program: "Программа FRES"
 ENG_fres_program_desc: "Программа FRES (Future Rapid Effect System) представляет собой перспективный подход к развитию военных возможностей. Сосредоточенная на мобильности и универсальности, FRES призвана обеспечить британские вооружённые силы разнообразными наземными платформами, включая бронированную технику и системы поддержки."
 ENG_fix_civil_servant: "Модернизация винтовки «Civil Servant»"
 ENG_fix_civil_servant_desc: "Изначально L85A1 вызывала частые жалобы и проблемы с эксплуатацией у войск, поэтому винтовка прошла комплексную модернизацию из-за трудного обслуживания и ненадёжной работы. Часто её прозвали «Civil Servant» («Госслужащий») из-за предполагаемой ненадёжности и сложного устройства, что и стало причиной серьёзного обновления в 2000–2002 годах. Примерно 200 000 из существующих 320 000 автоматов L85A1 были модернизированы."
 ENG_modern_littoral_force: "Современные прибрежные силы"
 ENG_Modern_Littoral_Force_desc: "Британские современные прибрежные силы — это стратегическая инициатива, направленная на усиление военно-морских возможностей в прибрежных районах. Под руководством Великобритании эта модернизированная сила объединяет передовые морские технологии, универсальные корабли и способности к быстрому реагированию, обеспечивая доминирование на морских коммуникациях в прибрежной зоне. Сосредоточенность на мобильности и адаптивности позволяет укрепить возможности Великобритании по защите прибрежных интересов, реагированию на новые угрозы и поддержанию региональной стабильности."
 ENG_trident_nuclear_program: "Ядерная программа Trident"
 ENG_Trident_Nuclear_Program_desc: "Программа Trident (Трезубец) — это постоянное ядерное сдерживание Великобритании в море, базирующееся на подводных лодках типа Vanguard, вооружённых баллистическими ракетами Trident II D5. Эта стратегическая инициатива, управляемая на объектах в Aldermaston и Burghfield, демонстрирует приверженность страны мобильной и мощной системе обороны."
 ENG_monthballing_operations: "Операции с ежемесячным сбросом"
 ENG_Monthballing_Operations_desc: "В ответ на финансовые трудности британское правительство выбирает прагматичный путь консервации военно-морских кораблей, решение, встреченное с оговорками со стороны военно-морской промышленности, в частности BAE. Этот шаг, направленный на экономию ресурсов, вызывает обеспокоенность в отрасли по поводу потенциальных последствий для производства и рабочей силы."
 ENG_general_dynamics_ajax: "General Dynamics Ajax"
 ENG_general_dynamics_ajax_desc: "General Dynamics Ajax, ультрасовременная разведывательная машина, стала краеугольным камнем в усилиях по модернизации британских Вооруженных сил. Разработанная для удовлетворения требовательных потребностей современной войны, эта маневренная и усовершенствованная бронированная машина интегрировала в себя передовые технологии, обеспечивающие беспрецедентные разведывательные возможности."
 ENG_challenger_lethality_improvement_programme: "Программа повышения летальности Challenger"
 ENG_challenger_lethality_improvement_programme_desc: "Программа повышения смертоносности Challenger представляла собой программу замены текущего нарезного ружья L30A1 на гладкоствольное 120-мм ружье Rheinmetall, которое в настоящее время используется в Leopard 2 и M1 Abrams. Использование гладкоствольного оружия позволило бы \"Челленджеру-2\" использовать стандартные боеприпасы НАТО, включая проникающие элементы с кинетической энергией на основе вольфрама, которые не вызывают тех же политических и экологических возражений, что и снаряды с обедненным ураном."
 ENG_challenger_3: "Challenger 3"
 ENG_challenger_3_desc: "Танк Challenger 3, с гордостью разработанный Соединенным Королевством, олицетворяет передовые методы ведения бронетанковой войны. Благодаря новейшим технологиям, огромной огневой мощи и улучшенной защите Challenger 3 обеспечивает превосходство на поле боя. Этот модернизированный танк подчеркивает приверженность Великобритании сохранению грозных бронетанковых сил, готовых противостоять вызовам современной войны."
 ENG_modern_landing_craft: "Современный десантный катер"
 ENG_Modern_Landing_Craft_desc: "В рамках своей постоянной приверженности укреплению военно-морского потенциала Соединенное Королевство осуществляет инициативы по модернизации, включая инвестиции в новые десантные корабли. В соответствии с будущей программой коммандос Великобритания стремится укрепить свои десантные силы, особенно Королевскую морскую пехоту, обеспечивая повышенную эффективность прибрежных и десантных операций."
 ENG_mechanised_amphibious_assault: "Механизированный десантный отряд"
 ENG_Mechanised_Amphibious_Assault_desc: "Подчеркивая адаптивность и скорость, Соединенное Королевство разрабатывает всеобъемлющую Доктрину механизированного десанта. Основанная на синергии Королевской морской пехоты и Королевского военно-морского флота, эта стратегия использует специализированные десантные машины (AAV) и десантные катера для быстрого развертывания на побережье. Интегрированное командование и контроль, поддержка с воздуха и развертывание специальных десантных кораблей подчеркивают приверженность Великобритании поддержанию грозных и универсальных сил, обеспечивающих готовность к различным сценариям посредством тщательной подготовки и учений."
 ENG_aircraft_ai_integration: "Интеграция искусственного интеллекта в самолет"
 ENG_aircraft_ai_integration_desc: "Руководствуясь принципом приоритета качества над количеством, Соединенное Королевство уделяет приоритетное внимание совершенству и технологическому превосходству в своих вооруженных силах. Этот национальный дух подчеркивает необходимость приобретения передового оборудования, обеспечивающего мощную и технологически продвинутую оборону. Уделяя особое внимание качеству, Великобритания стремится максимально повысить эффективность своих вооруженных сил, создавая стратегическое преимущество перед лицом современных вызовов."
 ENG_strike_brigades: "Ударные бригады"
 ENG_Strike_Brigades_desc: "В ответ на растущие угрозы Соединенное Королевство создает британские ударные бригады - универсальные и быстро развертываемые подразделения, предназначенные для маневренных наземных операций. Состоящие из пехоты, бронетехники и артиллерии, эти бригады воплощают приверженность страны быстрому и гибкому военному реагированию. Акцент на Ударных бригадах повышает способность Великобритании демонстрировать мощь и эффективно реагировать на динамичные и разнообразные вызовы безопасности."
 ENG_future_soldier_armed_forces: "Будущий солдат вооруженных сил"
 ENG_future_soldier_armed_forces_desc: "Инициатива \"Солдат будущего\" - это перспективная стратегия, принятая вооруженными силами, включая Соединенное Королевство. Она направлена на оснащение солдат передовыми технологиями и возможностями, повышение их эффективности на современном поле боя."
 ENG_joint_expeditionary_force: "Объединенные экспедиционные силы"
 ENG_joint_expeditionary_force_desc: "Созданные в 2012 году и представленные тогдашним начальником штаба обороны генералом сэром Дэвидом Ричардсом, Объединенные экспедиционные силы (JEF) возникли в результате роспуска Объединенных сил быстрого реагирования (JRRF) во время проведения Великобританией операций в Афганистане и Ираке. Британский компонент JEF, состоящий из персонала и оборудования Королевского военно-морского флота, Королевской морской пехоты, британской армии и Королевских военно-воздушных сил, уделяет приоритетное внимание усиленной интеграции. Эта интеграция особенно подчеркивается при совместной работе с вооруженными силами других стран, что знаменует значительный сдвиг по сравнению с предыдущими моделями."
 ENG_carrier_group_debate: "Дебаты группы авианосцев"
 ENG_Carrier_Group_Debate_desc: "Важнейшей частью современного военно-морского флота являются авианосные ударные группы. Нам нужно обсудить, как их лучше создавать."
 ENG_worldwide_reach: "Охват по всему миру"
 ENG_worldwide_reach_desc: "Великобритания когда-то была сверхдержавой, имевшей влияние по всему миру для защиты своих интересов. Нам нужно вернуться к этой власти, чтобы отстаивать наши интересы по всему миру"
 ENG_national_service_debate: "Дебаты о Национальной службе"
 ENG_national_service_debate_desc: "Армия, основанная на добровольцах, не может угнаться за растущими потребностями британских войск по всему миру. Нам нужно увеличить нашу осадку, чтобы удовлетворить спрос"
 ENG_army_special_operations_brigade: "Армейская бригада специальных операций"
 ENG_reestablish_far_east_command: "Восстановить командование на Дальнем Востоке"
 ENG_reestablish_far_east_command_desc: "Восстановление британией Дальневосточного командования знаменует стратегическую переориентацию на усиление военного потенциала в этом ключевом регионе. Эта инициатива предполагает развертывание командных структур, оперативных подразделений и материально-техническую поддержку для эффективного реагирования на меняющуюся динамику безопасности. Укрепляя присутствие и координацию на Дальнем Востоке, британские Вооруженные силы стремятся умело реагировать на региональные вызовы, укреплять партнерские отношения с союзниками и вносить значительный вклад в общую стабильность этой стратегически важной части мира."
 ENG_britannia_armed_forces: "Вооруженные силы Британии"
 ENG_britannia_armed_forces_desc: "Благодаря нашим усилиям по воссозданию нашей мировой военной мощи мы, наконец, можем сказать, что у нас есть армия, способная защищать интересы Великобритании по всему миру"
 ENG_allied_basing_efforts: "Усилия союзников по Базированию"
 ENG_allied_basing_efforts_desc: "Инициатива по базированию союзников представляет собой единое обязательство государств-членов Североатлантического союза по укреплению стратегического потенциала. В рамках этой инициативы Соединенное Королевство извлекает выгоду из устойчивого и существенного улучшения инфраструктуры, включая железные дороги, авиабазы, порты и многое другое. Это постоянное усовершенствование повышает логистическую мощь Великобритании и общую операционную эффективность."
 ENG_reactivate_naval_defense_act_1889: "Возобновить действие Закона о военно - морской обороне 1889 года"
 ENG_reactivate_naval_defense_act_1889_desc: "В знак символического уважения к историческому значению военно-морского флота возобновление действия Закона о военно-морской обороне 1889 года знаменует собой устремленную в будущее приверженность укреплению военно-морского потенциала. Этот закон направлен на то, чтобы воплотить дух прошлого в современной военно-морской подготовке. Укрепляя принципы первоначального закона, Соединенное Королевство демонстрирует свою приверженность сохранению надежных и технологически продвинутых военно-морских сил. Закон мог бы включать положения о модернизации военно-морских средств, расширении военно-морской инфраструктуры и стратегических инвестициях для обеспечения того, чтобы Королевский военно-морской флот сохранял внушительное присутствие на мировой арене."
 ENG_royal_navy: "Королевский Военно - морской флот"
 ENG_royal_navy_desc: "Королевский военно-морской флот Великобритании является одной из ведущих морских сил мира, история которой уходит корнями в глубь веков. Известный своей адаптивностью и технологическим совершенством, Королевский военно-морской флот играет решающую роль в защите морских интересов Соединенного Королевства и распространении мощи по всему миру. "
 ENG_british_foreign_legion: "Британский Иностранный легион"
 ENG_british_foreign_legion_desc: "Придерживаясь модели международной службы, этот легион приветствует иностранных граждан, желающих служить в британских вооруженных силах. Созданный для укрепления духа товарищества, разнообразия и чувства общей цели, Британский иностранный легион становится уникальным средством для людей из разных слоев общества внести свой вклад в оборону Великобритании."
 ENG_multi_ocean_navy: "Многоокеанский Военно-морской флот"
 ENG_multi_ocean_navy_desc: "Чтобы защитить британские интересы по всему миру, нам необходимо увеличить наш военно-морской потенциал для нанесения ударов через океаны"
 ENG_Strategic_Aircraft_Training: "Подготовка стратегических самолетов"
 ENG_Strategic_Aircraft_Training_desc: "В наше время необходимы военно-воздушные силы, способные наносить удары по всем океанам. Чтобы иметь такую возможность, нам нужно увеличить количество стратегических авиаударов."
 ENG_field_army_expansion: "Расширение полевой армии"
 ENG_field_army_expansion_desc: "Инициатива по расширению полевой армии знаменует стратегическое обязательство Соединенного Королевства укрепить свои сухопутные войска, обеспечив надежный и легко адаптируемый военный потенциал. Это расширение предполагает увеличение численности и возможностей полевой армии, охватывающей основные сухопутные силы британской армии."
 ENG_type_31_frigate_inspiration_class: "Класс Вдохновения фрегата типа 31"
 ENG_type_31_frigate_inspiration_class_desc: "Фрегат \"Тип 31\" - это класс фрегатов общего назначения, разработанных для Королевского военно-морского флота, сочетающих передовые возможности с доступной ценой. Эти фрегаты предназначены для выполнения целого ряда функций, от сопровождения и охраны на море до оказания гуманитарной помощи и ликвидации последствий стихийных бедствий. Уделяя особое внимание модульности и адаптируемости, фрегат Type 31 оснащен современными датчиками, системами вооружения и гибким командным отсеком. Эта экономически эффективная платформа расширяет глобальное присутствие Королевского военно-морского флота и способствует его способности реагировать на различные военно-морские вызовы 21 века."
 ENG_multi_role_support_ship_project: "Проект многоцелевого вспомогательного судна"
 ENG_multi_role_support_ship_project_desc: ""
 ENG_expanded_carrier_wing_procurement: "Расширенные закупки крыла авианосца"
 ENG_expanded_carrier_wing_procurement_desc: "Инвестируя в расширение авианосного крыла, Соединенное Королевство стремится демонстрировать свою мощь, защищать морские интересы и вносить значительный вклад в обеспечение международной безопасности. Эта инициатива отражает стремление страны поддерживать современные и боеспособные военно-морские силы в условиях стремительно меняющейся ситуации в сфере глобальной безопасности."
 ENG_strategic_aircraft_strategy: "Стратегическая авиационная стратегия"
 ENG_strategic_aircraft_strategy_desc: "Стратегия стратегической авиации описывает подход Соединенного Королевства к приобретению, развертыванию и использованию стратегических авиационных средств. Эта всеобъемлющая стратегия охватывает целый ряд соображений, включая приоритеты национальной обороны, вызовы глобальной безопасности и технологические достижения."
 ENG_continent_operational_considerations: "Операционные соображения на Континенте"
 ENG_continent_operational_considerations_desc: "Нам нужно расставить приоритеты в нашей приверженности нашим вооруженным силам и союзникам. Поэтому нам нужно выбрать, на каком роде войск мы специализируемся."
 ENG_astute_class: "Подводная лодка класса \"Проницательный\""
 ENG_astute_class_desc: "Класс \"Проницательный\" - новейший класс атомных подводных лодок, находящихся на вооружении Королевского военно-морского флота. Лодки строятся на заводе BAE Systems Submarines в Барроу-ин-Фернессе."
 ENG_type_45_destroyer_upgrades: "Модернизация эсминца 45 - го типа"
 ENG_type_45_destroyer_upgrades_desc: "Проект модернизации эсминцев Type 45 направлен на повышение возможностей эсминцев Type 45 Королевского военно-морского флота за счет передовых технологий и системных усовершенствований. Ключевые области внимания включают радар, боевые системы, двигательную установку и усовершенствования противоракетной обороны."
 ENG_dreadnought_class: "Подводная лодка класса \" Дредноут \""
 ENG_dreadnought_class_desc: "Проект подводной лодки класса \"Дредноут\" предполагает проектирование, постройку и интеграцию подводных лодок с баллистическими ракетами следующего поколения для Королевского военно-морского флота. Эти подводные лодки будут обладать передовыми возможностями скрытности, двигательной установки и стратегического вооружения, обеспечивая Соединенному Королевству надежный потенциал ядерного сдерживания."
 ENG_type_26_frigate: "Фрегат 26 - го типа"
 ENG_type_26_frigate_desc: "Проект фрегата тип 26 предполагает строительство нового класса универсальных боевых кораблей для Королевского военно-морского флота. Эти фрегаты спроектированы таким образом, чтобы их можно было адаптировать к целому ряду задач, включая противолодочную оборону, противовоздушную оборону и оказание гуманитарной помощи. Оснащенные передовыми датчиками, системами вооружения и двигательными установками, фрегаты Type 26 станут краеугольным камнем надводного флота Королевских ВМС, повышая его способность эффективно действовать в современных военно-морских условиях."
 ENG_type_83_destroyer: "Эскадренный миноносец 83 - го типа"
 ENG_type_83_destroyer_desc: "Эсминец \"Тип 83\" - это будущий класс эсминцев с управляемыми ракетами, которые должны войти в состав Королевского военно-морского флота в середине-конце 2030-х годов. Этот предлагаемый класс обещает расширенные возможности и модернизированные характеристики для удовлетворения растущих военно-морских требований. Разработанный с учетом универсальности и мощи, эсминец Type 83 представляет собой ключевое достижение в морских возможностях Королевского военно-морского флота, обеспечивая готовность и эффективность в будущих оперативных условиях."
 ENG_qinetiq_dragonfire_system: "Система Qinetiq Dragonfire"
 ENG_qinetiq_dragonfire_system_desc: "Dragonfire представляет собой передовую британскую демонстрацию технологий лазерного оружия с направленной энергией. Представленный на международной конференции по оборудованию для обороны и безопасности в Лондоне в 2017 году, он разработан британской компанией Dragonfire в сотрудничестве с британскими MBDA, Leonardo, QinetiQ и Лабораторией оборонной науки и технологий. Как ключевой демонстратор технологий, Dragonfire пройдет тщательные испытания для оценки лазерного оружия с направленной энергией и его перспективного применения в Вооруженных силах Великобритании, что ознаменует значительный прогресс в военных инновациях и развитии потенциала."
 ENG_auxiliary_royal_navy: "Вспомогательный Королевский Военно - морской флот"
 ENG_auxiliary_royal_navy_desc: "Вспомогательный Королевский военно-морской флот исторически относился к кораблям с гражданским экипажем, которые поддерживают и дополняют операции Королевского военно-морского флота во время конфликтов или кризисов."
 ENG_revitalise_merchant_navy: "Возрождение торгового флота"
 ENG_revitalise_merchant_navy_desc: ""
 ENG_bay_slass_landing_ships: "Десантные корабли класса \" Бэй \""
 ENG_bay_slass_landing_ships_desc: "Десантные корабли класса Bay - это универсальные десантные суда, предназначенные для поддержки целого ряда военных операций, включая гуманитарную помощь, ликвидацию последствий стихийных бедствий и десантно-штурмовые операции. Эти суда имеют большую полетную палубу и колодезную палубу для спуска на воду и подъема десантных кораблей и транспортных средств-амфибий."
 ENG_river_class_patrol_boat: "Патрульный катер речного класса"
 ENG_river_class_patrol_boat_desc: "Патрульные катера речного класса служат универсальными морскими патрульными судами, используемыми для обеспечения безопасности на море, охраны границ и правоохранительных задач. Благодаря своим передовым системам наблюдения и связи эти патрульные катера эффективно патрулируют прибрежные воды, защищая территориальную целостность и морские интересы. Разработанные с учетом выносливости и гибкости, суда речного класса играют решающую роль в повышении безопасности на море и соблюдении морского права в водах Великобритании и за ее пределами."
 ENG_point_class_sealift_ships: "Морские суда класса Point для перевозки грузов"
 ENG_point_class_sealift_ships_desc: "Морские транспортные корабли класса Point являются жизненно важными средствами Вспомогательного флота Королевского флота, предназначенными для перевозки военных грузов и оборудования для поддержки экспедиционных операций. Эти суда типа roll-on / roll-off обладают универсальными возможностями обработки грузов, обеспечивая эффективную погрузку и разгрузку транспортных средств и припасов в различных портах и морских условиях. Обладая стратегической грузоподъемностью, корабли класса Point вносят значительный вклад в логистические возможности Великобритании, способствуя быстрому развертыванию вооруженных сил и техники в мирное время и в конфликтных ситуациях."
 ENG_bae_cv90_MkIV: "BAE CV90 Mk IV"
 ENG_bae_cv90_MkIV_desc: "BAE CV90 Mk IV - это модернизированная версия боевой машины пехоты CV90, оснащенная передовыми технологиями и усовершенствованиями для ведения современной войны. Он обеспечивает улучшенную мобильность, живучесть и огневую мощь, что делает его грозным оружием для бронированных пехотных подразделений на поле боя."
 ENG_expand_sandhurst_academy: "Расширять академию сандхерста"
 ENG_expand_sandhurst_academy_desc: "Королевская военная академия Сандхерст (RMAS) является одним из ведущих военных учебных заведений мира, известным своими строгими программами и стремлением готовить выдающихся военачальников. Основанная в 1802 году, RMAS служит основным учебным заведением по подготовке офицеров для британской армии, а также для нескольких международных союзников и партнеров."
 ENG_soldier_welfare_initiative: "Инициатива по обеспечению благосостояния солдат"
 ENG_soldier_welfare_initiative_desc: "Ставя во главу угла благополучие наших солдат и их семей, эта инициатива демонстрирует нашу приверженность почитанию их службы и самопожертвования, одновременно укрепляя поддерживающее и жизнестойкое военное сообщество."
 ENG_mgcs_program: "Программа MGCS"
 ENG_mgcs_program_desc: "Основная наземная боевая система (MGCS) - это программа создания боевых бронированных машин следующего поколения, разработанная для обеспечения передовых возможностей сухопутных войск в сценариях современных боевых действий. В рамках совместных усилий Германии и Франции MGCS стремится разработать универсальный и технологически продвинутый основной боевой танк, который сможет эффективно действовать в различных условиях боя."
 ENG_royal_airforce_modernisation: "Модернизация Королевских военно-воздушных сил"
 ENG_royal_airforce_modernisation_desc: "Проводя модернизацию Королевских военно-воздушных сил Великобритании, Королевские военно-воздушные силы подтверждают свою приверженность сохранению превосходства в воздухе, демонстрации мощи и защите национальных интересов во все более сложной и противоречивой обстановке глобальной безопасности."
 ENG_watchkeeper_wk450: "Хранитель часов WK450"
 ENG_watchkeeper_wk450_desc: "Watchkeeper WK450 - это усовершенствованная беспилотная авиационная система, предназначенная для разведки, наблюдения и рекогносцировки (ISR). Разработанный Thales Group, этот средневысотный беспилотный летательный аппарат длительного действия (MALE) оснащен рядом сложных датчиков и камер для наблюдения в режиме реального времени и обнаружения целей. Благодаря своей выносливости и возможностям автономного полета Watchkeeper WK450 обеспечивает вооруженным силам повышенную осведомленность о ситуации и способность собирать важные разведданные в различных оперативных условиях."
 ENG_reaper_purchase: "Покупка Жатки"
 ENG_reaper_purchase_desc: "Вооруженные силы по всему миру приобрели MQ-9 Reaper для расширения своих возможностей в области разведки, наблюдения и рекогносцировки (ISR), а также для нанесения высокоточных ударов по особо ценным целям. Способность \"Жнеца\" длительное время находиться над целевыми районами и его усовершенствованный набор датчиков делают его ценным инструментом для сбора разведданных в режиме реального времени и оказания поддержки наземным силам."
 ENG_missile_development: "Разработка ракет"
 ENG_missile_development_desc: "Нам необходимо модернизировать наши ракетные возможности, чтобы оставаться современными военно-воздушными силами"
 ENG_electronic_warfare_measures: "Меры радиоэлектронной борьбы"
 ENG_electronic_warfare_measures_desc: "Нам необходимо модернизировать наши вычисления, чтобы обезопасить себя от кибератак"
 ENG_nato_joint_airforce_training: "Совместные учения военно-воздушных сил НАТО"
 ENG_nato_joint_airforce_training_desc: "С помощью смоделированных сценариев, живых учений и совместных учебных мероприятий участвующие военно-воздушные силы развивают и совершенствуют свои возможности в таких областях, как воздушный бой, операции \"воздух-земля\", дозаправка в воздухе и противовоздушная оборона. Эти учебные мероприятия способствуют взаимопониманию, доверию и сотрудничеству между военно-воздушными силами союзников, гарантируя, что они смогут беспрепятственно действовать сообща в условиях коалиции и эффективно реагировать на вызовы региональной и глобальной безопасности."
 ENG_c19_globemasters: "Транспортные самолёты C-17 Globemaster"
 ENG_c19_globemasters_desc: "C-17 Globemaster III - универсальный стратегический транспортный самолет, используемый военно-воздушными силами по всему миру для быстрых перевозок на большие расстояния. Этот самолет большой грузоподъемности производства Boeing способен перевозить большие грузы, включая войска, транспортные средства и гуманитарную помощь, в отдаленные районы и на суровые аэродромы. Благодаря передовому авионике, высокому дизайну крыла и возможностям короткого взлета и посадки (STOL) C-17 Globemaster III играет решающую роль в поддержке военных и гуманитарных операций по всему миру."
 ENG_airbus_a400m: "Аэробус A400M"
 ENG_airbus_a400m_desc: "Airbus A400M - это современный военно-транспортный самолет, разработанный для удовлетворения эксплуатационных потребностей различных военно-воздушных сил по всему миру. Благодаря конфигурации с высоким расположением крыла и усовершенствованным турбовинтовым двигателям, A400M обладает исключительными характеристиками, включая возможности короткого взлета и посадки (STOL), дальности полета и возможности эксплуатации с полуобработанных взлетно-посадочных полос."
 ENG_nimrod_mra4: "Нимрод MRA4"
 ENG_nimrod_mra4_desc: "Nimrod MRA4 был модернизированной версией культового морского патрульного самолета Nimrod, предназначенного для обеспечения расширенных возможностей в противолодочной войне, морском наблюдении и поисково-спасательных операциях. Оснащенный передовыми датчиками, системами связи и боевым оборудованием, Nimrod MRA4 обладал улучшенными характеристиками и универсальностью по сравнению со своим предшественником."
 ENG_apache_wah64: "Августавестландский Апач"
 ENG_apache_wah64_desc: "Приобретение и развертывание вертолета Augusta Westland Apache ознаменовало значительный прогресс в боевом арсенале Великобритании. В стандартную конструкцию Apache было внесено несколько изменений, включая модернизированный двигатель Rolls Royce, механизм складывания лопастей для хранения, защиту ротора от обледенения и увеличенную мощность ракеты. Представленный для укрепления воздушного потенциала страны, этот современный ударный вертолет символизирует скачок вперед в области военных авиационных технологий и стратегической оперативной эффективности."
 ENG_boeing_p8_poseidon: "Boeing P8 Poseidon"
 ENG_boeing_p8_poseidon_desc: "Boeing P-8 Poseidon - многоцелевой морской патрульный самолет, предназначенный для ведения противолодочной и надводной войны на больших расстояниях, а также для ведения разведки, наблюдения и рекогносцировочных операций. Созданный на базе авиалайнера Boeing 737, P-8 Poseidon оснащен передовыми датчиками, системами связи и возможностями вооружения, что делает его высокоэффективной платформой для миссий морского патрулирования."
 ENG_revive_p125_project: "Возродить проект P125"
 ENG_revive_p125_project_desc: "Возрожденный проект P125 направлен на разработку универсальной и экономичной авиационной платформы, способной выполнять различные функции, включая превосходство в воздухе, непосредственную поддержку с воздуха, разведку и обучение. Благодаря использованию новейшей авионики, датчиков и систем вооружения модернизированный самолет P125 обеспечит повышенные летно-технические характеристики, живучесть и эффективность выполнения боевых задач."
 ENG_joint_strike_fighter_project: "Совместный проект ударного истребителя"
 ENG_joint_strike_fighter_project_desc: "Обладая передовыми возможностями скрытности, технологией слияния сенсоров и возможностями многоцелевого применения, объединенный ударный истребитель F-35 обеспечивает непревзойденную осведомленность о ситуации и смертоносность в операциях \"воздух-воздух\" и \"воздух-земля\"."
 ENG_bae_systems_tempest: "BAE Systems Tempest"
 ENG_bae_systems_tempest_desc: "BAE Systems Tempest - это ультрасовременный концепт истребителя шестого поколения, разработанный для удовлетворения растущих потребностей современной воздушной войны. Обладая передовой технологией скрытности, возможностями объединения датчиков и автономными системами, Tempest способен обеспечить повышенные характеристики, живучесть и смертоносность в сложных условиях воздушного пространства."
 ENG_defence_industrial_policy: "Оборонно-промышленная политика"
 ENG_defence_industrial_policy_desc: "Британская оборонно-промышленная политика определяет стратегические рамки, определяющие развитие, управление и устойчивость оборонно-промышленной базы страны. Обладая богатым наследием инноваций и передового опыта, оборонная промышленность Соединенного Королевства играет ключевую роль в поддержке целей национальной безопасности, содействии экономическому процветанию и поддержании технологического лидерства на мировой арене."
 ENG_return_our_national_champions: "Верните наших национальных чемпионов"
 ENG_return_our_national_champions_desc: "Возвращение к национальным лидерам в оборонной промышленности отражает стратегическую переориентацию на укрепление национального суверенитета, повышение экономической устойчивости и обеспечение готовности и эффективности британских Вооруженных сил во все более сложной и противоречивой обстановке безопасности."
 ENG_industry_partnerships: "Отраслевые партнерства"
 ENG_industry_partnerships_desc: "Предоставление целевого финансирования и поддержки ключевым оборонным компаниям, признанным национальными лидерами, для содействия исследованиям и разработкам, расширения производственных мощностей и повышения конкурентоспособности."
 ENG_maintaining_selective_competition: "Поддержание избирательной конкуренции"
 ENG_maintaining_selective_competition_desc: "Нам нужны только лучшие. Благодаря высокой конкуренции мы следим за соблюдением этого правила."
 ENG_mandated_non_competitive_supply: "Обязательные Неконкурентоспособные поставки"
 ENG_mandated_non_competitive_supply_desc: "Нам нужно, чтобы наши местные чемпионы предоставили оборудование для поставок без необходимости проведения новых соревнований"
 ENG_mod_industry_code_of_practice: "Свод правил Министерства оборонной промышленности"
 ENG_mod_industry_code_of_practice_desc: ""
 ENG_european_defence_industry_framework: "Европейская структура Оборонной промышленности"
 ENG_european_defence_industry_framework_desc: "Европейская рамочная программа оборонной промышленности описывает совместный подход государств-членов Европейского союза (ЕС) к повышению оборонного потенциала, развитию промышленного сотрудничества и продвижению технологических инноваций в европейском оборонном секторе. "
 ENG_trans_atlantic_defence_buisness: "Трансатлантический Оборонный бизнес"
 ENG_trans_atlantic_defence_buisness_desc: "Трансатлантическая бизнес-инициатива в области обороны представляет собой стратегическое сотрудничество между оборонной промышленностью и государственными структурами по обе стороны Атлантического океана. Эта инициатива направлена на укрепление партнерских отношений, развитие торговли и расширение сотрудничества в оборонном секторе между странами Северной Америки и Европы."
 ENG_focusing_on_research_and_development: "Сосредоточение внимания на исследованиях и разработках"
 ENG_focusing_on_research_and_development_desc: "Нам нужно сосредоточиться на новом снаряжении для наших солдат"
 ENG_mod_continuing_the_competitive_marketplace: "Конкурентный рынок"
 ENG_mod_continuing_the_competitive_marketplace_desc: ""
 ENG_investing_in_our_partners: "Инвестирование в наших партнеров"
 ENG_investing_in_our_partners_desc: "Мы уже никогда не станем таким же мощным производителем военной продукции, как раньше. Лучше инвестировать в наших партнеров, которые могут удовлетворить наши потребности."
 ENG_streamlining_our_industry: "Оптимизация нашей отрасли"
 ENG_streamlining_our_industry_desc: "Наши партнеры просят нас оптимизировать нашу отрасль, чтобы помочь им разработать необходимое нам оборудование."
 ENG_british_overseas_territories: "Британские заморские территории"
 ENG_british_overseas_territories_desc: "Британские заморские территории включают в себя разнообразную группу территорий и юрисдикций, разбросанных по всему миру, каждая со своими уникальными культурными, географическими и политическими особенностями. Эти территории, включая такие знаковые места, как Гибралтар, Бермуды и Каймановы острова, сохраняют тесные связи с Великобританией, при этом обладая различной степенью автономии и самоуправления."
 ENG_cayman_enterprise_city: "Кайман Бизнес-Сити"
 ENG_cayman_enterprise_city_desc: "Cayman Enterprise City - это особая экономическая зона на Каймановых островах, предлагающая международному бизнесу уникальную платформу для установления физического присутствия в юрисдикции, нейтральной к налогообложению. Благодаря оптимизированным процессам и стимулам это создает благоприятные условия для процветания компаний в таких отраслях, как технологии, биотехнологии и медиа."
 ENG_illex_fishery: "Рыболовная компания Illex"
 ENG_illex_fishery_desc: "Промысел кальмара-иллекса является жизненно важной частью экономики Фолклендских островов, направленной на устойчивый вылов кальмара-иллекса. Тщательно управляемый для обеспечения долгосрочной жизнеспособности промысел поддерживает местные источники средств к существованию и вносит вклад в продовольственную безопасность региона и экономическую стабильность."
 ENG_north_mole_power_plant: "Электростанция Северная Мол"
 ENG_north_mole_power_plant_desc: "Расположенная в Гибралтаре электростанция North Mole играет решающую роль в удовлетворении энергетических потребностей территории. Оснащенный современными технологиями и инфраструктурой, он обеспечивает надежную выработку электроэнергии, поддерживая повседневную жизнь и экономическую деятельность жителей и предприятий Гибралтара."
 ENG_biras_creek_resort: "Курорт Бирас-Крик"
 ENG_biras_creek_resort_desc: "Расположенный на Британских Виргинских островах, курорт Бирас-Крик предлагает роскошный отдых среди живописной природы. Известный уединёнными пляжами, высококлассными номерами и индивидуальным обслуживанием, он станет идеальным местом для путешественников, ищущих расслабление и восстановление сил в тропическом раю."
 ENG_bermuda_innovation_sprint: "Бермудский инновационный спринт"
 ENG_bermuda_innovation_sprint_desc: "Инновационный спринт Бермудских островов - это инициатива, направленная на стимулирование инноваций и предпринимательства на острове. Посредством акселерационных программ, наставничества и возможностей финансирования он поддерживает стартапы и технологические предприятия в разработке инновационных решений и стимулировании экономического роста на Бермудских островах."
 ENG_princes_lodge_plantation: "Плантация Принсес-Лодж"
 ENG_princes_lodge_plantation_desc: "Плантация Princes Lodge Plantation - это историческое поместье на острове Святой Елены, демонстрирующее богатое культурное наследие острова и сельскохозяйственные традиции. Благодаря живописному расположению и сохранившейся колониальной архитектуре, он предлагает посетителям заглянуть в прошлое острова, внося свой вклад в культурный туризм и усилия по сохранению местного наследия."
 ENG_beaches_turks_caicos: "Beaches Turks Caicos"
 ENG_beaches_turks_caicos_desc: "Beaches Turks and Caicos — это роскошный курорт «всё включено», известный своими чистыми пляжами, высококлассными удобствами и семейной атмосферой. С широким выбором развлечений и активностей он обеспечивает незабываемый отдых для гостей всех возрастов на островах Теркс и Кайкос."
 ENG_little_bay_port_development_project: "Проект развития порта Литл-Бэй"
 ENG_little_bay_port_development_project_desc: "Проект развития порта Литтл-Бэй направлен на улучшение инфраструктуры и экономических перспектив Монтсеррата путем строительства современного портового комплекса в Литтл-Бэй. Благодаря улучшенным транспортным и логистическим возможностям он стремится стимулировать торговлю, туризм и инвестиционные возможности на острове."
 ENG_pitcairn_islands_study_center: "Учебный центр Островов Питкэрн"
 ENG_pitcairn_islands_study_center_desc: "Исследовательский центр островов Питкэрн - это исследовательское учреждение, занимающееся изучением и сохранением истории, культуры и биоразнообразия островов Питкэрн. С помощью своих архивов, публикаций и образовательных программ он способствует повышению осведомленности и признательности к этим отдаленным и уникальным территориям."
 ENG_share_vtol_research: "Поделиться Исследованиями по СВВП"
 ENG_share_vtol_research_desc: "Совместные исследования VTOL предполагают сотрудничество и инициативы по обмену знаниями между заинтересованными сторонами отрасли и исследовательскими институтами для продвижения технологии вертикального взлета и посадки (VTOL)"
 ENG_channel_homegrown_innovation: "Канал Доморощенных Инноваций"
 ENG_channel_homegrown_innovation_desc: "Поддерживая отечественные стартапы, исследовательские институты и малые предприятия, она стремится стимулировать развитие передовых технологий и решений, которые решают ключевые проблемы и открывают возможности в отрасли. Посредством сотрудничества, финансовой поддержки и создания экосистемы компания стремится позиционировать Великобританию как мирового лидера в области авиационных инноваций, способствующего экономическому росту и конкурентоспособности."
 ENG_revive_british_aviation_industry: "Возродить Британскую Авиационную промышленность"
 ENG_revive_british_aviation_industry_desc: "Стимулируя инвестиции, инновации и развитие профессиональных навыков, правительство стремится оживить внутреннее производство, повысить устойчивость цепочек поставок и создать качественные рабочие места по всей стране."
 ENG_focus_on_component_manufacturing: "Сосредоточьтесь на производстве компонентов"
 ENG_focus_on_component_manufacturing_desc: "Инвестируя в передовые производственные технологии, обучение персонала и меры по обеспечению устойчивости цепочки поставок, компания стремится повысить свою ценность и конкурентоспособность на мировом аэрокосмическом рынке. Благодаря партнерским отношениям с производителями оборудования, поставщиками комплектующих и исследовательскими организациями компания стремится продвигать инновации, повышать эффективность и качество всей экосистемы аэрокосмических компонентов."
 ENG_us_uk_collaboration: "Сотрудничество между США и Великобританией"
 ENG_us_uk_collaboration_desc: "США всегда находятся в поиске хороших партнеров. Приняв участие в британских авиационных проектах, мы могли бы работать вместе, чтобы получить больше финансирования и поделиться с ними некоторыми нашими инновациями"
 ENG_skylon_engine: "Двигатель Skylone"
 ENG_skylon_engine_desc: "Skylone Engine представляет собой новаторское достижение в аэрокосмической промышленности Великобритании, ориентированное на разработку двигательных установок следующего поколения. Благодаря передовой инженерии, материаловедению и компьютерному моделированию эта инициатива направлена на разработку и производство высокоэффективных реактивных двигателей, которые обеспечивают исключительную эффективность, надежность и экологичность."
 ENG_rebirthing_black_arrow: "Возрождающаяся Черная Стрела"
 ENG_rebirthing_black_arrow_desc: "Возрождение Black Arrow увековечивает наследие программы Black Arrow, исторического британского проекта космической ракеты-носителя. Эта инициатива направлена на возрождение и модернизацию духа освоения космоса в Великобритании путем развития передовых возможностей запуска и спутниковых технологий."
 ENG_invest_bae_international: "Инвестируйте в BAE International"
 ENG_invest_bae_international_desc: "BAE - наша крупнейшая Военная Организация. Располагая некоторыми средствами, мы можем расширить его филиалы за пределами Великобритании, чтобы улучшить его возможности"
 ENG_lightweight_fire_platform_artillery: "Легкая артиллерийская огневая платформа"
 ENG_lightweight_fire_platform_artillery_desc: "Проект Lightweight Fire Platform Artillery направлен на разработку и развертывание универсальной и мобильной артиллерийской системы, оптимизированной для быстрого развертывания и высокоточной огневой поддержки. Используя легкие материалы, принципы модульной конструкции и передовые системы управления огнем, эта инициатива направлена на повышение маневренности, быстроты реагирования и смертоносности артиллерийских подразделений в различных оперативных условиях."
 ENG_harpoon_replacement: "Замена Гарпуна"
 ENG_harpoon_replacement_desc: "Программа замены противокорабельных ракет Harpoon направлена на разработку противокорабельного ракетного комплекса нового поколения для замены устаревающих ракет Harpoon в британском военном арсенале. Эта инициатива, основанная на передовых технологиях наведения, силовой установки и целеуказания, призвана обеспечить военно-морским силам увеличенную дальность действия, точность и смертоносность в борьбе с надводными угрозами в морской среде."
 ENG_codify_service_economy: "Кодифицировать экономику услуг"
 ENG_codify_service_economy_desc: "На протяжении десятилетий Британия переходила к модели, основанной на обслуживании. Финансы, консалтинг и СМИ заполняют пробел, оставленный закрытыми заводами. Пришло время превратить этот дрейф в четкую стратегию."
 ENG_gate_burton_energy: "Построить энергетический парк Гейт-Бертон"
 ENG_gate_burton_energy_desc: "Энергетический парк Гейт-Бертон превратит сельскохозяйственные угодья недалеко от линкольнширского города Гейт-Бертон в крупное предприятие по производству солнечных батарей, подающее экологически чистую энергию в Национальную сеть и помогающее заменить устаревающую угольную и газовую генерацию."
 ENG_gate_burton_energy_tt: "Добавьте §G1§! §YБэттери-парк§!"
 ENG_ai_white_collar: "ИИ для офисной работы"
 ENG_ai_white_collar_desc: "От юридических фирм до бухгалтерий системы искусственного интеллекта начинают выполнять рутинную работу по анализу и документированию. Рабочие места исчезают, прибыль растет."
 ENG_empower_city_london: "Расширьте возможности Лондонского сити"
 ENG_empower_city_london_desc: "Упрощая правила планирования и поддерживая строительство новых башен площадью в Квадратную милю, мы поощряем банки и сервисные фирмы расширять свое присутствие. Новые офисные площади класса А в Сити будут расти быстрее, укрепляя роль Лондона как мирового финансового центра."
 ENG_empower_edinburgh: "Укрепить финансовый район Эдинбурга"
 ENG_empower_edinburgh_desc: "Поддерживая новые офисы класса А и инфраструктуру вокруг Нового города и биржевого района, мы помогаем банкам и управляющим активами Эдинбурга расширять свое присутствие, укрепляя второй финансовый центр Великобритании за пределами Лондона."
 ENG_found_invest_northern_ireland: "Инвестиции в Северную Ирландию"
 ENG_found_invest_northern_ireland_desc: "Мы создали Invest Northern Ireland для продвижения региона за рубежом и привлечения постоянного потока новых заводов, офисов и верфей."
 ENG_digital_government: "Цифровая модернизация правительства"
 ENG_digital_government_desc: "Мы оцифровываем государственные услуги, налогообложение, лицензирование, льготы, сокращая бумажную волокиту и сокращая расходы."
 ENG_invest_silicon_glenn: "Инвестируйте в Silicon Glen"
 ENG_invest_silicon_glenn_desc: "Мы направляем финансирование в шотландский Кремниевый Глен, расширяя лаборатории и технопарки, чтобы ускорить исследования в области вычислительной техники, Интернета и искусственного интеллекта."
 ENG_cross_border_cooperation: "Трансграничное сотрудничество"
 ENG_cross_border_cooperation_desc: "Мы углубляем практическое сотрудничество между Северной Ирландией и Ирландией, сокращая бюрократические препоны и расширяя трансграничную торговлю и влияние."
 ENG_national_data_infrastructure: "Национальная инфраструктура обработки данных"
 ENG_national_data_infrastructure_desc: "Мы внедряем по всей стране оптоволокно, центры передачи данных и магистральные сети для ускорения цифровых подключений, расширения охвата поставок и повышения производительности по всей экономике."
 ENG_admiral_group: "Партнер Admiral Group"
 ENG_admiral_group_desc: "Мы работаем с Admiral Group в Кардиффе над расширением частного страхового покрытия, снижая нагрузку на бюджеты социального обеспечения и здравоохранения."
 ENG_fintech_open_banking: "Центр финтеха и открытого банкинга"
 ENG_fintech_open_banking_desc: "Мы превращаем Великобританию в ведущий центр финансовых технологий и открытого банковского дела, увеличивая поступления от корпоративных налогов при одновременном снижении стоимости государственных заимствований."
 ENG_global_consulting_state: "Глобальное Консалтинговое государство"
 ENG_global_consulting_state_desc: "Мы поддерживаем британские консалтинговые и юридические фирмы по всему миру, расширяя наше влияние, углубляя исследовательские связи и привлекая больше иностранных инвестиций."
 ENG_lean_manufacturing: "Бережливое производство"
 ENG_lean_manufacturing_desc: "Внедряя робототехнику, датчики и оперативные рабочие процессы на наших предприятиях, мы заменяем рутинный труд автоматизированными линиями. Фабрики потребляют больше энергии, но используют меньше рабочих, в то время как производительность и эффективность растут с каждым циклом производства."
 ENG_cloud_isles: "Облачные острова"
 ENG_cloud_isles_desc: "Мы превращаем Великобританию в центр для крупных центров обработки данных и облачных кампусов. Офисы потребляют больше энергии для питания серверных ферм, но цифровые сервисы, которые они размещают, приносят более высокие налоговые поступления и более быстрые результаты исследований."
 ENG_algorithmic_finance: "Алгоритмические финансы"
 ENG_algorithmic_finance_desc: "Мы внедряем передовые механизмы управления рисками и автоматизированные казначейские системы для управления денежными потоками, долгами и платежами, сокращая бюрократию и снижая текущие расходы правительства."
 ENG_invest_harland_wolff: "Инвестируйте в Harland & Wolff"
 ENG_invest_harland_wolff_desc: "Мы вкладываем свежий капитал в верфи Harland & Wolff в Белфасте и за его пределами, вновь открывая склады, нанимая квалифицированных рабочих и увеличивая производительность наших верфей."
 ENG_critical_minerals_strategy: "Стратегия критических минералов"
 ENG_critical_minerals_strategy_desc: "Мы запускаем национальную стратегию по добыче важнейших полезных ископаемых, поддерживая новые проекты в Корнуолле, Уэльсе и за его пределами для обеспечения сохранности ключевых руд и улучшения доступа Великобритании к жизненно важным ресурсам."
 ENG_dogger_bank_offshore: "Оффшорный Энергетический центр Dogger Bank"
 ENG_dogger_bank_offshore_desc: "Мы поддерживаем оффшорный ветроэнергетический комплекс Dogger Bank в Северном море, строящий крупнейшую в мире ветряную электростанцию для обеспечения чистой энергией миллионов британских домов."
 ENG_hinkley_point_c: "Завершить Хинкли-Пойнт C"
 ENG_hinkley_point_c_desc: "Мы продвигаем проект строительства двухреактора Hinkley Point C в Сомерсете, добавляя в сеть более 3 ГВт долгосрочной базовой мощности с низким уровнем выбросов углекислого газа."
 ENG_acknowledge_industrial_collapse: "Признать промышленный кризис"
 ENG_acknowledge_industrial_collapse_desc: "От Редкара на Тиссайде до Порт-Талбота в Южном Уэльсе остыли доменные печи, и целые общины потеряли свою промышленную опору. Мы должны, наконец, признать, насколько сильно упала тяжелая промышленность Великобритании, прежде чем мы сможем ее восстановить."
 ENG_building_brittain_fit_future: "Строим Британию, готовую к будущему"
 ENG_building_brittain_fit_future_desc: "Мы запускаем долгосрочную промышленную стратегию, направленную на повышение производительности и возможности зарабатывать, инвестируя в идеи, людей, инфраструктуру и места по всей Великобритании."
 ENG_northern_powerhouse: "Северная Сила и Двигатель Мидлендса"
 ENG_northern_powerhouse_desc: "Мы объединяем Northern Powerhouse и Midlands Engine в единый коридор роста, поддерживая транспорт, квалификацию и инвестиции в бизнес для повышения производительности от Ливерпуля и Манчестера через Бирмингем до Ист-Мидлендс."
 ENG_aerospace_wales: "Аэрокосмический Уэльс"
 ENG_aerospace_wales_desc: "Мы поддерживаем аэрокосмический кластер Уэльса вокруг Airbus Broughton, Сент-Атана и более широкого центра ТОИР, стимулируя местное производство крыльев, ремонтные работы и создание рабочих мест в авиации с высокой добавленной стоимостью."
 ENG_marine_power_systems: "Поддержка Морских энергетических систем"
 ENG_marine_power_systems_desc: "Мы поддерживаем базирующуюся в Уэльсе компанию Marine Power Systems в расширении масштабов плавучих ветряных и волновых платформ, превращая местные верфи и порты в центры производства морской энергии следующего поколения."
 ENG_develop_edinburgh_west_end: "Развивать западный район Эдинбурга"
 ENG_develop_edinburgh_west_end_desc: "Мы модернизируем биржевой район Вест-Энда, превратив его в более плотное сочетание офисов, лабораторий и современных мастерских, повышая эффективность местных исследований и производства, одновременно добавляя новые помещения для расширения наших ведущих фракций."
 ENG_develop_bae_aerospace: "Развивать BAE Aerospace в Шотландии"
 ENG_develop_bae_aerospace_desc: "Мы расширяем аэрокосмическое присутствие BAE в районе Прествика и других объектов Шотландии, добавляя новые ангары, мастерские и инженерные группы для поддержки передовых боевых самолетов и будущих программ."
 ENG_glasgow_shipbuilidng: "Судостроительный центр Глазго"
 ENG_glasgow_shipbuilidng_desc: "Мы модернизируем верфи Clyde в Говане и Скотстоуне, превращая Глазго в долгосрочный центр строительства военных кораблей и военно-морского экспорта."
 ENG_high_value_manufacturing_zones: "Зоны высокотехнологичного производства"
 ENG_high_value_manufacturing_zones_desc: "Мы создаем зоны производства с высокой добавленной стоимостью вокруг центров катапультного типа и научных парков, предоставляя фирмам более быстрый доступ к лабораториям, навыкам и современному оборудованию для повышения производительности и повышения качества продукции."
 ENG_high_value_manufacturing_zones_tt: "Если в штате есть §G5§! §Y$infrastructure$§!, не менее §G10§! §Y$industrial_complex$§!, не менее §G5§! §Y$offices$§!, не менее §G5§! §Y$arms_factory$§! ИЛИ §G5§! §Y$dockyard$§!, мы добавим по одному штату:"
 ENG_steel_guarantee: "Гарантия на сталь"
 ENG_steel_guarantee_desc: "Мы предоставляем долгосрочное финансирование и гарантии для проектов по производству низкоуглеродистой стали, что дает инвесторам уверенность в модернизации заводов и обеспечении безопасности отечественного производства стали на десятилетия вперед."
 ENG_steel_guarantee_tt: "§Y[10.GetName],[11.GetName],[12.GetName]§! или §Y[1191.GetName]§! получат:\nБолее §Y4 $industrial_complex$§!: §G+6§! §Y$country_resource_steel$§!.\nБолее §Y4 $offices$§!: §G+3§! §Y$country_resource_tungsten$§!.\nЛюбой §Y объект §! и §Y$sp_improved_synthetic_diamonds$§! завершенный: дополнительный §G+3§! §Y$country_resource_chromium$§!."
 ENG_celsa_steel: "Поддержать Celsa в Кардиффе"
 ENG_celsa_steel_desc: "Мы поддерживаем электродуговой сталелитейный завод Celsa и прутковый завод в Кардиффе, увеличивая выпуск низкоуглеродистой арматуры и катанки, сохраняя при этом работу крупного валлийского предприятия по переработке и работодателя на полную мощность."
 ENG_expand_scottish_steel: "Расширьте Шотландскую Сталь"
 ENG_expand_scottish_steel_desc: "Мы инвестируем в заводы Далзелл и Клайдбридж, чтобы возобновить производство листового проката, обеспечить производство шотландской стали для военных кораблей и морской ветроэнергетики, а также создать современную базу по производству тяжелой стали к северу от границы."
 ENG_refine_natural_bauxite: "Переработка Природных бокситов"
 ENG_refine_natural_bauxite_desc: "Мы строим глиноземные заводы в окрестностях Эдинбурга для переработки импортируемых бокситов в высококачественное сырье, увеличивая внутреннее производство алюминия в Шотландии."
 ENG_deep_mining_coal: "Возобновить добычу угля в Шотланди"
 ENG_deep_mining_coal_desc: "Мы вновь открываем глубокие пласты на старых угольных месторождениях Шотландии, проходим новые шахты и восстанавливаем инфраструктуру карьеров, чтобы восстановить подземную добычу угля к северу от границы."
 ENG_opencast_mining: "Расширить открытые разработки угля в Шотландии"
 ENG_opencast_mining_desc: "Мы лицензируем новые участки открытой разработки на угольных месторождениях Шотландии, вскрываем вскрышную породу для достижения неглубоких пластов и увеличиваем внутренние поставки угля."
 ENG_cononish_gold_silver: "Золотые и серебряные рудники Конэниш"
 ENG_cononish_gold_silver_desc: "Мы поддерживаем рудник Конониш близ Тиндрума, превращая единственное коммерческое месторождение золота и серебра в Шотландии в постоянный источник драгоценных металлов для страны."
 ENG_national_productivity_commission: "Национальная комиссия по продуктивности"
 ENG_national_productivity_commission_desc: "Мы создаем Национальную комиссию по производительности для согласования инвестиционной, инфраструктурной и инновационной политики вокруг одной миссии: повышения производительности по всей Великобритании."
 ENG_infrastructure_for_productivty: "Национальная стратегия инфраструктуры"
 ENG_infrastructure_for_productivty_desc: "Мы реализуем Национальную инфраструктурную стратегию, нацеленную на автомобильные, железнодорожные и цифровые сети, которые повышают производительность, а не сдерживают ее."
 ENG_universaties_engines_of_growth: "Фонд «Сила в местах»"
 ENG_universaties_engines_of_growth_desc: "Мы создаем фонд Strength in Places, поддерживающий партнерские отношения университетов и бизнеса по всей Англии, чтобы превратить сильные стороны местных исследований в рабочие места, инвестиции и рост."
 ENG_hs2: "Запуск High Speed 2"
 ENG_hs2_desc: "Мы даем зеленый свет High Speed 2, разрешая строительство первого этапа между Лондоном и Мидлендсом и обязуясь десятилетиями инвестировать в новую высокоскоростную железную дорогу."
 ENG_northern_powerhouse_rail: "Железная дорога Северного центра"
 ENG_northern_powerhouse_rail_desc: "Мы поддерживаем Northern Powerhouse Rail, новую и модернизированную сеть с востока на запад, соединяющую Ливерпуль, Манчестер, Лидс и Север в целом, с более быстрыми и частыми поездами и большей пропускной способностью для пассажиров и грузов."
 ENG_euston_canary_wharf_integration: "Интеграция Юстон и Кэнэри-Уорф"
 ENG_euston_canary_wharf_integration_desc: "Мы подключаем конечную станцию HS2 в Юстоне к сети лондонских железных дорог и метро восток-запад, создавая бесперебойное сообщение с Сити и Кэнэри-Уорф, чтобы пассажиры высокоскоростных поездов могли добраться до финансовых районов столицы за считанные минуты."
 ENG_midland_main_lines: "Модернизация Мидлендской линии"
 ENG_midland_main_lines_desc: "Мы продолжаем модернизацию и электрификацию магистрали Мидленд между Лондоном и Ист-Мидлендс, сокращая время в пути и освобождая пропускную способность для пассажиров и грузов."
 ENG_russel_group: "Университеты группы Рассела"
 ENG_russel_group_desc: "Мы углубляем связи с наукоемкими университетами Russell Group, поддерживая совместные проекты, которые способствуют развитию ведущей мировой науки по всей стране."
 ENG_golden_triangle_research: "Научный кластер «Золотой треугольник»"
 ENG_golden_triangle_research_desc: "Мы углубляем связи между ведущими университетами Оксфорда, Кембриджа и Лондона, создавая исследовательскую дугу \"Золотого треугольника\", которая концентрирует лаборатории мирового класса, таланты и финансирование в единый высокоэффективный инновационный коридор."
 ENG_imperial_king_tech_clusters: "Кластеры Imperial и King’s"
 ENG_imperial_king_tech_clusters_desc: "Мы связываем инновационный кампус Imperial в Белом городе с технологическими и медицинскими центрами King, создавая плотные кластеры, где лаборатории, стартапы и инвесторы могут превратить передовые исследования в коммерческие прорывы."
 ENG_skill_england_technical: "Навыки в Англии и технические пути"
 ENG_skill_england_technical_desc: "Мы сотрудничаем с Skills England, чтобы выявить пробелы в навыках и расширить технические маршруты и стажировки, предоставляя большему количеству людей четкие и высококачественные пути к квалифицированной работе."
 ENG_closing_britains_productivity_gap: "Сократить разрыв в производительности труда в Великобритании"
 ENG_closing_britains_productivity_gap_desc: "После многих лет целенаправленных инвестиций в инфраструктуру, университеты и повышение квалификации наш разрыв в производительности наконец-то начинает сокращаться, повышая производительность на одного работника и предоставляя экономике возможности для повышения заработной платы и улучшения качества услуг."
 ENG_closing_britains_productivity_gap_tt: "Мы можем устранить снижение производительности, проведя исследование §Y$CAT_infrastructure$§!"
 ENG_ambitions_for_britain: "Амбиции Британии"
 ENG_ambitions_for_britain_desc: "Британию нельзя оставлять гнить с течением времени. Британия должна быть амбициозной, и для этого британскому народу нужна Лейбористская партия. Благодаря решимости Лейбористской партии Соединенное Королевство превратится в одного из величайших глобальных игроков нашего времени. Новое тысячелетие будет нашим."
 ENG_deeper_prosperity: "Более глубокое процветание"
 ENG_deeper_prosperity_desc: "Мы добьемся более глубокого процветания, создавая больше рабочих мест и стимулируя наших людей искать возможности трудоустройства. Этого можно было бы достичь только путем создания устойчивой окружающей среды, в частности, с помощью надлежащей инфраструктуры."
 ENG_every_region_of_the_country: "В каждом регионе страны"
 ENG_every_region_of_the_country_desc: "Наши усилия не будут сосредоточены в основных центрах общества, нет, приоритетным направлением будет каждый регион страны. В конце концов, мы - профсоюз. Без равного распределения ресурсов государство разрушится и создаст неравенство для большого городского и сельского населения."
 ENG_the_foundation: "Фундамент"
 ENG_the_foundation_desc: "Основой, опорой и становым хребтом этой страны являются трудолюбивые рабочие, которые тратят бесчисленное количество часов на служение своей стране. Инициирование реформ, обеспечивающих большую гибкость на рабочем месте, когда дело доходит до отпусков, отгулов и больничных листов, станет важным изменением для сохранения силы этой опоры общества."
 ENG_nhs_reform: "Реформа национальной системы здравоохранения"
 ENG_nhs_reform_desc: "Национальная служба здравоохранения остро нуждается в реформе. Не просто поверхностные изменения, когда мы призываем к строительству новых больниц и медицинских учреждений, нет, вместо этого мы будем настаивать на синхронизации действий частного и государственного секторов в целях улучшения Национальной службы здравоохранения, чтобы мы могли сократить время ожидания, модернизировать наши существующие учреждения и принимать больше пациентов более своевременно."
 ENG_reinassaince_of_status: "Возрождение статуса"
 ENG_reinassaince_of_status_desc: "Наш народ должен иметь возможность подниматься по социальной лестнице и продвигаться экономически. Таким образом, мы должны как можно раньше вмешаться в их жизнь. Предоставляя центрам высшего образования необходимые инструменты, в которых они нуждаются, мы сможем с большей готовностью предоставлять ресурсы, необходимые нашим сотрудникам для продвижения в обществе."
 ENG_a_grand_promise: "Великое обещание"
 ENG_a_grand_promise_desc: "Чтобы сохранить поддержку нашей партии, нам нужно будет дать грандиозное обещание, которое заинтересует наших избирателей. Выполнив его обещание, мы сможем укрепить доверие к нашей коалиции и нанести серьезный удар по нашей оппозиции."
 ENG_more_frontline_staff: "Больше сотрудников на Передовой"
 ENG_more_frontline_staff_desc: "Нам необходимо повысить производительность сельского хозяйства, поощряя привлечение большего числа передовых сотрудников к работе. С помощью программ стимулирования мы сможем восстановить пошатнувшийся сельскохозяйственный дух в нашей стране."
 ENG_foster_the_tech_revolution: "Способствовать Кремниевой революции"
 ENG_foster_the_tech_revolution_desc: "Прямо на наших глазах разворачивается новая революция - кремниевая революция. Благодаря технологиям мировая экономика начинает меняться так, как никогда раньше. Бывшие сельские и сельскохозяйственные общества начали трансформироваться в одни из самых мощных экономик с помощью микрочипов и другой электроники. Мы тоже должны начать извлекать выгоду из этой новой тенденции как можно скорее."
 ENG_uplift_traditional_industry: "Поднимите Традиционную Индустрию"
 ENG_uplift_traditional_industry_desc: "Нам не нужна электронная мода, которой так увлечена большая часть мира. Вместо этого мы можем сосредоточиться на том, что, как мы знаем, работало исторически, - на холодной жесткой промышленности. Почему мы должны рисковать такими мелкими вещами, которые могут подорвать нашу экономику?"
 ENG_prioritize_the_teachers: "Расставьте приоритеты для преподавателей"
 ENG_prioritize_the_teachers_desc: "Повышение роли педагогов в обществе принесет огромную пользу, которая отразится на всей стране и регионе.  Осознав свою роль в жизни обычных [ENG.GetAdjective] граждан, люди наконец начнут ценить образование по достоинству."
 ENG_prioritize_the_doctors: "Расставьте приоритеты для врачей"
 ENG_prioritize_the_doctors_desc: "Врачи - это то, что предотвращает смерть людей, это то, что предотвращает распространение болезней, и это то, что поддерживает более широкое чувство безопасности в нашей стране. Помогая повысить роль врачей и медицинского персонала, мы также сможем привлечь больше людей на должности в Национальной службе здравоохранения, где серьезно не хватает персонала."
 ENG_strengthening_communities: "Укрепление сообществ"
 ENG_strengthening_communities_desc: "Укрепление сообществ и косвенное укрепление британской идентичности позволят нам укрепить чувство национального единства. Это позволит нам защитить ценности, которыми мы дорожим больше всего, одновременно создавая сплоченность общества на более эффективном уровне."
 ENG_to_europa_and_beyond: "В Европу И за ее пределы!"
 ENG_to_europa_and_beyond_desc: "В первую очередь мы европейцы, во вторую - британцы. Забыть наш региональный дом - значит забыть, кто мы такие. Мы должны стремиться к более глубокой интеграции с Европейским континентом и Европейским союзом в целом, чтобы мы могли поддержать более грандиозное видение всех европейских народов."
 ENG_no_one_left_behind: "Никто не остался позади"
 ENG_no_one_left_behind_desc: "Ни один британец не останется в стороне от нашего стремления к величию. Каждому будет оказана помощь, и общество продвинется к финишной черте, и вместе мы выдержим эту великую борьбу на пути к успеху."
 ENG_criminal_justice_reform: "Реформа уголовного правосудия"
 ENG_criminal_justice_reform_desc: "Укрепление нашей системы правосудия, в свою очередь, также укрепит наши давние демократические нормы. Благодаря рационализации судебного процесса также возрастет вера в наши демократические институты и повысится вероятность установления долгосрочной поддержки правительства."
 ENG_welfare_reform: "Реформа социального обеспечения"
 ENG_welfare_reform_desc: "Установление надежных отношений с нашими избирателями может быть достигнуто только путем реформирования нашей системы социального обеспечения. Показывая, что мы заботимся об их повседневной жизни, мы сможем привести им дюжину причин, по которым они должны продолжать голосовать за нас на посту президента."
 ENG_tax_reform: "Налоговые реформы"
 ENG_tax_reform_desc: "§R«П-подождите... куда делись мои деньги?!»§!\n\n Приняв налоговые реформы, мы не только укрепим нашу экономику и бюджет, но и добьемся прогресса в финансировании наших программ социальных реформ. Хотя это может не понравиться тем, кого собираются обложить налогами."
 ENG_productivity_challenge: "Проблема производительности"
 ENG_productivity_challenge_desc: "Нам становится все труднее вылечить некоторых наших работников... работать. Внеся некоторые изменения, мы, возможно, сможем подтолкнуть их к тому, чтобы они снова занялись чем-то продуктивным."
 ENG_britain_forward_not_back: "Британия Вперед, А не Назад"
 ENG_britain_forward_not_back_desc: "Нам нужно только смотреть вперед, чтобы увидеть, к чему мы движемся, и если мы не возьмем на себя ответственность за свое будущее, то наша судьба будет в руках судьбы. Мы этого не хотим. Мы хотим направить нашу страну к величию, а этого можно достичь, только установив, что мы должны сделать в первую очередь, чтобы достичь этого."
 ENG_competition_planning_and_regulation: "Планирование и регулирование соревнований"
 ENG_competition_planning_and_regulation_desc: "У нас не может быть конкуренции без регулирования. Без надлежащих ограждений корпорации сойдут с рельсов и поглотят более мелкие предприятия, по сути, лишив доходов тысячи, если не миллионы."
 ENG_new_rights_new_choices: "Новые права, новый выбор"
 ENG_new_rights_new_choices_desc: "Предоставляя нашим сотрудникам больше прав в вопросах того, когда они хотят работать, мы сможем повысить производительность труда на национальном уровне. В настоящее время на определенных рабочих местах работают только те, кто не достиг пенсионного возраста, а тех, кто медленно вытесняется. Предоставляя тем, кто превысил пенсионный порог, возможность снова работать, мы обеспечим большую экономическую стабильность."
 ENG_supporting_science: "Поддержка науки"
 ENG_supporting_science_desc: "Благодаря поддержке новых научных методов раскопок мы сможем увеличить нашу способность обеспечивать внутренние исследовательские программы и экспортировать больше товаров на международную арену."
 ENG_codify_key_of_convetions: "Кодифицировать ключевые конвенции"
 ENG_codify_key_of_convetions_desc: "Окончательно кодифицировав Ключ к Конституциям, мы, наконец, превратим политические правила в юридические. Наша политика больше не будет диктоваться традицией, а скорее законом, и благодаря этому мы сможем продолжить наше продвижение к лучшей демократии."
 ENG_generations_of_tomorrow: "Поколения завтрашнего дня"
 ENG_generations_of_tomorrow_desc: "Реформирование пенсионной системы, наконец, позволит нам создать конкретную систему социальной защиты для нашего нынешнего и будущих поколений. В настоящее время многие получают либо слишком низкую стипендию, либо ее вообще не получают, и самое время что-то с этим сделать."
 ENG_fostering_entrepreneurship: "Содействие развитию предпринимательства"
 ENG_fostering_entrepreneurship_desc: "Мы хотим, чтобы инноваторы наводнили нашу страну, и для этого нам нужно начать выделять некоторые государственные средства на создание устойчивой среды для тех, кто готов инвестировать, чтобы сразу прийти сюда."
 ENG_modern_transport_infrastructure: "Модернизация транспортной инфраструктуры"
 ENG_modern_transport_infrastructure_desc: "Если все наши дороги грязные и разбитые, что толку от вождения? Инвестиции в новые и новаторские инфраструктурные программы проложат путь к лучшей, более функциональной Великобритании."
 ENG_thriving_rural_scene: "Процветающий сельский пейзаж"
 ENG_thriving_rural_scene_desc: "Наши сельские поселения не могут быть брошены на произвол истории и забыты. Вместо этого мы будем охватывать эти сельские районы и еще больше поощрять их деятельность."
 ENG_scraping_the_skies: "Царапая небеса"
 ENG_scraping_the_skies_desc: "Если мы хотим укрепить наш имидж на международной арене, нам понадобятся несколько башен, особенно таких, которые поразили бы мир своим великолепием."
 ENG_creative_cities: "Креативные города"
 ENG_creative_cities_desc: "Поощряя культурное влияние при проектировании новых городских объектов, мы создадим идеальные условия для укрепления духа и морали наших людей, куда бы они ни отправились."
 ENG_party_of_pensior_poverty: "Партия бедности пенсионеров"
 ENG_party_of_pensior_poverty_desc: "Консерваторы, Партия Тори, или \"Партия бедности пенсионеров\", как мы любим их называть, подрывает целостность нашего сектора социального обеспечения и активно лишает средств к существованию тех, кто зависит от пенсий. Мы должны предпринять шаг к тому, чтобы люди осознали свою обратную практику."
 ENG_fostering_home_ownership: "Стимулирование Домовладения"
 ENG_fostering_home_ownership_desc: "Вместо того чтобы стимулировать людей жить на государственные средства, мы вместо этого будем помогать им в приобретении жилья для них и их близких. Таким образом, они смогут быть спокойны, зная, что они не живут на то, что им не принадлежит."
 ENG_social_housing: "Социальные жилищные программы"
 ENG_social_housing_desc: "Давайте будем реалистами: цены на жилье начинают стремительно расти, и нет никаких признаков того, что они остановятся. Мы должны продвигать программы социального жилья, которые обеспечат нашим избирателям крышу над головой и защиту от природных стихий."
 ENG_copyright_in_a_digital_age: "Авторское право в цифровую эпоху"
 ENG_copyright_in_a_digital_age_desc: "Наши законы об авторском праве в настоящее время находятся не там, где должны быть, многие пункты опущены или неясны. Мы должны кодифицировать наши правила и обеспечить большую защиту СМИ."
 ENG_strengthening_our_grids: "Укрепление наших сетей"
 ENG_strengthening_our_grids_desc: "Нашим сотрудникам нужна сильная, надежная и последовательная энергия, чтобы жить своей жизнью. Случайные отключения тут и там неизбежны, но это не должно быть повседневной жизнью. Укрепляя наши основные сети, мы обеспечим надежность нашего энергетического сектора."
 ENG_strengthen_pension_credit: "Увеличить пенсионный кредит"
 ENG_strengthen_pension_credit_desc: "Предоставляя возможность получения государственного пособия людям старше пенсионного возраста с низким доходом, мы сможем увеличить их еженедельный доход до минимального уровня и помочь покрыть расходы на жилье и другие расходы."
 ENG_the_workers_of_yesterday: "Вчерашние рабочие"
 ENG_the_workers_of_yesterday_desc: "Мы не можем допустить, чтобы вчерашний труд пропал даром, мы расширим пенсионные программы для тех, кто вышел на пенсию, и, возможно, даже предложим дополнительные льготы, если они решат передать свой опыт новым поколениям."
 ENG_tenant_regulation: "Правила для арендаторов"
 ENG_tenant_regulation_desc: "Мы не должны бросать домовладельцев, которые сдают недвижимость в аренду другим. Собственность должна соблюдаться, и, таким образом, правила являются необходимым фактором для обеспечения всеобщего счастья."
 ENG_a_future_fair_for_all: "Справедливое будущее для всех"
 ENG_a_future_fair_for_all_desc: "Похоже, что по мере развития мира условия жизни людей продолжают ухудшаться. После волнения, вызванного наступлением нового тысячелетия, люди по всему миру с надеждой верили, что их правительства наконец изменят свои методы к лучшему. Однако этого не произошло. Ухудшение демократии, рост затрат и общая хаотичность увели мир с правильного пути. Мы должны сделать всё возможное, чтобы Объединённое Королевство не скатилось в этот порочный круг."
 ENG_crime_and_immigration: "Преступность и миграция"
 ENG_crime_and_immigration_desc: "Со стороны правых раздавались призывы к ужесточению ограничений в отношении мигрантов. Хотя мы можем видеть, откуда они исходят, преклонить колено перед их требованиями означало бы еще больше отклониться от основных принципов нашей партии и двигаться в более консервативном направлении."
 ENG_democratic_reform: "Продвижение Демократических реформ"
 ENG_democratic_reform_desc: "В настоящее время существуют определенные лазейки, которые позволяют принимать более автократические решения на государственном уровне. Пришло время взять дело в свои руки и, наконец, протолкнуть в парламент законопроект, который заставит действовать тех, кто извлекает выгоду из этой политической двусмысленности."
 ENG_a_global_future: "Глобальное будущее"
 ENG_a_global_future_desc: "Мы не можем сосредоточиться исключительно на внутренних делах государства, мы также должны уделять внимание глобальным вопросам. Принимая во внимание суверенитет других государств, мы будем стремиться распространять [ENG.GetAdjective] влияние по всему миру."
 ENG_national_renewal: "Национальное обновление"
 ENG_national_renewal_desc: "Переориентация [ENG.GetAdjective] политики привела к своего рода национальному возрождению, в рамках которого люди продолжают требовать перемен. Мы не остановимся и не дадим себе передышки, мы будем продолжать добиваться перемен. Хороших перемен."
 ENG_with_open_arms: "С распростертыми объятиями"
 ENG_with_open_arms_desc: "Мы должны признать важность мигрантов. Делаем мы это с распростертыми объятиями или нет, но если мы продолжим отталкивать их, мы упустим какой-то серьезный талант, который иначе не приобрели бы."
 ENG_community_payback: "Программа окупаемости сообщества"
 ENG_community_payback_desc: "Программа возмездия сообщества будет направлена на то, чтобы позволить сообществам определять, как следует наказывать преступников. Это может быть от отбывания срока до вида общественных работ. Все это будет зависеть от местных сообществ, но от этого выиграет вся нация."
 ENG_checks_on_migration: "Проверки на предмет миграции"
 ENG_checks_on_migration_desc: "Независимо от того, насколько сильно мы нуждаемся в мигрантах, мы не можем просто впустить их без какой-либо предварительной проверки. Мы установим некоторые проверки мигрантов, чтобы убедиться, что они действительно не желают причинить вреда."
 ENG_australian_style_point_system: "Система начисления очков в Австралийском стиле"
 ENG_australian_style_point_system_desc: "Следуя по стопам наших австралийских друзей, мы установим систему начисления баллов, при которой прием мигрантов будет осуществляться в зависимости от их навыков и способности внести свой вклад в развитие страны."
 ENG_tough_on_anti_social_behavior: "Жесткая позиция в отношении антисоциального поведения"
 ENG_tough_on_anti_social_behavior_desc: "Наших сотрудников нужно стимулировать к работе. Сидя весь день дома, вы ничего не добьетесь. Мы сможем привлечь молодых людей к работе, разрешив им проходить стажировку в полиции и вооруженных силах, особенно в оборонной промышленности."
 ENG_renewed_police_budget: "Обновленный Бюджет на полицейскую деятельность"
 ENG_renewed_police_budget_desc: "Наша полиция не может недофинансироваться, мы должны признать важность сильных полицейских сил, которые обеспечат безопасность наших сообществ."
 ENG_established_refugee_programs: "Создание программ для беженцев"
 ENG_established_refugee_programs_desc: "Без надлежащей программы для беженцев те, кто покидает свои дома, придут к нам ни с чем, что можно было бы обеспечить. Мы разработаем всеобъемлющий план, который позволит беженцам интегрироваться в общество и заставит их работать над тем, чтобы внести свой вклад в экономику страны."
 ENG_streamlined_citizenship_process: "Упрощенный процесс получения гражданства"
 ENG_streamlined_citizenship_process_desc: "Давайте перейдем к сути: добавлять дополнительные препятствия, через которые люди могли бы перепрыгнуть, когда дело доходит до получения гражданства, не нужно. Обеспечение более быстрой интеграции будет более выгодным для всех в долгосрочной перспективе."
 ENG_neighbourhood_police_teams: "Группы Местной полиции"
 ENG_neighbourhood_police_teams_desc: "Вместо того чтобы увеличивать расходы на охрану порядка, мы можем сделать обратное. Призвав районы сформировать полицейские группы, мы сможем децентрализовать правосудие до такой степени, что о преступлении можно будет сообщать в соответствующие органы и расследовать его без присутствия патрульных подразделений повсюду одновременно."
 ENG_cctv_reduce_fear: "Видеонаблюдение уменьшает страх"
 ENG_cctv_reduce_fear_desc: "Камеры в общественных местах являются неотъемлемой частью поддержания национальной и гражданской безопасности. Если люди будут знать, что преступники будут пойманы, они будут спокойны, поскольку преступники дважды подумают, прежде чем совершить преступление."
 ENG_britain_can_be_better: "Британия может быть Лучше"
 ENG_britain_can_be_better_desc: "При надлежащих переменах и реформах Британия может стать лучше. Это не значит, что в Британии сейчас все плохо, но всегда есть возможности для улучшения. Британский народ доверил нашей партии, Лейбористской партии, возглавить Британию на пути к реформам. Мы не можем подвести их, и мы должны сделать все, что в наших силах, для того, чтобы их голоса были услышаны."
 ENG_more_power_to_people: "Больше власти для людей"
 ENG_more_power_to_people_desc: "Власть правительства должна быть в руках народа. В конце концов, политики - это выходцы из самого народа. Мы не должны допустить возвышения политических династий и захвата власти."
 ENG_westminster_reinforced: "Укрепленный Вестминстер"
 ENG_westminster_reinforced_desc: "Иногда люди не знают, о чем именно они просят. В таких случаях необходимо усилить участие правительства, и политические эксперты должны вмешаться и принять решение за них."
 ENG_further_digital_governance: "Дальнейшее цифровое управление"
 ENG_further_digital_governance_desc: "Люди должны иметь возможность более свободно взаимодействовать с правительством. Интернет - идеальный инструмент для этого, и, предоставляя людям доступ к государственным ресурсам через цифровое пространство, мы сможем расширить наши возможности в области управления без особых проблем."
 ENG_a_union_of_nations: "Союз наций"
 ENG_a_union_of_nations_desc: "Британия - это не одна нация, это союз наций. Мы позаботимся о том, чтобы каждая нация была точно представлена, и это будет сделано благодаря нашей способности предоставлять им доступ к экономическим возможностям."
 ENG_reconsider_the_lobbying_act: "Пересмотреть закон о лоббировании"
 ENG_reconsider_the_lobbying_act_desc: "Закон о лоббировании часто обвиняли в том, что он значительно повышает прозрачность правительства, требуя от лоббистских групп раскрывать информацию о своем финансировании, правилах о том, сколько они могут потратить, и так далее. Однако это также повлияло на нашу деятельность, и некоторые призывают пересмотреть законопроект."
 ENG_people_led_constitutional_convention: "Съезд, возглавляемый людьми"
 ENG_people_led_constitutional_convention_desc: "Мы призовем народ возглавить конституционное собрание, позволив плюрализму заменить сингулярность. Благодаря голосованию народа его доверие к нам будет обеспечено навечно."
 ENG_corporaet_led_constitutional_convention: "Корпоративное мероприятие под руководством"
 ENG_corporaet_led_constitutional_convention_desc: "Корпорации знают, что лучше для Британии. Поэтому мы должны ставить их интересы в руководстве страной превыше чьих-либо других, в конце концов, именно у них есть деньги."
 ENG_revised_town_laws: "Пересмотренные городские законы"
 ENG_revised_town_laws_desc: "Некоторые городские законы все еще сохраняют довольно устаревшие правила и подзаконные акты. Будет лучше, если мы начнем их устранять, тем более что некоторые из них вызывают сбои в деятельности определенных отраслей."
 ENG_replacing_the_house_of_lords: "Замена палаты лордов"
 ENG_replacing_the_house_of_lords_desc: "Палата лордов - один из старейших институтов в мире, но в то же время и один из самых отсталых. Их постоянное вмешательство в работу парламента сделало их головной болью, когда дело доходит до принятия законопроектов, и с ними необходимо что-то делать."
 ENG_ulift_peerages: "Возвышение Пэров"
 ENG_ulift_peerages_desc: "Первый шаг от предотвращения отхода Британии от ее традиций - это возвышение пэров. С пэрами мы сможем защитить наши традиции и придворную культуру."
 ENG_abolish_life_peerages: "Упразднить пожизненные пэрства"
 ENG_abolish_life_peerages_desc: "Пэры - это не то, что избирается, пэры полностью передаются по наследству или назначаются. В пэрах нет ничего демократического, и их отмена серьезно ограничит влияние аристократии."
 ENG_common_expertise: "Общий опыт"
 ENG_common_expertise_desc: "Нам нужен опыт обычного человека, а не корпорации, политика или иностранца. Нам нужны настоящие люди из общей сферы, чтобы направлять нацию и двигать ее к светлому, улучшенному будущему."
 ENG_technocratic_expertise: "Технократический опыт"
 ENG_technocratic_expertise_desc: "Те, кто доказал свою состоятельность, почти наверняка всегда богаты и образованны. Привлечение их опыта в правительство десятикратно ускорит прогресс Британии."
 ENG_labour_for_workers_and_ceos_alike: "Труд: Как для работников, так и для генеральных директоров"
 ENG_labour_for_workers_and_ceos_alike_desc: "Нам нужно воздерживаться от отчуждения генерального директора и высших эшелонов общества. Вместо этого нам нужно успокоить их и работать в направлении переговоров и компромисса, которые позволят улучшить трудовое регулирование."
 ENG_the_queens_family: "Семья королевы"
 ENG_the_queens_family_desc: "Сила Суверена заключается не только в законе или традиции, но и в круге, который стоит за ее спиной, когда государство находится в напряжении. Те, кто приглашен в Ближайшее окружение королевы, будут пользоваться влиянием от ее имени, но они никогда не должны путать близость с властью. Корона - единственная константа, и королева будет решать, как ее семья будет служить ей."
 ENG_the_prince_trust: "Доверие принца"
 ENG_the_prince_trust_desc: "Корона держится, потому что она приспосабливается, и мало какие инструменты оказались более практичными, чем доверие принца. Расширяя сферу его охвата, мы превращаем королевское покровительство в ощутимые возможности, обучение, стажировку и лестницу обратно в общество для тех, кто остался позади. Это мягкая сила с жесткими результатами, и она укрепляет монархию там, где это важнее всего: в жизни простых британцев."
 ENG_harmony_doctrine: "Доктрина Гармонии"
 ENG_harmony_doctrine_desc: "В эпоху поляризации авторитет монархии заключается в ее способности объединяться, не прибегая к управлению. Мы будем продвигать Доктрину Гармонии, тихого посредничества между правительством, промышленностью, религиозными общинами и гражданским обществом, чтобы уменьшить раскол и восстановить национальную сплоченность. Государство может приказывать, но Корона может примирять."
 ENG_climate_alarm_bell: "Подайте сигнал Климатической тревоги"
 ENG_climate_alarm_bell_desc: "Предупреждения больше не носят теоретического характера, и задержка теперь влечет за собой национальные издержки. Мы будем использовать вес платформы Наследника, чтобы включить климатические риски в каждую повестку дня, от энергетической безопасности до продовольственной устойчивости и планирования инфраструктуры. Когда Дворец говорит ясно, даже самые неохотные министерства прислушиваются."
 ENG_duchy_originals: "Оригиналы герцогства"
 ENG_duchy_originals_desc: "Герцогство может быть больше, чем традицией; оно может быть доказательством того, что современное управление приносит прибыль. Мы будем развивать Duchy Originals как модель устойчивого производства, этичных цепочек поставок и сельских предприятий, которые поддерживают жизнеспособность сообществ, не опустошая их. Если Корона должна подавать пример, пусть это будет тот, который сам за себя платит."
 ENG_heir_of_the_realm: "Наследник королевства"
 ENG_heir_of_the_realm_desc: "Правление Елизаветы определило целую эпоху, но королевство всегда должно смотреть на то, что будет дальше. Мы официально закрепим национальную роль Наследника, обеспечим большую видимость, более широкий доступ к государственным брифингам и более четкое присутствие по всему Союзу. Непрерывность не предполагается; она подготовлена."
 ENG_naval_prince: "Морской принц"
 ENG_naval_prince_desc: "Королевская служба - это не театр, это претензия на авторитет, заработанный в военной форме. Мы поставим военно-морскую идентичность герцога Йоркского во главу угла церемониальных мероприятий и усилий по набору персонала, укрепляя связь между Короной и Флотом. В неспокойных морях символы долга все еще могут поддержать нацию."
 ENG_naval_prince_tt: "Разблокирует §Y$ENG_prince_andrew_leader_name$§! в качестве §Y высшего военного командования§!"
 ENG_appoint_trade_representative: "Назначить Королевского торгового представителя"
 ENG_appoint_trade_representative_desc: "Влияние Британии проявляется лучше всего, когда она приходит с правительственным мандатом и королевским престижем. Мы назначим Королевского торгового представителя, который откроет двери, успокоит партнеров и предоставит экспортерам высокопоставленного защитника на переговорах. Там, где министры торгуются, Корона может посовещаться."
 ENG_emerging_markets_circuit: "Схема развивающихся рынков"
 ENG_emerging_markets_circuit_desc: "Темпы мирового экономического роста меняются, и Британия не может позволить себе быть поздним гостем. Мы запустим программу визитов на развивающиеся рынки, инвестиционных форумов и стратегических презентаций, призванную закрепить британский бизнес на следующей волне глобального спроса. Цель проста: установить отношения сейчас, использовать их позже."
 ENG_digital_enterprise_patronage: "Покровительство цифровому предприятию"
 ENG_digital_enterprise_patronage_desc: "Торговля все чаще описывается кодом, а не грузом. Мы будем использовать королевское покровительство для развития британского цифрового предпринимательства, финтеха, кибербезопасности, передовых услуг и стартапов, которые их масштабируют, превращая престиж в инвестиции, а инвестиции - в рабочие места. Если Дворец может модернизироваться, то и экономика тоже."
 ENG_duty_of_the_crown: "Долг короны"
 ENG_duty_of_the_crown_desc: "Королевский титул - это не щит, это обязательство. Мы будем выстраивать общественную роль герцога вокруг видимого служения, дисциплинированного представительства и результатов, которые оправдывают место учреждения в жизни страны. В монархии долг - единственная валюта, которая никогда не обесценивается."
 ENG_workhorse_of_the_crown: "Рабочая лошадка короны"
 ENG_workhorse_of_the_crown_desc: "Монархия держится не только на зрелище; она держится на неустанном, видимом служении. Мы преврати модель исполнения обязанностей Королевской принцессы, полный график работы, обязательства на местах и спокойное выполнение до конца в стандарт, который общественность признает как настоящую работу. Когда Корону подвергают сомнению, это тот ответ, который она должна дать."
 ENG_carers_recognition_campaign: "Кампания по признанию Опекунов"
 ENG_carers_recognition_campaign_desc: "Британскую помощь часто оказывают люди, которые получают мало признания и меньше отдыха. Мы запустим национальную кампанию по признанию лиц, осуществляющих уход, под королевским патронажем, побуждая правительство и гражданское общество оказывать неоплачиваемым лицам, осуществляющим уход, практическую помощь и общественное уважение. Страна, которая чтит службу за границей, должна также чтить службу дома."
 ENG_discipline_service: "Дисциплина на службе"
 ENG_discipline_service_desc: "Корона, которая дрейфует, становится мишенью; корона, которая дисциплинирована, снова становится институтом. Мы ужесточим стандарты поведения, отточим домашний распорядок и потребуем профессионального выполнения всех общественных обязанностей. Пример Энн не гламурен, но он долговечен."
 ENG_princess_admiral_royal_navy: "Принцесса - адмирал Королевского военно - морского флота"
 ENG_princess_admiral_royal_navy_desc: "Королевский военно-морской флот - это больше, чем просто оборудование; это традиция, самобытность и национальный охват. Мы будем углублять военно-морскую роль Princess Royal, чтобы укрепить моральный дух, набор персонала и связь службы с нацией. Как в мирное время, так и в кризис Флот должен знать, что Корона на его стороне."
 ENG_princess_admiral_royal_navy_tt: "Разблокирует §Y$ENG_princess_anne_leader_name$§! в качестве §Y высшего военного командования§!"
 ENG_colonel_of_horse_logistics: "Полковник кавалерии и материально - технического обеспечения"
 ENG_colonel_of_horse_logistics_desc: "Армии движутся за счет дисциплины и материально-технического обеспечения, а не речей. Мы официально оформим назначения королевской принцессы на военную службу, чтобы подчеркнуть боеготовность, устойчивость и незапоминающуюся компетентность, которая помогает выигрывать кампании. Современным вооруженным силам нужны чемпионы, которые уважают работу за линией фронта."
 ENG_quiet_professionalism: "Спокойный профессионализм"
 ENG_quiet_professionalism_desc: "Сила заключается в сдержанности, а доверие - в последовательности. Мы сделаем тихий профессионализм философией работы Дворца: меньше театральности, больше отдачи и постоянное присутствие по всему Союзу. Если Британия хочет монархию, которая зарабатывает себе на жизнь, то именно так она это и делает."
 ENG_chairman_international_award: "Председатель Международной премии"
 ENG_chairman_international_award_desc: "Наследие сохраняется институтами, пережившими любое правление. Мы укрепим лидерство герцога в Международной премии, чтобы привить следующему поколению практические навыки, гражданскую уверенность и лидерство. Монархия, инвестирующая в молодежь, инвестирует в свое собственное будущее."
 ENG_trustee_network: "Сеть доверенных лиц"
 ENG_trustee_network_desc: "Влияние не декларируется; оно поддерживается через советы директоров, благотворительные организации и тихий механизм общественной жизни. Мы расширим сеть попечителей, которая свяжет заслуживающие доверия учреждения с королевским патронажем, улучшив координацию и повысив стандарты во всем секторе. Когда Корона организует ответственность, она зарабатывает авторитет."
 ENG_commonwealth_youth_outreach: "Работа с молодежью содружества"
 ENG_commonwealth_youth_outreach_desc: "Содружество не выстоит на одних церемониях, оно должно чувствовать свою значимость для молодежи. Мы начнем постоянную информационно-пропагандистскую работу в рамках обменов, учебных программ и совместных гражданских инициатив, чтобы сохранить связи с Великобританией в жизни будущих лидеров. Мягкая сила сильнее всего, когда она носит личный характер."
 ENG_production_guild_patronage: "Покровительство производственным гильдиям"
 ENG_production_guild_patronage_desc: "Промышленность - это культура в такой же степени, как и коммерция, а творческий и производственный секторы Великобритании являются стратегическими активами. Мы будем использовать королевское покровительство, чтобы поддерживать гильдии, студии и квалифицированные профессии, которые делают британское производство конкурентоспособным во всем мире. Престиж привлекает внимание; внимание приносит инвестиции."
 ENG_steady_hand: "Твердая рука"
 ENG_steady_hand_desc: "В семье, основанной на тщательном контроле, стабильность становится стратегической добродетелью. Мы представим герцога как человека твердой руки, надежного, предсказуемого и сосредоточенного на службе, а не на заголовках газет. Иногда самая ценная королевская роль заключается просто в том, чтобы не дать институту пошатнуться."
 ENG_duke_charities: "Благотворительные организации герцога"
 ENG_duke_charities_desc: "Наследие герцога Эдинбургского измеряется построенными институтами, а не произнесенными речами. Мы консолидируем и сделаем профессиональным его благотворительный портфель, чтобы обеспечить долгосрочное финансирование, более эффективное управление и прочное общественное доверие. Если мы хотим, чтобы монархию уважали, ее филантропия должна быть такой же дисциплинированной, как и ее церемонии."
 ENG_international_award_conference: "Международная Конференция по Присуждению Наград"
 ENG_international_award_conference_desc: "Сильной стороной Премии всегда были ее глобальная сеть и общие стандарты. Мы созовем Международную конференцию по присуждению наград, чтобы согласовать партнеров, расширить участие и модернизировать программы для нового поколения. Королевское наследие становится системой, когда оно организовано на международном уровне."
 ENG_wwf_president_emeritus: "Почетный президент WWF"
 ENG_wwf_president_emeritus_desc: "Охрана природы больше не является узкоспециализированным делом; это национальная безопасность под другим названием. Мы будем использовать авторитет герцога как почетного президента WWF, чтобы сделать охрану дикой природы, биоразнообразие и заботу об окружающей среде серьезными политическими приоритетами. Когда Дворец позиционирует природу как стратегическую, правительствам становится все труднее ее игнорировать."
 ENG_prince_phillip_medal: "Медаль принца Филиппа"
 ENG_prince_phillip_medal_desc: "Символы имеют значение, когда они вознаграждают за правильные добродетели. Мы учредим медаль принца Филиппа в честь практической службы, инженерного дела, промышленности, реагирования на чрезвычайные ситуации и незаурядной компетентности, которая обеспечивает функционирование Великобритании. Это королевское послание в металле: главное - результат."
 ENG_strength_and_stay: "Сила и Пребывание"
 ENG_strength_and_stay_desc: "Монархия держится стойко под давлением. Мы перенесем старую философию герцога, дисциплину, жизнестойкость и отказ подчиняться преходящей моде на общественное положение семьи. Когда налетают бури, Крона должна выглядеть неподвижной."
 ENG_from_sandhurst_to_service: "Из Сандхерста в Сервис"
 ENG_from_sandhurst_to_service_desc: "Следующее поколение Короны должно вызывать доверие не только к церемонии. Мы укрепим общественную роль принца в дисциплинированной службе, военном профессионализме, долге и практическом лидерстве, приобретенном на собственном горьком опыте. Сандхерст - это не значок, это стандарт."
 ENG_royal_foundation: "Королевский фонд"
 ENG_royal_foundation_desc: "Современная монархия измеряется влиянием, а не традициями. Мы расширим Королевский фонд как основной инструмент принца, профессиональные программы, измеримые результаты и партнерские отношения, которые могут пережить политическую смену. Если Дворцу суждено руководить, он должен выполнять свои обязанности."
 ENG_heads_together: "Головы вместе"
 ENG_heads_together_desc: "Устойчивая нация требует большего, чем прочные границы; она требует сильных умов. Мы вместе поднимем головы в общенациональном стремлении к повышению грамотности в области психического здоровья, снижению стигматизации и практической поддержке тех, кто борется молча. Корона не может узаконить сострадание, но она может нормализовать его."
 ENG_veteran_armed_forces_support: "Поддержите наших ветеранов"
 ENG_veteran_armed_forces_support_desc: "Служба не заканчивается, когда снимается униформа. Мы усилим поддержку ветеранов и вооруженных сил посредством благотворительных организаций, работодателей и координации действий правительства, гарантируя, что те, кто нес это бремя, впоследствии не будут выброшены на помойку. Страна, требующая жертв, должна гарантировать достоинство."
 ENG_bridge_to_the_future: "Мост в будущее"
 ENG_bridge_to_the_future_desc: "Правление Елизаветы олицетворяет преемственность. Уильям, должно быть, олицетворяет переходный период Мы сформируем принца как мост в будущее, современный по методам, дисциплинированный по тону и основанный на законности службы. Следующая глава монархии начинается до того, как корона перейдет к нам."
 ENG_queen_eldest: "Совет старейшего"
 ENG_queen_eldest_desc: "Королева обращается к своей старшей линии, чтобы продемонстрировать преемственность за рубежом и уверенность дома. Благодаря публичности наследника и доступу королевского посланника Корона может открыть двери, недоступные министрам, и сделать так, чтобы голос Британии был услышан в каждой столице."
 ENG_queen_middle: "Средняя колонна"
 ENG_queen_middle_desc: "Королева полагается на среднее поколение в поддержании дисциплины в учреждении. Их сила не в зрелище, а в расписании, стандартах и спокойной компетентности, которые защищают Корону от скандалов и дрейфа."
 ENG_queen_youngest: "Мост в завтрашний день"
 ENG_queen_youngest_desc: "Королева укрепляет семью в проверенной стабильности, готовя следующую эру у всех на виду. Учитывая институциональный вес супруга-ветерана и современный послужной список следующего наследника, монархия сигнализирует о том, что обновление происходит контролируемо, а не хаотично."
 ENG_triumph_of_the_crown: "Триумф короны"
 ENG_triumph_of_the_crown_desc: "Баланс сместился, и Корона больше не правит просто по традиции. С монархией во главе государства Британия вступает в новое урегулирование, где лояльность вознаграждается, инакомыслие подавляется, а национальное руководство устанавливается из Дворца. Теперь королевство будет двигаться с одной целью, и мир поймет, что Корона вернулась к власти."
 ENG_the_queens_speech_title: "Речь королевы"
 ENG_the_queens_speech_desc: "[ENG_the_queens_speech_focus_description]"
 ENG_the_kings_speech_title: "Король говорит!"
 ENG_restore_civil_liberties: "Восстановить гражданские свободы"
 ENG_restore_civil_liberties_desc: "Корона, которая правит, также должна доказать, что может сдерживать себя. Мы отменим чрезвычайные полномочия, восстановим надлежащую правовую процедуру и подтвердим права, которые делают британскую власть легитимной. Пусть наши оппоненты называют это слабостью, королевство назовет это уверенностью."
 ENG_rule_sword_sceptre: "Правь мечом и скипетром"
 ENG_rule_sword_sceptre_desc: "Старые ограничения рухнули, и царством не будут управлять колебания. Мы соединим королевскую власть с инструментами государственной власти, гарантируя, что воля короны будет исполнена без промедления. Британия будет упорядоченной, решительной, и ее будут бояться те, кто принимает вежливость за слабость."
 ENG_royal_prerogative_activation: "Активируйте Королевскую прерогативу"
 ENG_royal_prerogative_activation_desc: "Есть полномочия, которые существуют в тени конституции, используются экономно и о которых говорят осторожно. Мы задействуем Королевскую прерогативу, чтобы двигать государство быстрыми темпами, минуя паралич и приводя правительственный механизм в соответствие. Когда действует Корона, за ней следует королевство."
 ENG_a_bid_soft_power: "Ставка на мягкую силу"
 ENG_a_bid_soft_power_desc: "Власть измеряется не только кораблями и бюджетами, но и престижем, доступом и способностью задавать тон международной жизни. Мы сделаем Корону двигателем мягкой силы Великобритании, расширяя культурную дипломатию, королевское покровительство за рубежом и сети влияния, которые переживут любой кабинет. Когда другие будут гоняться за заголовками, мы будем формировать повествование."
 ENG_commonwealth_summit: "Проведение саммита Содружества"
 ENG_commonwealth_summit_desc: "Содружество - это не отголосок империи, это сеть, которая может быть превращена в стратегию. Мы проведем саммит Содружества под королевским руководством, чтобы заручиться новыми обязательствами в области торговли, сотрудничества в области безопасности и совместного развития. Если Британии суждено снова лидировать, она начнет с того, что соберет своих друзей в одной комнате."
 ENG_crown_procurement_program: "Программа закупок Короны"
 ENG_crown_procurement_program_desc: "Правящая монархия не может зависеть от медленных контрактов и министерских войн за территорию. Мы создадим Программу закупок Crown для централизации закупок, ускорения перевооружения и поощрения фирм, которые выполняют работы в срок и в масштабе. Когда Дворец подаст знак, промышленность придет в движение."
 ENG_modernize_royal_navy: "Модернизировать Королевский военно- морской флот"
 ENG_modernize_royal_navy_desc: "Территория Британии всегда была морской, и корона не будет править королевством, которое не может контролировать свои морские пути. Мы модернизируем Королевский военно-морской флот новыми корпусами, более четкой доктриной и материально-техническим обеспечением для ведения операций вдали от родных вод. Пусть соперники наблюдают за нашими гаванями и подсчитывают, что из них выходит."
 ENG_raf_army_overhaul: "Капитальный ремонт королевских ВВС и армии"
 ENG_raf_army_overhaul_desc: "Флот без прикрытия с воздуха и сухопутных сил - это символ, а не щит. Мы проведем капитальный ремонт королевских ВВС и армии, оснастив их современными командными структурами, модернизированным оборудованием и подготовкой к войне высокой интенсивности. Корона не будет рисковать своей властью, полагаясь на устаревшие силы."
 ENG_leverage_crown_estate: "Используйте преимущества Crown Estate"
 ENG_leverage_crown_estate_desc: "Наследственное имущество - это больше, чем наследование, это стратегический инструмент. Мы будем использовать его активы для финансирования национальных проектов, стабилизации ключевых отраслей и закрепления долгосрочного развития, не выпрашивая у парламента каждый фунт. Если монархия собирается править, она также научится инвестировать."
 ENG_national_service_act: "Принять Закон о национальной службе"
 ENG_national_service_act_desc: "Государство, стремящееся к безопасности, должно быть готово нести ее бремя. Мы примем Закон о национальной службе, направленный на укрепление трудовых ресурсов, дисциплины и общего чувства долга по всей стране. Кто-то назовет это принуждением, Корона назовет это долгом."
 ENG_new_constitutional_charter: "Разработать проект новой конституционной Хартии"
 ENG_new_constitutional_charter_desc: "Старое соглашение было написано для другой Британии, и оно больше не выдерживает напряжения. Мы разработаем Новую Конституционную хартию, которая определит полномочия короны, пределы полномочий парламента и права, которые остаются вне политики. Будучи запечатанным, царство обретет ясность, а ясность - это сила."
 ENG_secure_succession: "Обеспечьте преемственность"
 ENG_secure_succession_desc: "Правящая монархия не может позволить себе неопределенности на самом верху. Мы обеспечим преемственность с помощью четкого закона, дисциплинированного планирования и публичного подтверждения полномочий наследника. Непрерывность не предполагается, она навязывается."
 ENG_rule_councillorship: "Правление через членство в Совете"
 ENG_rule_councillorship_desc: "Парламентское правление порождает фракции, но корона может управлять через надежные руки. Мы уполномочим Королевский совет советников разрабатывать политику, контролировать министерства и поддерживать связь государства с Дворцом. Британией будут управлять компетентность и лояльность, а не партийные переговоры."
 ENG_convene_foreign_secretary_cabinet: "Созвать кабинет министра иностранных дел"
 ENG_convene_foreign_secretary_cabinet_desc: "Дипломатия не может быть импровизированной, когда на кону власть короны. Мы соберем Кабинет министра иностранных дел для координации действий послов, разведчиков, торговых представителей и специалистов по оборонному планированию под единым руководством. Британия будет говорить единым голосом за рубежом, и это будет правильный голос."
 ENG_champion_liberal_values: "Защитник Либеральных ценностей"
 ENG_champion_liberal_values_desc: "Если монархия хочет править, она должна править на принципах, которые Британия может признать своими собственными. Мы будем отстаивать либеральные ценности, защищать свободные институты и докажем, что королевская власть может сосуществовать с правами и сдержанностью. Корона будет сильной, и она будет законной."
 ENG_european_outreach: "Распространение информации в Европе"
 ENG_european_outreach_desc: "Британия не может позволить себе изоляцию на пороге своей собственной страны. Мы запустим европейскую информационно-пропагандистскую кампанию по восстановлению каналов, обеспечению сотрудничества там, где интересы пересекаются, и недопущению того, чтобы конкуренты устанавливали условия на континенте без нас. Корона будет действовать напрямую, и Европа обратит на это внимание."
 ENG_close_proximity_nato: "Тесная близость с НАТО"
 ENG_close_proximity_nato_desc: "НАТО - это не только пакт, это рычаг сдерживания и доступа. Мы будем действовать в непосредственной близости от Североатлантического союза, чтобы обеспечить обмен разведданными, оперативную совместимость и стратегическую глубину, сохраняя при этом свободу действий Короны. Британия будет союзницей, но никогда не подчиненной."
 ENG_joint_operational_command: "Создать Объединенное оперативное командование"
 ENG_joint_operational_command_desc: "Межведомственное соперничество отнимает время, а время убивает. Мы создадим Объединенное оперативное командование для объединения планирования, материально-технического обеспечения и исполнения во флоте, сухопутных войсках и королевских ВВС в рамках единой боевой доктрины. Когда Корона отдаст приказ действовать, все ветви будут двигаться как единое целое."
 ENG_reaffirm_special_relationship: "Подтверждаем Особые отношения"
 ENG_reaffirm_special_relationship_desc: "Сила уважает силу, и Соединенные Штаты остаются самым решительным партнером королевства. Мы подтвердим Особые Отношения посредством сотрудничества в области разведки, координации обороны и совместного стратегического планирования на самом высоком уровне. Корона сохранит за Британией место за столом переговоров, за которым решается судьба мира."
 ENG_royal_charitable_initiative: "Королевская Благотворительная инициатива"
 ENG_royal_charitable_initiative_desc: "Править легче, когда государство верит, что о нем заботятся. Мы запустим Королевскую благотворительную инициативу, чтобы направить финансирование, волонтеров и общественное внимание на общины, находящиеся в тяжелом положении, доказывая, что Корона может править с состраданием. Лояльность растет быстрее всего там, где помощь приходит первой."
 ENG_time_for_common_sense: "Пришло время проявить здравый смысл"
 ENG_time_for_common_sense_desc: "Настало время для проявления здравого смысла. Годы правления лейбористов уводили наш народ в сторону от идеалов, которые делают Британию такой, какой она когда-то была. Мы не можем допустить, чтобы усилия таких великих людей, как Уинстон Черчилль, пропали даром, нет, мы сделаем Британию такой, какой она всегда должна была быть, - великой державой."
 ENG_knowing_who_we_are: "Зная, кто мы такие"
 ENG_knowing_who_we_are_desc: "В первую очередь мы британцы, во вторую - европейцы. Мы не можем забывать, кто мы такие, мы наследники сверхдержавы, подобной которой мир никогда прежде не видел. Солнце действительно никогда не заходило над Британией, и так оно и останется, если мы будем иметь к этому хоть какое-то отношение."
 ENG_a_world_leader: "Мировой лидер"
 ENG_a_world_leader_desc: "Мы британцы, которым нет равных, мы мировые лидеры и поборники свободы, мы не можем ослабить свою хватку мирового лидера. Вместо этого мы вновь заявим о себе как о переднем крае глобального лидерства."
 ENG_fighting_the_power_of_brussels: "Борьба с властью Брюсселя"
 ENG_fighting_the_power_of_brussels_desc: "Брюссель превысил свои административные возможности. Они активно унижают независимость наших стран своей риторикой и представляют угрозу нашей способности выбирать то, что мы хотим для Британии!"
 ENG_a_civilized_society: "Цивилизованное общество"
 ENG_a_civilized_society_desc: "Как цивилизованное общество, Британия не будет подвержена чужой пропаганде. Таким образом, необходимо быстро работать над устранением влияния тех, кто хочет внести радикальные изменения в наш образ жизни."
 ENG_a_stronger_society: "Более сильное общество"
 ENG_a_stronger_society_desc: "Наше общество будет более сильным и сплоченным, чем когда-либо прежде. Мы не можем позволить другим разрушить наше единство под видом \"реформ\". Наше общество может стать сильнее только в том случае, если мы будем продолжать защищать наши основные ценности."
 ENG_a_staunch_ally: "Верный союзник"
 ENG_a_staunch_ally_desc: "Мы не более чем верный союзник наших партнеров по НАТО! Любой, кто посмеет обвинить нас в нахлебничестве, бесперспективности или в чем-то промежуточном, может вернуться домой, откуда они пришли."
 ENG_town_and_country: "Город и страна"
 ENG_town_and_country_desc: "Мы - страна, которая не может забыть свои маленькие, сельские и скромные городки. Мы должны изо всех сил помнить об этих людях и стимулировать их продолжать идти вперед."
 ENG_a_more_flexible_europe: "Более гибкая Европа"
 ENG_a_more_flexible_europe_desc: "Европе необходимо быть более гибкой в достижении своих внешнеполитических целей в целом. Если мы хотим стать более сильным континентом в целом, Европе необходимо отказаться от всей программы \"объединения\" и стремиться к большей гибкости."
 ENG_rural_friendly_transport_services: "Транспортные услуги, Ориентированные на сельскую местность"
 ENG_rural_friendly_transport_services_desc: "Наши транспортные услуги не слишком дружелюбны к сельским общинам. Нам нужно будет придумать, как угодить этим людям."
 ENG_industrial_friendly_transport_services: "Безопасные для промышленности транспортные услуги"
 ENG_industrial_friendly_transport_services_desc: "Работающий человек должен без проблем добираться на работу и с работы. Нам нужно будет подумать о реконструкции или, по крайней мере, улучшении наших транспортных услуг для промышленных объектов."
 ENG_no_army_outside_of_europe: "Нет армии за пределами Европы"
 ENG_no_army_outside_of_europe_desc: "Почему британские военнослужащие находятся за пределами Европы? Какое место они занимают в Азии? Африка? Ближний Восток? Вместо этого нам нужно сосредоточиться на удержании наших войск внутри Европы."
 ENG_abolish_centrally_planned_housing: "Отменить Централизованное Планирование Жилищного строительства"
 ENG_abolish_centrally_planned_housing_desc: "Вместо того чтобы сосредотачиваться на выделении нашего бюджета на централизованно планируемую программу жилищного строительства, мы можем вместо этого направить эти средства на более важные цели."
 ENG_coming_to_the_aid_of_others: "Приходить на помощь другим"
 ENG_coming_to_the_aid_of_others_desc: "В мире есть те, кто отчаянно нуждается в нашей помощи, и мы здесь для того, чтобы оказать им ее."
 ENG_global_matters_global_problems: "Глобальные вопросы, глобальные проблемы"
 ENG_global_matters_global_problems_desc: "Почему нас волнует, с чем имеют дело другие? Это их проблема, а не наша! Они должны разобраться в этом самостоятельно."
 ENG_credit_based_public_transport: "Общественный транспорт на основе кредита"
 ENG_credit_based_public_transport_desc: "Вы работаете? Отлично, вам не нужно беспокоиться об оплате проезда. Разрешив тем, кто работает, бесплатно пользоваться общественным транспортом, мы сможем стимулировать людей к поиску работы."
 ENG_safe_haven_not_safe_touch: "Безопасное убежище, а не безопасное прикосновение"
 ENG_safe_haven_not_safe_touch_desc: "Мы - безопасное убежище для тех, кто действительно нуждается в помощи, если мы просто позволим кому-либо войти, то они сгноят нашу страну до полного забвения."
 ENG_are_you_thinking_what_were_thinking: "Ты думаешь о том же, о чем и мы?"
 ENG_are_you_thinking_what_were_thinking_desc: ""
 ENG_power_to_the_bank_of_england: "Полномочия Банка Англии"
 ENG_power_to_the_bank_of_england_desc: "На данный момент Банк Англии находится в худшем состоянии, чем когда-либо прежде. Поэтому необходимо, чтобы мы действовали и укрепляли этот институт."
 ENG_british_dream: "Британская мечта"
 ENG_british_dream_desc: "Британская мечта - это та, которой у многих не было уже очень долгое время. Мечтой и честолюбием является то, что все британцы будут процветать, не страдая от последствий общественных потерь."
 ENG_whats_wrong_with_discipline: "Что плохого в дисциплине?"
 ENG_whats_wrong_with_discipline_desc: "Похоже, что наши школы стали мягкотелыми и начали уклоняться от принятия необходимых дисциплинарных мер. Наш долг - учить наших детей хорошим манерам, и мы позаботимся о том, чтобы педагоги знали это."
 ENG_across_the_board_tax_slashes: "Повсеместное снижение налогов"
 ENG_across_the_board_tax_slashes_desc: "Если мы снизим налоги по всем направлениям, наши люди из всех слоев общества почувствуют, как тяжесть их бремени резко снизится. Мы не должны проводить дискриминацию!"
 ENG_tax_slashes_only_for_some: "Снижение налогов Только Для Некоторых"
 ENG_tax_slashes_only_for_some_desc: "У нас нет ни бюджета, ни желания снижать налоги для всех. Мы должны действовать скоординированно и снижать налоги только там, где это выгодно нам."
 ENG_icnreased_control_for_administrators: "Повышенный контроль со стороны администраторов"
 ENG_icnreased_control_for_administrators_desc: "Те, кто работает в наших школах, нуждаются в возможности высказывать свое мнение в вопросах, касающихся их учебных заведений. Это позволит нам привлечь новых ученых к росту."
 ENG_keeping_hospitals_clean: "Поддержание чистоты в Больницах"
 ENG_keeping_hospitals_clean_desc: "Нам необходимо поддерживать чистоту в наших больницах, как с точки зрения внешнего вида, так и с точки зрения доверия к ним."
 ENG_corporate_invitations: "Корпоративные приглашения"
 ENG_corporate_invitations_desc: "Нам нужно пригласить корпорации прийти и помочь нам определиться с экономической политикой. Они - сердцебиение нашей экономики, и без них мы были бы ничем."
 ENG_more_police_less_crime: "Больше полиции, меньше преступности"
 ENG_more_police_less_crime_desc: "Это совершенно очевидно, не так ли? Если у нас будет больше полиции, патрулирующей улицы, то у нас, безусловно, будет гораздо меньше преступлений."
 ENG_cutting_wait_times: "Сокращение времени ожидания"
 ENG_cutting_wait_times_desc: "Люди слишком долго ждут медицинских услуг, самое время что-то с этим сделать и сократить время ожидания вдвое!"
 ENG_turnaround_schools: "Новые школы"
 ENG_turnaround_schools_desc: "Если учащиеся не могут нормально сидеть на уроке и слушать своего преподавателя, тогда нам нужно придумать что-то другое. Отправка их в новую школу, наконец, решит проблему, с которой мы сталкиваемся с небольшим меньшинством наших учеников."
 ENG_structural_overhaul_of_nhs: "Структурная перестройка национальной системы здравоохранения"
 ENG_structural_overhaul_of_nhs_desc: "В нынешнем виде NHS не может продолжать работу. Это высасывает все наши деньги, заставляет пациентов болеть и ждать за дверью. Мы должны инициировать серию реформ, которые восстановят NHS с нуля."
 ENG_trusting_local_professionals: "Доверяя профессионалам"
 ENG_trusting_local_professionals_desc: "Зачем чинить его, если он не сломан? Мы оставим медицинские вопросы на усмотрение медицинских работников и позволим Национальной службе здравоохранения действовать самостоятельно с некоторыми небольшими корректировками."
 ENG_keeping_up_our_guard: "Поддерживая нашу бдительность"
 ENG_keeping_up_our_guard_desc: "Мы не можем терять бдительность только потому, что сейчас все спокойно. Мы должны предвидеть всевозможные сценарии, даже во времена стабильности и процветания."
 ENG_benefitting_the_taxpayer: "Приносящий пользу Налогоплательщику"
 ENG_benefitting_the_taxpayer_desc: "Кому мы служим, если не налогоплательщику? Нам нужно проводить политику, которая убедит налогоплательщиков в том, что их деньги не будут потрачены впустую."
 ENG_invitation_to_the_government_of_britain: "Приглашение правительству Великобритании"
 ENG_invitation_to_the_government_of_britain_desc: ""
 ENG_get_britain_moving_again: "Заставьте Британию Снова Двигаться"
 ENG_get_britain_moving_again_desc: "Для нас пришло время снова заставить Британию двигаться вперед. Никогда больше не прибегать к медленной, методичной и общепринятой стратегии выжидания, пока экономика наладится сама собой. Мы собираемся взять дело в свои руки."
 ENG_cleanup_westminster: "Чистый Вестминстер"
 ENG_cleanup_westminster_desc: "Вестминстер - это бардак, перенасыщенный волокитой и бюрократическим перегибом. Пришло время нам взяться за кувалду для всего этого и навести порядок на этом месте."
 ENG_big_society_not_big_government: "Большое Общество, А не Большое правительство"
 ENG_big_society_not_big_government_desc: "Зачем нам нужно большое правительство? Если наше общество достаточно хорошо, зачем контролировать, управлять и диктовать каждый аспект их жизни? Вместо этого мы урежем работу правительства и позволим обществу делать свое дело."
 ENG_household_debt_management_programs: "Программы Управления Долгом домашних хозяйств"
 ENG_household_debt_management_programs_desc: "Иногда люди просто не могут расплатиться со своими долгами, и это нормально. Мы создадим программы управления долгом, которые либо возьмут на себя часть их долга, либо помогут им с планами его погашения."
 ENG_bigger_place_for_educators: "Больше места для педагогов"
 ENG_bigger_place_for_educators_desc: "Страна должна быть более открытой для наших педагогов. Мы и близко не ценим их так высоко, как следовало бы, особенно за ту работу, которую они выполняют."
 ENG_the_most_family_friendly_country: "Самая Дружелюбная К Семье Страна"
 ENG_the_most_family_friendly_country_desc: "Наша страна должна быть более открытой для принятия семей и людей, имеющих семьи. Наше население не может оставаться статичным и небольшим, нам нужно расти и пропагандировать хорошие ценности."
 ENG_knowledge_for_industry: "Знания для промышленности"
 ENG_knowledge_for_industry_desc: "Вместо того чтобы оставлять знания впустую где-то в другом месте, мы могли бы перенаправить часть этой мозговой энергии на новые отрасли, возможно, военную промышленность."
 ENG_power_of_recall: "Сила отзыва"
 ENG_power_of_recall_desc: "Очевидно, что некоторые премьер-министры лгут, и, следовательно, их необходимо устранить, если они не могут выполнять свои обещания. Мы должны позволить людям вспомнить премьер-министра, которого они больше не хотят возглавлять."
 ENG_a_more_balanced_economy: "Более Сбалансированная Экономика"
 ENG_a_more_balanced_economy_desc: "Наша экономика находится в плачевном состоянии в результате десятилетий некомпетентности рабочей силы, пришло время привести все в порядок!"
 ENG_bye_bye_bureaucracy: "Прощай, прощай, бюрократия"
 ENG_bye_bye_bureaucracy_desc: "Кому нужно большое правительство, если у нас может быть большая свобода? В повседневной жизни наших граждан нет места бюрократии, зато есть место расширению свобод."
 ENG_case_by_case_intervention: "Индивидуальное вмешательство"
 ENG_case_by_case_intervention_desC: "Мы не можем просто отказаться от нашей способности высказывать свое мнение в вопросах, имеющих общественное значение, просто потому, что мы презираем более крупное правительство. Но скорее мы должны рассматривать каждый случай индивидуально и работать над лучшим решением."
 ENG_protecting_childhood: "Защита детства"
 ENG_protecting_childhood_desc: "Как бы то ни было, наша молодежь подвергается серьезному риску пострадать от больных людей по множеству каналов, будь то Интернет или стретчинг. Мы должны предпринять дополнительные шаги по защите детства, чтобы дать ему возможность расти и процветать."
 ENG_investigate_lost_funds: "Расследовать Потерянные средства"
 ENG_investigate_lost_funds_desc: "По какой-то причине несколько лет назад пропали крупные суммы государственной наличности. Пришло время начать надлежащее расследование и выяснить, что произошло."
 ENG_a_more_transparent_government: "Более Прозрачное Правительство"
 ENG_a_more_transparent_government_desc: "Наше правительство недостаточно прозрачно, и мы должны предпринять дополнительные шаги для обеспечения того, чтобы наши избиратели были осведомлены о том, что происходит в Вестминстере."
 ENG_petitions_for_debate: "Петиции для обсуждения"
 ENG_petitions_for_debate_desc: "Если мы позволим людям собрать значительное количество подписей под петицией за изменения, мы могли бы передать их на рассмотрение парламента и более непосредственно использовать обратную связь с населением."
 ENG_public_reading_stage: "Этап публичного чтения"
 ENG_public_reading_stage_desc: "Мы разрешим создать интернет-форум, который позволит нашим людям комментировать и обсуждать изменения, принимаемые парламентом для повышения прозрачности и охвата правительства."
 ENG_for_the_common_man: "Для обычного Человека"
 ENG_for_the_common_man_desc: "Наше правительство предназначено для простых людей, а не для тех, кто заправляет шоу. Мы проведем целенаправленные реформы, которые позволят повысить политическую активность простого класса."
 ENG_for_the_wealthy_man: "Для богатого человека"
 ENG_for_the_wealthy_man_desc: "Какое, черт возьми, отношение бедные люди вообще имеют к правительству? Большинство из них - левые бездельники, которым ничего так не нужно, как государственные субсидии, чтобы не работать. Мы будем заботиться о тех членах общества, которые действительно работают и вносят свой вклад в экономику."
 ENG_a_brighter_more_secure_future: "Более светлое и безопасное будущее"
 ENG_a_brighter_more_secure_future_desc: ""
 ENG_operation_dagger: "Операция \" Кинжал \""
 ENG_operation_dagger_desc: "Когда-то в Персидском заливе доминировали наши силы, и наша способность диктовать, что входит и выходит, была практически беспрепятственной. Однако в настоящее время мы занимаем меньшую позицию в переговорах с региональными участниками и вместо этого вынуждены полагаться на свои козыри, чтобы добиться чего-либо. Захватив Мусандам, мы сможем снова занять позицию силы в Персидском заливе."
 ENG_operation_barras: "Операция \" Баррас \""
 ENG_operation_barras_desc: "§R«Да, это их настоящее название». §!\n\n Мы получили сообщения о том, что группа ополченцев «Уэст-Сайдские ниггеры» захватила в плен нескольких британских солдат и держит их в заложниках.  На нас оказывают давление, требуя вмешаться в той или иной форме, чтобы спасти их жизни, и наше военное командование разработало операцию «Баррас» для этих целей.  У нас также есть возможность предпринять дальнейшие действия, захватив во время операции жизненно важные ресурсы, но это не является обязательным условием."
 ENG_operation_coastal_star: "Операция \" Прибрежная звезда \""
 ENG_operation_coastal_star_desc: "Гамбия начинает опасно скатываться к авторитаризму, нестабильности и, конечно же, выходит из нашей орбиты. Нам нужно будет вмешаться в той или иной форме и заставить их изменить курс, иначе остальная Западная Африка может последовать их примеру."
 ENG_operation_delta_guard: "Операция \" Дельта - гвардия \""
 ENG_operation_delta_guard_desc: "Очевидно, что нигерийцы ничего не смыслят в управлении государством, и мы обязаны что-то сделать с потраченным впустую черным золотом вокруг Дельты. В противном случае мы бы просто пустили все это впустую, а этого никто не хочет. Операция Delta Guard позволит нам восстановить экономическое господство в Нигерии, и доходы от нее, несомненно, пойдут на пользу государству."
 ENG_the_sun_which_never_set: "Солнце, Которое Никогда Не Заходит"
 ENG_the_sun_which_never_set_desc: "Солнце действительно никогда не заходит над Британией, и мы позаботимся о том, чтобы так и оставалось."
 ENG_operation_resolute_banner: "Операция \" Решительный Баннер \""
 ENG_operation_resolute_banner_desc: "Сербское правительство продолжает угрожать Косово, и в результате мы вынуждены вмешаться и провести красную черту."
 ENG_falklands_policy: "Политика Фолклендских островов"
 ENG_falklands_policy_desc: "Несмотря на наше небольшое столкновение с Аргентиной из-за Фолклендских островов пару десятилетий назад, память об этом конфликте все еще свежа в умах многих. Мы можем продвигаться вперед с новой политикой на островах и, возможно, предпринять дополнительные шаги."
 ENG_regime_change_in_zimbabwe: "Гарантия эксплуатации"
 ENG_regime_change_in_zimbabwe_desc: "Многолетний диктатор Зимбабве [ZIM.GetLeader] должен быть свергнут любыми доступными средствами.  Его жестокое обращение с британским и зимбабвийским народами не должно остаться безнаказанным, и правосудие должно свершиться как можно скорее."
 ENG_operation_east_divide: "Операция \" Восточный рубеж \""
 ENG_operation_east_divide_desc: "Суэцкий канал - это законная британская глина, и без Суэцкого канала нам пришлось бы пройти через трудности \"правил международной торговли\". Таким образом, мы попытаемся договориться с египтянами о частичном контроле над Синаем, в противном случае у нас не будет другого выбора, кроме как что-то предпринять по этому поводу."
 ENG_operation_ninety_seven: "Операция '97"
 ENG_operation_ninety_seven_desc: "Передача Гонконга китайцам была ошибкой, причем серьезной. Мы должны искать новые способы вернуть Гонконг под наше влияние, если мы хотим восстановить себя в качестве экономического гегемона."
 devolution.1.t: "Избиратели стремятся принять законы для снижения зависимости."
 devolution.1.d: "Недавние события в стране привели к тому, что наши субъекты начали продвигать законы, направленные на снижение их зависимости от центрального правительства. У нас есть возможность наложить вето на эти законопроекты, но это может вызвать ещё больший уровень недовольства."
 devolution.1.a: "Утвердить их"
 devolution.1.b: "Наложить на них вето"
 devolution.1.c: "Показать отдельные законопроекты"
 devolution.2.t: "Законопроект Шотландии"
 devolution.2.d: "Парламент Шотландии представил правительству законопроект, который увеличит их автономию и подтолкнет к созданию более развитого государства. Наложение вето на этот законопроект может разозлить их, но его одобрение подтолкнет их к передаче полномочий."
 devolution.2.a: "Одобрите это"
 devolution.2.b: "Наложить вето на это"
 devolution.3.t: "Законопроект Северной Ирландии"
 devolution.3.d: "Парламент Северной Ирландии представил правительству законопроект, который увеличит их автономию и подтолкнет к созданию более развитого государства. Наложение вето на этот законопроект может разозлить их, но его одобрение подтолкнет их к передаче полномочий."
 devolution.3.a: "Одобрите это"
 devolution.3.b: "Наложить вето на это"
 devolution.4.t: "Билль об Уэльсе"
 devolution.4.d: "Парламент Уэльса представил правительству законопроект, который увеличит их автономию и подтолкнет к созданию более развитого государства. Наложение вето на этот законопроект может разозлить их, но его одобрение подтолкнет их к передаче полномочий."
 devolution.4.a: "Одобрите это"
 devolution.4.b: "Наложить вето на это"
 devolution.5.t: "Призывы к независимости Шотландии Растут"
 devolution.5.d: "Каждый день ведущие новостей выступают перед толпами людей, требующих проведения общенационального референдума, чтобы решить, оставаться ли Шотландии частью [ENG.GetName]. Очевидно, что Вестминстер в целом против этой идеи, но прямое вето может привести к нестабильности."
 devolution.5.a: "Ладно, давайте посмотрим, что получится"
 devolution.5.b: "Наложить вето на это"
 devolution.6.t: "Призывы к независимости Северной Ирландии Растут"
 devolution.6.d: "Каждый день ведущие новостей выступают перед толпами людей, требующих проведения общенационального референдума, чтобы решить, должна ли Северная Ирландия оставаться частью [ENG.GetName]. Очевидно, что Вестминстер в целом против этой идеи, но прямое вето может привести к нестабильности."
 devolution.6.a: "Ладно, давайте посмотрим, что получится"
 devolution.6.b: "Наложить вето на это"
 devolution.7.t: "Призывы к независимости Уэльса Растут"
 devolution.7.d: "Каждый день ведущие новостей выступают перед толпами людей, требующих проведения общенационального референдума, чтобы решить, должен ли Уэльс оставаться частью [ENG.GetName]. Очевидно, что Вестминстер в целом против этой идеи, но прямое вето может привести к нестабильности."
 devolution.7.a: "Ладно, давайте посмотрим, что получится"
 devolution.7.b: "Наложить вето на это"
 devolution.10.t: "Учредительные выборы"
 devolution.10.d: "Настало время выборов в наших субъектах федерации. В каждом субъекте будут избраны новые премьер-министры в соответствующих парламентах, которые будут либо выступать за независимость, либо за [ENG.GetName]. Вероятность того, что эти сторонники независимости будут избраны, зависит от активности каждого из субъектов."
 devolution.10.a: "Ладно"
 britain_md.100.t: "Приближается операция \" Кинжал \""
 britain_md.100.d: "Мусандам расположен в очень стратегическом регионе, являющемся острием Персидского залива. Бесчисленные танкеры и конвои ежедневно проходят через Ормузский пролив, и в условиях постоянно растущей нестабильности в регионе мы не в состоянии обеспечить защиту судоходного маршрута. Если мы сможем взять провинцию под свой контроль, мы будем в лучшем положении для защиты нашего флота и активов в регионе."
 britain_md.100.a: "Попробуй заключить сделку с Оманом"
 britain_md.100.b: "Нет времени на переговоры, переезжай"
 britain_md.101.t: "[ENG.GetName] Обращается к нам за помощью в Musandam"
 britain_md.101.d: "Британцы пришли к нам, чтобы поговорить. Более конкретно, они находятся здесь из-за нашей территории. Услышав британское предложение, наши дипломаты взорвались гневом, не в силах сдержаться после того, как услышали, что британцы здесь, чтобы попытаться договориться о Мусандаме. Такое агрессивное требование, несомненно, невообразимо расстроит наш народ. Хотя британцы вновь заявили, что отклонение такого требования не оставит им иного выбора, кроме как \"прибегнуть к другим средствам\"."
 britain_md.101.a: "Никогда!"
 britain_md.101.b: "Какой у нас есть выбор?"
 britain_md.102.t: "Оман отказывается от переговоров"
 britain_md.102.d: "Правительство Омана ясно дало понять, что не заинтересовано в каких-либо переговорах, и предпочло выдворить наших дипломатов."
 britain_md.102.a: "Они не оставляют нам выбора"
 britain_md.102.b: "Забудь об этом"
 britain_md.103.t: "Оман выдвигает нам условия"
 britain_md.103.d: "Правительство Омана предприняло мудрый шаг, начав переговоры с нами, и даже предложило нам условия. Нас просят выплатить солидную сумму авансом и гарантировать защиту Омана в течение определенного периода времени. Отклонение этого предложения означало бы, что Оман не передаст нам права на Musandam."
 britain_md.103.a: "Прекрасно"
 britain_md.103.b: "Нет, мы пойдем другим путем"
 britain_md.103.c: "Забудь об этом"
