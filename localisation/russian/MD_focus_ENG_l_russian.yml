 ENG_phillip_1_idea_desc: "The title Duke of Edinburgh was held by Prince Philip as a defining mark of his role beside the sovereign and his lifetime of service to the realm. Bestowed upon him at his marriage to Princess Elizabeth, it combined historic prestige with a modern identity built on duty, discipline, and institutional support. In public life it became closely associated with his patronages and the practical work that sustained the monarchy across generations."
