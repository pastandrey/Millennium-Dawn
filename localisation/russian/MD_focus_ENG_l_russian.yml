 ENG_recent_defections: "Недавние Дезертирства"
 ENG_recent_defections_desc: "Солдаты, генералы и опытные пилоты - все они покидают наши ряды в надежде разорвать связи с нашим правительством, рассматривая нас как угрозу государству."
 ENG_war_of_independence: "Война за независимость"
 ENG_war_of_independence_desc: "С приподнятым настроением и моральным духом наши люди готовы увидеть конец тиранического правления в Лондоне."
 ENG_typhoon_debate1: "Увеличение производства истребителей Typhoon"
 ENG_resistance_against_westminster: "Сопротивление Вестминстеру"
 ENG_resistance_against_westminster_desC: "Отклонив предложение о проведении референдума, избиратели этого штата оказали упорное сопротивление в форме гражданского неповиновения и небольших актов насилия, чтобы выразить свое недовольство."
 ENG_political_modifier: "Вестминстерская система"
 ENG_two_party_system_idea: "Двухпартийная система — лейбористы и консерваторы"
 ENG_economy_modifier: "Экономика [ENG.GetName]'s"
 ENG_building_britain_idea: "Построение Британии, пригодной для будущего"
 ENG_building_britain_idea_desc: "Долгосрочная промышленная стратегия ориентирует инвестиции в идеи, людей, инфраструктуру и места, постепенно повышая производительность и придавая фирмам уверенность в планировании, найме персонала и строительстве по всей стране."
 ENG_ireland_border_cooperation_idea_IRE: "Пограничное сотрудничество Ирландии"
 ENG_ireland_border_cooperation_idea_IRE_desc: "Практические трансграничные организации и совместные программы связывают Северную Ирландию с Ирландией в области торговли, инфраструктуры и услуг, упрощая оформление документов и помогая товарам, людям и идеям более свободно пересекать границу."
 ENG_Space_Command0: "Возможности Великобритании в киберпространстве"
 ENG_Space_Command0_desc: "Соединенное Королевство работает над улучшением своего потенциала и обеспечением своих интересов в космосе"
 ENG_Space_Command1: "Космическое командование Соединенного Королевства"
 ENG_Space_Command1_desc: "Космическое командование Великобритании является руководителем обороны в области космических операций, космической рабочей силы и космического потенциала. Это объединенное командование, базирующееся в ВВС Великобритании в Хай-Уиком, и укомплектованное персоналом Королевского военно-морского флота, британской армии и Королевских военно-воздушных сил, а также гражданскими служащими и подрядчиками."
 ENG_Space_Command2: "Космическое командование Соединенного Королевства"
 Eng_Space_Command2_desc: "Космическое командование Великобритании является руководителем обороны в области космических операций, космической рабочей силы и космического потенциала. Это объединенное командование, базирующееся в ВВС Великобритании в Хай-Уиком, и укомплектованное персоналом Королевского военно-морского флота, британской армии и Королевских военно-воздушных сил, а также гражданскими служащими и подрядчиками.С возвращением Знаменитых Красных мундиров моральный дух организации повысился, и она может гордиться собой еще больше."
 ENG_Space_Command3: "Космическое командование Соединенного Королевства"
 ENG_Space_Command3_desc: "Космическое командование Великобритании является руководителем обороны в области космических операций, космической рабочей силы и космического потенциала. Это объединенное командование, базирующееся в ВВС Великобритании в Хай-Уиком, и укомплектованное персоналом Королевского военно-морского флота, британской армии и Королевских военно-воздушных сил, а также гражданскими служащими и подрядчиками. Когда было сформировано 1-е космическое подразделение, организация превзошла все ожидания во всем мире, и Британия переживает новый опыт использования дредноутов"
 ENG_standardized_space_parts1: "Стандартизированные части пространства"
 ENG_standardized_space_parts1_desc: "Благодаря поддержке коммерческих компаний, стремящихся сделать космос доступным, удалось снизить затраты на создание космической продукции."
 ENG_british_commercial_spaceport1: "Приватизированные британские космодромы"
 ENG_british_commercial_spaceport1_desc: "Соединенное Королевство выходит на новый рубеж в освоении космоса, приватизируя космодромы для облегчения коммерческой деятельности за пределами Земли. Эти частные объекты сигнализируют о переходе к стимулированию инноваций и поддержке растущей коммерческой космической отрасли в Великобритании."
 ENG_british_commercial_spaceport2: "Приватизированные британские космодромы"
 ENG_british_commercial_spaceport2_desc: "Соединенное Королевство выходит на новый рубеж в освоении космоса, приватизируя космодромы для облегчения коммерческой деятельности за пределами Земли. Эти частные объекты сигнализируют о переходе к стимулированию инноваций и поддержке растущей коммерческой космической отрасли в Великобритании."
 ENG_Historical_Valor1: "Историческая Доблесть"
 ENG_Historical_Varlor1_desc: "Укоренившиеся в традициях британские вооруженные силы гордятся своим легендарным наследием. Однако генеральный штаб остается непоколебимым в традиционных стратегиях, скептически относясь к непроверенной тактике. Поскольку вооруженные силы стоят на пороге перемен, баланс между гордостью и приспособляемостью становится сутью обороны страны."
 ENG_Aging_Military1: "Стареющие военные"
 ENG_Aging_Military1_desc: "Из-за недостаточного финансирования армия Соединенного Королевства сталкивается с серьезными проблемами старения, имея дело с устаревшим оборудованием и снижающимся качеством. Последствия финансовой халатности эхом отдаются по рядам, создавая проблемы для поддержания современных и эффективных сил обороны."
 ENG_desert_hawk: "Пустынный Ястреб"
 ENG_desert_hawk_desc: "Lockheed Martin Desert Hawk III - беспилотный летательный аппарат, разработанный Skunkworks в Lockheed Martin Aeronautics. Это небольшой разведывательный беспилотник, способный осуществлять радиолокационное наблюдение, разведку сигналов и перехват коммуникаций наряду с дистанционным наблюдением с помощью приборов ночного видения, тепловизионных и электрооптических датчиков."
 ENG_archer_artillery_alliance: "Артиллерийский альянс Лучников"
 ENG_archer_artillery_alliance_desc: "Разработанный Швецией Archer Artillery Alliance знаменует собой прорыв в области высокоточной огневой мощи на больших расстояниях. Благодаря автоматизированному заряжанию и быстрому развертыванию эта артиллерийская система обеспечивает точную и гибкую поддержку на поле боя. Его модульная конструкция улучшает военные операции, обеспечивая Швеции и Соединенному Королевству стратегическое преимущество в бою."
 ENG_K9A1_thunder_development_group: "Группа разработчиков K9A1 Thunder"
 ENG_K9A1_thunder_development_group_desc: "Южнокорейская группа разработчиков K9A1 Thunder фокусируется на расширении возможностей бронированной артиллерии с помощью самоходной гаубицы K9A1 Thunder. Эта передовая платформа объединяет мобильность, огневую мощь и технологии, обеспечивая быстрое реагирование и повышенную живучесть. Благодаря автоматизированному заряжанию и улучшенному прицеливанию K9A1 Thunder повышает эффективность артиллерии южнокорейских и британских вооруженных сил."
 ENG_Boxer_Program: "Программа Боксера"
 ENG_Boxer_Program_desc: "Программа Boxer APC, созданная в сотрудничестве Германии и Нидерландов, открывает новую эру в области бронетранспортеров. Модульная конструкция Boxer обеспечивает легкую адаптацию к различным миссиям, включая транспортировку войск и медицинскую эвакуацию. Благодаря усовершенствованным функциям защиты и исключительной мобильности это транспортное средство повышает безопасность и эффективность действий военнослужащих в различных условиях эксплуатации."
 ENG_warrior_capability_sustainment_programme: "Программа поддержки бронетанковых войск Warrior"
 ENG_warrior_capability_sustainment_programme_desc: "Устаревшая 30-мм пушка RARDEN \"Уорриор\", неспособная вести точный огонь на ходу, стимулировала исследования новых систем вооружения и конструкций башен для продления срока ее службы. Текущие планы предусматривают добавление полностью стабилизированной башни с 40-мм пушкой CT40, улучшенной электронной архитектуры и модульной системы бронезащиты с комплектами быстрого монтажа. Одновременно программа бронированных машин поддержки боевых групп предложила переоборудовать платформу в бронетранспортер и заменить FV432."
 ENG_warrior_ajax_upgrades: "Бронированные машины Warrior Ajax с улучшениями"
 ENG_warrior_ajax_upgrades_desc: "Проект модернизации Warrior Ajax, возглавляемый Соединенным Королевством, означает значительное усовершенствование культовой боевой машины пехоты Warrior. Благодаря усовершенствованным модификациям, включая улучшенную огневую мощь, усовершенствованные системы связи и улучшенную броню, Warrior Ajax обеспечивает превосходные боевые характеристики. Эти усовершенствования укрепляют военный потенциал Великобритании, обеспечивая модернизированную и универсальную бронетанковую поддержку сухопутных войск в различных оперативных сценариях."
 ENG_fres_program_Idea: "Программа FRES"
 ENG_fres_program_Idea_desc: "Программа FRES (Future Rapid Effect System) Соединенного Королевства - это дальновидная инициатива, повышающая маневренность вооруженных сил с помощью универсальных наземных платформ. Интегрируя передовые технологии для быстрого реагирования, он обеспечивает готовность Великобритании к выполнению различных миссий."
 ENG_fixing_civil_servant_idea: "Исправляющий положение государственный служащий"
 ENG_fixing_civil_servant_idea_desc: "Нашим солдатам нужна надежная техника. Мы прилагаем все усилия, чтобы выполнить это требование."
 ENG_special_command1: "Специализированная команда"
 ENG_special_command1_desc: "Концентрируясь на совершенствовании армейской специализации и эффективности, мы стремимся повысить боевые возможности наших вооруженных сил. Однако это обязательство достигается за счет увеличения расходов и более жестких требований к ресурсам."
 ENG_special_command2: "Специализированная команда"
 ENG_special_command2_desc: "Концентрируясь на совершенствовании армейской специализации и эффективности, мы стремимся повысить боевые возможности наших вооруженных сил. Однако это обязательство достигается за счет увеличения расходов и более жестких требований к ресурсам."
 ENG_special_command3: "Специализированная команда"
 ENG_special_command3_desc: "Концентрируясь на совершенствовании армейской специализации и эффективности, мы стремимся повысить боевые возможности наших вооруженных сил. Однако это обязательство достигается за счет увеличения расходов и более жестких требований к ресурсам."
 ENG_monthballing_operations_idea: "Военно - морские Месячные операции"
 ENG_monthballing_operations_idea_desc: "По мере нарастания финансового давления британское правительство склоняется к консервации военно-морских кораблей, что является практическим шагом, который неоднозначно воспринят военно-морской промышленностью, в частности BAE. Это решение, направленное на экономию ресурсов, вызывает обеспокоенность в отрасли, бросая тень как на производство, так и на трудовые ресурсы."
 ENG_UKSF1: "Силы специального назначения Соединенного Королевства"
 ENG_UKSF1_desc: "Состоящие из элитных сил, таких как SAS и SBS, эти высококвалифицированные оперативники преуспевают в тайных операциях, борьбе с терроризмом и ведении нетрадиционной войны. Присутствие элитных сил специального назначения повышает стратегическую маневренность Великобритании и ее контртеррористические возможности, воплощая превосходство в точности и адаптивности."
 ENG_UKSF2: "Силы специального назначения Соединенного Королевства"
 ENG_UKSF2_desc: "Состоящие из элитных сил, таких как SAS и SBS, эти высококвалифицированные оперативники преуспевают в тайных операциях, борьбе с терроризмом и ведении нетрадиционной войны. Присутствие элитных сил специального назначения повышает стратегическую маневренность Великобритании и ее контртеррористические возможности, воплощая превосходство в точности и адаптивности."
 ENG_aircraft_ai_idea: "Интеграция искусственного интеллекта в самолет"
 ENG_aircraft_ai_idea_desc: "По мере развития технологий Соединенное Королевство становится пионером в области интеграции искусственного интеллекта в авиацию, объединяя передовой искусственный интеллект с возможностями авиации. Этот национальный дух означает приверженность использованию искусственного интеллекта для улучшения характеристик самолетов, автономных систем и адаптивных возможностей выполнения миссий."
 ENG_quality_over_quantity: "Качество превыше количества"
 ENG_Quality_Over_Quantity_desc: "Руководствуясь принципом приоритета качества над количеством, Соединенное Королевство уделяет приоритетное внимание совершенству и технологическому превосходству в своих вооруженных силах. Этот национальный дух подчеркивает необходимость приобретения передового оборудования, обеспечивающего мощную и технологически продвинутую оборону. Уделяя особое внимание качеству, Великобритания стремится максимально повысить эффективность своих вооруженных сил, создавая стратегическое преимущество перед лицом современных вызовов."
 ENG_worldwide_command1: "Всемирное Командование"
 ENG_worldwide_command1_desc: "Концепция Всемирного армейского командования Великобритании предусматривает стратегический подход, при котором британская армия расширяет свой оперативный охват по всему миру. Эта инициатива предполагает создание командной структуры, способной координировать и проводить военные операции во всемирном масштабе. Размещая войска в различных регионах, британские вооруженные силы стремятся усилить свое глобальное влияние, реагировать на возникающие угрозы и вносить вклад в международную безопасность. Всемирное армейское командование Великобритании олицетворяет приверженность активному и разностороннему военному взаимодействию в соответствии с меняющимся характером вызовов глобальной безопасности."
 ENG_worldwide_command2: "Всемирное Командование"
 ENG_worldwide_command2_desc: "Концепция Всемирного армейского командования Великобритании предусматривает стратегический подход, при котором британская армия расширяет свой оперативный охват по всему миру. Эта инициатива предполагает создание командной структуры, способной координировать и проводить военные операции во всемирном масштабе. Размещая войска в различных регионах, британские вооруженные силы стремятся усилить свое глобальное влияние, реагировать на возникающие угрозы и вносить вклад в международную безопасность. Всемирное армейское командование Великобритании олицетворяет приверженность активному и разностороннему военному взаимодействию в соответствии с меняющимся характером вызовов глобальной безопасности."
 ENG_worldwide_command3: "Всемирное Командование"
 ENG_worldwide_command3_desc: "Концепция Всемирного армейского командования Великобритании предусматривает стратегический подход, при котором британская армия расширяет свой оперативный охват по всему миру. Эта инициатива предполагает создание командной структуры, способной координировать и проводить военные операции во всемирном масштабе. Размещая войска в различных регионах, британские вооруженные силы стремятся усилить свое глобальное влияние, реагировать на возникающие угрозы и вносить вклад в международную безопасность. Всемирное армейское командование Великобритании олицетворяет приверженность активному и разностороннему военному взаимодействию в соответствии с меняющимся характером вызовов глобальной безопасности."
 ENG_worldwide_command4: "Всемирное Командование"
 ENG_worldwide_command4_desc: "Концепция Всемирного армейского командования Великобритании предусматривает стратегический подход, при котором британская армия расширяет свой оперативный охват по всему миру. Эта инициатива предполагает создание командной структуры, способной координировать и проводить военные операции во всемирном масштабе. Размещая войска в различных регионах, британские вооруженные силы стремятся усилить свое глобальное влияние, реагировать на возникающие угрозы и вносить вклад в международную безопасность. Всемирное армейское командование Великобритании олицетворяет приверженность активному и разностороннему военному взаимодействию в соответствии с меняющимся характером вызовов глобальной безопасности."
 ENG_far_east_command1: "Дальневосточное командование"
 ENG_far_east_command1_desc: "Расширение британских Вооруженных сил в глобальную структуру командования распространяется на Дальний Восток, отражая стратегическую приверженность безопасности и стабильности в этом важнейшем регионе. В рамках этой инициативы создаются командные узлы и оперативные центры, стратегически расположенные для повышения способности вооруженных сил быстро реагировать на развивающиеся угрозы и вызовы, характерные для Дальнего Востока."
 ENG_far_east_command2: "Дальневосточное командование"
 ENG_far_east_command2_desc: "Расширение британских Вооруженных сил в глобальную структуру командования распространяется на Дальний Восток, отражая стратегическую приверженность безопасности и стабильности в этом важнейшем регионе. В рамках этой инициативы создаются командные узлы и оперативные центры, стратегически расположенные для повышения способности вооруженных сил быстро реагировать на развивающиеся угрозы и вызовы, характерные для Дальнего Востока."
 ENG_naval_defense_act_1889_1: "Закон о военно - морской обороне 1889 года"
 ENG_naval_defense_act_1889_1_desc: "Закон о военно-морской обороне 1889 года был Актом парламента Соединенного Королевства. 31 мая 1889 года он получил королевское одобрение и официально принял стандарт двух держав, увеличив военно-морскую мощь Соединенного Королевства. Стандарт требовал , чтобы Королевский военно - морской флот поддерживал количество линкоров , по крайней мере равное совокупной численности следующих двух крупнейших военно - морских сил мира"
 ENG_naval_defense_act_1889_1_tt: "§RЧерез два года, когда мы станем морской державой континента, он будет временно заменен на национальный флаг§!"
 ENG_army_special_operations_brigade_idea: "Армейская бригада специальных операций"
 ENG_army_special_operations_brigade_idea_desc: "Бригада специальных операций армии Соединенного Королевства является элитным и высокоспециализированным подразделением британских вооруженных сил. Состоящая из опытно обученных солдат из различных подразделений, эта бригада специально разработана для выполнения нетрадиционных миссий с высокими ставками. Оснащенная современным вооружением, специальной подготовкой и стремлением к универсальности, армейская бригада специальных операций играет ключевую роль в противодействии сложным угрозам, проведении высокоточных операций и вносит свой вклад в общую оборонную стратегию страны."
 ENG_allied_basing_efforts_Idea: "Усилия союзников по Базированию"
 ENG_allied_basing_efforts_Idea_desc: "Инициатива \"Усилия по базированию союзников\" представляет собой комплексный подход к укреплению инфраструктуры и стратегических активов стран-членов Североатлантического союза. Эта программа включает в себя существенные улучшения транспортных сетей, авиабаз, портов и других критически важных объектов. Соединенное Королевство, как основной участник североатлантического союза, получает существенное и долговременное улучшение своей инфраструктуры, способствующее повышению эффективности материально-технического обеспечения и стратегической готовности."
 ENG_royal_navy_Idea1: "Королевский военно - морской флот Великобритании"
 ENG_royal_navy_Idea1_desc: "Королевский военно-морской флот Великобритании является одной из ведущих морских сил мира, история которой уходит корнями в глубь веков. Известный своей адаптивностью и технологическим совершенством, Королевский военно-морской флот играет решающую роль в защите морских интересов Соединенного Королевства и распространении мощи по всему миру."
 ENG_royal_navy_Idea2: "Королевский военно - морской флот Великобритании"
 ENG_royal_navy_Idea2_desc: "Королевский военно-морской флот Великобритании является одной из ведущих морских сил мира, история которой уходит корнями в глубь веков. Известный своей адаптивностью и технологическим совершенством, Королевский военно-морской флот играет решающую роль в защите морских интересов Соединенного Королевства и распространении мощи по всему миру."
