 ENG_queen_elizabeth_class_carrier: "Queen Elizabeth Class Aircraft Carrier"
 ENG_queen_elizabeth_class_carrier_desc: "The Queen Elizabeth Class Aircraft Carriers were a pinnacle in British naval aviation, signifying a transformative leap in aircraft carrier capability. These behemoths bolstered the UK's maritime projection, embodying modernity with their advanced technology, aircraft capacity, and expansive operational reach, fortifying the nation's global defense stature."
 ENG_elizabeth_line_decision: "Complete the Elizabeth Line"
 ENG_elizabeth_line_decision_desc: "We finish the Elizabeth Line across London, linking Heathrow, the West End, the City and Canary Wharf with fast, frequent cross-city trains that cut journey times and boost productivity."
