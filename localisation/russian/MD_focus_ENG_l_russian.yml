 ENG_create_new_faction_TT: "Will create a new faction: Atlantic Security Organization\n\nWe will be able to overthrow foreign governments using [ADS.GetFlag] Albionis!\n - We get 3 uses for this ability, and it is available via the influence menu through the coup button. An additional option will appear that'll allow you to use [ADS.GetFlag] Albionis to overthrow said government in Europe, granting you a vassal & ally."
 ENG_collapse_of_society_TT: "£text_icon_kaldanger Choosing this option may result in the overthrow of the government!\n - This will allow us to do the §HFractured Kingdom, United State§! focuses\n - The military will step in after a point and take charge of the state"
 ENG_do_fp_TT: "Has completed at least §H3§! Foreign Policy focuses"
 ENG_core_desc_TT: "By achieving Economic, Military, and Political hegemony, we'll be able to show the three primary Commonwealth states that we can provide for them and protect them. Additionally, their constituents will be more inclined to join us if our conditions are better."
 ENG_econ_hegemony_TT: "'Money fixes everything'\n\nBy achieving economic hegemony, we'll be in a good state to integrate other economics such as those in the Commonwealth states. To achieve this we need:\n\nA higher GDP than all 3 combined\n- Ours is currently $[?gdp_per_capita] (thousand) \n- Theirs is currently $[?commonwealth_total_gdp] (thousand)"
 ENG_military_hegemony_TT: "'A strong army equates to a strong rule'\n\nBy achieving military hegemony, we'll be in good standing to show that we are capable of defending our territories and people. To achieve this we need:\n\nMore deployed manpower than all 3 combined\n- We currently have [?ENG.deployed_army_manpower_k] (thousand) troops deployed\n- They currently have [?commonwealth_total_army] (thousand) troops deployed"
 ENG_political_hegemony_TT: "'Pulling strings is all that's needed'\n\nBy achieving political hegemony, we'll demonstrate that Westminsters rule is stable, connected, and in touch with all people from all walks of life. To achieve this we need:\n\nA strong sphere of influence\n- At least 50% influence or more in all 3 countries"
 ENG_tooltip_TT: "Has met all requirements for Economic Hegemony"
 ENG_tooltip2_TT: "Has met all requirements for Military Hegemony"
 ENG_has_met_all_requirements_TT: "Is hegemon in all three categories"
 ENG_hold_for_280_TT: "We must hold our capital for 280 days!"
