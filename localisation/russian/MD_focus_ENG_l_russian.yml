 ENG_military.007.t: "Аванпост на Луне"
 ENG_military.007.d: "Наши ученые и инженеры готовы отправить на Луну астронавтов и оборудование для их полупостоянного пребывания на спутнике Земли. Всего туда отправятся около 12 астронавтов, а также оборудование, припасы, жилые помещения и личные вещи на сумму в десятки миллионов долларов. Этот аванпост придется регулярно перемещать, поскольку лунный день длится 29 земных суток, а этого времени слишком много для того, чтобы аккумуляторы сохраняли накопленную энергию.\n\nСама база будет расположена на полюсах и будет легко перемещаться, чтобы максимально эффективно использовать солнечные панели. Кроме того, будут проводиться эксперименты по определению условий для длительного проживания на Луне. Добыча лунного льда может не только обеспечить растения жидкой водой и пищей для астронавтов на Луне, но и привести к разделению льда на кислород и водород — ракетное топливо.\n\n На проведение необходимых исследований могут уйти месяцы или годы. Однако за это время, используя средства, выделенные на этот проект, мы построим на лунной орбите склад, который облегчит доступ к Луне и позволит дозаправляться по пути на Землю. \n\n Все это осуществимо в течение следующего десятилетия.  Но сейчас пришло время действовать."
 ENG_military.007.a: "Запуск!"
 ENG_military.008.t: "Лунная база Альфа"
 ENG_military.008.d: "Наши ученые и инженеры официально высадились на Луне и в настоящее время занимаются обустройством лунной базы. Каждая секция разделена на «модули» — это не отдельные здания, но и не единое целое. Здесь есть жилой модуль для отдыха, пищевой модуль для выращивания продуктов, лабораторный модуль, самый большой из всех, в котором находится большая часть научного оборудования, модуль технического обслуживания, где есть все необходимые инструменты для ремонта, если что-то сломается, а также модуль с удобствами, поскольку люди пробудут здесь шесть месяцев, а работа по 12 часов в день не лучшим образом сказывается на психике. Кроме того, здесь довольно много солнечных батарей.  \n\n В первые месяцы будет осуществляться регулярная доставка продуктов, поскольку на их выращивание требуется время.  Воду и кислород будут получать из лунного льда. Наконец, эти ученые пробудут здесь до тех пор, пока примерно через 6 месяцев не переберутся на следующее место, где солнечные панели выйдут из строя из-за смены лунных суток, которая длится 6 месяцев.\n\n Лунная база «Альфа» готова."
 ENG_military.008.a: "Наука!"
 ENG_military.009.t: "Колония прогрессирует"
 ENG_military.009.d: "На нашей научной базе на Луне произошел крупный прорыв. Благодаря расширению существующей сети солнечных батарей и недавним открытиям, упростившим процесс разделения воды на кислород и водород, у них теперь достаточно кислорода и водорода, чтобы полностью заправить новейшую ракету-носитель. Это крайне важное достижение, которое позволит Луне, при наличии достаточного количества времени и инвестиций, стать центром будущих космических экспедиций в открытый космос.\n\n Космос становится все меньше."
 ENG_military.009.a: "Мы хороши в том, чтобы быть первопроходцами"
 ENG_military.010.t: "Кризис на Луне"
 ENG_military.010.d: "Необходимо немедленно принять экстренные меры. По неизвестным на данный момент причинам жилой модуль дал трещину и «взорвался».\n\n Час назад все 12 ученых занимались своими делами, как вдруг в жилом модуле образовалась огромная пробоина.\n\n Поскольку в вакууме волны не распространяются, большинство людей не поняли, что произошло, пока не увидели это своими глазами.\n\nВ бюджете предусмотрен резервный фонд на случай непредвиденных обстоятельств, поэтому нет необходимости выделять дополнительные средства на проект, а ученые всегда могут ночевать в других изолированных модулях. Однако это многих напугало: люди считают, что несколько, много или даже все наши ученые могли погибнуть, и это подрывает их моральный дух.  Таким образом, попытка продолжить работу на Луне будет иметь политические последствия, и из-за падения морального духа может потребоваться ротация ученых уже сейчас.\n\nЧто же нам делать?"
 ENG_military.010.a: "Пришлите скорую помощь!"
 ENG_military.010.b: "Откажитесь от проекта. Это предназначено не для нас"
 ENG_military.011.t: "Колония прогрессирует дальше"
 ENG_military.011.d: "Наша лунная база совершила еще один важный прорыв. Ученым удалось доставить на Землю водород-3 — газ, который идеально подходит для термоядерного синтеза, — и они выяснили, как проводить термоядерную реакцию с его использованием! Более того, энергия, получаемая в результате этой реакции, почти равна энергии, затраченной на ее проведение. Это означает, что при некоторых улучшениях мы сможем получить термоядерную энергию! Это не только сулит огромные выгоды на Земле, но и дает нам знания, которые мы можем использовать для термоядерного синтеза других материалов. Мы можем применить эти знания на Луне, создав там постоянную базу вместо мобильных аванпостов!\n\n Все это происходит с большим опережением графика, что стало неожиданностью, и многие в Космическом центре имени Годдарда оказались не готовы к внедрению этой технологии на действующей Лунной базе. Поэтому нужна новая Лунная база, расположенная в гораздо более удобном для быстрого расширения месте, чем нынешняя Лунная база Альфа. Пора начинать подготовку на Лунной базе Бета."
 ENG_military.011.a: "Жизнь продолжается"
 ENG_military.012.t: "Еще один кризис на Луне"
 ENG_military.012.d: "Сейчас необходимо принять более решительные меры. Еще два модуля вышли из строя. На этот раз речь идет как о модулях питания, так и об удобствах.\n\nПримерно сорок минут назад ученый собирался войти в Пищевой модуль, когда он внезапно взорвался. С ученым все в порядке, и никто, кроме растений, не пострадал. Однако он находился рядом с Бытовым модулем, и это привело к его разрыву и взрыву. И снова никто не пострадал.\n\nОднако это новое происшествие встревожило многих на родине, поставив под сомнение безопасность модулей. После предыдущего взрыва UKSC заменила модули, убедившись, что они не взорвутся, но, похоже, длительное давление может привести к тому, что что-то сломается гораздо легче, чем это было бы в противном случае. UKSC уже быстро отреагировала, заказав немедленное изготовление новых модулей, а также тщательную проверку всех текущих модулей (поскольку на данный момент вы не можете \"отозвать\" модули с Луны).\n\nВ связи с растущим давлением внутри страны, требующим прекратить реализацию проекта до тех пор, пока не будут решены все проблемы безопасности, продолжение программы строительства Лунной базы оказывается под вопросом. В дополнение к политическому противодействию, чрезвычайный фонд был сокращен вдвое, поэтому UKSC запрашивает еще 5 миллиардов долларов для решения будущих проблем. Решать, продолжать или нет, остается за вами."
 ENG_military.012.a: "Пришлите еще больше экстренной помощи!"
 ENG_military.012.b: "Мы не можем продолжать заниматься подобными вещами"
 ENG_military.013.t: "Лунная база Бета"
 ENG_military.013.d: "На данном этапе нашим ученым и инженерам на Луне необходимо переместиться в другое место на полюсах. Расходы на это уже заложены в долгосрочный бюджет, поэтому нам пока не нужно выделять дополнительные средства на проект.\n\n Благодаря новой лунной базе мы сможем использовать сделанные нами открытия, чтобы сделать ее постоянной, в отличие от нашей предыдущей лунной базы. Благодаря более совершенным ракетам, более эффективному производству энергии, более совершенным технологиям извлечения и разделения льда мы можем использовать эту новую базу, расположенную в месте, более подходящем для быстрого расширения, для колонизации Луны.  И это не единственная хорошая новость: предприниматели и корпорации массово обращаются в Космический центр Кеннеди с просьбами разместить на Луне их новейшие системы для добычи полезных ископаемых. Даже другие космические программы в других странах сейчас крайне заинтересованы в создании научных и добывающих баз на Луне, однако благодаря вашим усердным усилиям мы не только опережаем их на несколько шагов, но и являемся единственной страной, которая активно пытается колонизировать Луну.\n\n У нашей Луны светлое будущее, и оно за Китаем."
 ENG_military.013.a: "Наконец-то послеобеденный чай на Луне!"
 ENG_Moonbase_beta_completed: "Бета-тестирование Лунной базы Завершено"
 ENG_Mars_Colony_tt: "Со временем наша марсианская колония может столкнуться с трудностями или кризисными ситуациями, которые поставят ее под угрозу. Однако в случае успеха вознаграждение будет огромным.\n"
 ENG_military.014.t: "Миссия марсохода"
 ENG_military.014.d: "Наши ученые и инженеры готовы отправить наш марсоход на Марс. На нем установлено около 14 датчиков и оборудование на десятки миллионов долларов. Марсоход нужно будет регулярно перемещать, поскольку марсианский день длится 1,5 земных суток, а этого слишком долго для того, чтобы аккумуляторы сохраняли накопленную энергию на Марсе.\n\n Сам марсоход будет установлен на полюсах, где его можно будет легко перемещать, чтобы максимально эффективно использовать солнечные панели. Кроме того, будут проведены эксперименты по определению условий для длительного проживания на Марсе. Добыча льда может не только обеспечить растения жидкой водой и пищей для будущих марсианских астронавтов, но и позволить разделять его на кислород и водород — ракетное топливо.\n\n На проведение необходимых исследований могут уйти месяцы или годы. Однако за это время на средства, выделенные на этот проект, мы построим орбитальную станцию вокруг Марса, чтобы облегчить доступ к Марсу и обеспечить дозаправку для возвращения на Землю.\n\nВсе это достижимо в течение следующего десятилетия. Однако сейчас самое время действовать."
 ENG_military.014.a: "Запускайте!"
 ENG_military.015.t: "Проект колонии на Марсе"
 ENG_military.015.d: "Если люди хотят колонизировать Марс, они должны создать постоянную самоподдерживающуюся базу. Это мечта бесчисленных исследователей космоса и единственный способ для людей ступить в космос. Все это станет реальностью уже сегодня."
 ENG_military.015.a: "Марс, мы приближаемся!"
 ENG_military.016.t: "Сбой системы посадки"
 ENG_military.016.d: "Пролетев почти 60 миллионов километров, наш космический корабль наконец появился над Марсом. Оксид железа, покрывающий всю поверхность Марса, имел красный оттенок. Планета, которую долгое время можно было увидеть только в телескоп, теперь была прямо перед нами.  \nКосмический корабль переходит в режим посадки. Капитан, который бесчисленное количество раз отрабатывал посадку на тренажере, отдал приказ, но, похоже, с посадочным модулем возникли проблемы. Лоб капитана покрылся крупными каплями пота."
 ENG_military.016.a: "Лондон, у нас возникла проблема."
 ENG_military.017.t: "Неисправность транспортного средства"
 ENG_military.017.d: "После напряженных получасовых маневров космический аппарат наконец избежал риска столкновения и совершил аварийную посадку на равнине Утопия на Марсе. Здесь же приземлился предыдущий марсоход Beagle. Это место считается крупнейшим ударным кратером на Марсе и во всей Солнечной системе, его диаметр оценивается в 3300 километров. \nПосле приземления экипаж пересядет в специальный марсоход и направится в южную часть равнины, чтобы основать там базу, но, похоже, вибрации от предыдущей посадки космического корабля оказали некоторое влияние на марсоход. Очевидно, что сложившаяся ситуация не в пользу экипажа."
 ENG_military.017.a: "Кажется, сегодня с нашей чертовой машиной что-то не так."
 ENG_military.018.t: "Прибытие на базу"
 ENG_military.018.d: "40 километров — впервые люди преодолели такое большое расстояние на другой планете, не на Земле. Такое обычное для Земли расстояние стало прорывом в истории космических полетов.  \nПосле напряженного процесса разбивки лагеря, передачи всех необходимых данных на Землю и проверки параметров всего оборудования капитан, сидевший на кровати, наконец смог выпить чаю.  \nСквозь окно из прозрачного синтетического материала над его головой виднелась светящаяся точка среди звезд, излучавшая слабый голубой свет. Это была Земля. \n\n «Так лучше», — пробормотал капитан."
 ENG_military.018.a: "Не бойтесь опоздать на хороший обед."
 ENG_military.019.t: "Успешная посадка"
 ENG_military.019.d: "Все прошло идеально, как и ожидалось: космический корабль точно приземлился в заданном месте, и началось мирное путешествие людей на Марс. \n"
 ENG_military.019.a: "Я знал, что наш экипаж сможет выполнить задание."
 ENG_military.020.t: "Прибытие на базу"
 ENG_military.020.d: "Точкой приземления космического корабля был заданный адрес базы, и экипаж начал разбивать лагерь на месте, чтобы подготовиться к строительству первой постоянной базы человечества на Марсе. Никто не заметил, что космические ботинки оставляли бесчисленные грязные следы на марсианской почве."
 ENG_military.020.a: "Один маленький шаг для Марса, один гигантский скачок для человечества."
 ENG_military.021.t: "Найдите источник воды"
 ENG_military.021.d: "Вода — важнейший ресурс для выживания человека. Одной из главных целей предыдущих исследований Марса был поиск источников воды на планете. Несмотря на то, что на Марсе нет поверхностных озёр и рек, как на Земле, водные ресурсы планеты в основном представлены в виде льда, залегающего под поверхностью.  \nОднако для точного определения их местонахождения необходимо провести исследования на месте."
 ENG_military.021.a: "Мы не сможем выжить без нашего чая!"
 ENG_military.022.t: "Подземная радиационная защита"
 ENG_military.022.d: "Из-за разреженной атмосферы Марса и отсутствия планетарного магнитного поля космическая радиация беспрепятственно достигает поверхности планеты. Когда базу только построили, она не могла обеспечить достаточную защиту от радиации, поэтому первым делом было решено вырыть в земле укрытие.  \nСоздание новой базы для Соединенного Королевства напомнило экипажу о славных днях Британской империи."
 ENG_military.022.a: "Британия правит космосом"
 ENG_military.023.t: "Первый урожай на Марсе"
 ENG_military.023.d: "Проблема с источниками воды решена, а в качестве источника энергии временно используется солнечная энергия. Таким образом, производство продуктов питания (и чая) на Марсе стало важнейшей задачей на сегодняшний день.  \nТрадиционные зерновые культуры не подходят из-за особенностей их роста и сбора урожая, поэтому первой культурой, которую люди начали выращивать на Марсе, стал картофель.  Несмотря на то, что на Марсе не так светло, как на Земле, из-за удаленности от Солнца, картофель в теплице растет лучше, чем на открытом грунте.  Первый урожай человечества на Марсе уже не за горами."
 ENG_military.023.a: "Вся природа, органический картофель, выращенный на Марсе."
 ENG_military.024.t: "Песчаная Буря"
 ENG_military.024.d: "Песчаные бури — обычное явление на Марсе. Несмотря на то, что атмосферное давление на Марсе намного ниже, чем на Земле, марсианские бури не такие разрушительные, как в легендах и фильмах.  \nОднако поднятая в воздух пыль по-прежнему представляет скрытую опасность для человеческих поселений, особенно с учетом того, что солнечная энергия является незаменимым источником питания для современных баз."
 ENG_military.024.a: "Здесь у нас нет шансов спасти Мэтта Деймона."
 ENG_military.025.t: "Несчастный случай"
 ENG_military.025.d: "Часто подниматься в горы и в конце концов столкнуться с тигром. Марсианская пылевая буря длилась гораздо дольше, чем ожидалось, и, судя по всему, заряда батарей на базе хватит ненадолго.  \nЧтобы продолжить миссию по созданию марсианской колонии, нам нужно принять решение: эвакуироваться и искать новое место или продолжать ремонт повреждённых объектов."
 ENG_military.025.a: "Эвакуироваться"
 ENG_military.025.b: "Фиксирующее основание"
 ENG_military.026.t: "Эвакуироваться"
 ENG_military.026.d: "Мы не можем больше ждать. Ситуация критическая, пора использовать резервные ракеты для эвакуации. Убедившись, что все члены команды благополучно поднялись на борт корабля, капитан с неохотой оглянулся на здание базы, которое все еще достраивалось. Он подавил горечь в душе и отдал приказ искусственному интеллекту запустить космический корабль. \n«Мы вернемся!»Подняв огромное облако дыма, космический корабль оторвался от марсианской поверхности и медленно поднялся в небо."
 ENG_military.026.a: "Там, где есть жизнь, есть и надежда."
 ENG_military.027.t: "Отремонтировать поврежденное основание"
 ENG_military.027.d: "Мы не можем сидеть сложа руки и ждать, мы должны немедленно начать ремонт базы любой ценой, иначе все завоевания, которых мы добились на Марсе, будут разрушены, и никто не сможет выжить в этом хаосе. Спасти базу - значит спасти нас самих."
 ENG_military.027.a: "Ради самопожертвования и великих амбиций мы осмеливаемся создать новый мир."
 ENG_military.028.t: "Проект \" Марсианский город\""
 ENG_military.028.d: "Мы добились выдающихся достижений в строительстве марсианской колонии. Но нам еще предстоит пройти некоторое расстояние, прежде чем мы сможем, наконец, достичь нашей цели. Хотим ли мы все еще продолжать инвестировать в строительство Марса?"
 ENG_military.028.a: "Обновление"
 ENG_military.028.b: "Не нужно этого"
 ENG_military.029.t: "За"
 ENG_military.029.d: "Как только мы сделаем еще один шаг вперед, наша миссия на Марсе будет полностью завершена. В нашей повестке дня нет полумер."
 ENG_military.029.a: "Не перекладывайте ответственность на следующее поколение."
 ENG_military.030.t: "Нет"
 ENG_military.030.d: "Нынешняя база на Марсе достаточно достроена, и продолжать вкладывать дополнительные средства неразумно. Нам все еще приходится сталкиваться со многими проблемами на земле, и невозможно просто выбрасывать деньги в космос."
 ENG_military.030.a: "Верьте в мудрость будущих поколений."
 ENG_military.031.t: "Марсианский город завершен"
 ENG_military.031.d: "После наших неустанных усилий наша колония на Марсе наконец-то была достроена. Люди никогда не забудут этих усилий, и однажды их нога ступит на всю галактику."
 ENG_military.031.a: "Наше путешествие - это вся галактика."
 ENG_military.032.t: "Создана новая вспомогательная база"
 ENG_military.032.d: "По мере того как на Марс прибывало все больше космических кораблей с людьми и материалами, первоначальная марсианская база начала процветать. Запасов воды под первоначальной базой уже не хватало для обеспечения растущего населения, и возникла необходимость в строительстве новой базы.  \nКогда космический корабль с первой командой постепенно скрылся из виду, бывший капитан, а ныне мэр первого нового лондонского города, вспомнил, как марсоход провалился в траншею."
 ENG_military.032.a: "Мама, сегодня я отправляюсь в долгое путешествие."
 ENG_military.033.t: "Памятник в Марсианском городе"
 ENG_military.033.d: "По мере того как люди путешествовали по Марсу, Марс стал новым домом для людей на Земле. Терраформирование Марса идет упорядоченным образом. В первой точке посадки космического корабля с человеком был построен огромный памятник в память о мужчинах и женщинах, которые пожертвовали своими жизнями во время путешествия и строительства в процессе покорения Марса. Они навсегда останутся запечатленными на пути развития человеческой цивилизации."
 ENG_military.033.a: "Для всего человечества!"
 ENG_mars_city_building_completed: "Строительство Марс-сити завершено"
 ENG_military.001.t: "Запуск инициативы по добыче полезных ископаемых на астероидах"
 ENG_military.001.d: "Добыча полезных ископаемых на астероидах была мечтой многих до нас. Сами астероиды содержат столь востребованные металлы платиновой группы, золото, серебро и металлы группы железа. Это могло бы стать чрезвычайно прибыльным делом для любой космической страны. Таким образом, сегодня создание Британской королевской компании по добыче астероидов, или BRAMC, станет первым шагом на пути к добыче астероидов. Используя огромные массивы телескопов по всей Империи, мы можем искать подходящие астероиды в близлежащем космическом пространстве, затем выводить их на орбиту и добывать. Обнаружить подходящий астероид будет непросто, поскольку по сравнению с расстоянием, на котором он находится, он довольно мал. К счастью, на самом деле их довольно много, которые время от времени пролетают мимо Земли, так что не потребуется много времени, чтобы заставить один из них остаться на орбите Земли."
 ENG_military.001.a: "Просто нужно дождаться астероида..."
 ENG_military.002.t: "Замечен Астероид"
 ENG_military.002.d: "Недавно наши ученые из BRAMC заметили подходящий астероид, проходящий вблизи Земли. Это стало облегчением для BRAMC, поскольку некоторые сомневались, что мы вообще когда-нибудь обнаружим подходящий экономичный астероид. Однако этот астероид движется достаточно медленно, достаточно велик и достаточно богат, чтобы его можно было вывести на орбиту и добывать. На самом деле этот астероид больше Уэльса. Следующий шаг - просто вывести этот астероид на орбиту вокруг Земли, чего никогда раньше не делалось. Тем временем инженеры британского космического командования и даже частных предприятий, таких как Virgin Galactic, изобрели механизмы для добычи полезных ископаемых на астероиде, так что они будут готовы к тому времени, когда астероид выйдет на орбиту."
 ENG_military.002.a: "Давайте выведем этого малыша на орбиту"
 ENG_military.003.t: "Астероид на орбите"
 ENG_military.003.d: "Поскольку астероид находится на орбите, USCC и Virgin отправляют миссии к находящемуся на орбите астероиду. USCC в основном занимается сбором научных данных, в то время как Virgin Galactic больше озабочена добычей полезных ископаемых. Без сомнения, это заслуживающее внимания достижение, которое дает нам преимущество в космосе. Поговаривают даже о привлечении большего количества астероидов, но многие говорят, что дополнительные астероиды могут появиться позже, поскольку этот астероид очень большой и хорошо подходит для добычи полезных ископаемых. Другие страны уже смотрят на нас с завистью и рассматривают свои собственные программы добычи полезных ископаемых на астероидах. Затраты чрезвычайно высоки даже на разработку технологии, позволяющей достичь этого, поэтому Virgin Galactic или UKSC не беспокоятся о том, что конкуренция будет усиливаться."
 ENG_military.003.a: "Начнется добыча полезных ископаемых"
 ENG_military.004.t: "Начинает поступать прибыль от майнинга"
 ENG_military.004.d: "После запуска горнодобывающих предприятий компании Virgin Galactic и UKSC отправили первые партии космического сырья в лаборатории и на рынки по всему миру. Весь мир с завистью смотрит на нас, и в законодательных органах ведутся открытые дискуссии об открытии собственных предприятий по добыче полезных ископаемых на астероидах. Возможно, скоро у нас появятся конкуренты, но пока мы можем наслаждаться монополией."
 ENG_military.004.a: "Я вне себя от нетерпения!"
 ENG_military.005.t: "Прибыль от добычи полезных ископаемых на астероидах"
 ENG_military.005.d: "Поступили последние поставки с наших предприятий по добыче полезных ископаемых на астероидах, которые принесли нам значительный доход. Эти поставки включают платину, золото и серебро. Было бы разумно использовать полученные доходы с пользой."
 ENG_military.005.a: "Превосходно!"
 ENG_military.006.t: "Потенциал для добычи полезных ископаемых на астероидах"
 ENG_military.006.d: "Недавно Палата общин разрешила UKSC и частной космической компании Virgin Galactic вывести на околоземную орбиту довольно крупный астероид и начать его добычу. Наши консультанты рекомендуют инвестировать в эту новую космическую отрасль, поскольку она может обеспечить доставку редких материалов прямо в нашу страну. Однако некоторые указывают на огромные расходы, которые Соединенному Королевству пришлось понести, чтобы начать эту деятельность, и выступают против освоения космоса. Окупаемость этих инвестиций зависит от многих факторов, но для выхода в ноль может потребоваться 25 лет. Более значительные инвестиции могли бы решить эту проблему, но мы еще долго будем отставать от других.  \n\n Что нам делать с добычей полезных ископаемых на астероидах? Запустить национальную программу или вообще не обращать на это внимания?"
 ENG_military.006.a: "Инвестируйте в добычу полезных ископаемых на Астероидах"
 ENG_military.006.b: "Слишком дорого и пустая трата нашего времени!"
 Mobile_Fires_Platorm_Program.1.t: "Выбор Партнера для программы Mobile Fires Platform"
 Mobile_Fires_Platorm_Program.1.d: "После окончания холодной войны и ослабления опасений по поводу конфликта на территории Германии запасы 155-миллиметровых артиллерийских систем в армии сократились. Теперь, когда на горизонте замаячили новые угрозы, Министерство обороны решило предпринять шаги по восстановлению этого потенциала.  Было предложено множество программ и партнеров для выполнения этого контракта, но только одна из них увенчалась успехом."
 ENG_military.034.a: "Артиллерийский альянс лучников"
 ENG_military.034.b: "Группа разработчиков K9A1 Thunder"
 ENG_military.034.c: "Программа боксера"
 ENG_military.034.e: "Прекращение сотрудничества"
 ENG_military.035.t: "Великобритания приглашает нас в Объединенный экспедиционный корпус"
 ENG_military.035.d: "Соединенное Королевство приглашает [Receiving Country] присоединиться к Объединенным экспедиционным силам (ОЭС) — совместной инициативе, направленной на развитие международного сотрудничества и укрепление коллективной безопасности.  Это знаменательное событие знаменует начало новой главы в нашей общей приверженности делу укрепления стабильности, реагирования на глобальные вызовы и защиты наших общих ценностей."
 ENG_military.035.a: "Мы присоединяемся!"
 ENG_military.035.b: "Нет, спасибо, Старина"
 ENG_military.036.t: "[From.GetName] Принимает!"
 ENG_military.036.d: "[From.GetName] присоединится к нашим Объединенным экспедиционным силам. Вместе мы сможем подготовить наши вооруженные силы к быстрому реагированию"
 ENG_military.036.a: "Добро пожаловать"
 ENG_military.037.t: "[From.GetName] отказывается!"
 ENG_military.037.d: "[From.GetName] не присоединятся к нашим Объединенным экспедиционным силам. Они предпочитают действовать самостоятельно"
 ENG_military.037.a: "Со временем они пожалеют"
 ENG_military.038.t: "Расширение Дартмутского военно-морского колледжа"
 ENG_military.038.d: "Дартмутский военно-морской колледж, уделяющий особое внимание передовым технологиям, стратегическому мышлению и практическому опыту, призван сыграть ключевую роль в подготовке следующего поколения военно-морских лидеров."
 ENG_military.038.a: "Авианосцы — будущее военно-морского флота"
 ENG_military.038.b: "Нам нужны эсминцы и крейсера, чтобы победить наших врагов на море"
 ENG_military.040.t: "Дискуссия о транше 1 на случай тайфуна"
 ENG_military.040.d: "Заинтересованные стороны, такие как военные, аналитики в области обороны и представители правительства, обсуждают эффективность этого самолета в борьбе с растущими угрозами, его роль в национальной оборонной стратегии и возможности его экспорта для международных партнеров. Дискуссия о первом транше «Тайфуна» играет решающую роль в принятии решений, связанных с закупкой, развертыванием и дальнейшим развитием этого современного истребителя."
 ENG_military.040.a: "Продолжать производство"
 ENG_military.040.b: "Исследуйте его Преемника"
 ENG_military.040.c: "Сократите запасы"
 ENG_military.039.t: "Специализация Вооруженных Сил"
 ENG_military.039.d: "Выбрали свою специализацию"
 ENG_military.039.a: "Армия"
 ENG_military.039.b: "ВВС"
 ENG_military.039.c: "Флот"
 ENG_military.039.e: "Персонал"
 ENG_military.041.t: "Великобритания Приглашает США приобрести их инновацию для самолетов"
 ENG_military.041.d: "Великобритания вложила огромные инвестиции в свои самолеты и возможности авиационной промышленности. Из-за наших особых отношений они предлагают поделиться своими инновациями за небольшую цену. В конце концов, они британцы"
 ENG_military.041.a: "Инновации? Да, пожалуйста!"
 ENG_military.041.b: "Нет, спасибо, старина"
 ENG_military.042.t: "Великобритания Приглашает США приобрести их инновацию для самолетов"
 ENG_military.042.d: "Великобритания вложила огромные инвестиции в свои самолеты и возможности авиационной промышленности. Из-за наших особых отношений они предлагают поделиться своими инновациями за небольшую цену. В конце концов, они британцы"
 ENG_military.042.a: "Инновации? Да, пожалуйста!"
 ENG_military.042.b: "Нет, спасибо, старина"
 ENG_military.043.t: "МЫ принимаем"
 ENG_military.043.d: "США приняли наше предложение продать нашу инновацию"
 ENG_military.043.a: "Как и ожидалось"
 ENG_military.044.t: "США отказывается"
 ENG_military.044.d: "США отклонили наше Предложение о продаже Инноваций. Они считают, что Великобритания - не тот жизнеспособный партнер, который им нужен"
 ENG_military.044.a: "Рано или поздно они узнают"
 United_Kingdom.002.t: "Силиконовый Глен доставляет"
 United_Kingdom.002.d: "Наши инвестиции в шотландский Silicon Glen окупаются. Местные университеты, разработчики микросхем и фирмы-разработчики программного обеспечения сообщают об очередном годе роста, новых патентах и постоянном притоке квалифицированных выпускников в экономику в целом."
 United_Kingdom.002.a: "Пусть Глен продолжает расширять границы"
 United_Kingdom.003.t: "Предложение о трансграничном сотрудничестве"
 United_Kingdom.003.d: "Великобритания обратилась к нам с предложением улучшить торговую логистику и сократить бюрократические проволочки на нашей общей границе. Предлагаемая система сотрудничества направлена на оптимизацию инфраструктуры, упрощение таможенных процедур и создание совместных регулирующих комитетов.\n\n Стоит ли нам соглашаться?"
 United_Kingdom.003.a: "Примите рамки"
 United_Kingdom.003.b: "Отклонить предложение"
 United_Kingdom.004.t: "Ирландия поддерживает трансграничное сотрудничество"
 United_Kingdom.004.d: "Правительство Ирландии приняло наше предложение об упорядочении трансграничной экономической координации. Были созданы комитеты для сокращения бюрократической волокиты, согласования стандартов и содействия более плавному перемещению товаров через ирландскую морскую и сухопутную границу."
 United_Kingdom.004.a: "Прогресс благодаря партнерству"
 United_Kingdom.005.t: "Ирландия отказывается от трансграничного предложения"
 United_Kingdom.005.d: "Несмотря на первоначальный интерес, ирландское правительство в конечном итоге решило не участвовать в наших рамках трансграничного сотрудничества. Официальные лица назвали юридические сложности и политическую нерешительность ключевыми причинами отказа."
 United_Kingdom.005.a: "Неудачно, но ожидаемо"
 scottish.1.t: "Парламентские выборы в Шотландии"
 scottish.1.d: "Стали известны результаты парламентских выборов в Шотландии, и мы, наконец, можем увидеть, проголосовал ли шотландский народ за партии, выступающие за независимость."
 scottish.1.a: "Ладно"
 britain_md.1.a: "Тогда давайте двигаться"
 britain_md.2.a: "Мы воспользуемся нашим шансом"
 britain_md.2.b: "Мне не нравятся такие шансы"
 britain_md.3.a: "Обращение к профсоюзам"
 britain_md.3.b: "Обращение к Военно-промышленному комплексу"
 britain_md.3.c: "Привлекательность для индустрии ископаемого топлива"
 britain_md.4.a: "Обложите налогом промышленников"
 britain_md.4.b: "Обложить налогом военных"
 britain_md.4.c: "Обложите налогом отрасли, работающие на ископаемом топливе"
 britain_md.4.d1: "Действительно ли нам нужно облагать кого-либо налогом?"
 britain_md.5.a: "Вперед!"
 britain_md.6.d: "Наша инфраструктура остро нуждается в модернизации. Это не обязательно плохо, но чтобы конкурировать с мировыми игроками, нам нужно будет расширять наши города. Однако, сосредоточившись исключительно на широком расширении инфраструктуры, мы вместо этого выберем конкретный регион для работы. Таким образом, мы сможем создать новые центры для инвестиций и обеспечить процветание этих областей."
 britain_md.6.a: "Работа на Севере"
 britain_md.6.b: "Работа над центром"
 britain_md.6.c: "Работа на Юге"
 britain_md.7.a: "Давайте приступим к работе"
 britain_md.8.a: "Они, конечно же, не связаны! С мигрантами все в порядке"
 britain_md.8.b: "Что ж, эти данные не лгут"
 britain_md.9.a: "Не будем терять времени, давайте приступим к делу"
 britain_md.10.a: "Давайте немного изменим это"
 britain_md.10.b: "Ни в коем случае"
 britain_md.11.a: "Хорошо, а теперь давайте приступим к делу"
 britain_md.12.a: "Ладно"
 britain_md.12.b: "Нет"
 britain_md.13.a: "Ладно"
 britain_md.14.a: "Ублюдки"
 britain_md.15.a: "Ладно"
 britain_md.16.a: "Мягкий переворот, мы не будем стремиться к дальнейшему контролю."
 britain_md.16.b: "Жесткий переворот, мы будем настаивать на создании государства-сателлита"
 britain_md.17.a: "Хорошо"
 britain_md.18.a: "Черт"
 britain_md.19.a: "Хорошо"
 britain_md.20.a: "Как и ожидалось"
 britain_md.21.a: "Чепуха! Но что мы можем сделать?"
 britain_md.21.b: "Чепуха! Мобилизуйте армию!"
 britain_md.22.a: "Теперь пути назад нет."
 britain_md.22.b: "Ну, погоди же, а что, если мы вернем его обратно?"
 britain_md.23.a: "Неужели страх будет управлять тобой?"
 britain_md.24.a: "Амбиции Британии"
 britain_md.24.b: "Британия вперед, а не назад"
 britain_md.24.c: "Справедливое будущее для всех"
 britain_md.24.a1: "Пришло время проявить здравый смысл"
 britain_md.24.b1: "Ты думаешь о том же, о чем и мы?"
 britain_md.24.c1: "Приглашение от правительства Великобритании"
 britain_md.25.a: "Поехали!"
 britain_md.26.a: "Сосредоточьте внимание на интеграции островов"
 britain_md.26.b: "Мы должны продвигаться дальше на Запад"
 britain_md.26.c: "Верните острова"
 britain_md.27.t: "Британия возвращает Фолкленды"
 britain_md.27.d: "Произошло астрономически шокирующее событие: [ENG.GetName] государство, которое в 80-х годах боролось с нами за Фолклендские острова, решило вернуть их под наш контроль.  Мы не знаем, что послужило причиной такого решения и почему они так поступили, но наши войска уже выдвигаются к островам для их оккупации.  Британское правительство заявило, что этот шаг — попытка «укрепить отношения» с нами и со всем южноамериканским регионом."
 britain_md.27.a: "Нам это кажется отличным вариантом!"
 britain_md.28.t: "Успешная операция по смене режима в Зимбабве."
 britain_md.28.d: "После операции по свержению зимбабвийского диктатора нашими силами была создана партия \"Движение за перемены\" (MDC). Это произошло после тщательного планирования и операции подразделений британского спецназа по свержению давнего режима в стране."
 britain_md.28.a: "Хорошо, меньшего мы и не ожидали"
 britain_md.29.t: "[ENG.GetName] Совершает государственный переворот!"
 britain_md.29.d: "Судя по всему, [ENG.GetName] провела в нашей стране тайную операцию, в результате которой был свергнут прежний режим и к власти пришло новое правительство.  С военными были заранее установлены контакты, и они даже помогли британским войскам незаметно проникнуть в страну."
 britain_md.29.a: "Что?"
 britain_md.30.t: "Приближается операция \" Восточный рубеж \""
 britain_md.30.d: "В настоящее время египтяне полностью контролируют Синайский полуостров, хотя на протяжении многих лет между ними происходят периодические столкновения с Израилем. Однако наша страна остро нуждается в более эффективных торговых путях, а налоги, которые мы платим каждый раз, когда проходим через Суэцкий канал, стали непомерно высокими. Нам придётся заключить сделку с египтянами, иначе мы будем вынуждены предпринять дальнейшие действия."
 britain_md.30.a: "Давайте начнем переговоры"
 britain_md.30.b: "Нет времени на переговоры, переезжайте"
 britain_md.31.t: "Британцы требуют совместного контроля над Синаем"
 britain_md.31.d: "Британское правительство направило дипломатов, чтобы те поприветствовали наших министров в [EGY.capital.GetCapitalVictoryPointName] и обсудили возможность совместного контроля над Синайским полуостровом.  Они утверждают, что с их кораблями и торговцами обошлись слишком несправедливо, и что согласие на это продемонстрирует, что нашему правительству можно доверять."
 britain_md.31.a: "Каждый египтянин умрет прежде, чем мы покинем Синай!"
 britain_md.31.b: "Возможно, мы сможем что-нибудь придумать..."
 britain_md.32.t: "Египет отказывается от переговоров"
 britain_md.32.d: "Египтяне заявили, что они не заинтересованы в переговорах с нами по поводу контроля над Суэцким каналом, даже если это означает, что мы будем готовы пойти им на большие уступки. У нас не остается иного выбора, кроме как рассмотреть возможность военного вмешательства."
 britain_md.32.a: "Пришло время переезжать"
 britain_md.32.b: "Забудь об этом"
 britain_md.33.t: "Египет предлагает переговоры"
 britain_md.33.d: "Египтяне согласились на наши просьбы о переговорах по Синаю и запросили определенную сумму наличными для оплаты прямого доступа как военного, так и коммерческого через Синай с меньшими налогами."
 britain_md.33.a: "Звучит неплохо для нас"
 britain_md.33.b: "Неужели? Это оскорбление!"
 britain_md.34.t: "Операция \"Восточный рубеж\": Продолжается"
 britain_md.34.d: "В настоящее время проводится операция \"Восточный рубеж\", войска которой высадились на Синае. Мы должны начать мобилизацию большего количества сил, что позволит провести более масштабную операцию."
 britain_md.34.a: "Вперед, вперед, вперед!"
 britain_md.35.t: "[FROM.GetName] Призывает к более глубокой интеграции"
 britain_md.35.d: "[ENG.GetName] призывает к более глубокой интеграции, утверждая, что, поступившись частью своего суверенитета, мы сможем объединить усилия и снова стать мировой державой.  Хотя многие наши граждане настороженно относятся к такому предложению, [ENG.GetName] в последние годы зарекомендовала себя как сильный конкурент, опережая нас во всех сферах."
 britain_md.35.a: "Мы должны объединиться"
 britain_md.35.b: "Мы не откажемся от нашего суверенитета"
 britain_md.36.t: "[FROM.GetName] стремится к большей интеграции"
 britain_md.36.d: "[FROM.GetName] дала понять, что на самом деле заинтересована в более глубокой интеграции, предложив несколько планов по объединению основных бюрократических институтов и структур. Наши дипломаты и чиновники работают не покладая рук, чтобы обеспечить плавный, безопасный и стабильный переход."
 britain_md.36.a: "Хорошо"
 britain_md.37.t: "[FROM.GetName] отказывается от дальнейшей интеграции"
 britain_md.37.d: "Похоже, что [FROM.GetAdjective] правительство не заинтересовано в дальнейшей интеграции и настаивает на том, что наши недавние шаги ущемляют их суверенитет."
 britain_md.37.a: "Ладно"
 britain_md.38.t: "Судебный процесс над королевской семьей"
 britain_md.38.d: "Пришло время нам избавиться от жадной, прожорливой и бесполезной денежной ямы, которой является королевская семья. Мы позволим назначенному государством судье (и народу, косвенно) решать судьбу этих преступников, которые веками только и делали, что растрачивали государственные ресурсы на экстравагантные материальные объекты."
 britain_md.38.a: "Изгнанник, мы не можем действовать слишком опрометчиво."
 britain_md.38.b: "Пожизненное заключение!"
 britain_md.38.c: "У французов было несколько блестящих идей.."
 britain_md.39.t: "Избрание Номинального руководителя"
 britain_md.39.d: "Хотя мы понимаем последствия передачи той или иной формы власти другому политику, мы должны признать необходимость представителя, который успокоит толпы, уставшие от военного лидера, стоящего во главе государства. Мы быстро найдем кого-нибудь в качестве марионетки, которая будет представлять государство."
 britain_md.39.a: "Назначить этого дурака Фаража"
 britain_md.39.b: "Найди, где прячется Гриффин"
 britain_md.39.c: "Майкл Холмс где-нибудь поблизости?"
 britain_md.39.d1: "Военные будут служить нам просто отлично"
 british_flavor.1.t: "Nissan планирует расширение завода в Сандерленде."
 british_flavor.1.d: "Японский автопроизводитель Nissan намерен расширить завод в Сандерленде для производства нового поколения Almera Hatchback и Saloon, которые скоро поступят в продажу. Чиновники опасаются, что расширение затруднит конкуренцию местным заводам и отечественным автопроизводителям."
 british_flavor.1.a: "Стройте, а мы понаблюдаем"
 british_flavor.1.b: "Нет, мы не можем позволить этому случиться"
 british_flavor.2.t: "Экстрадиция Аугусто Пиночета"
 british_flavor.2.d: "Медицинские эксперты пришли к выводу, что Аугусто Пиночет, бывший диктатор Чили, не пригоден для судебного разбирательства. В результате этого расследования участились призывы депортировать бывшего диктатора обратно на родину, в Чили, однако в ответ на этих людей, выступающих за его депортацию, группа граждан требует продолжить его судебный процесс здесь, в Соединённом Королевстве."
 british_flavor.2.a: "Отправить его обратно."
 british_flavor.2.b: "Он остаётся."
 british_flavor.3.t: "Корабль «Solway Harvester» затонул"
 british_flavor.3.d: "Сообщается, что судно «Solway Harvester» затонуло у берегов острова Мэн в штормовую погоду. Также сообщается, что все 11 членов экипажа погибли, а судно считается подлежащим подъёму, но сильно повреждённым."
 british_flavor.3.a: "Позаботимся об этом позже"
 british_flavor.3.b: "Поднять тела экипажа и подготовить похороны."
 british_flavor.4.t: "Угон авиалайнера Ariana Afghan Airways"
 british_flavor.4.d: "Группа угонщиков в Афганистане захватила рейс и заставила его направиться в [ENG.GetName], приземлившись в Лондоне. Власти готовятся направить небольшую группу для противостояния угонщикам, но дальнейшие действия с ними пока неизвестны."
 british_flavor.4.a: "Арестовать их, а затем депортировать"
 british_flavor.4.b: "Арестовать их, а затем отправить на суд!"
 british_flavor.5.t: "Враждебное поглощение банка NatWest"
 british_flavor.5.d: "Шотландский банк в настоящее время пытается провести враждебное поглощение английского банка NatWest. Royal Bank of Scotland в данный момент является меньшим из двух банков, и его успех в значительной степени зависит от другой сделки, предложенной другим банком — Bank of Scotland."
 british_flavor.5.a: "Это не наша проблема"
 british_flavor.5.b: "Спасите банк"
 british_flavor.6.t: "BMW объявляет о планах продать группу Rover"
 british_flavor.6.d: "Немецкий автопроизводитель BMW объявил о планах продать группу Rover, при этом консорциум Alchemy из Лондона выступает главным кандидатом на приобретение. Хотя эта сделка может дать нам больше влияния на автомобильном рынке, она приведёт к дополнительной ответственности в постоянно растущей, но уязвимой автомобильной отрасли."
 british_flavor.6.a: "Нам это подходит"
 british_flavor.6.b: "Возможно, им стоит пересмотреть своё решение..."
 british_flavor.7.t: "Дэвид Тримбл победил на выборах лидера ульстерских юнионистов."
 british_flavor.7.d: "Дэвид Тримбл выиграл выборы лидера Партии ульстерских юнионистов, про‑британской партии и третьей по старшинству в Великобритании. Его победу празднуют консерваторы, тогда как сторонники большей автономии либо равнодушны, либо, как всегда, недовольны результатом."
 british_flavor.7.a: "Поздравляем победителя"
 british_flavor.8.t: "Закон об иммиграции и убежище"
 british_flavor.8.d: "Закон об иммиграции и предоставлении убежища в настоящее время обсуждается, и если он будет принят, это означает, что все беженцы и мигранты будут иметь право на ваучеры для покрытия расходов на еду и одежду. Наложение вето на него может показаться несколько бесчеловечным, но в конечном итоге это приведёт к росту расходов британских налогоплательщиков."
 british_flavor.8.a: "Одобрите это"
 british_flavor.8.b: "Наложить вето на это"
 british_flavor.9.t: "Антикапиталистический бунт на Парламентской площади"
 british_flavor.9.d: "Антикапиталистические бунтовщики вышли на улицы и осквернили статую бывшего премьер-министра Великобритании Уинстона Черчилля. Беспорядки окрестили \"первомайскими\", и толпы, похоже, не собираются расходиться в ближайшее время. Некоторые призывают к действию, в то время как другие предполагают, что в конце концов они устанут и разойдутся по домам."
 british_flavor.9.a: "Мы переждем это"
 british_flavor.9.b: "Пришлите бригады по зачистке и полицию"
 british_flavor.10.t: "[ENG.GetLeader] В Женском институте меня отчитали"
 british_flavor.10.d: "[ENG.GetLeader] В Женском институте его встретили враждебно: разгневанные участницы освистали его и медленно хлопали в ладоши. Этот унизительный прием вызвал обсуждение среди членов партии и общественности, которые поставили под сомнение некоторые аспекты нашего руководства."
 british_flavor.10.a: "Игнорируй это"
 british_flavor.10.b: "Отвечайте на критические замечания"
 british_flavor.11.t: "Шотландия добивается отмены статьи 28"
 british_flavor.11.d: "Шотландский парламент добивается отмены спорного раздела 28 Закона о местном самоуправлении 1988 года, который запрещает местным властям \"распространять гомосексуальность\". Разрешение им отменить этот закон может привести к призывам отменить его и в других местах, что вызовет политическую нестабильность."
 british_flavor.11.a: "Остановите их"
 british_flavor.11.b: "Нам все равно"
 british_flavor.12.t: "Алекс Салмонд уходит в отставку из SNP"
 british_flavor.12.d: "Алекс Салмонд ушел со своего руководящего поста в Шотландской национальной партии из-за споров по поводу внутрипартийных финансовых стратегий. Его отставка дала нам возможность атаковать SNP, пока они слабы, позволив усилить раскол в их рядах."
 british_flavor.12.a: "Лучше нам ничего не делать"
 british_flavor.12.b: "Начать политическую атаку"
 british_flavor.13.t: "Последние Восемьдесят"
 british_flavor.13.d: "В рамках Мирного процесса в Северной Ирландии были приняты меры по освобождению последних 80 заключенных, содержащихся в тюрьме Мейз. Эти заключенные были либо членами Ирландской национально-освободительной армии, либо имели с ними тесные связи, поскольку в 1997 году произошел инцидент, когда эти заключенные убили и ранили лидера лоялистских добровольческих формирований."
 british_flavor.13.a: "Может быть, мы оставим их себе.."
 british_flavor.13.b: "Отлично, тогда они уходят"
 british_flavor.14.t: "В поместье Полсгроув вспыхивают беспорядки"
 british_flavor.14.d: "Беспорядки вспыхнули в поместье Полсгроув в Процмуте после того, как более 100 человек осадили многоквартирный дом, в котором предположительно проживал убежденный малолетний преступник. Это последний случай самосуда в отношении подозреваемых в сексуальных преступлениях с момента начала кампании \"поименования и опозорения\" Всемирной организации News of the World."
 british_flavor.14.a: "Ну, мы ничего не могли там сделать"
 british_flavor.14.b: "Пошлите за полицией"
 british_flavor.15.t: "Вспыхивают топливные протесты"
 british_flavor.15.d: "Протестующие заблокировали вход на нефтеперерабатывающие заводы в попытке выразить протест против высоких цен на топливо. Автомобилисты начали панически скупать нефть, что начинает приводить к дефициту топлива в стране и продолжающемуся росту цен на нефть. Сообщается, что большое количество автозаправочных станций начинают закрываться в результате сложившейся ситуации, и правительство изо всех сил пытается найти решение."
 british_flavor.15.a: "Во всем виновата промышленность, работающая на ископаемом топливе"
 british_flavor.15.b: "Ввести строгие квоты на использование нефти"
 british_flavor.15.c: "§RНичего не делай§!"
 british_flavor.151.t: "Вместо бездействия правительства вспыхивают беспорядки"
 british_flavor.151.d: "Похоже, что отсутствие у нас решимости решить проблему нехватки топлива только разожгло еще больший гнев, и все больше и больше людей выходят на улицы, требуя правительственного решения. В нынешнем виде протестующие маршируют к правительственным зданиям и вандализируют статуи, здания и символы правительства."
 british_flavor.151.a: "Мы пытаемся!"
 british_flavor.152.t: "Призывы к переменам становятся всё сильнее"
 british_flavor.152.d: "Похоже, решимость народа только окрепла, а ненависть и гнев направлены на [ENG.GetLeader] и правящий истеблишмент.  Кроме того, участились призывы к перераспределению королевских средств на субсидирование топлива, а некоторые даже требуют, чтобы монархия со стыдом отреклась от престола."
 british_flavor.152.a: "Нелепо!"
 british_flavor.153.t: "Палата общин подожжена"
 british_flavor.153.d: "Было объявлено чрезвычайное положение, поскольку протесты и беспорядки резко переросли из организованного гражданского неповиновения в откровенную анархию. Разгневанные протестующие подожгли здание Палаты общин, поскольку полиция не смогла сдержать разъяренную толпу. Есть сообщения, что протестующие планируют пройти маршем к другим государственным учреждениям, однако пока неясно, кто будет следующей целью."
 british_flavor.153.a: "О господи"
 british_flavor.154.t: "Королева отрекается от престола!"
 british_flavor.154.d: "В свете недавнего восстания и продолжающихся неудач правительства королева официально объявила, что отречется от престола, и планирует обратиться к нации с официальной речью позже сегодня днем. Хотя многим грустно, что она уйдет, до сих пор неясно, будет ли ей замена, поскольку ненависть к монархии только усилилась с начала протестов."
 british_flavor.154.a: "Прощай, драгоценная корона и бархатное платье"
 british_flavor.155.t: "[ENG.GetLeader] Уходит в отставку, не назначив преемника"
 british_flavor.155.d: "[ENG.GetLeader] Премьер-министр подал в отставку, а его партия не смогла быстро найти ему достойную замену. В стране царит хаос, неразбериха и уязвимость. Британия никогда еще не сталкивалась с таким кризисом, и правительство показало, что в данный момент оно не в состоянии решить ни одну проблему."
 british_flavor.155.a: "Что происходит дальше?!"
 british_flavor.156.t: "Военные захватили контроль"
 british_flavor.156.d: "Британские вооруженные силы заявили о своем непосредственном участии в восстановлении власти. Представитель вооруженных сил сообщил, что с любым, кто нарушит комендантский час, введенный в 16:00, «будут быстро разбираться», и добавил, что все их действия будут направлены на «общее благо всех британцев».  Это вызвало возмущение членов Лейбористской и Консервативной партий, которые назвали захват власти узурпацией, а некоторые даже осудили этот шаг как радикальный поворот в сторону диктатуры. Тем не менее политики доказали свою неспособность решать государственные вопросы, и после отставки [ENG.GetLeader] у них не нашлось достойного преемника."
 british_flavor.156.a: "Что ждет нас в будущем?"
 british_flavor.157.t: "Отчет: Состояние дел Нового правительства"
 british_flavor.157.d: "дресовано его превосходительству, [ENG.GetLeader],\nДата:[GetDateText]\n\nТема I: Состояние порядка\nВаше превосходительство, британские вооруженные силы оперативно установили контроль над крупными городскими районами, такими как Лондон, Бирмингем, Манчестер и Ливерпуль, среди прочих. По крайней мере, на данный момент кажется, что люди постепенно начинают расходиться по домам, поскольку мы начали устанавливать финансируемые правительством нефтяные субсидии и программы, чтобы помочь стране встать на ноги.\n\nТема II: Призывы левых и правых\nЛейбористские и консервативные политики начали призывать нашу чрезвычайную администрацию начать процесс, необходимый для восстановления демократического правления в стране, при этом некоторые политики объявили новую администрацию символом авторитаризма и военного перевеса. Один политик от лейбористской партии даже заявил, что \"люди с оружием должны оставаться на своих базах, а люди с ручками должны вернуться к своим обязанностям государственных служащих\".\n\nТема III: Дальнейшая консолидация\nНаши люди начали находить политиков и бюрократов, которые были недовольны старой системой, призывая их прийти на службу вместо бывших политиков двухпартийной системы. Захват власти таким образом почти наверняка будет приравнен к своего рода национальному конфликту, однако в нынешнем виде у нас нет других средств для укрепления нашего контроля."
 british_flavor.157.a: "Приятно это знать"
 british_flavor.16.t: "Консерваторы лидируют в опросах общественного мнения"
 british_flavor.16.d: "Сторонники Консервативной партии празднуют победу, узнав, что тори на 38% опережают лейбористов в опросе общественного мнения, проведенном MORI. Это стало первым случаем, когда консерваторы возглавили Лейбористскую партию в общенациональном опросе общественного мнения с 1993 года. "
 british_flavor.16.a: "Ладно"
 british_flavor.17.t: "Землетрясение потрясло Уорикшир"
 british_flavor.17.d: "Землетрясение произошло в церемониальном графстве Уорикшир, причинив некоторый ущерб близлежащим зданиям. Раздаются призывы к государственной помощи в восстановлении некоторых поврежденных зданий, но в последнее время государственный бюджет становится все более и более ограниченным, из-за чего Вестминстеру трудно прийти к согласованному выводу."
 british_flavor.17.a: "Нам просто остается надеяться, что все будет в порядке"
 british_flavor.17.b: "Санкционировать государственную помощь"
 british_flavor.18.t: "Дональд Дьюар срочно доставлен в больницу"
 british_flavor.18.d: "Дональд Дьюар, первый министр Шотландии, был срочно доставлен в больницу после падения возле Бьют-Хауса, его официальной резиденции в Эдинбурге. Его здоровье быстро ухудшается, и все чаще раздаются призывы к вмешательству правительства в привлечение передовых медицинских бригад."
 british_flavor.18.a: "Молитесь за его выздоровление"
 british_flavor.18.b: "Разрешите передовым медицинским бригадам отправиться к нему на помощь"
 United_Kingdom_News.2.t: "В Соединенном Королевстве вспыхивают беспорядки"
 United_Kingdom_News.2.d: "После общенационального дефицита топлива и резкого роста цен на газ британские власти решили переждать кризис в надежде, что экономика восстановится сама собой. Однако ситуация не улучшилась, а только усугубилась, и в начале этой недели вышла из-под контроля, когда протестующие подожгли здание Палаты общин. Британские власти заявляют, что не несут ответственности за дефицит топлива, и утверждают, что проблема носит естественный характер и скоро разрешится. Один из протестующих сказал: «У меня нет топлива для машины!» У меня нет возможности добираться до работы, а в моем доме нет отопления, чтобы согреть семью.\nТо, что происходит сегодня, — результат неэффективной системы и правительства."
 United_Kingdom_News.2.a: "Гнев вспыхивает снова"
 United_Kingdom_News.3.t: "Королева Елизавета II отреклась от престола"
 United_Kingdom_News.3.d: "Вместо недавних событий королева Соединенного Королевства Елизавета II объявила о своем официальном отречении от престола. Это произошло после того, как протестующие начали требовать положить конец монархии, ассоциируя ее с символами коррупции, жадности и денежных ям. Более конкретно, на этот раз гнев был направлен против монархии, потому что люди требовали перераспределения денег на государственные субсидии на топливо, однако их призывы остались без внимания в Вестминстере. Неизвестно, взойдет ли на трон другой член королевской семьи или нет, но в нынешнем виде монархии остается только стоять в стороне и смотреть, как горит страна."
 United_Kingdom_News.3.a: "Трон рушится"
 United_Kingdom_News.4.t: "Британские вооруженные силы захватывают контроль над Лондоном"
 United_Kingdom_News.4.d: "Британские вооруженные силы заявили о своем официальном участии в обеспечении соблюдения введенного государством чрезвычайного положения, недвусмысленно заявив, что с любым нарушителем комендантского часа в 4 часа дня будут разбираться \"быстро\". Это произошло после нескольких недель протестов и беспорядков в Соединенном Королевстве, когда протестующие в припадке ярости подожгли Палату общин. Пока неизвестно о намерениях этого нового административного органа, но, как сообщается, он соответствует военным силам, которые намерены уменьшить влияние лейбористской и консервативной партий на британский истеблишмент."
 United_Kingdom_News.4.a: "Неужели это конец Соединенного Королевства?"
 ENG_inner_circle.01.t: "Расцвет [GetAscendingAdvisorName]"
 ENG_inner_circle.01.desc: "[GetAscendingAdvisorName] проявил недюжинные амбиции и незаметно расширил свое влияние при королевском дворе. Однако каждый шаг на пути к большей власти вызывал возражения со стороны других придворных и высокопоставленных лиц, и теперь во дворце разгорается привычная борьба за доступ и первенство. Вопрос в том, достаточно ли [GetAscendingAdvisorName] впечатлил королеву, чтобы занять достойное место в ее ближайшем окружении."
 ENG_inner_circle.01.a: "Заменить [GetAscendedAdvisorName1]"
 ENG_inner_circle.01.b: "Заменить [GetAscendedAdvisorName2]"
 ENG_inner_circle.01.c: "Заменить [GetAscendedAdvisorName3]"
 ENG_inner_circle.01.d: "[GetAscendingAdvisorName] это недостойно."
 ENG_inner_circle_charles.03.t: "Визит принца Гармонии"
 ENG_inner_circle_charles.03.desc: "Принц Уэльский прибыл с визитом, сочетая изысканную дипломатию с четким посланием об охране окружающей среды. Встречи со старшими должностными лицами и лидерами гражданского общества были сосредоточены на восстановлении доверия, расширении практического сотрудничества и представлении устойчивости к изменению климата как общего стратегического интереса, а не темы для разговоров."
 ENG_inner_circle_charles.03.a: "Пусть нашими отношениями руководит гармония."
 ENG_inner_circle_charles.04.t: "Принц Чарльз выступает за защиту тропических лесов"
 ENG_inner_circle_charles.04.desc: "Нам сообщили, что Его королевское высочество принц Чарльз, принц Уэльский, призвал к активизации глобальных действий по защите тропических лесов. Как основатель проекта Prince Rainforests Project, он использовал свое влияние для работы с правительствами, предприятиями и гражданским обществом, чтобы подчеркнуть важность прекращения обезлесения и сохранения этих критически важных экосистем для стабильности климата и биоразнообразия."
 ENG_inner_circle_charles.04.a: "Мы приветствуем принца Чарльза в вопросе защиты тропических лесов"
 ENG_inner_circle_charles.05.t: "Экологическая дипломатия принца Чарльза"
 ENG_inner_circle_charles.05.desc: "Мы получили известие, что Его Королевское высочество принц Чарльз, принц Уэльский, завершил экологическое дипломатическое турне по нашей стране, выступая за сотрудничество в области климата, устойчивого развития и экологической устойчивости. Являясь одним из самых давних сторонников действий в области охраны окружающей среды на протяжении десятилетий, принц подчеркнул необходимость коллективных усилий разных стран и секторов для решения глобальных экологических проблем и продвижения устойчивых решений."
 ENG_inner_circle_charles.05.a: "Поддерживайте устойчивое развитие."
 ENG_inner_circle_charles.06.t: "Принц Чарльз продвигает органическое сельское хозяйство"
 ENG_inner_circle_charles.06.desc: "Мы узнали, что Его королевское высочество принц Чарльз, принц Уэльский, предпринял активные шаги по поддержке развития органического и устойчивого сельского хозяйства в нашей стране. Опираясь на десятилетия новаторской работы по методам органического земледелия в Highgrove и Duchy Home Farm, он подчеркнул экологические и социальные преимущества органических методов и призвал к сотрудничеству в области устойчивого ведения сельского хозяйства."
 ENG_inner_circle_charles.06.a: "Поддерживайте устойчивое сельское хозяйство."
 ENG_inner_circle_andrew.04.t: "Принц Эндрю с торговой миссией"
 ENG_inner_circle_andrew.04.desc: "Его Королевское высочество принц Эндрю, действующий в качестве торгового представителя Соединенного Королевства, посетил нашу страну с целью содействия укреплению коммерческих связей и экономического сотрудничества. Во время своей миссии он общался с правительственными чиновниками, лидерами бизнеса и потенциальными инвесторами, чтобы осветить возможности для торговли и инвестиций, которые приносят пользу как нашей экономике, так и экономике Соединенного Королевства."
 ENG_inner_circle_andrew.04.a: "Добро пожаловать"
 ENG_inner_circle_andrew.05.t: "Заключенное торговое соглашение"
 ENG_inner_circle_andrew.05.desc: "Мы рады сообщить, что после недавних обсуждений и переговоров под руководством Его Королевского Высочества принца Эндрю, герцога Йоркского, между нашей страной и Соединенным Королевством было заключено новое торговое соглашение. Соглашение открывает возможности для расширения коммерческого обмена, сотрудничества в ключевых отраслях промышленности и взаимной экономической выгоды, отражая общие интересы и укрепляя связи между нашими экономиками."
 ENG_inner_circle_andrew.05.a: "Соглашайтесь на партнерство."
 ENG_military.045.t: "Запрос Великобритании на стратегическое партнерство"
 ENG_military.045.d: "Соединенное Королевство, возглавляемое конституционным монархом и приверженное сотрудничеству с Западом, официально запросило статус главного союзника вне НАТО. Предоставление этого права укрепило бы трансатлантические отношения и обеспечило бы себе ключевого партнера в Европе."
 ENG_military.045.a: "Утвердить их просьбу — ценного союзника."
 ENG_military.045.b: "Тем не менее, мы должны быть осторожны с такими обозначениями."
 ENG_integrate_ireland: "Интегрировать [IRE.GetFlag] Ирландию"
 ENG_integrate_ireland_desc: "Спустя десятилетия мы, наконец, покорили и интегрировали земли Ирландии, самое время формализовать процесс интеграции."
 ENG_a_more_united_kingdom_decisions: "Объединение царства"
 ENG_a_more_united_kingdom_decisions_desc: "После постепенного упадка Британской империи и деколонизации в период холодной войны наше королевство переживало неуклонный спад. С помощью дипломатических средств и гегемонии мы сможем снова объединить наше королевство.\n\n Наведите курсор на цветной текст, чтобы узнать больше."
 ENG_core_objectives_text: "Основные цели"
 ENG_econ_hegemony_text: "Экономическая гегемония"
 ENG_military_hegemony_text: "Военная гегемония"
 ENG_political_hegemony_text: "Политическая гегемония"
