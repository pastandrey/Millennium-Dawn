 ENG_prince_phillip: "Филипп"
 ENG_prince_phillip_trait: "Герцог Эдинбургский"
 ENG_phillip_1_idea: "Герцог Эдинбургский"
 ENG_phillip_1_idea_desc: "Титул герцога Эдинбургского носил принц Филипп как определяющий знак его роли рядом с государем и пожизненного служения королевству. Подаренный ему при женитьбе на принцессе Елизавете, он сочетал в себе исторический престиж и современную идентичность, основанную на долге, дисциплине и институциональной поддержке. В общественной жизни это стало тесно связано с его покровительством и практической работой, которая поддерживала монархию на протяжении поколений."
