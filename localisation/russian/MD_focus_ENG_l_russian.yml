 raid_type_ENG_raid_nigeria: "Операция \" Дельта - гвардия \""
 raid_type_ENG_raid_nigeria_desC: "Нестабильное нигерийское правительство доказало свою неспособность управлять нефтяными месторождениями, окружающими Дельту. В результате нам придется вмешаться и предпринять шаги по рестабилизации."
 raid_type_ENG_raid_zimbabwe: "Гарантия эксплуатации"
 raid_type_ENG_raid_zimbabwe_desc: "Тиран, правящий Зимбабве, должен быть немедленно свергнут, поскольку ему нельзя доверять управление страной. Его действия против людей британского происхождения и коренного народа Зимбабве продемонстрировали, что у него нет красных линий, и он явно готов перейти нашу."
 ENG_dartmouth_naval_college_expansion: "Расширение Дартмутского военно-морского колледжа"
 ENG_dartmouth_naval_college_expansion_desc: "Расширение Дартмутского военно-морского колледжа знаменует собой значительные инвестиции в морское образование и профессиональную подготовку в Соединенном Королевстве. Опираясь на богатые военно-морские традиции, расширение предусматривает оснащение по последнему слову техники, программы повышения квалификации и увеличение возможностей для удовлетворения растущего спроса на квалифицированный военно-морской персонал."
 ENG_type_32_frigate_guardian_class: "Фрегат типа 32 класса Guardian"
 ENG_type_32_frigate_guardian_class_desc: "Фрегат \"Тип 32\" - фрегат Королевского военно-морского флота Соединенного Королевства. Об этом было официально объявлено в ноябре 2020 года премьер-министром Борисом Джонсоном в результате Комплексного обзора. Построенный после фрегатов Type 26 и Type 31, корабль будет универсальным и модульным по своей конструкции и, как ожидается, поможет увеличить флот надводного сопровождения Королевских ВМС."
 ENG_charles_harmony: "Тур по Гармонии Британского принца Чарльза"
 ENG_election_unlock_tt: "§YЭта функция станет доступна после формирования нового правительства по итогам выборов§!"
 ENG_army_special_operations_brigade_desc: "Бригада специальных операций армии представляет собой вершину военного потенциала Соединенного Королевства, предназначенную для выполнения тайных и сложных миссий. Состоящая из исключительного персонала, набранного из различных отраслей, эта элитная бригада работает с непревзойденной точностью и адаптивностью. Вооруженное передовыми технологиями и тщательно обученное подразделение готово к борьбе с терроризмом, сбору разведданных и другим операциям с высокой отдачей, укрепляя свою роль ключевого актива в аппарате обороны и безопасности страны."
 ENG_glasgow_shipbuilidng_tt: "Этот эффект можно усилить, выполнив §Y$ENG_refine_natural_bauxite$§!"
 ENG_refine_natural_bauxite_tt: "Это усилит эффект от §Y$ENG_glasgow_shipbuilidng$§!"
 ENG_the_queens_speech: "[ENG_the_queens_speech_focus_title]"
 ENG_the_queens_speech_desc_key: "Нация слушает по-другому, когда Суверен говорит как голос государства, а не как церемония. В Речи королевы будет объявлено о новом политическом урегулировании, и повестка дня правительства будет привязана к мандату короны. С этого дня политика будет осуществляться королевской властью, и Британия будет действовать как королевство с единой волей."
 ENG_the_kings_speech_desc_key: "Нация слушает по-другому, когда Суверен говорит как голос государства, а не как церемония. В Речи короля будет объявлено о новом политическом урегулировании, и повестка дня правительства будет привязана к мандату короны. С этого дня политика будет осуществляться королевской властью, и Британия будет действовать как королевство с единой волей."
 ENG_inner_circle_andrew.06.t: "Принц Эндрю изгнан из королевской семьи"
 ENG_inner_circle_andrew.056.d: "После разрыва его связей с Джеффри Эпштейном принц Эндрю стал политически токсичным. Под растущим общественным и институциональным давлением он лишен своего оставшегося положения в королевской семье и исключен из ближайшего окружения."
 ENG_inner_circle_andrew.06.a: "Он больше не может оставаться"
 ENG_inner_circle_philip.04.t: "Принц Филипп скончался"
 ENG_inner_circle_philip.04.d: "Принц Филипп, герцог Эдинбургский, скончался после десятилетий пребывания в центре общественной жизни королевской семьи. Его смерть знаменует собой конец эпохи для монархии и будет ощущаться по всей Соединенному Королевству."
 ENG_inner_circle_philip.04.a: "Нация скорбит"
