 ENG_auxiliary_navy1: "Королевский Вспомогательный военно - морской флот"
 ENG_auxiliary_navy1_desc: "Концепция вспомогательного Королевского военно-морского флота подчеркивает важность гражданской поддержки в военно-морских операциях, подчеркивая совместные усилия военного и гражданского персонала по обеспечению эффективности и готовности Королевского военно-морского флота к выполнению своих морских обязанностей."
 ENG_auxiliary_navy2: "Королевский Вспомогательный военно - морской флот"
 ENG_auxiliary_navy2_desc: "Концепция вспомогательного Королевского военно-морского флота подчеркивает важность гражданской поддержки в военно-морских операциях, подчеркивая совместные усилия военного и гражданского персонала по обеспечению эффективности и готовности Королевского военно-морского флота к выполнению своих морских обязанностей."
 ENG_royal_army1: "Британская Королевская армия"
 ENG_royal_army1_desc: "Британская армия - подразделение сухопутных войск Вооруженных сил Великобритании, выступающее в качестве основной наземной военной силы Соединенного Королевства. Обладая богатой многовековой историей, британская армия славится своим профессионализмом, адаптивностью и оперативной эффективностью. Состоящая из высококвалифицированных солдат из разных слоев общества, армия оснащена для выполнения широкого спектра задач, включая боевые операции, миротворческие миссии, усилия по оказанию помощи в случае стихийных бедствий и задачи по оказанию гуманитарной помощи."
 ENG_royal_army2: "Британская Королевская армия"
 ENG_royal_army2_desc: "Британская армия - подразделение сухопутных войск Вооруженных сил Великобритании, выступающее в качестве основной наземной военной силы Соединенного Королевства. Обладая богатой многовековой историей, британская армия славится своим профессионализмом, адаптивностью и оперативной эффективностью. Состоящая из высококвалифицированных солдат из разных слоев общества, армия оснащена для выполнения широкого спектра задач, включая боевые операции, миротворческие миссии, усилия по оказанию помощи в случае стихийных бедствий и задачи по оказанию гуманитарной помощи."
 ENG_royal_army3: "Британская Королевская армия"
 ENG_royal_army3_desc: "Британская армия - подразделение сухопутных войск Вооруженных сил Великобритании, выступающее в качестве основной наземной военной силы Соединенного Королевства. Обладая богатой многовековой историей, британская армия славится своим профессионализмом, адаптивностью и оперативной эффективностью. Состоящая из высококвалифицированных солдат из разных слоев общества, армия оснащена для выполнения широкого спектра задач, включая боевые операции, миротворческие миссии, усилия по оказанию помощи в случае стихийных бедствий и задачи по оказанию гуманитарной помощи."
 ENG_royal_airforce1: "Призраки Королевских военно - воздушных сил"
 ENG_royal_airforce1_desc: "Несмотря на свою легендарную историю, устаревшие Королевские военно-воздушные силы (RAF) отражают эпоху устаревающего оборудования и ограниченных возможностей. Сдерживаемый устаревшими самолетами и неадекватными усилиями по модернизации, этот национальный дух символизирует проблемы поддержания превосходства в воздухе с помощью устаревших технологий. Однако, несмотря на эти ограничения, дух наследия RAF сохраняется, вдохновляя на стойкость и решимость адаптироваться и преодолевать трудности."
 ENG_royal_airforce2: "Модернизация Королевских военно-воздушных сил"
 ENG_royal_airforce2_desc: "Модернизация Королевских военно-воздушных сил воплощает стратегический сдвиг в сторону активизации военно-воздушных сил посредством комплексных усилий по модернизации. Уделяя особое внимание модернизации самолетов, расширению технологических возможностей и инвестированию в передовые системы, этот национальный дух отражает активный подход к обеспечению того, чтобы королевские ВВС оставались на переднем крае борьбы за превосходство в воздухе в развивающемся боевом пространстве."
 ENG_royal_airforce3: "Модернизированные Королевские военно - воздушные силы"
 ENG_royal_airforce3_desc: "Ориентированные на превосходство в воздухе и быстрое реагирование, модернизированные Королевские военно-воздушные силы представляют собой грозную силу, оснащенную передовыми истребителями и передовыми боевыми возможностями. Маневренные истребители, способные господствовать в небе и поражать противника с непревзойденной скоростью и точностью, демонстрируют национальный дух Королевских ВВС Великобритании, демонстрирующий приверженность сохранению превосходства в воздухе и защите национальных интересов с непревзойденным мастерством в воздухе."
 ENG_royal_airforce4: "Модернизированные Королевские военно - воздушные силы"
 ENG_royal_airforce4_desc: "Модернизация Королевских военно-воздушных сил знаменует собой начало новой эры стратегической проекции военно-воздушной мощи, характеризующейся наличием современных бомбардировщиков и высокоточных ударных средств. Благодаря передовым бомбардировщикам, способным выполнять задачи на дальних расстояниях, и высокоточным боеприпасам Королевские ВВС демонстрируют способность наносить решительные и точные авиаудары по особо важным целям, демонстрируя свою мощь и сдерживая противников с беспрецедентной точностью."
 ENG_royal_airforce5: "Модернизированные Королевские военно - воздушные силы"
 ENG_royal_airforce5_desc: "Модернизация Королевских военно-воздушных сил знаменует собой начало новой эры стратегической проекции военно-воздушной мощи, характеризующейся наличием современных бомбардировщиков и высокоточных ударных средств. Благодаря передовым бомбардировщикам, способным выполнять задачи на дальних расстояниях, и высокоточным боеприпасам Королевские ВВС демонстрируют способность наносить решительные и точные авиаудары по особо важным целям, демонстрируя свою мощь и сдерживая противников с беспрецедентной точностью."
 ENG_airbus_expansion: "Расширение Airbus"
 ENG_airbus_expansion_desc: "Расширение Airbus подчеркивает приверженность компании инновациям, совершенству и удовлетворенности клиентов, а также способствует экономическому развитию, созданию рабочих мест и технологическому прогрессу в британской аэрокосмической промышленности."
 ENG_land_rover_idea: "странник земли"
 ENG_homegrown_innovation: "Отечественная инновация"
 ENG_homegrown_innovation_desc: "Канал Homegrown Innovation направлен на развитие культуры инноваций и предпринимательства в аэрокосмическом и авиационном секторах Великобритании."
 ENG_homegrown_innovation_us1: "Сотрудничество Военно-воздушных сил США и Великобритании в области инноваций"
 ENG_homegrown_innovation_us1_desc: "США работают с Великобританией над внедрением инноваций в Военно-воздушные силы"
 ENG_joint_strike_fighter_project_US1: "Сотрудничество Военно-воздушных сил США и Великобритании в области инноваций"
 ENG_joint_strike_fighter_project_US1_desc: "США работают с Великобританией над внедрением инноваций в Военно-воздушные силы"
 ENG_trans_atlantic_defence: "Трансатлантическая Оборона"
 ENG_ecotricity_idea: "Ecotricity"
 ENG_ecotricity_idea_desc: "Ecotricity - компания-первопроходец в области возобновляемых источников энергии в Великобритании, занимающаяся продвижением экологически чистой энергетики и устойчивых практик. Благодаря своему инновационному подходу к производству энергии ветра, солнца и гидроэлектроэнергии компания стремится ускорить переход к экономике с нулевым выбросом углерода, предлагая потребителям экологически чистые варианты получения энергии и оказывая поддержку местным сообществам."
 ENG_edf_energy2: "Энергия EDF"
 ENG_edf_energy2_desc: "EDF Energy - ведущая энергетическая компания Великобритании, стремящаяся поставлять доступную электроэнергию с низким уровнем выбросов углекислого газа в дома, предприятия и сообщества. Благодаря своим инвестициям в ядерную, возобновляемую и сетевую инфраструктуру компания играет жизненно важную роль в поддержке перехода страны к энергетике, обеспечивая при этом надежность и доступность для потребителей."
 ENG_royal_dutch_shell2: "Ройял Датч Шелл"
