 ENG_princess_anne: "Энн"
 ENG_princess_anne_trait: "Королевская принцесса"
 ENG_princess_anne_leader_name: "$ENG_princess_anne_trait$ Принцесса $ENG_princess_anne$"
 ENG_anne_1_idea: "Королевская принцесса"
 ENG_anne_1_idea_desc: "Титул Королевской принцессы принадлежит Анне в знак старшинства и исключительной службы в Королевской семье. Традиционно даруемое сувереном своей старшей дочери, оно не является автоматическим и даруется только как личная честь. Он несет в себе исторический престиж и свидетельствует о пожизненном ожидании исполнения видимого долга и непоколебимой приверженности Короне."
