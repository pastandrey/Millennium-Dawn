 ENG_prince_andrew: "Andrew"
 ENG_prince_andrew_trait: "Duke of York"
 ENG_prince_andrew_leader_name: "$ENG_prince_andrew_trait$ Prince $ENG_prince_andrew$ "
 ENG_andrew_1_idea: "Royal Navy Commander"
 ENG_andrew_1_idea_desc: "As Royal Navy Commander, Andrew served with distinction in the British fleet, including duties as a helicopter pilot and ship commander. This reflects his long active service and leadership in maritime operations, and signifies his deep connection to the United Kingdom's naval heritage."
 ENG_andrew_2_idea: "$ENG_andrew_1_idea$"
 ENG_andrew_2_idea_desc: "$ENG_andrew_1_idea_desc$"
 ENG_andrew_3_idea: "Duke of York"
 ENG_andrew_3_idea_desc: "The title Duke of York was bestowed on Andrew as a mark of his status as a senior royal and second son of the sovereign. Traditionally granted to younger sons of the monarch, it carries historic prestige and longstanding associations with royal service and public duty."
 ENG_andrew_4_idea: "$ENG_andrew_3_idea$"
 ENG_andrew_4_idea_desc: "$ENG_andrew_3_idea_desc$"
 ENG_andrew_5_idea: "$ENG_andrew_3_idea$"
 ENG_andrew_5_idea_desc: "$ENG_andrew_3_idea_desc$"
 ENG_princess_anne: "Anne"
 ENG_princess_anne_trait: "Princess Royal"
 ENG_princess_anne_leader_name: "$ENG_princess_anne_trait$ Princess $ENG_princess_anne$"
 ENG_anne_1_idea: "Princess Royal"
 ENG_anne_1_idea_desc: "The title Princess Royal is held by Anne as a mark of seniority and exceptional service within the Royal Family. Traditionally granted by the sovereign to their eldest daughter, it is not automatic and is bestowed only as a personal honor. It carries historic prestige and signals a lifetime expectation of visible duty and unwavering commitment to the Crown."
