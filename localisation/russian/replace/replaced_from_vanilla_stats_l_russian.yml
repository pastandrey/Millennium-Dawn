 STAT_NAVY_SHORE_BOMBARDMENT_DESC: "Способность кораблей помогать войскам в десантных атаках и боях на ближайших берегах."
 STAT_NAVY_MISSION_COVERAGE: "Эффективность обнаружения врага: "
 STAT_NAVY_MISSION_COVERAGE_DESC: "§TНасколько эффективно корабль обнаруживает врагов. Каждый корабль имеет свою эффективность обнаружения.§!"
 STAT_NAVY_FIRE_RANGE_DESC: "Дальность полета основных ракет корабля."
 STAT_NAVY_EVASION: "Точечное оборонительное вооружение: "
 STAT_NAVY_EVASION_DESC: "Способность кораблей избегать попаданий ракет противника, CIWS и других вооружений. Небольшие корабли чаще избегают попаданий."
 STAT_NAVY_SUB_ATTACK: "Противолодочная война: "
