 STAT_NAVY_ANTI_AIR_TARGETTING_DESC: "Насколько хорошо радар корабля может находить и отслеживать самолеты противника."
 STAT_AIR_RANGE: "Дальность полета:"
 STAT_AIR_AGILITY: "Преимущество радара: "
 STAT_AIR_AGILITY_DESC: "Как стелс-характеристики самолета, его авионика, системы вооружения и подготовка пилотов дают ему преимущество при БВР и ближнем бою."
 STAT_AIR_DEFENCE: "Воздушная оборона:"
 STAT_AIR_DEFENCE_DESC: "Способность самолёта обмануть и/или обойти или жёстко уничтожить надвигающуюся угрозу с помощью оружия."
 STAT_NAVY_RAIDING_COORDINATION:1 "Координация рейдов: "
 STAT_NAVY_PATROL_COORDINATION:1 "Координация патрулирования: "
 STAT_NAVY_TORPEDO_ATTACK: "Торпеды:"
 STAT_NAVY_TORPEDO_ATTACK_DESC: "Какой урон мы наносим при использовании торпед корабля."
 STAT_NAVY_HG_ATTACK:1 "Противокорабельные ракеты:"
 STAT_NAVY_HG_ATTACK_DESC: "Количество урона и силу атаки, которые противокорабельные ракеты могут наносить вражеским кораблям."
 STAT_NAVY_HG_ARMOR_PIERCING:1 "Пробитие ПКР:"
 STAT_NAVY_HG_ARMOR_PIERCING_DESC: "Этот показатель показывает, насколько хорошо атаки противокорабельных ракет могут пробивать противовоздушную оборону и броню врага."
 STAT_NAVY_LG_ATTACK:1 "Атака орудий:"
 STAT_NAVY_LG_ATTACK_DESC: "Урон от корабельной артиллерии, автопушек и пулемётов; это значение также используется для обстрела побережья."
 STAT_NAVY_LG_ARMOR_PIERCING:1 "Бронебойность лёгких орудий: "
 STAT_NAVY_LG_ARMOR_PIERCING_DESC: "Бронебойность лёгких орудий, более высокие значения пробития увеличивают шанс критических ударов, в то время как значения пробития ниже брони противника сильно снижают урон."
 STAT_NAVY_SURFACE_VISIBILITY: "Заметность кораблей: "
 STAT_NAVY_SURFACE_VISIBILITY_DESC: "Насколько трудно обнаружить и поразить этот корабль, меньшие значения повышают живучесть, а также делают корабль более трудно обнаруживаемым."
