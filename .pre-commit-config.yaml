# Pre-commit configuration for Millennium Dawn HOI4 mod
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.mod$'  # Exclude mod files which might need specific formatting
      - id: end-of-file-fixer
        exclude: '\.mod$'
      - id: mixed-line-ending
        args: [--fix=lf]
        exclude: '\.mod$'
      - id: check-yaml
        files: 'localisation/english/.*\.yml$'
      - id: check-json
        files: '\.json$'
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=100000']  # Prevent files larger than 100MB
      - id: check-case-conflict
      - id: check-executables-have-shebangs
        exclude: '\.txt$|\.mod$'
      - id: check-shebang-scripts-are-executable
      - id: fix-encoding-pragma
        args: [--remove]
        exclude: 'localisation/.*\.yml$'
      - id: check-ast
        files: '\.py$'
      - id: debug-statements
        files: '\.py$'
      - id: name-tests-test
        files: 'tools/.*test.*\.py$'
  - repo: https://github.com/psf/black
    rev: 24.8.0
    hooks:
      - id: black
        files: '^tools/.*\.py$'
        args: [--line-length=88]
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        files: '^tools/.*\.py$'
        args: [--profile=black]
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        name: Format Markdown files
        files: '\.md$'
        args: [--prose-wrap=preserve, --print-width=120]
      - id: prettier
        name: Format Jekyll configuration
        types: [yaml]
        files: '^docs/.*\.yml$'
        args: [--print-width=120]
  - repo: local
    hooks:
      - id: md-fix-styling
        name: MD Fix Styling (auto-fix spaces/tabs/braces)
        entry: python3 tools/fix_styling.py --mode staged
        language: system
        files: '\.(txt)$'
        exclude: 'Changelog\.txt$|AUTHORS\.txt$|descriptions.*\.txt$'
        pass_filenames: false
        stages: [pre-commit]
      - id: fix-localization-encoding
        name: Validate and fix HOI4 localization UTF-8 BOM
        entry: python3 tools/validate_localization_encoding.py --fix
        language: system
        files: 'localisation/english/.*\.yml$|localisation/.*_l_english\.yml$'
        pass_filenames: true
      # - id: md-standardize
      #   name: MD Standardize (auto-fix ideas/events/decisions/focuses)
      #   entry: python3 tools/standardize_staged.py
      #   language: system
      #   files: '(common/national_focus|common/decisions|common/ideas|events)/.*\.txt$'
      #   pass_filenames: true
      #   stages: [pre-commit]
      - id: check-mod-file-encoding
        name: Check .mod file UTF-8 encoding
        entry: python3 tools/validate_mod_encoding.py
        language: system
        files: '\.mod$'
        pass_filenames: true
      - id: check-braces
        name: Check for missing braces
        entry: python3 tools/check_braces.py
        language: system
        files: '\.(txt)$'
        exclude: 'Changelog\.txt$|AUTHORS\.txt$|descriptions.*\.txt$'
        pass_filenames: true
      - id: validate-staged
        name: Validate staged files (opt-in, set MD_VALIDATE=1)
        entry: python3 tools/validate_staged.py
        language: system
        files: '(events/.*\.txt|common/decisions/.*\.txt|localisation/.*\.yml)$'
        pass_filenames: false
        stages: [pre-commit]
