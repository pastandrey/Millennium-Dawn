title: "Millennium Dawn: A Modern Day Mod"
description: "Documentation for the Millennium Dawn: A Modern Day mod for the game Hearts of Iron IV."
baseurl: "/Millennium-Dawn"
url: "https://millenniumdawn.github.io"
lang: en
title_separator: " - "
logo: /uploads/main-menu.png
permalink: pretty

twitter:
  username: MillenniumDawn
  card: summary_large_image

markdown: kramdown
highlighter: rouge

sass:
  sass_dir: _sass
  style: compressed

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
      toc: "auto"
      image:
        path: /uploads/og-image.png
        width: 1200
        height: 630
        alt: "Millennium Dawn logo banner"
  - scope:
      path: "national-content"
      type: "pages"
    values:
      description: "National content overview and focus tree information for Millennium Dawn."
  - scope:
      path: ""
      type: "changelog_sections"
    values:
      toc: "off"
      description: "Detailed changelog and release notes for Millennium Dawn."
      image:
        path: /uploads/og-image.png
        width: 1200
        height: 630
        alt: "Millennium Dawn logo banner"

collections:
  changelog_sections:
    output: true
    permalink: /changelogs/:name/

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
