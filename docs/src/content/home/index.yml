roadmaps:
- title: Map of Current Focus Trees
  image:
    src: /assets/images/roadmaps/current-focus-tree.png
    alt: Map of current focus trees
    width: 6400
    height: 3549
    loading: lazy
- title: Roadmap for Future National Focus Trees and Custom Mechanics
  paragraphs:
  - Map is currently showing estimated content for Mod version 2.0.x
  - This map shows which nations are getting some new content, whether it be a brand new tree, improvements, or some minor bug fixes or changes. Not every nation colored is getting a focus tree.
  - The "x" means that content may not arrive until a patch.
  - Tentative means we have the intention to start or complete this content, but it may or may not be in the mentioned version. It depends on work load and whether the developer is able to complete it. This should give us a more accurate viewing of our progress and what our expectations are for our completion.
  image:
    src: /assets/images/roadmaps/upcoming-content.png
    alt: Roadmap for National Focus Trees
    width: 6400
    height: 3275
    loading: lazy
- title: Roadmap for Military Industrial Organisation (MIO) Content
  paragraphs:
  - Map is currently showing which countries have a fully custom MIO content and which ones are planned. The new additions get positive feedback so we want to share which countries are currently planned.
  image:
    src: /assets/images/roadmaps/custom-mio.png
    alt: Roadmap for MIO content
    width: 6460
    height: 3403
    loading: lazy
team_join:
  description: The development team requires that you are at least 16 years of age and own a legitimate copy of Hearts of Iron IV. Furthermore, you have to have some degree of access to our discord to coordinate efforts with us and other developers. We are always looking for new playtesters, developers, and more. Translation on any of our various translation progress is independent of the main team structure and is conducted through Paratranz. Links for the respective language and their project can be found below. More information including the forms can be found on our discord in the [how-to-join-the-team](https://discord.com/channels/210890013334831104/764514951019757579) channel.
