<footer class="site-footer" role="contentinfo">
    <div class="container">
        <div class="footer-content">
            <div class="footer-section">
                <h3>{{ site.title }}</h3>
                <p>{{ site.description }}</p>
            </div>
            <div class="footer-section" aria-label="Social links">
                <h3>Links</h3>
                <ul>
                    {% for item in site.social %}
                    <li>
                        <a href="{{ item.url }}" target="_blank" rel="noopener noreferrer">
                            {{ item.name }}
                        </a>
                    </li>
                    {% endfor %}
                </ul>
            </div>
            <div class="footer-section" aria-label="Documentation links">
                <h3>Documentation</h3>
                <ul>
                    <li><a href="{{ '/getting-started/' | relative_url }}">Getting Started</a></li>
                    <li><a href="{{ '/tutorials/' | relative_url }}">Tutorials</a></li>
                    <li><a href="{{ '/changelogs/' | relative_url }}">Changelogs</a></li>
                </ul>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; {{ 'now' | date: "%Y" }} {{ site.title }}. All rights reserved.</p>
        </div>
    </div>
</footer>
