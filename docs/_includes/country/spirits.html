<ul class="spirits-list" role="list">
  {%- for spirit in include.items -%}
    <li class="spirit spirit--{{ spirit.type | default: 'neutral' }}" role="listitem">
      <span class="spirit__indicator" aria-hidden="true"></span>
      <span class="spirit__name">{{ spirit.name }}</span>
      {%- if spirit.desc -%}
        <span class="spirit__desc">{{ spirit.desc }}</span>
      {%- endif -%}
    </li>
  {%- endfor -%}
</ul>
