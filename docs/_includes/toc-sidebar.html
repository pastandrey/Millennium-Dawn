{% assign toc_mode = page.toc %}
{% if toc_mode == nil or toc_mode == '' %}
{% assign toc_mode = 'auto' %}
{% endif %}
{% if toc_mode == false %}
{% assign toc_mode = 'off' %}
{% endif %}
<aside class="toc-sidebar" id="toc-sidebar" aria-labelledby="toc-heading"{% if toc_mode == 'off' %} hidden{% endif %}>

    <!-- Mobile FAB toggle -->
    <button class="toc-sidebar__toggle" id="toc-toggle"
            aria-label="Open table of contents"
            aria-expanded="false"
            aria-controls="toc-panel"
            type="button">
        <svg class="toc-sidebar__toggle-icon toc-sidebar__toggle-icon--open"
             aria-hidden="true" xmlns="http://www.w3.org/2000/svg"
             viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M3 4h18v2H3V4zm0 7h12v2H3v-2zm0 7h18v2H3v-2z"/>
        </svg>
        <svg class="toc-sidebar__toggle-icon toc-sidebar__toggle-icon--close"
             aria-hidden="true" xmlns="http://www.w3.org/2000/svg"
             viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M18.3 5.71a1 1 0 0 0-1.41 0L12 10.59 7.11 5.7A1 1 0 0 0 5.7 7.11L10.59 12 5.7 16.89a1 1 0 1 0 1.41 1.41L12 13.41l4.89 4.89a1 1 0 0 0 1.41-1.41L13.41 12l4.89-4.89a1 1 0 0 0 0-1.4z"/>
        </svg>
    </button>

    <!-- Mobile backdrop -->
    <div class="toc-sidebar__backdrop" id="toc-backdrop" aria-hidden="true"></div>

    <!-- Panel -->
    <div class="toc-sidebar__panel" id="toc-panel" role="region" aria-labelledby="toc-heading">
        <div class="toc-sidebar__header">
            <h2 class="toc-sidebar__title" id="toc-heading">Contents</h2>
            <button class="toc-sidebar__close" id="toc-close"
                    aria-label="Close table of contents"
                    type="button">
                <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg"
                     viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                    <path d="M18.3 5.71a1 1 0 0 0-1.41 0L12 10.59 7.11 5.7A1 1 0 0 0 5.7 7.11L10.59 12 5.7 16.89a1 1 0 1 0 1.41 1.41L12 13.41l4.89 4.89a1 1 0 0 0 1.41-1.41L13.41 12l4.89-4.89a1 1 0 0 0 0-1.4z"/>
                </svg>
            </button>
        </div>

        <!-- Reading progress -->
        <div class="toc-sidebar__progress" aria-hidden="true">
            <div class="toc-sidebar__progress-bar" id="toc-progress"></div>
        </div>

        <nav class="toc-sidebar__nav" id="toc-nav" aria-label="Page sections">
            <!-- populated by JS -->
        </nav>
    </div>
</aside>
